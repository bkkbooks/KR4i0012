front:
  text: 增修詩話總龜卷之三
  hash: sha256:988816d821363a7b4e1135debd33124826c760ce023cad4e7e7005dddc72e1cd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_003-1a}
body:
  text: 志氣門丞相李文正公昉少年時嘗以詩呈叔侍中覽而喜贈之詩曰反觀西里盛世世秉鈞衡後文正果大用詔賜所居為謝元卿秉鈞里是知李氏自五代至本朝世居將相非一日也翰府名談陳文惠未逹時作偶成詩曰千里好山雲乍斂一樓明月雨初晴觀此詩者曰意與李覯碧山更𬒳暮雲遮者異矣青箱雜記宋莒公守潁昌開西湖作詩曰鑿開魚鳥忘情地展盡江湖極目天觀者知其必大用丞相劉公沆以氣義自許嘗作牡丹詩曰三月內方有百花中更無又述懷詩曰虎生三日便窺牛獵食寧能掉尾求若不去登黃閣貴便須來伴赤松逰奴顔婢舌誠堪耻羊狠狼貪自合羞三尺太阿星斗煥何時去取魏齊頭皇祐𥘉出鎮豫章漕使潘夙以小孤山四十字示公公即席和之曰擎天有八柱此柱一焉存石聳千尋勢波流四面䀶江湖中作鎮風浪裏蟠根平地安然者饒他五嶽尊覽者皆知有宰相器蔣槩治平中登苐後久不調官逰河朔登雄州北門樓有詩曰壯士未酬志乘秋感慨多幽燕新種落唐漢舊關河塞月沉青冢邉聲入暮河如何得萬騎玉壘夜經過不幸早死觀其志亦有為者也並同前長安舊以不歷臺省便出鎮廉車節鎮者為粗官大率重內而輕外今東都乾元門舊宣武軍鼓角門節度王彥威有詩刻其上云天兵十萬勇如貔正是酬恩報國時汴水波濤喧鼓角隋堤楊柳拂旌旗前驅紅斾關西將坐間青娥趙國姬寄語長安舊冠蓋粗官到底是男兒彥威自太常博士出辟使府至茲鎮故有是句至今不知所在薛能亦有謝寄茶詩云粗官寄與真拋擲賴有詩情合得嘗談苑李忭竹詩曰棲鳯枝梢猶軟弱化龍形狀已依稀唐宣宗瀑布詩曰溪澗豈能留得住終歸大海作波濤王霸之意可見也河中府逍遙樓有唐太宗詩曰昔乘四馬去今驅萬乘歸氣象尤可見詩史唐子方謪官渡淮至中流風作舟欲覆作詩曰聖宋非狂楚清淮異汨羅平生仗忠信今日任風波日暮泊舟岸續云舟楫顛危甚黿鼉出沒多斜陽幸無事沽酒聽漁歌真詩無諂可以格鬼神雲齋録景祐五年苑試進士以鵾化為鵬為詩題吕濟叔詩云九霄離海嶠一夕過天池論者以此詩當為第一人同前沙門文瑩嘗謂為文老而不衰者惟元厚之在禁林時有懷荆南舊逰云去年曾醉海棠叢聞説新枝發舊紅昨夜夢回花下飲不知身在玉堂中樂天典杭日江東學子奔杭取解張祐自負詩名而徐凝亦至燕于郡中樂天諷二子矛盾祐曰僕冝為解首凝曰有何佳句祐曰甘露竒詩曰日月光先到山河勢盡來金山寺詩曰樹影中流見鐘聲兩岸聞凝曰善則善矣奈無野人瀑布詩曰千古長如白練飛一條界破青山色祐愕然一座盡傾古今詩話王沂公布衣時以梅花詩獻吕文穆公云雪中未問和羮事且向百花頭上開文穆曰此生已安排狀元宰相也後果然姚嗣宗詩云踏碎賀蘭石掃清西海塵布衣能效死可惜作窮鱗韓魏公安撫關中薦試大理評事同前高越逰河朔有州牧欲以女妻之越作鷂子詩云雪爪星眸衆鳥歸摩空專候整毛衣虞人莫謾張羅網未肯平原淺草飛孫給事僅及孫暨皆咸平初省試放狀元後各應制舉給事與兄何齊名有聲場屋何淳化中魁多士給事下第有詩曰前春再就天階試應被人呼小狀元次舉中甲科王元之以詩贈曰病中何事忽開顔憶得詩稱小狀元粉壁已懸龍虎榜錦標爭屬鶺鴒原並同前高言京師人字明道好學有志義以詩于友人曰昨夜隂風透膽寒地爐無火酒瓶乾男兒慷慨平生事時復挑燈把劔看秦少遊謫雷州有詩曰南土四時都熱愁人日夜俱長安得此心如石一時忘了家鄉黃魯直謫冝州作詩曰老色日上面歡情日去心今既不如昔後當不如今輕紗一幅巾短簟六尺牀無客日自靜有風終夕涼少遊鍾情故詩酸楚魯直學道故詩間暇至東坡南中詩曰平生萬事足所欠唯一死則英特之氣不受折困知遇門楊徽之侍讀太宗聞其名索所著數百篇奏御獻詩云十年牢落今何幸叨遇君王問姓名太宗選十聮書于御屏間梁周翰詩曰誰似金華楊學士十聮詩在御屏間僧文瑩嘗謂楊公必以天池浩露滌筆於氷甌雪碗中則方與公詩神骨相副古今詩話夏文莊守安陸宋莒公兄弟尚皆布衣文莊異待之命作落花詩莒公曰漢臯珮解臨江失金谷樓危到地香子京曰將飛更作回風舞已落猶成半面粧是歲詔下兄弟皆應舉文莊曰詠落花而不言落大宋須狀元及第又風骨秀重異日作宰相小宋非所及然亦須登嚴近後皆如其言故文莊在河陽聞莒公登庸以别𥿄賀曰昔年安陸已識台光蓋謂是也青箱雜記杜荀鶴謁梁高祖與之坐忽無雲而雨祖曰無雲而雨謂之天泣不知何祥請作詩荀鶴曰同是乾坤事不同雨絲飛灑日輪中若教隂顯都相似爭表梁王造化工髙祖喜之洞微志真宗末年嘗逰禁中見翰林學士王禹稱倚宫木若詠吟命宫使亟探之果預作賞花釣魚詩明日百官赴宴逮題出乃千葉石榴花百官皆失所擬禹稱首進一絶云王母庭中親見栽張騫偷得下天來誰家巧婦殘針線一撮生紅尉不開上稱賞謂真才桂堂詩話唐文宗夏日與諸學士聮句人皆苦炎熱我愛夏日長柳公權續曰薰風自南來殿閣生微涼時丁表五學士皆屬繼文宗獨諷公權兩句辭清意足不可多得乃令公權題於殿壁字方員五寸文宗視之歎曰鍾王復生無以加焉廣卓異記劉景文作饒州監酒得一詩題芝山寺壁云數聲燕語落簷間底事驚回夢裏間説與傍人都未信杖藜携酒看芝山舒王作本路憲見之愛甚遂令權州學古今詩話蜀人雍陶以進士第為簡州牧自比謝宣城柳吳興也賔至折挫忽有馮道明下第請謁告閽者道明與員外有舊及見呵曰與公昧平生何方相識道明曰誦員外詩仰員外德遂吟曰立當青草人先見行傍白蓮魚未知又曰江聲秋入寺雨氣夜侵樓又曰閉門客到常疑病滿院花開不似貧聞之歡狎如曩昔之友雲溪友議王文公凝清族重德冠絶當時每就寢息必義手而卧慮其寢寐中見先靈食餺飥不過十八片曽典綘州時司空圖侍郎方應進士舉自別墅到郡謁見後更不訪親知閽吏遽申司空秀才出郭後入郭訪親知即不造郡齋琅琊知之謂其專敬愈重之及知舉日司空一捷列第四人登科同年訝其姓名甚暗所圖太速有鄙薄者號為司徒空琅琊知有此説因召一榜門生開筵宣言于衆曰某叨忝文柄今年榜帖全為司空先輩一人而巳由是聲彩益振爾後為御史分司舊相盧公携酒訪之留詩曰氏族司空貴官班御史雄老夫如且在未可歎途窮其為名德重也如此北夢瑣言狂放門鍾傳鎮南昌有李夢符者放蕩酣飲好事者與語應口成詩後桂州刺史李瓊遣人謂傳曰夢符吾弟請遣歸鍾令求於市邸人曰夜來不歸不知所之有回常學士詩云罷修儒業罷修真飬拙藏愚春復春到老不踈林裏鹿平生難見日邉人洞桃深處千株錦岩雪鋪時萬草新深謝名賢逺相訪求聞難禣鳯為鄰詩史朱協仕江南為縣令甚踈逸有詩云好是晚來香雨裏擔簦親送綺羅人李璟聞之處以間曹又有僧庭實獻詩云吟中雙鬢白笑裏一生貧璟聞云詩以言志終是寒薄以束帛遣之同前李浣登科在和凝榜下同為學士會凝作相浣為承旨當批詔次日於玉堂舊閣悉取圖書器玩留一詩于榻云座主登庸歸鳯闕門生批詔立鰲頭玉堂舊閣多珍玩可作西齋潤筆否人皆笑其踈縱古今詩話杜牧之登科後三年縱放為詩曰落魄江湖載酒行楚腰纎細掌中情十年一覺楊州夢嬴得青樓薄幸名又曰觥船一棹百分空十載青春不負公今日鬢絲禪榻畔茶煙輕揚落花中杜牧自御史分司洛陽李司徒罷鎮間居聲妓為當時第一因會朝士以牧之嘗任風憲不敢邀置牧之諷坐客逹李李遽馳書以招而牧之遂來謂李曰聞有紫雲者孰是因指示牧之作詩曰華堂今日綺筵開誰喚分司御史來忽發狂吟驚滿座兩行紅粉一時回意氣間逸旁若無人裴忠謙狀元登科作𥿄箋名𥿄謁平康里妓因宿于里中作詩曰銀缸斜背解鳴璫小語低聲喚玉郎從此不知蘭麝貴夜來新惹桂枝香鄭谷登第後宿平康里作詩曰春來無處不間行楚閠相看别有情好是五更殘酒醒耳邊聞喚狀元聲楊汝士尚書鎮東川其子及第汝士開筵營妓咸集汝士命人與綾一端詩曰郎君得意正青春蜀國將軍又不貧一曲髙歌綾一匹兩頭娘子拜夫人潘逍遙與許洞錢易為友狂放不羈嘗作詩云散拽禪師來踘蹴醉拖逰女上鞦韆此其自序之實也後坐盧多遜黨亡命捕之甚急乃易姓名為僧入中條山許洞贈詩曰潘逍遙平生志意如天髙仰天大笑無所懼天公嗔爾口呶呶罰教臨老投輔衲歸中條我願中條山神鎮長在驅雷逐電依前趕出這老怪后會赦以四門助教招之送信州安置復舞于市曰出砒霜價錢可嬴得撥灰兼弄火暢殺我以此士人不齒放棄終身並同前姚嵓傑梁國元崇之裔弱冠通墳典以詩酒逰江左凌忽前逹旁若無人乾符中顔標典鄱陽𥘉創鞠埸請嵓傑紀其事文成千餘言標欲刋去一兩字嵓傑大怒既而標已睚眥而巳勒石遂令覆碑于地以車拽之磨去嵓傑以一篇寄之曰為報顔公識我麼我心唯只與天和眼前俗物關情少醉後青山入夢多田子莫嫌彈鋏恨寧生休唱飯牛歌聖朝若為蒼生計也合公車到薜蘿盧肇牧歙州嵓傑在婺源先以著述寄肇肇知好使酒以手書褒美之贈以束帛迎至郡齋館穀如公卿既而日肆傲睨輕視子發子發嘗以詩吒嵓傑曰明月照巴山嵓傑笑曰月照天下奈何獨照巴山子發慚不樂無何會于江亭時蒯希逸在坐子發改令目前取一聮象子發曰逺望漁舟不闊尺八嵓傑遽飲一器憑闌嘔􅰽須臾即席遂答云憑闌一嘔巳覺喉空有集二十卷曰象溪子逆旅豫章不知所終雜言鍾山公鎮臨川賞牡丹有小吏手捧硯舉止有士人風公曰學詩乎曰粗親筆硯因令口占一篇其警句云三月莫辭千度醉一生能得幾回看公曰他日定成器因勉令就學明年謁嶺南李國老大加稱賞賫數百縑于金陵酒樓數日而盡醉中挂帆數百里至落星灣半醒煙雨中登水心寺題詩於水軒曰分飛南渡春風晚却返家林事業空無限離情似楊柳萬條垂向楚江東李白才思不羈有醉吟詩曰天若不愛酒酒星不在天地若不愛酒地應無酒泉天地既愛酒飲酒不愧天三杯通大道一斗合自然但得醉中趣勿為醒者傳憶賀知章曰欲向江東去定將誰舉杯稽山無賀老却棹酒船回郡閣雅談韓魏公出鎮中山有門客夜踰墻出宿娼家公知作種竹詩以警之殷勤洗灌加培植莫遣狂枝亂出墻門客自愧作詩云主人若也憐高節莫為狂枝贈斧斤公置一女奴贈之青瑣集增修詩話總龜卷之三百家詩話總龜後集卷之三孝義門徐師川詩云楚漢紛爭辨士憂東歸那復割鴻溝鄭君立義不名籍項伯胡顔肯姓劉謂項伯籍之近族乃附劉而背項鄭君以為漢臣乃違漢而思楚也余嘗論之曰方劉項之勢雌雄未決也其間豈無容容狡詐之士首鼠兩端以觀成敗而為身謀者乎項伯是也其意以謂項氏得天下則吾嘗以宗族從軍畫䇿定計豈吾廢哉劉氏得天下則鴻門之會吾嘗舞劍以蔽沛公矣廣武之會吾嘗勸勿烹太公矣劉氏豈吾廢哉髙祖之封項伯殆以此也至鄭君則不然事藉藉死屬漢髙祖諸故楚臣名籍鄭君獨不奉詔乃盡拜名籍者為大夫而逐鄭君觀此則鄭君與項伯賢佞可見髙祖或逐或封皆徇情之好惡則知戮丁公者一時矯激之為也王儉七志曰宋髙祖逰張良廟並命僚佐賦詩謝瞻所賦冠于一時今載于文選者是也其曰鴻門銷薄蝕陔下隕攙搶爵仇建蕭宰定都護儲皇肇允契幽叟翻飛指帝鄉則子房輔漢之䇿盡於此數語矣王荆公云素書一卷天與之榖城黃石非吾師固陵解鞍聊出口捕取項羽如嬰兒從來四皓招不得為我立棄商山芝用亦此數事而論議格調出瞻數等東坡論子房袖捶之事以謂良不為伊吕之謀而特出於荆軻聶政之計以余觀之此良少年之鋭氣未足以咎良也圮上授書之後所見豈前比哉葛常之豫曽祖通議兄弟四人取良辰美景賞心樂事之義作四并堂于東園故通議詩云華圃控弦秋學射寒窗留燭夜抄書良辰美景饒心事歡日相并樂起豫先祖清孝公兄弟六人取三荆同林之義作培荆亭于西園當時篇詠無存者清孝安遇集中有培荆亭記其略云西園推輪無亭觀之玩伯兄欲紏合叔季同耳目之適於是基盈尺之髙宏一筵之廣列楹為亭號曰培荆至先人文康公罷官南陽適當兵擾復還舊捿奉伯父工部居焉别建二老堂于宅南秦望由里諸山皆在目植花竹于四隅命某日治饌往往樂飲竟日某嘗賦詩云去家才隔水一股二老堂成三百弓鴒原暮下沙水暖鴈行夜落霜天空竹根酌酒不妨醉花蕚斫詩如許工坐久興闌笻竹杖出門人指兩仙翁同上月輪當空天下之所共視故謝莊有隔千里兮共明月之句蓋言人雖異處而月則同瞻矣老杜當兵戈騷屑之際與其妻各居一方自人情觀之豈能免閨門之念而他詩未嘗一及之至於明月之夕則遐想長思屢形詩什月夜詩云今夜鄜州月閨中只獨看繼之曰香霧雲鬟􅊜清輝玉臂寒一百五日夜對月去無家對寒食有淚如金波繼之曰仳離放紅蘂想像嚬青蛾江月詩云江月光於水髙樓思殺人繼之曰誰家排錦字燭滅翠眉嚬其數致意閨門如此其亦謝莊之意乎顔延之對孝武乃有莊始知隔千里兮共明月之説是莊才情到處延之未能曉也同上魏武於諸子中獨愛植丁儀丁廙楊修之徒為植羽翼幾代太子丕而植任性不自雕勵又太子御之有術故易宗之計不行蓋非植遜丕也洎文帝即位植屢求試用不報益怏怏帝欲害之卞太后曰汝已殺任城不得復殺東阿故止從貶爵則植豈無怨懟乎嘗觀植所作豫章行云他人雖同盟骨肉天性然周公穆康叔管蔡則流言子臧孫千乘季札慕其賢意謂已素為武帝所愛忌之者故衆有管蔡流言之説然乃自以季札為比亦誣矣豈其掠美之言哉同上晉嵇康贈弟秀才四言詩云感悟馳情思我所欽則以所欽為弟陸機贈從兄車騎詩云寤寐靡安豫願言思所欽則以所欽為兄又贈馮文罷詩云慷慨誰為感願言懷所欽則以所欽為友陸機作詩贈賈謐幾三百言無非極其裒讃方謐用事生死榮辱人如反覆手其裒讃亦何足怪然其間亦有寄意譏誚人未能推其意者按臧榮緒晉書謐父韓夀母賈充少女也充平生不議立後妻郭槐輒以外孫韓謐襲封帝計之遂以謐為魯公則是賈謐非充子也故機詩云誕育洪胄纂戎于魯言誕育則以譏非巳生也又曰惟漢有木曾不踰境謂橘踰淮則化為枳言如螟蛉之化蜾螺無異也夫謐勢熖薰灼如此而機敢為廋詞以狎侮之真文人之習氣哉王福畤之子勔勮勃皆有才名故杜易簡稱為三珠樹其後助劼勸又皆以文顯勃於兄弟之間極友愛自鄉還􅉑詩云人生忽如客骨肉知何常願及百年內花蕚常相將無使棠棣廢取譬人無良觀此語意豈兄弟有不相能者耶及觀誡功徑云欲不可縱爭不可常勿輕小忿將成大殃此二人者似非處於禮義之域者棠棣廢之語疑為此二人設也同上楊六尚書白樂天妻兄也𥘉除東川節度代妻賀兄云覔得黔婁為妹壻可能空寄蜀茶來又寒食寄詩云蠻旗似火行隨馬蜀妓如花坐繞身不使黔婁夫婦看誇張冨貴向何人皆責望之言也同上文選載嵇叔夜贈秀才入軍詩李善注謂兄喜秀才入軍而張銑謂叔夜弟不知其名考五詩或曰携我好仇或曰思我良朋或曰佳人不在皆非兄弟之稱善銑所注恐未必然爾同上錢起題杜牧林亭詩云不須耽小隱南阮在平津南阮謂杜悰也史載悰更歷將相而牧困躓不自振怏怏不平以至於卒審爾以牧之豈肯受其料理哉然宗族貴宦河潤者非一枯菀升沉時命存焉何至怏怏如是可以知牧之量不宏也李義山作驕兒詩時衮師方三四歲爾其末乃云兒應勿學耶讀書求甲乙况今西與北羌戎正狂悖兒當速成大探雛入虎窟當為萬户侯勿守一經帙兵連禍結生民塗炭以日為歲之時而乃望三四歲兒立功於二十年後所謂俟河之清人夀幾何者也同上陶淵明命子篇則曰夙興夜寐願爾之才爾之不才亦已焉哉其責子篇則曰雖有五男兒總不好𥿄筆天運苟如此且進杯中物告􅌂等數則曰鮑叔管仲同財無猜歸生伍舉班荆道舊而况同父之人哉則淵明之子未必賢也故杜子美論之曰有子賢與愚何其挂懷抱然子美於諸子亦未為忘情者子美遣興詩云驥子好男兒前年學語時世亂憐渠小家貧仰母慈又憶幼兒詩云別離經莭換聰惠與誰論憶渠愁只睡炙背俯晴軒得家書云熊兒幸無恙驥子最憐渠元日示宗武云汝啼吾手戰觀此數詩於諸子鍾情尤甚於淵明矣山谷乃云杜子美困於三蜀蓋為不知者詬病以為詘於生事又往往譏宗武失學故寄之淵明爾俗人不知便為譏病所謂癡人面前不得説夢也同上百家詩話總龜後集卷之三
