front:
  text: 百家詩話總龜後集卷之五十
  hash: sha256:7f8c844d0e4c7b619e97b87b00feca72c229be5dba4d771fe30e0e3bb709d866
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_050-1a}
body:
  text: 技藝門東坡與子由論書云吾雖不善書曉書莫如我苟能通其意常謂不學可故其子叔黨跋公書云吾先君子豈以書自名哉特以其至大至剛之氣發於胸中而應之於手故不見其有刻畫嫵媚之態而端乎章甫若有不可犯之色少年喜二王書晚乃喜顔平原故時有二家風氣俗子不知妄謂學徐浩陋矣觀此則知𥘉未嘗規規然出於翰墨積習也葛常之唐令狐相進李逺為杭州宣宗曰聞李逺云長日惟消一局棊豈可使治郡哉對曰詩人之言不足有實也乃薦逺亷察可任此正説詩者不以辭害志也䂬溪房千里作骰子選格序云以六骰雙雙為戲以數多少為進身官聀之序而乃條其選黜之目焉坡以流俗狂惑經營倘來惴惴惟恐後于他人何異擲骰者心動於中而色形於外也欲求勝人者哉王逄原彩選詩云卒無及物效徒有髙人氣昏昏忘其大優優爭其細其理信然黃常明裴度平淮西絶世之功也韓愈平淮西碑絶世之文也非裴之功不足以當韓之文非韓之文不足以發裴之功碑成李訴之子乃謂沒父之功訟之於朝憲宗使假文昌別作此與捨周鼎而寶康瓠何異哉李義山詩云碑髙三丈字如手負以靈鰲蟠以螭句竒語重喻者少讒之天子言其私長繩百尺拽碑倒粗砂大石相摩治公之斯文若元氣先時已入人肝脾愈書訴曰十月壬申訴用所得賤賊將自文城因天大雪疾馳百二十里到蔡取元濟以獻文昌所謂郊雲晦冥寒可墮指一夕卷斾凌辰破關等語豈不相萬萬哉東坡先生責官過舊馹壁間見有人題一詩云淮西功業冠吾唐吏部文章日月光千古斷碑人膾炙世間誰數假文昌坡喜而録之同上陸希聲隱居冝興君陽山今金沙寺其故他宅也自著君陽山記敘其景物亭館如輞川上可得其倣佛𥘉僧辨光從希聲授筆法繼以善書得幸於昭宗希聲祈使援已以詩寄之云筆下龍蛇似有神天池雷雨變逡巡寄言昔日不龜手應念江湖洴澼人遂得召隱操蓋不足觀也嘗著易傳十卷觀其自序以謂夢在大河之陽有三人偃卧東首上伏羲中文王下孔子也以易道卑豫遂悟八卦小成之位質之象數如有符契且云今年四十有七巳及聖人之年於是作易傳以授門人崔徹王贊之徒復自為注今觀其書無可取者而怪誕如此其人亦可知後避難死於道路蓋不能終君陽之居也韻語陽秋杜劉少府畫山水障歌云反思前夜風雨急乃是蒲城鬼神入元氣淋漓障尤􅊜真宰上訴天應泣應物聽嘉陵江聲云水性自云靜石中本無聲如何兩相激雷轉空山鳴贈能吟李儋詩云絲桐本異質音韻合自然吾觀造化意二物相因緣臨川詠魯公壞碑云六書篆籒數變改遂後世多失真誰𥘉妄鑿妍與醜坐令學士勞骸筋堂堂魯公勇且仁豈亦以此夸常民直疑技巧有天巧不必強勉亦通神坡詠歙硯詩云與天作石來幾時與人作硯𥘉不辭詩成鮑謝石何與筆落鍾王硯不知此窮本探妙超出凖繩外不特狀寫景物也䂬溪拾遺門退之和劉使君云吏人休報事公作送春詩夢得送王司馬之陜州云案牘來時惟署字風煙入興更成章自俗吏觀之皆可坐不了事之目也韻語陽秋樂天云報道前驅少呵喝恐驚黃鳥不成啼坡云鬢絲只好對禪榻湖亭不用張旌旗蔡君謨云因傍堤松却飛蓋為聞山烏撤鳴騶若俗士務此誇張俗眼又豈識數公意黃常明林和靖詩馬從同事借妻怕罷官貧頗能狀寒亷態抑又有意所謂怕貧者婦人女子耳大丈夫之不移何隕獲之有子美有長貧任婦愁亦以男子未嘗愁也讓粟不謀妻以明謀及婦人則不得辭也又云浮生有分定飢飽豈能逃歎息謂妻子我何隨汝曹樂天云妻孥不恱生怪問而我醉卧方陶然退之曰莫為兒女態戚嗟憂賤貧䂬溪詩話肅宗至德𥘉子美為拾遺岑參為輔闕或問二人孰賢豫曰子美賢或曰何以知之曰以其詩知之子美之詩云避人焚諌草騎馬欲雞栖又曰明朝有封事數問夜如何參之詩曰聖朝無闕事自覺諌書稀至德𥘉安史之亂方劇上皇在蜀朝野騷然果無闕事時耶䂬溪詩話李白月下獨酌詩云舉杯邀明月對影成三人而賈翁玩月詩亦云但愛杉倚月我倚杉為三葛常之文如翻水成賦作義手速乃北夢瑣言記溫庭筠才思艷麗工於小賦每入試押官韻作賦凡八義手而八韻成多為鄰鋪假手號日救數人也余嘗以八義手對三折肱䂬溪詩話老杜流落不偶然巳為世所尊嘗有杖藜還客拜又有客云老病人扶再拜難則其坐深鄉曲敬可見奚雖然樊宗師見劉義尚為之獨拜况老杜乎黃常明周美成晚歸錢塘鄉里夢中得瑞鶴仙一闋悄郊原帶郭行路永客去車塵漠漠斜陽映山落斂餘紅猶戀孤城闌角凌波步弱過短亭何用素約有流鶯勸我重解繍鞍緩引春醉酌不記歸時早暮上馬誰扶醒眠朱閣驚飈動幕猶殘醉繞紅渠歎西園已是花深無地東風何事又惡任流光過却歸來洞天自樂未幾方臘盜起自桐廬擁兵入杭時美成方會客聞之倉黃出奔趍西湖之墳庵次郊外適際殘臘落日在山忽見故人之妾徒步亦為逃避計約下馬小飲于道傍旗亭聞鶯聲於木杪分背少焉抵庵中尚有餘醺因卧小閣之上恍如詞中逾月賊平入城則故居皆遭蹂踐旋營緝而處繼而得請提舉杭州洞霄宫遂老焉悉符前作美成嘗自記甚詳今偶失其本姑記其略以書于編揮塵余嘗於王瑩夫􅗕處見王荆公手書集句詩一𥿄云海棠亂發皆臨水君知此處花何似涼月白紛紛香風隔岸聞囀枝黃鳥近隔岸聲相應隨意坐莓苔飄零酒一杯今不知在何所揮塵萊公雖居相位於寢處一青幃三十年有親者求之欲其易去公笑而答曰彼詐我誠雖敝何害實不忍以敝舊棄耳析者愧之故魏野詩云有官居鼎鼐無地起樓臺及北使來顧望縉紳而問迓者無地起樓臺相公安在其清望為人所景望如此然永叔歸田録頗論其侈汰司馬溫公亦云豈非奢外而儉內歟䂬溪昌黎寄崔立之云傲兀坐試席深叢見孤羆四坐各低回不敢捩眼窺可謂善言埸屋事若平居所飬不厚誠難傲兀也同上退之韶州晉别張使君云久欽江總文章妙自歎虞翻骨相屯翻放棄南方自恨疏莭骨鯁不媚犯上獲罪當長沒海隅其剛𥚹方拙凌突權勢出於天性冝文公喜用江總乃敗國姦回特引之何故按南史孔奐傳宋主欲以總為太子詹事奐曰江有潘陸之華而無園綺之實乃奏江總文華之人冝求厚重之才是時恐有􅏺云杜云逺愧梁江總還家尚黑頭李商隱贈杜牧之云前身恐是梁江總皆未可與言史也同上子美有朱紱負平生樂天有金帶腰衫委地紫綬相暉映不惡赤紱金章盡到身如此尚多然亦有歎曰實事盡消虗事在銀魚金帶繞腰光又有簮纓假合虗名在筋力消磨實事空皆自作解嘲也嘗愛韋蘇州云除書忽到門冠帶便拘束又有謝居士寄松英丹云一拜藍峰送還使腰間銅印與心違言與意皆自在也散貟踈去未為貴小邑陶休何足云惟樂天早退乃可語此黃常明蘇州寄粲師遙知尋齋夜凍雪封松竹時有山僧來懸燭獨自宿嘗於暑月讀亦有霜氣籍贈令狐云久為慱士無人識自到長安賃舍居未足為窮其尋時道士云昨來官罷無生計𣣔就專求辟榖方其窮無以加矣唐王建以宫詞名家本朝王岐公亦作宫詞百篇不過述郊祀御試經筵翰苑朝見等事至於宫掖戲劇之事則祕不得傳故詩詞中亦罕及若建者乃內侍王守澄之宗姪得宫中之事為詳如叢叢洗手繞金盤旋拭紅巾入殿門衆裏遙看新橘子在前枚得便承恩又云避脫昭儀不擲盧井邊含水噴鴉雛內中數日多呼喚寫得滕王蛺蝶圗如此之類非守澄説似則建豈能知哉𥘉守澄讀建宫詞謂之曰宫掖之事而子昌言之儻得罪將奚贖建與之詩云三朝行坐鎮相隨今上春宫見小時脫下御衣先賜著進來龍馬每教騎長承密旨歸家少獨奏邊機出殿遲不是姓同親説向九重爭得外人知自是守澄不敢有言花蕊夫人亦有宫詞百篇如月頭支給買花錢滿殿宫人近數千遇著唱名多不語含羞走過御床前之類亦可喜也余嘗赴京師往辭伯父坐中舉兄弟送行詩云問人求穩店下馬過危橋及觀坡集送姪安莭詩序其伯曽有送蘇老下第歸蜀云人希野店休安枕路入靈關穩跨驢急難之誠意皆相若但字有多寡耳余官辰沅逾年族弟來相視將行率爾送之云就舍勿令人避席渡江莫與馬同船雖鄙近不工亦可用於畏塗也黃常明荆公日記云立春日悉剪綵為燕子以戴之故歐永叔云不驚樹裏禽𥘉變共喜叉頭燕巳來鄭毅天云漢閣閗簮雙綵燕併知春色上叉頭皆春日貼子詩也藝苑雌黃云修真入道祕言曰以立春日清晨北望有紫緣白雲者為三元者三素飛雲三元君以是日乘八輿上詣天帝子候見當再拜自陳某乙乞得給侍輪轂三過見元君之輦者白日登天歲時廣記載此事云臣鍇按舉埸嘗試立春日望三素雲詩取此事故蘇子容作皇太妃閣春貼子云萬年枝上看春色三素雲中望玉宸許仲尤作皇帝閣春貼子云三素雲飛歸北極九農星粲見南方百家詩話總龜後集卷之五十終寫書貴溪薑輔周刋字番易丁祖朱樂平胡暹詩話總龜跋余舒阮字集百家詩話總龜首卷四十有八後卷五十實抄録未傳之書其月囱殿下樂善嗜古見而珍愛亟𣣔與四方風雅之士共之延珖校讎訛舛芟剔重冗而夀諸梓焉復俾采集近代及國朝諸大家者而續成之荑荒僻淺鮮搜輯尚未成帙姑識于卷末云峕嘉靖歲次乙巳春三月吉旦番昜後學程珖謹識
