front:
  text: 增修詩話總龜卷之六
  hash: sha256:763075658ac08017df33b7fe8459eec18c2b0137b2efcdee39b526c57edb1d1f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_006-1a}
body:
  text: 評論門中王右丞好取人詩如行到水窮處坐看雲起時此華英集中句也漠漠水田飛白鷺隂隂夏木囀黃鸝此李嘉祐句僧惠崇有詩云河分岡勢斷春入燒痕青士大夫竒之然皆唐人舊句崇有師弟學詩於崇贈崇詩曰河分岡勢司空曙春入燒痕劉長卿不是師偷古人句古人詩句似師兄大都誦古人詩多積久或不記則往往用為巳有如少陵詩云峽束滄江起嵓排石樹圓見蘇子美頌詩全用峽束滄江嵓排石樹作五言詩兩句子美豈竊人詩者古今詩話元和中長安有沙門善病人文章尤能提人語意相合張籍喜之或得句曰長因送人處憶得別家時謂似應不與前輩合也僧曰此有人道來籍曰何人僧曰見他桃李樹憶著后園枝籍大笑舒王云梨花一枝春帶雨桃花亂落如紅雨珠簾暮捲西山雨皆警句也然不若院落深沉杏花雨為佳宋莒公好玉溪詩不愛韋蘇州晏元獻取少陵多取太白少又取裴説幸無偏照處剛有不明時為佳咏牡丹詩甚多羅鄴云落盡春紅始見花幄籠輕日護香霞買栽池館恐無地看到子孫能幾家此詩中之虎也俱同前此詩續本事詩有全篇云落盡春紅始見花花時比屋事豪奢買栽池館恐無地看到子孫能幾家門倚長衢攢繡軛幄籠輕日護香霞歌鍾滿坐爭歡賞豈信流年鬢有華續本事詩李太白才逸氣豪與陳拾遺齊名其論詩云梁陳巳來艷薄殊極沈休文又尚聲律將復古道非我而誰故陳李二集律詩全少嘗言興寄深微五言不如四言七言又其靡也况使束于聲調俳優哉故戲杜子美曰飯顆山頭逢杜甫頭戴笠子日卓午借問别來太瘦生總為從前作詩苦古今詩話宋武帝詠謝莊月賦稱歎久之謂顔延之希逸作此可謂前不見古人後不見作者陳思王何足尚也延之曰誠如其言又云美人邁兮信音絶隔千里兮共明月知之不亦晚乎武帝以為然及見希逸希逸對曰延之詩云生為長相思死為長不歸豈不更加於臣耶武帝撫掌謝學士吟蝴蝶詩三百首人呼為謝蝴蝶其間絶有佳句如狂隨柳絮有時見舞入梨花何處尋又曰江天春晚暖風細相逐賣花人過橋古詩有陌上斜飛去花間倒翅回又云身似何郎貪傅粉心如韓夀愛偷香終不若謝句意深逺孫少述栽竹詩曰更起粉墻高百尺莫令墻外俗人看晏臨淄曰何用粉墻高百尺任教墻外俗人看處士之節宰相之量各言其志李洞為吳子華所知子華嘗出百篇示洞洞曰大兄百篇中一聮最佳西昌新亭曰暖漾魚遺子晴逰鹿引麛子子華亦不怒其所鄙而喜其所許蘇子美坐進奏賽神事謪官死于臯橋之居江鄰幾有詩吊之曰郡邸獄冤誰與辨臯橋客死世同悲用事精審而當又有云五十踐衰境加我在明年論者謂人莫不用事使事如已出天然渾成乃可言詩江外有石人破之其形色皆類月歐陽文忠有月石詩云二曜分為三固為佳句尚念未快子美見之作詩寄之云我疑此山石久為月昭著老蚌吸月月降胎水犀望星星入角􅊮霞爍石變丹砂白紅貫岩生美璞永叔見之曰此竒才精通物理者也説者謂王右丞終南詩皆譏時宰詩云太乙近天都連山接海隅言勢位盤據朝野也白雲回望合青靄入看無言徒有表而無內也分野中峰變晴隂衆壑殊言恩澤偏也欲投何處宿隔水問樵夫言畏禍深也杜荀鶴嘗有舊衣灰絮絮新酒竹篘篘或稱於相國韋莊莊曰我道印將金鎖鎖簾用玉鈎鈎其皆可見俱同前唐人賡和詩有次韻依其次用韻同在一韻中耳有用韻用彼之韻亦必次之韓吏部和皇甫湜陸渾山火是也今人多不曉劉長卿餘干旅舍云搖落暮天逈丹楓霜葉稀孤城向水閉獨鳥背人飛渡口月初上鄰家漁未歸鄉心正欲絶何處搗征衣張籍宿江上館云楚馹南渡口夜深來客稀月明見潮上江靜覺鷗飛旅宿今巳逺此行殊未歸離家久無信又聽搗寒衣兩詩偶似次韻皆竒作也張逈少年苦吟未有所得夢五色雲自天而下取一團吞之遂精雅道有寄逺詩曰錦字慿誰逹間庭草又枯夜長燈影滅天逺鴈聲孤蟬鬢凋將盡虬髯白也無幾回愁不語因看朔方啚携卷謁齊巳點頭吟諷無斁為改虬髯黑在無逈遂拜作一字師郡閣雅談鄭谷幼負名譽司空圖見而竒之問之答曰大夫曲江晚望斷篇云村南斜日間回首一對鴛鴦落渡頭意深矣司空撫背曰當為一代風騷主同前蘇子容愛元白劉賔客輩詩如汝洛唱和皆往往成誦苦不愛太白輩詩曾誦汝洛集九日送人云清秋方落帽子夏正離群以為假對工夫無及此聮又舉劉夢得送李文饒再鎮浙西詩以為最著題詩史謝赫云衛協之畫雖不該備形妙而有氣韻凌跨群雄誠曠代絶筆歐陽文忠盤車圖云古畫畫意不畫形梅詩詠物無隱情忘情得意知者寡不若見詩如見畫此真識畫也古今詩話曹唐羅隱同時有詩名羅曰唐有鬼詩或曰何也曰樹底有天春寂寂人間無路月茫茫唐曰隱有牡丹詩或曰何也若教解語應傾國任是無情也動人盧瓌抒情杜子美詩映階碧草自春色隔葉黃鸝空好音此正詠武侯廟而托意在其間金陵語録暝色赴春愁下得赴字好若下起字便是小兒語也無人覺來往踈懶興何長下得覺字大好足見吟詩要一字兩字工夫同前國朝浮屠以詩名于世九人故有集號九僧詩今不復傳余聞人多稱其一曰惠崇餘八人忘其名字余亦記其詩云馬降來地雕盤戰後雲又云春生桂嶺外人在海門西其佳句類此當時有進士許洞俊逸士也會諸僧分題出一𥿄約曰不得犯此一字其字乃山水風雲竹石花草雪霜星日禽鳥之類諸僧閣筆洞咸平三年進士及第無名子嘲曰張康渾褁馬許洞閙裝妻是巳九僧謂希晝寶通守恭行肇簡長尚能智仁休復惟鳳有集行於世試苑亦有詩歐公詩話唐之晚年詩人無復李杜豪放之格然亦務以精意相高如周朴者搆思尤艱每有所得必極雕琢故時人稱朴詩月煆未及成篇句巳播人口其名重當時如此今不復傳余少時見集中有云風暖鳥聲碎日高花影重又云曉來山鳥閙雨過杏花稀誠佳句也風暖鳥聲碎日高花影重杜荀鶴集有全篇嘗有云杜詩三百首妙在一聮中風暖鳥聲碎日高花影重今文忠乃以為周朴詩聖俞嘗語余曰詩家雖率意造語亦難若意新語工得前人所未道者斯為善也必能狀難寫之景如在目前含不盡之意見於言外然後為至賈島云竹籠拾山果瓦瓶擔石泉姚合云馬隨山鹿放人逐野禽棲等句是山邑荒僻官况蕭條不如縣古槐根出官清馬骨高為工余曰工者如是狀難寫之景含不盡之意何詩為然聖俞曰作者得於心覽者會以意若嚴維柳塘春水慢花塢夕陽遲則天容時態融和駘蕩豈不在目前乎又若溫飛卿雞聲茅店月人迹極橋霜賈島怪禽啼曠野落日恐行人則道路辛苦羈愁旅思豈不見於言外乎楊大年與錢劉數公唱和自西昆集出時人爭效之詩體一變而先生老輩患其多用故事至語僻難曉殊不知自是學者之弊如子儀新蟬云風來玉宇烏先覺露下金莖鶴未知雖用故事何害為佳如大年云峭帆橫渡官橋柳疊鼓驚飛海岸鷗其不用故事豈不佳乎蓋其雄文博學筆力有餘故無施不可非如前世號詩人者區區於風雪草木之類為許洞所困也退之才力無施不可以詩為文章末事其詩曰多情懷酒伴餘事作詩人然其資談笑助諧謔敘人情狀物態一寓於詩而曲盡其妙此在雄文大手固不足論而余獨愛其工於用韻蓋得韻寬則波瀾橫溢泛入旁韻合離出入回合殆不可拘以常格如此日足可惜之類是巳得韻窄則不復旁出而因見其巧愈險愈竒如病中贈張十八之類是也余嘗與聖俞論此以謂譬諸善馭良馬者通衢廣陌縱橫馳逐惟意所之至於曲水蟻封疾徐中節而不蹉跌乃天下之至工也聖俞戲曰前史言退之為人木強若寬韻可自足而輒旁出窄韻難獨用而拗反不出非強而然歟坐客笑俱同前歐陽永叔不甚愛杜詩而謂韓吏部絶倫吏部於唐世文章未嘗屈下獨於李杜稱道不巳歐陽貴韓而不恱子美所不可曉然於李白則又甚賞愛將由太白騰捍飛動易為感動也貢父詩話唐文人李習之不能為詩韓吏部集有習之兩句云前知詎灼灼此去信悠悠殊無可取鄭州嘗掘地得石刻刺史李翺戲贈詩云縣君愛磚渠繞水恣行逰鄙性樂山野掘地便成溝兩岸植芳草中間漾清流所向既不同傅監還自修從他後人見景趣誰為幽此别一李翺非習之唐書習之傳不記為鄭州王深甫編次習之詩乃收此詩皇甫湜詩亦無聞退之有讀公安詩譏其掎托糞壤間國朝尹師魯以古文自名而不能為詩吾嘗見梅聖俞云然同前許渾詩格清麗然不干教化又有李逺以賦名傷於綺靡不涉道故當時號渾詩逺賦雖然詩要于教化若似聶夷中輩又太拙直矣詩史古人文章自應律度未嘗以音韻為主自沈約增崇韻學其論文則曰欲使宫羽相變低昻殊節若前有浮聲則後須切響一篇之內音韻盡殊兩句之中輕重悉異妙逹此旨始可言文自後浮巧之語體製漸多如旁犯蹉對假對雙聲疊韻之類詩又有正格偏格類例極多故有三十四格十九圖四聲八病之類今略舉數事如徐陵云陪遊馺娑䀻􅊏腰於結長樂鴛鴦奏新聲於度曲又云厭長樂之踈鍾勞中宫之緩箭雖兩長樂義不同不為重復此為旁犯如九歌云蕙殽蒸兮蘭藉奠桂酒兮椒漿蒸蕙殽對奠桂酒今倒用之謂之蹉對如自朱耶之狼狽致赤子之流離不惟赤對朱耶對子兼狼狽流離乃獸名對鳥名又如厨人具雞黍稚子􅎥楊梅以雞對羊如此之類皆為假對如幾家村草裏吹唱隔江聞幾家村草吹唱隔江皆雙聲如月影侵簮冷江光逼屐清侵簮逼屐皆疊韻詩第二字側入謂之正格如鳯曆軒轅紀龍飛四十春之類皆第二字平入謂之偏格如四更山吐月殘夜水明樓之類唐名輩詩多用正格希首薦樂天曰二公論文在於一戰遂試長劍倚天外賦餘霞散成綺詩以凝為首祜次之曰地勢遙高嶽河流側讓關多士謂陳叔寶曰日月光天德山河壯帝居此徒有前名又祜題金山寺云樹影中流見鍾聲兩岸聞雖綦母潛云塔影挂清漢鍾聲和白雲此句未為佳祜觀獵四韻及宫詞樂天曰張三作獵詩比王右丞豫則未敢優劣王摩詰詩曰風徑角弓鳴將軍獵渭城草枯鷹眼疾雪盡馬蹄輕忽過新城戍還歸細柳營回看落鴈處十里暮雲平祜詩曰曉出禁城東分圍淺草中紅旗開向日白馬驟迎風背手抽金鏃翻身控角弓萬人齊指處一鴈落寒空白公云又謂宮詞之中皆數對何足竒也然無徐生千古長如白練飛一條界破青山色祜遂行歌而邁凝亦鼓枻而去二生終身偃蹇不隨鄉賦前此李林宗輔闕杜牧之舍人與樂天輦下較文具言元白詩體斘雜而為清苦者見嗤因茲恨之樂天為河南尹李為河南令相遇於道尹乘馬令肩輿乖趍走之禮亦曾謂樂天為囁嚅公聞者皆笑樂天名減矣尹曰李直木林宗字也吾視之猘子也其鋒不可當後牧之守秋浦與祜為詩酒之交酷吟祜宫詞亦知錢塘之試自有是非之論櫰不平之色為詩二章以髙之曰誰人得似張公子千首詩輕萬戶侯又云如何故國三千里虛唱歌詞滿六宫祜詩曰故國三千里深宫二十年一聲何滿子雙淚落君前此詩宫娥諷念思鄉起長門之悲祜復逰甘露寺觀盧肇題詩曰不謂三吳經此詩人也祜曰日月光先到山河勢盡來盧曰地從京口斷山到海門雲溪友議聖俞子美齊名於一時而二家詩體特異子美筆力豪俊以超邁橫絶為奇聖俞覃思精微以深逺間淡為意各極其長雖善論者不能優劣余谷夜行詩略道其一二云子美氣方雄萬竅號一噫有時肆顛狂醉墨灑滂濡譬如千里馬巳發不可殺盈前盡珠璣一一難㨂汰梅公事清淺石齒漱寒瀨作詩三十年視猶後我輩文詞愈清新心意雖老大有如妖嬈女老自有餘態近詩尤苦硬咀嚼苦難嘬又如食橄欖真味久愈在蘇豪以氣轢舉世徒驚駭梅窮獨我知古器今難賣語雖非工謂粗得倣佛然不能優劣之歐公詩話昔蘇子美言樂天琵琶行中云夜深忽夢少年事覺來粉淚紅闌干此聮有佳句余謂夢得武昌老人吹笛歌云如今老去語猶遲音韻髙低耳不知氣力巳無聲尚在時時一曲夢中吹不減樂天詩史梅聖俞于范希文席上賦河豚魚詩云春洲生荻芽春岸飛楊花河豚於此時貴不數魚蝦河豚出春暮逰水上食柳絮而肥南人多與荻芽為羮而食之故知者謂只破題兩句已道盡河豚好處聖俞平生苦於吟詠以間為意故其詩思極艱此詩於尊爼笑談間頃刻而成遂為絶唱東齋録司馬相如敘上林諸水曰丹水紫淵灞滻涇渭八川分流相背而異態灝溔潢東注太湖李善注太湖所謂震澤按八水皆入大河焉得東注震澤又曰樂天長恨歌云峨嵋山下少人行旌旗無光日色薄峨嵋在嘉州與幸蜀路全無交涉杜甫武侯廟柏詩云霜皮溜雨四十圍黛色參天二千尺四十圍乃徑七尺無乃太細長也防風氏身廣九畝長三丈按廣六尺九畝乃五十丈四尺如此防風之身乃一餅餤耳此文章之病也筆談晏元獻公喜為詩多稱引後進一時名士往往出其門聖俞作詩多矣公獨愛其一聮云寒魚猶著底白鷺巳飛前又絮暖鮆魚繁波添蓴菜紫余嘗見聖俞自書手簡再三稱賞此二聮余問之聖俞曰此非我之極致豈公偶自得意於其間乎歐公詩話淇州楊軒詠牡丹曰楊妃歌舞態西子巧讒魂利劍砍不斷餘妖鍾此根光華日已盛欄檻豈長存寄語尋芳者須知松柏尊羅隱曰若教解語應傾國任是無情也動人二人用意不同如此軒詩雖撚風花而有警戒雲齋廣録世傳盧綘夢女子喝菩薩蠻云眉黛逺山攢芭蕉生暮寒此詞人能道之楊大年云獨自憑闌干衣襟生暮寒未知孰是古今詩話劉長卿嘗謂前有沈宋王杜後有錢郎劉李李嘉祐郎士元焉得與余齊稱每題詩不言姓但曰長卿以海內合知之耳士林譏之宋雍𥘉無令名及瞽詩名乃彰盧綸員外作擬僧詩清江作七夕詩劉隨州有眼作無眼句宋雍無眼作有眼句流以為四背或云四倒盧綸詩曰願得逺公知姓字焚香洗鉢過餘生清江上人詩曰惟愁更漏促離別在明朝劉隨州詩曰細雨濕衣看不見間花著地聽無聲宋雍詩曰黃鳥不堪愁裏聽緑楊冝向水中看雲溪友議心事數莖白髮生涯一片青山空林有雪相待古路無人自還李王好書神仙隱遁之術非遭罹多故欲脫世網而不得者耶百斛明珠舊説陶淵明不知音畜無絃琴以寄意曰但得琴中趣何勞絃上聲東坡嘗言劉伯伶以鍤自隨曰死便埋我豫以謂伯伶非逹者棺槨衣衾不害為逹苟為不然死則已矣何必更埋至於淵明亦非忘琴者也五音六律不害為忘琴茍為不然無琴可也何獨絃乎以是知舊説之妄也淵明自云和以七絃豈得為不知音當是有琴而絃弊壞不復更張但撫弄以寄意如此為得其真自祭文出妙語於纊息之餘豈死生之流哉但恨其猶以生為寓以死為真耳嗟夫先生豈非真死得非寓乎同前詩話總龜卷之六百家詩話總龜後集卷之六諷諭門唐文宗夏日聮句東坡謂宋玉對楚王雄風􅏺其知已不知人也公權小子有美而無規為續之云一為居所移苦樂永相忘願言均此施清隂分四方或謂五弦之薰解愠阜財巳有陳善責難之意愚謂不然凡規諫之辭須切直分明乃可以感悟人主故盜言孔甘良藥苦口若以薰風自南來為陳善閉邪但恐後世導諛側媚持兩可者皆得以冒敢諫之名也䂬溪陽城德行道義為士林之所敬服德宗以銀印赤紱起于隱所驟拜諌官可謂賢且遇矣故學生聞道州之貶投業而呌閽賢士愴馹名之同摛辭而頌德可以知其賢不誣也然退之諌臣論乃極口貶之何哉其言曰今陽子實一匹夫在諫位不為不久而未嘗一言及於政視政之得失若越人之視秦人之肥瘠問其官則曰諌議也問其政則曰我不知也有道之士固如是乎考之本傳以謂他諫官論事苛細帝厭苦城漫聞得失且熟尤未肯言客屢諫之第醉以酒而不答蓋其意有所待矣至德宗逐陸贄𣣔相裴延齡而城伏蒲之説始上廷爭懇至纍日不解故元微之詩云正元歲云暮朝有曲如鈎飛章八九上皆若珠暗投且曰事不止臣諫誓不休而白樂天亦云陽城為諌議以正事其君其手如屈軼舉必指侫臣卒使不仁者不得秉國鈞柳子厚亦云抗志厲義直道是陳蓋退之諫論乃在止裴延齡為相之前而三子頌美之言乃在陽城極諫之後也丹陽集唐末有冝春人王轂以歌詩擅名嘗作玉樹曲略云璧月夜瓊樓春匣舌泠泠詞調新當時狎客盡封祿直諫犯顔無一人歌未闋晉王劍上粘腥血君臣猶在醉鄉中一面巳無陳日月此調大播人口轂未苐時嘗於市㕓中見有同人𬒳無賴輩歐擊轂前救之曰莫無禮便是解道君臣猶在醉鄉中一面巳無陳日月者無賴聞之慙謝而退蓋譏當時士大夫掩蔽人善殆此小人不若愚謂特假以自諭爾無賴所以悔過從善頓革凶暴之氣者非重其才也非重其名也蓋重其言有輔於治亂安危者也蔡寬夫云江湖多白鳥天地有青蠅人遂以白鳥為鷺而禮記月令群鳥飬羞鄭氏乃引夏小正丹鳥白鳥之説謂白鳥為蚊蚋則知以對青蠅意亦深矣不然江湖多白鷺有何説邪䂬溪子美詩草有害於人曾何生阻修芒刺在我眼焉能待時秋其憤邪嫉惡欲芟夷蕰崇之以肅清王室者抱懷可見臨川有勿去草草無惡如比世俗俗浮薄此方外之語異乎農夫之務者也黃常明子美云設網萬魚急蓋指聚斂之臣苛法侵漁使民不聊生乃萬魚急也又云能者操舟疾若風撑突波濤挺義入小人舞智趨時巧宦數遷所謂疾若風也殘民以逞不顧傾覆所謂挺義入也日暮蛟龍改窟穴山根鱸鮹隨雲雷魚不得其所龍豈能安居君與民猶是也此與六義比興何異吾徒何為縱此樂暴戾天物聖所哀此樂而能戒又有仁厚意亦如前王作網罟設法害生成不專為取魚也退之義魚曰觀樂憶吾僚異此意矣亦如蘄簟云却願天日常炎曦故後人改之云豈比法曹空自私却願天曰長炎赫黃常明唐子西上張天覺內前行云內前車馬撥不開文德殿下宣麻回紫薇侍郎拜右相中使押赴文昌臺此語善于敘事質而不俚又云周公禮樂未要作致身姚宋亦不惡向來兩翁當國年民間斗米才四錢此語善于諷諭當而有理皆可法也湖上云佳月明作哲好風聖之清栖禪歸云草青仍過雨山紫更斜陽語意俱新李陽氷云太白不讀非聖人之書恥為鄭衛之作故其言多似天仙之辭凡所著述言多諷興自三代以來風騷之後馳驅屈宋鞭撻揚馬千載獨步唯公一人故王公趨風列嶽結軌群賢翕習如鳥歸鳯盧黃門云陳拾遺橫制頽波天下質文翕然一變至今朝詩體尚有梁陳宫掖之風至公大變掃地併盡今古文集遏而不行唯公文章橫𬒳六合可謂力敵造化歟逹理門苕溪漁隱曰裴説云讀書貧裏樂搜句靜中忙此二事乃余日用者甘貧守靜自少至老飽諳此味矣許彥同詩話云羅隱詩云只知事逐眼前過不覺老從頭上來此殊有味朱氏復齋偶題詩曰出入無時是此心豈知雞大易追尋請看屏上𥘉爻旨便識名齋用意深東坡云秋菊有佳色裛露掇其英泛此忘憂物逺我遺世情一觴雖獨進杯盡壼自傾曰入群動息歸鳥趨林鳴笑傲東軒下聊後得此生靖莭以無事為得此生則見役于物者非失此生耶東坡送山夲禪師赴法雲云是身如浮雲安得限南北此二句乃老杜別贊上人詩中全語豈偶然用之邪題碧落洞詩云小語輒響答空山白雲驚此語全類李太白今印夲誤作自雷驚不惟無意味兼與上句重疊也後自嶺外歸次韻江晦叔詩云浮雲時事改孤月此心明語意髙妙如參禪悟道之人吐露胸襟無一毫窒礙也康節天津感事吟水流任急境常靜花落雖頻意自間不似世人忙裏老生來未始得開顔擊壤集先天吟先天天弟為後天奉天時弗違無時虧奉時有時疲同上身心吟身生天地後心在天地前天地自我出自餘何足言同上康莭無憂吟人生長有兩般愁愁死愁生未易休或向利中窮力取或于名上盡心求多思唯恐晚得手未老已聞先白頭我有何功居彼上其間攘臂獨無憂擊壤集百家詩話總龜後集卷之六
