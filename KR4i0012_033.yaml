front:
  text: 增修詩話總龜卷之三十三
  hash: sha256:777cd3b235a483d5b99b80c37a97e304530ced257caed1d2ea9c417340b80387
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_033-1a}
body:
  text: 紀夢門上周琬湘中人􅋈舟長沙夢二吏引入南嶽廟內升殿殿起接之曰知入京銓選欲奉辟在此亦與人世之樂不踈琬曰名宦未達且欲赴銓王曰如此則不敢奉縻也乃作詩送琬曰住此既非樂捨此去何啚若問青氊事惟留一角書至京調中牟尉忽卧病旅中且慮不起作妻子書一角封卑而卒洞微志侯復字復之世本三秦人嘗登乾陵賦詩曰勢欲傾江移泰華乾坤都在手心中幾時直欲更唐柞不奈簾前有狄公又曰太宗蹀血平寰宇何事高宗信女王當時朝端無正人天下分毫皆姓武歸寢夢一朱衣人引至大宫闕有一婦人坐殿上衣王者服侍立皆婦人知其為唐天后也問復曰前代帝可譏而陵寢可登乎復遜謝之令升殿與論當時事酌以酒再令賦詩曰堂殿無人古苑空幽花盡日度春風山鶯海燕舊時在時復飛來入故宫唐宫秦苑皆離黍常遣詩人興倍增落日牛羊歸巳盡朦朧初月上乾陵后覽詩尤異令呼杜夫人來至即謂復曰此如晦之逺孫也當時為第一色帝欲見之多稱疾其強項與爾敵令與復飲杜夫人贈復詩曰深宫鎖閉暗生塵默默那知歲月新泉室久無人氣味不知今日再逢春留數日而歸臨行復以詩别夫人曰丈夫剛鐡腸因花反柔弱男子忠義心於情安可薄几有瀲灔巵席有燕趙姬人生捨此外萬事俱不知魂魄恍逰仙自信皆偶然匆遽又分散涕淚何流漣從斯對佳景蕭索春風前今夕天角月光滿人不圓幽池雙鸂鶒日日浮清泉霜鶻長天外驚飛急似弦一落江沙上一墮古溪邉獨行寒水畔悲鴻誰見憐何時再相遇共戲復雙眠復徘徊不忍去因為執繖者擊其腦遂覺翰府名談明皇幸蜀回居南內嘗夢中見妃子于蓬山太真院作詩遺之使焚于馬嵬山下云風急雲驚雨不成覺來仙夢甚分明當時苦恨銀屏影遮隔仙姬秪聽聲又作妃子所遺羅襪銘曰羅襪羅襪香塵生不絶細細圓圓地下得瓊鈎窄窄弓弓手中弄初月又如脫履露纎圓恰似同衾見時節方知清夢事非虛暗引相思幾時歇待制王公素仲儀任御史曰嘗夢至玊京黃闕殿上有紺服翠冠者吾東門侍郎公則西門侍郎也昔以奏牘玊帝前語傷鯁訐遂責于世公夢回題詩於書窗曰似去華胥國裏來雲霞深處見樓臺月光冷射雞窗急驚覺逰仙夢一回公晚歲復思玉京之夢作詩曰虛碧中藏白玉京夢魂飛入黃金城何時再步煙霄外皓齒仙童巳掃􅈦盧綘字晉卿因病痁夢一白衣婦人令食蔗遂愈他日復夢白衣婦人曰太尉當冨貴時至可詣都下妾有一詩一緡以助行妾乃玊真也他日孟家陂相見其詩曰清風明月夜深時箕帚盧郎恨巳遲他日孟家陂上約再來相見是佳期言訖而去綘後賜死鄜延贊視行刑將至梁門綘見擁一白衣婦人來宛如前夢中所見因嗟曰玊真何至此乎延贊為問玊真姓耿氏夫死與婦之子私遂與綘同場斬首其地果孟家陂丁咸序未第時嘗夢乘龍而起回顧又有一駱駝在其後後二十年方捷科舉作詩曰嘗憶金陵應舉時壯心頻往折丹枝蹉跎二十年中夢一度思量一淚垂殿試榜出亞咸序之名者乃龍起又亞之者乃駱起方悟其夢鄭皓嘗夢中得句云石門霧露白玊殿莓苔青續成長韻此兩句老杜詩也詩史蜀人任玠字溫如晚寓寧州府宅一夕夢一山叟貽詩曰故國路遙歸去來玠和之曰春風天逺望不盡既覺自笑曰吾其死乎數日不疾而卒古今詩話金陵才士鍾輻少年氣豪一老僧見之相曰公登第則家破時樊若水愛輻之才以女妻之及燕爾應詔洛中果中甲科由是任放携一女奴青箱過華州蒲城其宰乃輻故人延留纍日一夕盛暑登縣樓痛飮而寢夢妻樊氏以詩一首示生云楚水中如鏡雙雙白鷺飛金陵幾多地一去不思歸生夢中愧謝答詩曰還吳東下過蒲城城上清風酒半醒想得到家春欲暮海棠千樹巳凋零既悟感其事因趣裝歸至采石渡青箱心痛暴卒生匆匆藁葬于新墳之側洎至家庭户閴然妻亡巳數月詢之親鄰樊亡之日乃夢于登縣樓之夕也青箱葬處乃樊之塋地爾不植他木惟海棠數株正符詩意鍾歎曰老僧之説信哉終身不仕隱于鍾山著書養氣年八十而終古今詩話臆説謂鍾輻為蘇檢青箱為小青范陽盧獻卿大中年舉進士連不中第薄逰衡湘間至郴而病夢人贈詩曰玊築郊原古青山為四鄰扶踈繞臺木寂寞獨歸人踰旬乃卒郴守為葬之近郊果以夏初入窀穸同前許渾嘗夢登山有宫室凌雲人云此崑崙山也既入見數人方飲招同飲至暮而罷賦詩曰曉入瑶臺露氣清庭中惟有許飛瓊塵心未斷俗緣在十里空山下月明他日復夢至其處飛瓊曰子何題余姓名于人間改曰天風吹下步虛聲曰善池陽崔球為太學生苦學不歸一日晝夢到其家見其妻正鴈字呼之不應與之言不答視其所書乃詩也曰數日相望極須知意思迷夢魂不怕險飛過大江西既覺歷歷記之數日書至其妻寄此詩一字不差驗其寫詩日乃球得夢之日也謝濤諌議臨捐館舍前一月夢作讀史一絶云百年竒特幾張𥿄千古英雄一窖塵唯有炳然周孔教至今仁義浸生民召其孫晏初録焉石曼卿嘗于乎陽會中代作寄尹師魯一篇曰十年一夢花空委依舊河山損桃李鴈聲北去燕南飛髙樓日日春風裏眉黛石州山對起嬌波淚落粧如洗汾河不斷天南流天色無情淡如水曼卿死後數關永言夢曼卿曰延年平生作詩多矣常以為平陽代意篇最得意而世人少稱之能令余此詩傳于世者在永言耳永言乃增其詞為曲度以迷仙引于是人爭歌之他日夢曼卿致謝焉曲云春隂霽岸柳參差裊金絲細畫閣晝眠鶯喚起煙光媚燕燕雙高引愁人如醉慵緩步眉斂金鋪倚嘉景易失懊惱韶光改花空委忍猒猒地施朱粉臨鸞鑑膩香銷減摧桃李獨自箇凝睇暮雲暗搖山翠天色無情四逺低垂淡如水離恨托征鴻寄旋嬌波暗落相思泪粧如洗向高樓日日春風裏悔憑闌芳草人千里古今詩話海州士人李慎言嘗言夢至一處水殿宫觀女戲毬山陽蔡繩作傅敘其事甚詳有拋毬詞十餘首言皆清麗今但記其兩篇云侍燕黃昏晚未休玊階夜色月如流朝來自覺承恩醉笑倩傍人認繡毬堪恨家幾帝王舞禋揉盡繡鴛鴦如今重到拋毬處不是金爐舊日香胥偃內相應舉時夢徐將軍歃下頭項作詩云昔作樹頭花今為塜下骨明年徐奭榜下第二人及第南部新書僕在黃州參寥自武陵來訪館之東坡一日夢參寥誦作新詩覺而記兩句云寒食清明都過了石泉槐火一時新後七年出守錢塘而參寥始卜居湖上智果院院有泉出石縫間其冷冝作茶寒食之明日僕與客泛舟自孤山來謁參寥汲泉鑽火烹黃檗茶忽悟所夢詩兆于七年之前衆客驚嘆知傳記所載蓋不妄也東坡詩話僕泊船吳江夢仲殊彈一琴十三絃頗損而有異聲余問云琴何為十三絃殊不答但誦云度數形名不偶然破琴今有十三絃此生若見邢和璞方信秦筝是響泉夢中了然諭其意覺而識之至晚到蘇殊當來見即以示之寫至此筆未絶殊老叩船耒見驚歎不巳遂以贈之去州五里王平甫熙寧癸丑歲直宿崇文院夢人邀至海上見宫殿甚盛其中作樂簫鼓之伎甚衆其宫曰靈芝邀平甫俱往有人在宫側隔山水曰時未至且令去他時迎之恍然夢覺時禁中巳鳴鍾平甫頗自負非凡為詩記之曰萬頃波濤木葉飛笙簫宫殿號靈芝揮毫不似人間世長樂鍾聲夢覺時後四年平甫卒其家哭訊之嘗夢靈芝宫其信然乎當兆告我是夕暮奠若有聲音接人其家復卜之果獲兆昔有人至海上蓬萊見樓臺中有待樂天之室樂天自為詩以紀其事與平甫之夢實相似蓋二人皆天才逸發則其精神所寓必有異者物理蓋有之而不可窮也紀詩王仲簡潭州人少修進士業未諧隨計性寬厚敦孝弟周顯德中攝長沙縣丞纍任甚能為理與潭州通判耿振相善太平興國二年忽染患而亡兄仲偉夜夢莊客持書一封云評事差送來偉便開其書乃詩一章題云贈耿郎中曰得接英賢喜可知人生能得幾多時自從别後顔容改恰似庭前雨淚碑仲偉夢覺而記分明衆歎訝振不十年而終郡閣雅談沈彬字子美高安人為詩天才狂逸下筆成章好神仙之事少孤西逰以三舉為約嘗夢著錦綵衣貼月而飛識者言雖名播天下身不入月終不及第洪州解至長安初舉行納省卷作夢仙謡云玊殿大開從客入金桃爛熟沒人偷鳯驚寶扇頻翻翅龍悮金鞭忽轉頭第二舉憶仙謡云白榆風占九天秋王母朝回宴玊樓日月漸長雙鳯睡桑田欲變六鰲愁雲翻簫管相隨去星觸旌幢各自流詩酒近來狂不得騎龍却憶上清逰第三舉贈劉象一首云曾應大中天子舉四朝風月鬢蕭踈不隨世祖重携劍知為文皇再讀書十載戰塵消舊業滿城風雨壞貧居一枝何事于君惜仙桂年年幸有餘劉象三舉無成孤寒主司覽彬詩其年放象及第五老榜即其數也彬乾符中值四方多事遂南逰湖湘及嶺表二十餘年却回吳中過江南受偽命官至吏部侍郎致仕退居高安雅言雜載杜牧之頻干時宰求小儀不遂求小秩又不遂嘗夢人謂曰辭春不及秋昆腳與皆頭后果得比部員外郎脞説中書舍人崔嘏娶李續女為曹州刺史令周邵南勾當障車後邵南因睡忽夢在廳中女立床西嘏立床東女持紅箋題詩一首笑投嘏因高吟之云莫以真留妾從他理管絃容華難久住知得幾多年一歲而嘏妻卒余自蜀中應舉京師道過華清官夢明皇令賦太真裙帶詞覺而記之今書贈柯山潘大臨邠老云百疊漪漪水皺六銖縱縱雲輕植立含風廣殿微聞環珮搖聲元豐八年正月旦日子由夢李士寧草草為具夢中贈一絶句云先生惠然肯見客旋買雞豚旋烹炙人間飲酒未須嫌歸去蓬萊却無吃明年二月六日為豫道之書以遺遲云增修詩話總龜卷之三十三百家詩話總龜後集卷之三十三樂府門政和元年尚書蔡嶷為知舉尤嚴挾書是時有街市詞曰侍香金童方盛行舉人因以其詞只改十五字作懷挾詞云喜葉葉地手把懷兒摸甚恰限出題厮撞著內臣過得不住腳忙裏只是看班駮這一身冷汗都如雲霧薄比似年時頭勢惡待檢又還猛相度只恐根底有人撏著上庠録蘇子瞻守錢塘有官妓秀蘭夫性黠慧善于應對湖中有宴會群妓畢至惟秀蘭不來遣人督之須臾方至子瞻問其故具以髮結沐浴不覺困睡忽有人叩門聲急起而問之乃樂營將催督也非敢怠忽謹以實告子瞻亦恕之坐中倅車屬意于蘭見其晚來恚恨未巳責之曰必有他事以此晚至秀蘭力辨不能止倅之怒是時榴花盛開秀蘭以一枝藉手告倅其怒愈甚秀蘭收泪無言子瞻作賀新涼以解之其怒始息其詞曰乳燕飛華屋悄無人桐隂轉午晚涼新浴手弄生綃白團扇扇手一時似玉漸困倚孤眠清熟門外誰來推繡戶枉教人夢斷瑶臺曲又却是風𫾣竹石榴半吐紅巾蹙待浮花浪蕊都盡伴君幽獨濃艷一枝細看取芳心千里重似束又恐𬒳西風驚緑若待得君來向此花前對酒不忍觸共粉泪雨蔌蔌子瞻之作皆紀目前事蓋取其沐浴新涼曲名賀新涼也後人不知之誤為賀新郎蓋不得子瞻之意也子瞻真所謂風流太守也豈可與俗吏同日語哉苕溪漁隱曰野哉楊湜之言真可入笑林東坡此詞冠絶古今託意高逺寧為一娼而發耶簾外誰來推繡戶枉教人夢斷瑶臺曲又却是風𫾣竹用古詩捲簾風動竹疑是故人來之意今乃云忽有人叩門聲急起而問之乃樂營將催督此可笑者一也石榴半吐紅巾蹙待浮花浪蕊都盡伴君幽獨濃艷一枝細看取芳心千里重似束蓋𥘉夏之時千花事退惟榴花獨芳因以寫幽閨之情今乃云是時榴花盛開秀蘭以一枝藉手告倅其怒愈甚此可笑者二也此詞空調寄賀新郎乃古曲名也今乃云取其沐浴新涼曲名賀新涼後人不知之誤為賀新郎此可笑者三也詞話中可笑者甚衆姑舉其尤者苐東坡此詞深為不幸橫遭點汚吾不可無言一雪其恥宋子京云江左有文拙而好刻石者謂之詅嗤符今楊湜之言俚甚而鋟板行世殆類是也古今詩話張仲宗有漁家傲一詞云釣笠披雲青嶂繞緑蓑雨細春江渺白鳥飛來風滿棹收綸了漁童拍手樵青笑明月太虛同一照浮家泛宅忘昏曉醉眼冷看城市閙煙波老誰能認得間煩惱余往歲在錢唐與仲宗從遊甚久仲宗手寫此詞相示云舊所作也其詞苐二句元是橛頭細雨春江渺余謂仲宗曰橛頭雖是船名今以雨襯之語晦而病因為改作緑蓑細雨仲宗笑以為然苕溪漁隱鄒志全徙昭陳瑩中貶廉間以長短句相諧樂有箇胡兒摸樣別滿頷髭鬚生得渾如添見説近來頭也白髭鬚那得長長黑志句籋子摘來須有千堆雪莫向細君容易説恐他嫌你將伊􅎥此塋中語謂志全之長髭也有箇頭陀修苦行頭上頭髮毶毶身披一副黲裙衫緊纒雙腳苦苦要逰南聞説度牒朝夕到并除頷下髭髯鉢中無粥住無菴摩登伽處只恐却重參此志全語謂塋中之多欲也廣陵馬推官往來二公間亦嘗以詩詞贈之有才何事老青衫十載低回北斗柄肯伴雪髯千日醉此心真與古人參不見故人今幾年年來風物尚依然遙知間望登臨處極目登臨萬里天志全語也一尊薄酒滿酌勸君君舉手不是親朋誰肯相從寂寞濵人生似夢夢裏惺惺何處盞到休辭醉後全勝未醉時塋中語也初志全自元符間貶新州徽宗即位以中書舍人召未幾謫零陵别駕龍水安置未幾徙昭焉同上東坡云龍丘子自洛之蜀載二女侍戎裝駿馬至溪山佳處輒駐終日見者以為異人後十年築室黃岡之北號靜庵居士作臨江仙贈之云細馬逺馱雙侍女青巾玉帶紅靴溪山好處便為家誰知巴峽路却見洛城花回旋落英飛玉蕊人間春日初斜十年不見紫雲車龍丘新洞府鉛鼎飬丹砂龍丘子即陳季常也秦太虛寄之以詩亦云侍童雙擢玉鬟髮光可照駿馬錦障泥相隨窮海嶠暮年更折莭學佛得心要鬻馬放阿樊幅巾對沉燎西清詩話云季常自以為飽禪學而妻栁頗悍忌季常畏之故東坡因詩戲之有忽聞河東獅子吼柱杖落手心茫然之句觀此則知季常載二侍女以逺逰及暮年甘于枯寂蓋有所制而然亦可憫笑也同上古今詞話以古人好詞世所共知者易甲為乙稱其所作仍隨其詞牽合為説殊無根葉皆不足信也如秦少遊千秋歲水邉沙外城郭春寒退末云春去也飛紅萬點愁如海者山谷嘗歎其句意之善欲和之而以海字難押陳無巳言此詞用李後主問君都有幾多愁恰似一江春水向東流但以江為海耳洪覺範嘗和此詞題崔徽真子云多少事都隨恨逺連雲海朝無咎亦和此詞吊少遊云重感槩驚濤自捲珠沉海觀諸公所云則此詞少遊作明甚乃以為任世德作又八六子倚危亭恨如芳草萋萋剗盡還生者浣溪沙腳上鞋兒四寸羅者二詞皆見淮海集乃以八六子為賀方回作以浣溪沙為涪翁作朝無咎鹽角兒開時似雪謝時似雪花中竒絶者為朝次膺作汪彥章點絳唇新月姢姢夜寒江靜山銜斗者為蘇叔黨作皆非也同上唐𥘉歌詞多是五言或七言詩𥘉無長短句自中葉以後至五代漸變成長短句及本朝則盡為此體今所存者止瑞鷓鴣小秦王二闋是七言八句詩并七言絶句詩而已瑞鷓鴣尤依字易歌若小秦王必須雜以虛聲乃可歌耳其詞云碧山影裏小紅旗儂是江南踏浪兒拍手欲嘲山簡醉齊聲爭唱浪婆詞西興渡口帆初落漁浦山頭日未欹儂送潮回歌底曲樽前還唱使君詩此瑞鷓鴣也濟南春好雪初晴行到龍山馬足輕使君莫忘霅溪女時作陽關腸斷聲此小秦王也皆東坡所作同上東坡別參長短句云有情風萬里捲潮來無情送潮歸問錢塘江上西興浦口幾度斜暉不用思量今古俯仰昔人非誰似東坡老白首忘機記取西湖西畔正暮山好處空翠煙霏算詩人相得如我與君希約他年東還海道願謝公雅志莫相違西州路不應回首為我沾衣晉書謝安雖受朝寄然東山之志始末不渝每形于言色及鎮新城盡室而行造泛海之裝𣣔須經略粗定自海道還東雅志未就遂遇疾篤還都尋薨羊曇為安所愛重安薨後輟樂彌年行不由西州路嘗因大醉不覺至州門左右曰曰此西州門曇悲感以馬䇿扣扉誦曹子建詩曰生存華屋處零落歸山丘因慟哭而去東坡用此故事若世俗之論必以為成讖矣然其詞石刻後東坡自題云元祐六年三月六日余以東坡先生年譜之考元祐四年知杭州六年召為翰林學士承旨則長短句蓋此時作也自後復守頴徙揚入長禮曹出帥定武至紹聖元年方南遷嶺表建中靖國元年北歸至常乃薨凡十一載則世俗成讖之論安可信邪同上錢思公謫漢東日撰玉樓春詞曰城上風光鶯語亂城下煙波春拍岸緑楊芳草幾時休泪眼愁腸先巳斷情懷漸變成衰晚鵉鏡朱顔驚暗換往年多病厭芳樽今日芳樽惟恐淺每酒闌歌之則泣下後閣有白髮姫乃鄧王歌鬟驚鴻也遽言先王將薨預戒挽鐸中歌木蘭花引紼為送今相公亦將亡乎果薨于隨州鄧王舊曲亦嘗有帝鄉煙雨鎖春愁故國山川空泪眼之句侍兒小名録曹元寵本善作詞特以紅窗逈戲詞盛行于世遂掩其名如望月婆羅門一詞亦豈不佳詞云漲雲暮捲漏聲不到小簾櫳銀河淡掃澄空皓月當軒高挂秋入廣寒宫正金波不動桂影朦朧佳人未逄歎此夕與誰同望逺傷懷對景霜滿愁紅南樓何處想人在長笛一聲中凝泪眼立盡西風此詞語病在霜滿愁紅之句時太早耳曽端伯編雅詞乃以此詞為楊如晦作非也苕溪漁隱凡作詩詞要當如常山之蛇救首救尾不可偏也如朝無咎作中秋洞仙歌詞其首云青煙幕處碧海飛金鏡永夜間階卧桂影固巳佳矣其後云待都將許多明付與金樽投曉共流霞傾盡更携取胡床上南樓看玉做人間素秋千頃若此可謂善救首尾者也至朱希真作中秋念奴嬌詞則不知出此其首云插天翠栁𬒳何人推上一輪明月照我滕床涼似水飛入瑶池銀闕亦巳佳矣其後云洗盡凡心滿身清露冷浸蕭蕭明朝塵世記取休與人説此兩句全無意味收什得不佳遂棄全萹其氣索然矣同上中秋詞自東坡水調歌頭一出餘詞盡廢然其後亦豈無佳詞如朝次膺緑頭鴨一詞殊清婉但樽爼間歌喉以其萹長憚唱故湮沒無聞焉其詞云曉雲收淡天一片琉璃爛銀􅐻來從海底皓色千里澄輝瑩無塵素娥淡濘淨可數丹桂參差玉露𥘉零金風未凛一年無似此佳時向坐久踈星時度烏鵲正南飛瑶臺冷攔干憑暖𣣔下遲遲念佳人音塵隔後對此應解相思最關情漏聲正永暗斷腸花影潛移料得來宵清光未減隂晴天氣又爭知共凝戀如今别後還是隔年期人縱健清樽素月長願相隨同上東坡在黃州中秋夜對月獨酌作西江月詞曰世事一場大夢人生幾度秋涼夜來風葉巳鳴廊看取眉頭鬢上酒賤常愁客少月明多𬒳雲妨中秋誰與共孤光把盞凄然北望坡以讒言謫居黃州鬱鬱不得志凡賦詩綴詞必寫其所懷然一日不負朝廷其懷君之心末句可見矣苕溪漁隱曰聚蘭集載此詞注云寄子由故後句云中秋誰與共孤光把酒凄然北望則兄弟之情見于句意之間矣疑是倅錢塘時作子由時為睢陽幕客若詞話所云則非也古今詩話百家詩話總龜後集卷之三十三
