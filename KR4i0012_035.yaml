front:
  text: 増修詩話總龜卷之三十五
  hash: sha256:67af1a515477eebe3f29a16c6f733ac30fcb6282ecb4eab47dadb9497abd6e26
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_035-1a}
body:
  text: 譏誚門上陳彭年大中祥符中與晁文荘内翰等四人同知貢舉省試将出奏試卷舉人壅衢觀其岀省諸公皆慘赧其容獨彭年揚鞭肆意有驕矜之色榜出有甥不預選怒入其第㑹彭年未來於几上得黄勅乃題其背曰彭年頭恼太冬烘眼似朱砂鬂似蓬紕繆幸叨三字内荒唐仍在四人中取他權势欺明主落却親情賣至公千百孤寒齊下淚斯言無路達堯聦彭年怒抱其勅入奏章聖見而不悅然釋其罪江南野録唐太宗燕近臣長孫無忌嘲歐陽詢更曰聳膞成山字埋肩畏出頭誰言麟閣上畫此一彌猴詢應聲曰縮頭連背聳漫襠畏肚寒只縁心渾渾所以面團團太宗改容曰詢豈不畏皇后聞邪無忌長孫后之弟也小說舊聞唐相張延賞選壻無可意者其妻苗氏賢而知人特選進士韋臯許之皐性踈曠不拘細行延賞竊悔由是婢㒒頗輕慢惟苗氏待之益厚臯因辭東逰張氏罄奩具以治行延賞幸其去以七䭾物為贐皐行翌日悉還之惟晋奩物及書册而已後五年臯擁節旄㑹徳宗幸奉天持節西川替延賞乃改姓名作韓翺人莫敢言至大囬驛去府三十里人有報延賞曰替相公者韋皐也非韓翶苗氏曰若韋皐必韋郎也延賞曰天下姓名同者甚衆彼韋生必填溝壑豈能乗吾位乎次日果韋臯也延賞慚惧自西門潜遁皐入見苗禮奉過布衣之日求前輕慢者皆杖死之時泗濵郭圍因為詩曰宣父從周又入秦昔賢誰不困風塵當時甚訝張延賞不識韋臯是貴人唐宋遺史彭齊吉州人才辯滑稽嘗謁南豐宰而不禮之一夕虎入縣􅈦噬所飬羊棄殘而去宰即以㑹客齊預焉翌日獻詩於宰曰昨夜黄班入縣齋分明踪跡印蒼苔㡬多道徳驅難去些子猪羊引便來令尹聲聲言有過録公吕道無灾思量也觧開東閤晋得頭蹄待秀才覧者絶倒青箱雜記景徳𥘉河朔舉人張存任弁皆以防城得官有無名子嘲曰張存觧放旋風砲任弁能燒猛火油丘濬寺丞失意徧逰諸郡至山陽郡守屢召之夜飲翌日作詩曰醜却天下羙人面正得世間君子心郡将它日再為文字飲以謝之至宜真太守召㸔牡丹作詩曰何事化工情愈重偏教此卉大妖姸王孫𣣔種無餘地顔巷安貧欠買錢曉檻競開香世界夜欄誰結醉因縁湏知村落桒耘處田叟饑耕婦不眠又至五羊贈太守詩曰碧睛蠻婢頭蒙布黒面胡児耳帶環㡬處樓䑓皆枕水四周城郭半圍山又詩曰堦上腥臊堆蜆子口中濃血吐檳榔又詩曰風腥蠻市合日上瘴雲紅太守見之大不懌翰府名談天聖中修國史王安簡謝陽夏李邯郸黄唐卿為編修官安簡神情冲淡唐卿刻意篇什謝李嘗戯為句豐皃閑如鶴黄吟苦似猿春明退朝録唐旣平劉展江淮之亂上元間租庸使元載以呉越雖兵荒後民産尤給乃辟召豪吏分宰列邑而重歛之時人謂之白着言其役歛無名其所着者皆公然明白無所嫌避一云世人謂酒酣爲白着旣爲刻薄之役不堪其弊則必㒹沛酩酊如醉者之着也渤海髙亭有詩曰上元官吏稱剥削江淮之人皆白着唐景龍中洛下霖雨百餘日宰相不能調隂陽乃閉坊市北門卒無効􅗈溢至甚人歌曰禮賢不觧開東閤爕理惟能閉北門朝野僉載孫魴沈彬李建勲好爲詩什魴有夜坐詩爲時所稱建勲因匿于齋中待彬至乃問彬云魴之詩何如彬曰田舍翁火爐頭之語何足道也魴聞而出誚彬曰何誹謗之甚而比田舎翁無乃過乎彬曰子夜坐句劃多灰漸冷坐乆席成痕此非田舎翁爐上作而何闔坐大笑乃題金山寺云萬古波心寺金山名日新天多剰得月土少不生塵過櫓妨僧艇歸濤濺佛身誰言張處士題後更無人莫不服其騐雅江南野録朝元龜廬陵人嘗謁邑宰見超伏生獷𣣔窮以詞學因新畫屏為戯珠龍乃曰請子咏之元龜應聲而成因諷宰受賂云翻身騰白浪探爪攫胡珠毛抦聚生徒於廬山白鹿洞與諸生講論所獲貲鏹皆以市酒洞有辨者嘲云彭生作賦茶三片毛氏傳詩酒半升嘗自題於齋壁云先生不在此千載只空山因大醉一夕而逝劉炎少負詞學晚為永新尉拙於政治遂有貪名太守行邑覬覦之意而炎不悟旣行以詩諷炎云未到桃源時長憶出家景及到桃源了還似鑑中影炎乃和而復之后因民訴受賄遂按以法炎復有詩云早知太守如狼虎獵取膏梁以㗖之羅隱性傲聣𥘉赴舉過鍾陵見营妓雲英一紀後下第又過復見之雲英曰羅秀才尚未脫白隱以詩嘲之曰鍾陵醉别十餘春重見雲英掌上身我未成名英未嫁可能俱是不如人隱與頋雲同謁淮南相國高駢雲為人雅律髙公遂㽞雲而逺隱隱𣣔歸武陵與賔幕酌餞於雲亭盛暑青蠅入坐髙公命扇驅之謔隱曰青蠅𬒳扇扇離席隱聲曰白澤遭釘釘在門偶見白澤圖釘在門扇乃譏雲也時髙公𣣔継淮南王求仙方為妖亂後為畢将軍所害隱作妖亂誌以譏之故有題延和閣云延和髙閣勢凌雲輕語猶疑太一聞燒盡降香無一事開門迎得畢将軍僖宗在蜀隱作詩數首以刺諸侯及還梁為朝貴所疾乃謁錢武粛焉獻僖宗在蜀詩曰白丁攘臂犯長安翠輦倉皇路屈蟠丹鳯有情雲外逺玊龍無跡渡頭寒静思貴族謀身易危惜文皇創業難不将不侯何計是釣魚船上涙闌干又作僖宗還京曰馬嵬楊柳尚依依又見銮輿幸蜀歸泉下阿蛮應有語這囬休更怨楊妃鑑戒録郡闍雅談謂青蠅白澤對句是㓂弱謝觀作蘇子羙監進奏院因賽神召舘中同舎是時江南人李中舎因梅聖俞謁子羙且願預此㑹聖俞以為言子羙曰食中不設蒸饅餅夾坐上安有國舎虞䑓李啣之遂暴其事於言語為劉元瑜所弹子羙坐謫故聖俞有客至詩云有客十人至共食一䁀珍一客不得食覆䁀傷衆賔盖指李也詩史來鵠洪州人咸平中名振都下然喜以詩譏訕當路為人所惡卒不第金錢花云青帝若教花裏用牡丹應是得錢人夏雲云無限旱苗枯𣣔盡悠悠閑處作竒峰偶題云可惜青天好雷電只能驅趂懶蛟龍詩史唐湖州參軍陸䝉妻蔣氏善属文然嗜酒姊妹勸節酒強飡蔣應聲曰平生偏好飮劳爾勸吾飡但得尊中滿時光度不難憎知業有詩名與蒙善一日訪蒙談玄蔣使婢奉酒知業云受戒不飲蔣隔簾謂曰上人詩云接岸橋通何處路倚樓人是阿誰家觀此風韵得不飲乎知業慚而退濠州西有髙唐舘俯近淮水御史閆欽授宿此舘題詩曰借問㐮王安在㦲山川此地勝陽䑓今朝寓宿高唐舘神女何曽入夣來有李和風者至此又作詩曰高唐不是這高唐淮上江南各異方若向此中求薦枕參差笑殺楚㐮王丁晋公爲玊清昭應宫使夏英公爲判官一日賜宴齋宫優人有雜手藏㩎者晋公顧英公曰古人無詠藏㩎詩請賦一章英公爲一絶云舞拂挑珠復吐丸遮藏巧使百千般主公端坐無由見却𬒳傍人冷眼看楊孺尚書以耳聾致仕居雩縣别業同里高氏貲厚有二子小字大馬小馬一日里中社飲小馬携酒一榼就楊公曰此社酒善治聾願持盃酌之無瀝楊書絶句與之云数十年來雙耳瞶可将社酒使能醫一心更願青盲子免見高家小馬児倦斿録景祐𥘉詔先朝免觧人候将來特與推恩有無名子改王元之升平詞以嘲曰舊人相見問行年便說真宗更以前但看緑𫀆包褁了這回冷笑入黄泉永叔在政府将引去以詩寄潁州常夷甫曰笑殺汝陽常䖏士十年騎馬聽朝雞致政歸潁又贈之詩曰頼有東鄰常䖏士披簑戴笠伴春鋤明年夷甫起授侍講判國子監有無名子改前詩作夷甫寄永叔曰笑殺汝隂歐少保新來䖏士聽朝鷄又云昔日頴隂常䖏士却來馬上听朝雞吏流仕不得志好持人長短世以㓙人目之亦終以此敗嘗過江州琵琶亭題詩云坐上騒人雖有咏江邊寡婦不難欺若使王涯聞此曲織羅應過賞花時並同前邵安石連州人髙湘侍郎南迁歸朝途經連江安石以所業投之遂見知同至輦下湘知貢舉安石㩴第詩人章碣賦東都望幸詩刺之曰懶修珠玊上高䑓眉目連姢幸不開縱使東巡也無益君王自帶羙人來古今詩話泗州僧伽塔人多云其下真身也塔後有閣記興國中𥘉塑事甚詳退之詩云火燒水轉掃地空則真身之焚乆矣塔本般匠所建俗言塔頂為天門蘇國老有詩云上到天門最髙處不能容物只容身盖譏在位者孫皓為晋所㓕封歸命侯武帝問皓曰聞南人好作爾汝詩爾頗能否皓𬒳酒舉觴曰昔與汝為鄰今與汝為臣勸汝一盃酒令汝壽萬春帝悔之呉武陵有文而好訐嘗以贜敗廣州吏治殊不假貸題詩路左壁曰雀児來徃颺風髙下視莺鸇意氣豪自謂能生千里翼黄昏依舊入蓬蒿唐王鐸楊收皆薛逢同年收作相逢有詩曰湏知金印朝天客同是沙堤避路人威鳯遇時皆瑞聖應龍無水謾通神收聞之怒王鐸作相逢又有詩曰昨日鴻毛萬鈞重今朝山岳一毫輕鐸又怒羅隱與桐廬章魯風齊名錢武肅崛起以魯風善筆札召為表奏孔目官魯風不就執之後以羅隱為錢塘令惧而受命因宴獻詩云一箇禰衡容不得思量黄祖謾英雄自是始厚之馮􅌡王鎮南陽郡中宣聖廟壊有酒戸十餘軰投状乞修瀛王未及判有幕客題四句状後云槐影參差覆杏壇儒門子弟盡髙官却教酒戸重修廟覺我慚惶也不難瀛王遽罷其請岀巳俸重修孫僅給事鎮永興日多作詩時玉清昭應宫𥘉成孫作驪山詩云秦帝墓成陳勝起明皇宫就禄山來有人傳于京師以為譏時政顔標咸通中鄭薰下状元及第先是徐冦作叛薫𣣔激勸勳烈意標乃魯公之後故置之危科旣而詢其廟院標曰寒素京國無廟院薰始大悟有無名子嘲曰主司頭腦太冬烘錯認顔標作魯公光啓中蔣嶓以丹砂授韋中令呉人張鵠有文而貧或嘲之曰張鵠只消千䭾絹蔣嶓惟用一丸丹並同前增修詩話總龜卷之三十五百家詩話総龜後集卷之三十五傷悼門復齋漫録云農桒不優歳常登邊將無㓛吏不能四十二年如夣覺東風吹泪過昭陵此詩題扵寢宮不著名氏冝表而出之許彦周詩話云楊舜韶名友䕫長㒒十餘歳向同在姑蘇時盗發孫堅墓楊作詩云闔廬城邊荒古丘昔誰塟者孫豫州乆無行客為下馬時有牧童来放牛嗚呼舜韶今亡矣他詩皆工必傳扵世也雪浪齋日記云弔辯才詩云滄海盡頭人㓕度亂峯深處塔孤貟憶登夜閣天連鴈同㸔秋崖月上烟劉僴云天連鴈前人有古戍天連鴈之句張南軒挽劉觀文詩憶昨登廊廟忠言逹帝聦听思惟盡瘁敢復計成㓛半世江湖上千憂寤寐中汗青誰秉筆請放衆言公一國恥臣當死公家三世心忍㸔誰絶筆誰續㫁弦音精爽今如在衣冠恨更深却嗟蜍與志處世漫侵㝷二平日多奇莭中間似冨公天從庐墓請人說捄荒㓛辛苦培邦本雍容遏乱鋒人傳遺奏切更過子囊忠三曽是南荆地他年竹馬迎旌旂嚴騎士弧矢盛民兵細放規摹舊還知莭制明思公如峴首同我泪縦横四南軒挽王詹事詞大莭元無玷中心本不欺排奸力扛䁀憂國鬂成絲方喜三旌召俄興一鑑悲西風吹泪眼夫豈哭吾私一睿主能飛曰如公舊學臣忠言関國計清莭映廷紳歳月身多外江湖澤在民當年遺直歎千古更如新二東莱挽王詹事諸老收聲盡佳城又到公蒼天不可問吾道竟成窮旌捲莆田雨簫横霅浦風今年襟上泪三哭萬夫雄一太史交㫋際元戎卷甲秋先鳴驚衆寐孤憤厭羣咻羽翼新鴻鵠聲華舊斗牛断橋無恙不落月照寒㳅二東萊挽汪端明異時憂世士歎息恨才難毎見公身健猶令我意寛彫零竟何極合復豈無端此理終難觧天風大隧寒一四海膺門峻親承二紀中論交由父祖受學自児童山岳千㝷上江湖萬折東徽言蔵肺腑欲吐與誰同二王龜齡悼張安國舎人天上張才子少年觀囯光高名一枝桂遺爱六州棠出世纔成佛修文遽作郎長沙屈賈誼宣室竟凄凉王龜齡挽趙氏詩全莭忠臣配崇寕宰相家哀能変國俗實不御鈆華學佛穷三昧然松教五車遺芳載彤𬋩名夀两俱遐東萊挽魏國録麻衣見天子拜䟽不知休落落山林氣拳拳畎畆憂極知千載遇政用一身酧繞舎閩溪水朝宗日夜流羣公祖踈傳多士送陽城短掉非前約長亭及此行深晋移白日語只蒼生㑹綺山陽賦鄰人笛未横東萊挩簫祭酒摩揣誠斯薄雕鎸質亦消平生但真撲直上絶枝條氛霧終澄霽丘山亦動摇陽舊時鳯声入舞簫韶王龜齡悼亡燕寢焚香老病身細君相對坐如賔而今一榻維摩室唯與無言法喜親一偕老相期未及朞囘頭人事巳成非逄春尚擬風光轉過眼忽驚花片飛二文昌雜録云梁均帝晋天福中始塟故妃張氏獨存考㓛貟外商鵬爲誌文曰七月有期不見望陵之妾九疑無色空餘泣竹之妃後唐武皇師還渭北不獲入覲幕客李襲告作違離表云穴禽有翼听舜樂以猶来天路無梯望尭雲而不到五代之季工翰墨者無以過此也許彦周詩話云外祖父邵安蕳公布衣時上平元吳䇿又嘗勸仁廟早立太子晚年自樞府出知越州又移知鄆州其薨也岐公作挽詞云披褐曽陳㝎羌䇿汗青猶著立修書春風澤國吟牋落夜雨溪堂燕豆踈前軰詩不獨語言精錬且是着題冷齋夜話云余問山谷今之詩人誰為冠曰無出陳無巳其佳句可得聞乎曰吾見其作温公挽辭一聮便知其才不可敵曰政雖随日化身巳要人扶王直方詩話云邢居實字惇夫年少豪邁所與㳺皆一時名士方年十四五時嘗作明妃引末云安得壮士霍嫖姚縳取呼韓作編戸諸公多稱之旣卒余收什其殘艸編成一集號曰呻吟惇夫自少便多憔悴感慨之意其作秋懐詩云高歌感人心心悲将柰何其作棗陽道中詩云有意問山神此生復來否巳而果卒扵漢東惇夫之卒也山谷以詩哭之云詩到随州更老成江山爲助筆縦横眼㸔白璧埋黄壤何况人間父子情盖謂惇夫與其子歆何也蔡天啓亦有詩云人物扵今歎眇然孤墳宿艸巳生烟曰暮行人道旁舎應逄年少共談玄其餘作者甚衆皆載扵呻吟集後寓情門古今詩話云牧之爲御史分司洛陽時李司徒罷鎮閑居聲妓爲當時苐一一日開筵朝士臻赴以杜嘗持憲不敢邀飲杜諷坐客逹意願預斯㑹李馳書杜聞􅒛遽來㑹中女妓百余皆絶色殊藝杜獨坐南行瞪目注視滿引三巵問李曰聞有紫雲者孰是李指示之杜凝睇良乆曰名不虚得宜以見恵李俯首而笑諸妓亦皆回首破顔杜又自引三爵朗吟而起曰華堂今日綺筵開誰喚分司御史來忽發狂言驚滿座两行紅粉一時囬意氣閑逸旁若無人苕溪漁隠曰東坡聞李公擇餘飲傳國傳家大醉有詩云不肯醒醒騎馬囘玉山知爲玉人頽紫雲有語君知否莫喚分司御史來即此事也又侍児小名録云兵部李尚樂妓崔紫雲詞華清峭眉目端䴡李公為尹東洛宴客将酣杜公輕騎而來連飲三觥謂主人曰嘗聞有能萹詠紫雲者今日方知名不虚得倘垂一意無以加焉諸妓囘頭掩笑杜作前詩罷上馬而去李公㝷以紫委送贈之紫雲臨行獻詩曰從來學製斐然詩不料霜臺御史知愁見便教随命去恋㤙腸断出門時侍児小名録不載此事出於何書疑好事者附㑹為之也東坡續䴡人行李仲謀家有周昉畫背面欠伸内人極精戯作此詩云深宫無人春晝長沉香亭北百花香羙人睡起薄梳洗燕舞鶯啼空断腸畫工𣣔畫無穷意背立春風初破睡若教囬首更嫣然陽城下蔡俱風靡子蒼用此意題伯時所畫宮女云睡起昭陽暗淡粧不知縁底背斜陽若教轉一囬首三十六宫無粉粧終不及坡之偉䴡也藝苑雌黄云朝雲者東坡侍妾也嘗令就秦少㳺乞詞少㳺作南歌子贈之云靄靄迷春態溶溶媚暁光不應容易下巫陽秪恐翰林前世是㐮王暫為清歌駐還因暮雨忙瞥然㱕去断人腸空使蘭䑓公子賦高唐王直方詩話云無巳嘗作小放歌行两萹其一云春風永巷閉娉婷長使青樓悞得名不惜捲簾通一顧怕君着眼未分明其二云當年不嫁惜娉婷傅白施朱作後生說與旁人湏早計随冝梳洗莫傾城山谷云無巳他日詩語極高古至扵此萹則顧影徘徊衒耀太甚逰宴門蔡寛夫詩話云文忠與趙康靖公槩同在政府相得歡甚康靖先告老歸睢陽文忠相繼謝事歸汝隂康靖一日单騎車特徃過之時年巳八十矣㽞劇飲踰月日扵汝隂縦逰而後返前軰挂冠後能從容自適未有若此者文忠賦詩云古來交道愧難終此㑹今時豈易逄出處三朝俱白首凋零萬木見青松公能不逺來千里我病尤堪釂一鍾巳勝山隂空興盡且晋㱕駕為從容因榜其㳺從之地為㑹老堂明年文忠𣣔徃睢陽報之未果而薨两公名莭固師表天下而風流襟度又如此誠可以激薄俗也人間佳莭惟寒食天下名園重洛陽金谷煖横宮殿碧銅駞晴合綺羅光橋邊楊栁細垂地花外秋千半出墻白馬蹄輕艸如剪爛逰扵此十年狂康莭春逰呤東臯雜録云孔嘗甫言唐人詩有城頭推鼓傳花枝席上搏拳握松子乃知酒席蔵􅍐為戯其來也乆復齋漫録云仲至使遼囬謁恭敏李公席中賦詩云穹庐三月巳淹晋白艸黄雲見即愁滿䄂塵埃何処洗李家池上海棠洲許彦周詩話云退之詩酩酊馬上知為誰此七字用意哀悲過扵痛哭又詩云銀燭未消窓送曙金釵半醉坐添春殊不類其為人乃知能賦梅花不獨宋廣平阮戸部逰紫㣲觀詩春來猶未到金庭桃杏離披栁巳青直待斜陽方興盡一笻獨立紫㣲亭百家詩話総龜後集卷之三十五
