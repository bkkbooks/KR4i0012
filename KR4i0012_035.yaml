front:
  text: 增修詩話總龜卷之三十五
  hash: sha256:95370d9abea76111887e2b6691a331d97dc9f6481c07f5e124d86bf8e82399c6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_035-1a}
body:
  text: 譏誚門上陳彭年大中祥符中與朝文莊內翰等四人同知貢舉省試將出奏試卷舉人壅衢觀其出省諸公皆慘赧其容獨彭年揚鞭肆意有驕矜之色榜出有甥不預選怒入其第會彭年未來於几上得黃敕乃題其背曰彭年頭惱太冬烘眼似朱砂鬢似蓬紕繆幸叨三字內荒唐仍在四人中取他權勢欺明主落却親情賣至公千百孤寒齊下淚斯言無路達堯聰彭年怒抱其敕入奏章聖見而不悅然釋其罪江南野録唐太宗燕近臣長孫無忌嘲歐陽詢更曰聳膞成山字埋肩畏出頭誰言麟閣上畫此一彌猴詢應聲曰縮頭連背聳漫襠畏肚寒只緣心渾渾所以面團團太宗改容曰詢豈不畏皇后聞邪無忌長孫后之弟也小説舊聞唐相張延賞選壻無可意者其妻苗氏賢而知人特選進士韋臯許之皋性踈曠不拘細行延賞竊悔由是婢㒒頗輕慢惟苗氏待之益厚臯因辭東逰張氏罄奩具以治行延賞幸其去以七馱物為贐皋行翌日悉還之惟晉奩物及書册而已後五年臯擁節旄會德宗幸奉天持節西川替延賞乃改姓名作韓翺人莫敢言至大回驛去府三十里人有報延賞曰替相公者韋皋也非韓翶苗氏曰若韋皋必韋郎也延賞曰天下姓名同者甚衆彼韋生必填溝壑豈能乘吾位乎次日果韋臯也延賞慚懼自西門潛遁皋入見苗禮奉過布衣之日求前輕慢者皆杖死之時泗濵郭圍因為詩曰宣父從周又入秦昔賢誰不困風塵當時甚訝張延賞不識韋臯是貴人唐宋遺史彭齊吉州人才辨滑稽嘗謁南豐宰而不禮之一夕虎入縣􅈦噬所飬羊棄殘而去宰即以會客齊預焉翌日獻詩於宰曰昨夜黃班入縣齋分明蹤迹印蒼苔幾多道德驅難去些子豬羊引便來令尹聲聲言有過録公吕道無災思量也解開東閣晉得頭蹄待秀才覽者絶倒青箱雜記景德𥘉河朔舉人張存任辨皆以防城得官有無名子嘲曰張存解放旋風炮任辨能燒猛火油丘濬寺丞失意遍逰諸郡至山陽郡守屢召之夜飲翌日作詩曰醜却天下美人面正得世間君子心郡將它日再為文字飲以謝之至宜真太守召看牡丹作詩曰何事化工情愈重偏教此卉大妖姸王孫𣣔種無餘地顔巷安貧欠買錢曉檻競開香世界夜欄誰結醉因緣須知村落桑耘處田叟飢耕婦不眠又至五羊贈太守詩曰碧睛蠻婢頭蒙布黑面胡兒耳帶環幾處樓臺皆枕水四周城郭半圍山又詩曰階上腥臊堆蜆子口中濃血吐檳榔又詩曰風腥蠻市合日上瘴雲紅太守見之大不懌翰府名談天聖中修國史王安簡謝陽夏李邯鄲黃唐卿為編修官安簡神情沖淡唐卿刻意篇什謝李嘗戲為句豐貌間如鶴黃吟苦似猿春明退朝録唐既平劉展江淮之亂上元間租庸使元載以吳越雖兵荒後民産尤給乃辟召豪吏分宰列邑而重斂之時人謂之白著言其役斂無名其所著者皆公然明白無所嫌避一云世人謂酒酣為白著既為刻薄之役不堪其弊則必顛沛酩酊如醉者之著也渤海髙亭有詩曰上元官吏稱剝削江淮之人皆白著唐景龍中洛下霖雨百餘日宰相不能調隂陽乃閉坊市北門卒無效􅗈溢至甚人歌曰禮賢不解開東閣燮理惟能閉北門朝野僉載孫魴沈彬李建勳好為詩什魴有夜坐詩為時所稱建勳因匿于齋中待彬至乃問彬云魴之詩何如彬曰田舍翁火爐頭之語何足道也魴聞而出誚彬曰何誹謗之甚而比田舍翁無乃過乎彬曰子夜坐句劃多灰漸冷坐久席成痕此非田舍翁爐上作而何闔坐大笑乃題金山寺云萬古波心寺金山名日新天多剩得月土少不生塵過櫓妨僧艇歸濤濺佛身誰言張處士題後更無人莫不服其驗雅江南野録朝元龜廬陵人嘗謁邑宰見超伏生獷𣣔窮以詞學因新畫屏為戲珠龍乃曰請子咏之元龜應聲而成因諷宰受賂云翻身騰白浪探爪攫胡珠毛抦聚生徒於廬山白鹿洞與諸生講論所獲資鏹皆以市酒洞有辨者嘲云彭生作賦茶三片毛氏傳詩酒半升嘗自題於齋壁云先生不在此千載只空山因大醉一夕而逝劉炎少負詞學晚為永新尉拙於政治遂有貪名太守行邑覬覦之意而炎不悟既行以詩諷炎云未到桃源時長憶出家景及到桃源了還似鑑中影炎乃和而復之后因民訴受賄遂按以法炎復有詩云早知太守如狼虎獵取膏梁以啖之羅隱性傲聣𥘉赴舉過鍾陵見營妓雲英一紀後下第又過復見之雲英曰羅秀才尚未脫白隱以詩嘲之曰鍾陵醉别十餘春重見雲英掌上身我未成名英未嫁可能俱是不如人隱與顧雲同謁淮南相國高駢雲為人雅律髙公遂留雲而逺隱隱𣣔歸武陵與賔幕酌餞於雲亭盛暑青蠅入坐髙公命扇驅之謔隱曰青蠅𬒳扇扇離席隱聲曰白澤遭釘釘在門偶見白澤圖釘在門扇乃譏雲也時髙公𣣔繼淮南王求仙方為妖亂後為畢將軍所害隱作妖亂志以譏之故有題延和閣云延和髙閣勢凌雲輕語猶疑太一聞燒盡降香無一事開門迎得畢將軍僖宗在蜀隱作詩數首以刺諸侯及還梁為朝貴所疾乃謁錢武肅焉獻僖宗在蜀詩曰白丁攘臂犯長安翠輦倉皇路屈蟠丹鳯有情雲外逺玊龍無迹渡頭寒靜思貴族謀身易危惜文皇創業難不將不侯何計是釣魚船上淚闌干又作僖宗還京曰馬嵬楊柳尚依依又見鑾輿幸蜀歸泉下阿蠻應有語這回休更怨楊妃鑑戒録郡闍雅談謂青蠅白澤對句是寇弱謝觀作蘇子美監進奏院因賽神召館中同舍是時江南人李中舍因梅聖俞謁子美且願預此會聖俞以為言子美曰食中不設蒸饅餅夾坐上安有國舍虞臺李銜之遂暴其事於言語為劉元瑜所彈子美坐謫故聖俞有客至詩云有客十人至共食一䁀珍一客不得食覆䁀傷衆賔蓋指李也詩史來鵠洪州人咸平中名振都下然喜以詩譏訕當路為人所惡卒不第金錢花云青帝若教花裏用牡丹應是得錢人夏雲云無限旱苗枯𣣔盡悠悠間處作竒峰偶題云可惜青天好雷電只能驅趂懶蛟龍詩史唐湖州參軍陸蒙妻蔣氏善屬文然嗜酒姊妹勸節酒強餐蔣應聲曰平生偏好飮勞爾勸吾餐但得尊中滿時光度不難憎知業有詩名與蒙善一日訪蒙談玄蔣使婢奉酒知業云受戒不飲蔣隔簾謂曰上人詩云接岸橋通何處路倚樓人是阿誰家觀此風韻得不飲乎知業慚而退濠州西有髙唐館俯近淮水御史閻欽授宿此館題詩曰借問襄王安在哉山川此地勝陽臺今朝寓宿高唐館神女何曽入夢來有李和風者至此又作詩曰高唐不是這高唐淮上江南各異方若向此中求薦枕參差笑殺楚襄王丁晉公為玊清昭應宫使夏英公為判官一日賜宴齋宫優人有雜手藏擫者晉公顧英公曰古人無詠藏擫詩請賦一章英公為一絶云舞拂挑珠復吐丸遮藏巧使百千般主公端坐無由見却𬒳傍人冷眼看楊孺尚書以耳聾致仕居雩縣别業同里高氏資厚有二子小字大馬小馬一日里中社飲小馬携酒一榼就楊公曰此社酒善治聾願持杯酌之無瀝楊書絶句與之云數十年來雙耳瞶可將社酒使能醫一心更願青盲子免見高家小馬兒倦斿録景祐𥘉詔先朝免解人候將來特與推恩有無名子改王元之升平詞以嘲曰舊人相見問行年便説真宗更以前但看緑𫀆包褁了這回冷笑入黃泉永叔在政府將引去以詩寄潁州常夷甫曰笑殺汝陽常處士十年騎馬聽朝雞致政歸潁又贈之詩曰賴有東鄰常處士披簑戴笠伴春鋤明年夷甫起授侍講判國子監有無名子改前詩作夷甫寄永叔曰笑殺汝隂歐少保新來處士聽朝雞又云昔日頴隂常處士却來馬上聽朝雞吏流仕不得志好持人長短世以凶人目之亦終以此敗嘗過江州琵琶亭題詩云坐上騷人雖有咏江邊寡婦不難欺若使王涯聞此曲織羅應過賞花時並同前邵安石連州人髙湘侍郎南遷歸朝途經連江安石以所業投之遂見知同至輦下湘知貢舉安石攫第詩人章碣賦東都望幸詩刺之曰懶修珠玊上高臺眉目連姢幸不開縱使東巡也無益君王自帶美人來古今詩話泗州僧伽塔人多云其下真身也塔後有閣記興國中𥘉塑事甚詳退之詩云火燒水轉掃地空則真身之焚久矣塔本般匠所建俗言塔頂為天門蘇國老有詩云上到天門最髙處不能容物只容身蓋譏在位者孫皓為晉所滅封歸命侯武帝問皓曰聞南人好作爾汝詩爾頗能否皓𬒳酒舉觴曰昔與汝為鄰今與汝為臣勸汝一杯酒令汝壽萬春帝悔之吳武陵有文而好訐嘗以贓敗廣州吏治殊不假貸題詩路左壁曰雀兒來往揚風髙下視鶯鸇意氣豪自謂能生千里翼黃昏依舊入蓬蒿唐王鐸楊收皆薛逢同年收作相逢有詩曰須知金印朝天客同是沙堤避路人威鳯遇時皆瑞聖應龍無水謾通神收聞之怒王鐸作相逢又有詩曰昨日鴻毛萬鈞重今朝山嶽一毫輕鐸又怒羅隱與桐廬章魯風齊名錢武肅崛起以魯風善筆札召為表奏孔目官魯風不就執之後以羅隱為錢塘令懼而受命因宴獻詩云一箇禰衡容不得思量黃祖謾英雄自是始厚之馮􅌡王鎮南陽郡中宣聖廟壞有酒戶十餘輩投狀乞修瀛王未及判有幕客題四句狀後云槐影參差覆杏壇儒門子弟盡髙官却教酒戶重修廟覺我慚惶也不難瀛王遽罷其請出巳俸重修孫僅給事鎮永興日多作詩時玉清昭應宫𥘉成孫作驪山詩云秦帝墓成陳勝起明皇宫就祿山來有人傳于京師以為譏時政顔標咸通中鄭薰下狀元及第先是徐冦作叛薰𣣔激勸勳烈意標乃魯公之後故置之危科既而詢其廟院標曰寒素京國無廟院薰始大悟有無名子嘲曰主司頭腦太冬烘錯認顔標作魯公光啓中蔣嶓以丹砂授韋中令吳人張鵠有文而貧或嘲之曰張鵠只消千馱絹蔣嶓惟用一丸丹並同前增修詩話總龜卷之三十五百家詩話總龜後集卷之三十五傷悼門復齋漫録云農桑不優歲常登邊將無㓛吏不能四十二年如夢覺東風吹泪過昭陵此詩題于寢宮不著名氏冝表而出之許彥周詩話云楊舜韶名友夔長㒒十餘歲向同在姑蘇時盜發孫堅墓楊作詩云闔廬城邊荒古丘昔誰葬者孫豫州久無行客為下馬時有牧童來放牛嗚呼舜韶今亡矣他詩皆工必傳于世也雪浪齋日記云弔辨才詩云滄海盡頭人滅度亂峯深處塔孤貟憶登夜閣天連鴈同看秋崖月上煙劉僴云天連鴈前人有古戍天連鴈之句張南軒挽劉觀文詩憶昨登廊廟忠言逹帝聰聽思惟盡瘁敢復計成㓛半世江湖上千憂寤寐中汗青誰秉筆請放衆言公一國恥臣當死公家三世心忍看誰絶筆誰續斷弦音精爽今如在衣冠恨更深却嗟蜍與志處世漫侵尋二平日多奇莭中間似冨公天從廬墓請人説救荒㓛辛苦培邦本雍容遏亂鋒人傳遺奏切更過子囊忠三曽是南荆地他年竹馬迎旌旗嚴騎士弧矢盛民兵細放規摹舊還知莭制明思公如峴首同我泪縱橫四南軒挽王詹事詞大莭元無玷中心本不欺排姦力扛䁀憂國鬢成絲方喜三旌召俄興一鑑悲西風吹泪眼夫豈哭吾私一睿主能飛曰如公舊學臣忠言關國計清莭映廷紳歲月身多外江湖澤在民當年遺直歎千古更如新二東萊挽王詹事諸老收聲盡佳城又到公蒼天不可問吾道竟成窮旌捲莆田雨簫橫霅浦風今年襟上泪三哭萬夫雄一太史交旃際元戎卷甲秋先鳴驚衆寐孤憤厭羣咻羽翼新鴻鵠聲華舊斗牛斷橋無恙不落月照寒㳅二東萊挽汪端明異時憂世士歎息恨才難每見公身健猶令我意寬雕零竟何極合復豈無端此理終難解天風大隧寒一四海膺門峻親承二紀中論交由父祖受學自兒童山嶽千尋上江湖萬折東徽言藏肺腑欲吐與誰同二王龜齡悼張安國舍人天上張才子少年觀國光高名一枝桂遺愛六州棠出世才成佛修文遽作郎長沙屈賈誼宣室竟凄涼王龜齡挽趙氏詩全莭忠臣配崇寧宰相家哀能變國俗實不御鉛華學佛窮三昧然松教五車遺芳載彤𬋩名夀兩俱遐東萊挽魏國録麻衣見天子拜疏不知休落落山林氣拳拳畎畝憂極知千載遇政用一身酬繞舍閩溪水朝宗日夜流羣公祖踈傳多士送陽城短掉非前約長亭及此行深晉移白日語只蒼生會綺山陽賦鄰人笛未橫東萊挩簫祭酒摩揣誠斯薄雕鎸質亦消平生但真撲直上絶枝條氛霧終澄霽丘山亦動搖陽舊時鳯聲入舞簫韶王龜齡悼亡燕寢焚香老病身細君相對坐如賔而今一榻維摩室唯與無言法喜親一偕老相期未及期回頭人事巳成非逄春尚擬風光轉過眼忽驚花片飛二文昌雜録云梁均帝晉天福中始葬故妃張氏獨存考㓛貟外商鵬為志文曰七月有期不見望陵之妾九疑無色空餘泣竹之妃後唐武皇師還渭北不獲入覲幕客李襲告作違離表云穴禽有翼聽舜樂以猶來天路無梯望堯雲而不到五代之季工翰墨者無以過此也許彥周詩話云外祖父邵安蕳公布衣時上平元吳䇿又嘗勸仁廟早立太子晚年自樞府出知越州又移知鄆州其薨也岐公作挽詞云披褐曽陳㝎羌䇿汗青猶著立修書春風澤國吟箋落夜雨溪堂燕豆踈前輩詩不獨語言精錬且是著題冷齋夜話云余問山谷今之詩人誰為冠曰無出陳無巳其佳句可得聞乎曰吾見其作溫公挽辭一聮便知其才不可敵曰政雖隨日化身巳要人扶王直方詩話云邢居實字惇夫年少豪邁所與遊皆一時名士方年十四五時嘗作明妃引末云安得壯士霍嫖姚縳取呼韓作編戶諸公多稱之既卒余收什其殘草編成一集號曰呻吟惇夫自少便多憔悴感慨之意其作秋懷詩云高歌感人心心悲將奈何其作棗陽道中詩云有意問山神此生復來否巳而果卒于漢東惇夫之卒也山谷以詩哭之云詩到隨州更老成江山為助筆縱橫眼看白璧埋黃壤何况人間父子情蓋謂惇夫與其子歆何也蔡天啓亦有詩云人物于今歎眇然孤墳宿草巳生煙曰暮行人道旁舍應逄年少共談玄其餘作者甚衆皆載于呻吟集後寓情門古今詩話云牧之為御史分司洛陽時李司徒罷鎮間居聲妓為當時苐一一日開筵朝士臻赴以杜嘗持憲不敢邀飲杜諷坐客逹意願預斯會李馳書杜聞􅒛遽來會中女妓百余皆絶色殊藝杜獨坐南行瞪目注視滿引三巵問李曰聞有紫雲者孰是李指示之杜凝睇良久曰名不虛得宜以見惠李俯首而笑諸妓亦皆回首破顔杜又自引三爵朗吟而起曰華堂今日綺筵開誰喚分司御史來忽發狂言驚滿座兩行紅粉一時回意氣間逸旁若無人苕溪漁隱曰東坡聞李公擇餘飲傳國傳家大醉有詩云不肯醒醒騎馬回玉山知為玉人頽紫雲有語君知否莫喚分司御史來即此事也又侍兒小名録云兵部李尚樂妓崔紫雲詞華清峭眉目端麗李公為尹東洛宴客將酣杜公輕騎而來連飲三觥謂主人曰嘗聞有能萹詠紫雲者今日方知名不虛得倘垂一意無以加焉諸妓回頭掩笑杜作前詩罷上馬而去李公尋以紫委送贈之紫雲臨行獻詩曰從來學製斐然詩不料霜臺御史知愁見便教隨命去戀恩腸斷出門時侍兒小名録不載此事出於何書疑好事者附會為之也東坡續麗人行李仲謀家有周昉畫背面欠伸內人極精戲作此詩云深宫無人春晝長沉香亭北百花香美人睡起薄梳洗燕舞鶯啼空斷腸畫工𣣔畫無窮意背立春風初破睡若教回首更嫣然陽城下蔡俱風靡子蒼用此意題伯時所畫宮女云睡起昭陽暗淡粧不知緣底背斜陽若教轉一回首三十六宫無粉粧終不及坡之偉麗也藝苑雌黃云朝雲者東坡侍妾也嘗令就秦少遊乞詞少遊作南歌子贈之云靄靄迷春態溶溶媚曉光不應容易下巫陽秪恐翰林前世是襄王暫為清歌駐還因暮雨忙瞥然歸去斷人腸空使蘭臺公子賦高唐王直方詩話云無巳嘗作小放歌行兩萹其一云春風永巷閉娉婷長使青樓誤得名不惜捲簾通一顧怕君著眼未分明其二云當年不嫁惜娉婷傅白施朱作後生説與旁人須早計隨冝梳洗莫傾城山谷云無巳他日詩語極高古至于此萹則顧影徘徊衒耀太甚逰宴門蔡寬夫詩話云文忠與趙康靖公槩同在政府相得歡甚康靖先告老歸睢陽文忠相繼謝事歸汝隂康靖一日單騎車特往過之時年巳八十矣留劇飲踰月日于汝隂縱逰而後返前輩挂冠後能從容自適未有若此者文忠賦詩云古來交道愧難終此會今時豈易逄出處三朝俱白首凋零萬木見青松公能不逺來千里我病尤堪釂一鍾巳勝山隂空興盡且晉歸駕為從容因榜其遊從之地為會老堂明年文忠𣣔往睢陽報之未果而薨兩公名莭固師表天下而風流襟度又如此誠可以激薄俗也人間佳莭惟寒食天下名園重洛陽金谷暖橫宮殿碧銅駝晴合綺羅光橋邊楊栁細垂地花外秋千半出墻白馬蹄輕草如剪爛逰于此十年狂康莭春逰呤東臯雜録云孔嘗甫言唐人詩有城頭推鼓傳花枝席上搏拳握松子乃知酒席藏􅍐為戲其來也久復齋漫録云仲至使遼回謁恭敏李公席中賦詩云穹廬三月巳淹晉白草黃雲見即愁滿袖塵埃何處洗李家池上海棠洲許彥周詩話云退之詩酩酊馬上知為誰此七字用意哀悲過于痛哭又詩云銀燭未消窗送曙金叉半醉坐添春殊不類其為人乃知能賦梅花不獨宋廣平阮戶部逰紫微觀詩春來猶未到金庭桃杏離披栁巳青直待斜陽方興盡一笻獨立紫微亭百家詩話總龜後集卷之三十五
