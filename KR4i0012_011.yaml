front:
  text: 增修詩話總龜卷之十一
  hash: sha256:4999758196b3d52ecd71151af254d49633cd8a2f6fea1aba65b0b73f2d1a8c99
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_011-1a}
body:
  text: 雅什門下張瀛碧之子也事廣南劉氏官至曹郎嘗為歌贈琴棋僧同列見之曰非其父不生其子詩云我嘗聽師法一説波上蓮花水中月不垢不淨是色空無法無空亦無滅我嘗聽師禪一觀浪溢鰲頭蟾魄滿河沙世界盡空空一寸寒灰冷燈畔我又聽師琴一撫長松喚住秋山雨絃中雅弄若鏗金指下寒泉流太古我又聽師棋一著山頂坐沉紅日腳阿誰稱是國手人羅浮道士賭却鶴輸却藥法懷斟下紅霞丹束手不敢爭頭角雅言系述翁宏字大舉桂嶺人常寓居韶賀間不仕進能詩宫詞云又是春殘也如何出翠帷落花人獨立微雨燕雙飛寓目魂將斷經年夢亦非那堪向秋夕蕭颯暮蟾輝秋風曲云又是秋殘也無聊意若何客程江外逺歸思夜深多峴首飛黃葉湘湄走白波仍聞漢都護今歲合休戈塞上曲云風高弓力大霜重角聲乾海中山云客帆來異域別島落蟠桃中秋月云寒清萬國土冷鬪四維根曉月云漏光殘井甃缺影背山椒送人下峽云萬木殘秋裏孤舟半夜猿南越行云因尋買珠客悮入射猿家細雨云何處殘春夜和花落古宫途中逢故人云孤舟半夜雨上國十年心開寶中衡山處士瘳融南逰宏有詩云病卧瘴雲間莓苔漬竹關孤吟牛渚月老憶洞庭山壯志潛消盡淳風竟未還今朝忽相遇執手一開顔宏以百篇示融融謝宏云高竒一百篇見造化工全積思逰滄海冥搜入洞天神珠迷罔象瑞玉匪雕鐫休歎不得力離騷千古傳王元懷云獨夜思君切無人知此情滄洲歸未得華髮別來生孤館木𥘉落高空月正明逺書多隔歲猶念沒前程皆佳句也張子明攸縣人居鳯巢山有詩名孤鴈一篇最佳云隻影翩翩下碧湘旁池鴛鷺下銀塘雖逢夜雨迷深浦終向晴天著舊行憶伴幾回思片月蛻翎多為繫繁霜江南塞北俱關念兩地歸飛似故鄉路洵美唐相岩之元孫有夜坐詩云簾捲竹軒清四鄰無語聲漏從吟裏轉月自坐來明草木露華􅊜衣裳寒氣生難逢知鑒者空恱此時情兢傳於湖南伍彬邳陽人初事馬氏王師下湖湘授官為安邑簿秩滿歸隱題全義分水嶺云前賢功及物禹後杳難儔不及古今色平分南北流寒衝山影岸清繞荻花洲盡是朝宗去潺湲早晚休夏日喜雨云稚子出看莎徑沒漁翁來報竹橋流辭解牧云蹤迹未辭鴛鷺客夢魂先到鷓鴣村洎居隱廖融書其屋曰圓塘緑水平魚躍紫蓴生要路貧無力深村老退耕犢隨原草逺蛙傍塹籬鳴撥棹茶川去初逢榖雨晴路振贈詩云考終秋鬢白歸隱舊峰前庭樹鳥頻啄山房人尚眠寒岩落桂子野水過茶煙已絶勞生念虔心向竺乾王元字文元桂林人有登祝融峰詩云草疊到孤頂身齊高鳥翔勢疑撞翼軫翠欲滳瀟湘雲􅊜幽崖滑風梳古木香晴空聊縱目杳杳極窮荒又聽琴云拂塵開素匣有客獨傷時郡閣雅談記第二句何事獨顰眉古調俗不樂正聲君自知寒泉出澗澀老檜倚風悲縱有來聽者誰堪繼子期題鄧真人遺址云三千功滿輕升去留得山前舊隱基但見白雲長掩映不知浮世幾興衰松梢風觸霓旌動棕葉霜霑鶴翅垂近代無人尋異事野泉噴月寫秋池與廖融為詩友贈之云伴行惟瘦鶴尋寺入深雲終于長沙李韶郴州人苦吟固窮題司空山觀云梁代真人上紫微水盤山腳五雲飛杉松老盡無消息猶得千年一度歸識者謂韶必無名果如其言王元有詩悼之云韶也命何竒生前與世違貧棲古𣑽剎終著舊麻衣雅句僧抄遍孤墳客吊稀故園今孰在應見夢中歸陸蟾不知何許人居攸縣司空山聞子規云後夜入清明逰人何處聽花殘斑竹廟雨歇峴山亭樹罅月欲落窗間酒正醒衆禽方在夢誰念爾勞形王操字正美江左人太平興國上南郊賦授太子洗馬奉使隴右至石濠驛作黃葵詩于壁云昔年南國看黃葵雲鬢金叉向後垂今日林容籬落下秋風寂寞兩三枝李相國昉自延安入覲見詩愛之後贈相國云袖中諌草朝天去頭上宫花侍宴歸贈劉將軍云三十懸鉤事聖朝功名常愛霍嫖姚錦衣香重花垂足玉帶光寒雪繞腰秣馬暖思秦地草弦弓秋憶鴈門雕清時間却英雄興醉聽笙歌擲酒瓢寒食云馬搖金勒嘶村墅人搶花毬落野田夜宴云彩箋分卷碧雲薄蠟燭對燒紅淚乾同前卞震蜀人嘗吟即事云雨壁長秋菌風枝落病蟬又云老笻搘瘦影寒木憑吟身春日偶題云詩債到春無處避離愁因醉暫時無即事云茶香解睡磨鐺煮山色牽懷著屐登並同前郭功父方與荆公坐有一人展刺云詩人龍太𥘉功父勃然曰相公前敢稱詩人其不識去就如此荆公曰且請來相見既坐功父曰賢道能作詩能為我賦乎太初曰甚好功父曰只從相公請箇詩題時方有一老兵以沙撩銅器荆公曰可作沙詩太𥘉不須刻間誦曰茫茫黃出塞漠漠白鋪汀鳥去風平篆潮回日射星功父閣筆太初緣此名聞東南余後于喬希聖家見太初詩一軸皆不及前所作直方詩話東坡作彭門守時過齊州李公擇中秋席上作一絶云暮雲收盡溢清寒銀漢無聲轉玉盤此生此夜不長好明日明年何處看其後山谷在黔南令以小秦王歌之韓持國酴醿一絶云平生為愛此香濃仰面常迎落絮風每到春歸有遺恨典刑尤在酒杯中詩云春隂垂野草青青時有幽花一樹明晚泊孤舟古祠下滿川風雨看潮生此蘇子美詩也雙同集並同前賀方回題一絶于定林云破氷泉脈漱籬根壞衲遙疑挂樹猿蠟屐舊痕尋不見東風先為我開門舒王見之大稱賞緣此知名詩云欲挂衣冠袖武門先尋水竹渭南村却將舊斬樓蘭劍買取黃牛教子孫不知何人作石曼卿以書名世然愈大愈妙嘗書三佛名最為雄俊張文潛有詩云煌煌三佛名榜鐡金石鈕開張宫室上渾質山嶽厚井水駭龍吟蟻封觀驥驟余愛能道其妙處詩曰蛟室圍青草龍堆隱白沙護江盤古木迎棹舞神鴉破浪南風正收帆畏日斜雲山千萬疊何處上仙槎此老杜過洞庭詩也李希聲云得之于江心一小石刻人生燭上花火滅巧妍盡春風饒樹頭日與化工進只知雨露貪不聞零落近昔我飛骨時慘見當塗墳青松靄朝霞縹眇山下村既死眀月魄無復玻璃魂念此一脫灑長嘯登昆崘醉著鸞鳯衣星斗俯可捫又曰朝披夢澤雲笠釣青茫茫尋緑得雙鯉中有三元章篆字若丹蛇繞勢如飛翔歸來問天老奧義不可量金刃割青紫靈文爛煌煌咽服十二環奄有仙人房暮跨紫鱗去海氣侵肌涼龍子善變化化作梅花粧贈我疊疊珠靡靡明月光勸我穿絡縷繫作𥚑間璫挹豫以詞去談笑聞餘香元祐八年東坡帥定武李方叔王仲弓别於惠濟出示南嶽典寶東華李真人像又出此二詩曰此李真人作也近有人於江上遇之得此云即李太白也並同前楊大年錢文僖晏元獻劉子儀以文章立朝為詩皆宗李義山號西崑體後進效之多竊取義山語御嘗賜百官宴優人有裝為義山者衣服敗裂告人曰為諸館職撏扯至此聞者大噱然大年漢武詩云力通青海求龍種死諱文成食馬肝待詔先生齒編貝忍令乞米向長安義山不能過古今詩話王正白唐末大播詩名嘗作御溝詩云一派御溝水緑槐相蔭青此波涵帝澤無處濯塵纓鳥道來雖險龍池到自平朝宗心本切願向急流傾示貫休休曰剩一字正白揚𬒮而去休曰此公思敏書一中字于掌逡巡正白回曰此中涵帝澤休以掌中示之不異所改青瑣後集史青零陵人其先名籍秦隨幼而聰敏博聞強記開元初上上表自薦臣聞曹子建七步成章臣愚以為七步太多若賜召試五步之內可塞明詔明皇試以除夜上元觀燈竹火籠等詩惟除夜最佳云今歲今宵盡明年明日催寒隨一夜去春逐五更來氣色空中改容顔暗裏摧風光人不覺巳入後園梅唐宋詩以為王湮作明皇稱賞授左僧乾康零陵人齊已在長沙居湘西道林寺乾康往謁之齊巳知其為人使謂曰我師門仭非詩人不遊大德來非詩人耶請為一絶以代門刺乾康詩曰隔岸紅塵忙似火當軒青嶂冷如氷烹茶童子休相問報道門前是衲僧齊巳大喜日與欵接及別以詩送之乾康有經方干舊居詩云鏡湖中有月處士後無人荻笋抽高節鱸魚躍老鱗為齊巳所稱乾德中左輔闕王伸知永州康捧詩見伸覩其老醜曰豈有狀貌如此能為詩乎冝試之時積雪方消命為詩康曰六出竒花巳住開郡城相次見樓臺時人莫把和泥看一片飛從天上來伸驚曰其旨不淺吾豈可以貌相人也待以殊禮賈島詩有影落句韓退之喜之渡桑乾詩曰客舍并州巳十霜歸心日夜憶咸陽如今又渡桑乾水却望并州是故鄉赴長江道中詩曰䇿杖馳山驛逢人問梓州長江那可到行客替生愁冷齋夜話韓子蒼曰丁晉公海外詩云草解忘憂憂底事花名含笑笑何人世以為工及讀東坡詩曰花非識面常含笑鳥不知名時自呼便覺才力相去如天淵余自并州還江南過都下蔡子因約相見相國寺問余有詩且曰覺範有寒嵓上元懷京師詩曰上元獨宿寒嵓寺卧看青燈映薄紗夜久雪猿啼嶽頂夢回清月上梅花十分春瘦緣何事一掬歸心未到家却憶少年行樂處軟紅香霧噴東華今能作京師上元懷山中可乎余為之曰北逰爛熳看并州重到皇州及上元燈火風光記前事𬋩絃音律試新畨期人未至情如海穿市歸來月滿軒却憶寒岩曾獨宿雪窗殘夜一聲猿世徒知文與可掃墨竹不知其髙才兼諸家之妙詩尤精絶戲作鷺鷥六言曰頸細銀鉤淺曲腳高緑玉深翹岸上水禽無數有誰似汝風標並同前苦吟門李忭受禪之𥘉忽半夜寺僧撞鍾滿城皆驚召將斬之對云夜來偶得月詩乃曰徐徐東海出漸漸上天衢此夕一輪滿清光何處無喜釋之江南野録潘閬自號逍遙子作苦吟詩曰髮任莖莖白詩須字字清同前方干為詩練句字字有功寄人云鶴盤逺勢投孤嶼蟬曵殘聲過別枝鑑戒録唐人為詩常積思數十年然後各自名家杜少陵云更覺良工用心苦豈特我哉古今詩話陳舍人從易當時文盛之際獨以醇儒古學見稱詩類白樂天自稱楊劉唱和西崑集行後進學者爭效之風雅之變謂之昆體由是唐賢諸集廢而不行陳公時偶得杜集舊本文多脫誤至送蔡都尉詩云身輕一鳥其下脫一字陳公與數客各用一字輔之或云疾去落或云下莫能定后得一善本乃是身輕一鳥過陳公歎服以為雖一字諸君亦不能到歐公詩話龎潁公喜為詩雖臨邊典郡文案委前日不廢三兩篇以此為適及疾甚余時為諌官以十餘篇相示手批其後曰欲令吾弟知老夫疾中尚有此思耳字巳慘淡難識數日薨間居詩話寇萊公延僧惠崇于池亭分題為詩公探得池上柳青字韻崇探得池鷺明字韻自午至晡崇忽點頭曰得之矣此篇功在明字凡五壓不倒公曰試口占曰雨歇方塘溢遲回不復驚暴翎沙日暖引步島風清照水千尋逈棲煙一點明主人池上鳯見爾憶蓬瀛公笑曰吾柳之功在青字而四壓不倒不如且已貫休懷武昌故樓云風清江上寺霜洗月中砧得句先呈佛無人知此心賈島𥘉赴舉在京師一日於驢上得句云鳥宿池中樹僧敲月下門又欲推字煉之未定于驢上吟哦引手作推敲之勢觀者訝之時韓退之權京兆尹車騎方出島不覺行至第三節尚為手勢未巳俄為左右擁至尹前島具對所得詩句推字與敲字未定神逰象外不知回避退之立馬久之謂島曰敲字佳遂並轡而歸共論詩道留連纍日因與島為布衣之交有贈島詩曰孟郊死葬北邙山日月風雲頓覺間天恐文章聲斷絶故生賈島在人間自此名著後因不第乃為僧改號無本居于法乾寺與無可唱和一日宣宗微行至寺聞鍾樓上有吟聲遂登樓于島按上取詩卷覽之島不識乃攘臂睨之遂於手內取詩卷曰郎君何會此耶宣宗下樓而去既而島知之亟謝罪乃賜御札除遂州長江簿後遷普州司倉卒故程錡以詩悼之曰倚恃詩難繼昻藏貌不恭騎驢衝大尹奪卷忤宣宗馳譽超前輩居官下我儂司倉舊曹署一見一心忡王元贈詩曰江城賣藥常將鶴古寺看碑不下驢唐宋遺史僧齊巳往袁州謁鄭谷獻詩曰高名喧省闥雅頌出吾唐疊巘供秋望飛雲到夕陽自封修藥院別下著僧床幾話中朝事久離鴛鷺行谷覽之云請改一字方得相見經數日再謁稱巳改得詩云别掃著僧床谷嘉賞結為詩友郡閣雅談賈島元和中嘗跨驢張蓋橫截天街時秋風正厲黃葉可掃島吟曰落葉滿長安求一聮不可得不知身之所從因衝京兆尹劉栖楚節𬒳繫一夕釋之又嘗遇武宗於定水精舍島尤肆慢武宗訝之他日另與一日授長江尉至普州司倉卒永叔言苦吟句云一句坐中得片心天外來茲所謂苦吟破的之句青瑣集詩話總龜卷之十一百家詩話總龜後集卷之十一庚集舒城阮一閲編皇明宗室月窗道人刋鄱陽程珖校評論門翰苑作春帖子往往秀麗可喜如蘇子容云璇霄一夕斗杓東瀲灔晨曦照九重和氣熏風摩蓋壤競消金甲事春農鄧溫伯云晨曦瀲灔上簾櫳金屋熙熙歌吹中桃臉似知官宴早百花頭上放輕紅蔣頴叔云昧旦求衣向曉雞蓬萊仗日下將西花添漏豉三聲逺柳映春旗一色齊梁君貺詩云東方和氣斗回杓龍角中星轉紫霄聖主問安天未曉求衣親護玉宸朝皆佳作也余觀鄭毅夫新春詞四首其一云春色應隨步輦還珠旒玊几照龍顔紫雲殿下朝元罷便領東風到世間其二云春風細拂緑波長初過層城渡建章草色未迎雕輦翠柳梢先學赭衣黃其三云晴暉散入鳯凰樓一行朱簾不上鉤漢殿鬪簮雙彩燕併和春色上叉頭其四云小池春破玉玲瓏聲觸簾鉤漸好風間繞闌干搯花樹春痕已著半梢紅觀此四詩與帖子格調何異豈久于翰苑而筆端自然習熟耶丹陽集張籍韓愈高弟也愈嘗作此日足可惜贈之八百餘言又作喜侯喜至之篇贈之二百餘言又有贈張籍一篇二百言皆不稱其能詩獨有調張籍一篇大尊李杜而末章有顧語地上友經營無太忙之句病中贈張籍一篇有半塗喜開鑿派别失大江吾欲盈其氣不令見麾幢之句醉贈張徹有張籍學古淡軒昻避雞群之句則籍有意于慕大而實無可取者也及取其集而讀之如送越客詩云春雲剡溪口殘月鏡湖西逢故人詩云海上見花發瘴中聞鳥飛送海客詩云入國自獻寶逢人多贈珠紫掖發章句青闈更詠歌如此之類皆駢句也至語言拙惡如寺貧無施利僧老足慈悲收拾新琴譜封題舊藥方多申請假牒秪送賀官書此尤可笑至于樂府則稍超矣姚祕監嘗稱之曰妙絶江南曲凄涼怨女詩白太傅嘗稱之曰尤攻樂府詞舉代少其倫由是論之則人士所稱者非以詩也應制詩非他詩比自是一家句法大抵不出于典實冨艷爾夏英公和上元觀燈詩云魚龍曼衍六街呈金鎖通宵啓玉扄冉冉逰塵生輦道遲遲春箭入歌聲寶坊月皎龍燈淡紫館風微鶴熖平宴罷南端天欲曉回瞻河漢尚盈盈王𡵨公詩云雪消華月滿仙臺萬燭當樓寶扇開雙鳯雲中扶輦下六鼇海上駕山來鎬京春酒沽周宴汾水秋風陋漢才一曲升平人盡樂君王又進紫霞杯二公雖不同時而二詩如出一人之手蓋格調當如是也丁晉公賞花釣魚詩云鶯驚鳯輦穿花去魚畏龍顔上釣遲胡文恭云春暖仙蓂初靃靡日斜芝蓋尚徘徊鄭毅夫云水光翠繞九重殿花氣濃薰萬夀杯皆典實冨艷有餘若作清癯平淡之語終不近尓顔延之謝靈運各𬒳旨擬北上篇延之受詔即成靈運久而方就梁元帝云詩多而能者沈約少而能者謝眺雖有能速多寡之不同不害其俱工也咸平景德中錢惟演劉筠首變詩格而楊文公與之鼎立綽號江東三虎詩格與錢劉亦絶相類謂之西崑體大率效李義山之為豐冨藻麗不作枯瘠語故楊文公在至道中得義山詩百餘篇至于愛慕而不能釋手公嘗論義山詩以謂包藴密緻演繹平暢味無窮而炙愈出鑽彌堅而酌不竭使學者少窺其一斑若滌腸而浣骨是知文公之詩者得于義山者為多矣又嘗以錢惟演詩二十七聮如雪意未成雲著地秋聲不斷鴈連天之類劉筠詩四十八聮如溪箋未破氷生硯爐酒新燒雪滿天之類皆表而出之詩之有思卒然遇之而莫遏有物敗之則失之矣故昔人言覃思垂思抒思之類皆欲其思之來而所謂亂思蕩思者言敗之者易也鄭綮詩思在灞橋風雪中驢子上唐求詩所遊歷不出二百里則所謂思者豈尋常咫尺之間所能發哉前輩論詩思多生于杳冥寂寞之境而志意所如往往出於埃壒之外苟能如是于詩亦庶幾矣小説載謝無逸問潘大臨云近日曾作詩否潘云秋來日日是詩思昨日投筆得滿城風雨近重陽之句忽催租人至令人意敗輒以此一句奉寄亦可見思難而敗易也米元章賦詩絶少而人罕稱之者以書名掩之也如不及陪東坡往金山作水陸詩云久隂障奪佳山川長瀾四隘魚龍淵衆看李郭渡浮玉晴風掃出清明天頗聞妙力開大施足病不列諸方仙想應蒼壁有垂露照水百怪愁寒煙栖雲閣云雲出救世旱澤浹雲尋歸入石了不見豐功已如遺龍騫荐復起抱石明幽姿雲乎無定所隱者何當栖如此二詩殆出翰墨畦徑之表蓋自邁往凌雲之氣流出非尋規索矩者之可到也韓退之調張籍詩曰刺手拔鯨牙舉瓢酌天漿魏道輔謂高至酌天漿幽至于拔鯨牙其用思深逺如此𬒳獨未讀送無本詩爾其曰吾嘗示之難勇往無不敢蛟龍弄牙角造次欲手攬衆鬼囚大幽下覷襲元窞言手攬蛟龍之角下覷衆鬼之窞皆難事而無本勇往無不敢蓋作文以氣為主也則調張籍之句無乃亦是意乎余襄公靖嘗在契丹作胡語詩云夜筵沒邏臣拜洗兩朝厥荷情幹勒微臣稚魯祝若統聖夀鐡擺俱可忒沒邏言侈盛拜洗言受賜厥荷言通好幹勒言厚重鐡擺言嵩髙也沈存中筆談載刀約使契丹戲為詩云押燕移離畢看房賀跋攴餞行三匹裂密賜十貔狸移離畢如中國執政官賀跋攴執衣防閣人匹裂小木罌貔狸如形如鼠而大狄人以為珍饌二詩可作對故表而出之孟郊詩云食薺腸亦苦強歌聲無歡出門即有礙誰謂天地寬許渾詩云萬里碧波魚戀釣九重青漢鶴愁籠皆是窮蹙之語白樂天詩云無事日月長不羈天地闊與二子殆霄壤矣作詩貴雕琢又畏有斧鑿痕貴破的又畏粘皮骨此所以為難李商隱柳詩云動春何限葉撼曉幾多枝恨其有斧鑿痕也石曼卿梅詩云認桃無緑葉辨杏有青枝恨其粘皮骨也能脫此二病始可以言詩矣劉夢得稱白樂天詩云郢人斤斫無痕迹仙人衣裳棄刀尺世人方內欲相從行盡四維無處覔若能如是雖終日斫而鼻不傷終日射而鵠必中終日行于規矩之中而其迹未嘗滯也山谷嘗與揚明叔論詩謂以俗為雅以故為新百戰百勝如孫吳之兵棘端可以破鏃如甘蠅飛衛之射揑聚放開在我掌握與劉所論殆一轍矣余讀許渾詩獨愛道直去官早為貧家客多之句非親嘗者不知其味也贈蕭兵曹詩云客道耻搖尾皇恩寬犯鱗直道去官早之實也將離郊園詩云久貧辭國逺多病在家希家貧為客多之實也蘇飬直清江曲見賞于東坡以為與李太白無異所謂屬玉雙飛水滿塘菰蒲深處浴鴛鴦是也既為前輩所賞名已不沒而又作後清江曲一篇豈飬直尚惡其少作耶所謂呼兒極浦下笭箵社甕欲熟浮蛆香輕蓑浙瀝鳴秋雨日暮乘流自相語如此等句前曲似未到也自古文人雖在艱危困踣之中亦不忘于製述蓋性之所嗜雖鼎鑊在前不恤也况下于此者乎李後主在圍城中可謂危矣猶作長短句所謂攖桃落盡春歸去蝶翻金粉雙飛子規啼月小樓西文未就而城破蔡約之嘗親見其遺蒿東坡在獄中作詩贈子由云是處青山可藏骨他年夜雨獨傷神猶有所托而作李白在獄中作詩上崔相云賢相燮元氣再欣海縣康應念覆盆下雪泣拜天光猶有所許而作是皆出于不得已者劉長卿在獄中非有所托訴也而作詩云斗間誰與看冤氣盆下無由見太陽一詩云壯志已憐成白髮餘生猶待發青春一詩云冶長空得罪夷甫不言錢又有獄中見畫佛詩豈性之所嗜則縲絏之苦不能易雕章繢句之樂歟杜牧赤壁詩云折戟沉沙鐡未消自將磨洗認前朝東風不與周郎便銅雀春深鎖二喬李義山集中亦載此詩未知果何人所作也俱同上百家詩話總龜後集卷之十一
