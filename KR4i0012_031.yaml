front:
  text: 增修詩話總龜卷之三十一
  hash: sha256:61fedb394de7a48700168fc60f7593059eeeb556cc7fa01b06b297d6ae5c0be3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_031-1a}
body:
  text: 詩䜟門上太祖采聽至明逺邉事纎悉必知有間者西蜀還問劍外有何事間者曰但聞城郭滿城誦朱山長苦熱詩曰煩暑鬱蒸無所避凉風清冷㡬時來曰此蜀人思我來取也古今詩話僞蜀每歲除日諸宫門各給桃符書元亨利貞四字時昶子善書札取本宫䇿勲府書云天垂餘慶地接長春乾德中伐蜀明年蜀降二月以兵部侍郎吕餘慶知軍府事以䇿勲府爲治所太祖聖節號長春此天垂地接之兆也辛夤遜仕僞蜀孟昶爲學士王師將致討之前歲除昶令學士作詩两句寫桃符上夤遜題曰新年納餘慶嘉節號長春明年蜀亡吕餘慶以叅知政事知益州長春乃太祖誕聖節名也談苑二說不同故两存之梁沙門寳誌銅牌多䜟未來事云有一真人在兾川開口張弓在右邉子子孫孫萬萬年江南李璟其子曰弘兾呉越錢鏐諸子皆連弘字期以應之而真宗諱正當之江南將亡數年前昇元寺殿基掘得石記視之詩也辭曰若問江南事江南事不慿抱雞升寳位走犬出金陵子建居南極安仁秉夜燈東陵嬌小女騎虎渡河氷王師甲戌渡江李煜以丁酉年生曹彬爲大將列柵城南乃子建也潘羙為副將城䧟恐有伏兵命卒縱火乃安仁也錢俶以戊寅年入朝盡獻浙西之地騎虎之謂也誌公嘗畫鹿負按走山中又云两角女子緑衣裳却背太行趍君王一止之月必消亡後禄山亂盖两角即鹿緑即禄女子即安字太行即山名一止之月果正月敗亡唐宋遺史翰林蘇公紳嘗題潤州金山一聮云僧依玉鑑光中住人在金鼇背上行乃榮入玉堂之兆巳而果然位止内相亦詩之䜟也青箱雜記李昪徐温飬子冐徐姓名知誥為昇州刺史爲童謡詩曰東海鯉魚飛上天後乃繼温江南李覯召試制科嘗作詩曰人言落日是天涯望㫁天涯不見家巳恨碧山相掩映碧山更被暮雲遮觀此詩有重障碍意恐時命不偶果如其言孟東野下第詩曰棄置復棄置情如刀劍傷又再下第詩曰两度長安陌空將泪見花其後登第詩曰昔日齷齪不足嗟今朝曠蕩思無涯春風得意馬蹄疾一日看盡長安花進取得失盖亦常事而東野噐宇不宏偶下第則情隕穫如傷刀劍以至下淚旣登科則志意充溢一日之間花即看盡何其速邪後授溧陽尉卒㓂萊公方貴時送人使嶺南嘗作詩云到海止十里過山應萬重及貶雷州吏呈圖經問去海㡬里吏曰十里是則南遷之禍巳見於詩也張乖厓公守陳日嘗逰趙氏西園詩曰方信承平無事乆淮南閑殺老尚書後一年捐館亦詩之䜟蘇緘字宣甫性忠義喜功名皇祐中知英州儂賊作過以守禦功換館職㝷坐事貶房州司馬嘉祐中復官知越州諸曁縣余與之同僚嘗贈詩曰燕頷將軍欲白頭昔年忠勇動南州心如鐵石老不挫功在桑榆晚可收十八年再知邕𬋩交趾叛攻城戰没朝廷憫之贈奉國軍節度使謚忠勇則忠勇之謚巳見於余詩矣許州臨頴人成銳應制科嘗以詩三篇獻丞相王文惠野菊云綵檻應無分春風不借恩野花云馨香雖有艶栽植未逢人公謂辭雖綺靡未有登科意别有贈裴員外詩云凭高看漸逺更上最高樓公曰再舉合踐高第果符其言其能品藻如此李璟逰后湖賞蓮花作詩曰蓼花蘸水火不㓕水鳥驚魚銀梭投滿目荷花千萬頃紅碧相雜敷清流孫武巳斬呉宫女琉璃池上佳人頭識者謂雖佳句然宫中有佳人頭非吉也摭遺廖獻䖏士衡山人有詩云雲穿搗藥屋雪壓釣魚船因自解曰屋破而雲穿其中無人也船爲雪壓無用也後六十日果卒余安道自番禺詔赴闕過韶陽逰龍光寺詩云暫離人世界且至佛家郷議者謂非吉兆果卒扵秦淮亭下嘗有日者謂曰到秦地當有災果如其言蘇子羙滄浪亭觀魚詩云自嗟不及逰魚樂虚作人間半世人非吉意也又有云山蟬帶響穿踈户野蔓蟠青入破窓雖佳句然窓破野蔓蟠其中似無人居矣子羙竟卒於謪籍王䖏厚字元羙益州華陽縣人甞遇一老僧論浮世苦空事登第後出郭徘徊古陌軫懐長吟曰誰言今古事難窮大抵榮枯總是空筭得生前隨夢蝶争如雲外指冥鴻暗添雪色眉根白旋落花光臉上紅惆悵荒原懶回首暮林蕭索起悲風及暮還家心疾而卒洞㣲志楊貴妃嘗以假髻為首飾而好服黄裙天寳末童謡曰義髻抛河裏黄裙逐水流明皇雜録李遐周有道術居元都觀嘗題詩數千言皆記明皇廵幸西蜀及禄山僣竊之事時人皆不之悟詩曰燕市人皆去禄山以薊門之事而來也凾關馬不歸哥舒翰敗潼關也可憐山下鬼嵬也環子繫羅衣貴妃小字玉環及馬嵬之死高力士以羅衣縊焉崔曙嘗作明堂火珠詩其中有佳句曰夜來雙月滿曙後一星孤為文士推服崔旣夭殁有一女名星而無男子當時異之季煜暮歲乗醉書扵牖云萬古到頭歸一死醉郷葬地有高原醒而見之大悔不乆謝世翰府名談邵拙字拙之鴈門人好學博通經史水曹郎趙慶有詩贈之曰邁古文章金鸑鷟出群行止玉麒麟仕宦不逹而卒有詩傳於時其間有云萬國不得雨孤雲犹在山此其應歟江南野録何昌陵宰廬陵郡有衙將楊克儉能媚州牧而移其權昌齡以兄事之嘗逰其池舘貽其詩曰經旬因雨不重來門有蛛絲徑有苔再向白蓮亭上望不知花木為誰開未㡬克儉連延範貸死而刑其家破焉議者以為其詩之䜟也賈島嘗為病蟬詩曰病蟬飛不得向我掌中行折翼猶能搏酸音尚極清露華應在腹塵點悮侵睛黄雀并烏鳥俱懐害爾情議者謂無摶風之意果爲禮闈所斥淳化中崇文院直攎絶高處有人題两句云秋風送炎去庭木葉齊落是年立秋日宋炎罷來年立秋葉齊黜張退傳年七十八除夜有詩云八十光隂有二年烟蘿門戸喜開關近來無柰山中相頻寄書來許綴班后四年而薨乃八十二之䜟也此答陳文惠之詩詩史沈詢夜宴僚友歌著辭令曰莫打南來鴈從他向北飛打時雙打取莫遣两分離是夕爲奴歸秦所殺夫妻並死張忠定少年逰華山謁陳圖南遂欲隱華山謂圖南曰欲就分先生山半住可否圖南曰他人即不可如公者吾當分半山相奉然公方有宦職未可釋此其勢如家人張筵笙歌鼎沸忽庖中火起待公救之豈可不赴贈之詩曰自吴入蜀是㝷常歌舞筵中救火忙乞得金陵飬閑散也須多謝鬢邉瘡始皆不諭后忠定更鎮杭益晚年發瘡於腦不瘥乞金陵悉如其詩大中祥符七年乙卯七月二十日終古今詩話滕倪善詩宗人滕郎中守吉州徃謁之㑹秋試告别為詩云秋風江上别旌旗故國無家淚欲垂千里未知投足地前程應是聽猿啼誤攻文字身空老却返漁樵計巳遲羽翼凋零歸不得丹青無路接差池守得詩云此生不與子相見别後卒於旅邸倪又有詩云白髪不知容相國也同閒客滿頭生又題鷺鷥障子云映水有深意見人無懼心同前増修詩話総龜卷之三十一百家詩話總龜後集卷之三十一壬集舒城阮閱編皇明宗室月窓道人刋鄱陽程珖校格致門詩眼山谷言文章必謹布置每見後學多言以原道命意曲折後予以此㮣考古人法度如贈韋見素詩云紈袴不餓死儒冠多誤身此一萹立意故使人静聴而具陳之自甫昔少年日早充觀國賓致君尭舜上再使風俗淳皆儒冠事業也自此意竟䔥條至蹭蹬無縱鱗言誤身如此也則意舉而文偹故巳有是詩矣然必言其所以韋者扵是有厚愧真知之句所以真知者謂傳誦其詩也然宰相聀在薦賢不當徒愛人而巳士故不能無望故曰竊效貢喜難甘原憲貧果不能薦賢則去之可也故曰焉能心怏怏秪是走踆踆又将入海而去秦也然其去也必有遅遅不忍之意故曰尚怜終南山囘首清渭濵則所知不可以不别故曰常擬報一飰况懐辭大臣夫如此是可以相忘扵江湖之外雖見亦不可得而見矣故曰白鷗波浩蕩萬里誰能馴終焉此詩前賢録爲壓卷盖布置最得正体如官府甲第所堂房室各有定處不可亂也韓文公原道與書之尭典如此其他皆謂之變体可也曲水脩禊之㑹人各賦詩成两萹者自右軍安石而下纔十一人成一萹者郗曇王鄷而下十五人詩不成罰觥者凡十六人今觀所傳詩𢾗皆四言五言而又两韵者两四韵者無幾四言二韵正十六字耳當時得預者徃徃皆知名士豈獻之軰終日不能措辭扵十六字㢤窃意古人持重自惜不𣣔率爾恐貽乆逺􅏺議不如不賦之為愈黄常明白獻晋公云聞說風情筋力在只如𥘉破蔡州時雖叙其功業與夀康其語緩而不迫此可為作詩法也䂬溪省題詩自成一家非他詩比也首韵拘扵見題則易扵牽合中聮縳扵法律則易扵駢對非若逰戯扵烟雲月靈之形可以縦横在我者也王昌齡錢起孟浩然李商隱軰皆有詩名至扵作省題詩則踈矣王昌齡四時調玉燭詩云祥光長赫矣佳號得温其錢起巨魚縦大壑詩云方快吞舟意尤殊在藻嬉孟浩然騏驥長鳴詩云逐逐懐良馭蕭蕭顧樂鳴李商隱桃李無言詩云夭桃花正發穠李蕊方繁此䓁句兒童無異以此知省題詩自成一家也丹揚集古辭云藁砧今何在山上復有山何當大刀頭破鏡飛上天藁砧砆也謂夫也山上有山出也大刀頭刀上鐶也破鏡言半月當還也此詩格非當時有釋之者後人豈能曉㢤古辭又云圍碁燒敗襖着子故依然陸龜䝉皮日休固嘗擬之陸云旦日思雙履明時願早諧皮云莫言春繭薄猶有萬重思是皆以下句釋上句與藁砧異矣樂府觧題以此格為風人詩取陳詩以觀民風示不顯言之意至東坡無題詩云蓮子擘開湏見薏秋枰着盡更無棊破彩却有重縫處一飯何曽忘却匙是文與釋普見扵一句中與風人詩又小異矣丹揚集老杜歌行與長韵律詩後人莫及而蘇黄用韵下字用故事處亦古所未到晋宋間人造語題品絶妙今古近世蘇黄帖題䟦之類率用此法尤為要妙吕氏童蒙訓學退之不至李翶皇甫湜然翶湜之文足以窺測作文用力處近世𣣔學詩則莫若先考江西諸派同上老杜歌行最見次第出入本末而東坡長句波瀾浩大變化不測如作雜劇打猛顐入却打猛顐出也呂氏童蒙訓讀古詩十九首及曹子建諸詩如明月入高樓流光正徘徊之類詩皆思深逺而有餘意言有盡而意無窮也學者當以此等詩嘗自􅉼飬自然下筆髙妙大槩學詩湏以三百萹辭及漢魏間人詩為主方見古人妙處自無齊梁間綺靡氣味也少㳺過嶺後詩嚴重髙古自成一家與舊作不同學者亦冝詳味文潜詩自然竒逸非他人可及如秋明樹外天客燈青映壁城角冷吟霜淺山寒帶水旱日吹風川塢半夜雨卧冷五更秋之類逈出時流雖是天姿亦學可及學者若能常玩味此等語自然有變化處也今人作詩自述則稱我謂人則稱君徃徃相習皆然杜子羙送孔巢父詩云道甫問信今何如墜馬諸公携酒相㸔詩云甫也諸侯老賔客遇王倚飲云在扵甫也何由羡則自述乃稱名送樊侍御云至尊方旰食仗爾布嘉惠寄李太白云昔年有狂客號爾謫仙人送竇九云非爾更持莭何人符大名則謂人乃稱爾若謂尊之甚則称名則前三人皆非通貴之士若謂卑則甚之稱爾則後三人皆非穉孺之列盖其詩格變態如是恐不繋重輕也俲法門退之心訝近来惟貯火眼知别後自添花臨川云髮為感傷無翠葆眼從瞻望有玄花乆欽江揔文才妙自嘆虞翻骨相屯王云乆詣郭璞言多騐老比顔含意更踈韓我今罪重無㱕望直去長安路八千永叔今日始知予罪大夷陵去此更三千栁十年顦顇到秦京誰料今為嶺外行王十年江海別常輕豈料今随寡嫂行栁直以踈慵招物議休将文字占時名王直以文章供潤色未應風月負登臨十一年前南渡客四千里外北歸人又一身去國六千里萬死投荒十二年蘇七千里外二毛人十八灘頭一葉身黄五更㱕夣三千里一日思親十二時皆不約而合句法使然故也黄常明老杜雨詩云紫崖奔處黒白鳥去邊明而江碧鳥逾白山青花𣣔燃之句似之贈王侍御云暁鶯工迸泪秋月觧傷神而感時花濺泪恨别鳥驚心之句似之殆是同一機軸也葛常之劉义詩酷似玉川子而傳扵世者二十七篇而巳氷柱雪車二詩雖作語竒怪然議論亦皆出於正也氷柱詩云不爲四時雨徒扵道路成泥渣不爲九江浪徒能汩没天之涯雪車詩謂官家不知民餒寒盡驅牛車盈道載屑玉載載𣣔何之秘蔵深當以御炎酷如此等句亦有𥙷扵時與玉川月蝕詩稍相類丹揚集張籍云爱養無家客多傳得力方坡贈金山元老云蒜山幸有閑田地招此無家客任居葛常之白云趂凉行遶竹引睡臥㸔書坡引睡文書信手畨書引睡魔誠人人所同也同上詩病門學者湏做有用文字不可盡力虚言有用文字所論文字是也議論文字湏以董仲舒劉向爲主禮記周禮及新序說苑之類皆當貫穿熟攷則做一日便有一日工夫近世文字如曽子固諸序尤湏詳味學古人文字湏得短處如杜子羙詩頗有近質野處如封主簿親事不合詩之類是也東坡詩有汗漫處魯直詩有太新竒太巧處皆不可不知東坡詩如成都畫手開十眉楚山固多猿青者黠而夀皆穷極思致出新意扵法度之表前賢所未到然學者專力扵此則亦失古人作詩之意劉禹錫嘉話載楊祭酒贈項斯詩曰度度見詩詩捴好今觀標格勝扵詩平生不觧蔵人善到處相逄說項斯斯集中絶少佳句如晚春花云踈與香風㑹細将泉影移別張籍云子城西並宅御水北同渠拙悪有餘冝祭酒公謂標格勝扵詩也祭酒乃敬之也其贈斯詩鄙俗如此與斯亦奚逺㢤葛常之樂府門周羙成為江寕府溧水令主簿之室有色而慧羙成毎欵洽于尊席之間世有傳風流子詞盖所寓意焉新緑小池塘風簾動碎影舞斜陽羡一作見金屋去来舊時巢燕土花繚繞前度髙墻綉閣鳯帷深處許聴得理絲黄𣣔說又休慮乖芳信未歌先噎愁轉清商暗想新粧了開朱戸應自待月西廂最苦夣魂今霄不到伊行問甚時却與佳音宻耗痴将秦鏡偷換韓香天便教人霎時厮見何妨新緑待月皆簿厅亭軒之名也俞羲仲云徐幹臣伸三衢人政和初以知音律為太常典樂出知常州嘗自製轉調二郎神之詞云悶来弹鵲又攪碎一簾花影謾試著春衫還思纎手薫徹金虬燼冷動是愁端如何向但恠得新来多病嗟舊日沈腰如今潘鬂怎堪臨鏡重省別時泪滴羅襟猶凝為我厭厭曰高慵起長託春酲未醒鴈足不来馬蹄難駐門掩一亭芳景空佇立盡日欄干倚遍晝長人静旣成㑹開封尹李孝夀来牧吴郡李以嚴治京兆號李閻羅道岀郡下幹臣大合樂燕劳之喻羣娼令謳此詞必待其問乃止娼如戒歌至三四李果詢之幹臣蹙頞云某頃有一侍婢色藝冠絶前歲以亡室不容逐去今聞在蘇州一兵官處屢遣信𣣔復来而今之主公靳之感慨賦此詞中所叙多其書中語今焉適有天幸公擁麾于彼不審能為我之地否李云此甚不難可無慮也旣次無錫賔賛者請受謁次第李云郡官常至楓橋橋距城十里而逺翌日􅋈舟其所官吏上下望風股栗李一閲刺字忽大怒云都監在法不許出城乃亦至此使郡中萬一有火盗之虞豈不殆㢤斥都監下堦荷枝送獄又數日耴其供牘判奏字其家震惧求援宛轉哀鳴致懇李笑云且還徐典樂之妾了来理㑹兵官者觧其指即日承命然後舎之曽文肅十子㝡鍾愛外祖空青公有夀詞云江南客家有寧馨児三世文章稱大手一門兄弟獨良眉籍甚衆多推千里足来自渥洼池莫倚善題鸎鵡賦青山湏待健時㱕不似傲當時其後外祖果以詞翰名世可謂父子為知巳也揮麈世傳温公有西江月一詞今復得錦堂春云紅日遅遲虚廊轉影槐隂迤􅏙西斜彩筆工夫難状晚意烟霞蝶尚不知春去漫遶幽砌㝷花奈猛風過後縦有殘紅飛向誰家始如青鬂無價歎飄零宦路荏苒年華今日笙歌叢裏特地咨嗟席上青衫􅊜透算感舊何止琵琶怎不教人見老多少離愁散在天涯東皐雜録送劉貢父守維揚作長短句云平山欄檻倚晴空山色有無中平山堂望江右諸山甚近或以謂永叔短視故云山色有無中東坡笑之因賦快㢤亭道其事云長記平山堂上欹枕江南烟雨杳杳没孤鴻認取醉翁語山色有無中盖山色有無中非烟雨不能然也藝苑方囘詞有鴈後㱕云巧剪合歡羅勝子釵頭春意翩翩艶歌淺笑拜嫣然願郎冝此酒行樂駐華年末至文園多病客幽襟悽断堪怜舊逰夢挂碧雲邊人㱕落鴈後思發在花前山谷守當塗方囘過焉人日席上作也腔本臨江仙山谷以方囘用薛道衡詩故易以鴈後㱕云唐劉餗傳記云隋薛道衡聘陳為人日詩曰入春纔七日離家巳二年南人嗤之及云人㱕落鴈後思發在花前乃曰名下無虚士復斎漫錄後山詩話謂退之以文為詩子瞻以詩為詞如教坊雷大使之舞雖極天下之工要非本色余謂後山之言過矣子瞻佳詞冣多其間傑出者如大江東去浪淘盡千古風流人物赤壁詞明月幾時有把酒問青天中秋詞落日綉簾捲庭下水澄空快㢤亭詞乳燕飛華屋悄無人桐隂轉午𥘉夏詞明月如霜好風如水清景無限夜登燕子樓詞楚山脩竹如雲異材秀出千林表詠笛詞玉骨那愁瘴霧氷肌自有仙風咏栂詞東武南城新堤固漣漪𥘉溢宴流杯亭詞氷肌玉骨自清凉無汗夏夜詞有情風萬里卷潮来無情送潮㱕别叅寥詞缺月挂踈桐漏断人初静秋夜詞霜降水㾗收淺碧鱗鱗露逺洲九日詞凡此十餘詞皆絶去筆墨畦逕間直造古人不到處真可使人一唱而三歎若謂以詩為詞是大不然子瞻自言平生不善唱曲故間有不入腔處非盡如此后山乃比之教坊雷大使舞是何毎况愈下盖其繆耳百家詩話総龜後集卷之三十一
