front:
  text: 增修詩話總龜卷之十二
  hash: sha256:750e63be7d5076a1da88df7563f22b5bcc47193c8716704e664aff80c6abe586
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_012-1a}
body:
  text: 警句門上太祖嘗顧近侍曰五代干戈之際猶有詩人今太平日久豈無之也中官宋永圖於僧寺園亭中得詩百篇以進有丞相李文正公昉宰相僧閣間望一聮云水光先見月露氣早知秋古今詩話楊朴字契元鄭州人善為詩少嘗與畢文簡公士安同學文簡薦之太宗召見面賦蓑衣詩云狂脫酒家春醉後亂堆漁舍晚晴時除官不受聽歸山以其子從政為長水尉朴為七夕詩云年年乞與人間巧不道人間巧已多魏野陜人字仲先少時未知名題河上寺柱云數聲離岸櫓幾點别州山時有幕僚本江南文士見之大驚邀與相見贈詩曰怪得名稱野元來性不群仍為延譽由是人始重之真宗西祀遣中使召之野閉户踰垣而遁熙寧六年有司言四月一日當蝕上為徹樂避正殿一夕微雨不見日食是日有皇子之慶蔡子正為樞密獻詩云昨夜薰風入舜韶君王方避正衙朝陽暉已得前星助隂沴潛隨夜雨銷其敘四月一日避正殿皇子慶誕隂雲不見日食已盡矣當時無能過云成都妓單氏贈陳希夷詩云帝王師不得日月老應難名士多稱之唐宋遺史晏元獻覽李慶冨貴曲云軸傳曲譜金書字樹記花名玉篆牌曰此乃乞兒相未嘗諳冨貴者故公每言冨貴不及金玉錦繡惟説其氣象若樓臺側畔楊花過簾幕中間燕子飛梨花院落溶溶月柳絮池塘淡淡風是也公自以此句語人曰窮人家有此景否宋莒公見公佳句皆書於齋壁如無可奈何花落去似曽相識燕歸來靜尋啄木藏身處間看逰絲到地時樓臺冷落收燈夜門巷蕭條掃雪天已定復搖春水色似紅如白野棠花之類后人不可及青箱雜記蘇為知吳興日多作詩內一篇最佳云野艇間撑處湖天景亦微春波無限緑白鳥自由飛柳色濃垂岸山光冷照衣時携一壺酒戀到晚涼歸又在宣城作十首以宣城為目內宣城花一篇首出曰宣城花疊嶂樓前簇綺霞若非翠露陶潛宅即是紅藏小謝家又在邵武有詩曰愛重八九月登臨髙下樓林紅雲白處寒瀨泊漁舟丞相王文惠有宮詞云一聲啼鳥禁門靜滿院落花春日長野步云桑斧科春色漁歌唱夕陽皆佳句也楚僧惠崇工於詩題楊雲卿郊居云河分岡勢斷春入燒痕青長信詞云隂井生秋早明河徹曉遲江行晚泊云嶺暮清猿急江寒白鳥稀上谷相池上作云歸禽動踈竹落果響寒塘贈陳少府云野人傳相鶴山叟學彈琴夜坐云春淺水生井宵分月上簷贈凝上人云掩門青檜老出定白髭長送逐客云浪經蛟浦闊山入鬼門寒經緣公舊寺云遺偈傳諸國留真在一峰塞上云河氷堅瘦馬塞雪密藏雕喜長公至云久别年顔改相逢夜話長隱者云多年不道姓近日旋移家宿東林寺云鳥歸山墮雪僧去石況雲上楊內翰云露寒金掌重天近玊繩低柳氏書齋云著書驚日短彈劍惜春深上王太尉云探騎通畨壘降兵逐漢旗田家秋夕云露下牛羊靜河明桑柘空舟行云林斷城隍出江分島嶼回寄梅蘇州云鎖城山月上吹角海鷗驚宿楊侍郎東亭云卷幔來風逺移床得月多送程至云白浪分吳國青山隔楚天宿隱靜寺云空潭聞鹿飲踈樹見僧行送錢供奉云劍戟明山雪旌旗濕海雲梅鼎臣河亭云曠野行人少長河去鳥平宿肇公齋云月高山舍過霜落石門深盧經西歸云雪多秦木逈雲盡漢山孤濠梁夜泊云夜闌潮動舸天逈月臨城崔仰秋居云葉影風中靜蟲聲月下多贈裴使君云行縣山迎舸論兵雪繞旗早行云繁霜衣上􅊜殘月馬前低秋夕云磬斷蟲聲出燈回鶴影沉書韓退之屋壁云移家臨醜石租地得靈泉秋夕懷長公云秋近草蟲亂夜遙霜月低觀宴鄉老云海鷗聽舜樂山老泛堯觴贈素上人云午食下林鳥夜禪移冢狐夏夜云扇聲猶泛暑井氣忽生秋江行早發云殘月楚山曉孤煙江廟春翻經館靖少卿房云𣑽容分古像唐語入新經題太保道院云鶴傳滄海信僧和白雲詩秋夕懷汪白云塞禽棲古柳破月入微雲贈白上人云花漏沉山月雲衣起海風喜陳助教至云樓中天姥月座上杜陵人冬日野望云人歸岡舍近鴈過渚田遙送人知榮州云山色臨巴逈江流入漢清春深道中云湘雲隨鴈斷楚路背人遙贈李道士云松風吹髮亂岩溜濺棋寒栖霞寺云境間僧度水雲盡鶴盤空林逋河亭云古路隨岡起秋帆轉浦斜楊祕校池上云禽寒時動竹露重忽翻荷魏仲先山亭云嵐重琴棋􅊜風長枕簟寒塞上云離磧鴈衝雪渡河人上氷寄白閣上人云夜𣑽通雲竇秋香漏石叢陜西道中云關河雙鬢白風雪一燈青送防秋楊將軍云殺氣生龍劍威風動虎旗瓜州亭子云落潮鳴下岸飛雨暗中峰賀劉舍人云日躔黃道逈春入紫微深除夜云寒燈催臘盡曉角喚春歸幽并道中云鴈行沉古戍雕影轉寒沙送僧歸天台云景霽雲回合秋風林動搖過陳希夷舊居云亂水僧頻過荒松鶴不還宿橫江館云露館濤驚枕空庭月伴琴維邢道中云馬渡氷河闊雕盤磧日高報國寺秋居云驚蟬移古柳鬪雀墮寒庭書早上人房云松風傳夕磬溪霧擁春燈觀南郊天仗云霓旌搖曉色鳳吹繞春雲贈義上人云坐石雲生衲添泉日入瓶升平詞云萬國無形治三邊不戰平國清寺云瞑鶴棲金剎秋僧過石橋吕氏西齋云雪殘僧掃石風動鶴歸松劉參幽居云風暖鳥巢木日高人灌園楊都官池上云竹風驚宿鶴潭月戲春魚書方嶠壁云圭竇先知曉盆池別見天送陳舍人巡撫云月露踈寒柝雲濤閃畫旗宿齊上人禪齋云鶴盤金剎露龍蟄玉瓶泉春日寇宣替池上云暄風生木末遲景入泉心七夕云河來天上闊雲度月邊輕贈王道士云海人來相鶴山狖下聽琴送荆州云畫鷁浮秋浪金鐃響夕雲江城晚望云丹楓映郭逈緑嶼背江深題王太保山亭云危溜含清瑟飛花點玉觴送李秦州云朱旗臨雪卷畫角入雲吹晝上人西齋云云孤雲還靜境逺籟發秋聲李太傅山莊云圍棊分雪石汲井動金沙宮中詞云井含春氣碧樓轉夕隂清送吳袁州云鳥瞑風沉日天清月上旗寄肇公云斜吹鳴金錫歸雲擁石床塞上云古戌生煙直平沙落日遲贈嗣上人云拂石雲離帚烹茶月入鐺舟行云逺嶼迎檣出寒林帶岸回送來上人云來時雲擁衲别後月隨笻馬蠙淮亭云路橫岡燒斷風轉浦帆斜贈戴殿前云劍靜龍歸匣旗開虎繞竿高諲書齋云品畫逢名客橫琴憶古賢太乙山云雲隂移漢塞石色入晴天上送人云地遙群馬小天闊一雕平范溶園池云江花凌霰發山溜入池深獵騎云長風躍馬路小雪射雕天高略書院云古木風煙盡寒潭星斗深送假工部河北漕云渡河風動斾巡部雨霑車題高生山閣云對酒淮潮起題詩楚月新經明大師房云門掩前朝樹心垂別郡峰送李堪云秋聲動群木暮色起秋山並同前歐陽文忠公守滁見王元之謝上表云諸縣豐登絶少公事全家飽暖共荷君恩因成詩云諸縣豐登少公事全家飽暖荷君恩托遺楊軒字公逺衡州人嘗有燈詩曰解照日月不照處獨眀天地未明時同前李煜作詩大率多悲感愁戚如青鳥不傳雲外信丁香空結雨中愁鬢從今日添新白菊是去年依舊黃之類然思清句雅可愛翰府名談陳亞大卿士大夫徒傳其諧謔之語不知其作詩甚佳如浪平天影接山盡樹根回得作者之格趙師民龍圖有春日即事詩云委地露花啼曉淚拂堤煙柳弄春容又如麥天辰氣潤槐夏午隂清曉鶯林外千聲囀芳草階前一尺長皆佳句並同前太常博士黃孝先字子忠為咏懷詩曰日者未知裴令貴時人爭笑禰生狂又作重五詩曰風簷燕引五六子露井榴開三四花春明退朝録孟賔于子名歸唐寓廬山學得瀑布一聮云練色有窮處寒聲無盡時鄰房有人亦得此聮互誦其句助教不能理因送江州以全篇定之而歸唐勝焉大為時賢所知夏寶松廬陵人與劉洞唱和為節度使陳德誠所知德誠贈詩曰建水舊傳劉夜坐劉洞有夜坐詩螺川新有夏江城寶松有江城詩曰鴈飛南浦鍾初動月滿西樓酒半醒又云曉來羸駟依前去雨後遙山數點青皆佳句江南野録又雅言系述别有寶松宿臨江驛全篇并劉洞宿寶松山齋詩以寶松為保松唐仁傑全州人苦吟陳德誠出守池陽仁傑以詩貽之云紅斾渡江霞蘸水青蛇出匣雪侵衣德誠善之勉之入金陵會休沐朝逹集于升元寺召之坐酒行請仁傑賦登閣詩立談而成其中有句云雲散便冝千里望日長斜占半城隂其餘亦可觀贈嘉禾峰僧云只住此山能有意向來求佛本無心時論與之並江南野録施肩吾好作諸詩著山居百韻如荷翻紫蓋搖波面蒲瑩青刀插水湄煙粘薜荔龍鱗軟雨壓芭蕉鳯尾垂錢鄧師嘗舉思賈誼兩句云可憐半夜虛前席不問蒼生問鬼神后人何可及談苑潘逍遙貧居詩曰長喜詩無病不憂家更貧峽中聞猿曰向須三呌絶已恨一聲多哭高舍人詩曰生前是客曾投卷死後何人與撰碑張乖崖贈逍遙詩云莫嗟黑鬢從頭白終見黃河到底清宋白尚書贈云宋朝歸聖主潘閬是詩人退朝録蜀僧希晝遊鴈蕩山云天長來月正木末度猿稀答黃桂州云束書逢嵗嗣去夢歷峰危送廣漕云春生桂嶺外人在海門西送僧東歸云帆影先寒鴈經聲隱暮潮宋承旨林亭云雪溜垂危石棊燈射逺林贈僧云漱齒氷溪逺聞蟬雪屋深送人云玊繩天闕近金柝海城秋贈勾學士云曉天金馬路晚嵗石霜心寄人云山日秋光短江虹晚影低送新津尉云劍月啼猿苦江沙濯錦寒北宫書亭云花露盈蟲穴梁壁墮燕泥贈關上人云寄禪關樹老乞食塞城羌送僧歸新安云風泉舊聽僧窗改雲穴曾行鳥徑殘春山云芳樹侵雲老孤泉落石危送人歸南海云落日橫秋島寒濤兀夜船浙僧寶通題相國寺云下朝人帶天香出入定僧迎御杖頭僧守恭佛迹峰云市髮人來絶㗸花鹿去多僧行肇送僧云定錫樵停斧窺人鳥立槎送人之鄞江云江聲鰲背出帆影斗邉飛僧簡長送人歸寧州云煙壘沉寒角霜空擊怒雕尚能送僧歸浙右云霜洲楓落盡水館月生寒送僧歸四明云古寺山光後重城海氣圍送人云西風隨鴈急寒柳向人踈送孫大諌知永興云關河虎符重殿閣獸樽間僧知仁溪居云寒聲病葉落曉色凍雲開送僧歸天台云路遙無去伴山疊有啼猿冬夕云風窗燈易滅雪屋夜偏寒僧休復送道士西逰云日暮長安道秋深太白峰僧惟鳯秋日送人云去路正黃葉别君堪白頭哭度禪師云海客傳遺偈林僧寫病容談苑楊文公言自雍熙𥘉歸朝迄今三十年所閲士大夫多矣能詩者甚解如侍讀兵部宿擅其名而徐鉉梁周翰范宗黃夷簡皆前輩鄭文寶薛映王禹稱吳淑劉師道李宗諤李建中李維姚鉉陳堯佐悉當時儕流後來著聲者如路振錢熙丁謂錢易梅詢李拱蘇為朱嚴陳越王曾李堪陳詁吕夷簡宋綬邵煥晏洙江任焦宗古布衣有林逋周啓明錢氏諸子有封守惟濟供奉錢昭度即曲有今南鄭殿丞楊黎州家居及高官簿覺宗人字牧之並有佳句可以􅎥舉而錢惟演劉筠特工于詩楊徽之侍讀春望云杳杳煙蕪何處盡搖搖風柳不勝垂寒食云天寒酒薄難成醉地逈臺高易斷魂塞上云戍樓煙自直戰地雨長腥僧舍云偶題岩石雲生筆間繞庭松露􅊜衣湘中舟行云新霜染楓葉皓月借蘆花哭江為云廢宅寒塘水荒墳宿草煙嘉璟川云青帝巳教春不老素娥何惜月重圓又云浮花水入瞿塘峽帶雨雲歸越嶲州元夜云雲歸萬年樹月滿九重城宿東林云開盡菊花秋色老落遲桐葉雨聲寒徐鉉逰木蘭亭云蘭橈破浪城隂直玉勒穿花苑樹深觀習水戰云千帆日助隂山勢萬里風馳下瀨聲病中云向空咄咄頻書字忘世滔滔莫問津謫居云野日蒼茫悲鵩舍水風隂溫弊貂裘陳祕監歸泉州云三朝恩澤馮唐老萬里江山賀監歸宿山寺云落月依樓閣歸雲擁殿廊梁周翰應制云百花將盡牡丹拆十雨𥘉晴太液春黃夷題人山居云宿雨一畨𬞞甲拆春山幾焙茗旗香鄭文寶郊居云百草千花路斜風細雨天重經貶所云過關已躍摴蒱馬悮喘猶驚顧兔屏洛城云星沉會節歌鍾早天半上陽煙樹微贈張靈州云越絶曉殘蝴蝶夢單于秋引畫龍聲長安送别云杜曲花光濃似酒灞陵春色老于人送人歸湘中云滿帆西日催行客一夜東風落楚梅南行云失意慣中遷客酒多年不見侍臣花棲靈隱寺云舊井霜飄仙界橘雙溪時落海邊鷗送人知韶州云碧落春風老朱陵古渡頭永熙陵云承露氣清駒送日觚稜人靜鳥呼風邊上云鬢間相似雪峰外寂寥煙薛映送人知鄂州云黃鶴晨霞旁樓起陀頭秋草繞碑荒吳俶送朱致政云洛殿夜涼初閣筆渚宮歲晚得懸車劉師道寄別云南浦未傷春草碧北山仍愧曉猿驚與張必云久師金馬客勍敵玊溪生荷花云有路期奔月無媒與嫁春殘花云金谷路塵埋國艷武陵溪水泛天香寄陳龍圖云晨瞻北斗天何逺夢斷南柯日未沉歎世云野馬飛窗日醯雞舞甕天春雪云青帝翠華沉物外素娥孀影吊雲端咏雪云三千世界銀成色十二樓臺玉作層湘中云逝波帝子魂何在夢草王孫怨未歸李宗諤春郊云一溪曉緑浮鸂鶒萬樹春紅呌杜鵑贈蘇承旨云金鑾後記人爭寫玉署新碑帝自書李建中送人云山程授館聞鴻夜水國還家欲雪天李維渚宫亭云故宫芳草在往事暮江流朱致政云清朝納䘵猶狂健白首還家正太平和人贈馬太保云轉盼回嵓電分髯磔蝟毛寄洪湛云謪去賈生身健否秋來潘嶽鬢斑無姚鉉錢塘郡云踈鍾天竺曉一鴈海門秋陳堯佐潮州召還云君恩來萬里客路出千山送种放云供帳開天苑傳呼度國門送人越州云風樵若耶路霜橘洞庭秋送朱荆南云部吏百函通爵里從兵千騎屬鞬櫜錢熙送人金陵拜掃有云鶴歸巳改新城郭牛卧重尋舊墓田丁謂和錢易曰珊瑚新筆架雲母舊屏風送章安南云梅花過嶺路桃葉渡江船送章明州云泣珠泉客通關市種玉仙翁寄版圖送陳荆南云楚子夢雲鈴閣密郢人歌雪射堂開錢易晝景云雙峰上簾額獨鵲裊庭柯芭蕉云緑章封事緘初啓青鳯求凰尾乍開梅詢隂陵云千里漢圍合一夜楚歌聲李拱春題村舍云犬眠花影地牛牧雨聲坡蘇為送劉端州云夜浪珠還浦春泥象印蹤朱嚴贈徐常侍云寓直有誰同騎省立班獨自戴貂冠陳越侍宴云千鍾人既醉九奏鳯來儀與劉慘云莫哀城下酌不廢洛中吟送李秦州云擁路東方騎懸腰左顧龜王曾送李駙馬拜陵云人畏軒臺久春歸雨澤多李堪哭韓黎州云桐鄉留語葬銘路在生悲送周建州云海月隨帆落溪花繞驛流送人行云雷風有約青蚪起霜露無情紫蕙枯退居云雨密絲桐潤潮平釣石沉陳詁間居云籠雞對窗語羅雀繞門飛吕夷簡早春云梅無驛使飄零盡草怨王孫取次生九日呈梅集仙人云人歸北闕知何日菊映東籬似去年寒食云人為子推初禁火花愁青女再飛霜宋綬送人知江陵云竒才劍客當前隊麗賦騷人託後車送人知洪州云江涵帝子翬飛閣山際真君鶴馭天送周賢良云楚澤傷春怨鶗鴂長安索米愧侏儒趙復送晏集賢南歸云船官風破浪關吏鼓通晨晏元獻與張臨川云籬邊菊秀先生醉桑下雛嬌稚子仁又云東陽詩骨瘦南浦别魂銷送章明州云騷客登山知有助秦源雞犬更相聞送人知洪州云干斗氣沉龍巳化置芻人去榻猶懸並同前江任送人云珠盤臨路斗印入鄉提玉堂詩話焦宗古送人逰蜀云芳樹高低啼蜀魄朝雲濃淡極巴天贈周賢良云南陽客自稱龍卧東魯人應歎鳯衰林逋湖山云片月通蘿徑幽雲在石牀周啓明近臣疾愈云一丸童子藥五返使人車送皇甫提刑云鴟夷江上畬田稔牛斗星邊貫索空錢惟濟太一宫醮云林下焚香連宿霧樹間鳴珮起棲鸞從駕西巡云曉陌壺漿滿春風騎吹長故主第云鳯簫通碧漢星斗辨靈源錢昭度村居云黃蜂衙退海潮上白蟻戰酣山雨來大寒云雨𬒳北風吹作雪水愁東海亦成氷金陵云西北高樓在東南王氣銷梅花云東北風吹大庾嶺西南日映小寒天鴈云三年別館風吹入萬里長沙月照來秋逰華山云人間路到三峰盡天下秋隨一葉來南鄭殿丞云青鳥幾傳王母信白鵝曾換右軍書將至京云近闕巳瞻龍虎氣思鄉猶望斗牛星楊黎州赦至云山川百蠻國雨露九天書寄逺云胡越自為迢遞國參商元是别離星自遣云天上羲輪都易識人間堯曆自難逢哭儲屯田云部中車雨春無潤天上星郎夜損光感悟云頓纓狂走鹿吐沫倦逰鱗心知云逺別苦驚雲聚散相逢多悟月盈虧自咏云剛腸欺竹葉衰鬢怯蘆花淚云一斑早寄湘川竹萬點空遺峴首碑竹簟云若非琥珀休為枕不是琉璃莫作屏春晝云人歸漢后黃金屋燕在盧家白玊堂並同前牧之寄人云世味嫌為枳時光怨落蓂間居云歌懷飯牛起書憤抱麟成蟬云二子自不食三閭何獨清登樓云逺水淨林色微雲生夕陽塵云巳傷花榻滿休妬畫屏飛談苑西洛古都荒臺廢沼遺迹依然見於詩多矣惟錢文僖公一聮最為警䇿云日上故陵煙漠漠春歸空苑水潺潺裴晉公緑野堂在午橋南往時屬張相齊賢家罷相歸終日與客宴其間惟鄭文寶工部一聮為警絶云水暖鳬鷖行哺子溪深桃李卧開花人謂不減王維杜甫錢詩好句尤多而鄭句不惟當時人莫及雖其集中若及此者亦少歐公詩話詩話總龜卷之十二百家詩話總龜後集卷之十二評論門或問鄭綮相國近有詩否答云詩思在灞橋風雪中驢子上此處那得之北夢瑣言載綮雖有詩名本無廊廟之望及登庸中外驚駭太原兵至渭北天子震恐渴于攘却綮請于文宣王諡號中加一哲字其不究時病率此類愚謂此人止可置之風雪中令作詩也䂬溪王夷甫蔡景節並號口不言錢二子皆因弊矯之者衍以其妻貪淫黷貨至藉俠士李陽以懼之樽在臨海其婢納女巫之賂為百姓撾登聞鼓其絶口蓋有由然如子美張籍皆兒散寫乞錢書太白頻將三十萬盡付酒家錢岑參間居耐相訪正有床頭錢小杜清貧長欠一杯錢東坡滿江風月不論錢山谷青山好去坐無錢曾不害諸公之高也孟郊詩最淡且古坡謂有如食蟛􅒹竟日嚼空螯退之論數子乃以張籍學古淡東野為天葩吐竒芬豈勉所長而諱所短耶抑亦東野古淡自足而不待學歟並同上武元衡詩不多集中有酬嚴司空荆南見寄詩兩篇一云金貂再領三公府玉帳連封萬户侯一云漢家征鎮委條侯虎節龍旌居上頭皆續以簾捲青山巫峽雨煙開碧樹渚宫秋第三聮一云劉琨坐嘯風清塞謝眺題詩月滿樓一云金笳曾掩故人淚麗句初傳明月樓皆續以白雪調高歌不得美人相顧翠娥愁人訝其大同余謂乃元衡刪潤之本集中兩存之爾當以前篇為正後篇誠未工也丹湯集李太白杜子美詩皆掣鯨手也余觀太白古風子美偶題之篇然後知二子之源流逺矣李云大雅久不作吾衰竟誰陳王風委蔓草戰國多荆榛則知李之所得在雅杜云文章千古事得失才心知騷人嗟不見漢道盛于斯則知杜之所得在騷然李不取建安七子而杜獨取垂拱四傑何耶南皮之韻固不足取而王楊盧駱亦詩人之小巧者爾至有不廢江河萬古流之句褒之豈不太甚乎同上少遊贈坡詩云節毛零落氈餐雪辨舌縱橫印佩金語太不等子瞻譏集句云天邉鴻鵠不易得便令作對隨家雞此詩正類此黃常明東坡文章妙一世然在掖垣作吕吉甫謫詞繼而吕復用遂納告毀抹在翰苑作上清儲祥碑繼而蔡元長復作遂遭磨毀非特此也蘇叔黨云昔公為藏經記云傳于世或以為非在惠州作梅花詩至有以為笑此皆士大夫以文鳴者其説能使人必信乃謬妄如此信知識古戰場文者鮮矣子由嘗跋東坡遺稿云展卷得遺草流涕􅊜冠纓斯文久衰弊流涇自為清科斗藏壁間見者空嘆驚廢興自有時詩書付西京陽秋嘗恨王子猷作此君語輕以難名者告人遂使庸夫俗子忘意其間酤坊茗肆適以汚纍之謪仙云但得酒中趣勿為醒者傳此理信然和靖招靈魄云百千幽勝無人見説向吾師是泄機東坡云此味只憂兒輩覺逢人休道北囱涼人生此樂須天賦莫遣兒曹取次知使子猷知此必鉗其喙也䂬溪老杜畏人有云門徑從榛草無心待馬蹄又直須上畨看成竹客至從嗔不出迎將遺物離人矣答嚴八乃云只須伐竹開荒徑拄杖穿花聽馬蹄又有草萊無徑欲教鋤亦如厭就成都卜而云慿將百錢卜漂泊問君平自智者觀之則為遊戲篇章得失自在俗士拘泥則全不相應也東坡答林塘云古今正自同歲月何必書遊香積山又云尋幽恐不繼書版記歲月蕭思話先於曲阿起宅有間曠之致子惠基嘗謂所親曰婚嫁畢當歸老舊廬故元次山招陶别駕云無惑别婚嫁竟為俗務牽退之云如今便可爾何用畢婚嫁杜茅屋為風所破歌云自經喪亂少睡眠長夜沾􅊜何由徹安得廣厦千萬間大庇天下寒士俱歡顔風雨不動安如山於乎何時眼前突兀見此屋吾廬獨破受凍死亦足白樂天新製布裘云安得萬里裘蓋褁周四垠穩暖皆如我天下無寒人新製綾袴成百姓多寒無可救一身獨暖亦何情心中為念農桑苦耳裏如聞飢凍聲爭得大裘長萬丈與君都蓋洛陽城皆伊尹自任一夫不獲之辜也或謂子美詩意寧苦身以利人樂天詩意推身利以利人二者較之少陵為難然老杜飢寒而閔人飢寒者也白氏飽暖而閔人飢寒者也憂勞者易生于善慮安樂者易失于不思樂天疑優或人又謂白氏之官稍逹而少陵尤卑子美之語在前而長慶在后逹者宜急卑者可緩也前者唱導後者和之耳同合而論則老杜之心蓋賢矣老杜當干戈騷屑之時間關秦隴負薪採梠餔糒不給困躓極矣自入蜀依嚴武始有草堂之居觀其經營往來之勞備載于詩皆可考也其曰萬里橋西宅百花潭北莊言其地也經營上元始斷手寶應年者言其時也雪裏江船渡風前徑竹斜寒魚依密藻宿鷺起圓沙者言其景物也至于草堂塹西無樹林非子誰復見幽深則乞樹木于何少府之詩也草堂少花今欲栽不問緑李與黃梅則乞果栽于徐少卿之詩也王侍御携酒草堂則喜而為詩曰故人能領客携酒重相看王録事許草堂資不到則戲而為詩曰為嗔王録事不寄草堂資蓋其流離貧窶之餘不能以自給皆因人而成也其經營之勤如此然未及黔突避成都之亂入梓客閬其心則未嘗一日不在草堂也遣弟檢校草堂則曰鵝鴨冝長數柴荆莫浪開寄題草堂則曰尚念四松小蔓草勿拘纏送韋郎歸成都則曰為問南溪竹抽梢合過墻塗中寄嚴武則曰常苦沙崩損藥欄也從江檻落風湍每致意如此及成都亂定再依嚴武為節度參謀復歸草堂則曰不忍竟捨此復來剃榛蕪入門四松在步堞萬竹踈則其喜可知矣未幾嚴武卒倣徨無依復捨之而去以史及公詩考之草堂斷手于寶應之𥘉而永太元年四月嚴武卒是年秋公寓夔州雲安縣有此草堂者終始秪得四載而其間居梓閬三年公詩所謂三年奔走空皮骨是也則安居草堂者僅閲歲而巳其起居寢興之適不足以償其經營往來之勞可謂一世之羈人也然自唐至今巳數百載而草堂之名與其山川草木禽獸公詩以為不朽之傳蓋公之不幸而其山川草木之幸也葛常之僧祖可俗蘇氏伯固之子飬直之弟也作詩多佳句如懷蘭江云懷人更作夢千里歸思欲迷雲一灘贈端師云窗間一榻篆煙碧門外四山秋蕊紅等句皆清新可喜然讀書不多故變態少觀其體格亦不過煙雲草樹山川鷗鳥而巳而徐師川作其詩引乃謂自建安七子南朝二謝唐杜甫韋應物柳宗元本朝王荆公蘇黃妙處皆心得神解無乃過乎師川作畫虎行未章云憶昔豫頑少小時先生教誦荆公詩即今老舊無新語尚有廬山病可師愛其詩如是也丹陽集元和十一年六月武元衡將朝夜漏未盡三刻騎出里門遇盜死于墻下許孟容謂國相橫尸而盜不得為朝廷耻遂下詔募捕竟得賊始得張晏者王承宗所遣訾珍者李師道所遣也初元衡䇿李錡之必反已而錡果反就誅由是諸鎮桀鷔者皆不自安以致于是劉夢得有代靜安佳人怨詩云寶馬鳴珂踏曉塵魚文七首犯車茵適來行哭里門外昨夜畫堂歌舞人又云秉燭朝天遂不回路人彈指望高臺墻東便是傷心地夜夜秋螢飛去來余考夢得為司馬時朝廷欲澡濯輔郡而元衡執政乃格不行夢得作詩傷之而託于靜安佳人其傷之也乃所以快之歟韻語陽秋黃庶字亞夫嘗有怪石一絶傳于世云山鬼水怪著薜荔天祿辟邪眠莓苔鉤簾坐對心語口曾見漢家池館來人士膾炙以為竒作唐張碧詩亦不多見嘗有池上怪石詩云寒姿數片竒突兀曾作秋江秋水骨先生應是壓風雷著向池邉塞龍窟我來池上傾酒尊半酣書破青煙痕參差翠柳擺不落筆頭驚怖黏秋雲我聞吳中項容水墨有高價邀得將來倚松下鋪却雙僧直難掉掉首空歸不成話二詩殆未易甲乙也同上百家詩話總龜後集卷之十二
