front:
  text: 增修詩話總龜卷之三十
  hash: sha256:813c2227c8edb388ffc9745356f6509344748d2a4ddd5a7a3a8e30e8b9e55186
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_030-1a}
body:
  text: 道僧門道士沈廷瑞彬之子也性坦率直造縣宰之坐宰方治訟而廷瑞至宰戲之曰沈道士何時成道廷瑞應聲曰何須問我道成時紫府清都自有期手握藥苗人不識體含仙骨俗爭知宰慙江南野録吳崇嶽泉州人也為龍興觀道士辟榖多年常登其宫松梢禮拜據松枝可六七十尺福建漕使周謂因請隨行抵于德化縣縣治之東有古松一株高八九十尺上有鶴巢乃命崇嶽登之宛若猿狖容易直上出鶴巢之外端身飛步手無攀緣就纎枝拜如平地其松枝柔軟隨步低昻略無損處周謂乃為詩贈云楮為冠子布為裳吞得丹霞夀最長混俗性靈常樂道出塵風格早休糧枕中經妙誰傳與肘後方新自寫將百尺松梢幾飛步鶴棲枝上禮虛皇太平興國中詔入郡閣雅談楚郎中失其名宦逰江東泊金陵岸下子弟輩逰茆山見一老僧住一小庵謂諸子曰何所至此告以因逰賞林泉而來日晚欲丐宿可乎僧曰舍陋不可相容此二三里有寺可宿因指諸子令往抵寺巳暮矣寺僧問誰指來諸子曰山下老僧寺僧曰聞此有老僧甚久未之見也凌晨往則庵中巳無人惟松上有詩云數株松檜食不盡一沼芰荷衣有餘剛𬒳傍人相問當老僧今日又遷居托遺僧無夢嘗在府畿村落中求化手持大木牌題詩二絶曰心為車兮身為軾車動軾隨何意息交梨火棗是誰無自是不為荆與棘身為客兮心為主主人和平客安堵若還客主不康寧精神必定隨君去翰府名談景德中日本僧照寂入貢三司使丁晉公甚恱之晉為言姑蘇山水竒秀照寂心愛而留因止于吳門寺其徒不願從者遣數人歸本國後以黑金水瓶寄晉公并詩曰提携三五載日用不曾離曉井斟殘月春爐釋夜澌鄱銀難免侈萊石易成虧此器堅還實寄公應可知談苑僧護國江南人也攻詞翰題醴陵玉仙觀云白雲至今凝不散星壇松殿幾千秋往往笙歌生夜半瀑布西行遇石橋黃精採根還採苗路逢一人擎一碗茶花夜來風吹滿又言家住在東坡白大相逢邀我過南山石上有棊局曾使樵人爛斧柯此篇絶佳詩僧中下可得也大曆末禪僧元覽住荆州陟岵寺道高風韻人不可親章璪嘗畫松於齋壁符載贊之衛象詠之亦一時四絶覽悉加堊焉人問其故曰無事疥吾壁也僧那即其甥發瓦探壞墻薰鼠覽未嘗責弟子議論而布衣一食亦不稱之或怪問之乃題詩于竹曰大海從魚躍長空任鳥飛古今詩話沙門貫休鍾陵人精于筆札荆州成中問其筆札法休曰此事須登壇可授安可草草而言成令䘖之乃遞於黔中因為病鶴詩見意曰見説氣清邪不入不知爾病自何來同前唐昭宗以錢武肅平董昌功拜鎮東軍節度使自稱吳越國王貫休投詩曰貴逼身來不自由幾年勤苦蹈林丘滿堂花醉三千客一劍霜寒十四州萊子衣裳宫錦窄謝公篇詠綺霞羞他年名上凌煙閣豈羡當時萬户侯武肅愛其詩遣諭令改為四十州乃可相見貫休性𥚹答曰州亦難添詩亦難改間雲孤鶴何天不可飛遂入蜀以詩投孟知祥詩云一瓶一鉢垂垂老萬水千山得得來古今詩話溫州鴈蕩山自古圖史不載按西域書云諾矩羅居震旦東南大海祭鴈蕩山芙蓉龍湫唐貫休作贊云鴈蕩經行雲漠漠龍湫宴坐雨濛濛北山南山有芙蓉峰下有芙蓉驛前瞰大海山頂有大池相傳以為鴈蕩有二潭以為龍湫又有經行臺宴坐峰皆以貫休詩得名也唐大興善寺東廊之南有僧不出院轉法華經三萬七千部夜常有狐子來聽長慶初庭前有牡丹一朵合歡僧幽之詩曰三萬蓮經三十春平生不踏院門塵杜牧之弱冠登第再中制科因與二三同年城南逰覽至丈六寺有禪僧擁褐坐與之語可佳問杜姓名具以對又曰修何業傍人以纍捷誇之笑曰皆不知也牧之嘆訝久之作詩云家住城南杜曲旁兩枝仙桂一時芳老僧都未知名姓始覺空門氣味長蜀僧遠國傷蜀詩曰樂極悲來數有涯歌聲才歇便興嗟牽羊廢主尋傾國逐鹿姦臣盡喪家丹禁夜涼空鎖月後庭春老謾開花兩朝基業都成夢林木蒼蒼噪暮鴉南方浮屠能詩者多矣往往多不顯其名福州有一僧作詩百餘篇其中佳句有云虹收千嶂雨潮展半江天又有詩云詩因試客分題僻棋為饒人下子低不減於古人也閩僧懷濬有詩二絶云家在閩山東復東其中歲歲有花紅而今再到花紅處花在舊時紅處紅家在閩山西復西其中歲歲有鶯啼而今再到鶯啼處鶯在舊時啼處啼人多誦之大曆中澤潞間有僧號普滿或歌或笑言事多驗建中初潞州佛寺題詩一首而去詩曰此水連涇水雙珠血滿川青牛將赤虎方號太平年此水泚字涇水自涇川兵亂雙珠滔泚也青牛興元二年乙丑赤虎是歲改元元年丙寅是年賊平陳文惠赴端州􅋈舟廬陵有胡僧叩舷謂公曰虎目鳯鼻猿身平地不能為也當有攀附然後有所食位極卿相僧為詩一絶曰虎目猿身形最貴須因攀附即升高知公今向端溪去助子清風泛怒濤公後登庸青瑣集廬山佛手巖在絶頂李氏有國日行因禪師居焉李氏詔居棲賢寺未幾一夕大雪逃居舊隱嘗煮茶延僧起托巖扉立化余作偈曰前朝詔住棲賢寺雪夜逃居岩石間想見煮茶延客處直緣生死不相關東吳僧道潛經臨平作詩云風蒲獵獵弄輕桑欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲東坡見之大稱賞及坡守徐潛訪之館于逍遙堂士大夫欲識之坡饌客罷俱而來坡遣一妓乞詩詩曰寄語巫山窈窕娘好將魂夢惱襄王禪心巳作沾泥絮不逐春風上下狂一座大驚然性偏憎凡子作詩云去歲春風上苑行爛窺紅紫厭平生如今眼底無姚魏浪蕊浮花懶問名士論少之其作詩追法淵明有逼真處如曰數聲柔櫓滄浪外何處江村人夜歸是也冷齋夜話西湖僧順怡然清苦賦十竹詩城中寸土如寸金幽軒種竹只十箇春風慎勿長兒孫穿我階前緑苔破林下詩云久服林下逰頗識林下趣從渠緑隂繁不礙清風度間來石上眠落葉不知數山鳥忽飛來啼破幽寂處荊公愛之陳瑩中謫合浦以書抵余為負華嚴經入嶺有偈曰大士遊方興盡回家山風月絶纎埃杖頭多少間田地挑取華嚴入嶺來余和之曰因法相逢一笑開俯看人世過飛埃湘南嶺內休分别圓寂光中共往來聞嶺外大雪作二偈寄之曰傳聞嶺外雪壓倒千年樹老兒拊手笑有眼未曾覩故應潤物材一洗瘴江霧寄語牧牛人莫教頭角露又曰偏界不曾藏處處光皎皎開眼失蹤由都緣太分曉園外忽生春萬瓦粲一笑遙知忍凍人未悟安心了靜禪師渡溪為漲流所陷童子掖至岸坐沙石間垂頭如雨鶴忽指溪作詩曰春天一夜雨雱𩃱添得溪流意氣多剛把山僧推倒却不知到海復如何後無疾而化余夜夢逢一道士一奴負酒瓢隨之道士邀余坐茗坊奴竊飲瓢無有乃笑道士詬欲杖之顧奴曰汝從覺範求詩曰難藏為香釁易滿坐遍小開口所有竭饞奴法當笑句句皆譏其𥚹可怪也璉禪師工詩舒王以其詩示歐公公曰此道人肝臟饅頭是中無一點菜氣仁廟留住淨因禪院作偈進乞還山林曰千簇雲山萬壑流間身歸老此峰頭殷勤願祝如天夀一炷清香滿石樓又曰堯仁况是如天闊乞與孤雲自在飛桂林僧景淳工詩福老衲為余言淳意苦而深世不可遽解如曰夜色中旬後虛堂坐幾更隔溪猿乍呌當檻月初生又曰後夜客來稀幽齋獨掩扉月中無事立草際一螢飛余時方十六七心不然之筠溪快山有虎有牧童為虎逐牛捍護之竟死石門老衲文公為余言之為作詩以諷含齒𬒳髮而不義者然余徒能諷之其能巳之哉頌曰快山山淺亦有虎時時妥尾過行路一豎地坐牧兩牯以捶捶地不知顧虎搏豎如鷹搦兔兩牛來奔虎棄去因往疴癢挨老樹牯則喘伺同守護虎竟不得此牧豎豎雖不活牯無負一村囂傳共鳴鼓而虎巳逃不知處嗟乎異哉兩太武高誼可與貫髙伍今走仁義名好古臨事真情乃愧汝此事可信文公語為君落筆驚風雨並同前增修詩話總龜卷之三十百家詩話總龜後集卷之三十詠茶門唐趙璘𫐠因話録載其家兵部君性尤嗜茶能自煎謂人曰茶須緩火灸活水煎坡有活水還須緩火煎恐亦用此黃常明五代時鄭遨茶詩云嫩芽香且靈吾謂草中英夜臼和煙搗寒爐對雪烹維憂碧粉散常見緑花生最是堪珍重能令睡思清范文正公詩云黃金碾畔緑塵飛碧玉甌中翠濤起茶色以白為貴二公皆以碧緑言之何邪三山老人語録茶之佳品造在社前其次則火前謂寒食前也其下則雨前謂谷雨前也佳品其色白若碧緑者乃常品也茶之佳品芽蘖細微不可多得若此數多者皆常品也茶之佳品皆點啜之其煎啜之者皆常品也齊已茶詩曰甘傳天下口貴占火前名又曰髙人愛惜藏岩裏白甀封題寄火前丁謂茶詩曰開緘試新火須汲逺山前凡此皆言火前蓋未知社前之品為佳也鄭谷茶詩曰入坐半甌輕泛緑開緘數片淺含香鄭雲叟茶詩曰維憂碧粉散嘗見緑花生沈存中論茶謂黃金碾畔緑塵飛碧玉甌中翠濤起冝改緑為玉翠為素此論可也而舉一夜風吹一寸長之句以為茶之精美不必以雀舌鳥觜為貴今案茶至于一寸長則其芽葉大矣非佳品也存中此論曲矣盧同茶詩曰開緘宛見諌議面手閲月圑三百片薛能謝劉相公寄茶詩曰兩串春團敵夜光名題天柱印維陽茶之佳品珍輸金玉未易多得而以三百片惠盧同以兩串寄薛能者皆下品可知也齊巳詩角開香滿室爐動緑凝鐺丁謂詩曰末細烹還好鐺新味更全此皆煎啜之也煎啜之者非佳品矣唐人于茶雖有陸羽為之説而評論未精至本朝蔡君謨茶録既行則持論精矣以茶録而核前賢之詩皆未知佳味者也三山老人語録唐以前茶惟貴蜀中所産孫楚歌云茶出巴蜀張孟陽登成都樓詩云芳茶冠六合溢味播九區他處未見稱者唐茶品雖多亦以蜀茶為重然惟湖州紫筍入貢每歲以清明日貢到先薦宗廟然後分賜近臣紫筍生顧渚在湖常二境之間當採茶時兩郡守畢至最為盛會杜牧詩所謂溪盡停蠻棹旗張卓翠苔栁村穿窈窕桃澗渡喧豗劉禹錫何處人間似仙境春山携妓采茶時皆以此建茶絶亡貴者僅得挂一名尓至南李氏時漸見貴始有團圈之製而造作之精經丁晉公始大備自建茶出天下所産皆不復可數今出處􅊤源沙溪土地相去丈尺之間品味已不同謂之外焙况他處乎則知雖草木之微其顯晦亦自有時然唐自常衮以前閩中未有讀書者自衮教之而歐陽詹之徒始出而終唐世亦不甚盛今閩中舉子常𢾗倍天下而朝廷將相公卿每居十四五人物尚爾况草木微物也顧渚湧金泉每造茶時太守先祭拜然後水漸出造貢茶畢水稍減至供堂茶畢已減半太守茶畢遂涸蓋常時無水也或聞今龍焙泉亦然苕溪漁隱曰北苑官焙也漕司歲以入貢茶為上􅊤源私焙也土人亦入貢茶為次二焙相去三四里間若沙溪外焙也與二焙相去絶逺自隔一溪茶為下山谷詩云莫遣沙溪耒亂真正謂此也官焙造茶嘗在驚蟄後一二日興工採摘是時茶芽已皆一槍蓋閩中地暖如此舊讀歐公詩有喊山之説亦傳聞之訛耳龍焙泉即御泉也水之增減亦隨水旱𥘉無漸出遂涸之異但泉水極井正冝造茶耳蔡寬夫詩話蜀中數處蜀茶雅州蒙頂最佳其生最晚在春夏之交其地即書所謂蔡蒙旅平者也方茶之生雲霧覆其上若有神物護持之東齊紀事茶古不著所出本草云出益州唐以蒙山顧渚蘄門者為上品尚雜以蘇椒之類故李泌詩云旋沫翻成碧玉池添蘇散出琉璃眼遂以碧色為貴止曰煎茶不知點試之妙大率皆草茶也陸羽茶經綐言福建泉紹等十州所出者其味極佳而只今建安為天下第一遁齊間覽鄭可簡以貢茶進用纍官聀至右文殿修撰福建路轉運使其姪千里于山谷間得朱草可簡令其子待問進之因此得官好事者作詩云父貴因茶白兒榮為草朱而千里以從父奪朱草以豫子譊譊不已待問得官而歸盛集為慶親姻畢集衆皆贊喜可簡云一門僥幸其姪遽云千里埋冤衆皆以的對是時貢茶一方騷動故也苕溪漁隱曰余觀東坡荔支欵注云大小龍茶始于丁晉公而成于蔡君謨歐陽永叔聞君謨進小龍團驚欵曰君謨士人也何至作此事今年閩中監司乞進閗茶許之故其詩云武夷溪邊粟粒芽前丁後蔡相籠加爭新買寵各出意今年閗品充官茶則知始作俑者大可罪也髙齊詩話詩云誰謂茶苦爾雅云檟苦茶注樹似梔子今呼早采者為茶晚采者為茗一名荈蜀人名之苦茶故東坡乞茶栽詩云周詩記苦茶茗飲出近世𥘉緣厭粱肉假此雪昏滯蓋謂是也六一居士嘗新茶詩云泉甘器潔天色好坐中㨂擇客亦佳東坡守維揚于石塔寺試茶詩云椫窗麗午景蜀井出氷雪坐客皆可人鼎器手自潔正謂諺云三不點也苕溪漁隱葉濤詩極不工而喜賦詠嘗有試茶詩云碾成天上龍兼鳯煮出人間蟹與蝦好事者戲云此非試茶乃碾玉匠人嘗南食也西清詩話唐相李衛公好飲惠山泉置馹傳送不逺數千里而近世歐陽少師作龍茶録序稱嘉祐七年親享明堂致齋之夕始以小團分賜二府又給一餅不敢碾試至今藏之時熙寧元年也吾聞茶不問團鍔要之貴新水不問江井要之貴活千里致水真偽固不可知縱令識真巳非活水自嘉祐七年壬寅至熙寧元年戊申首尾七年更閲三朝而賜茶猶在此豈復有茶也哉苕溪漁隱曰壬午之春余赴官閩中漕幕遂得至北苑觀造貢茶其最精即氷芽細如針用御泉水研造社前巳嘗貢餘每片計工直四萬錢分試其色如乳平生未嘗曽啜此好茶亦未嘗嘗茶如此之蚤也唐子西閗茶記魯直諸茶詞余謂品令一詞最佳能道人所不能言尤在結尾三四句詞云鳯舞團團餅恨分破教孤令金渠休淨隻輪慢碾玉塵光瑩湯響松風早減二分酒病味濃香永醉鄉路成佳境恰如燈下故人萬里歸耒對影口不能言心下快活對省苕溪漁隱東坡詩春濃睡足午窗明想見新茶如潑乳又云新火發茶乳此論皆得茶之正色矣至贈謙師點茶則云忽驚午盞兔豪班打作春甕鵝兒酒蓋用老杜詩鵝兒黃似酒對酒愛鵝兒若是則色黃烏得為佳茗矣今東坡前集不載此詩想自知其非故刪去之同上臘茶出于建劍草茶盛于兩浙兩浙之品日注為第一自景祐巳後洪州雙井白芽漸盛近歲製作尤精囊以紅紗不過一二兩以常茶十數斤飬之用辟暑􅊜之氣其品逺出日注上遂為草茶第一苕溪漁隱曰醉翁又有雙井茶詩云西江水清江石老石上生茶如鳯瓜窮臘不寒春氣早雙井芽生先百草白毛囊以紅紗碧十斤茶養一斤芽長安冨貴五侯家一啜猶須三日誇蔡君謨好茗飲又精于藻鑒答程公闢蕳云嚮得雙井四兩其時人還未識敘謝不悉尋烹治之色香味皆精好是為茗芽之冠非日注寶雲可並也涪翁尤譽雙井蓋鄉物也李公擇有詩嘲之戲作解嘲云山芽落磑風回雪曽與尚書破睡來勿以姫薑棄憔悴逄時瓦釡亦鳴雷又答黃冕仲索煎雙井并簡王揚休詩云江夏無雙乃吾宗同舍頗似王安豐能澆茗碗湔祓我風𬒮欲挹浮丘公吾宗落筆賞幽事秋月下照澄江空家山鷹爪是小草敢與好賜雲龍同不嫌水厄幸來辱寒泉湯鼎聽松風同上世言團茶始于丁晉公前此未有也慶曆中蔡君謨為福建漕更製小團以充歲貢元豐𥘉下建州又製密雲龍以獻其品高于小團而其製益精矣曽文昭所謂莆陽學士蓬萊仙製成月團飛上天又云密雲新樣尤可喜名出元豐聖天子是也唐陸羽茶經于建茶尚云未詳而當時獨貴陽羡茶歲貢特盛茶山居湖常二州之間修貢則兩守相會山椒有境會亭基尚存盧同謝孟諌議茶詩云天子須嘗陽羡茶百草不敢先開花是巳然又云開緘宛見諌議面手閲月團三百片則團茶巳見于此當時李郢茶山貢焙歌云蒸之馥之香勝梅研膏架動聲如雷茶神拜表貢天子萬人爭喊春山摧觀研膏之句則知嘗為團茶無疑自建茶入貢陽羡不復研膏祗謂之草茶而已葛常之昨夜夢參寥師携軸詩見過覺而記其飲茶兩句云寒食清明都過了石泉槐火一時新夢中問火固新矣泉何故新答曰俗以清明淘井當續成詩以記其事東坡百家詩話總龜後集卷之三十
