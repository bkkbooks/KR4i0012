front:
  text: 增修詩話總龜卷之三十四
  hash: sha256:24a089a180eadde7ae869fbfda0cd4e59161ebb2692f7f91fe3591fd1c7c54cc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_034-1a}
body:
  text: 紀夢門下狄遵度紀夢詩云佳城鬱鬱頽寒煙孤雛乳獸號荒阡夜卧北斗寒挂枕木落霜拱鴈連天浮雲西去半落日行客東盡隨長川乾坤未毁吾尚在肯與蟪蛄論大年狄遵度自兒童時巳能屬文落筆有竒氣年十六一夕夢杜子美誦平生詩皆集中所未見者覺而記兩句後遂續之百斛明珠張察字隱之本閩人遷於成都數世矣善屬文不仕晚用太守王素薦賜號沖退處士一日夢有人寄書召之云東嶽道士書也明日與李士寧答曰手持東嶽寄書來察大驚不知其所自來未幾察果卒其子祀亦逸民舉仕一命乃死士寧蓬州人也語默不常或以為得道者百歲乃絶嘗見余於成都曰子甚貴當䇿舉首已而果然余嘗夢見人云是杜子美謂余曰今人多誤會余八陳啚詩云江流石不轉遺恨失吞吳世人皆以為先主武侯𣣔與關羽復仇故恨不能滅吳非也我意本謂吳蜀乃唇齒之國不當相圖晉之所以能取蜀者以蜀有不忘詩區區自列其意書生之習氣也並同前東坡將亡前數日夢中作一詩寄朱行中云舜不作六器誰知貴璵璠哀哉楚狂士抱璞號空山相如起睨柱投壁相與還何如鄭子産有禮國自間雖微韓宣子鄙夫亦辭環至今不貪寶凛然照塵寰覺而記之自不曉所謂東坡絶筆也直方詩話陳明信云蕭貫少時嘗夢至宫廷中長廊邃館如王者所居有千門萬戶望之洞然金碧爍耀既過數門見群婦人如神仙視貫驚問何所從來貫愕然亦不知對貫自陳進士能為詩中有一人授貫𥿄曰此所謂衍波箋煩賦宫中曉寒歌貫援筆立成既有竒語其人甚賞之因曰先輩異日必貴此天上非人間也貫寤尚能記所賦俞秀老往嘗得之於蕭翰林之孫其詩有云十二嶤關隱空緑獸貌呼熖椒壁馥渴烏涓涓不相續轆轤𣣔轉霏紅玊百刻香殘隕蓮燭九龍吐水漫寒漿紅綃佩魚無左璫兩兩趨走瞻扶桑紅萍半圭山波面回首觚􅏢九霞絢鳴鞙聲從天上來大劍髙冠滿前殿秀老誦之尚有四五韻忘之王太初傳言有焦仲先者家於南徐元豐元年因詣京師訪知巳忽夢一婦人相顧遇或以詩筆相往來其一聮云吳王臺下無人處幾度臨風學舞腰又曰吳山之北會稽之陽古木蒼蒼其最後一章云仲冬之月二七之間月圎風靜車馬相扳其人如病狂緣太初而後愈至秦少遊書栁鬼事所載詩語前後皆同但年月乃是熙寧九年所病者乃是嘉興令陶集而所諭者乃是天竺辨才法師二者不知孰是並同前僕嘗夢有客携詩文見過者覺而記其一詩云道惡賊其身忠先愛厥親誰知畏九折亦自是忠臣又有數句若銘贊者云道之所以成不以害其耕德之所以修不以賊其生東坡詩話冨鄭公早年嘗夢青州王相公以後事相托公曰相公德𬒳生民當延遐夀何遽及此後二年罷相知鄆州辟鄭公為倅到任月餘有大星隕于宅園家人怪之相告曰後月當見果至後月薨鄭公為治喪事故鄭公挽詞曰道德𬒳生民與當年夢中符契古今詩話鄭內翰獬未貴時嘗病瘟疫數日未愈甚困俄夢至一處若宫闕有吏迎謁甚恭公謂吏曰吾病甚倦煩熱思得涼浴以清其肌吏云已為公辦浴久矣吏引公至一室中有小池方闊數尺甃以明玊水光瀲灔以手測之清冷可愛公乃坐甃上以水泛身俄視兩臂已生白鱗視水中影則頭已角出公驚遽出吏云此玊龍池也惜乎公不入其水中入則為輔宰乃覺少選出汗公後登第為第一人為詩戲友人云文闈數戰奪先鋒變化須知自古同霹靂一聲從地起到頭身是白龍翁王仲舉營道人毋嘗夢挾仲舉入月仲舉修進業長興化二年赴舉謁秦王登第後有詩謝秦王曰三千里外拋漁艇二十人前折桂枝太平興國中仲舉有子曰嗣全亦中進士第乃扶兩子入月之祥青瑣集湖州長興縣啄木嶺金沙泉即每年造茶之所也湖常二郡接界於此其土有境會亭每茶節二牧畢至斯泉處沙中居嘗無水將造茶太守具犧牲祭泉頃之發源清溢造御茶畢水則微減供堂者畢水已半矣太守造茶畢即涸矣太守或行斾稽晚則有風雷之變或見鷙獸毒蛇鬼魅之類焉胡生者即其居以釘鉸為業居霅溪而近白蘋洲去其居十餘步有古墳胡生每因茶飯必奠酬之嘗夢人謂之曰吾姓柳氏平生善詩而嗜茗及死葬此室乃子今居之側也常銜子之惠無以為報𣣔教子為詩胡生辭以不能柳強之曰但率子意言之當有致矣生既寤試晉思果有冥助者其後遂工焉詩曰胡風似劔鎪人骨漢月如鈎釣胃腸魂夢不知身在路夜來猶自到昭陽人謂之胡釘鉸詩金沙池泉在常州冝興縣罨畫溪之東有寺寺有碑載當時杭湖常三州貢茶唱和樂天云十隻畫船何處宿洞庭山腳大湖心常州太守忘其姓名和云殷勤為報春風道不貢新茶只貢心韋檢舉進士不第常有一美姬一日捧心而卒檢追思痛悼殆不勝情舉酒吟詩悲怨可掬吟曰寶劔化龍歸碧落嫦娥隨月下黃泉一杯新酒青春曉寂寞書窗恨獨眠一日忽夢姬泣涕潛然曰當有後期今和來萹即口占云春雨𪷟𪷟不見天家家門户栁如煙如今賜斷空垂淚歡笑重追别有年檢終日怏怏後更夢姬曰即遂相見覺來神魂恍惚乃題曰白浪漫漫去不回浮雲飛盡日西頽始皇陵上千年樹銀鴨金鳬也變灰後數日即符夢兆脞説前集朝奉禮簡故宫保內翰之次子也於昆弟中最稱竒秀與梁固少小硯席之至善大中祥符二年固狀元及第授青州倅時奉禮榮侍在闕下是年冬末梁方之任去青雨驛夜夢朝來相謁手携白扇上有七言詩一首以贈梁云死生離别最堪悲相對無言淚滿衣歎我巳歸泉下去羡君新向月中歸長鞭巳見騰夷路折翼終難繼迅飛珍重故人當聖代早持鈞軸入黃扉覽詩起執手悲泣而别倐然覺大異之歎朝必沒故矣乃急走㒒録所得詩入京師訪其安否宫保開讀之大慟曰品格真吾兒作也夢之夕乃簡忘之日也李良弼故給事中防之子祥符元年應進士舉得同學究及第二年給事自南京移知鄭州以家在應天良弼奏為本府司士參軍是年中赴良弼隨侍至鄭夜宿中牟驛夢人持詩版跪而來獻良弼詩曰九霄丹詔三天近萬疊紅芳一旦開日月山川須問甲為君親到小蓬萊覺而異之旦遽起而白給事喜曰據此詩意汝必有前程慎勿廢於筆硯勉旃勉旃至郊而别五年方歸闕授三司户部判官五月已舉張楚縣丞事停任六月十九日良弼卒於應天府給事大慟悲語張君房曰夢之不誠如是自此兒夢必謂其前程而為詞臣一旦至是苦哉君房但寬勉以慰之是年秋君房以詔鞠獄無狀謪為寧海督郵乃同給事舟抵應天府旦憩泊間細詰良弼卒葬之日月及葬地之所因而繹之忽有數悟乃省其詩盡得之良弼丙戌生年二十有七即詩首句云九霄丹詔三天近三九二十七數是年二十五故云近也萬疊紅芳一旦開方萬葉之花一旦開盡是近謝之意次云日月山河須問甲其年六月十九日甲寅乃其卒日殯是二十九日甲子葬于府東甲地即是日月山川須間甲也蓋六月天德月德俱在甲末句云為君親到小蓬萊即虛無冥漠之所給事沉默曰君辨之矣脞説前集沈亞之嘗言邢鳯寓居長安平康里第晝夢一婦人自楹而來古粧髙髻作陽春曲曰長安少女玩春陽何處春陽不斷腸舞袖弓腰渾忘却蛾眉空帶九秋霜鳯曰何謂弓腰曰昔年父母教舞作此弓彎狀舞罷辭去鳯亦尋覺脞説後集吳興姚郃嘗言有友王生者元和𥘉夕夢逰吳宫久之聞宫中出輦吹簫擊鼓言葬西施王悲悼不止立召門客作挽歌生應聲為詞曰西望吳王闕雲書金字牌連江張蕙帳擇土葬金叉滿池紅心草三層碧玊臺春風無處所悽恨不勝懷及寤復記其事王生太原人崇寧元年元日昏眠夢中作一詩云無賴春風試怒號共乘一葉傲驚濤不知兩岸人皆愕但覺中流笑語髙三月與陳瑩中渡湘江是日大風當斷渡小舟􅱾舞白浪中兩岸聚觀膽落瑩中笑愈髙余以詩語瑩中瑩中曰此公按後大行叢林東坡倅錢塘夢神考召入禁中宫女環侍一紅衣女捧紅靴一隻命坡銘之其中一聮云寒女之絲銖積寸纍步武所及雲蒸雷起上極嘆其敏捷同前山谷晝卧夢與一道士升空道士曰與公遊蓬萊覺天風吹鬢道士曰斂目俄有狗吠開目不見道士惟見宫殿魯直入有兩玊人導升殿主􅑙揖之仙女侍之中有一女云整琵琶魯直愛其風韻顧之忘揖主者主者色莊故其詩曰試問琵琶可聞否靈君色莊妓搖手與余親言之今山谷集語不同蓋更易耳冷齋夜話少逰南遷宿郡亭湖廟下側枕視微波月影縱橫追憶昔宿垂雲老借竹軒見西湖月色如此夢美人自言我天女也以維摩像乞贊少遊愛其畫念曰非道子不能作此天女以詩戲少遊曰不知水宿分風浦何似秋眠借竹軒聞道詩詞妙天下廬山對眼可無言少遊夢中題其像曰竺儀華夢瘴面囚首口雖不言十分似九應笑舌覆大千作師子吼不如不搏取妙喜如陶家手同前陳智夫襄陽人慱學有才思尤長於歌詩嘗遇異人授以吐納之術故佳句多於夢中得之若花笑似留客鳥聲如喚人又野花臨水數枝恨芳草連天千里情之句雖前輩不能逺過遁齋間覽增修詩詁總龜卷之三十四百家詩話總龜後集卷之三十四傷悼門長慶四年退之為吏部侍郎薨于靜安里苐李翶行狀載屬纊之語云伯兄德行高晚年止四十二某位為侍郎年出伯兄十五歲且獲終于牗下幸不失大莭以下見先人可謂榮矣翶祭文曰人心樂生皆惡其凶兄之在病則齊其終順化以盡靡憾于中張籍祭詩亦曰公有曠逺識生死為一綱及當臨終辰意色亦不荒贈我珍重言傲然委衾裳蓋其聰明之所照了德力之所成就故于生死之際超然如此宣室志載威粹骨蕝國世與韓氏為仇神人以帝命召公計事愈曰臣願從大王討之未幾而愈卒公神道墓志行狀俱不載而止見于小説者如此豈東坡所謂其生也有自來其死也有所為乎李肇國史輔謂愈登華山絶頂度不可返至于發狂慟哭今觀易簀之際神色不亂如此不應于此而至于發狂慟哭也葛常之太白辭粟卧首陽屢空飢顔回當代不飲酒虗名安在哉君不見梁王池上月昔照梁王尊酒中梁王巳去明月在黃鸝怨解啼春風分明感激眼前事莫惜醉臥桃園東又平原君安在科斗生古池坐客三千人而今知有誰君不見孔北海英風豪氣今何在君不見裴尚書土墳三尺蒿藜居此類者尚多愚謂雖千萬萹只是此意非如少陵傷風憂國感時觸景忠誠激切蓄寓深逺各有所當也黃常明詩話曽文肅熙寧𥘉為海州懷仁令有監酒使臣張者小女甫六七歲甚為惠黠文肅之室魏夫人憐之教以誦詩書頗通解其後南北暌隔紹聖𥘉文肅柄事樞時張氏女以入禁中雖無名位以善筆扎掌命令之出入忽與夫人相聞夫人以夫貴疏封瀛國稱夀禁庭始相見敘舊自後歲時遣問夫人沒張作詩以哭云香散簾幃寂塵生翰墨間空傳三壷譽無復內朝班從此絶迹矣後四十年靖康之變張從昭慈聖獻南渡至錢塘朱忠靖筆録所記昭慈遣其傳導反正之議張夫人者即其人也年八十餘終揮塵東漢李固忠直鯁亮志在許國不為身謀爭立清河遂忤梁兾以致身首異處當時有提鈇上章乞收固尸如汝南郭亮者有星行至洛守衛尸喪如陳晉楊羌者亦可見固以忠獲罪矣唐李華嘗觀黨錮傳撫卷而悲之且作詩曰古墳襄城野斜徑橫秋陂况不禁撨采茅莎無孑遺于乎生不能保其身死又不能保其藏骨之地天之不相善人何至是耶梅聖俞詩云漢家誅黨人誰與李杜死死者有范滂其母為之喜喜死名愈彰生榮同犬豕故史臣以胡廣趙戒為糞土而馬融真犬豕哉韻語陽秋宋彭城王義康忌擅道濟之㓛會文帝疾動乃矯詔送廷尉誅之故時人歌云可憐白浮鳩柱殺檀江州當時人痛之蓋如此奈何王綱下移主威莫立洎魏軍至瓜步帝方登石頭以思之又何輔哉劉夢得嘗過其墓而悲之曰萬里長城壞荒雲野草秋秣陵多士女猶唱白浮鳩蓋傷痛之深雖歷三百年而猶不泯也韻語陽秋苕溪云李杜畫象古今詩人題詠多矣若子美其詩高妙固不待言要當知其平生用心處則半山老人之詩得之矣詩云吾觀少陵詩謂與元氣侔力能排天斡九地壯顔毅色不可求浩蕩八極中生物豈不稠醜姦巨細千萬殊竟莫見以何雕鎪惜哉命之窮顛倒不見收青衫老見斥餓走半九州瘦妻僵前子仆後攘攘盜賊森戈矛吟哦當此時不廢朝廷憂嘗願天下聖大臣各伊周寧令吾廬獨破受凍死不忍四海赤子寒颼颼傷屯悼屈止一身嗟時之人我所羞所以見公像再拜涕泗流推公之心古亦少願起公死從之逰䂬溪淵明非畏枯稿其所以感嘆時化推遷者蓋傷時之急于聲利也非畏亂離其所以愁憤于干戈盜賊者蓋以王室元元為懷也俗士何以識之七哀詩起曹子建其次則王仲宣張孟陽也釋詩者謂病而哀義而哀感而哀悲而哀耳目聞見而哀口歎而哀鼻酸而衰謂一事而七者具也子建之七哀哀在于獨棲之思婦仲宣之七哀哀在于棄子之婦人張孟陽之七哀哀在于已毀之園寢唐雍陶亦有七哀詩所謂君若無㝎雲妾作不動山雲行出山易山逐雲去難是皆以一哀而七者具也老杜之八哀則所哀者八人也王思禮李光弼之武功蘇源明李雍之文翰汝陽鄭虔之多能張九齡嚴武之政事皆不復見矣蓋當時盜賊未息歎舊懷賢而作者也司馬溫公亦有五哀詩謂楚屈原趙李牧漢鼂錯馬援齊斛律光皆負才竭忠卒困于讒而不能自脫蓋有激而云爾葛常之詩話白樂天元微之皆老而無子屢見于詩章樂天五十八歲始得阿崔微之五十一歲始得道保同時得嗣相與酬唱喜甚樂天詩云膩刺新胎髮香綢小繡𥜗玉牙開手爪蘇顆點肌膚微之云且有承家望誰論得力時又云嘉名稱導保乞姓號崔兒三歲而亡白賦詩云懷抱而亡按墓志有子道護年三歲而卒以歲月考之即道保也孟東野連産三子不數曰皆失之韓退之嘗有詩假天􅒛以寬其憂三人者皆人豪而不能忘情如此信知割愛為難也若使學空天默默依前重作鄧攸身傷哉微之五十三道者遭此則又何必黑衣巾者闖然入其戶而後喻哉同上韓退之作李于墓志云余不知服食之説自何起殺人不可計而慕尚之益至臨死乃悔其為而退之乃躬自蹈之以至于死白天樂所謂退之服硫黃一病訖不痊是也陳後山作嗟哉行云張生服石奴下潦上乾如渴烏韓子作志還自屠白笑未竟人復吁蓋為此也然樂天與刑部李侍郎詩云金丹周學都無益姹女丹砂燒即飛則樂天深知服食之無驗其肯以身試藥以自斃乎則白笑未竟人復吁之句未必然爾山谷在貶所曽公衮有書勸其勿服金石藥谷報云公衮疽根在旁乃不可食庭堅服之如晴雲之在川谷安得有霹靂文也則知服金石者尤當屏去粉白黛緑之輩或者用以資色力其斃冝哉丹揚集百家詩話總龜後集卷之三十四
