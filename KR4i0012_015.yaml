front:
  text: 增修詩話總龜卷之十五
  hash: sha256:2d951681f9b35c591fb3b3b594e8a03f5cef44900fb5fd45103cddfa70f9cb14
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_015-1a}
body:
  text: 留題門上吕申公纍乞致仕仁宗不允他日復叩便坐度其不可留因詢曰卿去誰可代者申公曰知臣莫如主陛下自擇堅問之乃引陳文惠曰陛下必欲得英俊經綸之臣則臣所不知若圖任老臣鎮安百度周知天下事無如陳堯佐仁宗然之文惠遂大拜極懷薦引之德因作燕詞携酒過之申公使之歌焉詞云二社良辰千家庭院翩翩又見新歸燕鳯凰巢穩許為鄰瀟湘煙瞑來何晚亂入紅樓低飛緑岸畫梁時拂歌塵散為誰歸去為誰來主人恩重朱簾捲申公笑曰自恨捲簾人已老文惠曰莫愁調鼎事無功老于廊廟而醖籍不減昔任浙漕有吳江詩曰平波渺渺煙蒼蒼菰蒲才熟楊柳黃扁舟繫岸不忍去秋風斜日鱸魚鄉又碧瀾堂詩云苕溪清淺霅溪斜碧玉寒光照萬家誰與月明終夜聽洞庭漁笛隔蘆花古今詩話徐州漢興歌風臺詩雖多張安道詩最絶云落魄劉郎作帝歸樽前一曲大風詞才如信越猶𦵔醢安用思他猛士為青箱雜記臨潼朝元閣詩雖多唯陳文惠二韻首出曰高閣高閣逈秋毫無隱情浮雲忽一蔽不見漁陽城張退傳宰邵武時多逰僧舍至則吟詠忘歸題西庵寺曰西庵深入西山裡算得當年少客逰密密石叢蟠小徑涓涓雲竇㵼寒流松皆有節垂青蓋僧盡無心也白頭欲刷粉碑書好字調卑官冗不堪留題寶蓋巖寺云身為冠冕流心是雲泉客每到雲泉中便擬忘歸迹况此寶蓋巖天造清涼宅稅車官道邉誰知願言適過建寧縣洛陽村曰金谷花時醉幾埸舊逰無日不思量誰知萬水千山裡枉𬒳人言過洛陽並同前張伯玉過姑蘇熟見太白十詠不及明月泉因題一絶曰至今千古松猶伴數峰雪不見纎塵飛寒泉湛明月陳文惠至古寺作詩曰殿古寒爐空流塵暗金碧獨坐偶無人又得真消息春明退朝録顔謝魯公之後所居有泉石松竹創亭延客孟賔于留題詩曰園林瀟􅎈聞來久欲往因循二十秋今日開襟吟不盡碧山重疊水長流江南野録陳頴南昌人業進士題漢祖廟曰項羽英雄猶不懼可憐容得辟陽侯得狂病而卒同前長安慈恩寺浮屠前後題詩多矣唐文宗朝元微之白樂天到塔下見章八元所留詩悉令除去諸家牌惟留章詩詩云十層突兀在虛空四十門開面面同却怪鳥飛平地上自驚人語半天中回梯暗踏如穿洞絶頂𥘉攀似出籠落日鳯城佳氣合滿城香樹雨濛濛鑑戒録陶雍典雅州送客至情盡橋改為折柳橋題詩曰從來只有情難盡何事名為情盡橋自此改名為折柳從他離恨一條條施肩吾題友人間居詩曰花眼綻紅斟酒看藥心抽緑帶煙鋤夫差廟拆姑蘇臺木創成陳羽題詩曰姑蘇臺畔千年木刻作夫差廟裡神幡蓋寂寥塵土滿不知簫鼓樂何人並同前陳羽姑蘇臺詩云憶昔吳王爭霸日歌謡滿路上蘇臺三千宫女看花處人盡臺空花自開賀程詠君山詩曰曾逰方外見麻姑説道君山此本無云是昆崘山頂石海風吹落洞庭湖鑑戒録劉象詠仙掌詩曰萬古亭亭倚碧霄不成擎亦不成招何如掬取蓮池水灑向人間救旱苗同前砌臺即今撥擦臺也王侯家作以為臨觀之戲唐張素詩云寫望臨香閣登高下砌臺林間踏青去席上意錢來即知唐來有之太祖朝大王都尉家其子承𥙿幼時其父戲輔砌臺使談苑楊文公罷虔州過饒州餘干縣登干越亭前瞰琵琶洲後枕思禪寺天下絶境古今留題百餘篇張祐詩云扁舟亭下駐煙波十五年遊重此過洲觜露沙人渡淺樹梢藏竹鳥啼多層瀾漲水䀶猶在古板題詩字已訛况是高秋正圓月可堪聞唱異鄉歌劉長卿云天南愁望絶亭下柳條新落日獨歸鳥孤舟何處人生涯投越嶠世業陷胡塵草色迷征路鶯啼傍逐臣秦臺悲白首楚渚怨青蘋杳杳鍾陵暮悠悠鄱水春獨醒翻取笑直道不容身得罪風霜苦全生天地仁青山數行淚滄海一窮鱗流落機心盡空憐鷗鳥親談苑江遵詠史云秦築長城比鐡牢蕃戎不敢過臨洮雖然萬里連雲際不及堯階三尺高何光逺稱此詩卓絶千百集中無以加詩史桂州左右山皆平地拔起數千百丈石如染黛陽朔縣尤佳沈彬有詩云陶潛彭澤五株柳潘嶽河陽一縣花兩處爭如陽朔好碧蓮峰裏住人家觀此山水可知同前淮隂廟題者甚多惟錢諫議昆詩最佳築壇拜日恩雖厚躡足封時慮已深隆凖早知同鳥喙將軍應有五湖心青箱雜記歙州問政山聶道士所居嘗有人陟險攀蘿至絶壁于岩下嵌空處見題詩一首雖苔蘚昏蝕而文尚可辨題云黃台詞不知台何人也千尋練帶新安水萬仭花屏問政山自少雲霞居物外不多塵土到人間壺懸仙島吞舟罷碗浸星宫沉水間寶籙篋垂金絛帶綘囊絛鎖玊連環靜張棋勢鋪還打默考仙經輔又刪床並葛鞋寒兔伏􅖠橫柳几老龍跧溪童乞火朝敲竹山鬼聽琴夜撼􅗚草暗碧潭思句曲松昏紫氣度深關龜成淺甲毛猶緑鶴化幽翎頂更殷阮洞神仙分藥去蔡家兄弟寄書還黃精苗倒眠青鹿紅杏枝低挂白鷴容易煮茶供客用辛勤栽果與猿攀常尋靈穴通三島擬過流沙化百蠻新隱漸開侵月窟舊林猶恱枕沙灣手疏俗禮慵非傲肘護靈方臂不慳海上使頻青鳥黠篋中藏久白驢頑笻枝健杖菖蒲節笋櫛高簮玳瑁斑花氣薰心香馥馥澗聲聆耳冷潺潺高墳自掩浮生骨短晷難窮不死顔早晚重逢蕭塢客願隨芝蓋出塵寰台國𥘉時任屯田員外郎世有全篇荆門軍玉泉山寒泉亭題者甚多有一篇最佳而忘其姓名詩云朔風凛凛雪漫漫未是寒時分外寒六月火雲天不雨請君來此倚闌干雲齋廣録張宗尹為長安令時鄭州陳相尹京兆宗尹嘗以事忤公意公有別業在鄠杜間宗尹書一絶于壁云喬松翠竹絶纎埃門對南山盡日開應是主人貪報國功成名遂不歸來有人録以告公覽而善之待之如初宗尹嘗有詩云大書文字隄防老剩買田園準備間倦遊録臨潼縣靈泉觀唐清華宫也自唐迄今題詠不可紀小杜五言長韻并三絶洎鄭嵎津陽門詩外唯陳文惠張文定及進士楊正倫詩最佳文定詩云當時不是不窮奢民樂升平少嘆嗟姚宋未亡妃子在塵埃那得到中華文惠詩云百首新詩百意精不尤妃子只尤兵爭如一句傷時事只為明皇恃太平正倫詩曰休罪明皇與貴妃大都衰盛兩相隨惟憐一派溫泉水不逐人心冷暖移又鄭文寶詩云只見開元無事久不知貞觀用功深皆為知音所賞鄜州東百里有水名相思河傳舍曰相思鋪令狐楚詩曰誰把相思號此河塞垣車馬往來多只應自古征人淚􅎈向空洲作碧波並同前韓魏公自中書出相州于居第作狎鷗亭永叔以詩寄曰豈止忘機鷗鳥信鈞陶萬物本無心魏公喜曰余在中書進退升黜未嘗置心于其間永叔可謂知我古今詩話吕文靖詩曰賀家池上天花寺一一軒窗向水開不用閉門防俗客愛間能有幾人來賀家池即賀監所賜之湖詩後為風雨所損惜乎寺僧不留雜志唐人徐凝多吟絶句曾吟廬山瀑布詩云瀑泉瀑泉千丈直雷奔入江無暫息今古長如白練飛一條界破青山色題處州縉雲山鼎湖詩云黃帝旌旗去不回空遺片石碧崔嵬有時風捲鼎湖浪散作青天雨點來後無題者郡閣雅談權審常侍著詩千首常題山院曰萬葉風聲利一山秋氣寒曉霜浮碧瓦落日度朱欄貢父詩話江南道士任右元能篆見人題常州忠烈王廟詩一絶云松竹蕭蕭野笛悲寂寥氷雪對旌旗前山月夜隂風起神去神來人不知時人不會其意尋毀其碑元厚之篆于石后愈無識者因此漫滅郡閣雅談鄧仙客死葬麻姑山人謂尸解逰人題詩多矣有一少年一絶不言姓名但云天嶠逰人詩曰鶴老芝田雞在籠上清那與世塵同既言白日升天去何事人間有殯宫鄧名稍減雲溪友議三鄉題不知誰氏題云余本家若耶溪東從良人西入函關寓居新昌里第不幸良人巳矣邈然無依東邁歷渭川涉滻水背終南涉太華經號略抵陜郊皆曩昔宴逰之地命筆輒題終不能滌其懷抱翰墨非女子事故隱其名而不書為詩曰昔逐良人西入關良人身沒妾空還謝娘衛女不相待為雨為雲過此山和詩十一首陸正洞云惆悵殘花怨暮春孤鸞舞鑑倍傷神清詞好箇干人事疑是文姬第二身王祝云女几山前嵐氣低佳人留恨此中題不知雲雨歸何處空使王孫見即迷劉谷云蘭蕙芬芳見玊姿路傍花笑景遲遲苧蘿山下無窮意併在三鄉惜別時王條云浣沙逰女出關東舊迹新詞一夢中槐陌柳亭何限事年年回首向東風李昌鄴云紅粉蕭娘手自題分明幽怨發雲閨不應更學文君去泣向殘花歸剡溪王顧云無姓無名越水濵芳詞空怨路旁人莫教才子偏惆悵宋玉東家是舊鄰李繪云會稽王謝兩風流王子沉淪謝女逰歸思若隨文字在路傍空為感千秋張崎云洛川依舊好風光蓮帳無因見女郎雲雨散來音信斷此生遺恨寄三鄉高衢云南北千山與萬山軒車誰不念鄉關獨留芳翰悲前迹陌上恐傷桃李顔章氷云來時歡笑去時哀家國迢迢向越臺待寫百年幽思盡故宫流水莫相催賈馳五言云壁古字未滅聲長響不絶蕙質本如雲松心應奈雪秋耿離幽谷悠悠望甌越𣏌婦哭夫時城摧無此説雲溪友議吳門女郎真娘死葬虎丘山時人比之蘇小小行客題墓多矣舉子談銖題云虎丘山下冢纍纍松柏蕭條盡可悲何事世人唯重色真娘墓上獨留詩鄭仁表經滄浪峽憩於長亭亭吏持牌乞詩題曰分陜東西路正長行人名利火然湯路傍看箇滄浪峽真是將間攪攪忙托言蜀道有飛泉亭留詩甚多薛能佐李公過蜀道題云賈掾曾經去題詩豈易哉悉打去詩板獨留李端巫山高一篇同前元祐五年同景文羲伯聖徒次元題竹上云結根豈殊衆修柯獨出林孤高不可恃嵗晚風霜侵百斛明珠余𥘉謪嶺南過田氏小園東門一峰豐下鋭上俚人謂之雞籠山余更名曰獨秀峰今過之留詩云倚天巉絶玉浮圖肯與彭郎作小姑獨秀江南如有意要三二别四方壺玉局文慈恩寺塔有唐人盧宗回一詩云東來曉日上翔鸞西轉蒼龍拂露盤渭水冷光搖蕩井玉峰晴氣壓闌干九重金界望長安古今詩話江州琵琶亭題者惟夏鄭公梅公儀詩佳夏詩曰年光過眼如車轂職事羈人似馬銜若遇琵琶應大笑何煩涕淚滿青衫梅詩云陶令歸來為逸賦樂天謫宦起悲歌有絃應𬒳無絃笑何况臨絃泣最多又葉氏女郎詩云樂天當日最多情淚滳青衫酒重傾明月滿船無處問更聞商婦琵琶聲古今詩話河中􅔏鵲樓唐人極多唯王之渙李益暢詩最佳王云白日依山盡黃河入海流欲窮千里目更上一層樓李云􅔏鵲樓前百尺墻煙汀雲樹共茫茫漢家簫鼓沉流水魏國山河半夕陽事去千年猶恨短愁來一日即知長風煙併在相思處滿目非春亦自傷暢詩云天勢圍平野河流入斷山同前李建中恬退作詩清淡望湖樓詩云小艇間撑處湖天景亦微春波無限緑白鳥自由飛落日孤鴻逺輕煙古寺稀時携一壺酒戀到晚涼歸西湖詩云漲煙春氣重貯月夜䀶深皆此類古今詩話青箱雜記謂望湖樓詩是蘇為在湖州作潘邠老有登漢陽江樓詩云兩屐上層樓一目略千里説者以為著屐豈可登樓直方詩話陸蟾寓居潭州攸縣司空山好神仙事多辟榖纍月題廬山瀑布云正源人莫測千尺挂雲端嶽色染不得神功裁亦難夏噴猿鳥浴秋射斗牛寒流到滄溟日翻濤更好看又春暮經石頭城云六朝多少事搘肘思悠悠落日空江上子規啼渡頭蒹葭侵壞壘煙霧接滄洲今古分明在那堪向九秋雍熙中服藥卒雅言雜載李宏臯唐末八座善夷之子善夷左遷武陵宰卒于官宏臯􅐝櫬歸故園途中值兵革為馬氏擁入湖湘文昭王有功授學士至刑部侍郎每箋奏至京辭臣降歎李嵩相國器之後馬氏兄弟結隙與弟宏節俱棄市少攻詩題桃源云山翠參差水渺茫秦人昔在楚封疆當時避世乾坤窄此地安家日月長草色幾經壇杏老岩花猶帶澗桃香他年倘遂平生志來著霞衣侍玉皇任鵠字射巳冨有學問題君山云不礙揚帆路盤根壓洞庭波濤四面白雲外一堆青魚躍晴波動龍歸石洞腥才期託名畫為我簇為屏送王正巳歸山云五峰青拄天直下挂飛泉琴鶴同歸去煙霞到處眠鼯跳霜葉徑虎嘯夕陽川獨酌應懷我排空樹影連並同前韓常侍為郎吏日宣宗問曰卿有好詩如何得見韓稽首曰容至私第録進乃選八十首進後以眼疾辭拜珥貂為御史䘖命出關讞獄道中看華山有詩曰野麋蒙象暫如犀心不驚鷗角駭雞一路好山無伴看斷腸煙景寄猿啼御史出使不得與人同行故云無伴時補衮謝病歸山更寄織錦篇與薛郎中云錦字龍梭織錦篇鳯凰文采間非煙並他時世新花樣虛費工夫不直錢和人憶鶴云拂拂雲衣冠紫煙已為丁令一千年留君且伴居山客幸有松梢明月天又和憶山泉云情多不似家山水夜夜聲聲旁枕流古今詩話少遊在黃州飲于海橋橋南北多海棠有老書生家海棠叢間少遊醉卧宿于此明日題其柱曰喚起一聲人悄衾枕夢寒窗曉瘴雨過海棠晴春色又添多少社甕釀成微笑半破共癭瓢共舀覺健到急投床醉鄉廣大人間小東坡愛之恨不得其腔冷齋夜話增修詩話總龜卷之十五百家詩話總龜後集卷之十五評史門老杜北征詩云憶昨狼狽初事與古先別不聞夏商衰中自誅褒妲其意謂明皇英斷自誅妃子與夏商之誅褒妲不同老杜此語出于愛君曲文其過非至公之論也白樂天詩云六軍不發無奈何宛轉蛾眉馬前死非逼迫而何哉然明皇能割一巳之愛使六軍之情帖然亦可謂知所輕重矣故前輩有詩云畢竟聖明天子事景陽赴井是何人丹陽集晉盧諶先為劉琨從事中郎將假匹磾領幽州求諶為别駕故琨答諶詩云情滿伊何蘭桂移植茂彼春林瘁此秋棘言諶棄巳而就匹磾也厥後琨命箕淡攻石勒一軍皆沒由是窮蹙不能自守乃率衆赴匹磾繼為匹磾所拘知其必死矣豈無望于諶哉觀再贈諶云朱實隕徑風繁英落素秋何意百煉鋼化為繞指柔其詩托意欲以激諶而救其急而諶殊不領也琨既𬒳害諶始上表以雪其冤終亦何所輔耶漢元帝時弘恭石顯用事京房劉向皆深嫉之嘗上書力詆蓋薰蕕氷炭不能以共處理之必然也然房欲淮陽王為巳助代王作求朝奏章向令外親上疏謂小人在朝以致地動雖嫉惡之心切然於忠實亦少貶矣使二子果輸忠于漢當明目張膽論至再三可也何暇為身謀而假之于他人哉故荆公詩云京房劉向各稱忠詔獄當年迹自窮畢竟論心異恭顯不妨迷國略相同後之論人物者倘取其心而略其迹則善矣韻語陽秋張祐觀狄梁公傳云失運廬陵厄乘時武后尊五丁扶造化一柱正乾坤而山谷有鯨波橫流砥柱虎口舌國宗臣之句可謂善論仁傑者余謂仁傑不畏武后羅織之獄三族之夷強犯逆鱗敢以廬陵王為請者非特天資忠義亦以先得武后之心故也且張易之昌宗后之嬖臣也欲歸廬陵事大體重非二嬖之言后孰信之吉頊能以危言撼二嬖陳易吊為賀之計故二嬖敢從容以請而后意遂定于是仁傑之諌得行卒之遣徐彥伯迎廬陵王于房州者由仁傑之言也故史援吕溫之言稱之曰取日虞淵洗光咸池潛授五龍夾之以飛於乎仁傑其忠且賢哉按仁傑傳始后欲立武三思而李昭德傳乃云洛陽人王慶之請以武承嗣為皇太子昭德力爭今考三思本傳不載為皇太子之説而承嗣傳云洛州人請立承嗣為皇太子岑長倩格輔元皆爭不從而不及昭德豈有抵牾耶裴度在朝憲宗委任不疑使破三賊巳而吳元濟授首王承宗割二州遣子入侍李師道𬒳擒兩河諸侯忠者懷強者畏克融廷奏皆不敢桀勳烈之盛一時無與比肩者惟李義山指為聖相詩曰帝得聖相相曰度又曰嗚呼聖皇及聖相亦過矣哉荀卿曰得聖臣者帝若舜禹伊尹周公皆聖臣也謂四人為聖臣則可謂裴度為聖相其可哉唐明皇以英鋭身致極治以荒淫身致極亂自古人君成敗之速未有如眀皇者鄭毅夫詩云四海不搖草九重藏禍根十年傲堯舜一笑破乾坤蓋是意也開元之盛能致兵寢刑措之治者實姚宋輔政之功明皇可以無疑矣不三四年遽使去位及李林甫用事則盤旋紏固至十八九年敗國蠧賢無所不至猶以為未足也晚年顧力士曰海內無事朕將吐納導引以天下事付林甫天下安得而不亂乎並同上史載宋之問冉祖雍並賜死于桂州之間得詔震汗不引決祖雍請于使者曰之問有妻子幸之決使者許之而之問荒悸不能處家事及考之文集有登大庾嶺詩云兄弟逺謪居妻子咸異域則之問赴貶時未嘗以妻子行也又有發藤州及昭州二詩二州皆在桂州之南則賜死之地非桂州眀矣豈史之誤歟丹陽集漢高祖置酒沛宫酒酣擊築自歌曰大風起兮雲飛揚威加海內兮歸故鄉安得猛士兮守四方時帝有天下已十二年當思耆艾賢德與共維持獨專意猛士何哉豈馬上三尺嫚罵未易遽革邪治道終以霸雜蓋有由然其前年下詔曰賢士大夫吾能尊顯之是年下詔曰與天下之賢豪士大夫同安緝之謂播告之辭乃秉筆代言非若耳熱之歌乃中心所欲也許汜不為陳元龍所禮嘗與劉備稱之備曰君有國士名望無救世意而求田問舍言無可采何緣當與君語如小人欲卧百尺樓卧君于地何但上下床之間耶然介甫屢用之求田問舍轉無成更覺求田問舍遲讀蜀志曰無人語與劉元德問舍求田意最高又有遊西霞庵云求田此山下終𣣔忤陳登豈非力𣣔轉此一重案歟老杜北征詩云經年至茅屋妻子衣百結慟哭松聲回悲泉共幽咽平生所嬌貌顔色白于雪見爺背面啼垢膩腳不襪方是時杜方脫身於萬死一生之地得見妻兒其情如是洎至秦中則有晒藥能無婦應門亦有兒之句至成都則有老妻憂坐痺幼女問頭風之句觀其情悰巳非北征時比也及觀進艇詩則曰晝引老妻乘小艇晴看稚子浴清江江村詩則曰老妻畫𥿄為棋局稚子敲針作釣鉤其優遊愈恱之情見于嬉戲之間則又異于在秦中時矣葛常之白樂天作八漸偈云苦既非真悲亦是假則世間悲歡人我必能忘情始憲宗欲以樂天為刺史王涯以資淺為言遂得江州司馬及涯敗作詩快之有當君白首同歸日是我青山獨往時之句李德𥙿于樂天不見有隙德𥙿貶崖州亦作三絶快之其一篇云樂天嘗任蘇州日要勒須教用禮儀從此結成千萬恨今朝果中白家詩蓋嘗以唐史考之樂天卒于會昌之初武宗時也而德𥙿之貶乃在宣宗大中年則德𥙿之貶樂天死巳久非樂天之詩明矣以是凖之快王涯之句恐亦未必然也韻語陽秋西伯將出獵卜之曰所獲非龍非彲非虎非羆所獲霸王之輔于是果遇太公于渭水之陽載與俱歸此司馬遷之説也文王至磻溪見吕尚釣鈎得玉璜刻曰姬受命吕佐檢德合于今昌來提此尚書大傳之説也太公釣于滋泉文王得而王此吕不韋之説也吕望年七十釣于渭渚初下得魴次得鯉刳腹得書書文曰吕望封于齊此劉向之説也太公避紂居東海之濵聞文王作興曰盍歸乎來由文王至於孔子五百有餘歲若太公望則見而知之此孟子之説也是數説者皆言天産英輔以興周蓋非碌碌佐命者之可擬而司馬遷乃托或者之論謂西伯拘羑里散宜生閎夭招吕尚求美女竒物獻于紂而贖西伯西伯既脫三人有隂謀修德以傾商政此豈所以待太公也哉歐陽詹云論兵去商虐講德興周道屠沽未遇時何異斯川老余比赴官宜春于夀昌道中見壁間題一詩云漁翁何事亦從戎變化神竒抵掌中莫道直鈎無所取渭川一釣得三公一以為傾商政一以為釣三公皆非知聖賢者韻語陽秋李太白至邯鄲登城樓詩云提携袴中兒杵臼及程嬰空孤獻白刃必死耀丹誠是有取于二子甚重袴中兒謂趙武也然司馬遷作趙晉二世家自相矛盾左氏所書又復不同將何以取信于后世耶晉世家之説曰景公十七年誅趙同趙括令庶子武為後趙世家之説曰景公三年屠岸賈攻趙朔殺趙括等朔同友人程嬰匿趙武於山中至十五年景公有議立趙武左氏之説曰魯成公八年六月晉討趙同趙括武從姬畜于公宫以其田與祁奚韓厥言于晉侯曰成季之勳宣孟之忠無後為善者懼矣乃立武而反其田按成公八年即晉景公十七年也或云匿武于山中或云畜武于宫中或云十五年而後立武或云未踰月而立武皆未知所據也揚雄之迹曲諂新室議之者衆矣此置而不論雄之心如何哉觀法言之書似未明乎大道之旨也王荆公乃深許之何耶詩云寥寥鄒魯後於子獨先覺又云懦者陵夷此道窮千秋止有一楊雄又云道真沉溺九流渾獨泝頽波討得源又云子雲平生人莫知知者乃獨稱其辭今尊子雲者皆是得子雲心亦無幾是亦聖人許雄也東坡謂雄以艱深之辭淺易之説與公矛盾矣同上百家詩話總龜後集卷之十五
