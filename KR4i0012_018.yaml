front:
  text: 增修詩話總龜卷之十八丙集
  hash: sha256:7e605c2a4f241c46e4dc13a4b25dd0d6facc4ec9ba04ab5c21f274c93ab8b774
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_018-1a}
body:
  text: 舒城阮一閲編皇明宗室月窗道人刋番易程珖校紀實門中趙平叔客漣水軍郡守召置門下數年平叔以館職守漣水後守以所居為豹隱堂石曼卿有詩云熊非清渭逢何暮龍卧南陽去不還今郡守蔚然惟在立談間士大夫留詩甚多莫可偕者古今詩話煬帝好食蛤忽有一蛤椎擊不破異之置于几下一夜有光肉乃自脫有一佛二菩薩像悔之乃不食蛤段成式有詩云雖因雀變化不逐月虧盈縱有天中像神功詎可成又云相好全如𣑽端嚴秪為誰寧同蚌頑惡且與鷸相持西洛上清宫混元后有吳生畫五聖杜甫詩云五聖聮龍衮千官列鴈行謂是也刁約使契丹詩曰押燕移離畢看房賀跋攴餞行三匹裂密賜十貔狸皆紀實也移離畢官名如中國執政官賀跋攴如執衣防閣匹裂小木瞿以色綾木為之如黃􅃮貔狸形如鼠而大穴居食榖粱嗜肉狄人為珍膳味如豚肉而脆川陜呼梢工篙手為三長老杜詩云長年三老歌聲裏白馬灘前白浪中土氣有早晚天時有愆伏如平地三月花者深山四月方花樂天逰大林寺云人間四月芳菲盡山寺桃花始盛開同前張乖崖鎮宛丘邸報王文正大拜不恱謂坐客曰朝廷肯用經綸康濟人乎余少以直節自誓束髮登用無兩府心幕中杜夀隆曰固知公無兩府意公曰吾胸中事爾安得知杜曰嘗見公柳詩云安得辭榮同范蠡緑絲和雨繫扁舟雍陶知簡州自比謝宣城柳吳興賔至則挫辱投贄者少得見之馮道明下第請謁紿閽者曰與太守故舊及見呵責曰與公昧平生何故舊之有道明曰誦公詩得相見何隔平生遂吟雍詩曰立當青草人初見行近白蓮魚未知閉門客到常如病滿院花開未是貧江樓秋入峽雨葉夜侵樓雍厚之元和十一載李源公榜三十三人皆取寒素時詩曰元和天子丙申年三十三人同得仙𫀆似爛銀文似錦相將白日上青天撫州有放生池禁採捕忽有乘小舟釣于其上太守蔡大夫令人捕之釣者為詩曰投却長竿捲却絲手携簑笠獻新詩明知太守清如鏡不是漁人下釣時乃野人張項同前薛能尚書鎮彭門時溥劉巨容周岌俱在麾下未數年溥領徐巨容鎮襄岌領許俱假端揆故能詩舊將已為三僕射病身猶是六尚書王拱辰守長安日𥘉禮上理掾口號云人間合作大丞相天下猶呼小狀元梅摯知錢塘有一掾官撰禮上曲子云黃閣方開金鼎調羮只待梅皆著題孟賔于字國儀連州輔國鄉人天福中自湖湘越京洛應舉逺人無援遂卜命於華山神珓有如一年乞一珓凡六擲得上上大吉每年下第有詩今略舉一聮用表其第一年云蟾宫空手下澤國更誰來二年云水國二親應探榜龍門三月又傷春三年云仙島却回空説夢清朝未逹自嫌身第四年云失意從他桃李春嵩陽經過歇行塵雲僧不見城中事問是今年第幾人五年云因逢日者教重應忍𬒳雲僧勸却歸天福九年禮部侍郎符蒙下及第果六舉後往江南官至水部郎中致仕居吉州玉笥山復知豐城縣年七十餘卒郡閣雅談煬帝時洛陽進合蒂迎輦花得之嵩山塢中人不知名採者異之因以名迎輦花濃艷芬馥或惹襟袖移時不散嗅之令人不睡命寶兒持之號司花女寶兒姓袁長安進御車女年十五腰肢纎弱時詔虞世南草征遼德音於側寶兒注視久之煬帝謂世南曰舊傳飛燕可掌上舞今得寶兒方昭前事注目於卿卿才人可便嘲之世南應詔為絶句曰學畫鴉兒丰未成垂肩大袖太憨生緣憨却得君王惜長把花枝傍輦行帝恱龍舟鳯舸每舟擇妙麗長白女子千人執雕檀金楫號殿腳女一日煬帝憑殿腳女吳綘仙肩喜柔麗不與群輩齒愛綘仙善畫長眉將拜婕妤適早嫁萬邰故不克顧內謁者云古人云秀色若可飱如綘仙真可樂飢矣因吟持楫篇賜之曰舊曲歌桃葉新粧艷落梅將身倚輕楫知是渡江來詔殿腳女千輩唱之越溪進耀花綾綾文突起有光彩越人乘樵風泛舟石帆山下收野繭繅絲女夜夢神人告云禹穴三千年一開所得繭即江淹文集中壁魚所化絲織為裳必有竒文織成果得所夢獨賜司花女洎綘仙蕭妃恚怒不懌由是稍稍不親幸煬帝嘗醉逰宫中偶戲宮婢羅羅畏妃不敢迎帝辭有程姬之疾不可薦寢帝嘲曰個人無賴是橫波黛染龍顱簇小娥幸有留儂伴成夢不留儂住意如何煬帝往往為妖祟所惑逰雞臺恍惚與陳后主相遇喚帝為殿下后主戴單紗皂幘綽袖長𥚑緑錦純緣紫文方平履舞女數人即麗華也以緑文測海蠡酌紅梁新醖勸帝飲因請麗華舞玉樹后庭花麗華辭以拋擲歲久自井中出腰肢旅拒無復往時再三索起終一曲后主詠十數篇煬帝不記獨愛小窗詩及寄侍兒碧玉詩云午醉醒來晚無人夢自驚後二句詩史謂是唐人宋咸作夕陽如有意偏傍小窗明碧玉詩云離别腸應斷相思骨合銷愁魂若飛散慿仗一相招麗華拜求帝一章辭以不能麗華笑曰嘗聞此處不留儂自有留儂處安可言不能煬帝強為之操觚曰見面無多事聞名爾許時坐來生百媚實箇好相知麗華赧然不懌后主問龍舟之逰樂乎始謂殿下致治堯舜之上今日復此逸逰人生各圖快樂曩時何見罪三十六封書使人至今怏怏煬帝叱之不見帝幸月觀清景晴明左右皆寢憑蕭妃肩説東宫時事適黃門映薔薇叢調宫婢衣朒薔薇吃吃聲笑帝望腰肢纎弱意望寶兒披單衣亟擒乃雅娘蕭妃喟然不止帝曰往年幸妥娘時情態正如此曾效劉孝綽為離億詩嘗念與妃記之否蕭妃即念云憶往來待來剛不來卸粧仍索伴解珮更相催博山思結夢沉水永成灰憶起時投籖初報曉𬒳惹香黛殘枕隱金叉裊笑觀上林春除却司辰鳥煬帝云日月遄邁今巳幾年事矣大業拾遺襄王僣偽逼李拯為偽官拯嘗吟曰紫宸朝罷綴鴛鸞丹鳯樓前駐馬看惟有終南山色好晴明依舊滿長安拯終為亂兵所殺南部新書裴皥官至禮部尚書放三榜四人拜相桑維翰竇正固張礪馬裔孫清泰二年馬裔孫知貢舉才放榜謝恩引諸生詣座主宅謁拜裴公以詩示云宦途最重是文衡天與愚夫著盛名三主禮闈年八十門生門下見門生未開宴裔孫登庸郡閣雅談吳長文使虜詩云奚車一牛駕朝馬兩人騎雜志昔執政有詩云躁因修賀刺懶為答空書又有省判者云省府舊例不答空書同前文德殿百官常朝之殿宰相奏事畢乃來押班常至日旰守堂卒好以厚朴湯飲朝士朝士有久無差遣厭苦常朝者戲為詩曰立殘庭下梧桐影喫盡階頭厚朴湯古今詩話李德誠加司空守臨川湯文圭草麻德誠濡毫之賂久而未至以詩督之曰紫殿西頭月欲斜曾草臨川上相麻潤筆巳曾關奏謝更飛章句問張華時皆少之馮延魯公出討閩中催督軍糧急於星火李建勳以詩寄之曰粟多未必全為計師老須防有伏兵既而福州之兵果為越人所敗及歸遷司空纍表乞致政自稱鍾山公詔授司徒不起學士湯恱致狀賀之建勳以詩答曰司空猶不作那敢作司徒幸有山公號如何不見呼先是宋齊丘自京口求退於青陽號九華先生未周期一詔而起時論薄之建勳年德未衰時望方隆重或有以比宋公者因為詩曰桃花流水雖相似不學劉郎去又來南唐近事化度寺內有無盡藏院京城捨施日漸崇盛武德貞觀后錢帛金玉積聚不可勝計常使名僧監藏為等分一分供天下伽藍修理之用一分施天下飢餓一分充舊供無遮之會城中士女奔走捨施爭次不得至暮收獲亦巨萬有大車載錢帛捨了棄去不知姓名者多矣藏內物天下寺院許容來取供給亦不可勝數不阻貞觀年中有裴元智戒行修謹宛是修行高人入寺灑掃十年有餘寺中觀其行無玷缺使之守藏不覺𬒳盜去黃金極多將去不可知數寺衆見潛走去後不還衆僧驚異遂於元智寢房內看壁上有詩四句曰將肉遣狼守置骨向狗頭自非阿羅漢焉能免得偷后莫知所之武后遂移藏東都福光寺日久錢物漸耗却移歸舊寺至開元九年發散錢帛於京師諸寺二京靈異小録僕在吳興逰諸寺卿詩曰微雨止還作小窗幽更研盆山不見日草木自蒼然非至吳越不見此景百斛明珠舊讀蘇子美六和寺詩云沿橋待金鯽竟日獨遲留𥘉不喻此語及倅錢塘乃知寺後池中有此魚如金色復逰池上投餅餌久之略出不食后入不可見自子美作詩至今四十年已有遲留之語苟非難進易退而不妄食安能如此夀耶同前京師風物繁富士大夫牽于事役良辰美景罕宴逰之樂其詩至有賣花簷上看桃李拍酒樓前聽管絃之句玉堂間話張喬九華人咸通末取京兆府解李建州時為京兆府參軍主試同時有許棠及喬俞坦之劇燕任濤吳罕張蠙周繇鄭谷李栖逺溫憲李昌符謂之十哲其年府試月中桂詩喬擅埸詩曰與月長洪濛扶踈萬古同根非生下土葉不墜秋風每向圓時足還隨缺處空影高群木外香滿一輪中未種丹霄日應虛白兔宫何當隨羽化細得問元功其年以許棠在埸屋多年為薦首喬許坦之在許下薛能尚書深知以詩唁二子云何事盡參差惜哉吾子詩日令銷此道天亦負明時有路當重振無門即不知何當見堯日重與啜澆漓托言僕𥘉入廬山山谷竒秀平生所未見殆應接不暇遂發意不作詩巳而見山中僧俗皆言蘇子瞻來矣不覺作一絶云芒鞋青竹杖自挂百錢逰可怪深山裏人人識故侯既自悔前言之謬又作兩絶云青山若無素偃蹇不相親要識廬山面他年是故人又云自昔懷清賞神逰杳靄間如今不是夢真箇在廬山是日有以陳令舉廬山記見寄者且行且讀見其中云徐凝李白之詩不覺失笑旋入開先寺僧求詩因作一絶云帝遣銀河一派垂古來惟有謪仙辭飛流濺沫知多少不為徐凝洗惡詩往來南北山十餘日以為勝絶不可勝談擇其尤者莫如漱玉亭三峽橋故作此二詩最後與總老逰西林作一絶云橫看成嶺側成峰到處看山了不同不識廬山真面目只緣身在此山中余廬山詩盡於此百斛明珠余在𡵨下見秦州進一馬騣凶鬯匕如牛項垂胡側立顛倒毛生肉端蕃人云此肉騣凶鬯匕馬也乃知鄧公驄馬行云肉駿碨礧連錢動當作肉騣凶鬯匕唐人煎茶用薑故薛能詩云鹽損添常戒薑冝著更誇據此則又有用鹽者矣近世有用此二物者輒大笑之然茶之中等者用薑煎信佳鹽則不可安定郡王以黃柑釀酒謂之洞庭春色色香味三絶以餉其猶子德麟德麟以飲豫為作詩醉后信筆頗有沓拖風氣云去年洞庭秋香霧長噀手于今洞庭春玉色疑非酒賢王文字飲醉筆龍蛇走既醉念君醒逺餉為我夀瓶開香浮坐盞凸光照牖方傾安仁醽潘嶽賦云披黃苞以授甘傾縹瓷以酌醽莫遣公逺嗅要當名字竒未可論升斗應呼釣詩鉤亦號掃愁帚君知葡萄惡正是嫫母醜須君灔海杯澆我談天口並同前增修詩話總龜卷之十八百家詩話總龜後集卷之十八辨疑門王絲字敦素越之蕭山人景祐初為縣令會嵗歉絲每家攴錢一千以濟之期以眀年夏輸絹一匹邑人大受其惠稱為德政繇此當路薦之蓋是時一縑售價不逾其數爾仕止郎曹典州而巳范文正公為作墓志具載其事至荆公當國效其法施之天下號為和買久之本錢既不復俵且有折帛之害世誤傳始于王儀仲素儀仲文正公之子早即貴逹未嘗為邑官至八座沒諡懿敏國史夲傳可考其子鞏字定國與東坡先生遊李定字仲求洪州人晏元獻公之甥文亦竒欲預賽神會而蘇子美以其任子距之致興大獄梅聖俞謂一客不得食覆鼎傷衆賔者也其孫即商老彭以詩名列江西派中又李定字資深元豐御史中丞其孫方叔正民兄弟皆顯名一時揚州人又李定嘉祐治平以來以風采聞嘗遍歷天下諸路計度轉運使官制未行老于正卿乃敦老如岡之祖蓋濟南人也同姓名者凡三人世亦多指而為一不可不辨李豸陽翟人東坡先生門下士亦字方叔兩方叔俱以文鳴詩章又多互傳于世陳子昻感遇詩云樂羊為魏將食子徇軍功骨肉且相薄他人安得忠又曰吾聞中山相乃屬放麑翁孤獸猶不忍况以奉君終一則忍于其子一則不忍於麑故魯直懷荆公詩有啜羮不如放麑樂羊終愧巴西陳無巳啓亦用此事所謂中山之相仁於放麑亂世之雄疑於食子是也然屬麑於秦西巴者孟孫也非中山相也子昻徒見樂羊中山事遂誤作孟孫用無巳亦遂襲之魯直以西巴為巴西亦誤矣丹揚集李白古風云燕昭延郭隗遂築黃金臺劇辛方趙至鄒衍復齊來豫考史記不載黃金臺之名止云昭王為郭隗改築宫而師事之孔文舉與曹公書曰昭王築臺以尊郭隗亦不著黃金之名上谷郡圗經乃云黃金臺在易水東南十八里燕昭王置千金於臺上以延天下士遂因以為名皇甫松有登黃金臺詩云燕相謀在兹積金黃巍巍上者欲何顔使我千載悲其迹尚可得而考也東坡詩云玉奴弦索花奴手玉奴謂楊妃花奴謂汝陽王璡也及觀和楊公濟梅花詩乃言玉奴終不負東昏何耶按南史東昏妃潘玉兒當是筆誤尓韓退之詩曰離騷二十五王逸序天問亦曰屈原凡二十五篇今楚詞所載二十三篇而已豈非并九辨大招而為二十五乎九辨者宋玉所作非屈原也今楚詞之目雖以是篇併注屈原宋玉然九辨之序止稱屈原弟子宋玉所作大招雖疑原文而或者謂景差作若以宋玉痛屈原而作九辨則招魂亦當在屈原所著之數當為二十六矣不知退之王逸之言何所據耶杜子美柏中允除官制詩舊注以為柏耆又以為正節按杜詩云紛然喪亂際見此忠義門蜀中寇亦甚柏氏功彌存三止錦江沸獨清玉壘昏當是有功于蜀者方是時假子璋反于上元徐知道反于寶應而正節為卭州刺史數有功則是正節無疑矣杜集又有柏學士茅屋柏大兄弟山居詩議者皆以謂正節之居然詩中殊不及功名之事但皆稱其為學讀書爾茅屋云古人巳用三冬足年少今開萬卷餘山居云山居精典籍文雅涉風騷疑是卭州立功之前丹陽集黃魯直詩云世有捧心學取笑如東施梅聖俞云曲眉不想西家樣餒腹還須二子清太平寰宇記載西施事云施其姓也是時有東施家西施家故李太白效古云自古有秀色西施與東鄰而東坡代人留别詩乃云綘蠟燒殘玉斚飛離歌唱徹萬行啼他年一舸鴟夷子應記儂家舊姓西似與寰宇記所言不同豈為韻所牽耶同上張無盡嘗和山字云安得將相似仲山人疑之以近人所常用皆山甫也觀後漢志陽樊攢茅田服虔注云楚仲山所居又楊修答臨淄侯箋云仲山周旦之儔只稱仲山何疑之有黃常明坡記王凌過賈逵廟呼曰賈梁道我大魏之忠臣也及司馬景王病夢逵為崇因為詩曰嵇紹似康為有子郤超畔鑒似無孫如今更恨賈梁道不殺公閭殺子元蓋怪梁道忠義之靈不能自巳其子充之惡按晉紀王賈所殺者乃宣帝名懿字仲達非景帝子元也䂬溪正訛門天窺象緯逼雲卧衣裳冷世傳古本作天窺今從之莊子以管窺天正用此字舊集以作闕又或作關今不取蓋先生詩該衆美者不惟近體嚴于屬對至于古風句對者亦然觀此詩可見矣近人論詩多以不必屬對為髙古何耶故詳論之以俟知者焉杜詩正異海右此亭古濟南名士多濟南實海右諸郡舊集一作海右今從之正文作海內非也拂天萬乘動觀水百丈湫拂字從一作兼畫馬詩有云翠華拂天來向東正文作沸非也君臣留歡娛樂動殷嶱嵑殷從上聲嶱嵑出文選音渴曷集韻山貌舊集作殷湯嶱音字皆誤蓋緣湯字之訛二字從而倒之兼他詩二字誤倒之者非一豈知秋禾登貧窶有倉卒别本禾字一作未今從之按此詩十一月作禾字明矣昌黎謂年登而妻啼飢實此意也隂風西北來慘淡隨回紇紇字從一作鶻唐史德宗朝始改名回鶻正文非也中興諸將收山東捷書夜報清晝同夜字從王介甫謂捷書晝夜至也舊作日今不取花門天驕子飽肉氣勇決諸詩之言花門者皆回紇也舊集作北門蓋由字畫小誤唐以太原為北門非謂回紇明矣卒章申言花門也渡河不用船千騎常撇捩撇捩疾貌大食刀歌云鬼物撇捩辭沆壕字意皆同今從之舊集作撇烈非也嬋娟碧蘚靜蕭摵寒籜聚蘚字從别本舊集作鮮蓋字畫小缺而釋者因云嬋娟碧蘚皆謂竹也尤謬長夜苦寒誰獨悲杜陵野老骨欲折此成都詩舊集作長安非也其夜字之訛故誤作安耳况卒章之意明甚南京亂初定所向色枯稿色字從别本他詩亦云朝野色枯稿正文作邑今不取樹枝有鳥亂棲時瞑色無人獨歸客棲字從一作正文作鳴今不取言亂棲則鳴可知矣高皇亦明王魂魄猶正直皇字舊集諸本皆作堂近見别本作皇今從之乃與上下數聮詩意相貫也詢之閬人其漢高祠廟今尚存焉别離重相逢偶然豈足期足字舊集作定蓋由字畫小訛况上句巳云泄雲無定姿悲臺蕭颯石巃嵸哀壑􅒎丫浪呼洶浪字作别本考兩句屬對之二當用一實字又别本下句作二鶯猛胸絛徐墜字亦未通主守問家臣分朋見溪畔耘者必分朋曹而進故東坡逺景樓記謂耘者畢出數百人為曹者是也舊作明乃字小訛耳風吹巨熖作河漢騰煙柱諸本下句作何掉騰煙柱蜀本何作河近見別夲今從之蓋于詞意通也合昏排鐡騎清曉散錦幪幪字他詩有云駑駘怯錦幪乃覆馬之物正文作􅐒非也大火運金氣荆揚不知秋火字從一作謂大火西流七月詩也正文作暑今不取終然契真如得匪金仙術二句並從一作正文作終契如往還得匪合仙術今不取幾度寄書白鹽北故人贈我青絲裘絲字從一作縑别本正文止作絲字此詩寄裴施州者或謂裴冕非也按唐史冕以寶應元年貶施州刺史不數月移澧州距此巳六年矣配極玄都閟慿高禁籞長籞字舊集諸本皆作蘌按西漢宣帝紀云池籞者其字從竹今從之尸鄉餘土室誰話呪雞翁誰話從事見列仙傳正文作雞説乃字之訛也咒字一作喌音州又音祝茂樹行相引連山望忽開茂字連山字皆從一作時歸鳯翔行在正文連山作連峰非也霧樹亦然掖垣竹埤梧十尋洞門對霤常隂隂霤字從别本文選云二堂對霤此春深詩也而諸本作雪誤矣江上小堂巢翡翠苑邉高塜卧麒麟苑字從一作正文作花蓋字畫小訛而説者云一詩連用三花字不害為工誤矣雲斷嶽蓮臨大路天晴宫柳暗長春大路陜華間地名也晉書檀道濟從劉𥙿伐姚泓至潼關姚鸞屯大路以絶道濟糧道而蜀本正作大道誤矣馬嬌朱汗落胡舞白題斜朱汗巳見他詩舊作珠乃衍文也白題從一作西漢云斬胡白題將字義與雕題同正文作蹄非也力疾坐清曉來詩悲早春詩字從别本考詩題與上下句意當從之舊作時非也峽雲籠樹小湖日蕩船明蕩字從一作非久遊江湖者不知此字之工正文作落蓋字訛也合觀却笑千年事驅石何時到海東題云觀造竹橋即日成句中合觀字謂聚觀橋成之速而笑驅石之誕舊集諸本皆訛作歡非也百家詩話總龜卷之十八
