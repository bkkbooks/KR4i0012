front:
  text: 増修詩話總龜卷之十八丙集
  hash: sha256:e6cc45f58c493e14575db71d5de31ebd4b14ba5f8359cf96e40ae5f4f9d50404
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_018-1a}
body:
  text: 舒城阮一閲編皇明宗室月窓道人刋番易程珖校紀實門中趙平叔客漣水軍郡守召置門下數年平叔以館職守漣水後守以所居為豹隱堂石曼卿有詩云熊非清渭逢何暮龍卧南陽去不還今郡守蔚然惟在立談間士大夫留詩甚多莫可偕者古今詩話煬帝好食蛤忽有一蛤椎擊不破異之寘于几下一夜有光肉乃自脫有一佛二菩薩像悔之乃不食蛤段成式有詩云雖因雀變化不逐月虧盈縱有天中像神功詎可成又云相好全如𣑽端嚴秪為誰寜同蚌頑惡且與鷸相持西洛上清宫混元后有呉生畫五聖杜甫詩云五聖聮龍衮千官列鴈行謂是也刁約使契丹詩曰押燕移離畢看房賀䟦攴餞行三匹裂宻賜十貔狸皆紀實也移離畢官名如中國執政官賀䟦攴如執衣防閤匹裂小木瞿以色綾木為之如黄􅃮貔狸形如䑕而大穴居食榖粱嗜肉狄人為珎膳味如豚肉而脆川陜呼梢工篙手為三長老杜詩云長年三老歌聲裏白馬灘前白浪中土氣有早晚天時有愆伏如平地三月花者深山四月方花樂天逰大林寺云人間四月芳菲盡山寺桃花始盛開同前張乖厓鎮宛丘邸報王文正大拜不恱謂坐客曰朝廷肯用經綸康濟人乎余少以直節自誓束髪登用無两府心幕中杜夀隆曰固知公無两府意公曰吾胸中事爾安得知杜曰嘗見公柳詩云安得辭榮同范蠡緑絲和雨繫扁舟雍陶知簡州自比謝宣城柳呉興賔至則挫辱投贄者少得見之馮道明下第請謁紿閽者曰與太守故舊及見呵責曰與公昧平生何故舊之有道明曰誦公詩得相見何隔平生遂吟雍詩曰立當青草人初見行近白蓮魚未知閉門客到常如病滿院花開未是貧江樓秋入峽雨葉夜侵樓雍厚之元和十一載李源公牓三十三人皆取寒素時詩曰元和天子丙申年三十三人同得仙𫀆似爛銀文似錦相將白日上青天撫州有放生池禁採捕忽有乗小舟釣扵其上太守蔡大夫令人捕之釣者為詩曰投却長竿捲却絲手携簑笠獻新詩明知太守清如鏡不是漁人下釣時乃野人張項同前薛能尚書鎮彭門時溥劉巨容周岌俱在麾下未數年溥領徐巨容鎮㐮岌領許俱假端揆故能詩舊將已為三僕射病身猶是六尚書王拱辰守長安日𥘉禮上理掾口號云人間合作大丞相天下猶呼小狀元梅摯知錢塘有一掾官撰禮上曲子云黄閤方開金鼎調羮只待梅皆着題孟賔于字國儀連州輔國郷人天福中自湖湘越京洛應舉逺人無援遂卜命於華山神珓有如一年乞一珓凢六擲得上上大吉每年下第有詩今略舉一聮用表其第一年云蟾宫空手下澤國更誰來二年云水國二親應探榜龍門三月又傷春三年云仙島却回空說夣清朝未逹自嫌身第四年云失意從他桃李春嵩陽經過歇行塵雲僧不見城中事問是今年第幾人五年云因逢日者教重應忍𬒳雲僧勸却歸天福九年禮部侍郎符蒙下及第果六舉後徃江南官至水部郎中致仕居吉州玉笥山復知豐城縣年七十餘卒郡閣雅談煬帝時洛陽進合蔕迎輦花得之嵩山塢中人不知名採者異之因以名迎輦花濃艶芬馥或惹襟䄂移時不散嗅之令人不睡命寳兒持之號司花女寳児姓袁長安進御車女年十五腰肢纎弱時詔虞世南草征遼徳音於側寳兒注視乆之煬帝謂世南曰舊傳飛燕可掌上舞今得寳児方昭前事注目於卿卿才人可便嘲之世南應詔為絶句曰學畫鵶児丰未成垂肩大䄂太憨生縁憨却得君王惜長把花枝傍輦行帝恱龍舟鳯舸每舟擇妙䴡長白女子千人執雕檀金楫號殿脚女一日煬帝凭殿脚女呉綘仙肩喜柔䴡不與群軰齒愛綘仙善畫長眉將拜婕妤適早嫁萬邰故不克顧内謁者云古人云秀色若可飱如綘仙真可樂飢矣因吟持楫篇賜之曰舊曲歌桃葉新粧艶落梅將身倚輕楫知是渡江來詔殿脚女千軰唱之越溪進耀花綾綾文突起有光彩越人乗樵風泛舟石㠶山下収野蠒繅絲女夜夣神人告云禹穴三千年一開所得蠒即江淹文集中壁魚所化絲織爲裳必有竒文織成果得所夣獨賜司花女洎綘仙蕭妃恚怒不懌由是稍稍不親幸煬帝嘗醉逰宫中偶戯宮婢羅羅畏妃不敢迎帝辭有程姬之疾不可薦寢帝嘲曰個人無頼是横波黛染龍顱簇小娥幸有留儂伴成夣不留儂住意如何煬帝徃徃為妖祟所惑逰雞䑓恍惚與陳后主相遇喚帝為殿下后主戴單紗皂幘綽䄂長𥚑緑錦純縁紫文方平履舞女數人即䴡華也以緑文測海蠡酌紅梁新醖勸帝飲因請䴡華舞玉樹后庭花䴡華辭以抛擲歲乆自井中出腰肢旅拒無復徃時再三索起終一曲后主詠十數篇煬帝不記獨愛小窓詩及寄侍児碧玉詩云午醉醒來晚無人夣自驚後二句詩史謂是唐人宋咸作夕陽如有意偏傍小窓明碧玉詩云離别腸應㫁相思骨合銷愁魂若飛散慿仗一相招䴡華拜求帝一章辭以不能䴡華笑曰嘗聞此䖏不留儂自有留儂處安可言不能煬帝強為之操觚曰見面無多事聞名尔許時坐來生百媚實箇好相知䴡華赧然不懌后主問龍舟之逰樂乎始謂殿下致治堯舜之上今日復此逸逰人生各圖快樂曩時何見罪三十六封書使人至今怏怏煬帝叱之不見帝幸月觀清景晴明左右皆寢凭蕭妃肩說東宫時事適黄門映薔薇叢調宫婢衣朒薔薇吃吃聲笑帝望腰肢纎弱意望寳児披單衣亟擒乃雅娘蕭妃喟然不止帝曰徃年幸妥娘時情態正如此曾效劉孝綽為離億詩嘗念與妃記之否蕭妃即念云憶徃來待來剛不來卸粧仍索伴解珮更相催博山思結夣沉水永成灰憶起時投籖初報暁𬒳惹香黛殘枕隱金釵裊笑觀上林春除却司辰鳥煬帝云日月遄邁今巳㡬年事矣大業拾遺㐮王僣偽逼李拯為偽官拯嘗吟曰紫宸朝罷綴鴛鸞丹鳯樓前駐馬看惟有終南山色好晴明依舊滿長安拯終為亂兵所殺南部新書裴皥官至禮部尚書放三榜四人拜相桑維翰竇正固張礪馬裔孫清㤗二年馬裔孫知貢舉纔放牓謝恩引諸生詣座主宅謁拜裴公以詩示云宦途最重是文衡天與愚夫著盛名三主禮闈年八十門生門下見門生未開宴裔孫登庸郡閣雅談呉長文使虜詩云奚車一牛駕朝馬两人騎雜誌昔執政有詩云躁因脩賀刺懶爲答空書又有省判者云省府舊例不答空書同前文徳殿百官常朝之殿宰相奏事畢乃來押班常至日旰守堂卒好以厚朴湯飲朝士朝士有乆無差遣厭苦常朝者戯為詩曰立殘庭下梧桐影喫盡堦頭厚朴湯古今詩話李徳誠加司空守臨川湯文圭草麻徳誠濡毫之賂乆而未至以詩督之曰紫殿西頭月欲斜曾草臨川上相麻潤筆巳曾關奏謝更飛章句問張華時皆少之馮延魯公出討閩中催督軍粮急於星火李建勲以詩寄之曰粟多未必全爲計師老須防有伏兵旣而福州之兵果爲越人所敗及歸遷司空累表乞致政自稱鍾山公詔授司徒不起學士湯恱致狀賀之建勲以詩答曰司空犹不作那敢作司徒幸有山公號如何不見呼先是宋齊丘自京口求退於青陽號九華先生未周朞一詔而起時論薄之建勲年徳未衰時望方隆重或有以比宋公者因爲詩曰桃花流水雖相似不學劉郎去又來南唐近事化度寺内有無盡藏院京城捨施日漸崇盛武徳貞觀后錢帛金玉積聚不可勝計常使名僧監藏爲等分一分供天下伽藍脩理之用一分施天下飢餓一分充舊供無遮之會城中士女奔走捨施争次不得至暮収獲亦鉅萬有大車載錢帛捨了弃去不知姓名者多矣藏内物天下寺院許容來取供給亦不可勝數不阻貞觀年中有裴元智戒行修謹宛是修行高人入寺洒掃十年有餘寺中觀其行無玷缺使之守藏不覺𬒳盗去黄金極多將去不可知數寺衆見潜走去後不還衆僧驚異遂於元智寢房内看壁上有詩四句曰將肉遣狼守置骨向狗頭自非阿羅漢焉能免得偷后莫知所之武后遂移藏東都福光寺日乆錢物漸耗却移歸舊寺至開元九年發散錢帛於京師諸寺二京靈異小録僕在呉興逰諸寺卿詩曰㣲雨止還作小窓幽更研盆山不見日草木自蒼然非至呉越不見此景百斛明珠舊讀蘇子羙六和寺詩云沿橋待金鯽竟日獨遲留𥘉不喻此語及倅錢塘乃知寺後池中有此魚如金色復逰池上投餅餌乆之略出不食后入不可見自子羙作詩至今四十年已有遲留之語苟非難進易退而不妄食安能如此夀耶同前京師風物繁富士大夫牽扵事役良辰羙景罕宴逰之樂其詩至有賣花檐上看桃李拍酒樓前聽管絃之句玉堂閑話張喬九華人咸通末取京兆府解李建州時為京兆府叅軍主試同時有許棠及喬俞坦之劇燕任濤吳罕張蠙周繇鄭谷李栖逺温憲李昌符謂之十哲其年府試月中桂詩喬擅埸詩曰與月長洪濛扶踈萬古同根非生下土葉不墜秋風每向圓時足還隨缺䖏空影高群木外香滿一輪中未種丹霄日應虚白兎宫何當隨羽化細得問元功其年以許棠在埸屋多年為薦首喬許坦之在許下薛能尚書深知以詩唁二子云何事盡參差惜㢤吾子詩日令銷此道天亦負明時有路當重振無門即不知何當見尭日重與啜澆漓摭言僕𥘉入廬山山谷竒秀平生所未見殆應接不暇遂發意不作詩巳而見山中僧俗皆言蘇子瞻來矣不覺作一絶云芒鞵青竹杖自挂百錢逰可恠深山裏人人識故侯既自悔前言之謬又作两絶云青山若無素偃蹇不相親要識廬山面他年是故人又云自昔懐清賞神逰杳靄間如今不是夣真箇在廬山是日有以陳令舉廬山記見寄者且行且讀見其中云徐凝李白之詩不覺失笑旋入開先寺僧求詩因作一絶云帝遣銀河一派垂古來惟有謪仙辭飛流濺沫知多少不為徐凝洗惡詩徃來南北山十餘日以為勝絶不可勝談擇其尤者莫如漱玉亭三峽橋故作此二詩最後與總老逰西林作一絶云横㸔成嶺側成峰到處㸔山了不同不識廬山真面目只縁身在此山中余廬山詩盡於此百斛明珠余在𡵨下見秦州進一馬騣凶鬯匕如牛項垂胡側立顛倒毛生肉端蕃人云此肉騣凶鬯匕馬也乃知鄧公騘馬行云肉駿碨礧連錢動當作肉騣凶鬯匕唐人煎茶用薑故薛能詩云塩損添常戒薑冝着更誇㩀此則又有用塩者矣近世有用此二物者輙大笑之然茶之中等者用薑煎信佳塩則不可安定郡王以黄柑醸酒謂之洞庭春色色香味三絶以餉其猶子徳麟徳麟以飲予為作詩醉后信筆頗有沓拖風氣云去年洞庭秋香霧長噀手于今洞庭春玉色疑非酒賢王文字飲醉筆龍蛇走旣醉念君醒逺餉為我夀瓶開香浮坐盞凸光照牖方傾安仁醽潘岳賦云披黄苞以授甘傾縹瓷以酌醽莫遣公逺嗅要當名字竒未可論升斗應呼釣詩鉤亦號掃愁箒君知葡萄惡正是嫫母醜須君灔海盃澆我談天口並同前增修詩話總龜卷之十八百家詩話總龜後集卷之十八辯疑門王絲字敦素越之蕭山人景祐初為縣令㑹嵗歉絲每家攴錢一千以濟之期以眀年夏輸絹一匹邑人大受其惠稱為徳政繇此當路薦之盖是時一縑售價不逾其數爾仕止郎曹典州而巳范文正公為作墓誌具載其事至荆公當國傚其法施之天下號為和買乆之本錢旣不復俵且有折帛之害世悞傳始扵王儀仲素儀仲文正公之子早即貴逹未嘗為邑官至八座没謚懿敏國史夲傳可考其子鞏字定國與東坡先生㳺李定字仲求洪州人晏元獻公之甥文亦竒欲預賽神㑹而蘇子美以其任子距之致興大獄梅聖俞謂一客不得食覆鼎傷衆賔者也其孫即商老彭以詩名列江西派中又李定字資深元豐御史中丞其孫方叔正民兄弟皆顯名一時揚州人又李定嘉祐治平以來以風采聞嘗遍歴天下諸路計度轉運使官制未行老于正卿乃敦老如岡之祖盖濟南人也同姓名者凢三人世亦多指而為一不可不辯李豸陽翟人東坡先生門下士亦字方叔两方叔俱以文鳴詩章又多互傳于世陳子昻感遇詩云樂羊為魏將食子狥軍功骨肉且相薄他人安得忠又曰吾聞中山相乃属放麑翁孤獸猶不忍况以奉君終一則忍扵其子一則不忍於麑故魯直懐荆公詩有啜羮不如放麑樂羊終媿巴西陳無巳啓亦用此事所謂中山之相仁於放麑亂世之雄疑於食子是也然屬麑於秦西巴者孟孫也非中山相也子昻徒見樂羊中山事遂誤作孟孫用無巳亦遂襲之魯直以西巴為巴西亦悞矣丹揚集李白古風云燕昭延郭隗遂築黄金䑓劇辛方趙至鄒衍復齊來予攷史記不載黄金䑓之名止云昭王為郭隗改築宫而師事之孔文舉與曹公書曰昭王築䑓以尊郭隗亦不著黄金之名上谷郡圗經乃云黄金䑓在易水東南十八里燕昭王置千金於䑓上以延天下士遂因以為名皇甫松有登黄金䑓詩云燕相謀在兹積金黄巍巍上者欲何顔使我千載悲其迹尚可得而考也東坡詩云玉奴弦索花奴手玉奴謂楊妃花奴謂汝陽王璡也及觀和楊公濟梅花詩乃言玉奴終不負東昏何耶按南史東昏妃潘玉児當是筆悞尓韓退之詩曰離騷二十五王逸序天問亦曰屈原凢二十五篇今楚詞所載二十三篇而已豈非并九辨大招而為二十五乎九辨者宋玉所作非屈原也今楚詞之目雖以是篇併注屈原宋玉然九辨之序止稱屈原弟子宋玉所作大招雖疑原文而或者謂景差作若以宋玉痛屈原而作九辨則招魂亦當在屈原所著之數當為二十六矣不知退之王逸之言何所㩀耶杜子羙栢中允除官制詩舊註以為栢耆又以為正節按杜詩云紛然䘮亂際見此忠義門蜀中㓂亦甚栢氏功彌存三止錦江沸獨清玉壘昏當是有功扵蜀者方是時叚子璋反扵上元徐知道反扵寳應而正節為卭州刺史數有功則是正節無疑矣杜集又有栢學士茅屋栢大兄弟山居詩議者皆以謂正節之居然詩中殊不及功名之事但皆稱其為學讀書尔茅屋云古人巳用三冬足年少今開萬卷餘山居云山居精典籍文雅渉風騷疑是卭州立功之前丹陽集黄魯直詩云世有捧心學取笑如東施梅聖俞云曲眉不想西家様餒腹還須二子清太平寰宇記載西施事云施其姓也是時有東施家西施家故李太白效古云自古有秀色西施與東鄰而東坡代人留别詩乃云綘蠟燒殘玉斚飛離歌唱徹萬行啼他年一舸鴟夷子應記儂家舊姓西似與寰宇記所言不同豈為韻所牽耶同上張無盡嘗和山字云安得將相似仲山人疑之以近人所常用皆山甫也觀後漢志陽樊攅茅田服䖍注云楚仲山所居又楊脩荅臨淄侯牋云仲山周旦之儔只稱仲山何疑之有黄常明坡記王凌過賈逵廟呼曰賈梁道我大魏之忠臣也及司馬景王病夢逵為崇因為詩曰嵇紹似康為有子郄超畔鍳似無孫如今更恨賈梁道不殺公閭殺子元盖怪梁道忠義之靈不能自巳其子充之惡按晋紀王賈所殺者乃宣帝名懿字仲達非景帝子元也䂬溪正訛門天闚象緯逼雲卧衣裳冷世傳古本作天闚今從之莊子以管闚天正用此字舊集以作闕又或作關今不取盖先生詩該衆羙者不惟近體嚴扵屬對至扵古風句對者亦然觀此詩可見矣近人論詩多以不必屬對為髙古何耶故詳論之以俟知者焉杜詩正異海右此亭古濟南名士多濟南實海右諸郡舊集一作海右今從之正文作海内非也拂天萬乗動觀水百丈湫拂字従一作兼畫馬詩有云翠華拂天來向東正文作沸非也君臣留歡娯樂動殷嶱嵑殷從上聲嶱嵑出文選音渇曷集韻山貌舊集作殷湯嶱音字皆悞盖縁湯字之訛二字從而倒之兼他詩二字悞倒之者非一豈知秋禾登貧窶有倉卒别本禾字一作未今從之按此詩十一月作禾字明矣昌黎謂年登而妻啼飢實此意也隂風西北來慘淡隨回紇紇字從一作鶻唐史徳宗朝始改名回鶻正文非也中興諸將収山東捷書夜報清晝同夜字從王介甫謂捷書晝夜至也舊作日今不取花門天驕子飽肉氣勇决諸詩之言花門者皆回紇也舊集作北門盖由字畫小誤唐以太原為北門非謂回紇明矣卒章申言花門也渡河不用船千騎常撇捩撇捩疾貌大食刀歌云鬼物撇捩辭沆壕字意皆同今從之舊集作撇烈非也嬋娟碧蘚静蕭摵寒籜聚蘚字従别本舊集作鮮盖字畫小缺而釋者因云嬋娟碧蘚皆謂竹也尤謬長夜苦寒誰獨悲杜陵野老骨欲折此成都詩舊集作長安非也其夜字之訛故悞作安耳况卒章之意明甚南京亂初定所向色枯槁色字従别本他詩亦云朝野色枯槁正文作邑今不取樹枝有鳥亂棲時瞑色無人獨歸客棲字従一作正文作鳴今不取言亂棲則鳴可知矣高皇亦明王魂魄猶正直皇字舊集諸本皆作堂近見别本作皇今従之乃與上下數聮詩意相貫也詢之閬人其漢高祠廟今尚存焉别離重相逢偶然豈足期足字舊集作定盖由字畫小訛况上句巳云泄雲無定姿悲䑓蕭颯石巃嵸哀壑􅒎枒浪呼洶浪字作别本考两句属對之二當用一實字又别本下句作二鶯猛胸絛徐墜字亦未通主守問家臣分朋見溪畔耘者必分朋曹而進故東坡逺景樓記謂耘者畢出數百人為曹者是也舊作明乃字小訛耳風吹巨熖作河漢騰烟柱諸本下句作何掉騰烟柱蜀本何作河近見別夲今從之盖扵詞意通也合昏排鐡騎清曉散錦幪幪字他詩有云駑駘怯錦幪乃覆馬之物正文作􅐒非也大火運金氣荆揚不知秋火字從一作謂大火西流七月詩也正文作暑今不取終然契真如得匪金仙術二句並從一作正文作終契如徃還得匪合仙術今不取㡬度寄書白塩北故人贈我青絲裘絲字從一作縑别本正文止作絲字此詩寄裴施州者或謂裴冕非也按唐史冕以寳應元年貶施州刺史不數月移澧州距此巳六年矣配極玄都閟慿高禁籞長籞字舊集諸本皆作蘌按西漢宣帝紀云池籞者其字從竹今従之尸郷餘土室誰話呪雞翁誰話從事見列仙傳正文作雞說乃字之訛也咒字一作喌音州又音祝茂樹行相引連山望忽開茂字連山字皆從一作時歸鳯翔行在正文連山作連峰非也霧樹亦然掖垣竹埤梧十㝷洞門對霤常隂隂霤字從别本文選云二堂對霤此春深詩也而諸本作雪悞矣江上小堂巢翡翠苑邉高塜卧麒麟苑字從一作正文作花盖字畫小訛而說者云一詩連用三花字不害為工誤矣雲㫁岳蓮臨大路天晴宫柳暗長春大路陜華間地名也晋書檀道濟從劉𥙿伐姚泓至潼關姚鸞屯大路以絶道濟粮道而蜀本正作大道誤矣馬嬌朱汗落胡舞白題斜朱汗巳見他詩舊作珠乃衍文也白題從一作西漢云斬胡白題將字義與雕題同正文作蹄非也力疾坐清曉來詩悲早春詩字從别本考詩題與上下句意當從之舊作時非也峽雲籠樹小湖日蕩船明蕩字従一作非乆㳺江湖者不知此字之工正文作落盖字訛也合觀却笑千年事驅石何時到海東題云觀造竹橋即日成句中合觀字謂聚觀橋成之速而笑驅石之誕舊集諸本皆訛作歡非也百家詩話總龜卷之十八
