front:
  text: 增修詩話總龜卷之三十七
  hash: sha256:4897c7abb8a6f15c62b5d03243237501b6bdfef8f9fb8d62a50b1a19f7de9115
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_037-1a}
body:
  text: 譏誚門下太中元年魏扶知禮闈入貢院題詩曰梧桐葉落滿庭隂鎖閉朱門試院深曾是昔年辛苦地不將今日負前心心及榜出為無名子削為五言詩譏之南部新書先天中王上客為侍御史自以才望當在前行忽除膳部貟外郎微有恨惋吏部郎中張思咏曰有意嫌兵部專心望考功誰知腳踜蹬幾落省橋東蓋膳部省是東北隅也趙璘儀質麼陋第名後赴􅊚禮儐相以詩嘲之曰巡關雖傍樗蒲局望月還登乞巧樓第一莫教嬌太過緣人衣帶上人頭又曰不知元在鞍橋裏將謂空馱席帽歸又曰火爐床上平驅立便與夫人作鏡臺崔立言髙退隱茅山善謔浪為詩贈營妓敦龎者曰瓦棺寺裏逄行迹華嶽山頭露掌痕不須惆帳愁難嫁待與將書問嶽神瓦棺寺有大佛迹嶽神大人又醉中謔浙江廉使曰山夫留意向丹梯連帥邀來出藥畦常見浙東誇鏡水鏡湖元在浙江西並同上太平廣記言杜牧為宣州幕有酒妓肥大牧之贈詩曰盤柤當時有逺孫尚令今日逞家門一車白土將泥臉十幅紅綃輔破裩瓦棺寺裏逄行迹華嶽山前見掌痕不須啼哭愁難嫁待與將書問嶽神與此同未知孰是張唐卿進士第一人及第期集于興國寺題壁云一舉首登龍虎榜十年身到鳯凰池有人續云君看姚曄并梁固不得朝官未可知後果京官筆談惠崇詩自負有河分岡勢斷春入燒痕青時人或有疑譏其犯古者嘲之曰河分岡勢司空曙春入燒痕劉長卿不是師兄多古句古人詩句似師兄間居詩話元居中作宿守郡有官妓小蘇善歌舞幼而聰彗元守甚憐之一日宴罷令就座客關彥長求詩關善詼諧即當時名公也得詩云昔日聞蘇小今朝見小蘇未知蘇小貌得似小蘇無由是以此自負相傳以起聲士大夫從此作詩甚衆洎長大數年間體豐修長未免尚語比蘇子瞻出知湖州亦耒乞詩蘇書與之云舞腰窈窕影搖千尺龍蛇動歌喉宛轉聲散半天風雨寒此石曼卿古松詩遂士大夫笑泗上録曹唐羅隱同時才情不殊羅曰唐有鬼詩或曰何也曰水底有天春寂寂人間無路月茫茫唐曰羅有女子詩或曰何也曰若教解語應傾國任是無情也動人此蓋羅牡丹詩也盧瓌杼情賈島狂狷行薄執政惡之故不與選裴晉公于興化作池亭島詩曰破却千家作一池不栽桃李種薔薇薔薇花謝秋風起荆棘滿庭公始知人皆惡其不遜古今詩話胡旦祕監性𥚹躁喪明居襄陽愛譏郡政夏英公常師事之及公貴逹胡尚以青襟視公公出鎮襄陽時一造焉一日謂公曰讀書乎郡事少暇比只作淂一燕雀詩胡曰試舉之曰燕雀紛紛出亂麻漢江西畔使君家空堂自恨無金彈任爾啾啾到日斜自爾少戢蔡君謨守福唐會李太伯與陳烈于望海亭以歌者侑酒方舉板一拍陳驚怖越席攀木踰垣而去李作詩曰七閩山水掌中窺乘興登臨到落暉誰在晝橋沽酒處幾多鳴櫓趂潮歸晴耒海色依希見醉後鄉心積漸微山鳥不知紅粉樂一聲檀板便驚飛蓋譏其矯也梅聖俞過楊州宋公序送鵝作詩謝云嘗逰鳯池上曽食鳯池萍乞與江湖客從交養素翎公序得詩不懌同前乾符末有客寓于廣陵開元寺不為僧所禮一筆題門而去龕龍去東時日隱西斜敬文今不在碎石入流沙僧衆皆不能詳之獨有沙彌能解衆問其由則龕龍去矣有合字時日隱矣有寺字敬文不在苟字也碎石入流沙卒字也此不遜之言辱我曺也衆僧大悟沙彌乃懿皇朝雲皓供奉也長沙六快詩致仕屯田王揆作也六人謂帥周沆漕趙良規憲李碩劉舜臣倅朱景陽許玄詩略曰湖外風物竒長沙信難續衡峰排古青湘水湛寒緑舟楫通大江車輪會平陸昔賢官是邦仁澤流豐沃今賢官是邦刳啖人脂肉懷昔甘棠花傷今猛虎毒然此一郡內所樂人才六漕與二憲僚守連兩通屬髙堂日暮會深夜繼以燭幃幕皆綺紈器皿盡金玊歌喉若珠纍舞腰如素束千態與万狀六人歡不足因成快活詩薦之堯舜目餘數聮猥不可録揆與樊太慱立里閈友素俱老于故鄉而林泉相依以二踈自髙謗詩既出捕樊以脅之樊義薄無守悉以逰從之事賣之以求苟免而希賞獄具讟謗削籍立以告發加秩昻然拜􅒛略無三禠之羞訓詞云為爾交者不其難乎湘山録皇甫松箸醉鄊日月三卷自敘之云松丞相竒章公表甥然不薦舉因襄陽大水變極言誹謗有夜入真珠室朝逰玳瑁宫之句丞相有愛姬名真珠張曙崔昭緯中和間西川同舉相與謁日者問命時曙自恃才名籍甚人皆呼為將耒狀元崔亦分居其下無何日者殊不顧曙惟目崔曰將來万全及第曙有愠色曰郎君亦及第但崔家郎君拜相當于此時過堂既而曙果以愴恤不終場昭緯首冠曙以詩刺之曰千里江山陪驥尾五更風水失龍鱗昨夜浣沙溪上雨緑楊芳草為何人崔不平之會夜飲崔以巨觥飮張拒之崔曰但吃待我作宰相與你取狀元張拂衣而出因不叶後七年崔自內大廷拜張于後三榜裴公下及第果于崔公下過堂並同上崔珏佐大魏公幕與副車袁充不叶公俱薦之于朝崔拜藝閣校讎縱舟江滸會有客以絲桐詣公公善之而迎珏至公從容為客請一篇珏方懷拂鬱因而發泄所蓄為詩七條弦上五音寒此藝知音自古難惟有河南房次律始終憐淂董亭蘭公不懌崔大慚恚元微之在浙東時賔府有薛書記飲酒醉因爭令以酒器擊傷微之由此遂去幕乃作十離為獻詩云馴擾朱門四五年毛香足淨有人憐無端咬著親情腳不得紅絲毯上眠犬離家越𬋩宣毫始稱情紅箋𥿄上撒花瓊都緣用久鋒頭盡不得羲之手裏擎筆離手雲耳紅毛淺碧蹄追風曽到日東西為驚玊貌郎君墜不得華軒更一嘶馬離廄隴西獨自一孤身飛去飛耒上錦茵都緣出語無方便不得籠中更喚人鸚鵡離籠出入朱門未忍拋有人常變語咬咬􅋦泥穢汚珊湖簟不得梁間更壘巢燕離巢皎潔圎明內外通清光似照水晶宫都緣一點瑕相汚不得終霄在掌中珠離掌戲躍蓮池四五秋常搖朱尾弄輪鈎無端擺斷芙容朵不得清波更一遊魚離池瓜利如鋒眼似鈴平原捉兔趂髙晴無端竄向青雲外不得而今手上擎鷹離鞲䈵鬱新栽四五行常將正節負秋霜為緣春笋鑽墻出不得垂隂覆玊堂竹離亭鑄㵼黃金鑑始開𥘉生三五月徘徊為遭無限塵蒙汚不得華堂上玊臺鑑離臺元公詩曰馬上同携今日杯湖邊還拂去年梅年年只是人空老處處何曽花不開歌咏每添詩酒興醉酣還命𬋩弦來樽前百事皆依舊點檢唯無薛秀才托言鑑戒録有薛濤上連師犬離家魚離池鸚鵡離籠竹離叢珠離掌五詩謂㾕書記不知孰事是趙昌言為樞密副使時陳儀與董􅌂俱為三司鹽鐵副使胡旦知制誥院盡同年生俱少年為一時之俊梁皓又嘗與同幕五人者旦夕會飮于樞第茶觴壼矢未嘗虛日每乘醉夜方歸金吾吏逐夜候馬首聲喏儀以醉鞭指其吏曰金吾不惜夜玊漏莫相催都人諺曰陳三更董半夜玊壼清話張文潛嘗作齊安行詞甚不美未云最愁三伏熱如甑北客十人九人病百年坐死回中州千金莫作齊安遊而潘邠老黃人也為作解嘲云為邦雖陋勿雌黃我曽侍立蘇公旁見公顔色不撨悴不似賈誼耒江湘它州雖粗勝吾州無此兩公相繼遊直方詩話王令逄原廣陵人既見知於舒王聲譽赫然時附麗之徒望風伺候守牧冠蓋日滿其門進譽獻諂𥘉不及文字間也􅑮原猒之大署其門云紛紛閭巷士看我復何為來即令我煩去即我不思意有知恥者而干謁不衰東坡號思聰詩為水鏡集又作序贈之云聰能為水鏡以一含万則書與詩當益竒吾將觀焉以為聰淂道深之候及聰來京師種種不進有人戲之云水鏡年來亦太昏張文潛作大旱詩云天邊趙盾益可畏水底武侯方醉眠時人以為幾于湯燖右軍也並同上晉劉道真遭亂于河側牽船見一老嫗搖櫓道真嘲之曰女子何不調機弄杼因甚旁河搖櫓答曰丈夫不跨馬揮鞭因甚旁河牽船又嘗與人草中同盤共飲見一嫗將兩小兒過並著青衣嘲之曰青羊引雙羔婦人曰兩豬共一槽道無以對因話録唐宋國公瑀不解射九月九日賜射瑀箭俱不著垜一無所獲歐陽詢詠之曰急風吹緩箭弱手馭強弓欲髙翻復下應西還又東十回俱著地兩度併擎空惜問誰為此只應是宋公簫瑀封宋國公太平廣記東臯子王績字無功有杜康廟碑醉鄉記備言酒德廣陵人劉虛白擢進士第嗜酒有詩云知道醉鄉無戶稅任他荒却下丹田世之嗜酒者苟為仲尼之徒淂為誥戒乎北夢瑣言李度顯德中舉進士攻詩有醉輕浮世事老重故鄉人之句人多誦之王朴為樞密以此一聮薦于申文炳知舉遂擢為第三人嘲曰主司只選一聮詩玊壷清話冦文公嘗與張洎同省一日作庭雀詩譏洎曰少年挾彈多狂逸不用金丸用蠟丸蓋譏洎頃在江南重圍中而李煜草詔內于蠟丸中追上江救兵之事也洎不免強顔附之後稍親䁥同上龔彥和謫化州持不殺戒日夜禮佛對客蟣虱滿衣領不恤也鄒志完嘲曰衣領從教虱子緣夜深拜淂席兒穿道鄉活計君知否飢即須餐困即眠冷齋夜話詩話總龜卷之三十七百家詩話總龜後集卷之三十七譏誚門坡逰武昌寒溪云楚雨遂昏雲夢澤吳潮不到武昌宮又周遊困卧九折嶺褰衣獨上吳王臺于一時筆快遂以上宮目之繼而有李成伯云嗟嗟漢鼎久傾東肉食曽無智與忠孟德仲謀交號令本𥘉耦地搶姦雄武侯偶失三分䇿孫氏俄成一戰功寂寞西山舊巢穴庸兒尤道帝王宮語幾乎詈矣但渠不記其家太白曽作武昌韓侯去思頌黃金之車大吳天子武昌鼎據實為帝里其罪大矣碧溪永叔萬釘寶帶爛熳環人謂此帶幾度道著觀子美緋魚以及之扶病垂朱紱挈帶看朱紱銀章付老翁世未嘗􅏺之者豈以其人不止冝此服邪固嘗有云朱紱負平生又云居然綰章紱受性本幽獨同上唐竇常牟群庠鞏兄弟五人四人擢進士獨群客隱毗陵因韋夏卿屢薦始入仕皆詩人也牟晚從昭義盧從史從史䆮驕牟度不可諌即移疾歸東都故其秋夕間居詩云燕燕辝巢蟬蛻枝窮居積雨壞藩籬群嘗為黔中觀察使故其詩云佩刀看日晒賜馬旁江調言語多重譯壷觴每獨謡而鞏詩中乃有自京師將赴黔南之所謂風雨荆州二月天問人𥘉顧峽中船西一望雲和水尤道黔南有四千此詩疑群所作而誤置鞏集中爾常歷武陵夔江撫四州刺史所謂看春又過清明莭算老重經癸巳年者將之武陵到松滋渡之所作也庠詩不見其巡內一絶云愁雲漠漠草離離太液鈎陳處處疑薄暮毁垣春雨裏殘花猶發萬年枝造句亦可謂秀整矣兄弟中獨群詩稍低又不得舉進士而位反居上鞏詩有放魚詩云好去長江千萬里不須辛苦上龍門豈非為群而言乎史載鞏平居與人言若不出口世號囁嚅翁乃肯為是耶葛立之謝靈運在永嘉臨川作山水詩甚多往往皆佳句然其人浮躁不羈亦何足道哉方景平天子踐阼靈運巳扇搖異同非毀執政矣暨文帝召為祕書監自以名輩應參時政而王曇首王華等名位踰之意既不平多稱疾不朝則元君之心巳見于此時矣後以遊放無度為有司所紏朝廷遣使收之而靈運有韓亡子房奮秦帝魯連恥之詠竟不免東市之戮而白樂天乃謂謝公才廓落與世不相遇壯志鬱不用須有所泄處泄為山水詩逸韻諧竒趣何也武帝文帝兩朝遇之甚厚內而卿監外而二千石亦不為不逄矣豈可謂與世不相遇乎少須之安知不至黃散而𥚹躁至是惜哉其作登石門詩云心契九秋幹目玩三春荑居常以待終處順故安腓不知桃墟之泄能處順耶五羊之禍能待終耶亦可謂心語相違矣韻語陽秋荆公作商鞅詩云今人未可非商鞅商鞅能令政必行余竊疑焉孔子論為君難有曰如其善而莫豫違也不亦善乎如不善而莫豫違也不幾乎一言而喪邦乎蓋人君操生殺之權志在使人無違于我其何所不至哉商鞅助秦為虐而乃稱其使政必行何耶後又有謝安詩云謝公才業自超群誤長清談助世紛秦晉區區等亡國可能王衍勝啇君則知前萹有激而云也杜子美云舜舉十六相身尊道何高秦時用商鞅法令如牛毛則知所去耴矣韻語陽秋荆公以詩賦決科而深不樂詩賦試院中五絶其一云少年操茟坐中庭子墨文章頗自輕聖世選才終用賦白頭來此試諸生後作詳定官復有詩云童子常誇作賦工暮年羞悔有楊雄當年賜帛倡優等今曰論才將相中細甚客鄊因茟墨卑于爾雅注魚蟲漢家故事真當改新詠知君勝弱翁熙寧四年既預政遂罷詩賦專以經義耴士蓋平日之志也元祐五年侍御史劉摯等謂治經者專守一家而略諸儒傳記之學為文者惟務訓釋而不知聲律體要之詞遂復用詩賦紹聖𥘉以詩賦為元祐學術復罷之政和中遂著于令士庶傳習詩賦者杖一百畏謹者至不敢作詩時張藝叟有詩云少年辛苦校蟲魚晚歲雕蟲恥壯夫自是諸生尤習氣果然紫詔盡驅除酒間李杜皆投筆地下班揚亦引車唯有少陵頑鈍叟靜中吟撚白髭鬚蓋藝叟自謂也葛立之黃魯直云陶淵明責子詩曰白髮𬒳兩鬢肌膚不復實雖有五男兒捴不好紙筆阿舒巳八懶惰故無匹阿宣行志學而不愛文術雍端年十三不識六與七通子垂九齡但覔梨與栗夫運苟如此且進杯中物觀淵明此詩想見其人慈祥戲謔可觀也俗人便謂淵明諸子皆不肖而淵明愁歎見于詩耳又杜子美詩陶潛避俗翁未必能逹道觀其著詩萹頗亦恨枯稿逹生豈是足默識蓋不早生子賢與愚何其挂懷抱子美困頓于三川蓋為不知者詬病以為拙于生事又往往􅏺議宗文宗武失學故聊解嘲耳其詩名曰遣興可解也俗人便為􅏺病淵明所謂癡人前不得説夢也作詩不知風雅之意不可以作詩詩尚譎諌唯言之者無罪聞之者足以戒乃為有輔而涉于毀謗聞者怒之何輔之有觀蘇東坡詩只是􅏺誚朝廷殊無溫柔崇厚之氣以此人故得而罪之若是伯淳詩聞者自然感動因舉伯淳和溫公諸人禊飲詩云未須愁日暮天際是輕隂又泛舟詩云只恐風花一片飛何其溫厚也龜山語録東坡云今太白集中有歸來乎笑矣乎及贈懷素草書𢾗詩決非太白作蓋唐末五代間學齊巳輩詩也余舊在冨陽見國清院太白詩絶凡近過彭澤興唐院又見太白詩亦非是良由太白豪俊語不甚擇集中亦往往有臨時率然之句故使妄庸輩敢耳若杜子美世豈復有偽撰邪余嘗舟次姑熟堂下讀姑熟十詠怪其語淺近不類李白王平甫云此李赤詩也赤見栁子厚集自比李白故名赤其後為厠鬼所惑以死今觀其詩止此而以太白自比則其人心疾久矣豈厠鬼之罪也苕溪漁隱曰東坡此語蓋有所􅏺而已元祐文章世稱蘇黃然二公當時爭名互相譏誚東坡嘗云黃魯直詩文如蝤蛑江珧柱格韻高絶􅐻飱盡廢然不可多食多食則發風動氣山谷亦云蓋有文章妙一世而詩句不逮古人者此指東坡而言也二公文章自今視之世自有公論豈至各如前事蓋一時爭名之詞耳俗人便以為誠然遂為􅏺誚所謂蚍蜉撼大樹可笑不自量者邪王直方詩話云文潛賦虎圖詩末云煩君衛吾寢振此蓬蓽陋坐令盜肉鼠不敢窺白晝或云此却是貓兒詩也又大旱詩云天邊趙盾益可畏水底武侯方醉眠時人以為幾于湯燖右軍也東軒筆録云彭乘為翰林學士文章誥命尤為可笑有邊帥乞朝覲仁宗許其候秋涼即途乘為批答之詔曰當俟蕭蕭之候爰興靡靡之行王琪性滑稽多所侮誚及乘死也琪為挽詞云最是蕭蕭句無人繼後風蓋為是也後山詩話云楊蟠金山詩云天未樓臺橫北固夜深燈火見揚州王平甫云莊宅牙人語也解量四至吳僧錢塘白塔院詩曰到江吳地盡隔岸越山高余謂分界堠子語也隱居詩話云至和中阮逸為王宫記室王能詩多與逸唱和逸有句曰易立太山石難枯上林栁有言其事者朝廷方治之會逸坐他事因廢棄之百家詩話總龜後集卷之三十七
