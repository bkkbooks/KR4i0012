front:
  text: 增修詩話總龜卷之四十六
  hash: sha256:56e595a2406daa22643661d766cd6a812cb9ef12a19b348d0a8315614fd01063
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_046-1a}
body:
  text: 藝術門鍾傳領江西日客有以覆射之法求見傳以曆日包橘置袖中令射客云太歲當頭坐諸神不敢當其中有一物常帶洞庭香唐宋遺史何龍圖中正初登第聞西川郭從周精于卜乃以縑素求筮從周作一絶贈之云三字來時月正圓一麾從此出秦關錢塘春色濃如酒貪醉花間卧不還公後宦逹以三月十五日授知制誥以言邊事忤旨出知秦州後移杭州而捐館舍從周之筮何其驗歟黃州東南三十里為沙湖亦曰螺螄店豫買田其間因往相田得疾聞麻橋人龎安常善醫而聾遂往求療安常雖聾而頴悟絶人以指畫字不盡數字輒深會人意余戲之曰余以手為口君以眼為耳皆一時異人也疾愈與之同遊清泉寺在蘄水郭門外二里許有王逸少洗筆泉水極甘下臨蘭溪溪水西流余作歌云山下蘭牙短浸溪松間沙路淨如泥蕭蕭春雨子規啼誰道人生無再少君看流水尚能西休將白髮唱黃雞是日極飲而歸百斛明珠王建宫詞百首多言禁中事皆史傳小説所不載者往往見于其詩如內中數日無呼喚傳得滕王蛺蝶圖之類滕王元嬰高祖子新舊唐書皆不著其所能惟名畫録略言其善畫亦不言其工蛺蝶也惟見于建詩耳或聞今人家亦有淂其圖者唐世一藝之善如公孫大娘舞劍曹剛琵琶米嘉榮歌皆見于唐賢詩句遂知名于後世當時山林田畝潛德隱行君子不聞于世者多矣而賤工末藝得所附託乃垂名不朽亦各係乎幸不幸爾合淝人傳論言曹谷善星曆衍數談事如神為王兾公作命書云七十年中一一加弄珠灘上事堪誇碧油幢下聞鳴鳥千日催還上漢搓公年七十二知襄陽正得千日召還又云周匝將臨壬戌歲定鼎門前春色異一千日上少三環再入和羹冝盡醉後兾公判西京將七百日再入政府壬戌歲也又云臨去尚猶聞禁漏異姓佳名在史書兾公薨謝之夕漏將盡無子其壻張環掌喪事並古今詩話俳優門李家眀江南李璟時為樂部頭善滑稽為諷詠璟逰後苑登臺見牛晚卧璟曰牛旦熟矣家眀曰臣不學敢上絶句云曾遭寧戚鞭敲角又𬒳田單火燎身間背斜陽嚼枯草而今問喘更無人左右之臣皆冠謝罪李氏乃徐溫飬子及僣號遷徐氏于海陵璟繼統用宋齊丘言無男女少長皆殺之今海陵州宅之東小墳十數皆當時所殺徐氏之族也宋齊丘只一子輒卒逾月慟哭不止家眀曰惟臣能止之乃作大𥿄鳶上大書曰欲興唐祚革強吳盡是先生作計謨一箇孩兒拚不得上皇百口合何如乘風吹之度至齊丘家遂絶其縷齊丘見之慚感乃止璟于後苑命臣僚臨池而釣諸臣屢引到數十巨鱗惟璟無所獲家眀乃進口號曰新甃垂鈎興正濃御池春暖水溶溶凡鱗不敢吞香餌知道君王合釣龍璟善之幸南都畫江為界舟楫多行南岸至趙北因輟樂停觴北望皖公山謂家眀曰好數青峰不知何名家眀應聲曰龍舟輕漾錦帆風正值宸逰望逺空回首皖公山色翠影斜不到夀杯中出江南野録互見談苑所載不同未知孰是江南李氏樂人王感化建州人隸光山樂籍建州平入金陵教坊少聰敏未曾執卷而多識善為詞口諧捷急滑稽無窮時本鄉節帥更代餞别感化前獻詩曰旌斾赴天臺溪山曉色開萬家悲更喜迎佛送如來至金陵宴苑中有白野鵲李璟令賦詩應聲曰碧岩深洞恣逰遨天與蘆花作羽毛要識此來棲宿處上林瓊樹一枝高又題怪石九八句皆用故事但記其一聮云草中誤認將軍虎山上曾為道士羊談苑楊叔寶郎中與眉州人言頃眉州視事後三日作大排樂人獻口號其末句云為報士民須慶賀火星去了福星來喜召優人問曰大排致語誰做對曰本州自來舊例只用此一首湘山録丁晉公鎮金陵嘗作詩有吾皇寬大容尸素乞與江城不計年之句天聖中李文定公出鎮金陵一日郡宴優人作語意其宰相出鎮所作理必相符誦至落句頂望抗聲曰吾皇寬大容尸素乞與江城不計年賔僚皆俯首文定笑曰是何是何上聞見責歸田録賞花釣魚會詩賦往往有宿思者天聖中永興軍進山水石適會宴命賦山水石歌蓋出不意中生優人入戲各執𥿄筆作吟哦狀其一優人或仆于石上衆扶掖起既起曰纍日來作一首賞花釣魚詩準備應制却𬒳這石頭摖倒左右皆大笑翌日降出詩令中書銓定內有鄙惡者落職與外任東齋記竒怪門王謝金陵人世以航海為業一日于海中失舟泛一板登岸見一翁一嫗皆衣皂引謝至所居乃烏衣國也以女妻之既久謝思歸復乘雲軒泛海至其家有二燕棲于梁間謝以手招之即飛來臂上取片𥿄書小詩繫于燕尾曰誤到華胥國裏來玉人終日苦憐才雲軒飄去無消息灑淚臨風幾百回來春燕回徑飛來謝衣上燕尾有詩一云昔日相逢冥數合如今暌逺是生離來春縱有相思字三月天南無鴈飛至來嵗燕竟不至因目謝所居為烏衣巷劉禹錫有詩曰朱雀橋邊野草花烏衣巷口夕陽斜舊時王謝堂前燕飛入尋常百姓家托遺彭城劉景直雍熙間逰華清宫因題詩于門屏問云天子多情寵太真六宫專幸掌中身漁陽鼓動長安破從此香肌委路塵是夜夢明皇召去論當時事妃子索景直有所贈立作詩曰玉刻水中龍雲牌揭故宫霓裳滿天月粉骨幾春風眉勢從山盡裙腰芳草空共知千古事悽恨與誰同𡵨王至明皇曰來何晚王曰適杜甫到臣帳中誦哥舒翰詩向臣似有德色云日月低秦樹山河繞漢宫明皇又曰常愛伊夜闌更秉燭相對如夢寐之句李白終無甫之筋骨至如賈至崔輔國亦闕自然之句張老死把筆無伊一字遂宴飲忽聞寶雲寺鍾聲方覺郭平振武舊將士分配于錢塘給官屋居之屋在修文坊舊為白板書尤賃燒藥丹朱欲往而官吏丁踈因逐之乃破爐而去白因召丁踈同飲謂踈曰大藥為吾子所破有小戲術子醒酒乃取盤一面置于膝上以指敲兩腕出五色彈子兩枚化為雙燕而飛白曰僕射髭甚繁燕好去可減些言未畢二燕化為二小劍長五寸餘鋒刃如雨交舞于踈之頥頷間髭落如雪踈懼甚白呼劍下盤中依前成二丸納于左右腕而去錢昭度贈白詩曰袖裏青鋒秋水寒誰疑雙燕是金丸出門風雨如何去空有霜髭在玉盤無諸彭演西逰鄠縣宿甘泉店間步原野忽有一少年引至一古官舍甚宏壯梁上有紅絲羯鼓縚數條垂于地一老人杖而守之演問曰此何處老人曰開元興慶宫也來此者二百年中十二人爾去時莫不為詩請書一絶可乎演為詩曰長安宫闕半蓬蒿塵暗虹梁羯鼓縚惟有水天明月夜一條空碧見秋毫演又曰十二人之詠可得聞乎老人舉章曰小小蓬山刻得成宫簾不動結飛鯨誰將八月天河水瀉到重樓無浪聲此楊尚書所作也又誦一章曰金人無路守瓊山坐見雲生棟宇間忽墜霜飛翠樓曉不知龍尾許誰扳此裴中書所作也再詢楊裴之名則瞪而不答錢仁伉尚父之孫也為元帥府中書檢校司徒與中軍都虞候金沼鄰居沼所居堂東植牡丹花一本著花三百朵其色如血如之金含稜每瓶子頂上有碎金絲如自然蛺蝶之狀一城以為殊異每嵗花開張宴仁伉預焉開寶七年春三月花才一兩朵開仁伉一夕洪飲擊劍裎服中單背負大籃左手携鋤腰插六􅎅首踰墻而過沼中外無知者鋤取牡丹置籃中乃平其地空中聞有吁歎之聲微細若逰蜂音辭曰一花三百朵含笑向春風眀年三月裏朵朵斷腸紅仁伉異之移植于亭後明日沼覺失花為非人力所及來年花盛開乃宴召沼沼一見無語得疾以歸至夜憤悶不已以刀決腸而卒腸皆寸寸斷果符空中之語鄭繼超廣州人赴官鳯翔道逢田參軍同行家纍千餘人言是東川替罷亦入西京繼超與欵自言洛下有莊在北邙山下因問鞍乘極多何也曰亡室人來多年皆蜀中孤寡家子息亦欲旋旋與人繼超曰願得一人乃令妙香與之是夕歸繼超家數年繼超卜居西洛一日忽謂繼超曰妙香非人也今將歸北邙山舊穴願乞同乘至北邙因問田參軍何人曰狐也是夕作别妙香歌以送酒曰勸君酒莫辭花落拋舊枝只有北邙山下月清光到死也相隨翌日同至北邙山下老君廟後妙香佯墜馬化為一狐迅走而去並洞微志唐王軒字公逺因遊苧羅山問西施之遺迹留詩于石上曰嶺上千峰秀江邊細草春今逢浣溪石不見浣溪人回顧見一女子素衣瓊珮謂軒曰妾自吳宫離越國素衣千載無人識當時心比金石堅今日為君堅不得軒知其異又貽詩曰佳人去千載溪山久寂寞野水浮白煙岩花自開落猿鳥舊清音風月間樓閣無語立斜陽幽情入天幕西子曰子之詩美矣不盡妾之所寄也乃答軒詩曰高花岩外曉相鮮幽鳥雨中啼不歇紅雲飛過大江西從此人間怨風月既暮已散期來日會于水濵翌日軒往則西子已在焉又相與飲軒詩曰當時計拙笑將軍何事安邦賴美人一似仙葩入吳國從茲越國更無春西子見之怨慕久之又曰雲霞出沒群峰外鷗鳥浮沉一水間一自越兵齊振地夢魂不到虎丘山既夜乃散異日又相遇而留者逾月乃歸郭素聞王軒之事逰苧羅留詩于泉石間莫知其數寂無所遇無名子嘲之曰三春桃李苦無言却𬒳斜陽鳥雀喧借問東鄰效西子何如郭素學王軒聞者大笑翰府名談朱休之家犬歌曰言我不能歌聽我歌梅花今年固自可眀年當奈何明年兵亂城陷梁亡詩史杜少陵因見病瘧者謂之曰誦吾詩可療病者曰何杜曰夜闌更秉燭相對如夢寐之句瘧猶是也又曰誦吾手提髑髏血模糊其人如其言誦之果愈言感鬼神亦不妄古今詩話石曼卿自少以詩酒豪放自得其氣貌偉然詩格竒峭又工于書筆畫遒徑體兼顔柳為世所好余家嘗得唐後主澄心堂𥿄曼卿為余草書其籌筆驛詩詩曼卿平生所自愛者至今藏之號為三絶真余家寶也曼卿卒後其故人有見之者云恍惚如夢中言我今為仙也所主芙蓉城欲呼故人往逰不得忿然騎一青騾去如飛後又云降于亳州一舉子家其舉子留不得因留詩一篇與之余亦略記其一聮云鶯聲不逐春光老花影常隨日腳流仙事怪不可知其詩頗類曼卿平時語舉子不能道也永叔詩話增修詩話總龜卷之四十六百家詩話總龜後集卷之四十六釋氏門韋應物奉酬處士叔詩云髙齋樂宴罷清夜道相存東坡次王鞏韻云那能廢詩酒亦未妨禪寂子由春盡詩云楞嚴十卷幾廽讀法酒三升是客同道貴沖寂寞主歡暢二者恐不能相兼也白樂天延樂命釂之時不忘於佛事至今逹者譏之葛常之衡州花光仁老以墨為梅花魯直觀之嘆曰如嫩寒春曉行孤山籬落間但欠香耳余因為賦長短句曰碧瓦籠晴香霧繞水殿西偏小駐聞啼鳥風度女墻吹語笑南枝破臘應開了道骨不凡江瘴曉春色通靈醫得花多少抱甕釀寒春杳杳譙門畫角催殘照又曰入骨風流國色透塵種性真香為誰風鬢涴啼粧半樹水村春暗雪壓低枝籬落月髙影動池塘髙情數筆寄微茫小寢𥘉開霧帳前蝶戀花后西江月也冷齋夜話余自并州還故里館延福寺寺前小溪風物類斜川余兒童時戲劇之地也嘗春深獨行溪上作小詩曰小溪倚春漲攘我夜月灣新晴為不平約束晚見還銀梭時撥刺破碎波中山整釣背落日一葉嫩紅間又嘗莫寒歸見白鳥作詩曰剩水殘山慘淡間白鷗無事小舟間個中著我添圗畫便是華亭落照灣魯直曰觀君詩説煙波漂渺處如陸忠州論國政字字坦夷前身非篙師沙户種類邪有詩其略云吾年六十子方半稿項顛螺度歲年脫却衲衣著蓑笠來伴涪翁刺釣船嘗對淵材誦之曰淵材曰此退之澄觀我欲收斂加冠巾換骨句也冷齋夜話余還自珠崖館于髙安大愚山陳瑩中自台州載其家耒漳浦過九江愛廬山因家焉以書督余兼程來余以三日至湓城瑩中曰自此公可禁作詩無益於事余曰敬奉教然余兒時好食肉毋使持齋余叩頭乞先飫餐肉一日母許之今日當準食肉例先吟兩詩喜吾二人死而更生何如瑩中許焉曰鴈蕩天台看不足盡般兒女寄蓬窗往耒漳水謀二頃偶愛廬山家九江名節適真如醉白生涯領略似湘龎向耒萬事都休理且聽樓鍾一夜撞與公靈鷲曽聽法遊戲人間知幾生夏口甕中藏畫像孤山月下認歌聲翳消巳覺蒂礦盡方知珠自明數抹夕陽殘雨外一畨飛絮滿江城瑩中喜而謂余曰此岐山豬肉雖美無多食後三年余客漳水見瑩中姪勝柔自九江來出詩示余曰仁者難逢思有常平居慎勿恃何妨爭先世路機關惡近後語言滋味長可口物多偏作疾快心事過必為傷與其病後求良藥不若病前能自防余謂勝柔曰公癡詩如食鯽魚惟恐遭骨刺與岐山豬肉不可同日而語也泠齋夜話陳瑩中謫合浦時余在長沙以書抵余為負華嚴經入嶺有偈曰大士遊方興盡回家山凬月絶纎埃杖頭多少間田地挑取華嚴入嶺來余和之曰因法相逢一笑開俯看人世過飛埃湘南嶺外休分别圓寂光中共往耒又聞嶺外大雪作二偈寄之曰傳聞嶺外雪壓倒千年樹老兒拊手笑有眼未曽覩故應潤物材一洗瘴江霧寄語牧牛人莫教頭角露又曰偏界不曽藏處處光皎皎開眼失蹤由都緣太分曉園林匆生春萬瓦粲一笑遙知忍凍人未悟安心了冷齋夜話余觀志公十二時頌自非深悟上乘同佛知見豈能作此語也是時逹磨猶未西耒志以明此理所謂先得我心之所同然者志公沒于天監十三年而逹磨以普通八年至金陵由此之魏傳佛心印禪宗方興近世學佛者往往忽此頌而弗觀蓋貴耳而賤目矣余嘗手書此頌置之座右朝夕味之尤愛其最後一首云雞鳴丑一顆圓珠明巳久內外推尋覓捴無境上施為渾大有不見頭又無手世界壞時終不朽未了之人聽一言只這如今誰動口以至二祖信心銘永嘉證道歌皆禪學之髓𥘉地之人其可弗觀乎苕溪漁隱陳體常答黃冕仲二書敘學佛之旨深切著明余嘗三復其言歎其有理恨未能盡行也體常又有頌六首今録二首其一云密坐研窮有細微到頭須是自忘機應無祖佛能超越豈有冤親更順違歷歷孤明猶認影巍巍獨露尚披衣翻嗟會得昭靈者也道尋師旨歸其二云個中端的有誰知知者歸來到者稀即見即聞還錯會離聲離色轉乖違山青水緑明玄旨鶴唳猿啼顯妙機有意覔渠終不遇無心到處盡逢伊冷齋夜話云陳瑩中北歸過南昌言鄒志完在韶州極精進閉門誦華嚴經舍利生袖間此真入信位日誦華嚴於觀音像前有修竹三根生像之後志完揭茆出之不可乃垂枝覆像如世所畫寶陀嚴竹今猶無恙韶人扄鎖之以為過客逰觀北還至未州淡山岩有馴狐凡貴客至則鳴志完將至而狐輒鳴寺僧出迎志完怪之僧以狐鳴為言志完作詩曰我入幽岩亦偶然𥘉無消息與人傳馴狐戲學仙伽客一夜飛鳴報老禪苕溪漁隱余讀劉興朝悟道經真集其言曰余少治儒術長登仕版蓋未嘗信佛也三十有二歲見東林長老總公與之語七日始生信焉即取其書讀之三年蓋恨其信之之晚也然循其理而體會則似悟還迷依其法而行持則暫靜還擾既而閲傳燈録始知佛有法眼妙心密相付囑而逹磨西來單傳此事衆生悟者可以見性而了心其後發明此事但覺境界非常取證道歌讀之句句盡是吾之心地讀至六般神用空不空一顆貟光色非色如是希竒之事吾今巳得現前任是千聖出來巳須退步始得示人以偈曰世間多少英靈漢終是迷頭喚人喚可憐眼底黑漫漫不見􅌐珠光燦爛過今晡又耒旦不覺年華暗中換急抬頭髙著眼徑寸不容蚌中産靈利男兒薦得時好笑交渠腸𣣔斷又詩云今士堂堂此事同歸因處處獲貟通片心豁去滄𬈑窄雙眼開耒宇宙空出海銀蟾光動地離弦金簇疾追凬須知佛祖埋藏後坐斷千差是此翁苕溪漁隱百家詩話捴龜卷之四十六終
