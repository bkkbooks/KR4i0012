front:
  text: 增修詩話總龜卷之三十二
  hash: sha256:60b3d4879c26c5358eff2e6efdc84377e318d0de8ee8d251f77fc1206ec4b0de
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_032-1a}
body:
  text: 詩讖門下孟津詩人李讀字長源一日自孟津訪魏仲先曰數宿前有人在床下誦曰行到水窮處未知天盡時豫斥其誤曰豈非坐看雲起時耶答曰此雲安能起也茲必死期故來相别痛飲數日而卒古今詩話丁晉公總章聖陵事翰林學士李維援其親識為挽郎懇請于晉公曰更在陶鉒丁應聲曰隔鉒復陶鑄齋郎又挽郎自然堪下淚何必到斜陽未幾丁敗張唐卿進士第一人登科期集於興國寺題詩句于壁曰一舉首登龍虎榜十年身到鳯凰池有人續云君看姚曄并梁固不得朝官未可知後果終於京官趙嘏嘗有詩云早晚粗酬身事了水邉歸去一間人止于渭南尉以其精于詩時謂之趙渭南如韋蘇州云孫秀既恨石崇不與緑珠又憾潘嶽昔遇不以禮復遭遇晉武帝遂同日收石崇歐陽堅潘嶽送市石謂潘曰安仁復爾耶潘曰可謂白首同歸也潘金谷集云投分寄石友白首同所歸亦其讖也庾亮出石頭城百姓歌於岸上曰庾公上武昌翩翩如飛鳥庾公還揚州白馬牽旒旐果尋卒來鵬詩思清麗韋岫尚書常愛其才逰蜀夏課卷中有云一夜緑荷風剪破賺他秋雨不成珠識者以為不祥是年果失志丁晉公自崖召還有寄友人詩曰九萬里鵬重出海一千年鶴再歸巢句健意清然議者曰謂鵬處於海為得地出海則失水鶴返其巢則不能翺翔矣卒如其説又扈從東封嘗聞奈何黑水人間隂獄也感其事而為詩曰黑水溪旁聊駐馬奈何岸上試回頭高崕昏處是隂獄須信人生到此休非佳兆也丁晉公為侍中時嘗作詩曰千金家纍非良寶一品官高是強名未幾奪爵籍沒初釋褐為饒倅同年白稹為判官稹一日以片𥿄假緡伍鐶于公公笑曰榜下新婚京國冨室豈無半千質物耶懼我撓之故矯耳于間尾書一絶戲之曰欺天行止吾何有立地機關子太乖五百青蚨兩家闕赤洪崖打白洪崕朱崕之行兆于此蘇子美失意秋日登蘇之閶門云年光冉冉催人老雲物涓涓又變秋家在鳯凰城闕下江山何事苦相留又書其旁云江山留人也人留江山也卒不用亦詩之讖鄭毅夫罷禁林行次南都遇雨為二篇曰雨聲飄斷忽南去雲勢旋生從北流應料涼風消息近蕭蕭巳在樹梢頭又曰榴火燒空未擬休忽驚快雨破清秋晚雲淡淡趂落日只到楚江南岸頭僧文瑩見之訝其氣不振解錢塘赴青社卒楚州崔玄諫議有子名勉與趙叔平同年登第轉大理評事過天津橋墜馬時集賢韓公與趙同為開封府推官韓崔壻也聞其墜馬遽往視之但嘔血不止數日館于韓舍因作詩曰身隨花露重命逐藕絲輕明朝風雨霽歸路在三清明日果卒時有微風細雨盧多遜方丱角其父携就雲陽觀小學與群兒見廢壇上有古簽一筒競往抽之為戲多遜尚未識字抽一簽歸示其父詞曰身出中書堂須因天水白登仙五十二終為蓬島客父見之頗意以為吉兆逮作相與秦王事故敗始因遣堂吏趙白遂竄南荒卒于朱崕年五十二無一字之差並同前嚴惲字子重善為詩嘗有詩云春光冉冉歸何處更向花前把酒杯盡日問花花不語為誰零落為誰開纍舉不第卒于吳中南部新書汝州劉廷芝字希夷苦篇詠善為閨帷之作詞哀多似古調體勢與時不合遂不為人所重希夷美姿貌善彈琵琶好酒色落魄不拘常俗為白頭吟忽作一聮語曰今年花落顔色改明年花開誰復在既而復嘆曰我此語似讖石崇曰白首同所歸復何所異乃除之復作二句曰年年歲歲花相似歲歲年年人不同復歎曰死生有命豈復由此乃并留前句作詩後歲餘為姦人所害隋長夀年中有鄭州鄭蜀賔風流名士頗善五言蹉跎鄉閭不求聞逹垂挂冠選授江左一尉臨去賔友祖餞至上東門留别曰畏途方萬里生涯近百年不知將白首何處入黃泉酒酣自詠聲調哀蹙合坐嗚咽卒于官時人比之劉廷芝同前寇萊公初為密學方年少得意偶撰江南曲其句有江南春盡離腸斷蘋滿汀洲人未歸日暮江頭一望時愁情不斷如春水之類音皆悽愴末年果南遷拾遺孫咸不知何許人而長於預知災異又善為詩開寶初客于九江因逰廬山有詩留題九天使者廟云獨入玄宫禮至真焚香不為賤貧身秦淮兩岸沙埋骨湓浦千家血染塵廬阜煙霞誰是主虎溪風月屬何人九江太守勤王事好放天兵渡要津不踰數年金陵板蕩九江重闈人受塗炭並應此詩咸後卒於南昌衆人棄尸于江中泝流而上咸異之蘇易簡罷翰林學士以禮部侍郎知南陽日年未四十屢有間冷之嘆有老僧獨處外城古寺通儒術能詩故公與詩曰憔悴今年三十六與師氣味不爭多未幾而卒二宋以文章齊名天下子京守蜀日作詩三百名曰猥藁有碧雲謾有三年信明月空為兩地愁後卒不入兩地人以為詩讖王元澤少時作白苧行有云君心莫厭頻歡樂請看雲間日西入議者謂美則美矣然日西光景無多近乎讖果不永夀王鼎湖湘人字則之季父多遊江左有洪州西山詩云林泉空有東西路風月難尋十二家議者謂必無名第後果然嘗作鸂鶒詩云棲息應難近小池性靈間雅衆禽希蒲洲日暖依花立漁浦煙深貼浪飛遺羽參差沾水沫餘蹤稠疊印苔衣晚來林徑微風起何處相呼著對歸狄渙孤鴈云更無聲接續空有影相隨聞此句者皆云必無後果如其言並同前陳無巳賦高軒過詩云晚知書畫真有益却怪歲月來無多不數月遂卒直方詩話秦少遊紹聖初請外以校勘為杭倅方至楚泗間有詩云平生逋欠僧房睡準擬如今處處還詩成之明日以言者落職監處州酒人以為詩讖東坡有送戴蒙赴成都玉局觀詩云莫欺老病未歸身玉局他年第幾人又有過嶺一篇云劍南西望七千里乘興真為玉局逰後卒於是觀方元修字時敏一日與楊信祖饒次守過余坐中分題人以姓為韻而楊有共約城南方之句後數日録此唱和于前忽有一同人讀云共釣城南方蓋釣字以約字草不相辨而讀者悮之時敏大以為惡不三日其父省中歸暴卒後數月其母亦亡並同前范攄處士有子七歲作隱者詩云掃葉隨風便澆花趂日隂方干聞之曰此可入室又作夏景詩云間雲生不雨病葉落非秋干曰必不夀果卒後有歐陽彬之子稚齒作田父詩云桑柘殘陽裏兒孫落葉中廖凝見之曰可惜天才同范氏之子尋亦卒郡閣雅談髙若拙善詩從誨辟於幕下嘗作中秋不見月云人間雖不見天外自分明從誨覽之謂賔佐曰此詩雖好不利于巳將來但恐喪明後果如其言大定録王元之嘗作病鶴云埋瘞肯同鸚鵡冢飛鳴不到鳯凰池其文學才藻登金門玉堂不為難也竟不至其地見于是矣青瑣集張字退翁都下人有言懷詩云命交隨分樂天賜一生間埸屋有聲而不第亦詩之讖王寂都下人重信義少然諾嘗撫劍鋏為之歌曰人間冉冉混塵埃身後身前事莫猜早悟浮生都是夢當時悔向夢中來又曰當年吁氣謾如虹回首都歸冷笑中翠玉峰前好歸去可憐三十二秋風時寂年三十二明年寂知事莫非前定笑出都門而去至太行馹舍暴卒在仕者遂葬於西崦下並同前徐振甫興化軍人居朝京門外未第時讖曰折著屋爛著椽朝京門外出狀元振甫將第而門果壞黃裳道夫南劍州人家居龍溝未第間有讖曰掘龍溝出龍頭道夫將第而溝果修浚興化軍有壺公山讖云壺公山若斷莆田朱紫半水繞壺公山此時方好看蔡君謨興水利灌民田引水繞壺公山登第者比前在朝廷者半朱紫矣搜神祕覽韓魏公起堂于北池上效樂天因名曰醉白堂五月堂成公賦詩二篇其一卒章云霓裳時事非吾事且學熏酣石上眠自爾寢疾以六月二十五日薨此詩遂為絶筆既而神廟遣使特為石藏以葬始悟石上眠之句若讖云公薨士大夫恨勳德之難名知與不知皆為泫然而嘆曰天何不為我留歐陽公為魏公作志文而後死也韓魏公别録鄭毅夫守杭題僧文瑩所居壁云西湖頻送客緑波舟楫輕春入蘿徑靜浪花翻逺晴又云東風江雲北飛燕同寄青春不相見又題杭郡閣云雨影橫殘紅秋容隂映日寒江帶暮流曉角穿雲出峰藏翠如織宿鳥去無迹封書寫所懷聊托金門翼時頗訝其氣象不逺後解杭麾將赴青社以病泊舟楚州而卒其語巳兆於先矣玉壺清話增修詩話總龜卷之三十二百家詩話總龜後集卷之三十二樂府門翰林學士聶冠卿嘗于李良定公席上賦多麗詞云想人生美景良辰堪惜問其間賞心樂事就中誰是并得况東城鳯臺沁苑泛晴波淺照金碧露洗華桐煙霏絲栁緑隂搖曵蕩春一色畫堂逈玉簮瓊佩髙會盡詞客清歡久重燃絳蠟別就瑶席有翻若驚鴻體熊暮為行雨標格逞珠喉緩歌妖麗似聽流鶯亂花隔慢舞縈廽嬌鬟低嚲腰支纎細困無力忍分散彩雲歸後何處更尋覔休辭醉明月好花莫謾輕擲蔡君謨時知泉州寄良定公書云新傳多麗辭𫐠宴遊之娛使病夫舉首增歎耳又近者有客至自京師言諸公春日多會于元伯園池因念昔逰輒形萹詠緑渠春水走潺湲畫閣峯巒映雪鮮酒令巳行金盞側樂聲𥘉認翠裙貟清逰勝事傳都下多麗新詞到海邊曽是尊前沉醉客天涯回首重依然苕溪漁隱曰冠卿詞有露洗華桐煙霏絲栁之句此正是中春天氣下句乃云緑隂搖曵蕩春一色其時未有緑隂真語病也復齊漫録吾昔自杭移高密與楊元素同舟而陳令舉張子野皆從余過李公擇于湖遂與劉孝叔俱至松江夜半月出置酒垂虹亭上子時年八十五以歌詞聞于天下作定風波令其略云見説賢人聚吳分試問也應旁有老人星坐客歡甚有醉倒者此樂未嘗忘也今七年耳子野孝叔令舉皆為異物而松江橋亭今歲七月九日海風駕湖平地丈餘蕩盡無餘孑遺矣追思曩時真一夢耳苕溪漁隱曰吳興郡圃今有六客亭即公擇子瞻元素子野令舉孝叔時公擇守吳興也東坡又云余昔與張子野劉孝叔李公擇陳令舉揚元素會于吳興時子野作六客詞其卒章盡道賢人聚吳分試問也應旁有老人星凡十五年再過吳興而五人者皆巳亡矣時張仲謀與曹子方劉景文蘇伯固張秉道為坐客仲謀請作後六客詞云月滿苕溪照夜堂五星一老閗光芒十五年間真夢裏何事長庚對月獨凄涼緑髮蒼顔同一醉還是六人吟笑水雲鄊賔主談鋒誰得似看取曹劉今對兩蘇張東坡栁三變字景莊一名永字耆卿喜作小詞然薄于操行當時有薦其才者上曰得非填詞栁三變乎曰然上曰且去填詞由是不得志曰與儇子縱逰倡館酒樓間無復檢率自稱云奉聖旨填詞栁三變于乎小有才而無德以將之亦士君子之所冝戒也栁之樂章人多稱之然大概非羈旅窮愁之辭則閨門媱媟之語若以歐永叔晏叔原蘇子瞻黃魯直張子野秦少遊輩較之萬萬相遼彼其所以傳名者直以言多近俗俗子易悅故也皇祐中老人星現永應制撰詞意望厚恩無何始用漸字終篇有太液波翻之語其間宸逰鳯輦何處與仁廟挽詞暗合遂忤旨士大夫惜之余謂栁作此詞借使不忤亦無佳處如嫩菊黃深拒霜紅淺竹籬茅舍何處無此景物方之李謫仙夏英公等應制詞殆不啻天冠地履也世傳永嘗作輪臺子早行詞頗自以為得意其後張子野見之云既言匆匆䇿馬登途滿目淡煙衰草則巳辨色矣而後又言楚天闊望中未曉何也抑何語意顛倒如是藝苑先君嘗云古詞絳都春有鼇山綵字犯太上皇御名蓬萊島之句當云綵締余前集誤以古詞為柳詞今正是之苕溪漁隱先君頃嘗丐祠居射村作感皇恩一詞云乞得夢中身歸棲水雲始覺精神自家底峭帆輕掉時與白鷗遊戲畏途都不𬋩風波起光景如梭人生浮華百歲何妨盡沉醉臥龍多事謾説三分竒計算來爭似我長昏睡又嘗江行阻風作漁家傲一詞云幾日北風江海立千車萬馬鏖聲急短掉峭寒欺酒力飛雨息瓊花細細穿窗隙我本緑蓑青若笠浮家泛宅煙波逸渚鷺沙鷗都舊識行未得高歌與爾相尋覔同上顔氏家訓云别易會難古人所重江南餞送下泣言離北間風俗不屑此事岐路言離歡笑分首李後主蓋用此語耳故長短句云别時容易見時難復齊漫録舊詞高雅非近世所及如撲胡蝶一詞不知誰作非惟藻麗可喜其腔調亦自婉美馮延巳著樂章百餘闋其鶴沖天詞云曉月墜雲披銀燭錦屏幃建章鍾動玉繩低宮漏出花遲又歸國謡詞云江水碧江上何人吹玉笛扁舟逺送瀟湘客蘆花千里霜月白傷行色明朝便是關山隔見稱于世元宗樂府詞云小樓吹徹玉笙寒延巳有風乍起吹皺一池春水之句皆為警䇿元宗嘗戲延巳吹皺一池春水干卿何事延巳曰未如陛下小樓吹徹玉笙寒元宗悅苕溪漁隱曰古今詩話云江南成文幼為大理卿詞曲妙絶嘗作謁金門云風乍起吹皺一池春水中聞之因案獄稽滯召詰之且謂曰卿聀在典刑一池春水又何干于卿文幼頓首又本事曲云南唐李國主嘗責其臣曰吹皺一池春水干卿何事蓋趙公所撰謁金門辭有此一句最為警䇿其臣即對曰未如陛下小樓吹徹玉笙寒若本事曲所記但云趙公𥘉無其名所傳必誤惟南唐書古今詩話二説不同未詳孰是南唐書李感化善謳歌聲韻悠揚清振林木繫樂部為歌板色元宗嘗作浣溪沙二闋手寫賜感化曰菡蓞香消翠葉殘西風愁起碧波間還與容光共憔悴不堪看細雨夢回雞塞逺小樓吹徹玉笙寒蔌䔩泪珠多少恨倚闌干手捲真珠上玉鈎依前春恨鎖重樓風裡落花誰是主思悠悠青鳥不傳雲外信丁香空結雨中愁廽首緑波三峽暮接天流後主即位感化以其詞札上之後主感動賞賜感化甚優苕溪漁隱曰元宗即嗣主李璟嘗作此二詞古今詞話乃以為後主作非也後主名煜南唐書東坡大江東去赤壁詞語意高妙真古今絶唱近時有人和此詞題于郵亭壁間不著其名語雖粗豪亦氣槩可取今謾筆之詞曰炎精中否歎人材委靡都無英物戎馬長驅三犯闕誰作連城堅壁楚漢吞并曹劉割據白骨今如雪書生鑽破簡編説甚英傑天意眷我中興吾君神武小曽孫周發海嶽封疆俱效聀狂虜何勞追滅翠羽南巡叩閽無路徒有沖冠髮孤忠耿耿劍鋒冷浸秋月苕溪漁隱孫􅋈字濟師嘗作落梅詞甚佳一聲羌𬋩吹嗚咽玉溪半夜梅翻雪江月正茫茫斷橋流水香含章春欲暮落日千山雨一點著枝酸吳姫先齒寒同上汪彥章舟行汴中見岸旁畫舫有映簾而觀者甚見其額有詞云小舟簾隙佳人半露梅粧額緑雲低映花如刻恰似秋霄一半銀蟾白結兒梢朵香紅扐鈿蟬隱隱搖金碧春山秋月渾無迹不露墻頭些子真消息寄醉落魄同上詞句𣣔全萹皆好極為難得如賀方回淡黃楊栁帶棲鴉秦處度藕葉清香勝花氣二句寫景詠物可謂造微入妙若其全萹皆不逮此矣徐幹臣鴈足不來馬蹄難駐門掩一庭芳景駐字當作去字語意乃佳周美成水亭小浮萍破處簷花薕影顛倒按杜少陵詩燈前細雨簷花落美成用此簷花二字全與出處意不相合乃知用字之難矣趙德麟重門不鎖相思夢隨意繞天涯徐師川栁外重重疊疊山遮不斷愁來路二詞造語雖不同其意絶相類古詞水竹舊院落櫻筍新𬞞果一本是水竹舊院落鶯引新雖過不然櫻筍新𬞞果則與上句有何干涉董武子疇昔尋芳祕殿西日厭金鋪宮栁垂垂然祕殿豈是尋芳之處非所當言也侯元功蒙密州人自少遊場屋年三十有一始得鄉貢人以其年長邈寢不之敬有輕薄子畫其形于紙鳶上引線放之蒙見而大笑作臨江仙詞題其上曰未遇行藏誰肯信如今方表名蹤無端良匠畫形容當風輕借力一舉入高空才得吹噓身漸穩只疑逺赴蟾宫雨餘時候夕陽紅幾人平地上看我碧霄中蒙一舉即登第年五十餘遂為執政夷堅志曽端伯慥編樂府雅詞以秋月詞念奴嬌為徐師川作梅詞點絳唇為洪覺範作皆誤也秋月詞乃李漢老梅詞乃孫和仲沖沖即正言諤之子也又世傳江城子青玉案二詞皆東坡所作然西清詩話謂江城子乃葉少藴作桐江詩話謂青玉案乃姚進道作四詞皆佳今併録之念奴嬌詞云素光練浮映秋山隱隱修眉橫緑鳷鵲樓高天似水碧瓦寒生銀粟千丈斜暉奔雲湧露飛過盧同屋更無塵氣滿庭風碎梧竹誰念鶴髮仙翁當年曽共賞紫岩飛瀑對飲三人聊痛飲一洗離愁千斛斗轉參橫翩然歸去萬里騎黃鵠滿天霜曉呌雲吹斷橫玉點絳唇詞云流水泠泠斷橋斜路梅枝亜雪初下全似江南畫白璧青錢難買春無價歸耒也風吹芷野一點香隨馬江城子云銀濤無際卷蓬􅘵落霞明暮雲平曽見青鵉紫鳯下層城二十五弦彈不盡空感概有餘情蒼梧煙水斷歸程捲霓旌為誰迎空有千行流泪寄幽貞舞罷魚龍雲海晚千古恨入江聲青玉案詞云三年枕上吳中路遣黃耳隨君去若到松江呼小渡莫驚鷗鷺四橋盡是老子經行處􅦿川圗上看春暮長記高人右丞句作箇歸期天巳許春衫猶是小蠻針線曽􅊜西湖雨漢老念奴嬌詞中有滿天霜曉呌雲吹斷橫玉之句乃用崔魯華清宫詩銀河漾漾月輝暉樓礙天邊織女機橫玉呌雲清似水滿空霜逐一聲飛或云呌雲乃笛名非也又端咱所編樂府雅詞中有漢宫春梅詞云是李漢老作非也乃朝沖之叔用作政和間作此詞獻蔡攸是時朝廷方典大晟府蔡攸携此詞呈其父云今日于樂府中得一人京覽其詞喜之即除大晟府丞今載其詞曰瀟􅎈江梅白竹捎稀處橫兩三枝東君也不愛惜雪壓風欺無情燕子怕春寒輕失佳期惟是有南來歸鴈年年長見開時清淺小溪如練問玉堂何似茅舍踈籬傷心故人去後冷落新詩微雲淡月對孤芳分付他誰空自倚清香未減風流不在人知此詞中用玉堂事乃唐人詩云白玉堂前一樹梅今朝匆見數枝開兒家門户重重閉春色因何得入來或云玉堂乃翰苑之玉堂非也苕溪漁隱元豐間都人李嬰調蘄水縣令作滿江紅一曲往黃州上東坡東坡甚喜之其詞云荆楚風煙寂寞近中秋時候露下泠蘭英將謝葦花初秀歸燕殷勤辭巷陌鳴蛩凄楚來窗牗又誰念江邉有神仙飄零久橫琴膝携笻手矌望眼間吟口任紛紛萬事到頭何有君不見凌煙冠劍客何人氣貌長依舊歸去來一曲為君吟為君夀苕溪漁隱古樂府詩云今世褦襶子觸熱到人家褦襶集韻解之云不曉事余素畏熱乃知人觸熱來人家其謂不曉事宜矣嘗愛王逐客作夏詞送將歸不用浮瓜沉李等事而天然有塵外涼思其詞云百尺清泉聲陸續映瀟灑碧梧翠竹面千步回廊重重簾幕小枕欹寒玉試展絞綃看畫軸見一片瀟湘凝緑待玉漏穿花銀河穿地月上欄干曲此語非觸熱者之所知也苕溪漁隱曰余嘗愛李太白夏曰山中詩脫巾挂石壁露頂灑松風其清涼可想也漫叟詩話賈耘老舊有水閣在苕溪之上景物清曠東坡作守時屢過之題詩畫竹于壁間沈會宗又為賦小詞云景物因人成勝槩滿目更無塵可礙等間簾幕小欄干衣未解心先快明月清風如有待誰信門前車馬隘别是人間間世界坐中無物不清涼山一帶水一派流水白雲長自在其後水閣屢易主今已摧毀久矣遺址正與余水閣相近同在一岸景物悉如會宗之詞故余嘗有鄙句云三間小閣賈耘老一首佳詞沈會宗無限當時好風月如今捴屬續溪翁蓋謂此也苕溪漁隱晏叔原工小詞如舞低楊栁樓心月歌盡桃花扇底風不愧六朝宫掖到荆公小詞云揉藍一水縈花草寂寞小橋千嶂抱人不到柴門自有清風掃略無塵土思山谷小詞云春未透花枝瘦正是愁時候極為學者所稱賞味秦湛處度嘗有小詞云春透水波明寒峭花枝瘦蓋法山谷也雪浪齊日記孫洙字巨源元豐間為翰苑名重一時李端願太尉世戚里折莭交搢紳間而孫往來尤數會一日鎖院宣召者至其家則巳出數十輩蹤迹之得于李氏時李新納妾能琵琶孫飲不肯去而迫于宣命李不敢晉遂入院幾二鼓矣草三制罷復作長短句寄恨恨之意遲明遣示李其詞曰樓頭尚有三通鼓何須抵死催人去上馬苦匆匆琵琶曲未終回頭凝望處那更簾纎雨漫道玉為堂玉堂今夜長夷堅志武才人出慶夀宮色最後庭𥙿陵得之會教坊獻新聲為作詞號瑶臺第一層后山詩話栁三變逰東都南北二巷作新樂府骩骳從俗天下詠遂傳禁中仁宗頗好其詞每對酒必使侍伎歌之再三三變聞之作宮詞號醉蓬萊因內官逹後宮且永其助仁宗聞而覺之自是不復歌其詞矣會改京官乃以無行黜之後改名永仕至屯田貟外郎苕溪漁隱曰先君嘗云栁詞鼇山綵字犯太上皇御蓬萊島當云綵締坡詞低綺戶當云窺綺戶二字既改其詞益佳后山詩話荆公問山谷云作小詞曽看李後主詞否云曽看荆公云何處最好山谷以一江春水向東流為對荆公云未若細雨夢回雞塞逺小樓吹徹玉笙寒又細雨􅊜流光最妙雪浪齋日記南唐李後主歸朝後每懷江國且念嬪妾散落鬱鬱不自聊嘗作長短句云簾外雨潺潺春意闌珊衾不暖五更寒夢裏不知身是客一餉貪歡獨自莫憑欄無限關山別時容易見時難流水落花何處也天上人間含思悽惋未幾下世西清詩話李後主詞云三十餘年家國數千里地山河幾曽慣干戈一旦歸為臣虜沈腰潘鬢消磨最是蒼皇辭廟日教坊猶奏別離歌揮泪對宫娥後主既為樊若水所賣舉國與人故當慟哭于九廟之外謝其民而後行顧乃揮泪宮娥聽教坊離曲哉東坡南唐後主圍城中作長短句未就而城破櫻桃落盡春歸去蝶翻金粉雙飛子規啼月小樓西曲闌金箔惆悵捲金泥門巷寂寥人去后望殘煙草低迷余嘗見殘藁點染晦昧心方危窘不在書耳藝祖云李煜若以作詩工夫治國事豈為吾虜也苕溪漁隱曰余觀太祖實録及三朝正史云開寶七年十月詔曹彬潘美等率師伐江南八年十一月拔升州今後主詞乃詠春景決非十一月城破時作西清詩話云後主作長短句未就而城破其言非也然王師圍金陵凡一年後主于圍城中春間作此詞則不可知是時其心豈不危窘于此言之乃可也西清詩話前人評杜詩云紅豆啄殘鸚鵡粒碧梧棲老鳯凰枝若云鸚鵡啄殘紅豆粒鳯凰棲碧梧枝便不是好句余謂詞曲亦然李景有曲手捲真珠上玉鈎或改為珠簾舒信道有曲云十年馬上春如夢或改云如春夢非所謂遇知音漫叟詩話吳越後王來朝太祖為置宴出內妓彈琵琶王獻詞曰金鳯𣣔飛遭掣搦情脈脈看玉樓雲雨隔祖起拊其背曰誓不殺錢王后山詩話百家詩話總龜後集卷之三十二
