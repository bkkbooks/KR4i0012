front:
  text: 增修詩話總龜卷之四十七
  hash: sha256:7162978f464592756f272943bbcb2322de0834c02b4ff513150bda27f751ed61
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_047-1a}
body:
  text: 竒怪門下賣墨者潘谷豫不識其人然聞其所為非市人也墨既精妙而價不二或不持錢米求墨不計多少與之此豈徒然者哉豫嘗與詩云一朝入海尋李白空看人間畫墨山一日忽取欠墨錢劵焚之飲酒三日發狂浪走遂赴井死人下視之蓋趺坐井中手尚持數珠也見張眀言如此百斛明珠太子中允王綸祥符中登進士苐有女子年十八歲一日晝寢中忽魘聲其父與家人亟往問之已起謂父曰與汝有洞天之緣降人間四百年矣今又會此自是謂父曰清非生自稱曰燕華君𥘉不識字忽善三十六體大篆皆世所未識每與清非生唱和及百餘篇有送人詩云南去過瀟湘休問屈氏狂而今聖天子不是楚懷王又贈清非生末句云自有燕華無限景清非何事戀東宫又雪詩云何事月娥期不在亂飛端葉落人間説與人云天上端木開花六出贈清非生云君為秋桐我為春風春風會使秋桐變秋桐不識春風面題金山云濤頭風滚雪山腳石蟠虬又詩云落筆非俗子鼓吹皆天聲豈俟耳目既慰子華燕情蔣頴叔以楷字釋之刻于石後嫁為吕氏妻既嫁則懵然不復能詩康定間進篆字二十四軸仁宗嘉之有女仙傳行于時天授二年臘卿相等詐稱上苑花開請幸則天許之乃遣使宣詔曰眀朝逰上苑火急報春知花須連夜發莫待曉風吹于是凌晨名花瑞草皆發羣臣並咸服其異卓異記唐太府寺隋都水門之地隋平陳于此置叔寶叔寶將亡有飛鳥集于庭以觜畫地作詩云獨足上高臺腐草化為灰欲知我家處朱門臨水開雍洛異集嗽金鳥出昆眀國形如雀色黃魏眀帝時其國來獻飼以珍珠及兔腦嘗吐金屑如粟宫人爭取為叉鈿謂之辟寒金以此鳥不畏寒也宫人相嘲曰不服辟寒金那得帝王心不服辟寒鈿那得帝王憐古今詩話西蜀張俞嘗逰􅌐山題二絶云金玉樓臺插碧空笙簫遞響入天風當時國色并春色盡在君王顧盻中玉帝樓前鎖碧霞終年培飬牡丹芽不妨野鹿踰垣入㗸出宫中第一花異日宿溫湯見二黃衣吏召其魂至一宫闕見仙座殿上問左右曰唐太真妃也與之論當時事甚詳覺又為詩曰夢魂飛入瑶臺路九霞宫裏曾相遇壺天晚景自愁人春水泛花何處去俞尚留溫湯間步野外有牧童持書一𥿄俞乃開封乃仙所為詩云虛堂壁上見清詞似共幽人説所思海上風煙雖可樂人間聚散更堪悲重簾透日溫溫曉玉漏穿花滳滳遲此景此情傳不盡殷勤囑付隴頭兒俞詢牧童從何得對曰前日有一婦人過此遺我百錢授此書云眀日有衣冠獨步野外子與之俞聞之愈感俞多對士君子道此青瑣集治平二年長沙趙琪郎中作廣東憲公宇西軒有荔枝數本盛夏方熟召刺史燕賞一夕皆空皮核滿地軒之西壁有詩云吾儕今日會嘉賔滿酌洪鍾飲數巡遍地狼藉不知曉荔枝又是一畨新二廣人多傳異之隋煬帝逰廣陵恍惚見陳叔寶來謁曰聞已開隋渠引洪河之水東逰維楊因作詩獻之曰隋室開兹水𥘉心謀太奢一千里力役百萬民吁嗟水殿不復返龍舟成火霞驚流摧陡岸濁浪噴黃沙兩隄人送客三月柳飛花日腳沉雲表榆梢噪瞑鴉如今疲子俗異日便無家且樂人間景休尋上漢槎客喧舟艤岸風細錦帆斜莫言無利役千古壯京華煬帝愠曰爾多知為後人之利耶同前吳興柳歸舜泊舟洞庭君山見鸚鵡數千翶翶其間相呼姓字有名清越者名武逰郎者名阿蘇兒者名武仙郎者名自在先生者名踏蓮路者名鳯皇臺者名戴蟬兒者名多花子者或有唱歌者曰吾此曲乃漢武鈎弋夫人常所唱者詞曰戴蟬兒分明傳與君王語建章殿裏未得歸朱箔金缸雙鳯舞名阿蘇兒者曰我憶得阿嬌深宫唱曰昔請馬相如為作長門賦徒使費千金君王終不顧歸舜歸舟舟人云相失已二日矣寶應中有元無有春末獨行廣陵郊野夜入路傍村舍宿北軒下忽聞西廊有人行聲見四人出衣冠各異相與吟詠一衣冠長人曰齊紈魯縞如霜雪寥亮高聲為子發一黑衣短陋者曰家貧良會清夜時熒煌燈燭我能持一故敝黃衣者曰清冷之泉俟朝汲長綆相牽長出入一黑衣冠身亦短陋者曰㸑薪煮水常煎熬充他口腹我為勞遲明方散起而視之乃有一杵燭臺水桶破鐺而已幽怪録彭州天台禪院前致仕焦將軍彥賔所創也天台僧行燈掌之刺史安思謙男守範與賔客逰聮句以紀其來守範出首句曰偶到天台院因逢物外僧定武軍推官楊鼎夫繼曰忘機同一祖出語離三乘前懷逺軍周述曰古德玄意逺外窗虛景澄前眉州判官李仁肇音聮曰片時松影下聮續百千燈遂請間僧教大師義西八分書于牌翌日有貧子乞食于院見而高聲讀之曰人道有初無尾此則有尾無初後五年首頷俱碎不如尾句者乎院僧驅逐貧子曵杖四顧曰此後生不逺千里即欲到來人以為狂言果五年誅思謙守範伏法鼎大暴亡此則首頷俱碎之義也行燈歸寂寺僧蜀王盡遣出之後主持院僧適自興元歸則是不逺千里之義也貧子之説一無謬焉楊鼎城郭都人嘗逰青城山過皂江溺而又出登岸遽有老人以杖接引且笑曰元是鹽裏人本非水中物旋失老人所在因作詩以紀之曰青城山峭江水寒欲渡當時值急湍棹急狂風趍逺岸舟逢怪石碎前灣手攀弱杖倉皇處命在洪濤頃刻間今日深恩無以報令人羞説雀㗸環至成都與知巳言竟莫究鹽裏人之義後為居安思謙幕判成都鹽院感疾暴亡以鹽褁其尸歸于蜀野人間話海南城東有兩井相去咫尺而異味號雙井井源出山源山石罅中東坡酌水異之曰吾尋白龍不見今家此水乎同遊怪問其故曰白龍當為東坡出俄見其脊尾如爛銀蛇伏忽水渾有氣浮水面舉首如桃玉筯乃泳而去余定兩井太守張子為造庵井上號思逺亭號泂酌崖有怪樹樹枝腋有詩曰岩泉未入井蒙然冒沙石泉漱洄為靨石老生罅隙異哉寸波中露此橫海脊先生酌泉笑泉香龍神蟄舉首玉筯插忽去銀釘擲大身何時見夭矯翔霹靂誰言鵬背大更覺宇宙窄字畫如顔書無名銜日月此詩氣格似東坡而言泉漱石老似非東坡又語散緩疑學而為之也龍為蛇形小如玉筯同上鬼神門大曆十三年李道昌為姑蘇太守忽一日城南虎丘山有鬼題二詩于石壁上其一云青松多悲風蕭蕭聲且哀南山接幽壠幽壠空崔嵬白日徒昭昭不照長夜臺雖知生者樂魂魄安能回况復人所親慟哭心膽摧慟哭復何言哀哉復哀哉其二云神仙不可學中化空遊魂白日非我朝青松為我門雖復隔幽隴猶知念子孫何以遣悲怨萬物歸其根寄語世上人莫厭臨芳尊莊生問枯骨生樂徒虛言道昌録奏準勑致祭祭畢其詩乃滅後數日又隱出詩一首曰幽冥雖異路平昔忝攻文欲知高卧處山北兩孤墳尋于山後得兩墳極高廣至今存焉唐宋遺史許周士泊舟淮隂醉題淮隂廟曰脫身仗劍歸眀主授鉞登壇是得人千騎爭馳擒虎口萬囊不斷堰龍津拔旗破趙如摧朽一鼓搶齊速若神功業蓋時雖不賞威名震主即危身時來且佩三齊印勢去翻輸一婦人得意不思防後患窮居何用結邊臣名留青史成何事血汚西鍾幾掬塵遂使後來征戰者却愁他日似將軍還舟方寐夢介士擁見周士曰足下詩固好然未合于理也信去楚歸漢起自行伍高祖結壇授鉞雖立功名一旦自藴忿躁之氣外結邊臣內謀大叛死為萬世醜吾今血食于此亦出望外而子之詩重吾過焉懦無所守將安用也托遺賈魏公尹京日忽有人來展刺謁曰前江南國主李煜相見則一清瘦道士爾公曰太師巳物故何得及此曰某幼探釋氏未逹誤有所見今為師子國王偶思鍾山而來懷中取一詩授公曰異國非所志煩勞殊清間驚濤千萬里無乃見鍾山公讀之隨身灰滅張孝和關中人淳化壬辰年遊淮南在夀春與張李二生𬒳酒及淮漘入就龍女祠取桐葉寫詩兩句云我是夢中傳彩筆欲書花葉寄朝雲投于帳中而去一旦獨至其祠忽簾中有婦人邀而置酒贈孝和詩一絶曰落帆且泊小沙灘霜月無波淮上寒若向江湖得消息為傳風水到長安孝和告去行數十步忽小女奴呌曰娘子令還桐葉勿復置念孝和得之回顧惟古祠敗舍而已李珦字溫叔都官外郎之幼女也八歲能詩嘗作榴花一絶云烈火真紅輕皺面晨霞碎剪貼枝條金刀刺出猩猩血濺落芳叢久不銷後適江夏人王常同泛舟射利江湖間婁徹為江州清風亭記常萬歎美珦曰未之盡也何不云好山渌水萬里有盡處清風眀月千古無老時一日舉其文于徹徹卒用其言為破題不久常死而珦溺舟于三山磯下後三日尸忽出于水中士人異之為立廟熙寧間都人張芝過廟作三絶焚于廟中一云風軟潮生江水平遙峰隱隱浸寒青自從香骨沉波底獨我為詩吊爾靈二云軋軋櫓聲離逺浦蕭蕭帆影落寒濤殷勤滴酒陳佳果將此深心慰寂寥三云江雨初晴逺岸低心因啼鳥陡思歸爾如會我題詩意魂夢相求一處飛既夜一青衣召云娘子奉俟久矣芝曰娘子為誰青衣曰早來獻詩與誰耶芝乃悟見一婦人謂芝曰早來佳章欲托以夢寐是或不真不能盡所懷故求面見妾溺此時水官令賦詩及校九江會源録一夕而畢水官大恱令江神出其尸顯其靈今有祠在此血食于人謝子之詩意所不敢當答以詩曰梅天半霽江水漲水搖花影紅蕩漾東風拋雨過江西截江一瞬生銀浪閴然不見鷗鷺飛漁唱四沉煙瞑蕩忽然晴霽碧虛闊水色天光月下上柳風和軟浪無聲客櫓嘔軋中流鳴兩岸沙頭拾翠女嬉笑携手相將行秋入空江潦水靜澄江一碧如寒鏡逺帆滅沒入雲中菱唱微茫晚風瞑西風脫木露三山隱隱樵歸亂石間霜猿哀落岩前月杜宇枝間更啼血蓬囱風緊客衣單中夜危腸幾欲絶我本名家閨中女聘得良人共途路相將雲水二十年所得歡心亦無數豈其天禍及一身夫死身沉大江去猛風吹雲無定蹤盡日隂愁難得雨秋髙水冷白骨寒孤兒稚女歸何處因公遺我白玉篇慰此窮泉生和煦明朝仙舸宿何州回首寒江煙雨暮芝見詩嘆賞久之又出白金二百星贈芝曰煩礲一石載妾前事亦有奉報如何芝受其金送芝出幄則已五鼓矣芝後因循不能為立石舟再過三山下幾至傾覆是夜又夢其女深詬責之負其事翰府名談李群玉校書過二妃廟題詩曰小孤洲北浦雲邊二女明粧共儼然野廟向江春寂寂古碑無字草芊芊東風近墓吹芳芷落日深山哭杜鵑猶似含嚬望巡狩九嶷如黛隔湘川題黃陵廟詩曰黃陵廟前芳草春黃陵女兒茜裙新輕舟小楫唱歌去水逺山長愁殺人又曰黃陵廟前春已空子規啼血滴春風不知精爽落何處疑是行雲秋色中群玉自以第三篇春空便到秋色踟蹰欲改二女俄出焉群玉悉其所陳而題於後涉重湖至潯陽太守假成式索為詩酒侣具述其事後二年而群玉逝故哭李詩曰酒裏詩中三十年縱橫唐突世喧喧明時不作禰衡死傲盡公卿歸九泉又曰曾説黃陵事今為白日催老無男女纍誰哭向泉臺虔州布衣賴仙芝言連州有黃損僕射五代時人僕射蓋仕南漢也未老退歸一日忽遁去莫知所在子孫畫像事之凡三十三年乃歸坐阼階上呼家人其子不在孫出見之索筆書壁上云一别人間歲月多歸來人事已銷磨惟有門前鑑池水春風不改舊時波投筆而去不可留子歸問其狀貌云甚似影堂中人也連州相傳如此其後頗有祿仕者艾子病熱稍昏夢中神遊隂府見閻王升殿治事有數鬼招一人至一吏前白曰此人在世惟務持人隂事思于財物雖無過者必巧造端以誘陷之然後􅎥抉準法合以五百億萬斤柴于鑊湯中煮之王曰可令赴獄有一牛頭捽執之而去其人私謂牛頭曰君何人曰吾鑊湯獄主獄之事皆吾主之其人又曰既為獄王固首主也而豹皮襖若是弊鬼曰冥中無此皮若陽人焚化方得吾名不顯于人間故無焚貺者其人又曰某之外氏獵徒也家常有此皮若蒙主見憫少減柴數得還即焚化十皮為獄王作裩其鬼喜曰為女去億萬二字以敗其徒則汝得速還兼免沸煮之苦二三人于是又入鑊煮之其牛頭者時來相問小鬼見如此必欲庇之亦不敢令火熾遂報柴足既出鑊束帶將行牛頭曰忽忘皮也其人乃明顧曰有詩一首奉贈云牛頭獄主要知聞權在閻王不在君減刻官柴尤自可更求枉法豹皮裩牛頭大怒義入鑊湯益薪煮之艾子既寤語于徒曰須信口是禍之門並百斛明珠周祖起于鄴范魯公遁迹民間執𥿄扇偶題云大熱去酷吏清風來故人坐茶肆中忽一形貌怪陋者前揖之曰相公相公勿慮勿慮律其扇曰輕重無準吏得舞文何止大熱耶公當深究獄弊持扇急去後一日于祅廟後門鬼手中持其扇乃茶肆中見者未幾周祖果得公于民間遂大用憶陋鬼之言首議刑典疏曰先王所恤莫重于刑今繁苛失中輕重無準民罹橫刑吏得舞法周祖從其言命公與知雜張湜等刋定五年書成目曰刑統玉壺清話詩話總龜四十七百家詩話總龜後集卷之四十七麗人門銅雀伎古人賦詠多矣鄭惜云舞餘依帳泣歌罷向陵看張正見云雲慘當歌曰松吟欲舞風賈至云靈几臨朝奠空牀卷夜衣王勃云妾本深宫妓曽城閉九重君王歡愛盡歌舞為誰容沈佺期云昔年分食鼎今日望陵臺一旦雄圗盡千秋遺令開皆佳句也羅隱云強歌強舞竟難勝花落花開淚滿繒秪合當年伴君死免教憔悴望西陵似比諸人差有意也魏武隂賊險狠盜有神器實竊英雄之名而臨死之日乃遺令諸子不忘於葬骨之地又使伎人看銅雀臺上以歌舞其魂亦可謂愚矣東坡云操以病亡子孫滿前而咿嚶涕泣留連妾婦分香賣履區處衣物平生姦偽死見真性真名言哉葛常之人君不能制𣣔於婦人以至溺惑廢政未有不亂亡者桀奔南巢􅍔階妹喜魯威亡國惑始齊薑妲巳褒娰以至楊妃張孔之徒皆是也吳於西施王之耽惑不減於諸后一夕越兵至而王不知也鄭毅夫詩云十重越甲夜城圍燕罷君王醉不知若論破吳功苐一黃金只合鑄西施謂非西施則吳不亡吳不亡則安得以黃金而鑄之容哉東坡范蠡詩云誰將暗矢射吳兒長笑申公為夏姬却遣姑蘇有麋鹿更令夫子得西施言楚申公欲弱楚而強吳者以夏姬之故曾不如范蠡滅吳霸越而坐得西施也同上韓康公上元召從官數人出家妓侍飲其專寵者曰魯生偶中蜂螫少頃持扇就東坡乞詩詩中有魚吹細浪歌搖日舞罷花枝蜂入懷之句上句記姓下句記事侯鯖録東坡嘗飲一豪士家出侍姫十餘人皆有姿伎其間有一善舞者名媚兒容質頗麗而軀幹甚偉豪士特所寵愛命乞詩于公公戲為四句云舞袖𥚹􅝆影搖千尺龍蛇動歌喉宛轉聲撼半天風雨寒妓頳然不悅而去迍齋間覽王晉卿都尉既喪蜀國貶均州姫侍盡逐有一號者號囀春鶯色藝兩絶平居屬念不知流落何許後二年內徙汝隂道過許昌市傍小樓聞泣聲甚悲晉卿異之問乃囀春鶯也恨不可復得因賦一聮佳人已屬沙吒利義士今無古押衙晉卿每話此事客有足成章者晉卿覽之尤愴然其詞曰幾年流落向天洭萬里歸耒兩鬢葉翠袖香殘空浥泪青樓雲渺定誰家佳人已屬沙吒利義士今無古押衙回首音塵兩沉絶春鶯休囀沁園花西清詩話蔡持正謫新州侍兒名琵琶嘗飬一鸚鵡持正每呼琵琶即和一響板鸚鵡傳言呼之琵琶卒後悮觸響猶傳言呼之持正感傷成疾不起嘗為詩云鸚鵡言猶在琵琶事已非傷心瘴江水同渡不同歸苕溪漁隱曰持正守安州夏日登車蓋作十絶句為吳處厚箋注得罪謫新州其間一絶云𥿄屏石桃竹方牀手倦拋書午夢長睡起莞然成獨笑數聲漁笛在滄浪殊有間適自在之意侯鯖録回紋兩讀必遍獨此五詩不然其一曰紅窗小泣低聲怨永日春寒斗帳空中酒落花飛絮亂曉鶯啼破夢匆匆其二曰同誰更倚窗繡落日紅扉小院深東復西流分水嶺恨兼愁續斷弦琴其三曰寒信凬飄霜葉黃冷燈殘月照空牀看君寄憶回紋錦字字縈愁寫斷腸其四曰前堂畫燭殘凝泪半夜清香舊染衾煙鎖竹枝寒宿鳥水沉天色霽橫參其五曰娥翠斂時聞燕語泪珠彈處見鴻歸多情妾似凬花亂薄幸郎如露草希漫叟詩話曽子宣夫人魏氏作虞美人草行云鴻門玉斗紛如雪十萬􅑙兵夜流血咸陽宫殿三月紅霸業已隨煙燼滅剛強必死仁義王隂陵失路非天亡英雄本學萬人敵何用屑屑悲紅粧三軍散盡旌旗倒玉帳佳人坐中老香魂夜逐劒光飛青血化為原上草芳心寂寞寄寒枝舊曲聞耒似斂眉哀怨徘徊愁不語恰如愁聽楚歌時滔滔逝水流今古漢楚興亡兩丘土當年遺事久成空慷慨樽前為舞誰苕溪漁隱曰此詩乃許彥國表民作表民合肥人余昔隨侍先君守合肥嘗借得渠家集集中有此詩又合肥老儒郭全美乃表民席下舊諸生云親見渠作此詩今曽端伯編選亦列此詩于表民詩中遂與余所見所聞合覽者可以無疑亦知冷齋之妄也冷齋夜語費氏蜀之青城人以才色入蜀宫後主嬖之號花蕊夫人效王建作宫詞百首國亡入備後宫太祖聞之召使陳詩誦其國亡詩云君王城上竪􅑙旗妾在深宫那得知十四萬人齊解甲寧無一個是男兒祖恱蓋蜀兵十四萬而王師才數萬爾後山詩話㒒七歲時見眉州老尼姓宋忘其名年九十餘自言嘗隨其師入蜀主孟昶宫中一日大熱蜀主與花蕊夫人夜起避暑摩訶池上作一詞宋具能記之今四十年耒巳死矣人無知此詞者獨記其首兩句云氷肌玉骨自清涼無汗暇日尋味豈洞仙歌令乎乃為足之云苕溪漁隱曰漫叟詩話所載本事曲云錢唐一老尼能誦後主詩首章兩句與東坡洞仙歌序全然不同當以序為正也東坡洞仙歌序楊元素作本事曲記洞仙歌氷肌玉骨自清涼無汗水殿凨耒暗香滿繍簾開一點明月窺人人未寢欹枕叉橫鬢亂起耒携素手庭户無聲時見踈星渡河漢試問夜如何夜巳三更金波淡玉繩低轉細屈指西凬幾時耒又不道流年暗中偷換錢唐有一老尼能誦後主詩首章兩句後人為足其意以填此詞余嘗見一士人誦全篇云氷肌玉骨清無汗水殿凨來暗香暖簾開明獨窺人欹枕叉橫雲雲亂起耒瓊户時見踈星渡河漢屈指西凬幾時耒只恐流年暗中換漫叟詩話太和𥘉有為御史分務洛京者有妓善歌時太尉李逢吉留守求一見既不敢辭盛粧以往李命與衆姫相見李姫四十餘􅒰皆出其下既入不復出頃之李亦辭以遂疾罷坐信宿耗絶但怨歎不能巳已為詩兩篇投獻明日李但含笑曰大好詩遂絶詩曰三山不見海沉沉豈有仙蹤尚可尋青鳥去時雲路斷姮娥歸去月宫深紗窗暗想春相憶書幌誰令夜獨吟料得此時天上月只應偏照兩人心一篇亡苕溪漁隱曰余觀劉賓客外集有憶妓四首內有一首即前詩也其餘三首亦是前詩之意也古今詩話中既不云御史姓名則此詩豈非夢得為之假手乎古今詩話何彼穠矣之詩美王姫而作也周姫姓故皇女皆稱姫如陳媯楚芈齊薑之類是也後世凡婦人皆稱姫誤矣南朝人士皆謂姫人如蕭綸見姫人詩所謂狂夫不妬妾隨意還家劉孝綽詠姫人未出詩所謂帷開見叉影簾動聞釧聲梁王僧孺為姫人怨詩所謂還君與妾扇歸妾與君裘江捴為姫人怨服藥詩所謂妾家邯鄲好輕薄持忿仙童一丸藥是也丹揚集後山詩話退之詩云長安衆冨兒盤饌羅羶葷不能文字飲惟解醉紅裙而老有二妓號絳桃栁枝故文昌張藉云為出二侍女合彈琵琶筝也又為李于志敘當世名貴服金石藥𣣔生而死者數輩著之石藏之地下豈為一世戒邪而竟以藥死故白樂天云退之服硫黃一病竟不痊也唐語林退之二侍妾一曰綘桃二曰栁枝皆能歌舞𥘉使王庭湊至壽陽驛絶句云凬光𣣔動别長安春半邊城特地寒不見園桃并巷栁馬頭惟有月團圓蓋寄意二姝逮歸栁枝踰垣遁去家人追獲故鎮州𥘉歸詩云别耒楊桞汀頭樹擺亂春凬只𣣔飛惟有小園桃李在留花不發待郎歸自是專寵綘桃矣䂬溪百家詩話捴龜後集卷之四十七終
