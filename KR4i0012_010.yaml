front:
  text: 增修詩話總龜卷之十
  hash: sha256:ff05d61741a87c1527db2e7786620796d72ff8c7f81f0ceffa68973b82c3345e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_010-1a}
body:
  text: 雅什門上王安國平甫作詩多使酒樓語宋次道曰楊文公詩有酒樓江南堤柳拂人頭李白題詩遍酒樓錢昭度亦有一酒樓長憶錢塘江上望酒樓人散雨千絲今子詩有幾酒樓次道曰吾詩有二酒樓九江琵琶亭云夜泊潯陽宿酒樓琵琶亭畔荻花秋雲沉鳥沒事已往月白風清江自流又送客西陵云若耶溪畔醉秋風獵獵船旗照水紅後夜錢塘酒樓上夢魂應繞浙江東青箱雜記西方琥東州人鄭毅夫榜登第期集處告毅夫曰榜中琥最少年乞作探花郎毅夫云已差二人琥曰此無定員添一員何損公吏曰前日琥第三甲合出鋪地錢二十緍若作職事則不出錢琥曰願出錢毅夫從其請琥巳受符不出緡毅夫切責之而倍其罰琥白毅夫曰晚進未嘗工詩願狀元先為之以為楷式毅夫曰緑𫀆不怕露䀶􅊜直入閙花深處來他日復見毅夫曰一見雅詩不敢下筆翌日當再進詩願公代之毅夫復云朝來巳與碧桃約留住春風不放歸聞者歎服翰府名談成都慈光寺尼乘舟夜行一篇亦佳云水色連天色風聲益浪聲旅人歸思苦漁父夢魂驚舉棹雲先到移舟月遂行旅吟詩句罷猶見逺山橫京師曹氏家藏阮步兵詩一卷唐人所書與世所傳多異有數十首集中所無其一篇云放心懷寸隂羲和將欲冥揮𬒮撫長劍仰觀浮雲行雲間有立鵠抗首揚哀聲一飛沖青天強世不再鳴安與鶉鷃徒翩翩戲中庭又云嘉木不成蹊東園損桃李秋風吹飛雀零落從此始更回眸孫巨源云此詩工夫不少刻之石吳人方子通作古柏詩云四邉喬木盡兒孫曾見吳宫幾度春若使當時成大厦也應隨例作埃塵又作灔澦堆詩湍流怪石礙通津一一操舟若有神自是世間無妙手古來何事不由人舒王見而竒之雲齋廣録舒王得請金陵寓定力院題一絶於壁間云溪北溪南水暗通隔溪遙見夕陽舂思量諸葛成何事只合終身作卧龍天聖中禮部郎中孫冕詠三英詩劉元載妻詹茂光妻趙晟之母早梅寄逺惜別三詩劉妻哀子無立詹妻留夫侍母病趙母懼子逺遊孫公愛其才以取之早梅詩云南枝向暖北枝寒一種春風有兩般慿仗高樓莫吹笛大家留取倚闌干寄逺詩云錦江江上探春回消盡寒氷落盡梅爭得兒夫似春色一年一度一歸來惜别詩云暖有花枝冷有氷惟人沒後却無慿預愁離别苦相對挑盡漁陽一夜燈金華瀛洲集又托遺記梅花詩是女仙題蜀州江梅閣王元字文元桂林人苦吟風月終于貧病妻黃氏共持雅操每遇得句中夜必先起然燭供具𥿄筆元甚重之有聽琴詩曰拂琴開素匣何事獨頻眉古調俗不樂正聲公自知寒泉出澗澀老檜倚風悲復有來聽者誰堪繼子期好事者畫為圖郡閣雅談僧虛中宜春人遊瀟湘山與齊巳顔栖蟾為詩友住湘江西宗成寺潭州馬氏子希振侍中好事每出即延納於書閣中好燒柴火煙昏彩翠去後復節題馬侍中池亭云嘉魚在深處幽鳥立多時集首寄華山司空圖侍郎云門徑放莎垂往來投刺希有時開御札特地挂朝衣嶽信僧傳去天香鶴帶歸他時周召作無復更衰微司空侍郎有詩言懷云十年華嶽峰前住只得虛中一首詩同前唐大清宫使翰林學士錢起多作佳篇人收起詩不過百首有錢蒙仲得江行無題一百絶皆人家藏本所無有云霽雲踈有葉雨浪細無聲穩放扁舟去江天自有程又憔悴異靈均非讒作逐臣如逢漁父問未是獨醒人又煙渚復煙渚畫屏畫屏引惹天末去數點暮山青又隄壞漏江水地拗成野塘晚荷從不折留取作秋香詩史權常侍題山寺曰萬葉風聲利一山秋氣寒曉霜浮碧瓦薄日度朱欄又得即高歌失即休多悲多恨謾悠悠今朝有酒今朝醉明日愁來明日愁王駕大順中擢第為禮部貟外郎棄官號守素先生與司空圖鄭谷為詩友所為詩少傳者晴景一篇最佳云雨前不見花間葉雨後全無葉底花蜂蝶飛來過墻去應疑春色在鄰家柳彥塗塞上云鳴􅐴直上幾千尺天靜無風聲更乾碧眼胡兒三百騎盡提金勒向雲看都下好事者畫為圖歐陽文忠公酷愛鮑溶詩山中寒思一篇最佳云山深多悲風敗葉與秫齊門徑非世路何人念窮棲哀風破山起夕雪悮鳴雞巢鳥侵旦出飢猿無聲啼辰興動煙火開雲伐氷溪老木寒更瘦隂雲晴亦低我負自力永顔色常低迷時想靈臺下逰子正悽悽文忠晚得恨見之遲今人少愛溶詩者閩人謝伯初字景山天聖景祐之間以詩知名余謪夷陵景山為許州法曹以長韻見寄頗多佳句有云長官山色江波緑學士文華蜀錦張余答曰參軍春思亂如雲白髮題詩愁送春蓋景山有多情未老頭先白野思到春亂如雲之句故余此戲之景山詩頗多如自種黃花添野景旋移高竹聽秋聲園林換葉梅𥘉熟池館無人燕學飛皆無愧唐賢仕宦不偶終以困窮而卒其詩因録于此云江流無險似瞿塘滿峽猿聲斷旅腸萬里可堪人謪宦經年應合鬢成霜長官山色江波緑學士文華蜀錦張異域化為儒雅俗逺民爭識校讎郎才如夢得多為纍情似安仁久悼亡下國難留金馬客新詩傳與竹枝娘典辭縣待修青史諌草當留集皂囊莫為明時輕譴謪便將纓足濯滄浪歐陽公詩話鄭相肇牧廬州日以詩酒為娛題郡齋曰九衢塵裏一書生多幸逢時擁斾旌醉裏眼開金使字紫旗風動耀明后代者薛沆郎中到郡題藏舟浦花一聮云也知别有風光主蓓蕾枝枝似去年又别後寄席中三蘭三人名中並曰蘭淮淝兩水不相通隔岸臨流望向東千顆淚珠無寄處一時彈與渡前風鄭多佳句如凍瓶粘柱礎宿火陷爐灰人皆稱之南部新書廖凝字熙績善吟諷有學行隱居南嶽三年江南受偽官為彭澤令遷連州刺史與升平李建勳為詩友善相有集蓋見行於世咏中秋月與聞蟬為絶唱中秋月云九十日秋色今宵已平分孤光吞列宿四面絶微雲衆木排踈影寒流疊細紋遙遙望丹桂心緒正紛紛聞蟬云一聲𥘉應候萬木已西風偏感異鄉客先於離塞鴻日斜金谷靜兩過石城空此處不堪聽蕭條千古同凝居南嶽韋鼎有詩贈曰居與白雲鄰生涯久忍貧姓名髙雅道寰海許何人嶽氣秋來早亭寒果落新幾回吟石畔孤鶴自相親𥘉宰彭澤有句云風情竹閣留僧宿雨􅊜莎庭放吏衙解印有句云五斗徒勞謾折腰三年兩鬢為誰焦今朝官滿重歸去還挈來時舊酒瓢江左學詩者競造其門劉禹昭字休明婺州人少師林寬為詩刻苦不憚風雪詩云句向夜深得心從天外歸言不虛耳懷蕭山隱者云先生入太華杳杳絶良音秋夢有時見孤雲無處尋神清峰頂立衣冷瀑邊吟應笑干名者六街塵土深嘗與人論詩曰五言如四十箇賢人亂著一字屠沽輩也覔句者若掘得玉匣有底有蓋但精求必得其寶在湖南纍為宰卒於桂府幕有詩行于世郡閣雅談廖融字元素隱于衡山與逸人任鵠王正已凌蟾王元皆一時名士為詩相善湘守楊徽之代歸闕枉道出南嶽宿融山齋留詩曰清和春尚在歡醉日何長谷鳥隨柯轉庭花奪酒香𥘉晴岩翠滳向晚樹隂涼別有堪吟處相留宿草堂融贈天台逸人云移檜託禪子携家上赤城拂琴天籟寂欹枕海濤生雪白寒峰晚鳥歌春谷晴又聞求桂楫載月十洲行又題寺古檜云何人見植初老對𣑽王居山鬼暗棲托樵夫難破除聲高秋漢逈影倒月潭虛盡日無僧繞清風長有餘夢仙謡云琪木扶踈繫辟邪麻姑夜宴紫皇家銀河旌節搖波影珠閣笙簫吸月華翠鳯引逰三島路赤龍齊別五雲車星稀猶倚虹橋立擬就張騫搭漢槎退宫妓云神仙風格本難儔曾從前皇翠輦逰紅躑躅繁金殿暖碧芙蓉笑水宫秋寶車鈿剝隂塵覆錦帳香銷畫燭幽一旦色衰歸故里月明猶夢按梁州左司諌張觀過衡山留詩曰未向􅃮園為傲吏定應明代作徴君家傳奕世無金玉樂道經年有典墳帶雨小舟橫別澗隔花幽犬吠深雲到頭終為蒼生起休戀耕煙楚水濵融卒刺史何承矩葬之進士鄭鉉表其墓劉相公鄴因白令公維持方入翰苑仍賜及第為同列所輕因作詩曰曾是江波垂釣人自憐深厭九衢塵浮生漸老年隨水往事曾聞淚滿巾巳覺逺天秋色動不堪間夜雨聲頻多慚不是相如筆虛直金鑾接侍臣待漏院吟曰玉堂簾外燭遲遲明月初時契勘時間聽景陽鍾盡處兩鶯飛上萬年枝才調清高終秉鈞衡盧瓌抒情薛尚書釗為河東從事乞假歸寧題候館曰僕帶雕弓馬似飛老萊衣上著戎衣郵亭不暇吟山水塞外經年皆未歸後鎮徐州咏柳曰髙出軍營逺映橋曾逢兵火一時燒風流性在終難挫暖日還生萬萬條又有雅句坐久僕頭出語多僧齒寒南部新書吳門陸暢郎中嘗和人雪詩落句曰天人寧底巧剪水作花飛又山齋玩月云野性平生惟好月新晴半夜覩嬋娟起來自擘書窗破恰漏清光落枕前後因雲安出降百僚舉暢為儐相奉詔作催粧詩云雲安公主貴出降五侯家天母看調粉日兄憐賜花催鋪百子帳待障七香車借問粧成未東方欲晚霞古今詩話潘浪歸錢塘云久客見華髮孤棹桐廬歸新月無朗照落日有餘輝漁浦風水急龍山煙火微時聞沙上鴈一一皆南飛人謂不減劉長卿同前韋承貽咸通中䇿試夜潛紀長句于都堂南壁云裒衣博帶滿塵埃獨上都堂納卷回蓬巷幾時聞吉語棘籬何日却重來三條燭盡鍾𥘉動七轉丹成鼎未開殘月漸低人擾擾不知誰是謪仙才又云白蓮千朵照廊明一片升平雅韻聲才唱第三條燭盡南宮風月畫難成同前徐休雅長沙人因馬希範夜宴迎四儀夫人賦詩云雲路半開千里月洞門斜掩一天春又作宫詞云內人曉起怯春寒輕揭珠簾看牡丹一把柳絲收不得和風搭在玉欄杆曾獻家宴堂十首時稱冠絶郡閣雅談文宗詔禮部侍郎高鍇作貢舉試霓裳羽衣曲詩時宗子李肱詩最佳詩曰開元太平時萬國賀豐歲梨園獻舊曲玉座流新製鳯管遞參差霞衣競搖曵宴罷水殿空輦餘芳草細蓬壺事巳久仙樂功無替詎肯聽餘音聖明知善繼撫州蔡牧嘗作責四皓詩云秦末家家思逐鹿商山四皓獨忘機如何鬢髮霜相似更出山來定是非及假節交雍道經湖口零陵太守鄭史同年也逺以酒樂相迎坐有瓊枝者守之所愛奪之而去泊中興頌下僶俯不前久之到雍御制失律伏法湘川權厝二子延近終喪而逝論者謂妄責四皓而欲買山於浯溪之間不徒言哉詩曰停橈積水中舉目孤鴻外借問浯溪人誰家有山賣雲溪友議舉子尉遲正梗槩士也獻詩于右坐李林甫有暮行潼關云明月飛出海黃河流上天觀內人樓上踏歌云芙蓉初出水桃李忽無言塞上曲云夜夜月為青冢鏡年年雪作黑山花右坐鑒此句云得非才子乎徐安正侍郎久居中書堂參李右丞之論恐罪纍乃隱衡山為東林掇菜行者李北海雍逰嶽過寺觀其題詩處曰不知徐公乃在此握手言曰朝列於公論巳息矣遂解布褐而釋以簮裳謂徐曰曾吟峴山詩曰峴山思駐啞之日嘗亦默誦之遂同載歸長沙正元五年置中和節德宗製詩朝臣奉和詔寫本賜戴叔倫於容州天下美之中和變梅柳萬彚生春光中和紀月令方與天地長耽樂豈不尚懿茲時景良庶遂亭育恩同致寰海康君臣永終始交泰符隂陽曲沼水新碧華池桃稍芳勝賞信多歡戒之在無荒廣卓異記唐黃損龍德二年登進士第喜作詩吟讀史云逐鹿走紅塵炎炎火德新家肥生孝子國霸有謀臣帝道雲龍合民心草木春須知煙閣上一半老儒真雅言雜載李洞唐諸王孫遊西川慕浪仙為詩作銅像其儀事之如神洞為終南詩二十韻有殘陽高照蜀敗葉逺浮涇復曰砍竹煙嵐凍偷湫雨雹腥逺看丹鳯闕冷射五侯􅈦全篇皆絶唱又贈司空侍郎云馬飢餐落葉鶴病曬殘陽又曰捲箔青溪月敲松紫閣書送僧云越講迎騎象蕃齋懴射雕贈高僕射云征南破虜漢功臣提劍歸來萬里身間傍凌煙金柱看形容消瘦老于真送人歸日本云島嶼分諸國星河共一天但誚其僻澀而不知竒貴其峭唯吳子華深知之子華才力浩大八面受敵以百篇示洞洞曰大兄所示百篇中有一聮絶唱新亭曰暖漾魚遺子晴逰鹿引麛子華不怨所鄙而喜其所許洞三榜裴公第二榜䇿夜簾獻曰公道此時如不得昭陵慟哭一生休尋卒於蜀裴公無子人謂屈洞所致托言周賀少從浮屠法名清鑒遇姚合而返𥘉與賈島無可齊名島哭柏巖禪師曰苔覆石床新師曾占幾春寫留行道影焚却坐禪身塔院關松雪房廊露隙塵自憐雙淚下不是解空人賀詩曰林徑西風急松枝講妙餘凍鬚亡夜剃遺偈病時書地燥焚身後堂空著影𥘉此時頻下淚曾省到吾廬同前孟賔于蟠溪懷古云良哉吕尚父深隱始歸周釣石千年在春風一水流松根盤蘚石花影卧沙鷗誰更懷韜術追思古渡頭又懷連上舊居云間思連上景難齊樹繞仙鄉路繞溪明月夜舟漁父唱春風平野鷓鴣啼城邊寄信歸雲外花下傾杯到日西更憶海陽垂釣侣昔年相遇草萋萋雅言系述曹鄴字業之桂林人為四怨三愁五情詩其怨云庭花巳結子岩花猶弄色誰令生處逺用盡春工力其愁云别家鬢未生到城鬚似髮朝朝臨水望灞水不入越其情云空城野雀飢咬咬復飛飛忽見官倉粟官倉無空時為舍人韋慤所知力薦於主司乃中第看榜日諭主司云一辭桂嵓猿九泣都門月年年孟春至看花不如雪杏園宴上呈同年云賢路非在天十年行不至一旦公道開青雲在平地又云故衣未及換尚有去年淚又云永持共濟心莫起胡越意劉章子克明江左人事湖南馬氏有蒲鞋詩云吳江浪浸白莆春越女𥘉挑一樣新才自繡窗離玉指便隨羅襪上香塵石榴裙下從容久玳瑁筵前整頓頻今日高樓鴛瓦上不知拋擲是何人黃損連山人作公子行云春草緑綿綿驕驂驟暖煙微風飄樂韻半日醉花邊打鵲拋金彈招人舉玉鞭田翁與蠶婦平地看神仙又出山吟云來書𥘉出白雲扄乍躡秋風馬足輕逺近留連分嶽色別離嗚咽亂泉聲休將巢許爭喧雜自共伊臯論太平昨夜細看雲色裏進賢星座甚分明並同前詩話總龜卷之十百家詩話總龜後集卷之十評論門杜云爾輩可忘年含悽覺汝賢送爾維舟惜此筵汝與山東李白好自世俗觀之則為簡傲詩蕳不然亦嘗有云忘形到爾汝黃常明又古柏云不露文章世已驚未辝剪伐誰能送先器識後文蓻與浮躁衒露者有異也同上古柏云大厦如傾要梁棟萬牛回首丘山重此賢者難進而易退也非其招不往者也同上趙嘏長安秋望詩云殘星幾點鴈橫塞長笛一聲人倚樓當時人誦詠之以為佳作遂有趙倚樓之目又有長安月夜與友人話歸故山詩云楊柳風多潮未落兼葭霜在鴈𥘉飛亦不減倚樓之句至于獻李僕射詩云新諾似山無力負舊恩如水滿身流則謬矣葛常之鍾嶸稱張茂先惜其兒女情多風雲氣少喻鳬嘗謁杜紫微不遇乃曰我詩無綺羅鉛粉冝不也淮海詩亦然人戲謂可入小石調然率多子美句但綺麗大勝爾子美並蒂芙蓉夲自雙水荇牽風翠帶長退之金叉半醉坐添春牧之春風十里楊州路誰謂不可入黃鍾宫邪黃常明昌黎云携持令名歸自足貽家尊蘇州送黎尉云秪應傳善政朝夕慰髙堂誠儒者迂闊之辝然貪叨苟得汚纍其親孰若清白之為愈同上東坡云少陵詠懷詩杜陵布衣老大意轉拙許身亦何愚竊比稷與契子美自比稷契人未必許也然其又有詩云舜舉十六相身尊道更髙秦時任商鞅法令如牛毛自是稷契輩人口中語也知名不必稱局促商山芝又云王侯與螻蟻同盡隨丘墟願聞第一義回向心地𥘉乃知子美詩尚有事在也䂬溪張藉送區弘詩云韓公國大賢道德赫巳聞昨出為陽山爾區來趨奔韓官遷法曹子送至荆門韓入為慱士﨑嶇從羈輪觀其逰從之久疑得於韓者深也然考其文章議論之際乃不得預藉湜之列何也韓集有送區弘南歸詩云我遷于南日周圍來見者衆莫依希爰有區子熒熒暉觀以彛訓或從違我念前人譬葑菲落以斧斤引纏微雖有不逮驅騑騑觀此數語則韓雖以師道自任而區受道之質蓋有所未至也其後又勉之以行行正直勿脂韋業成志立來頎頎其誨之者至矣集中又有送區册序韓文辨證云册即弘也未知孰據尓丹陽集舉人過失難於當其尤者臧孫之犯門斬關惟孟椒能繼之臧紇謂國有人焉必椒也其難如此司馬相如竊妻滌器開巴蜀以困苦鄉邦其過巳多至為封禪書則讒諂蓋天性不復自新矣子美猶云竟宣室召徒有茂陵求李白亦云果得相如草仍餘封禪文和靖獨不然曰茂陵他日求遺藁猶喜曽無封禪書言雖不迫責之深矣李商隱云相如解草長門賦却用文君取酒金亦舍其大論其細也舉其大者自西湖始其后有譏其諂諛之態死而未已正如捕逐冦盜先有力者所獲扼其吭而騎其項矣余人從旁助箠縳耳黃常明士人程文窮日力作一論既不限聲律復不拘詩句尚罕得反復折難使其理判然觀赴奉先詠懷五百言乃聱律中老杜心迹論一篇也自杜陵有布衣老大意轉拙許身一何愚自比以稷與契其術祈嚮自是稷契等人窮年憂黎元歎息腸內熱與飢渴由已也何異然常為不知者所病故曰取笑同學翁世不我知而所守不變故曰浩歌彌激烈又云非無江海志瀟灑送日月當今廊廟具建厦豈云缺葵藿傾太陽物性固莫奪言非不知隱遁為髙也亦非以國無其人也特廢義亂倫有所不忍以兹誤生理獨恥事于謁言志大術踈未始阿附以借勢也為下士所笑而浩歌自若皇皇慕君而雅志棲道既不合時而又不少低屈皆設疑互答屢致意焉非巨刃有余孰能之乎中間鋪敘間關酸辛冝不勝其戚戚而默思失業途因念逺戍卒所謂憂在天下而不為小已失得也禹稷顔子不害為同道少陵之迹江湖而心稷契豈為過哉孟子曰窮則獨善其身逹則兼善天下其窮也未嘗無志於國與民其逹也未嘗不抗其易退之莭密謀先定出處一致矣是時先後周復正合乎此昔人目元和賀雨詩為諌書余特目此詩為心迹論也䂬溪五言如四十個賢人著一箇屠酤不得覔句者若掘得玉匣子有底有蓋但精心必獲其寶然昔人園柳變鳴禽竟不及池塘生春草餘霞散成綺不及澄江靜如練春水船如天上坐不若老年花似霧中看間久硯中窺水淺不若花落徑裡得沿香停杯嗟別久不及對月喜家貧楓林社日鼓不若茆屋午時雞此數公未始不精心似此知全其寶者未易多得黃常明愈寄孟刑部聮句云美君如道腴逸步謝天械或問道果有味乎余曰如介甫午雞聲不到禪林柏子煙中靜擁衾竹雞呼我出華胥起滅篝燈擁燎爐各據攪梧同不寐偶然聞雨落階除皆淡中意味非造此景不能形容也黃常明張無盡題武昌陵竹寺云孟宗泣竹笋冬生豈是青青竹有情影響主張非别物人心但莫負幽明語雖淺直然當於理樂天有餘霞散成綺別葉乍辭風等語麗矣不過于嘲風雪弄花而巳故寄唐生詩云非求宫律髙不務文字竒惟歌生民病得願天子知䂬溪顔延之嘗問鮑昭已與靈運優劣昭曰謝五言如𥘉發芙蓉自然可愛君詩鋪錦列繡亦雕繢滿眼鍾嶸詩品乃記湯惠休云謝如芙蓉出水顔如錯采􅍢金與本傳不同又稱延之嘗薄惠休制作以為委巷中歌謡耳豈湯休因為延之所薄遂有芙蓉錯􅍢之語故史取以文飾之邪坡云辨才詩如風吹水自成文理吾輩與參寥如巧婦織錦耳取况亦類此淵明所以不可及者蓋無心於非譽巧拙之間也黃常明永叔以昌黎比介甫云答他日若能窺孟子終身何敢望韓公吳季野以方賈誼答云俯仰繆恩方自慊慚君將比洛陽人皆憤然不平如惡無鹽唐突而謝景山贈文忠詩有才如夢得今為纍情似安仁久悼亡即開門當之二公何抑揚之異也同上子美夜宴左氏莊檢書燒燭短燭正不冝觀書檢閲時暫可也退之短檠二尺便且光可謂燈窗人中語猶有未便燈不籠則損目不冝勤且久山谷夜堂朱墨小燈籠可謂善矣而虛堂非夜久所冝子瞻推門入室書縱橫蠟𥿄燈籠晃雲母慣親燈火儒生酸態盡矣同上張藉嘗移書責退之與人商論不能下氣愈亦有云我昔實愚蠢不能降色辭余謂此乃書生常態昔常見太中爐亭議題紛喧關然其後有二生坐是鳴鼓豈直議禮家為聚訟哉聖俞謝永叔惠酒云貽詩語且橫既醉論益堅曽不究世務間氣爭占先誠有之也同上岑參寄杜拾遺云聖朝無闕事自覺諌書稀退之贈崔輔闕云早生得塗未要忙時清諫疏尤冝罕皆繆承荀卿有聽從無諌諍之語遂使阿諛姦侫用以藉口以是知凡造意立言不可不豫為天下來世慮䂬溪西清詩話人之好惡固自不同子美在蜀作悶詩乃云捲簾唯白水隱几亦青山若使余居此應從王逸少語吾當卒以樂死豈復更有悶邪同上王君玉云子美之詩詞有近質如麻鞋見天子垢膩腳不襪之句所謂轉石于千仭之山勢也學者尤之過甚豈逺大者難窺乎同上百家詩話總龜後集卷之十終
