front:
  text: 增修詩話總龜卷之十
  hash: sha256:ff05d61741a87c1527db2e7786620796d72ff8c7f81f0ceffa68973b82c3345e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_010-1a}
body:
  text: 雅什門上王安國平甫作詩多使酒樓語宋次道曰楊文公詩有酒樓江南堤柳拂人頭李白題詩遍酒樓錢昭度亦有一酒樓長憶錢塘江上望酒樓人散雨千絲今子詩有幾酒樓次道曰吾詩有二酒樓九江琵琶亭云夜泊潯陽宿酒樓琵琶亭畔荻花秋雲沉鳥没事已徃月白風清江自流又送客西陵云若耶溪畔醉秋風獵獵船旗照水紅後夜錢塘酒樓上夢魂應遶浙江東青箱雜記西方琥東州人鄭毅夫榜登第期集處告毅夫曰榜中琥最少年乞作探花郎毅夫云已差二人琥曰此無定員添一員何損公吏曰前日琥第三甲合出鋪地錢二十緍若作職事則不出錢琥曰願出錢毅夫從其請琥巳受符不出緡毅夫切責之而倍其罰琥白毅夫曰晚進未嘗工詩願狀元先爲之以爲楷式毅夫曰緑𫀆不怕露㾗􅊜直入閙花深處來他日復見毅夫曰一見雅詩不敢下筆翌日當再進詩願公代之毅夫復云朝來巳與碧桃約留住春風不放歸聞者歎服翰府名談成都慈光寺尼乗舟夜行一篇亦佳云水色連天色風聲益浪聲旅人歸思苦漁父夣魂驚舉棹雲先到移舟月遂行旅吟詩句罷猶見逺山横京師曹氏家藏阮歩兵詩一卷唐人所書與世所傳多異有數十首集中所無其一篇云放心懷寸隂羲和將欲冥揮𬒮撫長劍仰觀浮雲行雲間有立鵠抗首揚哀聲一飛冲青天彊世不再鳴安與鶉鷃徒翩翩戯中庭又云嘉木不成蹊東園損桃李秋風吹飛雀零落從此始更回眸孫巨源云此詩工夫不少刻之石呉人方子通作古栢詩云四邉喬木盡児孫曾見呉宫幾度春若使當時成大厦也應隨例作埃塵又作灔澦堆詩湍流怪石碍通津一一操舟若有神自是世間無妙手古來何事不由人舒王見而竒之雲齋廣録舒王得請金陵寓定力院題一絶於壁間云溪北溪南水暗通隔溪遥見夕陽舂思量諸葛成何事只合終身作卧龍天聖中禮部郎中孫冕詠三英詩劉元載妻詹茂光妻趙晟之母早梅寄逺惜別三詩劉妻哀子無立詹妻留夫侍母病趙母懼子逺遊孫公愛其才以取之早梅詩云南枝向暖北枝寒一種春風有两般慿仗高樓莫吹笛大家留取倚䦨干寄逺詩云錦江江上探春回消盡寒氷落盡梅争得児夫似春色一年一度一歸來惜别詩云煖有花枝冷有氷惟人沒後却無慿預愁離别苦相對挑盡漁陽一夜燈金華瀛洲集又摭遺記梅花詩是女仙題蜀州江梅閣王元字文元桂林人苦吟風月終于貧病妻黄氏共持雅操每遇得句中夜必先起然燭供具𥿄筆元甚重之有聽琴詩曰拂琴開素匣何事獨頻眉古調俗不樂正聲公自知寒泉出澗澁老檜倚風悲復有來聴者誰堪繼子期好事者畫為圖郡閣雅談僧虚中宜春人㳺瀟湘山與齊巳顔栖蟾爲詩友住湘江西宗成寺潭州馬氏子希振侍中好事每出即延納於書閣中好焼柴火烟昬彩翠去後復節題馬侍中池亭云嘉魚在深處幽鳥立多時集首寄華山司空圖侍郎云門徑放莎垂徃來投刺希有時開御札特地掛朝衣岳信僧傳去天香鶴帶歸他時周召作無復更衰㣲司空侍郎有詩言懷云十年華岳峰前住只得虚中一首詩同前唐大清宫使翰林學士錢起多作佳篇人収起詩不過百首有錢蒙仲得江行無題一百絶皆人家藏本所無有云霽雲踈有葉雨浪細無聲穏放扁舟去江天自有程又憔悴異靈均非讒作逐臣如逢漁父問未是獨醒人又烟渚復烟渚畫屏畫屏引惹天末去數點暮山青又隄壞漏江水地抝成野塘晩荷從不折留取作秋香詩史權常侍題山寺曰萬葉風聲利一山秋氣寒暁霜浮碧瓦薄日度朱欄又得即高歌失即休多悲多恨謾悠悠今朝有酒今朝醉明日愁來明日愁王駕大順中擢第爲禮部貟外郎弃官號守素先生與司空圖鄭谷爲詩友所爲詩少傳者晴景一篇最佳云雨前不見花間葉雨後全無葉底花蜂蝶飛來過墻去應疑春色在鄰家柳彦塗塞上云鳴􅐴直上㡬千尺天静無風聲更乾碧眼胡児三百騎盡提金勒向雲看都下好事者畫為圖歐陽文忠公酷愛鮑溶詩山中寒思一篇最佳云山深多悲風敗葉與秫齊門逕非世路何人念窮棲哀風破山起夕雪悮鳴雞巢鳥侵旦出饑猿無聲啼辰興動烟火開雲伐氷溪老木寒更瘦隂雲晴亦低我負自力永顔色常低迷時想靈䑓下逰子正悽悽文忠晚得恨見之遲今人少愛溶詩者閩人謝伯初字景山天聖景祐之間以詩知名余謪夷陵景山為許州法曹以長韻見寄頗多佳句有云長官山色江波緑學士文華蜀錦張余答曰參軍春思亂如雲白髪題詩愁送春盖景山有多情未老頭先白野思到春亂如雲之句故余此戯之景山詩頗多如自種黄花添野景旋移高竹聽秋聲園林換葉梅𥘉熟池舘無人燕學飛皆無愧唐賢仕宦不偶終以困窮而卒其詩因録于此云江流無險似瞿塘滿峽猿聲㫁旅腸萬里可堪人謪宦經年應合鬂成霜長官山色江波緑學士文華蜀錦張異域化爲儒雅俗逺民争識校讎郎才如夣得多爲累情似安仁乆悼亡下國難留金馬客新詩傳與竹枝娘典辭縣待脩青史諌草當留集皂囊莫爲明時輕譴謪便將纓足濯滄浪歐陽公詩話鄭相肇牧廬州日以詩酒爲娯題郡齋曰九衢塵裏一書生多幸逢時擁斾旌醉裏眼開金使字紫旂風動耀明后代者薛沆郎中到郡題藏舟浦花一聮云也知别有風光主蓓蕾枝枝似去年又别後寄席中三蘭三人名中並曰蘭淮淝两水不相通隔岸臨流望向東千顆淚珠無寄處一時彈與渡前風鄭多佳句如凍瓶粘柱礎宿火䧟爐灰人皆稱之南部新書廖凝字熈績善吟諷有學行隱居南岳三年江南受僞官爲彭澤令遷連州刺史與昇平李建勲爲詩友善相有集盖見行於世咏中秋月與聞蟬爲絶唱中秋月云九十日秋色今宵已平分孤光吞列宿四面絶㣲雲衆木排踈影寒流叠細紋遥遥望丹桂心緒正紛紛聞蟬云一聲𥘉應候萬木已西風偏感異鄕客先於離塞鴻日斜金谷静兩過石城空此處不堪聴蕭條千古同凝居南岳韋鼎有詩贈曰居與白雲鄰生涯乆忍貧姓名髙雅道寰海許何人岳氣秋來早亭寒果落新幾回吟石畔孤鶴自相親𥘉宰彭澤有句云風情竹閣留僧宿雨􅊜莎庭放吏衙觧印有句云五斗徒勞謾折腰三年两鬂爲誰焦今朝官滿重歸去還挈來時舊酒瓢江左學詩者競造其門劉禹昭字休明婺州人少師林寛爲詩刻苦不憚風雪詩云句向夜深得心從天外歸言不虚耳懷蕭山隱者云先生入太華杳杳絶良音秋夣有時見孤雲無處㝷神清峰頂立衣冷瀑邊吟應笑干名者六街塵土深嘗與人論詩曰五言如四十箇賢人亂着一字屠沽軰也覔句者若掘得玉匣有底有盖但精求必得其寳在湖南累爲宰卒於桂府幕有詩行于世郡閣雅談廖融字元素隱于衡山與逸人任鵠王正已凌蟾王元皆一時名士爲詩相善湘守楊徽之代歸闕枉道出南岳宿融山齋留詩曰清和春尚在歡醉日何長谷鳥隨柯轉庭花奪酒香𥘉晴岩翠滳向晩樹隂凉別有堪吟處相留宿艸堂融贈天台逸人云移檜託禪子携家上赤城拂琴天籟寂欹枕海濤生雪白寒峰晚鳥歌春谷晴又聞求桂檝載月十洲行又題寺古檜云何人見植初老對𣑽王居山鬼暗棲托樵夫難破除聲高秋漢逈影倒月潭虚盡日無僧遶清風長有餘夣仙謡云琪木扶踈繋辟邪麻姑夜宴紫皇家銀河旌節揺波影珠閣笙簫吸月華翠鳯引逰三島路赤龍齊別五雲車星稀猶倚虹橋立擬就張騫搭漢槎退宫妓云神仙風格本難儔曾從前皇翠輦逰紅躑躅繁金殿暖碧芙蓉笑水宫秋寳車鈿剥隂塵覆錦帳香銷畫燭幽一旦色衰歸故里月明猶夣按梁州左司諌張觀過衡山留詩曰未向􅃮園為傲吏定應明代作徴君家傳奕世無金玉樂道經年有典墳帶雨小舟橫別澗隔花幽犬吠深雲到頭終爲蒼生起休戀耕烟楚水濵融卒刺史何承矩葬之進士鄭鉉表其墓劉相公鄴因白令公維持方入翰苑仍賜及第為同列所䡖因作詩曰曾是江波垂釣人自憐深厭九衢塵浮生漸老年隨水徃事曾聞淚滿巾巳覺逺天秋色動不堪閑夜雨聲頻多慚不是相如筆虚直金鑾接侍臣待漏院吟曰玉堂簾外燭遲遲明月初時契勘時閒聴景陽鍾盡處两鶯飛上萬年枝才調清高終秉鈞衡盧瓌抒情薛尚書釗爲河東從事乞假歸寜題候舘曰僕帶彫弓馬似飛老萊衣上着戎衣郵亭不暇吟山水塞外經年皆未歸後鎮徐州咏柳曰髙出軍營逺映橋曾逢兵火一時燒風流性在終難挫煖日還生萬萬條又有雅句坐乆僕頭出語多僧齒寒南部新書呉門陸暢郎中嘗和人雪詩落句曰天人寜底巧剪水作花飛又山齋翫月云野性平生惟好月新晴半夜覩嬋娟起來自擘書窓破恰漏清光落枕前後因雲安出降百僚舉暢爲儐相奉詔作催粧詩云雲安公主貴出降五侯家天母看調粉日兄憐賜花催鋪百子帳待障七香車借問粧成未東方欲晚霞古今詩話潘浪歸錢塘云乆客見華髮孤棹桐廬歸新月無朗照落日有餘輝漁浦風水急龍山烟火㣲時聞沙上鴈一一皆南飛人謂不减劉長卿同前韋承貽咸通中䇿試夜潜紀長句扵都堂南壁云裒衣博帶滿塵埃獨上都堂納卷回蓬巷㡬時聞吉語棘籬何日却重來三條燭盡鍾𥘉動七轉丹成鼎未開殘月漸低人擾擾不知誰是謪仙才又云白蓮千朶照廊明一片昇平雅韻聲才唱第三條燭盡南宮風月畫難成同前徐休雅長沙人因馬希範夜宴迎四儀夫人賦詩云雲路半開千里月洞門斜掩一天春又作宫詞云内人曉起怯春寒輕掲珠簾看牡丹一把柳絲收不得和風搭在玉欄杆曾獻家宴堂十首時稱冠絶郡閣雅談文宗詔禮部侍郎高鍇作貢舉試霓裳羽衣曲詩時宗子李肱詩最佳詩曰開元太平時萬國賀豐歲梨園獻舊曲玉座流新製鳯管遞參差霞衣競揺曵宴罷水殿空輦餘芳草細蓬壺事巳乆仙樂功無替詎肯聴餘音聖明知善繼撫州蔡牧嘗作責四皓詩云秦末家家思逐鹿商山四皓獨忘機如何鬂髪霜相似更出山來定是非及假節交邕道經湖口零陵太守鄭史同年也逺以酒樂相迎坐有瓊枝者守之所愛奪之而去泊中興頌下僶俛不前乆之到邕御制失律伏法湘川權厝二子延近終䘮而逝論者謂妄責四皓而欲買山於浯溪之間不徒言㢤詩曰停橈積水中舉目孤鴻外借問浯溪人誰家有山賣雲溪友議舉子尉遲正梗槩士也獻詩于右坐李林甫有暮行潼關云明月飛出海黄河流上天觀内人樓上踏歌云芙蓉初出水桃李忽無言塞上曲云夜夜月爲青塚鏡年年雪作黒山花右坐鍳此句云得非才子乎徐安正侍郎乆居中書堂參李右丞之論恐罪累乃隱衡山為東林掇菜行者李北海邕逰岳過寺觀其題詩處曰不知徐公乃在此握手言曰朝列於公論巳息矣遂解布褐而釋以簮裳謂徐曰曾吟峴山詩曰峴山思駐啞之日嘗亦默誦之遂同載歸長沙正元五年置中和節徳宗製詩朝臣奉和詔寫本賜戴叔倫於容州天下羙之中和變梅柳萬彚生春光中和紀月令方與天地長耽樂豈不尚懿茲時景良庻遂亭育恩同致寰海康君臣永終始交㤗符隂陽曲沼水新碧華池桃稍芳勝賞信多歡戒之在無荒廣卓異記唐黄損龍徳二年登進士第喜作詩吟讀史云逐鹿走紅塵炎炎火徳新家肥生孝子國覇有謀臣帝道雲龍合民心草木春須知烟閣上一半老儒真雅言雜載李洞唐諸王孫㳺西川慕浪仙爲詩作銅像其儀事之如神洞爲終南詩二十韻有殘陽高照蜀敗葉逺浮涇復曰砍竹烟嵐凍偷湫雨雹腥逺看丹鳯闕冷射五侯􅈦全篇皆絶唱又贈司空侍郎云馬饑飡落葉鶴病曬残陽又曰捲箔青溪月敲松紫閣書送僧云越講迎騎象蕃齋懴射鵰贈高僕射云征南破虜漢功臣提劍歸來萬里身閒傍凌煙金柱看形容消瘦老扵真送人歸日本云島嶼分諸國星河共一天但誚其僻澁而不知竒貴其峭唯呉子華深知之子華才力浩大八面受敵以百篇示洞洞曰大兄所示百篇中有一聮絶唱新亭曰暖漾魚遺子晴逰鹿引麛子華不怨所鄙而喜其所許洞三牓裴公第二牓䇿夜簾獻曰公道此時如不得昭陵慟哭一生休㝷卒於蜀裴公無子人謂屈洞所致摭言周賀少從浮屠法名清鍳遇姚合而返𥘉與賈島無可齊名島哭栢巖禪師曰苔覆石床新師曾占㡬春寫留行道影焚却坐禪身塔院關松雪房廊露隙塵自憐雙淚下不是解空人賀詩曰林逕西風急松枝講妙餘凍鬚亡夜剃遺偈病時書地燥焚身後堂空着影𥘉此時頻下淚曾省到吾廬同前孟賔于蟠溪懷古云良㢤吕尚父深隱始歸周釣石千年在春風一水流松根盤蘚石花影卧沙鷗誰更懷韜術追思古渡頭又懷連上舊居云閒思連上景難齊樹遶仙郷路遶溪明月夜舟漁父唱春風平野鷓鴣啼城邊寄信歸雲外花下傾盃到日西更憶海陽垂釣侣昔年相遇草萋萋雅言系述曹鄴字業之桂林人爲四怨三愁五情詩其怨云庭花巳結子岩花猶弄色誰令生處逺用盡春工力其愁云别家鬂未生到城鬚似髮朝朝臨水望㶚水不入越其情云空城野雀饑咬咬復飛飛忽見官倉粟官倉無空時爲舎人韋慤所知力薦於主司乃中第看牓日諭主司云一辭桂嵓猿九泣都門月年年孟春至看花不如雪杏園宴上呈同年云賢路非在天十年行不至一旦公道開青雲在平地又云故衣未及換尚有去年淚又云永持共濟心莫起胡越意劉章子克明江左人事湖南馬氏有蒲鞋詩云呉江浪浸白莆春越女𥘉挑一様新纔自綉窓離玉指便隨羅襪上香塵石榴裙下從容乆玳瑁筵前整頓頻今日高樓鴛瓦上不知抛擲是何人黄損連山人作公子行云春草緑綿綿驕驂驟暖烟㣲風飄樂韻半日醉花邊打鵲抛金弹招人舉玉鞭田翁與蠶婦平地看神仙又出山吟云來書𥘉出白雲扄乍躡秋風馬足輕逺近留連分岳色別離嗚咽亂泉聲休將巢許争喧雜自共伊臯論太平昨夜細看雲色裏進賢星座甚分明並同前詩話總龜卷之十百家詩話總龜後集卷之十評論門杜云爾軰可忘年含悽覺汝賢送爾維舟惜此筵汝與山東李白好自世俗觀之則為簡傲詩蕳不然亦嘗有云忘形到爾汝黄常明又古栢云不露文章世已驚未辝剪伐誰能送先噐識後文蓻與浮躁衒露者有異也同上古栢云大厦如傾要梁棟萬牛回首丘山重此賢者難進而易退也非其招不徃者也同上趙嘏長安秋望詩云殘星㡬點鴈横塞長笛一聲人倚楼當時人誦詠之以為佳作遂有趙倚楼之目又有長安月夜與友人話歸故山詩云楊柳風多潮未落兼葭霜在鴈𥘉飛亦不减倚楼之句至扵献李僕射詩云新諾似山無力負舊㤙如水滿身流則謬矣葛常之鍾嵘称張茂先惜其兒女情多風雲氣少喻鳬嘗謁杜紫㣲不遇乃曰我詩無綺羅鉛粉冝不也淮海詩亦然人戯謂可入小石調然率多子羙句但綺䴡大勝爾子羙並蔕芙蓉夲自双水荇牽風翠帯長退之金釵半醉坐添春牧之春風十里楊州路誰謂不可入黄鍾宫邪黄常明昌黎云携持令名帰自足貽家尊蘇州送黎尉云秪應傳善政朝夕慰髙堂誠儒者迂闊之辝然貪饕苟得汚累其親孰若清白之為愈同上東坡云少陵詠懐詩杜陵布衣老大意轉拙許身亦何愚竊比稷與契子羙自比稷契人未必許也然其又有詩云舜舉十六相身尊道更髙秦時任商鞅法令如牛毛自是稷契軰人口中語也知名不必称局促商山芝又云王侯與蝼蟻同盡隨丘墟願聞第一義回向心地𥘉乃知子羙詩尚有亊在也䂬溪張藉送區弘詩云韓公國大賢道徳赫巳聞昨出爲陽山爾區来趋奔韓官迁法曹子送至荆門韓入爲慱士﨑嶇從覊輪觀其逰從之乆疑得於韓者深也然考其文章議論之際乃不得預藉湜之列何也韓集有送區弘南歸詩云我迁于南日周圍来見者衆莫依希爰有區子熒熒暉觀以彛訓或從違我念前人譬葑菲落以斧斤引纏㣲雖有不逮驅騑騑觀此数語則韓雖以師道自任而區受道之質盖有所未至也其後又勉之以行行正直勿脂韋業成志立来頎頎其誨之者至矣集中又有送區冊序韓文辨証云冊即弘也未知孰㨿尓丹陽集舉人過失難於當其尤者臧孫之犯門斬関惟孟椒能繼之臧紇謂國有人焉必椒也其難如此司馬相如竊妻滌噐開巴蜀以困苦郷邦其過巳多至為封禪書則讒謟盖天性不復自新矣子羙猶云竟宣室召徒有茂陵求李白亦云果得相如草仍餘封禪文和靖獨不然曰茂陵他日求遺藁犹喜曽無封禪書言雖不迫責之深矣李商隱云相如觧草長門賦却用文君取酒金亦舍其大論其細也舉其大者自西湖始其后有譏其謟䛕之態死而未已正如捕逐冦盗先有力者所獲搤其吭而騎其項矣余人從旁助箠縳耳黄常明士人程文窮日力作一論旣不限聲律復不拘詩句尚罕得反復折難使其理判然觀赴奉先詠懐五百言乃聱律中老杜心迹論一篇也自杜陵有布衣老大意轉拙許身一何愚自比以稷與契其術祈嚮自是稷契等人窮年憂黎元歎息腸内热與飢渇由已也何異然常爲不知者所病故曰取笑同學翁世不我知而所守不変故曰浩歌弥激烈又云非無江海志瀟洒送日月當今廊庙具建厦豈云缺葵藿傾太陽物性固莫奪言非不知隱遁為髙也亦非以國無其人也特廢義乱倫有所不忍以兹悞生理獨恥亊于謁言志大術踈未始阿附以借势也為下士所笑而浩歌自若皇皇慕君而雅志棲道旣不合時而又不少低屈皆設疑互荅屡致意焉非巨刃有余孰能之乎中間鋪叙間関酸辛冝不勝其戚戚而黙思失業途因念逺戍卒所謂憂在天下而不為小已失得也禹稷顔子不害為同道少陵之迹江湖而心稷契豈為過㢤孟子曰窮則獨善其身逹則兼善天下其窮也未嘗無志於囯與民其逹也未嘗不抗其易退之莭宻謀先定出處一致矣是時先後周復正合乎此昔人目元和賀雨詩為諌書余特目此詩為心迹論也䂬溪五言如四十个賢人著一箇屠酤不得覔句者若掘得玉匣子有底有盖但精心必獲其宝然昔人园柳変鳴禽竟不及池塘生春草餘霞散成綺不及澄江静如練春水船如天上坐不若老年芲似霧中㸔閑乆硯中窺水淺不若芲落徑裡得沿香停杯嗟別乆不及對月喜家貧楓林社日鼓不若茆屋午時雞此数公未始不精心似此知全其宝者未易多得黄常明愈寄孟刑部聮句云羙君如道腴逸歩謝天械或問道果有味乎余曰如介甫午雞声不到禪林栢子烟中静擁衾竹鷄呼我出華胥起滅篝燈擁燎炉各㩀搞梧同不寐偶然聞雨落階除皆淡中意味非造此景不能形容也黄常明張無盡題武昌陵竹寺云孟宗泣竹笋冬生豈是青青竹有情影響主張非别物人心但莫負幽明語雖淺直然當於理樂天有餘霞散成綺別葉乍辞風等語䴡矣不過扵嘲風雪弄花而巳故寄唐生詩云非求宫律髙不務文字竒惟歌生民病得願天子知䂬溪顔延之嘗問鮑昭已與靈運優劣昭曰謝五言如𥘉發芙蓉自然可愛君詩鋪錦列綉亦彫繢滿眼鍾嵘詩品乃記湯惠休云謝如芙蓉出水顔如錯采􅍢金與本傳不同又称延之甞薄惠休制作以爲委巷中歌謡耳豈湯休因爲延之所薄遂有芙蓉錯􅍢之語故史取以文飾之邪坡云辨才詩如風吹水自成文理吾軰與參寥如巧媍織錦耳取况亦類此淵明所以不可及者盖無心於非譽巧拙之間也黄常明永叔以昌黎比介甫云荅他日若能窺孟子終身何敢望韓公呉季野以方賈誼荅云俯仰繆㤙方自慊慚君将比洛陽人皆憤然不平如悪無塩唐突而謝景山贈文忠詩有才如夣得今爲累情似安仁乆悼亡即開門當之二公何抑揚之異也同上子羙夜宴左氏莊檢書燒燭短燭正不冝觀書檢閱時暫可也退之短檠二尺便且光可謂燈窓人中語猶有未便燈不籠則損目不冝勤且乆山谷夜堂朱墨小灯籠可謂善矣而虚堂非夜乆所冝子瞻推門入室書縦横蠟𥿄灯籠晃雲母慣親灯火儒生酸態尽矣同上張藉嘗移書責退之與人商論不能下氣愈亦有云我昔實愚蠢不能降色辞余謂此乃書生常態昔常見太中炉亭議題紛喧関然其後有二生坐是鳴鼓豈直議礼家爲聚訟㢤聖俞謝永叔惠酒云貽詩語且横旣醉論益堅曽不䆒世務閑氣争占先誠有之也同上岑参寄杜拾遺云聖朝無闕亊自覺諌書稀退之贈崔𥙷闕云早生得塗未要忙時清諫䟽尤冝罕皆繆承荀卿有听從無諌諍之語遂使阿䛕奸侫用以藉口以是知凢造意立言不可不豫為天下来世慮䂬溪西清詩話人之好悪固自不同子羙在蜀作悶詩乃云捲簾唯白水隱几亦青山若使余居此應従王逸少語吾當卒以樂死豈復更有悶邪同上王君玉云子羙之詩詞有近質如麻鞋見天子垢膩脚不襪之句所謂轉石扵千仭之山势也學者尤之過甚豈逺大者難窺乎同上百家詩話緫亀後集卷之十終
