front:
  text: 増修詩話總龜卷之四十三
  hash: sha256:7a8573ea525aab9f8f83c407b1423ba19d6e2733b32f85352664229a79c87000
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_043-1a}
body:
  text: 傷悼門雷有終自平蜀後人爲立祠又嘗以私財犒士貧不能足貸錢以給比捐舘舎時尚欠三萬緡章聖特出内帑錢償之故魏仲先悼有終詩曰聖代賢臣䘮何人不慘顔新祠民祭祀舊債帝填還􅒾簿塵侵暗銘旌涙洒班功名誰可継勑􅌾向家山青箱雜記杜子羙自蜀走湘椘卒扵耒陽時人謂以牛䏑白酒脹飲而死則非也僧紹貟詩曰賢人失志古来有牛䏑因傷是也無耒陽宰詩曰詩名天寳大骨塟耒陽空耒陽有子羙墳時人謂聶令空堆士也唐人詩曰一夜耒江雨百年工部墳摭遺北虜多有文籍亦以文雅相尚王矩為工部郎中本燕人為虜将邪律志其名堂書記常徔其出入邪律兄及其兄之子太平興國中戦没扵大郡後邪律經舊戦処覧其遺迹作詩矩記其两句云父子盡徔虵陣没弟兄空望鴈門悲談苑徐寅興化軍莆田人以祕書省正字歸老鄊里旣死莭度使王延賔以詩哭之曰延夀溪頭歎逝波古今人事半銷磨昔除正字今何在所謂人生能幾何延夀溪寅所居也詩史李逺体物縁情皆盡臻妙嘗有贈筝妓伍卿詩云䡖䡖没後更無筝玉腕紅紗到伍卿坐客滿筵都不語一行哀鴈十三聲咏鴛鴦云鴛鴦离别傷人意似鴛鴦試取夗央㸔多應寸腸故人盧尚書哭李詩云昨日舟還浙水湄今朝丹旐欲何為纔收北浦一竿釣未了西齋半局棊洛下已傳平子賦臨川争冩謝公詩不堪舊里經行處風木瀟瀟鄰笛悲郡閣雅談江鄰㡬善為詩清淡有古風蘇子羙坐進奏院事謫官後死呉中江作詩云郡邸獄冤誰與辨臯橋客死世同悲用事甚精嘗有古詩云五十踐衰境如我在明年論者謂人莫不用事䏻令事如已出天然渾厚乃可言詩江天資淳雅喜飲酒鼓琴圍棋人以酒召之未嘗不醉已醉眠人強𧺫飲之亦不辭也或不能歸即宿人家啇度風韵陶靖莭之比云江嘗通判廬州有酒官善琴以坐務不得出江旦旦就之郡中沙門道士及里畎䏻棋者數人呼與同徃郡人見之習熟因畫為圗前列趋道一人騎馬青盖其後沙門道士褐衣数人葛巾芒履累累相尋意思䔥散惜時無名手此畫不足傳後何减稽阮也唐賢抒情竇鞏工為絶句嘗從軍有别家詩云自笑儒生着戦𫀆書齋壁上掛弓刀如今便是征人媍好織廻文寄竇韜又悼妓東東一篇云芳菲羙艶不禁風未到春殘已墜紅惟有側輪車上鐸耳邊長似呌東東盧瓌抒情令狐楚宫人斜詩云唯應四仲祭使者暫悲嗟又白時詩序云自刑部貟外郎出得累歴方鎮携挈随逐又有茈菰花芹花詩亦唐賢所罕詠者雜志李郢嘗與賈島僧無可逰島没長江僧亦返𥘉郢感歎題曰却到京師事事傷恵林歸寂賈生亡何人收得文章篋獨我来經苔蘚房一命未沾為逐客万縁𥘉盡别空王䔥消竹塢斜陽在葉覆閑堦雪擁墻雜談孟郊卒韓吏部作誌謚曰正耀先生賈島哭之詩曰身没聲名在多應萬古傳寡妻無子息破宅帶林泉塚近登山道詩随過海舡故人相吊處斜日下寒天摭言荒凉城南奉先寺後宫羙人棺葬此角樓相望髙起墳草間柏下多石人秩卑焚骨不作塚青石浮屠唱丘壠家家墳上作享亭朱門相向无人聲樹頭土梟作人語月黒風悲鬼揺樹宫中飬女作子孫年年犢車来作主廢后陵园官道側家破無人掃陵域官家歳給半千錢街頭買餅作寒食此張文潜題奉先寺詩晁以道嘗與江子之言文潜近来詩不堪好子之因誦此詩以對以道云莫不是文潜詩否洪駒父有過李公擇尚書墓一萹其間云鹿埸兔逕白畫静稻壟松竹青嶂深說者以為大逼老杜邢居實字惇夫年少豪邁所與遊皆一時名士方年十四五時嘗作明妃引末句云安得壮士霍嫖姚縳取呼韓作編戸諸公多称之旣卒余收什其殘章編成一集號曰惇夫自少便多憔悴感慨之意其作秋懐云髙歌感人心心悲将柰何其作棗陽道中詩云有意問山仙此生更来否已而果䘚於漢東惇夫之䘚也山谷以詩哭之云詩到年来更老成江山爲助茟縦横眼㸔白骨埋黄土何况人間父子情盖惇夫與其父歆向也蔡天啓亦有詩云人物於今歎渺然孤墳宿艸已生煙日暮行人道傍㑹應逄年少共談玄其餘作者甚衆皆載於呻吟集後邵尭夫之弟名睦者無疾而化前此有重九詩云擬問東籬事東籬事渺茫后果殯於東籬之下故尭夫哭之云自茲明月清風夜䔥索東籬㸔断膓又云断腸東籬何所尋東籬從此事沉沉余於一雜編中見有書郵亭事既不暁其誰作但觀其詩有足哀者故載之於此其末云周仲羙不知何許人自言世居亰師父㳺䆠家于成都既而適李氏子侍舅姑䆠㳑上從良人赴金陵幕偶因事棄官入華山有長住之意仲羙即寄身合淝外祖家方求歸未得㑹舅遽調任長沙不免共載而南雲水茫茫去囯益逺形影相吊洒涕何言因書所懐于壁詩曰愛妾不愛子爲問此何理棄官更棄妻人情寕可已永訣泗之濱遺言空在耳三載無朝昬孤幃泪如洗婦人義從夫一莭誓生死江郷感殘春腸断晚煙起西望太華峰不知幾千里並王直方詩話梅聖俞至寕陵寄余詩云獨護慈母䘮泪與河水流河水冬有竭泪泉常在眸彦獻持國譏其作詩太早余應之以蓼莪及傳咸贈王何二侍郎詩雜誌劉洞不知何許人江南國破後題池州一亭云千里長江唯渡馬十年養士得何人詩史白樂天去世人以詩吊之曰綴玉聮珠六十年誰教㝠路作詩仙浮雲不繫名居易造化無為字樂天童子觧吟長恨曲胡児能唱琵琶萹文章已滿行人耳一度思卿一愴然韓文公少年受䔥存吏部知賞及自袁州囬入國子祭酒道經江州因㳺庐山過吏部山居知諸子凋零惟二女在焉作詩曰中郎有女能傳業伯道無児可保家今日庐山過舊隱空将衰泪對煙霞張祐性酷好太湖石三吴太守多以贈之遺故陸魯望以詩哭之曰一林石筍散豪家顧况字逋翁暮年有一子字非熊忽暴亡况哀悼不勝乃作詩曰老人䘮愛子日暮涙成血老人年七十不作多時别非熊冥間聞之以情告冥官冥官閔之却令生扵况家三歳能言冥間聞父苦吟求再生事歴厯然長成應舉擢第盧延遜哭李郢端公詩曰軍門半掩槐花宅每過猶聞哭臨聲北固暴亡兼在路東都權塟未㱕茔漸穷老㒒慵㸔馬着慘佳人暗理筝詩侣酒徒消散盡一塲春夣越王城劉夣淂虎丘山見元㣲之二年過題名愴然有感云滻水送君君不還見君題字虎丘山因知早貴兼才子不得多時在世間又有所嗟二首云庾令樓中𥘉見時武昌春色似腰支相逄相識空如夣為雨為雲今不知鄂渚𪷟濛煙雨㣲女郎魂逐暮雲㱕只應長在漢陽渡化作鴛鴦一隻飛石守道為國子監直講天下呼為徂徠先生作慶暦聖徳頌大為時所忌㑹徐賊孔直温叛搜其家有介書坐貶而卒時疑其詐死欲剖棺騐之近臣言介實死得免永叔以詩哭之曰埋猶不信死終免断其棺揚章安云章安或為章亦誰道盖棺人事定是非猶及土中身劉夣得傷友人亡姫詩曰見學琵琶見藝成今来追想倍傷倩撚弦花下呈新曲放撥灯前謝改名大抵好花終易落従来尤物不長生蘭䑓夜直衣衾冷雷雨無因入禁城劉得仁出入屋塲三十年卒無所成而逝僧西白以詩弔之曰忽苦為詩来到此氷魂雪魄已難招直教桂子落墳上生得一枝冤始消張禕侍郎有爱姫早亡念之不已猶子為右𥙷闕因其入朝未歸為浣溪沙辭置扵机上曰枕帳熏爐隔繍幃二年終日両相思好風明月尔應知天上人間何處去舊歡新夣覺来時黄昏㣲雨畫屏垂禕見曰此必阿灰詞阿灰𥙷闕小字也錢熈泉南才士也曽作四夷来王賦獻太宗愛其才又嘗撰三酌酸文世稱精絶後亦不逹而故郷人李慶孫以詩吊之曰四夷妙賦無人継三酌酸文舉世傳詩話唐武宗有才人孟氏嘗對武宗泣下作何滿子而卒張祐作詩云偶因清唱詠歌頻奏入深宫十二春却為一聲何滿子下泉湏吊孟才人劇談録秦國公主薨神考賜挽詞曰海闊三山路香輪定不㱕帳深閑翡翠珮冷失珠璣明月晋歌扇殘霞散舞衣都門送車反宿艸自春菲暁發城西道靈車望更遥春風寒魯舘明月断秦簘塵入羅衣暗香随玉篆消芳魂無北渚郍復可爲招又曰慶自天源發恩從國愛深歌鍾雖在舘桃李不成春水折空還沁樓髙亦隔秦區區㑹稽市無復獻珠人冷斎夜話增修詩話總龜卷之四十三百家詩話總龜後集卷之四十三釋氏門坡贈辯才云我比陶令愧公為逺公優時辨才退居未嘗出入坡徃見之遂出至風篁嶺又云如使北山人求記二老㳺用老杜寄賛上人與子成二老来徃亦風流皆一儒一釋也又寄參寥問少㳺失觧云底事秋来不得觧之定中試與問諸天盖劉禹錫和宣上人賀王侍郎放榜後詩云借問至公誰可印支郎天眼定中觀不惟兼具儒釋又正属科埸事其不泛如此䂬溪詩話夢得送僧君素云去来皆是道别此不消魂坡云古今正自同歲月何必書此等語皆通徹無碍釋氏所謂具眼也同上端師子始見弄師子者發明心要則以綵帛像其皮時時著之因以爲號秦少游聞其髙道請申座端以手自指曰天上無雙月人間只一僧一堂風冷笑千古意分明少游首肯之能誦法華經必得錢五百乃開秩日誦数句即持錢地坐去其缺簿者易之而去好歌漁父詞月夕必歌之逹旦有狂僧囬頭和尚以左道鼓動流俗士大夫亦安其妄方對丹陽吕公肉食端徑至指曰正當與麽時如何是佛囬頭不能遽對端捶其頭推倒乃行又有妖人號不托掘秀州城外地有佛像建塔其上傾城敬信端見堪住曰如何是佛不托擬議端趯之而去章相子厚請升座使余秀老撰䟽叙其事曰推倒囬頭趯飜不托七軸之蓮經未誦一聲之漁父先聞端听僧官宣至此以手揶揄曰止乃引聲吟曰本是瀟湘一釣客自東自西自南北大衆雜然称善端頋大笑曰我觀法王法法王法如是下座僧宝傳釣魚船上謝三郎雙鬂已蒼蒼莎衣未必清貴不肯換金章汀草畔浦芲旁静鳴桹自来好箇漁父家風一片瀟湘金華俞秀老作此篇道人多傳之非道意岑寂其語不能如是苕溪漁隱曰傳燈録云玄沙福州閩縣人姓謝氏㓜好垂釣泛小艇扵南䑓江狎諸漁者年甫三十忽慕出塵乃弃釣艇投芙蓉山訓禪師落髪用此事也山谷冷齋夜話謂道潜作詩追法淵明其詩有逼真處曰数聲柔櫓蒼茫外何處江村人夜歸又曰隔林彷彿聞機杼知有人家住翠微余細細味之句格故佳但異淵明語豈得謂之逼真䖏若東坡和陶詩前山正可數後騎且勿驅此方是逼真䖏徳洪不善評詩此豈足慿㢤苕溪漁隱師住天台梅子真舊隱一僧入山迷路問曰和尚在此山多少時也師曰只見四山青又黄又問出山路什麽䖏去師曰流水可隨去僧歸說似塩官塩官令僧去請出山師有偈云摧殘枯木倚寒林幾度逢春不変心樵客遇之猶不頋郢人那得苦追㝷大寂聞師住山乃令一僧到問曰和尚見馬師得箇什麽便住此山師云馬師向我道即心是佛我便向這裏住僧云馬師近日佛法又別師云作麽生別僧云近日又道非心非佛師云這老漢惑乱人未有了曰任汝非心非佛我只𬋩即心即佛其僧廽㪯似馬祖祖云大衆梅子熟也苕溪漁隱曰韓子蒼送僧住梅山詩云寺聞岑寂知何許想到千岩萬壑開待得梅山梅子熟不辞先寄一枝来用前事也傳燈録梵志翻著襪人皆道是錯乍可刺尔眼不可隱我脚一切衆生顛倒皆類如此乃知梵志是大脩行人也昔茅容季偉田家子尔殺雞飯其母而以草具飯郭林宗林宗起拜之因勸使就學遂為四海名士此飜著襪法也今人以珍饌奉客以草具奉其親渉世合義則與已不合義則称親萬世同流皆季偉之罪人也山谷王梵志明州妙音僧法淵為人陽狂日飲酒市肆歌笑自如匄錢於人得一錢即欣然以為飲得之多復與道路廢疾窮者能言人禍福無不騐人疑其精於術數故號淵三命發言無常及問之掉頭不荅惟云去去有䘮之家必徃哭之􅌾則送之無貧富皆徃莫測其意人以其狂又號顛僧大覺禪師𥘉住育王開堂僧倔然出問話人莫不竊笑大斍問顛僧是顛了僧僧了顛荅曰大斍是大了覺覺了犬大覺黙然衆皆驚愕一日忽於市相别携酒一壷至郡守宅前㩀地而飲觀者千餘人酒盡懐中出頌一首欲化去衆皆引聲大呼云不可於此遂歸妙音趺坐而化頌曰咄咄平生顛蹶欲問臨行炉中大雪真相至今存焉三山老人語録蓬州道士賈善翔字鴻舉能劇談善琴嗜酒士大夫喜與之㳺東坡嘗過之献書問曰身如芭蕉心如蓮花百節踈通萬竅玲瓏来時一去時八萬四千末云鴻舉下語賈荅曰老道士這裏没許多般数張天覺䟦其後云去時八萬四千不知落在那邉若不斬頭覔活誰知措大叅禪東泉雜録太白夜懐有句云宴坐寂不動大千入毫髮潘佑獨坐有句云凝神入混茫萬萬成虗空予爱二才子吐辭精敏之力等入道深宻之狀同合而書之聊資已用法藏淬金近時僧洪覺範頗能詩其題李愬畫像云淮隂北面師廣武其氣豈止吞項羽公得李祐不肯誅便知元濟在掌股此詩當與黔安並驅也頃年僕在長沙相從弥年其他詩亦甚佳如云含風廣殿聞碁响度日長廊轉栁隂頗似文章巨公所作殊不類衲子又善作小詞情思婉約似秦少㳺至如仲殊叅寥雖名世皆不能及許彦周詩話城外土饅頭饀草在城裏一人吃一箇莫嫌没滋味巳且為土饅頭尚誰食之今改預先著酒澆使教有滋味山谷王梵志余在臨川景德寺與謝無逸軰升閣得禪月所畫十八應真像甚竒而失苐五軸予口占嘲之曰十八聲聞觧唾根少叢林漢乱山門不知何䖏羅齋去不見雲堂苐五尊明日有女子来拜叙曰児南营兵妻也寡而食素夜夢一僧来言曰我本景德僧因行失隊煩相引歸寺可乎旣覺而鄰家邀飯入其門見壁間有畫異僧形像了然夢中所見也時朱世英守臨川異之使迎還閣藏之冷齋夜話元豊間嘗乆旱𥙿陵禁中齋禱甚力一夕夢有僧乗馬馳空中口吐雲霧旣覺而雨大作翌日中貴人道夢中所見物色於相國寺山門五百羅漢中至苐十三尊略彷彿即迎入内觀之正所夢也王丞相禹玉作喜雨詩云良弼為霖辜所望神僧吐霧應精求元叅厚之云仙驥籋雲穿仗下佛芲吹雨布天流盖記此事相國寺羅漢本江南李氏時物在廬山東林寺曹翰下江州盡取其城中金帛寳貨連百餘舟私盗以歸無以爲名乃取羅漢毎舟載十許尊獻之詔因賜相國寺當時謂之押綱羅漢石林詩話魯直使予對句云呵鏡雲遮月對曰啼粧露㸔花魯直罪予於詩深刻見骨不務含蓄予竟不曉此論冷齋夜話僧寳傳覺範所撰也但欲馳騁其文徃徃多失事實至扵作賛又雜以詩句此豈史法示褒貶之意也㢤其詩云行盡湘西十里松到門却立数諸峯崇公事迹無㝷處庭下春泥見虎蹤又云廬山殿閣如生成食堂䖏處禪牀折我自三門如冷灰盡日長廊卷風葉又為竒語云如月照衆水波波頓見而月不分如春行萬國處䖏同時而春無迹但其才性競爽見於言語文字間若扵禪門本分事則無之也苕溪漁隱前軰好称僧悟清鳥歸花影動魚没浪㾗圎以為句意皆新然余讀後梁沈君攸臨水詩云花落圎紋出風急細流翻乃知魚浪㾗圎之句出於此也復齋漫録泉州僧慶老有詩云交情老去淡如水病骨秋来瘦作松真方外語也詩說汪彦章龍溪集有霜餘溪上四絶癩可東溪集亦有霜餘溪上五絶内四絶即龍溪集中詩但一絶不是所謂故人江北江南岸者餘皆同之不知竟誰作邪四絶中其一云水似秋蛇巧作蟠山如濃翠擁髙鬟清風明月元無主乞我烟蘿茅數間味清駃可愛苕溪漁隱百家詩話緫龜後集卷之四十三終
