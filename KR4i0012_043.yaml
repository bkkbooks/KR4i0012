front:
  text: 增修詩話總龜卷之四十三
  hash: sha256:b31e54756365001bdd1438619377e9a6d28d8be15b9793ce9f18c6dc5e4093c9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_043-1a}
body:
  text: 傷悼門雷有終自平蜀後人為立祠又嘗以私財犒士貧不能足貸錢以給比捐館舍時尚欠三萬緡章聖特出內帑錢償之故魏仲先悼有終詩曰聖代賢臣喪何人不慘顔新祠民祭祀舊債帝填還􅒾簿塵侵暗銘旌淚灑班功名誰可繼勑􅌾向家山青箱雜記杜子美自蜀走湘椘卒于耒陽時人謂以牛炙白酒脹飲而死則非也僧紹貟詩曰賢人失志古來有牛炙因傷是也無耒陽宰詩曰詩名天寶大骨葬耒陽空耒陽有子美墳時人謂聶令空堆士也唐人詩曰一夜耒江雨百年工部墳托遺北虜多有文籍亦以文雅相尚王矩為工部郎中本燕人為虜將邪律志其名堂書記常徔其出入邪律兄及其兄之子太平興國中戰沒于大郡後邪律經舊戰處覽其遺迹作詩矩記其兩句云父子盡徔蛇陳沒弟兄空望鴈門悲談苑徐寅興化軍莆田人以祕書省正字歸老鄊里既死莭度使王延賔以詩哭之曰延夀溪頭歎逝波古今人事半銷磨昔除正字今何在所謂人生能幾何延夀溪寅所居也詩史李逺體物緣情皆盡臻妙嘗有贈筝妓伍卿詩云輕輕沒後更無筝玉腕紅紗到伍卿坐客滿筵都不語一行哀鴈十三聲咏鴛鴦云鴛鴦離别傷人意似鴛鴦試取卯央看多應寸腸故人盧尚書哭李詩云昨日舟還浙水湄今朝丹旐欲何為才收北浦一竿釣未了西齋半局棊洛下已傳平子賦臨川爭寫謝公詩不堪舊里經行處風木瀟瀟鄰笛悲郡閣雅談江鄰幾善為詩清淡有古風蘇子美坐進奏院事謫官後死吳中江作詩云郡邸獄冤誰與辨臯橋客死世同悲用事甚精嘗有古詩云五十踐衰境如我在明年論者謂人莫不用事能令事如已出天然渾厚乃可言詩江天資淳雅喜飲酒鼓琴圍棋人以酒召之未嘗不醉已醉眠人強起飲之亦不辭也或不能歸即宿人家啇度風韻陶靖莭之比云江嘗通判廬州有酒官善琴以坐務不得出江旦旦就之郡中沙門道士及里畎能棋者數人呼與同往郡人見之習熟因畫為圗前列趨道一人騎馬青蓋其後沙門道士褐衣數人葛巾芒履纍纍相尋意思蕭散惜時無名手此畫不足傳後何減稽阮也唐賢抒情竇鞏工為絶句嘗從軍有别家詩云自笑儒生著戰𫀆書齋壁上挂弓刀如今便是征人婦好織回文寄竇韜又悼妓東東一篇云芳菲美艷不禁風未到春殘已墜紅惟有側輪車上鐸耳邊長似呌東東盧瓌抒情令狐楚宫人斜詩云唯應四仲祭使者暫悲嗟又白時詩序云自刑部貟外郎出得纍歷方鎮携挈隨逐又有茈菰花芹花詩亦唐賢所罕詠者雜志李郢嘗與賈島僧無可逰島沒長江僧亦返𥘉郢感歎題曰却到京師事事傷惠林歸寂賈生亡何人收得文章篋獨我來經苔蘚房一命未沾為逐客万緣𥘉盡别空王蕭消竹塢斜陽在葉覆間階雪擁墻雜談孟郊卒韓吏部作志諡曰正耀先生賈島哭之詩曰身沒聲名在多應萬古傳寡妻無子息破宅帶林泉冢近登山道詩隨過海船故人相吊處斜日下寒天托言荒涼城南奉先寺後宫美人棺葬此角樓相望髙起墳草間柏下多石人秩卑焚骨不作冢青石浮屠唱丘壠家家墳上作享亭朱門相向無人聲樹頭土梟作人語月黑風悲鬼搖樹宫中飬女作子孫年年犢車來作主廢后陵園官道側家破無人掃陵域官家歲給半千錢街頭買餅作寒食此張文潛題奉先寺詩朝以道嘗與江子之言文潛近來詩不堪好子之因誦此詩以對以道云莫不是文潛詩否洪駒父有過李公擇尚書墓一萹其間云鹿埸兔徑白畫靜稻壟松竹青嶂深説者以為大逼老杜邢居實字惇夫年少豪邁所與遊皆一時名士方年十四五時嘗作明妃引末句云安得壯士霍嫖姚縳取呼韓作編戶諸公多稱之既卒余收什其殘章編成一集號曰惇夫自少便多憔悴感慨之意其作秋懷云髙歌感人心心悲將奈何其作棗陽道中詩云有意問山仙此生更來否已而果卒於漢東惇夫之卒也山谷以詩哭之云詩到年來更老成江山為助茟縱橫眼看白骨埋黃土何况人間父子情蓋惇夫與其父歆向也蔡天啓亦有詩云人物於今歎渺然孤墳宿草已生煙日暮行人道傍會應逄年少共談玄其餘作者甚衆皆載於呻吟集後邵堯夫之弟名睦者無疾而化前此有重九詩云擬問東籬事東籬事渺茫后果殯於東籬之下故堯夫哭之云自茲明月清風夜蕭索東籬看斷腸又云斷腸東籬何所尋東籬從此事沉沉余於一雜編中見有書郵亭事既不曉其誰作但觀其詩有足哀者故載之於此其末云周仲美不知何許人自言世居亰師父遊宦家于成都既而適李氏子侍舅姑宦溢上從良人赴金陵幕偶因事棄官入華山有長住之意仲美即寄身合淝外祖家方求歸未得會舅遽調任長沙不免共載而南雲水茫茫去國益逺形影相吊灑涕何言因書所懷于壁詩曰愛妾不愛子為問此何理棄官更棄妻人情寧可已永訣泗之濱遺言空在耳三載無朝昏孤幃泪如洗婦人義從夫一莭誓生死江鄉感殘春腸斷晚煙起西望太華峰不知幾千里並王直方詩話梅聖俞至寧陵寄余詩云獨護慈母喪泪與河水流河水冬有竭泪泉常在眸彥獻持國譏其作詩太早余應之以蓼莪及傳咸贈王何二侍郎詩雜志劉洞不知何許人江南國破後題池州一亭云千里長江唯渡馬十年養士得何人詩史白樂天去世人以詩吊之曰綴玉聮珠六十年誰教冥路作詩仙浮雲不繫名居易造化無為字樂天童子解吟長恨曲胡兒能唱琵琶萹文章已滿行人耳一度思卿一愴然韓文公少年受蕭存吏部知賞及自袁州回入國子祭酒道經江州因遊廬山過吏部山居知諸子凋零惟二女在焉作詩曰中郎有女能傳業伯道無兒可保家今日廬山過舊隱空將衰泪對煙霞張祐性酷好太湖石三吳太守多以贈之遺故陸魯望以詩哭之曰一林石筍散豪家顧况字逋翁暮年有一子字非熊忽暴亡况哀悼不勝乃作詩曰老人喪愛子日暮淚成血老人年七十不作多時别非熊冥間聞之以情告冥官冥官閔之却令生于况家三歲能言冥間聞父苦吟求再生事歷厯然長成應舉擢第盧延遜哭李郢端公詩曰軍門半掩槐花宅每過猶聞哭臨聲北固暴亡兼在路東都權葬未歸塋漸窮老㒒慵看馬著慘佳人暗理筝詩侣酒徒消散盡一場春夢越王城劉夢淂虎丘山見元微之二年過題名愴然有感云滻水送君君不還見君題字虎丘山因知早貴兼才子不得多時在世間又有所嗟二首云庾令樓中𥘉見時武昌春色似腰支相逄相識空如夢為雨為雲今不知鄂渚𪷟濛煙雨微女郎魂逐暮雲歸只應長在漢陽渡化作鴛鴦一隻飛石守道為國子監直講天下呼為徂徠先生作慶曆聖德頌大為時所忌會徐賊孔直溫叛搜其家有介書坐貶而卒時疑其詐死欲剖棺驗之近臣言介實死得免永叔以詩哭之曰埋猶不信死終免斷其棺揚章安云章安或為章亦誰道蓋棺人事定是非猶及土中身劉夢得傷友人亡姫詩曰見學琵琶見藝成今來追想倍傷倩撚弦花下呈新曲放撥燈前謝改名大抵好花終易落從來尤物不長生蘭臺夜直衣衾冷雷雨無因入禁城劉得仁出入屋場三十年卒無所成而逝僧西白以詩弔之曰忽苦為詩來到此氷魂雪魄已難招直教桂子落墳上生得一枝冤始消張禕侍郎有愛姫早亡念之不已猶子為右輔闕因其入朝未歸為浣溪沙辭置于機上曰枕帳熏爐隔繍幃二年終日兩相思好風明月爾應知天上人間何處去舊歡新夢覺來時黃昏微雨畫屏垂禕見曰此必阿灰詞阿灰輔闕小字也錢熙泉南才士也曽作四夷來王賦獻太宗愛其才又嘗撰三酌酸文世稱精絶後亦不逹而故鄉人李慶孫以詩吊之曰四夷妙賦無人繼三酌酸文舉世傳詩話唐武宗有才人孟氏嘗對武宗泣下作何滿子而卒張祐作詩云偶因清唱詠歌頻奏入深宫十二春却為一聲何滿子下泉須吊孟才人劇談録秦國公主薨神考賜挽詞曰海闊三山路香輪定不歸帳深間翡翠珮冷失珠璣明月晉歌扇殘霞散舞衣都門送車反宿草自春菲曉發城西道靈車望更遙春風寒魯館明月斷秦簘塵入羅衣暗香隨玉篆消芳魂無北渚郍復可為招又曰慶自天源發恩從國愛深歌鍾雖在館桃李不成春水折空還沁樓髙亦隔秦區區會稽市無復獻珠人冷齊夜話增修詩話總龜卷之四十三百家詩話總龜後集卷之四十三釋氏門坡贈辨才云我比陶令愧公為逺公優時辨才退居未嘗出入坡往見之遂出至風篁嶺又云如使北山人求記二老遊用老杜寄贊上人與子成二老來往亦風流皆一儒一釋也又寄參寥問少遊失解云底事秋來不得解之定中試與問諸天蓋劉禹錫和宣上人賀王侍郎放榜後詩云借問至公誰可印支郎天眼定中觀不惟兼具儒釋又正屬科埸事其不泛如此䂬溪詩話夢得送僧君素云去來皆是道别此不消魂坡云古今正自同歲月何必書此等語皆通徹無礙釋氏所謂具眼也同上端師子始見弄師子者發明心要則以綵帛像其皮時時著之因以為號秦少遊聞其髙道請申座端以手自指曰天上無雙月人間只一僧一堂風冷笑千古意分明少遊首肯之能誦法華經必得錢五百乃開秩日誦數句即持錢地坐去其缺簿者易之而去好歌漁父詞月夕必歌之逹旦有狂僧回頭和尚以左道鼓動流俗士大夫亦安其妄方對丹陽吕公肉食端徑至指曰正當與麼時如何是佛回頭不能遽對端捶其頭推倒乃行又有妖人號不托掘秀州城外地有佛像建塔其上傾城敬信端見堪住曰如何是佛不托擬議端躍之而去章相子厚請升座使余秀老撰疏敘其事曰推倒回頭躍翻不托七軸之蓮經未誦一聲之漁父先聞端聽僧官宣至此以手揶揄曰止乃引聲吟曰本是瀟湘一釣客自東自西自南北大衆雜然稱善端顧大笑曰我觀法王法法王法如是下座僧寶傳釣魚船上謝三郎雙鬢已蒼蒼莎衣未必清貴不肯換金章汀草畔浦花旁靜鳴桹自來好箇漁父家風一片瀟湘金華俞秀老作此篇道人多傳之非道意岑寂其語不能如是苕溪漁隱曰傳燈録云玄沙福州閩縣人姓謝氏幼好垂釣泛小艇于南臺江狎諸漁者年甫三十忽慕出塵乃棄釣艇投芙蓉山訓禪師落髮用此事也山谷冷齋夜話謂道潛作詩追法淵明其詩有逼真處曰數聲柔櫓蒼茫外何處江村人夜歸又曰隔林倣佛聞機杼知有人家住翠微余細細味之句格故佳但異淵明語豈得謂之逼真處若東坡和陶詩前山正可數後騎且勿驅此方是逼真處德洪不善評詩此豈足慿哉苕溪漁隱師住天台梅子真舊隱一僧入山迷路問曰和尚在此山多少時也師曰只見四山青又黃又問出山路什麼處去師曰流水可隨去僧歸説似鹽官鹽官令僧去請出山師有偈云摧殘枯木倚寒林幾度逢春不變心樵客遇之猶不顧郢人那得苦追尋大寂聞師住山乃令一僧到問曰和尚見馬師得箇什麼便住此山師云馬師向我道即心是佛我便向這裏住僧云馬師近日佛法又別師云作麼生別僧云近日又道非心非佛師云這老漢惑亂人未有了曰任汝非心非佛我只𬋩即心即佛其僧廽舉似馬祖祖云大衆梅子熟也苕溪漁隱曰韓子蒼送僧住梅山詩云寺聞岑寂知何許想到千岩萬壑開待得梅山梅子熟不辭先寄一枝來用前事也傳燈録梵志翻著襪人皆道是錯乍可刺爾眼不可隱我腳一切衆生顛倒皆類如此乃知梵志是大修行人也昔茅容季偉田家子爾殺雞飯其母而以草具飯郭林宗林宗起拜之因勸使就學遂為四海名士此翻著襪法也今人以珍饌奉客以草具奉其親涉世合義則與已不合義則稱親萬世同流皆季偉之罪人也山谷王梵志明州妙音僧法淵為人陽狂日飲酒市肆歌笑自如丐錢於人得一錢即欣然以為飲得之多復與道路廢疾窮者能言人禍福無不驗人疑其精於術數故號淵三命發言無常及問之掉頭不答惟云去去有喪之家必往哭之􅌾則送之無貧富皆往莫測其意人以其狂又號顛僧大覺禪師𥘉住育王開堂僧倔然出問話人莫不竊笑大覺問顛僧是顛了僧僧了顛答曰大覺是大了覺覺了犬大覺默然衆皆驚愕一日忽於市相别携酒一壷至郡守宅前據地而飲觀者千餘人酒盡懷中出頌一首欲化去衆皆引聲大呼云不可於此遂歸妙音趺坐而化頌曰咄咄平生顛蹶欲問臨行爐中大雪真相至今存焉三山老人語録蓬州道士賈善翔字鴻舉能劇談善琴嗜酒士大夫喜與之遊東坡嘗過之獻書問曰身如芭蕉心如蓮花百節踈通萬竅玲瓏來時一去時八萬四千末云鴻舉下語賈答曰老道士這裏沒許多般數張天覺跋其後云去時八萬四千不知落在那邉若不斬頭覔活誰知措大參禪東泉雜録太白夜懷有句云宴坐寂不動大千入毫髮潘佑獨坐有句云凝神入混茫萬萬成虗空豫愛二才子吐辭精敏之力等入道深密之狀同合而書之聊資已用法藏淬金近時僧洪覺範頗能詩其題李訴畫像云淮隂北面師廣武其氣豈止吞項羽公得李祐不肯誅便知元濟在掌股此詩當與黔安並驅也頃年僕在長沙相從彌年其他詩亦甚佳如云含風廣殿聞碁響度日長廊轉栁隂頗似文章巨公所作殊不類衲子又善作小詞情思婉約似秦少遊至如仲殊參寥雖名世皆不能及許彥周詩話城外土饅頭饀草在城裏一人吃一箇莫嫌沒滋味巳且為土饅頭尚誰食之今改預先著酒澆使教有滋味山谷王梵志余在臨川景德寺與謝無逸輩升閣得禪月所畫十八應真像甚竒而失苐五軸豫口占嘲之曰十八聲聞解唾根少叢林漢亂山門不知何處羅齋去不見雲堂苐五尊明日有女子來拜敘曰兒南營兵妻也寡而食素夜夢一僧來言曰我本景德僧因行失隊煩相引歸寺可乎既覺而鄰家邀飯入其門見壁間有畫異僧形像了然夢中所見也時朱世英守臨川異之使迎還閣藏之冷齋夜話元豐間嘗久旱𥙿陵禁中齋禱甚力一夕夢有僧乘馬馳空中口吐雲霧既覺而雨大作翌日中貴人道夢中所見物色於相國寺山門五百羅漢中至苐十三尊略倣佛即迎入內觀之正所夢也王丞相禹玉作喜雨詩云良弼為霖辜所望神僧吐霧應精求元參厚之云仙驥籋雲穿仗下佛花吹雨布天流蓋記此事相國寺羅漢本江南李氏時物在廬山東林寺曹翰下江州盡取其城中金帛寶貨連百餘舟私盜以歸無以為名乃取羅漢每舟載十許尊獻之詔因賜相國寺當時謂之押綱羅漢石林詩話魯直使豫對句云呵鏡雲遮月對曰啼粧露看花魯直罪豫於詩深刻見骨不務含蓄豫竟不曉此論冷齋夜話僧寶傳覺範所撰也但欲馳騁其文往往多失事實至于作贊又雜以詩句此豈史法示褒貶之意也哉其詩云行盡湘西十里松到門却立數諸峯崇公事迹無尋處庭下春泥見虎蹤又云廬山殿閣如生成食堂處處禪牀折我自三門如冷灰盡日長廊卷風葉又為竒語云如月照衆水波波頓見而月不分如春行萬國處處同時而春無迹但其才性競爽見於言語文字間若于禪門本分事則無之也苕溪漁隱前輩好稱僧悟清鳥歸花影動魚沒浪䀶圎以為句意皆新然余讀後梁沈君攸臨水詩云花落圎紋出風急細流翻乃知魚浪䀶圎之句出於此也復齋漫録泉州僧慶老有詩云交情老去淡如水病骨秋來瘦作松真方外語也詩説汪彥章龍溪集有霜餘溪上四絶癩可東溪集亦有霜餘溪上五絶內四絶即龍溪集中詩但一絶不是所謂故人江北江南岸者餘皆同之不知竟誰作邪四絶中其一云水似秋蛇巧作蟠山如濃翠擁髙鬟清風明月元無主乞我煙蘿茅數間味清駃可愛苕溪漁隱百家詩話總龜後集卷之四十三終
