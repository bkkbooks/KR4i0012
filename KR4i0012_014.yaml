front:
  text: 增修詩話總龜卷之十四
  hash: sha256:f54e06de0cbf02eaee1a2a9638ce42fd7d560e9e9d1cfcaf75fb5e21929961d9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_014-1a}
body:
  text: 警句門下石曼卿以詩酒豪爽得名嘗獨行京師倐有豪士揖曼卿語巳而曰公幸過我家曼卿語諾豪士顧從騎載曼卿同行入委巷前抵大第三四門乃至內堂庭户宏麗施設錦繡侍女珠翠延飲求曼卿書字曼卿醉後書其詩籌筆驛等數篇豪士甚珍愛之贈曼卿金帛可直數十百千使從騎送歸𥘉不知其誰何後日尋迷不省所居閭里人不能知他日復遇之塗又以金數十兩贈曼卿云籌筆驛詩意中流水逺愁外舊山青最佳歐陽詹乾德中獻野史授黃岡宰有詩行於世聞猿云啼猿非有恨行客自多悲聞笛云不知吹者意何似聽人心卧屏云橫琴遮逺洞舉手出高峰公宇蘆云漁家合得兩三莖公退徐吟思倍清官滿不將歸舊隱蕭蕭留與後人聽雅言雜載繆島雲少從浮屠詩尚竒險如拋芥子降顛狒狒折楊枝􅎈醉猩猩敻出前輩托言湖南日試萬言王璘與李群玉校書相遇于嶽麓寺群玉揖之曰公何許人日試萬言群玉曰與公聮句可乎璘曰惟子之命群玉破題授之曰芍藥花開菩薩面璘繼之曰棕櫚葉散夜義頭東坡云兒子邁幼嘗作林檎詩云熟果無風時自脫半窗迎日鬪先紅于等輩中亦號有思致者今巳老無他技但時出新句作酸棗尉有詩云葉隨流水歸何處牛載寒鴉過别村百斛明珠眉山矮道士李伯祥好為詩格亦不能高往往有竒語如夜過修行寺醉打老僧門皆可愛豫幼時學於道士張易簡觀中伯祥與易簡往來嘗歎曰此郎君貴人也不知何以知之同前狄煥南嶽石樓曉望云數點當秋霽不知何處峰題嶽路松云一嶂雨聲歸洞壑兩條翠色下瀟湘雅言系述曾弼長沙人依逸人王元為詩友宿玉泉寺云山偷半庭月池印一天星君山云翠壓魚龍窟寒堆波浪心蔣鈞字不器營道人與劉洞陳甫為詩友寄柳宣云因借夢書過竹寺學耕秋粟繞茆原戎昱詩有一夜不眠孤客耳主人門外有芭蕉鈞代答云芭蕉葉上無愁雨自是多情聽斷腸史虛白嵩洛人廖凝寄之詩曰飯僧春嶺蕨醒酒雪潭魚終於湓浦林楚才賀州冨川人贈致仕黃損詩云身間不恨辭官早詩好常甘得句遲陳甫字惟嶽吉水人贈黃岩云清時不作登龍客緑鬢間梳傍草堂漳江感懷云一雨洗殘暑萬家生早涼村居云暮鳥歸巢急寒牛下隴遲詩云算吟千百首方得兩三聮高元矩宣城人贈宣城宰云硯貯寒泉碧庭堆敗葉紅贈徐學士云鸞掠琴絃穿靜院吏收詩草下間庭楊鳬字舄之閩人山中即事云背日流泉生凍早逆風歸鳥入巢遲李平關右人讀武席內傳云龍髯巳斷嬪嬙老豹尾不來𡵨路長間書云至人無夢夢不到天道惡盈盈有餘曹嵩衡陽人題衡山尋仙觀云千年松引東陵鶴三級芝田草木香贈陳先生云讀太元經秋醮罷注參同契夜燈微經羅大夫故居云鹿眠荒圃寒蕪白鴉噪殘陽敗葉飛祕館以上巳日會西池王仲至有二詩張文潛和之最工云翠浪有聲黃帽動春風無力綵旗垂秦少遊云簾幕千家錦繡垂仲至笑曰此語又待入小石調也少遊有煩逸少書陳迹更屬相如賦上林之句諸人亦為難及山谷曰余作兩句云清鑑風流歸賀八飛揚跋扈付朱三未知可贈誰不能成章王直方詩話有以長韻詩上王仲至其一聮云狗監傳新賦雞林購近詩屬對頗工而終篇無若此者言辭鄙陋幾可絶倒豈所謂寸有所長耶舒王和人歌曲有暖字韻一篇余清老云更有一篇只記一句云夕陽到處花偏暖及嘗代一小兒賦花糕詩一絶恨不得見荆公在金陵嘗指壁上所題兩句云一水戽一云護田將緑繞兩山排闥送青來張塤字叔和謂余曰塤一日到洛中謁潞公方飯後坐于一亭亭邊皆蘭既見不交一談對坐幾時公方曰香來也叔和以為平生所未聞潞公云凡香嗅之則不佳須待其因風自至余始悟山谷詩云披拂不盈懷時有暗香度韓持國有云青煙人幾家緑野山四合當時無不傳誦東坡云參寥善絶句有云隔林倣佛聞機杼知有人家在翠微每為人誦後來黃州相聚半年京師故人以書相遺曰知有僧在彼非隔林倣佛聞機杼和尚耶僕謂參寥曰此吾師七字師號也梅聖俞在禮部考校時和歐陽文忠公春雪詩云有夢皆蝴蝶逢𫀆只紵麻用事如此乃可貴余愛張文潛過宋都詩云白頭青鬢有存沒落日斷霞無古今不減老杜山谷有光山道中雪詩云山㗸斗柄三星沒雪共月明千里寒都尉王晉卿足成鷓鴣天云才子隂風度逺關清愁曾向畫圖看山㗸斗柄三星沒雪共月明千里寒新路陌舊江干﨑嶇誰歎客程難臨風更聽昭華笛蔌蔌梅花滿地殘舒王與吳彥律云含風鴨緑鱗鱗起弄日鵝黃裊裊垂自云此幾凌轢造物張文潛謂余曰黃九云桃李春風一杯酒江湖夜雨十年燈真竒語並同前詩云千山送客東西路一樹照人南北枝王康功推官作牛丞相竒章公初為詩矜竒特語至有地瘦草叢短句明年秋卷成呈之曰有求色必赧慿酒意乃伸益加能矣明年乃上第因曰楊茂卿云河勢昆崘逺山形􅔽蓞秋此過華隂山下作初用蓮峰作􅔽蓞的當而暗盡矣劉禹錫佳話録蜀王建時楊義方能文詞為春日詩云海邊紅日半離水天外暖風輕到花贈王樞密云兩聲鞭自禁門出一簇人從天上來異聞録唐求劉郇伯有詩名唐求臨池洗硯詩云恰似有龍深處卧𬒳人驚起黑雲生又漸寒沙上路欲暝水邊村早行云沙上鳥猶睡渡頭人巳行詩思不出二百里間劉郇伯為范鄭郎中詩友范得句云歲盡天涯雨久而難對劉郇伯曰人生分外愁范賞之然老于新津之東渡非隱非吏二子亦可凌厲名埸而死丘樊所謂蜀人無志懷土正此也北夢瑣言余問山谷今之詩人誰為冠曰陳無巳其佳句可得聞乎曰吾見其作溫公挽辭一聮便知其才不可敵曰政雖隨日化身已要人扶盛次仲孔平仲同在館中雪夜論詩平仲曰當作不經人道語曰斜拖闕角龍千尺淡秣墻腰月半稜次仲曰甚佳其未大乃曰看來天地不知夜飛入園林總是春平仲乃服並同前舒王嘗寄蔣山元禪師詩曰不與物違真道廣每隨緣起自禪深冷齋夜話唱和門熙寧間𥘉作東西府望氣者云有天子氣及府成車駕果幸張掞以詩慶二府諸公荆公和云曾留上主經過迹更費髙人賦詠才倦遊録唐路德延有孩兒詩五十韻傳于世侍郎張公師錫次韻成老兒詩曰鬢髮盡皤然眉分白雪鮮周回延客話傴僂抱孫憐無病常供粥非寒亦衣綿假溫衾擁背借力杖搘肩貌比三峰老年過四皓仙喚方離枕上扶始到門前每愛烹山茗嘗嫌打石蓮耳聾如塞纊眼暗似籠煙宴坐羸扶几乘騎困嚲鞭頭搖如轉旋唇動若抽牽骨冷愁離火牙疼怯漱泉形骸將就木囊橐尚貪錢膠睫乾眵綴粘髭冷涕懸披裘腰懶繫濯手袖慵揎抬舉衣頻換扶持藥屢煎坐多茵易破行少履難穿喜婢裁裙布嗔妻買粉鈿房教深下幕床遣厚鋪氈琴聽憐三樂圖張笑七賢看經嫌字小敲磬喜聲圓食罷羮流𬒮杯餘酒帶涎樂來須遣罷醫到久相延褁帽縱模掠梳頭取次纒長吁思往事多感聽哀絃氣注腰還重風牽口更偏墓松先遣種志石預令鐫客到唯求藥僧來忽問禪飬茶懸土竈曝艾晒簷椽怒僕空睁眼嗔童謾握拳心驚嫌踘蹴腳軟怕鞦韆局縮同寒狖摧豗似餓鳶觀瞻多目眩舉動即頭旋女嫁求紅燭男婚乞彩箋巳聞頒几杖寧更佩韋弦賔客身非與兒孫事巳傳飬和屏作伴如意佛相連久棄登山屐惟存負郭田呻吟朝不樂展轉夜無眠呼稚臨床伴看書就枕邉冷懷疑貯水虛耳訝聞蟬束帛非無分安車信有緣伏生甘坐末綘老讓行先拘急將風夜昏沉欲雨天雞皮塵旋潰兒齒食頻填每憶居郎省常思釣渭川喜逢迎佛會羞赴賞花筵徑逺令移檻階危索減磚好生焚鳥網惡殺杵魚船既感桑榆日常嗟蒲柳年長思當弱冠悔不賸狂顛青箱雜記牛僧孺將赴舉時投贄于劉夢得對客展讀飛筆塗竄其文居三十年夢得守汝牛出鎮漢南枉道汝水駐旌信宿酒酣贈詩於夢得曰粉署為郎二十春向來名輩更無人休論世上升沉事且閗尊前見在身珠玉會應成咳唾山川猶覺露精神莫嫌恃酒輕言語曾把文章謁後塵夢得方悟往年改文卷之事和答云昔年曾忝漢朝臣晚歲空餘老病身𥘉見相如成賦日後為丞相倚門人追思往事咨嗟久幸喜清風語笑頻猶有當時舊冠劔待公三日拂埃塵古今詩話長慶二年王起自中書舍人知舉放進士周墀及第後同在翰林會昌三年起自僕射再放榜時周墀任華州因寄詩賀敘同在翰林日文場三化魯儒生二十餘年振重名曾忝木雞誇羽翼又陪金馬入蓬瀛雖欣月桂居先折更羡春蘭最後榮欲到龍門看風水關防不許暫離營答曰貢院離來二十霜誰知更忝主文場楊葉縱能穿舊的桂枝何必愛新香九重每憶同仙禁六藝初吟得夜光莫道相知不相見蓮峰之下有龔黃人以為絶唱廣卓異記韋中憲蟾廉問鄂州春日除祖筵上題文選兩句云悲莫悲兮生别離登山臨水送將歸以毫箋授賔從請續其句坐中悵望皆不屬有酒妓泫然曰某不知欲口占兩句乃曰武昌無限新開柳不見楊花撲面飛坐客嘉歎韋有贈聾僧詩云􅬗嶺東西煙靄合兩問茅屋一溪雲師云耳重誰解知師意人是人非不欲聞雅言雜載曹相確鎮浙西日會湖中郡判官王樞舉進士嚴惲詩曰春光苒苒歸何處更向花前把一杯盡日問花花不語為誰零落為誰開王仰其才調和曰花落花開人世夢衰榮間事且持杯春風底事輕搖落何似從來不要開同前龔頴自負文學少許可又談論多所折難知鼎州士罕造其門獨丁晉公贄文求見頴倒屣迎迓酬對終日至于忘食曰自唐韓柳後今得子矣翌日丁獻詩于頴頴次韻和酬曰膽怯何由戴鐡冠只緣昭代獎孤寒曲肱未遂違前志直指無聞是曠官三諌每傳朝客説五溪間憑郡樓看祝公早得文場雋况值天階正舞干青瑣雜記江西韋丹大夫與僧靈徹為忘形之契寄徹詩云王事紛紛無暇日浮生冉冉只如雲已為平子歸休計五老峰前必共論徹酬曰年老身間無外事麻衣草坐只容身相逢盡道休官去林下何曾見一人雲溪友議白中令鎮荆南杜藴常侍問長沙諸從事盧發致瞍焉發酒酣傲睨公少不懌因改著詞令曰十姓胡中第六胡也曾金闕掌洪爐少年從事誇門地莫向尊前喜氣粗盧答曰十姓胡中第六胡文章官職勝崔盧暫來關外分憂寄不稱賔筵語氣粗公極歡托言梅聖俞客歐陽晦夫使工畫茅庵已居其中一琴橫牀而已曹子方作詩四韻僕和云寂寞王子猷回船剡溪路超遙戴安道月夕誰與度倒披王恭氅半掩袁安户應調折弦琴自和撚鬚句百斛明珠東坡云余在廣陵與朝無咎曇秀道人同舟送客山光寺客去余醉卧舟中秀作詩云扁舟乘興到山光古寺臨流勝氣藏慚愧南風知我意吹將草木作天香豫和云閙裏清逰似隙光醉時真境發天藏夢回拾得吹來句十里南風草木香余昔對文忠公誦文與可詩云美人却扇坐羞落庭下花公曰此非與可詩世間元有此句與可拾得耳後五年秀來惠州見豫偶道其事直方詩話鄧洵美連山人乾祐二年中進士第與司空昉少保溥同年謁劉氏不禮歸武陵時周氏有其地且辟在幕府未幾司空氏自禁林出使武陵與洵美相遇贈詩曰憶昔詞場共著鞭當時鶯谷喜同遷關河契闊三千里音信稀踈二十年君遇巳知依玉帳我無才藻步花磚時情人事堪惆悵天外相逢一泫然洵美和云詞場幾度讓長鞭又向清朝賀九遷品秩雖然殊此日歲寒終不改當年馳名早巳超三院侍直仍欣步八磚今日相逢畨自愧間吟對酒倍潸然相國歸闕率偕載而辭以疾不行相國語同年少保公公時在黃閣洵美在武陵又為詩寄之云衡陽歸鴈别重湖䘖到同人一𥿄書忽見姓名雙淚落不知消息十年餘綵衣我已登黃閣白社君猶葺舊居南望荆門千里外暮雲重疊滿晴虛周氏疑洵美漏泄密謀急追捕易俗場官而遇害建隆初王師下湖湘相國復牧衡陽道經易俗場作詩弔曰十年衣染帝鄉塵蹤迹仍傳活計貧高掇桂枝曾遂志假拖藍綬至終身侯門寂寞非知巳澤國恓惶似旅人今已向公墳畔過不勝懷抱暗酸辛雅言系述山谷云金華俞清老名子中三十年前與豫共學于淮南元豐甲子相見于廣陵自云荆公欲使之脫縫掖著僧伽藜奉香火于半山宅寺所謂報寧禪院者豫之僧名紫琳字清老無妻之纍去作半山道人似為不難事然生龜脫筒亦難堪忍後數年見之儒冠自若因嘗戲和清老詩曰索索葉似雨月寒遙夜闌馬嘶車鳴鐸群動不遑安有人夢超俗去髮脫儒冠平明視清鏡政爾良獨難子瞻屢哦此詩以為妙直方詩話乾祐元年户部侍郎王仁𥙿放王溥狀元及第溥不數年拜相仁𥙿時為太子少保有詩賀曰一戰文埸拔趙旗便携金鼎贊無為白麻驟降恩何厚黃閣𥘉聞喜可知跋勑案前人到少築沙堤上馬行遲押班長幸遙相見親狎爭如未貴時溥和曰揮毫文戰偶搴旗待詔金華亦偶為白社遽當宗伯選赤心旋遇聖人知九霄得路榮雖極三接承恩出每遲職在台司多少暇親師不及舞雩時廣卓異記魯直使余對句曰呵鏡雲遮月對曰啼粧露著花魯直罪余於詩深刻見骨不務含蓄余竟不曉此論當有知者冷齋僧修詩話總龜卷之十四百家詩話總龜後集卷之十四評史門安祿山及永王璘有窺江左之意子蕩勸其取金陵史稱薛鏐李臺卿等為璘謀主而不及李白白傳止言永王璘辟為府僚璘起兵遂逃還彭澤審爾則白非深于璘者及觀白集有永王東巡歌十一首乃曰𥘉從雲夢開朱邸更取金陵作小山又云我王樓艦輕秦漢却似天皇欲度遼若非贊其逆謀則必無是語矣白既流夜郎有書懷詩云半夜水軍來潯陽滿旌􅏧空名適自誤迫脅上樓船從賜五百金棄之若浮煙辭官不受賞翻謫夜郎天宋中丞薦白啓云遇永王東巡脅行中道乃用白述懷意以收拭其過爾孔巢父亦為永王所辟巢父察其必敗潔身潛遁由是知名使白如巢父之計則安得有夜郎之謪哉老杜送巢父歸江東云巢父掉頭不肯往東將入海隨煙霧其序云兼呈李白恐不能無微意也黃常明唐穆宗時令狐楚為相為景陵使以傭錢獻羡餘怨聲係路致有衡州之貶觀發潭州寄李寧常侍詩云君今侍紫垣我已墮青天委廢從兹日旋歸在幾年又有答竇鞏中丞詩云何年相贈答却得在中臺亦可見其去國慘傷之情矣孔子曰苟患失之無所不至其楚之謂乎觀甘露之事則可見矣當是時也王涯等𬒳繫神䇿仇士良白涯與李訓謀逆將立鄭注楚時以舊相在闕下文宗召楚至帝對楚悲憤因付涯訊牒曰果涯書耶楚曰涯誠有謀罪應死嗚呼觀望腐夫閹人而誣置人于死地楚忍為之乎甘露野史乃言尚賴舊相令狐楚獨為辨眀若以史為證則野史之言未必公也杜牧之作李和鼎詩云鵩鳥飛來庚子直謫去日蝕辛卯年由來枉死賢才士消長相持勢自然蓋言鄭注事也方是時和鼎論注不可為相旋致貶謫故牧之作詩痛之如此議者謂辛卯年在憲宗之時而文宗時無辛卯也豈牧之誤乎余謂牧之所云非謂實庚子辛卯也鵩集于舍班固書庚子之日日有蝕之詩人有辛卯之詠借是事以眀李甘之冤尓杜牧之集有李給事詩二首其中有紛紜白晝驚千古鐡鎖朱殷幾一空之句謂鄭注甘露之事也又有可憐劉校尉曾訟石中書之句牧之自注云給事曾忤仇士良人遂以為給事者李石也余嘗考之李石雖嘗為給事然劾鄭注之事史所不載語言忤仇士良然亦在石拜相之後石既拜相則牧之詩題不應以給事為稱其非李石明矣當時唯有李中敏與牧之厚善嘗因旱欲乞斬注以申宋申錫之冤帝不省遂以病告歸頴陽令牧之有元禮去歸緱氏學之句牧之自注云因論鄭注告歸頴陽又史云注誅遷給事其后仇士良以開府蔭其子中敏曰內謁者安得有子士良慙恚由是復棄官去由是論之則是中敏無疑矣唐太和末閹尹恣橫天子以擁虛器為耻而元和逆黨未討帝欲夷絶其類李訓謂在位操權者皆碌碌獨鄭注可共事遂同心以謀巳而殺陳宏志于青泥驛相繼王守澄楊承和韋元素王踐言皆不保首領又斷崔潭峻之棺而鞭其尸剪除逆黨幾盡亦可謂壯矣意欲誅宦乃復河湟歸河朔諸鎮天子向之鄭注雖招權納賄然出節度隴右欲因王守澄之葬乘群宦臨送以鎮兵悉誅之謀亦未必不善會李訓先五日舉事遂成甘露之禍世以成敗論人物故訓注不得為忠至李德𥙿謂不可與徒隸齒亦太甚矣按唐史李甘與李中敏皆嘗論鄭注不可為相故甘有封州之謫而中敏有頴陽之歸杜牧之贈甘詩云太和八九年訓注極虓虎吾君不省覺二凶日威武喧喧皆傳言明辰相登注和鼎顧豫云我死有處所明日詔書下謪斥南荒去又有贈中敏詩云元禮去從緱氏學江充來見大臺宫曲突徙薪人不會海邉今作釣魚翁蓋深痛二公之言不行而訓注得恣其謀也蓋當是時仇士良竊國柄勢熖熏灼士大夫于議論之間不敢以訓注為是以賈殺身之禍故牧之之詩如此於乎東漢之季柄在宦官陳蕃之徒以忠勇之資謀殪其黨而事亦不遂史載其名殆如日星而訓注以當時士夫畏懾士良輩遂加以姦凶之目而史亦以為亂人萬世之下無以自白其深可痛惜哉家藏甘露野史三卷及乙卯記一卷二書之説特相矛盾甘露野史之言上令訓等誅宦官事覺反為所擒而乙卯記乃謂訓等有逆謀蓋甘露史出于朝廷公論而乙卯記附會士良之私情也乙卯記後有朱實跋尾數百言以乙卯所記為非是其説與野史同余故表而出之葛常之三良以身殉秦繆之葬黃鳥之詩哀之序詩者謂國人刺繆公以人從死則咎在秦繆而不在三良矣王仲宣云結髮事明君受恩良不訾臨殁要之死焉得不相隨陶元亮云厚恩固難忘君命安可違是皆不以三良之死為非也至李德𥙿則謂社稷死則死之不可許之死與梁丘據安陵君同譏則是罪三良之死非其所矣然君命之于前而衆驅之于後為三良者雖欲不死得乎唯柳子厚云疾病命固亂魏氏言有章從邪陷厥父吾欲討彼狂使康公能如魏顆不用亂命則豈至陷父于不義如此哉東坡和陶亦云顧命有治亂臣子得從違魏顆真孝愛三良安足希似與柳子之論合而過秦繆墓詩乃云繆公生不踈孟眀豈有死之日而忍用其良乃知三子徇公意亦如齊之二子從田橫則又言三良之殉非繆公之意也韋蘇州睢陽感懷詩有曰宿將降賊庭儒生獨全義宿將謂許逺儒生謂張巡也蓋當時物議以為巡死而逺就虜疑逺畏死而辭服于賊故應物云爾韓愈嘗有言曰逺誠畏死何苦守尺寸之地食其所愛之肉以與賊抗而不降乎斯言得矣巡死後賊將生致逺于偃師逺亦以不屈死則是逺亦終死賊也李義山詩云本為留侯慕赤松漢廷方識紫芝翁蕭何只解追韓信豈得虛當第一功是以蕭何功在張良下也王元之詩云紀信生降為沛公草荒孤壘想英風漢家青史緣何事却道蕭何第一功是以蕭何功在紀信下也余謂炎漢創業何為宗臣高祖設指縱之喻盡之矣他人豈容議耶盜殺武元衡也白樂天為京兆掾初非言責而請捕盜以必得為期時宰惡其出位坐賦新井篇逐之九江故因聞琵琶乃有天涯流落之感至於淚􅊜青衫之上何憊如此哉先文康公嘗有詩云平生趣操號安恬退亦恬然進不貪何事潯陽恨遷謫輕將清淚􅊜青衫又云及泉曾改莊公誓勝母終回曾子車素綆銀牀堪泪墮更能賦詠獨何如左太沖陶淵明皆有荆軻之詠太沖則曰雖無壯士節與世亦殊倫淵明則曰惜哉劍舞踈竒功遂不成是皆以成敗論人者也余謂荆軻功之不成不在荆軻而在秦舞陽不在秦舞陽而在燕太子舞陽之行軻固心疑其人不欲與之共事欲待他客與俱而太子督之不巳軻不得已遂去故羽歌悲愴自知功之不成巳而果膏刃秦庭當時固巳惜之然槩之于義雖得秦王之首于燕亦未能保終吉也故楊子云荆軻為丹奉于期之首燕督亢之圖入不測之秦實刺客之靡也焉可謂之義也可謂善論軻者漢文欲輕刑而反重議者以謂失本惠而傷吾仁故也或又咎帝短喪為傷于孝豫觀遺詔率皆言為巳損制未嘗使士庶皆短喪也厥後丞相翟方進與薛宣服母喪皆三十六日而除而顔師古注云漢制自文帝遺詔國家遵以為常則咎不在文帝矣而王荆公詩云輕刑死人衆喪短生者偷仁孝自此薄哀哉不能謀輕刑死人衆則固然矣短喪生者偷則似誣文帝也俱同上百家詩話總龜卷之十四
