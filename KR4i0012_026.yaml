front:
  text: 增修詩話總龜卷之二十六
  hash: sha256:8f800ab84dd74fc9693e9cbc36cda3c2fc7cb48b21101097209ec6be5479a6f7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_026-1a}
body:
  text: 寄贈門上吕文穆公蒙正嘗與溫恭肅仲舒及一友人忘其姓名讀書於洛陽龍門山誓不作狀元不仕及唱第文穆為狀頭溫巳不意然尚中甲科其友人隨拂衣歸隱後文穆大用太宗問昔與誰友文穆即以歸隱者對遂以著作郎召不起故文穆罷相歸洛作詩贈之曰昔作儒生謁貢闈今提相印出黃扉九重鴛鷺醉中别萬里煙霄逹了歸鄰叟盡垂新白髮故人猶著舊麻衣洛陽謾説多才子自嘆遭逢似我稀故人蓋指歸隱者也青箱雜記梁周翰太宗朝為館職真宗即位除知制誥柳開贈詩曰九重城闕新天子萬卷詩書老舍人古今詩話五代末濠梁人南楚材逰陳潁間潁守欲子妻之楚材巳娶薛氏以受潁守之恩遣人歸取琴書之屬似無還意薛氏善書畫能屬文自對鑑圖其形并作詩寄之曰欲下丹青筆先拈玉鑑端己驚顔寂寞漸覺鬢凋殘淚眼描將易愁腸寫出難恐君渾忘却時展畫圖看楚材見而慚焉與之偕老唐宋遺史韋應物為蘇州太守嘗有詩贈米嘉榮曰吹得涼州意外聲舊人惟有米嘉榮近來年少欺前輩好染髭鬚學後後生又嘗赴揚州司馬杜鴻漸宴醉宿驛亭醒見二佳人在側驚而問之乃曰郎中席上與司空詩因令樂妓侍寢問記其詩否一妓強記乃誦之曰高髻雲鬟宫樣粧春風一曲杜韋娘司空見慣渾間事斷盡蘇州刺史腸同前古今詩話劉夢得詩唐末士子崔郊姑有婢端麗郊竊愛之他日鬻婢于襄陽司空于頔得錢四十萬因寒食出遊婢見郊立于栁隂下郊因作詩隨以贈之曰公子王孫逐後塵緑珠重淚滴羅巾侯門一入深如海從此蕭郎是路人疾郊者録詩以示頔頔召郊執其手曰詩公所作也四十萬小哉何不早言因以婢贈之唐宋雷德遜有終父子二人並命為江南淮南漕王元之贈詩二首其一曰江南江北接王畿漕運帆檣去似飛父子有才同冨國君王無事免宵衣屏除姦吏魂應喪飬活疲民肉漸肥還有文場受恩客望塵情抱倍依依其二曰當時豪氣壓朱雲老作皇家諌諍臣章疏罷封無事日朝廷猶指直言人題詩野館光泉石講易秋堂動鬼神棘寺下僚叨末路齋心猶祝秉洪鈞元之嘗出德遜門下而德遜深于易酷于詩也青箱雜記樞密邵公堯謂余詩似樂天一日閲相藍書肆得馮瀛王詩集歸公與余語曰子詩似樂天又愛馮集將來拈取箇豁逹李老慶曆中京師有人號豁逹李老每好吟詩而詞多鄙俚以此戲之遂皆大笑熙寧中余辟定武帥幕公自鄆附所作詩一軸并寄余詩曰流年真似隙中駒别后情懷懶更踈天上又頒新曆日床頭未答故人書殷勤羔鴈功曹檄狼籍杯盤上客魚好在仲宣家萬里從軍苦樂定何如李文正昉吕正惠端同踐文館後皆登台輔李贈吕詩曰憶昔僦居明德坊官資俱是校書郎青衫共直昭文館白首同登政事堂佐國廟謨公巳展避賢榮路我猶妨主恩至重何時報老眼相看淚兩行並同前向文蕳敏中寇忠愍凖二相同以太平興國五年登第後文簡秉鈞忠愍以使相守長安文蕳作詩寄忠愍忠愍酬之曰玉殿登科四十年當時僚友盡英賢歲寒惟有公兼我白首猶持將相權唐宋遺史劉昌言泉州人常侍陳洪進為幕客入朝為副樞嘗作下第詩落句云唯有夜來蝴蝶夢翩翩飛入刺桐花後為商丘記室王元之贈詩曰年來復落事堪嗟載筆商丘鬢欲華酒好未陪紅杏宴詩狂多憶刺桐花蓋為是也同前錢塘林逋處士有高節范文正公贈詩曰巢由不願仕堯舜豈遺人風俗因公厚文章到老醇張乖崖公為布衣時與陳希夷善因夜話謂希夷曰欲分先生華山一半住得無希夷曰餘人不可先輩則可及旦相别希夷以宣和中筆一枝白雲臺墨一劑蜀箋一角贈之公曰會得先生意驅某入閙處去曰珍重珍重希夷送公回謂門弟子曰此人無情于物逹則為公卿不逹則為帝王師公嘗感之後尹蜀過華隂寄希夷詩曰性愚不肯林泉住強要清時擬致君今日星馳劍南去回頭慚愧華山雲曹修司封守邵武以竹簟贈僧仁曉并惠小詩曰翆筠織簟寄禪齋午夜秋從枕底來若也此時人問道寒天捲却暑天開並同前孟賔于湖湘連上人少修儒學好詩有百篇名金鰲集獻于李若虛侍郎因採集中佳句可取者記之于書使賔于馳詣洛陽獻諸朝廷其譽藹然明年春與李昉同擢進士苐後事李後主為滏陽令因抵法當死會昉遷翰林學士聞在縲絏以詩寄賔子曰初携書劍别湘潭金榜標名第十三昔日聲塵喧洛下近來詩價滿江南長為邑令情終屈縱處郎曹志未甘莫學馮唐便休去明君晚事未為慚主見其詩而宥之復官未幾歸老連上號群峯叟吉守馬致恭以詩送其末章云今日還家莫惆悵不同初上渡頭船江南野録雅言系述記吉守送賔于詩有全篇及賔于詩李頻方干高第也登第後干寄詩曰弟子已攀桂先生猶卧雲鑑戒録羅隱以諷刺之深久而不第劉贊贈之詩曰人皆言子屈我獨以為非明主既難謁青山何不歸年虛侵白鬢塵土汚麻衣自古逃名者至今名豈微隱見之遂起歸歟之興作五湖詩曰江頭日暖花又開江東行客思悠哉高陽酒徒半凋落終南山色空崔嵬聖代也知無棄物侯門未必用非才一船明月一竿竹家在五湖歸去來施肩吾贈邉將詩曰輕生奉國不為難戰苦身多舊箭瘢玉匣鎖龍鱗甲冷金鈴繫鶻羽毛寒皂貂擁出花當背白馬騎來月在鞍却恐犬戎臨虜塞柳營時把陳圖看杜荀鶴苦于詩有贈僧句云安禪不必須山水滅得心頭火自消又云利門名路兩何慿百歲風前短熖燈只恐為僧心不了為僧心了是輸僧翁承贊唐末為諌議大夫使福州至劍浦縣見舊識僧亞齊贈詩云蕭蕭風雨建陽溪溪畔維舟見亞齊一軸新詩劍潭北十年舊識華山西吟魂昔向江村老空性元知世路迷應笑乘軺青瑣客此時無暇聽猿啼唐陸希聲以雙鉤寫字法授僧辨光辨光入長安為翰林供奉而希聲尚未達以詩寄辨光曰筆下龍蛇似有神天池雷雨變逡巡寄言昔日不龜手應念江湖洴澼人辨光感其言薦希聲後至宰相並同前興國中潘若沖罷桂林經南嶽留鶴一隻與廖融贈詩一章云峭格數年同野興一官才罷共船歸稻梁少飼教長瘦羽翼無傷任逺飛側耳聽吟侵靜燭㗸花作舞帶斜暉朝天萬里不將去留伴高人向釣磯若沖到京授維揚通理臨行復有詩寄融曰曾經别墅住行蹤春浪和煙撼釣筒共步幽亭連石蘚寄眠靜榻帶松風秋來頻夢嶽雲白别后應添鶴頂紅又泛汴舟隨汴水不堪南望思忡忡後至維揚聞融與鶴相繼而亡若沖感而又為一絶云南嶽僧來共歎吁風亭月榭巳荒蕪先生去世未十日留伴高吟鶴亦徂融卒未久潘有泉陵之命經隱居有詩哭云天喪我良知無言雙淚垂惟求相見夢永絶寄來詩應有異人吊從茲雅道衰春風古原上新冢草離離雅言雜載杜羔妻劉氏善為詩羔纍舉不第將至家妻即先寄詩曰良人的的有竒才何事年年𬒳放回如今妾面羞君面君到來時近夜來羔見詩即時回去尋登第妻又寄詩云長安此去無多地欎欎蔥蔥佳氣浮良人得意正年正年少今夜醉眠何處樓南部新書張介以命術逰公卿門寓居錢塘西湖上嘗自京師南歸士大夫率為詩贈之吕許公王沂公時方執政亦皆有詩夏鄭公留守南京為詩繼二公曰上公詩筆千金重逋客歸裝一舸輕莫到青山更招隱且留明哲為蒼生鄭谷雪詩云亂飄僧舍茶煙􅊜密灑歌樓酒力微江上晚來堪畫處漁人披得一簑歸有假贊善善畫因采其詩為圖曲盡瀟灑之意持以贈谷谷為詩以謝之云贊善賢相後家藏名畫多留心于繪素得意在煙波屬興同吟詠功成更琢磨愛余風雪句幽絶寫漁簑古今詩話歐陽價攻傳神楊次公贈之詩曰國手曾煩寫幾回無人倣佛醉顔開青銅鑑裏尋常見不謂今從筆下來奉職劉祕亦贈詩曰筆妙今為第一人心期造化奪天真精神形骨從來一移入青縑推兩身古今詩話唐相鄭棨贈老僧詩曰日照西山雪老僧門未開凍瓶粘柱礎宿火隱爐灰童子病歸去鹿麑寒入來自云此詩可以衡稱重輕不偏也嘗有人問相國近有新詩否曰詩在灞橋風雪中驢子上此中安可得之同前王定保唐光化三年李渥侍郎下及苐吳子華侍郎臠為壻子華即世定保南逰湖湘無北歸意吳假緇服自長安來明日訪其良人白於馬武穆王令引見定保于定林寺吳隔簾誚之曰先侍郎重先輩以名行俾妾侍箕帚侍郎沒慮先輩以妾改適是以不逺千里來明侍郎之志定保不勝慚赧致書武穆乞為壻吳確乎不拔定保為盟畢世不婚矣吳歸吳中外家沈彬有詩贈定保云仙桂曾攀第一枝薄逰湘水阻佳期臯橋巳失齊眉願蕭寺行逢落髮師廢苑露寒蘭寂寞丹山雪斷鳯參差聞公巳有平生約謝絶女蘿依兔絲定保後為馬不禮奔五羊依劉氏官至卿郡閣雅談賈島為普州司倉方干寄詩曰亂山重復疊何路見先生豈料多才者空垂不第名間曹曾得醉薄俸亦勝耕莫問為詩苦年年芳草生鑑戒録稷山驛吏王金作吏五十六年稱有道術往來多贈篇什李義山有詩贈云過客不須詢歲代唯書乙亥與時人令狐綯自湖州刺史拜翰林學士因夜召對坐從容語及文宗大稱之由是眷遇有加未幾拜相因郊禋侍祠還趙嘏贈詩云鶚在卿雲氷在壺代天才業共訏謨榮同伊陟傳朱戶秀比王商入畫圖昨夜星辰回劍履前年風月落江湖自湖州入相才二年不知機務時多暇猶許詩家屬和無詩史李贊皇頗開寒素之路及南遷或人贈詩曰八百孤寒齊下淚一時南望李崕州徐鉉謫居舒州贈彭芮云賈生去國巳三年短褐間吟玩水邊終日野雲生砌下有時京信到門前無人與和投湘賦愧子來浮訪戴船醉裏新詩好歸去莫隨騷客賦林泉並同前陳文惠堯佐退居鄭下張退傳知西京以姚黃魏紫及酒惠文惠答詩曰有花無酒頭慵舉有酒無花眼倦開正向西園念蕭索洛陽花酒一時來雲齋廣録增修詩話總龜卷之二十六百家詩話總龜後集卷之二十六莭候門嶶宗宣和七年十二月二十一日敕睿謨殿張燈預賞元霄曲燕近臣命左丞王安中中書侍郎馮熙載為詩以進安中云上帝通明闕神霄廣愛天九光環日月五色麗雲煙紫袖開三極瓊璈列萬仙希夷塵境斷髣佛玉經傳妙道逄昌渾真王撫契賢龜圖規大壯龍位正純乾穹昊親無間皇居掇自然剛風同變化祥氣共陶甄層觀星潢上重闉斗柄邉摩空七雉峻冠嶠六鼇連夢想何嘗到階升信有緣昕朝初放仗密宴忽聞宣一清禁來鳴珮修廊入並肩獸鋪金半闔鵉障繡微褰霽景晉庭砌雷文繪桷梴宫簾波錦漾殿榜字金填花擁巍巍座香浮秩秩筵高呼稱萬億韶奏侍三千華歲推堯曆元璣候舜璿氷霜知臘後梅桞認春前造化應呈巧芳菲巳閗妍樛枝雕檻小多葉露桃鮮錯落飛杯斚鏘洋雜𬋩弦承雲歌歷歷回雪舞翩翩黼幄祥氛合銅壷永漏延鎬京方置醴羲馭自停鞭上聖情深渥諸臣意更虔宗藩親魯衛相芾拱閎顛側辨恩光浹中觴詔蹕旋寶熏携滿袖御果得加邊要賞嬉逰盛儀追步武遄騰身復道表送日夾城暖仰揖蒼龍象旁臨艮嶽顛謳歌紛廣陌簘鼓樂豐年赫奕攢輕幰珍奇集市廛博盧多袒跣飲肆兢蹁躚蕃衍開朱邸崔嵬照彩掾橋虹彎矗矗江練泮濺濺擊柝周廬晚張燈别院先餘霞搖綺暈列宿舍珠躔浩蕩三山島稜層十丈蓮再趨天北極却立榻東偏既用家人禮仍占聖製萹兕觥從酩酊蟾魄待嬋姢轉盻隨親指環觀得從穿曲屏江浪蹙巨柱赤虬纏光透垂枝井晶銜帶壁錢蕭臺千級峻重屋八窗全孰席花墩匝行樽紫袖楦交輝方爍爍起立復闐闐邃字會寧過中霄勝賞專鋪陳尤有韻清雅不相沿户箔明珠串欄缸水碧捲規模啇鉒欵識魯壷鎸秦曲移筝柱唐粧􅌂鬢蟬窄襟珠綴領高朵翠為鈿喜氣排寒沍輕颸洗靜便層琳籍璣組方鼎炷龍涎瑪瑙供􅐻大坡璃琢盞圓暖金傾小榼屑玉釀新泉帝子天才異英姿棣蕚聮顃看揮斗碗端是吸鯨川推食俱均逮攘餐及墜捐海螯初破殼江柱乍離淵寧𢾗披綿雀休論縮頸鯿南珍誇飣餖北饌厭烹煎賜橘懷頳卵酡顔釂寶船言歸荷慈惠末莭笑拘攣放鑰嚴扄啓籠紗逸足牽氷輪挂銀漢夜色映華韉人識重熙象功參獨斷權五辰今不忒六氣永無愆天紀承三古時雍變八埏比閭增板籍疆場罷戈鋋文軌包夷夏弦歌遍幅貟恢儒榮藻薦作士極魚鳶慶胄貽謀顯多男景福綿迓衡常穆穆遵路益平平亭障今踰隴耕耘久際燕信通鵬海漲威竄犬戎羶東擬封雲岱西將欵澗瀍琳科宣蕊笈玉府下雲軒帝籍勤初播宫蠶長自眠繭絲登六寢稃米秀中田廟鶴垂昭格壇光監吉蠲靈芝滋􅌲蠢井醴湧潺湲合教龎風革頒經衆疾痊雨隨親禱􅑙河避上流遷執契皇猷洽波圖福物駢太和輸槖籥妙用絶蹄筌此際君臣悅應先簡册編雅稱魚罩罩頌述鼓咽咽詎比千齡遇猶聞四始箋羇臣起韋布陋質愧駑鉛驟俾陪機政由來出眷憐恩方拜綸綍報未效塵涓密席叨臨勸凡蹤第曲拳雖無三峽水曽步八花磚渝望知難稱才慳合勉旃鈞天思盡賦賸續白雲箋熙載云化工𣣔放陽春到先教元冥戮衰草凝氷封地萬木僵誰向雪中探天巧璿璣星回斗指寅群芳未知時巳春人心蕩漾趂佳莭燈夕獨冠年華新升平萬里同文軌井邑相連通四裔蘭膏兢吐夜烘春和叔回車避羲轡巍巍九禁倚天開溫風更覺先春來試燈不用雨花落迎陽為却寒崔嵬宣和初載元冬尾瑞白才消塵不起穆清光賞屬欽鄰錦繡雲龍頒宴喜初聞傳詔開睿謨步障幾里承金鋪調音度曲三千女正似廣樂陳清都遏雲妙唱韓娥侣回雲飛花稱獨步千春蟠木效紅英獻夀當筵豈金母上林晚色煙藹輕景龍逰人歡笑聲霞裾月珮擁仙仗翠鳯挾輦趨平成銅華金掌散晶彩翠碧重重簇珠琲先從前殿望修廊日出綺霞紅滿海神光通透雲母屏􅌐龍出舞波濤驚煌煌黼座承天命座下錯落如明星榻前玉案真核旅獸炭銀爐夜初鼓憲天重屋訝雲屯崇道簫臺疑蜃吐前楹火柱回萬牛藺卿璧碎色光浮周圍照䊮眼界徹氷壺漾月生珠流點點金錢盡御璧豹髓騰輝粲銀礫絲篁人籟有機緘繳繹清音傳屋壁須臾隨蹕登會寧如驂鵉鶴逰紫清彩蟾倒影上浮空纎雲不點惟光明四壁垂簾玉銀缸吐艷相連屬棼楣橫帶碧玻璃一朵翠雲承曰轂萬光閃爍爭吐吞燭龍御耀輝四崑又如電母神鞭馳金蛇省壁不可捫端信竒工通造化豈比胡人能幻假丹青漫𢾗顧虎頭􅐻礴解衣催客寫此時揮麈帝御鈞天臺紫垣兩兩明三台尚方飲器萬金寶古玉未足誇雲雷帝旁侍女雲華品玉立仙標及時韻四音促柱泛笙簫應有翔鵉落千仞龍瓶㵼酒如流泉御厨絡繹紛珍鮮塌邊爭欲供天笑快倒頗類虹吸川厭厭夜飲方歡浹玉漏頻催鼓三疊金門初下醉歸時正見氷輪上城堞微臣去歲陪清班惡詩誤辱重曈觀小才易窮真鼠技再賦愈覺相如慳履道彥為二集中今不復印行故録于此同上荆楚記云屈原以五月五日投汨羅而死人傷之以舟擑拯焉故武陵競渡用五月五日蓋本諸此劉夢得云今舉楫相和之音皆曰何在蓋所以招屈原也詩曰湘江五月平堤流邑人相將浮采舟靈均何在歌巳矣哀謡振楫從此起又有招屈亭詩所謂曲終人散空愁暮招屈亭前水東注是也今江浙間兢渡多用春月疑非招屈之義及考沈佺期三月三日獨坐歡州詩云誰念招魂節翻為禦魅囚王績三月三日賦亦云新開避忌之席更作招魂之所則以上巳為招屈之時其必有所據也豫觀琴操云介子推五月五日焚林而死故是日不得發火而異苑以謂寒食始禁煙蓋當時五月五日以周正言之爾今用夏正乃三月也屈原以五月五日死而佺期王績以上巳為招魂之莭者亦豈是耶歲時有祓除不祥之具而元日尤多如桃版葦索磔雞之類是也飲屠蘇酒亦所以祓瘟攘惡而法必自幼飲何耶顧况歲日口號云還丹寂寞羞明鏡手把屠蘇先少年白樂天元日贈劉夢得詩亦云與君同甲子歲酒合誰先元日飲酒則先卑而後尊自唐以來巳如此矣四時月令云進椒酒次第當從小起而董勛告晉海西公云小者得歲故先酒賀之老者失歲故後與酒似亦不為無理並丹揚集先文康公晚歲卜居于寶溪之上建觀禊堂于水濵紹興癸丑與客泛舟修禊甚樂距永和癸丑不知其幾癸丑也因與客相與推算自永和九年歲甲子一周為晉義熙九年又一周為宋元徽元年自後梁大通五年隋開皇十三年唐永徽四年間開元元年大曆八年大和七年景福二年周顯德二年本朝祥符六年熙寧六年皆歲在癸丑凡七百八十年矣乃作詩以紀其事云快雨霽亭午晴曦作春妍鄰曲饒勝士共開浮棗筵中流愜嘨詠隱浪金壷偏紅芰初出水捧劍疑來前緬懷蘭亭會七百八十年可憐右軍癡生死情纏綿由來彭殤齊顧或謂不然吾黨殆天放卜夜孰𬋩弦尺六細腰女舞袖輕回旋且畢今日歡不期來者傳同上上已日于流水上洗濯祓除去宿垢故謂之祓禊禊者潔也王逸少作蘭亭記云永和九年歲在癸丑會于山隂之蘭亭修禊事也當其群賢畢集逰目騁懷之際而感慨係之乃有一死生為虛誕齊彭殤為妄作之語議者以此咎羲之之未逹也同上自冬至一百五日至寒食故世言寒食皆稱一百五杜子美一百五日夜對月云無家對寒食有泪如金波姚合寒食書事詩云今朝一百五出户雨初晴則是詩人例以百五日為寒食也或者乃謂自冬至至清明凡七氣至寒食一百三日殊不知曆家以餘分演之也司馬彪續漢書云介子推焚林而死故寒食不忍舉火至今有禁煙之説盧象所謂子推言避世山火遂焚身四海同寒食千秋為一人是也太原一郡舊俗禁煙一月周舉為郡守以人多死移書推秪禁煙三日子美清明詩云朝來新火起又家人鑽火用青楓皆在寒食三日之後則知禁煙止于三日也而韓翃有寒食即事詩乃云春城無處不飛花寒食東風御栁斜日暮漢宫傳臘燭青煙散入五侯家不待清明而巳傳新火何耶元微之連昌宫詞云初過寒食一百六店舍無煙宮樹緑念奴覔得又連催特敕宫中許然燭一百六在清明前寒食之後是時店舍巳無煙而宫中然燭乃一時之權冝爾或云龍星木之位也春屬東方心為大火懼火盛故禁火是以寒食有龍忌之禁則所謂禁堙又未必為子推設也同上百家詩話總龜後集卷之二十六
