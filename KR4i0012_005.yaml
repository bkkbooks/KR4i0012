  text: 增修詩話總龜卷第五
  hash: sha256:28f404bf1d9221bf637eb91b154e624ed4a18af472cef6a9de960d2c2ce08258
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_005-1a}
body:
  text: 自薦門曹武毅公翰江南歸環衛數年不調一日內宴侍臣皆賦詩翰以武人獨不預乃陳曰臣少亦學詩乞應詔太宗曰卿武人以刀字為韻因以寄意曰三十年前學六韜英名常得預時髦曽因國難披金甲不為家貧賣寶刀臂健尚嫌弓力軟眼明猶識陳雲高庭前昨夜秋風起羞見蟠花舊戰𫀆太宗為遷數官青箱雜記唐李義府初召見太宗令詠飛烏詩曰日裏揚朝彩琴中聞夜啼上林多少木不借一枝棲太宗曰我當全林借汝豈惜一枝耶左右羡之小説舊聞本朝知制誥待制止服皂鞓犀帶遷龍圖直學士始賜金帶燕肅為待制十年不遷作詩上時宰云鬢邊今日白腰下幾時黃遂遷直學士賜帶唐莊宗時禁旅王慶乞敘功賞曰侍從濟河日臣係第一隊入汴臣屬前鋒乞遷輔莊宗頷之他日又言亦不納莊宗好樂樂工子弟至有得官者謂慶曰子何不學我吹管稍稍能之亦不獲用後事李嗣源亦言其勞莊宗曰知慶薄有功但每見慶則心憤然安得更有賜與之意因舉唐太宗詩曰待余心肯日是汝命通時人主握天下生靈賞罰之柄若言如此則進退誠有命也翰府名談蘇麟為杭州屬縣巡檢范文正鎮錢塘城中兵官往往皆獲薦書獨麟在外邑未見收録因公事入府獻詩曰近水樓臺先得月向陽花木易逢春文正薦之同前禇載字厚之家至貧客梁宋間困甚以詩投襄陽節度使邢君牙云西風昨夜墜紅蘭一宿郵亭事萬般無地可耕歸不得有恩堪報死何難流年怕老看將老百計求安未得安一卷新書滿懷淚頻來門館訴飢寒君牙贈絹十匹薦于鄭滑辟攴使不行明年裴贄知貢舉君牙薦之擢第詩史胡恢坐法失官困于京師上韓魏公詩曰建業江山千里逺長安風雪一家寒得復官古今詩話南唐烈祖在徐溫家作燈詩云一點分明值萬金開時惟怕冷風侵主人若也勤挑撥敢向尊前不盡心同前伍喬張洎少相友善張為翰林學士眷寵優異伍為歙州通判作詩寄張戒去僕曰張逰宴時投之一日張與僚友近郊會燕歡甚僕投詩詩云不知何處好消憂公退携壺即上樓職事久參侯伯幕夢魂長繞帝王州黃山向晚盈軒翠黟水含春繞郡流遙想玉堂多暇日花時誰伴出城逰得詩動容久之為言于上召還為考功員外郎詩史孟賔于獻主司詩云那堪雨後更聞蟬溪隔重湖路七千憶昔故園楊栁岸全家送上渡頭船主司得詩自謂得賔于之晚當年中第興國中致仕歸連上過廬陵吉守贈詩曰曾聞洛浦綴神仙火樹南棲幾十年白首自欣丹桂在詩名巳得四方傳行隨秋渚將歸鴈吟傍梅花欲雪天今日還家莫惆悵不同初上渡頭船雅言系述孫集賢冕天禧中直史館幾三十年晚守蘇巳及引年大書詩于􅈦曰人生七十鬼為鄰已覺風光屬别人莫待朝廷差致仕早謀泉石養間身去年河北曽逢李今日淮西又見陳李見素陳莊皆差致仕寄語姑蘇孫太守也須抖擻舊精神題畢拂衣而往詔下公巳歸矣湘山録投獻門太宗棊品第一待詔有賈元者臻于絶格時人以為王積薪之比也楊希粲蔣元吉李應昌朱懷璧皆國手然非元之敵元嗜酒病死晚有李仲元年甚少棊絶勝可侔于元歲餘亦卒朝士有蔣居中潘慎修亦善棋至三品內侍陳好元四品多得侍棋自元而下皆受三道慎修受四道好元受五道慎修獻詩曰如今縱得仙翁術也怯君王四路饒談苑魏仲先獻寇萊公生日詩曰何時生上相明日是中元謂七月十四日又贈萊公詩曰有官居鼎鼐無宅起樓臺播傳漠北章聖朝北使至問那箇是無宅起樓臺相公萊公時方居散地因召還授北門管鑰青箱雜記杜荀鶴字彥之遇知于朱梁高祖送名春官于裴贄侍郎下第八人登科乃大順三年正月十日荀鶴生日也九華王希羽以詩獻曰金榜曉懸生世日玉書潛記上升時九華山色高千尺未必高于苐八枝洞微志沈彬高安人早有詩名先主鎮金陵知其欲代楊氏獻山水圖詩云須知手筆安排定不怕山河整頓難覽而喜之臨終指葬處以示家人穴之乃一冢未嘗葬人石燈臺上有􅃮燈一盞壙頭有一銅碑鐫篆文云佳城今已開雖開不葬埋􅃮燈猶未滅留待沈彬來江南野録李吉甫之父微時以一絶投維揚都護朱甄大夫朱殊無意李後生吉甫吉甫節判青州有舉子吳武陵詣府投刺並不禮之武陵遂書前詩以獻吉甫厚賂之請為寢默詩曰十處投人九處違家鄉萬里又空歸嚴霜昨夜侵人骨誰念高堂未授衣鑑誡録施肩吾上禮部陳侍郎詩曰九重城裏無親識八百人中獨姓施弱羽飛時攢箭險蹇驢行處薄氷危晴天欲照盆難及貧女如花鏡不知却向從來受恩地再求青律變寒枝同前錢穆尹天府遇生日楊次公作小詩并畫老子出關圖以獻曰祕藏幽谷關中子將獻蓬萊閣上仙願得鬚眉如此老却教龜鶴羡長年雲齋廣録戴思舉進士未第為江淮郡守所知因獻叢蘭閣環清池詩曰蘭榭環池景象融乍疑鼇背路才通雕籠雅句曹劉比畫鷁舟仙李郭同歌裊浦漁疑暮雨管吹湘竹怨秋風秉鈞從此朝天去難戀小山芳草叢答友人曰衡門聞道子猷來吟向蓬蒿興自回今日尚懷珍重意玉壺偏寄兩三杯吕申公鎮河陽府府屬投詩曰渭川重得吕嵩嶽再生申由是獲知洛陽詩話鮑當善為詩景德二年登進士第為河南法掾薛映尚書知府嘗失其意初甚怒之獻孤鴈詩云天寒稻粱少萬里孤難進不惜充君庖為帶邊城信薛大稱賞自是不復以掾屬之禮待時人謂之鮑孤鴈薛公暑月詣其舍當方露頂狼狽入易服把版而出忘其幞頭薛公嚴重左右莫敢言坐久之月上當顧見髮影大慚以公服袖掩頭而走司馬太師詩話平曾獻金陵牧薛大夫白馬詩曰白馬披絲練一團今朝被絆欲行難雪中放去惟留迹月下牽來只見鞍向北長鳴天外逺臨風斜墜耳邊寒自知毛骨還應異更請王郎仔細看特以獻詩為薛所留雲溪友議劇燕蒲坂人工為雅正詩王重榮鎮河中府燕投詩曰只向國門安四海不離鄉里拜三公榮禮重之為人縱誕多凌轢同輩果取正平之禍托言孫願唐正元之後三代為池陽刺史有戟門子朱元迎於道左獻詩曰昔日郎君今刺史朱元依舊守朱門今朝竹馬兒童子盡是當時竹馬孫郡閣雅談羅隱嘗以詩投鄭畋相國鄭有女喜詩什讀隱詩至張華謾出如丹語不及劉侯一𥿄書大愛其才隱一日至畋女於簾隙見其汚陋遂不復詠其詩鑑戒録令狐楚自翰林學士中書舍人拜相子綯自湖州召充翰林學士周嵗拜相渭南尉趙嘏獻詩云鶚在卿雲氷在壺代天材業奉訏謨榮同伊陟傳朱戶秀比王商入畫圖昨夜星辰回劍履前年風月滿江湖不知機務時多暇猶許詩家屬和無廣卓異記及見寄贈門吳士矩牧大郡因時相論置軍倅飲後獻詩曰一夕心期一種歡那知踈散負杯盤尊前數片朝雲在不許馮公仔細看南部新書吕許公一日有張球獻詩云近日厨中乏短供孩兒啼哭飯蘿空母因低語告兒道爺有新詩謁相公公以俸錢百緡遺之青瑣集評論門上白樂天詩云無事日月長不羈天地闊此逹者之詞也孟東野詩曰出門即有礙誰謂天地寬此𥚹狹者之詞然則天地何嘗礙郊自礙耳青箱雜記袁夏過永見何仙始曰吾鄉有故人亭全亦有故人亭何是非也仙曰此亭名因選詩有洞庭值歸客瀟湘逢故人而得之彼亭非也仙作詩曰全永從來稱舊郡瀟湘源上構軒新門前自古有流水亭上如今無故人風細日斜南楚晚鳥啼花落東湘春因公問我昔日事江左亭名不是真托遺歐陽文忠曰詩原乎心者也冨貴愁怨見乎所處江南李氏據冨有詩曰簾日巳高三丈透佳人次苐添香獸紅錦地衣隨步皺佳人舞徹金叉溜酒渥時拈花蕊嗅别殿微聞簫鼓奏與時挑野菜和根煮旋斫生柴帶葉燒異矣托遺刺史縣令故事尤多士子以詩投獻難得佳句方諤有上廣州太守詩曰鰐去惡溪韓吏部珠還合浦孟嘗君雖善用故事議者未許贈邑令詩云琴彈永日得古意印鎖經秋生蘚痕句雖佳但印上不是生蘚處不若雨後有人耕緑野月明無犬吠花村意清句雅又見令之教化仁愛民樂於豐年之耕耨且無盜賊之警不見治術之迹翰府名談劉夢得有望洞庭詩雍陶有詠君山詩語意異同劉詩曰湖光秋月兩相和潭面無風鑑似磨遙望洞庭山水色白銀盤裏一青螺雍詩曰煙波不動影沉沉碧色全無翠色深疑是水仙梳洗罷一螺青髻鑑中心李山甫秦韜玉皆有貧女吟意亦相類李詩曰平生不識繡衣裳間把金針亦自傷鑑裏只應諳素貌人間多是信紅粧當年未嫁還憂老終日求媒即道狂兩意定知無説處暗垂珠淚滳𧖟箱秦詩曰蓬門未識綺羅香擬托良媒益自傷誰愛風流高格調共誇時世儉梳粧敢將十指誇􅊏巧不把雙眉鬪畫長最恨年年厭針線為他人作嫁衣裳李山甫又有石頭城故事韋莊有詠南國英雄用意亦同李詩曰南朝諸國愛風流盡守江山不到頭總是戰爭收拾得却因歌舞破除休堯將道德終無敵秦把金湯可自由試問繁華何處有雨莎煙草石城秋韋詩曰南朝三十六英雄各逐興亡自此中有國有家皆是夢為龍為虎亦成空殘花舊宅悲江令落日青山弔謝公事竟霸圖何物在石麒麟沒卧秋風王維摩詰雲母帳子胡令能繡障亦佳句王詩曰君家雲母帳持向野庭開自有山泉入非關彩筆來胡詩曰白日堂前花蕊嬌爭携小筆上牀描繡成挂向春園裏引得黃鷩下柳條李紳鄭雲叟傷農詩意亦皆同李詩曰鋤禾日當午汗滳禾下土誰知盤中飱粒粒皆辛苦鄭詩曰一粒紅稻飯幾滳牛頷血珊瑚枝下人㗸杯吐不歇鑑戒録詩之作也窮通之分可觀王建詩寒碎故仕終不顯李洞詩窮悴故竟下第韋莊詩壯故至台輔何贊詩愁未幾而卒王建寄賈島曰盡日吟詩坐忍飢萬人中覔似公希僮眠冷榻朝猶卧驢放秋田夜不歸旁暖旋收紅落葉覺寒猶著舊生衣曲江池畔時時到為愛鸕鷀雨裏飛李洞上曹郎中曰間坊宅枕穿宫水聽水分衾盡蜀僧藥杵聲中搗殘夢茶鐺影裏煮孤燈刑曹樹蔭千年井華嶽樓開萬里氷詩句變風官漸緊夜濤春盡海邊騰韋莊感懷曰長年方悟少年非人道新詩勝舊詩十畝野塘留客釣一軒春雨對僧棋花間醉任黃鸝語池上吟從白鷺窺大道不將爐冶去有心重立太平基何贊書事云果決生涯向洛中西投知巳話恩容雲遮劍閣三千里水隔瞿塘十二峰闊步文翁坊裏月間尋杜甫宅邊松到頭須卜林泉隱自愧無能繼卧龍鑑戒録王建宫詞黃帕蓋鞍呈了馬紅羅纒項鬪回雞晏元獻改呈了馬鬪雞回為順語詩史晚唐人詩多少巧無風騷氣味如崔魯山鶴詩云一林寒雨吹巢冷半朵山花咽觜香張林池上云菱葉乍翻人採後荇花初沒舸行時蓮花云何人解把無塵袖盛取清香盡日憐皆浮艷無足尚而昔人愛重佳作詩史沈存中謂樂天詩不必皆好然識趣可尚章子厚謂不然樂天識趣最淺狹謂詩中言甘露事處幾如幸災雖私讎可快然朝廷當此不幸臣子不當形歌詠也如當公白首同歸日是我青山獨往時之類盧延遜詩自為容易如每過私第邀看鶴長著公裳送上驢高僧解語牙無水老鶴能飛骨有風此等之語其殆庶幾又如栗爆燒氊破貓跳觸鼎翻而楊文公愛之不知何謂詩史江淹云蝴蝶飛南園李白云春園緑花蝴蝶飛語意相似聶夷中河南人有詩曰二月賣新絲五月糶新榖醫得眼前瘡剜却心頭肉孫光憲謂有三百篇之旨此亦為詩史詩史梅聖俞愛嚴維詩有柳塘春水慢花䲧夕陽遲善矣夕陽遲固繫花而春水慢不繫柳也如杜詩空山催短景喬木易高風此了無瑕纇又曰蕭條九州內人少虎狼多人少慎莫投多信虎所過飢有易子食獸猶畏虞羅如此等句含蓄深矣殆不可模倣古今詩話凡詩以意義為主文詞次之退之古詩高卓至律詩雖可稱善要之未有工者有云老翁真箇似童兒汲井埋盆作小池此直諧語耳永叔江鄰幾評退之隨車翻縞帶逐馬散銀杯為工而謂凹中𥘉蓋底凸處遂成堆為勝未知真得意否杜子美詩云紅豆啄餘鸚鵡粒碧梧棲老鳯鳯枝此語反而意竒退之詩云舞鑑鸞窺沼行天馬度橋亦效此體古今詩話退之城南聮句云竹影金鎖碎乃日光非竹影也唐人作富貴詩多紀其奉養服器之盛乃貧眼所驚耳如貫休云刻成筝柱鴈相挨此下里鬻彈者皆有之韋楚老云十幅紅綃圍夜十幅紅綃為幬不及四五尺如何伸尺所謂不曽近冨家兒楊大年不喜杜子美詩謂之村夫子有鄉人以子美詩強大年不服因曰公試為我續江漢思歸客一句大年亦為屬對鄉人曰乾坤一腐儒大年似少屈李習之詩稱東野詩食薺腸亦苦強歌聲無歡出門即有礙誰謂天地寬可謂知音矣今世傳郊詩五卷百餘篇又有咸池集三百篇其語句尤多蹇澀疑前五卷曽經名士刪改也張文昌謝裴司空馬詩云乍離華廄疑蹄澀初到貧家舉眼驚乃一遲鈍不能行多驚馬也詩人之辭微而顯亦少其比古人有風定花猶落之句無人能對舒王對以鳥鳴山更幽本宋王籍詩元對蟬噪林逾靜鳥鳴山更幽上下句只是一意若對風定花猶落則上句靜中有動下句動中有靜同前劉夢得每吟張籍詩云新酒欲開期好客朝衣才脫見間身又王維詩云興闌啼鳥喚坐久落花多嘗言樂天苦好余秋水咏曰東屯滄海闊南漾洞庭寬又石頭城下作云山圍故國周遭在潮打空城寂寞回自知不及韋蘇州春潮帶雨晚來急野渡無人舟自橫又杜少陵過洞庭詩云白蘋愁殺白頭人鄙夫之言亦愧杜公劉夢得言茱茰更三詩人道之而有能否杜子美云醉把茱茰子細看王右丞云遍插茱茰少一人朱倣云學他年少插茱茰子美為優同前劉夢得曰柳八駁韓十八平淮西碑云左餐右粥何如我平淮西雅之云仰父撫子柳云韓碑兼有帽子使我為之便説用兵伐叛矣劉曰韓碑劉雅豫為詩云城中早雞喔喔鳴城頭鼓角聲和平美李訴入蔡賊無覺者落句云始知元和十二載四海重見升平時言十二載以見平淮西之年劉夢得云為詩用僻字須有來處朱考功云馬上逢寒食春來不見餳嘗疑之吾重陽欲押一糕字思索六經無糕字遂不敢為之嘗訝老杜詩有巨顙拆老拳無出處及讀石勒傳云卿既遭孤老拳孤亦遭卿毒手豈虛言哉毗陵士人李氏有女十六歲能詩有破錢詩云半輪殘月掩塵埃依稀猶有開元字想得清光未破時買盡人間不平事又彈琴詩云昔年剛笑卓文君豈信絲桐解悮身今日未彈心巳亂此心元自不由人雖有情致非女子所冝崔護作城南詩其始云去年今日此門中人面桃花相映紅人面不知何處去桃花依舊笑春風以意未完謂未工改云人面秪今何處在至今所傳有兩本惟本事詩云抵今何處在唐人工詩大率如此雖重一今字不恤也俱同前增修詩話總龜卷之五百家詩話總龜後集卷之五仁愛門孟子七篇論君與民者居半其餘欲得君蓋以安民也觀杜陵窮年憂黎元歎息腸內熱胡為將暮年憂世心力弱宿花石戍云誰能扣君門下令減征賦寄相學士云幾時髙議排金門各使蒼生有環堵寧令吾廬獨破受凍死亦足而志在大庇天下寒士其仁心廣大異夫求穴之螻蟻輩真得孟子所存矣東坡問老杜何如人或言似司馬遷但能名其詩耳愚謂老杜似孟子蓋原其心也䂬溪韋蘇州云身多疾病思田里邑有流亡愧俸錢郡中燕集云自慚居處崇未覩兹民康余謂君子當切切作此語彼有一意供租專事土木而視民如讎者得無愧此詩乎同上賈生終童欲輕事征伐大抵少年躁鋭使經歷老成當不如此昔人欲沉孫武於五湖斬白起於長平誠有謂哉嘗愛老杜云慎勿吞清海無勞問越裳大君先息戰歸馬華山陽又有安得壯士挽天河淨洗甲兵長不用安得務農息戰閗普天無吏橫索錢願戒兵猶火恩加四海深不眠憂戰伐無力正乾坤其愁歉憂戚蓋以人主生靈為念孟子以善言陳戰為大罪我戰必克為民賊仁人之心易地皆然黃常明臨川云黃雀百頭顱長行萬里餘因君令出守暫得免苞苴使能行此言則虐生類以飽口腹刻疲民以肥權勢者寡矣其詩才二十字耳崇仁愛抑奔競皆具焉何以多為杜云築埸憐穴蟻拾穗許村童人謂有仁愛民物意臨川詠促織云只向貧家促機杼幾家能有一鈎絲愚謂世之嚴督征賦不恤疲瘵之有無者雖魁然其形實微蟲智爾䂬溪元結刺道州承兵賊之後徴率煩重民不堪命作春陵行其末云何人采國風吾𣣔獻此詩以傳考之結以人困甚不忍加賦嘗奏免稅租及和市雜物十三萬緡又奏免租庸十餘萬緡因之流亡盡歸乃知賢者所存不特空言而巳丹陽集范文正淮上遇風云一棹危於葉旁觀欲損神他年在平地無忽險中人雖弄翰戲語卒然而作險濟加澤之心未嘗忘也黃常明元道州㫪陵行云所願見王官撫飬以惠慈奈何重驅逐不使存活為逋緩違詔令蒙責願所冝亦云守官貴守道不愛能適時賊退示官吏云使臣將王命豈不如賊焉令𬒳徴斂者迫之如火煎誰知絶人命以作時世賢子美志之曰令盜賊未息知民疾苦得結輩十數人為邦伯萬姓氣吐天下少安立可待巳余謂漫叟所以能然者先民後已輕官爵重人命故也觀其石魚詩云金魚吾不須軒冕吾不愛此所以能不徇權勢而專務愛民也杜乃知正人意不苟飛長纓可謂相知深矣同上友義門蘇武李陵在武帝時同為侍中金蘭之義素篤武拘於胸奴明年而陵始降雖逆順之勢殊悲􅌚之情異然朋友之誼此心常炯炯也觀陵海上勸武使降之言非不切至而武之所以告陵者不過明吾忠義之心而已而未嘗一語及陵之叛若告衛律者則不然盡辭詬詈歸之於不忠不臣之科而此以莭義臨之幾使惡死此亦可以見於陵厚矣後武得歸陵置酒賀武曰今足下還歸揚名於胸奴功顯於漢室雖古竹帛所載丹青所畫何以過子卿故李太白蘇武詩云渴飲月窟水飢餐天上雪東還沙塞逺北愴河梁别泣把李陵衣相淚成血蓋亦是意語爾韻語陽秋石林詩話元豐間東坡繫獄神宗本無意罪之時相因舉軾檜詩根到九泉無曲處歲寒惟有蟄龍知且云龍飛在天軾以為不知已而求知地下之蟄龍非不臣何得章子厚從而解之遂薄其罪而王㝎國見聞録云東坡在黃州時上欲復用王禹玉以歲寒惟有蟄龍知激怒上意章子厚力解遂釋子觀東坡自獄中出與章子厚書云某所以得罪其過惡未易一二數平時惟子厚與子由極口見戒反復甚苦某強狼自不以為然又云異時相識但過相稱譽以成吾過一旦有患難無復相哀惜唯子厚平居遺我以藥石及困急又有以救恤之真與世異矣則知坡繫獄時子厚救解之力為多石林詩話不妄也陽秋東坡歸陽羡時流離顛躓之餘絶祿巳數年受梁吉老十絹百絲之可見非有餘者李憲仲之子豸以四喪未舉而見公則盡以贈之且贈以詩曰推衣贈孝子一溉滋湯旱誰能脫左驂大事不可緩章季默三喪未葬亦求於公公亦以助之有不辭毛粟施行自丘山積之句其髙蓋出於天資矣同上幼敏門西清詩話云魯直少警悟八歲能作詩送人赴舉云送君歸去明主前若問舊時黃庭堅謫在人間今八年此以非髫稚語矣桐江詩話云山谷七歲作牧童詩云騎牛逺逺過前村吹笛風斜隔隴聞多少長安名利客機關用盡不如君林傑幼而聰惠言發成文質瑩凝脂音清扣玉六聚群書又妙于手談當時名公多與之交及有是子益大其門亷使崔侍郎手與之遷聀詞云家藏萬卷學富三冬傑五歲父因挈行云云後業詞賦頗振聲光有仙客入壼中賦云仙客以變化隨逍遙放情處於外則一壼斯在入其中則萬象皆呈飛閣重樓不是人間之狀竒花異木無非物外之名至九歲謁大夫盧貟常侍黎埴無不嘉奬尋就賔薦日在宴筵侍御李逺支使趙格深所知仰不捨斯須和趙支使詠荔枝尤佳云金盤摘下排朱顆紅壳開時飲玉漿副使鄭立竒童傳制使劉潼序以貽之閩川名士傳王元之年七八歲已能文畢文蕳公為郡從事始知之問其家以磨麵為生因令作磨詩元之不思以對但存心裏正無愁眼下遲若人輕著力便是轉身時文蕳大竒之嘗于子弟中講學一日太守席上出詩句鸚鵡能言爭似鳯坐客皆未有對文蕳寫之屏間元之書其下蜘蛛雖巧不如蠶文蕳歎息曰經綸之才也遂加以衣冠呼為小友至文蕳入相元之已掌書命矣聞見録後志氣門蔡寬天詩話云太白之從永王璘世頗疑之唐書載其事甚略亦不為明辨其是否獨其詩自序云夜半水軍來潯陽滿旌旃空名適自誤迫脅上樓船從賜五百金棄之若浮煙辭官不受賞翻謫夜郎天然太白豈從人為亂者哉蓋其學本出從橫以氣俠自任當中原擾攘時𣣔藉之以立竒功耳故其巡歌有但用東山謝安石為君談笑靜胡沙之句至其卒章乃云南風一掃胡塵靜西入長安到日邊亦可見其志矣大抵才髙意廣如孔北海之徒固未必有成功而知人料事尤其所難議者或責以璘之猖獗而欲仰以立事不能如孔巢父蕭頴士察於未萌斯可矣若其志亦可哀巳蘇子由云李白詩類其為人俊發豪放華而不實好事喜名不知義之所在也語用兵則先登陷陳不以為難語遊俠則白晝殺人不以為非此豈其誠能也白始以詩酒奉事明皇遇讒而去所至不改其舊永王將據江淮白起而從之不疑遂以放死今觀其詩固然唐詩人李杜稱首今其詩皆在杜甫有好義之心白所不及也漢髙祖歸豐沛作歌曰大風起兮雲飛揚威加海內兮歸故鄉安得猛士兮守四方髙帝豈以文字髙丗者帝王之度固然發於中而不自知也白詩反之曰但歌大風雲飛揚安得猛士守四方其不識理如此老杜贈白詩有重與細論文之句謂此類也髙齋詩話云荆公題金陵此君亭詩云誰憐直節生來瘦自許髙才老更剛賔客每對公稱頌此句公輒顰蹙不樂晚年與平甫坐亭上視詩牌曰少時作此題榜一傳不可追改大抵少年題詩可以為戒平甫曰此楊子雲所以悔其少作也石林詩話云荆公以意氣自許故詩語惟其所向不復更為涵蓄如天下蒼生待霖雨不知龍向此中蟠又濃緣萬枝紅一點動人春色不須多又平治險穢非無力潤澤焦枯是有才之類皆直道其胸中事後為郡牧判官從宋次道盡假唐人詩集慱觀而約取晚年始盡深婉不迫之意乃知文字雖工拙有定限然必視其幼壯雖公方其未至亦不能力強而遽至也石林詩話云蘇明允至和間京師既為歐陽文忠公所知其名翕然韓忠獻諸公皆待以上客嘗遇重陽忠獻置酒私苐惟文忠與一二執政而明允乃以布衣參其間都人以為異禮席間意氣兀不少衰明允詩不多見然精深有味語不徒發正類其文而讀易詩云誰為善相應嫌瘦後有知音可發彈婉而不迫哀而不傷所作自不必多也述志門余嘗官展嘗借詩集於士人中有小篇序云成都陽天慶中進士葉沆作止百篇時有可觀如間居感懷云身間難報國語直易傷時村墅云夜庭和月掃秋户拂雲開亦可想見其胸襟也和靖與士夫詩未嘗不及遷擢與學子詩未嘗不言登第視此為何等隨緣應接不為苟難亢絶如此老杜云夲無軒冕意不是傲當時鍾鼎山林各天性濁醪粗飰任吾年道義重而輕王公者也阮孝緒南平王要之不赴曰非志驕冨貴但性長廟堂使麏麚可驂何異驥騄求意門復齋漫録云書當快意讀易盡客有可人期不來世事相違每如此好懷百歲幾回開其後又寄黃充前四句云俗子推不去可人廢招呼世事每如此我生亦何娛蓋無已得意故兩見之胡氏評詩曰魯直過平輿懷李子克詩世上豈無千里馬人中難得九方皋題徐孺子祠堂詩白屋可能無孺子黃金不是欠陳蕃二詩命意絶相似蓋歎知音者難得耳苕溪漁隱曰錫宴明日絶句云宴罷回來曰欲斜平康坊裏那人家幾多紅袖迎門笑爭乞叉頭利市花清明日絶句云無花無酒過清明興味都來似野僧昨日鄰家乞新火曉窗分與讀書燈二詩何况味不同如此亦可見其老少情懷之異也胡氏評詩曰澶淵之役王介甫以謂丞相萊公功第一張文潛以為可能功業盡萊公大抵人之議論各有所見故尓不同今具載二詩識者當能辨之介甫澶州詩云去都二百四十里河流中間兩城峙南城草上不受兵北城樓櫓如邉城城中老人為豫語契丹此地經鈔虜黃屋親矢石間胡馬飲踏河氷渡天發一矢胡無酋河氷亦破沙水流歡盟從此至今日丞相萊公功第一文潛聽客話澶淵事詩云憶昔胡來動河朔黃河飲馬吹胡角澶淵城下氷載車邉風蕭蕭千里賖城上黃旗坐真主夜遣六丁張猛弩雷驚電發一矢飛橫射胡酋貫車柱犬羊無蹤大漠空歸來封禪告成功自是乾坤扶聖主可能功業盡萊公談苑曰余知制誥曰與余恕同考試恕曰夙昔師範徐騎省為文騎省其有徐孺子亭記其警句云平湖千畝凝碧乎其下西山萬疊倒影乎其中他皆常語近得舍人所涵虛閣記終篇皆竒語自渡江來未嘗見此信一代之雄文也其相推如此因出義山詩共讀酷愛一絶云珠箔輕明拂玉墀披香新殿閗腰支不須看盡魚龍戲終遣君王怒偃師擊節稱嘆曰古人措辝寓意如此之深妙令人感慨不巳百家詩話總龜後集卷之五終
