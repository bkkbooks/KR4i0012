  - {type: variant, offset: 1936, length: 0, content: '', WYG: 所遇穿墉何卑㣲託此得佳譽其步驟氣格殊有父風之類也復齋漫録云東坡論子厚詩盛時一失貴反賤桃笙葵扇安可常不知桃笙為何物偶閲方言簟宋魏之間謂之笙乃悟桃笙以桃竹為簟也余按唐萬年尉叚公路北方録云瓊州出紅藤簞方言謂之笙或曰籧篨亦曰行唐沈約奏彈歙令仲文秀恣横云令吏輸六尺笙四十領何東坡忘此邪苕溪漁隱曰劉夢得詩香風蕙塵尾月露濡桃笙詩話總龜後集巻四十九欽定四庫全書詩話總龜後集巻五十宋阮閲撰技藝門東坡與子由論書云吾雖不善書曉書莫如我茍能通其意常謂不學可故其子叔黨䟦公書云吾先君子豈以書自名哉特以其至大至剛之氣發於胷中而應之於手故不見其有刻畫嫵媚之態而端乎章甫若有不可犯之色少年喜二王書晩乃喜顔平原故時有二家風氣俗子不知妄謂學徐浩陋矣觀此則知初未嘗規規然出於翰墨積習也葛常之唐令狐相進李遠為杭州宣宗曰聞李遠云長日惟消一局棋豈可使治郡哉對曰詩人之言不足有實也乃薦遠亷察可任此正說詩者不以辭害志也䂬溪房千里作骰子選格序云以六骰䨇䨇為戱以數多少為進身官職之序而乃條其選黜之目焉坡以流俗狂惑經營倘來惴惴惟恐後於他人何異擲骰者心動於中而色形於外也欲求勝人者哉王逢原彩選詩云卒無及物效徒有高人氣昏昏忘其大擾擾爭其細其理信然黄常明裴度平淮西絶世之功也韓愈平淮西碑絶世之文也非裴之功不足以當韓之文非韓之文不足以發裴之功碑成李愬之子乃謂没父之功訟之於朝憲宗使叚文昌别作此與捨周鼎而寶康瓠何異哉李義山詩云碑髙三丈字如手負以靈鰲蟠以螭句竒語重喻者少䜛之天子言其私長繩百尺拽碑倒粗砂大石相摩治公之斯文若元氣先時已入人肝脾愈書愬曰十月壬申愬用所得賊將夜自文城因天大雪疾馳百二十里到蔡取元濟以獻文昌所謂郊雲晦㝠寒可墮指一夕巻斾凌辰破關等語豈不相萬萬哉東坡先王責官過舊馹壁間見有人題一詩云淮西功業冠吾唐吏部文章日月光千古斷碑人膾炙世間誰數叚文昌坡喜而録之同上陸希聲隱居宜興君陽山今金沙寺其故他宅也自著君陽山記叙其景物亭舘如輞川上可得其彷彿初僧􅈯光從希聲授筆法繼以善書得幸於昭宗希聲祈使授已以詩寄之云筆下龍蛇似有神天池雷雨變逡廵寄言昔日不龜手應念江湖洴澼人遂得召隱操盖不足觀也嘗著易傳十巻觀其自序以謂夣在大河之陽有三人偃卧東首上伏羲中文王下孔子也以易道畀予遂悟八卦小成之位質之象數如有符契且云今年四十有七已及聖人之年於是作易傳以授門人崔徹王賛之徒復自為注今觀其書無可取者而恠誕如此其人亦可知後避難死於道路盖不能終君陽之居也韻語陽秋杜劉少府畫山水障歌云反思前夜風雨急乃是蒲城鬼神入元氣淋漓障尤濕真宰上訴天應泣應物聽嘉陵江聲云水性自云靜石中本無聲如何兩相激雷轉空山鳴贈能吟李儋詩云絲桐本異質音韻合自然吾觀造化意二物相因縁臨川詠魯公壞碑云六書篆籀數變改遂使後世多失真誰初妄鑿妍與醜坐令學士勞骸筋堂堂魯公勇且仁豈亦以此夸常民直疑技巧有天巧不必强勉亦通神坡詠歙硯詩云與天作石來幾時與人作硯初不辭詩成鮑謝石何與筆落鍾王硯不知此窮本探妙超出凖䋲外不特狀冩景物也䂬溪拾遺門退之和劉使君云吏人休報事公作送春詩夢得送王司馬之陜州云案牘來時惟署字風烟入興更成章自俗吏觀之皆可坐不了事之目也韻語陽秋樂天云報道前駈少呵喝恐驚黄鳥不成啼坡云鬂絲只好對襌榻湖亭不用張水嬉蔡君謨云因傍堤松却飛盖為聞山烏徹鳴騶若俗士務此誇張俗眼又豈識數公意王常明林和靖詩馬從同事借妻怕罷官貧頗能狀寒廉態抑又有意所謂怕貧者婦人女子耳大丈夫之不移何隕穫之有子美有長貧任婦愁亦以男子未嘗愁也讓粟不謀妻以明謀及婦人則不得辭也又云浮生有分定飢飽豈能逃歎息謂妻子我何隨汝曹世畫韓退之小面而美髯著紗帽此乃江南韓熙載爾熙載謚文靖江南人謂之韓文公因此遂誤以為退之退之體肥而少髯故孔鄈私記云退之豐肥善睡每來吾家必命枕簟而鄭羣贈簟詩已云腰腹空大何能為漫膚多汗真相宜其信然矣黃山谷贈米元章云芾以能詩知名喜蓄書畫有米氏書畫史行世崇寧閒芾為江淮發運勾管揭一牌于行舸之上曰米家書畫船因為詩曰萬里風帆水著天麝煤鼠尾過年年滄江夜静虹貫月定是米家書畫船}
