  - {type: variant, offset: 0, length: 6443, content: 增修詩話總龜卷之二十四感事門高力士謫巫州山谷多薺而人不食感之因作詩以寄意曰两京作斤賣五溪無人採夷夏雖有殊氣味都不改明皇雜録李適之在相位每退朝則邀賔客諧謔賦詩曾不備林甫之害嘗為詩曰朱門長不閉親友恣相過年今將半百不樂復如何及罷相又為詩曰避權仍罷相樂勝且㗸盃借問門前客今朝㡬箇來及死非其罪時人冤之明皇幸蜀回至劔門謂侍臣曰劍門天險自古及今敗亡相繼豈非在徳不在險也因作詩曰劍閣横空峻鑾輿出狩回翠屏千仭合丹嶂五丁開灌木索旗轉仙雲拂馬來乗時方在徳嗟爾勒銘才至徳二年普安郡太守賈深勒于石開元傳信記明皇將幸蜀登花蕚樓使樓前善水調者登樓而歌曰山川滿目淚沾衣冨貴榮華得㡬時不見而今汾上水惟有年年秋鴈飛顧侍者曰誰爲此對曰宰相李嶠辭也明皇曰真才子不待曲終而去明皇傳信記唐曲江開元天寳中嘗有殿宇因安史之亂遂盡圯廢文宗覧杜甫詩云江頭宫殿鎖千門細柳新蒲爲誰緑因建紫雲樓落霞亭歲時賜宴及两㟁建亭舘焉春明退朝録劉洞嘗以詩百餘首獻李煜首篇乃石城懐古云石城古岸頭一望思悠悠㡬許六朝事不禁江水流煜覧之掩卷改容金陵將危為七言詩大榜扵路傍曰千里長江皆渡馬十年飬士得何人又云翻憶潘郎章奏内愔愔日暮好沾巾盖潘祐表云家國愔愔如日將暮也江南野録韓熈載高宻人顯仕江南晚年奉貢入梁都絶知舊乃題于舘壁云未到故郷時將謂故郷好及至親得歸争如身不到目前相識無一人出入空傷我懐抱風雨瀟瀟旅舘秋歸來牕下和衣倒夣中忽到江南路㝷得花中歸舊處桃臉蛾骨笑出門争向前頭擁將去又云僕本江北人今作江南客再去江北行舉目無相識金風吹我寒秋月為誰白不如歸去來江南有人憶江南野録後庭花亡陳之曲也杜牧之詩曰烟籠寒月水籠沙夜泊秦淮賣酒家商女不知亡國恨隔江猶唱后庭花故胡曾詩曰陳國機權未可涯如何後主恣驕奢不知即入宫前井猶自聽吹玉樹花思越人亡呉之曲也胡曾詩曰吳王恃覇弃賢才貪向姑蘇醉醁醅不覺錢塘江上月一宵西送越兵來柳枝歌亡隋之曲也胡曾詩曰萬里長江一旦開岸邉楊柳㡬千栽錦㠶未落干戈起惆悵龍舟去不回韓渥詩曰梁苑隋堤事巳空萬條猶舞舊春風那堪更想千年後誰見楊花入漢宮古今詩話謂此詩是韓琮作又賀知章詩曰碧玉粧成一樹高萬條垂下緑絲條不知細葉誰裁出二月春風是剪刀羅隱詩曰裊裊和煙映玉樓半垂橋上半垂流今年漸見枝條宻惱亂春風卒未休李渉詩曰錦池江上柳垂橋風引蟬聲送寂寥不必如絲千萬縷只禁離恨两三條鍳戒録天成初明宗召亡蜀舊宰臣王錯等賦蜀王降唐詩惟牛希濟爲佳詩曰滿城文武欲朝天不覺隣師犯塞烟唐主再懸新日月蜀王還却舊山川非干將相扶持拙自是君臣數盡年古徃今來亦如此㡬曾歡笑㡬潸然元㣲之劉夣得韋楚客㑹於樂天之居因論南朝興廢事各賦金陵懐古詩夣得方在郎省元公巳居北門夣得騁其才略無遜意滿引一觴請爲首唱一揮而成白公覧詩曰四人探􅌐龍而子先得其珠其餘鱗甲將何為三公扵是罷吟夣得詩曰王濬樓船下益州金陵王氣黯然収千㝷鐡鎖沉江底一片降旛出石頭荒苑至今生茂艸古城依舊枕寒流如今四海歸皇化两岸瀟瀟蘆荻秋杜荀鶴朱梁時作時世吟十首今錄其两首云夫因兵亂守蓬茅麻苧裙衫鬂髪焦桑柘廢來猶納稅田園荒盡尚徴苗時挑野菜和根煑旋砍生柴帶葉燒前雖見於評論所載事固不同姑存其作任是深山更深處也應無計避征徭八十衰公住破村村中牢落不堪論因供寨木無桑柘為點郷兵絶子孫還似平寜催賦稅未曾州縣略安存至今雞犬皆星散日落西山哭倚門並同前内侍張繼常爲鎮戎軍鈐轄因題詩扵􅈦事曰夜聞磧外鈐聲苦曉聽城頭角調哀不是感恩心似鐡誰人肯向此中來繼常能讀書有識好談論知治體中間入内都知領郡談苑翠㣲寺在􅌐山絶頂舊離宫也唐太宗避暑扵此后寺亦廢有逰人題云翠㣲寺本翠㣲宫樓閣亭臺㡬十重天子不來僧又去樵夫時倒一株松鍾謨建安人爲李璟奏表稱臣扵周孫晟遇害獨赦謨爲耀州司馬有詩與州將云翩翩歸盡塞垣鴻隱隱寒聞蟄戸蟲渭北離愁春色裏江南家事戰塵中還同逐客紉蘭佩誰聴縲囚奏土風多謝賢侯振吾道免令搔首泣途窮後盡江為界世宗召謨為衛尉卿放還國作詩獻其畧云三年耀武群雄伏一日回鑾萬國春南北通歡永無事謝恩歸去老陪臣世宗覧而恱之並同前元厚之昔隨侍在荆南從學扵龍安寺僧舎後三十年以龍圖閣帥荆州昔之老僧犹在一日訪舊齋而門徑池䑓如昔悵感乆之因剏巨堂榜曰碧落題詩扵堂曰九重侍從三明主四紀乾坤一老臣未㡬召還翰林叅熈寜大政真可謂乾坤老臣也古今詩話王播少逰揚州惠照寺木蘭院隨僧飯僧頗厭之後二紀出鎮廣陵因訪舊逰向書字巳為碧紗籠矣題二詩曰二十年前此院逰木蘭𥘉發院初脩而今再到經行處樹老無花僧白頭上堂已了各西東慚愧闍黎飰後鍾二十年前塵撲面而今始得碧紗籠古今詩話北夣瑣言載後篇叚文昌題江陵佛寺李翺尚書扵潭州席上有舞柘枝者顔色慘沮侍御殷堯藩即席贈詩曰姑蘇太守青蛾女流落長沙舞柘枝滿坐綉衣皆不識可憐紅臉淚雙垂因問之乃蘇州韋中丞愛姬所生女也因相為之吁嘆即命更其舞衣扵賔榻中擇士嫁之舒元輿侍郎聞之贈李公詩曰湘江舞罷忽生悲便脫蠻靴出綘幃誰是蔡邕琴酒客魏公懐舊嫁文姬古今詩話杜甫開元中流竄秦越有秦州詩二十首其首叙曰有弟皆覉旅無家問死生寄書多不逹况乃未休兵后殁衡州耒陽縣杜牧之常覧其集有詩曰杜詩韓筆愁來讀似倩麻姑癢處搔天外鳯凰誰得髓無人觧合續絃膠羅隱題杜甫集曰楚水悠悠浸亭楚南天地两無情忍敎孫武重泉下不見時人說用兵南部新書詩云昔日青樓對歌舞今日黄埃聚荆棘山川滿目泪沾衣冨貴榮華能㡬時不見而今汾上水惟有年年秋鴈飛李嶠作也明皇深賞之當時未有太白子羙故嶠軰得稱雄爾意其遭罹世故不得不爾雨中聞鈴且猶涕下嶠詩可不如撼鈴也以此論工拙殆未可也蘇公詩話李士元嘗爲僧逰𥘉有登單于䑓詩云悔上層樓望翻成極目愁路沿葱嶺去河背玉關流馬散眠沙磧兵閑倚戍樓殘陽三會角吹白旅人頭登華閣詩云亂後獨來登大閣凭闌舉目盡傷心長堤過雨行人少廢苑經秋草自深破落侯家通永巷蕭條宫樹接踈林総輸釋氏青蓮舘依舊重重布地金雅言雜録張祐素藉詩名凢知巳者皆當世英儒故杜牧之云誰人得似張公子千首詩輕萬户侯祐有華清宫詩爲世所稱云龍虎旌旗雨露飄鳯池歌㫁玉山遥明皇上馬太真去紅杏滿園香自銷郡閣雅談李朱崖平泉莊佳景可愛洛中士人詫扵江遵遵有詩曰平泉風景好髙眠水色風光滿目前剛欲平他不平事至今惆悵滿南遷江過楊相宅有詩云倚伏從來事不遥無何平地起青霄纔到青霄却平地門對古槐空寂寥唐賢抒情陳喬張俄重陽日登高于北山湖亭不奏聲樂因吟杜工部九日宴藍田崔氏莊詩其末句云明年此會知誰徤醉把茱茰仔細看員外郎趙宣父時亦在集感慨流涕者數四舉坐異之未㡬趙卒南唐近事僖宗幸蜀有北省官忘名避地江左元昆扈蹕在蜀因寄詩曰渉江今日恨偏多援筆長吁欲柰何倘使淚流西去得便應添作錦江波后有朝士同在外地覩野花追思京師舊逰云曾過街西看牡丹牡丹纔謝便心䦨如今變作村園眼古子花開也喜歡雜誌錢思公謫漢東作一曲曰城上風光鶯語亂城下烟波春拍岸緑楊芳艸㡬時休淚眼愁腸先巳㫁年年漸變成衰晚鸞鑑朱顔驚暗換昔年多病厭芳尊今日芳尊唯恐淺每歌之酒闌則泪下時後閣尚有一白髪姬乃鄧王俶歌鬟驚鴻也吾憶先王挽鐸中歌此聲相公其亡乎果斃扵隨鄧王舊曲曰帝郷烟雨鎖春愁故國山川空淚眼頗相類湘山野録胡汾不知何許人嘗隱廬山桑落洲一篇云莫問桑田事但看桑落洲數家新住處昔日大江流古岸摧將盡平沙長未休想應百年後人世更悠悠又月詩云輪中别有物光外更無空摭言元和十三年進士陳標獻諸先軰詩曰春官南院院墻東暁色𥘉明月色紅文字一千重馬擁喜逢三十二人同眼看魚變辭凢水心逐鶯飛出瑞風莫恠雲泥從此别總曾惆悵去年中同前余昔在錢唐一日晝寢寳山僧房起題其壁云七尺頑軀走世塵十圍便腹貯天真此中空洞渾無物何止容君數百人其后有數小子亦題名壁上見者乃謂余誚之也周伯仁所謂君者乃王茂宏之流豈此等軰㢤吾嘗作太白真賛云生平不識高將軍手汚吾足乃敢嗔吾今復此者欲使後之小人少知自揆也百斛明珠僕在徐州王子立子敏皆舘扵官舎而蜀人張師厚來過二王方年少吹洞簫飲酒杏花下明年予謪黄州對月獨飲甞有詩云去年花落在徐州對月酣歌羙清夜今夜黄州見花發小院閉門風露下盖憶與二王飲時也張師厚乆巳死今年子立復為古人哀㢤予素不觧棋因獨逰廬山白觀觀中人皆闔户晝寝獨聞棋聲扵古松流水之間意欣然喜之自爾欲學然終不解也児子過乃粗能者儋守張中從之戯予亦隅坐竟日不以為厭也詩曰五老峯前白鶴遺址長松映庭風日清羙我時獨逰不逢一士誰為碁者户外屨二不聞人聲時聞落子紋枰坐對誰究此味空鉤意釣豈在魴鯉小児近道剥啄信指勝固欣然敗亦可喜優㢤㳺㢤聊以卒歲並同前增修詩話總龜卷之二十四百家詩話總龜後集卷之二十四用字門子羙有同學少年多不賤小徑升堂舊不斜群仙不愁思夕𤇺来不近皆人所不敢用甚類周禮凡師不功左傳仁而不武晋人聞有楚師師曠曰不害椘㱕而動不後才以易無字爾而語势頓壮黄常明杜詩有用一字凡数十処不易者如縁江路熟俯青郊傲睨俯峭壁展席俯長流杖藜俯沙渚此邦俯要冲四顧俯層巔旄頭俯渊瀍層䑓俯風渚㳺目俯大江汀檻俯鴛鴦其餘一字屢用若此類多不可述同上張文潜法雲懐無咎云獨覺欠此公或傳其生語文潜獨以欠字為得意然夣得送皇甫云從兹洛陽杜吟咏欠書生楽天可怜閑氣味惟欠與君同得君更有無厭意猶恨尊前欠老劉退之云今者誠自幸所懐無一欠張何得意之有同上賈島携新文謁韓愈云青竹未生翼一歩萬里道安得西北風身願變蓬草可見急扵求師愈贈詩云家住幽都逺未識氣先感来㝷吾何能無殊嗜昌歜可見謙扵授業此皆島未儒服之時也洎愈教島為文遂弃浮屠學舉進士摭言載島初赴名塲扵馿上吟鳥宿池中樹僧􅒱月下門遇權京尹韓吏部呵喝而不覺洎擁至馬前則曰𣣔作􅒱字又欲作推字神㳺詩府致冲大官愈曰作􅒱字佳矣是時島識韓巳乆矣使未相識愈豈肯教其作𫾣字耶丹揚集凢聚落相近期某旦集交易閧然其名為虚栁云包飯趂虚人臨川云花間人語趂朝虚山谷葉褁塩同趂虚人集春𬞞好趂虚黄常明數物以个謂食為喫甚近鄙俗獨杜屢用峽口驚猿聞一个两个黄鸝鳴翠栁却遶井邉添个个送李校書云臨岐意頗切對酒不能吃樓頭吃酒樓下卧但使殘年飽吃飯梅熟許同朱老喫盖萹中大㮣奇特可以映帶者也坡云筆工傚諸葛散筆反不如嘗筆正如人學老杜詩但見其粗俗耳同上野飯射麋新本名状郊居然左氏楚人致晋師晋人逐楚樂伯餘一矢糜射以獻又晋師及熒澤魏錡射糜以獻楚潘黨曰子有軍功無乃不給扵鮮皆飯扵野而射糜新事也又市喧宣近利亦止称東屯所居盖齊侯𣣔更晏子宅曰湫溢嚻麈晏子辭曰近市小人之利也市喧而近利事餘惟一两字暗貫經傳者可勝𢾗㢤同上杜云南風作秋聲殺氣薄炎熾盖用易雷風相薄左氏寕我薄人無人薄我軍志先人有奪人之心薄之也同上劉禹錫謫連州作畬田行云何處好畬田團團縵山腹下種煖灰中乗陽拆芽孽又作竹枝辭云銀釧金釵来負水長刀短笠去燒畬嘗覌辰沅亦然瘠土之民亦倍其劳而耕反鹵莽也夣淂蛮子歌云蛮貊鈎輈音蛮衣襴布熏狸掘沙䑕時莭祠盤瓠忽逄乗馬客恍若驚􅍪顧腰斧上高山意行無舊路賓客謫居朗州而五溪習俗盡得之矣黄常明杜集多用經書語如車鄰鄰馬䔥䔥未嘗外入一字如天属尊尭典神功恊禹謨卿月升金掌王春度玉墀濟潭鱣潑潑春艸鹿􅊯􅊯皆渾然嚴重如天陛赤墀植璧鳴玉法度森嚴然後人不敢用者豈所造語膚淺不類耶同上作詩在扵練字如老杜飛星過水白落月動沙虚是練中間一字地拆江㠶隠天清木葉聞是練末後一字酧李都督早春詩云紅入桃花嫩青㱕栁葉新若非入與㱕二字則與児童之詩何異葛常之霄漢瞻佳士泥塗任此身只任字即人不到處自衆人必曰欵曰愧獨無心任之所謂視如浮雲不易其介者也繼云秋天正摇落回首大江濱不知大觀傲睨天地汪汪萬頃奚足云㢤坡有白衣送酒舞渊明人有疑舞字太過者及覌庾信答王褒餉酒云未能扶畢卓尤足舞王戎盖有所本黄常明杜子羙西郊詩云無人兢来徃或云無人與来徃或云無人覺来徃兢與皆常談覺字非子羙不能道也盖煬者避竈有道者之所驚舎者争席隠居者之所貴也丹陽集舊賈浪仙抒思僧𫾣月下門或引推作推势遂冲尹莭世傳為羙談舊扵太學得江御史詩一軸有督人和詩云直饒煆煉經時序若是推𫾣捴可刪以是知雷同從非善學也䂬溪舊觀臨川集肯顧北山如慧約與公西崦􅓯莓苔嘗爱其􅓯字最有力後讀集當為􅓯青冥藥許隣人􅓯退之詩翁憔悴􅓯荒棘窖谿􅓯株橜子厚戒徒􅓯雲根雖一字之法不無所本同上杜詩四韵并絶句味之皆覺字多以字字不閑故也他人雖長萹若無可讀正如賢人君子並處朝廷但一二相助已號為得人若不能為有無者縦累千百軰蔑如也秦少㳺雨砌堕危芳風軒納飛絮之類李公擇以為謝家兄弟得意不能過也潘邠老云七言詩第五字要響如返照入江飜石壁㱕雲擁樹失山村飜字失字是响字也五言詩第三字要响圓荷浮小葉細麦落䡖花浮字落字是响字也所謂响者致力處也予竊以為字字當活活則字字自响吕氏童䝉訓曰押韻門孔毅夫雜記云退之詩好押狹韵累句以示工而不知重叠用韵之為病也双鳥詩押两韻字李花詩押两花字苕溪漁隠曰讀皇甫湜公安園池詩亦押两閑字日夜不得閑君子不可閑盖退之好重叠用韵以盡己之詩意不恤其為病也學林新編云杜子羙飲中八仙歌曰知章騎馬似乗舩又曰天子呼来不上舩一曰眼花落井水底眠又曰長安市上酒家眠一曰汝陽三斗始朝天又曰舉觴白眼望青天一曰皎如玉樹臨風前又曰蘇晋長齋綉佛前又曰脫㡌露頂王公前此歌三十二句而押二舩字二眠字二天字三前字近時論詩者曰此歌一首是八叚不嫌扵重用韵也某案子羙此歌以飲中八仙歌五字為題則是一歌也此歌首尾扵舡字韻中押未嘗移別韵則非分為八叚盖子羙古律詩重用韵者亦多况扵歌乎如园人送瓜詩曰沈浮亂水王愛惜如芝艸又曰园人非故侯種此何艸艸一篇押二艸字也上後园山脚詩曰蓐收困用事元寘蔚彊梁又曰登高𣣔有徃蕩析川無梁一萹押二梁字也北征詩曰維時遇艱朝野少暇日又曰老夫情懐悪嘔泄卧數日一篇押二日字蘷府詠懐詩曰雖云隔禮不敢墜周旋又曰淡交随聚散澤國遶囬旋一篇押二旋字也贈李八秘書詩曰事殊迎代邸喜異賞朱虚又曰風烟巫峽逺䑓榭楚宫虚一篇押二虚字也贈李邕詩曰放逐早聮翩低垂困炎厲又曰哀贈終消條㤙波延掲厲一篇押二厲字也贈汝陽王詩曰自多親棣萼誰敢問山陵又曰鴻寳全寕秘丹梯庻可陵一萹押二陵字也喜薛璩岑參迁官詩曰栖遲分半菽浩蕩逐浮萍又曰仰思調玉燭誰定握青萍一萹押二萍字也寄賈岳州嚴巴州两閣老詩曰討胡愁李廣奉使待張騫又曰如公盡雄隽志必在騰騫一萹押二騫字也子羙詩如此類甚多雖然子羙非剏意為此者盖有所本也按文選載古詩曰晨風懐苦心蟋蟀傷局促又曰音响一何悲絃急知柱促一萹押二促字也曹子建羙女萹曰明珠交玉体珊瑚間木難又曰佳人慕高義求賢良獨難一萹押二難字也謝靈運述祖徳詩曰叚生蕃魏國展季救魯人又曰外物辭所賞勵志故絶人一萹押二人字也又南圃詩曰樵隠俱在山由来事不同又曰賞心不可忘妙善冀能同一萹押二同字也又初去郡詩曰或可優貪兢豈足称逹生又曰畢娶類尚子薄逰似邴生一萹押二生字也陸士衡擬古詩曰此思亦何思思君徽與音又曰驚飈褰反信㱕雲難寄音一萹押二音字又豫章行曰汎舟清川渚遥望江山隂又曰寄世将幾何日􅉴無停隂一萹押二隂字也阮嗣宗詠懐詩曰何當行路子磬折忘所歸又曰黄鵠㳺四海中路将安㱕一萹押二㱕字江淹雜体詩曰韓公論賣藥梅生隠市門又曰太平多􅌚娛飛盖東都門一萹押二門字王仲宣從軍詩曰連舫踰萬艘帶申千萬人又曰我有素餐責誠愧伐檀人一萹押二人字古人詩自有体格杜子羙亦傚古人之作耳韓退之贈張籍詩一萹押二更字二陽字又岳陽樓別竇司直詩押二向字又李花詩押二花字又雙鳥詩押二州字二頭字二秋字二休字又和盧郎中送盤谷子詩押二行字又示爽詩押二愁字又义魚詩押二銷字寄孟郊詩押二奥字此日足可惜詩押二光字白樂天渭村退居詩押二房字夣逰春詩押二行字寄元㣲之詩押二夷字出守杭州路次藍溪詩押二水字逰悟真寺詩押二􅦼字其餘詩人如此叠用韻者甚多不可具舉意到即押耳奚獨扵飲中八仙歌而致怪邪子瞻送江公詩曰忽憶釣䑓㱕洗耳又曰亦念人生行樂耳自注曰二耳義不同故得重用盖子瞻自不必注聖祖上自嫌名書如宫縣之縣者言架也若州縣之縣則別無他音嘗觀顔延之侍皇太子釋奠宴詩曰獻終襲吉郎宫廣宴堂設象筵庭宿金縣沈約侍宴詩曰囘銮獻爵摐金委奠肆士辨儀胥人掌縣二人押韵皆作州縣之縣用何耶沈佺期哭蘇眉州詩云家愛方休杼皇慈更徹縣則當作平聲押丹揚集劉禹錫嘉話詩云作詩押䪨湏要有出處近𣣔押一餳字六經中無此字唯周禮吹簫處注有此一字終不敢押予按禹錫歴陽書事詩云湖魚香勝肉官酒重扵餳則何嘗按六經所出耶洛陽伽藍記載河東人劉白堕善釀酒盛暑晒之曰中經旬不壊當時謂之鶴觴白堕乃人名子瞻詩云獨㸔紅渠傾白堕石林避暑録云若以白堕為酒則醋浸曹公湯燖右軍可也予按文選魏武帝短歌行云何以觧憂唯有杜康康亦作酒人而選詩遂以為酒用東坡豈祖是耶䂬溪百家詩話總龜後集卷之二十四, WYG: 巻}
