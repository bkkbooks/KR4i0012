  - {type: variant, offset: 0, length: 5442, content: 增修詩話總龜卷之二十二宴逰門李文正公言少保王仁𥙿與諸門生飲出一詩板掛於坐次曰二百一十四門生春風𥘉長羽毛成擲金換得天邉桂鑿壁偷將牓上名何幸不才逢聖世偶將踈網罩群英衰翁漸老児孫小異日知誰略有情公知舉時年巳老諸子皆亡唯有㓜孫又與諸門生春日會飲于繁䑓賦詩曰柳隂如霧絮成堆又引門生飲故䑓淑景即隨風雨去芳樽冝命𬋩絃催謾誇列鼎鳴鍾貴寜免朝烏夜兔摧爛醉也須詩一首不能空放馬頭回摭遺㓂萊公有妾曰蒨桃公因㑹贈歌者以束綾蒨桃作二詩呈公曰一曲清歌一束綾羙人猶自意嫌輕不知織女螢窻下㡬度抛梭織得成風勁衣單手屢呵幽窓軋軋度寒梭臘天日短不盈尺何似燕姬一曲歌公和曰將相功名終若何不堪急景似飛梭人間萬事何須問且向尊前聴艶歌翰府名談劉輝為金陵小倅攝府事一日邀郡僚洎賔客僅百入逰蔣山就太平僧舎開宴賦詩輝詩曰两道翠隂迎騎合四圍清氣逼人來林端有路雲千級物外忘機酒一杯楊蟠詩曰猿驚鶴怨不知䖏蔣山有猿驚鶴怨二谷虎踞龍蟠空見山芳艸路隨流水逺老僧心共白雲閒同前施肩吾夜宴云蘭缸如晝買不眠玉爐夜起沉香烟青蛾一行十二仙欲笑不笑桃花燃碧窓弄嬌梳洗晚户外不知銀漢轉被郎嗔罰琉璃琖酒入四肢紅玉軟鑑戒録桑門仲殊赴潤州郡宴於北固樓太守命坐客賦詩殊先成曰北固樓前一笛風碧雲飛盡建康宫江南二月多芳艸春在濛濛烟雨中雲齋廣録趙叔平退居睢陽歐陽永叔致政居潁叔平來訪永叔時吕晦叔知潁開宴召二公永叔自為作致語曰欲知盛席繼荀陳請㸔當筵主與賔金馬玉堂三學士清風明月两閒人紅芳巳過鶯猶囀青杏初嘗酒正醇好景難逢良會少乗歡舉白莫辭頻倦㳺録范鎮自給事中謪官數年方歸濟南城西有張聰寺丞園亭甲於歷下張邀公飲于園中因作詩云園林再到身猶徤官職全抛夣乍醒惟有南山與君眼相逢不改舊時青同前郭曖升平公主壻也盛㑹文士即席作詩公主自帷中觀之李端中宴詩成有薫香荀令偏憐小傅粉何郎不觧愁之句衆皆稱妙或謂宿思端自願賦一篇錢起曰請以起姓為韻遂有金垺銅山之句曖出名馬金帛為贈古今詩話正月十五日夜許三花夜行金吾廵禁察其寺觀及前後街巷會要盛造燈籠燒燈光明若晝山堂高百餘尺神龍巳後復加嚴飾士女無不夜㳺罕有居者車馬塞路有足不躡地𬒳浮行數十歩者王公之家皆數百騎行歌蘇味道詩曰火樹銀花合星橋鐡鎖開暗塵隨馬去明月逐人來逰妓皆穠李行歌盡落金梅吾不禁夜玉漏莫相催郭利正詩曰九陌連燈影千門度日華傾城出馬騎匝路轉香車爛熳惟愁暁周逰不問家更聞清管發處處落梅花崔液詩曰今年春色勝常年此夜風光正可憐鳷鵲樓前新月滿鳯凰䑓上寳燈然玉漏銅壺且莫催鐵關金鎖徹明開誰家見月能閑坐何處聞燈不看來神燈佛火百輪張刻像圖容七寳粧影裏惟聞金口恱空中疑散玉毫光金勒銀鞍控紫騮玉輪青盖駕青牛驂驔始散東城外倐忽逺逢南陌頭公子王孫意氣驕不論相識也相邀最憐長䄂風前嫋更賞新絃時裏調星回漢轉月將㣲露洒烟飄燈漸稀猶惜路傍歌舞踟䖏蹰相顧不能歸洛靈異小録杭州辯才老師退居龍井不復出入子瞻徃見之常出至風篁嶺左右驚曰公復過虎溪矣辯才笑曰杜子羙不云乎與子成二老來徃亦風流因作亭嶺上名過溪亦名二老紀詩荆南高從誨字遵聖季興嫡子也乆事戎間及至繼立頗叶衆望始則飾車服尚鮮華逺市駔駿廣招伶倫荆渚樂籍間多有梁園舊物季興先時建渚宫於府庭西北隅延袤十餘里亭榭鱗次艛艦翼張栽種異果名花脩竹從誨紹立尤加完葺每月夜花朝會賔客從誨明音律僻好彈胡琴有女妓數十皆善其事王仁𥙿使荆渚從誨出十妓彈胡琴仁𥙿有詩羙之曰紅粧齊抱紫檀槽一抹朱絃四十條湘水凌波慚鼓瑟秦樓明月罷吹簫寒敲白玉聲何婉㬉逼黄鶯語自嬌丹禁舊臣來側耳骨清神爽似聞韶雜詠天下大定録載王仁𥙿两篇一篇巳載於此今録所遺一篇云玉􅊏挑落断水聲散入秋空韻轉清三五指中遺塞鴈十三絃上囀春鶯譜從陶室偷將妙曲向秦樓寫得成無限細腰宫裏女就中偏愜楚王情崔公佐牧名郡日宴賔僚有一客巾屨不完衣破肘見突筵而入崔喜其來令下牙籌引滿數觥神色自若歌妓駭其藍縷因大噱客獻詩曰破額幞頭衫也穿使君猶許對華筵今朝幸倚文章守遮莫青蛾笑掲天崔令掩口無咍賢士郡閣雅談杜悰司空牧澧陽宏辭李宣古數陪宴飲戯謔侮慢杜不能容使辱之長林公主出而救之云尚書不念諸子學文待士如此那得平陽之譽遣易衣而赴中坐長林請為詩冀彌縫也宣古詩云紅燈初上月輪高照見堂前萬朶桃觱栗夜深抛耍令舞來挼去使人勞杜公賞之後二子裔休儒休皆登第人謂之曰非其母賢不能成其子雲溪友議白樂天致仕時裴晋公夜宴諸致仕官樂天賦詩云九燭臺前十二姝主人留醉任歡娯飄颻舞䄂雙飛蝶宛轉歌喉一索珠坐乆欲醒還酩酊夜深臨去更踟蹰南山賔客東山妓此會人間曾有無古今詩話裴令公守東洛夜宴半酣公索聮句元白有得色公為破題至楊侍郎曰昔日蘭亭無艷質此時金谷有高人白知不能加遽裂𥿄曰笙歌鼎沸勿作此冷淡生活元頋白曰樂天可謂全其名也李相國蔚鎮淮南布素孫處士來謁李敦舊分待之殊禮將行祖送逰河橋下舟人回篙水濺近坐飲妓李公大怒孫獻楊栁詞曰半額鵞黄金縷衣玉搔頭裊鳯㕠飛從教水濺羅裙􅊜知道巫山行雨歸舟子獲免罪又有李嶸獻相國詩云雞樹烟含瑞氣深鳯池波待玉山澄國人乆倚東關望擬築沙堤到廣陵後果入相同前雙井黄叔逹字知命初自江南來與陳履常俱謁法雲禪師于城南夜歸過龍眠居士李伯時知命衣白衫騎驢縁道摇頭而歌履常負杖挾嚢于後一市皆驚以為異人伯時因畫為圖而邢敦夫為作歌曰長安城頭烏夜棲長安道上行人稀浮雲卷盡暮天碧但見明月流清輝君獨騎驢向何處頭上倒着白接䍦長吟搔首望明月不學山翁醉似泥到得城中燈火閙小児拍手攔街笑道傍觀者那得知相逢疑是商山皓龍眠居士畫無比揺毫弄筆長風起酒酣閉目望窮途𥿄上軒昻無乃似君不學長安㳺俠誇年少臂鷹挾彈章䑓道君不能提携長劍取靈武指揮猛士驅貔虎胡為脚踏梁宋塵終日飄颻無定所武陵桃花春欲暮白水青山起烟霧竹杖芒鞋歸去來頭巾任掛三花樹惇夫時年未二十王直方詩話林逈與黄秘教同逰連江玉泉有詩曰泉山好翠㣲權尹訟庭希曉馬破雲去夜船乗月歸妓歌珠不㫁人醉玉相依薄宦自拘者咄㢤多少非青瑣集嬖佞韓昭顧珣潘迎等為狎客兢扠手揺頭令唐師入境遏其報而逰幸師至利州方知將士紛然曰且打扠手揺頭念周宣帝作歌曰自知身命促把燭夜行逰令宮女連臂踏脚而歌北夣瑣言湖南馬氏作會春園開宴徐東野作詩有數聮爲當時所称云珠璣影冷偏粘草蘭麝香濃却損花山色逺堆羅黛雨草梢春戞麝香風衰蘭寂寞含愁緑小杏妖嬈弄色紅旁搜水脉湘心滿遍掲泉根楚底通水乳滳殘青壁痩石脂傾盡白雲空深浦送回芳草日急灘牽㫁緑楊風藕梢逆入銀塘裏蘋迹潜來玉井中敗菊籬踈臨野渡落梅村冷隔江楓剪開净澗分苗稼劃破漣漪下釣筒湖湘故事増修詩話總龜卷二十二百家詩話總龜後集卷之二十二辛集舒城阮一閱編皇明宗室月窓道人刋鄱陽程珖校用事門臨川慷慨秋風起悲歌不為鱸眉山不須更說知㡬早直為鱸魚也自賢反復曲折同歸一意亦如把酒祝公公莫拒緇衣心為好賢傾我欲折繻留此老緇衣誰作好賢詩共用一事而造語居然不同䂬溪臨川道徳文章吾事落南華夫子盍行邪無落吾事乃柳詩有惆悵樵漁事今還又落然恐亦用此同上杜心迹喜雙清茶瓜留客遟似非用事觀灵運齋中詩云矧乃歸山川心跡雙寂寞竟陵王子良禮才好士愛月客至為設瓜飲甘菓二詩盖用此至若㯶拂子云咂膚倦撲㓕頼爾甘伏􅈾雖等閑題目無字無出處同上坡集有全萹用事者如賀人生子曰欝䓗佳氣夜充閭喜見徐卿苐二雛我亦從来識英物試教啼㸔㝎何如戯子野買妾自錦里先生自笑狂身長九尺鬂眉蒼平生謬作安昌客略遣彭宣到後堂句句用事曷嘗不流便㢤同上嘗觀臨川詠棗止数韵餘甘入隣家尚得讒婦逐贄享古巳然豳詩自冝録用女贄棗修八月剥棗雖云食之昏用范棗膏昏䝉䝉碩比赤心投皇明倘加燭用蕭琛陛下投臣以赤心臣敢不報以戰栗以是知凢作者湏飽材料傳稱任昉用事過夛属辞不得流便余謂昉詩所以不䏻傾沈約者乃才有限非用事之過同上李商隱詩好積故實如喜雪云班扇慵裁素曹衣詎比麻鵞帰逸少宅鶴滿令威家又洛水妃虚妬姑山女謾夸聮辞雖許謝和曲本慚巴一萹中用事者十七八同上夣得詩只恐鳴騶催上道不容待得晚菘嘗乃周彦倫答文惠太子問山中菜食云春初早韭秋末晚菘此以两字用事者送熊判官云臨軒弄郡章得人方付此乃用漢髙弄印倪寛事此一字用事者黄常明韋應物詩心同野鶴與麈逺詩似氷壼徹底清又雜言送人云氷壼見底未為清少年如玉有詩名此可為用事之法盖不拘故常也同上甫冝春花詩云無復増修事君王惜費金乃暗用漢文惜百金之産而罷露䑓事同上沈慶之謂上曰為國譬如治家耕當問奴織當問婢陛下欲治國而與白面書生謀之事何由濟夣得送李䇿云春風深曰静争長幽鳥鳴僕夫前致辭門有白面生同上坡藍尾忽驚新火後遨頭要及浣花前注及樂天三盃藍尾酒一楪膠牙餳觀長慶集此詩題云七年元日對酒非鑚火時事也宋文景守歳云且盡灯前藍尾杯䂬溪師曠釋絳縣老人年数云亥有二首六身盖離拆亥字點畫而上下之如筭籌縱横然則下其二首為二萬六身各一縱一横為六千六百六十正合其甲子之日数傳以明矌之慱物劉賔客送人赴綘州云午橋群吏散亥字老人迎義山贈綘䑓老驛吏云過客不劳詢甲子惟書亥字與時人可謂善使事矣亦如近詩送人洪州千斗氣沉人巳化置芻人去榻猶懸送人鄂州云黄鶴晨霞傍楼起頭陀青草遶碑荒送人襄陽云四葉表閭唐尹氏一門逃世漢龎公雖隣封宻迹不可移也䂬溪凢作詩有用事出處有造語出處如五陵衣馬自輕肥雖出論語搃合其語乃潘岳裘馬悉輕肥柳絮才髙不道塩雖謝女事乃借張融以海賦示人人評其賦但不道塩耳紅䄂泣前魚本戦國䇿其語乃陸韓卿中山王孺子妾歌安陵泣前魚坡作太白畫像詩云大児汾陽中令君小児天台坐忘身其事乃用白交汾陽於伍行中竟脫白於禍天台司馬紫㣲謂白有仙風道骨可與神逰八極之表所造之語乃禰衡傳云大児孔文舉小児楊徳祖同上坡㳺武昌見農夫皆騎秧馬較之傴偻而作者劳佚相絶嘗作秧馬歌叙述甚詳唐子西至羅浮始識此噐作詩云擬向明時受一㕓著鞭常恐老農先行藏巳問吾家舉從此馳名四十年亦巧扵用事黄常明坡和柳子王暨景純岡字韵詩至七萹云屡把鉛刀齒歩光更遭華衮照龎凉乃用子建七啓云歩光之劍華藻繁縟左傳龎凉冬殺雖第一韵衆人所更易而七篇未嘗改又貫穿精絶如此黄常明東坡在儋耳時余三從兄延之自江隂擔簦萬里絶海徃見晋一月坡嘗誨以作文之法曰儋州雖数百家之聚州人之所湏取之市而足然不可徒得也必有一物以攝之然後為巳用所謂一物者錢是也作文亦然天下之事散在經子史中不可徒使必得一物以攝之然後爲巳用所爲一物者意是也不得錢不可以取物不得意不可以用事此作文之要也吾兄拜其言而書諸紳嘗以親製龜冠爲献坡受之而贈以詩云南海神龜三千歳兆叶朋從生慶喜智能周物不周身未免人鑚七十二誰能用爾作小冠岣嵝耳孫剏其製今君此去寕復來𣣔慰相思時整視今集中無此詩余嘗見其親筆後坡歸冝興道由無錫洛社嘗至孫仲益家時仲益年在髫齓坡曰孺子習何藝孫曰學對属坡曰試對㸔徐曰衡門稚子璠璵噐孫應聲云翰苑仙人錦綉腸坡撫其背曰真璠璵噐也異日不凢二事皆吾鄊人士所知輒記于此韵語陽秋謁帝似馮唐垂白馮唐雖晚逹馮唐毛髮白長卿多病乆我多長卿句病渇汚官位杜以其為郎故用之若它人老與病恐不可槩使同上用巳詩為故事湏作詩夛者乃有之太白云滄浪吾有曲相子棹歌聲樂天湏知菊酒登髙㑹從此多無二十埸明年云去秋共数登髙㑹又𬒳今年减一場過槩里云昔嘗詠遺風著為十六篇盖居渭上醖熟獨飲曽効淵明体為十六篇又贈微之云昔我十年前曽與君相識曽将秋竹竿比君孤且直盖舊詩云有秋竿也坡赴黄州過春風嶺有两絶句後詩云去年今日関山路細雨梅花正断魂又云柯丘海棠吾有詩獨笑山林誰敢侮又有竹云吾詩固云爾可使食無肉同上唐諺云槐花黄舉子忙東坡有彊隨舉子踏槐芲槐芲還似昔年忙谷云槐催舉子踏花黄是也世傳五月十三日為竹迷日凢種多以五月杜云東林竹野薄臘月更湏栽則唐人植竹用季冬月也又云平生憇息地必種数竿竹嘗𣣔闢小軒以必種名之前軰戯語以郊外呵喝月下燭龍皆謂之殺風景介甫戯示頴叔云但怪傳呼殺風景豈知禅客夜相投盖用此也同上老杜塗穷反遭俗眼白本用阮籍事意我軰本宜以白眼視俗人至小人得志疾視君子是反遭其白眼故倒用之亦如水清反多魚乃倒用水至清則無魚也夣得酌我莫憂狂老來無逸氣乃倒用黄次翁無多酌我寄謝嵇中散予無甚不堪倒用絶交論坡云後生可畏吾衰矣刀筆從來錯料尭周昌以趙尭刀筆吏後果無能為所料信不錯而云錯料尭亦以渉􅏺謗倒用尔又有穷鬼却相呼乃知飯後鍾闍黎盖具眼它年五君詠山王一時数皆倒用也䂬溪坡云通家不隔同年面得路方知異日心乃唐人責同年不赴期集辞云紫陌㝷春尚隔同年之面青雲得路不知異日之心任昉别謝云楊詩云詎念耋嗟人方深老夫託报劉孝綽云詎慰耋嗟人徒深老夫託略改一两字豈以㑹意處𣣔常用之邪臨川有莫林揺落献南山又云大落岡峦因自献如云名譽子真矜谷口事功新息困壼頭又未爱京師傳谷口但知鄊里勝壼頭昔人行事措意黙與巳合則喜用之馬少㳺𣣔乗下澤御欵叚不去鄊里雖自謀獨善亦可為貪躁之戒伏波在浪洎下潦上霧仰視飛鳶跕跕堕水中卧念少㳺平生時語以為何可復得故坡云何須更待飛鳶堕方念平生馬少㳺又大夫行役家怨應念郷居馬少㳺雪堂唯有思歸曲為念平生馬少㳺以其可喜不直押韵也䂬溪律詩有一對通用一事者更㝷嘉樹傳莫忘角弓詩乃左傳韓宣子聘魯嘗賦角弓及譽嘉樹魯人請封殖此樹以無忘角弓介甫乆諳郭璞言多騐老比顔含意更踈乃景純𣣔為顔含筮含曰年在天位在人修巳而天不與命也守道不囬性也人自有性命無劳蓍龜同上古人作詩有用經傳全句選詩小人計其功君子道其常樂天疾悪如巷伯好賢如緇衣乃两句渾用之杜云無妄之憂勿藥喜誰謂荼苦甘如薺冨貴扵我如浮雲近人亦多用史語坡云人言盧𣏌似奸邪我見鄭公但嫵媚嘗觀南史載王冝興云為刼不湏伴甚似一側韵五言但無題目耳同上昔人用五馬事多因㳺遨動出處方用之如老杜賦王閬州餞蕭遂州云二天開寵餞五馬爛生花其賔主出住分矣又送李梓州五馬何時到贈嚴武五馬舊曽諳小徑送賈閣老出汝州人生五馬貴太白云五馬莫晋連岑參云門外不湏催五馬戎昱五馬㡬時朝魏闕子厚五馬助征騑樂天五馬無由入酒家東坡鼓吹未容迎五馬介甫尚得史君駈五馬近人扵太守安居閉閣例稱五馬此理恐未安也丹揚集後集卷之二十二, WYG: 巻}
