  - {type: variant, offset: 7879, length: 672, content: 孝緒南平王要之不赴曰非志驕冨貴但性長庙堂使麏麚可驂何異驥騄求意門復齋漫録云書當快意讀易盡客有可人期不来世事相違毎如此好懐百歲㡬逥開其後又寄黄充前四句云俗子推不去可人廢招呼世事毎如此我生亦何娯盖無已得意故兩見之胡氏評詩曰魯直過平輿懐李子克詩世上豈無千里馬人中難得九方皐題徐孺子祠堂詩白屋可能無孺子黄金不是欠陳蕃二詩命意絶相似盖歎知音者難得耳苕溪漁隱曰錫宴明日絶句云宴罷回来曰欲斜平康坊裏那人家㡬多紅䄂迎門笑争乞釵頭利市花清明日絶句云無芲無酒過清明興味都来似野僧昨日隣家乞新火曉窓分與讀書燈二詩何况味不同如此亦可見其老少情懐之異也胡氏評詩曰澶淵之役王介甫以謂丞相莱公功第一張文潜以爲可能功業盡莱公大抵人之議論各有所見故尓不同今具載二詩識者當能辨之介甫澶州詩云去都二百四十里河流中間兩城峙南城草上不受兵北城樓樐如邉城城中老人爲予語契丹此地經鈔虜黄屋親矢石間胡馬飲踏河氷渡天發一矢胡無酋河氷亦破沙水流歡盟從此至今日丞相莱公功第一文潜听客話澶淵事詩云憶昔胡来動河朔黄河飲馬吹胡角澶渊城下氷載車邉風䔥䔥千里賖城上黄旗坐真主夜遣六丁張猛弩雷驚電發一矢飛横射胡酋貫車柱犬羊無踪大漠空歸来封禪告成功自是乹坤扶聖主可能功業盡莱公談苑曰余知制誥曰與余恕同考試恕曰夙昔師範徐騎省爲文騎省其有徐孺子亭記其警句云平湖千畆凝碧乎其下西山萬叠倒影乎其中他皆常語近得舎人所涵虚閣記終篇皆竒語自渡江来未嘗見此信一代之雄文也其相推如此因出義山詩共讀酷爱一絶云珠箔輕明拂玉墀披香新殿閗腰支不湏㸔尽魚龍戯終遣君王怒偃師撃節称嘆曰古人措辝寓意如此之深妙令人感慨不巳百家詩話總龜後集卷之五終, WYG: 閱撰}
