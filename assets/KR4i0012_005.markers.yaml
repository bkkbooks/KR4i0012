  - {type: variant, offset: 7543, length: 335, content: 次道盡假唐人詩集慱觀而約取晚年始盡深婉不迫之意乃知文字雖工拙有定限然必視其㓜壯雖公方其未至亦不能力強而遽至也石林詩話云蘇明允至和間京師旣爲歐陽文忠公所知其名翕然韓忠獻諸公皆待以上客嘗遇重陽忠献置酒私苐惟文忠與一二执政而明允乃以布衣參其間都人以爲異禮席間意氣兀不少衰明允詩不多見然精深有味語不徒發正類其文而讀易詩云誰爲善相應嫌瘦後有知音可發弹婉而不迫哀而不傷所作自不必多也述志門余嘗官展嘗借詩集於士人中有小篇序云成都陽天慶中進士葉沆作止百篇時有可觀如閑居感懐云身閑難報國語直易傷時村墅云夜庭和月掃秋户拂雲開亦可想見其胸襟也和靖與士夫詩未嘗不及遷擢與學子詩未嘗不言登第視此爲何等隨縁應接不爲苟難亢絶如此老杜云夲無軒冕意不是傲當時鍾鼎山林各天性濁醪麄飰任吾年道義重而輕王公者也, WYG: ''}
