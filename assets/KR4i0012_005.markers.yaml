  - {type: variant, offset: 5025, length: 1, content: 龜, SBCK: 􅀛}
  - {type: variant, offset: 5026, length: 1539, content: 後集卷之五仁愛門孟子七篇論君與民者居半其餘欲得君盖以安民也觀杜陵窮年憂黎元歎息腸内热胡爲將暮年憂世心力弱宿花石戍云誰能扣君門下令减征賦寄相學士云㡬時髙議排金門各使蒼生有環堵寕令吾廬獨破受凍死亦足而志在大庇天下寒士其仁心廣大異夫求穴之螻蟻軰真得孟子所存矣東坡問老杜何如人或言似司馬遷但能名其詩耳愚謂老杜似孟子盖原其心也䂬溪韋蘇州云身多疾病思田里邑有流亡愧俸錢郡中燕集云自慚居處崇未覩兹民康余謂君子當切切作此語彼有一意供租專事土木而視民如讎者得無愧此詩乎同上賈生終童欲輕亊征伐大抵少年躁鋭使經歴老成當不如此昔人欲沉孫武於五湖斬白起於長平誠有謂哉嘗爱老杜云慎勿吞清海無勞問越裳大君先息戰帰馬華山陽又有安得壯士挽天河净洗甲兵長不用安得務農息戰閗普天無吏横索錢願戒兵猶火㤙加四海深不眠憂戰伐無力正乹坤其愁歉憂戚盖以人主生靈為念孟子以善言陣戰爲大罪我戰必克爲民賊仁人之心易地皆然黄常明臨川云黄雀百頭顱長行萬里餘因君令出守暫得免苞苴使能行此言則虐生類以飽口腹刻疲民以肥權势者寡矣其詩才二十字耳崇仁愛抑奔競皆具焉何以多爲杜云築埸怜穴蟻拾穗許村童人謂有仁愛民物意臨川詠促織云只向貧家促機杼㡬家能有一鈎絲愚謂世之嚴督征賦不恤疲瘵之有無者雖魁然其形實㣲䖝智爾䂬溪元結刺道州承兵賊之後徴率煩重民不堪命作春陵行其末云何人采國風吾𣣔獻此詩以傳考之結以人困甚不忍加賦嘗奏免稅租及和市雜物十三萬緡又奏免租庸十餘萬緡因之流亾盡歸乃知賢者所存不特空言而巳丹陽集范文正淮上遇風云一棹危於葉旁觀欲損神他年在平地無忽險中人雖弄翰戯語卒然而作險済加澤之心未嘗忘也黄常明元道州㫪陵行云所願見王官撫飬以惠慈柰何重驅逐不使存活爲逋緩違詔令䝉責願所冝亦云守官貴守道不愛能適時賊退示官吏云使臣将王命豈不如賊焉令𬒳徴歛者迫之如火煎誰知絶人命以作時世賢子羙志之曰令盗賊未息知民疾苦得結軰十数人為邦伯萬姓氣吐天下少安立可待巳余謂漫叟所以䏻然者先民後已輕官爵重人命故也觀其石魚詩云金魚吾不湏軒冕吾不愛此所以能不狥權勢而專務爱民也杜乃知正人意不苟飛長纓可謂相知深矣同上友義門蘇武李陵在武帝時同爲侍中金蘭之義素篤武拘於匈奴明年而陵始降雖逆順之勢殊悲􅌚之情異然朋友之誼此心常烱烱也觀陵海上勸武使降之言非不切至而武之所以告陵者不過明吾忠義之心而已而未嘗一語及陵之叛若告衛律者則不然盡辭詬詈歸之於不忠不臣之科而此以莭義臨之㡬使悪死此亦可以見於陵厚矣後武得歸陵置酒賀武曰今足下還歸揚名於匈奴功顯於漢室雖古竹帛所載丹青所畫何以過子卿故李太白蘇武詩云渇飲月窟水飢飡天上雪東還沙塞逺北愴河梁别泣把李陵衣相涙成血盖亦是意語爾韵語陽秋石林詩話元豊間東坡繋獄神宗本無意罪之時相因舉軾檜詩根到九泉無曲處歲寒惟有蟄龍知且云龍飛在天軾以爲不知已而求知地下之蟄龍非不臣何得章子厚従而觧之遂薄其罪而王㝎國見聞録云東坡在黄州時上欲復用王禹玉以歲寒惟有蟄龍知激怒上意章子厚力觧遂釋子觀東坡自獄中出與章子厚書云某所以得罪其過悪未易一二數平時惟子厚與子由極口見戒反復甚苦某強狼自不以爲然又云異時相識但過相稱譽以成吾過一旦有患難無復相哀惜唯子厚平居遺我以藥石及困急又有以救䘏之真與世異矣則知坡繋獄時子厚救觧之力爲多石林詩話不妄也陽秋東坡歸陽羡時流離顛躓之餘絶祿巳數年受梁吉老十絹百絲之可見非有餘者李憲仲之子廌以四䘮未舉而見公則盡以贈之且贈以詩曰推衣贈孝子一漑滋湯旱誰能脫左驂大事不可緩章季黙三䘮未葬亦求於公公亦以助之有不辭毛粟施行自丘山積之句其髙盖出於天資矣同上㓜敏門西清詩話云魯直少警悟八歲能作詩送人赴舉云送君歸去明主前若問舊時黄庭堅謫在人間今八年此以非髫稚語矣桐江詩話云山谷七歲作牧童詩云騎牛逺逺過前村吹笛風斜隔隴聞多少長安名利客機関用盡不如君林傑㓜而聦惠言發成文質莹凝脂音清扣玉, WYG: 巻}
