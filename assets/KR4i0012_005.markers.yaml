  - {type: substitution, offset: 6558, original: 莹, replacement: 瑩, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-17096}}
  - {type: variant, offset: 6566, length: 976, content: 聚群書又妙于手談當時名公多與之交及有是子益大其門亷使崔侍郞手與之遷聀詞云家蔵萬卷學富三冬傑五歳父因挈行云云後業詞賦頗振聲光有仙客入壼中賦云仙客以變化隨逍遥放情處於外則一壼斯在入其中則萬象皆呈飛閣重樓不是人間之狀竒芲異木無非物外之名至九歳謁大夫盧貟常侍黎埴無不嘉奬㝷就賔薦日在讌筵侍御李逺支使趙格深所知仰不捨斯湏和趙支使詠荔枝尤佳云金盤摘下排朱顆紅壳開時飲玉漿副使鄭立竒童傳制使劉潼序以貽之閩川名士傳王元之年七八歲已能文畢文蕳公爲郡從亊始知之問其家以磨麵爲生因令作磨詩元之不思以對但存心裏正無愁眼下遲若人輕著力便是轉身時文蕳大竒之嘗扵子弟中講學一日太守席上出詩句鸚鵡能言争似鳯坐客皆未有對文蕳寫之屏間元之書其下蜘蛛雖巧不如蚕文蕳歎息曰經綸之才也遂加以衣冠呼爲小友至文蕳入相元之已掌書命矣聞見録後志氣門蔡寛天詩話云太白之從永王璘世頗疑之唐書載其亊甚畧亦不爲明辨其是否獨其詩自序云夜半水軍来潯陽滿旌旃空名適自誤迫脅上楼船從賜五百金弃之若浮烟辭官不受賞翻謫夜郎天然太白豈從人爲亂者㦲盖其學本出從横以氣俠自任當中原擾攘時𣣔藉之以立竒功耳故其廵歌有但用東山謝安石爲君談笑静胡沙之句至其卒章乃云南風一掃胡塵静西入長安到日邊亦可見其志矣大抵才髙意廣如孔北海之徒固未必有成功而知人料事尤其所難議者或責以璘之猖獗而欲仰以立事不能如孔巢父䔥頴士察於未萌斯可矣若其志亦可哀巳蘇子由云李白詩類其爲人俊發豪放華而不實好事喜名不知義之所在也語用兵則先登䧟陣不以爲難語㳺俠則白晝殺人不以爲非此豈其誠能也白始以詩酒奉事明皇遇讒而去所至不改其舊永王將㩀江淮白起而從之不疑遂以放死今觀其詩固然唐詩人李杜稱首今其詩皆在杜甫有好義之心白所不及也漢髙祖歸豊沛作歌曰大風起兮雲飛揚威加海内兮帰故郷安得猛士兮守四方髙帝豈以文字髙丗者帝王之度固然發於中而不自知也白詩反之曰但歌大風雲飛揚安得猛士守四方其不識理如此老杜贈白詩有重與細論文之句謂此類也髙齋詩話云荆公題金陵此君亭詩云誰怜直節生来瘦自許髙才老更刚賔客毎對公稱頌此句公輒顰蹙不樂晚年與平甫坐亭上視詩牌曰少時作此題榜一傳不可追改大抵少年題詩可以爲戒平甫曰此楊子雲所以悔其少作也石林詩話云荆公以意氣自許故詩語惟其所向不復更爲涵蓄如天下蒼生待霖雨不知龍向此中蟠又濃縁萬枝紅一點動人春色不湏多又平治險穢非無力潤澤焦枯是有才之類皆直道其胸中事後爲郡牧判官從, WYG: ''}
