  - {type: variant, offset: 0, length: 3847, content: 增修詩話總龜卷之二十一詠物門下東坡橄㰖詩云紛紛青子落紅塩氣味森森苦且嚴待得㣲甘回齒頰巳輸崖蜜十分甜范景仁言橄㰖木高大難采以塩擦木身則其實自落所以有落紅塩之語南人誇橄㰖河東人誇棗直方詩話李公擇種竹舘中語同舎曰後人指此竹必云李文正所植貢父笑曰文正不獨繫筆亦知種竹耶時有筆土李文正故云后到貢父西省種竹東坡有詩云舊徳終呼名字外後生誰續笑談餘謂此也又一本云尔後貢父種竹坡有詩云舊徳言忘乆新材得再培亭亭思婦石下閱㡬人代蕩子長不歸山椒乆相待㣲雲䕃髮彩𥘉月輝蛾黛秋雨叠苔衣春風舞羅帶宛然姑射姿矯首塵冥外陳迹遂云窮佳期從莫再脫如魯秋氏妄結桑下愛玉質委泥沙悠悠復安在此賀方回作望夫石詩也交㳺間無不愛者余謂田承君云此詩可以見方回得失其所得者漸磨之功所失者太粘着皮骨耳承君以為然楊皤字公濟爲蓴菜詩云休說江東春水寒到來且覔鑑湖船鶴生嫩頂浮新紫龍脫香髯帶舊涎玉割鱸魚迎刄滑香炊稲飯落匙圓歸期不待秋風起漉酒調羹任我年時人以為讀其詩不必食蓴羮然後知其味余以爲可以言詠物未可以語詩耳陳君節字明信言錬句不如錬韻余以爲若只覔好韻則失於首尾不相貫穿參寥云東坡在徐州日嘗爲秦少游置酒少㳺飲罷擁一官妓從參寥書其裙帶云寄語巫山窈窕娘好將閒夣惱㐮王禪心巳作沾泥絮不逐春風上下狂並同前踘蹴惟柳三復能之丁晋公亦好焉晋公詩曰背裝花屈膝白打大㢘斯進前行两歩蹺去立多時古今詩話郭希聲𥿄牕詩曰偏宜酥壁稱閒情白似溪雲薄似氷不是野人嫌月色免教風弄讀書燈聞蛩詩曰愁殺離家未逹人一聲聲到枕前聞苦吟莫入朱門裏滿耳笙歌不聽君青瑣後集巴蜀三紀以來藝能之士精於書畫者衆矣沙門曇彧學李陽氷篆曇彧則神大師門人也道士張昭嗣效柳公權書昭嗣則傳直天師杜光庭門人也工部元員外昭嘏倣韓擇八分書昭嘏亦光庭門人僧暁巒攻張芝草書曉巒則歸夣弟子皆超其本而差其肩獨黄少鑑筌邉鸞崔竹䖏士滕昌祐擬梁廣花草野人張道隱張藻松石道隱不事論談不與人交徃不冠帶不拜跪人謂之猱頭相國李昊爲著名道隱常在綿竹山中李司議文才繼閻立本寫真書畫八人皆妙絶當代野人平生讀莊老之書有暇則性好圖龍之真形興思忽至即畫百尺之狀縱意揮畫苟不稱意則塗抹之不啻千餘軀而巳飄飄然雲隂雨氣似蜿蜒之勢擲筆撫掌以為怡逸常以此為適意之作亦曾撰集龍証筆訣三卷傳於家丁未年彭州倅鄭昭請圖真龍扵州城之西門太山府君之祠為民致雨於是與二道士數僕夫秉燭以畫使人槌皷噴笛掌祠者頓足起舞其夕三更風雨大沛柰何一時之戯亦濟農事有蔣貽恭留題詩曰世人空觧効丹青惟子通玄得墨靈應有鬼神看筆下豈無風雨助成形威疑噴浪歸滄海勢欲拿雲上杳冥静閉緑堂深夜後曉來簾幕似聞腥野人閒語僧齊巳松詩云雷電不敢伐靈勢蠹萬端􅍪依乾節死蛇人朽根蟠影浸僧禪湿風吹鶴夣寒㝷常風雨夜疑有鬼神看小松云發地纔盈尺蟠根巳有靈嚴霜百艸死深院一株青後夜蕭騷動空堦蟋蟀聴誰於千歲外吟倚老龍形續本事詩白傳柳詩二首云青青一樹傷心色會入㡬人離恨中為道都門多送别長條折盡减春風又一樹春風萬萬枝嫩扵金色軟扵絲永豐西角荒烟裏盡日無人屬阿誰又顧雲詩云㶚岸晴來送别頻相偎相倚不勝春自家飛絮猶無定争把長條絆得人唐宋詩云羅隱作續本事詩隂鏗石詩云天漢攴機罷仙人捧膞餘零陵舊是燕昆明本學魚還當榖城别自下解兵書羅鄴水詩云漾漾悠悠㡬泒分中浮短棹與鷗群遥天帶雨淹芳草玉洞飄花下白雲静稱一竿持處見急流孤舘覺來聞隋家柳色還堪恨東入長淮日又曛鄭谷云竹院松廊分數沠晴空清碧亦逶迤落花相逐向何處幽鷺獨來無限時洗鉢老僧臨岸乆釣魚閒客捲綸遲晚來一片連莎緑悔與滄浪有舊期韓喜云方員不定性空柔東注滄溟早晚休高截碧塘長耿耿逺飛青嶂更悠悠瀟湘月浸千年色夣澤燈含萬古愁别有嶺頭嗚咽䖏為君更作㫁腸流並同前唐高相國崇文本薊門將校討劉闢有功授西川節度一旦雪下諸從事吟賞有詩渤海鄙言多呼人為􅐴児此日筵上謂賔客曰某雖武夫亦有一詩乃口札云崇文崇武不崇文提戈出塞號將軍那箇􅐴児射落鴈白毛空裏亂紛紛其詩着題皆謂北齊敖曹之比太尉駢即其曾孫也鎮蜀日以蠻蜒侵暴乃築羅城四十里朝廷雖加恩賞亦疑其固護或一日奏樂聞樂聲知有改移乃題風筝寄意曰夜静絃聲響碧空宫商信任徃來風依稀似曲纔堪聽又𬒳風吹别調中旬日果移鎮渚宫北夣瑣言馮㳙分符眉州不得之任跼蹐於陳田之間覊愁六年徒歩湘湖著懷秦賦有南冠梁川歌詩集皆傷蹭蹬也有蜀駝引其要云自古皆傳蜀道難尔何能過㧞蛇山忽驚登得雞翁磧又恐碍着鹿頭關昻藏大歩𧖟叢國曲頸㣲伸高九尺卓女窺窓莫我知嚴仙㨿案何曾識題攴機石云不隨俗物皆成土只待良時却𥙷天苦雨行云釜魚化作池中物木履浮為天際船皆惜已之不遇也蜀城拆體之際㡬至殍殕因投鬻米家活有詩云取水郎中何日了破柴員外㡬時休早知蜀地區娵與乃訓如此与也悔不長安大比丘即収足大坐也同前徐仲雅題合歡牡丹云平分造化㕠包去拆破春風两面開湘湖故事蔣維東字孟陽零陵人旅中書懐云未有一夜夣不歸千里家落花云流水從將去春風解送來零陵總記東華觀在邵州城下江岸俗謂之水北觀有松偃亞數枝凡八面上有一枝中折搭在半樹間復生垂下掃壇逰人以手扳而撼之則千萬枝皆動覇國時天䇿府學士徐東野坐事謪居扵郡見其魁異賞翫無巳因為詩有序序略云揺一枝則萬枝動看一面則八面同白犬出其根青羊入其腹漢髙祖琥珀枕虚真君茯苓人疑其孕也詩云半巳化為石有靈通碧湘生逢堯雨露老值漢風霜月滳蟾心水龍遺胸骨香鹿於毫末后曾見幾興亡裴說鷺鷥云却為分明極翻令所得遲雍陶云立當青艸人初見行近白蓮魚未知同前又古今詩話所載馮明道舉此詩不知其為鷺鷥也鸕鷀色黒而頭長能沒水捕魚其疾如飛栖宿之處其下雖水深魚多未嘗犯諺云鸕鷀不打脚下塘杜荀鶴詩云深水有魚㗸得出看來却是鷺鷥饑鸜鵒居人多飬之五月五日去其舌尖則能語聲尤清越雖鸚鵡不能過也僧虚中有詩云菖蒲花不艶鸜鵒性多靈相思樹其狀尤佳子員而紅故老云昔有人北没於邊其妻追思之泣於樹下而卒因號相思樹黄損鷓鴣詩云而今世上多離别莫向相思樹下啼盖採其意也柘樹多叢生幹踈而直葉豐而厚春𧖟食之其絲以冷水繰之謂之冷水絲可以瑟絃盖檿絲之類蔣宻詠桑柘詩云綺羅因此木桃李謾同時楊桐葉細冬青臨水生者尤茂居人遇寒食採其葉染飯色青而有光食之資陽氣謂之楊桐飯道家所謂青飢飯鄭畋二十八宿詩云員明青飢飯光潤碧霞漿謂此櫟樹多生岡阜之上大則偃亞小則聳𡵨踈曠而性直伐為薪鍜為炭其力倍扵常木王正詩云未可輕樗櫟尤能濟雪霜木蘭花枝葉俱踈花即裏白表紫或有四季開者生扵深山者尤大可以爲船陸龜蒙木蘭花詩云曾向木蘭船上過不知船是此花身古今詩話載全篇謂是李義山作映山紅生於山坡欹側之地高不過五七尺花繁而紅輝映山林開時杜鵑始啼又名杜䳌花成幹詩云杜鵑花與鳥怨艶两何賖疑是口中血滳成枝上花一聲寒食夜數朶野僧家謝豹出不出日遲遲又斜並同前羅漢絛後洞有草蔓結如帶長丈餘附木而生相傳謂之羅漢絛畢田詩云五百移栖絶洞深空留轍跡杳難㝷緑絲絛帶何人施長到春來掛滿林湘中故事舒王與薛處士碁賭梅花詩輸一首曰華髪㝷春始見梅一枝臨路雪培堆鳯城南北他年憶杳杳難㝷驛使来與俞秀老至報寜王假寐秀老私跨王驢謁寳覺禪師有頃秀老至王曰為士子敢盗跨吾驢秀老願自贖其罪王曰罰松聲詩一首秀老立就詞極佳人忘之余𥙷曰萬壑揺蒼烟百灘度流水下有跨驢人瀟瀟吹醉耳冷齋夜話前軰花詩多用羙女比狀如云若教觧語應傾國任是無情也動人俗㢤山谷酴醿詩曰露􅊜何郎試湯餅日烘荀令炷爐香乃是以丈夫比之若出類而吾叔彭淵材作海棠詩又不然曰雨過温泉浴妃子露濃湯餅試何郎尤工也曾子宣夫人魏氏作虞羙人草行云鴻門刀斗紛如雪十萬降兵夜流血咸陽春殿三月紅覇業巳隨烟燼㓕剛強必死仁義王隂陵失道非天亡英雄本學萬人敵何用屑屑悲紅妝三軍散盡旌旗倒玉帳佳人坐中老香魂夜逐劒光飛青血化為原上草芳菲寂寞寄寒枝舊曲聞來似歛眉哀語徘徊愁不語恰如初聴楚歌時㴞滔逝水流今古漢楚興亡两丘土當時遺事乆成空慷慨樽前為誰舞舒王在鍾山有道士來謁因與碁輙作數語曰彼亦不敢先此亦不敢先惟其不敢先是以無所争惟其無所争故能入於不死不生舒王曰此特碁隱語東坡詩曰客來茶罷渾無事盧橘楊梅尚帶酸張嘉甫曰盧橘何種果也曰枇杷是矣事見相如賦嘉甫曰盧橘夏熟黄柑橙楱枇杷橪柿亭柰厚朴盧橘果枇杷不應重用應劭注曰伊尹書曰箕山之東青鳥之所盧橘常夏熟不㨿之而何也坡笑曰不𣣔爾余游儋耳見黎氏出東坡别海北詩曰我本儋耳民寄生西蜀州忽然跨海去譬如亊逺逰平生生死夣三者無劣優知君不再見欲去且少留又登望海亭柱間有擘窠大字曰貪看白鳥横秋浦不覺青林沒暮潮又謁姜唐佐見其毋余問識蘇公乎曰然無柰好吟詩甞杖而至有包燈心𥿄公以手拭開書滿𥿄余索讀之醉墨欹傾曰張睢陽生犹罵賊嚼齒穿齦顔平原死不忘君握拳透爪余至瓊州有長短句賦燈蛾曰宻燭花猶清夜䦨粉衣香翅遶團圞人皆認假為真實蛾豈將燈作火看方嘆息為遮攔也知愛處實難拚忽然性命隨烟㷔始覺從前𬒳眼瞞老杜詩曰笋根稚子無人見沙上鳬雛傍母眠世不解稚子無人見何等語唐人食筍詩曰稚子脫錦綳駢頭玉香滑則稚子為筍明矣賛寕雜記曰竹根有䑕大如猫色類竹名竹豚亦名稚子余問韓子蒼子蒼曰筍為稚子老杜之意不用食筍詩亦可老杜北征詩曰惟昔艱難初事與前世别不聞夏商衰中自誅褒妲意者明皇鑑夏商之敗畏天悔過賜妃子死也而劉禹錫馬嵬詩曰官軍誅佞幸天子捨妖姬群吏伏門屏貴人牽帝衣白樂天長恨歌曰六軍不發無柰何宛轉蛾眉馬前死乃官軍迫使殺妃子謌詠禄山叛逆耳孰謂劉白能詩㢤北征詩識君臣大體可貴也衡州花光仁老以墨冩梅花魯直嘆曰如嫩寒春暁行孤山籬落間但欠香耳余賦長短句曰碧瓦籠晴香霧遶呵手西偏小駐聞啼鳥風度女墻吹語笑南枝破臘應開了道骨不凡江瘴曉春色通靈醫得花重小抱醸寒春杳杳一聲畫角光殘照又曰入骨風流國色透塵種性真香為誰風流鬂啼粧半樹水村春暗雪壓枝低籬落月高影動池塘高情數筆寄㣲茫小寝初開霧帳並同前増修詩話總龜卷之二十一百家詩話總龜後集卷之二十一, WYG: ''}
