  - {type: variant, offset: 2891, length: 2376, content: 卷之四十二集一百家詩話總龜後集卷之四十二鬼神門昔年陳州有女妖自云孔大娘能昏夜扵鼓腔中與人語言尤知未来事時晏元憲守陳方製小辞一闋脩改未定而孔大娘已能歌之矣亦可怪也長安慈㤙寺有数女仙夜逰題詩云黄子陂頭有月明強踏華筵到曉行烟波山色翠黛横折得落花逺恨生化爲白鶴飛去明夜又題一首湖水團團夜如鏡碧樹紅芲相掩映北斗䦨干移曉柄有似佳期常不定亦婉約可愛許彦周詩話請紫姑神大抵能作詩然不甚過人舊傳一士人家請之旣降偶書院中子弟作雨詩因率尔請賦頃刻書滿𥿄其警句云簾捲滕王閣盆翻白帝城誠可喜也同上雲齋廣録載司馬槱官于錢塘夢蘇小小歌蝶恋芲詞一闋其詞頗佳詞云妾在錢塘江上住芲開芲落不記流年度燕子却㗸春色去黄昏幾度消消雨蟬鬂犀梳雲欲吐檀板新声唱徹黄金縷酒醒夢回無覔処凄凉明月生秋圃苕溪漁隱魯直記江亭鬼所題詞有泪眼不曾晴之句余以此鬼剽東坡樂章有秋雨晴時泪不晴之語復齋漫録東坡記秦少㳺言寳應民有嫁娶㑹客者酒半客一人徑赴水曰有媍人以詩招我詩云長橋直下有蘭舟破月冲烟任意逰金玉滿堂何所用争如年少去来休余讀張君房脞說進士謝朏寓居宝應晚至縣橋忽見女郎自舟中出曰某楚小陂也可見訪舟中懐中出詩二首其一云畫橋直下是蘭舟破月冲烟任意逰金玉滿堂無用處早隨年少去来休其二云妾貌君才兩不常君今休苦更思商児家自有清溪水飲著方知氣味長前篇與少㳺所言不同者𢾗字更有二首爲異至謂寳應亦同君房著脞說在真庙時不應東坡少㳺之忘也復齋漫錄余讀江南録丘孟陽有賦名嘗夢一官人延入一第中具飲其旁几上有書一卷孟陽展讀謂曰斯乃吾所述賦藁何至兹乎其人曰昔公焚之時吾得之矣孟陽因就求之荅曰它日若至衡山必當奉還後官至衡州茶陵令乞致仕卒於衡州今世焚故書必毀而燔之盖可信也文昌雜錄吕申公夷蕳嘗通判蜀中忘其郡名𪠘宇中素有鬼物號榆老姑乃榆木精其狀一老醜婦常出厨間與群婢相偶或時不見家人見之乆亦不以爲怪公呼問之即下堦拜之云妾在宅曰乆雖非人然不為禍公亦置而不問常謂公他日必大貴一日忽懐妊群婢戯之自言非乆當産遂月餘忽不見出云巳産矣請視之後园榆木西南生大贅乃是視之果然見聞録東坡記徐州通判李綯有子年十七八不善作詩忽咏落芲云流水難窮目斜陽易断腸誰同砑光㡌一曲舞山香人驚問之若有物慿者云是謝中舎問其砑光㡌事自云西王母宴群仙有舞者戴砑光㡌㡌上簮芲舞山香一曲未終花皆落去余讀唐羯皷録汝陽王璡明皇愛之乃隨逰幸璡常戴砑綃㡌子打曲上有摘紅槿芲一朶置之㡌上遂奏舞山香一曲芲不落墜上笑此事與前極相類復齋漫録陳甲為成都守李西羙璆舘客舎于治事堂東偏之雙竹齋紹㒷二十一年四月西羙浣花囬得疾旬日間甲巳寢聞堂上婦人語笑声即起映門窺觀有女子十餘皆少艾有容色而衣結束頗與世俗異或坐或立或歩庭中甲猶疑其為帥家人以主人翁病輒出但怪其多也頃之一人曰中夜無以為樂盍賦詩乎即口占曰晚雨簾纎梅子黄晚雲捲雨月侵廊隂把酒不成飲識着無情更断腸一人應声荅之曰舊時衣服尽雲霞不到迎仙不是家今日楼䑓渾不識祗因古木記宣華餘人方綴思甲味其詩語不類人方悟為鬼物忽寂無所見后以語蜀郡父老皆云孟氏有囯時嘗造宣華殿扵摩訶池上今郡堂乃其故趾所見之鬼妾云西羙病遂不起夷堅志魯直自黔安出峽登荆州江亭柱間有詞曰簾捲曲䦨独倚江展暮天無際泪眼不曽晴家在呉頭楚尾数點雪花亂委撲漉沙鷗驚起詩句始成時没入蒼烟叢裏魯直讀之悽然曰似爲予發也不知何人所作所題筆勢妍軟欹斜類女子而有眼泪不曾晴之句不然則是鬼詩也是夕有女子絶艶夢於魯直曰我家豫章呉城山附客舟至此墮水死不得歸登江亭有感而作不意公能識之魯直驚寤謂所親曰此必呉城小龍女也冷齋夜話長安南山下一書生作小圃蒔花木一日有金犢車從数女奴皆艶䴡下飲于庭邀生同坐甚欵洽將別出小碧牋題詩曰相思無路莫相思風裏楊花一片時惆悵深閨獨歸處曉鶯啼断緑楊枝侯鯖録張磪嘗㳺霅上白蘋洲見碧衣女子携手吟咏一篇云碧水色堪染白蓮香正濃分飛俱有恨此別㡬時逢藕隱玲瓏玉花蔵縹緲容何當假雙翼聲影暫相從確逐之化爲翡翠飛去樹萱録番禺鄭僕射嘗㳺湘中宿於馹樓夜遇女子誦詩云紅樹醉秋色碧溪弹夜弦佳期不可再風雨杳如年頃刻不見樹萱録明月清風良宵㑹同星河易翻歡娯不終緑墫翠杓為君斟酌今時不飲何時歡樂此廣記所載鬼詩也山谷云當是鬼中曹子建所作翰林蘇公以為然又一篇云玉户金缸願陪君王邯鄲宫中金石絲簧鄭女衛姬左右成行紈綺繽紛翠眉紅粧王歡轉盻為王歌舞願得君歡長無災苦蘇公以爲邯鄲宫中金石絲簧此兩句不惟人少作而知之者亦極難得耳醉中爲余書此張文潜見坡谷論說鬼詩忽曰舊時鬼作人語如今人作鬼語二公大笑王直方詩話東坡作䖍州八境詩曰山中木客觧吟詩十道四番志記䖍州上洛山有木客鬼與人交甚信未嘗言能作詩也後得續法帖記木客詩云酒盡君莫沽壷傾我當發城市多囂塵還山弄明月方知得句之因徐鉉謂鄱陽山中有木客自言秦時造阿房宫采木者豈鉉未嘗見十道四番志也漫叟詩話春草萋萋春水緑野棠開盡飄香玉綉嶺宫前白髮人猶唱開元太平曲忽然湖上片雲飛不覺舟中雨􅊜衣折得荷渾忘却空将荷葉盖頭歸浦口潮来𥘉渺漫蓮舟溶漾采花難芳心不愜空帰去㑹待潮囬再摘㸔爺娘送我青楓根不記青楓幾廽落當時手刺衣上花今日爲灰不堪著惆悵金泥撲蝶裙春来猶見伴行雲不教布施刚晋得恰似知逢李少君卜得上峽曰秋江風浪多巴陵一夜雨腸断木蘭歌余與魯直夀朋天㑹于伯時齋舎此一卷皆仙鬼所作或夢中所作也又記太平廣記中有人爲鬼物所引入墟墓皆華屋洞户忽爲刼墓者所驚出遂失所見但云芫芲半落松風晚清吾毎愛此兩句東坡酉陽雜爼載鬼詩兩篇山谷喜道之其一曰長安女児踏春陽無處春陽不断腸舞䄂弓弯渾忘却娥眉空帶九秋霜其二曰流水㳙㳙芹弩芽織鳥雙飛客還家荒村無人作寒食殯宫空對棠梨花洪駒父詩話李真言字希古嘗夢至一宫殿有数百妓抛毬人唱一詩覺而記三首云侍宴黄昏未肯休玉堦夜色月如流朝来自覺承㤙最笑倩旁人認綉毬隋家宫殿鎻清秋曽見婵姢颺綉毬金鑰玉簘俱寂寂一天明月照髙楼堪恨隋家㡬帝王舞腰挼盡綉鴛鴦如今重到抛毬處不是金爐舊曰香今古詩話中載此詩只有二首不及此詳俻故盡録之侯鯖録百家詩話緫龜卷之四十二, WYG: 巻}
