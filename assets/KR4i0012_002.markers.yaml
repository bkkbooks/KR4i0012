  - {type: variant, offset: 4440, length: 373, content: 百家詩話緫後集卷之二忠義門世人論渊明自永𥘉以後不稱年號秪稱甲子與思悅所論不同觀渊明讀史九章其間皆有深意其尤章章者如夷齊箕子魯二儒三篇夷斉云天下革命絶景窮居正風凌俗爰感懦夫箕子云去郷之感猶有遲遲矧伊代謝觸物皆非魯二儒云易代隨時迷変則愚介介若人特為正夫由是觀之則渊明委身蓬巷丼黔娄之貧而不自悔者豈非以恥事二姓而然也葛常之子羙詩雖有古殿存世尊亦䝉埃山僧衣藍縷告訴棟梁摧夲即所賦自然及扵乗輿䝉塵股肱非材之意忠義所激一飯不忘君邪黄常明明宗召蜀中舊臣賦蜀主降巨唐詩王偕等譏荒淫独中丞牛希済曰唐主再懸新日月蜀王难保舊山川明宗曰希濟不忘君親忠孝也賜百段余謂希済但能兩觧之辝而巳江革云不能殺身报主得死為幸誓不為人执筆此可以厲臣子之莭䂬溪詩人比雨如絲如膏之類甚夛至杜牧乃以羽林鎗為比恐未尽其形似念昔逰云雲門寺外逢猛雨林黒山髙雨脚長曽奉郊宫為近侍分明􅋏􅋏羽林鎗大雨行云, WYG: 欽定}
