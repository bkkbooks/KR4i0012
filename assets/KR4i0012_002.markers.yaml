  - {type: variant, offset: 5040, length: 1040, content: 集愛國憂民之心如子羙語一何鮮也力士閨闥腐庸惟恐不當人主意挾主勢駈之何所不可脫靴乃其聀也自退之爲蚍蜉撼大樹之喻遂使後學吞聲余竊謂如論其文章豪逸真一代偉人如論其心術事業可施廊庙李杜齊名真沗竊也䂬溪汲長孺叚太尉皆義勇奮不頋身之人至於仁愛撫飬矜怜惻怛無所不至所謂刚者必仁仁者必勇也嘗觀樂天云况多刚狷性難與世同塵希文云吾生豈不幸所禀多刚腸皆心中語也白則有敢辭爲俗吏且𣣔活疲民又云心中有念農桑苦耳裏如聞飢凍聲范有寸懐如春風思與天下共赴姑蘇云豈辭雲水三千里由濟瘡痍十萬民與汲叚正相似黄常明靈徹有相逢盡道休官去林下何曾見一人世傳為口實凢語及抽簮即以此譏之余謂矯飾㒺人固不足論若出於至誠時對知已一吐心胷何害觀昌黎送盤谷云行抽手板付丞相不待彈劾歸農桑贈侯喜便當提携妻與子南入箕無還時如今便當去咄咄無自痴如今更誰恨可便耕灞滻此類凡數十豈苟以飾口㢤其剛勁之操不少屈所守素定故也䂬溪永叔嘗試謁執政坐中賦雪詩云主人與國共憂戚豈惟喜悅将豊登湏怜鉄甲冷徹骨四十餘萬屯邉兵當時乃謂唐韓退之亦能道言語其預裴晋公宴㑹但云园林窮勝亊鍾鼓樂清時不曽如此作閙殊不知老杜一言一詠未曽不在於憂國恤人物我之際則淡然無著夏日歎曰浩蕩想幽薊王師安在哉夏夜歎曰念我荷戈士窮年守邊疆此仁人君子之用心終食不可忘也邊兵之語豈為過哉如退之始知神官未賢聖護短憑愚要我敬雪徑抵樵叟風廊折談僧真作閙詩也䂬溪余觀楚國先賢傳言汝南應璩作百一詩譏切時事編以示任亊者皆怪愕以爲應焚弃之及觀文選所載璩百一篇畧不及時亊何耶又觀郭茂倩雜体詩載百一詩五篇皆璩所作首篇言馬子侯觧音律而以陌上桑為鳯将雛二篇傷翳桑二老无以塟妻子而巳無宣孟之徳可以賙其急三篇言老人自知桑榆之景斗酒自劳不肯為子孫積財末篇即文選所載是也苐四篇似有風諌所謂苟𣣔娯耳目快心樂腹服我躬不悅􅌚安能慮死亡此豈非所謂應焚弃之詩乎方是時曹爽亊多違法而璩爲爽長史切諌其失如此所謂百一者庶㡬百分有一𥙷於爽也而爽卒不悟以及於旤或謂以百言爲一篇者以字数而言也或謂百者数之終一者數之始士有百行終始如一者以士行而言也然皆穽鑿之說何足論哉後何遜亦有擬百一躰所謂靈輒困桑下於陵拾李螬其詩一百十宇恐出於或者之說然璩詩毎篇字数各不同苐不過四十字爾丹楊集杜扁舟空老去無𥙷聖明朝又云報主心巳老以稷契軰人而使老弃閑曠非唯不形怨望且惓惓如此彼遭時遇主言听計從復幸年髩未暮而不能攄誠戮力以圗報效良不愧此歟䂬溪明朝有封亊数問夜如何此幸而得之坐以待旦之意避人焚諌草騎馬欲雞栖所謂嘉謀嘉猷入告爾后于外曰斯謀斯猷惟我后之德也黄常明一朝自罪已萬里車, WYG: ''}
