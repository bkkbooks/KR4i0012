  - {type: variant, offset: 6081, length: 1636, content: 通此與無逸旅􅋙孟子格君心之非汲長孺諫上多慾魏鄭公十漸陸宣公之奉天詔書無二道也同上昌黎云詣闕三上書臣非黄冠師臣有膽與氣不忍死茅茨韋應物送李山人云聖朝多遺逸披胆謁至尊豈是貪寵荣誓將救元元聖俞贈師魯云臣豈爲身謀而邀陛下睠皆急扵得君非爲利禄計也同上杜詩公若登台輔臨危莫愛身寄裴道州蘇侍御云致君堯舜付君等早㩀要路思捐軀此公素所蓄積而未及施設者故樂以語人耳夫全軀碌碌之臣果何能爲汲長孺云天子置公卿寕令從䛕承意縦愛身柰辱朝廷何任遐曰禇彦囬保妻子愛性命遐能制之觀此以騐二詩信有証矣自比稷契豈為過哉岑侍御行軍詩平生抱忠義不敢私㣲軀范文正公云一入諫諍司鴻毛忽其身䂬溪世人喜子羙造次不忘君嘗觀其祖審言除夜云還将万億夀更謁九重城則教忠之家風舊矣張堯佐以進士擢苐累官至屯田貟外郎知開州㑹其姪女有寵於仁家冊爲脩嫒尭佐遂驟迁擢一日中除宣徽節度景靈群牧四使是時御史唐介上䟽引天寳楊國忠爲戒不報又與諫官包拯呉奎等七人論列殿上旣而御史中丞晋百官班𣣔以廷諍卒奪尭佐宣徽景靈兩使特加介一品服以旌敢言未㡬尭佐復除宣徽使知河陽唐謂同列曰是𣣔與宣徽而假河陽為名耳我曹豈可中已邪同列依違不前唐獨争之不能奪仁宗諭曰差除自是中書介遂極言宰相文彦慱以燈籠錦媚貴妃而致位宰相今又以宣徽使結堯佐請逐彦慱而相冨弼又言諌官觀望挾姦而言渉宫掖語甚切直仁宗怒趣召兩府以䟽示之介猶諍不巳樞宻副使梁適叱介使下殿介諍愈切仁宗大怒玉音甚厲衆恐􅍔出不測是時蔡㐮脩起居注立殿陛即進曰介誠狂直然納諌容言人主之羙徳必望全貸遂貶青州別駕翊日御史中丞王舉正救觧之改爲英州別駕始上怒未巳兩府竊議曰必重貶介則彦慱不安彦慱去即吾屬遞遷矣旣而果如其料當是時梅尭臣作書竄詩曰皇祐辛卯冬十月十九日御史唐子方危言𥘉造膝曰朝有巨姦臣介所憤疾願條一二事臣聀敢妄率宰相文彦慱邪行世莫匹曩時守成都委曲媚貴暱銀璫挿左貂窮臘使馳馹邦媛将夸侈中金齎十鎰爲我寄使君竒文織纎宻遂傾西蜀巧曰夜撃鞭扑紅絲緯金縷排科閗八七比比䨇蓮華篝燈戴星出㡬日成一端持行如鬼疾明年觀上元𬒳服穩称質璨然上目遽尔有薄詰旣聞所從求佞對似未失且云奉至尊於妾豈能必遂回天子顔百亊容丐乞臣今得粗陳狡猾彼非一偷威與賣利次苐推甲乙是惟隂猾雄仁㫁冝勇黜必欲致太平在列無如弼弼亦昧平生况臣不阿屈臣言天下公奚以身自䘏君旁有側目喑啞横詆叱指言為㒺上廢汝還蓬蓽是時白此心尚不避斧鑕雖令禦魑魅甘且同飴蜜旣知弗可惧復以強詞窒帝聲亦大厲論奏不容畢介也容甚閑猛士胆爲慄立貶海外春速𣣔爲異物内外官恟恟陛下何未悉即敢救者誰㐮执左右筆謂倘不容盛羙有所咈平明中执法懐䟽又堅述介言或似強百豈无一實恐傷四海和幸勿苦倉卒亟許遷英山衢路猶嗟咄翊日宣白麻稱快口盈溢阿附連諌官去若壊絮虱其間因獲利竊笑等蛇鷸英州五千里瘦馬行䭿䭿毒蛇噴曉霧晝與嵐氣没妻孥不同途風浪過蛟窟存亡未可知雨舘愁傷骨飢僕時後先隨縁拾橡栗粤林多蔽天黄柑雜丹橘萬室通釀酤撫逺無禁律醉去不須錢醒来弄鳴瑟山水仍竒怪巳可消憂欝莫作楚大夫懐沙自沉汨西漢梅子真出爲呉市卒市卒且不慚况兹別乗秩始尭臣作此詩不敢示人及歐陽脩爲編其集時有嫌避又削去此詩是以少人知者故今全録焉東軒筆録鄭谷與僧齊巳黄損等共定今体詩格云凢詩用韻有数格一曰葫蘆一曰轆轤一曰進退葫蘆韻者先二後四轆轤韻者雙出雙入進退韻者一進一退失此則繆矣余按倦逰雜録載唐介爲䑓官廷䟽宰相之失仁庙怒謫英州別駕朝中士大夫以詩送行者頗衆獨李師中待制一篇爲人傳誦詩曰孤忠自許衆不與獨立敢言人所難去國一身輕似葉髙名千古重扵山並逰英俊顔何厚未死姦䛕骨巳寒天為吾君扶社稷肯教夫子不生還此正所謂進退韻格也按韻畧難字苐二十五山字苐二十七寒字又在二十五而還又在二十七一進一退誠合躰格豈率爾而爲之㢤近閱冷齋夜話載當時唐李對荅話言乃以此詩爲落韻詩盖渠伊不見鄭谷所定詩格有進退之說而妄爲云云也素緗雜記唐介始彈張堯佐諌官皆上䟽及彈文彦慱則吳奎畏縮不前當時謂拽動陣脚及唐爭論於上前遂并及奎之背約執政又黜奎而文潞公益不安遂罷政事時李師中詩送唐有並逰英俊顔何厚未死姦䛕骨巳寒之句爲奎發也東軒百家, WYG: ''}
