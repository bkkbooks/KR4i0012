  - {type: variant, offset: 4234, length: 0, content: '', WYG: 何業傍人以累捷誇之笑曰皆不知也牧之嘆訝久之作詩云家住城南杜曲旁兩枝仙桂一時芳老僧都未知名姓始覺空門氣味長蜀僧逺公傷蜀詩曰樂極悲來數有涯歌聲纔歇便興嗟牽羊廢主尋傾國逐鹿奸臣盡䘮家丹禁夜凉空鎻月後庭春老謾開花兩朝基業都成夢林木蒼蒼噪暮鴉南方浮屠能詩者多矣往往多不顯其名福州有一僧作詩百餘篇其中佳句有云虹收千嶂雨潮展半江天又有詩云詩因試客分題僻棋為饒人下子低不减於古人也閩僧懐濬有詩二絶云家在閩山東復東其中嵗嵗有花紅而今再到花紅處花在舊時紅處紅家在閩山西復西其中歲歲有鶯啼而今再到鶯啼處鶯在舊時啼處啼人多誦也大歴中澤潞間有僧號普滿或歌或笑言事多驗建中初潞州佛寺題詩一首而去詩曰此水連涇水雙珠血滿川青牛將赤虎方號太平年此水泚字涇水自涇川兵亂雙珠滿泚也青牛興元二年乙丑赤虎是嵗改元元年丙寅是年賊平陳文惠赴端州艤舟廬陵有胡僧叩舷謂公曰虎目鳯鼻猿身平地不能為也當有攀附然後有所食位極卿相僧為詩一絶曰虎目猿身形最貴湏因攀附即升髙知公今向端溪去助子清風泛怒濤公後登庸青𤨏集廬山佛手巖有絶頂李氏有國日行因禪師居焉李氏詔居棲賢寺未幾一夕大雪逃居舊隠嘗煑茶延僧起托巖扉立化余作偈曰前朝詔住棲賢寺雪夜逃居岩石間想見煮茶延客處直縁生死不相闗東吳僧道潜經臨平作詩云風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲東坡見之大稱賞及坡守徐潜訪之館於逍遙堂士大夫欲識之坡饌客罷具而來坡遣一妓乞詩詩曰寄語巫山窈窕娘好將魂夢惱襄王禪心巳作沾泥絮不逐春風上下狂一座大驚然性偏憎凡子作詩云去嵗春風上苑行爛窺紅紫厭平生如今眼底無姚魏浪蕋浮花懶問名士論少之其作詩追法淵明有逼真處如曰數聲柔櫓滄浪外何處江村人夜歸是也冷齋夜話西湖僧順怡然清苦賦十竹詩城中寸土如寸金幽軒種竹只十箇春風慎勿長兒孫穿我階前緑苔破林下詩云久服林下遊頗識林下趣從渠緑隂繁不碍清風度閒來石上眠落葉不知數山鳥忽飛來啼破幽寂處荆公愛之陳瑩中謫合浦以書謫余為負華巖經入嶺有偈曰大士游方興盡回家山風月絶纎埃杖頭多少閑田地挑取華嚴入嶺來余和之曰因法相逢一笑開俯看人世過飛埃湘南嶺内休分别圓寂光中共往來聞嶺外大雪作二偈寄之曰傳聞嶺外雪壓倒千年樹老兒拊手笑有眼未曾覩故應潤物材一洗瘴江霧寄語牧牛人莫教頭角露又曰偏界不曽藏處處光皎皎開眼失蹤由都緣太分曉園外忽生春萬瓦粲一笑遙知忍凍人未悟安心了静禪師渡溪為漲流所䧟童子掖至㟁坐沙石間垂頭如雨鶴忽指溪作詩曰春天一夜雨霶􅑛添得溪流意氣多剛把山僧推倒却不知到海後如何後無疾而化余夜夢逢一道士一奴負酒瓢隨之道士邀余坐茗坊奴竊飲瓢無有乃笑道士詬欲杖之顧奴曰汝従覺範求詩曰難藏為香釁易滿坐徧小開口所有竭饞奴法當笑句句皆譏其褊可怪也璉禪師工詩舒王以其詩示歐公公曰此道人肝臓饅頭是中無一點菜氣仁廟留住净因禪院作偈進乞還山林曰千簇雲山萬壑流閑身歸老此峰頭殷勤願祝如天夀一炷清香滿石頭又曰堯仁况是如天闊乞與孤雲自在飛桂林僧景淳工詩福老順為余言淳意苦而深世不可遽觧如曰夜色中旬後虗堂坐幾更隔溪􅆐不呌當檻月初生又曰後夜客來稀幽齋獨掩扉月中無事立草際一螢飛余時方十六七心不然之筠溪快山有虎有牧童為虎逐牛捍䕶之竟死石門老衲文公為余言之為作詩以諷含齒被髮而不義者然余徒能諷之其能巳之哉頌曰快山山淺亦有虎時時妥尾過行路一䜿地坐牧兩牯以捶捶地不知顧虎搏䜿如鷹搦兎兩牛來奔虎棄去乃因疴癢挨老樹牯則喘伺同守䕶虎竟不得此牧䜿䜿雖不活牯無負一村囂傳共鳴皷而虎已逃不知處嗟乎異哉兩大武髙誼可與冠髙伍今走仁義名好人行事真憐乃愧汝此事可信文公語為君落筆畄千古詩話總龜巻三十欽定四庫全書}
