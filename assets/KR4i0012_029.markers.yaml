  - {type: variant, offset: 4232, length: 1, content: 増, WYG: 詩話總龜巻二十九欽定四庫全書詩話總龜巻三十宋阮閱撰道僧門道士沈廷瑞彬之子也性坦率直造縣宰之坐宰方治訟而廷瑞至宰戲之曰沈道士何時成道廷瑞應聲曰何須問我道成時紫府清都自有期手握藥苗人不識體含仙骨俗争知宰慙江南野錄吳崇岳泉州人也為龍興觀道士辟榖多年常登其宫松梢禮拜處松枝可六七十尺福建漕使周謂因請隨行抵於徳化縣縣治之東有古松一株髙八九十尺上有鶴巢乃命崇岳登之宛若􅆐狖容易直上出鶴巢之外端身飛歩手無攀縁就纎枝拜如平地其松枝柔軟隨歩低昻略無損處周謂乃為詩贈云楮為冠子布為裳吞得丹霞壽最長混俗性靈常樂道出塵風格早休糧枕中經妙誰傳與肘後方新自冩將百尺松梢幾飛歩鶴棲枝上禮虚皇太平興國中詔入郡閣雅談楚郎中失其名宦遊江東泊金陵岸下子弟輩遊茅山見一老僧住一小庵謂諸子曰何所至此告以因遊賞林泉而來日晩欲丐宿可乎僧曰舍陋不可相容此二三里有寺可宿因指諸子令往抵寺已暮矣寺僧問誰指來諸子曰山下老僧寺僧曰聞此有老僧甚久未之見也凌晨往則庵中已無人惟松上有詩云數株松檜食不盡一沼荷衣有餘剛被傍人相問當老僧今日又遷居摭遺僧無夢嘗在府畿村落中求化手持大木牌題詩二絶曰心為車兮身為軾車動軾隨何意息交梨火棗是誰無自是不為荆與棘身為客兮心為主主人和平客安堵若還客主不康寧精神必定隨君去翰府名談景徳中日本僧照寂入貢三司使丁晉公甚恱之晉為言姑蘇山水奇秀照寂心愛而留因止於吳門寺其徒不願􅀙者遣數人歸本國後以黑金水瓶寄晉公并詩曰提携三五載日用不曽離曉井斟殘月春爐釋夜澌鄱銀難免侈萊石易成虧此器堅還實寄公應可知談苑僧䕶國江南人也攻詞翰題醴陵玉仙觀云白雲至今凝不㪚星壇松殿幾千枝往往笙歌生夜半瀑布西行遇石橋黃精採根還採苖路逢一人擎一椀茶花夜來風吹滿又言家住在東坡白犬相逢邀我過南山石上有碁局曾使樵人爛斧柯此篇絶佳詩僧中不可得也大厯末禪僧元覧住荆州陟岵寺道髙風韻人不可親章璪嘗畵松於齋壁符載賛之衛象詠之亦一時四絶覧悉加堊焉人問其故曰無事疥吾壁也僧那即其甥發瓦探壊墙薫䑕覧未嘗責弟子議論而布衣一食亦不稱之或怪問之乃題詩於竹曰大海従魚躍長空任鳥飛古今詩話沙門貫休鍾陵人精於筆札荆州成令問其筆札法休曰此事可登堂而授安可草草而言成令䘖之乃遞於黔中因為病鶴詩見意曰見說氣清邪不入不知爾病自何來同前唐昭宗以錢武肅平董昌功拜鎮東軍節度使自稱吳越國王貫休投詩曰貴逼身心不自由幾年勤苦蹈林􅉌滿堂花醉三千客一劍霜寒十四州萊子衣裳宫錦窄謝公篇詠綺霞羞他年名上凌烟閣豈羡當時萬戸侯武肅愛其詩遣諭令改為四十州乃可相見貫休性偏答曰州亦難添詩亦難改閑雲孤鶴何天不可飛遂入蜀以詩投孟知祥詩云一瓶一缽垂垂老萬水千山得得來古今詩話温州鴈蕩山自古圗史不載按西域書云諾矩羅居震旦東南大海際鴈蕩山芙蓉龍湫唐貫休作賛云鴈蕩經行雲漠漠龍湫宴坐雨濛濛北山南山有芙蓉峰下有芙蓉驛前瞰大海山頂有大池相傳以為鴈蕩有二潭以為龍湫又有經行臺宴坐峰皆以貫休詩得名也唐大興善寺東廊之南有僧不出院轉法華經三萬七千部夜常有狐子來聼長慶初庭前有牡丹一朶合歡僧幽之詩曰三萬蓮經三十春平生不踏院門塵杜牧之弱冠登第再中制科因與二三同年城門遊覧至丈六寺有禪僧擁褐坐與之語可佳問杜姓名具以對又曰}
