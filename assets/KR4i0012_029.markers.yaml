  - {type: variant, offset: 4243, length: 0, content: '', WYG: 五十俸省錢請未足甚用還債還負亦無餘買酒買肉何曽夢妻兒終日只愁飢婢僕過冬猶受凍更有不識事閑人獻詩獻啟覔甚甕張獻圖主簿潁人善嘲謔以老榜得班行寄書于}
  - {type: variant, offset: 4244, length: 0, content: '', WYG: 人曰汝作鸞孤我為奉職不忝矣又譏州縣官之貪污者云捧頭舊血添新血篋裏黄金壓白金古今詩話王丞相好嘲謔初執政對客悵然曰投老欲依僧再三言之客應之曰急則抱佛脚丞相善之復曰投老欲依僧是古人一句詩客曰急則抱佛脚亦是俗諺全句上去頭下去脚豈不是的對丞相大笑祕書省東即右威衛營荒蕪摧毁其大㕔逼校書院南對御史臺有人嘲之曰門縁御史塞㕔為校書侵宋中道有俊才而身短小人多戲之蘇子羙與中道年相懸然甚愛其才調道亦傾心作詩論交子羙長大魁偉與中道並立下視曰交不自此京師井市語也號中道為宋錐為其頴利而么麽云贈之詩曰譬如利錐末所到物巳破後中道通判洛州洛州本趙地有毛遂墓聖俞作詩云舉錐處囊事亦所以戲之也太宗時進士同年有數人名似姓者或有取以為詩云郭鄭鄭東東野絡馬張張夏夏侯璘熈寧中有崔度崔公度王詔王子詔皆的對也又有章君陳陳君章二人未有似者唐東方虬欲為西門豹作對亦當時好事者為此對耳給事中馬子山穆王八駿有山子馬王丞相云馬子山騎山子馬莫有對者相傳久之有姓錢人為衡水令罷歸或取以為對云錢衡水盗水衡錢錢聞之變色或者對云吾正欲作對耳非有實也古今詩話咸通中以舉子多車服侈異下令不許乘馬時塲中不下千人皆跨長耳或嘲之曰今年勅下盡騎驢短㡌長鞭滿九衢清瘦兒郎猶自可就中愁殺鄭昌圗鄭昌圖魁偉故有此句開元中宰相蘇味道張昌齡皆有詩名暇日相會互相嘲謔昌齡曰某詩所不及相公者為無銀花合葢蘇元夕詩有火樹銀花合之句也味道曰某詩所以不及相公者為無今同丁葢張贈張昌宗詩有昔日浮丘伯今同丁令威之句也遂相對撫掌而笑武后朝左司郎中張元一滑稽時西戎犯邊武后欲武氏立功因行爵賞命武懿宗統兵平之冦未入境懿宗􅅻逾邠畏懦而遁懿宗陋短元一嘲之曰長弓與短箭蜀馬臨髙蹁去賊七百里隈墻獨自戰忽然逄着賊騎猪向南遁太后聞之未曉曰懿宗無馬耶何故騎猪元一觧曰騎猪夾豕也天后大笑捴章二年興善寺火塑像焚盡道士李宗嘲之曰道善何曽善言興又不興如來燒亦盡惟有一羣僧文潞公嘗言潞中有一士人憂制中游處坐中有人嘲輙嘗自云有年光徳一王伸戀酒貪歌不厭貧三年得替歸朝去贏得髭鬚白似銀甚不覊檢也如此特好事人有善必優禮待之僧乾康金仙皆以能詩登門士儒問羽卿通尚書春秋鄧潜有詞學每接見則疑忘倦議者以此稱之零陵總記雪峰恱禪師與興化銑公友善既老迎送不已恱戒曰公不袖手山林尚忍垢乎銑一日送官墮馬損臂恱作偈戲云大悲菩薩有千手大丈夫兒誰不有興化和尚折一支猶有九百九十九南華恭長老同調大愚少叢林有書叙法乾悦作偈曰與師瓶錫寄江湖共憶當年在大愚堪笑堪悲無限事甜瓜生得苦葫蘆東坡宿曺溪讀傳燈錄燈花墮巻上燒一僧字以筆記於窗曰曺溪岑􅄫寞燈下讀傳燈不覺燈花落茶毘一個僧詩話總龜巻三十八欽定四庫全書詩話總龜巻三十九宋阮閱撰詼諧門下兵部李内相濤唐宗室子自河陽令一舉状登科小字社翁毎於班中多自名焉其坦率如此翰林月給内醖兵部甞因春社寄翰林一絶云社翁今日没心情為乏治聾酒一瓶惱亂玉堂将欲遍依稀巡到第三㕔顔師古觧霍去病穿城蹋鞠云以皮為支實以毛蹴蹈為戯也顔時鞠乃如此至後唐已不同歸氏子弟嘲皮日休曰八片尖斜砌作毬火灰撏了水中揉一包閑氣如常在惹踢招拳卒未休仁宗朝試山海天地之蔵賦長沙進士陳說同進士出身謁郷人胥偃内翰因舉其賦胥曰賦頗佳但其間貼故事少耳說歸作詩曰紫宸較藝集英聡作賦方知尚欠功事内少他些子鉄殿前嬴得一堆銅黄紬被下夫人煖青𤨏窓中學士空寄語交朋湏細認主司頭惱太冬烘盧延遜五舉方登第甞作詩云狐衝官道過犬刺客門開租庸張相毎誦之又曰餓猫臨鼠穴饞犬䑛魚砧成中令激賞之又曰栗爆燒氊破猫跳觸鼎翻王中懿愛之盧甞謂人曰平生投謁公卿不意得猫兒狗子力也梅聖俞與謝氏世姻師直小字錦衣奴聖俞作詩戯之曰古錦裁詩句班衣戯坐隅朩奴今正熟肯效陸郎無師直方十嵗讀詩而悟石曼卿登第有人訟科塲覆考落者數人曼卿在焉方興國寺期集符至追所賜勅牒餘人皆泣而起獨曼卿觧靴還使人露體戴幞頭笑語終席次日放黜者例受三班借職曼卿作詩曰無才且作三班借請俸争如録事參從此免稱郷貢進且湏走馬東西南並同上王梵志詩曰城外土饅頭餡草在城裏無人喫一箇莫嫌没滋味且為餡草當使誰食之為易其後两句云預先着酒澆圗教有滋味東坡詩話馮衮牧蘇州日多縱飲愽因大勝以所得均與座客吟云八尺䑓盤照面新千金一擲鬬精神合是賭時湏賭物不堪回首乞閑人雅言雜載李紳相鎮廣陵有少年甚踈簡來謁晤對問言曰尚書先寄元相公詩云悶勸迃辛酒閑吟短李詩且曰辛大性迃嗜酒邱度李二十短而能詩紳少年即邱度子也謂李公曰小李毎憶白共二丈詩曰悶勸平情酒閑吟世上詩李曰辛大有此狂兒吾不存舊矣雲溪友議崔涯張祜為一時狂友好嘲謔甞戯贈貧妓曰雖得蘇方朩由貪玳瑁皮懐胎十箇月生下崑崙兒又曰布袍披襖火燒氊紙補箜篌麻接絃更有一雙皮屐子紇梯紇榻出門前又嘲李端端云黄昏不語不知行鼻似烟牕耳似鐺猶把象牙梳揷鬂崑崙山上月初生端端得此詩而困出遇二子於道再拜曰伏望哀憐乃重為一絶云不見驊騮偹綉鞍善和坊裏取端端揚州近日渾成著一朶能行白牡丹前嘲乃觧又甞為雜嘲之曰二年不到宋家東阿母深居僻巷中含淚向人羞不語琵琶絃㫁倚屏風日暮後來香閣中百年心事一朝同寒雞鼓翼紗窓外已覺恩情逐曉風又悼人詩云赤板橋西小竹籬揷花還似去年時淡黄衫子都無了腸㫁丁香畫雀兒曺州酒紏雲娘痩瘠而善歌李宣古嘲之曰何事實堪悲雲娘只首竒痩拳抛令急長觜出歌遲只怕肩侵鬂唯愁骨透皮不湏當户立頭上有鍾馗復州陵岩夢桂州筵上贈胡子女詩云自道風流不可扳那堪蹙額更頽顔眼睛湥似湘江水鼻孔髙於華岳山舞態豈能安掌上歌聲應不遶梁間孟陽死後今十載由有家人覔往還並同上楊叔寳強人也甞為荆門幕時虎傷人楊就虎穴磨巨崖大刻誡虎文如韓文公遣鱷魚文其略曰嗚呼爾彪出境潜㳺改官於欝州以書托知軍趙定打虎文數本書言嶺俗庸獷欲以化之仍有詩曰日将先聖詩書教暫作文翁守欎林守遣人打碑次日本耆申磨崖樹爾大虫咬殺打碑匠二人荆門止以耆状報叔寶湘山録薛逢晚年厄於宦途䇿贏赴朝值新進士綴行而出時進士團所由數十人見逢行李蕭然前道曰迴避新郎君逢冁然即遣价語之曰報道莫貧相阿婆三五少年時大㑹東塗西抹來摭言許孟容進士及第學究登科時人嘲之曰錦襖子上着蓑衣張處士憶柘枝詩曰鴛鴦鈿帶抛何處孔雀羅衫属阿誰樂天呼為問頭詩祜矛盾之曰鄙薄問頭之誚所不敢辭然明公亦有目連變長恨歌云上窮碧落下黄泉两處茫茫都不見豈不是目連變耶並同上王中令既平蜀捕餘冦與伍隊相逺飢甚乃入一村寺中僧醉甚箕踞公怒欲斬之僧應對不懾公竒而釋之間求蔬食云有肉無蔬公益竒之餽以蒸豚頭食之甚美公喜問僧正能飲酒食肉邪為有它伎邪僧自言能詩公令賦蒸豚詩操筆立成詩云觜長毛短淺含臕乆向山中食藥苖蒸處已将蕉葉裹熟時更用杏漿澆紅鮮推稱金盤貯軟熱真堪玉筯挑若把羶根來代並羶根只合喫藤條公因大喜與紫衣乃蜀中詩僧百斛明珠韓玉汝治秦州尚嚴去宫人語曰寧逢暴虎莫逢韓玉汝孫臨滑稽尤善對或問曰莫逢韓玉汝當以何對臨應聲曰可怕李金吾天下以為口實同前石介作三豪詩略云曼卿豪於詩永叔豪於文杜黙師雄豪於歌永叔亦謂黙云贈之三豪而我濫一名黙之歌少見於世初不知之後聞其篇云學講波中老龍夫子門前大虫皆此等語甚矣介之無識也永叔不為嘲誚之者此公惡争名且為介諱也吾觀杜黙豪氣正是京東學究飲私酒瘴死牛肉醉飽後而發之者也作詩之狂至於盧仝馬異極矣若更求竒便作杜黙也㓜時里人程建用楊咨家弟子由㑹草舎天雨聮句六言程曰庭松偃盖如醉楊曰夏雨新凉似秋軾云有客髙吟擁鼻子由云無人共吃饅頭皆絶倒已四十餘年同上聶崇義建隆初為學官河洛之師儒也趙韓王當拜云郭忠恕使酒詠其姓玩之曰近貴全為聵扳龍即是聾雖然三箇耳其奈不成聡崇義應聲荅曰勿笑有三耳全勝畜二心忠恕大慚雲溪友議趙成伯家宴造之無由輙欲效顰而酒已盡入夜不欲煩擾戯作小詩求數酌而已詩曰道士令嚴難繼和僧伽帽小却空廻隔籬不欲鄰公飲抱甕惟防吏部來趙成伯家有姝麗僕忝郷人不肯開樽徒吟春雪謹依元韻以當一笑云繡簾朱户未曽開誰見楊花落鏡䑓試問髙吟三十韻何如低唱两三杯莫嫌衰髩聊相映湏得纎腰妙隔回知道文君隔青𤨏梁園賦客敢言才俗云檢騐雪壓秀才衣帶上有雪詩三十韻又世傳陶榖學士買得黨太尉家故妓過定陶取雪水烹團茶謂妓曰黨太尉應不識此妓曰彼粗人安有此景但能以銷金煖帳下淺斟低唱吃羊羔兒酒爾榖愧其言荅來句罪過之義取質而已玉局遺文僕少好種松過泗上與杜子師出山中子師求予種松法欲之都梁山中戯作二絶云露宿泥行草棘中千年春雨養髯龍如今尺五城南杜欲向東坡學種松君方掃雪收松子我已開榛得茯苓為問何如揷楊栁明年飛絮落浮萍同上元豐中晁無咎詩極有聲無已以詩戯之曰聞道新文能入様相州紅纈鄂州花盖是時方尚相州纈鄂州花也晁堯民子損之云王直方詩詁劉諷參軍宿山馹月朙有女子數自屋後來命酌庭中歌曰明月清風良霄㑹同星河易翻歡娱不終緑樽翠杓為君斟酌今夕不飲何時歡樂此廣記所載詩也山谷曰當是鬼中曹子建所作東坡亦以為然又有一篇云玉户金缸願陪君王邯郸宫中金石絲簧鄭女衛姬左右成行紈綺繽紛翠眉紅粧王歡轉眄為王歌舞願得君歡長無灾苦蘇公以為邯郸宫中金石絲簧此两句不唯人少能作而知之者亦極難得耳皆醉中為余書此張文潜見坡谷論說鬼神忽曰舊時作人語如今人作鬼語二公大笑髙愈主簿云東坡云世間事勿笑為易惟讀王祈大夫詩不笑為難祈甞謂東坡云有竹詩两句最為得意曰葉埀千口劔幹聳萬條鎗坡云好則極好則是十條竹竿一箇葉兒也以道云初見東坡詞云素面常嫌粉涴洗粧不退唇紅便知此老湏過海余問何耶以道曰只為古今人不曽道到此湏罰教逺去吴賀廸吉者撫州人一日載酒來余家并召劉夷季洪龜父饒次守軰酒酣頗紛紛龜父先歸作一絶題于余書室曰再為城南逰百花已狂飛更堪逢惡客騎馬風中歸次守既醒作十七字和云當時為舉首滿意望龍飛而今已報罷且歸盖龜父是年自洪州首薦自今上初即位無廷試也山谷為校書在館中時多食東華門椀脱蒸餅後徙黔南王定國寄之以詩云北海未常樽有酒馮驩何止食無魚黔州椀脱無蒸餅自合官稱削校書張文潜在一時中人物最為魁偉故陳無已有詩云張疾魁然腹如皷雷為飢聲酒為雨文云要痩君則肥山谷云六月火雲蒸肉山又云雖肥如瓠壺而文潜卧病秦少游又和其詩云平時帶十圍頗復减臂環皆戯語也劉季孫景文公頃年王安石使對念兹在兹釋兹在兹名言兹在兹季孫對之以掲諦掲諦波羅掲諦波羅僧掲諦安石大笑並同上往嵗江行阻風㳂岸野步望雲嶺而去忽有蘭若甚多僧院覩客來皆扄門不納獨有一院大敞其戸見一僧翹足而眠以手書空顧客不介意切思曰書空有換鵞之能翹足類坦腹之事此必竒僧直入造之僧雖强起全不樂客客不得已而問先逹有詩曰書空翹足睡路險側身行和尚其庶幾乎僧曰貧道不知許事適􅀞房門振題様客不辭而去桂苑聚談梁周翰在太宗朝為舘職真宗即位乃除知制誥栁開贈詩曰九重城闕新天子萬巻詩書老舎人梁與朱昂楊大年同在禁掖大年年未滿三十而两公皆老數見慢侮不能堪即好謂大年曰公毋侮我此老亦将留與公耳朱聞之背面揺手欲梁莫與之言大年之沒不及五十也閑居詩話晋郝隆為蠻府參軍三月三日作詩曰娵隅躍清池桓温問何物荅曰蠻名魚為娵隅桓曰何為作蠻語隆曰千里投公始得一蠻府參軍􅃚得不作蠻語世說盧家有子弟年暮而猶為校書郎晚娶崔氏女崔有詞翰結䄜之後微有嫌色盧因請詩以述懷為戯崔立成曰不怨檀郎年紀大不怨檀郎官職卑自恨妾身生較晚不見盧郎年少時南部新書李建勲鎮臨川日九江帥周宗一書求曰近器用儀注或闕欲輟臨川者李乘醉批一絶句云偶罷阿衡來典郡固無閑物可應官憑官為報周公道莫作循州刺史看南唐近事李巽字仲權累舉不第郷人侮曰李秀才應舉空去空回不知甚時席㡌得離身巽亦不校登第後乃遺郷人詩曰當年踪跡困􅅺塵不意乘時亦化鱗為報郷閭親戚道如今席㡌已離身盖因國初猶襲唐士子皆曵袍重戴出則席㡌自隨青箱雜記梅聖俞河豚詩曰春洲生荻芽春岸飛楊花河豚於此時貴不數魚蝦劉厚甫戯曰鄭都官有鷓鴣詩謂之鄭鷓鴣聖俞有河豚詩當呼為梅河豚也古今詩話雲臺集有鄭谷鷓鴣全篇云暖戯烟蕪錦翼齊品流應得近山雞雨昏青草湖邉過花落黄陵廟裏啼㳺子每聞征袖濕佳人纔唱翠眉低相呼相喚湘江濶苦竹叢深春日西同上鄭毅夫榜明州人周師厚以名極低只壓得陳傳一名自賦詩曰舉眼不堪觀鄭獬囬頭由喜得陳傳朱定國詩話唐僧法軌形容短小開講於寺與李榮議論往來數畨僧舊作一詩詠李榮於髙坐上誦之云姓李應湏禮名榮又不榮李應聲曰身長三尺半頭毛猶禾生四坐服其辯㨗啓顔録經生多不省文章甞一邑有两人同官其一或舉杜荀鶴詩稱賛也應無處避征徭之句其一難之曰此詩久矣野鷹何甞有征徭乎舉詩者觧曰古人有言豈有失也必是當年科取翎毛耳貢父詩話潁州張龍圖甞見州牒押字多團下拽一畫有人云押字如有蒸餅様張應聲曰為官恰似麫糊團有同人自言近年云鬚鬂恰如􅍡馬色張曰文章依舊草驢鳴雍洛靈異記包賀多為鄙俗之句至於枯竹笋抽青橛子石榴樹掛小瓶兒又云霧是山巾子舡為水靸鞋又云掉揺舡掠髩風動水搥胷雖好事者托以成之亦空穴來風之意王伸知永州為人耽於酒色其宴樂往往自早至暮為句云鴛鴦未老頭先白嘲人素患六損憂制者應聲曰螃蠏才生足便多時人以為名對崔櫓酒後於䖍州陸郎中坐上甚狂以詩謝之曰醉時顛蹶醒時羞麯蘖催人不自由尀耐一雙窮相眼不堪花卉在前頭閩人黄通累舉不第後該恩厯官數任年六十猶欲鎻㕔或嘲之曰剩員呈武藝老妓舞柘枝李義甫甞作詩曰鏤月為歌扇裁雲作舞衣自憐廻雪態好取洛川歸有棗強尉張懐慶好竊人文章有詩曰生情􅍢月為歌扇出性裁雲作舞衣照鑑自憐廻雪態來時好􅂑洛川歸時人謂之曰活剥張昌齡生吞郭正一宋莒公判館事督諸館職必至而刀景純數日不來莒公使人邀之加之誚讓王原叔改杜少陵贈鄭廣文詩云景純過官舎走馬不曽下驀地稱朝歸便遭官長罵栁州栁太守種栁栁江邉栁館依然在千株栁拂天後南中丞至黔南人嘲之曰黔南南太守南郡在雲南閑向南亭畔南風變俗談並同上詩話總龜巻三十九欽定四庫全書詩話總龜巻四十宋阮閲撰樂府門皷吹部中有拱辰管即古人之义手管也大宗賜今名邉軍捷廻則連隊抗聲凱旋乃古之遺音其詞往往皆市井鄙俚語沈存中在鄜延時製十數曲今士卒歌之云先取西山十二州别分子将到衙頭始看秦塞低如馬漸見黄河直北流天威巻地過黄河萬里𦍑人盡撲歌莫堰横山倒流水從教西去作恩波馬尾胡琴隨漢車曲聲猶是怨單于彤弓莫射雲中鴈歸鴈如今不寄書旗隊渾如錦綉堆銀裝背傀打毬囬先教净掃安西路待向河源飲馬來靈武西凉不用圍畨家総待納王師城中半是山西種猶有當時乾吃兒古今詩話乾祐中國樂有米嘉榮何戡近有陳不謙不謙之子意奴三十年中絶不聞善唱盛以拍弹行於世拍弹起於李可及懿宗朝有恩澤曲子别趙十哭趙十之名劉夢得與米嘉榮詩云三朝供奉米嘉榮能變新聲作舊聲如今後軰欺前軰好染髭鬚學後生又自貶所歸京聞何戡歌云二十年來别帝京重聞天樂不勝情舊人唯有何戡在更與勤勤唱渭城盧氏雜記搢紳脞說載盧氏雜記曰歌曲之妙其來久矣國樂有米嘉榮何戡田順郎媍人有永新婦御史娘栁青娘張紅娘皆一時之妙也近有陳不謙子意奴三十年來絶不聞善歌者盛扵拍弹行於世拍弹起於劉可及懿宗恩澤最厚有别趙十哭趙十之名又與田順郎詩曰清歌不是世間音玉殿常聞稱帝心惟有順郎皆學得玉聲尤出九重深與御史娘詩曰天下能歌御史娘花前月底奉君王九重深處無人見獨把新聲傳順郎白公聽田順歌曰戞玉敲氷聲未停嫌雲不過入青冥安得黄金滿衫袖一時抛與㫁膓聲咸通中丞相姑臧公拜端揆日自梁移鎮淮海郡寡勝逰之地且風亭月觀既以荒凉於戯馬䑓連玉鈎道開剏池沼建亭臺既畢號曰賞心浙右小校薛湯陶監押度支運米入城公喜其姓名試詢之果是舊人及問往日蘆管之事因朱崖陸暢元白所撰歌篇一軸公益喜之以蘆管於兹亭奏之其管絶微毎一篳篥管中常容三管聲聲如天際自然來大佳之亦贈一篇略云虚心纎質鴈啣餘鳳吹龍吟定不如贈與甚豐授其子牢湓倅明皇樂工奔迫江潭間於湘中採訪使筵上唱云紅豆生南國秋來發幾枝贈公多採擷此物􅆟相思又云清風明月苦相思蕩子從容十載餘征人去日殷勤嘱歸鴈來時􅂾寄書皆摩詰所作也至今梨園歌焉坐中皆惨然時明皇思幸蜀也雲溪友議霓裳羽衣曲劉禹錫詩云三郷陌上望仙山歸作霓裳羽衣曲王建詩曰聽風聽水作霓裳樂天詩注云開元中西凉府節度使楊欽逺造鄭遇津陽門詩注云葉法善常引明皇入月宫聞仙樂及歸但記其半遂以笛寫之㑹欽逺進波羅門曲與聲調相符遂以月中所傳為散序欽逺所進為腔號霓裳羽衣曲矣江南大理卿成文幼精為詞曲甞作謁金門云風乍起吹皺一池春水李璟聞之召而謂之曰卿職在典型一池春水干卿何事文㓜頓首江南馮延已善為歌詞晏元獻善公所為歌詞不减馮也樂府朩蘭花句都是七言晏詩云重頭歌咏响􅋛琤入破舞腰紅亂旋重頭入破皆絃管家語也張子野郎中善歌詞常作天仙子云雲破月來花弄影士大夫皆稱之子野初謁歐公迎之坐語曰好雲破月來花弄影恨相見之晚也有謂張子野曰人皆謂公為張三中即心中事眼中淚意中人也何不目之為張三影客不喻公曰雲破月來花弄影嬌柔懶起簾押捲花影栁徑無人墜風絮無影此平生得意句也林和靖工於詩文善為詞甞作㸃絳唇云金谷年年亂生春色誰為主餘花落處滿地和烟雨又是離歌一闋長亭暮王孫去萋萋無數南北東西路乃草詞爾謂終篇無草字鼎州滄水馹有菩薩蠻云平林漠漠烟如織寒山一帶傷心碧暝色入髙楼有人楼上愁玉梯空佇立宿鳥歸飛急何處是歸程長亭更短亭曽子宣家有古風集此詞乃太白作也古今詩話古人飲酒皆以舞相属至於獻夀樽者往往亦舞長沙王少舉袖云國小不足廻旋唐太宗自起舞属羣臣古人淳質舞以逹歡忻不必臻妙合度故人人可為之張燕公曰醉後歡更好全勝未醉時動容皆是舞出語総成詩李白詩曰要湏廻舞袖拂盡五松山醉後凉風起吹入玉袖寒今時舞者皆曲肖益盡其妙然非有詩士人不為也貢父詩話水調第五遍五言調聲最愁苦故樂天詩曰五言一遍最辛勤調少情多似有因不㑹當時翻曲意此時腸㫁為何人舊說水調河傳隋煬帝将幸江都官時所製曲成奏之聲韻悲切煬帝喜之樂工王令言聞而正之謂其弟子曰不返矣後竟如其說或詰其何知曰水調河傳但有去聲縉紳脞說何滿子開元中犯罪繫獄中撰此曲白樂天云滄州人姓何名滿子鞠獄都愍而為奏之明皇弗許竟坐白樂天曰世稱何滿是人名臨就罪時曲始成一曲回音并八叠從頭捴是㫁腸聲脞說商玲瓏餘杭之歌者白公守郡日與歌曰罷胡琹掩瑶瑟玲瓏再拜當歌出莫為使君不觧歌聽唱黄雞與白日黄雞催曉丑前鳴白日催人酉後没腰間紅綬繫未穏照裏朱顔看已失玲瓏玲瓏奈老何使君歌了汝更歌元微之在越州聞之厚幣來邀樂天即時遣去到越州住月餘使盡歌所唱之曲即賞之後遣之歸作詩送行兼寄樂天曰休遣玲瓏唱我詞我詞都是寄君詩却向江邉整廻棹月落潮平是去時秦少游在處州夢中作長短句曰山路雨添花花動一山春色行到小溪深處有黄鸝千百飛雲當面化龍蛇夭矯轉空碧醉卧古藤隂下杳不知南北後南遷北歸逗留藤州終於光華亭時方醉起以玉盂汲泉欲飲笑視而化冷齋夜話華亭舩子和尚偈曰千尺絲綸直下垂一波纔動萬波隨夜静水寒魚不食滿船空載月明歸山谷歌成長短句曰一波纔動萬波隨蓑笠一鈎絲金鱗正在深處千尺也湏垂吞又吐信還疑上鈎遲水寒江静滿目青山載月歸東坡携妓謁大通禅師大通愠色坡作長短句曰師唱誰家曲宗風有阿誰借君拍板與門搥我也逢塲作戯莫相疑溪女方偷眼山僧已皺眉莫嫌彌勒下生遲不見老婆三五少年時僧仲殊和曰觧舞清平曲而今說向誰紅爐片雪上鉗搥打就金毛師子也堪疑已信身如夢何湏眼似眉蟠挑已是結花遲不向風前一笑待何時余登秋屏閣浩然有歸老之興作長短句寄意曰城裏乆偷閑塵涴雲山此生已是再眠蠶隔岸有山歸去好萬壑千岩霜曉更凭攔减盡晴嵐微雲生處是茅庵試問此行誰作伴彌勒同龕東坡與少游飲别維揚作虞羙人詞曰波聲拍枕長淮曉隙月窺人小無情汴水自東流只載一舩離恨向西州竹隂花圃曽同醉酒味多於淚誰教風鑒在塵埃醖造一塲煩惱送人來世傳賀方回作也余與淵材牛渚間見長短句曰牛渚天門險限南北七英豪占青烟霧歛與閑人登覽待月上潮平波灔灔寒管孤吟新繫䌫風滿檻厯厯數西州更㸃淵材恨不得腔乃撰其譜盖賀方回作也並冷齋夜話詩話總龜巻四十欽定四庫全書詩話總龜巻四十一宋阮閱撰送別門劉綜學士出鎮并門两制舘閣皆以詩餞其行因進呈章聖深究詩雅時方競尚西昆體裂彫篆親以御筆選其平淡者得八聮句云夙駕都門曉凉風苑樹秋􅄯逈秋聲和暮角膏雨遂行軒李維置酒軍中樂聞笳塞上情錢惟演關榆漸落邉鴻度勸到劉郎酒十分楊億寒垣古朩含秋色祖帳行塵起夕陽朱巽汾水冷光揺畫㦸䝉山秋色鎻層樓孫僅河朔雪深思愛月并門春煖詠甘棠王昭永極目關河髙倚漢順風鵰鶚逺凌秋劉筠章聖謂綜曰并門唐時皆将相出領凢之官遣從事以題詠作寵其行多刻諸道宫佛寺纂集編聚乆不聞有是作也後綜冩為御選句圗立於晋祠古今詩話王化基詩送梁助曰文章換桂一枝秀清白傳家两弟貧人多誦之談苑天祐中毗陵有慎氏本儒家女三史嚴灌夫娶之數年無子因拾其過而出焉慎氏慨然登舟留詩一章為別曰當時心事已相關雨散雲飛一餉間便挂孤㠶從此去不堪重過望夫山灌夫覽而愧乃留之唐宋遺史唐如意中有女子七嵗能詩則天命賦之皆應聲而就其兄别之而去則天令作詩送兄曰别路人初起離亭葉正飛所嗟人異鴈不作一行歸丞相劉沅與郷人尹鑑少同塲屋丞相既大拜尹方以恩榜得官公以詩送還曰少年相欵老相逢郷舉雖同遇不同我已位登三事後公方名列五班中榮登莫計名髙下宦逹湏由善始終若到郷關人見問為言歸思滿秋風並同上内侍裴愈字益之作詩送魯秀才南逰詩云東吴山水家家月西楚江聲浦浦風又聞蝉云楊栁影踈秋霽雨梧桐葉墜夕陽天唐子方以言事謫冝春監酒待制李師中作詩贈别曰孤忠自許衆不與獨立敢言人所難去國一身輕似葉髙名千古重於山並㳺英俊顔何厚已死奸䛕骨尚寒天意若為宗社計肯教夫子不生還倦逰錄徐鉉仕宦海州蒯亮為録事參軍多與往還未幾亮受代徐餞之詩曰昔年聞有蒯先生二十年來道不行抵掌曽談天下事折腰尤忤俗人情老還上國風光薄貧裏歸装結束輕遷客臨流重惆悵晚風黄葉滿孤城詩史武元衡罷相出鎮西蜀栁公綽與裴度俱為判官公綽先度入為吏部郎中度有詩餞别云两人同日事征西今日公先捧紫泥景祐末元昊叛夏鄭公出鎮長安梅昌言送詩云亞夫金皷從天落韓信旌旗背水陳是時士大夫詩甚多鄭公獨刻昌言詩于石臨川楊智堅嗜學居貧妻厭其饘藿不足求離智堅以詩送之曰平生業在負琹詩頭上而今有二絲漁父尚知溪谷暗山妻不信出身遲荆釵任意撩新鬂鸞鏡從今學畫眉今日便同行路客相逢正是下山時妻持詣州顔魯公為刺史杖其妻而令嫁自後莫有棄其夫者雲溪友議崔涯别其妻詩曰隴上流泉隴下分斷腸嗚咽不堪聞姮娥一入宫中去巫峽千秋空白雲申國長公主為尼掖庭隨出者二十餘人詔两禁送至寺賜齋傳㫖令各賦詩惟陳文僖公彭年詩尚有記者云盡出花鈿散寶津雲鬟齊剪向殘春因驚風燭難留世遂作蓮池不染身貝葉乍翻疑軸錦梵音初學誤梁塵從兹艶質成空後湘浦都無觧珮人都下好事者以鷓鴣天歌之湘山錄朱昂字舉之敭厯清貴二十年晚為工部侍郎懇求歸荆南踰年方允時方劇暑恩㫖曲留許秋凉始行吴淑贈行詩云漢殿夜凉初閣筆渚宫秋晚得懸車錫宴玉津園中傳㫖令賦詩為送李維承㫖云清朝納禄尤强健白首還家正太平陳文惠云部吏百衘通爵里從兵千騎過荆門弟恊亦同時隠皆享眉夀謂之渚宫二踈並古今詩話武公幹常事蒯希逸十餘嵗異常勤幹洎希逸擢第幹辭歸以親在養父堅留不住以詩送之其略云山險不曽離馬後酒醒長見在床前摭言張乖崖在蜀州有録事㕘軍老病廢事公曰胡不歸明日㕘軍求去且以詩留别其略云秋光都似宦情薄山色不如歸興濃公驚曰同僚有詩人而吾不知留而薦之元祐中老人守潁有路都曹者以小疾求致仕老人誦此詩以留之不可乃採前人之意作詩送之曰淮光釀山色先作歸意濃恨無乖崖公一洗芥葉胷百斛明珠張不疑帥鼎文寶往謁後帥辰又謁之既别慨然以二詩贈行曰憶昔荆門屢過從當時心已意冥鴻渚公禅伯唐齊已淮甸詩豪宋惠崇老格踈閑松倚潤清談蕭灑坐生風史君不見髙僧事莫把名㕘伎術中又云碧嶂孤雲苒苒歸觧携情緒異甞時餘生嵗月能多少此别應難問後期玉壺清話狄煥送人逰卲云春江正渺渺送别两依依烟裏棹将逺渡頭人未歸漁家侵叠浪島樹挂殘暉况入湖湘路􅃚堪花亂飛雅言系述元豐三年蘇子由謫官筠州張安道口占一絶送之云因嗟萍梗才名客自歎匏𤓰老病身一榻從兹還倚壁不知重掃是何人已而涕下東坡云安道平生未能出涕向人王崇字極之與先君同在熈河先君自熈河入京相别於中塗送先君云渭城楊栁已青青強往行人聽渭城不問使車歸路逺且從墫酒滿杯傾相逢洮塞休兵後此去秦州照眼明若立螭頭借前箸且教充國事春耕先君誦於吴沖卿丞相緣此知名於朝廷洪駒父有詩送余赴官河内末云眼中人物東西盡肺病京華故倦㳺潘邠老毎誦而喜之李希聲亦有詩送余云散盡平生眼中客煖風晴日閉門居可以相上下也是時紹聖改元之二月並王直方詩話李羣玉好吹笙常使家僮吹之又善急就章性喜食鵞及授校書郎東歸故里盧肇送詩云妙吹應諧鳯工書定得鵞南部新書乾祐三年宣政殿試賢良方正直言極諫科下一十人登科其後牛僧孺等四人皆相次拜相先是白居易在翰林日為考覆官其後僧儒罷相出鎮揚州居易在洛中有詩送曰北闕上東京風光十六程坐移丞相閣春入廣陵城紅斾擁雙節白髭無一莖萬人周路看百吏立班迎閫外君􅈿重樽前我亦榮何湏身自得将相是門生卓異記僕去嵗錢塘十六年而又來留二年乃去平生自覺出處老少相似樂天雖才名相逺而安分寡求亦庶幾焉二月六日來别南北山惠净上人以天竺醜石見贈乃作絶句三首以全樂天之好曰當年衫髩两青青强說重臨慰别情衰髪只今無可白故應相對話来生其二曰出處依稀似樂天敢将衰朽校前賢便從洛社休官去猶有閒居二十年其三曰在郡依前六百日山中不記幾回來還将天竺一峰去欲把雲根到處栽紀詩唐節度使薛嵩有人獻小鬟十三嵗左右手俱有紋隠若紅線因號為紅線十九年方辭嵩去不可留乃餞别請坐客冷朝陽作詩曰采菱歌罷朩蘭舟送客魂消百尺樓還似洛妃乗霧去碧雲無際水長流江淮間有妓徐月英作詩送人曰惆悵人間萬事違两人同去一人歸生憎平望亭前月忍照鴛鴦相背飛崔涯者吴楚狂生與張祜齊名其妻雍氏子荆寶有女青衣曰玉簫才十嵗常令侍韋姜入關家属不行韋乃從歸頭陀寺荆寶遣玉簫住来年稍長乃與韋歡後為廉使陳常侍發遣歸舟人趣行乃以書别荆寶荆寶與玉簫同至相約曰逺不踰六七年當取玉簫歸因留玉簫指環一枚并詩曰黄雀啣来已數春别時難曽贈家人長江不見雙魚至為遣相思夢入秦李納尚書夜登越城樓聞歌曰鴈門山上鴈初飛其聲激切公召至乃去藉之妓盛小叢也梁園供奉南不嫌女甥所唱者乃不嫌昔所授也崔元範自幕府拜侍御史餞於鑑湖光候亭命小叢歌餞坐客各賦詩送之李尚書曰綉衣奔命去情多南國家人歛翠娥曽向教坊聽國樂為公重唱盛叢歌崔御史曰相公留宴峴山亭洛浦髙歌午夜清獨向柏䑓為老吏可憐林朩响餘聲楊判官曰燕趙能歌有幾人落花回雪似含嚬聲隨御史驄歸去誰伴文翁過九春彦升曰蓮府纔為緑水賔忽乘􅍡馬入咸秦為公唱作西河調日暮偏傷去住人盧業支使曰何郎戴豸别賢侯更吐歌珠宴庾樓莫道江南不同醉即陪舟楫上京㳺舉子髙湘曰謝安春渚餞名卿千里仁風一扇清歌黛惨時方酩酊不知公子重飛觥盧溵處士曰烏䑓上客紫髯公共捧天書静鑑中桃葉不湏歌白苧耶溪日暮起樵風崔下句云獨向柏䑓為老吏皆曰御史即其任也何老於柏䑓衆請改之崔曰某但止於此任寧望九遷乎是年秋鞠獄譙中而卒是終於柏䑓之任也並古今詩話劉夢得送人下第詩云今此卜行日髙堂應夢歸莫将和氏淚滴向老萊衣又有詩云新詩一聮出白髪數莖生榜情詩話總龜巻四十一欽定四庫全書詩話總龜巻四十二宋阮閱撰怨嗟門王元之精於四六同時在玉堂而大拜者元之啓賀曰三神山上曽陪鶴駕之㳺六學士中空有漁翁之嘆以白樂天甞有詩云元和六學士五相一漁翁青箱雜記怨婦不知其姓既笄受幣於姨兄馬生父没繼母渝其約改適母之族兄老而猥惡居官納賄以罪犯為五羊民掾舟過英州庸良醉卧婦因題三絶於馹亭初與馬絶馬作詩貽婦人曰急水浮花入亂流濃雲遮月暗西樓風流忿恨知多少但㸔青春已白頭婦荅詩曰金丸打折鶼禽翼利刃偏傷連理枝自古一床無两好如今方信昔人詞題馹亭曰情若秋雲歸故國夢隨瘴月過梅峰誰将此骨埋煙隴寂寞魂㳺山霧中翰府名談髙蟾累舉不第有詩云月桂數條榰白日天門幾扇鎻明時陽春發處無根蔕憑仗東風次第吹怨而切又下第上主司馬侍郎詩云天上碧桃和露種日邉紅杏倚雲栽芙蓉生在秋江上不向東風怨未開人頗憐其意明年李昭知舉遂擢第詩史王元之以尼道安事謫黄州盖為盧崖州所譛也有詩云敢向台階問罪名後有以事貶黄州者有詩云魏能下面㸔花衘魏能以軍功黄州刺史同上陳羽有詩百餘首古意一篇集中所無其詞云十三學繡羅衣裳自憐紅袖聞馨香人言此是嫁時服含笑不語雙鴛鴦郎年十九髭未生拜官天下聞聲名車馬駢闐賀門舘自然不失為公卿是時妾家尤未貧兄弟出入雙車輪繁華全盛两相敵與郎年少為婚姻郎家居近御溝水豪門客盡躡珠履彫盤酒器常不乾曉入中厨妾先起姑嫜嚴肅有規矩闕小娘嬌意難取朝㕘暮拜白玉堂綉衣着盡黄金縷妾貌漸衰郎漸薄時時強笑意索寞知郎本來無嵗寒幾回掩淚看花落妾年四十絲滿頭郎未五十封公侯男兒全盛日忘舊銀床羽帳空􅀈􅀈庭花紅遍蝴蝶飛㸔郎佩玉下朝時歸來略略不相顧却令侍婢生光輝郎恨婦人易衰老妾亦恨深不忍道㸔郎強健能幾時年過六十還枯槁詩史陜郊有唐昭宗詩曰何處有英雄迎歸大内中又曰紇干山頭凍殺雀何不飛去生處樂讀之令人變色昭宗在河東作菩薩蠻云登樓延望秦宫殿茫茫不見雙飛燕渭水一條流千山與萬邱野煙生碧樹陌上行人去何處有英雄迎歸大内中今云詩未知孰是南唐元宗優待藩邸舊僚馮延已自元帥府書記至中書侍郎遂相時論以為非才江文蔚因其弟延魯福州亡敗請從退削乃出撫州秩滿還朝因赴内宴進詩曰青樓阿監應相笑書記登壇又却回韓渥天復中車駕幸鳯翔渥以扈從功反正初昭宗靣許渥為相渥奏云運契中興冝復用重徳鎮風俗因薦右僕射趙崇時梁祖在京馳入請見具言崇長短昭宗曰趙崇是韓渥所薦渥時在側梁祖叱之三奏曰臣不敢與大臣争渥尋出閩中渥有詩曰手風慵展八行書眼暗休㸔九局圖窓裏日光飛野馬按頭筠管長蒲蘆謀身拙為安虵足報國危曽捋虎鬚舉世可能無黙識未知誰擬試齊竽並同上孫定字至光涪州大戎之族子長於修定數舉矣而修方就貢或訪於定定謔曰十三儀表堂堂好箇将軍何湏以科第為意修頗衘之後修貴逹未甞言定長短晚年喪志放意酒盃景祐二年下第逰京師出開逺門醉中作詩曰行行淚血洒塵襟事逐東流渭水深私跨蹇驢風尚𦂳静投孤店日方沉一枝猶挂東堂夢千里空馳北巷心明月悲歌又前去滿城煙樹噪春禽同上玉階怨李詞云玉階生白露夜乆侵羅襪却下水晶簾玲瓏望秋月長相思詩云悠悠我思又曰靡日不思蘇子卿詩云生當復來歸死當長相思生别離楚詞曰悲莫悲於生别離古詩云行行重行行與君生别離相去萬餘里各在天一涯怨歌行李白亦有此作一作長安見内人出嫁令予代為怨歌行其詞曰十五入漢宫花顔笑春紅君王選玉色侍寢金屏中薦枕嬌夕月捲衣戀春風寧知趙飛燕奪寵恨無窮沉憂能傷人綠髩成霜蓬一朝不得意世事徒為空鷫鸘換羙酒羣衣罷雕籠臨寒不忍言為君奏絲桐腸斷聲已絶悲心夜忡忡獨不見李白云白馬誰家子黄塵邉塞兒天山三丈雪豈是逺行時春蕙忽秋草莎雞鳴曲池風催寒梭響月入霜闗悲憶與君别年種桃齊蛾眉桃今百餘尺花落成枯枝終然獨不見流淚空自知白頭吟相如将聘茂陵女為妾文君作白頭吟以自絶相如乃止故李白辭云頭上玉燕釵是妾嫁時物贈君表相思羅袖幸時拂莫捲龍顔席從他生網絲且留琥珀枕還有夢來時此最為警䇿藁砧藁砧今何在藁砧砆也問夫何處山上復有山重山為岀字言夫已出何當大刀頭刀頭有環問何當來還破鏡飛上天言月半當來也七哀詩曹子建釋詩者謂病而哀義而哀感而哀悲而哀耳目聞見而哀自歎而哀鼻酸而哀也巴東三峽歌三山峽七百里两㟁連山略無闕處重巖叠嶂隠蔽天日自非亭午夜分不見日月其漁父歌曰巴東三峽巫峽長猿啼聲苦淚沾裳别鶴操商陵牧子作也娶妻五年而無子父兄為之改娶妻聞之中夜起倚户而悲嘯牧子聞之愴然而歌将乖比翼隔夭端山川悠逺路漫漫攬衣不寝食不飡後人因為樂章焉並見樂府集劉子儀與夏英公同在翰林子儀表為先逹章獻臨朝子儀主文在貢院聞英公為樞宻副使意頗不平作堠子詩曰空呈厚貌臨官道更有人從捷徑過閑居主話周總福州人天禧二年因事逰京師值詔下奔郷薦不及有故人在譙郡守官遂往投之倚為拔觧之地而國家申嚴條約不許寄籍郡有司吏周吉者頗殖涯産捴遂拜為父吉欣然納之齒于諸子三代名諱亦從而更焉或人問吉則對以此子當年與母氏俱斥近召歸捴亦以是對秋預薦未幾逹于郷父乃馳詩一絶寄之遂不敢南歸因此慚恨而卒詩曰文章不及林洪範徳行全虧李坦然若拜他人為父母直湏焚却蓼莪篇各族重京官而輕外任故楊闕上建節後詩云抛却弓刀上砌䑓上方樓殿彩雲開山僧見我衣裳窄知道新從戰地來又云如今老去騎官馬羞向關中道姓楊楊行敏出使馹騎到劍州郡将輕忽慊恨尤甚題詩於冬青館云駑駘嘶呌知無定騏驥低垂自有心山上髙松溪畔竹清風纔動是知音又云杜鵑花裏杜鵑啼淺紫深紅更傍溪遲日霽光搜客思曉來山路恨如迷南部新書張又新郎中與楊處州友善楊妻李氏即庸相之女有徳無色楊未甞介意張甞語楊曰我少年擅羙名不復仕宦惟得羙室平生足矣既成婚殊失所望乃作牡丹詩云牡丹一朶直千金将為後來色最深今日滿園開似雪一生辜負看花心唐女真蕙蘭有才思咸通中為李億補闕侍婢愛衰後𨽻咸冝觀為女道士有怨李詩曰易求無價寶難買有情郎又有云蕙蘭消歇歸春圃楊栁東西絆客舟呉楊氏為宋齊邱閉於泰州永寧宫有詩曰江南江北舊家郷六十年來夢一場吴苑樓䑓皆冷落廣陵宫闕亦凄凉雲凝逺岫愁千片雨打孤舟淚兩行兄弟四人三百口不堪端坐更思量江南野錄謂此是李煜所作未知孰是並古今詩話戴衢乆不第甞夜吟曰擾擾東西南北情何人於此悟浮生還縁無月春風夜暫得獨聞流水聲又云坐落干門日吟殘午夜燈盧懐杼情鄭還古為河中從事為同院所誹謗貶吉州掾道中為望思䑓詩云䜛語能令骨肉離姦情難測事堪悲何因掘得江充骨搗作微塵祭望思又云吉州新置掾馳馹到條山薏苡殊非謗羊腸未是艱自慚多白髪争敢競朱顔苦有前生債今朝不懊還同上盧羣玉落托江湖不第縱情詩酒有詩曰酒㵼銀瓶到底清夜深絲竹鳯凰鳴紅粧醉起一花落更引春風無限情又投盧尚書詩曰無力不任為走役有文安敢滯清平從來若把耕桑定免恃彫䖝悮此生南部新録李山甫咸通中不第後流落河朔為樂彦正從事甞有悲怨執政曰勸君不用誇頭角夢裏輸嬴捴未知郎申自𤓰州宣事回進合歡水果一器煬帝以一雙令小黄門馳賜絳仙馬急揺觧絳仙拜賜泫然因附紅牋小簡進詩云馹騎傳雙果君王寵念深寧知辭帝里無復合歡心煬帝省之不悦顧黄門黄門懼拜而言意乃觧張安道舉進士再失意而作歌曰休休歸去休清風釣艇明月酒樓公不見冦相丁相雷州崖州休休歸去休景祐元年中茂材異等復又中賢良方正朱定國歸田録杜牧舎人罷任浙西郡道中有詩曰鏡中絲鬂悲来慣衣上塵痕拂漸難惆悵江湖釣魚手却遮西日向長安與杜甫齊名時號大小杜郡閣雅談唐文宗大和元年誅王涯鄭注後仇士良秉權或登臨㳺幸往往獨語左右莫敢進問因題詩曰輦路生秋草上林花滿枝憑髙何限意無復侍臣知古今詩話詩話総龜巻四十二欽定四庫全書詩話總龜巻四十三宋阮閲撰傷悼門雷有終自平蜀後人為立祠又甞以私財犒士貧不能足貸錢以給比捐舘舎時尚欠三萬緡章聖特出内帑錢償之故魏仲先悼有終詩曰聖代賢臣䘮何人不惨顔新祠民祭祀舊債帝填還鹵簿塵侵暗銘旌淚洒班功名誰可繼勅𦵏向家山青箱雜記杜子羙自蜀走湘楚卒扵耒陽時人謂以牛肉白酒脹飲而死則非也僧紹員詩曰賢人失志古來有牛肉因傷是也無耒陽宰詩曰詩名天寶大骨𦵏耒陽空耒陽有子羙墳時人謂聶令空堆土也唐人詩曰一夜来江南百年工部墳楊遺北朝多有文籍亦以文雅相尚王矩為工部郎中本燕人為北将耶律㤀其名管書記常從其出入耶律兄及其兄之子太平興國中戰沒於大郡後耶律經舊戰處覽其遺迹作詩矩記其两句云父子盡從虵陣沒弟兄空望鴈門悲談苑徐寅興化軍莆田人以祕書省正字歸老郷里既死節度使王延賔以詩哭之曰延夀溪頭歎逝波古今人事半銷磨昔除正字今何在所謂人生能幾何延夀溪寅所居也詩史李逺體物緣情皆謂臻妙甞有贈筝妓伍卿詩云輕輕沒後更無筝玉腕紅紗到伍卿坐客滿筵都不語一行哀鴈十三聲咏鴛鴦云鴛鴦離别傷人意似鴛鴦試取鴛鴦看多應寸寸腸故人盧尚書哭李詩云昨日舟還浙水湄今朝丹旐欲何為纔收北浦一竿釣未了西齋半局棊洛下已傳平子賦臨川争冩謝公詩不堪舊里經行處風朩蕭蕭鄰笛悲郡閣雅談江鄰幾善為詩清淡有古風蘇子羙坐進奏院事謫官後死吴中江作詩云郡邸獄寃誰與辨臯橋客死世同悲用事甚精甞有古詩云五十踐衰境如我在明年論者謂人莫不用事能令事如已出天然渾厚乃可言詩江天資淳雅喜飲酒鼔琴圍棋人以酒召之未甞不醉已醉眠人强起飲之亦不辭也或不能歸即宿人家商度風韵陶靖節之比云江甞通判盧州有酒官善琴以坐務不得出江旦旦就之郡中沙門道士及里畎能棋者數人呼與同往郡人見之習熟因畫為圗前列趨道一人騎馬青盖其後沙門道士褐衣數人葛巾芒履累累相尋意思蕭散惜時無名手此畫不足傳後何减稽阮也唐賢杼情竇鞏工為絶句甞從軍有别家詩云自笑儒生着戰袍書齋璧上掛弓刀如今便是征人婦好織廻丈寄竇韜又悼妓東東一篇云芳菲美艷不禁風未到春殘已墜紅惟有側輪車上鐸耳邉長似呌東東盧懐杼情令孤楚宫人斜詩云唯應四仲祭使者暫悲嗟又白時詩序云自刑部員外郎出得累厯方鎮携挈隨逐又有茈菰花芹花詩亦唐賢所罕詠者雜志李郢甞與賈島僧無可逰島沒長江僧亦返初郢感歎題曰却到京師事事傷惠林歸寂賈生亡何人收得文章篋獨我来經苔蘚房一命未沾為逐客萬縁初盡别空王蕭梢竹塢斜陽在葉覆閑堦雪擁墻雜談孟郊卒韓吏部作誌諡曰正耀先生賈島哭之詩曰身沒聲名在多應萬古傳寡妻無子息破宅帶林泉塚近登山道詩隨過海舡故人相弔處斜日下寒天摭言荒梁城南奉先寺後宫羙人官葬此角樓相望髙起墳草間柏下多石人秩卑焚骨不作塜青石浮屠唱邱壠家家墳上作享亭朱門相向無人聲樹頭土梟作人語月黒風悲鬼揺樹宫中養女作子孫年年犢車來作主廢后陵園官道側家破無人掃陵域官家嵗給半千錢街頭買餅作寒食此張文潜題奉先寺詩􅄯以道甞與江子之言文潜近來詩不堪好子之因誦此詩以對以道云莫不是文潜詩否洪駒父有過李公擇尚書墓一篇其間云鹿場兎逕白晝静稻壟松闗青嶂深說者以為大逼老杜邢居實字惇夫年少豪邁所與逰皆一時名士方年十四五時甞作明妃引末句云安得壮士霍嫖姚縳取呼韓作編户諸公多稱之既卒余收拾其殘章編成一集號曰呻吟集惇夫自少便多憔悴感慨之意其作秋懷云髙歌感人心心悲将奈何其作棗陽道中詩云有意問山仙此生更来否已而果卒於漢東惇夫之卒也山谷以詩哭之云詩到年来更老成江山為助筆縱横眼看白骨埋黄土何况人間父子情盖惇夫與其父歆向也蔡天啓亦有詩云人物於今歎𣺌然孤墳宿草已生煙日暮行人道傍㑹應逢年少共談𤣥其餘作者甚衆皆載於呻吟集後邵堯夫之弟名睦者無疾而化前此有重九詩云擬問東籬事東籬事𣺌茫后果殯於東籬之下故堯夫哭之云自兹明月清風夜蕭索東籬看斷膓又云腸斷東籬何所尋東籬從此事沉沉余於一雜編中見有書郵亭事既不曉其誰作但觀其詩有足哀者故載之於此其末云周仲羙不知何許人自言世居京師父㳺宦家于成都既而適李氏子侍舅姑宦泗上從良人赴金陵幕偶因事棄官入華山有長住之意仲羙即寄身合淝外祖家方求歸未得㑹舅􅃍調任長沙不免供載而南雲水茫茫去國益逺形影相弔洒涕何言因書所懐于壁詩曰愛妾不愛子為問此何理棄官更棄妻人情寧可已永訣泗之濵遺言空在耳三載無朝昬孤幃淚如洗婦人義從夫一節誓生死江郷感殘春腸㫁晚煙起回望太華峰不知幾千里並王直方詩話梅聖俞至寧陵寄余詩云獨護慈母喪泪與河水流河水冬有竭淚泉常在眸彦獻持國譏其作詩太早余應之以蓼莪及傳威贈王何二侍郎詩雜誌劉洞不知何許人江南國破後題池州一亭云千里長江唯渡馬十年養士得何人詩史白樂天去世人以詩弔之曰綴玉聮珠六十年誰教𡨕路作詩仙浮名不繫名居易造化無為字樂天童子觧吟長恨曲胡兒能唱琵琶篇文章已滿行人耳一度思鄉一愴然韓文公少年受蕭存吏部知賞及自袁州回入國子祭酒道經江州因逰廬山過吏部山居知諸子凋零惟二女在焉作詩曰中郎有女能傳業伯道無兒可保家今日廬山過舊隠空将衰淚落煙霞張祜性酷好太湖石三吴太守多以贈遺之故陸魯望以詩哭之曰一林石筍散豪家顧况字退翁暮年有一子字非熊忽暴亡况哀悼不勝乃作詩曰老人喪愛子日暮淚成血老人年七十不作多時别非熊冥間聞之以情告冥官冥官憫之却令生於况家三嵗能言冥間聞父苦吟求再生事厯厯然長成應舉擢第盧延遜哭李郢端公詩曰軍門半掩槐花宅毎過猶聞哭臨聲北固暴亡兼在路東都權𦵏未歸塋漸窮老僕傭看馬着惨佳人暗裹筝詩侣酒徒消散盡一塲春夢越王城劉夢得虎邱山見元㣲之二年過題名愴然有感云滻水送君君不還見君題字虎邱山因知早貴兼才子不得多時在世間又有所嗟二首云庾令樓中初見時武昌春色似腰支相逢相識空如夢為雨為雲今不知鄂渚濛濛煙雨㣲女郎魂逐暮雲歸只應長在漢陽渡化作鴛鴦一隻飛石守道為國子監直講天下呼為徂徕先生作慶厯聖徳頌大為時所忌㑹徐賊孔直温叛搜其家有介書坐貶而卒時疑其詐死欲剖棺騐之近臣言介實死得免永叔一詩哭之曰埋猶不信死終免斵其棺揚章安云章安或為章亦誰道盖棺人事足是非猶及土中身劉夢得傷友人亡姫詩曰見學琵琶見藝成今來追想倍傷情撚弦花下呈新曲放撥燈前謝改名大抵好花終易落從來尤物不長生蘭䑓夜直衣衾冷雲雨無因入禁城劉得仁出入塲屋三十年卒無所成而逝僧西白以詩弔之曰忽苦為詩來到此氷魂雪魄已難招直教桂子落墳上生得一枝寃始消張禕侍郎有愛姬早亡念之不已猶子為右補闕因其入朝未歸為浣溪沙辭置於几上曰枕帳熏爐隔繡幃二年終日兩相思好風明月爾應知天上人間何處去舊歡新夢覺來時黄昏微雨畫屏垂禕見曰此必阿灰詞阿灰補闕小字也錢熈泉南才士也曽作四夷來王賦獻太宗愛其才又甞撰三酌酸文世稱精絶後亦不逹而故郷人李慶孫以詩弔之曰四夷妙賦無人繼三酌酸文舉世傳詩話唐武宗有才人孟氏甞對武宗泣下作何滿子而卒張祜作詩云偶因清唱詠歌頻奏入深宫十二春却為一聲何滿子下泉湏弔孟才人􅇵談録春國公主薨神考賜挽詞曰海濶三山路香輪定不歸帳深閑翡翠珮冷失珠璣明月留歌扇殘霞散舞衣都門送車反宿草自春菲曉發城西道靈車望更遥春風寒魯舘明月斷秦簫塵入羅衣暗香隨玉篆消芳魂無北渚那復可為招又曰慶自天源發恩從國愛深歌鐘雖在舘桃李不成春水折空還沁樓髙亦隔秦區區㑹稽市無復獻珠人冷齋夜話詩話總龜巻四十三欽定四庫全書詩話總龜巻四十四宋阮閱撰隠逸門章聖遣使詔魏野仲先聞使至留詩一聮于壁而􅃍去云洗硯魚吞墨烹茶鶴避烟使還以壁間詩對章聖曰野不求仕矣遂不召古今詩話内侍孫可久賦性淡薄年踰五十即乞致仕都下居第堂北有小園城南有圃毎以小車載酒優㳺自適石曼卿甞過其居贈詩曰南北占河潤幽深在禁城叠山資逺意辭俸買閒名閉戸㫁蛛網折花移鳥聲誰人識髙意朝野石渠生栁永詩曰孫侯幽隠直城東草朩扶踈一畆宫曾珥貂璫為近侍却紆絛褐作閑翁髙吟擁鼻詩懐壮雅論深情道氣充厭盡繁華天上樂始將蹤跡學冥鴻青箱雜記劉素字仲華好學不事科舉頗通馬班陳范之書甞有人貽之詩曰不甘五等諸侯薦直恐九重天子知然卒不及仕江南野録方干處士號缺唇先生有司以唇缺不可與科名遂隠居鑑湖作閑居詩曰寒山壓鏡心此處是家林梁燕欺春醉閒猿學夜吟雲連平地起月向白波沉猶自聞鍾角棲身可在深又曰世人如不容我自縱天慵落葉慿風掃秋粳任水舂花朝連郭霧雪夜隔湖鐘身在能無事頭冝白此峰又感懐云事業不得力至今猶苦吟吟成五字句用破一生心世路屈聲滿雲溪寃氣深前賢多晚達莫怕鬢霜侵鑑戒録隠士張楚居洛陽平康之南與李衛公别第為鄰山水竒秀楚風韻髙潔衛公當軸薦為左拾遺不起後出鎮過平原往訪之楚避於山谷衛公歎恨乆之題其門曰昔日趣黄詔余慚在鳯池今來招隠士恨不見瓊枝詩史張齊賢相公司空致仕歸洛康寧福夀得晋公午橋荘鑿渠通流栽花植竹日與故舊乗小車携觴逰釣牓於門曰老夫已毁裂冠冕或公紱垂訪不敢迎見甞以詩戯故人云午橋今得晋公廬水竹烟花興有餘師亮白頭心已足四登两府九尚書慕唐李太亮為人故字師亮同前康定間益州書生張俞甞獻書朝廷天下由是知其名然不喜仕進隠於青城山白雲溪時樞宻田况守成都與詩曰深慚蜀太守不及采芝人雲齋廣録程嵩字明甫延津人初舉不第遂不肯仕場屋年八十餘甞作詩曰雖無事業傳千古却得安閒過一生同上王鼎書歌詩好神仙事逰心物外時人或謂有所得問之終不洩露詩百餘篇傳於人間五言詩贈程明甫云古縣枕前灘官閒道自安執盃山鳥唱曬藥野􅆐看石縫横琴筆槎根揷釣竿不知陶靖節早晚入雲端又贈僧云出齋􅆐獻果烹茗鳥􅋦薪又題云風落桂枝驚鶴去水流山果向人來又送僧云孤雲蹤跡都無定岀個青山入個山王易簡蕭希甫下及第名居榜尾不看榜歸華山尋就山釋褐授華州幕官後拜左拾遺又辭官歸隠留詩曰汨没朝廷愧不才誰能低折向塵埃青山得去且歸去官職有來還自來再入升朝官位諫垣䑓閣三十年官至八座乞致仕歸華山十年而終郡閣野談顧况志尚踈逸近於方外時宰招以好官况以詩答之云四海而今已太平相公何用喚狂生此身還似籠中鶴東望瀛洲呌一聲南部新書有一武士忘其姓名志樂閒散而家甚貧甞作詩曰人生本無累何用買山錢遂投檄而去古今詩話唐末蜀川有唐求放曠踈逸方外人也吟詩有所得即将藁撚為丸投大瓢中後卧病投瓢於江曰兹瓢茍不沉沒得之者方知吾苦心耳瓢至新渠江有識者曰此唐山人詩瓢也接得十纔二三題鄭處士隠居曰不信最清曠及來愁已空數㸃石泉雨一溪霜葉風業在有山䖏道成無事中酌盡一盃酒老夫顔亦紅贈如上人云不知名利苦念佛老岷峨補衲雲千片焚香篆一窠戀山人事少憐客道心多日日齋鐘罷髙懸濾水羅題青城山范賢觀數里緣山不厭難為尋真訣問黄冠苔鋪翠㸃仙橋滑松濕香梢古道寒晝旁緑畦薅嫩玉夜開紅竈撚新丹孤鐘已斷泉聲在風動瑶花月滿壇古今詩話偽蜀辛酉嵗有隠迹于陶沙者不知所從來戴破㡌携鐡笆竹畚多於觀寺閑處坐卧有又谷遇之以禮接之忽誦谷新詩數篇又詠自作詩曰九重天子人中貴五等諸侯閫外尊争似布衣雲水客不将名字掛乾坤劉槩字伯節青社人有氣節及第為幕僚一任不得志棄官隠居冨丞相器重之有詩云昔年曽作瀟湘客憔悴東秦歸不得西軒忽見好溪山如何却有楚郷憶讀書悞人四十年有時醉把䦨干拍閑居詩詁陳綯劍浦人好逰學善觧天文長於雅頌有詩曰中原莫道無麟鳯自是皇家結網疎與水曹任畹相善寓之詩曰好向明時薦遺逸莫教千古弔靈均晩絶縉紳之望以脩養為事有詩曰乾坤見了文章懶龍虎成時印綬疎又曰蟠溪老叟無人用閒把長竿抱六韜又曰近來世上無徐庶誰向桑麻識卧龍綯隠西山産藥物數十種開寶中甞見一叟角髪被褐與一鍊師舁藥入城鬻之獲貲則求鮓就爐對飲旁若無人歌曰藍采和塵事紛紛事更多争如賣藥沽酒飲歸去深厓拍手歌疑其為綯焉或云得仙矣江南野録又陳綯詩有江湖水清淺不足掉鯨尾飲水狼子瘦終日鷓鴣寒一鼎雌雄金液火十年寒暑鹿麑衣寄語東流任斑鬢向隅終守鐵蓑衣詩如此不可殫紀北梦𤨏言史虚白本山東人唐晋之間中原多事見李昪屢陳治要而不用遂隠廬山璟徙南昌至星子渚召問曰處士隠居必有所得曰近得漁父一聮令課之曰風雨掲卻屋全家醉不知璟變色時世宗已下淮南江南野録冦豹不知何許人與謝觀同在唐崔裔孫相公門下以詞藻相尚謂觀曰君白賦有何佳語對曰曉入梁王之苑雪滿羣山夜登庾亮之樓月明千里豹唯唯觀大言曰僕已擅名海内子才調多胡不作赤賦豹未搜思厲聲曰田單破燕之日火燎平原武王伐紂之時血流漂杵觀大駭豹後不仕隠南嶽許堅不知何許人遇酒筵不問尊卑逺近必到乗興只三五盃便去性嗜魚将魚火上旋炙熟處即吃生處復炙殊不去其鱗腸毎和巾帶入溪澗内浴度目浸身出水即於風日中坐候乾其衣服多有黤氣人惡之或有人與物忻然而受将散與貧者多於夢中吟詩宿溧陽縣靈泉精舎僧出白字韻請留詩其僧對榻見熟睡至晚起出七言詩云近枕吴溪與越峰前朝恩錫雲泉額竹林晴見鴈塔髙石室曾棲幾禅伯荒碑字没秋苔深古池香泛荷花白客有經年别故林落日啼􅆐情脉脉太平興國九年自茅山再逰廬山於方先生房内安下至夜深常與數人談笑人疑聴堅已知之髙聲云不得來不得來今在洪州西山或吉州玉笥山郡閣雅談韓退絳州人放誕不拘常跨一白驢有詩云山人跨雪精上便不論程嗅地打不動笑天休始行為人所稱好着寛鶴氅醉則鶴舞石曼卿贈詩曰醉狂𤣥鶴舞閒卧白驢號閉居詩話王兾公鎮金陵以書致錢塘講師遵式式将謁公過林逋逋以詩送云虎牙熊軾隠鈴齋棠樹隂隂長碧苔丞相望尊賔謁少清言應喜道人來同前謝逸字無逸臨川勝士也工詩能文魯直讀其詩曰是張流也恨未識也無逸詩曰老鳯垂頭噤不語枯朩槎牙噪春鳥又曰貪夫蟻旋磨冷官魚上竿又曰山寒石髪瘦水落溪毛凋皆為魯直稱賞朱世英以八行薦入學不得已謝之信宿而還所居溪堂生涯如龎藴余甞過之小君方炊稚子宗野汲井無逸誦書掃除顧余放箒大笑曰聊復爾耳余作偈曰老妻營炊稚子汲水龎公掃除丹霞適至棄掃迎門一笑相視不必靈照多通道理朱世英亦作偈曰提藍靈照掃地謝公一般是麫做作不同不假語黙通透玲瓏更若未㑹換手槌胸冷齋夜話神仙門上陳希夷先生毎睡則半載或數月近亦不下月餘贈金勵睡詩曰常人無所重惟睡乃為重舉世皆為息魂離神不動覺來無所知貪求心愈動堪笑塵中人不知夢是夢又曰至人本無夢其夢本逰仙真人本無睡睡則浮雲烟爐裏近為藥壺中别有天欲知睡夢裏人間苐一𤣥又甞題石水澗曰銀河灑落翠光冷一𣲖回環湛晚暉幾恨却為頑石碍琉璃滑處玉花飛又冬日晚望云山鬼煖或呼溪魚寒不跳晚景愈堪觀危峰露殘照題西峰曰為愛西峰好吟頭盡日昂嵓花紅作陣溪水緑成行幾夜碍新月半山無夕陽寄言嘉遯客此處是仙郷又華山曰半夜天香入巖谷西風吹落嶺頭蓮空愛掌痕侵碧漢無人曽嘆巨靈仙又與毛女逰曰藥苖不滿笥又更上危顛回指歸去路相将入翠烟又曰曽折松枝為寳櫛一作髻又編栗葉作羅襦有時問着秦宫事笑撚仙花望太虚翰府名談又先生唐徳宗時至僖宗封清虚處士賜宫女三人先生貯之别室以詩謝云雪為肌體玉為腮深謝君王送到來處士不生巫峽夢虚勞雲雨下陽䑓章聖累召不起有學士譏之曰秪是先生詔不出若還詔出一般人先生答曰萬頃白雲獨自有一枝仙桂阿誰無后歸華隂令王睦令飲之起寝於溪岩先生為詩曰華山髙處是吾宫出即凌空跨晚風䑓殿不将金鎻閉來時自有白雲封睦得詩愧謝青𤨏集張洎家居城外有一隠士名乃吕仙翁姓名洎倒屣見之索紙筆八分書七言詩一章留與洎頗言将作鼎鼐之意其末白云功成當在破𤓰年俗以破𤓰字為二八洎六十八而卒乃其䜟也仙翁詩多傳人間有自詠云朝逰北海暮蒼梧袖裏青蛇膽氣麄三入岳陽人不識朗吟飛過洞庭湖又有飲海龜児人不識燒丹符子鬼難看一粒粟中藏世界二升鐺裏煑山川之句大抵皆詞句竒怪世所傳百餘首人多誦之談苑道士馬自然有異術飲酒至一石不醉人有疾以雜草朩揉碎呵與人食無不瘥毎自吟曰昔日曽隨魏伯陽經時醉卧紫金牀東君過我多情懶罰向人間作酒狂廣明中梓州上升續本事集更有二首詩其一曰省悟前非一息間更抛人世棄塵寰徒誇羙酒如瓊液休戀嬌娥似玉顔含笑謾教心思苦别離還使鬢毛斑雲中幸有堪歸路無限青山是我山其二曰何用燒丹學駐顔閙非城市静非山時人若覔長生藥對景無心是大還詩史殷七七有異術過潤州與客飲云某有一藝有歡即顧屏上畫婦人曰可歌陽春曲婦人應聲遂歌其音清亮似從屏中出歌曰愁見唱陽春令人離腸結郎去未歸家栁自飄香雪如此者十餘曲同前吕仙翁名嵓字洞賔本闗右人咸通初舉進士不第巢賊為梗携家隠於終南山學老子法絶世辟榖變易形骸尤精劍術今往往有人於關右途路間與之相逢多不顯姓名以其趍舎動作異於流俗故為人所疑又為篇詠章句間洩露其意甞有詩送鍾離先生云得道來來相見難又聞東去幸仙壇杖頭春色一壺酒頂上雲攅五岳冠飲海龜児人不識燒山符手鬼難看先生去後應難老乞與貧儒換骨丹贈薛道士云落魄薛道士年髙無白髭雲中卧看石雪裏去尋碑誇我吃大酒嫌人念小詩不知甚麽漢一任軰流嗤雅言雜載又先生唐僖宗時人避冦亂多逰湖湘間或梁魏之地甞逰大雲寺與寺僧多唱和僧有詩贈翁翁乃依韻和曰三千里外無家客七百年前雲外身行滿蓬莱為别館道成瓦礫是黄金待賔榼裏甞存酒化藥爐中别有春積徳求師何患少由來天地不私親一日逰寂蕳觀淬劍於石作詩贈道士侯日晦曰欲整鋒鉛散彈勞凌晨開匣玉龍嘷手中氣岸氷三尺石上精神蛇一條姦血㸃流隨水盡兇膏今逐漬痕銷削除浮世不平事與爾相将上九霄甞逰長沙智度寺贈僧惠覺詩曰逹者推心兼濟物聖賢傳法不離真請師開訴西來意七祖如今未有人臨行題壁上云唐室進士今時神仙足閗紫霧却歸洞天衆方知其為吕仙翁也摭遺宿州天慶觀西廡下有石刻二詩盖至道中有賣墨人甞逰於此一日題詩曰秋景蕭蕭葉亂飛庭松影裏坐移時雲迷鶴駕何方去仙洞乾元失我期又曰肘傳丹篆千年術口誦黄庭两巻經鶴觀古壇槐影裏悄無人跡户長扄或以為名吕仙翁詩也古今詩話岳陽樓有碑極大乃李觀記吕仙翁筆迹李知賀州日有道士相訪自云吕先生誦過岳陽詩云唯有城南老樹精分明知道神仙過李亦不曉後知岳州有白鶴寺僧見過道及吕仙翁甞憇扵寺前松下有老人自松梢冉冉而下致恭於先生之前曰某松之精也今見先生過禮當致謁吕書一絶於寺壁而去獨自行來獨自卧無限世人不識我唯有城南老樹精分明知道神仙過後郡守為創亭於松下名曰回先生云古今詩話孟嘏連山人性落魄狂溺於歌酒賦詠後捷名不欲止江左士人頗竒之贈史虚白云詩酒獨逰寺琴書多寄僧聖朝奄有金陵孟賔于先居連上嘏興國中亦自吉水還故郷逾年卒書生成務崇因言廬山與嘏有忘年之分興國中見嘏且言自連上來㳺江左時有詩送成務崇曰同呼碧嶂前已是十餘年話别非容易相逢不偶然多為詩酒役早免利名牽幸有歸真路何妨學上𤣥務崇詢於連上知交皆言嘏卒已十餘年矣雅言雜載許堅江左人為性踈野似非今之人年髙絶不知晚人事少言人不問終日不啟口多居三茅山不知年嵗形容不變好飱魚能為詩多談神仙事題茒山觀曰甞恨清風千載欎洞天今得恣逰遨松楸古色玉壇静鸞鶴不來青帝髙苐氏幷寒丹已化𤣥宗碑㫁夢仍勞分明有箇長生路休向紅塵歎二毛早年堅以時事干江南李氏人訝其狂戇以為風恙莫與之禮一絶上舎人徐鉉云幾宵烟日鎻樓䑓欲寄侯門薦禰才滿面塵埃人不識謾隨流水出山来因拂衣歸隠今尚在隠迹江淮間沈廷瑞寄食閣皂山舉作異俗軰盛夏向火嚴寒单衣問其故終不荅與袁州陳智周相善興國中無病卒于玉笥觀數年有人於江筠路次見廷瑞共語乆之令人将詩寄智周智周得詩甚訝馳出門求送詩者已不知所在詩曰名山相别后别後㑹難期金鼎銷紅日丹田老紫芝訪君雖有路懐我豈無詩休羡繁華事百年能幾時智周於端拱二年登第授衡陽尉卒同前沈道士筠州髙安人故吏部郎中彬第二子也性孤僻形貌秀徹初名有鄰棄妻入道居玉笥山易名廷瑞毎遇深山古洞日不返嚴寒風雪常单衣危坐或絶食經月或縱酒行歌縁峭壁升喬朩若猿猱之状骨肉相尋便却走避忘情混俗人莫測之往往為同道者困雍熈二年正月内扵玉笥山先不食七日至上元日甲辰辭道侣歸所居院集仙亭念人生幾何賦無病而終遺言於弟子将畫者土宿一幀度人經一巻隨𦵏後二年二月二十日有閣皂山僧昭瑩於山門數里相遇且閣皂山相去玉笥山一百六十里僧昭瑩問所往云暫别廬山尋知已留下土宿一幀及度人經一巻五言詩一首為别云南北東西路人生㑹不無早曽依閣皂又却上𤣥都雲片隨天濶泉聲落石孤何期早相遇藥共煑菖蒲後昭瑩到玉笥山話及方知沈道士已亡具說途中相遇并所留土宿及經詩示于人衆皆駭異遂往墳上看見土交横拆裂闊及尺餘至今不敢發質其文驗其事即屍觧而去郡閣雅談張白邢州人少應進士舉不及苐入道常挑一鐡葫蘆得錢便飲酒自稱白雲子註天尊升𤣥護命經著武陵春色三百首略一两篇云武陵春色好十二酒家樓大醉方回首逢人不舉頭是非都不采名利混然休戴個星冠子浮沉逐世流贈酒店崔氏一絶云武陵城裏崔家酒地下應無天上有南逰道士飲一回卧向白雲深洞口又哭陸先生一絶云六親慟哭還復蘇我笑先生淚箇無脫履定歸天上去空墳留入武陵圖忽一日稱患至夜閉户曉不開問之不應道衆訝之抉門見血滿地問之别無所苦嘱身後勿燒焚尋時而卒酒户崔氏出朩櫃而𦵏扵武陵城西經半年有鼎州官忘其名在楊州勾當公事遇扵酒肆同盃數日衆聞之道俗看驗其墳有一穴如椀大深透其棺敲之已空陳省躬金陵人扵偽朝頗厯政事顯徳中出為臨川宰泛舟闕下道經章江泊女児浦抵暮有書生不通姓名登舟求見與省躬語論甚竒問今晋朝苐幾帝省躬具以實對㣲笑而已坐間髙吟云西去長沙東上船思量此事已千年長春殿掩無人掃滿眼梨花哭杜鵑省躬疑是神仙再拜告問無言而退出船不見所之吴含靈江西人也為道士居南岳六七年俗呼為吴猱好睡經旬不飲食常言曰人若要閑即湏嬾如勤即不閒也素不攻文偶作上升歌甚竒絶云玉皇有詔登仙職龍吐雲兮鳯着力眼前驀地見樓䑓異草竒花不可識我向大羅觀世界世界只如指掌大當時不為上升忙一時提向瀛洲賣清泰年羽化後有客人扵乾祐中在嵩山見之許鵲真人唐末逰南岳招仙觀壁上題歌一首云洪爐烹鍜人性命器用不同分皆定妖精鬼魅閗神通只自干邪不干正黄口小児初學行唯知日月東西生還為萬靈威聖力移月在南日在北玉是玉兮石是石藴棄深泥終不易鄧通餓死嚴陵貧帝王豈是無人力丈夫未逹莫相侵攀龍附鳯損精神題後數日上昇李夢符不知何許人梁開平初鍾傳鎮洪州日與布衣飲酒狂吟放逸甞以釣竿懸一魚向市肆蹈漁父引賣其詞好事者争買得錢便入酒家其詞有千餘首傳于江表略其一两首云村寺鐘聲渡逺灘半輪殘月落前山徐徐撥棹却歸灣浪叠朝霞錦綉翻又曰漁弟漁兄喜到來婆官賽了坐江隈椰榆杓子木瘤盃爛煑鱸魚滿案堆察考取状答曰揷花飲酒何妨事樵唱漁歌不碍時遂不敢復問或把氷入水及出身上氣如蒸鍾氏亡亦不知所在俱同前伊用昌逰江浙間散誕放逸不拘細謹善飲毎醉行歌市中其言皆物外汗漫之辭似不可曉亦能為詩留題閣皂觀云花洞門前吠似雷險聲流㫁俗塵埃雨噴山脚毒龍起月照松梢孤鶴回羅幕秋髙添碧翠畫簾時捲對樓䑓两壇詩客何年去去後門關更不開後入湖南謁馬氏時方設齋獨不請用昌自造之㩀其坐洎食畢則大聲吟詩云誰人能識白元君上士由來盡見聞避世早空南火宅植田髙種北山雲雞能抱卵心常聴蟬到成形殻自分學取大羅些子術免教松下作孤墳詩畢拂衣而起衆訝竒異乃逼問無對出門不見雅言雜載石恪西蜀人善畫尤長於山水禽魚亦工歌詩言論粗暴多誚人短開寶中王師下西蜀遣名畫入京恪在其數宣於相國畫壁工畢上状乞歸奉勑任便出京卒於道中雍熈元年殿直雷承昊奉命來衡陽風土殊俗恪痛勉之為七言詩送承昊天暮與恪宿于公舎逹曉分携承昊行經數里思恪已卒數年􅃍出所贈詩多言衡陽風物其詩曰衡陽去此正三年一路程途甚坦然深䆳門墻三楚外清風池舘五峰前西邉市井來商客東岸汀洲簇釣舩公退只應無别事朱陵後洞看神仙及到任公宇一如恪言詩章好事者争傳之同上黄覺仕宦不遂意送客都門外至則客已逺不及旅舎中見一道士在側因取所携酒肉呼道士共飲食之既罷道士舉杯摭水寫吕字覺始悟其為吕洞賔道士曰明年江南相見覺果得江南官及期見道士出俵大錢七文其次十文又小錢三文曰數不可益也予藥可數寸許告曰嵗旦以酒磨服之可保一嵗無疾覺如其言至七十餘藥亦将盡作詩曰床頭厯日無多字屈指明年七十三果以是嵗終貢父詩話咸通中有進士張綽下第逰江淮養氣耽竒只以爐火為事題壁曰争那金烏何欲上飛不住紅爐謾燒藥玉顔安可駐今年花落枝明年花滿樹不如且飲酒莫管流年度人異之不喜粧餙多糜旗亭而好盃人召飲若遂意則索紙剪蝴蝶三十二以氣吹之成列而飛如此累刻以指收之俄皆在手見者求之即以他事為阻甞逰塩城多為酒困非類相競留繫邑中醒乃課述為陳情二章獻狄令乃釋之詩云門風長有蕙蘭馨鼎族家傳覇國名容貌静懸秋月彩文章髙振海濤聲訟堂無事調琴軫郡閣何妨醉玉觥今日東流橋下水一條從此鎮長清自後宰欲傳其術張云明府勲貴家流年少而宰劇邑多聲色犬馬之求未暇忘味𤣥奥因贈詩云何用梯媒向外求長生只在内中脩莫言大道人難得自是行心不到頭去之日乘醉因求搗網紙剪二鶴於㕔前俄而翔飛乃曰汝先去吾即後來時狄令亦醉其所題云自不㑹天下經書在腹内身却騰騰處世間心即逍遥出天外江南好事者尚記上升時事桂林聚談崔存字存中博州博平人因逰王屋見二人坐於水濵存曰願聞二仙名號東坐曰豈不知世有石曼卿乎西坐者即蘇舜欽子羙也存曰世傳學士為鬼仙矣曼卿曰甚哉二三子之妄也夫純陽即仙純隂即鬼升於天者為仙沉於幽者為鬼處於中者為人既為仙又為鬼乎存曰願得一語以救塵骸曼卿作詩曰牛毛麟角成真少莫道從來是壮夫龜鶴性靈終好道神仙言語不闗書不将青目觀浮世都把仙春駐玉壺寄語世人無妄語髙真幽鬼適殊途子羙作詩曰宿植靈根何太早洞悟真風正年少常令丹海飛日烏又使玉液朝元腦崑䑓氣候四時春紫府光隂夜如曉來時不用五雲車跨着清風下蓬島湏㬰有翠鳥飛下㗸書置於二子前子羙曰瀛洲有召遂飛踰山頂而去摭遺詩話總龜巻四十四欽定四庫全書詩話總龜巻四十五宋阮閱撰神仙門中有逸士衣襴破衫六􅙧黒朩腰帶闊三寸一脚着一靴一脚跣行夏以絮衫冬卧氷雪出氣如蒸自號藍米和歌曰踏踏歌藍采和世界能幾何紅顔三春樹流光一擲梭古人混混去不返今人紛紛來更多朝騎鸞鳯到碧落暮見桑田生白波長景明暉在空際金銀宫闕髙嵯峨曵長繩穿錢拖行縱錢散不收後至濠梁飛上升冉冉而去續仙傳任生隠於嵩山讀書夜有一女子來曰冥數合與子為姻生意其異乃拒之遂開簾而入可二十許冶容艶羙二青衣侍前就案書一詩云我本籍上清謫居逰五岳以君無俗侣來勸神仙學三日當來遂去生覽之愈疑妖怪志不納又贈一篇云葛洪還有婦王母亦從夫神仙盡靈匹君意合何如面墻不對女子再贈一首阮郎迷不悟何䖏伸情愫明日海山春彩舟却歸去出門冉冉飛望而去數月任大病為黄衣吏攝去來行十里忽見幢節不絶有女仙乗翠輦侍從數千人黄衣吏曵任墻下避仙笑曰嵩山薄命漢汝數盡更與三年生果六十卒後詩為雷電取去盧肇遺史洞庭賈客吕卿雲以貿販雜貨逐什一之利有羡施貧善􅅇遇好山水即留中春月夜泊君山獨飲時一盃弄數曲波上有漁舟冉冉而來乃一父老皤然賈置笛起立迎上舟問所以曰聞子笛聲非凢我是以來對數杯我少業􅅇子有性可教父老於懐袖間出笛三管其大如合拱其次大如常人所蓄其小如細筆管卿雲請父老一吹曰大者不可發次者亦然小者為子吹一曲不知得終否卿雲曰願聞其不可者曰第一者對諸天帝合天樂動天地坼日月五星失次第二者對洞府諸仙合仙樂飛沙走石百獸腦裂㓜稚震死第三者可與朋儕聴之未知可終否抽小笛吹三聲湖上風動波濤􅍅湧魚鱉跳噴僮僕恐悚君山鳥獸呌噪舟檝大恐父老不復吹引滿數盃乃吟曰湘中老人讀黄老手挼紫藟坐碧草春至不知湘水深日暮忘却巴陵道又飲數盃曰明年社期君於此遂棹漁舟而去隠隠没於波間傳異志盧李二生居太白山讀書習吐納李生不甘苦貧訣别浪迹江湖後之官橋園人吏欺隠折官錢覊縻不得東西貧瘁日甚揚州阿師橋逢人草履布衫視之乃盧生昔號二舅者李生與舅語哀其繿縷盧大罵曰貧賤不畏公弃身又有欠負且被囚繫有面相見乎李生厚謝之舅咲曰居處不逺來日以馬來迎至日晚果來云屈郎君去來十里朱門斜開二舅出迎雲冠霞帔容貌光澤侍婢數百人燕饌名果不可紀求得一女子佐酒善箜篌容色極佳上有朱字一行雲中辨江樹天際識歸舟燕罷曰莫願作婣否又曰所欠官錢二萬貫請以柱杖往波斯店取錢可從此學道無自穢身其年汴州行軍陸長源以女妻之宛類盧舅北亭善箜篌者箜篌有詩二句李具言舊事女曰少年時因兄弟戯夜乃作夢入仙宫如公所言者盧肇遺史茅濛字初成華陽人也隠華山脩道當始皇三十一年九月白日上升先是時有民謡曰神仙得者茅初成駕龍上昇入太清時下元洲戯赤城繼世而往在我盈始皇聞之問故老曰此仙之謡始皇於是有尋仙之意濛之元孫盈得道於金陵勾曲山上升為東岳上卿司命君太元真人居赤城時來勾曲為人改勾曲為茅君山拾遺神仙門下慶厯中有一閑人逰岳謁主簿郭及甫既坐視其刺乃羅道成也詢其郷里言郴州人及甫留飲曰乆思東州之逰前日逰太山已遍到佳處旦夕廻南方山索紙筆為詩曰因思靈秀偶來逰碧玉寒堆萬叠秋直上太山髙處望根盤連接十餘州後自和云水雲踪跡自閒逰夏谷隂寒冷勝秋猿鳥性情猶戀舊飜身却去海邉州及甫不勝嘆羡及去令人送之又得詩曰白騾代步若奔雲閑人所至留詩迹欲知名姓問源流請看郴陽山下石後問郴人有成真君觀得道乘白騾行石壁上其跡至今存焉古今詩話唐子正著作桂州人治平中赴舉至全州途中雇一僕負重擔健若飛羽雖鞭馬疾逓常去馬百步外恐其逸去逐遣之其僕即日自全州二千七百里日午巳到唐州留書驛吏曰候桂州唐秀才至即投之唐月餘到驛驛吏出書題云呈桂州唐秀才歸真子封唯一詩曰袁州相見又之全不遇先生道未員大抵有心求冨貴到頭無分學神仙箧中靈藥冝頻施鼎裏丹砂莫妄傳待得角龍為宴㑹好來黄壁卧林泉唐甚怪之話其状貌乃全州僕也留書之日乃全州所遣日也始悟其為神仙唐後為邕倅熈寧丙辰交趾㓂邕唐遇害乃詩所謂角龍也許宣平新安人常掛一花瓢及曲竹枝毎醉即獨吟曰負薪朝去賣沽酒日西歸路人莫問歸何處穿白雲行入翠微好事者於洛陽同華間是處題之李太白見曰此神仙也殷七七名文祥周寳舊於長安識之及寳鎮浙西七七忽到召之益加禮遇鶴林寺有杜鵑花寺僧相傳云正元中外國僧自天台鉢中以藥養其根來殖於此寺僧剏餙花院人或見女子紅裳艶麗遊於花下俗傳花神也一日寳謂七七曰鶴林寺天下竒絶甞聞能開頃刻花此花能開赴重九乎曰可也乃前二日經鶴林寺宿中夜有女子來謂七七曰妾為上蒼所命下司此花非乆即歸閬苑今為道者開之晨起寺僧訝花漸拆至九日爛熳後為兵火其花遂亡信歸閬苑矣元真子張志和㑹稽人守真養氣卧雪不冷入水不濡顔魯公守湖州日與賔客唱和為漁父詞志和曰西塞山前白鳥飛桃花流水鱖魚肥青蒻笠緑蓑衣斜風細雨不湏歸坐客嘆服不巳後果傳之相州棲霞谷有喬順二子服飛龍藥二子十年不飢魏文帝詩曰西山有仙童不飲亦不食謂此俱同上吴仁壁闗右人學進士逰羅浮洞學老荘於張先生得其大旨辭歸謀入京取應先生曰觀子氣法可住此吾授子長生之道仁壁辭以老母缺甘旨俟名遂身退學亦未晚先生曰此去必遂其志亦湏早來是年中第入浙謁錢武肅殊禮之累辟入幕堅辭不就以詩謝云東門上相好知音數盡䑓前郭隗金累重雖然容食椹力微無計報焚林弊貂不稱芙蓉幕衰鬂仍慚玳瑁簮十里溪光一山月可堪從此負歸心武肅復遣人請撰羅城記仁壁堅不從武肅怒沉扵江吴人惜之仁壁有一女有閒居詩云為惜苔錢妨換砌因憐山色旋開尊又贈道士云五龍金角向星斗三洞玉音愁鬼神又題甖粟云蒲草薄裁連蒂白臙脂濃染半葩紅又逰法華寺云髙閣煙霞襌客睡滿城塵土世人忙建隆初廣南劉隠遣中翁光普同禮丞寗昱就羅浮山設醮醮畢昱逰諸岩洞至山頂見一石門有老叟衣薜蘿㨿門而坐昱問其由云是羅浮先生宅再問誰氏叟低聲對云吴先生也名仁壁言訖户闔了無所見其後或有人於羅浮勾曲諸山見仁壁復引一十嵗許女子驗是其女也雅言雜載有商客過海遇風俄抵一所門宇聳秀珎器爛然云是樂天之居樂天聞之作二絶云近有人從海上廻海山深處是樓䑓中有仙龕開一室皆言此待樂天來又云吾學空門不學仙恐君此語是虚傳海山不是吾居處歸則惟歸兠率天古今詩話女真錢氏二姊妹依止陶隠居誦黄庭經即茅山燕洞也至今有紫菖蒲碧桃焉其姊披白練衣得道入洞及女弟至則户已扄矣淳化五年夏侯嘉正與道士五人往彼投龍是夜雷震其洞復開有一吏深入遇道士與林擒一枚食之遂絶粒田霖作詩題之曰燕口龍泓氣象清錢真此䖏有遺靈仙兄去後師猶在女弟回時户已扄雲片尚如披白練泉聲長似誦黄庭碧桃花發菖蒲紫留與人間作畫屏同上唐儀鳯中清城縣横源翠圍山下有民王仙柯服道士所遺靈丹拔宅上升已具仙傳拾遺蜀州僧中寤釋學道播於方州偶於龍池山逢人精神爽朗異於常叟即王仙柯也寤公曰聞仙名已久何幸相逢飛升之後胡為來此仙柯曰吾等有靈藥止能飛步今全家隠扵後山更脩道法遐舉之事吾何望焉但長夀而已寤公以詩贈之曰瞻思不及望仙兄早晚遐飛入太清手種一株松未老爐燒九轉藥新成心中已得黄庭術頭上應無白髮生異日却歸華表語待教凢俗普聞名自後不復遇葆光子聞於真人曰世人學道資一丹一藥聊固其命何以脩道未得證就避忌尤多三官廵羅攝入鬼録所以頻改姓名先用屍解然後棲止靈岳進取上法或五岳授事效職仙曹優㳺人間或至千嵗功徳升聞即朝玉皇海岳之間往往遐舉者世人無由知也今之初得道者止於仙隠有騰空者服金丹也遐舉之事未可希望北夢𤨏言伊夢不知何許人因夢两日遂立此名唐末不仕披羽褐逰山水題攸縣司空觀仙壇云惟有松杉空弄日更無雲鶴暗迷人題黄蜀葵云露凝金盞滴殘酒檀㸃佳人噴異香在醴陵何氏家一日别去作詩附鐡匠回言在彼打劍何氏發其塜棺内惟劍耳青𤨏后集陳純字元朴莆田人因逰桃源中秋夜遇玉源靈源桃源三夫人玉源令純舉中秋月詩純言一聮云莫辭終夕看動是隔年期桃源曰意雖佳但不見中秋月作七月十五夜月亦可玉源因作詩曰金風時拂袂氣象更分明不是月華别都緣秋氣清一輪方極滿羣籟正無聲曉魄沉烟外人間萬事驚靈源詩曰髙秋渾似水萬里正圓明玉兎步虚碧氷輪輾太清廣寒宫有路桂子落無聲吾館無絃弹棲烏莫要驚桃源詩曰金吹掃天幕無雲方瑩然九秋今夕半萬里一輪圓皓彩盈虚碧清光射玉川瑶樽休惜醉幽意正綿綿玉源謂純曰子能繼桃源之什乎純作詩曰仙源甞悮到覊思正蕭然秋静夜方静月圓人更圓清尊歌越調仙棹泛晴川幽意知多少重重類楚綿太原王世寧自言籍係第十八洞玉仙人熈寧中以暴疾終于家臨終作詩曰翠羽旌幢仙子隊紫雲樓閣玉皇家人間風雨易分散回首武陵空落花韓湘字清夫文公猶子也落魄不覊文公勉之學湘曰湘之所學非公知之公令作詩以觀其志詩曰青山雲水窟此地是吾家後夜流瓊液凌晨咀絳霞琴弹碧玉調爐鍊白朱砂寳鼎存金虎元田養白鴉一瓢蔵世界三尺斬妖邪觧造逡廵酒能開頃刻花有人能學我同共看仙葩公覽而戯之曰子能奪造化耶湘曰此事甚易公為開尊湘聚土以盆覆之良久花開乃牡丹碧花二朶於花間擁出金字詩一聮云雲横秦嶺家何在雪擁藍闗馬不前公未曉其句意湘曰事乆可驗遂告去未幾公以佛骨事謫官潮州一日途中遇雪俄有人冐雪而來乃湘也湘曰憶花上之句乎正今日事也公詢其地即藍闗嗟嘆久之曰吾為汝足此詩詩曰一封朝奏九重天夕貶潮陽路八千本為聖明除弊政豈於衰朽惜殘年雲横秦嶺家何在雪擁藍關馬不前知汝逺來湏有意好收吾骨瘴江邉公别湘詩曰人才為世古來多如子雄文世孰過好待功名成就日却抽身去上烟蘿湘别公詩曰舉世都為名利醉伊余獨向道中醒他時定是飛升去冲破秋雲一㸃青青𤨏集賈師雄郎中治平中通判邵武甞收鐡鏡甚大非常物也乆欲淬磨未得其人左右言近有回處士自言善磨鏡召至風骨軒昻非常人也出示之仍以飲酒畢推藥鏡上言藥少當自取之既去不回詢其宿在太平寺留詩一絶而去曰手内青蛇凌白日洞中仙果艶長春湏知物外烟霞客不是尋常磨鏡人取鏡視之藥已化去所堆藥處一㸃表裏通明如寒玉春水又甞有顧中謁故人季郎中至岳陽投宿市邸唱新曲有補鞋人問曰此何曲中曰都下新聲也其人曰吾不觧書子能為我書當於此調頃一詞中因為書之乃今所傳沁園春也因問其姓荅曰生於山口長於江口即今為守谷之客姓名不知也中翌日見太守言之追不復至題詩一絶於邸中腹内嬰兒養已成且居塵世暫娱情無端措大剛饒舌却入白雲深處行中與太守深歎恨之山口守谷乃仙之姓并字也永叔登第後授洛陽節推聖俞為洛陽簿乃得友之初也一日同逰嵩山佳處相對吟醉遂望四峰巨厓之上有丹書四字云神清之洞指示聖俞聖俞曰不見洎告老歸潁思前四字作一絶云四字丹書萬仭厓神清之洞鎻樓䑓烟霞極目無人到鸞鶴今應待我來後數月薨並同上有道人過沈東老飲酒用石榴皮冩絶句壁上稱回山人東老送出門渡橋不知所往或曰此吕洞賔也僕見東老子偕道其事為和此詩後復與偕遇錢塘更為書之回山人詩云西鄰已富憂不足東老雖貧樂有餘白酒釀來緣好客黄金散盡為收書東坡和曰世俗那知貧是病神仙可學道之餘但知白酒留佳客不問黄公覔素書符離道士晨興際華岳先生詩觧餘忽見黄庭丹篆字罔傳青紙小朱書凄凉雨露三年後彷彿塵埃數字餘至用榴皮緣底事中書君豈不中書東坡詩話劉跛子青州人拄一拐毎嵗一至洛陽看花舘於花家園大花見之即與二十四曰跛子吃半角小花見時止與十金曰跛子喫椀羮以詩謝曰大花見時二十四小花見時吃椀羮人生四海皆兄弟酒肉林中過一生張丞相詔自荆南時跛子與客飲市橋客起觀之挽其衣使且坐飲作詩曰遷客湖湘召赴京輪蹄迎迓一何榮争如與子市橋飲且免人間寵辱驚余寓於興國寺戯之詩曰相逢一柺大梁間妙語時時見一斑我欲從公蓬島去爛銀堆裏看青山計其夀百四十五矣邸中無人識之冷齋夜話周貫不知何許人自號朩鴈子宿龍泉觀半夜搥道士門道士問其故曰偶得句當奉告因吟曰弹琴傷指甲盖蓆損髭鬚是夜貫以蓆自覆故耳至袁州見市井李生秀韻欲携同歸林下學嗜酒色意欲無行貫指煑藥鐺作偈示之曰頑鈍天教合作鐺從初三脚豈能行雖然有耳不聴法只愛人間戀火坑尋死於西山将化人問幾嵗貫曰八十西山作酒仙麻鞋糺㫁布衣穿相逢甲子君休問太極光隂不記年復有人見於京師附書於李生云明年中秋夕當上謁至時生以事出貫乃以白土書門而去曰今年中秋夕來赴去年約不是折足鐺弹指空剥剥李生竟折一足冷齋夜話劉野夫留南京乆未入都彭淵才以書督之野夫荅曰跛子一生別無道路展手教化三饑两飽目視雲漢聊以自誑元祐新年被劉法師徐神翁形迹得不成模樣深欲上京相覷又恐撞着丈人湼陁佛驀被乾拳濕踢着甚來由不覊如此當作長短句曰跛子年來形容何似儼然一部髭鬚世間許大拐上做工夫選甚南州北縣逢着處酒滿葫蘆熏熏醉不知明日何處度朝晡洛陽花看了歸來帝里一事全無又還與瓠羮再作門徒驀地思量下水粮網上蘆蓆横鋪呵呵笑睢陽門外有箇大南湖有僧吏宗著麻衣加衲其上號麻衣道士坐廣陵白土埭謳歌自適江都令檀紙與語多無畔岸索紙賦詩曰有欲苦不足無節即無憂未若清虚者帶素披𤣥裘浮游一州間汎若不繫舟要當畢塵慮棲息老山邱檀紙異之陶淵明寄白土埭逢三異比邱此其一也觀其詩句脫去畛封有超然自得之氣非尋常介夫所能作也並同上詩話總龜巻四十五欽定四庫全書詩話總龜巻四十六宋阮閱撰藝術門鍾傳領江西日客有以覆射之法求見傳以厯日包橘置袖中令射客云太嵗當頭坐諸神不敢當其中有一物常帶洞庭香唐宋遺史何龍圖中正初登第聞西川郭從周精於卜乃以縑素求筮從周作一絶贈之云三字來時月正圓一麾從此出秦關錢塘春色濃如酒貪醉花間卧不還公後宦達以三月十五日授知制誥以言邉事忤㫖出知秦州後移杭州而捐舘舎從周之筮何其驗歟黄州東南三十里為沙湖亦曰螺螄店予買田其間因往相田得疾聞麻橋人龎安常善醫而聾遂往求療安常雖聾而頴悟絶人以指畫字不盡數字輙深㑹人意余戯之曰余以手為口君以眼為耳皆一時異人也疾愈與之同㳺清泉寺在蘄水郭門外二里許有王逸少洗筆泉水極甘下臨蘭溪溪水西流余作歌云山下蘭牙短浸溪松間沙路净如泥蕭蕭春雨子䂓啼誰道人生無再少君看流水尚能西休将白髪唱黄雞是日極飲而歸百斛明珠王建宫詞百首多言禁中事皆史傳小說所不載者往往見於其詩如内中數日無呼喚傳得滕王蛺蝶圖之類滕王元嬰髙祖子新舊唐書皆不著其所能惟名畫録略言其善畫亦不言其工蛺蝶也惟見於建詩耳或聞今人家亦有得其圖者唐世一藝之善如公孫大娘舞劍曹剛琵琶米嘉榮歌皆見於唐賢詩句遂知名於後世當時山林田畆潜徳隠行君子不聞於世者多矣而賤工末藝得所附託乃垂名不朽亦各係乎幸不幸爾合淝人傳論言曹谷善星厯衍數談事如神為王冀公作命書云七十年中一一加㺯珠灘上事堪誇碧油幢下聞鳴鳥十日催還上漢槎公年七十二知㐮陽正得千日召還又云周匝将臨壬戌嵗定鼎門前春色異一千日上少三環再入和羮冝盡醉後兾公判西京将七百日再入政府壬戌嵗也又云臨去尚猶聞禁漏異姓佳名在史書兾公薨謝之夕漏将盡無子其婿張環掌䘮事並古今詩話俳優門李家明江南李璟時為樂部頭善滑稽為諷詠璟逰後苑登䑓見牛晚卧璟曰午旦熟矣家明曰臣不學敢上絶句云曾遭寗戚鞭敲角又被田单火燎身閒背斜陽嚼枯草而今問喘更無人左右之臣皆免冠謝罪李氏乃徐温養子及僣􅃅遷楊氏于海陵璟繼統用宋齊邱言無男女少長皆殺之今海陵州宅之東小墳十數皆當時所殺楊氏之族也宋齊邱只一子轍卒逾月慟哭不止家明曰惟臣能止之乃作大紙鳶上大書曰欲興唐祚革強吴盡是先生作計謨一箇孩児􅂸不得上皇百口合何如乗風吹之度至齊邱家遂絶其縷齊邱見之慚感乃止璟於後苑命臣僚臨池而釣諸臣屢引到數十巨鱗惟璟無所獲家明乃進口號曰新甃垂鈎興正濃御池春煖水溶溶凢鱗不敢吞香餌知道君王合釣龍璟善之幸南都畫江為界舟楫多行南㟁至趙北因輟樂停觴北望皖公山謂家明曰好數青峰不知何名家明應聲曰龍舟輕漾錦㠶風正值宸逰望逺空回首皖公山色翠影斜不到夀盃中出江南野録互見談苑所載不同未知孰是江南李氏樂人王感化建州人𨽻光山樂籍建州平入金陵教坊少聰敏未曽執巻而多識善為詞口諧捷急滑稽無窮時本郷節帥更代餞别感化前獻詩曰旌斾赴天䑓溪山曉色開萬家悲更喜迎佛送如來至金陵宴苑中有白野鵲李璟令賦詩應聲曰碧岩深洞恣逰遨天與蘆花作羽毛要識此來棲宿處上林瓊樹一枝髙又題恠石凢八句皆用故事但記其一聫云草中誤認将軍虎山上曾為道士羊談苑楊叔寶郎中與眉州人言頃眉州視事後三日作火排樂人獻口號其末句云為報士民湏慶賀火星去了福星來喜召優人問曰火排致語誰做對曰本州自來舊例只用此一首湘山録丁晉公鎮金陵甞作詩有吾皇寛大容尸素乞與江城不計年之句天聖中李文定公出鎮金陵一日郡宴優人作語意其宰相出鎮所作理必相符誦至落句頂望抗聲曰吾皇寛大容尸素乞與江城不計年賔僚皆俛首文定笑曰是何是何上聞見責歸田録賞花釣魚㑹詩賦往往有宿思者天聖中永興軍進山水石適㑹宴命賦山水石歌盖出不意中生優人入戯各執紙筆作吟哦状其一優人或仆於石上衆扶掖起既起曰累日來作一首賞花釣魚詩准備應制却被這石頭摖倒左右皆大笑翌日降出詩令中書銓定内有鄙惡者落職與外任東齋記竒恠門王謝金陵人世以航海為業一日於海中失舟泛一板登岸見一翁一嫗皆衣皂引謝至所居乃烏衣國也以女妻之既人謝思歸復乘雲軒泛海至其家有二燕棲於梁間謝以手招之即飛來臂上取片紙書小詩繫於燕尾曰誤到華胥國裏來玉人終日苦憐才雲軒飄去無消息灑淚臨風幾百迴來春燕迴徑飛來謝衣上燕尾有詩一云昔日相逢因數合如今暌逺是生離來春縱有相思字三月天南無鴈飛至來嵗燕竟不至因目謝所居為烏衣巷劉禹錫有詩曰朱雀橋邉野草花烏衣巷口夕陽斜舊時王謝堂前燕飛入尋常百姓家摭遺彭城劉景直雍熈間逰華清宫因題詩扵門屏閒云天子多情寵太真六宫専幸掌中身漁陽皷動長安破從此香肌委路塵是夜夢明皇召去論當時事妃子索景直有所贈立作詩曰玉刻水中龍雲牌掲故宫霓裳滿天月粉骨幾春風眉勢從山盡裙腰芳草空共知千古事悽恨與誰同岐王至明皇曰來何晚王曰適杜甫到臣帳中誦哥舒翰詩向臣似有徳色云日月低秦樹山河遶漢宫明皇又曰常愛伊夜闌更秉燭相對如夢寐之句李白終無甫之筋骨至如賈至崔輔國亦闕自然之句張老死把筆無伊一字遂宴飲忽聞寳雲寺鐘聲方覺郭平振武舊将士分配于錢塘給官屋居之屋在修文坊舊為白校書允賃燒藥丹朱欲往而官吏丁踈因逐之乃破爐而去白因召丁踈同飲謂踈曰大藥為吾子所破有小戯術子醒酒乃取盤一面置於膝上以指敲兩腕出五色弹子兩枚化為雙燕而飛白曰僕射髭甚繁燕好去可减些言未畢二燕化為二小劍長五寸餘鋒刄如雨交舞於踈之頥頷間髭落如雪踈懼甚白呼劍下盤中依前成二丸納於左右腕而去錢昭度贈白詩曰袖裏青鋒秋水寒誰疑雙燕是金丸出門風雨如何去空有霜髭在玉盤無諸彭演西逰鄠縣宿甘泉店閒步原野忽有一少年引至一古官舎甚宏壮梁上有紅絲羯皷縚數條垂于地一老人杖而守之演問曰此何處老人曰開元興慶宫也來此者二百年中十二人爾去時莫不為詩請書一絶可乎演為詩曰長安宫闕半蓬蒿塵暗虹梁羯皷縚惟有水天明月夜一條空碧見秋毫演又曰十二人之詠可得聞乎老人舉一章曰小小蓬山刻得成宫簾不動結飛鯨誰将八月天河水瀉到重樓無浪聲此楊尚書所作也又誦一章曰金人無路守瓊山坐見雲生棟宇間忽墜霜飛翠樓曉不知龍尾許誰扳此裴中書所作也再詢楊裴之名則瞪而不答錢仁伉尚父之孫也為元帥府中書檢校司徒與中軍都虞候金沼鄰居沼所居堂東植牡丹花一本着花三百朶其色如血金含稜毎瓶子頂上有碎金絲如自然蛺蝶之状一城以為殊異毎嵗花開張宴仁伉預焉開寶七年春三月花纔一两朶開仁伉一夕洪飲擊劍裎服中单背負大籃左手携鋤腰揷六七首踰墻而過沼中外無知者鋤取牡丹置籃中乃平其地空中聞有吁歎之聲微細若逰蜂音辭曰一花三百朶含笑向春風明年三月裏朶朶㫁腸紅仁伉異之移植於亭後明日沼覺失花為非人力所及來年花盛開乃宴召沼沼一見無語得疾以歸至夜憤悶不已以刀决腸而卒腸皆寸寸斷果符空中之語鄭繼超廣州人赴官鳯翔道逢田㕘軍同行家累千餘人言是東川替罷亦入西京繼超與欵自言路人有荘在北邙山下因問鞍乗極多何也曰亡室人來多年皆蜀中孤寡家子息亦欲旋旋與人繼超曰願得一人乃令妙香與之是夕歸繼超家數年繼超卜居西洛一日忽謂繼超曰妙香非人也今将歸北邙山舊穴願乞同乗至北邙因問田㕘軍何人曰狐也是夕作别妙香歌以送酒曰勸君酒莫辭花落抛舊枝只有北邙山下月清光到死也相隨翌日同至北邙山下老君廟後妙香佯墜馬化為一狐迅走而去並洞微志唐王軒字公逺因逰苧羅山問西施之遺迹留詩於石上曰嶺上千峰秀江邉細草春今逢浣溪石不見浣溪人廻顧見一女子素衣瓊珮謂軒曰妾自吴宫離越國素衣千載無人識當時心比金石堅今日為君堅不得軒知其異又貽詩曰佳人去千載溪山乆寂寞野水浮白烟岩花自開落􅆐鳥舊清音風月閒樓閣無語立斜陽幽情入天幕西子曰子之詩羙矣不盡妾之所寄也乃答軒詩曰髙花岩外曉相鮮幽鳥雨中啼不歇紅雲飛過大江西從此人間怨風月既暮已散期來日㑹扵水濵翌日軒往則西子已在焉又相與飲軒詩曰當時計拙笑将軍何事安邦頼美人一似仙葩入吴國從兹越國更無春西子見之怨慕乆之又曰雲霞出没羣峰外鷗鳥浮沉一水間一自越兵齊振地梦魂不到虎邱山既夜乃散異日又相遇而留者逾月乃歸郭素聞王軒之事逰苧羅留詩於泉石間莫知其數寂無所遇無名子嘲之曰三春桃李苦無言却被斜陽鳥雀喧借問東鄰效西子何如郭素學王軒聞者大笑翰府名談朱休之家犬歌曰言我不能歌聴我歌梅花今年固自可明年當奈何明年兵亂城陷梁亡詩史杜少陵因見病瘧者謂之曰誦吾詩可療病者曰何杜曰夜闌更秉燭相對如夣寐之句瘧猶是也又曰誦吾手提髑髏血模糊其人如其言誦之果愈言感鬼神亦不妄古今詩話石曼卿自少以詩酒豪放自得其氣貌偉然詩格竒峭又工於書筆畫遒勁體兼顔栁為世所好余家甞得唐後主澄心堂紙曼卿為余草書其籌筆驛詩詩曼卿平生所自愛者至今藏之號為三絶真余家寳也曼卿卒後其故人有見之者云恍惚如夣中言我今為仙也所主芙蓉城欲呼故人往逰不得忿然騎一青騾去如飛後又云降於亳州一舉子家其舉子留不得因留詩一篇與之余亦略記其一聫云鶯聲不逐春光老花影常隨日脚流仙事恠不可知其詩頗類曼卿平時語舉子不能道也永叔詩話詩話總龜巻四十六欽定四庫全書詩話總龜巻四十七宋阮閱撰竒恠門賣墨者潘谷予不識其人然聞其所為非市人也墨既精妙而價不二或不持錢米求墨不計多少與之此豈徒然者哉予甞與詩云一朝入海尋李白空看人間畫墨山一日忽取欠墨錢劵焚之飲酒三日發狂浪走遂赴井死人下視之盖趺坐井中手尚持數珠也見張明言如此百斛明珠太子中允王綸祥符中登進士第有女子年十八嵗一日晝寝中忽魘聲其父與家人亟往問之已起謂父曰與汝有洞天之縁降人間四百年矣今夕㑹此自是謂父曰清非生自稱曰燕華君初不識字忽善三十六體天篆皆世所未識毎與清非生唱和及百餘篇有送人詩云南去過瀟湘休問屈氏狂而今聖天子不是楚懐王又贈清非生末句云自有燕華無限景清非何事戀東宫又雪詩云何事月娥期不在亂飛端葉落人間說與人云天上端朩開花六出贈清非生云君為秋桐我為春風春風㑹使秋桐變秋桐不識春風面題金山云濤頭風滚雪山脚石蟠虬又詩云落筆非俗子皷吹皆天聲豈俟耳目闕慰子華燕情蒋頴叔以楷字釋之刻於石後嫁為吕氏妻既嫁則懵然不復能詩康定間進篆字二十四軸仁宗嘉之有女仙傳行於時天授二年臈卿相等詐稱上苑花開請幸則天許之乃遣使宣詔曰明朝逰上苑火急報春知花須連夜發莫待曉風吹於是凌晨名花瑞草皆發羣臣並咸服其異卓異記唐太府寺隋都水門之地隋平陳於此置叔寳叔寳将亡有飛鳥集於庭以觜畫地作詩云獨足上髙䑓腐草化為灰欲知我家處朱門臨水開雍洛異集嗽金鳥出昆明國形如雀色黄魏明帝時其國來獻飼以珍珠及兎腦甞吐金屑如粟宫人争取為釵鈿謂之辟寒金以此鳥不畏寒也宫人相嘲曰不服辟寒金􅃚得帝王心不服辟寒鈿􅃚得帝王憐古今詩話西蜀張俞甞逰驪山題二絶云金玉樓䑓揷碧空笙簫逓響入天風當時國色并春色盡在君王顧盼中玉帝樓前鎖碧霞終年培養牡丹芽不妨野鹿踰垣入銜出宫中第一花異日宿温湯見二黄衣吏召其魂至一宫闕見仙座殿上問左右曰唐太真妃也與之論當時事甚詳覺又為詩曰夢魂飛入瑶臺路九霞宫裏曾相遇壺天晩景自愁人春水泛花何處去俞尚留温湯閑步野外有牧童持書一紙俞乃開封乃仙所為詩云虚堂壁上見清詞似共幽人說所思海上風烟雖可樂人間聚散更堪悲重簾透日温温曉玉漏穿花滴滴遲此景此情傳不盡殷勤嘱付隴頭兒俞詢牧童從何得對曰前日有一婦人過此遺我百錢授此書云明日有衣冠獨步野外子與之余聞之俞感俞多對士君子道此青瑣集治平二年長沙趙琪郎中作廣東憲公宇西軒有荔枝數本盛夏方熟召刺史燕賞一夕皆空皮核滿地軒之西壁有詩云吾儕今日㑹嘉賔滿酌洪鍾飲數廵遍地狼藉不知曉荔枝又是一畨新二廣人多傳異之隋煬帝逰廣陵恍惚見陳叔寶來謁曰聞已開隋渠引洪河之水東逰維揚因作詩獻之曰隋室開茲水初心謀太奢一千里力役百萬民吁嗟水殿不復返龍舟成火霞驚流摧陡㟁濁浪噴黄沙兩隄人送客三月栁飛花日脚沉雲表榆梢噪瞑鵶如今疲子俗異日使無家且樂人間景休尋上漢槎客喧舟艤㟁風細錦㠶斜莫言無利益千古壮京華煬帝愠曰爾多知為後人之利耶同前吴興栁歸舜泊舟洞庭君山見鸚鵡數千翺翔其間相呼姓字有名清越者名武逰郎者名阿蘇児者名武仙郎者名自在先生者名踏蓮路者名鳯凰䑓者名戴蝉兒者名多花子者或有唱歌者曰吾此曲乃漢武鈎弋夫人常所唱者詞曰戴蝉兒分明傳與君王語建章殿裏未得歸朱箔金缸雙鳯舞名阿蘇兒者曰我憶得阿嬌深宫唱曰昔請馬相如為作長門賦徒使費千金君王終不顧歸舜歸舟舟人云相失已二日矣寳應中有元無有春末獨行廣陵郊野夜入路傍村舎宿北軒下忽聞西廊有人行聲見四人出衣冠各異相與吟詠一衣冠長人曰齊紈魯縞如霜雪寥亮髙聲為子發一黒衣短陋者曰家貧良㑹清夜時熒煌燈燭我能持一故敝黄衣者曰清冷之泉俟朝汲長綆相牽長出入一黒衣冠身亦短陋者曰㸑薪煑水常煎熬充他口腹我為勞遲明方散起而視之乃有一杵燭䑓水桶破鐺而巳幽恠録彭州天台禅院前致仕焦将軍彦賔所創也天台僧行燈掌之刺史安思謙男守範與賔客道聫句以紀其來守範出首句曰偶到天台院因逢物外僧定武軍推官楊鼎夫繼曰忘機同一祖出語離三乗前懐逺軍周述曰古徳𤣥意逺外牕虚景澄前眉州判官李仁肇音聫曰片時松影下聫續百千燈遂請閑僧教大師義西八分書於牌翌日有貧子乞食於院見而髙聲讀之曰人道有初無尾此則有尾無初後五年首頷俱碎不如尾句者乎院僧驅逐貧子曵杖四顧曰此後生不逺千里即欲到來人以為狂言果五年誅思謙守範伏法鼎夫暴亡此則首頷俱碎之義也行燈歸寂寺僧蜀王盡遣出之後住持院僧適自興元歸則是不逺千里之義也貧子之說一無謬焉楊鼎城郭都人甞逰青城山過皂江溺而又出登㟁遽有老人以杖接引且笑曰元是塩裏人本非水中物旋失老人所在因作詩以紀之曰青城山峭江水寒欲渡當時值急湍棹急狂風趍逺㟁舟逢恠石碎前灣手攀弱杖倉皇處命在洪濤頃刻間今日深恩無以報令人羞說雀銜環至成都與知已言竟莫究塩裏人之義後為居安思謙幕判成都闕塩院感疾暴亡以塩裹其屍歸上蜀野人閒話海南城東有两井相去咫尺而異味號雙井井源出山源山石罅中東坡酌水異之曰吾尋白龍不見今家此水乎同㳺怪問其故曰白龍當為東城出俄見其脊尾如爛銀蛇伏忽水渾有氣浮水面舉首如􅀈玉筯乃泳而去余定两井太守張子容為造庵井上號思逺亭號泂酌崖有恠樹樹枝腋有詩曰岩泉未入井蒙然冒沙石泉漱洄為靨石老生罅隙異哉寸波中露此横海脊先生酌泉笑泉香龍神蟄舉首玉筯揷忽去銀釘擲大身何時見夭矯翔霹靂誰言鵬背大更覺宇宙窄字畫如顔書無名衘日月此詩氣格似東坡而言泉漱石老似非東坡又語散緩疑學而為之也龍為蛇形小如玉筯同上鬼神門大厯十三年李道昌為姑蘇太守忽一日城南虎邱山有鬼題二詩扵石壁上其一云青松多悲風蕭蕭聲且哀南山接幽壠幽壠空崔嵬白日徒昭昭不照長夜䑓雖知生者樂魂魄安能廻况復人所親慟哭心膽摧慟哭復何言哀哉復哀哉其二云神仙不可學中化空㳺魂白日非我朝青松為我門雖復隔幽隴猶知念子孫何以遺悲怨萬物歸其根寄語世上人莫厭臨芳尊荘生問枯骨生樂徒虚言道昌録奏准勑致祭祭畢其詩乃㓕後數日又隠出詩一首曰幽冥雖異路平昔忝攻文欲知髙卧處山北兩孤墳尋于山後得兩墳極髙廣至今存焉唐宋遺史許周士泊舟淮隂醉題淮隂廟曰脫身仗劍歸明主授鉞登壇是得人千騎争馳擒虎口萬嚢不㫁堰龍津拔旗破趙如摧朽一皷搶齊速若神功業盖時雖不賞威名震主即危身時來且佩三齊印勢去翻輸一婦人得意不思防後患窮居何用結邉臣名留青史成何事血汚西鍾幾掬塵遂使後來征戰者却愁他日似将軍還舟方寐夢介士擁見周士曰足下詩固好然未合於理也信去楚歸漢起自行伍髙祖結壇授鉞雖立功名一旦自藴忿躁之氣外結邉臣内謀大叛死為萬世醜吾今血食於此亦出望外而子之詩重吾過為懦無所守将安用也摭遺賈魏公尹京日忽有人來展刺謁曰前江南國主李煜相見則一清瘦道士爾公曰太師已物故何得及此曰某㓜探釋氏未逹誤有所見今為師子國王偶思鍾山而來懐中取一詩授公曰異國非所志煩勞殊清閑驚濤千萬里無乃見鍾山公讀之隨身灰㓕張孝和關中人淳化壬辰年㳺淮南在夀春與張李二生被酒及淮漘入就龍女祠取桐葉寫詩两句云我是夢中傳彩筆欲書花葉寄朝雲投於帳中而去一旦獨至其祠忽簾中有婦人邀而置酒贈孝和詩一絶曰落㠶且泊小沙灘霜月無波淮上寒若向江湖得消息為傳風水到長安孝和告去行數十步忽小女奴呌曰娘子令還桐葉勿復置念孝和得之回顧惟古祠敗舎而已李珦字温叔都官外郎之㓜女也八嵗能詩甞作榴花一絶云烈火真紅輕皺面晨霞碎剪貼枝條金刀刺出猩猩血濺落芳叢乆不銷後適江夏人王常同泛舟射利江湖間婁徹為江州清風亭記常觀歎美珦曰未之盡也何不云青山緑水萬里有盡處清風明月千古無老時一日舉其文於徹徹卒用其言為破題不乆常死而珦溺舟於三山磯下後三日屍忽出於水中士人異之為立廟熈寧開都人張芝過廟作三絶焚於廟中一云風軟潮生江水平遥峰隠隠浸寒青自從香骨沉波底獨我為詩弔爾靈二云軋軋櫓聲離逺浦蕭蕭㠶影落寒濤殷勤滴酒陳佳果将此深心慰寂寥三云江雨初晴逺岫低心因啼鳥陡思歸爾如㑹我題詩意魂夢相求一處飛既夜一青衣召云娘子奉俟乆矣芝曰娘子為誰青衣曰早來獻詩與誰耶芝乃悟見一婦人謂芝曰早來佳章欲托以夢寐是或不真不能盡所懐故求面見妾溺此時水官令賦詩及校九江㑹源録一夕而畢水官大恱令江神出其屍顯其靈今有祠在此血食於人謝子之詩意所不敢當荅以詩曰梅天半霽江水漲水揺花影紅蕩漾東風抛雨過江西截江一瞬生銀浪閴然不見鷗鷺飛漁唱四沉烟瞑蕩忽然晴霽碧虚闊水色天光月下上栁風和軟浪無聲客櫓嘔軋中流鳴两㟁沙頭拾翠女嬉笑携手相将行秋入空江潦水静澄江一碧如寒鏡逺㠶㓕没入雲中菱唱微茫晚風瞑西風脫朩露三山隠隠樵歸亂石間霜猿哀落岩前月杜宇枝間更啼血蓬窓風𦂳客衣單中夜危腸幾欲絶我本名家閨中女聘得良人共途路相将雲水二十年所得歡心亦無數豈期天禍及一身夫死身沉大江去猛風吹雲無定踪盡日隂愁難得雨秋髙水冷白骨寒孤兒稚女歸何處因公遺我白玉篇慰此窮泉生和煦明朝仙舸宿何州回首寒江烟雨暮芝見詩嘆賞久之又出白金二百星贈芝曰煩礲一石載妾前事亦有奉報如何芝受其金送芝出幄則已五皷矣芝後因循不能為立石舟再過三山下幾至傾覆是夜又夢其女深詬責之負其事翰府名談李羣玉校書過二妃廟題詩曰小孤洲北浦雲邉二女明粧共儼然野廟向江春寂寂古碑無字草芊芊東風近墓吹芳芷落日深山哭杜䳌猶似含嚬望廵狩九嶷如黛隔湘川題黄陵廟詩曰黄陵廟前芳草春黄陵女兒茜裙新輕舟小檝唱歌去水逺山長愁殺人又曰黄陵廟前春已空子䂓啼血淚春風不知精爽落何處疑是行雲秋色中羣玉自以第三篇春空便到秋色踟蹰欲改二女俄出焉羣玉悉其所陳而題於後涉重湖至潯陽太守叚成式索為詩酒侣具述其事後二年而羣玉逝故哭李詩曰酒裏詩中三十年縱横唐突世喧喧明時不作禰衡死傲盡公卿歸九泉又曰曾說黄陵事今為白日催老無男女累誰哭向泉䑓䖍州布衣頼仙芝言連州有黄損僕射五代時人僕射盖仕南漢也未老退歸一日忽遁去莫知所在子孫畫像事之凢三十三年乃歸坐阼階上呼家人其子不在孫出見之索筆書壁上云一别人間嵗月多歸來人事已銷磨惟有門前鑑池水春風不改舊時波投筆而去不可留子歸問其状貌云甚似影堂中人也連州相傳如此其後頗有禄仕者艾子病熱稍昏夢中神㳺隂府見閻王升殿治事有數鬼招一人至一吏前白曰此人在世惟務持人隂事思於財物雖無過者必巧造端以誘陷之然後摘抉准法合以五百億萬斤柴於鑊湯中煑之王曰可令赴獄有一牛頭捽執之而去其人私謂牛頭曰君何人曰吾鑊湯獄主獄之事皆吾主之其人又曰既為獄主固首主也而豹皮襖若是敝鬼曰冥中無此皮若陽人焚化方得吾名不顯於人間故無焚貺者其人又曰某之外氏獵徒也家常有此皮若蒙主見憫少减柴數得還即焚化十皮為獄主作裩其鬼喜曰為女去億萬二字以敗其徒則汝得速還兼免沸煑之苦二三人於是义入鑊煑之其牛頭者時來相問小鬼見如此必欲庇之亦不敢令火熾遂報柴足既出鑊束帶将行牛頭曰勿忘皮也其人乃明顧曰有詩一首奉贈云牛頭獄主要知聞權在閻王不在君减刻官柴猶自可更求枉法豹皮裩牛頭大怒义入鑊湯益薪煑之艾子既寤語於徒曰湏信口是禍之門並百斛明珠周祖起於鄴范魯公遁迹民間執紙扇偶題云大熱去酷吏清風來故人坐茶肆中忽一形貌怪陋者前揖之曰相公相公勿慮勿慮律其扇曰輕重無准吏得舞文何止大熱耶公當深究獄弊持扇急去後一日於古廟後門鬼手中持其扇乃茶肆中見者未幾周祖果得公扵民間遂大用憶陋鬼之言首議刑於䟽曰先王所恤莫重扵刑今繁苛失中􅁿重無准民罹横刑吏得舞法周祖從其言命公與知雜張湜等刋定五年書成目曰刑統玉壺清話詩話總龜四十七欽定四庫全書詩話總龜巻四十八宋阮閱撰鬼神門余與魯直夀朋天啓㑹于伯時齋看詩巻皆仙鬼作或夢中所作也又記太平廣記中有人為鬼物所引入墟墓皆華至洞户忽為刼墓者所驚出遂失所見但云芫花半落松風晩清吾毎愛此兩句故附之書末王著洛陽人也七嵗能属文十四進士及第初依師宛句縣張嘏東京應舉乆不知消息賃居相國寺東因出通衢忽遇張嘏遂邀茶肆叙濶至乃稱蝴蝶詩最嘉云今夜君棲芳草裏為傳消息到王孫嘏無言忽然不見但驚問郷人云卒已半年著自及第便厯華省至翰林學士只及中年而終郡閣雅談西川宰相髙駢版築羅城日有守禦指揮使姜知古分得西南趙波塊即趙畚相公墳也知古號令候曉開之是夜有人黄衣束帶瘦骨長卓立于知古前曰趙相公使上書知古驚覽書末後有詩一首頃之鬼不見詩云我昔勝君昔君今勝我今人生一世第何用苦相侵保大中廣陵裡城隍因及古塜得石誌一所云日為箭兮月為弓四時射人兮無窮但得天将明月化不覺人隨流水空山川秀兮碧穹窿崇夫人墓兮直其中猿啼烏嘯烟濛濛千年萬年松栢風或云李白詞南唐近事甘露寺僧如昊云收得浙右之明年夏中夜月瑩無雲長江如􅀞有僧持課俄數人自西軒領僕厮輩挈酒上江亭而止於明月臺相遇坐定命酒羅列昊竊窺之思中夜禁行從何而至必是幽虚扵牕隙俯伏伺之東向一人衣南朝衣西向一人衣北朝衣北向一人衣縫掖衣指南向者設禮而坐東向一人衣朱衣霜簡清瘦多髯飛杯之次東向者曰今日恣縱江南之㳺皆不乏風流矣僕甞記公云何人種得西施花千古春風開不盡可謂越古超今矣次至西向者復曰各述旦㐮日臨危一言曰趙臺能為賦邢陽觧獻書可借西川水不救轍中魚次至縫掖舉白而歌曰偉哉横海鱗壮矣垂天翼一旦失風水翻為螻蟻食廵至東向云功遂侔昔人保退無智力既涉太行險兹路信難渉次至朱衣乃髙吟曰握裏龍蛇紙上鸞逡廵千幅不将難顧雲已往羅隐耄更有何人逞筆端吟罷東樓晨鐘遽鳴僧戸軋然而啓忽爾而散桂花藂談秦太虚言寳應民有嫁娶㑹客者有客徑起出門若醉甚將赴水者人急持之客曰有婦人以詩招我其詞云長橋直下有蘭舟破月衝烟任意逰金玉滿堂何所用争如年少去來休倉皇就之不知其為水也然客亦無他夜㑹說鬼與㕘寥㕘寥舉此聊為記之東坡詩話唐丞相馬植弟固武威太守固弟西漂太守二弟聞植罷安南都護又除黔南不得意維舟中古寺前夜月如晝見白衣人緩步隄上吟曰栽竹為筒作笛吹鳯凰池上鳯凰飛勞公更向黔南去即是陶鈞萬類時厯厯可聴遣人尋訪已失之後黔南去再入為大理卿遷刑部侍郎判鹽鐡遂大拜大厯元年元載因早朝有人獻詩載令左右收之候入中書省其人曰若不能讀請自誦一篇曰城東城西舊行處城裏花飛栁如絮海燕啣泥欲下來屋裏無人却飛去吟畢不見乃知其非人也載後敗家破妻被戮馮翊夏陽縣㩀大河有兾河清徹可鑒大和中縣尉趙生一夕與同軰聮步望月於兾泉上忽有人貌甚黒緑袍自泉中出徐吟曰夜月明皎皎緑波空悠悠生且驚其水溺明日生再逰兾水見廟中土偶人被緑袍視之其貌乃昨日吟詩人也元和中有陸橋家于丹陽居有池塘亭榭一夕有人叩門急視見一人儀状秀逸自稱曰沈約聞公雅好詩故來奉謁既而呼左右曰召青箱來有一児年可十嵗約曰此吾子也欲使紹吾舉故名青箱然亦能詩從吾與范僕射過臺城曾作感舊詩令諷之曰六代舊山川興王幾百年繁華今寂寞朝市昔喧闐夜月琉璃水春風栁色夭傷時為懐古垂淚國門前忽不見唐燕士晉昌人隠于九華晚步山下見一白衣少年閒步自若曰澗水潺湲聲不絶溪壠茫茫野花發自來自去人不知歸時長對空山月歸問里人曰是吴氏子善詩卒僅數年矣錢起寓宿驛舎聞窓外有人曰曲終人不見江上數峰青起怪之十年後就試座主李時試湘靈鼓瑟詩落句意乆不屬遂以此一聮續之乃中魁選詩全篇云善鼔雲和瑟常聞帝子靈馮夷空自舞楚客不堪聴雅調悽金石清音發杳冥蒼梧來怨慕白芷動芳馨流水傳湘浦悲風過洞庭曲終人不見江上數峰青劉山甫隨侍官扵嶺外北歸泊舟洞庭登㟁見有北方毗沙門天王廟祠因謁之見廟宇頽圮乃題云壊墻風雨幾經春草色盈庭一座塵自是神仙無感應盛衰何得却由人見夜夢神責曰我南岳神也汝何相侮俄而風濤大作舟幾覆悔謝徹去詩牌乃止古今詩話長安中秋望夜有人聞鬼吟曰六街皷歇行人絶九衢茫茫空有月又聞有和者云九衢生人何勞勞長安土盡槐根髙俗云務本西門是鬼市或風雨暝晦皆聞其喧聚之南部新書開元中有幽州衙校姓張妻孔氏生五子而卒後娶李氏妬悍狠戾虐遇五子鞭捶不堪其苦哭扵孔氏之墳母忽於塜中出撫其子悲慟乆之因以白布巾題詩贈張曰不忿成故人泣涕毎盈巾死生今有隔相見永無因盒裏殘粧粉留将與後人黄泉無用處浪作塜中塵有意憐男女無情亦任君欲知腸㫁處明月照孤墳五子得詩以呈其父其父訴於連帥連帥上聞李氏流嶺南建隆初有人行於巴峽夜泊舟於江涘忽有人諷詠曰秋逕填黄葉懸崕露草根猿聲一呌㫁客旅數重魂其音苦切激昻而悲如是通宵凡吟百遍初疑舟行秀士也及曉訪之其所泊㟁殊無舟舸但空山䆳林溪谷絶幽爾㳂㟁尋訪數處有二脚迹長二尺許東南復州門街東有劉氏舊宅宇舎横㫁敝壊鮮有人居梁太保震有逺房弟伯升秀才請居之貴其幽致而肄業既憇馭月餘辰夕甚安一日晝寢夢魘乆之方寤乃曰適夢一女子緑裙紅袖自東街而來泣而呼曰聴妾幽恨之句詩曰卜得上峽日秋江風浪多巴陵一夜雨腸㫁朩蘭歌梁因稱嘆而覺竟無他說脞說後集鬼仙詩曰仙人未必便先去還在人間人不知手把白鬚從兩鹿相逢却問姓名誰又云江上檣竿一百尺山中樓臺十二重山僧樓上望江上指㸃檣竿笑殺儂又云爺娘送我青楓根不記青楓幾回落當時手刺身上衣今日為灰不堪着又曰酒盡君莫沽壺傾我當發城市多囂塵還山弄明月又云浦口潮來初渺漫蓮舟溶漾采花灘芳心不愜空歸去㑹得潮平更折看又曰忽然湖上片雲飛不覺舟中雨濺衣折得荷花渾忘却空将荷葉盖頭歸又曰寒花白露裏亂山明月中是夕苦吟罷秉燭與君同黄魯直登荆州亭柱間有詞曰簾捲曲欄獨倚銀屏暮天無際淚眼不曽晴家在吴頭楚尾數㸃雪花亂委撲漉沙鷗驚起詩句欲成時沒入蒼烟叢裏魯直曰似為予發筆勢類女子又有淚眼不曾晴句即鬼也是夕有女子絶艶見夢於魯直曰我家豫章附舟墮水死于此登亭感而作不意公能辨之魯直覺曰此必吴城小龍女事同前佞媚門陳瑄太師任西川有愛姬徐氏郫城令之女也令欲求彭牧以紅絹數寸作二十八字遣其妻私示其女曰深堂冨貴事風流莫忘生身老骨頭因與太師歡笑處為吾方便覔彭州人皆鄙之鑑戒録鎮楊州請章孝標賦春雪孝標作詩曰六出花飛處處飄粘窓拂砌上寒條朱門到曉難盈尺盡是三軍喜氣消唐李嶠少負才華㕘知政事封鄭國公長夀中則天鑄八稜銅柱題曰大周萬國述得天樞紀革命之功貶皇家之徳天柱下置鐡山翁師子琪璘圍遶武三思為文朝士獻詩不可勝紀惟嶠詩冠絶當時曰轍迹光西崦勲庸紀北燕如何萬國㑹諷徳九門前灼灼臨黄道迢迢入紫烟仙盤正下露高柱欲乘天山類叢雲起珠疑大小懸聲流塵作刼業固海成田聖澤傾堯酒薰風入舜絃忻逢下生日還遇上皇年后憲司發附㑹韋庶人左授滁州别駕大唐新語琢句門唐僧多佳句其琢句法比物以意而不指言一物謂之象外句如無可上人詩曰聴雨寒更盡開門落葉深是落葉比雨聲也又曰微陽下喬朩逺燒入秋山是微陽比逺燒也用事琢句妙在言其用而不言其名耳此法唯荆公山谷東坡知之荆公曰含風鴨綠鱗鱗起㺯日鵞黄裊裊垂此言水栁之用而不言水栁之名坡别子由曰猶勝相逢不相識形容變盡語音存此用事而不言其名山谷曰管城子無食肉相孔方兄有絶交書又曰語言少異無阿堵氷雪相看有此君又曰眼看人情如格五心知世事等朝三格五是融法也後漢江云常置人於險處然句中眼者世尤不能觧王荆公欲新政作雪詩曰勢合便冝包地盡功成終欲放春回農家不念豐年瑞只欲青雲萬里開韓魏公罷政判北京作園中行詩曰風定曉枝蝴蝶亂雨勻春圃桔橰閒意趣所至多見於嗜好歐陽文忠公喜士為天下第一好誦孔北海座上客常滿尊中酒不空之句范文正公清嚴而喜論兵好誦兵衛森畫㦸燕寝凝清香之句李師中送唐介謫官詩曰去國一身輕似葉髙名千古重如山並㳺英俊顔何厚已死姦諛骨尚寒巳而聞介趂月首上任大悔乃以書索詩唐公笑曰吾正不用此無對屬落韻詩送還李乃悟一身千古非恊對也東坡逰羅浮詩曰潜鱗有飢蛟掉尾取渇虎我來方醉後濯足聊戯侮想見海上超放之類然後疑不能掉尾雪裏芭蕉也王榮老渡觀江風作不得濟父老曰公篋中畜竒物此江神極靈獻之當得濟榮老有玉麈尾端石硯宣包幛獻之皆不驗有魯直草書扇頭子題韋應物詩曰獨憐幽草澗邉生上有黄鸝深樹鳴春潮帶雨晚來急野渡無人舟自横取視儻恍之勢曰我猶不識鬼識之乎以獻之香火未收天水相照如鏡南風徐來㠶一飽而濟余謂神必元祐仙客不然何嗜之深也李白詩曰昔日芙蓉花今為㫁腸草以色事他人能得幾時好陶𢎞景仙方注曰㫁腸草不可食其花美好名芙蓉花栁子厚詩曰漁翁夜傍西巖宿曉汲清湘􅎴楚竹烟消日出不見人欵乃一聲山水緑回看天際下中流巖上無心雲相逐東坡評詩云以竒趣為宗反常合道為趣熟味之此詩有竒趣其尾两句雖不必亦可欵乃舟人相呼聲相應也冷齋夜話杜牧華清宫詩云長安西望綉成堆山頂千門次第開一騎紅塵妃子笑無人知道荔枝來尤膾炙人口據唐記明皇帝以十月幸驪山至春即還宫是未甞六月在驪山也然荔枝盛暑方熟詞意雖美而失事實唐人題西山寺云幾夜碍新月半江無夕陽或謂冠絶古今以其盡得西山之景趣也金山寺題者甚多而絶少佳句唯寺影中流見鐘聲两㟁聞又天多剰得月地少不生塵最為人傳誦要亦未為至工若用於落星寺有何不可乎熈寧中介甫有句云天末海門横北固烟中沙岸似西興尤為中的遯齋閒覽詩話總龜巻四十八欽定四庫全書詩話總龜後集巻一宋阮閲撰御製王師圍金陵唐使徐鉉来朝鉉伐其能欲以口舌解圍又盛稱其主博學多藝有聖人之能使誦其詩曰秋月之篇天下誦傳之其句云云太祖大笑曰寒士語耳吾不道也鉉内不服謂大言無實可窮也遂於殿上驚惧相目太祖曰吾㣲時自秦中歸道花下醉卧田間覺而月出有句曰未離海底千山黒纔到天中萬國明鉉大驚殿上稱夀後山詩話故事進士期集常擇榜中最年少者為探花郎熈寕中始罷之太平興國三年胡秘監旦榜馮文懿拯為探花是嵗登第七十四人太宗以詩賜之曰二三千客裏成事七十四人中少年始唐以禮部放榜故座主門生之禮特盛主司因得竊市私恩上稍欲革其弊既更廷試前一嵗吕文穆公䝉正為状頭始賜以詩蓋示以優寵之意至是復賜文懿然状頭詩迄今時有探花詩後無繼者惟文懿一人而已最為科舉之盛事也蔡寛夫詩話太平興國七年十二月十七日大雪御製雪詩并酒賜學士詩云輕輕相亞凝如酥宫樹花粧萬萬株今賜酒卿時一盞玉堂聞話道情無又御製五七言詩賜蘇易簡五言詩曰翰林承㫖貴清净玉堂中應用咸依式深岩比更崇歸家思值日入内集英風儒雅門生盛髙明大化雄七言詩曰運偶昌時逺更深果然榖在我中心從風臣偃光朝野此日清華見翰林舉措樂時周禮法思賢教古善規箴少年學士文明世一寸賢毫數萬尋金坡遺事石林詩話楊文公在翰林去職真宗眷之不衰即起為郡未㡬復以判秘書監召既到闕以詩賜之曰𤨏闥往年司制誥共嘉藻思類相如蓬山昔日詮墳史還仰多聞過仲舒報政列城歸覲後䟽恩髙閣拜官初諸生濟濟彌瞻望鈆槧咨詢辨魯魚祖宗愛惜人才保全忠孝之意如此䂬溪大中祥符五年楊億為學士季夏被疾至十月方赴朝叅具状稱謝御筆状尾批七言二韻詩賜之詩云承明近侍究儒𤣥苦學勞心疾巳痊善保興居調飲食副予前席待名賢金坡遺事大中祥符二年春真宗御製詩賜知貢舉晁逈云禮闈選士古稱難都為升沉咫尺間較藝清時公道在掄材應得恵人寰五年二月又製詩賜知貢舉晁逈云盛時選士貢闈開殿宇聞風獻藝来心似權衡求實効勿教蓬蓽有遺才同上天禧三年正月九日錢惟演承明殿面奉知舉真宗御製詩并序云卜賢能之多士允協盛猷資侍從之鴻儒書伸藻鑑期申職業用示篇章詩云寅奉昌圖紹慶基選掄多士叶前規鄉閭薦拔期無濫草澤搜羅詎有遺徳舉况逢全盛日計偕咸造廣塲時春官任職當求善宗伯掄材務得宜侍從名儒當委任藝文公道辯妍􅎀佇伸衡鑑裁深念允恊菁莪樂育詩金坡遺事二月十八日将放榜賜詩并序序云詳延造士允叶於盛猷乃眷儒臣式分於重寄論秀才臻於顯効當官備著於純誠詩云四海為家寳緒隆旁求文雅振儒風命鄉随計来多士較藝掄材有澤宫簮紱近臣當顯任絲綸深㫖論丹衷旰霄汲汲予存念夙夜孜孜爾狥公名實豈惟衡鑑内賢能皆萃網羅中佇觀翹楚登時用布政分優恊庶功同上真宗賦御溝栁詩令宰相兩省和進陳執中詩曰一度春来一度新翠光長得照龍津君王自愛天然態恨殺昭陽學舞人其詩最尤者西朝寳訓神宗遵太祖遺意聚積金帛成帑自製四言詩一章云五季失圖獫狁孔熾藝祖造邦意有懲艾爰設内府基以募士曽孫保之敢忘厥志毎庫以一字目之又别置詩二十字分揭其上曰毎䖍夕惕心妄意遵遺業顧予不武資何以成戎捷後來所謂御前封椿庫者也上意用此以為開拓西北境土之資始命王韶克青唐然後欲經理銀夏復取燕雲元豐五年徐禧永洛衂師之後帝心弛矣林徳裕陵遺事云前輩云詩有奪胎換骨之説信有之也杜陵謁老子廟一聨云五聖聨龍衮千官列雁行亦以雁行對龍衮然語中的其親切過於本詩兹不謂之奪胎可乎不然則徒用前人之語殊不足貴且如沈佺期云小池殘暑退髙樹早涼歸非不佳也然正用栁惲太液微波起長楊髙樹秋之句耳蘇子美峽束滄淵深貯月巖排紅樹巧粧秋非不佳也然正用杜陵峽束滄江起巖排石樹圓之句耳語雖工而無别也藝苑雌黄光堯初幸錢塘有詩云六龍轉淮海萬騎臨吳津王者本無外駕言蘇逺民瞻彼草木秀感此瘡痍新登堂望稽山懐哉大禹勤大哉之言有於天下漢祖大風之歌唐宗動草之句不足道也詩説雋永賡和東萊賡和皇帝幸祕書詩麟閣龍旂日月章中興再見赭袍光仰觀焜耀人文盛始識扶持徳意長功利從今卑管晏浮華自昔陋盧王願求實學酬天造肯効明河織女襄文集御燕嘉祐七年冬宴近臣于羣玉殿英宗以皇子預坐在舍人待制之後岐公詩云翠輦生香容扈蹕黃金塗紙看揮毫介甫云何不言翠玉裝輿岐公改之以進復齋漫録神廟時經月每夕有赤氣見西北隅如火至人定乃滅人謂皇子生之祥故禹玉作大燕樂詞云未曉清風生殿閣經旬赤氣照乾坤未幾皇子生大燕羣臣於集英殿文正公日録榮遇門蘇參政易簡取開封解時宋尚書白為試官是歳狀頭登第後十年白為翰林學士易簡以繼召入故易簡贈白詩云天子昔取士先後分􅎀妍濟濟俊兼秀師師麟與鸞小子最承知同輩尋改觀甲等叨薦名髙飛便凌煙遂使拜扆坐果得超神仙迄今纔七嵗相接乗華軒慶厯二年歐陽文忠公為别頭試官王文恭公預薦至嘉祐初文忠在北門文恭亦同院仍同知貢舉故文恭詩有十五年前門下客最榮今日預東堂之句座主門生同列固儒者盛事而玉堂尤天下文學之極選國朝以来惟此二人前此所未有也蔡寛夫詩話嘉祐二年余與端明韓子華翰長王禹玉侍讀范景仁龍圖梅公儀同知禮部貢舉辟梅聖俞為小試官凡鏁院五十日六人者相與唱和為古律歌詩一百七十餘篇集為三巻禹玉余為校理時武成王廟所解進士也至此新入翰林與余同院又同知貢舉故禹玉贈余云十五年前出門下㝡榮今日預東堂余荅云昔時叨出武成宫曽看揮毫氣吐虹夢寐閑思十年事笑談今日一樽同喜君今賜黄金帶顧我新為白髮翁也天聖中余舉進士國學南省皆忝第一人薦名其後景仁相繼亦然故景仁贈余云淡墨題名第一人孤生何幸繼前塵也聖俞自天聖中與為詩友余嘗贈云猶喜共量天下士亦勝東野亦勝韓而子華筆力豪贍公儀文思温雅而敏捷皆勍敵也前此有南省試官者多窘束條制不少放懐余六人者懽然相得羣居終日長篇險韻衆製交作筆吏疲於寫錄僮史奔走往来間以滑稽嘲謔加於風刺更相酧酢往往哄堂絶倒自謂一時盛事此前未之有也歸田録詩話總龜後集巻一欽定四庫全書詩話總龜後集巻二宋阮閱撰忠義門世人論淵明自永初以後不稱年號秖稱甲子與思侻所論不同觀淵明讀史九章其間皆有深意其尤章章者如夷齊箕子魯二儒三篇夷齊云天下革命絶景窮居正風凌俗爰感懦夫箕子云去鄉之感猶有遲遲矧伊代謝觸物皆非魯二儒云易代随時迷變則愚介介若人特為正夫由是觀之則淵明委身蓬巷甘黔婁之貧而不自悔者豈非以恥事二姓而然也葛常之子美詩雖有古殿存世尊亦䝉埃山僧衣藍縷告訴棟梁摧本即所賦自然及於乗輿䝉塵股肱非材之意忠義所激一飯不忘君邪黄常明明宗召蜀中舊臣賦蜀主降巨唐詩王偕等譏荒滛獨中丞牛希濟曰唐主再懸新日月蜀王難保舊山川明宗曰希濟不忘君親忠孝也賜百叚余謂希濟但能兩解之辭而已江革云不能殺身報主得死為幸誓不為人執筆此可以厲臣子之節碧溪詩人比雨如絲如膏之類甚多至杜牧乃以羽林鎗為比恐未盡其形似念昔逰云雲門寺外逢猛雨林黒山髙雨脚長曽奉郊宫為近侍分明􅋏􅌶羽林鎗大雨行云四面明騰玉京仗萬里横互羽林鎗豈去國凄㫁之情不能忘雞翹豹尾中耶丹陽集栁遷南荒有云愁向公筵問重譯欲投章甫作文身太白云我似鷓鴣易南遷懶北飛皆褊忮躁辭非畎畝惓惓之義杜詩云馮唐雖晩逹終凱在皇都愁来有江水焉得北之胡其賦張曲江云歸老守故林戀闕悄延頸乃心王室可知黄常明世俗誇太白賜床調羮為榮力士脫靴為勇愚觀唐宗渠渠於白豈真樂道下賢者哉其意急得艶詞媟語以悅媍人耳白之論撰亦不過玉樓金殿鴛鴦翡翠等語社稷蒼生何賴就使滑稽傲世然東方生不忘納諌况黄屋既為之屈乎說者以謀謨潜宻厯考全集愛國憂民之心如子美語一何鮮也力士閨闥腐庸惟恐不當人主意挟主勢駈之何所不可脫靴乃其職也自退之為蚍蜉撼大樹之喻遂使後學吞聲余竊謂如論其文章豪逸真一代偉人如論其心術事業可施廊廟李杜齊名真忝竊也䂬溪汲長孺叚太尉皆義勇奮不顧身之人至於仁愛撫養矜憐惻怛無所不至所謂剛者必仁仁者必勇也嘗觀樂天云况多剛狷性難與世同塵希文云吾生豈不幸所禀多剛腸皆心中語也白則有敢辭為俗吏且欲活疲民又云心中有念農桑苦耳裏如聞飢凍聲范有寸懐如春風思與天下共赴姑蘇云豈辭雲水三千里由濟瘡痍十萬民與汲叚正相似黄常明靈徹有相逢盡道休官去林下何曽見一人世傳為口實凡語及抽簮即以此譏之余謂矯飾罔人固不足論若出於至誠時對知已一吐心胷何害觀昌黎送盤谷云行抽手板付丞相不待彈劾歸農桑贈侯喜便當提擕妻與子南入箕潁無還時如今便當去咄咄無自痴如今更誰恨可便耕㶚涯此類凡數十豈茍以飾口哉其剛勁之操不少屈所守素定故也䂬溪永叔嘗試謁執政坐中賦雪詩云主人與國共憂戚豈惟喜悅将豊登須怜鐵甲冷徹骨四十餘萬屯邊兵當時乃謂唐韓退之亦能道言語其預裴晉公宴㑹但云園林窮勝事鐘鼓樂清時不曽如此作閙殊不知老杜一言一詠未曽不在於憂國恤人物我之際則淡然無著夏日歎曰浩蕩想幽薊王師安在哉夏夜歎曰念我荷戈士窮年守邊疆此仁人君子之用心終食不可忘也邊兵之語豈為過哉如退之始知神官未賢聖護短憑愚要我敬雪徑抵樵叟風廊折談僧真作閙詩也䂬溪余觀楚國先賢𫝊言汝南應璩作百一詩譏切時事編以示任事者皆怪愕以為應焚棄之及觀文選所載璩百一篇畧不及時事何耶又觀郭茂倩雜體詩載百一詩五篇皆璩所作首篇言馬子侯解音律而以陌上桑為鳳將雛二篇傷翳桑二老无以葬妻子而已無宣孟之徳可以賙其急三篇言老人自知桑榆之景斗酒自勞不肯為子孫積財末篇即文選所載是也第四篇似有諷諫所謂茍欲娛耳目快心樂腹腸我躬不悦懽安能慮死亡此豈非所謂應焚棄之詩乎方是時曹爽事多違法而璩為爽長史切諫其失如此所謂百一者庶幾百分有一補于爽也而爽卒不悟以及于禍或謂以百言為一篇者以字數而言也或謂百者數之終一者數之始士有百行終始如一者以士行而言也然皆穿鑿之説何足論哉後何遜亦有擬百一體所謂靈輒困桑下於陵拾李螬其詩一百十字恐出于或者之説然璩詩每篇字數各不同第不過四十字爾丹陽集杜扁舟空老去無補聖明朝又云報主心已老以稷契人而使老棄閒曠非唯不形怨望且惓惓如此彼遭時遇主言聽計從復幸年鬢未暮而不能攄誠戮力以圖報効良不愧此歟䂬溪明朝有封事數問夜如何此幸而得之坐以待旦之意避人焚諫草騎馬欲雞栖所謂嘉謀嘉猷入告爾后于外曰斯謀斯猷惟我后之徳也黃常明一朝自罪已萬里車書通此與無逸旅獒孟子格君心之非汲長孺諫上多慾魏鄭公十漸陸宣公奉天詔書無二道也同上昌黎云詣闕二上書臣非黃冠師臣有膽與氣不忍死茅茨韋應物送李山人云聖朝多遺逸披膽謁至尊豈是貪寵榮誓將救元元梅聖俞贈師謩云臣豈為身謀而邀陛下惓是皆急於得君非為利禄計者也同上杜詩公若登台輔臨危莫愛身寄裴道州蘇侍御云致君堯舜付君等早據要路思捐軀此公素所蓄積而未及施設者故樂以語人耳夫全軀碌碌之臣果何能為汲長孺云天子置公卿寧令従諛承意縱愛身柰辱朝廷何任遐曰褚彦囬保妻子愛性命遐能制之觀此以騐二詩信有證矣自比稷契豈為過哉岑侍御行軍詩平生抱忠義不敢私㣲軀范文正公云一入諌諍司鴻毛忽其身䂬溪世人喜子美造次不忘君嘗觀其祖審言除夜云還将萬億夀更謁九重城則教忠之家風舊矣張堯佐以進士擢第累官至屯田員外郎知開州㑹其姪女有寵於仁宗冊為脩媛堯佐遂驟遷擢一日中除宣徽節度景靈羣牧四使是時御史唐介上䟽引天寳楊國忠為戒不報又與諫官包拯呉奎等七人論列殿上既而御史中丞留百官班欲以廷諍卒奪堯佐宣徽景靈両使特加介一品服以旌敢言未㡬堯佐復除宣徽使知河陽唐謂同列曰是欲與宣徽而假河陽為名耳我曹豈可中巳邪同列依違不前唐獨争之不能奪仁宗諭曰差除自是中書介遂極言宰相文彦博以燈籠錦媚貴妃而致位宰相今又以宣徽使結堯佐請逐彦博而相富弼又言諫官觀望挟姦而言涉宫掖語甚切直仁宗怒趣召兩府以疏示之介猶諍不巳樞宻副使梁適叱介使下殿介諍愈切仁宗大怒玉音甚厲共恐禍出不測是時蔡襄脩起居注立殿陛即進曰介誠狂直然納諌容言人主之美徳必望全貸遂貶春州别駕翊日御史中丞王舉正救解之改為英州别駕始上怒未巳兩府竊議曰必重貶介則彦慱不安彦慱去即吾屬遞遷矣既而果如其料當是時梅堯臣作書竄詩曰皇祐辛夘冬十月十九日御史唐子方危言初造膝曰朝有巨姦臣介所憤疾願條一二事臣職敢妄率宰相文彦慱邪行世莫匹曩時守城都委曲媚貴暱銀璫揷左貂窮臘便馳驛邦媛将夸侈中金齎十鎰為我寄使君竒文織纎宻遂傾西蜀巧日夜擊鞭朴紅絲緯金縷排科闘八七比比雙蓮華篝燈戴星月幾日成一端持行如􅄦疾明年觀上元被服穏稱質璨然奪上目遽爾有薄詰既聞所從來接對似未失且云奉至尊於妾豈能必遂回天子顔百事容丐乞臣今得粗陳狡猾彼非一偷威與賣利次第推甲乙是惟隂猾雄仁㫁宜勇黜必欲致太平在列無如弼弼亦昧平生况臣不阿屈臣言天下公奚以身自䘏君旁有側目喑啞横詆叱指言為罔上廢汝還蓬蓽是時白此心尚不避斧鑕雖令禦魑魅甘且同飴宻既知弗可惧復以強詞窒帝聲亦大厲論奏不容畢介也容甚閑猛士膽為慄立貶海外春速欲為異物内外官恟恟陛下何未悉即敢救者誰襄執左右筆謂倘不包容盛美有所咈平明中執法懐疏又堅述介言或似強百豈無一實恐傷四海和幸勿苦倉卒亟許遷英山衢路猶嗟咄翊日宣白麻稱决口盈溢阿附連諌官去若壊絮虱其間因獲利竊笑等蚌鷸英州五千里瘦馬行䭿䭿毒蛇噴曉霧晝與嵐氣沒妻孥不同途風浪過蛟窟存亡未可知雨舘愁傷骨飢僕時後先隨緣拾橡栗粤林多蔽天黄柑雜丹橘萬室通釀酤撫逺無禁律醉去不論錢醒来等鳴瑟山水仍竒怪已可消憂欝莫作楚大夫懐沙自沉汨西漢梅子真出為呉市卒市卒且不慚况兹别乗秩始堯臣作此詩不敢示人及歐陽脩為編其集時有嫌避又削去此詩是以少人知者故今全録焉東軒筆録鄭谷與僧齊已黄損等共定今體詩格云凡詩用韻有數格一曰葫蘆一曰轆轤一曰進退葫蘆韻者先二後四轆轤韻者雙出雙入進退韻者一進一退失此則繆矣余按倦逰雜録載唐介為䑓官廷疏宰相之失仁廟怒謫英州别駕朝中士大夫以詩送行者頗衆獨李師中待制一篇為人傳誦詩曰孤忠自許衆不與獨立敢言人所難去國一身輕似葉髙名千古重於山並逰英俊顔何厚未死姦諛骨巳寒天為吾君扶社稷肯教夫子不生還此正所謂進退韻格也按韻畧難字第二十五山字第二十七寒字又在二十五而還又在二十七一進一退誠合體格豈率爾而為之哉近閱冷齊夜話載當時唐李對荅話言乃以此詩為落韻詩葢渠伊不見鄭谷所定詩格有進退之說而妄為云云也素緗雜記唐介始彈張堯佐諫官皆上疏及彈文彦博則呉奎畏縮不全當時謂拽動陣脚及唐争論於上前遂并及奎之背約執政又黜奎而文潞公益不安遂罷政事時李師中詩送唐有並逰英俊顔何厚未死姦諛骨已寒之句為奎發也東軒詩話總龜後集巻二欽定四庫全書詩話總龜後集巻三宋阮閱撰孝義門徐師川詩云楚漢紛争辨士憂東歸那復割鴻溝鄭君立義不名籍項伯胡顔肯姓劉謂項伯籍之近族乃附劉而背項鄭君已為漢臣乃違漢而思楚也余嘗論之曰方劉項之勢雌雄未决也其間豈無容容狡詐之士首鼠兩端以觀成敗而為身謀者乎項伯是也其意以謂項氏得天下則吾嘗以宗族從軍畫䇿定計豈吾廢哉劉氏得天下則鴻門之㑹吾嘗舞劍以蔽沛公矣廣武之㑹吾嘗勸勿烹太公矣劉氏豈吾廢哉髙祖之封項伯殆以此也至鄭君則不然事籍籍死屬漢髙祖諸故楚臣名籍鄭君獨不奉詔乃盡拜名籍者為大夫而逐鄭君觀此則鄭君與項伯賢佞可見髙祖或逐或封皆徇情之好惡則知戮丁公者一時矯激之為也王儉七志曰宋髙祖逰張良廟並命僚佐賦詩謝瞻所賦冠于一時今載於文選者是也其曰鴻門銷薄蝕陔下隕欃槍爵仇建蕭宰定都䕶儲皇肇允契幽叟飜飛指帝鄉則子房輔漢之䇿盡於此數語矣王荆公云素書一巻天與之榖城黄石非吾師固陵解鞍聊出口捕取項羽如嬰兒従来四皓招不得為我立弃商山芝用亦此數事而論議格調出於常等東坡論子房袖搥之事以謂良不為伊吕之謀而倖出於荆軻聶政之計以余觀之此良少年之銳氣未足以咎良也圯上授書之後所見豈前比哉葛常之予曽祖通議兄弟四人取良辰美景賞心樂事之義作四并堂于東園故通議詩云華圃控弦秋學射寒窻留燭夜抄書良辰美景饒心事歡日相并樂起予先祖清孝公兄弟六人取三荆同林之義作培荆亭于西園當時篇詠無存者清孝安遇集中有倍荆亭記其畧云西園椎輪無亭觀之玩伯兄欲糾合叔季同耳目之適於是基盈尺之髙宏一筵之廣列檻為亭號曰培荆至先人文康公罷官南陽適當兵擾復還舊棲奉伯父工部居焉别建二老堂于宅南秦望由里諸山皆在目植花竹于四隅命某日治饌往往樂飲竟日某嘗賦詩云去家纔隔水一股二老堂成三百弓鴒原暮下沙水暖鴈行夜落霜天空竹根酌酒不妨醉花蕚斵詩如許工坐久興開笻竹杖出門人指兩仙翁同上月輪當空天下之所共視故謝荘有隔千里兮共明月之句盖言人雖異處而月則同瞻矣老杜當兵戈騷屑之際與其妻各居一方自人情觀之豈能免閨門之念而他詩未嘗一及之至於明月之夕則遐想長思屢形詩什月夜詩云今夜鄜州月閨中只獨看繼之曰香霧雲鬟濕清輝玉臂寒一百五日夜對月云無家對寒食有淚如金波繼之曰仳離放紅蘂想像顰青蛾江月詩云江月光於水髙樓思殺人繼之曰誰家排錦字燭滅翠眉顰其數致意閨門如此其亦謝荘之意乎顔延之對孝武乃有荘始知隔千里兮共明月之說是荘才情到處延之未能曉也同上魏武於諸子中獨愛植丁儀丁􅛫楊脩之徒為植羽翼㡬代太子丕而植狂性不自雕勵又太子御之有術故易宗之計不行蓋非植遜丕也洎文帝即位植屢求試用不報益怏怏帝欲害之卞太后曰汝已殺任城不宜復殺東阿故止従貶爵則植豈無怨懟乎嘗觀植所作豫章行云他人雖同盟骨肉天性然周公穆康叔管蔡則流言子臧孫千乗季札慕其賢意謂巳素為武帝所愛忌之者衆故有管蔡流言之說然乃自以季札為比亦誣矣豈其掠美之言哉同上晉嵇康贈弟秀才四言詩云感悟馳情思我所欽則以所欽為弟陸機贈從兄車騎詩云寤寐靡安豫願言思所欽則以所欽為兄又贈馮文罷詩云慷慨誰為感願言懐所欽則以所欽為友陸機作詩贈賈謐㡬三百言無非極其褒讃方謐用事生死榮辱人如反覆手其褒讃亦何足怪然其間亦有寄意譏誚人未能推其意者按臧榮緒晋書謐父韓夀毋賈充少女也充平生不議立後妻郭槐輙以外孫韓謐襲封帝許之遂以謐為魯公則是賈謐非充子也故機詩云誕育洪胄纂戎于魯言誕育則以譏非已生也又曰惟漢有朩曽不踰境謂橘踰淮則化為枳言如螟蛉之化蜾蠃無異也夫謐勢熖薫灼如此而機敢為廋詞以狎侮之真文人之習氣哉王福畤之子勔􅀈勃皆有才名故杜易簡稱為三珠樹其後助劼勸又皆以文顯勃於兄弟之間極友愛自鄉逺虢詩云人生忽如客骨肉知何常願及百年内花蕚常相将無使棠棣廢取譬人無良觀此語意豈兄弟有不相能者耶及觀誡劼勸云欲不可縱争不可常勿輕小忿将成大殃此二人者似非處於禮義之域者棠棣廢之語疑為此二人設也同上楊六尚書白樂天妻兄也初除東川節度代妻賀兄云覔得黔婁為妺婿可能空寄蜀茶来又寒食寄詩云蠻旗似火行隨馬蜀妓如花坐遶身不使黔婁夫婦看誇張富貴向何人皆責望之言也同上文選載嵇叔夜贈秀才入軍詩李善注謂兄喜秀才入軍而張銑謂叔夜弟不知其名考五詩或曰攜我好仇或曰思我良朋或曰佳人不在皆非兄弟之稱善銑所注恐未必然爾同上錢起題杜牧林亭詩云不須躭小隠南阮在平津南阮謂杜悰也史載悰更厯将相而牧困躓不自振怏怏不平以至於卒審爾以牧之豈肯受其料理哉然宗族貴宦河潤者非一枯死升沉時命存焉何至怏快如是可以知牧之量不宏也李義山作驕兒詩時衮師方三四嵗爾其末乃云兒應勿學耶讀書求甲乙况今西與北羗戎正狂悖兒當速成大探雛入虎窟當為萬户侯勿守一經袠兵連旤結生民塗炭以日為嵗之時而乃望三四嵗児立功於二十年後所謂俟河之清人夀幾何者也同上陶淵明命子篇則曰夙興夜寐願爾之才爾之不才亦巳焉哉其責子篇則曰雖有五男兒總不好紙筆天運茍如此且進杯中物告儼等數則曰鮑叔管仲同財無猜歸生伍舉班荆道舊而况同父之人哉則淵明之子未必賢也故杜子美論之曰有子賢與愚何其掛懐抱然子美於諸子亦未為忘情者子美遣興詩云驥子好男兒前年學語時世亂憐渠小家貧仰母慈又憶幼兒詩云别離經節換聦慧與誰論憶渠愁只睡炙背俯晴軒得家書云熊兒幸無恙驥子最憐渠元日示宗武云汝啼吾手戰觀此數詩於諸子鍾情尤甚於淵明矣山谷乃云杜子美困於三蜀蓋為不知者詬病以為拙於生事又往往譏宗武失學故寄之淵明爾俗人不知便為譏病所謂癡人面前不得說夢也同上詩話總龜後集巻三欽定四庫全書詩話總龜後集巻四宋阮閱撰孝義門唐人與親别而復歸謂之拜家慶盧象詩云上堂家慶畢顧與親思邇孟浩然詩云明朝拜家慶湏著老莱衣葛常之荆公初去臨川詩云馬頭西去涙霑襟一望親庭更苦心已覺省煩非仲叔安能養志似曽參赴調西京時詩也非仲叔則自傷不能養口體不如曽參則自傷不能養志也人士一官所駐乃爾為志亦豈得巳哉後又有詩云古人一日養不以三公換正為此爾葛常之張劒州以太夫人喪劒州歸荆公予之詩并示女弟云烏辭反哺顛毛黒鳥引思歸口舌丹又有張劒州至劒一日以親憂罷詩云白頭反哺秦烏側流血思歸蜀鳥前所賦皆一時之事而語意重復如此何耶同上陳繹奉親至孝嘗作慶老堂以娯其母介甫贈之詩云種竹常疑出冬筍開池故合涌寒泉蓋不獨詠堂前景物而孝感之事實寓焉出冬筍暗用孟宗事涌寒泉暗用姜詩事同上王稚川調官京師毋老留鼎州久不歸侍嘗閱貴人歌舞有詩云畫堂玉珮縈雲響不及桃源欵乃歌山谷次韻諷之曰慈母毎占烏鵲喜家人應賦扊扅歌可謂盡朋友責善之義谷至孝奉母安康君至為親滌厠牏浣中裙未嘗頃刻不供子職洎貶黔南不能與親俱則贈王郎詩云留我左右手奉承白髮親至贛上食蓮有感則曰蓮實大如指分甘念母慈亦可見其孝誠矣余聞無瑕者可以録人則其告稚川之語未為過也老杜送李舟詩非不歸重而其中亦不能無譏焉所謂舟也衣彩衣告我欲逺適倚門固有望歛衣就行役南登吟白華已見楚山碧何時太夫人堂上㑹親戚豈非譏其無方之道耶孔子云父母在不逺逰逰必有方則山谷少陵之詩皆孔子之意也人之事親當以敬為主故孔子告子游曰至於犬馬皆能有養不敬何以别乎束晳作補亡詩於南陔白華二篇每以為言南陔曰養隆敬薄惟禽之似白華曰竭誠盡敬亹亹忘劬可謂得孔子之㫖矣今之人恃親之愛已而忘其敬者多故表而出之以為事親之戒同上李白樂府三巻於三綱五常之道數致意焉慮君臣之義不篤也則有君道曲一篇所謂軒后瓜牙常先太山稽如心之使臂小白鴻翼於夷吾劉葛魚水二慮父子之義不篤也則有東海勇婦之篇所謂淳于免詔獄漢主為緹縈津妾一棹歌脫父於嚴刑生子若不肖不如一女英慮兄弟之義不篤也則有上留田之篇所謂田氏倉卒骨肉分青天白日摧紫荆交柯之朩本同形東枝顦顇西枝榮無心之物尚如此參商胡乃尋天兵慮朋友之義不篤也則有箜篌謡之篇所謂貴賤交結心不移惟有嚴陵及光武輕言託朋友對面九疑峰管鮑久已死何人繼其蹤慮夫婦之情不篤也則有雙燕離之篇所謂雙鷰復雙鷰雙飛令人羡玉樓珠閣不獨棲金窻繡户長相見徐究白行事亦豈純於行義者哉永王之叛白不能潔身而去於君臣之義為如何既合于劉又合于魯又娶于宋又擕昭陽金陵之妓於夫婦之義為如何至於友人路亡白為權窆及其糜潰又收其骨則朋友之義庶幾矣送蕭十一之魯兼問稚子伯禽有髙堂倚門望伯魚魯中正是趨庭䖏君行既識伯禽子應駕小車騎白羊之句則父子之義庶㡬矣如弟凝錞儕况綰各贈詩以致其雍睦之情則兄弟之義庶㡬矣惜乎二失既彰三美莫贖此所以不能為醇儒也韻語陽秋樂天及第後歸覲留别同年云擢第未為貴拜親方始榮此毛得檄而喜之意也論者以春風得意疾决非孟郊語其氣格亦不類而白公亦有得意减别恨半酣輕逺程翩翩馬蹄疾春風歸鄉情此又不可曉也黄常明范文正公雷霆日有犯始可報吾親誰謂臣子忠孝難兩全也涖官不敬戰陣無勇本非事親事禮記必以為非孝公之謂歟黄常明宗族門謝師厚生女梅聖俞與之詩曰生男衆所喜生女衆所醜生男走四隣生女各張口男大守詩書女大逐鷄狗又云何時集氏郎堂上拜媪叟盖戯師厚也陳琳杜甫詩及楊妃外傳其說異陳琳痛長城之役則曰生男戒勿舉生女哺用脯杜甫傷闗西之戍則曰生女猶淂嫁比鄰生男埋沒随百草楊妃専寵帝室金印紫綬寵遍於銛釗象服魚軒榮均於秦虢當時遂有生女勿悲酸生男勿喜歡男不封侯女作妃君看女却為門楣之詠而樂天長恨歌亦云遂令天下父母心不重生男重生女令師厚之女敏質儒門不過求賢士以為之配爾縦不至負薪如翟婦餉㫪如孟光亦豈能預知其必大富貴亢宗榮族如蒲之婦人乎宜其聖俞以為戯也韻語陽秋傳曰學士大夫則知尊祖矣族之所在祖之所自出也其可以不敬乎陶淵明有贈長沙公詩序云予於長沙公為族祖同出大司馬昭穆既逺巳為路人故其詩云同源分流人易世踈慨然晤歎念斯厥初禮服遂悠嵗月𦕈徂感彼行路眷焉踟蹰盖深傷之也長沙公於淵明如此而淵明乃以宗族自任其臨别贈言之際有進簣雖少終在為山之句嗚呼淵明亦可謂賢矣杜子美數訪從孫濟而不免於防猜故其詩云所来為宗族亦不謂盤餐勿受外嫌猜同姓古所敦觀長沙與濟尊祖之義掃地矣韻語陽秋詩話總龜後集巻四欽定四庫全書詩話總龜後集巻五宋阮閱撰仁愛門孟子七篇論君與民者居半其餘欲得君盖以安民也觀杜陵窮年憂黎元歎息腸内熱胡為将暮年憂世心力弱宿花石戍云誰能扣君門下令減征賦寄栢學士云㡬時髙議排金門各使蒼生有環堵寧令吾廬獨破受凍死亦足而志在大庇天下寒士其仁心廣大異夫求穴之螻蟻輩真得孟子所存矣東坡問老杜何如人或言似司馬遷但能名其詩耳愚謂老杜似孟子盖原其心也䂬溪韋蘓州云身多疾病思田里邑有流亡愧俸錢郡中屢集云自慚居處崇未覩兹民康余謂君子當切切作此語彼有一意供租専事土朩而視民如讐者得無愧此詩乎同上賈生終童欲輕事征伐大扺少年躁鋭如經厯老成當不如此昔人欲沈孫武於五湖斬白起於長平誠有謂哉嘗愛老杜云慎勿吞青海無勞問越裳大君先息戰歸馬華山陽又有安得壮士挽天河净洗甲兵長不用安得務農息戰閗普天無吏横索錢願戒兵猶火恩加四海深不眠憂戰伐無力正乾坤其愁歉憂戚蓋以人主生靈為念孟子以善言陣戰為大罪我戰必克為民賊仁人之心易地皆然黄常明臨川云黄雀百頭顱長行萬里餘因君令出守暫得免苞苴使能行此言則虐生類以飽口腹刻疲民以肥權勢者寡矣其詩才二十字耳崇仁愛抑奔競皆具焉何以多為杜云築塲憐穴蟻拾穗許村童人謂有仁愛民物意臨川詠促織云只向貧家促機杼㡬家能有一絇絲愚謂世之嚴督征賦不恤疲瘵之有無者雖魁然其形實微䖝智爾䂬溪元結刺道州承兵賦之後徴率煩重民不堪命作㫪陵行其末云何人采國風吾欲獻此詩以傳考之結以人困甚不忍加賦嘗奏免稅租及和市雜物十三萬緡又奏免租庸十餘萬緡因之流亡盡歸乃知賢者所存不特空言而已丹陽集范文正淮上遇風云一櫂危於葉旁觀欲損神他年在平地無忽險中人雖弄翰戯語卒然而作險濟加澤之心未嘗忘也黄常明王道州㫪陵行云所願見王官撫養以恵慈柰何重驅逐不使存活為逋緩違詔令䝉責願所宜又云守官貴守道不愛能適時賊退示官吏云使臣將王命豈不如賊焉令被徴歛者迫之如火煎誰知絶人命以作時世賢子美志之曰今盗賊未息知民疾苦得結輩十數人為邦伯萬姓氣吐天下少安立可待已余謂漫叟所以能然者先民後已輕官爵重人命故也觀其石魚詩云金魚吾不須軒冕吾不愛此所以能不徇權勢而専務愛民也杜乃知正人意不茍飛長纓可謂相知深矣同上友義門蘇武李陵在武帝時同為侍中金蘭之義素篤武拘於匈奴明年而陵始降雖逆順之勢殊悲懽之情異然朋友之誼此心常烱烱也觀陵海上勸武使降之言非不切至而武之所以告陵者不過明吾忠義之心而已而未嘗一語及陵之叛若告衛律者則不然盡辭詬詈歸之於不忠不臣之科而此以節義臨之㡬使惡死此亦可以見於陵厚矣後武得歸陵置酒賀武曰今足下還歸揚名於匈奴功顯於漢室雖古竹帛所載丹青所畫何以過子卿故李太白蘓武詩云渇飲月窟水飢飡天上雪東還沙塞逺北愴河梁别泣把李陵衣相看涙成血蓋亦是意語爾韻語陽秋石林詩話元豐間東坡繫獄神宗本無意罪之時相因舉軾檜詩根到九泉無曲處嵗寒惟有蟄龍知且云龍飛在天軾以為不知已而求知地下之蟄龍非不臣何得章子厚從而解之遂薄其罪而王定國見聞錄云東坡在黄州時上欲復用王禹玉以嵗寒惟有蟄龍知激怒上意章子厚力解遂釋予觀東坡自獄中出與章子厚書云某所以得罪其過惡未易一二數平時惟子厚與子由極口見戒反復甚苦某強狠自不以為然又云往時相識但過相稱譽以成吾過一旦有患難無復相哀昔唯子厚平居遺我以藥石及困急又有以救䘏之真與世異矣則知坡繋獄時子厚救解之力為多石林詩話不妄也陽秋東坡歸陽羡時流離顛躓之餘絶禄已數年受梁吉老十絹百絲之􅀈可見非有餘者李憲仲之子鷹以四喪未舉而見公則盡以贈之且贈以詩曰推衣贈孝子一溉滋湯旱誰能脫左驂大事不可緩章季黙三喪未𦵏亦求於公公亦以助之有不辭毛粟施行自邱山積之句其髙蓋出於天資矣同上幼敏門西清詩話云魯直少警悟八嵗能作詩送人赴舉云送君歸去明主前若問舊時黄庭堅謫在人間今八年此已非髫稚語矣桐江詩話云山谷七嵗作牧童詩云騎牛逺逺過前村吹笛風斜隔隴聞多少長安名利客機闗用盡不如君林傑幼而聰慧言發成文質瑩凝脂音清扣玉嘉聚羣書又妙于手談當時名公多與之交及有是子益大其門亷使崔侍郎闕與之遷職詞云家藏萬巻學富三冬傑五嵗父因挈行云云後業詞賦頗振聲光有仙客入壺中賦云仙客以變化隨逍遥放情處於外則一壺斯在入其中則萬象皆呈飛閣重樓不是人間之状竒花異朩無非物外之名至九嵗謁大夫盧員常侍黎埴無不嘉奨尋就賔薦日在讌筵侍御李逺支使趙格深所知仰不捨斯須和趙支使詠荔枝尤佳云金盤摘下排朱顆紅壳開時飲玉漿副使鄭立竒童傳制使劉潼序以貽之閩川名士傳王元之年七八嵗已能文畢文簡公為郡從事始知之問其家以磨麫為生因令作磨詩元之不思以對但存心裏正無愁眼下遲若人輕著力便是轉身時文簡大竒之當於子弟中講學一日太守席上出詩句鸚鵡能言爭似鳳坐客皆未有對文簡寫之屏間元之書其下蜘蛛雖巧不如蠶文簡歎息曰經綸之才也遂加以衣冠呼為小友至文簡入相元之已掌書命矣聞見録後志氣門蔡寛夫詩話云太白之從永王璘世頗疑之唐書載其事甚畧亦不為明辨其是否獨其詩自序云夜半水軍来潯陽滿旌旃空名適自誤迫脅上樓船從賜五百金棄之若浮烟辭官不受賞翻謫夜郎天然太白豈從人為亂者哉蓋其學本出從横以氣俠自任當中原擾攘時欲藉之以立竒功耳故其巡歌有但用東山謝安石為君談笑靜胡沙之句至其卒章乃云南風一掃胡塵靜西入長安到日邊亦可見其志矣大扺才髙意廣如孔北海之徒固未必有成功而知人料事尤其所難議者或責以璘之猖獗而欲仰以立事不能如孔巢父蕭頴士察於未萌斯可矣若其志亦可哀已蘇子由云李白詩類其為人俊發豪放華而不實好事喜名不知義之所在也其語兵則先登䧟陣不以為難語游俠則白晝殺人不以為非此豈其誠能也白始以詩酒奉事明皇遇䜛而去所至不改其舊永王將據江淮白起而従之不疑遂以放死今觀其詩固然唐詩人李杜稱首今其詩皆在杜甫有好義之心白所不及也漢髙祖歸豐沛作歌曰大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方髙帝豈以文字髙世者帝王之度固然發於中而不自知也白詩反之曰但歌大風雲飛揚安得猛士守四方其不識理如此老杜贈白詩有重與細論文之句謂此類也髙齋詩話云荆公題金陵此君亭詩云誰怜直節生来瘦自許髙才老更剛賔客毎對公稱頌此句公輒顰蹙不樂晩年與平甫坐亭上視詩牌曰少時作此題榜一傳不可追改大扺少年題詩可以為戒平甫曰此楊子雲所以悔其少作也石林詩話云荆公以意氣自許故詩語為其所向不復更為㴠蓄如天下蒼生待霖雨不知龍向此中蟠又濃綠萬枝紅一㸃動人春色不湏多又平治險穢非無力潤澤焦枯是有才之類皆直道其胷中事後為郡牧判官従宋次道盡假唐人詩集博觀而約取晩年始盡深婉不迫之意乃知文字雖工拙有定限然必視其幼壯雖公方其未至亦不能力強而遽至也石林詩話云蘇明允至和閒在京師既為歐陽文忠公所知其名翕然韓忠獻諸公皆待以上客嘗遇重陽忠獻置酒私第惟文忠與一二執政而明允乃以布衣參其間郡人以為異禮席間意氣尤不少衰明允詩不多見然精深有味語不徒發正類其文而讀易詩云誰為善相應嫌瘦後有知音可發弹婉而不迫哀而不傷所作自不必多也述志門余嘗官展嘗借詩集於士人中有小篇序云成都華陽天慶中進士葉沆作止百篇時有可觀如閑居感懐云身閑難報國語直易傷時村墅云夜庭和月掃秋户拂雲開亦可想見其胷襟也和靖與士夫詩未嘗不及遷擢與學子詩未嘗不言登第視此為何等随緣應接不為茍難亢絶如此老杜云本無軒冕意不是傲當時鍾鼎山林各天性濁醪麄飰任吾年道義重而輕王公者也阮孝緒南平王要之不赴曰非志驕富貴但性畏廟堂使麏麚可驂何異驥騄求意門復齋漫錄云書當快意讀易盡客有可人期不来世事相違毎如此好懐百嵗㡬迴開其後又寄黄充前四句云俗子推不去可人廢招呼世事每如此我生亦何娯蓋無已得意故兩見之胡氏評詩曰魯直過平輿懐李子克詩世上豈無千里馬人中難得九方臯題徐孺子祠堂詩白屋可能無孺子黄金不是欠陳蕃二詩命意絶相似蓋歎知音者難得耳苕溪漁隠曰錫宴明日絶句云宴罷回来日欲斜平康坊裏那人家㡬多紅袖迎門笑争乞釵頭利市花清明日絶句云無花無酒過清明興味都来似野僧昨日隣家乞新火曉窻分與讀書燈二詩何况味不同如此亦可見其老少情懐之異也胡氏評詩曰澶淵之役王介甫以謂丞相莱公功第一張文潛以為可能功業盡莱公大扺人之議論各有所見故爾不同今具載二詩識者當能辨之介甫澶州詩云去都二百四十里河流中間兩城峙南城草上不受兵北城樓樐如邊城城中老人為予語契丹此地經鈔虜黄屋親臨矢石間胡馬飲踏河氷渡天發一矢胡無酋河氷亦破沙水流歡盟從此至今日丞相菜公功第一文潜聽客話澶淵事詩云憶昔胡来動河朔黄河飲馬吹胡角澶淵城下氷載車邊風蕭蕭千里賖城上黄旗坐真主夜遣六丁張猛弩雷驚電發一矢飛横射胡酋貫車柱犬羊無踪大漠空歸来封禪告成功自是乾坤扶聖主可能功業盡莱公談苑曰余知制誥日與余恕同考試恕曰夙昔師範徐騎省為文騎省嘗有徐孺子亭記其警句云平湖千畝凝碧乎其下西山萬叠倒影乎其中他皆常語近得舍人所撰涵虚閣記終篇皆竒語自渡江来未嘗見此信一代之雄文也其相推如此因出義山詩共讀酷愛一絶云珠箔輕明拂玉墀披香新殿閗腰支不湏看盡魚龍戯終遣君王怒偃師擊節稱嘆曰古人措辭寓意如此之深妙令人感慨不巳詩話總龜後集巻五欽定四庫全書詩話總龜後集巻六宋阮閱撰諷諭門唐文宗夏日聯句東坡謂宋玉對楚王雄風譏其知已不知人也公權小子有美而無規為續之云一為居所移苦樂永相忘願言均此施清隂分四方或謂五弦之薫解愠阜財已有陳善責難之意愚謂不然凡規諌之辭湏切直分明乃可以感悟人主故盗言孔甘良藥苦口若以薫風自南来為陳善閉邪但恐後世導諛側媚持兩可者皆得以冒敢諌之名也䂬溪陽城徳行道義為士林之所敬服徳宗以銀印赤紱起于隠所驟拜諫官可謂賢且遇矣故學生聞道州之貶投業而呌閽賢士愴驛名之同摛辭而頌徳可以知其賢不誣也然退之諫臣論乃極口貶之何哉其言曰今陽子實一匹夫在諌位不為不乆而未嘗一言及於政視政之得失若越人之視秦人之肥瘠問其官則曰諫議也問其政則曰我不知也有道之士固如是乎考之本傳以謂他諌官論事苛細帝厭苦城漫聞得失且熟猶未肯言客屢諫之第醉以酒而不荅蓋其意有所待矣至徳宗逐陸贄欲相裴延齡而城伏蒲之說始上廷爭懇至累日不解故元微之詩云正元嵗云暮朝有曲如鈎飛章八九上皆若珠暗投且曰事不止臣諌誓不休而白樂天亦云陽城為諌議以正事其君其手如屈軼舉必指侫臣卒使不仁者不得秉國鈞栁子厚亦云抗志厲義直道是陳蓋退之諌論乃在上裴延齡為相之前而三子頌美之言乃在陽城極諌之後也丹陽集蔡寛夫云江湖多白鳥天地有青蠅人遂以白鳥為鷺而禮記月令羣鳥養羞鄭氏乃引夏小正丹鳥白鳥之説謂白鳥為蚊蚋則知以對青蠅有深意矣不然江湖多白鷺有何説邪䂬溪子美詩草有害於人曽何生阻脩芒刺在我眼焉能待時秋其憤邪嫉惡欲芟夷藴崇之以肅清王室者抱懐可見臨川有勿去草草無惡如比世俗俗浮薄此方外之語異乎農夫之務者也黄常明子美云設網萬魚急蓋指聚歛之臣苛法侵漁使民不聊生乃萬魚急也又云能者操舟疾若風撑突波濤挺乂入小人舞智趨時巧宦數遷所謂疾若風也殘民以逞不顧傾覆所謂挺义入也日暮蛟龍改窟穴山根鱣鮪隨雲雷魚不得其所龍豈能安居君與民猶是也此與六義比興何異吾徒何為縱此樂暴戾天物聖所哀此樂而能戒又有仁厚意亦如前王作網罟設法害生成不専為取魚也退之义魚曰觀樂憶吾僚異此意矣亦如蘄簟云却願天日常炎曦故後人改之云豈比法曹空自私却願天日長炎赫黄常明唐子西上張天覺内前行云内前車馬撥不開文徳殿下宣麻回紫薇侍郎拜右相中使押赴文昌臺此語善於叙事質而不俚又云周公禮樂未要作致身姚宋亦不惡向来兩翁當國年民間斗米纔四錢此語善於諷諭當而有理皆可法也湖上云佳月明作哲好風聖之清栖禪寺歸云草青仍過雨山紫更斜陽語意俱新李陽氷云太白不讀非聖人之書恥為鄭衛之作故其言多似天仙之辭凡所著述言多諷興自三代以来風騷之後馳驅屈宋鞭撻揚馬千載獨步唯公一人故王公趨風列岳結軌羣賢翕習如鳥歸鳯盧黄門云陳拾遺横制頽波天下質文翕然一變至今朝詩體尚有梁陳宫掖之風至公大變掃地併盡今古文集過而不行唯公文章横被六合可謂力敵造化歟逹理門苕溪漁隱曰裴說云讀書貧裏樂搜句静中忙此二事乃余日用者甘貧守静自少至老飽諳此味矣許彦周詩話云羅隠詩云只知事逐眼前過不覺老從頭上来此殊有味朱氏復齋偶題詩曰出入無時是此心豈知鷄犬易追尋請看屏上初文㫖便識名齋用意深東坡云秋菊有佳色裛露掇其英泛此忘憂物逺我遺世情一觴雖獨進杯盡壺自傾日入羣動息歸鳥趨林鳴笑傲東軒下聊復得此生靖節以無事為得此生則見役於物者非失此生也歟東坡送山本禪師赴法雲云是身如浮雲安得限南北此二句乃老杜别賛上人詩中全語豈偶然用之邪題碧落洞詩云小語輙響荅空山白雲驚此語全類李太白今印本誤作白雷驚不惟無意味兼與上句重叠也後自嶺外歸次韻江晦叔詩云浮雲時事改孤月此心明語意髙妙如叅禪悟道之人吐露胷襟無一毫窒礙也康節天津感事吟水流任急境常静花落雖頻意自閒不似世人忙裏老生来未始得開顔擊壤集先天吟先天天弗違後天奉天時弗違無時虧奉時有時疲同上身心吟身生天地後心在天地前天地自我出自餘何足言同上康節無憂吟人生長有兩般愁愁死愁生未易休或向利中窮力取或于名上盡心求多思唯恐晩得手未老已聞先白頭我有何功居彼上其間攘臂獨無憂擊壤集詩話總龜後集巻六欽定四庫全書詩話總龜後集巻七宋阮閱撰逹理門否卦包承小人吉說者謂小人在下者包之小人在上者承之蓋處否當然杜云曲直吾不知負暄候樵牧是非何處定髙枕笑浮生洗眼㸔輕薄虚懐任屈伸寄謝悠悠世上児不争好惡莫相疑其寄傲踈放擺脫世網所謂兩忘而化其道也黄常明漫叟無為洞口云洞傍山僧皆學禪無求無欲亦忘年又無為洞口春水滿無為洞傍春雲白愛此躊蹰不能去念人悔作衣冠客岑参宿先逰寺云寄報乗軒客簮裾爾何容臨川何秀老云解我葱珩脫孟勞暮年甘與子同袍比之退之云方将歛之道且欲冠其顛向風長歎不可見我欲收歛加冠巾異矣六一有云自慚前引朱衣吏不稱閒行白髪翁說者謂不言亦可然次山宿丹崖翁宅詩云吾将求退與翁逰學翁歌醉在漁舟官吏隨人往未得却望丹崖慚復羞吁不滛乎富貴者也䂬溪東坡拈出陶淵明談理之詩前後有三一曰採菊東籬下悠然見南山二曰笑傲東軒下聊復得此生三曰客養千金軀臨化消其寳皆以為知道之言蓋摛章繪句嘲弄風月雖工亦何補若覩道者出語自然超詣非常人能蹈其軌轍也山谷嘗跋淵明詩巻云血氣方剛時讀此詩如嚼枯朩及綿厯世事知决定無所用智又嘗論云謝康樂庾蘭成之詩鑪錘之功不遺餘力然未能窺彭澤數仞之牆者二子有意於俗人賛毁其工拙淵明直寄焉持是以論淵明詩亦可以知其闗鍵也丹陽集孟子所言皆精粗兼備其言甚近而妙義在焉如龎居士云神通并妙用運水與搬柴此自得者之言最為逹理若孟子之言則無適不然如許大堯舜之道只於行止疾徐之間教人做了龜山語録或問言動非禮則何以正視聽如何得合禮曰四者皆不可易易則多非理故仁者先難而後獲所謂難者以我視以我聽以我言以我動也仰面貪看鳥回頭錯應人視聽不以我也胥失之矣上蔡語録吕晉伯兄弟中皆有見處一人作詩詠曽㸃事曰凾丈從容問且酧展才無不至諸侯可憐曽㸃推鳴瑟獨對春風詠不休同上或問邵堯夫云誰信畫前元有易自従刪後更無詩畫前有易何以見曰畫前有易其理甚微然即用孔子之已發明者言之未有畫前盡可見也如云神農氏之耒耜蓋取諸益日中為市盖取諸噬嗑黄帝堯舜之舟楫盖取諸渙服牛乗馬盖取諸隨益嗑渙隨重卦也當神農黄帝堯舜之時重卦未畫此理真聖人有以見天下之賾故通變以宜民而易之道得矣然則非畫前元有易乎龜山録熈寧十年夏康節感微疾氣日益耗神日益明笑謂司馬温公曰雍欲觀化一巡如何温公曰先生未應至此康節笑曰死生亦常事耳張横渠先生喜論命来問疾因曰先生論命否當推之康節曰若天命則已知之矣世俗所謂命則不知也横渠曰先生知天矣載尚何言程伊川曰先生至此他人無以為力願自主張時康節居正寢諸公議後事於外有欲𦵏近洛陽城者康節已知呼伯温入曰諸公欲以近城地𦵏我不可當從伊川先生塋耳七月初四日大書詩一章曰生于太平世死于太平世客問年㡬何六十有七嵗俯仰天地間浩然獨無愧以是夜五更捐館聞見録張敬夫元日詩古史書元意義存春秋揭示更分明人心天理初無欠正本端原萬善生南軒集康節過士友家晝卧見其枕屏小兒迷藏以詩題其上云遂令髙卧人欹枕看兒戯盖熈寧間也陳恬云擊壤集不載同上張横渠聖心詩聖心難用淺心求聖學湏専禮法脩千五百年無孔子盡因通變老優游横渠集五峯胡廣仲詩幽人偏愛青山好未是青山青不老山中出雲雨太虚一洗塵埃山更好朱氏陂云右衡山胡子詩也初紹興庚辰熹病卧山間親友仕於朝者以書見招集戯以兩詩代書報之曰先生去上芸香閣時藉溪先生正字赴館閣長新峩豸角冠劉共甫秘書丞除察官留取幽人卧空谷一川風月要人看一章甕牗前頭列畫屏晩来相對盡儀刑浮雲一任閑舒巻萬里青山只麽青二章或傳語胡子胡子謂其學者張敬夫曰吾未識此人然觀此詩庶能有進矣時其言有體而無用故為是詩以箴警之庶其聞之而有發也明年胡子卒又四年某始見敬夫而後獲聞之恨不及見胡子而請其目也因序其本末而書之于策以無忘胡子之意云見詩集邵堯夫先生居洛四十年安貧樂道自云未嘗攅眉所居寢息處為安樂窩自號安樂先生又為甕牗讀書燕居自平旦則焚香獨坐晡時飲酒三四甌微醺便止不使至醉也中間州府以吏法不餉餽寓賔乃為薄粥以代之好事者或載酒以濟其乏嘗有詩云斟有淺深存燮理飲無多少繋經綸莫道山翁拙於用也能康濟自家身喜吟詩作大字書然遇興則為之不牽強也大寒暑則不出每出乗小車用一人挽之為詩以自詠曰花似錦時髙閣望草如茵處小車行司馬温公贈以詩曰林間髙閣望已久花外小車猶未来随意所之遇主人喜客則留三五宿又之一家亦如之或經月忘返雖性髙潔而接人無賢不肖貴賤皆懽然如親嘗自言若至大病自不能支其遇小疾得有客對語不自覺疾之去體也學者来従之問經義精深浩􅀶應對不窮思致幽逺妙極道數間與相知之深者開口論天下事雖久存心世務者不能及也康節嘗誦希夷之語曰得便宜事不可再做得便宜處不可再去又曰落便宜是得便宜故康節詩云珍重至人嘗有語落便宜是得便宜蓋可終身行之也邵伯温易理辨惑詩話總龜後集巻七欽定四庫全書詩話總龜後集巻八宋阮閱撰博識門嘗觀臨川解我葱珩脫孟勞嘗不曉孟勞何等物及觀榖梁傳注孟勞魯之寶刀黄常明子美於菟侵客恨乃楚人謂虎於菟土銼冷疎烟乃蜀人呼釡為銼富豪有錢駕大舸方言南楚江湘凡船大者謂之舸百丈誰家上水船荆峽以竹纜為百丈塹抵公畦稜京師農人指田土㡬稜去聲市暨瀼西巔䕫人謂江水横通山谷處為瀼子厚桃笙葵扇安可當宋魏之間謂簟為笙款乃一聲山水綠乃楚人歌聲臨川窻明兩不借楚人以草屨為不借東坡倦看澁勒暗蠻村蓋嶺南竹名又蓬沓障前走風雨注云於潜婦人皆揷大銀櫛謂之蓬沓又幾思壓茅柴禁烟日夜急山谷燕濕社公雨鶯啼花信風皆方言也黄常明江漢有滸以扞制泛濫大漲則溢於平陸水退滸見舟人謂之水落槽又灘石湍激其中深僅可容舟者謂之洪若大水則不復問洪矣臨川萬里寒江正復槽東江水落水分洪以此亦謂水黄㡌謂雲砲車非遐征逺涉不能知也同上栁讀書篇瘴疴擾靈府日與往昔殊臨文乍了了徹巻元若無蓋常荅許京兆書云往時讀書不至底滯今每讀一傳再三伸巻復觀姓氏在宗元則為瘴疴所擾它人乃公患也同上東坡云東来賈客朩綿裘飲散金山月滿樓夜半潮来風又熱卧吹簫管到揚州集中題云夢中作盖坡嘗衣此坐客誤云朩綿襖俗飲散乃出此詩且云雖欲不可得也坐客大慙賈客事乃南史孔覬二弟頗營産業請假東還覬出渚迎之輕重二十餘船皆綿絹紙席之属覬偽喜命且置岸側既而正色謂曰汝輩忝預士流何至還東作賈客邪命燒盡乃去䂬溪家家養烏鬼沈存中以為鸕鷀說者謂非也元微之詩云病養烏稱鬼巫占瓦代龜自注雲南人染病競賽烏鬼楚巫列肆競賣瓦卜此乃戯效俳體二首其二亦云瓦卜傳神語皆是處方言則烏鬼非鸕鷀不疑矣書史蓄胷中而氣味入於冠裾山川厯目前而英靈助於文字太史公南逰北渉信非徒然觀老杜壯游云東下姑蘇臺已具浮海航到今有遺恨不得窮扶桑劒池石壁仄長洲芰荷香嵯峨閶門北清廟映池塘越女天下白鑑湖五月涼剡溪藴秀異欲罷不能忘歸帆拂天姥中嵗貢舊鄉放蕩齊趙間西歸到咸陽其豪氣逸韵可以想見序太白集者稱其隠岷山居襄溪南逰江淮觀雲夢去之齊魯之呉之梁北扺趙魏燕晉西徙邠岐從金陵上潯陽流夜郎泛洞庭上巫峽白自序亦曰偶乗扁舟一日千里或遇勝景終年不移其恣横採覽非其狂也使二公隠坐中書何以垂不朽如此哉燕公得助於江山鄭綮謂相府非㶚橋那得詩思非虚語也學林新編云世傳織女嫁牽牛渡河相㑹某按史記晉天文志河鼓星在織女牽牛二星之間世俗因傅㑹為渡河之說媟瀆上象無所根據淮南子云烏鵲填河成而渡織女荆楚嵗時記云七夕河漢間弈弈有光景以此為候是牛女相遇也其說皆怪誕不足信子美牽牛織女詩曰牽牛出河西織女處其東萬古永相望七夕誰見同神光意難候此事終朦朦觀子美詩意不取世俗說也七夕乞巧見於周處風土記乃後人編類成書大抵初無稽考不足信者多矣侯鯖錄云東坡作雪詩云凍合玉樓寒起粟光揺銀海眩生花後見荆公云道家以兩肩為玉樓目為銀海是使此事否坡退曰惟荆公知此出處苕溪漁隠曰緗素雜記學林新編二家辨證乘槎事大同小異余近来摭其有理者共為一說按張茂先慱物志曰舊說天河與海通近世有人居海上者每年八月見浮槎来不失期齎一年粮乗之而去十餘日中猶觀星月日辰自後茫茫亦不覺晝夜奄至一處有城郭屋舍甚嚴遥望宫中有婦人織見丈夫牽牛渚次飲之驚問曰何由至此其人說以来意并問此是何處荅曰君至蜀郡訪嚴君平則知之因還後以問君平君平曰某年月日有客星犯牽牛宿計年月正是此人到天河時也所載止此而巳而荆楚嵗時記直曰張華慱物志云漢武帝令張騫窮河源乗桴經月而去一處見城郭如官府室内有一女織又見一丈夫牽牛飲河騫問云此是何處荅曰可問嚴君平織女取榰機石與騫而還後至蜀問君平君平曰某年月日客星犯牛斗所得榰機石為東方朔所識亦其證焉按騫本傳及大宛傳騫以郎應募使月氐為匃奴所留十餘嵗得還騫身所至者大宛大月氐大夏康居而傳聞其旁大國五六具為天子言其地形所有並無乗槎至天河之說而宗懔乃傅㑹以為武帝張騫之事又益以榰機石之說何邪子美䕫府詠懐詩曰途中非阮藉槎上似張騫又秋興詩曰奉使虚隨八月槎如此類前賢多用之恐非實事杜子美詩喜用文選語故宗武亦習之不置所謂熟精文選理休覔綵衣輕又云呼婢取酒壺續兒誦文選是也唐朝有文選學而時君尤見欽重分别本以賜金城書絹素以屬裴行儉是也外史檮杌載鄭奕嘗以文選教其子其兄曰何不教讀論語免學沈謝嘲風㺯月汚人行止鄭兄之言盖欲先徳行而後文藝亦不為無理也丹陽集雪浪齋日記云昔人有言文選爛秀才半正為文選中事多可作本領爾余謂欲知文章之要當熟看文選蓋選中自三代涉戰國秦漢晉魏六朝以来文字皆有在古則渾厚在近則華麗也苕溪漁隱曰少陵宗武生日詩熟精文選理蓋為是也苕溪漁隠曰學者欲博讀異書余謂退之進學解云上窺姚姒渾渾無涯周誥殷盤詰屈聱牙春秋謹嚴左氏浮誇易奇而法詩正而葩下逮莊騷太史所録子雲相如同工異曲若盡讀此足矣何必多嗜異書詩話總龜後集巻八欽定四庫全書詩話總龜後集巻九宋阮閲撰狂放門劎閣云吾将罪真宰意欲鏟叠嶂與太白槌破黄鶴樓剗却君山好語亦何異然劎閣詩意在削平僣竊尊崇王室凛凛有忠義氣槌碎剗却之語但覺一味粗豪耳故昔人論文字以意為主性豪業嗜酒嫉惡懐剛腸飲酣視八極俗物都茫茫此子美胷中語也宜其孩弄嚴武藐視禮法而朱老阮生皆莫逆及遭田父泥飲至被肘而不悔其内直外曲彊禦不畏矜寡不侮非世所能測也䂬溪唐史載杜審言嘗云吾文當得屈宋作衙官其孫乃有讀書破萬巻下筆如有神謂蘓味道見吾判且羞死甫乃有集賢學士如堵牆看我落筆中書堂謂為造化小兒所苦甫乃有日月籠中鳥乾坤水上萍所謂是以似之也同上藝苑雌黄云吟詩喜作豪句須不畔於理方善如東坡觀崔白驟雨圖云扶桑大繭如甕盎天女織綃雲漢上往来不遣鳳銜梭誰能鼓臂投三丈此語豪而甚工石敏若橘林文中詠雪有燕南雪花大於掌氷柱懸簷一千丈之語豪則豪矣然安得爾髙臺或云詠雪非敏若詩見鮑欽止夷白堂小集苕溪漁隠曰東坡集載此詩是題趙令晏崔白大圖幅徑三丈故云往来不遣鳳銜梭誰能鼓臂投三丈可謂善造語能形容者也畫品人間刀尺不敢裁丹青付與濠梁崔風蒲半折寒鴈起竹間的皪横江梅乃是崔白冬景圖藝苑以謂驟雨圖悞矣又李太白北風行云燕山雪花大如席秋浦歌云白髮三千丈其句可謂豪矣柰無此理何如秦少逰秋日絶句云連巻雌蜺拄西樓逐雨追晴意未休安得萬粧相向舞酒酣聊把作纒頭此語亦豪而工矣郭功甫金山行造語豪世多不見全篇今録于左方金山杳在滄溟中雪崖氷柱浮仙宫乾坤扶持自今古日月彷彿纒西東我泛靈槎出塵世搜索異境窺神工一朝登臨重歎息四時想像何其雄捲簾夜閣挂北斗大鯨駕浪吹長空舟摧岸㫁豈足數徃往霹靂槌蛟龍寒蟾八月蕩瑤海秋光上下磨青銅鳥飛不盡暮天碧漁歌忽㫁蘆花風蓬莱久聞未成往壯觀絶致遥應同潮生潮落夜還曉物數交㑹誰能窮百年形影浪自苦便欲此地安其躬白雲南去供入望又起歸興隨征鴻稱賞門王直方詩話云樂天有詩云醉貌如霜葉雖紅不是春東坡有詩云兒童誤喜朱顔在一笑那知是酒紅鄭谷有詩云衰髩霜供白愁顔酒借紅老杜有詩云髮少何勞白顔衰肯更紅無已詩云髪短愁催白顔衰酒借紅皆相類也然無已初出此一聯大為當時諸公所稱賞雪浪齋日記云髙荷字子勉贈山谷詩云㸃檢金閨彦飄零玉筍斑尚令清廟器猶隔鬼門闗大為山谷所喜杜子美褒稱元結舂陵行兼賊退後示官吏二詩云兩章對秋月一字偕華星致君唐虞際淳朴憶大庭又云今盗賊未息得結輩數十公落落然參錯為天下邦伯天下少安可立待已蓋非専稱其文也至於李義山乃謂次山之作以自然為祖以元氣為振無乃過乎秦少游漫郎詩云字偕華星章對月漏泄元氣煩揮毫蓋用子美義山語也金是堂髙麗使過海有詩云水鳥浮還沒山雲㫁復連時賈島詐為稍人聯下句云棹穿波底月船壓水中天麗使嘉歎久之䂬溪張祜詩云故國三千里深宫二十年杜牧賞之作詩云可憐故國三千里虚唱歌詞滿六宫故鄭谷張生故國三千里知者唯應杜紫微諸賢品題如是祜之詩名安得不重乎其後有解道澄江静如練世間唯有謝𤣥暉解道江南㫁腸句世間唯有賀方回等語皆祖是意也葛常之詩人賛美同志詩篇之善多比珠璣璧玉錦繡花草之類至杜子美則豈作此陳腐語也寄岑参詩云意愜闗飛動篇終接混茫夜聽許十誦詩云精微穿溟涬飛動摧霹靂贈盧居詩云藻翰唯牽率湖山合動揺贈朱諌議詩云毫髮無遺恨波瀾獨老成寄李白詩云筆落驚風雨詩成泣鬼神贈髙適詩云美名人不及佳句法如何皆驚人語也視餘子其神芝之與腐菌哉丹陽集稱薦門温公自稱迂叟香山居士亦嘗以自號其詩云初時被目為迂叟近日䝉呼作隠人司馬豈慕其洛居有閑適之樂邪䂬溪周美成邦彦元豐初以大學生進汴都賦神宗命之以官除大學録其後流落不偶浮沉州縣三十餘年蔡元長用事美成獻生日詩略云化行禹貢山川内人在周公禮樂中元長大喜即以秘書少監召又復薦之揮塵録李白贈崔侍御詩云黄河三尺鯉本在孟津居㸃額不成龍歸来伴凡魚何當赤車使再往召相如相如蓋自謂也觀此不可謂白之無心於仕進者然當時慢侮力士畧不為身謀以致貶逐而曽不悔使其欲仕之心切必不如是先是蘇頲為益州長史見白異之曰是子天才英特少益以學比相如故白詩中毎以相如自比従弟之遥曰漢家天子馳駟馬赤車蜀道迎相如自漢陽病酒歸曰聖主還聽子虚賦相如却欲論文章贈張鎬曰十五觀竒書作賦凌相如白自比為相如非止一詩也呉邁逺好自夸而嗤鄙他人毎作詩得稱意語輙擲地呼曰曹子建何足数哉袁嘏謂人曰我詩有生氣亦以用心深苦俄爾有得宜不勝其喜子美云語不驚人死不休貫休謂得句先呈佛皆此謂也老杜髙自稱許有乃祖之風上書明皇云臣之述作沉鬱頓挫揚雄枚臯可企及也壯逰詩則自比引崔魏班揚又云氣劘屈賈壘目短曹劉墻贈韋左丞則曰賦料楊雄敵詩看子建親甫以詩雄於世自比諸人誠未為過至竊比稷與契則過史稱甫好論天下大事髙而不切豈自比稷契而然耶至云上感九廟焚下憫萬民瘡斯時伏青蒲廷爭守御床其忠藎亦可嘉矣陽秋韻復齋漫録云江公著初任洛陽尉久旱微雨作詩云雲葉紛紛雨脚勻亂花柔草長精神雷車却碾前山過不灑原頭陌上塵温公於士人家見之借紙筆脩刺謁江且為稱薦由此知名投獻門錢惟演為洛帥留守始置驛貢花識者鄙之蔡君謨加法小團茶貢之富彦國歎曰君謨乃為此也坡作荔枝歎曰我願天公憐赤子莫生尤物為瘡痏雨順風調百榖登民不飢寒為上瑞君不見武陵溪邊粟粒芽前丁後蔡相籠加吾君盛徳豈在此致養口腹何陋邪又不見洛陽丞相忠孝家可憐亦進姚黄花補世之語不能易也嘗愛李敬方汴河直進船詩云汴水通淮利最多人生為害亦相和東南四十三州地取盡脂膏是此河此等語皆為多貢獻也評論門介甫詩少陵為爾添詩興可見無心賦海棠杜黙云倚風莫怨唐工部後裔誰知不解衣曽不若東坡柯丘海棠長篇冠古絶今雖不指名老杜而補亡之意盖使来世自曉也樂天九日思杭州云笙歌委曲聲延耳金翠動揺光照身子瞻有懐錢塘云剰看新畨眉倒暈未應泣别臉消紅黎元耆舊何遽忘之也徐考其集白送姚杭州因思舊游云閭里固宜勤撫恤樓臺亦要數躋扳蘇亦云細雨暗時一百六畵橈鼇鼓莫遺民是未嘗無意於民庶也然白又有故妓數人憑問訊新詩兩首倩流傳坡又有休驚嵗嵗年年貌且對朝朝暮暮人大扺滛樂之語多於撫養之語耳夫子稱未見好徳如好色而傷之曰已矣乎二公未能免俗餘人不必言子瞻賦濁醪有妙理首句云酒勿嫌濁人當取醇其末乃曰濁者以飲吾僕清者以酌吾友復立分别則是濁醪無妙理矣豈非萬斛洶湧不暇㸃校故歟司馬温公云清茶談話難逢友濁酒狂歌易得朋雖造次間語亦在進直諒之益而退便僻之損也䂬溪雪浪齋日記云讀謝靈運詩知其攬盡山川秀氣讀退之南山詩頗覺似上林子虛賦才力小者不能到李長吉玉川子詩皆出於離騷未可以立談判也皇甫持正云吟詩未有劉長卿一字唐人必甚重長卿今詩十巻亦清麗宋子京華記云古人語有椎拙不可掩者樂府曰何以銷憂惟有杜康劉越石曰何其不夢周又有曰夫子悲獲麟西狩歎孔丘雖有意緒詞亦鈍樸詩話總龜後集巻九欽定四庫全書詩話總龜後集巻十宋阮閱撰評論門杜云爾輩可忘年含悽覺汝賢送爾維舟惜此筵汝與山東李白好自世俗觀之則為簡傲而實不然亦嘗有云忘形到爾汝黄常明又古栢云不露文章世已驚未辭剪伐誰能送先器識後文蓻與浮躁衒露者有異也同上古栢云大厦如傾要梁棟萬牛回首邱山重此賢者難進而易退也非其招不往者也同上趙嘏長安秋望詩云殘星㡬㸃鴈横塞長笛一聲人倚樓當時人誦詠之以為佳作遂有趙倚樓之目又有長安月夜與友人話歸故山詩云楊栁風多潮未落兼葭霜在鴈初飛亦不減倚樓之句至於獻李僕射詩云新諾似山無力負舊恩如水滿身流則謬矣葛常之鍾嶸稱張茂先惜其兒女情多風雲氣少喻鳬嘗謁杜紫微不遇乃曰我詩無綺羅鉛粉宜不遇也淮海詩亦然人戯謂可入小石調然率多子美句但綺麗大勝爾子美並蔕芙蓉本自雙水荇牽風翠帯長退之金釵半醉坐添春牧之春風十里楊州路誰謂不可入黄鍾宫邪黄常明昌黎云攜持令名歸自足貽家尊蘇州送叅尉云秖應傳善政朝夕慰髙堂誠儒者迂闊之辭然貪饕茍得汚累其親孰若清白之為愈同上東坡云少陵詠懐詩杜陵有布衣老大意轉拙許身亦何愚竊比稷與契子美自比稷契人未必許也然其又有詩云舜舉十六相身尊道更髙秦時任商鞅法令如牛毛自是稷契輩人口中語也知名不必稱局促商山芝又云王侯與螻蟻同盡隨邱墟願聞第一義回向心地初乃知子美詩尚有事在也䂬溪張藉送區宏詩云韓公國大賢道徳赫已聞昨出為陽山爾區来趨奔韓官遷法曹子又至荆門韓入為博士﨑嶇從覊輪觀其逰從之久疑得於韓者深也然考其文章議論之際乃不得預藉湜之列何也韓集有送區宏南歸詩云我遷于南日周圍来見者衆莫依希爰有區子熒熒暉觀以彛訓或從違我念前人譬葑菲落以斧斤引纆徽雖有不逮驅騑騑觀此數語則韓雖以師道自任而區受道之質盖有所未至也其後又勉之以行行正直勿脂韋業成志立来頎頎其望之者至矣集中又有送區冊序韓文辨証云册即宏也未知孰據爾丹陽集舉人過失難於當其尤者臧孫之犯門斬闗惟孟椒能絶之臧紇謂國有人焉必椒也其難如此司馬相如竊妻滌器開巴蜀以困苦鄉邦其過巳多至為封禪書則䜛諂蓋天性不復自新矣子美猶云竟無宣室召徒有茂陵求李白亦云果得相如草仍餘封禪文和靖獨不然曰茂陵他日求遺藁尤喜曽無封禪書言雖不迫責之深矣李商隠云相如解草長門賦却用文君取酒金亦全其大論其細也舉其大者自西湖始其後有譏其諂諛之態死而未已正如捕逐宼盜先有力者所獲搤其吭而騎其項矣餘人從旁助箠縳耳黄常明近人程文窮日力作一論既不限聲律復不拘詩句尚罕得反復折難使其理判然觀赴奉先詠懐五百言乃聲律中老杜心迹論一篇也自杜陵有布衣老大意轉拙許身一何愚竊比稷與契其心術祈嚮自是稷契等人窮年憂黎元歎息腸内熱與飢渇猶已也何異然常為不知者所病故曰取笑同學翁世不我知而所守不變故曰浩歌彌激烈又云非無江海志瀟洒送日月當今廊廟具構厦豈云缺葵藿傾太陽物性固莫奪言非不知隠遁為髙也亦非以國無其人也特廢義亂倫有所不忍以兹悟生理獨恥事干謁言志大術踈未始阿附以借勢也為下士所笑而浩歌自若皇皇慕君而雅志棲道既不合時而又不少低屈皆設疑互荅屢致意焉非巨刃有餘孰能之乎中間鋪叙間闗酸辛宜不勝其戚戚而黙思失業徒因念逺戍卒所謂憂在天下而不為一已失得也禹稷顔子不害為同道少陵之迹江湖而心稷契豈為過哉孟子曰窮則獨善其身逹則兼善天下其窮也未嘗無志於國與民其逹也未嘗不抗其易退之節密謀先定出處一致矣是其先後同揆正合乎此昔人目元和賀雨詩為諌書余特目此詩為心迹論也䂬溪五言如四十箇賢人著一箇屠酤不得覔句者若掘得玉匣子有底有蓋但精心必獲其寳然昔人園栁變鳴禽竟不及池塘生春草餘霞散成綺不及澄江静如練春水船如天上坐不若老年花似霧中看坐久硯中窺水淺不若花殘徑裡得泥香停杯嗟别久不及對月喜家貧楓林社日鼓不若茒屋午時雞此數公未始不精心以此知全其寳者未易多得黄常明愈寄孟刑部聯句云美君知道腴逸歩謝天械或問道果有味乎余曰如介甫午雞聲不到禪林栢子烟中静擁衾竹鷄呼我出華胥起覔篝燈擁燎爐各據髙梧同不寐偶然聞雨落階除皆淡中意味非造此景不能形容也黄常明張無盡題武昌陵竹寺云孟宗泣竹笋冬生豈是青青竹有情影響主張非别物人心但莫負幽明語雖淺直然當於理樂天有餘霞散成綺别葉乍辭風等語麗矣不過於嘲風雪弄花鳥而巳故寄唐生詩云非求宫律髙不務文字竒惟歌生民病得願天子知䂬溪顔延之嘗問鮑昭已與靈運優劣昭曰謝五言如初發芙蓉自然可愛君詩鋪錦列繡亦雕繢滿眼鍾嶸詩品乃記湯惠休云謝如芙蓉出水顔如錯采鏤金與本傳不同又稱延之嘗薄恵休制作以為委巷中歌謡耳豈湯休因為延之所薄遂有芙蓉錯鏤之語故史取以文飾之邪坡云辨才詩如風吹水自成文理吾輩與叅寮如巧媍織錦耳取况亦類此淵明所以不可及者蓋無心於非譽巧拙之間也黄常明永叔以昌黎比介甫答云他日若能窺孟子終身何敢望韓公呉季野以方賈誼荅云俯仰繆恩方自慊慚君将比洛陽人皆憤然不平如惡無鹽唐突而宋景文贈文忠詩有才如夢得今為累情似安仁久悼亡即開門當之二公何抑揚之異也同上子美夜宴左氏莊檢書燒燭短燭正不宜觀書檢閱時暫可也退之短檠二尺便且光可謂燈窻人中語猶有未便燈不籠則損目不宜勤且久山谷夜堂朱墨小燈籠可謂善矣而虚堂非夜久所宜子瞻推門入室書縱横蠟紙燈籠晃雲母慣親燈火儒生酸態盡矣同上張籍嘗移書責退之與人商論不能下氣愈亦有云我昔實愚蠢不能降色辭余謂此乃書生常態昔常見太中爐亭議題紛喧閧然其後有二生坐是鳴鼓豈直議禮家為聚訟哉聖俞謝永叔惠酒云貽詩語且横既醉論益堅曽不究世務閑氣争古先誠有之也同上岑參寄杜拾遺云聖朝無闕事自覺諌書稀退之贈崔補闕云早生得塗未要忙時清諌疏尤宜罕皆繆承荀卿有聴従無諌諍之語遂使阿諛姦佞用以藉口以是知凡造意立言不可不豫為天下来世慮䂬溪西清詩話人之好惡固自不同子美在蜀作悶詩乃云捲簾唯白水隠几亦青山若使余居此應従王逸少語吾當祇以樂死豈復更有悶邪同上王君玉云子美之詩詞有近質如麻鞋見天子垢膩脚不襪之句所謂轉石於千仞之山勢也學者尤之過甚豈逺大者難窺乎同上詩話總龜後集巻十欽定四庫全書詩話總龜後集巻十一宋阮閲撰評論門翰苑作春帖子徃徃秀麗可喜如蘇子容云璇霄一夕斗杓東㶑灔晨曦照九重和氣薫風摩盖壤競消金甲事春農鄧温伯云晨曦㶑灔上簾櫳金屋熈熈歌吹中桃臉似知官宴早百花頭上放輕紅蔣頴叔云昧旦求衣向曉雞蓬萊仗下日將西花添漏鼔三聲逺栁映春旗一色齊梁君貺詩云東方和氣斗回杓龍角中星轉紫霄聖主問安天未曉求衣親䕶玊宸朝皆佳作也余觀定詣夫新春詞四首其一云春色應隨歩輦還珠旒玉几照龍顔紫雲殿下朝元罷便領東風到世間其二云春風細拂綠波長初過層城渡建章草色未迎雕輦翠栁梢先學赭衣黄其三云晴暉散入鳳凰樓一桁珠簾不上鈎漢殿闘簮雙彩燕併和春色上釵頭其四云小池春破玉玲瓏聲觸簾鈎漸好風閒繞䦨干掐花樹春痕已着半梢紅觀此四詩與帖子格調何異豈久於翰苑而筆端自然習熟耶丹陽集張籍韓愈髙弟也愈嘗作此日足可惜贈之八百餘言又作喜侯喜至之篇贈之二百餘言又有贈張籍一篇二百言皆不稱其能詩獨有調張籍一篇大尊李杜而末章有顧語地上友經營無太忙之句病中贈張籍一篇有半塗喜開鑿派别失大江吾欲盈其氣不令見麾幢之句醉贈張徽有張籍學古淡軒昻避雞羣之句則籍有意於慕大而實無可取者也及取其集而讀之如送越客詩云春雲剡溪口殘月鏡湖西逢故人詩云海上見花發瘴中聞鳥飛送海客詩云入國自獻寳逢人多贈珠紫掖發章句青闈更詠歌如此之類皆駢句也至語言拙惡如寺貧無施利僧老足慈悲收拾新琴譜封題舊藥方多申請假牒秖送賀官書此尤可笑至於樂府則稍超詣姚秘監嘗稱之曰妙絶江南曲凄凉怨女詩白太傅嘗稱之曰尤攻樂府詞舉代少其倫由是論之則人士所稱者非以詩也應制詩非他詩比自是一家句法大抵不出於典實富艷爾夏英公和上元觀燈詩云魚龍曼衍六街呈金鎻通宵啟玉扄冉冉逰塵生輦道遲遲春箭入歌聲寳坊月皎龍燈淡紫舘風㣲鶴焰平宴罷南端天欲曉回瞻河漢尚盈盈王岐公詩云雪消華月滿仙臺萬燭當樓寳扇開雙鳳雲中扶輦下六鰲海上駕山來鎬京春酒沾周宴汾水秋風陋漢才一曲昇平人盡樂君王又進紫霞杯二公雖不同時而二詩如岀一人之手盖格調當如是也丁晉公賞花釣魚詩云鶯驚鳳輦穿花去魚畏龍顔上釣遲胡文恭云春煖仙蓂初靃靡日斜芝盖尚徘徊鄭毅夫云水光翠繞九重殿花氣濃薫萬夀杯皆典實富艷有餘若作清癯平淡之語終不近爾顔延之謝靈運各被㫖擬北上篇延之受詔即成靈運久而方就梁元帝云詩多而能者沈約少而能者謝眺雖有能速多寡之不同不害其俱工也咸平景徳中錢惟演劉筠首變詩格而楊文公與之鼎立綽􅃅江東三虎詩格與錢劉亦絶相類謂之西崑體大率效李義山之為豐富藻麗不作枯瘠語故楊文公在至道中得義山詩百餘篇至於愛慕而不能釋手公嘗論義山詩以謂包藴宻緻演繹平暢味無窮而炙愈出鑚彌堅而酌不竭使學者少窺其一斑若滌腸而浣骨是知文公之詩盖得於義山者為多矣又嘗以錢惟演詩二十七聨如雪意未成雲着地秋聲不斷鴈連天之類劉筠詩四十八聨如溪牋未破氷生硯爐酒新燒雪滿天之類皆表而岀之詩之有思卒然遇之而莫遏有物敗之則失之矣故昔人言覃思垂思抒思之類皆欲其思之來而所謂亂思蕩思者言敗之者易也鄭綮詩思在㶚橋風雪中驢子上唐求詩所㳺歴不出二百里則所謂思者豈尋常咫尺之間所能發哉前輩論詩思多生於杳㝠寂寞之境而志意所如徃徃游於埃􅅽之外茍能如是於詩亦庶㡬矣小說載謝無逸問潘大臨云近日曽作詩否潘云秋來日日是詩思昨日投筆得滿城風雨近重陽之句忽催租人至令人意敗輙以此一句奉寄亦可見思難而敗易也米元章賦詩絶倫而人罕稱之者以書名掩之也如不及陪東坡徃金山作水陸詩云久隂障奪佳山川長瀾四隘魚龍淵衆㸔李郭渡浮玉晴風掃出清明天頗聞妙力開大施足病不列諸方仙想應蒼壁有垂露照水百怪愁寒烟栖雲閣云雲出救世旱澤浹雲尋歸入石了不見豐功已如遺龍騫薦復起抱石明幽姿雲乎無定所隠者何當栖如此二詩殆出翰墨畦逕之表盖自邁徃凌雲之氣流出非尋䂓索矩者之可到也韓退之調張籍詩曰刺手㧞鯨牙舉瓢酌天漿魏道輔謂髙至酌天漿幽至於㧞鯨牙其用思深逺如此彼獨未讀送無本詩爾其曰吾嘗示之難勇徃無不敢蛟龍弄牙角造次欲手攬衆鬼囚大幽下覷襲元窞言手攬蛟龍之角下覷衆鬼之窞皆難事而無本勇徃無不敢盖作文以氣為主也則調張籍之句無乃亦是意乎余襄公靖嘗在契丹作胡語詩云夜筵没邏臣拜洗両朝厥荷情幹勒微臣雅魯祝君統聖夀鐡擺俱可忒没邏言後盛拜洗言受賜厥荷言通好幹勒言厚重鐡擺言嵩髙也沈存中筆談載刁約使契丹戯為詩云押燕移離畢㸔房賀䟦支踐行三匹裂宻賜十貔狸移離畢如中國執政官賀䟦攴執衣防閣人匹裂小朩罌貔狸其形如鼠而大狄人以為珍饌二詩可作對故表而出之孟郊詩云食薺腸亦苦强歌聲無歡出門即有碍誰謂天地寬許渾詩云萬里碧波魚戀釣九重青漢鶴愁籠皆是窮蹙之語白樂天詩云無事日月長不覊天地闊與二子殆霄壤矣作詩貴雕琢又畏有斧鑿痕貴破的又畏粘皮骨此所以為難李商隠栁詩云動春何限葉撼曉㡬多枝恨其有斧鑿痕也石曼卿梅詩云認桃無綠葉辯杏有青枝恨其粘皮骨也能脫此二病始可以言詩矣劉夢得稱白樂天詩云郢人斤斵無痕迹仙人衣裳棄刀尺世人方内欲相從行盡四維無處覔若能如是雖終日斵而鼻不傷終日射而鵠必中終日行於䂓矩之中而其迹未嘗滯也山谷嘗與楊明叔論詩謂以俗為雅以故為新百戰百勝如孫呉之兵棘端可以破鏃如甘蠅飛衛之射揑聚放開在我掌握與劉所論殆一轍矣余讀許渾詩獨愛道直去官早家貧為客多之句非親嘗省不知其味也贈蕭兵曹詩云客道恥揺尾皇恩寬犯顔直道去官早之實也將離郊園詩云久貧辭國逺多病在家希家貧為客多之實也蘇養直清江曲見賞於東坡以為與李太白無異所謂屬玉雙飛水滿塘菰蒲深處浴鴛鴦是也既為前輩所賞名已不没而又作後清江曲一篇豈養直尚惡其少作耶所謂呼兒極浦下笭箵社瓮欲熟浮蛆香輕蓑淅瀝鳴秋雨日暮乗流自相語如此等句前曲似未到也自古文人雖在艱危困踣之中亦不忘於製述盖性之所嗜雖鼎鑊在前不䘏也况下於此者乎李後主在圍城中可謂危矣猶作長短句所謂櫻桃落盡春歸去蝶翻金粉雙飛子䂓啼月小樓西文未就而城破蔡約之嘗親見其遺稿東坡在獄中作詩贈子由云是處青山可藏骨他年夜雨獨傷神猶有所托而作李白在獄中作詩上崔相云賢相爕元氣再欣海縣康應念覆盆下雪泣拜美光猶有所訴而作是皆出於不得已者劉長卿在獄中非有所托訴也而作詩云斗間誰與㸔寃氣盆下無由見太陽一詩云壯志已憐成白髪餘生猶待發青春一詩云冶長空得罪夷甫不言錢又有獄中見畫佛詩豈性之所嗜則縲絏之苦不能易雕章繢句之樂歟杜牧赤壁詩云折㦸沉沙鐡未消自將磨洗認前朝東風不與周郎便銅雀春深鎻二喬李義山集中亦載此詩竟莫定何人所作也俱同上詩話總龜後集巻十一欽定四庫全書詩話總龜後集巻十二宋阮閱撰評論門或問鄭綮相國近有詩否答云詩思在㶚橋風雪中驢子上此處那得之北夢𤨏言載綮雖有詩名本無廊廟之望及登庸中外驚駭太原兵至渭北天子震恐渇於攘却綮請於文宣王謚􅃅中加一哲字其不究時病率此類愚謂此人止可置之風雪中令作詩也䂬溪王夷甫蔡景節並號口不言錢二子皆因弊矯之者衍以其妻貪滛黷貨至藉俠士李陽以懼之樽在臨海其婢納女巫之賂為百姓撾登聞鼓其絶口盖有由然如子美張籍皆兒散寫乞錢書太白頻將三十萬盡付酒家錢岑參閒君耐相訪正有牀頭錢小杜清貧長欠一杯錢東坡滿江風月不論錢山谷青山好去坐無錢曽不害諸公之髙也孟郊詩最淡且古坡謂有如食蟛􅒹竟日嚼空螯退之論數子乃以張籍學古淡東野為天葩吐竒芬豈勉所長而諱所短耶抑亦東野古淡自足而不待學歟並同上武元衡詩不多集中有酬嚴司空荆南見寄詩兩篇一云金貂再領三公府玉帳連封萬戸侯一云漢家征鎮委條侯虎節龍旌居上頭皆續以簾捲青山巫峽雨烟開碧樹渚宫秋第三聨一云劉琨坐嘯風清塞謝眺題詩月滿樓一云玊笳曽掩故人淚麗句初傳明月樓皆續以白雪調髙歌不得美人相顧翠娥愁人訝其大同余謂乃元衡刪潤之本集中兩存之爾當以前篇為正後篇誠未工也丹陽集李太白杜子美詩皆掣鯨手也余觀太白古風子美偶題之篇然後知二子之源流逺矣李云大雅久不作吾衰竟誰陳王風委蔓草戰國多荆榛則知李之所得在雅杜云文章千古事得失寸心知騷人嗟不見漢道盛於斯則知杜之所得在騷然李不取建安七子而杜獨取垂拱四傑何耶南皮之韻固不足取而王楊盧駱亦詩人之小巧者爾至有不廢江河萬古流之句褒之豈不太甚乎同上少游贈坡詩云節毛零落毡餐雪辨舌縱横印佩金語太不等子瞻譏集句云天邉鴻鵠不易得便令作對隨家雞此詩正類此黄常明東坡文章妙一世然在掖垣作吕吉甫謫詞繼而吕復用遂納告毀抹在翰苑作上清儲祥碑繼而蔡元長復作遂遭磨毀非特此也蘇叔黨云昔公為藏經記云傳於世或以為非在恵州作梅花詩至有以為笑此皆士大夫以文鳴者其說能使人必信乃謬妄如此信知識古戰場文者鮮矣子由嘗䟦東坡遺稿云展卷得遺草流涕濕冠纓斯文久衰弊流涇自為清科斗藏壁間見者空歎驚廢興自有時詩書付西京陽秋嘗恨王子猷作此君語輕以難名者告人遂使庸夫俗子妄意其間酤坊茗肆適以汚累之謪仙云但得酒中趣勿為醒者傳此理信然和靖招靈魄云百千幽勝無人見說向吾師是洩機東坡云此味只憂兒輩覺逢人休道北牕凉人生此樂須天賦莫遣兒曹取次知使子猷知此必鉗其喙也䂬溪老杜畏人有云門徑從榛草無心待馬蹄又直須上畨㸔成竹客至從嗔不出迎將遺物離人矣答嚴八乃云只須伐竹開荒徑拄杖穿花聽馬蹄又有草萊無徑欲教鋤亦如厭就成都卜而云憑將百錢卜漂泊問君平自智者觀之則為游戯篇章得失自在俗士拘泥則全不相應也東坡答林塘云古今正自同嵗月何必書游香積山又云尋幽恐不繼書版記嵗月蕭思話先於曲阿起宅有閒曠之致子恵基嘗謂所親曰婚嫁畢當歸老舊廬故元次山招陶别駕云無惑别婚嫁竟為俗務牽退之云如今便可爾何用畢婚嫁杜茅屋為風所破歌云自經喪亂少睡眠長夜沾濕何由徹安得廣厦千萬間大庇天下寒士俱歡顔風雨不動安如山於乎何時眼前突兀見此屋吾廬獨破受凍死亦足白樂天新製布裘云安得萬里裘盖褁周四垠穏煖皆如我天下無寒人新製綾袴成百姓多寒無可救一身獨煖亦何情心中為念農桑苦耳裏如聞飢凍聲争得大裘長萬丈與君都盖洛陽城皆伊尹自任一夫不獲之辜也或謂子美詩意寧苦身以利人樂天詩意推身利以利人二者較之少陵為難然老杜飢寒而憫人飢寒者也白氏飽煖而憫人飢寒者也憂勞者易生於善慮安樂者易失於不思樂天疑優或人又謂白氏之官稍達而少陵尤卑子美之語在前而長慶在後達者宜急卑者可緩也前者唱導後者和之耳同合而論則老杜之心盖賢矣老杜當干戈騷屑之時間闗秦隴拾薪採㭒餔糒不給困躓極矣自入蜀依嚴武始有草堂之居觀其經營徃來之勞備載於詩皆可考也其曰萬里橋西宅百花潭北莊言其地也經營上元始斷手寳應年者言其時也雪裏江船渡風前竹逕斜寒魚依宻藻宿鷺起圓沙者言其景物也至於草堂塹西無樹林非子誰復見幽深則乞樹朩於何少府之詩也草堂少花今欲栽不問綠李與黄梅則乞果栽於徐少卿之詩也王侍御携酒草堂則喜而為詩曰故人能領客携酒重相㸔王録事送草堂貲不到則戯而為詩曰為嗔王録事不寄草堂貲盖其流離貧窶之餘不能以自給皆因人而成也其經營之勤如此然未及黔突避成都之亂入梓客閬其心則未嘗一日不在草堂也遣弟檢校草堂則曰鵞鴨宜長數柴荆莫浪開寄題草堂則曰尚念四松小蔓草易拘纒送韋郎歸成都則曰為問南溪竹抽稍合過牆塗中寄嚴武則曰常苦沙崩損藥欄也從江檻落風湍每致意如此及成都亂定再依嚴武為節度叅謀復歸草堂則曰不忍竟捨此復來薙榛蕪入門四松在歩堞萬竹踈則其喜可知矣未㡬嚴武卒彷徨無依復捨之而去以史及公詩考之草堂斷手於寳應之初而永泰元年四月嚴武卒是年秋公寓䕫州雲安縣有此草堂者終始秖得四載而其間居梓閬三年公詩所謂三年奔走空皮骨是也則安居草堂者僅閲嵗而已其起居寢興之適不足以償其經營徃來之勞可謂一世之覊人也然自唐至今已數百載而草堂之名與其山川草朩禽獸公詩以爲不朽之傳盖公之不幸而其山川草朩之幸也葛常之僧祖可俗蘇氏伯固之子養直之弟也作詩多佳句如懐蘭江云懐人更作夢千里歸思欲迷雲一灘贈端師云牕間一榻篆烟碧門外四山秋蕋紅等句皆清新可喜然讀書不多故變態少觀其體格亦不過烟雲草樹山川鷗鳥而已而徐師川作其詩引乃謂自建安七子南朝二謝唐杜甫韋應物栁宗元本朝王荆公蘇黄妙處皆心得神解無乃過乎師川作畫虎行末章云憶昔予頑少小時先生教誦荆公詩即今老舊無新句尚有廬山病可師愛其詩如是也丹陽集元和十一年六月武元衡將朝夜漏未盡三刻騎出居第遇盗死於墻下許孟容謂國相横尸而盗不得為當朝恥遂下詔募捕竟得賊始得張宴者王承宗所遣訾珎者李師道所遣也初元衡䇿李錡之必反已而錡果反就誅由是諸鎮桀驁者皆不自安以致於是劉夢得有代静安佳人怨詩云寳馬鳴珂踏曉塵魚文匕首犯車茵適來行哭里門外昨夜畫堂歌舞人又云秉燭朝天遂不回路人彈指望髙臺墻東便是傷心地夜夜秋螢飛去來余考夢得為司馬時朝廷欲澡濯補郡而元衡執政乃格不行夢得作詩傷之而寄於静安佳人其傷之也乃所以快之歟韻語陽秋黄庶字亞夫嘗有怪石一絶傳於世云山鬼水怪着薜荔天祿辟邪眠莓苔鉤簾坐對心語口曽見漢家池舘來人士膾炙以為竒作唐張碧詩亦不多見嘗有池上怪石詩云寒姿數片竒突兀曽作秋江秋水骨先生應是壓風雷着向池邉塞龍窟我來池上傾酒尊半酣書破青烟痕参差翠栁擺不落筆頭驚怖黏秋雲我聞呉中項容水墨有髙價邀得將來倚松下鋪却雙繒直道難掉首空歸不成話二詩殆未易甲乙也同上詩話總龜後集巻十二欽定四庫全書詩話總龜後集巻十三宋阮閱撰評論門魯直謂陳後山學詩如學道此豈尋常雕章繪句者之可擬哉客有謂余言後山詩其要在於㸃化杜甫語爾杜云昨夜月同行後山則云勤勤有月與同歸杜云林昏罷幽磬後山則云林昏出幽磬杜云古人日已逺後山則云斯人日已逺杜云中原鼔角悲後山則云風連鼓角悲杜云暗飛螢自照後山則云飛螢元失照杜云更覺追隨盡後山則云林湖更覺追隨盡杜云文章千古事後山則曰文章平日事杜云乾坤一腐儒後山則曰乾坤着腐儒杜云孤城隠霧深後山則曰寒城着霧深杜云寒花只暫香後山則曰寒花只自香如此類甚多豈非㸃化老杜之語而成者余謂不然後山詩格律髙古真所謂碌碌盆盎中見此古罍洗者用語稍同乃是讀少陵詩熟不覺在其筆下又何以足病公丹陽集南史載孝武嘗問顔延之曰謝莊月賦何如答曰莊始知隔千里兮共明月帝召莊以延之語語之莊應聲曰延之作秋胡詩始知生為久離别没為長不歸同上連綿字不可挑轉用詩人閒有挑轉用者非為平仄所牽則為韻所牽也羅昭諌以沉寥為寥沉是為平仄所牽秋風生桂枝詩所謂寥沉工夫大是也又以汎瀾為瀾汎是為韻所牽哭孫員外詩所謂故侯何在涙瀾汎是也韻語陽秋方干詩清潤小巧盖未升曹劉之堂或者取之大過余未曉也王賛嘗稱之曰鋟肌滌骨氷瑩霞絢嘉殽自將不吮餘雋麗不葩芬苦不癯棘當其得志倐與神會孫邰嘗稱之曰其秀也仙蕋於常花其鳴也靈鼉於衆響觀其所作登靈隠峰詩云山叠雲霞際川傾世界東送俞坦之詩云風塵辭帝里舟楫到家林此真兒童語也寄喻鳬云寒蕪隨楚盡落葉渡淮稀如送俞坦之下第又云過楚寒方盡浮淮月正沉贈路明府詩云吟成五字句用破一生心贈喻鳬又云才吟五字句又白㡬莖鬚稱心寺中島云雪折停猿樹花藏浴鶴泉寄越上人又云牕接停猿樹巖飛浴鶴泉于使君詩云月中倚棹吟漁浦花底垂鞭醉鳳城送伍秀才詩又云倚棹寒吟漁浦月垂鞭醉入鳳城春其語言重叠有以見其窘也至於野渡波揺月空城雨翳鐘白猿垂樹牕邉月紅鯉驚鈎竹外溪義行相識處貧過少年時等句誠無愧於孫王所賞杜甫讀蘇渙詩則曰餘髪喜却變白間生黒絲髙適觀陳十六史碑則曰我來觀雅製慷慨變毛髪韻語陽秋李長吉云我生二十不得意一生愁謝如梧蘭年至二十七而卒陳無已除夜詩云七十已强半所餘能㡬何遥知暮景促更覺後生多至四十九而卒語意不祥如此豈神明者先受之耶丹陽老杜賦螢火詩云幸從腐草出敢近太陽飛未足臨書巻時能㸃客衣似譏當時閹人用事於人君之前不能主張文儒而乃如青蠅之㸃素也說者乃謂喻小有才而侵侮大徳豈不悞哉羅隠竊取其意乃曰不思曽腐草便擬倚孤光若道通文翰車公業闕長其視前作愧矣錢起集前八巻後五巻鮑欽止謂昭宗時有中書舍人錢珝亦起之諸孫今起集中恐亦有珝所作者余初未知其所㨿也比見前集中有同程七早入中書一篇云不意雲霄能自致空驚鵷鷺忽相隨臘雪新晴栢子殿春風欲上萬年枝和王員外雪晴早朝詩紫微晴雪帶恩光遶仗偏隨鴛鷺行長信月留寧避曉宜春花滿不飛香二詩皆翃所作無疑盖起未嘗入中書也集中又有登彭祖樓一詩而薛能集亦載則知所編甚駮也陳去非嘗謂余言唐人皆苦思作詩所謂吟安一箇字撚斷數莖鬚句向夜深得心從天外歸吟成五字句用破一生心蟾蜍影裏清吟苦舴艋舟中白髪生之類是也故造語皆工得句皆竒但韻格不髙故不能㕘少陵之逸歩後之學詩者倘能取唐人語而掇入少陵繩墨歩驟中此速肖之術也余嘗以此語似葉少藴少藴云李益詩云開門風動竹疑是故人來沈亞之詩云徘徊花上月虚度可憐宵皆佳句也鄭谷掇取而用之乃云睡深可忍風敲竹飲散那堪月在花真可與李沈作僕厮由是論之作詩者興致先自髙逺則去非之言可用倘不然便與鄭都官無異荆公嘗有詩云功謝蕭䂓慚漢第恩從隗始上燕臺或謂公曰蕭何萬世之功則功字固有來處若恩字則未見有出也荆公答曰韓集鬬雞聫句孟郊云受恩慚始隗則知荆公詩用法之嚴如此然一水䕶田將緑遶兩山排闥送青來之句乃以樊噲排闥事對䕶田豈䕶田亦有所出耶有好事者謂余言一日有人靣稱公詩謂自喜田園安五栁但嫌戸税擾庚桑以為的對公笑曰伊但知栁對桑為的對然庚亦是數盖以十日數之也余謂荆公未必有此意使果如好事者之說則作詩歩驟亦太拘窘矣錢起送屈突司馬詩云星飛龎統驥箭發魯連書人多稱其工余恨龎統驥出處無星字而魯連書有箭字也趙給事晩歸不遇詩忽㸔童子掃花處始愧夕郎題鳳來前句不用事後句用二事皆非律也丹陽詩家有換骨法謂用古人意而㸃化之使加工也李白詩云白髪三千丈縁愁似個長荆公㸃化之則云繰成白髪三千丈劉禹錫云遥望洞庭湖翠水白銀盤裏一青螺山谷㸃化之云可惜不當湖水靣銀山堆裏㸔青山孔稚圭白苧歌云山虚鐘響徹山谷㸃化之云山空響筦絃盧同詩云草石是親情山谷㸃化之云小山為友朋香草當姬妾學詩者不可不知此同上沈存中云退之城南聨句云竹影金𤨏碎金𤨏碎者日光也恨句中無日字爾余謂不然杜子美云老身倦馬河堤永踏盡黄榆緑槐影亦何必用日字作詩正欲如此葛常之自古工詩者未嘗無興也觀物有感焉則有興今之作詩者以興近乎訕也故不敢作而詩之一義廢矣老杜萵苣詩云兩旬不甲拆空惜埋泥滓野莧迷汝來宗生實於此皆興小人盛而掩抑君子也至髙適題處士菜園則云耕地桑柘閒地肥菜常熟為問葵藿資何如廟堂肉則近乎訕矣作詩者茍知興之與訕異始可與言詩矣髙適别鄭處士云興來無不愜才大亦何傷寄孟五詩云秋氣落窮巷離憂兼暮蟬送蕭十八云常苦古人逺今見斯人古題陸少府書齋云散帙至棲鳥明燈留故人皆佳句也上陳左相天地莊生馬江湖范蠡舟亦有含蓄但莊子謂天地一指萬物一馬而以天地為馬則悞矣並同上山谷詩多用稻田衲亦云田衣王摩詰詩云乞飯從香積裁衣學水田又云手中花􅏩净香飯稻畦成豈用是耶丹陽集晉張翰憶呉中蓴菜鱸鱠而歸而髙適屢作越上用如送崔功曹赴越云今朝欲乗興隨爾食鱸魚送李九赴越云鏡水若所憶蓴羹子舊便人以為疑余考地理志漢呉縣𨽻今會稽郡則以鱸作越上亦無傷也韻語陽秋魯直謂東坡作詩未知句法而東坡題魯直詩云每見魯直詩未嘗不絶倒然此巻語妙甚殆非悠悠者可識能絶倒者已是可人又云讀魯直詩如見魯仲連李太白不敢復論鄙事雖若不適用然不為無補如此題識其許之乎其譏之也魯直酷愛陳無已詩而東坡亦不深許魯直為無已揚譽無所不至而無已乃謂人言我語勝黄語何耶同上詩話總龜後集巻十三欽定四庫全書詩話總龜後集巻十四宋阮閱撰評史門安祿山反永王璘有窺江左之意子偒勸其取金陵史稱薛璆李臺鄉等為璘謀主而不及李白白傳止言永王璘辟為府僚璘起兵遂逃還彭澤審爾則白非深於璘者及觀白集有永王東廵歌十一首乃曰初從雲夢開朱邸更取金陵作小山又云我王樓艦輕秦漢却似天皇欲度遼若非賛其逆謀則必無是語矣白既流夜即有書懐詩云半夜水軍來潯陽滿旌旃空名適自悞廹脅上樓船從賜五百金棄之若浮烟辭官不受賞翻謫夜郎天宋中丞薦白啟云遇永王東廵脅行中道乃用白述懐意以􅋞拭其過爾孔巢父亦為永王所辟巢父察其必敗潔身潜遁由是知名使白如巢父之計則安得有夜郎之謫哉老杜送巢父歸江東云巢父掉頭不肯住東將入海隨烟霧其序云兼呈李白恐不能無微意也黄常明唐穆宗時令狐楚為相為景陵使以傭錢獻羡餘怨聲係路致有衡州之敗觀發潭州寄李寧常侍詩云君今侍紫垣我已墮青天委廢從兹日旋歸在㡬年又有答竇鞏中丞詩云何年相贈答却得在中臺亦可見其去國惨傷之情矣孔子曰茍患失之無所不至其楚之謂乎觀甘露之事則可見矣當是時也王涯等被繫神䇿仇士良白涯與李訓謀逆將立鄭注楚時以舊相在闕下文宗召楚至帝對楚悲憤因付涯訊牒曰果涯書耶楚曰涯誠有謀罪應死嗚呼觀望腐夫閹人而誣置人於死地楚忍為之乎甘露野史乃言尚頼舊相令狐楚獨為辯明若以史為證則野史之言未必公也杜牧之作李和鼎詩云鵩鳥飛來庚子直謫去日蝕辛邜年由來枉死賢才士消長相持勢自然盖言鄭注事也方是時和鼎論注不可為相旋致貶謫故牧之作詩痛之如此議者謂辛邜年在憲宗之時而文宗時無辛邜也豈牧之悞乎余謂牧之所云非謂實庚子辛邜也鵩集於舍班固書庚子之日日有蝕之詩人有辛邜之詠借是事以明李甘之寃爾杜牧之集有李給事詩二首其中有紛紛白晝驚千古鐡鎻朱殷㡬一空之句謂鄭注甘露之事也又有可憐劉校尉曽訟石中書之句牧之自注云給事曽忤仇士良人遂以為給事者李石也余嘗考之李石雖嘗為給事然劾鄭注之事史所不載語言忤仇士良然亦在石拜相之後石既拜相則牧之詩題不應以給事為稱其非李石明矣當時唯有李中敏與牧之厚善嘗因旱欲乞斬注以申宋申錫之寃帝不省遂以病告歸潁陽令牧之有元禮去歸緱氏學之句牧之自注云因論鄭注告歸潁陽又史云注誅遷給事其后仇士良以開府䕃其子中敏曰内謁者安得有子士良慚恚由是復棄官去由是論之則是中敏無疑矣唐太和末閹尹恣横天子以擁虚器為恥而元和逆黨未討帝欲夷絶其類李訓謂在位操權者皆碌碌惟鄭注可共事遂同心以謀已而殺陳宏志於青泥驛相繼王守澄楊承和韋元素王踐言皆不保首領又斲崔潭峻之棺而鞭其尸剪除逆黨㡬盡亦可謂壯矣意欲誅宦官後乃圖河湟歸河朔諸鎮天子向之鄭注雖招權納賄然出節度隴右欲因王守澄之葬乗羣宦臨送以鎮兵悉誅之謀亦未必不善會李訓先五日舉事遂成甘露之禍世以成敗論人物故訓注不得為忠至李徳裕謂不可與徒𨽻齒亦太甚矣按唐史李甘與李中敏皆嘗論鄭注不可為相故甘有封州之謫而中敏有潁陽之歸杜牧之贈甘詩云太和八九年訓注極虓虎吾君不省覺二兇日威武喧喧皆傳言明辰相登注和鼎顧予云我死有處所明日詔書下謫斥南荒去又有贈中敏詩云元禮去從緱氏學江充來見犬臺宫曲突徙薪人不會海邉今作釣魚翁盖深痛二公之言不行而訓注得恣其謀也盖當是時仇士良竊國柄勢焰熏灼士大夫於議論之間不敢以訓注為是以賈殺身之禍故牧之之詩如此於乎東漢之季柄在宦官陳蕃之徒以忠勇之資謀殪其黨而事亦不遂史載其名殆如日星而訓注以當時士夫畏懾士良輩遂加以奸兇之目而史亦以為亂人萬世之下無以自白其深可痛息哉家藏甘露野史三巻及乙邜記一巻二書之說特相矛盾甘露野史之言上令訓等誅宦官事覺反為所擒而乙邜記乃謂訓等有逆謀盖甘露之出於朝廷公論而乙邜記附會士良之私情也乙邜記後有朱實䟦尾數百言以乙邜所記為非是其說與野史同余故表而出之葛常之三良以身殉秦繆之葬黄鳥之詩哀之序詩者謂國人刺繆公以人從死則咎在秦繆而不在三良矣王仲宣云結髪事明君受恩良不訾臨殁要之死焉得不相隨陶元亮云厚恩固難忘君命安可違是皆不以三良之死為非也至李徳裕則謂社稷死則死之不可許之死與梁丘據安陵君同譏則是罪三良之死非其所矣然君命之於前而衆驅之於後為三良者雖欲不死得乎唯栁子厚云疾病命固亂魏氏言有章從邪陷厥父吾欲討彼狂使康公能如魏顆不用亂命則豈至陷父於不義如此哉東坡和陶亦云顧命有治亂臣子得從違魏顆真孝愛三良安足希似與栁子之論合而過秦繆墓詩乃云繆公生不誅孟明豈有死之日而忍用其良乃知三子狥公意亦如齊之二子從田横則又言三良之殉非繆公之意也韋蘇州睢陽感懐詩有曰宿將降賊庭儒生獨全義宿將謂許逺儒生謂張廵也盖當時物議以為廵死而逺就虜疑逺畏死而辭服於賊故應物云爾韓愈嘗有言曰逺倘畏死何苦守尺寸之地食其所愛之肉以與賊抗而不降乎斯言得矣廵死後賊將生致逺於偃師逺亦以不屈死則是逺亦終死賊也李義山詩云本為留侯慕赤松漢庭方識紫芝翁蕭何只解追韓信豈得虚當第一功是以蕭何功在張良下也王元之詩云紀信生降為沛公草荒孤壘想英風漢家青史縁何事却道蕭何第一功是以蕭何功在紀信下也余謂炎漢創業何為宗臣髙祖設指縱之喻盡之矣他人豈容議耶盗殺武元衡也白樂天為京兆掾初非言責而請捕盗以必得為期時宰惡其出位坐賦新井篇逐之九江故因聞琵琶乃有天涯流落之感至於淚濕青衫之上何憊如此哉先文康公嘗有詩云平生趣操號安恬退亦恬然進不貪何事潯陽恨遷謫輕將清淚濕青衫又云及泉曽改莊公誓勝母終回曽子車素綆銀牀堪淚墮更能賦詠獨何如左太冲陶淵明皆有荆軻之詠太冲則曰雖無壯士節與世亦殊倫淵明則曰惜哉劍舞踈竒功遂不成是皆以成敗論人者也余謂荆軻功之不成不在荆軻而在秦舞陽不在秦舞陽而在燕太子舞陽之行軻固心疑其人不欲與之共事欲待他客與俱而太子督之不已軻不得已遂去故羽歌悲愴自知功之不成已而果膏刃秦庭當時固已惜之然概之於義雖得秦王之首於燕亦未能保終吉也故楊子云荆軻為丹奉於期之首燕督亢之圖入不測之秦實刺客之靡也焉可謂之義也可謂善論軻者漢文欲輕利而反重義者以謂失本恵而傷吾仁固也或又咎帝短喪為傷於孝予觀遺詔率皆言為已損制未嘗使士庶皆短喪也厥後丞相翟方進與薛宣服母喪皆三十六日而除而顔師古注云漢制自文帝遺詔國家遵以為常則咎不在文帝矣而王荆公詩云輕刑死人衆短喪生者偷仁孝自此薄哀哉不能謀輕刑死人衆則固然矣短喪生者偷則似誣文帝也俱同上詩話總龜後集巻十四欽定四庫全書詩話總龜後集巻十五宋阮閲撰評史門老杜北征詩云憶昨狼狽初事與古先别不聞夏商衰中自誅褒妲其意謂明皇英斷自誅妃子與夏商之誅褒妲不同老杜此語出於愛君曲文其過非至公之論也白樂天詩云六軍不發無奈何宛轉蛾眉馬前死非逼廹而何哉然明皇能割一已之愛使六軍之情帖然亦可謂知所輕重矣故前輩有詩云畢竟聖明天子事景陽赴井是何人丹陽集晉盧諶先為劉琨從事中郎將叚匹磾領幽州求諶為别駕故琨答諶詩云情滿伊何蘭桂移植茂彼春林瘁此秋棘言諶棄已而就匹磾也厥後琨命箕淡攻石勒一軍皆没由是窮蹙不能自守乃率衆赴匹磾繼為匹磾所拘知其必死矣豈無望於諶哉觀再贈諶云朱實隕勁風繁英落素秋何意百煉鋼化為繞指柔其詩托意欲以激諶而救其急而諶殊不領也琨既被害諶始上表以雪其寃終亦何所補耶漢元帝時𢎞恭石顯用事京房劉向皆深嫉之嘗上書力詆盖薫蕕氷炭不能以共處理之必然也然房欲淮陽王為已助代王作求朝奏章向令外親上䟽謂小人在朝以致地動雖嫉惡之心切然於忠實亦少貶矣使二子果輸忠於漢當明目張膽論至再三可也何暇為身謀而假之於他人哉故荆公詩云京房劉向各稱忠詔獄當年迹自窮畢竟論心異恭顯不妨迷國畧相同後之論人物者倘取其心而畧其迹則善矣韻語陽秋張祜觀狄梁公傳云失運廬陵厄乗時武后尊五丁扶造化一柱正乾坤而山谷有鯨波横流砥柱虎口活國宗臣之句可謂善論仁傑者余謂仁傑不畏武后羅織之獄三族之夷强犯逆鱗敢以廬陵王為請者非特天資忠義亦以先得武后之心故也且張易之昌宗后之嬖臣也欲歸廬陵事大體重非二嬖之言后孰信之吉頊能以危言撼二嬖陳易弔為賀之計故二嬖敢從容以請而后意遂定於是仁傑之諌得行卒之遣徐彦伯迎廬陵王於房州者由仁傑之言也故史援吕温之言稱之曰取日虞淵洗光咸池潜授五龍夾之以飛於乎仁傑其忠且賢哉按仁傑傳始后欲立武三思而李昭徳傳乃云洛陽人王慶之請以武承嗣為皇太子昭徳力争今考三思本傳不載為皇太子之說而承嗣傳云洛州人請立承嗣為皇太子岑長倩格輔元皆争不從而不及昭徳豈有牴牾耶裴度在朝憲宗委任不疑使破三賊已而呉元濟授首王承宗割二州遣子入侍李師道被擒兩河諸侯忠者懐强者畏克融廷凑皆不敢桀勲烈之盛一時無與比肩者惟李義山指為聖相詩曰帝得聖相相曰度又曰嗚呼聖皇及聖相亦過矣哉荀卿曰得聖臣者帝若舜禹伊尹周公皆聖臣也謂四人為聖臣則可謂裴度為聖相其可哉唐明皇以英銳身致極治以荒滛身致極亂自古人君成敗之速未有如明皇者鄭毅夫詩云四海不揺草九重藏禍根十年傲堯舜一笑破乾坤盖是詩也開元之盛能致兵寢刑措之治者實姚宋輔政之功明皇可以無疑矣不三四年遽使去位及李林甫用事則盤旋紏固至十八九年敗國蠧賢無所不至猶以為未足也晚年顧力士曰海内無事朕將吐納導引以天下事付林甫天下安得而不亂乎並同上史載宋之問冉祖雍並賜死於桂州之間得詔震汗不引決祖雍請於使者曰之問有妻子幸使之訣使者許之而之問荒悸不能處家事及考之文集有登大庾嶺詩云兄弟逺謪居妻子咸異域則之問赴貶時未嘗以妻子行也又有發藤州及昭州二詩二州皆在桂州之南則賜死之地非桂州明矣豈史之誤歟丹陽集漢髙祖置酒沛宫酒酣擊筑自歌曰大風起兮雲飛揚威加海内兮歸故鄊安得猛士兮守四方時帝有天下已十二年當思耆艾賢徳與共維持獨専意猛士何哉豈馬上三尺嫚罵未易遽革邪治道終以覇雜盖有由然其前年下詔曰賢士大夫吾能尊顯之是年下詔曰與天下之賢豪士大夫同安緝之余謂播告之辭乃秉筆代言非若耳熱之歌乃中心所欲也許汜不為陳元龍所禮嘗與劉備稱之備曰君有國士名望無救世意而求田問舍言無可采何縁當與君語如小人欲卧百尺樓卧君於地何但上下牀之間耶然介甫屢用之求田問舍轉無成更覺求田問舍遲讀蜀志曰無人語與劉元徳問舍求田意最髙又有逰西霞庵云求田此山下終欲忤陳登豈非力欲轉此一重案歟老杜北征詩云經年至茅屋妻子衣百結慟哭松聲回悲泉共幽咽平生所嬌兒顔色白於雪見爺背靣啼垢膩脚不襪方是時杜方脫身於萬死一生之地得見妻兒其情如是洎至秦中則有晒藥能無婦應門亦有兒之句至成都則有老妻憂坐痺幼女問頭風之句觀其情悰已非北征時比也及觀進艇詩則曰晝引老妻乗小艇晴㸔稚子浴清江江村詩則曰老妻畫紙為棋局稚子敲針作釣鈎其優游愉悅之情見於嬉戯之間則又異於在秦中時矣葛常之白樂天作八漸偈云苦既非真悲亦是假則世間悲歡人我必能忘情始憲宗欲以樂天為刺史王涯以資淺為言遂得江州司馬及涯敗作詩快之有當君白首同歸日是我青山獨徃時之句李徳裕於樂天不見有隙徳裕貶崖州亦作三絶快之其一篇云樂天嘗任蘇州日要勒湏教用禮儀從此結成千萬恨今朝果中白家詩盖嘗以唐史考之樂天卒於會昌之初武宗時也而徳裕之貶乃在宣宗大中年則徳裕之貶樂天死已久非樂天之詩明矣以是凖之快王涯之句恐亦未必然也韻語陽秋西伯將出獵卜之曰所獲非龍非彲非虎非羆所獲覇王之輔於是東遇太公於渭水之陽載與俱歸此司馬遷之說也文王至磻谿見吕尚釣鈎得玉璜刻曰姬受命吕佐撿徳合於今昌來提此尚書太傅之說也太公釣於兹泉文王得而王此吕不韋之說也吕望年七十釣於渭渚初下得魴次得鯉刳腹得書書文曰吕望封於齊此劉向之說也太公避紂居東海之濵聞文王作興曰盍歸乎來由文王至於孔子五百有餘嵗若太公望則見而知之此孟子之說也是數說者皆言天産英輔以興周盖非碌碌佐命者之可擬而司馬遷乃摭或者之論謂西伯拘羑里散宜生閎夭招吕尚求美女竒物獻於紂而贖西伯西伯既脱三人有隂謀脩徳以傾商政此豈所以待太公也哉歐陽詹云論兵去商虐講徳興周道屠沽未遇時何異斯川老余比赴官宜春於夀昌道中見壁間題一詩云漁翁何事亦從戎變化神竒握掌中莫道直鈎無所取渭川一釣得三公一以為傾商政一以為釣三公皆非知聖賢者韻語陽秋李太白至邯鄲登城樓詩云提携袴中兒杵臼及程嬰空孤獻白刃必死耀丹誠是有取於二子甚重袴中兒謂趙武也然司馬遷作趙晉二世家自相矛盾左氏所書又復不同將何以取信於后世耶晉世家之說曰景公十七年誅趙同趙括令庶子武為後趙世家之說曰景公三年屠岸賈攻趙朔殺趙括等朔同友人程嬰匿趙武於山中至十五年景公有議立趙武左氏之說曰魯成公八年六月晉討趙同趙括武從姬畜於公宫以其田與祁奚韓厥言於晉侯曰成季之勲宣孟之忠無後為善者懼矣乃立武而反其田按成公八年即晉景公十七年也或云匿武於山中或云畜武於宫中或云十五年而後立武或云未踰月而立武皆未知所據也楊雄之迹曲諂新室議之者衆矣此置而不論雄之心如何哉觀法言之書似未明乎大道之㫖也王荆公乃深許之何耶詩云寥寥鄒魯後於子獨先覺又云懦者陵夷此道窮千秋止有一楊雄又云道真沉溺九流渾獨泝頽波討得源又云子雲生平人莫知知者乃獨稱其辭今尊子雲者皆是得子雲心亦無㡬是亦聖人許雄也東坡謂雄以艱深之辭淺易之說與公矛盾矣同上詩話總龜後集巻十五欽定四庫全書詩話總龜後集巻十六宋阮閱撰評史門孔子謂寗武子邦有道則知邦無道則愚其知可及也其愚不可及也所謂及者繼也非企及之及謂寗武之愚而後人不可繼爾居亂世而愚則天下塗炭將孰拯屈原事楚懐王不得志則悲吟澤畔卒從彭咸之居究其初心安知拯世之意不得伸而至於是乎賈生謫長沙傅渡湘水為賦以弔之所遭之時雖與原不同盖亦原之志也白樂天詠史詩乃謂士生一代間誰不有浮沉良時真可惜亂世何足欽乃知汨羅恨未抵長沙深信如樂天言則是以亂世為不拯也而可乎議者謂誼所欲為文帝不能用者乃有鉛刀為銛幹棄周鼎寳康瓠語觀此是有憾於絳灌東陽者雖然勃也嬰也敬也皆素有長者之譽必不肯害賢而利已楚漢春秋别有絳灌豈其是耶葛常之永和中王羲之脩褉事於會稽山隂之蘭亭羣賢畢至少長咸集序以謂雖無絲竹管絃之盛一觴一詠亦足以暢叙幽情則當時篇詠之傳可考也今觀羲之謝安謝萬孫綽孫統王彬之凝之肅之徽之徐豐之袁嶠之十有一人四言五言詩各一首王豐之元之藴之渙之郄曇華茂庾友虞說魏滂謝繹庾藴孫嗣曹茂之華平桓偉十有五人或四言或五言各一首王獻之謝瑰卞迪卓髦羊模孔熾劉宻虞谷勞夷后綿華耆謝藤王儗吕系吕夲曹禮十有六人詩各不成罰酒三觥謝安五言詩曰萬殊渾一象安復覺彭殤而羲之序乃以為一死生為虚誕齊彭殤為妄作盖反謝安一時之語而或者遂以為未達此特未見當時羲之之詩爾其五言曰仰視碧天際俯瞰緑水濵寥閴無涯觀寓目理自陳大矣造化功萬殊莫不均羣籟雖参差適我無非親此詩則豈未達者耶史載獻之嘗與兄徽之操之俱詣謝安二兄多言獻之寒温而已既出客問優劣安曰小者佳吉人之詞寡以其少言故知之今王氏父子昆季畢集而獻之之詩獨不成豈亦吉人之詞寡耶景祐中有㑹稽太守蔣堂修永和故事嘗有詩云一𣲖西園曲水聲水邉終日會冠纓㡬多詩筆無停綴不似當年有罰觥盖謂獻之等發也葛常之會稽臨安金陵三郡皆有東山俱傳以為謝安携妓之所按謝安本傳初安石寓居會稽與王羲之許珣支遁逰處被召不至遂棲遲東土唐裴冕與吕謂等鑑湖聨句有興衰還尋戴東山更問東此會稽之東山也本傳又云安石嘗徃臨安山中坐石室臨濬谷悠然歎曰此與伯夷何逺今餘杭縣有東山東坡有游餘杭東西岩詩注云即謝安東山所謂獨携縹緲人來上東西山者是也此臨安之東山也本傳又謂及登台輔於土山營墅樓舘林竹甚盛毎携中外子姪游集今土山在建康上元縣崇禮鄉載建康事迹云安石於此擬會稽之東山亦號東山此金陵之東山也李白有憶東山二絶不到東山久薔薇㡬度花白雲他自散明月落誰家我今携謝妓長笑絶人羣欲報東山客開闗掃白雲不知所賦者何處之東山也陳軒乃録此詩於金陵集中將别有所據耶南史載宋劉勔經始鍾嶺以為棲息亦號東山金陵遂有兩東山矣同上韓愈自監察御史貶連州山陽令所坐之因傳記各異唐書本傳謂上䟽論宫市徳宗怒故貶李翺行狀謂為幸臣所惡故貶皇甫湜作神道碑謂正元十九年關中旱飢公請寬民徭専政者惡之故貶按文公集宫市之䟽不傳而文公歴官記及年譜以謂京師旱民飢詔蠲租半有司徴求反急愈與同列上䟽言狀為幸臣所讒幸臣者李實也予考退之自連山移江陵詩云孤臣昔放逐泣血追愆尤汗漫不省識恍如乗桴浮或自疑上䟽上䟽豈其由則所坐之因雖退之猶疑之也集中有上京兆李實書盛稱其能曰愈來京師所見公卿大臣未有赤心事上憂國如閣下者又云今年以來不雨者百餘日種不入土而盗賊不敢起榖價不敢貴老姦宿瞞銷縮摧沮亹亹百餘言皆叙其敬慕之意其後實出為華州又有書云愈於久故游從之中蒙恩奬知遇最厚無與比者愈為實所讒不應此書拳拳如是及觀江陵塗中詩云同官盡才俊偏善栁與劉或慮語言洩傳之落寃仇又岳陽别竇司直云愛才不擇行觸事得讒謗前年出官日此禍最無妄又和張十一憶昨行云伾文未揃崖州熾雖得赦宥常愁猜近者三奸悉破碎羽窟無底幽黄能眼中了了見鄊國知有歸日眉方開又有永正行以快伾文之貶其末云郎官清要為世稱荒郡僻野嗟可矜具書目見非妄徴嗟爾既徃宜為懲則知陽山之貶伾文之力而劉李下石為多非為李實所讒也葛常之韓偓香奩集百篇皆艶詞也沈存中筆談云乃和凝所作凝後貴悔其少作故嫁名於韓偓爾今香奩集有無題詩序云余辛酉年戯作無題詩十四韻故奉常王公内翰呉融舍人令狐渙相次屬和是嵗十月一旦兵起隨駕西狩文藁咸棄丙寅嵗在福建有蘇暐以藁見授得無題詩因追味舊時闕忘甚多予按唐書韓偓傳偓嘗與崔嗣定䇿誅劉季述昭宗反正為功臣與令狐渙同為中書舍人其後韓全誨等劫帝西幸偓夜追及鄠見帝慟哭至鳳翔遷兵部侍郎天祐二年挈其族依王審知而卒以紀運圖考之辛酉乃昭宗天復元年丙寅乃哀帝天祐二年其序所謂丙寅嵗在福建有蘇暐授其藁則正依王審知之時也稽之於傳與序無有不合者則此集韓偓所作無疑而筆談以為和凝嫁名於偓特未考其詳爾筆談云偓又有詩百篇在其四世孫奕處見之豈非所謂舊詩之闕忘者乎同上漢史載韓信教陳狶反有挈手歩庭之議且曰吾為公從中起漢十年狶果反髙祖自將兵出張文潜曰方是時蕭相國居中而信欲以烏合不教之兵從中起以圖帝業雖使甚愚必知無成信安肯出此哉故其詩曰欲助陳侯乃中起不思蕭相在咸陽又一詩云平生蕭相真知已何事還同女子謀則又責蕭相不為信辨其枉也余觀班史吕后與蕭相謀詐令人從帝所來稱狶已破羣臣皆賀相國紿信曰雖病强入賀信入吕后使武士縳信斬之則斬信者相國計也縱使其枉相國其肯為辨之哉信死則劉氏安不死則劉氏危相國豈肯以平日相善之故而悞社稷大計乎文潜後有一絶云登壇一日冠羣雄鍾室倉皇念蒯通能用能誅誰計䇿嗟君終日媿蕭公丹陽集漢成帝時張禹用事朱雲對上曰臣願賜尚方斬馬劍斷佞臣一人以厲其餘上問誰也對曰安昌侯張禹上大怒曰居下訕上罪死不赦御史將雲下雲扳殿檻折曰臣願從龍逢比干游於地下如雲者可謂忠直有餘矣後世思其人而不可得則作為韻語以聲其美肅宗時元載用事故杜子美詩云千載少似朱雲人至今折檻空嶙峋武后時傅游藝用事故盧照鄰詩云昔有平陵男姓朱名阿游願得斬馬劍先斷佞臣頭言當時立朝之士不能如雲以二人之惡而告於上也若二人者奸諛百倍張禹矣腥臊之血豈足以汚尚方之劍乎宋景文云朱游英氣凛生風瀕死危言悟帝聰殿檻不脩旌直諌安昌依舊漢三公信乎去佞如㧞山也五王之誅二張也張柬之啟其謀桓彦範任其事敬暉崔元暐袁恕已各效其力坐使天后還政中宗即祚誠為社稷之竒勲然尚有可恨者焉薛季昶勸除武三思彦範輩豈不知中宗非剛斷之主乎彼之意以為三思方烝亂韋氏而中宗孱懦一聽其所為茍誅三思必不利於已故不肯誅耳不旋踵而自罹殺身之禍實自取之也張文潜云繫狗不繫首反噬理必然智勇忽迷方脫匣授龍泉區區薛李昶先事僅能言留禍啟臨淄敗謀豈非天髙祖大風之歌志氣慷慨規模宏逺凛凛乎已有四百年基業之氣史記樂書謂之三侯章令沛得以四時歌舞宗廟盖欲使後之子孫知其祖創業之勤不可怠於守成爾武帝秋風詞瓠子歌已無足道及為賦以傷悼李夫人反覆數百言綢繆戀嫪於一女子其視髙祖豈不媿哉藝文志上自造賦二篇其一不得而見耶並同上詩話總龜後集巻十六欽定四庫全書詩話總龜後集巻十七宋阮閲撰評史門老杜課伯夷辛秀伐木則曰報之以微寒共給酒一斛遣信行脩水筒則以浮𤓰裂餅以答其恭謹陶淵明告其子則曰輙遣一力助汝薪水之勞此亦人子也可善遇之盖古人之役僕夫其忠厚率如此初學記載王褒買便了為奴作約使苦作以致聽劵而淚下鼻涕長一尺有不如早歸黄陌令蚯蚓鑚額之語其少陵柴桑之罪人哉葛常之建安七子惟劉公幹獨為諸王子所親曹操威焰盖世甄夫人出拜諸人皆伏而公幹獨平視雖輸作而不悔亦可嘉矣故梅聖俞詩云公幹才俊或欺事平視美人曽不起自兹不得為故人輸作左校瀕於死公幹嘗有贈徒弟詩云亭亭山上松瑟瑟谷中風風聲一何盛松枝一何勁其寄意如是豈肯少屈於操哉末篇又托興鳯凰有何時當來儀將須聖明君之句則不以聖明待曹操矣杜甫悲陳濤詩云野曠天清無戰聲四萬義軍同日死言房琯之敗也琯臨敗猶持重而中人邢延恩促戰遂大敗故甫深悲之甫為右拾遺會琯罷相上䟽力救琯肅宗大怒詔三司推問􅌠相張鎬救之獲免故洗兵馬行云張公一生江海客身長九尺鬚眉蒼盖戯其救已也張無盡孤憤吟云房琯未相日所談皆臯䕫一朝陳濤下覆没千萬師中原已紛潰老杜尚嗟咨則老杜救琯之章豈亦出於私情乎鄭䖍受安禄山偽命洎賊平與張通王維並囚宣陽里因善畫祈於崔圓遂得免死老杜所謂今如罝中兎子雲識字終投閣是也及䖍貶台州有詩云可念此公懐直道也霑新國用輕刑如䖍者可謂之懐直道乎當是愛私之言爾八哀詩亦云反覆歸聖朝㸃染無滌蕩老䝉台州掾泛泛浙江漿盖傷之也忘年交謂雖年齒尊幼不侔而道義可為友也如張鑑之於陸贄崔廓之於李謙是已魯直云逐貧不去與忘年便以忘年作朋友用盖有來處也老杜過孟倉曹詩云清談見滋味爾輩可忘年則山谷所用豈茍云乎哉李白作蜀道難以罪嚴武其末云所守或匪親化為狼與豺朝避猛虎夕避長蛇磨牙吮血殺人如麻錦城雖云樂不如早還家則武待白之禮未必優也武與杜甫情好甚厚一朝以飲酒過度而武㡬殺之則不如早還家之說乃白先見之明爾陸暢謁韋臯於蜀郡暢感韋之遇已遂反其詞作蜀道易云蜀道易易於履平地郎基在潁川不置朩枕裴潜在兖州不眠胡狀居官清操要當如是白樂天在杭州取天竺片石受代携歸故其詩曰三年為刺史飲氷復食檗唯向天竺山取得両片石此抵有千金無乃傷清白暨守吳門復取洞庭雙石一以支琴一以貯酒故雙石詩有萬古遺水濵一朝入吾手之句洎罷府支琴石遂歸履道舊居故作詩云天上定應勝地上支機未必及支琴於乎泉石膏肓人士之逸韻若樂天者豈潘子義所謂風流罪過也耶君子為小人誣衊則其詩怨故寓之於物以舒其憤如朱晝古鏡詩所謂我有古時鏡初自懐陵得蛟龍猶泥蟠魑魅幸月蝕是也小人既敗君子得志之秋則其詩昌故寓之於物以快其志如劉禹錫磨鏡篇所謂萍開緑池滿暈盡金波溢山神妖氣沮野魅真形出是也黄子虚作妬佳月篇云狂雲妬佳月怒飛千里黒佳月了不嗔曽何汚㓗白支頥少待之寒光静無迹燦燦黄金盤獨照一天碧殆亦二子之意俱同上康節三皇吟許大乾坤自我宣乾坤之外復何言初分大道非常道終有先天永後天作法極微難着迹收功最久不知年若教世上論功業料得更無人在前五帝吟進退肯將天下讓着何言語狀雍容一作從容衣裳垂處威儀盛玉帛脩時意思㳟物物盡能循至理人人自願立殊功當時何故得如此只被升明類日中三王吟一片中原萬里餘殆非孱徳所能居能一作宜夏商正朔猶能布湯武干戈未便驅澤火有名方受革水天無意不成需請觀仁義為心者肯作人間淺丈夫意一作應請觀一作詳知五伯吟刻意尊名名愈虧人人奔命不勝疲生靈劍㦸圍中活圍一作林公道貨財心裏歸雖則餼羊能愛禮奈何鳴鳳未來儀東周五百餘年内歎息唯聞一仲尼七國吟當其末路尚縱横仁義之言固不聽肯為破齊存即墨能勝坑趙盡長平清晨見鬼未為怪白日殺人奚足驚加以蘇張掉三寸扼喉其勢不俱生嬴秦吟轟轟七國正争籌利害相摩未便休比至一雄心底定其如四海血横流三千賔客方成夢百二山河又變秋謾說罷侯能置守趙髙元不是封侯西漢吟秦破山河舊戰場豈期民復見耕桑九千來里開封域四百餘年號帝王剥喪既而遭莽卓經營殊不念髙光當時文物如斯盛城復何由更有隍三國吟桓桓鼎峙震雷音絶唱髙踪没處尋蕭鼓一方情味暢弓刀萬里力難任論兵狠石寧無意飲馬黄河徒有心雖曰天時亦人事誰知慮外失良金西晉吟承平未必便無憂安若忘危非善謀題品人才憑雅謂雌黄時事用風流有刀難割公閭腹無朩可梟元海頭禍在夕陽亭一句上東門笑浪悠悠十六國吟溥天之下號寰區大禹曽經治水餘衣到敝時多蟣蝨𤓰當爛處足虫蛆龍章本不資狂㓂象魏何嘗薦亂胡尼父有言堪味處當時欠一管夷吾南北朝吟云方其天下分南北聘使何嘗絶徃還偏覇尚存前典憲小康猶見舊衣冠一作迍邅洛陽雅望稱崔浩江表竒才服謝安二百四年能並轡謾將形勢互為言有隋吟始謀當日已非臧又更相承或自戕螻蟻人民貪土地泥沙金帛悅姬姜征遼意思糜荒服泛汴情懐厭未央三十六年都掃地不然天下未歸唐有唐吟天生神武奠中央不爾羣凶未易攘正觀若無風凛凛開元安有氣揚揚凭髙始見山河壯入夏方知日月長三百年間能渾一事難成徃道彌光五代吟自從唐季墜皇綱天下生靈被擾攘社稷安危憑卒伍朝廷輕重繫藩方深冬寒朩固不脫未旦小星猶有光五十三年更八姓始知掃蕩待真王我宋吟二首紛紛五代亂離間一旦雲開復見天草朩百年新雨露車書萬里舊山川尋常巷陌猶簮紱取次園林盡管絃盡一作亦人老太平春未老鶯花無害日髙眠又吾曹養拙頼明時為幸居多寕不知天下英才中遁迹人間好景處開眉生來只慣見豐稔老去未嘗經亂離一作聞鼔鼙五事歴將前代舉帝堯而下更無之按卲氏聞見録康節先公謂本朝五事自唐虞而下所未有者一革命之日市不易肆二克服天下在即位後三未嘗殺一無罪四百年方四葉五百年無心腹患伯温竊疑未甞經亂離為太甚先公曰吾老且死汝輩行自知之張南軒采菊亭詩引曰陶靖節人品甚髙晋宋諸人所未易及讀其詩可見胸次灑落八牕玲瓏豈野馬遊塵所能棲集前建安丞張君精力未衰即掛冠家於瀏陽有年矣葺小園為亭面南山來求予名予名之曰采菊亭取靖節所謂采菊東籬下悠然見南山嗚呼靖節興寄深逺特可為識者道耳詩曰陶公千載人髙標跨餘子豈無濟時念斂䕃獨知止歸來卧衡門無愠復何喜九日天氣佳東籬擷芳蕋舉頭見南山佳處政在此地偏心則逺意得道豈否張侯謝銀艾築室娛燕几小亭才尋丈景物自新美頗聞方瞳清亦復强歩履不妨數登臨倚杖㸔雲起髙詠悠然篇飛鴻送千里文集復齋漫録云東坡作諫論以魏鄭公以蘇張之辯而為諫諍之術且云鄭公之初實學縱横之術其所以與蘇張異者心正爾或以東坡之論為不然余讀鄭公出闗詩云中原還逐鹿投筆事戎軒縱横計不就慷慨志猶存䇿杖謁天子驅馬出闗門請纓覊南越憑軾下東藩欝紆陟髙岫出没望平原古朩鳴寒鳥空山啼夜猿既傷千里目還驚九折魂豈不憚艱險深懐國士恩季布無二諾侯嬴重一言人生感意氣功名誰復論東坡實不見此詩盖識見之明有以探其然耳乃知讀書未博未可以輕議前輩也苕溪漁隠曰余觀諫論殆是老蘇作格力辭㫖可以見矣非東坡所作也詩話總龜後集巻十七欽定四庫全書詩話總龜後集巻十八宋阮閲撰辯疑門王絲字敦素越之蕭山人景祐初為縣令會嵗歉絲每家支錢一千以濟之期以明年夏輸絹一匹邑人大受其恵稱為徳政繇此當路薦之盖是時一縑售價不逾其數爾仕止郎曹典州而已范文正公為作墓誌具載其事至荆公當國傚其法施之天下號為和買久之本錢既不復俵且有折帛之害世悞傳始於王儀仲素儀仲文正公之子早即貴達未嘗為邑官至八座没謚懿敏國史本傳可考其子鞏字定國與東坡先生游李定字仲求洪州人晏元獻公之甥文亦竒欲預賽神會而蘇子羙以其任子距之致興大獄梅聖俞謂一客不得食覆鼎傷衆賔者也其嗣即商老彭以詩名列江西𣲖中又李定字資深元豐御史中丞其孫方叔正民兄弟皆顯名一時揚州人又李定嘉祐治平以來以風采聞嘗廵歴天下諸路計度轉運使官制未行老於正卿乃敦老如岡之祖盖濟南人也同姓名者凡三人世亦多指而為一不可不辯李豸陽翟人東坡先生門下士亦字方叔両方叔俱以文鳴詩章又多互傳于世陳子昻感遇詩云樂羊為魏將食子狥軍功骨肉且相薄他人安得忠又曰吾聞中山相乃屬放麑翁孤獸猶不忍况以奉君終一則忍於其子一則不忍於麑故魯直懐荆公詩有啜羮不如放麑樂羊終媿巴西陳無已啓亦用此事所謂中山之相仁於放麑亂世之雄疑於食子是也然屬麑於秦西巴者孟孫也非中山相也子昻徒見樂羊中山事遂誤作孟孫用無已亦遂襲之魯直以西巴為巴西亦悞矣丹陽集李白古風云燕昭延郭隗遂築黄金䑓劇辛方趙至鄒衍復齊來予考史記不載黄金䑓之名止云昭王為郭隗改築宫而師事之孔文舉與曹公書曰昭王築䑓以尊郭隗亦不著黄金之名上谷郡圖經乃云黄金䑓在易水東南十八里燕昭王置千金於䑓上以延天下士遂因以為名皇甫松有登黄金䑓詩云燕相謀在茲積金黄巍巍上者欲何顔使我千載悲其迹尚可得而考也東坡詩云玉奴絃索花奴手玉奴謂楊妃花奴謂汝陽王璡也及觀和楊公濟梅花詩乃言玉奴終不負東昏何耶按南史東昏妃潘玉兒當是筆悞爾韓退之詩曰離騷二十五王逸序天問亦曰屈原凡二十五篇今楚詞所載二十三篇而已豈非并九辨大招而為二十五乎九辨者宋玉所作非屈原也今楚詞之目雖以是篇併注屈原宋玉然九辨之序止稱屈原弟子宋玉所作大招雖疑原文而或者謂景差作若以宋玉痛屈原而作九辨則招魂亦當在屈原所著之數當為二十六矣不知退之王逸之言何所據耶杜子美栢中允除官制詩舊註以為栢耆又以為正節按杜詩云紛然喪亂際見此忠義門蜀中㓂亦甚栢氏功彌存三止錦江沸獨清玉壘昏當是有功於蜀者方是時叚子璋反於上元徐知道反於寳應而正節為卭州刺史數有功則是正節無疑矣杜集又有栢學士茅屋栢大兄弟山居詩議者皆以謂正節之居然詩中殊不及功名之事但皆稱其為學讀書爾茅屋云古人已用三冬足年少今開萬巻餘山居云山居精典籍文雅渉風騷疑是卭州立功之前丹陽集黄魯直詩云世有捧心學取笑如東施梅聖俞云曲眉不想西家様餒腹還須二子清太平寰宇記載西施事云施其姓也是時有東施家西施家故李太白效古云自古有秀色西施與東鄰而東坡代人留别詩乃云絳蠟燒殘玉斚飛離歌唱徹萬行啼他年一舸鴟夷子應記儂家舊姓西似與寰宇記所言不同豈為韻所牽耶同上張無盡嘗和山字云安得將相似仲山人疑之以近人所常用皆山甫也觀後漢志陽樊攅茅田服􅐚注云楚仲山所居又楊脩答臨淄侯牋云仲山周旦之儔只稱仲山何疑之有黄常明坡記王陵過賈逵廟呼曰賈梁道我大魏之忠臣也及司馬景王病夢逵為祟因為詩曰嵇紹似康為有子郄超畔鑒似無孫如今更恨賈梁道不殺公閭殺子元盖怪梁道忠義之靈不能自已其子元之惡按晉紀王賈所擾者乃宣帝名懿字仲達非景帝子元也䂬溪正訛門天闚象緯逼雲卧衣裳冷世傳古本作天闚今從之莊子以管闚天正用此字舊集以作闕又或作闗今不取盖先生詩該衆美者不惟近體嚴於屬對至於古風句對者亦然觀此詩可見矣近人論詩多以不必屬對為髙古何耶故詳論之以俟知者焉杜詩正異海右此亭古濟南名士多濟南實海右諸郡舊集一作海右今從之正文作海内非也拂天萬乗動觀水百丈湫拂字從一作兼畫馬詩有云翠華拂天來向東正文作沸非也君臣留歡娛樂動殷嶱嵑殷從上聲嶱嵑出文選音渴曷集韻山貌舊集作殷湯嶱音字皆悞盖縁湯字之訛二字從而倒之兼他詩二字悞倒之者非一豈知秋禾登貧窶有倉卒别本禾字一作未今從之按此詩十一月作禾字明矣昌黎謂年登而妻啼飢實此意也隂風西北來惨淡隨回紇紇字從一作鶻唐史徳宗朝始改名回鶻正文非也中興諸將收山東㨗書夜報清晝同夜字從王介甫謂㨗書晝夜至也舊作日今不取花門天驕子飽肉氣勇决諸詩之言花門者皆回紇也舊集作北門盖由字畫小誤唐以太原為北門非謂回紇明矣卒章申言花門也渡河不用船千騎常撇捩撇捩疾貌大食刀歌云鬼物撇捩辭沆壕字意皆同今從之舊集作撇烈非也嬋娟碧蘚静蕭摵寒籜聚蘚字從别本舊集作鮮盖字畫小缺而釋者因云嬋娟碧鮮皆謂竹也尤謬長夜苦寒誰獨悲杜陵野老骨欲折此成都詩舊集作長安非也其夜字之訛故悞作安耳况卒章之意明甚南京亂初定所向邑枯槁邑字從别本他詩亦云朝野色枯槁正文作邑今不取樹枝有鳥亂棲時瞑色無人獨歸客棲字從一作正文作鳴今不取言亂棲則鳴可知矣髙皇亦明王魂魄猶正直皇字舊集諸本皆作堂近見别本作皇今從之乃與上下數聨詩意相貫也詢之閬人其漢髙祠廟今尚存焉别離重相逢偶然豈足期足字舊集作定盖由字畫小訛况上句已云泄雲無定姿悲䑓蕭颯石巃嵸哀壑杈枒浪呼洶浪字作别本考兩句屬對之工當用一實字又别本下句作二鶯猛胸絛徐墜字亦未通主守問家臣分朋見溪畔耘者必分朋曹而進故東坡逺景樓記謂耘者畢出數百人為曹者是也舊作明乃字小訛耳風吹巨焰作河漢騰烟柱諸本下句作何掉騰烟柱蜀本何作河近見别本今從之盖於詞意通也合昏排鐡騎清曉散錦幪幪字從又有他詩有云駑駘怯錦幪乃覆馬之物正文作􅐒非也大火運金氣荆揚不知秋火字從一作謂大火西流七月詩也正文作暑今不取終然契真如得匪金仙術二句並從一作正文作終契如徃還得匪合仙術今不取㡬度寄書白塩北故人贈我青絲裘絲字從一作縑别本正文止作絲字此詩寄裴施州者或謂裴冕非也按唐史冕以寳應元年貶施州刺史不數月移澧州距此已六年矣配極𤣥都閟憑髙禁籞長籞字舊集諸本皆作禦按西溪宣帝紀云池籞者其字從竹今從之尸鄉餘土室誰話呪雞翁誰話從呪雞事見列仙傳正文作雞說乃字之訛也咒字一作喌音州又音祝茂樹行相引連山望忽開茂字連山字皆從一作時歸鳯翔行在正文連山作蓮峰非也霧樹亦然掖垣竹埤梧十尋洞門對霤常隂隂霤字從别本文選云二堂對霤此春深詩也而諸本作雪悞矣江上小堂巢翡翠苑邉髙塜卧麒麟苑字從一作正文作花盖字畫小訛而說者云一詩連用三花字不害為工誤矣雲斷岳蓮臨大路天晴宫栁暗長春大路陜華間地名也晉書檀道濟從劉裕伐姚泓至潼關姚鸞屯大路以絶道濟粮道而蜀本正作大道誤矣馬驕朱汗落胡舞白題斜朱汗已見他詩舊作珠乃衍文也白題從一作西漢云斬胡白題將字義與雕題同正文作蹄非也力疾坐清曉來詩悲早春詩字從别本考詩題與上下句意當從之舊作時非也峽雲籠樹小湖日蕩船明蕩字從一作非久游江湖者不知此字之工正文作落盖字訛也合觀却笑千年事驅石何時到海東題云觀造竹橋即日成句中合觀字謂聚觀橋成之速而笑驅石之誕舊集諸本皆訛作歡非也詩話總龜後集巻十八欽定四庫全書詩話總龜後集巻十九宋阮閱撰隠逸門世人謂淵明皆以其専用肥遯初無康濟之念能知其心者寡也嘗求其集若云歳月擲人去有志不獲騁又有云猛志逸四海騫翮思逺翥任苒歳月頽此心稍已去其自樂田畆乃巻懐不得已耳士之出處未易為世俗言也陽秋瓢之為器貧者所用故顔子以一瓢飲而揚子比之山雌文康公築室泛山溪上闔門千指朝虀暮塩未嘗敢以貧為病嘗因溪結亭號曰瓢飲盖欲少見慕賢好古安貧樂道之意予嘗有詩云我不學許由隠烟霧得瓢不飲惟掛樹又不學徳義居虎邱帶瓢入市多騎牛分無玉甌嚢古錦病渴文園只瓢飲下瞰金溪新結亭未須引吸如長鯨但願金溪化為酒歳歳持瓢醉花栁杜尋苑十隠居云侍立小童清義山憶正一云烟爐銷盡寒燈晦童子開門雪滿松子厚云日午獨眠無餘聲山童隔竹敲茶臼秀老云夜深童子喚不起猛虎一聲山月髙閒棄山間累年頗得此數詩氣味陳搏負經綸才歴五季亂離游行四方志不遂入武當山後隠居華山自晉漢以後毎聞一朝革命嚬顣數日人有問者瞪目不答一日方乗驢游華隂市聞太祖登極驚喜大笑問其故又笑曰天下自此定矣太祖方潜龍時摶嘗見天日之表知太平之有自矣遯迹之初有詩云十年蹤跡走紅塵回首青山入夢頻紫閣縱榮争及睡朱門雖貴不如貧愁聞劍㦸扶危主悶見笙歌聒醉人携取舊書歸舊隠野花啼鳥一般春豈淺人也哉邵伯温易學辨惑陳摶周世宗嘗召見太平興國初再召赴闕太宗賜詩云曽向前朝出白雲後來消息杳無聞如今若肯隨徴召總把三峰乞與君先生服華陽巾草屨垂絛以賔禮見賜坐澠水燕談康節除祕書省校書郎潁州團練推官辭不許既受命即引疾不起且以詩答鄉人曰平生不作皺眉事天下應無切齒人斷送落花安用雨裝添舊物豈須春幸逢堯舜為真主且放巢由作外臣六十病夫宜揣分監司無用苦開陳言行録後復再召摶辭曰九重仙詔休教丹鳯㗸來一片野心已被白雲留住辯惑种放别業在終南山後生從之學者甚衆性頗嗜酒躬耕種秫以自釀所居有林泉之勝殊為幽絶真宗聞之遣中使携畫工圖之開龍圖閣召輔臣觀焉上欲賞之其後復聞魏野居有幽致帝亦遣人圖之故野有詩云幽居帝畫㸔澠水燕談張横渠八翁吟詩十首歩虚聲裏八竒翁八竒須信古英雄賔朋未散山翁醉聽歌同入醉鄉中傅巖巖下築岩翁幽通心與帝心通憂勤未感思賢夢為霖何日見成功磻溪溪畔釣魚翁濯纓溪水聽溪松龜猷未告非熊兆漁簑堪笑老龍鍾老原原上卜年翁感天功業動天聰流言未信成王悟悟成全得起禾風龜山山下感麟翁麟翁知己㡬時逢自從顔孟希蹤後㡬人今日更希蹤青牛西去伯陽翁當年夫子歎猶龍立言為恐真風喪豈知言立喪真風寓言豪誕漆園翁誇談名理浩無窮早知懸解人間世争知懸解不言中一身無碍竺乾翁遍員身關戒身同船師從我乗桴去頑空中與指真空褒中斜谷卧龍翁量如江海氣如虹不應三顧逢先主至今千載慕冥鴻籃輿多病八吟翁雲僧溪叟恣逰從清時無事青山醉青山仍醉最青峰處士魏野字仲先陜州人居於東郊架草堂有水竹之勝好彈琴作詩清苦多聞於時前後郡中皆所禮遇上祀汾隂召之辭疾不至野以詩贄公曰從前輔相皆頻出獨在中書十五秋泰岳汾隂俱禮畢這回好伴赤松遊公覽之喜形於色以酒茗藥物為答素編先公遺札有公自寫此詩數本王文正公遺事旦得詩感悟以疾屢辭政柄遂拜太尉玉清昭應宫使又曰魏野謂冦凖曰自古功名盖世少有全者因與詩曰好去上天辭將相歸來平地作神仙及貶始悔不用野之言云仁宗政要復齋漫録云晉皇甫謚髙士傳載四皓見秦政虐乃避入藍田山作歌曰漠漠髙山深谷逶迤煌煌紫芝可以療飢唐虞世逺吾將安歸駟馬髙盖其憂甚大富貴之畏人不如貧賤之肆志林逋字君復居杭州西湖之孤山真宗聞其名賜號和靖處士詔長吏歳時勞問逋工於畫善為詩如梅花詩云踈影横斜水清淺暗香浮動月黄昏評詩者謂前世咏梅者多矣未有此句也及其臨終為句云茂陵他日求遺藁猶喜初無封禪書尤為人稱誦自逋之卒湖山寂寥未有繼者歸田録又青箱雜記云逋景祐初尚無恙范文正公亦過其廬贈逋詩曰巢由不願仕堯舜豈遺人又曰風俗因君厚文章到老醇其激賞如此言行録武夷之溪東流凡九曲而第五曲為最深盖其山自北而南者至此而盡聳全石為一峰㧞地千尺上下平處微戴土生林朩極蒼翠可玩而四隤稍下則反削而入如方屋㡌者舊經所謂大隠屏也直屏下兩麓相抱之中西南向為屋三間者仁智堂也堂左右兩室左曰隠求以待棲息朱氏隠求室詩曰晨牕林影開夜枕山泉響隠去復何求無言道心長邱氏詩曰抱膝小牕深讀書空谷響一笑有會心紛紛自消長項氏詩曰種桑不療寒蒔粟長苦飢飢寒雖自有但使願無違袁氏詩曰本是山中人歸作山中友豈同荷蓧老永結躬耕耦浮雲一出岫膚寸彌九有此志未可量見之千載後劉平父詩曰寧懐棲遯情閒袖經綸手風雲倘未期猿鶴且為友萬氏詩曰平生區中縁中歳從黄綺出處本無心誰云今隠几黄子厚詩曰隠側混樵牧堅髙存聖功懐哉得所尚一瓢從屢空韓氏次櫂歌韻宛宛溪流叠九灣山猿時下鳥關關釣磯茶竈山中樂大隠屏邉日月閑淮南小山作招隠極道山中窮苦之狀以風切遁世之士使無遐心其㫖深矣其後左太冲陸士衡相繼有作雖極清麗顧乃自為隠遁之辭遂與本題不合故王康琚作詩以反之雖正左陸之悞而所述乃老氏之言又非小山本意也十月十六日夜坐許生挾琴過予書堂夜久月明風露凄冷生揮絃度曲聲甚悲壯既乃更為招隠之操而曰榖城老人嘗欲為予依永作辭而未就也予感其言因為推本小山遺意戯作一闋以反之口授許生冩呈榖城老者諸名勝請共賦之以備異時山中故事云南山之幽桂樹之稠枝相樛髙拂千厓素秋下臨深谷之寒流王孫何處扳援久淹留聞說山中虎豹書嘷聞說山中熊羆夜咆叢薄深林鹿呦呦獮猴與君居山鬼伴君遊君獨胡為自聊音留歳云暮矣將焉求思君不見我心徒離憂南山之中桂樹秋風雲㝠濛下有寒栖老翁朩食澗飲迷春冬此間此樂優遊𦕈何窮我愛陽林春葩晝紅我愛隂崖寒泉夜淙竹栢含烟泊青葱徐行發啇歌安坐撫孤桐不問簞瓢屢空但把明月甘長終人閒雖樂此心誰與同南山之阿桂樹婆娑雲嵯峨下䕃連蜷舊柯秋思渺渺秋風多王孫不見扳援時寤歌我思岑寂空山良宵月華詰曲前溪春流迅波秀朩盤紆雜青莎猿猴慕熊羆麋鹿友麚荒忽淹留奈何思君使我長咨嗟人間歳月驚心易蹉跎長幽居中林散髪披襟山􅏟崟慰此栖遲素心渌渏一曲傳清音超然忘世誰能共浮沉或逺汲寒溪烟雨晝隂獨宿空齋哀猿夜吟竹栢揺風更蕭森春蘭得芳紉秋菊伴孤斟此意寧論古今勸君與我同􅄬簮倘徉歸去歌谷雲深右反招隠恬退門蔡寬夫詩話云乖崖少喜任俠學擊劍尤樂聞神仙事為舉子時嘗從陳希夷欲分華山一半希夷以紙筆蜀牋贈之公笑曰吾知先生之㫖矣殆欲驅我入閙處乎然性極清介居無妾媵不事服玩朝衣之外燕處惟紗㡌皂絛一黄土布裘而已至今人傳其畫像皆作此餙始及第時嘗以詩寄傳霖逸人云前年失脚下魚磯苦戀明時不忍歸為報巢由莫相笑此心非是愛輕肥李順之辭乖崖帥蜀有詩寄陳希夷云性愚不肯住山林剛要清流擬致君今日星馳劍南去回頭慚愧華山雲皆真素志也復齋漫録云唐人詩有意効承平無功答盛明灰心縁忍事霜髩為論兵道直身還泰恩深命轉輕梅塩非擬議葵藿是平生白日長垂照青蠅謾發聲嵩陽舊田地終擬俟歸耕中書後堂闕軒西壁有題灰心霜髩之句者騐其筆迹舊相李公廸之書也李入相時邉兵未動意在忍事之語元獻中書即事詩叙其事云惨惨髙槐落凄凄餘菊寒粉牆多記墨聊為拂塵㸔正為此也苕溪漁隠曰蔡寛夫詩話以灰心縁忍事霜鬂為論兵之句是裴晉公作李文定嘗親書於中書壁間蔡寬夫詩話云正獻公以清徳直道聞天下而風姿尤竒古年近七十髪髩皤然無一莖黒者居相位未㡬以歳旦請老一章得謝退居睢陽歐陽文忠公未顯時正獻推薦特厚及文忠為留守日與公酧唱文公有答公見贈末章云報國如乖願歸耕寧買田期無辱知已肯逐利名遷熈寧初文忠致政歸汝隂時正獻捐舘已十有五年矣文忠復用前詩題其祠堂云門生今白首墓朩已蒼烟報國如乖願歸耕寧買田此言今始踐知不愧黄泉苕溪漁隠曰昭陵諸臣傳云慶厯四年拜中書門下平章事每内降與恩澤者積數十而面納上前上嘗謂諫官歐陽脩曰外人知衍封還内降吾居禁中有求恩者每以衍不可告之而止者多於所封還也由是僥倖不說出知兖州明年正旦上表曰臣年七十願還上印綬乃以太子少師致仕議者謂故相一上章得請以三少致仕皆非故事盖宰相賈昌朝疾之蔡寬夫云正獻居相位未㡬以歳旦請老不言鎮東魯盖闕文也迂叟詩話云王太尉旦從車駕過陜魏野貽詩曰昔時宰相年年替君在中書十一秋西禮東封俱已了如今好伴赤松遊王袖其詩以呈上累表請退上不許苕溪漁隠曰余按三朝正史云旦登柄用十八年為相僅一紀素嬴多疾又以名位太重憂畏不自安連歳拜章求觧上素重其徳望聞其引退甚不樂優詔褒答繼以面諭旦一日獨對滋福殿令左右扶掖而升復求遜位上覩其痩瘁閔然許之則迂叟詩話以為上不許盖悞矣其蔡寛夫詩話云遂得謝此言良是蔡寬夫詩話云萊公自永興被召魏野以詩送之曰好去上天辭富貴却來平地作神仙王文正從東封回野亦寄以絶句云西祀東封今已了好來相伴赤松遊文正袖此詩求退遂得謝萊公晚歳南遷世多言不能如文正用野言盖志士仁人以各有志觀萊公末年所為豈愧文正也哉山人處士其言不如此或用或不用各繫其人要之不溺於富貴以貪得則一也野子亦有父風宋景文嘗贈以詩云姓名髙士傳父子少微星詩話總龜後集巻十九欽定四庫全書詩話總龜後集巻二十宋阮閲撰警句門章聖極喜老杜勳業頻看鏡行藏獨倚樓歐公稱李白襄陽樂落日欲沒峴山西四句常語也至於清風明月不用一錢買玉山自倒非人推然後見太白之横放所以驚動千古者不在此乎詩人以一字為工世固知之惟老杜變化開闔出奇無窮殆不可以形迹捕詰如江山有巴蜀棟宇自齊梁則其逺近數千里上下數百年只在有與自兩字而吐吞山川之氣俯仰古今之懐皆見於言外此工妙至到人力不可及也石林詩話七言律難於氣象雄渾句中有力而紆餘不失言外之意自老杜錦江春色五更角鼓等句後常恨無復繼者同前詩之聲律至唐始成然亦多原六朝㫖意而造語工夫各有微妙何遜入西塞詩薄雲巖際出初月波中上至少陵江邊小閣則云薄雲巖際宿孤月浪中飜雖因舊而益妍類獺髓補痕也錢郎並稱郎非錢比也如云窮達戀明主耕桑亦近郊鳥道挂疎雨人家殘夕陽牛羊下山小煙火隔林深長樂鐘聲花外盡龍池栁色雨中深皆特出意外標凖古今固不必論如横雲嶺外千重樹流水聲中一兩家亦可謂竒句矣士元豈有如此句乎贈孟少府新除江南尉云客路尋常隨竹影人家大抵旁山嵐題王秀友半日村别業云長溪南路當羣岫半景東隣照數家此何等語余讀其詩盡帙未見有可喜處以是知不及起逺甚同上山隂野雪興難乗佳辰强飲食猶寒皆幹旋其語使就音律近集有天上嬌雲未肯同十年江海别嘗輕花下壺盧鳥勸提與君盖亦不須傾皆此法也黄常明賔客集添爐𢷬雞舌洒水净龍鬚駱賔王桃花嘶别路竹葉㵼離樽此體甚衆惟栁子厚從中丞過盧少府郊居一聨最工云蒔藥閑庭延國老開尊虚室值賢人只似稱坐客而有兩意盖甘草國老濁酒賢人故也夢得又有藥爐燒姹女酒甕貯賢人近於湯燖右軍矣余嘗為郊行詩云江干食息呼扶老朩末扳縁訝宛童乃古今注秃鶖一名扶老爾雅女羅謂之宛童也又題一士人所居云但遣一枝居巧婦不殊大厦賀佳賔盖用爾雅注鷦鷯俗呼巧婦炙轂子雀一名佳賔言集人屋如賔客也樂天曾用巧婦對慈姑謝元暉善為詩任彦升工於筆又云任筆沈詩劉孝綽稱弟儀與成云三筆六詩故牧之云杜詩韓筆愁來後似倩麻姑痒處爬近人罕用之臨川云閑詩用意歸詩筆静外安生比太山坡云水洗禪心都眼静山供詩筆總眉愁同上唐朝人士以詩名者甚衆徃徃因一篇之善一句之工名公先達為之遊談延譽遂至聲聞四馳曲終人不見江上數峯青錢起以是得名故國三千里深宫二十年張祜以是得名微雲淡河漢踈雨滴梧桐孟浩然以是得名兵衛森畫㦸宴寢凝清香韋應物以是得名野火燒不盡東風吹又生白居易以是得名敲門風動竹疑是故人來李益以是得名鳥宿池邊朩僧敲月下門賈島以是得名畫棟朝飛南浦雲珠簾暮捲西山雨王勃以是得名華裾織翠青如葱入門下馬氣如虹李賀以是得名然觀各人詩集平平處甚多豈皆如此句哉古人嘗謂嘗鼎一臠可以盡知其味恐未必然爾杜子美云為人性僻耽佳句語不驚人死不休則是凡子美胷中流出者無非驚人之語矣讀其集者當知此言不妄殆非前數公之可比倫也葛立之李義山位𢎞農尉嘗投詩謁告云却羡卞和雙刖足一生無復没堦趨雖為樂春罪人然用事出人意表尤有餘味英俊陸沉强顔低意趨跖諾虎扼腕不平之氣有甚於傷足者非粗知直心不甘心於病畦下者不能賞此語之工也陽秋郛子稍學作小詩嘗賦梅花云玉屑裝龍腦雲衣覆麝臍何堪夜來雪香色兩凄迷留友人詩云良友間何闊春事􅑈如許勞君下鷗沙一葉繁春渚昨夢墮前世再見欣欲舞聊呼花底盃酒面㸃紅雨狂飲岸綸中良談揮玉麈驪駒未可歌妙句君須吐觀此數語似粗知詩家畦逕學之不已必佳但恐其中墮耳同上陸士衡文賦云立片言以居要乃一篇之警䇿此要論也文章無警䇿則不足以傳世盖不能竦動世人如老杜及唐人諸詩無不如此但晉宋間人専致力於此故失於綺靡而無髙古氣味老杜句云句不驚人死不休所謂驚人句即警䇿也吕氏童䝉訓句法門前人文章各自一種句法如老杜今君起柂春江流予亦江邉具小舟同心不減骨肉親每語見許文章伯如此之類老杜句法也東坡秋水今㡬竿之類此東坡句法魯直之夏扇日在揺行樂亦云聊此魯直句法也學者若能遍考前作自然度越流輩同上淵明退之詩句法分明卓然異衆惟魯直為能深識之學者若能識此等語自然過人阮嗣宗詩亦然徐師川云作詩回頭一句最為難道如山谷詩所謂忽思鍾陵江十里之類是也他人豈如此尤見句法安壯山谷平日詩多用此格徐師川云為詩文常患意不屬或只得一句語意便盡欲足成一章又惡其不相稱師川云但能知意不屬則學可進矣几注章作詩文或得一兩句而止若未有次句即不若且休養銳以待新意若盡力湏要相屬譬如力不敵而苦戰一敗之後意氣沮矣王荆公好集句嘗於東坡處見古硯東坡令荆公集句荆公云巧匠斵山骨只得一句遂逡廵而去山谷嘗有句云琪璘卧葬功名骨終身不得好對同上莊子文多竒變技經肯綮之未嘗乃未嘗技經肯綮也詩句時有此法如昌黎一蛇兩頭見未曽拘管計日月欲進又不可君不强起時難更東坡云追兹霜雪未兹謀待君必聊亦記吾曾餘人罕敢用黄常明苦吟門山澤之儒多癯詩人尤甚子美有思君令人痩樂天云形容痩薄詩情苦豈是人間有相人又云貌將松共痩心與竹俱空李商隠瘦盡東陽姓沈人掉頭撚髭之苦豈有張頥豐頰者哉沈昭畧嘗戯王約以肥而癡答以痩而狂昭畧喜曰痩已勝肥狂已勝痴同上賈島詩如鳥從井口出人從岳陽來貫休此夜一輪滿清光何處無皆經年方得句以見其詞􅀈思苦若非好事者誇辭亦繆用其心也同上後山詩話云荆公詩力去陳言誇末俗可憐無補費精神而公平生文體數變暮年詩益工用意益苦故言不可不謹也蔡寬夫詩話云司空圖善論前人詩如謂元白為力勍氣僝乃都會之豪估郊島非附於寒澁無所置才皆切中其病及自評其作乃以南樓山最秀北路邑偏清為假令作者復生亦當以着題見許此殆不可曉當局者迷固人情之通患如樂天所謂屬石破山先觀鑱迹發矢中的兼聽弦聲使不見其詩而聞此語當以為如何哉冷齋夜話云賈島詩有影畧句韓退之喜之其渡桑乾詩曰客舍并州已十霜歸心日夜憶咸陽而今更渡桑乾水却望并州是故鄉又赴長江道中詩曰䇿杖離山驛逢人問梓州長江那可到行客替生愁隠居詩話云孟郊詩蹇澁窮僻琢削不暇苦吟而成觀其句法格力可見矣其自謂夜吟曉不休苦吟鬼神愁如何不自閒心與身為仇而退之薦其詩云榮華肖天秀㨗疾愈响報何也蘇子由云唐人工於為詩而陋於聞道孟郊嘗有詩云食虀腸亦苦强歌聲無歡出門即有碍誰謂天地寬郊耿介之士雖天地之大無以容其身起居飲食有戚戚之憂是以卒窮以死而李翺稱之以為郊詩髙處在古無上平處猶下顧沈謝至韓退之亦談不容口甚矣唐人之不聞道也孔子稱顔子在陋巷人不堪其憂回也不改其樂回雖窮困早死而非其處身之非可以言命與郊異矣詩話總龜後集巻二十欽定四庫全書詩話總龜後集巻二十一宋阮閲撰留題門澧陽道旁有甘泉寺因莱公丁謂曽留行記從而題詠者甚衆碑牌滿屋孫諷有平仲酌泉曽頓轡謂之禮佛遂南行髙䑓下瞰炎荒路轉使髙僧薄寵榮人皆傳道余獨恨其語無别自古以直道見黜者多矣豈皆貪寵榮者哉又有人云此泉不洗千年恨留與行人戒覆車害理尤甚萊公之事亦例為覆車乎因過之偶為數韻其間有云已憑静止鑑忠精更遣清冷洗讒啄盖指二公也䂬溪黄州麻城縣界有萬松亭連日行清隂中其館亭亦可愛適當關山路徃來留題無數東坡傷來者不嗣其意嘗有詩云十年栽種百年規好徳助人無我儀又云為問㡬株能合抱殷勤記取角弓詩中壊嘗徹碑有士題云舊韻無儀字蒼髯有恨聲不可録䂬溪張祜喜遊山而多苦吟凡所歴僧寺徃徃題詠如題僧壁云客地多逢酒僧房却厭花題萬道人禪房云殘陽過逺水落葉滿踈鐘題金山寺云僧歸夜船月龍出曉堂雲樹影中流見鐘聲兩岸聞題孤山寺云不雨山長潤無雲水自隂斷橋荒蘚澁空院落花深如杭之靈隠天竺蘇之靈巖楞伽常之恵山善權潤之甘露招隠皆有佳作李渉在岳陽嘗贈其詩曰岳陽西湖南上寺水閣松房遍文字新釘張生一首詩自餘吟着皆無味信知僧房佛寺類其詩標榜者多矣葛常之温公治第洛中闢門曰獨樂其心憂樂未始不在天下也其自作記有云世有人肯同此樂必再拜以獻矣東坡賦詩云兒童誦君實走卒知司馬盖名其得人心也又云撫掌笑先生年來學瘖瘂疑未盡命名之意同上沈約命王筠作郊居十詠書於壁不加篇題約云此詩指物程形無假題署老杜贈李潮八分歌云吾甥李潮下筆親開元以來數八分潮也奄有二子成三人潮乎潮乎奈爾何又韓退之招楊之罘詩我令之罘歸失得栢與馬之罘别我去計出栢馬下我自之罘歸入門思而悲之罘别我去能不思我為作詩招之罘晨夕抱飢渴嘗戯謂此二詩直不湏題署也黄常明子美詩誅茅初一畆廣地方連延敢謀土朩麗自覺面勢堅經營上元初斷手寶應年又題衡山縣學堂云旄頭彗紫微無復爼豆事於乎已十年儒服敝於地衡山雖小邑首唱恢大義講堂非曩造大屋加塗塈下可容百人墻隅亦深䆳林朩在庭戸宻幹叠青翠有井朱夏時轆轤凍堦戺采詩倦䟦渉載筆尚可記豈不是草堂縣學記李翺皇甫湜集中皆無詩世傳翺有縣君好塼渠一詩并傳燈録載答藥山一揭湜秪有浯溪留題一篇而已許彦周詩話云牧之題桃花夫人廟詩細腰宫裡露桃新脉脉無言㡬度春至竟息亡縁底事可憐金谷墜樓人僕嘗謂此詩為二十八字史論苕溪漁隠曰牧之於題詠好異於人如赤壁云東風不與周郎便銅雀春深鎻二喬題商山四皓廟云南軍不袒左邉袖四老安劉是滅劉皆反説其事至題烏江亭則好異而畔於理詩云勝敗兵家事不期包羞忍恥是男兒江東子弟多才俊巻土重來未可知項氏以八千人渡江敗亡之餘無一還者其失人心為甚誰肯復附之其不能巻土重來决矣許彦周詩話云牧之作赤壁詩折㦸沉沙鐡未消自將磨洗騐前朝東風不與周郎便銅雀春深鎻二喬意謂赤壁不能縱火即為曹公奪二喬置之銅雀䑓上也孫氏覇業係此一戰社稷存亡生靈塗炭都不問只恐没了二喬可見措大不識好惡南唐書云韓熈載自江南奉使中原為感懐詩題於館壁云僕本江北人今作江南客再去江北遊舉目無相識秋風吹我寒秋月為誰白不如歸去來江南有人憶苕溪漁隠曰余家有韓熈載家讌圖圖中題此詩後四句嘗以問相識間云是古樂府今觀此書方知其悞也苕溪漁隠曰題呉江三賢堂内陸龜䝉詩云千首文章二頃田囊中未有一錢看却因養得能言鴨驚破王孫金彈丸談苑云陸龜䝉居笠澤有内養自長安使杭州舟出舍下彈其一緑頭鴨龜䝉遽從舍出大呼曰此緑頭有異善人言方將獻天子今持此死鴨以詣官内養少長並集信然厚以金帛遺之因徐問龜䝉曰此鴨何言龜䝉曰常自呼其名遊道場山何山詩云白水田頭問行路小溪深處是何山髙人讀書夜達旦至今山鶴鳴夜半汪彦章何山何氏書堂記云寺有何氏書堂圖記相承以何氏為晉何楷楷嘗讀書此山後為吳興太守以其居為寺而名其山寄贈門子美詩逺行無自得内熱比何如寄旻云舊來好事今能否老去新詩誰與傳岑参云喬生作尉别來久因君為問平生否魏君校理復何如前月人來不得書夫子素多疾别來未得書北庭苦寒地體内今何如樂天寄夢得云病後能吟否秋來曽醉無退之贈崔立之云長女當人事誰助出帨縭諸男皆秀爽㡬能守家規亦皆書一通也張均張垍兄弟承襲父寵致位嚴近皆自負文材覬覦端揆明皇欲相均而抑於李林甫欲相垍而奪於楊國忠自此各懐􅔵望安禄山盗國垍相禄山而均亦受偽命肅宗反正兄弟各論死非房琯力救豈能免乎老杜贈均詩云通籍踰青𤨏亨衢照紫泥靈虬傳夕箭歸馬散霜蹄言均為中書舍人刑部尚書時也贈垍詩云翰林逼華盖鯨力破滄溟天上張公子宫中漢客星言垍尚寧親公主禁中置宅時也二人恩寵烜赫如是則報國當如何而乃斁亂天理下比逆賊反噬其主夫豈人類也哉黄常明杜甫累不第天寶十三載明皇朝獻太清宫饗廟及郊甫奏賦三篇帝竒之使待制集賢院命宰相試文章故有贈集賢崔于二學士詩云昭代將垂白途窮乃呌閽氣冲星象表詞感帝王尊天老書題目春官騐討論倚風遺鶂路隨水到龍門舊注陳希烈韋見素為宰相而崔國輔于休烈者皆集賢院學士也故末句云謬稱三賦在難述二公恩可謂不忘於藻鑑之重者矣按唐史是歳陳希烈為相至八月見素代之而甫集有上見素詩云持衡留藻鑑聽履上星辰則甫之文乃為見素所賞非希烈也同上牧之贈阿宜一日讀十紙一月讀十箱古人讀書以紙計范雲就袁叔明讀毛詩日誦九紙又袁俊家貧無書每從人假借必皆抄寫自課日五十紙為計䂬溪故事門余嘗論李廣以私憾殺㶚陵尉其褊忮險刻决非長者所以不侯非直殺降之譴也因觀坡云明年定起故將軍未肯先誅㶚陵尉恐亦寓此意史傳襲稱兄弟為友于故淵明詩云再喜見友于子美云友于皆挺㧞又山鳥山花吾友于南史到藎從武帝登北顧樓賦詩藎受詔便就上以示其祖溉云藎定是才子番恐卿從來文章假手於藎後每和御詩上輙手詔戱溉曰得無貽厥之力乎退之玉川詩云誰謂貽厥無基址二事正可對也䂬溪坡云賔鴻社燕巧相違月令來賔事常疑人未曽用及及觀夢得秋江晚泊云暮霞千萬狀賔鴻次第飛顧况云安得凌風翰肅肅賔天京杜别浦鴈賔秋同上東坡游金山詩云江山如此不歸山江神見怪驚我頑我謝江神豈得已有田不歸如江水盖與江神指水為盟耳句中不言盟誓者乃用子犯事指則誓在其中不必詛神血口然後謂之盟也送程六表弟云浮江泝蜀有成言江水在此吾不食黄常明老杜復見諸山得銀甕注引禮記山出器車注盖瑞應圖曰王者宴不及醉刑罸中人不為非則銀甕出昌黎我有雙飲醆其銀得朱提見漢志朱提銀八兩為一流注朱提屬犍為乃邑名也䂬溪樂天以長慶二年自中書舍人為杭州刺史冬十月至治時仍服緋故遊恩徳寺詩序云俯視朱紱仰睇白雲有愧於心及觀自欵詩云實事漸銷虚事在銀魚金帶遶腰光戊申詠懐云紫泥丹筆皆經手赤紱金章盡到身以今觀之金帶不應用銀魚而金章不應用赤紱人皆以為疑而不知唐制與今不同也按唐制紫為三品之服緋為四品之服淺緋為五品之服各服金帶又制衣紫者魚袋以金餙衣緋者魚袋以銀餙樂天時為五品淺緋金帶佩銀魚宜矣劉長卿有袁郎中喜章服詩云手詔來筵上腰金向粉闈勲名傳舊閣蹈舞著新衣郎中亦是五品故其身章與樂天同葛常之書事門近世作文者多以紫荷囊作詩從事用如宋景文詩所謂觀榮聳麟族賦筆助荷囊之類沿襲而用者非一而不知其誤也按晉書輿服志書文武百官皆有囊綬八座尚書則荷紫以生紫為袷囊綴之服外加於左肩則所謂荷紫者非芰荷之荷乃負荷之荷也南史載周捨嘗問劉香曰着紫荷囊相傳云挈囊竟何所出香曰張安世傳云持槖筆事孝武帝數十年注曰槖囊也盖人徒見南史有着紫荷囊四字遂作一句讀之殊不知晉書紫荷之義也丹陽集王儉少年以宰相自命嘗有詩云稷契康虞夏伊吕翼商周又字其子曰元成取仍世作相之義至其孫訓亦作詩云旦奭康世政蕭曹佐甿俗大率追儉之意而為之後官亦至侍中同上杜云十暑岷山葛三霜楚戸砧九鑚巴噀火三蟄楚祠雷其書歳月也新矣樂天云呉郡兩回逢九月越州四度見重陽去年八月十五夜曲江池畔杏園邉今年八月十五夜湓浦沙頭水舘前又前年九月餘杭郡呼賔命宴虚白堂去年九月到東洛今年九月來呉鄉兩邉蓬鬢一時白三處菊花同色黄其質直叙事又自一格黄常明岑参送顔平原詩序云十二年春有詔補尚書郎十數公為郡守上親賦觴羣公於蓬萊仍賜以繒帛寵餞加等故参為長篇述其事安禄山亂明皇曰河北二十四郡無一忠臣邪及聞平原固守乃曰朕不識真卿何如人所為若此前日宴賚真文具耳退之云偶然題作木居士便有無窮求福人可謂切中時病凡世之趨附權勢以圖身利者豈問其人賢否果能為國為民哉及其敗也相推入禍門而已聾俗無知諂祭非鬼無異也䂬溪感事門三山語録登慈恩寺塔詩譏天寶時事也山者人君之象秦山忽破碎則人君失道矣賢否自混淆而清濁不分故曰涇渭不可求天下無綱紀文章而上都亦然故曰俯視但一氣焉能辨皇州於是思古之聖君不可得故曰回首呌虞舜蒼梧雲正愁是時明皇方耽於滛樂而不已故曰惜哉瑶池飲日宴崑崙丘賢人君子多去朝廷故曰黄鵠去不息哀鳴何所投惟小人貪竊禄位者在朝故曰君㸔隨陽雁各有稻粱謀同上西清詩話云退之宿龍宫灘詩云浩浩復湯湯灘聲抑更揚黄魯直曰退之才聽水句尤見工謂浩浩湯湯抑更揚者非諳客裏夜卧飽聞聲安能周旋妙處如此耶漁隠叢話東坡云南澗中詩秋氣集南澗獨遊亭午時回風一蕭瑟林影久参差始至若有得稍深遂忘疲羈禽響幽谷寒藻舞清漪去國魂已游懐人涙空垂孤生易為感失路少所宜索寞競何事徘徊只自知誰為後來者當與此心期柳儀曹詩憂中有樂樂中有憂盖絶妙古今矣然老杜云王侯與螻蟻同盡隨丘墟儀曹何憂之深也蔡寛夫詩話云子厚之貶其憂悲憔悴之欲發於詩者特為酸楚而已傷志固君子所不免然亦何至是卒以憤死未為達理也樂天既遇閑放浪物外若真能脫屣軒冕者然榮辱得失之際銖銖校量而自矜其達每詩未嘗不着此意是豈真能忘之者哉亦能勝之耳惟淵明則不然觀其貧士責子與其他所作當憂則憂遇喜則喜忽然憂樂兩忘則隨所遇而皆適未嘗有擇於其間所謂超世遺物者要當如是而後可也觀三人之詩以意逆志人豈難定以是論賢不肖之實亦何可乎隠居詩話云樂天題海圖屏風詩畧曰或者不量力謂兹鼇可求贔屭牽不動綸絶沉其鈎一鼇既頓頷諸鼇齊掉頭噴風激飛亷鼔波怒陽秋遂使江漢水朝宗意亦休吾讀此詩感劉隗李訓薛文通等事為之太息老杜所以為人稱慕者不獨文章為工盖其語黙所主君臣之外非父子兄弟即朋友黎庶也嘗觀韋應物詩及兄弟者十之二三廣陵覲兄放情且為歡累日不知饑冬至寄諸弟云已懐時節感更抱别離酸元日寄諸弟云日月昧逺期念君何時歇社日寄云遥思里中會心緒恨微微寒食聨騎定何時吾今顔已老又云把酒㸔花想諸弟杜陵寒食早青青初秋寄云髙梧一葉下空齋歸思多聞蟬寄諸弟云緘書報是時此心方耿耿登郡樓寄諸季云上懐犬馬戀下有骨肉情凡觀此集者雖讒䦧交瘉當一變而怡怡也黄常明詩話總龜後集巻二十一欽定四庫全書詩話總龜後集巻二十二宋阮閱撰用事門臨川慷慨秋風起悲歌不爲鱸眉山不須更說知㡬早直爲鱸魚也兩賢反復曲折同歸一意亦如把酒祝公公莫拒緇衣心爲好賢傾我欲折繻留此老緇衣誰作好賢詩共用一事而造語居然不同䂬溪臨川道德文章吾事落南華夫子盍行邪無落吾事乃栁詩有惆悵樵漁事今還又落然恐亦用此同上杜心迹喜雙清茶瓜留客遲似非用事觀靈運齋中詩云矧乃歸山川心迹雙寂寞竟陵王子良禮才好士夏月客至爲設瓜飲甘果二詩蓋用此至若椶拂子云咂膚倦撲滅頼爾甘伏膺雖等閒題目無字無出處同上坡集有全篇用事者如賀人生子自鬱葱佳氣夜充閭喜見徐卿第二雛我亦從来識英物試教啼看定何如戲子野買妾自錦里先生自笑狂身長九尺鬢眉蒼平生謬作安昌客畧遣彭宣到後堂句句用事曷嘗不流便哉同上嘗觀臨川詠棗止數韻餘甘入鄰家尚得饞婦逐贄享古巳然豳詩自宜錄用女贄棗脩八月剝棗雖云食之昏用蔚宗棗膏昏䝉䝉願比赤心投皇明倘加燭用蕭琛陛下投臣以赤心臣敢不報以戰栗以是知凡作者須飽材料傳稱任昉用事過多屬辭不得流便余謂昉詩所以不能傾沈約者乃才有限非用事之過同上李商隠詩好積故實如喜雪云班扇慵裁素曹衣詎比麻鵞歸逸少宅鶴滿令威家又洛水妃虚妬姑山女謾誇聨辭雖許謝和曲本慙巴一篇中用事者十七八同上夢得詩只恐鳴騶催上道不容待得晚菘嘗乃周彦倫答文惠太子問山中菜食云春初早韭秋末晚菘此以兩字用事者送熊判官云臨軒弄郡章得人方付此乃用漢髙弄印兒寛事此一字用事者黄常明韋應物詩心同野鶴與塵逺詩似氷壺徹底清又雜言送人云氷壺見底未爲清少年如玉有詩名此可爲用事之法蓋不拘故常也同上甫宜春苑詩云無復増脩事君王惜費金乃暗用漢文惜百金之産而罷露臺事同上沈慶之謂上曰爲國譬如治家耕當問奴織當問婢陛下欲治國而與白面書生謀之事何由濟夢得送李䇿云春風深日静争長幽鳥鳴僕夫前致辭門有白面生同上坡藍尾忽驚新火後遨頭要及浣花前注及樂天三杯藍尾酒一楪膠牙餳觀長慶集此詩題云七年元日對酒非鑽火時事也宋文景守歳云且盡燈前藍尾杯䂬溪師曠釋絳縣老人年數云亥有二首六身蓋離拆亥字㸃畫而上下之如算籌縱横然則下其二首為二萬六身各一縱一横為六千六百六十正合其甲子之日數傳以明曠之博物劉賓客送人赴絳州云午橋羣吏散亥字老人迎義山贈絳臺老驛吏云過客不勞詢甲子惟書亥字與時人可謂善使事矣亦如近詩送人洪州云干斗氣沈人巳化置芻人去榻猶懸送人鄂州云黄鶴晨霞傍樓起頭陀青草繞碑荒送人襄陽云四葉表閭唐尹氏一門逃世漢龎公雖鄰封宻邇不可移也䂬溪凡作詩有用事出處有造語出處如五陵衣馬自輕肥雖出論語總合其語乃潘岳裘馬悉輕肥栁絮才髙不道鹽雖謝女事乃借張融以海賦示人人評其賦但不道鹽耳紅袖泣前魚本戰國事其語乃陸韓卿中山王孺子妾歌安陵泣前魚坡作太白畫像詩云大兒汾陽中令君小兒天台坐忘身其事乃用白交汾陽於行伍中竟脫白於禍天台司馬子微謂白有仙風道骨可與神遊八極之表所造之語乃禰衡傳云大兒孔文舉小兒楊徳祖同上坡遊武昌見農夫皆騎秧馬較之傴僂而作者勞佚相絶嘗作秧馬歌叙述甚詳唐子西至羅浮始識此器作詩云擬向明時受一㕓著鞭常恐老農先行藏巳問吾家舉從此馳名四十年亦巧於用事黄常明坡和栁子玉暨景純岡字韻詩至七篇云屢把鉛刀齒步光更遭華衮照厖凉乃用子建七啓云步光之劍華藻繁縟左傳厖凉冬殺雖第一韻衆人所更易而七篇未嘗改又貫穿精絶如此同上東坡在儋耳時余三從兄延始之自江陰擔簦萬里絶海往見留一月坡嘗誨以作文之法曰儋州雖數百家之聚州人之所需取之市而足然不可徒得也必有一物以攝之然後爲已用所謂一物者錢是也作文亦然天下之事散在經子史中不可徒使必得一物以攝之然後爲已用所謂一物者意是也不得錢不可以取物不得意不可以用事此作文之要也吾兄拜其言而書諸紳嘗以親製龜冠為獻坡受之而贈以詩云南海神龜三千歳兆叶朋從生慶喜智能周物不周身未免人鑽七十二誰能用爾作小冠岣嶁耳孫剏其製今君此去寧復来欲慰相思時整視今集中無此詩余嘗見其親筆後坡歸宜興道由無錫洛社嘗至孫仲益家時仲益年在髫齔坡曰孺子習何藝孫曰學對屬坡曰試對看徐曰衡門稚子璠璵器孫應聲云翰苑仙人錦繡腸坡撫其背曰真璠璵器也異日不凡二事皆吾鄉人士所知輒記於此韻語陽秋謁帝似馮唐垂白馮唐雖晚達馮唐毛髮白長卿多病久我多長卿疾病渇汙官位杜以其爲郎故用之若他人老與病恐不可槩使同上用已詩為故事須作詩多者乃有之太白云滄浪吾有曲相子棹歌聲樂天須知菊酒登髙會從此無多二十場明年云去秋共數登髙會又被今年減一場過槩里云昔嘗詠遺風著為十六篇蓋居渭上醖熟獨飲曽效淵明體為十六篇又贈微之云昔我十年前會與君相識曽將秋竹竿比君孤且直蓋舊詩云有節秋竹竿也坡赴黄州過春風嶺有兩絶句後詩云去年今日關山路細雨梅花正斷魂又云柯邱海棠吾有詩獨笑山林誰敢侮又有竹云吾詩固云爾可使食無肉同上唐諺云槐花黄舉子忙東坡有强隨舉子踏槐花槐花還似昔年忙谷云槐催舉子踏花黄是也世傳五月十三日爲竹迷日凡種多以五月杜云東林野竹薄臘月更須栽則唐人植竹用季冬月也又云平生憩息地必種數竿竹嘗欲闢小軒以必種名之同上前輩戲語以郊外呵唱月下籠燭皆謂之殺風景介甫戲示穎叔云但怪傳呼殺風景豈知禪客夜相投蓋用此也同上老杜途窮反遭俗眼白本用阮籍事意我輩本宜以白眼視俗人至小人得志疾視君子是反遭其白眼故倒用之亦如水清反多魚乃倒用水至清則無魚也夢得酌我莫憂狂老来無逸氣乃例用蓋次公無多酌我寄謝􅄞中散予無甚不堪倒用絶交論坡云後生可畏吾衰矣刀筆從来錯料堯周昌以趙堯刀筆吏後果無能為所料信不錯而云錯料堯亦以涉譏謗倒用耳又有窮鬼却相呼乃知飯後鐘闍黎蓋具眼他年五君詠山王一時數皆倒用也䂬溪坡云通家不隔同年面得路方知異日心乃唐人責同年不赴期集辭云紫陌尋春尚隔同年之面青雲得路不知異日之心任昉别謝雲陽詩云詎念耋嗟人方深老夫託報劉孝綽云詎慰耋嗟人徒深老夫託畧改一兩字豈以會意處欲常用之邪臨川有暮林揺落獻南山又云朩落岡巒因自獻如云名譽子真矜谷口事功新息困壺頭又未愛京師傳谷口但知鄉里勝壺頭昔人行事措意黙與已合則喜用之馬少游欲乗下澤御欵段不去鄉里雖自謀獨善亦可爲貪躁之戒伏波在浪泊下潦上霧仰視飛鳶跕跕墮水中臥念少游平生時語以爲何可復得故坡云何須更待飛鳶墮方念平生馬少游又大夫行役家人怨應念鄉居馬少游雪堂惟有思歸曲為念平生馬少游以其可喜不僅押韻也䂬溪律詩有一對通用一事者更尋嘉樹傳莫忘角弓詩乃左傳韓宣子聘魯嘗賦角弓及譽嘉樹魯人請封殖此樹以無忘角弓介甫久諳郭璞言多驗老比顔含意更疏乃景純欲爲顔含筮含曰年在天位在人修已而天不與命也守道不回性也人自有性命無勞蓍龜同上古人作詩有用經傳全句選詩小人計其功君子道其常樂天疾惡如巷伯好賢如緇衣乃兩句渾用之杜云无妄之憂勿藥喜誰謂荼苦甘如薺富貴於我如浮雲近人亦多用史語坡云人言盧杞似姦邪我見鄭公但娬媚嘗觀南史載王宜興云為刼不須伴甚似一仄韻五言但無題目耳同上昔人用五馬事多因遊遨動出處方用之如老杜賦王閬州餞蕭遂州云二天開寵餞五馬爛生光其賓主出住分矣又送李梓州五馬何時到贈嚴武五馬舊曽諳小徑送賈閣老出汝州人生五馬貴太白云五馬莫留連岑參云門外不須催五馬戎昱五馬㡬時朝魏闕子厚五馬助征騑樂天五馬無由入酒家東坡鼓吹未容迎五馬介甫尚待使君驅五馬近人於太守安居閉閣例稱五馬此理恐未安也丹陽集詩話總龜後集巻二十二欽定四庫全書詩話總龜後集巻二十三宋阮閱撰紀實門唐文皇聚一時名流天策府始有十八學士之號後来凡居館殿者皆稱之國朝以来任於外非兩制則雖帥守監司上呼寄祿官惟通判多從館中帶職出補如蔡君謨湖州歐陽文忠公滑州王荆公舒州東坡先生杭州如此之類甚多劉贛父赴泰倅詩云璧門金闕倚天開五見宫花落早梅明日扁舟滄海去却尋雲氣望蓬萊蓋在道山五載然後得之學士之稱施於外者繇通判而然今外庭過呼大可笑也揮麈錄老杜送殿中楊監赴蜀見相公云豪俊貴勲業邦家頻出師相公鎮梁益軍事無孑遺以是知邊鄙之臣貪功生事結禍招釁皆有以致之一得忠臣處之生靈受賜矣黄常明文選載王粲公讌詩注云此侍曹操宴也操未為天子故云公讌耳操以建安十八年春受魏公九錫之命公知衆情未順終其身不敢稱尊而粲詩巳有願我賢主人與天享巍巍之語則粲豈復有心於漢耶粲嘗說劉表之子琮曰曹公人傑也將軍巻甲倒戈以歸曹公長享福祚萬全之䇿也厥後操以粲為軍諮祭酒則以腹心委之矣韻語陽秋或云韋應物乃韋后之族憑恃恩私作里中横故韋集載逢楊開府詩云少事武皇帝無頼恃恩私身作里中横家藏亡命兒武皇升仙去把筆學題詩兩府始收迹南宫謬見推夫武皇平内亂殺韋后不應后之族敢於武皇之時豪横若此正恐非后族爾李肇國史補言應物性髙潔鮮食寡欲所居焚香埽地而坐與楊開府詩所述不同豈武皇仙去之後折節悔過之時耶曾文清吉父孔毅父之甥也早從學於毅父文清以䕃入仕大觀初以銓試合格五百人爲魁用故事賜進士出身紹興中明清以啓贄見云傳經外氏早侍仲尼之閒居提筆文場曽寵于津之為首文清讀之喜曰可謂著題矣後與明清詩云吾宗擇壻得羲之令子傳家又絶竒甥舅從来多酷似弟兄如此信難爲徐敦立覽之笑云此乃用前日之啓為體修報耳同上老杜卒於大歴五年享年五十九當生於先天元年觀其獻大禮賦表云臣生陛下淳樸之俗行四十載矣以此推之天寶十載始及四十則是獻大禮賦當在天寶九載也本傳以爲天寶十三載因獻三賦帝竒之待制集賢院誤矣其後又進西嶽賦序云上既封泰山之後三十年按史開元十三年乙丑封泰山至天寶十三載始及三十年則是進西嶽賦在天寶十三載也老杜有贈獻納使田舎人詩云舎人退食收封事宫女開函近御筵曉漏追隨青瑣闥晴窓㸃檢白雲篇揚雄更有河東賦惟待吹嘘送上天其云更有河東賦當是獻西嶽賦時也丹陽集羊叔子鎮襄陽嘗與從事鄒湛登峴山慨然有泯没無聞之歎峴山亦因是以傳古今名賢賦詠多矣吳興東陽二郡亦有峴山吳興峴山去城三里有李適之窪尊在焉東坡守吳興日嘗登此山有詩云苕水如漢水鱗鱗鴨頭青吳興勝襄陽萬瓦浮青冥我非羊叔子愧此峴山亭悲傷意同此歳月如流星湛輩何足道當以徳自銘東陽峴山去東陽縣亦三里舊名三邱山宋商仲文素有時望自謂必登台輔忽除東陽太守意甚不樂嘗登此山悵然流涕郡人愛之如襄陽之於叔子因名峴山二峯相峙有東峴西峴唐寶歴中縣令于興宗結亭其下名曰涵碧劉禹錫有詩云新開潭洞疑仙府逺冩丹青到雍州即其所也葛立之張籍居韓門弟子之列又以愈薦爲國子博士東坡所謂汗流湜籍走且僵滅没倒景不可望者而籍作愈祭詩乃云公文爲時師我亦有微聲而後之學者或號爲韓張何耶丹陽集陳後主起臨春結綺望仙三閣極其華麗後主與張麗華孔貴妃各居其一與狎客賦詩互相贈答采其艶麗者被以新聲奢淫極矣隋克臺城後主與張孔坐視無計遂俱入井所謂胭脂井是也楊修詩云擒虎戈矛滿六宫春花無樹不秋風倉惶益見多情處同穴甘心赴井中李白亦云天子龍沈景陽井誰歌玉樹後庭花今胭脂井在金陵之法寶寺井有石欄紅痕若胭脂相傳云後主與張孔淚痕所染石欄上刻後主事迹八分書乃大歴中張著文又有篆書戒哉戒哉數字其他題刻甚多往往漫滅不可攷寺即景陽宫故地也其井在焉好事者往来不絶寺僧頻厭苦之張芸叟嘗有詩戲僧云不及馬嵬韈猶能致萬金馬少游常哀兄援多大志曰士生一世但取衣食裁足乗下澤車御欵段馬鄉里稱善人斯可矣致求贏餘但自苦爾故援在浪泊西里當下潦上霧雲氣熏蒸仰見飛鳶跕跕墮水中之時轉思其言以爲念少游語何可得也洎武陵五溪蠻作亂劉尚軍没而援貪進不止方且據鞍矍鑠被甲請行遂底壺頭之困劉夢得經伏波神祠詩有一以功名累翻思馬少游之句可謂名言矣壺頭在武陵當是夢得為司馬時經歴故篇首言䝉䝉篁竹下有路上壺頭韻語陽秋武帝見顔駟龎眉皓首問何時為郎何其老也對曰文帝好文而臣好武景帝好老而臣尚幼陛下好少而臣老矣老於為郎此事尤著竊怪老杜屢傷為郎白首毎稱馮唐而不及駟生前既不遇三君身後復不遇老杜可笑也巳䂬溪子美世號詩史觀北征詩云皇帝二載秋閏八月初吉送李校書云乾元元年春萬姓始安宅又戲贈友二首元年建巳月郎有焦校書元年建巳月官有王司直史筆森嚴未易及也黄常明舎人遺織成褥段云服飾定尊卑大哉萬古程煌煌珠宫物寢處禍所嬰錦衾巻還客始覺心和平其意在明分守警貪饕屏斥玩物嚴道氣之大節豈直專為詩哉就中和平之語尤可人意世有豪横凶人强委饋於善士而不能驟絶之其心愧恥雖欲和平不可得也䂬溪諸史傳首尾一律惟左氏傳春秋則不然千變萬狀有一人而稱目至數次異者族氏名字爵邑諡號皆宻布其中而寓諸褒貶此史家祖也觀少陵詩直隠此㫖若云杜陵有布衣杜曲幸有桑麻田杜子將北征臣甫憤所切甫也東西南北人有客有客字子美葢自見其里居名氏也不作河西尉白頭拾遺徒步歸備員均補衮凡才汙省郎補官遷徙歴歴可攷至叙他人亦然如云粲粲元道州又云結也實國榦凡例森然誠春秋之法也䂬溪人以藤代篘酒名鈎藤俗傳他處即不可用或謂但必醖造之法異耳所在皆可樂天忠州春詩云閒拈蕉葉題詩詠悶取藤枝引酒嘗是巴蜀亦有之黄常明詩話總龜後集巻二十三欽定四庫全書詩話總龜後集巻二十四宋阮閱撰用字門子美有同學少年多不賤小徑升堂舊不斜羣仙不愁思夕烽来不近皆人所不敢用甚類周禮凡師不功左傳仁而不武晉人聞有楚師師曠曰不害楚歸而動不後才以易無字耳而語勢頓壯黄常明杜詩有用一字凡數十處不易者如緣江路熟俯青郊傲睨俯峭壁展席俯長流杖藜俯沙渚此邦俯要衝四顧俯層巔旄頭俯淵瀍層臺俯風渚游目俯大江汀檻俯鴛鴦其餘一字屢用若此類多不可述同上張文潛法雲懐無咎云獨覺欠此公或謂其語生文潛獨以欠字為得意然夢得送皇甫云從兹洛陽社吟詠欠書生樂天可憐閒氣味惟欠與君同得君更有無厭意猶恨尊前欠老劉退之云今者誠自幸所懐無一欠張何得意之有同上賈島攜新文謁韓愈云青竹未生翼一步萬里道安得西北風身願變蓬草可見急於求師愈贈詩云家住幽都逺未識氣先感来尋吾何能無殊嗜昌歜可見謙於授業此皆島未儒服之時也洎愈教島為文遂棄浮屠學舉進士摭言載島初赴名塲於驢上吟鳥宿池邊樹僧敲月下門遇權京尹韓吏部呵喝而不覺洎擁至馬前則曰欲作敲字又欲作推字神游詩府致衝大官愈曰作敲字佳矣是時島識韓已久矣使未相識愈豈肯教其作敲字耶丹陽集凡聚落相近期某旦集交易鬨然其名爲虚栁云綠荷包飯趂虚人臨川云花間人語趂朝虚山谷箬葉裹鹽同趂虚人集春蔬好趂虚黄常明數物以个謂食爲喫甚近鄙俗獨杜屢用峽口驚猿聞一个兩个黄鸝鳴翠栁却繞井欄添个个送李校書云臨岐意頗切對酒不能喫樓頭吃酒樓下臥但使殘年飽喫飯梅熟許同朱老喫蓋篇中大槩竒特可以映帶者也坡云筆工傚諸葛散卓反不如常筆正如人學老杜詩但見其粗俗耳同上野飯射麋新本老杜郊居然左氏楚人致晉師晉人逐之樂伯餘一矢射麋以獻又晉師及熒澤魏錡射麋以獻楚潘黨曰子有軍事獸人無乃不給於鮮皆飯於野而射麋新事也又市喧宜近利亦止稱東屯所居蓋齊侯欲更晏子宅曰湫隘囂塵晏子辭曰近市小人之利也市喧而近利事餘惟一兩字暗貫經傳者可勝數哉同上杜云南風作秋聲殺氣薄炎熾蓋用易雷風相薄左氏寧我薄人毋人薄我軍志先人有奪人之心薄之也同上劉禹錫謫連州作畬田詩云何處好畬田團團縵山腹下種暖灰中乗陽坼芽孽又作竹枝詞云銀釧金釵来負水長刀短笠去燒畬嘗觀辰沅亦然瘠土之民亦倍其勞而耕反鹵莽也夢得蠻子歌云蠻貊鈎輈音椎髻衣花布熏狸掘沙鼠時節祠槃瓠忽逢乗馬客恍若驚麕顧腰斧上髙山意行無舊路賓客謫居朗州而五溪習俗盡得之矣黄常明杜集多用經書語如車鄰鄰馬蕭蕭未嘗外入一字如天屬尊堯典神功協禹謨卿月升金掌王春度玉墀濟潭鱣發發春草鹿呦呦皆渾然嚴重如天陛赤墀植璧鳴玉法度森嚴然後人不敢用者豈所造語膚淺不類耶同上作詩在於練字如老杜飛星過水白落月動沙虚是練中間一字地坼江帆隱天清朩葉聞是練末後一字酬李都督早春詩云紅入桃花嫩青歸栁葉新若非入與歸二字則與兒童之詩何異葛常之霄漢瞻佳士泥塗任此身只任字即人不到處自衆人必曰歎曰愧獨無心任之所謂視如浮雲不易其介者也繼云秋天正揺落回首大江濱不知大觀傲睨天地汪汪萬頃奚足云哉坡有白衣送酒舞淵明人有疑舞字太過者及觀庾信答王褒餉酒云未能扶畢卓猶足舞王戎蓋有所本黄常明杜子美西郊詩云無人競来往或云無人與来往或云無人覺来往競與皆常談覺字非子美不能道也蓋煬者避竈有道者之所驚舎者争席隠居者之所貴也丹陽集舊傳賈浪仙搆思僧敲月下門或引推作推勢遂沖尹節世傳為美談舊於太學得江御史詩一軸有督人和詩云直饒煅煉經時序若是推敲總可刪以是知雷同從非善學也䂬溪舊觀臨川集肯顧北山如慧約與公西崦斸莓苔常愛其斸字最有力後讀集當為斸青冥藥許鄰人斸退之詩翁憔悴斸荒棘窙豁斸株橜子厚戒徒斸雲根雖一字之法不無所本同上杜詩四韻并絶句味之皆覺字多以字字不閒故也他人雖長篇若無可讀正如賢人君子並處朝廷但一二相助巳號為得人若不能為有無者縱累千百輩蔑如也秦少游雨砌墮危芳風軒納飛絮之類李公擇以爲謝家兄弟得意不能過也潘邠老云七言詩第五字要響如返照入江翻石壁歸雲擁樹失山村翻字失字是響字也五言詩第三字要響圓荷浮小葉細麥落輕花浮字落字是響字也所謂響者致力處也予竊以為字字當活活則字字自響吕氏童䝉訓押韻門孔毅父雜記云退之詩好押狹韻累句以示工而不知重疊用韻之為病也雙鳥詩押兩韻字李花詩押兩花字苕溪漁隠曰讀皇甫湜公安園池詩亦押兩閒字日夜不得閒君子不可閒蓋退之好重疊用韻以盡已之詩意不恤其為病也學林新編云杜子美飲中八仙歌曰知章騎馬似乗船又曰天子呼来不上船一曰眼花落井水底眠又曰長安市上酒家眠一曰汝陽三斗始朝天又曰舉觴白眼望青天一曰皎如玉樹臨風前又曰蘇晉長齋繡佛前又曰脫帽露頂王公前此歌三十二句而押二船字二眠字二天字三前字近時論詩者曰此歌一首是八段不嫌於重用韻也某案子美此歌以飲中八仙歌五字為題則是一歌也此歌首尾於船字韻中押未嘗移别韻則非分為八段蓋子美古律詩重用韻者亦多况於歌乎如園人送瓜詩曰沈浮亂水玉愛惜如芝草又曰園人非故侯種此何草草一篇押二草字也上後園山脚詩曰蓐收困用事元冥蔚彊梁又曰登髙欲有往蕩析川無梁一篇押二梁字也北征詩曰維時遭艱虞朝野少暇日又曰老夫情懐惡嘔泄臥數日一篇押二日字也䕫府詠懐詩曰雖云隔禮數不敢墜周旋又曰淡交隨聚散澤國遶回旋一篇押二旋字也贈李八秘書詩曰事殊迎代邸喜異賞朱虚又曰風烟巫峽逺臺榭楚宫虚一篇押二虚字也贈李邕詩曰放逐早聨翩低垂困炎厲又曰哀贈終蕭條恩波延掲厲一篇押二厲字也贈汝陽王詩曰自多親棣萼誰敢問山陵又曰鴻寶金寧秘丹梯庶可陵一篇押二陵字也喜薛璩岑參遷官詩曰栖遲分半菽浩蕩逐浮萍又曰仰思調玉燭誰定握青萍一篇押二萍字也寄賈岳州嚴巴州兩閣老詩曰討胡愁李廣奉使待張騫又曰如公盡雄雋志必在騰騫一篇押二騫字也子美詩如此類甚多雖然子美非創意為此者蓋有所本也按文選載古詩曰晨風懐苦心蟋蟀傷局促又曰音響一何悲絃急知柱促一篇押二促字也曹子建美女篇曰明珠交玉體珊瑚間朩難又曰佳人慕髙義求賢良獨難一篇押二難字也謝靈運述祖徳詩曰段生藩魏國展季救魯人又曰外物辭所賞勵志故絶人一篇押二人字也又南園詩曰樵隱俱在山由来事不同又曰賞心不可忘妙善冀能同一篇押二同字也又初去郡詩曰或可優貪競豈足稱達生又曰畢娶類尚子薄遊似邴生一篇押二生字也陸士衡擬古詩曰此思亦何思思君徽與音又曰驚飇褰反信歸雲難寄音一篇押二音字也又豫章行曰汎舟清川渚遥望髙山陰又曰寄世將㡬何日昃無停隂一篇押二陰字也阮嗣宗詠懐詩曰如何當路子磬折忘所歸又曰黄鵠游四海中路將安歸一篇押二歸字江淹雜體詩曰韓公淪賣藥梅生隠市門又曰太平多歡娯飛蓋東都門一篇押二門字王仲宣從軍詩曰連舫踰萬艘帶甲千萬人又曰我有素餐責誠愧伐檀人一篇押二人字古人詩自有體格杜子美亦傚古人之作耳韓退之贈張籍詩一篇押二更字二陽字又岳陽樓别竇司直詩押二向字又李花詩押二花字又雙鳥詩押二州字二頭字二秋字二休字又和盧郎中送盤谷子詩押二行字又示爽詩押二愁字又义魚詩押二銷字寄孟郊詩押二奥字此日足可惜詩押二光字白樂天渭村退居詩押二房字夢遊春詩押二行字寄元微之詩押二夷字出守杭州路次藍溪詩押二水字遊悟真寺詩押二槃字其餘詩人如此疊用韻者甚多不可具舉意到即押耳奚獨於飲中八仙歌而致怪耶子瞻送江公詩曰忽憶釣臺歸洗耳又曰亦念人生行樂耳自注曰二耳義不同故得重用蓋子瞻自不必注聖祖上自嫌名書如州縣之縣者言架也若州縣之縣則别無他音嘗觀顔延之侍皇太子釋奠宴詩曰獻終襲吉即宫廣宴堂設象筵庭宿金縣沈約侍宴詩曰回鑾獻爵摐金委奠肄士辨儀胥人掌縣二人押韻皆作州縣之縣用何耶沈佺期哭蘇眉州詩云家愛方休杼皇慈更撤縣則當作平聲押丹陽集劉禹錫嘉話詩云作詩押韻須要有出處近欲押一餳字六經中無此字惟周禮吹簫處注有此一字終不敢押予按禹錫歴陽書事詩云湖魚香勝肉官酒重於餳則何嘗按六經所出耶洛陽伽藍記載河東人劉白墮善釀酒盛暑曬之日中經旬不壊當時謂之鶴觴白墮乃人名子瞻詩云獨看紅蕖傾白墮石林避暑錄云若以白墮爲酒則醋漫曹公湯燖右軍可也予按文選魏武帝短歌行云何以解憂惟有杜康康亦作酒人而選詩遂以為酒用東坡豈祖是耶䂬溪詩話總龜後集巻二十四欽定四庫全書詩話總龜後集巻二十五宋阮閱撰傚法門李商隱詠淮西碑云言訖屢頷天子頤雖務竒崛人臣言不當如此乗輿軒陛自不敢正斥如老杜天顔有喜近臣知虬鬚似太宗可謂知體矣東坡贈冩御容詩云野人不識日月角彷彿尚憶重瞳光天容誰能畫老師古寺畫閒房蓋遵此法䂬溪杜牧之詩字意多用老杜如觀東兵長句云黒矟將軍一鳥輕蓋用子美身輕一鳥過也遊樊川詩云野竹踈還宻巖泉咽復流蓋用子美小雨止還作斷雲疏復行也蓋其心景仰之切則下語自然相符非有意於蹈襲故其論杜詩云天外鳳凰誰得髓何人解合續絃膠豈非自以爲得髓者耶東坡贈孔毅甫詩云天下㡬人學杜甫誰得其皮與其骨前生子美只君是信手拈得俱天成學杜甫而得其皮骨者鮮矣又况其髓哉丹陽集沈攸之晚好讀書手不釋巻嘗歎曰早知窮達有命恨不十年讀書東坡再和劉景文介亭長篇云早知事大繆恨不十年讀䂬溪王元之到任表有全家飽煖盡荷君恩之語到今傳誦永叔用爲詩云諸縣豐登少公事全家飽煖荷君恩夢得亦嘗有云一生不得文章力百口空爲飽煖家白云不才空飽煖無力及飢貧同上樂天云身閒當貴真天爵官散無憂即地仙蓋用顔蠋晚食當肉早眠當富無事當貴也臨川愛眉山雪詩能用韻如云氷下寒魚漸可义和云羔袖龍鍾手獨义蓋子厚嘗云江魚或共义又云入郡腰常折逢人手盡义黄常明退之詠蚊蠅云凉風九月到埽不見踪跡夢得聚蚊云清商一来秋日曉羞爾微形飼丹鳥聖俞云薨薨勿久恃會有東方白王逢厚晝睡云蚊蟲交紛始誰造一一口吻如針錐噆人肌膚得腹飽不解黙去猶鳴飛雖然今尚爾無奈當有獵獵秋風時小人稔惡豈漏恢網但可僥倖目前耳左氏曰天之假助不善非佑之也將厚其惡而降之罰也其是之謂乎同上栁色黄金嫩梨花白雪香隂鏗詩也李太白取用之杜子美太白詩云李侯有佳句往往似隂鏗後人以爲以此譏之然子美詩有蛟龍得雲雨鵰鶚在秋天一聨已見晉書載記矣如氷肌玉骨清無汗水殿風来暗香滿孟蜀王詩東坡先生度以爲詞昔人不以蹈襲為非南部烟花錄夕陽如有意偏傍小窓明唐人方域詩新唐書藝文志有方域詩一巻烟花錄一名大業拾遺記文詞極惡可疑而大業幸江都記自有詩一巻唐著作郎杜寶所纂明清有之永平時揚州印本也揮麈錄詩體如八音歌建除體之類古人賦詠多矣用十二神爲詩者始見於沈炯山谷亦嘗效爲之余友人莫之用其祖戩嘗以辯舌說賊脫百人於死意其後必昌而之用乃貧不能以自存天理殆難曉也余嘗以此格作詩贈之云抱犬髙眠已云足更得牛衣有餘燠起来敗絮擁懸鶉誰羨龍髯織氷縠踏翻菜園底用羊從他春雷吼枯腸擊鐘烹鼎莫渠愛小芼自詡猴葵香半世飢寒孔移帶鼠米占来身漸泰吉雲神馬日匝三摴蒱肯作猪奴態虎頭食肉何足誇隂德由来報宜奢丹竈功成無躍兔玉函方秘緣青蛇丹陽集坡有欲吐狂言喙三尺怕君瞋我却須吞嘗疑其語太怪及觀杜集亦有臨風欲慟哭聲出巳復吞韋蘇州髙歌長安酒中憤不可吞䂬溪杜云卿到朝廷說老翁漂零巳共滄浪客又朝覲從容問幽仄勿云江漢有垂綸其後夢得送陳郎中云若問舊人劉子政而今懶拙每如初送慧則云休公乆别如相問楚客逢秋心更悲小杜江湖酒伴如相問終老烟波不計程交游問我憑君道除却鱸魚更不聞商隠寄崔侍御云若向南臺見鶯友爲言垂翅度春風臨川舊人亦見如相問爲道方尋朩雁編歸見江東諸父老爲言飛鳥會知還聖俞倘或無忘問姓名爲言懶拙皆如故東坡單于若問君家世莫道中朝第一人皆有所因也黄常明韋應物詩擬陶淵明而作者甚多然終不近也答長安丞裴說詩云臨流意巳悽采菊露未晞舉頭見秋山萬事都若遺蓋效淵明采菊東籬下悠然見南山此中有真意欲辨巳忘言之句也然淵明解落世紛深入理窟但見萬象森羅莫非真親故因見南山而真意具焉應物乃因意悽而采菊因見秋山而遺萬事其與陶所得異矣葛常之苕溪云退之赤藤杖詩空堂晝眠倚戸牖飛電著壁搜蛟螭故東坡鐵拄杖云入懐氷雪生秋思倚壁蛟龍䕶晝眠山谷卭竹杖贊涪翁晝寢蒼龍挂壁皆用退之詩䂬溪杜云嗜酒狂嫌阮知非老笑蘧近集有素書欵欵誰憐杜彩筆遒遒獨勝江榻畔烟花常歎杜海中童丱尚追徐河魚潰腹空號楚汗足流骹始信吳皆用此格同上西京雜記載司馬相如將聘茂陵人女爲妾卓文君作白頭吟以自絶相如乃止樂府詩集謂白頭吟疾人以新間舊不能至白首故以爲名余觀張籍白頭吟云春天百草秋始衰棄我不待白頭時羅襦玉珥色未暗今朝巳道不相宜李白白頭吟云妾有秦樓鏡照心勝照井願持照新人雙對可憐影其語感人深矣至劉希夷作白頭吟乃云寄言全盛紅顔子須憐半死白頭翁此翁白頭真可憐伊昔紅顔美少年則是言男為女所棄而作與文君白頭吟之本意異矣韻語陽秋老杜贈李秘書觸目非論故新文尚起予太白酬竇公衡云曽無好事来相訪頼爾髙文一起予韋蘇州每一覩之子髙詠尚起予昌黎酬張韶州將經貴郡煩留客先惠髙文謝起予豈非用事偶合數公非蹈襲者䂬溪元白齊名有自来矣元微之冩白詩於閬州西寺白樂天冩元詩百篇合為屏風更相傾慕如此樂天必言微之詩得己格律頓進所謂每被老元偷格律是也然微之江陵放言與送客嶺南詩樂天皆擬其作何耶東坡嘗效山谷體作江字韻詩山谷謂坡收斂光芒入此窘步余於樂天亦云丹陽集仲長統云垂露成幃張霄成幄沆瀣當餐九陽代燭蓋取無情之物作有情用也自後竊取其意者甚多張志和則云太虚爲室明月爲燭王康琚則云華條當圜屋翠葉代綺窓吳筠則云綠竹可充食女蘿可代裾劉伶則云日月爲扃牖八荒爲庭衢皆是意也李義山無題詩云春蠶到死絲方盡蠟燭成灰淚始乾此又是一格今效此體爲俚語小詞傳於世者甚多不足道也丹陽集皮日休雜體詩序曰詩云螮蝀在東又曰鴛鴦在梁雙聲起於此也陸龜䝉詩序曰疊韻起自梁武帝云後牖有朽栁當時侍從之臣皆唱和劉孝綽云梁王長康强沈休文云載載每礙埭自後用此體作為小詩者多矣如王融所謂園衡炫紅蘤湖行曄黄華温庭筠所謂棲息銷心象簷楹溢艶陽皆傚雙聲而爲之者也陸龜䝉所謂瓊英輕明生竹石滴瀝碧皮日休所謂康莊傷荒凉生虜部伍苦皆傚疊韻而爲之者也南北朝人士多喜作雙聲疊韻如謝莊羊戎魏收崔巖輩戲謔談諧之語往往載在史冊可得而攷焉丹陽集詩話總龜後集巻二十五欽定四庫全書詩話總龜後集巻二十六宋阮閱撰節候門徽宗宣和七年十二月二十一日勅睿謨殿張燈預賞元宵曲宴近臣命左丞王安中中書侍郎馮熙載爲詩以進安中云上帝通明闕神霄廣愛天九光環日月五色麗雲烟紫袖開三極瓊璈列萬仙希夷塵境斷髣髴玉經傳妙道逢昌運真王撫契賢龜圖規大壯龍位正純乾穹昊親無間皇居綴自然剛風同變化祥氣共陶甄層觀星潢上重闉斗柄邊摩空百雉峻冠嶠六鼇連夢想何嘗到階升信有緣昕朝初放仗密宴忽聞宣清禁来鳴佩修郎入並肩獸鋪金半闔鸞障繡微褰霽景留庭砌雷文繪桷梴宫簾波錦漾殿榜字金填花擁巍巍座香浮秩秩筵嵩呼稱萬億韶奏侍三千華歳推堯厯元璣候舜璿氷霜知臘後梅栁認春前造化應呈巧芳菲巳鬬妍樛枝彫檻小多葉露桃鮮錯落飛杯斚鏘洋雜管絃承雲歌歴歴回雪舞翩翩黼幄祥氛合銅壺永漏延鎬京方置醴羲馭自停鞭上聖情彌渥諸臣意更䖍宗藩親魯衞相芾拱閎顛側弁恩光浹中觴詔蹕旋寶熏攜滿袖御果得加籩要賞嬉遊盛儀追步武遄騰身複道表送日夾城壖仰挹蒼龍象旁臨艮嶽巔謳歌紛廣陌簫鼓樂豐年赫奕攢輕幰珍竒集市㕓博盧多袒跣飲肆競蹁躚蕃衍開朱邸崔嵬照彩椽橋虹彎矗矗江練泮濺濺擊柝周廬晚張燈别院先餘霞揺綺暈列宿合珠躔浩蕩三山島棱層十丈蓮再趨天北極却立榻東偏既用家人禮仍占聖製篇兕觥從酩酊蟾魄待嬋娟轉盻隨親指環觀得從穿曲屏紅浪蹙巨柱赤虬纒光透垂枝井晶銜帶璧錢蕭臺千級峻重屋八窓全就席花墪匝行樽紫袖揎交輝方爍爍起立復闐闐䆳宇會寧過中宵勝賞專鋪陳尤有韻清雅不相沿戸箔明珠串欄缸水碧巻規模商􅀈鉒欵識魯壺鐫秦曲移筝柱唐粧儼鬢蟬窄襟珠綴領髙朶翠為鈿喜氣排寒沍輕颸洗静便層琳藉璣組方鼎炷龍涎瑪瑙供盤大玻璃琢琖圓暖金傾小榼屑玉釀新泉帝子天才異英姿棣萼聨頻看揮斗盌端是吸鯨川推食俱均逮攘餐及墜捐海螯初破殻江柱乍離淵寧數披綿雀休論縮頸鯿南珍誇飣餖北饌厭烹煎賜橘懐頳卵酡顔釂寶船言歸荷慈惠末節笑拘攣放鑰嚴扃啓籠紗逸足牽氷輪挂銀漢夜色映華韉人識重熈象功參獨斷權五辰今不忒六氣永無愆天紀承三古時雍變八埏比閭増版籍疆埸罷戈鋋文軌包夷夏弦歌徧幅員恢儒榮藻茆作士極魚鳶慶胄貽謀顯多男景福緜迓衡常穆穆遵路益平平亭障今踰隴耕耘久際燕信通鵬海漲威竄犬戎羶東擬封雲岱西將款澗瀍琳科宣蕊笈玉府下雲軿帝耤勤初播宫蠶長自眠繭絲登六寢稃米秀中田廟祀垂昭格壇光監吉蠲靈芝滋菌蠢甘醴湧潺湲合教龎風革頒經衆疾痊雨隨親禱降河避上流遷執契皇猷洽披圖福物駢太和輸槖籥妙用絶蹄筌此際君臣恱應先簡冊編雅稱魚罩罩頌述鼓咽咽詎比千齡遇猶聞四始箋羇臣起韋布陋質愧駑鉛驟俾陪機政由来出眷憐恩方拜綸綍報未効塵涓宻席叨臨勸凡踪第曲拳雖無三峽水曽步八花甎踰望知難稱非才合勉旃鈞天思盡賦賸續白雲牋熈載云化工欲放陽春到先教元冥戮衰草凝氷封地萬木僵誰向雪中探天巧璿璣星回斗指寅羣芳未知時巳春人心蕩漾趂佳節燈夕獨冠年華新昇平萬里同文軌井邑相連通四裔蘭膏競吐夜烘春和叔回車避羲轡巍巍九禁倚天開温風更覺先春来試燈不用雨花落迎陽爲却寒崔嵬宣和初載元冬尾瑞白纔消塵不起穆清光賞屬欽鄰錦繡雲龍頒宴喜初聞傳詔開睿謨步障㡬里承金鋪調音度曲三千女正似廣樂陳清都遏雲妙唱韓娥侣回雪飛花稱獨步千春蟠朩效紅英獻壽當筵豈金母上林晚色烟藹輕景龍遊人歡笑聲霞裾月佩擁仙仗翠鳳挾輦趨平成銅華金掌散晶彩翠碧重重簇珠琲先從前殿望脩廊日出綺霞紅茜海神光通透雲母屏驪龍出舞波濤驚煌煌黼座承天命座下錯落如明星榻前玉案肴核旅獸炭銀爐夜初鼓憲天重屋訝雲屯崇道簫臺疑蜃吐前楹火柱回萬牛藺卿璧碎色光浮周圍照耀眼界徹氷壺漾月生珠流㸃㸃金錢盡銜璧豹髓騰輝粲銀礫絲篁人籟有機緘皦繹清音傳屋壁須臾隨蹕登會寧如驂鸞鶴遊紫清彩蟾倒影上浮空纎雲不㸃惟光明四壁垂簾圍煖玉銀缸吐艶相連屬棼楣横帶碧玻璃一朶翠雲承日轂萬光閃爍争吐吞燭龍銜耀輝西崑又如電母神鞭馳金蛇著壁不可捫端信竒工通造化豈比胡人能幻假丹青漫數顧虎頭盤礴解衣催客冩此時帝御鈞天臺紫垣兩兩明三台尚方飲器萬金寶古玉未足誇雲雷帝旁侍女雲華品玉立仙標及時韻四音促柱泛笙簫應有翔鸞落千仞龍瓶㵼酒如流泉御厨絡繹紛珍鮮榻邊争欲供天笑快倒頗類鯨吸川厭厭夜飲方歡浹玉漏頻催鼓三疊金門初下醉歸時正見氷輪上城堞微臣去歳陪清班惡詩誤辱重曈觀小才易窮真鼠技再賦愈覺相如慳履道彦為二集中今不復印行故錄於此荆楚記云屈原以五月五日投汨羅而死人傷之以舟檝拯焉故武陵競渡用五月五日蓋本諸此劉夢得云今舉檝相和之音皆曰何在蓋所以招屈原也詩曰湘江五月平隄流邑人相將浮彩舟靈均何在歌已矣哀音振檝從此起又有招屈亭詩所謂曲終人散空江暮招屈亭前水東注是也今江浙間競渡多用春月疑非招屈之義及考沈佺期三月三日獨坐驩州詩云誰念招魂節翻爲禦魅囚王績三月三日賦亦云新開避忌之席更作招魂之所則以上巳爲招屈之時其必有所據也予觀琴操云介子推五月五日焚林而死故是日不得發火而異苑以爲寒食始禁烟蓋當時五月五日以周正言之耳今用夏正乃三月也屈原以五月五日死而佺期王績以上巳爲招魂之節者亦豈是耶歳時有祓除不祥之具而元日尤多如桃版葦索磔雞之類是也飲屠蘇酒亦所以祓瘟禳惡而法必自幼飲何耶顧况歳日口號云還丹寂寞羞明鏡手把屠蘇先少年白樂天元日贈劉夢得詩亦云與君同甲子歳酒合誰先元日飲酒則先卑而後尊自唐以来已如此矣四時月令云進椒酒次第當從小起而董勛告晉海西公曰小者得歳故先酒賀之老者失歳故後與酒似亦不爲無理並丹陽集先文康公晚歳卜居於寶溪之上建觀禊堂於水濱紹興癸丑與客汎舟修禊甚樂距永和癸丑不知其㡬癸丑也因與客相與推算自永和九年歳甲子一周爲晉義熈九年又一周爲宋元徽元年自後梁大通元年隋開皇十三年唐永徽四年開元元年大厯八年太和七年景福二年周顯徳二年本朝祥符六年熙寧六年皆歳在癸丑凡七百八十年矣乃作詩以紀其事云快雨霽亭午晴曦作春妍鄰曲饒勝士共開浮水筵中流愜嘯詠隱浪金壺偏紅芰初出水捧劍疑来前緬懐蘭亭會七百八十年可憐右軍癡生死情纒綿由来彭殤齊顧或謂不然吾黨殆天放卜夜就管絃尺六細腰女舞袖輕回旋且畢今日歡不期来者傳同上上巳日於流水上洗濯祓除去宿垢故謂之祓禊禊者潔也王逸少作蘭亭叙云永和九年歳在癸丑會於會稽山隂之蘭亭修禊事也當其羣賢畢集遊目騁懐之際而感慨係之乃有一死生爲虚誕齊彭殤為妄作之語議者以此咎羲之之未達也同上自冬至一百五日至寒食故世言寒食皆稱一百五杜子美一百五日夜對月云無家對寒食有淚如金波姚合寒食書事詩云今朝一百五出戸雨初晴則是詩人例以百五日爲寒食也或者乃謂自冬至至清明凡七氣至寒食止百五日殊不知厯家以餘分演之也司馬彪續漢書云介子推焚林而死故寒食不忍舉火至今有禁烟之說盧象所謂子推言避世山火遂焚身四海同寒食千秋爲一人是也太原一郡舊俗禁烟一月周舉為郡守以人多死移書惟秪禁烟三日子美清明詩云朝来新火起又家人鑽火用青楓皆在寒食三日之後則知禁烟止於三日也而韓翃有寒食即事詩乃云春城無處不飛花寒食東風御栁斜日暮漢宫傳蠟燭青烟散入五侯家不待清明而巳傳新火何耶元微之連昌宫詞云初過寒食一百六店舎無烟宫樹綠念奴覓得又連催特勅宫中許然燭一百六在清明前寒食之後是時店舎巳無烟而宫中然燭乃一時之權宜爾或云龍星朩之位也春屬東方心爲大火懼火盛故禁火是以寒食有龍忌之禁則所謂禁烟又未必爲子推設也同上詩話總龜後集巻二十六欽定四庫全書詩話總龜後集巻二十七宋阮閱撰詠物門杜集及馬與鷹甚多亦屢用屬對如老驥倦知道蒼鷹飢易馴老驥思千里飢鷹待一呼老馬倦知道蒼鷹飢著人驥病偏思秣鷹愁怕入籠放蹄知赤驥捩翅服蒼鷹老驥倦驤首飢鷹愁易馴驄馬行云吾聞良驥老始成此馬數年人更驚又不比俗馬空多肉一洗萬古凡馬空楊監出畫鷹云干戈少暇日真骨老崖嶂為君除狡兔㑹見翻韝上王兵馬二角鷹云安得汝輩皆其羣驅出六合梟鸞分畫鷹云何當擊凡鳥毛血灑平蕪餘尚多有之蓋以壯心未甘伏櫪嫉惡剛腸尤思排擊語曰驥不稱其力稱其徳也左氏曰見無禮於其君者如鷹鸇之逐鳥雀也少陵有焉葛常之周顒有云性命之在彼極切滋味之於我可除今人以活臠而資口腹者比比皆是也是誠何心哉或曰羊豕大身難於刲割蚶蛤微命易於烹熬如是則性命之小者尤不幸也鍾岏嘗告其師何子季曰車螯蚶蠣眉目内闕脣吻外緘不悴不榮曽草朩之不若無聲無臭與瓦礫其何算故可長充庖厨永爲口實何其仁於大而忍於細歟山谷信佛甚篤而晚年酷好食蟹所謂寒蒲束縛十六輩已覺酒興生江山又云雖爲天上三辰次未免人間五鼎烹乃果於殺如此何哉東坡在海南爲殺雞而作疏張乖崖在成都爲刲羊而轉經豈愛物之仁不能勝口腹之欲耶山谷談無碍禪蘇張行有為法亦各其所見爾永叔堪笑區區郊與島螢飛露濕吟秋草以爲二子之窮子美亦有暗飛螢自照水宿鳥相呼幸因腐草出敢近太陽飛雖吟詠微物曽無一㸃窮氣臨川蕭蕭出屋千尋玉竹也靄靄當窓一炷雲香也皆不名其物然子厚破額山前碧玉流泉也已有此格近詩蕨芽已作小兒拳退之已有初拳㡬枝蕨竹未嘗香也而杜子美詩云雨洗娟娟浄風吹細細香雪未嘗香也而李太白詩云瑶臺雪花數千㸃片片吹落春風香葛常之韓退之雙鳥詩多不能曉或者謂其詩有不停兩鳥鳴百物皆生愁不停兩鳥鳴大法失九疇周公不爲公孔子不爲邱之句遂謂排釋老而作其實非也前云一鳥落城市一鳥巢巖幽後云天公怪兩鳥各捉一處囚則豈謂釋老耶余嘗觀東坡作李白畫像詩云天人㡬何同一漚謫仙非謫乃其游揮斥八極隘九州化爲二鳥鳴相酬一鳴一息三千秋縻之不得矧肯求且知所謂雙鳥者退之與孟郊輩爾所謂不停兩鳥鳴等語乃實公告天之言甚其辭以譖二鳥爾落城市退之自謂巢巖幽謂孟郊輩也各捉一處囚非囚禁之囚止言韓孟各居天一方爾末云還當三千秋更起鳴相酬謂賢者不當終否當有行其言者同上本事云鮑當孤鴈詩云更無聲接續空有影相隨孤則孤矣豈若子美孤鴈不飲啄飛鳴尤念羣誰憐一片影相失萬重雲有不盡之意乎同上王誼伯謂西川有杜鵑東川無杜鵑蓋是題下注斷自我昔遊錦城為句首子瞻謂杜備諸家體非必牽合程度詩意蓋譏當時刺史有禽鳥不若者明皇以後天步多棘凡尊君者為有也懐貳者為無也魯直亦云臣結春秋二三策臣甫杜宇再拜詩忠臣銜憤痛切骨後世但識瓊瑰辭今觀此篇叙鴻鴈羔羊禮自太古尊君親上之意為明皇設不疑至於杜鵑行乃云雖同君臣有舊禮骨肉滿眼身羇孤又云爾惟摧殘始發憤羞帶羽翮傷形愚指斥罵詈殊無致嚴之語莫不皆有所主也黄常明東坡南都王誼伯書江濱驛垣謂子美詩歴五季兵火多舛缺竒異雖經其祖父所理尚有疑闕者誼謂西川有杜鵑東川無杜鵑涪萬無杜鵑雲安有杜鵑蓋是題下注斷自我昔遊錦城為首句誼伯悞矣且子美詩備諸家體非必牽合程度偘偘者然也是篇句處凡五杜鵑豈可以文害辭辭害意耶原子美之意類有所感託物以發者也亦六義之比興離騷之法歟按博物志杜鵑生子寄之他巢百鳥為飼之故江東所謂杜宇曽為蜀帝王化禽飛去舊城荒且禽鳥之微有識故子美詩云重是古帝魂又曰禮若奉至尊子美蓋譏當時刺史有不禽鳥若也唐自明皇以後天步多棘刺史能不忘君可得而考也嚴武在蜀雖横斂刻薄而實資中原是西川有杜鵑耳其不䖍王命負固以自抗擅軍旅絶貢賦如杜克遜在梓州爲朝廷西顧之憂是東川無杜鵑耳至於涪萬雲安刺史微不可考凡尊君者為有也懐貳者為無也不在夫杜鵑真有無誼伯以為来東川聞杜宇聲乃始疑子美跋疐紙上語又云子美不應疊用韻子美自我作古疊用韻無害於詩僕所見如此誼伯博學强辯殆必有以折中之䂬溪花卿歌云用如快鶻風火生南史曹景宗謂所親曰昔在鄉里與少年輩拓弓弦作霹靂聲箭如餓鴟呌覺耳後生風鼻尖出火子美蓋不拘泥於鴟鶻之異也黄常明栁子厚牡丹曰欹紅醉濃露窈窕留餘春坡云殷勤朩芍藥獨自殿餘春留與殿重輕雖異各有宜也楊中立梅詩云欲驅殘臘變春風只有寒梅作選鋒頗恨不與殿軍商確正一的對同上西湖浮動横斜之句最爲前輩擊節常恨未見全篇得其集觀之云衆芳揺落獨暄妍占盡風情向小園踈影横斜水清淺暗香浮動月黄昏霜禽欲下先偷眼粉蝶如知合斷魂幸有微吟可相狎不須檀板共金樽其卓絶不可及專在十四字耳又有七言數篇皆無如池水倒窺踈影動屋簷斜入一枝低雪後園林纔半樹水邊籬落忽横枝之句䂬溪千里蓴羮未下鹽豉蓋言未受和耳子美豉化蓴絲熟又豉添蓴菜紫聖俞送人秀州剰將鹽豉煑紫蓴魯直鹽䜴欲催蓴菜熟同上巴峽中有吐綬雞比常雞差大嗉藏肉綬長闊㡬數尺紅碧相間極煥爛常時不見遇晴日則向陽擺之頂首先出兩肉角亦二寸許然後徐舒其綬逾時乃斂李文饒詩所謂葳蕤散綬輕風裏若銜若垂何可擬是也文饒云出剡溪今詢之越人不復有予嘗自峽中攜至蘇州人皆不識則知山川風氣所産古今亦有不同也蔡寛夫詩話真珠雞生䕫峽山中畜之甚馴以其羽毛有白圓㸃故號真珠雞又名吐綬雞生而反哺亦名孝雉每至春夏之交景氣和煖頷下出綬帶方尺餘紅碧鮮然頭有翠角雙立良久悉斂於嗉下披其毛不復見或有死者割其頸臆間亦無所覩苕溪漁隠曰廣右閩中亦有吐綬雞余在二處見人多養之不獨巴峽中有也王荆公有絶句云樊籠寄食老低摧組麗深藏肯自媒天日晴明聊一吐兒童初見互驚猜倦游錄李衞公詩云五月畬田收火米三更津吏報朝雞頗似少陵句王荆公詩云紛紛易變浮雲白落落難鍾老柏青山谷蟹詩云巳標天上三辰次未免人間五鼎烹此皆得老杜句法雪浪齋日記唐故事中書省植紫薇花歴世循用之不以為非至今舍人院紫薇閣前植紫薇花用故事也樂天詩云獨坐黄昏誰是伴紫薇花對紫薇郎按天文志紫微大帝之座也天子之常居也主命主度也何關紫薇花事湘素雜錄嘗見曲中使栁三眠事不知所出後讀玉溪生江之嬀賦云豈如河畔牛星隔歳止聞一過不比苑中人栁終朝剰得三眠注云漢苑中有栁狀如人形號曰人栁一日三起三倒漫叟詩話玉溪生牡丹詩錦帳佳人乃越絶書中事退之燈花詩全似老杜所用黄裏事見前漢黄屋注中荆公詩曰溪邊飲啄白浮鳩浮鳩出晉志雪浪齋日記牧之和裴傑新櫻桃詩云忍用烹騂酪從將玩玉盤流年如可住何必九華丹唐人巳用櫻桃薦酪也苕溪漁隱曰摭言載唐新進士尤重櫻桃宴劉覃及第大會公卿和以糖酪用享人獻一小盤則唐人用櫻桃薦酪此事又可驗矣髙齋詩話老杜櫻桃詩云西蜀櫻桃也自紅野人相贈滿筠籠數回細冩愁仍破萬顆勻圓訝許同此詩如禪家所謂信手拈来頭頭是道者直書目前所見平易委曲得人心所同然但他人艱難不能發耳至於憶昨賜霑門下省退朝擎出大明宫金盤玉著無消息此日嘗新任轉蓬其感興皆出於自然故終篇遒麗韓退之有賜櫻桃詩云漢家舊種明光殿炎帝還書本草經豈似滿朝承雨露共看轉賜出青冥香隨翠籠擎偏重色照銀盤冩未停食罷自知無補報空然慙汗仰皇扃蓋學老杜前詩然搜求事跡排比對偶其言出於勉强所以相去甚逺若非老杜在前人亦安敢輕議詩眼温庭筠小詩尤工如牆髙蝶過遲又蝶翎胡粉重鴉背夕陽多又過蘇武廟詩云歸日樓臺非甲帳去時冠劍是丁年雪浪齋日記温飛卿晚春曲云家臨長信往来道乳燕雙雙拂烟草油壁車輕金犢肥流蘇帳曉春雞報籠中嬌鳥煖猶睡簾外落花閒不掃衰桃一樹近前池似惜容顔鏡中老殊有富貴佳致也苕溪漁隠韓偓詩云鵞兒唼啑雌黄觜鳳子輕盈膩粉腰事見崔豹古今注云蛺蝶大者為鳳子西清詩話傳道嘗於彭門壁間見書一聨云一鳩鳴午寂雙燕話春愁後以語東坡且謂公然否坡笑曰此唐人得意句僕安能道此苕溪漁隠曰余嘗用此語作春日一聨云話盡春愁雙紫燕喚回午夢一黄鸝同上陳恭公執中以衞尉寺丞知梧州驛遞上疏乞立儲貳真宗嘉其敢言翌日臨朝袖其疏以示執政歎奬久之召爲右正言然爲王冀公所忌一日真宗賦御溝栁詩宣示宰相兩省皆和進恭公因進詩曰一度春来一度新翠光長得照龍津君王自愛天然色恨殺昭陽學舞人東軒筆錄紅梅清艷兩絶昔獨盛於姑蘇晏元獻始移植西岡第中特珍賞之一日貴游賂園吏得一枝分接由是都下有二本公嘗與客飲花下賦詩曰若更遲開三二月北人應作杏花看客曰公詩固佳特比擬何淺也公笑曰顧傖父安得不然一坐絶倒王君玉聞盜花事以詩遺公云館娃宫裏舊精神粉瘦瓊寒露蕊新園吏無端偷折去鳳城從此有雙身自爾名園事培接遍都城矣苕溪漁隠曰王介甫紅梅詩云春半花纔發多應不奈寒北人初未識渾作杏花看與元獻之詩暗合然介甫句意俱工勝元獻逺矣西清詩話總龜後集巻二十七欽定四庫全書詩話總龜後集巻二十八宋阮閱撰詠物門歐陽文忠公極賞林和靖疎影横斜水清淺暗香浮動月黄昏之句而不知和靖别有詠梅一聨云雪後園林纔半樹水邊籬落忽横枝似勝前句不知文忠何緣棄此而賞彼文章大槩亦如女色好惡止繫於人苕溪漁隠曰王直方又愛和靖池水倒窺疎影動屋簷斜入一枝低以謂此句於前所稱真可處伯仲之間余觀此句畧無佳處直方何爲喜之真所謂一蟹不如一蟹也山谷爲詩當飽參然後臭味乃同雖爲大宗匠者亦然月觀横枝之語乃何遜之妙處也自林和靖一參之後參之者甚多雪浪齋日記唐人牡丹詩云紅開西子粧樓曉翠掲麻姑水殿春若改春作秋全是蓮花詩林和靖梅花詩云疎影横斜水清淺暗香浮動月黄昏近似野薔薇也陳輔之詩話凡詠梅多詠白而荆公詩獨云鬚撚黄金危欲墮蔕團紅蠟巧能糚不惟造語巧麗可謂能道人不到處矣又東坡詠梅一句云竹外一枝斜更好語雖平易然頗得梅之幽獨閒静之趣凡詩之詠物雖平淡巧麗不同要能以隨意造語爲工荆公後復有詩云遥知不是雪爲有暗香来蓋取蘇子卿云只言花似雪不悟暗香来之意公在金陵又有和徐仲顰文字韻梅詩二首東坡在嶺南有暾字韻梅詩三首皆韻險而語工非大手筆不能作也遯齋閒覽驛使前時走馬回北人從識越人梅清香莫把酴醿比只欠溪邊月下杯此梅二丈京師逢賣梅花絶句吾隨後輩猶及與之周旋覽其親書如見其抵掌談笑也東坡韓持國雖剛果特立風節凛然而情致風流絶出時輩許昌崔象之侍郎舊第今為杜君章所有㕔後小亭僅丈餘有海棠兩株持國每花開輒載酒日飲其下竟謝而去歳以爲常至今故吏猶能言之余嘗於小亭柱間得公二絶句其一云濯錦江頭千萬枝當年未解惜芳菲而今得向君家見不怕春寒雨濕衣尚可想見當時氣味韓忠獻公嘗帥蜀持國兄弟皆侍行尚少故前句云爾其二云長條無風亦自動柔艷著雨更相宜漫其後句苕溪漁隠曰鄭谷海棠詩云穠麗最宜新著雨妖嬈全在欲開時前輩以謂此兩句說盡海棠好處今持國柔艷著雨更相宜之句乃用鄭谷語也至於東坡作此詩則詞格超逸不復蹈襲前人其詩有嫣然一笑竹籬間桃李漫山總粗俗自然富貴出天姿不待金盤薦華屋朱脣得酒暈生臉翠袖巻紗紅映肉林深霧暗曉光遲日暖風輕春睡足雨中有淚亦悽愴月下無人更清淑元豐間東坡謫黄州寓定惠院院之東小山上有海棠一株特繁茂每歳盛開時必爲攜客置酒巳五醉其下矣故作此長篇平生喜爲人冩蓋人間刋石者自有五六本云軾平生得意詩也石林詩話隠居詩話云吕士隆知宣州好以事笞官妓妓皆欲逃籍而未能也會杭州有一妓到宣其色藝可取士隆喜之留之使不去一日郡妓復犯小過士隆又欲笞之妓泣訴曰某不敢辭罪但恐杭妓不能安也士隆愍而捨之聖俞因作莫打鴨一篇曰莫打鴨打鴨驚鴛鴦鴛鴦新向池邊浴不比孤洲老秃鶬秃鶬尚欲逺飛去何况鴛鴦羽翼長蓋謂此也詠物詩不侍分明說盡只彷彿形容便見妙處如魯直酴醿詩云露濕何郎試湯餅日烘荀令炷爐香義山雨詩云摵摵度瓜園依依傍水軒此不待說雨自然知是雨也後来魯直無已諸人多用此體吕氏童䝉訓苕溪漁隠曰裴璘詠白牡丹詩云長安豪貴惜春殘争賞先開紫牡丹别有玉杯承露冷無人起就月中看時稱絶唱以余觀之語句凡近不若胡武平詠白牡丹詩云璧堂月冷難成寐翠幄風多不奈寒其語意清勝過裴璘逺矣如皮日休詠白蓮詩云無情有恨何人見月冷風清欲墮時若移作詠白牡丹詩有何不可語更清切耳曼卿詠小桃二絶句云生色深紅綬帶長宫簾寒在井欄香母家升上瑶池品先得春風一面妝本分桃花寒食前小桃長是上春天二喬二趙俱傾國女弟嬌彊意自先其模冩命意豈不佳哉王直方詩話云或有稱詠松句云影揺千尺龍蛇動聲撼半天風雨寒者一僧在坐曰未若雲影亂鋪地濤聲寒在空或以語聖俞聖俞曰言簡而意不遺當以僧語爲優}
