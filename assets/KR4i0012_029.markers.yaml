  - {type: variant, offset: 4239, length: 0, content: '', WYG: 三十一宋阮閲撰詩䜟門上太祖采聼至明逺邊事纎悉必知有聞者西蜀還問劍外有何事聞者曰但聞城郭滿城誦朱山長苦熱詩曰煩暑欝蒸無所避凉風清泠幾時來曰此蜀人思我來取也古今詩話偽蜀每嵗除日諸宫門各給桃符書元亨利貞四字時昶子善書札取本宫策勳府書云天垂餘慶地接長春乾徳中伐蜀明年蜀除二月以兵部侍郎吕餘慶知軍府事以策勲府為治所太祖聖節號長春此天埀地接}
