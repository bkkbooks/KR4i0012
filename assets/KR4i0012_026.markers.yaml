  - {type: punctuation, offset: 326, content: (, id: KR4i0012_krp_026-bkkpn7}
  - {type: variant, offset: 328, length: 831, content: 遺史韋應物為蘇州太守嘗有詩贈米嘉榮曰吹得凉州意外聲舊人惟有米嘉榮近來年少欺前軰好染髭鬚學後後生又嘗赴揚州司馬杜鴻漸宴醉宿驛亭醒見二佳人在側驚而問之乃曰郎中席上與司空詩因令樂妓侍寢問記其詩否一妓強記乃誦之曰高髻雲鬟宫様粧春風一曲杜韋娘司空見慣渾閑事㫁盡蘇州刺史腸同前古今詩話劉夣得詩唐末士子崔郊姑有婢端䴡郊竊愛之他日鬻婢扵㐮陽司空于頔得錢四十萬因寒食出遊婢見郊立扵栁隂下郊因作詩隨以贈之曰公子王孫逐後塵緑珠重淚滴羅巾侯門一入深如海從此蕭郎是路人疾郊者録詩以示頔頔召郊執其手曰詩公所作也四十萬小㢤何不早言因以婢贈之唐宋雷徳遜有終父子二人並命為江南淮南漕王元之贈詩二首其一曰江南江北接王畿漕運㠶檣去似飛父子有才同冨國君王無事免宵衣屏除姦吏魂應䘮飬活疲民肉漸肥還有文塲受恩客望塵情抱倍依依其二曰當時豪氣壓朱雲老作皇家諌諍臣章䟽罷封無事日朝廷猶指直言人題詩野舘光泉石講易秋堂動鬼神棘寺下僚叨末路齋心猶祝秉洪鈞元之嘗出徳遜門下而徳遜深扵易酷扵詩也青箱雜記樞宻邵公尭謂余詩似樂天一日閲相藍書肆得馮瀛王詩集歸公與余語曰子詩似樂天又愛馮集將來拈取箇豁逹李老慶暦中京師有人號豁逹李老每好吟詩而詞多鄙俚以此戯之遂皆大笑熈寜中余辟定武帥幕公自鄆附所作詩一軸并寄余詩曰流年真似隙中駒别后情懐懶更踈天上又頒新暦日床頭未答故人書殷勤羔鴈功曹檄狼籍盃盤上客魚好在仲宣家萬里從軍苦樂定何如李文正昉吕正惠端同踐文舘後皆登台輔李贈吕詩曰憶昔僦居明徳坊官資俱是校書郎青衫共直昭文館白首同登政事堂佐國廟謨公巳展避賢榮路我猶妨主恩至重何時報老眼相㸔淚两行並同前向文蕳敏中㓂忠愍凖二相同以太平興國五年登第後文簡秉鈞忠愍以使相守長安文蕳作詩寄忠愍忠愍酧之曰玉殿登科四十年當時僚友盡英賢歲寒惟有公兼我白首猶持將相權唐宋遺史劉昌言泉州人常侍陳洪進為幕客入朝為副樞嘗作下第詩落句云唯有夜來蝴蝶夣翩翩飛入刺桐花後為商丘記室王元之贈詩曰年來復落事堪嗟載筆商丘鬂欲華酒好未陪紅杏宴詩狂多憶刺桐花盖為是也同前錢塘林逋處士有高, WYG: 阮閱撰}
