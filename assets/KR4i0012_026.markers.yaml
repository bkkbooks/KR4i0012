  - {type: variant, offset: 1160, length: 2226, content: 范文正公贈詩曰巢由不願仕堯舜豈遺人風俗因公厚文章到老醇張乖厓公為布衣時與陳希夷善因夜話謂希夷曰欲分先生華山一半住得無希夷曰餘人不可先軰則可及旦相别希夷以宣和中筆一枝白雲䑓墨一劑蜀牋一角贈之公曰㑹得先生意驅某入閙處去曰珎重珎重希夷送公回謂門弟子曰此人無情扵物逹則為公卿不逹則為帝王師公嘗感之後尹蜀過華隂寄希夷詩曰性愚不肯林泉住強要清時擬致君今日星馳劍南去回頭慚愧華山雲曹脩司封守邵武以竹簟贈僧仁曉并惠小詩曰翆筠織簟寄禪齋午夜秋從枕底來若也此時人問道寒天捲却暑天開並同前孟賔于湖湘連上人少脩儒學好詩有百篇名金鰲集獻于李若虚侍郎因採集中佳句可取者記之于書使賔于馳詣洛陽獻諸朝廷其譽藹然明年春與李昉同擢進士苐後事李後主為滏陽令因抵法當死會昉遷翰林學士聞在縲絏以詩寄賔子曰初携書劍别湘潭金牓標名第十三昔日聲塵喧洛下近來詩價滿江南長為邑令情終屈縱處郎曹志未甘莫學馮唐便休去明君晚事未為慚主見其詩而宥之復官未㡬歸老連上號群峯叟吉守馬致恭以詩送其末章云今日還家莫惆悵不同初上渡頭船江南野録雅言系述記吉守送賔于詩有全篇及賔于詩李頻方干高第也登第後干寄詩曰弟子已攀桂先生猶卧雲鑑戒録羅隱以諷刺之深久而不第劉賛贈之詩曰人皆言子屈我獨以為非明主旣難謁青山何不歸年虚侵白鬂塵土汚麻衣自古迯名者至今名豈㣲隱見之遂起歸歟之興作五湖詩曰江頭日暖花又開江東行客思悠㢤高陽酒徒半凋落終南山色空崔嵬聖代也知無弃物侯門未必用非才一船明月一竿竹家在五湖歸去來施肩吾贈邉將詩曰輕生奉國不為難戰苦身多舊箭瘢玉匣鎖龍鱗甲冷金鈴繫鶻羽毛寒皂貂擁出花當背白馬騎來月在鞍却恐犬戎臨虜塞柳營時把陣圖看杜荀鶴苦扵詩有贈僧句云安禪不必須山水㓕得心頭火自消又云利門名路两何慿百歲風前短熖燈只恐為僧心不了為僧心了是輸僧翁承賛唐末為諌議大夫使福州至劍浦縣見舊識僧亞齊贈詩云蕭蕭風雨建陽溪溪畔維舟見亞齊一軸新詩劍潭北十年舊識華山西吟魂㫺向江村老空性元知世路迷應笑乗軺青瑣客此時無暇聴猿啼唐陸希聲以雙鉤寫字法授僧𧦬光辯光入長安為翰林供奉而希聲尚未達以詩寄𧦬光曰筆下龍蛇似有神天池雷雨變逡巡寄言昔日不龜手應念江湖洴澼人𧦬光感其言薦希聲後至宰相並同前興國中潘若冲罷桂林經南岳留鶴一隻與廖融贈詩一章云峭格數年同野興一官纔罷共船歸稲梁少飼教長瘦羽翼無傷任逺飛側耳聴吟侵静燭㗸花作舞帶斜暉朝天萬里不將去留伴高人向釣磯若冲到京授維揚通理臨行復有詩寄融曰曾經别墅住行蹤春浪和烟撼釣筒共歩幽亭連石蘚寄眠静榻帶松風秋來頻夣岳雲白别后應添鶴頂紅又泛汴舟随汴水不堪南望思忡忡後至維揚聞融與鶴相繼而亡若冲感而又為一絶云南岳僧來共歎吁風亭月榭巳荒蕪先生去世未十日留伴高吟鶴亦徂融卒未乆潘有泉陵之命經隱居有詩哭云天䘮我良知無言雙淚垂惟求相見夣永絶寄來詩應有異人吊從茲雅道衰春風古原上新塚艸離離雅言雜載杜羔妻劉氏善為詩羔累舉不第將至家妻即先寄詩曰良人的的有竒才何事年年𬒳放回如今妾面羞君面君到來時近夜來羔見詩即時回去㝷登第妻又寄詩云長安此去無多地欎欎葱葱佳氣浮良人得意正年正年少今夜醉眠何處樓南部新書張介以命術逰公卿門寓居錢塘西湖上嘗自京師南歸士大夫率為詩贈之吕許公王沂公時方執政亦皆有詩夏鄭公留守南京為詩繼二公曰上公詩筆千金重逋客歸裝一舸輕莫到青山更招隱且留明哲為蒼生鄭谷雪詩云亂飄僧舎茶烟􅊜宻洒歌樓酒力㣲江上晚來堪畫處漁人披得一簑歸有叚賛善善畫因采其詩為圖曲盡瀟洒之意持以贈谷谷為詩以謝之云賛善賢相後家藏名畫多留心扵繪素得意在烟波屬興同吟詠功成更琢磨愛余風雪句幽絶寫漁簑古今詩話歐陽价攻傳神楊次公贈之詩曰國手曾煩寫㡬回無人彷彿醉顔開青銅鑑裏㝷常見不謂今從筆下來奉職劉祕亦贈詩曰筆妙今為第一人心期造化奪天真精神形骨從來一移入青縑推两身古今詩話唐相鄭棨贈老僧詩曰日照西山雪老僧門未開凍瓶粘柱礎宿火隱爐灰童子病歸去鹿麑寒入來自云此詩可以衡稱重輕不偏也嘗有人問相國近有新詩否曰詩在㶚橋風雪中驢子上此中安可得之同前王定保唐光化三年李渥侍郎下及苐呉子華侍郎臠為壻子華即世定保南逰湖湘無北歸意呉假緇服自長安來明日訪其良人白於馬武穆王令引見定保扵定林寺呉隔簾誚之曰先侍郎重先軰以名行俾妾侍箕箒侍郎没慮先軰以妾改適是以不逺千里來明侍郎之志定保不勝慚赧致書武穆乞爲壻吴確乎不㧞定保爲盟畢世不婚矣呉歸呉中外家沈彬有詩贈定保云仙桂曾攀第一枝薄逰湘水阻佳期臯橋巳失齊眉願蕭寺行逢落髪師廢苑露寒蘭寂寞丹山雪㫁鳯參差聞公巳有平生約謝絶女蘿依兎絲定保後爲馬不禮奔五羊依劉氏官至卿郡閣雅談賈島爲普州司倉方干寄詩曰亂山重復叠何路見先生豈料多才者空垂不第名閑曹曾得醉薄俸亦勝畊莫問爲詩苦年年芳草生鑑戒録稷山驛吏王金作吏五十六年稱有道術徃來多贈篇什李義山有詩贈云過客不須詢歲代唯書乙亥與時人令狐綯自湖州刺史拜翰林學士因夜召對坐從容語及文宗大稱之由是眷遇有加未㡬拜相因郊禋侍祠還趙嘏贈詩云鶚在卿雲氷在壺代天才業共訏謨榮同伊陟傳朱戸秀比王商入畫圖昨夜星辰廻劍履前年風月落江湖自湖州入相纔二年不知機務時多暇猶許詩家屬和無詩史李賛皇頗開寒素之路及南遷或人贈詩曰八百孤寒齊下淚一時南望李崕州徐鉉謫居舒州贈彭芮云賈生去國巳三年短褐閒吟翫水邊終日野雲生砌下有時京信到門前無人與和投湘賦愧子來浮訪戴船醉裏新詩好歸去莫随騷客賦林泉並同前陳文惠尭佐退居鄭下張退傳知西京以姚黄魏紫及酒惠文惠答詩曰有花無酒頭慵舉有酒無花眼倦開正向西園念蕭索洛陽花酒一時來雲齋廣録増修詩話總龜卷之二十六百家詩話總龜後集卷之二十六莭, WYG: ''}
