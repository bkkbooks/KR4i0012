  - {type: variant, offset: 11, length: 327, content: 寄贈門上吕文穆公蒙正甞與温恭肅仲舒及一友人忘其姓名讀書於洛陽龍門山誓不作狀元不仕及唱第文穆爲狀頭温巳不意然尚中甲科其友人隨拂衣歸隱後文穆大用太宗問昔與誰友文穆即以歸隱者對遂以著作郎召不起故文穆罷相歸洛作詩贈之曰昔作儒生謁貢闈今提相印出黄扉九重鴛鷺醉中别萬里烟霄逹了歸隣叟盡垂新白髪故人猶着舊麻衣洛陽謾說多才子自嘆遭逢似我稀故人盖指歸隱者也青箱雜記梁周翰太宗朝爲舘職真宗即位除知制誥柳開贈詩曰九重城闕新天子萬卷詩書老舎人古今詩話五代末濠梁人南楚材逰陳潁間潁守欲子妻之楚材巳娶薛氏以受潁守之恩遣人歸取琴書之屬似無還意薛氏善書畫能屬文自對鑑圖其形并作詩寄之曰欲下丹青筆先拈玉鑑端己驚顔寂寞漸覺鬂凋殘淚眼描將易愁腸寫出難恐君渾忘却時展畫圖看楚材見而慚焉與之偕老唐, WYG: ''}
