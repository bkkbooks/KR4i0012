  - {type: variant, offset: 9181, length: 314, content: 内典於蔣山與賛元禪師㳺從如兄弟公嘗問祖師意旨元不荅公益扣之公般若有鄣三有近道之質一更兩生来恐純熟公曰願聞其說元曰公世縁深懐經濟之志用舎不能必心未平又多怒而學問尚理扵道爲所知愚此其三也特視利名如脫髮甘淡薄如頭陁此為近道且當以教乗滋茂之可也公再拜受教元爲人閑靖寡言客来無貴賤寒温外無别語公後罷相居定林稍覺煩動即造元相向黙坐終日而去有詩題覺海方丈贈之云徃来城府住山林諸法脩然但一音不與物爲真道廣毎隨縁起自禅深舌根巳净誰能壊足跡如空我得㝷歲晚北窓聊寄傲蒲萄零落半牀隂人以為實録僧宝傳雪竇顯禪師嘗作偈云三分光隂二早過靈䑓一點不揩磨貪生曰曰區區去喚起回頭争柰何世人貪着愛境以妄為真迷而弗返讀此偈者冝如何㢤雪竇語録百家詩話緫龜後集卷之四十四終, WYG: 撰}
