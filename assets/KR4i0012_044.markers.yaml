  - {type: variant, offset: 7644, length: 1536, content: 月臨平山下路藕花無数滿汀洲東坡赴官錢塘過而見之大称賞巳而相㝷扵西湖一見如舊相識及坡移守東徐潜徃訪之舘於逍遥堂士大夫争識之東坡饌客罷与俱来紅粧擁隨之東坡遣一妓前乞詩潜援筆而成曰寄語巫山窕窈娘好將魂夢惱襄王禪心巳作沾泥䋈不逐春風上下狂一坐大驚自是名聞海内然性𥚹憎凢子如仇嘗作詩曰去歲春風上國行爛窺紅紫厭平生而今眼底無姚魏浪蕋浮花懶問名士論以此少之道潜作詩追法渊明其語有逼真處曰數聲柔櫓蒼茫外何䖏江村人夜歸又曰隔林彷彿聞機杼知有人家在翠㣲時從東坡在黄州士大夫以書抵坡曰聞曰與詩僧相從豈非隔林彷彿聞機杼者乎真東山勝㳺也坡以書示潜誦前句笑曰此吾師七字師號冷齋夜話華亭船子和尚有偈曰千尺絲綸直下垂一波纔動萬波隨夜静水寒魚不食滿船空載月明歸叢林盛傳想見其爲人山谷倚曲音歌成長短句曰一波纔動萬波隨蓑笠一鈎絲金鱗正在深處千尺也湏垂吞又吐信還疑上鈎遲水寒江静滿目青山載月明歸冷齋夜話靈徹詩僧中第一如海月生残夜江春入暮年窓風枯硯水山雨慢瑟弦經来白馬寺僧到赤烏年前軰評此詩云轉石下千仭江雪浪齋日記唐李憕之子源以父死王難不仕居洛陽惠林寺與僧貟澤逰一日相約逰峨嵋山源欲泝峽澤欲取斜谷路源不可曰吾巳絶世事豈可復道京師㢤舟次南浦見媍人錦襠負甕而汲者澤望而泣曰吾不欲由此者為是也源驚問之澤曰媍人姓王氏吾當爲子孕三歲矣吾不来故不得乳今旣見無可逃者三日浴児時願公臨我以一笑爲信後十二年杭州天竺寺外當與公相見至暮澤亡婦乳三日源徃視之児見源果笑源後適吴赴其約聞葛洪川畔有牧童扣牛角而歌曰三生石上舊精魂賞月吟風不要論慙愧情人逺相訪此身雖異性長存問澤公徤否荅曰李公真信士又曰身前身後事茫茫𣣔話因縁恐断腸呉越山川㝷巳徧却回烟棹上瞿塘遂去不知所之東坡詩云𣣔向錢塘訪貟澤葛洪波畔帯秋深即此事也甘澤謡逺法師居廬山下持律精苦過中不受宻湯而作詩換酒飲陶彭澤送客無貴賤不過虎溪而與陸道士行過虎溪数百歩大笑而別故禪月作詩云爱陶長官醉兀兀送陸道士行遲遲買酒過溪皆破戒斯何人斯師如斯故效之晋陶淵明把酒椀送陸脩静過虎溪胸次九流情似鏡人間萬事醉如泥山谷文殊問無著近離甚處著云南方殊云南方佛法如何多少著云或三百或五百著問此如何住持殊云凡聖同居龍蛇渾雜著云多少衆殊云前三三後三三雪竇頌曰千峰盤屈色如藍誰謂文殊是對潭堪笑清凉多少衆前三三與後三三傳灯録大覺懐璉禪學外工詩荆公與之㳺嘗以其詩示歐公曰此道人作肝臓饅頭也荆公不悟其戯問其意歐公曰是中無一點䒩氣璉䝉仁庙賞識晋住東京静因禪院甚乆嘗作詩進呈乞還山林曰千簇雲山萬壑流閑身歸老此峯頭殷勤願祝如天夀一炷清香滿石楼又曰堯仁况是如天闊乞與孤雲自在飛冷齋夜話東坡言僧詩要無𬞞筍氣固詩人龜鑑今時悞觧便作世網中語殊不知本分家風水邉林下氣像盖不可無若盡洗去清拔之韻便與俗同科又不足尚齊巳云春深逰寺客花落閉門僧惠崇云曉風飄磬逺暮雪入廊深之句華實相副頋非佳句邪天聖間閩僧可士有送僧詩云一缽即生涯隨縁度歲華是山皆有寺何䖏不爲花笠重呉天雪鞋香楚地花他年訪禪室寕憚路途賖亦非食肉者能到也西清詩話西湖僧清順怡然清苦多佳句甞賦十竹詩曰城中寸土如寸金幽軒種竹只十箇春風慎勿長兒孫穿我堦前緑苔破又有乆服林下逰頗識林下趣從渠緑隂繁不碍清風度閑行石上眠落葉不知數一鳥忽飛耒啼破幽絶處荆公逰湖上爱之乃称揚其名坡晚年亦與之㳺甚多酧唱冷齋夜東呉僧惠詮徉狂垢汚而詩語清婉嘗書湖上一山寺壁曰落日寒蟬鳴獨歸林下寺柴扉夜来掩片月隨行屦惟聞犬吠聲更入清蘿去東坡一見而和其後曰但聞煙外鍾不見烟中寺幽人行未巳草露温芒屦惟應山頭月夜夜照来去詮竟以此詩知名冷齋夜話東坡元豊末年得請歸耕陽羡舟次瓜歩以書抵金山了元禪師曰不必出山當學趙州平等接人元得書徑来東坡迎笑問之曰以偈爲獻曰趙州當日少謙光不出三門見趙王争似金山無量相大千都是一禪牀東坡拊掌稱善僧宝傳王荆公丁家艱, WYG: 宋阮}
