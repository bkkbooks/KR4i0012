  - {type: variant, offset: 6987, length: 656, content: 四釋氏門予謫海外上元椰子林中漁火三四而巳中夜聞猿聲悽動作詞曰凝祥宴罷聞歌吹畫轂走香塵起冠壓芲枝馳萬騎馬行燈閙鳯楼簾捲陸海鰲山對當年曾㸔天顔醉御杯舉歡聲沸時莭雖同悲樂異海風吹夢嶺猿啼月一枕思歸泪又有懐京師詩云十分春痩縁何事一掬歸心未到家苕溪漁隱曰忘情絶愛此瞿曇氏之所訓惠洪身爲衲子詞句有一枕思歸淚及十分春痩之語豈所當然又自載之詩話矜衒其言何無識之甚邪冷齋夜話徃年余宰分寕覺範従髙安来舘之雲嵓寺寺僧三百各持一幅帋求詩扵覺範覺範斯湏立就余見之不懌曰詩當少加思豈若是容易乎覺範笑曰取笑吾意而巳相别十年覧其遺編追記平生不覺隕泪余欲刪去冗長定取精深数十百首仍爲作序以示世人老懶未睱也僧中𥘉無具詩眼者巳刻版書肆每以為恨韓子蒼巳收一霎掛龍雨勿起千岩攧鷂風挂龍對攧鷂皆方言古今人未嘗道又云䴡句妙扵天下白髙才俊似海東青又云文如水行川氣如春在花皆竒句也雪浪齋日記云余至瓊州劉蒙叟方飲於張守之席三鼓云遣急足来覔長短句欲問叙何事䝉叟視燭有蛾撲之不去曰為賦此急足反走持𥿄曰急爲之不然獲譴也余口授吏書之曰宻燭花光清夜䦨粉衣香趐遶團團人猶認假爲真實蛾豈将灯作火㸔方歎息爲遮欄也知愛處實難拚忽然性命隨烟熖始覺從前𬒳眼瞞蒙叟醉笑首肯之既北渡夜發海津又贈行為之詞曰一叚文章種性更謫仙風韻畫㦸叢中清香凝宴寢落日清寒落花信愁似海洗光詞錦後夜帰舟雲濤喧醉枕冷齋夜話東坡長短村南村北響繅車參寥詩云隔林彷彿聞機杼知有人家在翠㣲秦少㳺菰蒲深處疑無地忽有人家笑語聲三詩大同小異皆竒句也髙齋夜話呉僧道潜有標置常自姑蘇歸西湖經臨平道中作詩云風蒲獵獵弄輕柔欲立蜻蜓不自由, WYG: ''}
