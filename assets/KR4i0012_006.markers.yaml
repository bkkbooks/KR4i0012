  - {type: variant, offset: 5125, length: 1745, content: 玉對楚王雄風􅏺其知已不知人也公權小子有羙而無規爲續之云一爲居所移苦樂永相忘願言均此施清隂分四方或謂五弦之薫解愠阜財巳有陳善責难之意愚謂不然凢規諫之辞湏切直分明乃可以感悟人主故盗言孔甘良薬苦口若以薫風自南来爲陳善閉邪但恐後世導䛕側媚持兩可者皆得以冐敢諫之名也䂬溪陽城徳行道義爲士林之所敬服徳宗以銀印赤紱起于隱所驟拜諌官可謂賢且遇矣故學生聞道州之貶投業而呌閽賢士愴馹名之同摛辞而頌徳可以知其賢不誣也然退之諌臣論乃極口貶之何㢤其言曰今陽子實一匹夫在諫位不爲不乆而未嘗一言及於政視政之得失若越人之視秦人之肥瘠問其官則曰諌議也問其政則曰我不知也有道之士固如是乎考之本傳以謂他諫官論事苛細帝厭苦城漫聞得失且熟尤未肯言客屡諫之第醉以酒而不荅盖其意有所待矣至徳宗逐陸贄𣣔相裴延齡而城伏蒲之說始上廷争懇至累日不解故元㣲之詩云正元歳云暮朝有曲如鈎飛章八九上皆若珠暗投且曰事不止臣諫誓不休而白楽天亦云陽城爲諌議以正事其君其手如屈軼舉必指侫臣卒使不仁者不得秉國鈞柳子厚亦云抗志厲義直道是陳盖退之諫論乃在止裴延齡為相之前而三子頌羙之言乃在陽城極諫之後也丹陽集唐末有冝春人王轂以歌詩擅名嘗作玉樹曲畧云璧月夜瓊楼春匣舌泠泠詞調新當時狎客尽封禄直諫犯顔無一人歌未闋晋王劍上粘腥血君臣猶在醉郷中一面巳無陳日月此調大播人口轂未苐時嘗於市㕓中見有同人𬒳無頼軰歐撃轂前救之曰莫無禮便是觧道君臣猶在醉郷中一面巳無陳日月者無頼聞之慙謝而退盖譏當時士大夫掩蔽人善殆此小人不若愚謂特假以自諭爾無頼所以悔過從善頓革㐫暴之氣者非重其才也非重其名也盖重其言有𥙷於治亂安危者也蔡寛夫云江湖多白鳥天地有青蝇人遂以白鳥爲鷺而禮記月令群鳥飬羞鄭氏乃引夏小正丹鳥白鳥之說謂白鳥為蚊蚋則知以對青蠅意亦深矣不然江湖多白鷺有何說邪䂬溪子羙詩草有害於人曾何生阻脩芒刺在我眼焉能待時秋其憤邪嫉悪欲芟夷蕰崇之以肅清王室者抱懐可見臨川有勿去草草無悪如比世俗俗浮薄此方外之語異乎農夫之務者也黄常明子羙云設網萬魚急盖指聚歛之臣苛法侵漁使民不聊生乃萬魚急也又云能者操舟疾若風撑突波濤挺义入小人舞智趋時巧宦数遷所謂疾若風也殘民以逞不顧傾覆所謂挺义入也日暮蛟龍改窟穴山根鱸鮹隨雲雷魚不得其所龍豈能安居君與民猶是也此與六義比興何異吾徒何爲縱此樂暴戾天物聖所哀此樂而能戒又有仁厚意亦如前王作網罟設法害生成不專爲取魚也退之义魚曰觀樂憶吾僚異此意矣亦如蘄簟云却願天日常炎曦故後人改之云豈比法曹空自私却願天曰長炎赫黄常明唐子西上張天覺内前行云内前車馬撥不開文德殿下宣麻回紫薇侍郎拜右相中使押赴文昌䑓此語善扵叙事質而不俚又云周公禮樂未要作致身姚宋亦不悪向来兩翁當國年民間斗米纔四錢此語善扵諷諭當而有理皆可法也湖上云佳月明作哲好風聖之清栖禪歸云草青仍過雨山紫更斜陽語意俱新李陽氷云太白不讀非聖人之書恥爲鄭衛之作故其言多似天仙之辭凢所著述言多諷興自三代以來風騷之後馳驅屈宋鞭撻揚馬千載獨歩唯公一人故王公趋風列岳結軌群賢翕習如鳥帰鳯盧黄門云陳拾遺横制頽波天下質文翕然一變至今朝詩体尚有梁陳宫掖之風至公大変掃地併盡今古文集遏而不行唯公文章横𬒳六合可謂力敵造化歟逹理門苕溪漁隱曰裴說云讀書貧裏樂捜句静中忙此二事乃余日用者甘貧守静自少至老飽諳此味矣許彦同詩話云羅隱詩云只知亊逐眼前過不覺老從頭上來此殊有味朱氏復齋偶題詩曰出入無時是此心豈知鷄大易追㝷請㸔屏上𥘉爻㫖便識名齋用意深東坡云秋菊有佳色裛露掇其英泛此忘憂物逺我遺世情一觴雖獨進杯盡壼自傾曰入群動息帰鳥趋林鳴笑傲東軒下聊後得此生靖莭以無事爲得此生則見役扵物者非失此生耶東坡送山夲禪師赴法雲云是身如浮雲安得限南北此二句乃老杜別賛上人詩中全語豈偶然用之邪題碧落洞詩云小語輙響荅空山白雲驚此語全類李太白今印夲誤作自雷驚不惟無意味兼與上句重叠也後自嶺外歸次韻江晦叔詩云浮雲時事改孤月此心明語意髙妙如參禪悟道之人吐露胸襟無一毫窒碍也康節天津感事吟水流任急境常静花落雖頻意自閑不似世人忙裏老生来未始得開顔撃壤集先天吟先天天弟爲後天奉天時弗違無時虧奉時有時疲同上身心吟身生天地後心在天地前天地自我出自餘何足言同上康莭無憂吟人生長有两般愁愁死愁生未易休或向利中窮力取或于名上盡心求多思唯恐晚得手未老已聞先白頭我有何功居彼上其間攘臂獨無憂擊壤集百家詩話總龜後集卷之六, WYG: 阮閱撰}
