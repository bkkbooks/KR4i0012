  - {type: variant, offset: 2987, length: 892, content: 古人文章自應律度未嘗以音韻爲主自沈約増崇韻學其論文則曰欲使宫羽相變低昻殊節若前有浮聲則後須切響一篇之内音韻盡殊两句之中輕重悉異妙逹此㫖始可言文自後浮巧之語體製漸多如旁犯蹉對假對雙聲叠韻之類詩又有正格偏格類例極多故有三十四格十九圖四聲八病之類今略舉數事如徐陵云陪遊馺娑䀻􅊏腰於結長樂鴛鴦奏新聲於度曲又云厭長樂之踈鍾勞中宫之緩箭雖两長樂義不同不爲重複此爲旁犯如九歌云蕙殽蒸兮蘭藉奠桂酒兮椒漿蒸蕙殽對奠桂酒今倒用之謂之蹉對如自朱耶之狼狽致赤子之流離不惟赤對朱耶對子兼狼狽流離乃獸名對鳥名又如厨人具雞黍稚子􅎥楊梅以雞對羊如此之類皆爲假對如幾家村艸裏吹唱隔江聞幾家村艸吹唱隔江皆雙聲如月影侵簮冷江光逼屐清侵簮逼屐皆叠韵詩第二字側入謂之正格如鳯暦軒轅紀龍飛四十春之類皆第二字平入謂之偏格如四更山吐月殘夜水明楼之類唐名軰詩多用正格希首薦樂天曰二公論文在於一戰遂試長劍倚天外賦餘霞散成綺詩以凝爲首祜次之曰地勢遥高岳河流側譲關多士謂陳叔寳曰日月光天徳山河壯帝居此徒有前名又祜題金山寺云樹影中流見鍾聲两岸聞雖綦母潜云塔影掛清漢鍾聲和白雲此句未爲佳祜觀獵四韻及宫詞樂天曰張三作獵詩比王右丞予則未敢優劣王摩詰詩曰風劲角弓鳴將軍獵渭城草枯鷹眼疾雪盡馬蹄輕忽過新城戍還歸細柳營廻看落鴈處十里暮雲平祜詩曰曉出禁城東分圍淺草中紅旗開向日白馬驟迎風背手抽金鏃翻身控角弓萬人齊指處一鴈落寒空白公云又謂宮詞之中皆數對何足竒也然無徐生千古長如白練飛一條界破青山色祜遂行歌而邁凝亦鼓枻而去二生終身偃蹇不隨郷賦前此李林宗𥙷闕杜牧之舎人與樂天輦下較文具言元白詩體斘雜而爲清苦者見嗤因茲恨之樂天爲河南尹李爲河南令相遇於道尹乗馬令肩輿乖趍走之禮亦曾謂樂天爲囁嚅公聞者皆咲樂天名减矣尹曰李直木林宗字也吾視之猘子也其鋒不可當後牧之守秋浦與祜爲詩酒之交酷吟祜宫詞亦知錢塘之試自有是非之論櫰不平之色爲詩二章以髙之曰誰人得似張公子千首詩輕萬戸侯又云如何故國三千里虚唱歌詞滿六宫祜詩曰故國三千里深宫二十年一聲何滿子雙淚落君前此詩宫娥諷念思郷起長門之悲祜復逰甘露寺觀盧肇題詩曰不謂三呉經此詩人也祜曰日月光先到山河勢盡來盧曰地從京口㫁山到海門雲溪友議, WYG: ''}
