  - {type: variant, offset: 4307, length: 5, content: 後集卷之三, WYG: 巻四}
  - {type: variant, offset: 4313, length: 948, content: 九神仙門高尚処士劉臯謂士大夫以嗜慾殺身以財利殺子孫以政事殺人以斈術殺天下後世非神仙中人不能發此言也復斎漫録熈寕中王迪為洪州左司理叅軍一日有道人來磨鏡因俾迪自照乃見星冠羽帔縹緲見鏡中迪問其故曰此汝前身也由汝悞念堕此勉自脩証勿淪苦海旣去迪具以告其妻妻然之遂弃官與妻隱去郡僚挽留不可皆作詩以餞行時新建主簿劉純臣有詩雖警拔可以記其實云髮如抺添左叅軍脱去青衫作隱淪世上更無羈絆事壷中别有自由身鼎烹玉免山前薬花㸔金鰲背上春莫怪少年能决烈藍田夫媍搃登真后㱕姑蘇不知所終同上周貫自言膠東人嘗號木鴈子善属文㳺扵洪州西山嗜酒不覊布褐粗全人或贈之錢則詣酒家取醉余皆散墜不頋西山之人見貫徃來者五十余年而顔如𥘉至有以道術訪之則必报以悪声使之親近不得也熈寕元年至豫章石頭市遇故人捿止張生爲具酒食而宿中夜逆旅之主人聞戸外有車馬合沓声起而視之無有也唯貫所卧室月止開犹奄奄然喘息就而察之貫已死矣明日告新建縣尉呉杲卿徃按之貫身㓗如生扶而轉之腹中汨汨如浪鳴焉縣主簿刘純臣使人棺歛埋扵地云張生還家其弟迎門曰周翁凌辰見遇今徃双嶺矣衆乃知貫非實死者也貫所著華陽二篇坐卧不離懐䄂人莫得見曰純臣耴而有之純臣梢其文險絶而有條理純臣以詩記之曰八十西山作酒仙麻鞋乱断布衣穿形骸一脱塵縁尽太極光隂不記年洪斍範冷齋夜話嘗記之然互有不同同上吾八歳入小學以道士張易蕳為師童子㡬百人師獨称吾與陳太𥘉者太𥘉眉山市井人子也予稍長學日益遂第進士制䇿而太𥘉乃為郡小吏其後余謫居黄州有眉山道士陸推忠自蜀來云太𥘉巳尸觧矣蜀人呉師道為漢州太守太𥘉徃客焉正旦日見師道求衣食錢物且告别持所得盡與市人貧者反坐扵㦸門下遂卒師道使卒舁徃野外焚之卒罵曰何物道士使我正旦舁死人太𥘉㣲笑開目曰不復煩汝歩自㦸門至金鴈橋下趺坐而逝焚之城人見烟熖上眇眇焉有一陳道人也東坡新安聶師道宗微少事道士于方求發迹逰名山𢾗見異人楊行宻開府扵揚州宗㣲實輔佐之盖為囯師三十年楊氏末觧化而去弟子塟之舉棺惟衣履存焉順義七年楊溥贈問政先生方外之兄徳誨為新安太守乃扵郡之東山築室以居方外號為問政山房問政之名或得扵此苕溪漁隱曰問政山去新安郡城十許里岩谷幽邃今有琳字在焉囯𥘉黄台留題詩云千㝷練帶新安水萬仭花屏問政山自少雲霞居物外不多塵土到人間壷懸仙島吞舟罷椀浸星宫咒水閑艸暗壇思句曲松昏紫氣度凾関龜成錢甲毛猶緑鶴化黳翎頂更殷, WYG: 宋}
