  - {type: variant, offset: 5262, length: 2706, content: 洞神仙分藥去蔡家兄弟寄書还笻枝挺柱菖蒲莭筍幘高簮玳瑁班新隱漸聞侵月窟舊隣猶說枕沙湾黄精苗倒眠青鹿紅杏枝低挂白鷴海上使頻青鳥黠篋中蔵乆白馿頑手踈俗礼慵非傲肘後灵方秘不慳室録匣垂金縷帶絳囊條鏁玉連環常㝷灵穴通三楚擬過流沙化百蛮容易煑銀供客用辛勤㘽果與猿扳静張琹局舖还打黙考仙經註又刪牀並葛鞋寒兎伏窓横柽几老龍跧溪童乞火朝𫾣竹山鬼听琹夜撼關花氣熏心香馥馥澗声聆耳响潺潺高墳自掩浮生骨短晷難凋不死顔早晚重逄䔥塢客願随芝盖出塵寰余以續仙傳高道傳二書攷之詩中所用事多出師道本傳山谷唐末有狂道士不知何許人又晦其名氏逰成都忽詣紫極宫謁杜光庭先生求寓泊之所先生諾之而不與之進道士日貨藥扵市所得錢随多少沽酒飲之惟唱感庭秋一詞其意感蜀之將亡如秋庭之衰落然人未之暁但呼為感庭秋道士凡半年人亦不知其異一夕大醉歸夜将䦨尚聞唱声愈高有訝之者隔户窺之見灯燭綵綉筵具噐皿罗列甚盛狂道士左右二青童立侍時斟酒而唱窺者具以白先生先生乃欵其户曰光庭量識膚淺不意上仙降鍳深爲罪戾然不揆愚昧而匍匐門下冀一拜光灵以消塵障道士曰何辱勤拳之若是當出奉見乃令二童收筵具噐皿及陳設致扵前堞之則随手而小如符子狀置冠中又将二童按之如木偶可寸許又置冠中乃啓户光庭忻然而入但空室而巳高道傳唐清逺道士同枕恭子㳺虎丘詩曰余本長殷周遭罹歴秦漢計之至唐則二千餘歳矣顔魯公爱而刻之且有詩曰客有神仙者扵兹雅䴡陳盖指為神仙也李衛公追和魯公刻清逺道士詩曰逸人綴清藻前哲晋萹翰則逸人指清逺而前哲謂魯公也其後皮日休陸龜蒙軰皆和之仙耶鬼耶則不必問然㒒獨爱其数句云吟挽川之隂歩上山之岸山川共澄澈光彩交陵亂白雲蓊𣣔㱕青松忽消半扵乎借使非神仙亦才鬼也許彦周詩話異聞集載沈旣済作枕中記云開元中道者吕翁非洞賓也盖洞賔嘗自序以為吕渭之孫仕徳宗朝今云開元則吕翁非洞賔無可疑者苕溪漁隱曰回仙嘗有詞云黄梁猶未熟梦驚殘尚用枕中記故事可見其非吕翁也灵怪集載南柯太守傳與枕中記事絶相類浮世荣枯固巳如夣矣此二事又扵夣中作梦旣可笑亦可歎已復斎漫錄回仙扵京師景徳寺僧房壁上題詩云明月斜秋風冷今夜故人來不來教人立盡梧桐影相傳此詩自國𥘉時即有之栁耆卿詞云愁緒終難整又立盡梧桐碎影用回仙語也古今詞話語云耆卿作傾盃秋景一闋忽夣一媍人云妾非今世人曽作前詩数百年無人称道公能用之夣斍記其事世傳乃鬼謡也此語怪誕無可攷㨿盖不曽見回仙㽞題遂妄言耳予兄子瞻嘗従事扶風開元寺多古畫而子瞻少好畫徃徃匹馬入寺循壁終日有一老僧出揖之曰小院在近能一相訪否子瞻欣然從之僧曰貧道平生好藥術有一方能以朱砂化淡金為精金老當傳人而患無可傳者知公可傳故欲一見子瞻曰吾不好此術雖得之将不能為僧曰此方知而不可為公若不為正當傳矣是時陳希亮少卿守扶風而平生溺扵黄白嘗扵此僧求方而僧不與子瞻曰陳卿求而不與吾不求而得何也僧曰貧道非不悦陳卿畏其得方不能不為耳貧道昔嘗以方授人矣有為之即死者有遭䘮者有失官者故不敢輕以授人即出一卷書曰此中皆名方其一則化金方也公必不肯輕作但勿輕以授人如陳卿謹勿傳也子瞻許諾㱕視其方毎淡金一两視其分数不足一分輙以丹砂一錢益之雜諸藥入甘鍋中煆之鎔即傾出金砂俱不耗但其色深淺斑斑相雜當再烹之色匀乃止後偶見陳卿語及此僧遽應之曰近得其方矣陳卿驚曰君何由得之子瞻具道僧不欲輕傳人之意不以方示之陳固請不巳不得已與之陳試之良騐子瞻悔曰某不惜此方惜負此僧耳公謹爲之陳姑應曰諾未幾坐受隣郡公使酒以贓敗去子瞻疑其以金故深自悔恨後謫居黄州陳公子慥在黄子瞻問曰少卿昔竟嘗爲此法否慥曰吾父旣失官至洛陽無以買宅遂大作此然竟病指􅏴而没乃知僧言誠不妄也後十年余謫居筠州有蜀僧儀介者師文事禅師文之所至輙爲修造所費不貲而莫知錢所從來介祕其術問之不以告人介以聡禅師善宻爲聡言其方大類扶風開元寺僧所傳者然介未嘗以一錢私自利故能保其術而無患苕溪漁隠曰洞微志載葉生者與前事相類其以得乾銀術妄費而受􅍔故回仙謂沈東老云聞公自能黄白之術未嘗妄用盖嘉之也此真可爲貪者之戒龍川略志呉興之東林沈東老能釀十八仙白酒一日有客自號回道人長揖扵門曰知公白酒新熟逺來相訪願求一醉實熈寜元年八月十九日也公見其風骨秀偉跫然起迎徐觀其碧眼有光與之語其声清貟扵古今治乱老荘浮圖氏之理無所不通知其非塵埃中人也因出酒噐十數扵席間曰聞道人善飲欲以鼎先為夀如何公曰飲噐中惟鍾鼎為大屈巵螺杯次之而梨花蕉葉最小請戒侍人次第速斟當為公自小至大以飲之笑曰有如頋愷之食蔗漸入佳境也又約周而復始常易噐滿斟扵前笑曰所謂杯中酒不空也回公興至即㪯杯舉白常命東老鼓琹回乃浩歌以和之又嘗圍棊以相娱止奕數子輒拂去笑曰秪恐碁終爛斧柯回公自日中至暮已飲數斗無酒色是夕月㣲明秋暑未退蚊蚋尚多侍人秉扇敺拂偶㓕一燭回公乃命取竹枝以餘酒噀之挿扵逺壁湏臾蚊蚋盡捿壁間而所飲之地洒然東老𣣔有所叩先託以求敺蚊之法回云曰且飲小術烏足遒㢤聞公自能黄白之術未嘗妄用且篤扵孝義又多隂㓛此予今日所以來㝷訪而将以發之也東老因叩長生輕舉之術回公曰以四大假合之身未可離形而頓去惟死生去住為大事死知所住則神生扵彼矣東老攝衣起謝有以喻之回公曰此古今所謂苐一最上極則処也此去五年復遇今日公當化去然公之所鍾爱者子階也治􅒛時不得見之當此之際公亦先期而知謹勿動懐恐䘮失公之真性東老頷而悟之飲将逹旦則瓮中所醸止㽞糟粕而無餘瀝矣回公曰乆不逰浙中今日為公而來當㽞詩以贈然吾不斈世人用筆書乃就擘席上榴皮畫字題扵􅤮壁其色㣲黄而漸加黒故其言有回仙人贈東老詩西隣巳冨憂不足東老雖貧樂有餘白酒醸來縁好客黄金散盡為收書凡三十六年巳而告别東老啓関送之天漸明矣握手並行笑約異時之集至舎西石橋回公先度乗風而去莫知所適後四年中秋之吉東老微恙乃属其族人而告之曰回公熈寕元年八月十九日嘗謂予曰此去五年復遇今日當化去予意明年今乃熈寕之五年也子階又適在京師干薦回公之言其在今日乎及期捐舘凡回公所言無有不騐陸元光回仙録吾廼京兆人唐末累舉進士不苐因逰華山遇鍾离傳授金丹大藥之方復遇苦竹真人方能驅使鬼神再遇鍾离尽獲希夷之妙旨吾得年五十苐一度郭上竈苐二度趙仙姑郭性頑鈍只與追錢延年之法趙性通灵随吾左右吾惟是風清月白神仙㑹聚之時嘗逰两浙京汴譙郡嘗着白襴角帶右眼下有痣如人間使者筯頭大世言吾賣墨飛劍取人頭吾聞乃之實有三劍一断煩恼二断貪嗔三断色慾是吾之劒世有傳吾之神不若傳吾之法不若傳吾之行何以故爲人若反是雖携手接武終不成道苕溪漁隠曰回仙有沁园春一闋明内丹之旨語意深妙惜乎世人但歌其詞不究其理吾故表顯之云七返還丹在人先湏煉巳待時正一陽𥘉動中宵漏永温温鈆鼎先透簾幃造化争馳虎龍交合進火㓛夫尤閗危曲江上㸔月華莹净有箇烏飛當時自飲刀圭又誰信無中養就児辨水源清濁木金間膈不因師指此事難知道要玄微天機深逺下手速脩犹太遲蓬萊路逺三千行滿獨歩雲㱕百家詩話総龜後集卷之三十九, WYG: 閲撰}
