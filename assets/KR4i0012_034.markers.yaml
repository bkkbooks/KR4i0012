  - {type: variant, offset: 3577, length: 1490, content: 曽文肅熈寕𥘉為海州懐仁令有監酒使臣張者小女甫六七歳甚為惠黠文肅之室魏夫人怜之教以誦詩書頗通觧其後南北暌隔紹聖𥘉文肅柄事樞時張氏女以入禁中雖無名位以善筆扎掌命令之出入忽與夫人相聞夫人以夫貴䟽封瀛國稱夀禁庭始相見叙舊自後歲時遣問夫人没張作詩以哭云香散簾幃寂塵生翰墨間空傳三壷譽無復内朝班從此絶迹矣後四十年靖康之変張從昭慈聖獻南渡至錢塘朱忠靖筆録所記昭慈遣其傳導反正之議張夫人者即其人也年八十餘終揮塵東漢李固忠直鯁亮志在許國不爲身謀争立清河遂忤梁兾以致身首異處當時有提鈇上章乞收固尸如汝南郭亮者有星行至洛守衞尸䘮如陳晋楊羌者亦可見固以忠獲罪矣唐李華嘗觀黨錮傳撫卷而悲之且作詩曰古墳㐮城野斜徑横秋陂况不禁撨采茅莎無孑遺扵乎生不能保其身死又不能保其蔵骨之地天之不相善人何至是耶梅聖俞詩云漢家誅黨人誰與李杜死死者有范滂其母爲之喜喜死名愈彰生荣同犬豕故史臣以胡廣趙戒爲糞土而馬融真犬豕㢤韵語陽秋宋彭城王義康忌擅道濟之㓛㑹文帝疾動乃矯詔送廷尉誅之故時人歌云可怜白浮鳩柱杀檀江州當時人痛之盖如此柰何王綱下移主威莫立洎魏軍至瓜歩帝方登石頭以思之又何𥙷㢤劉夣得嘗過其墓而悲之曰萬里長城壊荒雲野草秋秣陵多士女猶唱白浮鳩盖傷痛之深雖歴三百年而猶不泯也韵語陽秋苕溪云李杜畫象古今詩人題詠多矣若子羙其詩高妙固不待言要當知其平生用心處則半山老人之詩得之矣詩云吾觀少陵詩謂與元氣侔力能排天斡九地壮顔毅色不可求浩蕩八極中生物豈不稠醜奸巨細千萬殊竟莫見以何雕鎪惜㢤命之穷顛倒不見收青衫老見斥餓走半九州瘦妻僵前子仆後攘攘盗賊森戈矛吟哦當此時不廢朝廷憂嘗願天下聖大臣各伊周寕令吾庐獨破受凍死不忍四海赤子寒颼颼傷屯悼屈止一身嗟時之人我所羞所以見公像再拜涕泗流推公之心古亦少願起公死從之逰䂬溪淵明非畏枯槁其所以感嘆時化推迁者盖傷時之急扵声利也非畏亂離其所以愁憤扵干戈盗賊者盖以王室元元為懐也俗士何以識之七哀詩起曹子建其次則王仲宣張孟陽也釋詩者謂病而哀義而哀感而哀悲而哀耳目聞見而哀口歎而哀鼻酸而衰謂一事而七者具也子建之七哀哀在扵獨棲之思婦仲宣之七哀哀在扵弃子之媍人張孟陽之七哀哀在扵已毀之园寢唐雍陶亦有七哀詩所謂君若無㝎雲妾作不動山雲行出山易山逐雲去難是皆以一哀而七者具也老杜之八哀則所哀者八人也王思礼李光弼之武功蘇源明李邕之文翰汝陽鄭䖍之多能張九齡嚴武之政事皆不復見矣盖當時盗賊未息歎舊懐賢而作者也司馬温公亦有五哀詩謂楚屈原趙李牧漢鼂錯馬援齊斛律光皆負才竭忠卒困扵讒而不能自脱盖有激而云爾葛常之詩話白樂天元㣲之皆老而無子屢見扵詩章樂天五十八歳始得阿崔微之五十一歳始得道保同時得嗣相與酬唱喜甚樂天詩云膩刺新胎髮香綢小綉𥜗玉牙開手爪蘇顆點肌膚微之云且有承家望誰論得力時又云嘉名稱導保乞姓號崔児三歳而亡白賦詩云懐抱而亡按墓誌有子道護年三歳而卒以歲月攷之即道保也孟東野連産三子不數曰皆失之韓退之嘗有詩假天􅒛以寛其憂三人者皆人豪而不能忘情如此信知割爱為難也若使學空天黙黙依前重作鄧攸身傷㢤微之五十三道者遭此則又何必黒衣巾者闖然入其戸而後喻㢤同上韓退之作李于墓志云余不知服食之說自何起殺人不可計而慕尚之益至臨死乃悔其為而退之乃躬自蹈之以至扵死白天樂所謂退之服硫黄一病訖不痊是也陳後山作嗟㢤行云張生服石奴下潦上乾如渇烏韓子作志還自屠白笑未竟人復吁盖爲此也然樂天與刑部李侍郎詩云金丹周學都無益姹女丹砂燒即飛則樂天深知服食之無騐其肯以身試藥以自斃乎則白笑未竟人復吁之句未必然爾山谷在貶所曽公衮有書勸其勿服金石藥谷報云公衮疽根在旁乃不可食庭堅服之如晴雲之在川谷安得有霹靂文也則知服金石者尤當屏去粉白黛緑之軰或者用以資色力其斃冝㢤丹揚集百家詩話総, WYG: 總}
