  - {type: variant, offset: 3141, length: 383, content: 年退之為吏部侍郎薨扵静安里苐李翶行状載属纊之語云伯兄徳行高晚年止四十二某位為侍郎年出伯兄十五歳且獲終扵牗下幸不失大莭以下見先人可謂荣矣翶祭文曰人心樂生皆悪其㐫兄之在病則齊其終順化以盡靡憾于中張籍祭詩亦曰公有曠逺識生死為一綱及當臨終辰意色亦不荒贈我珍重言傲然委衾裳盖其聦明之所照了徳力之所成就故扵生死之際超然如此宣室志載威粹骨蕝囯世與韓氏為仇神人以帝命召公計事愈曰臣願從大王討之未幾而愈卒公神道墓誌行状俱不載而止見扵小說者如此豈東坡所謂其生也有自来其死也有所為乎李肇國史𥙷謂愈登華山絶頂度不可返至扵發狂慟哭今觀易簀之際神色不亂如此不應扵此而至扵發狂慟哭也葛常之太白辭粟卧首陽屡空飢顔回當代不飲酒虗名安在㦲君不見梁王池上月昔照梁王尊酒中梁王巳去明月在黄鸝怨觧啼春風分明感激眼前事莫惜醉臥桃園東又平原君安在科斗生古池坐客三千人而今知有誰君不見孔北海英風豪氣今何在君不見裴尚, WYG: 庫全}
