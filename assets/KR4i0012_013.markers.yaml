  - {type: variant, offset: 5488, length: 392, content: 愧矣錢起集前八卷後五卷鮑欽止謂昭宗時有中書舎人錢翃亦起之諸孫今起集中恐亦有翃所作者余𥘉未知其所㨿也比見前集中有同程七早入中書一篇云不意雲霄能自致空驚鵷鷺忽相隨臘雪新晴百子殿春風欲上萬年枝和王員外雪晴早朝詩紫㣲晴雪帶恩光遶仗偏隨鴛鷺行長信月留寜避曉宜春花滿不飛香二詩皆翃所作無疑盖起未嘗入中書也集中又有登彭祖樓一詩而薛能集亦載則知所編甚駮也陳去非嘗謂余言唐人皆苦思作詩所謂吟安一箇字撚㫁數莖鬚句向夜深得心從天外歸吟成五字句用破一生心蟾蜍影裏清吟苦舴艋舟中白髪生之類是也故造語皆工得句皆竒但韻格不高故不能叅少陵之逸歩後之學詩者倘能取唐人語而掇入少陵繩墨歩驟中此速肖之術也余嘗以此語似葉少藴少藴云李益詩云開門風動竹疑是故人來沈亞之詩云徘徊花上月虚度可憐宵皆佳句也鄭谷掇取而用之乃云睡深可忍風敲竹飲散那堪月在花真可與李沈作僕奴由是論之作詩者興致先自高逺則去非之言可用倘不然便與鄭都官無異荆公嘗, WYG: 酸棗尉}
