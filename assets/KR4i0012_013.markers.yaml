  - {type: variant, offset: 5120, length: 367, content: 用破一生心贈喻鳬又云才吟五字句又白㡬莖鬚稱心寺中島云雪折停猿樹花藏浴鶴泉寄越上人又云窓接停猿樹巖飛浴鶴泉于使君詩云月中倚棹吟漁浦花底垂鞭醉鳯城送伍秀才詩又云倚棹寒吟漁浦月垂鞭醉入鳯城春其語言重叠有以見其窘也至扵野渡波揺月空城雨翳鍾白猿垂樹窓邊月紅鯉驚鈎竹外溪義行相識處貧過少年時等句誠無愧扵孫王所賞杜甫讀蘇渙詩則曰余髪喜郤變白間生黒絲高適觀陳十六史碑則曰我來觀雅製慷慨變毛髪韵語陽秋李長吉云我生二十不得意一生愁心謝如梧蘭至二十七而卒陳無巳除夜詩云七十已強半所餘能㡬何遥知暮景促更覺後生多至四十九而卒語意不祥如此豈神明者先受之耶丹陽老杜賦螢火詩云幸因腐艸出敢近太陽飛未足臨書卷時能點客衣似譏當時閹人用事扵人君之前不能主張文儒而乃如青蠅之點素也說者乃謂喻小有才而侵侮大徳豈不悞㢤羅隱竊取其意乃曰不思曾腐艸便擬倚孤光若道通文翰車公業長其視前, WYG: ''}
