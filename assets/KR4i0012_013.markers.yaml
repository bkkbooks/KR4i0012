  - {type: variant, offset: 5883, length: 11, content: 功謝蕭䂓慚漢第恩從隗始, WYG: 葉隨流水歸何處牛載寒鵶過别村百斛明珠眉山矮道士李伯祥好爲詩格亦不能高往往有竒語如夜過脩竹寺醉打老僧門皆可愛予幼時學於道士張易簡觀中伯祥與易簡往來嘗歎曰此郎君貴人也不知何以知之同前狄煥南岳石樓曉望云數㸃當秋霽不知何處峰題岳路松云一嶂雨聲歸洞壑兩條翠色下瀟湘雅言系述曽弼長沙人依逸人王元爲詩友宿玉泉寺云山偷半庭月池印一天星君山云翠壓魚龍窟寒堆波浪心蔣鈞字不器營道人與劉洞陳甫爲詩友寄栁宣云因借夢書過竹寺學耕秋粟繞茆原戎昱詩有一夜不眠孤客耳主人門外有芭蕉鈞代答云芭蕉葉}
