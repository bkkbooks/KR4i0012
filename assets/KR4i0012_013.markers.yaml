  - {type: variant, offset: 6298, length: 579, content: 云退之城南聮句云竹影金瑣碎金瑣碎者日光也恨句中無日字尔余謂不然杜子羙云老身倦馬河堤永踏盡黄榆緑槐影亦何必用日字作詩正欲如此葛常之自古工詩者未嘗無興也觀物有感焉則有興今之作詩者以興近乎訕也故不敢作而詩之一義廢矣老杜萵苣詩云两句不甲拆空惜埋泥滓野莧迷沒來空山實扵此皆興小人盛而掩抑君子也至高適題處士菜園則云耕地桑柘間地肥菜常熟為問葵藿資何如廟堂肉則近乎訕矣作詩者苟知興之與訕異始可與言詩矣高適别鄭處士云興來無不愜才大亦何傷寄孟五詩云秋氣落窮巷離憂兼暮蟬送蕭十八云常苦古人逺今見斯人古題陸少府書齋云散帙至棲鳥眀燈留故人皆佳句也上陳左相天地莊生馬江湖范蠡舟亦有含蓄但莊子謂天地一指萬物一馬而以天地為馬則悞矣並同上山谷詩多用稻田衲亦云曰衣王摩詰詩云乞飯從香積裁衣學水田又云手中花㲲净香飯稻畦成豈用是耶丹陽集晋張翰憶具中蓴菜鱸鱠而歸而高適屢作越上用如送崔功曹赴越云今朝欲乗興隨尔食鱸魚送李九赴越云鏡水若所憶蓴羹子舊便人以為疑余攷地理志漢呉縣隷今㑹稽郡則以鱸作越上亦無傷也韵語陽秋魯直謂東坡作詩未知句法而東坡題魯直詩云每見魯直詩未嘗不絶倒然此卷語妙甚殆非悠悠者可識能絶倒者巳是可人又云讀魯直詩如見魯仲連李太白不敢復論鄙事雖若不適用然不為無𥙷如此題識其許之乎其譏之也魯直酷愛陳無已詩而東坡亦不深許魯直為無已揚譽無所不至而無巳乃謂人言我語勝黄語何耶同上百家詩話總龜後集卷之十三, WYG: 踈}
