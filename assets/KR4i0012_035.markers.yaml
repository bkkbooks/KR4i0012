  - {type: variant, offset: 3298, length: 1898, content: 後集卷之三十五傷悼門復齋漫録云農桒不優歳常登邊將無㓛吏不能四十二年如夣覺東風吹泪過昭陵此詩題扵寢宮不著名氏冝表而出之許彦周詩話云楊舜韶名友䕫長㒒十餘歳向同在姑蘇時盗發孫堅墓楊作詩云闔廬城邊荒古丘昔誰塟者孫豫州乆無行客為下馬時有牧童来放牛嗚呼舜韶今亡矣他詩皆工必傳扵世也雪浪齋日記云弔辯才詩云滄海盡頭人㓕度亂峯深處塔孤貟憶登夜閣天連鴈同㸔秋崖月上烟劉僴云天連鴈前人有古戍天連鴈之句張南軒挽劉觀文詩憶昨登廊廟忠言逹帝聦听思惟盡瘁敢復計成㓛半世江湖上千憂寤寐中汗青誰秉筆請放衆言公一國恥臣當死公家三世心忍㸔誰絶筆誰續㫁弦音精爽今如在衣冠恨更深却嗟蜍與志處世漫侵㝷二平日多奇莭中間似冨公天從庐墓請人說捄荒㓛辛苦培邦本雍容遏乱鋒人傳遺奏切更過子囊忠三曽是南荆地他年竹馬迎旌旂嚴騎士弧矢盛民兵細放規摹舊還知莭制明思公如峴首同我泪縦横四南軒挽王詹事詞大莭元無玷中心本不欺排奸力扛䁀憂國鬂成絲方喜三旌召俄興一鑑悲西風吹泪眼夫豈哭吾私一睿主能飛曰如公舊學臣忠言関國計清莭映廷紳歳月身多外江湖澤在民當年遺直歎千古更如新二東莱挽王詹事諸老收聲盡佳城又到公蒼天不可問吾道竟成窮旌捲莆田雨簫横霅浦風今年襟上泪三哭萬夫雄一太史交㫋際元戎卷甲秋先鳴驚衆寐孤憤厭羣咻羽翼新鴻鵠聲華舊斗牛断橋無恙不落月照寒㳅二東萊挽汪端明異時憂世士歎息恨才難毎見公身健猶令我意寛彫零竟何極合復豈無端此理終難觧天風大隧寒一四海膺門峻親承二紀中論交由父祖受學自児童山岳千㝷上江湖萬折東徽言蔵肺腑欲吐與誰同二王龜齡悼張安國舎人天上張才子少年觀囯光高名一枝桂遺爱六州棠出世纔成佛修文遽作郎長沙屈賈誼宣室竟凄凉王龜齡挽趙氏詩全莭忠臣配崇寕宰相家哀能変國俗實不御鈆華學佛穷三昧然松教五車遺芳載彤𬋩名夀两俱遐東萊挽魏國録麻衣見天子拜䟽不知休落落山林氣拳拳畎畆憂極知千載遇政用一身酧繞舎閩溪水朝宗日夜流羣公祖踈傳多士送陽城短掉非前約長亭及此行深晋移白日語只蒼生㑹綺山陽賦鄰人笛未横東萊挩簫祭酒摩揣誠斯薄雕鎸質亦消平生但真撲直上絶枝條氛霧終澄霽丘山亦動摇陽舊時鳯声入舞簫韶王龜齡悼亡燕寢焚香老病身細君相對坐如賔而今一榻維摩室唯與無言法喜親一偕老相期未及朞囘頭人事巳成非逄春尚擬風光轉過眼忽驚花片飛二文昌雜録云梁均帝晋天福中始塟故妃張氏獨存考㓛貟外商鵬爲誌文曰七月有期不見望陵之妾九疑無色空餘泣竹之妃後唐武皇師還渭北不獲入覲幕客李襲告作違離表云穴禽有翼听舜樂以猶来天路無梯望尭雲而不到五代之季工翰墨者無以過此也許彦周詩話云外祖父邵安蕳公布衣時上平元吳䇿又嘗勸仁廟早立太子晚年自樞府出知越州又移知鄆州其薨也岐公作挽詞云披褐曽陳㝎羌䇿汗青猶著立修書春風澤國吟牋落夜雨溪堂燕豆踈前軰詩不獨語言精錬且是着題冷齋夜話云余問山谷今之詩人誰為冠曰無出陳無巳其佳句可得聞乎曰吾見其作温公挽辭一聮便知其才不可敵曰政雖随日化身巳要人扶王直方詩話云邢居實字惇夫年少豪邁所與㳺皆一時名士方年十四五時嘗作明妃引末云安得壮士霍嫖姚縳取呼韓作編戸諸公多稱之旣卒余收什其殘艸編成一集號曰呻吟惇夫自少便多憔悴感慨之意其作秋懐詩云高歌感人心心悲将柰何其作棗陽道中詩云有意問山神此生復來否巳而果卒扵漢東惇夫之卒也山谷以詩哭之云詩到随州更老成江山爲助筆縦横眼㸔白璧埋黄壤何况人間父子情盖謂惇夫與其子歆何也蔡天啓亦有詩云人物扵今歎眇然孤墳宿艸巳生烟曰暮行人道旁舎應逄年少共談玄其餘作者甚衆皆載扵呻吟集後寓情門古今詩話云牧之爲御史分司洛陽時李司徒罷鎮閑居聲妓爲當時苐一一日開筵朝士臻赴以杜嘗持憲不敢邀飲杜諷坐客逹意願預斯㑹李馳書杜聞􅒛遽來㑹中女妓百余皆絶色殊藝杜獨坐南行瞪目注視滿引三巵問李曰聞有紫雲者孰是李指示之杜凝睇良乆曰名不虚得宜以見恵李俯首而笑諸妓亦皆回首破顔杜又自引三爵朗吟而起曰華堂今日綺筵開誰喚分司御史來忽發狂言驚滿座两行紅粉一時囬意氣閑逸旁若無人苕溪漁隠曰東坡聞李公擇餘飲傳國傳家大醉有詩云不肯醒醒騎馬囘玉山知爲玉人頽紫雲有語君知否莫喚分司御史來即此事也又侍児小名録云兵部李尚樂妓崔紫雲詞華清峭眉目端䴡李公為尹東洛宴客将酣杜公輕騎而來連飲三觥謂主人曰嘗聞有能萹詠紫雲者今日方知名不虚得倘垂一意無以加焉諸妓囘頭掩笑杜作前詩罷上馬而去李公㝷以紫委送贈之紫雲臨行獻詩曰從來學製斐然詩不料霜臺御史知愁見便教随命去恋㤙腸断出門時侍児小名録不載此事出於何書疑好事者附㑹為之也東坡續䴡人行李仲謀家有周昉畫背面欠伸内人極精戯作此詩云深宫無人春晝長沉香亭北百花香羙人睡起薄梳洗燕舞鶯啼空断腸畫工𣣔畫無穷意背立春風初破睡若教囬首更嫣然陽城下蔡俱風靡子蒼用此意題伯時所畫宮女云睡起昭陽暗淡粧不知縁底背斜陽若教轉一囬首, WYG: 巻}
