  - {type: variant, offset: 5199, length: 601, content: 宫無粉粧終不及坡之偉䴡也藝苑雌黄云朝雲者東坡侍妾也嘗令就秦少㳺乞詞少㳺作南歌子贈之云靄靄迷春態溶溶媚暁光不應容易下巫陽秪恐翰林前世是㐮王暫為清歌駐還因暮雨忙瞥然㱕去断人腸空使蘭䑓公子賦高唐王直方詩話云無巳嘗作小放歌行两萹其一云春風永巷閉娉婷長使青樓悞得名不惜捲簾通一顧怕君着眼未分明其二云當年不嫁惜娉婷傅白施朱作後生說與旁人湏早計随冝梳洗莫傾城山谷云無巳他日詩語極高古至扵此萹則顧影徘徊衒耀太甚逰宴門蔡寛夫詩話云文忠與趙康靖公槩同在政府相得歡甚康靖先告老歸睢陽文忠相繼謝事歸汝隂康靖一日单騎車特徃過之時年巳八十矣㽞劇飲踰月日扵汝隂縦逰而後返前軰挂冠後能從容自適未有若此者文忠賦詩云古來交道愧難終此㑹今時豈易逄出處三朝俱白首凋零萬木見青松公能不逺來千里我病尤堪釂一鍾巳勝山隂空興盡且晋㱕駕為從容因榜其㳺從之地為㑹老堂明年文忠𣣔徃睢陽報之未果而薨两公名莭固師表天下而風流襟度又如此誠可以激薄俗也人間佳莭惟寒食天下名園重洛陽金谷煖横宮殿碧銅駞晴合綺羅光橋邊楊栁細垂地花外秋千半出墻白馬蹄輕艸如剪爛逰扵此十年狂康莭春逰呤東臯雜録云孔嘗甫言唐人詩有城頭推鼓傳花枝席上搏拳握松子乃知酒席蔵􅍐為戯其來也乆復齋漫録云仲至使遼囬謁恭敏李公席中賦詩云穹庐三月巳淹晋白艸黄雲見即愁滿䄂塵埃何処洗李家池上海棠洲許彦周詩話云退之詩酩酊馬上知為誰此七字用意哀悲過扵痛哭又詩云銀燭未消窓送曙金釵半醉坐添春殊不類其為人乃知能賦梅花不獨, WYG: ''}
