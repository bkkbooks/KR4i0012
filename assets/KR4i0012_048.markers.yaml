  - {type: variant, offset: 3586, length: 0, content: '', WYG: 日長篇險韻衆製交作筆吏疲於寫錄僮史奔走往来間以滑稽嘲謔加於風刺更相酧酢往往哄堂絶倒自謂一時盛事此前未之有也歸田録詩話總龜後集巻一欽定四庫全書詩話總龜後集巻二宋阮閱撰忠義門世人論淵明自永初以後不稱年號秖稱甲子與思侻所論不同觀淵明讀史九章其間皆有深意其尤章章者如夷齊箕子魯二儒三篇夷齊云天下革命絶景窮居正風凌俗爰感懦夫箕子云去鄉之感猶有遲遲矧伊代謝觸物皆非魯二儒云易代随時迷變則愚介介若人特為正夫由是觀之則淵明委身蓬巷甘黔婁之貧而不自悔者豈非以恥事二姓而然也葛常之子美詩雖有古殿存世尊亦䝉埃山僧衣藍縷告訴棟梁摧本即所賦自然及於乗輿䝉塵股肱非材之意忠義所激一飯不忘君邪黄常明明宗召蜀中舊臣賦蜀主降巨唐詩王偕等譏荒滛獨中丞牛希濟曰唐主再懸新日月蜀王難保舊山川明宗曰希濟不忘君親忠孝也賜百叚余謂希濟但能兩解之辭而已江革云不能殺身報主得死為幸誓不為人執筆此可以厲臣子之節碧溪詩人比雨如絲如膏之類甚多至杜牧乃以羽林鎗為比恐未盡其形似念昔逰云雲門寺外逢猛雨林黒山髙雨脚長曽奉郊宫為近侍分明􅋏􅌶羽林鎗大雨行云四面明騰玉京仗萬里横互羽林鎗豈去國凄㫁之情不能忘雞翹豹尾中耶丹陽集栁遷南荒有云愁向公筵問重譯欲投章甫作文身太白云我似鷓鴣易南遷懶北飛皆褊忮躁辭非畎畝惓惓之義杜詩云馮唐雖晩逹終凱在皇都愁来有江水焉得北之胡其賦張曲江云歸老守故林戀闕悄延頸乃心王室可知黄常明世俗誇太白賜床調羮為榮力士脫靴為勇愚觀唐宗渠渠於白豈真樂道下賢者哉其意急得艶詞媟語以悅媍人耳白之論撰亦不過玉樓金殿鴛鴦翡翠等語社稷蒼生何賴就使滑稽傲世然東方生不忘納諌况黄屋既為之屈乎說者以謀謨潜宻厯考全集愛國憂民之心如子美語一何鮮也力士閨闥腐庸惟恐不當人主意挟主勢駈之何所不可脫靴乃其職也自退之為蚍蜉撼大樹之喻遂使後學吞聲余竊謂如論其文章豪逸真一代偉人如論其心術事業可施廊廟李杜齊名真忝竊也䂬溪汲長孺叚太尉皆義勇奮不顧身之人至於仁愛撫養矜憐惻怛無所不至所謂剛者必仁仁者必勇也嘗觀樂天云况多剛狷性難與世同塵希文云吾生豈不幸所禀多剛腸皆心中語也白則有敢辭為俗吏且欲活疲民又云心中有念農桑苦耳裏如聞飢凍聲范有寸懐如春風思與天下共赴姑蘇云豈辭雲水三千里由濟瘡痍十萬民與汲叚正相似黄常明靈徹有相逢盡道休官去林下何曽見一人世傳為口實凡語及抽簮即以此譏之余謂矯飾罔人固不足論若出於至誠時對知已一吐心胷何害觀昌黎送盤谷云行抽手板付丞相不待彈劾歸農桑贈侯喜便當提擕妻與子南入箕潁無還時如今便當去咄咄無自痴如今更誰恨可便耕㶚涯此類凡數十豈茍以飾口哉其剛勁之操不少屈所守素定故也䂬溪永叔嘗試謁執政坐中賦雪詩云主人與國共憂戚豈惟喜悅将豊登須怜鐵甲冷徹骨四十餘萬屯邊兵當時乃謂唐韓退之亦能道言語其預裴晉公宴㑹但云園林窮勝事鐘鼓樂清時不曽如此作閙殊不知老杜一言一詠未曽不在於憂國恤人物我之際則淡然無著夏日歎曰浩蕩想幽薊王師安在哉夏夜歎曰念我荷戈士窮年守邊疆此仁人君子之用心終食不可忘也邊兵之語豈為過哉如退之始知神官未賢聖護短憑愚要我敬雪徑抵樵叟風廊折談僧真作閙詩也䂬溪余觀楚國先賢𫝊言汝南應璩作百一詩譏切時事編以示任事者皆怪愕以為應焚棄之及觀文選所載璩百一篇畧不及時事何耶又觀郭茂倩雜體詩載百一詩五篇皆璩所作首篇言馬子侯解音律而以陌上桑為鳳將雛二篇傷翳桑二老无以葬妻子而已無宣孟之徳可以賙其急三篇言老人自知桑榆之景斗酒自勞不肯為子孫積財末篇即文選所載是也第四篇似有諷諫所謂茍欲娛耳目快心樂腹腸我躬不悦懽安能慮死亡此豈非所謂應焚棄之詩乎方是時曹爽事多違法而璩為爽長史切諫其失如此所謂百一者庶幾百分有一補于爽也而爽卒不悟以及于禍或謂以百言為一篇者以字數而言也或謂百者數之終一者數之始士有百行終始如一者以士行而言也然皆穿鑿之説何足論哉後何遜亦有擬百一體所謂靈輒困桑下於陵拾李螬其詩一百十字恐出于或者之説然璩詩每篇字數各不同第不過四十字爾丹陽集杜扁舟空老去無補聖明朝又云報主心已老以稷契人而使老棄閒曠非唯不形怨望且惓惓如此彼遭時遇主言聽計從復幸年鬢未暮而不能攄誠戮力以圖報効良不愧此歟䂬溪明朝有封事數問夜如何此幸而得之坐以待旦之意避人焚諫草騎馬欲雞栖所謂嘉謀嘉猷入告爾后于外曰斯謀斯猷惟我后之徳也黃常明一朝自罪已萬里車書通此與無逸旅獒孟子格君心之非汲長孺諫上多慾魏鄭公十漸陸宣公奉天詔書無二道也同上昌黎云詣闕二上書臣非黃冠師臣有膽與氣不忍死茅茨韋應物送李山人云聖朝多遺逸披膽謁至尊豈是貪寵榮誓將救元元梅聖俞贈師謩云臣豈為身謀而邀陛下惓是皆急於得君非為利禄計者也同上杜詩公若登台輔臨危莫愛身寄裴道州蘇侍御云致君堯舜付君等早據要路思捐軀此公素所蓄積而未及施設者故樂以語人耳夫全軀碌碌之臣果何能為汲長孺云天子置公卿寧令従諛承意縱愛身柰辱朝廷何任遐曰褚彦囬保妻子愛性命遐能制之觀此以騐二詩信有證矣自比稷契豈為過哉岑侍御行軍詩平生抱忠義不敢私㣲軀范文正公云一入諌諍司鴻毛忽其身䂬溪世人喜子美造次不忘君嘗觀其祖審言除夜云還将萬億夀更謁九重城則教忠之家風舊矣張堯佐以進士擢第累官至屯田員外郎知開州㑹其姪女有寵於仁宗冊為脩媛堯佐遂驟遷擢一日中除宣徽節度景靈羣牧四使是時御史唐介上䟽引天寳楊國忠為戒不報又與諫官包拯呉奎等七人論列殿上既而御史中丞留百官班欲以廷諍卒奪堯佐宣徽景靈両使特加介一品服以旌敢言未㡬堯佐復除宣徽使知河陽唐謂同列曰是欲與宣徽而假河陽為名耳我曹豈可中巳邪同列依違不前唐獨争之不能奪仁宗諭曰差除自是中書介遂極言宰相文彦博以燈籠錦媚貴妃而致位宰相今又以宣徽使結堯佐請逐彦博而相富弼又言諫官觀望挟姦而言涉宫掖語甚切直仁宗怒趣召兩府以疏示之介猶諍不巳樞宻副使梁適叱介使下殿介諍愈切仁宗大怒玉音甚厲共恐禍出不測是時蔡襄脩起居注立殿陛即進曰介誠狂直然納諌容言人主之美徳必望全貸遂貶春州别駕翊日御史中丞王舉正救解之改為英州别駕始上怒未巳兩府竊議曰必重貶介則彦慱不安彦慱去即吾屬遞遷矣既而果如其料當是時梅堯臣作書竄詩曰皇祐辛夘冬十月十九日御史唐子方危言初造膝曰朝有巨姦臣介所憤疾願條一二事臣職敢妄率宰相文彦慱邪行世莫匹曩時守城都委曲媚貴暱銀璫揷左貂窮臘便馳驛邦媛将夸侈中金齎十鎰為我寄使君竒文織纎宻遂傾西蜀巧日夜擊鞭朴紅絲緯金縷排科闘八七比比雙蓮華篝燈戴星月幾日成一端持行如􅄦疾明年觀上元被服穏稱質璨然奪上目遽爾有薄詰既聞所從來接對似未失且云奉至尊於妾豈能必遂回天子顔百事容丐乞臣今得粗陳狡猾彼非一偷威與賣利次第推甲乙是惟隂猾雄仁㫁宜勇黜必欲致太平在列無如弼弼亦昧平生况臣不阿屈臣言天下公奚以身自䘏君旁有側目喑啞横詆叱指言為罔上廢汝還蓬蓽是時白此心尚不避斧鑕雖令禦魑魅甘且同飴宻既知弗可惧復以強詞窒帝聲亦大厲論奏不容畢介也容甚閑猛士膽為慄立貶海外春速欲為異物内外官恟恟陛下何未悉即敢救者誰襄執左右筆謂倘不包容盛美有所咈平明中執法懐疏又堅述介言或似強百豈無一實恐傷四海和幸勿苦倉卒亟許遷英山衢路猶嗟咄翊日宣白麻稱决口盈溢阿附連諌官去若壊絮虱其間因獲利竊笑等蚌鷸英州五千里瘦馬行䭿䭿毒蛇噴曉霧晝與嵐氣沒妻孥不同途風浪過蛟窟存亡未可知雨舘愁傷骨飢僕時後先隨緣拾橡栗粤林多蔽天黄柑雜丹橘萬室通釀酤撫逺無禁律醉去不論錢醒来等鳴瑟山水仍竒怪已可消憂欝莫作楚大夫懐沙自沉汨西漢梅子真出為呉市卒市卒且不慚况兹别乗秩始堯臣作此詩不敢示人及歐陽脩為編其集時有嫌避又削去此詩是以少人知者故今全録焉東軒筆録鄭谷與僧齊已黄損等共定今體詩格云凡詩用韻有數格一曰葫蘆一曰轆轤一曰進退葫蘆韻者先二後四轆轤韻者雙出雙入進退韻者一進一退失此則繆矣余按倦逰雜録載唐介為䑓官廷疏宰相之失仁廟怒謫英州别駕朝中士大夫以詩送行者頗衆獨李師中待制一篇為人傳誦詩曰孤忠自許衆不與獨立敢言人所難去國一身輕似葉髙名千古重於山並逰英俊顔何厚未死姦諛骨巳寒天為吾君扶社稷肯教夫子不生還此正所謂進退韻格也按韻畧難字第二十五山字第二十七寒字又在二十五而還又在二十七一進一退誠合體格豈率爾而為之哉近閱冷齊夜話載當時唐李對荅話言乃以此詩為落韻詩葢渠伊不見鄭谷所定詩格有進退之說而妄為云云也素緗雜記唐介始彈張堯佐諫官皆上疏及彈文彦博則呉奎畏縮不全當時謂拽動陣脚及唐争論於上前遂并及奎之背約執政又黜奎而文潞公益不安遂罷政事時李師中詩送唐有並逰英俊顔何厚未死姦諛骨已寒之句為奎發也東軒詩話總龜後集巻二欽定四庫全書詩話總龜後集巻三宋阮閱撰孝義門徐師川詩云楚漢紛争辨士憂東歸那復割鴻溝鄭君立義不名籍項伯胡顔肯姓劉謂項伯籍之近族乃附劉而背項鄭君已為漢臣乃違漢而思楚也余嘗論之曰方劉項之勢雌雄未决也其間豈無容容狡詐之士首鼠兩端以觀成敗而為身謀者乎項伯是也其意以謂項氏得天下則吾嘗以宗族從軍畫䇿定計豈吾廢哉劉氏得天下則鴻門之㑹吾嘗舞劍以蔽沛公矣廣武之㑹吾嘗勸勿烹太公矣劉氏豈吾廢哉髙祖之封項伯殆以此也至鄭君則不然事籍籍死屬漢髙祖諸故楚臣名籍鄭君獨不奉詔乃盡拜名籍者為大夫而逐鄭君觀此則鄭君與項伯賢佞可見髙祖或逐或封皆徇情之好惡則知戮丁公者一時矯激之為也王儉七志曰宋髙祖逰張良廟並命僚佐賦詩謝瞻所賦冠于一時今載於文選者是也其曰鴻門銷薄蝕陔下隕欃槍爵仇建蕭宰定都䕶儲皇肇允契幽叟飜飛指帝鄉則子房輔漢之䇿盡於此數語矣王荆公云素書一巻天與之榖城黄石非吾師固陵解鞍聊出口捕取項羽如嬰兒従来四皓招不得為我立弃商山芝用亦此數事而論議格調出於常等東坡論子房袖搥之事以謂良不為伊吕之謀而倖出於荆軻聶政之計以余觀之此良少年之銳氣未足以咎良也圯上授書之後所見豈前比哉葛常之予曽祖通議兄弟四人取良辰美景賞心樂事之義作四并堂于東園故通議詩云華圃控弦秋學射寒窻留燭夜抄書良辰美景饒心事歡日相并樂起予先祖清孝公兄弟六人取三荆同林之義作培荆亭于西園當時篇詠無存者清孝安遇集中有倍荆亭記其畧云西園椎輪無亭觀之玩伯兄欲糾合叔季同耳目之適於是基盈尺之髙宏一筵之廣列檻為亭號曰培荆至先人文康公罷官南陽適當兵擾復還舊棲奉伯父工部居焉别建二老堂于宅南秦望由里諸山皆在目植花竹于四隅命某日治饌往往樂飲竟日某嘗賦詩云去家纔隔水一股二老堂成三百弓鴒原暮下沙水暖鴈行夜落霜天空竹根酌酒不妨醉花蕚斵詩如許工坐久興開笻竹杖出門人指兩仙翁同上月輪當空天下之所共視故謝荘有隔千里兮共明月之句盖言人雖異處而月則同瞻矣老杜當兵戈騷屑之際與其妻各居一方自人情觀之豈能免閨門之念而他詩未嘗一及之至於明月之夕則遐想長思屢形詩什月夜詩云今夜鄜州月閨中只獨看繼之曰香霧雲鬟濕清輝玉臂寒一百五日夜對月云無家對寒食有淚如金波繼之曰仳離放紅蘂想像顰青蛾江月詩云江月光於水髙樓思殺人繼之曰誰家排錦字燭滅翠眉顰其數致意閨門如此其亦謝荘之意乎顔延之對孝武乃有荘始知隔千里兮共明月之說是荘才情到處延之未能曉也同上魏武於諸子中獨愛植丁儀丁􅛫楊脩之徒為植羽翼㡬代太子丕而植狂性不自雕勵又太子御之有術故易宗之計不行蓋非植遜丕也洎文帝即位植屢求試用不報益怏怏帝欲害之卞太后曰汝已殺任城不宜復殺東阿故止従貶爵則植豈無怨懟乎嘗觀植所作豫章行云他人雖同盟骨肉天性然周公穆康叔管蔡則流言子臧孫千乗季札慕其賢意謂巳素為武帝所愛忌之者衆故有管蔡流言之說然乃自以季札為比亦誣矣豈其掠美之言哉同上晉嵇康贈弟秀才四言詩云感悟馳情思我所欽則以所欽為弟陸機贈從兄車騎詩云寤寐靡安豫願言思所欽則以所欽為兄又贈馮文罷詩云慷慨誰為感願言懐所欽則以所欽為友陸機作詩贈賈謐㡬三百言無非極其褒讃方謐用事生死榮辱人如反覆手其褒讃亦何足怪然其間亦有寄意譏誚人未能推其意者按臧榮緒晋書謐父韓夀毋賈充少女也充平生不議立後妻郭槐輙以外孫韓謐襲封帝許之遂以謐為魯公則是賈謐非充子也故機詩云誕育洪胄纂戎于魯言誕育則以譏非已生也又曰惟漢有朩曽不踰境謂橘踰淮則化為枳言如螟蛉之化蜾蠃無異也夫謐勢熖薫灼如此而機敢為廋詞以狎侮之真文人之習氣哉王福畤之子勔􅀈勃皆有才名故杜易簡稱為三珠樹其後助劼勸又皆以文顯勃於兄弟之間極友愛自鄉逺虢詩云人生忽如客骨肉知何常願及百年内花蕚常相将無使棠棣廢取譬人無良觀此語意豈兄弟有不相能者耶及觀誡劼勸云欲不可縱争不可常勿輕小忿将成大殃此二人者似非處於禮義之域者棠棣廢之語疑為此二人設也同上楊六尚書白樂天妻兄也初除東川節度代妻賀兄云覔得黔婁為妺婿可能空寄蜀茶来又寒食寄詩云蠻旗似火行隨馬蜀妓如花坐遶身不使黔婁夫婦看誇張富貴向何人皆責望之言也同上文選載嵇叔夜贈秀才入軍詩李善注謂兄喜秀才入軍而張銑謂叔夜弟不知其名考五詩或曰攜我好仇或曰思我良朋或曰佳人不在皆非兄弟之稱善銑所注恐未必然爾同上錢起題杜牧林亭詩云不須躭小隠南阮在平津南阮謂杜悰也史載悰更厯将相而牧困躓不自振怏怏不平以至於卒審爾以牧之豈肯受其料理哉然宗族貴宦河潤者非一枯死升沉時命存焉何至怏快如是可以知牧之量不宏也李義山作驕兒詩時衮師方三四嵗爾其末乃云兒應勿學耶讀書求甲乙况今西與北羗戎正狂悖兒當速成大探雛入虎窟當為萬户侯勿守一經袠兵連旤結生民塗炭以日為嵗之時而乃望三四嵗児立功於二十年後所謂俟河之清人夀幾何者也同上陶淵明命子篇則曰夙興夜寐願爾之才爾之不才亦巳焉哉其責子篇則曰雖有五男兒總不好紙筆天運茍如此且進杯中物告儼等數則曰鮑叔管仲同財無猜歸生伍舉班荆道舊而况同父之人哉則淵明之子未必賢也故杜子美論之曰有子賢與愚何其掛懐抱然子美於諸子亦未為忘情者子美遣興詩云驥子好男兒前年學語時世亂憐渠小家貧仰母慈又憶幼兒詩云别離經節換聦慧與誰論憶渠愁只睡炙背俯晴軒得家書云熊兒幸無恙驥子最憐渠元日示宗武云汝啼吾手戰觀此數詩於諸子鍾情尤甚於淵明矣山谷乃云杜子美困於三蜀蓋為不知者詬病以為拙於生事又往往譏宗武失學故寄之淵明爾俗人不知便為譏病所謂癡人面前不得說夢也同上詩話總龜後集巻三欽定四庫全書詩話總龜後集巻四宋阮閱撰孝義門唐人與親别而復歸謂之拜家慶盧象詩云上堂家慶畢顧與親思邇孟浩然詩云明朝拜家慶湏著老莱衣葛常之荆公初去臨川詩云馬頭西去涙霑襟一望親庭更苦心已覺省煩非仲叔安能養志似曽參赴調西京時詩也非仲叔則自傷不能養口體不如曽參則自傷不能養志也人士一官所駐乃爾為志亦豈得巳哉後又有詩云古人一日養不以三公換正為此爾葛常之張劒州以太夫人喪劒州歸荆公予之詩并示女弟云烏辭反哺顛毛黒鳥引思歸口舌丹又有張劒州至劒一日以親憂罷詩云白頭反哺秦烏側流血思歸蜀鳥前所賦皆一時之事而語意重復如此何耶同上陳繹奉親至孝嘗作慶老堂以娯其母介甫贈之詩云種竹常疑出冬筍開池故合涌寒泉蓋不獨詠堂前景物而孝感之事實寓焉出冬筍暗用孟宗事涌寒泉暗用姜詩事同上王稚川調官京師毋老留鼎州久不歸侍嘗閱貴人歌舞有詩云畫堂玉珮縈雲響不及桃源欵乃歌山谷次韻諷之曰慈母毎占烏鵲喜家人應賦扊扅歌可謂盡朋友責善之義谷至孝奉母安康君至為親滌厠牏浣中裙未嘗頃刻不供子職洎貶黔南不能與親俱則贈王郎詩云留我左右手奉承白髮親至贛上食蓮有感則曰蓮實大如指分甘念母慈亦可見其孝誠矣余聞無瑕者可以録人則其告稚川之語未為過也老杜送李舟詩非不歸重而其中亦不能無譏焉所謂舟也衣彩衣告我欲逺適倚門固有望歛衣就行役南登吟白華已見楚山碧何時太夫人堂上㑹親戚豈非譏其無方之道耶孔子云父母在不逺逰逰必有方則山谷少陵之詩皆孔子之意也人之事親當以敬為主故孔子告子游曰至於犬馬皆能有養不敬何以别乎束晳作補亡詩於南陔白華二篇每以為言南陔曰養隆敬薄惟禽之似白華曰竭誠盡敬亹亹忘劬可謂得孔子之㫖矣今之人恃親之愛已而忘其敬者多故表而出之以為事親之戒同上李白樂府三巻於三綱五常之道數致意焉慮君臣之義不篤也則有君道曲一篇所謂軒后瓜牙常先太山稽如心之使臂小白鴻翼於夷吾劉葛魚水二慮父子之義不篤也則有東海勇婦之篇所謂淳于免詔獄漢主為緹縈津妾一棹歌脫父於嚴刑生子若不肖不如一女英慮兄弟之義不篤也則有上留田之篇所謂田氏倉卒骨肉分青天白日摧紫荆交柯之朩本同形東枝顦顇西枝榮無心之物尚如此參商胡乃尋天兵慮朋友之義不篤也則有箜篌謡之篇所謂貴賤交結心不移惟有嚴陵及光武輕言託朋友對面九疑峰管鮑久已死何人繼其蹤慮夫婦之情不篤也則有雙燕離之篇所謂雙鷰復雙鷰雙飛令人羡玉樓珠閣不獨棲金窻繡户長相見徐究白行事亦豈純於行義者哉永王之叛白不能潔身而去於君臣之義為如何既合于劉又合于魯又娶于宋又擕昭陽金陵之妓於夫婦之義為如何至於友人路亡白為權窆及其糜潰又收其骨則朋友之義庶幾矣送蕭十一之魯兼問稚子伯禽有髙堂倚門望伯魚魯中正是趨庭䖏君行既識伯禽子應駕小車騎白羊之句則父子之義庶㡬矣如弟凝錞儕况綰各贈詩以致其雍睦之情則兄弟之義庶㡬矣惜乎二失既彰三美莫贖此所以不能為醇儒也韻語陽秋樂天及第後歸覲留别同年云擢第未為貴拜親方始榮此毛得檄而喜之意也論者以春風得意疾决非孟郊語其氣格亦不類而白公亦有得意减别恨半酣輕逺程翩翩馬蹄疾春風歸鄉情此又不可曉也黄常明范文正公雷霆日有犯始可報吾親誰謂臣子忠孝難兩全也涖官不敬戰陣無勇本非事親事禮記必以為非孝公之謂歟黄常明宗族門謝師厚生女梅聖俞與之詩曰生男衆所喜生女衆所醜生男走四隣生女各張口男大守詩書女大逐鷄狗又云何時集氏郎堂上拜媪叟盖戯師厚也陳琳杜甫詩及楊妃外傳其說異陳琳痛長城之役則曰生男戒勿舉生女哺用脯杜甫傷闗西之戍則曰生女猶淂嫁比鄰生男埋沒随百草楊妃専寵帝室金印紫綬寵遍於銛釗象服魚軒榮均於秦虢當時遂有生女勿悲酸生男勿喜歡男不封侯女作妃君看女却為門楣之詠而樂天長恨歌亦云遂令天下父母心不重生男重生女令師厚之女敏質儒門不過求賢士以為之配爾縦不至負薪如翟婦餉㫪如孟光亦豈能預知其必大富貴亢宗榮族如蒲之婦人乎宜其聖俞以為戯也韻語陽秋傳曰學士大夫則知尊祖矣族之所在祖之所自出也其可以不敬乎陶淵明有贈長沙公詩序云予於長沙公為族祖同出大司馬昭穆既逺巳為路人故其詩云同源分流人易世踈慨然晤歎念斯厥初禮服遂悠嵗月𦕈徂感彼行路眷焉踟蹰盖深傷之也長沙公於淵明如此而淵明乃以宗族自任其臨别贈言之際有進簣雖少終在為山之句嗚呼淵明亦可謂賢矣杜子美數訪從孫濟而不免於防猜故其詩云所来為宗族亦不謂盤餐勿受外嫌猜同姓古所敦觀長沙與濟尊祖之義掃地矣韻語陽秋詩話總龜後集巻四欽定四庫全書詩話總龜後集巻五宋阮閱撰仁愛門孟子七篇論君與民者居半其餘欲得君盖以安民也觀杜陵窮年憂黎元歎息腸内熱胡為将暮年憂世心力弱宿花石戍云誰能扣君門下令減征賦寄栢學士云㡬時髙議排金門各使蒼生有環堵寧令吾廬獨破受凍死亦足而志在大庇天下寒士其仁心廣大異夫求穴之螻蟻輩真得孟子所存矣東坡問老杜何如人或言似司馬遷但能名其詩耳愚謂老杜似孟子盖原其心也䂬溪韋蘓州云身多疾病思田里邑有流亡愧俸錢郡中屢集云自慚居處崇未覩兹民康余謂君子當切切作此語彼有一意供租専事土朩而視民如讐者得無愧此詩乎同上賈生終童欲輕事征伐大扺少年躁鋭如經厯老成當不如此昔人欲沈孫武於五湖斬白起於長平誠有謂哉嘗愛老杜云慎勿吞青海無勞問越裳大君先息戰歸馬華山陽又有安得壮士挽天河净洗甲兵長不用安得務農息戰閗普天無吏横索錢願戒兵猶火恩加四海深不眠憂戰伐無力正乾坤其愁歉憂戚蓋以人主生靈為念孟子以善言陣戰為大罪我戰必克為民賊仁人之心易地皆然黄常明臨川云黄雀百頭顱長行萬里餘因君令出守暫得免苞苴使能行此言則虐生類以飽口腹刻疲民以肥權勢者寡矣其詩才二十字耳崇仁愛抑奔競皆具焉何以多為杜云築塲憐穴蟻拾穗許村童人謂有仁愛民物意臨川詠促織云只向貧家促機杼㡬家能有一絇絲愚謂世之嚴督征賦不恤疲瘵之有無者雖魁然其形實微䖝智爾䂬溪元結刺道州承兵賦之後徴率煩重民不堪命作㫪陵行其末云何人采國風吾欲獻此詩以傳考之結以人困甚不忍加賦嘗奏免稅租及和市雜物十三萬緡又奏免租庸十餘萬緡因之流亡盡歸乃知賢者所存不特空言而已丹陽集范文正淮上遇風云一櫂危於葉旁觀欲損神他年在平地無忽險中人雖弄翰戯語卒然而作險濟加澤之心未嘗忘也黄常明王道州㫪陵行云所願見王官撫養以恵慈柰何重驅逐不使存活為逋緩違詔令䝉責願所宜又云守官貴守道不愛能適時賊退示官吏云使臣將王命豈不如賊焉令被徴歛者迫之如火煎誰知絶人命以作時世賢子美志之曰今盗賊未息知民疾苦得結輩十數人為邦伯萬姓氣吐天下少安立可待已余謂漫叟所以能然者先民後已輕官爵重人命故也觀其石魚詩云金魚吾不須軒冕吾不愛此所以能不徇權勢而専務愛民也杜乃知正人意不茍飛長纓可謂相知深矣同上友義門蘇武李陵在武帝時同為侍中金蘭之義素篤武拘於匈奴明年而陵始降雖逆順之勢殊悲懽之情異然朋友之誼此心常烱烱也觀陵海上勸武使降之言非不切至而武之所以告陵者不過明吾忠義之心而已而未嘗一語及陵之叛若告衛律者則不然盡辭詬詈歸之於不忠不臣之科而此以節義臨之㡬使惡死此亦可以見於陵厚矣後武得歸陵置酒賀武曰今足下還歸揚名於匈奴功顯於漢室雖古竹帛所載丹青所畫何以過子卿故李太白蘓武詩云渇飲月窟水飢飡天上雪東還沙塞逺北愴河梁别泣把李陵衣相看涙成血蓋亦是意語爾韻語陽秋石林詩話元豐間東坡繫獄神宗本無意罪之時相因舉軾檜詩根到九泉無曲處嵗寒惟有蟄龍知且云龍飛在天軾以為不知已而求知地下之蟄龍非不臣何得章子厚從而解之遂薄其罪而王定國見聞錄云東坡在黄州時上欲復用王禹玉以嵗寒惟有蟄龍知激怒上意章子厚力解遂釋予觀東坡自獄中出與章子厚書云某所以得罪其過惡未易一二數平時惟子厚與子由極口見戒反復甚苦某強狠自不以為然又云往時相識但過相稱譽以成吾過一旦有患難無復相哀昔唯子厚平居遺我以藥石及困急又有以救䘏之真與世異矣則知坡繋獄時子厚救解之力為多石林詩話不妄也陽秋東坡歸陽羡時流離顛躓之餘絶禄已數年受梁吉老十絹百絲之􅀈可見非有餘者李憲仲之子鷹以四喪未舉而見公則盡以贈之且贈以詩曰推衣贈孝子一溉滋湯旱誰能脫左驂大事不可緩章季黙三喪未𦵏亦求於公公亦以助之有不辭毛粟施行自邱山積之句其髙蓋出於天資矣同上幼敏門西清詩話云魯直少警悟八嵗能作詩送人赴舉云送君歸去明主前若問舊時黄庭堅謫在人間今八年此已非髫稚語矣桐江詩話云山谷七嵗作牧童詩云騎牛逺逺過前村吹笛風斜隔隴聞多少長安名利客機闗用盡不如君林傑幼而聰慧言發成文質瑩凝脂音清扣玉嘉聚羣書又妙于手談當時名公多與之交及有是子益大其門亷使崔侍郎闕與之遷職詞云家藏萬巻學富三冬傑五嵗父因挈行云云後業詞賦頗振聲光有仙客入壺中賦云仙客以變化隨逍遥放情處於外則一壺斯在入其中則萬象皆呈飛閣重樓不是人間之状竒花異朩無非物外之名至九嵗謁大夫盧員常侍黎埴無不嘉奨尋就賔薦日在讌筵侍御李逺支使趙格深所知仰不捨斯須和趙支使詠荔枝尤佳云金盤摘下排朱顆紅壳開時飲玉漿副使鄭立竒童傳制使劉潼序以貽之閩川名士傳王元之年七八嵗已能文畢文簡公為郡從事始知之問其家以磨麫為生因令作磨詩元之不思以對但存心裏正無愁眼下遲若人輕著力便是轉身時文簡大竒之當於子弟中講學一日太守席上出詩句鸚鵡能言爭似鳳坐客皆未有對文簡寫之屏間元之書其下蜘蛛雖巧不如蠶文簡歎息曰經綸之才也遂加以衣冠呼為小友至文簡入相元之已掌書命矣聞見録後志氣門蔡寛夫詩話云太白之從永王璘世頗疑之唐書載其事甚畧亦不為明辨其是否獨其詩自序云夜半水軍来潯陽滿旌旃空名適自誤迫脅上樓船從賜五百金棄之若浮烟辭官不受賞翻謫夜郎天然太白豈從人為亂者哉蓋其學本出從横以氣俠自任當中原擾攘時欲藉之以立竒功耳故其巡歌有但用東山謝安石為君談笑靜胡沙之句至其卒章乃云南風一掃胡塵靜西入長安到日邊亦可見其志矣大扺才髙意廣如孔北海之徒固未必有成功而知人料事尤其所難議者或責以璘之猖獗而欲仰以立事不能如孔巢父蕭頴士察於未萌斯可矣若其志亦可哀已蘇子由云李白詩類其為人俊發豪放華而不實好事喜名不知義之所在也其語兵則先登䧟陣不以為難語游俠則白晝殺人不以為非此豈其誠能也白始以詩酒奉事明皇遇䜛而去所至不改其舊永王將據江淮白起而従之不疑遂以放死今觀其詩固然唐詩人李杜稱首今其詩皆在杜甫有好義之心白所不及也漢髙祖歸豐沛作歌曰大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方髙帝豈以文字髙世者帝王之度固然發於中而不自知也白詩反之曰但歌大風雲飛揚安得猛士守四方其不識理如此老杜贈白詩有重與細論文之句謂此類也髙齋詩話云荆公題金陵此君亭詩云誰怜直節生来瘦自許髙才老更剛賔客毎對公稱頌此句公輒顰蹙不樂晩年與平甫坐亭上視詩牌曰少時作此題榜一傳不可追改大扺少年題詩可以為戒平甫曰此楊子雲所以悔其少作也石林詩話云荆公以意氣自許故詩語為其所向不復更為㴠蓄如天下蒼生待霖雨不知龍向此中蟠又濃綠萬枝紅一㸃動人春色不湏多又平治險穢非無力潤澤焦枯是有才之類皆直道其胷中事後為郡牧判官従宋次道盡假唐人詩集博觀而約取晩年始盡深婉不迫之意乃知文字雖工拙有定限然必視其幼壯雖公方其未至亦不能力強而遽至也石林詩話云蘇明允至和閒在京師既為歐陽文忠公所知其名翕然韓忠獻諸公皆待以上客嘗遇重陽忠獻置酒私第惟文忠與一二執政而明允乃以布衣參其間郡人以為異禮席間意氣尤不少衰明允詩不多見然精深有味語不徒發正類其文而讀易詩云誰為善相應嫌瘦後有知音可發弹婉而不迫哀而不傷所作自不必多也述志門余嘗官展嘗借詩集於士人中有小篇序云成都華陽天慶中進士葉沆作止百篇時有可觀如閑居感懐云身閑難報國語直易傷時村墅云夜庭和月掃秋户拂雲開亦可想見其胷襟也和靖與士夫詩未嘗不及遷擢與學子詩未嘗不言登第視此為何等随緣應接不為茍難亢絶如此老杜云本無軒冕意不是傲當時鍾鼎山林各天性濁醪麄飰任吾年道義重而輕王公者也阮孝緒南平王要之不赴曰非志驕富貴但性畏廟堂使麏麚可驂何異驥騄求意門復齋漫錄云書當快意讀易盡客有可人期不来世事相違毎如此好懐百嵗㡬迴開其後又寄黄充前四句云俗子推不去可人廢招呼世事每如此我生亦何娯蓋無已得意故兩見之胡氏評詩曰魯直過平輿懐李子克詩世上豈無千里馬人中難得九方臯題徐孺子祠堂詩白屋可能無孺子黄金不是欠陳蕃二詩命意絶相似蓋歎知音者難得耳苕溪漁隠曰錫宴明日絶句云宴罷回来日欲斜平康坊裏那人家㡬多紅袖迎門笑争乞釵頭利市花清明日絶句云無花無酒過清明興味都来似野僧昨日隣家乞新火曉窻分與讀書燈二詩何况味不同如此亦可見其老少情懐之異也胡氏評詩曰澶淵之役王介甫以謂丞相莱公功第一張文潛以為可能功業盡莱公大扺人之議論各有所見故爾不同今具載二詩識者當能辨之介甫澶州詩云去都二百四十里河流中間兩城峙南城草上不受兵北城樓樐如邊城城中老人為予語契丹此地經鈔虜黄屋親臨矢石間胡馬飲踏河氷渡天發一矢胡無酋河氷亦破沙水流歡盟從此至今日丞相菜公功第一文潜聽客話澶淵事詩云憶昔胡来動河朔黄河飲馬吹胡角澶淵城下氷載車邊風蕭蕭千里賖城上黄旗坐真主夜遣六丁張猛弩雷驚電發一矢飛横射胡酋貫車柱犬羊無踪大漠空歸来封禪告成功自是乾坤扶聖主可能功業盡莱公談苑曰余知制誥日與余恕同考試恕曰夙昔師範徐騎省為文騎省嘗有徐孺子亭記其警句云平湖千畝凝碧乎其下西山萬叠倒影乎其中他皆常語近得舍人所撰涵虚閣記終篇皆竒語自渡江来未嘗見此信一代之雄文也其相推如此因出義山詩共讀酷愛一絶云珠箔輕明拂玉墀披香新殿閗腰支不湏看盡魚龍戯終遣君王怒偃師擊節稱嘆曰古人措辭寓意如此之深妙令人感慨不巳詩話總龜後集巻五欽定四庫全書詩話總龜後集巻六宋阮閱撰諷諭門唐文宗夏日聯句東坡謂宋玉對楚王雄風譏其知已不知人也公權小子有美而無規為續之云一為居所移苦樂永相忘願言均此施清隂分四方或謂五弦之薫解愠阜財已有陳善責難之意愚謂不然凡規諌之辭湏切直分明乃可以感悟人主故盗言孔甘良藥苦口若以薫風自南来為陳善閉邪但恐後世導諛側媚持兩可者皆得以冒敢諌之名也䂬溪陽城徳行道義為士林之所敬服徳宗以銀印赤紱起于隠所驟拜諫官可謂賢且遇矣故學生聞道州之貶投業而呌閽賢士愴驛名之同摛辭而頌徳可以知其賢不誣也然退之諫臣論乃極口貶之何哉其言曰今陽子實一匹夫在諌位不為不乆而未嘗一言及於政視政之得失若越人之視秦人之肥瘠問其官則曰諫議也問其政則曰我不知也有道之士固如是乎考之本傳以謂他諌官論事苛細帝厭苦城漫聞得失且熟猶未肯言客屢諫之第醉以酒而不荅蓋其意有所待矣至徳宗逐陸贄欲相裴延齡而城伏蒲之說始上廷爭懇至累日不解故元微之詩云正元嵗云暮朝有曲如鈎飛章八九上皆若珠暗投且曰事不止臣諌誓不休而白樂天亦云陽城為諌議以正事其君其手如屈軼舉必指侫臣卒使不仁者不得秉國鈞栁子厚亦云抗志厲義直道是陳蓋退之諌論乃在上裴延齡為相之前而三子頌美之言乃在陽城極諌之後也丹陽集蔡寛夫云江湖多白鳥天地有青蠅人遂以白鳥為鷺而禮記月令羣鳥養羞鄭氏乃引夏小正丹鳥白鳥之説謂白鳥為蚊蚋則知以對青蠅有深意矣不然江湖多白鷺有何説邪䂬溪子美詩草有害於人曽何生阻脩芒刺在我眼焉能待時秋其憤邪嫉惡欲芟夷藴崇之以肅清王室者抱懐可見臨川有勿去草草無惡如比世俗俗浮薄此方外之語異乎農夫之務者也黄常明子美云設網萬魚急蓋指聚歛之臣苛法侵漁使民不聊生乃萬魚急也又云能者操舟疾若風撑突波濤挺乂入小人舞智趨時巧宦數遷所謂疾若風也殘民以逞不顧傾覆所謂挺义入也日暮蛟龍改窟穴山根鱣鮪隨雲雷魚不得其所龍豈能安居君與民猶是也此與六義比興何異吾徒何為縱此樂暴戾天物聖所哀此樂而能戒又有仁厚意亦如前王作網罟設法害生成不専為取魚也退之义魚曰觀樂憶吾僚異此意矣亦如蘄簟云却願天日常炎曦故後人改之云豈比法曹空自私却願天日長炎赫黄常明唐子西上張天覺内前行云内前車馬撥不開文徳殿下宣麻回紫薇侍郎拜右相中使押赴文昌臺此語善於叙事質而不俚又云周公禮樂未要作致身姚宋亦不惡向来兩翁當國年民間斗米纔四錢此語善於諷諭當而有理皆可法也湖上云佳月明作哲好風聖之清栖禪寺歸云草青仍過雨山紫更斜陽語意俱新李陽氷云太白不讀非聖人之書恥為鄭衛之作故其言多似天仙之辭凡所著述言多諷興自三代以来風騷之後馳驅屈宋鞭撻揚馬千載獨步唯公一人故王公趨風列岳結軌羣賢翕習如鳥歸鳯盧黄門云陳拾遺横制頽波天下質文翕然一變至今朝詩體尚有梁陳宫掖之風至公大變掃地併盡今古文集過而不行唯公文章横被六合可謂力敵造化歟逹理門苕溪漁隱曰裴說云讀書貧裏樂搜句静中忙此二事乃余日用者甘貧守静自少至老飽諳此味矣許彦周詩話云羅隠詩云只知事逐眼前過不覺老從頭上来此殊有味朱氏復齋偶題詩曰出入無時是此心豈知鷄犬易追尋請看屏上初文㫖便識名齋用意深東坡云秋菊有佳色裛露掇其英泛此忘憂物逺我遺世情一觴雖獨進杯盡壺自傾日入羣動息歸鳥趨林鳴笑傲東軒下聊復得此生靖節以無事為得此生則見役於物者非失此生也歟東坡送山本禪師赴法雲云是身如浮雲安得限南北此二句乃老杜别賛上人詩中全語豈偶然用之邪題碧落洞詩云小語輙響荅空山白雲驚此語全類李太白今印本誤作白雷驚不惟無意味兼與上句重叠也後自嶺外歸次韻江晦叔詩云浮雲時事改孤月此心明語意髙妙如叅禪悟道之人吐露胷襟無一毫窒礙也康節天津感事吟水流任急境常静花落雖頻意自閒不似世人忙裏老生来未始得開顔擊壤集先天吟先天天弗違後天奉天時弗違無時虧奉時有時疲同上身心吟身生天地後心在天地前天地自我出自餘何足言同上康節無憂吟人生長有兩般愁愁死愁生未易休或向利中窮力取或于名上盡心求多思唯恐晩得手未老已聞先白頭我有何功居彼上其間攘臂獨無憂擊壤集詩話總龜後集巻六欽定四庫全書詩話總龜後集巻七宋阮閱撰逹理門否卦包承小人吉說者謂小人在下者包之小人在上者承之蓋處否當然杜云曲直吾不知負暄候樵牧是非何處定髙枕笑浮生洗眼㸔輕薄虚懐任屈伸寄謝悠悠世上児不争好惡莫相疑其寄傲踈放擺脫世網所謂兩忘而化其道也黄常明漫叟無為洞口云洞傍山僧皆學禪無求無欲亦忘年又無為洞口春水滿無為洞傍春雲白愛此躊蹰不能去念人悔作衣冠客岑参宿先逰寺云寄報乗軒客簮裾爾何容臨川何秀老云解我葱珩脫孟勞暮年甘與子同袍比之退之云方将歛之道且欲冠其顛向風長歎不可見我欲收歛加冠巾異矣六一有云自慚前引朱衣吏不稱閒行白髪翁說者謂不言亦可然次山宿丹崖翁宅詩云吾将求退與翁逰學翁歌醉在漁舟官吏隨人往未得却望丹崖慚復羞吁不滛乎富貴者也䂬溪東坡拈出陶淵明談理之詩前後有三一曰採菊東籬下悠然見南山二曰笑傲東軒下聊復得此生三曰客養千金軀臨化消其寳皆以為知道之言蓋摛章繪句嘲弄風月雖工亦何補若覩道者出語自然超詣非常人能蹈其軌轍也山谷嘗跋淵明詩巻云血氣方剛時讀此詩如嚼枯朩及綿厯世事知决定無所用智又嘗論云謝康樂庾蘭成之詩鑪錘之功不遺餘力然未能窺彭澤數仞之牆者二子有意於俗人賛毁其工拙淵明直寄焉持是以論淵明詩亦可以知其闗鍵也丹陽集孟子所言皆精粗兼備其言甚近而妙義在焉如龎居士云神通并妙用運水與搬柴此自得者之言最為逹理若孟子之言則無適不然如許大堯舜之道只於行止疾徐之間教人做了龜山語録或問言動非禮則何以正視聽如何得合禮曰四者皆不可易易則多非理故仁者先難而後獲所謂難者以我視以我聽以我言以我動也仰面貪看鳥回頭錯應人視聽不以我也胥失之矣上蔡語録吕晉伯兄弟中皆有見處一人作詩詠曽㸃事曰凾丈從容問且酧展才無不至諸侯可憐曽㸃推鳴瑟獨對春風詠不休同上或問邵堯夫云誰信畫前元有易自従刪後更無詩畫前有易何以見曰畫前有易其理甚微然即用孔子之已發明者言之未有畫前盡可見也如云神農氏之耒耜蓋取諸益日中為市盖取諸噬嗑黄帝堯舜之舟楫盖取諸渙服牛乗馬盖取諸隨益嗑渙隨重卦也當神農黄帝堯舜之時重卦未畫此理真聖人有以見天下之賾故通變以宜民而易之道得矣然則非畫前元有易乎龜山録熈寧十年夏康節感微疾氣日益耗神日益明笑謂司馬温公曰雍欲觀化一巡如何温公曰先生未應至此康節笑曰死生亦常事耳張横渠先生喜論命来問疾因曰先生論命否當推之康節曰若天命則已知之矣世俗所謂命則不知也横渠曰先生知天矣載尚何言程伊川曰先生至此他人無以為力願自主張時康節居正寢諸公議後事於外有欲𦵏近洛陽城者康節已知呼伯温入曰諸公欲以近城地𦵏我不可當從伊川先生塋耳七月初四日大書詩一章曰生于太平世死于太平世客問年㡬何六十有七嵗俯仰天地間浩然獨無愧以是夜五更捐館聞見録張敬夫元日詩古史書元意義存春秋揭示更分明人心天理初無欠正本端原萬善生南軒集康節過士友家晝卧見其枕屏小兒迷藏以詩題其上云遂令髙卧人欹枕看兒戯盖熈寧間也陳恬云擊壤集不載同上張横渠聖心詩聖心難用淺心求聖學湏専禮法脩千五百年無孔子盡因通變老優游横渠集五峯胡廣仲詩幽人偏愛青山好未是青山青不老山中出雲雨太虚一洗塵埃山更好朱氏陂云右衡山胡子詩也初紹興庚辰熹病卧山間親友仕於朝者以書見招集戯以兩詩代書報之曰先生去上芸香閣時藉溪先生正字赴館閣長新峩豸角冠劉共甫秘書丞除察官留取幽人卧空谷一川風月要人看一章甕牗前頭列畫屏晩来相對盡儀刑浮雲一任閑舒巻萬里青山只麽青二章或傳語胡子胡子謂其學者張敬夫曰吾未識此人然觀此詩庶能有進矣時其言有體而無用故為是詩以箴警之庶其聞之而有發也明年胡子卒又四年某始見敬夫而後獲聞之恨不及見胡子而請其目也因序其本末而書之于策以無忘胡子之意云見詩集邵堯夫先生居洛四十年安貧樂道自云未嘗攅眉所居寢息處為安樂窩自號安樂先生又為甕牗讀書燕居自平旦則焚香獨坐晡時飲酒三四甌微醺便止不使至醉也中間州府以吏法不餉餽寓賔乃為薄粥以代之好事者或載酒以濟其乏嘗有詩云斟有淺深存燮理飲無多少繋經綸莫道山翁拙於用也能康濟自家身喜吟詩作大字書然遇興則為之不牽強也大寒暑則不出每出乗小車用一人挽之為詩以自詠曰花似錦時髙閣望草如茵處小車行司馬温公贈以詩曰林間髙閣望已久花外小車猶未来随意所之遇主人喜客則留三五宿又之一家亦如之或經月忘返雖性髙潔而接人無賢不肖貴賤皆懽然如親嘗自言若至大病自不能支其遇小疾得有客對語不自覺疾之去體也學者来従之問經義精深浩􅀶應對不窮思致幽逺妙極道數間與相知之深者開口論天下事雖久存心世務者不能及也康節嘗誦希夷之語曰得便宜事不可再做得便宜處不可再去又曰落便宜是得便宜故康節詩云珍重至人嘗有語落便宜是得便宜蓋可終身行之也邵伯温易理辨惑詩話總龜後集巻七欽定四庫全書詩話總龜後集巻八宋阮閱撰博識門嘗觀臨川解我葱珩脫孟勞嘗不曉孟勞何等物及觀榖梁傳注孟勞魯之寶刀黄常明子美於菟侵客恨乃楚人謂虎於菟土銼冷疎烟乃蜀人呼釡為銼富豪有錢駕大舸方言南楚江湘凡船大者謂之舸百丈誰家上水船荆峽以竹纜為百丈塹抵公畦稜京師農人指田土㡬稜去聲市暨瀼西巔䕫人謂江水横通山谷處為瀼子厚桃笙葵扇安可當宋魏之間謂簟為笙款乃一聲山水綠乃楚人歌聲臨川窻明兩不借楚人以草屨為不借東坡倦看澁勒暗蠻村蓋嶺南竹名又蓬沓障前走風雨注云於潜婦人皆揷大銀櫛謂之蓬沓又幾思壓茅柴禁烟日夜急山谷燕濕社公雨鶯啼花信風皆方言也黄常明江漢有滸以扞制泛濫大漲則溢於平陸水退滸見舟人謂之水落槽又灘石湍激其中深僅可容舟者謂之洪若大水則不復問洪矣臨川萬里寒江正復槽東江水落水分洪以此亦謂水黄㡌謂雲砲車非遐征逺涉不能知也同上栁讀書篇瘴疴擾靈府日與往昔殊臨文乍了了徹巻元若無蓋常荅許京兆書云往時讀書不至底滯今每讀一傳再三伸巻復觀姓氏在宗元則為瘴疴所擾它人乃公患也同上東坡云東来賈客朩綿裘飲散金山月滿樓夜半潮来風又熱卧吹簫管到揚州集中題云夢中作盖坡嘗衣此坐客誤云朩綿襖俗飲散乃出此詩且云雖欲不可得也坐客大慙賈客事乃南史孔覬二弟頗營産業請假東還覬出渚迎之輕重二十餘船皆綿絹紙席之属覬偽喜命且置岸側既而正色謂曰汝輩忝預士流何至還東作賈客邪命燒盡乃去䂬溪家家養烏鬼沈存中以為鸕鷀說者謂非也元微之詩云病養烏稱鬼巫占瓦代龜自注雲南人染病競賽烏鬼楚巫列肆競賣瓦卜此乃戯效俳體二首其二亦云瓦卜傳神語皆是處方言則烏鬼非鸕鷀不疑矣書史蓄胷中而氣味入於冠裾山川厯目前而英靈助於文字太史公南逰北渉信非徒然觀老杜壯游云東下姑蘇臺已具浮海航到今有遺恨不得窮扶桑劒池石壁仄長洲芰荷香嵯峨閶門北清廟映池塘越女天下白鑑湖五月涼剡溪藴秀異欲罷不能忘歸帆拂天姥中嵗貢舊鄉放蕩齊趙間西歸到咸陽其豪氣逸韵可以想見序太白集者稱其隠岷山居襄溪南逰江淮觀雲夢去之齊魯之呉之梁北扺趙魏燕晉西徙邠岐從金陵上潯陽流夜郎泛洞庭上巫峽白自序亦曰偶乗扁舟一日千里或遇勝景終年不移其恣横採覽非其狂也使二公隠坐中書何以垂不朽如此哉燕公得助於江山鄭綮謂相府非㶚橋那得詩思非虚語也學林新編云世傳織女嫁牽牛渡河相㑹某按史記晉天文志河鼓星在織女牽牛二星之間世俗因傅㑹為渡河之說媟瀆上象無所根據淮南子云烏鵲填河成而渡織女荆楚嵗時記云七夕河漢間弈弈有光景以此為候是牛女相遇也其說皆怪誕不足信子美牽牛織女詩曰牽牛出河西織女處其東萬古永相望七夕誰見同神光意難候此事終朦朦觀子美詩意不取世俗說也七夕乞巧見於周處風土記乃後人編類成書大抵初無稽考不足信者多矣侯鯖錄云東坡作雪詩云凍合玉樓寒起粟光揺銀海眩生花後見荆公云道家以兩肩為玉樓目為銀海是使此事否坡退曰惟荆公知此出處苕溪漁隠曰緗素雜記學林新編二家辨證乘槎事大同小異余近来摭其有理者共為一說按張茂先慱物志曰舊說天河與海通近世有人居海上者每年八月見浮槎来不失期齎一年粮乗之而去十餘日中猶觀星月日辰自後茫茫亦不覺晝夜奄至一處有城郭屋舍甚嚴遥望宫中有婦人織見丈夫牽牛渚次飲之驚問曰何由至此其人說以来意并問此是何處荅曰君至蜀郡訪嚴君平則知之因還後以問君平君平曰某年月日有客星犯牽牛宿計年月正是此人到天河時也所載止此而巳而荆楚嵗時記直曰張華慱物志云漢武帝令張騫窮河源乗桴經月而去一處見城郭如官府室内有一女織又見一丈夫牽牛飲河騫問云此是何處荅曰可問嚴君平織女取榰機石與騫而還後至蜀問君平君平曰某年月日客星犯牛斗所得榰機石為東方朔所識亦其證焉按騫本傳及大宛傳騫以郎應募使月氐為匃奴所留十餘嵗得還騫身所至者大宛大月氐大夏康居而傳聞其旁大國五六具為天子言其地形所有並無乗槎至天河之說而宗懔乃傅㑹以為武帝張騫之事又益以榰機石之說何邪子美䕫府詠懐詩曰途中非阮藉槎上似張騫又秋興詩曰奉使虚隨八月槎如此類前賢多用之恐非實事杜子美詩喜用文選語故宗武亦習之不置所謂熟精文選理休覔綵衣輕又云呼婢取酒壺續兒誦文選是也唐朝有文選學而時君尤見欽重分别本以賜金城書絹素以屬裴行儉是也外史檮杌載鄭奕嘗以文選教其子其兄曰何不教讀論語免學沈謝嘲風㺯月汚人行止鄭兄之言盖欲先徳行而後文藝亦不為無理也丹陽集雪浪齋日記云昔人有言文選爛秀才半正為文選中事多可作本領爾余謂欲知文章之要當熟看文選蓋選中自三代涉戰國秦漢晉魏六朝以来文字皆有在古則渾厚在近則華麗也苕溪漁隱曰少陵宗武生日詩熟精文選理蓋為是也苕溪漁隠曰學者欲博讀異書余謂退之進學解云上窺姚姒渾渾無涯周誥殷盤詰屈聱牙春秋謹嚴左氏浮誇易奇而法詩正而葩下逮莊騷太史所録子雲相如同工異曲若盡讀此足矣何必多嗜異書詩話總龜後集巻八欽定四庫全書詩話總龜後集巻九宋阮閲撰狂放門劎閣云吾将罪真宰意欲鏟叠嶂與太白槌破黄鶴樓剗却君山好語亦何異然劎閣詩意在削平僣竊尊崇王室凛凛有忠義氣槌碎剗却之語但覺一味粗豪耳故昔人論文字以意為主性豪業嗜酒嫉惡懐剛腸飲酣視八極俗物都茫茫此子美胷中語也宜其孩弄嚴武藐視禮法而朱老阮生皆莫逆及遭田父泥飲至被肘而不悔其内直外曲彊禦不畏矜寡不侮非世所能測也䂬溪唐史載杜審言嘗云吾文當得屈宋作衙官其孫乃有讀書破萬巻下筆如有神謂蘓味道見吾判且羞死甫乃有集賢學士如堵牆看我落筆中書堂謂為造化小兒所苦甫乃有日月籠中鳥乾坤水上萍所謂是以似之也同上藝苑雌黄云吟詩喜作豪句須不畔於理方善如東坡觀崔白驟雨圖云扶桑大繭如甕盎天女織綃雲漢上往来不遣鳳銜梭誰能鼓臂投三丈此語豪而甚工石敏若橘林文中詠雪有燕南雪花大於掌氷柱懸簷一千丈之語豪則豪矣然安得爾髙臺或云詠雪非敏若詩見鮑欽止夷白堂小集苕溪漁隠曰東坡集載此詩是題趙令晏崔白大圖幅徑三丈故云往来不遣鳳銜梭誰能鼓臂投三丈可謂善造語能形容者也畫品人間刀尺不敢裁丹青付與濠梁崔風蒲半折寒鴈起竹間的皪横江梅乃是崔白冬景圖藝苑以謂驟雨圖悞矣又李太白北風行云燕山雪花大如席秋浦歌云白髮三千丈其句可謂豪矣柰無此理何如秦少逰秋日絶句云連巻雌蜺拄西樓逐雨追晴意未休安得萬粧相向舞酒酣聊把作纒頭此語亦豪而工矣郭功甫金山行造語豪世多不見全篇今録于左方金山杳在滄溟中雪崖氷柱浮仙宫乾坤扶持自今古日月彷彿纒西東我泛靈槎出塵世搜索異境窺神工一朝登臨重歎息四時想像何其雄捲簾夜閣挂北斗大鯨駕浪吹長空舟摧岸㫁豈足數徃往霹靂槌蛟龍寒蟾八月蕩瑤海秋光上下磨青銅鳥飛不盡暮天碧漁歌忽㫁蘆花風蓬莱久聞未成往壯觀絶致遥應同潮生潮落夜還曉物數交㑹誰能窮百年形影浪自苦便欲此地安其躬白雲南去供入望又起歸興隨征鴻稱賞門王直方詩話云樂天有詩云醉貌如霜葉雖紅不是春東坡有詩云兒童誤喜朱顔在一笑那知是酒紅鄭谷有詩云衰髩霜供白愁顔酒借紅老杜有詩云髮少何勞白顔衰肯更紅無已詩云髪短愁催白顔衰酒借紅皆相類也然無已初出此一聯大為當時諸公所稱賞雪浪齋日記云髙荷字子勉贈山谷詩云㸃檢金閨彦飄零玉筍斑尚令清廟器猶隔鬼門闗大為山谷所喜杜子美褒稱元結舂陵行兼賊退後示官吏二詩云兩章對秋月一字偕華星致君唐虞際淳朴憶大庭又云今盗賊未息得結輩數十公落落然參錯為天下邦伯天下少安可立待已蓋非専稱其文也至於李義山乃謂次山之作以自然為祖以元氣為振無乃過乎秦少游漫郎詩云字偕華星章對月漏泄元氣煩揮毫蓋用子美義山語也金是堂髙麗使過海有詩云水鳥浮還沒山雲㫁復連時賈島詐為稍人聯下句云棹穿波底月船壓水中天麗使嘉歎久之䂬溪張祜詩云故國三千里深宫二十年杜牧賞之作詩云可憐故國三千里虚唱歌詞滿六宫故鄭谷張生故國三千里知者唯應杜紫微諸賢品題如是祜之詩名安得不重乎其後有解道澄江静如練世間唯有謝𤣥暉解道江南㫁腸句世間唯有賀方回等語皆祖是意也葛常之詩人賛美同志詩篇之善多比珠璣璧玉錦繡花草之類至杜子美則豈作此陳腐語也寄岑参詩云意愜闗飛動篇終接混茫夜聽許十誦詩云精微穿溟涬飛動摧霹靂贈盧居詩云藻翰唯牽率湖山合動揺贈朱諌議詩云毫髮無遺恨波瀾獨老成寄李白詩云筆落驚風雨詩成泣鬼神贈髙適詩云美名人不及佳句法如何皆驚人語也視餘子其神芝之與腐菌哉丹陽集稱薦門温公自稱迂叟香山居士亦嘗以自號其詩云初時被目為迂叟近日䝉呼作隠人司馬豈慕其洛居有閑適之樂邪䂬溪周美成邦彦元豐初以大學生進汴都賦神宗命之以官除大學録其後流落不偶浮沉州縣三十餘年蔡元長用事美成獻生日詩略云化行禹貢山川内人在周公禮樂中元長大喜即以秘書少監召又復薦之揮塵録李白贈崔侍御詩云黄河三尺鯉本在孟津居㸃額不成龍歸来伴凡魚何當赤車使再往召相如相如蓋自謂也觀此不可謂白之無心於仕進者然當時慢侮力士畧不為身謀以致貶逐而曽不悔使其欲仕之心切必不如是先是蘇頲為益州長史見白異之曰是子天才英特少益以學比相如故白詩中毎以相如自比従弟之遥曰漢家天子馳駟馬赤車蜀道迎相如自漢陽病酒歸曰聖主還聽子虚賦相如却欲論文章贈張鎬曰十五觀竒書作賦凌相如白自比為相如非止一詩也呉邁逺好自夸而嗤鄙他人毎作詩得稱意語輙擲地呼曰曹子建何足数哉袁嘏謂人曰我詩有生氣亦以用心深苦俄爾有得宜不勝其喜子美云語不驚人死不休貫休謂得句先呈佛皆此謂也老杜髙自稱許有乃祖之風上書明皇云臣之述作沉鬱頓挫揚雄枚臯可企及也壯逰詩則自比引崔魏班揚又云氣劘屈賈壘目短曹劉墻贈韋左丞則曰賦料楊雄敵詩看子建親甫以詩雄於世自比諸人誠未為過至竊比稷與契則過史稱甫好論天下大事髙而不切豈自比稷契而然耶至云上感九廟焚下憫萬民瘡斯時伏青蒲廷爭守御床其忠藎亦可嘉矣陽秋韻復齋漫録云江公著初任洛陽尉久旱微雨作詩云雲葉紛紛雨脚勻亂花柔草長精神雷車却碾前山過不灑原頭陌上塵温公於士人家見之借紙筆脩刺謁江且為稱薦由此知名投獻門錢惟演為洛帥留守始置驛貢花識者鄙之蔡君謨加法小團茶貢之富彦國歎曰君謨乃為此也坡作荔枝歎曰我願天公憐赤子莫生尤物為瘡痏雨順風調百榖登民不飢寒為上瑞君不見武陵溪邊粟粒芽前丁後蔡相籠加吾君盛徳豈在此致養口腹何陋邪又不見洛陽丞相忠孝家可憐亦進姚黄花補世之語不能易也嘗愛李敬方汴河直進船詩云汴水通淮利最多人生為害亦相和東南四十三州地取盡脂膏是此河此等語皆為多貢獻也評論門介甫詩少陵為爾添詩興可見無心賦海棠杜黙云倚風莫怨唐工部後裔誰知不解衣曽不若東坡柯丘海棠長篇冠古絶今雖不指名老杜而補亡之意盖使来世自曉也樂天九日思杭州云笙歌委曲聲延耳金翠動揺光照身子瞻有懐錢塘云剰看新畨眉倒暈未應泣别臉消紅黎元耆舊何遽忘之也徐考其集白送姚杭州因思舊游云閭里固宜勤撫恤樓臺亦要數躋扳蘇亦云細雨暗時一百六畵橈鼇鼓莫遺民是未嘗無意於民庶也然白又有故妓數人憑問訊新詩兩首倩流傳坡又有休驚嵗嵗年年貌且對朝朝暮暮人大扺滛樂之語多於撫養之語耳夫子稱未見好徳如好色而傷之曰已矣乎二公未能免俗餘人不必言子瞻賦濁醪有妙理首句云酒勿嫌濁人當取醇其末乃曰濁者以飲吾僕清者以酌吾友復立分别則是濁醪無妙理矣豈非萬斛洶湧不暇㸃校故歟司馬温公云清茶談話難逢友濁酒狂歌易得朋雖造次間語亦在進直諒之益而退便僻之損也䂬溪雪浪齋日記云讀謝靈運詩知其攬盡山川秀氣讀退之南山詩頗覺似上林子虛賦才力小者不能到李長吉玉川子詩皆出於離騷未可以立談判也皇甫持正云吟詩未有劉長卿一字唐人必甚重長卿今詩十巻亦清麗宋子京華記云古人語有椎拙不可掩者樂府曰何以銷憂惟有杜康劉越石曰何其不夢周又有曰夫子悲獲麟西狩歎孔丘雖有意緒詞亦鈍樸詩話總龜後集巻九欽定四庫全書詩話總龜後集巻十宋阮閱撰評論門杜云爾輩可忘年含悽覺汝賢送爾維舟惜此筵汝與山東李白好自世俗觀之則為簡傲而實不然亦嘗有云忘形到爾汝黄常明又古栢云不露文章世已驚未辭剪伐誰能送先器識後文蓻與浮躁衒露者有異也同上古栢云大厦如傾要梁棟萬牛回首邱山重此賢者難進而易退也非其招不往者也同上趙嘏長安秋望詩云殘星㡬㸃鴈横塞長笛一聲人倚樓當時人誦詠之以為佳作遂有趙倚樓之目又有長安月夜與友人話歸故山詩云楊栁風多潮未落兼葭霜在鴈初飛亦不減倚樓之句至於獻李僕射詩云新諾似山無力負舊恩如水滿身流則謬矣葛常之鍾嶸稱張茂先惜其兒女情多風雲氣少喻鳬嘗謁杜紫微不遇乃曰我詩無綺羅鉛粉宜不遇也淮海詩亦然人戯謂可入小石調然率多子美句但綺麗大勝爾子美並蔕芙蓉本自雙水荇牽風翠帯長退之金釵半醉坐添春牧之春風十里楊州路誰謂不可入黄鍾宫邪黄常明昌黎云攜持令名歸自足貽家尊蘇州送叅尉云秖應傳善政朝夕慰髙堂誠儒者迂闊之辭然貪饕茍得汚累其親孰若清白之為愈同上東坡云少陵詠懐詩杜陵有布衣老大意轉拙許身亦何愚竊比稷與契子美自比稷契人未必許也然其又有詩云舜舉十六相身尊道更髙秦時任商鞅法令如牛毛自是稷契輩人口中語也知名不必稱局促商山芝又云王侯與螻蟻同盡隨邱墟願聞第一義回向心地初乃知子美詩尚有事在也䂬溪張藉送區宏詩云韓公國大賢道徳赫已聞昨出為陽山爾區来趨奔韓官遷法曹子又至荆門韓入為博士﨑嶇從覊輪觀其逰從之久疑得於韓者深也然考其文章議論之際乃不得預藉湜之列何也韓集有送區宏南歸詩云我遷于南日周圍来見者衆莫依希爰有區子熒熒暉觀以彛訓或從違我念前人譬葑菲落以斧斤引纆徽雖有不逮驅騑騑觀此數語則韓雖以師道自任而區受道之質盖有所未至也其後又勉之以行行正直勿脂韋業成志立来頎頎其望之者至矣集中又有送區冊序韓文辨証云册即宏也未知孰據爾丹陽集舉人過失難於當其尤者臧孫之犯門斬闗惟孟椒能絶之臧紇謂國有人焉必椒也其難如此司馬相如竊妻滌器開巴蜀以困苦鄉邦其過巳多至為封禪書則䜛諂蓋天性不復自新矣子美猶云竟無宣室召徒有茂陵求李白亦云果得相如草仍餘封禪文和靖獨不然曰茂陵他日求遺藁尤喜曽無封禪書言雖不迫責之深矣李商隠云相如解草長門賦却用文君取酒金亦全其大論其細也舉其大者自西湖始其後有譏其諂諛之態死而未已正如捕逐宼盜先有力者所獲搤其吭而騎其項矣餘人從旁助箠縳耳黄常明近人程文窮日力作一論既不限聲律復不拘詩句尚罕得反復折難使其理判然觀赴奉先詠懐五百言乃聲律中老杜心迹論一篇也自杜陵有布衣老大意轉拙許身一何愚竊比稷與契其心術祈嚮自是稷契等人窮年憂黎元歎息腸内熱與飢渇猶已也何異然常為不知者所病故曰取笑同學翁世不我知而所守不變故曰浩歌彌激烈又云非無江海志瀟洒送日月當今廊廟具構厦豈云缺葵藿傾太陽物性固莫奪言非不知隠遁為髙也亦非以國無其人也特廢義亂倫有所不忍以兹悟生理獨恥事干謁言志大術踈未始阿附以借勢也為下士所笑而浩歌自若皇皇慕君而雅志棲道既不合時而又不少低屈皆設疑互荅屢致意焉非巨刃有餘孰能之乎中間鋪叙間闗酸辛宜不勝其戚戚而黙思失業徒因念逺戍卒所謂憂在天下而不為一已失得也禹稷顔子不害為同道少陵之迹江湖而心稷契豈為過哉孟子曰窮則獨善其身逹則兼善天下其窮也未嘗無志於國與民其逹也未嘗不抗其易退之節密謀先定出處一致矣是其先後同揆正合乎此昔人目元和賀雨詩為諌書余特目此詩為心迹論也䂬溪五言如四十箇賢人著一箇屠酤不得覔句者若掘得玉匣子有底有蓋但精心必獲其寳然昔人園栁變鳴禽竟不及池塘生春草餘霞散成綺不及澄江静如練春水船如天上坐不若老年花似霧中看坐久硯中窺水淺不若花殘徑裡得泥香停杯嗟别久不及對月喜家貧楓林社日鼓不若茒屋午時雞此數公未始不精心以此知全其寳者未易多得黄常明愈寄孟刑部聯句云美君知道腴逸歩謝天械或問道果有味乎余曰如介甫午雞聲不到禪林栢子烟中静擁衾竹鷄呼我出華胥起覔篝燈擁燎爐各據髙梧同不寐偶然聞雨落階除皆淡中意味非造此景不能形容也黄常明張無盡題武昌陵竹寺云孟宗泣竹笋冬生豈是青青竹有情影響主張非别物人心但莫負幽明語雖淺直然當於理樂天有餘霞散成綺别葉乍辭風等語麗矣不過於嘲風雪弄花鳥而巳故寄唐生詩云非求宫律髙不務文字竒惟歌生民病得願天子知䂬溪顔延之嘗問鮑昭已與靈運優劣昭曰謝五言如初發芙蓉自然可愛君詩鋪錦列繡亦雕繢滿眼鍾嶸詩品乃記湯惠休云謝如芙蓉出水顔如錯采鏤金與本傳不同又稱延之嘗薄恵休制作以為委巷中歌謡耳豈湯休因為延之所薄遂有芙蓉錯鏤之語故史取以文飾之邪坡云辨才詩如風吹水自成文理吾輩與叅寮如巧媍織錦耳取况亦類此淵明所以不可及者蓋無心於非譽巧拙之間也黄常明永叔以昌黎比介甫答云他日若能窺孟子終身何敢望韓公呉季野以方賈誼荅云俯仰繆恩方自慊慚君将比洛陽人皆憤然不平如惡無鹽唐突而宋景文贈文忠詩有才如夢得今為累情似安仁久悼亡即開門當之二公何抑揚之異也同上子美夜宴左氏莊檢書燒燭短燭正不宜觀書檢閱時暫可也退之短檠二尺便且光可謂燈窻人中語猶有未便燈不籠則損目不宜勤且久山谷夜堂朱墨小燈籠可謂善矣而虚堂非夜久所宜子瞻推門入室書縱横蠟紙燈籠晃雲母慣親燈火儒生酸態盡矣同上張籍嘗移書責退之與人商論不能下氣愈亦有云我昔實愚蠢不能降色辭余謂此乃書生常態昔常見太中爐亭議題紛喧閧然其後有二生坐是鳴鼓豈直議禮家為聚訟哉聖俞謝永叔惠酒云貽詩語且横既醉論益堅曽不究世務閑氣争古先誠有之也同上岑參寄杜拾遺云聖朝無闕事自覺諌書稀退之贈崔補闕云早生得塗未要忙時清諌疏尤宜罕皆繆承荀卿有聴従無諌諍之語遂使阿諛姦佞用以藉口以是知凡造意立言不可不豫為天下来世慮䂬溪西清詩話人之好惡固自不同子美在蜀作悶詩乃云捲簾唯白水隠几亦青山若使余居此應従王逸少語吾當祇以樂死豈復更有悶邪同上王君玉云子美之詩詞有近質如麻鞋見天子垢膩脚不襪之句所謂轉石於千仞之山勢也學者尤之過甚豈逺大者難窺乎同上詩話總龜後集巻十欽定四庫全書詩話總龜後集巻十一宋阮閲撰評論門翰苑作春帖子徃徃秀麗可喜如蘇子容云璇霄一夕斗杓東㶑灔晨曦照九重和氣薫風摩盖壤競消金甲事春農鄧温伯云晨曦㶑灔上簾櫳金屋熈熈歌吹中桃臉似知官宴早百花頭上放輕紅蔣頴叔云昧旦求衣向曉雞蓬萊仗下日將西花添漏鼔三聲逺栁映春旗一色齊梁君貺詩云東方和氣斗回杓龍角中星轉紫霄聖主問安天未曉求衣親䕶玊宸朝皆佳作也余觀定詣夫新春詞四首其一云春色應隨歩輦還珠旒玉几照龍顔紫雲殿下朝元罷便領東風到世間其二云春風細拂綠波長初過層城渡建章草色未迎雕輦翠栁梢先學赭衣黄其三云晴暉散入鳳凰樓一桁珠簾不上鈎漢殿闘簮雙彩燕併和春色上釵頭其四云小池春破玉玲瓏聲觸簾鈎漸好風閒繞䦨干掐花樹春痕已着半梢紅觀此四詩與帖子格調何異豈久於翰苑而筆端自然習熟耶丹陽集張籍韓愈髙弟也愈嘗作此日足可惜贈之八百餘言又作喜侯喜至之篇贈之二百餘言又有贈張籍一篇二百言皆不稱其能詩獨有調張籍一篇大尊李杜而末章有顧語地上友經營無太忙之句病中贈張籍一篇有半塗喜開鑿派别失大江吾欲盈其氣不令見麾幢之句醉贈張徽有張籍學古淡軒昻避雞羣之句則籍有意於慕大而實無可取者也及取其集而讀之如送越客詩云春雲剡溪口殘月鏡湖西逢故人詩云海上見花發瘴中聞鳥飛送海客詩云入國自獻寳逢人多贈珠紫掖發章句青闈更詠歌如此之類皆駢句也至語言拙惡如寺貧無施利僧老足慈悲收拾新琴譜封題舊藥方多申請假牒秖送賀官書此尤可笑至於樂府則稍超詣姚秘監嘗稱之曰妙絶江南曲凄凉怨女詩白太傅嘗稱之曰尤攻樂府詞舉代少其倫由是論之則人士所稱者非以詩也應制詩非他詩比自是一家句法大抵不出於典實富艷爾夏英公和上元觀燈詩云魚龍曼衍六街呈金鎻通宵啟玉扄冉冉逰塵生輦道遲遲春箭入歌聲寳坊月皎龍燈淡紫舘風㣲鶴焰平宴罷南端天欲曉回瞻河漢尚盈盈王岐公詩云雪消華月滿仙臺萬燭當樓寳扇開雙鳳雲中扶輦下六鰲海上駕山來鎬京春酒沾周宴汾水秋風陋漢才一曲昇平人盡樂君王又進紫霞杯二公雖不同時而二詩如岀一人之手盖格調當如是也丁晉公賞花釣魚詩云鶯驚鳳輦穿花去魚畏龍顔上釣遲胡文恭云春煖仙蓂初靃靡日斜芝盖尚徘徊鄭毅夫云水光翠繞九重殿花氣濃薫萬夀杯皆典實富艷有餘若作清癯平淡之語終不近爾顔延之謝靈運各被㫖擬北上篇延之受詔即成靈運久而方就梁元帝云詩多而能者沈約少而能者謝眺雖有能速多寡之不同不害其俱工也咸平景徳中錢惟演劉筠首變詩格而楊文公與之鼎立綽􅃅江東三虎詩格與錢劉亦絶相類謂之西崑體大率效李義山之為豐富藻麗不作枯瘠語故楊文公在至道中得義山詩百餘篇至於愛慕而不能釋手公嘗論義山詩以謂包藴宻緻演繹平暢味無窮而炙愈出鑚彌堅而酌不竭使學者少窺其一斑若滌腸而浣骨是知文公之詩盖得於義山者為多矣又嘗以錢惟演詩二十七聨如雪意未成雲着地秋聲不斷鴈連天之類劉筠詩四十八聨如溪牋未破氷生硯爐酒新燒雪滿天之類皆表而岀之詩之有思卒然遇之而莫遏有物敗之則失之矣故昔人言覃思垂思抒思之類皆欲其思之來而所謂亂思蕩思者言敗之者易也鄭綮詩思在㶚橋風雪中驢子上唐求詩所㳺歴不出二百里則所謂思者豈尋常咫尺之間所能發哉前輩論詩思多生於杳㝠寂寞之境而志意所如徃徃游於埃􅅽之外茍能如是於詩亦庶㡬矣小說載謝無逸問潘大臨云近日曽作詩否潘云秋來日日是詩思昨日投筆得滿城風雨近重陽之句忽催租人至令人意敗輙以此一句奉寄亦可見思難而敗易也米元章賦詩絶倫而人罕稱之者以書名掩之也如不及陪東坡徃金山作水陸詩云久隂障奪佳山川長瀾四隘魚龍淵衆㸔李郭渡浮玉晴風掃出清明天頗聞妙力開大施足病不列諸方仙想應蒼壁有垂露照水百怪愁寒烟栖雲閣云雲出救世旱澤浹雲尋歸入石了不見豐功已如遺龍騫薦復起抱石明幽姿雲乎無定所隠者何當栖如此二詩殆出翰墨畦逕之表盖自邁徃凌雲之氣流出非尋䂓索矩者之可到也韓退之調張籍詩曰刺手㧞鯨牙舉瓢酌天漿魏道輔謂髙至酌天漿幽至於㧞鯨牙其用思深逺如此彼獨未讀送無本詩爾其曰吾嘗示之難勇徃無不敢蛟龍弄牙角造次欲手攬衆鬼囚大幽下覷襲元窞言手攬蛟龍之角下覷衆鬼之窞皆難事而無本勇徃無不敢盖作文以氣為主也則調張籍之句無乃亦是意乎余襄公靖嘗在契丹作胡語詩云夜筵没邏臣拜洗両朝厥荷情幹勒微臣雅魯祝君統聖夀鐡擺俱可忒没邏言後盛拜洗言受賜厥荷言通好幹勒言厚重鐡擺言嵩髙也沈存中筆談載刁約使契丹戯為詩云押燕移離畢㸔房賀䟦支踐行三匹裂宻賜十貔狸移離畢如中國執政官賀䟦攴執衣防閣人匹裂小朩罌貔狸其形如鼠而大狄人以為珍饌二詩可作對故表而出之孟郊詩云食薺腸亦苦强歌聲無歡出門即有碍誰謂天地寬許渾詩云萬里碧波魚戀釣九重青漢鶴愁籠皆是窮蹙之語白樂天詩云無事日月長不覊天地闊與二子殆霄壤矣作詩貴雕琢又畏有斧鑿痕貴破的又畏粘皮骨此所以為難李商隠栁詩云動春何限葉撼曉㡬多枝恨其有斧鑿痕也石曼卿梅詩云認桃無綠葉辯杏有青枝恨其粘皮骨也能脫此二病始可以言詩矣劉夢得稱白樂天詩云郢人斤斵無痕迹仙人衣裳棄刀尺世人方内欲相從行盡四維無處覔若能如是雖終日斵而鼻不傷終日射而鵠必中終日行於䂓矩之中而其迹未嘗滯也山谷嘗與楊明叔論詩謂以俗為雅以故為新百戰百勝如孫呉之兵棘端可以破鏃如甘蠅飛衛之射揑聚放開在我掌握與劉所論殆一轍矣余讀許渾詩獨愛道直去官早家貧為客多之句非親嘗省不知其味也贈蕭兵曹詩云客道恥揺尾皇恩寬犯顔直道去官早之實也將離郊園詩云久貧辭國逺多病在家希家貧為客多之實也蘇養直清江曲見賞於東坡以為與李太白無異所謂屬玉雙飛水滿塘菰蒲深處浴鴛鴦是也既為前輩所賞名已不没而又作後清江曲一篇豈養直尚惡其少作耶所謂呼兒極浦下笭箵社瓮欲熟浮蛆香輕蓑淅瀝鳴秋雨日暮乗流自相語如此等句前曲似未到也自古文人雖在艱危困踣之中亦不忘於製述盖性之所嗜雖鼎鑊在前不䘏也况下於此者乎李後主在圍城中可謂危矣猶作長短句所謂櫻桃落盡春歸去蝶翻金粉雙飛子䂓啼月小樓西文未就而城破蔡約之嘗親見其遺稿東坡在獄中作詩贈子由云是處青山可藏骨他年夜雨獨傷神猶有所托而作李白在獄中作詩上崔相云賢相爕元氣再欣海縣康應念覆盆下雪泣拜美光猶有所訴而作是皆出於不得已者劉長卿在獄中非有所托訴也而作詩云斗間誰與㸔寃氣盆下無由見太陽一詩云壯志已憐成白髪餘生猶待發青春一詩云冶長空得罪夷甫不言錢又有獄中見畫佛詩豈性之所嗜則縲絏之苦不能易雕章繢句之樂歟杜牧赤壁詩云折㦸沉沙鐡未消自將磨洗認前朝東風不與周郎便銅雀春深鎻二喬李義山集中亦載此詩竟莫定何人所作也俱同上詩話總龜後集巻十一欽定四庫全書詩話總龜後集巻十二宋阮閱撰評論門或問鄭綮相國近有詩否答云詩思在㶚橋風雪中驢子上此處那得之北夢𤨏言載綮雖有詩名本無廊廟之望及登庸中外驚駭太原兵至渭北天子震恐渇於攘却綮請於文宣王謚􅃅中加一哲字其不究時病率此類愚謂此人止可置之風雪中令作詩也䂬溪王夷甫蔡景節並號口不言錢二子皆因弊矯之者衍以其妻貪滛黷貨至藉俠士李陽以懼之樽在臨海其婢納女巫之賂為百姓撾登聞鼓其絶口盖有由然如子美張籍皆兒散寫乞錢書太白頻將三十萬盡付酒家錢岑參閒君耐相訪正有牀頭錢小杜清貧長欠一杯錢東坡滿江風月不論錢山谷青山好去坐無錢曽不害諸公之髙也孟郊詩最淡且古坡謂有如食蟛􅒹竟日嚼空螯退之論數子乃以張籍學古淡東野為天葩吐竒芬豈勉所長而諱所短耶抑亦東野古淡自足而不待學歟並同上武元衡詩不多集中有酬嚴司空荆南見寄詩兩篇一云金貂再領三公府玉帳連封萬戸侯一云漢家征鎮委條侯虎節龍旌居上頭皆續以簾捲青山巫峽雨烟開碧樹渚宫秋第三聨一云劉琨坐嘯風清塞謝眺題詩月滿樓一云玊笳曽掩故人淚麗句初傳明月樓皆續以白雪調髙歌不得美人相顧翠娥愁人訝其大同余謂乃元衡刪潤之本集中兩存之爾當以前篇為正後篇誠未工也丹陽集李太白杜子美詩皆掣鯨手也余觀太白古風子美偶題之篇然後知二子之源流逺矣李云大雅久不作吾衰竟誰陳王風委蔓草戰國多荆榛則知李之所得在雅杜云文章千古事得失寸心知騷人嗟不見漢道盛於斯則知杜之所得在騷然李不取建安七子而杜獨取垂拱四傑何耶南皮之韻固不足取而王楊盧駱亦詩人之小巧者爾至有不廢江河萬古流之句褒之豈不太甚乎同上少游贈坡詩云節毛零落毡餐雪辨舌縱横印佩金語太不等子瞻譏集句云天邉鴻鵠不易得便令作對隨家雞此詩正類此黄常明東坡文章妙一世然在掖垣作吕吉甫謫詞繼而吕復用遂納告毀抹在翰苑作上清儲祥碑繼而蔡元長復作遂遭磨毀非特此也蘇叔黨云昔公為藏經記云傳於世或以為非在恵州作梅花詩至有以為笑此皆士大夫以文鳴者其說能使人必信乃謬妄如此信知識古戰場文者鮮矣子由嘗䟦東坡遺稿云展卷得遺草流涕濕冠纓斯文久衰弊流涇自為清科斗藏壁間見者空歎驚廢興自有時詩書付西京陽秋嘗恨王子猷作此君語輕以難名者告人遂使庸夫俗子妄意其間酤坊茗肆適以汚累之謪仙云但得酒中趣勿為醒者傳此理信然和靖招靈魄云百千幽勝無人見說向吾師是洩機東坡云此味只憂兒輩覺逢人休道北牕凉人生此樂須天賦莫遣兒曹取次知使子猷知此必鉗其喙也䂬溪老杜畏人有云門徑從榛草無心待馬蹄又直須上畨㸔成竹客至從嗔不出迎將遺物離人矣答嚴八乃云只須伐竹開荒徑拄杖穿花聽馬蹄又有草萊無徑欲教鋤亦如厭就成都卜而云憑將百錢卜漂泊問君平自智者觀之則為游戯篇章得失自在俗士拘泥則全不相應也東坡答林塘云古今正自同嵗月何必書游香積山又云尋幽恐不繼書版記嵗月蕭思話先於曲阿起宅有閒曠之致子恵基嘗謂所親曰婚嫁畢當歸老舊廬故元次山招陶别駕云無惑别婚嫁竟為俗務牽退之云如今便可爾何用畢婚嫁杜茅屋為風所破歌云自經喪亂少睡眠長夜沾濕何由徹安得廣厦千萬間大庇天下寒士俱歡顔風雨不動安如山於乎何時眼前突兀見此屋吾廬獨破受凍死亦足白樂天新製布裘云安得萬里裘盖褁周四垠穏煖皆如我天下無寒人新製綾袴成百姓多寒無可救一身獨煖亦何情心中為念農桑苦耳裏如聞飢凍聲争得大裘長萬丈與君都盖洛陽城皆伊尹自任一夫不獲之辜也或謂子美詩意寧苦身以利人樂天詩意推身利以利人二者較之少陵為難然老杜飢寒而憫人飢寒者也白氏飽煖而憫人飢寒者也憂勞者易生於善慮安樂者易失於不思樂天疑優或人又謂白氏之官稍達而少陵尤卑子美之語在前而長慶在後達者宜急卑者可緩也前者唱導後者和之耳同合而論則老杜之心盖賢矣老杜當干戈騷屑之時間闗秦隴拾薪採㭒餔糒不給困躓極矣自入蜀依嚴武始有草堂之居觀其經營徃來之勞備載於詩皆可考也其曰萬里橋西宅百花潭北莊言其地也經營上元始斷手寳應年者言其時也雪裏江船渡風前竹逕斜寒魚依宻藻宿鷺起圓沙者言其景物也至於草堂塹西無樹林非子誰復見幽深則乞樹朩於何少府之詩也草堂少花今欲栽不問綠李與黄梅則乞果栽於徐少卿之詩也王侍御携酒草堂則喜而為詩曰故人能領客携酒重相㸔王録事送草堂貲不到則戯而為詩曰為嗔王録事不寄草堂貲盖其流離貧窶之餘不能以自給皆因人而成也其經營之勤如此然未及黔突避成都之亂入梓客閬其心則未嘗一日不在草堂也遣弟檢校草堂則曰鵞鴨宜長數柴荆莫浪開寄題草堂則曰尚念四松小蔓草易拘纒送韋郎歸成都則曰為問南溪竹抽稍合過牆塗中寄嚴武則曰常苦沙崩損藥欄也從江檻落風湍每致意如此及成都亂定再依嚴武為節度叅謀復歸草堂則曰不忍竟捨此復來薙榛蕪入門四松在歩堞萬竹踈則其喜可知矣未㡬嚴武卒彷徨無依復捨之而去以史及公詩考之草堂斷手於寳應之初而永泰元年四月嚴武卒是年秋公寓䕫州雲安縣有此草堂者終始秖得四載而其間居梓閬三年公詩所謂三年奔走空皮骨是也則安居草堂者僅閲嵗而已其起居寢興之適不足以償其經營徃來之勞可謂一世之覊人也然自唐至今已數百載而草堂之名與其山川草朩禽獸公詩以爲不朽之傳盖公之不幸而其山川草朩之幸也葛常之僧祖可俗蘇氏伯固之子養直之弟也作詩多佳句如懐蘭江云懐人更作夢千里歸思欲迷雲一灘贈端師云牕間一榻篆烟碧門外四山秋蕋紅等句皆清新可喜然讀書不多故變態少觀其體格亦不過烟雲草樹山川鷗鳥而已而徐師川作其詩引乃謂自建安七子南朝二謝唐杜甫韋應物栁宗元本朝王荆公蘇黄妙處皆心得神解無乃過乎師川作畫虎行末章云憶昔予頑少小時先生教誦荆公詩即今老舊無新句尚有廬山病可師愛其詩如是也丹陽集元和十一年六月武元衡將朝夜漏未盡三刻騎出居第遇盗死於墻下許孟容謂國相横尸而盗不得為當朝恥遂下詔募捕竟得賊始得張宴者王承宗所遣訾珎者李師道所遣也初元衡䇿李錡之必反已而錡果反就誅由是諸鎮桀驁者皆不自安以致於是劉夢得有代静安佳人怨詩云寳馬鳴珂踏曉塵魚文匕首犯車茵適來行哭里門外昨夜畫堂歌舞人又云秉燭朝天遂不回路人彈指望髙臺墻東便是傷心地夜夜秋螢飛去來余考夢得為司馬時朝廷欲澡濯補郡而元衡執政乃格不行夢得作詩傷之而寄於静安佳人其傷之也乃所以快之歟韻語陽秋黄庶字亞夫嘗有怪石一絶傳於世云山鬼水怪着薜荔天祿辟邪眠莓苔鉤簾坐對心語口曽見漢家池舘來人士膾炙以為竒作唐張碧詩亦不多見嘗有池上怪石詩云寒姿數片竒突兀曽作秋江秋水骨先生應是壓風雷着向池邉塞龍窟我來池上傾酒尊半酣書破青烟痕参差翠栁擺不落筆頭驚怖黏秋雲我聞呉中項容水墨有髙價邀得將來倚松下鋪却雙繒直道難掉首空歸不成話二詩殆未易甲乙也同上詩話總龜後集巻十二欽定四庫全書詩話總龜後集巻十三宋阮閱撰評論門魯直謂陳後山學詩如學道此豈尋常雕章繪句者之可擬哉客有謂余言後山詩其要在於㸃化杜甫語爾杜云昨夜月同行後山則云勤勤有月與同歸杜云林昏罷幽磬後山則云林昏出幽磬杜云古人日已逺後山則云斯人日已逺杜云中原鼔角悲後山則云風連鼓角悲杜云暗飛螢自照後山則云飛螢元失照杜云更覺追隨盡後山則云林湖更覺追隨盡杜云文章千古事後山則曰文章平日事杜云乾坤一腐儒後山則曰乾坤着腐儒杜云孤城隠霧深後山則曰寒城着霧深杜云寒花只暫香後山則曰寒花只自香如此類甚多豈非㸃化老杜之語而成者余謂不然後山詩格律髙古真所謂碌碌盆盎中見此古罍洗者用語稍同乃是讀少陵詩熟不覺在其筆下又何以足病公丹陽集南史載孝武嘗問顔延之曰謝莊月賦何如答曰莊始知隔千里兮共明月帝召莊以延之語語之莊應聲曰延之作秋胡詩始知生為久離别没為長不歸同上連綿字不可挑轉用詩人閒有挑轉用者非為平仄所牽則為韻所牽也羅昭諌以沉寥為寥沉是為平仄所牽秋風生桂枝詩所謂寥沉工夫大是也又以汎瀾為瀾汎是為韻所牽哭孫員外詩所謂故侯何在涙瀾汎是也韻語陽秋方干詩清潤小巧盖未升曹劉之堂或者取之大過余未曉也王賛嘗稱之曰鋟肌滌骨氷瑩霞絢嘉殽自將不吮餘雋麗不葩芬苦不癯棘當其得志倐與神會孫邰嘗稱之曰其秀也仙蕋於常花其鳴也靈鼉於衆響觀其所作登靈隠峰詩云山叠雲霞際川傾世界東送俞坦之詩云風塵辭帝里舟楫到家林此真兒童語也寄喻鳬云寒蕪隨楚盡落葉渡淮稀如送俞坦之下第又云過楚寒方盡浮淮月正沉贈路明府詩云吟成五字句用破一生心贈喻鳬又云才吟五字句又白㡬莖鬚稱心寺中島云雪折停猿樹花藏浴鶴泉寄越上人又云牕接停猿樹巖飛浴鶴泉于使君詩云月中倚棹吟漁浦花底垂鞭醉鳳城送伍秀才詩又云倚棹寒吟漁浦月垂鞭醉入鳳城春其語言重叠有以見其窘也至於野渡波揺月空城雨翳鐘白猿垂樹牕邉月紅鯉驚鈎竹外溪義行相識處貧過少年時等句誠無愧於孫王所賞杜甫讀蘇渙詩則曰餘髪喜却變白間生黒絲髙適觀陳十六史碑則曰我來觀雅製慷慨變毛髪韻語陽秋李長吉云我生二十不得意一生愁謝如梧蘭年至二十七而卒陳無已除夜詩云七十已强半所餘能㡬何遥知暮景促更覺後生多至四十九而卒語意不祥如此豈神明者先受之耶丹陽老杜賦螢火詩云幸從腐草出敢近太陽飛未足臨書巻時能㸃客衣似譏當時閹人用事於人君之前不能主張文儒而乃如青蠅之㸃素也說者乃謂喻小有才而侵侮大徳豈不悞哉羅隠竊取其意乃曰不思曽腐草便擬倚孤光若道通文翰車公業闕長其視前作愧矣錢起集前八巻後五巻鮑欽止謂昭宗時有中書舍人錢珝亦起之諸孫今起集中恐亦有珝所作者余初未知其所㨿也比見前集中有同程七早入中書一篇云不意雲霄能自致空驚鵷鷺忽相隨臘雪新晴栢子殿春風欲上萬年枝和王員外雪晴早朝詩紫微晴雪帶恩光遶仗偏隨鴛鷺行長信月留寧避曉宜春花滿不飛香二詩皆翃所作無疑盖起未嘗入中書也集中又有登彭祖樓一詩而薛能集亦載則知所編甚駮也陳去非嘗謂余言唐人皆苦思作詩所謂吟安一箇字撚斷數莖鬚句向夜深得心從天外歸吟成五字句用破一生心蟾蜍影裏清吟苦舴艋舟中白髪生之類是也故造語皆工得句皆竒但韻格不髙故不能㕘少陵之逸歩後之學詩者倘能取唐人語而掇入少陵繩墨歩驟中此速肖之術也余嘗以此語似葉少藴少藴云李益詩云開門風動竹疑是故人來沈亞之詩云徘徊花上月虚度可憐宵皆佳句也鄭谷掇取而用之乃云睡深可忍風敲竹飲散那堪月在花真可與李沈作僕厮由是論之作詩者興致先自髙逺則去非之言可用倘不然便與鄭都官無異荆公嘗有詩云功謝蕭䂓慚漢第恩從隗始上燕臺或謂公曰蕭何萬世之功則功字固有來處若恩字則未見有出也荆公答曰韓集鬬雞聫句孟郊云受恩慚始隗則知荆公詩用法之嚴如此然一水䕶田將緑遶兩山排闥送青來之句乃以樊噲排闥事對䕶田豈䕶田亦有所出耶有好事者謂余言一日有人靣稱公詩謂自喜田園安五栁但嫌戸税擾庚桑以為的對公笑曰伊但知栁對桑為的對然庚亦是數盖以十日數之也余謂荆公未必有此意使果如好事者之說則作詩歩驟亦太拘窘矣錢起送屈突司馬詩云星飛龎統驥箭發魯連書人多稱其工余恨龎統驥出處無星字而魯連書有箭字也趙給事晩歸不遇詩忽㸔童子掃花處始愧夕郎題鳳來前句不用事後句用二事皆非律也丹陽詩家有換骨法謂用古人意而㸃化之使加工也李白詩云白髪三千丈縁愁似個長荆公㸃化之則云繰成白髪三千丈劉禹錫云遥望洞庭湖翠水白銀盤裏一青螺山谷㸃化之云可惜不當湖水靣銀山堆裏㸔青山孔稚圭白苧歌云山虚鐘響徹山谷㸃化之云山空響筦絃盧同詩云草石是親情山谷㸃化之云小山為友朋香草當姬妾學詩者不可不知此同上沈存中云退之城南聨句云竹影金𤨏碎金𤨏碎者日光也恨句中無日字爾余謂不然杜子美云老身倦馬河堤永踏盡黄榆緑槐影亦何必用日字作詩正欲如此葛常之自古工詩者未嘗無興也觀物有感焉則有興今之作詩者以興近乎訕也故不敢作而詩之一義廢矣老杜萵苣詩云兩旬不甲拆空惜埋泥滓野莧迷汝來宗生實於此皆興小人盛而掩抑君子也至髙適題處士菜園則云耕地桑柘閒地肥菜常熟為問葵藿資何如廟堂肉則近乎訕矣作詩者茍知興之與訕異始可與言詩矣髙適别鄭處士云興來無不愜才大亦何傷寄孟五詩云秋氣落窮巷離憂兼暮蟬送蕭十八云常苦古人逺今見斯人古題陸少府書齋云散帙至棲鳥明燈留故人皆佳句也上陳左相天地莊生馬江湖范蠡舟亦有含蓄但莊子謂天地一指萬物一馬而以天地為馬則悞矣並同上山谷詩多用稻田衲亦云田衣王摩詰詩云乞飯從香積裁衣學水田又云手中花􅏩净香飯稻畦成豈用是耶丹陽集晉張翰憶呉中蓴菜鱸鱠而歸而髙適屢作越上用如送崔功曹赴越云今朝欲乗興隨爾食鱸魚送李九赴越云鏡水若所憶蓴羹子舊便人以為疑余考地理志漢呉縣𨽻今會稽郡則以鱸作越上亦無傷也韻語陽秋魯直謂東坡作詩未知句法而東坡題魯直詩云每見魯直詩未嘗不絶倒然此巻語妙甚殆非悠悠者可識能絶倒者已是可人又云讀魯直詩如見魯仲連李太白不敢復論鄙事雖若不適用然不為無補如此題識其許之乎其譏之也魯直酷愛陳無已詩而東坡亦不深許魯直為無已揚譽無所不至而無已乃謂人言我語勝黄語何耶同上詩話總龜後集巻十三欽定四庫全書詩話總龜後集巻十四宋阮閱撰評史門安祿山反永王璘有窺江左之意子偒勸其取金陵史稱薛璆李臺鄉等為璘謀主而不及李白白傳止言永王璘辟為府僚璘起兵遂逃還彭澤審爾則白非深於璘者及觀白集有永王東廵歌十一首乃曰初從雲夢開朱邸更取金陵作小山又云我王樓艦輕秦漢却似天皇欲度遼若非賛其逆謀則必無是語矣白既流夜即有書懐詩云半夜水軍來潯陽滿旌旃空名適自悞廹脅上樓船從賜五百金棄之若浮烟辭官不受賞翻謫夜郎天宋中丞薦白啟云遇永王東廵脅行中道乃用白述懐意以􅋞拭其過爾孔巢父亦為永王所辟巢父察其必敗潔身潜遁由是知名使白如巢父之計則安得有夜郎之謫哉老杜送巢父歸江東云巢父掉頭不肯住東將入海隨烟霧其序云兼呈李白恐不能無微意也黄常明唐穆宗時令狐楚為相為景陵使以傭錢獻羡餘怨聲係路致有衡州之敗觀發潭州寄李寧常侍詩云君今侍紫垣我已墮青天委廢從兹日旋歸在㡬年又有答竇鞏中丞詩云何年相贈答却得在中臺亦可見其去國惨傷之情矣孔子曰茍患失之無所不至其楚之謂乎觀甘露之事則可見矣當是時也王涯等被繫神䇿仇士良白涯與李訓謀逆將立鄭注楚時以舊相在闕下文宗召楚至帝對楚悲憤因付涯訊牒曰果涯書耶楚曰涯誠有謀罪應死嗚呼觀望腐夫閹人而誣置人於死地楚忍為之乎甘露野史乃言尚頼舊相令狐楚獨為辯明若以史為證則野史之言未必公也杜牧之作李和鼎詩云鵩鳥飛來庚子直謫去日蝕辛邜年由來枉死賢才士消長相持勢自然盖言鄭注事也方是時和鼎論注不可為相旋致貶謫故牧之作詩痛之如此議者謂辛邜年在憲宗之時而文宗時無辛邜也豈牧之悞乎余謂牧之所云非謂實庚子辛邜也鵩集於舍班固書庚子之日日有蝕之詩人有辛邜之詠借是事以明李甘之寃爾杜牧之集有李給事詩二首其中有紛紛白晝驚千古鐡鎻朱殷㡬一空之句謂鄭注甘露之事也又有可憐劉校尉曽訟石中書之句牧之自注云給事曽忤仇士良人遂以為給事者李石也余嘗考之李石雖嘗為給事然劾鄭注之事史所不載語言忤仇士良然亦在石拜相之後石既拜相則牧之詩題不應以給事為稱其非李石明矣當時唯有李中敏與牧之厚善嘗因旱欲乞斬注以申宋申錫之寃帝不省遂以病告歸潁陽令牧之有元禮去歸緱氏學之句牧之自注云因論鄭注告歸潁陽又史云注誅遷給事其后仇士良以開府䕃其子中敏曰内謁者安得有子士良慚恚由是復棄官去由是論之則是中敏無疑矣唐太和末閹尹恣横天子以擁虚器為恥而元和逆黨未討帝欲夷絶其類李訓謂在位操權者皆碌碌惟鄭注可共事遂同心以謀已而殺陳宏志於青泥驛相繼王守澄楊承和韋元素王踐言皆不保首領又斲崔潭峻之棺而鞭其尸剪除逆黨㡬盡亦可謂壯矣意欲誅宦官後乃圖河湟歸河朔諸鎮天子向之鄭注雖招權納賄然出節度隴右欲因王守澄之葬乗羣宦臨送以鎮兵悉誅之謀亦未必不善會李訓先五日舉事遂成甘露之禍世以成敗論人物故訓注不得為忠至李徳裕謂不可與徒𨽻齒亦太甚矣按唐史李甘與李中敏皆嘗論鄭注不可為相故甘有封州之謫而中敏有潁陽之歸杜牧之贈甘詩云太和八九年訓注極虓虎吾君不省覺二兇日威武喧喧皆傳言明辰相登注和鼎顧予云我死有處所明日詔書下謫斥南荒去又有贈中敏詩云元禮去從緱氏學江充來見犬臺宫曲突徙薪人不會海邉今作釣魚翁盖深痛二公之言不行而訓注得恣其謀也盖當是時仇士良竊國柄勢焰熏灼士大夫於議論之間不敢以訓注為是以賈殺身之禍故牧之之詩如此於乎東漢之季柄在宦官陳蕃之徒以忠勇之資謀殪其黨而事亦不遂史載其名殆如日星而訓注以當時士夫畏懾士良輩遂加以奸兇之目而史亦以為亂人萬世之下無以自白其深可痛息哉家藏甘露野史三巻及乙邜記一巻二書之說特相矛盾甘露野史之言上令訓等誅宦官事覺反為所擒而乙邜記乃謂訓等有逆謀盖甘露之出於朝廷公論而乙邜記附會士良之私情也乙邜記後有朱實䟦尾數百言以乙邜所記為非是其說與野史同余故表而出之葛常之三良以身殉秦繆之葬黄鳥之詩哀之序詩者謂國人刺繆公以人從死則咎在秦繆而不在三良矣王仲宣云結髪事明君受恩良不訾臨殁要之死焉得不相隨陶元亮云厚恩固難忘君命安可違是皆不以三良之死為非也至李徳裕則謂社稷死則死之不可許之死與梁丘據安陵君同譏則是罪三良之死非其所矣然君命之於前而衆驅之於後為三良者雖欲不死得乎唯栁子厚云疾病命固亂魏氏言有章從邪陷厥父吾欲討彼狂使康公能如魏顆不用亂命則豈至陷父於不義如此哉東坡和陶亦云顧命有治亂臣子得從違魏顆真孝愛三良安足希似與栁子之論合而過秦繆墓詩乃云繆公生不誅孟明豈有死之日而忍用其良乃知三子狥公意亦如齊之二子從田横則又言三良之殉非繆公之意也韋蘇州睢陽感懐詩有曰宿將降賊庭儒生獨全義宿將謂許逺儒生謂張廵也盖當時物議以為廵死而逺就虜疑逺畏死而辭服於賊故應物云爾韓愈嘗有言曰逺倘畏死何苦守尺寸之地食其所愛之肉以與賊抗而不降乎斯言得矣廵死後賊將生致逺於偃師逺亦以不屈死則是逺亦終死賊也李義山詩云本為留侯慕赤松漢庭方識紫芝翁蕭何只解追韓信豈得虚當第一功是以蕭何功在張良下也王元之詩云紀信生降為沛公草荒孤壘想英風漢家青史縁何事却道蕭何第一功是以蕭何功在紀信下也余謂炎漢創業何為宗臣髙祖設指縱之喻盡之矣他人豈容議耶盗殺武元衡也白樂天為京兆掾初非言責而請捕盗以必得為期時宰惡其出位坐賦新井篇逐之九江故因聞琵琶乃有天涯流落之感至於淚濕青衫之上何憊如此哉先文康公嘗有詩云平生趣操號安恬退亦恬然進不貪何事潯陽恨遷謫輕將清淚濕青衫又云及泉曽改莊公誓勝母終回曽子車素綆銀牀堪淚墮更能賦詠獨何如左太冲陶淵明皆有荆軻之詠太冲則曰雖無壯士節與世亦殊倫淵明則曰惜哉劍舞踈竒功遂不成是皆以成敗論人者也余謂荆軻功之不成不在荆軻而在秦舞陽不在秦舞陽而在燕太子舞陽之行軻固心疑其人不欲與之共事欲待他客與俱而太子督之不已軻不得已遂去故羽歌悲愴自知功之不成已而果膏刃秦庭當時固已惜之然概之於義雖得秦王之首於燕亦未能保終吉也故楊子云荆軻為丹奉於期之首燕督亢之圖入不測之秦實刺客之靡也焉可謂之義也可謂善論軻者漢文欲輕利而反重義者以謂失本恵而傷吾仁固也或又咎帝短喪為傷於孝予觀遺詔率皆言為已損制未嘗使士庶皆短喪也厥後丞相翟方進與薛宣服母喪皆三十六日而除而顔師古注云漢制自文帝遺詔國家遵以為常則咎不在文帝矣而王荆公詩云輕刑死人衆短喪生者偷仁孝自此薄哀哉不能謀輕刑死人衆則固然矣短喪生者偷則似誣文帝也俱同上詩話總龜後集巻十四欽定四庫全書詩話總龜後集巻十五宋阮閲撰評史門老杜北征詩云憶昨狼狽初事與古先别不聞夏商衰中自誅褒妲其意謂明皇英斷自誅妃子與夏商之誅褒妲不同老杜此語出於愛君曲文其過非至公之論也白樂天詩云六軍不發無奈何宛轉蛾眉馬前死非逼廹而何哉然明皇能割一已之愛使六軍之情帖然亦可謂知所輕重矣故前輩有詩云畢竟聖明天子事景陽赴井是何人丹陽集晉盧諶先為劉琨從事中郎將叚匹磾領幽州求諶為别駕故琨答諶詩云情滿伊何蘭桂移植茂彼春林瘁此秋棘言諶棄已而就匹磾也厥後琨命箕淡攻石勒一軍皆没由是窮蹙不能自守乃率衆赴匹磾繼為匹磾所拘知其必死矣豈無望於諶哉觀再贈諶云朱實隕勁風繁英落素秋何意百煉鋼化為繞指柔其詩托意欲以激諶而救其急而諶殊不領也琨既被害諶始上表以雪其寃終亦何所補耶漢元帝時𢎞恭石顯用事京房劉向皆深嫉之嘗上書力詆盖薫蕕氷炭不能以共處理之必然也然房欲淮陽王為已助代王作求朝奏章向令外親上䟽謂小人在朝以致地動雖嫉惡之心切然於忠實亦少貶矣使二子果輸忠於漢當明目張膽論至再三可也何暇為身謀而假之於他人哉故荆公詩云京房劉向各稱忠詔獄當年迹自窮畢竟論心異恭顯不妨迷國畧相同後之論人物者倘取其心而畧其迹則善矣韻語陽秋張祜觀狄梁公傳云失運廬陵厄乗時武后尊五丁扶造化一柱正乾坤而山谷有鯨波横流砥柱虎口活國宗臣之句可謂善論仁傑者余謂仁傑不畏武后羅織之獄三族之夷强犯逆鱗敢以廬陵王為請者非特天資忠義亦以先得武后之心故也且張易之昌宗后之嬖臣也欲歸廬陵事大體重非二嬖之言后孰信之吉頊能以危言撼二嬖陳易弔為賀之計故二嬖敢從容以請而后意遂定於是仁傑之諌得行卒之遣徐彦伯迎廬陵王於房州者由仁傑之言也故史援吕温之言稱之曰取日虞淵洗光咸池潜授五龍夾之以飛於乎仁傑其忠且賢哉按仁傑傳始后欲立武三思而李昭徳傳乃云洛陽人王慶之請以武承嗣為皇太子昭徳力争今考三思本傳不載為皇太子之說而承嗣傳云洛州人請立承嗣為皇太子岑長倩格輔元皆争不從而不及昭徳豈有牴牾耶裴度在朝憲宗委任不疑使破三賊已而呉元濟授首王承宗割二州遣子入侍李師道被擒兩河諸侯忠者懐强者畏克融廷凑皆不敢桀勲烈之盛一時無與比肩者惟李義山指為聖相詩曰帝得聖相相曰度又曰嗚呼聖皇及聖相亦過矣哉荀卿曰得聖臣者帝若舜禹伊尹周公皆聖臣也謂四人為聖臣則可謂裴度為聖相其可哉唐明皇以英銳身致極治以荒滛身致極亂自古人君成敗之速未有如明皇者鄭毅夫詩云四海不揺草九重藏禍根十年傲堯舜一笑破乾坤盖是詩也開元之盛能致兵寢刑措之治者實姚宋輔政之功明皇可以無疑矣不三四年遽使去位及李林甫用事則盤旋紏固至十八九年敗國蠧賢無所不至猶以為未足也晚年顧力士曰海内無事朕將吐納導引以天下事付林甫天下安得而不亂乎並同上史載宋之問冉祖雍並賜死於桂州之間得詔震汗不引決祖雍請於使者曰之問有妻子幸使之訣使者許之而之問荒悸不能處家事及考之文集有登大庾嶺詩云兄弟逺謪居妻子咸異域則之問赴貶時未嘗以妻子行也又有發藤州及昭州二詩二州皆在桂州之南則賜死之地非桂州明矣豈史之誤歟丹陽集漢髙祖置酒沛宫酒酣擊筑自歌曰大風起兮雲飛揚威加海内兮歸故鄊安得猛士兮守四方時帝有天下已十二年當思耆艾賢徳與共維持獨専意猛士何哉豈馬上三尺嫚罵未易遽革邪治道終以覇雜盖有由然其前年下詔曰賢士大夫吾能尊顯之是年下詔曰與天下之賢豪士大夫同安緝之余謂播告之辭乃秉筆代言非若耳熱之歌乃中心所欲也許汜不為陳元龍所禮嘗與劉備稱之備曰君有國士名望無救世意而求田問舍言無可采何縁當與君語如小人欲卧百尺樓卧君於地何但上下牀之間耶然介甫屢用之求田問舍轉無成更覺求田問舍遲讀蜀志曰無人語與劉元徳問舍求田意最髙又有逰西霞庵云求田此山下終欲忤陳登豈非力欲轉此一重案歟老杜北征詩云經年至茅屋妻子衣百結慟哭松聲回悲泉共幽咽平生所嬌兒顔色白於雪見爺背靣啼垢膩脚不襪方是時杜方脫身於萬死一生之地得見妻兒其情如是洎至秦中則有晒藥能無婦應門亦有兒之句至成都則有老妻憂坐痺幼女問頭風之句觀其情悰已非北征時比也及觀進艇詩則曰晝引老妻乗小艇晴㸔稚子浴清江江村詩則曰老妻畫紙為棋局稚子敲針作釣鈎其優游愉悅之情見於嬉戯之間則又異於在秦中時矣葛常之白樂天作八漸偈云苦既非真悲亦是假則世間悲歡人我必能忘情始憲宗欲以樂天為刺史王涯以資淺為言遂得江州司馬及涯敗作詩快之有當君白首同歸日是我青山獨徃時之句李徳裕於樂天不見有隙徳裕貶崖州亦作三絶快之其一篇云樂天嘗任蘇州日要勒湏教用禮儀從此結成千萬恨今朝果中白家詩盖嘗以唐史考之樂天卒於會昌之初武宗時也而徳裕之貶乃在宣宗大中年則徳裕之貶樂天死已久非樂天之詩明矣以是凖之快王涯之句恐亦未必然也韻語陽秋西伯將出獵卜之曰所獲非龍非彲非虎非羆所獲覇王之輔於是東遇太公於渭水之陽載與俱歸此司馬遷之說也文王至磻谿見吕尚釣鈎得玉璜刻曰姬受命吕佐撿徳合於今昌來提此尚書太傅之說也太公釣於兹泉文王得而王此吕不韋之說也吕望年七十釣於渭渚初下得魴次得鯉刳腹得書書文曰吕望封於齊此劉向之說也太公避紂居東海之濵聞文王作興曰盍歸乎來由文王至於孔子五百有餘嵗若太公望則見而知之此孟子之說也是數說者皆言天産英輔以興周盖非碌碌佐命者之可擬而司馬遷乃摭或者之論謂西伯拘羑里散宜生閎夭招吕尚求美女竒物獻於紂而贖西伯西伯既脱三人有隂謀脩徳以傾商政此豈所以待太公也哉歐陽詹云論兵去商虐講徳興周道屠沽未遇時何異斯川老余比赴官宜春於夀昌道中見壁間題一詩云漁翁何事亦從戎變化神竒握掌中莫道直鈎無所取渭川一釣得三公一以為傾商政一以為釣三公皆非知聖賢者韻語陽秋李太白至邯鄲登城樓詩云提携袴中兒杵臼及程嬰空孤獻白刃必死耀丹誠是有取於二子甚重袴中兒謂趙武也然司馬遷作趙晉二世家自相矛盾左氏所書又復不同將何以取信於后世耶晉世家之說曰景公十七年誅趙同趙括令庶子武為後趙世家之說曰景公三年屠岸賈攻趙朔殺趙括等朔同友人程嬰匿趙武於山中至十五年景公有議立趙武左氏之說曰魯成公八年六月晉討趙同趙括武從姬畜於公宫以其田與祁奚韓厥言於晉侯曰成季之勲宣孟之忠無後為善者懼矣乃立武而反其田按成公八年即晉景公十七年也或云匿武於山中或云畜武於宫中或云十五年而後立武或云未踰月而立武皆未知所據也楊雄之迹曲諂新室議之者衆矣此置而不論雄之心如何哉觀法言之書似未明乎大道之㫖也王荆公乃深許之何耶詩云寥寥鄒魯後於子獨先覺又云懦者陵夷此道窮千秋止有一楊雄又云道真沉溺九流渾獨泝頽波討得源又云子雲生平人莫知知者乃獨稱其辭今尊子雲者皆是得子雲心亦無㡬是亦聖人許雄也東坡謂雄以艱深之辭淺易之說與公矛盾矣同上詩話總龜後集巻十五欽定四庫全書詩話總龜後集巻十六宋阮閱撰評史門孔子謂寗武子邦有道則知邦無道則愚其知可及也其愚不可及也所謂及者繼也非企及之及謂寗武之愚而後人不可繼爾居亂世而愚則天下塗炭將孰拯屈原事楚懐王不得志則悲吟澤畔卒從彭咸之居究其初心安知拯世之意不得伸而至於是乎賈生謫長沙傅渡湘水為賦以弔之所遭之時雖與原不同盖亦原之志也白樂天詠史詩乃謂士生一代間誰不有浮沉良時真可惜亂世何足欽乃知汨羅恨未抵長沙深信如樂天言則是以亂世為不拯也而可乎議者謂誼所欲為文帝不能用者乃有鉛刀為銛幹棄周鼎寳康瓠語觀此是有憾於絳灌東陽者雖然勃也嬰也敬也皆素有長者之譽必不肯害賢而利已楚漢春秋别有絳灌豈其是耶葛常之永和中王羲之脩褉事於會稽山隂之蘭亭羣賢畢至少長咸集序以謂雖無絲竹管絃之盛一觴一詠亦足以暢叙幽情則當時篇詠之傳可考也今觀羲之謝安謝萬孫綽孫統王彬之凝之肅之徽之徐豐之袁嶠之十有一人四言五言詩各一首王豐之元之藴之渙之郄曇華茂庾友虞說魏滂謝繹庾藴孫嗣曹茂之華平桓偉十有五人或四言或五言各一首王獻之謝瑰卞迪卓髦羊模孔熾劉宻虞谷勞夷后綿華耆謝藤王儗吕系吕夲曹禮十有六人詩各不成罰酒三觥謝安五言詩曰萬殊渾一象安復覺彭殤而羲之序乃以為一死生為虚誕齊彭殤為妄作盖反謝安一時之語而或者遂以為未達此特未見當時羲之之詩爾其五言曰仰視碧天際俯瞰緑水濵寥閴無涯觀寓目理自陳大矣造化功萬殊莫不均羣籟雖参差適我無非親此詩則豈未達者耶史載獻之嘗與兄徽之操之俱詣謝安二兄多言獻之寒温而已既出客問優劣安曰小者佳吉人之詞寡以其少言故知之今王氏父子昆季畢集而獻之之詩獨不成豈亦吉人之詞寡耶景祐中有㑹稽太守蔣堂修永和故事嘗有詩云一𣲖西園曲水聲水邉終日會冠纓㡬多詩筆無停綴不似當年有罰觥盖謂獻之等發也葛常之會稽臨安金陵三郡皆有東山俱傳以為謝安携妓之所按謝安本傳初安石寓居會稽與王羲之許珣支遁逰處被召不至遂棲遲東土唐裴冕與吕謂等鑑湖聨句有興衰還尋戴東山更問東此會稽之東山也本傳又云安石嘗徃臨安山中坐石室臨濬谷悠然歎曰此與伯夷何逺今餘杭縣有東山東坡有游餘杭東西岩詩注云即謝安東山所謂獨携縹緲人來上東西山者是也此臨安之東山也本傳又謂及登台輔於土山營墅樓舘林竹甚盛毎携中外子姪游集今土山在建康上元縣崇禮鄉載建康事迹云安石於此擬會稽之東山亦號東山此金陵之東山也李白有憶東山二絶不到東山久薔薇㡬度花白雲他自散明月落誰家我今携謝妓長笑絶人羣欲報東山客開闗掃白雲不知所賦者何處之東山也陳軒乃録此詩於金陵集中將别有所據耶南史載宋劉勔經始鍾嶺以為棲息亦號東山金陵遂有兩東山矣同上韓愈自監察御史貶連州山陽令所坐之因傳記各異唐書本傳謂上䟽論宫市徳宗怒故貶李翺行狀謂為幸臣所惡故貶皇甫湜作神道碑謂正元十九年關中旱飢公請寬民徭専政者惡之故貶按文公集宫市之䟽不傳而文公歴官記及年譜以謂京師旱民飢詔蠲租半有司徴求反急愈與同列上䟽言狀為幸臣所讒幸臣者李實也予考退之自連山移江陵詩云孤臣昔放逐泣血追愆尤汗漫不省識恍如乗桴浮或自疑上䟽上䟽豈其由則所坐之因雖退之猶疑之也集中有上京兆李實書盛稱其能曰愈來京師所見公卿大臣未有赤心事上憂國如閣下者又云今年以來不雨者百餘日種不入土而盗賊不敢起榖價不敢貴老姦宿瞞銷縮摧沮亹亹百餘言皆叙其敬慕之意其後實出為華州又有書云愈於久故游從之中蒙恩奬知遇最厚無與比者愈為實所讒不應此書拳拳如是及觀江陵塗中詩云同官盡才俊偏善栁與劉或慮語言洩傳之落寃仇又岳陽别竇司直云愛才不擇行觸事得讒謗前年出官日此禍最無妄又和張十一憶昨行云伾文未揃崖州熾雖得赦宥常愁猜近者三奸悉破碎羽窟無底幽黄能眼中了了見鄊國知有歸日眉方開又有永正行以快伾文之貶其末云郎官清要為世稱荒郡僻野嗟可矜具書目見非妄徴嗟爾既徃宜為懲則知陽山之貶伾文之力而劉李下石為多非為李實所讒也葛常之韓偓香奩集百篇皆艶詞也沈存中筆談云乃和凝所作凝後貴悔其少作故嫁名於韓偓爾今香奩集有無題詩序云余辛酉年戯作無題詩十四韻故奉常王公内翰呉融舍人令狐渙相次屬和是嵗十月一旦兵起隨駕西狩文藁咸棄丙寅嵗在福建有蘇暐以藁見授得無題詩因追味舊時闕忘甚多予按唐書韓偓傳偓嘗與崔嗣定䇿誅劉季述昭宗反正為功臣與令狐渙同為中書舍人其後韓全誨等劫帝西幸偓夜追及鄠見帝慟哭至鳳翔遷兵部侍郎天祐二年挈其族依王審知而卒以紀運圖考之辛酉乃昭宗天復元年丙寅乃哀帝天祐二年其序所謂丙寅嵗在福建有蘇暐授其藁則正依王審知之時也稽之於傳與序無有不合者則此集韓偓所作無疑而筆談以為和凝嫁名於偓特未考其詳爾筆談云偓又有詩百篇在其四世孫奕處見之豈非所謂舊詩之闕忘者乎同上漢史載韓信教陳狶反有挈手歩庭之議且曰吾為公從中起漢十年狶果反髙祖自將兵出張文潜曰方是時蕭相國居中而信欲以烏合不教之兵從中起以圖帝業雖使甚愚必知無成信安肯出此哉故其詩曰欲助陳侯乃中起不思蕭相在咸陽又一詩云平生蕭相真知已何事還同女子謀則又責蕭相不為信辨其枉也余觀班史吕后與蕭相謀詐令人從帝所來稱狶已破羣臣皆賀相國紿信曰雖病强入賀信入吕后使武士縳信斬之則斬信者相國計也縱使其枉相國其肯為辨之哉信死則劉氏安不死則劉氏危相國豈肯以平日相善之故而悞社稷大計乎文潜後有一絶云登壇一日冠羣雄鍾室倉皇念蒯通能用能誅誰計䇿嗟君終日媿蕭公丹陽集漢成帝時張禹用事朱雲對上曰臣願賜尚方斬馬劍斷佞臣一人以厲其餘上問誰也對曰安昌侯張禹上大怒曰居下訕上罪死不赦御史將雲下雲扳殿檻折曰臣願從龍逢比干游於地下如雲者可謂忠直有餘矣後世思其人而不可得則作為韻語以聲其美肅宗時元載用事故杜子美詩云千載少似朱雲人至今折檻空嶙峋武后時傅游藝用事故盧照鄰詩云昔有平陵男姓朱名阿游願得斬馬劍先斷佞臣頭言當時立朝之士不能如雲以二人之惡而告於上也若二人者奸諛百倍張禹矣腥臊之血豈足以汚尚方之劍乎宋景文云朱游英氣凛生風瀕死危言悟帝聰殿檻不脩旌直諌安昌依舊漢三公信乎去佞如㧞山也五王之誅二張也張柬之啟其謀桓彦範任其事敬暉崔元暐袁恕已各效其力坐使天后還政中宗即祚誠為社稷之竒勲然尚有可恨者焉薛季昶勸除武三思彦範輩豈不知中宗非剛斷之主乎彼之意以為三思方烝亂韋氏而中宗孱懦一聽其所為茍誅三思必不利於已故不肯誅耳不旋踵而自罹殺身之禍實自取之也張文潜云繫狗不繫首反噬理必然智勇忽迷方脫匣授龍泉區區薛李昶先事僅能言留禍啟臨淄敗謀豈非天髙祖大風之歌志氣慷慨規模宏逺凛凛乎已有四百年基業之氣史記樂書謂之三侯章令沛得以四時歌舞宗廟盖欲使後之子孫知其祖創業之勤不可怠於守成爾武帝秋風詞瓠子歌已無足道及為賦以傷悼李夫人反覆數百言綢繆戀嫪於一女子其視髙祖豈不媿哉藝文志上自造賦二篇其一不得而見耶並同上詩話總龜後集巻十六欽定四庫全書詩話總龜後集巻十七宋阮閲撰評史門老杜課伯夷辛秀伐木則曰報之以微寒共給酒一斛遣信行脩水筒則以浮𤓰裂餅以答其恭謹陶淵明告其子則曰輙遣一力助汝薪水之勞此亦人子也可善遇之盖古人之役僕夫其忠厚率如此初學記載王褒買便了為奴作約使苦作以致聽劵而淚下鼻涕長一尺有不如早歸黄陌令蚯蚓鑚額之語其少陵柴桑之罪人哉葛常之建安七子惟劉公幹獨為諸王子所親曹操威焰盖世甄夫人出拜諸人皆伏而公幹獨平視雖輸作而不悔亦可嘉矣故梅聖俞詩云公幹才俊或欺事平視美人曽不起自兹不得為故人輸作左校瀕於死公幹嘗有贈徒弟詩云亭亭山上松瑟瑟谷中風風聲一何盛松枝一何勁其寄意如是豈肯少屈於操哉末篇又托興鳯凰有何時當來儀將須聖明君之句則不以聖明待曹操矣杜甫悲陳濤詩云野曠天清無戰聲四萬義軍同日死言房琯之敗也琯臨敗猶持重而中人邢延恩促戰遂大敗故甫深悲之甫為右拾遺會琯罷相上䟽力救琯肅宗大怒詔三司推問􅌠相張鎬救之獲免故洗兵馬行云張公一生江海客身長九尺鬚眉蒼盖戯其救已也張無盡孤憤吟云房琯未相日所談皆臯䕫一朝陳濤下覆没千萬師中原已紛潰老杜尚嗟咨則老杜救琯之章豈亦出於私情乎鄭䖍受安禄山偽命洎賊平與張通王維並囚宣陽里因善畫祈於崔圓遂得免死老杜所謂今如罝中兎子雲識字終投閣是也及䖍貶台州有詩云可念此公懐直道也霑新國用輕刑如䖍者可謂之懐直道乎當是愛私之言爾八哀詩亦云反覆歸聖朝㸃染無滌蕩老䝉台州掾泛泛浙江漿盖傷之也忘年交謂雖年齒尊幼不侔而道義可為友也如張鑑之於陸贄崔廓之於李謙是已魯直云逐貧不去與忘年便以忘年作朋友用盖有來處也老杜過孟倉曹詩云清談見滋味爾輩可忘年則山谷所用豈茍云乎哉李白作蜀道難以罪嚴武其末云所守或匪親化為狼與豺朝避猛虎夕避長蛇磨牙吮血殺人如麻錦城雖云樂不如早還家則武待白之禮未必優也武與杜甫情好甚厚一朝以飲酒過度而武㡬殺之則不如早還家之說乃白先見之明爾陸暢謁韋臯於蜀郡暢感韋之遇已遂反其詞作蜀道易云蜀道易易於履平地郎基在潁川不置朩枕裴潜在兖州不眠胡狀居官清操要當如是白樂天在杭州取天竺片石受代携歸故其詩曰三年為刺史飲氷復食檗唯向天竺山取得両片石此抵有千金無乃傷清白暨守吳門復取洞庭雙石一以支琴一以貯酒故雙石詩有萬古遺水濵一朝入吾手之句洎罷府支琴石遂歸履道舊居故作詩云天上定應勝地上支機未必及支琴於乎泉石膏肓人士之逸韻若樂天者豈潘子義所謂風流罪過也耶君子為小人誣衊則其詩怨故寓之於物以舒其憤如朱晝古鏡詩所謂我有古時鏡初自懐陵得蛟龍猶泥蟠魑魅幸月蝕是也小人既敗君子得志之秋則其詩昌故寓之於物以快其志如劉禹錫磨鏡篇所謂萍開緑池滿暈盡金波溢山神妖氣沮野魅真形出是也黄子虚作妬佳月篇云狂雲妬佳月怒飛千里黒佳月了不嗔曽何汚㓗白支頥少待之寒光静無迹燦燦黄金盤獨照一天碧殆亦二子之意俱同上康節三皇吟許大乾坤自我宣乾坤之外復何言初分大道非常道終有先天永後天作法極微難着迹收功最久不知年若教世上論功業料得更無人在前五帝吟進退肯將天下讓着何言語狀雍容一作從容衣裳垂處威儀盛玉帛脩時意思㳟物物盡能循至理人人自願立殊功當時何故得如此只被升明類日中三王吟一片中原萬里餘殆非孱徳所能居能一作宜夏商正朔猶能布湯武干戈未便驅澤火有名方受革水天無意不成需請觀仁義為心者肯作人間淺丈夫意一作應請觀一作詳知五伯吟刻意尊名名愈虧人人奔命不勝疲生靈劍㦸圍中活圍一作林公道貨財心裏歸雖則餼羊能愛禮奈何鳴鳳未來儀東周五百餘年内歎息唯聞一仲尼七國吟當其末路尚縱横仁義之言固不聽肯為破齊存即墨能勝坑趙盡長平清晨見鬼未為怪白日殺人奚足驚加以蘇張掉三寸扼喉其勢不俱生嬴秦吟轟轟七國正争籌利害相摩未便休比至一雄心底定其如四海血横流三千賔客方成夢百二山河又變秋謾說罷侯能置守趙髙元不是封侯西漢吟秦破山河舊戰場豈期民復見耕桑九千來里開封域四百餘年號帝王剥喪既而遭莽卓經營殊不念髙光當時文物如斯盛城復何由更有隍三國吟桓桓鼎峙震雷音絶唱髙踪没處尋蕭鼓一方情味暢弓刀萬里力難任論兵狠石寧無意飲馬黄河徒有心雖曰天時亦人事誰知慮外失良金西晉吟承平未必便無憂安若忘危非善謀題品人才憑雅謂雌黄時事用風流有刀難割公閭腹無朩可梟元海頭禍在夕陽亭一句上東門笑浪悠悠十六國吟溥天之下號寰區大禹曽經治水餘衣到敝時多蟣蝨𤓰當爛處足虫蛆龍章本不資狂㓂象魏何嘗薦亂胡尼父有言堪味處當時欠一管夷吾南北朝吟云方其天下分南北聘使何嘗絶徃還偏覇尚存前典憲小康猶見舊衣冠一作迍邅洛陽雅望稱崔浩江表竒才服謝安二百四年能並轡謾將形勢互為言有隋吟始謀當日已非臧又更相承或自戕螻蟻人民貪土地泥沙金帛悅姬姜征遼意思糜荒服泛汴情懐厭未央三十六年都掃地不然天下未歸唐有唐吟天生神武奠中央不爾羣凶未易攘正觀若無風凛凛開元安有氣揚揚凭髙始見山河壯入夏方知日月長三百年間能渾一事難成徃道彌光五代吟自從唐季墜皇綱天下生靈被擾攘社稷安危憑卒伍朝廷輕重繫藩方深冬寒朩固不脫未旦小星猶有光五十三年更八姓始知掃蕩待真王我宋吟二首紛紛五代亂離間一旦雲開復見天草朩百年新雨露車書萬里舊山川尋常巷陌猶簮紱取次園林盡管絃盡一作亦人老太平春未老鶯花無害日髙眠又吾曹養拙頼明時為幸居多寕不知天下英才中遁迹人間好景處開眉生來只慣見豐稔老去未嘗經亂離一作聞鼔鼙五事歴將前代舉帝堯而下更無之按卲氏聞見録康節先公謂本朝五事自唐虞而下所未有者一革命之日市不易肆二克服天下在即位後三未嘗殺一無罪四百年方四葉五百年無心腹患伯温竊疑未甞經亂離為太甚先公曰吾老且死汝輩行自知之張南軒采菊亭詩引曰陶靖節人品甚髙晋宋諸人所未易及讀其詩可見胸次灑落八牕玲瓏豈野馬遊塵所能棲集前建安丞張君精力未衰即掛冠家於瀏陽有年矣葺小園為亭面南山來求予名予名之曰采菊亭取靖節所謂采菊東籬下悠然見南山嗚呼靖節興寄深逺特可為識者道耳詩曰陶公千載人髙標跨餘子豈無濟時念斂䕃獨知止歸來卧衡門無愠復何喜九日天氣佳東籬擷芳蕋舉頭見南山佳處政在此地偏心則逺意得道豈否張侯謝銀艾築室娛燕几小亭才尋丈景物自新美頗聞方瞳清亦復强歩履不妨數登臨倚杖㸔雲起髙詠悠然篇飛鴻送千里文集復齋漫録云東坡作諫論以魏鄭公以蘇張之辯而為諫諍之術且云鄭公之初實學縱横之術其所以與蘇張異者心正爾或以東坡之論為不然余讀鄭公出闗詩云中原還逐鹿投筆事戎軒縱横計不就慷慨志猶存䇿杖謁天子驅馬出闗門請纓覊南越憑軾下東藩欝紆陟髙岫出没望平原古朩鳴寒鳥空山啼夜猿既傷千里目還驚九折魂豈不憚艱險深懐國士恩季布無二諾侯嬴重一言人生感意氣功名誰復論東坡實不見此詩盖識見之明有以探其然耳乃知讀書未博未可以輕議前輩也苕溪漁隠曰余觀諫論殆是老蘇作格力辭㫖可以見矣非東坡所作也詩話總龜後集巻十七欽定四庫全書詩話總龜後集巻十八宋阮閲撰辯疑門王絲字敦素越之蕭山人景祐初為縣令會嵗歉絲每家支錢一千以濟之期以明年夏輸絹一匹邑人大受其恵稱為徳政繇此當路薦之盖是時一縑售價不逾其數爾仕止郎曹典州而已范文正公為作墓誌具載其事至荆公當國傚其法施之天下號為和買久之本錢既不復俵且有折帛之害世悞傳始於王儀仲素儀仲文正公之子早即貴達未嘗為邑官至八座没謚懿敏國史本傳可考其子鞏字定國與東坡先生游李定字仲求洪州人晏元獻公之甥文亦竒欲預賽神會而蘇子羙以其任子距之致興大獄梅聖俞謂一客不得食覆鼎傷衆賔者也其嗣即商老彭以詩名列江西𣲖中又李定字資深元豐御史中丞其孫方叔正民兄弟皆顯名一時揚州人又李定嘉祐治平以來以風采聞嘗廵歴天下諸路計度轉運使官制未行老於正卿乃敦老如岡之祖盖濟南人也同姓名者凡三人世亦多指而為一不可不辯李豸陽翟人東坡先生門下士亦字方叔両方叔俱以文鳴詩章又多互傳于世陳子昻感遇詩云樂羊為魏將食子狥軍功骨肉且相薄他人安得忠又曰吾聞中山相乃屬放麑翁孤獸猶不忍况以奉君終一則忍於其子一則不忍於麑故魯直懐荆公詩有啜羮不如放麑樂羊終媿巴西陳無已啓亦用此事所謂中山之相仁於放麑亂世之雄疑於食子是也然屬麑於秦西巴者孟孫也非中山相也子昻徒見樂羊中山事遂誤作孟孫用無已亦遂襲之魯直以西巴為巴西亦悞矣丹陽集李白古風云燕昭延郭隗遂築黄金䑓劇辛方趙至鄒衍復齊來予考史記不載黄金䑓之名止云昭王為郭隗改築宫而師事之孔文舉與曹公書曰昭王築䑓以尊郭隗亦不著黄金之名上谷郡圖經乃云黄金䑓在易水東南十八里燕昭王置千金於䑓上以延天下士遂因以為名皇甫松有登黄金䑓詩云燕相謀在茲積金黄巍巍上者欲何顔使我千載悲其迹尚可得而考也東坡詩云玉奴絃索花奴手玉奴謂楊妃花奴謂汝陽王璡也及觀和楊公濟梅花詩乃言玉奴終不負東昏何耶按南史東昏妃潘玉兒當是筆悞爾韓退之詩曰離騷二十五王逸序天問亦曰屈原凡二十五篇今楚詞所載二十三篇而已豈非并九辨大招而為二十五乎九辨者宋玉所作非屈原也今楚詞之目雖以是篇併注屈原宋玉然九辨之序止稱屈原弟子宋玉所作大招雖疑原文而或者謂景差作若以宋玉痛屈原而作九辨則招魂亦當在屈原所著之數當為二十六矣不知退之王逸之言何所據耶杜子美栢中允除官制詩舊註以為栢耆又以為正節按杜詩云紛然喪亂際見此忠義門蜀中㓂亦甚栢氏功彌存三止錦江沸獨清玉壘昏當是有功於蜀者方是時叚子璋反於上元徐知道反於寳應而正節為卭州刺史數有功則是正節無疑矣杜集又有栢學士茅屋栢大兄弟山居詩議者皆以謂正節之居然詩中殊不及功名之事但皆稱其為學讀書爾茅屋云古人已用三冬足年少今開萬巻餘山居云山居精典籍文雅渉風騷疑是卭州立功之前丹陽集黄魯直詩云世有捧心學取笑如東施梅聖俞云曲眉不想西家様餒腹還須二子清太平寰宇記載西施事云施其姓也是時有東施家西施家故李太白效古云自古有秀色西施與東鄰而東坡代人留别詩乃云絳蠟燒殘玉斚飛離歌唱徹萬行啼他年一舸鴟夷子應記儂家舊姓西似與寰宇記所言不同豈為韻所牽耶同上張無盡嘗和山字云安得將相似仲山人疑之以近人所常用皆山甫也觀後漢志陽樊攅茅田服􅐚注云楚仲山所居又楊脩答臨淄侯牋云仲山周旦之儔只稱仲山何疑之有黄常明坡記王陵過賈逵廟呼曰賈梁道我大魏之忠臣也及司馬景王病夢逵為祟因為詩曰嵇紹似康為有子郄超畔鑒似無孫如今更恨賈梁道不殺公閭殺子元盖怪梁道忠義之靈不能自已其子元之惡按晉紀王賈所擾者乃宣帝名懿字仲達非景帝子元也䂬溪正訛門天闚象緯逼雲卧衣裳冷世傳古本作天闚今從之莊子以管闚天正用此字舊集以作闕又或作闗今不取盖先生詩該衆美者不惟近體嚴於屬對至於古風句對者亦然觀此詩可見矣近人論詩多以不必屬對為髙古何耶故詳論之以俟知者焉杜詩正異海右此亭古濟南名士多濟南實海右諸郡舊集一作海右今從之正文作海内非也拂天萬乗動觀水百丈湫拂字從一作兼畫馬詩有云翠華拂天來向東正文作沸非也君臣留歡娛樂動殷嶱嵑殷從上聲嶱嵑出文選音渴曷集韻山貌舊集作殷湯嶱音字皆悞盖縁湯字之訛二字從而倒之兼他詩二字悞倒之者非一豈知秋禾登貧窶有倉卒别本禾字一作未今從之按此詩十一月作禾字明矣昌黎謂年登而妻啼飢實此意也隂風西北來惨淡隨回紇紇字從一作鶻唐史徳宗朝始改名回鶻正文非也中興諸將收山東㨗書夜報清晝同夜字從王介甫謂㨗書晝夜至也舊作日今不取花門天驕子飽肉氣勇决諸詩之言花門者皆回紇也舊集作北門盖由字畫小誤唐以太原為北門非謂回紇明矣卒章申言花門也渡河不用船千騎常撇捩撇捩疾貌大食刀歌云鬼物撇捩辭沆壕字意皆同今從之舊集作撇烈非也嬋娟碧蘚静蕭摵寒籜聚蘚字從别本舊集作鮮盖字畫小缺而釋者因云嬋娟碧鮮皆謂竹也尤謬長夜苦寒誰獨悲杜陵野老骨欲折此成都詩舊集作長安非也其夜字之訛故悞作安耳况卒章之意明甚南京亂初定所向邑枯槁邑字從别本他詩亦云朝野色枯槁正文作邑今不取樹枝有鳥亂棲時瞑色無人獨歸客棲字從一作正文作鳴今不取言亂棲則鳴可知矣髙皇亦明王魂魄猶正直皇字舊集諸本皆作堂近見别本作皇今從之乃與上下數聨詩意相貫也詢之閬人其漢髙祠廟今尚存焉别離重相逢偶然豈足期足字舊集作定盖由字畫小訛况上句已云泄雲無定姿悲䑓蕭颯石巃嵸哀壑杈枒浪呼洶浪字作别本考兩句屬對之工當用一實字又别本下句作二鶯猛胸絛徐墜字亦未通主守問家臣分朋見溪畔耘者必分朋曹而進故東坡逺景樓記謂耘者畢出數百人為曹者是也舊作明乃字小訛耳風吹巨焰作河漢騰烟柱諸本下句作何掉騰烟柱蜀本何作河近見别本今從之盖於詞意通也合昏排鐡騎清曉散錦幪幪字從又有他詩有云駑駘怯錦幪乃覆馬之物正文作􅐒非也大火運金氣荆揚不知秋火字從一作謂大火西流七月詩也正文作暑今不取終然契真如得匪金仙術二句並從一作正文作終契如徃還得匪合仙術今不取㡬度寄書白塩北故人贈我青絲裘絲字從一作縑别本正文止作絲字此詩寄裴施州者或謂裴冕非也按唐史冕以寳應元年貶施州刺史不數月移澧州距此已六年矣配極𤣥都閟憑髙禁籞長籞字舊集諸本皆作禦按西溪宣帝紀云池籞者其字從竹今從之尸鄉餘土室誰話呪雞翁誰話從呪雞事見列仙傳正文作雞說乃字之訛也咒字一作喌音州又音祝茂樹行相引連山望忽開茂字連山字皆從一作時歸鳯翔行在正文連山作蓮峰非也霧樹亦然掖垣竹埤梧十尋洞門對霤常隂隂霤字從别本文選云二堂對霤此春深詩也而諸本作雪悞矣江上小堂巢翡翠苑邉髙塜卧麒麟苑字從一作正文作花盖字畫小訛而說者云一詩連用三花字不害為工誤矣雲斷岳蓮臨大路天晴宫栁暗長春大路陜華間地名也晉書檀道濟從劉裕伐姚泓至潼關姚鸞屯大路以絶道濟粮道而蜀本正作大道誤矣馬驕朱汗落胡舞白題斜朱汗已見他詩舊作珠乃衍文也白題從一作西漢云斬胡白題將字義與雕題同正文作蹄非也力疾坐清曉來詩悲早春詩字從别本考詩題與上下句意當從之舊作時非也峽雲籠樹小湖日蕩船明蕩字從一作非久游江湖者不知此字之工正文作落盖字訛也合觀却笑千年事驅石何時到海東題云觀造竹橋即日成句中合觀字謂聚觀橋成之速而笑驅石之誕舊集諸本皆訛作歡非也詩話總龜後集巻十八欽定四庫全書詩話總龜後集巻十九宋阮閱撰隠逸門世人謂淵明皆以其専用肥遯初無康濟之念能知其心者寡也嘗求其集若云歳月擲人去有志不獲騁又有云猛志逸四海騫翮思逺翥任苒歳月頽此心稍已去其自樂田畆乃巻懐不得已耳士之出處未易為世俗言也陽秋瓢之為器貧者所用故顔子以一瓢飲而揚子比之山雌文康公築室泛山溪上闔門千指朝虀暮塩未嘗敢以貧為病嘗因溪結亭號曰瓢飲盖欲少見慕賢好古安貧樂道之意予嘗有詩云我不學許由隠烟霧得瓢不飲惟掛樹又不學徳義居虎邱帶瓢入市多騎牛分無玉甌嚢古錦病渴文園只瓢飲下瞰金溪新結亭未須引吸如長鯨但願金溪化為酒歳歳持瓢醉花栁杜尋苑十隠居云侍立小童清義山憶正一云烟爐銷盡寒燈晦童子開門雪滿松子厚云日午獨眠無餘聲山童隔竹敲茶臼秀老云夜深童子喚不起猛虎一聲山月髙閒棄山間累年頗得此數詩氣味陳搏負經綸才歴五季亂離游行四方志不遂入武當山後隠居華山自晉漢以後毎聞一朝革命嚬顣數日人有問者瞪目不答一日方乗驢游華隂市聞太祖登極驚喜大笑問其故又笑曰天下自此定矣太祖方潜龍時摶嘗見天日之表知太平之有自矣遯迹之初有詩云十年蹤跡走紅塵回首青山入夢頻紫閣縱榮争及睡朱門雖貴不如貧愁聞劍㦸扶危主悶見笙歌聒醉人携取舊書歸舊隠野花啼鳥一般春豈淺人也哉邵伯温易學辨惑陳摶周世宗嘗召見太平興國初再召赴闕太宗賜詩云曽向前朝出白雲後來消息杳無聞如今若肯隨徴召總把三峰乞與君先生服華陽巾草屨垂絛以賔禮見賜坐澠水燕談康節除祕書省校書郎潁州團練推官辭不許既受命即引疾不起且以詩答鄉人曰平生不作皺眉事天下應無切齒人斷送落花安用雨裝添舊物豈須春幸逢堯舜為真主且放巢由作外臣六十病夫宜揣分監司無用苦開陳言行録後復再召摶辭曰九重仙詔休教丹鳯㗸來一片野心已被白雲留住辯惑种放别業在終南山後生從之學者甚衆性頗嗜酒躬耕種秫以自釀所居有林泉之勝殊為幽絶真宗聞之遣中使携畫工圖之開龍圖閣召輔臣觀焉上欲賞之其後復聞魏野居有幽致帝亦遣人圖之故野有詩云幽居帝畫㸔澠水燕談張横渠八翁吟詩十首歩虚聲裏八竒翁八竒須信古英雄賔朋未散山翁醉聽歌同入醉鄉中傅巖巖下築岩翁幽通心與帝心通憂勤未感思賢夢為霖何日見成功磻溪溪畔釣魚翁濯纓溪水聽溪松龜猷未告非熊兆漁簑堪笑老龍鍾老原原上卜年翁感天功業動天聰流言未信成王悟悟成全得起禾風龜山山下感麟翁麟翁知己㡬時逢自從顔孟希蹤後㡬人今日更希蹤青牛西去伯陽翁當年夫子歎猶龍立言為恐真風喪豈知言立喪真風寓言豪誕漆園翁誇談名理浩無窮早知懸解人間世争知懸解不言中一身無碍竺乾翁遍員身關戒身同船師從我乗桴去頑空中與指真空褒中斜谷卧龍翁量如江海氣如虹不應三顧逢先主至今千載慕冥鴻籃輿多病八吟翁雲僧溪叟恣逰從清時無事青山醉青山仍醉最青峰處士魏野字仲先陜州人居於東郊架草堂有水竹之勝好彈琴作詩清苦多聞於時前後郡中皆所禮遇上祀汾隂召之辭疾不至野以詩贄公曰從前輔相皆頻出獨在中書十五秋泰岳汾隂俱禮畢這回好伴赤松遊公覽之喜形於色以酒茗藥物為答素編先公遺札有公自寫此詩數本王文正公遺事旦得詩感悟以疾屢辭政柄遂拜太尉玉清昭應宫使又曰魏野謂冦凖曰自古功名盖世少有全者因與詩曰好去上天辭將相歸來平地作神仙及貶始悔不用野之言云仁宗政要復齋漫録云晉皇甫謚髙士傳載四皓見秦政虐乃避入藍田山作歌曰漠漠髙山深谷逶迤煌煌紫芝可以療飢唐虞世逺吾將安歸駟馬髙盖其憂甚大富貴之畏人不如貧賤之肆志林逋字君復居杭州西湖之孤山真宗聞其名賜號和靖處士詔長吏歳時勞問逋工於畫善為詩如梅花詩云踈影横斜水清淺暗香浮動月黄昏評詩者謂前世咏梅者多矣未有此句也及其臨終為句云茂陵他日求遺藁猶喜初無封禪書尤為人稱誦自逋之卒湖山寂寥未有繼者歸田録又青箱雜記云逋景祐初尚無恙范文正公亦過其廬贈逋詩曰巢由不願仕堯舜豈遺人又曰風俗因君厚文章到老醇其激賞如此言行録武夷之溪東流凡九曲而第五曲為最深盖其山自北而南者至此而盡聳全石為一峰㧞地千尺上下平處微戴土生林朩極蒼翠可玩而四隤稍下則反削而入如方屋㡌者舊經所謂大隠屏也直屏下兩麓相抱之中西南向為屋三間者仁智堂也堂左右兩室左曰隠求以待棲息朱氏隠求室詩曰晨牕林影開夜枕山泉響隠去復何求無言道心長邱氏詩曰抱膝小牕深讀書空谷響一笑有會心紛紛自消長項氏詩曰種桑不療寒蒔粟長苦飢飢寒雖自有但使願無違袁氏詩曰本是山中人歸作山中友豈同荷蓧老永結躬耕耦浮雲一出岫膚寸彌九有此志未可量見之千載後劉平父詩曰寧懐棲遯情閒袖經綸手風雲倘未期猿鶴且為友萬氏詩曰平生區中縁中歳從黄綺出處本無心誰云今隠几黄子厚詩曰隠側混樵牧堅髙存聖功懐哉得所尚一瓢從屢空韓氏次櫂歌韻宛宛溪流叠九灣山猿時下鳥關關釣磯茶竈山中樂大隠屏邉日月閑淮南小山作招隠極道山中窮苦之狀以風切遁世之士使無遐心其㫖深矣其後左太冲陸士衡相繼有作雖極清麗顧乃自為隠遁之辭遂與本題不合故王康琚作詩以反之雖正左陸之悞而所述乃老氏之言又非小山本意也十月十六日夜坐許生挾琴過予書堂夜久月明風露凄冷生揮絃度曲聲甚悲壯既乃更為招隠之操而曰榖城老人嘗欲為予依永作辭而未就也予感其言因為推本小山遺意戯作一闋以反之口授許生冩呈榖城老者諸名勝請共賦之以備異時山中故事云南山之幽桂樹之稠枝相樛髙拂千厓素秋下臨深谷之寒流王孫何處扳援久淹留聞說山中虎豹書嘷聞說山中熊羆夜咆叢薄深林鹿呦呦獮猴與君居山鬼伴君遊君獨胡為自聊音留歳云暮矣將焉求思君不見我心徒離憂南山之中桂樹秋風雲㝠濛下有寒栖老翁朩食澗飲迷春冬此間此樂優遊𦕈何窮我愛陽林春葩晝紅我愛隂崖寒泉夜淙竹栢含烟泊青葱徐行發啇歌安坐撫孤桐不問簞瓢屢空但把明月甘長終人閒雖樂此心誰與同南山之阿桂樹婆娑雲嵯峨下䕃連蜷舊柯秋思渺渺秋風多王孫不見扳援時寤歌我思岑寂空山良宵月華詰曲前溪春流迅波秀朩盤紆雜青莎猿猴慕熊羆麋鹿友麚荒忽淹留奈何思君使我長咨嗟人間歳月驚心易蹉跎長幽居中林散髪披襟山􅏟崟慰此栖遲素心渌渏一曲傳清音超然忘世誰能共浮沉或逺汲寒溪烟雨晝隂獨宿空齋哀猿夜吟竹栢揺風更蕭森春蘭得芳紉秋菊伴孤斟此意寧論古今勸君與我同􅄬簮倘徉歸去歌谷雲深右反招隠恬退門蔡寬夫詩話云乖崖少喜任俠學擊劍尤樂聞神仙事為舉子時嘗從陳希夷欲分華山一半希夷以紙筆蜀牋贈之公笑曰吾知先生之㫖矣殆欲驅我入閙處乎然性極清介居無妾媵不事服玩朝衣之外燕處惟紗㡌皂絛一黄土布裘而已至今人傳其畫像皆作此餙始及第時嘗以詩寄傳霖逸人云前年失脚下魚磯苦戀明時不忍歸為報巢由莫相笑此心非是愛輕肥李順之辭乖崖帥蜀有詩寄陳希夷云性愚不肯住山林剛要清流擬致君今日星馳劍南去回頭慚愧華山雲皆真素志也復齋漫録云唐人詩有意効承平無功答盛明灰心縁忍事霜髩為論兵道直身還泰恩深命轉輕梅塩非擬議葵藿是平生白日長垂照青蠅謾發聲嵩陽舊田地終擬俟歸耕中書後堂闕軒西壁有題灰心霜髩之句者騐其筆迹舊相李公廸之書也李入相時邉兵未動意在忍事之語元獻中書即事詩叙其事云惨惨髙槐落凄凄餘菊寒粉牆多記墨聊為拂塵㸔正為此也苕溪漁隠曰蔡寛夫詩話以灰心縁忍事霜鬂為論兵之句是裴晉公作李文定嘗親書於中書壁間蔡寬夫詩話云正獻公以清徳直道聞天下而風姿尤竒古年近七十髪髩皤然無一莖黒者居相位未㡬以歳旦請老一章得謝退居睢陽歐陽文忠公未顯時正獻推薦特厚及文忠為留守日與公酧唱文公有答公見贈末章云報國如乖願歸耕寧買田期無辱知已肯逐利名遷熈寧初文忠致政歸汝隂時正獻捐舘已十有五年矣文忠復用前詩題其祠堂云門生今白首墓朩已蒼烟報國如乖願歸耕寧買田此言今始踐知不愧黄泉苕溪漁隠曰昭陵諸臣傳云慶厯四年拜中書門下平章事每内降與恩澤者積數十而面納上前上嘗謂諫官歐陽脩曰外人知衍封還内降吾居禁中有求恩者每以衍不可告之而止者多於所封還也由是僥倖不說出知兖州明年正旦上表曰臣年七十願還上印綬乃以太子少師致仕議者謂故相一上章得請以三少致仕皆非故事盖宰相賈昌朝疾之蔡寬夫云正獻居相位未㡬以歳旦請老不言鎮東魯盖闕文也迂叟詩話云王太尉旦從車駕過陜魏野貽詩曰昔時宰相年年替君在中書十一秋西禮東封俱已了如今好伴赤松遊王袖其詩以呈上累表請退上不許苕溪漁隠曰余按三朝正史云旦登柄用十八年為相僅一紀素嬴多疾又以名位太重憂畏不自安連歳拜章求觧上素重其徳望聞其引退甚不樂優詔褒答繼以面諭旦一日獨對滋福殿令左右扶掖而升復求遜位上覩其痩瘁閔然許之則迂叟詩話以為上不許盖悞矣其蔡寛夫詩話云遂得謝此言良是蔡寬夫詩話云萊公自永興被召魏野以詩送之曰好去上天辭富貴却來平地作神仙王文正從東封回野亦寄以絶句云西祀東封今已了好來相伴赤松遊文正袖此詩求退遂得謝萊公晚歳南遷世多言不能如文正用野言盖志士仁人以各有志觀萊公末年所為豈愧文正也哉山人處士其言不如此或用或不用各繫其人要之不溺於富貴以貪得則一也野子亦有父風宋景文嘗贈以詩云姓名髙士傳父子少微星詩話總龜後集巻十九欽定四庫全書詩話總龜後集巻二十宋阮閲撰警句門章聖極喜老杜勳業頻看鏡行藏獨倚樓歐公稱李白襄陽樂落日欲沒峴山西四句常語也至於清風明月不用一錢買玉山自倒非人推然後見太白之横放所以驚動千古者不在此乎詩人以一字為工世固知之惟老杜變化開闔出奇無窮殆不可以形迹捕詰如江山有巴蜀棟宇自齊梁則其逺近數千里上下數百年只在有與自兩字而吐吞山川之氣俯仰古今之懐皆見於言外此工妙至到人力不可及也石林詩話七言律難於氣象雄渾句中有力而紆餘不失言外之意自老杜錦江春色五更角鼓等句後常恨無復繼者同前詩之聲律至唐始成然亦多原六朝㫖意而造語工夫各有微妙何遜入西塞詩薄雲巖際出初月波中上至少陵江邊小閣則云薄雲巖際宿孤月浪中飜雖因舊而益妍類獺髓補痕也錢郎並稱郎非錢比也如云窮達戀明主耕桑亦近郊鳥道挂疎雨人家殘夕陽牛羊下山小煙火隔林深長樂鐘聲花外盡龍池栁色雨中深皆特出意外標凖古今固不必論如横雲嶺外千重樹流水聲中一兩家亦可謂竒句矣士元豈有如此句乎贈孟少府新除江南尉云客路尋常隨竹影人家大抵旁山嵐題王秀友半日村别業云長溪南路當羣岫半景東隣照數家此何等語余讀其詩盡帙未見有可喜處以是知不及起逺甚同上山隂野雪興難乗佳辰强飲食猶寒皆幹旋其語使就音律近集有天上嬌雲未肯同十年江海别嘗輕花下壺盧鳥勸提與君盖亦不須傾皆此法也黄常明賔客集添爐𢷬雞舌洒水净龍鬚駱賔王桃花嘶别路竹葉㵼離樽此體甚衆惟栁子厚從中丞過盧少府郊居一聨最工云蒔藥閑庭延國老開尊虚室值賢人只似稱坐客而有兩意盖甘草國老濁酒賢人故也夢得又有藥爐燒姹女酒甕貯賢人近於湯燖右軍矣余嘗為郊行詩云江干食息呼扶老朩末扳縁訝宛童乃古今注秃鶖一名扶老爾雅女羅謂之宛童也又題一士人所居云但遣一枝居巧婦不殊大厦賀佳賔盖用爾雅注鷦鷯俗呼巧婦炙轂子雀一名佳賔言集人屋如賔客也樂天曾用巧婦對慈姑謝元暉善為詩任彦升工於筆又云任筆沈詩劉孝綽稱弟儀與成云三筆六詩故牧之云杜詩韓筆愁來後似倩麻姑痒處爬近人罕用之臨川云閑詩用意歸詩筆静外安生比太山坡云水洗禪心都眼静山供詩筆總眉愁同上唐朝人士以詩名者甚衆徃徃因一篇之善一句之工名公先達為之遊談延譽遂至聲聞四馳曲終人不見江上數峯青錢起以是得名故國三千里深宫二十年張祜以是得名微雲淡河漢踈雨滴梧桐孟浩然以是得名兵衛森畫㦸宴寢凝清香韋應物以是得名野火燒不盡東風吹又生白居易以是得名敲門風動竹疑是故人來李益以是得名鳥宿池邊朩僧敲月下門賈島以是得名畫棟朝飛南浦雲珠簾暮捲西山雨王勃以是得名華裾織翠青如葱入門下馬氣如虹李賀以是得名然觀各人詩集平平處甚多豈皆如此句哉古人嘗謂嘗鼎一臠可以盡知其味恐未必然爾杜子美云為人性僻耽佳句語不驚人死不休則是凡子美胷中流出者無非驚人之語矣讀其集者當知此言不妄殆非前數公之可比倫也葛立之李義山位𢎞農尉嘗投詩謁告云却羡卞和雙刖足一生無復没堦趨雖為樂春罪人然用事出人意表尤有餘味英俊陸沉强顔低意趨跖諾虎扼腕不平之氣有甚於傷足者非粗知直心不甘心於病畦下者不能賞此語之工也陽秋郛子稍學作小詩嘗賦梅花云玉屑裝龍腦雲衣覆麝臍何堪夜來雪香色兩凄迷留友人詩云良友間何闊春事􅑈如許勞君下鷗沙一葉繁春渚昨夢墮前世再見欣欲舞聊呼花底盃酒面㸃紅雨狂飲岸綸中良談揮玉麈驪駒未可歌妙句君須吐觀此數語似粗知詩家畦逕學之不已必佳但恐其中墮耳同上陸士衡文賦云立片言以居要乃一篇之警䇿此要論也文章無警䇿則不足以傳世盖不能竦動世人如老杜及唐人諸詩無不如此但晉宋間人専致力於此故失於綺靡而無髙古氣味老杜句云句不驚人死不休所謂驚人句即警䇿也吕氏童䝉訓句法門前人文章各自一種句法如老杜今君起柂春江流予亦江邉具小舟同心不減骨肉親每語見許文章伯如此之類老杜句法也東坡秋水今㡬竿之類此東坡句法魯直之夏扇日在揺行樂亦云聊此魯直句法也學者若能遍考前作自然度越流輩同上淵明退之詩句法分明卓然異衆惟魯直為能深識之學者若能識此等語自然過人阮嗣宗詩亦然徐師川云作詩回頭一句最為難道如山谷詩所謂忽思鍾陵江十里之類是也他人豈如此尤見句法安壯山谷平日詩多用此格徐師川云為詩文常患意不屬或只得一句語意便盡欲足成一章又惡其不相稱師川云但能知意不屬則學可進矣几注章作詩文或得一兩句而止若未有次句即不若且休養銳以待新意若盡力湏要相屬譬如力不敵而苦戰一敗之後意氣沮矣王荆公好集句嘗於東坡處見古硯東坡令荆公集句荆公云巧匠斵山骨只得一句遂逡廵而去山谷嘗有句云琪璘卧葬功名骨終身不得好對同上莊子文多竒變技經肯綮之未嘗乃未嘗技經肯綮也詩句時有此法如昌黎一蛇兩頭見未曽拘管計日月欲進又不可君不强起時難更東坡云追兹霜雪未兹謀待君必聊亦記吾曾餘人罕敢用黄常明苦吟門山澤之儒多癯詩人尤甚子美有思君令人痩樂天云形容痩薄詩情苦豈是人間有相人又云貌將松共痩心與竹俱空李商隠瘦盡東陽姓沈人掉頭撚髭之苦豈有張頥豐頰者哉沈昭畧嘗戯王約以肥而癡答以痩而狂昭畧喜曰痩已勝肥狂已勝痴同上賈島詩如鳥從井口出人從岳陽來貫休此夜一輪滿清光何處無皆經年方得句以見其詞􅀈思苦若非好事者誇辭亦繆用其心也同上後山詩話云荆公詩力去陳言誇末俗可憐無補費精神而公平生文體數變暮年詩益工用意益苦故言不可不謹也蔡寬夫詩話云司空圖善論前人詩如謂元白為力勍氣僝乃都會之豪估郊島非附於寒澁無所置才皆切中其病及自評其作乃以南樓山最秀北路邑偏清為假令作者復生亦當以着題見許此殆不可曉當局者迷固人情之通患如樂天所謂屬石破山先觀鑱迹發矢中的兼聽弦聲使不見其詩而聞此語當以為如何哉冷齋夜話云賈島詩有影畧句韓退之喜之其渡桑乾詩曰客舍并州已十霜歸心日夜憶咸陽而今更渡桑乾水却望并州是故鄉又赴長江道中詩曰䇿杖離山驛逢人問梓州長江那可到行客替生愁隠居詩話云孟郊詩蹇澁窮僻琢削不暇苦吟而成觀其句法格力可見矣其自謂夜吟曉不休苦吟鬼神愁如何不自閒心與身為仇而退之薦其詩云榮華肖天秀㨗疾愈响報何也蘇子由云唐人工於為詩而陋於聞道孟郊嘗有詩云食虀腸亦苦强歌聲無歡出門即有碍誰謂天地寬郊耿介之士雖天地之大無以容其身起居飲食有戚戚之憂是以卒窮以死而李翺稱之以為郊詩髙處在古無上平處猶下顧沈謝至韓退之亦談不容口甚矣唐人之不聞道也孔子稱顔子在陋巷人不堪其憂回也不改其樂回雖窮困早死而非其處身之非可以言命與郊異矣詩話總龜後集巻二十欽定四庫全書詩話總龜後集巻二十一宋阮閲撰留題門澧陽道旁有甘泉寺因莱公丁謂曽留行記從而題詠者甚衆碑牌滿屋孫諷有平仲酌泉曽頓轡謂之禮佛遂南行髙䑓下瞰炎荒路轉使髙僧薄寵榮人皆傳道余獨恨其語無别自古以直道見黜者多矣豈皆貪寵榮者哉又有人云此泉不洗千年恨留與行人戒覆車害理尤甚萊公之事亦例為覆車乎因過之偶為數韻其間有云已憑静止鑑忠精更遣清冷洗讒啄盖指二公也䂬溪黄州麻城縣界有萬松亭連日行清隂中其館亭亦可愛適當關山路徃來留題無數東坡傷來者不嗣其意嘗有詩云十年栽種百年規好徳助人無我儀又云為問㡬株能合抱殷勤記取角弓詩中壊嘗徹碑有士題云舊韻無儀字蒼髯有恨聲不可録䂬溪張祜喜遊山而多苦吟凡所歴僧寺徃徃題詠如題僧壁云客地多逢酒僧房却厭花題萬道人禪房云殘陽過逺水落葉滿踈鐘題金山寺云僧歸夜船月龍出曉堂雲樹影中流見鐘聲兩岸聞題孤山寺云不雨山長潤無雲水自隂斷橋荒蘚澁空院落花深如杭之靈隠天竺蘇之靈巖楞伽常之恵山善權潤之甘露招隠皆有佳作李渉在岳陽嘗贈其詩曰岳陽西湖南上寺水閣松房遍文字新釘張生一首詩自餘吟着皆無味信知僧房佛寺類其詩標榜者多矣葛常之温公治第洛中闢門曰獨樂其心憂樂未始不在天下也其自作記有云世有人肯同此樂必再拜以獻矣東坡賦詩云兒童誦君實走卒知司馬盖名其得人心也又云撫掌笑先生年來學瘖瘂疑未盡命名之意同上沈約命王筠作郊居十詠書於壁不加篇題約云此詩指物程形無假題署老杜贈李潮八分歌云吾甥李潮下筆親開元以來數八分潮也奄有二子成三人潮乎潮乎奈爾何又韓退之招楊之罘詩我令之罘歸失得栢與馬之罘别我去計出栢馬下我自之罘歸入門思而悲之罘别我去能不思我為作詩招之罘晨夕抱飢渴嘗戯謂此二詩直不湏題署也黄常明子美詩誅茅初一畆廣地方連延敢謀土朩麗自覺面勢堅經營上元初斷手寶應年又題衡山縣學堂云旄頭彗紫微無復爼豆事於乎已十年儒服敝於地衡山雖小邑首唱恢大義講堂非曩造大屋加塗塈下可容百人墻隅亦深䆳林朩在庭戸宻幹叠青翠有井朱夏時轆轤凍堦戺采詩倦䟦渉載筆尚可記豈不是草堂縣學記李翺皇甫湜集中皆無詩世傳翺有縣君好塼渠一詩并傳燈録載答藥山一揭湜秪有浯溪留題一篇而已許彦周詩話云牧之題桃花夫人廟詩細腰宫裡露桃新脉脉無言㡬度春至竟息亡縁底事可憐金谷墜樓人僕嘗謂此詩為二十八字史論苕溪漁隠曰牧之於題詠好異於人如赤壁云東風不與周郎便銅雀春深鎻二喬題商山四皓廟云南軍不袒左邉袖四老安劉是滅劉皆反説其事至題烏江亭則好異而畔於理詩云勝敗兵家事不期包羞忍恥是男兒江東子弟多才俊巻土重來未可知項氏以八千人渡江敗亡之餘無一還者其失人心為甚誰肯復附之其不能巻土重來决矣許彦周詩話云牧之作赤壁詩折㦸沉沙鐡未消自將磨洗騐前朝東風不與周郎便銅雀春深鎻二喬意謂赤壁不能縱火即為曹公奪二喬置之銅雀䑓上也孫氏覇業係此一戰社稷存亡生靈塗炭都不問只恐没了二喬可見措大不識好惡南唐書云韓熈載自江南奉使中原為感懐詩題於館壁云僕本江北人今作江南客再去江北遊舉目無相識秋風吹我寒秋月為誰白不如歸去來江南有人憶苕溪漁隠曰余家有韓熈載家讌圖圖中題此詩後四句嘗以問相識間云是古樂府今觀此書方知其悞也苕溪漁隠曰題呉江三賢堂内陸龜䝉詩云千首文章二頃田囊中未有一錢看却因養得能言鴨驚破王孫金彈丸談苑云陸龜䝉居笠澤有内養自長安使杭州舟出舍下彈其一緑頭鴨龜䝉遽從舍出大呼曰此緑頭有異善人言方將獻天子今持此死鴨以詣官内養少長並集信然厚以金帛遺之因徐問龜䝉曰此鴨何言龜䝉曰常自呼其名遊道場山何山詩云白水田頭問行路小溪深處是何山髙人讀書夜達旦至今山鶴鳴夜半汪彦章何山何氏書堂記云寺有何氏書堂圖記相承以何氏為晉何楷楷嘗讀書此山後為吳興太守以其居為寺而名其山寄贈門子美詩逺行無自得内熱比何如寄旻云舊來好事今能否老去新詩誰與傳岑参云喬生作尉别來久因君為問平生否魏君校理復何如前月人來不得書夫子素多疾别來未得書北庭苦寒地體内今何如樂天寄夢得云病後能吟否秋來曽醉無退之贈崔立之云長女當人事誰助出帨縭諸男皆秀爽㡬能守家規亦皆書一通也張均張垍兄弟承襲父寵致位嚴近皆自負文材覬覦端揆明皇欲相均而抑於李林甫欲相垍而奪於楊國忠自此各懐􅔵望安禄山盗國垍相禄山而均亦受偽命肅宗反正兄弟各論死非房琯力救豈能免乎老杜贈均詩云通籍踰青𤨏亨衢照紫泥靈虬傳夕箭歸馬散霜蹄言均為中書舍人刑部尚書時也贈垍詩云翰林逼華盖鯨力破滄溟天上張公子宫中漢客星言垍尚寧親公主禁中置宅時也二人恩寵烜赫如是則報國當如何而乃斁亂天理下比逆賊反噬其主夫豈人類也哉黄常明杜甫累不第天寶十三載明皇朝獻太清宫饗廟及郊甫奏賦三篇帝竒之使待制集賢院命宰相試文章故有贈集賢崔于二學士詩云昭代將垂白途窮乃呌閽氣冲星象表詞感帝王尊天老書題目春官騐討論倚風遺鶂路隨水到龍門舊注陳希烈韋見素為宰相而崔國輔于休烈者皆集賢院學士也故末句云謬稱三賦在難述二公恩可謂不忘於藻鑑之重者矣按唐史是歳陳希烈為相至八月見素代之而甫集有上見素詩云持衡留藻鑑聽履上星辰則甫之文乃為見素所賞非希烈也同上牧之贈阿宜一日讀十紙一月讀十箱古人讀書以紙計范雲就袁叔明讀毛詩日誦九紙又袁俊家貧無書每從人假借必皆抄寫自課日五十紙為計䂬溪故事門余嘗論李廣以私憾殺㶚陵尉其褊忮險刻决非長者所以不侯非直殺降之譴也因觀坡云明年定起故將軍未肯先誅㶚陵尉恐亦寓此意史傳襲稱兄弟為友于故淵明詩云再喜見友于子美云友于皆挺㧞又山鳥山花吾友于南史到藎從武帝登北顧樓賦詩藎受詔便就上以示其祖溉云藎定是才子番恐卿從來文章假手於藎後每和御詩上輙手詔戱溉曰得無貽厥之力乎退之玉川詩云誰謂貽厥無基址二事正可對也䂬溪坡云賔鴻社燕巧相違月令來賔事常疑人未曽用及及觀夢得秋江晚泊云暮霞千萬狀賔鴻次第飛顧况云安得凌風翰肅肅賔天京杜别浦鴈賔秋同上東坡游金山詩云江山如此不歸山江神見怪驚我頑我謝江神豈得已有田不歸如江水盖與江神指水為盟耳句中不言盟誓者乃用子犯事指則誓在其中不必詛神血口然後謂之盟也送程六表弟云浮江泝蜀有成言江水在此吾不食黄常明老杜復見諸山得銀甕注引禮記山出器車注盖瑞應圖曰王者宴不及醉刑罸中人不為非則銀甕出昌黎我有雙飲醆其銀得朱提見漢志朱提銀八兩為一流注朱提屬犍為乃邑名也䂬溪樂天以長慶二年自中書舍人為杭州刺史冬十月至治時仍服緋故遊恩徳寺詩序云俯視朱紱仰睇白雲有愧於心及觀自欵詩云實事漸銷虚事在銀魚金帶遶腰光戊申詠懐云紫泥丹筆皆經手赤紱金章盡到身以今觀之金帶不應用銀魚而金章不應用赤紱人皆以為疑而不知唐制與今不同也按唐制紫為三品之服緋為四品之服淺緋為五品之服各服金帶又制衣紫者魚袋以金餙衣緋者魚袋以銀餙樂天時為五品淺緋金帶佩銀魚宜矣劉長卿有袁郎中喜章服詩云手詔來筵上腰金向粉闈勲名傳舊閣蹈舞著新衣郎中亦是五品故其身章與樂天同葛常之書事門近世作文者多以紫荷囊作詩從事用如宋景文詩所謂觀榮聳麟族賦筆助荷囊之類沿襲而用者非一而不知其誤也按晉書輿服志書文武百官皆有囊綬八座尚書則荷紫以生紫為袷囊綴之服外加於左肩則所謂荷紫者非芰荷之荷乃負荷之荷也南史載周捨嘗問劉香曰着紫荷囊相傳云挈囊竟何所出香曰張安世傳云持槖筆事孝武帝數十年注曰槖囊也盖人徒見南史有着紫荷囊四字遂作一句讀之殊不知晉書紫荷之義也丹陽集王儉少年以宰相自命嘗有詩云稷契康虞夏伊吕翼商周又字其子曰元成取仍世作相之義至其孫訓亦作詩云旦奭康世政蕭曹佐甿俗大率追儉之意而為之後官亦至侍中同上杜云十暑岷山葛三霜楚戸砧九鑚巴噀火三蟄楚祠雷其書歳月也新矣樂天云呉郡兩回逢九月越州四度見重陽去年八月十五夜曲江池畔杏園邉今年八月十五夜湓浦沙頭水舘前又前年九月餘杭郡呼賔命宴虚白堂去年九月到東洛今年九月來呉鄉兩邉蓬鬢一時白三處菊花同色黄其質直叙事又自一格黄常明岑参送顔平原詩序云十二年春有詔補尚書郎十數公為郡守上親賦觴羣公於蓬萊仍賜以繒帛寵餞加等故参為長篇述其事安禄山亂明皇曰河北二十四郡無一忠臣邪及聞平原固守乃曰朕不識真卿何如人所為若此前日宴賚真文具耳退之云偶然題作木居士便有無窮求福人可謂切中時病凡世之趨附權勢以圖身利者豈問其人賢否果能為國為民哉及其敗也相推入禍門而已聾俗無知諂祭非鬼無異也䂬溪感事門三山語録登慈恩寺塔詩譏天寶時事也山者人君之象秦山忽破碎則人君失道矣賢否自混淆而清濁不分故曰涇渭不可求天下無綱紀文章而上都亦然故曰俯視但一氣焉能辨皇州於是思古之聖君不可得故曰回首呌虞舜蒼梧雲正愁是時明皇方耽於滛樂而不已故曰惜哉瑶池飲日宴崑崙丘賢人君子多去朝廷故曰黄鵠去不息哀鳴何所投惟小人貪竊禄位者在朝故曰君㸔隨陽雁各有稻粱謀同上西清詩話云退之宿龍宫灘詩云浩浩復湯湯灘聲抑更揚黄魯直曰退之才聽水句尤見工謂浩浩湯湯抑更揚者非諳客裏夜卧飽聞聲安能周旋妙處如此耶漁隠叢話東坡云南澗中詩秋氣集南澗獨遊亭午時回風一蕭瑟林影久参差始至若有得稍深遂忘疲羈禽響幽谷寒藻舞清漪去國魂已游懐人涙空垂孤生易為感失路少所宜索寞競何事徘徊只自知誰為後來者當與此心期柳儀曹詩憂中有樂樂中有憂盖絶妙古今矣然老杜云王侯與螻蟻同盡隨丘墟儀曹何憂之深也蔡寛夫詩話云子厚之貶其憂悲憔悴之欲發於詩者特為酸楚而已傷志固君子所不免然亦何至是卒以憤死未為達理也樂天既遇閑放浪物外若真能脫屣軒冕者然榮辱得失之際銖銖校量而自矜其達每詩未嘗不着此意是豈真能忘之者哉亦能勝之耳惟淵明則不然觀其貧士責子與其他所作當憂則憂遇喜則喜忽然憂樂兩忘則隨所遇而皆適未嘗有擇於其間所謂超世遺物者要當如是而後可也觀三人之詩以意逆志人豈難定以是論賢不肖之實亦何可乎隠居詩話云樂天題海圖屏風詩畧曰或者不量力謂兹鼇可求贔屭牽不動綸絶沉其鈎一鼇既頓頷諸鼇齊掉頭噴風激飛亷鼔波怒陽秋遂使江漢水朝宗意亦休吾讀此詩感劉隗李訓薛文通等事為之太息老杜所以為人稱慕者不獨文章為工盖其語黙所主君臣之外非父子兄弟即朋友黎庶也嘗觀韋應物詩及兄弟者十之二三廣陵覲兄放情且為歡累日不知饑冬至寄諸弟云已懐時節感更抱别離酸元日寄諸弟云日月昧逺期念君何時歇社日寄云遥思里中會心緒恨微微寒食聨騎定何時吾今顔已老又云把酒㸔花想諸弟杜陵寒食早青青初秋寄云髙梧一葉下空齋歸思多聞蟬寄諸弟云緘書報是時此心方耿耿登郡樓寄諸季云上懐犬馬戀下有骨肉情凡觀此集者雖讒䦧交瘉當一變而怡怡也黄常明詩話總龜後集巻二十一欽定四庫全書詩話總龜後集巻二十二宋阮閱撰用事門臨川慷慨秋風起悲歌不爲鱸眉山不須更說知㡬早直爲鱸魚也兩賢反復曲折同歸一意亦如把酒祝公公莫拒緇衣心爲好賢傾我欲折繻留此老緇衣誰作好賢詩共用一事而造語居然不同䂬溪臨川道德文章吾事落南華夫子盍行邪無落吾事乃栁詩有惆悵樵漁事今還又落然恐亦用此同上杜心迹喜雙清茶瓜留客遲似非用事觀靈運齋中詩云矧乃歸山川心迹雙寂寞竟陵王子良禮才好士夏月客至爲設瓜飲甘果二詩蓋用此至若椶拂子云咂膚倦撲滅頼爾甘伏膺雖等閒題目無字無出處同上坡集有全篇用事者如賀人生子自鬱葱佳氣夜充閭喜見徐卿第二雛我亦從来識英物試教啼看定何如戲子野買妾自錦里先生自笑狂身長九尺鬢眉蒼平生謬作安昌客畧遣彭宣到後堂句句用事曷嘗不流便哉同上嘗觀臨川詠棗止數韻餘甘入鄰家尚得饞婦逐贄享古巳然豳詩自宜錄用女贄棗脩八月剝棗雖云食之昏用蔚宗棗膏昏䝉䝉願比赤心投皇明倘加燭用蕭琛陛下投臣以赤心臣敢不報以戰栗以是知凡作者須飽材料傳稱任昉用事過多屬辭不得流便余謂昉詩所以不能傾沈約者乃才有限非用事之過同上李商隠詩好積故實如喜雪云班扇慵裁素曹衣詎比麻鵞歸逸少宅鶴滿令威家又洛水妃虚妬姑山女謾誇聨辭雖許謝和曲本慙巴一篇中用事者十七八同上夢得詩只恐鳴騶催上道不容待得晚菘嘗乃周彦倫答文惠太子問山中菜食云春初早韭秋末晚菘此以兩字用事者送熊判官云臨軒弄郡章得人方付此乃用漢髙弄印兒寛事此一字用事者黄常明韋應物詩心同野鶴與塵逺詩似氷壺徹底清又雜言送人云氷壺見底未爲清少年如玉有詩名此可爲用事之法蓋不拘故常也同上甫宜春苑詩云無復増脩事君王惜費金乃暗用漢文惜百金之産而罷露臺事同上沈慶之謂上曰爲國譬如治家耕當問奴織當問婢陛下欲治國而與白面書生謀之事何由濟夢得送李䇿云春風深日静争長幽鳥鳴僕夫前致辭門有白面生同上坡藍尾忽驚新火後遨頭要及浣花前注及樂天三杯藍尾酒一楪膠牙餳觀長慶集此詩題云七年元日對酒非鑽火時事也宋文景守歳云且盡燈前藍尾杯䂬溪師曠釋絳縣老人年數云亥有二首六身蓋離拆亥字㸃畫而上下之如算籌縱横然則下其二首為二萬六身各一縱一横為六千六百六十正合其甲子之日數傳以明曠之博物劉賓客送人赴絳州云午橋羣吏散亥字老人迎義山贈絳臺老驛吏云過客不勞詢甲子惟書亥字與時人可謂善使事矣亦如近詩送人洪州云干斗氣沈人巳化置芻人去榻猶懸送人鄂州云黄鶴晨霞傍樓起頭陀青草繞碑荒送人襄陽云四葉表閭唐尹氏一門逃世漢龎公雖鄰封宻邇不可移也䂬溪凡作詩有用事出處有造語出處如五陵衣馬自輕肥雖出論語總合其語乃潘岳裘馬悉輕肥栁絮才髙不道鹽雖謝女事乃借張融以海賦示人人評其賦但不道鹽耳紅袖泣前魚本戰國事其語乃陸韓卿中山王孺子妾歌安陵泣前魚坡作太白畫像詩云大兒汾陽中令君小兒天台坐忘身其事乃用白交汾陽於行伍中竟脫白於禍天台司馬子微謂白有仙風道骨可與神遊八極之表所造之語乃禰衡傳云大兒孔文舉小兒楊徳祖同上坡遊武昌見農夫皆騎秧馬較之傴僂而作者勞佚相絶嘗作秧馬歌叙述甚詳唐子西至羅浮始識此器作詩云擬向明時受一㕓著鞭常恐老農先行藏巳問吾家舉從此馳名四十年亦巧於用事黄常明坡和栁子玉暨景純岡字韻詩至七篇云屢把鉛刀齒步光更遭華衮照厖凉乃用子建七啓云步光之劍華藻繁縟左傳厖凉冬殺雖第一韻衆人所更易而七篇未嘗改又貫穿精絶如此同上東坡在儋耳時余三從兄延始之自江陰擔簦萬里絶海往見留一月坡嘗誨以作文之法曰儋州雖數}
