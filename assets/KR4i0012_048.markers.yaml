  - {type: variant, offset: 3599, length: 1, content: 䴡, WYG: 巻寘之大藏所以傳佛心印作將來眼所補大矣樂天詩詞其間何所不有而寘大蔵何耶東都聖善寺蘇州南禪院各有之自且著集序李公埀作詩美之曰永添鳴寶集莫雜大乗經所謂盗憎主人者耶又觀題文集櫃云身是鄧伯道世無王仲宣只應公付女㽞與外甥傳於是後名亦大孜孜矣同上大觀中吳興郡有邵宗益者剖蚌將食中有珠現羅漢像偏􅃝右肩矯首左顧衣綾畢具僧俗創見遂奉以歸慈感寺之臨溪流建炎間憲使楊應誠與客傳玩之次不覺越檻躍入水中亟禱佛求之於烟波渺茫之中一索而獲噫亦異矣葉少藴有詩云九淵幽怪舞垂涎㳺戯那知我獨尊應迹不辭從異類藏身何意戀窮源歸來自說龍宫化久住方知鷲嶺存此話須逢老摩話員通無碍本元門曽公衮云不知一壳幾由旬能納須彌不動尊疑是吳興清霅水直通方廣古靈源月沉濁水圓明在蓮出汙泥實性存隱現去來初一致莫將虛幻㸃空門一時名公和篇甚衆今藏慈感寺同上有唐中葉浮屠中有四澄觀架支提以舍僧伽者洛中之澄觀也故退之元和五年為洛陽令與之詩云火燒水轉掃地空突凢便髙三百尺洛陽窮秋厭窮獨丁丁啄門疑啄木有僧來訪呼使前伏犀揷腦髙頬顴者也參元名大師為華嚴䟽主譯經潤文者㑹稽之澄觀也敕裴休為其塔銘云元和五年授僧紇印歴九宗聖世為七帝門師俗壽二百二者也傳燈録有鎮國大師澄觀荅皇太子問心要有心心作佛無一心而非佛心處處成道無一塵而非佛國之句所造超詣豈若前二澄觀有金植福筭沙窮海者之比哉又有曹溪别出第二世五䑓山華嚴澄觀大師旣有華嚴二字又有無名禪法詞之言似即㑹稽澄觀然續云無機縁語句可録則又非也金光明經載流水長者子以象負水救十千魚生忉利天可謂悲濟之極報騐之速矣厥後現於記傳有放䗫得金放龜得印者其類甚多遂使上機生元縁之慈下士冀有因之果皆流水長子之慈意余居泛金溪上暇日率同志拏小舟載魚鼈蝦蟹命五比丘誦寶勝佛名若十二因縁法作梵唄捨之溪中坐間有請作詩以紀一時之事者余輒為書云漁師竟日漁水族作斤賣小捐使鬼兄滿載獲鱗介鯤鯨未易羅所得亦殊態青蛙盡公私朱鮪兼小大霜鱸尚貫針土負或粘塊輪囷積文螺郭索走蒼蠏濕珠相呴濡自分煑姜芥豈知惻隱人規作江湖貸因呼小青翰放溜舞澎湃跌坐延黒衣號佛指青瀬經翻流水篇梵起魚山唄傾盆帶寒藻圉圉看于邁驚疑或依蒲喜濯或生喝快若鷹辭鞲歡如囚破械定非校人池恐是餘不𣲖願汝藉佛力永脱鈎網債口腹聊爾耳香餌莫渠愛並同上詩話總龜後集巻四十五欽定四庫全書詩話總龜後集巻四十六宋阮閲撰釋氏門韋應物奉訓處士叔詩云高齋樂宴罷清夜道相存東坡次王鞏韻云那能廢詩酒亦未妨禪寂子由春盡詩云楞嚴十巻幾廽讀法酒三升是客同道貴冲寂宴主歡暢二者恐不能相兼也白樂天延樂命釂之時不忘於佛事至今逹者譏之葛常之衡州花光仁老以墨為梅花魯直觀之嘆曰如嫩寒春曉行孤山籬落間但欠香耳余因為賦長短句曰碧瓦籠晴香霧繞水殿西偏小駐聞啼鳥風度女墻吹語笑南枝破臘應開了道骨不凢江瘴曉春色通靈醫得花多少抱甕釀寒春杳杳譙門畫角催殘照又曰入骨風流國色透塵種性真香為誰風鬂涴啼粧半樹水村春漲雪壓低枝籬落月高影動池塘髙情數筆寄㣲茫小寢初開霧帳前蝶戀花後西江月也冷齋夜話余自并州還故里舘延福寺寺前小溪風物類斜川余兒童時戱劇之地也嘗春深獨行溪上作小詩曰小溪倚春漲攘我夜月灣新晴為不平約束晩見還銀梭時撥剌破碎波中山整釣背落日一葉嫩紅間又嘗莫寒歸見白鳥作詩曰剰水殘山慘淡間白鷗無事小舟閑個中着我添圖畫便是華亭落照灣魯直曰觀君詩說烟波漂渺處如陸忠州論國政字字切實前身非篙師沙户種類邪有詩其畧云五年六十子方半槁項頂螺忘嵗年脫却衲衣着蓑笠來伴澹翁刺釣船嘗對淵材誦之淵材曰此退之澄觀我欲收歛加冠巾换骨句也冷齋夜話余還自珠崖舘于髙安大愚山陳瑩中自台州載其家來漳浦過九江愛廬山因家焉以書督余兼程來余以三日至湓城瑩中曰自此公可禁作詩無益於事余曰敬奉教然余兒時好食肉母使持齋余叩頭乞先飯餐肉一日母許之今日當准食肉例先吟兩詩喜吾二人死而更生何如瑩中許焉曰鴈蕩天台看不足盡般兒女寄蓬窻徃來漳水謀二頃偶愛廬山家九江名節適真如醉白生涯領畧似襄龎向來萬事都休理且聽樓鐘宴夜撞與公靈鷲曾聽法㳺戱人間知幾生夏口甕中藏畫像孤山月下認歌聲翳消已覺境無滯礦盡方知珠自明數抹夕陽殘雨外一畨飛絮滿江城瑩中喜而謂余曰此岐山猪肉雖羙無食後三年余客漳水見瑩中姪勝柔自九江來出詩示余曰仁者難逢思有常平居慎勿恃何妨争先世路機關惡近後語言滋味長可口物多偏作疾快心事過必為傷與其病後求良藥不若病前能自防余謂勝柔曰公痴詩如食鯽魚惟恐遭骨刺與岐山猪肉不可同日而語也冷齋夜話陳瑩中謫合浦時余在長沙以書抵余為負華嚴經入嶺有偈曰大士㳺方興盡囬家山風月絶纎埃杖頭多少閑田地挑取華嚴入嶺來余和之曰因法相逢一笑開俯看人世過飛埃湘南嶺外休分别圓寂光中共往來又聞嶺外大雪作二偈寄之曰傳聞嶺外雪壓倒千年樹老兒拊手笑有眼未曾覩故應潤物材一洗瘴江霧寄語牧牛人莫教頭角露又曰偏界不曾藏處處光皎皎開眼失蹤由都縁太分曉園林忽生春萬瓦粲一笑遥知忍凍人未悟安心了冷齋夜話余觀誌公十二時頌自非深悟上乗同佛知見豈能作此語也是時逹磨猶未西來誌巳明此理所謂先得我心之所同然者誌公沒於天鍳十三年而逹摩以普通八年至金陵由此之魏傳佛心印禪宗方興近世學佛者往徃忽此頌而弗觀盖貴耳而賤目矣余嘗手書此頌置之座右朝夕味之尤愛其最後一首云雞鳴丑一顆圓珠明巳久内外推尋覔摠無境上施為渾大有不見頭又無手世界壞時終不朽未了之人聽一言只這如今誰動口以至三祖信心銘永嘉証道歌皆禪學之髓初地之人其可弗觀乎苕溪漁隱陳體常荅黄晃仲二書叙學佛之㫖深切著明余嘗三復其言歎其有理恨未能盡行也體常又有頌六首今録二首其一云宻坐研窮有細㣲到頭湏是自忘機應無祖佛能超越豈有寃親更順違歴歴孤明猶認影巍巍獨霧尚披衣飜嗟㑹得照靈者也道尋師未肯歸其二云個中端的有誰知知者歸來到者稀即見即聞還錯㑹離聲離色轉乖違山青水緑明𤣥㫖鶴唳猿啼顯妙機有意覔渠終不遇無心到處盡逢伊冷齋夜話云陳瑩中北歸過南昌言鄒志克在韶州極精進閉門誦華􅃊經舍利生䄂間此真入信位日誦華嚴於觀音像前有脩竹三根生像之後志完謁茒出之不可乃埀枝覆像如世所畫寶陁嚴竹今猶無恙韶人扄鎻之以為過客逰觀北還至永州淡山岩有􅀈狐凢貴客至則鳴志完將至而狐輙鳴寺僧出迎之完怪之僧以狐鳴為言志完作詩曰我入幽居亦偶然初無消息與人傳􅀈狐戱學仙伽客一夜飛鳴報老襌苕溪漁隱余讀劉興朝悟道經真集其言曰余少治儒術長登仕版盖未嘗信佛也三十有二嵗見東林長老緫公與之語七日遂生信焉即取其書讀之三年盖恨其信之之晩也然循其理而體㑹則似悟還迷依其法而行持則暫靜還擾既而閱傳燈録始知佛有法眼妙心宻相付嘱而逹摩西來單傳此事衆生悟者可以見性而了心其後發明此事但覺境界非常取証道歌讀之句句盡是吾之心地讀至六般神用空不空一顆圓光色非色如是希竒之事吾今已得現前任是千聖出來已須退步始得示人以偈曰世間多少英靈漢終是迷人唤人唤可憐眼底黒漫漫不見驪珠光燦爛過今晡又來旦不覺年華暗中换急抬頭高著眼徑寸不容蚌中産靈利男兒薦得時好笑交渠膓欲斷又詩云今士堂堂此事同歸因處處獲圓通片心豁去滄溟窄䨇眼開來宇宙空出海銀蟾光動地離弦金簇疾追風須知佛祖埋藏後坐斷千差是此翁苕溪漁隱詩話總龜後集巻四十六欽定四庫全書詩話總龜後集巻四十七宋阮閲撰麗人門銅雀伎古人賦詠多矣鄭愔云舞餘依帳泣歌罷向陵看張正見云雲慘當歌日松吟欲舞風賈至云靈几臨朝奠空牀巻夜衣王勃云妾本深宫妓層城閉九重君王歡愛盡歌舞為誰容沈佺期云昔年分食鼎今日望陵臺一旦雄圖盡千秋遺令開皆佳句也羅隱云強歌强舞竟難勝花落花開涙滿繒秪合當年伴君死免教憔悴望西陵似比諸人差有意也魏武隂賊險狠盗有神器實竊英雄之名而臨死之日乃遺令諸子不忘於葬骨之地又使伎人看銅雀臺上以歌舞其魂亦可謂愚矣東坡云操以病亡子孫滿前而咿嚶涕泣留連妾媍分香賣履區處衣物平生姦偽死見真性真名言哉葛常之人君不能制欲於媍人以至溺惑廢政未有不亂亡者桀奔南巢禍階妹喜魯威末國惑始齊姜妲巳褒姒以至楊妃張孔之徒皆是也吳於西施王之耽惑不减於諸后一夕越兵至而王不知也鄭毅夫詩云十重越甲夜城圍燕罷君王醉不知若論破兵功第一黄金只合鑄西施謂非西施則吳不亡吳不亡則安得以黄金而鑄其容哉東坡范蠡詩云誰將射御教吳兒長笑申公為夏姫却遣姑蘇有麋鹿更令夫子得西施言楚申公欲弱楚而强吳者以夏姫之故曾不如范蠡滅吳覇越而坐得西施也同上韓康公上元召從官諸人令家妓侍飲其專寵者曰魯生偶中蜂螫少頃持扇向東坡乞詩詩中有魚吹細浪歌揺日舞罷花枝蜂入懷之句上句記姓下句記事侯鯖録東坡嘗飲一豪士家出侍姫十餘人皆有姿伎其間有一善舞者名媚兒容質雖麗而軀幹甚偉豪士特所寵愛命乞詩於公公戱為四句云舞䄂褊􅝆影揺千尺龍蛇動歌喉宛轉聲撼半天風雨寒妓赧然不悦而去遯齋閑覽王晉卿都尉既䘮蜀國貶均州姫侍盡逐有一麗者號囀春鶯色藝兩絶平居属念未知流落何許後二年内徙汝隂道過許昌市傍小樓聞泣聲甚悲晉卿異之聞乃囀春鶯也恨不可復得因賦一聯佳人巳属沙吒利義士今無古押衙晉卿每話此事客有足成章者晉卿賢之猶愴然其詞曰幾年流落向天涯萬里歸來兩鬂華翠䄂香殘空浥涙青樓雲渺定誰家佳人巳属沙吒利義士今無古押衙囬首音塵兩沉絶春鶯休囀沁園花西清詩話蔡持正謫新州侍兒名琵琶嘗養一鸚鵡持正每呼琵琶即扣一響板鸚鵡傳言呼之琵琶卒後悞觸響猶傳言呼之持正感傷成疾不起嘗為詩云鸚鵡言猶在琵琶事巳非傷心瘴江水同渡不同歸苕溪漁隱曰持正守安州夏日登車盖作十絶句為吳處厚箋注得罪謫新州其間一絶云紙屏石枕竹方牀手倦抛書午夣長睡起莞然成獨笑數聲漁笛在滄浪殊有閒適自在之意侯鯖録囬紋兩續必徧獨此五詩不然其一曰紅窻小泣低聲怨永日春寒斗帳空中酒落花飛絮亂曉鶯啼破夢匆匆其二曰同誰更倚閒窻綉落日紅飛小院深東復西流分水嶺恨兼愁續斷弦琴其三曰寒信風飄霜葉黄冷燈殘月照空牀看君寄憶囬紋錦字字縈愁冩斷膓其四曰前堂畫燭殘凝涙半夜清香舊染衾烟鎻竹枝寒宿鳥水沉天色霽横參其五曰娥翠歛時聞燕語涙珠彈處見鴻歸多情妾似風花亂薄倖郎如露草希漫叟詩話曾子宣夫人魏氏作虞羙人草行云鴻門玉斗紛如雪十萬降兵夜流血咸陽宫殿三月紅覇業已隨烟燼㓕剛强必死仁義王陰陵失路非天亡英雄本學萬人敵何用屑屑悲紅粧三軍散盡旌旗倒玉帳佳人坐中老香魂夜逐劒光飛青血化為原上草芳心寂寞寄寒枝舊曲聞來似歛眉哀怨徘徊愁不語恰如愁聽楚歌時滔滔逝水流今古漢楚興亡两坵土當年遺事乆成空慷慨罇前為誰舞苕溪漁隱曰此詩乃許彥國表民作表民合肥人余昔隨侍先君守合肥嘗借得渠家集集中有此詩又合肥老儒郭全羙乃表民席下舊諸生云親見渠作此詩今曾端伯編選亦列此詩於表民詩中遂與余所見所聞合覽者可以無疑亦知冷齋之妄也冷齋夜話費氏蜀之青城人以才色入蜀宫後主嬖之號花蕊夫人效王建作宫詞百首國亡入備後宫太祖聞之召使陳詩誦其國亡詩云君王城上竪降旗妾在深宫那得知十四萬人齊解甲寧無一個是男兒祖悅蓋蜀兵十四萬而王師纔數萬爾後山詩話僕七歳時見眉州老尼姓宋忘其名年九十餘自言嘗隨其師入蜀主孟昶宫中一日大熱蜀主與花蕊夫人夜起避暑摩訶池上作一詞宋具能記之今四十年來巳死矣人無知此詞者獨記其首兩句云氷肌玉骨自清凉無汗暇日尋味豈洞仙歌令乎乃為足之云苕溪漁隱曰漫叟詩話所載本事曲云錢塘一老尼能誦後主詩首章兩句與東坡洞仙歌序全然不同當以序為正也東坡洞仙歌序楊元素作本事曲記洞仙歌氷肌玉骨自清凉無汗水殿風來暗香滿繡簾開一㸃明月窺人人未寢欹枕釵横鬂亂起來携素手庭戸無聲時見踈星渡河漢試問夜如何夜巳三更金波淡玉繩低轉細屈指西風幾時來又不道流年暗中偷换錢唐有一老尼能誦後主詩首章兩句後人為足其意以填此詞余嘗見一士人誦全篇云氷肌玉骨清無汗水殿風來暗香暖簾開明月獨窺人欹枕釵横雲鬢亂起來瓊戸時見踈星渡河漢屈指西風幾時來只恐流年暗中换漫叟詩話太和初有為御史分務洛京者有妓善歌時太尉李逢吉留守求一見既不敢辭盛粧以往李命與衆姬相見李姬四十餘軰皆出其下既入不復出頃之李亦辭以疾遂罷坐信宿耗絶但恐歎不能巳已為詩两篇投獻明日李但含笑曰大好詩遂絶詩曰三山不見海沉沉豈有仙踪尚可尋青鳥去時雲路斷姮娥歸去月宫深紗窻暗想春相憶書幌誰令夜獨吟料得此時天上月只應偏照兩人心一篇亡苕溪漁隱曰余觀劉賓客外集有憶妓四首内有一首即前詩也其餘三首亦是前詩之意也古今詩話中既不云御史姓名則此詩豈非夣得為之假手乎古今詩話何彼穠矣之詩羙王姫而作也周姫姓故皇女皆稱姬如陳媯楚芊齊姜之類是也後世凢婦人皆稱姬誤矣南朝人士皆謂姫人如蕭綸見姫人詩所謂狂夫不妬妾隨意早還家劉孝綽詠姬人未出詩所謂帷開見釵影簾動聞釧聲梁王僧孺為姫人怨詩所謂還君與妾扇歸妾與君裘江摠為姬人怨服藥詩所謂妾家邯鄲好輕薄持忿仙童一丸藥是也丹陽集後山詩話退之詩云長安衆冨兒盤饌羅羶葷不能文字飲惟解醉紅裙而老有二妓號綘桃桞枝故文昌張藉云為出二侍女合彈琵琶筝也又為李千志叙當世名貴服金石藥欲生而死者數軰著之石藏之地下豈為一世戒邪而竟以藥死故白樂天云退之服硫黄一病竟不痊也䂬溪唐語林退之二侍妾一曰綘桃二曰桞枝皆能歌舞初使王庭湊至壽陽驛絶句云風光欲動别長安春半邊城特地寒不見園桃并巷桞馬頭惟有月團圓蓋寄意二姝逮歸桞枝踰垣遁去家人追獲故鎮州初歸詩云别來楊桞汀頭樹擺亂春風只欲飛惟有小園桃李在留花不發待郎歸自是專寵綘桃矣䂬溪詩話總龜後集巻四十七欽定四庫全書詩話總龜後集巻四十八宋阮閲撰麗}
