  - {type: variant, offset: 3596, length: 0, content: '', WYG: 異耶苕溪漁隠曰歐陽永叔嘗新茶詩云年窮臘盡春欲動蟄雷未起驅龍蛇夜聞擊鼓滿山谷千人助呌聲喊呀萬朩寒癡睡不醒惟有此樹先萌芽余官富沙凡三春備見北苑造茶但其地暖纔驚蟄茶芽長已寸許初無擊鼓喊山之事永叔詩與文昌所紀皆非也北苑茶山凡十四五里茶味惟均亦豈有間壟茶品巳相逺之說耶歐公和劉原父揚州時會堂絶句云積雪猶封䝉頂樹驚雷未發建溪春中州地暖萌芽早入貢宜先百物新注云時會堂造貢茶所也余以陸羽茶經考之不言揚州出茶惟毛文錫茶譜云揚州禪智寺隋之故宫寺枕蜀岡其茶甘香味如䝉頂焉第不知入貢之因起於何時故不得而誌之也苕溪漁隱東坡汲江水煎茶詩云活水還須活火烹自臨釣石取深清大瓢貯月歸春甕小杓分江入夜瓶此詩竒甚道盡烹茶之要且茶非活水則不能發其鮮馥東坡深知此理矣余頃在富沙嘗汲溪水烹茶色香味俱成三絶又况其地産茶爲天下第一宜其水異於他處用以烹茶水功倍之至於浣衣尤更潔白則水之輕清益可知矣近城山間有陸羽井水亦清甘實好事者爲名之羽著經言建州茶未得詳則知羽不曽至富沙也同上建安北苑茶始於太宗太平興國二年遣使造之取象於龍鳳以别庶㡬由此入貢至道間仍添造石乳其後大小龍茶又起於丁謂而成於蔡君謨謂之轉漕閩中實董其事賦北苑焙新茶詩其序云産茶者將七十郡毎歳入貢皆以社前火前爲名悉無其實惟建州出茶有焙焙有三十六三十六中惟北苑先發而味尤佳社前十五日即採其芽日數千工聚而造之逼社即入貢工甚大造甚精皆載於所撰建安茶錄仍作詩以大其事云北苑龍茶者甘鮮的是珍四方惟數此萬物更無新纔吐微茫緑初沾少許春散尋縈樹遍急採上山頻宿葉寒猶在芳芽冷未伸持将溪口焙伇用雨中民長疾勾萌拆開齊分兩均帶烟蒸雀舌和露疊龍鱗貢作勝諸道先嘗祇一人緘封瞻闕下郵傳渡江濱特㫖留丹禁殊恩賜近臣啜宜靈藥助用與上樽親頭進英華盡初烹氣味醇細香勝却麝淺色過於筠顧渚慙投朩宜都愧積薪年年號供御天産壯甌閩此詩叙貢茶頗爲詳盡亦可見當時之事也又君謨茶錄序云臣前因奏事伏䝉陛下諭臣先任福建轉運使日所進上品龍茶最為精好臣退念草朩之微首辱陛下知鑒若處之得地則能盡其材昔陸羽茶經不第建安之品丁謂茶圖獨論採造之事至於烹試曽未有聞輒條數字簡而易明勒成二篇名曰茶錄至宣政間鄭可簡以貢茶進用久領漕使創添續入其數浸廣今猶因之細色茶五綱凡四十三品形製各異共七千餘餅其間貢新試新龍團勝雪白茶御苑玉芽此五品乃水揀爲第一餘乃生揀次之又有粗色茶七綱凡五品大小龍鳳并揀芽悉入龍腦和膏為團餅茶共四萬餘餅東坡題汶公詩巻云上人問我留連意待賜頭綱八品茶即今粗色紅絹袋八品者是也蓋水揀茶即社前者生揀茶即火前者粗色茶即雨前者閩中地暖雨則茶已老而味加重矣山谷和楊王休㸃宻雲龍詩云小璧雲龍不入香元豐龍焙承詔作今細色茶中却無此一品也又有石門乳吉香口三外焙亦糴於北苑皆採摘茶芽送官焙添造毎歳糜金共二萬餘緍日役千夫凡兩月方能訖事第所造之茶不許過數入貢之後市無貨者人所罕得惟壑源諸處私焙茶其絶品亦可敵官焙自昔至今亦皆入貢其流販四方悉私焙茶耳蘇黄皆有詩稱道壑源茶蓋壑源與北苑爲鄰山阜相接才三里餘其茶甘香特在諸私焙之上東坡和曹輔寄壑源試焙新芽詩云仙山靈雨濕行雲洗遍香肌粉未勻明月来投玉川子清風吹散武林春要知玉雪心腸好不是膏油首面新戲作小詩君一笑從来佳茗似佳人山谷謝送碾賜壑源揀芽詩云矞雲從龍小蒼璧元豐至今人未識壑源包貢第一春御奩碾香俱玉食睿思殿中金井欄甘露薦椀天開顔橋山事嚴庀百局衮司諸公省中宿中人傳賜夜未央雨露恩光照宫燭右丞似是李元禮好事風流有涇渭肯憐天祿校書郎親敕家庭遣分惠春風飽食大官羊不慣腐儒湯餅腸搜攪十年燈火讀令我胸中書傳香巳戒應門老馬走客来問字莫載酒苕溪漁隠建州陸羽茶經尚未知之但言福建等十二州未詳往往得之其味極佳江右近日方有蠟面之號李氏别令取其乳作片或號曰京挺的乳及骨子等毎歳不過五六萬斤迄今歳出三十餘萬斤凡十品曰龍茶鳳茶京挺的乳石乳白乳頭金蠟面頭骨次骨龍茶以供乗輿及賜執政親王長主餘皇族學士將帥皆得鳳茶舍人近臣賜京挺的乳館閣賜白乳龍鳳石乳茶皆太宗令造江右有研膏茶供御即龍茶之品也丁謂為北苑茶錄三巻備載造茶之妙未行於世談苑唐茶惟湖州紫筍入貢每歳以清明日貢到先薦宗廟然後分賜近臣紫筍生顧渚在湖常二境之間當採茶時兩郡守畢至最爲盛集此蔡寛夫詩話之言也蔡但知其一而不知其二按陸羽茶經云浙西以湖州上常州次湖州生長城縣顧渚山中常州生義興縣君山懸脚嶺北峯下唐義興縣重修茶舍記云義興貢茶非舊也前此故御史大夫李栖筠實典是邦山僧有獻佳茗者會客嘗之野人陸羽以爲芬香甘辣冠於他境可薦於上栖筠從之始進萬兩此其濫觴也厥後因之徴獻浸廣遂為任土之貢與常賦之邦侔矣故玉川子詩云天子須嘗陽羨茶百草不敢先開花正謂是也當時顧渚義興皆貢茶又鄰壤相接白樂天守姑蘇聞賈常州崔湖州茶山境會想羨歡宴因寄詩云遥聞境會茶山夜珠翠歌鍾俱遶身盤下中分兩州界燈前合作一家春青娥遞舞應争妙紫筍齊嘗各鬭新自歎花時北窓下蒲黄酒對病眠人唐袁髙為湖州刺史因修貢顧渚茶山作詩云禹貢通逺俗始圖在安人後王失其本職吏不敢陳亦有姦佞者因兹欲求伸動生千金費日使萬姓貧我来顧渚源得與茶事親黎氓輟耕農採掇實苦辛一夫且當役盡室皆同臻捫葛上欹壁蓬頭入荒榛終朝不盈掬手足皆鱗皴悲嗟遍空山草朩為不春隂嶺芽未吐使曹牒巳頻心争造化先走鋌麋鹿均選納無日夜𢷬聲昏繋晨衆功何拮据俯視彌傷神皇帝尚巡狩東郊路多堙周回繞天涯所獻惟艱勤况減兵革用兼兹困疲民未知供御餘誰合分此珍顧省忝邦守有慙復因循茫茫滄海間丹憤何由申此詩雅得詩人諷諫之體誠可尚也苕溪漁隠玉川子有謝孟諫議惠茶歌范希文亦有鬭茶歌此二篇皆佳作也殆未可以優劣論然玉川歌云至尊之餘合王公何事便到山人家而希文云北苑將期獻天子林下雄豪先鬭美若論先後之序則玉川之言差勝雖然如希文豈不知上下之分者哉亦各賦一時之事耳苕溪漁隠曰藝苑以此二篇皆佳作未可優劣論今並全錄余謂玉川之詩優於希文之歌玉川自出胸臆造語穏貼得詩人之句法希文排比故實巧欲形容宛成有韻之文是果無優劣耶玉川走筆謝孟諫議寄新茶云日髙丈五睡正濃軍將打門驚周公傳云諫議送書信白絹斜封三道印開緘宛見諫議面手閱月團三百片聞道新年入山裏蟄蟲驚動春風起天子須嘗陽羨茶百草不敢先開花仁風暗結珠琲瓃先春抽出黄金芽摘鮮焙芳旋封裹至精至好且不奢至尊之餘合王公何當便到山人家柴門反關無俗客紗帽挂頭自煎喫碧雲引風吹不斷白花浮光凝椀面一椀喉吻潤兩椀破孤悶三椀搜枯腸惟有文字五千巻四椀發輕汗平生不平事盡向毛孔散五椀肌骨清六椀通仙靈七椀喫不得也惟覺兩腋習習清風生蓬莱山在何處玉川子乗此清風欲歸去山上羣仙司下土地位清髙隔風雨安得知百萬億蒼生命墮在巔崖受辛苦便為諫議問蒼生到頭合得蘇息否希文和章岷從事鬭茶歌云年年春自東南来建溪先暖水微開溪邊竒茗冠天下武夷仙人從古栽新雷昨夜發何處家家嬉笑穿雲去露芽錯落一番榮綴玉含珠散嘉樹終朝採掇未盈襜惟求精粹不敢貪研膏焙乳有雅製方中圭兮圓中蟾北苑將期獻天子林下雄豪先鬭美鼎磨雲外首山銅瓶攜江上中􅍽水黄金碾畔緑塵飛碧玉甌中翠濤起鬭茶味兮輕醍醐鬭茶香兮薄蘭芷其間品第胡能欺十目視而十手指勝若登山不可扳輸同降將無窮恥吁嗟天産石上英論功不愧階前蓂衆人之濁我可清千日之醉我可醒屈原試與招魂魄劉伶却得聞雷霆盧仝敢不歌陸羽須作經森然萬象中焉知無茶星商山老人休茹芝首陽先生休采薇長安酒價減千萬成都藥市無光暉不如仙山一啜好泠然便欲乗風飛君莫羨花間女郎只鬭草嬴得珠璣滿斗歸詩話總龜後集巻二十九欽定四庫全書詩話總龜後集巻三十宋阮閱撰詠茶門趙徳麟著因話錄載其家兵部君性尤嗜茶能自煎謂人曰茶須緩火灸活水煎坡有活水還須活火烹恐亦用此黄常明五代時鄭遨茶詩云嫩芽香且靈吾謂草中英夜臼和烟搗寒爐對雪烹維憂碧粉散常見綠花生最是堪珍重能令睡思清范文正公詩云黄金碾畔綠塵飛碧玉甌中翠濤起茶色以白爲貴二公皆以碧綠言之何邪三山老人語錄茶之佳品造在社前其次則火前謂寒食前也其下則雨前謂穀雨前也佳品其色白若碧綠者乃常品也茶之佳品芽蘖細微不可多得若此數多者皆常品也茶之佳品皆㸃啜之其煎啜之者皆常品也齊己茶詩曰甘傳天下口貴占火前名又曰髙人愛惜藏巖裏白甀封題寄火前丁謂茶詩曰開緘試新火須汲逺山泉凡此皆言火前蓋未知社前之品為佳也鄭谷茶詩曰入坐半甌輕泛綠開緘數片淺含香鄭雲叟茶詩曰維憂碧粉散常見綠花生沈存中論茶謂黄金碾畔綠塵飛碧玉甌中翠濤起宜改綠為玉翠為素此論可也而舉一夜風吹一寸長之句以爲茶之精美不必以雀舌鳥觜為貴今按茶至於一寸長則其芽葉大矣非佳品也存中此論曲矣盧仝茶詩曰開緘宛見諫議面手閱月團三百片薛能謝劉相公寄茶詩曰兩串春團敵夜光名題天柱印維揚茶之佳品珍踰金玉未易多得而以三百片惠盧仝以兩串寄薛能者皆下品可知也齊己詩角開香滿室爐動綠凝鐺丁謂詩曰芽細烹還好鐺新味更全此皆煎啜之也煎啜之者非佳品矣唐人於茶雖有陸羽爲之說而評論未精至本朝蔡君謨茶錄既行則持論精矣以茶錄而覈前賢之詩皆未知佳味者也同上唐以前茶惟貴蜀中所産孫楚歌云茶出巴蜀張孟陽登成都樓詩云芳茶冠六清溢味播九區他處未見稱者唐茶品雖多亦以蜀茶為重然惟湖州紫筍入貢毎歳以清明日貢到先薦宗廟然後分賜近臣紫筍生顧渚在湖常二境之間當採茶時兩郡守畢至最為盛會杜牧詩所謂溪盡停蠻棹旗張卓翠苔栁村穿窈窕桃澗渡喧豗劉禹錫何處人間似仙境春山攜妓採茶時皆以此建茶絶無貴者僅得挂一名爾至南唐李氏時漸見貴始有團圏之製而造作之精經丁晉公始大備自建茶出天下所産皆不復可數今其處壑源沙溪土地相去丈尺之間品味已不同謂之外焙况他處乎則知雖草朩之微其顯晦亦自有時然唐自常衮以前閩中未有讀書者自衮教之而歐陽詹之徒始出而終唐世亦不甚盛今閩中舉子常數倍天下而朝廷將相公卿毎居十四五人物尚爾况草朩微物也顧渚湧金泉毎造茶時太守先祭拜然後水漸出造貢茶畢水稍減至供堂茶畢巳減半太守茶畢遂涸蓋常時無水也或聞今龍焙泉亦然苕溪漁隠曰北苑官焙也漕司歳以入貢茶爲上壑源私焙也土人亦入貢茶為次二焙相去三四里間若沙溪外焙也與二焙相去絶逺自隔一溪茶爲下山谷詩云莫遣沙溪来亂真正謂此也官焙造茶常在驚蟄後一二日興工採摘是時茶芽巳皆一槍蓋閩中地暖如此舊讀歐公詩有喊山之說亦傳聞之訛耳龍焙泉即御泉也水之増減亦隨水旱初無漸出遂涸之異但泉水極甘正宜造茶耳蔡寛夫詩話蜀中數處産茶雅州䝉頂最佳其生最晚在春夏之交其地即書所謂蔡䝉旅平者也方茶之生雲霧覆其上若有神物護持之東齋紀事茶古不著所出本草云出益州唐以䝉山顧渚蘄門者爲上品尚雜以蘇椒之類故李泌詩云旋沫翻成碧玉池添蘇散出琉璃眼遂以碧色為貴止曰煎茶不知㸃試之妙大率皆草茶也陸羽茶經統言福建泉紹等十州所出者其味極佳而只今建安為天下第一遯齋閒覽鄭可簡以貢茶進用累官職至觀文殿修撰福建路轉運使其姪千里於山谷間得朱草可簡令其子待問進之因此得官好事者作詩云父貴因茶白兒榮為草朱而千里以從父奪朱草以予子譊譊不巳待問得官而歸盛集為慶親姻畢集衆皆贊喜可簡云一門僥倖其姪遽云千里埋寃衆皆以為的對是時貢茶一方騷動故也苕溪漁隠曰余觀東坡茘支歎注云大小龍茶始於丁晉公而成於蔡君謨歐陽永叔聞君謨進小龍團驚歎曰君謨士人也何至作此事今年閩中監司乞進鬭茶許之故其詩云武夷溪邊粟粒芽前丁後蔡相籠加争新買寵各出意今年鬭品充官茶則知始作俑者大可罪也髙齋詩話詩云誰謂荼苦爾雅云檟苦茶注樹似梔子今呼早采者爲茶晚采者為茗一名荈蜀人名為苦茶故東坡乞茶栽詩云周詩記苦荼茗飲出近世初緣厭粱肉假此雪昏滯蓋謂是也六一居士嘗新茶詩云泉甘器潔天色好坐中揀擇客亦佳東坡守維揚於石塔寺試茶詩云禪窓麗午景蜀井出氷雪坐客皆可人鼎器手自潔正謂諺云三不㸃也苕溪漁隠葉濤詩極不工而喜賦詠嘗有試茶詩云碾成天上龍兼鳳煑出人間蟹與蝦好事者戲云此非試茶乃碾玉匠人嘗南食也西清詩話唐相李衞公好飲惠山泉置驛傳送不逺數千里而近世歐陽少師作龍茶錄序稱嘉祐七年親享明堂致齋之夕始以小團分賜二府又給一餅不敢碾試至今藏之時熈寧元年也吾聞茶不問團餅要之貴新水不問江井要之貴活千里致水真僞固不可知縱令識真已非活水自嘉祐七年壬寅至熈寧元年戊申首尾七年更閱三朝而賜茶猶在此豈復有茶也哉苕溪漁隠曰壬午之春余赴官閩中漕幕遂得至北苑觀造貢茶其最精即氷芽細如針用御泉水研造社前巳嘗貢餘毎片計工直四萬錢分試其色如乳平生未嘗曽啜此好茶亦未嘗嘗茶如此之早也唐子西鬭茶記魯直諸茶詞余謂品令一詞最佳能道人所不能言尤在結尾三四句詞云鳳舞團團餅恨分破教孤冷金渠休浄隻輪慢碾玉塵光瑩湯響松風早減二分酒病味濃香永醉鄉路成佳境恰如燈下故人萬里歸来對影口不能言心下快活對省苕溪漁隠東坡詩春濃睡足午窓明想見新茶如潑乳又云新火發茶乳此論皆得茶之正色矣至贈謙師㸃茶則云忽驚午盞兔毫斑打作春甕鵞兒酒蓋用老杜詩鵞兒黄似酒對酒愛鵞兒若是則色黄烏得為佳茗矣今東坡全集不載此詩想自知其非故刪去之同上臘茶出於建劍草茶盛於兩浙兩浙之品日注為第一自景祐以後洪州雙井白芽漸盛近歳製作尤精囊以紅紗不過一二兩以常茶十餘斤養之用辟暑濕之氣其品逺出日注上遂為草茶第一苕溪漁隠曰醉翁又有雙井茶詩云西江水清江石老石上生茶如鳳爪窮臘不寒春氣早雙井芽生先百草白毛囊以紅碧紗十斤茶養一斤芽長安富貴五侯家一啜猶須三日誇蔡君謨好茗飲又精於藻鑒答程公闢簡云向得雙井四兩其時人還未識叙謝不悉尋烹治之色香味皆精好是為茗芽之冠非日注寶雲可並也涪翁尤譽雙井蓋鄉物也李公擇有詩誚之戲作解嘲云山芽落磑風回雪曽與尚書破睡来勿以姬姜棄憔悴逢時瓦釡亦鳴雷又答黄冕仲索煎雙井并簡王揚休詩云江夏無雙乃吾宗同舎頗似王安豐能澆茗椀前祓我風袂欲挹浮邱公吾宗落筆賞幽事秋月下照澄江空家山鷹爪是小草敢與拜賜雲龍同不嫌水厄幸来辱寒泉湯鼎聽松風同上世言團茶始於丁晉公前此未有也慶厯中蔡君謨為福建漕使更製小團以充歳貢元豐初年建州又製密雲龍以獻其品髙於小團而其製益精矣曽文韶所謂莆陽學士蓬莱仙製成月團飛上天又云宻雲新様尤可喜名出元豐聖天子是也唐陸羽茶經於建茶尚云未詳而當時獨貴陽羨茶歳貢特盛茶山居湖常二州之間修貢則兩守相會山椒有境會亭基尚存盧仝謝孟諫議茶詩云天子須嘗陽羨茶百草不敢先開花是已然又云開緘宛見諫議面手閱月團三百片則團茶巳見於此當時李郢茶山貢焙歌云蒸之馥馥香勝梅研膏轉動聲如雷茶神拜表貢天子萬人争喊春山摧觀研膏之句則知嘗為團茶無疑自建茶入貢陽羨不復研膏祇謂之草茶而巳葛常之昨夜夢參寥師攜軸詩見過覺而記其飲茶兩句云寒食清明都過了石泉槐火一時新夢中問火固新矣泉何故新答曰俗以清明淘井當續成詩以記其事東坡詩話總龜後集巻三十欽定四庫全書詩話總龜後集巻三十一宋阮閲撰格致門詩眼山谷言文章必謹布置毎見後學多言以原道命意曲折後予以此槩考古人法度如贈韋見素詩云紈袴不餓死儒冠多誤身此一篇立意故使人静聴而具陳之自甫昔少年日早充觀國賔致君堯舜上再使風俗淳皆儒冠事業也自此意竟蕭條至蹭蹬無縱鱗言誤身如此也則意舉而文備故巳有是詩矣然必言其所以贈韋者於是有厚愧真知之句所以真知者謂傳誦其詩也然宰相職在薦賢不當徒愛人而已士故不能無望故曰竊效貢公喜難甘原憲貧果不能薦賢則去之可也故曰焉能心怏怏秪是走踆踆又將去海而去秦也然其去也必有遲遲不忍之意故曰尚怜終南山囘首清渭濵則所知不可以不别故曰常懐報一飰况懐辭大臣夫如此是可以相忘於江湖之外雖見亦不可得而見矣故曰白鷗沒浩蕩萬里誰能馴終焉此詩前賢錄為壓巻盖布置最得正體如官府甲第㕔堂房室各有定處不可亂也韓文公原道與書之堯典如此其他皆謂之變體可也曲水脩禊之㑹人各賦詩成两篇者自右軍安石而下纔十一人成一篇者郗曇虞悦而下十五人詩不成罰觥者凡十六人今觀所傳詩數皆四言五言而又两類者两四韻者無幾四言二韻正十六字耳當時得預者往往皆知名士豈獻之軰終日不能措辭於十六字哉切意古人持重自惜不欲率爾恐貽乆逺譏議不如不賦之為愈黄常明白獻晉公云聞說風情䈥力在只如初破蔡州時雖叙其功業與夀康其語緩而不迫此可為作詩法也䂬溪省題詩自成一家非他詩比也首韻拘於見題則易於牽合中聫縳於法律則易於駢對非若遊戯於烟雲月露之形可以縱横在我者也王昌齡錢起孟浩然李商隐軰皆有詩名至於作省題詩則踈矣王昌齡四時調玉燭詩云祥光長赫矣佳號得温其錢起巨魚縱大壑詩云方快吞舟意尤殊在藻嬉孟浩然騏驥長鳴詩云逐逐懐良馭蕭蕭顧樂鳴李商隐桃李無言詩云夭桃花正發穠李蕊方繁此等句兒童無異以此知省題詩自成一家也丹陽集古辭云藁砧今何在山上復有山何當大刀頭破鏡飛上天藁砧砆也謂夫也山上有山出也大刀頭刀上鐶也破鏡言半月當還也此詩格非當時有釋之者後人豈能曉哉古辭又云圍碁燒敗襖着子故依然陸龜䝉皮日休固嘗擬之陸云旦日思雙履明時願早諧皮云莫言春繭薄猶有萬重思是皆以下句釋上句與藁砧異矣樂府觧題以此格為風人詩取陳詩以觀民風示不顯言之意至東坡無題詩云蓮子擘開須見薏秋枰着盡更無棊破衫却有重縫處一飯何曽忘却匙是文與釋並見於一句中與風人詩又小異矣丹陽集老杜歌行與長韻律詩後人莫及而蘇黄用韻下字用故事處亦古所未到晉宋間人造語題品絶妙今古近世蘇黄帖題䟦之類率用此法尤為要妙吕氏童䝉訓學退之不至李翺皇甫湜然翺湜之文足以窺測作文用力處近世欲學詩則莫若先考江西諸𣲖吕氏童䝉訓老杜歌行最見次第出入本末而東坡長句波瀾浩大變化不測如作雅劇打猛顐入却打猛顐出也吕氏童䝉訓讀古詩十九首及曹子建詩如明月照高樓流光正徘徊之類詩皆思深逺而有餘意言有盡而意無窮也學者當以此等詩嘗自涵養自然下筆高妙大槩學詩須以三百篇辭及漢魏間人詩為主方見古人妙處自無齊梁間綺靡氣味也少游過嶺後詩嚴重高古自成一家與舊作不同學者亦宜詳味文潜詩自然竒逸非他人可及如秋明樹外天客燈青映壁城角冷吟霜淺山寒帶水旱日早吹風川塢半夜雨卧冷五更秋之類逈出時流雖是天姿亦學可及學者若能常玩味此等語自然有變化處也今人作詩自述則稱我謂人則稱君往往相習皆然杜子羙送孔巢父詩云道甫問信今何如墜馬諸公携酒相看詩云甫也諸侯老賔客遇王倚飲云在於甫也何由羡則自述乃稱名送樊侍御云至尊方旰食仗爾布嘉惠寄李太白云昔年有狂客號爾謫仙人送竇九云非爾更持節何人符大名則謂人乃稱爾若謂尊之甚則稱名則前三人皆非通貴之士若謂卑則甚之稱爾則後三人皆非穉孺之列盖其詩格變態如是恐不繫重輕也俲法門退之心訝近來惟貯火眼知别後自添花臨川云髪為感傷無翠葆眼從瞻望有𤣥花乆欽江揔文才妙自相虞翻骨相屯又云乆諸郭璞言多騐老比顔含意更踈韓我今罪重無歸望直去長安路八千永叔今日始知予罪大夷陵去此更三千柳十年顦顇到秦京誰料今為嶺外行王十年江海别常輕豈料今随寡嫂行柳直以踈慵招物議休將文字趂時名王直以文章供潤色未應風月負登臨十一年前南渡客四千里外北歸人又一身去國六千里萬死投荒十二年蘇七千里外二毛人十八灘頭一葉身黄五更歸夢三千里一日思親十二時皆不約而合句法使然故也黄常明老杜雨詩云紫崖奔處黒白鳥去邊明而江碧鳥逾白山青花欲燃之句似之贈王侍御云曉鶯工迸泪秋月觧傷神而感時花濺泪恨别鳥驚心之句似之殆是同一機軸也葛常之劉又詩酷似玉川子而傳於世者二十七篇而巳氷柱雪車二詩雖作語竒怪然議論亦皆出於正也氷柱詩云不為四時雨徒於道路成泥渣不為九江浪徒能泪役天之涯雪車詩謂官家不知民餒寒盡驅牛車盈道載屑玉載載欲何之秘蔵深宫以御炎酷如此等句亦有補於時與玉川月蝕詩稍相類丹陽集張籍云愛養無家客多傳得力方坡贈金山元老云蒜山幸有閑田地招此無家客任居葛常之白云趂凉行遶竹引睡卧看書坡引睡文書信手畨書引睡魔誠人人所同也葛常之詩病門學者須做有用文字不可盡力虚言有用文字所論文字是也議論文字須以董仲舒劉向為主禮記周禮及新序説苑之類皆當貫穿熟考則做一日便有一日工夫近世文字如曽子固諸序尤須詳味學古人文字須得短處如杜子羙詩頗有近質野處如封主簿親事不合詩之類是也東坡詩有汗漫處魯直詩有太新竒太巧處皆不可不知東坡詩如成都畫手開十眉楚山固多􅆐青者黠而夀皆窮極思致出新意於法度之表前賢所未到然學者専力於此則亦失古人作詩之意劉禹錫嘉話載楊祭酒贈項斯詩曰㡬度見君詩句好今觀標格勝於詩平生不觧蔵人善到處相逢説項斯斯集中絶少佳句如晩春花云踈與香風㑹細將泉影移别張籍云子城西並宅御水北同渠拙惡有餘宜祭酒公謂標格勝於詩也祭酒乃敬之也其贈斯詩鄙俗如此與斯亦奚逺哉葛常之樂府門周羙成為江寧府漂水令主簿之室有色而慧羙成毎欵洽于尊席之間世有傳風流子詞盖所寓意焉新綠小池塘風簾動碎影舞斜陽羡一作見金屋去來舊時巢燕土花繚繞前度莓墻綉閣鳳帷深䖏許聴得理絲簧欲説又休慮乖芳信未歌先噎愁轉清商暗想新粧了開朱户應自待月西廂最苦夣魂今宵不到伊行問甚時却與傳音密耗痴將秦鏡偷換韓香大便教人霎時厮見何妨新綠待月皆簿㕔亭軒之名也俞羲仲云徐幹臣伸三衢人政和初以知音律為太常典樂出知常州嘗自製轉調二郎神之詞云悶來彈鵲又攪碎一簾花影謾試着春衫還思纎手薫徹金虬燼冷動是愁端如何向但恠得新來多病嗟舊日沈腰如今潘鬂怎堪臨鏡重省别時泪滴羅襟猶凝為我厭厭日高慵起長託春酲未醒鴈足不來馬蹄難駐門掩一亭芳景空佇立盡日欄杆倚遍晝長人静既成㑹開封户李孝夀來牧吾郡李以嚴治京兆號李閻羅道出郡下幹臣大合樂燕勞之喻羣娼令謳此詞必待其問乃止娼如戒歌至三四李果詢之幹臣蹙頞云某頃有一侍婢色藝冠絶前嵗以亡室不容逐去今聞在蘇州一兵官處屢遣信欲復來而今之主公靳之感慨賦此詞中所叙多其書中語適有天幸公擁麾于彼不審能為我致之否李云此甚不難可無慮也既次無錫賔賛者請受謁次第李云郡官當至楓橋橋距城十里而逺翌日艤舟其所官吏上下望風股栗李一閲刺忽大怒云都監在法不許出城乃亦至此使郡中萬一有火盗之虞豈不殆哉斥都監下堦荷校送獄又數日取其供牘判奏字其家震惧求援宛轉哀鳴致懇李笑云且還徐典樂之妾了來理㑹兵官者觧其指即日承命然後舎之曽文肅十子㝡鍾愛外祖空青公有夀詞云江南客家有寧馨兒三世文章稱大手一門兄弟獨良眉籍甚衆多推千里足來自渥洼池莫倚善題鸚鵡賦青山須待健時歸不似傲當時其後外祖果以詞翰名世可謂父子為知巳也揮塵録世傳温公有西江月一詞今復得錦堂春云紅日遲遲虚廊轉影槐隂迤􅆔西斜彩筆工夫難狀晩意烟霞蝶尚不知春去漫遶幽砌㝷花奈猛風過後縱有殘紅飛向誰家始知青鬂無價歎飄零宦路荏苒年華今日笙歌叢裏特地咨嗟席上青衫濕透算感舊何止琵琶怎不教人見老多少離愁散在天涯東臯雜錄送劉貢父守維陽作長短句云平山欄檻倚晴空山色有無中平山堂望江右諸山甚近或以謂永叔短視故云山色有無中東坡笑之因賦快哉亭道其事云長記平山堂上欹枕江南烟雨杳杳沒孤鴻認取醉翁語山色有無中盖山色有無中非烟雨不能然也藝苑方囘詞有鴈後歸云巧剪合歡羅勝子釵頭春意翩翩艶歌淺笑拜嫣然願郎宜此酒行樂駐華年未至文園多病客幽襟悽斷堪怜舊遊夢挂碧雲邉人歸落鴈後思發在花前山谷守當塗方囘過焉人日席上作也腔本臨江仙山谷以方囘用薛道衡詩故易以鴈後歸云唐劉餗傳記云隋薛道衡聘陳為人日詩曰入春纔七日離家已二年南人嗤之及云人歸落鴈後思發在花前乃曰名下無虚士復齋漫錄後山詩話謂退之以文為詩子瞻以詩為詞如教坊雷大使之舞雖極天下之工要非本色余謂後山之言過矣子瞻佳詞冣多其間傑出者如大江東去浪淘盡千古風流人物赤壁詞明月幾時有把酒問青天中秋詞落日綉簾捲庭下水澄空快哉亭詞乳燕飛華屋悄無人桐隂轉午初夏詞明月如霜好風如水清景無限夜登燕子樓詞楚山脩竹如雲異材秀出千林表詠笛詞玉骨那愁瘴霧氷肌自有仙風咏梅詞東武南城新堤固漣漪初溢宴流杯亭詞氷肌玉骨自清凉無汗夏夜詞有情風萬里巻潮來無情送潮歸别參寥詞缺月挂踈桐漏斷人初静秋夜詞霜降水痕收淺碧鱗鱗露逺洲九日詞凡此十餘詞皆絶去筆墨畦逕間直造古人不到處真可使人一唱而三歎若謂以詩為詞是大不然子瞻自言平生不善唱曲故間有不入腔處非盡如此后山乃比之教坊雷大使舞是何毎况愈下盖其謬耳詩話總龜後集巻三十一欽定四庫全書詩話總龜後集巻三十二宋阮閲撰樂府門翰林學士聶冠卿嘗於李良定公席上賦多䴡詞云想人生羙景良晨堪惜向其間賞心樂事就中難是并得况東城鳳臺沁苑泛晴波淺照金碧露洗華桐烟霏絲柳綠隂揺曵蕩春一色畵堂逈玉簮瓊佩高㑹盡詞客清歡乆重燃絳蠟别就瑶席有翻岩驚鴻體態暮為行雨標格逞珠喉緩歌妖䴡似聴流鶯亂花隔慢舞縈迴嬌鬟低嚲腰支纎細困無力忍分散彩雲歸後何處更㝷覔休辭醉明月好花莫謾輕擲蔡君謨時知泉州寄良定公書云新傳多䴡辭述宴遊之娯使病夫舉首増歎耳又近者有客至自京師言諸公春日多㑹子元伯園池因念昔遊輙形篇詠綠渠春水走潺湲畵閣峯巒映雪鮮酒令巳行金盞側樂聲初認翠裙員清遊勝事傳都下多䴡新詞到海邉曽是尊前沉醉客天涯回首重依然苕溪漁隐曰冠卿詞有露洗華桐烟霏絲柳之句此正是中春天氣下句乃云綠隂揺曵蕩春一色其時未有綠隂真語病也復齋漫錄吾昔以杭移高密與楊元素同舟而陳令舉張子野皆從余過李公擇於湖遂與劉孝叔俱至松江夜半月出置酒垂虹亭上子野時年八十五以歌詞聞於天下作定風波令其畧云見説賢人聚呉分試問也應旁有老人星坐客歡甚有醉倒者此樂未嘗忘也今七年耳子野孝叔令舉皆為異物而松江橋亭今嵗七月九日海風駕潮平地丈餘蕩盡無餘孑遺矣追思曩時真一夢耳苕溪漁隐曰呉興郡圃今有六客亭即公擇子瞻元素子野令舉孝叔時公擇守呉興也東坡又云余昔與張子野劉孝叔李公擇陳令舉楊元素㑹于呉興時子野作六客詞其卒章盡道賢人聚呉分試問也應旁有老人星凡十五年再過呉興而五人者皆巳亡矣時張仲謀與曹子方劉景文蘇伯固張秉道為坐客仲謀請作後六客詞云月滿苕溪照夜堂五星一老鬭光芒十五年間真夢裏何事長庚對月獨凄凉綠髪蒼顔同一醉還是六人吟笑水雲鄉賔主談鋒誰得似看取曹劉今對兩蘇張東坡柳三變字景荘一名永字耆卿喜作小詞然薄於操行當時有薦其才者上曰得非填詞柳三變乎曰然上曰且去填詞由是不得志日與儇子縱遊倡舘酒樓間無復檢率自稱云奉聖㫖填詞柳三變於乎小有才而無徳以將之亦士君子之所宜戒也柳之樂章人多稱之然大槩非覊旅窮愁之辭則閨門媱媟之語若以歐永叔晏叔原蘇子瞻黄魯直張子野秦少游軰較之萬萬相遼彼其所以傳名者直以言多近俗俗子易悦故也皇祐中老人星現永應制撰詞意望後恩無何始用漸字終篇有太液波翻之語其間宸遊鳳輦何處與仁廟挽詞暗合遂忤㫖士大夫惜之余謂柳作此詞借使不忤亦無佳處如嫩菊黄深拒霜紅淺竹籬茅舎何處無此景物方之李謫仙夏英公等應制詞殆不啻天冠地履也世傳永嘗作輪䑓子早行詞頗自以為得意其後張子野見之云既言忽怱䇿馬登途滿目淡烟衰艸則巳辯色矣而後又言楚天闊望中未曉何也抑何語意顛倒如是藝苑先君嘗云古詞絳都春有鼇山綵字犯太上皇御名蓬萊島之句當云綵締余前集悞以古詞為抑詞今正是之苕溪漁隐先君頃嘗丐祠居射村作感皇恩一詞云乞得夢中身歸棲雲水始覺精神自家底峭帆輕掉時與白鷗游戯畏途都不管風波起光景如梭人生浮華百嵗何妨盡沉醉卧龍多事謾説三分竒計算來争似我長昏睡又嘗江行阻風作漁家傲一詞云幾日北風江海立千車萬馬鏖聲急短掉峭寒欺酒力飛雨息瓊花細細穿窻隙我本綠蓑青箬笠浮家泛宅烟波逸渚鷺沙鷗都舊識行未得高歌與爾相㝷覔苕溪漁隐顔氏家訓云别易㑹難古人所重江南餞送下泣言離北間風俗不屑此事岐路言離歡笑分首李後主盖用此語耳故長短句云别時容易見時難復齋漫錄舊詞高雅非近世所及如撲蝴蝶一詞不知誰作非惟藻䴡可喜其腔調亦自婉羙馮延巳著樂章百餘闋其鶴冲天詞云曉月墜雲披銀燭錦屏幃建章鍾動玉䋲低宫漏出花遲又歸國謡詞云江水碧江上何人吹玉笛扁舟逺送瀟湘客蘆花千里霜月白傷行色明朝便是闗山隔見稱於世元宗樂府詞云小樓吹徹玉笙寒延巳有風乍起吹皺一池春水之句皆為警策元宗嘗戯延巳吹皺一池春水干卿何事延已曰未如陛下小樓吹徹玉笙寒元宗悦苕溪漁隐曰古今詩話云江南成文幼為大理卿詞曲妙絶嘗作謁金門云風乍起吹皱一池春水中主聞之因案獄稽滯召詰之且謂曰卿職在典刑一池春水又何干於卿文幼頓首又本事曲云南唐李國主嘗責其臣曰吹皺一池春水干卿何事盖趙公所撰謁金門辭有此一句最為警䇿其臣即對曰未如陛下小樓吹徹玉笙寒若本事曲所記但云趙公初無其名所傳必悞惟南唐書古今詩話二説不同未詳孰是南唐書李感化善謳歌聲韵悠揚清振林木繫樂部為歌板色元宗嘗作浣溪沙二闋手寫賜感化曰菡萏香消翠葉殘西風愁起碧波間還與容光共憔悴不堪看細雨夣回雞塞逺小樓吹徹玉笙寒蓛蓛泪珠多少恨倚闌干手捲真珠上玉鈎依前春恨鎻重樓風裡落花誰是主思悠悠青鳥不傳雲外信丁香空結雨中愁迴首綠波三峽暮接天流後主即位感化以其詞禮上之後主感動賞賜感化甚優苕溪漁隐曰元宗即嗣主李璟嘗作此二詞古今詞話乃以為後主作非也後主名煜南唐書東坡大江東云赤壁詞語意高妙真古今絶唱近時有人和此詞題於郵亭壁間不著其名語雖粗豪亦氣槩可取今謾筆之詞曰炎精中否歎人材委靡都無英物戎馬長驅三犯闕誰作連城堅壁楚漢呑并曹劉割據白骨今如雪書生鑚破簡編說甚英傑天意眷我中興吾君神武小曽孫周發海岳封疆俱效職狂虜何勞追滅翠羽南巡叩閽無路徒有冲冠髪孤忠耿耿劍鋒冷浸秋月苕溪漁隐孫艤字濟師嘗作落梅詞甚佳一聲𦍑管吹嗚咽玉溪半夜梅飜雪江月正茫茫斷橋流水香含章春欲暮落日千山雨一㸃着枝酸呉姬先齒寒苕溪漁隐汪彦章舟行汴中見岸旁畫舫有映簾而觀者甚見其額有詞云小舟簾隙佳人半露梅粧額綠雲低映花如刻恰似秋霄一半銀蟾白結児稍朶香紅扐鈿蟬隐隐揺金碧春山秋月渾無迹不露墻頭些子真消息寄醉落􅅎苕溪漁隠詞句欲全篇皆好極為難得如賀方回淡黃楊栁帶棲鴉秦處度藕葉清香勝花氣二句寫景詠物可謂造微入妙若其全篇皆不逮此矣徐幹臣雁足不來馬蹄難駐門掩一庭芳景駐字當作去字語意乃佳周美成水亭小浮萍破處簷花簾影顛倒按杜少陵詩燈前細雨簷花落美成用此簷花二字全與出處意不相合乃知用字之難矣趙徳麟重門不鎖相思夢隨意遶天涯徐師川栁外重重疊疊山遮不斷愁來路二詞造語雖不同其意絶相類古詞水竹舊院落櫻荀新蔬果一本是水竹舊院落鶯引新雛過不然櫻筍新蔬果則與上句有何干涉董武子疇昔尋芳秘殿西日厭金鋪宫栁垂垂然秘殿豈是尋之處非所當言也侯元功䝉宻州人自少游塲屋年三十有一始得鄉貢人以其年長進士不之敬有輕薄子畫其形於紙鳶上引線放之䝉見而大笑作臨江仙詞題其上曰未遇行藏誰肯信如今方表名踪無端良匠畫形容當風輕借力一舉入髙空才得吹嘘身漸穏只疑逺赴蟾宫雨餘時候夕陽紅幾人平地上看我碧霄中䝉一舉即登第年五十餘遂為執政夷堅志曾端伯慥編樂府雅詞以秋月詞念奴嬌為徐師川作梅詞㸃絳脣為洪覺範作皆悞也秋月詞乃李漢老梅詞乃孫和仲冲冲即正言諤之子也又世傳江城子青玉案二詞皆東坡所作然西清詩話謂江城子乃葉少藴作桐江詩話謂青玉案乃姚進道作四詞皆佳今併録之念奴嬌詞云素光練浮映秋山隠隠修眉橫緑鳷鵲樓髙天似水碧瓦寒生銀粟千丈斜暉奔雲湧露飛過盧仝屋更無塵氣滿庭風碎梧竹誰念鶴髮仙翁當年曾共賞紫巖飛瀑對飲三人聊痛飲一洗離愁千斛斗轉參橫翩然歸去萬里騎黃鶴滿天霜曉叫雲吹斷横玉㸃絳脣詞云流水冷冷斷橋斜路梅花亞雪初下全似江南畫白璧青錢難買春無價歸來也風吹平野一㸃香隨馬江城子云銀濤無際巻蓬嬴落霞明暮雲平曾見青鸞紫鳳下層城二十五弦彈不盡空感慨有餘情蒼梧煙水斷歸程捲霓旌為誰迎空有千行流泪寄幽貞舞罷魚雲海晚千古恨入江聲青玉案詞云三年枕上吳中路遣黃耳隨君去若到松江呼小渡莫驚鷗鷺四橋盡是老子經行處􅜁川圖上看春暮長記髙人右丞句作箇歸期天已許春衫猶是小蠻針線曾濕西湖雨漢老念奴嬌詞中有滿天霜曉叫雲吹斷橫玉之句乃用崔魯華清宫詩銀河漾漾月輝暉樓碍天邊織女機横玉叫雲清似水滿空霜逐一聲飛或云叫雲乃􅅇名非也又端伯所編樂府雅詞中有漢宫春梅詞云是李漢老作非也乃晁冲之叔用作政和間作此詞獻蔡攸是時朝廷方典大晟府蔡攸攜此詞呈其父云今日於樂府中得一人京覽其詞喜之即除大晟府丞今載其詞曰瀟灑江海白竹梢稀處横兩三枝東君也不愛惜雪壓風欺無情燕子怕春寒輕失佳期惟是有南來歸雁年年長見開時清淺小溪如練問玉堂何似茅舍疎籬傷心故人去後冷落新詩微雲淡月對孤芳分付他誰空自倚清香未減風流不在人知此詞中用玉堂事乃唐人詩云白玉堂前一樹梅今朝忽見數枝開兒家門戸重重閉春色因何得入來或云玉堂乃翰苑之玉堂非也苕溪漁隐元豐間都人李嬰調蘄水縣令作滿江紅一曲往黄州上東坡東坡甚喜之其詞云荆楚風烟寂寞近中秋時候露下冷蘭英將謝葦花初秀歸燕殷勤辭巷陌鳴蛩凄楚來窻牗又誰念江邉有神仙飄零乆横琹膝携笻平矌望眼閑吟口低紛紛萬事到頭何有君不見凌烟冠劍客何人氣貎長依舊歸去來一曲為君吟為君夀苕溪漁隐古樂府詩云今世褦襶子觸熱到人家褦襶集韻觧之云不曉事余素畏熱乃知人觸熱來人家其謂不曉事宜矣嘗愛王逐客作夏詞送將歸不用浮爪沉李等事而天然有塵外凉思其詞云百尺清泉聲陸續映瀟洒碧梧翠竹靣千步回廊重重簾幕小枕欹寒玉試展鮫綃看畫軸見一片瀟湘凝綠待玉漏穿花銀河垂地月上欄杆曲此語非觸熱者之所知也苕溪漁隐曰余嘗愛李太白夏日山中詩脱巾掛石壁露頂洒松風其清凉可想也漫叟詩話賈耘老舊有水閣在苕溪之上景物清曠東坡作守時屢過之題詩畫竹於壁間沈㑹宗又為賦小詞云景物因人成勝槩滿目更無塵可碍等閑簾幕小欄干衣未觧心先快明月清風如有待誰信門前車馬隘别是人間閑世界坐中無物不清凉山一帶水一𣲖流水白雲長自在其後水閣屢易主今巳摧毁乆矣遺址正與余水閣相近同在一岸景物悉如㑹宗之詞故余嘗有鄙句云三間小閣賈耘老一首佳詞沈㑹宗無限當時好風月如今總屬績溪翁盖謂此也苕溪漁隐晏叔原工小詞如舞低楊柳樓心月歌盡桃花扇底風不愧六朝宫掖至荆公小詞云揉藍一水縈花艸寂寞小橋千嶂抱人不到柴門自有清風掃畧無塵土思山谷小詞云春未透花枝瘦正是愁時候極為學者所稱賞咏秦湛處度嘗有小詞云春透水波明寒峭花枝瘦盖法山谷也雪浪齋日記孫洙字巨源元豐間為翰苑名重一時李端愿太尉世戚里折節交搢紳間而孫往來尤數㑹一日鎻院宣召者至其家則巳出數十軰踪迹之得於李氏時李新納妾能琵琶孫飲不肯去而迫於宣命李不敢留遂入院幾二鼓矣艸三制罷復作長短句寄恨恨之意遲明遣示李其詞曰樓頭尚有三通鼔何須抵死催人去上馬苦匆匆琵琶曲未終回頭凝望處那更簾纎雨漫道玉為堂玉堂今夜長夷堅志武才人出慶夀宫色最後庭裕陵得之㑹教坊獻新聲為作詞號瑶臺苐一層后山詩話柳三變遊東都南北二巷作新樂府骫天下諷詠遂傳禁中仁宗頗好其詞毎對酒必使侍妓歌之再三三變聞之作宫詞號醉蓬萊因内官逹後宫且求其助仁宗聞而覺之自是不復歌其詞矣㑹改京官乃以無行黜之後改名永仕至屯田員外郎苕溪漁隐曰先君嘗云柳詞鼇山綵字犯太上皇御名蓬萊島當云綵締坡詞低綺戸當云窺綺户二字既改其詞益佳后山詩話荆公問山谷云作小詞曽看李後主詞否云曽看荆公云何處最好山谷以一江春水向東流為對荆公云未若細雨夢回雞塞逺小樓吹徹玉笙寒又細雨濕流光最妙雪浪齋日記南唐李後主歸朝後毎懐江國且念嬪妾散落欝欝不自聊嘗作長短句云簾外雨潺潺春意䦨珊羅衾不煖五更寒夢裏不知身是客一餉貪歡獨自莫凭欄無限闗山别時容易見時難流水落花何處也天上人間含思悽惋未幾下世西清詩話李後主詞云二十餘年家國數千里地山河幾曽慣干戈一旦歸為臣虜沈腰潘鬂消磨最是愴惶辭廟日教坊猶奏别離歌揮泪對宫娥後主既為樊若水所賣舉國與人故當慟哭於九廟之外謝其民而後行顧乃揮泪宫娥聴教坊離曲哉東坡南唐後主圍城中作長短句未就而城破櫻桃落盡春歸去蝶飜金粉雙飛子規啼月小樓西曲䦨珠箔惆悵捲銀泥門巷寂寥人去後望殘烟草低迷余嘗見殘藁㸃染晦昧心方危窘不在書耳藝祖云李煜若以作詩工夫治國事豈為吾虜也苕溪漁隐曰余觀太祖實錄及二朝正史云開寶七年十月詔曹彬潘羙等率師伐江南八年十一月㧞昇州今後主詞乃詠春景非十一月城破時作西清詩話云後主作長短句未就而城破其言非也然王師圍金陵凡一年後主於圍城中春間作此詞則不可知是時其心豈不危窘於此言之乃可也西清詩話前人評杜詩云紅豆啄殘鸚鵡粒碧梧棲老鳳凰枝若云鸚鵡啄殘紅豆粒鳳凰棲老碧梧枝便不是好句余謂詞曲亦然李景有曲手捲真珠上玉鈎或改為珠簾舒信道有曲云十年馬上春如夢或改云如春夢非所謂遇知音漫叟詩話呉越後王來朝太祖為置宴出内妓彈琵琶王獻詞曰金鳯欲飛遭掣搦情脉脉看闕玉樓雲雨隔祖起拊其背曰誓不殺錢王后山詩話詩話總龜後集巻三十二欽定四庫全書詩話總龜後集巻三十三宋阮閲撰樂府門政和元年尚書蔡嶷為知舉尤嚴挾書是時有街市詞曰侍香金童方盛行舉人因以其詞只改十五字作懐挾詞云喜葉葉地手把懐兒摸甚恰限出題厮撞着内臣過得不住脚忙裏只是看闕班駮這一身冷汗都如雲霧薄比此年時頭勢惡待檢又還猛相度只恐根底有人撏着上庠錄蘇子瞻守錢塘有官妓秀蘭天性黠慧善於應對湖中有宴㑹羣妓畢至惟秀蘭不來遣人督之須臾方至子瞻問其故具以髪結沐浴不覺困睡忽有人叩門聲急起而問之乃樂營將催督也非敢怠忽謹以實告子瞻亦恕之坐中倅車屬意於蘭見其晩來恚恨未巳責之曰必有他事以此晩至秀蘭力辯不能止倅之怒是時榴花盛開秀蘭以一枝藉手告倅其怒愈甚秀蘭收泪無言子瞻作賀新凉以觧之其怒始息其詞曰乳燕飛華屋悄無人桐隂轉午晩凉新浴手弄生綃白團扇扇手一時似玉漸困倚孤眠清熟門外誰來推綉户枉教人夢斷瑶臺曲又却是風敲竹石榴半吐紅巾蹙待浮花浪蕊都盡伴君幽獨濃艶一枝細看取芳心千里重似束又恐被西風驚綠若待得君來向此花前對酒不忍觸共粉泪雨蓛蓛子瞻之作皆紀目前事盖取其沐浴新凉曲名賀新凉也後人不知之誤為賀新郎盖不得子瞻之意也子瞻真所謂風流太守也豈可與俗吏同日語哉苕溪漁隐曰野哉楊湜之言真可入笑林東坡此詞冠絶古今記意高逺寧為一娼而發耶簾外誰來推綉户枉教人夣斷瑶臺曲又却是風敲竹用古詩捲簾風動竹疑是故人來之意今乃云忽有人叩門聲急起而問之乃樂營將催督此可笑者一也石榴半吐紅巾蹙待浮花浪蕊都盡伴君幽獨濃艶一枝細看取芳心千里重似束盖初夏之時千花事退惟榴花獨芳因以寫幽閨之情今乃云是時榴花盛開秀蘭以一枝藉手告倅其怒愈甚此可笑者二也此詞空調寄賀新郎乃古曲名也今乃云取其沐浴新凉曲名賀新凉後人不知之誤為賀新郎此可笑者三也詞話中可笑者甚衆姑舉其尤者第東坡此詞深為不幸横遭㸃汚吾不可無言一雪其恥宋子京云江左有文拙而好刻石者謂之詅嗤符今楊湜之言俚甚而鏝板行世殆類是也古今詩話張仲宗有漁家傲一詞云釣笠披雲青嶂繞綠蓑雨細春江渺白鳥飛來風滿棹收綸了漁童拍手樵青笑明月大虚同一照浮家泛宅忘昏曉醉眼冷看城市閙烟波老誰能認得閑煩惱今往嵗在錢塘與仲宗從游甚乆仲宗手寫此詞相示云舊所作也其詞苐二句元是橛頭細雨春江渺余謂仲宗曰橛頭雖是船名今以雨襯之語晦而病因為改作綠蓑細雨仲宗笑以為然苕溪漁隐鄒志全徙昭陳瑩中貶廉間以長短句相諧樂有箇胡兒模様别滿頷髭鬚生得渾如漆見説近來頭也白髭鬚那得長長黒志全句籋子摘來須有千堆雪莫向細君容易說恐他嫌你將伊摘此瑩中語謂志全之長髭也有箇頭陀脩苦行頭上頭髪􅆴􅆴身披一副黪裙衫𦂳纒雙脚苦苦要游南聞説度牒朝夕到并除頷下髭髯缽中無粥住無菴摩登伽處只恐却重參此志全語謂塋中之多慾也廣陵馬推官往來二公間亦嘗以詩詞贈之有才何事老青衫十載低回北斗柄肯伴雪髯千日醉此心真與古人參令見故人今幾年年來風物尚依然遥知閑望登臨處極目登臨萬里天志全語也一尊薄酒滿酌勸君君舉手不是親朋誰肯相從寂寞濵人生似夣梦裏惺惺何處盞到休辭醉後全勝未醉時塋中語也初志全自元符間貶新州徽宗即位以中書舎人召未幾謫零陵别駕龍水安置未幾徙昭焉苕溪漁隐東坡云龍丘子自洛之蜀載二女侍戎裝駿馬至溪山佳處輙駐終日見者以為異人後十年築室黄岡之北號静庵居士作臨江仙贈之云細馬逺䭾雙侍女青巾玉帶紅靴溪山好處便為家誰知巴峽路却見洛城花回旋落英飛玉蕊人間春日初斜十年不見紫雲車龍丘新洞府鈆鼎養丹砂龍丘子即陳季常也秦太虚寄之以詩亦云侍童雙擢玉鬟髪光可照駿馬錦障泥相随窮海嶠暮年更折節學佛得心要鬻馬放阿樊幅巾對沉燎西清詩話云季常自以為飽禪學而妻柳頗悍忌季常畏之故東坡因詩戯之有忽聞河東獅子吼柱杖落手心茫然之句觀此則知季常載二侍女以逺遊及暮年甘於枯寂盖有所制而然亦可憫笑也苕溪漁隐古今詞話以古人好詞世所共知者易甲為乙稱其所作仍随其詞牽合為說殊無根蔕皆不足信也如秦少游千秋嵗水邉沙外城郭春寒退末云春去也飛紅萬㸃愁如海者山谷嘗歎其句意之善欲和之而以海字難押陳無巳言此詞用李後主問君都有幾多愁恰似一江春水向東流但以江為海耳洪覺範嘗和此詞題崔徽真子云多少事都随恨逺連雲海晁無咎亦和此詞吊少㳺云重感慨驚濤自捲珠沉海觀諸公所云則此詞少㳺作明甚乃以為任世徳作又八六子倚危亭恨如芳草萋萋剗盡還生者浣溪沙脚上鞋兒四寸羅者二詞皆見淮海集乃以八六子為賀方回作以浣溪沙為涪翁作晁無咎鹽角兒開時似雪謝時似雪花中竒絶者為晁次膺作汪彦章㸃綘唇新月娟娟夜寒江静山衘斗者為蘇叔黨作皆非也苕溪漁隐唐初歌詞多是五言或七言詩初無長短句自中葉以後至五代漸變成長短句及本朝則盡為此體今所存者止瑞鷓鴣小秦王二闋是七言八句詩并七言絶句詩而巳瑞鷓鴣尤依字易歌若小秦王必須雜以虚聲乃可歌耳其詞云碧山影裏小紅旗儂是江南踏浪兒拍手欲嘲山簡醉齊聲争唱浪婆詞西興度口㠶初落漁浦山頭日未欹儂送潮回歌底曲墫前還唱使君詩此瑞鷓鴣也濟南春好雪初晴行到龍山馬足輕使君莫忘霅溪女時作陽闗腸斷聲此小秦王也皆東坡所作苕溪漁隐東坡别參寥長短句云有情風萬里捲潮來無情送潮歸問錢塘江上西興浦口幾度斜暉不用思量今古俛仰昔人非誰似東坡老白首忘機記取西湖西畔正暮山好處空翠烟霏算詩人相得如我與君希約他年東還海道願謝公雅志莫相違西州路不應回首為我沾衣晉書謝安雖受朝寄然東山之志始末不渝毎形於言色及鎮新城盡室而行造汎海之裝欲須經畧粗定自海道還東雅志未就遂遇疾篤還都尋薨羊曇為安所愛重安薨後輟樂彌年行不由西州路嘗因大醉不覺至州門左右白曰此西州門曇悲感以馬策扣扉誦曹子建詩曰生存華屋處零落歸山坵因慟哭而去東坡用此故事若世俗之論必以為成䜟矣然其詞石刻後東坡自題云元祐六年三月六日余以東坡先生年譜考之元祐四年知杭州六年召為翰林學士承㫖則長短句盖此時作也自後復守潁徙揚入長禮曹出帥定武至紹聖元年方南遷嶺表建中靖國元年北歸至常乃薨凡十一載則世俗成䜟之論安可信邪苕溪漁隐錢思公謫漢東日撰玉樓春詞曰城上風光鶯語亂城下烟波春拍岸綠楊芳草幾時休泪眼愁腸先巳斷情懐漸變成衰晩鸞鏡朱顔驚暗換往年多病厭芳樽今日芳樽惟恐淺毎酒䦨歌之則泣下後閤有白髪姫乃鄧王歌鬟驚鴻也遽言先王將薨預戒挽鐸中歌木蘭花引紼為送今相公亦將亡乎果薨於随州鄧王舊曲亦嘗有帝鄉烟雨鎻春愁故國山川空泪眼之句侍兒小名錄曹元寵本善作詞特以紅窻逈戯詞盛行於世遂掩其名如望月婆羅門一詞亦豈不佳詞云漲雲暮捲漏聲不到小簾櫳銀河淡掃澄空皓月當軒高掛秋入廣寒宫正金波不動桂影朦朧佳人未逄歡此夕與誰同望逺傷懐對景霜滿愁紅南樓何處想人在長笛一聲中疑泪眼立盡西風此詞語病在霜滿愁紅之句時太早耳曽端百編雅詞乃以此詞為楊如晦作非也苕溪漁隐凡作詩詞要當如常山之蛇救首救尾不可偏也如晁無咎作中秋洞仙歌詞其首云青烟幕處碧海飛金鏡永夜閒堦卧桂影固巳佳矣其後云待都將許多明付與金樽投曉共流霞傾盡更携取胡床上南樓看玉做人間素秋千頃若此可謂善救首尾者也至朱希真作中秋念奴嬌詞則不知出此其首云挿天翠柳被何人推上一輪明月照我藤床凉似水飛入瑶池銀闕亦巳佳矣其後云洗盡凡心滿身清露冷浸蕭蕭明朝塵世記取休與人説此兩句全無意味收什得不佳遂弃全篇其氣索然矣苕溪漁隐中秋詞自東坡水調歌頭一出餘詞盡廢然其後亦豈無佳詞如晁次膺綠頭鴨一詞殊清婉但罇爼間歌喉以其篇長憚唱故湮沒無聞焉其詞云曉雲收淡天一片琉璃爛銀盤來從海底皓色千里澄輝瑩無塵素娥澹泞净可數丹桂參差玉露初零金風未凛一年無似此佳時向坐乆踈星時度烏鵲正南飛瑶臺冷欄杆凭暖欲下遲遲念佳人音塵隔後對此應觧相思最闗情漏聲正永暗斷腸花影潜移料得來宵清光未减隂晴天氣又争知共凝戀如今别後還是隔年期人縱健清罇素月長願相随苕溪漁隐東坡在黄州中秋夜對月獨酌作西江月詞曰世事一塲大夣人生幾度秋凉夜來風葉巳鳴廊看取眉頭鬢上酒賤常愁客少月明多被雲妨中秋誰與共孤光把盞凄然北望坡以䜛言謫居黄州欝欝不得志凡賦詩綴詞必寫其所懐然一日不負朝廷其懐君之心末句可見矣苕溪漁隐曰聚蘭集載此詞注云寄子由故後句云中秋誰與共孤光把酒凄然北望則兄弟之情見於句意之間矣疑是倅錢塘時作子由時為睢陽幕客若詞話所云則非也古今詩話詩話總龜後集巻三十三欽定四庫全書詩話總龜後集巻三十四宋阮閲撰傷悼門長慶四年退之為吏部侍郎薨於静安里第李翺行狀載屬纊之語云伯兄徳行高晚年止四十二某位為侍郎年出伯兄十五嵗且獲終於牖下幸不失大節以下見先人可謂榮矣翺祭文曰人心樂生皆惡其㐫兄之在病則齊其終順化以盡靡憾于中張籍祭詩亦曰公有曠逺識生死為一綱及當臨終辰意色亦不荒贈我珍重言傲然委衾裳盖其聰明之所照了徳力之所成就故於生死之際超然如此宣室志載威粹骨蕝國世與韓氏為仇神人以帝命召公計事愈曰臣願從大王討之未幾而愈卒公神道墓誌行狀俱不載而止見於小説者如此豈東坡所謂其生也有自來其死也有所為乎李肇國史補謂愈登華山絶頂度不可返至於發狂慟哭今觀易簀之際神色不亂如此不應於此而至於發狂慟哭也葛常之太白辭粟卧首陽屢空饑顔回當代不飲酒虛名安在哉君不見梁王池上月昔照梁王尊酒中梁王巳去明月在黄鸝怨觧啼春風分明感激眼前事莫惜醉卧桃園東又平原君安在科斗生古池坐客三千人而今知有誰君不見孔北海英風豪氣今何在君不見裴尚書土墳三尺蒿藜居此類者尚多愚謂雖千萬篇只是此意非如少陵傷風憂國感時觸景忠誠激切蓄寓深逺各有所當也黄常明曽文肅熈寧初為海州懐仁令有監酒使臣張者小女甫六七嵗甚為惠黠文肅之室魏夫人怜之教以誦詩書頗通觧其後南北暌隔紹聖初文肅柄事樞時張氏女以入禁中雖無名位以善筆劄掌命令之出入忽與夫人相聞夫人以夫貴疏封瀛國稱夀禁庭始相見叙舊自後嵗時遣問夫人沒張作詩以哭云香散簾幃寂塵生翰墨間空傳三壼譽無復内朝班從此絶迹矣後四十年靖康之變張從昭慈聖獻南渡至錢塘朱忠靖筆錄所記昭慈遣其傳𨗳反正之議張夫人者即其人也年八十餘終揮塵東漢李固忠直鯁亮志在許國不為身謀争立清河遂忤梁冀以致身首異處當時有提鈇上章乞收固尸如汝南郭亮者有星行至洛守衛尸喪如陳留楊𦍑者亦可見固以忠獲罪矣唐李華嘗觀黨錮傳撫巻而悲之且作詩曰古墳襄城野斜徑横秋陂况不禁樵采茅莎無孑遺於乎生不能保其身死又不能保其蔵骨之地天之不相善人何至是耶梅聖俞詩云漢家誅黨人誰與李杜死死者有范滂其母為之喜喜死名愈彰生榮同犬豕故史臣以胡廣趙戒為糞土而馬融真犬豕哉韻語陽秋宋彭城王義康忌檀道濟之功㑹文帝疾動乃矯詔送廷尉誅之故時人歌云可怜白浮鳩枉殺檀江州當時人痛之盖如此奈何王綱下移主威莫立洎魏軍至𤓰步帝方登石頭以思之又何補哉劉夣得嘗過其墓而悲之曰萬里長城壊荒雲野草秋秣陵多士女猶唱白浮鳩盖傷痛之深雖歴三百年而猶不泯也韻語陽秋苕溪云李杜畵象古今詩人題詠多矣若子羙其詩高妙固不待言要當知其平生用心處則半山老人之詩得之矣詩云吾觀少陵詩謂與元氣侔力能排天斡九地壯顔毅色不可求浩蕩八極中生物豈不稠醜奸巨細千萬殊竟莫見以何雕鎪惜哉命之窮顛倒不見收青衫老見斥餓走半九州瘦妻僵前子仆後攘攘盗賊森戈矛吟哦當此時不廢朝廷憂嘗願天下聖大臣各伊周寧令吾廬獨破受凍死不忍四海赤子寒颼颼傷屯悼屈止一身嗟時之人我所羞所以見公像再拜涕泗流推公之心古亦少願起公死從之遊䂬溪淵明非畏枯槁其所以感嘆時化推遷者盖傷時之急於聲利也非畏亂離其所以愁憤於干戈盜賊者盖以王室元元為懐也俗士何以識之七哀詩起曹子建其次則王仲宣張孟陽也釋詩者謂病而哀義而哀感而哀悲而哀耳目聞見而哀口歎而哀鼻酸而哀謂一事而七者具也子建之七哀哀在於獨棲之思婦仲宣之七哀哀在於弃子之媍人張孟陽之七哀哀在於巳毁之園寢唐雍陶亦有七哀詩所謂君若無定雲妾作不動山雲行出山易山逐雲去難是皆以一哀而七者具也老杜之八哀則所哀者八人也王思禮李光弼之武功蘇源明李邕之文翰汝陽鄭䖍之多能張九齡嚴武之政事皆不復見矣盖當時盗賊未息歎舊懐賢而作者也司馬温公亦有五哀詩謂楚屈原趙李牧漢􅏯錯馬援齊斛律光皆負才竭忠卒困於䜛而不能自脱盖有激而云爾葛常之白樂天元㣲之皆老而無子屢見於詩章樂天五十八嵗始得阿崔㣲之五十一嵗始得道保同時得嗣相與酬唱喜甚樂天詩云膩刺新胎髪香綢小綉襦玉牙開手𤓰蘇顆㸃肌膚㣲之云且有承家望誰論得力時又云嘉名稱道保乞姓號崔兒三嵗而亡白賦詩云懐抱幼兒亡按墓誌有子道䕶年三嵗而卒以嵗月攷之即道保也孟東野連産三子不數日皆失之韓退之嘗有詩假天命以寛其憂三人者皆人豪而不能忘情如此信知割愛為難也若使學空天黙黙依前重作鄧攸身傷哉㣲之五十三道者遭此則又何必黒衣巾者闖然入其户而後喻哉葛常之韓退之作李干墓誌云余不知服食之說自何起殺人不可計而慕尚之益至臨死乃悔其為而退之乃躬自蹈之以至於死白樂天所謂退之服硫黄一病訖不痊是也陳後山作嗟哉行云張生服石奴下潦上乾如渴烏韓子作志還自屠白笑未竟人復吁盖為此也然樂天與刑部李侍郎詩云金丹周學都無益姹女丹砂燒即飛則樂天深知服食之無騐其皆以身試藥以自斃乎則白笑未竟人復吁之句未必然爾山谷在貶所曽公衮有書勸其勿服金石藥谷報云公衮疽根在旁乃不可食庭堅服之如晴雲之在川谷安得有霹靂火也則知服金石者尤當屏去粉白黛綠之軰或者用以資色力其斃宜哉丹陽集詩話總龜後集巻三十四欽定四庫全書詩話總龜後集巻三十五宋阮閲撰傷悼門復齋漫錄云農桑不擾嵗常登邉將無功吏不能四十二年如夣覺東風吹泪過昭陵此詩題於寢宫不著名氏宜表而出之許彦周詩話云楊舜韶名友䕫長㒒十餘嵗向同在姑蘇時盜發孫堅墓楊作詩云闔廬城邉荒古丘昔誰塟者孫豫州乆無行客為下馬時有牧童來放牛嗚呼舜韶今亡矣他詩皆工必傳於世也雪浪齋日記云弔辯才詩云滄海盡頭人滅度亂峯深處塔孤員憶登夜閣天連鴈同看秋崖月上烟劉僴云天連鴈前人有古戍天連鴈之句張南軒挽劉觀文詩憶時登廊廟忠言逹帝聰聽思惟盡瘁敢復計成功半世江湖上千憂寤寐中汗青誰秉筆請放衆言公一國恥臣當死公家三世心忍看臨絶筆誰續斷弦音精爽今如在衣冠恨更深却嗟蜍與志處世漫侵尋二平日多竒節中間似富公天從廬墓請人說捄荒功辛苦培邦本雍容遏亂鋒人傳道奏切更過子嚢忠三曽是南荆地他年竹馬迎旌旗嚴騎士弛矢盛民兵細放規摹舊還知節制明思公如峴首同我泪縱横四南軒挽王詹事詞大莭元無玷中心本不欺排奸力扛鼎憂國鬂成絲方喜三旌召俄興一鑑悲西風吹泪眼夫豈哭吾私一睿主龍飛日如公舊學臣忠言闗國計清節映廷紳嵗月身多外江湖澤在民當年遺直歎千古更如新二東萊挽王詹事諸老收聲盡佳城又到公蒼天不可問吾道竟成窮旌捲莆田雨簫横霅浦風今年襟上泪三哭萬夫雄一太史交㫋際元戎巻甲秋先鳴驚衆寐孤憤厭羣咻羽翼新鴻鵠聲華舊斗牛斷橋無恙不落月照寒流二東萊挽汪端明異時憂世士歎息恨才難毎見公身健猶令我意寛彫零竟何極合復豈無端此理終難觧天風大隧寒一四海膺門峻親承二紀中論交由父祖受學自兒童山岳千尋上江湖萬折東微言蔵肺腑欲吐與誰同二王龜齡悼張安國舎人天上張才子少年觀國光高名一枝桂遺愛六州棠出世纔成佛修文遽作郎長沙屈賈誼宣室竟凄凉王龜齡挽趙氏詩全節忠臣配崇寧宰相家哀能變國俗實不御鈆華學佛窮三昧然松教五車遺芳載雕管名夀兩俱遐東萊挽魏國錄麻衣見天子拜䟽不知休落落山林氣拳拳畎畆憂極知千載遇政用一身酧繞舎閩溪水朝東日夜流一羣公祖踈傅多士送陽城短棹非前約長亭及此行深留移白日久語為蒼生㑹綺山陽賦鄰人笛未横二東萊輓蕭祭酒摩揣誠斯薄雕鎸質亦消平生但真樸直上絶枝條氛霧終澄霽丘山亦動揺朝陽舊時鳳聲入舞簫韶王龜齡悼亡燕寢焚香老病身細君相對坐如賔而今一榻維摩室唯與無言法喜親一偕老相期未及朞回頭人事巳成非逄春尚擬風光轉過眼忽驚花片飛二文昌雜錄云梁均帝晉天福中始塟故妃張氏獨存考功員外商鵬為誌文曰七月有期不見望陵之妾九疑無色空餘泣竹之妃後唐武皇師還渭北不獲入覲幕客李襲吉作違離表云穴禽有翼聴舜樂以猶來天路無梯望堯雲而不到五代之季工翰墨者無以過此也許彦周詩話云外祖父邵安簡公布衣時上平元昊策又甞勸仁廟早立太子晩年自樞府出知越州又移知鄆州其薨也岐公作挽詞云披褐曽陳定𦍑策汗青猶著立儲書春風澤國吟牋落夜雨溪堂燕豆踈前軰詩不獨語言精鍊且是着題冷齋夜話云余問山谷今之詩人誰為冠曰無出陳無已其佳句可得聞乎曰吾見其作温公挽辭一聫便知其才不可敵曰政雖随日化身巳要人扶王直方詩話云邢居實字惇夫年少豪邁所與游皆一時名士方年十四五時嘗作明妃引末云安得壯士霍嫖姚縳取呼韓作編户諸公多稱之既卒余收拾其殘艸編成一集號曰呻吟惇夫自少便多憔悴感慨之意其作秋懐詩云高歌感人心心悲將奈何其作棗陽道中詩云有意問山神此生復來否巳而果卒於漢東惇夫之卒也山谷以詩哭之云詩到随州更老成江山為助筆縱横眼看白璧埋黄壤何况人間父子情盖謂惇夫與其子歆何也蔡天啟亦有詩云人物於今歎𦕈然孤墳宿草巳生烟日暮行人道旁舎應逢年少共談𤣥其餘作者甚衆皆載於呻吟集後寓情門古今詩話云牧之為御史分司洛陽時李司徒罷鎮閒居聲伎為當時苐一一日開筵朝士臻赴以杜嘗持憲不敢邀飲杜諷坐客逹意願預斯㑹李馳書杜聞命遽來㑹中女妓百餘皆絶色殊藝杜獨坐南行瞪目注視滿引三巵問李曰聞有紫雲者孰是李指示之杜凝睇良乆曰名不虚得宜以見惠李俯首而笑諸妓亦皆回首破顔杜又自引三爵朗吟而起曰華堂今日綺筵開誰喚分司御史來忽發狂言驚滿座兩行紅粉一時回意氣閒逸旁若無人苕溪漁隐曰東坡聞李公擇餘飲傅國傳家大醉有詩云不肯醒醒騎馬回玉山知為玉人頽紫雲有語君知否莫喚分司御史來即此事也又侍兒小名錄云兵部李尚樂妓崔紫雲詞華清峭眉目端麗李公為尹東洛宴客將酣杜公輕騎而來連飲三觥謂主人曰嘗聞有能篇詠紫雲者今日方知名不虛得倘垂一意無以加焉諸妓回頭掩笑杜作前詩詩罷上馬而去李公尋以紫雲送贈之紫雲臨行獻詩曰從來學製斐然詩不料霜臺御史知愁見便教随命去戀恩腸斷出門時侍兒小名錄不載此事出於何書疑好事者附㑹為之也東坡續麗人行李仲謀家有周昉畵背靣欠伸内人極精戱作此詩云深宫無人春晝長沉香亭北百花香羙人睡起薄梳洗燕舞鶯啼空斷腸畫工欲畵無窮意背立春風初破睡若教回首更嫣然陽城下蔡俱風靡子蒼用此意題伯時所畵宫女云睡起昭陽暗淡粧不知緣底背斜陽若教轉靣一回首三十六宫無粉光終不及坡之偉麗也藝苑雌黄云朝雲者東坡侍妾也嘗令就秦少游乞詞少㳺作南歌子贈之云靄靄迷春態溶溶媚曉光不應容易下巫陽秪恐翰林前世是襄王暫為清歌駐還因暮雨忙瞥然歸去斷人腸空使蘭臺公子賦高唐王直方詩話云無巳嘗作小放歌行兩篇其一云春風永巷閉娉婷長使青樓悞得名不惜捲簾通一顧怕君着眼未分明其一云當年不嫁惜娉婷傅白施朱作後生説與旁人須早計随宜梳洗莫傾城山谷云無巳他日詩語極高古至於此篇則顧影徘徊衒耀太甚逰宴門蔡寛夫詩話云文忠與趙康靖公槩同在政府相得歡甚康靖先告老歸睢陽文忠相繼謝事歸汝隂康靖一日單騎車特往過之時年巳八十矣留劇飲踰月日於汝隂縱遊而後返前軰挂冠後能從容自適未有若此者文忠賦詩云古來交道愧難終此㑹今時豈易逢出處三朝俱白首凋零萬朩見青松公能不逺來千里我病猶堪釂一鍾巳勝山隂空興盡且留歸駕為從容因榜其游從之地為㑹老堂明年文忠欲往睢陽報之未果而薨兩公名節固師表天下而風流襟度又如此誠可以激薄俗也人間佳節惟寒食天下名園重洛陽金谷煖横宫殿碧銅駞晴合綺羅光橋邉楊柳細垂地花外秋千半出墻白馬蹄輕草如剪爛逰於此十年狂康節春逰吟東臯雜錄云孔嘗甫言唐人詩有城頭椎鼓傳花枝席上摶拳握松子乃知酒席蔵􅍐為戯其來也乆復齋漫錄云仲至使遼回謁恭敏李公席中賦詩云穹廬三月巳淹留白草黄雲見即愁滿袖塵埃何處洗李家池上海棠洲許彦周詩話云退之詩酩酊馬上知為誰此七字用意哀悲過於痛哭又詩云銀燭未消窻送曙金釵半醉坐添春殊不類其為人乃知能賦梅花不獨宋廣平阮戸部逰紫㣲觀詩春來猶未到金庭桃杏離披柳巳青直待斜陽方興盡一笻獨立紫㣲亭詩話總龜後集巻三十五欽定四庫全書詩話總龜後集巻三十六宋阮閲撰怨嗟門孟郊詩云借車載家具家具少於車借者莫彈指貧窮何足嗟可見其素窶後有詩云賔秋巳覺厚私儲常恐多是古人恐富求歸之義則貧亦何足怪按郊為溧陽尉縣有投金瀬平陵城林薄蓊蔚郊往來其間曹務都廢至遣假尉代之而分其半俸則安得有私儲哉退之贈郊詩云陋室有文史高門有笙竽何能辯榮辱且欲分賢愚盖言貧者文史之樂賢於富者笙竽之樂也葛立之司馬遷游江淮汶泗之境紬金匱石室之書而作史記上下數千年殆如目覩可謂孤㧞初遭李陵之禍不肯引决而甘腐刑者實欲效離騷呂覧説難之書以攄憤悱故荆公詩云嗟子刀鋸間悠然止而食成書與後世憤悱聊自釋觀史記評賛於范雎蔡澤則曰二子不相戹烏能激乎於季布則曰彼自負才故受辱而不羞於虞卿則曰虞卿非窮愁則不能著書以自見於伍員則曰隐忍以就功名至於作貨殖游俠二傳則一家貧不能自贖左右親戚不為一言而寄意焉則荆公釋憤悱之言非虚發也韻語陽秋晨牝妖鴟喪家生亂自古而然故夏姬亂陳費無極亂楚李義山詠北齊云小憐玉體横陳夜巳報周師入晉陽東坡城都畫手開十眉横雲却月争新竒游人指㸃小顰處中有漁陽胡馬嘶熟味此詩則呉人何苦怨西施豈是稱詠史哉等而下之凡移於尤物皆可以為戒黄常明杜牧張祜皆有春申君絶句杜云烈士思酧國士恩春申誰與快寃魂三千賔客總珠履欲使何人殺李園張云薄俗何心議感恩謟容卑迹頼君門春申還道三千客寂莫無人殺李園二詩語意太相犯於乎朱英之言義矣而春申不能必用李園之計巧矣而春申不能預防春申之客衆矣而無一人為春申殺李園者所以起二子之論也余亦嘗有二絶云朱英意在强黄歇黄歇如何弱李園一旦棘門竒禍作自貽伊戚向誰論又先秦豈謂嬴為呂東晉那知馬作牛不悟春申亦如許敢憑宫掖售邪謀黄常明唐淄青李師道倚蔡為重稱兵不軌洎蔡平師道乃始震悸憲宗命削其官詔諸軍進討於是六節度之兵興矣故劉夣得嘗為天齊行二篇以快李師道之死夫師道猖獗狂悖反噬其主人怨神怒豈能居覆載之中乎故夣得云牙門大將有劉生夜半射落攙搶星又云太山沉冦六十年旅祭不饗生愁烟今逄聖君欲封禪神使隂兵來助戰夫劉悟本軍之將也力為師道屯陽榖以當魏博乃倒戈以攻其主太山本土之神也宜福其地而乃以隂兵助敵則人怨神怒可知矣將叛其君神叛其主豈非以此始者以此終乎天之所報速矣黄常明杜子羙身遭離亂復迫衣食足迹幾半天下自少時逰蘇及越以至作諫官奔走州縣既皆載壯逰詩矣其後贈韋左丞詩云今欲東入海即將西去秦則自長安之齊魯也贈李白詩云亦有梁宋逰方期拾瑶草則自東都之梁宋也發同谷縣云賢有不黔突聖有不煖席姑來兹山中休駕喜地僻奈何物迫累一嵗四行役則自隴右之劍南也留别章使君云終作適荆蠻安排用莊叟隨雲拜東皇挂席上南斗則自蜀之荆楚也夫士人既無常産為饑所驅豈免仰給於人則奔走道途亦理之常爾王建云一年十二月强半馬上看員缺百年歡樂能幾何在家見少行見多不緣衣食相驅遣此身誰願長奔波李頎亦云男兒在世無産業行子出門如轉蓬皆為此也黄常明陶淵明乞食詩云飢來驅我去不知竟何之而繼之以感子漂母惠愧我韓才非則求而有獲者也杜子羙上水遣懐云驅馳四海内童稚日糊口而繼之以但遇新少年少逢舊知友則求而無所得者也山谷貧樂齋詩云飢來或乞食有道無不可過青草湖云我雖貧至骨尤勝杜陵老憶昔上岳陽一飯從人討由是論之則杜之貧甚於陶如山谷之貧尚優於杜也黄常明老杜避亂秦蜀衣食不足不免求給於人如贈高彭州云百年巳過半秋至轉飢寒為問彭州牧何時救急難客夜詩云計拙無衣食途窮仗友生老妻書數紙應悉未歸情狂夫詩云厚祿故人書斷絶常飢稚子色凄凉荅裴道州詩云虚名但䝉寒温問泛愛不救溝壑辱簡韋十詩云因知貧病人須棄能使韋郎迹也踈觀此五詩可見其艱窘而有望於朋友故舊也然當時能期之者幾何人哉劉長卿云世情薄恩義俗態輕窮厄山谷云持飢望路人誰能顔色温余於子羙亦云葛韋之李翺賦衆囂囂而雜處咸歎老而嗟卑顧予心獨不怨兮慮行道之猶非文忠常稱之觀老杜漢隂有鹿門滄海有靈槎焉能學衆口咄咄空咨嗟正同此意葛常之樂天謫潯陽寄左降詩云殘燈無㷔影幢幢此夕聞君得九江垂死病中驚坐起暗風吹雨入寒窻白謂此句他人尚不可聞况㒒心哉至今毎吟猶惻惻再復貽三韻云憶昔封書與君夜金鑾殿後欲明天今夜封書在何處廬山庵裏曉燈前去來乃士之常二公不應如此戚戚也子瞻送文與可云奪官遣去不自覺曉梳脱髪誰能收推之前詩厥論尚矣然居易荅元書以三太為報且云可以樂之終身者悲歎之語恐特傷離索耳䂬溪詩有人之情性也非强諫争於庭怨詈於道怒隣詈坐之所為也余謂怨隣詈坐固非詩本指若小弁親親未嘗無怨何人斯取彼譛人投畀豺虎未嘗不憤謂不可諫争則又甚矣箴規刺誨何為而古者帝王尚許百工各執藝事以諫詩獨不得與工技等哉故譌諫而不譎者惟風為然如雅云匪靣命之言提其耳彼童而角實訌小子憂心慘慘念國之為虐亂匪降自天生自媍人忠臣義士欲正君定國惟恐所陳不激切豈盡優柔婉媚乎故樂天寄唐生詩云篇篇無空文句句必盡規子建稱孔北海文章多雜以嘲戯子羙亦戯效俳諧體退之亦有寄詩雜談俳不獨文舉為然自東方生而下稱處士張長史顔延年軰往往多滑稽語大抵才力豪邁有餘而用之不盡自然如此韓詩濁醪沸入口口角如衘䈤試以詩義授如以肉貫串初食不下喉近亦能稍稍皆謔語也坡集類此不可勝數寄蘄簟與蒲傳正云東坡病叟長覉旅凍飢餓吟似飢䑕倚頼東風先破衾一夜雪寒披故絮黄州云自慚無補絲毫事尚費官家壓酒囊將之湖州云呉兒膾薄欲飛去未食先説饞涎垂又㝷花不論命愛雪長忍凍天公非不怜聴飽即喧閧食筍云紛然生喜怒似被狙公賣種茶云飢寒未巳免巳作大飽計平生五千巻一字不救飢寒來凭空按一字不可煮皆斡旋其語而弄之信恢刃有餘與血指汗顔者異矣黄常明詩眼云山谷常言少時曽誦薛能詩云青春背我堂堂去白髪欺人故故生孫莘老問云此何人詩對曰老杜莘老云杜詩不如此後山谷語傳師云庭堅因莘老之言遂曉老杜詩高雅大體傳師云若薛能詩正俗所謂歎世耳後湖集云余毎讀蘇州漠漠㠶來重冥冥鳥去遲之語未嘗不茫然而思喟然而歎嗟乎此余晩泊江西十年前夣耳自余犇竄南北山行水宿所歴佳處固多欲求此夣了不可得豈蒹葭莾蒼無三湘七澤之壮雪蓬烟艇無風檣陣馬之竒乎抑吾且老矣壮懐銷落塵土坌沒而無少日烟霞之想也慶長筆端丘壑固自不凢當為余圖蘇州之句於壁使余隐几静對神遊八極之表耳詩話總龜後集巻三十六欽定四庫全書詩話總龜後集巻三十七宋阮閲撰譏誚門坡遊武昌寒溪云楚雨遂昏雲夣澤呉潮不到武昌宫又周游困卧九折嶺褰衣獨上呉王臺於一時筆快遂以上宫目之繼而有李成伯云嗟嗟漢鼎乆傾東肉食曽無智與忠孟徳仲謀交號令本初竊地搶姦雄武侯偶失三分策孫氏俄成一戰功寂寞西山舊巢穴庸兒尤道帝王宫語幾乎詈矣但渠不記其家太白曽作武昌韓侯去思頌黄金之車大呉天子武昌鼎據實為帝里其罪大矣䂬溪永叔萬釘寶帶爛熳環人謂此帶幾度道著觀子羙緋魚以及之扶病垂朱紱挈帶看朱紱銀章付老翁世未嘗譏之者豈以其人不止宜此服邪固嘗有云朱紱負平生又云居然綰章紱受性本幽獨䂬溪唐竇常牟羣庠鞏兄弟五人四人擢進士獨羣客隐毗陵因韋夏卿屢薦始入仕皆詩人也牟晩從昭義盧從史從史䆮驕牟度不可諫即移疾歸東都故其秋夕閑居詩云燕燕辭巢蟬蜕枝窮居積雨壊籓籬羣嘗為黔中觀察使故其詩云佩刀看日晒賜馬旁江調言語多重譯壺觴毎獨謡而鞏詩中乃有自京師將赴黔南之所謂什風雨荆州二月天問人初顧峽中船西南一望雲和水尤道黔南有四千此詩疑羣所作而悞寘鞏集中爾當歴武陵䕫江撫四州刺史所謂看春又過清明節算老重經癸巳年者將之武陵到松滋渡之所作也庠詩不見其巡内一絶云愁雲漠漠草離離太液鈎陳處處疑薄暮毁垣春雨裏殘花猶發萬年枝造句亦可謂秀整矣兄弟中獨羣詩稍低又不得舉進士而位反居上鞏詩又放魚詩云好去長江千萬里不須辛苦上龍門豈非為羣而言乎史載鞏平居與人言若不出口世號囁嚅翁乃肯為是耶葛立之謝靈運在永嘉臨川作山水詩甚多往往皆佳句然其人浮躁不覊亦何足道哉方景平天子踐祚靈運巳扇揺異同非毁執政矣暨文帝召為祕書監自以名軰應叅時政而王曇首王華等名位踰之意既不平多稱疾不朝則無君之心巳見於此時矣後以游放無度為有司所糾朝廷遣使收之而靈運有韓亡子房奮秦帝魯連恥之詠竟不免東市之戮而白樂天乃謂謝公才廓落與世不相遇壮志欝不用須有所洩處洩為山水詩逸韻諧竒趣何也武帝文帝兩朝遇之甚厚内而卿監外而二千石亦不為不逄矣豈可謂與世不相遇乎少須之安知不至黄散而􅄶躁至是惜哉其作登石門詩云心契九秋榦目翫三春荑居常以待終處順故安朓不知桃墟之洩能處順耶五羊之旤能待終耶亦可謂心語相違矣韻語陽秋荆公作商鞅詩云今人未可非商鞅商鞅能令政必行余竊疑焉孔子論為君難有曰如其善而莫予違也不亦善乎如不善而莫予違也不幾乎一言而喪邦乎盖人君操生殺之權志在使人無違於我其何所不至哉商鞅助秦為虐而乃稱其使政必行何耶後又有謝安詩云謝公才業自超羣誤長清談助世紛秦晉區區等亡國可能王衍勝商君則知前篇有激而云也杜子羙云舜舉十六相身尊道何高秦時用商鞅法令如牛毛則知所去取矣韻語陽秋荆公以詩賦决科而深不樂詩賦試院中五絶其一云少年操筆坐中庭子墨文章頗自輕聖世選才終用賦白頭來此試諸生後作詳定官復有詩云童子常誇作賦工暮年羞悔有楊雄當年賜帛倡優等今日論才將相中細甚客卿因筆墨卑於爾雅注魚虫漢家故事真當改新詠知君勝弱翁熈寧四年既預政遂罷詩賦専以經義取士盖平日之志也元祐五年侍御史劉摯等謂治經者専守一家而畧諸儒傳記之學為文者惟務訓釋而不知聲律體要之詞遂復用詩賦紹聖初以詩賦為元祐學術復罷之政和中遂著於令士庶傳習詩賦者杖一百畏謹者至不敢作詩時張芸叟有詩云少年辛苦校虫魚晚嵗雕虫恥壯夫自是諸生尤習氣果然紫詔盡驅除酒間李杜皆投筆地下班揚亦引車唯有背時迂鈍叟静中吟撚白髭鬚盖芸叟自謂也黄魯直云陶淵明責子詩曰白髪被兩髩肌膚不復實雖有五男兒總不好紙筆阿舒已八歳懶惰故無匹阿宣行志學而不愛文術雍端年十三不識六與七逼子垂九齡但識梨與栗天運茍如此且進盃中物觀淵明此詩想見其人慈祥戱謔可觀也俗人便謂淵明諸子皆不肖而淵明愁歎見於詩耳又杜子羙詩陶潜避俗翁未必能逹道觀其著詩篇頗亦恨枯槁逹生豈是足黙識盖不早生子賢與愚何其挂懐抱子羙困頓於兩川盖為不知者詬病以為拙於生事又往徃譏議宗文宗武失學故聊觧嘲耳其詩名曰遣興可觧也俗人便為譏病淵明所謂痴人前不得說夣也作詩不知風雅之意不可以作詩詩尚譎諫唯言之者無罪聞之者足以戒乃為有補而涉於毁謗聞者怒之何補之有觀蘇東坡詩只是譏誚朝廷殊無温柔崇厚之氣以此人故得而罪之若是伯淳詩聞者自然感動因舉伯淳和温公諸人禊飲詩云未須愁日暮天際是輕隂又泛舟詩云只恐風花一片飛何其温厚也龜山語錄東坡云今太白集中有歸來乎笑矣乎及贈懐素草書數詩决非太白作盖唐末五代間學齊巳軰詩也余舊在富陽見國清院太白詩絶凡近過彭澤興唐院又見太白詩亦非是良由太白豪俊語不甚擇集中亦往往有臨時率然之句故使妄庸軰敢耳若杜子羙世豈復有偽撰邪余嘗舟次姑熟堂下讀姑熟十詠恠其語淺近不類李白王平甫云此李赤詩也赤見柳子厚集自比李白故名赤其後為厠鬼所惑以死今觀其詩止此而以太白自比則其人心疾乆矣豈厠鬼之罪也苕溪漁隐曰東坡此語盖有所譏而已元祐文章世稱蘇黄然二公當時争名互相譏誚東坡嘗云黄魯直詩文如蝤蛑江珧柱格韻高絶盤飱盡廢然不可多食多食則發風動氣山谷亦云盖有文章妙一世而詩句不逮古人者此指東坡而言也二公文章自今視之世自有公論豈至各如前事盖一時争名之詞耳俗人便以為誠然遂為譏誚所謂蚍蜉撼大樹可笑不自量者邪王直方詩話云文潜賦虎圖詩末云煩君衛吾寢振此蓬蓽陋坐令盗肉䑕不敢窺白晝或云此却是猫兒詩也又太旱詩云天邉趙盾益可畏水底武侯方醉眠時人以為幾於湯燖右軍也陳軒筆錄云彭乘為翰林學士文章誥命尤為可笑有邉帥乞朝覲仁宗許其候秋凉即途乗為批荅之詔曰當俟蕭蕭之候爰興靡靡之行王琪性滑稽多所侮誚及乗死也琪為挽詞云最是蕭蕭句無人繼後風盖為是也後山詩話云楊蟠金山詩云天末樓臺横北固夜深燈火見揚州王平甫云莊宅牙人語也觧量四至呉僧錢塘白塔院詩曰到江呉地盡隔岸越山多余謂分界堠子語也隐居詩話云至和中阮逸為王宫記室王能詩多與逸唱和逸有句曰易立太山石難枯上林柳有言其事者朝廷方治之㑹逸坐他事因廢棄之詩話總龜後集巻三十七欽定四庫全書詩話總龜後集巻三十八宋阮閲撰箴規門東坡山村詩云烟雨濛濛雞犬聲有生何處不安生但教黄犢無人佩布榖何勞也勸耕意言是時販私鹽者多帶刀杖故取前漢龔遂令人賣劍買牛賣刀買犢曰何為帶刀佩犢意言但得鹽法寛平令民不帶刀劍而買牛犢則民自力耕不勞勸督以譏鹽法太峻不便也又云老翁七十自腰鎌慙愧春山筍蕨甜豈是聞韶觧忘味爾來三月食無鹽意言山中之人饑貧無食雖老猶自採筍蕨譏時鹽法峻急僻逺之人無鹽食用動經數月若古之聖賢則能聞韶忘味山中小民豈能食淡而樂乎以譏鹽法太急也又云杖藜褁飯去匆匆過眼青錢轉手空嬴得兒童語音好一年强半在城中意言百姓請得青苖錢立便於城中浮費使却又言鄉村之人一年兩度夏秋税及數度請納和預買錢今來更添青苖助役錢因此莊家㓜小子弟多在城市不着次苐但學得城中人語音而巳以譏新法青苖助役不便也東坡開運鹽河詩云居官不任事消散羡長卿胡不歸去來滯留愧淵明鹽事星火急誰能䘏農耕薨薨曉鼓動萬指羅溝坑天雨助官政泫然淋衣纓人如鴨與猪投泥相濺驚下馬荒堤上四顧但湖泓綫路不容足又與牛羊争歸田雖賤辱豈失泥中行寄語故山人慎勿厭藜羮是時盧秉提舉鹽事擘畵開運鹽河差夫千餘人某於大雨中部役其河只為般鹽既非農事而役農民秋田未了有妨農事又其河中間有涌沙數里意言開得不便自歎泥中勞苦羡司馬長卿居官而不任事又愧陶淵明不早棄官歸去也農事未休而役千餘人故云鹽事星火急誰能䘏農耕又言百姓巳勞苦不意天雨又助官政之勞民轉致百姓疲弊役人在泥水中辛苦無異鴨與猪又言某亦在泥中與牛羊争路而行若歸田豈失此哉故云寄語故山友謹不可厭藜􅃵而思仕宦以譏開運鹽河不當又妨農事也蘇東坡八月十五日觀潮作詩云呉兒生長狎濤淵冐利忘生不自怜東海若知明主意應教斥鹵變桑田時新有㫖禁弄潮故云呉兒生長狎濤淵冐利輕生不自怜盖言弄潮之人為貪官中利物致其間有溺死者故朝㫖禁斷某為其時又好興水利因作此詩言東海若知明主意應教斥鹵變桑田意言東海若知此意當令斥鹵地盡變桑田此事之必不可成者以譏興水利之難成也子瞻任杭州通判日轉運司差往湖州相度堤岸利害因與知湖州孫覺相見作詩與孫覺云嗟余與子乆離羣耳冷心灰百不聞若對青山談世事當須舉白便浮君某是時約孫覺并坐客如有言及時事者罸一大盞雖不指言時事是非意言時事多不便不得説也又云天目山前淥浸裾碧瀾堂下看衘艫作堤捍水非吾事閑送苕溪入太湖某為先曽言水利不便却被轉運司差相度堤岸又云作堤捍水非吾事意言夲非興水利之人以譏諷水利之不便也王詵送韓幹畵馬十二疋求䟦尾子瞻作詩云南山之下汧渭之間想見開元天寶年八坊分屯隘秦川四十萬疋如雲烟騅駓駰駱驪騮騵白魚赤兎騂皇䮧龍顱鳳頸獰且妍竒姿逸徳隐駑頑碧眼胡兒手足鮮嵗時剪刷供帝閑柘袍臨池侍三千紅粧照日光流淵樓下玉螭吐青寒往來蹙踏生飛湍衆工䑛筆和朱鈆先生曹覇弟子韓廐馬多肉凥脽圓肉中畵骨誇尤難金覊玉勒綉羅鞍鞭箠刻烙傷天全不如此圖近自然平沙細草荒芊綿驚鴻脱兎争後先王良挾策飛上天何必俯首服短轅意以騏驥自比譏執政大臣無能盡我才如王良之御者何必折節干求進用也子瞻臈月遊孤山詩云獸在藪魚在湖一入池檻歸期無悞随弓旌落塵土坐使鞭箠環呻呼追胥連保罪及孥百日愁歎一日娯白雲舊有終老約朱綬豈合幽人紆人生何者非蘧廬故山鶴怨秋猿孤何時自駕鹿車去掃除白髪煩菖蒲麻鞋短褐随獵夫射弋狐兎供朝晡陶潜自作五柳傳潘閬畵入三峯圖吾年凛凛今幾餘知非不去慙衛蘧嵗荒無術歸亡逋鵠則易畫虎難摹此詩云悞随弓旌落塵土坐使鞭箠環呻呼以譏新法行後公事鞭箠多也詼諧門老杜贈常左丞有朝叩富兒門暮随肥馬塵至為殘盃冷炙之語及姜少府為清觴異味即云新歡使飽姜侯徳王倚為沽酒割鮮即云故人情義晩誰似豈附炎老饕如是哉盖託文字戱謔也然又不可不慮故有褊性合幽棲干謁傷直耻事干謁以自見其志亦如示姪佐云甚聞霜薤白重惠意如何巳應舂得細頗覺寄來遲皆戱言也終慮痴人以夣為實故示姪濟云所來為宗族亦不為盤飱小人利口實薄俗難可論正如淵明乞食篇云饑來駈我去不知竟何之行行正斯里扣門拙言辭其卑汚乃爾不肯為五斗拆腰殆與異矣試問高吟三十首何如低唱兩三盃又譬如長鬛人不以長為苦歸來被上下一夜著無處天覺真賛云書生大抵多窮相金眼除非是黨公皆笑林語也北夣𤨏言載江陵世號衣冠藪澤人言琵琶多如飯甑措大多如鯽魚退之酧崔少府伊陽詩云下言人吏希惟足彪與虥余官辰溪時士人皆可喜而不多得近城人虎雜居戱為對云固冠思得多於鯽士人刻木惟宜少似彪吏人某見同儕因行飲令人索一魚名有浙人大唱云周公魚余謂客坐且喜召伯鮓有對矣滿堂胡盧不止因戱為足成其語云京語鮓先誇召伯浙音魚或號周公䂬溪文潜詩兒曹鞭笞學官府翁怜兒痴旁笑侮平明坐衙鞭復呵賢於羣兒能幾何兒曹鞭笞以為戱翁怒鞭人血流地一種戱劇誰後先我笑為公兒更賢余謂此詩亦不可不令操權者知也坡云不辭脱袴溪水寒水中照見催租瘢等閒戯語亦有所補後山詩話云楊大年傀儡詩云鮑老當筵笑郭郎笑他舞袖太琅璫若教鮑老當筵舞轉更琅璫舞袖長語俚而意切相傳以為笑後山詩話云乞猫詩秋來䑕軰欺猫死窺瓮翻盤攪夜眠聞道狸奴將數子買魚穿柳聘衘蟬雖滑稽而可喜千嵗而下讀者如新王直方詩話云謝王炳之惠玉板紙詩云王侯髩若綠坡竹此出髯奴傳炳之大以為憾送零陵主簿夏君玉詩末云因行訪幽襌頭陁烟雨外盖君玉頭甚大故以此戯之東軒筆錄云陶榖乆在翰林意希大用仍俾其黨因事薦引言榖在詞禁宣力實多微伺上㫖太祖笑曰翰林草制皆檢前人舊本改換詞語所謂依様畵葫蘆耳何宣力之有榖聞之作詩曰官職須由生處有文章不管用時無堪笑翰林陶學士年年依舊畵葫蘆太祖薄其怨望遂决意不用矣西清詩話云高英秀者呉越國人與賛寧為詩友口給好罵滑稽毎見眉目有異者必噂短於其後人號惡啄薄徒嘗譏名人詩病云李山甫覧漢史云王莾弄來曽半破曹公將去便平沉定是破船詩李羣玉詠鷓鴣云方穿詰曲﨑嶇路又聴鈎輈格磔聲定見梵語詩羅隐云雲中鷄犬劉安過月裡笙歌煬帝歸定見鬼詩杜荀鶴云今日偶題題似着不知題後更誰題此衛子詩也不然安有四蹄賛寧笑謝而巳苕溪漁隐曰劉義落葉詩云返蟻難尋穴歸禽易見窠滿廊僧不厭一片俗嫌多鄭谷柳詩云半烟半雨溪橋畔間杏間桃山路中㑹得離人無限意千絲萬絮惹春風或戯謂此二詩乃落葉及柳謎子觀者試一思之方知其善謔也隐居詩話云昨夜隂山吼賊風帳中驚起黒髯翁平明不待全師出連把金鞭打鉄􅍡不知何人之詩頗為邉人傳誦有張師雄者居洛中好以甘言悦人晩年尤甚洛人目為蜜翁翁㑹官於塞上一夕傳胡騎犯邉師雄倉皇震恐衣皮裘兩重伏於土穴中神如痴矣秦人呼土窟為土空遽為無名子改前詩以嘲之曰昨夜隂山賊吼風帳中驚起蜜翁翁平明不待全師出連着皮裘入土空許身一何愚自比稷與契杜陵布衣老且愚信口自比稷與契其平居趨超自是唐虞上人時夸儀秦似不可曉飄飄蘇季子六印佩何遲敝裘蘇季子歴國未知還季子黒貂敝得無妻嫂欺戰國奸民蘇張為渠此老不應未喻及觀薇蕨餓首陽裘馬資歴聘賤子欲適從疑誤此二柄其意甚明前言盖戯耳䂬溪許彦周詩話云黄魯直愛與郭功甫戯謔嘲調雖不當盡信至如曰公做詩費許多氣力做甚此語切當有益於學者不可不知也詩話總龜後集巻三十八欽定四庫全書詩話總龜後集巻三十九宋阮閲撰神仙門高尚處士劉臯謂士大夫以嗜慾殺身以財利殺子孫以政事殺人以學術殺天下後世非神仙中人不能發此言也復齋漫錄熈寧中王迪為洪州左司理叅軍一日有道人來磨鏡因俾迪自照乃見星冠羽帔縹緲見鏡中迪問其故曰此汝前身也由汝悞念堕此勉自脩証勿淪苦海既去廸具以告其妻妻然之遂棄官與妻隐去郡僚挽留不可皆作詩以餞行時新建主簿劉純臣有詩雖警㧞可以記其實云髪如抹漆左叅軍脱去青衫作隐淪世上更無覊絆事壺中别有自由身鼎烹玉兎山前藥花看金鰲背上春莫怪少年能决烈藍田夫婦總登真後歸姑蘇不知所終復齋漫錄周貫自言膠東人嘗號木鴈子善屬文㳺於洪州西山嗜酒不覊布褐粗全人或贈之錢則詣酒家取醉餘皆散墜不顧西山之人見貫徃來者五十餘年而顔如初至有以道術訪之則必報以惡聲使之親近不得也熈寧元年至豫章石頭市遇故人棲止張生為具酒食而宿中夜逆旅之主人聞户外有車馬合㳫聲起而視之無有也唯貫所卧室戸正開猶奄奄然喘息就而察之貫巳死矣明日告新建縣尉呉杲卿往按之貫身潔如生扶而轉之腹中汩汩如浪鳴焉縣主簿劉純臣使人棺歛埋於地云張生還家其弟迎門曰周翁凌辰見遇今往雙嶺矣衆乃知貫非實死者也貫所著華陽二篇坐卧不離懐袖人莫得見之死日純臣取而有之純臣誦其文險絶而有條理純臣以詩記之曰八十西山作酒仙麻鞋亂斷布衣穿形骸一脱塵緣盡太極光隂不記年洪覺範冷齋夜話甞記之然互有不同復齋漫錄吾八嵗入小學以道士張易簡為師童子幾百人師獨稱吾與陳太初者太初眉山市井人子也予稍長學日益遂第進士制策而太初乃為郡小吏其後余謫居黄州有眉山道士陸推忠自蜀來云太初已尸觧矣蜀人呉師道為漢州太守太初往客焉正旦日見師道求衣食錢物且告别持所得盡與市人貧者反坐於㦸門下遂卒師道使卒舁往野外焚之卒罵曰何物道士使我正旦舁死人太初微笑開目曰不復煩汝步自㦸門至金鴈橋下趺坐而逝焚之城人見烟熖上𦕈𦕈焉有一陳道人也東坡新安聶師道宗微少事道士于方升發迹逰名山數見異人揚行密開府於揚州宗微實輔佐之盖為國師三十年楊氏末觧化而去弟子塟之舉棺惟衣履存焉順義七年楊溥贈問政先生方外之兄徳誨為新安太守乃於郡之東山築室以居方外號為問政山房問政之名或得於此苕溪漁隐曰問政山去新安郡城十許里岩谷幽䆳今有琳宇在焉國初黄台留題詩云千尋練帶新安水萬仞花屏問政山自少雲霞居物外不多塵土到人間壺懸仙島吞舟罷椀浸星宫咒水間艸暗碧潭思句曲松昏紫氣度函闗龜成錢甲毛猶綠鶴化黳翎頂更殷阮洞神仙分藥去蔡家兄弟寄書還笻枝挺柱菖蒲節筍幘高簮玳瑁斑新隐漸聞侵月窟舊林猶說枕沙灣黄精苖倒眠青鹿紅杏枝低挂白鷴海上使頻青鳥黠篋中蔵乆白驢頑手踈俗禮慵非傲肘後靈方秘不慳寶籙匣垂金縷帶絳嚢條鏁玉連環常㝷靈穴通三楚擬過流沙化百蠻容易煮銀供客用辛勤栽果與猿扳静張棊局鋪還打黙考仙經銷又刪牀並葛鞋寒兎伏窻横檉几老龍跧溪童乞火朝敲竹山鬼聴琹夜撼􅗚花氣熏心香馥馥澗聲聆耳响潺潺高墳自掩浮生骨短晷難雕不死顔早晩重逢蕭塢客願随芝盖出塵寰余以續仙傳高道傳二書考之詩中所用事多出師道本傳山谷唐末有狂道士不知何許人又晦其名氏遊成都忽詣紫極宫謁杜光庭先生求寓泊之所先生諾之而不與之進道士日貨藥於市所得錢随多少沽酒飲之惟唱感庭秋一詞其意感蜀之將亡如秋庭之衰落然人未之曉但呼為感庭秋道士凡半年人亦不知其異一夕大醉歸夜將䦨尚聞唱聲愈高有訝之者隔户窺之見燈燭綵綉筵具器皿羅列甚盛狂道士左右二青童立侍時斟酒而唱窺者具以白先生先生乃欵其户曰光庭量識膚淺不意上仙降鍳深為罪戾然不揆愚昧而匍匐門下冀一拜光靈以消塵障道士曰何辱勤拳之若是當出奉見乃令二童收筵具器皿及陳設致於前揲之則随手而小如符子狀置冠中又將二童按之如木偶可寸許又置冠中乃啟户光庭忻然而入但空室而巳高道傳唐清逺道士同沈恭予游虎丘詩曰余本長殷周遭罹歴秦漢計之至唐則二千餘嵗矣顔魯公愛而刻之且有詩曰客有神仙者於兹雅麗陳盖指為神仙也李衛公追和魯公刻清逺道士詩曰逸人綴清藻前哲留篇翰則逸人指清逺而前哲謂魯公也其後皮日休陸龜䝉軰皆和之仙耶鬼耶則不必問然僕獨愛其數句云吟挽川之隂步上山之岸山川共澄澈光彩交陵亂白雲蓊欲歸青松忽消半於乎借使非神仙一才鬼也許彦周詩話異聞集載沈既濟作枕中記云開元中道者吕翁非洞賔也盖洞賔嘗自序以為吕謂之孫仕徳宗朝今云開元則吕翁非洞賔無可疑者苕溪漁隐曰回仙嘗有詞云黄梁猶未熟夢驚殘尚用枕中記故事可見其非吕翁也靈怪集載南柯太守傳與枕中記事絶相類浮世榮枯固巳如夢矣此二事又於夢中作夢既可笑亦可歎已復齋漫錄回仙於京師景徳寺僧房壁上題詩云明月斜秋風冷今夜故人來不來教人立盡梧桐影相傳此詩自國初時即有之柳耆卿詞云愁緒終難整又立盡梧桐碎影用回仙語也古今詞話語云耆卿作傾盃秋景一闋忽夢一婦人云妾非今世人曽作前詩數百年無人稱道公能用之夣覺記其事世傳乃鬼謡也此語怪誕無可攷據盖不曽見回仙留題遂妄言耳予兄子瞻嘗從事扶風開元寺多古畫而子瞻少好畫往往匹馬入寺循壁終日有一老僧出揖之曰小院在近能一相訪否子瞻欣然從之僧曰貧道平生好藥術有一方能以朱砂化淡金為精金老當傳人而患無可傳者知公可傳故欲一見子瞻曰吾不好此術雖得之將不能為僧曰此方知而不可為公若不為正當傳矣是時陳希亮少卿守扶風而平生溺於黄白嘗於此僧求方而僧不與子瞻曰陳卿求而不與吾不求而得何也僧曰貧道非不悦陳卿畏其得方不能不為耳貧道昔嘗以方授人矣有為之即死者有遭䘮者有失官者故不敢輕以授人即出一巻書曰此中皆名方其一則化金方也公必不肯輕作但勿輕以授人如陳卿謹勿傳也子瞻許諾歸視其方毎淡金一兩視其分數不足一分輙以丹砂一錢益之雜諸藥入甘鍋中煆之鎔即傾出金砂俱不耗但其色深淺斑斑相雜當再烹之色勻乃止後偶見陳卿語及此僧遽應之曰近得其方矣陳卿驚曰君何由得之子瞻具道僧不欲輕傳人之意不以方示之陳固請不巳不得已與之陳試之良驗子瞻悔曰某不惜此方惜負此僧耳公謹為之陳姑應曰諾未幾坐受隣郡公使酒以贓收去子瞻疑其以金故深自悔恨後謫居黄州陳公子慥在黄子瞻問曰少卿昔竟嘗為此法否慥曰吾父既失官至洛陽無以買宅遂大作此然竟病指􅏴而沒乃知僧言誠不妄也後十年余謫居筠州有蜀僧儀介者師文事禪師文之所至輙為修造所費不貲而莫知錢所從來介秘其術問之不以告人介以聰禪師善密為聰言其方大類扶風開元寺僧所傳者然介未嘗以一錢私自利故能保其術而無患苕溪漁隐曰洞微志載葉生者與前事相類其以得乾銀術妄費而受禍故回仙謂沈東老云聞公自能黄白之術未嘗妄用盖嘉之也此真可為貪者之戒龍川略志呉興之東林沈東老能醸十八仙白酒一日有客自號回道人長揖於門曰知公白酒新熟逺來相訪願求一醉實熈寧元年八月十九日也公見其風骨秀偉跫然起迎徐觀其碧眼有光與之語其聲清員於古今治亂老莊浮圖氏之理無所不通知其非塵埃中人也因出酒器十數於席間曰聞道人善飲欲以鼎先為夀如何公曰飲器中惟鍾鼎為大屈巵螺杯次之而梨花蕉葉最小請戒侍人次第速斟當為公自小至大以飲之笑曰有如顧愷之食蔗漸入佳境也又約周如復始常易器滿斟於前笑曰所謂杯中酒不空也回公興至即舉杯舉白常命東老鼓琹回乃浩歌以和之又嘗圍棋以相娯止奕數子輙拂去笑曰秪恐碁終爛斧柯回公自日中至暮已飲數斗無酒色是夕月微明秋暑未退蚊蚋尚多侍人秉扇改拂偶滅一燭回公乃命取竹枝以餘酒噀之揷於逺壁須臾蚊蚋盡棲壁間而所飲之地洒然東老欲有所叩先託以求驅蚊之法回云曰且飲小術烏足道哉聞公自能黄白之術未嘗妄用且篤於孝義又多隂功此予今日所以來㝷訪而將以發之也東老因叩長生輕舉之術回公曰以四大假合之身未可離形而頓去惟死生去住為大事死知所徃則神生於彼矣東老攝衣起謝有以喻之回公曰此古今所謂第一最上極則處也此去五年復遇今日公當化去然公之所鍾愛者子階也治命時不得見之當此之際公亦先期而知謹勿動懐恐䘮失公之真性東老領而悟之飲將逹旦則瓮中所醸止留糟粕而無餘瀝矣回公曰乆不遊浙中今日為公而來當留詩以贈然吾不學世人用筆書乃就舉席上榴皮畫字題於菴壁其色微黄而漸加黒故其言有回仙人贈東老詩西隣巳富憂不足東老雖貧樂有餘白酒醸來緣好客黄金散盡為收書凡三十六年已而告别東老啟闗送之天漸明矣握手並行笑約異時之集至舎西石橋回公先度乗風而去莫知所適後四年中秋之吉東老微疾乃屬其族人而告之曰回公熈寧元年八月十九日嘗謂予曰此去五年復遇今日當化去予意明年今乃熈寧之五年也子階又適在京師干薦回公之言其在今日乎及期捐舘凡回公所言無有不驗陸元光回仙錄吾迺京兆人唐末累舉進士不第因遊華山遇鍾離傳授金丹大藥之方復遇苦竹真人方能驅使鬼神再遇鍾離盡獲希夷之妙時吾得年五十第一度郭上竈第二度趙仙姑郭性頑鈍只與追錢延年之法趙性通靈随吾左右吾惟是風清月白神仙㑹聚之時嘗遊兩浙京汴譙郡嘗着白襴角帶右眼下有痣如人間使者筯頭大世言吾賣墨飛劍取人頭吾聞乃之實有三劍一斷煩惱二斷貪嗔三斷色慾是吾之劍世有傳吾之神不若傳吾之法不若傳吾之行何以故為人若反是雖携手接武終不成道苕溪漁隐曰回仙有沁園春一闋明内丹之㫖語意深妙惜乎世人但歌其詞不究其理吾故表顯之云七返還丹在人先須煉巳待時正一陽初動中宵漏永温温鈆鼎先透簾幃造化争馳虎龍交合進火功夫尤鬭危曲江上看月華瑩净有箇烏飛當時自飲刀圭又誰信無中養就兒辨水源清濁木金間膈不因師指此事難知道要𤣥微天機深逺下手速脩尤太遲蓬萊路逺三千行滿獨步雲歸詩話總龜後集巻三十九欽定四庫全書詩話總龜後集巻四十宋阮閱撰神仙門陳東靖康間嘗飲於京師酒樓有倡打坐而歌者東不顧乃去倚欄獨立歌望江南詞音調清越東不覺傾聽視其衣服皆故弊時以手揭衣爬搔肌膚綽約如雪乃復呼使前再歌之其詞曰欄干曲紅颺綉簾旌花嫩不禁纎手捻被風吹去意還驚眉黛蹙山青鏗鐵板閒引歩虛聲塵世無人知此曲却騎黄鶴上瑶京風冷月華清東問何人製曰上清蔡真人詞也歌罷得數錢下樓亟遣僕追之已失矣出夷堅志心事數莖白髮生涯一片青山空林有雪相待野路無人自還李王好書神仙隱遁之詞豈非遭罹多故欲脫世網而不得邪東坡葛稚川神仙傳載王方平麻姑降蔡經家方平謂曰不見姑已百年矣擘麟脯行酒而蔡經竊視麻姑手如鳥爪心念曰背痒時正可爬背方任念而方平已知責經曰麻姑神人汝何忽謂其手可爬背於是鞭經背皇祐中江西有一事正類此或題麻姑壇記以嘲之曰五百年來别恨多東征重得見青蛾擘麟方擬窮歡喜不禁閑人背痒何隱居詩話劉跛子者青州人也拄一拐每歳必一至洛中看花舘范家園春盡即還京師為人談噱有味范家子弟多狎戲之有大范者見之即與二十四金曰跛子喫半角小范者即與十金喫碗羹於是以詩謝伯仲曰大范見時二十四小范見時喫椀羮人生四海皆兄弟酒肉林中過一生張丞相召自荆湖時跛子與客飲市橋客聞車騎甚盛起觀之跛子脫其衣便且飲作詩曰遷客湖湘召赴京輪蹄迎送一何榮争如與子市橋飲且免人閒寵辱驚陳瑩中甚愛之作長短句贈之曰稿朩形骸浮雲身世一年兩到京華人還乗興閒看洛陽花聞道鞓紅最好春歸後終委泥沙忘言處花開花謝不似我生涯年華留不住飢餐困寢觸處為家這一輪明月本自無瑕隨分冬裘夏葛都不㑹赤水黄芽誰知我春風一拐談笑有丹砂余政和春見於興國寺以詩戲之曰相逢一拐大梁間妙語時時見一斑我欲從公蓬島去爛銀坑裏看青山予姻家許中復之内乃趙槩叅政之孫云我十許時見劉跛子來覔酒飲笑語而去計其壽百四五十許嘗書于京師新門張婆店三十年日坐相國寺東書邸中人無識之者冷齋夜話范致虛居方城有高士舘於家自言昔乃白髮社翁遇師授以神藥今年踰下壽顔渥如丹有孺子色既乆而歸留一絶末句云莫訝杖藜歸去早舊山閒却一溪雲西清詩話賣墨者潘谷余不識其人然聞其所為非市井人也墨既精妙而價不二士或不持錢求墨不計多少與之此豈徒然者哉余嘗與詩云一朝入海尋李白空看人間畫墨仙一日忽取欠墨錢劵焚之飲酒三日發狂浪走遂赴井死人下視之盖趺坐井中手尚持數珠也見張元明說如此東坡近有人遊羅浮留一宿岩谷間中夜見一人身無衣而紺毛覆體意必仙也乃再拜問道其人了不顧但長嘯數聲響振林中歌詩云雲來萬嶺動雲去天一色長嘯兩三聲空山秋月白西清詩話張亶熈寧中夣行人入空中聞天風海濤聲振林朩徐見海中樓闕金碧瓊琚琅珮者數百人揖亶出紙請賦詩細視筆硯皆碧玉色且戒之曰此間文章要似隱起鸞鳯當與織女機杼分巧過是乃人間語耳亶成一絶句云天風吹散赤城霞染出連雲萬樹花誤入醉鄉迷去路傍人應笑忘還家有仙人曰子詩佳絶未免近凡酌酒一盃極甘寒忽覺身墮萬仭山而寤同上䖍州布衣頼仙芝言連州有黄損僕射者五代時人僕射盖事南漢未老退歸一日忽遁去莫知其存亡子孫畫像事之凡三十二年復歸坐作階上呼家人其子適不在孫出見之索筆書壁上云一别人間歳月多歸來人事已消磨惟有門前鑑池水春風不改舊時波投筆竟去不復㽞子歸問其狀貌孫云甚似影堂老人也無異相傳如此後頗有仕進者東坡太學體逺齋饒州一士人遇遊道士道士本里人化去已多年一日來客位相訪約士人請假歸齋假簿中有詩一絶乃道士所書也詩云相别來來一百秋幻泡重作故人遊紫泥白雪尋常事何苦人間待不休今是堂手録鍾弱翁帥平凉一方士通謁從牧童牽黄犢立於庭下弱翁異之指牧童曰道人頗能賦此乎笑曰不煩我語是兒能之牧童乃操筆大書云草鋪横野六七里笛弄晩風三四聲歸來飽飰黄昏後不脫蓑衣卧月明既去郡人見方士担兩大甕長歌出郭迹之不見兩甕乃二口豈洞賔耶西清詩話囬先生過湖州東林沈氏飲醉以石榴書其家東老庵之壁云西鄰已冨憂不足東老雖貧樂有餘白酒釀來縁好客黄金散盡為收書東老沈氏之老自謂也余次其韻云世俗何知貧是病神仙可學道之餘但知白酒留佳客不問黄公覔素書符離道士辰興際華岳先生尸解餘忽見黄庭丹篆句猶傳青紙小朱書凄凉雨露三年後彷彿塵埃數字餘至用榴皮縁底事中書君豈不中書山谷云秋風吹渭水落葉滿長安黄塵車馬道獨清閒自然爐鼎虎繞與龍盤九轉丹砂就琴心三叠蕋珠看舞胎仙便萬釘寶帶貂蟬冨貴欲熏天黄糧吹未熟夣驚殘是非海底直道作人難䄂手江南去白蘋紅蓼再遊湓浦廬山徃三年有人書此曲於州東茶園酒肆之柱間或愛其文指趣而不能歌也中間樂工或按而歌之輒以俚語竄語晬然有市井氣不類神仙中人語也十年前有醉道士歌此曲廣陵市上童兒和之乃合其故時語此道士去後乃以物色蹤跡之知其為吕洞賔也苕溪漁隱曰近時吳江長橋埀虹亭屋山壁上草書一詞人亦為吕仙作其果然耶詞曰蜚梁欹水虹影清光曉橘里漁鄉半烟草看來今徃古物是人非天地裏惟有江山不老雨衣風帽四海誰知道一劍横空幾畨到按玉龍嘶未斷月冷波寒歸去也琳宇洞天無鏁指雲屏烟嶂是吾廬但滿地蒼苔年年不掃東坡知制誥李大臨西川人有門人背傴不能仰視因以藥市罷見一道士云秀才有錢丐一二百為酒資書生云家貧無錢所居有薄釀同一醉可乎道士欣然便往酒半道士問何故背傴書生言不幸遇此疾無如之何道士因出藥三十粒云來日五更面東以新汲水下覺㣲燥不足怪書生如所教既服藥燥甚不可勝展轉於榻上亦甚悔之然每一伸縮漸覺舒快比明身已直矣蜀人重藥市盖常有神仙之遇焉文昌雜録予治平末沂峽還蜀泊舟仙都山下有道士以陰真君長生金丹訣石本相示予問之曰子知金丹訣邪道士曰不知也然士大夫過此必以問之庻有知之者予佳其意試問以燒煉事對曰飬生有内外精氣内也非金石所能堅凝四支百骸外也非精氣所能變化欲事内必調養精氣極其厚内丹成則不能死也然隱居人間乆或托尸假而去求變化輕舉不可得也盖四大本外物和合而成非精所能易也惟外成然後可以㸃瓦礫化皮骨飛行無碍矣然内丹未成内無以交之則服外丹者多死譬積枯草弊絮而置火其下無不焚者予甚善其說告之曰昔人有服金丹不幸赴井而死既而五臟皆化為黄金者又有服玉屑死於盛夏而尸不敗壞者皆無内丹以主之也子之說信然哉後十餘年官于南京張公安道家有一道人陜人也為公養金丹其法用紫金丹砂費數百千期年乃成公喜告予曰吾藥成可服矣予謂公何以知其藥成公曰抱朴子言藥既成以手握之如泥出指間者藥真成也今吾藥如是以是知其成無疑也予為公道仙都所聞謂公曰公自知内丹成則此藥可服若猶未也姑俟之若何公笑曰我姑俟之龍川畧志詩話總龜後集巻四十欽定四庫全書詩話總龜後集巻四十一宋阮閲撰歌詠門熈寧間奉詔定蜀楚秦民三家所献書得一弊紙所書花蕊夫人詩三十二首乃夫人親筆而辭甚奇與王建宫詞無異自唐至今誦者不絶口而此獨遺弃不見取前受詔定三家書者又拆去之甚可惜也謹令繕冩入三舘而歸口誦數篇於丞相安石明日與中書語及之而王珪馮京願傳其本於是盛行於世夫人偽蜀孟昶侍人事具國史苕溪漁隱曰余閲此詞如龍池九曲遠相通楊桞絲牽兩岸風長似江南好風景畫船來往碧波中黎園弟子簇池頭小樂携來候宴遊試炙銀笙先按拍海棠花下合梁州月頭支給買花錢滿殿宫人近數千遇著唱名多不語含羞走過御床前内人追逐採蓮時驚起沙鷗兩岸飛蘭槳把來齊拍水並船相鬬濕羅衣厨船進食簇時新侍坐無非列近臣日午殿頭先索膾隔花催喚打漁人皆清婉可喜花蕊又别有逸詩六十六篇有近世好事者旋加搜索續之篇次無倫語意與前詩相類者極少誠為亂真矣聊摘其一二云羅衫玉帶最風流斜揷銀箆慢裹頭閒向殿前騎御馬掉鞭横過小紅樓春日龍池小宴開崕邊亭子號流盃沉檀刻作神仙女對捧金盃水上來王平甫周世宗時陶尚書穀奉使江南韓熈載遣家妓奉盥匜及且有書謝畧云巫山之麗質初臨霞侵鳥道洛浦之妖姿自至月滿鴻溝舉朝不能㑹其辭熈載因召家妓訊之云是夕忽當浣濯焉緗素雜記唐高宗燕群臣賞䨇頭牡丹詩上官昭容一聨云勢如連璧友情若臭蘭人計之必一英竒女子也許彦周詩話東坡後集有題織錦圖上囬文其一云春晩落花餘碧草夜凉低月半枯桐人隨遠雁邊城暮雨映踈簾綉閣空其二云紅手素絲千字錦故人新曲九廽腸風吹絮雪愁縈骨涙洒縑書恨見郎其三云羞看一首廽文錦錦似文君别恨深頭白自吟悲賦客斷絃愁是斷弦琴淮海集載東坡䟦云余少時見一江本其後有人題詩十餘首皆奇絶今記其三首然則此詩非東坡所作也少游又云子瞻記江南所題詩本不全余嘗見之記其五絶今以補子瞻之遺即叢話前集所載廽文詩五首是也世以為少遊所作亦非也苕溪漁隱蘇蕙織錦囬文詩所傳舊矣故少常沈公復傳其畫繇是若蘭之才益著然其詩囬旋書之讀者唯曉外繞七言至其中方則漫弗可考矣若沈公之博古亦謂辭句脫讀不成文殊不知此詩織成本五色相宣因以别三四五七言之異後人流傳不復施采故迷其句讀非辭句之脫畧也政和初予在洛陽於王晉玉許得唐程士南效此並申諴之釋而後曉然是詩初不舛脱盖沈公未嘗見此本耳然申諴所釋但依士南之設色其七言數火其色反黄四言數金其色反緑於五行為弗類意蘇氏詩圗之色為不然耳今因冠詩于畫遂别而正之三四五七言之詩各隨其所行而為之色觀者見其色則詩之言數可知巳至於士南之文既有釋者則賦採自從其舊而並録於其首云東觀餘論載璇璣圖序云前秦安南將軍竇滔有寵姬趙陽臺歌舞之妙無出其右滔置之别所妻蘇知之求而獲焉苦加撻辱滔深恨之陽臺又專伺蘇之短䜛毁交至滔益忿蘇氏年二十一滔鎮襄陽與陽臺之任絶蘇氏之音問蘇悔恨自傷因織錦囬文題詩二百餘首記八百餘字縱横反覆皆為文章名曰璇璣圖遣蒼頭賫至襄陽滔覽錦字感其妙絶因送陽臺之關中而具車從迎蘇氏恩好為重苕溪漁隱曰王白寮有㸃絳唇一詞送韓濟之歸襄陽云峴首亭空勸君休墮羊碑涙宦遊如寄且伴仙翁醉說與鮫人莫解江臯珮將歸思暈紅縈翠袖織囬文字初寮用事以其漢上故然於送人之詞似難用也侍兒小名録南齊羊侃性豪侈舞人張靜婉腰圍一尺六寸能掌上舞唐人作楊桞枝辭曰認得羊家静婉腰後人除却家字只使羊静婉誤矣李太白云子夜吳歌動君心李義山云鶯有子夜歌晉有子夜女善歌非當時可及也許彦周詩話古今詩人詠媍人者多以歌舞為稱梁元帝妓應令詩云歌清隨澗響舞影向池生劉孝綽看妓詩云燕姬臻妙舞鄭女愛清歌北齊蕭放冬夜對妓詩云歌還團扇後舞出妓行前𢎞執㳟觀妓詩云學舞俱囬雪分歌共落塵陳陰鑑侯司空宅咏妓詩云鶯啼歌扇後花落舞衫前陳劉刪亦云山邊歌兩日池上舞前溪庾信趙王看妓詩緑珠歌扇薄飛燕舞衫長江總看妓詩云並歌時轉黛息舞暫分香隋盧思道夜聞隣妓詩怨歌聲易斷妙舞態難收陳元璪春園聽妓詩云紅樹揺歌扇緑珠飄舞衣釋法宣觀妓云舞袖風前舉歌聲扇後嬌王勣咏妓詩云早時歌扇薄今日舞衫長劉希夷春日閨人詩云池月憐歌扇山雲愛舞衣以歌對舞者有以歌扇對舞衣者亦每雖相縁以起然詳味之自有工拙也杜子美取以為艶曲云江清歌扇底野曠舞衣前復齋漫録緑珠井在白州䨇角山下昔梁氏之女有容貎石季倫為交趾採訪使以真珠三斛買之梁氏之居舊井存焉耆老云汲飲此井者誕女必多美里閭以美色無益於是遂以巨石填之苕溪漁隱曰山谷詩云欲買娉嬣供煮茗我無一斛明月珠用此事也太平廣記石季倫王明君辭云延我以穹廬加於閼氏名閼氏單于妻也上烏前下章移切前漢匈奴傳曰冒頓後有爰閼氏生少子顔注閼氏匈奴皇后號劉貢父云匈奴單于號其妻為閼氏耳顔便以皇后解之大俚俗也西河紀事云失我祁連嶺使我六畜不蕃息失我焉支山使我媍人無顔色盖北方有焉支山山多紅藍北人採其花染緋取其英鮮者作胭脂媍人粧時用此顔色殊鮮明可愛匈奴名妻閼氏言可愛如胭脂也錢昭度作王昭君詩云閼氏纔聞易妾名歸期長似俟河清則誤讀氏字為姓氏之氏矣藝苑雌黄古今辭人作明妃辭曲多矣意皆一律惟吕居仁獨不蹈襲其詩云人生在相合不論胡與秦但取眼前好莫言長苦辛君看輕薄兒何殊胡地人苕溪漁隱韓子蒼題昭君圖詩寄語䨇髪負薪女炙面謹勿輕離家余考唐逸士傳云昭君村至今生女必炙其面白樂天詩至今村女面燒灼成瘢㾗乃知炙面之事樂天已先道之也復齋漫録漢書竟寧元年呼韓邪來朝言願壻漢氏元帝以後宫良家子王昭君字嬙妃之生一子株累立復妻之生二女至范蔚宗始言入宫久不見御積怨因掖庭令請行單于臨辭大㑹昭君豐容靚餙顧影徘徊竦動左右帝驚悔欲復㽞而重失信夷狄然蔚宗不言呼韓願壻而言四五宫女又言字昭君生二子與前書皆與之其言不願妻其子而詔使從胡俗此自烏孫公主非昭君也西京雜記又言元帝使畫工圖宫人皆賂畫工而昭君獨不賂乃惡圖之既行遂誅毛延壽琴操之按又言本齊國王穰女端正閑麗未嘗窺看門户穰以其異人求之不與年十七進之帝以地遠不幸欲賜單于美人嬙對使者越席請往後不願妻其子呑藥而卒盖其事雜出無所攷正自信史書尚不同况傳記乎要之琴操最牴牾矣按昭君南郡人今秭歸縣有昭君村村人生女必灼艾炙其面慮以色選故也昭君卒葬匈奴謂之青塜晉以文王諱昭號明妃云韓子蒼昭君圖叙詩話總龜後集巻四十一欽定四庫全書詩話總龜後集巻四十二宋阮閲撰鬼神門昔年陳州有女妖自云孔大娘能昏夜於鼓腔中與人語言尤知未來事時晏元憲守陳方製小辭一闋脩改未定而孔大娘巳能歌之矣亦可怪也長安慈恩寺有數女仙夜遊題詩云黄子陂頭有月明強踏華筵到曉行烟波山色翠黛横折得落花遠恨生化為白鶴飛去明夜又題一首湖水團團夜如鏡碧樹紅花相掩映北斗闌干移曉柄有似佳期常不定亦婉約可愛許彦周詩話請紫姑神大抵能作詩然不甚過人舊傳一士人家請之既降偶書院中子弟作雨詩因率爾請賦頃刻書滿紙其警句云簾捲滕王閣盆翻白帝城誠可喜也同上雪齋廣録載司馬槱官于錢塘夢蘇小小歌蝶戀花詞一闋其詞頗佳詞云妾在錢塘江上住花開花落不記流年度燕子却㗸春色去黄昏幾度蕭蕭雨蟬鬂犀梳雲欲吐檀板新聲唱徹黄金縷酒醒夢囬無覔處凄凉明月生秋圃苕溪漁隱魯直記江亭鬼所題詞有涙眼不曾晴之句余以此鬼剽東坡樂章有秋雨晴時涙不晴之語復齋漫録東坡記秦少游言寶應民有嫁娶㑹客者酒半客一人徑赴水曰有媍人以詩招我詩云長橋直下有蘭舟破月冲烟任意遊金玉滿堂何所用爭如年少去來休余讀張君房脞說進士謝朏寓居寶應晩至縣橋忽見女郎自舟中出曰某楚小陂也可見訪舟中懷中出詩二首其一云畫橋直下是蘭舟破月冲烟任意遊金玉滿堂無用處早隨年少去來休其二云妾貎君才兩不常君今休苦更思啇兒家自有清溪水飲着方知氣味長前篇與少游所言不同者數字更有二首為異至謂寶應亦同君房著脞説在真廟時不應東坡少游之妄也復齋漫録余讀江南録丘孟陽有賦名嘗夢一官人延入一第中具飲其旁几上有書一巻孟陽展讀謂曰斯乃吾所述賦藁何至兹乎其人曰昔公焚之時吾得之矣孟陽因就求之荅曰它日若至衡山必當奉還後官至衡州茶陵令乞致仕卒於衡州今世焚故書必毁而燔之盖可信也文昌雜録吕申公夷簡嘗通判蜀中忘其郡名廨宇中素有鬼物號榆老姑乃榆木精其狀一老醜婦常出厨間與羣婢相偶或時不見家人見之久亦不以為怪公呼問之即下堦拜之云妾在宅日久雖非人然不為禍公亦置而不問常謂公他日必大貴一日忽懷姙羣婢戲之自言非乆當產遂月餘忽不見出云已產矣請視之後園榆朩西南生大贅乃是視之果然見聞録東坡記徐州通判李綯有子年十七八不善作詩忽咏落花云流水難窮目斜陽易斷腸誰同砑光帽一曲舞山香人驚問之若有物慿者云是謝中舍問其砑光帽事自云西王母宴羣仙有舞者戴砑光帽帽上簮花舞山香一曲未終花皆落去余讀唐羯鼔録汝陽王璡明皇愛之乃隨遊幸璡常戴砑綃帽子打曲上自摘紅槿花一朶置之帽上遂奏舞山香一曲花不落墜上笑此事與前極相類復齋漫録陳甲為成都守李西美璆舘客舍于治事堂東偏之䨇竹齋紹興二十一年四月西美浣花囬得疾旬日間甲已寢聞堂上婦人語笑聲即起應門窺觀有女子十餘皆少艾有容色而衣結束頗與世俗異或坐或立或歩庭中甲猶疑其為帥家人以主人翁病輙出但怪其多也頃之一人曰中夜無以為樂盍賦詩乎即口占曰晩雨簾纎梅子黄晩雲捲雨月侵廊陰房把酒不成飲識者無情更斷腸一人應聲荅之曰舊時衣服盡雲霞不到迎仙不是家今日樓臺渾不識祗因古朩記宣華餘人方綴思甲味其詩語不類人方悟為鬼物忽寂無所見後以語蜀郡父老皆云孟氏有國時嘗造宣華殿於摩訶池上今郡堂乃其故趾所見之鬼妾云西美病遂不起夷堅志魯直自黔安出峽登荆州江亭杜間有詞曰簾捲曲䦨獨倚江展暮天無際涙眼不曾晴家在吳頭楚尾數㸃雪花亂委撲漉沙鷗驚起詩句始成時沒入蒼烟叢裏魯直讀之悽然曰似為予發也不知何人所作所題筆勢妍媚欹斜類女子而有眼涙不曽晴之句不然則是鬼詩也是夕有女子絶艶夢於魯直曰我家豫章吳城山附客舟至此墮水死不得歸登江亭有感而作不意公能識之魯直驚寤謂所親曰此必吳城小龍女也冷齋夜話長安南山下一書生作小圃蒔花木一日有金犢車從數女奴皆艶麗下飲于庭邀生同坐甚欵洽將别出小碧牋題詩曰相思無路莫相思風裏楊花一片時惆悵深閨獨歸處曉鶯啼斷緑楊枝侯鯖録張磪嘗游霅上白蘋洲見碧衣女子携手吟咏一篇云碧水色堪染白蓮香正濃分飛俱有恨此别幾時逢藕隱玲瓏玉花藏縹緲容何當假䨇翼聲影暫相從磪逐之化為翡翠飛去樹萱録番禺鄭僕射嘗游湘中宿於馹樓夜遇女子誦詩云紅樹醉秋色碧溪彈夜絃佳期不可再風雨杳如年頃刻不見樹萱録明月清風良宵㑹同星河易翻歡娛不終緑罇翠杓為君斟酌今時不飲何時歡樂此廣記所載鬼詩也山谷云當是鬼中曹子建所作翰林蘇公以為然又一篇云玉戸金缸願陪君王邯鄲宫中金石絲簧鄭女衞姫左右成行紈綺繽紛翠眉紅粧王歡轉盻為王歌舞願得君歡長無災苦蘇公以為邯鄲宫中金石絲簧此兩句不惟人少作而知之者亦極難得耳醉中為余書此張文潜見坡谷論説鬼詩忽曰舊時鬼作人語如今人作鬼語二公大笑王直方詩話東坡作䖍州八境詩曰山中木客觧吟詩十道四蕃志記䖍州上落山有木客鬼與人交甚信未嘗言能作詩也後得續法帖記木客詩云酒盡君莫沽壺傾我當發城市多囂塵還山弄明月方知得句之因徐鉉謂鄱陽山中有木客自言秦時造阿房宫采木者豈鉉未嘗見十道四蕃志也漫叟詩話春草萋萋春水緑野棠開盡飄香玉綉嶺宫前白髪人猶唱開元太平曲忽然湖上片雲飛不覺舟中雨濕衣折得荷花渾忘却空將荷葉盖頭歸浦口潮來初渺漫蓮舟溶漾採花難芳心不愜空歸去㑹待潮囬再摘看爺娘送我青楓根不記青楓幾回落當時手刺衣上花今日為灰不堪著惆悵金泥撲蝶裙春來猶見伴行雲不教布施剛㽞得恰似知逢李少君卜得上峽日秋江風浪多巴陵一夜雨腸斷木蘭歌余與魯直壽朋天㑹于伯時齋舍此一巻皆仙鬼所作或夢中所作也又記太平廣記中有人為鬼物所引入墟墓皆華屋洞戸忽為刼墓者所驚出遂失所見但云莞花半落松風晩清吾每愛此兩句東坡酉陽雜爼載鬼詩兩篇山谷喜道之其一曰長安女兒踏春陽無處春陽不斷腸舞䄂弓彎渾忘却娥眉空帶九秋霜其二曰流水涓涓芹弩芽織鳥䨇飛客還家荒村無人作寒食殯宫空對海棠花洪駒父詩話李真言字希古嘗夢至一宫殿有數百妓抛毬人唱一詩覺而記三首云侍宴黄昏未肯休玉堦夜色月如流朝來自覺承恩最笑倩傍人認綉毬隋家宫殿鎻清秋曽見嬋娟颺綉毬金鑰玉簫俱寂寂一天明月照髙樓堪恨隋家幾帝王舞腰挼盡綉鴛鴦如今重到抛毬處不是金爐舊日香今古詩話中載此詩只有一首不及此詳偹故盡録之詩話總龜後集巻四十二欽定四庫全書詩話總龜後集巻四十三宋阮閲撰釋氏門坡贈辯才云我比陶令愧公為遠公優時辯才退居未嘗出入坡徃見之遂出至風篁嶺又云如使北山人求記二老游用老杜寄賛上人與子成二老來徃亦風流皆一儒一釋也又寄参寥問少游失解云底事秋來不得解定中試與問諸天盖劉禹錫和宣上人賀王侍郎放榜後詩云借問至公誰可印支郎天眼定中觀不惟兼具儒釋又正属科塲事其不泛如此䂬溪詩話夢得送僧君素云去來皆是道别此不消魂東坡云古今正自同嵗月何必書此等語皆通徹無碍釋氏所謂具眼也同上端師子始見弄師子者發明心要則以綵帛像其皮時時著之因以為號秦少游聞其髙道請陞座端以手自指曰天上無䨇月人間只一僧一堂風冷笑千古意分明少游首肯之能誦法華經必得錢五百乃開秩目誦數句即持錢地坐去其缺薄者易之而去好歌漁父詞月夕必歌之逹旦有狂僧囬頭和尚以左道鼔動流俗士大夫亦安其妄方對丹陽吕公肉食端徑至指曰正當與麽時如何是佛囬頭不能遽對端捶其頭推倒乃行又有妖人號不托掘秀州城外地有佛像建塔其上傾城敬信端見堪住曰如何是佛不托擬議端趯之而去章相子厚請陞座使余秀老撰䟽叙其事曰推倒囬頭趯飜不托七軸之蓮經未誦一聲之漁父先聞端聽僧官宣至此以手揶揄曰止乃引聲吟曰本是瀟湘一釣客自東自西自南北大衆雜然稱善端顧大笑曰我觀法王法法王法如是下座僧寶傳釣魚船上謝三郎䨇鬂已蒼蒼莎衣未必清貴不肯换金章汀草畔浦花旁靜鳴榔自來好箇漁父家風一片瀟湘金華俞秀老作此篇道人多傳之非道意岑寂其語不應如是苕溪漁隱曰傳燈録云𤣥沙福州閩縣人姓謝氏㓜好垂釣泛小艇於南臺江狎諸漁者年甫三十忽慕出塵乃弃釣艇投芙蓉山訓禪師落髪用此事也山谷冷齋夜話謂道潜作詩追法淵明其詩有逼真處曰數聲柔櫓蒼茫外何處江村人夜歸又曰隔林彷彿聞機杼知有人家在翠微余細細味之句格故佳但異淵明語豈得謂之逼真處若東坡和陶詩前山正可數後騎且勿驅此方是逼真處德洪不善評詩此豈足慿哉苕溪漁隱師住天䑓梅子真舊隱一僧入山迷路問曰和尚在此山多少時也師曰只見四山青又黄又問出山路甚麽處去師曰流水可隨去僧歸說似䀋官䀋官令僧去請出山師有偈云摧殘枯木倚寒林幾度逢春不變心樵客遇之猶不顧郢人那得苦追尋大寂聞師住山乃令一僧到問曰和尚見馬師得箇甚麽便住此山師云馬師向我道即心是佛我便向遮裏住僧云馬師近日佛法又别師云作麽生别僧云近日又道非心非佛師云遮老漢惑亂人未有了曰任汝非心非佛我只管即心即佛其僧逥舉似馬祖又云大衆梅子熟也苕溪漁隱曰韓子蒼送僧住梅山詩云寺聞岑寂知何許想到千岩萬壑開待得梅山梅子熟不辭先寄一枝來用前事也傳燈録梵志翻著襪人皆道是錯乍可刺爾眼不可隱我脚一切衆生顛倒皆類如此乃知梵志是大脩行人也昔茅容季偉田家子爾殺鷄飯其母而以草具飯郭林宗林宗起拜之因勸使就學遂為四海名士此飜著襪法也今人以珍饌奉客以草具奉其親渉世合義義則與已不合義則稱親萬世同流皆季偉之罪人也山谷王梵志明州妙音僧法淵為人陽狂日飲酒市肆歌笑自如匄錢於人得一錢即欣然以為欣得之多復與道路廢疾窮者能言人禍福無不騐人疑其精於術數故號淵三命發言無常及問之掉頭不荅惟云去又有䘮之家必徃哭之葬則送之無貧富皆徃莫測其意人以其狂又號顛僧大覺禪師初徃育王開堂僧掘然出問話人莫不竊笑大覺問顛僧是顛了僧僧了顛荅曰大覺是大了覺覺了大大覺黙然衆皆驚愕一日忽於市相羊持酒一壺至郡守宅前㨿地而飲觀者千餘人酒盡懷中出頌一首欲化去衆皆引聲大呼云不可於此遂歸妙音趺坐而化頌曰咄咄平生顛蹶欲問臨行爐中大雪真相至今存焉三山老人語録蓬州道士賈善翔字鴻舉能劇談善琴嗜酒士大夫喜與之遊東坡嘗過之献書問曰身如芭蕉心如蓮花百節踈通萬竅玲瓏來時一去時八萬四千末云鴻舉下語賈荅曰老道士這裏沒許多般數張天覺䟦其後云去時八萬四千不知落在那邊若不斬頭覔活誰知措大叅禪東皋雜録太白夜懷有句云宴坐寂不動大千入毫髪潘祐獨坐有句云凝神入混茫萬又成虛空予愛二才子吐辭精敏之力等入道深宻之狀同合而書之聊資以用法藏碎金近時僧洪覺範頗能詩其題李愬畫像云淮隂北面師廣武其氣豈止吞項羽公得李祐不肯誅便知元濟在掌股此詩當與黔安並驅也頃年僕在長沙相從彌年其他詩亦甚佳如云含風廣殿聞棋響度日長廊轉桞隂頗似文章巨公所作殊不類衲子又善作小詞情思婉約似秦少游至如仲殊参寥雖名世皆不能及許彦周詩話城外土饅頭饀草在城裏一人吃一箇莫嫌沒滋味巳且為土饅頭尚誰食之今改預先着酒澆使教有滋味山谷王梵志余在臨川景德寺與謝無逸軰升閣得禪月所畫十八應供像甚竒而失第五軸予口占嘲之曰十八聲聞解埵闕少叢林漢亂山門不知何處羅齋去不見雲堂第五尊明日有女子來拜叙曰兒南營兵妻也寡而食素夜夢一僧來言曰我北景德僧因行失隊煩相引歸寺可乎既夢而鄰家邀飯入其門見壁間有畫異僧形像了然夢中所見也時朱世英守臨川異之使迎還閣藏之冷齋夜話元豐間嘗乆旱裕陵禁中齋禱甚力一夕夢有僧乗馬馳空中口吐雲霧既覺而雨大作翌日中貴人道夢中所見物色於相國寺三門五百羅漢中至第十三尊略彷彿即迎入内觀之正所夢也王丞相禹玉作喜雨詩云良弼為霖辜所望神僧吐霧應精求元叅厚之云仙驥籋雲穿仗下佛花吹雨布天流盖記此事相國寺羅漢本江南李氏時物在廬山東林寺曹翰下江州盡取其城中金帛寶貸連百餘舟私盗以歸無以為名乃取羅漢每舟載十許尊獻之詔因賜相國寺當時謂之押綱羅漢石林詩話魯直使予對句云呵鏡雲遮月對曰啼粧露看花魯直罪予於詩深刻見骨不務含蓄予竟不曉此論冷齋夜話僧寶傳覺範所撰也但欲馳騁其文徃徃多失事實至於作賛又雜以詩句此豈史法示褒貶之意也哉其詩云行盡湘西十里松到門却立數諸峯崇公事跡無尋處庭下春泥見虎蹤又云廬山殿閣如生成食堂䖏處禪牀折我自三門如冷灰盡日長廊巻風葉又為竒語云如月照衆水波波頓見而月不分如春行萬國處䖏同時而春無跡但其才性競爽見於言語文字間若於禪門本分事則無之也苕溪漁隱前軰好稱僧悟清鳥歸花影動魚沒浪㾗圓以為句意皆新然余讀後梁沈君攸臨水詩云花落圓紋出風急細流翻乃知魚浪㾗圓之句出於此也復齋漫録泉州僧慶老有詩云交情老去淡如水病骨秋來瘦作松真方外語也詩說汪彦章龍溪集有霜餘溪上四絶癩可東溪集亦有霜餘溪上五絶内四絶即龍溪集中詩但一絶不是所謂故人江北江南岸者餘皆同之不知竟誰作邪四絶中其一云水似秋蛇巧作蟠山如濃翠擁髙鬟清風明月元無主乞我烟蘿茅數間味清駃可愛苕溪漁隱詩話總龜後集巻四十三欽定四庫全書詩話總龜後集巻四十四宋阮閲撰釋氏門予謫海外上元椰子林中漁火三四而已中夜聞􅆐聲悽動作詞曰凝祥宴罷聞歌吹畫轂走香塵起冠壓花枝馳萬騎馬行燈閙鳯樓簾捲陸海鰲山對當年曾看天顔醉御杯舉歡聲沸時節雖同悲樂異海風吹夢嶺猿啼月一枕思歸淚又有懷京師詩云十分春瘦縁何事一掬歸心未到家苕溪漁隱曰忘情絶愛此瞿曇氏之所訓惠洪身為衲子詞公有一枕思歸淚及十分春瘦之語豈所當然又自載之詩話矜衒其言何無識之甚邪冷齋夜話徃年余宰分寧覺範從高安來舘之雲嵓寺寺僧三百各持一幅紙求詩於覺範覺範斯須立就余見之不懌曰詩當少加思豈若是容易乎覺範笑曰取適吾意而已相别十年覽其遺編追記平生不覺隕淚余欲刪去冗長定取精深數十百首仍為作序以示世人老懶未睱也僧中初無其詩眼者巳刻版書肆每以為恨韓子蒼已收一霎掛龍雨勿起千岩攧鷂風掛龍對攧鷂皆方言古今人未嘗道又云麗句妙於天下白髙才俊似海東青又云文如水行川氣如春在花皆竒句也雪浪齋日記云余至瓊州劉家叟方飲於張守之席三鼔云遣急足來覔長短句欲問叙何事䝉叟視燭有蛾撲之不去曰為賦此急足反走持紙曰急為之不然獲譴也余口授吏書之曰宻燭花光清夜闌粉衣香翅遶團團人猶認假為真實蛾豈將燈作火看方歎息為遮䦨也知愛處實難􅂸忽然性命隨烟熖始覺從前被眼瞞蒙叟醉笑首肯之既北渡夜發海津又贈行為之詞曰一叚文章種性更謫仙風韻畫㦸叢中清香凝宴寢落日清寒落花信愁似海洗光明錦後夜歸舟雲濤喧醉枕冷齋夜話東坡長短句村南村北響繅車參寥詩云隔林彷彿聞機杼知有人家在翠微秦少㳺菰蒲深處疑無地忽有人家笑語聲三詩大周小異皆竒句也高齋夜話吳僧道潜有標置常自姑蘇歸西湖經臨平道中作詩云風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀州東坡赴官錢塘過而見之大稱賞已而相尋於西湖一見如舊相識及坡移守東徐潜徃訪之舘於逍遥堂士大夫争識之東坡饌客罷畧而俱來紅粧擁隨之東坡遣一妓前乞詩潜援筆而成曰寄語巫山窕窈娘好將魂夢惱襄王禪心已作沾泥絮不逐春風上下狂一坐大驚自是名聞海内然性褊憎凡子如仇嘗作詩曰去歳春風上國行爛窺紅紫厭平生而今眼底無姚魏浪蕋浮花懶問名士論以此少之道潜作詩追法淵明其語有逼真處曰數聲柔櫓蒼茫外何處江村人夜歸又曰隔林彷彿聞機杼知有人家在翠㣲時從東坡在黄州士大夫以書扺坡曰聞日與詩僧相從豈非隔林彷彿聞機杼者乎真東山勝游也坡以書示潜誦前句笑曰此吾師七字師號冷齋夜話華亭船子和尚有偈曰千尺絲綸直下埀一波纔動萬波隨夜静水寒魚不食滿船空載月明歸叢林盛傳想見其為人山谷倚曲音歌成長短句曰一波纔動萬波隨蓑苙一鈎絲金鱗正在深處千尺也須垂吞又吐信還疑上鈎遲水寒江静滿目青山載月明歸冷齋夜話靈徹詩僧中第一如海月坐殘夜江春入暮年窻風枯硯水山雨慢琴絃經來白馬寺僧到赤烏年前軰評此詩云轉石下千仭江雪浪齋日記唐李憕之子源以父死王難不仕居洛陽惠林寺與僧員澤遊一日相約遊峨嵋山源欲泝峽澤欲取斜谷路源不可曰吾巳絶世事豈可復道京師哉舟次南浦見㜏人錦襠負甕而汲者澤望而泣曰吾不欲由此者為是也源驚問之澤曰媍人姓王氏吾當為子孕三歳矣吾不來故不得乳今既見無可逃者三日浴兒時願公臨我以一笑為信後十二年杭州天竺寺外當與公相見至暮澤亡婦乳三日源望視之兒見源果笑源後適吳赴其約聞葛洪川畔有牧童扣牛角而歌曰三生石上舊精魂賞月吟風不要論慙愧情人遠相訪此身雖異性長存問澤公徤否荅曰李公真信士又曰身前身後事茫茫欲話因縁恐斷腸吳越山川尋巳徧却囬烟棹上瞿塘遂去不知所之東坡詩云欲向錢塘訪員澤葛洪波畔帯秋深即此事也甘澤謡遠法師居廬山下持律精苦過中不受蜜湯而作詩换酒飲陶彭澤送客無貴賤不過虎溪而與陸道士行過虎溪數百歩大笑而别故禪月作詩云愛陶長官醉兀兀送陛道士行遲遲買酒過溪皆破戒斯何人斯師如斯故效之㽞陶淵明把酒椀送陸修静過虎溪胷次九流情似鏡人間萬事醉如泥山谷文殊問無著近離甚處著云南方殊云南方佛法如何多少著云或三百或五百者問此如何住持殊云凡聖同居龍蛇渾雜著云多少衆殊云前三三後三三雪竇頌曰千峰盤屈色如藍誰謂文殊是對潭堪笑清凉多少衆前三三與後三三傳燈録大覺懷璉禪學外工詩荆公與之㳺嘗以其詩示歐公曰此道人作肝臟饅頭也荆公不悟其戯問其意歐公曰是中無一㸃菜氣璉䝉仁廟賞識留住東京静因禪院甚久嘗作詩進呈乞還山林曰千簇雲山萬壑流閑身歸老此峰頭殷勤願祝如天壽一炷清香滿石樓又曰堯仁况是如天闊乞與孤雲自在飛冷齋夜話東坡言僧詩要無蔬筍氣固詩人龜鑑今時悞解便作世網中語殊不知本分家風水邊林下氣像盖不可無若盡洗去清㧞之韻便與俗同科又不足尚齊巳云春深遊寺客花落閉門僧惠崇云曉風飄磬遠暮雪入春深之句華實相副顧非佳句邪天聖間閩僧可士有送僧詩云一缽即生涯隨縁度歲華是山皆有寺何處不為花笠重吳天雪鞋香楚地花他年訪禪室寧憚路途賖亦非食肉者能到也西清詩話西湖僧清順頥然清苦多佳句嘗賦十竹詩曰城中寸土如寸金幽軒種竹只十箇春風慎勿長兒孫穿我堦前緑苔破又有乆服林下遊頗識林下趣從渠緑隂繁不碍清風度閑行石上眠落葉不知數一鳥忽飛來啼破幽絶處荆公遊湖上愛之乃稱揚其名坡晚年亦與之㳺甚多酧唱冷齋夜話東吳僧惠詮徉狂垢汚而詩語清婉嘗書湖上一山寺壁曰落日寒蟬鳴獨歸林下寺柴扉夜來掩片月隨行屨惟聞犬吠聲更入清蘿去東坡一見而和其後曰但聞烟外鐘不見烟中寺幽人行未巳草露濕芒屨惟應山頭月夜夜照來去詮竟以此詩知名冷齋夜話東坡元豐末年得請歸耕陽羡舟次𤓰歩以書抵金山了元禪師曰不必出山當學趙州平等接人元得書徑來東坡迎笑問之曰以偈為獻曰趙州當日少謙光不出三門見趙王争似金山無量相大千都是一禪牀東坡拊掌稱善僧寶傳王荆公丁家艱閲内典於蔣山與賛元禪師㳺從如兄弟公嘗問祖師意㫖元不荅公益叩之曰公般若有鄣三有近道之質一更兩生來恐純熟公曰願聞其說元曰公世縁深懷經濟之志用舍不能必心未卑又多怒而學問尚理於道為所知愚此其三也特視利名如脱髪甘淡薄如頭陁比為近道且當以教乗滋茂之可也公再拜受教元為人閑靖寡言客來無貴賤寒温外無别語公後罷相居定林稍覺煩動即造元相向黙坐終日而去有詩題覺海方丈贈之云徃來城府住山林諸法修然但一音不與物為真道廣每隨縁起自禪深舌根已净誰能懷足跡如空我得尋歳晩北窻聊寄傲蒲萄零落半牀隂人以為實録僧寶傳雪竇顯禪師嘗作偈云三分光隂二早過靈䑓一㸃不揩磨貪生日日區區去唤起囬頭争柰何世人貪着愛境以妄為真迷而弗返讀此偈者冝如何哉雪竇語録詩話總龜後集巻四十四欽定四庫全書詩話總龜後集巻四十五宋阮閲撰釋氏門王績作被召謝病詩云横裁桑節杖直剪竹皮巾鶴警琴亭夜鶯啼酒甕春顔回唯樂道原憲豈傷貧觀此數語又豈以招聘為喜乎獨坐詩寄身千載下聊逰萬物初欲令無作有翻覺實成虛詠懷詩云故鄉行處是虛室坐間同日落西山暮方知天下空贈薛收詩頼此北山僧教我似真如使我視聽遺自覺塵累祛聞者知績有得於佛氏者甚深也西清詩話不立文字見性成佛之宗逹摩西來方有之陶淵明時未有也觀其自祭文則曰陶子將辭逆旅之館永歸於本宅其擬挽詞則曰有生必有死早終非命促其作飲酒詩則曰採菊東籬下悠然見南山此中有真意欲辨巳忘言答形影神三篇皆寓意髙逺盖第一逹摩也而老杜乃謂淵明避俗翁未必能達道何耶東坡論陶子自祭文云出妙語於纊息之餘豈渉生死之流哉盖深知淵明者同上世稱白樂天學佛得佛光如滿時趣觀其吾學空門不學仙歸則須歸兠率天之句則豈解脱語耶元微之詩雖不及樂天逺甚然其得處豈樂天所能及哉其遣病詩云况我早師佛屋宅此身形復捨彼就此去留何所縈前身為過迹來世即前程蜕骨龍不死蜕皮蟬自鳴則與賈誼忽然為人何足控持化為異物又何足患之語何逺耶孟郊未嘗㽞意於此而吊元魯山詩有茍含天地秀皆是天地身之句亦可嘉矣同上許渾送栖元弃釋奉道詩云仙骨本㣲靈鶴逺法心潜動毒龍驚送勤尊師自邊將入道詩云蒼鷹出塞胡塵滅白鶴還鄉楚水深送李生弃官入道云水深魚避鈎雲逈鶴辭籠皆奬之也至送僧南歸詩云送師不得隨師去已戴儒冠事素王豈渾亦有逃禪之意也同上錢起投南山佛寺云洗足觧塵纓忽覺天地寛庻將鏡中像盡作無生觀盖知百骸九竅本非天形至悟真寺詩云更聞東林磬九竅本非一興中尋覺花寂爾諸像滅盖知妙明真心不關諸象起於是理亦可謂超然者矣同上子由誦楞嚴經悟一解六亡之義自言於此道更無疑然其作風痺詩乃有數盡吾則行未應墮冥漠之句則於理尚有礙矣而東坡乃謂子由聞道先我何耶東坡奉新别子由詩云何以解我憂粗了一事大笑遯兒詩云中年忝聞道夢幻講已詳故贈錢道人詩云首斷故應無斷者氷消那復有氷知主人若苦令儂認認主人人竟是誰又云有主還須更有賔不如無鏡自無塵只從半夜安心後失却當年覺痛人贈東林揔老詩云溪聲便是廣長舌山色豈非情净身夜來八萬四千偈他日如何舉似人如此等句雖宿單於􅀈不能屈也同上桞展如東坡甥也不問道於東坡而問道於山谷山谷作八詩贈之其間有寢興與時俱由我屈伸時飯羮自知味如此是道否之句是告之以佛理也其曰咸池浴日月深宅養靈根胷中浩然氣一家同化元是教之道教也聖學魯東家恭惟同出自乗流去本逺遂有作書肆是告之以儒道也同上歐永叔素不信釋氏之說如酧净照師云佛說吾不學勞師忽欵關吾方仁義急君且雲水閑酬惟吾師云子何獨吾慕自忘夷其身韓子亦謂收歛加冠巾是也既登二府一日被病亟夢至一所見十人冠冕環坐一人云叅政安得至此冝速反舍公出門數歩復徃問之公等豈非釋氏所謂十王者乎曰然因問世人飯僧造經為亡人追福果有益乎答云安得無益既寤病良巳自是遂信佛法又康公得之於陳去非去非得之於公之孫恕當不妄葉少藴守汝隂謁見永叔之子棐久不出巳而棐持數珠出謝曰今日適與家人共為佛事葉問其所以棐曰先公無恙時薛夫人已如此公弗之禁此也遠師作白蓮社與謝靈運陸脩静等十八人為社客獨淵明不肯入社視衆人固巳髙矣無為子楊次公又從而笑之其作廬山五笑於陶有曰我笑陶彭澤聞鍾暗歉眉藍輿急回去巳是出山遲視彭澤又髙一著矣俱丹陽集佛氏經律論合五千}
