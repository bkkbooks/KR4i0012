  - {type: variant, offset: 3588, length: 0, content: '', WYG: 之聚州人之所需取之市而足然不可徒得也必有一物以攝之然後爲已用所謂一物者錢是也作文亦然天下之事散在經子史中不可徒使必得一物以攝之然後爲已用所謂一物者意是也不得錢不可以取物不得意不可以用事此作文之要也吾兄拜其言而書諸紳嘗以親製龜冠為獻坡受之而贈以詩云南海神龜三千歳兆叶朋從生慶喜智能周物不周身未免人鑽七十二誰能用爾作小冠岣嶁耳孫剏其製今君此去寧復来欲慰相思時整視今集中無此詩余嘗見其親筆後坡歸宜興道由無錫洛社嘗至孫仲益家時仲益年在髫齔坡曰孺子習何藝孫曰學對屬坡曰試對看徐曰衡門稚子璠璵器孫應聲云翰苑仙人錦繡腸坡撫其背曰真璠璵器也異日不凡二事皆吾鄉人士所知輒記於此韻語陽秋謁帝似馮唐垂白馮唐雖晚達馮唐毛髮白長卿多病久我多長卿疾病渇汙官位杜以其爲郎故用之若他人老與病恐不可槩使同上用已詩為故事須作詩多者乃有之太白云滄浪吾有曲相子棹歌聲樂天須知菊酒登髙會從此無多二十場明年云去秋共數登髙會又被今年減一場過槩里云昔嘗詠遺風著為十六篇蓋居渭上醖熟獨飲曽效淵明體為十六篇又贈微之云昔我十年前會與君相識曽將秋竹竿比君孤且直蓋舊詩云有節秋竹竿也坡赴黄州過春風嶺有兩絶句後詩云去年今日關山路細雨梅花正斷魂又云柯邱海棠吾有詩獨笑山林誰敢侮又有竹云吾詩固云爾可使食無肉同上唐諺云槐花黄舉子忙東坡有强隨舉子踏槐花槐花還似昔年忙谷云槐催舉子踏花黄是也世傳五月十三日爲竹迷日凡種多以五月杜云東林野竹薄臘月更須栽則唐人植竹用季冬月也又云平生憩息地必種數竿竹嘗欲闢小軒以必種名之同上前輩戲語以郊外呵唱月下籠燭皆謂之殺風景介甫戲示穎叔云但怪傳呼殺風景豈知禪客夜相投蓋用此也同上老杜途窮反遭俗眼白本用阮籍事意我輩本宜以白眼視俗人至小人得志疾視君子是反遭其白眼故倒用之亦如水清反多魚乃倒用水至清則無魚也夢得酌我莫憂狂老来無逸氣乃例用蓋次公無多酌我寄謝􅄞中散予無甚不堪倒用絶交論坡云後生可畏吾衰矣刀筆從来錯料堯周昌以趙堯刀筆吏後果無能為所料信不錯而云錯料堯亦以涉譏謗倒用耳又有窮鬼却相呼乃知飯後鐘闍黎蓋具眼他年五君詠山王一時數皆倒用也䂬溪坡云通家不隔同年面得路方知異日心乃唐人責同年不赴期集辭云紫陌尋春尚隔同年之面青雲得路不知異日之心任昉别謝雲陽詩云詎念耋嗟人方深老夫託報劉孝綽云詎慰耋嗟人徒深老夫託畧改一兩字豈以會意處欲常用之邪臨川有暮林揺落獻南山又云朩落岡巒因自獻如云名譽子真矜谷口事功新息困壺頭又未愛京師傳谷口但知鄉里勝壺頭昔人行事措意黙與已合則喜用之馬少游欲乗下澤御欵段不去鄉里雖自謀獨善亦可爲貪躁之戒伏波在浪泊下潦上霧仰視飛鳶跕跕墮水中臥念少游平生時語以爲何可復得故坡云何須更待飛鳶墮方念平生馬少游又大夫行役家人怨應念鄉居馬少游雪堂惟有思歸曲為念平生馬少游以其可喜不僅押韻也䂬溪律詩有一對通用一事者更尋嘉樹傳莫忘角弓詩乃左傳韓宣子聘魯嘗賦角弓及譽嘉樹魯人請封殖此樹以無忘角弓介甫久諳郭璞言多驗老比顔含意更疏乃景純欲爲顔含筮含曰年在天位在人修已而天不與命也守道不回性也人自有性命無勞蓍龜同上古人作詩有用經傳全句選詩小人計其功君子道其常樂天疾惡如巷伯好賢如緇衣乃兩句渾用之杜云无妄之憂勿藥喜誰謂荼苦甘如薺富貴於我如浮雲近人亦多用史語坡云人言盧杞似姦邪我見鄭公但娬媚嘗觀南史載王宜興云為刼不須伴甚似一仄韻五言但無題目耳同上昔人用五馬事多因遊遨動出處方用之如老杜賦王閬州餞蕭遂州云二天開寵餞五馬爛生光其賓主出住分矣又送李梓州五馬何時到贈嚴武五馬舊曽諳小徑送賈閣老出汝州人生五馬貴太白云五馬莫留連岑參云門外不須催五馬戎昱五馬㡬時朝魏闕子厚五馬助征騑樂天五馬無由入酒家東坡鼓吹未容迎五馬介甫尚待使君驅五馬近人於太守安居閉閣例稱五馬此理恐未安也丹陽集}
