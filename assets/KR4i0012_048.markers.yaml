  - {type: variant, offset: 3585, length: 0, content: '', WYG: 欽定四庫全書詩話總龜後集巻一宋阮閲撰御製王師圍金陵唐使徐鉉来朝鉉伐其能欲以口舌解圍又盛稱其主博學多藝有聖人之能使誦其詩曰秋月之篇天下誦傳之其句云云太祖大笑曰寒士語耳吾不道也鉉内不服謂大言無實可窮也遂於殿上驚惧相目太祖曰吾㣲時自秦中歸道花下醉卧田間覺而月出有句曰未離海底千山黒纔到天中萬國明鉉大驚殿上稱夀後山詩話故事進士期集常擇榜中最年少者為探花郎熈寕中始罷之太平興國三年胡秘監旦榜馮文懿拯為探花是嵗登第七十四人太宗以詩賜之曰二三千客裏成事七十四人中少年始唐以禮部放榜故座主門生之禮特盛主司因得竊市私恩上稍欲革其弊既更廷試前一嵗吕文穆公䝉正為状頭始賜以詩蓋示以優寵之意至是復賜文懿然状頭詩迄今時有探花詩後無繼者惟文懿一人而已最為科舉之盛事也蔡寛夫詩話太平興國七年十二月十七日大雪御製雪詩并酒賜學士詩云輕輕相亞凝如酥宫樹花粧萬萬株今賜酒卿時一盞玉堂聞話道情無又御製五七言詩賜蘇易簡五言詩曰翰林承㫖貴清净玉堂中應用咸依式深岩比更崇歸家思值日入内集英風儒雅門生盛髙明大化雄七言詩曰運偶昌時逺更深果然榖在我中心從風臣偃光朝野此日清華見翰林舉措樂時周禮法思賢教古善規箴少年學士文明世一寸賢毫數萬尋金坡遺事石林詩話楊文公在翰林去職真宗眷之不衰即起為郡未㡬復以判秘書監召既到闕以詩賜之曰𤨏闥往年司制誥共嘉藻思類相如蓬山昔日詮墳史還仰多聞過仲舒報政列城歸覲後䟽恩髙閣拜官初諸生濟濟彌瞻望鈆槧咨詢辨魯魚祖宗愛惜人才保全忠孝之意如此䂬溪大中祥符五年楊億為學士季夏被疾至十月方赴朝叅具状稱謝御筆状尾批七言二韻詩賜之詩云承明近侍究儒𤣥苦學勞心疾巳痊善保興居調飲食副予前席待名賢金坡遺事大中祥符二年春真宗御製詩賜知貢舉晁逈云禮闈選士古稱難都為升沉咫尺間較藝清時公道在掄材應得恵人寰五年二月又製詩賜知貢舉晁逈云盛時選士貢闈開殿宇聞風獻藝来心似權衡求實効勿教蓬蓽有遺才同上天禧三年正月九日錢惟演承明殿面奉知舉真宗御製詩并序云卜賢能之多士允協盛猷資侍從之鴻儒書伸藻鑑期申職業用示篇章詩云寅奉昌圖紹慶基選掄多士叶前規鄉閭薦拔期無濫草澤搜羅詎有遺徳舉况逢全盛日計偕咸造廣塲時春官任職當求善宗伯掄材務得宜侍從名儒當委任藝文公道辯妍􅎀佇伸衡鑑裁深念允恊菁莪樂育詩金坡遺事二月十八日将放榜賜詩并序序云詳延造士允叶於盛猷乃眷儒臣式分於重寄論秀才臻於顯効當官備著於純誠詩云四海為家寳緒隆旁求文雅振儒風命鄉随計来多士較藝掄材有澤宫簮紱近臣當顯任絲綸深㫖論丹衷旰霄汲汲予存念夙夜孜孜爾狥公名實豈惟衡鑑内賢能皆萃網羅中佇觀翹楚登時用布政分優恊庶功同上真宗賦御溝栁詩令宰相兩省和進陳執中詩曰一度春来一度新翠光長得照龍津君王自愛天然態恨殺昭陽學舞人其詩最尤者西朝寳訓神宗遵太祖遺意聚積金帛成帑自製四言詩一章云五季失圖獫狁孔熾藝祖造邦意有懲艾爰設内府基以募士曽孫保之敢忘厥志毎庫以一字目之又别置詩二十字分揭其上曰毎䖍夕惕心妄意遵遺業顧予不武資何以成戎捷後來所謂御前封椿庫者也上意用此以為開拓西北境土之資始命王韶克青唐然後欲經理銀夏復取燕雲元豐五年徐禧永洛衂師之後帝心弛矣林徳裕陵遺事云前輩云詩有奪胎換骨之説信有之也杜陵謁老子廟一聨云五聖聨龍衮千官列雁行亦以雁行對龍衮然語中的其親切過於本詩兹不謂之奪胎可乎不然則徒用前人之語殊不足貴且如沈佺期云小池殘暑退髙樹早涼歸非不佳也然正用栁惲太液微波起長楊髙樹秋之句耳蘇子美峽束滄淵深貯月巖排紅樹巧粧秋非不佳也然正用杜陵峽束滄江起巖排石樹圓之句耳語雖工而無别也藝苑雌黄光堯初幸錢塘有詩云六龍轉淮海萬騎臨吳津王者本無外駕言蘇逺民瞻彼草木秀感此瘡痍新登堂望稽山懐哉大禹勤大哉之言有於天下漢祖大風之歌唐宗動草之句不足道也詩説雋永賡和東萊賡和皇帝幸祕書詩麟閣龍旂日月章中興再見赭袍光仰觀焜耀人文盛始識扶持徳意長功利從今卑管晏浮華自昔陋盧王願求實學酬天造肯効明河織女襄文集御燕嘉祐七年冬宴近臣于羣玉殿英宗以皇子預坐在舍人待制之後岐公詩云翠輦生香容扈蹕黃金塗紙看揮毫介甫云何不言翠玉裝輿岐公改之以進復齋漫録神廟時經月每夕有赤氣見西北隅如火至人定乃滅人謂皇子生之祥故禹玉作大燕樂詞云未曉清風生殿閣經旬赤氣照乾坤未幾皇子生大燕羣臣於集英殿文正公日録榮遇門蘇參政易簡取開封解時宋尚書白為試官是歳狀頭登第後十年白為翰林學士易簡以繼召入故易簡贈白詩云天子昔取士先後分􅎀妍濟濟俊兼秀師師麟與鸞小子最承知同輩尋改觀甲等叨薦名髙飛便凌煙遂使拜扆坐果得超神仙迄今纔七嵗相接乗華軒慶厯二年歐陽文忠公為别頭試官王文恭公預薦至嘉祐初文忠在北門文恭亦同院仍同知貢舉故文恭詩有十五年前門下客最榮今日預東堂之句座主門生同列固儒者盛事而玉堂尤天下文學之極選國朝以来惟此二人前此所未有也蔡寛夫詩話嘉祐二年余與端明韓子華翰長王禹玉侍讀范景仁龍圖梅公儀同知禮部貢舉辟梅聖俞為小試官凡鏁院五十日六人者相與唱和為古律歌詩一百七十餘篇集為三巻禹玉余為校理時武成王廟所解進士也至此新入翰林與余同院又同知貢舉故禹玉贈余云十五年前出門下㝡榮今日預東堂余荅云昔時叨出武成宫曽看揮毫氣吐虹夢寐閑思十年事笑談今日一樽同喜君今賜黄金帶顧我新為白髮翁也天聖中余舉進士國學南省皆忝第一人薦名其後景仁相繼亦然故景仁贈余云淡墨題名第一人孤生何幸繼前塵也聖俞自天聖中與為詩友余嘗贈云猶喜共量天下士亦勝東野亦勝韓而子華筆力豪贍公儀文思温雅而敏捷皆勍敵也前此有南省試官者多窘束條制不少放懐余六人者懽然相得羣居}
