  - {type: variant, offset: 3590, length: 1, content: 捴, WYG: 總龜後集巻二十二欽定四庫全書詩話總龜後集巻二十三宋阮閱撰紀實門唐文皇聚一時名流天策府始有十八學士之號後来凡居館殿者皆稱之國朝以来任於外非兩制則雖帥守監司上呼寄祿官惟通判多從館中帶職出補如蔡君謨湖州歐陽文忠公滑州王荆公舒州東坡先生杭州如此之類甚多劉贛父赴泰倅詩云璧門金闕倚天開五見宫花落早梅明日扁舟滄海去却尋雲氣望蓬萊蓋在道山五載然後得之學士之稱施於外者繇通判而然今外庭過呼大可笑也揮麈錄老杜送殿中楊監赴蜀見相公云豪俊貴勲業邦家頻出師相公鎮梁益軍事無孑遺以是知邊鄙之臣貪功生事結禍招釁皆有以致之一得忠臣處之生靈受賜矣黄常明文選載王粲公讌詩注云此侍曹操宴也操未為天子故云公讌耳操以建安十八年春受魏公九錫之命公知衆情未順終其身不敢稱尊而粲詩巳有願我賢主人與天享巍巍之語則粲豈復有心於漢耶粲嘗說劉表之子琮曰曹公人傑也將軍巻甲倒戈以歸曹公長享福祚萬全之䇿也厥後操以粲為軍諮祭酒則以腹心委之矣韻語陽秋或云韋應物乃韋后之族憑恃恩私作里中横故韋集載逢楊開府詩云少事武皇帝無頼恃恩私身作里中横家藏亡命兒武皇升仙去把筆學題詩兩府始收迹南宫謬見推夫武皇平内亂殺韋后不應后之族敢於武皇之時豪横若此正恐非后族爾李肇國史補言應物性髙潔鮮食寡欲所居焚香埽地而坐與楊開府詩所述不同豈武皇仙去之後折節悔過之時耶曾文清吉父孔毅父之甥也早從學於毅父文清以䕃入仕大觀初以銓試合格五百人爲魁用故事賜進士出身紹興中明清以啓贄見云傳經外氏早侍仲尼之閒居提筆文場曽寵于津之為首文清讀之喜曰可謂著題矣後與明清詩云吾宗擇壻得羲之令子傳家又絶竒甥舅從来多酷似弟兄如此信難爲徐敦立覽之笑云此乃用前日之啓為體修報耳同上老杜卒於大歴五年享年五十九當生於先天元年觀其獻大禮賦表云臣生陛下淳樸之俗行四十載矣以此推之天寶十載始及四十則是獻大禮賦當在天寶九載也本傳以爲天寶十三載因獻三賦帝竒之待制集賢院誤矣其後又進西嶽賦序云上既封泰山之後三十年按史開元十三年乙丑封泰山至天寶十三載始及三十年則是進西嶽賦在天寶十三載也老杜有贈獻納使田舎人詩云舎人退食收封事宫女開函近御筵曉漏追隨青瑣闥晴窓㸃檢白雲篇揚雄更有河東賦惟待吹嘘送上天其云更有河東賦當是獻西嶽賦時也丹陽集羊叔子鎮襄陽嘗與從事鄒湛登峴山慨然有泯没無聞之歎峴山亦因是以傳古今名賢賦詠多矣吳興東陽二郡亦有峴山吳興峴山去城三里有李適之窪尊在焉東坡守吳興日嘗登此山有詩云苕水如漢水鱗鱗鴨頭青吳興勝襄陽萬瓦浮青冥我非羊叔子愧此峴山亭悲傷意同此歳月如流星湛輩何足道當以徳自銘東陽峴山去東陽縣亦三里舊名三邱山宋商仲文素有時望自謂必登台輔忽除東陽太守意甚不樂嘗登此山悵然流涕郡人愛之如襄陽之於叔子因名峴山二峯相峙有東峴西峴唐寶歴中縣令于興宗結亭其下名曰涵碧劉禹錫有詩云新開潭洞疑仙府逺冩丹青到雍州即其所也葛立之張籍居韓門弟子之列又以愈薦爲國子博士東坡所謂汗流湜籍走且僵滅没倒景不可望者而籍作愈祭詩乃云公文爲時師我亦有微聲而後之學者或號爲韓張何耶丹陽集陳後主起臨春結綺望仙三閣極其華麗後主與張麗華孔貴妃各居其一與狎客賦詩互相贈答采其艶麗者被以新聲奢淫極矣隋克臺城後主與張孔坐視無計遂俱入井所謂胭脂井是也楊修詩云擒虎戈矛滿六宫春花無樹不秋風倉惶益見多情處同穴甘心赴井中李白亦云天子龍沈景陽井誰歌玉樹後庭花今胭脂井在金陵之法寶寺井有石欄紅痕若胭脂相傳云後主與張孔淚痕所染石欄上刻後主事迹八分書乃大歴中張著文又有篆書戒哉戒哉數字其他題刻甚多往往漫滅不可攷寺即景陽宫故地也其井在焉好事者往来不絶寺僧頻厭苦之張芸叟嘗有詩戲僧云不及馬嵬韈猶能致萬金馬少游常哀兄援多大志曰士生一世但取衣食裁足乗下澤車御欵段馬鄉里稱善人斯可矣致求贏餘但自苦爾故援在浪泊西里當下潦上霧雲氣熏蒸仰見飛鳶跕跕墮水中之時轉思其言以爲念少游語何可得也洎武陵五溪蠻作亂劉尚軍没而援貪進不止方且據鞍矍鑠被甲請行遂底壺頭之困劉夢得經伏波神祠詩有一以功名累翻思馬少游之句可謂名言矣壺頭在武陵當是夢得為司馬時經歴故篇首言䝉䝉篁竹下有路上壺頭韻語陽秋武帝見顔駟龎眉皓首問何時為郎何其老也對曰文帝好文而臣好武景帝好老而臣尚幼陛下好少而臣老矣老於為郎此事尤著竊怪老杜屢傷為郎白首毎稱馮唐而不及駟生前既不遇三君身後復不遇老杜可笑也巳䂬溪子美世號詩史觀北征詩云皇帝二載秋閏八月初吉送李校書云乾元元年春萬姓始安宅又戲贈友二首元年建巳月郎有焦校書元年建巳月官有王司直史筆森嚴未易及也黄常明舎人遺織成褥段云服飾定尊卑大哉萬古程煌煌珠宫物寢處禍所嬰錦衾巻還客始覺心和平其意在明分守警貪饕屏斥玩物嚴道氣之大節豈直專為詩哉就中和平之語尤可人意世有豪横凶人强委饋於善士而不能驟絶之其心愧恥雖欲和平不可得也䂬溪諸史傳首尾一律惟左氏傳春秋則不然千變萬狀有一人而稱目至數次異者族氏名字爵邑諡號皆宻布其中而寓諸褒貶此史家祖也觀少陵詩直隠此㫖若云杜陵有布衣杜曲幸有桑麻田杜子將北征臣甫憤所切甫也東西南北人有客有客字子美葢自見其里居名氏也不作河西尉白頭拾遺徒步歸備員均補衮凡才汙省郎補官遷徙歴歴可攷至叙他人亦然如云粲粲元道州又云結也實國榦凡例森然誠春秋之法也䂬溪人以藤代篘酒名鈎藤俗傳他處即不可用或謂但必醖造之法異耳所在皆可樂天忠州春詩云閒拈蕉葉題詩詠悶取藤枝引酒嘗是巴蜀亦有之黄常明詩話總龜後集巻二十三欽定四庫全書詩話總龜後集巻二十四宋阮閱撰用字門子美有同學少年多不賤小徑升堂舊不斜羣仙不愁思夕烽来不近皆人所不敢用甚類周禮凡師不功左傳仁而不武晉人聞有楚師師曠曰不害楚歸而動不後才以易無字耳而語勢頓壯黄常明杜詩有用一字凡數十處不易者如緣江路熟俯青郊傲睨俯峭壁展席俯長流杖藜俯沙渚此邦俯要衝四顧俯層巔旄頭俯淵瀍層臺俯風渚游目俯大江汀檻俯鴛鴦其餘一字屢用若此類多不可述同上張文潛法雲懐無咎云獨覺欠此公或謂其語生文潛獨以欠字為得意然夢得送皇甫云從兹洛陽社吟詠欠書生樂天可憐閒氣味惟欠與君同得君更有無厭意猶恨尊前欠老劉退之云今者誠自幸所懐無一欠張何得意之有同上賈島攜新文謁韓愈云青竹未生翼一步萬里道安得西北風身願變蓬草可見急於求師愈贈詩云家住幽都逺未識氣先感来尋吾何能無殊嗜昌歜可見謙於授業此皆島未儒服之時也洎愈教島為文遂棄浮屠學舉進士摭言載島初赴名塲於驢上吟鳥宿池邊樹僧敲月下門遇權京尹韓吏部呵喝而不覺洎擁至馬前則曰欲作敲字又欲作推字神游詩府致衝大官愈曰作敲字佳矣是時島識韓已久矣使未相識愈豈肯教其作敲字耶丹陽集凡聚落相近期某旦集交易鬨然其名爲虚栁云綠荷包飯趂虚人臨川云花間人語趂朝虚山谷箬葉裹鹽同趂虚人集春蔬好趂虚黄常明數物以个謂食爲喫甚近鄙俗獨杜屢用峽口驚猿聞一个兩个黄鸝鳴翠栁却繞井欄添个个送李校書云臨岐意頗切對酒不能喫樓頭吃酒樓下臥但使殘年飽喫飯梅熟許同朱老喫蓋篇中大槩竒特可以映帶者也坡云筆工傚諸葛散卓反不如常筆正如人學老杜詩但見其粗俗耳同上野飯射麋新本老杜郊居然左氏楚人致晉師晉人逐之樂伯餘一矢射麋以獻又晉師及熒澤魏錡射麋以獻楚潘黨曰子有軍事獸人無乃不給於鮮皆飯於野而射麋新事也又市喧宜近利亦止稱東屯所居蓋齊侯欲更晏子宅曰湫隘囂塵晏子辭曰近市小人之利也市喧而近利事餘惟一兩字暗貫經傳者可勝數哉同上杜云南風作秋聲殺氣薄炎熾蓋用易雷風相薄左氏寧我薄人毋人薄我軍志先人有奪人之心薄之也同上劉禹錫謫連州作畬田詩云何處好畬田團團縵山腹下種暖灰中乗陽坼芽孽又作竹枝詞云銀釧金釵来負水長刀短笠去燒畬嘗觀辰沅亦然瘠土之民亦倍其勞而耕反鹵莽也夢得蠻子歌云蠻貊鈎輈音椎髻衣花布熏狸掘沙鼠時節祠槃瓠忽逢乗馬客恍若驚麕顧腰斧上髙山意行無舊路賓客謫居朗州而五溪習俗盡得之矣黄常明杜集多用經書語如車鄰鄰馬蕭蕭未嘗外入一字如天屬尊堯典神功協禹謨卿月升金掌王春度玉墀濟潭鱣發發春草鹿呦呦皆渾然嚴重如天陛赤墀植璧鳴玉法度森嚴然後人不敢用者豈所造語膚淺不類耶同上作詩在於練字如老杜飛星過水白落月動沙虚是練中間一字地坼江帆隱天清朩葉聞是練末後一字酬李都督早春詩云紅入桃花嫩青歸栁葉新若非入與歸二字則與兒童之詩何異葛常之霄漢瞻佳士泥塗任此身只任字即人不到處自衆人必曰歎曰愧獨無心任之所謂視如浮雲不易其介者也繼云秋天正揺落回首大江濱不知大觀傲睨天地汪汪萬頃奚足云哉坡有白衣送酒舞淵明人有疑舞字太過者及觀庾信答王褒餉酒云未能扶畢卓猶足舞王戎蓋有所本黄常明杜子美西郊詩云無人競来往或云無人與来往或云無人覺来往競與皆常談覺字非子美不能道也蓋煬者避竈有道者之所驚舎者争席隠居者之所貴也丹陽集舊傳賈浪仙搆思僧敲月下門或引推作推勢遂沖尹節世傳為美談舊於太學得江御史詩一軸有督人和詩云直饒煅煉經時序若是推敲總可刪以是知雷同從非善學也䂬溪舊觀臨川集肯顧北山如慧約與公西崦斸莓苔常愛其斸字最有力後讀集當為斸青冥藥許鄰人斸退之詩翁憔悴斸荒棘窙豁斸株橜子厚戒徒斸雲根雖一字之法不無所本同上杜詩四韻并絶句味之皆覺字多以字字不閒故也他人雖長篇若無可讀正如賢人君子並處朝廷但一二相助巳號為得人若不能為有無者縱累千百輩蔑如也秦少游雨砌墮危芳風軒納飛絮之類李公擇以爲謝家兄弟得意不能過也潘邠老云七言詩第五字要響如返照入江翻石壁歸雲擁樹失山村翻字失字是響字也五言詩第三字要響圓荷浮小葉細麥落輕花浮字落字是響字也所謂響者致力處也予竊以為字字當活活則字字自響吕氏童䝉訓押韻門孔毅父雜記云退之詩好押狹韻累句以示工而不知重疊用韻之為病也雙鳥詩押兩韻字李花詩押兩花字苕溪漁隠曰讀皇甫湜公安園池詩亦押兩閒字日夜不得閒君子不可閒蓋退之好重疊用韻以盡已之詩意不恤其為病也學林新編云杜子美飲中八仙歌曰知章騎馬似乗船又曰天子呼来不上船一曰眼花落井水底眠又曰長安市上酒家眠一曰汝陽三斗始朝天又曰舉觴白眼望青天一曰皎如玉樹臨風前又曰蘇晉長齋繡佛前又曰脫帽露頂王公前此歌三十二句而押二船字二眠字二天字三前字近時論詩者曰此歌一首是八段不嫌於重用韻也某案子美此歌以飲中八仙歌五字為題則是一歌也此歌首尾於船字韻中押未嘗移别韻則非分為八段蓋子美古律詩重用韻者亦多况於歌乎如園人送瓜詩曰沈浮亂水玉愛惜如芝草又曰園人非故侯種此何草草一篇押二草字也上後園山脚詩曰蓐收困用事元冥蔚彊梁又曰登髙欲有往蕩析川無梁一篇押二梁字也北征詩曰維時遭艱虞朝野少暇日又曰老夫情懐惡嘔泄臥數日一篇押二日字也䕫府詠懐詩曰雖云隔禮數不敢墜周旋又曰淡交隨聚散澤國遶回旋一篇押二旋字也贈李八秘書詩曰事殊迎代邸喜異賞朱虚又曰風烟巫峽逺臺榭楚宫虚一篇押二虚字也贈李邕詩曰放逐早聨翩低垂困炎厲又曰哀贈終蕭條恩波延掲厲一篇押二厲字也贈汝陽王詩曰自多親棣萼誰敢問山陵又曰鴻寶金寧秘丹梯庶可陵一篇押二陵字也喜薛璩岑參遷官詩曰栖遲分半菽浩蕩逐浮萍又曰仰思調玉燭誰定握青萍一篇押二萍字也寄賈岳州嚴巴州兩閣老詩曰討胡愁李廣奉使待張騫又曰如公盡雄雋志必在騰騫一篇押二騫字也子美詩如此類甚多雖然子美非創意為此者蓋有所本也按文選載古詩曰晨風懐苦心蟋蟀傷局促又曰音響一何悲絃急知柱促一篇押二促字也曹子建美女篇曰明珠交玉體珊瑚間朩難又曰佳人慕髙義求賢良獨難一篇押二難字也謝靈運述祖徳詩曰段生藩魏國展季救魯人又曰外物辭所賞勵志故絶人一篇押二人字也又南園詩曰樵隱俱在山由来事不同又曰賞心不可忘妙善冀能同一篇押二同字也又初去郡詩曰或可優貪競豈足稱達生又曰畢娶類尚子薄遊似邴生一篇押二生字也陸士衡擬古詩曰此思亦何思思君徽與音又曰驚飇褰反信歸雲難寄音一篇押二音字也又豫章行曰汎舟清川渚遥望髙山陰又曰寄世將㡬何日昃無停隂一篇押二陰字也阮嗣宗詠懐詩曰如何當路子磬折忘所歸又曰黄鵠游四海中路將安歸一篇押二歸字江淹雜體詩曰韓公淪賣藥梅生隠市門又曰太平多歡娯飛蓋東都門一篇押二門字王仲宣從軍詩曰連舫踰萬艘帶甲千萬人又曰我有素餐責誠愧伐檀人一篇押二人字古人詩自有體格杜子美亦傚古人之作耳韓退之贈張籍詩一篇押二更字二陽字又岳陽樓别竇司直詩押二向字又李花詩押二花字又雙鳥詩押二州字二頭字二秋字二休字又和盧郎中送盤谷子詩押二行字又示爽詩押二愁字又义魚詩押二銷字寄孟郊詩押二奥字此日足可惜詩押二光字白樂天渭村退居詩押二房字夢遊春詩押二行字寄元微之詩押二夷字出守杭州路次藍溪詩押二水字遊悟真寺詩押二槃字其餘詩人如此疊用韻者甚多不可具舉意到即押耳奚獨於飲中八仙歌而致怪耶子瞻送江公詩曰忽憶釣臺歸洗耳又曰亦念人生行樂耳自注曰二耳義不同故得重用蓋子瞻自不必注聖祖上自嫌名書如州縣之縣者言架也若州縣之縣則别無他音嘗觀顔延之侍皇太子釋奠宴詩曰獻終襲吉即宫廣宴堂設象筵庭宿金縣沈約侍宴詩曰回鑾獻爵摐金委奠肄士辨儀胥人掌縣二人押韻皆作州縣之縣用何耶沈佺期哭蘇眉州詩云家愛方休杼皇慈更撤縣則當作平聲押丹陽集劉禹錫嘉話詩云作詩押韻須要有出處近欲押一餳字六經中無此字惟周禮吹簫處注有此一字終不敢押予按禹錫歴陽書事詩云湖魚香勝肉官酒重於餳則何嘗按六經所出耶洛陽伽藍記載河東人劉白墮善釀酒盛暑曬之日中經旬不壊當時謂之鶴觴白墮乃人名子瞻詩云獨看紅蕖傾白墮石林避暑錄云若以白墮爲酒則醋漫曹公湯燖右軍可也予按文選魏武帝短歌行云何以解憂惟有杜康康亦作酒人而選詩遂以為酒用東坡豈祖是耶䂬溪詩話總龜後集巻二十四欽定四庫全書詩話總龜後集巻二十五宋阮閱撰傚法門李商隱詠淮西碑云言訖屢頷天子頤雖務竒崛人臣言不當如此乗輿軒陛自不敢正斥如老杜天顔有喜近臣知虬鬚似太宗可謂知體矣東坡贈冩御容詩云野人不識日月角彷彿尚憶重瞳光天容誰能畫老師古寺畫閒房蓋遵此法䂬溪杜牧之詩字意多用老杜如觀東兵長句云黒矟將軍一鳥輕蓋用子美身輕一鳥過也遊樊川詩云野竹踈還宻巖泉咽復流蓋用子美小雨止還作斷雲疏復行也蓋其心景仰之切則下語自然相符非有意於蹈襲故其論杜詩云天外鳳凰誰得髓何人解合續絃膠豈非自以爲得髓者耶東坡贈孔毅甫詩云天下㡬人學杜甫誰得其皮與其骨前生子美只君是信手拈得俱天成學杜甫而得其皮骨者鮮矣又况其髓哉丹陽集沈攸之晚好讀書手不釋巻嘗歎曰早知窮達有命恨不十年讀書東坡再和劉景文介亭長篇云早知事大繆恨不十年讀䂬溪王元之到任表有全家飽煖盡荷君恩之語到今傳誦永叔用爲詩云諸縣豐登少公事全家飽煖荷君恩夢得亦嘗有云一生不得文章力百口空爲飽煖家白云不才空飽煖無力及飢貧同上樂天云身閒當貴真天爵官散無憂即地仙蓋用顔蠋晚食當肉早眠當富無事當貴也臨川愛眉山雪詩能用韻如云氷下寒魚漸可义和云羔袖龍鍾手獨义蓋子厚嘗云江魚或共义又云入郡腰常折逢人手盡义黄常明退之詠蚊蠅云凉風九月到埽不見踪跡夢得聚蚊云清商一来秋日曉羞爾微形飼丹鳥聖俞云薨薨勿久恃會有東方白王逢厚晝睡云蚊蟲交紛始誰造一一口吻如針錐噆人肌膚得腹飽不解黙去猶鳴飛雖然今尚爾無奈當有獵獵秋風時小人稔惡豈漏恢網但可僥倖目前耳左氏曰天之假助不善非佑之也將厚其惡而降之罰也其是之謂乎同上栁色黄金嫩梨花白雪香隂鏗詩也李太白取用之杜子美太白詩云李侯有佳句往往似隂鏗後人以爲以此譏之然子美詩有蛟龍得雲雨鵰鶚在秋天一聨已見晉書載記矣如氷肌玉骨清無汗水殿風来暗香滿孟蜀王詩東坡先生度以爲詞昔人不以蹈襲為非南部烟花錄夕陽如有意偏傍小窓明唐人方域詩新唐書藝文志有方域詩一巻烟花錄一名大業拾遺記文詞極惡可疑而大業幸江都記自有詩一巻唐著作郎杜寶所纂明清有之永平時揚州印本也揮麈錄詩體如八音歌建除體之類古人賦詠多矣用十二神爲詩者始見於沈炯山谷亦嘗效爲之余友人莫之用其祖戩嘗以辯舌說賊脫百人於死意其後必昌而之用乃貧不能以自存天理殆難曉也余嘗以此格作詩贈之云抱犬髙眠已云足更得牛衣有餘燠起来敗絮擁懸鶉誰羨龍髯織氷縠踏翻菜園底用羊從他春雷吼枯腸擊鐘烹鼎莫渠愛小芼自詡猴葵香半世飢寒孔移帶鼠米占来身漸泰吉雲神馬日匝三摴蒱肯作猪奴態虎頭食肉何足誇隂德由来報宜奢丹竈功成無躍兔玉函方秘緣青蛇丹陽集坡有欲吐狂言喙三尺怕君瞋我却須吞嘗疑其語太怪及觀杜集亦有臨風欲慟哭聲出巳復吞韋蘇州髙歌長安酒中憤不可吞䂬溪杜云卿到朝廷說老翁漂零巳共滄浪客又朝覲從容問幽仄勿云江漢有垂綸其後夢得送陳郎中云若問舊人劉子政而今懶拙每如初送慧則云休公乆别如相問楚客逢秋心更悲小杜江湖酒伴如相問終老烟波不計程交游問我憑君道除却鱸魚更不聞商隠寄崔侍御云若向南臺見鶯友爲言垂翅度春風臨川舊人亦見如相問爲道方尋朩雁編歸見江東諸父老爲言飛鳥會知還聖俞倘或無忘問姓名爲言懶拙皆如故東坡單于若問君家世莫道中朝第一人皆有所因也黄常明韋應物詩擬陶淵明而作者甚多然終不近也答長安丞裴說詩云臨流意巳悽采菊露未晞舉頭見秋山萬事都若遺蓋效淵明采菊東籬下悠然見南山此中有真意欲辨巳忘言之句也然淵明解落世紛深入理窟但見萬象森羅莫非真親故因見南山而真意具焉應物乃因意悽而采菊因見秋山而遺萬事其與陶所得異矣葛常之苕溪云退之赤藤杖詩空堂晝眠倚戸牖飛電著壁搜蛟螭故東坡鐵拄杖云入懐氷雪生秋思倚壁蛟龍䕶晝眠山谷卭竹杖贊涪翁晝寢蒼龍挂壁皆用退之詩䂬溪杜云嗜酒狂嫌阮知非老笑蘧近集有素書欵欵誰憐杜彩筆遒遒獨勝江榻畔烟花常歎杜海中童丱尚追徐河魚潰腹空號楚汗足流骹始信吳皆用此格同上西京雜記載司馬相如將聘茂陵人女爲妾卓文君作白頭吟以自絶相如乃止樂府詩集謂白頭吟疾人以新間舊不能至白首故以爲名余觀張籍白頭吟云春天百草秋始衰棄我不待白頭時羅襦玉珥色未暗今朝巳道不相宜李白白頭吟云妾有秦樓鏡照心勝照井願持照新人雙對可憐影其語感人深矣至劉希夷作白頭吟乃云寄言全盛紅顔子須憐半死白頭翁此翁白頭真可憐伊昔紅顔美少年則是言男為女所棄而作與文君白頭吟之本意異矣韻語陽秋老杜贈李秘書觸目非論故新文尚起予太白酬竇公衡云曽無好事来相訪頼爾髙文一起予韋蘇州每一覩之子髙詠尚起予昌黎酬張韶州將經貴郡煩留客先惠髙文謝起予豈非用事偶合數公非蹈襲者䂬溪元白齊名有自来矣元微之冩白詩於閬州西寺白樂天冩元詩百篇合為屏風更相傾慕如此樂天必言微之詩得己格律頓進所謂每被老元偷格律是也然微之江陵放言與送客嶺南詩樂天皆擬其作何耶東坡嘗效山谷體作江字韻詩山谷謂坡收斂光芒入此窘步余於樂天亦云丹陽集仲長統云垂露成幃張霄成幄沆瀣當餐九陽代燭蓋取無情之物作有情用也自後竊取其意者甚多張志和則云太虚爲室明月爲燭王康琚則云華條當圜屋翠葉代綺窓吳筠則云綠竹可充食女蘿可代裾劉伶則云日月爲扃牖八荒爲庭衢皆是意也李義山無題詩云春蠶到死絲方盡蠟燭成灰淚始乾此又是一格今效此體爲俚語小詞傳於世者甚多不足道也丹陽集皮日休雜體詩序曰詩云螮蝀在東又曰鴛鴦在梁雙聲起於此也陸龜䝉詩序曰疊韻起自梁武帝云後牖有朽栁當時侍從之臣皆唱和劉孝綽云梁王長康强沈休文云載載每礙埭自後用此體作為小詩者多矣如王融所謂園衡炫紅蘤湖行曄黄華温庭筠所謂棲息銷心象簷楹溢艶陽皆傚雙聲而爲之者也陸龜䝉所謂瓊英輕明生竹石滴瀝碧皮日休所謂康莊傷荒凉生虜部伍苦皆傚疊韻而爲之者也南北朝人士多喜作雙聲疊韻如謝莊羊戎魏收崔巖輩戲謔談諧之語往往載在史冊可得而攷焉丹陽集詩話總龜後集巻二十五欽定四庫全書詩話總龜後集巻二十六宋阮閱撰節候門徽宗宣和七年十二月二十一日勅睿謨殿張燈預賞元宵曲宴近臣命左丞王安中中書侍郎馮熙載爲詩以進安中云上帝通明闕神霄廣愛天九光環日月五色麗雲烟紫袖開三極瓊璈列萬仙希夷塵境斷髣髴玉經傳妙道逢昌運真王撫契賢龜圖規大壯龍位正純乾穹昊親無間皇居綴自然剛風同變化祥氣共陶甄層觀星潢上重闉斗柄邊摩空百雉峻冠嶠六鼇連夢想何嘗到階升信有緣昕朝初放仗密宴忽聞宣清禁来鳴佩修郎入並肩獸鋪金半闔鸞障繡微褰霽景留庭砌雷文繪桷梴宫簾波錦漾殿榜字金填花擁巍巍座香浮秩秩筵嵩呼稱萬億韶奏侍三千華歳推堯厯元璣候舜璿氷霜知臘後梅栁認春前造化應呈巧芳菲巳鬬妍樛枝彫檻小多葉露桃鮮錯落飛杯斚鏘洋雜管絃承雲歌歴歴回雪舞翩翩黼幄祥氛合銅壺永漏延鎬京方置醴羲馭自停鞭上聖情彌渥諸臣意更䖍宗藩親魯衞相芾拱閎顛側弁恩光浹中觴詔蹕旋寶熏攜滿袖御果得加籩要賞嬉遊盛儀追步武遄騰身複道表送日夾城壖仰挹蒼龍象旁臨艮嶽巔謳歌紛廣陌簫鼓樂豐年赫奕攢輕幰珍竒集市㕓博盧多袒跣飲肆競蹁躚蕃衍開朱邸崔嵬照彩椽橋虹彎矗矗江練泮濺濺擊柝周廬晚張燈别院先餘霞揺綺暈列宿合珠躔浩蕩三山島棱層十丈蓮再趨天北極却立榻東偏既用家人禮仍占聖製篇兕觥從酩酊蟾魄待嬋娟轉盻隨親指環觀得從穿曲屏紅浪蹙巨柱赤虬纒光透垂枝井晶銜帶璧錢蕭臺千級峻重屋八窓全就席花墪匝行樽紫袖揎交輝方爍爍起立復闐闐䆳宇會寧過中宵勝賞專鋪陳尤有韻清雅不相沿戸箔明珠串欄缸水碧巻規模商􅀈鉒欵識魯壺鐫秦曲移筝柱唐粧儼鬢蟬窄襟珠綴領髙朶翠為鈿喜氣排寒沍輕颸洗静便層琳藉璣組方鼎炷龍涎瑪瑙供盤大玻璃琢琖圓暖金傾小榼屑玉釀新泉帝子天才異英姿棣萼聨頻看揮斗盌端是吸鯨川推食俱均逮攘餐及墜捐海螯初破殻江柱乍離淵寧數披綿雀休論縮頸鯿南珍誇飣餖北饌厭烹煎賜橘懐頳卵酡顔釂寶船言歸荷慈惠末節笑拘攣放鑰嚴扃啓籠紗逸足牽氷輪挂銀漢夜色映華韉人識重熈象功參獨斷權五辰今不忒六氣永無愆天紀承三古時雍變八埏比閭増版籍疆埸罷戈鋋文軌包夷夏弦歌徧幅員恢儒榮藻茆作士極魚鳶慶胄貽謀顯多男景福緜迓衡常穆穆遵路益平平亭障今踰隴耕耘久際燕信通鵬海漲威竄犬戎羶東擬封雲岱西將款澗瀍琳科宣蕊笈玉府下雲軿帝耤勤初播宫蠶長自眠繭絲登六寢稃米秀中田廟祀垂昭格壇光監吉蠲靈芝滋菌蠢甘醴湧潺湲合教龎風革頒經衆疾痊雨隨親禱降河避上流遷執契皇猷洽披圖福物駢太和輸槖籥妙用絶蹄筌此際君臣恱應先簡冊編雅稱魚罩罩頌述鼓咽咽詎比千齡遇猶聞四始箋羇臣起韋布陋質愧駑鉛驟俾陪機政由来出眷憐恩方拜綸綍報未効塵涓宻席叨臨勸凡踪第曲拳雖無三峽水曽步八花甎踰望知難稱非才合勉旃鈞天思盡賦賸續白雲牋熈載云化工欲放陽春到先教元冥戮衰草凝氷封地萬木僵誰向雪中探天巧璿璣星回斗指寅羣芳未知時巳春人心蕩漾趂佳節燈夕獨冠年華新昇平萬里同文軌井邑相連通四裔蘭膏競吐夜烘春和叔回車避羲轡巍巍九禁倚天開温風更覺先春来試燈不用雨花落迎陽爲却寒崔嵬宣和初載元冬尾瑞白纔消塵不起穆清光賞屬欽鄰錦繡雲龍頒宴喜初聞傳詔開睿謨步障㡬里承金鋪調音度曲三千女正似廣樂陳清都遏雲妙唱韓娥侣回雪飛花稱獨步千春蟠朩效紅英獻壽當筵豈金母上林晚色烟藹輕景龍遊人歡笑聲霞裾月佩擁仙仗翠鳳挾輦趨平成銅華金掌散晶彩翠碧重重簇珠琲先從前殿望脩廊日出綺霞紅茜海神光通透雲母屏驪龍出舞波濤驚煌煌黼座承天命座下錯落如明星榻前玉案肴核旅獸炭銀爐夜初鼓憲天重屋訝雲屯崇道簫臺疑蜃吐前楹火柱回萬牛藺卿璧碎色光浮周圍照耀眼界徹氷壺漾月生珠流㸃㸃金錢盡銜璧豹髓騰輝粲銀礫絲篁人籟有機緘皦繹清音傳屋壁須臾隨蹕登會寧如驂鸞鶴遊紫清彩蟾倒影上浮空纎雲不㸃惟光明四壁垂簾圍煖玉銀缸吐艶相連屬棼楣横帶碧玻璃一朶翠雲承日轂萬光閃爍争吐吞燭龍銜耀輝西崑又如電母神鞭馳金蛇著壁不可捫端信竒工通造化豈比胡人能幻假丹青漫數顧虎頭盤礴解衣催客冩此時帝御鈞天臺紫垣兩兩明三台尚方飲器萬金寶古玉未足誇雲雷帝旁侍女雲華品玉立仙標及時韻四音促柱泛笙簫應有翔鸞落千仞龍瓶㵼酒如流泉御厨絡繹紛珍鮮榻邊争欲供天笑快倒頗類鯨吸川厭厭夜飲方歡浹玉漏頻催鼓三疊金門初下醉歸時正見氷輪上城堞微臣去歳陪清班惡詩誤辱重曈觀小才易窮真鼠技再賦愈覺相如慳履道彦為二集中今不復印行故錄於此荆楚記云屈原以五月五日投汨羅而死人傷之以舟檝拯焉故武陵競渡用五月五日蓋本諸此劉夢得云今舉檝相和之音皆曰何在蓋所以招屈原也詩曰湘江五月平隄流邑人相將浮彩舟靈均何在歌已矣哀音振檝從此起又有招屈亭詩所謂曲終人散空江暮招屈亭前水東注是也今江浙間競渡多用春月疑非招屈之義及考沈佺期三月三日獨坐驩州詩云誰念招魂節翻爲禦魅囚王績三月三日賦亦云新開避忌之席更作招魂之所則以上巳爲招屈之時其必有所據也予觀琴操云介子推五月五日焚林而死故是日不得發火而異苑以爲寒食始禁烟蓋當時五月五日以周正言之耳今用夏正乃三月也屈原以五月五日死而佺期王績以上巳爲招魂之節者亦豈是耶歳時有祓除不祥之具而元日尤多如桃版葦索磔雞之類是也飲屠蘇酒亦所以祓瘟禳惡而法必自幼飲何耶顧况歳日口號云還丹寂寞羞明鏡手把屠蘇先少年白樂天元日贈劉夢得詩亦云與君同甲子歳酒合誰先元日飲酒則先卑而後尊自唐以来已如此矣四時月令云進椒酒次第當從小起而董勛告晉海西公曰小者得歳故先酒賀之老者失歳故後與酒似亦不爲無理並丹陽集先文康公晚歳卜居於寶溪之上建觀禊堂於水濱紹興癸丑與客汎舟修禊甚樂距永和癸丑不知其㡬癸丑也因與客相與推算自永和九年歳甲子一周爲晉義熈九年又一周爲宋元徽元年自後梁大通元年隋開皇十三年唐永徽四年開元元年大厯八年太和七年景福二年周顯徳二年本朝祥符六年熙寧六年皆歳在癸丑凡七百八十年矣乃作詩以紀其事云快雨霽亭午晴曦作春妍鄰曲饒勝士共開浮水筵中流愜嘯詠隱浪金壺偏紅芰初出水捧劍疑来前緬懐蘭亭會七百八十年可憐右軍癡生死情纒綿由来彭殤齊顧或謂不然吾黨殆天放卜夜就管絃尺六細腰女舞袖輕回旋且畢今日歡不期来者傳同上上巳日於流水上洗濯祓除去宿垢故謂之祓禊禊者潔也王逸少作蘭亭叙云永和九年歳在癸丑會於會稽山隂之蘭亭修禊事也當其羣賢畢集遊目騁懐之際而感慨係之乃有一死生爲虚誕齊彭殤為妄作之語議者以此咎羲之之未達也同上自冬至一百五日至寒食故世言寒食皆稱一百五杜子美一百五日夜對月云無家對寒食有淚如金波姚合寒食書事詩云今朝一百五出戸雨初晴則是詩人例以百五日爲寒食也或者乃謂自冬至至清明凡七氣至寒食止百五日殊不知厯家以餘分演之也司馬彪續漢書云介子推焚林而死故寒食不忍舉火至今有禁烟之說盧象所謂子推言避世山火遂焚身四海同寒食千秋爲一人是也太原一郡舊俗禁烟一月周舉為郡守以人多死移書惟秪禁烟三日子美清明詩云朝来新火起又家人鑽火用青楓皆在寒食三日之後則知禁烟止於三日也而韓翃有寒食即事詩乃云春城無處不飛花寒食東風御栁斜日暮漢宫傳蠟燭青烟散入五侯家不待清明而巳傳新火何耶元微之連昌宫詞云初過寒食一百六店舎無烟宫樹綠念奴覓得又連催特勅宫中許然燭一百六在清明前寒食之後是時店舎巳無烟而宫中然燭乃一時之權宜爾或云龍星朩之位也春屬東方心爲大火懼火盛故禁火是以寒食有龍忌之禁則所謂禁烟又未必爲子推設也同上詩話總龜後集巻二十六欽定四庫全書詩話總龜後集巻二十七宋阮閱撰詠物門杜集及馬與鷹甚多亦屢用屬對如老驥倦知道蒼鷹飢易馴老驥思千里飢鷹待一呼老馬倦知道蒼鷹飢著人驥病偏思秣鷹愁怕入籠放蹄知赤驥捩翅服蒼鷹老驥倦驤首飢鷹愁易馴驄馬行云吾聞良驥老始成此馬數年人更驚又不比俗馬空多肉一洗萬古凡馬空楊監出畫鷹云干戈少暇日真骨老崖嶂為君除狡兔㑹見翻韝上王兵馬二角鷹云安得汝輩皆其羣驅出六合梟鸞分畫鷹云何當擊凡鳥毛血灑平蕪餘尚多有之蓋以壯心未甘伏櫪嫉惡剛腸尤思排擊語曰驥不稱其力稱其徳也左氏曰見無禮於其君者如鷹鸇之逐鳥雀也少陵有焉葛常之周顒有云性命之在彼極切滋味之於我可除今人以活臠而資口腹者比比皆是也是誠何心哉或曰羊豕大身難於刲割蚶蛤微命易於烹熬如是則性命之小者尤不幸也鍾岏嘗告其師何子季曰車螯蚶蠣眉目内闕脣吻外緘不悴不榮曽草朩之不若無聲無臭與瓦礫其何算故可長充庖厨永爲口實何其仁於大而忍於細歟山谷信佛甚篤而晚年酷好食蟹所謂寒蒲束縛十六輩已覺酒興生江山又云雖爲天上三辰次未免人間五鼎烹乃果於殺如此何哉東坡在海南爲殺雞而作疏張乖崖在成都爲刲羊而轉經豈愛物之仁不能勝口腹之欲耶山谷談無碍禪蘇張行有為法亦各其所見爾永叔堪笑區區郊與島螢飛露濕吟秋草以爲二子之窮子美亦有暗飛螢自照水宿鳥相呼幸因腐草出敢近太陽飛雖吟詠微物曽無一㸃窮氣臨川蕭蕭出屋千尋玉竹也靄靄當窓一炷雲香也皆不名其物然子厚破額山前碧玉流泉也已有此格近詩蕨芽已作小兒拳退之已有初拳㡬枝蕨竹未嘗香也而杜子美詩云雨洗娟娟浄風吹細細香雪未嘗香也而李太白詩云瑶臺雪花數千㸃片片吹落春風香葛常之韓退之雙鳥詩多不能曉或者謂其詩有不停兩鳥鳴百物皆生愁不停兩鳥鳴大法失九疇周公不爲公孔子不爲邱之句遂謂排釋老而作其實非也前云一鳥落城市一鳥巢巖幽後云天公怪兩鳥各捉一處囚則豈謂釋老耶余嘗觀東坡作李白畫像詩云天人㡬何同一漚謫仙非謫乃其游揮斥八極隘九州化爲二鳥鳴相酬一鳴一息三千秋縻之不得矧肯求且知所謂雙鳥者退之與孟郊輩爾所謂不停兩鳥鳴等語乃實公告天之言甚其辭以譖二鳥爾落城市退之自謂巢巖幽謂孟郊輩也各捉一處囚非囚禁之囚止言韓孟各居天一方爾末云還當三千秋更起鳴相酬謂賢者不當終否當有行其言者同上本事云鮑當孤鴈詩云更無聲接續空有影相隨孤則孤矣豈若子美孤鴈不飲啄飛鳴尤念羣誰憐一片影相失萬重雲有不盡之意乎同上王誼伯謂西川有杜鵑東川無杜鵑蓋是題下注斷自我昔遊錦城為句首子瞻謂杜備諸家體非必牽合程度詩意蓋譏當時刺史有禽鳥不若者明皇以後天步多棘凡尊君者為有也懐貳者為無也魯直亦云臣結春秋二三策臣甫杜宇再拜詩忠臣銜憤痛切骨後世但識瓊瑰辭今觀此篇叙鴻鴈羔羊禮自太古尊君親上之意為明皇設不疑至於杜鵑行乃云雖同君臣有舊禮骨肉滿眼身羇孤又云爾惟摧殘始發憤羞帶羽翮傷形愚指斥罵詈殊無致嚴之語莫不皆有所主也黄常明東坡南都王誼伯書江濱驛垣謂子美詩歴五季兵火多舛缺竒異雖經其祖父所理尚有疑闕者誼謂西川有杜鵑東川無杜鵑涪萬無杜鵑雲安有杜鵑蓋是題下注斷自我昔遊錦城為首句誼伯悞矣且子美詩備諸家體非必牽合程度偘偘者然也是篇句處凡五杜鵑豈可以文害辭辭害意耶原子美之意類有所感託物以發者也亦六義之比興離騷之法歟按博物志杜鵑生子寄之他巢百鳥為飼之故江東所謂杜宇曽為蜀帝王化禽飛去舊城荒且禽鳥之微有識故子美詩云重是古帝魂又曰禮若奉至尊子美蓋譏當時刺史有不禽鳥若也唐自明皇以後天步多棘刺史能不忘君可得而考也嚴武在蜀雖横斂刻薄而實資中原是西川有杜鵑耳其不䖍王命負固以自抗擅軍旅絶貢賦如杜克遜在梓州爲朝廷西顧之憂是東川無杜鵑耳至於涪萬雲安刺史微不可考凡尊君者為有也懐貳者為無也不在夫杜鵑真有無誼伯以為来東川聞杜宇聲乃始疑子美跋疐紙上語又云子美不應疊用韻子美自我作古疊用韻無害於詩僕所見如此誼伯博學强辯殆必有以折中之䂬溪花卿歌云用如快鶻風火生南史曹景宗謂所親曰昔在鄉里與少年輩拓弓弦作霹靂聲箭如餓鴟呌覺耳後生風鼻尖出火子美蓋不拘泥於鴟鶻之異也黄常明栁子厚牡丹曰欹紅醉濃露窈窕留餘春坡云殷勤朩芍藥獨自殿餘春留與殿重輕雖異各有宜也楊中立梅詩云欲驅殘臘變春風只有寒梅作選鋒頗恨不與殿軍商確正一的對同上西湖浮動横斜之句最爲前輩擊節常恨未見全篇得其集觀之云衆芳揺落獨暄妍占盡風情向小園踈影横斜水清淺暗香浮動月黄昏霜禽欲下先偷眼粉蝶如知合斷魂幸有微吟可相狎不須檀板共金樽其卓絶不可及專在十四字耳又有七言數篇皆無如池水倒窺踈影動屋簷斜入一枝低雪後園林纔半樹水邊籬落忽横枝之句䂬溪千里蓴羮未下鹽豉蓋言未受和耳子美豉化蓴絲熟又豉添蓴菜紫聖俞送人秀州剰將鹽豉煑紫蓴魯直鹽䜴欲催蓴菜熟同上巴峽中有吐綬雞比常雞差大嗉藏肉綬長闊㡬數尺紅碧相間極煥爛常時不見遇晴日則向陽擺之頂首先出兩肉角亦二寸許然後徐舒其綬逾時乃斂李文饒詩所謂葳蕤散綬輕風裏若銜若垂何可擬是也文饒云出剡溪今詢之越人不復有予嘗自峽中攜至蘇州人皆不識則知山川風氣所産古今亦有不同也蔡寛夫詩話真珠雞生䕫峽山中畜之甚馴以其羽毛有白圓㸃故號真珠雞又名吐綬雞生而反哺亦名孝雉每至春夏之交景氣和煖頷下出綬帶方尺餘紅碧鮮然頭有翠角雙立良久悉斂於嗉下披其毛不復見或有死者割其頸臆間亦無所覩苕溪漁隠曰廣右閩中亦有吐綬雞余在二處見人多養之不獨巴峽中有也王荆公有絶句云樊籠寄食老低摧組麗深藏肯自媒天日晴明聊一吐兒童初見互驚猜倦游錄李衞公詩云五月畬田收火米三更津吏報朝雞頗似少陵句王荆公詩云紛紛易變浮雲白落落難鍾老柏青山谷蟹詩云巳標天上三辰次未免人間五鼎烹此皆得老杜句法雪浪齋日記唐故事中書省植紫薇花歴世循用之不以為非至今舍人院紫薇閣前植紫薇花用故事也樂天詩云獨坐黄昏誰是伴紫薇花對紫薇郎按天文志紫微大帝之座也天子之常居也主命主度也何關紫薇花事湘素雜錄嘗見曲中使栁三眠事不知所出後讀玉溪生江之嬀賦云豈如河畔牛星隔歳止聞一過不比苑中人栁終朝剰得三眠注云漢苑中有栁狀如人形號曰人栁一日三起三倒漫叟詩話玉溪生牡丹詩錦帳佳人乃越絶書中事退之燈花詩全似老杜所用黄裏事見前漢黄屋注中荆公詩曰溪邊飲啄白浮鳩浮鳩出晉志雪浪齋日記牧之和裴傑新櫻桃詩云忍用烹騂酪從將玩玉盤流年如可住何必九華丹唐人巳用櫻桃薦酪也苕溪漁隱曰摭言載唐新進士尤重櫻桃宴劉覃及第大會公卿和以糖酪用享人獻一小盤則唐人用櫻桃薦酪此事又可驗矣髙齋詩話老杜櫻桃詩云西蜀櫻桃也自紅野人相贈滿筠籠數回細冩愁仍破萬顆勻圓訝許同此詩如禪家所謂信手拈来頭頭是道者直書目前所見平易委曲得人心所同然但他人艱難不能發耳至於憶昨賜霑門下省退朝擎出大明宫金盤玉著無消息此日嘗新任轉蓬其感興皆出於自然故終篇遒麗韓退之有賜櫻桃詩云漢家舊種明光殿炎帝還書本草經豈似滿朝承雨露共看轉賜出青冥香隨翠籠擎偏重色照銀盤冩未停食罷自知無補報空然慙汗仰皇扃蓋學老杜前詩然搜求事跡排比對偶其言出於勉强所以相去甚逺若非老杜在前人亦安敢輕議詩眼温庭筠小詩尤工如牆髙蝶過遲又蝶翎胡粉重鴉背夕陽多又過蘇武廟詩云歸日樓臺非甲帳去時冠劍是丁年雪浪齋日記温飛卿晚春曲云家臨長信往来道乳燕雙雙拂烟草油壁車輕金犢肥流蘇帳曉春雞報籠中嬌鳥煖猶睡簾外落花閒不掃衰桃一樹近前池似惜容顔鏡中老殊有富貴佳致也苕溪漁隠韓偓詩云鵞兒唼啑雌黄觜鳳子輕盈膩粉腰事見崔豹古今注云蛺蝶大者為鳳子西清詩話傳道嘗於彭門壁間見書一聨云一鳩鳴午寂雙燕話春愁後以語東坡且謂公然否坡笑曰此唐人得意句僕安能道此苕溪漁隠曰余嘗用此語作春日一聨云話盡春愁雙紫燕喚回午夢一黄鸝同上陳恭公執中以衞尉寺丞知梧州驛遞上疏乞立儲貳真宗嘉其敢言翌日臨朝袖其疏以示執政歎奬久之召爲右正言然爲王冀公所忌一日真宗賦御溝栁詩宣示宰相兩省皆和進恭公因進詩曰一度春来一度新翠光長得照龍津君王自愛天然色恨殺昭陽學舞人東軒筆錄紅梅清艷兩絶昔獨盛於姑蘇晏元獻始移植西岡第中特珍賞之一日貴游賂園吏得一枝分接由是都下有二本公嘗與客飲花下賦詩曰若更遲開三二月北人應作杏花看客曰公詩固佳特比擬何淺也公笑曰顧傖父安得不然一坐絶倒王君玉聞盜花事以詩遺公云館娃宫裏舊精神粉瘦瓊寒露蕊新園吏無端偷折去鳳城從此有雙身自爾名園事培接遍都城矣苕溪漁隠曰王介甫紅梅詩云春半花纔發多應不奈寒北人初未識渾作杏花看與元獻之詩暗合然介甫句意俱工勝元獻逺矣西清詩話總龜後集巻二十七欽定四庫全書詩話總龜後集巻二十八宋阮閱撰詠物門歐陽文忠公極賞林和靖疎影横斜水清淺暗香浮動月黄昏之句而不知和靖别有詠梅一聨云雪後園林纔半樹水邊籬落忽横枝似勝前句不知文忠何緣棄此而賞彼文章大槩亦如女色好惡止繫於人苕溪漁隠曰王直方又愛和靖池水倒窺疎影動屋簷斜入一枝低以謂此句於前所稱真可處伯仲之間余觀此句畧無佳處直方何爲喜之真所謂一蟹不如一蟹也山谷爲詩當飽參然後臭味乃同雖爲大宗匠者亦然月觀横枝之語乃何遜之妙處也自林和靖一參之後參之者甚多雪浪齋日記唐人牡丹詩云紅開西子粧樓曉翠掲麻姑水殿春若改春作秋全是蓮花詩林和靖梅花詩云疎影横斜水清淺暗香浮動月黄昏近似野薔薇也陳輔之詩話凡詠梅多詠白而荆公詩獨云鬚撚黄金危欲墮蔕團紅蠟巧能糚不惟造語巧麗可謂能道人不到處矣又東坡詠梅一句云竹外一枝斜更好語雖平易然頗得梅之幽獨閒静之趣凡詩之詠物雖平淡巧麗不同要能以隨意造語爲工荆公後復有詩云遥知不是雪爲有暗香来蓋取蘇子卿云只言花似雪不悟暗香来之意公在金陵又有和徐仲顰文字韻梅詩二首東坡在嶺南有暾字韻梅詩三首皆韻險而語工非大手筆不能作也遯齋閒覽驛使前時走馬回北人從識越人梅清香莫把酴醿比只欠溪邊月下杯此梅二丈京師逢賣梅花絶句吾隨後輩猶及與之周旋覽其親書如見其抵掌談笑也東坡韓持國雖剛果特立風節凛然而情致風流絶出時輩許昌崔象之侍郎舊第今為杜君章所有㕔後小亭僅丈餘有海棠兩株持國每花開輒載酒日飲其下竟謝而去歳以爲常至今故吏猶能言之余嘗於小亭柱間得公二絶句其一云濯錦江頭千萬枝當年未解惜芳菲而今得向君家見不怕春寒雨濕衣尚可想見當時氣味韓忠獻公嘗帥蜀持國兄弟皆侍行尚少故前句云爾其二云長條無風亦自動柔艷著雨更相宜漫其後句苕溪漁隠曰鄭谷海棠詩云穠麗最宜新著雨妖嬈全在欲開時前輩以謂此兩句說盡海棠好處今持國柔艷著雨更相宜之句乃用鄭谷語也至於東坡作此詩則詞格超逸不復蹈襲前人其詩有嫣然一笑竹籬間桃李漫山總粗俗自然富貴出天姿不待金盤薦華屋朱脣得酒暈生臉翠袖巻紗紅映肉林深霧暗曉光遲日暖風輕春睡足雨中有淚亦悽愴月下無人更清淑元豐間東坡謫黄州寓定惠院院之東小山上有海棠一株特繁茂每歳盛開時必爲攜客置酒巳五醉其下矣故作此長篇平生喜爲人冩蓋人間刋石者自有五六本云軾平生得意詩也石林詩話隠居詩話云吕士隆知宣州好以事笞官妓妓皆欲逃籍而未能也會杭州有一妓到宣其色藝可取士隆喜之留之使不去一日郡妓復犯小過士隆又欲笞之妓泣訴曰某不敢辭罪但恐杭妓不能安也士隆愍而捨之聖俞因作莫打鴨一篇曰莫打鴨打鴨驚鴛鴦鴛鴦新向池邊浴不比孤洲老秃鶬秃鶬尚欲逺飛去何况鴛鴦羽翼長蓋謂此也詠物詩不侍分明說盡只彷彿形容便見妙處如魯直酴醿詩云露濕何郎試湯餅日烘荀令炷爐香義山雨詩云摵摵度瓜園依依傍水軒此不待說雨自然知是雨也後来魯直無已諸人多用此體吕氏童䝉訓苕溪漁隠曰裴璘詠白牡丹詩云長安豪貴惜春殘争賞先開紫牡丹别有玉杯承露冷無人起就月中看時稱絶唱以余觀之語句凡近不若胡武平詠白牡丹詩云璧堂月冷難成寐翠幄風多不奈寒其語意清勝過裴璘逺矣如皮日休詠白蓮詩云無情有恨何人見月冷風清欲墮時若移作詠白牡丹詩有何不可語更清切耳曼卿詠小桃二絶句云生色深紅綬帶長宫簾寒在井欄香母家升上瑶池品先得春風一面妝本分桃花寒食前小桃長是上春天二喬二趙俱傾國女弟嬌彊意自先其模冩命意豈不佳哉王直方詩話云或有稱詠松句云影揺千尺龍蛇動聲撼半天風雨寒者一僧在坐曰未若雲影亂鋪地濤聲寒在空或以語聖俞聖俞曰言簡而意不遺當以僧語爲優詩話總}
