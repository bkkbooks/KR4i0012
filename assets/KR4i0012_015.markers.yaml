  - {type: variant, offset: 4449, length: 330, content: 百家詩話緫龜後集卷之十五評史門老杜北征詩云憶昨狼狽初事與古先別不聞夏商衰中自誅褒妲其意謂明皇英㫁自誅妃子與夏商之誅褒妲不同老杜此語出扵愛君曲文其過非至公之論也白樂天詩云六軍不發無柰何宛轉蛾眉馬前死非逼迫而何哉然明皇能割一巳之愛使六軍之情帖然亦可謂知所輕重矣故前軰有詩云畢竟聖明天子事景陽赴井是何人丹陽集晋盧諶先為劉琨從事中郎將叚匹磾領幽州求諶為别駕故琨荅諶詩云情滿伊何蘭桂移植茂彼春林瘁此秋棘言諶弃巳而就疋磾也厥後琨命箕淡攻石勒一軍皆没由是窮蹙不能自守乃率衆赴匹磾繼為匹磾所拘知其必死矣豈無望扵諶㢤觀再贈諶云朱實隕勁風䌓英落素秋何意百煉鋼化為繞指柔其詩托意欲以激諶而救其急而諶殊不領也琨旣𬒳害諶始上表以雪其冤終亦何所𥙷耶漢元帝時弘恭石顯用事京房劉向皆深嫉之嘗上, WYG: 欽定四庫全}
