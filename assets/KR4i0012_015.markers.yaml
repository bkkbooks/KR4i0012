  - {type: variant, offset: 4780, length: 2261, content: 力詆盖薫蕕氷炭不能以共䖏理之必然也然房欲淮陽王為巳助代王作求朝奏章向令外親上䟽謂小人在朝以致地動雖嫉惡之心切然於忠實亦少貶矣使二子果輸忠扵漢當明目張膽論至再三可也何暇為身謀而假之扵他人㢤故荆公詩云京房劉向各稱忠詔獄當年迹自窮畢竟論心異恭顯不妨迷國畧相同後之論人物者倘取其心而畧其迹則善矣韻語陽秋張祐觀狄梁公傳云失運廬陵厄乗時武后尊五丁扶造化一柱正乾坤而山谷有鯨波横流砥柱虎口舌國宗臣之句可謂善論仁傑者余謂仁傑不畏武后羅織之獄三族之夷強犯逆鱗敢以廬陵王為請者非特天資忠義亦以先得武后之心故也且張易之昌宗后之嬖臣也欲歸廬陵事大體重非二嬖之言后孰信之吉頊能以危言撼二嬖陳易吊為賀之計故二嬖敢從容以請而后意遂定扵是仁傑之諌得行卒之遣徐彦伯迎廬陵王扵房州者由仁傑之言也故史援吕温之言稱之曰取日虞淵洗光咸池潜授五龍夾之以飛於乎仁傑其忠且賢㢤按仁傑傳始后欲立武三思而李昭徳傳乃云洛陽人王慶之請以武承嗣為皇太子昭徳力争今考三思本傳不載為皇太子之說而承嗣傳云洛州人請立承嗣為皇太子岑長倩格輔元皆争不從而不及昭徳豈有牴牾耶裴度在朝憲宗委任不疑使破三賊巳而呉元濟授首王承宗割二州遣子入侍李師道𬒳擒两河諸侯忠者懐強者畏克融廷奏皆不敢桀勲烈之盛一時無與比肩者惟李義山指為聖相詩曰帝得聖相相曰度又曰嗚呼聖皇及聖相亦過矣㢤荀卿曰得聖臣者帝若舜禹伊尹周公皆聖臣也謂四人為聖臣則可謂裴度為聖相其可㢤唐明皇以英銳身致極治以荒淫身致極亂自古人君成敗之速未有如眀皇者鄭毅夫詩云四海不揺艸九重藏旤根十年傲堯舜一笑破乾坤盖是意也開元之盛能致兵寢刑措之治者實姚宋輔政之功明皇可以無疑矣不三四年遽使去位及李林甫用事則盤旋紏固至十八九年敗國蠧賢無所不至猶以為未足也晩年顧力士曰海内無事朕將吐納導引以天下事付林甫天下安得而不亂乎並同上史載宋之問冉祖雍並賜死扵桂州之間得詔震汗不引决祖雍請扵使者曰之問有妻子幸之决使者許之而之問荒悸不能處家事及考之文集有登大庾嶺詩云兄弟逺謪居妻子咸異域則之問赴貶時未嘗以妻子行也又有發藤州及昭州二詩二州皆在桂州之南則賜死之地非桂州眀矣豈史之誤歟丹陽集漢高祖置酒沛宫酒酣擊筑自歌曰大風起兮雲飛揚威加海内兮歸故郷安得猛士兮守四方時帝有天下已十二年當思耆艾賢徳與共維持獨專意猛士何㢤豈馬上三尺嫚罵未易遽革邪治道終以覇雜盖有由然其前年下詔曰賢士大夫吾能尊顯之是年下詔曰與天下之賢豪士大夫同安緝之謂播告之辭乃秉筆代言非若耳熱之歌乃中心所欲也許汜不為陳元龍所禮嘗與劉備稱之備曰君有國士名望無救世意而求田問舎言無可采何縁當與君語如小人欲卧百尺樓卧君扵地何但上下床之間耶然介甫屢用之求田問舎轉無成更覺求田問舎遲讀蜀志曰無人語與劉元徳問舎求田意最高又有㳺西霞庵云求田此山下終𣣔忤陳登豈非力𣣔轉此一重案欤老杜北征詩云經年至茅屋妻子衣百結慟哭松聲回悲泉共幽咽平生所嬌貌顔色白扵雪見爺背面啼垢膩脚不襪方是時杜方脫身於萬死一生之地得見妻児其情如是洎至秦中則有晒藥能無婦應門亦有児之句至成都則有老妻憂坐痺㓜女問頭風之句觀其情悰巳非北征時比也及觀進艇詩則曰晝引老妻乗小艇晴看稚子浴清江江村詩則曰老妻畫𥿄為棋局稚子敲針作釣鉤其優㳺愉恱之情見扵嬉戯之間則又異扵在秦中時矣葛常之白樂天作八漸偈云苦旣非真悲亦是假則世間悲歡人我必能忘情始憲宗欲以樂天為刺史王涯以資淺為言遂得江州司馬及涯敗作詩快之有當君白首同歸日是我青山獨徃時之句李徳𥙿扵樂天不見有隙徳𥙿貶崖州亦作三絶快之其一篇云樂天嘗任蘇州日要勒須教用禮儀從此結成千萬恨今朝果中白家詩盖嘗以唐史攷之樂天卒扵㑹昌之初武宗時也而徳𥙿之貶乃在宣宗大中年則徳𥙿之貶樂天死巳乆非樂天之詩明矣以是凖之快王涯之句恐亦未必然也韻語陽秋西伯將出獵卜之曰所獲非龍非彲非虎非羆所獲覇王之輔扵是果遇太公扵渭水之陽載與俱歸此司馬遷之說也文王至磻谿見吕尚釣鈎得玉璜刻曰姬受命吕佐檢徳合于今昌來提此尚書大傳之說也太公釣扵滋泉文王得而王此吕不韋之說也吕望年七十釣扵渭渚初下得魴次得鯉刳腹得書書文曰吕望封扵齊此劉向之說也太公避紂居東海之濵聞文王作興曰盍歸乎來由文王至於孔子五百有餘歳若太公望則見而知之此孟子之說也是數說者皆言天産英輔以興周盖非碌碌佐命者之可擬而司馬遷乃摭或者之論謂西伯拘羑里散宜生閎夭招吕尚求羙女竒物獻扵紂而贖西伯西伯旣脫三人有隂謀脩徳以傾商政此豈所以待太公也㢤歐陽詹云論兵去商虐講徳興周道屠沽未遇時何異斯川老余比赴官宜春扵夀昌道中見壁間題一詩云漁翁何事亦從戎變化神竒抵掌中莫道直鈎無所取渭川一釣得三公一以為傾商政一以為釣三公皆非知聖賢者韻語陽秋李太白至邯鄲登城樓詩云提携袴中児杵臼及程嬰空孤獻白刄必死耀丹誠是有取扵二子甚重袴中児謂趙武也然司馬遷作趙晉二世家自相矛盾左氏所書又復不同將何以取信扵后世耶晋世家之說曰景公十七年誅趙同趙括令庻子武為後趙世家之說曰景公三年屠岸賈攻趙朔殺趙括等朔同友人程嬰匿趙武於山中至十五年景公有議立趙武左氏之說曰魯成公八年六月晋討趙同趙括武從姬畜于公宫以其田與祁奚韓厥言扵晋侯曰成季之勲宣孟之忠無後為善者懼矣乃立武而反其田按成公八年即晋景公十七年也或云匿武扵山中或云畜武扵宫中或云十五年而後立武或云未踰月而立武皆未知所㩀也揚雄之迹曲謟新室議之者衆矣此置而不論雄之心如何㢤觀法言之書似未明乎大道之㫖也王荆公乃深許之何耶詩云寥寥鄒魯後於子獨先覺又云懦者陵夷此道窮千秋止有一楊雄又云道眞沉溺九流渾獨泝頽波討得源又云子雲平生人莫知知者乃獨稱其辭今尊子雲者皆是得子雲心亦無㡬是亦聖人許雄也東坡謂雄以艱深之辭淺易之說與公矛盾矣同上百家, WYG: ''}
