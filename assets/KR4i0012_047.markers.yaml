  - {type: variant, offset: 5839, length: 935, content: 忘其名年九十餘自言嘗随其師入蜀主孟昶宫中一日大熱蜀主與花蕊夫人夜起避暑摩訶池上作一詞宋具能記之今四十年耒巳死矣人無知此詞者独記其首两句云氷肌玉骨自清凉無汗暇日㝷味豈洞仙歌令乎乃為足之云苕溪漁隱曰漫叟詩話所載本事曲云錢唐一老尼能誦後主詩首章两句與東坡洞仙歌序全然不同當以序為正也東坡洞仙歌序楊元素作本事曲記洞仙歌氷肌玉骨自清凉無汗水殿凨耒暗香滿繍簾開一點明月窺人人未寢欹枕釵横鬂乱起耒携素手庭户無聲時見踈星渡河漢試問夜如何夜巳三更金波淡玉縄低轉細屈指西凬幾時耒又不道流年暗中偷換錢唐有一老尼能誦後主詩首章两句後人為足其意以填此詞余嘗見一士人誦全篇云氷肌玉骨清無汗水殿凨来暗香暖簾開明獨窺人欹枕釵横雲雲乱起耒瓊户時見踈星渡河漢屈指西凬幾時耒只恐流年暗中換漫叟詩話太和𥘉有為御史分務洛京者有妓善歌時太尉李逢吉留守求一見既不敢辭盛粧以徃李命與衆姫相見李姫四十餘􅒰皆出其下既入不復出頃之李亦辞以遂疾罷坐信宿耗絶但怨歎不能巳已為詩两篇投献明日李但含笑曰大好詩遂絶詩曰三山不見海沉沉豈有仙踪尚可㝷青鳥去時雲路断姮娥㱕去月宫深紗窓暗想春相憶書幌誰令夜獨吟料得此時天上月只應偏照两人心一篇亡苕溪漁隱曰余觀刘賓客外集有憶妓四首内有一首即前詩也其餘三首亦是前詩之意也古今詩話中旣不云御史姓名則此詩豈非夣得為之假手乎古今詩話何彼穠矣之詩羙王姫而作也周姫姓故皇女皆称姫如陳嬀楚芈齊姜之類是也後世凢婦人皆称姫誤矣南朝人士皆謂姫人如䔥綸見姫人詩所謂狂夫不妬妾随意還家刘孝綽詠姫人未出詩所謂帷開見釵影簾動聞釧声梁王僧孺為姫人怨詩所謂還君与妾扇㱕妾與君裘江捴為姫人怨服藥詩所謂妾家邯郸好輕薄持忿仙童一丸藥是也丹揚集後山詩話退之詩云長安衆冨児盤饌羅羶葷不能文字飲惟觧醉紅裙而老有二妓號絳桃栁枝故文昌張藉云為出二侍女合弹琵琶筝也又為李于志叙當世名貴服金石藥𣣔生而死者数軰著之石藏之地下豈為一世戒邪而竟以藥死故白樂天云退之服硫黃一病竟不痊也唐語林退之二侍妾一曰綘桃二曰栁枝皆能歌舞𥘉使王庭湊至壽陽驛絶句云凬光𣣔動别長安春半邊城特地寒不見園桃并巷栁馬頭惟有月團圓蓋寄意二姝逮㱕栁枝踰垣遁去家人追獲故鎮州𥘉㱕詩云别耒楊桞汀頭樹擺乱春凬只𣣔飛惟有小園桃李在留花不發待郎㱕自是專寵綘桃矣䂬溪百家詩話捴龜後集卷之四十七終, WYG: 阮閱撰鬼}
