  - {type: variant, offset: 4394, length: 1444, content: 七䴡人門銅雀伎古人賦詠多矣鄭惜云舞餘依帳泣歌罷向陵㸔張正見云雲慘當歌曰松吟欲舞風賈至云靈几臨朝奠空牀卷夜衣王勃云妾本深宫妓曽城閉九重君王歡愛盡歌舞爲誰容沈佺期云昔年分食鼎今日望陵䑓一旦雄圗盡千秋遺令開皆佳句也羅隱云強歌強舞竟難勝花落花開淚滿繒秪合當年伴君死免教憔悴望西陵似比諸人差有意也魏武隂賊險狠盗有神器實竊英雄之名而臨死之日乃遺令諸子不忘於葬骨之地又使伎人㸔銅雀䑓上以歌舞其魂亦可謂愚矣東坡云操以病亡子孫滿前而咿嚶涕泣留連妾媍分香賣履區處衣物平生姦偽死見真性真名言㢤葛常之人君不能制𣣔於媍人以至溺惑廢政未有不亂亡者桀奔南巢􅍔階妺喜魯威亾國惑始齊姜妲巳褒娰以至楊妃張孔之徒皆是也呉於西施王之耽惑不减於諸后一夕越兵至而王不知也鄭毅夫詩云十重越甲夜城圍燕罷君王醉不知若論破呉功苐一黄金只合鑄西施謂非西施則呉不亡呉不亡則安得以黄金而鑄之容㢤東坡范蠡詩云誰將暗矢射呉児長笑申公爲夏姬却遣姑蘇有麋鹿更令夫子得西施言楚申公欲弱楚而強呉者以夏姬之故曾不如范蠡滅吴覇越而坐得西施也同上韓康公上元召從官数人出家妓侍飲其專寵者曰魯生偶中蜂螫少頃持扇就東坡乞詩詩中有魚吹細浪歌摇日舞罷花枝蜂入懐之句上句記姓下句記事侯鯖録東坡嘗飲一豪士家岀侍姫十餘人皆有姿伎其間有一善舞者名媚児容質頗䴡而軀幹甚偉豪士特所寵愛命乞詩扵公公戯爲四句云舞䄂𥚹􅝆影揺千尺龍蛇動歌喉宛轉聲撼半天風雨寒妓頳然不悦而去迍齋閑覧王晋卿都尉既䘮蜀囯貶均州姫侍尽逐有一號者號囀春鶯色藝两絶平居属念不知流落何許後二年内徙汝隂道過許昌市傍小楼聞泣声甚悲晋卿異之問乃囀春鶯也恨不可復得因賦一聮佳人已属沙吒利義士今無古押衙晋卿每話此事客有足成章者晋卿覧之尤愴然其詞曰幾年流落向天洭萬里㱕耒两鬂葉翠䄂香殘空浥泪青楼雲渺定誰家佳人已属沙吒利義士今無古押衙囬首音塵两沉絶春鶯休囀沁園花西清詩話蔡持正謫新州侍兒名琵琶嘗飬一鸚鵡持正毎呼琵琶即和一響板鸚鵡傳言呼之琵琶卒後悮觸響猶傳言呼之持正感傷成疾不起嘗為詩云鸚鵡言猶在琵琶事已非傷心瘴江水同渡不同㱕苕溪漁隱曰持正守安州夏日登車蓋作十絶句為吴処厚箋注得罪謫新州其間一絶云𥿄屏石桃竹方牀手倦抛書午夣長睡起莞然成獨笑数聲漁笛在滄浪殊有閑適自在之意侯鯖錄囬紋两讀必徧獨此五詩不然其一曰紅窓小泣低聲怨永日春寒斗帳空中酒落花飛絮乱曉鶯啼破梦匆匆其二曰同誰更倚窓綉落日紅扉小院深東復西流分水嶺恨兼愁續断弦琹其三曰寒信凬飄霜葉黄冷灯殘月照空牀看君寄憶囬紋錦字字萦愁冩断腸其四曰前堂畫燭殘凝泪半夜清香舊染衾烟鎻竹枝寒宿鳥水沉天色霽横叅其五曰娥翠歛時聞燕語泪珠弹処見鴻㱕多情妾似凬花乱薄倖郎如露草希漫叟詩話曽子宣夫人魏氏作虞美人草行云鴻門玉斗紛如雪十萬􅑙兵夜流血咸陽宫殿三月紅覇業已随烟烬㓕刚強必死仁義王隂陵失路非天亡英雄本學萬人敵何用屑屑悲紅粧三軍散尽旌旗倒玉帳佳人坐中老香魂夜逐劒光飛青血化爲原上草芳心寂寞寄寒枝舊曲聞耒似歛眉哀怨徘徊愁不語恰如愁听楚歌時滔滔逝水流今古漢楚㒷亡两丘土當年遺事乆成空慷慨墫前爲舞誰苕溪漁隱曰此詩乃許彦囯表民作表民合肥人余昔随侍先君守合肥嘗借得渠家集集中有此詩又合肥老儒郭全羙乃表民席下舊諸生云親見渠作此詩今曽端伯編選亦列此詩扵表民詩中遂與余所見所聞合覧者可以無疑亦知冷齋之妄也冷齋夜語費氏蜀之青城人以才色入蜀宫後主嬖之號花蕊夫人效王建作宫詞百首囯亡入備後宫太祖聞之召使陳詩誦其囯亡詩云君王城上竪􅑙旗妾在深宫那得知十四萬人齊觧甲寕無一个是男児祖恱蓋蜀兵十四萬而王師纔数萬爾後山詩話㒒七歲時見眉州老尼姓, WYG: 八}
