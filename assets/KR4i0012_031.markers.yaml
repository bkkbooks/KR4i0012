  - {type: variant, offset: 497, length: 1827, content: 遺史翰林蘇公紳嘗題潤州金山一聮云僧依玉鑑光中住人在金鼇背上行乃榮入玉堂之兆巳而果然位止内相亦詩之䜟也青箱雜記李昪徐温飬子冐徐姓名知誥為昇州刺史爲童謡詩曰東海鯉魚飛上天後乃繼温江南李覯召試制科嘗作詩曰人言落日是天涯望㫁天涯不見家巳恨碧山相掩映碧山更被暮雲遮觀此詩有重障碍意恐時命不偶果如其言孟東野下第詩曰棄置復棄置情如刀劍傷又再下第詩曰两度長安陌空將泪見花其後登第詩曰昔日齷齪不足嗟今朝曠蕩思無涯春風得意馬蹄疾一日看盡長安花進取得失盖亦常事而東野噐宇不宏偶下第則情隕穫如傷刀劍以至下淚旣登科則志意充溢一日之間花即看盡何其速邪後授溧陽尉卒㓂萊公方貴時送人使嶺南嘗作詩云到海止十里過山應萬重及貶雷州吏呈圖經問去海㡬里吏曰十里是則南遷之禍巳見於詩也張乖厓公守陳日嘗逰趙氏西園詩曰方信承平無事乆淮南閑殺老尚書後一年捐館亦詩之䜟蘇緘字宣甫性忠義喜功名皇祐中知英州儂賊作過以守禦功換館職㝷坐事貶房州司馬嘉祐中復官知越州諸曁縣余與之同僚嘗贈詩曰燕頷將軍欲白頭昔年忠勇動南州心如鐵石老不挫功在桑榆晚可收十八年再知邕𬋩交趾叛攻城戰没朝廷憫之贈奉國軍節度使謚忠勇則忠勇之謚巳見於余詩矣許州臨頴人成銳應制科嘗以詩三篇獻丞相王文惠野菊云綵檻應無分春風不借恩野花云馨香雖有艶栽植未逢人公謂辭雖綺靡未有登科意别有贈裴員外詩云凭高看漸逺更上最高樓公曰再舉合踐高第果符其言其能品藻如此李璟逰后湖賞蓮花作詩曰蓼花蘸水火不㓕水鳥驚魚銀梭投滿目荷花千萬頃紅碧相雜敷清流孫武巳斬呉宫女琉璃池上佳人頭識者謂雖佳句然宫中有佳人頭非吉也摭遺廖獻䖏士衡山人有詩云雲穿搗藥屋雪壓釣魚船因自解曰屋破而雲穿其中無人也船爲雪壓無用也後六十日果卒余安道自番禺詔赴闕過韶陽逰龍光寺詩云暫離人世界且至佛家郷議者謂非吉兆果卒扵秦淮亭下嘗有日者謂曰到秦地當有災果如其言蘇子羙滄浪亭觀魚詩云自嗟不及逰魚樂虚作人間半世人非吉意也又有云山蟬帶響穿踈户野蔓蟠青入破窓雖佳句然窓破野蔓蟠其中似無人居矣子羙竟卒於謪籍王䖏厚字元羙益州華陽縣人甞遇一老僧論浮世苦空事登第後出郭徘徊古陌軫懐長吟曰誰言今古事難窮大抵榮枯總是空筭得生前隨夢蝶争如雲外指冥鴻暗添雪色眉根白旋落花光臉上紅惆悵荒原懶回首暮林蕭索起悲風及暮還家心疾而卒洞㣲志楊貴妃嘗以假髻為首飾而好服黄裙天寳末童謡曰義髻抛河裏黄裙逐水流明皇雜録李遐周有道術居元都觀嘗題詩數千言皆記明皇廵幸西蜀及禄山僣竊之事時人皆不之悟詩曰燕市人皆去禄山以薊門之事而來也凾關馬不歸哥舒翰敗潼關也可憐山下鬼嵬也環子繫羅衣貴妃小字玉環及馬嵬之死高力士以羅衣縊焉崔曙嘗作明堂火珠詩其中有佳句曰夜來雙月滿曙後一星孤為文士推服崔旣夭殁有一女名星而無男子當時異之季煜暮歲乗醉書扵牖云萬古到頭歸一死醉郷葬地有高原醒而見之大悔不乆謝世翰府名談邵拙字拙之鴈門人好學博通經史水曹郎趙慶有詩贈之曰邁古文章金鸑鷟出群行止玉麒麟仕宦不逹而卒有詩傳於時其間有云萬國不得雨孤雲犹在山此其應歟江南野録何昌陵宰廬陵郡有衙將楊克儉能媚州牧而移其權昌齡以兄事之嘗逰其池舘貽其詩曰經旬因雨不重來門有蛛絲徑有苔再向白蓮亭上望不知花木為誰開未㡬克儉連延範貸死而刑其家破焉議者以為其詩之䜟也賈島嘗為病蟬詩曰病蟬飛不得向我掌中行折翼猶能搏酸音尚極清露華應在腹塵點悮侵睛黄雀并烏鳥俱懐害爾情議者謂無摶風之意果爲禮闈所斥淳化中崇文院直攎絶高處有人題两句云秋風送炎去庭木葉齊落是年立秋日宋炎罷來年立秋葉齊黜張退傳年七十八除夜有詩云八十光隂有二年烟蘿門戸喜開關近來無柰山中相頻寄書來許綴班后四年而薨乃八十二之䜟也此答陳文惠之詩詩史沈詢夜宴僚友歌著辭令曰莫打南來鴈從他向北飛打時雙打取莫遣两分離是夕爲奴歸秦所殺夫妻並死張忠定少年逰華山謁陳圖南遂欲隱華山謂圖南曰欲就分先生山半住可否圖南曰他人即不可如公者吾當分半山相奉然公方有宦職未可釋此其勢如家人張筵笙歌鼎沸忽庖中火起待公救之豈可不赴贈之詩曰自吴入蜀是㝷常歌舞筵中救火忙乞得金陵飬閑散也須多謝鬢邉瘡始皆不諭后忠定更鎮杭益晚年發瘡於腦不瘥乞金陵悉如其詩大中祥符七年乙卯七月二十日終古今詩話滕倪善詩宗人滕郎中守吉州徃謁之㑹秋試告别為詩云秋風江上别旌旗故國無家淚欲垂千里未知投足地前程應是聽猿啼誤攻文字身空老却返漁樵計巳遲羽翼凋零歸不得丹青無路接差池守得詩云此生不與子相見别後卒於旅邸倪又有詩云白髪不知容相國也同閒客滿頭生又題鷺鷥障子云映水有深意見人無懼心同前増修詩話総龜卷之三十一百家詩話總龜後集卷之三十一壬集舒城, WYG: ''}
