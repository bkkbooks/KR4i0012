  - {type: variant, offset: 0, length: 8, content: 增修詩話總龜卷之, WYG: ''}
  - {type: variant, offset: 5, length: 1, content: 龜, SBCK: 􅀛}
  - {type: variant, offset: 6, length: 1, content: 卷, SBCK: 􅃃}
  - {type: variant, offset: 11, length: 496, content: 詩䜟門上太祖采聽至明逺邉事纎悉必知有間者西蜀還問劍外有何事間者曰但聞城郭滿城誦朱山長苦熱詩曰煩暑鬱蒸無所避凉風清冷㡬時來曰此蜀人思我來取也古今詩話僞蜀每歲除日諸宫門各給桃符書元亨利貞四字時昶子善書札取本宫䇿勲府書云天垂餘慶地接長春乾德中伐蜀明年蜀降二月以兵部侍郎吕餘慶知軍府事以䇿勲府爲治所太祖聖節號長春此天垂地接之兆也辛夤遜仕僞蜀孟昶爲學士王師將致討之前歲除昶令學士作詩两句寫桃符上夤遜題曰新年納餘慶嘉節號長春明年蜀亡吕餘慶以叅知政事知益州長春乃太祖誕聖節名也談苑二說不同故两存之梁沙門寳誌銅牌多䜟未來事云有一真人在兾川開口張弓在右邉子子孫孫萬萬年江南李璟其子曰弘兾呉越錢鏐諸子皆連弘字期以應之而真宗諱正當之江南將亡數年前昇元寺殿基掘得石記視之詩也辭曰若問江南事江南事不慿抱雞升寳位走犬出金陵子建居南極安仁秉夜燈東陵嬌小女騎虎渡河氷王師甲戌渡江李煜以丁酉年生曹彬爲大將列柵城南乃子建也潘羙為副將城䧟恐有伏兵命卒縱火乃安仁也錢俶以戊寅年入朝盡獻浙西之地騎虎之謂也誌公嘗畫鹿負按走山中又云两角女子緑衣裳却背太行趍君王一止之月必消亡後禄山亂盖两角即鹿緑即禄女子即安字太行即山名一止之月果正月敗亡唐, WYG: ''}
