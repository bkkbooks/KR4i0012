  - {type: variant, offset: 3542, length: 2741, content: 後集卷之三十八箴規門東坡山村詩云烟雨濛𪷟雞犬聲有生何処不安生但教黄犢無人佩布榖何劳也勸耕意言是時販私塩者多帶刀杖故取前漢龔遂令人賣劍買牛賣刀買犢曰何為帶刀佩犢意言但得塩法寛平令民不帶刀劒而買牛犢則民自力耕不劳勸督以譏塩法太峻不便也又云老翁七十自腰鎌慙愧春山筍蕨甜豈是聞韶觧忘味尔來三月食無塩意言山中之人飢貧無食雖老猶自採筍蕨􅏺時塩法峻急僻逺之人無塩食用動經數月若古之聖賢則能聞韶忘味山中小民登能食淡而樂乎以譏塩法太急也又云杖蔾褁飯去匆匆過眼青錢手空嬴得児童語音好一年強半在城中意言百姓請得青苗錢立便扵城中浮費使却又言鄊村之人一年两度夏秋税及𢾗度請納和預買錢今來更添青苗助役錢因此荘家㓜小子弟多在城市不着次苐但斈得城中人語音而巳以譏新法青苗助役不便也東坡開運塩河詩云居官不任事消散羡長卿胡不歸去來滯晋愧渊明塩事星火急誰能卹農耕薨薨曉鼓動萬指羅溝坑天雨助官政泫然淋衣纓人如鴨與猪投泥相濺驚下馬荒堤上四頋但湖泓綫路不容足又與牛羊争㱕田雖賤辱豈失泥中行寄語故山友謹勿藜羮是時盧秉提舉塩事擘畫開運塩河差夫千餘人某扵大雨中部役其河只為般塩旣非農事而役農民秋田未了有妨農事又其河中間有涌沙数里意言開得不便自歎泥雨劳苦羡司馬長卿居官而不任事又愧陶渊明不早弃官㱕去也農事未休而役千餘人故云塩事星火急誰能卹農耕又言百姓巳劳苦不易天雨又助官政之劳民轉致百姓疲弊役人在泥水中辛苦無異鴨與猪又言某亦在泥中與牛羊争路而行若㱕田豈失此㢤故云寄語故山友謹不可厭藜羔而思仕宦以􅏺開運塩河不當又妨農事也蘇東坡八月十五日觀潮作詩云呉児生長狎濤渊冐利忘生不自怜東海若知明主意應教斥鹵變桑田時新有㫖禁弄潮故云呉児生長狎濤渊冐利輕生不自怜盖言弄潮之人為貪官中利物致其間有溺死者故朝㫖禁断某為其時又好興水利因作此詩言東海若知明主意應教斥鹵変桒田意言東海若知此意當令斥鹵地盡変桑田此事之必不可成者以􅏺興水利之難成也子瞻任杭州通判日轉運司差徃湖州相度堤岸利害因與知湖州孫斍相見作詩與孫斍云嗟余與子乆離群耳冷心灰百不聞苦對青山談世事當湏㪯白便浮名某是時約孫斍并坐客如有言及時事者罸一大盞雖不指言時事是非意言時事多不便不得說也又云天目山前渌浸𥚑碧瀾堂下㸔衘艫作堤捍水非吾事閑送苕溪入太湖某為先曽言水利不便却𬒳轉運司差相度堤岸又云作堤捍水非吾事意言本非㒷水利之人以譏諷水利之不便也王詵送韓幹畫馬十二疋求跋尾子瞻作詩云南山之下汧渭之間想見開元天寳年八坊分屯隘秦川四十萬疋如雲烟騅駓駰駱􅌐驑騵白魚赤兎騂皇䮧龍顱鳯頸獰且妍竒姿逸徳隠駑頑碧眼胡児手足鮮歳時剪刷供帝閑柘𫀆臨池侍三千紅粧照日光流渊楼下玉螭吐青寒徃來蹙踏生飛湍衆工甜茟和朱鈆先生曹覇弟子韓廐馬多肉凥脽圎肉中畫骨誇尤難金覊玉勒綉羅鞍鞭箠刻烙傷天全不如此圗近自然平沙細艸荒芊綿驚鴻脫兔争後先王良挾䇿飛上天何必俯首服短轅意以騏驥自比􅏺执政大臣無能盡我才如王良之御者何必折莭干求進用也子瞻臈月逰孤山詩云獸在薮魚在湖一入池檻㱕期無悞随弓旌落塵土坐使鞭箠環呻呼追胥連保罪及孥百日愁歎一日娯白雲舊有終老約朱綬豈合幽人紆人生何者非􅕋庐故山鶴怨秋猿孤何時自駕鹿車去掃除白髮煩菖蒲麻鞋短褐随獵夫射弋狐兎供朝晡陶潜自作五栁傳潘閬畫入三峰圖吾年凛凛今幾餘知非不去慙衞􅕋歳荒無術㱕亡逋鵠則晝虎為難摹此詩云悞随弓旌落塵土坐使鞭箠環呻呼以譏新法行後公事鞭箠多也詼諧門老杜贈韋左丞有朝叩冨児門暮随肥馬塵至為殘盃冷炙之語及姜少府為清觴異味即云新歡使飽姜侯徳王倚為沽酒割鮮即云故人情義晚誰似豈附炎老饕如是㢤盖託文字戯謔也然又不可不慮故有𥚹性貪幽捿干謁傷直恥事干謁以自見其志亦如示姪佐云甚聞霜薤白重恵意如何巳應舂得細頗斍寄來遅皆戯言也終慮痴人以夢為實故示姪済云所來為宗族亦不為􅐻飱小人利口實薄俗難可論正如渊明乞食篇云飢來駈我去不知意何之行行正斯里扣門拙言辞其卑汚乃尔不肯為五斗拆腰殆與異矣試問高呼二十首何如低唱两三盃又譬如長大人不以長為苦㱕來𬒳上下一夜著無処天斍真賛云書生大抵多穷相金眼除非是党公皆笑林語也北夣瑣言載江陵世號衣冠薮澤人言琵琶多如飯甑措大多如鯽魚退之酧崔少府伊陽詩云下言人吏希惟足彪與虥余官辰溪時士人皆可喜而不多得近城人虎雜居戯為對云固冠思得多扵鯽士人刻木惟冝少似彪吏人某見同㑪因行飲令人索一魚名有浙人大唱云周公魚余謂客坐且喜召伯鮓有對矣滿堂芦胡不止因戯爲足成其語云京語鮓先誇召伯浙音魚或號周公䂬溪文潜詩児曹鞭笞學官府翁怜児痴旁笑侮平明坐衙鞭復呵賢扵群児能幾何児曹鞭笞以爲戯翁怒鞭人血流地一種戯劇誰后先我笑爲公児更賢余謂此詩亦不可不令操權者知也坡云不辭脱袴溪水寒中水照見催租瘢等閑戯語亦有所𥙷後山詩話云楊大年傀儡詩云鮑老當筵笑郭郎笑他舞䄂太琅璫若教鮑老當遥舞轉更琅璫舞䄂長語俚而意切相傳以爲笑後山詩話云乞猫詩秋来䑕軰欺猫死窺瓮翻􅐻攪夜眠聞道狸奴將数子買魚穿栁聘衘蝉雖滑稽而可喜千歲而下讀者如新王直方詩話云謝王炳之惠玉板𥿄詩云王侯髩若緑坡竹此出髯奴傳炳之大以為憾送零陵主簿夏君玉詩未云因行訪幽禅頭陁烟雨外盖君玉頭甚大故以此戯之東軒茟錄云陶榖乆在翰林意希大用仍俾其黨因事薦引言榖在詞禁宣力實多微伺上㫖太祖笑曰翰林草制皆檢前人舊本改換詞語所謂依様晝葫蘆耳何宣力之有榖聞之作詩曰官職湏由生処有文章不𬋩用時無堪笑翰林陶李士年年依舊晝葫蘆太祖薄其怨望遂决意不用矣西清詩話云髙英秀者呉越國人與賛寜為詩友口給好罵滑稽每見眉目有異者必噂短扵其後人號悪啄薄徒嘗譏名人詩病云李山甫覧漢史云王莾弄来曽半破曹公将去便平沉㝎是破船詩李群玉詠鷓鴣云方穿詰曲﨑嶇路又听鈎輈格磔聲㝎見𣑽語詩羅隱云雲中雞犬劉安過月裡笙歌煬帝㱕㝎見鬼詩杜荀鶴云今日偶題題似着不知題後更誰題此衞子詩也不然安有四蹄賛寕笑􅒜而巳苕溪漁隠曰劉義落葉詩云返蟻難㝷穴㱕禽易見窠滿廊僧不厭一片俗嫌多鄭谷桞詩云半烟半雨溪橋畔間杏間桃山路中㑹得離人無限意千絲萬絮惹春風或戯謂此二詩乃落葉及栁謎子觀者試一思之方知其善謔也隠居詩話云昨夜隂山吼賊風帳中驚起黒髯翁平明不待全師出連把金鞭打鉄􅍡不知何人之詩頗為邉人傳誦有張師雄者居洛中好以甘言悦人晚年尤甚洛人目為蜜翁翁㑹官扵塞上一夕傳胡騎犯邊師雄倉皇震恐衣皮裘两重伏扵土穴中神如痴矣秦人呼土窟為土空遽為無名子改前詩以嘲之曰昨夜隂山賊吼風帳中驚起蜜翁翁平明不待全師出連着皮裘入土空許身一何愚自比稷與契杜陵布衣老且愚信口自比稷與契其平居趋超自是唐虞上人時夸儀秦似不可曉飃飄蘇季子六印佩何遲敝裘蘇季子歴國未知還季子黒貂敝得無妻嫂欺戦囯奸民蘇張為渠此老不應未喻及觀薇蕨餓首陽裘馬資歴聘賤子欲適從疑誤此二柄其意甚明前言盖戯耳䂬溪許彦周詩話云黄魯直爱與郭㓛甫戯謔嘲調雖不當盡信至如曰公做詩費許多氣力做甚此語切當有益扵學者不可不知也百家詩話総龜卷之三十八, WYG: 巻}
