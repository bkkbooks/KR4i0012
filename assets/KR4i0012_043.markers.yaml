  - {type: variant, offset: 2827, length: 2483, content: 後集卷之四十三釋氏門坡贈辯才云我比陶令愧公為逺公優時辨才退居未嘗出入坡徃見之遂出至風篁嶺又云如使北山人求記二老㳺用老杜寄賛上人與子成二老来徃亦風流皆一儒一釋也又寄參寥問少㳺失觧云底事秋来不得觧之定中試與問諸天盖劉禹錫和宣上人賀王侍郎放榜後詩云借問至公誰可印支郎天眼定中觀不惟兼具儒釋又正属科埸事其不泛如此䂬溪詩話夢得送僧君素云去来皆是道别此不消魂坡云古今正自同歲月何必書此等語皆通徹無碍釋氏所謂具眼也同上端師子始見弄師子者發明心要則以綵帛像其皮時時著之因以爲號秦少游聞其髙道請申座端以手自指曰天上無雙月人間只一僧一堂風冷笑千古意分明少游首肯之能誦法華經必得錢五百乃開秩日誦数句即持錢地坐去其缺簿者易之而去好歌漁父詞月夕必歌之逹旦有狂僧囬頭和尚以左道鼓動流俗士大夫亦安其妄方對丹陽吕公肉食端徑至指曰正當與麽時如何是佛囬頭不能遽對端捶其頭推倒乃行又有妖人號不托掘秀州城外地有佛像建塔其上傾城敬信端見堪住曰如何是佛不托擬議端趯之而去章相子厚請升座使余秀老撰䟽叙其事曰推倒囬頭趯飜不托七軸之蓮經未誦一聲之漁父先聞端听僧官宣至此以手揶揄曰止乃引聲吟曰本是瀟湘一釣客自東自西自南北大衆雜然称善端頋大笑曰我觀法王法法王法如是下座僧宝傳釣魚船上謝三郎雙鬂已蒼蒼莎衣未必清貴不肯換金章汀草畔浦芲旁静鳴桹自来好箇漁父家風一片瀟湘金華俞秀老作此篇道人多傳之非道意岑寂其語不能如是苕溪漁隱曰傳燈録云玄沙福州閩縣人姓謝氏㓜好垂釣泛小艇扵南䑓江狎諸漁者年甫三十忽慕出塵乃弃釣艇投芙蓉山訓禪師落髪用此事也山谷冷齋夜話謂道潜作詩追法淵明其詩有逼真處曰数聲柔櫓蒼茫外何處江村人夜歸又曰隔林彷彿聞機杼知有人家住翠微余細細味之句格故佳但異淵明語豈得謂之逼真䖏若東坡和陶詩前山正可數後騎且勿驅此方是逼真䖏徳洪不善評詩此豈足慿㢤苕溪漁隱師住天台梅子真舊隱一僧入山迷路問曰和尚在此山多少時也師曰只見四山青又黄又問出山路什麽䖏去師曰流水可隨去僧歸說似塩官塩官令僧去請出山師有偈云摧殘枯木倚寒林幾度逢春不変心樵客遇之猶不頋郢人那得苦追㝷大寂聞師住山乃令一僧到問曰和尚見馬師得箇什麽便住此山師云馬師向我道即心是佛我便向這裏住僧云馬師近日佛法又別師云作麽生別僧云近日又道非心非佛師云這老漢惑乱人未有了曰任汝非心非佛我只𬋩即心即佛其僧廽㪯似馬祖祖云大衆梅子熟也苕溪漁隱曰韓子蒼送僧住梅山詩云寺聞岑寂知何許想到千岩萬壑開待得梅山梅子熟不辞先寄一枝来用前事也傳燈録梵志翻著襪人皆道是錯乍可刺尔眼不可隱我脚一切衆生顛倒皆類如此乃知梵志是大脩行人也昔茅容季偉田家子尔殺雞飯其母而以草具飯郭林宗林宗起拜之因勸使就學遂為四海名士此飜著襪法也今人以珍饌奉客以草具奉其親渉世合義則與已不合義則称親萬世同流皆季偉之罪人也山谷王梵志明州妙音僧法淵為人陽狂日飲酒市肆歌笑自如匄錢於人得一錢即欣然以為飲得之多復與道路廢疾窮者能言人禍福無不騐人疑其精於術數故號淵三命發言無常及問之掉頭不荅惟云去去有䘮之家必徃哭之􅌾則送之無貧富皆徃莫測其意人以其狂又號顛僧大覺禪師𥘉住育王開堂僧倔然出問話人莫不竊笑大斍問顛僧是顛了僧僧了顛荅曰大斍是大了覺覺了犬大覺黙然衆皆驚愕一日忽於市相别携酒一壷至郡守宅前㩀地而飲觀者千餘人酒盡懐中出頌一首欲化去衆皆引聲大呼云不可於此遂歸妙音趺坐而化頌曰咄咄平生顛蹶欲問臨行炉中大雪真相至今存焉三山老人語録蓬州道士賈善翔字鴻舉能劇談善琴嗜酒士大夫喜與之㳺東坡嘗過之献書問曰身如芭蕉心如蓮花百節踈通萬竅玲瓏来時一去時八萬四千末云鴻舉下語賈荅曰老道士這裏没許多般数張天覺䟦其後云去時八萬四千不知落在那邉若不斬頭覔活誰知措大叅禪東泉雜録太白夜懐有句云宴坐寂不動大千入毫髮潘佑獨坐有句云凝神入混茫萬萬成虗空予爱二才子吐辭精敏之力等入道深宻之狀同合而書之聊資已用法藏淬金近時僧洪覺範頗能詩其題李愬畫像云淮隂北面師廣武其氣豈止吞項羽公得李祐不肯誅便知元濟在掌股此詩當與黔安並驅也頃年僕在長沙相從弥年其他詩亦甚佳如云含風廣殿聞碁响度日長廊轉栁隂頗似文章巨公所作殊不類衲子又善作小詞情思婉約似秦少㳺至如仲殊叅寥雖名世皆不能及許彦周詩話城外土饅頭饀草在城裏一人吃一箇莫嫌没滋味巳且為土饅頭尚誰食之今改預先著酒澆使教有滋味山谷王梵志余在臨川景德寺與謝無逸軰升閣得禪月所畫十八應真像甚竒而失苐五軸予口占嘲之曰十八聲聞觧唾根少叢林漢乱山門不知何䖏羅齋去不見雲堂苐五尊明日有女子来拜叙曰児南营兵妻也寡而食素夜夢一僧来言曰我本景德僧因行失隊煩相引歸寺可乎旣覺而鄰家邀飯入其門見壁間有畫異僧形像了然夢中所見也時朱世英守臨川異之使迎還閣藏之冷齋夜話元豊間嘗乆旱𥙿陵禁中齋禱甚力一夕夢有僧乗馬馳空中口吐雲霧旣覺而雨大作翌日中貴人道夢中所見物色於相國寺山門五百羅漢中至苐十三尊略彷彿即迎入内觀之正所夢也王丞相禹玉作喜雨詩云良弼為霖辜所望神僧吐霧應精求元叅厚之云仙驥籋雲穿仗下佛芲吹雨布天流盖記此事相國寺羅漢本江南李氏時物在廬山東林寺曹翰下江州盡取其城中金帛寳貨連百餘舟私盗以歸無以爲名乃取羅漢毎舟載十許尊獻之詔因賜相國寺當時謂之押綱羅漢石林詩話魯直使予對句云呵鏡雲遮月對曰啼粧露㸔花魯直罪予於詩深刻見骨不務含蓄予竟不曉此論冷齋夜話僧寳傳覺範所撰也但欲馳騁其文徃徃多失事實至扵作賛又雜以詩句此豈史法示褒貶之意也㢤其詩云行盡湘西十里松到門却立数諸峯崇公事迹無㝷處庭下春泥見虎蹤又云廬山殿閣如生成食堂䖏處禪牀折我自三門如冷灰盡日長廊卷風葉又為竒語云如月照衆水波波頓見而月不分如春行萬國處䖏同時而春無迹但其才性競爽見於言語文字間若扵禪門本分事則無之也苕溪漁隱前軰好称僧悟清鳥歸花影動魚没浪㾗圎以為句意皆新然余讀後梁沈君攸臨水詩云花落圎紋出風急細流翻乃知魚浪㾗圎之句出於此也復齋漫録泉州僧慶老有詩云交情老去淡如水病骨秋来瘦作松真方外語也詩說汪彦章龍溪集有霜餘溪上四絶癩可東溪集亦有霜餘溪上五絶内四絶即龍溪集中詩但一絶不是所謂故人江北江南岸者餘皆同之不知竟誰作邪四絶中其一云水似秋蛇巧作蟠山如濃翠擁髙鬟清風明月元無主乞我烟蘿茅數間味清駃可愛苕溪漁隱百家詩話緫龜後集卷之四十三終, WYG: 巻}
