  - {type: variant, offset: 2816, length: 550, content: 詩話蔡居厚詩史不言劉子儀而謂劉貢父以為畨僧名論語只有師也過逹恐是過字章孝標登第後寄淮南李紳相詩曰及第全勝十改官金湯鍍了出長安馬頭漸入揚州路爲報時人洗眼看李答曰假金方用真金鍍若是真金不鍍金十載長安得第一何須空腹用髙心聖俞嘗云詩句義理雖通語渉淺俗而可笑者亦其病也如有贈漁父一聮云眼前不見市朝事耳畔唯聞風雨聲說者云病肝風如盡日覔不得有時還自來本謂詩之好句難得耳說者云此是人家失猫児人以為笑歐公詩話進士黄可字不可深扵雅道詩句中多好用驢字如獻高侍郎云天上傳將五馬賦門前迎得跨驢賔之類昵昵児女語恩怨相爾汝劃然變軒昻勇士赴敵埸此退之聽頴琴詩歐陽文忠嘗問僕琴詩何者最佳余以此答之公言此詩最竒䴡然自是聴琵琶詩非琴詩余退而作聽杭僧惟賢琴詩云大絃春温和旦平小絃㢘折亮以清平生不識宫與角但聽牛鳴盎中雉登木門前剥琢誰叩門山僧未閑君勿嗔歸家且覔千斛水净洗從前筝笛耳詩成欲寄公而薨至今以為恨紀詩邯鄲公周陵詩曰纔及春髙鼎祚移舒王詩云春高鼎祚不成詩詩人貪求好句而理有不通亦語病也如䄂中諌草朝天去頭上宫花侍宴歸誠爲佳句矣但進諌必以章䟽無用藁之理唐人有云姑蘇䑓下寒山寺半夜鍾聲到客船說者亦云句則佳矣其如三更不是撞鍾時如賈島哭僧云冩留行道影焚却坐禪身時謂之燒殺活和尚此尤可笑若歩隨青山影坐學白塔骨又獨行潭裏影數息樹邉身皆是島詩何精粗頓異歐陽, WYG: ''}
