  - {type: variant, offset: 3451, length: 1394, content: 之二十八詠物門歐陽文忠公極賞林和靖踈影横斜水清淺暗香浮動月黄昏之句而不知和靖别有詠梅一聮云雪後園林纔半樹水邉籬落忽横枝似勝前句不知文忠何縁弃此而賞彼文章大槩亦如女色好悪止繋扵人苕溪漁隠曰王直方又愛和靖池水倒窺踈影動屋簷斜入一枝低以謂此句扵前所称真可處伯仲之間余觀此句略無佳處直方何為喜之真所謂一蠏不如一蠏也山谷為詩當飽參然後臭味乃同雖為大宗匠者亦然月觀横枝之語乃何遜之妙處也自林和靖一參之後參之者甚多雪浪斎日記唐人牡丹詩云紅開西子粧樓暁翠掲麻姑水殿春若改春作秋全是蓮花詩林和靖梅花詩云踈影横斜水清淺暗香浮動月黄昏近似野薔薇也陳輔之詩話凢詠梅多詠白而荆公詩獨云鬚撚黄金危𣣔堕蔕團紅臘巧能粧不惟造語巧䴡可謂能道人不到處矣又東坡詠梅一句云竹外一枝斜更好語雖平易然頗得梅之幽獨閑静之趣凡詩之詠物雖平淡巧䴡不同要能以随意造語爲主公後復有詩云遥知不是雪爲肯暗香耒盖取蘇子卿云只言花似雪不悟暗香来之意公在金陵又有和徐仲顰文字韵梅詩二首東坡在嶺南有暾字韵梅詩三首皆韵險而語工非大手筆不能到也遯斎閑覧馹使前時走馬回北人初識越人梅清香莫把酴醾比只欠溪邉月下杯此梅二丈京師逄賣梅花絶句吾随後軰犹及與之周旋覧其親書如見其抵掌談笑也東坡韓持國雖刚果特立風莭凛然而情致風流絶出時軰許昌崔象之侍郎舊第今為杜君章所有庍後小亭僅丈餘有海棠两株持國毎花開輒載酒日飲其下竟謝而去歲以為常至今故吏猶能言之余嘗扵小亭柱間得公二絶句其一云濯錦江頭千萬枝當年未觧惜芳菲而今得向君家見不怕春寒雨􅊜衣尚可想見當時氣味韓忠獻公嘗帥蜀持國兄弟皆侍行尚少故前句云尔其二云長條無風亦自動柔艶着雨更相冝漫其後句苕溪漁隠曰鄭谷海棠詩云穠䴡最冝新着雨妖嬈全在𣣔開時前軰以謂此两句說盡海棠好處今持國柔艶着雨更相冝之句乃用鄭谷語也至扵東坡作此詩則詞格超逸不復蹈襲前人其詩有嬀然一笑竹篱間桃李漫山捴粗俗自然冨貴出天姿不待金􅐻薦華屋朱唇得酒暈生臉翠䄂卷紗紅映肉林深霧暗曉光遲日煖風輕春睡足雨中有泪亦悽愴月下無人更清淑元豊間東坡謫黄州寓定惠院院之東小山上有海棠一株特繁茂每歳盛開時必為携客置酒巳五醉其下矣故作此長萹平生喜為人冩盖人間刋石者自有五六本云軾平生得意詩也石林詩話隱居詩話云吕士隆知宣州好以事笞官妓妓皆𣣔迯去而也㑹杭州有一妓到宣其色藝可取士隆喜之留之使不去一日郡妓復犯小過士隆又欲笞之妓泣訴曰某不敢辭罪但恐杭妓不能安也士隆愍而捨之聖俞因作莫打鴨一萹曰莫打鴨打鴨驚鴛鴦鴛鴦新向池北落不比孤洲老秃鶬秃鶬尚𣣔逺飛去何况鴛鴦羽翼長盖謂此也詠物詩不待分明說盡只彷彿形容便見妙處如魯直酴醿詩云露􅊜何郎試湯餅日烘荀令炷爐香義山雨詩云摵摵度瓜園依依傍水軒此不待說雨自然知是雨也後来魯直無巳諸人多用此体吕氏童䝉訓苕溪漁隠曰裴璘詠白牡丹詩云長安豪貴惜春殘争賞先開紫牡丹别有玉杯承露冷無人起就月中㸔時稱絶唱以余觀之語句凢近不若胡武平詠白牡丹詩云璧堂月冷難成寐翠幄風多不柰寒其語意清勝過裴璘逺矣如皮日休詠白蓮詩云無情有恨何人見月冷風清𣣔堕時若移作詠白牡丹詩有何不可深更清切耳曼卿詠小桃二絶句云生色深紅綬帶長宫簾寒在井欄香母家升上瑶池品先得春風一面粧本分桃花寒食前小桃長是上春天二喬二趙俱傾國女弟嬌彊意自先其模冩命意豈不佳㢤王直方詩話云或有称詠松句云影摇千尺龍蛇動聲撼半天風雨寒者一僧在坐曰未若雲影亂鋪地濤聲寒在空或以語聖俞聖俞曰言蕳而意不遺當以僧語為優百家詩話總龜後集卷之二十八, WYG: ''}
