  - {type: variant, offset: 5275, length: 2622, content: 生皆預莫及遭田父泥飲至𬒳肘而不悔其内直外曲彊禦不畏矜寡不侮非世所能測也䂬溪唐史載杜審言嘗云吾閔當得屈宋作衙官其孫乃有讀書破萬卷下筆如有神謂蘇味道見吾判且羞死甫乃有集賢學士如堵墻㸔我落筆中書堂謂為造化小児所苦甫乃有日月籠中鳥乹坤水上萍所謂是以似之也同上藝苑雌黄云吟詩喜作豪句湏不畔於理方善如東坡觀崔白驟雨啚云扶桑大繭如甕盎天女織綃雲漢上徃来不遣鳯㗸梭誰能鼓臂投三丈此語豪而甚工石敏若橘林文中詠雪有燕南雪芲大扵掌氷柱懸簷一千丈之語豪則豪矣然安得尓髙臺或云詠雪非敏若詩見鮑欽止夷白堂小集苕溪漁隱曰東坡集載此詩是題趙令晏崔白大啚幅徑三丈故云徃来不遣鳯㗸梭誰能鼓臂投三丈可謂善造語能形容者也畫品人間刀尺不敢裁丹青付與濠梁崔風蒲半折寒鴈起竹間的皪横江梅乃是崔白冬景圗藝苑以謂驟雨圖悞矣余李太白北風行云燕山雪芲大如席秋浦歌云白髪三千丈其句可謂豪矣柰無此理何如秦少逰秋日絶句云連卷雌蜺拄西楼逐雨追晴意未休安得萬粧相向舞酒酣聊把作纏頭此語亦豪而工矣郭功甫金山行造語豪世多不見全篇今録于左方金山杳在滄溟中雪崖氷柱浮仙宫乾坤扶持自今古日月彷彿纏西東我泛靈槎岀塵世搜索異境窺神工一朝登臨重歎息四時想像何其雄捲簾夜閣挂北斗大鯨駕浪吹長空舟摧岸断豈足数徃徃霹靂槌蛟龍寒蟾八月蕩瑶海秋光上下磨青銅鳥飛不盡暮天碧漁歌忽断芦芲風蓬莱乆聞未成徃壯觀絶致遥應同潮生潮落夜還曉物数交㑹誰能窮百年形影浪自苦便欲此地安躬白雲南去供入望又起歸興隨征鴻稱賞門王直方詩話云樂天有詩云醉貌如霜葉雖紅不是春東坡有詩云児童誤喜朱顔在一笑那知是酒紅鄭谷有詩云衰髩霜供白愁顔酒借紅老杜有詩云髪少何劳白顔衰肯更紅無巳詩云髪短愁催白顔衰酒借紅皆相類也然無已𥘉岀此一聯大爲當時諸公所稱賞雪浪齋日記云髙荷字子勉山谷詩云點檢金閨彦飄零玉筍斑尚令清庙噐猶隔鬼門関大為山谷所喜杜子羙褒称元結㫪陵行兼賊退後示官吏二詩云兩章對秋月一字偕華星致君唐虞際淳朴憶大庭又云今盗賊未息得結軰数十公落落然参錯為天下邦伯天下少安可立待巳盖非專称其文也至於李義山乃謂次山之作以自然為祖以元氣為振無乃過乎秦少㳺漫郎詩云字偕華星章對月漏泄元氣煩揮毫盖用子羙義山語也今是堂高䴡使過海有詩云水鳥浮還没山雲断復連時賈島詐為稍人聮下句云棹穿波底月船壓水中天䴡使嘉歎乆之䂬溪張祐詩云故國三千里深宫二十年杜牧賞之作詩云可憐故國三千里虚唱歌詞滿六宫故鄭谷張生故國三千里知者唯應杜紫㣲諸賢品題如是祐之詩名安得不重乎其後有觧道澄江静如練世間唯有謝玄暉觧道江南断腸句世間唯有賀方回等語皆祖是意也葛常之詩人賛羙同志詩篇之善多比珠璣璧玉錦綉花草之類至杜子羙則豈作此陳腐語也寄岑參詩云意愜関飛動篇終接混茫夜听許十誦詩云精㣲穿溟滓飛動摧霹靂贈盧居詩云藻翰唯牽率湖山合動摇贈朱諌議詩云毫髪無遺恨波瀾獨老成寄李白詩云筆落驚風雨詩成泣鬼神贈髙適詩云羙名人不及佳句法如何皆驚人語也視餘子其神芝與腐菌㢤丹陽集稱薦門温公自称爲叟香山居士亦嘗以自號其詩云𥘉時𬒳目爲迂叟近日䝉呼作隱人司馬豈慕其洛居有閑適之樂邪䂬溪周羙成邦彦元豊𥘉以大學生進汴都賦神宗命之以官除太學録其後流落不偶浮沉州縣三十餘年蔡元長用亊羡成献生日詩略云化行禹貢山川内人在周公禮樂中元長大喜即以秘書少監召又復薦之揮麈録李白贈崔侍御詩云黄河三尺鯉本在孟津居點額不成龍歸来伴凢魚何當赤車使再徃召相如相如盖自謂也觀此不可謂白之無心扵仕進者然當時慢侮力士畧不為身謀致貶逐而曽不悔使其欲仕之心切必不如是先是蘇頲為益州長史見白異之曰是子天才英特少益以學比相如故曰詩中毎以相如自比從弟之遥曰漢家天子馳駟馬赤車蜀道迎相如自漢陽病酒歸曰聖主還听子虚賦相如却欲論文章贈張鎬曰十五觀竒書作賦凌相如白自比為相如非止一詩也呉邁逺好自夸而媸鄙他人毎作詩得称意語輙擲地呼曰曹子建何足数㢤袁嘏謂人曰我詩有生氣亦以用心深苦俄尓有得冝不勝其喜子羙云語不驚人死不休貫休謂得句先呈佛皆此謂也老杜髙自称許有乃祖之風上書明皇云臣之述作沈欝頓挫楊雄枚皐可企及也壮逰詩則自比逰崔魏班楊又云氣劘屈賈壘目短曹劉墻贈韋左丞則曰賦料楊雄敵詩㸔子建親甫以詩雄扵世自比諸人誠未爲過至窃比稷與契則過史称甫好論天下大事髙而不切豈自比稷契而然耶至云上感九廟焚下憫萬民瘡斯時伏青蒲廷争守御床其忠藎亦可嘉矣陽秋韵復齋漫録云江公著𥘉任洛陽尉乆旱㣲雨作詩云雲葉紛紛雨脚匀乱荅柔草長精神雷車却碾前山過不洒原頭陌上塵温公扵士人家見之借𥿄筆脩刺謁江且為称廌由此知名投献門王直方詩話云杭有西湖而潁亦有西湖皆為逰賞之勝而東坡連守二州其𥘉得潁也有潁人在坐云内翰但只消逰湖中便可以了郡亊盖言其訟蕳也秦少章因作一絶献之云十里荷花􅔽蓞𥘉我公所至有西湖欲将公亊湖中了見說官閑亊亦無後東坡到潁有謝执政啓亦云入参兩禁毎玷北扉之荣出典二邦輙為西湖之長錢惟演為洛帥晋守始置馹貢芲識者鄙之蔡君謨加法小團茶貢之冨彦國歎曰君謨乃為此也坡作荔枝歎曰我願天公怜赤子莫生尤物為瘡痏雨順風調百谷登民不飢寒為上瑞君不見武陵溪边粟粒芽前丁後蔡相籠加吾君盛德豈在此致飬口腹何陋邪又不見洛陽丞相忠孝家可怜亦進姚黄花𥙷世之語不能易也嘗愛李敬方汴河直進船詩云汴水通淮利最多人生爲害亦相和東南四十三州地取盡脂膏是此河此等語皆為多背之献也評論門介甫詩少陵為尔牽詩興可是無心賦海棠杜黙云倚風莫怨唐工部後裔誰知不觧衣曽不若東坡柯丘海棠長篇冠古絶今雖不指名老杜而𥙷世之意盖使来世自曉也樂天九日思杭州云笙歌委曲聲延耳金翠動摇光照身子瞻有懐錢塘云剰㸔新畨眉倒暈未應泣別臉消紅黎元耆舊何遽忘之也徐考其集白送杭州姚因思舊㳺云閭里固冝勤撫恤楼䑓亦要数躋扳蘇亦云細雨暗時一百六畫橈鼇鼓莫遺民是未嘗無意扵民庶也然白又有故妓数人慿問訊新詩兩首倩流傳坡又有休驚歲歲年年貌且對朝朝暮暮人大抵淫樂之語多於撫飬之語耳夫子称未見好德如好色而傷之曰已矣乎二公未能免俗餘人不必言子瞻賦濁醪有妙理首句云酒勿嫌濁人當取醇其末乃曰濁者以飲吾僕清者以酌吾友復立分別則是濁醪無妙理矣豈非万斛洶湧不暇點校故歟司馬温公云清茶淡話難逢友濁酒狂歌易得明雖造次間語亦在於直諒之益而退便僻之損也䂬溪雪浪齋日記云讀謝灵運詩知其攬盡山川秀氣讀退之南山詩頗覺似上林子虚賦才力小者不能到李長吉玉川子詩皆出扵離騷未可以立談判也皇甫持正云吟詩未有劉長卿一字唐人必甚重長卿今詩十卷亦清䴡宋子京茟記云古人語有推拙不可掩者樂府曰何以銷憂惟有杜康劉越石曰何其不夣周又有曰夫子悲獲麟西狩歎孔丘雖有意緒詞亦鈍樸百家詩話総亀後集卷之九終, WYG: 閲撰}
