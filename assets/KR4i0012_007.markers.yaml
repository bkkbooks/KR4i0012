  - {type: variant, offset: 4985, length: 2569, content: 後集卷之七逹理門否卦包承小人吉說者謂小人在下者包之小人在上者承之盖處否當然杜云曲直吾不知負暄候樵牧是非何處定髙枕笑浮生洗眼㸔輕薄虚懐任屈伸寄謝悠悠世上児不争好悪莫相疑其寄傲踈放擺脫世網所謂兩忘而化其道也黄常明漫叟無為洞口云洞傍山僧皆學禪無求無欲亦忘年又無為洞口春水滿無為洞傍春雲白爱此蹰不能去念人悔作衣冠岑参宿先逰寺云寄报乗軒客簮𥚑爾何容臨川何秀老云觧我葱珩脫孟劳暮年丼與子同袍比之退之云方将歛之道且欲冠其顛向風長歎不可見我𣣔収歛加冠巾異矣六一有云自慚前引朱衣吏不称閑行白髪翁說者謂不言亦可然次山宿丹崖翁宅詩云吾将求退與翁逰學翁歌醉在漁舟官吏隨人徃来得却望丹崖慚復羞吁淫乎富貴者也䂬溪東坡拈出陶淵明談理之詩前後有三一曰採菊東籬下悠然見南山二曰笑傲東軒下聊復得此生三曰客飬千金軀臨化消其宝皆以爲知道之言盖摛章繪句嘲弄風月雖工亦何𥙷若覩道者出語自然超詣非常人能蹈其軌轍也山谷嘗䟦渊明詩卷云血氣方刚時讀此詩如嚼枯木及綿歴世亊如决㝎無所用智又嘗論云謝康楽庾義城之詩鑪錘之功不遺餘力然未能窺彭澤数仭之墻者二子有意扵俗人賛毀其工拙淵明直寄焉持是以論淵明詩亦以可知其關鍵也丹陽集孟子所言皆精粗兼偹其言甚近而妙義在焉如龎居士云神通并妙用運水與般柴此自得者之言最爲逹理若孟子之言則無適不然如許大堯舜之道只於行止疾徐之間教人做了龜山語録或問言動非禮則何以正視听如何得合禮曰四者皆不可易易則多非理故仁者先難而後獲所謂難者以我視以我听以我言以我動也仰面貪㸔鳥囬頭錯應人視听不以我也胥失之矣上蔡語録吕晋伯兄弟中皆有見処一人作詩詠曽點亊曰凾丈從容問且酧展才無不至諸侯可怜曽點推鳴瑟獨對春風詠不休同上或問卲尭夫云誰信畫前元有易自從刪後更無詩畫前有易何以見曰畫前有易其理甚㣲然即用孔子之巳發明者言之未有畫前尽可見也如云神農氏之耒耜盖取諸益日中為市盖取諸噬嗑黄帝堯舜之舟楫盖取諸渙服牛乗馬盖取諸隨益嗑渙隨重卦也當神農黄帝堯舜之時重卦未畫此理真聖人有以見天下之賾故通変以冝民而易之道得矣然則非畫前元有易乎亀山録熈寕十年夏康莭感㣲疾氣日益耗神日益明笑謂司馬温公曰雍欲觀化一廵如何温公曰先生未應至此康莭笑曰死生亦常事耳張横渠先生喜論命来問疾因曰先生論命否當推之康莭曰若天命則巳知之矣世俗所謂命則不知也横渠曰先生知天矣載尚何言程伊川曰先生至他人無以為力願自主張時康莭居正寢諸公議後事扵外有欲葬近洛陽城者康莭巳知呼伯温入曰諸公欲以近城地葬我不可當從伊川先生茔耳七月𥘉四日大書詩一章曰生于太平世死于太平世客問年㡬何六十有七歲俯仰天地間浩然獨無愧以是夜五更捐舘聞見録張敬夫元日詩古史書元意義存春秋揭示更分明人心天理𥘉無欠正本端原萬善生南軒集康莭過士友家晝卧見其枕屏小児迷蔵以詩題其上云遂令髙卧人欹枕㸔児戯盖熈寕間也陳恬云撃壌集不載同上張横渠聖心詩聖心難用淺心求聖學湏專礼法脩千五百年無孔子盡因通變老優㳺横渠集五峯胡廣仲詩幽人偏愛青山好未是青山青不老山中出雲雨太虚一洗塵埃山更好朱氏陂云右衡山胡子詩也𥘉紹興庚辰熹病卧山間親友仕扵朝者以書見招某戯以兩詩代書報之曰先生去上芸香閣時籍溪先生正字赴舘供聀閣長新峩豸角冠刘共甫秘書丞除察官晋取幽人卧空谷一川風月要人㸔章甕牗前頭列畫屏晚来相對尽儀形浮雲一任閑舒卷萬古青山只麽青二章或傳語胡子胡子謂其學者張敬夫曰吾未識此人然觀此詩庶能有進矣時其言有躰而無用故為是詩以箴警之庻其聞之而有發也明年胡子卒又四年某始見敬夫而後獲聞之恨不及見胡子而請其目也因序其本末而書之于䇿以無忘胡子之意云見詩集邵堯夫先生居洛四十年安貧樂道自云未嘗攅眉所居寢息處為安樂窩自號安樂先生又為甕牗讀書燕居自平旦則焚香獨坐晡時飲酒三四甌㣲熏便止不使至醉也中間州府以更法不餉餽寓賔乃為薄粥以代之好亊者或載酒以濟其之嘗有詩云斟有淺深存爕理飲無夛少繋經綸莫道山翁柮於用也能康済自家身喜吟詩作大字書然遇興則為之不牽強也大寒暑則不出每出乗小車用一人挽之為詩以自詠曰花似錦時髙閣望草如茵處小車行司馬温公贈以詩曰林間髙閣望已乆芲外小車猶未来隨意所之遇主人喜客則晋三五宿又之一家亦如之或經月忘返雖性髙潔而接人無賢不肖貴賤皆􅌚然如親嘗自言若至大病自不能支其遇小疾得有客對語不自斍疾之去躰也學者来從之問經義精深浩慱應對不窮思致幽逺妙極道数間與相知之深者開口論天下亊雖乆存心世務者不能及也康莭嘗誦希夷之語曰得便冝亊不可再得便冝処不可再去又曰落便冝是得便冝故康莭詩云珍重至人嘗有語落便冝是得便冝盖可終身行之也邵伯温易斈辨惑涪陵譙天授牧牛圖詩一章言其崇明礼法目無邪視可否昭判㨂辨無舛依見見正色塵不迷故能非礼勿視如牛双目変白畏鞭箠警視不易設有他惡不敢縦觀矣詩曰喜見双眸白通身黒尚全整思南畆稼還忌牧童鞭妄色無輕斈非觀巳屡悛囬光惟聖道此外竟何縁二章言其外屏非聞耳無邪听入耳著心但惟聖道依聞審音悪聲不惑故能非礼勿听如牛角耳変白聳耳低首惟牧是聆更無他念矣詩曰耳角氷霜㓗湏知听不訛法言縁理辨邪說自心訶响外聆㣲旨音中味太和滛荒無復入非礼末之何三章言其戒謹辝氣口無妄言戯渝讒誣不形声說非先王之法言不敢道依苦謹辝修辝立誠故能非礼勿言如牛唇口変白為牧所纏不得妄鳴惟渴飮飢食始得觧釋矣詩曰白口纏圏索言非駟莫追心声休妄發敬道復何疑正信通神鑑淵談恊𥘉儀能為天下則誠自我無欺四章言其遵守礼法中主惟敬心無妄動舉必循理精誠外發照破邪行素履而往徃而無咎故能非礼勿動如牛四足変白猶恐散失未捨鼻索矣詩曰四足雖更白猶冝鼻索拘草田方緩执禾徑未相踰歩歩無非履心心向大途見聞言動事到此竟何殊五章言其斈習羙成礼法文質内外自然克已復礼歸于至誠不假行将動容周旋皆中乎礼盛徳之至居德之盛尚可形容故如牛首尾変白牧者置鞭間坐不执鼻索放曠無拘頓絶所犯矣詩曰鼻索何劳执長鞭已弃間大田隨俯仰古道任囬環義草清野仁泉飲碧湾徳純非用牧危坐對層山六章言其抑為不厭好古敏求積而至聖思慮銷隕情識净静猶金鑑焉不迎不将應而不傷心躰世通超然絶疑動静無意但寓形於丗而已如牛全白純一不雜人牛兩息㓕意相拘矣詩曰一飽心休息安眠百不知有形隨処寄毋意復何疑用舎非関念優㳺絶所窺相忘人世外惟有牧童児七章言其逆順難測混同体用随世態卷舒例陰陽慘酢損益盈虚與時偕行言不必信行不必果惟義所在一切毋必道合則從猶如白牛雖帶圏索已無牧人矣詩曰圏索離牽执從兹牧者亡何心拘小莭平歩蹈中常飢飽隨过行蔵任運将春山春草緑逄処可充腸, WYG: 巻}
