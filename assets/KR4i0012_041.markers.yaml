  - {type: variant, offset: 2864, length: 109, content: 首乃夫人親筆而辞甚竒與王建宫詞無異自唐至今誦者不絶口而此獨遺弃不見取前受詔定三家書者又斥去之甚可惜也謹令繕冩入三舘而歸口誦數篇於丞相安石明日與中書語及之而王珪馮京願傳其本於是盛行於世夫人僞蜀孟昶侍人事具國史苕溪漁隱曰余, WYG: 宋阮}
