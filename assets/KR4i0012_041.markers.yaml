  - {type: variant, offset: 2974, length: 2244, content: 此詞如龍池九曲逺相通楊柳絲牽两岸風長似江南好風景畫船来徃碧波中黎园弟子簇池頭小樂携来候宴逰試炙銀笙先按拍海棠花下合梁州月頭支給買花錢滿殿宫人近数千遇著唱名多不語含羞走過御床前内人追逐採蓮時驚起沙鷗兩岸飛蘭把来齊拍水並船相閗􅊜羅衣厨舡進食簇時新侍坐無非列近臣日午殿頭先索膾隔芲催喚打漁人皆清婉可喜花蕋又别有逸詩六十六篇有近世好事者旋加搜索續之篇次無倫語意與前詩相類者極少誠爲亂真矣聊摘其一二云羅衫玉帯最風流斜揷銀箆慢褁頭閑向殿前騎御馬掉鞭横過小紅樓春日龍池小宴開岸邊亭子號流杯沉檀刻作神仙女對捧金盃水上来王平甫周世宗時陶尚書榖奉使江南韓熈載遣家妓奉盥匜及且有書謝畧云巫山之䴡質𥘉臨霞侵鳥道洛浦之妖姿自至月滿鴻溝舉朝不能㑹其辭熈載因召家訊之云是夕忽當浣濯焉緗素雜記唐髙宗燕群臣賞双頭牡丹詩上官昭容一聮云势如連壁友情若臭蘭人計之必一英竒女子也許彦周詩話東坡後集有題織錦圗上回文其一云春晚落芲餘碧草夜凉低月半枯桐人隨逺馬邊城暮雨映踈簾綉閣空其二云紅手素絲千字錦故人新曲九囬腸風吹絮雪愁萦骨泪洒縑書恨見郎其三云羞㸔一首囬文錦錦似文君别恨深頭白自吟悲賦客断絃愁是㫁弦琴淮海集載東坡䟦云余少時見一江本其後有人題詩十餘首皆竒絶今記其三首然則此詩非東坡所作也少㳺又云子瞻記江南所題詩本不全余嘗見之記其五絶今以𥙷子瞻之遺即叢話前集所載囬文詩五首是也世以爲少㳺所作亦非也苕溪漁隱蘇蕙織錦囬文詩所傳舊矣故少常沈公復傳其畫繇是若蘭之才益著然其詩囬旋書之讀者唯曉外繞七言至其中方則漫弗可考矣若沈公之博古亦謂辞句脫讀不成文殊不知此詩織成本五色相宣因以別三四五七言之異後人流傳不復施采故迷其句讀非辞句之脫畧也政和𥘉予在洛陽於王晋玉許得唐程士南效此并申諴之釋而後暁然是詩𥘉不舛脫盖沈公未嘗見此本耳然申諴所釋但依士南之設色其七言數火其色反黄四言數金其色反緑扵五行為弗類意蘇氏詩圗之色為不耳今因冠詩于畫遂別而正之三四五七言之詩各隨其所行而爲之色觀者見其色則詩之言數可知巳至扵士南之文旣有釋者則賦采自從其舊而并録扵其首云東觀餘論載璇璣圗序云前秦安南将軍竇滔有寵姬趙陽䑓歌舞之妙無出其右滔置之别所妻蘇知之求而獲焉苦加撻辱滔深恨之陽䑓又專伺蘇之短讒毁交至滔益忿蘇氏年二十一滔鎮㐮陽與陽䑓之任絶蘇氏之音問蘇悔恨自傷因織錦囬文題詩二百餘首計八百餘字縦横反覆皆爲文章名曰璇璣圗遣蒼頭賫至㐮陽滔覧錦字感其妙絶因送陽䑓之関中而具車從迎蘇氏㤙好愈重苕溪漁隱曰王初寮有點綘唇一詞送韓済之歸㐮陽云峴首亭空勸君休墮羊碑泪宦逰如寄且伴仙翁醉說與鮫人莫觧江皐珮将歸思暈紅萦翠䄂織囬文字𥘉寮用事以其漢上故然扵送人之詞似难用也侍児小名録南齊楊侃性豪侈舞人張静婉腰圍一尺六寸能掌上舞唐人作楊柳枝辭曰認得楊静婉腰後人却除家字只使楊静婉悞矣李太白云子夜呉歌動君心李義山云鶯有子夜歌晋有子夜女善歌非當時可及也許彦周詩話古今詩人詠媍人者多以歌舞爲称梁元帝妓應令詩云歌清隨澗響舞影向池生劉孝綽㸔妓詩云燕姬臻妙舞鄭女爱清歌北齊䔥放冬夜對妓詩云歌還團扇後舞出妓行前弘执恭觀妓詩云學舞俱回雪分歌共落塵陳隂鏗侯司空宅咏妓詩云鶯啼歌扇後芲落舞衫前陳劉刪亦云山邊歌兩日池上舞前溪庾信趙王㸔妓詩緑珠歌扇薄飛燕舞衫長江捴㸔妓詩云並歌時轉黛息舞暫分香隋盧思道夜聞隣妓詩怨歌声易断妙舞態难収陳元璪春园听妓詩云紅樹摇歌扇緑珠飄舞衣釋法宣觀詩云舞䄂風前㪯歌声扇後嬌王勣咏妓詩云早時歌扇薄今曰舞衫長刘希夷春日閨人詩云池月怜歌扇山雲爱舞衣以歌對舞者七以歌扇對舞衣者亦七雖相縁以起然詳味之自有工拙也杜子羙取以爲艶曲云江清歌扇㡳野曠舞衣前復齋漫録緑珠井在白州双角山下昔梁氏之女有容貌石季倫爲交趾採訪使以真珠三斛買之梁氏之居舊井存焉耆老云汲飲此井者誕女必多羙里閭以羙色無益扵是遂以巨石填之苕溪漁隱曰山谷詩云欲買娉婷供煮茗我無一斛明月珠用此事也太平廣記石季倫王明君辭云延我以穹庐加我閼氏名閼氏單于妻也上烏前下章移切前漢匃奴傳曰冐頓後有爱閼氏生少子顔注閼氏匈奴皇后號劉貢父云匈奴單于號其妻爲閼氏耳顔便以皇后觧之大俚俗也西河舊事云失我祁連嶺使我六畜不蕃息失我焉支山使我媍人無顔色盖北方有焉支山山多紅藍北人採其芲染緋取其英鮮者作烟脂媍人粧時用此顔色殊鮮明可愛匈奴名妻閼氏言可爱如胭脂也錢昭度作王昭君詩云閼氏纔聞易妾名帰期長似俟河清則誤讀氏字爲姓氏之氏矣藝苑雌黄古今辭人作明妃辞曲多矣意皆一律惟吕居仁獨不蹈襲其詩云人生在相合不論胡與秦但取眼前好莫言長苦辛君㸔輕薄児何殊胡地人苕溪漁隱韓子蒼題昭君圗詩寄語双鬟負薪女炙面謹勿輕離家余考唐逸士傳云昭君至今生女必炙其面白樂天詩至今村女面燒灼成瘢痕乃知炙面之事楽天已先道之也復齋漫録漢書竟寕元年呼韓邪来朝言願壻漢氏元帝以後宫良家子王昭君字嬙妃之生一子株累立復妻之生二女至范曄書始言入宫乆不見御積怨因掖庭令請行單于臨辞大㑹昭君豐容靚飾頋影徘徊竦動左右帝驚悔欲復晋而重失信夷狄然曄不言呼韓邪願壻而言賜以宫女又言字昭君生二子與前書皆不合其言不願妻其子而詔使從胡俗此自烏孫公主非昭君也西京雜記又言元帝使畫工圗宫人皆賂畫工而昭君獨不賂乃悪圗之旣行遂誅毛延夀琴操之按又言本齊國王穣女端正閑䴡未嘗窺㸔門户穰以其異人求之不與年十七進之帝以地逺不幸欲賜單于羙人嬙對使者越席請徃後不願妻其子吞藥而卒盖其事雜出無所攷正自信史書尚不同况傳記乎要之琴操朂牴牾矣按昭君南郡人今秭歸縣有昭君村村人生女必灼艾炙其面慮以色選故也昭君卒􅌾匈奴謂之青塜晋以文王諱昭號明妃云韓子蒼昭君圗叙百家詩話緫龜後集卷之四十一, WYG: 撰}
