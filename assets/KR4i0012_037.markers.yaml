  - {type: variant, offset: 3087, length: 2304, content: 後集卷之三十七譏誚門坡逰武昌寒溪云楚雨遂昏雲夣澤呉潮不到武昌宮又周㳺困卧九折嶺褰衣獨上呉王㙜扵一時筆快遂以上宮目之繼而有李成伯云嗟嗟漢鼎乆傾東肉食曽無智與忠孟徳仲謀交號令本𥘉耦地搶姦雄武侯偶失三分䇿孫氏俄成一戰功寂寞西山舊巢穴庸児尤道帝王宮語幾乎詈矣但渠不記其家太白曽作武昌韓侯去思頌黄金之車大呉天子武昌鼎㨿實為帝里其罪大矣碧溪永叔萬釘寳帶爛熳環人謂此帶幾度道著觀子羙緋魚以及之扶病垂朱紱挈帶㸔朱紱銀章付老翁世未嘗􅏺之者豈以其人不止冝此服邪固嘗有云朱紱負平生又云居然綰章紱受性本幽獨同上唐竇常牟群庠鞏兄弟五人四人擢進士獨群客隱毗陵因韋夏卿屡薦始入仕皆詩人也牟晚從昭義盧從史從史䆮驕牟度不可諌即移疾㱕東都故其秋夕閑居詩云燕燕辝巢蟬蛻枝穷居積雨壊藩籬群嘗為黔中觀察使故其詩云佩刀㸔日晒賜馬旁江調言語多重譯壷觴毎獨謡而鞏詩中乃有自京師將赴黔南之所謂風雨荆州二月天問人𥘉頋峽中舡西一望雲和水尤道黔南有四千此詩疑群所作而悞寘鞏集中尔常歴武陵夔江抚四州刺史所謂㸔春又過清明莭筭老重經癸巳年者将之武陵到松滋渡之所作也庠詩不見其廵内一絶云愁雲漠漠艸離離太液鈎陳処処疑薄暮毁垣春雨裏殘花猶發萬年枝造句亦可謂秀整矣兄弟中獨群詩稍低又不得舉進士而位反居上鞏詩有放魚詩云好去長江千萬里不湏辛苦上龍門豈非為群而言乎史載鞏平居與人言若不出口世號囁嚅翁乃肯為是耶葛立之謝灵運在永嘉臨川作山水詩甚多徃徃皆佳句然其人浮躁不羈亦何足道㢤方景平天子踐阼灵運巳扇摇異同非毀執政矣曁文帝召為祕書監自以名軰應叅時政而王曇首王華等名位踰之意旣不平多称疾不朝則元君之心巳見扵此時矣後以㳺放无度為有司所紏朝廷遣使收之而靈運有韓亡子房奮秦帝魯連恥之詠竟不免東市之戮而白樂天乃謂謝公才廓落與世不相遇壯志欝不用湏有所洩処洩為山水詩逸韵諧竒趣何也武帝文帝两朝遇之甚厚内而卿監外而二千石亦不為不逄矣豈可謂與世不相遇乎少湏之安知不至黄散而𥚹躁至是惜㢤其作登石門詩云心契九秋榦目翫三春荑居常以待終処順故安腓不知桃墟之洩能処順耶五羊之旤能待終耶亦可謂心語相違矣韵語陽秋荆公作商鞅詩云今人未可非商鞅商鞅能令政必行余窃疑焉孔子論為君難有曰如其善而莫予違也不亦善乎如不善而莫予違也不幾乎一言而䘮邦乎盖人君操生殺之權志在使人无違扵我其何所不至㢤商鞅助秦為虐而乃称其使政必行何耶後又有謝安詩云謝公才業自超群誤長清談助世紛秦晋區區等亡國可能王衍勝啇君則知前萹有激而云也杜子羙云舜舉十六相身尊道何高秦時用商鞅法令如牛毛則知所去耴矣韵語陽秋荆公以詩賦决科而深不樂詩賦試院中五絶其一云少年操茟坐中庭子墨文章頗自輕聖世選才終用賦白頭來此試諸生後作詳定官復有詩云童子常誇作賦工暮年羞悔有楊雄當年賜帛倡優等今曰論才将相中細甚客鄊因茟墨卑扵尔雅注魚䖝漢家故事真當改新詠知君勝弱翁熈寕四年旣預政遂罷詩賦專以經義耴士盖平日之志也元祐五年侍御史劉挚等謂治經者專守一家而略諸儒傳記之斈為文者惟務訓釋而不知聲律体要之詞遂復用詩賦紹圣𥘉以詩賦為元祐學術復罷之政和中遂著扵令士庻傳習詩賦者杖一百畏謹者至不敢作詩時張芸叟有詩云少年辛苦校䖝魚晚歳彫䖝恥壮夫自是諸生尤習氣果然紫詔盡駆除酒間李杜皆投筆地下班揚亦引車唯有少陵頑鈍叟静中吟撚白髭鬚盖芸叟自謂也葛立之黄魯直云陶渊明責子詩曰白髮𬒳两髩肌膚不復實雖有五男児捴不好紙筆阿舒巳八嬾惰故无匹阿宣行志學而不爱文術雍端年十三不識六與七通子垂九齡但覔梨與栗夫運苟如此且進盃中物觀渊明此詩想見其人慈祥戯謔可觀也俗人便謂渊明諸子皆不肖而渊明愁歎見扵詩耳又杜子羙詩陶潜避俗翁未必能逹道觀其著詩萹頗亦恨枯稿逹生豈是足黙識盖不早生子賢與愚何其挂懐抱子羙困頓扵三川盖為不知者詬病以為拙扵生事又徃徃􅏺議宗文宗武失學故聊觧嘲耳其詩名曰遣興可觧也俗人便爲􅏺病渊明所謂痴人前不得說夢也作詩不知風雅之意不可以作詩詩尚譎諌唯言之者無罪聞之者足以戒乃爲有𥙷而渉扵毀謗聞者怒之何𥙷之有觀蘇東坡詩只是􅏺誚朝廷殊无温柔崇厚之氣以此人故得而罪之若是伯淳詩聞者自然感動因舉伯淳和温公諸人禊飲詩云未湏愁日暮天際是輕隂又泛舟詩云只恐風花一片飛何其温厚也龜山語録東坡云今太白集中有㱕来乎笑矣乎及贈懐素艸書𢾗詩决非太白作盖唐末五代間學齊巳軰詩也余舊在冨陽見國清院太白詩絶凡近過彭澤興唐院又見太白詩亦非是良由太白豪俊語不甚擇集中亦徃徃有臨時率然之句故使妄庸軰敢耳若杜子羙世豈復有偽撰邪余嘗舟次姑熟堂下讀姑熟十詠恠其語淺近不類李白王平甫云此李赤詩也赤見栁子厚集自比李白故名赤其後為厠鬼所惑以死今觀其詩止此而以太白自比則其人心疾乆矣豈厠鬼之罪也苕溪漁隠曰東坡此語盖有所􅏺而已元祐文章世称蘇黄然二公當時争名互相譏誚東坡嘗云黄魯直詩文如蝤蛑江珧柱格韵高絶􅐻飱盡廢然不可多食多食則發風動氣山谷亦云盖有文章妙一世而詩句不逮古人者此指東坡而言也二公文章自今視之世自有公論豈至各如前事盖一時争名之詞耳俗人便以為誠然遂為􅏺誚所謂蚍蜉撼大樹可笑不自量者邪王直方詩話云文潜賦虎圖詩末云煩君衞吾寢振此蓬蓽陋坐令盗肉䑕不敢窺白晝或云此却是猫兒詩也又大旱詩云天邊趙盾益可畏水㡳武侯方醉眠時人以為幾扵湯燖右軍也東軒筆録云彭乗為翰林學士文章誥命尤為可笑有边帥乞朝覲仁宗許其候秋凉即途乗為批荅之詔曰當俟䔥䔥之候爰興靡靡之行王琪性滑稽多所侮誚及乗死也琪為挽詞云最是䔥䔥句無人繼後風盖為是也後山詩話云楊蟠金山詩云天未樓䑓横北固夜深灯火見揚州王平甫云荘宅牙人語也觧量四至呉僧錢塘白塔院詩曰到江呉地盡隔岸越山高余謂分界堠子語也隠居詩話云至和中阮逸為王宫記室王能詩多與逸唱和逸有句曰易立太山石難枯上林栁有言其事者朝廷方治之㑹逸坐他事因廢弃之百家詩話総龜後集卷之三十七, WYG: 巻}
