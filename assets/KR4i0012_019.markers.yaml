  - {type: variant, offset: 3564, length: 4, content: 後集卷之, WYG: 巻二}
  - {type: variant, offset: 3569, length: 3421, content: 九隱逸門世人謂淵明皆以其專用肥遯初無康濟之念能知其心者寡也嘗求其集若云歲月擲人去有志不獲騁又有云猛志逸四海騫翮思逺翥荏苒歳月頽此心稍已去其自樂田畆乃卷懐不得已耳士之出處未易為世俗言也陽秋瓢之為器貧者所用故顔子以一瓢飲而楊子比之山雌文康公築室泛金溪上闔門千指朝虀暮塩未嘗敢以貧為病嘗因溪結亭號曰瓢飲盖欲少見慕賢好古安貧樂道之意予嘗有詩云我不學許由隱烟霧得瓢不飲惟掛樹又不學徳義居虎丘帶瓢入市多騎牛分無玉甌囊古錦病渴文園只瓢飲不瞰金溪新結亭未須引吸如長鯨但願金溪化爲酒歲歳持瓢醉花柳杜㝷苑十隱居云侍立小童清義山憶正一云烟爐銷盡寒燈晦童子開門雪滿松子厚云日午獨眠無餘聲山童隔竹敲茶臼秀老云夜深童子喚不起猛虎一聲山月高閑弃山間累年頗得此數詩氣味陳搏負經綸才歴五季亂離㳺行四方志不遂入武當山後隱居華山自晋漢以後每聞一朝革命嚬顣數日人有問者瞪目不答一日方乗驢逰華隂市聞太祖登極驚喜大笑問其故又笑曰天下自此定矣太祖方潜龍時搏嘗見天日之表知太平之有自矣遯迹之初有詩云十年蹤跡走紅塵回首青山入夣頻紫陌縱榮争及睡朱門雖貴不如貧愁聞劍㦸扶危主悶見笙歌聒醉人携取舊書歸舊隱野花啼鳥一般春豈淺㢤邵伯温易學辨惑陳搏周世宗嘗召見太平興國初再召赴闕太宗賜詩云曾向前朝出白雲後來消息杳無聞如今若肯隨徴召總把三峰乞與君先生服華陽巾艸屨垂絛以賔禮見賜坐澠水燕談康節除祕書省校書郎潁州團練推官辭不許旣受命即引疾不起且以詩答郷人曰平生不作皺眉事天下應無切齒人㫁送落花安用雨裝添舊物豈湏春幸逢堯舜為真主且放巢由作外臣六十病夫冝揣分監司無用苦開陳言行録後復再召搏辭曰九重仙詔休教丹鳯㗸來一片野心巳𬒳白雲留住辯惑种放别業在終南山後生從之學者甚衆性頗嗜酒躬畊種秫以自釀所居有林泉之勝殊為幽絶真宗聞之遣中使携畫工圖之開龍圗閣召輔臣觀焉上欲賞之其後復聞魏野居有幽致帝亦遣人圗之故野有詩云幽居帝盡㸔澠水燕談張横渠八翁吟詩十首歩虚聲裏八竒翁八竒須信古英雄賔朋未散山翁醉聴歌同入醉郷中傳岩岩下築岩翁幽通心與帝心通憂勤未感思賢夢相霖何日見成功磻溪溪伴釣魚翁濯纓溪水聽溪松龜猷未告非熊兆漁簔堪笑老龍鍾老原原上卜年翁感天功業動天聰流言未信成王悟悟成全得起禾風龜山山下感麟翁麟翁知巳㡬時逢自従顔孟希蹤後㡬人今日更希蹤青牛西去伯陽翁當年夫子嘆猶龍立言為恐真風䘮豈知言立䘮真風寓言豪誕􅃮園翁誇談名理浩無窮早知懸解人間世争知懸解不言中一身無碍竺乾翁遍員身戒身同船師從我乗桴去頑空中與指真空褒中斜谷卧龍翁量如江海氣如虹不應三顧逢先主至今千載慕冥鴻籃輿多病八吟翁雲叟恣逰從清時無事青山醉青山仍醉最青處士魏野字仲先陜州人居扵東郊架艸堂有水竹之勝好彈琴作詩清苦多聞扵時前后郡中皆所禮遇上祀汾隂召之辭疾不至野以詩贄公曰從前輔相皆頻出獨在中書十五秋㤗岳汾隂俱禮畢這回好伴赤松逰公覧之喜形扵色以酒茗藥物爲答素編先公遺札有公自寫此詩數本王文正公遺事旦得詩感悟以疾屢辭政柄遂拜太尉玉清昭應宫使又曰魏野謂㓂凖曰自古功名盖世少有全者因與詩曰好去上天辭將相歸來平地作神仙及貶始悔不用野之言云仁宗政要復齋漫錄云晋皇甫謐高士傳載四皓見秦政虐乃避入藍田山作歌曰漢之高山深谷逶迤燁燁紫芝可以療飢唐虞世逺吾將安歸駟馬髙盖其憂甚大冨貴之畏人不如貧賤之肆志林逋字君復居杭州西湖之孤山真宗聞其名賜號和靖處士詔長吏歳時勞問逋工扵畫善為詩如梅花詩云踈影横斜水清淺暗香浮動月黄昏評詩者謂前世咏梅者多矣未有此句也及其臨終為句云茂陵他日求遺藁尤喜𥘉無封禪書尤為人稱誦自逋之卒湖山寂寥未有繼者歸田録又青箱雜記云逋景祐𥘉尚無恙范文正公亦過其廬贈逋詩曰巢由不碩仕堯舜豈遺人又曰風俗因君厚文章到老醇其激賞如此言行録武夷之溪東流凡九曲而第五曲為最深盖其山自北而南者至此而盡聳全石為一峰㧞地千尺上小平處㣲戴土生林木極蒼翠可玩而四隤稍下則反削而入如方屋㡌者舊經所謂大隱屏也直屏下两麓相抱之中西南向為屋三間者仁智堂也堂左右两室左曰隱求以待棲息朱氏隱求室詩曰辰窓林影開夜枕山泉嚮隱去復何求無言道心長丘氏詩曰抱小窓深讀書空谷響一笑有㑹心紛紛自長項氏詩曰種桑不療寒蒔粟長苦飢飢寒有但使碩無違袁氏詩曰本是山中人歸作山中友豈同荷篠老永結躬耕耦浮雲一出岫膚寸彌九有此志未可量見之千載後劉平父詩曰寧懷棲遯情閒䄂經綸手風雲倘未期猿鶴且為友萬氏詩曰平生區中縁中歲從黄綺出處本無心誰云今隱几黄子厚詩曰隱側混樵牧堅高存聖功懷㢤得所尚一瓢從屢空韓氏次櫂歌韻宛宛溪流叠九灣山猿時下鳥關關釣磯茶竈山中樂大隱屏邊日月閑淮南小山作招隱極道山中窮苦之狀以風切遁世之士使無遐心其㫖深矣其後左太冲陸士衡相繼有作雖極清䴡顧乃自為隱遁之辭遂與本題不合故王康琚作詩以反之雖正左陸之悞而所述乃老氏之言又非小山本意也十月十六日夜坐許生挾琴過予書堂夜乆月明風露凄冷生揮絃度曲聲甚悲壯旣乃更為招隱之操而曰榖城老人嘗欲為予依永作辭而未就也予感其言因為推本小山遺意戯作一闋以反之口授許生寫呈榖城老者諸名勝請共賦之以備山中異時故事云南山之幽桂樹之稠枝相樛高拂千厓素秋下臨深谷之寒流王孫何處扳援乆淹留聞說山中虎豹晝嘷聞說山中熊羆夜咆叢薄深林鹿􅊯􅊯獮猴與君居山鬼伴君逰君獨胡為自聊音留歳云暮矣将焉求思君不見我心徒离憂南山之中桂樹秋風雲冥濛下有寒栖老翁木食澗飲迷春冬此間此樂優㳺眇何窮我爱陽林春葩昼紅我爱隂崖寒泉夜淙竹栢含烟怕青䓗徐行發啇歌安坐撫孤桐不問簟瓢屡空但把明月丼長終人間雖樂此心誰與同右隱南山之阿桂樹婆娑雲嵯峨下䕃連蜷舊柯秋思渺渺秋風多王孫不見扳援時寤歌岑寂空山良霄月華詰曲前溪春流迅波秀木􅐻紆雜青莎猿猴慕熊羆麋􆉚麚荒忽淹竜柰何思君使我長咨嗟人間歳月驚心易蹉跎幽居中林散髮披襟山崎崟慰此栖遅素心緑綺一曲傅清音超然忘世誰能共浮沉逺汲寒溪烟雨昼隂獨宿空斎哀猿夜吟竹栢摇風更蕭森春蘭得芳紉秋菊伴孤斟此意寕論古今勸君與我同投簮倘徉㱕去歌谷雲深右反招隱恬退門蔡寛夫詩話云乖崖少喜任俠學擊劍尤樂聞神仙事爲舉子時嘗從陳希夷欲分華山一半希夷以𥿄筆蜀牋贈之公笑曰吾知先生之旨矣殆欲驅我入閙処乎然性極清介居無妾媵不事服玩朝衣之外燕処惟紗㡌皂絛一黄土布裘而已至今人傳其昼像皆作此飾始及第時嘗以詩寄傳霖逸人云前年失脚下魚矶苦恋明時不忍埽為報巢由莫相笑此心非是爱輕肥李順之乱乖崖帥蜀有詩寄陳希夷云性愚不肯住山林刚要清流擬致君今日星馳劍南去囬頭慚愧華山雲皆真素志也復齋漫録云唐人詩有意効承平無功荅聖明灰心縁忍事霜髩為論兵道直身還在恩深命轉輕梅塩非擬訍葵藿是平生白日長垂照青蠅謾發聲嵩陽舊田宅終使謝㱕畊中書後堂軒西壁有題灰心霜髩之句者騐其筆迹舊相李公迪之書也李入相時边兵未動意在忍事之語元献中書即事詩叙其事云惨惨高槐落凄凄餘菊寒粉墻多記墨聊為拂塵㸔正為此也苕溪漁隱曰蔡寛夫詩話以灰心縁忍事霜鬂為論兵之句是裴晋公作李文定嘗親書于中書壁間蔡寛夫詩話云正獻公以清徳直道聞天下而風姿尤竒古年近七十髮髩皤然無一莖黒者居相位未幾以歳旦請老一章得謝退居睢陽歐陽文忠公未顯時正獻推薦特厚及文忠為留守日與公酧唱文公有荅公見贈末章云報國如乖碩㱕耕寕買田期無辱知已肯逐利名迁熈寕初文忠致政㱕汝隂時正獻捐舘巳十有五年矣文忠復用前詩題其祠堂云門生今白首墓木巳蒼烟報國如乖碩㱕耕寕買田此言今始踐知不愧黄泉苕溪漁隱曰昭陵諸臣傳云慶暦四年拜中書門下平章事毎内降與恩澤者積数十而面納上前上嘗謂諫官歐陽脩曰外人知衍封還内䧏吾居禁中有求恩者毎以衍不可告之而止者多扵所封還也由是僥倖不說出知兖州明年正旦上表曰臣年七十碩還上印綬乃以太子少師致仕議者謂故相一上章得請以三少致仕皆非故事盖宰相賈昌朝疾之蔡寛夫云正献居相位末㡬以歳旦請老不言鎮東魯盖闕文也迃叟詩話云王太尉旦從車駕過陜魏野貽詩曰昔時宰相年年替君在中書十一秋西祀東封俱巳了如今好伴赤松遊王䄂其詩以呈上累表請退上不許苕溪漁隱曰余按三朝正史云旦登柄用十八年爲相僅一紀素羸多疾又以名位太重憂畏不自安連歳拜章求解上素重其徳望聞其引退甚不樂優詔褒荅継以面諭旦一日獨對滋福殿令左右扶掖而升復求遜位上覩其瘦瘁閔然許之則迃叟詩話以為上不許盖悞矣其蔡寛夫詩話云遂得謝此言良是劉寛夫詩話云莱公自永興𬒳召魏野以詩送之曰好去上天辞冨貴却耒平地作神仙王文正從東封囬野亦寄以絶句云西祀東封今巳了好耒相伴赤松逰文正䄂此詩求退遂得謝莱公晚歳南迁世多言不䏻如文正用野言盖志士仁人亦各有志觀䒹公末年所為豈傀文正也㦲山人處士其言不如此或用或不用各繋其人要之不溺於冨貴以貪得則一也野有子亦父風, WYG: ''}
