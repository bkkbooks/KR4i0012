  - {type: line-break, offset: 0, content: '', id: KR4i0012_SBCK_050-1a01}
  - {type: variant, offset: 0, length: 1832, content: 百家詩話總龜後集卷之五十技藝門東坡與子由論書云吾雖不善書曉書莫如我苟能通其意常謂不學可故其子叔黨䟦公書云吾先君子豈以書自名㢤特以其至大至刚之氣發於胸中而應之於手故不見其有刻畫嫵媚之態而端乎章甫若有不可犯之色少年喜二王書晚乃喜顔平原故時有二家風氣俗子不知妄謂學徐浩陋矣觀此則知𥘉未嘗規規然出於翰墨積習也葛常之唐令狐相進李逺爲杭州宣宗曰聞李逺云長日惟消一局棊豈可使治郡哉對曰詩人之言不足有實也乃薦逺亷察可任此正說詩者不以辭害志也䂬溪房千里作骰子選格序云以六骰雙雙爲戯以數多少為進身官聀之序而乃條其選黜之目焉坡以流俗狂惑經营倘來惴惴惟恐後扵他人何異擲骰者心動於中而色形於外也欲求勝人者哉王逄原彩選詩云卒無及物效徒有髙人氣昏昏忘其大優優争其細其理信然黄常明裴度平淮西絶世之功也韓愈平淮西碑絶世之文也非裴之功不足以當韓之文非韓之文不足以發裴之功碑成李愬之子乃謂没父之功訟之於朝憲宗使叚文昌別作此與捨周鼎而寳康瓠何異㢤李義山詩云碑髙三丈字如手負以靈鰲蟠以螭句竒語重喻者少讒之天子言其私長繩百尺拽碑倒粗砂大石相摩治公之斯文若元氣先時已入人肝脾愈書愬曰十月壬申愬用所得賤賊将自文城因天大雪疾馳百二十里到蔡取元濟以獻文昌所謂郊雲晦冥寒可墮指一夕卷斾凌辰破関等語豈不相萬萬哉東坡先生責官過舊馹壁間見有人題一詩云淮西功業冠吾唐吏部文章日月光千古断碑人膾炙世間誰數叚文昌坡喜而録之同上陸希聲隱居冝興君陽山今金沙寺其故他宅也自著君陽山記叙其景物亭舘如輞川上可得其彷彿𥘉僧𧦬光從希聲授筆法継以善書得幸於昭宗希聲祈使援已以詩寄之云筆下龍蛇似有神天池雷雨變逡廵寄言昔日不龜手應念江湖洴澼人遂得召隱操盖不足觀也嘗著易傳十卷觀其自序以謂夢在大河之陽有三人偃卧東首上伏羲中文王下孔子也以易道卑予遂悟八卦小成之位質之象數如有符契且云今年四十有七巳及聖人之年於是作易傳以授門人崔徹王賛之徒復自爲注今觀其書無可取者而恠誕如此其人亦可知後避難死於道路盖不能終君陽之居也韻語陽秋杜劉少府畫山水障歌云反思前夜風雨急乃是蒲城鬼神入元氣淋漓障尤􅊜真宰上訴天應泣應物聽嘉陵江聲云水性自云静石中本無聲如何兩相激雷轉空山鳴贈能吟李儋詩云絲桐本異質音韻合自然吾觀造化意二物相因縁臨川詠魯公壊碑云六書篆籒数變改遂後世多失真誰𥘉妄鑿妍與醜坐令學士劳骸筋堂堂魯公勇且仁豈亦以此夸常民直疑技巧有天巧不必強勉亦通神坡詠歙硯詩云與天作石来㡬時與人作硯𥘉不辭詩成鮑謝石何與筆落鍾王硯不知此窮本探妙超出凖繩外不特狀冩景物也䂬溪拾遺門退之和劉使君云吏人休報事公作送春詩夢得送王司馬之陜州云案牘來時惟署字風煙入興更成章自俗吏觀之皆可坐不了事之目也韻語陽秋樂天云報道前駈少呵喝恐驚黄鳥不成啼坡云鬂絲只好對禪榻湖亭不用張旌旗蔡君謨云因傍堤松却飛盖爲聞山烏撤鳴騶若俗士務此誇張俗眼又豈識數公意黄常明林和靖詩馬從同事借妻怕罷官貧頗能狀寒亷態抑又有意所謂怕貧者婦人女子耳大丈夫之不移何隕獲之有子羙有長貧任婦愁亦以男子未嘗愁也譲粟不謀妻以明謀及婦人則不得辭也又云浮生有分定飢飽豈能迯歎息謂妻子我何隨汝曹樂天云妻孥不恱生恠問而我醉卧方陶然退之曰莫為児女態戚嗟憂賤貧䂬溪詩話肅宗至徳𥘉子羙為拾遺岑参為𥙷闕或問二人孰賢予曰子羙賢或曰何以知之曰以其詩知之子羙之詩云避人焚諌草騎馬欲雞栖又曰明朝有封事数問夜如何参之詩曰聖朝無闕事自覺諌書稀至徳𥘉安史之亂方劇上皇在蜀朝野騷然果無闕事時耶䂬溪詩話李白月下獨酌詩云舉盃邀明月對影成三人而賈翁玩月詩亦云但爱杉倚月我倚杉為三葛常之文如翻水成賦作义手速乃北夣瑣言記温庭筠才思艶麗工於小賦每入試押官韻作賦凡八义手而八韻成多為隣鋪假手號日救數人也余嘗以八义手對三折肱䂬溪詩話老杜流落不偶然巳為世所尊嘗有杖藜還客拜又有客云老病人扶再拜難則其㘴深鄉曲敬可見奚雖然樊宗師見劉义尚為之獨拜况老杜乎黄常明周羙成晚歸錢塘鄉里夣中得瑞鶴仙一闋悄郊原帶郭行路永客去車塵漠漠斜陽映山落歛餘紅猶恋孤城䦨角凌波歩弱過短亭何用素約有流鶯勸我重觧繍鞍緩引春醉酌不記歸時早暮上馬誰扶醒眠朱閣驚飈動幕猶殘醉遶紅渠歎西园已是花深無地東風何事又悪任流光過却歸來洞天自樂未㡬方臘盗起自桐廬擁兵入杭時羙成方㑹客聞之倉黄出奔趍西湖之墳庵次郊外適際殘臘落日在山忽見故人之妾徒歩亦爲迯避計約下馬小飲于道傍旗亭聞鶯聲於木杪分背少焉抵庵中尚有餘醺因卧小閣之上恍如詞中逾月賊平入城則故居皆遭蹂踐旋营緝而處継而得請提舉杭州洞霄宫遂老焉悉符前作羙成嘗自記甚詳今偶失其本姑記其畧以書于編揮塵, WYG: ''}
