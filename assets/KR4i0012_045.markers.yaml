  - {type: variant, offset: 4982, length: 2232, content: 後集卷之四十五釋氏門王績作𬒳召謝病詩云横裁桑莭杖直剪竹皮巾鶴警琴停夜鶯啼酒甕春顔回唯樂道原憲豈傷貧觀此数語又豈以招聘為喜乎坐獨詩寄身千載下聊逰萬物𥘉欲令無作有翻覺寔成虗詠懐詩云故鄉行處是虗室坐間同日落西山暮方知天下空贈薛收詩頼此北山僧教我似真如使我視听遺自覺塵累祛問有知績有得於佛氏者甚深也西清詩話不立文字見性成佛之宗逹磨西来方有之陶淵明時未有也觀其自祭文則曰陶子将辞逆旅之舘永歸於本歸於本宅其擬挽詞則曰有生必有死早終非命促其作飲酒詩則曰採菊東籬下悠然見南山此中有真意欲辨巳忘言其形影神三篇皆寓意髙逺盖苐一逹磨也而老杜乃謂淵明避俗翁未必能逹道何耶東坡論陶子自祭文云出妙語於纊息之餘豈渉生死之流㢤盖深淵明者同上世稱白樂天學佛得佛光如滿時趣觀其吾學空門不斈仙歸則湏歸兠率天之句則豈觧脫語耶元㣲之詩雖不及樂天逺甚然其得䖏豈樂天所能及㢤其遣病詩云况我早師佛屋宅此身形復捨彼就此去晋何所萦前身為過迹来世即前程蛻骨龍不死蛻皮蟬自鳴則與賈誼忽然為人何足控持化為異物又何足患之語何逺耶孟郊未嘗晋意於此而吊元魯山詩有苟含天地秀皆是天地身之句亦可嘉矣同上許渾送栖元弃釋奉道詩云仙骨本㣲靈鶴逺法心潜動毒龍驚送勤尊師自邉將入道詩云蒼鷹出塞胡塵滅白鶴還郷楚水深送李生弃官入道云水深魚避鈎雲逈鶴辞籠皆奨之也至送僧南歸詩云送師不得隨師去巳戴儒冠事素王豈渾亦有逃禪之意也同上錢起投南山佛寺云洗足觧塵纓忽斍天地寛庶将鏡中像盡作無主觀盖知百骸九竅本非天形至悟真寺詩云更聞東林磬九竅本非一興中㝷斍花寂尔諸像滅盖知妙明真心不関諸象起於是理亦可謂超然者矣同上子由誦楞嚴經悟一觧六亡之義自言扵此道更無疑然其作風痺詩乃有数盡吾則行未應墮冥漠之句則於理尚有礙矣而東坡乃謂子由聞道先我何耶東坡奉新別子由詩云何以觧我憂粗了一事大哭遯兒詩云中年忝聞道夢幻講已詳故贈錢道人詩云首断故應無断者氷消那復有氷知主人若苦令儂認認主人人竟是誰又云有主還湏更有賔不如無鏡自無塵只從半夜安心後失却當年覺痛人贈東林揔老詩云溪声便是廣長舌山色豈非清净身夜来八萬四千偈他日如何舉似人如此等句雖宿禪老衲不能屈也同上柳展如東坡甥也不問道扵東坡而問道於山谷山谷作八詩贈之其間有寢興與時俱由我屈伸肘飯羮自知味如此是道否之句是告之以佛理也其曰咸池浴日月深宅飬靈根胸中浩然氣一家同化元是教之道教也聖學魯家恭惟同出自乗流去本逺遂有作書肆是告之以儒道也同上歐永叔素不信釋氏之說如酧净照師云佛說吾不學劳師忽欸関吾方仁義急君且雲水閑酬惟吾師云子何獨吾慕自忘夷其身韓子亦謂收歛加冠巾是也旣登二府一日𬒳病亟夢至一所見十人冠冕環坐一人云叅政安得至此冝速反舎公出門数歩復徃問之公等豈非釋氏所謂十王者乎曰然因問世人飯僧造經為亡人追福果有益乎荅云安得無益旣寤病良巳自是遂信佛法文康公得之於陳去非去非得之於公之孫恕當不妄葉少藴守汝隂謁見永叔之子棐乆不出巳而棐持数珠出謝曰今日適與家人共爲佛事葉問其所以棐曰先公無恙時薛夫人已如此公弗之禁止也逺師作白蓮社與謝灵運陸脩静等十八人爲社客獨淵明不肯入社視衆人固巳髙矣無為子楊次公又從而笑之其作廬山五笑於陶有曰我笑陶彭澤聞鍾暗歉眉藍輿急回去巳是出山遲視彭澤又髙一著矣俱丹陽集佛氏經律論合五千四十八卷寘之大蔵所以傳佛心印作將来眼所𥙷大矣樂天詩詞其間何所不有而寘大蔵何耶東都聖善寺蘇州南禪院各有之自且著集序李公垂作詩羙之曰永添鳴宝集莫雜人乗經所謂盗憎主人者耶又觀題文集櫃云身是鄧伯道世無王仲宣只應分付女晋與外甥傳於是後名亦大孜孜矣同上大觀中呉興郡有邵宗益者剖􅑕将食中有珠現羅漢像偏袒右肩矯首左頋衣紋畢具僧俗創見遂奉以歸慈感寺之臨溪流建炎間憲使楊應誠與客傳玩之次不覺越檻躍入水中亟禱佛求之於烟波渺茫之中一索而獲噫亦異矣葉少藴有詩云九淵幽怪舞垂涎㳺戯那知我獨尊應迹不辞從異類蔵身何意恋窮源歸来自說龍宫化乆住方知鷲嶺存此話湏逢老摩詰貟通無碍本无門曽公衮云不知一壳㡬由旬能納湏弥不動尊疑是呉興清霅水直通方廣古灵源月沉濁水圎明在蓮出汙泥寔性存隱現去来𥘉一致莫将虗幻點空門一時名公和篇甚衆今蔵慈寺同上有唐中葉浮屠中有四澄觀桇支提以舎僧伽者洛中之澄觀也故退之元和五年為洛陽令與之詩云火燒水轉掃地空突兀便髙三百尺洛陽窮秋厭窮獨丁丁啄門疑啄木有僧来訪呼使犀揷脑髙頰權者也叅元名大師爲華嚴䟽主譯經潤文者㑹稽之澄觀也故裴休爲其塔銘云元和五年授僧紇印歴九宗聖世為七帝門師俗壽一百二者也傳燈録有鎮國大師澄觀荅皇太子問心要有心心作佛無一心而非佛心處處成道無一塵而非佛國之句所造超詣豈若前二澄觀有金植福筭沙窮海者之比㢤又有曹谿别出苐二世五䑓山華嚴澄觀大師旣有華嚴二字又有無名禪法嗣之言似即㑹稽澄觀然續云無機縁語句可錄則又非也金光明經載流水長者子以象負水救十千魚生忉利天可謂悲済之極報騐之速矣厥後現於記傳有放䗫得金放龜得印者其類甚多遂使上機生无縁之慈下士兾有因之果皆流水長子之慈意余居泛金溪上暇日率同志拏小舟載魚鼈蝦蟹命五比丘誦宝勝佛名若十二因縁法作梵唄捨之溪中坐間有請作詩以紀一時之事者余輒爲書云漁師竟日漁水族作斤賣小捐使鬼兄滿載獲鱗介鯤鯨未易羅所得亦殊態青蛙尽公私朱鮪兼小大霜魲尚貫針土負或粘塊輪囷積文螺郭索走蒼蠏􅊜沫相煦濡自分煑姜芥豈知惻隱人規作江湖貸因呼小青翰放溜舞澎湃趺坐延黒衣號佛指青瀬經翻流水篇梵起魚山唄傾盆帶寒藻圉圉㸔于邁驚疑或依蒲喜濯或生喝快若鷹辭鞲歡如囚破械定非校人池恐是餘不派願汝藉佛力永脫鈎網債口腹聊尔耳香餌莫渠愛並同上百家詩話緫龜後集卷之四十五終, WYG: 巻}
