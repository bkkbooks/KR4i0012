  - {type: variant, offset: 4867, length: 1965, content: 此尤可笑至扵樂府則稍超矣姚秘監嘗稱之曰妙絶江南曲凄凉怨女詩白太傅嘗稱之曰尤攻樂府詞舉代少其倫由是論之則人士所稱者非以詩也應制詩非他詩比自是一家句法大抵不出扵典實冨艶爾夏英公和上元觀燈詩云魚龍曼衍六街呈金鎻通宵啓玉扄冉冉逰塵生輦道遲遲春箭入歌聲寳坊月皎龍燈淡紫舘風㣲鶴熖平宴罷南端天欲曉回瞻河漢尚盈盈王𡵨公詩云雪消華月滿仙䑓萬燭當樓寳扇開雙鳯雲中扶輦下六鼇海上駕山來鎬京春酒沽周宴汾水秋風陋漢才一曲昇平人盡樂君王又進紫霞杯二公雖不同時而二詩如出一人之手盖格調當如是也丁晋公賞花釣魚詩云鶯驚鳯輦穿花去魚畏龍顔上釣遲胡文㳟云春煖仙蓂初靃靡日斜芝盖尚徘徊鄭毅夫云水光翠繞九重殿花氣濃薰萬夀盃皆典實冨艶有餘若作清癯平淡之語終不近尓顔延之謝靈運各𬒳㫖擬北上篇延之受詔即成靈運乆而方就梁元帝云詩多而能者沈約少而能者謝眺雖有能速多寡之不同不害其俱工也咸平景徳中錢惟演劉筠首變詩格而楊文公與之鼎立綽號江東三虎詩格與錢劉亦絶相類謂之西崑體大率效李義山之為豐冨藻䴡不作枯瘠語故楊文公在至道中得義山詩百餘篇至扵愛慕而不能釋手公嘗論義山詩以謂包藴宻緻演繹平暢味無窮而炙愈出鑚彌堅而酌不竭使學者少窺其一斑若滌腸而浣骨是知文公之詩者得扵義山者為多矣又嘗以錢惟演詩二十七聮如雪意未成雲着地秋聲不㫁鴈連天之類劉筠詩四十八聮如溪牋未破氷生硯爐酒新燒雪滿天之類皆表而出之詩之有思卒然遇之而莫遏有物敗之則失之矣故昔人言覃思垂思抒思之類皆欲其思之來而所謂亂思蕩思者言敗之者易也鄭綮詩思在㶚橋風雪中驢子上唐求詩所㳺歴不出二百里則所謂思者豈㝷常咫尺之間所能發哉前軰論詩思多生扵杳冥寂寞之境而志意所如徃徃出於埃壒之外苟能如是扵詩亦庻㡬矣小說載謝無逸問潘大臨云近日曾作詩否潘云秋來日日是詩思昨日投筆得滿城風雨近重陽之句忽催租人至令人意敗輒以此一句奉寄亦可見思難而敗易也米元章賦詩絶少而人罕稱之者以書名掩之也如不及陪東坡徃金山作水陸詩云乆隂障奪佳山川長瀾四隘魚龍淵衆看李郭渡浮玉晴風掃出清明天頗聞妙力開大施足病不列諸方仙想應蒼壁有垂露照水百恠愁寒烟栖雲閣云雲出救世旱澤浹雲㝷歸入石了不見豐功已如遺龍騫荐復起抱石明幽姿雲乎無定所隱者何當栖如此二詩殆出翰墨畦逕之表盖自邁徃凌雲之氣流出非㝷䂓索矩者之可到也韓退之調張籍詩曰刺手㧞鯨牙舉瓢酌天漿魏道輔謂高至酌天漿幽至扵㧞鯨牙其用思深逺如此𬒳獨未讀送無本詩爾其曰吾嘗示之難勇往無不敢蛟龍弄牙角造次欲手攬衆鬼囚大幽下覷襲元窞言手攬蛟龍之角下覷衆鬼之窞皆難事而無本勇徃無不敢盖作文以氣為主也則調張籍之句無乃亦是意乎余㐮公靖嘗在契丹作胡語詩云夜筵没邏臣拜洗兩朝厥荷情幹勒㣲臣稚魯祝若統聖夀鐡擺俱可忒没邏言侈盛拜洗言受賜厥荷言通好幹勒言厚重鐡擺言嵩髙也沈存中筆談載刀約使契丹戯為詩云押燕移離畢看房賀䟦攴餞行三匹裂宻賜十貔狸移離畢如中國執政官賀䟦攴執衣防閣人匹裂小木罌貔狸如形如䑕而大狄人以爲珎饌二詩可作對故表而出之孟郊詩云食薺腸亦苦強歌聲無歡岀門即有碍誰謂天地寛許渾詩云萬里碧波魚戀釣九重青漢鶴愁籠皆是窮蹙之語白樂天詩云無事日月長不覊天地闊與二子殆霄壤矣作詩貴雕琢又畏有斧鑿痕貴破的又畏粘皮骨此所以爲難李商隱柳詩云動春何限葉撼曉㡬多枝恨其有斧鑿痕也石曼卿梅詩云認桃無緑葉辯杏有青枝恨其粘皮骨也能脫此二病始可以言詩矣劉夣得稱白樂天詩云郢人斤斵無痕迹仙人衣裳弃刀尺世人方内欲相從行盡四維無處覔若能如是雖終日斵而鼻不傷終日射而鵠必中終日行扵䂓矩之中而其迹未嘗滯也山谷嘗與揚明叔論詩謂以俗爲雅以故爲新百戰百勝如孫呉之兵棘端可以破鏃如甘蠅飛衞之射揑聚放開在我掌握與劉所論殆一轍矣余讀許渾詩獨愛道直去官早爲貧家客多之句非親嘗者不知其味也贈蕭兵曹詩云客道耻摇尾皇恩寛犯鱗直道去官早之實也將離郊園詩云乆貧辭國逺多病在家希家貧爲客多之實也蘇飬直清江曲見賞扵東坡以爲與李太白無異所謂屬玉雙飛水滿塘菰蒲深䖏浴鴛鴦是也旣為前軰所賞名已不沒而又作後清江曲一篇豈飬直尚惡其少作耶所謂呼児極浦下笭箵社瓮欲熟浮蛆香輕蓑浙瀝鳴秋雨日暮乗流自相語如此等句前曲似未到也自古文人雖在艱危困踣之中亦不忘扵製述盖性之所嗜雖鼎鑊在前不䘏也况下扵此者乎李後主在圍城中可謂危矣猶作長短句所謂攖桃落盡春歸去蝶飜金粉雙飛子䂓啼月小樓西文未就而城破蔡約之嘗親見其遺蒿東坡在獄中作詩贈子由云是處青山可藏骨他年夜雨獨傷神猶有所托而作李白在獄中作詩上崔相云賢相爕元氣再欣海縣康應念覆盆下雪泣拜天光猶有所許而作是皆出扵不得已者劉長卿在獄中非有所托訴也而作詩云斗間誰與看冤氣盆下無由見太陽一詩云壯志已憐成白髪餘生猶待發青春一詩云冶長空得罪夷甫不言錢又有獄中見畫佛詩豈性之所嗜則縲絏之苦不能易雕章繢句之樂欤杜牧赤壁詩云折㦸沉沙鐡未消自將磨洗認前朝東風不與周郎便銅雀春深鎻二喬李義山集中亦載此詩未知果何人所作也俱同上百家, WYG: ''}
