  - {type: variant, offset: 4469, length: 397, content: 首其一云春色應隨歩輦還珠旒玊几照龍顔紫雲殿下朝元罷便領東風到世間其二云春風細拂緑波長初過層城渡建章草色未迎雕輦翠柳梢先學赭衣黄其三云晴暉散入鳯凰樓一行朱簾不上鉤漢殿鬪簮雙彩燕併和春色上釵頭其四云小池春破玉玲瓏聲觸簾鉤漸好風閑繞䦨干搯花樹春痕已着半梢紅觀此四詩與帖子格調何異豈乆扵翰苑而筆端自然習熟耶丹陽集張籍韓愈高弟也愈嘗作此日足可惜贈之八百餘言又作喜侯喜至之篇贈之二百餘言又有贈張籍一篇二百言皆不稱其能詩獨有調張籍一篇大尊李杜而末章有顧語地上友經營無太忙之句病中贈張籍一篇有半塗喜開鑿派别失大江吾欲盈其氣不令見麾幢之句醉贈張徹有張籍學古淡軒昻避雞群之句則籍有意扵慕大而實無可取者也及取其集而讀之如送越客詩云春雲剡溪口殘月鏡湖西逢故人詩云海上見花發瘴中聞鳥飛送海客詩云入國自獻寳逢人多贈珠紫掖發章句青闈更詠歌如此之類皆駢句也至語言拙惡如寺貧無施利僧老足慈悲収拾新琴譜封題舊藥方多申請假牒秪送賀官, WYG: 庫全}
