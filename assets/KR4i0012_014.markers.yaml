  - {type: variant, offset: 4676, length: 1, content: 郎, SBCK: 􅀰}
  - {type: variant, offset: 4679, length: 2279, content: 中丞薦白啓云遇永王東廵脅行中道乃用白述懷意以收拭其過尔孔巢父亦為永王所辟巢父察其必敗㓗身潜遁由是知名使白如巢父之計則安得有夜郎之謪㢤老杜送巢父歸江東云巢父掉頭不肯往東將入海隨烟霧其序云兼呈李白恐不能無㣲意也黄常明唐穆宗時令狐楚為相為景陵使以傭錢獻羡餘怨聲係路致有衡州之貶觀發潭州寄李寜常侍詩云君今侍紫垣我已墮青天委廢從兹日旋歸在㡬年又有答竇鞏中丞詩云何年相贈答却得在中䑓亦可見其去國慘傷之情矣孔子曰苟患失之無所不至其楚之謂乎觀甘露之事則可見矣當是時也王涯等𬒳繋神䇿仇士良白涯與李訓謀逆將立鄭注楚時以舊相在闕下文宗召楚至帝對楚悲憤因付涯訊牒曰果涯書耶楚曰涯誠有謀罪應死嗚呼觀望腐夫閹人而誣寘人扵死地楚忍為之乎甘露野史乃言尚頼舊相令狐楚獨為辯眀若以史為證則野史之言未必公也杜牧之作李和鼎詩云鵩鳥飛來庚子直謫去日蝕辛卯年由來枉死賢才士消長相持勢自然盖言鄭注事也方是時和鼎論注不可為相旋致貶謫故牧之作詩痛之如此議者謂辛卯年在憲宗之時而文宗時無辛卯也豈牧之悞乎余謂牧之所云非謂實庚子辛卯也鵩集于舎班固書庚子之日日有蝕之詩人有辛卯之詠借是事以眀李甘之冤尓杜牧之集有李給事詩二首其中有紛紜白晝驚千古鐡鎖朱殷㡬一空之句謂鄭注甘露之事也又有可憐劉校尉曾訟石中書之句牧之自注云給事曾忤仇士良人遂以為給事者李石也余嘗攷之李石雖嘗為給事然劾鄭注之事史所不載語言忤仇士良然亦在石拜相之後石旣拜相則牧之詩題不應以給事為稱其非李石明矣當時唯有李中敏與牧之厚善嘗因旱欲乞斬注以申宋申錫之冤帝不省遂以病告歸頴陽令牧之有元禮去歸緱氏學之句牧之自注云因論鄭注告歸頴陽又史云注誅遷給事其后仇士良以開府䕃其子中敏曰内謁者安得有子士良慙恚由是復弃官去由是論之則是中敏無疑矣唐太和末閹尹恣横天子以擁虚噐為耻而元和逆黨未討帝欲夷絶其類李訓謂在位操權者皆碌碌獨鄭注可共事遂同心以謀巳而殺陳宏志扵青泥驛相繼王守澄楊承和韋元素王踐言皆不保首領又㫁崔潭峻之棺而鞭其尸剪除逆黨㡬盡亦可謂壯矣意欲誅宦乃復河湟歸河朔諸鎮天子向之鄭注雖招權納賄然出節度隴右欲因王守澄之葬乗群宦臨送以鎮兵悉誅之謀亦未必不善㑹李訓先五日舉亊遂成甘露之旤世以成敗論人物故訓注不得為忠至李徳𥙿謂不可與徒隷齒亦太甚矣按唐史李甘與李中敏皆嘗論鄭注不可為相故甘有封州之謫而中敏有頴陽之歸杜牧之贈甘詩云太和八九年訓注極虓虎吾君不省覺二兇日威武喧喧皆傳言明辰相登注和鼎顧予云我死有處所明日詔書下謪斥南荒去又有贈中敏詩云元禮去從緱氏學江充來見大䑓宫曲突徙薪人不㑹海邉今作釣魚翁盖深痛二公之言不行而訓注得恣其謀也盖當是時仇士良竊國柄勢熖熏灼士大夫扵議論之間不敢以訓注為是以賈殺身之旤故牧之之詩如此於乎東漢之季柄在宦官陳蕃之徒以忠勇之資謀殪其黨而事亦不遂史載其名殆如日星而訓注以當時士夫畏懾士良軰遂加以奸兇之目而史亦以為亂人萬世之下無以自白其深可痛惜㢤家藏甘露野史三卷及乙卯記一卷二書之說特相矛盾甘露野史之言上令訓等誅宦官事覺反為所擒而乙卯記乃謂訓等有逆謀盖甘露史出扵朝廷公論而乙卯記附㑹士良之私情也乙卯記後有朱實跋尾數百言以乙卯所記為非是其說與野史同余故表而出之葛常之三良以身殉秦繆之葬黄鳥之詩哀之序詩者謂國人刺繆公以人從死則咎在秦繆而不在三良矣王仲宣云結髮事明君受恩良不訾臨殁要之死焉得不相隨陶元亮云厚恩固難忘君命安可違是皆不以三良之死為非也至李徳𥙿則謂社稷死則死之不可許之死與梁丘㩀安陵君同譏則是罪三良之死非其所矣然君命之扵前而衆驅之扵後為三良者雖欲不死得乎唯柳子厚云疾病命固亂魏氏言有章從邪䧟厥父吾欲討彼狂使康公能如魏顆不用亂命則豈至䧟父扵不義如此㢤東坡和陶亦云顧命有治亂臣子得從違魏顆真孝愛三良安足希似與柳子之論合而過秦繆墓詩乃云繆公生不踈孟眀豈有死之日而忍用其良乃知三子狥公意亦如齊之二子從田横則又言三良之殉非繆公之意也韋蘇州睢陽感懷詩有曰宿將降賊庭儒生獨全義宿將謂許逺儒生謂張巡也盖當時物議以為廵死而逺就虜疑逺畏死而辭服扵賊故應物云尔韓愈嘗有言曰逺誠畏死何苦守尺寸之地食其所愛之肉以與賊抗而不降乎斯言得矣廵死後賊將生致逺扵偃師逺亦以不屈死則是逺亦終死賊也李義山詩云本為留侯慕赤松漢廷方識紫芝翁蕭何只解追韓信豈得虚當第一功是以蕭何功在張良下也王元之詩云紀信生降為沛公艸荒孤壘想英風漢家青史縁何事却道蕭何第一功是以蕭何功在紀信下也余謂炎漢創業何為宗臣高祖設指縱之喻盡之矣他人豈容議耶盗殺武元衡也白樂天為京兆掾初非言責而請捕盜以必得為期時宰惡其出位坐賦新井篇逐之九江故因聞琵琶乃有天涯流落之感至於淚􅊜青衫之上何憊如此㢤先文康公嘗有詩云平生趣操號安恬退亦恬然進不貪何事潯陽恨遷謫輕將清淚􅊜青衫又云及泉曾改莊公誓勝母終回曾子車素綆銀牀堪泪墮更能賦詠獨何如左太冲陶淵明皆有荆軻之詠太冲則曰雖無壯士節與世亦殊倫淵明則曰惜㢤劍舞踈竒功遂不成是皆以成敗論人者也余謂荆軻功之不成不在荆軻而在秦舞陽不在秦舞陽而在燕太子舞陽之行軻固心疑其人不欲與之共事欲待他客與俱而太子督之不巳軻不得已遂去故羽歌悲愴自知功之不成巳而果膏刄秦庭當時固巳惜之然槩之扵義雖得秦王之首扵燕亦未能保終吉也故楊子云荆軻為丹奉扵期之首燕督亢之圖入不測之秦實刺客之靡也焉可謂之義也可謂善論軻者漢文欲輕刑而反重議者以謂失本惠而傷吾仁故也或又咎帝短䘮為傷扵孝予觀遺詔率皆言為巳損制未嘗使士庻皆短䘮也厥後丞相翟方進與薛宣服母䘮皆三十六日而除而顔師古注云漢制自文帝遺詔國家遵以為常則咎不在文帝矣而王荆公詩云輕刑死人衆䘮短生者偷仁孝自此薄哀㢤不能謀䡖刑死人衆則固然矣短䘮生者偷則似誣文帝也俱同上百家詩話總龜卷之十四, WYG: 阮閱撰}
