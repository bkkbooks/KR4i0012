  - {type: variant, offset: 171, length: 502, content: 詹乾徳中獻野史授黄崗宰有詩行於世聞猿云啼猿非有恨行客自多悲聞笛云不知吹者意何似聴人心卧屏云横琴遮逺洞舉手出高峰公宇蘆云漁家合得两三莖公退徐吟思倍清官滿不將歸舊隱蕭蕭留與後人聽雅言雜載繆島雲少從浮屠詩尚竒險如抛芥子降顛狒狒折楊枝􅎈醉猩猩夐出前軰摭言湖南日試萬言王璘與李群玉校書相遇扵岳麓寺群玉揖之曰公何許人日試萬言群玉曰與公聮句可乎璘曰惟子之命群玉破題授之曰芍藥花開菩薩面璘繼之曰㯶櫚葉散夜义頭東坡云児子邁㓜嘗作林檎詩云熟果無風時自脫半窓迎日鬪先紅扵等軰中亦號有思致者今巳老無他技但時出新句作酸棗尉有詩云葉隨流水歸何處牛載寒鵶過别村百斛明珠眉山矮道士李伯祥好爲詩格亦不能高徃徃有竒語如夜過脩行寺醉打老僧門皆可愛予㓜時學於道士張易簡觀中伯祥與易簡徃來嘗歎曰此郎君貴人也不知何以知之同前狄煥南岳石樓暁望云數點當秋霽不知何處峰題岳路松云一嶂雨聲歸洞壑两條翠色下瀟湘雅言系述曾弼長沙人依逸人王元爲詩友宿玉泉寺云山偷半庭月池印一天星君山云翠壓魚龍窟寒堆波浪心蔣鈞字不器營道人與劉洞陳甫爲詩友寄柳宣云因借夣書過竹寺學耕秋粟繞茆原戎昱詩有一夜不眠孤客耳主人門外有芭蕉鈞代答云芭蕉葉上無愁雨自是多情聴㫁腸史虚白嵩洛人廖凝寄, WYG: 城謝眺}
