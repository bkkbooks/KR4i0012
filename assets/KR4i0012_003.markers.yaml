  - {type: variant, offset: 3663, length: 1, content: 龜, SBCK: 􅀛}
  - {type: variant, offset: 3664, length: 263, content: 後集卷之三孝義門徐師川詩云楚漢紛争辨士憂東歸那復割鴻溝鄭君立義不名籍項伯胡顔肯姓劉謂項伯籍之近族乃附劉而背項鄭君以爲漢臣乃違漢而思楚也余嘗論之曰方劉項之勢雌雄未决也其間豈無容容狡詐之士首䑕兩端以觀成敗而爲身謀者乎項伯是也其意以謂項氏得天下則吾嘗以宗族從軍畫䇿定計豈吾廢㢤劉氏得天下則鴻門之㑹吾嘗舞劍以蔽沛公矣廣武之㑹吾嘗勸勿烹太公矣劉氏豈吾廢哉髙祖之封項伯殆以此也至鄭君則不然亊藉藉死属漢髙祖諸故楚臣名籍鄭君獨不奉詔乃盡拜名籍者為大夫而逐鄭君觀此則鄭君與項伯賢佞可見髙祖或逐或封皆徇情之好悪則知戮丁公者一時矯激之爲也王儉七志曰, WYG: 巻四}
