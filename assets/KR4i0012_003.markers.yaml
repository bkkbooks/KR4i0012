  - {type: variant, offset: 5343, length: 456, content: 在平津南阮謂杜悰也史載悰更歴將相而牧困躓不自振怏怏不平以至於卒審爾以牧之豈肯受其料理哉然宗族貴宦河潤者非一枯菀升沉時命存焉何至怏怏如是可以知牧之量不宏也李義山作驕児詩時衮師方三四歲爾其末乃云兒應勿學耶讀書求甲乙况今西與北羗戎正狂悖兒當速成大探雛入虎窟當爲萬户侯勿守一經袠兵連旤結生民塗炭以日爲歲之時而乃望三四歲児立功於二十年後所謂俟河之清人夀㡬何者也同上陶淵明命子篇則曰夙興夜寐願爾之才爾之不才亦已焉哉其責子篇則曰雖有五男児緫不好𥿄筆天運苟如此且進杯中物告􅌂等数則曰鮑叔管仲同財無猜歸生伍舉班荆道舊而况同父之人㢤則淵明之子未必賢也故杜子羙論之曰有子賢與愚何其掛懐抱然子羙於諸子亦未為忘情者子羙遣興詩云驥子好男兒前年學語時世亂憐渠小家貧仰母慈又憶㓜兒詩云別離經莭換聦惠與誰論憶渠愁只睡炙背俯晴軒得家書云熊兒幸無恙驥子最憐渠元日示宗武云汝啼吾手戰觀此数詩於諸子鍾情尤甚於淵明矣山谷乃云杜子羙困於三蜀盖爲不知者詬病以爲詘於生亊又徃徃譏宗武失學故寄之淵明爾俗人不知便爲譏病所謂癡人面前不得說夣也同上百家詩話總龜後集卷之三, WYG: 閱撰}
