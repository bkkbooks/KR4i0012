  - {type: variant, offset: 3928, length: 1414, content: 髙祖逰張良廟並命僚佐賦詩謝瞻所賦冠于一時今載扵文選者是也其曰鴻門銷薄蝕陔下隕攙搶爵仇建䔥宰定都護儲皇肇允契幽叟飜飛指帝郷則子房輔漢之䇿盡於此数語矣王荆公云素書一卷天與之榖城黄石非吾師固陵觧鞍聊出口捕取項羽如嬰兒從来四皓招不得為我立弃商山芝用亦此數事而論議格調出瞻数等東坡論子房䄂搥之亊以謂良不爲伊吕之謀而特出於荆軻聶政之計以余觀之此良少年之銳氣未足以咎良也圮上授書之後所見豈前比㢤葛常之予曽祖通議兄弟四人取良辰羙景賞心樂亊之義作四并堂于東园故通議詩云華圃控弦秋學射寒窓留燭夜抄書良辰羙景饒心事歡日相并樂起予先祖清孝公兄弟六人取三荆同林之義作培荆亭于西園當時篇詠無存者清孝安遇集中有培荆亭記其畧云西园推輪無亭觀之玩伯兄欲紏合叔季同耳目之適於是基盈尺之髙宏一筵之廣列楹為亭號曰培荆至先人文康公罷官南陽適當兵擾復還舊捿奉伯父工部居焉别建二老堂于宅南秦望由里諸山皆在目植花竹于四隅命某日治饌徃徃樂飲竟日某嘗賦詩云去家纔隔水一股二老堂成三百弓鴒原暮下沙水暖鴈行夜落霜天空竹根酌酒不妨酔花蕚斵詩如許工坐乆興䦨笻竹杖出門人指兩仙翁同上月輪當空天下之所共視故謝莊有隔千里兮共明月之句盖言人雖異處而月則同瞻矣老杜當兵戈騷屑之際與其妻各居一方自人情觀之豈能免閨門之念而他詩未嘗一及之至於明月之夕則遐想長思屢形詩什月夜詩云今夜鄜州月閨中只獨㸔繼之曰香霧雲鬟􅊜清輝玉臂寒一百五日夜對月去無家對寒食有淚如金波継之曰仳離放紅蘂想像嚬青蛾江月詩云江月光於水髙樓思殺人繼之曰誰家排錦字燭㓕翠眉嚬其數致意閨門如此其亦謝莊之意乎顔延之對孝武乃有莊始知隔千里兮共明月之說是莊才情到䖏延之未能曉也同上魏武於諸子中獨愛植丁儀丁廙楊脩之徒爲植羽翼㡬代太子丕而植任性不自雕勵又太子御之有術故易宗之計不行盖非植遜丕也洎文帝即位植屡求試用不報益怏怏帝欲害之卞太后曰汝已殺任城不得復殺東阿故止從貶爵則植豈無怨懟乎嘗觀植所作豫章行云他人雖同盟骨肉天性然周公穆康叔管蔡則流言子臧孫千乗季札慕其賢意謂已素爲武帝所愛忌之者故衆有管蔡流言之說然乃自以季札為比亦誣矣豈其掠羙之言㢤同上晋嵇康贈弟秀才四言詩云感悟馳情思我所欽則以所欽爲弟陸機贈從兄車騎詩云寤寐靡安豫願言思所欽則以所欽爲兄又贈馮文罷詩云慷慨誰爲感願言懷所欽則以所欽為友陸機作詩贈賈謐㡬三百言無非極其裒讃方謐用事生死荣辱人如反覆手其裒讃亦何足怪然其間亦有寄意譏誚人未能推其意者按臧榮緒晋書謐父韓夀母賈充少女也充平生不議立後妻郭槐輙以外孫韓謐襲封帝計之遂以謐為魯公則是賈謐非充子也故機詩云誕育洪胄纂戎于魯言誕育則以譏非巳生也又曰惟漢有木曾不踰境謂橘踰淮則化爲枳言如螟蛉之化蜾蠃無異也夫謐勢熖薰灼如此而機敢爲廋詞以狎侮之真文人之習氣㢤王福畤之子勔勮勃皆有才名故杜易簡稱為三珠樹其後助劼勸又皆以文顯勃於兄弟之間極友愛自郷還􅉑詩云人生忽如客骨肉知何常願及百年内花蕚常相將無使棠棣廢取譬人無良觀此語意豈兄弟有不相能者耶及觀誡功勁云欲不可縦争不可常勿輕小忿将成大殃此二人者似非處於禮義之域者棠棣廢之語疑爲此二人設也同上楊六尚書白樂天妻兄也𥘉除東川節度代妻賀兄云覔得黔婁爲妺婿可能空寄蜀茶来又寒食寄詩云蛮旗似火行隨馬蜀妓如花坐遶身不使黔婁夫婦㸔誇張冨貴向何人皆責望之言也同上文選載嵇叔夜贈秀才入軍詩李善注謂兄喜秀才入軍而張銑謂叔夜弟不知其名考五詩或曰携我好仇或曰思我良朋或曰佳人不在皆非兄弟之稱善銑所注恐未必然爾同上錢起題杜牧林亭詩云不湏躭小隱南, WYG: ''}
