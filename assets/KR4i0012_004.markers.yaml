  - {type: variant, offset: 3925, length: 1, content: 龜, SBCK: 􅀛}
  - {type: variant, offset: 3926, length: 681, content: 後集卷之四孝義門唐人與親别而復歸謂之拜家慶盧象詩云上堂家慶畢顧與親思邇孟浩然詩云明朝拜家慶湏著老莱衣葛常之荆公𥘉去臨川詩云馬頭西去淚霑襟一望親庭更苦心已覺省煩非仲叔安能飬志似曾參赴調西笑時詩也非仲叔則自傷不能飬口躰不如曽参則自傷不能飬志也人士一官所駈乃爾爲志亦豈得巳哉後又有詩云古人一日飬不以三公換正爲此爾葛常之張劍州以太夫人䘮劒州歸荆公予之詩并示女弟云烏辭反哺顛毛黒鳥引思歸口舌丹又有張劍州至劍一日以親憂罷詩云白頭反哺秦烏側流血思歸蜀鳥前所賦皆一時之亊而語意重復如此何耶月上陳繹奉親至孝嘗作度老堂以娯其母介甫贈之詩云種竹常疑出冬筍開池故合涌寒泉盖不獨詠堂前景物而孝感之事實寓焉岀冬笱暗用孟宗事涌寒泉暗用姜詩事同上王稚川調官京師母老留鼎州乆不歸侍嘗閱貴人歌舞有詩云畫堂玉珮縈雲響不及桃源欵乃歌山谷次韻諷之曰慈母毎占烏鵲喜家人應賦扊扅歌可謂盡朋友責善之義谷至孝奉母安康君至爲親滌廁牏浣中裙未嘗頃刻不供子聀洎貶黔南不能與親俱則贈王郎詩云晋我左右手奉承白髮親至贑上食蓮有感則曰蓮實大如指分丼念母慈亦可見其孝誠矣余聞無瑕者可以戮人則其告稚川之語未爲過也老杜送李舟詩非不歸重而其中亦不能無譏焉所謂舟也衣彩衣告我欲逺適倚門固有望歛衣就行役南登吟白華已見楚山碧何時太夫人堂上㑹親戚豈非譏其無方之逰耶孔子云父母在不逺逰逰必有方則山谷少陵之詩皆孔子之意也人之事親當以敬爲主故孔子吿子游曰至於犬馬皆能有養不敬何以别乎束晢作𥙷亡詩於南陔白華二篇每以爲言南陔曰飬隆敬薄惟禽之似白華曰竭誠盡敬亹亹忘劬可謂得孔子之旨矣今之人恃親之愛已而忘其敬者多故表而出之以爲事親之戒同上李白樂府三卷於三綱, WYG: 巻}
