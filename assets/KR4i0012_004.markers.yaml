  - {type: variant, offset: 4901, length: 742, content: 又携昭陽金陵之妓於夫婦之義爲如何至於友人路亡白爲權窆及其麋潰又收其骨則朋友之義庻㡬矣送蕭十一之魯兼問稚子伯禽有髙堂倚門望伯魚魯中正是趨庭䖏君行旣識伯禽子應駕小車騎白羊之句則父子之義庻㡬矣如弟凝錞儕况綰各贈詩以致其雍睦之情則兄弟之義庻㡬矣惜乎二失旣彰三羙莫贖此所以不能爲醇儒也韻語陽秋樂天及第後歸覲留别同年云擢第未爲貴拜親方始榮此毛得檄而喜之意也論者以春風得意疾决非孟郊語其氣格亦不類而白公亦有得意减別恨半酣輕逺程翩翩馬蹄疾春風歸郷情此又不可曉也黄常明范文正公雷霆日有犯始可報吾親誰謂臣子忠難於兩全也涖官不敬戰陣無勇本非事親事禮記必以爲非孝公之謂歟黄常明宗族門謝師厚生女梅聖俞與之詩曰生男衆所喜生女衆所醜生男走四隣生女各張口男大守詩書女大逐鷄狗又云何時集氏郎堂上拜媪叟盖戯師厚也陳琳杜甫詩及楊妃外傳其說異焉琳痛長城之役則曰生男戒勿舉生女哺用哺杜甫傷関西之戍則曰生女猶是嫁比鄰生男埋没隨百草楊妃專寵帝室金印盩綬寵遍於銛釗象服魚軒荣均於秦􅉑當時遂有生女勿悲酸生男勿喜歡男不封侯女作妃君㸔女却爲門楣之詠而樂天長恨歌亦云遂令天下父母心不重生男重生女今師厚之女敏質儒門不過求賢士以爲之配爾縦不至負薪如瞿婦餉舂如孟光亦豈能預知其必大冨貴亢宗荣族如蒲之婦人乎冝其聖俞以爲戯也韻語陽秋傳曰學士大夫則知尊祖矣族之所在祖之所自出也其可以不敬乎陶淵明有贈長沙公詩序云予於長沙公爲族祖同出大司馬昭穆旣逺巳爲路人故其詩云同源分流人易世踈慨然晤歎念斯厥𥘉禮服遂悠歲月眇徂感彼行路眷焉踟蹰盖深傷之也長沙公於淵明如此而淵明乃以教載自任其臨别贈言之際有進簣雖少終左爲山之句嗚呼淵明亦可謂賢矣杜子羙数訪從孫濟而不免於防猜故其詩云所来爲宗族亦不爲盤餐勿受外嫌猜同姓古所敦觀長沙與済尊祖之義掃地矣韻語陽秋百家詩話總龜後集卷之四, WYG: 阮閲撰}
