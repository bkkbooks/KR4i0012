  - {type: variant, offset: 3665, length: 762, content: 八辯疑門王絲字敦素越之蕭山人景祐初為縣令㑹嵗歉絲每家攴錢一千以濟之期以眀年夏輸絹一匹邑人大受其惠稱為徳政繇此當路薦之盖是時一縑售價不逾其數爾仕止郎曹典州而巳范文正公為作墓誌具載其事至荆公當國傚其法施之天下號為和買乆之本錢旣不復俵且有折帛之害世悞傳始扵王儀仲素儀仲文正公之子早即貴逹未嘗為邑官至八座没謚懿敏國史夲傳可考其子鞏字定國與東坡先生㳺李定字仲求洪州人晏元獻公之甥文亦竒欲預賽神㑹而蘇子美以其任子距之致興大獄梅聖俞謂一客不得食覆鼎傷衆賔者也其孫即商老彭以詩名列江西派中又李定字資深元豐御史中丞其孫方叔正民兄弟皆顯名一時揚州人又李定嘉祐治平以來以風采聞嘗遍歴天下諸路計度轉運使官制未行老于正卿乃敦老如岡之祖盖濟南人也同姓名者凢三人世亦多指而為一不可不辯李豸陽翟人東坡先生門下士亦字方叔两方叔俱以文鳴詩章又多互傳于世陳子昻感遇詩云樂羊為魏將食子狥軍功骨肉且相薄他人安得忠又曰吾聞中山相乃属放麑翁孤獸猶不忍况以奉君終一則忍扵其子一則不忍於麑故魯直懐荆公詩有啜羮不如放麑樂羊終媿巴西陳無巳啓亦用此事所謂中山之相仁於放麑亂世之雄疑於食子是也然屬麑於秦西巴者孟孫也非中山相也子昻徒見樂羊中山事遂誤作孟孫用無巳亦遂襲之魯直以西巴為巴西亦悞矣丹揚集李白古風云燕昭延郭隗遂築黄金䑓劇辛方趙至鄒衍復齊來予攷史記不載黄金䑓之名止云昭王為郭隗改築宫而師事之孔文舉與曹公書曰昭王築䑓以尊郭隗亦不著黄金之名上谷郡圗經乃云黄金䑓在易水東南十八里燕昭王置千金於䑓上以延天下士遂因以為名皇甫松有登黄金䑓詩云燕相謀在兹積金黄巍巍上者欲何顔使我千載悲其迹尚可得而考也東坡詩云玉奴弦索花奴手玉奴謂楊妃花奴謂汝陽王璡也及觀和楊公濟梅花詩乃言玉奴終不負東昏何耶按南史東昏妃潘玉児當是筆悞尓韓退之詩曰離騷二十五王逸序天問亦曰屈原凢二十五篇今楚詞所載二十三篇而已豈非并, WYG: ''}
