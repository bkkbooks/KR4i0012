  - {type: variant, offset: 4441, length: 1955, content: 玉所作非屈原也今楚詞之目雖以是篇併注屈原宋玉然九辨之序止稱屈原弟子宋玉所作大招雖疑原文而或者謂景差作若以宋玉痛屈原而作九辨則招魂亦當在屈原所著之數當為二十六矣不知退之王逸之言何所㩀耶杜子羙栢中允除官制詩舊註以為栢耆又以為正節按杜詩云紛然䘮亂際見此忠義門蜀中㓂亦甚栢氏功彌存三止錦江沸獨清玉壘昏當是有功扵蜀者方是時叚子璋反扵上元徐知道反扵寳應而正節為卭州刺史數有功則是正節無疑矣杜集又有栢學士茅屋栢大兄弟山居詩議者皆以謂正節之居然詩中殊不及功名之事但皆稱其為學讀書尔茅屋云古人巳用三冬足年少今開萬卷餘山居云山居精典籍文雅渉風騷疑是卭州立功之前丹陽集黄魯直詩云世有捧心學取笑如東施梅聖俞云曲眉不想西家様餒腹還須二子清太平寰宇記載西施事云施其姓也是時有東施家西施家故李太白效古云自古有秀色西施與東鄰而東坡代人留别詩乃云綘蠟燒殘玉斚飛離歌唱徹萬行啼他年一舸鴟夷子應記儂家舊姓西似與寰宇記所言不同豈為韻所牽耶同上張無盡嘗和山字云安得將相似仲山人疑之以近人所常用皆山甫也觀後漢志陽樊攅茅田服䖍注云楚仲山所居又楊脩荅臨淄侯牋云仲山周旦之儔只稱仲山何疑之有黄常明坡記王凌過賈逵廟呼曰賈梁道我大魏之忠臣也及司馬景王病夢逵為崇因為詩曰嵇紹似康為有子郄超畔鍳似無孫如今更恨賈梁道不殺公閭殺子元盖怪梁道忠義之靈不能自巳其子充之惡按晋紀王賈所殺者乃宣帝名懿字仲達非景帝子元也䂬溪正訛門天闚象緯逼雲卧衣裳冷世傳古本作天闚今從之莊子以管闚天正用此字舊集以作闕又或作關今不取盖先生詩該衆羙者不惟近體嚴扵屬對至扵古風句對者亦然觀此詩可見矣近人論詩多以不必屬對為髙古何耶故詳論之以俟知者焉杜詩正異海右此亭古濟南名士多濟南實海右諸郡舊集一作海右今從之正文作海内非也拂天萬乗動觀水百丈湫拂字従一作兼畫馬詩有云翠華拂天來向東正文作沸非也君臣留歡娯樂動殷嶱嵑殷從上聲嶱嵑出文選音渇曷集韻山貌舊集作殷湯嶱音字皆悞盖縁湯字之訛二字從而倒之兼他詩二字悞倒之者非一豈知秋禾登貧窶有倉卒别本禾字一作未今從之按此詩十一月作禾字明矣昌黎謂年登而妻啼飢實此意也隂風西北來慘淡隨回紇紇字從一作鶻唐史徳宗朝始改名回鶻正文非也中興諸將収山東捷書夜報清晝同夜字從王介甫謂捷書晝夜至也舊作日今不取花門天驕子飽肉氣勇决諸詩之言花門者皆回紇也舊集作北門盖由字畫小誤唐以太原為北門非謂回紇明矣卒章申言花門也渡河不用船千騎常撇捩撇捩疾貌大食刀歌云鬼物撇捩辭沆壕字意皆同今從之舊集作撇烈非也嬋娟碧蘚静蕭摵寒籜聚蘚字従别本舊集作鮮盖字畫小缺而釋者因云嬋娟碧蘚皆謂竹也尤謬長夜苦寒誰獨悲杜陵野老骨欲折此成都詩舊集作長安非也其夜字之訛故悞作安耳况卒章之意明甚南京亂初定所向色枯槁色字従别本他詩亦云朝野色枯槁正文作邑今不取樹枝有鳥亂棲時瞑色無人獨歸客棲字従一作正文作鳴今不取言亂棲則鳴可知矣高皇亦明王魂魄猶正直皇字舊集諸本皆作堂近見别本作皇今従之乃與上下數聮詩意相貫也詢之閬人其漢高祠廟今尚存焉别離重相逢偶然豈足期足字舊集作定盖由字畫小訛况上句巳云泄雲無定姿悲䑓蕭颯石巃嵸哀壑􅒎枒浪呼洶浪字作别本考两句属對之二當用一實字又别本下句作二鶯猛胸絛徐墜字亦未通主守問家臣分朋見溪畔耘者必分朋曹而進故東坡逺景樓記謂耘者畢出數百人為曹者是也舊作明乃字小訛耳風吹巨熖作河漢騰烟柱諸本下句作何掉騰烟柱蜀本何作河近見別夲今從之盖扵詞意通也合昏排鐡騎清曉散錦幪幪字他詩有云駑駘怯錦幪乃覆馬之物正文作􅐒非也大火運金氣荆揚不知秋火字從一作謂大火西流七月詩也正文作暑今不取終然契真如得匪金仙術二句並從一作正文作終契如徃還得匪合仙術今不取㡬度寄書白塩北故人贈我青絲裘絲字從一作縑别本正文止作絲字此詩寄裴施州者或謂裴冕非也按唐史冕以寳應元年貶施州刺史不數月移澧州距此巳六年矣配極玄都閟慿高禁籞長籞字舊集諸本皆作蘌按西漢宣帝紀云池籞者其字從竹今従之尸郷餘土室誰話呪雞翁誰話從事見列仙傳正文作雞說乃字之訛也咒字一作喌音州又音祝茂樹行相引連山望忽開茂字連山字皆從一作時歸鳯翔行在正文連山作連峰非也霧樹亦然掖垣竹埤梧十㝷洞門對霤常隂隂霤字從别本文選云二堂對霤此春深詩也而諸本作雪悞矣江上小堂巢翡翠苑邉高塜卧麒麟苑字從一作正文作花盖字畫小訛而說者云一詩連用三花字不害為工誤矣雲㫁岳蓮臨大路天晴宫柳暗長春大路陜華間地名也晋書檀道濟從劉𥙿伐姚泓至潼關姚鸞屯大路以絶道濟粮道而蜀本正作大道誤矣馬嬌朱汗落胡舞白題斜朱汗巳見他詩舊作珠乃衍文也白題從一作西漢云斬胡白題將字義與雕題同正文作蹄非也力疾坐清曉來詩悲早春詩字從别本考詩題與上下句意當從之舊作時非也峽雲籠樹小湖日蕩船明蕩字従一作非乆㳺江湖者不知此字之工正文作落盖字訛也合觀却笑千年事驅石何時到海東題云觀造竹橋即日成句中合觀字謂聚觀橋成之速而笑驅石之誕舊集諸本皆訛作歡非也百家詩話總龜卷之十八, WYG: 阮閱撰}
