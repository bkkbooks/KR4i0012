  - {type: variant, offset: 2349, length: 2544, content: 後集卷之四十癸集舒城阮一閱編皇明宗室月䆫道人刋鄱陽程珖校神仙門陳東靖康間嘗飲於京師酒樓有倡打坐而歌者東不願乃去倚欄獨立歌望江南詞音調清越東不覺傾听視其衣服皆故弊時以手掲衣爬搔肌膚綽約如雪乃復呼使前再歌之其詞曰䦨干曲紅颺綉簾旌花嫩不禁纎手捻𬒳風吹去意還驚眉黛蹙山青鏗鉄板閑引歩虚聲塵世無人知此曲却騎黄鶴上瑶京風冷月華清東問何人製曰上清蔡真人詞也歌罷得數錢下樓亟遣僕追之巳失矣岀夷堅志心事数莖白髮生涯一片青山空林有雪相待野路無人自還李主好書神仙隱遁之詞豈非遭罹多故𣣔脫世網而不得者邪東坡葛稚川神仙傳載王方平麻姑降蔡經家方平謂曰不見姑巳百年矣擘麟脯行酒而蔡經竊視麻姑手如鳥爪心念曰背蛘時正可爬背方任念而方平巳知責經曰麻姑神人汝何忽謂其手可爬背於是鞭經背皇祐中江西有一事正類此或題麻姑壇記以嘲之曰五百年来別恨多東征重得見青蛾擘麟方擬窮歡喜不禁閑人背痒何隱居詩話劉跛子者青州人也拄一拐毎歲必一至洛中㸔花舘范家园春盡即還京師爲人談噱有味范家子弟多狎戯之有大范者見之即與二十四金曰跛子喫半角小范者即與十金喫椀羮於是以詩謝伯仲曰大范見時二十四小范見時喫椀羮人生四海皆兄弟酒肉林中過一生張丞相召自荆湖時跛子與客飲市橋客聞車騎甚盛起觀之跛子挽其衣使且飲作詩曰遷客湖湘召赴京輪蹄迎送一何荣争如與子市橋飲且免人間寵辱驚陳莹中甚愛之作長短句贈之曰槁木形骸浮雲身世一年兩到京華人還乗興閑㸔洛陽芲聞道鞓紅最好春歸後終委泥沙忘言處花開花謝不似我生涯年華晋不住飢飱困寢觸䖏爲家這一輪明月本自無瑕隨分冬裘夏葛都不㑹赤水黄芽誰知我春風一拐談笑有丹砂余政和春見於興國以詩戯之曰相逢一拐大梁間妙語時時見一班我欲從公蓬島去爛銀坑裏㸔青山予姻家許中復之内乃趙槩叅政之孫云我十許時見刘跛子来覔酒飲笑語而去計其壽百四五十許嘗書于京師新門張婆店三十年日坐相國寺東書邸中人無識之者冷齋夜話范致虚居方城有髙士舘於家自言昔乃白髮社翁遇師授以神藥今年踰下夀顔渥如丹有孺子色旣乆歸晋一絶末句云莫訝杖藜歸去早舊山閑却一溪雲西清詩話賣墨者潘谷余不識其人然聞其所爲非市井人也墨既精妙而價不二士或不持錢求墨不計夛少與之此豈徒然者㢤余嘗與詩云一朝入海㝷李白空㸔人間盡墨仙一日忽取欠墨錢劵焚之飲酒三日發狂浪走遂赴井死人下視之盖趺坐井中手尚持数殊也見張元明說如此東坡近有人逰羅浮晋一宿岩谷間中夜見一人身無衣而紺毛覆躰意必仙也乃再拜問道其人了不頋但長嘨数聲响振林木歌詩云雲来萬嶺動雲去天一色長嘯两三聲空山秋月白西清詩話張亶熈寕中夣行人入空中聞天風海濤聲振林木徐見海中樓闕金碧瓊琚琅珮者数百人揖亶出𥿄請賦詩細視筆硯皆碧玉色且戒之曰此間文章要似隱起鵉鳯當與織女機杼分巧過是乃人間語耳亶成一絶句云天風吹散赤城霞染出連雲萬樹花誤入醉郷迷去路傍人應笑忘還家有仙人曰子詩佳絶未免近凡酌酒一盃極甘寒忽覺身墮萬仭山而寤同上䖍州布衣頼仙芝言運州有黄損僕射者五代時人僕射盖事南漢未老退歸一日忽遁去莫知其存亡子孫畫像事之凢三十二年復歸坐阼階上呼家人其子適不在孫出見之索筆書壁上云一别人間歲月多歸来人事巳消磨惟有門前鑑池水春風不改舊時波投筆竟去不復晋子歸問其狀貌孫云甚似影堂老人也無異相傳如此後頗進仕者東坡太學体逺齋饒州一士人遇逰道士道士本里人化去巳多年一日来客位相訪約士人請假歸齋假簿中有詩一絶乃道士所書也詩云相別来来一百秋幻泡重作故人逰紫泥白雪㝷常事何苦人間詩不休今是堂手録鍾弱翁帥平凉一方士通謁從牧童牽黄犢立扵庭下弱翁異之指牧童曰道人頗能賦此乎笑曰不煩我語是児能之牧童乃操筆大書云草鋪横野六七里笛弄晚風三四聲歸来飽飰黄昏後不脫蓑衣卧月明旣去郡人見方士担兩大甕長歌出郭迹之不見两甕乃二口豈洞賔耶西清詩話回先生過湖州東林沈氏飲醉以石橊書其家東老庵之壁云西鄰已富憂不足東老雖貧樂有餘白酒醸来縁好客黄金散尽為收書東老沈氏之老自謂也余次其韻云世俗何知貧是病神仙可學道之餘但知白酒晋佳客不問黄公覔素書符離道士辰興際華岳先生尸觧餘忽見黄庭丹篆句猶傳青𥿄小朱書凄凉雨露三年後彷彿塵埃数字餘至用橊皮縁底事中書君豈不中書山谷云秋風吹渭水落葉滿長安黄塵車馬道独清閑自然炉鼎虎繞與龍盤九轉丹砂就琴心三叠蕋珠㸔舞胎仙便萬釘寳帶貂蟬冨貴欲熏天黄粮炊未熟夣驚殘是非海㡳直道作人難䄂手江南去白蘋紅蓼再逰湓浦廬山徃三年有人書此曲於州東茶园酒肆之柱間或爱其文指趣而不能歌也中間樂工或按而歌之輒以俚語竄語睟然有市井氣不類神仙中人語也十年前有醉道士歌此曲廣陵市上童児和之乃合其故時語此道士去後乃以物色迹之知其爲吕洞賔也苕溪漁隱曰近時呉江長橋垂虹亭屋山壁上草書一詞人亦以爲吕仙作其果然耶詞曰蜚梁欹水虹影清光暁橘里漁郷半烟草㸔来今徃古物是人非天地裏惟有江山不老雨衣風㡌四海誰知道一劍横空幾畨到按玉龍嘶未断月冷波寒埽去也琳宇洞天無鏁指雲屏烟嶂是吾廬但滿地蒼苔年年不掃東坡知制誥李大臨西川人有門人背傴不能仰視因以薬市罷見一道士云秀才有錢丐一二百爲酒資書生云家貧無錢所居有薄醸同一醉可乎道士欣然便徃酒半道士問何故背傴書生言不幸遇此疾無如之何道士因出藥三十粒云来日五更面東以新汲水下覺㣲燥不足怪書生如所教旣服薬燥甚不可勝展轉於塌上亦甚悔之然毎一伸縮漸斍舒快比明身巳直矣蜀人重藥市盖常有神仙之遇焉文昌雜録予治平末泝峽還蜀泊舟仙都山下有道士以隂真君長生金丹訣石本相示予問之曰子知金丹訣邪道士曰不知也然士大夫過此必以問之庶有知之者予佳其意試問以燒煉事對曰飬生有内外精氣内也非金石所能堅凝四支百骸外也非精氣所能変化欲事内必調飬精氣極而後内丹成則不能死也然隱居人間乆或托尸觧而去求変化輕舉不可得也盖四大本外物和合而成非精所能易也惟外成然後可以點瓦䃯化皮骨飛行無碍矣然内丹未成内無以交之則服外丹者多死譬積枯草弊絮而置火其下無不焚者予甚善其說告之曰昔人有服金丹不幸赴井而死既而五臓皆化爲黄金者又有服玉屑死於盛夏而尸不敗壊者皆無内丹以主之也子之說信然㢤後十餘年官于南京張公安道家有一道人陜人也爲公飬金丹其法用紫金丹砂費数百千朞年乃成公喜告予曰吾藥成可服矣予謂公何以知其薬成公曰抱朴子言薬旣成以手握之如泥出指間者薬真成也今吾藥如是以是知其成無疑也予爲公道仙都所聞謂公曰公自知内丹成則此藥可服若猶未也姑俟之若何公笑曰我姑俟之龍川畧志百家詩話緫龜後集卷之四十, WYG: 巻}
