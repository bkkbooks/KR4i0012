  - {type: variant, offset: 6443, length: 414, content: 藉槎上似張騫又秋興詩曰奉使虚隨八月槎如此類前賢多用之恐非實亊杜子羙詩喜用文選語故宗武亦習之不置所謂熟精文選理休覔綵衣輕又云呼婢取酒壼續児誦文選是也唐朝有文選學而時君尤見欽重分别夲以賜金城書絹素以属裴行儉是也外史檮杌載鄣奕嘗以文選教其于其兄曰何不教讀論語免學沈謝嘲風弄月汚人行止鄭兄之言盖欲先徳行而後文藝亦不爲無理也丹陽集雪浪齋日記云昔人有言文選爛秀才半正爲文選中亊多可作本領爾余謂欲知文章之要當熱㸔文選盖選中自三代涉戰囯秦漢晋魏六朝以来文字皆有在古則渾厚在近則華䴡也苕溪漁隱曰少陵宗武生日詩孰精文選理盖為是也詩話乃云質之少陵昔逰詩昔者與李同登單父䑓則知非吹䑓三人能詞宗果登吹䑓豈無雄詞傑唱著后世邪予竊哂其弗細考前詩而妄為云云故具載之以顯其誤也苕溪漁隱曰學者欲慱讀異書余謂退之之進學觧云上規姚娰渾渾無涯周誥湯盤詰屈聱牙春秋謹嚴左氏浮誇易竒而法詩正而葩下逮莊騷太史所録子雲相如同工異曲若只讀此足矣何必多嗜異書百家詩話緫亀後集卷之八終, WYG: 閱撰}
