  - {type: variant, offset: 5063, length: 1379, content: 魏之間謂簟為笙欵乃一聲山水緑乃楚人歌聲臨川窓明兩不借楚人以草屦為不借東坡倦㸔澁勒暗蛮村盖嶺南竹名艾蓬沓障前赱風雨注云於潜媍人皆挿大銀􅌨謂之蓬沓又㡬思壓茅柴禁烟日夜急山谷燕􅊜社公雨鶯啼花信風皆方言也黄常明江漢有滸以扞制泛濫大漲則溢扵平陸水退滸見舟人謂之水落糟又灘石湍激其中深僅可容舟者謂之洪若大水則不復問洪矣臨川萬里寒江正復糟東江水落水分洪以此亦謂水黄㡌謂雲砲車非遐征逺渉不能知也同上柳讀書篇瘴疴擾灵府曰與徃昔殊臨文乍了了徹卷元若無盖常荅許京兆書云徃時讀書不至底滯今毎讀一傳再三伸卷復觀姓氏在宗元則為瘴疴所擾它人乃公患也同上東坡云東来賈客木綿裘飲散金山月滿楼夜半潮来風又熱卧吹簘管到楊州集中題云夣中作盖坡嘗衣此坐客誤云木綿襖俗飲散乃出此詩且云雖欲不可得也坐客大慙賈客事乃南史孔覬二弟頗营産業請假東還覬出渚迎之輜重二十餘舩皆綿絹𥿄席之属覬僞喜命且置岸側旣而正色謂曰汝軰沗預士流何至還東作賈客邪命燒盡乃去䂬溪家家飬烏鬼沈存中以為鸕鷀說者謂非也元微之詩云病飬烏稱鬼巫占瓦代龜自注云南人染病競賽烏鬼楚巫列肆兢賣瓦卜此乃戯效俳体二首其二亦云瓦卜傳神語皆是處方言則烏鬼非鸕鷀不疑矣書史蓄胸中而氣味入於冠𥚑山川歴目前而英靈助於文字太史公南逰北渉信非徒然觀老杜壯㳺云東下姑蘇䑓已具浮海航到今有遺恨不得窮扶桑劍池石壁仄長洲芰荷香嵯峨閶門北清廟映池塘越女天下白鑑湖五月􅋽剡溪藴秀異欲罷不能忘歸㠶拂天姥中歲貴舊郷放蕩齊趙間西歸到咸陽其豪氣逸韵可以想見序太白集者称其隱岷山居㐮溪南逰江淮觀雲夣去之齊魯之呉之梁北抵趙魏燕晋西徙邠岐從金陵上㝷陽流夜郎泛洞庭上巫峽白自序亦曰偶乗扁舟一日千里或遇勝景終年不移其恣横採覽非其狂也使二公隱坐中書何以垂不朽如此㢤燕公得助扵江山鄭綮謂相府非㶚橋那得詩思非虚語也學林新編云世傳織女嫁牽牛渡河相㑹某按史記晋天文志河鼓星在織女牽牛二星之間世俗因傳㑹為度河之說媟瀆上象無所根㩀淮南子云烏鵲填河成橋而渡織女荆楚歲時記云七夕河漢間弈弈有光景以此為候是牛女相遇也其說皆怪誕不足信子羙牽牛織女詩曰牽牛出河西織女處其東萬古永相望七夕誰見同神光意難候此亊終朦朦觀子羙詩意不取世俗說也七夕乞巧見扵周處風土記乃後人編類成書大抵𥘉無稽考不足信者多矣侯鯖録云東坡作雪詩云凍合玉楼寒起栗光摇銀海眩生花後見荆公云道家以兩肩為玉楼目為銀海是使此事否坡退曰惟荆公知此出處苕溪漁隱曰緗素雜記學林新編二家辨證乗槎亊大同小異余今采摭其有理者共爲一說按張茂先博物志曰舊說天河與海通近世有人居海上者每年八月見浮槎来不失期齎一年粮乗之而去十餘日中猶觀星月日辰自後茫茫亦不覺晝夜奄至一處有城郭屋舎甚嚴遥望宫中有婦人織見丈夫牽牛渚次飲之驚問曰何由至此其人銳以来意并問此是何処荅曰君至蜀郡訪嚴君平則知之因還後以問君平君平曰某年月日有客星犯牽牛宿計年月正是此人到天河時也所載止此而巳而荆楚歲時記直曰張華慱物志云漢武帝令張騫窮河源乗桴經月而去一處見城郭如官府室内有一女織又見一丈夫牽牛飲河騫門云此是何處荅曰可問嚴君平織女取機榰石與騫而還後至蜀問君平君平曰某年月日客星犯牛斗所得榰機石為東方朔所識亦其証焉按騫本傳及大宛傳騫以郎應募使月氏為匈奴所晋十餘歲得還騫身所至者大宛大月氏火夏康居而傳聞其旁大國五六具為天子言其地形所有並無乗槎至天河之說而宗懔乃傳㑹以為武帝張騫之亊又益以榰機石之說何邪子羙蘷府詠懐詩曰途中非, WYG: ''}
