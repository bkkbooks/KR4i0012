  - {type: variant, offset: 0, length: 2733, content: 増修詩話總龜卷之三十道僧門道士沈廷瑞彬之子也性坦率直造縣宰之坐宰方治訟而廷瑞至宰戯之曰沈道士何時成道廷瑞應聲曰何須問我道成時紫府清都自有期手握藥苗人不識體含仙骨俗争知宰慙江南野録呉崇岳泉州人也爲龍興觀道士辟榖多年常登其宫松梢禮拜㨿松枝可六七十尺福建漕使周謂因請隨行抵于德化縣縣治之東有古松一株高八九十尺上有鶴巢乃命崇岳登之宛若猿狖容易直上出鶴巢之外端身飛歩手無攀縁就纎枝拜如平地其松枝柔軟隨歩低昻略無損處周謂乃爲詩贈云楮為冠子布為裳吞得丹霞夀最長混俗性靈常樂道出塵風格早休糧枕中經妙誰傳與肘後方新自寫將百尺松梢㡬飛歩鶴棲枝上禮虚皇太平興國中詔入郡閣雅談楚郎中失其名宦逰江東泊金陵岸下子弟軰逰茆山見一老僧住一小庵謂諸子曰何所至此告以因逰賞林泉而來日晚欲丐宿可乎僧曰舎陋不可相容此二三里有寺可宿因指諸子令徃抵寺巳暮矣寺僧問誰指來諸子曰山下老僧寺僧曰聞此有老僧甚乆未之見也凌晨徃則庵中巳無人惟松上有詩云數株松檜食不盡一沼芰荷衣有餘剛𬒳傍人相問當老僧今日又遷居摭遺僧無夣嘗在府畿村落中求化手持大木牌題詩二絶曰心為車兮身為軾車動軾随何意息交梨火棗是誰無自是不為荆與棘身為客兮心為主主人和平客安堵若還客主不康寜精神必定隨君去翰府名談景德中日本僧照寂入貢三司使丁晋公甚恱之晋為言姑蘇山水竒秀照寂心愛而留因止于呉門寺其徒不願從者遣數人歸本國後以黒金水瓶寄晋公并詩曰提携三五載日用不曾離曉井斟殘月春爐釋夜澌鄱銀難免侈萊石易成虧此噐堅還實寄公應可知談苑僧護國江南人也攻詞翰題醴陵玉仙觀云白雲至今凝不散星壇松殿㡬千秋徃徃笙歌生夜半瀑布西行遇石橋黄精採根還採苗路逢一人擎一椀茶花夜來風吹滿又言家住在東坡白大相逢邀我過南山石上有棊局曾使樵人爛斧柯此篇絶佳詩僧中下可得也大暦末禪僧元覧住荆州陟岵寺道高風韻人不可親章璪嘗畫松於齋壁符載賛之衞象詠之亦一時四絶覧悉加堊焉人問其故曰無事疥吾壁也僧那即其甥發瓦探壞墻薫䑕覧未甞責弟子議論而布衣一食亦不稱之或怪問之乃題詩扵竹曰大海從魚躍長空任鳥飛古今詩話沙門貫休鍾陵人精扵筆札荆州成中問其筆札法休曰此事須登壇可授安可草草而言成令䘖之乃逓於黔中因為病鶴詩見意曰見說氣清邪不入不知爾病自何來同前唐昭宗以錢武肅平董昌功拜鎮東軍節度使自稱呉越國王貫休投詩曰貴逼身来不自由㡬年勤苦蹈林丘滿堂花醉三千客一劍霜寒十四州萊子衣裳宫錦窄謝公篇詠綺霞羞他年名上凌烟閣豈羡當時萬户侯武肅愛其詩遣諭令改為四十州乃可相見貫休性𥚹答曰州亦難添詩亦難改閑雲孤鶴何天不可飛遂入蜀以詩投孟知祥詩云一瓶一鉢垂垂老萬水千山得得來古今詩話温州鴈蕩山自古圖史不載按西域書云諾矩羅居震旦東南大海祭鴈蕩山芙蓉龍湫唐貫休作賛云鴈蕩經行雲漠漠龍湫宴坐雨濛濛北山南山有芙蓉峰下有芙蓉驛前瞰大海山頂有大池相傳以為鴈蕩有二潭以為龍湫又有經行䑓宴坐峰皆以貫休詩得名也唐大興善寺東廊之南有僧不出院轉法華經三萬七千部夜常有狐子來聴長慶初庭前有牡丹一朶合歡僧幽之詩曰三萬蓮經三十春平生不踏院門塵杜牧之弱冠登第再中制科因與二三同年城南逰覧至丈六寺有禪僧擁褐坐與之語可佳問杜姓名具以對又曰脩何業傍人以累捷誇之笑曰皆不知也牧之嘆訝乆之作詩云家住城南杜曲旁两枝仙桂一時芳老僧都未知名姓始覺空門氣味長蜀僧遠國傷蜀詩曰樂極悲來數有涯歌聲纔歇便興嗟牽羊廢主㝷傾國逐鹿奸臣盡䘮家丹禁夜凉空鎻月後庭春老謾開花两朝基業都成夣林木蒼蒼噪暮鴉南方浮屠能詩者多矣徃徃多不顯其名福州有一僧作詩百餘篇其中佳句有云虹收千嶂雨潮展半江天又有詩云詩因試客分題僻棋為饒人下子低不减於古人也閩僧懐濬有詩二絶云家在閩山東復東其中歲歲有花紅而今再到花紅䖏花在舊時紅處紅家在閩山西復西其中歲歲有鶯啼而今再到鶯啼處鶯在舊時啼處啼人多誦之大暦中澤潞間有僧號普滿或歌或咲言事多驗建中初潞州佛寺題詩一首而去詩曰此水連涇水雙珠血滿川青牛將赤虎方號太平年此水泚字涇水自涇川兵亂雙珠滔泚也青牛興元二年乙丑赤虎是歳改元元年丙寅是年賊平陳文惠赴端州􅋈舟廬陵有胡僧叩舷謂公曰虎目鳯鼻猿身平地不能為也當有攀附然後有所食位極卿相僧為詩一絶曰虎目猿身形最貴須因攀附即升高知公今向端溪去助子清風泛怒濤公後登庸青瑣集廬山佛手巖在絶頂李氏有國日行因禪師居焉李氏詔居棲賢寺未㡬一夕大雪迯居舊隱嘗煑茶延僧起托巖扉立化余作偈曰前朝詔住棲賢寺雪夜迯居岩石間想見煑茶延客處直縁生死不相關東呉僧道潜經臨平作詩云風蒲獵獵弄輕桑欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲東坡見之大稱賞及坡守徐潜訪之館扵逍遥堂士大夫欲識之坡饌客罷俱而來坡遣一妓乞詩詩曰寄語巫山窈窕娘好將魂夣惱㐮王禪心巳作沾泥絮不逐春風上下狂一座大驚然性偏憎凡子作詩云去歲春風上苑行爛窺紅紫厭平生如今眼底無姚魏浪蕋浮花懶問名士論少之其作詩追法淵明有逼真處如曰數聲柔櫓滄浪外何處江村人夜歸是也冷齋夜話西湖僧順怡然清苦賦十竹詩城中寸土如寸金幽軒種竹只十箇春風慎勿長児孫穿我堦前緑苔破林下詩云乆服林下逰頗識林下趣從渠緑隂繁不碍清風度閑來石上眠落葉不知數山鳥忽飛來啼破幽寂處荊公愛之陳瑩中謫合浦以書抵余為負華嚴經入嶺有偈曰大士㳺方興盡回家山風月絶纎埃杖頭多少閑田地挑取華嚴入嶺來余和之曰因法相逢一笑開俯看人世過飛埃湘南嶺内休分别圓寂光中共徃來聞嶺外大雪作二偈寄之曰傳聞嶺外雪壓倒千年樹老児拊手笑有眼未曾覩故應潤物材一洗瘴江霧寄語牧牛人莫教頭角露又曰偏界不曾藏處處光皎皎開眼失蹤由都縁太分暁園外忽生春萬瓦粲一笑遥知忍凍人未悟安心了静禪師渡溪為漲流所䧟童子掖至㟁坐沙石間垂頭如雨鶴忽指溪作詩曰春天一夜雨霶𩃱添得溪流意氣多剛把山僧推倒却不知到海復如何後無疾而化余夜夣逢一道士一奴負酒瓢隨之道士邀余坐茗坊奴竊飲瓢無有乃笑道士詬欲杖之顧奴曰汝從覺範求詩曰難藏為香釁易滿坐徧小開口所有竭饞奴法當笑句句皆譏其𥚹可怪也璉禪師工詩舒王以其詩示歐公公曰此道人肝臟饅頭是中無一點菜氣仁廟留住净因禪院作偈進乞還山林曰千簇雲山萬壑流閑身歸老此峰頭殷勤願祝如天夀一炷清香滿石樓又曰堯仁况是如天闊乞與孤雲自在飛桂林僧景淳工詩福老衲為余言淳意苦而深世不可遽解如曰夜色中旬後虚堂坐㡬更隔溪猿乍呌當檻月初生又曰後夜客來稀幽齋獨掩扉月中無事立艸際一螢飛余時方十六七心不然之筠溪快山有虎有牧童為虎逐牛捍護之竟死石門老衲文公為余言之為作詩以諷含齒𬒳髮而不義者然余徒能諷之其能巳之㢤頌曰快山山淺亦有虎時時妥尾過行路一䜿地坐牧两牯以捶捶地不知顧虎搏䜿如鷹搦兎两牛來奔虎棄去因徃疴癢挨老樹牯則喘伺同守護虎竟不得此牧䜿䜿雖不活牯無負一村囂傳共鳴皷而虎巳迯不知處嗟乎異㢤两太武高誼可與貫髙伍今走仁義名好古臨事真情乃愧汝此事可信文公語為君落筆驚風雨並同前増修詩話總龜卷之三十百家詩話總龜後集卷之三十詠茶門唐趙璘𫐠, WYG: ''}
