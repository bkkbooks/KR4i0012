  - {type: variant, offset: 2813, length: 2410, content: 後集卷之三十六怨嗟門孟郊詩云借車載家具家具少扵車借者莫弹指貧窮何足嗟可見其素窭後有詩云賔秋巳斍厚私儲常恐多是古人恐冨求㱕之義則貧亦何足怪按郊為溧陽尉縣有投金瀬平陵城林薄蓊蔚郊徃來其間曹務都廢至遣假尉代之而分其半俸則安得有私儲㢤退之贈郊詩云陋室有文史高門有笙竽何能辯荣辱且欲分賢愚盖言貧者文史之樂賢扵冨者笙竽之樂也葛立之司馬迁㳺江淮汶泗之境紬金匱石室之書而作史記上下數千年殆如目覩可謂孤㧞𥘉遭李陵之旤不肯引决而甘腐刑者實欲效離騷吕覧說難之書以攄憤悱故荆公詩云嗟子刀鋸間悠然止而食成書與後世憤悱聊自釋觀史記評賛扵范睢蔡澤則曰二子不困戹烏能激乎扵季布則曰彼自負才故受辱而不羞扵虞卿則曰虞卿非窮愁則不能著書以自見扵伍貟則曰隠忍以就功名至扵作貨殖㳺俠二傳則以家貧不能自贖左右親戚不為一言而寄意焉則荆公釋憤悱之言非虚發也韵語陽秋晨牝妖鴟索家生亂自古而然故夏姫亂陳費無極亂楚李義山咏北齊云小憐玉体横陳夜已報周師入晋陽東坡城都畫手開十眉横雲却月争新竒㳺人指点小顰処中有漁陽胡馬嘶熟味此詩則呉人何苦怨西施豈足稱詠史㢤等而下之凡移扵尤物皆可以為戒黄常明杜牧張祜皆有春申君絶句杜云烈士思酧國士恩春申誰與快冤魂三千賓客捴珠履欲使何人殺李园張云薄俗何心議感㤙謟容卑迹賴君門春申還道三千客寂寞無人殺李園二詩語意太相犯扵乎朱英之言義矣而春申不能必用李園之計巧矣而春申不能預防春申之客衆矣而無一人為春申殺李園者所以起二子之論也余亦嘗有二絶云朱英意在強黄歇黄歇如何弱李園一旦棘門竒􅍔作自貽伊戚向誰論又先秦豈謂嬴爲吕東晋那知馬作牛不悟春申亦如許敢慿宮掖妻邪謀同上唐淄青李師道倚蔡爲重稱兵不軌洎蔡平師道乃始震悸憲宗􅒛削其官詔諸軍進討扵是六莭度之兵興矣故劉夣得嘗爲天齊行二萹以快李師道之死夫師道猖獗狂悸反噬其主人怨神怒豈能居覆載之中乎故夣得云牙門大将有劉生夜半射落攙搶星又云太山沉㓂六十年旅祭不饗生愁烟今逢聖君𣣔封禅神使隂兵來助戰夫刘悟本軍之將也力爲師道屯陽榖以當魏慱乃倒戈以攻其主太山本土之神也冝福其地而乃以隂兵助敵則人怨神怒可知矣将叛其君神叛其主豈非以此始者以此終乎天之所報速矣同上杜子羙身遭離乱復迫衣食足迹㡬半天下自少時逰蘇及越以至作諌官奔赱州縣旣皆載壮逰詩矣其後贈韋左丞詩云今欲東入海即将西去秦則自長安之齊魯也贈李白詩云亦有梁宋逰方期拾瑶草則自東都之梁宋也發同谷縣云賢有不黔突聖有不煖席姑來玆山中休駕喜地僻柰何物迫累一歲四行役則自隴右之劍南也留别章使君云終作適荆蠻安排用荘叟隨雲拜東皇挂席上南斗則自蜀之荆楚也夫士人旣無常産為飢所驅豈免仰給扵人則奔赱道途亦理之常爾王建云一年十二月強半馬上㸔貟缺百年歡樂能㡬何在家見少行見多不縁衣食相驅遣此身誰願長奔波李頎亦云男児在世無産業行子出門如轉蓬皆爲此也同上陶渊明乞食詩云飢來驅我去不知竟何之而継之以感子漂母惠愧我韓才非則求而有獲者也杜子美上水遣懐云驅馳四海内童稚曰糊口而継之以但遇新少年少逄舊知友則求而無所得者也山谷貧楽齋詩云飢耒或乞食有道無不可過青草湖云我雖貧至骨尤勝杜陵老憶昔上岳陽一飯徔人討由是論之則杜之貧甚於陶如山谷之貧尚優於杜也同上老杜避亂秦蜀衣食不足不免求給於人如贈髙彭州云百年巳過半秋至轉飢寒為問彭州牧何時救急難客夜詩云計拙無衣食途穷仗友生老妻書数𥿄應悉未歸情狂夫詩云厚禄故人書断絶常飢稚子色凄凉荅裴道州詩云露名但䝉寒温問泛爱不救溝􅊤辱蕳韋十詩云因知貧病人湏弃能使韋郎迹也踈觀此五詩可見其艱窘而有望扵朋友故舊也然當時能期之者幾何人㢤劉長卿云世情薄恩義俗態輕穷厄山谷云持飢望路人誰能顔色温余扵子羙亦云葛常之李翶賦衆囂嚻而雜処咸歎老而嗟卑頋予心獨不怨兮慮行道之猶非文忠常稱之觀老杜漢隂有鹿門滄海有灵槎焉能學衆口咄咄空咨嗟正同此意同上樂天謫潯陽寄左降詩云殘灯無熖影幢幢此夕聞君得九江垂死病中驚起坐暗風吹雨入寒窓白謂此句他人尚不可聞况㒒心㢤至今毎吟猶惻惻耳復貽三韵云憶昔封書與君夜金銮殿後欲明天今夜封書在何處庐山庵裏曉灯前去來乃士之常二公不應如此戚戚也子瞻送文與可云奪官遣去不自斍曉梳脱髮誰能收推之前詩厥論尚矣然居易荅元書以三太為報且云可以樂之終身者悲歎之語恐特傷離索耳䂬溪詩有人之情性也非強諌争扵庭怨詈扵道怒隣詈坐之所為也余謂怨隣詈坐固非詩本指若小弁親親未嘗無怨何人斯取彼譛人投卑豺虎未嘗不憤謂不可諌争則又甚矣箴規刺誨何為而古者帝王尚許百工各执藝事以諌詩獨不得與工技等㢤故譎諌而不斥者惟風為然如雅云匪面命之言提其耳彼童而角實訌小子憂心慘慘念國之為虐乱匪降自天生自媍人忠臣義士𣣔正君㝎國惟恐所陳不激切豈盡優柔婉媚乎故樂天寄唐生詩云萹萹無空文句句必盡規子建稱孔北海文章多雜以嘲戯子羙亦戯效俳諧体退之亦有寄詩雜談俳不獨文舉為然自東方生而下祢處士張長史顔延年軰徃徃多滑稽語大抵才力豪邁有餘而用之不盡自然如此韓詩濁醪沸入口口角如衘箝試以詩義授如以肉貫串𥘉食不下喉近亦能稍稍皆謔語也坡類集此不可勝數寄蘄簟與蒲傳正云東坡病叟長覉旅凍飢餓吟似飢䑕倚頼東風先破衾一夜雪寒披故絮黄州云自慚無𥙷絲毫事尚費官家壓酒囊将之湖州云呉児膾薄薄欲飛未去先說饞涎垂又㝷花不論命爱雪長忍凍天公非不怜听飽即喧閧食筍云紛然生喜怒似𬒳狙公賣種茶云飢寒未巳免巳作大飽計平生五千卷一字不救飢寒來凭空按一字不可煮皆斡旋其語而弄之信恢刃有餘與血指汗顔者異矣黄常明詩眼云山谷常言少時曽誦薛能詩云青春背我堂堂去白髮欺人故故生孫莘老問云此何人詩對曰老杜莘老云杜詩不如此後山谷語傳師云庭堅因莘老之言遂曉老杜詩髙雅大体傳師云若薛能詩正俗所謂歎世耳後湖集云余毎讀蘇州漠漠帆来重冥冥烏去遲之語未嘗不茫然而思喟然而歎嗟乎此余晚泊江西十年前夣耳自余犇竄南北山行水宿所歴佳處固多欲求此夣了不可得豈蒹葭莾蒼無三湘七澤之壮雪蓬烟艇無風檣陣馬之竒乎抑吾且老矣壮懐銷落塵土坌没而無少日烟霞之想也慶長筆端丘壑固自不凡當為余圖蘇州之句扵壁使余隠几静對神逰八極之表耳百家詩話総龜卷之三十六, WYG: 巻}
