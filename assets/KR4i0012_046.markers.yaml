  - {type: variant, offset: 3437, length: 1897, content: 後集卷之四十六釋氏門韋應物奉詶處士叔詩云髙齋樂宴罷清夜道相存東坡次王鞏韻云那能廢詩酒亦未妨禪寂子由春盡詩云楞嚴十卷㡬廽讀法酒三升是客同道貴冲寂寞主歡暢二者恐不能相兼也白樂天延樂命釂之時不忘於佛事至今逹者譏之葛常之衡州花光仁老以墨為梅花魯直觀之嘆曰如嫩寒春曉行孤山籬落間但欠香耳余因爲賦長短句曰碧瓦籠晴香霧繞水殿西偏小駐聞啼鳥風度女墙吹語笑南枝破臘應開了道骨不凢江瘴曉春色通靈醫得花多少抱甕醸寒春杳杳譙門畫角催殘照又曰入骨風流國色透塵種性真香爲誰風鬂涴啼粧半樹水村春暗雪壓低枝籬落月髙影動池塘髙情数筆寄㣲茫小寢𥘉開霧帳前蝶恋花后西江月也冷齋夜話余自并州還故里舘延福寺寺前小溪風物類斜川余兒童時戲劇之地也嘗春深獨行溪上作小詩曰小溪倚春漲攘我夜月湾新晴爲不平約束晚見還銀梭時撥刺破碎波中山整釣背落日一葉嫩紅間又嘗莫寒㱕見白鳥作詩曰剰水殘山慘淡間白鷗無事小舟閑個中著我添圗畫便是華亭落照湾魯直曰觀君詩說烟波漂渺處如陸忠州論國政字字坦夷前身非篙師沙户種類邪有詩其畧云吾年六十子方半槁項顛螺度歲年脫却衲衣著蓑笠来伴涪翁刺釣船嘗對淵材誦之曰淵材曰此退之澄觀我欲收歛加冠巾換骨句也冷齋夜話余還自珠崖舘于髙安大愚山陳瑩中自台州載其家耒漳浦過九江愛廬山因家焉以書督余兼程來余以三日至湓城莹中曰自此公可禁作詩無益於事余曰敬奉敎然余児時好食肉毋使持齋余叩頭乞先飫餐肉一日母許之今日當准食肉例先吟兩詩喜吾二人死而更生何如莹中許焉曰鴈蕩天台看不足尽般児女寄蓬窓徃耒漳水謀二頃偶愛廬山家九江名節適真如醉白生涯領略似湘龎向耒萬事都休理且听楼鍾一夜撞與公灵鷲曽听法㳺戯人間知幾生夏口甕中蔵畫像孤山月下認歌聲翳消巳斍蔕礦尽方知珠自明数抹夕陽殘雨外一畨飛絮滿江城莹中喜而謂余曰此岐山猪肉雖羙無多食後三年余客漳水見莹中姪勝柔自九江來出詩示余曰仁者難逢思有常平居慎勿恃何妨争先世路機関悪近後語言滋味長可口物多偏作疾快心事過必為傷與其病後求良藥不若病前能自防余謂勝柔曰公痴詩如食鯽魚惟恐遭骨刺與岐山猪肉不可同日而語也泠齋夜話陳莹中謫合浦時余在長沙以書抵余為負華嚴經入嶺有偈曰大士㳺方興尽囬家山凬月絶纎埃杖頭多少閑田地挑取華嚴入嶺来余和之曰因法相逢一笑開俯㸔人世過飛埃湘南嶺外休分别圓寂光中共徃耒又聞嶺外大雪作二偈寄之曰傳聞嶺外雪壓倒千年樹老児拊手笑有眼未曽覩故應潤物材一洗瘴江霧寄語牧牛人莫教頭角露又曰偏界不曽藏處處光皎皎開眼失蹤由都縁太分曉園林怱生春萬瓦粲一笑遥知忍凍人未悟安心了冷齋夜話余觀誌公十二時頌自非深悟上乗同佛知見豈能作此語也是時逹磨猶未西耒誌以明此理所謂先得我心之所同然者誌公没扵天監十三年而逹磨以普通八年至金陵由此之魏傳佛心印禅宗方興近世學佛者徃徃忽此頌而弗觀蓋貴耳而賤目矣余嘗手書此頌置之座右朝夕味之尤爱其最後一首云雞鳴丑一顆圓珠明巳乆内外推㝷覓捴無境上施爲渾大有不見頭又無手世界壞時終不朽未了之人听一言只這如今誰動口以至二祖信心銘永嘉証道歌皆禅學之髄𥘉地之人其可弗觀乎苕溪漁隱陳体常荅黄冕仲二書叙學佛之㫖深切著明余嘗三復其言歎其有理恨未能尽行也体常又有頌六首今録二首其一云宻坐研穷有細㣲到頭湏是自忘機應無祖佛能超越豈有冤親更順違歷歴孤明猶認影巍巍獨露尚披衣飜嗟㑹得昭靈者也道㝷師㫖歸其二云個中端的有誰知知者歸來到者稀即見即聞還錯㑹離聲離色轉乖違山青水緑明玄旨鶴唳猿啼顯妙機有意覔渠終不遇無心到處盡逢伊冷齋夜話云陳瑩中北歸過南昌言鄒志完在韶州極精進閉門誦華嚴經舎利生袖間此真入信位日誦華嚴於觀音像前有脩竹三根生像之後志完掲茆出之不可乃垂枝覆像如世所畫寳陁嚴竹今猶無恙韶人扄鎻之以爲過客逰觀北還至未州淡山岩有馴狐凢貴客至則鳴志完將至而狐輒鳴寺僧出迎志完怪之僧以狐鳴爲言志完作詩曰我入幽岩亦偶然𥘉無消息與人傳馴狐戲學仙伽客一夜飛鳴報老禅苕溪漁隱余讀劉興朝悟道經真集其言曰余少治儒術長登仕版盖未嘗信佛也三十有二歲見東林長老緫公與之語七日始生信焉即取其書讀之三年盖恨其信之之晚也然循其理而体㑹則似悟還迷依其法而行持則暫静還擾旣而閱傳燈錄始知佛有法眼妙心宻相付嘱而逹磨西來单傳此事衆生悟者可以見性而了心其後發明此事但覺境界非常取証道歌讀之句句盡是吾之心地讀至六般神用空不空一顆貟光色非色如是希竒之事吾今巳得現前任是千聖出來巳湏退歩始得示人以偈曰世間多少英靈漢終是迷頭喚人喚可怜眼底黒漫漫不見􅌐珠光燦爛過今晡又耒旦不斍年華暗中換急抬頭髙著眼徑寸不容蚌中産灵利男児薦得時好笑交渠腸𣣔断又詩云今士堂堂此事同㱕因処処獲貟通片心豁去滄𬈑窄双眼開耒宇宙空出海銀蟾光動地離弦金簇疾追凬湏知佛祖埋藏後坐断千差是此翁苕溪漁隱百家詩話捴龜卷之四十六終, WYG: 巻}
