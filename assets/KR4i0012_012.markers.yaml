  - {type: variant, offset: 5838, length: 2567, content: 後集卷之十二評論門或問鄭䋯相國近有詩否答云詩思在㶚橋風雪中驢子上此䖏那得之北夣瑣言載綮雖有詩名本無廊廟之望及登庸中外驚駭太原兵至渭北天子震恐渇扵攘却綮請扵文宣王謚號中加一哲字其不究時病率此類愚謂此人止可置之風雪中令作詩也䂬溪王夷甫蔡景節並號口不言錢二子皆因弊矯之者衍以其妻貪淫黷貨至藉俠士李陽以懼之樽在臨海其婢納女巫之賂為百姓撾登聞皷其絶口盖有由然如子羙張籍皆児散寫乞錢書太白頻將三十萬盡付酒家錢岑參閑居耐相訪正有床頭錢小杜清貧長欠一杯錢東坡滿江風月不論錢山谷青山好去坐無錢曾不害諸公之高也孟郊詩最淡且古坡謂有如食蟛􅒹竟日嚼空螯退之論數子乃以張籍學古淡東野為天葩吐竒芬豈勉所長而諱所短耶抑亦東野古淡自足而不待學欤並同上武元衡詩不多集中有酬嚴司空荆南見寄詩两篇一云金貂再領三公府玉帳連封萬户侯一云漢家征鎮委條侯虎節龍旌居上頭皆續以簾捲青山巫峽雨烟開碧樹渚宫秋第三聮一云劉琨坐嘯風清塞謝眺題詩月滿樓一云金笳曾掩故人淚䴡句初傳明月樓皆續以白雪調高歌不得羙人相顧翠娥愁人訝其大同余謂乃元衡刪潤之本集中両存之尔當以前篇爲正後篇誠未工也丹湯集李太白杜子羙詩皆掣鯨手也余觀太白古風子羙偶題之篇然後知二子之源流逺矣李云大雅乆不作吾衰竟誰陳王風委蔓艸戰國多荆榛則知李之所得在雅杜云文章千古事得失才心知騷人嗟不見漢道盛扵斯則知杜之所得在騷然李不取建安七子而杜獨取垂拱四傑何耶南皮之韻固不足取而王楊盧駱亦詩人之小巧者尔至有不廢江河萬古流之句褒之豈不太甚乎同上少㳺贈坡詩云節毛零落毡餐雪辨舌縱横印佩金語太不等子瞻譏集句云天邉鴻鵠不易得便令作對隨家鷄此詩正類此黄常明東坡文章妙一世然在掖垣作吕吉甫謫詞繼而吕復用遂納告毀抹在翰苑作上清儲祥碑繼而蔡元長復作遂遭磨毀非特此也蘇叔黨云昔公為藏經記云傳扵世或以為非在惠州作梅花詩至有以為笑此皆士大夫以文鳴者其説能使人必信乃謬妄如此信知識古戰場文者鮮矣子由嘗䟦東坡遺稿云展卷得遺艸流涕􅊜冠纓斯文乆衰弊流涇自為清科斗藏壁間見者空嘆驚廢興自有時詩書付西京陽秋嘗恨王子猷作此君語輕以難名者告人遂使庸夫俗子忘意其間酤坊茗肆適以汚累之謪仙云但得酒中趣勿為醒者傳此理信然和靖招靈魄云百千幽勝無人見說向吾師是洩機東坡云此味只憂児軰覺逢人休道北囱凉人生此樂須天賦莫遣児曹取次知使子猷知此必鉗其喙也䂬溪老杜畏人有云門徑從榛艸無心待馬蹄又直須上畨看成竹客至從嗔不出迎將遺物離人矣答嚴八乃云只須伐竹開荒徑拄杖穿花聴馬蹄又有艸萊無徑欲教鋤亦如厭就成都卜而云慿將百錢卜漂泊問君平自智者觀之則爲㳺戯篇章得失自在俗士拘泥則全不相應也東坡荅林塘云古今正自同歳月何必書㳺香積山又云㝷幽恐不繼書版記歳月蕭思話先於曲阿起宅有閒曠之致子惠基嘗謂所親曰㛰嫁畢當歸老舊廬故元次山招陶别駕云無惑别婚嫁竟為俗務牽退之云如今便可尔何用畢婚嫁杜茅屋為風所破歌云自經䘮亂少睡眠長夜沾􅊜何由徹安得廣厦千萬間大庇天下寒士俱歡顔風雨不動安如山於乎何時眼前突兀見此屋吾廬獨破受凍死亦足白樂天新製布裘云安得萬里裘盖褁周四垠穏煖皆如我天下無寒人新製綾袴成百姓多寒無可救一身獨煖亦何情心中為念農桑苦耳裏如聞飢凍聲争得大裘長萬丈與君都盖洛陽城皆伊尹自任一夫不獲之辜也或謂子羙詩意寜苦身以利人樂天詩意推身利以利人二者較之少陵為難然老杜飢寒而閔人飢寒者也白氏飽煖而閔人飢寒者也憂勞者易生扵善慮安樂者易失扵不思樂天疑優或人又謂白氏之官稍逹而少陵尤卑子羙之語在前而長慶在后逹者宜急卑者可緩也前者唱導後者和之耳同合而論則老杜之心盖賢矣老杜當干戈騷屑之時間關秦隴負薪採梠餔糒不給困躓極矣自入蜀依嚴武始有草堂之居觀其經營徃來之勞備載扵詩皆可攷也其曰萬里橋西宅百花潭北莊言其地也經營上元始㫁手寳應年者言其時也雪裏江船渡風前徑竹斜寒魚依宻藻宿鷺起圓沙者言其景物也至扵艸堂塹西無樹林非子誰復見幽深則乞樹木扵何少府之詩也艸堂少花今欲栽不問緑李與黄梅則乞果栽扵徐少卿之詩也王侍御携酒艸堂則喜而為詩曰故人能領客携酒重相看王録事許草堂貲不到則戯而為詩曰為嗔王録事不寄艸堂資盖其流離貧窶之餘不能以自給皆因人而成也其經營之勤如此然未及黔突避成都之亂入梓客閬其心則未嘗一日不在艸堂也遣弟檢校艸堂則曰鵞鴨冝長數柴荆莫浪開寄題艸堂則曰尚念四松小蔓艸勿拘纏送韋郎歸成都則曰為問南溪竹抽梢合過墻塗中寄嚴武則曰常苦沙崩損藥欄也從江檻落風湍每致意如此及成都亂定再依嚴武為節度叅謀復歸艸堂則曰不忍竟捨此復來薙榛蕪入門四松在歩堞萬竹踈則其喜可知矣未㡬嚴武卒彷徨無依復捨之而去以史及公詩攷之艸堂㫁手扵寳應之𥘉而永太元年四月嚴武卒是年秋公寓䕫州雲安縣有此艸堂者終始秪得四載而其間居梓閬三年公詩所謂三年奔走空皮骨是也則安居艸堂者僅閱歳而巳其起居寢興之適不足以償其經營徃來之勞可謂一世之覊人也然自唐至今巳數百載而艸堂之名與其山川艸木禽獸公詩以為不朽之傳盖公之不幸而其山川艸木之幸也葛常之僧祖可俗蘇氏伯固之子飬直之弟也作詩多佳句如懐蘭江云懐人更作夣千里歸思欲迷雲一灘贈端師云窓間一榻篆烟碧門外四山秋蕋紅等句皆清新可喜然讀書不多故變態少觀其體格亦不過烟雲艸樹山川鷗鳥而巳而徐師川作其詩引乃謂自建安七子南朝二謝唐杜甫韋應物柳宗元本朝王荆公蘇黄妙処皆心得神解無乃過乎師川作畫虎行未章云憶昔予頑少小時先生教誦荆公詩即今老舊無新語尚有廬山病可師愛其詩如是也丹陽集元和十一年六月武元衡將朝夜漏未盡三刻騎出里門遇盗死于墻下許孟容謂國相横尸而盗不得爲朝廷耻遂下詔募捕竟得賊始得張晏者王承宗所遣訾珎者李師道所遣也初元衡䇿李錡之必反已而錡果反就誅由是諸鎮桀鷔者皆不自安以致扵是劉夣得有代静安佳人怨詩云寳馬鳴珂踏曉塵魚文七首犯車茵適來行哭里門外昨夜畫堂歌舞人又云秉燭朝天遂不回路人彈指望高䑓墻東便是傷心地夜夜秋螢飛去來余攷夣得為司馬時朝廷欲澡濯𥙷郡而元衡執政乃格不行夣得作詩傷之而託扵静安佳人其傷之也乃所以快之欤韵語陽秋黄庻字亞夫嘗有恠石一絶傳扵世云山鬼水恠着薜荔天禄辟邪眠莓苔鉤簾坐對心語口曾見漢家池舘來人士膾炙以為竒作唐張碧詩亦不多見嘗有池上怪石詩云寒姿數片竒突兀曾作秋江秋水骨先生應是壓風雷着向池邉塞龍窟我來池上傾酒尊半酣書破青烟痕參差翠柳擺不落筆頭驚怖黏秋雲我聞呉中項容水墨有高價邀得將來倚松下鋪却㕠僧直難掉掉首空歸不成話二詩殆未易甲乙也同上百家詩話總龜後集卷之十二, WYG: 巻}
