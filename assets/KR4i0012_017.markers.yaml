  - {type: variant, offset: 2318, length: 3429, content: 神道碑珎貨外仍輟一姬為潤筆韓受姬及文成但叙譜系品秩及薨葬哀贈之典而巳續嫌之乃封還意其改竄熈載亟以歌姬并珎贈還之姬登車書一絶於泥金雙帶云風柳搖搖無定枝陽䑓雲雨夣中歸他年蓬島音塵㫁留取尊前舊舞衣同前雄州安撫都監稱宣事云虜中好樂天詩聞虜有詩云樂天詩集是吾師白樂天一舉登第作詩曰慈恩塔下題名處十九人中最少年時年二十七大和二年崔郾侍郎東都放牓西都過堂杜紫㣲第五人登第作詩曰東都放牓未花開三十三人走馬廻秦地少年多醸酒却將春色入關來寳暦中楊嗣復相具慶下繼放甲榜時無僕射自東洛入覲嗣復率生徒迎于潼關宴于新昌里第元白在焉皆即席賦詩楊汝士詩後成元白覧之失色詩曰隔座應須賜御屏盡將仙翰入高冥文章舊價留鸞掖桃李新隂在鯉庭再歲生徒陳賀宴一時良史盡傳馨當時䟽傅雖云盛詎有茲筵醉醁􅙩汝士是日大醉歸謂諸子曰今日壓倒元白何扶大和元年登第明年再捷以一篇寄同年曰金榜題名墨尚新今年依舊去年春花開每𬒳紅粧問何事重來只一人並同前紫閣山老僧文聰說晏相來逰山獮猴萬數遍滿山谷僧言未嘗如此之多晏詩㝷添獼猴之句雅志王沂公與李文定公連榜取殿魁又相繼秉鈞軸文定鎮并門公均勞逸本郷作詩寄之略曰錦幖得雋曾相繼金鼎調元亦荐更并土児童公再見會稽幢紱我先榮或曰如此名實何由企及續歸田録潘閬在舒州灊山寺為行者題詩鍾樓云遶寺千千萬萬峰忘第二句頑童趂暖貪春睡忘却登樓打曉鍾孫僅為郡官見詩曰此潘逍遥也告寺僧呼行者潘已亡去貢父詩話越州鰻井在應天寺井在一盤石上高數丈井纔方數寸乃一石竅也深不可知徐浩詩云深泉鰻井開即此也其來亦逺鰻時出逰人取之置衣䄂間了無驚猜如鰻而有鱗耳其大尾有刄跡相傳黄巢曾以劍砍之凡鰻出必有水旱疫癘之疾郷人以此候之學士院有雙鵲嘗栖於西軒海棠枝上每學士㑹食必徘徊翔集扵玉堂之上略無驚畏因謂之靈鵲時或鳴噪必有大詔令或宣召之事故眺公見和詩云却聞靈鵲心應喜并予宿直詩云靈鵲先依玉樹栖二詩出樞庭集金坡遺事鼎州甘泉寺介官道之側泉甚佳便於漱酌行客無不留者㓂萊公南遷題東檻曰平仲經此望北闕黯然而行未㡬丁晋公又過題西檻曰謂之酌泉禮佛而去後范諷𥙷之安撫湖北題詩曰平仲酌泉方北望謂之禮佛向南行烟嵐翠鎖門前路轉使高人厭寵榮古今詩話退傅張懿晚春乗安輿出南薫門繚繞都城逰金明池抵宿詣冝春門入關吏捧牌請官位書云閒逰靈沼送春回關吏何須苦見猜八十老翁無品秩三曾身到鳯池來同前增修詩詁總龜卷之十七乙集終百家詩話總龜後集卷之十七評史門老杜課伯夷幸秀伐木則曰報之以㣲寒共給酒一斛遣信行脩水筒則以浮瓜裂餅以答其恭謹陶淵明告其子則曰輙遣一力助汝薪水之勞此亦人子也可善遇之盖古人之役僕夫其忠厚率如此初學記載王褒買便了爲奴作約使苦作以致聴劵而泪下鼻涕長一尺有不如早歸黄陌令蚯蚓鑚額之語其少陵柴桑之罪人㢤葛常之建安七子惟劉公幹獨爲諸王子所親曹操威熖盖世甄夫人出拜諸人皆伏而公幹獨平視雖輸作而不悔亦可嘉矣故梅聖俞詩云公幹才俊或欺事平視羙人曾不起自兹不得爲故人輸作左校瀕扵死公幹嘗有贈従弟詩云亭亭山上松瑟瑟谷中風風聲一何盛松枝一何勁其寄意如是豈肯少屈扵操㢤末篇又托興鳯凰有何時當來儀將須聖明君之句則不以聖明待操矣杜甫悲陳濤詩云野曠天清無戰聲四萬義軍同日死言房琯之敗也琯臨敗猶持重而中人邢延恩促戰遂大敗故甫深悲之甫爲右拾遺㑹琯罷相上䟽力救琯肅宗大怒詔三司推問宰相張鎬救之獲免故洗兵馬行云張公一生江海客身長九尺鬚眉蒼盖感其救巳也張無盡孤憤吟云房琯未相日所談皆臯䕫一朝陳濤下覆没十萬師中原巳紛潰老杜尚嗟咨則老杜救琯之章豈亦出扵私情乎鄭䖍受安禄山僞命洎賊平與張通王維並囚宣陽里因善盡祈扵崔圓遂得免死老杜所謂今如罝中兎子雲識字終投閣是也及䖍貶台州有詩云可念此公懐直道也霑新國用䡖刑如䖍者可謂之懷直道乎當是愛私之言尔八哀詩亦云反覆歸聖朝點染無滌蕩老蒙台州掾泛泛浙江槳盖傷之也忘年交謂雖年齒尊㓜不侔而道義可為友也如張鑑之扵陸贄崔廓之扵李謙是巳魯直云逐貧不去與忘年便以忘年作朋友用盖有來處也老杜過孟倉曹詩云清談見滋味尔軰可忘年則山谷所用豈苟云乎㢤李白作蜀道難以罪嚴武其末云所守或匪親化為狼與豺朝避猛虎夕避長蛇磨牙吮血殺人如麻錦城雖云樂不如早還家則武待白之禮未必優也武與杜甫情好甚厚一朝以飲酒過度而武㡬殺之則不如早還家之說乃白先見之明尔陸暢謁韋臯於蜀郡暢感韋之遇已遂反其詞作蜀道易云蜀道易易扵履平地郎基在頴川不置木枕裴潜在兖州不眠胡牀居官清操要當如是白樂天在杭州取天竺片石受代携㱕故其詩曰三年為刺史飲氷復食檗唯向天竺山取得両片石此抵有千金無乃傷清白曁守呉門復取洞庭雙石一以攴琴一以貯酒故雙石詩有萬古遺水濵一朝入吾手之句洎罷府攴琴石遂歸履道舊居故作詩云天上定應勝地上攴機未必及攴琴於乎泉石膏肓人士之逸韻若樂天者豈潘子義所謂風流罪過也耶君子為小人誣衊則其詩怨故寓之於物以舒其憤如朱晝古鏡詩所謂我有古時鏡初自懐陵得蛟龍猶泥蟠魑魅幸月蝕是也小人旣敗君子得志之秋則其詩昌故寓之扵物以快其志如劉禹錫磨鏡篇所謂萍開緑池滿暈盡金波溢山神妖氣沮野魅真形出是也黄子虚作妬佳月篇云狂雲妬佳月怒飛千里黒佳月了不嗔曾何汚㓗白攴頥少待之寒光静無迹燦燦黄金盤獨照一天碧殆亦二子之意俱同上康節三皇吟許大乾坤自我宣乾坤之外復何言初分大道非常道終有先天永後天作法極㣲難着迹收功最乆不知年若教世上論功業料得更無人在前撃壌集五帝吟進退肯將天下譲着何言語狀雍容一作従容衣裳垂處威儀盛玉帛脩時意思恭物物盡能循至理人人自願立殊功當時何故得如此只被升明類日中三王吟一片中原萬里餘殆非孱徳所能居能一作冝夏商正朔猶能布湯武干戈未便驅澤火有名方受革水天無意不成需請觀仁義為心者肯作人間淺丈夫意一作應請觀一作詳知五伯吟刻意尊名名愈虧人人奔命不勝疲生靈劍㦸圍中活圍一作林公道貨財心裏歸雖則餼羊能愛禮柰何鳴鳯未来儀東周五百餘年内歎息唯聞一仲尼七國吟當其末路尚縱横仁義之言固不聽肯為破齊存即墨能勝坑趙盡長平清晨見鬼未為怪白日殺人奚足驚加以蘇張掉三寸扼喉其勢不俱生嬴秦吟轟轟七國正争籌利害相摩未便休比至一雄心底定其如四海血横流三千賔客方成夣百二山河又變秋謾說罷侯能置守趙高元不是封侯西漢吟秦破山河舊戰埸豈期民復見畊桑九千來里開封域四百餘年號帝王剥䘮旣而遭莾卓經營殊不念高光當時文物如斯盛城復何由更有隍三國吟桓桓鼎峙震雷音絶唱高踪没處㝷蕭皷一方情味暢弓刀萬里力難任論兵狠石寜無意飲馬黄河徒有心雖曰天時亦人事誰知慮外失良金西晋吟承平未必便無憂安若忘危非善謀題品人才慿雅誚雌黄時事用風流有刀難割公閭腹無木可梟元海頭禍在夕陽亭一句上東門笑浪悠悠十六國吟溥天之下號寰區大禹曾經治水餘衣到敝時多蟣蝨瓜當爛處足䖝蛆龍章夲不資狂㓂象魏何嘗薦亂胡尼父有言堪味處當時欠一管夷吾南北朝吟方其天下分南北聘使何嘗絶徃還偏覇尚存前典憲小康猶帶舊腥膻一作迍邅洛陽雅望稱崔浩江表竒才服謝安二百四年能並轡謾將夷虜互為言有隋吟始謀當日已非臧又更相承或自戕螻蟻人民貪土地泥沙金帛恱姬姜征遼意思糜荒服泛汴情懷厭未央三十六年都掃地不然天下未歸唐有唐吟天生神武奠中央不爾群兇未易攘正觀若無風凜凛開元安有氣揚揚凭高始見山河壯入夏方知日月長三百年間能混一事雖成徃道彌光五代吟自從唐李墜皇綱天下生靈𬒳擾攘社稷安危慿卒伍朝廷䡖重繋藩方深冬寒木固不脫未旦小星猶有光五十三年更五姓始知掃蕩待真王我宋吟二首紛紛五代亂離間一旦雲開復見天艸木百年新雨露車書萬里舊山川㝷常巷陌猶簮紱取次園林盡管絃盡一作亦人老太平春未老鶯花無害曰高眠又吾曹飬拙頼明時為幸居多寜不知天下英才中遁迹人間好景處開眉生來只慣見豐稔老去未嘗經亂離一作聞皷鼙五事歴將前代舉帝堯而下更無之按邵氏聞見録康節先公謂本朝五事自唐虞而下所未有者一革命之日市不易肆二克復天下在即位後三未常殺一無罪四百年方四葉五百年無心腹患伯温竊疑未嘗經乱離為太甚先公曰吾老且死汝軰行自知之張南軒采菊亭詩引曰陶靖節人品甚高晋宋諸人所未易及讀其詩可見胸次􅎈落八窓玲瓏豈野馬逰塵所能棲集前建安丞張君精力未衰即掛冠家于瀏陽有年矣葺小園為亭面南山來求予名予名之曰采菊亭取靖節所謂采菊東籬下悠然見南山嗚呼靖節興寄深逺特可為識者道耳詩曰陶公千載人高標跨餘子豈無濟時念歛䕃獨知止歸來卧衡門無愠復何喜九日天氣佳東籬擷芳蕋舉頭見南山佳處政在此地偏心則逺意得道豈否張侯謝銀艾築室娯燕几小亭才㝷丈景物自新羙頗聞方瞳清亦復強歩履不妨數登臨倚杖看雲起高詠悠然篇飛鴻送千里文集復齋漫録云東坡作諌論以魏鄭公以蘇張之辯而為諌諍之術且云鄭公之初實學縦横之術其所以與蘇張異者心正尔或以東坡之論為不然余讀鄭公出関詩, WYG: ''}
