  - {type: line-break, offset: 0, content: '', id: KR4i0012_SBCK_017-1a01}
  - {type: variant, offset: 0, length: 2327, content: 增修詩話總龜卷之十七紀實門上仁宗正月十四日御樓遣中使傳宣從官曰朕非好逰觀與民同樂翌日蔡君謨獻詩云髙列千峰寳炬森端門方喜翠華臨宸逰不為三元夕樂事還同萬衆心天上清光留此夜人間和氣閣春隂要知盡慶華封祝四十餘年惠愛深東齋録李叅少有吏材仁宗竒之殿柱題其名有䌓劇人所避者必用叅自將作監簿擢至右丞樞宻直學士元豐中卒李師中以詩弔之曰當年殿柱題名處詩史嶺南謂村市為墟柳子厚詩云青箬褁塩歸洞客緑荷包飯趂墟人青箱雜記夏文莊謪守黄州時龎頴公爲郡掾文莊識之優待頴公有病意謂不起文莊親視之曰異日當爲貧宰相亦有年夀疾非所憂頴公曰宰相豈得貧耶文莊曰一等人中貧尔故頴公作退老詩曰田園貧宰相圖史冨書生張侍郎師錫年八十有喜子登苐詩曰御榜今朝至見名心始安尔能俱中苐吾遂可休官賀客留連飲家書反覆看世科雖不繼得慰二親難張氏常有中甲科者故有世科之語張退傳文懿士遜趙少保叔平槩張樞相昇皆夀八十六陳丞相文惠尭佐夀八十二杜丞相正獻衍夀八十一冨丞相文忠弼夀八十文惠致政退傳詩曰青雲𡵨路逰將遍白髪光隂得最多天聖中李康靖公若谷慶暦中邯鄲公淑皆知滑州后八年審言又知前此邯鄲公迎康靖公到滑康靖題詩扵州廨曰滑守如今是世官阿戎出守自金鑾郡人莫訝留題别孫息期同住此看後審言刋石紀其事同前元豐𥘉王伸效王建作宫詞百首獻之頗有意思詩云太皇生日最尊榮獻夀宫中未五更天子捧觴仍再拜寳慈侍立到天明寳慈皇太后宫名太后幸景靈宫駕前露面雙童女詩曰平明綵仗幸靈宫紫府仙童下九重整頓瓏璁時住馬畫工闇地貌真容古今詩話張九齡在相有謇諤匪躬之誠明皇怠於政事李林甫隂中傷之方秋明皇令高力士持白羽扇賜焉九齡作歸燕詩貽林甫曰海燕何㣲眇乗春亦暫來豈知泥滓賤只見玉堂開繍户時雙入華軒日㡬廻無心與物競鷹隼莫相猜林甫知其必退恚怒稍解明皇雜録叚文昌廣郡縣人父以賣油爲業生而多智長亦有文常跨驢行郷里笑之三十年間衣錦歸蜀蜀人贈詩曰昔日騎驢學忍飢今朝忽着錦衣歸等閒畫虎驅紅斾可畏登龍入紫㣲冨貴不由公祖觧文章生得羽毛飛廣郷再去應惆悵猶有江邉舊釣磯鑑戒録羅史君向廬州人不事産業以至困窮常投福泉寺隨僧飯而巳其學未嘗廢二十年間持節歸郷里及境至僧房書壁曰二十年前此布衣鹿鳴西上虎符歸行時賔從過前事到䖏松杉長舊圍野老共遮官路拜沙鷗遥認隼旟飛春風一宿琉璃殿惟有泉聲愜素機同前雷州及海外瓊崕多香木夷民以為槽飼雞犬鄭文寳詩曰沉檀香植在天涯賤等荆衡水面槎何必爲槽飼鷄犬不如煨燼向豪家談苑建州山水竒秀剏寺落落相望偽唐建安寺三百五十一建陽二百五十二浦城一百七十八崇安八十五松溪四十一關隷五十二僅千區杜牧江南絶句云南朝四百八十寺謂是也劉經為虜政事舎人来奉使路中有野韭可食味絶佳作詩云野韭長猶嫩沙泉淺更清並同前張弘靖三世掌綸誥秉鈞軸楊巨源詩云伊陟無聞祖韋賢不到孫時稱其善與張家說家門巨源燕居吟咏年老得疾頭數揺人言吟咏習成詩史張鎬少有大志逰京師未始知名嗜酒跌宕人有邀之筞杖而徃大醉即歸言不及世務楊國忠薦為右拾遺不二年由諌議大夫擢中書侍郎平章事杜少陵云張公一生江海客身長九尺鬚眉蒼召起遄遇風雲會扶顛始知籌䇿良正謂鎬王元之出守黄州時蘇易簡牓下放孫何等三百五十八人奏曰禹偁禁林宿徳累為遷客飄泊可念臣欲令牓下諸生罷集綴馬送于郊奏可送過四短亭諸生列拜于官橋元之口占一絶付狀元為我深謝蘇公其詩云綴行相送我何榮老鶴乗軒愧谷鶯三入承明不知舉看人門下放諸生時諸親友觀望不敢私近惟竇元賔執手於閤門曰天乎天乎得非命歟公以詩謝其略曰惟有南宫竇員外為余垂淚閤門前文潞公居伊洛日年七十八同時中散大夫程朝議大夫司馬旦司封郎中致仕席汝言皆年七十八嘗為同甲之會各賦詩潞公詩曰四人三百十二歲况是同生甲午年占得梁園為賦客合成商嶺採芝仙清談亹亹風生席素髪飄飄雪滿肩此㑹從來誠未有洛中應作畫圖傳荆公罷相知金陵有詩曰投老歸來一幅巾君恩猶許備藩臣芙蓉堂下䟽秋水聊與龜魚作主人再罷相以㑹靈觀使居鍾山又作詩曰乞得膠膠擾擾身江湖波浪替埃塵只同鳬鴈為閑侣不與龜魚作主人荆公初拜相以未謝坐閣中不見客一二門生侍坐但見顰蹙不言徐題詩於窓曰霜筠雪竹鍾山寺投老歸歟寄此生放筆而起人莫測其意國朝内相服金帶朱衣一名前引两府則金毬文帶佩魚朱衣二人謂之重金望两制乆者則曰眼前何日赤腰下㡬時黄望两府乆者則曰眼赤何時两腰黄甚日重熈寜中高䴡使人至京師求王平甫詩有㫖令京尹元厚之抄録以賜厚之自詣平甫求新著平甫以詩戯之曰誰使詩仙來鳯沼欲傳賈客過雞林福唐有老嫗當壚有舉子謂嫗曰吾能與爾致數十千乃令嫗作酒帘題曰下臨廣陌三條闊斜倚危樓百尺高太守王祠部逵見之大喜呼姬與錢五千酒一斛盖詩乃王公詠酒旗詩平生最得意者大社二祭多差近臣王禹玉在两禁二十年熈寜間爲翰林學士復被差題詩於齊宫曰鄰雞未動暁驂催又向靈壇飲福盃自笑治聾知不足明年強徤更重來關右人或作京師語音俗謂之獠語士大夫亦然有太常博士楊獻民河東人時鄜州脩城差望青砍木作詩寄僚友曰縣官伐木入烟蘿匠石須材盡日磨盖以郷音呼忙爲磨也士人而狥俗不典可笑魏仲先贈萊公詩曰有官居鼎鼐無宅起樓䑓仁宗即位北使至賜㝠惟两府預焉北使歴視坐中問譯者曰孰是無宅起樓䑓相公丁晋公令譯者曰南方須大臣鎮撫㓂公撫南夏非乆即還古今詩話元㣲之自㑹稽拜尚書左丞到京未逾月出武昌詩贈夫人裴氏曰窮冬到郷國正歲别京華自恨風塵眼看他逺地花碧幢還照耀紅粉莫咨嗟嫁得浮雲婿相隨即是家夫人答曰使門𥘉擁節御苑栁絲新不是悲殊命惟愁别近親黄鸝啼古木朱履從清塵想到千山外滄江正暮春正元中李摯以宏詞振名與李行敏同姓同年登第又同歲及同門摯答行敏詩曰因縁三紀異契分四般同武宗怒一宫嬪謂栁公權曰得學士一詩當釋之遂進詩曰不忿前時悮主恩巳甘寂寞守長門今朝却得君王顧重入椒房拭涙㾗柳公權從事未央宫文宗謂曰有一喜事邉上賜衣乆不時今年二月巳給公可賀我以詩公權進詩曰去歲雖無戰今年未得歸皇恩何以報春日得春衣嚴續僕射請韓熈載爲父, WYG: ''}
