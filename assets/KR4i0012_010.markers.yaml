  - {type: variant, offset: 4887, length: 2181, content: 聲人倚楼當時人誦詠之以為佳作遂有趙倚楼之目又有長安月夜與友人話歸故山詩云楊柳風多潮未落兼葭霜在鴈𥘉飛亦不减倚楼之句至扵献李僕射詩云新諾似山無力負舊㤙如水滿身流則謬矣葛常之鍾嵘称張茂先惜其兒女情多風雲氣少喻鳬嘗謁杜紫㣲不遇乃曰我詩無綺羅鉛粉冝不也淮海詩亦然人戯謂可入小石調然率多子羙句但綺䴡大勝爾子羙並蔕芙蓉夲自双水荇牽風翠帯長退之金釵半醉坐添春牧之春風十里楊州路誰謂不可入黄鍾宫邪黄常明昌黎云携持令名帰自足貽家尊蘇州送黎尉云秪應傳善政朝夕慰髙堂誠儒者迂闊之辝然貪饕苟得汚累其親孰若清白之為愈同上東坡云少陵詠懐詩杜陵布衣老大意轉拙許身亦何愚竊比稷與契子羙自比稷契人未必許也然其又有詩云舜舉十六相身尊道更髙秦時任商鞅法令如牛毛自是稷契軰人口中語也知名不必称局促商山芝又云王侯與蝼蟻同盡隨丘墟願聞第一義回向心地𥘉乃知子羙詩尚有亊在也䂬溪張藉送區弘詩云韓公國大賢道徳赫巳聞昨出爲陽山爾區来趋奔韓官迁法曹子送至荆門韓入爲慱士﨑嶇從覊輪觀其逰從之乆疑得於韓者深也然考其文章議論之際乃不得預藉湜之列何也韓集有送區弘南歸詩云我迁于南日周圍来見者衆莫依希爰有區子熒熒暉觀以彛訓或從違我念前人譬葑菲落以斧斤引纏㣲雖有不逮驅騑騑觀此数語則韓雖以師道自任而區受道之質盖有所未至也其後又勉之以行行正直勿脂韋業成志立来頎頎其誨之者至矣集中又有送區冊序韓文辨証云冊即弘也未知孰㨿尓丹陽集舉人過失難於當其尤者臧孫之犯門斬関惟孟椒能繼之臧紇謂國有人焉必椒也其難如此司馬相如竊妻滌噐開巴蜀以困苦郷邦其過巳多至為封禪書則讒謟盖天性不復自新矣子羙猶云竟宣室召徒有茂陵求李白亦云果得相如草仍餘封禪文和靖獨不然曰茂陵他日求遺藁犹喜曽無封禪書言雖不迫責之深矣李商隱云相如觧草長門賦却用文君取酒金亦舍其大論其細也舉其大者自西湖始其后有譏其謟䛕之態死而未已正如捕逐冦盗先有力者所獲搤其吭而騎其項矣余人從旁助箠縳耳黄常明士人程文窮日力作一論旣不限聲律復不拘詩句尚罕得反復折難使其理判然觀赴奉先詠懐五百言乃聱律中老杜心迹論一篇也自杜陵有布衣老大意轉拙許身一何愚自比以稷與契其術祈嚮自是稷契等人窮年憂黎元歎息腸内热與飢渇由已也何異然常爲不知者所病故曰取笑同學翁世不我知而所守不変故曰浩歌弥激烈又云非無江海志瀟洒送日月當今廊庙具建厦豈云缺葵藿傾太陽物性固莫奪言非不知隱遁為髙也亦非以國無其人也特廢義乱倫有所不忍以兹悞生理獨恥亊于謁言志大術踈未始阿附以借势也為下士所笑而浩歌自若皇皇慕君而雅志棲道旣不合時而又不少低屈皆設疑互荅屡致意焉非巨刃有余孰能之乎中間鋪叙間関酸辛冝不勝其戚戚而黙思失業途因念逺戍卒所謂憂在天下而不為小已失得也禹稷顔子不害為同道少陵之迹江湖而心稷契豈為過㢤孟子曰窮則獨善其身逹則兼善天下其窮也未嘗無志於囯與民其逹也未嘗不抗其易退之莭宻謀先定出處一致矣是時先後周復正合乎此昔人目元和賀雨詩為諌書余特目此詩為心迹論也䂬溪五言如四十个賢人著一箇屠酤不得覔句者若掘得玉匣子有底有盖但精心必獲其宝然昔人园柳変鳴禽竟不及池塘生春草餘霞散成綺不及澄江静如練春水船如天上坐不若老年芲似霧中㸔閑乆硯中窺水淺不若芲落徑裡得沿香停杯嗟別乆不及對月喜家貧楓林社日鼓不若茆屋午時雞此数公未始不精心似此知全其宝者未易多得黄常明愈寄孟刑部聮句云羙君如道腴逸歩謝天械或問道果有味乎余曰如介甫午雞声不到禪林栢子烟中静擁衾竹鷄呼我出華胥起滅篝燈擁燎炉各㩀搞梧同不寐偶然聞雨落階除皆淡中意味非造此景不能形容也黄常明張無盡題武昌陵竹寺云孟宗泣竹笋冬生豈是青青竹有情影響主張非别物人心但莫負幽明語雖淺直然當於理樂天有餘霞散成綺別葉乍辞風等語䴡矣不過扵嘲風雪弄花而巳故寄唐生詩云非求宫律髙不務文字竒惟歌生民病得願天子知䂬溪顔延之嘗問鮑昭已與靈運優劣昭曰謝五言如𥘉發芙蓉自然可愛君詩鋪錦列綉亦彫繢滿眼鍾嵘詩品乃記湯惠休云謝如芙蓉出水顔如錯采􅍢金與本傳不同又称延之甞薄惠休制作以爲委巷中歌謡耳豈湯休因爲延之所薄遂有芙蓉錯􅍢之語故史取以文飾之邪坡云辨才詩如風吹水自成文理吾軰與參寥如巧媍織錦耳取况亦類此淵明所以不可及者盖無心於非譽巧拙之間也黄常明永叔以昌黎比介甫云荅他日若能窺孟子終身何敢望韓公呉季野以方賈誼荅云俯仰繆㤙方自慊慚君将比洛陽人皆憤然不平如悪無塩唐突而謝景山贈文忠詩有才如夣得今爲累情似安仁乆悼亡即開門當之二公何抑揚之異也同上子羙夜宴左氏莊檢書燒燭短燭正不冝觀書檢閱時暫可也退之短檠二尺便且光可謂燈窓人中語猶有未便燈不籠則損目不冝勤且乆山谷夜堂朱墨小灯籠可謂善矣而虚堂非夜乆所冝子瞻推門入室書縦横蠟𥿄灯籠晃雲母慣親灯火儒生酸態尽矣同上張藉嘗移書責退之與人商論不能下氣愈亦有云我昔實愚蠢不能降色辞余謂此乃書生常態昔常見太中炉亭議題紛喧関然其後有二生坐是鳴鼓豈直議礼家爲聚訟㢤聖俞謝永叔惠酒云貽詩語且横旣醉論益堅曽不䆒世務閑氣争占先誠有之也同上岑参寄杜拾遺云聖朝無闕亊自覺諌書稀退之贈崔𥙷闕云早生得塗未要忙時清諫䟽尤冝罕皆繆承荀卿有听從無諌諍之語遂使阿䛕奸侫用以藉口以是知凢造意立言不可不豫為天下来世慮䂬溪西清詩話人之好悪固自不同子羙在蜀作悶詩乃云捲簾唯白水隱几亦青山若使余居此應従王逸少語吾當卒以樂死豈復更有悶邪同上王君玉云子羙之詩詞有近質如麻鞋見天子垢膩脚不襪之句所謂轉石扵千仭之山势也學者尤之過甚豈逺大者難窺乎同上百家詩話緫亀後集卷之十終, WYG: 宋阮閲撰}
