  - {type: variant, offset: 3483, length: 1, content: 㢤, WYG: 哉方干為人質野每見人設三拜曰禮數有三識之者呼為方三拜貌寢又免缺有司以故不與科名隱㑹稽鏡湖其别業詩云寒山壓鏡心此處是家林梁燕窺春醉嵒猨學夜吟雲連平地起月向白波沉猶自聞鐘角棲身可在深又云世人如不容吾自縱天慵落葉憑風掃香秔倩水舂花朝連郭霧雪夜隔湖鐘身外能無事頭宜白此峰寄清越上人云窓接停猿樹嵒飛洗鶴泉送姚員外赴金州云野烟新驛曙殘照古山秋樹勢連巴沒江聲入楚流鍊句字字無失有髙堅峻拔之目自咸通得名迄文徳江之南未有及者張蠙清河人登乾寕進士為犀浦令王建開國拜登膳部員外郎後為金堂令王衍與徐后逰大慈寺見壁間書墻頭細雨垂纎草水面風回聚落花愛之知為蠙句給札令以詩進蠙進二百首衍頗重之其登單于臺}
