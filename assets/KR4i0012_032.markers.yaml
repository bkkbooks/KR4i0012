  - {type: variant, offset: 1315, length: 1492, content: жұҹеҚ—жӣІе…¶еҸҘжңүжұҹеҚ—жҳҘзӣЎйӣўи…ёг«ҒиҳӢж»ҝжұҖжҙІдәәжңӘжӯёж—Ҙжҡ®жұҹй ӯдёҖжңӣжҷӮж„Ғжғ…дёҚг«ҒеҰӮжҳҘж°ҙд№ӢйЎһйҹізҡҶжӮҪж„ҙжң«е№ҙжһңеҚ—йҒ·жӢҫйҒәеӯ«е’ёдёҚзҹҘдҪ•иЁұдәәиҖҢй•·ж–јй җзҹҘзҒҪз•°еҸҲе–„зӮәи©©й–ӢеҜіеҲқе®ўдәҺд№қжұҹеӣ йҖ°е»¬еұұжңүи©©з•ҷйЎҢд№қеӨ©дҪҝиҖ…е»ҹдә‘зҚЁе…ҘзҺ„е®«зҰ®иҮізңҹз„ҡйҰҷдёҚзӮәиіӨиІ§иә«з§Ұж·®дёӨгҹҒжІҷеҹӢйӘЁж№“жөҰеҚғе®¶иЎҖжҹ“еЎөе»¬йҳңзғҹйңһиӘ°жҳҜдё»иҷҺжәӘйўЁжңҲеұ¬дҪ•дәәд№қжұҹеӨӘе®ҲеӢӨзҺӢдәӢеҘҪж”ҫеӨ©е…өжёЎиҰҒжҙҘдёҚиё°ж•ёе№ҙйҮ‘йҷөжқҝи•©д№қжұҹйҮҚй—ҲдәәеҸ—еЎ—зӮӯдёҰжҮүжӯӨи©©е’ёеҫҢеҚ’ж–јеҚ—жҳҢиЎҶдәәжЈ„е°ёжүөжұҹдёӯжіқжөҒиҖҢдёҠе’ёз•°д№ӢиҳҮжҳ“з°ЎзҪ·зҝ°жһ—еӯёеЈ«д»ҘзҰ®йғЁдҫҚйғҺзҹҘеҚ—йҷҪж—Ҙе№ҙжңӘеӣӣеҚҒеұўжңүй–’еҶ·д№ӢеҳҶжңүиҖҒеғ§зҚЁиҷ•еӨ–еҹҺеҸӨеҜәйҖҡе„’иЎ“иғҪи©©ж•…е…¬иҲҮи©©жӣ°жҶ”жӮҙд»Ҡе№ҙдёүеҚҒе…ӯиҲҮеё«ж°Је‘ідёҚдәүеӨҡжңӘгЎ¬иҖҢеҚ’дәҢе®Ӣд»Ҙж–Үз« йҪҠеҗҚеӨ©дёӢеӯҗдә¬е®ҲиңҖж—ҘдҪңи©©дёүзҷҫеҗҚжӣ°зҢҘи—Ғжңүзў§йӣІи¬ҫжңүдёүе№ҙдҝЎжҳҺжңҲз©әзҲІдёӨең°ж„ҒеҫҢеҚ’дёҚе…ҘдёӨең°дәәд»ҘзҲІи©©дңҹзҺӢе…ғжҫӨе°‘жҷӮдҪңзҷҪиӢ§иЎҢжңүдә‘еҗӣеҝғиҺ«еҺӯй »жӯЎжЁӮи«ӢзңӢйӣІй–“ж—ҘиҘҝе…Ҙиӯ°иҖ…и¬ӮзҫҷеүҮзҫҷзҹЈз„¶ж—ҘиҘҝе…үжҷҜз„ЎеӨҡиҝ‘д№ҺдңҹжһңдёҚж°ёеӨҖзҺӢйјҺж№–ж№ҳдәәеӯ—еүҮд№ӢеӯЈзҲ¶еӨҡгіәжұҹе·ҰжңүжҙӘе·һиҘҝеұұи©©дә‘жһ—жіүз©әжңүжқұиҘҝи·ҜйўЁжңҲйӣЈгқ·еҚҒдәҢе®¶иӯ°иҖ…и¬Ӯеҝ…з„ЎеҗҚз¬¬еҫҢжһңз„¶еҳ—дҪңйёӮй¶’и©©дә‘жЈІжҒҜжҮүйӣЈиҝ‘е°Ҹжұ жҖ§йқҲй–’йӣ…иЎҶзҰҪеёҢи’ІжҙІж—Ҙжҡ–дҫқиҠұз«ӢжјҒжөҰзғҹж·ұиІјжөӘйЈӣйҒәзҫҪеҸғе·®жІҫж°ҙжІ¬йӨҳи№ӨзЁ еҸ еҚ°иӢ”иЎЈжҷҡдҫҶжһ—еҫ‘гЈІйўЁиө·дҪ•иҷ•зӣёе‘јзқҖе°ҚжӯёзӢ„жёҷеӯӨйҙҲдә‘жӣҙз„ЎиҒІжҺҘзәҢз©әжңүеҪұзӣёйҡЁиҒһжӯӨеҸҘиҖ…зҡҶдә‘еҝ…з„ЎеҫҢжһңеҰӮе…¶иЁҖдёҰеҗҢеүҚйҷіз„Ўе·іиіҰй«ҳи»’йҒҺи©©дә‘жҷҡзҹҘжӣёз•«зңҹжңүзӣҠеҚҙжҒ жӯІжңҲдҫҶз„ЎеӨҡдёҚж•ёжңҲйҒӮеҚ’зӣҙж–№и©©и©ұз§Ұе°‘гіәзҙ№иҒ–еҲқи«ӢеӨ–д»Ҙж ЎеӢҳзӮәжқӯеҖ…ж–№иҮіжҘҡжі—й–“жңүи©©дә‘е№із”ҹйҖӢж¬ еғ§жҲҝзқЎеҮҶж“¬еҰӮд»Ҡиҷ•иҷ•йӮ„и©©жҲҗд№ӢжҳҺж—Ҙд»ҘиЁҖиҖ…иҗҪиҒ·зӣЈиҷ•е·һй…’дәәд»ҘзӮәи©©дңҹжқұеқЎжңүйҖҒжҲҙи’ҷиөҙжҲҗйғҪзҺүеұҖи§Җи©©дә‘иҺ«ж¬әиҖҒз—…жңӘжӯёиә«зҺүеұҖд»–е№ҙз¬¬гЎ¬дәәеҸҲжңүйҒҺе¶әдёҖзҜҮдә‘еҠҚеҚ—иҘҝжңӣдёғеҚғйҮҢд№—иҲҲзңҹзӮәзҺүеұҖйҖ°еҫҢеҚ’ж–јжҳҜи§Җж–№е…ғи„©еӯ—жҷӮж•ҸдёҖж—ҘиҲҮжҘҠдҝЎзҘ–йҘ’ж¬Ўе®ҲйҒҺдҪҷеқҗдёӯеҲҶйЎҢдәәд»Ҙе§“зӮәйҹ»иҖҢжҘҠжңүе…ұзҙ„еҹҺеҚ—ж–№д№ӢеҸҘеҫҢж•ёж—ҘйҢІжӯӨе”ұе’ҢжүөеүҚеҝҪжңүдёҖеҗҢдәәи®Җдә‘е…ұйҮЈеҹҺеҚ—ж–№зӣ–йҮЈеӯ—д»Ҙзҙ„еӯ—иҚүдёҚзӣёиҫЁиҖҢи®ҖиҖ…жӮ®д№ӢжҷӮж•ҸеӨ§д»ҘзҲІжғЎдёҚдёүж—Ҙе…¶зҲ¶зңҒдёӯжӯёжҡҙеҚ’еҫҢж•ёжңҲе…¶жҜҚдәҰдәЎдёҰеҗҢеүҚиҢғж”„иҷ•еЈ«жңүеӯҗдёғжӯІдҪңйҡұиҖ…и©©дә‘жҺғи‘үйҡЁйўЁдҫҝжҫҶиҠұи¶Ӯж—ҘйҡӮж–№е№ІиҒһд№Ӣжӣ°жӯӨеҸҜе…Ҙе®ӨеҸҲдҪңеӨҸжҷҜи©©дә‘й–’йӣІз”ҹдёҚйӣЁз—…и‘үиҗҪйқһз§Ӣе№Іжӣ°еҝ…дёҚеӨҖжһңеҚ’еҫҢжңүжӯҗйҷҪеҪ¬д№ӢеӯҗзЁҡйҪ’дҪңз”°зҲ¶и©©дә‘жЎ‘жҹҳж®ҳйҷҪиЈҸе…җеӯ«иҗҪи‘үдёӯе»–еҮқиҰӢд№Ӣжӣ°еҸҜжғңеӨ©жүҚеҗҢиҢғж°Ҹд№Ӣеӯҗгқ·дәҰеҚ’йғЎй–Јйӣ…и«Үй«ҷиӢҘжӢҷе–„и©©еҫһиӘЁиҫҹж–је№•дёӢеҳ—дҪңдёӯз§ӢдёҚиҰӢжңҲдә‘дәәй–“йӣ–дёҚиҰӢеӨ©еӨ–иҮӘеҲҶжҳҺеҫһиӘЁиҰ§д№Ӣи¬Ӯиі”дҪҗжӣ°жӯӨи©©йӣ–еҘҪдёҚеҲ©жүөе·іе°ҮдҫҶдҪҶжҒҗдҳ®жҳҺеҫҢжһңеҰӮе…¶иЁҖеӨ§е®ҡйҢІзҺӢе…ғд№Ӣз”һдҪңз—…й¶ҙдә‘еҹӢзҳһиӮҜеҗҢйёҡйөЎеЎҡйЈӣйіҙдёҚеҲ°йіҜеҮ°жұ е…¶ж–ҮеӯёжүҚи—»зҷ»йҮ‘й–ҖзҺүе ӮдёҚзҲІйӣЈд№ҹз«ҹдёҚиҮіе…¶ең°иҰӢжүөжҳҜзҹЈйқ’з‘ЈйӣҶејөеӯ—йҖҖзҝҒйғҪдёӢдәәжңүиЁҖжҮҗи©©дә‘е‘ҪдәӨйҡЁеҲҶжЁӮеӨ©иіңдёҖз”ҹй–‘еҹёеұӢжңүиҒІиҖҢдёҚз¬¬дәҰи©©д№ӢдңҹзҺӢеҜӮйғҪдёӢдәәйҮҚдҝЎзҫ©е°‘з„¶и«ҫеҳ—ж’«еҠҚйӢҸзӮәд№ӢжӯҢжӣ°дәәй–“еҶүеҶүж··еЎөеҹғиә«еҫҢиә«еүҚдәӢиҺ«зҢңж—©жӮҹжө®з”ҹйғҪжҳҜеӨЈз•¶жҷӮжӮ”еҗ‘еӨЈдёӯдҫҶеҸҲжӣ°з•¶е№ҙеҗҒж°Ји¬ҫеҰӮиҷ№еӣһйҰ–йғҪжӯёеҶ·з¬‘дёӯзҝ зҺүеі°еүҚеҘҪжӯёеҺ»еҸҜжҶҗдёүеҚҒдәҢз§ӢйўЁжҷӮеҜӮе№ҙдёүеҚҒдәҢжҳҺе№ҙеҜӮзҹҘдәӢиҺ«йқһеүҚе®ҡз¬‘еҮәйғҪй–ҖиҖҢеҺ»иҮіеӨӘиЎҢйҰ№иҲҺжҡҙеҚ’еңЁд»•иҖ…йҒӮи‘¬ж–јиҘҝеҙҰдёӢдёҰеҗҢеүҚеҫҗжҢҜз”«иҲҲеҢ–и»Қдәәеұ…жңқдә¬й–ҖеӨ–жңӘз¬¬жҷӮдңҹжӣ°жҠҳзқҖеұӢзҲӣзқҖжӨҪжңқдә¬й–ҖеӨ–еҮәзӢҖе…ғжҢҜз”«е°Үз¬¬иҖҢй–ҖжһңеЈҠй»„иЈійҒ“еӨ«еҚ—еҠҚе·һдәәе®¶еұ…йҫҚжәқжңӘз¬¬й–“жңүдңҹжӣ°жҺҳйҫҚжәқеҮәйҫҚй ӯйҒ“еӨ«е°Үз¬¬иҖҢжәқжһңи„©жөҡиҲҲеҢ–и»ҚжңүеЈәе…¬еұұдңҹдә‘еЈәе…¬еұұиӢҘг«ҒиҺҶз”°жңұзҙ«еҚҠж°ҙйҒ¶еЈәе…¬еұұжӯӨжҷӮж–№еҘҪзңӢи”Ўеҗӣи¬ЁиҲҲж°ҙеҲ©зҒҢж°‘з”°еј•ж°ҙйҒ¶еЈәе…¬еұұзҷ»з¬¬иҖ…жҜ”еүҚеңЁжңқе»·иҖ…еҚҠжңұзҙ«зҹЈжҗңзҘһз§ҳиҰ§йҹ“йӯҸе…¬иө·е ӮжүөеҢ—жұ дёҠж•ҲжЁӮеӨ©еӣ еҗҚжӣ°йҶүзҷҪе Ӯдә”жңҲе ӮжҲҗе…¬иіҰи©©дәҢзҜҮе…¶дёҖеҚ’з« дә‘йң“иЈіжҷӮдәӢйқһеҗҫдәӢдё”еӯёзҶҸй…ЈзҹідёҠзң иҮӘе°”еҜўз–ҫд»Ҙе…ӯжңҲдәҢеҚҒдә”ж—Ҙи–ЁжӯӨи©©йҒӮзҲІзө¶зӯҶж—ЈиҖҢзҘһе»ҹйҒЈдҪҝзү№зҲІзҹіи—Ҹд»Ҙи‘¬е§ӢжӮҹзҹідёҠзң д№ӢеҸҘиӢҘдңҹдә‘е…¬и–ЁеЈ«еӨ§еӨ«жҒЁеӢІеҫід№ӢйӣЈеҗҚзҹҘиҲҮдёҚзҹҘзҡҶзҲІжі«з„¶иҖҢеҳҶжӣ°еӨ©дҪ•дёҚзҲІжҲ‘з•ҷжӯҗйҷҪе…¬зҲІйӯҸе…¬дҪңиӘҢж–ҮиҖҢеҫҢжӯ»д№ҹйҹ“йӯҸе…¬еҲ«йҢІй„ӯжҜ…еӨ«е®ҲжқӯйЎҢеғ§ж–Үз‘©жүҖеұ…еЈҒдә‘иҘҝж№–й »йҖҒе®ўз·‘жіўиҲҹжҘ«иј•жҳҘе…ҘиҳҝйҖ•йқҷжөӘиҠұзҝ»йҖәжҷҙеҸҲдә‘жқұйўЁжұҹйӣІеҢ—йЈӣзҮ•еҗҢеҜ„йқ’жҳҘдёҚзӣёиҰӢеҸҲйЎҢжқӯйғЎй–Јдә‘йӣЁеҪұжЁӘж®ҳзҙ…з§Ӣе®№йҡӮжҳ ж—ҘеҜ’жұҹеё¶жҡ®жөҒжӣүи§’з©ҝйӣІеҮәеі°и—Ҹзҝ еҰӮз№”е®ҝйіҘеҺ»з„Ўиҝ№е°ҒжӣёеҶ©жүҖжҮҗиҒҠжүҳйҮ‘й–ҖзҝјжҷӮй —иЁқе…¶ж°ЈиұЎдёҚйҖәеҫҢи§§жқӯйәҫе°Үиөҙйқ’зӨҫд»Ҙз—…жіҠиҲҹжҘҡе·һиҖҢеҚ’е…¶иӘһе·іе…Ҷж–је…ҲзҹЈзҺүеЈәжё…и©ұеў—дҝ®и©©и©ұзёҪйҫңеҚ·д№ӢдёүеҚҒдәҢзҷҫе®¶и©©и©ұзёҪйҫңеҫҢйӣҶеҚ·д№ӢдёүеҚҒдәҢ, WYG: ''}
