ж—Ҙзҷ»иҳҮд№Ӣй–¶й–Җдә‘е№ҙе…үеҶүеҶүеӮ¬дәәиҖҒйӣІзү©ж¶“ж¶“еҸҲи®Ҡз§Ӣе®¶еңЁйіҜеҮ°еҹҺй—•дёӢжұҹеұұдҪ•дәӢиӢҰзӣёз•ҷеҸҲжӣёе…¶ж—Ғдә‘жұҹеұұз•ҷдәәд№ҹдәәз•ҷжұҹеұұд№ҹеҚ’дёҚз”ЁдәҰи©©д№Ӣдңҹй„ӯжҜ…еӨ«зҪ·зҰҒжһ—иЎҢж¬ЎеҚ—йғҪйҒҮйӣЁзӮәдәҢзҜҮжӣ°йӣЁиҒІйЈ„г«ҒеҝҪеҚ—еҺ»йӣІеӢўж—Ӣз”ҹеҫһеҢ—жөҒжҮүж–ҷеҮүйўЁж¶ҲжҒҜиҝ‘и•ӯи•ӯе·іеңЁжЁ№жўўй ӯеҸҲжӣ°жҰҙзҒ«зҮ’з©әжңӘж“¬дј‘еҝҪй©ҡеҝ«йӣЁз ҙжё…з§ӢжҷҡйӣІж·Ўж·Ўи¶ӮиҗҪж—ҘеҸӘеҲ°жҘҡжұҹеҚ—еІёй ӯеғ§ж–Үз‘©иҰӢд№ӢиЁқе…¶ж°ЈдёҚжҢҜи§ЈйҢўеЎҳиөҙйқ’зӨҫеҚ’жҘҡе·һеҙ”зҺ„и««иӯ°жңүеӯҗеҗҚеӢүиҲҮи¶ҷеҸ”е№іеҗҢе№ҙзҷ»з¬¬иҪүеӨ§зҗҶи©•дәӢйҒҺеӨ©жҙҘж©ӢеўңйҰ¬жҷӮйӣҶиіўйҹ“е…¬иҲҮи¶ҷеҗҢзӮәй–Ӣе°ҒеәңжҺЁе®ҳйҹ“еҙ”еЈ»д№ҹиҒһе…¶еўңйҰ¬йҒҪеҫғзңЎд№ӢдҪҶеҳ”иЎҖдёҚжӯўж•ёж—ҘйӨЁжүөйҹ“иҲҺеӣ дҪңи©©жӣ°иә«йҡҸиҠұйңІйҮҚе‘ҪйҖҗи—•зөІиј•жҳҺжңқйўЁйӣЁйңҪжӯёи·ҜеңЁдёүжё…жҳҺж—ҘжһңеҚ’жҷӮжңүгЈІйўЁзҙ°йӣЁзӣ§еӨҡйҒңж–№дёұи§’е…¶зҲ¶жҗәе°ұйӣІйҷҪи§Җе°ҸеӯёиҲҮзҫӨе…җиҰӢе»ўеЈҮдёҠжңүеҸӨз°ҪдёҖзӯ’з«¶еҫғжҠҪд№ӢзӮәжҲҜеӨҡйҒңе°ҡжңӘиӯҳеӯ—жҠҪдёҖз°ҪжӯёзӨәе…¶зҲ¶и©һжӣ°иә«еҮәдёӯжӣёе Ӯй Ҳеӣ еӨ©ж°ҙзҷҪзҷ»д»ҷдә”еҚҒдәҢзөӮзӮәи“¬еі¶е®ўзҲ¶иҰӢд№Ӣй —ж„Ҹд»ҘзӮәеҗүе…ҶиҝЁдҪңзӣёиҲҮз§ҰзҺӢдәӢж•…ж•—е§Ӣеӣ йҒЈе ӮеҗҸи¶ҷзҷҪйҒӮз«„еҚ—иҚ’еҚ’дәҺжңұеҙ•е№ҙдә”еҚҒдәҢз„ЎдёҖеӯ—д№Ӣе·®дёҰеҗҢеүҚеҡҙжғІеӯ—еӯҗйҮҚе–„зӮәи©©еҳ—жңүи©©дә‘жҳҘе…үеҶүеҶүжӯёдҪ•иҷ•жӣҙеҗ‘иҠұеүҚжҠҠй…’зӣғзӣЎж—Ҙе•ҸиҠұиҠұдёҚиӘһзӮәиӘ°йӣ¶иҗҪзӮәиӘ°й–ӢзҙҜиҲүдёҚз¬¬еҚ’жүөе‘үдёӯеҚ—йғЁж–°жӣёжұқе·һеҠүе»·иҠқеӯ—еёҢеӨ·иӢҰзҜҮи© е–„зӮәй–Ёеё·д№ӢдҪңи©һе“ҖеӨҡдјјеҸӨиӘҝй«”еӢўиҲҮжҷӮдёҚеҗҲйҒӮдёҚзӮәдәәжүҖйҮҚеёҢеӨ·зҫҷе§ҝиІҢе–„еҪҲзҗөзҗ¶еҘҪй…’иүІиҗҪйӯ„дёҚжӢҳеёёдҝ—зӮәзҷҪй ӯеҗҹеҝҪдҪңдёҖиҒ®иӘһжӣ°д»Ҡе№ҙиҠұиҗҪйЎ”иүІж”№жҳҺе№ҙиҠұй–ӢиӘ°еҫ©еңЁж—ЈиҖҢеҫ©еҳҶжӣ°жҲ‘жӯӨиӘһдјјдңҹзҹіеҙҮжӣ°зҷҪйҰ–еҗҢжүҖжӯёеҫ©дҪ•жүҖз•°д№ғйҷӨд№Ӣеҫ©дҪңдәҢеҸҘжӣ°е№ҙе№ҙжӯІжӯІиҠұзӣёдјјжӯІжӯІе№ҙе№ҙдәәдёҚеҗҢеҫ©жӯҺжӣ°жӯ»з”ҹжңүе‘ҪиұҲеҫ©з”ұжӯӨд№ғе№¶з•ҷеүҚеҸҘдҪңи©©еҫҢжӯІйӨҳзҲІеҘёдәәжүҖе®ійҡӢй•·еӨҖе№ҙдёӯжңүй„ӯе·һй„ӯиңҖиі”йўЁжөҒеҗҚеЈ«й —е–„дә”иЁҖи№үи·Һйғ·й–ӯдёҚжұӮиҒһйҖ№еһӮжҺӣеҶ йҒёжҺҲжұҹе·ҰдёҖе°үиҮЁеҺ»иі”еҸӢзҘ–йӨһиҮідёҠжқұй–Җз•ҷеҲ«жӣ°з•ҸйҖ”ж–№иҗ¬йҮҢз”ҹж¶Ҝиҝ‘зҷҫе№ҙдёҚзҹҘе°ҮзҷҪйҰ–дҪ•иҷ•е…Ҙй»„жіүй…’й…ЈиҮӘи© иҒІиӘҝе“Җи№ҷеҗҲеқҗе—ҡе’ҪеҚ’жүөе®ҳжҷӮдәәжҜ”д№ӢеҠүе»·иҠқеҗҢеүҚг“ӮиҗҠе…¬еҲқзҲІе®»еӯёж–№е№ҙе°‘еҫ—ж„ҸеҒ¶, 