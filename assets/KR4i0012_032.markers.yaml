  - {type: variant, offset: 1315, length: 1492, content: 江南曲其句有江南春盡離腸㫁蘋滿汀洲人未歸日暮江頭一望時愁情不㫁如春水之類音皆悽愴末年果南遷拾遺孫咸不知何許人而長於預知災異又善為詩開寳初客于九江因逰廬山有詩留題九天使者廟云獨入玄宫禮至真焚香不為賤貧身秦淮两㟁沙埋骨湓浦千家血染塵廬阜烟霞誰是主虎溪風月屬何人九江太守勤王事好放天兵渡要津不踰數年金陵板蕩九江重闈人受塗炭並應此詩咸後卒於南昌衆人棄尸扵江中泝流而上咸異之蘇易簡罷翰林學士以禮部侍郎知南陽日年未四十屢有閒冷之嘆有老僧獨處外城古寺通儒術能詩故公與詩曰憔悴今年三十六與師氣味不争多未㡬而卒二宋以文章齊名天下子京守蜀日作詩三百名曰猥藁有碧雲謾有三年信明月空爲两地愁後卒不入两地人以爲詩䜟王元澤少時作白苧行有云君心莫厭頻歡樂請看雲間日西入議者謂羙則羙矣然日西光景無多近乎䜟果不永夀王鼎湖湘人字則之季父多㳺江左有洪州西山詩云林泉空有東西路風月難㝷十二家議者謂必無名第後果然嘗作鸂鶒詩云棲息應難近小池性靈閒雅衆禽希蒲洲日暖依花立漁浦烟深貼浪飛遺羽參差沾水沬餘蹤稠叠印苔衣晚來林徑㣲風起何處相呼着對歸狄渙孤鴈云更無聲接續空有影相隨聞此句者皆云必無後果如其言並同前陳無巳賦高軒過詩云晚知書畫真有益却恠歲月來無多不數月遂卒直方詩話秦少㳺紹聖初請外以校勘為杭倅方至楚泗間有詩云平生逋欠僧房睡准擬如今處處還詩成之明日以言者落職監處州酒人以為詩䜟東坡有送戴蒙赴成都玉局觀詩云莫欺老病未歸身玉局他年第㡬人又有過嶺一篇云劍南西望七千里乗興真為玉局逰後卒於是觀方元脩字時敏一日與楊信祖饒次守過余坐中分題人以姓為韻而楊有共約城南方之句後數日録此唱和扵前忽有一同人讀云共釣城南方盖釣字以約字草不相辨而讀者悮之時敏大以爲惡不三日其父省中歸暴卒後數月其母亦亡並同前范攄處士有子七歲作隱者詩云掃葉隨風便澆花趂日隂方干聞之曰此可入室又作夏景詩云閒雲生不雨病葉落非秋干曰必不夀果卒後有歐陽彬之子稚齒作田父詩云桑柘殘陽裏児孫落葉中廖凝見之曰可惜天才同范氏之子㝷亦卒郡閣雅談髙若拙善詩從誨辟於幕下嘗作中秋不見月云人間雖不見天外自分明從誨覧之謂賔佐曰此詩雖好不利扵巳將來但恐䘮明後果如其言大定録王元之甞作病鶴云埋瘞肯同鸚鵡塚飛鳴不到鳯凰池其文學才藻登金門玉堂不爲難也竟不至其地見扵是矣青瑣集張字退翁都下人有言懐詩云命交隨分樂天賜一生閑埸屋有聲而不第亦詩之䜟王寂都下人重信義少然諾嘗撫劍鋏為之歌曰人間冉冉混塵埃身後身前事莫猜早悟浮生都是夣當時悔向夣中來又曰當年吁氣謾如虹回首都歸冷笑中翠玉峰前好歸去可憐三十二秋風時寂年三十二明年寂知事莫非前定笑出都門而去至太行馹舎暴卒在仕者遂葬於西崦下並同前徐振甫興化軍人居朝京門外未第時䜟曰折着屋爛着椽朝京門外出狀元振甫將第而門果壊黄裳道夫南劍州人家居龍溝未第間有䜟曰掘龍溝出龍頭道夫將第而溝果脩浚興化軍有壺公山䜟云壺公山若㫁莆田朱紫半水遶壺公山此時方好看蔡君謨興水利灌民田引水遶壺公山登第者比前在朝廷者半朱紫矣搜神秘覧韓魏公起堂扵北池上效樂天因名曰醉白堂五月堂成公賦詩二篇其一卒章云霓裳時事非吾事且學熏酣石上眠自尔寢疾以六月二十五日薨此詩遂爲絶筆旣而神廟遣使特爲石藏以葬始悟石上眠之句若䜟云公薨士大夫恨勲徳之難名知與不知皆爲泫然而嘆曰天何不爲我留歐陽公爲魏公作誌文而後死也韓魏公别録鄭毅夫守杭題僧文瑩所居壁云西湖頻送客緑波舟楫輕春入蘿逕静浪花翻逺晴又云東風江雲北飛燕同寄青春不相見又題杭郡閣云雨影横殘紅秋容隂映日寒江帶暮流曉角穿雲出峰藏翠如織宿鳥去無迹封書冩所懐聊托金門翼時頗訝其氣象不逺後觧杭麾將赴青社以病泊舟楚州而卒其語巳兆於先矣玉壺清話増修詩話總龜卷之三十二百家詩話總龜後集卷之三十二, WYG: ''}
