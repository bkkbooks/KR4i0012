  - {type: line-break, offset: 0, content: '', id: KR4i0012_SBCK_032-1a01}
  - {type: variant, offset: 0, length: 8, content: 增修詩話總龜卷之, WYG: ''}
  - {type: variant, offset: 5, length: 1, content: 龜, SBCK: 􅀛}
  - {type: variant, offset: 11, length: 1314, content: 詩䜟門下孟津詩人李讀字長源一日自孟津訪魏仲先曰數宿前有人在床下誦曰行到水窮處未知天盡時予斥其悞曰豈非坐看雲起時耶答曰此雲安能起也茲必死期故來相别痛飲數日而卒古今詩話丁晋公摠章聖陵事翰林學士李維援其親識爲挽郎懇請扵晋公曰更在陶鉒丁應聲曰隔鉒復陶鑄齋郎又挽郎自然堪下淚何必到斜陽未㡬丁敗張唐卿進士第一人登科期集於興國寺題詩句扵壁曰一舉首登龍虎榜十年身到鳯凰池有人續云君看姚曄并梁固不得朝官未可知後果終於京官趙嘏嘗有詩云早晚粗酬身事了水邉歸去一閒人止扵渭南尉以其精扵詩時謂之趙渭南如韋蘇州云孫秀旣恨石崇不與緑珠又憾潘岳昔遇不以禮復遭遇晋武帝遂同日收䂖崇歐陽堅潘岳送市石謂潘曰安仁復爾耶潘曰可謂白首同歸也潘金谷集云投分寄石友白首同所歸亦其䜟也庾亮出石頭城百姓歌於岸上曰庾公上武昌翩翩如飛鳥庾公還揚州白馬牽旒旐果㝷卒來鵬詩思清䴡韋岫尚書常愛其才逰蜀夏課卷中有云一夜緑荷風剪破賺他秋雨不成珠識者以為不祥是年果失志丁晋公自崖召還有寄友人詩曰九萬里鵬重出海一千年鶴再歸巢句徤意清然議者曰謂鵬䖏於海為得地出海則失水鶴返其巢則不能翺翔矣卒如其說又扈從東封嘗聞柰何黒水人間隂獄也感其事而為詩曰黒水溪旁聊駐馬柰何岸上試回頭高崕昏處是隂獄須信人生到此休非佳兆也丁晋公為侍中時嘗作詩曰千金家累非良寳一品官高是強名未㡬奪爵籍没初釋褐為饒倅同年白稹為判官稹一日以片𥿄假緡伍鐶扵公公笑曰牓下新婚京國冨室豈無半千質物耶懼我撓之故矯耳扵間尾書一絶戯之曰欺天行止吾何有立地機關子太乖五百青蚨两家闕赤洪崖打白洪崕朱崕之行兆扵此蘇子羙失意秋日登蘇之閶門云年光冉冉催人老雲物涓涓又變秋家在鳯凰城闕下江山何事苦相留又書其旁云江山留人也人留江山也卒不用亦詩之䜟鄭毅夫罷禁林行次南都遇雨為二篇曰雨聲飄㫁忽南去雲勢旋生從北流應料凉風消息近蕭蕭巳在樹梢頭又曰榴火燒空未擬休忽驚快雨破清秋晚雲淡淡趂落日只到楚江南岸頭僧文瑩見之訝其氣不振解錢塘赴青社卒楚州崔玄諫議有子名勉與趙叔平同年登第轉大理評事過天津橋墜馬時集賢韓公與趙同為開封府推官韓崔壻也聞其墜馬遽徃眡之但嘔血不止數日館扵韓舎因作詩曰身随花露重命逐藕絲輕明朝風雨霽歸路在三清明日果卒時有㣲風細雨盧多遜方丱角其父携就雲陽觀小學與群児見廢壇上有古簽一筒競徃抽之為戯多遜尚未識字抽一簽歸示其父詞曰身出中書堂須因天水白登仙五十二終為蓬島客父見之頗意以為吉兆迨作相與秦王事故敗始因遣堂吏趙白遂竄南荒卒于朱崕年五十二無一字之差並同前嚴惲字子重善為詩嘗有詩云春光冉冉歸何處更向花前把酒盃盡日問花花不語為誰零落為誰開累舉不第卒扵呉中南部新書汝州劉廷芝字希夷苦篇詠善為閨帷之作詞哀多似古調體勢與時不合遂不為人所重希夷羙姿貌善彈琵琶好酒色落魄不拘常俗為白頭吟忽作一聮語曰今年花落顔色改明年花開誰復在旣而復嘆曰我此語似䜟石崇曰白首同所歸復何所異乃除之復作二句曰年年歲歲花相似歲歲年年人不同復歎曰死生有命豈復由此乃并留前句作詩後歲餘爲奸人所害隋長夀年中有鄭州鄭蜀賔風流名士頗善五言蹉跎郷閭不求聞逹垂掛冠選授江左一尉臨去賔友祖餞至上東門留别曰畏途方萬里生涯近百年不知將白首何處入黄泉酒酣自詠聲調哀蹙合坐嗚咽卒扵官時人比之劉廷芝同前㓂萊公初爲宻學方年少得意偶, WYG: 宋阮閲}
