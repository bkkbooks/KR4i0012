  - {type: variant, offset: 3737, length: 1, content: 卷, WYG: 巻一宋阮閲撰御製王師圍金陵唐使徐鉉来朝鉉伐其能欲以口舌解圍又盛稱其主博學多藝有聖人之能使誦其詩曰秋月之篇天下誦傳之其句云云太祖大笑曰寒士語耳吾不道也鉉内不服謂大言無實可窮也遂於殿上驚惧相目太祖曰吾㣲時自秦中歸道花下醉卧田間覺而月出有句曰未離海底千山黒纔到天中萬國明鉉大驚殿上稱夀後山詩話故事進士期集常擇榜中最年少者為探花郎熈寕中始罷之太平興國三年胡秘監旦榜馮文懿拯為探花是嵗登第七十四人太宗以詩賜之曰二三千客裏成事七十四人中少年始唐以禮部放榜故座主門生之禮特盛主司因得竊市私恩上稍欲革其弊既更廷試前一嵗吕文穆公䝉正為状頭始賜以詩蓋示以優寵之意至是復賜文懿然状頭詩迄今時有探花詩後無繼者惟文懿一人而已最為科舉之盛事也蔡寛夫詩話太平興國七年十二月十七日大雪御製雪詩并酒賜學士詩云輕輕相亞凝如酥宫樹花粧萬萬株今賜酒卿時一盞玉堂聞話道情無又御製五七言詩賜蘇易簡五言詩曰翰林承㫖貴清净玉堂中應用咸依式深岩比更崇歸家思值日入内集英風儒雅門生盛髙明大化雄七言詩曰運偶昌時逺更深果然榖在我中心從風臣偃光朝野此日清華見翰林舉措樂時周禮法思賢教古善規箴少年學士文明世一寸賢毫數萬尋金坡遺事石林詩話楊文公在翰林去職真宗眷之不衰即起為郡未㡬復以判秘書監召既到闕以詩賜之曰𤨏闥往年司制誥共嘉藻思類相如蓬山昔日詮墳史還仰多聞過仲舒報政列城歸覲後䟽恩髙閣拜官初諸生濟濟彌瞻望鈆槧咨詢辨魯魚祖宗愛惜人才保全忠孝之意如此䂬溪大中祥符五年楊億為學士季夏被疾至十月方赴朝叅具状稱謝御筆状尾批七言二韻詩賜之詩云承明近侍究儒𤣥苦學勞心疾巳痊善保興居調飲食副予前席待名賢金坡遺事大中祥符二年春真宗御製詩賜知貢舉晁逈云禮闈選士古稱難都為升沉咫尺間較藝清時公道在掄材應得恵人寰五年二月又製詩賜知貢舉晁逈云盛時選士貢闈開殿宇聞風獻藝来心似權衡求實効勿教蓬蓽有遺才同上天禧三年正月九日錢惟演承明殿面奉知舉真宗御製詩并序云卜賢能之多士允協盛猷資侍從之鴻儒書伸藻鑑期申職業用示篇章詩云寅奉昌圖紹慶基選掄多士叶前規鄉閭薦拔期無濫草澤搜羅詎有遺徳舉况逢全盛日計偕咸造廣塲時春官任職當求善宗伯掄材務得宜侍從名儒當委任藝文公道辯妍􅎀佇伸衡鑑裁深念允恊菁莪樂育詩金坡遺事二月十八日将放榜賜詩并序序云詳延造士允叶於盛猷乃眷儒臣式分於重寄論秀才臻於顯効當官備著於純誠詩云四海為家寳緒隆旁求文雅振儒風命鄉随計来多士較藝掄材有澤宫簮紱近臣當顯任絲綸深㫖論丹衷旰霄汲汲予存念夙夜孜孜爾狥公名實豈惟衡鑑内賢能皆萃網羅中佇觀翹楚登時用布政分優恊庶功同上真宗賦御溝栁詩令宰相兩省和進陳執中詩曰一度春来一度新翠光長得照龍津君王自愛天然態恨殺昭陽學舞人其詩最尤者西朝寳訓神宗遵太祖遺意聚積金帛成帑自製四言詩一章云五季失圖獫狁孔熾藝祖造邦意有懲艾爰設内府基以募士曽孫保之敢忘厥志毎庫以一字目之又别置詩二十字分揭其上曰毎䖍夕惕心妄意遵遺業顧予不武資何以成戎捷後來所謂御前封椿庫者也上意用此以為開拓西北境土之資始命王韶克青唐然後欲經理銀夏復取燕雲元豐五年徐禧永洛衂師之後帝心弛矣林徳裕陵遺事云前輩云詩有奪胎換骨之説信有之也杜陵謁老子廟一聨云五聖聨龍衮千官列雁行亦以雁行對龍衮然語中的其親切過於本詩兹不謂之奪胎可乎不然則徒用前人之語殊不足貴且如沈佺期云小池殘暑退髙樹早涼歸非不佳也然正用栁惲太液微波起長楊髙樹秋之句耳蘇子美峽束滄淵深貯月巖排紅樹巧粧秋非不佳也然正用杜陵峽束滄江起巖排石樹圓之句耳語雖工而無别也藝苑雌黄光堯初幸錢塘有詩云六龍轉淮海萬騎臨吳津王者本無外駕言蘇逺民瞻彼草木秀感此瘡痍新登堂望稽山懐哉大禹勤大哉之言有於天下漢祖大風之歌唐宗動草之句不足道也詩説雋永賡和東萊賡和皇帝幸祕書詩麟閣龍旂日月章中興再見赭袍光仰觀焜耀人文盛始識扶持徳意長功利從今卑管晏浮華自昔陋盧王願求實學酬天造肯効明河織女襄文集御燕嘉祐七年冬宴近臣于羣玉殿英宗以皇子預坐在舍人待制之後岐公詩云翠輦生香容扈蹕黃金塗紙看揮毫介甫云何不言翠玉裝輿岐公改之以進復齋漫録神廟時經月每夕有赤氣見西北隅如火至人定乃滅人謂皇子生之祥故禹玉作大燕樂詞云未曉清風生殿閣經旬赤氣照乾坤未幾皇子生大燕羣臣於集英殿文正公日録榮遇門蘇參政易簡取開封解時宋尚書白為試官是歳狀頭登第後十年白為翰林學士易簡以繼召入故易簡贈白詩云天子昔取士先後分􅎀妍濟濟俊兼秀師師麟與鸞小子最承知同輩尋改觀甲等叨薦名髙飛便凌煙遂使拜扆坐果得超神仙迄今纔七嵗相接乗華軒慶厯二年歐陽文忠公為别頭試官王文恭公預薦至嘉祐初文忠在北門文恭亦同院仍同知貢舉故文恭詩有十五年前門下客最榮今日預東堂之句座主門生同列固儒者盛事而玉堂尤天下文學之極選國朝以来惟此二人前此所未有也蔡寛夫詩話嘉祐二年余與端明韓子華翰長王禹玉侍讀范景仁龍圖梅公儀同知禮部貢舉辟梅聖俞為小試官凡鏁院五十日六人者相與唱和為古律歌詩一百七十餘篇集為三巻禹玉余為校理時武成王廟所解進士也至此新入翰林與余同院又同知貢舉故禹玉贈余云十五年前出門下㝡榮今日預東堂余荅云昔時叨出武成宫曽看揮毫氣吐虹夢寐閑思十年事笑談今日一樽同喜君今賜黄金帶顧我新為白髮翁也天聖中余舉進士國學南省皆忝第一人薦名其後景仁相繼亦然故景仁贈余云淡墨題名第一人孤生何幸繼前塵也聖俞自天聖中與為詩友余嘗贈云猶喜共量天下士亦勝東野亦勝韓而子華筆力豪贍公儀文思温雅而敏捷皆勍敵也前此有南省試官者多窘束條制不少放懐余六人者懽然相得羣居終日長篇險韻衆製交作筆吏疲於寫錄僮史奔走往来間以滑稽嘲謔加於風刺更相酧酢往往哄堂絶倒自謂一時盛事此前未之有也歸田録詩話總龜後集巻一欽定四庫全書詩話總龜後集巻二宋阮閱撰忠義門世人論淵明自永初以後不稱年號秖稱甲子與思侻所論不同觀淵明讀史九章其間皆有深意其尤章章者如夷齊箕子魯二儒三篇夷齊云天下革命絶景窮居正風凌俗爰感懦夫箕子云去鄉之感猶有遲遲矧伊代謝觸物皆非魯二儒云易代随時迷變則愚介介若人特為正夫由是觀之則淵明委身蓬巷甘黔婁之貧而不自悔者豈非以恥事二姓而然也葛常之子美詩雖有古殿存世尊亦䝉埃山僧衣藍縷告訴棟梁摧本即所賦自然及於乗輿䝉塵股肱非材之意忠義所激一飯不忘君邪黄常明明宗召蜀中舊臣賦蜀主降巨唐詩王偕等譏荒滛獨中丞牛希濟曰唐主再懸新日月蜀王難保舊山川明宗曰希濟不忘君親忠孝也賜百叚余謂希濟但能兩解之辭而已江革云不能殺身報主得死為幸誓不為人執筆此可以厲臣子之節碧溪詩人比雨如絲如膏之類甚多至杜牧乃以羽林鎗為比恐未盡其形似念昔逰云雲門寺外逢猛雨林黒山髙雨脚長曽奉郊宫為近侍分明􅋏􅌶羽林鎗大雨行云四面明騰玉京仗萬里横互羽林鎗豈去國凄㫁之情不能忘雞翹豹尾中耶丹陽集栁遷南荒有云愁向公筵問重譯欲投章甫作文身太白云我似鷓鴣易南遷懶北飛皆褊忮躁辭非畎畝惓惓之義杜詩云馮唐雖晩逹終凱在皇都愁来有江水焉得北之胡其賦張曲江云歸老守故林戀闕悄延頸乃心王室可知黄常明世俗誇太白賜床調羮為榮力士脫靴為勇愚觀唐宗渠渠於白豈真樂道下賢者哉其意急得艶詞媟語以悅媍人耳白之論撰亦不過玉樓金殿鴛鴦翡翠等語社稷蒼生何賴就使滑稽傲世然東方生不忘納諌况黄屋既為之屈乎說者以謀謨潜宻厯考全集愛國憂民之心如子美語一何鮮也力士閨闥腐庸惟恐不當人主意挟主勢駈之何所不可脫靴乃其職也自退之為蚍蜉撼大樹之喻遂使後學吞聲余竊謂如論其文章豪逸真一代偉人如論其心術事業可施廊廟李杜齊名真忝竊也䂬溪汲長孺叚太尉皆義勇奮不顧身之人至於仁愛撫養矜憐惻怛無所不至所謂剛者必仁仁者必勇也嘗觀樂天云况多剛狷性難與世同塵希文云吾生豈不幸所禀多剛腸皆心中語也白則有敢辭為俗吏且欲活疲民又云心中有念農桑苦耳裏如聞飢凍聲范有寸懐如春風思與天下共赴姑蘇云豈辭雲水三千里由濟瘡痍十萬民與汲叚正相似黄常明靈徹有相逢盡道休官去林下何曽見一人世傳為口實凡語及抽簮即以此譏之余謂矯飾罔人固不足論若出於至誠時對知已一吐心胷何害觀昌黎送盤谷云行抽手板付丞相不待彈劾歸農桑贈侯喜便當提擕妻與子南入箕潁無還時如今便當去咄咄無自痴如今更誰恨可便耕㶚涯此類凡數十豈茍以飾口哉其剛勁之操不少屈所守素定故也䂬溪永叔嘗試謁執政坐中賦雪詩云主人與國共憂戚豈惟喜悅将豊登須怜鐵甲冷徹骨四十餘萬屯邊兵當時乃謂唐韓退之亦能道言語其預裴晉公宴㑹但云園林窮勝事鐘鼓樂清時不曽如此作閙殊不知老杜一言一詠未曽不在於憂國恤人物我之際則淡然無著夏日歎曰浩蕩想幽薊王師安在哉夏夜歎曰念我荷戈士窮年守邊疆此仁人君子之用心終食不可忘也邊兵之語豈為過哉如退之始知神官未賢聖護短憑愚要我敬雪徑抵樵叟風廊折談僧真作閙詩也䂬溪余觀楚國先賢𫝊言汝南應璩作百一詩譏切時事編以示任事者皆怪愕以為應焚棄之及觀文選所載璩百一篇畧不及時事何耶又觀郭茂倩雜體詩載百一詩五篇皆璩所作首篇言馬子侯解音律而以陌上桑為鳳將雛二篇傷翳桑二老无以葬妻子而已無宣孟之徳可以賙其急三篇言老人自知桑榆之景斗酒自勞不肯為子孫積財末篇即文選所載是也第四篇似有諷諫所謂茍欲娛耳目快心樂腹腸我躬不悦懽安能慮死亡此豈非所謂應焚棄之詩乎方是時曹爽事多違法而璩為爽長史切諫其失如此所謂百一者庶幾百分有一補于爽也而爽卒不悟以及于禍或謂以百言為一篇者以字數而言也或謂百者數之終一者數之始士有百行終始如一者以士行而言也然皆穿鑿之説何足論哉後何遜亦有擬百一體所謂靈輒困桑下於陵拾李螬其詩一百十字恐出于或者之説然璩詩每篇字數各不同第不過四十字爾丹陽集杜扁舟空老去無補聖明朝又云報主心已老以稷契人而使老棄閒曠非唯不形怨望且惓惓如此彼遭時遇主言聽計從復幸年鬢未暮而不能攄誠戮力以圖報効良不愧此歟䂬溪明朝有封事數問夜如何此幸而得之坐以待旦之意避人焚諫草騎馬欲雞栖所謂嘉謀嘉猷入告爾后于外曰斯謀斯猷惟我后之徳也黃常明一朝自罪已萬里車書通此與無逸旅獒孟子格君心之非汲長孺諫上多慾魏鄭公十漸陸宣公奉天詔書無二道也同上昌黎云詣闕二上書臣非黃冠師臣有膽與氣不忍死茅茨韋應物送李山人云聖朝多遺逸披膽謁至尊豈是貪寵榮誓將救元元梅聖俞贈師謩云臣豈為身謀而邀陛下惓是皆急於得君非為利禄計者也同上杜詩公若登台輔臨危莫愛身寄裴道州蘇侍御云致君堯舜付君等早據要路思捐軀此公素所蓄積而未及施設者故樂以語人耳夫全軀碌碌之臣果何能為汲長孺云天子置公卿寧令従諛承意縱愛身柰辱朝廷何任遐曰褚彦囬保妻子愛性命遐能制之觀此以騐二詩信有證矣自比稷契豈為過哉岑侍御行軍詩平生抱忠義不敢私㣲軀范文正公云一入諌諍司鴻毛忽其身䂬溪世人喜子美造次不忘君嘗觀其祖審言除夜云還将萬億夀更謁九重城則教忠之家風舊矣張堯佐以進士擢第累官至屯田員外郎知開州㑹其姪女有寵於仁宗冊為脩媛堯佐遂驟遷擢一日中除宣徽節度景靈羣牧四使是時御史唐介上䟽引天寳楊國忠為戒不報又與諫官包拯呉奎等七人論列殿上既而御史中丞留百官班欲以廷諍卒奪堯佐宣徽景靈両使特加介一品服以旌敢言未㡬堯佐復除宣徽使知河陽唐謂同列曰是欲與宣徽而假河陽為名耳我曹豈可中巳邪同列依違不前唐獨争之不能奪仁宗諭曰差除自是中書介遂極言宰相文彦博以燈籠錦媚貴妃而致位宰相今又以宣徽使結堯佐請逐彦博而相富弼又言諫官觀望挟姦而言涉宫掖語甚切直仁宗怒趣召兩府以疏示之介猶諍不巳樞宻副使梁適叱介使下殿介諍愈切仁宗大怒玉音甚厲共恐禍出不測是時蔡襄脩起居注立殿陛即進曰介誠狂直然納諌容言人主之美徳必望全貸遂貶春州别駕翊日御史中丞王舉正救解之改為英州别駕始上怒未巳兩府竊議曰必重貶介則彦慱不安彦慱去即吾屬遞遷矣既而果如其料當是時梅堯臣作書竄詩曰皇祐辛夘冬十月十九日御史唐子方危言初造膝曰朝有巨姦臣介所憤疾願條一二事臣職敢妄率宰相文彦慱邪行世莫匹曩時守城都委曲媚貴暱銀璫揷左貂窮臘便馳驛邦媛将夸侈中金齎十鎰為我寄使君竒文織纎宻遂傾西蜀巧日夜擊鞭朴紅絲緯金縷排科闘八七比比雙蓮華篝燈戴星月幾日成一端持行如􅄦疾明年觀上元被服穏稱質璨然奪上目遽爾有薄詰既聞所從來接對似未失且云奉至尊於妾豈能必遂回天子顔百事容丐乞臣今得粗陳狡猾彼非一偷威與賣利次第推甲乙是惟隂猾雄仁㫁宜勇黜必欲致太平在列無如弼弼亦昧平生况臣不阿屈臣言天下公奚以身自䘏君旁有側目喑啞横詆叱指言為罔上廢汝還蓬蓽是時白此心尚不避斧鑕雖令禦魑魅甘且同飴宻既知弗可惧復以強詞窒帝聲亦大厲論奏不容畢介也容甚閑猛士膽為慄立貶海外春速欲為異物内外官恟恟陛下何未悉即敢救者誰襄執左右筆謂倘不包容盛美有所咈平明中執法懐疏又堅述介言或似強百豈無一實恐傷四海和幸勿苦倉卒亟許遷英山衢路猶嗟咄翊日宣白麻稱决口盈溢阿附連諌官去若壊絮虱其間因獲利竊笑等蚌鷸英州五千里瘦馬行䭿䭿毒蛇噴曉霧晝與嵐氣沒妻孥不同途風浪過蛟窟存亡未可知雨舘愁傷骨飢僕時後先隨緣拾橡栗粤林多蔽天黄柑雜丹橘萬室通釀酤撫逺無禁律醉去不論錢醒来等鳴瑟山水仍竒怪已可消憂欝莫作楚大夫懐沙自沉汨西漢梅子真出為呉市卒市卒且不慚况兹别乗秩始堯臣作此詩不敢示人及歐陽脩為編其集時有嫌避又削去此詩是以少人知者故今全録焉東軒筆録鄭谷與僧齊已黄損等共定今體詩格云凡詩用韻有數格一曰葫蘆一曰轆轤一曰進退葫蘆韻者先二後四轆轤韻者雙出雙入進退韻者一進一退失此則繆矣余按倦逰雜録載唐介為䑓官廷疏宰相之失仁廟怒謫英州别駕朝中士大夫以詩送行者頗衆獨李師中待制一篇為人傳誦詩曰孤忠自許衆不與獨立敢言人所難去國一身輕似葉髙名千古重於山並逰英俊顔何厚未死姦諛骨巳寒天為吾君扶社稷肯教夫子不生還此正所謂進退韻格也按韻畧難字第二十五山字第二十七寒字又在二十五而還又在二十七一進一退誠合體格豈率爾而為之哉近閱冷齊夜話載當時唐李對荅話言乃以此詩為落韻詩葢渠伊不見鄭谷所定詩格有進退之說而妄為云云也素緗雜記唐介始彈張堯佐諫官皆上疏及彈文彦博則呉奎畏縮不全當時謂拽動陣脚及唐争論於上前遂并及奎之背約執政又黜奎而文潞公益不安遂罷政事時李師中詩送唐有並逰英俊顔何厚未死姦諛骨已寒之句為奎發也東軒詩話總龜後集巻二欽定四庫全書詩話總龜後集巻三宋阮閱撰孝義門徐師川詩云楚漢紛争辨士憂東歸那復割鴻溝鄭君立義不名籍項伯胡顔肯姓劉謂項伯籍之近族乃附劉而背項鄭君已為漢臣乃違漢而思楚也余嘗論之曰方劉項之勢雌雄未决也其間豈無容容狡詐之士首鼠兩端以觀成敗而為身謀者乎項伯是也其意以謂項氏得天下則吾嘗以宗族從軍畫䇿定計豈吾廢哉劉氏得天下則鴻門之㑹吾嘗舞劍以蔽沛公矣廣武之㑹吾嘗勸勿烹太公矣劉氏豈吾廢哉髙祖之封項伯殆以此也至鄭君則不然事籍籍死屬漢髙祖諸故楚臣名籍鄭君獨不奉詔乃盡拜名籍者為大夫而逐鄭君觀此則鄭君與項伯賢佞可見髙祖或逐或封皆徇情之好惡則知戮丁公者一時矯激之為也王儉七志曰宋髙祖逰張良廟並命僚佐賦詩謝瞻所賦冠于一時今載於文選者是也其曰鴻門銷薄蝕陔下隕欃槍爵仇建蕭宰定都䕶儲皇肇允契幽叟飜飛指帝鄉則子房輔漢之䇿盡於此數語矣王荆公云素書一巻天與之榖城黄石非吾師固陵解鞍聊出口捕取項羽如嬰兒従来四皓招不得為我立弃商山芝用亦此數事而論議格調出於常等東坡論子房袖搥之事以謂良不為伊吕之謀而倖出於荆軻聶政之計以余觀之此良少年之銳氣未足以咎良也圯上授書之後所見豈前比哉葛常之予曽祖通議兄弟四人取良辰美景賞心樂事之義作四并堂于東園故通議詩云華圃控弦秋學射寒窻留燭夜抄書良辰美景饒心事歡日相并樂起予先祖清孝公兄弟六人取三荆同林之義作培荆亭于西園當時篇詠無存者清孝安遇集中有倍荆亭記其畧云西園椎輪無亭觀之玩伯兄欲糾合叔季同耳目之適於是基盈尺之髙宏一筵之廣列檻為亭號曰培荆至先人文康公罷官南陽適當兵擾復還舊棲奉伯父工部居焉别建二老堂于宅南秦望由里諸山皆在目植花竹于四隅命某日治饌往往樂飲竟日某嘗賦詩云去家纔隔水一股二老堂成三百弓鴒原暮下沙水暖鴈行夜落霜天空竹根酌酒不妨醉花蕚斵詩如許工坐久興開笻竹杖出門人指兩仙翁同上月輪當空天下之所共視故謝荘有隔千里兮共明月之句盖言人雖異處而月則同瞻矣老杜當兵戈騷屑之際與其妻各居一方自人情觀之豈能免閨門之念而他詩未嘗一及之至於明月之夕則遐想長思屢形詩什月夜詩云今夜鄜州月閨中只獨看繼之曰香霧雲鬟濕清輝玉臂寒一百五日夜對月云無家對寒食有淚如金波繼之曰仳離放紅蘂想像顰青蛾江月詩云江月光於水髙樓思殺人繼之曰誰家排錦字燭滅翠眉顰其數致意閨門如此其亦謝荘之意乎顔延之對孝武乃有荘始知隔千里兮共明月之說是荘才情到處延之未能曉也同上魏武於諸子中獨愛植丁儀丁􅛫楊脩之徒為植羽翼㡬代太子丕而植狂性不自雕勵又太子御之有術故易宗之計不行蓋非植遜丕也洎文帝即位植屢求試用不報益怏怏帝欲害之卞太后曰汝已殺任城不宜復殺東阿故止従貶爵則植豈無怨懟乎嘗觀植所作豫章行云他人雖同盟骨肉天性然周公穆康叔管蔡則流言子臧孫千乗季札慕其賢意謂巳素為武帝所愛忌之者衆故有管蔡流言之說然乃自以季札為比亦誣矣豈其掠美之言哉同上晉嵇康贈弟秀才四言詩云感悟馳情思我所欽則以所欽為弟陸機贈從兄車騎詩云寤寐靡安豫願言思所欽則以所欽為兄又贈馮文罷詩云慷慨誰為感願言懐所欽則以所欽為友陸機作詩贈賈謐㡬三百言無非極其褒讃方謐用事生死榮辱人如反覆手其褒讃亦何足怪然其間亦有寄意譏誚人未能推其意者按臧榮緒晋書謐父韓夀毋賈充少女也充平生不議立後妻郭槐輙以外孫韓謐襲封帝許之遂以謐為魯公則是賈謐非充子也故機詩云誕育洪胄纂戎于魯言誕育則以譏非已生也又曰惟漢有朩曽不踰境謂橘踰淮則化為枳言如螟蛉之化蜾蠃無異也夫謐勢熖薫灼如此而機敢為廋詞以狎侮之真文人之習氣哉王福畤之子勔􅀈勃皆有才名故杜易簡稱為三珠樹其後助劼勸又皆以文顯勃於兄弟之間極友愛自鄉逺虢詩云人生忽如客骨肉知何常願及百年内花蕚常相将無使棠棣廢取譬人無良觀此語意豈兄弟有不相能者耶及觀誡劼勸云欲不可縱争不可常勿輕小忿将成大殃此二人者似非處於禮義之域者棠棣廢之語疑為此二人設也同上楊六尚書白樂天妻兄也初除東川節度代妻賀兄云覔得黔婁為妺婿可能空寄蜀茶来又寒食寄詩云蠻旗似火行隨馬蜀妓如花坐遶身不使黔婁夫婦看誇張富貴向何人皆責望之言也同上文選載嵇叔夜贈秀才入軍詩李善注謂兄喜秀才入軍而張銑謂叔夜弟不知其名考五詩或曰攜我好仇或曰思我良朋或曰佳人不在皆非兄弟之稱善銑所注恐未必然爾同上錢起題杜牧林亭詩云不須躭小隠南阮在平津南阮謂杜悰也史載悰更厯将相而牧困躓不自振怏怏不平以至於卒審爾以牧之豈肯受其料理哉然宗族貴宦河潤者非一枯死升沉時命存焉何至怏快如是可以知牧之量不宏也李義山作驕兒詩時衮師方三四嵗爾其末乃云兒應勿學耶讀書求甲乙况今西與北羗戎正狂悖兒當速成大探雛入虎窟當為萬户侯勿守一經袠兵連旤結生民塗炭以日為嵗之時而乃望三四嵗児立功於二十年後所謂俟河之清人夀幾何者也同上陶淵明命子篇則曰夙興夜寐願爾之才爾之不才亦巳焉哉其責子篇則曰雖有五男兒總不好紙筆天運茍如此且進杯中物告儼等數則曰鮑叔管仲同財無猜歸生伍舉班荆道舊而况同父之人哉則淵明之子未必賢也故杜子美論之曰有子賢與愚何其掛懐抱然子美於諸子亦未為忘情者子美遣興詩云驥子好男兒前年學語時世亂憐渠小家貧仰母慈又憶幼兒詩云别離經節換聦慧與誰論憶渠愁只睡炙背俯晴軒得家書云熊兒幸無恙驥子最憐渠元日示宗武云汝啼吾手戰觀此數詩於諸子鍾情尤甚於淵明矣山谷乃云杜子美困於三蜀蓋為不知者詬病以為拙於生事又往往譏宗武失學故寄之淵明爾俗人不知便為譏病所謂癡人面前不得說夢也同上詩話總龜後集巻三欽定四庫全書詩話總龜後集巻四宋阮閱撰孝義門唐人與親别而復歸謂之拜家慶盧象詩云上堂家慶畢顧與親思邇孟浩然詩云明朝拜家慶湏著老莱衣葛常之荆公初去臨川詩云馬頭西去涙霑襟一望親庭更苦心已覺省煩非仲叔安能養志似曽參赴調西京時詩也非仲叔則自傷不能養口體不如曽參則自傷不能養志也人士一官所駐乃爾為志亦豈得巳哉後又有詩云古人一日養不以三公換正為此爾葛常之張劒州以太夫人喪劒州歸荆公予之詩并示女弟云烏辭反哺顛毛黒鳥引思歸口舌丹又有張劒州至劒一日以親憂罷詩云白頭反哺秦烏側流血思歸蜀鳥前所賦皆一時之事而語意重復如此何耶同上陳繹奉親至孝嘗作慶老堂以娯其母介甫贈之詩云種竹常疑出冬筍開池故合涌寒泉蓋不獨詠堂前景物而孝感之事實寓焉出冬筍暗用孟宗事涌寒泉暗用姜詩事同上王稚川調官京師毋老留鼎州久不歸侍嘗閱貴人歌舞有詩云畫堂玉珮縈雲響不及桃源欵乃歌山谷次韻諷之曰慈母毎占烏鵲喜家人應賦扊扅歌可謂盡朋友責善之義谷至孝奉母安康君至為親滌厠牏浣中裙未嘗頃刻不供子職洎貶黔南不能與親俱則贈王郎詩云留我左右手奉承白髮親至贛上食蓮有感則曰蓮實大如指分甘念母慈亦可見其孝誠矣余聞無瑕者可以録人則其告稚川之語未為過也老杜送李舟詩非不歸重而其中亦不能無譏焉所謂舟也衣彩衣告我欲逺適倚門固有望歛衣就行役南登吟白華已見楚山碧何時太夫人堂上㑹親戚豈非譏其無方之道耶孔子云父母在不逺逰逰必有方則山谷少陵之詩皆孔子之意也人之事親當以敬為主故孔子告子游曰至於犬馬皆能有養不敬何以别乎束晳作補亡詩於南陔白華二篇每以為言南陔曰養隆敬薄惟禽之似白華曰竭誠盡敬亹亹忘劬可謂得孔子之㫖矣今之人恃親之愛已而忘其敬者多故表而出之以為事親之戒同上李白樂府三巻於三綱五常之道數致意焉慮君臣之義不篤也則有君道曲一篇所謂軒后瓜牙常先太山稽如心之使臂小白鴻翼於夷吾劉葛魚水二慮父子之義不篤也則有東海勇婦之篇所謂淳于免詔獄漢主為緹縈津妾一棹歌脫父於嚴刑生子若不肖不如一女英慮兄弟之義不篤也則有上留田之篇所謂田氏倉卒骨肉分青天白日摧紫荆交柯之朩本同形東枝顦顇西枝榮無心之物尚如此參商胡乃尋天兵慮朋友之義不篤也則有箜篌謡之篇所謂貴賤交結心不移惟有嚴陵及光武輕言託朋友對面九疑峰管鮑久已死何人繼其蹤慮夫婦之情不篤也則有雙燕離之篇所謂雙鷰復雙鷰雙飛令人羡玉樓珠閣不獨棲金窻繡户長相見徐究白行事亦豈純於行義者哉永王之叛白不能潔身而去於君臣之義為如何既合于劉又合于魯又娶于宋又擕昭陽金陵之妓於夫婦之義為如何至於友人路亡白為權窆及其糜潰又收其骨則朋友之義庶幾矣送蕭十一之魯兼問稚子伯禽有髙堂倚門望伯魚魯中正是趨庭䖏君行既識伯禽子應駕小車騎白羊之句則父子之義庶㡬矣如弟凝錞儕况綰各贈詩以致其雍睦之情則兄弟之義庶㡬矣惜乎二失既彰三美莫贖此所以不能為醇儒也韻語陽秋樂天及第後歸覲留别同年云擢第未為貴拜親方始榮此毛得檄而喜之意也論者以春風得意疾决非孟郊語其氣格亦不類而白公亦有得意减别恨半酣輕逺程翩翩馬蹄疾春風歸鄉情此又不可曉也黄常明范文正公雷霆日有犯始可報吾親誰謂臣子忠孝難兩全也涖官不敬戰陣無勇本非事親事禮記必以為非孝公之謂歟黄常明宗族門謝師厚生女梅聖俞與之詩曰生男衆所喜生女衆所醜生男走四隣生女各張口男大守詩書女大逐鷄狗又云何時集氏郎堂上拜媪叟盖戯師厚也陳琳杜甫詩及楊妃外傳其說異陳琳痛長城之役則曰生男戒勿舉生女哺用脯杜甫傷闗西之戍則曰生女猶淂嫁比鄰生男埋沒随百草楊妃専寵帝室金印紫綬寵遍於銛釗象服魚軒榮均於秦虢當時遂有生女勿悲酸生男勿喜歡男不封侯女作妃君看女却為門楣之詠而樂天長恨歌亦云遂令天下父母心不重生男重生女令師厚之女敏質儒門不過求賢士以為之配爾縦不至負薪如翟婦餉㫪如孟光亦豈能預知其必大富貴亢宗榮族如蒲之婦人乎宜其聖俞以為戯也韻語陽秋傳曰學士大夫則知尊祖矣族之所在祖之所自出也其可以不敬乎陶淵明有贈長沙公詩序云予於長沙公為族祖同出大司馬昭穆既逺巳為路人故其詩云同源分流人易世踈慨然晤歎念斯厥初禮服遂悠嵗月𦕈徂感彼行路眷焉踟蹰盖深傷之也長沙公於淵明如此而淵明乃以宗族自任其臨别贈言之際有進簣雖少終在為山之句嗚呼淵明亦可謂賢矣杜子美數訪從孫濟而不免於防猜故其詩云所来為宗族亦不謂盤餐勿受外嫌猜同姓古所敦觀長沙與濟尊祖之義掃地矣韻語陽秋詩話總龜後集巻四欽定四庫全書詩話總龜後集巻五宋阮閱撰仁愛門孟子七篇論君與民者居半其餘欲得君盖以安民也觀杜陵窮年憂黎元歎息腸内熱胡為将暮年憂世心力弱宿花石戍云誰能扣君門下令減征賦寄栢學士云㡬時髙議排金門各使蒼生有環堵寧令吾廬獨破受凍死亦足而志在大庇天下寒士其仁心廣大異夫求穴之螻蟻輩真得孟子所存矣東坡問老杜何如人或言似司馬遷但能名其詩耳愚謂老杜似孟子盖原其心也䂬溪韋蘓州云身多疾病思田里邑有流亡愧俸錢郡中屢集云自慚居處崇未覩兹民康余謂君子當切切作此語彼有一意供租専事土朩而視民如讐者得無愧此詩乎同上賈生終童欲輕事征伐大扺少年躁鋭如經厯老成當不如此昔人欲沈孫武於五湖斬白起於長平誠有謂哉嘗愛老杜云慎勿吞青海無勞問越裳大君先息戰歸馬華山陽又有安得壮士挽天河净洗甲兵長不用安得務農息戰閗普天無吏横索錢願戒兵猶火恩加四海深不眠憂戰伐無力正乾坤其愁歉憂戚蓋以人主生靈為念孟子以善言陣戰為大罪我戰必克為民賊仁人之心易地皆然黄常明臨川云黄雀百頭顱長行萬里餘因君令出守暫得免苞苴使能行此言則虐生類以飽口腹刻疲民以肥權勢者寡矣其詩才二十字耳崇仁愛抑奔競皆具焉何以多為杜云築塲憐穴蟻拾穗許村童人謂有仁愛民物意臨川詠促織云只向貧家促機杼㡬家能有一絇絲愚謂世之嚴督征賦不恤疲瘵之有無者雖魁然其形實微䖝智爾䂬溪元結刺道州承兵賦之後徴率煩重民不堪命作㫪陵行其末云何人采國風吾欲獻此詩以傳考之結以人困甚不忍加賦嘗奏免稅租及和市雜物十三萬緡又奏免租庸十餘萬緡因之流亡盡歸乃知賢者所存不特空言而已丹陽集范文正淮上遇風云一櫂危於葉旁觀欲損神他年在平地無忽險中人雖弄翰戯語卒然而作險濟加澤之心未嘗忘也黄常明王道州㫪陵行云所願見王官撫養以恵慈柰何重驅逐不使存活為逋緩違詔令䝉責願所宜又云守官貴守道不愛能適時賊退示官吏云使臣將王命豈不如賊焉令被徴歛者迫之如火煎誰知絶人命以作時世賢子美志之曰今盗賊未息知民疾苦得結輩十數人為邦伯萬姓氣吐天下少安立可待已余謂漫叟所以能然者先民後已輕官爵重人命故也觀其石魚詩云金魚吾不須軒冕吾不愛此所以能不徇權勢而専務愛民也杜乃知正人意不茍飛長纓可謂相知深矣同上友義門蘇武李陵在武帝時同為侍中金蘭之義素篤武拘於匈奴明年而陵始降雖逆順之勢殊悲懽之情異然朋友之誼此心常烱烱也觀陵海上勸武使降之言非不切至而武之所以告陵者不過明吾忠義之心而已而未嘗一語及陵之叛若告衛律者則不然盡辭詬詈歸之於不忠不臣之科而此以節義臨之㡬使惡死此亦可以見於陵厚矣後武得歸陵置酒賀武曰今足下還歸揚名於匈奴功顯於漢室雖古竹帛所載丹青所畫何以過子卿故李太白蘓武詩云渇飲月窟水飢飡天上雪東還沙塞逺北愴河梁别泣把李陵衣相看涙成血蓋亦是意語爾韻語陽秋石林詩話元豐間東坡繫獄神宗本無意罪之時相因舉軾檜詩根到九泉無曲處嵗寒惟有蟄龍知且云龍飛在天軾以為不知已而求知地下之蟄龍非不臣何得章子厚從而解之遂薄其罪而王定國見聞錄云東坡在黄州時上欲復用王禹玉以嵗寒惟有蟄龍知激怒上意章子厚力解遂釋予觀東坡自獄中出與章子厚書云某所以得罪其過惡未易一二數平時惟子厚與子由極口見戒反復甚苦某強狠自不以為然又云往時相識但過相稱譽以成吾過一旦有患難無復相哀昔唯子厚平居遺我以藥石及困急又有以救䘏之真與世異矣則知坡繋獄時子厚救解之力為多石林詩話不妄也陽秋東坡歸陽羡時流離顛躓之餘絶禄已數年受梁吉老十絹百絲之􅀈可見非有餘者李憲仲之子鷹以四喪未舉而見公則盡以贈之且贈以詩曰推衣贈孝子一溉滋湯旱誰能脫左驂大事不可緩章季黙三喪未𦵏亦求於公公亦以助之有不辭毛粟施行自邱山積之句其髙蓋出於天資矣同上幼敏門西清詩話云魯直少警悟八嵗能作詩送人赴舉云送君歸去明主前若問舊時黄庭堅謫在人間今八年此已非髫稚語矣桐江詩話云山谷七嵗作牧童詩云騎牛逺逺過前村吹笛風斜隔隴聞多少長安名利客機闗用盡不如君林傑幼而聰慧言發成文質瑩凝脂音清扣玉嘉聚羣書又妙于手談當時名公多與之交及有是子益大其門亷使崔侍郎闕與之遷職詞云家藏萬巻學富三冬傑五嵗父因挈行云云後業詞賦頗振聲光有仙客入壺中賦云仙客以變化隨逍遥放情處於外則一壺斯在入其中則萬象皆呈飛閣重樓不是人間之状竒花異朩無非物外之名至九嵗謁大夫盧員常侍黎埴無不嘉奨尋就賔薦日在讌筵侍御李逺支使趙格深所知仰不捨斯須和趙支使詠荔枝尤佳云金盤摘下排朱顆紅壳開時飲玉漿副使鄭立竒童傳制使劉潼序以貽之閩川名士傳王元之年七八嵗已能文畢文簡公為郡從事始知之問其家以磨麫為生因令作磨詩元之不思以對但存心裏正無愁眼下遲若人輕著力便是轉身時文簡大竒之當於子弟中講學一日太守席上出詩句鸚鵡能言爭似鳳坐客皆未有對文簡寫之屏間元之書其下蜘蛛雖巧不如蠶文簡歎息曰經綸之才也遂加以衣冠呼為小友至文簡入相元之已掌書命矣聞見録後志氣門蔡寛夫詩話云太白之從永王璘世頗疑之唐書載其事甚畧亦不為明辨其是否獨其詩自序云夜半水軍来潯陽滿旌旃空名適自誤迫脅上樓船從賜五百金棄之若浮烟辭官不受賞翻謫夜郎天然太白豈從人為亂者哉蓋其學本出從横以氣俠自任當中原擾攘時欲藉之以立竒功耳故其巡歌有但用東山謝安石為君談笑靜胡沙之句至其卒章乃云南風一掃胡塵靜西入長安到日邊亦可見其志矣大扺才髙意廣如孔北海之徒固未必有成功而知人料事尤其所難議者或責以璘之猖獗而欲仰以立事不能如孔巢父蕭頴士察於未萌斯可矣若其志亦可哀已蘇子由云李白詩類其為人俊發豪放華而不實好事喜名不知義之所在也其語兵則先登䧟陣不以為難語游俠則白晝殺人不以為非此豈其誠能也白始以詩酒奉事明皇遇䜛而去所至不改其舊永王將據江淮白起而従之不疑遂以放死今觀其詩固然唐詩人李杜稱首今其詩皆在杜甫有好義之心白所不及也漢髙祖歸豐沛作歌曰大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方髙帝豈以文字髙世者帝王之度固然發於中而不自知也白詩反之曰但歌大風雲飛揚安得猛士守四方其不識理如此老杜贈白詩有重與細論文之句謂此類也髙齋詩話云荆公題金陵此君亭詩云誰怜直節生来瘦自許髙才老更剛賔客毎對公稱頌此句公輒顰蹙不樂晩年與平甫坐亭上視詩牌曰少時作此題榜一傳不可追改大扺少年題詩可以為戒平甫曰此楊子雲所以悔其少作也石林詩話云荆公以意氣自許故詩語為其所向不復更為㴠蓄如天下蒼生待霖雨不知龍向此中蟠又濃綠萬枝紅一㸃動人春色不湏多又平治險穢非無力潤澤焦枯是有才之類皆直道其胷中事後為郡牧判官従宋次道盡假唐人詩集博觀而約取晩年始盡深婉不迫之意乃知文字雖工拙有定限然必視其幼壯雖公方其未至亦不能力強而遽至也石林詩話云蘇明允至和閒在京師既為歐陽文忠公所知其名翕然韓忠獻諸公皆待以上客嘗遇重陽忠獻置酒私第惟文忠與一二執政而明允乃以布衣參其間郡人以為異禮席間意氣尤不少衰明允詩不多見然精深有味語不徒發正類其文而讀易詩云誰為善相應嫌瘦後有知音可發弹婉而不迫哀而不傷所作自不必多也述志門余嘗官展嘗借詩集於士人中有小篇序云成都華陽天慶中進士葉沆作止百篇時有可觀如閑居感懐云身閑難報國語直易傷時村墅云夜庭和月掃秋户拂雲開亦可想見其胷襟也和靖與士夫詩未嘗不及遷擢與學子詩未嘗不言登第視此為何等随緣應接不為茍難亢絶如此老杜云本無軒冕意不是傲當時鍾鼎山林各天性濁醪麄飰任吾年道義重而輕王公者也阮孝緒南平王要之不赴曰非志驕富貴但性畏廟堂使麏麚可驂何異驥騄求意門復齋漫錄云書當快意讀易盡客有可人期不来世事相違毎如此好懐百嵗㡬迴開其後又寄黄充前四句云俗子推不去可人廢招呼世事每如此我生亦何娯蓋無已得意故兩見之胡氏評詩曰魯直過平輿懐李子克詩世上豈無千里馬人中難得九方臯題徐孺子祠堂詩白屋可能無孺子黄金不是欠陳蕃二詩命意絶相似蓋歎知音者難得耳苕溪漁隠曰錫宴明日絶句云宴罷回来日欲斜平康坊裏那人家㡬多紅袖迎門笑争乞釵頭利市花清明日絶句云無花無酒過清明興味都来似野僧昨日隣家乞新火曉窻分與讀書燈二詩何况味不同如此亦可見其老少情懐之異也胡氏評詩曰澶淵之役王介甫以謂丞相莱公功第一張文潛以為可能功業盡莱公大扺人之議論各有所見故爾不同今具載二詩識者當能辨之介甫澶州詩云去都二百四十里河流中間兩城峙南城草上不受兵北城樓樐如邊城城中老人為予語契丹此地經鈔虜黄屋親臨矢石間胡馬飲踏河氷渡天發一矢胡無酋河氷亦破沙水流歡盟從此至今日丞相菜公功第一文潜聽客話澶淵事詩云憶昔胡来動河朔黄河飲馬吹胡角澶淵城下氷載車邊風蕭蕭千里賖城上黄旗坐真主夜遣六丁張猛弩雷驚電發一矢飛横射胡酋貫車柱犬羊無踪大漠空歸来封禪告成功自是乾坤扶聖主可能功業盡莱公談苑曰余知制誥日與余恕同考試恕曰夙昔師範徐騎省為文騎省嘗有徐孺子亭記其警句云平湖千畝凝碧乎其下西山萬叠倒影乎其中他皆常語近得舍人所撰涵虚閣記終篇皆竒語自渡江来未嘗見此信一代之雄文也其相推如此因出義山詩共讀酷愛一絶云珠箔輕明拂玉墀披香新殿閗腰支不湏看盡魚龍戯終遣君王怒偃師擊節稱嘆曰古人措辭寓意如此之深妙令人感慨不巳詩話總龜後集巻五欽定四庫全書詩話總龜後集巻六宋阮閱撰諷諭門唐文宗夏日聯句東坡謂宋玉對楚王雄風譏其知已不知人也公權小子有美而無規為續之云一為居所移苦樂永相忘願言均此施清隂分四方或謂五弦之薫解愠阜財已有陳善責難之意愚謂不然凡規諌之辭湏切直分明乃可以感悟人主故盗言孔甘良藥苦口若以薫風自南来為陳善閉邪但恐後世導諛側媚持兩可者皆得以冒敢諌之名也䂬溪陽城徳行道義為士林之所敬服徳宗以銀印赤紱起于隠所驟拜諫官可謂賢且遇矣故學生聞道州之貶投業而呌閽賢士愴驛名之同摛辭而頌徳可以知其賢不誣也然退之諫臣論乃極口貶之何哉其言曰今陽子實一匹夫在諌位不為不乆而未嘗一言及於政視政之得失若越人之視秦人之肥瘠問其官則曰諫議也問其政則曰我不知也有道之士固如是乎考之本傳以謂他諌官論事苛細帝厭苦城漫聞得失且熟猶未肯言客屢諫之第醉以酒而不荅蓋其意有所待矣至徳宗逐陸贄欲相裴延齡而城伏蒲之說始上廷爭懇至累日不解故元微之詩云正元嵗云暮朝有曲如鈎飛章八九上皆若珠暗投且曰事不止臣諌誓不休而白樂天亦云陽城為諌議以正事其君其手如屈軼舉必指侫臣卒使不仁者不得秉國鈞栁子厚亦云抗志厲義直道是陳蓋退之諌論乃在上裴延齡為相之前而三子頌美之言乃在陽城極諌之後也丹陽集蔡寛夫云江湖多白鳥天地有青蠅人遂以白鳥為鷺而禮記月令羣鳥養羞鄭氏乃引夏小正丹鳥白鳥之説謂白鳥為蚊蚋則知以對青蠅有深意矣不然江湖多白鷺有何説邪䂬溪子美詩草有害於人曽何生阻脩芒刺在我眼焉能待時秋其憤邪嫉惡欲芟夷藴崇之以肅清王室者抱懐可見臨川有勿去草草無惡如比世俗俗浮薄此方外之語異乎農夫之務者也黄常明子美云設網萬魚急蓋指聚歛之臣苛法侵漁使民不聊生乃萬魚急也又云能者操舟疾若風撑突波濤挺乂入小人舞智趨時巧宦數遷所謂疾若風也殘民以逞不顧傾覆所謂挺义入也日暮蛟龍改窟穴山根鱣鮪隨雲雷魚不得其所龍豈能安居君與民猶是也此與六義比興何異吾徒何為縱此樂暴戾天物聖所哀此樂而能戒又有仁厚意亦如前王作網罟設法害生成不専為取魚也退之义魚曰觀樂憶吾僚異此意矣亦如蘄簟云却願天日常炎曦故後人改之云豈比法曹空自私却願天日長炎赫黄常明唐子西上張天覺内前行云内前車馬撥不開文徳殿下宣麻回紫薇侍郎拜右相中使押赴文昌臺此語善於叙事質而不俚又云周公禮樂未要作致身姚宋亦不惡向来兩翁當國年民間斗米纔四錢此語善於諷諭當而有理皆可法也湖上云佳月明作哲好風聖之清栖禪寺歸云草青仍過雨山紫更斜陽語意俱新李陽氷云太白不讀非聖人之書恥為鄭衛之作故其言多似天仙之辭凡所著述言多諷興自三代以来風騷之後馳驅屈宋鞭撻揚馬千載獨步唯公一人故王公趨風列岳結軌羣賢翕習如鳥歸鳯盧黄門云陳拾遺横制頽波天下質文翕然一變至今朝詩體尚有梁陳宫掖之風至公大變掃地併盡今古文集過而不行唯公文章横被六合可謂力敵造化歟逹理門苕溪漁隱曰裴說云讀書貧裏樂搜句静中忙此二事乃余日用者甘貧守静自少至老飽諳此味矣許彦周詩話云羅隠詩云只知事逐眼前過不覺老從頭上来此殊有味朱氏復齋偶題詩曰出入無時是此心豈知鷄犬易追尋請看屏上初文㫖便識名齋用意深東坡云秋菊有佳色裛露掇其英泛此忘憂物逺我遺世情一觴雖獨進杯盡壺自傾日入羣動息歸鳥趨林鳴笑傲東軒下聊復得此生靖節以無事為得此生則見役於物者非失此生也歟東坡送山本禪師赴法雲云是身如浮雲安得限南北此二句乃老杜别賛上人詩中全語豈偶然用之邪題碧落洞詩云小語輙響荅空山白雲驚此語全類李太白今印本誤作白雷驚不惟無意味兼與上句重叠也後自嶺外歸次韻江晦叔詩云浮雲時事改孤月此心明語意髙妙如叅禪悟道之人吐露胷襟無一毫窒礙也康節天津感事吟水流任急境常静花落雖頻意自閒不似世人忙裏老生来未始得開顔擊壤集先天吟先天天弗違後天奉天時弗違無時虧奉時有時疲同上身心吟身生天地後心在天地前天地自我出自餘何足言同上康節無憂吟人生長有兩般愁愁死愁生未易休或向利中窮力取或于名上盡心求多思唯恐晩得手未老已聞先白頭我有何功居彼上其間攘臂獨無憂擊壤集詩話總龜後集巻六欽定四庫全書詩話總龜後集巻七宋阮閱撰逹理門否卦包承小人吉說者謂小人在下者包之小人在上者承之蓋處否當然杜云曲直吾不知負暄候樵牧是非何處定髙枕笑浮生洗眼㸔輕薄虚懐任屈伸寄謝悠悠世上児不争好惡莫相疑其寄傲踈放擺脫世網所謂兩忘而化其道也黄常明漫叟無為洞口云洞傍山僧皆學禪無求無欲亦忘年又無為洞口春水滿無為洞傍春雲白愛此躊蹰不能去念人悔作衣冠客岑参宿先逰寺云寄報乗軒客簮裾爾何容臨川何秀老云解我葱珩脫孟勞暮年甘與子同袍比之退之云方将歛之道且欲冠其顛向風長歎不可見我欲收歛加冠巾異矣六一有云自慚前引朱衣吏不稱閒行白髪翁說者謂不言亦可然次山宿丹崖翁宅詩云吾将求退與翁逰學翁歌醉在漁舟官吏隨人往未得却望丹崖慚復羞吁不滛乎富貴者也䂬溪東坡拈出陶淵明談理之詩前後有三一曰採菊東籬下悠然見南山二曰笑傲東軒下聊復得此生三曰客養千金軀臨化消其寳皆以為知道之言蓋摛章繪句嘲弄風月雖工亦何補若覩道者出語自然超詣非常人能蹈其軌轍也山谷嘗跋淵明詩巻云血氣方剛時讀此詩如嚼枯朩及綿厯世事知决定無所用智又嘗論云謝康樂庾蘭成之詩鑪錘之功不遺餘力然未能窺彭澤數仞之牆者二子有意於俗人賛毁其工拙淵明直寄焉持是以論淵明詩亦可以知其闗鍵也丹陽集孟子所言皆精粗兼備其言甚近而妙義在焉如龎居士云神通并妙用運水與搬柴此自得者之言最為逹理若孟子之言則無適不然如許大堯舜之道只於行止疾徐之間教人做了龜山語録或問言動非禮則何以正視聽如何得合禮曰四者皆不可易易則多非理故仁者先難而後獲所謂難者以我視以我聽以我言以我動也仰面貪看鳥回頭錯應人視聽不以我也胥失之矣上蔡語録吕晉伯兄弟中皆有見處一人作詩詠曽㸃事曰凾丈從容問且酧展才無不至諸侯可憐曽㸃推鳴瑟獨對春風詠不休同上或問邵堯夫云誰信畫前元有易自従刪後更無詩畫前有易何以見曰畫前有易其理甚微然即用孔子之已發明者言之未有畫前盡可見也如云神農氏之耒耜蓋取諸益日中為市盖取諸噬嗑黄帝堯舜之舟楫盖取諸渙服牛乗馬盖取諸隨益嗑渙隨重卦也當神農黄帝堯舜之時重卦未畫此理真聖人有以見天下之賾故通變以宜民而易之道得矣然則非畫前元有易乎龜山録熈寧十年夏康節感微疾氣日益耗神日益明笑謂司馬温公曰雍欲觀化一巡如何温公曰先生未應至此康節笑曰死生亦常事耳張横渠先生喜論命来問疾因曰先生論命否當推之康節曰若天命則已知之矣世俗所謂命則不知也横渠曰先生知天矣載尚何言程伊川曰先生至此他人無以為力願自主張時康節居正寢諸公議後事於外有欲𦵏近洛陽城者康節已知呼伯温入曰諸公欲以近城地𦵏我不可當從伊川先生塋耳七月初四日大書詩一章曰生于太平世死于太平世客問年㡬何六十有七嵗俯仰天地間浩然獨無愧以是夜五更捐館聞見録張敬夫元日詩古史書元意義存春秋揭示更分明人心天理初無欠正本端原萬善生南軒集康節過士友家晝卧見其枕屏小兒迷藏以詩題其上云遂令髙卧人欹枕看兒戯盖熈寧間也陳恬云擊壤集不載同上張横渠聖心詩聖心難用淺心求聖學湏専禮法脩千五百年無孔子盡因通變老優游横渠集五峯胡廣仲詩幽人偏愛青山好未是青山青不老山中出雲雨太虚一洗塵埃山更好朱氏陂云右衡山胡子詩也初紹興庚辰熹病卧山間親友仕於朝者以書見招集戯以兩詩代書報之曰先生去上芸香閣時藉溪先生正字赴館閣長新峩豸角冠劉共甫秘書丞除察官留取幽人卧空谷一川風月要人看一章甕牗前頭列畫屏晩来相對盡儀刑浮雲一任閑舒巻萬里青山只麽青二章或傳語胡子胡子謂其學者張敬夫曰吾未識此人然觀此詩庶能有進矣時其言有體而無用故為是詩以箴警之庶其聞之而有發也明年胡子卒又四年某始見敬夫而後獲聞之恨不及見胡子而請其目也因序其本末而書之于策以無忘胡子之意云見詩集邵堯夫先生居洛四十年安貧樂道自云未嘗攅眉所居寢息處為安樂窩自號安樂先生又為甕牗讀書燕居自平旦則焚香獨坐晡時飲酒三四甌微醺便止不使至醉也中間州府以吏法不餉餽寓賔乃為薄粥以代之好事者或載酒以濟其乏嘗有詩云斟有淺深存燮理飲無多少繋經綸莫道山翁拙於用也能康濟自家身喜吟詩作大字書然遇興則為之不牽強也大寒暑則不出每出乗小車用一人挽之為詩以自詠曰花似錦時髙閣望草如茵處小車行司馬温公贈以詩曰林間髙閣望已久花外小車猶未来随意所之遇主人喜客則留三五宿又之一家亦如之或經月忘返雖性髙潔而接人無賢不肖貴賤皆懽然如親嘗自言若至大病自不能支其遇小疾得有客對語不自覺疾之去體也學者来従之問經義精深浩􅀶應對不窮思致幽逺妙極道數間與相知之深者開口論天下事雖久存心世務者不能及也康節嘗誦希夷之語曰得便宜事不可再做得便宜處不可再去又曰落便宜是得便宜故康節詩云珍重至人嘗有語落便宜是得便宜蓋可終身行之也邵伯温易理辨惑詩話總龜後集巻七欽定四庫全書詩話總龜後集巻八宋阮閱撰博識門嘗觀臨川解我葱珩脫孟勞嘗不曉孟勞何等物及觀榖梁傳注孟勞魯之寶刀黄常明子美於菟侵客恨乃楚人謂虎於菟土銼冷疎烟乃蜀人呼釡為銼富豪有錢駕大舸方言南楚江湘凡船大者謂之舸百丈誰家上水船荆峽以竹纜為百丈塹抵公畦稜京師農人指田土㡬稜去聲市暨瀼西巔䕫人謂江水横通山谷處為瀼子厚桃笙葵扇安可當宋魏之間謂簟為笙款乃一聲山水綠乃楚人歌聲臨川窻明兩不借楚人以草屨為不借東坡倦看澁勒暗蠻村蓋嶺南竹名又蓬沓障前走風雨注云於潜婦人皆揷大銀櫛謂之蓬沓又幾思壓茅柴禁烟日夜急山谷燕濕社公雨鶯啼花信風皆方言也黄常明江漢有滸以扞制泛濫大漲則溢於平陸水退滸見舟人謂之水落槽又灘石湍激其中深僅可容舟者謂之洪若大水則不復問洪矣臨川萬里寒江正復槽東江水落水分洪以此亦謂水黄㡌謂雲砲車非遐征逺涉不能知也同上栁讀書篇瘴疴擾靈府日與往昔殊臨文乍了了徹巻元若無蓋常荅許京兆書云往時讀書不至底滯今每讀一傳再三伸巻復觀姓氏在宗元則為瘴疴所擾它人乃公患也同上東坡云東来賈客朩綿裘飲散金山月滿樓夜半潮来風又熱卧吹簫管到揚州集中題云夢中作盖坡嘗衣此坐客誤云朩綿襖俗飲散乃出此詩且云雖欲不可得也坐客大慙賈客事乃南史孔覬二弟頗營産業請假東還覬出渚迎之輕重二十餘船皆綿絹紙席之属覬偽喜命且置岸側既而正色謂曰汝輩忝預士流何至還東作賈客邪命燒盡乃去䂬溪家家養烏鬼沈存中以為鸕鷀說者謂非也元微之詩云病養烏稱鬼巫占瓦代龜自注雲南人染病競賽烏鬼楚巫列肆競賣瓦卜此乃戯效俳體二首其二亦云瓦卜傳神語皆是處方言則烏鬼非鸕鷀不疑矣書史蓄胷中而氣味入於冠裾山川厯目前而英靈助於文字太史公南逰北渉信非徒然觀老杜壯游云東下姑蘇臺已具浮海航到今有遺恨不得窮扶桑劒池石壁仄長洲芰荷香嵯峨閶門北清廟映池塘越女天下白鑑湖五月涼剡溪藴秀異欲罷不能忘歸帆拂天姥中嵗貢舊鄉放蕩齊趙間西歸到咸陽其豪氣逸韵可以想見序太白集者稱其隠岷山居襄溪南逰江淮觀雲夢去之齊魯之呉之梁北扺趙魏燕晉西徙邠岐從金陵上潯陽流夜郎泛洞庭上巫峽白自序亦曰偶乗扁舟一日千里或遇勝景終年不移其恣横採覽非其狂也使二公隠坐中書何以垂不朽如此哉燕公得助於江山鄭綮謂相府非㶚橋那得詩思非虚語也學林新編云世傳織女嫁牽牛渡河相㑹某按史記晉天文志河鼓星在織女牽牛二星之間世俗因傅㑹為渡河之說媟瀆上象無所根據淮南子云烏鵲填河成而渡織女荆楚嵗時記云七夕河漢間弈弈有光景以此為候是牛女相遇也其說皆怪誕不足信子美牽牛織女詩曰牽牛出河西織女處其東萬古永相望七夕誰見同神光意難候此事終朦朦觀子美詩意不取世俗說也七夕乞巧見於周處風土記乃後人編類成書大抵初無稽考不足信者多矣侯鯖錄云東坡作雪詩云凍合玉樓寒起粟光揺銀海眩生花後見荆公云道家以兩肩為玉樓目為銀海是使此事否坡退曰惟荆公知此出處苕溪漁隠曰緗素雜記學林新編二家辨證乘槎事大同小異余近来摭其有理者共為一說按張茂先慱物志曰舊說天河與海通近世有人居海上者每年八月見浮槎来不失期齎一年粮乗之而去十餘日中猶觀星月日辰自後茫茫亦不覺晝夜奄至一處有城郭屋舍甚嚴遥望宫中有婦人織見丈夫牽牛渚次飲之驚問曰何由至此其人說以来意并問此是何處荅曰君至蜀郡訪嚴君平則知之因還後以問君平君平曰某年月日有客星犯牽牛宿計年月正是此人到天河時也所載止此而巳而荆楚嵗時記直曰張華慱物志云漢武帝令張騫窮河源乗桴經月而去一處見城郭如官府室内有一女織又見一丈夫牽牛飲河騫問云此是何處荅曰可問嚴君平織女取榰機石與騫而還後至蜀問君平君平曰某年月日客星犯牛斗所得榰機石為東方朔所識亦其證焉按騫本傳及大宛傳騫以郎應募使月氐為匃奴所留十餘嵗得還騫身所至者大宛大月氐大夏康居而傳聞其旁大國五六具為天子言其地形所有並無乗槎至天河之說而宗懔乃傅㑹以為武帝張騫之事又益以榰機石之說何邪子美䕫府詠懐詩曰途中非阮藉槎上似張騫又秋興詩曰奉使虚隨八月槎如此類前賢多用之恐非實事杜子美詩喜用文選語故宗武亦習之不置所謂熟精文選理休覔綵衣輕又云呼婢取酒壺續兒誦文選是也唐朝有文選學而時君尤見欽重分别本以賜金城書絹素以屬裴行儉是也外史檮杌載鄭奕嘗以文選教其子其兄曰何不教讀論語免學沈謝嘲風㺯月汚人行止鄭兄之言盖欲先徳行而後文藝亦不為無理也丹陽集雪浪齋日記云昔人有言文選爛秀才半正為文選中事多可作本領爾余謂欲知文章之要當熟看文選蓋選中自三代涉戰國秦漢晉魏六朝以来文字皆有在古則渾厚在近則華麗也苕溪漁隱曰少陵宗武生日詩熟精文選理蓋為是也苕溪漁隠曰學者欲博讀異書余謂退之進學解云上窺姚姒渾渾無涯周誥殷盤詰屈聱牙春秋謹嚴左氏浮誇易奇而法詩正而葩下逮莊騷太史所録子雲相如同工異曲若盡讀此足矣何必多嗜異書詩話總龜後集巻八欽定四庫全書詩話總龜後集巻九宋阮閲撰狂放門劎閣云吾将罪真宰意欲鏟叠嶂與太白槌破黄鶴樓剗却君山好語亦何異然劎閣詩意在削平僣竊尊崇王室凛凛有忠義氣槌碎剗却之語但覺一味粗豪耳故昔人論文字以意為主性豪業嗜酒嫉惡懐剛腸飲酣視八極俗物都茫茫此子美胷中語也宜其孩弄嚴武藐視禮法而朱老阮生皆莫逆及遭田父泥飲至被肘而不悔其内直外曲彊禦不畏矜寡不侮非世所能測也䂬溪唐史載杜審言嘗云吾文當得屈宋作衙官其孫乃有讀書破萬巻下筆如有神謂蘓味道見吾判且羞死甫乃有集賢學士如堵牆看我落筆中書堂謂為造化小兒所苦甫乃有日月籠中鳥乾坤水上萍所謂是以似之也同上藝苑雌黄云吟詩喜作豪句須不畔於理方善如東坡觀崔白驟雨圖云扶桑大繭如甕盎天女織綃雲漢上往来不遣鳳銜梭誰能鼓臂投三丈此語豪而甚工石敏若橘林文中詠雪有燕南雪花大於掌氷柱懸簷一千丈之語豪則豪矣然安得爾髙臺或云詠雪非敏若詩見鮑欽止夷白堂小集苕溪漁隠曰東坡集載此詩是題趙令晏崔白大圖幅徑三丈故云往来不遣鳳銜梭誰能鼓臂投三丈可謂善造語能形容者也畫品人間刀尺不敢裁丹青付與濠梁崔風蒲半折寒鴈起竹間的皪横江梅乃是崔白冬景圖藝苑以謂驟雨圖悞矣又李太白北風行云燕山雪花大如席秋浦歌云白髮三千丈其句可謂豪矣柰無此理何如秦少逰秋日絶句云連巻雌蜺拄西樓逐雨追晴意未休安得萬粧相向舞酒酣聊把作纒頭此語亦豪而工矣郭功甫金山行造語豪世多不見全篇今録于左方金山杳在滄溟中雪崖氷柱浮仙宫乾坤扶持自今古日月彷彿纒西東我泛靈槎出塵世搜索異境窺神工一朝登臨重歎息四時想像何其雄捲簾夜閣挂北斗大鯨駕浪吹長空舟摧岸㫁豈足數徃往霹靂槌蛟龍寒蟾八月蕩瑤海秋光上下磨青銅鳥飛不盡暮天碧漁歌忽㫁蘆花風蓬莱久聞未成往壯觀絶致遥應同潮生潮落夜還曉物數交㑹誰能窮百年形影浪自苦便欲此地安其躬白雲南去供入望又起歸興隨征鴻稱賞門王直方詩話云樂天有詩云醉貌如霜葉雖紅不是春東坡有詩云兒童誤喜朱顔在一笑那知是酒紅鄭谷有詩云衰髩霜供白愁顔酒借紅老杜有詩云髮少何勞白顔衰肯更紅無已詩云髪短愁催白顔衰酒借紅皆相類也然無已初出此一聯大為當時諸公所稱賞雪浪齋日記云髙荷字子勉贈山谷詩云㸃檢金閨彦飄零玉筍斑尚令清廟器猶隔鬼門闗大為山谷所喜杜子美褒稱元結舂陵行兼賊退後示官吏二詩云兩章對秋月一字偕華星致君唐虞際淳朴憶大庭又云今盗賊未息得結輩數十公落落然參錯為天下邦伯天下少安可立待已蓋非専稱其文也至於李義山乃謂次山之作以自然為祖以元氣為振無乃過乎秦少游漫郎詩云字偕華星章對月漏泄元氣煩揮毫蓋用子美義山語也金是堂髙麗使過海有詩云水鳥浮還沒山雲㫁復連時賈島詐為稍人聯下句云棹穿波底月船壓水中天麗使嘉歎久之䂬溪張祜詩云故國三千里深宫二十年杜牧賞之作詩云可憐故國三千里虚唱歌詞滿六宫故鄭谷張生故國三千里知者唯應杜紫微諸賢品題如是祜之詩名安得不重乎其後有解道澄江静如練世間唯有謝𤣥暉解道江南㫁腸句世間唯有賀方回等語皆祖是意也葛常之詩人賛美同志詩篇之善多比珠璣璧玉錦繡花草之類至杜子美則豈作此陳腐語也寄岑参詩云意愜闗飛動篇終接混茫夜聽許十誦詩云精微穿溟涬飛動摧霹靂贈盧居詩云藻翰唯牽率湖山合動揺贈朱諌議詩云毫髮無遺恨波瀾獨老成寄李白詩云筆落驚風雨詩成泣鬼神贈髙適詩云美名人不及佳句法如何皆驚人語也視餘子其神芝之與腐菌哉丹陽集稱薦門温公自稱迂叟香山居士亦嘗以自號其詩云初時被目為迂叟近日䝉呼作隠人司馬豈慕其洛居有閑適之樂邪䂬溪周美成邦彦元豐初以大學生進汴都賦神宗命之以官除大學録其後流落不偶浮沉州縣三十餘年蔡元長用事美成獻生日詩略云化行禹貢山川内人在周公禮樂中元長大喜即以秘書少監召又復薦之揮塵録李白贈崔侍御詩云黄河三尺鯉本在孟津居㸃額不成龍歸来伴凡魚何當赤車使再往召相如相如蓋自謂也觀此不可謂白之無心於仕進者然當時慢侮力士畧不為身謀以致貶逐而曽不悔使其欲仕之心切必不如是先是蘇頲為益州長史見白異之曰是子天才英特少益以學比相如故白詩中毎以相如自比従弟之遥曰漢家天子馳駟馬赤車蜀道迎相如自漢陽病酒歸曰聖主還聽子虚賦相如却欲論文章贈張鎬曰十五觀竒書作賦凌相如白自比為相如非止一詩也呉邁逺好自夸而嗤鄙他人毎作詩得稱意語輙擲地呼曰曹子建何足数哉袁嘏謂人曰我詩有生氣亦以用心深苦俄爾有得宜不勝其喜子美云語不驚人死不休貫休謂得句先呈佛皆此謂也老杜髙自稱許有乃祖之風上書明皇云臣之述作沉鬱頓挫揚雄枚臯可企及也壯逰詩則自比引崔魏班揚又云氣劘屈賈壘目短曹劉墻贈韋左丞則曰賦料楊雄敵詩看子建親甫以詩雄於世自比諸人誠未為過至竊比稷與契則過史稱甫好論天下大事髙而不切豈自比稷契而然耶至云上感九廟焚下憫萬民瘡斯時伏青蒲廷爭守御床其忠藎亦可嘉矣陽秋韻復齋漫録云江公著初任洛陽尉久旱微雨作詩云雲葉紛紛雨脚勻亂花柔草長精神雷車却碾前山過不灑原頭陌上塵温公於士人家見之借紙筆脩刺謁江且為稱薦由此知名投獻門錢惟演為洛帥留守始置驛貢花識者鄙之蔡君謨加法小團茶貢之富彦國歎曰君謨乃為此也坡作荔枝歎曰我願天公憐赤子莫生尤物為瘡痏雨順風調百榖登民不飢寒為上瑞君不見武陵溪邊粟粒芽前丁後蔡相籠加吾君盛徳豈在此致養口腹何陋邪又不見洛陽丞相忠孝家可憐亦進姚黄花補世之語不能易也嘗愛李敬方汴河直進船詩云汴水通淮利最多人生為害亦相和東南四十三州地取盡脂膏是此河此等語皆為多貢獻也評論門介甫詩少陵為爾添詩興可見無心賦海棠杜黙云倚風莫怨唐工部後裔誰知不解衣曽不若東坡柯丘海棠長篇冠古絶今雖不指名老杜而補亡之意盖使来世自曉也樂天九日思杭州云笙歌委曲聲延耳金翠動揺光照身子瞻有懐錢塘云剰看新畨眉倒暈未應泣别臉消紅黎元耆舊何遽忘之也徐考其集白送姚杭州因思舊游云閭里固宜勤撫恤樓臺亦要數躋扳蘇亦云細雨暗時一百六畵橈鼇鼓莫遺民是未嘗無意於民庶也然白又有故妓數人憑問訊新詩兩首倩流傳坡又有休驚嵗嵗年年貌且對朝朝暮暮人大扺滛樂之語多於撫養之語耳夫子稱未見好徳如好色而傷之曰已矣乎二公未能免俗餘人不必言子瞻賦濁醪有妙理首句云酒勿嫌濁人當取醇其末乃曰濁者以飲吾僕清者以酌吾友復立分别則是濁醪無妙理矣豈非萬斛洶湧不暇㸃校故歟司馬温公云清茶談話難逢友濁酒狂歌易得朋雖造次間語亦在進直諒之益而退便僻之損也䂬溪雪浪齋日記云讀謝靈運詩知其攬盡山川秀氣讀退之南山詩頗覺似上林子虛賦才力小者不能到李長吉玉川子詩皆出於離騷未可以立談判也皇甫持正云吟詩未有劉長卿一字唐人必甚重長卿今詩十巻亦清麗宋子京華記云古人語有椎拙不可掩者樂府曰何以銷憂惟有杜康劉越石曰何其不夢周又有曰夫子悲獲麟西狩歎孔丘雖有意緒詞亦鈍樸詩話總龜後集巻九欽定四庫全書詩話總龜後集巻十宋阮閱撰評論門杜云爾輩可忘年含悽覺汝賢送爾維舟惜此筵汝與山東李白好自世俗觀之則為簡傲而實不然亦嘗有云忘形到爾汝黄常明又古栢云不露文章世已驚未辭剪伐誰能送先器識後文蓻與浮躁衒露者有異也同上古栢云大厦如傾要梁棟萬牛回首邱山重此賢者難進而易退也非其招不往者也同上趙嘏長安秋望詩云殘星㡬㸃鴈横塞長笛一聲人倚樓當時人誦詠之以為佳作遂有趙倚樓之目又有長安月夜與友人話歸故山詩云楊栁風多潮未落兼葭霜在鴈初飛亦不減倚樓之句至於獻李僕射詩云新諾似山無力負舊恩如水滿身流則謬矣葛常之鍾嶸稱張茂先惜其兒女情多風雲氣少喻鳬嘗謁杜紫微不遇乃曰我詩無綺羅鉛粉宜不遇也淮海詩亦然人戯謂可入小石調然率多子美句但綺麗大勝爾子美並蔕芙蓉本自雙水荇牽風翠帯長退之金釵半醉坐添春牧之春風十里楊州路誰謂不可入黄鍾宫邪黄常明昌黎云攜持令名歸自足貽家尊蘇州送叅尉云秖應傳善政朝夕慰髙堂誠儒者迂闊之辭然貪饕茍得汚累其親孰若清白之為愈同上東坡云少陵詠懐詩杜陵有布衣老大意轉拙許身亦何愚竊比稷與契子美自比稷契人未必許也然其又有詩云舜舉十六相身尊道更髙秦時任商鞅法令如牛毛自是稷契輩人口中語也知名不必稱局促商山芝又云王侯與螻蟻同盡隨邱墟願聞第一義回向心地初乃知子美詩尚有事在也䂬溪張藉送區宏詩云韓公國大賢道徳赫已聞昨出為陽山爾區来趨奔韓官遷法曹子又至荆門韓入為博士﨑嶇從覊輪觀其逰從之久疑得於韓者深也然考其文章議論之際乃不得預藉湜之列何也韓集有送區宏南歸詩云我遷于南日周圍来見者衆莫依希爰有區子熒熒暉觀以彛訓或從違我念前人譬葑菲落以斧斤引纆徽雖有不逮驅騑騑觀此數語則韓雖以師道自任而區受道之質盖有所未至也其後又勉之以行行正直勿脂韋業成志立来頎頎其望之者至矣集中又有送區冊序韓文辨証云册即宏也未知孰據爾丹陽集舉人過失難於當其尤者臧孫之犯門斬闗惟孟椒能絶之臧紇謂國有人焉必椒也其難如此司馬相如竊妻滌器開巴蜀以困苦鄉邦其過巳多至為封禪書則䜛諂蓋天性不復自新矣子美猶云竟無宣室召徒有茂陵求李白亦云果得相如草仍餘封禪文和靖獨不然曰茂陵他日求遺藁尤喜曽無封禪書言雖不迫責之深矣李商隠云相如解草長門賦却用文君取酒金亦全其大論其細也舉其大者自西湖始其後有譏其諂諛之態死而未已正如捕逐宼盜先有力者所獲搤其吭而騎其項矣餘人從旁助箠縳耳黄常明近人程文窮日力作一論既不限聲律復不拘詩句尚罕得反復折難使其理判然觀赴奉先詠懐五百言乃聲律中老杜心迹論一篇也自杜陵有布衣老大意轉拙許身一何愚竊比稷與契其心術祈嚮自是稷契等人窮年憂黎元歎息腸内熱與飢渇猶已也何異然常為不知者所病故曰取笑同學翁世不我知而所守不變故曰浩歌彌激烈又云非無江海志瀟洒送日月當今廊廟具構厦豈云缺葵藿傾太陽物性固莫奪言非不知隠遁為髙也亦非以國無其人也特廢義亂倫有所不忍以兹悟生理獨恥事干謁言志大術踈未始阿附以借勢也為下士所笑而浩歌自若皇皇慕君而雅志棲道既不合時而又不少低屈皆設疑互荅屢致意焉非巨刃有餘孰能之乎中間鋪叙間闗酸辛宜不勝其戚戚而黙思失業徒因念逺戍卒所謂憂在天下而不為一已失得也禹稷顔子不害為同道少陵之迹江湖而心稷契豈為過哉孟子曰窮則獨善其身逹則兼善天下其窮也未嘗無志於國與民其逹也未嘗不抗其易退之節密謀先定出處一致矣是其先後同揆正合乎此昔人目元和賀雨詩為諌書余特目此詩為心迹論也䂬溪五言如四十箇賢人著一箇屠酤不得覔句者若掘得玉匣子有底有蓋但精心必獲其寳然昔人園栁變鳴禽竟不及池塘生春草餘霞散成綺不及澄江静如練春水船如天上坐不若老年花似霧中看坐久硯中窺水淺不若花殘徑裡得泥香停杯嗟别久不及對月喜家貧楓林社日鼓不若茒屋午時雞此數公未始不精心以此知全其寳者未易多得黄常明愈寄孟刑部聯句云美君知道腴逸歩謝天械或問道果有味乎余曰如介甫午雞聲不到禪林栢子烟中静擁衾竹鷄呼我出華胥起覔篝燈擁燎爐各據髙梧同不寐偶然聞雨落階除皆淡中意味非造此景不能形容也黄常明張無盡題武昌陵竹寺云孟宗泣竹笋冬生豈是青青竹有情影響主張非别物人心但莫負幽明語雖淺直然當於理樂天有餘霞散成綺别葉乍辭風等語麗矣不過於嘲風雪弄花鳥而巳故寄唐生詩云非求宫律髙不務文字竒惟歌生民病得願天子知䂬溪顔延之嘗問鮑昭已與靈運優劣昭曰謝五言如初發芙蓉自然可愛君詩鋪錦列繡亦雕繢滿眼鍾嶸詩品乃記湯惠休云謝如芙蓉出水顔如錯采鏤金與本傳不同又稱延之嘗薄恵休制作以為委巷中歌謡耳豈湯休因為延之所薄遂有芙蓉錯鏤之語故史取以文飾之邪坡云辨才詩如風吹水自成文理吾輩與叅寮如巧媍織錦耳取况亦類此淵明所以不可及者蓋無心於非譽巧拙之間也黄常明永叔以昌黎比介甫答云他日若能窺孟子終身何敢望韓公呉季野以方賈誼荅云俯仰繆恩方自慊慚君将比洛陽人皆憤然不平如惡無鹽唐突而宋景文贈文忠詩有才如夢得今為累情似安仁久悼亡即開門當}
