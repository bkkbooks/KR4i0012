  - {type: variant, offset: 3721, length: 0, content: '', WYG: 竹從誨紹立尤加完葺每月夜花朝㑹賔客從誨眀音律僻好彈胡琴有女妓數十皆善其事王仁裕使荆渚從誨出十妓彈胡琴仁裕有詩美之曰紅粧齊抱紫檀槽一抹朱絃四十條湘水凌波慚鼓瑟秦樓眀月罷吹簫寒敲白玉聲尤婉㬉逼黄鶯語自嬌丹禁舊臣來側耳骨清神爽似聞韶雜咏天下大定録載王仁裕兩篇一篇已載于此今録所遺一篇云玉繊挑落新冰聲散入秋空韻轉清三五指中遺塞鴈十三絃上囀春鶯譜從陶室偷將妙曲向秦樓冩得成無限細腰宫裏女就中偏惬楚王情崔公佐牧名郡日宴賔僚有一客巾屨不完衣破肘見突筵而入崔喜其來令下牙籌引滿數觥神色自若飲妓駭其藍縷因大噱客獻詩曰破額幞頭衫也穿使君猶許對華筵今朝幸倚文章守遮莫青蛾笑掲天崔令掩口無咍賢士郡閣野談杜悰司空牧澧陽宏辭李宣古數陪宴飲戯謔侮慢杜不能容使辱之長陵公主出而救之云尚書不念諸子學文待士如此那得平陽之譽遣易衣而赴中坐長林請為詩冀彌縫也宣古詩云紅燈初上月輪髙照見堂前萬朶桃觱栗夜深抛要令舞来接去使人勞杜公賞之後二子裔休儒休皆登第人謂之曰非其母賢不能成其子雲溪友議白樂天致仕時裴晋公夜宴諸進士官樂天賦詩云九燭臺前十二姝主人留醉任歡娱飄颻舞袖雙飛蝶宛轉歌喉一索珠坐久欲醒還酩酊夜深臨去更踟蹰南山賔客東山妓此㑹人間曾有無古今詩話裴令公守東洛夜宴半酣公索聨句元白有得色公為破題至楊侍郎曰昔日蘭亭無艷質此時金谷有髙人白知不能加遽裂紙曰笙歌鼎沸勿作此冷淡生活元告白曰樂天可謂全其名也李相國尉鎮淮南布素孫處士來謁李敦舊分待之殊禮將行祖送逰河橋下舟人回篙水濺近坐飲妓李公大怒孫獻楊栁詞曰半額鵞黄金縷衣玉搔頭裊鳯雙飛從教水濺羅裙濕知道巫山行雨歸舟子獲免罪又有李嶸獻相國詩云雞樹烟含瑞氣深鳯池波待玉山澄國人久倚東闗望擬築沙堤到廣陵後梁入相同前雙井黄叔達字知命初自江南來與陳履常俱謁法雲禪師於城南夜歸過龍眠居士李伯時知命衣白衫騎驢縁道揺頭而歌履常負杖挾囊于後一市皆驚以為異人伯時因畫為圖而邢敦夫為作歌曰長安城頭烏夜棲長安道上行人稀浮雲巻盡暮天碧但見眀月流清輝君獨騎驢向何處頭上倒着白接䍦長吟搔首望眀月不學山翁醉似泥到得城中燈火閙小兒柏手攔街笑道傍觀者那得知相逢疑是商山皓龍眠居士畫無比揺毫弄筆長風起酒酣閉目望窮途紙上軒昻無乃似君不學長安㳺俠誇年少臂鷹挾彈章臺道君不能提擕長劍取靈武指揮猛士驅貔虎胡為脚踏梁宋塵終日飄颻無定所武陵桃花春欲暮白水青山起烟霧竹杖芒鞋歸去來頭巾任掛三花樹惇夫時年未二十王直方詩話林逈與黄秘教同逰連江玉泉有詩曰泉山好景微權尹訟庭希曉馬破雲去夜船乗月歸妓歌珠不㫁人醉玉相依薄宦自拘者咄哉多少非青瑣集嬖佞韓昭顧珣潘迎等為狎客競扠手揺頭令唐師入境遏其報而逰幸師至利州方知將士紛然曰且打扠手揺頭念周宣帝作歌曰自知身命促把燭夜行逰令宫女連臂踏脚而歌北夢瑣言湖南馬氏作㑹春園開宴徐東野作詩有數聨為當時所稱云珠璣影冷偏粘草蘭麝香濃却損花山色逺堆羅黛雨草梢春戞麝香風衰蘭寂寞含愁緑小杏妖嬈弄色紅旁搜水脉湘心滿遍謁泉根楚底通水乳滴殘青壁痩石脂傾盡白雲空深浦送回芳草日急灘牽㫁緑楊風藕梢逆入銀塘裏蘋迹潛來玉井中敗菊籬踈臨野渡落梅村冷隔江楓剪開净澗分苖稼劃破漣漪下釣筒湖湘故事詩話總龜巻二十二欽定四庫全書詩話總龜巻二十三宋阮閱撰寓情門曹修古立朝謇諤嘗見池上有一所似者作小詩曰荷葉罩芙蓉員青映嫩紅佳人南陌上翠盖立春風青箱雜記唐僖宗朝自内製袍干領賜塞外吏士神策將軍馬直於袍中絮得金鎖一枝詩一首云玉燭製袍夜金刀呵手裁鎖情寄千里鎖心終不開直貨鎖于市為人告其將并得詩奏聞僖宗令馬直赴闕以宫人賜直為妻有情者為金鎖曲流於世翰府名談蜀人皆呼營妓為校書韋南康鎮成都罷之故胡曽有詩贈薛濤曰萬里橋邊薛校書枇杷花下閉門居掃眉才子知多少管領春風搃不如濤再為連帥所喜因事獲怒而逺之作五離詩以獻遂復喜焉一曰犬離家出入朱門四五年為知人性足人憐只因咬着親情脚不得紅絲毯上眠二曰魚離池一入池中四五秋常將朱尾玩銀鉤近縁戯觸紅蓮折不得隨波自在逰三曰鸚鵡離籠慣向侯門養此身飛來飛去羽毛新近縁言語無方便不得籠中再喚人四曰竹離叢蓊欝栽成四五行常持堅節待秋霜近來春笋鑚堦破不得垂枝對畫堂五曰珠離掌一顆眀珠内外通分眀皎潔水晶宫近縁一㸃瑕相累不得朝朝在掌中鑑戒録摭言謂此是薛書記上元微之未知孰是成都女郎張窈窕上任事者詩曰昨日買衣裳今朝賣衣裳衣裳都賣盡羞見嫁時箱有賣愁應緩無時心轉傷故園胡虜隔何處是蚕桑鑑戒録鄭還古博士東都閒居與栁將軍往還栁富有家姬鄭與笑語栁知不恠也鄭将入京栁餞之鄭贈姬詩曰冶艷出神仙歌聲雜管絃眼㸔白苧曲欲上碧雲天未擬生裴秀如何知鄭𤣥莫教金谷水横過墜樓前栁見詩曰俟榮歸當為遣充賀禮及歸國子博士栁遣姬入京師至嘉祥驛而鄭已物故栁甚悼之古今詩話張祜客淮南幕中赴宴時杜紫微為支使座中有屬意處索骰子賭色牧之微吟曰骰子逡廵裹手拈無因得見玉繊繊祜應聲曰但知報道金釵落彷彿還應露指尖同前南部新書謂此詩乃李義山作封特卿為湖州軍倅與同年李大諌詩酒唱酬以疾阻歡及愈有詩曰已負數條紅畫燭更辜雙帶綉香毬白蘋洲上風烟好扶病湏􅂸到後籌後有離别難詞佛許衆生願心堅石也穿今朝雖送别㑹却有眀年一座無不悽愴雜志李翺尚書牧江淮郡日進士盧儲投巻來謁李禮待之置文巻几案間赴公宇視事長女及笄見文尋繹數四謂小青曰此人必為狀頭李公聞之深異其語乃募為婿來年果狀頭及第纔過殿試徑赴佳婣催粧詩曰昔年將去玉京逰第一仙人許狀頭今日已成秦晉㑹早教鸞鳯下粧樓盧止官舎迎内子入庭花開乃題詩曰芍葯斬新栽當庭數朶開東風與拘束留待細君來南部新書房千里初上第逰嶺徼有韋滂自海南邀趙氏十九女而許為房妾房廹於逰從暫與趙别後寄詩曰鸞鳯分飛海樹秋忍聽鐘鼓越王樓祇應霜月眀君意緩撫瑶琴送我愁山逺莫教雙淚盡鴈來空寄八行幽相知若返臨卭市畫舸朱軒萬里逰萬里橋也千里以情托焉到府訪之趙氏已適韋秀才矣許與房韋俱有布衣之蒨不陳之則負房之言欲陳之則傷韋之義作詩寄千里曰春風白馬紫絲韁正值蠶娘未采桑五夜有心隨暮雨百年無節抱秋霜重尋綉帶朱藤合却認羅裙碧草長為報西秦慰離恨阮郎纔去嫁劉郎雲溪友議薛宜僚㑹昌中為左庶子充新羅册禮使青州泛海船船阻惡風雨至登州却漂回淹泊青州郵傳一年節度使烏漢正尤加待遇有席中飲妓東美者薛頗多情連帥置於驛中薛發日祖筵嗚咽流涕東美亦然乃於席中留二詩曰經年郵驛許安棲未㑹他鄉别恨迷今日海㠶飄萬里不堪腸斷對含啼阿母桃芳方似錦王孫草長正如烟行雲行雨今辭夢惆悵歡情却一年薛到國未行冊禮旌節曉夕有聲旋染疾謂判官苗用曰東美何頻在夢中乎數日致卒苗攝大使行禮旅櫬回青州東美乃請假至驛素服致奠哀號拊柩一慟而卒情縁相感頗為竒事唐賢杼情趙嘏頗有詩名不拘小節飲中贈歌者曰倚風無處過梁塵雅唱清歌日日新來值漢庭花欲盡一聲留得萬家春後因酒失悔過以詩上歙州府曰葉覆清溪艷艷紅路横秋色馬嘶風猶擕一榼郡齋酒傾對青山憶謝公敬相牧廬州有朝客留意飲妓祖送短亭妓車後至相贈之曰望㫁蘇娘小小坡竹埿金鴈展輕莎客卿幸有凝情意何必臨尊始轉波同前大中年有江淮郡守名郎登樓縱飲見二逰女羅衣飄飄目送久之因詠曰兩朶紅英值萬金教人不負㸔花心髙樓日晚東風急吹落千家何處尋在省日宣宗顧問稱㫖攝中郎將有詩曰宫娃引入玉為行金殿齊趍近御床不見聖眀親顧問如何得攝漢中郎風神俊邁後擁節旄南部新書李尚書擢罷歙州吳貟交代有佐酒録事名媚川頗留意縁以納籍中妓韶光托於替人令存䘏酒酣臨發洪飲不勝離情有詩曰經年理郡少歡娱為習干戈間飲徒今日臨行更交割分眀留取媚川珠吳答曰曵履長容日日歡湏言違徳涙汍瀾韶光今已輸先手領取蠙珠掌内㸔同前鄭詳縱情詩酒至廬江謁郡守留連唫醉因贈妓曰臺盤濶狹纔三尺似隔中當有阻艱若不騎龍與騎鳯樂營門是望夫山同前江陵有士子㳺於交廣間而愛姬為太守所取納於髙麗坡底及歸寄詩曰惆悵髙麗坡底宅春風無復下山來守見詩遣還白樂天任杭州刺史擕妓還洛後却遣回錢塘劉禹錫有詩曰其奈錢塘蘇小小憶君淚㸃石榴紅越水李主簿逰廣陵迨春未返其姬寄詩曰去時盟約與心違秋日離家春不歸應是維揚風景好恣情歡笑到芳菲答曰偶到揚州悔别家親知相繫不因花塵侵寶鏡雖相待長短歸時不及𤓰㑹昌中張暌防戎有功勒留蕃徼十年妻侯氏綉錦廻文詩作龜形獻進曰暌離已是十秋强對鏡那堪重整粧聞鴈燈前修尺素見霜心痛裂衣裳開箱叠練先垂涙拂杵調砧更㫁腸綉作龜文獻天子願教夫婿早還鄉崔左轄瓘牧江外郡祖席夜䦨一營妓先辭歸崔與詩曰寒簷寂寂雨霏霏堠舘蕭條燭盡微祇有今宵同此宴翠娥佯醉欲先歸並同前朱㴞括兵不擇士族悉令赴軍自閱於毬塲有士子進趍閒雅因問曰何業曰學詩有妻否曰有即令作寄内詩曰握筆題詩易荷戈征戍難慣從鴛被暖怯向鴈門寒痩盡寛衣帶啼多漬枕鸞試留青黛着回日畫眉㸔又令代妻答曰蓬鬂荆釵世所稀布裙猶是嫁時衣胡麻好種無人種正好歸時又不歸㴞憐之遺束帛遣歸古今詩話韓晋公鎮浙西戎昱為郡刺史有郡妓美而善歌公召置籍中昱作詩以遣之且曰至彼令歌必首唱是詞既至公持杯妓歌昱詩公曰使君於汝寄情邪對曰然贈百縑而遣之歸其詞曰好去春風湖上亭栁條藤蔓繫人情黄鶯久住渾相識欲去頻啼四五聲韓翊少負才名隣居有姓李者每將倡妓栁氏至其居必邀韓同飲愈熟栁每窺所往來皆名人因乗暇語李曰韓秀才甚貧然所與逰必時賢是必不久困宜假待之李深然之具酒邀韓至謂韓曰公當今名士栁當今名色名色配名士不亦可乎遂命栁與韓韓懇辭李曰大丈夫相遇杯酒間一言道合尚相許以死一婦人何足辭夫子貧栁資數萬可以取濟長揖而去韓辭之栁曰此豪達者昨暮其言之矣俄就栁歸來嵗成名淄青節度使辟為從事韓以世方擾不敢以栁同行置之都下期至而迓之三嵗不果寄之詩曰章臺栁章臺栁昔日依依今在否縱使長條拂地垂如今攀折他人手栁答曰楊栁枝芳菲節可惜年年贈離别一葉隨風忽報秋縱使歸來不堪折盧渥舎人應舉京師偶臨御溝見一紅葉上有一絶云流水何太急深宫盡日閒殷勤謝紅葉好去到人間盧得之蔵於巾篋及宣宗有㫖許宫人從人盧所獲人因覩紅葉而吁怨久之曰當時偶題不謂君得之顧况在洛乗閒逰苑中水上得大桐葉有詩曰一入深宫裏年年不見春聊題一片葉寄與有情人眀日於上㳺亦題於葉泛之波中曰花落深宫鶯亦悲上陽宫女㫁腸時帝城不禁東流水葉上題詩寄與誰十日餘有客尋春苑中又於葉上得詩以示况云一葉題詩出禁城誰人酬和獨含情自嗟不及波中葉蕩􅃞來春取次行開元中賜邊將軍大纊衣製扵宫有兵士短袍中得詩曰沙場征戍客寒苦若為眠戰袍經手作知落阿誰邊留意多添線含情更着綿今生已過也重結後生縁兵士以詩白帥帥進呈眀皇以詩遍示宫中曰作者勿隠不汝罪也有一宫人自言萬死眀皇深憫之遂以嫁得詩者謂之曰吾與爾結今生縁邊人感泣張文新郎中嘗為廣陵從事有歌妓常致情而終未果納二十年後妓猶在籍中張罷江南郡道由廣陵時李申鎮淮南宴飲極歡張以指染酒書一絶於盤上相府命妓歌以侑張酒其詞曰雲雨分飛二十年當時求夢不曾眠今來頭白重相見還上襄王玳瑁筵酒罷令妓侍張歸太和初有御史分務洛都有姬善歌時李逢吉留守欲一見既不可辭遂往焉李有姬四十餘軰皆在其下既入不復出作詩兩篇投李曰三山不見海沉沉豈有仙蹤尚可尋青鳥去時雲路㫁姮娥歸處月宫深仙牕暗想春相憶書幌誰憐夜獨吟料得此時天上月祇應偏照兩人心一首已失陳太子舎人徐徳言尚叔寳妹樂昌公主陳政衰謂其妻曰國破必入權豪家倘情縁未㫁尚慕相見乃破鏡各分其半約他日以正月望日賣於都市及陳亡其妻果為楊越公得之乃為詩曰鏡與人俱去鏡歸人不歸無復姮娥影空留眀月輝樂昌得詩悲泣不已越公知之愴然召徳言至還其妻曰與徳言樂昌餞别令樂昌為詩曰今日甚遷次新官對舊官笑啼俱不敢方信作人難樂天姬樊素善歌小蠻善舞嘗為詩曰櫻桃樊素口楊栁小蠻腰樊素年既長小蠻方豐艷因為楊栁詞曰一樹春風萬萬枝嫩於金色軟於絲唐戎昱守零陵妓籍中有善歌者相帥于公頔遽索之昱乃遣行比至令歌乃昱送妓辭也其詞曰寳鈿香蛾翡翠裙粧成掩泣欲行雲殷勤好向襄王道莫向瑶臺夢使君公曰大丈夫不能立功業為異代所稱豈可奪人愛姬為已之娱遂贈以帛送歸零陵五溪論事云蜀尚書侯繼圖本儒士一日秋風四起偶倚欄於大慈寺樓有大桐葉飄然而墜上有詩云拭翠歛雙蛾為欝心中事搦管下庭除書成相思字此字不書石此字不書紙書向秋葉上願逐秋風起天下有心人盡解相思死天下負心人不識相思意有心與負心不知落何地侯貯小帖凡五六年方卜任氏為婚嘗諷此事任氏曰此是妾書葉時詩争得在公處曰向在大慈寺閣上倚欄得之即知今日聘非闗偶然也侯以今書較之與葉上無異並同前李茂復為㑹府從事出逢一小青衣有色馬上目之作詩曰行盡踈林見小橋緑楊深處有紅蕉無端眼界無分别安置心頭不肯銷其内子甚妒晚年牧泗州有詩云落日西山近一竿世間㤙愛極難􅂸近来不作顛狂事免被寃家惡眼㸔南部新書謝郎中有女數嵗能吟咏長嫁王元甫元甫調官京師送别云此去惟宜早早還休教重起望夫山君㸔湘水祠前竹豈是男兒涙染斑青瑣集詩話總龜巻二十三欽定四庫全書詩話總龜巻二十四宋阮閱撰感事門髙力士謫巫州山谷多薺而人不食感之因作詩以寄意曰兩京論斤賣五溪無人採夷夏雖有殊氣味都不改眀皇雜録李適之在相位每退朝則邀賔客諧謔賦詩曾不僃林甫之害嘗為詩曰朱門長不閉親友恣相過年今将半百不樂復如何及罷相又為詩曰避賢初罷相樂聖且銜盃借問門前客今朝幾箇來及死非其罪時人寃之眀皇幸蜀回至劔門謂侍臣曰劔門天險自古及今敗亡相繼豈非在徳不在險也因作詩曰劍閣横空峻鑾輿出狩回翠屏千仭合丹嶂五丁開灌朩縈旗轉仙雲拂馬來乗時方在徳嗟爾勒銘才至徳三年普安郡太守賈深勒于石開元傳信記眀皇將幸蜀登花萼樓使樓前善水調者登樓而歌曰山川滿目淚沾衣富貴榮華得㡬時不見而今汾水上惟有年年秋雁飛顧侍者曰誰為此對曰宰相李嶠詞也眀皇曰真才子不待曲終而去眀皇傳信記唐曲江開元天寳中嘗有殿宇因安史之亂遂盡圯廢文宗覽杜甫詩云江頭宫殿鎖千門細栁新蒲為誰緑因建紫雲樓落霞亭嵗時賜宴及兩㟁建亭舘焉春眀退朝録劉洞嘗以詩百餘首獻李煜首篇乃石城懐古云石城古岸頭一望思悠悠㡬許六朝事不禁江氷流煜覽之掩巻改容金陵將危為七言詩大榜于路傍曰千里長江皆渡馬十年養士得何人又云翻憶潘郎章奏内愔愔日暮好沾巾盖潘祐表云家國愔愔如日將暮也江南野録韓熈載髙密人顯仕江南晚年奉貢入梁都絶知舊乃題於舘壁云未到故鄉時將謂故鄉好及至親得歸爭如身不到目前相識無一人出入空傷我懐抱風雨瀟瀟旅舘秋歸來忩下和衣倒夢中忽到江南路尋得花中歸舊處桃臉蛾眉笑出門争向前頭擁將去又云僕本江北人今作江南客再去江北行舉目無相識金風吹我寒秋月為誰白不如歸去來江南有人憶江南野録後庭花亡陳之曲也杜牧之詩曰烟籠寒月水籠沙夜泊秦淮賣酒家商女不知亡國恨隔江猶唱後庭花故胡曽詩曰陳國機權未可涯如何後主恣驕奢不知即入宫前井猶自聽吹玉樹花思越人亡吳之曲也胡曽詩曰吳王恃覇棄賢才貪向姑蘇醉醁醅不覺錢塘江上月一宵西送越兵來栁枝歌亡隋之曲也胡曽詩曰萬里長江一旦開岸邊楊栁幾千栽錦帆未落干戈起惆悵龍舟去不回韓渥詩曰梁苑隋堤事已空萬條猶舞舊春風那堪更想十年後誰見楊花入漢宫古今詩話謂此詩是韓琮作又賀知章詩曰碧玉粧成一樹髙萬條垂下緑絲絛不知細葉誰裁出二月春風似剪刀李咸用詩曰新柳絲絲傍玉樓半垂橋上半垂流今年漸見枝條密惱亂春風卒未休李渉詩曰錦江池上栁垂橋風引蟬聲送寂寥不必如絲千萬縷只禁離恨兩三條鑑戒録天成初眀宗召亡蜀舊宰臣王錯等賦蜀王降唐詩惟牛希濟為佳詩曰滿城文武欲朝天不覺隣師犯塞烟唐主再懸新日月蜀王還却舊山川非干將相扶持拙自是君臣數盡年古往今來亦如此㡬曽歡笑幾澘然元微之劉夢得韋楚客㑹於樂天之居因論南朝興廢事各賦金陵懐古詩夢得方在郎省元公已居北門夢得騁其才略無遜意滿引一觴請為首唱一揮而成白公覽詩曰四人探驪龍而子先得其珠其餘鱗甲將何為三公于是罷吟夢得詩曰王濬樓舩下益州金陵王氣黯然收千尋鐵鎖沉江底一片降旛出石頭荒苑至今生茂草古城依舊枕寒流如今四海歸皇化兩岸瀟瀟蘆荻秋杜荀鶴朱梁時作時世吟十首今録其兩首云夫因兵亂守蓬茅麻苧裙衫鬂髪焦桑柘廢來猶納稅田園荒盡尚徴苗時挑野莱和根煮旋砍生柴帯葉燒前雖見于評論所載事固不同姑存其作任是深山更深處也應無計避征徭八十衰翁住破村村中牢落不堪論因供寨朩無桑柘為點鄉兵絶子孫還似平寜催賦税未曾州縣略安存至今雞犬皆星散日落西山哭倚門並同前内侍張繼常為鎮戎軍鈐轄因題詩於㕔事曰夜聞磧外鈴聲苦曉聽城頭角調哀不是感恩心似鐵誰人肯向此中來繼常能讀書有識好談論知治體中間入内都知領郡談苑翠微寺在驪山絶頂舊驪宫也唐太宗避暑於此后寺亦廢有逰人題云翠微寺本翠微宫樓閣亭臺幾十重天子不來僧又去樵夫時倒一株松鍾謨建安人為李璟奏表稱臣於周孫晟遇害獨赦謨為輝州司馬有詩與州將云翩翩歸盡塞垣鴻隐隐惟聞蟄户蟲渭北離愁春色裏江南家事戰塵中還同逐客紉蘭佩誰聽縲囚奏土風多謝賢侯振吾道免令搔首泣途窮後畫江為界世宗召謨為衛尉卿放還因作詩獻其畧云三年耀武羣雄伏一日回鑾萬國春南北通歡永無事謝恩歸去老陪臣世宗覽而恱之並同前元厚之昔隨侍在荆南從學於龍安寺僧舎後三十年以龍圖閣帥荆州昔之老僧猶在一日訪舊齋而門徑池臺如昔悵感久之因剏巨堂榜曰碧落題詩於堂曰九重侍從三眀主四紀乾坤一老臣未㡬召還翰林叅熈寜大政真可謂乾坤老臣也古今詩話王播少逰揚州恵照寺朩蘭院隨僧飯僧頗厭之後二紀出鎮廣陵因訪舊逰向書字已為碧紗籠矣題二詩曰二十年前此院逰朩蘭初發院初修而今再到經行處樹老無花僧白頭上堂已了各西東慚愧闍黎飰後鍾二十年前塵撲面而今始得碧紗籠古今詩話北夢瑣言載後篇叚文昌題江陵佛寺李翺尚書於潭州席上有舞柘枝者顔色惨怛侍御殷堯藩即席贈詩曰姑蘇太守青蛾女流落長沙舞柘枝滿坐綉衣皆不識可憐紅臉淚雙垂因問之乃蘇州韋中丞愛姬所生女也因相為之吁嘆即命更其舞衣於賔榻中擇士嫁之舒元輿侍郎聞之贈李公詩曰湘江舞罷忽生悲便脱蠻靴出綘幃誰是蔡邕琴酒客魏公懐舊嫁文姬古今詩話杜甫開元中流竄秦越有秦中詩三十首其首叙曰有弟皆覊旅無家問死生寄書多不達况乃末休兵后歿衡州耒陽縣杜牧之常覽其集有詩曰杜詩韓筆愁來讀似倩麻姑癢處搔天外鳯凰誰得髓無人解合續絃膠羅隐題杜甫集曰楚水悠悠浸耒亭楚南天地兩無情忍交孫武重泉下不見時人説用兵南部新書詩云昔日青樓對歌舞今日黄埃聚荆棘山川滿目泪沾衣富貴榮華能幾時不見而今汾水上惟有年年秋鴈飛李嶠作也眀皇深賞之當時未有太白子美故嶠軰得稱雄爾意其遭罹世故不得不爾雨中聞鈴且猶涕下嶠詩可不如撼鈴也以此論工拙殆未可也蘇公詩話李士元嘗為僧逰初有登單于臺詩云悔上層樓望翻成極目愁路沿葱嶺去河背玉闗流馬散眠沙磧兵閑倚戍樓殘陽三㑹角吹白旅人頭登華閣詩云亂後獨來登大閣凭欄舉目盡傷心長堤過雨行人少廢苑經秋草自深破落侯家通永巷蕭條宫樹接踈林總輸釋氏青蓮舘依舊重重布地金雅言雜録張祜素藉詩名凡知已者皆當世英儒故杜牧之云誰人得似張公子千首詩輕萬户侯祜有華清宫詩為世所稱云龍虎旌旗雨露飄鳯池歌㫁玉山遥眀皇上馬太真去紅杏滿園香自銷郡閣雅談李朱厓平泉荘佳景可愛洛中士人詫於汪遵遵有詩曰平泉風景好髙眠水色風光滿目前剛欲平他不平事至今惆悵海南邊汪過楊相宅有詩曰倚伏從來事不遥無何平地起青霄纔到青霄却平地門對古槐空寂寥唐賢杼情陳喬張俄重陽日登髙於北山湖亭不奏聲樂因吟杜工部九日宴藍田崔氏荘詩其末句云眀年此㑹知誰徤醉把茱茰仔細㸔貟外郎趙宣父時亦在集感慨流涕者數四舉坐異之未㡬趙卒南唐近事僖宗幸蜀有北省官忘名避地江左元昆扈蹕在蜀因寄詩曰渉江今日恨偏多援筆長吁欲柰何倘使淚流西去得便應添作錦江波後有朝士同在外地覩野花追思京師舊逰云曾過街西㸔牡丹牡丹纔謝便心䦨如今變作村園眼鼓子花開也喜歡雜誌錢思公謫漢東作一曲曰城上風光鶯語亂城下烟波春拍岸緑楊芳草幾時休淚眼愁腸先已㫁年年漸變成衰晚鸞鑑朱顔驚暗換昔年多病猒芳尊今日芳尊唯恐淺每歌之酒䦨則泪下時後閣尚有一白髪姬乃鄧王俶歌鬟驚鴻曰吾憶先王挽鐸中歌此聲相公其亡乎果斃扵隋鄧王舊曲曰帝郷烟雨鎖春愁故國山川空淚眼頗相類湖山野録胡汾不知何許人嘗隠廬山桑落洲一篇云莫問桑田事但㸔桑落洲數家新住處昔日大江流古岸摧將盡平沙長未休想應百年後人世更悠悠又月詩云輪中别有物光外更無空摭言元和十三年進士陳標獻諸先軰詩曰春官南院院􅉹東曉色初眀月色紅文字一千重馬擁喜逢三十二人同眼㸔魚變辭凡水心逐鶯飛出瑞風莫恠雲泥從此别總曾惆悵去年中同前余昔在錢唐一日晝寢寳山僧房起題其壁云七尺頑軀走世塵十圍便腹貯天真此中空洞渾無物何止容君數百人其後有數小子亦題名壁上見者乃謂余誚之也周伯仁所謂君者乃王茂宏之流豈此等軰哉吾嘗作太白真賛云生平不識髙將軍手汚吾足乃敢嗔吾今復此者欲使後之小人少知其揆也百斛眀珠僕在徐州王子立子敏皆舘於官舎而蜀人張師厚來過二王方年少吹洞簫飲酒杏花下眀年予謫黄州對月獨飲嘗有詩云去年花落在徐州對月酣歌美清夜今夜黄州見花發小院閉門風露下盖歎與二王飲時也張師厚久已死今年子立復為古人哀哉予素不解棋因獨逰廬山白鶴觀觀中人皆闔户晝寢獨聞棋聲於古松流水之間意欣然喜之自爾欲學然終不解也兒子過乃粗能者儋守張中從之戯予亦隅坐竟日不以為猒也詩曰五老峰前白鶴遺址長松映庭風日清美我時獨逰不逢一士誰與棋者户外屨二不聞人聲時聞落子紋枰坐對誰䆒此味空鉤意釣豈在魴鯉小兒近道剥啄信指勝固欣然敗亦可喜優哉㳺哉聊以卒嵗並同前詩話總龜巻二十四欽定四庫全書詩話總龜巻二十五宋阮閲撰感事門西蜀楊耆數年前見之甚貧今見之亦貧所異扵昔者蒼顔華髪耳女無美惡富者妍士無賢不肖貧者鄙使其逢時遇合豈减當世之士哉頃宿長安驛聞泣者甚怨問之乃昔富而今貧者乃作一詩今亦贈楊君孤村漸雨逐秋凉逆旅愁人怨夜長不寢相㸔唯櫪馬愁吟互答有寒螿天寒滯穂猶横畝嵗晚空機尚倚墻勸爾一杯聊復睡人間貧富海茫茫玉局文予十八年前中秋與子由觀月彭城作一詩以陽闗歌之今復過此夜宿於贛上方南北嶺表獨歌此曲聊復書之以識一時之事雖未覺有今夕之悲但懸知為他日之喜也行歌野哭兩堪悲逺火低星漸向微病眼不眠非守嵗鄉音無伴苦思歸重衾脚冷知霜重新沐頭輕感髪稀多謝殘燈不嫌客孤舟一夜苦相依同前賛皇公再貶朱崖道中有詩云十年紫殿掌洪鈞出入三朝一品身文帝寵深陪雉尾武皇恩重宴龍津黒山永破和親慮烏嶺全坑扈從臣自是功髙臨盡處禍來名减不由人又登朱厓郡城云獨上髙樓望帝京烏飛猶是半年程青山似欲留人住百匝千遭遶郡城世傳賛皇公崖州詩皆仇人所作祇此二首是真古今詩話眀皇友悌古無有者嘗以書賜弟憲等魏文帝詩曰西山一何髙髙髙殊無極上有兩仙童不飲亦不食賜我一丸藥光輝有五色服之四五日身體生羽翼朕每言服藥而生羽翼寜如兄弟天生之羽翼乎陳思王之才足以紓國絶其朝謁卒使憂死魏祚未終司馬氏奪之豈神丸效耶雍洛靈異記唐元和十三年士人下第多為詩刺試官獨章孝標作歸燕詩獻庾承宣侍郎曰積累危巢泥已落今年故向社前歸連雲樓閣無棲處更傍誰家門户飛歐陽澥亦作燕詩獻鄭愚侍郎云翩翩飛燕畫堂開送古迎今幾萬回長向春秋社前後為誰歸去為誰来古今詩話盧氏子垂拱中不中第歩出都門其日寒甚投宿旅舎一客續至附火吟曰學織絲綾功未多謾臨機杼錯抛梭莫教宫錦行家見把此文章笑殺他盧憶前詩乃白尚書者因問其姓氏曰姓李氏世業織綾前屬東宫錦坊見以薄藝投本行皆云如今花様與前不同不謂伎俩兒以文采求售不重於世如此元稹奉使東川於褒城題黄眀府詩序曰昔年曽於解縣飲酒余為録事有客後至數犯酒令併飛數杯逃席而去醒後問其人曰前虞鄉黄丞也爾後絶不復知所在元和四年三月奉使東川十六日至褒城驛有黄眀府見迎問其前銜即曩日逃席者因問坐隅山川則褒女所奔之城在其左諸葛所征之地在其右感今懐古作贈黄眀府詩曰昔年曽痛飲黄令困飛觥席上當時走馬前今日迎依稀迷姓字積漸識平生故友身皆逺他時眼暫眀便邀連坐叙兼共摘舩行酒思臨風亂霜棱拂地平不㸔深淺酌貪愴古今情逶迤七盤路坡陀數丈城花疑褒姒笑棧想武侯征一種埋幽石空閑千古情同前魏瓘侍郎知廣州子城一角忽頽一古塼有四大字云委於鬼工是魏字公感其事大築新之罷而召還仲簡待制代之未㡬儂賊冦廣州外城一擊而北獨子城堅完民頼以生賊平朝廷以公有前知之僃加諌議大夫再知五羊二年公以築城之功自論乆不報作感懐詩曰羸羸霜髪一衰翁蹤跡年來類短蓬萬里逺歸雙闕下一身還在衆人中螭頭賜對恩雖厚雉堞論功事已空淮上有山歸未得獨揮清淚洒春風又五年書事詩云雖云嶺外無霜雪何事秋來亦滿頭文潞公採其詩進呈加龍圖閣學士尹天府南唐元宗割江之後金陵對岸即是敵境因遷都豫章每北望忽忽不樂有詩曰靈槎思浩蕩老鶴憶崆峒又廬山百花亭刋石云蒼苔迷古道紅葉亂朝霞皆佳句也隋煬帝迷於聲色髙昌薦浙人項升進新宫圖覽之大恱即日召有司具材役夫經嵗而成帑庫為之一空幸之喜謂左右曰使真仙逰其中亦當自迷也可目之曰迷樓每一幸即經月宫女無數後宫多不得進有侯夫人者有美色忽自縊於棟下臂懸錦囊左右取進有自感詩三首其一曰庭絶玉輦迹芳草漸成窠隐隠聞簫皷君恩何處多其二曰欲泣不成淚悲來翻强歌庭花方熳爛無計奈春何其三曰春隂正無際獨歩意如何不及閒花草翻承雨露多又云粧成多自恨夢好却成悲不及楊花意春來到處飛又遣意云祕洞扄仙卉雕房鎖玉人毛君真可戮不肯寫昭君煬帝見詩反復傷感眂其屍已死顔色尚爾厚禮𦵏之寜王憲宅左有賣餅人妻有色王欲之厚遺其夫取之寵嬖踰等閱嵗因問云尚思餅漢否默然不對因呼令見其妻注眼淚下若不勝情時坐客十餘無不悽然王請客賦詩王摩詰先成詩曰莫以今朝寵寜忘舊日恩㸔花滿眼淚不共楚王言東海北巖畔有大石龜俗云魯般所造夏則入海冬復止此山涯有詩云石龜尚懐海我寜忘故鄉劉虚白昔與裴令公同研席及公主文虚白猶是舉子試雜文日簾前獻一絶云二十年前此夜中一般燈燭一般風不知嵗月能多少猶着麻衣待至公並同前余自夏厯秋每熱七八十日不衰炮灼理極意謂不復有清凉之時今日復凄風微雨遂禦夾衣顧念茲嵗屈指可盡彭澤云我今不為樂知有來嵗否此言真可為惕然也王直方詩話僧可隆善詩髙從誨閱其巻有觀棋句云萬般思後行一失廢前功從誨謂可隆曰吾師此詩必因事而得隆答曰某本姓慕容與桑維翰同學少負志氣多忽維翰維翰登第以至入相某猶在場屋頻年敗衂皆維翰所挫也因削髪為僧其句實感前事而露意焉從誨識鑒多此類也天定録廖齊父爽直嘗為永州刺史齊後逰零陵於民間見父題壁感而成詩曰下馬連聲叩竹門主人何事感遺恩回頭泣向兒童道重見甘棠舊子孫青瑣后集杜牧大和三年佐吏部沈公傅師幕在江西時好好年十三始以善歌來入樂籍中後一年公鎮宣城復置好好於宣城籍中後三嵗為沈著作述師納之後三嵗於洛陽城重見覩好好感舊傷懐故題二十韻以贈之爾為豫章姝十三纔有餘翠茁鳯生尾丹葉蓮含趺髙閣倚天半晴江聨碧虚此地試爾唱特使華筵鋪主公顧四座始訝來踟蹰吳娃引賛起低回映長裾雙鬟可髙下才過青羅􅃭盻盻乍垂袖聲同雛鳯呼繁絃迸闗組塞管裂寒蘆衆音不能逐裊裊穿雲衢主公再三歎為言天下殊贈之天馬錦副以水精珠龍沙㸔秋浪眀月逰東湖自此每相見三日以為踈玉質隨月滿艷態逐春舒絳唇漸輕巧雲歩轉虚徐旌斾忽東下笙歌隨軸轤霜彫謝庭木沙煖句溪蒲身外任塵土樽前極歡娱飄然集仙客著作堂合集賔按理諷賦欺相如聘之碧瑶珮載以紫雲車洞户水聲逺月髙蟾影孤邇來未幾嵗散盡髙陽徒洛陽重相見婥婥為當壚恠我苦何事少年垂白鬚朋逰今在否落魄更能無門舘慟哭後水雲秋景初斜月掛衰栁凉風生坐隅灑盡滿襟淚短歌聊一書蜀王後俘係入秦至劍閣閲山水之美詩云不縁朝闕去好此結茅廬時人笑之至咸陽又作曲子云盡是一場嬴得與夫無愁入井者所校無多也北夢瑣言廖圖在永州有江干感興詩云正悲世上事無限細㸔水中塵更多甚為識者所誚种放在章聖朝累章乞歸賜買山銀百兩放少時有瀟湘感事詩曰離離江草與江花往事洲邊歎復嗟漢傅有才終去國楚臣無罪亦沉沙凄凉野浦寒飛鴈牢落汀祠晚聚鵶無限清忠沉浪底㴞㴞千頃屬漁家亦先兆也古今詩話開元時樂工李龜年承顧遇於東都通逺里創堂甲扵都下其後流落江南每為人歌則坐客掩泣罷酒杜子美嘗贈詩曰岐王宅裏尋常見崔九堂前數度聞正是江南好風景落花時節又逢君崔九即漢中令湜之弟也眀皇雜録眀皇初自巴蜀回夜䦨登勤政樓倚欄南望烟月滿目因歌曰庭前琪樹已堪攀塞北征人尚未還盖盧思道之詩也歌畢里中隠隠如有歌者謂力士曰得非梨園舊人乎遲眀為我訪來翌日力士潛求於里中召至果梨園弟子也其夜復乗月登樓左右惟力士及妃侍者紅桃在焉遂命歌凉州凉州即貴妃所製親御玉笛為倚樓曲曲罷無不掩淚因廣其曲傳扵人間眀皇在南内耿耿不樂每自吟太白傀儡詩曰刻木牽絲作老翁雞皮鶴髪與真同湏㬰弄罷渾無事還似人生一世中並同前東坡在黄州盡和淵眀詩魯直在黔南思州聞之作偈曰子瞻謫海南時宰欲殺之飽喫恵州飯細和淵眀詩淵眀千載人子瞻百世士出處固不同風味亦相似鄒志完過永州淡山巖巖有馴狐凡賔客至則鳴志完将至而狐鳴僧出迎以馴狐為言志完作詩曰我入幽岩亦偶然初無消息與人傳馴狐戯學仙伽客一夜飛鳴至老禪並冷齋夜話詩話總龜巻二十五欽定四庫全書詩話總龜巻二十六宋阮閱撰寄贈門吕文穆公蒙正嘗與温恭肅仲舒及一友人忘其姓名讀書於洛陽龍門山誓不作狀元不仕及唱第文穆為狀頭温已不意然尚中甲科其友人隨拂衣歸隐後文穆大用太宗問昔與誰友文穆即以歸隐者對遂以著作郎召不起故文穆罷相歸洛作詩贈之曰昔作儒生謁貢闈今提相印出黄扉九重鴛鷺醉中别萬里烟霄達了歸隣叟盡垂新白髪故人猶着舊麻衣洛陽謾說多才子自嘆遭逢似我稀故人盖指歸隠者也青箱雜記梁周翰太宗朝為舘職真宗即位除知制誥栁開贈詩曰九重城闕新天子萬巻詩書老舎人古今詩話五代末濠梁人南楚材逰陳潁間潁守欲以女妻之楚材已娶薛氏以受潁守之恩遣人歸取琴書之屬似無還意薛氏善書畫能屬文自對鑑圖其形并作詩寄之曰欲下丹青筆先拈玉鑑端已驚顔寂寞漸覺鬂凋殘淚眼描將易愁腸冩出難恐君渾忘却時展畫圖㸔楚材見而慚焉與之偕老唐宋遺史韋應物為蘇州太守嘗有詩贈米嘉榮曰吹得凉州意外聲舊人惟有米嘉榮近來年少欺前軰好染髭鬚學後生又嘗赴本州司空杜鴻漸宴醉宿驛亭醒見二佳人在側驚而問之乃曰郎中席上與司空詩因令樂妓侍寝問記其詩否一妓强記乃誦之曰髙髻雲鬟宫様粧春風一曲杜韋娘司空見慣渾閒事㫁盡蘇州刺史腸同前古今詩話劉夢得詩唐末士子崔郊始有婢端麗郊竊愛之他日鬻婢扵襄陽司空于頔得錢四十萬因寒食出逰婢見郊立于栁隂下郊因作詩隨以贈之曰公子王孫逐後塵緑珠埀淚滴羅巾侯門一入深如海從此蕭郎是路人疾郊者録詩以示頔頔召郊執其手曰詩公所作也四十萬小哉何不早言因以婢贈之唐史雷徳遜有終父子二人並命為江南淮南漕王元之贈詩二首其一曰江南江北接王畿漕運帆檣去似飛父子有才同富國君王無事免宵衣屏除奸吏魂應䘮養活疲民肉漸肥還有文塲受恩客望塵情抱倍依依其二曰當時詩氣壓朱雲老作皇家諫諍臣章䟽罷封無事日朝廷猶指直言人題詩野舘光泉石講易秋堂動鬼神棘寺下僚叨末路齋心猶祝秉洪鈞元之嘗出徳遜門下而徳遜深於易酷于詩也青箱雜記樞密邵公堯謂余詩似樂天一日閲相藍書肆得馮瀛王詩集歸公與余語曰子詩似樂天又愛馮集將來拈取箇豁達李老慶厯中京師有人號豁達李老每好吟詩而詞多鄙俚以此戯之遂皆大笑熈寜中余辟定武帥幕公自鄆附所作詩一軸并寄余詩曰流年真似隙中駒别後情懐懶更踈天上又頒新厯日床頭未答故人書殷勤羔鴈功曹檄狼籍杯盤上客魚好在仲宣家萬里從軍苦樂定何如李文正昉吕正恵端同踐文舘後皆登台輔李贈吕詩曰憶昔就居眀徳坊官資俱是校書郎青衫共直昭文舘白首同登政事堂佐國廟謨公已展避賢榮路我猶妨主恩至重何時報老眼相㸔淚两行並同前向文簡敏中冦忠愍準二相同以太平興國五年登第後文簡秉鈞忠愍以使相守長安文簡作詩寄忠愍忠愍酧之曰五殿登科四十年當時僚友盡英賢嵗寒惟有公兼我白首猶持將相權唐宋遺史劉昌言泉州人常侍陳洪進為幕客入朝為副樞嘗作下第詩落句云唯有夜來蝴蝶夢翩翩飛入刺桐花後為商丘記室王元之贈詩曰年來濩落事堪嗟載筆商丘鬂欲華酒好未陪紅杏宴詩狂多憶刺桐花盖為是也同前錢塘林逋處士有髙節范文正公贈詩曰巢由不願仕堯舜豈遺人風俗因公厚文章到老醇張乖厓公為布衣時與陳希夷善因夜話謂希夷曰欲分先生華山一半住得無希夷曰餘人不可先軰則可及旦相别希夷以宣和中筆一枝白雲臺墨一劑蜀牋一角贈之公曰㑹得先生意驅某入閙處去曰珍重珍重希夷送公回謂門弟子曰此人無情於物達則為公卿不達則為帝王師公嘗感之後尹蜀過華隂寄希夷詩曰性愚不肯林泉住强要清時擬致君今日星馳劍南去回頭慚愧華山雲曹修司封守邵武以竹簟贈僧仁曉并恵小詩曰翠筠織簟寄禪齋午夜秋從枕底來若也此時人問道寒天捲却暑天開並同前孟賔于湖湘連上人少修儒學好詩有百篇名金鰲集獻于李若虚侍郎因採集中佳句可取者記之于書使賔于馳詣洛陽獻諸朝廷其譽藹然眀年春與李昉同擢進士第後事李後主為􅇭陽令因抵法當死㑹昉遷翰林學士聞在縲絏以詩寄賔于曰初擕書劍别湘潭金榜標名第十三昔日聲塵喧洛下近來詩價滿江南長為邑令情終屈縱處郎曹志未甘莫學馮唐便休去眀君晚事未為慚主見其詩而宥之復官未幾歸老連上號群舉叟吉守馬致恭以詩送其末章云今日還家莫惆悵不同初上渡頭船江南野録雅言系述記吉守送賔于詩有全篇及賔于詩李頴方干髙弟也登第後干寄詩曰弟子已攀桂先生猶卧雲鑑戒録羅隠以諷刺之深文而不第劉賛贈之詩曰人皆言子屈我獨以為非眀主既難謁青山何不歸年虚侵白鬂塵任汚麻衣自古迯名者至今名豈微隠見之遂起歸與之興作五湖詩曰江東日暖花又開江東行客思悠哉髙陽酒徒半凋落終南山色空崔嵬聖代也知無棄物侯門未必用非才一船眀月一竿竹家在五湖歸去來施肩吾贈邊將詩曰輕生奉國不為難戰苦身多舊箭瘢玉匣鎖龍鱗甲冷金鈴繫鶻羽毛寒皂貂擁出花當背白馬騎來月在鞍却恐犬戎臨虜塞栁營時把陣圖㸔杜荀鶴善于詩有贈僧句云安禪不必湏山水滅得心頭火自消又云利門名路兩何慿百嵗風前短焰燈只恐為僧心不了為僧心了是輸僧翁承賛唐末為諌議大夫使福州至劍浦縣見舊識僧亞齊贈詩云蕭蕭風雨建陽溪溪畔維舟見亞齊一軸新詩劔潭北十年舊識華山西吟魂昔向江村老空性元知世路迷應笑乗軺青瑣客此時無暇聽􅆐啼唐陸希聲以雙鉤寫字法授僧䛒光䛒光入長安為翰林供奉而希聲尚未達以詩寄䛒光曰筆下龍蛇似有神天池雷雨變逡廵寄言昔日不龜手應念江湖洴澼人䛒光感其言薦希聲後至宰相並同前興國中潘若冲罷桂林經南岳留鶴一隻與廖融贈詩一章云峭格數年同野興一官纔罷共船歸稲梁少飼教長痩羽翼無傷任逺飛側耳聽吟侵静燭銜花作舞帶斜暉朝天萬里不將去留伴髙人向釣磯若冲到京授維揚通理臨行復有詩寄融曰曽經别墅住行蹤春浪和烟撼釣筒共歩幽亭連石蘚寄眠静榻帶松風秋來頻夢岳雲白别後應添鶴頂紅又泛汴舟隨汴水不堪南望思忡忡後至維揚聞融與鶴相繼而亡若冲感而又為一絶云南岳僧來共歎吁風亭月榭已荒蕪先生去世未十日留伴髙吟鶴亦徂融卒未久潘有泉陵之命經隠居有詩哭云天䘮我良知無言雙淚垂惟求相見夢永絶寄來詩應有異人吊從茲雅道衰春風古原上新塜草離離雅言雜載杜羔妻劉氏善為詩羔累舉不第將至家妻即先寄詩曰良人的的有竒才何事年年被放回如今妾面羞君面君到來時近夜來羔見詩即時回去尋登第妻又寄詩云長安此去無多地欝欝葱葱佳氣浮良人得意正年少今夜醉眠何處樓南部新書張介以命術逰公卿門寓居錢塘西湖上嘗自京師南歸士大夫率為詩贈之吕許公王沂公時方執政亦皆有詩夏鄭公留守南京為詩懐二公曰上公詩筆千金重逋客歸装一舸輕莫到青山更招隠且留眀哲為蒼生鄭谷雪詩云亂飄僧舎茶烟濕密洒歌樓酒力微江上晚來堪畫處漁人披得一簔歸有叚賛善善畫因采其詩為圖曲盡瀟洒之意持以贈谷谷為詩以謝之云賛善賢相後家蔵名畫多留心于繪素得意在烟波屬與同吟咏功成更琢磨愛余風雨句幽絶冩漁簑古今詩話歐陽价工傳神楊次公贈之詩曰國手曽煩寫幾囬無人彷彿醉顔開青銅鑑裡尋常見不謂今從筆下來奉職劉祕亦贈詩曰筆妙今為第一人心期造化奪天真精神形骨從來一移入青縑似兩身古今詩話唐相鄭棨贈老僧詩曰日照西山雪老僧門未開凍瓶粘柱礎宿火隠爐灰童子病歸去鹿麑寒入來自云此詩可以衡稱輕重不偏也嘗有人問相國近有新詩否曰詩在㶚橋風雪中驢子上此中安可得之同前王定保唐光化三年李渥侍郎下及第吳子華侍郎臠為婿子華即世定保南逰湖湘無北歸意吳假緇服自長安來眀日訪其良人白于馬武穆王令引見定保於定保寺吳隔簾誚之曰先侍郎重先軰以名行俾妾侍箕箒侍郎沒慮先軰以妾改適是以不逺千里來眀侍郎之志定保不勝慚赧致書武穆乞為婿吳確乎不㧞定保為盟畢世不婚矣吳歸吳中外家沈彬有詩贈定保云仙桂曽攀第一枝薄逰湘水阻佳期皋橋已失齊眉願蕭寺行逢落髪師廢苑露寒蘭寂寞丹山雪㫁鳯参差聞公已有平生約謝絶女蘿依兎絲定保後為馬不禮奔五羊依劉氏官至卿郡閣雅談賈島為普州司倉方干寄詩曰亂山重複叠何路見先生豈料多才者空垂不第名閑曹曽得醉薄俸亦勝畊莫問為詩苦年年芳草生鑑戒録稷山驛吏王金作吏五十六年稱有道術往來多贈篇什李義山有詩贈云過客不湏詢嵗代唯書乙亥與時人令狐綯自湖州刺史拜翰林學士因夜召對坐從容語及文宗大稱之由是眷遇有加未幾拜相因郊禋侍祠還趙嘏贈詩云鶚在雲霄氷在壺代天才業共訏謨榮同伊陟傳朱戸秀比商王入畫圖昨夜星辰廻劍履前年風月落江湖自湖州召入纔二年不知機務時多暇猶許詩家屬和無詩史李賛皇頗開寒素之路及南遷或人贈詩曰八百孤寒齊下淚一時南望李崕州徐鉉謫居舒州贈彭芮云賈生去國已三年短褐閒吟翫水邊終日野雲生砌下有時京信到門前無人與和投湘賦愧子來浮訪戴船醉裏新詩好歸去莫隨騷客賦林泉並同前陳文恵堯佐退居鄭下張退傳知西京以姚黄魏紫及酒恵文恵答詩曰有花無酒頭慵舉有酒無花眼倦開正向西園念蕭索洛陽花酒一時來寒齋廣録詩話總龜巻二十六欽定四庫全書詩話總龜巻二十七宋阮閱撰書事門唐髙宗承正觀之後天下無事上官儀侍郎獨持國政嘗凌晨入朝廵洛水堤歩月徐轡咏詩云脉脉廣川流驅馬入長洲鵲飛山月曉蟬噪野風秋音韻清亮群公望之如神仙焉小說舊聞長和國使人布爕聽蜀妓洞雲歌詩云嵇叔夜鼓琴飲酒無閒暇若使當時聞此歌抛擲廣陵都不藉劉伯倫虚生浪死過青春一飲一石猶自醉無人為爾卜深塵又思鄉詩曰虜北行人絶雲南信未還庭前花不掃門外栁誰攀坐乆銷銀燭愁多减玉顔懸心秋夜月萬里照闗山鑑戒録江南人多畬田先熂爐熂音餼縱火燎草也爐火燒山界也俟經雨乃下種厯三嵗土脉竭不可復種藝但生草朩復熂旁山宋西陽王子尚部鄞縣有疁田音嘐留畬田也子尚言山湖之俗熂山封水澤山湏熂爐後種劉禹錫適連州作畬田詩云何處好畬田團團縵山腹鑚龜得兩卦上山燒卧木又云下種暖灰中乘陽折芽蘖蒼蒼一雨後苕穎如雲發白樂天子規歌云畬田有粟何不啄石楠有枝何不棲畬音羊諸反爾雅云一嵗曰菑二嵗曰新三嵗曰畬易曰不菑畬皆同音凡三嵗而不可復種盖取畬之義也談苑進士科始隋大中盛於正觀永徽之際縉紳雖位極人臣不由進士者不以為美其推重謂之白衣卿相又曰一品白衫其不利者謂之三十老五經五十少進士有老於文塲者亦無恨焉故有詩云太宗皇帝真長筞賺得英雄盡白頭摭言浮玉老師元公欲為吾買田吾有詩云江山如此不歸山江神見恠驚我頑我謝江神豈得已有田不歸如江水今有田矣而不歸無乃食言扵神耶百斛眀珠世常傳云欲人不知莫若不為以謂既為之也安得人之不知夫至隐至密者莫若中冓之事豈欲人之知邪然而不能使人不知以此凡事之不循理者雖毛髪之細不可為也眀皇舊置五王帳長枕大被與兄弟同處於其間無何妃子輙竊寜王笛吹之始亦不彰因張祜詩云梨花静院無人處閒把寜王玉笛吹妃因此忤眀皇不懌乃遣中使張韜光送歸楊銛宅妃子涕泣謂韜光曰托以下情繳奏妾罪固當萬死衣服之外皆聖㤙所賜惟髪與膚生從父母爾今當即死無以謝上乃引刀剪髪一結附韜光以獻自妃之放逐聖情憮然妃髪至張韜光取搭之肩上眀皇見之大驚惋遂令髙力士就召以歸嗟乎道路之言亦可畏也使張祜不為此語事亦何由彰顯之如此然張亦何從得此為之說以此可驗其欲人不知莫若不為亦名言也唐末有宜春人王轂者以歌詩擅名於時嘗作玉樹曲璧月夜夜瓊樹春蓮舌泠冷詞調新當時狎客盡豐祿直諫犯顔無一人歌舞未終樂未闋晉王劍上粘腥血君臣猶在醉鄉中面上已無陳日月此詞大播于人口轂未第時嘗於市㕓中忽見同人被無賴輩毆打轂前救之揚聲曰莫無禮識吾否吾便是解道君臣猶在醉鄉中面上已無陳日月者無賴軰聞之歛恥慚謝而退噫無賴者乃小人也能為此等事亦可重也方其倚力恃勢勃然以發兇暴之氣将行毆擊視其死且無悔矣及一聞其名則慙謝之色形于外斯亦難矣有改悔之恥尚善之心得不謂之君子哉百斛眀珠戚綸密學初仕為吉州太和令里俗頑悍喜結誣訟公至以術漸磨先設巨械嚴固狴犴其箠梃組索比他邑數倍民已自悚駭次作諭民頌五十絶不事風雅皆風俗易曉之語俾之諷誦以申䂓警立限日誦半年頑心不悛一以苛法治之果因此獄訟大减其詩有云文契多欺嵗月深更將疆界强相侵官中檢出真兼偽枷鎖鞭笞痛不禁大率類此江南往往有本玉壺清話今時市語答人真實事則稱見來此語盖已久矣坡贈黄山人詩云面頰照人元是白眉毛覆眼見來烏直方詩話羅虬羅鄴羅隠齊名號三羅李孝恭籍中有紅兒善肉聲嘗為二車屬意聘隣道虬請紅兒歌而贈之繒綵孝恭以副車所貯不令受所貺虬怒拂衣而起詰旦為絶句百篇號比紅兒詩盛行于時摭言盧仝詩云何時得去禁酒國今吾謫嶺南萬戸酒家有一婢昔嘗為酒肆頗能伺候冷煖自今當不乏酒可以日飲之何其去禁酒國矣玉局文上元夜登樓貴戚例有黄柑相遺謂之傳柑東坡有扈從端門觀燈詩云老病行穿萬馬群九衢人􅄆月紛紛歸來一盞殘燈在猶有傳柑遺細君盖謂此也直方詩話前軰戯語有西湖風月不如東洛軟紅香塵之語故東坡和錢穆父蔣頴叔從駕景靈官詩云半白不嗟垂項髪軟紅猶戀屬車塵李方叔為坡公客坡公知貢舉而方叔下第有詩云平生謾說古戰場過目還迷日五色山谷和之云今年持槖佐春官遂失此人難塞責盖是時山谷亦在貢院中也舟人占雲若砲車雲起輙急避雲乃大風候也東坡有云今日江頭天色惡砲車雲起風欲作文潛有云喜逢山色開眉黛愁對山雲起砲車冰㕔事見因話録云歐陽有詩云獨宿冰㕔夢帝闕余疑李賀云酒滴珍珠紅夏彦剛云江南人造紅麯酒白樂天云羌管吹楊栁燕姬酌葡萄謂太原出葡萄酒也然此乃律詩用平聲讀則太不律用仄聲讀則近俗耳京師芡實最盛於㑹靈觀之凝祥池故文忠詩曰凝祥池鎖㑹靈園僕射荒村安可比而東坡又云忽憶嘗新㑹靈觀滯留江海得加飡僕射坡在鄭州世亦稱其芡實也同前老杜有坐開桑落酒句世說謂桑落何多美酒而庾信有從蒲州刺史乞酒詩云蒲城桑落酒㶚岸菊花秋詩云年老身閑無外事麻衣草坐亦容身相逢盡道休官去林下何曽見一人盖載於雲溪友議而歐陽文忠以謂相傳作俚諺慶厯中天章閣待制許元為江淮發運使因修江㟁得此石于池湯江水中始知為靈徹詩何邪同前宥護尚書言來禽以味甘來衆禽也而東坡和舒王詩云青李扶踈禽自來何邪酴醿本酒名也新開花本以其顔色似之故以取名山谷所以有名字因壺酒風流付枕幃之句又云風流徹骨成春酒夢寐宜人入枕囊宜或作疑京師舊無鴨脚李文和自南方來移植于私第因而着子自後稍稍蕃多不復以南方者為貴歐陽文忠作詩云鴨脚生江南名實未相浮綘囊因入貢銀杏貴中州致逺有餘力好竒自賢侯因令江上根結實夷門秋始摘纔三四金奩獻凝旒公卿不及識天子百金酧嵗久子漸多纍纍枝上稠玉人名好客贈我比珠投博望昔所徙葡萄安石榴想其初來時厥價與此侔今也徧中國籬根及􅉹頭物性久雖在人情逐時流惟當貴其始後世知來由是亦史官法豈徒續君謳劉太真與韋蘇州書云顧著作來見足下郡齋燕集想亦云何情致暢茂遒逸之如此宋齊間沈謝吳何始精於理意縁情體物稱詩人指後之傳者甚矣其源推足下制其横流師摯之始闗雎之亂于足下之文見之矣則知蘇州詩為當時所貴如此燕集所作乃兵衛森畫㦸燕寢凝清香也昔文潞公來朝裕陵待以殊禮禁從三省皆為賦詩李籍云三公厯拜榮無敵二府更居貴莫倫畢仲㳺云十年三册命四海一師臣皆為能叙其官爵錢長卿云三陪藻燕簮裾上五對龍顔日月邊又云黼座勸觴鈞樂逸雲章屬韻侍貂傳此為叙其恩禮盖公自初覲至出闗賜特燕者三登對者五上親勸以御觴而後復和其所賦故長卿云爾詩云白藕作花風已愁或作秋不堪殘睡更回頭晚雲帶雨歸飛急去作西忩一夜秋或作愁此趙徳麟細君王氏所作也徳麟既鰥居因見此篇遂與之為親余以為乃二十八字媒也秦少㳺為黄門錢穆父為戸部皆居扵東華門之堆垜場少㳺春日嘗以詩遺穆父云三年京國鬂如絲又見新花發故枝日典春衣非為酒家貧食粥已多時穆父以米二石送之復為二十八字云儒舘優賢盖取頥校讐猶自困朝饑西隣為禄無多少希薄才堪作淖糜時人以少㳺有如此才而亦食粥似不相稱耳東坡寄栁子玉云聞道床頭帷竹几夫人應不解卿卿又送竹几與謝秀才云留我同行木上座贈君無語竹夫人盖俗謂竹几為竹夫人也山谷云竹夫人廼凉寐竹器憇臂休膝非夫人之軄而冬夏青青竹之所長故為名曰青奴嘗作詩曰穠李四弦風拂席昭華三弄月侵床我無紅袖堪娯夜正要青奴一味凉穠李昭華貴人家兩女奴也張文潛後作竹夫人傳宣勸字東坡數使之其一和王仲至喜雪御筵詩曰宣勸不多心自醉其一和蔣頴叔端門觀燈詩云十分宣勸恐難勝東坡謫黄州居於定恵院之東雜花滿山而獨有海棠一株士人不知貴東坡為作長篇平生喜為人寫盖人間刋石者自有五六本云吾平生最得意詩也杭州有西湖而潁亦有西湖皆為逰賞之勝而東坡連守二州其初得潁也有潁人在坐云内翰只消逰湖中便可以了郡事盖言其訟簡也秦覯少章因作一絶以獻云十里荷花䓿蓞初我公所至有西湖欲將公事湖中了見說官閒事已無後東坡到潁有謝執政唘亦云入叅两禁每玷北扉之榮出典二邦輙為西湖之長並同前唐徳州刺史王倚家有筆一管粗于常筆刻從軍行人馬毛髪亭臺山水無不精絶刋两句曰亭臺琪樹已堪攀塞北征人尚未還古今詩話北方白雁似鴈而色少白秋深乃來白鴈至則霜䧏河北人謂之霜信杜甫詩云故國霜前白鴈來即謂此同前大丞相劉公沆赴舉道過獨木鎮有老人出曰知公赴舉有一聨相贈曰今年直跨窮驢去異日當乗寳馬歸公曰何以知之叟曰公自是羅浮山玉源道君公愧謝叟乃去青瑣集王仁裕嘗養一猿名之曰野賔久而放之因作詩曰放爾丁寜復故林舊來行處好追尋月眀巫峽堪憐静路隔巴山莫􅌅深棲宿免勞青嶂夢躋攀應愜白雲心三秋果熟松梢健任爾髙枝徹曉吟後入蜀過嶓􅜗祠前漢江之隂有羣猿聨臂而下飲清流有巨猿捨羣而前從者指之曰此野賔也呼之猶應哀吟而去又作一篇云嶓􅜗祠邊漢水濵山猿連臂下嶙峋漸來仔細窺行客認得依稀是野賔月宿應勞覊旅夢松棲那復稲粱身數聲腸㫁和雲呌識得前年舊主人脞說后集東坡南遷有侍兒王朝雲請從行坡佳之作詩有序曰世謂樂天有鬻駱馬放楊枝詞佳其至老病不忍去也然夢得詩云春盡絮飛留不得隨風好去落誰家樂天亦曰病與樂天相伴住春同樊素一時歸則樊素竟去也余有數妾四五年相繼辭去獨朝雲隨余南遷因讀樂天詩戯作此贈之不學楊枝别樂天且同通徳伴伶𤣥伯仁絡秀不同老天女維摩總解禪經巻葯爐新活計舞裙歌板舊因縁丹成隨我三山去不作巫山雲雨仙盖紹聖元年十一月也三年七月朝雲卒𦵏扵西禪寺松林中直大聖塔和前詩曰苗而不秀豈其天不使烏童與我𤣥駐景恨無千嵗葯贈行唯有小乗禪傷心一念償前債彈指三聲㫁後縁歸卧竹根無逺近夜深勤禮塔中仙冷齋夜話杜甫贈髙適詩云脫身簿尉中始與捶楚辭韓退之贈張功曹詩云判司卑官不可說未免捶楚塵埃間杜牧寄小姪阿宜詩云参軍與簿尉塵土驚皇皇一語不中治鞭捶身滿瘡以此眀唐之叅軍簿尉有過即受笞杖之刑猶今之楚吏也遯齋閒覽俗云槐花黄舉子牤謂槐之方花乃進士赴舉之時而唐詩人翁承賛詩云雨中粧㸃望中黄勾引蟬聲送夕陽憶得當年隨計吏馬蹄終日為君忙乃知俗語亦有所自也詩話總龜巻二十七欽定四庫全書詩話總龜巻二十八宋阮閱撰故事門章聖朝春月多召兩府兩制三舘於後苑賞花釣魚賦詩自趙元昊背叛西陲用兵廢缺甚久嘉祐末仁宗為修故事群臣和御製詩是日微隂寒韓魏公時為首相和詩卒章云曽叅二十年前㑹今􅍯台司得再陪時内侍都知任守忠常以滑稽侍上從容曰韓琦譏陛下仁宗愕然問其故守忠曰譏陛下逰宴太頻仁宗為之笑閑居詩話唐制禮部郎中掌省中文翰謂之南宫舎人百日内湏知制誥故王元之贈宋給事詩曰湏知百日掌絲綸又謂員外郎㕔為瑞錦窠㕔前有大石諸州府送到廢印皆於石上碎之又祥瑞圖亦掌於員外㕔令狐楚元和中任員外郎有詩曰移石㡬回敲廢印開箱何處送新圖春眀退朝録北都郡守有過馬㕔按唐韓渥詩云外使進鷹初得按中官過馬不教嘶注云上乗馬必令中官為馭以進謂之過馬既乗之然後蹀躞嘶鳴也唐時方鎮亦效之乃有此名同前世傳潘閬安鴻漸八才子圖皆策蹇重戴又王元之賀狄遵度及第未脫白詩云且留重戴士風流則國初舉子尤重戴矣青箱雜記新進士放榜後翌日排光範門候見宰相雖云排光範門其寔排建福門集於四方舘昔有詩曰華陽觀裡鍾聲禁建福門前皷動時即其日也南部新書張燕公守嵗詩云竹爆好驚眠今人家祀畢始爆竹雜記宋次道嘗為西都詩以野狐落對五鳯樓野狐落唐人名宫人所聚同前曲江㑹先牒教坊請奏上御紫雲樓觀焉時或擬作樂則為之移日故曺松詩云造逰若遇三清樂行從應妨一日春旨下後人置被袋例以圖障酒器錢絹實其中逢花則飲故張籍詩云無人不借花間宿到處常携酒器行其被袋狀元録事同㸃檢缺一則罰金曲江之宴行市羅列長安街至半空公卿帥以其月選東床車馬駢闐莫可殫述摭言韓定辭不知何許人為鎮州王鎔書記聘燕帥劉仁恭後于賔舘令幕客馬郁延接馬有詩贈韓曰燧林芳草綿綿思盡日相擕涉麗譙别後巏嵍山上望羡君時復見王喬郁詩清麗然意在試其學問韓即席答之曰崇霞臺上神仙客學辨痴龍藝最多盛徳好将銀管述麗詞堪與雪兒歌座内諸賔靡不欽訝稱為妙句然亦疑其銀管之譬也他日郁從容問韓以銀管雪兒之事韓曰昔梁元帝為湘東王時好學著書嘗記録忠臣義士及文章之美者筆有三品以金銀雕飾或用斑竹為管忠孝全者以金管書之徳行精粹者用銀管書之文章贍麗者以斑竹管書之故湘東王之譽振於江表雪児李密或為孝齊之愛姬能歌舞每見賔僚文章有竒麗中意者即付雪児叶音律以歌之又問痴龍出何處曰洛下有洞穴曽有人悮墜於其中因行數里漸眀曠見有宫殿人物凡九處又有大羊羊髯有珠人取食之不知何所後出以問張華華曰此地仙九館也大羊名曰痴龍耳定辭復問郁巏嵍之山當在何處郁曰此隋郡之所事何謹遜而下問由是両相悦服結交而去百斛眀珠世傳王子敬帖有黄柑三百顆之語此帖乃在劉季孫家景文死不知今在誰家矣韋蘇州有言書後欲題三百顆洞庭湏待滿林霜盖蘇州亦見此帖也余亦嘗有詩與景文云君家子敬十六字氣壓鄴侯三萬籖劉季孫景文之子也慷慨竒士博學能詩僕薦之得隰州以歿哀哉嘗有詩寄僕曰四海共知霜􅁂滿重陽能揷菊花無死之日家無一錢但有書三萬軸畫四百幅耳退之詩曰百年未滿不得死且可勤買抛青春國史補云酒有郢之富水烏程之若下滎陽之土窟春富平之石凍春劍南之燒春杜子美詩亦云聞道雲安麴米春裴鉶作傳竒記裴航事亦有酒名松醪春乃知唐人名酒多以春則抛青春亦必酒名也並同前太祖問趙普男尊女卑何故男跪而女不跪羣臣無對者惟王貽孫曰古者男女皆跪至唐則天時始拜而不跪太祖曰何以為實貽孫曰古詩云長跪問故夫遂得振學譽玉壺清話雞鳴髙樹巔說題辭曰雞為精陽南方之象離為火精陽之象火陽精物炎上故陽出雞鳴以類感也古詞云犬吠深巷中雞鳴髙樹顛樂府集東飛百勞歌詩七月鳴鵙一曰勞鵙也東飛百勞西飛燕言其類不同而飛翔特異無因以相逐故其詩曰春已暮花從風空留可憐與誰同滄海雀風土記六月東南長風海魚化為黄雀又禮記雀入大水化為蛤故荀昶黄雀詩云空城舊侣絶滄海故交分蘭若生春陽感時而思君子也若謂杜若亦香草名左思三都賦曰其草則有杜若衡菊石蘭芷蕙棗下何纂纂潘安仁望賦云輟張艾之哀彈流廣陵之清􅄆詠桃園之夭夭歌棗下之纂纂歌曰棗下纂纂朱實纍纍宛其落矣化為枯枝釋者謂之纂纂棗花也西園逰曹子建公宴詩云清夜㳺西園飛盖相追隨眀月澄清影列宿正叅差並同前京城街衢有金吾傳呼以禁夜行至正觀馬周上封事每街隅懸皷夜擊皷以止其行以􅍯竊盗時人遂呼為􅕣􅕣皷有道人裴修然雅有篇咏善書畫好酒嘗戱為詞遮莫􅕣􅕣皷湏傾滿滿杯金吾若相問報道玉山頽古今詩話青州隆興寺殿前廡下西邉有木臺臺上以架懸三小皷相傳寺乃孟嘗君故宅皷乃集賔客食皷考究不然而皷南壁上有詩一絶云千載遺蹤號皷樓不知誰是雍門周區區此飯徒為爾唯有鳴雞盗可酧不題姓名亦不知何謂唐開元天寳間承平日久世尚輕微多愛三花飾馬郭若虚家蔵貴戚閱馬圖中有三花馬蘇大叅家有韓幹畫三花御馬晏元獻家蔵一畫虢國出行圖亦有三花馬三花者剪鬃為三瓣白樂天詩云舞衣裁四葉馬鬛剪三花是也淮南蜀岡者維揚之地也或曰勢連蜀土或以産茶味如蜀茶云自蜀岡之南有竹西亭修竹踈翠後即禪智寺也竹西取杜牧之詩斜陽竹西路歌吹是楊州自蜀江以南景氣頓異北風至此遂絶鄴中銅駝鄉魏武帝立銅駞石犬各二古詩云石犬不可吠銅駝徒爾為吳宫有香水溪俗云西施浴處人呼為脂粉塘吳王宫人濯粧於此溪上源至今猶香古詩云安得香水泉濯郎襟上塵蘭溪自黄州麻城出東南流入大江有水極清冷杜牧之詩云蘭溪春盡碧泱泱是也磁湖鎮道士磯即西塞山也薛能詩有西塞長雲盡南湖片月斜正謂此處南湖臧質敗走南湖以荷自蔽即此地也彈棋今人罕為之有譜一巻盡唐賢所為其局方二尺中心髙如覆盂其巔為小壺四角微起李商隐詩云玊作彈棋局中心最不平謂其中髙也樂天詩云彈棋局上事最妙是長斜謂抹角長斜一發過半局今譜中具有此法栁子厚叙用二十四棊者即此謂也神龍以來杏園燕後皆於慈㤙寺塔下題名他時有将相則朱書之及第後知聞或遇未及第時題名字添前字故詩曰曾題名處添前字送出城人乞舊詩湘潭縣唐興寺有劉夢得撰儼禪師碑孟賔于鄭谷詩湘水似伊水湘人如故人之句乃此寺前江流也鸊鵜水鳥也其膏可以塗刀劍令不鏽爾雅注云膏玉瑩劍繢英華詩云鳥㘅苜蓿葉劍瑩鸊鵜膏是也周禮四時變火春取榆栁之火夏取棗杏之火唐詩惟春取榆栁之火以賜近臣戚里之家故韓翃有曰日暮漢宫傳蠟燭青烟􅄆入五侯家之句章聖嘗宴群臣於太清樓忽問市店酒有佳者否中貴人對唯南仁和酒佳急令沽賜羣臣又問近臣曰唐時酒每升價㡬何無有對者唯丁晋公奏曰唐時酒每升三十錢章聖曰何以知之晋公曰臣嘗記杜甫詩曰速來相就飲一斗恰有三百青銅錢章聖大喜曰杜甫詩自可為一代之史禮部貢院試進士設香案于階前試官與舉人對拜此唐故事也列坐設位供帳亦盛乃具茶湯至於試學究則撒去㡩幕亦無茶湯渴則飲硯水皆黔其吻非固困之盖防毡幕中蔵文字供應人傳經義爾故事為之防歐陽文忠公詩云焚香答進士撤幕待經生並同前詩病門王靖學蘇子美作壮語曰欲往海上呑鯨鯢又近有士人好為怪語詩云此劉和尚小師畢達亢卑劉貢父曰此乃畨僧名號也又盧延遜吊陳云将詩云自是碙砂發非干礉石傷牒多身上字盌大背邉瘡此乃打脊詩也如金同丁銀花合亦類皆語忌爾作詩宜以為戒詩史詩有語病當避之劉子儀嘗贈人云恵和官尚小師達禄湏干仝用故事取孟子所謂栁下恵不卑小官仲尼曰師也達子張學干禄或有冩此二句减去官字示人曰是畨僧達禄湏干見者大笑此偶自諧合無如輕薄子非刀筆過也古今詩話西頭供奉官錢昭度曾咏方池詩云東道主人心匠巧鑿開方石貯漣漪夜深却被寒星映恰似仙翁一局棋有輕薄子見而笑曰此正謂一局黒全輸也遯齋閑覽}
