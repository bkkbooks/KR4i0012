  - {type: line-break, offset: 3729, content: '', id: KR4i0012_SBCK_020-1a01}
  - {type: variant, offset: 3729, length: 0, content: '', WYG: 人登科其後牛僧孺等四人皆相次拜相先是白居易在翰林日為考覆官其後僧儒罷相出鎮揚州居易在洛中有詩送曰北闕上東京風光十六程坐移丞相閣春入廣陵城紅斾擁雙節白髭無一莖萬人周路看}
  - {type: page-break, offset: 3729, content: '', id: KR4i0012_WYG_041-7b, image: WYG1478/WYG1478-0611b.png}
  - {type: variant, offset: 3730, length: 0, content: '', WYG: 吏立班迎閫外君􅈿重樽前我亦榮何湏身自得将相是門生卓異記僕去嵗錢塘十六年而又來留二年乃去平生自覺出處老少相似樂天雖才名相逺而安分寡求亦庶幾焉二月六日來别南北山惠净上人以天竺醜石見贈乃作絶句三首以全樂天之好曰當年衫髩两青青强說重臨慰别情衰髪只今無可白故應相對話来生其二曰出處依稀似樂天敢将衰朽校前賢便從洛社休官去猶有閒居二十年其三曰在郡依前六百日山中不記幾回來還将天竺一峰去欲把雲根到處栽紀詩唐節度使薛嵩有人獻小鬟十三嵗左右手俱有紋隠若紅線因號為紅線十九年方辭嵩去不可留乃餞别請坐客冷朝陽作詩曰采菱歌罷朩蘭舟送客魂消百尺樓還似洛妃乗霧去碧雲無際水長流江淮間有妓徐月英作詩送人曰惆悵人間萬事違两人同去一人歸生憎平望亭前月忍照鴛鴦相背飛崔涯者吴楚狂生與張祜齊名其妻雍氏子荆寶有女青衣曰玉簫才十嵗常令侍韋姜入關}
