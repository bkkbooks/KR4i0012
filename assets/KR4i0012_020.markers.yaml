  - {type: variant, offset: 3728, length: 0, content: '', WYG: 月並王直方詩話李羣玉好吹笙常使家僮吹之又善急就章性喜食鵞及授校書郎東歸故里盧肇送詩云妙吹應諧鳯工書定得鵞南部新書乾祐三年宣政殿試賢良方正直言極諫科下一}
