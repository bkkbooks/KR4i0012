  - {type: variant, offset: 3740, length: 0, content: '', WYG: 公何抑揚之異也同上子美夜宴左氏莊檢書燒燭短燭正不宜觀書檢閱時暫可也退之短檠二尺便且光可謂燈窻人中語猶有未便燈不籠則損目不宜勤且久山谷夜堂朱墨小燈籠可謂善矣而虚堂非夜久所宜子瞻推門入室書縱横蠟紙燈籠晃雲母慣親燈火儒生酸態盡矣同上張籍嘗移書責退之與人商論不能下氣愈亦有云我昔實愚蠢不能降色辭余謂此乃書生常態昔常見太中爐亭議題紛喧閧然其後有二生坐是鳴鼓豈直議禮家為聚訟哉聖俞謝永叔惠酒云貽詩語且横既醉論益堅曽不究世務閑氣争古先誠有之也同上岑參寄杜拾遺云聖朝無闕事自覺諌書稀退之贈崔補闕云早生得塗未要忙時清諌疏尤宜罕皆繆承荀卿有聴従無諌諍之語遂使阿諛姦佞用以藉口以是知凡造意立言不可不豫為天下来世慮䂬溪西清詩話人之好惡固自不同子美在蜀作悶詩乃云捲簾唯白水隠几亦青山若使余居此應従王逸少語吾當祇以樂死豈復更有悶邪同上王君玉云子美之詩詞有近質如麻鞋見天子垢膩脚不襪之句所謂轉石於千仞之山勢也學者尤之過甚豈逺大者難窺乎同上詩話總龜後集巻}
