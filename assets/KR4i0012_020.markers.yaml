  - {type: variant, offset: 3719, length: 1, content: 增, WYG: 詩話總龜巻二十欽定四庫全書詩話總龜巻二十一宋阮閲撰咏物門下東坡橄欖詩云紛紛青子落紅塩氣味森森苦且嚴待得微甘回齒頰已輸崖蜜十分甜范景仁言橄欖朩髙大難采以塩擦朩身則其實自落所以有落紅塩之語南人誇橄欖河東人誇棗直方詩話李公擇種竹舘中語同舎曰後人指此竹必云李文正所植貢父笑曰文正不獨繫筆亦知種竹耶時有筆工李文正故云後到貢父西省種竹東坡有詩云舊徳終呼名字外後生誰續笑談餘謂此也又一本云爾後貢父種竹坡有詩云舊徳言忘久新栽得再培亭亭思婦石下閲幾人代蕩子長不歸山椒久相待微雲䕃髪彩初月輝蛾黛秋雨叠苔衣春風舞羅帶宛然姑射姿矯首塵冥外陳迹遂云窮佳期從莫再脱如魯秋氏妄結桑下愛玉質委泥沙悠悠復安在此賀方回作望夫石詩也交㳺間無不愛者余謂田承君云此詩可以見方回得失其所得者漸磨之功所失者太粘着皮骨耳承君以為然楊蟠字公濟為蓴菜詩云休説江東春水寒到來且覔鑑湖船鶴生嫩頂浮新紫龍脫香髯帶舊涎玉割鱸魚迎刃滑香炊稲飯落匙圓歸期不待秋風起漉酒調羮任我年時人以為讀其詩不必食蓴羮然後知其味余以為可以言詠物未可以語詩耳陳君節字眀信言錬句不如錬韻余以為若只覔好韻則失于首尾不相貫穿叅寥云東坡在徐州日嘗為秦少㳺置酒少㳺飲罷擁一官妓從叅寥書其裙帶云寄語巫山窈窕娘好將幽夢惱襄王禪心已作沾泥絮不逐春風上下狂並同前踘蹴惟栁三復能之丁晋公亦好焉晋公詩曰背装花屈膝白打太㢘斯進前行両歩蹺去立多時古今詩話郭希聲紙牕詩曰偏宜酥壁稱閒情白似溪雲薄似冰不是野人嫌月色免教風弄讀書燈聞蛩詩曰愁殺離家未達人一聲聲到枕前聞苦吟莫入朱門裡滿耳笙歌不聽君青瑣後集巴蜀三紀以來藝能之士精于書畫者衆矣沙門曇彧學李陽冰篆曇彧則神大師門人也道士張昭嗣效栁公權書昭嗣則傳直天師杜光庭門人也工部元員外昭嘏倣韓擇八分書昭嘏亦光庭門人僧曉巒攻張芝草書曉巒則歸夢弟子皆超其本而差其有獨黄少鑑筌邊鸞雀竹處士滕昌祐擬梁廣花草野人張道隐張藻松石道隐不事論談不與人交往不冠帶不拜跪人謂之探頭相國李昊為著名道隐常在綿竹山中李司議文才繼閻立本寫真書畫八人皆妙絶當代野人平生讀荘老之書有暇則性好圖龍之真形興思忽至即畫百尺之状縦意揮畫茍不稱意則塗抺之不啻千餘軀而已飄飄然雲隂雨氣似蜿蜒之勢擲筆撫掌共為怡逸常以此為適意之作亦曽撰集龍証筆訣三巻傳於家丁未年彭州倅鄭昭請圖真龍於州城之西門太山府君之祠為民致雨於是與二道士數僕夫秉燭以畫使人槌皷噴笛掌祠者頓足起舞其夕三更風雨大沛柰何一時之戯亦濟農事有蒋貽恭留題詩曰世人空解効丹青惟子通𤣥得墨靈應有鬼神㸔茟下豈無風雨助成形威疑噴浪歸滄海勢欲拿雲上杳冥静閉緑堂深夜後曉來簾幕似聞腥野人間語僧齊已松詩云雷電不敢伐靈勢蠧萬端麕依乾節死蛇入朽根蟠影浸僧禪濕風吹鶴夢寒尋常風雨夜疑有鬼神㸔小松云發地纔盈尺蟠根已有靈嚴霜百草死深院一株青後夜蕭騷動空堦蟋蟀聽誰于千嵗外吟倚老龍形續本事詩白傳栁詩二首云青青一樹傷心色㑹入幾人離恨中為道都門多送别長條折盡減春風又一樹春風萬萬枝嫩於金色軟於絲永豐西角荒烟裡盡日無人屬阿誰又顧雲詩云㶚岸晴來送别頻相偎相倚不勝春自家飛絮猶無定争把長條絆得人唐宋詩云羅隠作續本事詩隂鏗石詩云天漢支機罷仙人捧膞餘零陵舊是燕昆眀本學魚還當榖城别自下解兵書羅鄴水詩云􅃞􅃞悠悠幾𣲖分中浮短棹與鷗群遥天帶雨淹芳草玉洞飄花下白雲静稱一竿持處見急流孤舘覺來聞隋家栁色還堪恨東入長淮日又曛鄭谷云竹院松廊分數𣲖晴空清碧亦逶迤落花相逐向何處幽鷺獨來無限時洗鉢老僧臨岸久釣魚閒客捲綸遲晚來一片連莎緑悔與滄浪有舊期韓喜云方圓不定性空柔東注滄溟早晚休髙截碧塘長耿耿逺飛青嶂更悠悠瀟湘月浸千年色夢澤燈含萬古愁别有嶺頭嗚咽處為君更作㫁腸流並同前唐髙相國崇文本荆門将校討劉闢有功授西川節度一旦雪下諸從事吟賞有詩渤海鄙言多呼人為􅐴兒此日筵上謂賔客曰某雖武夫亦有一詩乃口札云崇文崇武不崇文提戈出塞號將軍那箇􅐴兒射落鴈白毛空裏亂紛紛其詩着題皆類北齊敖曹之比太尉駢即其曽孫也鎮蜀日以蠻夷侵暴乃築羅城四十里朝廷雖加㤙賞亦疑其固護或一日奏樂聲知有改移乃題風筝寄意曰夜静絃聲響碧空宫商信任往來風依稀似曲纔堪聽又被風吹别調中旬日果移鎮渚宫北夢瑣言馮涓分符眉州不得之任跼蹐於陳田之間覊愁六年徒歩湘湖著懐秦賦有南冦梁州歌詩集皆傷蹭蹬也有蜀馳引其要云自古皆傳蜀道難爾何能過㧞蛇山忽驚登得雞翁蹟又恐碍着鹿頭闗昻蔵大歩蠶叢國曲頸微伸髙九尺卓女窺忩莫我知嚴仙㨿案何曽識題支機石云不隨俗物皆成土只待良時却補天苦雨行云釡魚化作池中物朩履浮為天際船皆惜已之不遇也蜀城拆體之際幾至殍殕因投鬻米家活有詩云取水郎中何日了破柴員外幾時休早知蜀地區娵與乃訓如此與也悔不長安大比丘即收足大坐也同前徐仲雅題合歡牡丹云平分造化雙包去拆破春風兩面開湘湖故事蔣維東字孟陽零陵人旅中書懐云未有一夜夢不歸千里家落花云流水從将去春風解送来零陵總記東華觀在邵州城下江岸俗謂之水北觀有松偃亞數枝凡八面上有一枝中折搭在半樹間復生垂下掃壇逰人以手扳而撼之則千萬枝皆動覇國時天策府學士徐東野坐事謫居於郡見其魁異賞翫無已因為詩有序序略云揺一枝則萬枝動㸔一面則八面同白犬出其根青羊入其腹漢髙祖琥珀枕虚真君茯苓人疑其孕也詩云半已化為石有靈通碧相生逢堯雨露老值漢風霜月滴蟾心水龍遺胸骨香鹿於毫末后曽見幾興亡裴說鷺鷥云却為分眀極翻令所得遲雍陶云立當青草人初見行近白蓮魚未知同前又古今詩話所載馮眀道舉此詩不知其為鷺鷥也鸕鷀色黒而頭長能沒水捕魚其疾如飛栖宿之處其下雖水深魚多未嘗犯諺云鸕鷀不打脚下塘杜荀鶴詩云深水有魚㘅得出㸔來却是鷺鷥飢鸜鵒居人多養之五月五日去其舌尖則能語聲尤清越雖鸚鵡不能過也僧虚中有詩云菖蒲花不艷鸜鵒性多靈相思樹其狀尤佳子員而紅故老云昔有人北沒于邊其妻追思之泣於樹下而卒因號相思樹黄損鷓鴣詩云而今世上多離别莫向相思樹下啼盖採其意也柘樹多叢生幹踈而直葉豐而厚春蠶食之其絲以冷水繰之謂之冷水絲可為瑟絃盖檿絲之類蒋密咏桑柘詩云綺羅因此朩桃李謾同時楊桐葉細冬青臨水生者尤茂居人遇寒食採其葉染飯色青而有光食之資陽氣謂之楊桐飯道家所謂青飢飯鄭畋二十八宿詩云員眀青飢飯光潤碧霞漿謂此櫟樹多生岡阜之上大則偃亞小則聳岐踈曠而性直伐為薪鍜為炭其力倍于常朩王正詩云未可輕樗櫟尤能濟雪霜朩蘭花枝葉俱踈花即裏白表紫或有四季開者生於深山者尤大可以為舩陸龜䝉朩蘭花詩云曽向朩蘭舩上過不知舩是此花身古今詩話載全篇謂是李義山作映山紅生於山坡欹側之地髙不過五七尺花繁而紅輝映山林開時杜䳌始啼又名杜䳌花成幹詩云杜鵑花與鳥怨艷兩何賖疑是口中血滴成枝上花一聲寒食夜數朶野僧家謝豹出不出日遲遲又斜並同前羅漢絛後洞有草蔓結如帶長丈餘附朩而生相傳謂之羅漢絛畢田詩云五百移栖絶洞深空留轍跡杳難尋緑絲絛帶何人施長到春來掛滿林湘中故事舒王與薛處士碁賭梅花詩輸一首曰華髪尋春始見梅一枝臨路雪培堆鳯城南北他年憶杳杳難尋驛使来與俞秀老至報寜王假寐秀老私跨王驢謁寳覺禪師有頌秀老至王曰為士子敢盗跨吾驢秀老願自贖其罪王曰罰松聲詩一首秀老立就詞極佳人忘之余補曰萬壑揺蒼烟百灘度流水下有跨驢人涓涓欲醉耳冷齊夜話前軰花詩多用美女比状如云若教解語應傾國任是無情也動人俗哉山谷酴醿詩曰露濕何郎試湯餅日烘荀令炷爐香乃是以丈夫比之若出類而吾叔彭淵材作海棠詩不然曰雨過温泉浴妃子露濃湯餅試何郎尤工也曽子宣夫人魏氏作虞美人草行云鴻門刀斗紛如雪十萬降兵夜流血咸陽春殿三月紅覇業已隨烟燼滅剛强必死仁義王隂陵失道非天亡英雄本學萬人敵何用屑屑悲紅粧三軍散盡旌旗倒玉帳佳人坐中老香魂夜逐劔光飛青血化為原上草芳菲寂寞寄寒枝舊曲聞來似歛眉哀語徘徊愁不語恰如初聽楚歌時㴞㴞逝水流今古漢楚興亡兩丘土當時遺事久成空慷慨樽前為誰舞舒王在鍾山有道士來謁因與碁輙作數語曰彼亦不敢先此亦不敢先惟其不敢先是以無所争惟其無所争故能入于不死不生舒王曰此鬬碁隠語東坡詩曰客來茶罷渾無事盧橘楊梅尚帶酸張嘉甫曰盧橘何種果也曰枇杷是矣事見相如賦嘉甫曰盧橘夏熟黄柑橙榛枇杷然柿亭柰厚朴盧橘果枇杷不應重用應劭注曰伊尹書曰箕山之東青鳥之所盧橘常夏熟不㨿之而何也坡笑曰不欲爾余㳺儋耳見黎民出東坡别海北詩曰我本儋耳民寄生西蜀州忽然跨海去譬如事逺逰平生生死夢三者無劣優知君不再見欲去且少留又登望海亭柱間有擘窠大字曰貪看白鳥横秋浦不覺青林沒暮潮又謁姜唐佐見其母余問識蘇公乎曰然無柰好唫詩嘗杖而至有包燈心紙公以手拭開書滿紙余案讀之醉墨欹傾曰張睢陽生尤罵賊嚼齒空齗顔平原死不忘君握拳透𤓰余志瓊州有長短句賦燈蛾曰密燭花猶清夜䦨粉衣香翅遶團圞人皆認假為真實蛾豈将燈作火㸔方嘆息為遮攔也知愛處實難􅂸忽然性命隨烟㷔始覺從前被眼瞞老杜詩曰笋根稚子無人見沙上鳬雛傍毋眠世不解稚子無人見何等語唐人食筍詩曰稚子脫錦綳駢頭玉香滑則稚子為笋眀矣賛寜雜記曰竹根有鼠大如猫色類竹名竹豚亦名稚子余問韓子蒼子蒼曰笋為稚子老杜之意不用食笋詩亦可老杜北征詩曰惟昔艱難初事與前世别不聞夏商衰中自誅褒妲意著眀皇鑑夏商之敗畏天悔過賜妃子死也而劉禹錫馬嵬詩曰官軍誅佞幸天子捨妖姬羣吏仗門屏貴人牽帝帶白樂天長恨詞曰六軍不發無柰何宛轉蛾眉馬前死乃官軍廹使殺妃子謌詠禄山叛逆耳孰謂劉白能詩哉北征詩識君臣大體可貴也衡州花光仁老以墨冩梅花魯直嘆曰如嫩寒春曉行孤山籬落間但欠香耳余賦長短句曰碧瓦籠晴香霧遶呵手巡簷小駐聞啼鳥風度女牆吹語笑南枝破臘應開了道骨不凡江瘴曉春色通靈醫得花重好小抱釀寒春杳杳一聲畫角殘陽照又曰入骨風流國色透塵種性真香為誰風流鬂啼粧半樹水村春暗雪壓枝低籬落月髙影動池塘髙情數筆寄微茫小寝初開霧帳並同前詩話總龜巻二十一欽定四庫全書詩話總龜巻二十二宋阮閱撰宴逰門李文正公言少保王仁裕與諸門生飲出一詩板掛于坐次曰二百一十四門生春風初長羽毛成擲金換得天邊桂鑿壁偷將牓上名何幸不才逢聖世偶將踈網罩群英衰翁漸老兒孫小異日知誰畧有情公知舉時年已老諸子皆亡唯有幼孫又與諸門生春日㑹飲于繁臺賦詩曰栁隂如霧絮成堆又引門生飲故臺池景即隨風雨去芳樽宜命管絃催謾誇列鼎鳴鍾貴寜免朝烏夜兎催爛醉也湏詩一首不能空放馬頭回摭遺冦萊公有妾曰蒨桃公因㑹贈歌者以束綾蒨桃作二詩呈公曰一曲清歌一束綾美人猶自意嫌輕不知織女螢牕下幾度抛梭織得成風勁衣單手屢呵幽忩軋軋度寒梭臘天日短不盈尺何似燕姬一曲歌公和曰將相功名終若何不堪急景似飛梭人間萬事何湏問且向尊前聽艷歌翰府名談劉輝為金陵小倅攝府事一日邀郡僚洎賔客僅百人逰蔣山就太平僧舎開宴賦詩輝詩曰兩道翠隂迎騎合四圍清氣逼人來林端有路雲千級物外忘機酒一杯楊蟠詩曰猿驚鶴怨不知處行山有猿驚鶴怨二谷虎踞龍蟠空見山芳草路隨流水逺老僧心共白雲閒同前施肩吾夜宴云蘭缸如晝買不眠玉爐夜起沉香烟青蛾一行十二仙欲笑不笑桃花燃碧牕弄嬌梳洗晚户外不知銀漢轉被郎嗔罰琉璃琖酒入四肢紅玉軟鑑戒録桑門仲殊赴潤州郡宴於北固樓太守命坐客賦詩殊先成曰北固樓前一笛風碧雲飛盡建康宫江南二月多芳草春在濛濛烟雨中雲齊廣録趙叔平退居睢陽歐陽永叔致政居潁叔平來訪永叔時吕晦叔知潁開宴召二公永叔自為作致語曰欲知盛席繼荀陳請㸔作筵主與賔金馬玉堂三學士清風眀月兩間人紅芳已過鶯猶囀清杏初嘗酒正醇好景難逢良㑹少乗歡舉白莫辭頻倦㳺録范鎮自給事中謫官數年方歸濟南城西有張聰寺丞園亭甲於厯下張邀公飲於園中因作詩云園林再到身猶健官軄全抛夢乍醒惟有南山與君眼相逢不改舊時青同前郭曖升平公主婿也盛㑹文士即席作詩公主自帷中觀之李端中宴詩成有薫香荀令偏憐少傅粉何郎不解愁之句衆皆稱妙或謂宿思端自願賦一篇錢起曰請以起姓為韻遂有金埒銅山之句主出名馬金帛為贈古今詩話正月十五日夜許三夜夜行金吾廵禁察其寺觀及前後街巷㑹要盛造燈籠燒燈光眀若晝山堂髙百餘尺神龍已後復加嚴飭士女無不夜㳺罕有居者車馬塞路有足不躡地被浮行數十歩者王公之家皆數百騎行歌蘇味道詩曰火樹銀花合星橋鐵鎖開暗塵隨馬去眀月逐人來逰妓皆穠李行歌盡落梅金吾不禁夜玉漏莫相催郭利正詩曰九陌連燈影千門度日華傾城出馬騎匝路轉香車爛熳惟愁曉周逰不問家更聞清管發處處落梅花崔液詩曰今年春色勝常年此夜風光正可憐鳷鵲樓前新月滿鳯凰臺上寳燈然玉漏銅壺且莫催鐵闗金鎖徹眀開誰家見月能閑坐何處聞燈不㸔來神燈佛火百輪張刻像圖容七寳粧影裏惟聞金口恱空中疑散玉毫光金勒銀鞍控紫騮玉輪丹盖駕青牛驂驔始散東城外倐忽逺逢南陌頭公子王孫意氣驕不論相識也相邀最憐長䄂風前嫋更賞新絃暗裏調星回漢轉月將微露洒烟飄燈漸稀猶惜路傍歌舞處躊蹰相顧不能歸洛靈異小録杭州辯才老師退居龍井不復出入子瞻往見之常出至風篁嶺左右驚曰公復過虎溪矣辯才笑曰杜子美不云乎與子成二老來往亦風流因作亭其上名過虎溪亦名二老詩紀荆南髙從晦字遵聖季興嫡子也久事戎間及至繼立頗叶衆望始則飾車服尚鮮華逺市駔駿廣招伶倫荆渚樂籍間多有梁園舊物季興先時建渚宫於府庭西北隅延袤十餘里亭榭鱗次艛艦翼張栽種異果名花}
