  - {type: variant, offset: 3744, length: 3, content: 唐盧綸, WYG: 章聖極喜老杜勳業頻看鏡行藏獨倚樓歐公稱李白襄陽樂落日欲沒峴山西四句常語也至於清風明月不用一錢買玉山自倒非人推然後見太白之横放所以驚動千古者不在此乎詩人以一字為工世固知之惟老杜變化開闔出奇無窮殆不可以形迹捕詰如江山有巴蜀棟宇自齊梁則其逺近數千里上下數百年只在有}
