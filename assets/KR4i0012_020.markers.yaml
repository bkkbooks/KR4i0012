  - {type: variant, offset: 3726, length: 0, content: '', WYG: 二十八欽定四庫全書詩話總龜卷二十九宋阮閱撰詩累門隋煬帝善屬文不欲人出其右薛道衡由是得罪後因事誅之曰更能作空梁落燕泥否嘗為燕歌行文士皆和之著作郎王冑獨不和焉每䘖之終坐此見害而誦其警句曰庭草無人隨意綠復能作此耶小說舊聞劉禹錫自屯田員外郎左遷鼎州司馬凡十年始召還方春贈看花者云紫陌紅塵拂面來無人不道看花囬𤣥都觀裏桃千樹盡是劉郎去後栽不日傳於都下好事白執政誣其怨憤他日見時宰與坐慰勞久之旣而曰近日新詩未免為累不數月遷連州刺史其自叙云貞元二十一年春余為屯田員外郎時𤣥都觀未花是嵗牧州至荆南又貶鼎州司馬居外十年召至京師人言有道士手植仙桃滿觀盛開遂有前篇以識一時之事既出牧十四年始為主客郎中重遊是觀再書二十八字以俟後遊時元和二年三月也百畝亭中半是苔桃花開盡菜花開種桃道士今何在前度劉郎去又來古今詩話唐左司郎中喬知之有婢名窈娘藝絶當時武延嗣聞之欲一見既見即留之無復還知之痛憤因為詩賂閽者以達窈娘窈娘繋於裙帶赴井而死延嗣見詩酷吏誣誚知之破其家詩曰石家金谷重新聲明珠百顆買娉婷昔日可憐公自許此時歌舞得人憎窈娘答曰公家閨閣不曽閒好將歌舞借人看富貴英雄非分理驕奢勢力橫相干别公此去終不忍徒勞掩袂傷紅粉百年離别在髙樓一代紅顔為君盡載初元年三月也四月下獄死同前大中好文嘗賦詩有金歩搖未能對令温岐卿即廷筠也續之岐卿以玉跳脫應之宣宗令以甲科處之為令狐綯所沮除方城尉綯曽問其事於岐岐曰出南華真經非僻書也冀相公爕理之暇時宐覽古綯怒甚後岐有詩曰悔讀南華第二篇之句南部新書北夢𤨏言廷筠事甚詳此獨載玉跳脫事又𤨏言以跳為條與此不同南華真經無玉跳脫事不知當時何所據也劉希夷詩曰年年嵗嵗花相似嵗嵗年年人不同其舅宋之問苦愛此兩句知其未之傳人懇乞許而不與之問怒以土袋壓殺之宋不得其死亦其報也並同前薛令之閩之長溪人嘗為右庶子時開元東宫官僚清冷令之作詩題於壁曰朝日上團團照見先生盤盤中何所有苜蓿長闌干飯澁匙難綰羮稀筯易寛無以謀朝夕何由保嵗寒明皇幸東宫見之題於其傍曰啄木觜距長鳯凰毛羽短若嫌松桂寒任逐桑榆煖遂謝病歸古今詩話南唐徐融夜宿金山詩云維船分蟻壌江市聚蠅聲烈祖性嚴忌宋齊邱譛之以竹籠沉於京口開元間禁中初重木芍藥植於興慶池東沉香亭會花盛開明皇乘照夜駒妃子歩輦従之詔選梨園弟子中尤者得樂十六色李龜年以歌擅一時之名手擅捧板押衆前樂將歌明皇曰賞名花對妃子焉用舊詞遽命李龜年持金花箋賜李白立進清平調詞三章白承詔尚苦宿酲遂賦詞其一曰雲想衣裳花想容清風拂檻露華穠若非羣玉山頭見定向瑤臺月下逢其二曰一枝紅艷露凝香雲雨巫山枉斷腸借問漢宫誰第一可憐飛燕倚新粧其三曰名花傾國兩相歡常得君王帶笑看觧釋春風無限恨沉香亭北倚闌干龜年遂以調進令梨園弟子歌之太真妃持七寳盃酌西梁州葡萄酒笑領歌意明皇因調玉笛倚曲遲其聲以媚太真妃自是顧白尤異於諸學士然髙力士終以脫靴為恥異日太真妃重吟前詞力士曰始謂太真妃怨白入骨髓翻拳拳如是耶太真妃因驚曰何翰林學士能辱人如此力士曰以妃子比飛燕賤之甚矣太真妃頗深然之明皇欲三命白官卒為宫中所沮而止孟浩然遊京師張九齡王維雅稱道之維因邀入内省俄而明皇至浩然匿牀下維以實對帝喜曰聞其人矣而未之見也何懼而匿詔出問所為詩浩然自謂云不才明主棄明皇曰卿自不求仕非朕棄卿也柰何誣我因放還並同前孟浩然曽謁華山李相不遇因留一絶而去曰老夫三日門前立朱箔銀屛晝不開詩巻却抛書袋内譬如閒看華山來一日明皇召李對說及浩然事對曰見在臣私第急召俾口進佳句孟誦北闕休上書南山歸敝廬不才明主棄多病故人疎明皇不恱曰未嘗見浩然進書朝廷退黜何不云氣蒸雲夢澤波撼岳陽城由此不遇與前所言及摭言稍異又北夢𤨏言載明皇謂浩然何不道氣蒸雲夣澤波撼岳陽城由是不遇於布衣襄陽詩人孟浩然開元中頗為王右丞所知有㣲雲淡河漢疎雨滴梧桐之句右丞擊節賞之維侍金鑾殿一日召之商較古今風雅忽遇明皇幸維所浩然錯愕伏床下維不敢隠奏聞明皇欣然曰素聞其人因得召見卿將何詩來否浩然曰偶不將來奉詔念詩曰北闕休上書南山歸舊廬不才明主棄多病故人疎明皇憮然曰朕未曽棄人自是卿不求進奈何有此作因命歸終南山唐宣宗索趙嘏詩其巻首有題秦詩云徒知六國隨斤斧莫有羣儒定是非宣宗不恱北夢𤨏言正訛門宋謝朓詩云芳洲生杜若正觀中醫局求杜若度支郎乃下坊州令貢州司判報云不出杜若應由謝朓詩悞也太宗聞之大笑判司改雍州司法度支郎免官小說舊聞張安道云江鄰幾言孟郊死𦵏北邙山非退之詩也賀家湖上天花寺一一僧窗向水開不用閉門防俗客愛閒能有幾人來此吕文靖詩也詩史灧澦歌水經云白帝山城門西江有孤石冬出二十餘丈夏即没去郡二十里有瞿塘湍言灧澦石與城郭門外石潜通蜀人往燒火伏時則灧澦邊沸王濬平吳尤作預石今訛曰灧澦瞿塘湍水急諺曰灧澦大如馬瞿塘不可下古今詩話老杜有社日兩篇其一曰尚想東方朔詼諧割肉歸然而漢書所載事乃伏日直方詩話山谷云老杜長鑱長鑱白木柄我生托此以為命黄獨無苗山雪盛短衣數挽不揜脛往時儒者不觧黃獨義改為黃精學者承之以余攷之葢黃獨是也本草諸魁注黃獨肉白黃色漢人蒸食之江東謂之土芋余求之江西江西謂之土卵蒸煮食之類芋魁也老杜家諱閑而詩中有云翩翩戲蝶閑過幔或云恐傳者謬又有宴王史君宅詩云汎愛憐霜鬢留歡卜夜閑余以為當以閑為正臨文恐自不以為避也老杜送賈閣老出守汝州云雲山紫邏深世之注云邏塞也取廵邏之義而余觀九域圗乃云汝州有紫邏山京師人呼大夫為大斧呼承制為承池葢語訛也有人戲為句云大夫何嘗斧承制豈當池或云不當池舊以王維有詩名而好取人章句如行到水窮處坐看雲起時乃英華集詩也漠漠水田飛白鷺隂隂夏木囀黃鸝乃李嘉祐詩也余以為有摩詰之才則可不然是剽竊之雄耳劉貢父作詩話稱杜甫云功曹非復漢蕭何按光武謂鄧禹何以不掾功曺謂曺㕘嘗為功曺云鄼侯非也雍丘江子載云髙祖紀何為主吏孟康曰主吏功曺也貢父之言過矣貢父又云白樂天詩云請錢不早朝請作平聲唐人語也江子載亦云顔師古注漢書請或音才性反或不音唐或以請作平聲悞矣舒王集中有落星寺詩其末云勝槩惟詩可收拾不才羞作等閑來落星寺在彭蠡湖中劉咸臨嘗親見寺僧言㓜時目覩閩中章傳道作此詩其前六句皆同其末云勝槩詩人盡收拾可憐蘇石不曽來蘇石謂子羙幷曼卿也後人愛其詩者改末句作舒王詩傳之遂使一篇之意不完其體與舒王所作詩語不同也並同前莊子曰野馬也塵埃也乃是兩物古人謂野馬塵埃吳融賦曰動梁間之野馬韓渥詩云牕裏日光飛野馬恐不然野馬乃田間遊氣逺望如羣馬又如水浪佛書謂如熱時野馬陽熖即此物也古今詩話章聖朝試天徳清明賦有閩士破題云天道如何仰之彌髙讀作歌會考試者亦閩人遂中選又荆南士人吟雪詩用先字韻其末句云十二峰前旋好添添作天守郡謂之建麾葢用顔延年一麾乃出守之句不知其悞也延年謂一麾之麾如武王右秉白旄以麾之麾耳延年贈始平詩云屢薦不入官一麾乃出守謂山濤薦咸為吏部郎三上而武帝不用其後一擠遂出始平故有此句延年被擯以此自托爾後杜牧之為登樂遊原詩云擬把一麾江海去樂遊原上望昭陵遂為故事今人不用厮字唐人作厮音五代時作入聲陶穀詩云尖簷㡌子卑凡厮是也樂天又云金屑琵琶槽雪擺胡勝琵琶胡語與今人同少陵詩云皂鵰寒始急白公歌云千呼萬喚始出來皆以為語病其實不然事之終始則音上聲有所宿留則音去聲二公詩非語病也宋景文言大孤山以孤獨為字有廟在江壖乃為婦人形陳簡夫留詩曰山稱孤獨字廟塑女郎形過客雖知誤行人尚乞靈時稱佳句羊愔太山人嘗遊阮郎亭崕下有篆字詩刻石世傳漢阮肇所書驗之乃李陽氷為縉雲令時遊此亭題耳詩云阮客家何在仙雲洞口橫人間不到處今日此中行杜少陵詩云家家養烏鬼頓頓食黃魚說者謂夔峽間有鬼戸乃夷人也不聞有烏鬼葢蜀人臨水居者皆養鸕鷀繩繫其頸使捕魚得魚則倒持出之至今如此詩家用也字本皆音夜杜詩云清絶也元稹云也向慈恩寺裏遊今人讀為如字非也張端為河南司禄府當祭社買猪呈尹猪走入端家即取殺之吏以白尹尹召端問端對按律云猪夜入人家主人登時殺之勿論尹大笑令别市猪並同前歐陽公記陶榖詩末厥兵不曉其意余謂今人呼秃尾犬為厥尾衣之短者亦呼為厥然則此兵正謂其末賤耳今人不以末厥相連言之其義則是也不然則不可對卑凡厮貢父詩話世人語虛偽者為何樓似泛濫之名其實不然國初京師有何家樓其下所賣物皆行濫者故人以此目之樓已廢語尚在也俳優人言河市樂人説者謂石駙馬在南都其家樂甚盛詆誚南河市中樂人故得此名其實不然唐元和詩燕吳行紀已有河市字大抵不𨽻軍中有河市者㪚樂名也又人謂事之陳久者為賛本於五代時有馬賛者為使府幕官其人魯戇有所聞見他人已熟而已方為新奇而道之時人見有言事之陳者皆號賛云薛簡肅公尹開封以嚴為治謂之薛出油其後牧成都嵗豐人樂其俗與之遊作春遊好十首自號薛春遊欲換前稱也並同前李文正進永昌陵輓辭云奠玉五迴朝上帝御樓三度納降王當時羣臣皆進惟文正詞最為首出所謂三降王者廣南劉鋹西蜀孟昶江南李煜也五朝上帝則誤矣建隆盡四年明年初郊改乾徳至六年再郊改元開寳五年又郊而不改元九年已平江南四月大雩吿謝於西京欲葢執玉祀天者實四也當時人必繆傳者誤云五耳歐公詩話古詩云袖中有短歌欲寄雙飛燕意以燕春來秋去自可寄書故寓言爾今人馴養家鴿携在外數千里輙能還家蜀人以事至京師者以鴿寄書不旬日而達賈人舶船浮海亦以鴿寄書皆非虚言也陸機使黃耳寄書此殆不然自洛至吳更歴江海犬何能濟必從舟楫而渡夫犬豈能諭意於渉人或者謂陸機有奴名黃耳因此謂狗也貢父詩話淮南張佖知舉進士試天雞弄和風佖但以文選中詩句為題未嘗詳究也有進士白試官云爾雅天雞天雞天雞有二未知孰是佖大驚不能對亟取爾雅檢釋虫有天雞小虫黒身赤頭一名莎雞一名樗雞釋鳥有天雞赤羽逸周書曰文若彩雞成王時蜀人獻之江東士人深於學問有如此談苑李白戲杜甫云借問别來太瘦生只為從前作詩苦太瘦生唐人語也至今猶以生為語助所謂可憐生作麽生何似生之類是也陶榖有詩云尖簷帽子卑凡厮短靿靴兒末厥生亦當時語也余天章景祐間已聞此語時陶公卒未久人莫曉其義王元叔博學多聞最為多識亦不知為何語也記之必有知之者歐陽詩話貢父謂末厥兵今謂末厥生姑存之延州五城說者以謂舊有東西二城夾河對立髙方典郡始展東西北三城予讀杜詩云五城何迢迢迢迢隔河水延州秦北門山川猶可恃乃知天寳間巳有五城也筆談茶芽古謂之雀舌麥顆取其至嫩也余謂茶之羙者其質素良而所植之土又羙則新芽一發便長寸餘其細如針惟芽長為上品以其質榦上力皆有餘也如雀舌麥顆極下材耳乃北人不識誤為品題予山居有茶崘為茶崘詩曰誰把嫩香名雀舌定知北客未曾嘗不知靈草天然異一夜風吹一寸長同前司馬君實嘗論九旗之名旗與旂相近緩急何以區别小雅庭燎夜向晨言觀其旂左傳見伏辰取號之旂當為芹音耳闗中人言清濁之清則不改言丹青之青為萋又以中為蒸䖝為塵不知旂本是芹亦闗中人語轉丹青之言萋也五方之人語言若是者多閩人以髙為歌荆楚以雞為斤文士作歌詩亦多不悟也向丞相敏中知長安不敢賣蒸餅云觸諱葢闗中人以中為蒸也貢父詩話詩話總龜巻二十九欽定四庫全書詩話總龜巻三十宋阮閱撰道僧門道士沈廷瑞彬之子也性坦率直造縣宰之坐宰方治訟而廷瑞至宰戲之曰沈道士何時成道廷瑞應聲曰何須問我道成時紫府清都自有期手握藥苗人不識體含仙骨俗争知宰慙江南野錄吳崇岳泉州人也為龍興觀道士辟榖多年常登其宫松梢禮拜處松枝可六七十尺福建漕使周謂因請隨行抵於徳化縣縣治之東有古松一株髙八九十尺上有鶴巢乃命崇岳登之宛若􅆐狖容易直上出鶴巢之外端身飛歩手無攀縁就纎枝拜如平地其松枝柔軟隨歩低昻略無損處周謂乃為詩贈云楮為冠子布為裳吞得丹霞壽最長混俗性靈常樂道出塵風格早休糧枕中經妙誰傳與肘後方新自冩將百尺松梢幾飛歩鶴棲枝上禮虚皇太平興國中詔入郡閣雅談楚郎中失其名宦遊江東泊金陵岸下子弟輩遊茅山見一老僧住一小庵謂諸子曰何所至此告以因遊賞林泉而來日晩欲丐宿可乎僧曰舍陋不可相容此二三里有寺可宿因指諸子令往抵寺已暮矣寺僧問誰指來諸子曰山下老僧寺僧曰聞此有老僧甚久未之見也凌晨往則庵中已無人惟松上有詩云數株松檜食不盡一沼荷衣有餘剛被傍人相問當老僧今日又遷居摭遺僧無夢嘗在府畿村落中求化手持大木牌題詩二絶曰心為車兮身為軾車動軾隨何意息交梨火棗是誰無自是不為荆與棘身為客兮心為主主人和平客安堵若還客主不康寧精神必定隨君去翰府名談景徳中日本僧照寂入貢三司使丁晉公甚恱之晉為言姑蘇山水奇秀照寂心愛而留因止於吳門寺其徒不願􅀙者遣數人歸本國後以黑金水瓶寄晉公并詩曰提携三五載日用不曽離曉井斟殘月春爐釋夜澌鄱銀難免侈萊石易成虧此器堅還實寄公應可知談苑僧䕶國江南人也攻詞翰題醴陵玉仙觀云白雲至今凝不㪚星壇松殿幾千枝往往笙歌生夜半瀑布西行遇石橋黃精採根還採苖路逢一人擎一椀茶花夜來風吹滿又言家住在東坡白犬相逢邀我過南山石上有碁局曾使樵人爛斧柯此篇絶佳詩僧中不可得也大厯末禪僧元覧住荆州陟岵寺道髙風韻人不可親章璪嘗畵松於齋壁符載賛之衛象詠之亦一時四絶覧悉加堊焉人問其故曰無事疥吾壁也僧那即其甥發瓦探壊墙薫䑕覧未嘗責弟子議論而布衣一食亦不稱之或怪問之乃題詩於竹曰大海従魚躍長空任鳥飛古今詩話沙門貫休鍾陵人精於筆札荆州成令問其筆札法休曰此事可登堂而授安可草草而言成令䘖之乃遞於黔中因為病鶴詩見意曰見說氣清邪不入不知爾病自何來同前唐昭宗以錢武肅平董昌功拜鎮東軍節度使自稱吳越國王貫休投詩曰貴逼身心不自由幾年勤苦蹈林􅉌滿堂花醉三千客一劍霜寒十四州萊子衣裳宫錦窄謝公篇詠綺霞羞他年名上凌烟閣豈羡當時萬戸侯武肅愛其詩遣諭令改為四十州乃可相見貫休性偏答曰州亦難添詩亦難改閑雲孤鶴何天不可飛遂入蜀以詩投孟知祥詩云一瓶一缽垂垂老萬水千山得得來古今詩話温州鴈蕩山自古圗史不載按西域書云諾矩羅居震旦東南大海際鴈蕩山芙蓉龍湫唐貫休作賛云鴈蕩經行雲漠漠龍湫宴坐雨濛濛北山南山有芙蓉峰下有芙蓉驛前瞰大海山頂有大池相傳以為鴈蕩有二潭以為龍湫又有經行臺宴坐峰皆以貫休詩得名也唐大興善寺東廊之南有僧不出院轉法華經三萬七千部夜常有狐子來聼長慶初庭前有牡丹一朶合歡僧幽之詩曰三萬蓮經三十春平生不踏院門塵杜牧之弱冠登第再中制科因與二三同年城門遊覧至丈六寺有禪僧擁褐坐與之語可佳問杜姓名具以對又曰修何業傍人以累捷誇之笑曰皆不知也牧之嘆訝久之作詩云家住城南杜曲旁兩枝仙桂一時芳老僧都未知名姓始覺空門氣味長蜀僧逺公傷蜀詩曰樂極悲來數有涯歌聲纔歇便興嗟牽羊廢主尋傾國逐鹿奸臣盡䘮家丹禁夜凉空鎻月後庭春老謾開花兩朝基業都成夢林木蒼蒼噪暮鴉南方浮屠能詩者多矣往往多不顯其名福州有一僧作詩百餘篇其中佳句有云虹收千嶂雨潮展半江天又有詩云詩因試客分題僻棋為饒人下子低不减於古人也閩僧懐濬有詩二絶云家在閩山東復東其中嵗嵗有花紅而今再到花紅處花在舊時紅處紅家在閩山西復西其中歲歲有鶯啼而今再到鶯啼處鶯在舊時啼處啼人多誦也大歴中澤潞間有僧號普滿或歌或笑言事多驗建中初潞州佛寺題詩一首而去詩曰此水連涇水雙珠血滿川青牛將赤虎方號太平年此水泚字涇水自涇川兵亂雙珠滿泚也青牛興元二年乙丑赤虎是嵗改元元年丙寅是年賊平陳文惠赴端州艤舟廬陵有胡僧叩舷謂公曰虎目鳯鼻猿身平地不能為也當有攀附然後有所食位極卿相僧為詩一絶曰虎目猿身形最貴湏因攀附即升髙知公今向端溪去助子清風泛怒濤公後登庸青𤨏集廬山佛手巖有絶頂李氏有國日行因禪師居焉李氏詔居棲賢寺未幾一夕大雪逃居舊隠嘗煑茶延僧起托巖扉立化余作偈曰前朝詔住棲賢寺雪夜逃居岩石間想見煮茶延客處直縁生死不相闗東吳僧道潜經臨平作詩云風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲東坡見之大稱賞及坡守徐潜訪之館於逍遙堂士大夫欲識之坡饌客罷具而來坡遣一妓乞詩詩曰寄語巫山窈窕娘好將魂夢惱襄王禪心巳作沾泥絮不逐春風上下狂一座大驚然性偏憎凡子作詩云去嵗春風上苑行爛窺紅紫厭平生如今眼底無姚魏浪蕋浮花懶問名士論少之其作詩追法淵明有逼真處如曰數聲柔櫓滄浪外何處江村人夜歸是也冷齋夜話西湖僧順怡然清苦賦十竹詩城中寸土如寸金幽軒種竹只十箇春風慎勿長兒孫穿我階前緑苔破林下詩云久服林下遊頗識林下趣從渠緑隂繁不碍清風度閒來石上眠落葉不知數山鳥忽飛來啼破幽寂處荆公愛之陳瑩中謫合浦以書謫余為負華巖經入嶺有偈曰大士游方興盡回家山風月絶纎埃杖頭多少閑田地挑取華嚴入嶺來余和之曰因法相逢一笑開俯看人世過飛埃湘南嶺内休分别圓寂光中共往來聞嶺外大雪作二偈寄之曰傳聞嶺外雪壓倒千年樹老兒拊手笑有眼未曾覩故應潤物材一洗瘴江霧寄語牧牛人莫教頭角露又曰偏界不曽藏處處光皎皎開眼失蹤由都緣太分曉園外忽生春萬瓦粲一笑遙知忍凍人未悟安心了静禪師渡溪為漲流所䧟童子掖至㟁坐沙石間垂頭如雨鶴忽指溪作詩曰春天一夜雨霶􅑛添得溪流意氣多剛把山僧推倒却不知到海後如何後無疾而化余夜夢逢一道士一奴負酒瓢隨之道士邀余坐茗坊奴竊飲瓢無有乃笑道士詬欲杖之顧奴曰汝従覺範求詩曰難藏為香釁易滿坐徧小開口所有竭饞奴法當笑句句皆譏其褊可怪也璉禪師工詩舒王以其詩示歐公公曰此道人肝臓饅頭是中無一點菜氣仁廟留住净因禪院作偈進乞還山林曰千簇雲山萬壑流閑身歸老此峰頭殷勤願祝如天夀一炷清香滿石頭又曰堯仁况是如天闊乞與孤雲自在飛桂林僧景淳工詩福老順為余言淳意苦而深世不可遽觧如曰夜色中旬後虗堂坐幾更隔溪􅆐不呌當檻月初生又曰後夜客來稀幽齋獨掩扉月中無事立草際一螢飛余時方十六七心不然之筠溪快山有虎有牧童為虎逐牛捍䕶之竟死石門老衲文公為余言之為作詩以諷含齒被髮而不義者然余徒能諷之其能巳之哉頌曰快山山淺亦有虎時時妥尾過行路一䜿地坐牧兩牯以捶捶地不知顧虎搏䜿如鷹搦兎兩牛來奔虎棄去乃因疴癢挨老樹牯則喘伺同守䕶虎竟不得此牧䜿䜿雖不活牯無負一村囂傳共鳴皷而虎已逃不知處嗟乎異哉兩大武髙誼可與冠髙伍今走仁義名好人行事真憐乃愧汝此事可信文公語為君落筆畄千古詩話總龜巻三十欽定四庫全書詩話總龜卷三十一宋阮閲撰詩䜟門上太祖采聼至明逺邊事纎悉必知有聞者西蜀還問劍外有何事聞者曰但聞城郭滿城誦朱山長苦熱詩曰煩暑欝蒸無所避凉風清泠幾時來曰此蜀人思我來取也古今詩話偽蜀每嵗除日諸宫門各給桃符書元亨利貞四字時昶子善書札取本宫策勳府書云天垂餘慶地接長春乾徳中伐蜀明年蜀除二月以兵部侍郎吕餘慶知軍府事以策勲府為治所太祖聖節號長春此天埀地接之兆也辛夤遜仕偽蜀孟昶為學士王師將致討之前嵗除昶令學士作詩兩句寫桃符上夤遜題曰新年納餘慶嘉節號長春明年蜀亡吕餘慶以㕘知政事知益州長春乃太祖誕聖節名也談苑二說不同故兩存之梁沙門寳誌銅牌多䜟未來事云有一真人在冀川開口張弓在右邊子子孫孫萬萬年江南李璟其子曰弦冀吳越錢鏐諸子皆連􅊼字期以應之而眞宗諱正當之江南將亡數年前昇元寺殿基掘得石記視之詩也辭曰若問江南事江南事不憑抱雞升寳位走犬出金陵子建居南極安仁秉夜燈東陵嬌小女騎虎渡河氷王師甲戌渡江李煜以丁酉年生曹彬為大將列栅城南乃子建也潘羙為副將城陷恐有伏兵命卒縦火乃安仁也錢俶以戊寅年入朝盡獻浙西之地騎虎之謂也誌公嘗畵鹿負按走山中又云兩角女子緑衣裳却背太行趍君王一止之月必消亡後禄山亂葢兩角即鹿緑即禄女子即安字太行即山名一止之月果正月敗亡唐宋遺史翰林蘇公紳嘗題潤州金山一聨云僧依玉檻光中住人在金鼇背上行乃榮入玉堂之兆已而果然位止内相亦詩之䜟也青箱雜記李昪徐温養子冒徐姓名知誥為昇州刺史為童謠詩曰東海鯉魚飛上天後乃繼温江南李覯召試制科嘗作詩曰人言落日是天涯望斷天涯不見家已恨碧山相掩映碧山更被暮雲遮觀此詩有重障碍意恐時命不偶果如其言孟東野下第詩曰棄置復棄置情如刀劍傷又再下第詩曰兩度長安陌空將泪見花其後登第詩曰昔日齷齪不足嗟今朝曠蕩思無涯春風得意馬蹄疾一日看盡長安花進取得失葢亦常事而東野器宇不宏偶下第則情隕穫如傷刀劍以至下淚既登科則志意充溢一日之間花則看盡何其速耶後授溧陽尉䘚冦萊公方貢時送人使嶺南嘗作詩云到海止十里過山應萬重及貶雷州吏呈圖經問去海幾里吏曰十里是則南遷之禍已見於詩也張乖厓公守陳日嘗遊趙氏西園詩曰方信承平無事久淮南閑殺老尚書後一年捐舍亦詩之䜟蘇緘字宣甫性忠義喜功名皇祐中知英州儂賊作亂以守禦功換館職尋坐事貶房州司馬嘉祐中復官知越州諸暨縣余與之同僚嘗贈詩曰燕頷將軍欲白頭昔年忠勇動南州心如鐵石老不挫功在桑榆晚可收十八年再知邕管交趾叛攻城戰沒朝廷憫之贈奉國軍節度使謚忠勇則忠勇之謚巳見於余詩矣許州臨潁人成銳應制科嘗以詩三篇獻丞相王文惠野菊云綵檻應無分春風不借恩野花云馨香雖有艷栽植未逢人公謂辭雖綺靡未有登科意别有贈裴貟外詩云凭髙看漸逺更上最髙樓公曰再舉合踐髙第果符其言其能品藻如此李璟遊後湖賞蓮花作詩曰蓼花蘸水火不㓕水鳥驚魚銀梭投滿目荷花千萬頃紅碧相雜敷清流孫武巳斬吳宫女琉璃池上佳人頭識者謂雖佳句然宫中有佳人頭非吉也摭遺廖融處士衡山人有詩云雲穿搗藥屋雪壓釣魚船因自觧曰屋破而雲穿其中無人也船為雪壓無用也後六十日果卒余安道自番禺詔赴闕過韶陽遊龍光寺詩云暫離人世界且至佛家鄉議者謂非吉兆果卒於秦淮亭下嘗有日者謂曰到秦地當有災果如其言蘇子羙滄浪亭觀魚詩云自嗟不及遊魚樂虗作人間半世人非吉意也又有云山蟬帶響穿疎戸野蔓蟠青入破窗雖佳句然窗破野蔓蟠其中似無人居矣子羙竟卒於謫籍王處厚字元羙益州華陽縣人嘗遇一老僧論浮世苦空事登第後出部徘徊古陌軫懐長吟曰誰言今古事難窮大抵榮枯總是空算得生前隨夢蝶争如雲外指㝠鴻暗添雪色眉根白旋落花光臉上紅惆悵荒原懶回首暮林蕭索起悲風及暮還家心疾而卒洞㣲志楊貴妃嘗以假髻為首飾而好服黃裙天寳末童謠曰義髻抛河裏黄裙逐水流明皇雜録李遐周有道術居元都觀嘗題詩數千言皆記明皇巡幸西蜀及禄山僣竊之事時人皆不之悟詩曰燕市人皆去禄山以薊門之事而來也凾闗馬不歸歌舒翰敗潼闗也可憐山下􅄦嵬也環子繫羅衣貴妃小字玉環及馬嵬之死髙力士以羅衣縊焉崔曙嘗作明堂火珠詩其中有佳句曰夜來雙月滿曙後一星孤為文士推服崔既夭殁有一女名星而無男子當時異之李煜暮嵗乘醉書於牖云萬古到頭歸一死醉鄉𦵏地有髙原醒而見之大悔不久謝世翰府名談邵拙字拙之鴈門人好學博通經史水曺郎趙慶有詩贈之曰邁古文章金鸑鷟出羣行止玉麒麟仕宦不達而卒有詩傳於時其間有云萬國不得雨孤雲尤在山此其應歟江南野録何昌陵宰廬陵郡有衙將楊克儉能媚州牧而移其權昌陵以兄事之嘗遊其池館貽其詩曰經旬因雨不重來門有蛛絲徑有苔再向白蓮亭上望不知花木為誰開未幾克儉連延範貸死而刑其家破焉議者以為其詩之䜟也賈島嘗為病蟬詩曰病蟬飛不得向我掌中行折翼猶能摶酸音尚極清露華應在腹塵點悞侵睛黃雀幷烏鳥俱懐害爾情議者謂無搏風之意果為禮闈所斥淳化中崇文院直廬絶髙處有人題兩句云秋風送炎去庭木葉齊落是年立秋日宋炎罷來年立秋葉齊黜張退傅年七十八除夜有詩云八十光隂有二年烟蘿門户喜開闗近來無奈山中相頻寄書來許綴班越四年而薨乃八十二之䜟也此答陳文惠之詩也詩史沈詢夜宴僚友欲著辭令曰莫打南來鴈従他向北飛打時雙打取莫遣兩分離是夕為奴歸秦所殺夫妻並死張忠定少年遊華山謁陳圖南遂欲隠華山謂圖南曰欲就分先生山半住可否圖南曰他人即不可如公者吾當分半山相奉然公方有宦軄未可釋此其勢如家人張筵笙歌鼎沸忽庖中火起待公救之豈可不赴贈之詩曰自吳入蜀是尋常歌舞筵中救火忙乞得金陵養閒㪚也須多謝鬢邊瘡始皆不喻後忠定更鎮杭葢晩年發瘡於腦不瘥乞金陵悉如其詩大中祥符七年乙夘七月二十日終古今詩話滕倪苦詩宗人滕郎中守吉州往謁之會秋試告别為詩云秋風江上别旌旗故國無家淚欲垂千里未知投足地前程應是聼猿啼誤攻文字身空老却返漁樵計已遲羽翼凋零歸不得丹青無路接差池守得詩云此生不與子相見别後卒於旅邸倪又有詩云白髪不知容相國也同閒客滿頭生又題鷺鷥障子云映水有深意見人無懼心同前詩話總龜巻三十一欽定四庫全書詩話總龜巻三十二宋阮閱撰詩䜟門下孟津詩人李瀆字長源一日自孟津訪魏仲先曰數宿前有人在床下誦曰行到水窮䖏未知天盡時予斥其誤曰豈非坐看雲起時耶答曰此雲安能起也兹必死期故來相别痛飲數日而卒古今詩話丁晉公捴章聖陵事翰林學士李維援其親識為挽郎懇請於晉公曰更在陶鑄丁應聲曰陶鑄復陶鑄齋郎又挽郎自然堪下淚何必到斜陽未幾丁敗張唐卿進士第一人登科期集於興國寺題詩句於壁曰一舉首登龍虎榜十年身到鳯凰池有人續云君看姚煥并梁固不得朝官未可知後果終於京官趙嘏嘗有詩云早晩粗酬身事了水邊歸去一閒人止於渭南尉以其精於詩時謂之趙渭南如韋蘇州云孫秀既恨石崇不與緑珠又憾潘岳昔遇不以禮復遭遇晉武帝遂同日收石崇歐陽堅潘岳送市石謂潘曰安仁復爾耶潘曰可謂白首同歸也潘金谷集云投分寄石友白首同所歸亦其䜟也庾亮出石頭城百姓歌於岸上曰庾公上武昌翩翩如飛鳥庾公還揚州白馬牽旒旐果尋䘚來鵬詩思清麗韋岫尚書常愛其才遊蜀夏課巻中有云一夜緑荷風剪破賺他秋雨不成珠識者以為不祥是年果失志丁晉公自崖召還有寄友人詩曰九萬里鵬重出海一千年鶴再歸來句健意清然議者謂鵬處於海為得地出海則失水鶴返其巢則不能翺翔矣卒如其說又扈従東封嘗聞柰河黑水人間隂獄也感其事而為詩曰黒水溪旁聊駐馬柰河岸上試回頭髙崕昏䖏是隂獄須信人生到此休非佳兆也丁晉公為侍中時嘗作詩曰千金家累非良寳一品官高是強名未幾奪爵籍没初釋褐為饒倅同年白稹為判官稹一日以片紙假緡伍鐶於公公笑曰牓下新婚京國富室豈無半千質物耶懼我挽之故矯耳於簡尾書一絶戲之曰欺天行當吾何有立地機闗子太乖五百青蚨兩家闕赤洪崖打白洪崕朱崖之行兆於此蘇子羙失意秋日登蘇之閶門云年光冉冉催人老雲物涓㳙又變秋家在鳯凰城闕下江山何事苦相留又書其旁云江山留人也人留江山也卒不用亦詩之䜟鄭毅夫罷禁林行次南都遇雨為二篇曰雨聲飄斷忽南去雲勢漸生従北流應料凉風消息近蕭蕭巳在樹梢頭又曰橊火燒空未擬休忽驚快雨破清秋晩雲淡淡趂落日只到楚江南岸頭僧文瑩見之訝其氣不振觧錢塘赴青社卒楚州崔𤣥諫議有子名勉與趙叔平同年登第轉大理評事過天津橋墜馬時集賢韓公與趙同為開封府推官韓崔壻也聞其墜馬遽往眡之但嘔血不止數日館於韓舍因作詩曰身隨花露重命逐藕絲輕明朝風雨霽歸路在三清明日果卒時有㣲風細雨盧多遜方丱角其父携就雲陽觀小學與羣兒見廢壇上有古簽一筒兢往抽之為戲夕遜尚未識字抽一簽歸示其父詞曰身出中書堂須因天水白登仙五十二終為蓬島客父見之頗意以為吉兆迨作相與秦王事故敗始因遣堂吏趙白遂竄南荒卒於朱崕年五十二無一字之差並同前嚴惲字子重善為詩嘗有詩云春光冉冉歸何處更向花前把酒盃盡日問花花不語為誰零落為誰聞累舉不第卒於闗中南部新書汝州劉廷芝字希夷苦篇詠善為閨帷之作詞哀多似古調體勢與時不合遂不為人所重希夷羙姿貌善彈琵琶好酒色落魄不拘常俗為白頭吟忽作一聯語曰今年花落顔色改明年花開誰復在既而復嘆曰我此語似䜟石崇曰白首同所歸復何所異乃除之復作二句曰年年嵗嵗花相似嵗嵗年年人不同復嘆曰死生有命豈復由此乃幷留前句作詩後嵗餘為奸人所害隋長夀年中有鄭州鄭蜀賔風流名士頗善五言蹉跎鄉閭不求聞達垂掛冠選授江左一尉臨去賔友祖餞至上東門留别曰畏途方萬里生涯近百年不知將白首何處入黄泉酒酣自詠聲調哀蹙合座嗚咽卒於官時人比之劉廷芝同前冦萊公初為密學方年少得意偶撰江南曲其句有江南春盡離腸斷蘋滿汀洲人未歸日暮江頭一望時愁情不㫁如春水之類音皆悽愴末年果南遷拾遺孫咸不知何許人而長於預知災異又善為詩開寳初客于九江因遊廬山有詩留題九天使者廟云獨入𤣥宫禮至真焚香不為賤貧身秦淮兩畔沙埋骨湓浦千家血染塵廬阜烟霞誰是主虎溪風月屬何人九江太守勤王事好放天兵渡要津不踰數年金陵板蕩九江重圍人受塗炭並應此詩咸後卒於南昌衆人棄尸於江中泝流而上咸異之蘇易簡罷翰林學士以禮部侍郎知南陽日年未四十屢有閒冷之嘆有老僧獨處外城古寺通儒術能詩故公與詩曰憔悴今年三十六與師氣味不争多未幾而卒二宋以文章齊名天下子京守蜀日作詩三百萹名曰猥藁有碧雲謾有三年信明月空為兩地愁後卒不入兩地人以為詩䜟王元澤少時作白苧行有云君心莫厭頻歡樂請看雲間日西入議者謂美則羙矣然日西光景無多近乎䜟果不永夀王鼎湖湘人字則之季父多游江左有洪州西山詩云林泉空有東西路風月難尋十二家議者謂必無名第後果然嘗作鸂鶒詩云棲息應難近小池性靈閒雅衆禽希蒲洲日暖依花立漁浦烟深貼浪飛遺羽㕘差沾水沫餘蹤稠叠印苔衣晩來林徑㣲風起何處相呼着對歸狄渙孤鴈云更無聲接續空有影相隨聞此句者皆云必無後果如其言並同前陳無已賦髙軒過詩云因知書畵真有益却怪嵗月來無多不數月遂卒直方詩話秦少游紹聖初請外以校勘為杭倅方至楚泗間有詩云平生逋欠僧房睡准擬如今處處還詩成之明日以言者落職監處州酒人以為詩䜟東坡有送戴家赴成都玉局觀詩云莫欺老病未歸身玉局他年第幾人又有過嶺一篇云劔南西望七千里乘興真為玉局遊後卒於是觀方元修字時敏一日與楊信祖饒次守過余座中分題人以姓為韻而楊有共約城南方之句後數日錄此唱和於前忽有一同人讀云共釣城南方葢釣字以約字草不相辨而讀者誤之時敏大以為惡不三日其父省中歸暴卒後數月其母亦亡並同前范擴處士有子七嵗作隠者詩云掃葉隨風便澆花趁日隂方干聞之曰此可入室又作夏景詩云閒雲生不雨病葉落非秋干曰必不夀果卒後有歐陽彬之子稚齒作田父詩云桑柘殘陽裏兒孫落葉中廖凝見之曰可惜天才同范氏之子尋亦卒郡閣雅談髙若拙善詩従誨辟於幕下嘗作中秋不見月云人間雖不見天外自分明從誨覧之謂賔佐曰此詩雖好不利於已將來但恐長困後果如其言大定録王元之嘗作病鶴云埋瘞肯同鸚鵡塚飛鳴不到鳯凰池其文學才藻登金門玉堂不為難也竟不至其地見於是矣青𤨏集張闕字退翁都下人有言懐詩云命交隨分樂天賜一生閒場屋有聲而不第亦詩之䜟王寂都下人重信義少然諾嘗撫劍鋏為之歌曰人間冉冉混塵埃身後身前事莫猜早悟浮生都是夢當時悔向夢中來又曰當年吁氣謾如虹回首都歸冷笑中翠玉峰前好歸去可憐三十二秋風時寂年三十二明年寂知事莫非前定笑出都門而去至太行馹舍暴卒在仕者遂𦵏於西崦下並同前徐振甫興化軍人居朝京門外未第時䜟曰拆着屋爛着椽朝京門外出狀元振甫將第而門果壊黄裳道夫南劍州人家居龍溝未第間有䜟曰掘龍溝出龍頭道夫將第而溝果修浚興化軍有壺公山䜟云壺公山若斷莆田朱紫半水遶壺公山此時方好看蔡君謨興水利灌民田引水遶壺公山登第者比前在朝廷者半朱紫矣搜神秘覧韓魏公起堂於北池上效樂天因名曰醉白堂五月堂成公賦詩二篇其一卒章云霓裳時事非吾事且學熏酣石上眠自爾寢疾以六月二十五日薨此詩遂為絶筆既而神廟遣使特為石藏以𦵏始悟石上眠之句若䜟云公薨士大夫恨勲徳之難名知與不知皆為然而嘆曰天何不為我留歐陽公為魏公作誌文而後死也韓魏公别錄鄭毅夫守杭題僧文瑩所居壁云西湖頻送客緑波舟楫輕春入蘿徑静浪花翻逺晴又云東風江雲北飛燕同寄青春不相見又為杭郡閣云雨影横殘紅秋容隂映日寒江帶暮流曉角穿雲出峰藏翠如織宿鳥去無跡封書冩所懐聊托金門翼時頗訝其氣象不逺後觧杭麾将赴青社以病泊舟楚州而卒其語已兆於先矣玉壺清話詩話總龜巻三十二欽定四庫全書詩話總龜巻三十三宋阮閱撰紀夢門上周琬湘中人艤舟長沙夢二吏引入南嶽廟内升殿王起接之曰知入亰銓選欲奉辟在此亦與人世之樂不疎琬曰名宦未達且欲赴銓王曰如此則不敢奉縻也乃作詩送琬曰住此既非樂捨此去何圗若問青氊事惟留一角書至亰調中牟尉忽卧病旅中且慮不起作妻子書一角封畢而卒洞㣲志位復字復之世本三秦人嘗登乾陵賦詩曰勢欲傾江移泰華乾坤都在手心中幾時直欲更唐祚不柰簾前有狄公又曰太宗蹀血平寰宇何事髙宗信女主當時朝端無正人天下分毫皆姓武歸寢夢一朱衣人引至大宫闕有一婦人坐殿上衣王者服侍立皆婦人知其為唐天后也問復曰前代帝可譏而陵寝可登乎復遜謝之令升殿與論當時事酌以酒再令賦詩曰堂殿無人古苑空幽花盡日度春風山鶯海燕舊時在時復飛來入故宫唐宫秦苑皆離黍嘗遣詩人興倍増落日牛羊歸已盡朦朧初月上乾陵后覧詩尤異令呼杜夫人來至即謂復曰此如晦之逺孫也當時為第一色帝欲見之多稱疾其強項與爾敵令與復飲杜夫人贈復詩曰深宫鎻閉暗生塵默黙那知嵗月新泉室久無人氣味不知今日再逢春留數日而歸臨行復以詩别夫人曰丈夫剛鐵腸因花反柔弱男子忠義心於情安可薄几有㶑灧巵席有燕趙姬人生捨此外萬事俱不知魂魄恍遊仙自信皆偶然匆遽又分㪚涕淚何流漣従斯對佳境蕭索春風前今夕天角月光滿人不圓幽池雙鸂鶒日日浮清泉霜鶻長天外驚飛急似弦一落江沙上一墮古溪邊獨行寒水畔悲鴻誰見憐何時再相遇共戯復䨇眠復徘徊不忍去因為執繖者激其腦遂覺翰府名談明皇幸蜀回居南内嘗夢中見妃子於蓬山太真院作詩遺之使焚於馬嵬山下云風急雲驚雨不成覺來仙夢甚分明當時苦恨銀屏影遮隔仙姬秪聼聲又作妃子所遺羅襪銘曰羅襪羅襪香塵生不絶細細圓圓地下得瓊鈎窄窄弓弓手中㺯初月又如脫履露纎圓恰似同衾見時節方知清夢事非虗暗引相思幾時歇待制王公素仲儀任御史日嘗夣至玉亰黃闕殿上有紺服翠冠者曰吾東門侍郎公則西門侍郎也昔以奏牘玉帝前語傷鯁訐遂責於世公夢回題詩於書窗曰似去華胥國裏來雲霞深處見樓臺月光冷射雞窗急驚覺遊仙夢一廻公晚嵗復思玉京之夢作詩曰虚碧中藏白玉京夢魂飛入黃金城何時再歩烟霄外皓齒仙童已掃㕔盧綘字晉卿因病痁夢一白衣婦人令食蔗遂愈他日復夢白衣婦人曰太尉當富貴時至可詣都下妾有一詩一緡以助行妾乃玉真也他日孟家陂相見其詩曰清風明月夜深時箕箒盧郎恨巳遲他日孟家陂上約再來相見是佳期言訖而去綘後賜死呼延賛視行刑將至梁門綘見擁一白衣婦人來宛如前夢中所見因嗟曰玉真何至此乎延賛為問玉真姓耿氏夫死與婦之子私遂與綘同場斬首其地果孟家坡丁咸序未第時嘗夢乘龍而起回顧又有一駱駝在其後二十年方㨗科舉作詩曰嘗憶金陵應舉時壯心頻往折丹枝蹉跎二十年中夢一度思量一淚垂殿試牓出亞咸序之名者乃龍起又亞之者乃駱起方悟其夢鄭顥嘗夢中得句云石門霧露白玉殿莓苔青續成長韻此兩句老杜詩也詩史蜀人任炌字温如晚寓寧州府宅一夕夢一山叟貽詩曰故國路遙歸去來玠和之曰春風天逺望不盡既覺自笑曰吾其死乎數日不疾而卒古今詩話金陵才士鍾輻少年氣豪一老僧見之相曰公登第則家破時樊若水愛輻之才以女妻之及燕爾應詔洛中果中甲科由是任放携一女奴青箱過華州蒲城其宰乃輻故人延留累日一夕盛暑登縣樓痛飲而寢夢妻樊氏以詩一首示生云楚水中如鏡雙雙白鷺飛金陵幾多地一去不思歸生夢中愧謝答詩曰還吳東下過蒲城城上清風酒半醒想得到家春欲暮海棠千樹已凋零既悟感其事因趣裝歸至采石渡青箱心痛暴卒生匆匆藁葬於新墳之側洎至家庭戸閴然妻亡巳數月詢之親鄰樊亡之日乃夢于登縣樓之夕也青箱𦵏處乃樊之塋地爾不植他木惟海棠數株正符詩意鍾嘆曰老僧之說信哉終身不仕隠於終山著書養氣年八十而終古今詩話臆說為鍾輻為蘇檢青箱為小青范陽盧獻卿大中年舉進士連不中第薄遊衡湘間至郴而病夢人贈詩曰玉築郊原古青山為四鄰扶疎遶臺朩􅄫寞獨歸人踰旬乃卒郴守為𦵏之近郊果以夏初入窀穸同前許渾嘗夢登山有宫室凌雲人云此崑崙山也既入見數人方飲招同飲至暮而罷賦詩曰曉入瑤臺露氣清庭中惟有許飛瓊塵心未㫁俗縁在十里下山空月明他日復夢至其處飛瓊曰子何題余姓名於人間改曰天風吹下歩虗聲曰善池陽崔球為太學生苦學不歸一日晝夢到其家見其妻正寫字呼之不應與之言不答眡其所書乃詩也曰數日相望極湏知意思迷夢魂不怕險飛過大江西既覺歴厯記之數日書至其妻寄此詩一字不差驗其寫詩日乃球得夢之日也謝濤諫議臨捐館舍前一月夢作讀史一絶云百年奇特幾張紙千古英雄一窖塵唯有炳然周孔教至今長自浸生民召其孫晏初錄焉石曼卿嘗於乎陽會中代作寄尹師魯一篇曰十年一夢花空委依舊河山損桃李鴈聲北去燕南飛髙樓日日春風裏眉黛石州山對起嬌波淚落粧如洗汾河不㫁天南流天色無情淡如水曼卿死後數日關永言夢曼卿曰延年平生作詩多矣常以為平陽代意篇最得意而世人少稱之能令余此詩傳於世者在永言耳永言乃増其詞為曲度以迷仙引於是人争歌之他日夢曼卿致謝焉曲云春隂霽岸栁㕘差裊金細絲畵閣晝眠鶯喚起烟光媚燕燕雙髙引愁人如醉慵緩歩眉歛金鋪倚嘉景易失懊惱韶光改花空委忍厭厭地施朱粉臨鸞鑑膩香銷减摧桃李獨自箇凝睇暮雲暗搖山翠天色無情四逺低垂淡如水離恨托征鴻寄旋嬌波暗落相思泪粧如洗向髙樓日日春風裏悔凭闌芳草人千里古今詩話海州士人李慎言嘗言夢至一處水殿宫觀女戯毬山陽蔡繩作傳叙其事甚詳有抛毬詞十餘首言皆清麗今但記其兩篇云侍燕黄昏晩未休玉階夜色月如流朝來自覺承恩醉笑倩傍人認繡毬堪恨闕家幾帝王舞烟揉盡繡鴛鴦如今重到抛毬處不是金爐舊日香胥偃内相應舉時夢徐將軍㰱下頭項作詩云昔作樹頭花今為塜下骨明年徐奭牓下第二人及第南部新書僕在黄州㕘寥自武陵來訪館之東坡一日夢㕘寥誦作新詩覺而記兩句云寒食清明都過了石泉槐火一時新後七年出守錢塘而㕘寥始卜居湖上智果院院有泉出石縫間其冷宜作茶寒食之明日僕與客泛舟自孤山來謁㕘寥汲泉鑚火烹黄蘖茶忽悟所夢詩兆於七年之前衆客驚嘆知傳記所載葢不妄也東坡詩話僕泊船吴江夢仲殊彈一琴十三絃頗損而有異聲余問云琴何為十三絃殊不答但誦云度數形名不偶然破琴今有十三絃此生若見邢和璞方信秦筝是響泉梦中了然諭其意覺而識之至晩到蘇殊當來見即以示之寫至此筆未絶殊老叩船來見驚嘆不已遂以贈之去州五里王平甫熈寧癸丑嵗直宿崇文院夢人邀至海上見宫殿甚盛其中作樂簫皷之伎甚衆其宫曰靈芝邀平甫俱徃有人在宫側隔山水曰時未至且令去他時迎之恍然夢覺時禁中已鳴鍾平甫頗自負非凡為詩記之曰萬頃波濤木葉飛笙簫宫殿號靈芝揮毫不似人間世長樂鐘聲夢覺時後四年平甫卒其家哭詢之嘗夢靈芝宫其信然乎當召告是夕暮奠若有聲音接人其家復卜之果獲兆昔有人至海上蓬萊見樓䑓中有待樂天之室樂天自為詩以紀其事與平甫之夢實相似葢二人皆天才逸發則其精神所寓必有異者物理葢有之而不可窮也紀詩王仲簡潭州人少修進士業未諧隨計性寛厚敦孝弟周顯徳中攝長沙縣丞累任甚能為理與潭州通判耿振相善太平興國二年忽染患而亡兄仲偉夜夢莊容持書一對云評事差逸來偉便開其書乃詩一章題云贈耿郎中曰得接英賢喜可知人生能得幾多時自従别後容顔改恰似庭前雨淚碑仲偉夢覺而記分明衆歎訝振不十年而終郡閣雅談沈彬字子羙髙安人為詩天才狂逸下筆成章好神仙之事少孤西遊以三舉為約嘗夢着錦綵衣貼月而飛識者言雖名播天下身不入月終不及第洪州觧至長安初舉行納省巻作夢仙謠云玉殿大開從容入金桃爛熟沒人偷鳯驚寳扇頻翻翅龍悞金鞭忽轉頭第二舉憶仙謠云白榆風占九天秋王母朝回宴玉樓日月漸長雙鳯睡桑田欲變六鼇愁雲翻簫管相隨去星觸旌幢各自流詩酒近來狂不得騎龍却憶上清遊第三舉贈劉象一首云曽應大中天子舉四朝風月鬂蕭疎不隨世祖重携劍知為文皇再讀書十載戰塵消舊業滿城風雨壊貧居一枝何事於君惜仙桂年年幸有餘劉象三舉無成孤寒主司覧彬詩其年放象及第五老牓即其數也彬乾符中值四方多事遂南遊湖湘及嶺表二十餘年却廻吳中過江南受偽命官至吏部侍郎致仕退居髙安雅言雜載杜牧之頃干時宰求小儀不遂求小秩又不遂嘗夢人謂曰辭春不及秋昆脚與皆頭后果得比部員外郎脛說中書舍人崔嘏娶李續女為曺州刺史令周邵南勾當障車後邵南因睡忽夣在㕔中女立床西嘏立床東女持紅牋題詩一首笑投嘏因髙吟之云莫以真留妾􅀙他理管絃容華難久住知得幾多年一嵗而嘏妻卒余自蜀中應舉京師道過華清官夢明皇令賦太真裙帶詞覺而記之今書贈柯山潘大臨邠老云百叠漪漪水皺六銖縦縦雲輕植立含風廣殿㣲聞環珮揺聲元豐八年正月旦日子由夢李士寧草草為具夢中贈一絶句云先生惠然肯見客旋買雞豚旋烹炙人間歛酒未湏嫌歸去蓬萊却無吃明年二月六日為予道之書以遺遲云詩話總龜巻三十三欽定四庫全書詩話總龜巻三十四宋阮閱撰紀夢門下狄遵度紀夢詩云佳城鬱鬱頽寒烟孤雛乳獸號荒阡夜卧北斗寒桂枕木落霜拱鴈連天浮雲西去半落日行客東盡隨長川乾坤未毁吾尚在肯與蟪蛄論大年狄遵度自兒童時巳能屬文落筆有奇氣年十六一夕夢杜子羙誦平生詩皆集中所未見者覺而記兩句後遂續之百斛明珠張詧字隠之本閩人遷於成都數世矣善屬文不仕晩用太守王素薦賜號冲退處士一日夢有人寄書召之云東岳道士書也明日與李士寧答曰手持東岳寄書來詧大驚不知其所自來未幾詧果卒其子禩亦逸民舉仕一命乃死士寧蓬州人也語默不常或以為得道者百嵗乃絶嘗見余於成都曰子甚貴當策舉首已而果然余嘗夢見人云是杜子美謂余曰今人多誤會予八陣圗詩云江流石不轉惟恨失呑吳世人皆以為先主武侯欲與闗羽復仇故恨不能滅吳非也我意本謂吳蜀乃脣齒之國不當相圖晉之所以能取蜀者以此子羙死已久猶不㤀其詩區區自列其意書生之習氣也並同前東坡將亡前數日夢中作一詩寄朱行中云舜不作六器詎知貴璵璠哀哉楚狂士抱璞號空山相如起睨柱投壁相與還何如鄭子産有禮國自閑雖㣲韓宣子鄙夫亦辭環至今不貪寳凛然照塵寰覺而記之自不曉所謂東坡絶筆也直方詩話陳明信云蕭貫少時嘗夢至宫廷中長廊邃舘如王者所居有千門萬戸望之洞然金碧爍耀既過數門見羣婦人如神仙視貫驚問何所従來貫愕然亦不知對貫自陳進士能為詩中有一人授貫紙曰此所謂衍波牋煩賦宫中曉寒歌貫援筆立成既有奇語其人甚賞之因曰先軰異日必貴此天上非人間也貫寤尚能記所賦俞秀老往嘗得之於蕭翰林之孫其詩有云十二嶤闗隠空緑獸猊呼焰椒壁馥渇烏涓㳙不相續轆轤欲轉霏紅玉百刻香殘隕蓮燭九龍吐水漫寒漿紅絹佩魚無左璫兩兩趨走瞻扶桑紅萍半圭出波面囘首觚稜九霞絢鳴鞘聲􅀙天上來大劍髙冠滿前殿秀老誦之尚有四五韻㤀之王太初傳言有焦仲先者家於南徐元豐元年因詣京師訪知已忽夢一婦人相顧遇或以詩筆相往來其一聫云呉王臺下無人處幾度臨風學舞腰又曰吳山之北會稽之陽古木蒼蒼其最後一章云仲冬之月二七之間月圓風静車馬相扳其人如病狂縁太初而後愈至秦少游書栁鬼事所載詩語前後皆同但年月乃是熈寧九年所病者乃是嘉興令陶集而所諭者乃是天竺辯才法師二者不知孰是並同前僕嘗夢有客携詩文見過者覺而記其一詩云道惡賊其身忠先愛厥親誰知畏九折亦自是忠臣又有數句若銘賛者云道之所以成不以害其耕徳之所以修不以賊其生東坡詩話富鄭公早年嘗夢青州王相公以後事相托公曰相公徳被生民當延遐夀何遽及此後二年罷相知鄆州辟鄭公為倅到任月餘有大星隕於宅園家人怪之相告曰後月當見果至後月薨鄭公為治䘮事故鄭公挽詞曰道徳被生民與當年夢中符契古今詩話鄭内翰獬未貴時嘗病瘟疫數日未愈甚困俄夢至一處若宫闕有吏迎謁甚恭公謂吏曰吾病甚倦煩熱思得凉浴以清其肌吏云已為公辦浴久矣吏引公至一室中有小池方濶數尺甃以明玉水光㶑灧以手測之清冷可愛公乃坐甃上以水泛身俄視兩臂已生白鱗視水中影則頭已角出公驚遽出吏云此玉龍池也惜乎公不入其水中入則為輔宰乃覺少選出汗公後登第為第一人為詩戯友人云文闈數戰奪先鋒變化湏知自古同霹靂一聲従地起到頭身是白龍翁王仲舉營道人母嘗夢挾仲舉入月仲舉修進業長興化二年赴舉謁秦王登第後有詩謝秦王曰三千里外抛漁艇二十人前折桂枝太平興國中仲舉有子曰嗣全亦中進士第乃扶兩子入月之祥青𤨏集湖州長興縣啄木嶺金沙泉即每年造茶之所也湖常二郡接界於此其土有境㑹序每茶節二牧畢至所泉處沙中居嘗元水將造茶太守具犧牲祭泉頃之發源清溢造御茶畢水則㣲减供堂者畢水已半矣太守造茶畢即涸矣太守或行斾稽晩則亦風雷之變或見摯獸毒蛇鬼魅之類焉胡生者即其居以釘鉸為業居霅溪而近白蘋洲去其居十餘歩有古墳胡生每因茶飯必奠酬之嘗夢人謂之曰吾徃栁氏子生善詩而嗜茗及死塟此室乃子今㞐之側也常衘子之惠無以為報欲教子為詩胡生辭以不能栁強之曰但率子意言之當有致矣生既悟試留詩果有冥助者其後遂工焉詩曰胡風似劔鎪人骨漢月如鈎釣胃腸魂夢不知身在路夜來尤自到昭陽人謂之胡釘鉸詩金沙池泉在常州宜興縣罨畫溪之東有寺寺有碑載當時杭湖常三州貢茶唱和樂天云十隻畫船何處宿洞庭山脚太湖心常州太守忘其姓名和云殷勤為報春風道不貢新茶只貢心韋檢舉進士不第常有一羙姬一日捧心而卒檢追思痛悼殆不勝情舉酒吟詩悲怨可掬吟曰寳劍化龍歸碧落嫦娥隨月下黃泉一盃新酒青春曉寂寞書窗恨獨眠一日忽夢姬泣涕澘然曰當有後期今和來篇即口占云春雨濛濛不見天家家門戸栁如烟如今腸㫁空􅂷淚歡笑重追别有年檢終日怏怏後更夢姬曰即遂相見覺來神魂恍惚乃題曰白浪漫漫去不迴浮雲飛盡日西頽始皇陵上千年樹銀鴨金鳬也變灰後數日即符夢兆脞說前集晁奉禮簡故宫保内翰之次子也於昆弟中最稱奇秀與梁固少小硯席之至善大中祥符二年固狀元及第授青州倅時奉禮榮侍在闕下是年冬末梁方之任去青雨驛夜夢晁來相謁手携白扇上有七言詩一首以贈梁云死生離别最堪悲相對無言淚滿衣嘆我巳歸泉下去羡君新向月中歸長鞭已見騰夷路折翼終難繼迅飛珍重故人當聖代早持鈞軸入黄扉覧詩起執手悲泣而别倐然覺大異之歎晁必沒故矣乃急走僕録所得詩入亰師訪其安否宫保開讀之大慟曰品格真吾兒作也夢之夕乃簡亡之日也李良弼故給事中防之子祥符元年應進士舉得同學究及第二年給事自南京移知鄭州以家在應天良弼奏為本府司士㕘軍是年中赴良弼隨侍至鄭夜宿中牟驛夢人持詩版跪而來獻良弼詩曰九霄丹詔三天近萬叠紅芳一旦開日月山川湏問甲為君親到小蓬萊覺而異之旦遽起而白給事喜曰據此詩意汝必有前程慎勿廢於筆硯勉旃勉旃至郊而别五年方歸闕授三司户部判官五月已舉張楚縣丞事停任六月十九日良弼卒於應天府給事大慟悲語張君房曰夢之不誠如是自此兒夢必謂其前程而為詞臣一旦至是苦哉君房但寛勉以慰之是年秋君房以語鞠獄無狀謫為寧海督郵乃同給事舟抵應天府旦憇泊間細語良弼卒𦵏之日月及𦵏地之所因而繹之忽有數悟乃省其詩盡得之良弼丙戌生年二十有七即詩首句云九霄丹詔三天近三九二十七數是年二十五故云近也萬叠紅芳一旦開方萬葉之花一旦開盡是近謝之意次云日月山河湏問甲其年六月十九日甲寅乃其卒日殯是二十九日甲子𦵏於府東甲地即是日月山川湏問甲也葢六月天徳月徳俱在甲末句云為君親到小蓬萊即虚無㝠漠之所給事沉黙曰君辨之矣脞說前集沈亞之嘗言刑鳯寓居長安平康里第晝夢一婦人自楹而來古粧髙髻作陽春曲曰長安少女翫春陽何處春陽不㫁腸舞袖弓腰渾忘却娥眉空帶九秋霜鳯曰何謂弓腰曰昔年父母教舞作此弓彎狀舞罷辭去鳯亦尋覺脞說後集吳興姚郃嘗言有友王生者元和初夕夢遊吳宫久之聞宫中出輦吹簫撃皷言𦵏西施王悲悼不止立召門客作挽歌生應聲為詞曰西望吳王闕雲書金字牌連江張蕙帳擇土𦵏金釵滿地紅心草三層碧玉臺春風無處所悽恨不勝懐及寤復記其事王生太原人崇寧元年元日昏眠夢中作一詩云無頼春風試怒號共乗一葉傲驚濤不知兩岸人皆愕但覺中流笑語髙三月與陳瑩中渡湘江是日大風當斷渡小舟掀舞白浪中兩岸聚觀膽落瑩中笑愈髙余以詩語瑩中瑩中曰此公桉後大行叢林東坡倅錢塘夢神考召入禁中宫女環侍一紅衣女捧紅靴一隻命坡銘之其中一聫云寒女之絲銖積寸累歩武所及雲蒸雷起上極歎其敏劭同前山谷晝卧夢與一道士升空道士曰與公游蓬萊覺天風吹鬢道士曰歛目俄有狗吠開目不見道士惟見宫殿魯直入有兩玉人導升殿主䧏揖之仙女侍之中有一女云整琵琶魯直愛其風韻顧之忘揖主者主者色莊故其詩曰試問琵琶可聞否靈君色莊妓搖手與余親言之今山谷集語不同葢更昜耳冷齋夜話少遊南遷宿宫亭湖廟下側枕視㣲波月影縦橫追繹昔宿埀雲老借竹軒見西湖月色如此夢羙人自言我天女也以維摩像乞賛少游愛其畫念曰非道子不能作此天女以詩戲少游曰不知水宿分風浦何似秋眠借竹軒聞道詩詞妙天下廬山對眼可無言少游夢中題其像曰竺儀華夢瘴面囚首口雖不言十分似九應笑舌覆大千作獅子吼不如不搏取妙喜如陶家手同前陳智夫襄陽人博學有才思尤長於歌詩嘗遇異人授以吐納之術故佳句多於夢中得之若花笑似留客鳥聲如喚人又野花臨水數枝恨芳草連天千里情之句雖前輩不能逺過遯齋閑覧詩話總龜巻三十四欽定四庫全書詩話總龜巻三十五宋阮閱撰譏誚門上陳彭年大中祥符中與晁文莊内翰等四人同知貢舉省試將出奏試巻舉人壅衢觀其出省諸公皆􅆭赧其容獨彭年揚鞭自肆有驕矜之色榜出有甥不預選怒入其第會彭年未來於几上得黃勅乃題其背曰彭年頭惱太東烘眼似硃砂鬢似蓬紕繆幸叨三字内荒唐仍在四人中取他權勢欺明主落却親情賣至公千百孤寒齊下淚斯言無路達堯聰彭年怒抱其勅入奏章聖見而不恱然釋其罪江南野錄唐太宗燕近臣長孫無忌嘲歐陽率更曰聳膞成山字埋肩畏出頭誰言麟閣上畵此一彌猴詢應聲曰縮頭連背聳漫襠畏肚寒只縁心渾渾所以面團團太宗改容曰詢豈不畏皇后聞耶無忌長孫后之弟也小說舊聞唐相張延賞選壻無可意者其妻苗氏賢而知人特選進士韋臯許之臯性踈曠不拘細行延賞竊悔由是婢僕頗輕慢惟苗氏待之益厚臯因辭東遊張氏罄奩具以治行延賞幸其去以七駝物為贐臯行翌日悉還之惟留奩物及書策而已後五年臯擁節旄會徳宗幸奉天持節西川替延賞乃改姓名作韓翺人莫敢言至大囬驛去府三十里人有報延賞曰替相公者韋臯也非韓翺苖氏曰若韋臯必韋郎也延賞曰天下姓名同者甚衆彼韋生必填溝壑豈能乘吾位乎次日果韋臯也延賞慚懼自西門潜遁臯入見苖禮奉過布衣之日求前輕慢者皆杖死之時泗濵郭圍因為詩曰宣父從周又入秦昔賢誰不困風塵當時甚訝張延賞不識韋臯是貴人唐宋遺史彭齊吉州人才辯滑稽嘗謁南豐宰而不禮之一夕虎入縣㕔噬所養羊棄殘而去宰即以會客齊與焉翌日獻詩於宰曰昨夜黄班入縣齋分明踪跡印蒼苔幾多道徳驅難去些子猪羊引便來令尹聲聲言有過錄公口口道無災思量也觧開東閣留得頭蹄待秀才覧者絶倒青箱雜記景徳初河朔舉人張存任弁皆以防城得官有無名子嘲曰張存觧放旋風砲任弁能燒猛火油丘濬寺丞失意徧遊諸郡至山陽郡守屢召之夜飲翌日作詩曰醜却天下美人面正得世間君子心郡將他日再為文字飲以謝之至宜真太守室看牡丹作詩曰何事化工情愈重偏教此卉大妖妍王孫欲種無餘地顔巷安貧欠買錢曉檻競開香世界夜欄誰結醉因縁湏知村落桑耘䖏田叟饑耕婦不眠又至五羊贈大守詩曰碧睛蠻婢頭䝉布黒面胡兒耳帶環幾處樓䑓皆枕水四周城郭半圍山又詩曰階上腥臊堆蜆子口中膿血吐檳榔又詩曰風腥蠻市合日上瘴雲紅太守見之大不懌翰府名談天聖中修國史王安簡謝陽夏李邯郸黄唐鄉為編修官安簡神清冲淡唐郷刻意篇什謝李嘗戲為句豐貎閒如鶴黄吟苦似猿春明退朝録唐既平劉展江淮之亂上元間租庸使元載以吳越雖兵荒後民産猶給乃辭召豪吏分宰列邑而重歛之時人謂之白着言其役歛無名其所著者皆公然明白無所嫌避一云世人謂酒酣為白着既為刻薄之役不堪其弊則必顛沛酩酊如醉者之着也渤海髙亭有詩曰上元官吏稱剥削江淮之人皆白着唐景龍中洛下霖雨百餘日宰相不能調隂陽乃閉坊市北門卒無効􅗈溢至甚人歌曰禮賢不觧開東閣爕理惟能閉北門朝野僉載孫魴沈彬李建勲好為詩時魴有夜坐詩為衆所稱建勳因匿於齋中待彬至乃問彬云魴之詩何如彬曰田舍翁火爐頭之語何足道也魴聞而出誚彬曰何誹謗之甚而比田舍翁無乃過乎彬曰子夜坐句劃多灰漸冷坐久席成痕此非田舍翁爐上作而何闔坐大笑乃題金山寺云萬古波心寺金山名目新天多剩得月土少不生塵過櫓妨僧艇歸濤濺佛身誰言張處士題後更無人莫不服其馴雅江南野録朝元龜廬陵人嘗謁邑宰見起伏生獷欲窮以詞學因新畵屛為戲珠龍乃曰請子咏之元龜應聲而成因諷宰受賂云翻身騰白浪探爪攫胡珠毛柄聚生徒於廬山白鹿洞與諸生講論所獲貲鏹皆以市酒洞有辨者嘲云彭生作賦茶三片毛氏傳詩酒半升嘗自題於齋壁云先生不在此千載只空山因大醉一夕而逝劉炎少負詞學晚為永新尉拙於政治道有貪名太守行邑覬覦之意而炎不悟既行以詩諷炎云未到桃源時長憶出家景及到桃源了還似鑑中影炎乃和而復之後以民訴受賄遂按以法炎復有詩云早知太守如狼虎獵取膏粱以饀之羅隠性傲睨初赴舉過鍾陵見營妓雲英一絶後下第又過復見之雲英曰羅秀才尚未脫白隠以詩嘲之曰鍾陵醉别十餘春重見雲英掌上身我未成名英未嫁可能俱是不如人隠與顧雲同謁淮南相國髙駢雲為人雅律髙公遂屆雲而逺隠隠欲歸武陵與賔幕酌餞於雲亭盛暑青蠅入坐髙公命扇驅之謔隠曰青蠅被扇扇離席隠聲曰白澤遭釘釘在門偶見白澤圖釘在門扇乃譏雲也時髙公欲繼淮南王求仙方為妖亂後為畢將軍所害隠作妖亂誌以譏之故有題延和閣云延和髙閣勢凌雲輕語猶疑太一聞燒盡餘香無一事開門迎得畢將軍僖宗在蜀隠作詩數首以刺諸侯及還梁為朝貴所疾乃謁錢武肅焉獻僖宗在蜀詩曰白丁攘臂犯長安翠輦愴惶路屈蟠丹鳯有情雲外逺玉龍無跡渡頭寒静思貴族謀身易危惜文皇創業難不將不侯何計是釣漁船上淚䦨干又作僖宗還京曰馬嵬楊栁尚依依又見鑾輿幸蜀歸泉下阿瞞應有語這回休更怨楊妃鑑戒録郡閣雅談謂青蠅白澤對句是冦弱謝觀作蘇子羙監進奏院因賽神召舘中同舍是時江南人李中舍因梅聖俞謁子羙且願預此會聖俞以為言子羙曰食中不設蒸饅餅夾坐上安有國舍虞䑓李啣之遂暴其事於言語為劉元瑜所彈子羙坐謫故聖俞有客至詩云有客十人至共食一鼎珍一客不得食覆鼎傷衆賓葢指李也詩史來鵠洪州人咸平中名振都下然喜以詩譏訕當路為人所惡卒不第金錢花云青帝若教花裏用牡丹應是得錢人夏雲云無恨旱苖枯欲盡悠悠閑䖏作奇峰偶題云可惜青天好雷電只能驅趂懶蛟龍詩史唐湖州參軍陸䝉妻蔣氏善屬文然嗜酒姊妹勸節酒强食蔣應聲曰平生偏好飲勞爾勸吾飡但得樽中滿時光度不難僧知業有詩名與䝉善一日訪䝉談𤣥蔣使婢奉酒知業云受戒不飲蔣隔簾謂曰上人詩云接岸橋通何處路倚樓人是阿誰家觀此風韵得不飲乎知業慚而退濠州西有髙唐舘俯近淮水御史閆欽授宿此舘題詩曰借問襄王安在哉山川此地勝陽䑓今朝寓宿髙唐舘神女何曽入夢來有李和風者至此又作詩曰髙唐不是這髙唐淮上江南各異方若向此中求薦枕參差笑殺楚襄王丁晉公為玉清昭應宫使夏英公為判官一日賜宴齋宫優人有雜手藏擫者晉公顧英公曰古人無詠藏㩎詩請賦一章英公為一絶云舞拂挑珠復吐丸遮藏巧便百千般主公端坐無由見却被傍人冷眼看楊孺尚書以耳聾致仕居雩縣别業同里髙氏貲厚有二子小字大馬小馬一日里中社飲小馬携酒一榼就楊公曰此社酒善治聾願持盃酌之無瀝楊書絶句與之云數十年來雙耳聵可將社酒使能醫一心更願青盲了免見髙家小馬兒倦遊錄景祐初詔先朝免觧人候將來特與推恩有無名子改王元之升平詞以嘲曰舊人相見問行年便說真宗更以前但看緑袍包裹了這回冷笑入黃泉永叔在政府將引去以詩寄潁川常夷甫曰笑殺汝陽常處士披簔帶笠伴春鋤明年夷甫起授侍講判國子監有無名子改前詩作夷甫寄永叔曰笑殺汝隂歐少保新來䖏士聼朝鷄又云昔日潁隂常䖏士却來馬上聼朝鷄史流仕不得志好持人長短世以凶人目之亦終以此敗嘗過江州琵琶亭題詩云坐上騷人雖有咏江邊寡婦不難欺若使王涯聞此曲織羅應過賞花詩並同前邵安石連州人髙湘侍郎南遷歸朝途經連江安石以所業投之遂見知同至輦下湘知貢舉安石擢第詩人章碣賦東都望幸詩刺之曰懶修珠玉上髙䑓眉目連姢幸不開縦使東廵也無益君王自帯羙人來古今詩話泗州僧伽塔人多云其下真身也塔後有閣記興國中初塑事甚詳退之詩云火燒水轉掃地空則真人之焚久矣塔本般匠所建俗言塔頂為天門蘇國老有詩云上到天門最髙處不能容物只容身葢譏在位者孫皓為晉所㓕封歸命侯武帝問皓曰聞南人好作爾汝詩爾頗能否皓被酒舉觴曰昔與汝為鄰今與汝為臣勸汝一盃酒令汝夀萬春帝悔之吳武陵有文而好訐嘗以贓敗廣州吏治殊不假貸題詩路左壁曰雀兒來往颺風髙下視鶯鸇意氣豪自謂能生千里翼黄昏依舊入蓬蒿唐王鐸楊收皆薛逢同年收作相逢有詩曰湏知金印朝天客同是沙堤避路人威鳯遇時皆瑞聖應龍無水謾通神收聞之怒王鐸作相逢又有詩曰昨日鴻毛萬鈞重今朝山岳一毫輕鐸又怒羅隠與桐廬章魯風齊名錢武肅崛起以魯風善筆札召為表奏孔目官魯風不就執之後以羅隠為錢塘令懼而受命因宴獻詩云一箇禰衡容不得思量黄祖謾英雄自是始厚之馮􅌡王鎮南陽郡中宣聖廟壊有酒戸十餘輩投狀乞修瀛王未及判有幕客題四句狀後云槐影􅄁差覆杏壇儒門子弟盡髙官却教酒户重修廟覺我慚惶也不難瀛王遽罷其請出已俸重修孫僅給事鎮永興日多作詩時玉清昭應宫初成孫作驪山詩云秦帝墓成陳勝起明皇宫就禄山來有人傳於京師以為譏時政顔標咸通中鄭薫下狀元及第先是徐冦作叛薫欲激勸勳烈意標乃魯公之後故置之巍科既而詢其廟院標曰寒素京國無廟院薫始大悟有無名子嘲曰主司頭腦太冬烘錯認顔標作魯公光啟中蔣嶓以丹砂授韋中令吳人張鵠有文而貧或嘲之曰張鵠只消千駝絹蔣嶓惟用一丸丹並同前詩話總龜巻三十五欽定四庫全書詩話總龜巻三十六宋阮閱撰譏誚門中黃台符十六嵗張讀十八嵗同年登科為鄭宣州幕嘗列題於西明寺之東廡或竊注之曰一雙同進士兩箇阿孩兒李煜作紅羅亭四面栽江梅花作艷曲歌之韓熈載和云桃李不湏誇爛熳已輸了風吹一半時淮南已歸周趙嘏浙人有羙妾洎計偕母不許携行㑹上元節為鶴林之遊帥見之掩為己有明年嘏榮歸以詩感之曰寂寞堂前日又曛陽䑓去作不歸雲當時聞說沙吒利今日青蛾屬使君帥聞遣歸李商隠依彭陽令狐楚以牋奏受知後其子綯有韋平之拜浸踈商隠重陽日義山造其㕔事届題云十年泉下無消息九日樽前有所思郎君位重施行馬東閣無因得再窺綯見慚恨扄閉此㕔終身不處袁筠婚蕭楚女言定未㡬擢進士第羅隠以一絶刺之云細看月輪還有意定知青桂近嫦娥林和靖傲許洞洞作詩嘲之云寺裏掇齋飢老䑕林間咳𠻳病獼猴豪民送物鵝伸頸好客窺門鼈縮頭章郇公性簡静嘗為開封府試官出人為天地心賦舉子白先朝曽試遽别出一題曰教猶寒暑既非致思舉子又上請此題出樂記教乃樂教也上在諒隂而用樂事恐非便方紛紛不巳無名子作詩嘲曰武成廟裡沽良玉夫子門前㺯簸箕唯有主司章得象往來寒暑未曽知時南廟試良玉不琢國學試良弓之子必學為箕賦並同前韓退之彌明傳云嘗與文友會宿者老道士形貎怪異自通姓名求宿言論甚奇既飲酒衆度其不能詩因聫句咏爐中石鼎將以困之首唱曰妙匠琢山骨刳中事調烹至彌明自云不善俗書人多不識乃遣人執笔硯吟曰龍頭縮囷蠢豕腹脹膨脝坐客盡驚會人思竭不能復續彌明連促之坐中有欲吟其聲悽苦彌明句中侮之曰仍於蚯蚓竅更作蒼蠅聲湏臾倚壁睡鼻息如雷坐客異且畏之並同前光化中羅隠佐兩浙幕同院沈嵩得新榜封示隠隠批一絶於紙尾曰黃土原邉狡兎肥犬如流電馬如飛㶚陵老將無功業尤憶當時夜獵歸正元中太府卿韋渠牟金吾李齊運皆寵貴薦人多得名位時劉師老穆寂皆應科目渠牟主穆寂齊運主師老會齊運對順宗嗟其羸弱許以致仕而歸師老失據無名子曰太尉朝天升穆老尚書倒地落劉師劉禹錫曰名場嶮􅇖如此王文惠相府中病尤好釋氏時有人作詩曰誰謂調元地番成養病坊但見僧盈室寧知火燎房盧肇黃頗皆宐春人頗富於財而肇苦貧與頗同日赴舉亦同日登途郡守獨餞頗於郵亭而遣肇明年肇狀元登第歸郡守㑹肇看競渡肇即席作詩曰向道是龍剛不信果然奪得錦標歸太守大慚韋蟾左丞至長樂驛見李瑒給事題名因書其側云渭水春山照眼明笑人何事寡詩情只應學得虞姬壻書字纔能紀姓名劉魯風江西投所知為典謁所阻因得一絶曰萬巻書生劉魯風烟波千里謁文公無錢乞與韓知客名紙生毛不為通范魯公質舉進士和相凝爱其程文以自登第舊在十三人謂魯公曰公之詞業合在甲選暫屈十三人用傳老夫衣鉢可乎魯公謝之後果至宰相亦且相繼門生有獻詩者云従此廟堂添故事登庸衣鉢亦相傳李郁尚書為荆南従事有朝士寄書字體殊惡李寄詩曰華緘千里到荆門章草縦横任意論應笑鍾張虚用力却教羲獻謾勞魂惟堪爱惜為珍寳不敢留傳示子孫深荷故人相愛處天行時氣許教呑言堪作符也並同上北齊盧思道聘陳設宴聫句作詩先唱者譏北人云榆生欲飽漢草長正肥驢謂北人食榆吳地無驢故有此句思道即續之曰共甑分炊飯同鐺各煮魚謂南人無義同炊異饌也吳人愧之譚藪洛陽有譚歌婦人楊苧蘿朝辦言有才思楊凝式侍郎以姪女呼之怜其聪慧也時有僧雲辨者有文善能講經善應對若祀祝之辭隨名位髙下對之三十字如宿思少師尤重之長夀年五月雲辨講對歌者忽有蜘蛛於簷前垂絲而下正對少師與雲辯前少師笑謂歌者曰試嘲得着奉絹三疋歌者不思應聲嘲之意不離蜘蛛戲之雲辯雲辯體充肚大不能行少師見詩絶倒大呌和尚將絹五疋雲辯慚且笑與絹五疋詩嘲蜘蛛曰喫得肚罌撐尋絲遶寺行空中設羅網只待殺衆生洛陽舊聞至和間有數達官以詩知名常慕樂天體多得於容易曽有一聫云有禄肥妻子無恩及吏民有人戲之曰昨日通衢遇一輜軿車載極重嬴牛甚苦豈非足下妻子乎聞者傳以為笑歐公詩話向文簡在延州嘗有詩云四時常有烟棚動三月猶無菜甲生又有人嘲同州詩云三春花發推樗樹二月鶯啼是老鵶雜誌徐州雲龍山人張天驥不逺千里見朱定國於錢塘愛其中風物遂欲徙家居焉春盡思歸以詩戲之云羡公飄蕩一孤舟來作錢塘十日遊水洗禅心都眼净山供詩筆捴眉愁雪中乘興真聊爾春盡思歸都罷休何事却尋朱處士種魚萬尾橘千頭絶詩閩人廖復天禧二年求薦天府下撾鼓訟之覆考再狀省試又下湖人凌景陽因復訟之亦再收髙第遂登科士子作詩嘲復曰細思堪恨廖賢良論中科名屬景陽啼得血流無用處為他人作嫁衣裳朱守國録曰續曰景祐中有輕薄子以古人二十字詩益成二十八字嘲誚曰仲昌故國三千里宗道深宫二十年殿院一聲河滿子龍圗雙淚落君前龍圗王博文也嘗更大藩鎮開封知府三司使一日對上前因叙揚厯之久不覺淚下殿院蕭定基也為殿中侍御史與韓魏公呉春卿王君貺同發觧開封舉人作河滿子曲嘲之因奏事仁宗問之令誦一遍王宗道為諸王教授及講書凡二十餘年不求進用仲昌者章郇公之仲従子論科場不公奏聞牒歸簡州當時以為雖用古人詩句而切中一時之盛事傳以為笑樂東齋錄丁晉公與楊文公遊處宴集必有詼諧之語復皆敏於應答一日䑓諫攻文公因晩俟晉公之門方伏拜晉公亟謂文公曰内翰拜時髭擎地文公隨聲答曰相公坐處幙瞞天葢楊羙髭髯而丁第方盛設帷幙因互相議也有宋佳話太尉田重進起於戎行晩年好道術喜黃老有揀停兵士張花項衣道服以其項多雕篆目之為花項又引道士為同志前後所用錢帛悉資之無少違久而無成忽一日云出采藥八月當成晩大醉歸重進問尊師従未飲何遽醉花項㣲笑其實不飲昨日見一仙流向西頂禮重進問何人花項恭肅低言即吕洞賓謂曰重進武人好事如此此人有夀今巳有㣲疾由㣲染風疴某當暫届少藥療之田大喜曰重進粗人何銷神仙下䧏且曰何時至花項曰此月十五日夜三更必至吕不欲多見人望太尉於射亭帳設用好新裀褥静室燃香鮮果好酒後至五更重進久患風折腰艱難重進方欲責花項虗誕外報尊師門大開囊篋搬運巳盡重進慚恨鳴指曰無良漢無良漢自是不復信時有無名人獻詩一首以笑之永興軍人尚能念誦詩曰或作黃金或作銀熱人好倖搏尖新一朝任惑田重進半夜扳迎吕洞賓獃漢出門特引領黠兒得路已潜身雖稱兩箇無良漢笑殺長安萬萬人洛陽舊聞湖南徐仲雅與李宏臯劉昭禹齊名所業百餘巻並行於世畊夫謠一首云張緒逞風流王衍事輕薄出門逢畊夫顔色必不樂肥膚如玉潔力抝絲不折半日無畊夫此輩揔餓殺雅言雜載周顓處士洪儒奥學偶不中第旅浙西從事歡飲惟昩於章程座中皆戯之有贈詩曰龍津掉尾十年勞聲價當時閗月髙惟有紅粧回舞手似持霜刄向猿猱周和曰十載文場敢惮勞宋都回鷁為風髙今朝甘伏花枝笑任道墫前愛縳猱廬山道士體貌魁偉飲酒㗖肉居九天使者廟有雙鶴因風所飄憇於廟庭道士驚喜因謂當赴上天命令山童控而乘之羽儀清弱不勝其載毛傷骨折而斃翌日馴養者知訴於公府處士陳沆嘲之曰㗖肉先生欲上升黃雲踏破紫雲崩龍腰鶴背無多力傳語麻姑借大鵬南唐近事李山甫詩名冠於當代過烏江題項羽廟云為虜為王盡偶然有何慙見渡江船平分天下猶嫌少可要行人贈紙錢又贈宿將曰校獵燕山經幾春雕弓白羽不離身年來馬上渾無力望見飛鴻指似人任谷富有經術隠居於洛以俟召命末䧏蒲輪乃躬到京訪知已有朝官戯贈曰雲間應訝鴈書遲自到京中探事宜従此見山湏合眼被山相賺巳多時後至補衮曹確楊收徐商路岩同秉政時有詩嘲之曰確確無餘事錢財總彼扠商人都不管貨賂幾時休南部新書詩話總龜巻三十六欽定四庫全書詩話總龜巻三十七宋阮閱撰譏誚門下大中元年魏扶知禮闈入貢院題詩曰梧桐葉落滿庭隂鎻閉朱門試院深曽是昔年辛苦地不將今日負前心及榜出為無名子削為五言詩譏之南部新書先天中王上客為侍御史自以才望當前行忽除膳部員外郎㣲有恨惋吏部郎中張思咏曰有意嫌兵部專心望考功誰知脚踜蹬幾落省橋東蓋膳部省最東北隅也趙璘儀質麽陋第名後赴姻禮儐相以詩嘲之曰巡闗雖傍樗蒲局望月還登乞巧樓第一莫教蛛蜘過縁人衣帶上人頭又曰不知元在鞍橋裏將謂空䭾席㡌歸又曰火爐床上平軀立便與夫人作鏡䑓崔立言髙退隠茅山善謔浪為詩贈營妓敦龎者曰瓦棺寺裏逄行跡華岳山頭露掌痕不湏惆悵愁難嫁待與將書問岳神瓦棺寺有大佛跡岳神大人又醉中謔浙江㢘使曰山天留意向丹梯連帥邀來出藥畦常見浙東誇鏡水鏡湖元在浙江西並同上太平廣記言杜牧為宣州幕有酒妓肥大牧之贈詩曰盤祖當時有逺孫尚令今日逞家門一車白土將泥臉十幅紅綃補破裩瓦棺寺裏逢行跡華岳山前見掌痕不湏啼哭愁難嫁待與將書問岳神與此同未知孰是張唐卿進士第一人及第期集於興國寺題壁云一舉首登龍虎榜十年身到鳯凰池有人續云君看姚煥幷梁固不得朝官未可知後果京官筆談惠崇詩自負有河分岡勢斷春入燒痕青時人或有疑譏其犯古者嘲之曰河分岡勢司空曙春入燒痕劉長卿不是師兄多古句古人詩句似師兄居聞轉話元居中作宿守郡有官妓小蘇善歌舞㓜而聰慧元守甚怜之一日宴罷令就座客闗彥長求詩闗善詼諧即當時名公也得詩云昔日聞蘇小今朝見小蘇未知蘇小貌得似小蘇無由是以此自負相傳以起聲士大夫従此作詩甚衆洎長大數年間體豐脩長未免尚語此蘇子瞻出知湖州亦來乞詩蘇書與之云舞腰窈窕影揺千尺龍蛇動歌喉宛轉聲㪚半天風雨寒此石曼卿古松詩遂士大夫笑泗上錄曺唐羅隠同時才情不殊羅曰唐有鬼詩或曰何也曰水底有天春寂􅄫人間無路月茫茫唐曰羅有女子詩或曰何也曰若教觧語應傾國任是無情也動人此葢羅牡丹詩也廬懐抒情賈島狂狷行薄執政惡之故不與選裴晉公於興化作池亭島詩曰破却千家作一池不栽桃李種薔薇薔薇花謝秋風起荆棘滿庭公始知人皆惡其不遜古今詩話胡旦秘監性褊躁表眀居襄陽屢譏郡政夏英公常師事之及公貴達胡尚以青衫眡公公出鎮㐮陽時一造焉一日謂公曰讀書乎郡事少暇比只作得一燕雀詩胡曰試舉之曰燕雀紛紛出亂麻漢江西畔使君家空堂自恨無金弹任爾啾啾到日斜自爾少戢蔡君謨守福唐會李太伯與陳烈於望海亭以歌者侑酒方舉板一拍陳驚怖越席攀木踰垣而去李作詩曰七閩山水掌中窺乘興登臨到落暉誰在畵橋沽酒處幾多鳴櫓趁朝歸晴來海色依希見醉後鄉心積漸㣲山鳥不知紅粉落一聲檀板便驚飛葢譏其矯也梅聖俞過楊州宋公序送鵞作詩謝云嘗遊鳯池上曾食鳯池萍乞與江湖客従交養素翎公序得詩不懌同前乾符末有客寓於廣陵開元寺不為僧所禮一筆題門而去龕龍去東海時日隠西斜敬文今不在碎石入流砂僧衆皆不能詳之獨有沙彌能觧衆問其由則龕龍去矣有合字時日隠矣有寺字敬文不在茍字也碎石入流沙卒字也此不遜之言辱我曺也衆僧大悟沙彌乃懿皇朝雲皓供奉也長沙六快詩致仕屯田王撥作也六人謂師周沆漕趙良規憲李碩劉舜臣倅朱景陽許𤣥詩略曰湖外風物奇長沙信難續衡峰排古青湘水湛寒緑舟楫通大江車輪會平陸昔賢官是邦仁澤流豐沃今賢官是邦刳㗖人脂肉懐昔甘棠花傷今猛虎毒然此一郡内所樂人纔六漕與二憲僚守連兩通屬髙堂日暮會深夜繼以燭幃幙皆綺紈器皿盡金玉歌喉若珠纍舞腰如素束千態與萬狀六人歡不足因成快活詩薦之堯舜目餘數聫猥不可錄揆與樊太博立里閈友素俱老於故鄉而林泉相依以二踈自髙謗詩旣出捕樊以脅之樊義薄無守悉以遊従之事賣之以求茍免而希賞獄且讟謗削籍立以告發加秩昻然拜命略無三褫之羞訓詞云為爾交者不其難乎湘山録皇甫松著醉鄉日月三巻自叙之云松承相奇章公表甥然不薦舉因襄陽大水變極言誹謗有夜入真珠室朝遊瑇瑁房之句承相有愛姬名真珠張曙崔昭緯中和間西川同舉相與謁日者問命時曙自恃才名籍甚人皆呼為將來狀元崔亦分居其下無何日者殊不顧曙惟目崔曰將來萬全及第曙有愠色曰郎君亦及第但崔家郎君拜相當於此時過堂既而曙果以愴恤不終場昭緯首冠曙以詩刺之曰千里江山陪驥尾五更風水失龍鱗昨夜浣沙溪上雨緑楊芳草為何人崔不平之會夜飲崔以巨觥飲張拒之崔曰但喫待我作宰相與你取狀元張拂衣而出因不叶後七年崔自内廷大拜張於後三榜裴公下及第果於崔公下過堂並同上崔珏佐大魏公幕與副車袁充不叶公俱薦之於朝崔拜芸閣校讐縦舟江滸會有客以絲桐詣公公善之而迎珏至公從容為客請一篇珏方懐拂欎因而發洩所蓄為詩七條絃上五音寒此藝知音自古難惟有河南房次律始終怜得董庭蘭公不懌崔大慙恚元㣲之在浙東時賔府有薛書記飲酒醉因争令以酒器撃傷㣲之由此遂去幕乃作十離為獻詩云馴擾朱門四五年毛香足净有人怜無端咬著親情脚不得紅絲毯上眠犬離家越管宣毫始稱情紅牋紙上撒花瓊都縁用久鋒頭盡不得羲之手裏擎筆離手雲耳紅毛淺碧蹄追風曽到日東西為驚玉兒郎君墜不得華軒更一嘶馬離廐隴西獨自一孤身飛去飛來上錦茵都縁出語無方便不得籠中更喚人鸚鵡離籠出日朱門未忍抛有人常愛語咬咬啣泥穢污珊瑚簟不得梁間更壘巢燕離巢皎潔圓明内外通清光似照水晶宫都縁一點瑕相汚不得終宵在掌中珠離掌戯躍蓮池四五秋常摇朱尾㺯輪鈎無端擺㫁芙蓉朶不得清波更一游魚離池爪利如鋒眼似鈴平原捉兎趂髙情無端竄向青雲外不得而今手上擎鷹離鞲蓊欎新栽四五行常將正節負秋霜為縁春笋鑚墻出不得垂隂覆玉堂竹離亭鑄㵼黃金鑑始開初生三五月徘徊為遭無限塵䝉污不得華堂上玉䑓鑑離䑓元公詩曰馬上同携今日盃湖邊還拂去年梅年年只是人空老䖏䖏何曽花不開歌咏每添詩酒興醉酣還命管絃來墫前百事皆依舊㸃檢唯無薛秀才摭言鑑戒録有薛濤上連師犬離家魚離池鸚鵡離籠竹離叢珠離掌五詩謂薛書記不知孰事是趙昌言為樞密副使時陳儀與董儼俱為三司塩鐵副使胡旦知制誥院盡同年生俱少年為一時之俊梁顥又嘗與同幕五人者旦夕會飲於樞第茶觴壺矢未嘗虛日每乘醉夜方歸金吾吏遂夜候馬首聲喏儀以醉鞭指其吏曰金吾不惜夜玉漏莫相催都人諺曰陳三更董半夜玉壺清話張文潜嘗作齊安行詞甚不羙末云最愁三伏熱如甑北客十人九人病百年生死向中州千金莫作齊安游而潘邠老黄人也為作觧嘲云為邦雖陋勿雌黄我曽侍立蘇公旁見公顔色不憔悴不似賈誼來江湘他州雖粗勝吾州無此兩公相繼游直方詩話王令逢原廣陵人既見知於舒王聲譽赫然時附麗之徒望風伺候守牧冠葢日滿其門進譽獻謟初不及文字間也逢原厭之大署其門云紛紛閭巷士看我復何為來即令我煩去即我不思意有知耻者而干謁不衰東坡號思聡詩為水鏡集又作序贈之云聡能為水鏡以一含方則書與詩當益奇吾將觀焉以為聡得道深之候及聡來京師種種不進有也戯之云水鏡年來亦太昏張文潜作大旱詩云天邊趙盾益可畏水底武侯方醉眠時人以為幾於湯燖右軍也並同上晉劉道真遭亂於河側牽船見一老嫗搖櫓道真嘲之曰女子何不調機弄杼因甚旁河搖櫓答曰丈夫不跨馬揮鞭因甚旁河牽船又嘗與人草中同盤共飲見一嫗將兩小兒過並着青衣嘲之曰青羊引雙羔婦人曰兩猪共一槽道真無以對因話録唐宋國公瑀不觧射九月九日賜射瑀箭俱不着垜一無所獲歐陽詢詠之曰急風吹緩箭弱水馭強弓欲髙翻復下應西還又東十回俱着地兩度倂擎空借問誰為此只應是宋公蕭瑀封宋國公太平廣記東臯子王績字無功有杜康廟碑醉鄉記備言酒德廣陵人劉虛白擢進士第嗜酒有詩云知道醉鄉無戸稅任他荒却下丹田世之嗜酒者茍為仲尼之徒得為誥戒乎北夢𤨏言李度顯徳中舉進士攻詩有醉輕浮世事老重故鄉人之句人多誦之王朴為樞密以此一聫薦於申文炳知舉遂擢為第三人嘲曰主司只選一聫詩玉壺清話㓂萊公嘗與張洎同省一日作庭雀詩譏洎曰少年挾弹多狂逸不用金丸用䗶丸葢譏洎頃在江南重圍中而李煜草詔内於臈丸中追上江救兵之事也洎不免強顔附之後稍親暱同上龔彦和謫化州持不殺戒日夜禮佛對客蟣虱滿衣領不恤也鄒志完嘲曰衣領従教虱子縁夜深拜得蓆兒穿道鄉活計君知否飢即須飡困即眠冷齋夜話詩話總龜巻三十七欽定四庫全書詩話總龜巻三十八宋阮閱撰詼諧門上太宗賜錢思公已汴孝經詩令次韵和進晁文元迥首出四句云舍後信標名風篁自有聲温柔敦厚教仙果子難生思公即便對晁公今日湏了晁大笑諸公不曉今日孝經詩稽遲戯以此督之爾四句蓋次韵詩遲也祥符中日本國遣使入貢稱國之東有祥光現其國素傳中原天子聖明則此光現章聖詔本國建寺賜額曰神光朝辝日夷使乞令詞臣撰一寺記是時當制者雖中魁選然詞學不優贍居常止以張君房代之葢假其稽古才雅也既傳宣訖撰寺記時張尚為小官醉飲樊樓遣人遍京城尋之不見而夷人在閤門翹足以候文中人三促之紫㣲太窘後錢希白楊大年因玉堂暇日改閑忙令大年曰世上何人最號閒司諫拂衣歸華山葢种放得歸山時也希白曰世上何人最號忙紫㣲失却張君房時傳此事為雅笑湘山録唐制三班奉職月俸七百馹劵羊肉半觔祥符中有人題於馹舍曰三班奉職實堪悲卑賤孤寒即可知七百料錢洎甚使半觔羊肉幾時肥朝廷聞之謂如此責廉遂議増俸古今詩話陳亞少卿維陽人善詩什滑稽尤甚嘗與蔡君謨會於金山僧舍酒酣君謨題詩屛間曰陳亞有心纔是惡即索筆對曰蔡襄無口便成衰少時為杭州於潜令以利口謔浪人或厭之太守馬忠肅因其趨府戒之陳怛受教俄有通刺謁者稱太詞郎李過庭公罵曰何人家子弟亞率爾云李趨兒馬公徐悟之大笑唐宋遺史陳亞卿著藥名詩若風月前湖近前胡軒窗半夏凉半夏棊為臘寒呵子下呵子衣嫌春瘦縮紗裁縮砂及贈祈雨僧詩云無雨若還過半夏半夏和師㬠作葫蘆巴葫蘆巴之類最膾炙人口又曽知祥符縣親故多干託借車牛因作詩曰地名京界足親知荆芥往借尋常無歇時蝎但看車前牛領上車前子十家皮没五家皮五加皮嘗言藥名用於詩無不可而幹運曲折使各中理在人之智耳或曰延胡索可用乎曰可沉思久之吟曰布袍䄂裏懐漫刺到䖏遷延胡索人鰻鯉延胡索此可贈游謁措大聞者絶倒與章郇公同年将用之而為言者所沮作生查子獻之曰朝廷數擢賢葫藋旋占凌霄路凌霄花自是欎桃人桃仁險難無夷處兼荑也知没藥療孤寒没藥大幅紙連粘大腹皮甘草歸田賦甘草又别作閨情生查子三首其一曰相思意已深相思子薏苡白紙書難足白芷字字苦參商苦參故要檀郎讀狼毒分明寄得約當歸當歸逺志櫻桃熟逺志何事菊花時菊花猶未回鄉曲茴香其二曰小院雨餘凉禹餘糧石竹風生砌石竹羅扇儘從容蓯蓉半夏沙厨睡半夏起來閑坐北亭中北亭滴盡真珠泪真珠為念壻辛勤細辛去折蟾宫桂桂其三曰浪蕩去來來莨菪躑躅花頻換躑躅可惜石榴裙石榴蘭麝香消半麝香琵琶閑後理相思枇杷相思必撥朱絃斷蓽撥擬續斷朱絃續斷待這寃家看代赭又自為亞字謎曰若教有口便啞且要無心為惡中間全没肚腸外面任生稜角雖一時諧謔之詞以托亦有深意又嵗旦示知已云餘寒掃地盡衰老向人閑與人郊行云馬嘶曾到寺犬吠昨行村送歸化宰赴闕云吏辭如賀日民送似迎時懐舊隠云排聫花品曽非僣愛惜苔錢不是慳自成一家體青箱雜記魏仲先冦萊公游陜郊僧寺多届題後到見萊公詩巳用碧紗籠而仲先詩獨塵昏在壁時有從行官妓頗慧以紅衣袖拂之仲先徐曰若得時将紅袖拂也應勝着碧紗籠萊公大笑西都應天院去府十里每朔望留守帥府官朝拜未曉而住時行十里不交談有人作詩云正夢寐中行十里不言語處飲三盃有人送驢肉復云㕔前捉到湏依法盒内盛來定付厨春明退朝録李濤相國性滑稽為布衣時往來京洛間泥水闕有僧舍曰不動尊院上中有僧不出院十餘載濤每過常謁其院必省其僧未幾寺焚僧㪚濤再過之但有門扉而已因題詩曰走却坐禅客移將不動尊世間顛倒是八萬四千門談苑韓浦韓洎晉公滉之後咸有詞學浦善聲調洎能為古文洎嘗輕浦語人曰吾兄為文譬如繩樞草舍庇風雨而巳予之文是造五鳯樓手浦性滑稽竊聞其言因有親知遺蜀牋浦作詩與洎曰十樣蠻牋出益州寄來新自浣溪頭老兄得此全無用助爾添修五鳯樓同上内朝辰入庭内錯立至駕欲坐即御史䑓知班唱班欲依班立也王彦和汾與劉貢父攽同趨朝王戯劉曰内朝日日湏呼汝劉應聲曰寒食年年必上公王石甫博學耿介語言輕肆人或戲為心風熈寧中乞郡得湖州舒王以詩送之曰吳興太守羙如何栁惲詩才不足多遙想郡人迎下擔白蘋江上起滄波譏其風也石甫知其意即以吳興太守羙如何為破題作詩十首其一曰吳興太守羙如何太守從來惡祝鮀生若不為上柱國死時猶合作閻羅舒王聞之曰閻王見闕請便赴任方圭好為惡詩宋公庠知揚州日圭來謁醼於平山堂圭誦詩不已宋欲他辭已之顧野外牛牽木磨庠謂坐客胡詼曰青牛恃力狂挨朩詼應聲曰妖鳥啼春不避人宋公大笑圭悟其意飲㪚至客次欲奮拳撃詼衆捄而免並同上劉子儀三入玉堂望大用頗不懌作詩云蟠桃三竊成何味上盡鼇山迹轉孤稱疾不出朝士問疾劉云虗熱上攻石文定在坐云只銷一服清凉㪚謂兩府方得凉繖王君貺送牡丹與永叔答詩云最後花常冣後開葢君貺同時軰皆入兩府永叔以最後戲之也王得詩不喜對來价擲之永叔謂人曰好花不開也君貺聞之愈怒詩史李芸居於泗上一日納姬友人鍾公寄詩曰昨暮閒行泗水邊緑楊堤上覩雲軿知君買得千金笑只用何曾兩日錢詩史范希文以大理寺丞監西溪塩場西溪素多蚊蚋希文作詩曰飽去櫻桃重飢來栁絮輕但知求旦暮休更問前程馮瀛王性仁厚家有一池每得魚放池中其子監丞每竊釣之瀛王聞之不恱於是髙其墻垣鑰其門戸作詩書其門曰髙却垣墻鑰却門監丞従此罷􅂷綸池中魚鼈應相賀從此方知有主人呉善長郎中儀狀魁偉頗類富丞相文學之譽則無焉有輕薄子贈之詩曰文章却似呼延賛風貌還同富相公國初有武臣呼延賛好吟惡詩故云熈寧中章子厚察訪湖北因以兵收辰溪之南江諸蠻時有吳僧願成亦在軍中自稱察訪大師每出則乘大馬以撾劍擁従呵殿而行隨兵官李資入洞資為蠻人所殺成亦被縛既而放歸猶揚揚自得詩僧文瑩嘲之曰童頭浮屠浙東客傳呼避道長沙陌寳撾青葢官儀雄新賜袈裟椹猶黑察車後乘従驅挈庸夫無謀動蠻穴暗灘夜被猿猱擒縛入新溪哭殘月䍧牱畏佛不敢烹脫身腥窟存餘生放師回目不自愧反以意氣湘南行我聞幸有適伊川變戎預䜟麟經編暌車載􅄦吁可恠宜入熈寧志怪篇京師優人以雜細物數十種布於地使人暗記物色然後遣沐猴認之每沐猴得之優人即曰道著也馬留葢優人呼沐猴之名熈寧庚戌春市井之人見舉子往往亦以馬留目之其年狀元葉祖洽赴宴於池上有下第進士寄詩曰着甚來由去賞春也應有意惜芳辰馬蹄莫踏亂花碎留與愁人作醉茵細而繹之乃是着也馬留四字葢四句各取上一字錢君平性滑稽及第後有人以詩來钁錢君平以詩答之五貫九百五十俸省錢請未足甚用還債還負亦無餘買酒買肉何曽夢妻兒終日只愁飢婢僕過冬猶受凍更有不識事閑人獻詩獻啟覔甚甕張獻圖主簿潁人善嘲謔以老榜得班行寄書于家人曰汝作鸞孤我為奉職不忝矣又譏州縣官之貪污者云捧頭舊血添新血篋裏黄金壓白金古今詩話王丞相好嘲謔初執政對客悵然曰投老欲依僧再三言之客應之曰急則抱佛脚丞相善之復曰投老欲依僧是古人一句詩客曰急則抱佛脚亦是俗諺全句上去頭下去脚豈不是的對丞相大笑祕書省東即右威衛營荒蕪摧毁其大㕔逼校書院南對御史臺有人嘲之曰門縁御史塞㕔為校書侵宋中道有俊才而身短小人多戲之蘇子羙與中道年相懸然甚愛其才調道亦傾心作詩論交子羙長大魁偉與中道並立下視曰交不自此京師井市語也號中道為宋錐為其頴利而么麽云贈之詩曰譬如利錐末所到物巳破後中道通判洛州洛州本趙地有毛遂墓聖俞作詩云舉錐處囊事亦所以戲之也太宗時進士同年有數人名似姓者或有取以為詩云郭鄭鄭東東野絡馬張張夏夏侯璘熈寧中有崔度崔公度王詔王子詔皆的對也又有章君陳陳君章二人未有似者唐東方虬欲為西門豹作對亦當時好事者為此對耳給事中馬子山穆王八駿有山子馬王丞相云馬子山騎山子馬莫有對者相傳久之有姓錢人為衡水令罷歸或取以為對云錢衡水盗水衡錢錢聞之變色或者對云吾正欲作對耳非有實也古今詩話咸通中以舉子多車服侈異下令不許乘馬時塲中不下千人皆跨長耳或嘲之曰今年勅下盡騎驢短㡌長鞭滿九衢清瘦兒郎猶自可就中愁殺鄭昌圗鄭昌圖魁偉故有此句開元中宰相蘇味道張昌齡皆有詩名暇日相會互相嘲謔昌齡曰某詩所不及相公者為無銀花合葢蘇元夕詩有火樹銀花合之句也味道曰某詩所以不及相公者為無今同丁葢張贈張昌宗詩有昔日浮丘伯今同丁令威之句也遂相對撫掌而笑武后朝左司郎中張元一滑稽時西戎犯邊武后欲武氏立功因行爵賞命武懿宗統兵平之冦未入境懿宗􅅻逾邠畏懦而遁懿宗陋短元一嘲之曰長弓與短箭蜀馬臨髙蹁去賊七百里隈墻獨自戰忽然逄着賊騎猪向南遁太后聞之未曉曰懿宗無馬耶何故騎猪元一觧曰騎猪夾豕也天后大笑捴章二年興善寺火塑像焚盡道士李宗嘲之曰道善何曽善言興又不興如來燒亦盡惟有一羣僧文潞公嘗言潞中有一士人憂制中游處坐中有人嘲輙嘗自云有年光徳一王伸戀酒貪歌不厭貧三年得替歸朝去贏得髭鬚白似銀甚不覊檢也如此特好事人有善必優禮待之僧乾康金仙皆以能詩登門士儒問羽卿通尚書春秋鄧潜有詞學每接見則疑忘倦議者以此稱之零陵總記雪峰恱禪師與興化銑公友善既老迎送不已恱戒曰公不袖手山林尚忍垢乎銑一日送官墮馬損臂恱作偈戲云大悲菩薩有千手大丈夫兒誰不有興化和尚折一支猶有九百九十九南華恭長老同調大愚少叢林有書叙法乾悦作偈曰與師瓶錫寄江湖共憶當年在大愚堪笑堪悲無限事甜瓜生得苦葫蘆東坡宿曺溪讀傳燈錄燈花墮巻上燒一僧字以筆記於窗曰曺溪岑􅄫寞燈下讀傳燈不覺燈花落茶毘一個僧詩話總龜巻三十八欽定四庫全書詩話總龜巻三十九宋阮閱撰詼諧門下兵部李内相濤唐宗室子自河陽令一舉状登科小字社翁毎於班中多自名焉其坦率如此翰林月給内醖兵部甞因春社寄翰林一絶云社翁今日没心情為乏治聾酒一瓶惱亂玉堂将欲遍依稀巡到第三㕔顔師古觧霍去病穿城蹋鞠云以皮為支實以毛蹴蹈為戯也顔時鞠乃如此至後唐已不同歸氏子弟嘲皮日休曰八片尖斜砌作毬火灰撏了水中揉一包閑氣如常在惹踢招拳卒未休仁宗朝試山海天地之蔵賦長沙進士陳說同進士出身謁郷人胥偃内翰因舉其賦胥曰賦頗佳但其間貼故事少耳說歸作詩曰紫宸較藝集英聡作賦方知尚欠功事内少他些子鉄殿前嬴得一堆銅黄紬被下夫人煖青𤨏窓中學士空寄語交朋湏細認主司頭惱太冬烘盧延遜五舉方登第甞作詩云狐衝官道過犬刺客門開租庸張相毎誦之又曰餓猫臨鼠穴饞犬䑛魚砧成中令激賞之又曰栗爆燒氊破猫跳觸鼎翻王中懿愛之盧甞謂人曰平生投謁公卿不意得猫兒狗子力也梅聖俞與謝氏世姻師直小字錦衣奴聖俞作詩戯之曰古錦裁詩句班衣戯坐隅朩奴今正熟肯效陸郎無師直方十嵗讀詩而悟石曼卿登第有人訟科塲覆考落者數人曼卿在焉方興國寺期集符至追所賜勅牒餘人皆泣而起獨曼卿觧靴還使人露體戴幞頭笑語終席次日放黜者例受三班借職曼卿作詩曰無才且作三班借請俸争如録事參從此免稱郷貢進且湏走馬東西南並同上王梵志詩曰城外土饅頭餡草在城裏無人喫一箇莫嫌没滋味且為餡草當使誰食之為易其後两句云預先着酒澆圗教有滋味東坡詩話馮衮牧蘇州日多縱飲愽因大勝以所得均與座客吟云八尺䑓盤照面新千金一擲鬬精神合是賭時湏賭物不堪回首乞閑人雅言雜載李紳相鎮廣陵有少年甚踈簡來謁晤對問言曰尚書先寄元相公詩云悶勸迃辛酒閑吟短李詩且曰辛大性迃嗜酒邱度李二十短而能詩紳少年即邱度子也謂李公曰小李毎憶白共二丈詩曰悶勸平情酒閑吟世上詩李曰辛大有此狂兒吾不存舊矣雲溪友議崔涯張祜為一時狂友好嘲謔甞戯贈貧妓曰雖得蘇方朩由貪玳瑁皮懐胎十箇月生下崑崙兒又曰布袍披襖火燒氊紙補箜篌麻接絃更有一雙皮屐子紇梯紇榻出門前又嘲李端端云黄昏不語不知行鼻似烟牕耳似鐺猶把象牙梳揷鬂崑崙山上月初生端端得此詩而困出遇二子於道再拜曰伏望哀憐乃重為一絶云不見驊騮偹綉鞍善和坊裏取端端揚州近日渾成著一朶能行白牡丹前嘲乃觧又甞為雜嘲之曰二年不到宋家東阿母深居僻巷中含淚向人羞不語琵琶絃㫁倚屏風日暮後來香閣中百年心事一朝同寒雞鼓翼紗窓外已覺恩情逐曉風又悼人詩云赤板橋西小竹籬揷花還似去年時淡黄衫子都無了腸㫁丁香畫雀兒曺州酒紏雲娘痩瘠而善歌李宣古嘲之曰何事實堪悲雲娘只首竒痩拳抛令急長觜出歌遲只怕肩侵鬂唯愁骨透皮不湏當户立頭上有鍾馗復州陵岩夢桂州筵上贈胡子女詩云自道風流不可扳那堪蹙額更頽顔眼睛湥似湘江水鼻孔髙於華岳山舞態豈能安掌上歌聲應不遶梁間孟陽死後今十載由有家人覔往還並同上楊叔寳強人也甞為荆門幕時虎傷人楊就虎穴磨巨崖大刻誡虎文如韓文公遣鱷魚文其略曰嗚呼爾彪出境潜㳺改官於欝州以書托知軍趙定打虎文數本書言嶺俗庸獷欲以化之仍有詩曰日将先聖詩書教暫作文翁守欎林守遣人打碑次日本耆申磨崖樹爾大虫咬殺打碑匠二人荆門止以耆状報叔寶湘山録薛逢晚年厄於宦途䇿贏赴朝值新進士綴行而出時進士團所由數十人見逢行李蕭然前道曰迴避新郎君逢冁然即遣价語之曰報道莫貧相阿婆三五少年時大㑹東塗西抹來摭言許孟容進士及第學究登科時人嘲之曰錦襖子上着蓑衣張處士憶柘枝詩曰鴛鴦鈿帶抛何處孔雀羅衫属阿誰樂天呼為問頭詩祜矛盾之曰鄙薄問頭之誚所不敢辭然明公亦有目連變長恨歌云上窮碧落下黄泉两處茫茫都不見豈不是目連變耶並同上王中令既平蜀捕餘冦與伍隊相逺飢甚乃入一村寺中僧醉甚箕踞公怒欲斬之僧應對不懾公竒而釋之間求蔬食云有肉無蔬公益竒之餽以蒸豚頭食之甚美公喜問僧正能飲酒食肉邪為有它伎邪僧自言能詩公令賦蒸豚詩操筆立成詩云觜長毛短淺含臕乆向山中食藥苖蒸處已将蕉葉裹熟時更用杏漿澆紅鮮推稱金盤貯軟熱真堪玉筯挑若把羶根來代並羶根只合喫藤條公因大喜與紫衣乃蜀中詩僧百斛明珠韓玉汝治秦州尚嚴去宫人語曰寧逢暴虎莫逢韓玉汝孫臨滑稽尤善對或問曰莫逢韓玉汝當以何對臨應聲曰可怕李金吾天下以為口實同前石介作三豪詩略云曼卿豪於詩永叔豪於文杜黙師雄豪於歌永叔亦謂黙云贈之三豪而我濫一名黙之歌少見於世初不知之後聞其篇云學講波中老龍夫子門前大虫皆此等語甚矣介之無識也永叔不為嘲誚之者此公惡争名且為介諱也吾觀杜黙豪氣正是京東學究飲私酒瘴死牛肉醉飽後而發之者也作詩之狂至於盧仝馬異極矣若更求竒便作杜黙也㓜時里人程建用楊咨家弟子由㑹草舎天雨聮句六言程曰庭松偃盖如醉楊曰夏雨新凉似秋軾云有客髙吟擁鼻子由云無人共吃饅頭皆絶倒已四十餘年同上聶崇義建隆初為學官河洛之師儒也趙韓王當拜云郭忠恕使酒詠其姓玩之曰近貴全為聵扳龍即是聾雖然三箇耳其奈不成聡崇義應聲荅曰勿笑有三耳全勝畜二心忠恕大慚雲溪友議趙成伯家宴造之無由輙欲效顰而酒已盡入夜不欲煩擾戯作小詩求數酌而已詩曰道士令嚴難繼和僧伽帽小却空廻隔籬不欲鄰公飲抱甕惟防吏部來趙成伯家有姝麗僕忝郷人不肯開樽徒吟春雪謹依元韻以當一笑云繡簾朱户未曽開誰見楊花落鏡䑓試問髙吟三十韻何如低唱两三杯莫嫌衰髩聊相映湏得纎腰妙隔回知道文君隔青𤨏梁園賦客敢言才俗云檢騐雪壓秀才衣帶上有雪詩三十韻又世傳陶榖學士買得黨太尉家故妓過定陶取雪水烹團茶謂妓曰黨太尉應不識此妓曰彼粗人安有此景但能以銷金煖帳下淺斟低唱吃羊羔兒酒爾榖愧其言荅來句罪過之義取質而已玉局遺文僕少好種松過泗上與杜子師出山中子師求予種松法欲之都梁山中戯作二絶云露宿泥行草棘中千年春雨養髯龍如今尺五城南杜欲向東坡學種松君方掃雪收松子我已開榛得茯苓為問何如揷楊栁明年飛絮落浮萍同上元豐中晁無咎詩極有聲無已以詩戯之曰聞道新文能入様相州紅纈鄂州花盖是時方尚相州纈鄂州花也晁堯民子損之云王直方詩詁劉諷參軍宿山馹月朙有女子數自屋後來命酌庭中歌曰明月清風良霄㑹同星河易翻歡娱不終緑樽翠杓為君斟酌今夕不飲何時歡樂此廣記所載詩也山谷曰當是鬼中曹子建所作東坡亦以為然又有一篇云玉户金缸願陪君王邯郸宫中金石絲簧鄭女衛姬左右成行紈綺繽紛翠眉紅粧王歡轉眄為王歌舞願得君歡長無灾苦蘇公以為邯郸宫中金石絲簧此两句不唯人少能作而知之者亦極難得耳皆醉中為余書此張文潜見坡谷論說鬼神忽曰舊時作人語如今人作鬼語二公大笑髙愈主簿云東坡云世間事勿笑為易惟讀王祈大夫詩不笑為難祈甞謂東坡云有竹詩两句最為得意曰葉埀千口劔幹聳萬條鎗坡云好則極好則是十條竹竿一箇葉兒也以道云初見東坡詞云素面常嫌粉涴洗粧不退唇紅便知此老湏過海余問何耶以道曰只為古今人不曽道到此湏罰教逺去吴賀廸吉者撫州人一日載酒來余家并召劉夷季洪龜父饒次守軰酒酣頗紛紛龜父先歸作一絶題于余書室曰再為城南逰百花已狂飛更堪逢惡客騎馬風中歸次守既醒作十七字和云當時為舉首滿意望龍飛而今已報罷且歸盖龜父是年自洪州首薦自今上初即位無廷試也山谷為校書在館中時多食東華門椀脱蒸餅後徙黔南王定國寄之以詩云北海未常樽有酒馮驩何止食無魚黔州椀脱無蒸餅自合官稱削校書張文潜在一時中人物最為魁偉故陳無已有詩云張疾魁然腹如皷雷為飢聲酒為雨文云要痩君則肥山谷云六月火雲蒸肉山又云雖肥如瓠壺而文潜卧病秦少游又和其詩云平時帶十圍頗復减臂環皆戯語也劉季孫景文公頃年王安石使對念兹在兹釋兹在兹名言兹在兹季孫對之以掲諦掲諦波羅掲諦波羅僧掲諦安石大笑並同上往嵗江行阻風㳂岸野步望雲嶺而去忽有蘭若甚多僧院覩客來皆扄門不納獨有一院大敞其戸見一僧翹足而眠以手書空顧客不介意切思曰書空有換鵞之能翹足類坦腹之事此必竒僧直入造之僧雖强起全不樂客客不得已而問先逹有詩曰書空翹足睡路險側身行和尚其庶幾乎僧曰貧道不知許事適􅀞房門振題様客不辭而去桂苑聚談梁周翰在太宗朝為舘職真宗即位乃除知制誥栁開贈詩曰九重城闕新天子萬巻詩書老舎人梁與朱昂楊大年同在禁掖大年年未滿三十而两公皆老數見慢侮不能堪即好謂大年曰公毋侮我此老亦将留與公耳朱聞之背面揺手欲梁莫與之言大年之沒不及五十也閑居詩話晋郝隆為蠻府參軍三月三日作詩曰娵隅躍清池桓温問何物荅曰蠻名魚為娵隅桓曰何為作蠻語隆曰千里投公始得一蠻府參軍􅃚得不作蠻語世說盧家有子弟年暮而猶為校書郎晚娶崔氏女崔有詞翰結䄜之後微有嫌色盧因請詩以述懷為戯崔立成曰不怨檀郎年紀大不怨檀郎官職卑自恨妾身生較晚不見盧郎年少時南部新書李建勲鎮臨川日九江帥周宗一書求曰近器用儀注或闕欲輟臨川者李乘醉批一絶句云偶罷阿衡來典郡固無閑物可應官憑官為報周公道莫作循州刺史看南唐近事李巽字仲權累舉不第郷人侮曰李秀才應舉空去空回不知甚時席㡌得離身巽亦不校登第後乃遺郷人詩曰當年踪跡困􅅺塵不意乘時亦化鱗為報郷閭親戚道如今席㡌已離身盖因國初猶襲唐士子皆曵袍重戴出則席㡌自隨青箱雜記梅聖俞河豚詩曰春洲生荻芽春岸飛楊花河豚於此時貴不數魚蝦劉厚甫戯曰鄭都官有鷓鴣詩謂之鄭鷓鴣聖俞有河豚詩當呼為梅河豚也古今詩話雲臺集有鄭谷鷓鴣全篇云暖戯烟蕪錦翼齊品流應得近山雞雨昏青草湖邉過花落黄陵廟裏啼㳺子每聞征袖濕佳人纔唱翠眉低相呼相喚湘江濶苦竹叢深春日西同上鄭毅夫榜明州人周師厚以名極低只壓得陳傳一名自賦詩曰舉眼不堪觀鄭獬囬頭由喜得陳傳朱定國詩話唐僧法軌形容短小開講於寺與李榮議論往來數畨僧舊作一詩詠李榮於髙坐上誦之云姓李應湏禮名榮又不榮李應聲曰身長三尺半頭毛猶禾生四坐服其辯㨗啓顔録經生多不省文章甞一邑有两人同官其一或舉杜荀鶴詩稱賛也應無處避征徭之句其一難之曰此詩久矣野鷹何甞有征徭乎舉詩者觧曰古人有言豈有失也必是當年科取翎毛耳貢父詩話潁州張龍圖甞見州牒押字多團下拽一畫有人云押字如有蒸餅様張應聲曰為官恰似麫糊團有同人自言近年云鬚鬂恰如􅍡馬色張曰文章依舊草驢鳴雍洛靈異記包賀多為鄙俗之句至於枯竹笋抽青橛子石榴樹掛小瓶兒又云霧是山巾子舡為水靸鞋又云掉揺舡掠髩風動水搥胷雖好事者托以成之亦空穴來風之意王伸知永州為人耽於酒色其宴樂往往自早至暮為句云鴛鴦未老頭先白嘲人素患六損憂制者應聲曰螃蠏才生足便多時人以為名對崔櫓酒後於䖍州陸郎中坐上甚狂以詩謝之曰醉時顛蹶醒時羞麯蘖催人不自由尀耐一雙窮相眼不堪花卉在前頭閩人黄通累舉不第後該恩厯官數任年六十猶欲鎻㕔或嘲之曰剩員呈武藝老妓舞柘枝李義甫甞作詩曰鏤月為歌扇裁雲作舞衣自憐廻雪態好取洛川歸有棗強尉張懐慶好竊人文章有詩曰生情􅍢月為歌扇出性裁雲作舞衣照鑑自憐廻雪態來時好􅂑洛川歸時人謂之曰活剥張昌齡生吞郭正一宋莒公判館事督諸館職必至而刀景純數日不來莒公使人邀之加之誚讓王原叔改杜少陵贈鄭廣文詩云景純過官舎走馬不曽下驀地稱朝歸便遭官長罵栁州栁太守種栁栁江邉栁館依然在千株栁拂天後南中丞至黔南人嘲之曰黔南南太守南郡在雲南閑向南亭畔南風變俗談並同上詩話總龜巻三十九欽定四庫全書詩話總龜巻四十宋阮閲撰樂府門皷吹部中有拱辰管即古人之义手管也大宗賜今名邉軍捷廻則連隊抗聲凱旋乃古之遺音其詞往往皆市井鄙俚語沈存中在鄜延時製十數曲今士卒歌之云先取西山十二州别分子将到衙頭始看秦塞低如馬漸見黄河直北流天威巻地過黄河萬里𦍑人盡撲歌莫堰横山倒流水從教西去作恩波馬尾胡琴隨漢車曲聲猶是怨單于彤弓莫射雲中鴈歸鴈如今不寄書旗隊渾如錦綉堆銀裝背傀打毬囬先教净掃安西路待向河源飲馬來靈武西凉不用圍畨家総待納王師城中半是山西種猶有當時乾吃兒古今詩話乾祐中國樂有米嘉榮何戡近有陳不謙不謙之子意奴三十年中絶不聞善唱盛以拍弹行於世拍弹起於李可及懿宗朝有恩澤曲子别趙十哭趙十之名劉夢得與米嘉榮詩云三朝供奉米嘉榮能變新聲作舊聲如今後軰欺前軰好染髭鬚學後生又自貶所歸京聞何戡歌云二十年來别帝京重聞天樂不勝情舊人唯有何戡在更與勤勤唱渭城盧氏雜記搢紳脞說載盧氏雜記曰歌曲之妙其來久矣國樂有米嘉榮何戡田順郎媍人有永新婦御史娘栁青娘張紅娘皆一時之妙也近有陳不謙子意奴三十年來絶不聞善歌者盛扵拍弹行於世拍弹起於劉可及懿宗恩澤最厚有别趙十哭趙十之名又與田順郎詩曰清歌不是世間音玉殿常聞稱帝心惟有順郎皆學得玉聲尤出九重深與御史娘詩曰天下能歌御史娘花前月底奉君王九重深處無人見獨把新聲傳順郎白公聽田順歌曰戞玉敲氷聲未停嫌雲不過入青冥安得黄金滿衫袖一時抛與㫁膓聲咸通中丞相姑臧公拜端揆日自梁移鎮淮海郡寡勝逰之地且風亭月觀既以荒凉於戯馬䑓連玉鈎道開剏池沼建亭臺既畢號曰賞心浙右小校薛湯陶監押度支運米入城公喜其姓名試詢之果是舊人及問往日蘆管之事因朱崖陸暢元白所撰歌篇一軸公益喜之以蘆管於兹亭奏之其管絶微毎一篳篥管中常容三管聲聲如天際自然來大佳之亦贈一篇略云虚心纎質鴈啣餘鳳吹龍吟定不如贈與甚豐授其子牢湓倅明皇樂工奔迫江潭間於湘中採訪使筵上唱云紅豆生南國秋來發幾枝贈公多採擷此物􅆟相思又云清風明月苦相思蕩子從容十載餘征人去日殷勤嘱歸鴈來時􅂾寄書皆摩詰所作也至今梨園歌焉坐中皆惨然時明皇思幸蜀也雲溪友議霓裳羽衣曲劉禹錫詩云三郷陌上望仙山歸作霓裳羽衣曲王建詩曰聽風聽水作霓裳樂天詩注云開元中西凉府節度使楊欽逺造鄭遇津陽門詩注云葉法善常引明皇入月宫聞仙樂及歸但記其半遂以笛寫之㑹欽逺進波羅門曲與聲調相符遂以月中所傳為散序欽逺所進為腔號霓裳羽衣曲矣江南大理卿成文幼精為詞曲甞作謁金門云風乍起吹皺一池春水李璟聞之召而謂之曰卿職在典型一池春水干卿何事文㓜頓首江南馮延已善為歌詞晏元獻善公所為歌詞不减馮也樂府朩蘭花句都是七言晏詩云重頭歌咏响􅋛琤入破舞腰紅亂旋重頭入破皆絃管家語也張子野郎中善歌詞常作天仙子云雲破月來花弄影士大夫皆稱之子野初謁歐公迎之坐語曰好雲破月來花弄影恨相見之晚也有謂張子野曰人皆謂公為張三中即心中事眼中淚意中人也何不目之為張三影客不喻公曰雲破月來花弄影嬌柔懶起簾押捲花影栁徑無人墜風絮無影此平生得意句也林和靖工於詩文善為詞甞作㸃絳唇云金谷年年亂生春色誰為主餘花落處滿地和烟雨又是離歌一闋長亭暮王孫去萋萋無數南北東西路乃草詞爾謂終篇無草字鼎州滄水馹有菩薩蠻云平林漠漠烟如織寒山一帶傷心碧暝色入髙楼有人楼上愁玉梯空佇立宿鳥歸飛急何處是歸程長亭更短亭曽子宣家有古風集此詞乃太白作也古今詩話古人飲酒皆以舞相属至於獻夀樽者往往亦舞長沙王少舉袖云國小不足廻旋唐太宗自起舞属羣臣古人淳質舞以逹歡忻不必臻妙合度故人人可為之張燕公曰醉後歡更好全勝未醉時動容皆是舞出語総成詩李白詩曰要湏廻舞袖拂盡五松山醉後凉風起吹入玉袖寒今時舞者皆曲肖益盡其妙然非有詩士人不為也貢父詩話水調第五遍五言調聲最愁苦故樂天詩曰五言一遍最辛勤調少情多似有因不㑹當時翻曲意此時腸㫁為何人舊說水調河傳隋煬帝将幸江都官時所製曲成奏之聲韻悲切煬帝喜之樂工王令言聞而正之謂其弟子曰不返矣後竟如其說或詰其何知曰水調河傳但有去聲縉紳脞說何滿子開元中犯罪繫獄中撰此曲白樂天云滄州人姓何名滿子鞠獄都愍而為奏之明皇弗許竟坐白樂天曰世稱何滿是人名臨就罪時曲始成一曲回音并八叠從頭捴是㫁腸聲脞說商玲瓏餘杭之歌者白公守郡日與歌曰罷胡琹掩瑶瑟玲瓏再拜當歌出莫為使君不觧歌聽唱黄雞與白日黄雞催曉丑前鳴白日催人酉後没腰間紅綬繫未穏照裏朱顔看已失玲瓏玲瓏奈老何使君歌了汝更歌元微之在越州聞之厚幣來邀樂天即時遣去到越州住月餘使盡歌所唱之曲即賞之後遣之歸作詩送行兼寄樂天曰休遣玲瓏唱我詞我詞都是寄君詩却向江邉整廻棹月落潮平是去時秦少游在處州夢中作長短句曰山路雨添花花動一山春色行到小溪深處有黄鸝千百飛雲當面化龍蛇夭矯轉空碧醉卧古藤隂下杳不知南北後南遷北歸逗留藤州終於光華亭時方醉起以玉盂汲泉欲飲笑視而化冷齋夜話華亭舩子和尚偈曰千尺絲綸直下垂一波纔動萬波隨夜静水寒魚不食滿船空載月明歸山谷歌成長短句曰一波纔動萬波隨蓑笠一鈎絲金鱗正在深處千尺也湏垂吞又吐信還疑上鈎遲水寒江静滿目青山載月歸東坡携妓謁大通禅師大通愠色坡作長短句曰師唱誰家曲宗風有阿誰借君拍板與門搥我也逢塲作戯莫相疑溪女方偷眼山僧已皺眉莫嫌彌勒下生遲不見老婆三五少年時僧仲殊和曰觧舞清平曲而今說向誰紅爐片雪上鉗搥打就金毛師子也堪疑已信身如夢何湏眼似眉蟠挑已是結花遲不向風前一笑待何時余登秋屏閣浩然有歸老之興作長短句寄意曰城裏乆偷閑塵涴雲山此生已是再眠蠶隔岸有山歸去好萬壑千岩霜曉更凭攔减盡晴嵐微雲生處是茅庵試問此行誰作伴彌勒同龕東坡與少游飲别維揚作虞羙人詞曰波聲拍枕長淮曉隙月窺人小無情汴水自東流只載一舩離恨向西州竹隂花圃曽同醉酒味多於淚誰教風鑒在塵埃醖造一塲煩惱送人來世傳賀方回作也余與淵材牛渚間見長短句曰牛渚天門險限南北七英豪占青烟霧歛與閑人登覽待月上潮平波灔灔寒管孤吟新繫䌫風滿檻厯厯數西州更㸃淵材恨不得腔乃撰其譜盖賀方回作也並冷齋夜話詩話總龜巻四十欽定四庫全書詩話總龜巻四十一宋阮閱撰送別門劉綜學士出鎮并門两制舘閣皆以詩餞其行因進呈章聖深究詩雅時方競尚西昆體裂彫篆親以御筆選其平淡者得八聮句云夙駕都門曉凉風苑樹秋􅄯逈秋聲和暮角膏雨遂行軒李維置酒軍中樂聞笳塞上情錢惟演關榆漸落邉鴻度勸到劉郎酒十分楊億寒垣古朩含秋色祖帳行塵起夕陽朱巽汾水冷光揺畫㦸䝉山秋色鎻層樓孫僅河朔雪深思愛月并門春煖詠甘棠王昭永極目關河髙倚漢順風鵰鶚逺凌秋劉筠章聖謂綜曰并門唐時皆将相出領凢之官遣從事以題詠作寵其行多刻諸道宫佛寺纂集編聚乆不聞有是作也後綜冩為御選句圗立於晋祠古今詩話王化基詩送梁助曰文章換桂一枝秀清白傳家两弟貧人多誦之談苑天祐中毗陵有慎氏本儒家女三史嚴灌夫娶之數年無子因拾其過而出焉慎氏慨然登舟留詩一章為別曰當時心事已相關雨散雲飛一餉間便挂孤㠶從此去不堪重過望夫山灌夫覽而愧乃留之唐宋遺史唐如意中有女子七嵗能詩則天命賦之皆應聲而就其兄别之而去則天令作詩送兄曰别路人初起離亭葉正飛所嗟人異鴈不作一行歸丞相劉沅與郷人尹鑑少同塲屋丞相既大拜尹方以恩榜得官公以詩送還曰少年相欵老相逢郷舉雖同遇不同我已位登三事後公方名列五班中榮登莫計名髙下宦逹湏由善始終若到郷關人見問為言歸思滿秋風並同上内侍裴愈字益之作詩送魯秀才南逰詩云東吴山水家家月西楚江聲浦浦風又聞蝉云楊栁影踈秋霽雨梧桐葉墜夕陽天唐子方以言事謫冝春監酒待制李師中作詩贈别曰孤忠自許衆不與獨立敢言人所難去國一身輕似葉髙名千古重於山並㳺英俊顔何厚已死奸䛕骨尚寒天意若為宗社計肯教夫子不生還倦逰錄徐鉉仕宦海州蒯亮為録事參軍多與往還未幾亮受代徐餞之詩曰昔年聞有蒯先生二十年來道不行抵掌曽談天下事折腰尤忤俗人情老還上國風光薄貧裏歸装結束輕遷客臨流重惆悵晚風黄葉滿孤城詩史武元衡罷相出鎮西蜀栁公綽與裴度俱為判官公綽先度入為吏部郎中度有詩餞别云两人同日事征西今日公先捧紫泥景祐末元昊叛夏鄭公出鎮長安梅昌言送詩云亞夫金皷從天落韓信旌旗背水陳是時士大夫詩甚多鄭公獨刻昌言詩于石臨川楊智堅嗜學居貧妻厭其饘藿不足求離智堅以詩送之曰平生業在負琹詩頭上而今有二絲漁父尚知溪谷暗山妻不信出身遲荆釵任意撩新鬂鸞鏡從今學畫眉今日便同行路客相逢正是下山時妻持詣州顔魯公為刺史杖其妻而令嫁自後莫有棄其夫者雲溪友議崔涯别其妻詩曰隴上流泉隴下分斷腸嗚咽不堪聞姮娥一入宫中去巫峽千秋空白雲申國長公主為尼掖庭隨出者二十餘人詔两禁送至寺賜齋傳㫖令各賦詩惟陳文僖公彭年詩尚有記者云盡出花鈿散寶津雲鬟齊剪向殘春因驚風燭難留世遂作蓮池不染身貝葉乍翻疑軸錦梵音初學誤梁塵從兹艶質成空後湘浦都無觧珮人都下好事者以鷓鴣天歌之湘山錄朱昂字舉之敭厯清貴二十年晚為工部侍郎懇求歸荆南踰年方允時方劇暑恩㫖曲留許秋凉始行吴淑贈行詩云漢殿夜凉初閣筆渚宫秋晚得懸車錫宴玉津園中傳㫖令賦詩為送李維承㫖云清朝納禄尤强健白首還家正太平陳文惠云部吏百衘通爵里從兵千騎過荆門弟恊亦同時隠皆享眉夀謂之渚宫二踈並古今詩話武公幹常事蒯希逸十餘嵗異常勤幹洎希逸擢第幹辭歸以親在養父堅留不住以詩送之其略云山險不曽離馬後酒醒長見在床前摭言張乖崖在蜀州有録事㕘軍老病廢事公曰胡不歸明日㕘軍求去且以詩留别其略云秋光都似宦情薄山色不如歸興濃公驚曰同僚有詩人而吾不知留而薦之元祐中老人守潁有路都曹者以小疾求致仕老人誦此詩以留之不可乃採前人之意作詩送之曰淮光釀山色先作歸意濃恨無乖崖公一洗芥葉胷百斛明珠張不疑帥鼎文寶往謁後帥辰又謁之既别慨然以二詩贈行曰憶昔荆門屢過從當時心已意冥鴻渚公禅伯唐齊已淮甸詩豪宋惠崇老格踈閑松倚潤清談蕭灑坐生風史君不見髙僧事莫把名㕘伎術中又云碧嶂孤雲苒苒歸觧携情緒異甞時餘生嵗月能多少此别應難問後期玉壺清話狄煥送人逰卲云春江正渺渺送别两依依烟裏棹将逺渡頭人未歸漁家侵叠浪島樹挂殘暉况入湖湘路􅃚堪花亂飛雅言系述元豐三年蘇子由謫官筠州張安道口占一絶送之云因嗟萍梗才名客自歎匏𤓰老病身一榻從兹還倚壁不知重掃是何人已而涕下東坡云安道平生未能出涕向人王崇字極之與先君同在熈河先君自熈河入京相别於中塗送先君云渭城楊栁已青青強往行人聽渭城不問使車歸路逺且從墫酒滿杯傾相逢洮塞休兵後此去秦州照眼明若立螭頭借前箸且教充國事春耕先君誦於吴沖卿丞相緣此知名於朝廷洪駒父有詩送余赴官河内末云眼中人物東西盡肺病京華故倦㳺潘邠老毎誦而喜之李希聲亦有詩送余云散盡平生眼中客煖風晴日閉門居可以相上下也是時紹聖改元}
