  - {type: variant, offset: 3741, length: 0, content: '', WYG: 欽定四庫全書詩話總龜後集巻十一宋阮閲撰評論門翰苑作春帖子徃徃秀麗可喜如蘇子容云璇霄一夕斗杓東㶑灔晨曦照九重和氣薫風摩盖壤競消金甲事春農鄧温伯云晨曦㶑灔上簾櫳金屋熈熈歌吹中桃臉似知官宴早百花頭上放輕紅蔣頴叔云昧旦求衣向曉雞蓬萊仗下日將西花添漏鼔三聲逺栁映春旗一色齊梁君貺詩云東方和氣斗回杓龍角中星轉紫霄聖主問安天未曉求衣親䕶玊宸朝皆佳作也余觀定詣夫新春詞四首其一云春色應隨歩輦還珠旒玉几照龍顔紫雲殿下朝元罷便領東風到世間其二云春風細拂綠波長初過層城渡建章草色未迎雕輦翠栁梢先學赭衣黄其三云晴暉散入鳳凰樓一桁珠簾不上鈎漢殿闘簮雙彩燕併和春色上釵頭其四云小池春破玉玲瓏聲觸簾鈎漸好風閒繞䦨干掐花樹春痕已着半梢紅觀此四詩與帖子格調何異豈久於翰苑而筆端自然習熟耶丹陽集張籍韓愈髙弟也愈嘗作此日足可惜贈之八百餘言又作喜侯喜至之篇贈之二百餘言又有贈張籍一篇二百言皆不稱其能詩獨有調張籍一篇大尊李杜而末章有顧語地上友經營無太忙之句病中贈張籍一篇有半塗喜開鑿派别失大江吾欲盈其氣不令見麾幢之句醉贈張徽有張籍學古淡軒昻避雞羣之句則籍有意於慕大而實無可取者也及取其集而讀之如送越客詩云春雲剡溪口殘月鏡湖西逢故人詩云海上見花發瘴中聞鳥飛送海客詩云入國自獻寳逢人多贈珠紫掖發章句青闈更詠歌如此之類皆駢句也至語言拙惡如寺貧無施利僧老足慈悲收拾新琴譜封題舊藥方多申請假牒秖送賀官書此尤可笑至於樂府則稍超詣姚秘監嘗稱之曰妙絶江南曲凄凉怨女詩白太傅嘗稱之曰尤攻樂府詞舉代少其倫由是論之則人士所稱者非以詩也應制詩非他詩比自是一家句法大抵不出於典實富艷爾夏英公和上元觀燈詩云魚龍曼衍六街呈金鎻通宵啟玉扄冉冉逰塵生輦道遲遲春箭入歌聲寳坊月皎龍燈淡紫舘風㣲鶴焰平宴罷南端天欲曉回瞻河漢尚盈盈王岐公詩云雪消華月滿仙臺萬燭當樓寳扇開雙鳳雲中扶輦下六鰲海上駕山來鎬京春酒沾周宴汾水秋風陋漢才一曲昇平人盡樂君王又進紫霞杯二公雖不同時而二詩如岀一人之手盖格調當如是也丁晉公賞花釣魚詩云鶯驚鳳輦穿花去魚畏龍顔上釣遲胡文恭云春煖仙蓂初靃靡日斜芝盖尚徘徊鄭毅夫云水光翠繞九重殿花氣濃薫萬夀杯皆典實富艷有餘若作清癯平淡之語終不近爾顔延之謝靈運各被㫖擬北上篇延之受詔即成靈運久而方就梁元帝云詩多而能者沈約少而能者謝眺雖有能速多寡之不同不害其俱工也咸平景徳中錢惟演劉筠首變詩格而楊文公與之鼎立綽􅃅江東三虎詩格與錢劉亦絶相類謂之西崑體大率效李義山之為豐富藻麗不作枯瘠語故楊文公在至道中得義山詩百餘篇至於愛慕而不能釋手公嘗論義山詩以謂包藴宻緻演繹平暢味無窮而炙愈出鑚彌堅而酌不竭使學者少窺其一斑若滌腸而浣骨是知文公之詩盖得於義山者為多矣又嘗以錢惟演詩二十七聨如雪意未成雲着地秋聲不斷鴈連天之類劉筠詩四十八聨如溪牋未破氷生硯爐酒新燒雪滿天之類皆表而岀之詩之有思卒然遇之而莫遏有物敗之則失之矣故昔人言覃思垂思抒思之類皆欲其思之來而所謂亂思蕩思者言敗之者易也鄭綮詩思在㶚橋風雪中驢子上唐求詩所㳺歴不出二百里則所謂思者豈尋常咫尺之間所能發哉前輩論詩思多生於杳㝠寂寞之境而志意所如徃徃游於埃􅅽之外茍能如是於詩亦庶㡬矣小說載謝無逸問潘大臨云近日曽作詩否潘云秋來日日是詩思昨日投筆得滿城風雨近重陽之句忽催租人至令人意敗輙以此一句奉寄亦可見思難而敗易也米元章賦詩絶倫而人罕稱之者以書名掩之也如不及陪東坡徃金山作水陸詩云久隂障奪佳山川長瀾四隘魚龍淵衆㸔李郭渡浮玉晴風掃出清明天頗聞妙力開大施足病不列諸方仙想應蒼壁有垂露照水百怪愁寒烟栖雲閣云雲出救世旱澤浹雲尋歸入石了不見豐功已如遺龍騫薦復起抱石明幽姿雲乎無定所隠者何當栖如此二詩殆出翰墨畦逕之表盖自邁徃凌雲之氣流出非尋䂓索矩者之可到也韓退之調張籍詩曰刺手㧞鯨牙舉瓢酌天漿魏道輔謂髙至酌天漿幽至於㧞鯨牙其用思深逺如此彼獨未讀送無本詩爾其曰吾嘗示之難勇徃無不敢蛟龍弄牙角造次欲手攬衆鬼囚大幽下覷襲元窞言手攬蛟龍之角下覷衆鬼之窞皆難事而無本勇徃無不敢盖作文以氣為主也則調張籍之句無乃亦是意乎余襄公靖嘗在契丹作胡語詩云夜筵没邏臣拜洗両朝厥荷情幹勒微臣雅魯祝君統聖夀鐡擺俱可忒没邏言後盛拜洗言受賜厥荷言通好幹勒言厚重鐡擺言嵩髙也沈存中筆談載刁約使契丹戯為詩云押燕移離畢㸔房賀䟦支踐行三匹裂宻賜十貔狸移離畢如中國執政官賀䟦攴執衣防閣人匹裂小朩罌貔狸其形如鼠而大狄人以為珍饌二詩可作對故表而出之孟郊詩云食薺腸亦苦强歌聲無歡出門即有碍誰謂天地寬許渾詩云萬里碧波魚戀釣九重青漢鶴愁籠皆是窮蹙之語白樂天詩云無事日月長不覊天地闊與二子殆霄壤矣作詩貴雕琢又畏有斧鑿痕貴破的又畏粘皮骨此所以為難李商隠栁詩云動春何限葉撼曉㡬多枝恨其有斧鑿痕也石曼卿梅詩云認桃無綠葉辯杏有青枝恨其粘皮骨也能脫此二病始可以言詩矣劉夢得稱白樂天詩云郢人斤斵無痕迹仙人衣裳棄刀尺世人方内欲相從行盡四維無處覔若能如是雖終日斵而鼻不傷終日射而鵠必中終日行於䂓矩之中而其迹未嘗滯也山谷嘗與楊明叔論詩謂以俗為雅以故為新百戰百勝如孫呉之兵棘端可以破鏃如甘蠅飛衛之射揑聚放開在我掌握與劉所論殆一轍矣余讀許渾詩獨愛道直去官早家貧為客多之句非親嘗省不知其味也贈蕭兵曹詩云客道恥揺尾皇恩寬犯顔直道去官早之實也將離郊園詩云久貧辭國逺多病在家希家貧為客多之實也蘇養直清江曲見賞於東坡以為與李太白無異所謂屬玉雙飛水滿塘菰蒲深處浴鴛鴦是也既為前輩所賞名已不没而又作後清江曲一篇豈養直尚惡其少作耶所謂呼兒極浦下笭箵社瓮欲熟浮蛆香輕蓑淅瀝鳴秋雨日暮乗流自相語如此等句前曲似未到也自古文人雖在艱危困踣之中亦不忘於製述盖性之所嗜雖鼎鑊在前不䘏也况下於此者乎李後主在圍城中可謂危矣猶作長短句所謂櫻桃落盡春歸去蝶翻金粉雙飛子䂓啼月小樓西文未就而城破蔡約之嘗親見其遺稿東坡在獄中作詩贈子由云是處青山可藏骨他年夜雨獨傷神猶有所托而作李白在獄中作詩上崔相云賢相爕元氣再欣海縣康應念覆盆下雪泣拜美光猶有所訴而作是皆出於不得已者劉長卿在獄中非有所托訴也而作詩云斗間誰與㸔寃氣盆下無由見太陽一詩云壯志已憐成白髪餘生猶待發青春一詩云冶長空得罪夷甫不言錢又有獄中見畫佛詩豈性之所嗜則縲絏之苦不能易雕章繢句之樂歟杜牧赤壁詩云折㦸沉沙鐡未消自將磨洗認前朝東風不與周郎便銅雀春深鎻二喬李義山集中亦載此詩竟莫定何人所作也俱同上詩話總龜後集巻十一欽定四庫全書詩話總龜後集巻十二宋阮閱撰評論門或問鄭綮相國近有詩否答云詩思在㶚橋風雪中驢子上此處那得之北夢𤨏言載綮雖有詩名本無廊廟之望及登庸中外驚駭太原兵至渭北天子震恐渇於攘却綮請於文宣王謚􅃅中加一哲字其不究時病率此類愚謂此人止可置之風雪中令作詩也䂬溪王夷甫蔡景節並號口不言錢二子皆因弊矯之者衍以其妻貪滛黷貨至藉俠士李陽以懼之樽在臨海其婢納女巫之賂為百姓撾登聞鼓其絶口盖有由然如子美張籍皆兒散寫乞錢書太白頻將三十萬盡付酒家錢岑參閒君耐相訪正有牀頭錢小杜清貧長欠一杯錢東坡滿江風月不論錢山谷青山好去坐無錢曽不害諸公之髙也孟郊詩最淡且古坡謂有如食蟛􅒹竟日嚼空螯退之論數子乃以張籍學古淡東野為天葩吐竒芬豈勉所長而諱所短耶抑亦東野古淡自足而不待學歟並同上武元衡詩不多集中有酬嚴司空荆南見寄詩兩篇一云金貂再領三公府玉帳連封萬戸侯一云漢家征鎮委條侯虎節龍旌居上頭皆續以簾捲青山巫峽雨烟開碧樹渚宫秋第三聨一云劉琨坐嘯風清塞謝眺題詩月滿樓一云玊笳曽掩故人淚麗句初傳明月樓皆續以白雪調髙歌不得美人相顧翠娥愁人訝其大同余謂乃元衡刪潤之本集中兩存之爾當以前篇為正後篇誠未工也丹陽集李太白杜子美詩皆掣鯨手也余觀太白古風子美偶題之篇然後知二子之源流逺矣李云大雅久不作吾衰竟誰陳王風委蔓草戰國多荆榛則知李之所得在雅杜云文章千古事得失寸心知騷人嗟不見漢道盛於斯則知杜之所得在騷然李不取建安七子而杜獨取垂拱四傑何耶南皮之韻固不足取而王楊盧駱亦詩人之小巧者爾至有不廢江河萬古流之句褒之豈不太甚乎同上少游贈坡詩云節毛零落毡餐雪辨舌縱横印佩金語太不等子瞻譏集句云天邉鴻鵠不易得便令作對隨家雞此詩正類此黄常明東坡文章妙一世然在掖垣作吕吉甫謫詞繼而吕復用遂納告毀抹在翰苑作上清儲祥碑繼而蔡元長復作遂遭磨毀非特此也蘇叔黨云昔公為藏經記云傳於世或以為非在恵州作梅花詩至有以為笑此皆士大夫以文鳴者其說能使人必信乃謬妄如此信知識古戰場文者鮮矣子由嘗䟦東坡遺稿云展卷得遺草流涕濕冠纓斯文久衰弊流涇自為清科斗藏壁間見者空歎驚廢興自有時詩書付西京陽秋嘗恨王子猷作此君語輕以難名者告人遂使庸夫俗子妄意其間酤坊茗肆適以汚累之謪仙云但得酒中趣勿為醒者傳此理信然和靖招靈魄云百千幽勝無人見說向吾師是洩機東坡云此味只憂兒輩覺逢人休道北牕凉人生此樂須天賦莫遣兒曹取次知使子猷知此必鉗其喙也䂬溪老杜畏人有云門徑從榛草無心待馬蹄又直須上畨㸔成竹客至從嗔不出迎將遺物離人矣答嚴八乃云只須伐竹開荒徑拄杖穿花聽馬蹄又有草萊無徑欲教鋤亦如厭就成都卜而云憑將百錢卜漂泊問君平自智者觀之則為游戯篇章得失自在俗士拘泥則全不相應也東坡答林塘云古今正自同嵗月何必書游香積山又云尋幽恐不繼書版記嵗月蕭思話先於曲阿起宅有閒曠之致子恵基嘗謂所親曰婚嫁畢當歸老舊廬故元次山招陶别駕云無惑别婚嫁竟為俗務牽退之云如今便可爾何用畢婚嫁杜茅屋為風所破歌云自經喪亂少睡眠長夜沾濕何由徹安得廣厦千萬間大庇天下寒士俱歡顔風雨不動安如山於乎何時眼前突兀見此屋吾廬獨破受凍死亦足白樂天新製布裘云安得萬里裘盖褁周四垠穏煖皆如我天下無寒人新製綾袴成百姓多寒無可救一身獨煖亦何情心中為念農桑苦耳裏如聞飢凍聲争得大裘長萬丈與君都盖洛陽城皆伊尹自任一夫不獲之辜也或謂子美詩意寧苦身以利人樂天詩意推身利以利人二者較之少陵為難然老杜飢寒而憫人飢寒者也白氏飽煖而憫人飢寒者也憂勞者易生於善慮安樂者易失於不思樂天疑優或人又謂白氏之官稍達而少陵尤卑子美之語在前而長慶在後達者宜急卑者可緩也前者唱導後者和之耳同合而論則老杜之心盖賢矣老杜當干戈騷屑之時間闗秦隴拾薪採㭒餔糒不給困躓極矣自入蜀依嚴武始有草堂之居觀其經營徃來之勞備載於詩皆可考也其曰萬里橋西宅百花潭北莊言其地也經營上元始斷手寳應年者言其時也雪裏江船渡風前竹逕斜寒魚依宻藻宿鷺起圓沙者言其景物也至於草堂塹西無樹林非子誰復見幽深則乞樹朩於何少府之詩也草堂少花今欲栽不問綠李與黄梅則乞果栽於徐少卿之詩也王侍御携酒草堂則喜而為詩曰故人能領客携酒重相㸔王録事送草堂貲不到則戯而為詩曰為嗔王録事不寄草堂貲盖其流離貧窶之餘不能以自給皆因人而成也其經營之勤如此然未及黔突避成都之亂入梓客閬其心則未嘗一日不在草堂也遣弟檢校草堂則曰鵞鴨宜長數柴荆莫浪開寄題草堂則曰尚念四松小蔓草易拘纒送韋郎歸成都則曰為問南溪竹抽稍合過牆塗中寄嚴武則曰常苦沙崩損藥欄也從江檻落風湍每致意如此及成都亂定再依嚴武為節度叅謀復歸草堂則曰不忍竟捨此復來薙榛蕪入門四松在歩堞萬竹踈則其喜可知矣未㡬嚴武卒彷徨無依復捨之而去以史及公詩考之草堂斷手於寳應之初而永泰元年四月嚴武卒是年秋公寓䕫州雲安縣有此草堂者終始秖得四載而其間居梓閬三年公詩所謂三年奔走空皮骨是也則安居草堂者僅閲嵗而已其起居寢興之適不足以償其經營徃來之勞可謂一世之覊人也然自唐至今已數百載而草堂之名與其山川草朩禽獸公詩以爲不朽之傳盖公之不幸而其山川草朩之幸也葛常之僧祖可俗蘇氏伯固之子養直之弟也作詩多佳句如懐蘭江云懐人更作夢千里歸思欲迷雲一灘贈端師云牕間一榻篆烟碧門外四山秋蕋紅等句皆清新可喜然讀書不多故變態少觀其體格亦不過烟雲草樹山川鷗鳥而已而徐師川作其詩引乃謂自建安七子南朝二謝唐杜甫韋應物栁宗元本朝王荆公蘇黄妙處皆心得神解無乃過乎師川作畫虎行末章云憶昔予頑少小時先生教誦荆公詩即今老舊無新句尚有廬山病可師愛其詩如是也丹陽集元和十一年六月武元衡將朝夜漏未盡三刻騎出居第遇盗死於墻下許孟容謂國相横尸而盗不得為當朝恥遂下詔募捕竟得賊始得張宴者王承宗所遣訾珎者李師道所遣也初元衡䇿李錡之必反已而錡果反就誅由是諸鎮桀驁者皆不自安以致於是劉夢得有代静安佳人怨詩云寳馬鳴珂踏曉塵魚文匕首犯車茵適來行哭里門外昨夜畫堂歌舞人又云秉燭朝天遂不回路人彈指望髙臺墻東便是傷心地夜夜秋螢飛去來余考夢得為司馬時朝廷欲澡濯補郡而元衡執政乃格不行夢得作詩傷之而寄於静安佳人其傷之也乃所以快之歟韻語陽秋黄庶字亞夫嘗有怪石一絶傳於世云山鬼水怪着薜荔天祿辟邪眠莓苔鉤簾坐對心語口曽見漢家池舘來人士膾炙以為竒作唐張碧詩亦不多見嘗有池上怪石詩云寒姿數片竒突兀曽作秋江秋水骨先生應是壓風雷着向池邉塞龍窟我來池上傾酒尊半酣書破青烟痕参差翠栁擺不落筆頭驚怖黏秋雲我聞呉中項容水墨有髙價邀得將來倚松下鋪却雙繒直道難掉首空歸不成話二詩殆未易甲乙也同上詩話總龜後集巻十二欽定四庫全書詩話總龜後集巻十三宋阮閱撰評論門魯直謂陳後山學詩如學道此豈尋常雕章繪句者之可擬哉客有謂余言後山詩其要在於㸃化杜甫語爾杜云昨夜月同行後山則云勤勤有月與同歸杜云林昏罷幽磬後山則云林昏出幽磬杜云古人日已逺後山則云斯人日已逺杜云中原鼔角悲後山則云風連鼓角悲杜云暗飛螢自照後山則云飛螢元失照杜云更覺追隨盡後山則云林湖更覺追隨盡杜云文章千古事後山則曰文章平日事杜云乾坤一腐儒後山則曰乾坤着腐儒杜云孤城隠霧深後山則曰寒城着霧深杜云寒花只暫香後山則曰寒花只自香如此類甚多豈非㸃化老杜之語而成者余謂不然後山詩格律髙古真所謂碌碌盆盎中見此古罍洗者用語稍同乃是讀少陵詩熟不覺在其筆下又何以足病公丹陽集南史載孝武嘗問顔延之曰謝莊月賦何如答曰莊始知隔千里兮共明月帝召莊以延之語語之莊應聲曰延之作秋胡詩始知生為久離别没為長不歸同上連綿字不可挑轉用詩人閒有挑轉用者非為平仄所牽則為韻所牽也羅昭諌以沉寥為寥沉是為平仄所牽秋風生桂枝詩所謂寥沉工夫大是也又以汎瀾為瀾汎是為韻所牽哭孫員外詩所謂故侯何在涙瀾汎是也韻語陽秋方干詩清潤小巧盖未升曹劉之堂或者取之大過余未曉也王賛嘗稱之曰鋟肌滌骨氷瑩霞絢嘉殽自將不吮餘雋麗不葩芬苦不癯棘當其得志倐與神會孫邰嘗稱之曰其秀也仙蕋於常花其鳴也靈鼉於衆響觀其所作登靈隠峰詩云山叠雲霞際川傾世界東送俞坦之詩云風塵辭帝里舟楫到家林此真兒童語也寄喻鳬云寒蕪隨楚盡落葉渡淮稀如送俞坦之下第又云過楚寒方盡浮淮月正沉贈路明府詩云吟成五字句用破一生心贈喻鳬又云才吟五字句又白㡬莖鬚稱心寺中島云雪折停猿樹花藏浴鶴泉寄越上人又云牕接停猿樹巖飛浴鶴泉于使君詩云月中倚棹吟漁浦花底垂鞭醉鳳城送伍秀才詩又云倚棹寒吟漁浦月垂鞭醉入鳳城春其語言重叠有以見其窘也至於野渡波揺月空城雨翳鐘白猿垂樹牕邉月紅鯉驚鈎竹外溪義行相識處貧過少年時等句誠無愧於孫王所賞杜甫讀蘇渙詩則曰餘髪喜却變白間生黒絲髙適觀陳十六史碑則曰我來觀雅製慷慨變毛髪韻語陽秋李長吉云我生二十不得意一生愁謝如梧蘭年至二十七而卒陳無已除夜詩云七十已强半所餘能㡬何遥知暮景促更覺後生多至四十九而卒語意不祥如此豈神明者先受之耶丹陽老杜賦螢火詩云幸從腐草出敢近太陽飛未足臨書巻時能㸃客衣似譏當時閹人用事於人君之前不能主張文儒而乃如青蠅之㸃素也說者乃謂喻小有才而侵侮大徳豈不悞哉羅隠竊取其意乃曰不思曽腐草便擬倚孤光若道通文翰車公業闕長其視前作愧矣錢起集前八巻後五巻鮑欽止謂昭宗時有中書舍人錢珝亦起之諸孫今起集中恐亦有珝所作者余初未知其所㨿也比見前集中有同程七早入中書一篇云不意雲霄能自致空驚鵷鷺忽相隨臘雪新晴栢子殿春風欲上萬年枝和王員外雪晴早朝詩紫微晴雪帶恩光遶仗偏隨鴛鷺行長信月留寧避曉宜春花滿不飛香二詩皆翃所作無疑盖起未嘗入中書也集中又有登彭祖樓一詩而薛能集亦載則知所編甚駮也陳去非嘗謂余言唐人皆苦思作詩所謂吟安一箇字撚斷數莖鬚句向夜深得心從天外歸吟成五字句用破一生心蟾蜍影裏清吟苦舴艋舟中白髪生之類是也故造語皆工得句皆竒但韻格不髙故不能㕘少陵之逸歩後之學詩者倘能取唐人語而掇入少陵繩墨歩驟中此速肖之術也余嘗以此語似葉少藴少藴云李益詩云開門風動竹疑是故人來沈亞之詩云徘徊花上月虚度可憐宵皆佳句也鄭谷掇取而用之乃云睡深可忍風敲竹飲散那堪月在花真可與李沈作僕厮由是論之作詩者興致先自髙逺則去非之言可用倘不然便與鄭都官無異荆公嘗有詩云功謝蕭䂓慚漢第恩從隗始上燕臺或謂公曰蕭何萬世之功則功字固有來處若恩字則未見有出也荆公答曰韓集鬬雞聫句孟郊云受恩慚始隗則知荆公詩用法之嚴如此然一水䕶田將緑遶兩山排闥送青來之句乃以樊噲排闥事對䕶田豈䕶田亦有所出耶有好事者謂余言一日有人靣稱公詩謂自喜田園安五栁但嫌戸税擾庚桑以為的對公笑曰伊但知栁對桑為的對然庚亦是數盖以十日數之也余謂荆公未必有此意使果如好事者之說則作詩歩驟亦太拘窘矣錢起送屈突司馬詩云星飛龎統驥箭發魯連書人多稱其工余恨龎統驥出處無星字而魯連書有箭字也趙給事晩歸不遇詩忽㸔童子掃花處始愧夕郎題鳳來前句不用事後句用二事皆非律也丹陽詩家有換骨法謂用古人意而㸃化之使加工也李白詩云白髪三千丈縁愁似個長荆公㸃化之則云繰成白髪三千丈劉禹錫云遥望洞庭湖翠水白銀盤裏一青螺山谷㸃化之云可惜不當湖水靣銀山堆裏㸔青山孔稚圭白苧歌云山虚鐘響徹山谷㸃化之云山空響筦絃盧同詩云草石是親情山谷㸃化之云小山為友朋香草當姬妾學詩者不可不知此同上沈存中云退之城南聨句云竹影金𤨏碎金𤨏碎者日光也恨句中無日字爾余謂不然杜子美云老身倦馬河堤永踏盡黄榆緑槐影亦何必用日字作詩正欲如此葛常之自古工詩者未嘗無興也觀物有感焉則有興今之作詩者以興近乎訕也故不敢作而詩之一義廢矣老杜萵苣詩云兩旬不甲拆空惜埋泥滓野莧迷汝來宗生實於此皆興小人盛而掩抑君子也至髙適題處士菜園則云耕地桑柘閒地肥菜常熟為問葵藿資何如廟堂肉則近乎訕矣作詩者茍知興之與訕異始可與言詩矣髙適别鄭處士云興來無不愜才大亦何傷寄孟五詩云秋氣落窮巷離憂兼暮蟬送蕭十八云常苦古人逺今見斯人古題陸少府書齋云散帙至棲鳥明燈留故人皆佳句也上陳左相天地莊生馬江湖范蠡舟亦有含蓄但莊子謂天地一指萬物一馬而以天地為馬則悞矣並同上山谷詩多用稻田衲亦云田衣王摩詰詩云乞飯從香積裁衣學水田又云手中花􅏩净香飯稻畦成豈用是耶丹陽集晉張翰憶呉中蓴菜鱸鱠而歸而髙適屢作越上用如送崔功曹赴越云今朝欲乗興隨爾食鱸魚送李九赴越云鏡水若所憶蓴羹子舊便人以為疑余考地理志漢呉縣𨽻今會稽郡則以鱸作越上亦無傷也韻語陽秋魯直謂東坡作詩未知句法而東坡題魯直詩云每見魯直詩未嘗不絶倒然此巻語妙甚殆非悠悠者可識能絶倒者已是可人又云讀魯直詩如見魯仲連李太白不敢復論鄙事雖若不適用然不為無補如此題識其許之乎其譏之也魯直酷愛陳無已詩而東坡亦不深許魯直為無已揚譽無所不至而無已乃謂人言我語勝黄語何耶同上詩話總龜後集巻十三欽定四庫全書詩話總龜後集巻十四宋阮閱撰評史門安祿山反永王璘有窺江左之意子偒勸其取金陵史稱薛璆李臺鄉等為璘謀主而不及李白白傳止言永王璘辟為府僚璘起兵遂逃還彭澤審爾則白非深於璘者及觀白集有永王東廵歌十一首乃曰初從雲夢開朱邸更取金陵作小山又云我王樓艦輕秦漢却似天皇欲度遼若非賛其逆謀則必無是語矣白既流夜即有書懐詩云半夜水軍來潯陽滿旌旃空名適自悞廹脅上樓船從賜五百金棄之若浮烟辭官不受賞翻謫夜郎天宋中丞薦白啟云遇永王東廵脅行中道乃用白述懐意以􅋞拭其過爾孔巢父亦為永王所辟巢父察其必敗潔身潜遁由是知名使白如巢父之計則安得有夜郎之謫哉老杜送巢父歸江東云巢父掉頭不肯住東將入海隨烟霧其序云兼呈李白恐不能無微意也黄常明唐穆宗時令狐楚為相為景陵使以傭錢獻羡餘怨聲係路致有衡州之敗觀發潭州寄李寧常侍詩云君今侍紫垣我已墮青天委廢從兹日旋歸在㡬年又有答竇鞏中丞詩云何年相贈答却得在中臺亦可見其去國惨傷之情矣孔子曰茍患失之無所不至其楚之謂乎觀甘露之事則可見矣當是時也王涯等被繫神䇿仇士良白涯與李訓謀逆將立鄭注楚時以舊相在闕下文宗召楚至帝對楚悲憤因付涯訊牒曰果涯書耶楚曰涯誠有謀罪應死嗚呼觀望腐夫閹人而誣置人於死地楚忍為之乎甘露野史乃言尚頼舊相令狐楚獨為辯明若以史為證則野史之言未必公也杜牧之作李和鼎詩云鵩鳥飛來庚子直謫去日蝕辛邜年由來枉死賢才士消長相持勢自然盖言鄭注事也方是時和鼎論注不可為相旋致貶謫故牧之作詩痛之如此議者謂辛邜年在憲宗之時而文宗時無辛邜也豈牧之悞乎余謂牧之所云非謂實庚子辛邜也鵩集於舍班固書庚子之日日有蝕之詩人有辛邜之詠借是事以明李甘之寃爾杜牧之集有李給事詩二首其中有紛紛白晝驚千古鐡鎻朱殷㡬一空之句謂鄭注甘露之事也又有可憐劉校尉曽訟石中書之句牧之自注云給事曽忤仇士良人遂以為給事者李石也余嘗考之李石雖嘗為給事然劾鄭注之事史所不載語言忤仇士良然亦在石拜相之後石既拜相則牧之詩題不應以給事為稱其非李石明矣當時唯有李中敏與牧之厚善嘗因旱欲乞斬注以申宋申錫之寃帝不省遂以病告歸潁陽令牧之有元禮去歸緱氏學之句牧之自注云因論鄭注告歸潁陽又史云注誅遷給事其后仇士良以開府䕃其子中敏曰内謁者安得有子士良慚恚由是復棄官去由是論之則是中敏無疑矣唐太和末閹尹恣横天子以擁虚器為恥而元和逆黨未討帝欲夷絶其類李訓謂在位操權者皆碌碌惟鄭注可共事遂同心以謀已而殺陳宏志於青泥驛相繼王守澄楊承和韋元素王踐言皆不保首領又斲崔潭峻之棺而鞭其尸剪除逆黨㡬盡亦可謂壯矣意欲誅宦官後乃圖河湟歸河朔諸鎮天子向之鄭注雖招權納賄然出節度隴右欲因王守澄之葬乗羣宦臨送以鎮兵悉誅之謀亦未必不善會李訓先五日舉事遂成甘露之禍世以成敗論人物故訓注不得為忠至李徳裕謂不可與徒𨽻齒亦太甚矣按唐史李甘與李中敏皆嘗論鄭注不可為相故甘有封州之謫而中敏有潁陽之歸杜牧之贈甘詩云太和八九年訓注極虓虎吾君不省覺二兇日威武喧喧皆傳言明辰相登注和鼎顧予云我死有處所明日詔書下謫斥南荒去又有贈中敏詩云元禮去從緱氏學江充來見犬臺宫曲突徙薪人不會海邉今作釣魚翁盖深痛二公之言不行而訓注得恣其謀也盖當是時仇士良竊國柄勢焰熏灼士大夫於議論之間不敢以訓注為是以賈殺身之禍故牧之之詩如此於乎東漢之季柄在宦官陳蕃之徒以忠勇之資謀殪其黨而事亦不遂史載其名殆如日星而訓注以當時士夫畏懾士良輩遂加以奸兇之目而史亦以為亂人萬世之下無以自白其深可痛息哉家藏甘露野史三巻及乙邜記一巻二書之說特相矛盾甘露野史之言上令訓等誅宦官事覺反為所擒而乙邜記乃謂訓等有逆謀盖甘露之出於朝廷公論而乙邜記附會士良之私情也乙邜記後有朱實䟦尾數百言以乙邜所記為非是其說與野史同余故表而出之葛常之三良以身殉秦繆之葬黄鳥之詩哀之序詩者謂國人刺繆公以人從死則咎在秦繆而不在三良矣王仲宣云結髪事明君受恩良不訾臨殁要之死焉得不相隨陶元亮云厚恩固難忘君命安可違是皆不以三良之死為非也至李徳裕則謂社稷死則死之不可許之死與梁丘據安陵君同譏則是罪三良之死非其所矣然君命之於前而衆驅之於後為三良者雖欲不死得乎唯栁子厚云疾病命固亂魏氏言有章從邪陷厥父吾欲討彼狂使康公能如魏顆不用亂命則豈至陷父於不義如此哉東坡和陶亦云顧命有治亂臣子得從違魏顆真孝愛三良安足希似與栁子之論合而過秦繆墓詩乃云繆公生不誅孟明豈有死之日而忍用其良乃知三子狥公意亦如齊之二子從田横則又言三良之殉非繆公之意也韋蘇州睢陽感懐詩有曰宿將降賊庭儒生獨全義宿將謂許逺儒生謂張廵也盖當時物議以為廵死而逺就虜疑逺畏死而辭服於賊故應物云爾韓愈嘗有言曰逺倘畏死何苦守尺寸之地食其所愛之肉以與賊抗而不降乎斯言得矣廵死後賊將生致逺於偃師逺亦以不屈死則是逺亦終死賊也李義山詩云本為留侯慕赤松漢庭方識紫芝翁蕭何只解追韓信豈得虚當第一功是以蕭何功在張良下也王元之詩云紀信生降為沛公草荒孤壘想英風漢家青史縁何事却道蕭何第一功是以蕭何功在紀信下也余謂炎漢創業何為宗臣髙祖設指縱之喻盡之矣他人豈容議耶盗殺武元衡也白樂天為京兆掾初非言責而請捕盗以必得為期時宰惡其出位坐賦新井篇逐之九江故因聞琵琶乃有天涯流落之感至於淚濕青衫之上何憊如此哉先文康公嘗有詩云平生趣操號安恬退亦恬然進不貪何事潯陽恨遷謫輕將清淚濕青衫又云及泉曽改莊公誓勝母終回曽子車素綆銀牀堪淚墮更能賦詠獨何如左太冲陶淵明皆有荆軻之詠太冲則曰雖無壯士節與世亦殊倫淵明則曰惜哉劍舞踈竒功遂不成是皆以成敗論人者也余謂荆軻功之不成不在荆軻而在秦舞陽不在秦舞陽而在燕太子舞陽之行軻固心疑其人不欲與之共事欲待他客與俱而太子督之不已軻不得已遂去故羽歌悲愴自知功之不成已而果膏刃秦庭當時固已惜之然概之於義雖得秦王之首於燕亦未能保終吉也故楊子云荆軻為丹奉於期之首燕督亢之圖入不測之秦實刺客之靡也焉可謂之義也可謂善論軻者漢文欲輕利而反重義者以謂失本恵而傷吾仁固也或又咎帝短喪為傷於孝予觀遺詔率皆言為已損制未嘗使士庶皆短喪也厥後丞相翟方進與薛宣服母喪皆三十六日而除而顔師古注云漢制自文帝遺詔國家遵以為常則咎不在文帝矣而王荆公詩云輕刑死人衆短喪生者偷仁孝自此薄哀哉不能謀輕刑死人衆則固然矣短喪生者偷則似誣文帝也俱同上詩話總龜後集巻十四欽定四庫全書詩話總龜後集巻十五宋阮閲撰評史門老杜北征詩云憶昨狼狽初事與古先别不聞夏商衰中自誅褒妲其意謂明皇英斷自誅妃子與夏商之誅褒妲不同老杜此語出於愛君曲文其過非至公之論也白樂天詩云六軍不發無奈何宛轉蛾眉馬前死非逼廹而何哉然明皇能割一已之愛使六軍之情帖然亦可謂知所輕重矣故前輩有詩云畢竟聖明天子事景陽赴井是何人丹陽集晉盧諶先為劉琨從事中郎將叚匹磾領幽州求諶為别駕故琨答諶詩云情滿伊何蘭桂移植茂彼春林瘁此秋棘言諶棄已而就匹磾也厥後琨命箕淡攻石勒一軍皆没由是窮蹙不能自守乃率衆赴匹磾繼為匹磾所拘知其必死矣豈無望於諶哉觀再贈諶云朱實隕勁風繁英落素秋何意百煉鋼化為繞指柔其詩托意欲以激諶而救其急而諶殊不領也琨既被害諶始上表以雪其寃終亦何所補耶漢元帝時𢎞恭石顯用事京房劉向皆深嫉之嘗上書力詆盖薫蕕氷炭不能以共處理之必然也然房欲淮陽王為已助代王作求朝奏章向令外親上䟽謂小人在朝以致地動雖嫉惡之心切然於忠實亦少貶矣使二子果輸忠於漢當明目張膽論至再三可也何暇為身謀而假之於他人哉故荆公詩云京房劉向各稱忠詔獄當年迹自窮畢竟論心異恭顯不妨迷國畧相同後之論人物者倘取其心而畧其迹則善矣韻語陽秋張祜觀狄梁公傳云失運廬陵厄乗時武后尊五丁扶造化一柱正乾坤而山谷有鯨波横流砥柱虎口活國宗臣之句可謂善論仁傑者余謂仁傑不畏武后羅織之獄三族之夷强犯逆鱗敢以廬陵王為請者非特天資忠義亦以先得武后之心故也且張易之昌宗后之嬖臣也欲歸廬陵事大體重非二嬖之言后孰信之吉頊能以危言撼二嬖陳易弔為賀之計故二嬖敢從容以請而后意遂定於是仁傑之諌得行卒之遣徐彦伯迎廬陵王於房州者由仁傑之言也故史援吕温之言稱之曰取日虞淵洗光咸池潜授五龍夾之以飛於乎仁傑其忠且賢哉按仁傑傳始后欲立武三思而李昭徳傳乃云洛陽人王慶之請以武承嗣為皇太子昭徳力争今考三思本傳不載為皇太子之說而承嗣傳云洛州人請立承嗣為皇太子岑長倩格輔元皆争不從而不及昭徳豈有牴牾耶裴度在朝憲宗委任不疑使破三賊已而呉元濟授首王承宗割二州遣子入侍李師道被擒兩河諸侯忠者懐强者畏克融廷凑皆不敢桀勲烈之盛一時無與比肩者惟李義山指為聖相詩曰帝得聖相相曰度又曰嗚呼聖皇及聖相亦過矣哉荀卿曰得聖臣者帝若舜禹伊尹周公皆聖臣也謂四人為聖臣則可謂裴度為聖相其可哉唐明皇以英銳身致極治以荒滛身致極亂自古人君成敗之速未有如明皇者鄭毅夫詩云四海不揺草九重藏禍根十年傲堯舜一笑破乾坤盖是詩也開元之盛能致兵寢刑措之治者實姚宋輔政之功明皇可以無疑矣不三四年遽使去位及李林甫用事則盤旋紏固至十八九年敗國蠧賢無所不至猶以為未足也晚年顧力士曰海内無事朕將吐納導引以天下事付林甫天下安得而不亂乎並同上史載宋之問冉祖雍並賜死於桂州之間得詔震汗不引決祖雍請於使者曰之問有妻子幸使之訣使者許之而之問荒悸不能處家事及考之文集有登大庾嶺詩云兄弟逺謪居妻子咸異域則之問赴貶時未嘗以妻子行也又有發藤州及昭州二詩二州皆在桂州之南則賜死之地非桂州明矣豈史之誤歟丹陽集漢髙祖置酒沛宫酒酣擊筑自歌曰大風起兮雲飛揚威加海内兮歸故鄊安得猛士兮守四方時帝有天下已十二年當思耆艾賢徳與共維持獨専意猛士何哉豈馬上三尺嫚罵未易遽革邪治道終以覇雜盖有由然其前年下詔曰賢士大夫吾能尊顯之是年下詔曰與天下之賢豪士大夫同安緝之余謂播告之辭乃秉筆代言非若耳熱之歌乃中心所欲也許汜不為陳元龍所禮嘗與劉備稱之備曰君有國士名望無救世意而求田問舍言無可采何縁當與君語如小人欲卧百尺樓卧君於地何但上下牀之間耶然介甫屢用之求田問舍轉無成更覺求田問舍遲讀蜀志曰無人語與劉元徳問舍求田意最髙又有逰西霞庵云求田此山下終欲忤陳登豈非力欲轉此一重案歟老杜北征詩云經年至茅屋妻子衣百結慟哭松聲回悲泉共幽咽平生所嬌兒顔色白於雪見爺背靣啼垢膩脚不襪方是時杜方脫身於萬死一生之地得見妻兒其情如是洎至秦中則有晒藥能無婦應門亦有兒之句至成都則有老妻憂坐痺幼女問頭風之句觀其情悰已非北征時比也及觀進艇詩則曰晝引老妻乗小艇晴㸔稚子浴清江江村詩則曰老妻畫紙為棋局稚子敲針作釣鈎其優游愉悅之情見於嬉戯之間則又異於在秦中時矣葛常之白樂天作八漸偈云苦既非真悲亦是假則世間悲歡人我必能忘情始憲宗欲以樂天為刺史王涯以資淺為言遂得江州司馬及涯敗作詩快之有當君白首同歸日是我青山獨徃時之句李徳裕於樂天不見有隙徳裕貶崖州亦作三絶快之其一篇云樂天嘗任蘇州日要勒湏教用禮儀從此結成千萬恨今朝果中白家詩盖嘗以唐史考之樂天卒於會昌之初武宗時也而徳裕之貶乃在宣宗大中年則徳裕之貶樂天死已久非樂天之詩明矣以是凖之快王涯之句恐亦未必然也韻語陽秋西伯將出獵卜之曰所獲非龍非彲非虎非羆所獲覇王之輔於是東遇太公於渭水之陽載與俱歸此司馬遷之說也文王至磻谿見吕尚釣鈎得玉璜刻曰姬受命吕佐撿徳合於今昌來提此尚書太傅之說也太公釣於兹泉文王得而王此吕不韋之說也吕望年七十釣於渭渚初下得魴次得鯉刳腹得書書文曰吕望封於齊此劉向之說也太公避紂居東海之濵聞文王作興曰盍歸乎來由文王至於孔子五百有餘嵗若太公望則見而知之此孟子之說也是數說者皆言天産英輔以興周盖非碌碌佐命者之可擬而司馬遷乃摭或者之論謂西伯拘羑里散宜生閎夭招吕尚求美女竒物獻於紂而贖西伯西伯既脱三人有隂謀脩徳以傾商政此豈所以待太公也哉歐陽詹云論兵去商虐講徳興周道屠沽未遇時何異斯川老余比赴官宜春於夀昌道中見壁間題一詩云漁翁何事亦從戎變化神竒握掌中莫道直鈎無所取渭川一釣得三公一以為傾商政一以為釣三公皆非知聖賢者韻語陽秋李太白至邯鄲登城樓詩云提携袴中兒杵臼及程嬰空孤獻白刃必死耀丹誠是有取於二子甚重袴中兒謂趙武也然司馬遷作趙晉二世家自相矛盾左氏所書又復不同將何以取信於后世耶晉世家之說曰景公十七年誅趙同趙括令庶子武為後趙世家之說曰景公三年屠岸賈攻趙朔殺趙括等朔同友人程嬰匿趙武於山中至十五年景公有議立趙武左氏之說曰魯成公八年六月晉討趙同趙括武從姬畜於公宫以其田與祁奚韓厥言於晉侯曰成季之勲宣孟之忠無後為善者懼矣乃立武而反其田按成公八年即晉景公十七年也或云匿武於山中或云畜武於宫中或云十五年而後立武或云未踰月而立武皆未知所據也楊雄之迹曲諂新室議之者衆矣此置而不論雄之心如何哉觀法言之書似未明乎大道之㫖也王荆公乃深許之何耶詩云寥寥鄒魯後於子獨先覺又云懦者陵夷此道窮千秋止有一楊雄又云道真沉溺九流渾獨泝頽波討得源又云子雲生平人莫知知者乃獨稱其辭今尊子雲者皆是得子雲心亦無㡬是亦聖人許雄也東坡謂雄以艱深之辭淺易之說與公矛盾矣同上詩話總龜後集巻十五欽定四庫全書詩話總龜後集巻十六宋阮閱撰評史門孔子謂寗武子邦有道則知邦無道則愚其知可及也其愚不可及也所謂及者繼也非企及之及謂寗武之愚而後人不可繼爾居亂世而愚則天下塗炭將孰拯屈原事楚懐王不得志則悲吟澤畔卒從彭咸之居究其初心安知拯世之意不得伸而至於是乎賈生謫長沙傅渡湘水為賦以弔之所遭之時雖與原不同盖亦原之志也白樂天詠史詩乃謂士生一代間誰不有浮沉良時真可惜亂世何足欽乃知汨羅恨未抵長沙深信如樂天言則是以亂世為不拯也而可乎議者謂誼所欲為文帝不能用者乃有鉛刀為銛幹棄周鼎寳康瓠語觀此是有憾於絳灌東陽者雖然勃也嬰也敬也皆素有長者之譽必不肯害賢而利已楚漢春秋别有絳灌豈其是耶葛常之永和中王羲之脩褉事於會稽山隂之蘭亭羣賢畢至少長咸集序以謂雖無絲竹管絃之盛一觴一詠亦足以暢叙幽情則當時篇詠之傳可考也今觀羲之謝安謝萬孫綽孫統王彬之凝之肅之徽之徐豐之袁嶠之十有一人四言五言詩各一首王豐之元之藴之渙之郄曇華茂庾友虞說魏滂謝繹庾藴孫嗣曹茂之華平桓偉十有五人或四言或五言各一首王獻之謝瑰卞迪卓髦羊模孔熾劉宻虞谷勞夷后綿華耆謝藤王儗吕系吕夲曹禮十有六人詩各不成罰酒三觥謝安五言詩曰萬殊渾一象安復覺彭殤而羲之序乃以為一死生為虚誕齊彭殤為妄作盖反謝安一時之語而或者遂以為未達此特未見當時羲之之詩爾其五言曰仰視碧天際俯瞰緑水濵寥閴無涯觀寓目理自陳大矣造化功萬殊莫不均羣籟雖参差適我無非親此詩則豈未達者耶史載獻之嘗與兄徽之操之俱詣謝安二兄多言獻之寒温而已既出客問優劣安曰小者佳吉人之詞寡以其少言故知之今王氏父子昆季畢集而獻之之詩獨不成豈亦吉人之詞寡耶景祐中有㑹稽太守蔣堂修永和故事嘗有詩云一𣲖西園曲水聲水邉終日會冠纓㡬多詩筆無停綴不似當年有罰觥盖謂獻之等發也葛常之會稽臨安金陵三郡皆有東山俱傳以為謝安携妓之所按謝安本傳初安石寓居會稽與王羲之許珣支遁逰處被召不至遂棲遲東土唐裴冕與吕謂等鑑湖聨句有興衰還尋戴東山更問東此會稽之東山也本傳又云安石嘗徃臨安山中坐石室臨濬谷悠然歎曰此與伯夷何逺今餘杭縣有東山東坡有游餘杭東西岩詩注云即謝安東山所謂獨携縹緲人來上東西山者是也此臨安之東山也本傳又謂及登台輔於土山營墅樓舘林竹甚盛毎携中外子姪游集今土山在建康上元縣崇禮鄉載建康事迹云安石於此擬會稽之東山亦號東山此金陵之東山也李白有憶東山二絶不到東山久薔薇㡬度花白雲他自散明月落誰家我今携謝妓長笑絶人羣欲報東山客開闗掃白雲不知所賦者何處之東山也陳軒乃録此詩於金陵集中將别有所據耶南史載宋劉勔經始鍾嶺以為棲息亦號東山金陵遂有兩東山矣同上韓愈自監察御史貶連州山陽令所坐之因傳記各異唐書本傳謂上䟽論宫市徳宗怒故貶李翺行狀謂為幸臣所惡故貶皇甫湜作神道碑謂正元十九年關中旱飢公請寬民徭専政者惡之故貶按文公集宫市之䟽不傳而文公歴官記及年譜以謂京師旱民飢詔蠲租半有司徴求反急愈與同列上䟽言狀為幸臣所讒幸臣者李實也予考退之自連山移江陵詩云孤臣昔放逐泣血追愆尤汗漫不省識恍如乗桴浮或自疑上䟽上䟽豈其由則所坐之因雖退之猶疑之也集中有上京兆李實書盛稱其能曰愈來京師所見公卿大臣未有赤心事上憂國如閣下者又云今年以來不雨者百餘日種不入土而盗賊不敢起榖價不敢貴老姦宿瞞銷縮摧沮亹亹百餘言皆叙其敬慕之意其後實出為華州又有書云愈於久故游從之中蒙恩奬知遇最厚無與比者愈為實所讒不應此書拳拳如是及觀江陵塗中詩云同官盡才俊偏善栁與劉或慮語言洩傳之落寃仇又岳陽别竇司直云愛才不擇行觸事得讒謗前年出官日此禍最無妄又和張十一憶昨行云伾文未揃崖州熾雖得赦宥常愁猜近者三奸悉破碎羽窟無底幽黄能眼中了了見鄊國知有歸日眉方開又有永正行以快伾文之貶其末云郎官清要為世稱荒郡僻野嗟可矜具書目見非妄徴嗟爾既徃宜為懲則知陽山之貶伾文之力而劉李下石為多非為李實所讒也葛常之韓偓香奩集百篇皆艶詞也沈存中筆談云乃和凝所作凝後貴悔其少作故嫁名於韓偓爾今香奩集有無題詩序云余辛酉年戯作無題詩十四韻故奉常王公内翰呉融舍人令狐渙相次屬和是嵗十月一旦兵起隨駕西狩文藁咸棄丙寅嵗在福建有蘇暐以藁見授得無題詩因追味舊時闕忘甚多予按唐書韓偓傳偓嘗與崔嗣定䇿誅劉季述昭宗反正為功臣與令狐渙同為中書舍人其後韓全誨等劫帝西幸偓夜追及鄠見帝慟哭至鳳翔遷兵部侍郎天祐二年挈其族依王審知而卒以紀運圖考之辛酉乃昭宗天復元年丙寅乃哀帝天祐二年其序所謂丙寅嵗在福建有蘇暐授其藁則正依王審知之時也稽之於傳與序無有不合者則此集韓偓所作無疑而筆談以為和凝嫁名於偓特未考其詳爾筆談云偓又有詩百篇在其四世孫奕處見之豈非所謂舊詩之闕忘者乎同上漢史載韓信教陳狶反有挈手歩庭之議且曰吾為公從中起漢十年狶果反髙祖自將兵出張文潜曰方是時蕭相國居中而信欲以烏合不教之兵從中起以圖帝業雖使甚愚必知無成信安肯出此哉故其詩曰欲助陳侯乃中起不思蕭相在咸陽又一詩云平生蕭相真知已何事還同女子謀則又責蕭相不為信辨其枉也余觀班史吕后與蕭相謀詐令人從帝所來稱狶已破羣臣皆賀相國紿信曰雖病强入賀信入吕后使武士縳信斬之則斬信者相國計也縱使其枉相國其肯為辨之哉信死則劉氏安不死則劉氏危相國豈肯以平日相善之故而悞社稷大計乎文潜後有一絶云登壇一日冠羣雄鍾室倉皇念蒯通能用能誅誰計䇿嗟君終日媿蕭公丹陽集漢成帝時張禹用事朱雲對上曰臣願賜尚方斬馬劍斷佞臣一人以厲其餘上問誰也對曰安昌侯張禹上大怒曰居下訕上罪死不赦御史將雲下雲扳殿檻折曰臣願從龍逢比干游於地下如雲者可謂忠直有餘矣後世思其人而不可得則作為韻語以聲其美肅宗時元載用事故杜子美詩云千載少似朱雲人至今折檻空嶙峋武后時傅游藝用事故盧照鄰詩云昔有平陵男姓朱名阿游願得斬馬劍先斷佞臣頭言當時立朝之士不能如雲以二人之惡而告於上也若二人者奸諛百倍張禹矣腥臊之血豈足以汚尚方之劍乎宋景文云朱游英氣凛生風瀕死危言悟帝聰殿檻不脩旌直諌安昌依舊漢三公信乎去佞如㧞山也五王之誅二張也張柬之啟其謀桓彦範任其事敬暉崔元暐袁恕已各效其力坐使天后還政中宗即祚誠為社稷之竒勲然尚有可恨者焉薛季昶勸除武三思彦範輩豈不知中宗非剛斷之主乎彼之意以為三思方烝亂韋氏而中宗孱懦一聽其所為茍誅三思必不利於已故不肯誅耳不旋踵而自罹殺身之禍實自取之也張文潜云繫狗不繫首反噬理必然智勇忽迷方脫匣授龍泉區區薛李昶先事僅能言留禍啟臨淄敗謀豈非天髙祖大風之歌志氣慷慨規模宏逺凛凛乎已有四百年基業之氣史記樂書謂之三侯章令沛得以四時歌舞宗廟盖欲使後之子孫知其祖創業之勤不可怠於守成爾武帝秋風詞瓠子歌已無足道及為賦以傷悼李夫人反覆數百言綢繆戀嫪於一女子其視髙祖豈不媿哉藝文志上自造賦二篇其一不得而見耶並同上詩話總龜後集巻十六欽定四庫全書詩話總龜後集巻十七宋阮閲撰評史門老杜課伯夷辛秀伐木則曰報之以微寒共給酒一斛遣信行脩水筒則以浮𤓰裂餅以答其恭謹陶淵明告其子則曰輙遣一力助汝薪水之勞此亦人子也可善遇之盖古人之役僕夫其忠厚率如此初學記載王褒買便了為奴作約使苦作以致聽劵而淚下鼻涕長一尺有不如早歸黄陌令蚯蚓鑚額之語其少陵柴桑之罪人哉葛常之建安七子惟劉公幹獨為諸王子所親曹操威焰盖世甄夫人出拜諸人皆伏而公幹獨平視雖輸作而不悔亦可嘉矣故梅聖俞詩云公幹才俊或欺事平視美人曽不起自兹不得為故人輸作左校瀕於死公幹嘗有贈徒弟詩云亭亭山上松瑟瑟谷中風風聲一何盛松枝一何勁其寄意如是豈肯少屈於操哉末篇又托興鳯凰有何時當來儀將須聖明君之句則不以聖明待曹操矣杜甫悲陳濤詩云野曠天清無戰聲四萬義軍同日死言房琯之敗也琯臨敗猶持重而中人邢延恩促戰遂大敗故甫深悲之甫為右拾遺會琯罷相上䟽力救琯肅宗大怒詔三司推問􅌠相張鎬救之獲免故洗兵馬行云張公一生江海客身長九尺鬚眉蒼盖戯其救已也張無盡孤憤吟云房琯未相日所談皆臯䕫一朝陳濤下覆没千萬師中原已紛潰老杜尚嗟咨則老杜救琯之章豈亦出於私情乎鄭䖍受安禄山偽命洎賊平與張通王維並囚宣陽里因善畫祈於崔圓遂得免死老杜所謂今如罝中兎子雲識字終投閣是也及䖍貶台州有詩云可念此公懐直道也霑新國用輕刑如䖍者可謂之懐直道乎當是愛私之言爾八哀詩亦云反覆歸聖朝㸃染無滌蕩老䝉台州掾泛泛浙江漿盖傷之也忘年交謂雖年齒尊幼不侔而道義可為友也如張鑑之於陸贄崔廓之於李謙是已魯直云逐貧不去與忘年便以忘年作朋友用盖有來處也老杜過孟倉曹詩云清談見滋味爾輩可忘年則山谷所用豈茍云乎哉李白作蜀道難以罪嚴武其末云所守或匪親化為狼與豺朝避猛虎夕避長蛇磨牙吮血殺人如麻錦城雖云樂不如早還家則武待白之禮未必優也武與杜甫情好甚厚一朝以飲酒過度而武㡬殺之則不如早還家之說乃白先見之明爾陸暢謁韋臯於蜀郡暢感韋之遇已遂反其詞作蜀道易云蜀道易易於履平地郎基在潁川不置朩枕裴潜在兖州不眠胡狀居官清操要當如是白樂天在杭州取天竺片石受代携歸故其詩曰三年為刺史飲氷復食檗唯向天竺山取得両片石此抵有千金無乃傷清白暨守吳門復取洞庭雙石一以支琴一以貯酒故雙石詩有萬古遺水濵一朝入吾手之句洎罷府支琴石遂歸履道舊居故作詩云天上定應勝地上支機未必及支琴於乎泉石膏肓人士之逸韻若樂天者豈潘子義所謂風流罪過也耶君子為小人誣衊則其詩怨故寓之於物以舒其憤如朱晝古鏡詩所謂我有古時鏡初自懐陵得蛟龍猶泥蟠魑魅幸月蝕是也小人既敗君子得志之秋則其詩昌故寓之於物以快其志如劉禹錫磨鏡篇所謂萍開緑池滿暈盡金波溢山神妖氣沮野魅真形出是也黄子虚作妬佳月篇云狂雲妬佳月怒飛千里黒佳月了不嗔曽何汚㓗白支頥少待之寒光静無迹燦燦黄金盤獨照一天碧殆亦二子之意俱同上康節三皇吟許大乾坤自我宣乾坤之外復何言初分大道非常道終有先天永後天作法極微難着迹收功最久不知年若教世上論功業料得更無人在前五帝吟進退肯將天下讓着何言語狀雍容一作從容衣裳垂處威儀盛玉帛脩時意思㳟物物盡能循至理人人自願立殊功當時何故得如此只被升明類日中三王吟一片中原萬里餘殆非孱徳所能居能一作宜夏商正朔猶能布湯武干戈未便驅澤火有名方受革水天無意不成需請觀仁義為心者肯作人間淺丈夫意一作應請觀一作詳知五伯吟刻意尊名名愈虧人人奔命不勝疲生靈劍㦸圍中活圍一作林公道貨財心裏歸雖則餼羊能愛禮奈何鳴鳳未來儀東周五百餘年内歎息唯聞一仲尼七國吟當其末路尚縱横仁義之言固不聽肯為破齊存即墨能勝坑趙盡長平清晨見鬼未為怪白日殺人奚足驚加以蘇張掉三寸扼喉其勢不俱生嬴秦吟轟轟七國正争籌利害相摩未便休比至一雄心底定其如四海血横流三千賔客方成夢百二山河又變秋謾說罷侯能置守趙髙元不是封侯西漢吟秦破山河舊戰場豈期民復見耕桑九千來里開封域四百餘年號帝王剥喪既而遭莽卓經營殊不念髙光當時文物如斯盛城復何由更有隍三國吟桓桓鼎峙震雷音絶唱髙踪没處尋蕭鼓一方情味暢弓刀萬里力難任論兵狠石寧無意飲馬黄河徒有心雖曰天時亦人事誰知慮外失良金西晉吟承平未必便無憂安若忘危非善謀題品人才憑雅謂雌黄時事用風流有刀難割公閭腹無朩可梟元海頭禍在夕陽亭一句上東門笑浪悠悠十六國吟溥天之下號寰區大禹曽經治水餘衣到敝時多蟣蝨𤓰當爛處足虫蛆龍章本不資狂㓂象魏何嘗薦亂胡尼父有言堪味處當時欠一管夷吾南北朝吟云方其天下分南北聘使何嘗絶徃還偏覇尚存前典憲小康猶見舊衣冠一作迍邅洛陽雅望稱崔浩江表竒才服謝安二百四年能並轡謾將形勢互為言有隋吟始謀當日已非臧又更相承或自戕螻蟻人民貪土地泥沙金帛悅姬姜征遼意思糜荒服泛汴情懐厭未央三十六年都掃地不然天下未歸唐有唐吟天生神武奠中央不爾羣凶未易攘正觀若無風凛凛開元安有氣揚揚凭髙始見山河壯入夏方知日月長三百年間能渾一事難成徃道彌光五代吟自從唐季墜皇綱天下生靈被擾攘社稷安危憑卒伍朝廷輕重繫藩方深冬寒朩固不脫未旦小星猶有光五十三年更八姓始知掃蕩待真王我宋吟二首紛紛五代亂離間一旦雲開復見天草朩百年新雨露車書萬里舊山川尋常巷陌猶簮紱取次園林盡管絃盡一作亦人老太平春未老鶯花無害日髙眠又吾曹養拙頼明時為幸居多寕不知天下英才中遁迹人間好景處開眉生來只慣見豐稔老去未嘗經亂離一作聞鼔鼙五事歴將前代舉帝堯而下更無之按卲氏聞見録康節先公謂本朝五事自唐虞而下所未有者一革命之日市不易肆二克服天下在即位後三未嘗殺一無罪四百年方四葉五百年無心腹患伯温竊疑未甞經亂離為太甚先公曰吾老且死汝輩行自知之張南軒采菊亭詩引曰陶靖節人品甚髙晋宋諸人所未易及讀其詩可見胸次灑落八牕玲瓏豈野馬遊塵所能棲集前建安丞張君精力未衰即掛冠家於瀏陽有年矣葺小園為亭面南山來求予名予名之曰采菊亭取靖節所謂采菊東籬下悠然見南山嗚呼靖節興寄深逺特可為識者道耳詩曰陶公千載人髙標跨餘子豈無濟時念斂䕃獨知止歸來卧衡門無愠復何喜九日天氣佳東籬擷芳蕋舉頭見南山佳處政在此地偏心則逺意得道豈否張侯謝銀艾築室娛燕几小亭才尋丈景物自新美頗聞方瞳清亦復强歩履不妨數登臨倚杖㸔雲起髙詠悠然篇飛鴻送千里文集復齋漫録云東坡作諫論以魏鄭公以蘇張之辯而為諫諍之術且云鄭公之初實學縱横之術其所以與蘇張異者心正爾或以東坡之論為不然余讀鄭公出闗詩云中原還逐鹿投筆事戎軒縱横計不就慷慨志猶存䇿杖謁天子驅馬出闗門請纓覊南越憑軾下東藩欝紆陟髙岫出没望平原古朩鳴寒鳥空山啼夜猿既傷千里目還驚九折魂豈不憚艱險深懐國士恩季布無二諾侯嬴重一言人生感意氣功名誰復論東坡實不見此詩盖識見之明有以探其然耳乃知讀書未博未可以輕議前輩也苕溪漁隠曰余觀諫論殆是老蘇作格力辭㫖可以見矣非東坡所作也詩話總龜後集巻十七欽定四庫全書詩話總龜後集巻十八宋阮閲撰辯疑門王絲字敦素越之蕭山人景祐初為縣令會嵗歉絲每家支錢一千以濟之期以明年夏輸絹一匹邑人大受其恵稱為徳政繇此當路薦之盖是時一縑售價不逾其數爾仕止郎曹典州而已范文正公為作墓誌具載其事至荆公當國傚其法施之天下號為和買久之本錢既不復俵且有折帛之害世悞傳始於王儀仲素儀仲文正公之子早即貴達未嘗為邑官至八座没謚懿敏國史本傳可考其子鞏字定國與東坡先生游李定字仲求洪州人晏元獻公之甥文亦竒欲預賽神會而蘇子羙以其任子距之致興大獄梅聖俞謂一客不得食覆鼎傷衆賔者也其嗣即商老彭以詩名列江西𣲖中又李定字資深元豐御史中丞其孫方叔正民兄弟皆顯名一時揚州人又李定嘉祐治平以來以風采聞嘗廵歴天下諸路計度轉運使官制未行老於正卿乃敦老如岡之祖盖濟南人也同姓名者凡三人世亦多指而為一不可不辯李豸陽翟人東坡先生門下士亦字方叔両方叔俱以文鳴詩章又多互傳于世陳子昻感遇詩云樂羊為魏將食子狥軍功骨肉且相薄他人安得忠又曰吾聞中山相乃屬放麑翁孤獸猶不忍况以奉君終一則忍於其子一則不忍於麑故魯直懐荆公詩有啜羮不如放麑樂羊終媿巴西陳無已啓亦用此事所謂中山之相仁於放麑亂世之雄疑於食子是也然屬麑於秦西巴者孟孫也非中山相也子昻徒見樂羊中山事遂誤作孟孫用無已亦遂襲之魯直以西巴為巴西亦悞矣丹陽集李白古風云燕昭延郭隗遂築黄金䑓劇辛方趙至鄒衍復齊來予考史記不載黄金䑓之名止云昭王為郭隗改築宫而師事之孔文舉與曹公書曰昭王築䑓以尊郭隗亦不著黄金之名上谷郡圖經乃云黄金䑓在易水東南十八里燕昭王置千金於䑓上以延天下士遂因以為名皇甫松有登黄金䑓詩云燕相謀在茲積金黄巍巍上者欲何顔使我千載悲其迹尚可得而考也東坡詩云玉奴絃索花奴手玉奴謂楊妃花奴謂汝陽王璡也及觀和楊公濟梅花詩乃言玉奴終不負東昏何耶按南史東昏妃潘玉兒當是筆悞爾韓退之詩曰離騷二十五王逸序天問亦曰屈原凡二十五篇今楚詞所載二十三篇而已豈非并九辨大招而為二十五乎九辨者宋玉所作非屈原也今楚詞之目雖以是篇併注屈原宋玉然九辨之序止稱屈原弟子宋玉所作大招雖疑原文而或者謂景差作若以宋玉痛屈原而作九辨則招魂亦當在屈原所著之數當為二十六矣不知退之王逸之言何所據耶杜子美栢中允除官制詩舊註以為栢耆又以為正節按杜詩云紛然喪亂際見此忠義門蜀中㓂亦甚栢氏功彌存三止錦江沸獨清玉壘昏當是有功於蜀者方是時叚子璋反於上元徐知道反於寳應而正節為卭州刺史數有功則是正節無疑矣杜集又有栢學士茅屋栢大兄弟山居詩議者皆以謂正節之居然詩中殊不及功名之事但皆稱其為學讀書爾茅屋云古人已用三冬足年少今開萬巻餘山居云山居精典籍文雅渉風騷疑是卭州立功之前丹陽集黄魯直詩云世有捧心學取笑如東施梅聖俞云曲眉不想西家様餒腹還須二子清太平寰宇記載西施事云施其姓也是時有東施家西施家故李太白效古云自古有秀色西施與東鄰而東坡代人留别詩乃云絳蠟燒殘玉斚飛離歌唱徹萬行啼他年一舸鴟夷子應記儂家舊姓西似與寰宇記所言不同豈為韻所牽耶同上張無盡嘗和山字云安得將相似仲山人疑之以近人所常用皆山甫也觀後漢志陽樊攅茅田服􅐚注云楚仲山所居又楊脩答臨淄侯牋云仲山周旦之儔只稱仲山何疑之有黄常明坡記王陵過賈逵廟呼曰賈梁道我大魏之忠臣也及司馬景王病夢逵為祟因為詩曰嵇紹似康為有子郄超畔鑒似無孫如今更恨賈梁道不殺公閭殺子元盖怪梁道忠義之靈不能自已其子元之惡按晉紀王賈所擾者乃宣帝名懿字仲達非景帝子元也䂬溪正訛門天闚象緯逼雲卧衣裳冷世傳古本作天闚今從之莊子以管闚天正用此字舊集以作闕又或作闗今不取盖先生詩該衆美者不惟近體嚴於屬對至於古風句對者亦然觀此詩可見矣近人論詩多以不必屬對為髙古何耶故詳論之以俟知者焉杜詩正異海右此亭古濟南名士多濟南實海右諸郡舊集一作海右今從之正文作海内非也拂天萬乗動觀水百丈湫拂字從一作兼畫馬詩有云翠華拂天來向東正文作沸非也君臣留歡娛樂動殷嶱嵑殷從上聲嶱嵑出文選音渴曷集韻山貌舊集作殷湯嶱音字皆悞盖縁湯字之訛二字從而倒之兼他詩二字悞倒之者非一豈知秋禾登貧窶有倉卒别本禾字一作未今從之按此詩十一月作禾字明矣昌黎謂年登而妻啼飢實此意也隂風西北來惨淡隨回紇紇字從一作鶻唐史徳宗朝始改名回鶻正文非也中興諸將收山東㨗書夜報清晝同夜字從王介甫謂㨗書晝夜至也舊作日今不取花門天驕子飽肉氣勇决諸詩之言花門者皆回紇也舊集作北門盖由字畫小誤唐以太原為北門非謂回紇明矣卒章申言花門也渡河不用船千騎常撇捩撇捩疾貌大食刀歌云鬼物撇捩辭沆壕字意皆同今從之舊集作撇烈非也嬋娟碧蘚静蕭摵寒籜聚蘚字從别本舊集作鮮盖字畫小缺而釋者因云嬋娟碧鮮皆謂竹也尤謬長夜苦寒誰獨悲杜陵野老骨欲折此成都詩舊集作長安非也其夜字之訛故悞作安耳况卒章之意明甚南京亂初定所向邑枯槁邑字從别本他詩亦云朝野色枯槁正文作邑今不取樹枝有鳥亂棲時瞑色無人獨歸客棲字從一作正文作鳴今不取言亂棲則鳴可知矣髙皇亦明王魂魄猶正直皇字舊集諸本皆作堂近見别本作皇今從之乃與上下數聨詩意相貫也詢之閬人其漢髙祠廟今尚存焉别離重相逢偶然豈足期足字舊集作定盖由字畫小訛况上句已云泄雲無定姿悲䑓蕭颯石巃嵸哀壑杈枒浪呼洶浪字作别本考兩句屬對之工當用一實字又别本下句作二鶯猛胸絛徐墜字亦未通主守問家臣分朋見溪畔耘者必分朋曹而進故東坡逺景樓記謂耘者畢出數百人為曹者是也舊作明乃字小訛耳風吹巨焰作河漢騰烟柱諸本下句作何掉騰烟柱蜀本何作河近見别本今從之盖於詞意通也合昏排鐡騎清曉散錦幪幪字從又有他詩有云駑駘怯錦幪乃覆馬之物正文作􅐒非也大火運金氣荆揚不知秋火字從一作謂大火西流七月詩也正文作暑今不取終然契真如得匪金仙術二句並從一作正文作終契如徃還得匪合仙術今不取㡬度寄書白塩北故人贈我青絲裘絲字從一作縑别本正文止作絲字此詩寄裴施州者或謂裴冕非也按唐史冕以寳應元年貶施州刺史不數月移澧州距此已六年矣配極𤣥都閟憑髙禁籞長籞字舊集諸本皆作禦按西溪宣帝紀云池籞者其字從竹今從之尸鄉餘土室誰話呪雞翁誰話從呪雞事見列仙傳正文作雞說乃字之訛也咒字一作喌音州又音祝茂樹行相引連山望忽開茂字連山字皆從一作時歸鳯翔行在正文連山作蓮峰非也霧樹亦然掖垣竹埤梧十尋洞門對霤常隂隂霤字從别本文選云二堂對霤此春深詩也而諸本作雪悞矣江上小堂巢翡翠苑邉髙塜卧麒麟苑字從一作正文作花盖字畫小訛而說者云一詩連用三花字不害為工誤矣雲斷岳蓮臨大路天晴宫栁暗長春大路陜華間地名也晉書檀道濟從劉裕伐姚泓至潼關姚鸞屯大路以絶道濟粮道而蜀本正作大道誤矣馬驕朱汗落胡舞白題斜朱汗已見他詩舊作珠乃衍文也白題從一作西漢云斬胡白題將字義與雕題同正文作蹄非也力疾坐清曉來詩悲早春詩字從别本考詩題與上下句意當從之舊作時非也峽雲籠樹小湖日蕩船明蕩字從一作非久游江湖者不知此字之工正文作落盖字訛也合觀却笑千年事驅石何時到海東題云觀造竹橋即日成句中合觀字謂聚觀橋成之速而笑驅石之誕舊集諸本皆訛作歡非也詩話總龜後集巻十八欽定四庫全書詩話總龜後集巻十九宋阮閱撰隠逸門世人謂淵明皆以其専用肥遯初無康濟之念能知其心者寡也嘗求其集若云歳月擲人去有志不獲騁又有云猛志逸四海騫翮思逺翥任苒歳月頽此心稍已去其自樂田畆乃巻懐不得已耳士之出處未易為世俗言也陽秋瓢之為器貧者所用故顔子以一瓢飲而揚子比之山雌文康公築室泛山溪上闔門千指朝虀暮塩未嘗敢以貧為病嘗因溪結亭號曰瓢飲盖欲少見慕賢好古安貧樂道之意予嘗有詩云我不學許由隠烟霧得瓢不飲惟掛樹又不學徳義居虎邱帶瓢入市多騎牛分無玉甌嚢古錦病渴文園只瓢飲下瞰金溪新結亭未須引吸如長鯨但願金溪化為酒歳歳持瓢醉花栁杜尋苑十隠居云侍立小童清義山憶正一云烟爐銷盡寒燈晦童子開門雪滿松子厚云日午獨眠無餘聲山童隔竹敲茶臼秀老云夜深童子喚不起猛虎一聲山月髙閒棄山間累年頗得此數詩氣味陳搏負經綸才歴五季亂離游行四方志不遂入武當山後隠居華山自晉漢以後毎聞一朝革命嚬顣數日人有問者瞪目不答一日方乗驢游華隂市聞太祖登極驚喜大笑問其故又笑曰天下自此定矣太祖方潜龍時摶嘗見天日之表知太平之有自矣遯迹之初有詩云十年蹤跡走紅塵回首青山入夢頻紫閣縱榮争及睡朱門雖貴不如貧愁聞劍㦸扶危主悶見笙歌聒醉人携取舊書歸舊隠野花啼鳥一般春豈淺人也哉邵伯温易學辨惑陳摶周世宗嘗召見太平興國初再召赴闕太宗賜詩云曽向前朝出白雲後來消息杳無聞如今若肯隨徴召總把三峰乞與君先生服華陽巾草屨垂絛以賔禮見賜坐澠水燕談康節除祕書省校書郎潁州團練推官辭不許既受命即引疾不起且以詩答鄉人曰平生不作皺眉事天下應無切齒人斷送落花安用雨裝添舊物豈須春幸逢堯舜為真主且放巢由作外臣六十病夫宜揣分監司無用苦開陳言行録後復再召摶辭曰九重仙詔休教丹鳯㗸來一片野心已被白雲留住辯惑种放别業在終南山後生從之學者甚衆性頗嗜酒躬耕種秫以自釀所居有林泉之勝殊為幽絶真宗聞之遣中使携畫工圖之開龍圖閣召輔臣觀焉上欲賞之其後復聞魏野居有幽致帝亦遣人圖之故野有詩云幽居帝畫㸔澠水燕談張横渠八翁吟詩十首歩虚聲裏八竒翁八竒須信古英雄賔朋未散山翁醉聽歌同入醉鄉中傅巖巖下築岩翁幽通心與帝心通憂勤未感思賢夢為霖何日見成功磻溪溪畔釣魚翁濯纓溪水聽溪松龜猷未告非熊兆漁簑堪笑老龍鍾老原原上卜年翁感天功業動天聰流言未信成王悟悟成全得起禾風龜山山下感麟翁麟翁知己㡬時逢自從顔孟希蹤後㡬人今日更希蹤青牛西去伯陽翁當年夫子歎猶龍立言為恐真風喪豈知言立喪真風寓言豪誕漆園翁誇談名理浩無窮早知懸解人間世争知懸解不言中一身無碍竺乾翁遍員身關戒身同船師從我乗桴去頑空中與指真空褒中斜谷卧龍翁量如江海氣如虹不應三顧逢先主至今千載慕冥鴻籃輿多病八吟翁雲僧溪叟恣逰從清時無事青山醉青山仍醉最青峰處士魏野字仲先陜州人居於東郊架草堂有水竹之勝好彈琴作詩清苦多聞於時前後郡中皆所禮遇上祀汾隂召之辭疾不至野以詩贄公曰從前輔相皆頻出獨在中書十五秋泰岳汾隂俱禮畢這回好伴赤松遊公覽之喜形於色以酒茗藥物為答素編先公遺札有公自寫此詩數本王文正公遺事旦得詩感悟以疾屢辭政柄遂拜太尉玉清昭應宫使又曰魏野謂冦凖曰自古功名盖世少有全者因與詩曰好去上天辭將相歸來平地作神仙及貶始悔不用野之言云仁宗政要復齋漫録云晉皇甫謚髙士傳載四皓見秦政虐乃避入藍田山作歌曰漠漠髙山深谷逶迤煌煌紫芝可以療飢唐虞世逺吾將安歸駟馬髙盖其憂甚大富貴之畏人不如貧賤之肆志林逋字君復居杭州西湖之孤山真宗聞其名賜號和靖處士詔長吏歳時勞問逋工於畫善為詩如梅花詩云踈影横斜水清淺暗香浮動月黄昏評詩者謂前世咏梅者多矣未有此句也及其臨終為句云茂陵他日求遺藁猶喜初無封禪書尤為人稱誦自逋之卒湖山寂寥未有繼者歸田録又青箱雜記云逋景祐初尚無恙范文正公亦過其廬贈逋詩曰巢由不願仕堯舜豈遺人又曰風俗因君厚文章到老醇其激賞如此言行録武夷之溪東流凡九曲而第五曲為最深盖其山自北而南者至此而盡聳全石為一峰㧞地千尺上下平處微戴土生林朩極蒼翠可玩而四隤稍下則反削而入如方屋㡌者舊經所謂大隠屏也直屏下兩麓相抱之中西南向為屋三間者仁智堂也堂左右兩室左曰隠求以待棲息朱氏隠求室詩曰晨牕林影開夜枕山泉響隠去復何求無言道心長邱氏詩曰抱膝小牕深讀書空谷響一笑有會心紛紛自消長項氏詩曰種桑不療寒蒔粟長苦飢飢寒雖自有但使願無違袁氏詩曰本是山中人歸作山中友豈同荷蓧老永結躬耕耦浮雲一出岫膚寸彌九有此志未可量見之千載後劉平父詩曰寧懐棲遯情閒袖經綸手風雲倘未期猿鶴且為友萬氏詩曰平生區中縁中歳從黄綺出處本無心誰云今隠几黄子厚詩曰隠側混樵牧堅髙存聖功懐哉得所尚一瓢從屢空韓氏次櫂歌韻宛宛溪流叠九灣山猿時下鳥關關釣磯茶竈山中樂大隠屏邉日月閑淮南小山作招隠極道山中窮苦之狀以風切遁世之士使無遐心其㫖深矣其後左太冲陸士衡相繼有作雖極清麗顧乃自為隠遁之辭遂與本題不合故王康琚作詩以反之雖正左陸之悞而所述乃老氏之言又非小山本意也十月十六日夜坐許生挾琴過予書堂夜久月明風露凄冷生揮絃度曲聲甚悲壯既乃更為招隠之操而曰榖城老人嘗欲為予依永作辭而未就也予感其言因為推本小山遺意戯作一闋以反之口授許生冩呈榖城老者諸名勝請共賦之以備異時山中故事云南山之幽桂樹之稠枝相樛髙拂千厓素秋下臨深谷之寒流王孫何處扳援久淹留聞說山中虎豹書嘷聞說山中熊羆夜咆叢薄深林鹿呦呦獮猴與君居山鬼伴君遊君獨胡為自聊音留歳云暮矣將焉求思君不見我心徒離憂南山之中桂樹秋風雲㝠濛下有寒栖老翁朩食澗飲迷春冬此間此樂優遊𦕈何窮我愛陽林春葩晝紅我愛隂崖寒泉夜淙竹栢含烟泊青葱徐行發啇歌安坐撫孤桐不問簞瓢屢空但把明月甘長終人閒雖樂此心誰與同南山之阿桂樹婆娑雲嵯峨下䕃連蜷舊柯秋思渺渺秋風多王孫不見扳援時寤歌我思岑寂空山良宵月華詰曲前溪春流迅波秀朩盤紆雜青莎猿猴慕熊羆麋鹿友麚荒忽淹留奈何思君使我長咨嗟人間歳月驚心易蹉跎長幽居中林散髪披襟山􅏟崟慰此栖遲素心渌渏一曲傳清音超然忘世誰能共浮沉或逺汲寒溪烟雨晝隂獨宿空齋哀猿夜吟竹栢揺風更蕭森春蘭得芳紉秋菊伴孤斟此意寧論古今勸君與我同􅄬簮倘徉歸去歌谷雲深右反招隠恬退門蔡寬夫詩話云乖崖少喜任俠學擊劍尤樂聞神仙事為舉子時嘗從陳希夷欲分華山一半希夷以紙筆蜀牋贈之公笑曰吾知先生之㫖矣殆欲驅我入閙處乎然性極清介居無妾媵不事服玩朝衣之外燕處惟紗㡌皂絛一黄土布裘而已至今人傳其畫像皆作此餙始及第時嘗以詩寄傳霖逸人云前年失脚下魚磯苦戀明時不忍歸為報巢由莫相笑此心非是愛輕肥李順之辭乖崖帥蜀有詩寄陳希夷云性愚不肯住山林剛要清流擬致君今日星馳劍南去回頭慚愧華山雲皆真素志也復齋漫録云唐人詩有意効承平無功答盛明灰心縁忍事霜髩為論兵道直身還泰恩深命轉輕梅塩非擬議葵藿是平生白日長垂照青蠅謾發聲嵩陽舊田地終擬俟歸耕中書後堂闕軒西壁有題灰心霜髩之句者騐其筆迹舊相李公廸之書也李入相時邉兵未動意在忍事之語元獻中書即事詩叙其事云惨惨髙槐落凄凄餘菊寒粉牆多記墨聊為拂塵㸔正為此也苕溪漁隠曰蔡寛夫詩話以灰心縁忍事霜鬂為論兵之句是裴晉公作李文定嘗親書於中書壁間蔡寬夫詩話云正獻公以清徳直道聞天下而風姿尤竒古年近七十髪髩皤然無一莖黒者居相位未㡬以歳旦請老一章得謝退居睢陽歐陽文忠公未顯時正獻推薦特厚及文忠為留守日與公酧唱文公有答公見贈末章云報國如乖願歸耕寧買田期無辱知已肯逐利名遷熈寧初文忠致政歸汝隂時正獻捐舘已十有五年矣文忠復用前詩題其祠堂云門生今白首墓朩已蒼烟報國如乖願歸耕寧買田此言今始踐知不愧黄泉苕溪漁隠曰昭陵諸臣傳云慶厯四年拜中書門下平章事每内降與恩澤者積數十而面納上前上嘗謂諫官歐陽脩曰外人知衍封還内降吾居禁中有求恩者每以衍不可告之而止者多於所封還也由是僥倖不說出知兖州明年正旦上表曰臣年七十願還上印綬乃以太子少師致仕議者謂故相一上章得請以三少致仕皆非故事盖宰相賈昌朝疾之蔡寬夫云正獻居相位未㡬以歳旦請老不言鎮東魯盖闕文也迂叟詩話云王太尉旦從車駕過陜魏野貽詩曰昔時宰相年年替君在中書十一秋西禮東封俱已了如今好伴赤松遊王袖其詩以呈上累表請退上不許苕溪漁隠曰余按三朝正史云旦登柄用十八年為相僅一紀素嬴多疾又以名位太重憂畏不自安連歳拜章求觧上素重其徳望聞其引退甚不樂優詔褒答繼以面諭旦一日獨對滋福殿令左右扶掖而升復求遜位上覩其痩瘁閔然許之則迂叟詩話以為上不許盖悞矣其蔡寛夫詩話云遂得謝此言良是蔡寬夫詩話云萊公自永興被召魏野以詩送之曰好去上天辭富貴却來平地作神仙王文正從東封回野亦寄以絶句云西祀東封今已了好來相伴赤松遊文正袖此詩求退遂得謝萊公晚歳南遷世多言不能如文正用野言盖志士仁人以各有志觀萊公末年所為豈愧文正也哉山人處士其言不如此或用或不用各繫其人要之不溺於富貴以貪得則一也野子亦有父風宋景文嘗贈以詩云姓名髙士傳父子少微星詩話總龜後集巻十九欽定四庫全書詩話總龜後集巻二十宋阮閲撰}
