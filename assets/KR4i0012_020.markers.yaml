  - {type: variant, offset: 3731, length: 0, content: '', WYG: 属不行韋乃從歸頭陀寺荆寶遣玉簫住来年稍長乃與韋歡後為廉使陳常侍發遣歸舟人趣行乃以書别荆寶荆寶與玉簫同至相約曰逺不踰六七年當取玉簫歸因留玉簫指環一枚并詩曰黄雀啣来已數春别時難曽贈家人長江不見雙魚至為遣相思夢入秦李納尚書夜登越城樓聞歌曰鴈門山上鴈初飛其聲激切公召至乃去藉之妓盛小叢也梁園供奉南不嫌女甥所唱者乃不嫌昔所授也崔元範自幕府拜侍御史餞於鑑湖光候亭命小叢歌餞坐客各賦詩送之李尚書曰綉衣奔命去情多南國家人歛翠娥曽向教坊聽國樂為公重唱盛叢歌崔御史曰相公留宴峴山亭洛浦髙歌午夜清獨向柏䑓為老吏可憐林朩响餘聲楊判官曰燕趙能歌有幾人落花回雪似含嚬聲隨御史驄歸去誰伴文翁過九春彦升曰蓮府纔為緑水賔忽乘􅍡馬入咸秦為公唱作西河調日暮偏傷去住人盧業支使曰何郎戴豸别賢侯更吐歌珠宴庾樓莫道江南不同醉即陪舟楫上京㳺舉子髙湘曰謝安春渚餞名卿千里仁風一扇清歌黛惨時方酩酊不知公子重飛觥盧溵處士曰烏䑓上客紫髯公共捧天書静鑑中桃葉不湏歌白苧耶溪日暮起樵風崔下句云獨向柏䑓為老吏皆曰御史即其任也何老於柏䑓衆請改之崔曰某但止於此任寧望九遷乎是年秋鞠獄譙中而卒是終於柏䑓之任也並古今詩話劉夢得送人下第詩云今此卜行日髙堂應夢歸莫将和氏淚滴向老萊衣又有詩云新詩一聮出白髪數莖生榜情詩話總龜巻四十一欽定四庫全書詩話總龜巻四十二宋阮閱撰怨嗟門王元之精於四六同時在玉堂而大拜者元之啓賀曰三神山上曽陪鶴駕之㳺六學士中空有漁翁之嘆以白樂天甞有詩云元和六學士五相一漁翁青箱雜記怨婦不知其姓既笄受幣於姨兄馬生父没繼母渝其約改適母之族兄老而猥惡居官納賄以罪犯為五羊民掾舟過英州庸良醉卧婦因題三絶於馹亭初與馬絶馬作詩貽婦人曰急水浮花入亂流濃雲遮月暗西樓風流忿恨知多少但㸔青春已白頭婦荅詩曰金丸打折鶼禽翼利刃偏傷連理枝自古一床無两好如今方信昔人詞題馹亭曰情若秋雲歸故國夢隨瘴月過梅峰誰将此骨埋煙隴寂寞魂㳺山霧中翰府名談髙蟾累舉不第有詩云月桂數條榰白日天門幾扇鎻明時陽春發處無根蔕憑仗東風次第吹怨而切又下第上主司馬侍郎詩云天上碧桃和露種日邉紅杏倚雲栽芙蓉生在秋江上不向東風怨未開人頗憐其意明年李昭知舉遂擢第詩史王元之以尼道安事謫黄州盖為盧崖州所譛也有詩云敢向台階問罪名後有以事貶黄州者有詩云魏能下面㸔花衘魏能以軍功黄州刺史同上陳羽有詩百餘首古意一篇集中所無其詞云十三學繡羅衣裳自憐紅袖聞馨香人言此是嫁時服含笑不語雙鴛鴦郎年十九髭未生拜官天下聞聲名車馬駢闐賀門舘自然不失為公卿是時妾家尤未貧兄弟出入雙車輪繁華全盛两相敵與郎年少為婚姻郎家居近御溝水豪門客盡躡珠履彫盤酒器常不乾曉入中厨妾先起姑嫜嚴肅有規矩闕小娘嬌意難取朝㕘暮拜白玉堂綉衣着盡黄金縷妾貌漸衰郎漸薄時時強笑意索寞知郎本來無嵗寒幾回掩淚看花落妾年四十絲滿頭郎未五十封公侯男兒全盛日忘舊銀床羽帳空􅀈􅀈庭花紅遍蝴蝶飛㸔郎佩玉下朝時歸來略略不相顧却令侍婢生光輝郎恨婦人易衰老妾亦恨深不忍道㸔郎強健能幾時年過六十還枯槁詩史陜郊有唐昭宗詩曰何處有英雄迎歸大内中又曰紇干山頭凍殺雀何不飛去生處樂讀之令人變色昭宗在河東作菩薩蠻云登樓延望秦宫殿茫茫不見雙飛燕渭水一條流千山與萬邱野煙生碧樹陌上行人去何處有英雄迎歸大内中今云詩未知孰是南唐元宗優待藩邸舊僚馮延已自元帥府書記至中書侍郎遂相時論以為非才江文蔚因其弟延魯福州亡敗請從退削乃出撫州秩滿還朝因赴内宴進詩曰青樓阿監應相笑書記登壇又却回韓渥天復中車駕幸鳯翔渥以扈從功反正初昭宗靣許渥為相渥奏云運契中興冝復用重徳鎮風俗因薦右僕射趙崇時梁祖在京馳入請見具言崇長短昭宗曰趙崇是韓渥所薦渥時在側梁祖叱之三奏曰臣不敢與大臣争渥尋出閩中渥有詩曰手風慵展八行書眼暗休㸔九局圖窓裏日光飛野馬按頭筠管長蒲蘆謀身拙為安虵足報國危曽捋虎鬚舉世可能無黙識未知誰擬試齊竽並同上孫定字至光涪州大戎之族子長於修定數舉矣而修方就貢或訪於定定謔曰十三儀表堂堂好箇将軍何湏以科第為意修頗衘之後修貴逹未甞言定長短晚年喪志放意酒盃景祐二年下第逰京師出開逺門醉中作詩曰行行淚血洒塵襟事逐東流渭水深私跨蹇驢風尚𦂳静投孤店日方沉一枝猶挂東堂夢千里空馳北巷心明月悲歌又前去滿城煙樹噪春禽同上玉階怨李詞云玉階生白露夜乆侵羅襪却下水晶簾玲瓏望秋月長相思詩云悠悠我思又曰靡日不思蘇子卿詩云生當復來歸死當長相思生别離楚詞曰悲莫悲於生别離古詩云行行重行行與君生别離相去萬餘里各在天一涯怨歌行李白亦有此作一作長安見内人出嫁令予代為怨歌行其詞曰十五入漢宫花顔笑春紅君王選玉色侍寢金屏中薦枕嬌夕月捲衣戀春風寧知趙飛燕奪寵恨無窮沉憂能傷人綠髩成霜蓬一朝不得意世事徒為空鷫鸘換羙酒羣衣罷雕籠臨寒不忍言為君奏絲桐腸斷聲已絶悲心夜忡忡獨不見李白云白馬誰家子黄塵邉塞兒天山三丈雪豈是逺行時春蕙忽秋草莎雞鳴曲池風催寒梭響月入霜闗悲憶與君别年種桃齊蛾眉桃今百餘尺花落成枯枝終然獨不見流淚空自知白頭吟相如将聘茂陵女為妾文君作白頭吟以自絶相如乃止故李白辭云頭上玉燕釵是妾嫁時物贈君表相思羅袖幸時拂莫捲龍顔席從他生網絲且留琥珀枕還有夢來時此最為警䇿藁砧藁砧今何在藁砧砆也問夫何處山上復有山重山為岀字言夫已出何當大刀頭刀頭有環問何當來還破鏡飛上天言月半當來也七哀詩曹子建釋詩者謂病而哀義而哀感而哀悲而哀耳目聞見而哀自歎而哀鼻酸而哀也巴東三峽歌三山峽七百里两㟁連山略無闕處重巖叠嶂隠蔽天日自非亭午夜分不見日月其漁父歌曰巴東三峽巫峽長猿啼聲苦淚沾裳别鶴操商陵牧子作也娶妻五年而無子父兄為之改娶妻聞之中夜起倚户而悲嘯牧子聞之愴然而歌将乖比翼隔夭端山川悠逺路漫漫攬衣不寝食不飡後人因為樂章焉並見樂府集劉子儀與夏英公同在翰林子儀表為先逹章獻臨朝子儀主文在貢院聞英公為樞宻副使意頗不平作堠子詩曰空呈厚貌臨官道更有人從捷徑過閑居主話周總福州人天禧二年因事逰京師值詔下奔郷薦不及有故人在譙郡守官遂往投之倚為拔觧之地而國家申嚴條約不許寄籍郡有司吏周吉者頗殖涯産捴遂拜為父吉欣然納之齒于諸子三代名諱亦從而更焉或人問吉則對以此子當年與母氏俱斥近召歸捴亦以是對秋預薦未幾逹于郷父乃馳詩一絶寄之遂不敢南歸因此慚恨而卒詩曰文章不及林洪範徳行全虧李坦然若拜他人為父母直湏焚却蓼莪篇各族重京官而輕外任故楊闕上建節後詩云抛却弓刀上砌䑓上方樓殿彩雲開山僧見我衣裳窄知道新從戰地來又云如今老去騎官馬羞向關中道姓楊楊行敏出使馹騎到劍州郡将輕忽慊恨尤甚題詩於冬青館云駑駘嘶呌知無定騏驥低垂自有心山上髙松溪畔竹清風纔動是知音又云杜鵑花裏杜鵑啼淺紫深紅更傍溪遲日霽光搜客思曉來山路恨如迷南部新書張又新郎中與楊處州友善楊妻李氏即庸相之女有徳無色楊未甞介意張甞語楊曰我少年擅羙名不復仕宦惟得羙室平生足矣既成婚殊失所望乃作牡丹詩云牡丹一朶直千金将為後來色最深今日滿園開似雪一生辜負看花心唐女真蕙蘭有才思咸通中為李億補闕侍婢愛衰後𨽻咸冝觀為女道士有怨李詩曰易求無價寶難買有情郎又有云蕙蘭消歇歸春圃楊栁東西絆客舟呉楊氏為宋齊邱閉於泰州永寧宫有詩曰江南江北舊家郷六十年來夢一場吴苑樓䑓皆冷落廣陵宫闕亦凄凉雲凝逺岫愁千片雨打孤舟淚兩行兄弟四人三百口不堪端坐更思量江南野錄謂此是李煜所作未知孰是並古今詩話戴衢乆不第甞夜吟曰擾擾東西南北情何人於此悟浮生還縁無月春風夜暫得獨聞流水聲又云坐落干門日吟殘午夜燈盧懐杼情鄭還古為河中從事為同院所誹謗貶吉州掾道中為望思䑓詩云䜛語能令骨肉離姦情難測事堪悲何因掘得江充骨搗作微塵祭望思又云吉州新置掾馳馹到條山薏苡殊非謗羊腸未是艱自慚多白髪争敢競朱顔苦有前生債今朝不懊還同上盧羣玉落托江湖不第縱情詩酒有詩曰酒㵼銀瓶到底清夜深絲竹鳯凰鳴紅粧醉起一花落更引春風無限情又投盧尚書詩曰無力不任為走役有文安敢滯清平從來若把耕桑定免恃彫䖝悮此生南部新録李山甫咸通中不第後流落河朔為樂彦正從事甞有悲怨執政曰勸君不用誇頭角夢裏輸嬴捴未知郎申自𤓰州宣事回進合歡水果一器煬帝以一雙令小黄門馳賜絳仙馬急揺觧絳仙拜賜泫然因附紅牋小簡進詩云馹騎傳雙果君王寵念深寧知辭帝里無復合歡心煬帝省之不悦顧黄門黄門懼拜而言意乃觧張安道舉進士再失意而作歌曰休休歸去休清風釣艇明月酒樓公不見冦相丁相雷州崖州休休歸去休景祐元年中茂材異等復又中賢良方正朱定國歸田録杜牧舎人罷任浙西郡道中有詩曰鏡中絲鬂悲来慣衣上塵痕拂漸難惆悵江湖釣魚手却遮西日向長安與杜甫齊名時號大小杜郡閣雅談唐文宗大和元年誅王涯鄭注後仇士良秉權或登臨㳺幸往往獨語左右莫敢進問因題詩曰輦路生秋草上林花滿枝憑髙何限意無復侍臣知古今詩話詩話総龜巻四十二欽定四庫全書詩話總龜巻四十三宋阮閲撰傷悼門雷有終自平蜀後人為立祠又甞以私財犒士貧不能足貸錢以給比捐舘舎時尚欠三萬緡章聖特出内帑錢償之故魏仲先悼有終詩曰聖代賢臣䘮何人不惨顔新祠民祭祀舊債帝填還鹵簿塵侵暗銘旌淚洒班功名誰可繼勅𦵏向家山青箱雜記杜子羙自蜀走湘楚卒扵耒陽時人謂以牛肉白酒脹飲而死則非也僧紹員詩曰賢人失志古來有牛肉因傷是也無耒陽宰詩曰詩名天寶大骨𦵏耒陽空耒陽有子羙墳時人謂聶令空堆土也唐人詩曰一夜来江南百年工部墳楊遺北朝多有文籍亦以文雅相尚王矩為工部郎中本燕人為北将耶律㤀其名管書記常從其出入耶律兄及其兄之子太平興國中戰沒於大郡後耶律經舊戰處覽其遺迹作詩矩記其两句云父子盡從虵陣沒弟兄空望鴈門悲談苑徐寅興化軍莆田人以祕書省正字歸老郷里既死節度使王延賔以詩哭之曰延夀溪頭歎逝波古今人事半銷磨昔除正字今何在所謂人生能幾何延夀溪寅所居也詩史李逺體物緣情皆謂臻妙甞有贈筝妓伍卿詩云輕輕沒後更無筝玉腕紅紗到伍卿坐客滿筵都不語一行哀鴈十三聲咏鴛鴦云鴛鴦離别傷人意似鴛鴦試取鴛鴦看多應寸寸腸故人盧尚書哭李詩云昨日舟還浙水湄今朝丹旐欲何為纔收北浦一竿釣未了西齋半局棊洛下已傳平子賦臨川争冩謝公詩不堪舊里經行處風朩蕭蕭鄰笛悲郡閣雅談江鄰幾善為詩清淡有古風蘇子羙坐進奏院事謫官後死吴中江作詩云郡邸獄寃誰與辨臯橋客死世同悲用事甚精甞有古詩云五十踐衰境如我在明年論者謂人莫不用事能令事如已出天然渾厚乃可言詩江天資淳雅喜飲酒鼔琴圍棋人以酒召之未甞不醉已醉眠人强起飲之亦不辭也或不能歸即宿人家商度風韵陶靖節之比云江甞通判盧州有酒官善琴以坐務不得出江旦旦就之郡中沙門道士及里畎能棋者數人呼與同往郡人見之習熟因畫為圗前列趨道一人騎馬青盖其後沙門道士褐衣數人葛巾芒履累累相尋意思蕭散惜時無名手此畫不足傳後何减稽阮也唐賢杼情竇鞏工為絶句甞從軍有别家詩云自笑儒生着戰袍書齋璧上掛弓刀如今便是征人婦好織廻丈寄竇韜又悼妓東東一篇云芳菲美艷不禁風未到春殘已墜紅惟有側輪車上鐸耳邉長似呌東東盧懐杼情令孤楚宫人斜詩云唯應四仲祭使者暫悲嗟又白時詩序云自刑部員外郎出得累厯方鎮携挈隨逐又有茈菰花芹花詩亦唐賢所罕詠者雜志李郢甞與賈島僧無可逰島沒長江僧亦返初郢感歎題曰却到京師事事傷惠林歸寂賈生亡何人收得文章篋獨我来經苔蘚房一命未沾為逐客萬縁初盡别空王蕭梢竹塢斜陽在葉覆閑堦雪擁墻雜談孟郊卒韓吏部作誌諡曰正耀先生賈島哭之詩曰身沒聲名在多應萬古傳寡妻無子息破宅帶林泉塚近登山道詩隨過海舡故人相弔處斜日下寒天摭言荒梁城南奉先寺後宫羙人官葬此角樓相望髙起墳草間柏下多石人秩卑焚骨不作塜青石浮屠唱邱壠家家墳上作享亭朱門相向無人聲樹頭土梟作人語月黒風悲鬼揺樹宫中養女作子孫年年犢車來作主廢后陵園官道側家破無人掃陵域官家嵗給半千錢街頭買餅作寒食此張文潜題奉先寺詩􅄯以道甞與江子之言文潜近來詩不堪好子之因誦此詩以對以道云莫不是文潜詩否洪駒父有過李公擇尚書墓一篇其間云鹿場兎逕白晝静稻壟松闗青嶂深說者以為大逼老杜邢居實字惇夫年少豪邁所與逰皆一時名士方年十四五時甞作明妃引末句云安得壮士霍嫖姚縳取呼韓作編户諸公多稱之既卒余收拾其殘章編成一集號曰呻吟集惇夫自少便多憔悴感慨之意其作秋懷云髙歌感人心心悲将奈何其作棗陽道中詩云有意問山仙此生更来否已而果卒於漢東惇夫之卒也山谷以詩哭之云詩到年来更老成江山為助筆縱横眼看白骨埋黄土何况人間父子情盖惇夫與其父歆向也蔡天啓亦有詩云人物於今歎𣺌然孤墳宿草已生煙日暮行人道傍㑹應逢年少共談𤣥其餘作者甚衆皆載於呻吟集後邵堯夫之弟名睦者無疾而化前此有重九詩云擬問東籬事東籬事𣺌茫后果殯於東籬之下故堯夫哭之云自兹明月清風夜蕭索東籬看斷膓又云腸斷東籬何所尋東籬從此事沉沉余於一雜編中見有書郵亭事既不曉其誰作但觀其詩有足哀者故載之於此其末云周仲羙不知何許人自言世居京師父㳺宦家于成都既而適李氏子侍舅姑宦泗上從良人赴金陵幕偶因事棄官入華山有長住之意仲羙即寄身合淝外祖家方求歸未得㑹舅􅃍調任長沙不免供載而南雲水茫茫去國益逺形影相弔洒涕何言因書所懐于壁詩曰愛妾不愛子為問此何理棄官更棄妻人情寧可已永訣泗之濵遺言空在耳三載無朝昬孤幃淚如洗婦人義從夫一節誓生死江郷感殘春腸㫁晚煙起回望太華峰不知幾千里並王直方詩話梅聖俞至寧陵寄余詩云獨護慈母喪泪與河水流河水冬有竭淚泉常在眸彦獻持國譏其作詩太早余應之以蓼莪及傳威贈王何二侍郎詩雜誌劉洞不知何許人江南國破後題池州一亭云千里長江唯渡馬十年養士得何人詩史白樂天去世人以詩弔之曰綴玉聮珠六十年誰教𡨕路作詩仙浮名不繫名居易造化無為字樂天童子觧吟長恨曲胡兒能唱琵琶篇文章已滿行人耳一度思鄉一愴然韓文公少年受蕭存吏部知賞及自袁州回入國子祭酒道經江州因逰廬山過吏部山居知諸子凋零惟二女在焉作詩曰中郎有女能傳業伯道無兒可保家今日廬山過舊隠空将衰淚落煙霞張祜性酷好太湖石三吴太守多以贈遺之故陸魯望以詩哭之曰一林石筍散豪家顧况字退翁暮年有一子字非熊忽暴亡况哀悼不勝乃作詩曰老人喪愛子日暮淚成血老人年七十不作多時别非熊冥間聞之以情告冥官冥官憫之却令生於况家三嵗能言冥間聞父苦吟求再生事厯厯然長成應舉擢第盧延遜哭李郢端公詩曰軍門半掩槐花宅毎過猶聞哭臨聲北固暴亡兼在路東都權𦵏未歸塋漸窮老僕傭看馬着惨佳人暗裹筝詩侣酒徒消散盡一塲春夢越王城劉夢得虎邱山見元㣲之二年過題名愴然有感云滻水送君君不還見君題字虎邱山因知早貴兼才子不得多時在世間又有所嗟二首云庾令樓中初見時武昌春色似腰支相逢相識空如夢為雨為雲今不知鄂渚濛濛煙雨㣲女郎魂逐暮雲歸只應長在漢陽渡化作鴛鴦一隻飛石守道為國子監直講天下呼為徂徕先生作慶厯聖徳頌大為時所忌㑹徐賊孔直温叛搜其家有介書坐貶而卒時疑其詐死欲剖棺騐之近臣言介實死得免永叔一詩哭之曰埋猶不信死終免斵其棺揚章安云章安或為章亦誰道盖棺人事足是非猶及土中身劉夢得傷友人亡姫詩曰見學琵琶見藝成今來追想倍傷情撚弦花下呈新曲放撥燈前謝改名大抵好花終易落從來尤物不長生蘭䑓夜直衣衾冷雲雨無因入禁城劉得仁出入塲屋三十年卒無所成而逝僧西白以詩弔之曰忽苦為詩來到此氷魂雪魄已難招直教桂子落墳上生得一枝寃始消張禕侍郎有愛姬早亡念之不已猶子為右補闕因其入朝未歸為浣溪沙辭置於几上曰枕帳熏爐隔繡幃二年終日兩相思好風明月爾應知天上人間何處去舊歡新夢覺來時黄昏微雨畫屏垂禕見曰此必阿灰詞阿灰補闕小字也錢熈泉南才士也曽作四夷來王賦獻太宗愛其才又甞撰三酌酸文世稱精絶後亦不逹而故郷人李慶孫以詩弔之曰四夷妙賦無人繼三酌酸文舉世傳詩話唐武宗有才人孟氏甞對武宗泣下作何滿子而卒張祜作詩云偶因清唱詠歌頻奏入深宫十二春却為一聲何滿子下泉湏弔孟才人􅇵談録春國公主薨神考賜挽詞曰海濶三山路香輪定不歸帳深閑翡翠珮冷失珠璣明月留歌扇殘霞散舞衣都門送車反宿草自春菲曉發城西道靈車望更遥春風寒魯舘明月斷秦簫塵入羅衣暗香隨玉篆消芳魂無北渚那復可為招又曰慶自天源發恩從國愛深歌鐘雖在舘桃李不成春水折空還沁樓髙亦隔秦區區㑹稽市無復獻珠人冷齋夜話詩話總龜巻四十三欽定四庫全書詩話總龜巻四十四宋阮閱撰隠逸門章聖遣使詔魏野仲先聞使至留詩一聮于壁而􅃍去云洗硯魚吞墨烹茶鶴避烟使還以壁間詩對章聖曰野不求仕矣遂不召古今詩話内侍孫可久賦性淡薄年踰五十即乞致仕都下居第堂北有小園城南有圃毎以小車載酒優㳺自適石曼卿甞過其居贈詩曰南北占河潤幽深在禁城叠山資逺意辭俸買閒名閉戸㫁蛛網折花移鳥聲誰人識髙意朝野石渠生栁永詩曰孫侯幽隠直城東草朩扶踈一畆宫曾珥貂璫為近侍却紆絛褐作閑翁髙吟擁鼻詩懐壮雅論深情道氣充厭盡繁華天上樂始將蹤跡學冥鴻青箱雜記劉素字仲華好學不事科舉頗通馬班陳范之書甞有人貽之詩曰不甘五等諸侯薦直恐九重天子知然卒不及仕江南野録方干處士號缺唇先生有司以唇缺不可與科名遂隠居鑑湖作閑居詩曰寒山壓鏡心此處是家林梁燕欺春醉閒猿學夜吟雲連平地起月向白波沉猶自聞鍾角棲身可在深又曰世人如不容我自縱天慵落葉慿風掃秋粳任水舂花朝連郭霧雪夜隔湖鐘身在能無事頭冝白此峰又感懐云事業不得力至今猶苦吟吟成五字句用破一生心世路屈聲滿雲溪寃氣深前賢多晚達莫怕鬢霜侵鑑戒録隠士張楚居洛陽平康之南與李衛公别第為鄰山水竒秀楚風韻髙潔衛公當軸薦為左拾遺不起後出鎮過平原往訪之楚避於山谷衛公歎恨乆之題其門曰昔日趣黄詔余慚在鳯池今來招隠士恨不見瓊枝詩史張齊賢相公司空致仕歸洛康寧福夀得晋公午橋荘鑿渠通流栽花植竹日與故舊乗小車携觴逰釣牓於門曰老夫已毁裂冠冕或公紱垂訪不敢迎見甞以詩戯故人云午橋今得晋公廬水竹烟花興有餘師亮白頭心已足四登两府九尚書慕唐李太亮為人故字師亮同前康定間益州書生張俞甞獻書朝廷天下由是知其名然不喜仕進隠於青城山白雲溪時樞宻田况守成都與詩曰深慚蜀太守不及采芝人雲齋廣録程嵩字明甫延津人初舉不第遂不肯仕場屋年八十餘甞作詩曰雖無事業傳千古却得安閒過一生同上王鼎書歌詩好神仙事逰心物外時人或謂有所得問之終不洩露詩百餘篇傳於人間五言詩贈程明甫云古縣枕前灘官閒道自安執盃山鳥唱曬藥野􅆐看石縫横琴筆槎根揷釣竿不知陶靖節早晚入雲端又贈僧云出齋􅆐獻果烹茗鳥􅋦薪又題云風落桂枝驚鶴去水流山果向人來又送僧云孤雲蹤跡都無定岀個青山入個山王易簡蕭希甫下及第名居榜尾不看榜歸華山尋就山釋褐授華州幕官後拜左拾遺又辭官歸隠留詩曰汨没朝廷愧不才誰能低折向塵埃青山得去且歸去官職有來還自來再入升朝官位諫垣䑓閣三十年官至八座乞致仕歸華山十年而終郡閣野談顧况志尚踈逸近於方外時宰招以好官况以詩答之云四海而今已太平相公何用喚狂生此身還似籠中鶴東望瀛洲呌一聲南部新書有一武士忘其姓名志樂閒散而家甚貧甞作詩曰人生本無累何用買山錢遂投檄而去古今詩話唐末蜀川有唐求放曠踈逸方外人也吟詩有所得即将藁撚為丸投大瓢中後卧病投瓢於江曰兹瓢茍不沉沒得之者方知吾苦心耳瓢至新渠江有識者曰此唐山人詩瓢也接得十纔二三題鄭處士隠居曰不信最清曠及來愁已空數㸃石泉雨一溪霜葉風業在有山䖏道成無事中酌盡一盃酒老夫顔亦紅贈如上人云不知名利苦念佛老岷峨補衲雲千片焚香篆一窠戀山人事少憐客道心多日日齋鐘罷髙懸濾水羅題青城山范賢觀數里緣山不厭難為尋真訣問黄冠苔鋪翠㸃仙橋滑松濕香梢古道寒晝旁緑畦薅嫩玉夜開紅竈撚新丹孤鐘已斷泉聲在風動瑶花月滿壇古今詩話偽蜀辛酉嵗有隠迹于陶沙者不知所從來戴破㡌携鐡笆竹畚多於觀寺閑處坐卧有又谷遇之以禮接之忽誦谷新詩數篇又詠自作詩曰九重天子人中貴五等諸侯閫外尊争似布衣雲水客不将名字掛乾坤劉槩字伯節青社人有氣節及第為幕僚一任不得志棄官隠居冨丞相器重之有詩云昔年曽作瀟湘客憔悴東秦歸不得西軒忽見好溪山如何却有楚郷憶讀書悞人四十年有時醉把䦨干拍閑居詩詁陳綯劍浦人好逰學善觧天文長於雅頌有詩曰中原莫道無麟鳯自是皇家結網疎與水曹任畹相善寓之詩曰好向明時薦遺逸莫教千古弔靈均晩絶縉紳之望以脩養為事有詩曰乾坤見了文章懶龍虎成時印綬疎又曰蟠溪老叟無人用閒把長竿抱六韜又曰近來世上無徐庶誰向桑麻識卧龍綯隠西山産藥物數十種開寶中甞見一叟角髪被褐與一鍊師舁藥入城鬻之獲貲則求鮓就爐對飲旁若無人歌曰藍采和塵事紛紛事更多争如賣藥沽酒飲歸去深厓拍手歌疑其為綯焉或云得仙矣江南野録又陳綯詩有江湖水清淺不足掉鯨尾飲水狼子瘦終日鷓鴣寒一鼎雌雄金液火十年寒暑鹿麑衣寄語東流任斑鬢向隅終守鐵蓑衣詩如此不可殫紀北梦𤨏言史虚白本山東人唐晋之間中原多事見李昪屢陳治要而不用遂隠廬山璟徙南昌至星子渚召問曰處士隠居必有所得曰近得漁父一聮令課之曰風雨掲卻屋全家醉不知璟變色時世宗已下淮南江南野録冦豹不知何許人與謝觀同在唐崔裔孫相公門下以詞藻相尚謂觀曰君白賦有何佳語對曰曉入梁王之苑雪滿羣山夜登庾亮之樓月明千里豹唯唯觀大言曰僕已擅名海内子才調多胡不作赤賦豹未搜思厲聲曰田單破燕之日火燎平原武王伐紂之時血流漂杵觀大駭豹後不仕隠南嶽許堅不知何許人遇酒筵不問尊卑逺近必到乗興只三五盃便去性嗜魚将魚火上旋炙熟處即吃生處復炙殊不去其鱗腸毎和巾帶入溪澗内浴度目浸身出水即於風日中坐候乾其衣服多有黤氣人惡之或有人與物忻然而受将散與貧者多於夢中吟詩宿溧陽縣靈泉精舎僧出白字韻請留詩其僧對榻見熟睡至晚起出七言詩云近枕吴溪與越峰前朝恩錫雲泉額竹林晴見鴈塔髙石室曾棲幾禅伯荒碑字没秋苔深古池香泛荷花白客有經年别故林落日啼􅆐情脉脉太平興國九年自茅山再逰廬山於方先生房内安下至夜深常與數人談笑人疑聴堅已知之髙聲云不得來不得來今在洪州西山或吉州玉笥山郡閣雅談韓退絳州人放誕不拘常跨一白驢有詩云山人跨雪精上便不論程嗅地打不動笑天休始行為人所稱好着寛鶴氅醉則鶴舞石曼卿贈詩曰醉狂𤣥鶴舞閒卧白驢號閉居詩話王兾公鎮金陵以書致錢塘講師遵式式将謁公過林逋逋以詩送云虎牙熊軾隠鈴齋棠樹隂隂長碧苔丞相望尊賔謁少清言應喜道人來同前謝逸字無逸臨川勝士也工詩能文魯直讀其詩曰是張流也恨未識也無逸詩曰老鳯垂頭噤不語枯朩槎牙噪春鳥又曰貪夫蟻旋磨冷官魚上竿又曰山寒石髪瘦水落溪毛凋皆為魯直稱賞朱世英以八行薦入學不得已謝之信宿而還所居溪堂生涯如龎藴余甞過之小君方炊稚子宗野汲井無逸誦書掃除顧余放箒大笑曰聊復爾耳余作偈曰老妻營炊稚子汲水龎公掃除丹霞適至棄掃迎門一笑相視不必靈照多通道理朱世英亦作偈曰提藍靈照掃地謝公一般是麫做作不同不假語黙通透玲瓏更若未㑹換手槌胸冷齋夜話神仙門上陳希夷先生毎睡則半載或數月近亦不下月餘贈金勵睡詩曰常人無所重惟睡乃為重舉世皆為息魂離神不動覺來無所知貪求心愈動堪笑塵中人不知夢是夢又曰至人本無夢其夢本逰仙真人本無睡睡則浮雲烟爐裏近為藥壺中别有天欲知睡夢裏人間苐一𤣥又甞題石水澗曰銀河灑落翠光冷一𣲖回環湛晚暉幾恨却為頑石碍琉璃滑處玉花飛又冬日晚望云山鬼煖或呼溪魚寒不跳晚景愈堪觀危峰露殘照題西峰曰為愛西峰好吟頭盡日昂嵓花紅作陣溪水緑成行幾夜碍新月半山無夕陽寄言嘉遯客此處是仙郷又華山曰半夜天香入巖谷西風吹落嶺頭蓮空愛掌痕侵碧漢無人曽嘆巨靈仙又與毛女逰曰藥苖不滿笥又更上危顛回指歸去路相将入翠烟又曰曽折松枝為寳櫛一作髻又編栗葉作羅襦有時問着秦宫事笑撚仙花望太虚翰府名談又先生唐徳宗時至僖宗封清虚處士賜宫女三人先生貯之别室以詩謝云雪為肌體玉為腮深謝君王送到來處士不生巫峽夢虚勞雲雨下陽䑓章聖累召不起有學士譏之曰秪是先生詔不出若還詔出一般人先生答曰萬頃白雲獨自有一枝仙桂阿誰無后歸華隂令王睦令飲之起寝於溪岩先生為詩曰華山髙處是吾宫出即凌空跨晚風䑓殿不将金鎻閉來時自有白雲封睦得詩愧謝青𤨏集張洎家居城外有一隠士名乃吕仙翁姓名洎倒屣見之索紙筆八分書七言詩一章留與洎頗言将作鼎鼐之意其末白云功成當在破𤓰年俗以破𤓰字為二八洎六十八而卒乃其䜟也仙翁詩多傳人間有自詠云朝逰北海暮蒼梧袖裏青蛇膽氣麄三入岳陽人不識朗吟飛過洞庭湖又有飲海龜児人不識燒丹符子鬼難看一粒粟中藏世界二升鐺裏煑山川之句大抵皆詞句竒怪世所傳百餘首人多誦之談苑道士馬自然有異術飲酒至一石不醉人有疾以雜草朩揉碎呵與人食無不瘥毎自吟曰昔日曽隨魏伯陽經時醉卧紫金牀東君過我多情懶罰向人間作酒狂廣明中梓州上升續本事集更有二首詩其一曰省悟前非一息間更抛人世棄塵寰徒誇羙酒如瓊液休戀嬌娥似玉顔含笑謾教心思苦别離還使鬢毛斑雲中幸有堪歸路無限青山是我山其二曰何用燒丹學駐顔閙非城市静非山時人若覔長生藥對景無心是大還詩史殷七七有異術過潤州與客飲云某有一藝有歡即顧屏上畫婦人曰可歌陽春曲婦人應聲遂歌其音清亮似從屏中出歌曰愁見唱陽春令人離腸結郎去未歸家栁自飄香雪如此者十餘曲同前吕仙翁名嵓字洞賔本闗右人咸通初舉進士不第巢賊為梗携家隠於終南山學老子法絶世辟榖變易形骸尤精劍術今往往有人於關右途路間與之相逢多不顯姓名以其趍舎動作異於流俗故為人所疑又為篇詠章句間洩露其意甞有詩送鍾離先生云得道來來相見難又聞東去幸仙壇杖頭春色一壺酒頂上雲攅五岳冠飲海龜児人不識燒山符手鬼難看先生去後應難老乞與貧儒換骨丹贈薛道士云落魄薛道士年髙無白髭雲中卧看石雪裏去尋碑誇我吃大酒嫌人念小詩不知甚麽漢一任軰流嗤雅言雜載又先生唐僖宗時人避冦亂多逰湖湘間或梁魏之地甞逰大雲寺與寺僧多唱和僧有詩贈翁翁乃依韻和曰三千里外無家客七百年前雲外身行滿蓬莱為别館道成瓦礫是黄金待賔榼裏甞存酒化藥爐中别有春積徳求師何患少由來天地不私親一日逰寂蕳觀淬劍於石作詩贈道士侯日晦曰欲整鋒鉛散彈勞凌晨開匣玉龍嘷手中氣岸氷三尺石上精神蛇一條姦血㸃流隨水盡兇膏今逐漬痕銷削除浮世不平事與爾相将上九霄甞逰長沙智度寺贈僧惠覺詩曰逹者推心兼濟物聖賢傳法不離真請師開訴西來意七祖如今未有人臨行題壁上云唐室進士今時神仙足閗紫霧却歸洞天衆方知其為吕仙翁也摭遺宿州天慶觀西廡下有石刻二詩盖至道中有賣墨人甞逰於此一日題詩曰秋景蕭蕭葉亂飛庭松影裏坐移時雲迷鶴駕何方去仙洞乾元失我期又曰肘傳丹篆千年術口誦黄庭两巻經鶴觀古壇槐影裏悄無人跡户長扄或以為名吕仙翁詩也古今詩話岳陽樓有碑極大乃李觀記吕仙翁筆迹李知賀州日有道士相訪自云吕先生誦過岳陽詩云唯有城南老樹精分明知道神仙過李亦不曉後知岳州有白鶴寺僧見過道及吕仙翁甞憇扵寺前松下有老人自松梢冉冉而下致恭於先生之前曰某松之精也今見先生過禮當致謁吕書一絶於寺壁而去獨自行來獨自卧無限世人不識我唯有城南老樹精分明知道神仙過後郡守為創亭於松下名曰回先生云古今詩話孟嘏連山人性落魄狂溺於歌酒賦詠後捷名不欲止江左士人頗竒之贈史虚白云詩酒獨逰寺琴書多寄僧聖朝奄有金陵孟賔于先居連上嘏興國中亦自吉水還故郷逾年卒書生成務崇因言廬山與嘏有忘年之分興國中見嘏且言自連上來㳺江左時有詩送成務崇曰同呼碧嶂前已是十餘年話别非容易相逢不偶然多為詩酒役早免利名牽幸有歸真路何妨學上𤣥務崇詢於連上知交皆言嘏卒已十餘年矣雅言雜載許堅江左人為性踈野似非今之人年髙絶不知晚人事少言人不問終日不啟口多居三茅山不知年嵗形容不變好飱魚能為詩多談神仙事題茒山觀曰甞恨清風千載欎洞天今得恣逰遨松楸古色玉壇静鸞鶴不來青帝髙苐氏幷寒丹已化𤣥宗碑㫁夢仍勞分明有箇長生路休向紅塵歎二毛早年堅以時事干江南李氏人訝其狂戇以為風恙莫與之禮一絶上舎人徐鉉云幾宵烟日鎻樓䑓欲寄侯門薦禰才滿面塵埃人不識謾隨流水出山来因拂衣歸隠今尚在隠迹江淮間沈廷瑞寄食閣皂山舉作異俗軰盛夏向火嚴寒单衣問其故終不荅與袁州陳智周相善興國中無病卒于玉笥觀數年有人於江筠路次見廷瑞共語乆之令人将詩寄智周智周得詩甚訝馳出門求送詩者已不知所在詩曰名山相别后别後㑹難期金鼎銷紅日丹田老紫芝訪君雖有路懐我豈無詩休羡繁華事百年能幾時智周於端拱二年登第授衡陽尉卒同前沈道士筠州髙安人故吏部郎中彬第二子也性孤僻形貌秀徹初名有鄰棄妻入道居玉笥山易名廷瑞毎遇深山古洞日不返嚴寒風雪常单衣危坐或絶食經月或縱酒行歌縁峭壁升喬朩若猿猱之状骨肉相尋便却走避忘情混俗人莫測之往往為同道者困雍熈二年正月内扵玉笥山先不食七日至上元日甲辰辭道侣歸所居院集仙亭念人生幾何賦無病而終遺言於弟子将畫者土宿一幀度人經一巻隨𦵏後二年二月二十日有閣皂山僧昭瑩於山門數里相遇且閣皂山相去玉笥山一百六十里僧昭瑩問所往云暫别廬山尋知已留下土宿一幀及度人經一巻五言詩一首為别云南北東西路人生㑹不無早曽依閣皂又却上𤣥都雲片隨天濶泉聲落石孤何期早相遇藥共煑菖蒲後昭瑩到玉笥山話及方知沈道士已亡具說途中相遇并所留土宿及經詩示于人衆皆駭異遂往墳上看見土交横拆裂闊及尺餘至今不敢發質其文驗其事即屍觧而去郡閣雅談張白邢州人少應進士舉不及苐入道常挑一鐡葫蘆得錢便飲酒自稱白雲子註天尊升𤣥護命經著武陵春色三百首略一两篇云武陵春色好十二酒家樓大醉方回首逢人不舉頭是非都不采名利混然休戴個星冠子浮沉逐世流贈酒店崔氏一絶云武陵城裏崔家酒地下應無天上有南逰道士飲一回卧向白雲深洞口又哭陸先生一絶云六親慟哭還復蘇我笑先生淚箇無脫履定歸天上去空墳留入武陵圖忽一日稱患至夜閉户曉不開問之不應道衆訝之抉門見血滿地問之别無所苦嘱身後勿燒焚尋時而卒酒户崔氏出朩櫃而𦵏扵武陵城西經半年有鼎州官忘其名在楊州勾當公事遇扵酒肆同盃數日衆聞之道俗看驗其墳有一穴如椀大深透其棺敲之已空陳省躬金陵人扵偽朝頗厯政事顯徳中出為臨川宰泛舟闕下道經章江泊女児浦抵暮有書生不通姓名登舟求見與省躬語論甚竒問今晋朝苐幾帝省躬具以實對㣲笑而已坐間髙吟云西去長沙東上船思量此事已千年長春殿掩無人掃滿眼梨花哭杜鵑省躬疑是神仙再拜告問無言而退出船不見所之吴含靈江西人也為道士居南岳六七年俗呼為吴猱好睡經旬不飲食常言曰人若要閑即湏嬾如勤即不閒也素不攻文偶作上升歌甚竒絶云玉皇有詔登仙職龍吐雲兮鳯着力眼前驀地見樓䑓異草竒花不可識我向大羅觀世界世界只如指掌大當時不為上升忙一時提向瀛洲賣清泰年羽化後有客人扵乾祐中在嵩山見之許鵲真人唐末逰南岳招仙觀壁上題歌一首云洪爐烹鍜人性命器用不同分皆定妖精鬼魅閗神通只自干邪不干正黄口小児初學行唯知日月東西生還為萬靈威聖力移月在南日在北玉是玉兮石是石藴棄深泥終不易鄧通餓死嚴陵貧帝王豈是無人力丈夫未逹莫相侵攀龍附鳯損精神題後數日上昇李夢符不知何許人梁開平初鍾傳鎮洪州日與布衣飲酒狂吟放逸甞以釣竿懸一魚向市肆蹈漁父引賣其詞好事者争買得錢便入酒家其詞有千餘首傳于江表略其一两首云村寺鐘聲渡逺灘半輪殘月落前山徐徐撥棹却歸灣浪叠朝霞錦綉翻又曰漁弟漁兄喜到來婆官賽了坐江隈椰榆杓子木瘤盃爛煑鱸魚滿案堆察考取状答曰揷花飲酒何妨事樵唱漁歌不碍時遂不敢復問或把氷入水及出身上氣如蒸鍾氏亡亦不知所在俱同前伊用昌逰江浙間散誕放逸不拘細謹善飲毎醉行歌市中其言皆物外汗漫之辭似不可曉亦能為詩留題閣皂觀云花洞門前吠似雷險聲流㫁俗塵埃雨噴山脚毒龍起月照松梢孤鶴回羅幕秋髙添碧翠畫簾時捲對樓䑓两壇詩客何年去去後門關更不開後入湖南謁馬氏時方設齋獨不請用昌自造之㩀其坐洎食畢則大聲吟詩云誰人能識白元君上士由來盡見聞避世早空南火宅植田髙種北山雲雞能抱卵心常聴蟬到成形殻自分學取大羅些子術免教松下作孤墳詩畢拂衣而起衆訝竒異乃逼問無對出門不見雅言雜載石恪西蜀人善畫尤長於山水禽魚亦工歌詩言論粗暴多誚人短開寶中王師下西蜀遣名畫入京恪在其數宣於相國畫壁工畢上状乞歸奉勑任便出京卒於道中雍熈元年殿直雷承昊奉命來衡陽風土殊俗恪痛勉之為七言詩送承昊天暮與恪宿于公舎逹曉分携承昊行經數里思恪已卒數年􅃍出所贈詩多言衡陽風物其詩曰衡陽去此正三年一路程途甚坦然深䆳門墻三楚外清風池舘五峰前西邉市井來商客東岸汀洲簇釣舩公退只應無别事朱陵後洞看神仙及到任公宇一如恪言詩章好事者争傳之同上黄覺仕宦不遂意送客都門外至則客已逺不及旅舎中見一道士在側因取所携酒肉呼道士共飲食之既罷道士舉杯摭水寫吕字覺始悟其為吕洞賔道士曰明年江南相見覺果得江南官及期見道士出俵大錢七文其次十文又小錢三文曰數不可益也予藥可數寸許告曰嵗旦以酒磨服之可保一嵗無疾覺如其言至七十餘藥亦将盡作詩曰床頭厯日無多字屈指明年七十三果以是嵗終貢父詩話咸通中有進士張綽下第逰江淮養氣耽竒只以爐火為事題壁曰争那金烏何欲上飛不住紅爐謾燒藥玉顔安可駐今年花落枝明年花滿樹不如且飲酒莫管流年度人異之不喜粧餙多糜旗亭而好盃人召飲若遂意則索紙剪蝴蝶三十二以氣吹之成列而飛如此累刻以指收之俄皆在手見者求之即以他事為阻甞逰塩城多為酒困非類相競留繫邑中醒乃課述為陳情二章獻狄令乃釋之詩云門風長有蕙蘭馨鼎族家傳覇國名容貌静懸秋月彩文章髙振海濤聲訟堂無事調琴軫郡閣何妨醉玉觥今日東流橋下水一條從此鎮長清自後宰欲傳其術張云明府勲貴家流年少而宰劇邑多聲色犬馬之求未暇忘味𤣥奥因贈詩云何用梯媒向外求長生只在内中脩莫言大道人難得自是行心不到頭去之日乘醉因求搗網紙剪二鶴於㕔前俄而翔飛乃曰汝先去吾即後來時狄令亦醉其所題云自不㑹天下經書在腹内身却騰騰處世間心即逍遥出天外江南好事者尚記上升時事桂林聚談崔存字存中博州博平人因逰王屋見二人坐於水濵存曰願聞二仙名號東坐曰豈不知世有石曼卿乎西坐者即蘇舜欽子羙也存曰世傳學士為鬼仙矣曼卿曰甚哉二三子之妄也夫純陽即仙純隂即鬼升於天者為仙沉於幽者為鬼處於中者為人既為仙又為鬼乎存曰願得一語以救塵骸曼卿作詩曰牛毛麟角成真少莫道從來是壮夫龜鶴性靈終好道神仙言語不闗書不将青目觀浮世都把仙春駐玉壺寄語世人無妄語髙真幽鬼適殊途子羙作詩曰宿植靈根何太早洞悟真風正年少常令丹海飛日烏又使玉液朝元腦崑䑓氣候四時春紫府光隂夜如曉來時不用五雲車跨着清風下蓬島湏㬰有翠鳥飛下㗸書置於二子前子羙曰瀛洲有召遂飛踰山頂而去摭遺詩話總龜巻四十四欽定四庫全書詩話總龜巻四十五宋阮閱撰神仙門中有逸士衣襴破衫六􅙧黒朩腰帶闊三寸一脚着一靴一脚跣行夏以絮衫冬卧氷雪出氣如蒸自號藍米和歌曰踏踏歌藍采和世界能幾何紅顔三春樹流光一擲梭古人混混去不返今人紛紛來更多朝騎鸞鳯到碧落暮見桑田生白波長景明暉在空際金銀宫闕髙嵯峨曵長繩穿錢拖行縱錢散不收後至濠梁飛上升冉冉而去續仙傳任生隠於嵩山讀書夜有一女子來曰冥數合與子為姻生意其異乃拒之遂開簾而入可二十許冶容艶羙二青衣侍前就案書一詩云我本籍上清謫居逰五岳以君無俗侣來勸神仙學三日當來遂去生覽之愈疑妖怪志不納又贈一篇云葛洪還有婦王母亦從夫神仙盡靈匹君意合何如面墻不對女子再贈一首阮郎迷不悟何䖏伸情愫明日海山春彩舟却歸去出門冉冉飛望而去數月任大病為黄衣吏攝去來行十里忽見幢節不絶有女仙乗翠輦侍從數千人黄衣吏曵任墻下避仙笑曰嵩山薄命漢汝數盡更與三年生果六十卒後詩為雷電取去盧肇遺史洞庭賈客吕卿雲以貿販雜貨逐什一之利有羡施貧善􅅇遇好山水即留中春月夜泊君山獨飲時一盃弄數曲波上有漁舟冉冉而來乃一父老皤然賈置笛起立迎上舟問所以曰聞子笛聲非凢我是以來對數杯我少業􅅇子有性可教父老於懐袖間出笛三管其大如合拱其次大如常人所蓄其小如細筆管卿雲請父老一吹曰大者不可發次者亦然小者為子吹一曲不知得終否卿雲曰願聞其不可者曰第一者對諸天帝合天樂動天地坼日月五星失次第二者對洞府諸仙合仙樂飛沙走石百獸腦裂㓜稚震死第三者可與朋儕聴之未知可終否抽小笛吹三聲湖上風動波濤􅍅湧魚鱉跳噴僮僕恐悚君山鳥獸呌噪舟檝大恐父老不復吹引滿數盃乃吟曰湘中老人讀黄老手挼紫藟坐碧草春至不知湘水深日暮忘却巴陵道又飲數盃曰明年社期君於此遂棹漁舟而去隠隠没於波間傳異志盧李二生居太白山讀書習吐納李生不甘苦貧訣别浪迹江湖後之官橋園人吏欺隠折官錢覊縻不得東西貧瘁日甚揚州阿師橋逢人草履布衫視之乃盧生昔號二舅者李生與舅語哀其繿縷盧大罵曰貧賤不畏公弃身又有欠負且被囚繫有面相見乎李生厚謝之舅咲曰居處不逺來日以馬來迎至日晚果來云屈郎君去來十里朱門斜開二舅出迎雲冠霞帔容貌光澤侍婢數百人燕饌名果不可紀求得一女子佐酒善箜篌容色極佳上有朱字一行雲中辨江樹天際識歸舟燕罷曰莫願作婣否又曰所欠官錢二萬貫請以柱杖往波斯店取錢可從此學道無自穢身其年汴州行軍陸長源以女妻之宛類盧舅北亭善箜篌者箜篌有詩二句李具言舊事女曰少年時因兄弟戯夜乃作夢入仙宫如公所言者盧肇遺史茅濛字初成華陽人也隠華山脩道當始皇三十一年九月白日上升先是時有民謡曰神仙得者茅初成駕龍上昇入太清時下元洲戯赤城繼世而往在我盈始皇聞之問故老曰此仙之謡始皇於是有尋仙之意濛之元孫盈得道於金陵勾曲山上升為東岳上卿司命君太元真人居赤城時來勾曲為人改勾曲為茅君山拾遺神仙門下慶厯中有一閑人逰岳謁主簿郭及甫既坐視其刺乃羅道成也詢其郷里言郴州人及甫留飲曰乆思東州之逰前日逰太山已遍到佳處旦夕廻南方山索紙筆為詩曰因思靈秀偶來逰碧玉寒堆萬叠秋直上太山髙處望根盤連接十餘州後自和云水雲踪跡自閒逰夏谷隂寒冷勝秋猿鳥性情猶戀舊飜身却去海邉州及甫不勝嘆羡及去令人送之又得詩曰白騾代步若奔雲閑人所至留詩迹欲知名姓問源流請看郴陽山下石後問郴人有成真君觀得道乘白騾行石壁上其跡至今存焉古今詩話唐子正著作桂州人治平中赴舉至全州途中雇一僕負重擔健若飛羽雖鞭馬疾逓常去馬百步外恐其逸去逐遣之其僕即日自全州二千七百里日午巳到唐州留書驛吏曰候桂州唐秀才至即投之唐月餘到驛驛吏出書題云呈桂州唐秀才歸真子封唯一詩曰袁州相見又之全不遇先生道未員大抵有心求冨貴到頭無分學神仙箧中靈藥冝頻施鼎裏丹砂莫妄傳待得角龍為宴㑹好來黄壁卧林泉唐甚怪之話其状貌乃全州僕也留書之日乃全州所遣日也始悟其為神仙唐後為邕倅熈寧丙辰交趾㓂邕唐遇害乃詩所謂角龍也許宣平新安人常掛一花瓢及曲竹枝毎醉即獨吟曰負薪朝去賣沽酒日西歸路人莫問歸何處穿白雲行入翠微好事者於洛陽同華間是處題之李太白見曰此神仙也殷七七名文祥周寳舊於長安識之及寳鎮浙西七七忽到召之益加禮遇鶴林寺有杜鵑花寺僧相傳云正元中外國僧自天台鉢中以藥養其根來殖於此寺僧剏餙花院人或見女子紅裳艶麗遊於花下俗傳花神也一日寳謂七七曰鶴林寺天下竒絶甞聞能開頃刻花此花能開赴重九乎曰可也乃前二日經鶴林寺宿中夜有女子來謂七七曰妾為上蒼所命下司此花非乆即歸閬苑今為道者開之晨起寺僧訝花漸拆至九日爛熳後為兵火其花遂亡信歸閬苑矣元真子張志和㑹稽人守真養氣卧雪不冷入水不濡顔魯公守湖州日與賔客唱和為漁父詞志和曰西塞山前白鳥飛桃花流水鱖魚肥青蒻笠緑蓑衣斜風細雨不湏歸坐客嘆服不巳後果傳之相州棲霞谷有喬順二子服飛龍藥二子十年不飢魏文帝詩曰西山有仙童不飲亦不食謂此俱同上吴仁壁闗右人學進士逰羅浮洞學老荘於張先生得其大旨辭歸謀入京取應先生曰觀子氣法可住此吾授子長生之道仁壁辭以老母缺甘旨俟名遂身退學亦未晚先生曰此去必遂其志亦湏早來是年中第入浙謁錢武肅殊禮之累辟入幕堅辭不就以詩謝云東門上相好知音數盡䑓前郭隗金累重雖然容食椹力微無計報焚林弊貂不稱芙蓉幕衰鬂仍慚玳瑁簮十里溪光一山月可堪從此負歸心武肅復遣人請撰羅城記仁壁堅不從武肅怒沉扵江吴人惜之仁壁有一女有閒居詩云為惜苔錢妨換砌因憐山色旋開尊又贈道士云五龍金角向星斗三洞玉音愁鬼神又題甖粟云蒲草薄裁連蒂白臙脂濃染半葩紅又逰法華寺云髙閣煙霞襌客睡滿城塵土世人忙建隆初廣南劉隠遣中翁光普同禮丞寗昱就羅浮山設醮醮畢昱逰諸岩洞至山頂見一石門有老叟衣薜蘿㨿門而坐昱問其由云是羅浮先生宅再問誰氏叟低聲對云吴先生也名仁壁言訖户闔了無所見其後或有人於羅浮勾曲諸山見仁壁復引一十嵗許女子驗是其女也雅言雜載有商客過海遇風俄抵一所門宇聳秀珎器爛然云是樂天之居樂天聞之作二絶云近有人從海上廻海山深處是樓䑓中有仙龕開一室皆言此待樂天來又云吾學空門不學仙恐君此語是虚傳海山不是吾居處歸則惟歸兠率天古今詩話女真錢氏二姊妹依止陶隠居誦黄庭經即茅山燕洞也至今有紫菖蒲碧桃焉其姊披白練衣得道入洞及女弟至則户已扄矣淳化五年夏侯嘉正與道士五人往彼投龍是夜雷震其洞復開有一吏深入遇道士與林擒一枚食之遂絶粒田霖作詩題之曰燕口龍泓氣象清錢真此䖏有遺靈仙兄去後師猶在女弟回時户已扄雲片尚如披白練泉聲長似誦黄庭碧桃花發菖蒲紫留與人間作畫屏同上唐儀鳯中清城縣横源翠圍山下有民王仙柯服道士所遺靈丹拔宅上升已具仙傳拾遺蜀州僧中寤釋學道播於方州偶於龍池山逢人精神爽朗異於常叟即王仙柯也寤公曰聞仙名已久何幸相逢飛升之後胡為來此仙柯曰吾等有靈藥止能飛步今全家隠扵後山更脩道法遐舉之事吾何望焉但長夀而已寤公以詩贈之曰瞻思不及望仙兄早晚遐飛入太清手種一株松未老爐燒九轉藥新成心中已得黄庭術頭上應無白髮生異日却歸華表語待教凢俗普聞名自後不復遇葆光子聞於真人曰世人學道資一丹一藥聊固其命何以脩道未得證就避忌尤多三官廵羅攝入鬼録所以頻改姓名先用屍解然後棲止靈岳進取上法或五岳授事效職仙曹優㳺人間或至千嵗功徳升聞即朝玉皇海岳之間往往遐舉者世人無由知也今之初得道者止於仙隠有騰空者服金丹也遐舉之事未可希望北夢𤨏言伊夢不知何許人因夢两日遂立此名唐末不仕披羽褐逰山水題攸縣司空觀仙壇云惟有松杉空弄日更無雲鶴暗迷人題黄蜀葵云露凝金盞滴殘酒檀㸃佳人噴異香在醴陵何氏家一日别去作詩附鐡匠回言在彼打劍何氏發其塜棺内惟劍耳青𤨏后集陳純字元朴莆田人因逰桃源中秋夜遇玉源靈源桃源三夫人玉源令純舉中秋月詩純言一聮云莫辭終夕看動是隔年期桃源曰意雖佳但不見中秋月作七月十五夜月亦可玉源因作詩曰金風時拂袂氣象更分明不是月華别都緣秋氣清一輪方極滿羣籟正無聲曉魄沉烟外人間萬事驚靈源詩曰髙秋渾似水萬里正圓明玉兎步虚碧氷輪輾太清廣寒宫有路桂子落無聲吾館無絃弹棲烏莫要驚桃源詩曰金吹掃天幕無雲方瑩然九秋今夕半萬里一輪圓皓彩盈虚碧清光射玉川瑶樽休惜醉幽意正綿綿玉源謂純曰子能繼桃源之什乎純作詩曰仙源甞悮到覊思正蕭然秋静夜方静月圓人更圓清尊歌越調仙棹泛晴川幽意知多少重重類楚綿太原王世寧自言籍係第十八洞玉仙人熈寧中以暴疾終于家臨終作詩曰翠羽旌幢仙子隊紫雲樓閣玉皇家人間風雨易分散回首武陵空落花韓湘字清夫文公猶子也落魄不覊文公勉之學湘曰湘之所學非公知之公令作詩以觀其志詩曰青山雲水窟此地是吾家後夜流瓊液凌晨咀絳霞琴弹碧玉調爐鍊白朱砂寳鼎存金虎元田養白鴉一瓢蔵世界三尺斬妖邪觧造逡廵酒能開頃刻花有人能學我同共看仙葩公覽而戯之曰子能奪造化耶湘曰此事甚易公為開尊湘聚土以盆覆之良久花開乃牡丹碧花二朶於花間擁出金字詩一聮云雲横秦嶺家何在雪擁藍闗馬不前公未曉其句意湘曰事乆可驗遂告去未幾公以佛骨事謫官潮州一日途中遇雪俄有人冐雪而來乃湘也湘曰憶花上之句乎正今日事也公詢其地即藍闗嗟嘆久之曰吾為汝足此詩詩曰一封朝奏九重天夕貶潮陽路八千本為聖明除弊政豈於衰朽惜殘年雲横秦嶺家何在雪擁藍關馬不前知汝逺來湏有意好收吾骨瘴江邉公别湘詩曰人才為世古來多如子雄文世孰過好待功名成就日却抽身去上烟蘿湘别公詩曰舉世都為名利醉伊余獨向道中醒他時定是飛升去冲破秋雲一㸃青青𤨏集賈師雄郎中治平中通判邵武甞收鐡鏡甚大非常物也乆欲淬磨未得其人左右言近有回處士自言善磨鏡召至風骨軒昻非常人也出示之仍以飲酒畢推藥鏡上言藥少當自取之既去不回詢其宿在太平寺留詩一絶而去曰手内青蛇凌白日洞中仙果艶長春湏知物外烟霞客不是尋常磨鏡人取鏡視之藥已化去所堆藥處一㸃表裏通明如寒玉春水又甞有顧中謁故人季郎中至岳陽投宿市邸唱新曲有補鞋人問曰此何曲中曰都下新聲也其人曰吾不觧書子能為我書當於此調頃一詞中因為書之乃今所傳沁園春也因問其姓荅曰生於山口長於江口即今為守谷之客姓名不知也中翌日見太守言之追不復至題詩一絶於邸中腹内嬰兒養已成且居塵世暫娱情無端措大剛饒舌却入白雲深處行中與太守深歎恨之山口守谷乃仙之姓并字也永叔登第後授洛陽節推聖俞為洛陽簿乃得友之初也一日同逰嵩山佳處相對吟醉遂望四峰巨厓之上有丹書四字云神清之洞指示聖俞聖俞曰不見洎告老歸潁思前四字作一絶云四字丹書萬仭厓神清之洞鎻樓䑓烟霞極目無人到鸞鶴今應待我來後數月薨並同上有道人過沈東老飲酒用石榴皮冩絶句壁上稱回山人東老送出門渡橋不知所往或曰此吕洞賔也僕見東老子偕道其事為和此詩後復與偕遇錢塘更為書之回山人詩云西鄰已富憂不足東老雖貧樂有餘白酒釀來緣好客黄金散盡為收書東坡和曰世俗那知貧是病神仙可學道之餘但知白酒留佳客不問黄公覔素書符離道士晨興際華岳先生詩觧餘忽見黄庭丹篆字罔傳青紙小朱書凄凉雨露三年後彷彿塵埃數字餘至用榴皮緣底事中書君豈不中書東坡詩話劉跛子青州人拄一拐毎嵗一至洛陽看花舘於花家園大花見之即與二十四曰跛子吃半角小花見時止與十金曰跛子喫椀羮以詩謝曰大花見時二十四小花見時吃椀羮人生四海皆兄弟酒肉林中過一生張丞相詔自荆南時跛子與客飲市橋客起觀之挽其衣使且坐飲作詩曰遷客湖湘召赴京輪蹄迎迓一何榮争如與子市橋飲且免人間寵辱驚余寓於興國寺戯之詩曰相逢一柺大梁間妙語時時見一斑我欲從公蓬島去爛銀堆裏看青山計其夀百四十五矣邸中無人識之冷齋夜話周貫不知何許人自號朩鴈子宿龍泉觀半夜搥道士門道士問其故曰偶得句當奉告因吟曰弹琴傷指甲盖蓆損髭鬚是夜貫以蓆自覆故耳至袁州見市井李生秀韻欲携同歸林下學嗜酒色意欲無行貫指煑藥鐺作偈示之曰頑鈍天教合作鐺從初三脚豈能行雖然有耳不聴法只愛人間戀火坑尋死於西山将化人問幾嵗貫曰八十西山作酒仙麻鞋糺㫁布衣穿相逢甲子君休問太極光隂不記年復有人見於京師附書於李生云明年中秋夕當上謁至時生以事出貫乃以白土書門而去曰今年中秋夕來赴去年約不是折足鐺弹指空剥剥李生竟折一足冷齋夜話劉野夫留南京乆未入都彭淵才以書督之野夫荅曰跛子一生別無道路展手教化三饑两飽目視雲漢聊以自誑元祐新年被劉法師徐神翁形迹得不成模樣深欲上京相覷又恐撞着丈人湼陁佛驀被乾拳濕踢着甚來由不覊如此當作長短句曰跛子年來形容何似儼然一部髭鬚世間許大拐上做工夫選甚南州北縣逢着處酒滿葫蘆熏熏醉不知明日何處度朝晡洛陽花看了歸來帝里一事全無又還與瓠羮再作門徒驀地思量下水粮網上蘆蓆横鋪呵呵笑睢陽門外有箇大南湖有僧吏宗著麻衣加衲其上號麻衣道士坐廣陵白土埭謳歌自適江都令檀紙與語多無畔岸索紙賦詩曰有欲苦不足無節即無憂未若清虚者帶素披𤣥裘浮游一州間汎若不繫舟要當畢塵慮棲息老山邱檀紙異之陶淵明寄白土埭逢三異比邱此其一也觀其詩句脫去畛封有超然自得之氣非尋常介夫所能作也並同上詩話總龜巻四十五欽定四庫全書詩話總龜巻四十六宋阮閱撰藝術門鍾傳領江西日客有以覆射之法求見傳以厯日包橘置袖中令射客云太嵗當頭坐諸神不敢當其中有一物常帶洞庭香唐宋遺史何龍圖中正初登第聞西川郭從周精於卜乃以縑素求筮從周作一絶贈之云三字來時月正圓一麾從此出秦關錢塘春色濃如酒貪醉花間卧不還公後宦達以三月十五日授知制誥以言邉事忤㫖出知秦州後移杭州而捐舘舎從周之筮何其驗歟黄州東南三十里為沙湖亦曰螺螄店予買田其間因往相田得疾聞麻橋人龎安常善醫而聾遂往求療安常雖聾而頴悟絶人以指畫字不盡數字輙深㑹人意余戯之曰余以手為口君以眼為耳皆一時異人也疾愈與之同㳺清泉寺在蘄水郭門外二里許有王逸少洗筆泉水極甘下臨蘭溪溪水西流余作歌云山下蘭牙短浸溪松間沙路净如泥蕭蕭春雨子䂓啼誰道人生無再少君看流水尚能西休将白髪唱黄雞是日極飲而歸百斛明珠王建宫詞百首多言禁中事皆史傳小說所不載者往往見於其詩如内中數日無呼喚傳得滕王蛺蝶圖之類滕王元嬰髙祖子新舊唐書皆不著其所能惟名畫録略言其善畫亦不言其工蛺蝶也惟見於建詩耳或聞今人家亦有得其圖者唐世一藝之善如公孫大娘舞劍曹剛琵琶米嘉榮歌皆見於唐賢詩句遂知名於後世當時山林田畆潜徳隠行君子不聞於世者多矣而賤工末藝得所附託乃垂名不朽亦各係乎幸不幸爾合淝人傳論言曹谷善星厯衍數談事如神為王冀公作命書云七十年中一一加㺯珠灘上事堪誇碧油幢下聞鳴鳥十日催還上漢槎公年七十二知㐮陽正得千日召還又云周匝将臨壬戌嵗定鼎門前春色異一千日上少三環再入和羮冝盡醉後兾公判西京将七百日再入政府壬戌嵗也又云臨去尚猶聞禁漏異姓佳名在史書兾公薨謝之夕漏将盡無子其婿張環掌䘮事並古今詩話俳優門李家明江南李璟時為樂部頭善滑稽為諷詠璟逰後苑登䑓見牛晚卧璟曰午旦熟矣家明曰臣不學敢上絶句云曾遭寗戚鞭敲角又被田单火燎身閒背斜陽嚼枯草而今問喘更無人左右之臣皆免冠謝罪李氏乃徐温養子及僣􅃅遷楊氏于海陵璟繼統用宋齊邱言無男女少長皆殺之今海陵州宅之東小墳十數皆當時所殺楊氏之族也宋齊邱只一子轍卒逾月慟哭不止家明曰惟臣能止之乃作大紙鳶上大書曰欲興唐祚革強吴盡是先生作計謨一箇孩児􅂸不得上皇百口合何如乗風吹之度至齊邱家遂絶其縷齊邱見之慚感乃止璟於後苑命臣僚臨池而釣諸臣屢引到數十巨鱗惟璟無所獲家明乃進口號曰新甃垂鈎興正濃御池春煖水溶溶凢鱗不敢吞香餌知道君王合釣龍璟善之幸南都畫江為界舟楫多行南㟁至趙北因輟樂停觴北望皖公山謂家明曰好數青峰不知何名家明應聲曰龍舟輕漾錦㠶風正值宸逰望逺空回首皖公山色翠影斜不到夀盃中出江南野録互見談苑所載不同未知孰是江南李氏樂人王感化建州人𨽻光山樂籍建州平入金陵教坊少聰敏未曽執巻而多識善為詞口諧捷急滑稽無窮時本郷節帥更代餞别感化前獻詩曰旌斾赴天䑓溪山曉色開萬家悲更喜迎佛送如來至金陵宴苑中有白野鵲李璟令賦詩應聲曰碧岩深洞恣逰遨天與蘆花作羽毛要識此來棲宿處上林瓊樹一枝髙又題恠石凢八句皆用故事但記其一聫云草中誤認将軍虎山上曾為道士羊談苑楊叔寶郎中與眉州人言頃眉州視事後三日作火排樂人獻口號其末句云為報士民湏慶賀火星去了福星來喜召優人問曰火排致語誰做對曰本州自來舊例只用此一首湘山録丁晉公鎮金陵甞作詩有吾皇寛大容尸素乞與江城不計年之句天聖中李文定公出鎮金陵一日郡宴優人作語意其宰相出鎮所作理必相符誦至落句頂望抗聲曰吾皇寛大容尸素乞與江城不計年賔僚皆俛首文定笑曰是何是何上聞見責歸田録賞花釣魚㑹詩賦往往有宿思者天聖中永興軍進山水石適㑹宴命賦山水石歌盖出不意中生優人入戯各執紙筆作吟哦状其一優人或仆於石上衆扶掖起既起曰累日來作一首賞花釣魚詩准備應制却被這石頭摖倒左右皆大笑翌日降出詩令中書銓定内有鄙惡者落職與外任東齋記竒恠門王謝金陵人世以航海為業一日於海中失舟泛一板登岸見一翁一嫗皆衣皂引謝至所居乃烏衣國也以女妻之既人謝思歸復乘雲軒泛海至其家有二燕棲於梁間謝以手招之即飛來臂上取片紙書小詩繫於燕尾曰誤到華胥國裏來玉人終日苦憐才雲軒飄去無消息灑淚臨風幾百迴來春燕迴徑飛來謝衣上燕尾有詩一云昔日相逢因數合如今暌逺是生離來春縱有相思字三月天南無鴈飛至來嵗燕竟不至因目謝所居為烏衣巷劉禹錫有詩曰朱雀橋邉野草花烏衣巷口夕陽斜舊時王謝堂前燕飛入尋常百姓家摭遺彭城劉景直雍熈間逰華清宫因題詩扵門屏閒云天子多情寵太真六宫専幸掌中身漁陽皷動長安破從此香肌委路塵是夜夢明皇召去論當時事妃子索景直有所贈立作詩曰玉刻水中龍雲牌掲故宫霓裳滿天月粉骨幾春風眉勢從山盡裙腰芳草空共知千古事悽恨與誰同岐王至明皇曰來何晚王曰適杜甫到臣帳中誦哥舒翰詩向臣似有徳色云日月低秦樹山河遶漢宫明皇又曰常愛伊夜闌更秉燭相對如夢寐之句李白終無甫之筋骨至如賈至崔輔國亦闕自然之句張老死把筆無伊一字遂宴飲忽聞寳雲寺鐘聲方覺郭平振武舊将士分配于錢塘給官屋居之屋在修文坊舊為白校書允賃燒藥丹朱欲往而官吏丁踈因逐之乃破爐而去白因召丁踈同飲謂踈曰大藥為吾子所破有小戯術子醒酒乃取盤一面置於膝上以指敲兩腕出五色弹子兩枚化為雙燕而飛白曰僕射髭甚繁燕好去可减些言未畢二燕化為二小劍長五寸餘鋒刄如雨交舞於踈之頥頷間髭落如雪踈懼甚白呼劍下盤中依前成二丸納於左右腕而去錢昭度贈白詩曰袖裏青鋒秋水寒誰疑雙燕是金丸出門風雨如何去空有霜髭在玉盤無諸彭演西逰鄠縣宿甘泉店閒步原野忽有一少年引至一古官舎甚宏壮梁上有紅絲羯皷縚數條垂于地一老人杖而守之演問曰此何處老人曰開元興慶宫也來此者二百年中十二人爾去時莫不為詩請書一絶可乎演為詩曰長安宫闕半蓬蒿塵暗虹梁羯皷縚惟有水天明月夜一條空碧見秋毫演又曰十二人之詠可得聞乎老人舉一章曰小小蓬山刻得成宫簾不動結飛鯨誰将八月天河水瀉到重樓無浪聲此楊尚書所作也又誦一章曰金人無路守瓊山坐見雲生棟宇間忽墜霜飛翠樓曉不知龍尾許誰扳此裴中書所作也再詢楊裴之名則瞪而不答錢仁伉尚父之孫也為元帥府中書檢校司徒與中軍都虞候金沼鄰居沼所居堂東植牡丹花一本着花三百朶其色如血金含稜毎瓶子頂上有碎金絲如自然蛺蝶之状一城以為殊異毎嵗花開張宴仁伉預焉開寶七年春三月花纔一两朶開仁伉一夕洪飲擊劍裎服中单背負大籃左手携鋤腰揷六七首踰墻而過沼中外無知者鋤取牡丹置籃中乃平其地空中聞有吁歎之聲微細若逰蜂音辭曰一花三百朶含笑向春風明年三月裏朶朶㫁腸紅仁伉異之移植於亭後明日沼覺失花為非人力所及來年花盛開乃宴召沼沼一見無語得疾以歸至夜憤悶不已以刀决腸而卒腸皆寸寸斷果符空中之語鄭繼超廣州人赴官鳯翔道逢田㕘軍同行家累千餘人言是東川替罷亦入西京繼超與欵自言路人有荘在北邙山下因問鞍乗極多何也曰亡室人來多年皆蜀中孤寡家子息亦欲旋旋與人繼超曰願得一人乃令妙香與之是夕歸繼超家數年繼超卜居西洛一日忽謂繼超曰妙香非人也今将歸北邙山舊穴願乞同乗至北邙因問田㕘軍何人曰狐也是夕作别妙香歌以送酒曰勸君酒莫辭花落抛舊枝只有北邙山下月清光到死也相隨翌日同至北邙山下老君廟後妙香佯墜馬化為一狐迅走而去並洞微志唐王軒字公逺因逰苧羅山問西施之遺迹留詩於石上曰嶺上千峰秀江邉細草春今逢浣溪石不見浣溪人廻顧見一女子素衣瓊珮謂軒曰妾自吴宫離越國素衣千載無人識當時心比金石堅今日為君堅不得軒知其異又貽詩曰佳人去千載溪山乆寂寞野水浮白烟岩花自開落􅆐鳥舊清音風月閒樓閣無語立斜陽幽情入天幕西子曰子之詩羙矣不盡妾之所寄也乃答軒詩曰髙花岩外曉相鮮幽鳥雨中啼不歇紅雲飛過大江西從此人間怨風月既暮已散期來日㑹扵水濵翌日軒往則西子已在焉又相與飲軒詩曰當時計拙笑将軍何事安邦頼美人一似仙葩入吴國從兹越國更無春西子見之怨慕乆之又曰雲霞出没羣峰外鷗鳥浮沉一水間一自越兵齊振地梦魂不到虎邱山既夜乃散異日又相遇而留者逾月乃歸郭素聞王軒之事逰苧羅留詩於泉石間莫知其數寂無所遇無名子嘲之曰三春桃李苦無言却被斜陽鳥雀喧借問東鄰效西子何如郭素學王軒聞者大笑翰府名談朱休之家犬歌曰言我不能歌聴我歌梅花今年固自可明年當奈何明年兵亂城陷梁亡詩史杜少陵因見病瘧者謂之曰誦吾詩可療病者曰何杜曰夜闌更秉燭相對如夣寐之句瘧猶是也又曰誦吾手提髑髏血模糊其人如其言誦之果愈言感鬼神亦不妄古今詩話石曼卿自少以詩酒豪放自得其氣貌偉然詩格竒峭又工於書筆畫遒勁體兼顔栁為世所好余家甞得唐後主澄心堂紙曼卿為余草書其籌筆驛詩詩曼卿平生所自愛者至今藏之號為三絶真余家寳也曼卿卒後其故人有見之者云恍惚如夣中言我今為仙也所主芙蓉城欲呼故人往逰不得忿然騎一青騾去如飛後又云降於亳州一舉子家其舉子留不得因留詩一篇與之余亦略記其一聫云鶯聲不逐春光老花影常隨日脚流仙事恠不可知其詩頗類曼卿平時語舉子不能道也永叔詩話詩話總龜巻四十六欽定四庫全書詩話總龜巻四十七宋阮閱撰竒恠門賣墨者潘谷予不識其人然聞其所為非市人也墨既精妙而價不二或不持錢米求墨不計多少與之此豈徒然者哉予甞與詩云一朝入海尋李白空看人間畫墨山一日忽取欠墨錢劵焚之飲酒三日發狂浪走遂赴井死人下視之盖趺坐井中手尚持數珠也見張明言如此百斛明珠太子中允王綸祥符中登進士第有女子年十八嵗一日晝寝中忽魘聲其父與家人亟往問之已起謂父曰與汝有洞天之縁降人間四百年矣今夕㑹此自是謂父曰清非生自稱曰燕華君初不識字忽善三十六體天篆皆世所未識毎與清非生唱和及百餘篇有送人詩云南去過瀟湘休問屈氏狂而今聖天子不是楚懐王又贈清非生末句云自有燕華無限景清非何事戀東宫又雪詩云何事月娥期不在亂飛端葉落人間說與人云天上端朩開花六出贈清非生云君為秋桐我為春風春風㑹使秋桐變秋桐不識春風面題金山云濤頭風滚雪山脚石蟠虬又詩云落筆非俗子皷吹皆天聲豈俟耳目闕慰子華燕情蒋頴叔以楷字釋之刻於石後嫁為吕氏妻既嫁則懵然不復能詩康定間進篆字二十四軸仁宗嘉之有女仙傳行於時天授二年臈卿相等詐稱上苑花開請幸則天許之乃遣使宣詔曰明朝逰上苑火急報春知花須連夜發莫待曉風吹於是凌晨名花瑞草皆發羣臣並咸服其異卓異記唐太府寺隋都水門之地隋平陳於此置叔寳叔寳将亡有飛鳥集於庭以觜畫地作詩云獨足上髙䑓腐草化為灰欲知我家處朱門臨水開雍洛異集嗽金鳥出昆明國形如雀色黄魏明帝時其國來獻飼以珍珠及兎腦甞吐金屑如粟宫人争取為釵鈿謂之辟寒金以此鳥不畏寒也宫人相嘲曰不服辟寒金􅃚得帝王心不服辟寒鈿􅃚得帝王憐古今詩話西蜀張俞甞逰驪山題二絶云金玉樓䑓揷碧空笙簫逓響入天風當時國色并春色盡在君王顧盼中玉帝樓前鎖碧霞終年培養牡丹芽不妨野鹿踰垣入銜出宫中第一花異日宿温湯見二黄衣吏召其魂至一宫闕見仙座殿上問左右曰唐太真妃也與之論當時事甚詳覺又為詩曰夢魂飛入瑶臺路九霞宫裏曾相遇壺天晩景自愁人春水泛花何處去俞尚留温湯閑步野外有牧童持書一紙俞乃開封乃仙所為詩云虚堂壁上見清詞似共幽人說所思海上風烟雖可樂人間聚散更堪悲重簾透日温温曉玉漏穿花滴滴遲此景此情傳不盡殷勤嘱付隴頭兒俞詢牧童從何得對曰前日有一婦人過此遺我百錢授此書云明日有衣冠獨步野外子與之余聞之俞感俞多對士君子道此青瑣集治平二年長沙趙琪郎中作廣東憲公宇西軒有荔枝數本盛夏方熟召刺史燕賞一夕皆空皮核滿地軒之西壁有詩云吾儕今日㑹嘉賔滿酌洪鍾飲數廵遍地狼藉不知曉荔枝又是一畨新二廣人多傳異之隋煬帝逰廣陵恍惚見陳叔寶來謁曰聞已開隋渠引洪河之水東逰維揚因作詩獻之曰隋室開茲水初心謀太奢一千里力役百萬民吁嗟水殿不復返龍舟成火霞驚流摧陡㟁濁浪噴黄沙兩隄人送客三月栁飛花日脚沉雲表榆梢噪瞑鵶如今疲子俗異日使無家且樂人間景休尋上漢槎客喧舟艤㟁風細錦㠶斜莫言無利益千古壮京華煬帝愠曰爾多知為後人之利耶同前吴興栁歸舜泊舟洞庭君山見鸚鵡數千翺翔其間相呼姓字有名清越者名武逰郎者名阿蘇児者名武仙郎者名自在先生者名踏蓮路者名鳯凰䑓者名戴蝉兒者名多花子者或有唱歌者曰吾此曲乃漢武鈎弋夫人常所唱者詞曰戴蝉兒分明傳與君王語建章殿裏未得歸朱箔金缸雙鳯舞名阿蘇兒者曰我憶得阿嬌深宫唱曰昔請馬相如為作長門賦徒使費千金君王終不顧歸舜歸舟舟人云相失已二日矣寳應中有元無有春末獨行廣陵郊野夜入路傍村舎宿北軒下忽聞西廊有人行聲見四人出衣冠各異相與吟詠一衣冠長人曰齊紈魯縞如霜雪寥亮髙聲為子發一黒衣短陋者曰家貧良㑹清夜時熒煌燈燭我能持一故敝黄衣者曰清冷之泉俟朝汲長綆相牽長出入一黒衣冠身亦短陋者曰㸑薪煑水常煎熬充他口腹我為勞遲明方散起而視之乃有一杵燭䑓水桶破鐺而巳幽恠録彭州天台禅院前致仕焦将軍彦賔所創也天台僧行燈掌之刺史安思謙男守範與賔客道聫句以紀其來守範出首句曰偶到天台院因逢物外僧定武軍推官楊鼎夫繼曰忘機同一祖出語離三乗前懐逺軍周述曰古徳𤣥意逺外牕虚景澄前眉州判官李仁肇音聫曰片時松影下聫續百千燈遂請閑僧教大師義西八分書於牌翌日有貧子乞食於院見而髙聲讀之曰人道有初無尾此則有尾無初後五年首頷俱碎不如尾句者乎院僧驅逐貧子曵杖四顧曰此後生不逺千里即欲到來人以為狂言果五年誅思謙守範伏法鼎夫暴亡此則首頷俱碎之義也行燈歸寂寺僧蜀王盡遣出之後住持院僧適自興元歸則是不逺千里之義也貧子之說一無謬焉楊鼎城郭都人甞逰青城山過皂江溺而又出登㟁遽有老人以杖接引且笑曰元是塩裏人本非水中物旋失老人所在因作詩以紀之曰青城山峭江水寒欲渡當時值急湍棹急狂風趍逺㟁舟逢恠石碎前灣手攀弱杖倉皇處命在洪濤頃刻間今日深恩無以報令人羞說雀銜環至成都與知已言竟莫究塩裏人之義後為居安思謙幕判成都闕塩院感疾暴亡以塩裹其屍歸上蜀野人閒話海南城東有两井相去咫尺而異味號雙井井源出山源山石罅中東坡酌水異之曰吾尋白龍不見今家此水乎同㳺怪問其故曰白龍當為東城出俄見其脊尾如爛銀蛇伏忽水渾有氣浮水面舉首如􅀈玉筯乃泳而去余定两井太守張子容為造庵井上號思逺亭號泂酌崖有恠樹樹枝腋有詩曰岩泉未入井蒙然冒沙石泉漱洄為靨石老生罅隙異哉寸波中露此横海脊先生酌泉笑泉香龍神蟄舉首玉筯揷忽去銀釘擲大身何時見夭矯翔霹靂誰言鵬背大更覺宇宙窄字畫如顔書無名衘日月此詩氣格似東坡而言泉漱石老似非東坡又語散緩疑學而為之也龍為蛇形小如玉筯同上鬼神門大厯十三年李道昌為姑蘇太守忽一日城南虎邱山有鬼題二詩扵石壁上其一云青松多悲風蕭蕭聲且哀南山接幽壠幽壠空崔嵬白日徒昭昭不照長夜䑓雖知生者樂魂魄安能廻况復人所親慟哭心膽摧慟哭復何言哀哉復哀哉其二云神仙不可學中化空㳺魂白日非我朝青松為我門雖復隔幽隴猶知念子孫何以遺悲怨萬物歸其根寄語世上人莫厭臨芳尊荘生問枯骨生樂徒虚言道昌録奏准勑致祭祭畢其詩乃㓕後數日又隠出詩一首曰幽冥雖異路平昔忝攻文欲知髙卧處山北兩孤墳尋于山後得兩墳極髙廣至今存焉唐宋遺史許周士泊舟淮隂醉題淮隂廟曰脫身仗劍歸明主授鉞登壇是得人千騎争馳擒虎口萬嚢不㫁堰龍津拔旗破趙如摧朽一皷搶齊速若神功業盖時雖不賞威名震主即危身時來且佩三齊印勢去翻輸一婦人得意不思防後患窮居何用結邉臣名留青史成何事血汚西鍾幾掬塵遂使後來征戰者却愁他日似将軍還舟方寐夢介士擁見周士曰足下詩固好然未合於理也信去楚歸漢起自行伍髙祖結壇授鉞雖立功名一旦自藴忿躁之氣外結邉臣内謀大叛死為萬世醜吾今血食於此亦出望外而子之詩重吾過為懦無所守将安用也摭遺賈魏公尹京日忽有人來展刺謁曰前江南國主李煜相見則一清瘦道士爾公曰太師已物故何得及此曰某㓜探釋氏未逹誤有所見今為師子國王偶思鍾山而來懐中取一詩授公曰異國非所志煩勞殊清閑驚濤千萬里無乃見鍾山公讀之隨身灰㓕張孝和關中人淳化壬辰年㳺淮南在夀春與張李二生被酒及淮漘入就龍女祠取桐葉寫詩两句云我是夢中傳彩筆欲書花葉寄朝雲投於帳中而去一旦獨至其祠忽簾中有婦人邀而置酒贈孝和詩一絶曰落㠶且泊小沙灘霜月無波淮上寒若向江湖得消息為傳風水到長安孝和告去行數十步忽小女奴呌曰娘子令還桐葉勿復置念孝和得之回顧惟古祠敗舎而已李珦字温叔都官外郎之㓜女也八嵗能詩甞作榴花一絶云烈火真紅輕皺面晨霞碎剪貼枝條金刀刺出猩猩血濺落芳叢乆不銷後適江夏人王常同泛舟射利江湖間婁徹為江州清風亭記常觀歎美珦曰未之盡也何不云青山緑水萬里有盡處清風明月千古無老時一日舉其文於徹徹卒用其言為破題不乆常死而珦溺舟於三山磯下後三日屍忽出於水中士人異之為立廟熈寧開都人張芝過廟作三絶焚於廟中一云風軟潮生江水平遥峰隠隠浸寒青自從香骨沉波底獨我為詩弔爾靈二云軋軋櫓聲離逺浦蕭蕭㠶影落寒濤殷勤滴酒陳佳果将此深心慰寂寥三云江雨初晴逺岫低心因啼鳥陡思歸爾如㑹我題詩意魂夢相求一處飛既夜一青衣召云娘子奉俟乆矣芝曰娘子為誰青衣曰早來獻詩與誰耶芝乃悟見一婦人謂芝曰早來佳章欲托以夢寐是或不真不能盡所懐故求面見妾溺此時水官令賦詩及校九江㑹源録一夕而畢水官大恱令江神出其屍顯其靈今有祠在此血食於人謝子之詩意所不敢當荅以詩曰梅天半霽江水漲水揺花影紅蕩漾東風抛雨過江西截江一瞬生銀浪閴然不見鷗鷺飛漁唱四沉烟瞑蕩忽然晴霽碧虚闊水色天光月下上栁風和軟浪無聲客櫓嘔軋中流鳴两㟁沙頭拾翠女嬉笑携手相将行秋入空江潦水静澄江一碧如寒鏡逺㠶㓕没入雲中菱唱微茫晚風瞑西風脫朩露三山隠隠樵歸亂石間霜猿哀落岩前月杜宇枝間更啼血蓬窓風𦂳客衣單中夜危腸幾欲絶我本名家閨中女聘得良人共途路相将雲水二十年所得歡心亦無數豈期天禍及一身夫死身沉大江去猛風吹雲無定踪盡日隂愁難得雨秋髙水冷白骨寒孤兒稚女歸何處因公遺我白玉篇慰此窮泉生和煦明朝仙舸宿何州回首寒江烟雨暮芝見詩嘆賞久之又出白金二百星贈芝曰煩礲一石載妾前事亦有奉報如何芝受其金送芝出幄則已五皷矣芝後因循不能為立石舟再過三山下幾至傾覆是夜又夢其女深詬責之負其事翰府名談李羣玉校書過二妃廟題詩曰小孤洲北浦雲邉二女明粧共儼然野廟向江春寂寂古碑無字草芊芊東風近墓吹芳芷落日深山哭杜䳌猶似含嚬望廵狩九嶷如黛隔湘川題黄陵廟詩曰黄陵廟前芳草春黄陵女兒茜裙新輕舟小檝唱歌去水逺山長愁殺人又曰黄陵廟前春已空子䂓啼血淚春風不知精爽落何處疑是行雲秋色中羣玉自以第三篇春空便到秋色踟蹰欲改二女俄出焉羣玉悉其所陳而題於後涉重湖至潯陽太守叚成式索為詩酒侣具述其事後二年而羣玉逝故哭李詩曰酒裏詩中三十年縱横唐突世喧喧明時不作禰衡死傲盡公卿歸九泉又曰曾說黄陵事今為白日催老無男女累誰哭向泉䑓䖍州布衣頼仙芝言連州有黄損僕射五代時人僕射盖仕南漢也未老退歸一日忽遁去莫知所在子孫畫像事之凢三十三年乃歸坐阼階上呼家人其子不在孫出見之索筆書壁上云一别人間嵗月多歸來人事已銷磨惟有門前鑑池水春風不改舊時波投筆而去不可留子歸問其状貌云甚似影堂中人也連州相傳如此其後頗有禄仕者艾子病熱稍昏夢中神㳺隂府見閻王升殿治事有數鬼招一人至一吏前白曰此人在世惟務持人隂事思於財物雖無過者必巧造端以誘陷之然後摘抉准法合以五百億萬斤柴於鑊湯中煑之王曰可令赴獄有一牛頭捽執之而去其人私謂牛頭曰君何人曰吾鑊湯獄主獄之事皆吾主之其人又曰既為獄主固首主也而豹皮襖若是敝鬼曰冥中無此皮若陽人焚化方得吾名不顯於人間故無焚貺者其人又曰某之外氏獵徒也家常有此皮若蒙主見憫少减柴數得還即焚化十皮為獄主作裩其鬼喜曰為女去億萬二字以敗其徒則汝得速還兼免沸煑之苦二三人於是义入鑊煑之其牛頭者時來相問小鬼見如此必欲庇之亦不敢令火熾遂報柴足既出鑊束帶将行牛頭曰勿忘皮也其人乃明顧曰有詩一首奉贈云牛頭獄主要知聞權在閻王不在君减刻官柴猶自可更求枉法豹皮裩牛頭大怒义入鑊湯益薪煑之艾子既寤語於徒曰湏信口是禍之門並百斛明珠周祖起於鄴范魯公遁迹民間執紙扇偶題云大熱去酷吏清風來故人坐茶肆中忽一形貌怪陋者前揖之曰相公相公勿慮勿慮律其扇曰輕重無准吏得舞文何止大熱耶公當深究獄弊持扇急去後一日於古廟後門鬼手中持其扇乃茶肆中見者未幾周祖果得公扵民間遂大用憶陋鬼之言首議刑於䟽曰先王所恤莫重扵刑今繁苛失中􅁿重無准民罹横刑吏得舞法周祖從其言命公與知雜張湜等刋定五年書成目曰刑統玉壺清話詩話總龜四十七欽定四庫全書詩話總龜巻四十八宋阮閱撰鬼神門余與魯直夀朋天啓㑹于伯時齋看詩巻皆仙鬼作或夢中所作也又記太平廣記中有人為鬼物所引入墟墓皆華至洞户忽為刼墓者所驚出遂失所見但云芫花半落松風晩清吾毎愛此兩句故附之書末王著洛陽人也七嵗能属文十四進士及第初依師宛句縣張嘏東京應舉乆不知消息賃居相國寺東因出通衢忽遇張嘏遂邀茶肆叙濶至乃稱蝴蝶詩最嘉云今夜君棲芳草裏為傳消息到王孫嘏無言忽然不見但驚問郷人云卒已半年著自及第便厯華省至翰林學士只及中年而終郡閣雅談西川宰相髙駢版築羅城日有守禦指揮使姜知古分得西南趙波塊即趙畚相公墳也知古號令候曉開之是夜有人黄衣束帶瘦骨長卓立于知古前曰趙相公使上書知古驚覽書末後有詩一首頃之鬼不見詩云我昔勝君昔君今勝我今人生一世第何用苦相侵保大中廣陵裡城隍因及古塜得石誌一所云日為箭兮月為弓四時射人兮無窮但得天将明月化不覺人隨流水空山川秀兮碧穹窿崇夫人墓兮直其中猿啼烏嘯烟濛濛千年萬年松栢風或云李白詞南唐近事甘露寺僧如昊云收得浙右之明年夏中夜月瑩無雲長江如􅀞有僧持課俄數人自西軒領僕厮輩挈酒上江亭而止於明月臺相遇坐定命酒羅列昊竊窺之思中夜禁行從何而至必是幽虚扵牕隙俯伏伺之東向一人衣南朝衣西向一人衣北朝衣北向一人衣縫掖衣指南向者設禮而坐東向一人衣朱衣霜簡清瘦多髯飛杯之次東向者曰今日恣縱江南之㳺皆不乏風流矣僕甞記公云何人種得西施花千古春風開不盡可謂越古超今矣次至西向者復曰各述旦㐮日臨危一言曰趙臺能為賦邢陽觧獻書可借西川水不救轍中魚次至縫掖舉白而歌曰偉哉横海鱗壮矣垂天翼一旦失風水翻為螻蟻食廵至東向云功遂侔昔人保退無智力既涉太行險兹路信難渉次至朱衣乃髙吟曰握裏龍蛇紙上鸞逡廵千幅不将難顧雲已往羅隐耄更有何人逞筆端吟罷東樓晨鐘遽鳴僧戸軋然而啓忽爾而散桂花藂談秦太虚言寳應民有嫁娶㑹客者有客徑起出門若醉甚將赴水者人急持之客曰有婦人以詩招我其詞云長橋直下有蘭舟破月衝烟任意逰金玉滿堂何所用争如年少去來休倉皇就之不知其為水也然客亦無他夜㑹說鬼與㕘寥㕘寥舉此聊為記之東坡詩話唐丞相馬植弟固武威太守固弟西漂太守二弟聞植罷安南都護又除黔南不得意維舟中古寺前夜月如晝見白衣人緩步隄上吟曰栽竹為筒作笛吹鳯凰池上鳯凰飛勞公更向黔南去即是陶鈞萬類時厯厯可聴遣人尋訪已失之後黔南去再入為大理卿遷刑部侍郎判鹽鐡遂大拜大厯元年元載因早朝有人獻詩載令左右收之候入中書省其人曰若不能讀請自誦一篇曰城東城西舊行處城裏花飛栁如絮海燕啣泥欲下來屋裏無人却飛去吟畢不見乃知其非人也載後敗家破妻被戮馮翊夏陽縣㩀大河有兾河清徹可鑒大和中縣尉趙生一夕與同軰聮步望月於兾泉上忽有人貌甚黒緑袍自泉中出徐吟曰夜月明皎皎緑波空悠悠生且驚其水溺明日生再逰兾水見廟中土偶人被緑袍視之其貌乃昨日吟詩人也元和中有陸橋家于丹陽居有池塘亭榭一夕有人叩門急視見一人儀状秀逸自稱曰沈約聞公雅好詩故來奉謁既而呼左右曰召青箱來有一児年可十嵗約曰此吾子也欲使紹吾舉故名青箱然亦能詩從吾與范僕射過臺城曾作感舊詩令諷之曰六代舊山川興王幾百年繁華今寂寞朝市昔喧闐夜月琉璃水春風栁色夭傷時為懐古垂淚國門前忽不見唐燕士晉昌人隠于九華晚步山下見一白衣少年閒步自若曰澗水潺湲聲不絶溪壠茫茫野花發自來自去人不知歸時長對空山月歸問里人曰是吴氏子善詩卒僅數年矣錢起寓宿驛舎聞窓外有人曰曲終人不見江上數峰青起怪之十年後就試座主李時試湘靈鼓瑟詩落句意乆不屬遂以此一聮續之乃中魁選詩全篇云善鼔雲和瑟常聞帝子靈馮夷空自舞楚客不堪聴雅調悽金石清音發杳冥蒼梧來怨慕白芷動芳馨流水傳湘浦悲風過洞庭曲終人不見江上數峰青劉山甫隨侍官扵嶺外北歸泊舟洞庭登㟁見有北方毗沙門天王廟祠因謁之見廟宇頽圮乃題云壊墻風雨幾經春草色盈庭一座塵自是神仙無感應盛衰何得却由人見夜夢神責曰我南岳神也汝何相侮俄而風濤大作舟幾覆悔謝徹去詩牌乃止古今詩話長安中秋望夜有人聞鬼吟曰六街皷歇行人絶九衢茫茫空有月又聞有和者云九衢生人何勞勞長安土盡槐根髙俗云務本西門是鬼市或風雨暝晦皆聞其喧聚之南部新書開元中有幽州衙校姓張妻孔氏生五子而卒後娶李氏妬悍狠戾虐遇五子鞭捶不堪其苦哭扵孔氏之墳母忽於塜中出撫其子悲慟乆之因以白布巾題詩贈張曰不忿成故人泣涕毎盈巾死生今有隔相見永無因盒裏殘粧粉留将與後人黄泉無用處浪作塜中塵有意憐男女無情亦任君欲知腸㫁處明月照孤墳五子得詩以呈其父其父訴於連帥連帥上聞李氏流嶺南建隆初有人行於巴峽夜泊舟於江涘忽有人諷詠曰秋逕填黄葉懸崕露草根猿聲一呌㫁客旅數重魂其音苦切激昻而悲如是通宵凡吟百遍初疑舟行秀士也及曉訪之其所泊㟁殊無舟舸但空山䆳林溪谷絶幽爾㳂㟁尋訪數處有二脚迹長二尺許東南復州門街東有劉氏舊宅宇舎横㫁敝壊鮮有人居梁太保震有逺房弟伯升秀才請居之貴其幽致而肄業既憇馭月餘辰夕甚安一日晝寢夢魘乆之方寤乃曰適夢一女子緑裙紅袖自東街而來泣而呼曰聴妾幽恨之句詩曰卜得上峽日秋江風浪多巴陵一夜雨腸㫁朩蘭歌梁因稱嘆而覺竟無他說脞說後集鬼仙詩曰仙人未必便先去還在人間人不知手把白鬚從兩鹿相逢却問姓名誰又云江上檣竿一百尺山中樓臺十二重山僧樓上望江上指㸃檣竿笑殺儂又云爺娘送我青楓根不記青楓幾回落當時手刺身上衣今日為灰不堪着又曰酒盡君莫沽壺傾我當發城市多囂塵還山弄明月又云浦口潮來初渺漫蓮舟溶漾采花灘芳心不愜空歸去㑹得潮平更折看又曰忽然湖上片雲飛不覺舟中雨濺衣折得荷花渾忘却空将荷葉盖頭歸又曰寒花白露裏亂山明月中是夕苦吟罷秉燭與君同黄魯直登荆州亭柱間有詞曰簾捲曲欄獨倚銀屏暮天無際淚眼不曽晴家在吴頭楚尾數㸃雪花亂委撲漉沙鷗驚起詩句欲成時沒入蒼烟叢裏魯直曰似為予發筆勢類女子又有淚眼不曾晴句即鬼也是夕有女子絶艶見夢於魯直曰我家豫章附舟墮水死于此登亭感而作不意公能辨之魯直覺曰此必吴城小龍女事同前佞媚門陳瑄太師任西川有愛姬徐氏郫城令之女也令欲求彭牧以紅絹數寸作二十八字遣其妻私示其女曰深堂冨貴事風流莫忘生身老骨頭因與太師歡笑處為吾方便覔彭州人皆鄙之鑑戒録鎮楊州請章孝標賦春雪孝標作詩曰六出花飛處處飄粘窓拂砌上寒條朱門到曉難盈尺盡是三軍喜氣消唐李嶠少負才華㕘知政事封鄭國公長夀中則天鑄八稜銅柱題曰大周萬國述得天樞紀革命之功貶皇家之徳天柱下置鐡山翁師子琪璘圍遶武三思為文朝士獻詩不可勝紀惟嶠詩冠絶當時曰轍迹光西崦勲庸紀北燕如何萬國㑹諷徳九門前灼灼臨黄道迢迢入紫烟仙盤正下露高柱欲乘天山類叢雲起珠疑大小懸聲流塵作刼業固海成田聖澤傾堯酒薰風入舜絃忻逢下生日還遇上皇年后憲司發附㑹韋庶人左授滁州别駕大唐新語琢句門唐僧多佳句其琢句法比物以意而不指言一物謂之象外句如無可上人詩曰聴雨寒更盡開門落葉深是落葉比雨聲也又曰微陽下喬朩逺燒入秋山是微陽比逺燒也用事琢句妙在言其用而不言其名耳此法唯荆公山谷東坡知之荆公曰含風鴨綠鱗鱗起㺯日鵞黄裊裊垂此言水栁之用而不言水栁之名坡别子由曰猶勝相逢不相識形容變盡語音存此用事而不言其名山谷曰管城子無食肉相孔方兄有絶交書又曰語言少異無阿堵氷雪相看有此君又曰眼看人情如格五心知世事等朝三格五是融法也後漢江云常置人於險處然句中眼者世尤不能觧王荆公欲新政作雪詩曰勢合便冝包地盡功成終欲放春回農家不念豐年瑞只欲青雲萬里開韓魏公罷政判北京作園中行詩曰風定曉枝蝴蝶亂雨勻春圃桔橰閒意趣所至多見於嗜好歐陽文忠公喜士為天下第一好誦孔北海座上客常滿尊中酒不空之句范文正公清嚴而喜論兵好誦兵衛森畫㦸燕寝凝清香之句李師中送唐介謫官詩曰去國一身輕似葉髙名千古重如山並㳺英俊顔何厚已死姦諛骨尚寒巳而聞介趂月首上任大悔乃以書索詩唐公笑曰吾正不用此無對屬落韻詩送還李乃悟一身千古非恊對也東坡逰羅浮詩曰潜鱗有飢蛟掉尾取渇虎我來方醉後濯足聊戯侮想見海上超放之類然後疑不能掉尾雪裏芭蕉也王榮老渡觀江風作不得濟父老曰公篋中畜竒物此江神極靈獻之當得濟榮老有玉麈尾端石硯宣包幛獻之皆不驗有魯直草書扇頭子題韋應物詩曰獨憐幽草澗邉生上有黄鸝深樹鳴春潮帶雨晚來急野渡無人舟自横取視儻恍之勢曰我猶不識鬼識之乎以獻之香火未收天水相照如鏡南風徐來㠶一飽而濟余謂神必元祐仙客不然何嗜之深也李白詩曰昔日芙蓉花今為㫁腸草以色事他人能得幾時好陶𢎞景仙方注曰㫁腸草不可食其花美好名芙蓉花栁子厚詩曰漁翁夜傍西巖宿曉汲清湘􅎴楚竹烟消日出不見人欵乃一聲山水緑回看天際下中流巖上無心雲相逐東坡評詩云以竒趣為宗反常合道為趣熟味之此詩有竒趣其尾两句雖不必亦可欵乃舟人相呼聲相應也冷齋夜話杜牧華清宫詩云長安西望綉成堆山頂千門次第開一騎紅塵妃子笑無人知道荔枝來尤膾炙人口據唐記明皇帝以十月幸驪山至春即還宫是未甞六月在驪山也然荔枝盛暑方熟詞意雖美而失事實唐人題西山寺云幾夜碍新月半江無夕陽或謂冠絶古今以其盡得西山之景趣也金山寺題者甚多而絶少佳句唯寺影中流見鐘聲两㟁聞又天多剰得月地少不生塵最為人傳誦要亦未為至工若用於落星寺有何不可乎熈寧中介甫有句云天末海門横北固烟中沙岸似西興尤為中的遯齋閒覽詩話總龜巻四十八欽定四庫全書}
