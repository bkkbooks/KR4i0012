  - {type: variant, offset: 4769, length: 2273, content: 宏休編皇明宗室月䆫道人刋鄱陽亭梧程珖舜用校御製王師圍金陵唐使徐鉉来朝鉉伐其能𣣔以口舌觧圍謂盛称其主慱學多藝有聖人之能使誦其詩曰秋月之篇天下誦傳之其句云云太祖大笑曰寒士語耳吾不道也鉉内不服謂大言無實可窮也以請殿上驚惧相目太祖曰吾㣲時自秦中歸道華醉卧田間覺而月出有句曰未離海底千山黒纔到天中萬國明鉉大驚殿上稱夀後山詩話故亊進士期集常擇榜中最年少者爲探芲郎熈寕中始罷之太平興國三年胡秘監旦榜馮文懿拯爲探花是歲登第七十四人太宗以詩賜之曰二三千客裏成亊七十四人中少年始唐以禮部放榜故座主門生之札特盛主司因得竊市私㤙上稍欲革其弊旣更廷試前一歲吕文穆公䝉正爲狀頭始賜以詩盖示以優寵之意至是復賜文懿然狀頭詩迄今詩有探芲詩後無継者惟文懿一人而巳最爲科舉之盛亊也蔡寛夫詩話太平興國七年十二月十七日大雪御製雪詩并酒賜學士詩云輕輕相亜凝如酥宫樹花粧萬萬株今賜酒卿時一盞玉堂聞話道情無又御製五七言詩賜蘇易簡五言詩曰翰林承旨貴清净主堂中應用咸依式深岩比更崇歸家思值日入内集英風儒措門生盛髙明大化雄七言詩曰運偶昌時逺更深果然榖在我中心從風臣偃光朝野此日清華見翰林舉措樂時周礼法思賢教古善規箴少年學士文明世一寸賢毫数萬㝷金坡遺事石林詩話楊文公在翰林去聀真宗眷之不衰即起為郡未㡬復以判秘書監召旣到闕以詩賜之曰瑣闥徃年司制誥共嘉藻思類相如蓬山昔日詮墳史还仰夛聞過仲舒報政列城㱕覲後䟽㤙髙閣拜官𥘉諸生濟濟弥瞻望鈆槧咨詢辨魯魚祖宗愛惜人才保全忠孝之意如此䂬溪大中祥符五年楊億為學士季夏𬒳疾至十月方赴朝叅具狀称謝御筆狀尾批七言二韻詩賜之詩云承明迩侍䆒儒玄苦學劳心疾巳痊善保㒷居調飲食副予前席待名賢金坡遺事大中祥符二年春真宗御製詩賜知貢舉晁逈云礼闈選士古称難都爲陞沉咫尺間較藝清時公道在掄材應得惠人寰五年二月又製詩賜知貢夆晁逈云盛時選士貢闈開殿宇聞風献藝来心似權衡求實効勿教蓬蓽有遺才同上天禧三年正月九日錢惟演承明殿面奉知舉真宗御製詩并序云卜賢能之多士允恊盛猷資從之洪儒書伸藻鑑期申聀業用示篇章詩云寅奉昌圗紹慶基選倫多士叶前規郷閭薦㧞期無濫草澤搜羅詎有遺徳舉况逄全盛日計偕咸造廣埸時春官任聀當求善宗伯掄材務得冝侍從名儒當委任藝文公道辯妍媸佇伸衡鑑裁深念允恊菁莪樂育詩金波遺事二月十八日将放文賜詩并序序云詳延造士允叶扵盛猷乃眷儒臣式分於重寄論秀才臻扵顯効當官偹著於純誠詩云四海為家宝緒隆旁求文雅振儒風命郷隨計来多士軗藝掄材有澤宫簮紱近臣當顯任絲綸深旨論丹衷旰霄汲汲予存念夙夜孜孜尔狥公名實豈惟衡鑑内賢能皆萃網羅中佇觀翹楚登時用布政分憂恊庶功同上真宗賦御溝柳詩令宰相兩省和進陳执中詩曰一度春来一度新翠光長得照龍津君王自愛天然態恨殺昭陽學舞人其詩最尤者西朝宝訓神宗遵太祖遺意聚積金帛成帑自製四言詩一章云五季失圗獫狁孔熾藝祖造邦意有懲艾爰設内府基以募士曽孫保之敢忘厥志毎庫以一字目之又别置詩二十字分掲其上曰毎䖍夕惕心妄意遵遺業予不武資何以成戎捷後来所謂御前封椿庫者也上意用此以為開柘西北境土之資始命王韶克青唐然後欲經理銀夏復取燕雲元豊五年徐禧永洛衂師之後帝心弛矣林宓𥙿陵遺事云前軰云詩有奪胎換骨之說信有之也杜陵謁玄元廟其一聮云五聖聮龍衮秋風折鴈行亦以鴈行對龍衮然語中的其親切過於夲詩兹不謂之奪胎可乎不然則徒用前人之語珠不足貴且如沈佺期云小池殘暑退髙樹早􅋽歸非不佳也然正用柳惲太液㣲波起長楊髙樹秋之句耳蘇子云峽束滄淵深貯月巖排紅樹巧粧秋非不佳也然正用杜陵峽束滄江起岩排石樹圓之句耳語雖工而無別也藝苑雌黄光堯𥘉幸錢塘有詩云六龍轉淮海萬騎臨呉津王者本無外駕言蘇逺民瞻彼草木秀感此瘡痍新登堂望稽山懐哉大禹勤大㢤之言布於天下漢祖大風之歌唐宗勁草之句不足道也詩說雋永賡歌門東莱㳟和皇帝幸秘書詩麟閣龍旂日月章中興再見赭𫀆光仰觀焜耀人文盛始識扶持德意長功利從今卑𬋩晏浮華自昔陋盧王願求實學醻天造肯効明河織女㐮文集御燕門嘉祐七年冬宴近臣于群玉殿英宗以皇子預坐在舍人待制之後岐公詩云翠輦生香容扈蹕黄金塗𥿄㸔揮毫介甫云何不言翠玉裝輿岐公改之以進復齋謾録神廟時經月每夕有赤氣見西北隅如火至人㝎乃滅人以為皇子生之祥故禹玉作大燕樂詞云未曉清風生殿閣經旬赤氣照乹坤未幾皇子生大燕群臣扵集英殿文正公日録榮遇門蘇叅政易簡取開封觧時宋尚書白為試官是歲狀頭登第後十年白爲翰林學士易簡以継召入故易簡贈白詩云天子昔取士先後分媸妍済済俊兼秀師師鱗與鵉小子最承知同軰㝷改觀甲等叨薦名髙飛便凌煙遂使拜扆坐果得超神仙迄今纔七歲相接乗華軒慶暦二年歐陽文忠公為别頭試官王文㳟公預薦至嘉祐𥘉文忠在北門文㳟亦同院仍同知貢㪯故文㳟詩有十五年前門下客最荣今日預東堂之句座主門生同列固儒者盛事而玉堂尤天下文學之極選國朝以来惟此二人前此所未有也蔡寛夫詩話嘉祐二年余與端明韓子華翰長王禹玉侍讀范景仁龍圗梅公儀同知礼部貢㪯辟梅聖俞為小試官凡鏁院五十日六人者相與唱和為古律歌詩一百七十餘萹集為三卷禹玉余為校理時武成王庙所觧進士也至此新入翰林與余同院又同知貢㪯故禹玉贈余云十五年前出門下最荣今日預東堂余荅云昔時叨出武成宫曽㸔揮毫氣吐虹夣寐閑思十年事笑談今日一樽同喜君新賜黄金帶頋我今為白髮翁也天聖中余舉進士國斈南省皆忝第一人薦名其後景仁相継亦然故景仁贈余云淡墨題名第一人孤生何幸継前塵也聖俞自天聖中與為詩友余嘗贈云猶喜共量天下士亦勝東野亦勝韓而子華筆力豪贍公儀文思温雅而敏捷皆勍敵也前此有南省試官者多窘束條制不少放懐余六人者􅌚然相得群居終日長篇險韻衆製交作筆吏疲扵冩録僮史奔走徃来間以滑稽嘲謔加於風刺更相酧酢徃徃哄堂絶倒自謂一時盛事此前未之有也㱕田録百家詩話總龜後集卷之一, WYG: 撰達}
