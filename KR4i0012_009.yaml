  text: 增修詩話總龜卷之九乙集
  hash: sha256:60d5f5a4868230d1f6cb55ddab2cbf306c77af70190f1fca20279a4ed2c22843
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_009-1a}
body:
  text: 舒城阮一閲編皇明宗室月窗道人刋鄱陽程珖校評論門五東坡作蝸牛詩云中弱不勝觸外堅聊自郛升高不知疲竟作黏壁枯後改云腥涎不滿殼聊足以自濡升髙不知回竟作黏壁枯余亦以為改者勝直方詩話山谷惠余詩兩篇一云多病廢詩仍止酒一云醉餘睡起怯春寒觀者以為疵余曰説詩者不以文害辭豈非謂此耶東坡愛韋蘇州詩云誰知風雨夜復此對床眠向在鄭西別子由云寒燈相對記疇昔夜雨何時聽蕭瑟又有初秋寄子由云買田秋已議築室春當成雪堂風雨夜已作對床聲又子由與坡相從彭城賦詩云逍遙堂後千尋木長送中霄風雨聲悮喜對床尋舊約不知飄泊在彭城子由使虜在神水館賦詩云夜雨從來相對眠茲行萬里隔胡天此其兄弟所賦坡在御史獄有云他年夜雨獨傷神在東府有云對床定悠悠夜雨今蕭瑟其同轉對有云對床貪聽連宵雨又云對床欲作連夜雨又云對床老兄弟夜雨鳴竹屋可謂無日忘之詩云讀書頭欲白相對眼終青身更萬事巳頭白相對百年終眼青看鏡白頭知我老平生青眼為君明故人相見尚青眼新貴即今多白頭江山萬里盡頭白骨肉十年終眼青白頭逢國士青眼酒尊開此坡谷所為用青眼對白頭者非一而工拙亦各有差老杜亦云別來頭併白相見眼終青山谷有詩云小立佇幽香農家能有幾韻聮與荆公詩頗相同當是暗合方時敏言荆公言鷗鳥不驚之類如何作語則好故山谷有云一鷗同一波謝朓嘗語沈約曰好詩圓美流轉如彈丸故東坡答王鞏云新詩如彈丸及送歐陽弼云中有清員句銅丸飛柘彈蓋謂詩貴圓熟也余以謂圓熟多失之平易老硬多失之乾枯不失於二者之間可與古之作者並驅東坡為溫公作獨樂園詩只從頭四句便巳都説盡云青山在屋上流水在屋下中有五畝園花竹秀而野此便可以圖畫東坡嘗為余書荆公詩云徑暖草如積山晴花更繁縱橫一川水高下數家村倦憩雞鳴午荒尋犬吠昏歸來向人説恐是武陵源坡云武陵源不甚好又云也是此韻中別無韻也山谷每與余言謝師厚七言絶類老杜但少人知之耳如倒著衣裳迎户外盡呼兒女拜燈前編入杜集無愧趙德甫云東坡為程筠作歸真亭詩云會看千粟記木杪見龜趺是碑坐不應見木杪秦少章云世上事絶有理會不得者余前日見孫莘老大笑東坡謝御賜書詩云有甚道理後面更直説至陜西奏捷東坡跋米元章所收書云畫地為餅未必似要令癡兒出饞水又云錦囊玉軸來無趾山谷和之云百家傳本略相似如月行天見諸水又云拙者竊鉤輒斬趾皆謂元章患淨病及好奪取人話東坡平生最慕樂天之為人故有詩云我甚似樂天但無素與蠻又云我似樂天君記取華顛賞遍洛陽春又云他時要指集賢人知是香山老居士又云定似香山老居士又云淵明形神似我樂天心相似我東坡在杭又與樂天所留歲月略相似東坡送李公擇云有如長庚星到曉爛不收贈道潛云故人各在天一角相望落落如晨星任師中挽辭云相看半作晨星沒可憐太白與殘月而黃門送退翁守懷安亦云我懷同門友勢如曉天星友或作客學者尤多用此眺以道言近見東坡説凡人作文字須是筆頭上挽得數萬斤起可以言文字巳余謂歐公豈不云興來筆力千鈞重謝玄暉最以澄江淨如練得名故李白云解道澄江淨如練令人却憶謝玄暉山谷詩云慿誰説與謝玄暉莫道澄江淨如練則其人之優劣於此亦可以見托言載白樂天在江東進士多奔往時張祜負時名既而徐凝至二子相矛盾祜稱其佳句云樹影中流見鍾聲兩岸聞凝以為奈無野人千古長如白練飛一條界破青山色祜愕然不對於是一座盡傾其後東坡云世傳徐凝瀑布詩至為塵陋又偽作樂天詩稱美此句有賽不得之語樂天雖涉淺易豈至是哉乃作絶云帝遣銀河一派垂古來惟有謪仙詞飛流濺沫知多少不與徐凝洗惡詩余以為此之相去何啻九牛一毛也韓存中云東坡嘗云人言盧𣏌是姦邪我見鄭公但嫵媚好作一對請諸人將去作一篇詩崔中云山谷稱晏叔原舞低楊柳樓心月歌盡桃花扇底風定非窮兒家語韓存中云東坡作漁蓑句好真堪畫柳絮才髙不道鹽只不道鹽與真堪畫自合是一對陳無巳云山谷最愛舒王扶輿度陽焰窈窕一川花謂包含數箇意韓存中云家中有山谷寫詩一𥿄乃是公有胸中五色筆平生輔衮用功深此詩本用小杜詩中五色線而却書云五色筆若却書云五色筆此真所謂筆悮賀方回初作青玉案詞遂知名其間有云彩筆新題斷腸句後山谷有詩云少遊醉卧古藤下誰作詩歌送一杯解道江南斷腸句只今惟有賀方回蓋載青玉案事東坡作藏春塢有云年拋造化甄陶外春在先生杖屨中而秦少遊作俞充衮詞乃云風生使者旌旄上春在將軍爼豆中余以為依倣太甚陶潛避俗翁未必能逹道觀其著詩集頗亦根枯稿逹生豈是足默識蓋不早生子賢與愚何其繫懷抱山谷云杜子美困窮於三蜀蓋為不知者詬病以為拙於生事又往往譏議宗文宗武失學故聊托之淵明以解嘲耳其詩名曰遣興可解也俗人便為譏病淵明所謂癡人前不得説夢也余以為安得山谷將工部詩篇篇如此訓釋以成一集乎日月老賔客送山谷詩也日月馬上過文潛詩也其工拙有能辨之者老杜云厨人語夜闌東坡云圖書跌宕悲年老燈火青熒語夜深山谷云兒女燈前語夜深余為當以先後分勝負山谷與余詩云百葉湘桃苦惱人又云欲作短歌慿阿素丁寧誇與落花風其後改苦惱作觸撥改歌作章改丁寧作緩歌余以為詩不厭多改東坡作百步洪詩云有如兔走鷹隼落駿馬下注千丈坡當在黃時有人云千丈坡豈注馬處及還朝其人云惟善走馬方能注坡聞者以為注坡山谷有茶詩押腸字韻和者巳數四而山谷最後有曲几團蒲聽煮湯煎成車聲入羊腸之句東坡云黃九怎得不窮故眺無咎復和云車聲出鼎細九盤如此佳句誰能識文潛先與李公擇輩來余家作長句後再同東坡來坡讀其詩歎息云此不是吃煙火食人道底言語蓋其間有漱井消午醉掃花坐晚涼衆緑結夏帷老紅駐春粧山谷次韻云張侯筆端勢三秀麗芝房掃花坐晚吹妙語亦難忘白樂天有詩云醉貌如霜葉雖紅不是春東坡有詩云兒童誤喜朱顔在一笑那知是酒紅鄭谷云衰鬢霜供白愁顔酒借紅老杜云髮少何勞白顔衰肯更紅無巳出此一聮大為諸公稱賞宋景文云詩人必自成一家然後傳不朽若體規畫圓凖方作矩終為人之臣僕故山谷詩云文章最忌隨人後又云自成一家始逼真誠不易之論東坡送江公著云忽憶釣臺歸洗耳又云亦念人生行樂耳注云二耳義不同故得重用陳淳字子真南昌人也嘗以詩呈山谷云作詩須要開廣如老杜日月籠中鳥乾坤水上萍之類子真云淳輩那便到此山谷曰無亦只是𥘉洪龜父有詩云琅玕嚴佛界薜荔上僧垣山谷改云琅璫鳴佛屋以謂薜荔是一聲須要一聲對琅璫即一聲也余以為然龜父云朋見張文潛言魯直楚詞誠不可及朝無咎言魯直楚詞固不可及而律詩輔之終身不敢近也余嘗聞龜父前後詩有一朝厭蝸角萬里騎鵬背一聮最為妙絶龜父云山谷亦歎賞此句山谷謂龜父云甥最愛老舅詩中何等篇龜父舉蟻穴或夢封侯王蜂房各自開戶牖及黃塵不解涴明月碧樹為我生涼秋以為絶類工部山谷云得之古詩云公道世間惟白髮貴人頭上不曾饒而元祐𥘉多用老成故東坡有云此生自斷天休問白髮年來漸不公陳無巳答邢敦夫云今代貴人頭白髮挂冠高處不冝彈其後秦少遊謂李端叔復有白髮偏於我輩公之句則是白髮有隨時之義東坡云為我周旋寧作我一句只是難對時王平甫在坐應聲云只消道因郎憔悴却羞郎秦少遊嘗和黃法曹憶梅花詩東坡稱之故次其韻有西湖處士骨應稿只有此詩君壓倒之句此詩初無妙處不知坡所愛者何語和者數四余獨愛坡兩句云江頭千樹春欲暗竹外一枝斜更好後必有能辨之者陳無巳作小放歌行兩篇其一云春風永巷閉娉婷長使青樓誤得名不惜捲簾通一顧怕君著眼未分明其二云當年不嫁惜娉婷映白施朱作後生説與旁人須早計隨冝梳洗莫傾城山谷云無巳他日作語極髙古至于此篇則顧影徘徊衒耀太甚荆公有詩云端能過我論竒字亦復令君見異書東坡亦云未許郎中得異書且共楊雄説竒字陳無巳又以竒字對異方東坡題李秀才醉眠亭詩云君且歸休我欲眠人言此語出天然醉中對客眠何害須信陶潛未若賢山谷題無咎卧陶軒亦云欲眠不遣客佳處更難忘意極相類秦少遊嘗以真字題月團新碾瀹花瓷飲罷呼兒課楚詞風定小軒無落葉青蟲相對吐秋絲于邢敦夫扇上山谷見之乃于扇背復作小草題黃葉委庭觀九州小蟲催女獻功裘金錢滿地無人費百斛明珠薏苡秋皆所自作也少遊後見之云逼我太甚邢敦夫云掃地燒香閉閣眠簟紋如水帳如煙客來夢覺知何處挂起西窗浪接天東坡詩嘗題于余扇山谷𥘉讀以為是劉夢得所作也陳留市中有一刀鑷工隨所得為一日費醉吟於市負其子以行歌江端禮以為逹者為作傳而要無巳賦詩無巳詩有閉門十日雨凍作飢鳶聲大為山谷所愛山谷後亦擬作有云養性霜刀在閲人清鏡空無以復加潘邠老云陳三所謂學詩如學仙時至骨自換此語為得之然余見山谷有學詩如學道之句陳三所得豈苗裔耶並同前山谷謂余言吾少年時作漁父詞曰新婦磯頭眉黛愁小姑堤畔眼波秋魚兒錯認月沉鉤青蒻笠前無限事緑蓑衣底一時休斜風細雨轉船頭以示坡坡笑曰山谷境界乃于青蒻笠前而巳耶獨謝師直一讀知吾用意謂人曰此即能于水容山光玉肌花貌無異見是真解脫逰戲耳冷齋夜話舒王詩曰紅梨無葉庇華身黃菊分香委路塵晚嵗蒼官才自保日高青女尚橫陳又云木落岡巒因自獻水歸洲渚得橫陳山谷謂余曰自獻橫陳見相如賦荆用不應全耳余曰首楞經亦曰於橫陳時味如嚼蠟山谷云詩意無窮人之才有限以有限之才追無窮之意雖少陵淵明不得工也然不易其意而造其語謂之換骨法規模其意而形容之謂之奪胎法如鄭谷十日菊曰自緣今日人心別未必秋香一夜衰此意甚佳而病在氣不長西漢文章雄深雅健其氣長故也曽子固曰詩當使人一覽語盡而意有餘乃古人用心處所以舒王菊詩曰千花百卉凋零後始見間人把一枝坡則曰萬事到頭都是夢休休明日黃花蝶也愁李翰林曰鳥飛不盡暮天碧又曰青天盡處沒孤鴻其病如前所論山谷登逹觀臺詩曰瘦藤拄到風煙上乞與逰人眼界開不知眼界開多少白鳥去盡青天回凡此之類皆換骨法也顧况詩曰一别二十年人堪幾回別其詩簡緩而立意精確舒王與古人詩曰一日君家把酒杯六年波浪與塵埃不知烏石江邊路到老相尋得幾回樂天曰臨風抄秋樹對酒長年身醉貌如霜葉雖紅不是春東坡南中詩曰兒童悮喜朱顔在一笑那知是醉紅凡此皆奪胎法唐詩曰長因送人處憶得别家時又曰舊國別多日故人無少年舒王東坡用其意作古今不經人道語王詩曰木末北山煙冉冉草根南澗水泠泠繅成白雪桑重緑割盡黃雲稻正青坡曰桑疇雨過羅紈膩麥隴風來餅餌香如華嚴經舉果知因譬如蓮花方其吐花而果具蕊中造語之工至於舒王東坡山谷盡古今之變舒王曰江月轉空為白晝嶺雲分瞑與黃昏一水護田將緑繞兩山耕闥送青來坡海棠詩曰只恐夜深花睡去故燒高燭照紅妝又曰我携此石歸袖中有東海山谷曰此皆謂之句中眼李格非嘗曰老杜謂之詩史者其大過人在誠實耳如玉川子醉歸詩曰昨夜村飲歸健到三四五摩挲青莓苔莫嗔驚著汝舒王用其意作扇子詩曰玉斧修成寶月圓月邉仍有女乘鸞青冥風露非人世鬢亂叉橫特地寒謝公有池塘生春草園林變鳴禽謂之神助古今文士多稱之李元膺曰此句未有過人處古人意所至則見於情詩句蓋寓也謝公喜惠連夢中當論情意不當泥句吾弟超然曰陳叔寶絶無肺腸詩語有驚絶者如午醉醒來晚無人夢自驚夕陽如有意長傍小窗明王摩詰山中小詩曰荆溪白石出天寒紅葉稀山路原無雨空翠濕人衣舒王百家衣體曰相看不忍發慘淡暮潮平欲别更擕手月明洲渚生此得天趣問曰何以識其天趣曰能知蕭何所以識韓信則天趣可解余竟不能詰東坡曰淵明詩𥘉看若散緩熟讀有竒趣如曰日莫巾柴車路暗光巳夕歸人望煙火稚子候簷隙又曰藹藹逺人村依依墟里煙犬吠深巷中雞鳴桑樹顛才高意逺造語精到如此如曰一千里色中秋月十萬軍聲半夜潮蝴蝶夢中家萬里子規枝上月三更深秋簾幕千家雨落日樓臺一笛風皆寒乞相初如秀整熟視無神氣以字露故也東披則曰山中老宿依然在案上楞嚴巳不看細味之無齟齬態對甚的而字不露得淵明遺意耳對句法人不過以事以意出處備具謂之妙荆公曰平昔離愁寬帶眼迄今歸思滿琴心又曰欲寄荒寒無善畫賴傳悲壯有能琴不若東坡特竒如曰見説騎鯨逰汗漫亦曾捫虱話酸辛又曰龍􅋮萬斛不敢過漁舟一葉從掀舞以鯨為虱對龍􅋮為漁舟對大小氣熖之不等其意若玩世謂之秀傑之氣終不可沒夫冨貴中不得言貧賤事少壯中不得言衰老康強不得言疾病死亡或犯之謂之詩讖是大不然詩者妙觀逸想豈限繩墨哉王維作雪中畫芭蕉詩眼見已知其神情意寓於物俗則譏其不知寒暑荆公方大拜忽書其壁曰霜筠雪竹鍾山寺投老歸歟寄此生東坡詩曰平生萬事足所欠惟一死豈可與俗論余作詩曰東坡醉墨浩琳琅千首空餘萬丈光雪裏芭蕉失寒暑眼中騏驥略玄黃句法欲老健有英氣當間用方言為妙竒男子行人羣中自然有頴脫不可干犯之韻老杜八仙詩序李太白曰天子呼來不上船船方言也所謂襟紐是已家家養烏鬼頓頓食黃魚川峽路民多供事烏蠻鬼以臨江故頓頓食黃魚耳俗人不解便作養畜字讀遂使沈存中自差以烏鬼為鸕鷀也詩云夜闌更秉燭相對如夢寐更互秉燭照之恐是夢也作更字讀則失意甚矣山谷每用之所謂一霎杜公雨數畨花信風是也江左風流久已零落士大夫人品不高故音韻絶滅東晉韻人勝士無出謝安石之右煙霏空翠間乃携娉婷登之與夫雪夜訪山隂故人興盡而反下馬據胡床三弄而去者異矣詩有句含蓄者老杜曰勳業頻看鏡行藏獨倚樓鄭雲叟曰相看臨逺水獨自上孤舟是也有意含蓄者如宫詞曰銀燭秋光冷畫屏輕羅小扇撲流螢天街夜色涼如水卧看牽牛織女星又嘲人詩曰怪來粧閣閉朝下不相迎總向春園裏花間笑語聲是也有句意俱含蓄者如九日詩曰明年此會知誰健醉把茱茰仔細看宫怨曰玉容不及寒鴉色猶帶朝陽日影來是也並同前田承君云王居卿在楊州同孫巨源蘇子瞻適相會居卿置酒曰踈影橫斜水清淺暗香浮動月黃昏此林和靖梅花詩然而為詠杏與桃李皆可東坡曰可則可但恐杏李花不敢承當一座大笑直方詩話增修詩話總龜卷之九百家詩話總龜後集卷之九狂放門劍閣云吾將罪真宰意欲鏟疊嶂與太白槌破黃鶴樓剗却君山好語亦何異然劍閣詩意在削平僣竊尊崇王室凛凛有忠義氣槌碎剗却之語但覺一味粗豪耳故昔人論文字以意為主性豪業嗜酒嫉惡懷剛腸飲酣視八極俗物都茫茫此子美胸中語也冝其孩弄嚴武藐視禮法而朱老阮生皆預莫及遭田父泥飲至𬒳肘而不悔其內直外曲強禦不畏矜寡不侮非世所能測也䂬溪唐史載杜審言嘗云吾閔當得屈宋作衙官其孫乃有讀書破萬卷下筆如有神謂蘇味道見吾判且羞死甫乃有集賢學士如堵墻看我落筆中書堂謂為造化小兒所苦甫乃有日月籠中鳥乾坤水上萍所謂是以似之也同上藝苑雌黃云吟詩喜作豪句須不畔於理方善如東坡觀崔白驟雨啚云扶桑大繭如甕盎天女織綃雲漢上往來不遣鳯㗸梭誰能鼓臂投三丈此語豪而甚工石敏若橘林文中詠雪有燕南雪花大于掌氷柱懸簷一千丈之語豪則豪矣然安得尓髙臺或云詠雪非敏若詩見鮑欽止夷白堂小集苕溪漁隱曰東坡集載此詩是題趙令晏崔白大啚幅徑三丈故云往來不遣鳯㗸梭誰能鼓臂投三丈可謂善造語能形容者也畫品人間刀尺不敢裁丹青付與濠梁崔風蒲半折寒鴈起竹間的皪橫江梅乃是崔白冬景圗藝苑以謂驟雨圖誤矣余李太白北風行云燕山雪花大如席秋浦歌云白髮三千丈其句可謂豪矣奈無此理何如秦少逰秋日絶句云連卷雌霓拄西樓逐雨追晴意未休安得萬粧相向舞酒酣聊把作纏頭此語亦豪而工矣郭功甫金山行造語豪世多不見全篇今録于左方金山杳在滄溟中雪崖氷柱浮仙宫乾坤扶持自今古日月倣佛纏西東我泛靈槎出塵世搜索異境窺神工一朝登臨重歎息四時想像何其雄捲簾夜閣挂北斗大鯨駕浪吹長空舟摧岸斷豈足數往往霹靂槌蛟龍寒蟾八月蕩瑶海秋光上下磨青銅鳥飛不盡暮天碧漁歌忽斷蘆花風蓬萊久聞未成往壯觀絶致遙應同潮生潮落夜還曉物數交會誰能窮百年形影浪自苦便欲此地安躬白雲南去供入望又起歸興隨征鴻稱賞門王直方詩話云樂天有詩云醉貌如霜葉雖紅不是春東坡有詩云兒童誤喜朱顔在一笑那知是酒紅鄭谷有詩云衰鬢霜供白愁顔酒借紅老杜有詩云髮少何勞白顔衰肯更紅無巳詩云髮短愁催白顔衰酒借紅皆相類也然無已𥘉出此一聯大為當時諸公所稱賞雪浪齋日記云髙荷字子勉山谷詩云點檢金閨彥飄零玉筍斑尚令清廟器猶隔鬼門關大為山谷所喜杜子美褒稱元結㫪陵行兼賊退後示官吏二詩云兩章對秋月一字偕華星致君唐虞際淳朴憶大庭又云今盜賊未息得結輩數十公落落然參錯為天下邦伯天下少安可立待巳蓋非專稱其文也至於李義山乃謂次山之作以自然為祖以元氣為振無乃過乎秦少遊漫郎詩云字偕華星章對月漏泄元氣煩揮毫蓋用子美義山語也今是堂高麗使過海有詩云水鳥浮還沒山雲斷復連時賈島詐為稍人聮下句云棹穿波底月船壓水中天麗使嘉歎久之䂬溪張祐詩云故國三千里深宫二十年杜牧賞之作詩云可憐故國三千里虛唱歌詞滿六宫故鄭谷張生故國三千里知者唯應杜紫微諸賢品題如是祐之詩名安得不重乎其後有解道澄江靜如練世間唯有謝玄暉解道江南斷腸句世間唯有賀方回等語皆祖是意也葛常之詩人贊美同志詩篇之善多比珠璣璧玉錦繡花草之類至杜子美則豈作此陳腐語也寄岑參詩云意愜關飛動篇終接混茫夜聽許十誦詩云精微穿溟滓飛動摧霹靂贈盧居詩云藻翰唯牽率湖山合動搖贈朱諌議詩云毫髮無遺恨波瀾獨老成寄李白詩云筆落驚風雨詩成泣鬼神贈髙適詩云美名人不及佳句法如何皆驚人語也視餘子其神芝與腐菌哉丹陽集稱薦門溫公自稱為叟香山居士亦嘗以自號其詩云𥘉時𬒳目為迂叟近日蒙呼作隱人司馬豈慕其洛居有間適之樂邪䂬溪周美成邦彥元豐𥘉以大學生進汴都賦神宗命之以官除太學録其後流落不偶浮沉州縣三十餘年蔡元長用事羡成獻生日詩略云化行禹貢山川內人在周公禮樂中元長大喜即以祕書少監召又復薦之揮麈録李白贈崔侍御詩云黃河三尺鯉本在孟津居點額不成龍歸來伴凡魚何當赤車使再往召相如相如蓋自謂也觀此不可謂白之無心于仕進者然當時慢侮力士略不為身謀致貶逐而曽不悔使其欲仕之心切必不如是先是蘇頲為益州長史見白異之曰是子天才英特少益以學比相如故曰詩中每以相如自比從弟之遙曰漢家天子馳駟馬赤車蜀道迎相如自漢陽病酒歸曰聖主還聽子虛賦相如却欲論文章贈張鎬曰十五觀竒書作賦凌相如白自比為相如非止一詩也吳邁逺好自夸而媸鄙他人每作詩得稱意語輒擲地呼曰曹子建何足數哉袁嘏謂人曰我詩有生氣亦以用心深苦俄尓有得冝不勝其喜子美云語不驚人死不休貫休謂得句先呈佛皆此謂也老杜髙自稱許有乃祖之風上書明皇云臣之述作沈鬱頓挫楊雄枚皋可企及也壯逰詩則自比逰崔魏班楊又云氣劘屈賈壘目短曹劉墻贈韋左丞則曰賦料楊雄敵詩看子建親甫以詩雄于世自比諸人誠未為過至竊比稷與契則過史稱甫好論天下大事髙而不切豈自比稷契而然耶至云上感九廟焚下憫萬民瘡斯時伏青蒲廷爭守御床其忠藎亦可嘉矣陽秋韻復齋漫録云江公著𥘉任洛陽尉久旱微雨作詩云雲葉紛紛雨腳勻亂答柔草長精神雷車却碾前山過不灑原頭陌上塵溫公于士人家見之借𥿄筆修刺謁江且為稱豸由此知名投獻門王直方詩話云杭有西湖而潁亦有西湖皆為逰賞之勝而東坡連守二州其𥘉得潁也有潁人在坐云內翰但只消逰湖中便可以了郡事蓋言其訟蕳也秦少章因作一絶獻之云十里荷花􅔽蓞𥘉我公所至有西湖欲將公事湖中了見説官間事亦無後東坡到潁有謝執政啓亦云入參兩禁每玷北扉之榮出典二邦輒為西湖之長錢惟演為洛帥晉守始置馹貢花識者鄙之蔡君謨加法小團茶貢之冨彥國歎曰君謨乃為此也坡作荔枝歎曰我願天公憐赤子莫生尤物為瘡痏雨順風調百谷登民不飢寒為上瑞君不見武陵溪邊粟粒芽前丁後蔡相籠加吾君盛德豈在此致飬口腹何陋邪又不見洛陽丞相忠孝家可憐亦進姚黃花輔世之語不能易也嘗愛李敬方汴河直進船詩云汴水通淮利最多人生為害亦相和東南四十三州地取盡脂膏是此河此等語皆為多背之獻也評論門介甫詩少陵為爾牽詩興可是無心賦海棠杜默云倚風莫怨唐工部後裔誰知不解衣曽不若東坡柯丘海棠長篇冠古絶今雖不指名老杜而輔世之意蓋使來世自曉也樂天九日思杭州云笙歌委曲聲延耳金翠動搖光照身子瞻有懷錢塘云剩看新畨眉倒暈未應泣別臉消紅黎元耆舊何遽忘之也徐考其集白送杭州姚因思舊遊云閭里固冝勤撫恤樓臺亦要數躋扳蘇亦云細雨暗時一百六畫橈鼇鼓莫遺民是未嘗無意于民庶也然白又有故妓數人慿問訊新詩兩首倩流傳坡又有休驚歲歲年年貌且對朝朝暮暮人大抵淫樂之語多於撫飬之語耳夫子稱未見好德如好色而傷之曰已矣乎二公未能免俗餘人不必言子瞻賦濁醪有妙理首句云酒勿嫌濁人當取醇其末乃曰濁者以飲吾僕清者以酌吾友復立分別則是濁醪無妙理矣豈非万斛洶湧不暇點校故歟司馬溫公云清茶淡話難逢友濁酒狂歌易得明雖造次間語亦在於直諒之益而退便僻之損也䂬溪雪浪齋日記云讀謝靈運詩知其攬盡山川秀氣讀退之南山詩頗覺似上林子虛賦才力小者不能到李長吉玉川子詩皆出于離騷未可以立談判也皇甫持正云吟詩未有劉長卿一字唐人必甚重長卿今詩十卷亦清麗宋子京茟記云古人語有推拙不可掩者樂府曰何以銷憂惟有杜康劉越石曰何其不夢周又有曰夫子悲獲麟西狩歎孔丘雖有意緒詞亦鈍朴百家詩話總龜後集卷之九終
