front:
  text: 增修詩話總龜卷之二十一
  hash: sha256:58d4ee48e2c021b9e82e94c784aa196751d87ec70637429ed17d87ee358a10ff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_021-1a}
body:
  text: 詠物門下東坡橄欖詩云紛紛青子落紅鹽氣味森森苦且嚴待得微甘回齒頰巳輸崖蜜十分甜范景仁言橄欖木高大難采以鹽擦木身則其實自落所以有落紅鹽之語南人誇橄欖河東人誇棗直方詩話李公擇種竹館中語同舍曰後人指此竹必云李文正所植貢父笑曰文正不獨繫筆亦知種竹耶時有筆土李文正故云后到貢父西省種竹東坡有詩云舊德終呼名字外後生誰續笑談餘謂此也又一本云爾後貢父種竹坡有詩云舊德言忘久新材得再培亭亭思婦石下閲幾人代蕩子長不歸山椒久相待微雲蔭髮彩𥘉月輝蛾黛秋雨疊苔衣春風舞羅帶宛然姑射姿矯首塵冥外陳迹遂云窮佳期從莫再脫如魯秋氏妄結桑下愛玉質委泥沙悠悠復安在此賀方回作望夫石詩也交遊間無不愛者余謂田承君云此詩可以見方回得失其所得者漸磨之功所失者太粘著皮骨耳承君以為然楊皤字公濟為蓴菜詩云休説江東春水寒到來且覔鑑湖船鶴生嫩頂浮新紫龍脫香髯帶舊涎玉割鱸魚迎刃滑香炊稻飯落匙圓歸期不待秋風起漉酒調羹任我年時人以為讀其詩不必食蓴羮然後知其味余以為可以言詠物未可以語詩耳陳君節字明信言錬句不如錬韻余以為若只覔好韻則失於首尾不相貫穿參寥云東坡在徐州日嘗為秦少遊置酒少遊飲罷擁一官妓從參寥書其裙帶云寄語巫山窈窕娘好將間夢惱襄王禪心巳作沾泥絮不逐春風上下狂並同前踘蹴惟柳三復能之丁晉公亦好焉晉公詩曰背裝花屈膝白打大廉斯進前行兩步蹺去立多時古今詩話郭希聲𥿄窗詩曰偏宜酥壁稱間情白似溪雲薄似氷不是野人嫌月色免教風弄讀書燈聞蛩詩曰愁殺離家未逹人一聲聲到枕前聞苦吟莫入朱門裏滿耳笙歌不聽君青瑣後集巴蜀三紀以來藝能之士精於書畫者衆矣沙門曇彧學李陽氷篆曇彧則神大師門人也道士張昭嗣效柳公權書昭嗣則傳直天師杜光庭門人也工部元員外昭嘏倣韓擇八分書昭嘏亦光庭門人僧曉巒攻張芝草書曉巒則歸夢弟子皆超其本而差其肩獨黃少鑑筌邉鸞崔竹處士滕昌祐擬梁廣花草野人張道隱張藻松石道隱不事論談不與人交往不冠帶不拜跪人謂之猱頭相國李昊為著名道隱常在綿竹山中李司議文才繼閻立本寫真書畫八人皆妙絶當代野人平生讀莊老之書有暇則性好圖龍之真形興思忽至即畫百尺之狀縱意揮畫苟不稱意則塗抹之不啻千餘軀而巳飄飄然雲隂雨氣似蜿蜒之勢擲筆撫掌以為怡逸常以此為適意之作亦曾撰集龍證筆訣三卷傳於家丁未年彭州倅鄭昭請圖真龍于州城之西門太山府君之祠為民致雨於是與二道士數僕夫秉燭以畫使人槌鼓噴笛掌祠者頓足起舞其夕三更風雨大沛奈何一時之戲亦濟農事有蔣貽恭留題詩曰世人空解效丹青惟子通玄得墨靈應有鬼神看筆下豈無風雨助成形威疑噴浪歸滄海勢欲拿雲上杳冥靜閉緑堂深夜後曉來簾幕似聞腥野人間語僧齊巳松詩云雷電不敢伐靈勢蠹萬端􅍪依乾節死蛇人朽根蟠影浸僧禪濕風吹鶴夢寒尋常風雨夜疑有鬼神看小松云發地才盈尺蟠根巳有靈嚴霜百草死深院一株青後夜蕭騷動空階蟋蟀聽誰於千歲外吟倚老龍形續本事詩白傳柳詩二首云青青一樹傷心色會入幾人離恨中為道都門多送别長條折盡減春風又一樹春風萬萬枝嫩于金色軟于絲永豐西角荒煙裏盡日無人屬阿誰又顧雲詩云灞岸晴來送别頻相偎相倚不勝春自家飛絮猶無定爭把長條絆得人唐宋詩云羅隱作續本事詩隂鏗石詩云天漢攴機罷仙人捧膞餘零陵舊是燕昆明本學魚還當榖城别自下解兵書羅鄴水詩云漾漾悠悠幾泒分中浮短棹與鷗群遙天帶雨淹芳草玉洞飄花下白雲靜稱一竿持處見急流孤館覺來聞隋家柳色還堪恨東入長淮日又曛鄭谷云竹院松廊分數沠晴空清碧亦逶迤落花相逐向何處幽鷺獨來無限時洗鉢老僧臨岸久釣魚間客捲綸遲晚來一片連莎緑悔與滄浪有舊期韓喜云方員不定性空柔東注滄溟早晚休高截碧塘長耿耿逺飛青嶂更悠悠瀟湘月浸千年色夢澤燈含萬古愁别有嶺頭嗚咽處為君更作斷腸流並同前唐高相國崇文本薊門將校討劉闢有功授西川節度一旦雪下諸從事吟賞有詩渤海鄙言多呼人為􅐴兒此日筵上謂賔客曰某雖武夫亦有一詩乃口札云崇文崇武不崇文提戈出塞號將軍那箇􅐴兒射落鴈白毛空裏亂紛紛其詩著題皆謂北齊敖曹之比太尉駢即其曾孫也鎮蜀日以蠻蜒侵暴乃築羅城四十里朝廷雖加恩賞亦疑其固護或一日奏樂聞樂聲知有改移乃題風筝寄意曰夜靜絃聲響碧空宫商信任往來風依稀似曲才堪聽又𬒳風吹别調中旬日果移鎮渚宫北夢瑣言馮涓分符眉州不得之任局蹐於陳田之間羈愁六年徒步湘湖著懷秦賦有南冠梁川歌詩集皆傷蹭蹬也有蜀駝引其要云自古皆傳蜀道難爾何能過拔蛇山忽驚登得雞翁磧又恐礙著鹿頭關昻藏大步𧖟叢國曲頸微伸高九尺卓女窺窗莫我知嚴仙據案何曾識題攴機石云不隨俗物皆成土只待良時却輔天苦雨行云釜魚化作池中物木履浮為天際船皆惜已之不遇也蜀城拆體之際幾至殍殕因投鬻米家活有詩云取水郎中何日了破柴員外幾時休早知蜀地區娵與乃訓如此與也悔不長安大比丘即收足大坐也同前徐仲雅題合歡牡丹云平分造化雙包去拆破春風兩面開湘湖故事蔣維東字孟陽零陵人旅中書懷云未有一夜夢不歸千里家落花云流水從將去春風解送來零陵總記東華觀在邵州城下江岸俗謂之水北觀有松偃亞數枝凡八面上有一枝中折搭在半樹間復生垂下掃壇逰人以手扳而撼之則千萬枝皆動霸國時天䇿府學士徐東野坐事謪居于郡見其魁異賞玩無巳因為詩有序序略云搖一枝則萬枝動看一面則八面同白犬出其根青羊入其腹漢髙祖琥珀枕虛真君茯苓人疑其孕也詩云半巳化為石有靈通碧湘生逢堯雨露老值漢風霜月滳蟾心水龍遺胸骨香鹿於毫末后曾見幾興亡裴説鷺鷥云却為分明極翻令所得遲雍陶云立當青草人初見行近白蓮魚未知同前又古今詩話所載馮明道舉此詩不知其為鷺鷥也鸕鷀色黑而頭長能沒水捕魚其疾如飛栖宿之處其下雖水深魚多未嘗犯諺云鸕鷀不打腳下塘杜荀鶴詩云深水有魚㗸得出看來却是鷺鷥飢鸜鵒居人多飬之五月五日去其舌尖則能語聲尤清越雖鸚鵡不能過也僧虛中有詩云菖蒲花不艷鸜鵒性多靈相思樹其狀尤佳子員而紅故老云昔有人北沒於邊其妻追思之泣於樹下而卒因號相思樹黃損鷓鴣詩云而今世上多離别莫向相思樹下啼蓋採其意也柘樹多叢生幹踈而直葉豐而厚春𧖟食之其絲以冷水繅之謂之冷水絲可以瑟絃蓋檿絲之類蔣密詠桑柘詩云綺羅因此木桃李謾同時楊桐葉細冬青臨水生者尤茂居人遇寒食採其葉染飯色青而有光食之資陽氣謂之楊桐飯道家所謂青飢飯鄭畋二十八宿詩云員明青飢飯光潤碧霞漿謂此櫟樹多生岡阜之上大則偃亞小則聳𡵨踈曠而性直伐為薪煆為炭其力倍于常木王正詩云未可輕樗櫟尤能濟雪霜木蘭花枝葉俱踈花即裏白表紫或有四季開者生于深山者尤大可以為船陸龜蒙木蘭花詩云曾向木蘭船上過不知船是此花身古今詩話載全篇謂是李義山作映山紅生於山坡欹側之地高不過五七尺花繁而紅輝映山林開時杜鵑始啼又名杜鵑花成幹詩云杜鵑花與鳥怨艷兩何賖疑是口中血滳成枝上花一聲寒食夜數朵野僧家謝豹出不出日遲遲又斜並同前羅漢絛後洞有草蔓結如帶長丈餘附木而生相傳謂之羅漢絛畢田詩云五百移栖絶洞深空留轍迹杳難尋緑絲絛帶何人施長到春來挂滿林湘中故事舒王與薛處士碁賭梅花詩輸一首曰華髮尋春始見梅一枝臨路雪培堆鳯城南北他年憶杳杳難尋驛使來與俞秀老至報寧王假寐秀老私跨王驢謁寶覺禪師有頃秀老至王曰為士子敢盜跨吾驢秀老願自贖其罪王曰罰松聲詩一首秀老立就詞極佳人忘之余輔曰萬壑搖蒼煙百灘度流水下有跨驢人瀟瀟吹醉耳冷齋夜話前輩花詩多用美女比狀如云若教解語應傾國任是無情也動人俗哉山谷酴醿詩曰露􅊜何郎試湯餅日烘荀令炷爐香乃是以丈夫比之若出類而吾叔彭淵材作海棠詩又不然曰雨過溫泉浴妃子露濃湯餅試何郎尤工也曾子宣夫人魏氏作虞美人草行云鴻門刀斗紛如雪十萬降兵夜流血咸陽春殿三月紅霸業巳隨煙燼滅剛強必死仁義王隂陵失道非天亡英雄本學萬人敵何用屑屑悲紅妝三軍散盡旌旗倒玉帳佳人坐中老香魂夜逐劒光飛青血化為原上草芳菲寂寞寄寒枝舊曲聞來似斂眉哀語徘徊愁不語恰如初聽楚歌時滔滔逝水流今古漢楚興亡兩丘土當時遺事久成空慷慨樽前為誰舞舒王在鍾山有道士來謁因與碁輒作數語曰彼亦不敢先此亦不敢先惟其不敢先是以無所爭惟其無所爭故能入於不死不生舒王曰此特碁隱語東坡詩曰客來茶罷渾無事盧橘楊梅尚帶酸張嘉甫曰盧橘何種果也曰枇杷是矣事見相如賦嘉甫曰盧橘夏熟黃柑橙楱枇杷橪柿亭奈厚朴盧橘果枇杷不應重用應劭注曰伊尹書曰箕山之東青鳥之所盧橘常夏熟不據之而何也坡笑曰不𣣔爾余遊儋耳見黎氏出東坡别海北詩曰我本儋耳民寄生西蜀州忽然跨海去譬如事逺逰平生生死夢三者無劣優知君不再見欲去且少留又登望海亭柱間有擘窠大字曰貪看白鳥橫秋浦不覺青林沒暮潮又謁薑唐佐見其毋余問識蘇公乎曰然無奈好吟詩嘗杖而至有包燈心𥿄公以手拭開書滿𥿄余索讀之醉墨欹傾曰張睢陽生猶罵賊嚼齒穿齦顔平原死不忘君握拳透爪余至瓊州有長短句賦燈蛾曰密燭花猶清夜闌粉衣香翅繞團圞人皆認假為真實蛾豈將燈作火看方嘆息為遮攔也知愛處實難拚忽然性命隨煙焰始覺從前𬒳眼瞞老杜詩曰笋根稚子無人見沙上鳬雛傍母眠世不解稚子無人見何等語唐人食筍詩曰稚子脫錦綳駢頭玉香滑則稚子為筍明矣贊寧雜記曰竹根有鼠大如貓色類竹名竹豚亦名稚子余問韓子蒼子蒼曰筍為稚子老杜之意不用食筍詩亦可老杜北征詩曰惟昔艱難初事與前世别不聞夏商衰中自誅褒妲意者明皇鑑夏商之敗畏天悔過賜妃子死也而劉禹錫馬嵬詩曰官軍誅佞幸天子捨妖姬群吏伏門屏貴人牽帝衣白樂天長恨歌曰六軍不發無奈何宛轉蛾眉馬前死乃官軍迫使殺妃子歌詠祿山叛逆耳孰謂劉白能詩哉北征詩識君臣大體可貴也衡州花光仁老以墨寫梅花魯直嘆曰如嫩寒春曉行孤山籬落間但欠香耳余賦長短句曰碧瓦籠晴香霧繞呵手西偏小駐聞啼鳥風度女墻吹語笑南枝破臘應開了道骨不凡江瘴曉春色通靈醫得花重小抱釀寒春杳杳一聲畫角光殘照又曰入骨風流國色透塵種性真香為誰風流鬢啼粧半樹水村春暗雪壓枝低籬落月高影動池塘高情數筆寄微茫小寢初開霧帳並同前增修詩話總龜卷之二十一百家詩話總龜後集卷之二十一留題門澧陽道旁有甘泉寺因䒹公丁謂曽留行記從而題詠者甚衆碑牌滿屋孫諷有平仲酌泉曽頓轡謂之禮佛遂南行髙臺下瞰炎荒路轉使髙僧薄寵榮人獨傳道余獨恨其語無別自古以直道見黜者多矣豈皆貪寵榮者哉又有人云此泉不洗千年恨留與行人戒覆車害理尤甚萊公之事亦例為覆車乎因過之偶為數韻其間有云已慿靜止鑑忠精更遣清冷洗讒喙蓋指二公也䂬溪黃州麻城縣界有萬松亭連日行清隂中其館亭亦可愛適當關山路往來留題無數東坡傷耒者不嗣其意嘗有詩云十年栽種百年規好德助人無我儀又云為問幾株能合抱殷勤記取角弓詩中嘗徹碑有士題云舊韻無儀字蒼髯有恨聲不可録旁溪張祐喜逰山而多苦吟凡所歷僧寺往往題咏如題僧壁云客地多逢酒僧房却厭花題萬道人禪房云殘陽過逺水落葉滿踈鍾題金山寺云僧歸夜船月龍出曉堂雲樹影中流見鍾聲兩岸聞題孤山寺云不雨山長閏無雲水自隂斷橋荒蘚澀空院落花深如杭之靈隱天竺蘇之靈岩楞伽常之惠山善權潤之井露招隱皆有佳作李涉在嶽陽嘗贈其詩曰嶽陽西南湖上寺水閣松房遍文字新釘張生一首詩自余吟著皆無味信知僧房佛寺題其詩標榜者多矣葛常之溫公治第洛中闢閌曰獨樂其心憂樂未始不在天下也其自作記有云世有人肯同此樂必再拜以獻矣東坡賦詩云兒童誦君實走卒知司馬蓋名其得人心也又云撫掌笑先生年來學瘖啞疑未盡命名之意同上沈約命王筠作郊居十詠書于壁不加篇題約云此詩指物程形無假題署老杜贈李潮八分歌云吾甥李潮下筆親開元巳來數八分潮也奄有二子成三人何退之招揚之之罘南山來文字得我驚我令之罘歸失得柏與馬之罘別我去計出柏馬下我自之罘歸入門思而悲之罘别我去能不思我為作詩招之罘晨夕抱飢渴嘗戲謂此二詩真不須題署也黃常明子美詩誅茅初一畝廣地方連延敢謀土木麗自覺面勢堅經營上元初斷手寶應年又題衡山縣學堂云旄頭彗紫微無復爼豆事于乎巳十年儒服敝于地衡山雖小邑首唱恢大義講堂非曩造大屋加塗塈下可容百人墻隅亦深邃林木在庭户密幹疊青翠有井朱夏時轆轤凍階戺采詩倦跋涉載筆尚可記豈不是草堂縣學紀李翺皇甫湜集中皆無詩世傳翶有縣君好磚渠一詩并傳燈録載答藥山一偈湜秪有浯溪留題一篇而已許彥周詩話云牧之題桃花夫人廟詩細腰宫裡露桃新脈脈無言度幾春至竟息亡緣底事可憐金谷墜樓人僕嘗謂此詩為二十八字史論苕溪漁隱曰牧之于題詠好異于人如赤壁云東風不與周郎便銅雀春深鎖二喬題啇山四皓廟云南軍不袒左邉袖四老安劉是滅劉皆反説其事至題烏江亭則好異而畔于理詩云勝敗兵家事不期包羞忍耻是男兒江東子弟多才俊卷土重來未可知項氏以八千人渡江敗亡之餘無一還者其失人心為甚誰肯復附之其不能卷土重來決矣許彥周詩話云牧之作赤璧詩折戟沉砂鐡未消自將磨洗驗前朝東風不與周郎便銅雀春深鎖二喬意謂赤璧不能縱火即為曹公奪二喬置之銅雀臺上也孫氏霸業系此一戰杜禝存亡生靈塗炭都不問只恐沒了二喬可見措大不識好惡南唐書云韓熙載自江南奉使中原為感懷詩題于館壁云㒒本江北人今作江南客再去江北逰舉目無相識秋風吹我寒秋月為誰白不如歸去來江南有人憶苕溪漁隱曰余家有韓熙載家宴啚啚中題此詩后四句嘗以問相識間云是古樂府今觀此書方知其誤也苕溪漁隱曰題吳江三賢堂內陸龜蒙詩云千首文章二頃田囊未有一錢看却因飬得能言鴨驚破王孫金彈丸談苑云陸龜蒙居笠浲有內飬自長安使杭州舟出舍下彈其一緑頭鴨龜蒙遽從舍出大呼曰此緑頭有異善人言將獻天子今持此死鴨以詣官內飬少長宫禁信然厚以金帛遺之因徐問龜蒙曰此鴨何言龜蒙曰常自呼其名逰道埸山何山詩云白水田頭問行路小溪深處是何山髙人讀書夜逹旦至今山鶴鳴夜半汪彥章何山何氏書堂記云寺有何氏書堂圖記相承以何氏為晉何楷楷嘗讀書此山後為吳興太守以其居為寺而名其山寄贈門子美詩逺行無自內熱比何如寄旻云舊來好事今能否老去新詩誰與傳岑參云喬生作尉别耒久因君為問平生否魏君校理復何如前月人來不得書夫子素多疾别來未得書北庭苦寒地體內今寒如樂天寄夢得云病後能吟否秋來曽醉無退之贈崔立之云長女當人事誰助出􅍤縭諸男皆秀爽幾能守家規亦皆書一通也張均張均兄弟承襲父寵致位嚴近皆自負文材覬覦端揆明皇𣣔相均而抑于李林甫𣣔相垍而奪于楊國忠自此各懷􅔵望安祿山盜國垍相祿山而均亦受偽命肅宗反正兄弟各論死非房琯力救豈能免乎老杜贈均詩云通籍踰青瑣亨衢照紫泥靈虬傳夕箭歸馬散霜蹄言均為中書舍人刑部尚書時也贈垍詩云翰林逼華蓋鯨力破滄溟天上張公子宫中漢客星言垍尚寧親公主禁中置宅時也二人恩寵烜赫如是則報國當如何而乃斁亂天理下比逆賊反噬其主夫豈人類也哉黃常明杜甫纍不第天寶十三載明皇朝獻太清宫饗廟及郊甫奏賦三篇帝竒之使待制集賢院命宰相試文章故有贈集賢崔于二學士詩云昭代將垂白途窮乃呌閽氣沖新象表詞感帝王尊天老書題目春官驗討論倚風遺鴨路隨水到龍門舊注陳希烈韋見素為宰相而崔國輔于休烈者皆集賢院學士也故末句云謬稱三賦在難述二公恩可謂不忘于藻鑑之重者矣按唐史是歲陳希烈為相至八月見素代之而甫集有上見素詩云持衡晉藻鑑聽履上星辰則甫之文乃為見素所賞非希烈也同上牧之贈阿冝一日讀十𥿄一月讀十箱古人讀書以𥿄計范雲就袁叔明讀毛詩日誦九𥿄又袁俊家貧無書每從人假借必皆抄寫自課日五十𥿄為計䂬溪故事門余嘗論李廣以私憾殺灞陵尉𥚹忮險刻決非長者所以不侯非直殺降之讉也因觀坡云明年定起故將軍未肯先誅灞陵尉恐亦寓此意史傳襲稱兄弟為友于故淵明詩云再喜見友于子美云友于皆挺拔又山鳥山花吾友于南史到藎從武帝登北顧樓賦詩藎受詔便就上以示其祖溉云藎定是才子畨恐卿從來文章假手于藎後每和御詩上輒手詔戲溉曰得無貽厥之力乎退之玉川詩云誰謂貽厥無基址二事正可對也䂬溪坡云賔鴻社燕巧相違月令來賔事常疑人未曽用及及觀夢得秋江晚泊云莫霞千萬狀賔鴻次第飛顧况云安得凌風翰肅肅賔天京社別浦鴈賔秋同上東坡遊金山詩云江山如此不歸山江山見怪驚我頑我謝江神豈得巳有田不歸如江水蓋與江神指水為盟耳句中不言盟誓者乃用子犯事指則誓在其中不必詛神血口然後謂之盟也送程六表弟云浮江泝蜀有成言江水在此吾不食黃常明老杜復見諸山得銀甕注引禮記山出器車注蓋瑞應圖曰王者宴不及醉刑罰中人不為非則銀甕出昌黎我有雙飲盞其銀得朱提見漢志朱提銀八兩為一流注朱提屬揵為乃邑名也䂬溪樂天以長慶二年自中書舍人為杭州刺史冬十月至治時仍服緋故逰恩德寺詩序云俯視朱紱仰睇白雲有愧于心及難自歎詩云實事漸銷虛事在銀魚金帶繞腰光戊申咏懷云紫泥丹筆皆經手赤紱金章盡到身以今觀之金帶不應用銀魚而金章不應用赤紱人皆以為疑而不知唐制與今不同也按唐制紫為三品之服緋為四品之服淺緋為五品之服各服金帶又制衣紫者魚袋以金飾衣緋者魚袋以銀飾樂天時為五品淺緋金帶佩銀魚冝矣劉長卿有袁郎中喜章服詩云手詔來筵上腰金向粉闈勳名傳舊閣蹈舞著新衣即中亦是五品故其身章與樂天同葛常之書事門近世作文者多以紫荷囊作侍從事用如宋景文詩所謂榮觀聳麟族賦筆助荷􅌩之類襲而用者非一而不知其誤也按晉書輿服志書文武百官皆有囊綬八座尚書則荷紫以生紫為祫􅌩綴之服外加于左肩則所謂荷紫者非芰荷之荷乃負荷之荷也南史載周捨嘗問劉香曰著紫荷囊相傳云挈囊竟何所出香曰張安世傳云持槖筆事孝武帝數十年注曰槖􅌩也蓋人徒見南史有著紫荷􅌩四字遂作一句讀之殊未知晉書紫荷之義也丹揚集王儉少年以宰為命嘗有詩云稷契康虞夏伊吕翼商周又字其子曰元成取仍世作相之義至其孫訓亦作詩云旦奭康世巧蕭曹佐氓俗大率追儉之意而為之後官亦至侍中同上杜云十暑岷山葛三霜楚户砧九鑽巴噀火三蟄楚祠雷其書歲月也新矣樂天云吳郡兩回逢九月越州四度見重陽去年八月十五夜曲江池畔杏園邊今年八月十五夜湓浦沙頭水館前又前年九月餘杭郡呼賔命宴虛白堂去年九月到東洛今年九月來吳鄉兩邉蓬鬢一時白三處菊花同色黃其質直敘事又自一格黃常明岑參送顔平原詩序云十二年春有詔輔尚書郎十數公為郡守上親賦觴群公于蓬萊仍賜以繒帛寵餞加等故參為長篇述其事安祿山亂明皇曰河北二十四郡無一忠臣邪及聞平原固守乃曰朕不識真卿何如人所為若此前吕宴賚真文具耳退之云偶然題作木居士便有無窮求福人可謂切中時病凡世之趨附權勢以啚身利者豈問其人賢否果能為國為民哉及其敗也相推入禍門而己聾俗無知諂祭非鬼無異也䂬溪感事門三山語録登慈恩寺塔詩􅏺天寶時事也山者人君之象秦山忽破碎則人君失道矣賢否自混淆而清濁不分故曰涇渭不可求天下無網紀文章而上都亦然故曰俯視但一氣焉能辨皇州于是思古之聖君不可得故曰回首呌虞舜蒼梧雲正愁是時明皇方耽于淫樂而不已故曰惜哉瑶池飲日宴崑崙丘賢人君子多去朝廷故曰黃鵠去不息哀鳴何所投惟小人貪竊祿位者在朝故曰君看隨陽堆各有稻梁謀同上西清詩話云退之宿龍宫灘詩云浩浩復湯湯灘聲抑更揚黃魯直曰退之才聽水句尤見工謂浩浩湯湯抑更揚者非諳客裏夜卧飽聞聲安能周旋妙處如此耶渙隱叢話東坡云南澗中詩秋氣集南澗獨逰亭午時回風一蕭瑟林影久參差始至若有得稍深遂忘羈禽響幽谷寒藻舞淪漪去國魂巳逺懷人洎空垂孤生易為感失路少所宜索寞竟何事徘徊只自知誰為後來者當與此心期柳儀曹詩憂中有樂樂中有憂蓋絶妙古今矣然老杜云王侯與螻蟻同盡隨丘墟儀曹何憂之深也蔡寬夫詩話云子厚之貶其憂悲憔悴之𣣔發于詩者特為酸楚閔巳傷志固君子所不免然亦何至是卒以憤死未為逹理也樂天既遇間放浪物外若真能脫屣軒冕者然榮辱得失之際銖銖校量而自矜其逹每詩未嘗不著此意是豈真能忘之者哉亦能勝之耳惟淵明則不然觀其貧士責子與其他所作當憂則憂遇喜則喜忽然憂樂兩忘則隨所遇而皆適未嘗有擇於其間所謂超世遺物者要當如是而後可也觀三人之詩以意逆志人豈難定以是論賢不肖之實亦何可欺乎隱居詩話云樂天題海圖屏風詩略曰或者不量力謂兹鼇可求贔􅸻牽不動綸絶沉其鈎一鼇既頓頷諸鰲齊掉頭噴風激飛亷鼓波怒陽秋遂使江漢水朝宗意亦休吾讀此詩感劉隗李訓㾕文通等事為之太息老杜所以為人稱慕者不獨文章為工蓋其語默所主君臣之外非父子兄弟郎朋友黎庶也嘗觀韋應物詩及兄弟者十之二三廣陵覲兄牧情且為歡纍日不知飢冬至寄諸弟云巳懷時節感更抱別離酸元日寄諸弟云日月昧逺期念君何歇社日寄云遙思里中會心緒悵微微寒食聮騎定何時吾今顔巳老又云把酒看花想諸弟杜陵寒食早青青初秋寄云髙梧一葉下空齋歸思多聞蟬寄諸弟云緘書報是時此心方耿耿登郡樓寄諸季云上懷犬馬戀下有骨情余謂觀此集者雖讒鬩交愈當一變而怡怡也黃常明百家詩話總龜後集卷之二十一
