front:
  text: 增修詩話總龜卷之二十九
  hash: sha256:e6019197b5f0661bfe21ed306902bbe8aee4ed8a5f79b252e3645be672219ac1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_029-1a}
body:
  text: 詩纍門隋煬帝善屬文不欲人出其右薛道衡由是得罪後因事誅之曰更能作空梁燕落泥否嘗為燕歌行文士皆和之著作郎王胄獨不和焉每銜之終坐此見害而誦其警句曰庭草無人隨意緑復能作此邪小説舊聞劉禹錫自屯田員外郎左遷鼎州司馬凡十年始召還方春贈看花者云紫陌紅塵拂面來無人不道看花回玄都觀裏桃千樹盡是劉郎去後栽不日傳於都下好事白執政誣其怨憤他日見時宰與坐慰勞久之既而曰近日新詩未免為纍不數月遷連州刺史其自敘云貞元二十一年春余為屯田員外郎時玄都觀未花是歲牧州至荆南又貶鼎州司馬居外十年召至京師人言有道士手植仙桃滿觀盛開遂有前篇以識一時之事既出牧十四年始為主客郎中重逰是觀再書二十八字以俟後逰時元和二年三月也百畝亭中半是苔桃花開盡菜花開種桃道士今何在前度劉郎去又來古今詩話唐左司郎中喬知之有婢名窈娘藝絶當時武延嗣聞之欲一見既見即留之無復還知之痛憤因為詩賂閽者以逹窈娘窈娘繫於裙帶赴井而死延嗣見詩酷吏誣陷知之破其家詩曰石家金谷重新聲明珠百顆買娉婷昔日可憐公自許此時歌舞得人憎窈娘答曰公家閨閣不曾關好將歌舞借人看冨貴英雄非分理驕奢勢力橫相干别公此去終不忍徒勞掩袂傷紅粉百年離别在髙樓一代紅顔為君盡載初元年三月也四月下獄死同前宣宗好文嘗賦詩有金步搖未能對令溫𡵨卿即廷筠也續之𡵨卿以玉跳脫應之宣宗令以甲科處之為令狐綯所沮除方城尉綯曾問其事于𡵨𡵨曰出南華真經非僻書也冀相公燮理之暇時冝覽古綯怒甚後𡵨有詩曰悔讀南華第二篇之句南部新書北夢瑣言廷筠事甚詳此獨載玉跳脫事又瑣言以跳為條與此不同南華真經無玉跳脫事不知當時何所據也劉希夷詩曰年年歲歲花相似歲歲年年人不同其舅宋之問苦愛此兩句知其未乏傳人懇乞許而不與之問怒以土袋壓殺之宋不得其死亦其報也並同前薛令之閩之長溪人嘗為右庶子時開元東宫官僚清冷令之作詩題于壁曰朝日上團團照見先生盤盤中何所有苜蓿長闌干飯澀匙難綰羮稀筯易寬無以謀朝夕何由保歲寒明皇行東宫見之題於其傍曰啄木觜距長鳯凰毛羽短若嫌松桂寒任逐桑榆暖遂謝病歸古今詩話南唐徐融夜宿金山詩云維船分蟻照江市聚蠅聲烈祖姓嚴忌宋齊丘譛之以竹籠沉于京口開元間禁中初重木芍藥植于興慶池東沉香亭會花盛開明皇乘照夜駒妃子步輦從之詔選梨園弟子中尤者得樂十六色李龜年以歌擅一時之名手擅捧板押衆前樂將歌明皇曰賞名花對妃子焉用舊詞遽命李龜年持金花箋賜李白立進清平調詞三章白承詔尚苦宿醒遂賦詞其一曰雲想衣裳花想容清風拂檻露華穠若非群玉山頭見定向瑶臺月下逢其二曰一枝紅艷露凝香雲雨巫山枉斷腸借問漢宫誰第一可憐飛燕倚新粧其三曰名花傾國兩相歡常得君王帶笑看解釋春風無限恨沉香亭北倚闌干龜年遂以調進令梨園弟子歌之太真妃持七寶杯酌西梁州葡萄酒笑領歌意明皇因調玉笛倚曲遲其聲以媚太真妃自是顧白尤異於諸學士然髙力士終以脫靴為耻異日太真妃重吟前詞力士曰始謂太真妃怨白入骨髓翻拳拳如是耶太真妃因驚曰何翰林學士能辱人如此力士曰以妃子比飛燕賤之甚矣太真妃頗深然之明皇欲三命白官卒為宫中所沮而止孟浩然逰京師張九齡王維雅稱道之維因邀入內省俄而明皇至浩然匿床下維以實對帝喜曰聞其人矣而未之見也何懼而匿詔出問所為詩浩然自誦云不才明主棄明皇曰卿自不求仕非朕棄卿也奈何誣我因放還並同前孟浩然曾謁華山李相不遇因留一絶而去曰老夫三日門前立朱箔銀屏晝不開詩卷却拋書袋內譬如間看華山來一日明皇召李對説及浩然事對曰見在臣私第急召俾口進佳句孟誦北闕休上書南山歸舊廬不才明主棄多病故人踈明皇不恱曰未嘗見浩然進書朝廷退黜何不云氣蒸雲夢澤波動嶽陽城由此不遇與前所言及托言稍異又北夢瑣言載元宗謂浩然何不道氣蒸雲夢澤波動嶽陽城由是不遇於布衣襄陽詩人孟浩然開元中頗為王右丞所知有微雲淡河漢踈雨滳梧桐之句右丞擊節賞之維侍金鑾殿一日召之商較古今風雅忽遇明皇幸維所浩然錯愕伏床下維不敢隱奏聞明皇欣然曰素聞其人因得召見卿將何詩來否浩然曰偶不將來奉詔念詩曰北闕休上書南山歸舊閭不才明主棄多病故人踈明皇憮然曰朕未曾棄人自是卿不求進奈何有此作因命歸終南山唐宣宗索趙嘏詩其卷首有題秦詩云徒知六國隨斤斧莫有群儒定是非宣宗不恱北夢瑣言正訛門宋謝眺詩云芳洲採杜若正觀中醫局求杜若度攴郎乃下坊州令貢州司判報云不出杜若應由謝眺詩悮也太宗聞之大笑判司改雍州司法度攴郎免官小説舊聞張安道云江鄰幾言孟郊死葬北邙山非退之詩也賀家湖上天花寺一一僧窗向水開不用閉門防俗客愛間能有幾人來此吳文靖詩也詩史灔澦歌水經云白帝山城門西江有孤石冬出二十餘丈夏即沒去郡二十里有瞿塘湍言灔澦石與城郭門外石潛通蜀人往燒火伏時則灔澦邉沸王濬平吳尤作預石今訛曰灔澦瞿塘湍水急諺曰灔澦大如馬瞿塘不可下古今詩話老杜有杜日兩篇其一曰尚想東方朔詼諧割肉歸然而漢書所載事乃伏日直方詩話山谷云老杜長鑱短鑱白木柄我生托此以為命黃獨無苗山雪盛短衣數挽不掩脛往時儒者不解黃獨義改為黃精學者承之以余考之蓋黃獨是也本草諸魁注黃獨肉白黃色漢人蒸食之江東謂之土芋余求之江西江西謂之土卵蒸煮食之類芋魁也老杜家諱間而詩中有云翩翩戲蝶間過幔或云恐傳者謬又有宴王使君宅詩云泛愛憐霜鬢留歡卜夜間余以為當以間為正臨文恐自不以為避也老杜送賈閣老出守汝州云雲山紫邏深世之注云邏塞也取巡邏之義而余觀九域圖乃云汝州有紫邏山京師人呼大夫為大斧呼承制為承池蓋語訛也有入戲為句云大夫何嘗斧承制豈當池或云不當池舊以王維有詩名而好取人章句如行到水窮處坐看雲起時乃英華集詩也漠漠水田飛白鷺隂隂夏木囀黃鸝乃李嘉祐詩也余以為有摩詰之才則不可然是剽竊之雄耳劉貢父作詩話稱杜甫云功曹非復漢蕭何按光武謂鄧禹何以不掾功曹謂曹參嘗為功曹云鄼侯非也雍丘江子載云高祖紀何為主吏孟康曰主吏功曹也貢父之言過矣貢父又云白樂天詩云請錢不早朝請作平聲唐人語也江子載亦云顔師古注漢書請或音才性反或不音唐或以請作平聲悮矣舒王集中有落星寺詩其末云勝槩惟詩可收拾不才羞作等間來落星寺在彭蠡湖中劉咸臨嘗親見寺僧言幼時目覩閩中章傳道作此詩其前六句皆同其末云勝槩詩人盡收拾可憐蘇石不曾來蘇石謂子美并曼卿也後人愛其詩者改末句作舒王詩傳之遂使一篇之意不完其體與舒王所作詩語不同也並同前莊子曰野馬也塵埃也乃是兩物古人謂野馬塵埃吳融賦曰動梁間之野馬韓渥詩云窗裏日光飛野馬恐不然野馬乃田間逰氣逺望如群馬又如水浪佛書謂如熱時野馬陽熖即此物也古今詩話章聖朝試天德清明賦有閩士破題云天道如何仰之彌高讀作歌會考試者亦閩人遂中選又荆南士人今雪詩用先字韻其末句云十二峰前旋旋添添作天守郡謂之建麾蓋用顔延年一麾乃出守之句不知其誤也延年謂一麾之麾如武王右秉白旄以麾之麾耳延年贈始平詩云屢薦不入官一麾乃出守謂山濤薦咸為吏部郎三上而武帝不用其後一擠遂出始平故有此句延年𬒳擯以此自托爾後杜牧之為登樂逰原詩云擬把一麾江海去樂逰原上望昭陵遂為故事今人不用厮字唐人作斯音五代時作入聲陶榖詩云尖簷帽子卑凡厮是也樂天又云金屑琵琶槽雪擺胡騰琵琶胡語與今人同少陵詩云皂雕寒始急白公歌云千呼萬喚始出來皆以為語病其實不然事之終始則音上聲有所宿留則音去聲二公詩非語病也宋景文言大孤山以孤獨為字有廟在江壖乃為婦人形陳蕳夫留詩曰山稱孤獨字廟塑女郎形過客須知誤行人尚乞靈時稱佳句羊愔太山人嘗逰阮郎亭崕下有篆字詩刻石世傳漢阮肇所書驗之乃李陽氷為緒雲令時逰此亭題耳詩云阮客家何在仙雲洞口橫人間不到處今日此中行杜少陵詩云家家飬烏鬼頓頓食黃魚説者謂夔峽間有鬼户乃夷人也不聞有烏鬼蓋蜀人臨水居者皆飬鸕鷀繩繫其頸使捕魚得魚則倒持出之至今如此詩家用也字本皆音夜杜詩云清絶也元禎云也向慈恩寺裏遊今人讀為如字非也張端為河南司録府當祭社買豬呈尹豬走入端家即取殺之吏以白尹尹召端問端對按律云豬夜入人家主人登時殺之勿論尹大笑令别市豬並同前歐陽公記陶榖詩末厥兵不曉其意余謂今人呼秃尾犬為厥尾衣之短者亦呼為厥然則此兵正謂其末賤耳今人不以末厥相連言之其義則是也不然則不可對卑凡厮貢父詩話世人語虛偽者為何樓似泛濫之名其實不然國初京師有何家樓其下所賣物皆汚濫者故人以此目之樓巳廢語尚在也俳優人言河市樂人説者謂石駙馬在南都其家樂甚盛詆誚南河市中樂人故得此名其不然唐元和時燕吳行紀巳有河市字大抵不隸軍中有河市者散樂名也又人謂事之陳久者為贊本五代時有馬贊者為使府幕官其人魯戇有所聞見他人巳熟而巳方為新竒而道之時人見有言事之陳者皆號贊云薛簡肅公尹開封以嚴為治謂之薛出油其後牧成都歲豐人樂其俗與之逰作春逰好十首自號薛春逰欲換前稱也並同前李文正進永昌陵挽辭云奠玉五回朝上帝御樓三度納降王當時群臣皆進惟文正詞最為首出所謂三降王者廣南劉鋹西蜀孟昶江南李煜也五朝上帝則誤矣建隆盡四年明年初郊改乾德至六年再郊改元開寶五年又郊而不改元九年己平江南四月大雩告謝于西京欲蓋執玉祀天者實四也當時人必繆傳者誤為五耳歐公詩話古詩云袖中有短歌欲寄雙飛燕意以燕春來秋去自可寄書故寓言爾今人馴養家鴿携在外數千里輒能還家蜀人以事至京師者以鴿寄書不旬日而逹賈人舶船浮海亦以鴿寄書皆非虛言也陸機使黃耳寄書此殆不然自洛至吳更厯江淮犬何能濟必從舟楫而渡犬又豈能諭意于涉人或者謂陸機有奴名黃耳因此為狗也貢父詩話淮南張佖知舉進士試天雞弄和風佖但以文選中詩句為題未嘗詳究也有進士白試官云爾雅天雞䮧天雞天雞有二未知孰是佖大驚不能對亟取爾雅檢釋蟲有天雞小蟲黑身赤頭一名莎雞一名樗雞釋鳥有䮧天雞赤羽逸周書曰文䮧若彩雞成王時蜀人獻之江東士人深於學問有如此者談苑李白戲杜甫云借問别來太瘦生只為從前作詩苦太瘦生唐人語也至今尤以生為語助所謂可憐生作么生何似生之類是也陶穀有詩云尖簷帽子卑凡厮短靿靴兒末厥生亦當時語也余天章景祐間巳聞此語時陶公卒未久人莫曉其義王元叔慱學多聞最為多識亦不知為何語也記之必有知之者歐陽詩話貢父謂未厥兵今謂未厥生姑存之延州五城説者以謂舊有東西二城夾河對立高方典郡始展東西北三城豫讀杜詩云五城何迢迢迢迢隔河水延州秦北門山川猶可恃乃知天寶間巳有五城也筆談茶芽古謂之雀舌麥顆取其至嫩也余謂茶之美者其質素良而所植之土又美則新芽一發便長寸餘其細如針惟芽長為上品以其質幹土力皆有餘也如雀舌麥顆極下材耳乃北人不識誤為品題豫山居有茶崘為茶崘詩曰誰把嫩香名雀舌定知北客未曾嘗不知靈草天然異一夜風吹一寸長同前司馬君實嘗論九旗之名旗與旗相近緩急何以區别小雅庭燎夜向晨言觀其旗左傳尾伏辰取虢之旗當為芹音耳關中人言清濁之清則不改言丹青之青為萋又以中為蒸蟲為塵不知旗本是芹亦關中人語轉丹青之言萋也五方之人語言若是者多閩人以高為歌荆楚以雞為斤文士作歌詩亦多不悟也向丞相敏中知長安不敢賣蒸餅云觸諱蓋關中人以中為蒸也貢父詩話增修詩話總龜卷之草九百家詩話總龜後集卷之二十九詠茶門庫部林郎中説建州上春採茶時茶園人無數擊鼓聲聞數里然一園中才間壟茶品巳相逺又况山園之異邪苕溪漁隱曰歐陽永叔嘗新茶詩云年窮臘盡春𣣔動蟄雷未起驅龍蛇夜聞擊鼓滿山谷千人助呌聲喊呀萬木寒癡睡不醒惟有此樹先萌芽余官冨沙凡三春備見北苑造茶但其地暖才驚蟄茶芽長導許𥘉無擊鼓喊山之事永叔詩與文昌所紀皆非也北苑茶山凡十四五里茶味惟均亦豈有間壟茶品已相逺之説邪文昌雜録歐公和劉原父揚州時會堂絶句云積雪猶封蒙頂樹驚雷未發建溪春中洲地暖萌芽早入貢冝先百物新注云時會堂造貢茶所也余以陸羽茶經考之不言揚州出茶惟毛文錫茶譜云揚州禪智寺隋之故宫寺在蜀岡其茶井香味如蒙頂焉第不知入貢之因起于何時故不得而志之也苕溪漁隱東坡汲江水煎茶詩云活水還須活火烹自臨釣石取深清大瓢貯月歸春甕小杓分江入夜瓶此詩奇甚道盡烹茶之要且茶非活水則不能發其鮮馥東坡深知此理矣余頃在冨沙嘗汲溪水烹茶色香味俱成三絶又况其地産茶為天下第一冝其水異于他處用以烹茶水功倍之至于浣衣尤更潔白則水之輕清益可知矣近城山間有陸羽井水亦清井實好事者為名之羽著經言建州茶未得詳則知羽不曽至冨沙也同上建安北苑茶始于太宗太平興國二年遣使造之取象于龍鳯以别庶飲由此入貢至道間仍添造石乳其後大小龍茶又起于丁謂而成于蔡君謨謂之將漕閩中實董其事賦北苑焙新茶詩其序云産茶者將七十郡每歲入貢皆以社前火前為名悉無其實惟建州出茶有焙焙有三十六三十六中惟北苑彂而味尤佳社前十五日即採其芽日數千工聚而造之逼社即入貢工甚大造甚精皆載於所撰建安茶録仍作詩以大其事云北苑龍茶著甘鮮的是珍四方惟數此萬物更無新才吐微茫緑𥘉沾少許春散尋縈樹遍急採上山頻宿葉寒尤在芳芽冷未伸茅茨溪口焙籃籠雨中民長疾勾萌拆開齊分兩均帶煙蒸雀舌和露疊龍鱗貢作勝諸道先嘗祇一人緘封瞻闕下郵傳渡江濵特旨留丹禁殊恩賜近臣啜靈藥助用與上樽親頭進英華盡𥘉烹氣味醇細香勝却麝淺色過于筠顧渚慙投木冝都愧積薪年年號供御天産壯甌閩此詩敘貢茶頗為詳盡亦可見當時之事也又君謨茶録序云臣前因奏事伏蒙陛下諭臣先任福建轉運使日所進上品龍茶最為精好臣退念草木之微首辱陛下知鑒若處之得地則能盡其材昔陸羽茶經不苐建安之品丁謂茶圖獨論採造之本至于烹試曽未有聞輒條數字蕳而易明勒成二萹名曰茶録至宣政間鄭可蕳以貢茶進用久領漕試創添續入其數浸廣今猶因之細色茶五綱凡四十三品形製各異共七千餘餅其間貢新試新龍團勝雪白茶御苑玉芽此五品乃水㨂為苐一餘乃生揀次之又有粗色茶七網凡五品大小龍鳯并㨂芽悉入龍腦和膏為團餅茶共四萬餘餅東坡題汶公詩卷云上人問我晉連意待賜頭網八品茶即今粗色紅綾袋八品者是也蓋水㨂茶即社前者生㨂茶即火煎者粗色茶即雨前閩中地暖雨則茶巳老而味加重矣山谷和揚王休點密雲龍詩云小壁雲龍不入香元豐龍焙承詔作今細色茶中却無此一品也又有石門乳吉香口三外焙亦隸于北苑皆採摘茶芽送官焙添造每歲縻金共二萬餘緍日役千夫凡兩月方能迄事苐所造之茶不許過數入貢之後市無貨者人所罕得惟􅊤源諸處私焙茶其絶品亦可敵官焙自昔至今亦皆入貢其流販四方悉私焙茶耳蘇黃皆有詩稱道􅊤源茶蓋􅊤源與北苑為鄰山阜相接才三里餘其茶甘香特在諸私焙之上東坡和曹輔寄壑源試焙新芽詩云仙山靈雨􅊜行雲洗遍香肌粉未勻明月來投玉川子春風吹散武林春要知玉雪心腸好不是膏油首面新戲作小詩君一笑從來佳茗似佳人山谷謝送碾賜􅊤源㨂芽詩云矞雲從龍小蒼璧元豐至今人未識􅊤源包貢第一春御奩碾香俱玉食睿思殿中金井攔甘露薦枕天開顔橋山事事百局衮司諸公省中宿中人傳賜夜未央雨露恩光照官燭右丞似是李元禮好事風流有涇渭肯憐天祿校書郎親敕家庭遣分似春風飽食太官羊不慣腐儒湯餅腸搜攪十年燈火讀令我胸中書傳香已戒應門牛馬走客來問字莫載酒苕溪漁隱建州陸羽茶經尚未知之但言福建等十二州未詳往往得之其味極佳江右日近方有蠟面之號李氏别令取其乳作片或號曰京挺的乳及骨子等每歲不過五六萬斤迄今歲出三十餘萬斤凡十品曰龍茶鳯茶京挺的乳召乳白乳頭金蠟面頭骨次骨龍茶以供乘輿及賜執政親王長主餘皇族學士將帥皆得鳯茶舍人近臣賜金挺的乳館閣賜白乳龍鳯石乳茶皆太宗令造江右有研膏茶供御即龍茶之品也丁謂為北苑茶録三卷備載造茶之妙未行于世談苑唐茶惟湖州紫筍入貢每歲以清明日貢到先薦宗廟然後分賜近臣紫筍生顧渚在湖常二境之間當採茶時兩郡守畢至最為盛集此蔡寬夫詩話之言也蔡但知其一而不知其二按陸羽茶經云浙西以湖州上常州次湖州生長興縣顧渚山中常州義興縣生君山懸腳嶺北峰下唐義興縣重修茶舍記云義興貢茶非舊也前此故御史大夫李栖筠實典是邦山僧有獻佳茗者會客嘗之野人陸羽以為芬香甘辣冠于他境可薦于上栖筠從之始進萬兩此其濫觴也厥後因之徵獻浸廣遂為任土之貢與常賦之邦侔矣故玉川子詩云天子須嘗陽羡茶百草不敢先開花正謂是也當時顧渚義興皆貢茶又鄰壤相接白樂天守姑蘇聞賈常州崔湖州茶山境會想羡歡宴因寄詩云遙聞境會茶山夜珠翠歌鍾俱繞身􅐻下中分兩州界燈前合作一家春青娥遞舞應爭妙紫筍齊嘗各閗新自欵花時北窗下蒲黃酒對病眠人唐袁高為湖州刺史因修貢顧渚茶山作詩云禹貢通逺俗始圖在安人後王失其本聀吏不敢陳亦有姦佞者因兹欲求神動生千金費日使萬姓貧我耒顧渚源淂與茶事親黎氓輟耕農采掇實苦辛一夫且當役盡室皆同臻捫葛上欹壁蓬頭八荒榛終朝不盈掬手足皆鱗皴悲嗟遍空山草木為不春隂嶺牙未吐使曹牒巳頻心爭造化先走挺麋鹿均選納無日夜搗聲昏繫晨衆功何枯櫨俯視彌傷神皇帝尚巡狩東郊路多堙周回繞天涯所獻惟艱勤况減兵革用兼兹困疲民未知供御餘誰合分此珍顧省忝邦守有慙復因循茫茫滄海間丹憤何由申此詩雅得詩人諷諌之體誠可尚也苕溪漁隱玉川子有謝孟諌議惠茶歌范希文亦有閗茶歌此二萹皆佳作也殆未可以優劣論然玉川歌云至尊之餘合王公何事便到山人家而希文云北苑將期獻天子林下雄豪先閗美若論先後之序則玉川之言差勝雖然如希文豈不知上下之分者哉亦各賦一時之事耳苕溪漁隱曰藝苑以此二萹皆佳作未可優劣論今並録全余謂玉川之詩優于希文之歌玉川自出胸臆造語穩貼得詩人之句法希文排比故實巧欲形容宛成有韻之文是果無優劣耶玉川走筆謝孟諌議寄新茶云日髙丈五睡正濃軍將打門驚周公自云諌議送書信白絹斜封三道印開緘宛見諌議面手閲月團三百片聞道新年八山裏蟄蟲驚動春風起天子須嘗陽羡茶百草不敢先開花仁風暗結珠琲瓃先春抽出黃金芽摘鮮焙芳旋封裏至精至好且不奢至尊之餘合王公何當便到山人家柴門反關無俗客紗帽挂頭自煎吃碧雲引風吹不斷白花浮光凝碗面一碗喉吻潤兩碗破孤悶三碗搜枯腸惟有文字五千卷四碗發輕汗平生不平事盡向毛孔散五碗肌骨清六碗通仙靈七碗喫不得也唯覺兩腋習習清風生蓬萊山在何處玉川子乘此清風欲歸去山上群仙司下土地位清髙隔風雨安得知百萬億蒼生命墮在顛崖受辛苦便為諌議問蒼生到頭合得蘇息否希文和章岷從事閗茶歌云年年春自東南來建溪先暖氷微開溪邉竒茗冠天下武夷仙人從古栽新雷昨夜發何處家家嬉笑穿雲去露芽錯落一畨營綴玉含珠散嘉樹終朝采掇未盈袒唯求精粹不敢貪研膏焙乳有雅製方中圭兮圓中蟾北苑將期獻天子林下雄豪先閗美鼎磨雲外首山銅瓶携江上中􅍽水黃金碾畔緑塵飛碧玉甌中翠濤起閗茶味兮輕醍醐閗茶香兮薄蘭芷其間品第胡能欺十目視而十手指勝若登山不可扳輸同􅑙將無窮恥吁嗟天産石上英論功不愧階前蓂衆人之濁我可清千日之醉我可醒屈原試與招魂魄劉憐却得聞雷霆盧同敢不歌陸羽須作經森然萬象中焉知無茶星啇山丈人休茹芝首陽先生休采薇長安酒價減千萬成都藥市無光輝不如仙山一啜好泠然便欲乘風飛君莫羡花間女郎只閗草嬴得珠璣滿斗歸百家詩話總龜卷之二十九
