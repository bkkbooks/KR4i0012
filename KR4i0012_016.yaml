front:
  text: 増修詩話總龜卷之十六
  hash: sha256:560915779f385e06ba45b286ecf891125fd01979c7c8edcd943743041fea000c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_016-1a}
body:
  text: 留題門下松江新作長橋制度宏䴡前世所未有蘇子羙長橋對月云雲頭熖熖開金餅水面沉沉卧彩虹時謂此橋非此句雄偉不能稱也子羙兄舜元字才翁詩律遒勁而獨罕傳與子羙紫閣等聮句無愧韓孟恨不盡見之李古少貧賤一舉成名不二十年自副樞宻除本州刺史有登祝融峰云欲上祝融峰先登古石橋鑿開巇嶮處取路到丹霄南唐近事陳誼吉州人題螺江廟云廟裏杉松蕭颯風廟前江水碧溶溶凭䦨不見當時事落日逺山千萬重太平興國中史舘學士張齊賢出爲本道轉運使至其廟覧留題詩牌甚多俱打去獨留誼詩方知名郡閣雅談郢中寺壁有鄭文寳詩親筆寒食訪僧舎云客舎愁經百五春雨餘溪寺緑無塵金花何䖏鞦韆皷粉頰誰家鬪草人水上碧桃流片叚梁間歸燕語逡廵高僧不飲客携酒來勸先朝放逐臣古今詩話章碣題焚書坑云竹帛烟銷帝業虚昔年曾是祖龍居坑灰未冷山東亂劉項元來不讀書舒州三祖山因芟薙蘿蔓峭壁間得詩乃杜牧之金陵懷古云玉樹歌殘王氣終景陽兵合戍樓空楸梧逺近千官冡禾黍高低六代宫石燕拂雲晴亦雨江豚吹浪夜還風英雄一去豪華盡惟有江聲似洛中范文正謪睦州過嚴陵釣䑓作詩曰漢包六合網英豪一箇冥鴻惜羽毛世祖功臣三十六雲䑓争似釣䑓高繁知一聞樂天將過巫山先於神女祠粉壁大書曰忠州太守今才子行到巫山必有詩為報髙唐神女道速排雲雨待清詞白公見詩邀知一曰劉夣得理白帝欲留一詩於此怯而不敢罷郡經過悉去詩千餘首只留四篇沈佺期曰巫山高不極合沓狀竒新闇谷疑風雨幽崖若鬼神月明三峽曉潮落九江春爲問陽䑓客應知入夣人王無競曰神女向高唐巫山下夕陽徘徊作行雨婉孌逐荆王電影江前落雷聲峽外長霽雲無處所䑓舘峙蒼蒼李端曰巫山十二峰皆在碧虚中迴合雲藏日霏㣲雨帶風猿聲寒渡水樹色逺連空愁向高唐去千秋見楚宫皇甫冉曰巫峽見巴東迢迢出半空雲藏神女舘雨到楚王宫朝暮泉聲落寒暄樹色同清猿不可聴偏在九秋中金陵賞心亭丁晋公建也秦淮絶致公以家藏袁安卧雪圖張扵其屏乃唐同昉筆經十四守無敢覬覦者後爲太守竊去以凡筆畫蘆鴈易之王宻學琪來作守登臨賦詩曰千里秦淮在玉壺江山清䴡壯呉都昔人巳化遼天鶴舊畫難㝷卧雪圖冉冉流年去京國蕭蕭華髪老江湖殘蟬不㑹登臨意又噪西風入座隅此詩乃竊竊畫者蕭斧也同前蘇州崑山縣惠聚寺殿基乃鬼神一夕砌成殿中有僧繇畫龍每因風雨夜騰趠波濤傷田害稼郷人患之僧繇再畫一鎻鎖之仍畫一釘釘其鎖至今人捫其釘頭尚隱隱唐乾寜𥘉呉都崔融善五言題惠聚云人莫嫌山小僧還愛寺靈殿高神氣力龍活客丹青同前丁晋公舊有園在保康門外園内有仙逰亭仙遊洞與道士劉遁徃來遁作仙遊亭詩贈公云屢在仙逰亭上醉仙遊洞裏杳無人他時鳴鶴歸滄海同看蓬萊島上春公莫曉其詩後公南遷遁徃見公於崖方思其詩知爲異人也古今詩話洪州西山與滕王閣相對過客多留詩有僧覧之告郡守曰詩無佳者何不去之守愕然曰能作佳句乎因爲詩曰洪州太白方積翠倚穹蒼㡬夜碍新月半江無夕陽雅言雜載古今詩話此陳文亮詩亮因天下既定作詩云草鋪春闊兵偃塞垣或謂陳希夷作真州即揚州之楊子縣古白沙鎮也祥符中丁晋公鑄聖祖天尊像遂爲真州有儀真觀西一水縈廻南入大江號曰胥浦一日三潮俗云子胥解劍渡江之所觀之記載使者以像在舟日方午潮水忽至今有午潮張芸叟有詩云聞說仙郷接瀬郷閑􅌽詩侶禮虚皇三潮寳派通前浦萬葉靈杉蔽蜀崗天地杳冥供㵼像江山迴合助靈祥五雲送入蓬萊島留與人間作道塲金陵昇元寺即瓦棺寺也在城西隅前瞰江面後踞崇崗最為古跡累經兵火略無彷彿李氏時昇元閣猶在乃梁時故物高二百四十尺太白所謂日月隱簷楹也瓜州渡楊子橋介於江淮之衝南之瀟湘北走秦壠咸此取道古詩云楊子江頭楊柳春楊花愁殺渡江人數聲羗笛離亭晚君向瀟湘我向秦元稹相㢘問東浙七年因題東武亭曰役役閑人事紛紛碎簿書功夫两衙留滯七年餘病痛梅天發親情海岸踈因循歸未得不是戀鱸魚盧簡夫侍御曰丞相不恋鱸魚為好鑑湖春色春色謂劉采春並同前陳希夷題西峰云為愛西峰好吟頭盡日昻巖花紅作陣溪水緑成行幾夜碍新月半江無夕陽寄言嘉遯客此䖏是仙郷翰府名談陳希夷題華山云半夜天香入巖谷西風吹落嶺頭蓮空愛掌㾗侵碧漢無人曾歎巨靈仙同前王仲儀鎮真定惠愛在人罷日攀轅卧轍不得去題村寺曰寛猛三年無枉理公私兼濟不欺心如今受代朝天去遮路人人淚滿襟同前裴晋公赴敵淮西題名於華嶽之闕門大順中戸部侍郎司空圖以一絶之云岳前大隊赴淮西從此中原息戰􅎏石闕莫教蒼蘚上分明認取晋公題古今詩話開元𥘉鄭瑶經慈恩寺題云岸與恩同廣波將慈共深涓涓勞日夜長似下流心南部新書郴州城東有山高秀神仙蘇耽脩真之所唐封爲蘇仙山觀有泉名曰橘泉元結詩曰靈橘無根井有泉世間如夣又千年郷關不見重歸鶴姓字今爲第幾仙風冷露壇人悄悄地閑荒徑草綿綿如何躡得蘇君跡白日霓旌擁上天沈彬詩曰眼穿林罅見郴州井里相逢側局楸味道不來閑䖏坐勞生更欲㡬時休蘇仙宅古烟霞老義帝墳荒艸木愁千古是非無䖏問夕陽西去水東流摭遺鄭毅夫題呉江長橋云挿天蝃蝀玉腰闊跨海鯨鯢金背高青瑣集祝融留題甚多謝元云雲􅊜幽岩滑風梳古木香僧栖岩云閑雲四邊盡浮世一齊低羅隱題金山云老僧齋罷關門睡不𬋩波濤四面生孫山云結字孤峰上安禪巨浪間亦可亞張祐詩潤州甘露寺有三賢亭乃劉備孫權曹操㣲時嘗㑹此羅隱詩云漢鼎未分聊把手楚醪雖羙肯同心過者心服焉同前衡州耒陽有杜甫祠過客題詩多矣歐陽文忠公獨稱徐介之詩云來接汨羅水天心知所存故教工部死來伴大夫魂流落同千古風騷共一源消凝傷徃事斜日隱頽垣畿邑扶溝有白鶴觀蘇才翁子羙壁間留題二絶周元郎中知是邑愛之作詩紀其羙公卿知者韓衞公詩最佳詩云二蘇遺迹匿仙局賢宰重來爲發明字乆半隨風雨駮氣豪猶入鬼神驚直疑鸞鳯騫雲去不假江山到地清人對盛時須自勉酒豪顛艸尚垂名三閭大夫屈平字靈均沉沙之䖏汨羅江在岳州境内正廟以漁父配享唐末有洪州衙前軍將忘其姓名題一絶云蒼藤古木幾經春舊祀祠堂小水濵行客謾陳三酹酒大夫元是獨醒人自後能詩者不敢措手唐東京政平坊安國觀明皇朝玉真公主所建女冠多上陽退宫嬙盧尚書有詩云夕照紗窓起暗塵青松遶殿不知春請看白髪誦經者半是宫中歌舞人劇談録唐相叚文昌家江陵少以貧窶脩進常患口食不給每聴曾口寺鐘輙詣謁食爲寺僧所厭自此乃齋後扣鐘冀其晚屇而不逮食後入登台座出連大鎮拜荆南節度使詩題曾口寺云曾遇闍黎飯後鐘盖爲此北夣瑣言古今詩話載此詩是唐相王播題揚州佛寺有全篇云上堂巳了各西東慚愧闍黎飯後鍾三十年前塵土面而今始得碧紗籠今言叚文昌乃江陵人所傳誤懷素䑓在郡東五里横隴之上唐開元中有僧懷素居是䑓學者因謂之懷素䑓今有墨池筆塚存焉裴說有題懷素䑓歌云我呼古人名鬼神側耳聴杜甫李白與懷素文星酒星艸書星永州東郭有竒恠筆塚墨池遺迹在筆塚低低高似山墨池淺淺深如海我來恨不巳争得青天化為一張𥿄高聲喚起懷素書搦管研朱點湘水欲歸家重歎嗟眼前有三箇字枯樹槎烏梢蛇墨老鵶零陵總記白沙驛在永州一百二十里祁陽縣下臨湘水西岸門外有亭以形勝盡在此也開寳𥘉左𥙷闕劉能奉詔之九嶷維舟於此留詩云窓外秋聲湘瑟怨檻前竹色楚㠶飛又云懶向九嶷𡵨路望渡頭雲雨正霏霏法華寺在永州東南一里高阜之上城郭崗巒交相掩映唐咸通中有陀頭蔣氏愛其地乃拖鉗行丐獲金帛鉅萬以創寺焉名士無不留詠沈彬云地隈一水廵城轉天約群山附郭來又孟賔于匝地人家凭檻見逺山秋色捲簾看可謂盡其狀朝陽岩在永州城西南一里餘元結所名也以其東向日先照故名杜陵有歌云朝陽岩下瀟水深朝陽洞中寒泉清零陵城郭夾瀟岸岩洞幽竒當郡城荒蕪自古人不見零陵徒有先賢傳水石爲娯安可忘長歌一曲留相勸又有牛叢詩云躡石攀蘿路不迷曉天風好浪花低洞名獨占朝陽號應有梧桐待鳯栖瀟水在永州西三十歩自道州營道縣九嶷山中亦名營水湘水在永州北十里出自桂林海陽山中經靈渠北流至零陵北與瀟水合二水皆清泚一色高秋八九月雖文餘可以見底自零陵合流謂之瀟湘經衡陽抵長沙入洞庭秦韜玊有詩云女媧羅裙長百尺搭在湘江作山色又云嵐光楚岫和空碧秋氣湘江到底清沈彬湘江行云數家魚網踈雲外一岸殘陽細雨中僧齊巳瀟湘詩云二水逺難論從離到坎奔冷穿千嶂陏清過幾州門又云月來無夜底雲度見秋痕何㳙有詩云鴈影數行秋半逢漁歌一聲夜深發皆曲盡其妙浯溪在永州北百餘里流入湘江溪水石竒絶唐上元中容𬋩經畧使元結罷任居焉以所著中興頌刻之崖石顔真卿書結復爲浯䑓石堂西峰四厭亭銘皆刻于石崖上皇朝乾徳中左𥙷闕王伸知永州維舟於此留詩云湘川佳致有浯溪元結雄文向此題想得後人難以繼高名長與白雲齊淡塘在永州北三十里其水有九十九源昔有居人文潭好農務榖乃築塘以灌田百姓利之立碑紀其功覇國時碑猶在塘中長興初黄損爲永州團練副使耴爲别叢有詩曰傍水野禽通體白飣盤山果半邊紅損去爲居民劉氏所有並同前鵞羊山在長沙縣北二十里本名東華山亦謂之石寳山上有仙壇丹竈湘中别記云昔郡人成君平年十五兄使牧鵞羊忽遇一仙翁相將入此山兄後㝷至山中見君平因問所牧鵞羊何在弟拍白石曰此是也遂驅起令隨兄去旬日却還山下復化為石今猶存焉因名此山為鵞羊山畢田詩云羽客何年此錬丹尚留空竈鎮孱顔雲中雞犬仙應逺山下鵞羊石轉頑湘渚幾因滄海變遼城無復令威還何年仙馭還來此盡遣飛騰上九關幽閑鼓吹醉郷湘中別記云後漢時有人在此郷忽然醉經三晝夜始醒猶有酒氣言與天神共飲乃尔後任陽羡令每言歲之豐儉無不驗俄亦仙去畢田詩云三宿酣神酎郷名因此呼山中千日者自合是仙都同前水簾朱陵洞口有泉自洞而去巨石横峻壁立千仭一派飛下如紋簾之狀畢田詩云洞門千尺掛飛流玉碎珠聮冷噴秋今古不知誰捲得緑蘿為帶月為鉤湘中故事凝碧在南岳石橋上畢田詩云四面山屏叠萬重古嵐濃翠鎖寒空清秋獨倚危䦨立身在琉璃世界中擲鉢峯湘中山水記云昔惠思禪師居般若䑓嘗擲鉢乗之赴陳帝召畢田詩云應將鉢渡鬪神通擲去乗將赴帝宫争似嶺頭提不起于今相續闡真風石霜山寺南在溜陽縣南八十里有崇勝禪寺昔普㑹禪師居衆千餘名其堂曰枯木盖取其晏寂也㢘使丞相裴公嘗親枉大斾詣之盡留玉環象笏在此迄今存焉畢田詩云石上泉華噴猛霜境竒因此闢禪坊使君環笏留何用枯木千餘滿一堂大哀洲在湘隂縣西三十里圖經云昔舜南狩二妃㝷之至此而聞舜葬於九嶷博物志云舜崩扵蒼梧二女以涕揮竹竹盡成斑畢田詩云玉輦南廵去不還翠娥望㫁楚雲間波寒剰寫哀絃怨露冷偏滋泪篠斑一水盈盈傷逺目九峰􅑨􅑨慘愁顔荒洲千古凄凉地半掩空祠向暮山神鼎山在湘隂縣東北絶頂有丹井於此獲藥鼎及巨人跡云神仙所履之跡因此名為神鼎故畢田詩云玊趾分明印絶巔藥成仙去幾千年深藏寳鼎今方出合得丹經與世傳香水湘中別記云在縣郭内其水甚香若合餘水即變昔年嘗貢此水民多困弊至齊末以來因廢罷以板覆之上起塔今猶存湘郷本謂之湘香盖由此而名列子曰壺頂有口名曰滋穴其水涌出名曰神瀵臭過椒蘭味過醪醴畢田詩云坎上浮圖巳拂天椒蘭餘馥尚依然九重無復脩常貢空有香名與邑傳並同前鄧峰永庵主南禪師法子魯直恨不識有自慶者事永甚乆即以慶主黄龍叢林於慶改觀及與語多解體山谷過永庵題曰奪得胡児馬便休休嗟李廣不封侯當時射殺南山虎仔細看來是石頭冷齋夜話東坡愛西湖詩曰若把西湖比西子淡粧濃抹也相冝余宿孤山下讀林和靖詩句句皆西湖寫生特天姿自然不施鉛華耳作詩書壁曰長愛東坡眼不枯解將西子比西湖先生詩妙真如畫為作春寒出浴圖前軰訪人不遇不書壁東坡作行說不肯書牌惡其特地只書壁耳候人未至則掃墨竹荆公訪一高士不遇題曰墻角數枝梅凌寒獨自開遥知不是雪為有暗香来潘大臨工詩山谷尤喜之謝無逸以書問有新作否荅曰秋來景物件件是佳句恨爲俗氣所蔽昨日滿林風雨起題壁曰滿城風雨近重陽忽催租人至遂敗意止此一句奉寄聞者咲其迂闊詩話總龜卷之十六百家詩話總龜後集卷之十六評史門孔子謂寗武子邦有道則知邦無道則愚其知可及也其愚不可及也所謂及者繼也非企及之及謂寗武之愚而後人不可繼尔居亂世而愚則天下塗炭將孰拯屈原事楚懐王不得志則悲吟澤畔卒從彭咸之居究其初心安知拯世之意不得伸而至扵是乎賈生謫長沙傅渡湘水爲賦以吊之所遣之時雖與原不同盖亦原之志也白樂天詠史詩乃謂士生一代間誰不有浮沉良時真可惜亂世何足欽乃知汨羅恨未抵長沙深信如樂天言則是以亂世爲不拯也而可乎議者謂誼所欲爲文帝不能用者為鈍鈆刀為銛斡弃周鼎寳康瓠兮觀此是有憾於綘灌東陽者雖然勃也嬰也敬也皆素有長者之譽必不肯害賢而利已楚漢春秋別有綘灌豈其是耶葛常之永和中王羲之脩禊事扵㑹稽山隂之蘭亭群賢畢至少長咸集序以謂雖無絲竹管絃之盛一觴一詠亦足以暢叙幽情則當時篇詠之傳可攷也今觀羲之謝安謝萬綽孫統王彬之凝之肅之徽之徐豐之袁嶠之十有一人四言五言詩各一首王豐之元之藴之渙之郄曇華茂庾友虞說魏滂謝繹庾藴孫嗣曹茂之華平桓偉十有五人或四言或五言各一首王獻之謝瑰卞迪卓髦羊模孔熾劉宻虞谷勞夷石綿華耆謝藤王儗吕系吕本曹禮十有六人詩各不成罰酒三觥謝安五言詩曰萬殊渾一象安復覺彭殤而羲之序乃以為一死生為虚誕齊彭殤為妄作盖反謝安一時之語而或者遂以為未逹此特未見當時羲之之詩尔其五言曰仰視碧天際俯瞰緑水濵寥閴無涯觀寓目理自陳大矣造化功萬殊莫不均群籟雖參差適我無非親此詩則豈未逹者耶史載獻之嘗與兄徽之操之俱詣謝安二兄多言獻之寒温而已旣出客問優劣安曰小者佳吉人之詞寡以其少言故知之今王氏父子昆季畢集而獻之之詩獨不成豈亦吉人之詞寡耶景祐中稽太守蔣堂修永和故事嘗有詩云一派西園曲水聲水邉終日㑹冠纓㡬多詩筆無停綴不似當年有罰觥盖為獻之等發也葛立之㑹稽臨安金陵三郡皆有東山俱傳以為謝安携妓之所按謝安本傳初安石寓居㑹稽與王羲之許珣攴遁逰處被召不至遂棲遲東土唐裴冕與吕渭等鑑湖聮句有興衰還㝷戴東山更問東此㑹稽之東山也本傳又云安石嘗徃臨安山中坐石室臨濬谷悠然嘆曰此與伯夷何逺今餘杭縣有東山東坡有逰餘杭東西岩詩注云即謝安東山所謂獨携縹緲人來上東西山者是也此臨安之東山也夲傳又謂及登台輔扵土山營墅樓舘林竹甚盛每携中外子姪㳺集今土山在建康上元縣崇禮郷載建康事迹云安石扵此擬㑹稽之東山亦號東山此金陵之東山也李白有憶東山二絶不到東山乆薔薇㡬度花白雲他自散眀月落誰家我今携謝妓長笑絶人群欲報山東客開關掃白雲不知所賦者何處之東山也陳軒乃録此詩扵金陵集中將别有所㩀耶南史載宋劉勔經始鍾嶺以爲棲息亦號東山金陵遂有两東山矣同上韓愈自監察御史貶連州山陽令所坐之因傳記各異唐書本傳謂上䟽論宫市徳宗怒故貶李翺行狀謂爲倖臣所惡故貶皇甫湜作神道碑謂正元十九年關中旱飢公請寛民徭專政者惡之故貶按文公集宫市之䟽不傳而文公歴官記及年譜以謂京師旱民飢詔蠲租半有司徴求反急愈與同列上䟽言狀為幸臣所讒幸臣者李實也予考退之自連山移江陵詩云孤臣昔放逐泣血追愆尤汗漫不省識恍如乗桴浮或自疑上䟽上䟽豈其由則所坐之因雖退之猶疑之也集中有上京兆李實書盛稱其能曰愈來京師所見公卿大臣未有赤心事上憂國如閣下者又云今年以來不雨者百餘日種不入土而盗賊不敢起榖價不敢貴老姦宿贜銷縮摧沮亹亹百餘言皆叙其敬慕之意其後實出為華州又有書云愈扵乆故㳺從之中蒙恩奬知遇最厚無與比者愈為實所讒不應此書拳拳如是及觀江陵塗中詩云同官盡才俊偏善柳與劉或慮語言洩傳之落冤仇又岳陽别竇司直云愛才不擇行觸事得讒謗前年出官日此禍最無妄又和張十一憶昨行云伾文未揃崖州熾雖得赦宥常愁猜近者三奸悉破碎羽窟無底幽黄能眼中了了見郷國知有歸日眉方開又有永正行以快伾文之貶其末云郎官清要為世稱荒郊僻野嗟可矜具書目見非妄徴嗟尔旣徃冝為懲則知陽山之貶伾文之力而劉李下石為多非為李實所讒也葛常之韓偓香奩集百篇皆艶詞也沈存中筆談云乃和凝所作凝後貴悔其少作故嫁名於韓偓爾今香奩集有無題詩序云余辛酉年戯作無題詩十四韻故奉常王公内翰吳融舎人令狐渙相次屬和是歳十月一旦兵起隨駕西狩文藁咸弃丙寅歲在福建有蘇暐以藁見授得無題詩因追咏舊時闕忘甚多予按唐書韓偓傳偓嘗與崔嗣定䇿誅劉季述昭宗反正為功臣與令狐渙同為中書舎人其後韓全誨等刼帝西幸偓夜追及鄠見帝慟哭至鳯翔遷兵部侍郎天祐二年挈其族依王審知而卒以紀運圖攷之辛酉乃昭宗天復元年丙寅乃哀帝天祐二年其序所謂丙寅歲在福建有蘇暐授其藁則正依王審知之時也稽之於傳與序無一不合者則此集韓偓所作無疑而筆談以為和凝嫁名於偓特未攷其詳尔筆談云偓又有詩百篇在其四世孫奕處見之豈非所謂舊詩之闕忘者乎同上漢史載韓信教陳狶反有挈手歩庭之議且曰吾為公從中起漢十年狶果反高祖自將兵出張文潜曰方是時蕭相國居守而信欲以烏合不教之兵從中起以圖帝業雖使甚愚必知無成信豈肯出此㢤故其詩曰陳侯乃中起不思蕭相在咸陽又一詩云平生蕭相真知已何事還同女子謀則又責蕭相不為信辨其枉也余觀班史吕后與蕭相謀詐令人從帝所來称狶巳破群臣皆賀相國紿信曰雖病強入賀信入吕后使武士縳信斬之則斬信者相國計也縱使其枉相國其肯爲辨之㢤信死則劉氏安不死則劉氏危相國豈肯以平日相善之故而悮社稷大計乎文潜後有一絶云登壇一日冠群雄鍾室倉皇念蒯通能用能誅誰計䇿嗟君終日媿蕭公丹陽集漢成帝時張禹用事朱雲對上曰臣碩賜尚方斬馬劒㫁佞臣一人以厲其餘上問誰也對曰安昌侯張禹上大怒曰居下訕上罪死不赦御史將雲下雲㧞殿㩜折曰臣碩從龍逢比干逰於地下如雲者可謂忠直有餘矣後世思其人而不可得則作爲韻語以聲其羙肅宗時元載用事故杜子羙詩云千載少似朱雲人至今折檻空嶙峋武后時傳㳺藝用事故盧照鄰詩云昔有平陵男姓朱名阿㳺願得斬馬劍先㫁佞臣頭言當時立朝之士不能如雲以二人之惡而告扵上也若二人者奸䛕百倍張禹矣腥臊之血豈足以汚尚方之劍乎朱景文云朱㳺英氣凛生風殯死危言悟帝聰殿檻不脩旌直諫安昌依舊漢三公信乎去佞如㧞山也五王之誅二張也張柬之啓其謀桓彦範任其事敬暉崔元暐袁恕巳各效其力坐使天后還政中宗即阼誠爲社稷之竒勲然尚有可恨者焉薜季昶勸除武三思彦範軰豈不知中宗非剛㫁之主乎彼之意以爲三思方烝亂韋氏而中宗孱懦一聴其所爲苟誅三思必不利扵巳故不肯誅耳不旋踵而自罹殺身之禍實自取之也張文潜云繋狗不繋首反噬理必然智勇忽迷方脫匣授龍泉區區薛季昶先事僅能言留禍啓臨淄敗謀豈非天高祖大風之歌志氣慷慨規模宏逺凛凛乎巳有四百年基業之氣史記樂書謂之三侯章令沛得以四時歌舞宗廟盖欲使後之子孫知其祖創業之勤不可怠扵守成尔武帝秋風詞瓠子歌已無足道及為賦以傷悼李夫人反覆數百言綢繆戀嫪扵一女子其視高祖豈不愧㢤藝文志上自造賦二篇其一不得而見耶並同上百家詩話總龜後集卷之十六
