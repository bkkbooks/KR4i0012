front:
  text: 增修詩話總龜卷之四十一
  hash: sha256:1fa138462b4c6a20079cfed86517a1e8b4f632ed85e062f1a1a3b50852211db0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_041-1a}
body:
  text: 送别門劉綜學士出鎮并門兩制館閣皆以詩餞其行因進呈章聖深究詩雅時方競尚西昆體􆈠裂雕篆親以御筆選其平淡者得八聮句云夙駕都門曉涼風苑樹秋朝逈秋聲和暮角膏雨逐行軒李維置酒軍中樂聞笳塞上情錢惟演關揄漸落邊鴻度勸到劉郎酒十分楊億寒垣古木含秋色祖帳行塵起夕陽朱巽汾水泠光搖晝戟蒙山秋色鎖層樓孫僅河朔雪深思愛月并門春暖詠甘棠王貽永極目關河髙倚漢順風雕鶚逺凌秋劉筠聖章謂綜曰并門唐時皆將相出領凡之官遣從事以題詠作寵其行多刻諸道宫佛寺纂集編聚久不聞有是作也後綜寫為御選句圗立於晉祠古今詩話王化基詩送梁助曰文章換桂一枝秀清白傳家兩弟貧人多誦之談苑天祐中毗陵有慎氏本儒家女三史嚴灌夫娶之數年無子因拾其過而出焉慎氏慨然登舟晉詩一章為别曰當時心事巳相關雨散雲飛一餉間便挂孤帆從此去不堪重過望夫山灌夫覽而愧乃留之唐宋遺史唐如意中有女子七歲能詩則天命試之皆應聲而就其兄别之而去則天令作詩送兄曰别路人𥘉起離亭葉正飛所嗟人異鴈不作一行歸丞相劉沆與鄉人尹鑑少同場屋丞相既大拜尹方以恩榜得官公以詩送還曰少年相欵老相􅑮鄉舉雖同遇不同我已位登三事後公方名列五刑中榮登莫計名髙下宦逹須由善始終若到鄉關人見問為言歸思滿秋風並同上內侍裴愈字益之作詩送魯秀才南逰詩云東吳山水家家月西椘江聲浦浦風又聞蟬云楊桞影踈秋霽兩梧桐葉墜夕陽天唐子方以言事謫冝春監酒待制李師中作詩贈别曰孤忠自許衆不與獨立敢言人所難去國一身輕似葉髙名千古重于山並遊英俊顔何厚已死姦諛骨尚寒天意若為宗社計肯教夫子不生還倦逰録徐鉉仕宦海州蒯亮為録事參軍多與往還未幾亮受代徐餞之詩曰昔年聞有蒯先生二十年來道不行抵掌曽談天下事折腰尤忤俗人情老還上國風光簿貧裏歸裝結束輕遷客臨流重惆悵晚風黃葉滿孤城詩史武元衡罷相出鎮西蜀栁公綽與裴度俱為判官公綽先度入為吏部郎中度有詩餞别云兩人同日事征西今日公先捧紫泥景祐末元昊叛夏鄭公出鎮長安梅昌言送詩云亞夫金鼓從天落韓信旌旗背水陳是時士大夫詩甚多鄭公獨刻昌言詩于石臨川楊智堅嗜學居貧妻厭其饘藿不足求離智堅以詩送之曰平生業在負琴詩頭上而今有二絲漁父尚知溪谷暗山妻不信出身遲荆叉任意撩新鬢鵉鏡從他學畫眉今日便同行路客相􅑮正是下山時妻持詣州顔魯公為內使杖其妻而令嫁自後莫有棄其夫者雲溪友議崔涯别其妻詩曰隴上流泉隴下分斷腸鳴咽不堪聞姮娥一入宫中去巫峽千秋空白雲申國長公主為尼掖庭隨出者二十餘人詔兩禁送至寺賜齋傳旨令各賦詩惟陳文僖公彭喬年詩尚有記者云盡出花鈿散寶津雲鬟齊剪向殘春因驚風燭難晉世遂作蓮池不染身貝葉乍翻疑軸錦𣑽音𥘉學誤梁塵從兹艷質成空後湘浦都無解珮人都下好事者以鷓鴣天歌之湘山録朱昻字舉之揚歷清貴二十年晚為工部侍郎懇求歸荆南踰年方允時方劇暑恩旨曲晉許秋涼始行吳淑贈行詩云漢殿夜涼𥘉閣筆渚宫秋晚得懸車錫宴玊津園中傳旨令賦詩為送李維承旨云清朝納祿尤強健白首還家正太平陳文惠云部吏百御通爵里從兵千騎過荆門弟協亦同時隱皆享眉壽謂之渚宫二踈並古今詩話武公幹常事蒯希逸十餘歲異常勤幹洎希逸擢第幹辭歸以親在養父堅晉不住以詩送之其略云山險不曾離馬後酒醒長見在床前托言張乖崖在蜀州有録事參軍老病㾱事公曰胡不歸明日參軍求去且以詩留别其略云秋光都似宦情簿山色不如歸興濃公驚曰同僚有詩人而吾不知晉而薦之元祐中老人守潁有路都曹者以小疾求致仕老人誦此詩以留之不可乃採前人之意作詩送之曰淮光釀山色先作歸意濃恨無乖崖公一洗芥蒂胸百斛明珠張不疑帥鼎文瑩往謁後帥辰又謁之既别慨然以二詩贈行曰憶昔荆門屢過從當時心巳意冥鴻渚宫禪伯唐齊巳淮甸詩豪宋惠崇老格踈間松倚潤清談瀟灑坐生風使君不見髙僧事莫把名參伎術中又云碧嶂孤雲苒苒歸解携情緒異嘗時餘生歲月能多少此别應難問後期玉壷清話狄焕送人逰卲云春江正渺渺送别兩依依煙裏掉將逺渡頭人未歸漁家侵疊浪島樹挂殘暉况入湖湘路那堪花亂飛雅言系述元豐三年蘇子由謫官筠州張安道口占一絶送之云因嗟萍梗才名客自歎匏瓜老病身一榻從兹還倚壁不知重掃是何人巳而涕下東坡云安道平生未嘗出涕向人王崇拯字拯之與先君同在熙河先君自熙河入京相别于中塗送先君云渭城楊栁巳青青強住行人聽渭城不問使車歸路逺且從樽酒滿杯傾相􅑮洮塞休兵後此去秦州照眼明若立螭頭借前箸且教充國事春耕先君誦于昊卿丞相緣此知名于朝庭洪駒父有詩送余赴官河內末云眼中人物東西盡肺病京華故倦遊潘邠老每誦而喜之李希聲亦有詩送余云散盡平生眼中客暖風晴日閉門居可以相上下也是時紹聖改元之二月並王直方詩話李群玊好吹笙常使家僮吹之又善急就草性喜食鵝及授校書即東歸故里盧肇送詩云妙吹應諧鳯工書定得鵝南部新書乾祐三年宣政殿試賢良方正直言極諌科下一十人登科其後牛僧孺等四人皆相次拜相先是白居易在翰林日為考覆官其後僧孺罷相出鎮揚州居易在洛中有詩送曰北闕上東京風光十六程坐移丞相閣春入廣陵城紅斾擁雙節白髭無一莖万人周路看百吏立班迎閫外君珍重樽前我亦榮何須身自得將相是門生卓異記㒒去歲錢塘十六年而又來留二年乃去平生自覺出處老少相似樂天雖才名相逺而安分寡求亦庶幾焉二月六日來别南北山惠淨上人以天竺醜石見贈乃作絶句三首以全樂天之好曰當年衫鬢兩青青強説重臨刷别情衰髮只今無可白故應相對話來生其二曰出處依希似樂天敢將衰杇校前賢便從洛社休官去猶有間居二十年其三曰在郡依前六百日山中不記幾回來還將天竺一峰去欲把雲根到處栽紀詩唐節度使薛嵩有人獻小鬟十三歲左右手俱有紋隱若紅線因號為紅線十九年方辭嵩去不可晉乃餞别請坐客冷潮陽作詩曰采菱歌罷木蘭舟送客魂消百尺樓還似洛妃乘霧去碧雲無際水長流江淮間有妓徐月英作詩送人曰惆悵人間萬事違兩人同去一人歸生憎平望亭前月忍照鴛鴦相背飛韋相皋昔逰江夏止于薑使君之館薑氏子􅍮寶有小青衣曰玊簘才十歲常令侍韋薑入關家屬不行韋乃易居頭陀寺荆寶遣玊簘往來年稍長乃與韋歡後為廉使陳常侍發遣歸舟人趣行乃以書别荆寶荆寶與玊簘同至相約曰逺不踰六七年當取玊簘歸因晉玊簘指環一枚并詩曰黃雀銜來巳數春别時留解贈佳人長江不見雙魚至為遣相思夢入秦李訥尚書夜登越城樓聞歌曰鴈門山上鴈𥘉飛其聲激切公召至乃去籍之妓盛小叢也梁園供奉南不嫌女甥所唱者乃不嫌昔所授也崔元範自幕府拜侍御史餞于鑑湖光候亭命小叢歌餞坐客各賦詩送之李尚書曰繡衣奔命去情多南國佳人斂翠娥曽向教坊聽國樂為公重唱盛叢歌崔御史曰羊公晉宴峴山亭洛浦髙歌午夜清獨向拍臺為老使可憐林木響餘聲揚判官曰燕趙能歌有幾人落花回雪似含嚬聲隨銜史西歸去誰伴文翁過九春彥升曰蓮府才為緑水賔忽乘􅍡馬入咸秦為公唱作西河調日暮偏傷去住人盧業支使曰何郎戴豸别賢侯更吐歌珠宴庾樓莫道江南不同醉即陪舟楫上京遊舉子髙湘曰謝安春渚餞名卿千里仁風一扇清歌黛慘時方酩酊不知公子重飛觥盧溵處士曰烏臺上客紫髯公共捧天書靜鑑中桃葉不須歌白杼耶溪日暮起樵風崔下句云獨向柏臺為老吏皆曰御史即其任也何老于柏臺衆請改之崔曰某但止于此任寧望九遷乎是年秋鞫獄譙中而卒是終于柏臺之任也並古今詩話劉夢得送人下第詩云今此卜行日髙堂應夢歸莫將和氏泪滴向老菜衣又有詩云新詩一聮出白髮數莖生抒情詩話總龜卷之四十一百家詩話總龜後集卷之四十一歌詠門熙寧間奉詔定蜀楚秦民三家所獻書得一弊𥿄所書花蕊夫人詩三十二首乃夫人親筆而辭甚竒與王建宫詞無異自唐至今誦者不絶口而此獨遺棄不見取前受詔定三家書者又斥去之甚可惜也謹令繕寫入三館而歸口誦數篇於丞相安石明日與中書語及之而王圭馮京願傳其本於是盛行於世夫人偽蜀孟昶侍人事具國史苕溪漁隱曰余閲此詞如龍池九曲逺相通楊柳絲牽兩岸風長似江南好風景畫船來往碧波中黎園弟子簇池頭小樂携來候宴逰試炙銀笙先按拍海棠花下合梁州月頭支給買花錢滿殿宫人近數千遇著唱名多不語含羞走過御床前內人追逐採蓮時驚起沙鷗兩岸飛蘭把來齊拍水並船相閗􅊜羅衣厨船進食簇時新侍坐無非列近臣日午殿頭先索膾隔花催喚打漁人皆清婉可喜花蕊又别有逸詩六十六篇有近世好事者旋加搜索續之篇次無倫語意與前詩相類者極少誠為亂真矣聊摘其一二云羅衫玉帶最風流斜插銀箆慢褁頭間向殿前騎御馬掉鞭橫過小紅樓春日龍池小宴開岸邊亭子號流杯沉檀刻作神仙女對捧金杯水上來王平甫周世宗時陶尚書榖奉使江南韓熙載遣家妓奉盥匜及且有書謝略云巫山之麗質𥘉臨霞侵鳥道洛浦之妖姿自至月滿鴻溝舉朝不能會其辭熙載因召家訊之云是夕忽當浣濯焉緗素雜記唐髙宗燕群臣賞雙頭牡丹詩上官昭容一聮云勢如連壁友情若臭蘭人計之必一英竒女子也許彥周詩話東坡後集有題織錦圗上回文其一云春晚落花餘碧草夜涼低月半枯桐人隨逺馬邊城暮雨映踈簾繡閣空其二云紅手素絲千字錦故人新曲九回腸風吹絮雪愁縈骨泪灑縑書恨見郎其三云羞看一首回文錦錦似文君别恨深頭白自吟悲賦客斷絃愁是斷弦琴淮海集載東坡跋云余少時見一江本其後有人題詩十餘首皆竒絶今記其三首然則此詩非東坡所作也少遊又云子瞻記江南所題詩本不全余嘗見之記其五絶今以輔子瞻之遺即叢話前集所載回文詩五首是也世以為少遊所作亦非也苕溪漁隱蘇蕙織錦回文詩所傳舊矣故少常沈公復傳其畫繇是若蘭之才益著然其詩回旋書之讀者唯曉外繞七言至其中方則漫弗可考矣若沈公之博古亦謂辭句脫讀不成文殊不知此詩織成本五色相宣因以別三四五七言之異後人流傳不復施采故迷其句讀非辭句之脫略也政和𥘉豫在洛陽於王晉玉許得唐程士南效此并申諴之釋而後曉然是詩𥘉不舛脫蓋沈公未嘗見此本耳然申諴所釋但依士南之設色其七言數火其色反黃四言數金其色反緑于五行為弗類意蘇氏詩圗之色為不耳今因冠詩于畫遂別而正之三四五七言之詩各隨其所行而為之色觀者見其色則詩之言數可知巳至于士南之文既有釋者則賦采自從其舊而并録于其首云東觀餘論載璇璣圗序云前秦安南將軍竇滔有寵姬趙陽臺歌舞之妙無出其右滔置之别所妻蘇知之求而獲焉苦加撻辱滔深恨之陽臺又專伺蘇之短讒毁交至滔益忿蘇氏年二十一滔鎮襄陽與陽臺之任絶蘇氏之音問蘇悔恨自傷因織錦回文題詩二百餘首計八百餘字縱橫反覆皆為文章名曰璇璣圗遣蒼頭賫至襄陽滔覽錦字感其妙絶因送陽臺之關中而具車從迎蘇氏恩好愈重苕溪漁隱曰王初寮有點綘唇一詞送韓濟之歸襄陽云峴首亭空勸君休墮羊碑泪宦逰如寄且伴仙翁醉説與鮫人莫解江皋珮將歸思暈紅縈翠袖織回文字𥘉寮用事以其漢上故然于送人之詞似難用也侍兒小名録南齊楊侃性豪侈舞人張靜婉腰圍一尺六寸能掌上舞唐人作楊柳枝辭曰認得楊靜婉腰後人却除家字只使楊靜婉誤矣李太白云子夜吳歌動君心李義山云鶯有子夜歌晉有子夜女善歌非當時可及也許彥周詩話古今詩人詠婦人者多以歌舞為稱梁元帝妓應令詩云歌清隨澗響舞影向池生劉孝綽看妓詩云燕姬臻妙舞鄭女愛清歌北齊蕭放冬夜對妓詩云歌還團扇後舞出妓行前弘執恭觀妓詩云學舞俱回雪分歌共落塵陳隂鏗侯司空宅咏妓詩云鶯啼歌扇後花落舞衫前陳劉刪亦云山邊歌兩日池上舞前溪庾信趙王看妓詩緑珠歌扇薄飛燕舞衫長江捴看妓詩云並歌時轉黛息舞暫分香隋盧思道夜聞鄰妓詩怨歌聲易斷妙舞態難收陳元璪春園聽妓詩云紅樹搖歌扇緑珠飄舞衣釋法宣觀詩云舞袖風前舉歌聲扇後嬌王績咏妓詩云早時歌扇薄今曰舞衫長劉希夷春日閨人詩云池月憐歌扇山雲愛舞衣以歌對舞者七以歌扇對舞衣者亦七雖相緣以起然詳味之自有工拙也杜子美取以為艷曲云江清歌扇底野曠舞衣前復齋漫録緑珠井在白州雙角山下昔梁氏之女有容貌石季倫為交趾採訪使以真珠三斛買之梁氏之居舊井存焉耆老云汲飲此井者誕女必多美里閭以美色無益于是遂以巨石填之苕溪漁隱曰山谷詩云欲買娉婷供煮茗我無一斛明月珠用此事也太平廣記石季倫王明君辭云延我以穹廬加我閼氏名閼氏單于妻也上烏前下章移切前漢丐奴傳曰冒頓後有愛閼氏生少子顔注閼氏胸奴皇后號劉貢父云胸奴單于號其妻為閼氏耳顔便以皇后解之大俚俗也西河舊事云失我祁連嶺使我六畜不蕃息失我焉支山使我婦人無顔色蓋北方有焉支山山多紅藍北人採其花染緋取其英鮮者作煙脂婦人粧時用此顔色殊鮮明可愛胸奴名妻閼氏言可愛如胭脂也錢昭度作王昭君詩云閼氏才聞易妾名歸期長似俟河清則誤讀氏字為姓氏之氏矣藝苑雌黃古今辭人作明妃辭曲多矣意皆一律惟吕居仁獨不蹈襲其詩云人生在相合不論胡與秦但取眼前好莫言長苦辛君看輕薄兒何殊胡地人苕溪漁隱韓子蒼題昭君圗詩寄語雙鬟負薪女炙面謹勿輕離家余考唐逸士傳云昭君至今生女必炙其面白樂天詩至今村女面燒灼成瘢痕乃知炙面之事樂天已先道之也復齋漫録漢書竟寧元年呼韓邪來朝言願壻漢氏元帝以後宫良家子王昭君字嬙妃之生一子株纍立復妻之生二女至范曄書始言入宫久不見御積怨因掖庭令請行單于臨辭大會昭君豐容靚飾顧影徘徊竦動左右帝驚悔欲復晉而重失信夷狄然曄不言呼韓邪願壻而言賜以宫女又言字昭君生二子與前書皆不合其言不願妻其子而詔使從胡俗此自烏孫公主非昭君也西京雜記又言元帝使畫工圗宫人皆賂畫工而昭君獨不賂乃惡圗之既行遂誅毛延夀琴操之按又言本齊國王穰女端正間麗未嘗窺看門户穰以其異人求之不與年十七進之帝以地逺不幸欲賜單于美人嬙對使者越席請往後不願妻其子吞藥而卒蓋其事雜出無所考正自信史書尚不同况傳記乎要之琴操朂抵牾矣按昭君南郡人今秭歸縣有昭君村村人生女必灼艾炙其面慮以色選故也昭君卒􅌾胸奴謂之青塜晉以文王諱昭號明妃云韓子蒼昭君圗敘百家詩話總龜後集卷之四十一
