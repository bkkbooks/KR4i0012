front:
  text: 增修詩話總龜卷之二十五
  hash: sha256:c909e0c5a0cfbfdaf40f2e113cf2bbdf23e0008cb3f1f7d967401025d89258db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_025-1a}
body:
  text: 感事門下西蜀楊耆數年前見之甚貧今見之亦貧所異于昔者蒼頭華髮耳女無美惡冨者妍士無賢不肖貧者鄙使其逢時遇合豈減當世之士哉頃宿長安驛聞泣者甚怨問之乃昔富而貧者乃作一詩今以贈楊君孤村漸雨逐秋涼逆旅愁人怨夜長不寢相看唯櫪馬愁吟互答有寒螿天寒滯穗猶橫畝歲晚空機尚倚墻勸爾一杯聊復睡人間貧冨海茫茫玉局文豫十八年前中秋與子由觀月彭城作一詩以陽關歌之今復遇此夜宿于贛上方南北嶺表獨歌此曲聊復書之以識一時之事雖未覺有今夕之悲但懸知為他日之喜也行歌野哭兩堪悲逺火低星漸向微病眼不眠非守歲鄉音無伴苦思歸重衾腳冷知霜重新沐頭輕感髮稀多謝殘燈不嫌客孤舟一夜苦相依同前贊皇公再貶朱崖道中有詩云十年紫殿掌洪鈞出入三朝一品身文帝寵深陪雉尾武皇恩重宴龍津黑山永破和親慮烏嶺全坑扈從臣自是功高臨盡處禍來名減不由人又登朱崖郡城云獨上高樓望帝京烏飛猶是半年程青山似欲留人住百匝千遭繞郡城世傳贊皇公崖州詩皆仇人所作只此二首是真古今詩話明皇友悌古無有者嘗以書賜弟憲等魏文帝詩曰西山一何高高高殊無極上有兩仙童不飲亦不食賜我一丸藥光輝有五色服之四五日身體生羽翼朕每言服藥而生羽翼寧如兄弟天生之羽翼乎陳思王之才足以經國絶其朝謁卒使憂死魏祚未終司馬氏奪之豈神丸效耶雍洛靈異記唐元和十三年士人下第多為詩刺試官獨章孝標作歸燕詩獻庾承宣侍郎曰積纍危巢泥巳落今年故向社前歸連雲樓閣無棲處更傍誰家門戶飛歐陽澥亦作燕詩獻鄭愚侍郎云翩翩飛燕畫堂開送古迎今幾萬回長向春秋社前后為誰歸去為誰來古今詩話盧氏子垂拱中不中第步出都門其日寒甚投宿旅舍一客續至附火吟曰學織絲綾功未多謾臨機杼錯拋梭莫教宫錦行家見把此文章笑殺他盧憶前詩乃白尚書者因問其姓氏曰姓李氏世業織綾前屬東宫錦坊近以薄藝投本行皆云如今花樣與前不同不謂伎倆兒以文采求售不重于世如此元稹奉使東川于褒城題黃眀府詩序曰昔年曾于解縣飲酒余為録事有客后至數犯酒令併飛數杯逃席而去醒后問其人曰前虞卿黃丞也爾後絶不復知所在元和四年三月奉使東川十六日至褒城驛有黃明府見迎問其前銜即曩日逃席也因問坐隅山川則褒女所奔之城在其左諸葛所征之地在其右感今懷古作贈黃明府詩曰昔年曾痛飲黃令困飛觥席上當時走馬前今日迎依稀迷姓字積漸識平生故友身皆逺他時眼暫眀便邀連坐敘兼共摘船行酒思臨風亂霜拂地平不看深淺酌貪愴古今情迤逶七盤洛坡陀數丈城花疑褒姒笑棧想武侯征一種埋幽石空間千古情同前魏瓘侍郎知廣州子城一角忽頽一古磚有四大字云委于鬼工是魏字公感其事大築新之罷而召還仲簡待制代之未幾儂賊寇廣州外城一擊而圯獨子城堅完民賴以生賊平朝廷以公有前知之備加諌議大夫再知五羊二年公以築城之功自論久不報作感懷詩曰羸羸霜髮一衰翁蹤迹年來類斷蓬萬里逺歸雙闕下一身還在衆人中螭頭賜對恩雖厚雉堞論功事巳空淮上有山歸未得獨揮清淚􅎈春風又五羊書事詩云雖云嶺外無霜雪何事秋來亦滿頭文潞公採其詩進呈加龍圖閣學士尹天府南唐元宗割江之后金陵對岸即是敵境因遷都豫章每北望忽忽不樂有詩曰靈槎思浩蕩老鶴憶崆洞又廬山百花亭刋石云蒼苔迷古道紅葉亂朝霞皆佳句也隋煬帝迷於聲色高昌薦浙人項升進新宮圖覽之大恱即日召有司具材役夫經歲而成帑庫為之一空幸之喜謂左右曰使真仙逰其中亦當自迷也可目之曰迷樓每一幸即經月宫女無數后宫多不得進有侯夫人者有美色忽自縊於棟下臂懸錦囊左右取進有自感詩三首其一曰庭絶玉輦迹芳草漸成窠隱隱聞簫鼓君恩何處多其二曰欲泣不成淚悲來翻強歌庭花方爛熳無計奈春何其三曰春隂正無際獨步意如何不及間花草翻承雨露多又云粧成多自恨夢好却成悲不及揚花意春來到處飛又遣意云祕洞扄仙卉雕房鎖玉人毛君真可戮不肯寫昭君煬帝見詩反復傷感眠其尸巳死顔色尚爾厚禮葬之寧王憲宅左有賣餅人妻有色王欲之厚遺其夫取之寵嬖踰等閲歲因問云尚思餅漢否默然不對因呼令見其妻注眼淚下若不勝情時坐客十餘無不悽然王請客賦詩王摩詰先成詩曰莫以今朝寵寧忘舊日恩看花滿眼淚不共楚王言東海北巖畔有大石龜俗云魯般所造夏則入海冬復止此山涯有詩云石龜尚懷海我寧忘故鄉劉虛白昔與裴令公同硯席及公主文虛白猶是舉子試雜文日簾前獻一絶云二十年前此夜中一般燈燭一般風不知歲月能多少猶著麻衣待至公並同前余自夏歷秋毒熱七八十日不衰炮灼理極意謂不復有清涼之時今日復凄風微雨遂御夾衣顧念茲歲屈指可盡彭澤云我今不為樂知有來歲不此言真可為惕然也王直方詩話僧可隆善詩高從誨閲其卷有觀棋句云萬般思後得一失廢前功從誨謂可隆曰吾師此詩必因事而得隆答曰某本姓慕容與桑維翰同學少負志氣多忤維翰維翰登第以至入相某猶在場屋頻年敗衄皆維翰所挫也因削髮為僧其句實感前事而露意焉從誨識鑒多此類也大定録廖齊父爽直嘗為永州刺史齊后逰零陵於民間見父題壁感而成詩曰下馬連聲叩竹門主人何事感遺恩回頭泣向兒童道重見甘棠舊子孫青瑣后集杜牧太和三年佐吏部沈公傳師幕在江西時好好年十三始以善歌來入樂籍中後一年公鎮宣城復置好好于宣城籍中後三歲為沈著作述師納之後三歲于洛陽城重見覩好好感舊傷懷故題二十韻以贈之爾為豫章姝十三才有餘翠茁鳯生尾丹葉蓮合趺高閣倚天半晴江聮碧虛此地試爾唱特使華筵鋪主公顧四座始訝來踟蹰吳娃引贊起低回映長𥚑雙鬟可高下才過青羅襦眄眄乍垂袖聲同雛鳯呼繁絃迸關組寒管裂寒蘆衆音不能逐裊裊穿雲衢主公再三歎為言天下姝贈之天馬錦副以水精珠龍沙看秋浪明月逰東湖自此每相見三日以為踈玉質隨月滿艷態逐春舒修唇漸輕巧雲步轉虛徐旌斾忽東下笙歌隨軸轤霜雕謝庭樹沙暖句溪蒲身外任塵土樽前極歡娛飄然集仙客著作堂合集賔校理諷賦欺相如聘之碧瑶珮載以紫雲車洞户水聲逺月高蟾影孤邇來未幾歲散盡高陽徒洛陽重相見婥婥為當壚怪我苦何事少年垂白鬚朋逰今在否落魄更能無門館慟哭后水雲秋景𥘉斜月挂衰柳涼風生坐隅􅎈盡滿襟淚短歌聊一書蜀王衍俘係入秦至劍閣閲山水之美詩云不緣朝闕去好此結茅廬時人笑之至咸陽又作曲子云盡是一場嬴得與夫無愁入井者所校無多也北夢瑣言廖圖在永州有江干感興詩云正悲世上事無限細看水中塵更多甚為識者所稱种放在章聖朝纍章乞歸賜買山銀百兩放少時有瀟湘感事詩曰離離江草與江花往事洲邉歎復嗟漢傅有才終去國楚臣無罪亦沉沙凄涼野浦寒飛鴈牢落汀祠晚聚鴉無限清忠沉浪底滔滔千頃屬漁家亦先兆也古今詩話開元時樂工李龜年承恩遇于東都道通里創堂甲于都下其後流落江南每為人歌則坐客掩泣罷酒杜子美嘗贈詩曰𡵨王宅裏尋常見崔九堂前數度聞正是江南好風景落花時節又逢君崔九即滌中令湜之弟也明皇雜録眀皇初自巴蜀回夜闌登勤政樓倚欄南望煙月滿目因歌曰庭前琪樹巳堪攀塞北征人尚未還蓋盧思道之詩也歌畢里中隱隱如有歌者謂力士曰得非梨園舊人乎遲明為我訪來翌日力士潛求於里中召至果梨園弟子也其夜復乘月登樓左右惟力士及妃侍者紅桃在焉遂命歌涼州涼州即貴妃所製親御玉笛為倚樓曲曲罷無不掩泣因廣其曲傳于人間眀皇在南內耿耿不樂每自吟太白傀儡詩曰刻木牽絲作老翁雞皮鶴髮與真同須臾弄罷渾無事還似人生一世中並同前東坡在惠州盡和淵明詩思州魯直在黔南聞之作偈曰子瞻謫海南時宰欲殺之飽喫惠州飯細和淵明詩淵明千載人子瞻百世士出處固不同風味亦相似鄒志完過永州淡山岩岩有馴狐凡貴客至則鳴志完將至而狐鳴僧出迎以馴狐為言志完作詩曰我入幽嵓亦偶然初無消息與人傳馴狐戲學仙伽客一夜飛鳴至老禪並冷齋夜話增修詩話總龜卷之二十五百家詩詁總龜後集卷之二十五效法門李商隱詠淮西碑云言訖屢頷天子頥雖務奇崛人臣言不當如此乘輿軒陛自不敢正斥如老杜天顔有喜近臣知蚪須似太宗可謂知體矣東坡贈寫御容詩云野人不識日月角倣徨尚憶重瞳光天容誰敢畫老師古寺畫閉房蓋遵此法䂬溪杜牧之詩字多意用老杜如觀東兵長句云黑稍將軍一鳥輕蓋用子美身輕一鳥過也逰樊川詩云野竹踈還密岩泉咽復流蓋用子美雨止還作斷雲疏復行也蓋其心景慕之切則下語自然相符非有意于蹈襲故其論杜詩云天外鳯凰誰得髓何人解合續弦膠豈非自以為得髓者耶東坡贈孔毅甫詩云天下幾人學杜甫誰得其皮與骨前生子美只君是信手拈淂俱天成學杜甫而得其皮骨者鮮矣又况其髓哉丹揚集沈攸之晚好讀書手不釋卷嘗歎曰早知窮逹有命恨不十年讀書東坡再和劉景文介亭長萹云早知事大繆恨不十年讀䂬溪王元之到任表有全家飽暖盡荷君恩之語到今傳誦永叔用為詩云諸縣豐登少公事全家飽暖荷君恩夢得亦嘗有云一生不得文章力百口空為飽暖家白云不才空飽暖無力及飢貧䂬溪樂天云身間當得真天爵官散無憂即地仙蓋用顔蠋晚食當肉早眠當冨無事當貴也臨川愛眉山雪詩能用韻如云氷下寒魚漸可義和羔袖龍鐘手獨義蓋子厚嘗云江魚或共義又云入郡腰常折逄人手盡義黃常明退之詠蚊蠅云涼風九月到掃不見蹤迹夢得聚蚊云清商一來秋日曉羞爾微形飼丹鳥聖俞云薨薨勿久恃會有東方白王逄原晝睡云蚊蟲交紛始誰造一一口吻如針錐噆人肌膚得腹飽不解默去猶鳴飛雖然今尚爾無奈當有獵獵秋風時小人稔惡豈漏恢網但可僥幸目前耳左氏曰天之假助不善非右之也將厚其惡而降之罰也其是之謂乎黃常明桞色黃金嫩梨花白雪香隂鏗詩也李太白取用之杜子美太白詩云李侯有佳句往往似隂鏗後人以謂以此􅏺之然子美詩有蛟龍得雲雨雕鶚在秋天一聮已見晉書載記矣如氷肌玉骨清無汗水殿風來暗香滿孟蜀主詩東坡先生度以為詞昔人不以蹈襲為非南部煙花録夕陽如有意偏傍小窗明唐人方域詩新唐書藝文志有方域詩一卷煙花録一名大業拾遺記文詞極惡可疑而大業幸江都記自有詩一卷唐著作郎杜寶所纂明清有之承平時楊州印本也揮塵録詩體如八音歌建除體之類古人賦詠多矣用十二神為詩者始見于沈炯山谷亦嘗效為之余友人莫之用其祖戬嘗以辨舌説賊脫百人于死意其後必昌而之用乃貧不能以自存天理殆難曉也余嘗以此格作詩贈之云抱犬高眠巳云足更得牛衣有餘燠起來敗絮擁懸鶉誰羡龍髯織氷縠踏翻菜園底用羊從他春雷吼枯腸擊鍾烹鼎莫渠愛小筆自許猴葵香半世飢寒孔移帶鼠米占來身漸太吉雲神馬日匝三樗蒲肯作豬奴態虎頭食肉何足誇隂德由來報冝奢丹竈功成無躍兔玉函方祕緣青蛇丹揚集坡有𣣔吐狂言喙三尺怕君嗔我却須吞嘗疑其語太怪及觀杜集亦有臨風𣣔慟哭聲出巳復吞韋蘇州高歌長安酒中憤不可吞䂬溪杜云卿到朝廷説老翁漂零巳共滄浪客又朝覲從容問幽仄勿云江漢有垂綸其後夢得送陳郎中云若問舊人劉子政而今懶拙每如初送慧則云休公久别如相問楚客逄秋心更悲小杜江湖酒伴如相問終老煙波不計程交遊問我慿君道除却魲魚更不聞商隱寄崔侍御云若向南臺見鶯友為言垂趐度春風臨川故人亦見如相問為道方尋木鴈編歸見江東諸父老為言飛鳥會知還聖俞倘或無忘問姓名為言懶拙皆如故坡單于若問君家世莫道中朝第一人皆有所因也黃常明韋應物詩擬陶淵明而作者甚多然終不近也答長安丞裴稅詩云臨流意巳悽采菊露未晞舉頭見秋山萬事都若遺蓋效淵明采菊東籬下悠然見南山此懷有真意𣣔辨巳忘言之句也然淵明落世紛深入理窟但見萬象森羅莫非真境故因見南山而真意具焉應物乃因意悽而采菊因見秋山而遺萬事其與陶所得異矣葛常之苕溪云退之有藤杖詩空堂晝眠倚户牗飛電著壁搜蛟螭故東坡鐵柱杖云入懷氷雪生秋思倚壁蛟龍護晝眠山谷笻竹杖贊涪翁晝寢蒼龍挂壁皆用退之詩䂬溪杜云嗜酒狂嫌阮知非笑蘧近集有素書欵欵誰憐杜采筆遒遒獨勝江榻畔煙花常嘆杜海中童丱尚追徐河魚潰腹空號楚汗足流骰始信吳皆用此格同上西京雜記載司馬相如將聘茂陵人女為妾卓文君作白頭吟以自絶相如乃止樂府詩集謂白頭吟疾人以新間舊不能至白首故以為名余觀張籍白頭吟云春天百草秋始衰棄我不待白頭時羅𥜗玉珥色未暗今朝巳道不相冝李白白頭吟云妾有秦樓鏡照心勝照井碩持照新人雙對可憐影其語感人深矣至劉希夷作白頭吟乃云寄言全盛紅顔子須憐半死白頭翁此翁白頭真可憐伊惜紅顔美少年則是言男為女所棄而作與文君白頭吟之本意異矣韻語陽秋老杜贈李祕書觸目非論故新文尚起余太白酬竇公衡云曽無好事來相訪賴爾高文一起余韋蘇州每一覩之子高詠尚起余昌黎酬張韶州將經貴郡煩晉客先惠高文謝起余豈非用事偶合𢾗公非蹈襲者䂬溪元白齊名有自來矣元微之寫白詩于閬州西寺白樂天寫元詩百篇合為屏風更相傾慕如此如樂天必言微之詩得已格律頓進所謂每𬒳老元偷格律是也然微之江陵放言與送客嶺南詩樂天皆擬其作何耶東坡嘗效山谷體作江字韻詩山谷謂坡收斂光芒入此窘步余樂天亦云丹揚集仲長統云垂露成幃張霄成幄沆􅒭當餐九陽代燭蓋取無情之物作有情用也自後竊取其意者甚多張志和則云太虛為室明月為燭王康琚則云華條當圜屋翠葉代綺窗吳筠則云緑竹可充食女蘿可代裾劉伶則云日月為扄牖八荒為庭衢皆是意也李義山無題詩云春蠶到死絲方歇蠟燭成灰泪始乾此又是一格今效此體為俚語小詞傳於世者甚多不足道也丹揚集皮日休雜體詩序曰詩云螮蝀在東又曰鴛鴦在梁雙聲起于此也陸龜蒙詩序曰疊韻起自梁武帝云後牗有杇桞當時侍從之臣皆唱和劉孝綽云梁王長康強沈休文云載載每礙自後用此體作為小詩者多如王融所謂園衡炫紅花湖行畢黃華溫庭筠所謂捿息銷心象􅉉楹溢艷陽皆效雙聲而為之者也陸龜蒙所謂瓊英輕明生竹石滴瀝碧皮日休所謂康莊傷荒涼坐虜部伍苦皆效疊韻而為之者也南北朝人士多喜作雙聲疊韻如謝莊羊戎魏收崔岩輩戲謔談諧之語往往載在史册可得而考焉丹揚集百家詩話總龜後集卷之二十五
