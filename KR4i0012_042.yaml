front:
  text: 增修詩詁總龜卷之四十二
  hash: sha256:4edb4a2b90ab4acd3a3eec16e249d28b26289d2e8ad3e9de966e9304970c1578
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_042-1a}
body:
  text: 怨嗟門王元之精于四六同時在玉堂而大拜者元之啓賀曰三神山上曽陪鶴駕之遊六學之中空有漁翁之嘆以白樂天嘗有詩云元和六學士五相一漁翁青箱雜記怨婦不知其姓既笄受幣于姨兄馬生父沒繼母渝其約改適母之族兄老而猥惡居官納賄以罪犯為五羊民掾舟過英州庸良醉卧婦因題三絶于馹亭𥘉與馬絶馬作詩貽婦人曰急水浮花入亂流濃雲遮月暗西樓風流忿恨知多少但看青春已白頭婦答詩曰金丸打折鶼禽翼利刃偏傷連理枝自古一床無兩好如今方信昔人詞題馹亭曰情若分滿歸故國夢隨瘴月過梅峰誰將此骨埋煙隴寂寞魂遊山霧中翰府名談高蟾纍舉不第有詩云月桂數條榰白日天門幾扇鎖明時陽春發處無根蒂慿仗東風次第吹怨而切又下第上王司馬侍郎詩云天上碧桃和露種日邊紅杏倚雲栽芙蓉生在秋江上獨向秋風怨未開人頗憐其意明年李昭知舉遂擢第詩史王元之以尼道安事謫黃州蓋為盧崖州所譛也有詩云敢向台階問罪名後有以事貶黃州者有詩云魏能下靣看花銜魏能以軍功黃州刺史同上陳羽有詩百餘首古意一篇集中所無其詞云十三學繡羅衣裳自憐紅袖聞馨香人言此是嫁時服含笑不刺雙鴛鴦郎年十九髭未生拜官天下聞聲名車馬駢闐賀門館自然不失為公卿是時妾家尤未貧兄弟出入雙車輪繁華全盛兩相敵與郎年少為婚姻郎家居近御溝水豪門客盡躡珠履雕􅐻酒器常不乾曉入中厨妾先起姑嫜嚴肅有規矩小娘嬌意難取朝參暮拜白玉堂繡衣著盡黃金縷妾貌漸衰郎漸薄時時強笑意索寞知郎本來無歲寒幾回掩泪看花落妾年四十絲滿頭郎未五十封公㑦男兒全盛日忘舊銀床羽帳空颼飀庭花紅遍蝴蝶飛看郎佩玉下朝時歸來略略不相顧却令侍婢生光輝郎恨婦人易衰老妾亦恨深不忍道看郎強健能幾時年過六十還枯稿詩史陜郊有唐昭宗詩曰何處有英雄迎歸大內中又曰紇干山頭凍殺雀何不飛去生處樂讀之令人變色昭宗在河東作菩薩蠻云登樓延望秦宫殿茫茫不見雙飛燕渭水一條流千山與萬丘野煙生碧樹陌上行人去何處有英雄迎歸大內中今云詩未知孰是南唐元宗優待藩邸舊僚馮延已自元帥府書記至中書侍郎遂相時論以為非才江文蔚因其弟延魯福州亡敗請徔退削乃出撫州秩滿還朝因赴內宴進詩曰青樓呵監應相笑書記登壇又却回韓渥天復中車駕幸鳯翔渥以扈從功反正𥘉昭宗面許渥為相渥奏云運契中興冝復用重德鎮風俗因薦右僕射趙崇時梁祖在京馳入請見具言崇長短昭宗曰趙崇是韓渥所薦渥時在側梁祖叱之三奏曰臣不敢與大臣爭渥尋出閩中渥有詩曰手風慵展八行書眼暗休看九局啚窗裏日光飛野馬按頭筠𬋩長蒲蘆謀身拙為安蛇足報國危曽捋虎鬚舉世可能無默識未知誰擬試齊竽並同上孫定字至光涪州犬戎之族子長於儲定數舉矣而儲方就貢或訪於定定謔曰十三儀表堂堂好箇將軍何須以科第為意儲頗銜之後儲貴逹未嘗言定長短晚年喪志放意酒杯景福二年下第逰京西出開逺門醉中作詩曰行行沅血灑塵襟事逐東流渭水深私跨蹇驢風尚緊靜投孤店日方沉一枝猶挂東堂夢千里空馳北巷心明月悲歌又前去滿城煙樹噪春禽同上玉階怨李詞云玉階生白露夜久侵羅襪却下水晶簾玲瓏望秋月長相思詩云悠悠我思又曰靡日不思蘇子卿詩云生當復來歸死當長相思生别離楚詞曰悲莫悲於生别離古詩云行行重行行與君生别離相去萬餘里各在天一涯怨歌行李白亦有此作一作長安見內人出嫁令豫代為怨歌行其詞曰十五入漢宫花顔笑春紅君王選玉色侍寢金屏中薦枕嬌多月捲衣戀春風寧知趙飛燕奪寵恨無窮沉憂能傷人緑鬢成霜蓬一朝不得意世事徒為空鷫鸘換美酒群衣罷雕籠臨寒不忍言為君奏絲桐腸斷聲已絶悲心夜忡忡獨不見李白云白馬誰家子黃塵邊塞兒天山三丈雪豈是逺行時春蕙忽秋草莎雞鳴曲池風催寒梭響月入霜閨悲憶與君别年種桃齊娥眉桃今百餘尺花落成枯枝終然獨不見流泪空自知白頭吟相如將聘茂陵女為妻文君作白頭吟以自絶相如乃止故李白辭云頭上玉燕叉是妾嫁時物贈君表相思羅袖幸時拂莫捲龍須席從他生網絲且留琥珀枕還有夢來時此最為警䇿藁砧藁砧今何在藁砧砆也問夫何處山上復有山重山為出字言夫已出何當大刀頭刀頭有環問何當來還破鏡飛上天言月半當來也七哀詩曹子建釋詩者謂病而哀義而哀感而哀悲而哀耳目聞見而哀口歎而哀鼻酸而哀也巴東三峽歌三山峽七百里兩岸連山略無闕處重巖疊嶂隱蔽天日自非亭午夜分不見日月其漁父歌曰巴東三峽巫峽長猿啼聲苦泪沾裳别鶴操髙陵牧子作也娶妻五年而無子父兄為之改娶妻聞之中夜起倚户而悲嘨牧子聞之愴然而歌曰將乖比翼隔夭端山川悠逺路漫漫攬衣不寢食不餐後人因為樂章焉並見樂府集劉子儀與夏英公同在翰林子儀素為先逹章獻臨朝子儀主文在貢院聞英公為樞密副使意頗不平作堠子詩曰空呈厚貌臨官道更有人從捷徑過間居詩話周總福州人天禧二年因事逰京師值詔下奔鄉薦不及有故人在譙郡守官遂往投之倚為拔解之地而國家申嚴條約不許寄籍郡有司吏周吉者頗殖涯産捴遂拜為父吉欣然納之齒于諸子三代名諱亦徔而更焉或人問吉則對以此子當年與母氏俱斥近始歸捴亦以是對秋預薦未幾逹于鄉父乃馳詩一絶寄之遂不敢南歸因此慚恨而卒詩曰文章不及林洪範德行全亐李坦然若拜他人為父母直須焚却蓼莪萹名族重京官而輕外任故楊汝士建莭後詩云拋却弓刀上砌臺上方樓殿倚雲開山僧見我衣裳窄知道新徔戰地來又云如今老去騎官馬羞向關中道姓楊楊行敏出使馹騎到劍州郡將輕忽慊恨尤甚題詩于冬青館云駑駘嘶呌知無㝎騏驥低垂自有心山上髙松溪畔竹清風才動是知音又云杜鵑花裏杜鵑啼淺紫深紅更傍溪遲日霽光搜客思曉來山路恨如迷南部新書張又新郎中與楊虔州友善楊妻李氏即鄘相之女有德無色楊未嘗介意張嘗語揚曰我少年擅美名不復仕宦惟得美室平生足矣既成婚殊失所望乃作牡丹詩云牡丹一朵直千金將為從來色最深今日滿園開似雪一生辜負看花心唐女真蕙蘭有才思咸通中為李億輔闕侍婢愛衰後隸咸冝觀為女道士有怨李詩曰易求無價寶難買有情郎又有云蕙蘭消歇歸春圃楊栁東西絆客舟楊氏為宋齊丘閉於泰州永寧宫有詩曰江南江北舊家鄉六十年來夢一場吳苑樓臺皆冷落廣陵宫闕亦凄涼雲凝逺岫愁千片雨打孤舟泪兩行兄弟四人三百口不堪端坐更思量丘南野録謂此是李煜所作未知孰是並古今詩話戴衢久不第嘗夜吟曰優優東西南北情何人於此悟浮生還緣無月春風夜暫得獨聞流水聲又云坐落千門日吟殘午夜燈盧瓌抒情鄭還古為河中從事為同院所誹謗貶吉州掾道中為望思臺詩云讒語能令骨肉離姦情難測事堪悲何因掘得江充骨搗作微塵祭望思又云吉州新置掾馳馹到條山薏苡殊非謗羊腸未是艱自慚多白髮爭敢競朱顔苦有前生債今朝不懊還同上盧群玉落托江湖不第縱情詩酒有詩曰酒㵼銀瓶到底清夜深絲竹鳯凰鳴紅粧醉起一花落更引春風無限情又投盧尚書詩曰無力不任為走役有文安敢滯清平從來若把耕桑定免恃雕蟲誤此生南部新書李山甫咸通中不第後流落河朔為樂彥正從事嘗有薄怨執政曰勸君不用誇頭角夢裏輸羸捴未知郎中自瓜州宣事回進合歡水果一器煬帝以一雙令小黃門馳賜絳仙馬急搖解絳仙拜賜泫然因附紅箋小簡進詩云馹騎傳雙果君王寵念深寧知辭帝里無復合歡心煬帝省之不悅顧黃門黃門懼拜而言意乃解張安道舉進士再失意而作歌曰休休歸去休清風釣艇明月酒樓公不見寇相丁相雷州崖州休休歸去休景祐元年中茂材異等後又中賢良方正朱定國歸田録杜牧舍人罷任浙西郡道中有詩曰鏡中絲鬢悲來慣衣上塵痕拂漸難惆悵江湖釣魚手却遮西日向長安與杜甫齊名時號大小杜郡閣雅談唐文宗大和九年誅王涯鄭注後仇士良秉權或登臨遊幸往往獨語左右莫敢進問因題詩曰輦路生秋草上林花滿枝慿髙何限意無復侍臣知古今詩話增修詩話總龜卷之四十二集一百家詩話總龜後集卷之四十二鬼神門昔年陳州有女妖自云孔大娘能昏夜于鼓腔中與人語言尤知未來事時晏元憲守陳方製小辭一闋修改未定而孔大娘已能歌之矣亦可怪也長安慈恩寺有數女仙夜逰題詩云黃子陂頭有月明強踏華筵到曉行煙波山色翠黛橫折得落花逺恨生化為白鶴飛去明夜又題一首湖水團團夜如鏡碧樹紅花相掩映北斗闌干移曉柄有似佳期常不定亦婉約可愛許彥周詩話請紫姑神大抵能作詩然不甚過人舊傳一士人家請之既降偶書院中子弟作雨詩因率爾請賦頃刻書滿𥿄其警句云簾捲滕王閣盆翻白帝城誠可喜也同上雲齋廣録載司馬槱官于錢塘夢蘇小小歌蝶戀花詞一闋其詞頗佳詞云妾在錢塘江上住花開花落不記流年度燕子却㗸春色去黃昏幾度消消雨蟬鬢犀梳雲欲吐檀板新聲唱徹黃金縷酒醒夢回無覔處凄涼明月生秋圃苕溪漁隱魯直記江亭鬼所題詞有泪眼不曾晴之句余以此鬼剽東坡樂章有秋雨晴時泪不晴之語復齋漫録東坡記秦少遊言寶應民有嫁娶會客者酒半客一人徑赴水曰有婦人以詩招我詩云長橋直下有蘭舟破月沖煙任意逰金玉滿堂何所用爭如年少去來休余讀張君房脞説進士謝朏寓居寶應晚至縣橋忽見女郎自舟中出曰某楚小陂也可見訪舟中懷中出詩二首其一云畫橋直下是蘭舟破月沖煙任意逰金玉滿堂無用處早隨年少去來休其二云妾貌君才兩不常君今休苦更思商兒家自有清溪水飲著方知氣味長前篇與少遊所言不同者𢾗字更有二首為異至謂寶應亦同君房著脞説在真廟時不應東坡少遊之忘也復齋漫録余讀江南録丘孟陽有賦名嘗夢一官人延入一第中具飲其旁几上有書一卷孟陽展讀謂曰斯乃吾所述賦藁何至兹乎其人曰昔公焚之時吾得之矣孟陽因就求之答曰它日若至衡山必當奉還後官至衡州茶陵令乞致仕卒於衡州今世焚故書必毀而燔之蓋可信也文昌雜録吕申公夷蕳嘗通判蜀中忘其郡名𪠘宇中素有鬼物號榆老姑乃榆木精其狀一老醜婦常出厨間與群婢相偶或時不見家人見之久亦不以為怪公呼問之即下階拜之云妾在宅曰久雖非人然不為禍公亦置而不問常謂公他日必大貴一日忽懷妊群婢戲之自言非久當産遂月餘忽不見出云巳産矣請視之後園榆木西南生大贅乃是視之果然見聞録東坡記徐州通判李綯有子年十七八不善作詩忽咏落花云流水難窮目斜陽易斷腸誰同砑光帽一曲舞山香人驚問之若有物慿者云是謝中舍問其砑光帽事自云西王母宴群仙有舞者戴砑光帽帽上簮花舞山香一曲未終花皆落去余讀唐羯鼓録汝陽王璡明皇愛之乃隨逰幸璡常戴砑綃帽子打曲上有摘紅槿花一朵置之帽上遂奏舞山香一曲花不落墜上笑此事與前極相類復齋漫録陳甲為成都守李西美璆館客舍于治事堂東偏之雙竹齋紹興二十一年四月西美浣花回得疾旬日間甲巳寢聞堂上婦人語笑聲即起映門窺觀有女子十餘皆少艾有容色而衣結束頗與世俗異或坐或立或步庭中甲猶疑其為帥家人以主人翁病輒出但怪其多也頃之一人曰中夜無以為樂盍賦詩乎即口占曰晚雨簾纎梅子黃晚雲捲雨月侵廊隂把酒不成飲識著無情更斷腸一人應聲答之曰舊時衣服盡雲霞不到迎仙不是家今日樓臺渾不識祗因古木記宣華餘人方綴思甲味其詩語不類人方悟為鬼物忽寂無所見后以語蜀郡父老皆云孟氏有國時嘗造宣華殿于摩訶池上今郡堂乃其故趾所見之鬼妾云西美病遂不起夷堅志魯直自黔安出峽登荆州江亭柱間有詞曰簾捲曲闌獨倚江展暮天無際泪眼不曽晴家在吳頭楚尾數點雪花亂委撲漉沙鷗驚起詩句始成時沒入蒼煙叢裏魯直讀之悽然曰似為豫發也不知何人所作所題筆勢妍軟欹斜類女子而有眼泪不曾晴之句不然則是鬼詩也是夕有女子絶艷夢於魯直曰我家豫章吳城山附客舟至此墮水死不得歸登江亭有感而作不意公能識之魯直驚寤謂所親曰此必吳城小龍女也冷齋夜話長安南山下一書生作小圃蒔花木一日有金犢車從數女奴皆艷麗下飲于庭邀生同坐甚欵洽將別出小碧箋題詩曰相思無路莫相思風裏楊花一片時惆悵深閨獨歸處曉鶯啼斷緑楊枝侯鯖録張崔嘗遊霅上白蘋洲見碧衣女子携手吟咏一篇云碧水色堪染白蓮香正濃分飛俱有恨此別幾時逢藕隱玲瓏玉花藏縹眇容何當假雙翼聲影暫相從確逐之化為翡翠飛去樹萱録番禺鄭僕射嘗遊湘中宿於馹樓夜遇女子誦詩云紅樹醉秋色碧溪彈夜弦佳期不可再風雨杳如年頃刻不見樹萱録明月清風良宵會同星河易翻歡娛不終緑樽翠杓為君斟酌今時不飲何時歡樂此廣記所載鬼詩也山谷云當是鬼中曹子建所作翰林蘇公以為然又一篇云玉户金缸願陪君王邯鄲宫中金石絲簧鄭女衛姬左右成行紈綺繽紛翠眉紅粧王歡轉盻為王歌舞願得君歡長無災苦蘇公以為邯鄲宫中金石絲簧此兩句不惟人少作而知之者亦極難得耳醉中為余書此張文潛見坡谷論説鬼詩忽曰舊時鬼作人語如今人作鬼語二公大笑王直方詩話東坡作虔州八境詩曰山中木客解吟詩十道四番志記虔州上洛山有木客鬼與人交甚信未嘗言能作詩也後得續法帖記木客詩云酒盡君莫沽壷傾我當發城市多囂塵還山弄明月方知得句之因徐鉉謂鄱陽山中有木客自言秦時造阿房宫采木者豈鉉未嘗見十道四番志也漫叟詩話春草萋萋春水緑野棠開盡飄香玉繡嶺宫前白髮人猶唱開元太平曲忽然湖上片雲飛不覺舟中雨􅊜衣折得荷渾忘却空將荷葉蓋頭歸浦口潮來𥘉渺漫蓮舟溶漾采花難芳心不愜空歸去會待潮回再摘看爺娘送我青楓根不記青楓幾廽落當時手刺衣上花今日為灰不堪著惆悵金泥撲蝶裙春來猶見伴行雲不教布施剛晉得恰似知逢李少君卜得上峽曰秋江風浪多巴陵一夜雨腸斷木蘭歌余與魯直夀朋天會于伯時齋舍此一卷皆仙鬼所作或夢中所作也又記太平廣記中有人為鬼物所引入墟墓皆華屋洞户忽為劫墓者所驚出遂失所見但云芫花半落松風晚清吾每愛此兩句東坡酉陽雜爼載鬼詩兩篇山谷喜道之其一曰長安女兒踏春陽無處春陽不斷腸舞袖弓彎渾忘却娥眉空帶九秋霜其二曰流水涓涓芹弩芽織鳥雙飛客還家荒村無人作寒食殯宫空對棠梨花洪駒父詩話李真言字希古嘗夢至一宫殿有數百妓拋毬人唱一詩覺而記三首云侍宴黃昏未肯休玉階夜色月如流朝來自覺承恩最笑倩旁人認繡毬隋家宫殿鎖清秋曽見嬋姢揚繡毬金鑰玉簘俱寂寂一天明月照髙樓堪恨隋家幾帝王舞腰挼盡繡鴛鴦如今重到拋毬處不是金爐舊曰香今古詩話中載此詩只有二首不及此詳備故盡録之侯鯖録百家詩話總龜卷之四十二
