front:
  text: 百家詩話總􅀛後集卷之五十
  hash: sha256:a09921f5132ccc2c47c411a69b11dc830dc681c480963aead8a1303cd82165a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_050-1a}
body:
  text: 技藝門東坡與子由論書云吾雖不善書曉書莫如我苟能通其意常謂不學可故其子叔黨䟦公書云吾先君子豈以書自名㢤特以其至大至刚之氣發於􅅐中而應之於手故不見其有刻畫嫵媚之態而端乎章甫若有不可犯之色少年喜二王書晚乃喜顔平原故時有二家風氣俗子不知妄謂學徐浩陋矣􅀚此則知􅀄未嘗規規然出於翰墨積習也􅁑常之唐令狐相進李逺爲杭州宣宗曰聞李逺云長日惟消一􅈰棊豈可使治郡哉對曰詩人之言不足有實也乃薦逺亷察可任此正說詩者不以辭害志也䂬溪房千里作骰子選格序云以六骰􅀟􅀟爲戯以數多少為進身官聀之序而乃條其選黜之目焉坡以流俗狂惑經营倘來惴惴惟恐後扵他人何異擲骰者心動於中而色形於外也欲求勝人者哉王逄原彩選詩云卒無及物效徒有髙人氣昏昏忘其大􅅰􅅰争其細其理信然黄常明裴度平淮西絶世之功也韓愈平淮西碑絶世之文也非裴之功不足以當韓之文非韓之文不􅁕以發裴之功碑成李愬之子乃謂没父之功訟之於朝憲宗使叚文昌別作此與捨周鼎而寳康瓠何異㢤李義山詩云碑髙三丈字如手􅀒以靈鰲蟠以螭句竒語重喻者少讒之天子言其􅀻長繩百尺拽碑倒粗砂大石相摩治公之斯文若元氣先時已入人肝脾愈書愬曰十月壬申愬用所得賤賊􅀅自文城因天大雪疾馳百二十里到蔡取元濟以獻文昌所謂郊雲晦􅄀寒可墮指一夕卷斾凌辰破関等語豈不相萬萬哉東坡先生責官過舊馹壁間見有人題一詩云淮西功業冠吾唐吏部文章日月光千古断碑人膾炙世間誰數叚文昌坡喜而録之同上陸希聲􅀮居冝興君陽山今金沙寺其故他宅也自著君陽山記叙其景物亭舘如輞川上可得其彷彿􅀄僧􅈯光􅀙希聲授筆法継以善書得幸於昭宗希聲祈使援已以詩􅀉之云筆下龍蛇似有神天池雷雨變逡廵寄言昔日不􅀛手應念江湖洴澼人遂得召􅀮操盖不足􅀚也嘗著易傳十卷􅀚其自序以謂夢在大河之陽有三人偃卧東首上伏羲中文王下孔子也以易道􅂌予遂悟八卦小成之位質之􅁚數如有符契且云今年四十有七巳及聖人之年於是作易傳以授門人崔徹王賛之徒復自爲注今􅀚其書無可取者而恠誕如此其人亦可知後避難死於道路盖不能終君陽之居也韻語陽秋杜劉少府􅀞山水障􅁔云反思前夜風雨急乃是蒲城􅀑神入元氣淋漓障尤􅊜真宰上訴天應泣應物聽嘉陵江聲云水性自云静石中本無聲如何兩相激雷轉空山鳴贈能吟李儋詩云絲桐本異質音韻合自然吾􅀚造化意二物相因縁臨川詠魯公壊碑云六書􅂐籒数變改遂後世多失真誰􅀄妄鑿妍與醜坐令學士劳骸筋堂堂魯公勇且仁豈亦以此夸常民直疑技巧有天巧不必強勉亦通神坡詠歙硯詩云與天作石来㡬時與人作硯􅀄不辭詩成鮑謝石何與筆落鍾王硯不知此窮本探妙超出凖繩外不特狀冩景物也䂬溪拾遺門退之和劉使君云吏人休報事公作送春詩夢得送王司馬之陜州云案牘來時惟署字風煙入興更成章自俗吏􅀚之皆可坐不了事之目也韻語陽秋樂天云報道前駈少呵喝恐驚黄鳥不成啼坡云鬂􅁝只好對禪榻湖亭不用張旌旗蔡君謨云因傍堤松却飛盖爲聞山烏撤鳴騶若俗士務此誇張俗眼又豈識數公意黄常明林和靖詩馬􅀙同事借妻怕罷官貧頗能狀寒亷態抑又有意所謂怕貧者婦人女子耳大丈夫之不移何隕􅀗之有子羙有長貧任婦愁亦以男子未嘗愁也譲粟不謀妻以明謀及婦人則不得辭也又云浮生有分定飢飽豈能迯歎息謂妻子我何隨汝曹樂天云妻孥不恱生恠問而我醉卧方陶然退之曰莫為児女態戚嗟􅁨賤貧䂬溪詩話肅宗至徳􅀄子羙為拾遺岑参為􅀘􅆣或問二人孰賢予曰子羙賢或曰何以知之曰以其詩知之子羙之詩云避人焚諌草􅀐馬欲雞栖又曰明朝有封事数問夜如何参之詩曰聖朝無􅆣事自􅁴諌書稀至徳􅀄安史之亂方􅇵上皇在蜀朝野騷然果無闕事時耶䂬溪詩話李白月下獨酌詩云舉盃邀明月對影成三人而賈翁玩月詩亦云但爱杉倚月我倚杉為三􅁑常之文如翻水成賦作义手速乃北夣􅃈言記温庭筠才思艶麗工於小賦每入試押官韻作賦凡八义手而八韻成多為隣鋪假手號日救數人也余嘗以八义手對三折肱䂬溪詩話老杜流落不偶然巳為世􅀁尊嘗有杖藜還客拜又有客云老病人扶再拜難則其㘴深鄉曲敬可見奚雖然樊宗師見劉义尚為之獨拜况老杜乎黄常明周羙成晚歸錢塘鄉里夣中得瑞鶴仙一闋悄郊原帶郭行路永客去車塵漠漠斜陽映山落歛餘紅猶恋􅀌城䦨角凌波歩弱􅂈短亭何用素約有流鶯􅂆我重觧繍鞍緩引春醉酌不記歸時早暮上馬誰扶醒眠朱閣驚飈動幕猶殘醉遶紅渠歎西园已是花深無地東風何事又􅁖任流光過􅁍歸來洞天自樂未㡬方臘盗起自桐廬擁兵入杭時羙成方㑹客聞之倉黄出奔趍西湖之墳庵次郊外􅃴際殘臘落日在山忽見故人之妾徒歩亦爲迯避計約下馬小飲于道傍旗亭聞鶯聲於木杪分背少焉抵庵中尚有餘醺因卧小閣之上恍如詞中逾月賊平入城則故居皆遭蹂踐旋营緝而處継而得請提舉杭州洞霄宫遂老焉悉符前作羙成嘗自記甚詳今偶失其本姑記其畧以書于編揮塵余嘗於王莹夫􅗕處見王荆公手書集句詩一􅁓云海棠乱發皆臨水君知此䖏花何似凉月白紛紛香風隔岸聞囀枝黄鳥近隔岸聲相應隨意坐莓苔飄零酒一盃今不知在何所揮塵莱公雖居相位於寢處一青幃三十年有親者求之欲其易去公􅀏而荅曰彼詐我誠雖敝何害實不忍以敝舊弃耳析者愧之故魏野詩云有官居鼎鼐無地起楼䑓及北使來頋望縉紳而問迓者無地起樓䑓相公安在其清望爲人所景望如此然永叔歸田録頗論其侈汰司馬温公亦云豈非奢外而儉内歟䂬溪昌􅀺􅀉崔立之云傲兀坐試席深叢見􅀌羆四坐各􅊠囬不敢捩眼窺可謂善言􅂣屋事若平居所飬不厚誠難傲兀也同上退之韶州􅇔别張使君云乆欽江緫文章妙自歎虞翻骨相屯翻放弃南方自恨䟽莭骨鯁不媚犯上􅀗罪當長没海隅其刚􅄶方拙凌突􅁠势出於天性冝文公喜用江緫乃敗國奸回特引之何故按南史孔奐傳宋主欲以緫為太子詹事奐曰江有潘陸之華而無园綺之實乃奏江緫文華之人冝求厚重之才是時恐有􅏺云杜云逺愧梁江緫還家尚黒頭李商􅀮贈杜牧之云前身恐是梁江緫皆未可與言史也同上子羙有朱紱􅀒平生樂天有金􅅁腰衫委地紫綬相暉映不􅁖赤紱金章盡到身如此尚多然亦有歎曰實事盡消虗事在銀魚金帶遶腰光又有簮纓假合虗名在筋力消磨實事空皆自作觧嘲也嘗愛韋蘇州云除書忽到門冠帯便拘束又有謝居士􅀉松英丹云一拜藍峰送還使腰間銅印與心違言與意皆自在也散貟踈去未爲貴小邑陶休何足云惟樂天早退乃可語此黄常明蘇州􅀉粲師遥知㝷齋夜凍雪封松竹時有山僧来懸燭獨自􅀫嘗於暑月讀亦有霜氣籍贈令狐云乆爲慱士無人識自到長安賃舎居未􅁕爲窮其㝷時道士云昨來官罷無生計􅁒就專求辟榖方其窮無以加矣唐王建以宫詞名家本朝王岐公亦作宫詞百篇不過述郊祀御試經筵翰􅁐朝見等事至於宫掖􅃧􅇵之事則秘不得傳故詩詞中亦罕及若建者乃内侍王守澄之宗姪得宫中之事為詳如叢叢洗手遶金盤旋拭紅巾入殿門衆裏遥㸔新橘子在前枚得便承㤙又云避脫昭儀不擲盧井􅁁含水噴鴉雛内中數日多呼喚冩得􅅬王蛺蝶圗如此之􅁼非守澄􅀃似則建豈能知㢤􅀄守澄讀建宫詞謂之曰宫掖之事而子昌言之儻得罪將奚贖建與之詩云三朝行坐鎮相隨今上春宫見小時脫下御衣先賜著進來龍馬毎教􅀐長承宻旨帰家少獨奏􅁁機出殿遲不是姓同親􅀃向九重争得外人知自是守澄不敢有言花蕋夫人亦有宫詞百篇如月頭支給買花錢滿殿宫人近數千遇著唱名多不語含羞走過御床前之􅁼亦可喜也余嘗赴京師徃辭伯父坐中舉兄弟送行詩云問人求穩店下馬過危橋及􅀚坡集送姪安莭詩序其伯曽有送蘇老下第歸蜀云人希野店休安枕路入靈関穩跨馿急難之誠意皆相若但字有多寡耳余官辰沅逾年族弟来相視􅀅行率爾送之云就舎勿令人避席渡江莫與馬同船雖鄙近不工亦可用於畏􅂗也黄常明荆公日記云立春日悉剪綵爲燕子以戴之故歐永叔云不驚􅀣裏禽􅀄變共喜􅁫頭燕巳来鄭毅天云漢閣閗簮􅀟綵燕併知春色上􅁫頭皆春日貼子詩也藝􅁐雌黄云脩真入道秘言曰以立春日清晨北望有紫縁白雲者爲三元者三素飛雲三元君以是日乗八輿上詣天帝子候見當􅂯拜自陳某乙乞得給侍輪轂三過見元君之輦者白日登天􅀊時廣記載此事云臣鍇按舉􅂣嘗試立春日望三素雲詩取此事故蘇子容作皇太妃閣春貼子云萬年枝上㸔春色三素雲中望玉宸許仲尤作皇帝閤春貼子云三素雲飛歸北極九農星粲見南方百家詩話總􅀛後集卷之五十終冩書貴溪姜輔周刋字番易丁祖朱楽平胡暹詩話総􅀛䟦余舒阮字集百家詩話総􅀛首卷四十有八後卷五十寔抄録未傳之書其月囱殿下樂善嗜古見而珍愛亟􅁒與四方風雅之士共之延珖校讎訛舛芟剔重冗而夀諸梓焉復俾采集近代及國朝諸大家者而續成之荑荒僻淺鮮蒐輯尚未成帙姑識于卷末云峕嘉靖歳次乙巳春三月吉旦番昜後學程珖謹識
