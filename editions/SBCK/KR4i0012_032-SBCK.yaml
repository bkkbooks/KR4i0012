front:
  text: 增修詩話總􅀛卷之三十二
  hash: sha256:1ba9aae21a24af92e9d09c6ee9aaf01412e34e2ccb7621b1e280209a14825260
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_032-1a}
body:
  text: 詩䜟門下孟津詩人李讀字長源一日自孟津訪魏仲先曰數􅀫前有人在床下誦曰行到水窮處未知天盡時予斥其悞曰豈非坐看雲起時􅁘答曰此雲安能起也茲必死期故來相别痛飲數日而卒古今詩話丁晋公摠章聖陵事翰林學士李維援其親識爲挽􅀰懇請扵晋公曰更在陶鉒丁應聲曰隔鉒復陶鑄齋􅀰又挽􅀰自然堪下淚何必到斜陽未㡬丁敗張唐卿進士第一人登科期集於興國寺題詩句扵壁曰一舉首登龍虎榜十年身到鳯凰池有人續云君看姚曄并梁固不得朝官未可知後果終於京官趙嘏嘗有詩云早晚粗酬身事了水邉歸去一閒人止扵渭南尉以其精扵詩時謂之趙渭南如韋蘇州云孫秀旣恨石崇不與緑珠又憾潘岳昔遇不以禮復遭遇晋武帝遂同日􅀵䂖崇歐陽堅潘岳送市石謂潘曰安仁復爾􅁘潘曰可謂白首同歸也潘金谷集云投分􅀉石友白首同所歸亦其䜟也􅁃亮出石頭城百姓歌於岸上曰􅁃公上武昌翩翩如飛鳥􅁃公還揚州白馬牽旒旐果㝷卒來鵬詩思清䴡韋岫尚書常愛其才逰蜀夏課卷中有云一夜緑荷風剪破賺他秋雨不成珠識者以為不祥是年果失志丁晋公自崖召還有􅀉友人詩曰九萬里鵬重出海一千年鶴再歸巢句徤意清然議者曰謂鵬䖏於海為得地出海則失水鶴返其巢則不能翺翔矣卒如其說又扈從東封嘗聞柰何黒水人間隂獄也感其事而為詩曰黒水溪旁􅂓駐馬柰何岸上試回頭高崕昏處是隂獄須信人生到此休非佳兆也丁晋公為侍中時嘗作詩曰千金家累非良寳一品官高是強名未㡬奪爵籍没初釋􅄄為饒倅同年白稹為判官稹一日以片􅁓假緡伍鐶扵公公􅀏曰牓下新婚京國冨室豈無半千質物􅁘懼我撓之故矯耳扵間尾書一絶戯之曰欺天行止吾何有立地機關子太乖五百青蚨两家闕赤洪崖打白洪崕朱崕之行兆扵此蘇子羙失意秋日登蘇之閶門云年光冉冉催人老雲物涓涓又變秋家在鳯凰城􅆣下江山何事苦相留又書其旁云江山留人也人留江山也卒不用亦詩之䜟鄭毅夫罷禁林行次南都遇雨為二篇曰雨聲飄㫁忽南去雲􅀔旋生從北流應料凉風消息近蕭蕭巳在􅀣梢頭又曰榴火燒空未擬休忽驚快雨破清秋晚雲淡淡趂落日只到楚江南岸頭僧文瑩見之訝其氣不振解錢塘赴青社卒楚州崔玄諫議有子名勉與趙叔平同年登第轉大理評事過天津橋墜馬時集賢韓公與趙同為開封府推官韓崔壻也聞其墜馬􅃍徃眡之但嘔血不止數日館扵韓舎因作詩曰身随花露重命逐藕絲輕明朝風雨霽歸路在三清明日果卒時有㣲風細雨盧多遜方丱角其父携就雲陽觀小學與群児見廢壇上有古簽一筒競徃抽之為戯多遜尚未識字抽一簽歸示其父詞曰身出中書堂須因天水白登仙五十二終為蓬島客父見之頗意以為吉兆迨作相與秦王事故敗始因遣堂吏趙白遂竄南荒卒于朱崕年五十二無一字之差並同前嚴惲字子重善為詩嘗有詩云春光冉冉歸何處更向花前把酒盃盡日問花花不語為誰零落為誰開累舉不第卒扵呉中南部新書汝州劉廷芝字希夷苦篇詠善為閨帷之作詞哀多似古調體􅀔與時不合遂不為人所重希夷羙姿貌善彈琵琶好酒色落魄不拘常俗為白頭吟忽作一聮語曰今年花落顔色改明年花開誰復在旣而復嘆曰我此語似䜟石崇曰白首同所歸復何所異乃除之復作二句曰年年歲歲花相似歲歲年年人不同復歎曰死生有命豈復由此乃并留前句作詩後歲餘爲奸人所害隋長夀年中有鄭州鄭蜀賔風流名士頗善五言蹉跎郷閭不求聞逹垂掛冠選授江左一尉臨去賔友祖餞至上東門留别曰畏途方萬里生涯近百年不知將白首何處入黄泉酒酣自詠聲調哀蹙合坐嗚咽卒扵官時人比之劉廷芝同前㓂萊公初爲宻學方年少得意偶撰江南曲其句有江南春盡離腸㫁蘋滿汀洲人未歸日暮江頭一望時愁情不㫁如春水之􅀋音皆悽愴末年果南遷拾遺孫咸不知何許人而長於預知災異又善為詩開寳初客于九江因逰廬山有詩留題九天使者廟云獨入玄宫禮至真焚香不為賤貧身秦淮两㟁沙埋骨湓浦千家血染塵廬阜烟霞誰是主虎溪風月屬何人九江太守勤王事好放天兵渡要津不踰數年金陵板蕩九江重闈人受􅂗炭並應此詩咸後卒於南昌衆人棄尸扵江中泝流而上咸異之蘇易簡罷翰林學士以禮部侍􅀰知南陽日年未四十屢有閒冷之嘆有老僧獨處外城古寺通儒術能詩故公與詩曰憔悴今年三十六與師氣味不争多未㡬而卒二宋以文章齊名天下子京守蜀日作詩三百名曰猥藁有碧雲謾有三年信明月空爲两地愁後卒不入两地人以爲詩䜟王元澤少時作白苧行有云君心莫厭頻歡樂請看雲間日西入議者謂羙則羙矣然日西光景無多近乎䜟果不永夀王􅂦湖湘人字則之季父多㳺江左有洪州西山詩云林泉空有東西路風月難㝷十二家議者謂必無名第後果然嘗作鸂鶒詩云棲息應難近小池性靈閒雅衆禽希蒲洲日暖依花立漁浦烟深貼浪飛遺羽參差沾水沬餘蹤稠叠印苔衣晚來林徑㣲風起何處相呼着對歸狄渙􅀌鴈云更無聲接續空有影相隨聞此句者皆云必無後果如其言並同前陳無巳賦高軒過詩云晚知書􅀞真有益却恠歲月來無多不數月遂卒直方詩話秦少㳺紹聖初請外以校勘為杭倅方至楚泗間有詩云平生逋欠僧房睡准擬如今處處還詩成之明日以言者落職􅁥處州酒人以為詩䜟東坡有送戴􅀩赴成都玉局􅀚詩云莫欺老病未歸身玉局他年第㡬人又有過嶺一篇云劍南西望七千里乗興真為玉局逰後卒於是觀方元脩字時敏一日與楊信祖饒次守過余坐中分題人以姓為韻而楊有共約城南方之句後數日録此唱和扵前忽有一同人讀云共釣城南方盖釣字以約字草不相辨而讀者悮之時敏大以爲惡不三日其父省中歸􅁀卒後數月其母亦亡並同前范攄處士有子七歲作􅀮者詩云掃葉隨風便澆花趂日隂方干聞之曰此可入室又作夏景詩云閒雲生不雨病葉落非秋干曰必不夀果卒後有歐陽彬之子稚齒作田父詩云桑柘殘陽裏児孫落葉中廖凝見之曰可惜天才同范氏之子㝷亦卒郡閣雅談髙􅀂拙善詩從誨辟於幕下嘗作中秋不見月云人間雖不見天外自分明從誨覧之謂賔佐曰此詩雖好不利扵巳將來但恐䘮明後果如其言大定録王元之甞作病鶴云埋瘞肯同鸚鵡塚飛鳴不到鳯凰池其文學才藻登金門玉堂不爲難也竟不至其地見扵是矣青􅃈集張字退翁都下人有言懐詩云命交隨分樂天賜一生閑􅂣屋有聲而不第亦詩之䜟王寂都下人重信義少然諾嘗撫劍鋏為之歌曰人間冉冉混塵埃身後身前事莫猜早悟浮生都是夣當時悔向夣中來又曰當年吁氣謾如虹回首都歸冷􅀏中翠玉峰前好歸去可憐三十二秋風時寂年三十二明年寂知事莫非前定􅀏出都門而去至太行馹舎􅁀卒在仕者遂葬於西崦下並同前徐振甫興化軍人居朝京門外未第時䜟曰折着屋爛着椽朝京門外出狀元振甫將第而門果壊黄裳道夫南劍州人家居龍溝未第間有䜟曰掘龍溝出龍頭道夫將第而溝果脩浚興化軍有壺公山䜟云壺公山􅀂㫁莆田朱紫半水遶壺公山此時方好看蔡君謨興水利􅈅民田引水遶壺公山登第者比前在朝廷者半朱紫矣搜神秘覧韓魏公起堂扵北池上效樂天因名曰醉白堂五月堂成公賦詩二篇其一卒章云霓裳時事非吾事且學熏酣石上眠自尔寢疾以六月二十五日薨此詩遂爲絶筆旣而神廟遣使特爲石藏以葬始悟石上眠之句􅀂䜟云公薨士大夫恨勲徳之難名知與不知皆爲泫然而嘆曰天何不爲我留歐陽公爲魏公作誌文而後死也韓魏公别録鄭毅夫守杭題僧文瑩所居壁云西湖頻送客緑波舟楫輕春入蘿逕静浪花翻逺晴又云東風江雲北飛燕同􅀉青春不相見又題杭郡閣云雨影横殘紅秋容隂映日寒江帶暮流曉角穿雲出峰藏翠如織􅀫鳥去無迹封書冩所懐􅂓托金門翼時頗訝其氣􅁚不逺後觧杭麾將赴青社以病泊舟楚州而卒其語巳兆於先矣玉壺清話増修詩話總􅀛卷之三十二百家詩話總􅀛後集卷之三十二樂府門翰林學士聶冠卿嘗扵李良定公席上賦多䴡詞云想人生羙景良辰堪惜問其間賞心樂事就中誰是并得况東城鳯䑓沁􅁐泛晴波淺照金碧露洗華桐烟霏􅁝栁緑隂摇曵蕩春一色􅀞堂逈玉簮瓊佩髙㑹盡詞客清􅂬乆重燃絳蠟別就瑶席有翻若驚鴻体熊暮為行雨標格逞珠喉緩􅁔妖䴡似听流鶯亂花隔慢舞萦廽嬌鬟低嚲腰支纎細困無力忍分散彩雲㱕後何處更㝷覔休辭醉明月好花莫謾輕擲蔡君謨時知泉州􅀉良定公書云新傳多䴡辭􅄒宴遊之娛使病夫舉首増歎耳又近者有客至自京師言諸公春日多㑹于元伯園池因念昔逰輙形萹詠緑渠春水走潺湲􅀞閣􅄘峦映雪鮮酒令巳行金盞側樂聲􅀄認翠裙貟清逰勝事傳都下多䴡新詞到海􅁁曽是尊前沉醉客天涯囘首重依然苕溪漁隠曰冠卿詞有露洗華桐烟霏􅁝栁之句此正是中春天氣下句乃云緑隂摇曵蕩春一色其時未有緑隂真語病也復斎漫録吾昔自杭移高宻與楊元素同舟而陳令舉張子野皆􅀙余過李公擇扵湖遂與劉孝叔俱至松江夜半月出置酒垂虹亭上子時年八十五以􅁔詞聞扵天下作定風波令其略云見􅀃賢人聚呉分試問也應旁有老人星坐客􅂬甚有醉倒者此樂未嘗忘也今七年耳子野孝叔令舉皆為異物而松江橋亭今􅀊七月九日海風駕湖平地丈餘蕩盡無餘孑遺矣追思曩時真一夢耳苕溪漁隠曰呉興郡圃今有六客亭即公擇子瞻元素子野令舉孝叔時公擇守呉興也東坡又云余昔與張子野劉孝叔李公擇陳令舉揚元素㑹于呉興時子野作六客詞其卒章盡道賢人聚呉分試問也應旁有老人星凡十五年􅄪過呉興而五人者皆巳亡矣時張仲謀與曹子方劉景文蘇伯固張秉道為坐客仲謀請作後六客詞云月滿苕溪照夜堂五星一老閗光芒十五年間真夣裏何事長庚對月獨凄凉緑􅄠蒼顔同一醉還是六人吟􅀏水雲鄊賔主談鋒誰得似看取曹劉今對两􅂫張東坡栁三変字景荘一名永字􅂄卿喜作小詞然薄扵操行當時有薦其才者上曰得非填詞栁三变乎曰然上曰且去填詞由是不得志曰與儇子縦逰倡舘酒樓間無復檢率自􅁛云奉聖㫖填詞栁三変扵乎小有才而無徳以将之亦士君子之所冝戒也栁之樂章人多􅁛之然大㮣非覊旅穷愁之辭則閨門媱媟之語若以歐永叔晏叔原􅂫子瞻黄魯直張子野秦少㳺軰較之萬萬相遼彼其所以傳名者直以言多近俗俗子易悦故也皇祐中老人星現永應制撰詞意望厚恩無何始用漸字終篇有太液波翻之語其間宸逰鳯輦何處與仁廟挽詞闇合遂忤㫖士大夫惜之余謂栁作此詞借使不忤亦無佳處如嫩菊黄深拒霜紅淺竹籬茅舎何處無此景物方之李謫仙夏英公等應制詞殆不啻天冠地履也世傳永嘗作輪㙜子早行詞頗自以為得意其後張子野見之云旣言怱怱䇿馬登途滿目淡烟衰艸則巳辯色矣而後又言楚天闊望中未暁何也抑何語意顛倒如是藝􅁐先君嘗云古詞絳都春有鼇山綵字犯太上皇御名􅅾莱島之句當云綵締余前集悞以古詞為柳詞今正是之苕溪漁隱先君頃嘗丐祠居射村作感皇恩一詞云乞得夣中身㱕棲水雲始􅁴精神自家底峭帆輕掉時與白鷗㳺戯畏途都不􅃹風波起光景如梭人生浮華百􅀊何妨盡沉醉臥龍多事謾􅀃三分竒計筭来争似我長昏睡又嘗江行阻風作漁家傲一詞云幾日北風江海立千車萬馬鏖声急短掉峭寒欺酒力飛雨息瓊花細細穿窓􅂩我本緑蓑青若笠浮家泛宅烟波逸渚鷺沙鷗都舊識行未得高歌與尔相㝷覔同上顔氏家訓云别易㑹難古人所重江􅀯餞送下泣言離北間風俗不屑此事岐路言離􅂬􅀏分首李後主盖用此語耳故長短句云别時容易見時難復斎漫錄舊詞高雅非近世所及如撲胡蝶一詞不知誰作非惟藻䴡可喜其腔調亦自婉美馮延巳著樂章百餘闋其鶴冲天詞云暁月墜雲披銀燭錦屏幃建章鍾動玉繩低宮漏出花遲又㱕囯謡詞云江水碧江上何人吹玉笛扁舟逺送瀟湘客蘆花千里霜月白傷行色明朝便是􅀜山隔見􅁛扵世元宗樂府詞云小樓吹徹玉笙寒延巳有風乍起吹皱一池春水之句皆為警䇿元宗嘗戯延巳吹皱一池春水干卿何事延巳曰未如陛下小樓吹徹玉笙寒元宗悦苕溪漁􅀮曰古今詩話云江􅀯成文㓜為大理卿詞曲妙絶嘗作謁金門云風乍起吹皱一池春水中聞之因案獄稽􅆡召詰之且謂曰卿聀在典刑一池春水又何干扵卿文㓜頓首又本事曲云􅀯唐李囯主嘗責其臣曰吹皱一池春水干卿何事盖趙公所撰謁金門辞有此一句最為警䇿其臣即對曰未如陛下小樓吹徹玉笙寒若本事曲所記但云趙公􅀄無其名所傳必悞惟􅀯唐書古今詩話二說不同未詳孰是南唐書李感化善謳􅁔聲韵悠􅀭清振林木繋樂部為􅁔板色元宗嘗作浣溪沙二闋手冩賜感化曰菡蓞香消翠葉殘西風愁起碧波間還與容光共憔悴不堪㸔細雨夣囘雞塞逺小樓吹徹玉笙寒蔌䔩泪珠多少恨􅀝䦨干手捲真珠上玉鈎依前春恨鎻重樓風􅂻落花誰是主思悠悠青鳥不傳雲外信丁香空結雨中愁廽首緑波三峽暮接天流後主即位感化以其詞札上之後主感動賞賜感化甚􅄖苕溪漁􅀮曰元宗即嗣主李璟嘗作此二詞古今詞話乃以為後主作非也後主名煜􅀯唐書東坡大江東去赤壁詞語意高妙真古今絶唱近時有人和此詞題扵郵亭壁間不著其名語雖粗豪亦氣槩可取今謾筆之詞曰炎精中否歎人材委靡都無英物戎馬長驅三犯􅆣誰作連城堅壁楚漢吞并曹劉割㨿白骨今如雪書生鑚破簡編􅀃甚英傑天意眷我中興吾君神武小曽孫周發海岳封疆俱效聀狂虜何劳追㓕翠羽􅀯巡叩閽無路徒有冲冠􅄠􅀌忠耿耿劍􅄡冷浸秋月苕溪漁隠孫􅋈字濟師嘗作落梅詞甚佳一聲􅆧􅃹吹嗚咽玉溪半夜梅飜雪江月正茫茫断橋流水香含章春欲暮落日千山􅀨一􅀧着枝酸呉姫先齒寒同上汪彦章舟行汴中見岸旁􅀞舫有映簾而觀者甚見其額有詞云小舟簾􅂩佳人半露梅粧額緑雲低映花如刻恰似秋霄一半銀蟾白結児梢朶香紅扐鈿蝉隠隠摇金碧春山秋月渾無迹不露墻頭些子真消息􅀉醉落􅅎同上詞句􅁒全萹皆好極爲難得如賀方囘淡黄楊栁􅅁棲鴉秦處度藕葉清香勝花氣二句冩景詠物可謂造㣲入妙若其全萹皆不逮此矣徐幹臣鴈足不来馬蹄難駐門掩一庭芳景駐字當作去字語意乃佳周羙成水亭小浮萍破處簷花薕影顛倒按杜少陵詩灯前細􅀨簷花落羙成用此簷花二字全與出處意不相合乃知用字之難矣趙徳麟重門不鎻相思夣随意遶天涯徐師川栁外重重叠叠山􅃒不断愁来路二詞造語雖不同其意絶相􅀋古詞水竹舊院落櫻筍新􅂼果一本是水竹舊院落鶯引新雖過不然櫻筍新􅂼果則與上句有何干渉董武子疇昔㝷芳秘殿西日厭金鋪宮栁垂垂然秘殿豈是㝷芳之處非所當言也侯元功䝉密州人自少㳺塲屋年三十有一始得郷貢人以其年長邈寝不之敬有輕薄子􅀞其形扵紙鳶上引線放之䝉見而大􅀏作臨江仙詞題其上曰未遇行蔵誰肯信如今方表名踪無端良匠􅀞形容當風輕借力一舉入高空才得吹嘘身漸穩只疑逺赴蟾宫􅀨餘時候夕陽紅幾人平地上看我碧霄中䝉一舉即登第年五十餘遂為执政夷堅志曽端伯慥編樂府雅詞以秋月詞念奴嬌為徐師川作梅詞􅀧絳唇為洪斍範作皆悞也秋月詞乃李漢老梅詞乃孫和仲冲冲即正言諤之子也又世傳江城子青玉案二詞皆東坡所作然西清詩話謂江城子乃葉少藴作桐江詩話謂青玉案乃姚進道作四詞皆佳今併録之念奴嬌詞云素光練浮映秋山隠隠修眉横緑鳷鵲樓高天似水碧瓦寒生銀粟千丈斜暉奔雲湧露飛过盧仝屋更無塵氣滿庭風碎梧竹誰念鶴􅄠仙翁當年曽共賞紫岩飛瀑對飲三人􅂓痛飲一洗離愁千斛斗轉參横翩然㱕去萬里􅀐黄鵠滿天霜暁呌雲吹断横玉􅀧絳唇詞云流水泠泠断橋斜路梅枝亜雪初下全似江􅀯􅀞白璧青錢難買春無價㱕耒也風吹芷野一􅀧香随馬江城子云銀濤無際卷􅅾􅘵落霞明暮雲平曽見青鵉紫鳯下層城二十五弦弹不盡空感㮣有餘情蒼梧烟水断㱕程捲霓旌為誰迎空有千行流泪􅀉幽貞舞罷魚龍雲海晚千古恨入江聲青玉案詞云三年枕上呉中路遣黄耳随君去若到松江呼小渡莫驚鷗鷺四橋盡是老子經行處􅦿川圗上看春暮長記高人右丞句作箇㱕期天巳許春衫猶是小蛮針線曽􅊜西湖􅀨漢老念奴嬌詞中有滿天霜暁呌雲吹断横玉之句乃用崔魯華清宫詩銀河􅃞􅃞月輝暉樓碍天􅁁織女機横玉呌雲清似水滿空霜逐一聲飛或云呌雲乃笛名非也又端㑑所編樂府雅詞中有漢宫春梅詞云是李漢老作非也乃晁冲之叔用作政和間作此詞獻蔡攸是時朝廷方典大晟府蔡攸携此詞呈其父云今日扵樂府中得一人京覧其詞喜之即除大晟府丞今載其詞曰瀟􅎈江梅白竹捎稀處横两三枝東君也不愛惜雪壓風欺無情燕子怕春寒輕失佳期惟是有􅀯来歸鴈年年長見開時清淺小溪如練問玉堂何似茅舎踈籬傷心故人去後冷落新詩微雲淡月對􅀌芳分付他誰空自􅀝清香未减風流不在人知此詞中用玉堂事乃唐人詩云白玉堂前一􅀣梅今朝怱見數枝開児家門户重重閉春色因何得入来或云玉堂乃翰􅁐之玉堂非也苕溪漁隱元豊間都人李嬰調蘄水縣令作滿江紅一曲徃黄州上東坡東坡甚喜之其詞云荆楚風烟寂寞近中秋時候露下泠蘭英􅀅謝葦花初秀㱕燕殷勤辭巷陌鳴蛩凄楚来窓牗又誰念江邉有神仙飄零乆横琹􅂰携笻手矌望眼閑吟口任紛紛萬事到頭何有君不見凌􅃄冠劍客何人氣貌長依舊㱕去来一曲為君吟為君夀苕溪漁隱古樂府詩云今世褦襶子觸热到人家褦襶集韵觧之云不曉事余素畏热乃知人觸热来人家其謂不曉事宜矣嘗愛王逐客作夏詞送將㱕不用浮􅀲沉李等事而天然有塵外凉思其詞云百尺清泉聲陸續映瀟洒碧梧翠竹面千歩囬廊重重簾幕小枕欹寒玉試展絞綃㸔􅀞軸見一片瀟湘凝緑待玉漏穿花銀河穿地月上欄干曲此語非觸热者之所知也苕溪漁隠曰余嘗愛李太白夏曰山中詩脫巾掛石壁露頂洒松風其清凉可想也漫叟詩話賈耘老舊有水閣在苕溪之上景物清曠東坡作守時屢過之題詩􅀞竹扵壁間沈㑹宗又為賦小詞云景物因人成勝槩滿目更無塵可碍等閑簾幕小欄干衣未觧心先快明月清風如有待誰信門前車馬隘别是人間閑世界坐中無物不清凉山一帶水一􅂀流水白雲長自在其後水閣屢易主今已摧毀乆矣遺址正與余水閣相近同在一岸景物悉如㑹宗之詞故余嘗有鄙句云三間小閣賈耘老一首佳詞沈㑹宗無限當時好風月如今捴属續溪翁盖謂此也苕溪漁隱晏叔原工小詞如舞低楊栁樓心月􅁔盡桃花扇底風不愧六朝宫掖到荆公小詞云揉藍一水萦花艸􅄫寞小橋千嶂抱人不到柴門自有清風掃略無塵􅁟思山谷小詞云春未透花枝瘦正是愁時候極為學者所􅁛賞味秦湛處度嘗有小詞云春透水波明寒峭花枝瘦盖法山谷也雪浪斎日記孫洙字巨源元豊間為翰􅁐名重一時李端愿太尉世戚里折莭交搢紳間而孫徃来􅀹數㑹一日鎻院宣召者至其家則巳出數十軰踪迹之得扵李氏時李新納妾能琵琶孫飲不肯去而迫扵宣命李不敢􅇔遂入院幾二鼓矣艸三制罷復作長短句寄恨恨之意遲明遣示李其詞曰樓頭尚有三通鼓何湏抵死催人去上馬苦匆匆琵琶曲未終囘頭凝望處那更簾纎雨漫道玉為堂玉堂今夜長夷堅志武才人出慶夀宮色最後庭􅁉陵得之㑹教坊獻新聲爲作詞號瑶䑓第一層后山詩話栁三変逰東都􅀯北二巷作新樂府骩骳􅀙俗天下詠遂傳禁中仁宗頗好其詞毎對酒必使侍伎􅁔之􅄪三三変聞之作宮詞號醉􅅾莱因内官逹後宮且永其􅂇仁宗聞而覺之自是不復歌其詞矣㑹改京官乃以無行黜之後改名永仕至屯田貟外郎苕溪漁隠曰先君嘗云栁詞鼇山綵字犯太上皇御􅅾莱島當云綵締坡詞低綺戸當云窺綺戸二字旣改其詞益佳后山詩話荆公問山谷云作小詞曽㸔李後主詞否云曽㸔荆公云何處最好山谷以一江春水向東流為對荆公云未若細雨夣囘雞塞逺小樓吹徹玉笙寒又細􅀨􅊜流光最妙雪浪齋日記􅀯唐李後主㱕朝後每懐江國且念嬪妾散落欝欝不自􅂓嘗作長短句云簾外􅀨潺潺春意䦨􅃢衾不煖五更寒夣裏不知身是客一餉貪􅂬獨自莫凭欄無限関山別時容易見時難流水落花何處也天上人間含思悽惋未幾下世西清詩話李後主詞云三十餘年家􅀦數千里地山河幾曽慣干戈一旦㱕為臣虜沈腰潘鬂消磨最是蒼皇辭庙日教坊猶奏別離􅁔揮泪對宫娥後主旣為樊若水所賣舉囯與人故當慟􅂘扵九庙之外謝其民而後行顧乃揮泪宮娥听教坊離曲㢤東坡􅀯唐後主圍城中作長短句未就而城破櫻桃落盡春㱕去蝶飜金粉􅀟飛子規啼月小樓西曲䦨金箔惆悵捲金􅅺門巷寂寥人去后望殘烟艸低迷余嘗見殘藁􅀧染晦昧心方危窘不在書耳藝祖云李煜若以作詩工夫治國事豈為吾虜也苕溪漁隠曰余觀太祖實録及三朝正史云開寳七年十月詔曹彬潘羙等率師伐江􅀯八年十一月㧞昇州今後主詞乃詠春景决非十一月城破時作西清詩話云後主作長短句未就而城破其言非也然王師圍金陵凢一年後主扵圍城中春間作此詞則不可知是時其心豈不危窘扵此言之乃可也西清詩話前人評杜詩云紅豆啄殘鸚鵡粒碧梧棲老鳯凰枝若云鸚鵡啄殘紅豆粒鳯凰棲碧梧枝便不是好句余謂詞曲亦然李景有曲手捲真珠上玉鈎或改為珠簾舒信道有曲云十年馬上春如夣或改云如春夣非所謂遇知音漫叟詩話呉越後王来朝太祖為置宴出内妓弹琵琶王獻詞曰金鳯􅁒飛遭掣搦情脉脉㸔玉樓雲雨隔祖起拊其背曰誓不殺錢王后山詩話百家詩話總􅀛後集卷之三十二
