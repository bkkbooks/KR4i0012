front:
  text: 増修詩話總􅀛卷之四十七
  hash: sha256:b0134a8f1674dab22bce549b3b8059272ef426dfeecce4f6cab2a703e3183a21
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_047-1a}
body:
  text: 竒恠門下賣墨者潘谷予不識其人然聞其所為非市人也墨旣精妙而價不二或不持錢米求墨不計多少與之此豈徒然者㢤予嘗與詩云一朝入海尋李白空看人間􅀞墨山一日忽取欠墨錢劵焚之飲酒三日􅀤狂浪走遂赴井死人下視之盖趺坐井中手尚持數珠也見張眀言如此百斛明珠太子中􅁢王綸祥符中登進士苐有女子年十八歲一日晝寢中忽魘聲其父與家人亟徃問之已起謂父曰與汝有洞天之縁降人間四百年矣今又㑹此自是謂父曰清非生自稱曰燕華君􅀄不識字忽善三十六體大􅂐皆世所未識每與清非生唱和及百餘篇有送人詩云南去過瀟湘休問屈氏狂而今聖天子不是楚懷王又贈清非生末句云自有燕華無限景清非何事戀東宫又雪詩云何事月娥期不在亂飛端葉落人間􅀃與人云天上端木開花六出贈清非生云君為秋桐我為春風春風㑹使秋桐變秋桐不識春風面題金山云濤頭風滚雪山脚石蟠虬又詩云落筆非俗子皷吹皆天聲豈俟耳目旣慰子華燕情蔣頴叔以楷字釋之刻扵石後嫁為吕氏妻旣嫁則懵然不復能詩康定間進􅂐字二十四軸仁宗嘉之有女仙傳行扵時天授二年臈卿相等詐稱上苑花開請幸則天許之乃遣使宣詔曰眀朝逰上苑火急報春知花須連夜􅀤莫待曉風吹扵是凌晨名花瑞草皆􅀤羣臣並咸服其異卓異記唐太府寺隋都水門之地隋平陳扵此置叔寳叔寳將亡有飛鳥集扵庭以觜畫地作詩云獨足上高䑓腐草化為􅁅欲知我家處朱門臨水開雍洛異集嗽金鳥出昆眀國形如雀色黄魏眀帝時其國來獻飼以珎珠及􅇠腦嘗吐金屑如粟宫人争取為􅁫鈿謂之辟寒金以此鳥不畏寒也宫人相嘲曰不服辟寒金那得帝王心不服辟寒鈿那得帝王憐古今詩話西蜀張俞嘗逰􅌐山題二絶云金玉樓䑓挿碧空笙簫逓響入天風當時國色并春色盡在君王顧盻中玉帝樓前鎻碧霞終年培飬牡丹芽不妨野鹿踰垣入㗸出宫中第一花異日􅀫温湯見二黄衣吏召其魂至一宫􅆣見仙座殿上問左右曰唐太真妃也與之論當時事甚詳覺又爲詩曰夣魂飛入瑶䑓路九霞宫裏曾相遇壺天晚景自愁人春水泛花何處去俞尚留温湯閑歩野外有牧童持書一􅁓俞乃開封乃仙所爲詩云虚堂壁上見清詞似共幽人􅀃所思海上風烟雖可樂人間聚散更堪悲重簾透日温温曉玉漏穿花滳滳遲此景此情傳不盡殷勤嘱付隴頭児俞詢牧童從何得對曰前日有一婦人過此遺我百錢授此書云眀日有衣冠獨歩野外子與之俞聞之愈感俞多對士君子道此青􅃈集治平二年長沙趙琪􅀰中作廣東憲公宇西軒有荔枝數本盛夏方熟召刺史燕賞一夕皆空皮核滿地軒之西壁有詩云吾儕今日㑹嘉賔滿酌洪鍾飲數廵遍地狼藉不知曉荔枝又是一畨新二廣人多傳異之隋煬帝逰廣陵恍惚見陳叔寳來謁曰聞已開隋渠引洪河之水東逰維楊因作詩獻之曰隋室開兹水􅀄心謀太奢一千里力役百萬民吁嗟水殿不復返龍舟成火霞驚流摧􅈝㟁濁浪噴黄沙兩隄人送客三月柳飛花日脚沉雲表榆梢噪瞑鵶如今疲子俗異日便無家且樂人間景休尋上漢槎客喧舟艤㟁風細錦㠶斜莫言無利役千古壯京華煬帝愠曰爾多知為後人之利􅁘同前呉興柳歸舜泊舟洞庭君山見鸚鵡數千翶翶其間相呼姓字有名清越者名武逰􅀰者名阿蘇児者名武仙􅀰者名自在先生者名踏蓮路者名鳯皇䑓者名戴蟬児者名多花子者或有唱歌者曰吾此曲乃漢武鈎弋夫人常所唱者詞曰戴蟬児分明傳與君王語建章殿裏未得歸朱箔金缸􅀟鳯舞名阿蘇児者曰我憶得阿嬌深宫唱曰昔請馬相如為作長門賦徒使費千金君王終不顧歸舜歸舟舟人云相失已二日矣寳􅀿中有元無有春末獨行廣陵郊野夜入路傍村舎􅀫北軒下忽聞西廊有人行聲見四人出衣冠各異相與吟詠一衣冠長人曰齊紈魯縞如霜雪寥亮高聲為子發一黒衣短陋者曰家貧良㑹清夜時熒煌燈燭我能持一故敝黄衣者曰清冷之泉俟朝汲長綆相牽長出入一黒衣冠身亦短陋者曰㸑薪煑水常煎熬充他口腹我為勞遲明方散起而視之乃有一杵燭䑓水桶破鐺而已幽恠録彭州天台禪院前致仕焦將軍彦賔所創也天台僧行燈掌之刺史安思謙男守範與賔客逰聮句以紀其來守範出首句曰偶到天台院因逢物外僧定武軍推官楊􅂦夫􅁇曰忘機同一祖出語離三乗前懷逺軍周述曰古德玄意逺外牕虚景澄前眉州判官李仁肇音聮曰片時松影下聮續百千燈遂請閑僧教大師義西八分書扵牌翌日有貧子乞食扵院見而高聲讀之曰人道有初無尾此則有尾無初後五年首頷俱碎不如尾句者乎院僧驅逐貧子曵杖四顧曰此後生不逺千里即欲到來人以為狂言果五年誅思謙守範伏法􅂦大􅁀亡此則首頷俱碎之義也行燈歸寂寺僧蜀王盡遣出之後主持院僧􅃴自興元歸則是不逺千里之義也貧子之􅀃一無謬焉楊􅂦城郭都人嘗逰青城山過皂江溺而又出登㟁􅃍有老人以杖接引且􅀏曰元是塩裏人本非水中物旋失老人所在因作詩以紀之曰青城山峭江水寒欲渡當時值急湍棹急狂風趍逺㟁舟逢恠石碎前灣手攀弱杖倉皇處命在洪濤頃刻間今日深恩無以報令人羞􅀃雀㗸環至成都與知巳言竟莫究塩裏人之義後為居安思謙幕判成都塩院感疾􅁀亡以塩褁其屍歸于蜀野人閒話海南城東有两井相去咫尺而異味號􅀟井井源出山源山石罅中東坡酌水異之曰吾尋白龍不見今家此水乎同㳺怪問其故曰白龍當為東坡出俄見其脊尾如爛銀蛇伏忽水渾有氣浮水面舉首如桃玉筯乃泳而去余定两井太守張子為造庵井上號思逺亭號泂酌崖有恠􅀣樹枝腋有詩曰岩泉未入井􅂪然冐沙石泉漱洄爲靨石老生罅􅂩異㢤寸波中露此横海脊先生酌泉􅀏泉香龍神蟄舉首玉筯揷忽去銀釘擲大身何時見夭矯翔霹􅆮誰言鵬背大更覺宇宙窄字畫如顔書無名衘日月此詩氣格似東坡而言泉漱石老似非東坡又語散緩疑學而爲之也龍爲蛇形小如玉筯同上􅀑神門大暦十三年李道昌爲姑蘇太守忽一日城南虎丘山有􅀑題二詩扵石壁上其一云青松多悲風蕭蕭聲且哀南山接幽壠幽壠空崔嵬白日徒昭昭不照長夜䑓雖知生者樂魂魄安能廻况復人所親慟哭心膽摧慟哭復何言哀㢤復哀㢤其二云神仙不可學中化空㳺魂白日非我朝青松為我門雖復隔幽隴猶知念子孫何以遣悲怨萬物歸其根􅀉語世上人莫厭臨芳尊莊生問枯骨生樂徒虚言道昌録奏准勑致祭祭畢其詩乃㓕後數日又􅀮出詩一首曰幽冥雖異路平昔忝攻文欲知高卧處山北両􅀌墳尋于山後得両墳極高廣至今存焉唐宋遺史許周士泊舟淮隂醉題淮隂廟曰脫身仗劍歸眀主授􅃏登壇是得人千􅀐争馳擒虎口萬囊不㫁堰龍津㧞旗破趙如摧朽一皷搶齊速􅀂神功業盖時雖不賞威名震主即危身時來且佩三齊印􅀔去翻輸一婦人得意不思防後患窮居何用結􅁁臣名留青史成何事血汚西鍾㡬掬塵遂使後來征戰者却愁他日似將軍還舟方寐夣介士擁見周士曰足下詩固好然未合扵理也信去楚歸漢起自行伍高祖結壇授􅃏雖立功名一旦自藴忿躁之氣外結􅁁臣内謀大叛死為萬世醜吾今血食扵此亦出望外而子之詩重吾過焉懦無所守將安用也摭遺賈魏公尹京日忽有人來展刺謁曰前江南國主李煜相見則一清瘦道士爾公曰太師巳物故何得及此曰某㓜探釋氏未逹誤有所見今為師子國王偶思鍾山而來懷中取一詩授公曰異國非所志煩勞殊清閑驚濤千萬里無乃見鍾山公讀之隨身􅁅㓕張孝和􅀜中人淳化壬辰年㳺淮南在夀春與張李二生􅀍酒及淮漘入就龍女祠取桐葉寫詩两句云我是夣中傳彩筆欲書花葉􅀉朝雲投扵帳中而去一旦獨至其祠忽簾中有婦人邀而置酒贈孝和詩一絶曰落㠶且泊小沙灘霜月無波淮上寒􅀂向江湖得消息爲傳風水到長安孝和告去行數十歩忽小女奴呌曰娘子令還桐葉勿復置念孝和得之回顧惟古祠敗舎而已李珦字温叔都官外􅀰之㓜女也八歲能詩嘗作榴花一絶云烈火真紅輕皺面晨霞碎剪貼枝條金刀刺出猩猩血濺落芳叢乆不銷後􅃴江夏人王常同泛舟射利江湖間婁徹為江州清風亭記常萬歎美珦曰未之盡也何不云好山渌水萬里有盡處清風眀月千古無老時一日舉其文扵徹徹卒用其言為破題不乆常死而珦溺舟扵三山磯下後三日屍忽出扵水中士人異之為立廟熈寜間都人張芝過廟作三絶焚扵廟中一云風軟潮生江水平遥峰􅀮􅀮浸寒青自從香骨沉波底獨我為詩吊尔靈二云軋軋櫓聲離逺浦蕭蕭㠶影落寒濤殷勤滴酒陳佳果將此深心慰寂寥三云江雨初晴逺岸低心因啼鳥陡思歸爾如㑹我題詩意魂夣相求一處飛旣夜一青衣召云娘子奉俟乆矣芝曰娘子為誰青衣曰早來獻詩與誰􅁘芝乃悟見一婦人謂芝曰早來佳章欲托以夣寐是或不真不能盡所懷故求面見妾溺此時水官令賦詩及校九江㑹源録一夕而畢水官大恱令江神出其屍􅂋其靈今有祠在此血食扵人謝子之詩意所不敢當荅以詩曰梅天半霽江水漲水揺花影紅蕩􅃞東風抛雨過江西截江一瞬生銀浪閴然不見鷗鷺飛漁唱四沉烟瞑蕩忽然晴霽碧虚闊水色天光月下上柳風和軟浪無聲客櫓嘔軋中流鳴两㟁沙頭拾翠女嬉􅀏携手相將行秋入空江潦水静澄江一碧如寒鏡逺㠶㓕沒入雲中菱唱㣲茫晩風瞑西風脫木露三山􅀮􅀮樵歸亂石間霜猿哀落岩前月杜宇枝間更啼血蓬囱風􅂃客衣單中夜危腸㡬欲絶我本名家閨中女聘得良人共途路相將雲水二十年所得􅂬心亦無數豈其天禍及一身夫死身沉大江去猛風吹雲無定踪盡日隂愁難得雨秋髙水冷白骨寒􅀌児稚女歸何處因公遺我白玉篇慰此窮泉生和煦明朝仙舸􅀫何州回首寒江烟雨暮芝見詩嘆賞乆之又出白金二百星贈芝曰煩礲一石載妾前事亦有奉報如何芝受其金送芝出幄則已五皷矣芝後因循不能為立石舟再過三山下㡬至傾覆是夜又夣其女深詬責之􅀒其事翰府名談李群玉校書過二妃廟題詩曰小􅀌洲北浦雲􅁁二女明粧共儼然野廟向江春寂寂古碑無字草芊芊東風近墓吹芳芷落日深山哭杜鵑猶似含嚬望廵狩九嶷如黛隔湘川題黄陵廟詩曰黄陵廟前芳艸春黄陵女児茜裙新輕舟小檝唱歌去水逺山長愁殺人又曰黄陵廟前春已空子䂓啼血滴春風不知精爽落何䖏疑是行雲秋色中群玉自以第三篇春空便到秋色踟蹰欲改二女俄出焉群玉悉其所陳而題於後渉重湖至潯陽太守叚成式索為詩酒侣具述其事後二年而群玉逝故哭李詩曰酒裏詩中三十年縱横唐突世喧喧明時不作禰衡死傲盡公卿歸九泉又曰曾􅀃黄陵事今為白日催老無男女累誰哭向泉䑓䖍州布衣頼仙芝言連州有黄損僕射五代時人僕射盖仕南漢也未老退歸一日忽遁去莫知所在子孫􅀞像事之凢三十三年乃歸坐阼階上呼家人其子不在孫出見之索筆書壁上云一别人間歲月多歸來人事已銷磨惟有門前鑑池水春風不改舊時波投筆而去不可留子歸問其狀貌云甚似影堂中人也連州相傳如此其後頗有禄仕者艾子病􅀬稍昏夣中神㳺隂府見閻王升殿治事有數􅀑招一人至一吏前白曰此人在世惟務持人隂事思扵財物雖無過者必巧造端以誘䧟之然後􅎥抉准法合以五百億萬斤柴扵鑊湯中煑之王曰可令赴獄有一牛頭捽執之而去其人􅀻謂牛頭曰君何人曰吾鑊湯獄主獄之事皆吾主之其人又曰旣爲獄王固首主也而豹皮襖􅀂是弊􅀑曰冥中無此皮若陽人焚化方得吾名不􅂋扵人間故無焚貺者其人又曰某之外氏獵徒也家常有此皮􅀂􅂪主見憫少减柴數得還即焚化十皮為獄王作裩其􅀑喜曰爲女去億萬二字以敗其徒則汝得速還兼免沸煑之苦二三人扵是又入鑊煑之其牛頭者時來相問小􅀑見如此必欲庇之亦不敢令火熾遂報柴足旣出鑊束帶將行牛頭曰忽忘皮也其人乃明顧曰有詩一首奉贈云牛頭獄主要知聞􅁠在閻王不在君减刻官柴􅀹自可更求枉法豹皮裩牛頭大怒义入鑊湯益薪煑之艾子旣寤語扵徒曰須信口是禍之門並百斛明珠周祖起扵鄴范魯公遁迹民間執􅁓扇偶題云大􅀬去酷吏清風來故人坐茶肆中忽一形貌怪陋者前揖之曰相公相公勿慮勿慮律其扇曰輕重無准吏得舞文何止大􅀬􅁘公當深究獄弊持扇急去後一日扵祅廟後門􅀑手中持其扇乃茶肆中見者未㡬周祖果得公扵民間遂大用憶陋􅀑之言首議刑典䟽曰先王所恤莫重扵刑今䌓苛失中輕重無准民罹横刑吏得舞法周祖􅀙其言命公與知雜張湜等刋定五年書成目曰刑統玉壺清話詩話總􅀛四十七百家詩話緫􅀛後集卷之四十七䴡人門銅雀伎古人賦詠多矣鄭惜云舞餘依帳泣􅁔罷向陵㸔張正見云雲慘當􅁔曰松吟欲舞風賈至云靈几臨朝奠空􅇃卷夜衣王勃云妾本深宫妓曽城閉九重君王􅂬愛盡􅁔舞爲誰容沈佺期云昔年分食鼎今日望陵䑓一旦雄圗盡千秋遺令開皆佳句也羅􅀮云強􅁔強舞竟難勝花落花開淚滿繒秪合當年伴君死免教憔悴望西陵似比諸人差有意也魏武隂賊險狠盗有神器實竊英雄之名而臨死之日乃遺令諸子不􅁯於􅁙骨之地又使伎人㸔銅雀䑓上以􅁔舞其魂亦可謂愚矣東坡云操以病亡子孫滿前而咿嚶涕泣留連妾媍分香賣履區處衣物平生姦偽死見真性真名言㢤􅁑常之人君不􅀎制􅁒於媍人以至溺惑廢政未有不亂亡者桀奔南巢􅍔階妺喜魯威亾國惑始齊姜妲巳褒娰以至楊妃張孔之徒皆是也呉於西施王之耽惑不减於諸后一夕越兵至而王不知也鄭毅夫詩云十重越甲夜城圍燕罷君王醉不知若論破呉功苐一黄金只合鑄西施謂非西施則呉不亡呉不亡則安得以黄金而鑄之容㢤東坡范蠡詩云誰將暗矢射呉児長􅀏申公爲夏􅁎却遣姑蘇有麋鹿更令夫子得西施言楚申公欲弱楚而強呉者以夏􅁎之故曾不如范蠡滅吴覇越而坐得西施也同上韓康公上元召從官数人出家妓侍飲其專寵者曰魯生偶中蜂螫少頃持扇就東坡乞詩詩中有魚吹細浪􅁔摇日舞罷花枝􅉕入懐之句上句記姓下句記事侯鯖録東坡嘗飲一豪士家岀侍姫十餘人皆有姿伎其間有一善舞者名媚児容質頗䴡而軀幹甚偉豪士特所寵愛命乞詩扵公公戯爲四句云舞䄂􅄶􅝆影揺千尺龍蛇動􅁔喉宛轉聲撼半天風雨寒妓頳然不悦而去迍齋閑覧王晋卿都尉既䘮蜀囯貶均州姫侍尽逐有一號者號囀春鶯色藝两絶平居属念不知流落何許後二年内徙汝隂道過許昌市傍小楼聞泣声甚悲晋卿異之問乃囀春鶯也恨不可復得因賦一聮佳人已属沙吒利義士今無古押衙晋卿每話此事客有足成章者晋卿覧之尤愴然其詞曰幾年流落向天洭萬里㱕耒两鬂葉翠䄂香殘空浥泪青楼雲渺定誰家佳人已属沙吒利義士今無古押衙囬首音塵两沉絶春鶯休囀沁園花西清詩話蔡持正謫新州侍兒名琵琶嘗飬一鸚鵡持正毎呼琵琶即和一響板鸚鵡傳言呼之琵琶卒後悮觸響猶傳言呼之持正感傷成疾不起嘗為詩云鸚鵡言猶在琵琶事已非傷心瘴江水同渡不同㱕苕溪漁􅀮曰持正守安州夏日登車蓋作十絶句為吴処厚箋注得罪謫新州其間一絶云􅁓屏石桃竹方牀手倦抛書午夣長睡起莞然成獨􅀏数聲漁􅅇在滄浪殊有閑適自在之意侯鯖錄囬紋两讀必徧獨此五詩不然其一曰紅窓小泣低聲怨永日春寒斗帳空中酒落花飛絮乱曉鶯啼破梦匆匆其二曰同誰更􅀝窓綉落日紅扉小院深東復西流分水嶺恨兼愁續断弦琹其三曰寒信凬飄霜葉黄冷灯殘月照空牀看君寄憶囬紋錦字字萦愁冩断腸其四曰前堂􅀞燭殘凝泪半夜清香舊染衾烟鎻竹枝寒􅀫鳥水沉天色霽横叅其五曰娥翠歛時聞燕語泪珠弹処見鴻㱕多情妾似凬花乱薄倖郎如露草希漫叟詩話曽子宣夫人魏氏作虞美人草行云鴻門玉斗紛如雪十萬􅑙兵夜流血咸陽宫殿三月紅覇業已随烟烬㓕刚強必死仁義王隂陵失路非天亡英雄本學萬人敵何用屑屑悲紅粧三軍散尽旌旗倒玉帳佳人坐中老香魂夜逐劒光飛青血化爲原上草芳心寂寞􅀉寒枝舊曲聞耒似歛眉哀怨徘􅆦愁不語恰如愁听楚􅁔時滔滔逝水流今古漢楚㒷亡两丘土當年遺事乆成空慷慨墫前爲舞誰苕溪漁􅀮曰此詩乃許彦囯表民作表民合肥人余昔随侍先君守合肥嘗借得渠家集集中有此詩又合肥老儒郭全羙乃表民席下舊諸生云親見渠作此詩今曽端伯編選亦列此詩扵表民詩中遂與余所見所聞合覧者可以無疑亦知冷齋之妄也冷齋夜語費氏蜀之青城人以才色入蜀宫後主嬖之號花蕊夫人效王建作宫詞百首囯亡入􅇱後宫太祖聞之召使陳詩誦其囯亡詩云君王城上竪􅑙旗妾在深宫那得知十四萬人齊觧甲寕無一个是男児祖恱蓋蜀兵十四萬而王師􅅻数萬爾後山詩話㒒七􅀊時見眉州老尼姓宋忘其名年九十餘自言嘗随其師入蜀主孟昶宫中一日大􅀬蜀主與花蕊夫人夜起避暑摩訶池上作一詞宋具能記之今四十年耒巳死矣人無知此詞者独記其首两句云氷肌玉骨自清凉無汗暇日㝷味豈洞仙􅁔令乎乃為足之云苕溪漁􅀮曰漫叟詩話所載本事曲云錢唐一老尼能誦後主詩首章两句與東坡洞仙歌序全然不同當以序為正也東坡洞仙􅁔序楊元素作本事曲記洞仙􅁔氷肌玉骨自清凉無汗水殿凨耒暗香滿繍簾開一􅀧明月窺人人未寢欹枕釵横鬂乱起耒携素手庭户無聲時見踈星渡河漢試問夜如何夜巳三更金波淡玉縄低轉細屈指西凬幾時耒又不道流年暗中偷換錢唐有一老尼能誦後主詩首章两句後人為足其意以填此詞余嘗見一士人誦全篇云氷肌玉骨清無汗水殿凨来暗香暖􅄕開明獨窺人欹枕釵横雲雲乱起耒瓊户時見踈星渡河漢屈指西凬幾時耒只恐流年暗中換漫叟詩話太和􅀄有為御史分務洛京者有妓善􅁔時太尉李逢吉留守求一見既不敢辭盛粧以徃李命與衆姫相見李姫四十餘􅒰皆出其下既入不復出頃之李亦辞以遂疾罷坐信􅀫耗絶但怨歎不能巳已為詩两篇投献明日李但含笑曰大好詩遂絶詩曰三山不見海沉沉豈有仙踪尚可㝷青鳥去時雲路断姮娥㱕去月宫深紗窓暗想春相憶書幌誰令夜獨吟料得此時天上月只應偏照两人心一篇亡苕溪漁􅀮曰余􅀚刘賓客外集有憶妓四首内有一首即前詩也其餘三首亦是前詩之意也古今詩話中旣不云御史姓名則此詩豈非夣得為之假手乎古今詩話何彼穠矣之詩羙王姫而作也周姫姓故皇女皆称姫如陳嬀楚芈齊姜之􅁼是也後世凢婦人皆称姫誤矣南朝人士皆謂姫人如䔥綸見姫人詩所謂狂夫不妬妾随意還家刘孝綽詠姫人未出詩所謂帷開見釵影􅄕動聞釧声梁王僧孺為姫人怨詩所謂還君与妾扇㱕妾與君裘江捴為姫人怨服藥詩所謂妾家邯郸好輕薄持忿仙童一丸藥是也丹揚集後山詩話退之詩云長安衆冨児盤饌羅羶葷不能文字飲惟觧醉紅裙而老有二妓號絳桃栁枝故文昌張藉云為出二侍女合弹琵琶筝也又為李于志叙當世名貴服金石藥􅁒生而死者数軰著之石藏之地下豈為一世戒邪而竟以藥死故白樂天云退之服硫黃一病竟不痊也唐語林退之二侍妾一曰綘桃二曰栁枝皆能􅁔舞􅀄使王庭湊至壽陽驛絶句云凬光􅁒動别長安春半􅁁城特地寒不見園桃并巷栁馬頭惟有月團圓蓋􅀉意二姝逮㱕栁枝踰垣遁去家人追􅀗故鎮州􅀄㱕詩云别耒楊桞汀頭樹擺乱春凬只􅁒飛惟有小園桃李在留花不發待郎㱕自是專寵綘桃矣䂬溪百家詩話捴􅀛後集卷之四十七終
