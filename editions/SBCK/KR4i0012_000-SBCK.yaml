  text: 集一百家詩話總目
  hash: sha256:a7daa450ae97975762c9c1285c05721e8b02d27610b5a9f5f95a82a1fb5b0c34
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_000-1a}
body:
  text: 陶岳零陵總記畢田湘中故事曹衍湖湘故事韓魏公别錄趙璘因話錄李康靖見聞錄呉感大定錄捜神秘覧胡戢泗上傳金華瀛洲錄盧氏雜說南部新書唐李石别傳江鄰幾雜誌劉約拾遺明皇雜記雍洛靈異記盧􅅛杼情鄭棨開元傳信記洛陽縉紳舊聞大業拾遺記王幾通勉志廣卓異記西安虞介唐宋遺史歐陽靖掇遺宋舎人春明退朝錄東觀奏事蔡寛夫詩史金陵語録張固幽閑鼓吹劉禹錫佳話御史䑓記錢思公逢辰録啓顔錄談藪國史雜記文瑩玉壺清話張靚雅言雜載王舉雅言系述劉忠叟樂府集錢公思金坡餘事世說野人閒話張鷟朝野僉載鑑誡錄洛陽舊聞閒居詩話范内翰東齋錄唐史拾遺柳公􅁠小􅀃舊聞有宋佳話劉斧翰府名談錢希白洞微志王子年拾遺記趙叔平見聞錄靈異錄沈汾續仙傳朱定國續歸田録博異志鄭工部南唐近事盧肇遺史郡閣雅談桂堂閑話曾龍圖詩話洛陽詩話楊妃外傳古今詩話劉貢父詩話敺陽公詩話玉堂閒話脞􅀃後集張君房脞說北夣􅃈言青􅃈後集龍衮江南野録李元文雲齋廣錄桂苑藂談周後人摭言􅁑稚川西京雜記范攄雲谿友議楊文公談􅁐孟棨本事詩文瑩湘山野録呉處厚青箱雜記沈存中筆談劉斧摭遺倦逰録太平廣記幽恠録青􅃈集異聞集百斛明珠王直方詩話遯齋閒覧玉局文雜誌紀詩大唐記志逸冷齋夜話䂬溪詩話集一百家詩話總目増修詩話總􅀛分門目録第一卷聖製忠義諷諭第二卷達理􅀶識㓜敏第三卷志氣知遇狂放第四卷詩進稱賞第五卷自薦投獻評論第六卷評論二第七卷評論三第八卷評論四第九卷評論五第十卷雅什上第十一卷雅什下苦吟第十二卷警句上第十三卷警句中第十四卷警句下第十五卷留題上第十六卷留題下宴逰第二十三卷寓情第二十四卷感事上第二十五卷感事下第二十六卷􅀉贈上第二十七卷書事第二十八卷故事詩病第二十九卷詩累正訛第三十卷道僧第三十一卷詩䜟上第三十二卷詩䜟下第三十三卷紀夢上第三十四卷紀夢下第三十五卷譏誚上第三十六卷譏誚中第三十七卷譏誚下第三十八卷恢諧上第三十九卷恢諧下第四十卷樂府第四十一卷送别第四十二卷怨嗟第四十三卷傷悼第四十四卷􅀮逸神仙上第四十五卷神仙下第四十六卷藝術俳優竒恠上第四十七卷竒恠下􅀑神上第四十八卷􅀑神下佞媚琢句增修詩話總􅀛分門目録終詩話總􅀛叙詩昉􅀜雎詩話即稗官野史之􅁼自王迹熄而詩䆮微變至扵漢魏極扵盛唐其遺韻餘音直􅀅與宇宙間山川為流峙也漢藝文志註稗為細糲王者􅁒知閭巷細􅃈之言故立稗官􅀜繋殆亦不小淮伯王月􅁏嗜古學文其志慕東平河間而􅁒相揖遜于異代者宫睱廼取阮子詩話總􅀛延庠生程珖校讐之命工刋布致言于予以叙諸首予披而閲之詩之有話言有繇也詩話以總􅀛名言有統也􅀛千年五聚問無不知賀知章昔以爲殷踐猷慱學之號阮子之詩話其殆謂慱而足以資問者歟阮子舊集頗􅇎王條而約之彚次有義棼結可㝷首􅀚其聖製等篇破魯恭之壁科斗錯陳也次􅀚其咏物等目浴玉池之日百寳争出也又次􅀚其藝術紀實諸例發驪山之塜而彛鼎纍纍也終而觀其䜟夢􅀑神諸簡燃牛渚之犀而幽恠又無以遯其形也夫殷之愽以韻學而成名阮之愽盖勤諸詩與緒言而有得者王約其慱合二家而一之又不可以徒事扵慱語者其何以見之哉見之于凢例矣是則可嘉也是爲序賜進士第中憲大夫奉勅整􅅚山東海道副使郴陽李易書詩話總􅀛序白川子􅀒譴嬰疾分牧芝城居常怏怏弗樂也廼月牎殿下時時遣貴侍覘之間授二册曰是爲詩話總􅀛是爲宋阮一閲所編是爲今程子珖所校是將夀諸文梓期與好事者共先生能無言乎余拜而受之枕次快閲曰佳哉月牎其披寳藏而璆琳琅玕畢集吾目邪其展武庫而戈矛劒㦸震駭我心邪其過陶朱猗頓之室百物充溢足以拯急而切需者邪是冨且竒也夫詩胡爲者也宣欝逹情擷菁登碩者也夫話胡爲者也摘英指纇標理斥迷者也考諸三代而下春秋列國以上載諸􅀴雜出乎詞宗孺婦之口可徴巳嗣是以來作者非一家不􅀎指而数也議者非一喙不􅀎群而聴也譬之鳯毛豹斑非不文彩炫耀望者興歎有遺恨焉盖未􅀗總其􅀛耳今月牎廼能逸塵逺覧訂古凖今與二三愽雅君子㝠羅約採彚爲全書書有門示别也有纇示同也有序示次也􅀂有勸有規有􅁣有慕有願學之意則皆置之不言之表而亦昭昭然灼灼然無言而無弗言孔子曰其義則某竊取之矣佳哉月牎之用心也昔河間以禮樂名東平以樂善著咸垂光汗青馨香帝胄至求述作槩乎未之前聞月牎孝友不凢文藝雋拔而又啫好清絶如此方之二王得無過乎是書也我國家宗室之盛皇上風化之􅂭賢士夫裁正之畧並可仰見刻之冝書凢九十八卷月牎爲我高皇六世孫程珖修學楚楚郡慱弟子員番陽人嘉靖甲辰孟秋奉直大夫江西饒州府同知前進士南京刑部􅀰中海塩白川張嘉秀撰百家詩話總􅀛後集目録後山詩話蔡寛夫詩話金坡遺亊石林詩話黄常明詩話藝􅁐雌黄詩話雋永東莱文集復齋録歸田録文正公目録韻語陽秋東軒筆録緗素雜記􅁑常之詩話西清詩話桐江詩話丹陽集閩川名士傳聞見録談􅁐高齋詩話胡氏詩話許彦周詩話擊壌集法蔵碎金上蔡語録横渠集亀山語録南山文集晦庵詩集吕氏家墪記易學辯惑漫叟詩話學林新編侯鯖録雪浪齋日記王直方詩話宋子京筆記杜詩正異詩眼山谷集東坡集言行録渑水燕談正䝉書迂叟詩話吕氏童䝉訓冷齋夜話􅀮居詩話三山語録臨川集揮塵録林和集語録倦游雜録陳輔之詩話遯齋閑覽文昌雜録三山老人語録東齋記事唐子西記南㳺集劉禹錫嘉話東皋雜録夷堅志上庠録古今詞話夷白堂小集侍兒小名録阮户部詩髙道傳異聞録龍川畧志囬仙録今是堂手録東􅀚餘論太平廣記昭君圖叙雲齋廣録江角録植萱録洪駒父詩話僧寳傳傳燈録山谷王梵志麈史詩説集古録記雪竇語録陳了齋集唐語林青􅃈集􅀉齋録四六談麈金石録樂府觧題元城語録程氏遺書淮海集六朝事迹百家詩話緫亀後集目録百家詩話總􅀛後集門􅁼聖製門一卷賡􅁔門一卷御燕門一卷榮遇門一卷忠義門二卷孝義門三卷孝義門四卷宗族門四卷仁愛門五卷友義門五卷㓜敏門五卷志氣門五卷述志門五卷求意門五卷諷諭門六卷逹理門六卷逹理門七卷傳識門八卷狂放門九卷􅁛賞門九卷􅁛薦門九卷􅄬獻門九卷評論門九卷評論門十卷評論門十一卷評論門十二卷評論門十三卷評史門十四卷評史門十五卷評史門十六卷評史門十七卷辯疑門十八卷正訛門十八卷􅀮逸門十九卷恬退門十九卷警句門二十卷句法門二十卷苦吟門二十卷留題門二十一卷寄贈門二十二卷故事門二十一卷書事門二十一卷譏誚門三十七卷箴規門三十八卷詼諧門神仙門三十九卷神仙門四十卷􅁔詠門􅀑神門四十二卷釋氏門四十三卷釋氏門四十四卷釋氏門四十五卷釋氏門四十六卷䴡人門四十七卷䴡人門四十八卷飲食門四十九卷器用門技藝門五十卷拾遺門百家詩話總􅀛後集門􅀋
