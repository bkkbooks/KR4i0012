front:
  text: 增修詩話總􅀛􅃃之二十一
  hash: sha256:0f8f9ba43f13f2ba9b5a43de515bc55d9013a23d27c4333eee903d915b640b23
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_021-1a}
body:
  text: 詠物門下東坡橄㰖詩云紛紛青子落紅塩氣味森森苦且嚴待得㣲甘回齒頰巳輸崖􅁡十分甜范景仁言橄㰖木高大難采以塩擦木身則其實自落􅀁以有落紅塩之語南人誇橄㰖河東人誇􅀥直方詩話李公擇種竹舘中語同舎曰後人指此竹必云李文正􅀁植貢父􅀏曰文正不獨繫筆亦知種竹􅁘時有筆土李文正故云后到貢父西省種竹東坡有詩云舊徳終呼名字外後生誰續􅀏談餘謂此也又一本云尔後貢父種竹坡有詩云舊徳言忘乆新材得再培亭亭思婦石下閱㡬人代蕩子長不歸山椒乆相待㣲雲䕃髮彩􅀄月輝蛾黛秋雨叠苔衣春風舞羅帶宛然姑射姿矯首塵冥外陳迹遂云窮佳期從莫再脫如魯秋氏妄結桑下愛玉質委泥沙悠悠復安在此賀方回作望夫石詩也交㳺間無不愛者余謂田承君云此詩可以見方回得失其所得者漸磨之功􅀁失者太粘着皮骨耳承君以為然楊皤字公濟爲蓴菜詩云休􅀃江東春水寒到來且覔鑑湖船鶴生嫩頂浮新紫龍脫香髯帶舊涎玉割鱸魚迎刄滑香炊稲飯落匙圓歸期不待秋風起漉酒調􅃵任我年時人以為讀其詩不必食蓴羮然後知其味余以爲可以言詠物未可以語詩耳陳君節字明信言錬句不如錬韻余以爲􅀂只覔好韻則失於首尾不相貫穿參寥云東坡在徐州日嘗爲秦少游置酒少㳺飲罷擁一官妓從參寥書其裙帶云􅀉語巫山窈窕娘好將閒夣惱㐮王禪心巳作沾泥絮不逐春風上下狂並同前踘蹴惟柳三復能之丁晋公亦好焉晋公詩曰背裝花屈􅂰白打大㢘斯進前行两歩蹺去立多時古今詩話郭希聲􅁓牕詩曰偏宜酥壁稱閒情白似溪雲薄似氷不是野人嫌月色免教風弄讀書燈聞蛩詩曰愁殺離家未逹人一聲聲到枕前聞苦吟莫入朱門裏滿耳笙歌不􅃪君青􅃈後集巴蜀三紀以來藝能之士精於書􅀞者衆矣沙門曇彧學李陽氷􅂐曇彧則神大師門人也道士張昭嗣效柳公權書昭嗣則傳直天師杜光庭門人也工部元員外昭嘏倣韓擇八分書昭嘏亦光庭門人僧暁巒攻張芝草書曉巒則歸夣弟子皆超其本而差其肩獨黄少鑑筌邉鸞崔竹䖏士􅅬昌祐擬梁廣花草野人張道􅀮張藻松石道􅀮不事論談不與人交徃不冠帶不拜跪人謂之猱頭相國李昊爲著名道􅀮常在綿竹山中李司議文才􅁇閻立本寫真書􅀞八人皆妙絶當代野人平生讀莊老之書有暇則性好圖龍之真形興思忽至即􅀞百尺之狀縱意揮􅀞苟不稱意則􅂗抹之不啻千餘軀而巳飄飄然雲隂雨氣似蜿蜒之􅀔擲筆撫掌以為怡逸常以此為􅃴意之作亦曾撰集龍証筆訣三卷傳於家丁未年彭州倅鄭昭請圖真龍扵州城之西門太山府君之祠為民致雨於是與二道士數僕夫秉燭以􅀞使人槌皷噴笛掌祠者頓足起舞其夕三更風雨大沛柰何一時之戯亦濟農事有蔣貽恭留題詩曰世人空觧効丹青惟子通玄得墨靈應有􅀑神看筆下豈無風雨助成形威疑噴浪歸滄海􅀔欲拿雲上杳冥静閉緑堂深夜後曉來簾幕似聞腥野人閒語僧齊巳松詩云雷電不敢伐靈􅀔蠹萬端􅍪依乾節死蛇人朽根蟠影浸僧禪湿風吹鶴夣寒㝷常風雨夜疑有􅀑神看小松云發地􅂊􅄹尺蟠根巳有靈嚴霜百艸死深院一株青後夜蕭騷動空堦蟋蟀聴誰於千歲外吟􅀝老龍形續本事詩白􅀓柳詩二首云青青一􅀣傷心色會入㡬人離恨中為道都門多送别長條折盡减春風又一􅀣春風萬萬枝嫩扵金色軟扵絲永豐西角荒烟裏盡日無人屬阿誰又顧雲詩云㶚岸晴來送别頻相偎相􅀝不勝春自家飛絮猶無定争把長條絆得人唐宋詩云羅􅀮作續本事詩隂鏗石詩云天漢攴機罷仙人捧膞餘零陵舊是燕昆明本學魚還當榖城别自下解兵書羅鄴水詩云􅃞􅃞悠悠㡬泒分中浮短棹與鷗群遥天帶雨淹芳草玉洞飄花下白雲静稱一竿持處見急流􅀌舘覺來聞隋家柳色還堪恨東入長淮日又曛鄭谷云竹院松廊分數沠晴空清碧亦逶迤落花相逐向何處幽鷺獨來無限時洗鉢老僧臨岸乆釣魚閒客捲綸遲晚來一片連莎緑悔與滄浪有舊期韓喜云方員不定性空柔東注滄溟早晚休高截碧塘長耿耿逺飛青嶂更悠悠瀟湘月浸千年色夣澤燈含萬古愁别有嶺頭嗚咽䖏為君更作㫁腸流並同前唐高相國崇文本薊門將校討劉闢有功授西川節度一旦雪下諸從事吟賞有詩渤海鄙言多呼人為􅐴児此日筵上謂賔客曰某雖武夫亦有一詩乃口札云崇文崇武不崇文提戈出塞􅃅將軍那箇􅐴児射落鴈白毛空裏亂紛紛其詩着題皆謂北齊敖曹之比太尉駢即其曾孫也鎮蜀日以蠻蜒侵􅁀乃築羅城四十里朝廷雖加恩賞亦疑其固護或一日奏樂聞樂聲知有改移乃題風筝􅀉意曰夜静絃聲響碧空宫商信任徃來風依稀似曲纔堪聽又􅀍風吹别調中旬日果移鎮渚宫北夣􅃈言馮㳙分符眉州不得之任跼蹐於陳田之間覊愁六年徒歩湘湖著懷秦賦有南冠梁川􅁔詩集皆傷蹭蹬也有蜀駝引其要云自古皆傳蜀道難尔何能過㧞蛇山忽驚登得雞翁磧又恐碍着鹿頭關昻藏大歩􅁞叢國曲頸㣲伸高九尺卓女窺窓莫我知嚴仙㨿案何曾識題攴機石云不隨俗物皆成土只待良時却􅀘天苦雨行云釜魚化作池中物木􅂂浮為天際船皆惜已之不遇也蜀城拆體之際㡬至殍殕因投鬻米家活有詩云取水􅀰中何日了破柴員外㡬時休早知蜀地區娵與乃訓如此与也悔不長安大比丘即収足大坐也同前徐仲雅題合􅂬牡丹云平分造化㕠包去拆破春風两面開湘湖故事蔣維東字孟陽零陵人旅中書懐云未有一夜夣不歸千里家落花云流水從將去春風解送來零陵總記東華觀在邵州城下江岸俗謂之水北觀有松偃亞數枝凡八面上有一枝中折搭在半􅀣間復生垂下掃壇逰人以手扳而撼之則千萬枝皆動覇國時天䇿府學士徐東野坐事謪居扵郡見其魁異賞翫無巳因為詩有序序略云揺一枝則萬枝動看一面則八面同白犬出其根青羊入其腹漢髙祖琥珀枕虚真君茯苓人疑其孕也詩云半巳化為石有靈通碧湘生逢堯雨露老值漢風霜月滳蟾心水龍遺胸骨香鹿於毫末后曾見幾興亡裴􅀃鷺鷥云却為分明極翻令所得遲雍陶云立當青艸人初見行近白蓮魚未知同前又古今詩話所載馮明道舉此詩不知其為鷺鷥也鸕鷀色黒而頭長能沒水捕魚其疾如飛栖􅀫之處其下雖水深魚多未嘗犯諺云鸕鷀不打脚下塘杜荀鶴詩云深水有魚㗸得出看來却是鷺鷥饑鸜鵒居人多飬之五月五日去其舌尖則能語聲􅀹清越雖鸚鵡不能過也僧虚中有詩云菖蒲花不艶鸜鵒性多靈相思樹其狀􅀹佳子員而紅故老云昔有人北没於邊其妻追思之泣於􅀣下而卒因號相思􅀣黄損鷓鴣詩云而今世上多離别莫向相思樹下啼盖採其意也柘􅀣多叢生幹踈而直葉豐而厚春􅁞食之其絲以冷水繰之謂之冷水絲可以瑟絃盖檿絲之􅀋蔣宻詠桑柘詩云綺羅因此木桃李謾同時楊桐葉細冬青臨水生者􅀹茂居人遇寒食採其葉染飯色青而有光食之資陽氣謂之楊桐飯道家所謂青飢飯鄭畋二十八􅀫詩云員明青􅏇飯光潤碧霞漿謂此櫟􅀣多生岡阜之上大則偃亞小則聳􅄮踈曠而性直伐為薪鍜為炭其力倍扵常木王正詩云未可輕樗櫟􅀹能濟雪霜木蘭花枝葉俱踈花即裏白表紫或有四季開者生扵深山者􅀹大可以爲船陸􅀛􅂪木蘭花詩云曾向木蘭船上過不知船是此花身古今詩話載全篇謂是李義山作映山紅生於山坡欹側之地高不過五七尺花繁而紅輝映山林開時杜鵑始啼又名杜䳌花成幹詩云杜鵑花與鳥怨艶两何賖疑是口中血滳成枝上花一聲寒食夜數朶野僧家謝豹出不出日遲遲又斜並同前羅漢絛後洞有草蔓結如帶長丈餘附木而生相傳謂之羅漢絛畢田詩云五百移栖絶洞深空留轍跡杳難㝷緑絲絛帶何人施長到春來掛滿林湘中故事舒王與薛處士碁賭梅花詩輸一首曰華髪㝷春始見梅一枝臨路雪培堆鳯城南北他年憶杳杳難㝷驛使来與俞秀老至報寜王假寐秀老私跨王驢謁寳覺禪師有頃秀老至王曰為士子敢盗跨吾驢秀老願自贖其罪王曰罰松聲詩一首秀老立就詞極佳人忘之余􅀘曰萬壑揺蒼烟百灘度流水下有跨驢人瀟瀟吹醉耳冷齋夜話前軰花詩多用羙女比狀如云􅀂教觧語應傾國任是無情也動人俗㢤山谷酴醿詩曰露􅊜何􅀰試湯餅日烘荀令炷爐香乃是以丈夫比之􅀂出􅀋而吾叔彭淵材作海棠詩又不然曰雨過温泉浴妃子露濃湯餅試何􅀰􅀹工也曾子宣夫人魏氏作虞羙人草行云鴻門刀斗紛如雪十萬降兵夜流血咸陽春殿三月紅覇業巳隨烟燼㓕剛強必死仁義王隂陵失道非天亡英雄本學萬人敵何用屑屑悲紅妝三軍散盡旌旗倒玉帳佳人坐中老香魂夜逐劒光飛青血化為原上草芳菲寂寞􅀉寒枝舊曲聞來似歛眉哀語徘徊愁不語恰如初聴楚歌時㴞滔逝水流今古漢楚興亡两丘土當時遺事乆成空慷􅁣樽前為誰舞舒王在鍾山有道士來謁因與碁輙作數語曰彼亦不敢先此亦不敢先惟其不敢先是以無􅀁争惟其無􅀁争故能入於不死不生舒王曰此特碁􅀮語東坡詩曰客來茶罷渾無事盧橘楊梅尚帶酸張嘉甫曰盧橘何種果也曰枇杷是矣事見相如賦嘉甫曰盧橘夏熟黄柑橙楱枇杷橪柿亭柰厚朴盧橘果枇杷不應重用應劭注曰伊尹書曰箕山之東青鳥之所盧橘常夏熟不㨿之而何也坡􅀏曰不􅁒爾余游儋耳見􅀺氏出東坡别海北詩曰我本儋耳民􅀉生西蜀州忽然跨海去譬如亊逺逰平生生死夣三者無劣優知君不再見欲去且少留又登望海亭柱間有擘窠大字曰貪看白鳥横秋浦不覺青林沒暮潮又謁姜唐佐見其毋余問識蘇公乎曰然無柰好吟詩甞杖而至有包燈心􅁓公以手拭開書滿􅁓余索讀之醉墨欹傾曰張睢陽生犹罵賊嚼齒穿齦顔平原死不忘君握拳透爪余至瓊州有長短句賦燈蛾曰宻燭花猶清夜䦨粉衣香翅遶團圞人皆認假為真實蛾豈將燈作火看方嘆息為􅃒攔也知愛處實難􅂸忽然性命隨烟㷔始覺從前􅀍眼瞞老杜詩曰笋根稚子無人見沙上鳬雛傍母眠世不解稚子無人見何等語唐人食筍詩曰稚子脫錦綳駢頭玉香滑則稚子為筍明矣賛寕雜記曰竹根有䑕大如猫色􅀋竹名竹豚亦名稚子余問韓子蒼子蒼曰筍為稚子老杜之意不用食筍詩亦可老杜北征詩曰惟昔艱難初事與前世别不聞夏商衰中自誅褒妲意者明皇鑑夏商之敗畏天悔過賜妃子死也而劉禹錫馬嵬詩曰官軍誅佞幸天子捨妖􅁎群吏伏門屏貴人牽帝衣白樂天長恨􅁔曰六軍不發無柰何宛轉蛾眉馬前死乃官軍迫使殺妃子謌詠禄山叛逆耳孰謂劉白能詩㢤北征詩識君臣大體可貴也衡州花光仁老以墨冩梅花魯直嘆曰如嫩寒春暁行􅀌山籬落間但欠香耳余賦長短句曰碧瓦籠晴香霧遶呵手西偏小駐聞啼鳥風度女墻吹語􅀏南枝破臘應開了道骨不凡江瘴曉春色通靈醫得花重小抱醸寒春杳杳一聲􅀞角光殘照又曰入骨風流國色透塵種性真香為誰風流鬂啼粧半􅀣水村春暗雪壓枝低籬落月高影動池塘高情數筆􅀉㣲茫小寝初開霧帳並同前増修詩話總􅀛卷之二十一百家詩話總􅀛後集卷之二十一留題門澧陽道旁有甘泉寺因䒹公丁謂曽㽞行記従而題詠者甚衆碑牌滿屋孫諷有平仲酌泉曽頓轡謂之礼佛遂南行髙㙜下瞰炎荒路轉使髙僧薄寵荣人獨傳道余獨恨其語無別自古以直道見黜者多矣豈皆貪寵荣者㢤又有人云此泉不洗千年恨留與行人戒覆車害理􅀹甚莱公之事亦例為覆車乎因過之偶為数韵其間有云已慿静止鑑忠精更遣清冷洗讒喙盖指二公也䂬溪黄州麻城縣界有萬松亭連日行清隂中其舘亭亦可爱􅃴當関山路徃來留題無数東坡傷耒者不嗣其意嘗有詩云十年栽種百年規好徳􅂇人無我儀又云爲問㡬株能合抱殷勤記取角弓詩中嘗徹碑有士題云舊韵無儀字蒼髯有恨聲不可録旁溪張祐喜逰山而多苦吟凢􅀁歴僧寺徃徃題咏如題僧壁云客地多逢酒僧房却厭花題萬道人禅房云殘陽過逺水落葉滿踈鍾題金山寺云僧帰夜舡月龍出曉堂雲樹影中流見鍾聲两岸聞題􅀌山寺云不雨山長䦞無雲水自隂断橋荒蘚澁空院落花􅀷如杭之靈􅀮天竺􅂫之靈岩楞伽常之惠山善􅁠􅃳之􅅴露招􅀮皆有佳作李渉在岳陽嘗贈其詩曰岳陽西南湖上寺水閣松房遍文字新釘張生一首詩自余吟着皆無味信知僧房佛寺題其詩標榜者多矣葛常之温公治第洛中闢䦎曰獨樂其心􅁨樂未始不在天下也其自作記有云世有人肯同此樂必􅂯拜以献矣東坡賦詩云児童誦君實走卒知司馬盖名其得人心也又云撫掌咲先生年來學瘖啞疑未盡命名之意同上沈約命王筠作郊居十詠書扵壁不加篇題約云此詩指物程形無假題署老杜贈李潮八分􅁔云吾甥李潮下筆親開元巳來数八分潮也奄有二子成三人何退之招􅀭之之罘南山來文字得我驚我令之罘帰失得栢與馬之罘別我去計出栢馬下我自之罘帰入門思而悲之罘别我去能不思我為作詩招之罘晨夕抱飢渇嘗戯謂此二詩真不湏題署也黄常明子羙詩誅茅初一畆廣地方連延敢謀􅁟木䴡自斍面势堅􅀴营上元初断手宝􅀿年又題衡山縣斈堂云旄頭彗紫㣲無復爼豆事扵乎巳十年儒服敝扵地衡山雖小邑首唱恢大義講堂非􅇮造大屋加􅂗塈下可容百人墻隅亦深􅃉林木在庭户宻榦叠青翠有井朱夏時轆轤凍堦戺采詩倦跋渉載筆尚可記豈不是草堂縣學紀李翺皇甫湜集中皆無詩世傳翶有縣君好塼渠一詩并傳燈録載荅藥山一偈湜秪有浯溪留題一篇而已許彦周詩話云牧之題桃花夫人廟詩細腰宫􅂻露桃新脉脉無言度㡬春至竟息亡縁底事可憐金谷墜楼人僕嘗謂此詩為二十八字史論苕溪漁􅀮曰牧之扵題詠好異扵人如赤壁云東風不與周郎便銅雀春􅀷鎖二喬題啇山四皓廟云南軍不􅃝左邉䄂四老安劉是㓕劉皆反􅀃其事至題烏江亭則好異而畔扵理詩云勝敗兵家事不期包羞忍耻是男児江東子弟多才俊卷􅁟重来未可知項氏以八千人渡江敗亡之餘無一還者其失人心為甚誰肯復附之其不能卷土重來决矣許彦周詩話云牧之作赤璧詩折㦸沉砂鐡未消自将磨洗騐前朝東風不與周郎便銅雀春􅀷鎻二喬意謂赤璧不能縦火即為曹公奪二喬置之銅雀􅄗上也孫氏覇業系此一戰杜禝存亡生靈􅂗炭都不問只恐没了二喬可見措大不識好􅁖南唐書云韓熈載自江南奉使中原為感懐詩題于館壁云㒒本江北人今作江南客􅂯去江北逰舉目無相識秋風吹我寒秋月為誰白不如帰去來江南有人憶苕溪漁􅀮曰余家有韓熈載家讌啚啚中題此詩后四句嘗以問相識間云是古樂府今􅀚此書方知其悞也苕溪漁􅀮曰題呉江三賢堂内陸􅀛䝉詩云千首文章二頃田囊未有一錢㸔却因飬得能言鴨驚破王孫金弹丸談苑云陸􅀛䝉居笠浲有内飬自長安使杭州舟出舎下弹其一緑頭鴨􅀛䝉􅑈􅀙舎出大呼曰此緑頭有異善人言将献天子今持此死鴨以詣官内飬少長宫禁信然厚以金帛遺之因徐問􅀛䝉曰此鴨何言􅀛䝉曰常自呼其名逰道􅂣山何山詩云白水田頭問行路小溪􅀷處是何山髙人讀書夜逹旦至今山鶴鳴夜半汪彦章何山何氏書堂記云寺有何氏書堂圖記相承以何氏為晋何楷楷嘗讀書此山後為呉㒷太守以其居為寺而名其山寄贈門子羙詩逺行無自内热比何如􅀉旻云舊来好事今能否老去新詩誰與傳岑參云喬生作尉别耒乆因君為問平生否魏君校理復何如前月人來不得書夫子素多疾别來未得書北庭苦寒地體内今寒如樂天􅀉夣得云病後能吟否秋來曽醉無退之贈崔立之云長女當人事誰􅂇出􅍤縭諸男皆秀爽㡬能守家規亦皆書一通也張均張均兄弟承襲父寵致位􅃊近皆自􅀒文材覬覦端揆明皇􅁒相均而抑扵李林甫􅁒相垍而奪扵楊囯忠自此各懷􅔵望安禄山盗國垍相禄山而均亦受偽命粛宗反正兄弟各論死非房琯力救豈能免乎老杜贈均詩云通籍踰青􅃈亨衢照紫􅅺靈虬􅀓夕箭帰馬散霜蹄言均爲中書舎人刑部尚書時也贈垍詩云翰林逼華盖鯨力破滄溟天上張公子宫中漢客星言垍尚寕親公主禁中置宅時也二人㤙寵烜赫如是則報國當如何而乃斁乱天理下比逆賊反噬其主夫豈人􅁼也㢤黄常明杜甫累不第天寳十三載明皇朝献太清宫饗廟及郊甫奏賦三篇帝竒之使待制集賢院命宰相試文章故有贈集賢崔于二學士詩云昭代将垂白途窮乃呌閽氣冲新象表詞感帝王尊天老書題目春官騐討論􅀝風遺鴨路随水到龍門舊注陳希烈􅅊見素爲宰相而崔囯輔于休烈者皆集賢院學士也故末句云謬􅁛三賦在難述二公㤙可謂不忘扵藻鑑之重者矣按唐史是歳陳希烈爲相至八月見素代之而甫集有上見素詩云持衡􅇔藻鑑听􅂂上星辰則甫之文乃爲見素所賞非希烈也同上牧之贈阿冝一日讀十􅁓一月讀十箱古人讀書以􅁓計范雲就􅀽叔明讀毛詩日誦九􅁓又􅀽俊家貧無書每􅀙人假借必皆抄冩自課日五十􅁓爲計䂬溪故事門余嘗論李廣以􅀻憾殺㶚陵尉􅄶忮險刻决非長者􅀁以不侯非直殺降之讉也因􅀚坡云明年定起故將軍未肯先誅㶚陵尉恐亦寓此意史傳襲稱兄弟為友于故淵明詩云􅂯喜見友于子羙云友于皆挺㧞又山鳥山花吾友于南史到荩從武帝登北頋楼賦詩荩受詔便就上以示其祖漑云荩定是才子畨恐卿􅀙來文章假手于荩後每和御詩上輙手詔戯漑曰得無貽厥之力乎退之玉川詩云誰謂貽厥無基址二事正可對也䂬溪坡云賔鴻社燕巧相違月令來賔事常疑人未曽用及及􅀚夣得秋江晚泊云莫霞千萬状賔鴻次第飛頋况云安得凌風翰粛粛賔天京社別浦鴈賔秋同上東坡㳺金山詩云江山如此不帰山江山見怪驚我頑我謝江神豈得巳有田不帰如江水盖與江神指水為盟耳句中不言盟誓者乃用子犯事指則誓在其中不必詛神血口然後謂之盟也送程六表弟云浮江泝蜀有成言江水在此吾不食黄常明老杜復見諸山得銀甕注引禮記山出噐車注盖瑞􅀿圖曰王者宴不及醉刑罸中人不為非則銀甕出昌􅀺我有􅀟飲醆其銀得朱提見漢志朱提銀八两為一流注朱提属揵為乃邑名也䂬溪樂天以長慶二年自中書舎人為杭州刺史冬十月至治時仍服緋故逰㤙徳寺詩序云俯視朱紱仰睇白雲有愧扵心及難自歎詩云實事漸銷虚事在銀魚金帶遶腰光戊申咏懷云紫泥丹筆皆􅀴手赤紱金章盡到身以今􅀚之金帶不􅀿用銀魚而金章不應用赤紱人皆以為疑而不知唐制與今不同也按唐制紫為三品之服緋為四品之服淺緋為五品之服各服金帶又制衣紫者魚袋以金餙衣緋者魚袋以銀餙樂天時為五品淺緋金帶佩銀魚冝矣劉長卿有􅀽郎中喜章服詩云手詔來筵上腰金向粉闈勲名傳舊閣蹈舞著新衣即中亦是五品故其身章與樂天同葛常之書事門近世作文者多以紫荷囊作侍􅀙事用如宋景文詩所謂荣􅀚􅋍麟族賦筆􅂇荷􅌩之􅁼襲而用者非一而不知其誤也按晋書輿服志書文武百官皆有囊綬八座尚書則荷紫以生紫為祫􅌩綴之服外加扵左肩則所謂荷紫者非芰荷之荷乃􅀒荷之荷也南史載周捨嘗問劉香曰着紫荷􅇸相傳云挈囊竟何所出香曰張安世傳云持槖筆事孝武帝数十年注曰槖􅌩也盖人徒見南史有着紫荷􅌩四字遂作一句讀之殊未知晋書紫荷之義也丹揚集王儉少年以宰為命嘗有詩云稷契康虞夏伊吕翼商周又字其子曰元成取仍世作相之義至其孫訓亦作詩云旦奭康世巧蕭曹佐甿俗大率追儉之意而為之後官亦至侍中同上杜云十暑岷山􅁑三霜楚户砧九鑚巴噀火三蛰楚祠雷其書歳月也新矣樂天云呉郡两囬逢九月越州四度見重陽去年八月十五夜曲江池畔杏園􅁁今年八月十五夜湓浦沙頭水舘前又前年九月餘杭郡呼賔命宴虚白堂去年九月到東洛今年九月來呉鄉两邉蓬鬂一時白三處菊花同色黄其質直叙事又自一格黄常明岑參送顔平原詩序云十二年春有詔􅀘尚書􅀰十数公爲郡守上親賦觴群公扵蓬萊仍賜以繒帛寵餞加等故參爲長篇述其事安禄山乱明皇曰河北二十四郡無一忠臣邪及聞平原固守乃曰朕不識真卿何如人所爲若此前吕宴賚真文具耳退之云偶然題作木居士便有無穷求福人可謂切中時病凢世之趋附􅁠势以啚身利者豈問其人賢否果䏻為囯為民㢤及其敗也相推入禍門而己聾俗無知謟􅀕非􅀑無異也䂬溪感事門三山語録登慈㤙寺塔詩􅏺天宝時事也山者人君之象秦山忽破碎則人君失道矣賢否自混淆而清濁不分故曰泾渭不可求天下無䋄紀文章而上都亦然故曰俯視但一氣焉􅀎辨皇州扵是思古之聖君不可得故曰囬首呌虞舜蒼梧雲正愁是時明皇方耽扵滛樂而不已故曰惜㢤瑶池飲日宴崑崙丘賢人君子多去朝廷故曰黄鵠去不息哀鳴何所􅄬惟小人貪􅀼禄位者在朝故曰君㸔随陽㕍各有稻梁謀同上西清詩話云退之􅀫龍宫灘詩云浩浩復湯湯灘聲抑更揚黄魯直曰退之才听水句􅀹見工謂浩浩湯湯抑更􅀭者非諳客裏夜卧飽聞聲安􅀎周旋妙處如此􅁘渙􅀮叢話東坡云南澗中詩秋氣集南澗獨逰亭午時囬風一䔥瑟林影乆參差始至若有得稍􅀷遂忘羈禽响幽谷寒藻舞淪漪去國魂巳逺懷人洎空垂􅀌生易為感失路少􅀁宜索寞竟何事徘􅆦只自知誰為後來者當與此心期柳儀曹詩􅁨中有樂樂中有􅁨盖絶妙古今矣然老杜云王侯與蝼蟻同盡随丘墟儀曹何􅁨之􅀷也蔡寛夫詩話云子厚之貶其􅁨悲憔悴之􅁒􅀤扵詩者特為酸楚閔巳傷志固君子􅀁不免然亦何至是卒以憤死未為逹理也樂天旣遇閑放浪物外若真能脫屣軒冕者然荣辱得失之際銖銖校量而自矜其逹每詩未嘗不着此意是豈真能忘之者㦲亦能勝之耳惟淵明則不然􅀚其貧士責子與其他所作當􅁨則􅁨遇喜則喜忽然􅁨樂两忘則随􅀁遇而皆適未嘗有择於其間􅀁謂超世遺物者要當如是而後可也􅀚三人之詩以意逆志人豈難定以是論賢不肖之實亦何可欺乎􅀮居詩話云樂天題海圖屏風詩略曰或者不量力謂兹鼇可求贔􅸻牽不動綸絶沉其鈎一鼇旣頓頷諸鰲齊掉頭噴風激飛亷鼓波怒陽秋遂使江漢水朝宗意亦休吾讀此詩感劉隗李訓㾕文通等事為之太息老杜􅀁以為人􅁛慕者不獨文章為工盖其語黙􅀁主君臣之外非父子兄弟郎朋友􅀺庻也嘗􅀚􅅊􅀿物詩及兄弟者十之二三廣陵覲兄牧情且為􅂬累日不知饑冬至􅀉諸弟云巳懐時節感更抱別離酸元日􅀉諸弟云日月昧逺期念君何歇社日􅀉云遥思里中㑹心緒悵㣲㣲寒食聮􅀐定何時吾今顔巳老又云把酒㸔花想諸弟杜陵寒食早青青初秋寄云髙梧一葉下空齋㱕思多聞蝉􅀉諸弟云緘書報是時此心方耿耿登郡楼􅀉諸季云上懷犬馬恋下有骨情余謂􅀚此集者雖讒䦧交瘉當一變而怡怡也黄常明百家詩話總􅀛後集卷之二十一
