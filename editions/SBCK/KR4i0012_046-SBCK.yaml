front:
  text: 增脩詩話總􅀛卷之四十六
  hash: sha256:f69ea9e97807745e64a5f7f7e2fafebbf3652bac8fb8e61564743a6ae79ae836
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_046-1a}
body:
  text: 藝術門鍾傳領江西日客有以覆射之法求見傳以暦日包橘置䄂中令射客云太歲當頭坐諸神不敢當其中有一物常帶洞庭香唐宋遺史何龍圖中正初登第聞西川郭從周精扵卜乃以縑素求筮從周作一絶贈之云三字來時月正圓一麾從此出秦􅀜錢塘春色濃如酒貪醉花間卧不還公後宦逹以三月十五日授知制誥以言􅁁事忤㫖出知秦州後移杭州而捐舘舎從周之筮何其驗歟黄州東南三十里為沙湖亦曰螺螄店予買田其間因徃相田得疾聞麻橋人龎安常善醫而聾遂徃求療安常雖聾而頴悟絶人以指畫字不盡數字輙深㑹人意余戯之曰余以手為口君以眼為耳皆一時異人也疾愈與之同㳺清泉寺在蘄水郭門外二里許有王逸少洗筆泉水極甘下臨蘭溪溪水西流余作歌云山下蘭牙短浸溪松間沙路净如泥蕭蕭春雨子䂓啼誰道人生無再少君看流水尚能西休將白髪唱黄雞是日極飲而歸百斛明珠王建宫詞百首多言禁中事皆史傳小􅀃所不載者徃徃見扵其詩如内中數日無呼喚傳得􅅬王蛺蝶圖之􅀋􅅬王元嬰高祖子新舊唐書皆不著其所能惟名􅀞録略言其善􅀞亦不言其工蛺蝶也惟見扵建詩耳或聞今人家亦有淂其圖者唐世一藝之善如公孫大娘舞劍曹剛琵琶米嘉榮歌皆見扵唐賢詩句遂知名扵後世當時山林田畆潜徳􅀮行君子不聞扵世者多矣而賤工末藝得所附託乃垂名不朽亦各係乎幸不幸尔合淝人傳論言曹谷善星暦􅄛數談事如神為王兾公作命書云七十年中一一加弄珠灘上事堪誇碧油幢下聞鳴鳥千日催還上漢搓公年七十二知㐮陽正得千日召還又云周匝將臨壬戌歲定􅂦門前春色異一千日上少三環再入和􅃵冝盡醉後兾公判西京將七百日再入政府壬戌歲也又云臨去尚猶聞禁漏異姓佳名在史書兾公薨謝之夕漏將盡無子其婿張環掌䘮事並古今詩話俳優門李家眀江南李璟時為樂部頭善滑稽為諷詠璟逰後苑登䑓見牛晚卧璟曰牛旦熟矣家眀曰臣不學敢上絶句云曾遭寗戚鞭敲角又􅀍田單火燎身閒背斜陽嚼枯草而今問喘更無人左右之臣皆冠謝罪李氏乃徐温飬子及僣􅃅遷徐氏于海陵璟􅁇統用宋齊丘言無男女少長皆殺之今海陵州宅之東小墳十數皆當時所殺徐氏之族也宋齊丘只一子輙卒逾月慟哭不止家眀曰惟臣能止之乃作大􅁓鳶上大書曰欲興唐祚革強呉盡是先生作計謨一箇孩児􅂸不得上皇百口合何如乗風吹之度至齊丘家遂絶其縷齊丘見之慚感乃止璟扵後苑命臣僚臨池而釣諸臣屢引到數十巨鱗惟璟無所獲家眀乃進口􅃅曰新甃垂鈎興正濃御池春煖水溶溶凢鱗不敢吞香餌知道君王合釣龍璟善之幸南都畫江為界舟楫多行南㟁至趙北因輟樂停觴北望皖公山謂家眀曰好數青峰不知何名家眀􅀿聲曰龍舟輕􅃞錦㠶風正值宸逰望逺空回首皖公山色翠影斜不到夀盃中出江南野録互見談苑所載不同未知孰是江南李氏樂人王感化建州人􅀠光山樂籍建州平入金陵教坊少聰敏未曾執卷而多識善為詞口諧捷急滑稽無窮時本郷節帥更代餞别感化前獻詩曰旌斾赴天䑓溪山曉色開萬家悲更喜迎佛送如來至金陵宴􅁐中有白野鵲李璟令賦詩􅀿聲曰碧岩深洞恣逰遨天與蘆花作羽毛要識此來棲􅀫處上林瓊􅀣一枝高又題恠石九八句皆用故事但記其一聮云艸中誤認將軍虎山上曾為道士羊談􅁐楊叔寳􅀰中與眉州人言頃眉州視事後三日作大排樂人獻口􅃅其末句云為報士民須慶賀火星去了福星來喜召優人問曰大排致語誰做對曰本州自來舊例只用此一首湘山録丁晋公鎮金陵嘗作詩有吾皇寛大容尸素乞與江城不計年之句天聖中李文定公出鎮金陵一日郡宴優人作語意其宰相出鎮所作理必相符誦至落句頂望抗聲曰吾皇寛大容尸素乞與江城不計年賔僚皆俛首文定􅀏曰是何是何上聞見責歸田録賞花釣魚㑹詩賦徃徃有􅀫思者天聖中永興軍進山水石􅃴㑹宴命賦山水石歌盖出不意中生優人入戯各執􅁓筆作吟哦狀其一優人或仆扵石上衆扶掖起旣起曰累日來作一首賞花釣魚詩准備􅀿制却􅀍這石頭摖倒左右皆大􅀏翌日䧏出詩令中書銓定内有鄙惡者落職與外任東齋記竒恠門王謝金陵人世以航海為業一日扵海中失舟泛一板登岸見一翁一嫗皆衣皂引謝至所居乃烏衣國也以女妻之旣乆謝思歸復乗雲軒泛海至其家有二燕棲扵梁間謝以手招之即飛來臂上取片􅁓書小詩繫扵燕尾曰誤到華胥國裏來玉人終日苦憐才雲軒飄去無消息灑淚臨風㡬百廻來春燕廻徑飛來謝衣上燕尾有詩一云昔日相逢冥數合如今暌逺是生離來春縱有相思字三月天南無鴈飛至來嵗燕竟不至因目謝所居為烏衣巷劉禹錫有詩曰朱雀橋􅁁野艸花烏衣巷口夕陽斜舊時王謝堂前燕飛入尋常百姓家摭遺彭城劉景直雍熈間逰華清宫因題詩扵門屏問云天子多情􅃂太真六宫專幸掌中身漁陽皷動長安破從此香肌委路塵是夜夣明皇召去論當時事妃子索景直有所贈立作詩曰玉刻水中龍雲牌掲故宫霓裳滿天月粉骨㡬春風眉􅀔從山盡裙腰芳艸空共知千古事悽恨與誰同􅄮王至明皇曰来何晚王曰􅃴杜甫到臣帳中誦哥舒翰詩向臣似有徳色云日月低秦􅀣山河遶漢宫明皇又曰常愛伊夜䦨更秉燭相對如夣寐之句李白終無甫之筋骨至如賈至崔輔國亦闕自然之句張老死把筆無伊一字遂宴飲忽聞寳雲寺鍾聲方覺郭平振武舊將士分配于錢塘給官屋居之屋在修文坊舊為白板書􅀹賃燒藥丹朱欲徃而官吏丁踈因逐之乃破爐而去白因召丁踈同飲謂踈曰大藥為吾子所破有小戯術子醒酒乃取盤一面置扵􅂰上以指敲兩腕出五色彈子两枚化為􅀟燕而飛白曰僕射髭甚䌓燕好去可减些言未畢二燕化為二小劍長五寸餘鋒刄如雨交舞扵踈之頥頷間髭落如雪踈懼甚白呼劍下盤中依前成二丸納扵左右腕而去錢昭度贈白詩曰䄂裏青鋒秋水寒誰疑􅀟燕是金丸出門風雨如何去空有霜髭在玉盤無諸彭演西逰鄠縣􅀫甘泉店閒歩原野忽有一少年引至一古官舎甚宏壯梁上有紅絲羯皷縚數條垂于地一老人杖而守之演問曰此何䖏老人曰開元興慶宫也來此者二百年中十二人尔去時莫不為詩請書一絶可乎演為詩曰長安宫闕半蓬蒿塵暗虹梁羯皷縚惟有水天明月夜一條空碧見秋毫演又曰十二人之詠可得聞乎老人舉章曰小小蓬山刻得成宫簾不動結飛鯨誰將八月天河水瀉到重樓無浪聲此楊尚書所作也又誦一章曰金人無路守瓊山坐見雲生棟宇間忽墜霜飛翠樓曉不知龍尾許誰扳此裴中書所作也再詢楊裴之名則瞪而不答錢仁伉尚父之孫也為元帥府中書檢校司徒與中軍都虞候金沼鄰居沼所居堂東植牡丹花一本着花三百朶其色如血如之金含稜每瓶子頂上有碎金絲如自然蛺蝶之狀一城以為殊異每嵗花開張宴仁伉預焉開寳七年春三月花􅅻一两朶開仁伉一夕洪飲擊劍䄇服中单背􅀒大籃左手携鋤腰插六􅎅首踰墻而過沼中外無知者鋤取牡丹置籃中乃平其地空中聞有吁歎之聲㣲細􅀂逰蜂音辭曰一花三百朶含􅀏向春風眀年三月裏朶朶㫁腸紅仁伉異之移植扵亭後明日沼覺失花為非人力所及來年花盛開乃宴召沼沼一見無語得疾以歸至夜憤悶不已以刀决腸而卒腸皆寸寸㫁果符空中之語鄭􅁇超廣州人赴官鳯翔道逢田參軍同行家累千餘人言是東川替罷亦入西京􅁇超與欵自言洛下有莊在北邙山下因問鞍乗極多何也曰亡室人來多年皆蜀中􅀌寡家子息亦欲旋旋與人􅁇超曰願得一人乃令妙香與之是夕歸􅁇超家數年􅁇超卜居西洛一日忽謂􅁇超曰妙香非人也今將歸北邙山舊穴願乞同乘至北邙因問田叅軍何人曰狐也是夕作别妙香歌以送酒曰勸君酒莫辭花落抛舊枝只有北邙山下月清光到死也相隨翌日同至北邙山下老君廟後妙香佯墜馬化為一狐迅走而去並洞㣲志唐王軒字公逺因遊苧羅山問西施之遺迹留詩扵石上曰嶺上千峰秀江􅁁細草春今逢浣溪石不見浣溪人廻顧見一女子素衣瓊珮謂軒曰妾自呉宫離越國素衣千載無人識當時心比金石堅今日為君堅不得軒知其異又貽詩曰佳人去千載溪山乆寂寞野水浮白烟岩花自開落􅆐鳥舊清音風月閒樓閣無語立斜陽幽情入天幕西子曰子之詩羙矣不盡妾之所􅀉也乃答軒詩曰高花岩外曉相鮮幽鳥雨中啼不歇紅雲飛過大江西從此人間怨風月旣暮已散期來日會扵水濵翌日軒徃則西子已在焉又相與飲軒詩曰當時計拙􅀏將軍何事安􅀖頼羙人一似仙葩入呉國從玆越􅀦更無春西子見之怨慕乆之又曰雲霞出没群峰外鷗鳥浮沉一水間一自越兵齊振地梦魂不到虎丘山旣夜乃散異日又相遇而留者逾月乃歸郭素聞王軒之事逰苧羅留詩扵泉石間莫知其數寂無所遇無名子嘲之曰三春桃李苦無言却􅀍斜陽鳥雀喧借問東鄰效西子何如郭素學王軒聞者大􅀏翰府名談朱休之家犬歌曰言我不能歌聴我歌梅花今年固自可眀年當柰何明年兵亂城䧟梁亡詩史杜少陵因見病瘧者謂之曰誦吾詩可療病者曰何杜曰夜䦨更秉燭相對如夣寐之句瘧猶是也又曰誦吾手提髑髏血模糊其人如其言誦之果愈言感􅀑神亦不妄古今詩話石曼卿自少以詩酒豪放自得其氣貌偉然詩格竒峭又工扵書筆畫遒勁體兼顔柳爲世所好余家嘗得唐後主澄心堂􅁓曼卿爲余草書其籌筆驛詩詩曼卿平生所自愛者至今藏之􅃅爲三絶真余家寳也曼卿卒後其故人有見之者云恍惚如夣中言我今爲仙也所主芙蓉城欲呼故人徃逰不得忿然􅀐一青騾去如飛後又云降扵亳州一舉子家其舉子留不得因留詩一篇與之余亦略記其一聮云鶯聲不逐春光老花影常隨日脚流仙事恠不可知其詩頗􅀋曼卿平時語舉子不能道也永叔詩話增脩詩話總􅀛卷之四十六百家詩話總􅀛後集卷之四十六釋氏門􅅊應物奉詶處士叔詩云髙齋樂宴罷清夜道相存東坡次王鞏韻云那能廢詩酒亦未妨禪寂子由春盡詩云楞嚴十卷㡬廽讀法酒三升是客同道貴冲寂寞主􅂬暢二者恐不能相兼也白樂天延樂命釂之時不忘於佛事至今逹者譏之􅁑常之衡州花光仁老以墨為梅花魯直􅀚之嘆曰如嫩寒春曉行􅀌山籬落間但欠香耳余因爲賦長短句曰碧瓦籠晴香霧繞水殿西偏小駐聞啼鳥風度女墙吹語􅀏南枝破臘應開了道骨不凢江瘴曉春色通靈醫得花多少抱甕醸寒春杳杳譙門􅀞角催殘照又曰入骨風流國色透塵種性真香爲誰風鬂涴啼粧半􅀣水村春暗雪壓􅊠枝籬落月髙影動池塘髙情数筆􅀉㣲茫小寢􅀄開霧帳前蝶恋花后西江月也冷齋夜話余自并州還故里舘延福寺寺前小溪風物􅁼斜川余兒童時􅃧􅇵之地也嘗春深獨行溪上作小詩曰小溪􅀝春漲攘我夜月湾新晴爲不平約束晚見還銀梭時撥刺破碎波中山整釣背落日一葉嫩紅間又嘗莫寒㱕見白鳥作詩曰剰水殘山􅃤淡間白鷗無事小舟閑個中著我添圗􅀞便是華亭落照湾魯直曰􅀚君詩說烟波漂渺處如陸忠州論國政字字坦夷前身非篙師沙户種􅁼邪有詩其畧云吾年六十子方半槁項顛螺度􅀊年脫􅁍衲衣著蓑笠来伴涪翁刺釣船嘗對淵材誦之曰淵材曰此退之澄􅀚我欲􅀵歛加冠巾換骨句也冷齋夜話余還自珠崖舘于髙安大愚山陳瑩中自台州載其家耒漳浦過九江愛廬山因家焉以書督余兼程來余以三日至湓城莹中曰自此公可禁作詩無益於事余曰敬奉敎然余児時好食肉毋使持齋余叩頭乞先飫餐􅁏一日母許之今日當准食肉例先吟兩詩喜吾二人死而更生何如莹中許焉曰鴈蕩天台看不足尽般児女􅀉􅅾窓徃耒漳水謀二頃偶愛廬山家九江名節適真如醉白生涯領略似湘龎向耒萬事都休理且听楼鍾一夜撞與公灵鷲曽听法㳺戯人間知幾生夏口甕中蔵畫像􅀌山月下認􅁔聲翳消巳斍蔕礦尽方知珠自明数抹夕陽殘雨外一畨飛絮滿江城莹中喜而謂余曰此岐山猪肉雖羙無多食後三年余客漳水見莹中姪勝柔自九江來出詩示余曰仁者難逢思有常平居慎勿恃何妨争先世路機関􅁖近後語言滋味長可口物多偏作疾快心事過必為傷與其病後求良藥不若病前能自防余謂勝柔曰公痴詩如食鯽魚惟恐遭骨刺與岐山猪肉不可同日而語也泠齋夜話陳莹中謫合浦時余在長沙以書抵余為􅀒華嚴經入嶺有偈曰大士㳺方興尽囬家山凬月絶纎埃杖頭多少閑田地挑取華􅃊入嶺来余和之曰因法相逢一􅀏開俯㸔人世過飛埃湘南嶺外休分别圓寂光中共徃耒又聞嶺外大雪作二偈寄之曰傳聞嶺外雪壓倒千年樹老児拊手􅀏有眼未曽覩故應􅃳物材一洗瘴江霧寄語牧牛人莫教頭角露又曰偏界不曽藏處處光皎皎開眼失蹤由都縁太分曉園林怱生春萬瓦粲一􅀏遥知忍凍人未悟安心了冷齋夜話余􅀚誌公十二時頌自非深悟上乗同佛知見豈能作此語也是時逹磨猶未西耒誌以明此理所謂先得我心之所同然者誌公没扵天監十三年而逹磨以普通八年至金陵由此之魏􅀓佛心印禅宗方興近世學佛者徃徃忽此頌而弗􅀚蓋貴耳而賤目矣余嘗手書此頌置之座右朝夕味之尤爱其最後一首云雞鳴丑一顆圓珠明巳乆内外推㝷覓捴無境上施爲渾大有不見頭又無手世界壞時終不朽未了之人听一言只這如今誰動口以至二祖信心銘永嘉証道􅁔皆禅學之髄􅀄地之人其可弗􅀚乎苕溪漁􅀮陳体常荅黄冕仲二書叙學佛之㫖深切著明余嘗三復其言歎其有理恨未能尽行也体常又有頌六首今録二首其一云宻坐研穷有細㣲到頭湏是自􅁯機應無祖佛能超越豈有􅁈親更順違歷歴􅀌明猶認影巍巍獨露尚披衣飜嗟㑹得昭靈者也道㝷師㫖歸其二云個中端的有誰知知者歸來到者稀即見即聞還錯㑹離聲離色轉乖違山青水緑明玄旨鶴唳猿啼􅂋妙機有意覔渠終不遇無心到處盡逢伊冷齋夜話云陳瑩中北歸過南昌言鄒志完在韶州極精進閉門誦華􅃊經舎利生袖間此真入信位日誦華嚴於􅀚音像前有脩竹三根生像之後志完掲茆出之不可乃垂枝覆像如世所􅀞寳陁􅃊竹今猶無恙韶人扄鎻之以爲過客逰􅀚北還至未州淡山岩有馴狐凢貴客至則鳴志完將至而狐輒鳴寺僧出迎志完怪之僧以狐鳴爲言志完作詩曰我入幽岩亦偶然􅀄無消息與人傳馴狐戲學仙伽客一夜飛鳴報老禅苕溪漁􅀮余讀劉興朝悟道經真集其言曰余少治儒術長登仕版盖未嘗信佛也三十有二􅀊見東林長老緫公與之語七日始生信焉即取其書讀之三年盖恨其信之之晚也然循其理而体㑹則似悟還迷依其法而行持則暫静還擾旣而閱傳燈錄始知佛有法眼妙心宻相付嘱而逹磨西來单傳此事衆生悟者可以見性而了心其後發明此事但覺境界非常取証道歌讀之句句盡是吾之心地讀至六般神用空不空一顆貟光色非色如是希竒之事吾今巳得現前任是千聖出來巳湏退歩始得示人以偈曰世間多少英靈漢終是迷頭喚人喚可怜眼底黒漫漫不見􅌐珠光燦爛過今晡又耒旦不斍年華暗中換急抬頭髙著眼徑寸不容蚌中産灵利男児薦得時好􅀏交渠腸􅁒断又詩云今士堂堂此事同㱕因処処􅀗貟通片心豁去滄􅈚窄双眼開耒宇宙空出海銀蟾光動地離弦金簇疾追凬湏知佛祖埋藏後坐断千差是此翁苕溪漁􅀮百家詩話捴􅀛卷之四十六終
