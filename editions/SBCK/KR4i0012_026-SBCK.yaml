front:
  text: 増修詩話總􅀛卷之二十六
  hash: sha256:da8ab99505fa53b252d5e686bafaea348db793fee6767c450c9a6625be2919b5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_026-1a}
body:
  text: 􅀉贈門上吕文穆公􅂪正甞與温恭肅仲舒及一友人忘其姓名讀書於洛陽龍門山誓不作狀元不仕及唱第文穆爲狀頭温巳不意然尚中甲科其友人隨拂衣歸􅀮後文穆大用太宗問昔與誰友文穆即以歸􅀮者對遂以著作􅀰召不起故文穆罷相歸洛作詩贈之曰昔作儒生謁貢闈今提相印出黄扉九重鴛鷺醉中别萬里烟霄逹了歸隣叟盡垂新白髪故人猶着舊麻衣洛陽謾􅀃多才子自嘆遭逢似我稀故人盖指歸􅀮者也青箱雜記梁周翰太宗朝爲舘職真宗即位除知制誥柳開贈詩曰九重城闕新天子萬卷詩書老舎人古今詩話五代末濠梁人南楚材逰陳潁間潁守欲子妻之楚材巳娶薛氏以受潁守之恩遣人歸取琴書之屬似無還意薛氏善書􅀞能屬文自對鑑圖其形并作詩􅀉之曰欲下丹青筆先拈玉鑑端己驚顔寂寞漸覺鬂凋殘淚眼描將易愁腸寫出難恐君渾忘􅁍時展􅀞圖看楚材見而慚焉與之偕老唐宋遺史韋應物為蘇州太守嘗有詩贈米嘉榮曰吹得凉州意外聲舊人惟有米嘉榮近來年少欺前軰好染髭鬚學後後生又嘗赴􅀭州司馬杜鴻漸宴醉􅀫驛亭醒見二佳人在側驚而問之乃曰􅀰中席上與司空詩因令樂妓侍寢問記其詩否一妓強記乃誦之曰高髻雲鬟宫様粧春風一曲杜韋娘司空見慣渾閑事㫁盡蘇州刺史腸同前古今詩話劉夣得詩唐末士子崔郊姑有婢端䴡郊􅀼愛之他日鬻婢扵㐮陽司空于頔得錢四十萬因寒食出遊婢見郊立扵栁隂下郊因作詩隨以贈之曰公子王孫逐後塵緑珠重淚滴羅巾侯門一入深如海從此蕭􅀰是路人疾郊者録詩以示頔頔召郊執其手曰詩公所作也四十萬小㢤何不早言因以婢贈之唐宋雷徳遜有終父子二人並命為江南淮南漕王元之贈詩二首其一曰江南江北接王畿漕運㠶檣去似飛父子有才同冨國君王無事免宵衣屏除姦吏魂應䘮飬活疲民肉漸肥還有文塲受恩客望塵情抱倍依依其二曰當時豪氣壓朱雲老作皇家諌諍臣章䟽罷封無事日朝廷猶指直言人題詩野舘光泉石講易秋堂動􅀑神􅁄寺下僚叨末路齋心猶祝秉洪鈞元之嘗出徳遜門下而徳遜深扵易酷扵詩也青箱雜記樞宻邵公尭謂余詩似樂天一日閲相藍書肆得馮瀛王詩集歸公與余語曰子詩似樂天又愛馮集將來拈取箇豁逹李老慶暦中京師有人號豁逹李老每好吟詩而詞多鄙俚以此戯之遂皆大􅀏熈寜中余辟定武帥幕公自鄆附所作詩一軸并􅀉余詩曰流年真似隙中駒别后情懐􅂴更踈天上又頒新暦日床頭未答故人書殷勤羔鴈功曹檄狼籍盃盤上客魚好在仲宣家萬里從軍苦樂定何如李文正昉吕正惠端同踐文舘後皆登台輔李贈吕詩曰憶昔僦居明徳坊官資俱是校書􅀰青衫共直昭文館白首同登政事堂佐國廟謨公巳展避賢榮路我猶妨主恩至重何時報老眼相㸔淚两行並同前向文蕳敏中㓂忠愍凖二相同以太平興國五年登第後文簡秉鈞忠愍以使相守長安文蕳作詩􅀉忠愍忠愍酧之曰玉殿登科四十年當時僚友盡英賢歲寒惟有公兼我白首猶持將相權唐宋遺史劉昌言泉州人常侍陳洪進為幕客入朝為副樞嘗作下第詩落句云唯有夜來蝴蝶夣翩翩飛入刺桐花後為商丘記室王元之贈詩曰年來復落事堪嗟載筆商丘鬂欲華酒好未陪紅杏宴詩狂多憶刺桐花盖為是也同前錢塘林逋處士有高節范文正公贈詩曰巢由不願仕堯舜豈遺人風俗因公厚文章到老醇張乖厓公為布衣時與陳希夷善因夜話謂希夷曰欲分先生華山一半住得無希夷曰餘人不可先軰則可及旦相别希夷以宣和中筆一枝白雲䑓墨一劑蜀牋一角贈之公曰㑹得先生意驅某入閙處去曰珎重珎重希夷送公回謂門弟子曰此人無情扵物逹則為公卿不逹則為帝王師公嘗感之後尹蜀過華隂􅀉希夷詩曰性愚不肯林泉住強要清時擬致君今日星馳劍南去回頭慚愧華山雲曹脩司封守邵武以竹簟贈僧仁曉并惠小詩曰翆筠織簟􅀉禪齋午夜秋從枕底來􅀂也此時人問道寒天捲却暑天開並同前孟賔于湖湘連上人少脩儒學好詩有百篇名金鰲集獻于李􅀂虚侍􅀰因採集中佳句可取者記之于書使賔于馳詣洛陽獻諸朝廷其譽藹然明年春與李昉同擢進士苐後事李後主為滏陽令因抵法當死會昉遷翰林學士聞在縲絏以詩􅀉賔子曰初携書劍别湘潭金牓標名第十三昔日聲塵喧洛下近來詩價滿江南長為邑令情終屈縱處􅀰曹志未甘莫學馮唐便休去明君晚事未為慚主見其詩而宥之復官未㡬歸老連上號群峯叟吉守馬致恭以詩送其末章云今日還家莫惆悵不同初上渡頭船江南野録雅言系述記吉守送賔于詩有全篇及賔于詩李頻方干高第也登第後干􅀉詩曰弟子已攀桂先生猶卧雲鑑戒録羅􅀮以諷刺之深久而不第劉賛贈之詩曰人皆言子屈我獨以為非明主旣難謁青山何不歸年虚侵白鬂塵土汚麻衣自古迯名者至今名豈㣲􅀮見之遂起歸歟之興作五湖詩曰江頭日暖花又開江東行客思悠㢤高陽酒徒半凋落終南山色空崔嵬聖代也知無弃物侯門未必用非才一船明月一竿竹家在五湖歸去來施肩吾贈邉將詩曰輕生奉國不為難戰苦身多舊箭瘢玉匣鎖龍鱗甲冷金鈴繫鶻羽毛寒皂貂擁出花當背白馬􅀐來月在鞍却恐犬戎臨虜塞柳營時把陣圖看杜荀鶴苦扵詩有贈僧句云安禪不必須山水㓕得心頭火自消又云利門名路两何慿百歲風前短熖燈只恐為僧心不了為僧心了是輸僧翁承賛唐末為諌議大夫使福州至劍浦縣見舊識僧亞齊贈詩云蕭蕭風雨建陽溪溪畔維舟見亞齊一軸新詩劍潭北十年舊識華山西吟魂㫺向江村老空性元知世路迷應􅀏乗軺青􅃈客此時無暇聴􅆐啼唐陸希聲以􅀟鉤寫字法授僧􅈯光􅙒光入長安為翰林供奉而希聲尚未達以詩􅀉􅈯光曰筆下龍蛇似有神天池雷雨變逡巡􅀉言昔日不􅀛手應念江湖洴澼人􅈯光感其言薦希聲後至宰相並同前興國中潘􅀂冲罷桂林經南岳留鶴一􅃗與廖融贈詩一章云峭格數年同野興一官纔罷共船歸稲梁少飼教長瘦羽翼無傷任逺飛側耳聴吟侵静燭㗸花作舞帶斜暉朝天萬里不將去留伴高人向釣磯􅀂冲到京授維􅀭通理臨行復有詩􅀉融曰曾經别墅住行蹤春浪和烟撼釣筒共歩幽亭連石蘚􅀉眠静榻帶松風秋來頻夣岳雲白别后應添鶴頂紅又泛汴舟随汴水不堪南望思忡忡後至維􅀭聞融與鶴相􅁇而亡􅀂冲感而又為一絶云南岳僧來共歎吁風亭月榭巳荒蕪先生去世未十日留伴高吟鶴亦徂融卒未乆潘有泉陵之命經􅀮居有詩哭云天䘮我良知無言􅀟淚垂惟求相見夣永絶􅀉來詩應有異人吊從茲雅道衰春風古原上新塚艸離離雅言雜載杜羔妻劉氏善為詩羔累舉不第將至家妻即先􅀉詩曰良人的的有竒才何事年年􅀍放回如今妾面羞君面君到來時近夜來羔見詩即時回去㝷登第妻又􅀉詩云長安此去無多地欎欎葱葱佳氣浮良人得意正年正年少今夜醉眠何處樓南部新書張介以命術逰公卿門寓居錢塘西湖上嘗自京師南歸士大夫率為詩贈之吕許公王沂公時方執政亦皆有詩夏鄭公留守南京為詩􅁇二公曰上公詩筆千金重逋客歸裝一舸輕莫到青山更招􅀮且留明哲為蒼生鄭谷雪詩云亂飄僧舎茶烟􅊜宻洒歌樓酒力㣲江上晚來堪􅀞處漁人披得一簑歸有叚賛善善􅀞因采其詩為圖曲盡瀟洒之意持以贈谷谷為詩以謝之云賛善賢相後家藏名􅀞多留心扵繪素得意在烟波屬興同吟詠功成更琢磨愛余風雪句幽絶寫漁簑古今詩話歐陽价攻傳神楊次公贈之詩曰國手曾煩寫㡬回無人彷彿醉顔開青銅鑑裏㝷常見不謂今從筆下來奉職劉祕亦贈詩曰筆妙今為第一人心期造化奪天真精神形骨從來一移入青縑推两身古今詩話唐相鄭棨贈老僧詩曰日照西山雪老僧門未開凍瓶粘柱礎􅀫火􅀮爐􅁅童子病歸去鹿麑寒入來自云此詩可以衡稱重輕不偏也嘗有人問相國近有新詩否曰詩在㶚橋風雪中驢子上此中安可得之同前王定保唐光化三年李渥侍􅀰下及苐呉子華侍􅀰臠為壻子華即世定保南逰湖湘無北歸意呉假緇服自長安來明日訪其良人白於馬武穆王令引見定保扵定林寺呉隔簾誚之曰先侍􅀰重先軰以名行俾妾侍箕箒侍􅀰没慮先軰以妾改適是以不逺千里來明侍􅀰之志定保不勝慚赧致書武穆乞爲壻吴確乎不㧞定保爲盟畢世不婚矣呉歸呉中外家沈彬有詩贈定保云仙桂曾攀第一枝薄逰湘水阻佳期臯橋巳失齊眉願蕭寺行逢落髪師廢苑露寒蘭寂寞丹山雪㫁鳯參差聞公巳有平生約謝絶女蘿依兎絲定保後爲馬不禮奔五羊依劉氏官至卿郡閣雅談賈島爲普州司倉方干􅀉詩曰亂山重復叠何路見先生豈料多才者空垂不第名閑曹曾得醉薄俸亦勝畊莫問爲詩苦年年芳草生鑑戒録稷山驛吏王金作吏五十六年稱有道術徃來多贈篇什李義山有詩贈云過客不須詢歲代唯書乙亥與時人令狐綯自湖州刺史拜翰林學士因夜召對坐從容語及文宗大稱之由是眷遇有加未㡬拜相因郊禋侍祠還趙嘏贈詩云鶚在卿雲氷在壺代天才業共訏謨榮同伊陟傳朱戸秀比王商入􅀞圖昨夜星辰廻劍􅂂前年風月落江湖自湖州入相􅅻二年不知機務時多暇猶許詩家屬和無詩史李賛皇頗開寒素之路及南遷或人贈詩曰八百􅀌寒齊下淚一時南望李崕州徐鉉謫居舒州贈彭芮云賈生去國巳三年短􅄄閒吟翫水邊終日野雲生砌下有時京信到門前無人與和投湘賦愧子來浮訪戴船醉裏新詩好歸去莫随騷客賦林泉並同前陳文惠尭佐退居鄭下張退􅀓知西京以姚黄魏紫及酒惠文惠答詩曰有花無酒頭慵舉有酒無花眼倦開正向西園念蕭索洛陽花酒一時來雲齋廣録増修詩話總􅀛卷之二十六百家詩話總􅀛後集卷之二十六莭候門嶶宗宣和七年十二月二十一日勅睿謨殿張燈預賞元霄曲燕近臣命左丞王安中中書侍􅀰馮熈載爲詩以進安中云上帝通明闕神霄廣愛天九光環日月五色䴡雲􅃄紫䄂開三極瓊璈列萬仙希夷塵境㫁髣髴玉經傳妙道逄昌渾真王撫契賢􅀛圖規大壮龍位正純乾穹昊親無間皇居掇自然刚風同變化祥氣共陶甄層􅀚星潢上重闉斗柄邉摩空七雉峻冠嶠六鼇連夣想何嘗到階升信有縁昕朝初放仗宻宴忽聞宣一清禁来鳴珮脩廊入並肩獸鋪金半闔鵉障綉㣲褰霽景􅇔庭砌雷文繪桷梴宫簾波錦􅃞殿榜字金填花擁巍巍座香浮秩秩筵高呼􅁛萬億韶奏侍三千華􅀊推尭暦元璣候舜璿氷霜知臘後梅桞認春前造化􅀿呈巧芳菲巳閗妍樛枝彫檻小多葉露桃鮮錯落飛盃斚鏘洋雜􅃹弦承雲􅁔歴歴回雪舞翩翩黼幄祥氛合銅壷永漏延鎬京方置醴羲馭自停鞭上聖情深渥諸臣意更䖍宗藩親魯衞相芾拱閎顛側弁㤙光浹中觴詔蹕旋宝熏携满䄂御果得加边要賞嬉逰盛儀追歩武遄騰身􅃨道表送日夾城㬉仰揖蒼龍象旁臨艮岳顛謳􅁔紛廣陌簘皷樂豊年赫奕攅輕幰珍奇集市􅝬􅀶盧多􅃝跣飲肆兢蹁跹蕃衍開朱邸崔嵬照彩􅁺橋虹弯矗矗江練泮濺濺擊柝周庐晚張燈别院先餘霞摇綺暈列宿舍珠􅄤浩蕩三山島稜層十丈蓮􅂯趋天北極却立榻東偏旣用家人禮仍占聖製萹兕觥􅀙酩酊蟾魄待婵姢轉盻随親指環􅀚得􅀙穿曲屏江浪蹙巨柱赤虬􅆞光透垂枝井晶衘帶壁錢蕭䑓千級峻重屋八窓全孰席花墪匝行樽紫䄂楦交輝方爍爍起立復闐闐􅃉字㑹寕過中霄勝賞專鋪陳􅀹有韵清雅不相㳂户箔明珠串欄缸水碧捲䂓模啇鉒欵識魯壷鎸秦曲移筝柱唐粧􅌂鬂蝉窄􅁭珠綴領高朶翠為鈿喜􅂔排寒沍輕颸洗静便層琳籍璣組方鼎炷龍涎瑪瑙供􅐻大坡璃琢琖圓暖金傾小榼屑玉釀新泉帝子天才異英姿棣蕚聮顃㸔揮斗盌端是吸鯨川推食俱均逮攘餐及墜捐海螯初破殻江柱乍离渊寕􅂾披綿雀休論縮頸鯿南珍誇飣餖北饌厭烹煎賜橘懷頳卵酡顔釂宝舡言㱕荷慈惠末莭笑拘挛放鑰􅃊扄啓籠紗逸足牽氷輪挂銀漢夜色映華韉人識重熈象功參獨㫁􅁠五辰今不忒六􅂔永無愆天紀承三古時雍變八埏比閭增板籍疆場罷戈鋋文軌包夷夏弦􅁔徧幅貟恢儒荣藻薦作士極魚鳶慶胄貽謀􅂋多男景福綿迓衡常穆穆遵路益平平亭障今踰隴耕耘乆際燕信通鵬海漲威􅇡犬戎羶東擬封雲岱西将欵澗􅈆琳科宣蕊笈玉府下雲軒帝籍勤初播宫蚕長自眠蠒絲登六寢稃米秀中田庙鶴垂昭格壇光􅁥吉蠲靈芝滋􅌲蠢􅅴醴湧潺湲合敎龎風革頒經衆疾痊雨随親禱􅑙河避上流迁执契皇猷洽波圖福物駢太和輸槖籥妙用絶蹄筌此際君臣悦應先簡冊編雅􅁛魚􅇁􅇁頌述皷􅍋􅍋詎比千齡遇猶聞四始箋覉臣起􅅊布陋質愧駑鈆驟俾陪機政由来出眷怜㤙方拜綸綍報未効塵㳙宻席叨臨􅂆凡踪第曲拳雖無三峽水曽歩八花塼渝望知難􅁛才慳合勉旃鈞天思盡賦賸續白雲牋熈載云化工􅁒放陽春到先教元􅁳戮衰艸凝氷封地萬木僵誰向雪中探天巧璿璣星囬斗指寅群芳未知時巳春人心蕩􅃞趂佳莭燈夕獨冠年華新昇平萬里同文􅁤井邑相連通四裔蘭膏兢􅄍夜烘春和叔囘車避羲轡巍巍九禁􅀝天開温風更􅁴先春来試燈不用雨花落迎陽為却寒崔嵬宣和初載元冬尾瑞白􅅻消塵不起穆清光賞属欽鄰錦綉雲龍頒宴喜初聞傳詔開睿謨歩障幾里承金鋪調音度曲三千女正似廣樂陳清都遏雲妙唱韓娥侣囬雲飛花称獨歩千春蟠木效紅英獻夀當筵豈金母上林晚色烟藹輕景龍逰人歡􅀏聲霞裾月珮擁仙仗翠鳯挾輦趋平成銅華金掌散晶彩翠碧重重簇珠琲先􅀙前殿望􅁱廊日出綺霞紅滿海神光通透雲母屏􅌐龍出舞波濤驚煌煌黼座承天命座下錯落如明星榻前玉案真核旅獸炭銀爐夜初皷憲天重屋訝雲屯崇道簫䑓疑蜃􅄍前楹火柱囬萬牛藺卿璧碎色光浮周圍照䊮眼界徹氷壺􅃞月生珠流􅀧点金錢盡御璧豹髄騰輝粲銀礫􅁝篁人􅄜有機緘繳繹清音傳屋壁湏􅁷随蹕登㑹寕如驂鵉鶴逰紫清彩蟾倒影上浮空纎雲不点惟光明四壁垂簾玉銀缸􅄍艶相連属棼楣横帶碧玻璃一朶翠雲承曰轂萬光閃爍争􅄍吞燭龍御耀輝四崑又如電母神鞭馳金虵省壁不可捫端信竒工通造化豈比胡人能幻假丹青漫􅂾顧虎頭􅐻礴觧衣催客冩此時揮麈帝御鈞天䑓紫垣两两明三台尚方飲噐萬金宝古玉未足誇雲雷帝旁侍女雲華品玉立仙標及時韵四音促柱泛笙簫應有翔鵉落千仞龍瓶㵼酒如流泉御厨絡繹紛珎鮮塌􅁁争欲供天􅀏快倒頗􅀋虹吸川厭厭夜飲方􅂬浹玉漏頻催皷三叠金門初下醉㱕時正見氷輪上城堞㣲臣去歳陪清班􅁖詩悞辱重曈􅀚小才易穷真䑕技􅄪賦愈􅁴相如慳􅂂道彦為二集中今不復印行故録扵此同上荆楚記云屈原以五月五日投汨羅而死人傷之以舟擑拯焉故武陵競渡用五月五日盖本諸此劉夣得云今舉檝相和之音皆曰何在盖所以招屈原也詩曰湘江五月平堤流邑人相将浮采舟靈均何在􅁔巳矣哀謡振檝􅀙此起又有招屈亭詩所謂曲終人散空愁暮招屈亭前水東注是也今江浙間兢渡多用春月疑非招屈之義及考沈佺期三月三日獨坐驩州詩云誰念招魂節翻為禦魅囚王績三月三日賦亦云新開避忌之席更作招魂之所則以上巳為招屈之時其必有所㨿也予􅀚琹操云介子推五月五日焚林而死故是日不得發火而異􅁐以謂寒食始禁烟盖當時五月五日以周正言之尔今用夏正乃三月也屈原以五月五日死而佺期王績以上巳為招䰟之莭者亦豈是􅁘歳時有祓除不祥之具而元日􅀹多如桃版葦索磔雞之􅀋是也飲屠􅂫酒亦所以祓瘟攘􅁖而法必自㓜飲何􅁘顧况歳日口號云還丹􅄫寞羞明鏡手把屠􅂫先少年白樂天元日贈劉夣得詩亦云與君同甲子歳酒合誰先元日飲酒則先卑而後尊自唐以来巳如此矣四時月令云進椒酒次第當􅀙小起而董勛告晋海西公云小者得􅀊故先酒賀之老者失􅀊故後與酒似亦不為無理並丹􅀭集先文康公晚􅀊卜居扵寳溪之上建􅀚禊堂于水濵紹興癸丑與客泛舟脩禊甚樂距永和癸丑不知其幾癸丑也因與客相與推筭自永和九年歳甲子一周為晋義熈九年又一周為宋元徽元年自後梁大通五年隋開皇十三年唐永徽四年間開元元年大暦八年大和七年景福二年周􅂋徳二年本朝祥符六年熈寕六年皆􅀊在癸丑凢七百八十年矣乃作詩以紀其事云快雨霽亭午晴曦作春妍鄰曲饒勝士共開浮棗筵中流愜嘨詠隠浪金壷偏紅芰初出水捧劍疑来前緬懷蘭亭㑹七百八十年可怜右軍痴生死情􅆞綿由来彭殤齊頋或謂不然吾黨殆天放卜夜孰􅃹弦尺六細腰女舞䄂輕囬旋且畢今日􅂬不期来者傳同上上已日扵流水上洗濯祓除去􅀫垢故謂之祓禊禊者潔也王逸少作蘭亭記云永和九年􅀊在癸丑㑹扵山隂之蘭亭􅁱禊事也當其群賢畢集逰目騁懐之際而感􅁣係之乃有一死生為虚誕齊彭殤為妄作之語議者以此咎羲之之未逹也同上自冬至一百五日至寒食故世言寒食皆􅁛一百五杜子羙一百五日夜對月云無家對寒食有泪如金波姚合寒食書事詩云今朝一百五出户雨初晴則是詩人例以百五日爲寒食也或者乃謂自冬至至清明凡七氣至寒食一百三日殊不知暦家以餘分演之也司馬彪續漢書云介子推焚林而死故寒食不忍舉火至今有禁􅃄之􅀃盧象所謂子推言避世山火遂焚身四海同寒食千秋爲一人是也太原一郡舊俗禁烟一月周舉爲郡守以人多死移書推秪禁􅃄三日子羙清明詩云朝來新火起又家人鑚火用青楓皆在寒食三日之後則知禁􅃄止扵三日也而韓翃有寒食即事詩乃云春城無處不飛花寒食東風御栁斜日暮漢宫傳臘燭青煙散入五侯家不待清明而巳傳新火何􅁘元㣲之連昌宫詞云初過寒食一百六店舎無􅃄宮􅀣緑念奴覔得又連催特􅃙宫中許然燭一百六在清明前寒食之後是時店舎巳無􅃄而宫中然燭乃一時之􅁠冝尔或云龍星木之位也春属東方心為大火惧火盛故禁火是以寒食有龍忌之禁則所謂禁堙又未必為子推設也同上百家詩話總􅀛後集卷之二十六
