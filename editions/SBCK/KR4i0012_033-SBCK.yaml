front:
  text: 增修詩話總􅀛卷之三十三
  hash: sha256:6bf19c3c944b892fee84c5d31f857d8dfd7e09867779caa132606b7d5fc5f40d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_033-1a}
body:
  text: 紀夣門上周琬湘中人􅋈舟長沙夣二吏引入南嶽廟内升殿殿起接之曰知入京銓選欲奉辟在此亦與人世之樂不踈琬曰名宦未達且欲赴銓王曰如此則不敢奉縻也乃作詩送琬曰住此旣非樂捨此去何啚􅀂問青氊事惟留一角書至京調中牟尉忽卧病旅中且慮不起作妻子書一角封卑而卒洞㣲志侯復字復之世本三秦人嘗登乾陵賦詩曰􅀔欲傾江移㤗華乾坤都在手心中幾時直欲更唐柞不柰簾前有狄公又曰太宗蹀血平寰宇何事高宗信女王當時朝端無正人天下分毫皆姓武歸寢夣一朱衣人引至大宫􅆣有一婦人坐殿上衣王者服侍立皆婦人知其爲唐天后也問復曰前代帝可譏而陵寢可登乎復遜謝之令升殿與論當時事酌以酒再令賦詩曰堂殿無人古苑空幽花盡日度春風山鶯海燕舊時在時復飛來入故宫唐宫秦苑皆離􅁰常遣詩人興倍增落日牛羊歸巳盡朦朧初月上乾陵后覧詩􅀹異令呼杜夫人來至即謂復曰此如晦之逺孫也當時爲第一色帝欲見之多稱疾其強項與爾敵令與復飲杜夫人贈復詩曰深宫鎻閉暗生塵默默那知歲月新泉室乆無人氣味不知今日再逢春留數日而歸臨行復以詩别夫人曰丈夫剛鐡腸因花反柔弱男子忠義心於情安可薄几有㶑灔巵席有燕趙􅁎人生捨此外萬事俱不知魂魄恍逰仙自信皆偶然匆􅃍又分散涕淚何流漣從斯對佳景蕭索春風前今夕天角月光滿人不圓幽池􅀟鸂鶒日日浮清泉霜鶻長天外驚飛急似弦一落江沙上一墮古溪邉獨行寒水畔悲鴻誰見憐何時再相遇共戯復􅀟眠復徘徊不忍去因為執繖者擊其腦遂覺翰府名談明皇幸蜀回居南内嘗夣中見妃子扵蓬山太真院作詩遺之使焚扵馬嵬山下云風急雲驚雨不成覺來仙夣甚分明當時苦恨銀屏影􅃒隔仙􅁎秪聴聲又作妃子所遺羅襪銘曰羅襪羅襪香塵生不絶細細圓圓地下得瓊鈎窄窄􅃓􅃓手中弄初月又如脫履露纎圓恰似同衾見時節方知清夣事非虚暗引相思㡬時歇待制王公素仲儀任御史曰嘗夣至玊京黄闕殿上有紺服翠冠者吾東門侍􅀰公則西門侍􅀰也昔以奏牘玊帝前語傷鯁訐遂責于世公夣回題詩於書窓曰似去華胥國裏來雲霞深處見樓䑓月光冷射雞窓急驚覺逰仙夣一迴公晚歳復思玉京之夣作詩曰虚碧中藏白玉京夣魂飛入黄金城何時再歩烟霄外皓齒仙童巳掃􅈦盧綘字晋卿因病痁夣一白衣婦人令食蔗遂愈他日復夣白衣婦人曰太尉當冨貴時至可詣都下妾有一詩一緡以助行妾乃玊真也他日孟家陂相見其詩曰清風明月夜深時箕箒盧􅀰恨巳遲他日孟家陂上約再來相見是佳期言訖而去綘後賜死鄜延賛視行刑將至梁門綘見擁一白衣婦人來宛如前夣中所見因嗟曰玊真何至此乎延賛為問玊真姓耿氏夫死與婦之子􅀻遂與綘同場斬首其地果孟家陂丁咸序未第時嘗夣乗龍而起回顧又有一駱駝在其後後二十年方捷科舉作詩曰嘗憶金陵應舉時壯心頻徃折丹枝蹉跎二十年中夣一度思量一淚垂殿試牓出亞咸序之名者乃龍起又亞之者乃駱起方悟其夣鄭顥嘗夣中得句云石門霧露白玊殿莓苔青續成長韻此两句老杜詩也詩史蜀人任玠字温如晚寓寜州府宅一夕夣一山叟貽詩曰故國路遥歸去來玠和之曰春風天逺望不盡旣􅁴自􅀏曰吾其死乎數日不疾而卒古今詩話金陵才士鍾輻少年氣豪一老僧見之相曰公登第則家破時樊􅀂水愛輻之才以女妻之及燕爾應詔洛中果中甲科由是任放携一女奴青箱過華州蒲城其宰乃輻故人延留累日一夕盛暑登縣樓痛飮而寢夣妻樊氏以詩一首示生云楚水中如鏡􅀟􅀟白鷺飛金陵幾多地一去不思歸生夣中愧謝答詩曰還呉東下過蒲城城上清風酒半醒想得到家春欲暮海棠千􅀣巳凋零旣悟感其事因趣裝歸至采石渡青箱心痛􅁀卒生匆匆藁葬扵新墳之側洎至家庭户閴然妻亡巳數月詢之親鄰樊亡之日乃夣扵登縣樓之夕也青箱葬處乃樊之塋地爾不植他木惟海棠數株正符詩意鍾歎曰老僧之􅀃信㢤終身不仕􅀮于鍾山著書養氣年八十而終古今詩話臆􅀃謂鍾輻爲蘇檢青箱爲小青范陽盧獻卿大中年舉進士連不中第薄逰衡湘間至郴而病夣人贈詩曰玊築郊原古青山為四鄰扶踈遶䑓木寂寞獨歸人踰旬乃卒郴守為葬之近郊果以夏初入窀穸同前許渾嘗夣登山有宫室凌雲人云此崑崙山也旣入見數人方飲招同飲至暮而罷賦詩曰曉入瑶䑓露氣清庭中惟有許飛瓊塵心未斷俗縁在十里空山下月明他日復夣至其處飛瓊曰子何題余姓名扵人間改曰天風吹下歩虚聲曰善池陽崔球為太學生苦學不歸一日晝夣到其家見其妻正鴈字呼之不應與之言不答眡其所書乃詩也曰數日相望極須知意思迷夣魂不怕險飛過大江西旣覺歷歷記之數日書至其妻􅀉此詩一字不差驗其冩詩日乃球得夣之日也謝濤諌議臨􅂢館舎前一月夣作讀史一絶云百年竒特㡬張􅁓千古英雄一窖塵唯有炳然周孔教至今仁義浸生民召其孫晏初録焉石曼卿嘗扵乎陽㑹中代作􅀉尹師魯一篇曰十年一夣花空委依舊河山損桃李鴈聲北去燕南飛髙樓日日春風裏眉黛石州山對起嬌波淚落粧如洗汾河不斷天南流天色無情淡如水曼卿死後數􅀜永言夣曼卿曰延年平生作詩多矣常以爲平陽代意篇最得意而世人少稱之能令余此詩傳扵世者在永言耳永言乃増其詞爲曲度以迷仙引扵是人争歌之他日夣曼卿致謝焉曲云春隂霽岸柳參差裊金絲細􅀞閣晝眠鶯喚起烟光媚燕燕􅀟高引愁人如醉慵緩歩眉歛金鋪􅀝嘉景易失懊惱韶光改花空委􅃘猒猒地施朱粉臨鸞鑑膩香銷减摧桃李獨自箇凝睇暮雲暗揺山翠天色無情四逺低垂淡如水離恨托征鴻􅀉旋嬌波暗落相思泪粧如洗向高樓日日春風裏悔凭闌芳艸人千里古今詩話海州士人李慎言嘗言夣至一處水殿宫觀女戯毬山陽蔡繩作傅叙其事甚詳有抛毬詞十餘首言皆清䴡今但記其两篇云侍燕黄昏晚未休玊堦夜色月如流朝來自覺承恩醉􅀏倩傍人認繡毬堪恨家㡬帝王舞䄄揉盡繡鴛鴦如今重到抛毬處不是金爐舊日香胥偃内相應舉時夣徐將軍㰱下頭項作詩云昔作􅀣頭花今為塜下骨明年徐奭牓下第二人及第南部新書僕在黄州參寥自武陵來訪館之東坡一日夣參寥誦作新詩覺而記两句云寒食清明都過了石泉槐火一時新後七年出守錢塘而參寥始卜居湖上智果院院有泉出石縫間其冷冝作茶寒食之明日僕與客泛舟自􅀌山來謁參寥汲泉鑚火烹黄檗茶忽悟所夣詩兆扵七年之前衆客驚嘆知傳記所載盖不妄也東坡詩話僕泊船呉江夣仲殊彈一琴十三絃頗損而有異聲余問云琴何爲十三絃殊不答但誦云度數形名不偶然破琴今有十三絃此生􅀂見邢和璞方信秦筝是響泉梦中了然諭其意覺而識之至晚到蘇殊當来見即以示之冩至此筆未絶殊老叩船耒見驚歎不巳遂以贈之去州五里王平甫熈寜癸丑歲直􅀫崇文院夢人邀至海上見宫殿甚盛其中作樂簫皷之􅇊甚衆其宫曰靈芝邀平甫俱徃有人在宫側隔山水曰時未至且令去他時迎之恍然夣􅁴時禁中巳鳴鍾平甫頗自􅀒非凢為詩記之曰萬頃波濤木葉飛笙簫宫殿􅃅靈芝揮毫不似人間世長樂鍾聲夣覺時後四年平甫卒其家哭訊之嘗夣靈芝宫其信然乎當兆告我是夕暮奠􅀂有聲音接人其家復卜之果􅀗兆昔有人至海上蓬萊見樓䑓中有待樂天之室樂天自為詩以紀其事與平甫之夣實相似盖二人皆天才逸􅀤則其精神所寓必有異者物理盖有之而不可窮也紀詩王仲簡潭州人少脩進士業未諧隨計性寛厚敦孝弟周􅂋德中攝長沙縣丞累任甚能為理與潭州通判耿振相善太平興國二年忽染患而亡兄仲偉夜夣莊客持書一封云評事差送來偉便開其書乃詩一章題云贈耿􅀰中曰得接英賢喜可知人生能得㡬多時自從别後顔容改恰似庭前雨淚碑仲偉夣覺而記分明衆歎訝振不十年而終郡閣雅談沈彬字子羙高安人為詩天才狂逸下筆成章好神仙之事少􅀌西逰以三舉為約嘗夣着錦綵衣貼月而飛識者言雖名播天下身不入月終不及第洪州解至長安初舉行納省卷作夣仙謡云玊殿大開從客入金桃爛熟没人偷鳯驚寳扇頻翻翅龍悮金鞭忽轉頭第二舉憶仙謡云白榆風占九天秋王母朝回宴玊樓日月漸長􅀟鳯睡桑田欲變六鰲愁雲翻簫管相隨去星觸旌幢各自流詩酒近來狂不得􅀐龍却憶上清逰第三舉贈劉􅁚一首云曾應大中天子舉四朝風月鬂蕭踈不隨世祖重携劍知為文皇再讀書十載戰塵消舊業滿城風雨壊貧居一枝何事扵君惜仙桂年年幸有餘劉􅁚三舉無成􅀌寒主司覧彬詩其年放􅁚及第五老牓即其數也彬乾符中值四方多事遂南逰湖湘及嶺表二十餘年􅁍廻呉中過江南受偽命官至吏部侍􅀰致仕退居高安雅言雜載杜牧之頻干時宰求小儀不遂求小秩又不遂嘗夣人謂曰辭春不及秋昆脚與皆頭后果得比部員外􅀰脞􅀃中書舎人崔嘏娶李續女爲曹州刺史令周邵南勾當障車後邵南因睡忽夣在㕔中女立床西嘏立床東女持紅牋題詩一首􅀏投嘏因高吟之云莫以真留妾從他理管絃容華難乆住知得㡬多年一歲而嘏妻卒余自蜀中應舉京師道過華清官夣明皇令賦太真裙帶詞覺而記之今書贈柯山潘大臨邠老云百叠漪漪水皺六銖縱縱雲輕植立含風廣殿㣲聞環珮揺聲元豐八年正月旦日子由夣李士寜草草為具夣中贈一絶句云先生惠然肯見客旋買雞豚旋烹炙人間飲酒未須嫌歸去蓬萊却無吃明年二月六日為予道之書以遺遲云増修詩話總􅀛卷之三十三百家詩話總􅀛後集卷之三十三樂府門政和元年尚書蔡嶷為知舉􅀹􅃊挾書是時有街市詞曰侍香金童方盛行舉人因以其詞只改十五字作懐挾詞云喜葉葉地手把懐児摸甚恰限出題厮撞着内臣過得不住脚忙裏只是㸔班駮這一身冷汗都如雲霧薄比似年時頭势􅁖待檢又還猛相度只恐根底有人撏着上庠錄􅂫子瞻守錢塘有官妓秀蘭夫性􅃛慧善扵應對湖中有宴㑹群妓畢至惟秀蘭不来遣人督之湏􅁷方至子瞻問其故具以􅄠結沐浴不􅁴困睡忽有人叩門聲急起而問之乃樂营将催督也非敢怠忽謹以實告子瞻亦恕之坐中倅車属意扵蘭見其晚来恚恨未巳責之曰必有他事以此晚至秀蘭力辯不能止倅之怒是時橊花盛開秀蘭以一枝藉手告倅其怒愈甚秀蘭􅀵泪無言子瞻作賀新凉以觧之其怒始息其詞曰乳燕飛華屋悄無人桐隂轉午晚凉新浴手弄生綃白􅇛扇扇手一時似玉漸困􅀝􅀌眠清熟門外誰来推綉戸枉教人夣断瑶䑓曲又却是風􅃻竹石榴半􅄍紅巾蹙待浮花浪蕊都盡伴君幽獨濃艶一枝細㸔取芳心千里重似束又恐􅀍西風驚緑若待得君来向此花前對酒不忍觸共粉泪雨蔌蔌子瞻之作皆紀目前事盖取其沐浴新凉曲名賀新凉也後人不知之誤為賀新郎盖不得子瞻之意也子瞻真所謂風流太守也豈可與俗吏同日語㢤苕溪漁隠曰野㢤楊湜之言真可入􅀏林東坡此詞冠絶古今託意高逺寕為一娼而發􅁘簾外誰来推綉戸枉教人夣断瑶䑓曲又却是風􅃻竹用古詩捲簾風動竹疑是故人来之意今乃云忽有人叩門聲急起而問之乃樂营将催督此可􅀏者一也石橊半􅄍紅巾蹙待浮花浪蕊都盡伴君幽獨濃艶一枝細㸔取芳心千里重似束盖􅀄夏之時千花事退惟橊花獨芳因以冩幽閨之情今乃云是時橊花盛開秀蘭以一枝藉手告倅其怒愈甚此可􅀏者二也此詞空調􅀉賀新􅀰乃古曲名也今乃云取其沐浴新凉曲名賀新凉後人不知之誤為賀新郎此可􅀏者三也詞話中可􅀏者甚衆姑舉其􅀹者苐東坡此詞深為不幸横遭􅀧汚吾不可無言一雪其恥宋子京云江左有文拙而好刻石者謂之詅嗤符今楊湜之言俚甚而鋟板行世殆􅀋是也古今詩話張仲宗有漁家傲一詞云釣笠披雲青嶂繞緑蓑雨細春江渺白鳥飛来風滿棹􅀵綸了漁童拍手樵青􅀏明月太虚同一照浮家泛宅忘昏暁醉眼冷㸔城市閙烟波老誰能認得閑煩恼余徃歳在錢唐與仲宗􅀙㳺甚乆仲宗手冩此詞相示云舊所作也其詞苐二句元是橛頭細雨春江􅄅余謂仲宗曰橛頭雖是舡名今以􅀨襯之語晦而病因為改作緑蓑細􅀨仲宗􅀏以為然苕溪漁隠邹志全徙昭陳莹中貶㢘間以長短句相諧樂有箇胡児摸様別滿頷髭􅂡生得渾如添見􅀃近来頭也白髭􅂡那得長長黒志句籋子摘来湏有千堆雪莫向細君容易􅀃恐他嫌你将伊􅎥此茔中語謂志全之長髭也有箇頭陀脩苦行頭上頭􅄠毶􅆴身披一副黪裙衫􅂃纒􅀟脚苦苦要逰􅀯聞說度牒朝夕到并除頷下髭髯缽中无粥住无菴摩登伽處只恐却重參此志全語謂茔中之多慾也廣陵馬推官徃来二公間亦嘗以詩詞贈之有才何事老青衫十載􅊠囬北斗柄肯伴雪髯千日醉此心真與古人參不見故人今幾年年来風物尚依然遥知閑望登臨處極目登臨萬里天志全語也一尊薄酒滿酌􅂆君君舉手不是親朋誰肯相􅀙寂寞濵人生似夣梦裏惺惺何處盞到休辭醉後全勝未醉時茔中語也初志全自元符間貶新州徽宗即位以中書舎人召未幾謫零陵别駕龍水安置未幾徙昭焉同上東坡云龍丘子自洛之蜀載二女侍戎裝駿馬至溪山佳處􅂺駐終日見者以為異人後十年築室黄岡之北號静庵居士作臨江仙贈之云細馬逺䭾双侍女青巾玉􅅁紅靴溪山好處便為家誰知巴峽路却見洛城花囬旋落英飛玉蕊人間春日初斜十年不見紫雲車龍丘新洞府鈆􅂦飬丹砂龍丘子即陳季常也秦太虚􅀉之以詩亦云侍童􅀟擢玉鬟􅄠光可照駿馬錦障泥相随窮海嶠暮年更折莭學佛得心要鬻馬放阿樊幅巾對沉燎西清詩話云季常自以為飽禅學而妻栁頗悍忌季常畏之故東坡因詩戯之有忽聞河東獅子吼柱杖落手心茫然之句􅀚此則知季常載二侍女以逺逰及暮年甘扵枯寂盖有所制而然亦可憫􅀏也同上古今詞話以古人好詞世所共知者易甲為乙􅁛其所作仍随其詞牽合為􅀃殊無根葉皆不足信也如秦少㳺千秋歳水邉沙外城郭春寒退末云春去也飛紅萬􅀧愁如海者山谷嘗歎其句意之善欲和之而以海字難押陳無巳言此詞用李後主問君都有幾多愁恰似一江春水向東流但以江為海耳洪覺範嘗和此詞題崔徽真子云多少事都随恨逺連雲海晁無咎亦和此詞吊少㳺云重感槩驚濤自捲珠沉海􅀚諸公所云則此詞少㳺作明甚乃以爲任世徳作又八六子􅀝危亭恨如芳艸萋萋剗盡還生者浣溪沙脚上鞋児四寸羅者二詞皆見淮海集乃以八六子為賀方囘作以浣溪沙為涪翁作晁無咎塩角児開時似雪謝時似雪花中竒絶者為晁次膺作汪彦章􅀧絳唇新月姢姢夜寒江静山衘斗者為􅂫叔黨作皆非也同上唐􅀄􅁔詞多是五言或七言詩􅀄無長短句自中葉以後至五代漸変成長短句及本朝則盡為此体今所存者止瑞鷓鴣小秦王二闋是七言八句詩并七言絶句詩而已瑞鷓鴣􅀹依字易歌若小秦王必湏雜以虚聲乃可􅁔耳其詞云碧山影裏小紅旗儂是江􅀯踏浪児拍手欲嘲山簡醉齊聲争唱浪婆詞西興渡口㠶初落漁浦山頭日未欹儂送潮囬歌底曲樽前還唱使君詩此瑞鷓鴣也濟南春好雪初晴行到龍山馬足輕使君莫忘霅溪女時作陽関腸断聲此小秦王也皆東坡所作同上東坡別叅長短句云有情風萬里捲潮来無情送潮㱕問錢塘江上西興浦口幾度斜暉不用思量今古俛仰昔人非誰似東坡老白首忘機記取西湖西畔正暮山好處空翠烟霏筭詩人相得如我與君希約他年東還海道願謝公雅志莫相違西州路不應囬首為我沾衣晋書謝安雖受朝􅀉然東山之志始末不渝每形扵言色及鎮新城盡室而行造汎海之裝􅁒湏經略粗定自海道還東雅志未就遂遇疾篤還都㝷薨羊曇為安所愛重安薨後輟樂弥年行不由西州路嘗因大醉不覺至州門左右曰曰此西州門曇悲感以馬䇿扣扉誦曹子建詩曰生存華屋處零落㱕山丘因慟哭而去東坡用此故事若世俗之論必以為成䜟矣然其詞石刻後東坡自題云元祐六年三月六日余以東坡先生年譜之考元祐四年知杭州六年召為翰林學士承㫖則長短句盖此時作也自後復守頴徙揚入長礼曹出帥定武至紹聖元年方􅀯遷嶺表建中靖國元年北㱕至常乃薨凡十一載則世俗成䜟之論安可信邪同上錢思公謫漢東日撰玉樓春詞曰城上風光鶯語亂城下烟波春拍岸緑楊芳艸幾時休泪眼愁腸先巳断情懐漸変成衰晚鵉鏡朱顔驚暗換徃年多病厭芳墫今日芳墫惟恐淺毎酒䦨􅁔之則泣下後閤有白􅄠姫乃鄧王􅁔鬟驚鴻也􅃍言先王􅀅薨預戒挽鐸中􅁔木蘭花引紼為送今相公亦􅀅亡乎果薨扵随州鄧王舊曲亦嘗有帝郷烟􅀨鎻春愁故國山川空泪眼之句侍児小名録曹元寵本善作詞特以紅窓逈戯詞盛行扵世遂掩其名如望月婆羅門一詞亦豈不佳詞云漲雲暮捲漏聲不到小簾櫳銀河淡掃澄空皓月當軒高挂秋入廣寒宫正金波不動桂影朦朧佳人未逄歎此夕與誰同望逺傷懐對景霜滿愁紅􅀯樓何處想人在長笛一聲中凝泪眼立盡西風此詞語病在霜滿愁紅之句時太早耳曽端伯編雅詞乃以此詞為楊如晦作非也苕溪漁隱凡作詩詞要當如常山之蛇救首救尾不可偏也如晁無咎作中秋洞仙􅁔詞其首云青烟幕處碧海飛金鏡永夜閒堦卧桂影固巳佳矣其後云待都􅀅許多明付與金墫投暁共流霞傾盡更携取胡床上􅀯樓㸔玉做人間素秋千頃若此可謂善救首尾者也至朱希真作中秋念奴嬌詞則不知出此其首云挿天翠栁􅀍何人推上一輪明月照我􅅬床凉似水飛入瑶池銀􅆣亦巳佳矣其後云洗盡凡心滿身清露冷浸蕭蕭明朝塵世記取休與人􅀃此两句全無意味􅀵什得不佳遂弃全萹其氣索然矣同上中秋詞自東坡水調􅁔頭一出餘詞盡廢然其後亦豈无佳詞如晁次膺緑頭鴨一詞殊清婉但樽爼間􅁔喉以其萹長惮唱故湮没無聞焉其詞云暁雲􅀵淡天一片琉璃爛銀􅐻来􅀙海底皓色千里澄輝莹無塵素娥澹泞净可數丹桂參差玉露􅀄零金風未凛一年無似此佳時向坐乆踈星時度烏鵲正􅀯飛瑶䑓冷攔干凭暖􅁒下遲遲念佳人音塵隔後對此應觧相思最関情漏聲正永暗断腸花影潜移料得来宵清光未减隂晴天􅂔又争知共凝恋如今别後還是隔年期人縦健清墫素月長願相随同上東坡在黄州中秋夜對月獨酌作西江月詞曰世事一塲大夣人生幾度秋凉夜来風葉巳鳴廊㸔取眉頭鬂上酒賤常愁客少月明多􅀍雲妨中秋誰與共􅀌光把盞凄然北望坡以讒言謫居黄州欝欝不得志凡賦詩綴詞必冩其所懐然一日不􅀒朝廷其懐君之心末句可見矣苕溪漁隠曰聚蘭集載此詞注云寄子由故後句云中秋誰與共􅀌光把酒凄然北望則兄弟之情見扵句意之間矣疑是倅錢塘時作子由時為睢陽幕客若詞話所云則非也古今詩話百家詩話総􅀛後集卷之三十三
