front:
  text: 增修詩話總龜卷之三十八
  hash: sha256:df48b5aa5eb51595cde7fe415d675629abdca3143353f94ad6374c7bf04624b5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_038-1a}
body:
  text: 詼諧門上太宗賜錢思公巳下孝經詩令次韵和進晁文元逈首出四句云舎後信標名風篁自有声温桑敦厚教仙果子難生思公即便對晁公今日湏了晁大􅀏諸公不曉今日孝經詩稽遲戯以此􅇂之尔四句盖次韵詩遲也祥符中日本國遣使入貢称􅀦之東有祥光現其􅀦素傳中原天子聖明則此光現聖章詔本􅀦建寺賜額曰神光朝辝日夷使乞令詞臣撰一寺記是時當制者雖中魁選然詞學不􅄖贍居常止以張君房代之盖假其稽古才雅也旣傳宣訖撰寺記時張尚為小官醉飲樊楼遣人遍京城㝷之不見而夷人在閤門翹足以候文中人三促之紫㣲大窘後錢希白楊大年因玊堂暇日改閑忙令大年曰世上何人最號閑司諌拂衣歸華山盖种放得歸山時也希白曰世上何人最號忙紫㣲失却張君房時傳此事為雅咲湘山録唐制三班奉聀月俸七百馹劵羊肉半斤祥符中有人題扵馹舎曰三班奉聀實堪悲卑賤孤寒即可知七百料錢消甚使半斤羊肉㡬時肥朝􅋝聞之謂如此責廉遂議増俸古今詩話陳亜少卿維􅀭人善詩什滑稽􅀹甚嘗與蔡君謨㑹于金山僧舎酒酣君謨題詩屏間曰陳亜有心終是􅁖即索芼對曰蔡襄無口便成衰少時為杭州扵潜令以利口謔浪人或厭之太守馬忠粛因其趋府戒之陳惧受教俄有通慄謁者称太祠郎李過庭公罵曰何人家子弟亞率尔云李趋見馬公徐悟之大􅀏唐宋遺史陳亞卿著藥名詩若風月前湖近前胡軒窓半夏凉半夏棊為臘寒呵子下呵子衣嫌春瘦縮砂栽縮砂及贈祈雨僧詩云無雨若還過半夏半夏和師􅴲作葫芦巴葫芦巴之類最膾炙人口又曾知祥符縣親故多干托借車牛因作詩曰地名京界足親知荊介託借㝷常無歇時蝎但看車前牛領上車前子十家皮没五家皮五加皮嘗言藥名用扵詩無不可而幹運曲折使各中理在人之智耳或曰延胡索可用乎曰可沉思乆之吟曰布􅂁䄂裏懐漫刺到処迁延胡索人鰻鯉延胡索此可贈㳺謁措大聞者絶倒與章郇公同年􅀅用之而為言者所沮作生查子献之曰朝􅋝数擢賢蒴旋占凌霄路凌霄花自是欝桃人桃仁險難無夷処蕪荑也知没藥療􅀌寒没薬大幅􅁓連粘大腹皮甘艸歸田賦甘草又别作閨情生查子三首其一曰相思意巳深相思子薏苡白􅁓書難足白止字字苦參商苦参故要檀卽讀狼毒分明􅀉得約當歸當帰逺志櫻桃熟逺志何事菊花時菊花猶未囬郷曲茴香其二曰小院雨餘凉禹餘粮䂖竹風生砌石竹羅扇侭􅀙容蓯容半夏沙厨睡半夏起来閑坐北亭中北亭滴盡真珠泪真珠為念􅡾辛勤細辛去折蟾宫桂桂其三曰浪蕩去来来莨菪躑躅花頻換躑躅可惜石橊裙籣麝香消半麝香琵琶閑後理相思枇杷相思必撥朱弦断篳撥擬續断朱弦續断待這􅁈家看代赭又自為亞字迷言曰若教有口便啞且要無心為􅁖中間全没肚腸外面任生稜角雖一時諧謔之詞􅀉托亦有深意又嵗旦示知巳云收寒歸地底表老向人間與人郊行云馬嘶曽到寺犬吠乍行村送㱕化宰赴闕云吏辝如賀日民送似迎時懐舊􅀮云排聮花品曾非僣愛借苔錢不是慳自成一家体青箱雜記魏仲先冦莱公㳺陜郊僧寺多㽞題後同到見莱公詩巳用碧紗籠而仲先詩獨塵昏在壁時有􅀙行官妓頗慧以紅衣䄂拂之仲先徐曰若得時􅀅紅䄂拂也􅀿勝着碧紗籠莱公大􅀏西都􅀿天院去府十里每朔望􅇔守帥府官朝拜未曉而往時行十里不交談有人作詩云正梦寐中行十里不言語處飲三盃有人送馿􅁏復云厅前捉到湏依法合内盛耒定付厨春明退朝録李濤相國性滑稽爲布衣時徃来京洛間汜水関有僧舎曰不動尊院匕中有僧不出院十餘載濤每過常謁其院必省其僧未幾寺焚僧散濤􅂯過之但有門扉而巳因題詩曰走却坐禅客移􅀅不動尊世間顛倒是八萬四千門談苑韓浦韓洎晋公滉之後咸有辭學浦善声調洎􅀎為古文洎嘗輕浦語人曰吾兄為文譬如繩樞草舎庇風雨而已予之文是造五鳯樓手浦性滑稽窈聞其言因有親知遺蜀牋浦作詩與洎曰十様蛮牋出益州􅀉来新自浣溪頭老兄得此全無用􅂇尔添脩五鳯樓同上内朝辰入庭内錯立至駕欲坐即御史㙜知班唱班欲依班立也王彦和汾與劉貢父攽同趋朝王戯劉曰内朝日日湏呼汝劉􅀿聲曰寒食年年必上公王平甫愽學耿介語言輕肆人或戯為心風熈寕中乞郡得湖州舒王以詩送之曰吴興太守羙如何栁惲詩才不足多遥想郡人迎下担白蘋江上起滄波譏其風也平甫知其意即以呉興太守羙如何為破題作詩十首其一曰呉㒷太守羙如何太守從来􅁖祝鮀生若不為上柱國死時猶合作閻羅舒王聞之曰閻王見闕請便赴任方圭好為􅁖詩宋公序知楊州日圭来謁醼于平山堂圭誦詩不巳宋欲它辭巳之頋野外牛就木磨痒謂坐客胡詼曰青牛恃力狂挨木詼􅀿声曰妖鳥啼春不避人宋公大􅀏圭悟其意飲散至客次欲􅁬拳擊詼衆捄而免並同上劉子儀三入玊堂望大用頗不懌作詩云蟠桃三􅀼成何味上盡鰲山迹轉􅀌移疾不出朝士問疾劉云虚热上攻石文㝎在坐云只銷一服清凉散謂两府方得凉繖王君貺送牡丹與永叔荅詩云最好花常冣後開盖君貺同時軰皆入两府永叔以冣後戯之也王得詩不喜對来价擲之永叔謂人曰好花不開也君貺聞之愈怒詩史李芸居扵泗上一日納姫友人鍾公􅀉詩曰昨暮閑行泗水緑楊堤上覩雲軿知君買得千金􅀏只用何曾两日錢詩史范希文以大理寺丞􅁥西溪塩塲西溪素多蚊蛃希文作詩曰飽去櫻桃重飢来栁絮輕但知求旦暮休更問前程馮瀛王性仁厚家有一池毎得魚放池中其子􅁥丞毎􅀼釣之瀛王聞之不悅扵是髙其墻垣鑰其門戸作一詩書其門曰髙卻垣墻鑰却門􅁥丞􅀙此罷垂綸池中魚鱉􅀿相賀􅀙此方知有主人呉善長郎中儀状魁偉頗􅁼冨丞相文學之譽則無焉有䡖簿子贈之詩曰文章却似呼延賛風皃還同冨相公國􅀄有武臣呼延賛好吟􅁖詩故云熈寕中章子厚察訪湖北因以兵􅀵辰溪之南江諸蛮時有呉僧願成亦在軍中自称察訪大師每出則乗大馬以撾劔擁􅀙呵殿而行随兵官李資入洞資為蛮人所殺成亦􅀍縳旣而放歸猶􅀭揚自得詩僧文莹嘲之曰童頭浮屠浙東客傳呼避道長以陌宝撾青盖官儀雄新賜袈裝椹猶黒察車後乗從驅挈庸夫無謀動蛮穴暗灘夜􅀍猿猱擒縳入新溪哭殘月䍧牱畏佛不敢烹脫身腥窟存餘生放師囬目不自愧反以意氣湘南行我聞辛有適伊川变戎預䜟麟經編暌車載􅄦吁可恠冝入熈寕志怪篇京師􅄖人以雜細物􅂾十種布於地使人暗記物色然後遣沐猴認之每沐猴得之􅄖人即曰道著也馬㽞㽞盖􅄖人呼沐猴之名熈寕庚戌春市井之人見舉子往徃亦以馬㽞目之其年状元葉祖洽赴宴扵池上有下第進士􅀉詩曰着甚耒由去賞春也􅀿有意惜芳辰馬蹄莫踏乱花碎􅇔與愁人作醉茵紬而繹之乃是着也馬㽞四字盖四句各取上一字鄭君平性滑稽及第後有人以詩来钁錢君平以詩荅曰五貫九百五十俸省錢請来足甚用還債還􅀒亦無餘買酒買肉何曾夣妻児終日只愁飢婢僕過冬由受凍更有不識事閑人献詩献啓覔甚甕張献啚主簿頴人善嘲謔以老榜得班行􅀉書于家人曰汝作鵉􅀌我為奉聀不忝矣又譏州縣官之貪汚者云棒頭舊血添新血篋裏黄金壓白金古今詩話王丞相好嘲謔􅀄执政對客悵然曰投老欲依僧􅂯三言之客􅀿之曰急則抱佛脚丞相善之復曰投老欲依僧是古人一句詩客急則抱佛脚亦是俗諺全句上去頭下去脚豈是的對丞相大􅀏祕書省東即䂖威衛营荒䉑搉毁其大厅逼校正院南對御史㙜有人嘲之曰門縁御史塞厅為校書侵宋中道有俊才而身短小人多戯之蘇子羙與中道年相懸然甚愛其才調道亦傾心作詩論交子羙長大魁偉與中道並立下視曰交不着此京師市井語也號中道為宋錐為其頴利而么麽云贈之詩曰譬如利錐末所到物巳破後中道通判洛州洛州本趙地有毛遂墓聖俞作詩送行㪯錐処囊事亦所以戯之也太宗時進士同年有数人名似姓者􅂉有取以為詩云郭鄭鄭東東野絡馬張張夏夏侯璘熈寕中有崔度崔公度王韶王子韶皆的對也又有章君陳陳君章二人未有似者唐東方虬欲為西門豹作對亦當時好事者為此對耳給事中馬子山穆王八駿有山子馬王丞相云馬子山􅀐山子馬莫有對者相傳乆之有姓錢人為衡水令罷歸或取以為對云錢衡水盗水衡錢錢聞之變色或者對云吾正欲作對耳非有實也古今詩話咸通中以舉子衣車服侈異下令不許乗馬時塲中不下千人皆跨長耳或嘲之曰今年勑下盡􅀐馿短帽長鞭满九衢清瘦児􅀰猶自可就中愁殺鄭昌圖鄭昌圖魁偉故有此句開元中宰相􅂫味道張昌齡皆有詩名暇日相㑹互相嘲謔昌齡曰某詩所不及相公者為無銀花合盖􅂫元夕詩有火樹銀花合之句也味道曰某詩所以不及相公者為無今同丁盖張贈張昌宗詩有昔日浮丘伯今同丁令威之句也遂相對抚掌而􅀏武后朝左司􅀰中張元一滑稽時西戎犯邉武后欲武氏立功因行爵賞命武懿宗統兵平之冦未入境懿宗􅅻逾邠畏懦而遁懿宗陋短元一嘲之曰長弓與短箭蜀馬臨髙蹁去賊七百里隈墻獨自􅀾忽然逄着賊􅀐猪向南迍天后聞之未暁曰懿宗無馬􅁘何故􅀐猪元一觧曰􅀐猪夾豕也天后大􅀏捴章二年興善寺火塑像焚盡道士李宗嘲之曰道善何曾善言㒷又不㒷如来燒亦盡堆有一群僧文潞公常言潞中有一士人􅁨制中㳺處坐中有人嘲􅂺嘗自云有年光徳一王伸恋酒貪歌不厭貧三年得替㱕朝去嬴得髭鬚白似銀其不覊檢也如此特好事人有善必􅄖禮待之僧乾康金仙皆以能詩登門士儒閻羽卿通尚書春秋鄧潜有詞學每接見則疑語忘倦議者以此称之零陵捴記雪􅈐悅禅師與㒷化銑公友善旣老迎送不巳悦戒曰公不䄂手山林尚忍垢乎銑一日送官堕馬損臂悅作偈戯云大悲菩薩有千手大丈夫児誰不有㒷化和尚折一支由有九百九十九南華恭長老同嗣大愚少叢林有書叙法乳悅作偈曰與師瓶􅃬􅀉江湖共憶當年在大愚堪􅀏堪悲無限事甜􅀲生得苦葫蘆東坡􅀫曹溪讀傳灯録灯花堕卷上焼一僧字以筆記于窓曰曹溪岑寂寞灯下讀傳燈不斍灯花落茶毘一個僧増修詩話總􅀛卷之三十八百家詩話総􅀛後集卷之三十八箴規門東坡山村詩云􅃄雨濛􅄥雞犬聲有生何処不安生但教黄犢無人佩布榖何劳也􅂆耕意言是時販􅀻塩者多􅅁刀杖故取前漢龔遂令人賣劍買牛賣刀買犢曰何為􅅁刀佩犢意言但得塩法寛平令民不􅅁刀劒而買牛犢則民自力耕不劳􅂆督以譏塩法太峻不便也又云老翁七十自腰鎌慙愧春山筍蕨甜豈是聞韶觧忘味尔來三月食無塩意言山中之人飢貧無食雖老猶自採筍蕨􅏺時塩法峻急僻逺之人無塩食用動經數月若古之聖賢則能聞韶忘味山中小民登能食淡而樂乎以譏塩法太急也又云杖蔾褁飯去匆匆過眼青錢手空嬴得児童語音好一年強半在城中意言百姓請得青苗錢立便扵城中浮費使却又言鄊村之人一年两度夏秋税及􅂾度請納和預買錢今來更添青苗􅂇役錢因此荘家㓜小子弟多在城市不着次苐但斈得城中人語音而巳以譏新法青苗􅂇役不便也東坡開運塩河詩云居官不任事消散羡長卿胡不歸去來􅆡􅇔愧渊明塩事星火急誰能卹農耕薨薨曉鼓動萬指羅溝坑天􅀨助官政泫然淋衣纓人如鴨與猪投泥相濺驚下馬􅂽堤上四頋但湖泓綫路不容足又與牛羊争㱕田雖賤辱豈失泥中行􅀉語故山友謹勿藜羮是時盧秉提舉塩事擘畫開運塩河差夫千餘人某扵大雨中部役其河只為般塩旣非農事而役農民秋田未了有妨農事又其河中間有涌沙数里意言開得不便自歎泥􅀨劳苦羡司馬長卿居官而不任事又愧陶渊明不早弃官㱕去也農事未休而役千餘人故云塩事星火急誰能卹農耕又言百姓巳劳苦不易天􅀨又助官政之劳民轉致百姓疲􅁦役人在泥水中辛苦無異鴨與猪又言某亦在泥中與牛羊争路而行若㱕田豈失此㢤故云􅀉語故山友謹不可厭藜􅅅而思仕宦以􅏺開運塩河不當又妨農事也蘇東坡八月十五日􅀚潮作詩云呉児生長狎濤渊冐利忘生不自怜東海若知明主意應教斥鹵變桑田時新有㫖禁弄潮故云呉児生長狎濤渊冐利輕生不自怜盖言弄潮之人為貪官中利物致其間有溺死者故朝㫖禁断某為其時又好興水利因作此詩言東海若知明主意應教斥鹵変桒田意言東海若知此意當令斥鹵地盡変桑田此事之必不可成者以􅏺興水利之難成也子瞻任杭州通判日轉運司差徃湖州相度堤岸利害因與知湖州孫斍相見作詩與孫斍云嗟余與子乆離群耳冷心􅁅百不聞苦對青山談世事當湏㪯白便浮名某是時約孫斍并坐客如有言及時事者罸一大盞雖不指言時事是非意言時事多不便不得說也又云天目山前渌浸􅅂碧瀾堂下㸔衘艫作堤捍水非吾事閑送苕溪入太湖某為先曽言水利不便却􅀍轉運司差相度堤岸又云作堤捍水非吾事意言本非㒷水利之人以譏諷水利之不便也王詵送韓幹􅀞馬十二疋求跋尾子瞻作詩云􅀯山之下汧渭之間想見開元天寳年八坊分屯隘秦川四十萬疋如雲􅃄騅駓駰駱􅌐驑騵白魚赤兎騂皇䮧龍顱鳯頸獰且妍竒姿逸徳隠駑頑碧眼胡児手足鮮歳時剪刷供帝閑柘􅂁臨池侍三千紅粧照日光流渊楼下玉螭􅄍青寒徃來蹙踏生飛湍衆工甜茟和朱鈆先生曹覇弟子韓廐馬多􅁏凥脽圎􅁏中􅀞骨誇􅀹難金覊玉勒綉羅鞍鞭箠刻烙傷天全不如此圗近自然平沙細艸荒芊綿驚鴻脫兔争後先王良挾䇿飛上天何必俯首服短轅意以騏􅂹自比􅏺执政大臣無能盡我才如王良之御者何必折莭干求進用也子瞻臈月逰􅀌山詩云獸在薮魚在湖一入池檻㱕期無悞随弓旌落塵􅁟坐使鞭箠環呻呼追胥連保罪及孥百日愁歎一日娯白雲舊有終老約朱綬豈合幽人紆人生何者非􅕋庐故山鶴怨秋猿􅀌何時自駕鹿車去掃除白髮煩菖蒲麻鞋短􅄄随獵夫射弋狐兎供朝晡陶潜自作五栁傳潘閬􅀞入三􅈐圖吾年凛凛今幾餘知非不去慙衞􅕋歳􅂽無術㱕亡逋鵠則晝虎為難摹此詩云悞随弓旌落塵􅁟坐使鞭箠環呻呼以譏新法行後公事鞭箠多也詼諧門老杜贈􅅊左丞有朝叩冨児門暮随肥馬塵至為殘盃冷炙之語及姜少府為清觴異味即云新􅂬使飽姜侯徳王􅀝為沽酒割鮮即云故人情義晚誰似豈附炎老饕如是㢤盖託文字戯謔也然又不可不慮故有􅄶性貪幽捿干謁傷直恥事干謁以自見其志亦如示姪佐云甚聞霜薤白重恵意如何巳應舂得細頗斍􅀉來遅皆戯言也終慮痴人以夢為實故示姪済云所來為宗族亦不為􅐻飱小人利口實薄俗難可論正如渊明乞食篇云飢來駈我去不知意何之行行正斯里扣門拙言辞其卑汚乃尔不肯為五斗拆腰殆與異矣試問高呼二十首何如􅊠唱两三盃又譬如長大人不以長為苦㱕來􅀍上下一夜著無処天斍真賛云書生大抵多穷相金眼除非是党公皆􅀏林語也北夣􅃈言載江陵世號衣冠薮澤人言琵琶多如飯甑措大多如鯽魚退之酧崔少府伊陽詩云下言人吏希惟足彪與虥余官辰溪時士人皆可喜而不多得近城人虎雜居戯為對云固冠思得多扵鯽士人刻木惟冝少似彪吏人某見同㑪因行飲令人索一魚名有浙人大唱云周公魚余謂客坐且喜召伯鮓有對矣滿堂芦胡不止因戯爲􅁕成其語云京語鮓先誇召伯浙音魚或號周公䂬溪文潜詩児曹鞭笞學官府翁怜児痴旁􅀏侮平明坐衙鞭復呵賢扵群児能幾何児曹鞭笞以爲戯翁怒鞭人血流地一種戯􅇵誰后先我􅀏爲公児更賢余謂此詩亦不可不令操􅁠者知也坡云不辭脱袴溪水寒中水照見催租瘢等閑戯語亦有所􅀘後山詩話云楊大年傀儡詩云鮑老當筵􅀏郭郎􅀏他舞䄂太琅璫若教鮑老當遥舞轉更琅璫舞䄂長語俚而意切相傳以爲􅀏後山詩話云乞猫詩秋来䑕軰欺猫死窺瓮翻􅐻攪夜眠聞道狸奴將数子買魚穿栁聘衘蝉雖滑稽而可喜千􅀊而下讀者如新王直方詩話云謝王炳之惠玉板􅁓詩云王侯髩若緑坡竹此出髯奴傳炳之大以為憾送零陵主簿夏君玉詩未云因行訪幽禅頭陁􅃄􅀨外盖君玉頭甚大故以此戯之東軒茟錄云陶榖乆在翰林意希大用仍俾其黨因事薦引言榖在詞禁宣力實多微伺上㫖太祖􅀏曰翰林草制皆檢前人舊本改換詞語所謂依様晝葫蘆耳何宣力之有榖聞之作詩曰官職湏由生処有文章不􅃹用時無堪􅀏翰林陶李士年年依舊晝葫蘆太祖薄其怨望遂决意不用矣西清詩話云髙英秀者呉越國人與賛寜為詩友口給好罵滑稽每見眉目有異者必噂短扵其後人號悪啄薄徒嘗譏名人詩病云李山甫覧漢史云王莾弄来曽半破曹公􅀅去便平沉㝎是破船詩李群玉詠鷓鴣云方穿詰曲﨑嶇路又听鈎輈格磔聲㝎見􅆊語詩羅􅀮云雲中雞犬劉安過月􅂻笙􅁔煬帝㱕㝎見鬼詩杜荀鶴云今日偶題題似着不知題後更誰題此衞子詩也不然安有四蹄賛寕􅀏􅒜而巳苕溪漁隠曰劉義落葉詩云返蟻難㝷穴㱕禽易見窠滿廊僧不厭一片俗嫌多鄭谷桞詩云半烟半􅀨溪橋畔間杏間桃山路中㑹得離人無限意千絲萬絮惹春風或戯謂此二詩乃落葉及栁謎子􅀚者試一思之方知其善謔也隠居詩話云昨夜隂山吼賊風帳中驚起黒髯翁平明不待全師出連把金鞭打鉄􅍡不知何人之詩頗為邉人傳誦有張師雄者居洛中好以甘言悦人晚年􅀹甚洛人目為􅁡翁翁㑹官扵塞上一夕傳胡􅀐犯􅁁師雄倉皇震恐衣皮裘两重伏扵􅁟穴中神如痴矣秦人呼􅁟窟為􅁟空􅃍為無名子改前詩以嘲之曰昨夜隂山賊吼風帳中驚起􅁡翁翁平明不待全師出連着皮裘入􅁟空許身一何愚自比稷與契杜陵布衣老且愚信口自比稷與契其平居趋超自是唐虞上人時夸儀秦似不可曉飃飄􅂫季子六印佩何遲敝裘蘇季子歴國未知還季子黒貂敝得無妻嫂欺􅀾囯奸民蘇張為渠此老不應未喻及􅀚薇蕨餓首陽裘馬資歴聘賤子欲適􅀙疑誤此二柄其意甚明前言盖戯耳䂬溪許彦周詩話云黄魯直爱與郭㓛甫戯謔嘲調雖不當盡信至如曰公做詩費許多氣力做甚此語切當有益扵學者不可不知也百家詩話総􅀛卷之三十八
