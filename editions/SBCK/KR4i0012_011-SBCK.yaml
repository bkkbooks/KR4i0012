front:
  text: 増修詩話總􅀛卷之十一
  hash: sha256:4b918a5bf50eff166d8baded87993839e5f9d6d36dc470b418f68949ca9a0bf0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_011-1a}
body:
  text: 雅什門下張瀛碧之子也事廣南劉氏官至曹􅀰嘗爲歌贈琴棋僧同列見之曰非其父不生其子詩云我嘗􅃪師法一說波上蓮花水中月不垢不净是色空無法無空亦無㓕我嘗聴師禪一􅀚浪溢鰲頭蟾魄滿河沙世界盡空空一寸寒􅁅冷燈畔我又􅃪師琴一撫長松喚住秋山雨絃中雅弄若鏗金指下寒泉流太古我又􅃪師棋一着山頂坐沉紅日脚阿誰稱是國手人羅浮道士賭却鶴輸却藥法懷斟下紅霞丹束手不敢争頭角雅言系述翁宏字大舉桂嶺人常寓居韶賀間不仕進能詩宫詞云又是春殘也如何出翠帷落花人獨立㣲雨燕􅀟飛寓目魂將㫁經年夣亦非那堪向秋夕蕭颯暮蟾輝秋風曲云又是秋殘也無􅂓意若何客程江外逺歸思夜深多峴首飛黄葉湘湄走白波仍聞漢都護今歲合休戈塞上曲云風高􅃓力大霜重角聲乾海中山云客㠶來異域別島落蟠桃中秋月云寒清萬國土冷􅋐四維根曉月云漏光殘井甃缺影背山椒送人下峽云萬木殘秋裏􅀌舟半夜􅆐南越行云因㝷買珠客悮入射􅆐家細雨云何處殘春夜和花落古宫途中逢故人云孤舟半夜雨上國十年心開寳中衡山處士瘳融南逰宏有詩云病卧瘴雲間莓苔漬竹􅀜􅀌吟牛渚月老憶洞庭山壮志潜消盡淳風竟未還今朝忽相遇執手一開顔宏以百篇示融融謝宏云高竒一百篇見造化工全積思逰滄海冥搜入洞天神珠迷罔􅁚瑞玉匪雕鐫休歎不得力離騷千古傳王元懷云獨夜思君切無人知此情滄洲歸未得華髮別來生􅀌舘木􅀄落高空月正明逺書多隔歲猶念没前程皆佳句也張子明攸縣人居鳯巢山有詩名􅀌鴈一篇最佳云􅃗影翩翩下碧湘旁池鴛鷺下銀塘雖逢夜雨迷深浦終向晴天着舊行憶伴㡬回思片月蛻翎多爲繋繁霜江南塞北俱􅀜念两地歸飛似故郷路洵羙唐相岩之元孫有夜坐詩云簾捲竹軒清四鄰無語聲漏從吟裏轉月自坐來明草木露華􅊜衣裳寒氣生難逢知鍳者空恱此時情兢傳於湖南伍彬邳陽人初事馬氏王師下湖湘授官爲安邑簿秩滿歸􅀮題全義分水嶺云前賢功及物禹後杳難儔不及古今色平分南北流寒衝山影岸清繞荻花洲盡是朝宗去潺湲早晚休夏日喜雨云稚子出看莎徑没漁翁來報竹橋流辭觧牧云蹤跡未辭鴛鷺客夣魂先到鷓鴣村洎居􅀮廖融書其屋曰圓塘緑水平魚躍紫蓴生要路貧無力深村老退耕犢隨原艸逺蛙傍塹籬鳴撥棹茶川去初逢榖雨晴路振贈詩云考終秋髩白歸􅀮舊峰前庭􅀣鳥頻啄山房人尚眠寒岩落桂子野水過茶烟已絶勞生念䖍心向竺乾王元字文元桂林人有登祝融峰詩云草叠到孤頂身齊高鳥翔􅀔疑撞翼軫翠欲滳瀟湘雲􅊜幽崖滑風梳古木香晴空􅂓縱目杳杳極窮荒又􅃪琴云拂塵開素匣有客獨傷時郡閣雅談記第二句何事獨顰眉古調俗不樂正聲君自知寒泉出澗澁老檜􅀝風悲縱有來聴者誰堪􅁇子期題鄧真人遺址云三千功滿輕升去留得山前舊􅀮基但見白雲長掩映不知浮世幾興衰松梢風觸霓旌動㯶葉霜霑鶴翅垂近代無人㝷異事野泉噴月冩秋池與廖融為詩友贈之云伴行惟瘦鶴㝷寺入深雲終于長沙李韶郴州人苦吟固窮題司空山觀云梁代真人上紫㣲水盤山脚五雲飛杉松老盡無消息犹得千年一度歸識者謂韶必無名果如其言王元有詩悼之云韶也命何竒生前與世違貧棲古􅆊刹終着舊麻衣雅句僧抄遍􅀌墳客吊稀故園今孰在應見夣中歸陸蟾不知何許人居攸縣司空山聞子䂓云後夜入清明逰人何處聴花殘斑竹廟雨歇峴山亭􅀣罅月欲落牕間酒正醒衆禽方在夣誰念爾勞形王操字正羙江左人太平興國上南郊賦授太子洗馬奉使隴右至石濠驛作黄葵詩扵壁云昔年南國看黄葵雲鬂金􅁫向後垂今日林容籬落下秋風寂寞两三枝李相國昉自延安入覲見詩愛之後贈相國云䄂中諌草朝天去頭上宫花侍宴歸贈劉將軍云三十懸鉤事聖朝功名常愛霍嫖姚錦衣香重花垂足玉帶光寒雪遶腰秣馬暖思秦地草弦􅃓秋憶鴈門鵰清時閑却英雄興醉聴笙歌擲酒瓢寒食云馬揺金勒嘶村墅人搶花毬落野田夜宴云彩牋分卷碧雲薄蠟燭對燒紅淚乾同前卞震蜀人嘗吟即事云雨壁長秋菌風枝落病蟬又云老笻搘瘦影寒木凭吟身春日偶題云詩債到春無處避離愁因醉暫時無即事云茶香解睡磨鐺煑山色牽懷着􅄚登並同前郭功父方與荆公坐有一人展刺云詩人龍太􅀄功父勃然曰相公前敢稱詩人其不識去就如此荆公曰且請來相見旣坐功父曰賢道能作詩能為我賦乎太初曰甚好功父曰只從相公請箇詩題時方有一老兵以沙撩銅噐荆公曰可作沙詩太􅀄不須刻間誦曰茫茫黄出塞漠漠白鋪汀鳥去風平􅂐潮回日射星功父閣筆太初縁此名聞東南余後扵喬希聖家見太初詩一軸皆不及前所作直方詩話東坡作彭門守時過齊州李公擇中秋席上作一絶云暮雲收盡溢清寒銀漢無聲轉玉盤此生此夜不長好明日明年何處看其後山谷在黔南令以小秦王歌之韓持國酴醿一絶云平生爲愛此香濃仰面常迎落絮風每到春歸有遺恨典刑􅀹在酒桮中詩云春隂垂野草青青時有幽花一􅀣明晚泊孤舟古祠下滿川風雨看潮生此蘇子羙詩也雙同集並同前賀方回題一絶于定林云破氷泉脉漱籬根壞衲遥疑掛樹猿蠟􅄚舊痕㝷不見東風先爲我開門舒王見之大稱賞縁此知名詩云欲掛衣冠䄂武門先㝷水竹渭南村却將舊斬樓蘭劍買取黄牛教子孫不知何人作石曼卿以書名世然愈大愈妙嘗書三佛名最爲雄俊張文潜有詩云煌煌三佛名榜鐡金石鈕開張宫室上渾質山岳厚井水駭龍吟蟻封􅀚驥驟余愛能道其妙處詩曰蛟室圍青艸龍堆􅀮白沙護江盤古木迎棹舞神鵶破浪南風正収㠶畏日斜雲山千萬叠何處上仙槎此老杜過洞庭詩也李希聲云得之扵江心一小石􅈓人生燭上花火㓕巧妍盡春風饒􅀣頭日與化工進只知雨露貪不聞零落近昔我飛骨時􅃤見當􅂗墳青松靄朝霞縹緲山下村旣死眀月魄無復玻瓈魂念此一脫灑長嘯登崐崘醉着鸞鳯衣星斗俯可捫又曰朝披夣澤雲笠釣青茫茫㝷緑得􅀟鯉中有三元章􅂐字若丹蛇遶􅀔如飛翔歸來問天老奥義不可量金刄割青紫靈文爛煌煌嚥服十二環奄有仙人房暮跨紫鱗去海氣侵肌凉龍子善變化化作梅花粧贈我叠叠珠靡靡明月光勸我穿絡縷繋作􅅂間璫挹予以詞去談􅀏聞餘香元祐八年東坡帥定武李方叔王仲􅃓别於惠濟出示南岳典寳東華李真人像又出此二詩曰此李真人作也近有人於江上遇之得此云即李太白也並同前楊大年錢文僖晏元獻劉子儀以文章立朝為詩皆宗李義山􅃅西崑體後進效之多􅀼取義山語御嘗賜百官宴優人有裝為義山者衣服敗裂告人曰為諸舘職撏撦至此聞者大噱然大年漢武詩云力通青海求龍種死諱文成食馬肝待詔先生齒編貝忍令乞米向長安義山不能過古今詩話王正白唐末大播詩名嘗作御溝詩云一􅂀御溝水緑槐相䕃青此波􅆂帝澤無處濯塵纓鳥道來雖險龍池到自平朝宗心本切願向急流傾示貫休休曰剰一字正白􅀭􅃑而去休曰此公思敏書一中字扵掌逡巡正白回曰此中􅆂帝澤休以掌中示之不異所改青􅃈後集史青零陵人其先名籍秦隨㓜而聰敏博聞強記開元初上上表自薦臣聞曹子建七歩成章臣愚以為七歩太多若賜召試五歩之内可塞明詔明皇試以除夜上元觀燈竹火籠等詩惟除夜最佳云今歲今宵盡明年明日催寒隨一夜去春逐五更來氣色空中改容顔暗裏摧風光人不􅁴巳入後園梅唐宋詩以為王湮作明皇稱賞授左僧乾康零陵人齊已在長沙居湘西道林寺乾康徃謁之齊巳知其為人使謂曰我師門仭非詩人不㳺大徳來非詩人􅁘請為一絶以代門刺乾康詩曰隔㟁紅塵忙似火當軒青嶂冷如氷烹茶童子休相問報道門前是衲僧齊巳大喜日與欵接及別以詩送之乾康有經方干舊居詩云鏡湖中有月處士後無人荻笋抽高節鱸魚躍老鱗為齊巳所稱乾徳中左􅀘􅆣王伸知永州康捧詩見伸覩其老醜曰豈有狀貌如此能為詩乎冝試之時積雪方消命為詩康曰六出竒花巳住開郡城相次見樓䑓時人莫把和泥看一片飛從天上來伸驚曰其㫖不淺吾豈可以貌相人也待以殊禮賈島詩有影落句韓退之喜之渡桑乾詩曰客舎并州巳十霜歸心日夜憶咸陽如今又渡桑乾水却望并州是故郷赴長江道中詩曰䇿杖馳山驛逢人問梓州長江那可到行客替生愁冷齋夜話韓子蒼曰丁晋公海外詩云艸解忘憂憂底事花名含􅀏􅀏何人世以為工及讀東坡詩曰花非識面常含􅀏鳥不知名時自呼便覺才力相去如天淵余自并州還江南過都下蔡子因約相見相國寺問余有詩且曰覺範有寒嵓上元懷京師詩曰上元獨􅀫寒嵓寺卧看青燈映薄紗夜乆雪􅆐啼岳頂夣回清月上梅花十分春瘦縁何事一掬歸心未到家却憶少年行樂處軟紅香霧噴東華今能作京師上元懷山中可乎余爲之曰北逰爛熳看并州重到皇州及上元燈火風光記前事􅃹絃音律試新畨期人未至情如海穿市歸來月滿軒却憶寒岩曾獨􅀫雪牕殘夜一聲猿世徒知文與可掃墨竹不知其髙才兼諸家之妙詩􅀹精絶戯作鷺鷥六言曰頸細銀鉤淺曲脚高緑玉深翹岸上水禽無數有誰似汝風標並同前苦吟門李昪受禪之􅀄忽半夜寺僧撞鍾滿城皆驚召將斬之對云夜來偶得月詩乃曰徐徐東海出漸漸上天衢此夕一輪滿清光何處無喜釋之江南野録潘閬自號逍遥子作苦吟詩曰髮任莖莖白詩須字字清同前方干為詩練句字字有功􅀉人云鶴盤逺􅀔投􅀌嶼蟬曵殘聲過別枝鑑戒録唐人為詩常積思數十年然後各自名家杜少陵云更覺良工用心苦豈特我㢤古今詩話陳舎人從易當時文盛之際獨以醇儒古學見稱詩􅀋白樂天自稱楊劉唱和西崑集行後進學者争效之風雅之變謂之崐體由是唐賢諸集廢而不行陳公時偶得杜集舊本文多脫誤至送蔡都尉詩云身輕一鳥其下脫一字陳公與數客各用一字􅀘之或云疾去落或云下莫能定后得一善本乃是身輕一鳥過陳公歎服以為雖一字諸君亦不能到歐公詩話龎潁公喜為詩雖臨􅁁典郡文案委前日不廢三两篇以此為􅃴及疾甚余時為諌官以十餘篇相示手批其後曰欲令吾弟知老夫疾中尚有此思耳字巳慘淡難識數日薨閒居詩話㓂萊公延僧惠崇扵池亭分題爲詩公探得池上柳青字韻崇探得池鷺明字韻自午至晡崇忽􅀧頭曰得之矣此篇功在明字凢五壓不倒公曰試口占曰雨歇方塘溢遲回不復驚􅁀翎沙日暖引歩島風清照水千㝷逈棲烟一􅀧明主人池上鳯見爾憶蓬瀛公􅀏曰吾柳之功在青字而四壓不倒不如且已貫休懷武昌故樓云風清江上寺霜洗月中砧得句先呈佛無人知此心賈島􅀄赴舉在京師一日於驢上得句云鳥􅀫池中􅀣僧敲月下門又欲推字煉之未定扵驢上吟哦引手作推敲之勢􅀚者訝之時韓退之􅁠京兆尹車􅀐方出島不覺行至第三節尚爲手􅀔未巳俄爲左右擁至尹前島具對所得詩句推字與敲字未定神逰􅁚外不知廻避退之立馬乆之謂島曰敲字佳遂並轡而歸共論詩道留連累日因與島爲布衣之交有贈島詩曰孟郊死葬北邙山日月風雲頓覺閒天恐文章聲㫁絶故生賈島在人間自此名著後因不第乃為僧改􅃅無本居于法乾寺與無可唱和一日宣宗㣲行至寺聞鍾樓上有吟聲遂登樓扵島按上取詩卷覧之島不識乃攘臂睨之遂於手内取詩卷曰􅀰君何㑹此􅁘宣宗下樓而去旣而島知之亟謝罪乃賜御札除遂州長江簿後遷普州司倉卒故程錡以詩悼之曰􅀝恃詩難􅁇昻藏貌不恭􅀐驢衝大尹奪卷忤宣宗馳譽超前軰居官下我儂司倉舊曹署一見一心忡王元贈詩曰江城賣藥常將鶴古寺看碑不下驢唐宋遺史僧齊巳徃􅀽州謁鄭谷獻詩曰高名喧省闥雅頌出吾唐叠巘供秋望飛雲到夕陽自封修藥院別下着僧床幾話中朝事乆離鴛鷺行谷覧之云請改一字方得相見經數日再謁稱巳改得詩云别掃着僧床谷嘉賞結為詩友郡閣雅談賈島元和中嘗跨驢張盖横截天街時秋風正厲黄葉可掃島吟曰落葉滿長安求一聮不可得不知身之所從因衝京兆尹劉栖楚節􅀍繫一夕釋之又嘗遇武宗於定水精舎島􅀹肆慢武宗訝之他日另與一日授長江尉至普州司倉卒永叔言苦吟句云一句坐中得片心天外來茲所謂苦吟破的之句青􅃈集詩話緫􅀛卷之十一百家詩話總􅀛後集卷之十一庚集舒城阮一閱編皇明宗室月窓道人刋鄱陽程珖校評論門翰􅁐作春帖子徃徃秀䴡可喜如蘇子容云璇霄一夕斗杓東㶑灔晨曦照九重和氣熏風摩盖壌競消金甲事春農鄧温伯云晨曦㶑灔上簾櫳金屋熈熈歌吹中桃臉似知官宴早百花頭上放輕紅蔣頴叔云昧旦求衣向曉雞蓬萊仗日下將西花添漏䜵三聲逺柳映春旗一色齊梁君貺詩云東方和氣斗回杓龍角中星轉紫霄聖主問安天未曉求衣親護玉宸朝皆佳作也余觀鄭毅夫新春詞四首其一云春色應隨歩輦還珠旒玊几照龍顔紫雲殿下朝元罷便領東風到世間其二云春風細拂緑波長初過層城渡建章草色未迎雕輦翠柳梢先學赭衣黄其三云晴暉散入鳯凰樓一行朱簾不上鉤漢殿􅋐簮􅀟彩燕併和春色上􅁫頭其四云小池春破玉玲瓏聲觸簾鉤漸好風閑繞䦨干搯花􅀣春痕已着半梢紅觀此四詩與帖子格調何異豈乆扵翰􅁐而筆端自然習熟􅁘丹陽集張籍韓愈高弟也愈嘗作此日足可惜贈之八百餘言又作喜侯喜至之篇贈之二百餘言又有贈張籍一篇二百言皆不稱其能詩獨有調張籍一篇大尊李杜而末章有顧語地上友經營無太忙之句病中贈張籍一篇有半􅂗喜開鑿􅂀别失大江吾欲􅄹其氣不令見麾幢之句醉贈張徹有張籍學古淡軒昻避雞群之句則籍有意扵慕大而實無可取者也及取其集而讀之如送越客詩云春雲剡溪口殘月鏡湖西逢故人詩云海上見花􅀤瘴中聞鳥飛送海客詩云入國自獻寳逢人多贈珠紫掖􅀤章句青闈更詠歌如此之􅀋皆駢句也至語言拙惡如寺貧無施利僧老足慈悲収拾新琴譜封題舊藥方多申請假牒秪送賀官書此􅀹可􅀏至扵樂府則稍超矣姚秘􅁥嘗稱之曰妙絶江南曲凄凉怨女詩白太傅嘗稱之曰􅀹攻樂府詞舉代少其倫由是論之則人士所稱者非以詩也應制詩非他詩比自是一家句法大抵不出扵典實冨艶爾夏英公和上元觀燈詩云魚龍曼衍六街呈金鎻通宵啓玉扄冉冉逰塵生輦道遲遲春箭入歌聲寳坊月皎龍燈淡紫舘風㣲鶴熖平宴罷南端天欲曉回瞻河漢尚􅄹􅄹王􅄮公詩云雪消華月滿仙䑓萬燭當樓寳扇開􅀟鳯雲中扶輦下六鼇海上駕山來鎬京春酒沽周宴汾水秋風陋漢才一曲昇平人盡樂君王又進紫霞杯二公雖不同時而二詩如出一人之手盖格調當如是也丁晋公賞花釣魚詩云鶯驚鳯輦穿花去魚畏龍顔上釣遲胡文㳟云春煖仙蓂初靃靡日斜芝盖尚徘徊鄭毅夫云水光翠繞九重殿花氣濃薰萬夀盃皆典實冨艶有餘􅀂作清癯平淡之語終不近尓顔延之謝靈運各􅀍㫖擬北上篇延之受詔即成靈運乆而方就梁元帝云詩多而能者沈約少而能者謝眺雖有能速多寡之不同不害其俱工也咸平景徳中錢惟演劉筠首變詩格而楊文公與之􅂦立綽號江東三虎詩格與錢劉亦絶相􅁼謂之西崑體大率效李義山之為豐冨藻䴡不作枯瘠語故楊文公在至道中得義山詩百餘篇至扵愛慕而不能釋手公嘗論義山詩以謂包藴宻緻演繹平暢味無窮而炙愈出鑚彌堅而酌不竭使學者少窺其一斑􅀂滌腸而浣骨是知文公之詩者得扵義山者為多矣又嘗以錢惟演詩二十七聮如雪意未成雲着地秋聲不㫁鴈連天之􅀋劉筠詩四十八聮如溪牋未破氷生硯爐酒新燒雪滿天之􅀋皆表而出之詩之有思卒然遇之而莫遏有物敗之則失之矣故昔人言覃思垂思抒思之􅀋皆欲其思之來而所謂亂思蕩思者言敗之者易也鄭綮詩思在㶚橋風雪中驢子上唐求詩所㳺歴不出二百里則所謂思者豈㝷常咫尺之間所能發哉前軰論詩思多生扵杳冥寂寞之境而志意所如徃徃出於埃􅅽之外苟能如是扵詩亦庻㡬矣小􅀃載謝無逸問潘大臨云近日曾作詩否潘云秋來日日是詩思昨日投筆得滿城風雨近重陽之句忽催租人至令人意敗􅂺以此一句奉􅀉亦可見思難而敗易也米元章賦詩絶少而人罕稱之者以書名掩之也如不及陪東坡徃金山作水陸詩云乆隂障奪佳山川長瀾四隘魚龍淵衆看李郭渡浮玉晴風掃出清明天頗聞妙力開大施足病不列諸方仙想應蒼壁有垂露照水百恠愁寒烟栖雲閣云雲出救世旱澤浹雲㝷歸入石了不見豐功已如遺龍騫荐復起抱石明幽姿雲乎無定所􅀮者何當栖如此二詩殆出翰墨畦逕之表盖自邁徃凌雲之氣流出非㝷䂓索矩者之可到也韓退之調張籍詩曰刺手㧞鯨牙舉瓢酌天漿魏道輔謂高至酌天漿幽至扵㧞鯨牙其用思深逺如此􅀍獨未讀送無本詩爾其曰吾嘗示之難勇往無不敢蛟龍弄牙角造次欲手攬衆􅀑囚大幽下覷襲元窞言手攬蛟龍之角下覷衆􅀑之窞皆難事而無本勇徃無不敢盖作文以氣為主也則調張籍之句無乃亦是意乎余㐮公靖嘗在契丹作胡語詩云夜筵没邏臣拜洗兩朝厥荷情幹勒㣲臣稚魯祝若統聖夀鐡擺俱可忒没邏言侈盛拜洗言受賜厥荷言通好幹勒言厚重鐡擺言嵩髙也沈存中筆談載刀約使契丹戯為詩云押燕移離畢看房賀䟦攴餞行三匹裂宻賜十􅆛狸移離畢如中國執政官賀䟦攴執衣防閣人匹裂小木罌􅆛狸如形如䑕而大狄人以爲珎饌二詩可作對故表而出之孟郊詩云食薺腸亦苦強歌聲無􅂬岀門即有碍誰謂天地寛許渾詩云萬里碧波魚戀釣九重青漢鶴愁籠皆是窮蹙之語白樂天詩云無事日月長不覊天地闊與二子殆霄壤矣作詩貴雕琢又畏有斧鑿痕貴破的又畏粘皮骨此所以爲難李商􅀮柳詩云動春何限葉撼曉㡬多枝恨其有斧鑿痕也石曼卿梅詩云認桃無緑葉辯杏有青枝恨其粘皮骨也能脫此二病始可以言詩矣劉夣得稱白樂天詩云郢人斤斵無痕迹仙人衣裳弃刀尺世人方内欲相􅀙行盡四維無處覔若能如是雖終日斵而鼻不傷終日射而鵠必中終日行扵䂓矩之中而其迹未嘗滯也山谷嘗與􅀭明叔論詩謂以俗爲雅以故爲新百戰百勝如孫呉之兵􅁄端可以破鏃如甘蠅飛衞之射􅑃聚放開在我掌握與劉所論殆一轍矣余讀許渾詩獨愛道直去官早爲貧家客多之句非親嘗者不知其味也贈蕭兵曹詩云客道耻摇尾皇恩寛犯鱗直道去官早之實也將離郊園詩云乆貧辭國逺多病在家希家貧爲客多之實也蘇飬直清江曲見賞扵東坡以爲與李太白無異所謂屬玉􅀟飛水滿塘菰蒲深䖏浴鴛鴦是也旣為前軰所賞名已不沒而又作後清江曲一篇豈飬直尚惡其少作􅁘所謂呼児極浦下笭箵社瓮欲熟浮蛆香輕蓑浙􅄋鳴秋雨日暮乗流自相語如此等句前曲似未到也自古文人雖在艱危困踣之中亦不忘扵製述盖性之所嗜雖􅂦鑊在前不䘏也况下扵此者乎李後主在圍城中可謂危矣猶作長短句所謂攖桃落盡春歸去蝶飜金粉􅀟飛子䂓啼月小樓西文未就而城破蔡約之嘗親見其遺蒿東坡在獄中作詩贈子由云是處青山可藏骨他年夜雨獨傷神猶有所托而作李白在獄中作詩上崔相云賢相爕元氣再欣海縣康應念覆盆下雪泣拜天光猶有所許而作是皆出扵不得已者劉長卿在獄中非有所托訴也而作詩云斗間誰與看􅁈氣盆下無由見太陽一詩云壯志已憐成白髪餘生猶待􅀤青春一詩云冶長空得罪夷甫不言錢又有獄中見􅀞佛詩豈性之所嗜則縲絏之苦不能易雕章繢句之樂欤杜牧赤壁詩云折㦸沉沙鐡未消自將磨洗認前朝東風不與周􅀰便銅雀春深鎻二喬李義山集中亦載此詩未知果何人所作也俱同上百家詩話總􅀛後集卷之十一
