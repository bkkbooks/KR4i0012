front:
  text: 增脩詩話總􅀛卷之四十四
  hash: sha256:bd8b586562f1d1b4e5223ceb286e72de64355e5e959f129271dc9f46efc443ce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_044-1a}
body:
  text: 􅀮逸門章聖遣使召魏野仲先聞使至留詩一聮于壁而􅃍去云洗硯魚吞墨烹茶鶴避烟使還以壁間詩對章聖曰野不求仕矣遂不召古今詩話内侍孫可乆賦性淡薄年踰五十即乞致仕都下居苐堂北有小園城南有圃每以小車載酒優㳺自􅃴石曼卿嘗過其居贈詩曰南北占河潤幽深在禁城叠山資逺意辭俸買閑名閉戸斷蛛網折花移鳥聲誰人識高意朝野石渠生柳詠詩曰孫侯幽􅀮直城東草木扶踈一畆宫㑹珥貂璫為近侍却紆絛褐作閑翁高吟擁鼻詩懷壯雅論衡道氣充猒盡繁華天上樂始將蹤跡學冥鴻青箱雜記劉素字仲華好學不事科舉頗通迁固夀曄之書嘗有人貽之詩曰不甘五等諸侯薦直肯九重天子知然卒不及仕江南野録方干䖏士􅃅缺唇先生有司以唇缺不可與科名遂􅀮居鑑湖作閑居詩曰寒山壓鏡心此處是家林梁燕欺春醉岩􅆐學夜吟雲連平地起月向白波沉由自聞鍾角棲身可在深又曰世人如不容我自縱天慵落葉慿風掃秋粳任水春花朝連郭霧雪夜隔湖鍾身在能無事頭冝白此峰又感懷云事業不得力至今猶苦吟吟成五字句用破一生心世路屈聲滿雲溪􅁈氣深前賢多晚逹莫怕􅁂霜侵鑑戒録􅀮士張楚居洛陽平康之南與李衛公别苐為鄰山水竒秀楚風韻高㓗衛公當軸薦為左拾遺不起後出鎮過平康徃訪之楚避扵山谷衛公歎恨乆之題其門曰昔日趣黄詔余慚在鳯池今來招􅀮士恨不見瓊枝詩史張齊賢相公司空致仕歸洛康寜福夀得晋公午橋莊鑿渠通流栽花植竹日與故舊乗小車携觴逰釣牓扵門曰老夫已毁裂冠冕或公􅌧垂訪不敢迎見嘗以詩戯故人云午橋今得晋公廬水竹烟花興有餘師亮白頭心已足四登两府九尚書慕唐李大亮為人故字師亮同前康定間益州書生張俞嘗獻書朝廷天下由是知其名然不喜仕進􅀮扵青城山白雲溪時樞宻田况守成都與詩曰深慚蜀太守不及采芝人雲齋廣録程嵩字明甫延津人初舉不第遂不肯仕場屋年八十餘嘗作詩曰雖無事業傳千古却得安閑過一生同上王􅂦善歌詩好神仙事逰心物外時人或謂有所得問之終不􅂥露詩百餘篇傳扵人間五言詩贈程明甫云古縣枕前灘官閑道自安執盃山鳥唱曬藥野􅆐看石縫横琴筆槎根挿釣竿不知陶靖節早晚入雲端又贈僧云出齋􅆐獻果烹茗鳥㗸薪又題云風落桂枝驚鶴去水流山果向人來又送僧云􅀌雲蹤跡都無定出個青山入個山王易簡蕭希甫下及第名居榜尾不看榜歸華山尋就山釋􅄄授華州幕官後拜左拾遺又辭官歸􅀮留詩曰汨没朝綱愧不才誰能低折向塵埃青山得去且歸去官職有來且自來再入升朝官位諌垣䑓閣三十年官至八座乞致仕歸華山十年而終郡閣野談顧况志尚踈逸近扵方外時宰招以好官况以詩答之云四海而今已太平相公何用喚狂生此身還似籠中鶴東望瀛洲呌一聲南部新書有一武士忘其姓名志樂閑散而家甚貧嘗作詩曰人生本無累何用買山錢遂投檄而去古今詩話唐末蜀川有唐求放曠踈逸方外人也吟詩有􅀁得即將藁撚為丸投大瓢中後卧病投瓢於江曰茲瓢苟不沉没得之者方知吾苦心耳瓢至新渠江有識者曰此唐山人詩瓢也接得十纔二三題鄭處士􅀮居曰不信最清曠及來愁已空數􅀧石泉雨一溪霜葉風業在有山䖏道成無事中酌盡一盃酒老夫顔亦紅贈如上人云不知名利苦念佛老岷峨􅀘衲雲千片焚香􅂐一窠戀山人事少憐客道心多日日齋鍾罷高懸濾水羅題青城山范賢􅀚數里縁山不猒難為㝷真訣問黄冠苔鋪翠􅀧仙橋滑松􅊜香梢古道寒晝旁緑畦薅嫩玉夜開紅竈撚新丹􅀌鍾已㫁泉聲在風動瑶花月滿壇古今詩話偽蜀辛酉歲有􅀮迹于陶沙者不知所從來戴破㡌携鐵笆竹畚多扵􅀚寺閑䖏坐卧有文谷遇之以禮接之忽誦谷新詩數篇又詠自作詩曰九重天子人中貴五等諸侯閫外尊争似布衣雲水客不將名字掛乾坤劉槩字伯節青社人有氣節及苐為幕僚一任不得志弃官􅀮居冨丞相噐重之有詩云昔年曾作瀟湘客憔悴東秦歸不得西軒忽見好溪山如何却有楚郷憶讀書悞人四十年有時醉把䦨干拍閑居詩話陳陶劍浦人好逰學善觧天文長扵雅頌有詩曰中原莫道無麟鳯自是皇家結網踈與水曹任畹相善寓之詩曰好向明時薦遺逸莫教千古弔靈均晚絶縉紳之望以脩養爲事有詩曰乾坤見了文章􅂴龍虎成時印綬踈又曰蟠溪老叟無人用閑把竿教六韜又曰近來世上無徐庻誰向桑麻識卧龍陶􅀮西山産藥物數十種開寳中嘗見一叟角髪􅀍􅄄與一錬師舁藥入城鬻之􅀗貲則求鮓就爐對飲旁􅀂無人歌曰藍采和塵事紛紛事更多争如賣藥沽酒飲歸去深厓拍手歌疑其為陶焉或云得仙矣江南野録又陳陶詩有江湖水清淺不足掉鯨尾飲水狼子瘦思日鷓鴣寒一􅂦雌雄金液火十年寒暑鹿麑衣􅀉語東流任斑􅁂向隅終守鐡蓑衣諸如此不可殫紀北梦􅃈言史虚白本山東人唐晋之間中原多事見李昪屢陳治要而不用遂􅀮廬山煜徙南昌至星子渚召問曰處士􅀮居必有所得曰近得漁父一聮令誦之曰風雨掲卻屋全家醉不知煜變色時世宗已下淮南江南野録㓂豹不知何許人與謝􅀚同在唐崔裔孫相公門下以詞藻相尚謂􅀚曰君白賦有何佳語對曰曉入梁王之􅁐雪滿羣山夜登􅁃亮之樓月明千里豹唯唯􅀚大言曰僕已擅名海内子才調多胡不作赤賦豹未搜思厲聲曰田單破燕之日火燎平原武王伐紂之時血流漂杵觀大駭豹後不仕􅀮南嶽許堅不知何許人遇酒筵不問尊卑逺近必到乗興只三五盃便去性􅄝魚將魚火上旋炙熟處即吃生處復炙殊不去其鱗腸每和巾帶入溪澗内浴度目浸身出水即扵風日中坐候乾其衣服多有黤氣人惡之或有人與物忻然而受將散與貧者多扵夣中吟詩􅀫溧陽縣靈泉精舎僧出白字韻請留詩其僧對榻見熟睡至晚起出七言詩云近枕呉溪與越峰前朝恩錫雲泉額竹林晴見鴈塔高石室曾棲㡬禪伯荒碑字没秋苔深古池香泛荷花白客有經年别故林落日啼􅆐情脉脉太平興􅀦九年自茅山再逰廬山扵方先生房内安下至夜深常與數人談笑人疑􅃪堅已知之高聲云不得來不得來今在洪州西山或吉州玉笥山郡閣雅談韓退綘州人放誕不拘常跨一白驢有詩云山人跨雪精上便不論程嗅地打不動􅀏天休始行為人所稱好着寛鶴氅醉則鶴舞石曼卿贈詩曰醉狂玄鶴舞閑卧白驢號閑居詩話王兾公鎮金陵以書致錢塘講師遵式式將謁公過林逋逋以詩送云虎牙熊軾􅀮鈴齋棠􅀣隂隂長碧苔丞相望尊賔謁少清言應喜道人來同前謝逸字無逸臨川勝士也工詩能文魯直讀其詩曰晁張流也恨未識耳無逸詩曰老鳯垂頭噤不語枯木槎牙噪春鳥又曰貪夫蟻旋磨冷官魚上竿又曰山寒石髪瘦水落溪毛凋皆為魯直稱賞朱世英以八行薦入學不得已詣之信􅀫而還􅀁居溪堂生涯如龎藴余嘗過之小君方炊稚子宗野汲井無逸誦書掃除顧余放箒大􅀏曰􅂓復爾耳余作偈曰老妻營炊稚子汲水龎公掃除丹霞􅃴至弃掃迎門一􅀏相親不必靈照多通道理朱世英亦作偈曰提藍靈照掃地謝公一般是麫做作不同不假語黙通透玲瓏更􅀂未㑹換手槌胸冷齋夜話神仙上陳希夷先生每睡則半載或數月近亦不下月餘贈金勵睡詩曰常人無所重惟睡乃為重舉世皆為息魂離神不動覺來無所知貪求心愈動堪􅀏塵中人不知夣是夣又曰至人本無夣其夣本逰仙真人本無睡睡則浮雲烟爐裏近為藥壺中别有天欲知睡夣裏人間苐一玄又嘗題石水澗曰銀河􅎈落翠光冷一􅂀回環湛晚暉㡬恨却為頑石碍琉璃滑處玉花飛又冬日晚望云山􅀑煖或呼溪魚寒不跳晚景愈堪觀危峰露殘照題西峰曰為愛西峰好吟頭盡日昻嵓花紅作陣溪水緑成行㡬夜碍新月半山無夕陽􅀉言嘉遯客此處是仙鄉又華山曰半夜天香入巖谷西風吹落嶺頭蓮空愛掌痕侵碧漢無人曾嘆巨靈仙又與毛女逰曰藥苗不滿笥又更上危巔回指歸去路相將入翠烟又曰曾折松枝為寳櫛一作髻又編栗葉作羅􅃭有時問着秦宫事􅀏撚仙花望太虚翰府名談又先生唐徳宗時至僖宗封清虚處士賜宫女三人先生貯之别室以詩謝云雪為肌體玉為腮深謝君王送到來處士不生巫峽夢虚勞雲雨下陽䑓章聖累召不起有學士譏之曰秪是先生詔不出􅀂還詔出一般人先生答曰萬頃白雲獨自有一枝仙桂阿誰無后歸華隂令王睦令飲之起寢扵溪岩先生為詩曰華山高處是吾官出即凌空跨晚風䑓殿不將金鎻閉來時自有白雲封睦得詩愧謝青􅃈集張洎家居城外有一􅀮士名乃吕仙翁姓名洎倒屣見之索􅁓筆八分書七言詩一章留與洎頗言將作鼎鼐之意其末句云功成當在破􅀲年俗以破􅀲字為二八洎六十八而卒乃其䜟也仙翁詩多傳人間有自詠云朝逰北海暮蒼梧䄂裏青蛇膽氣麄三入岳陽人不識朗吟飛過洞庭湖又有飲海􅀛児人不識燒丹符子􅀑難看一粒粟中藏世界二升鐺裏煑山川之句大抵皆詞句竒怪世所傳百餘首人多誦之談苑道士馬自然有異術飲酒至一石不􅋨人有疾以雜草木揉碎呵與人食無不瘥每自吟曰昔日曾隨魏伯陽經時醉卧紫金牀東君過我多情􅂴罰向人間作酒狂廣明中梓州上升續本事集更有二首詩其一曰省悟前非一息間更抛人世弃塵寰徒誇羙酒如瓊液休戀嬌娥似玉顔含􅀏謾教心思苦别離還使􅁂毛斑雲中幸有堪歸路無限青山是我山其二曰何用燒丹學駐顔閙非城市静非山時人若覔長生藥對景無心是大還詩史殷七七有異術過潤州與客飲云某有一藝佐􅂬即顧屏上􅀞婦人曰可歌陽春曲婦人應聲遂歌其音清亮似從屏中出歌曰愁見唱陽春令人離腸結􅀰去未歸家柳自飄香雪如此者十餘曲同前吕仙翁名嵓字洞賔本􅀜右人咸通初舉進士不苐巢賊為梗携家􅀮扵終南山學老子法絶世辟榖變易形骸􅀹精劍術今徃徃有人扵􅀜右途路間與之相逢多不􅂋姓名以其趍舎動作異扵流俗故為人所疑又為篇詠章句間􅂥露其意嘗有詩送鍾離先生云得道來來相見難又聞東去幸仙壇杖頭春色一壺酒頂上雲攅五岳冠飲海􅀛児人不識燒山符子􅀑難看先生去後􅀿難老乞與貧儒換骨丹贈薛道士云落魄薛道士年高無白髭雲中卧看石雪裏去尋碑誇我吃大酒嫌人念小詩不知甚麽漢一任軰流􅅓雅言雜載又先生唐僖宗時人避冦亂多逰湖湘間或梁魏之地嘗逰大雲寺與寺僧多唱和僧有詩贈翁翁乃依韵和曰三千里外無家客七百年前雲水身行滿蓬萊為别館道成瓦礫是黄金待賔榼裏嘗存酒化藥爐中别有春積徳求師何患少由來天地不私親一日逰寂蕳觀淬劍扵石作詩贈道士侯日晦曰欲整鋒鋩敢憚勞凌晨開匣玉龍嘷手中氣岸氷三尺石上精神蛇一條姦血􅀧流隨水盡兇膏今逐漬痕銷削除浮世不平事與尔相將上九霄嘗逰長沙智度寺贈僧惠覺詩曰逹者推心兼濟物聖賢傳法不離真請師開訴西來意七祖如今未有人臨行題壁上云唐室進士今時神仙足閗紫霧却歸洞天衆方知其為吕仙翁也摭遺􅀫州天慶觀西廡下有石刻二詩盖至道中有賣墨人嘗逰扵此一日題詩曰秋景蕭蕭葉亂飛庭松影裏坐移時雲迷鶴駕何方去仙洞朝元失我期又曰肘傳丹􅂐千年術口誦黄庭两卷經鶴觀古壇槐影裏悄無人跡戸長扄或以為名吕仙翁詩也古今詩話岳陽樓有碑極大乃李觀記吕仙翁筆迹李知賀州日有道士相訪自云吕先生誦過岳陽詩云唯有城南老􅀣精分明知道神仙過李亦不曉後知岳州有白鶴寺僧見過道及吕仙翁嘗憇扵寺前松下有老人自松梢冉冉而下致恭扵先生之前曰某松之精也今見先生過禮當致謁吕書一絶扵寺壁而去獨自行來獨自卧無限世人不識我唯有城南老􅀣精分眀知道神仙過後郡守為創亭扵松下名曰回先生云古今詩話孟嘏連山人性落魄狂溺扵歌酒賦詠後捷名不欲止江左士人頗竒之贈史虚白云詩酒獨逰寺琴書多􅀉僧聖朝奄有金陵孟賔于先居連上嘏興國中亦自吉水還故郷逾年卒書生成務崇因言廬山與嘏有忘年之分興􅀦中見嘏且言自連上來㳺江左時有詩送成務崇曰同呼碧嶂前已是十余年話别非容易相逢不偶然多為詩酒役早免利名牽幸有歸真路何妨學上玄務崇詢扵連上知交皆言嘏卒已十余年矣雅言雜載許堅江左人為性藪野似非今之人年高絶不知曉人事少言人不問終日不啓口多居三茅山不知年歲形容不變好飱魚能為詩多談神仙事題茆山觀曰嘗恨清風千載欎洞天今得恣逰遨松楸古色玉壇静鸞鶴不來青帝高茅氏井寒丹已化玄宗碑㫁夣仍勞分明有箇長生路休向紅塵歎二毛早年堅以時事干江南李氏人訝其狂戇以為風恙莫與之禮一絶上舎人徐鉉云㡬宵烟日鎻樓䑓欲􅀉侯門薦禰才滿面塵埃人不識謾隨流水出山來因拂衣歸􅀮今尚在􅀮迹江淮間沈廷瑞􅀉食閣皂山舉作異俗軰盛夏向火嚴寒单衣問其故終不荅與􅀽州陳智周相善興國中無病卒于玉笥觀數年有人扵江筠路次見廷瑞共語乆之令人將詩寄智周智周得詩甚訝馳出門求送詩者已不知所在詩曰名山相别后别後㑹難期金􅂦銷紅日丹田老紫芝訪君雖有路懷我豈無詩休羡䌓華事百年能㡬時智周扵端拱二年登苐授衡陽尉卒同前沈道士筠州高安人故吏部􅀰中彬第二子也性􅀌僻形貌秀徹初名有鄰弃妻入道居玉笥山易名廷瑞每遇深山古洞日不返嚴寒風雪常单衣危坐或絶食經月或縱酒行歌縁峭壁升喬木若猿猱之狀骨肉相尋便却走避忘情混俗人莫測之徃徃為同道者困雍熈二年正月内扵玉笥山先不食七日至上元日甲辰辭道侣歸所居院集仙亭念人生㡬何賦無病而終遺言扵弟子將􅀞者土􅀫一幀度人經一卷隨􅌾後二年二月二十日有閣皂山僧昭瑩扵山門數里相遇且閣皂山相去玉笥山一百六十里僧昭瑩問所徃云暫别廬山尋知巳留下土􅀫一幀及度人經一卷五言詩一首為别云南北東西路人生㑹不無早曾依閣皂又却上玄都雲片隨天闊泉聲落石􅀌何期早相遇樂共煑菖蒲後昭瑩到玉笥山話及方知沈道士已亡具􅀃途中相遇并所留土􅀫及經詩示于人衆皆駭異遂徃墳上看見土交横拆裂闊及尺餘至今不敢􅀤質其文驗其事即屍解而去郡閣雅談張白邢州人少􅀿進士舉不及苐入道常挑一鐡葫蘆得錢便飲酒自稱白雲子註天尊升玄護命經著武陵春色三百首略一两篇云武陵春色好十二酒家樓大醉方回首逢人不舉頭是非都不采名利混然休戴個星冠子浮沉逐世流贈酒店崔氏一絶云武陵城裏崔家酒地下應無天上有南逰道士飲一㪷卧向白雲深洞口又哭陸先生一絶云六親慟哭還復蘇我􅀏先生涙滴無脫履定歸天上去空墳留入武陵圖忽一日稱患至夜閉户曉不開問之不􅀿道衆訝之抉門見血滿地問之别無所苦嘱身後勿燒焚尋時而卒酒户崔氏出木櫃而葬扵武陵城西經半年有􅂦州官忘其名在楊州勾當公事遇扵酒肆同盃數日衆聞之道俗看驗其墳有一穴如椀大深透其棺敲之已空陳省躬金陵人扵偽朝頗歷政事􅂋徳中出為臨川宰泛舟闕下道經章江泊女児浦抵暮有書生不通姓名登舟求見與省躬語論甚竒問今晋朝苐㡬帝省躬具以實對㣲􅀏而已坐間高吟云西去長沙東上船思量此事已千年長春殿掩無人掃滿眼梨花哭杜䳌省躬疑是神仙再拜告問無言而退出船不見所之呉含靈江西人也為道士居南岳六七年俗呼為呉猱好睡經旬不飲食常言曰人若要閑即湏􅈸如勤即不閒也素不攻文偶作上升歌甚竒絶云玉皇有詔登仙職龍吐雲􅀆鳯着力眼前驀地見樓䑓異艸竒花不可識我向大羅􅀚世界世界只如指掌大當時不為上升忙一時提向瀛洲賣清太年羽化後有客人扵乾祐中在嵩山見之許鵲真人唐末逰南岳招仙􅀚壁上題歌一首云洪爐烹鍜人性命噐用不同分皆定妖精􅀑魅􅋐神通只自干邪不干正黄口小児初學行唯知日月東西生還為萬靈威聖力移月在南日在北玉是玉􅀆石是石藴弃深泥終不易鄧通餓死嚴陵貧帝王豈是無人力丈夫未逹莫相侵攀龍附鳯損精神題後数日上昇李夣符不知何許人梁開平初鍾傳鎮洪州日與布衣飲酒狂吟放逸嘗以釣竿懸一魚向市肆蹈漁父引賣其詞好事者争買得錢便入酒家其詞有千餘首傳于江表略其一両首云村寺鍾聲渡逺灘半輪殘月落前山徐徐撥棹却歸灣浪叠朝霞錦綉翻又曰漁弟漁兄喜到來婆官賽了坐江隈椰榆杓子木瘤盃爛煑鱸魚滿案堆察考取狀答曰挿花飲酒何妨事樵唱漁歌不碍時遂不敢復問或把氷入水及出身上氣如蒸鍾氏亡亦不知所在俱同前伊用昌逰江浙間散誕放逸不拘細謹善飲每醉行歌市中其言皆物外汗漫之辭似不可曉亦能為詩留題閣皂觀云花洞門前吠似雷險聲流㫁俗塵埃雨噴山脚毒龍起月照松梢􅀌鶴回羅幕秋高添碧翠􅀞簾時捲對樓䑓両壇詩客何年去去後門􅀜更不開後入湖南謁馬氏時方設齋獨不請用昌自造之㩀其坐洎食畢則大聲吟詩云誰人能識白元君上士由來盡見聞避世早空南火宅植田高種北山雲雞能抱卵心常聴蟬到成形殻自分學取大羅些子術免敎松下作􅀌墳詩畢拂衣而起衆訝竒異乃逼問無對出門不見雅言雜載石恪西蜀人善􅀞􅀹長扵山水禽魚亦攻歌詩言論粗􅁀多誚人短開寳中王師下西蜀遣名􅀞入京恪在其數宣扵相􅀦􅀞壁工畢上狀乞歸奉勑任便出京卒扵道中雍熈元年殿直雷承昊奉命來衡陽風土殊俗恪痛勉之為七言詩送承昊遲暮與恪􅀫于公含逹曉分携承昊行經數里思恪已卒數年􅃍出􅀁贈詩多言衡陽風物其詩曰衡陽去此正三年一路程途甚坦然深䆳門􅉹三楚外清風池舘五峰前西􅁁市井來啇客東岸汀洲簇釣舩公退只應無别事朱陵後洞看神仙及到任公宇一如恪言詩章好事者争傳之同上黃覺仕宦不遂意送客都門外至則客已逺不及旅舍中見一道士在側因取􅀁携酒肉呼道士共飲食之旣罷道士舉杯摭水寫吕字覺始悟其為吕洞賔道士曰眀年江南相見覺果得江南官及期見道士出俵大錢七文其次十文又小錢三文曰數不可益也予藥可數寸許告曰歲旦以酒磨服之可保一歲無疾覺如其言至七十餘藥亦將盡作詩曰床頭暦日無多字屈指眀年七十三果以是歲終貢父詩話咸通中有進士張綽下苐逰江淮飬氣耽竒只以爐火為事題壁曰争那金烏何欲上飛不住紅爐謾燒藥玉顔安可駐今年花落枝眀年花滿􅀣不如且飲酒莫􅃹流年度人異之不喜粧飾多㦄旗亭而好盃人召飲􅀂遂意則索􅁓剪蝴蝶三十二以氣吹之成列而飛如此累刻以指􅀵之俄皆在手見者求之即以他事為阻嘗逰塩城多為酒困非􅀋相競留繫邑中醒乃課述為陳情二章獻狄令乃釋之詩云門風長有蕙蘭馨􅂦族家傳覇國名容貌静懸秋月彩文章高振海濤聲訟堂無事調琴軫郡閣何妨醉玉觥今日東流橋下水一條從此鎮長清自後宰欲傳其術張云明府勲貴家流年少而宰􅇵邑多聲色犬馬之求未暇忘味玄奥因贈詩云何用梯媒向外求長生尺在内中脩莫言大道人難得自是行心不到頭去之日乗醉因求搗網􅁓剪二鶴扵􅈦前俄而翔飛乃曰汝先去吾即後來時狄令亦醉其所題云自不㑹天下經書在腹内身却騰騰處世間心即逍遥出天外江南好事者尚記上升時事桂苑叢談崔存字存中博州博平人因逰王屋見二人坐扵水濵存曰願聞二仙名􅃅東坐曰豈不知世有石曼卿乎西坐者即蘇舜欽子羙也存曰世傳學士為􅀑仙矣曼卿曰甚㢤二三子之妄也夫純陽即仙純隂即􅀑升扵天者為仙沉扵幽者為􅀑處扵中者為人旣為仙又為􅀑乎存曰願得一語以救塵骸曼卿作詩曰牛毛麟角成真少莫道從來是壯夫􅀛鶴性靈終好道神仙言語不􅀜書不將青目􅀚浮世都把仙春駐玉壺􅀉語世人無妄語高真幽􅀑􅃴殊途子羙作詩曰􅀫植靈根何太早洞悟真風正年少常令丹海飛日烏又使玉液朝元腦崑䑓氣候四時春紫府光隂夜如曉來時不用五雲車跨着清風下蓬島須􅁷有翠鳥飛下㗸書置扵二子前子羙曰瀛洲有召遂飛踰山頂而去摭遺增修詩話總􅀛卷之四十四百家詩話緫􅀛後集卷之四十四釋氏門予謫海外上元椰子林中漁火三四而巳中夜聞􅆐聲悽動作詞曰凝祥宴罷聞􅁔吹􅀞轂走香塵起冠壓芲枝馳萬􅀐馬行燈閙鳯楼􅄕捲陸海鰲山對當年曾㸔天顔醉御杯舉􅂬聲沸時莭雖同悲樂異海風吹夢嶺猿啼月一枕思歸泪又有懐京師詩云十分春痩縁何事一掬歸心未到家苕溪漁􅀮曰忘情絶愛此瞿曇氏之所訓惠洪身爲衲子詞句有一枕思歸淚及十分春痩之語豈所當然又自載之詩話矜衒其言何無識之甚邪冷齋夜話徃年余宰分寕覺範従髙安来舘之雲嵓寺寺僧三百各持一幅帋求詩扵􅁴範覺範斯湏立就余見之不懌曰詩當少加思豈若是容易乎覺範􅀏曰取􅀏吾意而巳相别十年覧其遺編追記平生不覺隕泪余欲刪去冗長定取精深数十百首仍爲作序以示世人老􅂴未睱也僧中􅀄無具詩眼者巳刻版書肆每以為恨韓子蒼巳􅀵一霎掛龍雨勿起千岩攧鷂風挂龍對攧鷂皆方言古今人未嘗道又云䴡句妙扵天下白髙才俊似海東青又云文如水行川氣如春在花皆竒句也雪浪齋日記云余至瓊州劉蒙叟方飲於張守之席三鼓云遣急􅁕来覔長短句欲問叙何事䝉叟視燭有蛾撲之不去曰為賦此急足反走持􅁓曰急爲之不然􅀗譴也余口授吏書之曰宻燭花光清夜䦨粉衣香趐遶團團人猶認假爲真實蛾豈􅀅灯作火㸔方歎息爲遮欄也知愛處實難􅂸忽然性命隨􅃄熖始覺􅀙前􅀍眼瞞􅀩叟醉􅀏首肯之既北渡夜發海津又贈行為之詞曰一叚文章種性更謫仙風韻􅀞㦸叢中清香凝宴􅃦落日清寒落花信愁似海洗光詞錦後夜帰舟雲濤喧醉枕冷齋夜話東坡長短村南村北響繅車參寥詩云隔林彷彿聞機杼知有人家在翠㣲秦少㳺菰蒲深處疑無地忽有人家􅀏語聲三詩大同小異皆竒句也髙齋夜話呉僧道潜有標置常自姑蘇歸西湖經臨平道中作詩云風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無数滿汀洲東坡赴官錢塘過而見之大称賞巳而相㝷扵西湖一見如舊相識及坡移守東徐潜徃訪之舘於逍遥堂士大夫争識之東坡饌客罷与俱来紅粧擁隨之東坡遣一妓前乞詩潜援筆而成曰􅀉語巫山窕窈娘好將魂夢惱襄王禪心巳作沾泥䋈不逐春風上下狂一坐大驚自是名聞海内然性􅄶憎凢子如􅄷嘗作詩曰去􅀊春風上國行爛窺紅紫厭平生而今眼底無姚魏浪蕋浮花􅂴問名士論以此少之道潜作詩追法渊明其語有逼真處曰數聲柔櫓蒼茫外何䖏江村人夜歸又曰隔林彷彿聞機杼知有人家在翠㣲時􅀙東坡在黄州士大夫以書抵坡曰聞曰與詩僧相􅀙豈非隔林彷彿聞機杼者乎真東山勝㳺也坡以書示潜誦前句􅀏曰此吾師七字師號冷齋夜話華亭船子和尚有偈曰千尺􅁝綸直下垂一波􅅻動萬波隨夜静水寒魚不食滿船空載月明歸叢林盛傳想見其爲人山谷􅀝曲音􅁔成長短句曰一波􅅻動萬波隨蓑笠一鈎絲金鱗正在深處千尺也湏垂吞又􅄍信還疑上鈎遲水寒江静滿目青山載月明歸冷齋夜話靈徹詩僧中第一如海月生残夜江春入暮年窓風枯硯水山􅀨慢瑟弦經来白馬寺僧到赤烏年前軰評此詩云轉石下千仭江雪浪齋日記唐李憕之子源以父死王難不仕居洛陽惠林寺與僧貟澤逰一日相約逰峨嵋山源欲泝峽澤欲取斜谷路源不可曰吾巳絶世事豈可復道京師㢤舟次南浦見媍人錦襠􅀒甕而汲者澤望而泣曰吾不欲由此者為是也源驚問之澤曰媍人姓王氏吾當爲子孕三􅀊矣吾不来故不得乳今旣見無可逃者三日浴児時願公臨我以一􅀏爲信後十二年杭州天竺寺外當與公相見至暮澤亡婦乳三日源徃視之児見源果􅀏源後適吴赴其約聞􅁑洪川畔有牧童扣牛角而歌曰三生石上舊精魂賞月吟風不要論慙愧情人逺相訪此身雖異性長存問澤公徤否荅曰李公真信士又曰身前身後事茫茫􅁒話因縁恐断腸呉越山川㝷巳徧却回烟棹上瞿塘遂去不知所之東坡詩云􅁒向錢塘訪貟澤􅁑洪波畔帯秋深即此事也甘澤謡逺法師居廬山下持律精苦過中不受宻湯而作詩換酒飲陶彭澤送客無貴賤不過虎溪而與陸道士行過虎溪数百歩大􅀏而別故禪月作詩云爱陶長官醉兀兀送陸道士行遲遲買酒過溪皆破戒斯何人斯師如斯故效之􅇔陶淵明把酒椀送陸脩静過虎溪􅅐次九流情似鏡人間萬事醉如泥山谷文殊問無著近離甚處著云南方殊云南方佛法如何多少著云或三百或五百著問此如何住持殊云凡聖同居龍蛇渾雜著云多少衆殊云前三三後三三雪竇頌曰千峰盤屈色如藍誰謂文殊是對潭堪􅀏清凉多少衆前三三與後三三傳灯録大􅁴懐璉禪學外工詩荆公與之㳺嘗以其詩示歐公曰此道人作肝臓饅頭也荆公不悟其戯問其意歐公曰是中無一􅀧䒩氣璉䝉仁庙賞識􅇔住東京静因禪院甚乆嘗作詩進呈乞還山林曰千簇雲山萬壑流閑身歸老此峯頭殷勤願祝如天夀一炷清香滿石楼又曰堯仁况是如天闊乞與􅀌雲自在飛冷齋夜話東坡言僧詩要無􅂼筍氣固詩人􅀛鑑今時悞觧便作世網中語殊不知本分家風水邉林下氣像盖不可無若盡洗去清拔之韻便與俗同科又不􅁕尚齊巳云春深逰寺客花落閉門僧惠崇云曉風飄磬逺暮雪入廊深之句華實相副頋非佳句邪天聖間閩僧可士有送僧詩云一缽即生涯隨縁度􅀊華是山皆有寺何䖏不爲花笠重呉天雪鞋香楚地花他年訪禪室寕憚路途賖亦非食肉者能到也西清詩話西湖僧清順怡然清苦多佳句甞賦十竹詩曰城中寸􅁟如寸金幽軒種竹只十箇春風慎勿長兒孫穿我堦前緑苔破又有乆服林下逰頗識林下趣􅀙渠緑隂繁不碍清風度閑行石上眠落葉不知數一鳥忽飛耒啼破幽絶處荆公逰湖上爱之乃称揚其名坡晚年亦與之㳺甚多酧唱冷齋夜東呉僧惠詮徉狂垢汚而詩語清婉嘗書湖上一山寺壁曰落日寒蟬鳴獨歸林下寺柴扉夜来掩片月隨行屦惟聞犬吠聲更入清蘿去東坡一見而和其後曰但聞煙外鍾不見􅃄中寺幽人行未巳草露温芒屦惟應山頭月夜夜照来去詮竟以此詩知名冷齋夜話東坡元豊末年得請歸耕陽羡舟次􅀲歩以書抵金山了元禪師曰不必出山當學趙州平等接人元得書徑来東坡迎􅀏問之曰以偈爲獻曰趙州當日少謙光不出三門見趙王争似金山無量相大千都是一禪牀東坡拊掌􅁛善僧宝傳王荆公丁家艱閱内典於蔣山與賛元禪師㳺􅀙如兄弟公嘗問祖師意旨元不荅公益扣之公般若有鄣三有近道之質一更兩生来恐純熟公曰願聞其說元曰公世縁深懐經濟之志用舎不能必心未平又多怒而學問尚理扵道爲所知愚此其三也特視利名如脫髮甘淡薄如頭陁此為近道且當以教乗滋茂之可也公􅂯拜受教元爲人閑靖寡言客来無貴賤寒温外無别語公後罷相居定林稍􅁴煩動即造元相向黙坐終日而去有詩題覺海方丈贈之云徃来城府住山林諸法脩然但一音不與物爲真道廣毎隨縁起自禅􅀷舌根巳净誰􅀎壊􅁕跡如空我得㝷􅀊晚北窓􅂓􅀉傲蒲萄零落半牀隂人以為實録僧宝傳雪竇􅂋禪師嘗作偈云三分光隂二早過靈䑓一􅀧不揩磨貪生曰曰區區去喚起回頭争柰何世人貪着愛境以妄為真迷而弗返讀此偈者冝如何㢤雪竇語録百家詩話緫􅀛後集卷之四十四終
