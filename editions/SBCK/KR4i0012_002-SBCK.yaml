front:
  text: 増修詩話總􅀛卷之二
  hash: sha256:32bc183cafbee06ac87a5b7fd88a9f884a8ac7615136ee4609e539bfc1746bce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_002-1a}
body:
  text: 逹理門世傳馮瀛王詩有曰窮逹皆由命何勞發歎聲但知行好事莫要問前程冬去氷須泮春來草自生請公觀此理天道甚分明又曰莫爲危時便愴神前程徃徃有期因須知海嶽歸明主未必乾坤䧟吉人道德幾時曾去世舟車何䖏不通津但教方寸無諸惡狼虎叢中也立身逹者之言也青箱雜記張文定公齊賢嘗作詩自戒并貽子孫曰慎言渾不畏忍事又何妨國法須遵守人非莫舉􅀭無􅀻仍克已直道更和光此箇如端的天應降吉祥余廣爲八詩其一曰慎言渾不畏言出患常隨須信樞機發寜容駟馬追三緘事可見两舌業當知言是起羞本慿公且再思其二曰忍事又何妨勿令心火􅀭火􅀭猶可㓕心忿固多傷堪嘆波羅宻可憐波利王從心更從刄字意好消詳其三曰國法須遵守金科盡詔條一毫如有犯三尺不相饒豈用誇奸黠何須恃貴驕自然逢吉慶神理亦昭昭其四曰人非莫舉􅀭萬事且包藏殿上涎須掩車中吐不妨在他誠所短扵已有何長須是常拘檢回頭自忖量其五曰無􅀻仍克已克己又無􅀻二事兼修􅅚終身在省思公清多歛怨高亢易招危更切循卑退方應􅂂坦夷其六曰直道更和光雙修譽乃彰直須和輔􅂇和乃直交相恃直終多忤偏和又少剛能和又能直行已自芬芳其七曰此個真端的除非六句脩永爲几杖誡更遺子孫謀本立方生道農勤乃有秋茲詩須淺近至理可推求其八曰天應降吉祥天理本茫茫舒慘須無定榮枯却有常益謙􅀹効驗福善更昭彰籠絡無踈漏恢恢四網張同前王文惠公隨深悟性理臨終作詩曰􅀞堂燈欲㓕彈指向誰􅀃去住本㝷常春風掃殘雪同前謝諫議臨捐舘作詩云平生功業數張􅁓千古英雄一窖塵何似從來周孔教解將仁義浸生民見聞録皎然禪師贈呉馮處士詩云世人不知心是道只言道在他方妙還如瞽者望長安室在東南向西􅀏東坡代答曰寒時便具􅀬時風飢漢那知食藥功莫怪禪師向西笑縁師身在長安東百斛文陶淵明飲酒詩云善養千金軀臨化消其寳寳不過軀軀化則寳亡矣人言靖節不知道吾不信也余與郭生逰寒溪主簿呉亮置酒郭生善作挽歌酒酣發聲座爲凄然郭生言恨無佳詞因爲略改樂天寒食詩歌之坐客有泣者其詞曰鳥啼鵶噪昏喬木清明寒食誰家哭風吹曠野􅁓錢飛古墓纍纍春草緑棠梨花映白楊路盡是死生離别處冥漠重泉哭不聞蕭蕭暮雨人歸去每句雜以散聲人間無漏仙兀兀三盃酒世上無眼禪昏昏一覺睡雖然無交渉其柰略相似相似尚如此何况真箇是子奉使􅀜西見邸壁書此愛而誦之故海上作濁醪有妙理賦曰嘗因旣醉之􅃴方識此心之正此老氏言心之正與孟子言人之性善何異並同前舒王當位多進用文士蘇䑓盧中甫作詩以見志云青衫白髪病參軍旋糶官粮買酒尊但得有錢留客醉何須􅀐馬傍人門雅言雜載杜祁公致政後作林下書懷詩曰從政區區到白頭一生寜肯顧恩仇􅀟鳬乗鴈常深愧野馬黄羊亦過憂豈是林泉堪佚老只縁蒲柳不禁秋始終幸㑹承平日樂聖唯能撃壌謳青箱雜記李建勲年八十謁宋齊丘於洪州題一絶於信果觀壁云春來漲水流如活曉西山􅀔似行玉洞主人經刼在携竿歩歩就長生歸高安無病而卒青璅後集東坡遊廬山至東林作二偈曰溪聲便是廣長舌山色豈非清净身夜來八萬四千偈他日如何舉似人横看成嶺側成峰逺近看山了不同不識廬山真面目只縁身在此山中山谷曰此老扵般若横􅀃􅆆說了無剰語非筆端有口安能吐此不傳之妙冷齋夜話博識門徐鍇仕江左至中書舎人時呉淑爲校理古樂府中慘字者淑多改爲操字盖章草之變鍇曰非可一例言􅀂漁陽摻者七鑑切三撾皷也禰衡作漢陽摻撾古歌云􅁁城晏聞漢陽摻黄塵蕭蕭白日暗淑歎服談􅁐商汝山中多麝絶愛其臍每爲人所逐􅀔且急即自投高巖舉爪裂出其香就縶而死猶拱四足以保其臍李商􅀮詩曰投巖射退香許渾詩云射采生香是也狨􅀋䑕而大尾長金色川峽深山中人以藥箭射之取其皮爲卧褥鞍被坐毯之用甚愛其尾旣中毒即嚙㫁尾以擲之惡爲身患杜甫詩云狨擲寒條馬見驚盖輕捷喜縁木􅆐猱之􅀋也犛牛出西域尾長而動中國以爲纓人或射之亦自㫁其尾左氏所謂雄雞自㫁其尾同前李義山詩小􅂦烹茶面曲池白鬚道士竹間棋何人書破蒲葵扇記着南窓移􅀣時蒲葵扇出謝安傳然人不知其何名蒲葵蘇子容云㯶櫚也出廣雅今衢信宣歙間扇是也謂彩似蒲葵爾詩史梅聖俞河豚詩云春岸飛楊花永叔謂河豚食楊花則肥韓渥詩柳絮覆溪魚正肥大抵魚食楊花則肥不必河豚隴西地名魚龍出石魚掘地得石破其中有魚㾗鱗甲纎悉皆具焼之有魚氣盖魚蟄泥而變爲石衡州亦有無異隴西者故杜云水落魚龍夜山空鳥水秋正隴州詩南部烟花録文理極俗又載陳叔寳詩云夕陽如有意偏傍小窓明此乃唐人方棫詩非叔寳作兼六朝人大抵不知此唐藝文誌載烟花録乃記廣陵行幸事此本已無唐末人僞作此書爾詩史歐陽文忠愛林逋詩草泥行郭索雲木呌鉤輈以謂語新而屬對親切鉤輈鷓鴣聲也郭索蠏行貌太元曰蠏之郭索用心躁也古今詩話古詩云􅀶山爐中百和香鬱金蘇合及都梁又氍吾水香迷迷艾納及都梁嘗按唐志都梁香出交廣形如藿迷迷出西域魏文帝又有迷迷賦信乎不行一萬里不讀萬卷書不可看老杜詩也王直方詩話前世所稱駔儈駔子黨切今人謂之牙韓文公贈玉川詩曰水北山人得名聲去年去作幕下士水南山人又􅁇徃鞍馬僕從塞閭里少室山人索價高两以諌官招不起又云先生抱才須大用宰相未許終不仕王向子直謂韓公與䖏士作牙牙商度物價也駔儈爲牙者世不曉所謂道原云本謂之互即互市事爾唐人書互字作㸦㸦字似牙字因轉讀爲牙其理如可信或云何得舉世同辭盖不足怪今人以萬爲万以千爲丿亦人人道之也貢父詩話楊大年因奏事論及比紅兒詩大年不能對甚以爲恨訪比紅兒詩終不可得忽一日鬻書者有小編眡之乃比紅兒詩也自此士大夫始傳之此詩乃羅虬所爲凢百首盖當時但傳其詩不載名氏大年偶不記爾筆談余靖尚書使虜爲胡詩契丹愛之再徃情益親余詩云夜筵設羅侈盛也臣拜洗受賜也两朝厥荷通好也情幹勤厚重也微臣推魯拜舞也祝若統福祐也聖壽鐡擺嵩高也俱可忒無極也虜舉大杯謂余曰能道此余爲卿飲復舉之虜大􅀏遂爲釂觴漢史記槃木白狼詩漢語則恊夷語則否其實夷人先作詩反用夷語譯出不如余真胡語也詩史山谷云余讀周書月令云反舌無聲佞人在側迺觧老杜百舌詩過時如發口君側有讒人之句直方詩話永明禪師記曰有禪師夜經行誤踐􅀲皮意其蝦䗫也死墮惡道又有山行人爲蛇螫而意觸􅀣樁行三十里遇筮醫識之告曰蛇螫也􅀤毒而死使行人不遇筮醫毒遂不發比丘知是􅀲皮不墮惡道古德偈曰惡境自虚不須畏終朝照曯元無對設使任持浮幻身任運都無舌身意冷齋夜話㓜敏門楊文公年十一歲建州送入􅆣下章聖親試一賦二詩頃刻而成令送中書再試叅政李至狀臣等言押送建州十一歲習進士楊億到中書其人來自江湖對天陛殊無震愓盖聖祚承平神童間出臣等令賦喜朝京闕詩五言六韻頃刻而成詩曰七閩波渺漠􅀟闕􅀔岧嶤曉登雲外嶺夜渡月中潮㫁句願秉清忠節終身立聖朝又楊文公數歲不能言一日家人抱登樓忽觸其首便能語家人曰旣能言可爲詩乎曰可遂吟登樓詩云危樓高百尺手可摘星辰不敢高聲語恐驚天上人古今詩話夏文莊試制科廷對出殿門楊徽之見其年少􅃍邀與語曰老夫它則不知唯喜吟詩願丐賢良一篇以卜他日之志忻然爲書曰殿上衮衣明日月硯中旗影動龍蛇縱橫禮樂三千字獨對丹墀日未斜青箱記明皇御勤政樓大張音樂教坊王大娘善戴竿扵百尺上爲木山狀瀛洲方丈命小児持綘節出入其間舞亦不輟劉晏以神童爲秘書省正字年十歲慧悟過人召扵簾中坐貴妃􅂰上爲施粉黛與戴巾櫛問晏汝爲正字而來正得何字曰天下字皆正惟朋字未正貴妃令詠王大娘戴竿晏曰樓前百戯競争新惟有長竿妙入神誰謂綺羅翻有力由自嫌輕更着人明皇雜録蘇􅅛未知男頲有人獻兎掛於廊廡間召頲詠詩兎子死闌彈將來掛竹竿試將明鏡照何異月中看由是稱爲小許公開元傳信記京兆尹訪蘇􅅛旣去􅅛令男頲詠尹字乃曰丑雖有足甲不成身見君無口知伊少人其敏捷如此明皇問瓌草書難其人誰可􅅛曰臣不知其他臣男頲爲文甚速可備使令然性嗜酒幸免沉醉足以了事令召至則酒未解猶嘔殿下命中貴人扶卧御幄前明皇親舉衾覆之旣醒援筆立就明皇撫背曰知子莫若父明皇雜録徐鍇字楚金年十餘歲群從宴集分題賦詩令爲秋詞援筆立成其略曰井梧分墮砌塞鴈逺横空雨乆莓苔紫霜濃薜荔紅詩史林傑字智用五歲與父同逰王仙君壇父曰能詩手傑曰羽客已登雲路去丹砂草木盡凋殘不知千歲歸何日空使時人掃舊壇又謁唐中丞作七夕詩曰七夕今朝看碧霄牽牛織女渡河橋家家乞巧望秋月穿盡紅絲幾萬條唐公曰真神童也年十歲方秋初忽有􅀟鶴盤空而下忻然下堦抱得一􅃗父恐非祥令放之鶴升堂而去是夕得疾而卒鄭立之以詩􅂘之曰才高未及賈生年何事􅀌魂逐逝川螢聚帳中人已去鶴離䑓上月空圓古今詩話李琪十歲通六經父佐王鐸滑州幕聞而異之㑹府燕鐸遣人以三傑賦試之琪作賦尾句云得士則昌非賢罔共龍頭之友斯貴鼎足之臣可重冝㢤項氏之所以亡有一范增而不能用鐸曰大噐也他日謁帥帥謂琪曰蜀中詔到用夏州拓䟦思恭爲北京􅀵復都統可作詩否琪曰飛􅀐日邉來何時玉輦回早平􅀜右賊莫待詔書催鐸益異之王元之内翰五歲已能詩因太守賞白蓮倅言元之能與語於太守因召而吟一絶云昨夜三更後姮娥墮玉簮馮夷不敢受捧出碧波心又云佳人方素面對鏡理新粧守曰天授也丘瑃十歲謁陳州太守曰前日寺中聞射因成詩云殿宇時聞燕雀喧虚庭盡日少人行􅀌吟獨坐情何限時喜風傳中鵠聲守喜令對弱柳絲絲搓緑線曰春雲片片掲新綿蔣堂侍􅀰方六歲父令作梔子花詩曰庭前梔子􅀣四畔有椏􅒎未結黄金子先開白玉花崔鉉相爲童時隨父謁韓滉指架上鷹令作詩曰天􅁁心膽架頭身欲擬飛騰未有因萬里碧霄終一去不知誰是解絛人李賀字長吉唐諸王孫七歲以長短之製名動京師韓文公皇甫湜過其父肅見其于總角荷衣而出二公不之信因而試一篇賀承命忻然操觚染翰旁若無人仍目曰高軒過華􅅂織翠青如䓗金環壓轡摇玲瓏馬蹄􅀮耳聲􅂭􅂭入門下馬氣如虹云是東京才子文章鉅公二十八􅀫羅心胸殿前作賦聲摩空筆􅀘造化天無功元精烱烱貫當中龎眉書客感秋蓬誰知死草生華風我今垂翅附冥鴻他日不羞蛇作龍二公大驚以所乗馬聮鑣而還所居親爲束髪年未弱冠丁内難他日舉進士或謗賀不避家諱韓文公特著辯諱一篇不幸未壯室而終並同前㓂元弼言徐州通判李綯有子七歲不善詩忽詠落花詩云流水難窮目斜陽易㫁腸誰同砑光㡌一曲舞山香父驚問之􅀂有物慿者自云是謝中舍問砑光㡌事西王母宴群仙有舞者戴砑光㡌㡌上簮花舞山香曲未終花皆落百斛文賈文元乃唐相造華夷圖丞相耽之逺孫七歲童子舉關頭及第李文賀贈詩云七歲神童古所難賈家門户有衣冠七人科第排頭上五部經書誦舌端見榜不知名字貴登筵未識管絃歡從茲穏上青霄路萬里誰能測羽翰太平興國中叅大政玉壺清話蘇州童子劉少逸年十一文辭精敏有老成體其師潘閬携以見長洲宰王元之呉縣宰羅思純以所作贄二公二公名重當時疑所贄假手未之信因試之與之聮句略不淹思思純曰無風煙熖直少逸曰有月竹隂寒又曰日移竹影侵棋局少逸曰風逓花香入酒尊元之曰風雨江城暮少逸曰波濤海寺秋元之曰一回酒渇思吞海少逸曰幾度詩狂欲上天二公驚異至聞于朝賜進士及苐官止尚書員外􅀰續歸田孫周翰精敏亦少逸之流其父穆之携以見郡侯時賞春作㑹座客簮花郡侯屬周翰曰口吹楊葉成新曲翰曰頭戴花枝學後生郡侯􅀏曰何􅃍便戯老夫賜童子出身馬希振爲鼎州節度使馬氏諸子中白眉也與門下客何致雍僧貫徽聮句希振曰青蛇每用腰爲力貫徽曰紅莧時將葉作花又見蟻子縁砌希振曰蟻子子㗸䖝子子雍曰猫児児捉雀児児實一代之雋並同前黄鑑學士七歲而不言其祖愛之以謂風骨之羙當大吾門不冝如是也每遇景物必道其名逹其理以指教之然終不言一日又謂之曰楊文公㓜而不言文公之父告之曰後園梨落籬神童知不知文公發聲曰不是風揺􅀣便是鵲驚枝汝風骨􅀂此何爲不言鑑竟不對後携行河上其祖曰水馬池中走鑑曰逰魚波上浮後任館閣李康靖聞見録增修詩話總􅀛卷之二百家詩話緫後集卷之二忠義門世人論渊明自永􅀄以後不稱年號秪􅁛甲子與思悅所論不同􅀚渊明讀史九章其間皆有􅀷意其尤章章者如夷齊箕子魯二儒三篇夷斉云天下革命絶景窮居正風凌俗爰感懦夫箕子云去郷之感猶有遲遲矧伊代謝觸物皆非魯二儒云易代隨時迷変則愚介介􅀂人特為正夫由是􅀚之則渊明委身蓬巷􅅴黔娄之貧而不自悔者豈非以恥事二姓而然也􅁑常之子羙詩雖有古殿存世尊亦䝉埃山僧衣藍􅈁告訴棟梁摧夲即所賦自然及扵乗輿䝉塵股肱非材之意忠義所激一飯不忘君邪黄常明明宗召蜀中舊臣賦蜀主降巨唐詩王偕等譏荒􅁋独中丞牛希済曰唐主􅂯懸新日月蜀王难保舊山川明宗曰希濟不忘君親忠孝也賜百段余謂希済但能兩觧之辝而巳江革云不能殺身报主得死為幸誓不為人执筆此可以厲臣子之莭䂬溪詩人比􅀨如􅁝如膏之􅁼甚夛至杜牧乃以羽林鎗為比恐未尽其形似念昔逰云雲門寺外逢猛􅀨林黒山髙􅀨脚長曽奉郊宫為近侍分明􅋏􅋏羽林鎗大􅀨行云四面明騰玉京仗萬里横互羽林鎗豈去囯凄断之情不能忘雞翹豹尾中耶丹楊集柳遷南荒有云愁向公廷問重譯􅁒􅄬章甫作文身太白云我似鷓鴣鳥南遷􅂴北飛皆􅄶忮躁辭非􅅵畆惓惓之義杜詩云馮唐雖晚逹終覬在皇都愁来有江水焉得北之朝其賦張曲江云歸老守故林戀闕悄延頸乃心王室可知黄常明世俗誇太白賜床調羮爲荣力士脫靴為勇愚􅀚唐宗渠渠於白豈真樂道下賢者哉其意急得艶詞媟語以恱媍人耳白之論撰亦不過玉樓金殿鴛鴦翡翠等語社稷蒼生何頼就使滑稽傲世然東方生不忘納諫况黄屋旣爲之屈乎􅀃者以謀謨潜宻歴考全集愛國憂民之心如子羙語一何鮮也力士閨闥腐庸惟恐不當人主意挾主􅀔駈之何所不可脫靴乃其聀也自退之爲蚍蜉撼大􅀣之喻遂使後學吞聲余竊謂如論其文章豪逸真一代偉人如論其心術事業可施廊庙李杜齊名真沗竊也䂬溪汲長孺叚太尉皆義勇􅁬不頋身之人至於仁愛撫飬矜怜惻怛無所不至所謂刚者必仁仁者必勇也嘗􅀚樂天云况多刚狷性難與世同塵希文云吾生豈不幸所禀多刚腸皆心中語也白則有敢辭爲俗吏且􅁒活疲民又云心中有念農桑苦耳裏如聞飢凍聲范有寸懐如春風思與天下共赴姑蘇云豈辭雲水三千里由濟瘡痍十萬民與汲叚正相似黄常明靈徹有相逢盡道休官去林下何曾見一人世傳為口實凢語及抽簮即以此譏之余謂矯飾㒺人固不􅁕論􅀂出於至誠時對知已一􅄍心胷何害􅀚昌􅀺送盤谷云行抽手板付丞相不待彈劾歸農桑贈侯喜便當提携妻與子南入箕無還時如今便當去咄咄無自痴如今更誰恨可便耕灞滻此􅁼凡數十豈苟以飾口㢤其剛勁之操不少屈所守素定故也䂬溪永叔嘗試謁執政坐中賦雪詩云主人與國共憂戚豈惟喜悅􅀅豊登湏怜鉄甲冷徹骨四十餘萬屯邉兵當時乃謂唐韓退之亦能道言語其預裴晋公宴㑹但云园林窮勝亊鍾鼓樂清時不曽如此作閙殊不知老杜一言一詠未曽不在於憂國恤人物我之際則淡然無著夏日歎曰浩蕩想幽薊王師安在哉夏夜歎曰念我荷戈士窮年守􅁁疆此仁人君子之用心終食不可忘也􅁁兵之語豈為過哉如退之始知神官未賢聖護短憑愚要我敬雪徑抵樵叟風廊折談僧真作閙詩也䂬溪余􅀚楚國先賢傳言汝南應璩作百一詩譏切時事編以示任亊者皆怪􅕎以爲應焚弃之及􅀚文選所載璩百一篇畧不及時亊何耶又􅀚郭茂倩雜体詩載百一詩五篇皆璩所作首篇言馬子侯觧音律而以陌上桑為鳯􅀅雛二篇傷翳桑二老无以塟妻子而巳無宣孟之徳可以賙其急三篇言老人自知桑榆之景斗酒自劳不肯為子孫積財末篇即文選所載是也苐四篇似有風諌所謂苟􅁒娯耳目快心樂腹服我躬不悅􅌚安能慮死亡此豈非所謂應焚弃之詩乎方是時曹爽亊多違法而璩爲爽長史切諌其失如此所謂百一者庶㡬百分有一􅀘於爽也而爽卒不悟以及於旤或謂以百言爲一篇者以字数而言也或謂百者数之終一者數之始士有百行終始如一者以士行而言也然皆穽鑿之􅀃何足論哉後何遜亦有擬百一躰所謂靈輒困桑下於陵拾李螬其詩一百十宇恐出於或者之􅀃然璩詩毎篇字数各不同苐不過四十字爾丹楊集杜扁舟空老去無􅀘聖明朝又云報主心巳老以稷契軰人而使老弃閑曠非唯不形怨望且惓惓如此彼遭時遇主言听計􅀙復幸年髩未暮而不能攄誠戮力以圗報效良不愧此歟䂬溪明朝有封亊数問夜如何此幸而得之坐以待旦之意避人焚諌草􅀐馬欲雞栖所謂嘉謀嘉猷入告爾后于外曰斯謀斯猷惟我后之德也黄常明一朝自罪已萬里車書通此與無逸旅􅋙孟子格君心之非汲長孺諫上多慾魏鄭公十漸陸宣公之奉天詔書無二道也同上昌黎云詣闕三上書臣非黄冠師臣有膽與氣不忍死茅茨韋􅀿物送李山人云聖朝多遺逸披胆謁至尊豈是貪􅃂荣誓將救元元聖俞贈師魯云臣豈爲身謀而邀陛下睠皆急扵得君非爲利禄計也同上杜詩公􅀂登台輔臨危莫愛身􅀉裴道州蘇侍御云致君堯舜付君等早㩀要路思􅂢軀此公素所蓄積而未及施設者故樂以語人耳夫全軀碌碌之臣果何能爲汲長孺云天子置公卿寕令􅀙䛕承意縦愛身柰辱朝廷何任遐曰禇彦囬保妻子愛性命遐能制之􅀚此以騐二詩信有証矣自比稷契豈為過哉岑侍御行軍詩平生抱忠義不敢私㣲軀范文正公云一入諫諍司鴻毛忽其身䂬溪世人喜子羙造次不忘君嘗􅀚其祖審言除夜云還􅀅万億夀更謁九重城則教忠之家風舊矣張堯佐以進士擢苐累官至屯田貟外􅀰知開州㑹其姪女有􅃂於仁家􅁽爲脩嫒尭佐遂驟迁擢一日中除宣徽節度景靈群牧四使是時御史唐介上䟽引天寳楊國忠爲戒不報又與諫官包拯呉奎等七人論列殿上旣而御史中丞􅇔百官班􅁒以廷諍卒奪尭佐宣徽景靈兩使特加介一品服以旌敢言未㡬尭佐復除宣徽使知河陽唐謂同列曰是􅁒與宣徽而假河陽為名耳我曹豈可中已邪同列依違不前唐獨争之不能奪仁宗諭曰差除自是中書介遂極言宰相文彦慱以燈籠錦媚貴妃而致位宰相今又以宣徽使結堯佐請逐彦慱而相冨弼又言諌官􅀚望挾姦而言渉宫掖語甚切直仁宗怒趣召兩府以䟽示之介猶諍不巳樞宻副使梁􅃴叱介使下殿介諍愈切仁宗大怒玉音甚厲衆恐􅍔出不測是時蔡㐮脩起居注立殿陛即進曰介誠狂直然納諌容言人主之羙徳必望全貸遂貶青州別駕翊日御史中丞王舉正救觧之改爲英州別駕始上怒未巳兩府􅀼議曰必重貶介則彦慱不安彦慱去即吾屬遞遷矣旣而果如其料當是時梅尭臣作書􅇡詩曰皇祐辛􅆗冬十月十九日御史唐子方危言􅀄造膝曰朝有巨姦臣介所憤疾願條一二事臣聀敢妄率宰相文彦慱邪行世莫匹曩時守成都委曲媚貴暱銀璫挿左貂窮臘使馳馹􅀖媛􅀅夸侈中金齎十鎰爲我􅀉使君竒文織纎宻遂傾西蜀巧曰夜撃鞭扑紅絲緯金􅈁排科閗八七比比䨇蓮華篝燈戴星出㡬日成一端持行如􅄦疾明年􅀚上元􅀍服穩称質璨然上目􅃍尔有薄詰旣聞所􅀙求佞對似未失且云奉至尊於妾豈能必遂回天子顔百亊容丐乞臣今得粗陳狡猾彼非一偷威與賣利次苐推甲乙是惟隂猾雄仁㫁冝勇黜必欲致太平在列無如弼弼亦昧平生况臣不阿屈臣言天下公奚以身自䘏君旁有側目喑啞横詆叱指言為㒺上廢汝還蓬蓽是時白此心尚不避斧鑕雖令禦魑魅甘且同飴􅁡旣知弗可惧復以強詞窒帝聲亦大厲論奏不容畢介也容甚閑猛士胆爲慄立貶海外春速􅁒爲異物内外官恟恟陛下何未悉即敢救者誰㐮执左右筆謂倘不容盛羙有所咈平明中执法懐䟽又堅述介言或似強百豈无一實恐傷四海和幸勿苦倉卒亟許遷英山衢路猶嗟咄翊日宣白麻􅁛快口盈溢阿附連諌官去􅀂壊絮虱其間因獲利􅀼􅀏等蛇鷸英州五千里瘦馬行䭿䭿毒蛇噴曉霧晝與嵐氣没妻孥不同途風浪過蛟窟存亡未可知雨舘愁傷骨飢僕時後先隨縁拾橡栗粤林多蔽天黄柑雜丹橘萬室通釀酤撫逺無禁律醉去不須錢醒来弄鳴瑟山水仍竒怪巳可消憂欝莫作楚大夫懐沙自沉汨西漢梅子真出爲呉市卒市卒且不慚况兹別乗秩始尭臣作此詩不敢示人及歐陽脩爲編其集時有嫌避又削去此詩是以少人知者故今全録焉東軒筆録鄭谷與僧齊巳黄損等共定今体詩格云凢詩用韻有数格一曰葫蘆一曰轆轤一曰進退葫蘆韻者先二後四轆轤韻者􅀟出􅀟入進退韻者一進一退失此則繆矣余按倦逰雜録載唐介爲䑓官廷䟽宰相之失仁庙怒謫英州別駕朝中士大夫以詩送行者頗衆獨李師中待制一篇爲人傳誦詩曰􅀌忠自許衆不與獨立敢言人所難去國一身輕似葉髙名千古重扵山並逰英俊顔何厚未死姦䛕骨巳寒天為吾君扶社稷肯教夫子不生還此正所謂進退韻格也按韻畧難字苐二十五山字苐二十七寒字又在二十五而還又在二十七一進一退誠合躰格豈率爾而爲之㢤近閱冷齋夜話載當時唐李對荅話言乃以此詩爲落韻詩盖渠伊不見鄭谷所定詩格有進退之􅀃而妄爲云云也素緗雜記唐介始彈張堯佐諌官皆上䟽及彈文彦慱則吳奎畏縮不前當時謂拽動陣脚及唐爭論於上前遂并及奎之背約執政又黜奎而文潞公益不安遂罷政事時李師中詩送唐有並逰英俊顔何厚未死姦䛕骨巳寒之句爲奎􅀤也東軒百家詩話總􅀛後集卷之二
