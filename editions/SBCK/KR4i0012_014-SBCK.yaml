front:
  text: 增修詩話總􅀛卷之十四
  hash: sha256:a85a7e27992d5aad4e6ec6edf2e24ad6fe68ea0de569e324459af286c7119d6d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_014-1a}
body:
  text: 警句門下石曼卿以詩酒豪爽得名嘗獨行京師倐有豪士揖曼卿語巳而曰公幸過我家曼卿語諾豪士顧從􅀐載曼卿同行入委巷前抵大第三四門乃至内堂庭户宏䴡施設錦繡侍女珠翠延飲求曼卿書字曼卿醉後書其詩籌筆驛等數篇豪士甚珎愛之贈曼卿金帛可直數十百千使從􅀐送歸􅀄不知其誰何後日㝷迷不省所居閭里人不能知他日復遇之􅂗又以金數十两贈曼卿云籌筆驛詩意中流水逺愁外舊山青最佳歐陽詹乾徳中獻野史授黄崗宰有詩行於世聞猿云啼猿非有恨行客自多悲聞笛云不知吹者意何似聴人心卧屏云横琴􅃒逺洞舉手出高峰公宇蘆云漁家合得两三莖公退徐吟思倍清官滿不將歸舊􅀮蕭蕭留與後人􅃪雅言雜載繆島雲少從浮屠詩尚竒險如抛芥子降顛狒狒折楊枝􅎈醉猩猩夐出前軰摭言湖南日試萬言王璘與李群玉校書相遇扵岳麓寺群玉揖之曰公何許人日試萬言群玉曰與公聮句可乎璘曰惟子之命群玉破題授之曰芍藥花開菩薩面璘繼之曰㯶櫚葉散夜义頭東坡云児子邁㓜嘗作林檎詩云熟果無風時自脫半窓迎日􅋐先紅扵等軰中亦􅃅有思致者今巳老無他技但時出新句作酸􅀥尉有詩云葉隨流水歸何處牛載寒鵶過别村百斛明珠眉山矮道士李伯祥好爲詩格亦不能高徃徃有竒語如夜過脩行寺醉打老僧門皆可愛予㓜時學於道士張易簡觀中伯祥與易簡徃來嘗歎曰此􅀰君貴人也不知何以知之同前狄煥南岳石樓暁望云數􅀧當秋霽不知何處峰題岳路松云一嶂雨聲歸洞壑两條翠色下瀟湘雅言系述曾弼長沙人依逸人王元爲詩友􅀫玉泉寺云山偷半庭月池印一天星君山云翠壓魚龍窟寒堆波浪心蔣鈞字不􅄊營道人與劉洞陳甫爲詩友􅀉柳宣云因借夣書過竹寺學耕秋粟繞茆原戎昱詩有一夜不眠孤客耳主人門外有芭蕉鈞代答云芭蕉葉上無愁雨自是多情聴㫁腸史虚白嵩洛人廖凝􅀉之詩曰飯僧春嶺蕨醒酒雪潭魚終於湓浦林楚才賀州冨川人贈致仕黄損詩云身閒不恨辭官早詩好常甘得句遲陳甫字惟岳吉水人贈黄岩云清時不作登龍客緑鬂閒梳傍草堂漳江感懷云一雨洗殘暑萬家生早凉村居云暮鳥歸巢急寒牛下隴遲詩云筭吟千百首方得两三聮高元矩宣城人贈宣城宰云硯貯寒泉碧庭堆敗葉紅贈徐學士云鸞掠琴絃穿静院吏􅀵詩草下閒庭楊鳬字舄之閩人山中即事云背日流泉生凍早逆風歸鳥入巢遲李平􅀜右人讀武席内傳云龍髯巳㫁嬪嬙老豹尾不來􅄮路長閒書云至人無夣夣不到天道惡􅄹􅄹有餘曹崧衡陽人題衡山㝷仙觀云千年松引東陵鶴三級芝田草木香贈陳先生云讀太元經秋醮罷註參同契夜燈㣲經羅大夫故居云鹿眠荒圃寒蕪白鵶噪殘陽敗葉飛祕舘以上巳日會西池王仲至有二詩張文潜和之最工云翠浪有聲黄帽動春風無力綵旗垂秦少㳺云簾幙千家錦繡垂仲至􅀏曰此語又待入小石調也少㳺有煩逸少書陳迹更屬相如賦上林之句諸人亦為難及山谷曰余作两句云清鑑風流歸賀八飛􅀭䟦扈付朱三未知可贈誰不能成章王直方詩話有以長韻詩上王仲至其一聮云狗􅁥傳新賦雞林購近詩屬對頗工而終篇無􅀂此者言辭鄙陋幾可絶倒豈所謂寸有所長􅁘舒王和人歌曲有暖字韻一篇余清老云更有一篇只記一句云夕陽到處花偏暖及嘗代一小児賦花糕詩一絶恨不得見荆公在金陵嘗指壁上所題两句云一水戽一云護田將緑遶两山排闥送青來張塤字叔和謂余曰塤一日到洛中謁潞公方飯後坐扵一亭亭􅁁皆蘭旣見不交一談對坐幾時公方曰香來也叔和以爲平生所未聞潞公云凢香嗅之則不佳須待其因風自至余始悟山谷詩云披拂不􅄹懷時有暗香度韓持國有云青烟人幾家緑野山四合當時無不傳誦東坡云參寥善絶句有云隔林彷彿聞機杼知有人家在翠㣲毎爲人誦後來黄州相聚半年京師故人以書相遺曰知有僧在彼非隔林彷彿聞機杼和尚􅁘僕謂參寥曰此吾師七字師􅃅也梅聖俞在禮部考校時和歐陽文忠公春雪詩云有夣皆蝴蝶逢􅂁只紵麻用事如此乃可貴余愛張文潜過宋都詩云白頭青鬂有存没落日㫁霞無古今不减老杜山谷有光山道中雪詩云山㗸斗柄三星没雪共月明千里寒都尉王晋卿足成鷓鴣天云才子隂風度逺􅀜清愁曾向􅀞圖看山㗸斗柄三星没雪共月明千里寒新路陌舊江干﨑嶇誰歎客程難臨風更聴昭華笛蔌蔌梅花滿地殘舒王與呉彦律云含風鴨緑鱗鱗起弄日鵞黄裊裊垂自云此幾凌轢造物張文潜謂余曰黄九云桃李春風一盃酒江湖夜雨十年燈真竒語並同前詩云千山送客東西路一樹照人南北枝王康功推官作牛丞相竒章公初為詩矜竒特語至有地瘦草叢短句明年秋卷成呈之曰有求色必赧慿酒意乃伸益加能矣明年乃上第因曰楊茂卿云河􅀔崐崘逺山形􅔽蓞秋此過華隂山下作初用蓮峰作􅔽蓞的當而暗盡矣劉禹錫佳話録蜀王建時楊義方能文詞爲春日詩云海􅁁紅日半離水天外暖風輕到花贈王樞宻云兩聲鞭自禁門出一簇人從天上來異聞録唐求劉郇伯有詩名唐求臨池洗硯詩云恰似有龍深處卧􅀍人驚起黒雲生又漸寒沙上路欲暝水􅁁村早行云沙上鳥猶睡渡頭人巳行詩思不出二百里間劉郇伯爲范鄭􅀰中詩友范得句云歲盡天涯雨乆而難對劉郇伯曰人生分外愁范賞之然老于新津之東渡非􅀮非吏二子亦可凌厲名􅂣而死丘樊所謂蜀人無志懷土正此也北夣􅃈言余問山谷今之詩人誰爲冠曰陳無巳其佳句可得聞乎曰吾見其作温公挽辭一聮便知其才不可敵曰政雖隨日化身已要人扶盛次仲孔平仲同在舘中雪夜論詩平仲曰當作不經人道語曰斜拖􅆣角龍千尺澹秣墻腰月半稜次仲曰甚佳其未大乃曰看來天地不知夜飛入園林總是春平仲乃服並同前舒王嘗􅀉蔣山元禪師詩曰不與物違真道廣毎隨縁起自禪深冷齋夜話唱和門熈寜間􅀄作東西府望氣者云有天子氣及府成車駕果幸張掞以詩慶二府諸公荆公和云曾留上主經過迹更費髙人賦詠才倦㳺録唐路徳延有孩児詩五十韻傳扵世侍􅀰張公師錫次韻成老児詩曰鬂髪盡皤然眉分白雪鮮週廻延客話傴僂抱孫憐無病常供粥非寒亦衣綿假温衾擁背借力杖搘肩貌比三峰老年過四皓仙喚方離枕上扶始到門前每愛烹山茗嘗嫌打石蓮耳聾如塞纊眼暗似籠烟宴坐羸扶几乗􅀐困嚲鞭頭揺如轉旋唇動􅀂抽牽骨冷愁離火牙疼怯漱泉形骸將就木囊橐尚貪錢膠睫乾眵綴粘髭冷涕懸披裘腰􅂴繫濯手袖慵揎抬舉衣頻換扶持藥屢煎坐多茵易破行少􅂂難穿喜婢裁裙布嗔妻買粉鈿房教深下幕床遣厚鋪毡琴聴憐三樂圖張􅀏七賢看經嫌字小敲磬喜聲圓食罷羮流􅃑盃餘酒帶涎樂來須遣罷醫到乆相延褁帽縱模掠梳頭取次纒長吁思徃事多感聴哀絃氣注腰還重風牽口更偏墓松先遣種誌石預令鐫客到唯求藥僧來忽問禪飬茶懸土竈曝艾晒簷椽怒僕空睁眼嗔童謾握拳心驚嫌踘蹴脚軟怕鞦韆局縮同寒狖摧豗似餓鳶觀瞻多目眩舉動即頭旋女嫁求紅燭男婚乞彩牋巳聞頒几杖寜更佩韋弦賔客身非與児孫事巳傳飬和屏作伴如意佛相連乆弃登山屐惟存􅀒郭田呻吟朝不樂展轉夜無眠呼稚臨床伴看書就枕邉冷懷疑貯水虚耳訝聞蟬束帛非無分安車信有縁伏生甘坐末綘老譲行先拘急將風夜昏沉欲雨天雞皮塵旋潰児齒食頻填毎憶居􅀰省常思釣渭川喜逢迎佛㑹羞赴賞花筵徑逺令移檻堦危索减磚好生焚鳥網惡殺杵魚船旣感桑榆日常嗟蒲柳年長思當弱冠悔不賸狂顛青箱雜記牛僧孺將赴舉時投贄扵劉夣得對客展讀飛筆􅂗竄其文居三十年夣得守汝牛出鎮漢南枉道汝水駐旌信􅀫酒酣贈詩於夣得曰粉署爲􅀰二十春向來名軰更無人休論世上升沉事且閗尊前見在身珠玉㑹應成咳唾山川猶覺露精神莫嫌恃酒輕言語曾把文章謁後塵夣得方悟徃年改文卷之事和答云昔年曾忝漢朝臣晚􅀊空餘老病身􅀄見相如成賦日後爲丞相􅀝門人追思徃事咨嗟乆幸喜清風語􅀏頻猶有當時舊冠劔待公三日拂埃塵古今詩話長慶二年王起自中書舎人知舉放進士周墀及第後同在翰林㑹昌三年起自僕射再放榜時周墀任華州因􅀉詩賀叙同在翰林日文塲三化魯儒生二十餘年振重名曾忝木雞誇羽翼又陪金馬入蓬瀛雖欣月桂居先折更羡春蘭最後榮欲到龍門看風水􅀜防不許暫離營答曰貢院離來二十霜誰知更忝主文塲楊葉縱能穿舊的桂枝何必爱新香九重每憶同仙禁六藝初吟得夜光莫道相知不相見蓮峰之下有龔黄人以爲絶唱廣卓異記韋中憲蟾㢘問鄂州春日除祖筵上題文選两句云悲莫悲􅀆生别離登山臨水送將歸以毫牋授賔從請續其句坐中悵望皆不屬有酒妓泫然曰某不知欲口占两句乃曰武昌無限新開柳不見楊花撲面飛坐客嘉歎韋有贈聾僧詩云􅬗嶺東西烟靄合两問茅屋一溪雲師云耳重誰解知師意人是人非不欲聞雅言雜載曹相􅃀鎮浙西日㑹湖中郡判官王樞舉進士嚴惲詩曰春光苒苒歸何處更向花前把一盃盡日問花花不語爲誰零落爲誰開王仰其才調和曰花落花開人世夣衰榮閒事且持盃春風底事輕揺落何似從來不要開同前龔頴自􅀒文學少許可又談論多所折難知􅂦州士罕造其門獨丁晋公贄文求見頴倒屣迎迓酧對終日至于忘食曰自唐韓柳後今得子矣翌日丁獻詩扵頴頴次韻和酬曰膽怯何由戴鐡冠只縁昭代􅅄􅀌寒曲肱未遂違前志直指無聞是曠官三諌每傳朝客􅀃五溪閒凭郡樓看祝公早得文塲雋况值天堦正舞干青􅃈雜記江西韋丹大夫與僧靈徹為忘形之契􅀉徹詩云王事紛紛無暇日浮生冉冉只如雲已為平子歸休計五老峰前必共論徹酧曰年老身閑無外事麻衣草坐只容身相逢盡道休官去林下何曾見一人雲溪友議白中令鎮荆南杜藴常侍問長沙諸從事盧􅀤致瞍焉發酒酣傲睨公少不懌因改著詞令曰十姓胡中第六胡也曾金闕掌洪爐少年從事誇門地莫向尊前喜氣粗盧答曰十姓胡中第六胡文章官職勝崔盧暫來􅀜外分憂􅀉不稱賔筵語氣粗公極歡摭言梅聖俞客歐陽晦夫使工􅀞茅庵已居其中一琴横牀而已曹子方作詩四韻僕和云寂寞王子猷迴舩剡溪路超遥戴安道月夕誰與度倒披王恭氅半掩􅀽安户􅀿調折弦琴自和撚鬚句百斛明珠東坡云余在廣陵與晁無咎曇秀道人同舟送客山光寺客去余醉卧舟中秀作詩云扁舟乗興到山光古寺臨流勝氣藏慚愧南風知我意吹將艸木作天香予和云閙裏清逰似􅂩光醉時真境發天藏夣囬拾得吹來句十里南風草木香余昔對文忠公誦文與可詩云羙人却扇坐羞落庭下花公曰此非與可詩世間元有此句與可拾得耳後五年秀來惠州見予偶道其事直方詩話鄧洵羙連山人乾祐二年中進士第與司空昉少保􅄎同年謁劉氏不禮歸武陵時周氏有其地且辟在幕府未幾司空氏自禁林出使武陵與洵羙相遇贈詩曰憶昔詞塲共着鞭當時鶯谷喜同遷􅀜河契闊三千里音信稀踈二十年君遇巳知依玉帳我無才藻歩花磚時情人事堪惆悵天外相逢一泫然洵羙和云詞場幾度讓長鞭又向清朝賀九遷品秩雖然殊此日歲寒終不改當年馳名早巳超三院侍直仍忻歩八塼今日相逢畨自愧閑吟對酒倍潸然相國歸􅆣率偕載而辭以疾不行相國語同年少保公公時在黄閣洵羙在武陵又爲詩􅀉之云衡陽歸鴈别重湖䘖到同人一􅁓書忽見姓名􅀟淚落不知消息十年餘綵衣我已登黄閣白社君猶葺舊居南望荆門千里外暮雲重叠滿晴虚周氏疑洵羙漏􅂥宻謀急追捕易俗場官而遇害建􅂭初王師下湖湘相國復牧衡陽道經易俗場作詩弔曰十年衣染帝郷塵踪跡仍傳活計貧高掇桂枝曾遂志假拖藍綬至終身侯門寂寞非知巳澤國恓惶似旅人今已向公墳畔過不勝懷抱暗酸辛雅言系述山谷云金華俞清老名子中三十年前與予共學扵淮南元豐甲子相見扵廣陵自云荆公欲使之脫縫掖着僧伽藜奉香火扵半山宅寺􅀁謂報寜禪院者予之僧名紫琳字清老無妻之累去作半山道人似為不難事然生􅀛脫筒亦難堪忍後數年見之儒冠自􅀂因嘗戯和清老詩曰索索葉似雨月寒遥夜䦨馬嘶車鳴鐸群動不遑安有人夣超俗去髪脫儒冠平明視清鏡政爾良獨難子瞻屢哦此詩以為妙直方詩話乾祐元年户部侍􅀰王仁􅁉放王溥狀元及第􅄎不數年拜相仁􅁉時爲太子少保有詩賀曰一戰文埸㧞趙旗便携金􅂦賛無為白麻驟降恩何厚黄閤􅀄聞喜可知䟦勑案前人到少築沙堤上馬行遲押班長幸遥相見親狎争如未貴時溥和曰揮毫文戰偶搴旗待詔金華亦偶爲白社􅃍當宗伯選赤心旋遇聖人知九霄得路榮雖極三接承恩出每遲職在台司多少暇親師不及舞雩時廣卓異記魯直使余對句曰呵鏡雲􅃒月對曰啼粧露着花魯直罪余於詩深刻見骨不務含蓄余竟不曉此論當有知者冷齋僧修詩話總􅀛卷之十四百家詩話總􅀛後集卷之十四評史門安禄山及永王璘有窺江左之意子偒勸其取金陵史稱薛鏐李䑓卿等爲璘謀主而不及李白白傳止言永王璘辟爲府僚璘起兵遂迯還彭澤審尔則白非深扵璘者及觀白集有永王東廵歌十一首乃曰􅀄從雲梦開朱邸更取金陵作小山又云我王樓艦輕秦漢却似天皇欲度遼􅀂非賛其逆謀則必無是語矣白旣流夜􅀰有書懐詩云半夜水軍來潯陽滿旌􅏧空名􅃴自悞迫脅上樓船􅀙賜五百金弃之若浮烟辭官不受賞飜謫夜􅀰天宋中丞薦白啓云遇永王東廵脅行中道乃用白述懷意以􅀵拭其過尔孔巢父亦為永王所辟巢父察其必敗㓗身潜遁由是知名使白如巢父之計則安得有夜􅀰之謪㢤老杜送巢父歸江東云巢父掉頭不肯往東將入海隨烟霧其序云兼呈李白恐不能無㣲意也黄常明唐穆宗時令狐楚為相為景陵使以傭錢獻羡餘怨聲係路致有衡州之貶觀發潭州􅀉李寜常侍詩云君今侍紫垣我已墮青天委廢從兹日旋歸在㡬年又有答竇鞏中丞詩云何年相贈答却得在中䑓亦可見其去國慘傷之情矣孔子曰苟患失之無所不至其楚之謂乎觀甘露之事則可見矣當是時也王涯等􅀍繋神䇿􅄷士良白涯與李訓謀逆將立鄭注楚時以舊相在闕下文宗召楚至帝對楚悲憤因付涯訊牒曰果涯書􅁘楚曰涯誠有謀罪應死嗚呼觀望腐夫閹人而誣寘人扵死地楚忍為之乎甘露野史乃言尚頼舊相令狐楚獨為辯眀􅀂以史為證則野史之言未必公也杜牧之作李和􅂦詩云鵩鳥飛來庚子直謫去日蝕辛卯年由來枉死賢才士消長相持􅀔自然盖言鄭注事也方是時和􅂦論注不可為相旋致貶謫故牧之作詩痛之如此議者謂辛卯年在憲宗之時而文宗時無辛卯也豈牧之悞乎余謂牧之所云非謂實庚子辛卯也鵩集于舎班固書庚子之日日有蝕之詩人有辛卯之詠借是事以眀李甘之􅁈尓杜牧之集有李給事詩二首其中有紛紜白晝驚千古鐡鎖朱殷㡬一空之句謂鄭注甘露之事也又有可憐劉校尉曾訟石中書之句牧之自注云給事曾忤􅄷士良人遂以為給事者李石也余嘗攷之李石雖嘗為給事然劾鄭注之事史􅀁不載語言忤􅄷士良然亦在石拜相之後石旣拜相則牧之詩題不應以給事為稱其非李石明矣當時唯有李中敏與牧之厚善嘗因旱欲乞斬注以申宋申錫之􅁈帝不省遂以病告歸頴陽令牧之有元禮去歸緱氏學之句牧之自注云因論鄭注告歸頴陽又史云注誅遷給事其后仇士良以開府䕃其子中敏曰内謁者安得有子士良慙恚由是復弃官去由是論之則是中敏無疑矣唐太和末閹尹恣横天子以擁虚噐為耻而元和逆黨未討帝欲夷絶其􅁼李訓謂在位操權者皆碌碌獨鄭注可共事遂同心以謀巳而殺陳宏志扵青泥驛相􅁇王守澄楊承和韋元素王踐言皆不保首領又㫁崔潭峻之棺而鞭其尸剪除逆黨㡬盡亦可謂壯矣意欲誅宦乃復河湟歸河朔諸鎮天子向之鄭注雖招􅁠納賄然出節度隴右欲因王守澄之葬乗群宦臨送以鎮兵悉誅之謀亦未必不善㑹李訓先五日舉亊遂成甘露之旤世以成敗論人物故訓注不得為忠至李徳􅁉謂不可與徒􅀠齒亦太甚矣按唐史李甘與李中敏皆嘗論鄭注不可為相故甘有封州之謫而中敏有頴陽之歸杜牧之贈甘詩云太和八九年訓注極虓虎吾君不省覺二兇日威武喧喧皆傳言明辰相登注和􅂦顧予云我死有處所明日詔書下謪斥南荒去又有贈中敏詩云元禮去從緱氏學江充來見大䑓宫曲突徙薪人不㑹海邉今作釣魚翁盖深痛二公之言不行而訓注得恣其謀也盖當是時仇士良􅀼國柄􅀔熖熏灼士大夫扵議論之間不敢以訓注為是以賈殺身之旤故牧之之詩如此於乎東漢之季柄在宦官陳蕃之徒以忠勇之資謀殪其黨而事亦不遂史載其名殆如日星而訓注以當時士夫畏懾士良軰遂加以奸兇之目而史亦以為亂人萬世之下無以自白其深可痛惜㢤家藏甘露野史三卷及乙卯記一卷二書之􅀃特相矛盾甘露野史之言上令訓等誅宦官事覺反為所擒而乙卯記乃謂訓等有逆謀盖甘露史出扵朝廷公論而乙卯記附㑹士良之􅀻情也乙卯記後有朱實跋尾數百言以乙卯所記為非是其􅀃與野史同余故表而出之葛常之三良以身殉秦繆之葬黄鳥之詩哀之序詩者謂國人刺繆公以人從死則咎在秦繆而不在三良矣王仲宣云結髮事明君受恩良不訾臨殁要之死焉得不相隨陶元亮云厚恩固難忘君命安可違是皆不以三良之死為非也至李徳􅁉則謂社稷死則死之不可許之死與梁丘㩀安陵君同譏則是罪三良之死非其所矣然君命之扵前而衆驅之扵後為三良者雖欲不死得乎唯柳子厚云疾病命固亂魏氏言有章􅀙邪䧟厥父吾欲討彼狂使康公能如魏顆不用亂命則豈至䧟父扵不義如此㢤東坡和陶亦云顧命有治亂臣子得從違魏顆真孝愛三良安􅁕希似與柳子之論合而過秦繆墓詩乃云繆公生不踈孟眀豈有死之日而忍用其良乃知三子狥公意亦如齊之二子􅀙田横則又言三良之殉非繆公之意也韋蘇州睢陽感懷詩有曰􅀫將降賊庭儒生獨全義􅀫將謂許逺儒生謂張巡也盖當時物議以為廵死而逺就虜疑逺畏死而辭服扵賊故應物云尔韓愈嘗有言曰逺誠畏死何苦守尺寸之地食其所愛之肉以與賊抗而不降乎斯言得矣廵死後賊將生致逺扵偃師逺亦以不屈死則是逺亦終死賊也李義山詩云本為留侯慕赤松漢廷方識紫芝翁蕭何只解追韓信豈得虚當第一功是以蕭何功在張良下也王元之詩云紀信生降為沛公艸荒􅀌壘想英風漢家青史縁何事却道蕭何第一功是以蕭何功在紀信下也余謂炎漢創業何為宗臣高祖設指縱之喻盡之矣他人豈容議􅁘盗殺武元衡也白樂天為京兆掾初非言責而請捕盜以必得為期時宰惡其出位坐賦新井篇逐之九江故因聞琵琶乃有天涯流落之感至於淚􅊜青衫之上何憊如此㢤先文康公嘗有詩云平生趣操號安恬退亦恬然進不貪何事潯陽恨遷謫輕將清淚􅊜青衫又云及泉曾改莊公誓勝母終回曾子車素綆銀牀堪泪墮更能賦詠獨何如左太冲陶淵明皆有荆軻之詠太冲則曰雖無壯士節與世亦殊倫淵明則曰惜㢤劍舞踈竒功遂不成是皆以成敗論人者也余謂荆軻功之不成不在荆軻而在秦舞陽不在秦舞陽而在燕太子舞陽之行軻固心疑其人不欲與之共事欲待他客與俱而太子督之不巳軻不得已遂去故羽歌悲愴自知功之不成巳而果膏刄秦庭當時固巳惜之然槩之扵義雖得秦王之首扵燕亦未能保終吉也故楊子云荆軻為丹奉扵期之首燕督亢之圖入不測之秦實刺客之靡也焉可謂之義也可謂善論軻者漢文欲輕刑而反重議者以謂失本惠而傷吾仁故也或又咎帝短䘮為傷扵孝予觀遺詔率皆言為巳損制未嘗使士庻皆短䘮也厥後丞相翟方進與薛宣服母䘮皆三十六日而除而顔師古注云漢制自文帝遺詔國家遵以為常則咎不在文帝矣而王荆公詩云輕刑死人衆䘮短生者偷仁孝自此薄哀㢤不能謀䡖刑死人衆則固然矣短䘮生者偷則似誣文帝也俱同上百家詩話總􅀛卷之十四
