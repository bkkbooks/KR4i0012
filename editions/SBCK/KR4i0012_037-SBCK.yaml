front:
  text: 增修詩話總龜卷之三十七
  hash: sha256:4897c7abb8a6f15c62b5d03243237501b6bdfef8f9fb8d62a50b1a19f7de9115
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_037-1a}
body:
  text: 譏誚門下太中元年魏扶知礼闈入貢院題詩曰梧桐葉落满庭隂鎻閉朱門試院深曾是昔年辛苦地不􅀅今日􅀒前心心及榜出為無名子削為五言詩譏之南部新書先天中王上客為侍御史自以才望當在前行忽除膳部貟外郎微有恨惋吏部􅀰中張思咏曰有意嫌兵部專心望考功誰知脚踜蹬幾落省橋東盖膳部省是東北隅也趙璘儀質麽陋第名後赴􅊚礼儐相以詩嘲之曰廵関雖傍樗蒲局望月还登乞巧樓第一莫教嬌太過縁人衣帶上人頭又曰不知元在鞍橋裏􅀅謂空䭾席帽歸又曰火炉床上平驅立便與夫人作鏡㙜崔立言髙退􅀮茅山善謔浪為詩贈营妓敦龎者曰瓦棺寺裏逄行跡華岳山頭露掌痕不湏惆帳愁難嫁待與􅀅書問岳神瓦棺寺有大佛跡岳神大人又醉中謔浙江㢘使曰山夫㽞意向丹梯連帥邀来出藥畦常見浙東誇鏡水鏡湖元在浙江西並同上太平廣記言杜牧為宣州幕有酒妓肥大牧之贈詩曰盤柤當時有逺孫尚令今日逞家門一車白􅁟将泥臉十幅紅綃􅀘破裩瓦棺寺裏逄行跡華岳山前見掌痕不湏啼哭愁難嫁待與􅀅書問岳神與此同未知孰是張唐卿進士第一人及第期集于㒷國寺題壁云一舉首登龍虎榜十年身到鳯凰池有人續云君看姚曄并梁固不得朝官未可知後果京官筆談惠崇詩自􅀒有河分崗势断春入焼痕青時人或有疑譏其犯古者嘲之曰河分岡势司空曙春入焼痕刘長卿不是師兄多古句古人詩句似師兄閑居詩話元居中作􅀫守郡有官妓小􅂫善歌舞㓜而聪彗元守甚怜之一日宴罷令就座客関彦長求詩関善詼諧即當時名公也得詩云昔日聞􅂫小今朝見小􅂫未知􅂫小皃得似小􅂫無由是以此自􅀒相傳以起声士大夫􅀙此作詩甚衆洎長大数年間体豊􅁱長未免尚語比􅂫子瞻出知湖州亦耒乞詩􅂫書與之云舞腰窈窕影揺千尺龍蛇動歌喉宛轉声散半天風雨寒此䂖曼卿古松詩遂士大夫􅀏泗上録曹唐羅􅀮同時才情不殊羅曰唐有􅀑詩􅂉曰何也曰水底有天春寂􅄫人間無路月茫茫唐曰羅有女子詩􅂉曰何也曰若教觧語􅀿傾國任是無情也動人此盖羅牡丹詩也盧􅅛杼情賈島狂狷行薄执政悪之故不與選裴晋公扵㒷化作池亭島詩曰破却千家作一池不栽桃李種薔􅅔薔􅅔花謝秋風起荆􅁄满庭公始知人皆􅁖其不遜古今詩話胡旦秘監性􅄶躁喪明居襄陽愛譏郡政夏英公常師事之及公貴逹胡尚以青衿眡公公出鎮㐮陽時一造焉一日謂公曰讀書乎郡事少暇比只作淂一燕雀詩胡曰試㪯之曰燕雀紛紛出乱麻漢江西畔使君家空堂自恨無金弹任尔啾啾到日斜自尔少戢蔡君謨守福唐㑹李太伯與陳烈扵望海亭以歌者侑酒方舉板一拍陳驚怖越席攀木踰垣而去李作詩曰七閩山水掌中窺乗興登臨到落暉誰在昼橋沽酒處㡬多鳴櫓趂潮歸晴耒海色依希見醉後鄉心積漸㣲山鳥不知紅粉樂一声檀板便驚飛盖譏其矯也梅聖俞過楊州宋公序送鵞作詩謝云嘗逰鳯池上曽食鳯池萍乞與江湖客􅀙交養素翎公序得詩不懌同前乾符末有客寓扵廣陵開元寺不為僧所礼一筆題門而去龕龍去東時日􅀮西斜敬文今不在碎石入流沙僧衆皆不能詳之独有沙弥能觧衆問其由則龕龍去矣有合字時日􅀮矣有寺字敬文不在苟字也碎石入流沙卒字也此不遜之言辱我曺也衆僧大悟沙弥乃懿皇朝雲皓供奉也長沙六快詩致仕屯田王揆作也六人謂帥周沆􅈇趙良規憲李碩刘舜臣倅朱景陽許玄詩略曰湖外風物竒長沙信難續衡峰排古青湘水湛寒緑舟檝通大江車輪㑹平陸昔賢官是􅀖仁澤流豊沃今賢官是􅀖刳㗖人脂肉懐昔甘棠花傷今猛虎毒然此一郡内所樂人􅅻六漕與二憲僚守連兩通属髙堂日暮㑹深夜継以燭幃幙皆綺紈噐皿盡金玊歌喉若珠纍舞腰如素束千態與万狀六人􅂬不足因成快活詩薦之尭舜目餘数聮猥不可録揆與樊太慱立里閈友素俱老扵故郷而林泉相依以二踈自髙謗詩旣出捕樊以脅之樊義薄无守悉以逰􅀙之事賣之以求苟免而希賞獄具讟謗削籍立以告發加秩昻然拜􅒛略無三禠之羞訓詞云為尔交者不其難乎湘山録皇甫松箸醉鄊日月三卷自叙之云松丞相竒章公表甥然不薦舉因㐮陽大水变極言誹謗有夜入真珠室朝逰瑇􅈘宫之句丞相有爱􅁎名真珠張曙崔昭緯中和間西川同舉相與謁日者問命時曙自恃才名籍甚人皆呼爲􅀅耒状元崔亦分居其下無何日者殊不頋􅍼惟目崔曰􅀅来万全及第􅍼有愠色曰郎君亦及第但崔家郎君拜相當扵此時過堂旣而􅍼果以愴恤不終塲昭緯首冠曙以詩刺之曰千里江山陪􅂹尾五更風水失龍鱗昨夜浣沙溪上􅀨緑楊芳艸爲何人崔不平之㑹夜飲崔以巨觥飮張拒之崔曰但吃待我作宰相與你取状元張拂衣而出因不叶後七年崔自内大􅋝拜張扵後三榜裴公下及第果扵崔公下過堂並同上崔珏佐大魏公幕與副車􅀽充不叶公俱薦之扵朝崔拜芸閣校讎縦舟江滸㑹有客以􅁝桐詣公公善之而迎珏至公􅀙容爲客請一篇珏方懐拂欝因而發􅂥所蓄爲詩七条弦上五音寒此藝知音自古難惟有河南房次律始終怜淂董亭蘭公不懌崔大慚恚元㣲之在浙東時賔府有薛書記飲酒醉因争令以酒噐撃傷㣲之由此遂去幕乃作十離爲献詩云馴擾朱門四五年毛香足净有人怜無端咬着親情脚不得紅絲毯上眠犬离家越􅃹宣毫始称情紅牋􅁓上撒花瓊都縁用乆鋒頭尽不得羲之手裏擎筆离手雲耳紅毛淺碧蹄追風曽到日東西為驚玊皃郎君墜不得華軒更一嘶馬离廐隴西獨自一􅀌身飛去飛耒上錦茵都縁出語無方便不得籠中更喚人鸚鵡离籠出入朱門未忍抛有人常変語咬咬􅋦泥穢汚珊湖簟不得梁間更壘巢燕离巢皎㓗圎明内外通清光似照水晶宫都縁一点瑕相汚不得終霄在掌中珠离掌戯躍蓮池四五秋常摇朱尾弄輪鈎無端擺断芙容朶不得清波更一㳺魚离池􅀲利如鋒眼似鈴平原捉兎趂髙晴無端竄向青雲外不得而今手上擎鷹离鞲䈵欝新栽四五行常􅀅正節􅀒秋霜為縁春笋鑚墻出不得垂隂覆玊堂竹离亭鑄㵼黄金鑑始開􅀄生三五月徘􅆦爲遭無限塵䝉汚不得華堂上玊㙜鑑离㙜元公詩曰馬上同携今日盃湖􅁁還拂去年梅年年只是人空老処処何曽花不開歌咏每添詩酒興醉酣還命􅃹弦来墫前百事皆依舊点檢唯無薛秀才摭言鑑戒録有薛涛上連師犬离家魚离池鸚鵡离籠竹离叢珠离掌五詩謂㾕書記不知孰事是趙昌言爲樞宻副使時陳儀與董􅌂俱爲三司塩鉄副使胡旦知制誥院盡同年生俱少年爲一時之俊梁顥又嘗與同幕五人者旦夕㑹飮扵樞第茶觴壼矢未嘗虚日毎乗醉夜方歸金吾吏逐夜􅀱馬首声喏儀以醉鞭指其吏曰金吾不惜夜玊漏莫相催都人諺曰陳三更董半夜玊壼清話張文潜嘗作斉安行詞甚不羙未云最愁三伏热如甑北客十人九人病百年坐死回中州千金莫作斉安㳺而潘邠老黄人也爲作觧嘲云爲􅀖雖陋勿雌黄我曽侍立蘇公旁見公顔色不撨悴不似賈􅁩耒江湘它州雖粗勝吾州無此两公相継㳺直方詩話王令逄原廣陵人旣見知於舒王声譽赫然時附䴡之徒望風伺􅀱守牧冠盖日满其門進譽献謟􅀄不及文字間也􅑮原猒之大署其門云紛紛閭巷士看我復何爲来即令我煩去即我不思意有知恥者而干謁不衰東坡號思聡詩爲水鏡集又作序贈之云聡能爲水鏡以一含万則書與詩當益竒吾􅀅觀焉以爲聡淂道深之􅀱及聡来京師種種不進有人戯之云水鏡年来亦太昏張文潜作大旱詩云天􅁁趙盾益可畏水底武侯方醉眠時人以為㡬扵湯燖右軍也並同上晋劉道真遭乱扵河側牽舡見一老嫗摇櫓道真嘲之曰女子何不調機弄杼因甚旁河摇櫓荅曰丈夫不跨馬揮鞭因甚旁河牽舡又嘗與人艸中同盤共飲見一嫗􅀅两小児過並着青衣嘲之曰青羊引双羔媍人曰两猪共一槽道無以對因話録唐宋國公瑀不觧射九月九日賜射瑀箭俱不着垜一無所獲歐陽詢詠之曰急風吹緩箭弱手馭強弓欲髙翻復下􅀿西還又東十囬俱着地两度併擎空惜問誰為此只􅀿是宋公簫瑀封宋國公太平廣記東臯子王勣字無功有杜康廟碑醉郷記俻言酒徳廣陵人刘虚白擢進士第􅄝酒有詩云知道醉鄉無戸稅任他荒却下丹田世之嗜酒者苟為仲尼之徒淂為誥戒乎北梦􅃈言李度􅂋徳中舉進士攻詩有醉䡖浮世事老重故郷人之句人多誦之王朴為樞宻以此一聮薦扵申文炳知㪯遂擢為第三人嘲曰主司只選一聮詩玊壷清話冦文公嘗與張洎同省一日作庭雀詩譏洎曰少年挾弹多狂逸不用金丸用䗶丸盖譏洎頃在江南重圍中而李煜草詔内扵䗶丸中追上江救兵之事也洎不免強顔附之後稍親䁥仝上龔彦和謫化州持不殺戒日夜礼佛對客蟣虱滿衣領不恤也鄒志完嘲曰衣領從教虱子縁夜深拜淂蓆児穿道郷活計君知否飢即湏飡困即眠冷齋夜話詩話總龜卷之三十七百家詩話總􅀛後集卷之三十七譏誚門坡逰武昌寒溪云楚雨遂昏雲夣澤呉潮不到武昌宮又周㳺困卧九折嶺褰衣獨上呉王㙜扵一時筆快遂以上宮目之􅁇而有李成伯云嗟嗟漢􅂦乆傾東肉食曽無智與忠孟徳仲謀交號令本􅀄耦地搶姦雄武侯偶失三分䇿孫氏俄成一戰功寂寞西山舊巢穴庸児􅀹道帝王宮語幾乎詈矣但渠不記其家太白曽作武昌韓侯去思頌黄金之車大呉天子武昌􅂦㨿實為帝里其罪大矣碧溪永叔萬釘寳􅅁爛熳環人謂此􅅁幾度道著􅀚子羙緋魚以及之扶病垂朱紱挈􅅁㸔朱紱銀章付老翁世未嘗􅏺之者豈以其人不止冝此服邪固嘗有云朱紱􅀒平生又云居然綰章紱受性本幽獨同上唐竇常牟群庠鞏兄弟五人四人擢進士獨群客􅀮毗陵因􅅊夏卿屡薦始入仕皆詩人也牟晚􅀙昭義盧􅀙史􅀙史䆮驕牟度不可諌即移疾㱕東都故其秋夕閑居詩云燕燕辝巢蟬蛻枝穷居積􅀨壊藩籬群嘗為黔中􅀚察使故其詩云佩刀㸔日晒賜馬旁江調言語多重譯壷觴毎獨謡而鞏詩中乃有自京師將赴黔􅀯之所謂風雨荆州二月天問人􅀄頋峽中舡西一望雲和水􅀹道黔南有四千此詩疑群所作而悞寘鞏集中尔常歴武陵夔江抚四州刺史所謂㸔春又過清明莭筭老重經癸巳年者􅀅之武陵到松滋渡之所作也庠詩不見其廵内一絶云愁雲漠漠艸離離太液鈎陳処処疑薄暮毁垣春雨裏殘花猶發萬年枝造句亦可謂秀整矣兄弟中獨群詩稍低又不得舉進士而位反居上鞏詩有放魚詩云好去長江千萬里不湏辛苦上龍門豈非為群而言乎史載鞏平居與人言若不出口世號囁嚅翁乃肯為是耶􅁑立之謝灵運在永嘉臨川作山水詩甚多徃徃皆佳句然其人浮躁不羈亦何足道㢤方景平天子踐阼灵運巳扇摇異同非毀執政矣曁文帝召為祕書監自以名軰應叅時政而王曇首王華等名位踰之意旣不平多称疾不朝則元君之心巳見扵此時矣後以㳺放无度為有司所紏朝廷遣使􅀵之而靈運有韓亡子房􅁬秦帝魯連恥之詠竟不免東市之戮而白樂天乃謂謝公才廓落與世不相遇壯志欝不用湏有所􅂥処􅂥為山水詩逸韵諧竒趣何也武帝文帝两朝遇之甚厚内而卿監外而二千石亦不為不逄矣豈可謂與世不相遇乎少湏之安知不至黄散而􅄶躁至是惜㢤其作登石門詩云心契九秋榦目翫三春荑居常以待終処順故安腓不知桃墟之􅂥能処順􅁘五羊之旤能待終耶亦可謂心語相違矣韵語陽秋荆公作商鞅詩云今人未可非商鞅商鞅􅀎令政必行余窃疑焉孔子論為君難有曰如其善而莫予違也不亦善乎如不善而莫予違也不幾乎一言而䘮􅀖乎盖人君操生殺之􅁠志在使人无違扵我其何所不至㢤商鞅助秦為虐而乃称其使政必行何􅁘後又有謝安詩云謝公才業自超群誤長清談助世紛秦晋區區等亡國可能王衍勝啇君則知前萹有激而云也杜子羙云舜舉十六相身尊道何高秦時用商鞅法令如牛毛則知所去耴矣韵語陽秋荆公以詩賦决科而深不樂詩賦試院中五絶其一云少年操茟坐中庭子墨文章頗自輕聖世選才終用賦白頭來此試諸生後作詳定官復有詩云童子常誇作賦工暮年羞悔有楊雄當年賜帛倡􅄖等今曰論才􅀅相中細甚客鄊因茟墨卑扵尔雅注魚䖝漢家故事真當改新詠知君勝弱翁熈寕四年旣預政遂罷詩賦專以經義耴士盖平日之志也元祐五年侍御史劉挚等謂治經者專守一家而略諸儒傳記之斈為文者惟務訓釋而不知聲律体要之詞遂復用詩賦紹圣􅀄以詩賦為元祐學術復罷之政和中遂著扵令士庻傳習詩賦者杖一百畏謹者至不敢作詩時張芸叟有詩云少年辛苦校䖝魚晚歳彫䖝恥壮夫自是諸生􅀹習氣果然紫詔盡駆除酒間李杜皆投筆地下班􅀭亦引車唯有少陵頑鈍叟静中吟撚白髭􅂡盖芸叟自謂也葛立之黄魯直云陶渊明責子詩曰白􅄠􅀍两髩肌膚不復實雖有五男児捴不好紙筆阿舒巳八􅈸惰故无匹阿宣行志學而不爱文術雍端年十三不識六與七通子垂九齡但覔梨與栗夫運苟如此且進盃中物􅀚渊明此詩想見其人慈祥戯謔可􅀚也俗人便謂渊明諸子皆不肖而渊明愁歎見扵詩耳又杜子羙詩陶潜避俗翁未必能逹道􅀚其著詩萹頗亦恨枯稿逹生豈是足黙識盖不早生子賢與愚何其挂懐抱子羙困頓扵三川盖為不知者詬病以為拙扵生事又徃徃􅏺議宗文宗武失學故􅂓觧嘲耳其詩名曰遣興可觧也俗人便爲􅏺病渊明所謂痴人前不得􅀃夢也作詩不知風雅之意不可以作詩詩尚譎諌唯言之者無罪聞之者足以戒乃爲有􅀘而渉扵毀謗聞者怒之何􅀘之有􅀚蘇東坡詩只是􅏺誚朝廷殊无温柔崇厚之氣以此人故得而罪之若是伯淳詩聞者自然感動因舉伯淳和温公諸人禊飲詩云未湏愁日暮天際是輕隂又泛舟詩云只恐風花一片飛何其温厚也􅀛山語録東坡云今太白集中有㱕来乎􅀏矣乎及贈懐素艸書􅂾詩决非太白作盖唐末五代間學齊巳軰詩也余舊在冨陽見國清院太白詩絶凡近過彭澤興唐院又見太白詩亦非是良由太白豪俊語不甚擇集中亦徃徃有臨時率然之句故使妄庸軰敢耳若杜子羙世豈復有偽撰邪余嘗舟次姑熟堂下讀姑熟十詠恠其語淺近不􅀋李白王平甫云此李赤詩也赤見栁子厚集自比李白故名赤其後為厠􅄦所惑以死今􅀚其詩止此而以太白自比則其人心疾乆矣豈厠􅄦之罪也苕溪漁隠曰東坡此語盖有所􅏺而已元祐文章世称􅂫黄然二公當時争名互相譏誚東坡嘗云黄魯直詩文如蝤蛑江珧柱格韵高絶􅐻飱盡廢然不可多食多食則發風動氣山谷亦云盖有文章妙一世而詩句不逮古人者此指東坡而言也二公文章自今視之世自有公論豈至各如前事盖一時争名之詞耳俗人便以為誠然遂為􅏺誚所謂蚍蜉撼大􅀣可􅀏不自量者邪王直方詩話云文潜賦虎圖詩末云煩君衞吾寢振此􅅾蓽陋坐令盗肉䑕不敢窺白晝或云此却是猫兒詩也又大旱詩云天邊趙盾益可畏水㡳武侯方醉眠時人以為幾扵湯燖右軍也東軒筆録云彭乗為翰林學士文章誥命􅀹為可􅀏有边帥乞朝覲仁宗許其候秋凉即途乗為批荅之詔曰當俟䔥䔥之候爰興靡靡之行王琪性滑稽多所侮誚及乗死也琪為挽詞云最是䔥䔥句無人􅁇後風盖為是也後山詩話云楊蟠金山詩云天未樓䑓横北固夜深灯火見􅀭州王平甫云荘宅牙人語也觧量四至呉僧錢塘白塔院詩曰到江呉地盡隔岸越山高余謂分界堠子語也隠居詩話云至和中阮逸為王宫記室王能詩多與逸唱和逸有句曰易立太山石難枯上林栁有言其事者朝廷方治之㑹逸坐他事因廢弃之百家詩話総􅀛後集卷之三十七
