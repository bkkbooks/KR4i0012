front:
  text: 增修詩話總􅀛卷之四十一
  hash: sha256:7aeacc4bb19cba1d1e0ba4de88dd02952e8520e24bc6a1ef8f828156a3fa1914
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_041-1a}
body:
  text: 送别門劉綜學士出鎮并門两制舘閣皆以詩餞其行因進呈章聖深究詩雅時方競尚西崐体􆈠裂彫􅂐親以御筆選其平淡者得八聮句云夙駕都門曉凉風􅁐􅀣秋晁逈秋聲和暮角膏雨逐行軒李維置酒軍中樂聞笳塞上情錢惟演関揄漸落􅁁鴻度􅂆到劉􅀰酒十分楊億寒垣古木含秋色祖帳行塵起夕陽朱巽汾水泠光摇昼㦸䝉山秋色鎻層樓孫僅河朔雪深思愛月并門春煖詠甘棠王貽永極目関河髙􅀝漢順風鵰鶚逺凌秋刘筠聖章謂綜曰并門唐時皆􅀅相出領凢之官遣從事以題詠作寵其行多刻諸道宫佛寺纂集編聚乆不聞有是作也後綜冩為御選句圗立於晋祠古今詩話王化基詩送梁􅂇曰文章換桂一枝秀清白傳家两弟貧人多誦之談􅁐天祐中毗陵有慎氏本儒家女三史􅃊􅈅夫娶之数年無子因拾其過而出焉慎氏􅁣然登舟􅇔詩一章為别曰當時心事巳相関雨散雲飛一餉間便挂􅀌㠶􅀙此去不堪重過望夫山􅈅夫覧而愧乃㽞之唐宋遺史唐如意中有女子七歳能詩則天命試之皆應聲而就其兄别之而去則天令作詩送兄曰别路人􅀄起离亭葉正飛所嗟人異鴈不作一行㱕丞相劉沆與郷人尹鑑少同塲屋丞相旣大拜尹方以恩榜得官公以詩送還曰少年相欵老相􅑮鄉舉雖同遇不同我已位登三事後公方名列五刑中荣登莫計名髙下宦逹湏由善始終若到郷関人見問為言歸思满秋風並同上内侍裴愈字益之作詩送魯秀才南逰詩云東呉山水家家月西椘江聲浦浦風又聞蝉云楊桞影踈秋霁兩梧桐葉墜夕陽天唐子方以言事謫冝春􅁥酒待制李師中作詩贈别曰􅀌忠自許衆不與獨立敢言人所難去國一身輕似葉髙名千古重扵山並㳺英俊顔何厚已死奸䛕骨尚寒天意若爲宗社計肯教夫子不生還倦逰録徐鉉仕宦海州蒯亮爲録事叅軍多與徃還未幾亮受代徐餞之詩曰昔年聞有蒯先生二十年来道不行抵掌曽談天下事折腰􅀹忤俗人情老還上國風光簿貧裏歸装結束輕迁客臨流重惆悵晚風黄葉滿􅀌城詩史武元衡罷相出鎮西蜀栁公綽與裴度俱爲判官公綽先度入爲吏部􅀰中度有詩餞别云两人同日事征西今日公先捧紫泥景祐末元昊叛夏鄭公出鎮長安梅昌言送詩云亞夫金皷􅀙天落韓信旌旗背水陳是時士大夫詩甚多鄭公獨刻昌言詩于䂖臨川楊智堅嗜學居貧妻厭其饘藿不足求离智堅以詩送之曰平生業在􅀒琹詩頭上而今有二􅁝漁父尚知溪谷暗山妻不信岀身遲荆􅁫任意撩新鬂鵉鏡􅀙他學􅀞眉今日便同行路客相􅑮正是下山時妻持詣州顔魯公為内使杖其妻而令嫁自後莫有弃其夫者雲溪友議崔涯别其妻詩曰隴上流泉隴下分断腸鳴􅍋不堪聞姮娥一入宫中去巫峽千秋空白雲申國長公主為尼掖庭随岀者二十餘人詔两禁送至寺賜齋傳㫖令各賦詩惟陳文僖公彭喬年詩尚有記者云盡出花鈿散宝津雲鬟齊剪向殘春因驚風燭難􅇔世遂作蓮池不染身貝葉乍翻疑軸錦􅆊音􅀄學誤梁塵􅀙兹艶質成空後湘浦都無觧珮人都下好事者以鷓鴣天􅁔之湘山録朱昻字㪯之􅀭歴清貴二十年晚為工部侍􅀰懇求㱕荆南踰年方允時方􅇵暑㤙㫖曲􅇔許秋凉始行呉淑贈行詩云漢殿夜凉􅀄閣筆渚宫秋晚得懸車錫宴玊津园中傳㫖令賦詩為送李維承旨云清朝納禄􅀹強健白首還家正太平陳文惠云部吏百御通爵里􅀙兵千􅀐過荆門弟恊亦同時􅀮皆享眉壽謂之渚宫二踈並古今詩話武公幹常事蒯希逸十餘歳異常勤幹洎希逸擢第幹辭㱕以親在養父堅􅇔不住以詩送之其略云山險不曾离馬後酒醒長見在床前摭言張乖崖在蜀州有録事叅軍老病㾱事公曰胡不歸明日叅軍求去且以詩㽞别其略云秋光都似宦情簿山色不如㱕興濃公驚曰同僚有詩人而吾不知􅇔而薦之元祐中老人守潁有路都曹者以小疾求致仕老人誦此詩以留之不可乃採前人之意作詩送之曰淮光釀山色先作㱕意濃恨無乖崖公一洗芥􅎞􅇩百斛明珠張不疑帥鼎文莹徃謁後帥辰又謁之旣别􅁣然以二詩贈行曰憶昔荆門屡過􅀙當時心巳意􅁳鴻渚宫禅伯唐斉巳淮甸詩豪宋惠崇老格踈閑松􅀝􅃳清談潇洒坐生風使君不見髙僧事莫把名叅􅇊術中又云碧嶂􅀌雲苒苒㱕觧携情緒異嘗時餘生􅀊月能多少此别􅀿難問後期玉壷清話狄焕送人逰卲云春江正􅄅􅄅送别两依依􅃄裏掉􅀅逺渡頭人未㱕漁家侵叠浪島􅀣挂殘暉况入湖湘路那堪花乱飛雅言系述元豊三年蘇子由謫官筠州張安道口占一絶送之云因嗟萍梗才名客自歎匏􅀲老病身一榻􅀙兹還􅀝壁不知重掃是何人巳而涕下東坡云安道平生未嘗出涕向人王崇拯字拯之與先君同在熈河先君自熈河入京相别扵中􅂗送先君云渭城楊栁巳青青強住行人听渭城不問使車㱕路逺且従墫酒滿杯傾相􅑮洮塞休兵後此去秦州照眼明若立螭頭借前箸且教充囯事春耕先君誦扵昊卿丞相縁此知名扵朝庭洪駒父有詩送余赴官河内末云眼中人物東西盡肺病京華故倦㳺潘邠老每誦而喜之李希声亦有詩送余云散盡平生眼中客煖風晴日閉門居可以相上下也是時紹聖改元之二月並王直方詩話李群玊好吹笙常使家僮吹之又善急就草性喜食鵞及授校書卽東㱕故里盧肇送詩云妙吹應諧鳯工書定得鵞南部新書乾祐三年宣政殿試賢良方正直言極諌科下一十人登科其後牛僧孺等四人皆相次拜相先是白居易在翰林日為考覆官其後僧孺罷相出鎮􅀭州居易在洛中有詩送曰北闕上東京風光十六程坐移丞相閣春入廣陵城紅斾擁双節白髭無一莖万人周路看百吏立班迎閫外君珍重樽前我亦荣何湏身自得􅀅相是門生卓異記㒒去􅀊錢塘十六年而又来㽞二年乃去平生自斍出處老少相似樂天雖才名相逺而安分寡求亦庶㡬焉二月六日来别南北山惠净上人以天竺醜石見贈乃作絶句三首以全樂天之好曰當年衫髩两青青強􅀃重臨刷别情衰􅄠只今無可白故應相對話来生其二曰出處依希似樂天敢􅀅衰杇校前賢便􅀙洛社休官去犹有閑居二十年其三曰在郡依前六百日山中不記㡬囬来還􅀅天竺一峰去欲把雲根到處栽紀詩唐節度使薛嵩有人献小鬟十三歳左右手俱有紋􅀮若紅線因號為紅線十九年方辭嵩去不可􅇔乃餞别請坐客冷潮陽作詩曰采菱􅁔罷木蘭舟送客魂消百尺樓還似洛妃乗霧去碧雲無際水長流江淮間有妓徐月英作詩送人曰惆悵人間萬事違两人同去一人㱕生憎平望亭前月忍照鴛鴦相背飛􅅊相皐昔逰江夏止扵姜使君之館姜氏子􅍮宝有小青衣曰玊簘才十歳常令侍􅅊姜入関家属不行􅅊乃易居頭陀寺荆宝遣玊簘往来年稍長乃與􅅊􅂬後為㢘使陳常侍發遣㱕舟人趣行乃以書别荆宝荆宝與玊簘同至相約曰逺不踰六七年當取玊簘㱕因􅇔玊簘指環一枚并詩曰黄雀啣来巳數春别時㽞解贈佳人長江不見双魚至為遣相思夣入秦李訥尚書夜登越城樓聞􅁔曰鴈門山上鴈􅀄飛其声激切公召至乃去籍之妓盛小叢也梁園供奉南不嫌女甥所唱者乃不嫌昔所授也崔元範自幕府拜侍御史餞扵鑑湖光􅃸亭命小叢􅁔餞坐客各賦詩送之李尚書曰綉衣奔命去情多南國佳人歛翠娥曽向教坊听國樂為公重唱盛叢􅁔崔御史曰羊公􅇔宴峴山亭洛浦髙􅁔午夜清獨向拍䑓爲老使可怜林木响餘聲􅀭判官曰燕趙能􅁔有幾人落花囬雪似含嚬聲随衘史西歸去誰伴文翁過九春彦升曰蓮府􅅻爲緑水賔忽乗􅍡馬入咸秦爲公唱作西河調日暮偏傷去住人盧業支使曰何郎戴豸别賢侯更􅄍􅁔珠宴􅁃樓莫道江􅀯不同醉即陪舟楫上京㳺舉子髙湘曰謝安春渚餞名卿千里仁風一扇清􅁔黛惨時方酩酊不知公子重飛觥盧溵處士曰烏䑓上客紫髯公共捧天書静鑑中桃葉不湏􅁔白䇡􅁘溪日暮起樵風崔下句云獨向柏䑓爲老吏皆曰御史即其任也何老扵柏䑓衆請改之崔曰某但止扵此任寕望九迁乎是年秋鞫獄譙中而卒是終扵柏䑓之任也並古今詩話刘夢得送人下第詩云今此卜行日髙堂􅀿夢㱕莫􅀅和氏泪滴向老菜衣又有詩云新詩一聮出白􅄠数莖生抒情詩話總􅀛卷之四十一百家詩話緫􅀛後集卷之四十一􅁔詠門熈寕間奉詔定蜀楚秦民三家所献書得一弊􅁓所書花蕋夫人詩三十二首乃夫人親筆而辞甚竒與王建宫詞無異自唐至今誦者不絶口而此獨遺弃不見取前受詔定三家書者又斥去之甚可惜也謹令繕冩入三舘而歸口誦數篇於丞相安石明日與中書語及之而王珪馮京願傳其本於是盛行於世夫人僞蜀孟昶侍人事具國史苕溪漁􅀮曰余閱此詞如龍池九曲逺相通楊柳絲牽两岸風長似江南好風景􅀞船来徃碧波中􅀺园弟子簇池頭小樂携来候宴逰試炙銀笙先按拍海棠花下合梁州月頭支給買花錢滿殿宫人近数千遇著唱名多不語含羞走過御床前内人追逐採蓮時驚起沙鷗兩岸飛蘭把来齊拍水並船相閗􅊜羅衣厨舡進食簇時新侍坐無非列近臣日午殿頭先索膾隔芲催喚打漁人皆清婉可喜花蕋又别有逸詩六十六篇有近世好事者旋加搜索續之篇次無倫語意與前詩相􅀋者極少誠爲亂真矣􅂓摘其一二云羅衫玉帯最風流斜揷銀箆慢褁頭閑向殿前􅀐御馬掉鞭横過小紅樓春日龍池小宴開岸􅁁亭子號流杯沉檀刻作神仙女對捧金盃水上来王平甫周世宗時陶尚書榖奉使江南韓熈載遣家妓奉盥匜及且有書謝畧云巫山之䴡質􅀄臨霞侵鳥道洛浦之妖姿自至月滿鴻溝舉朝不能㑹其辭熈載因召家訊之云是夕忽當浣濯焉緗素雜記唐髙宗燕群臣賞双頭牡丹詩上官昭容一聮云势如連壁友情若臭蘭人計之必一英竒女子也許彦周詩話東坡後集有題織錦圗上回文其一云春晚落芲餘碧草夜凉低月半枯桐人隨逺馬􅁁城暮􅀨映踈􅄕綉閣空其二云紅手素􅁝千字錦故人新曲九囬腸風吹絮雪愁萦骨泪洒縑書恨見郎其三云羞㸔一首囬文錦錦似文君别恨深頭白自吟悲賦客断絃愁是㫁弦琴淮海集載東坡䟦云余少時見一江本其後有人題詩十餘首皆竒絶今記其三首然則此詩非東坡所作也少㳺又云子瞻記江南所題詩本不全余嘗見之記其五絶今以􅀘子瞻之遺即叢話前集所載囬文詩五首是也世以爲少㳺所作亦非也苕溪漁􅀮蘇蕙織錦囬文詩所傳舊矣故少常沈公復傳其􅀞繇是若蘭之才益著然其詩囬旋書之讀者唯曉外繞七言至其中方則漫弗可考矣若沈公之􅀶古亦謂辞句脫讀不成文殊不知此詩織成本五色相宣因以別三四五七言之異後人流傳不復施采故迷其句讀非辞句之脫畧也政和􅀄予在洛陽於王晋玉許得唐程士南效此并申諴之釋而後暁然是詩􅀄不舛脫盖沈公未嘗見此本耳然申諴所釋但依士南之設色其七言數火其色反黄四言數金其色反緑扵五行為弗􅁼意蘇氏詩圗之色為不耳今因冠詩于畫遂別而正之三四五七言之詩各隨其所行而爲之色􅀚者見其色則詩之言數可知巳至扵士南之文旣有釋者則賦采自􅀙其舊而并録扵其首云東􅀚餘論載璇璣圗序云前秦安􅀯􅀅軍竇滔有􅃂􅁎趙陽䑓歌舞之妙無出其右滔置之别所妻蘇知之求而􅀗焉苦加撻辱滔深恨之陽䑓又專伺蘇之短讒毁交至滔益忿蘇氏年二十一滔鎮㐮陽與陽䑓之任絶蘇氏之音問蘇悔恨自傷因織錦囬文題詩二百餘首計八百餘字縦横反覆皆爲文章名曰璇璣圗遣蒼頭賫至㐮陽滔覧錦字感其妙絶因送陽䑓之関中而具車􅀙迎蘇氏㤙好愈重苕溪漁􅀮曰王初寮有􅀧綘唇一詞送韓済之歸㐮陽云峴首亭空􅂆君休墮羊碑泪宦逰如􅀉且伴仙翁醉說與鮫人莫觧江皐珮􅀅歸思暈紅萦翠䄂織囬文字􅀄寮用事以其漢上故然扵送人之詞似难用也侍児小名録南齊楊侃性豪侈舞人張静婉腰圍一尺六寸能掌上舞唐人作楊柳枝辭曰認得楊静婉腰後人􅁍除家字只使楊静婉悞矣李太白云子夜呉􅁔動君心李義山云鶯有子夜􅁔晋有子夜女善􅁔非當時可及也許彦周詩話古今詩人詠媍人者多以􅁔舞爲称梁元帝妓應令詩云􅁔清隨澗響舞影向池生劉孝綽㸔妓詩云燕􅁎臻妙舞鄭女爱清􅁔北齊䔥放冬夜對妓詩云􅁔還􅇛扇後舞出妓行前弘执恭􅀚妓詩云學舞俱回雪分􅁔共落塵陳隂鏗侯司空宅咏妓詩云鶯啼歌扇後芲落舞衫前陳劉刪亦云山􅁁􅁔兩日池上舞前溪􅁃信趙王㸔妓詩緑珠􅁔扇薄飛燕舞衫長江捴㸔妓詩云並􅁔時轉黛息舞暫分香隋盧思道夜聞隣妓詩怨歌声易断妙舞態难収陳元璪春园听妓詩云紅􅀣摇􅁔扇緑珠飄舞衣釋法宣􅀚詩云舞䄂風前㪯歌声扇後嬌王勣咏妓詩云早時􅁔扇薄今曰舞衫長刘希夷春日閨人詩云池月怜􅁔扇山雲爱舞衣以􅁔對舞者七以歌扇對舞衣者亦七雖相縁以起然詳味之自有工拙也杜子羙取以爲艶曲云江清􅁔扇㡳野曠舞衣前復齋漫録緑珠井在白州双角山下昔梁氏之女有容貌石季倫爲交趾採訪使以真珠三斛買之梁氏之居舊井存焉􅂄老云汲飲此井者誕女必多羙里閭以羙色無益扵是遂以巨石填之苕溪漁􅀮曰山谷詩云欲買娉婷供煮茗我無一斛明月珠用此事也太平廣記石季倫王明君辭云延我以穹庐加我閼氏名閼氏單于妻也上烏前下章移切前漢匃奴傳曰冐頓後有爱閼氏生少子顔注閼氏匈奴皇后號劉貢父云匈奴單于號其妻爲閼氏耳顔便以皇后觧之大俚俗也西河舊事云失我祁連嶺使我六畜不蕃息失我焉支山使我媍人無顔色盖北方有焉支山山多紅藍北人採其芲染緋取其英鮮者作烟脂媍人粧時用此顔色殊鮮明可愛匈奴名妻閼氏言可爱如胭脂也錢昭度作王昭君詩云閼氏􅅻聞易妾名帰期長似俟河清則誤讀氏字爲姓氏之氏矣藝􅁐雌黄古今辭人作明妃辞曲多矣意皆一律惟吕居仁獨不蹈襲其詩云人生在相合不論胡與秦但取眼前好莫言長苦辛君㸔輕薄児何殊胡地人苕溪漁􅀮韓子蒼題昭君圗詩􅀉語双鬟􅀒薪女炙面謹勿輕離家余考唐逸士傳云昭君至今生女必炙其面白樂天詩至今村女面燒灼成瘢痕乃知炙面之事楽天已先道之也復齋漫録漢書竟寕元年呼韓邪来朝言願壻漢氏元帝以後宫良家子王昭君字嬙妃之生一子株累立復妻之生二女至范曄書始言入宫乆不見御積怨因掖庭令請行單于臨辞大㑹昭君豐容靚飾頋影徘徊竦動左右帝驚悔欲復􅇔而重失信夷狄然曄不言呼韓邪願壻而言賜以宫女又言字昭君生二子與前書皆不合其言不願妻其子而詔使􅀙胡俗此自烏孫公主非昭君也西京雜記又言元帝使􅀞工圗宫人皆賂􅀞工而昭君獨不賂乃􅁖圗之旣行遂誅毛延夀琴操之按又言本齊國王穣女端正閑䴡未嘗窺㸔門户穰以其異人求之不與年十七進之帝以地逺不幸欲賜單于羙人嬙對使者越席請徃後不願妻其子吞藥而卒盖其事雜出無所攷正自信史書尚不同况傳記乎要之琴操朂牴牾矣按昭君南郡人今秭歸縣有昭君村村人生女必灼艾炙其面慮以色選故也昭君卒􅌾匈奴謂之青塜晋以文王諱昭􅃅明妃云韓子蒼昭君圗叙百家詩話緫􅀛後集卷之四十一
