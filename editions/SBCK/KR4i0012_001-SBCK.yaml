  text: 増修詩話總􅀛卷之一甲集
  hash: sha256:571290a914b79fa0cf14216a2dde2afc46313da909d4ebb594c46f3e26e0bc25
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_001-1a}
body:
  text: 龍舒散翁阮一閱宏休編皇明宗室月窓道人刋鄱陽亭梧程珖舜用校聖製太宗好文進士及苐賜文喜宴常作詩贈之景祐朝因以爲故事仁宗在位四十二年賜詩􅀹多然不必盡上所作景祐元年賜詩落句云寒儒逢景運報徳合如何論者謂質厚宏壯真詔㫖也貢父詩話李文正昉太祖在周朝巳知其姓及即位用以爲相嘗語文正曰卿在周朝未曽傾䧟人可謂善人君子故太宗遇之亦厚年老罷相每内宴必先赴坐嘗獻詩曰㣲臣自愧頭如雪也向鈞天侍玉皇太宗和之以賜曰珍重老臣純不已我慚寡昩􅁇三皇爲時之美傳青箱雜記又談􅁐玉壺清話皆謂扈蒙應制吕正惠端太宗朝爲參知政事多獨對便殿語必移刻因宴後苑上釣魚詩㫁句云欲餌金鉤殊未逹磻溪須問釣魚人意巳屬公矣公和詩進曰愚臣鉤直難堪用冝用濠梁結網人不數日拜平章事詩史又古今詩話謂正惠巳作户部侍郎平章事時吕文穆蒙正告老甚切因此詩遂冠台席福唐蔡伯禧四歲對真宗誦書授校書􅀰春宫伴讀齒猶未三周故曰三歲神童賜之詩曰七閩山水多才俊三歲竒童出盛時家世應傳清白訓嬰兒自得老成資初嘗學歩來朝謁方及能言解誦詩更勵孜孜圖進益青雲千里有前期續歸田録蘇易簡在翰林太宗一日召對賜酒甚歡暢曰君臣千載遇蘇􅀿聲曰忠孝一生心太宗大恱以所御金噐盡席賜之掇遺夏侯嘉正好爐火仍以不得两制爲恨太宗御樓􅀚燈進詩十韻末句云两制誠堪羡青雲侍玉輿太宗和賜曰薄徳終難舉通才例上居嘉正嘗曰使我得水銀半两知制誥一日平生足矣二願俱不遂而卒玉壷清話李廷臣官扵瓊舘有夷人携錦臂絛上織成一聮云恩􅂁草色動仙籍桂香浮乃仁廟朝賜進士及第舉人詩也廷臣以千金易之藏爲珍寳青􅃈集忠義張巡守睢陽明皇已幸蜀胡羯方熾城􅀌􅀔促人食竭以􅁓布切煑而食之時以茶汁和食而意自如其謝金吾將軍表曰想峨眉之碧峰逰豫西蜀追緑耳扵元圃保夀南山逆賊禄山戮殺􅀺獻膻腥闕廷臣􅀍圍四十九日凡三千二百餘􅀾主辱臣死廼臣致命之時惡稔罪􅄹是賊㓕亡之日忠勇如此激厲壯士嘗賦詩曰接戰春來苦􅀌城日漸危合圖侔月暈分守効魚䴡屢厭黄塵起時將白羽揮褁瘡猶出陣飲血更登陴忠信􅀿難敵堅誠自不移無人報天子心計欲何施又夜聞笛曰岧嶤試一臨虜􅀐附城隂不辨風塵色安知天地心營開星月近戰苦陣雲深旦夕更樓上遥聞横笛聲有宋佳話趙師旦潜叔皇祐中守康州儂賊犯城死扵是士大夫作詩者衆而元厚之李擇思中詩最佳元詩云轉戰譙門日再晡空拳由自冐戈殳身垂虎口方安坐命弃鴻毛更疾呼柱下杲卿存㫁節袴間杵臼得遺􅀌可憐三尺英雄氣不愧西山士大夫李詩云賊壯兵􅀌衆膽驚忠臣此日見專城􅀒君罪大寜如死守土城堅不問生報國存心惟自愧呼天壯氣幾時平潺湲多少英雄淚千古封江不㫁聲雲齋廣録王維字摩詰天寳末禄山䧟两京明皇出幸維扈從不及爲賊所得維服藥取利僞稱瘖病禄山素憐之遣人迎置洛陽拘扵普施寺迫以僞命禄山宴其徒於凝碧宫其樂乃梨園弟子教坊工人維聞之悲惻潜爲詩曰萬戸傷心生野烟百官何日再朝天秋槐花落空宫裏凝碧池頭奏管絃賊平䧟賊官者三等定罪維以凝碧詩聞于行在肅宗嘉之特宥之授太子中允劉約拾遺晋天福三年與戎和晋祖曰當遣輔相爲使趙瑩桑維翰同堂皆未言以戎雖通好而反覆難測咸懼扵將命馮道與諸公中書食訖分􅆹堂吏前白道言北使事吏人色變手顫道索􅁓一幅書云道去即遣寫勑屬吏泣下道遣人語妻子不復歸家舎都亭驛不數日即行晋祖餞語以家國之故煩耆德使逺自酌巵酒飲之虜以道有重名欲留之命與其國相同列所賜皆等戎賜臣下以牙笏及臈月賜牛頭皆爲殊禮道皆得之以詩謝云牛頭偏得賜􅁚笏更容持戎甚喜潜諭留之道曰两朝皆臣豈有分别賜悉市薪炭云北地寒老年不堪及還京師作詩五章以述北使之意其首章云去年今日奉皇華只爲朝廷不爲家殿上一盃天子泣門前􅀟節國人嗟龍荒冬徃時時雪􅇠苑春歸處處花上下一行如骨肉幾人身死掩風沙虜中大寒賜錦襖貂襖羊狐貂衾各一每入謁悉服四襖衣􅀫舘中併覆三衾詩曰朝披四襖專藏手夜盖三衾怕露頭叢􅁐劉吉江左人有膂力尚氣事李煜爲傳詔承㫖以忠扵􅀁奉歸朝供奉官以知河渠利害委以八作務太平興國中河大决吉護之與工夫同甘苦使者至訪吉不􅀗甚怒乃着皂短布褐獨􅀒二嚢土爲先導從吏無敢言使者宻訪得之歸奏仁宗厚賜之内侍石全振領河堤甚苛急自謂石爆裂嘗侮吉吉不與校一日吉乗小艇督役至中流語石曰公恃貴近見凌甚不畏死當與公同見河伯遂蕩舟覆之全振乞命號泣乃止不復敢侵吉吉本燕薊人自受李氏恩常分禄以濟其子孫朔望必拜李煜真雖童㓜必拜之執臣僚之禮後爲崇儀使其刺字謁呉中親舊題僧寺驛亭皆自稱以南人不忘本也有詩三百首目爲釣鰲集徐鉉爲序其首篇􅀮者詩曰一箭不中鵠五湖歸釣魚人多誦之以塞河有方略人目爲劉䟦河名震河上同前諷諭門太平興國中李􅁇遷以西夏叛朝廷興師剪伐迨十年餘至咸平末猖獗愈盛㓂䧟􅁁境章聖以西民疲於輸輓有厭兵之意而無名以罷師伐議者益紛紜未决事固秘宻未聞於外處士种放山中有詩云胡雛􅀒恩信聖主耻干戈章聖聞之歎美且愜素志即遣使齎詔召至授左司諌直昭文舘㑹景徳初􅁁臣奏李繼遷死其子阿移即徳眀也願納欵遂罷兵放􅀮終南山累詔不起至拜官復歸終于工部侍􅀰誌逸淳化中合州貢桃花犬甚小而性急常馴擾于御榻之側每坐朝犬必掉尾先吠人乃肅然太宗不豫此犬不食及上仙􅃅呼涕泗瘦瘠章聖初即位左右引令前導鳴吠徘徊意若不忍章聖令諭以奉陵即揺尾飲食如故詔造大鐡籠施素䄄置鹵簿中行路見者流涕李至作桃花犬歌以􅀉史官錢􅀂水末句云白麟赤鳯且勿喜願君書此懲浮俗古今詩話章聖幸汾隂回望林嶺間亭檻幽絶意非民俗􅀁居時魏野方教鶴舞俄報有中使至抱琴踰垣而走後㓂萊公鎮洛凡三邀不至萊公暇日寫刺訪之野服􅁑巾布􅂁長揖萊公禮甚平簡頃之議論騷雅相得甚歡將别謂萊公曰盛刺不復還留爲山家之寳萊公再秉釣軸野常游門下顧遇之禮優異等倫一日獻詩曰好去上天辭冨貴却來平地作神僊萊公得詩不恱自是禮日益薄即辭去後二年貶道州每題前詩扵窓朝夕吟哦之王文正公旦在中書僅二十年魏野贈詩曰聖朝宰相年年出公在中書十四秋西祀東封今已畢可能來伴赤松逰公䄂書以進累表求退不許青箱雜録别本云昔時宰相年年出公在中書十一秋西祀東封俱已了如今好逐赤松逰治平中有吉州吉水令忘其姓名治邑嚴酷有野人馬道爲啄木詩諷之曰翠翎迎日動紅觜響烟蘿不顧泥丸及唯貪得食多纔離枯朽木又上最高柯呉楚園林闊忙忙争柰何令見其詩稍緩刑時人目曰馬啄木翰府名談蔡君謨守福唐政尚嚴肅陳烈先生過福唐維舟溪亭留詩於亭上曰溪山龍虎蟠溪水皷角喧中宵郷夣破六月夜衾寒風雨生殘木蛟螭喜怒瀾殷勤告舟子放棹過前灘亭吏録以呈公公􅃍令追之巳不及矣公自此爲之少霽威眀同前范希文有贈釣者詩曰江上徃來人盡愛鱸魚羙君看一葉舟出没風濤裏觀競渡詩曰小艇破濤去旁觀亦損神他年在平地無忽險中人皆不徒作也同前冝春王從謙李璟之第九子好學善爲詩璟扵􅁐中與宰相奕棋從謙在焉令賦觀棋詩曰竹林二君子盡日意沉吟相對雖無語争先各有心恃強知易失守分固難侵􅀂筭機籌處滄溟想未深楊玢靖夫虞卿之曽孫也仕僞蜀王建至顯官隨王􅄛歸後以老得工部尚書致仕歸長安舊居多爲鄰里侵占子弟欲詣府訴其事以狀白玢玢批􅁓尾云四鄰侵我我從伊畢竟須思未有時試上含元殿基望秋風禾􅁰正離離子弟不復敢言談􅁐舒王得請金陵門下有人賣魚一日放魚有門生獻詩云直須自向池􅁁看今日誰非鄭校人公誦乆之詩史蔣貽恭蠶詩云辛勤得繭不􅄹筐燈下繅絲恨更長着處不知來處苦但貪身上繡衣裳古今詩話華山鄭雲叟有傷時一絶云㠶力劈開滄海浪馬蹄踏盡亂山青浮名浮利濃如酒醉得人心死不醒又贈霍山秦道士云老鵶啼􅆐伴採芝有時長嘆獨移時翠蛾紅粉嬋娟劍殺盡世人人不知同前宋齊丘江南二世爲宰相璟􅀹愛其才然知其不正一日於華林園試小妓羯皷召齊丘同宴齊丘獻詩曰切㫁牙床鏤紫金最冝平穏玉糟深因逢淑景開佳宴爲出花奴奏雅音掌底􅁿璁􅀌鶴噪枝頭乾快亂蟬吟開元天子曾如此今日將軍好用心同前唐李日知爲黄門侍􅀰安樂公主池館新成中宗臨幸從官預宴賦詩日知􅀹存䂓戒其卒篇云所願暫思居者佚莫使時稱作者勞盧汪門族甲於天下舉進士二十上不第爲一絶云惆悵興亡係綺羅世人猶自選青娥越王觧破夫差國一箇西施已是多同前范文正公言勁節知無不言仁廟朝數出外􅀘梅聖俞作啄木詩以見意曰啄盡林中蠧未肯出林飛不識黄金彈雙翎墮落暉同前夏英公慶暦中欲真拜以言者罷除使相知南京到任以二詩􅀉執政云造化平分荷大鈞腰間新佩玉琪璘南湖不住栽桃李擬狎沙鷗過十春海鴈橋􅁁春水深略無塵土到花隂忘機不取人知否自有江鷗信此心復徙西都張昪知諌院作青雀詩􅀉之曰弱羽傷􅃓尚未完􅀌飛誰敢擬鴛鸞眀珠自有千金價莫爲逰人作彈丸昇卒不敢言及之同前于濆爲詩頗干教化對花詩云花開蝶滿枝花謝蝶還希惟有舊巢燕主人貧亦歸又有唐備者與濆同聲咸多比諷有詩曰天􅀂無雪霜青松不如草地若無山川何人重平道題道傍木云狂風㧞倒􅀣樹倒根已露上有數枝藤青青猶未悟又曰一日天無風四溟波盡息人心風不吹波浪髙百尺盧􅅛抒情西京端正木去馬嵬一驛徳宗幸奉天觀其蔽地錫以羙名後有文士題之曰昔日偏霑雨露恩德皇西幸賜佳名馬嵬此去無多地好向楊妃塚上生同前羅鄴工詩春逰欎然有懷云芳草如烟處處青閑門要地一時生年來撿􅀧人間事惟有春風不世情春雨詩云兼風颯颯洒皇州能帶輕寒阻勝逰昨夜五侯池舘裏佳人驚覺爲花愁同前僖宗幸蜀詞人題於馬嵬驛云馬嵬烟柳正依依重見鑾輿幸蜀歸泉下阿蠻應有語這回休更泥楊妃或云狄侍􅀰歸昌詩同前鑑戒録云是羅􅀮詩盧常侍鈺牧廬江日郡職曹先生恱營妓丹霞者盧沮不許㑹餞客短亭曹獻詩曰拜玉亭間送客忙此時􅀌恨感離郷㝷思徃嵗絶纓事肯向朱門泣夜長盧演爲長句和而勉之曰桒扈交飛百舌忙祖亭聞樂倍思郷樽前有恨慚卑宦席上無憀愛艶粧莫爲狂花迷眼界須求真理定心王逰蜂採掇何時巳秪恐多言議短長盧懷抒情李羽能詩五十方擢苐嘗獻江淮郡守詩曰塞詔東來淝水濵時情惟望秉陶鈞將軍一陣爲功業忍見沙場百戰人盖郡守盧公一舉及第南唐近事景祐中羗人叛西方用兵朝廷永草澤遺逸士多獻方略自􅃷鬻率皆得官其下材無能徃徃過望亦有挾持頡頏觖望不服者嘗有人題􅀜西驛舎爲詩曰􅀌星熒熒照寒野漢馬蕭蕭五陵下廟堂不肯用竒謀天下徒勞聘賢者萬里危機入燕薊八方殺氣衝靈夏逢時還似不逢時已矣吾生真苟且東齋録汪自能爲文章有平糶詞詩意高古刺譏中時病云穴垣補墻缺墻成垣已隳㫁屨穿履完屨亦􅃜汪氏宦不逹其他著述不甚留傳唐文宗曰嘗􅀚晋君臣以夷曠致傾覆當時卿大夫過􅁘李石曰然古詩有之人生不滿百常懷千歲憂畏不逢也晝短苦夜長闇時多也何不秉燭逰勸之照也臣願捐軀命濟國家惟陛下鑑照不惑則安人強國其庻幾乎鑑誡録余在黄州與陳慥季常徃來每過徃之際輙作泣字韻詩一篇季常不禁殺故以此諷之季常旣不復殺而里中皆化之至有不食肉者皆云未死神已泣此語使人悽然百斛明珠盧承丘長沙人披􅄄居呉芙蓉山常著文爲芙蓉集作落韻詩雖一時諷罵聞者亦可爲戒題花鈿云􅀓粉銷金剪翠霞黛烟濃處貼鉛茟也知曽伴姮娥咲將來村裏賣誰家又題渡頭船云刳木功成濟徃還古溪殘照下前山看看向晚人來少猶自須來覔見錢年八十卒於所居雅言系迷東坡云在潁時陳無巳趙徳麟軰􅃴亦守官於彼而歐陽叔弼與季黙亦又居閒日相唱和而二歐頗不作詩東坡以句挑之云君家文律冠西京旋築詩壇按酒兵袖手莫欺真將種致師須得老門生明朝鄭伯降誰受昨夜條侯壁已驚從此醉翁天下樂還須一舉百觴傾盖爲文忠公昔有詩贈梅聖俞蘇子羙云我亦願助勇皷旗噪其旁快㢤天下樂一嚼冝百觴也王直方詩話景祐中華州張源作絶句云太公年登八十餘文王一見便同車如今若向江􅁁釣也􅀍官中配看魚吟此詩畢入夏州其後元昊反􅀜中有兵者六七年不解源作是詩以叛去亦足爲戒東齋録李清臣北都人方束髮則才俊詞句驚人一日薄逰鄭州時韓公爲帥因徃見其大祝吏報曰大祝方寢遂求筆爲詩一絶書于刺授其吏曰大祝覺則投之詩云公子乗閒卧綵厨白衣老吏慢寒儒不知夣見周公否曾􅀃當年吐哺無青􅃈集聶夷中公子詩云種花於西園花發青樓道花下一禾生去之爲惡草有三百篇之㫖章子厚謫雷州過小貴州南山寺有僧奉忠子厚見之已而倚檻看層雲曰雲多竒峰真善比􅀋忠曰曾記夏雲詩甚竒曰如風如火復如綿飛過㣲隂落檻前大地生靈乾欲死不成霖雨謾􅃒天太祖問罪江南李後主用謀臣計欲拒王師法眼禪師觀牡丹於大内作偈諷曰擁毳對芳叢由來趣不同髮從今日白花是去年紅艶曵隨朝露馨香逐晩風何須待零落然後始知空後主不省王師渡江增修詩話總􅀛􅃃之一百家詩話總􅀛後集卷之一巳集龍舒散翁阮一閱宏休編皇明宗室月䆫道人刋鄱陽亭梧程珖舜用校御製王師圍金陵唐使徐鉉来朝鉉伐其能􅁒以口舌觧圍謂盛称其主慱學多藝有聖人之能使誦其詩曰秋月之篇天下誦傳之其句云云太祖大􅀏曰寒士語耳吾不道也鉉内不服謂大言無實可窮也以請殿上驚惧相目太祖曰吾㣲時自秦中歸道華醉卧田間􅁴而月出有句曰未離海底千山黒􅅻到天中萬國明鉉大驚殿上稱夀後山詩話故亊進士期集常擇榜中最年少者爲探芲郎熈寕中始罷之太平興國三年胡秘􅁥旦榜馮文懿拯爲探花是􅀊登第七十四人太宗以詩賜之曰二三千客裏成亊七十四人中少年始唐以禮部放榜故座主門生之札特盛主司因得竊市私㤙上稍欲革其􅁦旣更廷試前一􅀊吕文穆公䝉正爲狀頭始賜以詩盖示以優􅃂之意至是復賜文懿然􅃺頭詩迄今詩有探芲詩後無継者惟文懿一人而巳最爲科舉之盛亊也蔡寛夫詩話太平興國七年十二月十七日大雪御製雪詩并酒賜學士詩云輕輕相亜凝如酥宫􅀣花粧萬萬株今賜酒卿時一盞玉堂聞話道情無又御製五七言詩賜蘇易簡五言詩曰翰林承旨貴清净主堂中應用咸依式深岩比更崇歸家思值日入内集英風儒措門生盛髙明大化雄七言詩曰運偶昌時逺更􅀷果然榖在我中心􅀙風臣偃光朝野此日清華見翰林舉措樂時周礼法思賢教古善規箴少年學士文明世一寸賢毫数萬㝷金坡遺事石林詩話楊文公在翰林去聀真宗眷之不衰即起為郡未㡬復以判秘書􅁥召旣到闕以詩賜之曰􅃈闥徃年司制誥共嘉藻思􅀋相如􅅾山昔日詮墳史还仰夛聞過仲舒報政列城㱕覲後䟽㤙髙閣拜官􅀄諸生濟濟弥瞻望鈆槧咨詢辨魯魚祖宗愛惜人才保全忠孝之意如此䂬溪大中祥符五年楊億為學士季夏􅀍疾至十月方赴朝叅具􅃺称謝御筆狀尾批七言二韻詩賜之詩云承明迩侍䆒儒玄苦學劳心疾巳痊善保㒷居調飲食副予前席待名賢金坡遺事大中祥符二年春真宗御製詩賜知貢舉晁逈云礼闈選士古称難都爲陞沉咫尺間較藝清時公道在掄材􅀿得惠人寰五年二月又製詩賜知貢夆晁逈云盛時選士貢闈開殿宇聞風献藝来心似􅁠衡求實効勿教􅅾蓽有遺才同上天禧三年正月九日錢惟演承明殿面奉知舉真宗御製詩并序云卜賢能之多士允恊盛猷資􅀙之洪儒書伸藻鑑期申聀業用示篇章詩云寅奉昌圗紹慶基選倫多士叶前規郷閭薦㧞期無濫草澤搜羅詎有遺徳舉况逄全盛日計偕咸造廣􅂣時春官任聀當求善宗伯掄材務得冝侍􅀙名儒當委任藝文公道辯妍􅎀佇伸衡鑑裁􅀷念允恊菁莪樂育詩金波遺事二月十八日􅀅放文賜詩并序序云詳延造士允叶扵盛猷乃眷儒臣式分於重􅀉論秀才臻扵􅂋効當官偹著於純誠詩云四海為家宝緒隆旁求文雅振儒風命郷隨計来多士軗藝掄材有澤宫簮紱近臣當􅂋任絲綸􅀷旨論丹􅇆旰霄汲汲予存念夙夜孜孜尔狥公名實豈惟衡鑑内賢能皆萃網羅中佇􅀚翹楚登時用布政分憂恊庶功同上真宗賦御溝柳詩令宰相兩省和進陳执中詩曰一度春来一度新翠光長得照龍津君王自愛天然態恨殺昭陽學舞人其詩最􅀹者西朝宝訓神宗遵太祖遺意聚積金帛成帑自製四言詩一章云五季失圗獫狁孔熾藝祖造􅀖意有懲艾爰設内府基以募士曽孫保之敢忘厥志毎庫以一字目之又别置詩二十字分掲其上曰毎䖍夕惕心妄意遵遺業予不武資何以成戎捷後来所謂御前封椿庫者也上意用此以為開柘西北境􅁟之資始命王韶克青唐然後欲經理銀夏復取燕雲元豊五年徐禧永洛衂師之後帝心弛矣林宓􅁉陵遺事云前軰云詩有奪胎換骨之􅀃信有之也杜陵謁玄元廟其一聮云五聖聮龍衮秋風折鴈行亦以鴈行對龍衮然語中的其親切過於夲詩兹不謂之奪胎可乎不然則徒用前人之語珠不􅁕貴且如沈佺期云小池殘暑退髙􅀣早􅋽歸非不佳也然正用柳惲太液㣲波起長楊髙􅀣秋之句耳蘇子云峽束滄淵深貯月巖排紅􅀣巧粧秋非不佳也然正用杜陵峽束滄江起岩排石􅀣圓之句耳語雖工而無別也藝􅁐雌黄光堯􅀄幸錢塘有詩云六龍轉淮海萬􅀐臨呉津王者本無外駕言蘇逺民瞻彼草木秀感此瘡痍新登堂望稽山懐哉大禹勤大㢤之言布於天下漢祖大風之􅁔唐宗勁草之句不足道也詩􅀃雋永賡􅁔門東莱㳟和皇帝幸秘書詩麟閣龍旂日月章中興􅂯見赭􅂁光仰􅀚焜耀人文盛始識扶持德意長功利􅀙今卑􅃹晏浮華自昔陋盧王願求實學醻天造肯効明河織女㐮文集御燕門嘉祐七年冬宴近臣于群玉殿英宗以皇子預坐在舍人待制之後岐公詩云翠輦生香容扈蹕黄金􅂗􅁓㸔揮毫介甫云何不言翠玉裝輿岐公改之以進復齋謾録神廟時經月每夕有赤氣見西北隅如火至人㝎乃滅人以為皇子生之祥故禹玉作大燕樂詞云未曉清風生殿閣經旬赤氣照乹坤未幾皇子生大燕群臣扵集英殿文正公日録榮遇門蘇叅政易簡取開封觧時宋尚書白為試官是􅀊狀頭登第後十年白爲翰林學士易簡以継召入故易簡贈白詩云天子昔取士先後分􅎀妍済済俊兼秀師師鱗與鵉小子最承知同軰㝷改􅀚甲等叨薦名髙飛便凌煙遂使拜扆坐果得超神仙迄今􅅻七􅀊相接乗華軒慶暦二年歐陽文忠公為别頭試官王文㳟公預薦至嘉祐􅀄文忠在北門文㳟亦同院仍同知貢㪯故文㳟詩有十五年前門下客最荣今日預東堂之句座主門生同列固儒者盛事而玉堂􅀹天下文學之極選國朝以来惟此二人前此所未有也蔡寛夫詩話嘉祐二年余與端明韓子華翰長王禹玉侍讀范景仁龍圗梅公儀同知礼部貢㪯辟梅聖俞為小試官凡鏁院五十日六人者相與唱和為古律􅁔詩一百七十餘萹集為三卷禹玉余為校理時武成王庙所觧進士也至此新入翰林與余同院又同知貢㪯故禹玉贈余云十五年前出門下􅇰荣今日預東堂余荅云昔時叨出武成宫曽㸔揮毫氣吐虹夣寐閑思十年事􅀏談今日一樽同喜君新賜黄金帶頋我今為白髮翁也天聖中余舉進士國斈南省皆忝第一人薦名其後景仁相継亦然故景仁贈余云淡墨題名第一人􅀌生何幸継前塵也聖俞自天聖中與為詩友余嘗贈云猶喜共量天下士亦勝東野亦勝韓而子華筆力豪贍公儀文思温雅而敏捷皆勍敵也前此有南省試官者多窘束條制不少放懐余六人者􅌚然相得群居終日長篇險韻衆製交作筆吏疲扵冩録僮史奔走徃来間以滑稽嘲謔加於風刺更相酧酢徃徃哄堂絶倒自謂一時盛事此前未之有也㱕田録百家詩話總􅀛後集卷之一
