  text: 增修詩話總􅀛卷之二十八下集
  hash: sha256:31d54d89825874360c46cec6bfe8f4279d19d6fefd95d8c9095f92b5d9143715
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_028-1a}
body:
  text: 龍舒阮一閱編皇明宗室月囱道人刋番陽程珖校故事門章聖朝春月多召两府两制三舘扵後苑賞花釣魚賦詩自趙元昊背叛西陲用兵廢缺甚乆嘉祐末仁宗為脩故事群臣和御製詩是日㣲隂寒韓魏公時為首相和詩卒章云曾叅二十年前會今備台司得再陪時内侍都知任守忠常以滑稽侍上從容曰韓􅄾譏陛下仁宗愕然問其故守忠曰譏陛下逰宴太頻仁宗為之􅀏閑居詩話唐制禮部􅀰中掌省中文翰謂之南宫舎人百日内須知制誥故王元之贈宋給事詩曰須知百日掌絲綸又謂員外􅀰􅈦為瑞錦窠􅈦前有大石諸州府送到廢印皆於石上碎之又祥瑞圖亦掌於員外􅈦令狐楚元和中任員外􅀰有詩曰移石㡬回敲廢印開箱何處送新圖春明退朝録北都郡守有過馬􅈦按唐韓渥詩云外使進鷹􅀄得按中官過馬不教嘶注云上乗馬必令中官為馭以進謂之過馬旣乗之然後蹀􅉜嘶鳴也唐時方鎮亦效之乃有此名同前世傳潘閬安鴻漸八才子啚皆䇿蹇重戴又王元之贈崔遵度及第未脫白詩云且留重戴士風多則國初舉子􅀹重戴矣青箱雜記新進士放榜后翌日排光範門􅀱見宰相雖云排光範門其實排建福門集於四方舘昔有詩曰華陽觀裏鍾聲禁建福門前皷動時即其日也南部新書張燕公守歲詩云竹爆好驚眠今人家祀畢始爆竹雜記宋次道嘗為西都詩以野狐落對五鳯樓野狐落唐人名宫人所聚同前曲江會先牒教坊請奏上御紫雲樓􅀚焉時或擬作樂則為之移日故曹松詩云追遊􅀂遇三清樂行從應妨一日春㫖下后人置􅀍袋例以圖障酒噐錢絹實其中逢花則飲故張籍詩云無人不借花間􅀫到處常携酒噐行其􅀍袋狀元録事同點檢缺一則罰金曲江之宴行市羅列長安街至半空公卿帥以其月選東床車馬駢闐莫可殫述摭言韓定辭不知何許人為鎮州王鎔書記聘燕帥劉仁恭舍於賔舘令幕客馬郁延接馬有詩贈韓曰燧林芳艸綿綿思盡日相携渉䴡譙别后巏熬山上望羡君時復見王喬郁詩清䴡然意在試其學問韓即席答之曰崇霞䑓上神仙客學辨痴龍藝最多盛徳好將銀管述䴡詞堪與雪児歌座内諸賔靡不欽訝稱爲妙句然亦疑其銀筆之僻也他日都從容問韓以銀管雪児之事韓曰昔梁元帝為湘東王時好學著書嘗記録忠臣義士及文章之美者筆有三品以金銀雕餙或用斑竹為管忠孝全者以金管書之德行精粹者用銀管書之文章贍䴡者以斑竹管書之故湘東王之譽振於江表雪兒孝宻或為孝齊之愛􅁎能歌舞每見賔僚文章有竒䴡中意者即付雪児叶音律以歌之又問痴龍出何處曰洛下有洞穴曾有人悞墜於其中因行數里漸明曠見有宫殿人物凢九䖏又有大羊羊髯有珠人取食之不知何所后出以問張華華曰此地仙九舘也大羊名曰痴龍耳定辭復問郁巏嶅之山當在何處郁曰此隋郡之近事何謙遜而下問由是两相恱服結交而去百斛明珠世傳王子敬帖有黄柑三百顆之語此帖乃在劉季孫家景文死不知今在誰家矣􅅊蘇州有言書後欲題三百顆洞庭須待滿林霜盖蘇州亦見此帖也余亦嘗有詩與景文云君家子敬十六字氣壓鄴侯三萬籖劉季孫景文之子也慷􅁣竒士博學能詩僕薦之得隰州以殁哀㢤嘗有詩􅀉僕曰四海共知霜􅁂滿重陽能挿菊花無死之日家無一錢但有書三萬軸􅀞四百幅耳退之詩曰百年未滿不得死且可勤買抛青春國史􅀘云酒有郢之冨水烏程之􅀂下滎陽之土窟春冨平之石凍春劍南之燒春杜子羙詩亦云聞道雲安麴米春裴鉶作傳竒記裴航事亦有酒名松醪春乃知唐人名酒多以春則抛青春亦必酒名也並同前太祖問趙普男尊女卑何故男跪而女不跪群臣無對者惟王貽孫曰古者男女皆跪至唐則天時始拜而不跪太祖曰何以爲實貽孫曰古詩云長跪問故夫遂得振學譽玉壺清話鷄鳴髙􅀣巔􅀃題辭曰雞爲精陽南方之􅁚離爲火精陽之象火陽精物炎上故陽出雞鳴以􅀋感也古詞云犬吠深巷中雞鳴髙樹顛樂府集東飛百勞歌詩七月鳴鵙一曰勞鵙也東飛百勞西飛燕言其􅀋不同而飛翔特異無因以相逐故其詩曰春巳暮花從風空留可憐與誰同滄海雀風土記六月東南長風海魚化爲黄雀又禮記雀入大水化爲蛤故荀昶黄雀詩云空城舊侣絶滄海故交分蘭􅀂生春陽感時而思君子也􅀂謂杜􅀂亦香草名左思三都賦曰其草則有杜􅀂蘅菊石蘭芷蕙􅀥下何􅛞􅛞潘安仁笙賦云輟張女之哀彈流廣陵之清散詠桃園之夭夭歌􅀥下之纂纂歌曰􅀥下纂纂朱實纍纍宛其落矣化爲枯枝釋者謂之纂纂􅀥花也西園㳺曹子建公醼詩云清夜逰西園飛盖相追随明月澄清影列􅀫正參差並同前京城街衢有金吾傳呼以禁夜行至正􅀚馬同上封事每街隅懸皷夜擊皷以止其行以備􅀼盗時人遂呼爲􅕣􅕣皷有道人裴脩然雅有篇詠善書􅀞好酒嘗戯爲詞􅃒莫􅕣􅕣皷須傾滿滿盃金吾􅀂相問報道玉山頽古今詩話青州􅂭興寺殿前廡下西邉有木䑓䑓上以架懸二小皷相傳寺乃孟嘗君故宅皷乃集賔客食皷考究不然而皷南壁上有詩一絶云千載遺蹤􅃅皷樓不知誰是雍門周區區此飯徒爲爾唯有鳴雞可酧不題姓名亦不知何謂唐開元天寳間承平日乆世尚輕㣲多愛三花飾馬郭􅀂虚家藏貴戚閲馬啚中有三花馬蘇大叅家有韓幹􅀞三花御馬晏元獻家藏一􅀞虢國出行圖亦有三花馬三花者剪鬃爲三瓣白樂天詩云舞衣裁四葉馬鬛剪三花是也淮南蜀江者維􅀭之地也或曰􅀔連蜀土或以産茶味如蜀茶云自蜀江之南有竹西亭脩竹踈翠后即禪智寺也竹西取杜牧之詩斜陽竹西路歌吹是􅀭州自蜀江以南景氣頓異北風至此遂絶鄴中銅駝郷魏武帝立銅駞石犬各二古詩云石犬不可吠銅駝徒爾為呉宫有香水溪俗云西施浴處人呼爲脂粉塘吳王宫人濯粧於此溪上源至今猶香古詩云安得香水泉濯􅀰􅁭上塵蘭溪自黄州麻城出東南流入大江有水極清冷杜牧之詩云蘭溪春盡碧泱泱是也磁湖鎮道士磯即西塞山也薛能詩有西塞長雲盡南湖片月斜正謂此處南湖臧質敗走南湖以荷自蔽即此地也彈棋今人罕為之有譜一卷盖唐賢所爲其局方二尺中心髙如覆盂其巔爲小壺四角㣲起李商􅀮詩云玉作彈棋局中心最不平謂其中髙也樂天詩云彈棋局上事最妙是長斜謂抹角長斜一􅀤過半局今譜中具有此法柳子厚叙用二十四棊者即此謂也神龍以來杏園燕後皆於慈恩寺塔下題名他時有將相則朱書之及第後知聞或遇未及第時題名字添前字故詩曰曾題名處添前字送出城人乞舊詩湘潭縣唐興寺有劉夣得撰儼禪師碑孟賔于鄭谷詩湘水似伊水湘人如故人之句乃此寺前江流也鸊鵜水鳥也其膏可以􅂗刀劍令不鏽爾雅注云膏玉瑩劍續英華詩云鳥㗸苜蓿葉劍瑩鸊鵜膏是也周禮四時變火春取榆柳之火夏取􅀥杏之火唐詩惟春取榆柳之火以賜近臣戚里之家故韓翃有曰日暮漢宫傳蠟燭青烟散入五侯家之句章聖嘗宴群臣扵太清樓忽問市店酒有佳者否中貴人對唯南仁和酒佳亟令沽賜群臣又問近臣曰唐時酒每升價㡬何無有對者唯丁晋公奏曰唐時酒每升三十錢章聖曰何以知之晋公曰臣嘗記杜甫詩曰速來相就飲一斗恰有三百青銅錢章聖大喜曰杜甫詩自可爲一代之史禮部貢院試進士設香案于階前試官與舉人對拜此唐故事也列坐設位供帳亦盛乃具茶湯至於試學究則撤去㡩幕亦無茶湯渇則飲硯水皆黔其吻非固困之盖防毡幕中藏文字供應人傳經義爾故事爲之防歐陽文忠公詩云焚香答進士撤幕待經生並同前詩病門王靖學蘇子羙作壯語曰欲徃海上吞鯨鯢又近有士人好爲怪語詩云比劉和尚小師畢逹􅀹卑劉貢父曰此乃番僧名􅃅也又盧延遜吊陳亾將詩云自是碙砂發非干礉石傷牒多身上字盌大背邉瘡此乃打脊詩也如金同丁銀花合之􅀋皆語忌爾作詩冝以爲戒詩史詩有語病當避之劉子儀嘗贈人云惠和官尚小師逹禄須干全用故事取孟子所謂柳下惠不卑小官仲尼曰師也逹子張學干禄或有冩此二句减去官字示人曰是畨僧逹禄須干見者大􅀏此偶自諧合無如輕薄子非刀筆過也古今詩話蔡居厚詩史不言劉子儀而謂劉貢父以為畨僧名論語只有師也過逹恐是過字章孝標登第後􅀉淮南李紳相詩曰及第全勝十改官金湯鍍了出長安馬頭漸入􅀭州路爲報時人洗眼看李答曰假金方用真金鍍􅀂是真金不鍍金十載長安得第一何須空腹用髙心聖俞嘗云詩句義理雖通語渉淺俗而可􅀏者亦其病也如有贈漁父一聮云眼前不見市朝事耳畔唯聞風雨聲􅀃者云病肝風如盡日覔不得有時還自來本謂詩之好句難得耳􅀃者云此是人家失猫児人以為􅀏歐公詩話進士黄可字不可深扵雅道詩句中多好用驢字如獻高侍􅀰云天上傳將五馬賦門前迎得跨驢賔之􅀋昵昵児女語恩怨相爾汝劃然變軒昻勇士赴敵􅂣此退之􅃪頴琴詩歐陽文忠嘗問僕琴詩何者最佳余以此答之公言此詩最竒䴡然自是聴琵琶詩非琴詩余退而作􅃪杭僧惟賢琴詩云大絃春温和旦平小絃㢘折亮以清平生不識宫與角但􅃪牛鳴盎中雉登木門前剥琢誰叩門山僧未閑君勿嗔歸家且覔千斛水净洗從前筝笛耳詩成欲􅀉公而薨至今以為恨紀詩邯鄲公周陵詩曰􅂊及春髙􅂦祚移舒王詩云春高􅂦祚不成詩詩人貪求好句而理有不通亦語病也如䄂中諌草朝天去頭上宫花侍宴歸誠爲佳句矣但進諌必以章䟽無用藁之理唐人有云姑蘇䑓下寒山寺半夜鍾聲到客船􅀃者亦云句則佳矣其如三更不是撞鍾時如賈島哭僧云冩留行道影焚却坐禪身時謂之燒殺活和尚此􅀹可􅀏􅀂歩隨青山影坐學白塔骨又獨行潭裏影數息􅀣邉身皆是島詩何精粗頓異歐陽詩話西頭供奉官錢昭度曾咏方池詩云東道主人心匠巧鑿開方石貯漣漪夜深却􅀍寒星映恰似仙翁一局棋有輕薄子見而􅀏曰此正謂一局黒全輸也遯齋閒覧增修詩話總􅀛卷之二十八百家詩話總􅀛後集卷之二十八詠物門歐陽文忠公極賞林和靖踈影横斜水清淺暗香浮動月黄昏之句而不知和靖别有詠梅一聮云雪後園林􅅻半􅀣水邉籬落忽横枝似勝前句不知文忠何縁弃此而賞彼文章大槩亦如女色好􅁖止繋扵人苕溪漁隠曰王直方又愛和靖池水倒窺踈影動屋簷斜入一枝低以謂此句扵前所称真可處伯仲之間余􅀚此句略無佳處直方何為喜之真所謂一蠏不如一蠏也山谷為詩當飽參然後臭味乃同雖為大宗匠者亦然月􅀚横枝之語乃何遜之妙處也自林和靖一參之後參之者甚多雪浪斎日記唐人牡丹詩云紅開西子粧樓暁翠掲麻姑水殿春若改春作秋全是蓮花詩林和靖梅花詩云踈影横斜水清淺暗香浮動月黄昏近似野薔􅅔也陳輔之詩話凢詠梅多詠白而荆公詩獨云􅂡撚黄金危􅁒堕􅎞􅇛紅臘巧能粧不惟造語巧䴡可謂能道人不到處矣又東坡詠梅一句云竹外一枝斜更好語雖平易然頗得梅之幽獨閑静之趣凡詩之詠物雖平淡巧䴡不同要能以随意造語爲主公後復有詩云遥知不是雪爲肯暗香耒盖取􅂫子卿云只言花似雪不悟暗香来之意公在金陵又有和徐仲顰文字韵梅詩二首東坡在嶺􅀯有暾字韵梅詩三首皆韵險而語工非大手筆不能到也遯斎閑覧馹使前時走馬回北人初識越人梅清香莫把酴醾比只欠溪邉月下杯此梅二丈京師逄賣梅花絶句吾随後軰犹及與之周旋覧其親書如見其抵掌談􅀏也東坡韓持國雖刚果特立風莭凛然而情致風流絶出時軰許昌崔象之侍􅀰舊第今為杜君章所有庍後小亭僅丈餘有海棠两株持國毎花開輒載酒日飲其下竟謝而去􅀊以為常至今故吏猶能言之余嘗扵小亭柱間得公二絶句其一云濯錦江頭千萬枝當年未觧惜芳菲而今得向君家見不怕春寒雨􅊜衣尚可想見當時氣味韓忠獻公嘗帥蜀持國兄弟皆侍行尚少故前句云尔其二云長條無風亦自動柔艶着雨更相冝漫其後句苕溪漁隠曰鄭谷海棠詩云穠䴡最冝新着雨妖嬈全在􅁒開時前軰以謂此两句􅀃盡海棠好處今持􅀦柔艶着雨更相冝之句乃用鄭谷語也至扵東坡作此詩則詞格超逸不復蹈襲前人其詩有嬀然一􅀏竹篱間桃李漫山捴粗俗自然冨貴出天姿不待金􅐻薦華屋朱唇得酒暈生臉翠䄂卷紗紅映肉林深霧暗曉光遲日煖風輕春睡足雨中有泪亦悽愴月下無人更清淑元豊間東坡謫黄州寓定惠院院之東小山上有海棠一株特繁茂每歳盛開時必為携客置酒巳五醉其下矣故作此長萹平生喜為人冩盖人間刋石者自有五六本云軾平生得意詩也石林詩話隱居詩話云吕士􅂭知宣州好以事笞官妓妓皆􅁒迯去而也㑹杭州有一妓到宣其色藝可取士􅂭喜之留之使不去一日郡妓復犯小過士􅂭又欲笞之妓泣訴曰某不敢辭罪但恐杭妓不能安也士􅂭愍而捨之聖俞因作莫打鴨一萹曰莫打鴨打鴨驚鴛鴦鴛鴦新向池北落不比􅀌洲老秃鶬秃鶬尚􅁒逺飛去何况鴛鴦羽翼長盖謂此也詠物詩不待分明􅀃盡只彷彿形容便見妙處如魯直酴醿詩云露􅊜何郎試湯餅日烘荀令炷爐香義山雨詩云摵摵度􅀲園依依傍水軒此不待􅀃雨自然知是雨也後来魯直無巳諸人多用此体吕氏童䝉訓苕溪漁隠曰裴璘詠白牡丹詩云長安豪貴惜春殘争賞先開紫牡丹别有玉杯承露冷無人起就月中㸔時稱絶唱以余􅀚之語句凢近不若胡武平詠白牡丹詩云璧堂月冷難成寐翠幄風多不柰寒其語意清勝過裴璘逺矣如皮日休詠白蓮詩云無情有恨何人見月冷風清􅁒堕時若移作詠白牡丹詩有何不可深更清切耳曼卿詠小桃二絶句云生色深紅綬􅅁長宫簾寒在井欄香母家升上瑶池品先得春風一面粧本分桃花寒食前小桃長是上春天二喬二趙俱傾􅀦女弟嬌彊意自先其模冩命意豈不佳㢤王直方詩話云或有称詠松句云影摇千尺龍蛇動聲撼半天風雨寒者一僧在坐曰未若雲影亂鋪地濤聲寒在空或以語聖俞聖俞曰言蕳而意不遺當以僧語為優百家詩話總􅀛後集卷之二十八
