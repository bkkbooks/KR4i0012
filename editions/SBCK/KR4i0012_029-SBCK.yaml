front:
  text: 增修詩話總􅀛卷之二十九
  hash: sha256:32bf6a21ed335ae268d08b1852ecb06878530f6aa5aca8d2cee96096d751e1a3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_029-1a}
body:
  text: 詩累門隋煬帝善屬文不欲人出其右薛道衡由是得罪後因事誅之曰更能作空梁燕落泥否嘗為燕歌行文士皆和之著作􅀰王胄獨不和焉每銜之終坐此見害而誦其警句曰庭草無人隨意緑復能作此邪小􅀃舊聞劉禹錫自屯田員外􅀰左遷􅂦州司馬凡十年始召還方春贈看花者云紫陌紅塵拂面來無人不道看花回玄都觀裏桃千􅀣盡是劉􅀰去後栽不日傳於都下好事白執政誣其怨憤他日見時宰與坐慰勞乆之旣而曰近日新詩未免爲累不數月遷連州刺史其自叙云貞元二十一年春余為屯田員外􅀰時玄都觀未花是歲牧州至荆南又貶􅂦州司馬居外十年召至京師人言有道士手植仙桃滿觀盛開遂有前篇以識一時之事旣出牧十四年始為主客􅀰中重逰是觀再書二十八字以俟後逰時元和二年三月也百畆亭中半是苔桃花開盡菜花開種桃道士今何在前度劉􅀰去又來古今詩話唐左司􅀰中喬知之有婢名窈娘藝絶當時武延嗣聞之欲一見旣見即留之無復還知之痛憤因為詩賂閽者以逹窈娘窈娘繫於裙帶赴井而死延嗣見詩酷吏誣䧟知之破其家詩曰石家金谷重新聲明珠百顆買娉婷昔日可憐公自許此時歌舞得人憎窈娘答曰公家閨閣不曾關好將歌舞借人看冨貴英雄非分理驕奢􅀔力横相干别公此去終不忍徒勞掩袂傷紅粉百年離别在髙樓一代紅顔爲君盡載初元年三月也四月下獄死同前宣宗好文嘗賦詩有金歩揺未能對令温􅄮卿即廷筠也續之􅄮卿以玉跳脫應之宣宗令以甲科處之為令狐綯所沮除方城尉綯曾問其事扵􅄮􅄮曰出南華真經非僻書也冀相公爕理之暇時冝覧古綯怒甚後􅄮有詩曰悔讀南華第二篇之句南部新書北夣􅃈言廷筠事甚詳此獨載玉跳脫事又􅃈言以跳為條與此不同南華真經無玉跳脫事不知當時何所㨿也劉希夷詩曰年年歲歲花相似歲歲年年人不同其舅宋之問苦愛此两句知其未乏傳人懇乞許而不與之問怒以土袋壓殺之宋不得其死亦其報也並同前薛令之閩之長溪人嘗爲右庻子時開元東宫官僚清冷令之作詩題于壁曰朝日上團團照見先生盤盤中何所有苜蓿長䦨干飯澁匙難綰羮稀筯易寛無以謀朝夕何由保歲寒明皇行東宫見之題於其傍曰啄木觜距長鳯凰毛羽短􅀂嫌松桂寒任逐桑榆煖遂謝病歸古今詩話南唐徐融夜􅀫金山詩云維船分蟻照江市聚蠅聲烈祖姓嚴忌宋齊丘譛之以竹籠沉于京口開元間禁中初重木芍藥植扵興慶池東沉香亭會花盛開明皇乗照夜駒妃子歩輦從之詔選梨園弟子中􅀹者得樂十六色李􅀛年以歌擅一時之名手擅捧板押衆前樂將歌明皇曰賞名花對妃子焉用舊詞􅃍命李􅀛年持金花牋賜李白立進清平調詞三章白承詔尚苦􅀫醒遂賦詞其一曰雲想衣裳花想容清風拂檻露華穠􅀂非群玉山頭見定向瑶䑓月下逢其二曰一枝紅艶露凝香雲雨巫山枉㫁腸借問漢宫誰第一可憐飛燕􅀝新粧其三曰名花傾國两相歡常得君王帶􅀏看解釋春風無限恨沉香亭北􅀝䦨干􅀛年遂以調進令梨園弟子歌之太真妃持七寳盃酌西梁州葡萄酒􅀏領歌意明皇因調玉笛􅀝曲遲其聲以媚太真妃自是顧白􅀹異於諸學士然髙力士終以脫靴為耻異日太真妃重吟前詞力士曰始謂太真妃怨白入骨髓翻拳拳如是􅁘太真妃因驚曰何翰林學士能辱人如此力士曰以妃子比飛燕賤之甚矣太真妃頗深然之明皇欲三命白官卒為宫中所沮而止孟浩然逰京師張九齡王維雅稱道之維因邀入内省俄而明皇至浩然匿床下維以實對帝喜曰聞其人矣而未之見也何懼而匿詔出問所爲詩浩然自誦云不才明主棄明皇曰卿自不求仕非朕棄卿也柰何誣我因放還並同前孟浩然曾謁華山李相不遇因留一絶而去曰老夫三日門前立朱箔銀屏晝不開詩卷却抛書袋内譬如閑看華山來一日明皇召李對􅀃及浩然事對曰見在臣􅀻第急召俾口進佳句孟誦北闕休上書南山歸舊廬不才明主棄多病故人踈明皇不恱曰未嘗見浩然進書朝廷退黜何不云氣蒸雲夢澤波動岳陽城由此不遇與前所言及摭言稍異又北夣􅃈言載元宗謂浩然何不道氣蒸雲夣澤波動岳陽城由是不遇於布衣襄陽詩人孟浩然開元中頗爲王右丞所知有㣲雲淡河漢踈雨滳梧桐之句右丞擊節賞之維侍金鑾殿一日召之商較古今風雅忽遇明皇幸維所浩然錯愕伏床下維不敢􅀮奏聞明皇欣然曰素聞其人因得召見卿將何詩來否浩然曰偶不將來奉詔念詩曰北闕休上書南山歸舊閭不才明主棄多病故人踈明皇憮然曰朕未曾棄人自是卿不求進柰何有此作因命歸終南山唐宣宗索趙嘏詩其卷首有題秦詩云徒知六國隨斤斧莫有群儒定是非宣宗不恱北夣􅃈言正訛門宋謝眺詩云芳洲採杜􅀂正觀中醫局求杜􅀂度攴􅀰乃下坊州令貢州司判報云不出杜􅀂應由謝眺詩悮也太宗聞之大􅀏判司改雍州司法度攴􅀰免官小􅀃舊聞張安道云江鄰㡬言孟郊死葬北邙山非退之詩也賀家湖上天花寺一一僧窓向水開不用閉門防俗客愛閒能有㡬人來此呉文靖詩也詩史灔澦歌水經云白帝山城門西江有􅀌石冬出二十餘丈夏即没去郡二十里有瞿塘湍言灔澦石與城郭門外石潜通蜀人徃燒火伏時則灔澦邉沸王濬平呉􅀹作預石今訛曰灔澦瞿塘湍水急諺曰灔澦大如馬瞿塘不可下古今詩話老杜有杜日两篇其一曰尚想東方朔詼諧割肉歸然而漢書所載事乃伏日直方詩話山谷云老杜長鑱短鑱白木柄我生托此以為命黄獨無苗山雪盛短衣數挽不揜脛徃時儒者不解黄獨義改爲黄精學者承之以余攷之盖黄獨是也本草諸魁注黄獨肉白黄色漢人蒸食之江東謂之土芋余求之江西江西謂之土卵蒸煑食之􅀋芋魁也老杜家諱閑而詩中有云翩翩戯蝶閑過幔或云恐傳者謬又有宴王使君宅詩云汎愛憐霜􅁂留歡卜夜閑余以為當以閑為正臨文恐自不以爲避也老杜送賈閣老出守汝州云雲山紫邏深世之注云邏塞也取巡邏之義而余觀九域圖乃云汝州有紫邏山京師人呼大夫為大斧呼承制為承池盖語訛也有入戯為句云大夫何嘗斧承制豈當池或云不當池舊以王維有詩名而好取人章句如行到水窮處坐看雲起時乃英華集詩也漠漠水田飛白鷺隂隂夏木囀黄􅕢乃李嘉祐詩也余以為有摩詰之才則不可然是剽􅀼之雄耳劉貢父作詩話稱杜甫云功曹非復漢蕭何按光武謂鄧禹何以不􅁺功曹謂曹叅嘗為功曹云鄼侯非也雍丘江子載云高祖紀何為主吏孟康曰主吏功曹也貢父之言過矣貢父又云白樂天詩云請錢不早朝請作平聲唐人語也江子載亦云顔師古注漢書請或音才性反或不音唐或以請作平聲悮矣舒王集中有落星寺詩其末云勝槩惟詩可収拾不才羞作等閑來落星寺在彭蠡湖中劉咸臨嘗親見寺僧言㓜時目覩閩中章傳道作此詩其前六句皆同其末云勝槩詩人盡収拾可憐蘇石不曾來蘇石謂子羙并曼卿也後人愛其詩者改末句作舒王詩傳之遂使一篇之意不完其體與舒王所作詩語不同也並同前荘子曰野馬也塵埃也乃是两物古人謂野馬塵埃呉融賦曰動梁間之野馬韓渥詩云牕裏日光飛野馬恐不然野馬乃田間逰氣逺望如群馬又如水浪佛書謂如􅀬時野馬陽熖即此物也古今詩話章聖朝試天德清明賦有閩士破題云天道如何仰之彌高讀作歌會考試者亦閩人遂中選又荆南士人今雪詩用先字韻其末句云十二峰前旋旋添添作天守郡謂之建麾盖用顔延年一麾乃出守之句不知其悞也延年謂一麾之麾如武王右秉白旄以麾之麾耳延年贈始平詩云屢薦不入官一麾乃出守謂山濤薦咸為吏部􅀰三上而武帝不用其後一擠遂出始平故有此句延年􅀍擯以此自托爾後杜牧之爲登樂逰原詩云擬把一麾江海去樂逰原上望昭陵遂為故事今人不用厮字唐人作斯音五代時作入聲陶榖詩云尖簷帽子卑凢厮是也樂天又云金屑琵琶槽雪擺胡騰琵琶胡語與今人同少陵詩云皂鵰寒始急白公歌云千呼萬喚始出來皆以為語病其實不然事之終始則音上聲有所􅀫留則音去聲二公詩非語病也宋景文言大􅀌山以􅀌獨為字有廟在江壖乃為婦人形陳蕳夫留詩曰山稱􅀌獨字廟塑女􅀰形過客須知誤行人尚乞靈時稱佳句羊愔太山人甞逰阮􅀰亭崕下有􅂐字詩刻石世傳漢阮肇所書驗之乃李陽氷爲緒雲令時逰此亭題耳詩云阮客家何在仙雲洞口横人間不到處今日此中行杜少陵詩云家家飬烏􅀑頓頓食黄魚􅀃者謂䕫峽間有􅀑户乃夷人也不聞有烏􅀑盖蜀人臨水居者皆飬鸕鷀繩繫其頸使捕魚得魚則倒持出之至今如此詩家用也字本皆音夜杜詩云清絶也元禎云也向􅄌恩寺裏㳺今人讀為如字非也張端為河南司録府當祭社買猪呈尹猪走入端家即取殺之吏以白尹尹召端問端對按律云猪夜入人家主人登時殺之勿論尹大􅀏令别市猪並同前歐陽公記陶榖詩末厥兵不暁其意余謂今人呼秃尾犬為厥尾衣之短者亦呼為厥然則此兵正謂其末賤耳今人不以末厥相連言之其義則是也不然則不可對卑凢厮貢父詩話世人語虚偽者為何樓似汎濫之名其實不然國初京師有何家樓其下所賣物皆汚濫者故人以此目之樓巳廢語尚在也俳優人言河市樂人􅀃者謂石駙馬在南都其家樂甚盛詆誚南河市中樂人故得此名其不然唐元和時燕呉行紀巳有河市字大抵不􅀠軍中有河市者散樂名也又人謂事之陳乆者為賛本五代時有馬賛者為使府幕官其人魯戇有所聞見他人巳熟而巳方為新竒而道之時人見有言事之陳者皆號賛云薛簡肅公尹開封以嚴為治謂之薛出油其後牧成都歳豐人樂其俗與之逰作春逰好十首自􅃅薛春逰欲換前稱也並同前李文正進永昌陵挽辭云奠玉五廻朝上帝御樓三度納降王當時群臣皆進惟文正詞最為首出所謂三降王者廣南劉鋹西蜀孟昶江南李煜也五朝上帝則誤矣建􅂭盡四年明年初郊改乾德至六年再郊改元開寳五年又郊而不改元九年己平江南四月大雩告謝扵西京欲盖執玉祀天者實四也當時人必繆傳者誤為五耳歐公詩話古詩云䄂中有短歌欲􅀉􅀟飛燕意以燕春來秋去自可􅀉書故寓言尔今人馴養家鴿携在外數千里輙能還家蜀人以事至京師者以鴿􅀉書不旬日而逹賈人舶船浮海亦以鴿􅀉書皆非虚言也陸機使黄耳􅀉書此殆不然自洛至呉更厯江淮犬何能濟必從舟楫而渡犬又豈能諭意扵渉人或者謂陸機有奴名黄耳因此爲狗也貢父詩話淮南張佖知舉進士試天雞弄和風佖但以文選中詩句爲題未甞詳究也有進士白試官云爾雅天雞䮧天雞天雞有二未知孰是佖大驚不能對亟取爾雅檢釋䖝有天雞小䖝黒身赤頭一名莎雞一名樗雞釋鳥有䮧天雞赤羽逸周書曰文䮧􅀂彩雞成王時蜀人獻之江東士人深於學問有如此者談苑李白戯杜甫云借問别來太痩生只爲從前作詩苦太痩生唐人語也至今􅀹以生爲語助所謂可憐生作么生何似生之􅀋是也陶穀有詩云尖簷帽子卑凢厮短靿靴兒末厥生亦當時語也余天章景祐間巳聞此語時陶公卒未乆人莫曉其義王元叔慱學多聞最為多識亦不知爲何語也記之必有知之者歐陽詩話貢父謂未厥兵今謂未厥生姑存之延州五城􅀃者以謂舊有東西二城夾河對立高方典郡始展東西北三城予讀杜詩云五城何迢迢迢迢隔河水延州秦北門山川猶可恃乃知天寳間巳有五城也筆談茶芽古謂之雀舌麥顆取其至嫩也余謂茶之羙者其質素良而所植之土又羙則新芽一發便長寸餘其細如針惟芽長為上品以其質榦土力皆有餘也如雀舌麥顆極下材耳乃北人不識誤爲品題予山居有茶崘為茶崘詩曰誰把嫩香名雀舌定知北客未曾嘗不知靈草天然異一夜風吹一寸長同前司馬君實嘗論九旗之名旗與旂相近緩急何以區别小雅庭燎夜向晨言􅀚其旂左傳尾伏辰取虢之旂當為芹音耳關中人言清濁之清則不改言丹青之青為萋又以中為蒸䖝為塵不知旂本是芹亦􅀜中人語轉丹青之言萋也五方之人語言􅀂是者多閩人以高為歌荆楚以雞為斤文士作歌詩亦多不悟也向丞相敏中知長安不敢賣蒸餅云觸諱盖關中人以中為蒸也貢父詩話増修詩話總􅀛卷之廿九百家詩話總􅀛後集卷之二十九詠茶門庫部林􅀰中􅀃建州上春採茶時茶園人無數撃皷聲聞數里然一園中􅅻間壟茶品巳相逺又况山園之異邪苕溪漁隐曰歐陽永叔嘗新茶詩云年穷臘尽春􅁒動蛰雷未起駈龍蛇夜聞撃皷满山谷千人􅂇呌聲喊呀萬木寒痴睡不醒惟有此􅀣先萌芽余官冨沙凡三春􅇱見北苑造茶但其地煖􅅻驚蛰茶芽長导許􅀄無擊皷喊山之事永叔詩與文昌所紀皆非也北苑茶山凡十四五里茶味惟均亦豈有間壟茶品已相逺之􅀃邪文昌雜録歐公和劉原父􅀭州時㑹堂絶句云積雪猶封䝉頂􅀣驚雷未發建溪春中洲地煖萌芽早入貢冝先百物新注云時㑹堂造貢茶所也余以陸羽茶經考之不言􅀭州岀茶惟毛文錫茶譜云􅀭州禅智寺隋之故宫寺在蜀岡其茶􅅴香味如䝉頂焉第不知入貢之因起扵何時故不得而誌之也苕溪漁隠東坡汲江水煎茶詩云活水還湏活火烹自臨釣石取深清大瓢貯月㱕春瓮小杓分江入夜瓶此詩奇甚道尽烹茶之要且茶非活水則不能發其鮮馥東坡深知此理矣余頃在冨沙嘗汲溪水烹茶色香味俱成三絶又况其地産茶為天下第一冝其水異扵他處用以烹茶水功倍之至扵浣衣􅀹更㓗白則水之輕清益可知矣近城山間有陸羽井水亦清􅅴寔好事者爲名之羽著經言建州茶未得詳則知羽不曽至冨沙也同上建安北􅁐茶始扵太宗太平興􅀦二年遣使造之取象扵龍鳯以别庻飲由此入貢至道間仍添造石乳其後大小龍茶又起扵丁謂而成扵蔡君謨謂之将􅈇閩中實董其事賦北􅁐焙新茶詩其序云産茶者将七十郡每􅀊入貢皆以社前火前爲名悉無其寔惟建州出茶有焙焙有三十六三十六中惟北􅁐彂而味􅀹佳社前十五日即採其芽日數千工聚而造之逼社即入貢工甚大造甚精皆載於所撰建安茶録仍作詩以大其事云北苑龍茶著甘鮮的是珍四方惟數此萬物更無新􅅻吐㣲茫緑􅀄沾少許春散㝷萦􅀣遍急採上山頻􅀫葉寒􅀹在芳芽冷未伸茅茨溪口焙籃籠雨中民長疾勾萌拆開齊分两均􅅁􅃄蒸雀舌和露叠龍鱗貢作勝諸道先嘗祇一人緘封瞻闕下郵傳渡江濵特㫖㽞丹禁殊㤙賜近臣啜灵藥􅂇用與上罇親頭進英華盡􅀄烹氣味醇細香勝却麝淺色過扵筠頋渚慙投木冝都愧積薪年年號供御天産壮甌閩此詩叙貢茶頗為詳盡亦可見當時之事也又君謨茶録序云臣前因奏事伏䝉陛下諭臣先任福建轉運使日所進上品龍茶最為精好臣退念艸木之㣲首辱陛下知鍳若處之得地則能盡其材昔陸羽茶􅀴不苐建安之品丁謂茶圖獨論採造之本至扵烹試曽未有聞輙條數字蕳而易明勒成二萹名曰茶録至宣政間鄭可蕳以貢茶進用乆領漕試創添續入其數浸廣今猶因之細色茶五綱凡四十三品形製各異共七千餘餅其間貢新試新龍團勝雪白茶御苑玉芽此五品乃水㨂為苐一餘乃生揀次之又有粗色茶七䋄凡五品大小龍鳯并㨂芽悉入龍腦和膏為團餅茶共四萬餘餅東坡題汶公詩卷云上人問我􅇔連意待賜頭䋄八品茶即今粗色紅綾袋八品者是也盖水㨂茶即社前者生㨂茶即火煎者粗色茶即􅀨前閩中地煖雨則茶巳老而味加重矣山谷和􅀭王休点宻雲龍詩云小壁雲龍不入香元豊龍焙承詔作今細色茶中却無此一品也又有石門乳吉香口三外焙亦􅀠扵北苑皆採摘茶芽送官焙添造每􅀊縻金共二萬餘緍日役千夫凡兩月方能迄事苐所造之茶不許過數入貢之後市無貨者人所罕得惟􅊤源諸處􅀻焙茶其絶品亦可敵官焙自昔至今亦皆入貢其流販四方悉􅀻焙茶耳蘇黄皆有詩称道􅊤源茶盖􅊤源與北苑為鄰山阜相接才三里餘其茶甘香特在諸􅀻焙之上東坡和曹輔􅀉壑源試焙新芽詩云仙山靈雨􅊜行雲洗遍香肌粉未匀明月来投玉川子春風吹散武林春要知玉雪心腸好不是膏油首面新戯作小詩君一􅀏􅀙来佳茗似佳人山谷謝送碾賜􅊤源㨂芽詩云矞雲􅀙龍小蒼璧元豊至今人未識􅊤源包貢第一春御奩碾香俱玉食睿思殿中金井攔甘露薦枕天開顔橋山事事百􅈰衮司諸公省中宿中人傳賜夜未央雨露㤙光照官燭右丞似是李元禮好事風流有涇渭肯怜天禄校書􅀰親敕家庭遣分似春風飽食太官羊不慣腐儒湯餅腸捜攪十年灯火讀令我􅇩中書傳香已戒應門牛馬走客来問字莫載酒苕溪漁隠建州陸羽茶經尚未知之但言福建等十二州未詳徃徃得之其味極佳江右日近方有䗶面之號李氏别令取其乳作片或號曰京挺的乳及骨子等毎􅀊不過五六萬斤迄今􅀊出三十餘萬斤凡十品曰龍茶鳯茶京挺的乳召乳白乳頭金䗶面頭骨次骨龍茶以供乗輿及賜执政親王長主餘皇族學士将帥皆得鳯茶舎人近臣賜金挺的乳館閣賜白乳龍鳯石乳茶皆太宗令造江右有研膏茶供御即龍茶之品也丁謂為北􅁐茶録三卷俻載造茶之妙未行扵世談􅁐唐茶惟湖州紫筍入貢每􅀊以清明日貢到先薦宗廟然後分賜近臣紫筍生頋渚在湖常二境之間當採茶時兩郡守畢至最為盛集此蔡寛夫詩話之言也蔡但知其一而不知其二按陸羽茶經云浙西以湖州上常州次湖州生長興縣顧渚山中常州義興縣生君山懸脚嶺北􅈐下唐義興縣重脩茶舎記云義興貢茶非舊也前此故御史大夫李栖筠實典是􅀖山僧有獻佳茗者㑹客嘗之野人陸羽以為芬香甘辣冠于他境可薦扵上栖筠􅀙之始進萬两此其濫觴也厥後因之徵獻浸廣遂為任􅁟之貢與常賦之􅀖侔矣故玉川子詩云天子湏嘗陽羡茶百艸不敢先開花正謂是也當時顧渚義興皆貢茶又鄰壌相接白樂天守姑􅂫聞賈常州崔湖州茶山境㑹想羡􅂬宴因􅀉詩云遥聞境㑹茶山夜珠翠􅁔鍾俱遶身􅐻下中分两州界燈前合作一家春青娥􅉍舞應争妙紫筍斉嘗各閗新自欵花時北窓下蒲黄酒對病眠人唐􅀽高爲湖州刺史因修貢顧渚茶山作詩云禹貢通逺俗始圖在安人後王失其本聀吏不敢陳亦有姦佞者因兹欲求神動生千金費日使萬姓貧我耒顧渚源淂與茶事親􅀺甿輟耕農采掇實苦辛一夫且當役盡室皆同臻捫􅁑上欹壁蓬頭八􅂽榛終朝不􅄹掬手足皆鱗皴悲嗟遍空山艸木爲不春隂嶺牙未􅄍使曹牒巳頻心争造化先走挺麋鹿均選納無日夜擣聲昏繫晨衆功何枯櫨俯視弥傷神皇帝尚廵狩東郊路多堙周囬繞天涯所獻惟艱勤况减兵革用兼兹困疲民未知供御餘誰合分此珎顧省忝􅀖守有慙復因循茫茫滄海間丹憤何由申此詩雅得詩人諷諌之体誠可尚也苕溪漁隠玉川子有謝孟諌議恵茶􅁔范希文亦有閗茶􅁔此二萹皆佳作也殆未可以優劣論然玉川􅁔云至尊之餘合王公何事便到山人家而希文云北􅁐􅀅期獻天子林下雄豪先閗羙若論先後之序則玉川之言差勝雖然如希文豈不知上下之分者㢤亦各賦一時之事耳苕溪漁隠曰藝􅁐以此二萹皆佳作未可􅄖劣論今並録全余謂玉川之詩􅄖扵希文之􅁔玉川自出􅇩臆造語穩貼得詩人之句法希文排比故實巧欲形容宛成有韵之文是果無優劣􅁘玉川走筆謝孟諌議􅀉新茶云日髙丈五睡正濃軍􅀅打門驚周公自云諌議送書信白絹斜封三道印開緘宛見諌議面手閱月團三百片聞道新年八山裏蛰䖝驚動春風起天子湏嘗陽羡茶百艸不敢先開花仁風暗結珠琲瓃先春抽出黄金芽摘鮮焙芳旋封裏至精至好且不奢至尊之餘合王公何當便到山人家柴門反関無俗客紗㡌挂頭自煎吃碧雲引風吹不㫁白花浮光凝椀面一椀喉吻􅃳两椀破􅀌悶三椀捜枯腸惟有文字五千卷四椀發輕汗平生不平事盡向毛孔散五椀肌骨清六椀通仙靈七椀喫不得也唯斍两腋習習清風生蓬莱山在何処玉川子乗此清風欲㱕去山上群仙司下􅁟地位清髙隔風雨安得知百萬億蒼生命堕在顛崖受辛苦便為諌議問蒼生到頭合得􅂫息否希文和章岷􅀙事閗茶􅁔云年年春自東􅀯来建溪先煖氷㣲開溪邉竒茗冠天下武夷仙人􅀙古㘽新雷昨夜發何處家家嬉􅀏穿雲去露芽錯落一畨营綴玉含珠散嘉􅀣終朝采掇未􅄹􅃝唯求精粹不敢貪研膏焙乳有雅製方中圭􅀆圓中蟾北苑将期獻天子林下雄豪先閗羙􅂦磨雲外首山銅瓶携江上中􅍽水黄金碾畔緑塵飛碧玉甌中翠濤起閗茶味􅀆輕醍醐閗茶香􅀆薄蘭芷其間品第胡能欺十目視而十手指勝若登山不可扳輸同􅑙􅀅無窮恥吁嗟天産石上英論功不愧堦前蓂衆人之濁我可清千日之醉我可醒屈原試與招魂魄劉怜却得聞雷霆盧仝敢不􅁔陸羽湏作經森然萬象中焉知無茶星啇山丈人休茹芝首陽先生休采􅅔長安酒價减千萬成都藥市無光輝不如仙山一啜好泠然便欲乗風飛君莫羡花間女􅀰只閗艸嬴得珠璣满斗㱕百家詩話總􅀛卷之二十九
