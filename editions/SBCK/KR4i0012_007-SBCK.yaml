front:
  text: 詩話總􅀛卷之七
  hash: sha256:f03f32cf39717c3885b3e10d07bfe55cd96108affc6d259dbb7866e6ced3efcb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_007-1a}
body:
  text: 評論門三南嶽李岩老好睡衆人食罷下碁岩老輙就枕閱數局乃一展轉云我始一局公㡬局矣東坡曰岩老常用四脚棊盤只着一色黒子昔與邉韶敵手今􅀍陳􅅮饒先着時自有輸嬴着了全無一物歐陽公詩云夜涼吹笛千山月路暗迷人百種花碁罷不知人換世酒䦨無柰客思家殆􅀋是也百斛明珠竹逕通幽處禪房花木深常建詩也文忠公最愛賞以爲不可及此語誠可人意然於公何足道豈非厭飫芻豢反思螺蛤􅁘予在都下有傳太白詩者其略曰朝披雲夣澤又曰笠澤青茫茫此非世人語也盖有見太白在酒肆而得此詩者神仙之道真不可度紹聖元年九月過廣州訪崇道太師何徳順有神仙降其室因言女仙也賦詩立成有超逸絶塵語或以其托扵箕箒如世之紫姑神者疑之然味其言非紫姑所能至有入􅀑獄群鳥獸者而托於箕箒豈足恠㢤崇道好事喜客多與士大夫㳺其必有以致㢤七言之偉䴡者杜子羙云旌旗日暖龍蛇動宫殿風㣲燕雀高五更皷用聲悲壯三峽星河影動揺尔後寂寥無聞直至永叔云蒼波萬古流不盡白鷺雙飛意自閑萬馬不嘶聴􅃅令諸蕃無事樂耕枟可以並驅争先矣小生云令嚴鍾皷三更月野􅀫􅆛貅萬竈烟又云露布朝馳玉􅀜塞捷書夜到甘泉宫亦庻幾焉樂天爲王涯所誣謫江州司馬甘露之禍樂天在洛適遊香山寺有詩云當君白首同歸日是我青山獨徃時不知者以樂天爲幸之樂天豈幸人之禍者盖悲之也俗傳書生入官庫見錢不識或怪而問之生曰固知其爲錢但恠其不在􅁓褁中耳予讀淵明歸去來辭云㓜稚􅄹室瓶無儲粟乃知俗傳可信使瓶有儲粟亦甚㣲矣此翁平生只於瓶中見粟也馬后夫人見大練乃爲異物晋惠帝問飢民何不食肉麋細思之皆一理也􅂓爲好事一􅀏永叔嘗言孟郊詩􅁂􅁁雖有絲不堪織寒衣縦使堪織能成幾何淵明詩采菊東籬下悠然見南山采菊之次偶見南山初不用意而景與意㑹故可喜也今皆作望南山子羙云白鷗沒浩蕩萬里誰能馴盖㓕没於波間耳而朱敏求謂予曰鷗不解没改作波字改此覺一篇神氣索然唐宋五代文章衰盡詩有貫休有亞栖村俗之氣大率相似如蘇子羙家収藏張長史書云隔簾歌已俊對面貌彌精旣凢惡而字􅀞真亞栖之流近見曾子固編李太白詩自謂頗獲遺亡而有贈懷素草書歌及􅀏矣乎數百篇皆貫休以下詞格二人者皆號有識故知者深可恠如白樂天贈徐凝韓退之贈賈島之􅀋皆世俗無知者所托此不足恠杜子羙詩云自平宫中吕太一世莫曉其義而妄者至以爲唐時有自平宫偶讀明皇實録有中官吕太一叛廣南此詩故云而下文有南海􅀵珠之語見書不廣而輕改文字鮮不爲􅀏也秋菊有佳色浥露掇其英泛此忘憂物逺我遺世情一觴難獨進盃盡壺自傾日入群動息歸鳥趍林鳴嘯傲東軒下􅂓復得此生靖節以無事自􅃴爲得此生則見役於物非失此生􅁘貴公子雪中飲醉臨檻向風曰爽㢤此風左右皆泣下貴公子驚問之曰吾父昔日以爽亡楚襄登䑓有風颯然而至王曰快㢤此風寡人與衆共者􅁘宋玊譏之曰此獨大王之風庻人安得而共之不知者以爲謟也知之者以爲風也唐文宗詩曰人皆苦炎􅀬我愛夏日長柳公􅁠續之曰薰風自南來殿閣生㣲凉惜乎宋玉不在旁也湘中老人讀黄老手挼紫虆坐碧草春至不知湖水深日暮忘却巴陵道唐末有人見作是詩其辭氣殆是李謪仙予都下見有人携一􅁓文書字則顔魯公也墨跡如未乾􅁓亦新徤其首两句云朝披雲夣澤笠釣青茫茫此語非太白不能道南都王􅁩伯書江濵馹垣謂子羙詩歷五季兵火多斘缺竒異雖經其祖父公所理尚有疑􅆣者􅁩伯謂西川有杜䳌東川無杜䳌涪萬無杜䳌雲安有杜䳌盖是題下注㫁自我昔逰錦城爲首句􅁩伯悮矣盖子羙詩備諸家體非必率合程度偘偘者然也是篇句處凡五杜䳌豈可以文害辭辭害意即原子羙之意􅀋有所感托物以發者也亦六義之比興離騷之法歟按博物志杜鵑生子􅀉之他巢百鳥飼之今江東􅀁謂杜宇曾爲蜀帝王化禽飛去舊城荒是也且禽鳥之㣲知有尊故子羙詩云重是古帝魂又禮􅀂奉至尊子羙盖譏當時之刺史有不禽鳥若也自唐明皇已後天歩多􅁄刺史能造次不忘於君者可得而考嚴武在蜀雖橫歛刻薄而實資中原是西川有杜䳌耳其不䖍王命􅀒固以自抗擅軍旅絶貢賦如杜克遜在梓州爲朝廷西顧憂是東川無杜䳌耳至於涪萬雲安刺史㣲不可考凡其尊君者為有也懷貳者爲無也不在夫杜䳌真有無也􅁩伯以為來東川聞杜䳌聲煩而急乃始疑子羙詩䟦㚄􅁓上語又云子羙不􅀿叠用韻子羙自我作古叠用韻無害扵為詩僕見如此􅁩伯博學強辨殆必有以折􅂨之悲陳陶云四十萬人同日死此房琯之敗也唐書作陳濤不知孰是時琯旣敗猶欲持重有所伺而中人邢延恩促戰遂大敗故此次篇悲長坂云焉得附書與我軍忍待明年莫倉卒後出塞云我本良家子出師亦多門將驕益愁思身貴不足論躍馬三十年恐􅇳明主恩云云惡名幸脫免窮老無児孫味此詩盖禄山反時其將帥有脫身歸國而禄山盡殺其妻子者不知其姓名可恨也憶昔詩云􅀜中小児壞綱紀謂李輔國也張后不樂上爲忙謂肅宗張皇后也爲留猛士守未央謂郭子儀奪兵柄入􅀫衛也子羙自許稷與契人未必許也然其詩云舜舉十六相身尊道更高秦時用商鞅法令如牛毛自是稷契軰人口中語也又云知名未足稱局促商山芝又曰王侯與螻蟻同盡隨丘墟願聞第一義回向心地初乃知子羙詩尚有事在玉川子作月蝕詩云歲星坐福德官爵奉董秦忍使黔婁生覆屍無衣巾詳味此詩則董秦當是無功而享厚䘵董秦李忠臣也天寳末驕將屢立戰功雖粗官亦頗知忠義代宗時吐蕃犯􅆣徴兵忠臣即日赴難或􅂆擇日忠臣怒曰君父在難乃擇日也後卒汚朱泚僞命誅考其始終非無功而享厚䘵者不知玉川子何以有此句詩人有寫物之功桑之未落其葉沃􅀂他木殆不可以當此林逋梅花詩云踈影横斜水清淺暗香浮動月黄昏决非桃李詩皮日休白蓮詩云無情有恨何人見月冷風清欲墜時决非紅蓮詩此乃寫物之功若石曼卿紅梅詩云認桃無緑葉辨杏有青枝此村學中至陋語也王燾集外䑓秘要有代茶飲子一首云格韻高絶惟山居野人乃當作之予嘗依法治服其利鬲調中信如所云而其氣味乃一服煑散耳與茶了无干渉薛能詩云粗官乞與真抛擲賴有詩情合得嘗又作鳥觜詩曰塩損添冝戒薑冝煑更誇乃知唐人之於茶盖有河朔脂麻氣也並同前老杜云張公一生江海客身長九尺鬚眉蒼謂張鎬也蕭嵩薦之云用之爲帝王師不用則窮谷一叟爾同前長沙天䇿府諸學士所著文章擅名者惟徐東野李洪臯耳然其詩皆浮脆輕艶鈆華歌舞一時尊爼間語獨東野贈江處士一篇可采曰門在松隂裏山僧幾度過藥靈丸不大棊妙子無多薄霧籠寒徑殘風戀緑蘿金烏兼玉兎年幾柰公何玉壺清話將進酒魏謂之平􅀜中呉謂之章洪徳晋謂之因時運梁謂之石首扄齊謂之破侯景周謂之取巴蜀李白所擬直􅂆岑夫子丹丘生飲耳李賀深扵樂府至扵此作其辭亦曰琉璃鍾琥珀濃小槽酒滳珎珠紅嗟乎作詩者擺落鄙近以得意外趣者古今難矣樂府集君馬黄古詞云君馬黄臣馬蒼二馬同逐臣馬良終言羙人歸以南歸以北駕車馳馬令我傷李白擬之遂有君馬黄我馬白馬色雖不同人心本無隔其末云相知在急難獨好亦何益自能馳騁不與古人同圏摸非逺非近此可謂善學詩者歟日出東南隅行古詞曰日出東南隅照我秦氏樓舊􅀃邯鄲女子姓秦名羅敷爲邑人千乗王仁妻仁爲趙王家令羅敷出採桑陌上趙王登樓見而恱之置酒欲奪焉羅敷彈筝作陌上桑以自明不從今其詞乃羅敷采桑陌上爲使君所邀羅敷盛誇其夫爲侍郎以拒之論者病其不同大抵詩人感詠隨所命意不必盡當其事所謂不以辭害意也且發乎情止乎禮義古詩之風也今次是詩盖將體原其跡而以辨䴡是逞約之以義殆有所未合而盧思道􅀓縡張正見復不究明更爲祖述使􅀂其夫不有東方􅀐不爲侍中􅀰不作專城居乃得從使君之載歟如劉􅊬王筠之作蚕不飢日未暮亦安得徬徨爲使君留哉蕭撝殷謀曾不足道而沈君攸所謂看金怯舉意求心自可知者庻㡬焉故秋胡婦曰婦人當采桑力作以飬舅姑亦不願人之金此真烈之辭耳余嘗擬古作一篇以著羅敷所以待使君之當然者直欲規諸子以就雅正豈固與古人争驅㢤其詞曰羅敷十五六采桑城南道臉媚奪朝霞蛾眉淡􅀄掃桑枝間桃􅀣不見桃花好采桑未盈筐春寒蚕欲老使君從南來黄金絡馬腦調􅀏一不顧東風揺百艸玄雲周禮保章氏以五雲之物辨吉凶水旱豐荒之祲雲黒爲水魏劉掞詩曰玄雲起髙岳中朝彌八方春秋孔演圖曰黄帝之將興黄雲升於堂文命之􅀱玄龍衝雲漢曲名此謂是乎隴頭吟隴州有大隴小隴二山即天水大坂也古詞云隴頭流水鳴幽咽遥望秦川腸欲絶作是詩者著征役之思耳􅀜山月木蘭詩萬里赴戎機􅀜山度􅀂飛􅃋氣傳金柝寒光照鐡衣濟黄河援神契黄河者水之伯上􅀿天河􅐱元水經云河源出崑崙之墟山海經崐崘縱橫萬里髙萬有一千里有青白赤黒河環其墟其泉出東北陬屈向東南流為中國河百里一小曲千里一大曲發源乃入中國常然爾雅河出崐崘墟色白由此言之今之黄河所謂白河也而物理論乃云河色黄赤渡易水曲荆軻去燕入秦渡易水爲之歌曰風蕭蕭􅀆易水寒壯士一去􅀆不復還其後如呉均所作雖叙征虜事盖亦取軻感激之意董逃行言神事􅀓休奕九秋篇十二章乃叙夫婦別離之思梁簡文賦行幸甘泉宫歌復云董桃律金紫賢妻侍禁中疑􅀂引董賢及子瑕殘桃事終云不羡神仙侣排烟逐駕鴻皆所未詳按漢武内傳王母觴帝命侍女索桃剰桃七枚大如鴨子形色正青以四枚㗖帝因自食其三帝􅀵餘核王母問何爲帝曰欲種之王毋曰此桃三千歲一生實柰何帝乃止於是數過命侍女董􅀟成吹雲和笙觴作者取諸此􅁘桃葉歌桃葉王獻之愛妾名也其妹曰桃根詞云桃葉復桃葉桃葉連桃根今秦淮口有桃葉渡即其事也古人載桃葉答獻之乃團扇辭盖傳者悮也團扇歌晋中書令王珉好持白扇其侍人謝芳歌之因以爲名一􅀃珉與嫂婢有情好甚篤嫂鞭撻過苦婢素善歌而珉好持白團扇故云團扇復團扇許持自􅃒面憔悴無復理羞與􅀰相見大垂手舞貌也楚辭曰二八齊容起鄭舞祍􅀂交竿舞按下梁劉孝標舞詩曰轉䄂隨歌發頓履赴絃餘度行過接手回身乍歛裾胡􅁎年十五李白樂府有白鼻騧其詞曰銀鞍白鼻騧緑地障泥錦細雨春風花落時揮鞭且就胡􅁎飲豫章行豫章邑名漢南昌縣隋爲豫章有豫章江江連九江有釣磯陶侃少時嘗􅀫此夜聞人唱聲如量米者訪之呉時有度攴扵此亡今考􅀓玄陸士衡軰所作多叙別離怨恨思即知豫章昔爲華艶盛䴡之區耳至唐杜牧詩尚過稱其侈靡焉走馬引樗里牧恭所作也爲父報怨殺人亡匿山下有天馬夜降團其室而鳴覺聞其聲以爲吏追乃奔去旦觀乃天馬跡因愓然大悟曰吾之所處將危乎遂荷杖去入沂澤中援琴而鼓之爲天馬聲曰走馬引而張敞為京兆尹無威儀時罷朝㑹過走馬章䑓街風俗曰殺君馬者路旁児也言長吏馬肥􅀚者快之喜其言驅馳不止至於死故張率作此引曰歛轡且歸去吾畏路旁児烏夜啼宋臨川王義慶所造時爲江州刺史聞命而􅂘文帝怪之召還家大懼妓妾夜聞烏啼叩齋閤云明日應有赦及改爲南州因作此歌詞云籠窓窓不開夜夜憶􅀰來今所傳非義慶本㫖詞曰歌舞諸少年娉婷無種則菖蒲花可憐聞名不相識雀乳空城中晋􅀓玄詩曰鵲巢立城側雀乳空井中居不附龍鳯嘗思蛇與䖝今集所載作空城中者非也故劉孝威辭云轆轤絲綆絶桔橰金蘚稠並同前陶靖節詩云平疇交逺風良苗亦懷新古之耦耕植杖者不能此語非余老農亦不識此語之妙王直方詩話陳無巳有除官一篇云扶老趍嚴詔徐行及聖時端能幾字正敢恨十年違肯著金根謬寜辭乳媪譏向來憂畏㫁不盡鹿門期臨川饒次守云此詩不作可也才得一正字亦未須云趍嚴詔無巳后作謝啓復曰名雖文字之選實爲將相之儲又云頭童齒豁敢辭乳媪之譏聞淺見輕益畏金根之謬沈存中云如厨人具雞􅁰稚子􅎥楊梅盖以鷄對揚皆爲假借田承君曰雞􅁰两事那得似楊梅􅁘􅄯羙叔秘監嘗因謁先君曰昔人有一聮云平生不到處落日獨行時唯公家使詩着此盖崔􅂗詩也余後見李陽氷所題阮客舊居云阮客身何在仙雲洞口横人間不到處今日此中行亦相􅀋潘邠老作洪氏勵殻軒云封胡羯末謝􅀛駒玉鴻洪千載望四謝四洪天壌同爲􅀛父駒父玉父鴻父也時人以爲急口令歐陽知貢舉日有詩云無譁戰士衘枚勇下筆春蚕食葉聲絶爲竒妙故聖俞作詩云食葉蚕聲句偏羙當時曽記賦初成一云將成田承君云池塘生春艸盖是病起忽然見此爲可喜而能道之所以爲貴李希聲云見文潜外生言文潜每作詩其有用得妙處必自記緑如法雲㑹中懷無咎云獨覺欠此翁自以欠字頗佳並同前有周知㣲者字明老爲晋州縣尉到官不數月不告於州而徑來京師人問其故云我欲求教授至京求知巳不得大醉一夕而卒然爲詩有可喜者如觀臨淮􅀟頭白蓮圖云旣不學叔隗季隗南歸晋又不學大喬小喬東入呉一種桃根與桃葉􅀂爲化作􅀟芙蕖臨淮政成有餘暇坐令華屋生瀟􅎈鵞溪一幅萬里寛移得㫁江入圖􅀞天空水闊江茫茫想見女英與娥皇九嶷雲深蒼梧逺氷姿泣露不成粧苦心抱恨何年了香骨應甘没秋草不如回首謝秋風分作尹邢來漢宫又作上已日寒食云疾風暮雨悲逰子峻嶺崇山非故鄕亦可賞而其狂未見其比古今詩話晁以道云王禹玉詩世􅃅至寳丹以其多使珎寳如黄金必以白玉爲對有人云詩能窮人且試強作此冨貴語看如何其人數日搜索云止得一聮云脛脡化爲紅玳􅈘眼睛變作碧琉璃余爲之絶倒舒王有詩云籜龍將雨遶山行而周次元有逰天竺觀詩亦云竹龍驅水轉山鳴余以爲當與秦少㳺同科歐陽文忠公云唐人有姑蘇䑓下寒山寺半夜鍾聲到客船之句說者云句則佳也其如三更不是撞鍾時于鵠送宫人入道詩云定知別後宫中伴遥聴緱山半夜鍾而白樂天亦云新秋松影下半夜鍾聲後温廷筠亦云悠然旅榜閒回首無復松窓半夜鍾豈唐人多用此語􅁘倘非逓相沿襲恐必有說並同前詩話總􅀛卷之七百家詩話總􅀛後集卷之七逹理門否卦包承小人吉􅀃者謂小人在下者包之小人在上者承之盖處否當然杜云曲直吾不知􅀒暄候樵牧是非何處定髙枕􅀏浮生洗眼㸔輕薄虚懐任屈伸寄謝悠悠世上児不争好􅁖莫相疑其􅀉傲踈放擺脫世網所謂兩忘而化其道也黄常明漫叟無為洞口云洞傍山僧皆學禪無求無欲亦忘年又無為洞口春水滿無為洞傍春雲白爱此蹰不能去念人悔作衣冠岑参􅀫先逰寺云􅀉报乗軒客簮􅅂爾何容臨川何秀老云觧我葱珩脫孟劳暮年􅅴與子同袍比之退之云方􅀅歛之道且欲冠其顛向風長歎不可見我􅁒収歛加冠巾異矣六一有云自慚前引朱衣吏不称閑行白髪翁􅀃者謂不言亦可然次山宿丹崖翁宅詩云吾􅀅求退與翁逰學翁􅁔醉在漁舟官吏隨人徃来得却望丹崖慚復羞吁􅁋乎富貴者也䂬溪東坡拈出陶淵明談理之詩前後有三一曰採菊東籬下悠然見南山二曰􅀏傲東軒下􅂓復得此生三曰客飬千金軀臨化消其宝皆以爲知道之言盖摛章繪句嘲弄風月雖工亦何􅀘􅀂覩道者出語自然超詣非常人能蹈其軌轍也山谷嘗䟦渊明詩卷云血氣方刚時讀此詩如嚼枯木及綿歴世亊如决㝎無所用智又嘗論云謝康楽􅁃義城之詩鑪錘之功不遺餘力然未能窺彭澤数仭之墻者二子有意扵俗人賛毀其工拙淵明直􅀉焉持是以論淵明詩亦以可知其關鍵也丹陽集孟子所言皆精粗兼偹其言甚近而妙義在焉如龎居士云神通并妙用運水與般柴此自得者之言最爲逹理􅀂孟子之言則無􅃴不然如許大堯舜之道只於行止疾徐之間教人做了􅀛山語録或問言動非禮則何以正視听如何得合禮曰四者皆不可易易則多非理故仁者先難而後􅀗所謂難者以我視以我听以我言以我動也仰面貪㸔鳥囬頭錯應人視听不以我也胥失之矣上蔡語録吕晋伯兄弟中皆有見処一人作詩詠曽􅀧亊曰凾丈􅀙容問且酧展才無不至諸侯可怜曽􅀧推鳴瑟獨對春風詠不休同上或問卲尭夫云誰信畫前元有易自􅀙刪後更無詩畫前有易何以見曰畫前有易其理甚㣲然即用孔子之巳發明者言之未有畫前尽可見也如云神農氏之耒耜盖取諸益日中為市盖取諸噬嗑黄帝堯舜之舟楫盖取諸渙服牛乗馬盖取諸隨益嗑渙隨重卦也當神農黄帝堯舜之時重卦未畫此理真聖人有以見天下之􅄨故通変以冝民而易之道得矣然則非畫前元有易乎亀山録熈寕十年夏康莭感㣲疾氣日益耗神日益明􅀏謂司馬温公曰雍欲􅀚化一廵如何温公曰先生未應至此康莭􅀏曰死生亦常事耳張横渠先生喜論命来問疾因曰先生論命否當推之康莭曰􅀂天命則巳知之矣世俗􅀁謂命則不知也横渠曰先生知天矣載尚何言程伊川曰先生至他人無以為力願自主張時康莭居正􅃦諸公議後事扵外有欲葬近洛陽城者康莭巳知呼伯温入曰諸公欲以近城地􅁙我不可當􅀙伊川先生茔耳七月􅀄四日大書詩一章曰生于太平世死于太平世客問年㡬何六十有七􅀊俯仰天地間浩然獨無愧以是夜五更􅂢舘聞見録張敬夫元日詩古史書元意義存春秋揭示更分明人心天理􅀄無欠正本端原萬善生南軒集康莭過士友家晝卧見其枕屏小児迷蔵以詩題其上云遂令髙卧人欹枕㸔児戯盖熈寕間也陳恬云撃壌集不載同上張横渠聖心詩聖心難用淺心求聖學湏專礼法脩千五百年無孔子盡因通變老優㳺横渠集五峯胡廣仲詩幽人偏愛青山好未是青山青不老山中出雲􅀨太虚一洗塵埃山更好朱氏陂云右衡山胡子詩也􅀄紹興庚辰熹病卧山間親友仕扵朝者以書見招某戯以兩詩代書報之曰先生去上芸香閣時籍溪先生正字赴舘供聀閣長新峩豸角冠刘共甫秘書丞除察官􅇔取幽人卧空谷一川風月要人㸔章甕牗前頭列􅀞屏晚来相對尽儀形浮雲一任閑舒卷萬古青山只麽青二章或傳語胡子胡子謂其學者張敬夫曰吾未識此人然􅀚此詩庶能有進矣時其言有躰而無用故為是詩以箴警之庻其聞之而有􅀤也明年胡子卒又四年某始見敬夫而後􅀗聞之恨不及見胡子而請其目也因序其本末而書之于䇿以無忘胡子之意云見詩集邵堯夫先生居洛四十年安貧樂道自云未嘗攅眉所居寢息處為安樂窩自號安樂先生又為甕牗讀書燕居自平旦則焚香獨坐晡時飲酒三四甌㣲熏便止不使至醉也中間州府以更法不餉餽寓賔乃為薄粥以代之好亊者或載酒以濟其之嘗有詩云斟有淺􅀷存爕理飲無夛少繋經綸莫道山翁柮於用也能康済自家身喜吟詩作大字書然遇興則為之不牽強也大寒暑則不出每出乗小車用一人挽之為詩以自詠曰花似錦時髙閣望草如茵處小車行司馬温公贈以詩曰林間髙閣望已乆芲外小車猶未来隨意所之遇主人喜客則􅇔三五􅀫又之一家亦如之或經月忘返雖性髙潔而接人無賢不肖貴賤皆􅌚然如親嘗自言􅀂至大病自不能支其遇小疾得有客對語不自斍疾之去躰也學者来􅀙之問經義精深浩慱應對不窮思致幽逺妙極道数間與相知之深者開口論天下亊雖乆存心世務者不能及也康莭嘗誦希夷之語曰得便冝亊不可􅂯得便冝処不可􅂯去又曰落便冝是得便冝故康莭詩云珍重至人嘗有語落便冝是得便冝盖可終身行之也邵伯温易斈辨惑涪陵譙天授牧牛圖詩一章言其崇明礼法目無邪視可否昭判㨂辨無舛依見見正色塵不迷故能非礼勿視如牛双目変白畏鞭箠警視不易設有他惡不敢縦􅀚矣詩曰喜見双眸白通身黒尚全整思南畆稼還忌牧童鞭妄色無輕斈非􅀚巳屡悛囬光惟聖道此外竟何縁二章言其外屏非聞耳無邪听入耳著心但惟聖道依聞審音􅁖聲不惑故能非礼勿听如牛角耳変白聳耳低首惟牧是聆更無他念矣詩曰耳角氷霜㓗湏知听不訛法言縁理辨邪􅀃自心訶响外聆㣲旨音中味太和滛荒無復入非礼末之何三章言其戒謹辝氣口無妄言戯渝讒誣不形声􅀃非先王之法言不敢道依苦謹辝修辝立誠故能非礼勿言如牛唇口変白為牧所􅆞不得妄鳴惟渴飮飢食始得觧釋矣詩曰白口􅆞圏索言非駟莫追心声休妄發敬道復何疑正信通神鑑淵談恊􅀄儀能為天下則誠自我無欺四章言其遵守礼法中主惟敬心無妄動舉必循理精誠外發照破邪行素履而往徃而無咎故能非礼勿動如牛四足変白猶恐散失未捨鼻索矣詩曰四􅁕雖更白猶冝鼻索拘草田方緩执禾徑未相踰歩歩無非􅂂心心向大途見聞言動事到此竟何殊五章言其斈習羙成礼法文質内外自然克已復礼歸于至誠不假行􅀅動容周旋皆中乎礼盛徳之至居德之盛尚可形容故如牛首尾変白牧者置鞭間坐不执鼻索放曠無拘頓絶􅀁犯矣詩曰鼻索何劳执長鞭已弃間大田隨俯仰古道任囬環義草清野仁泉飲碧湾徳純非用牧危坐對層山六章言其抑為不厭好古敏求積而至聖思慮銷隕情識净静猶金鑑焉不迎不􅀅􅀿而不傷心躰世通超然絶疑動静無意但寓形於丗而已如牛全白純一不雜人牛兩息㓕意相拘矣詩曰一飽心休息安眠百不知有形隨処􅀉毋意復何疑用舎非関念􅄖㳺絶所窺相忘人世外惟有牧童児七章言其逆順難測混同体用随世態卷舒例陰陽􅃤酢損益􅄹虚與時偕行言不必信行不必果惟義所在一切毋必道合則􅀙猶如白牛雖􅅁圏索已無牧人矣詩曰圏索離牽执􅀙兹牧者亡何心拘小莭平歩蹈中常飢飽隨过行蔵任運􅀅春山春草緑逄処可充腸八章言其仕止乆速咸契所冝逹莭善変出處無際進退存亡不失其正獨見㡬􅁠􅀿世無固不俟終日猶如白牛隨方運動飲食無繋矣詩曰日煖隨方去天寒􅀮有餘當行非俟牧可止便安居飲食和粗細周旋契疾徐􅁠㡬雖􅀿用豈外是如如九章言其無方無体妙絶萬物不見有巳身心銷復與道混融一切毋我又何分别隨時􅀿用應物張機無有本体名言胡義􅇔為世訓警䇿後斍猶如無牛可得惟存鼻索傳示􅀅来矣詩曰相盡云何牧心融孰是牛我人依妄立學行假名脩不見當先迹寕知有後由鞭䋲應到此􅂓為且有􅇔詩話緫亀後集卷之七終
