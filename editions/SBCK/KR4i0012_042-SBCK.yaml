front:
  text: 增修詩詁總􅀛卷之四十二
  hash: sha256:ba1106d322e668bd4dfc992fe6cba047e9b8a9b69ca38b0b5927c9161864a3ae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_042-1a}
body:
  text: 怨嗟門王元之精扵四六同時在玉堂而大拜者元之啓賀曰三神山上曽陪鶴駕之㳺六學之中空有漁翁之嘆以白樂天嘗有詩云元和六學士五相一漁翁青箱雜記怨婦不知其姓旣笄受幣扵姨兄馬生父没継母渝其約改適母之族兄老而猥􅁖居官納賄以罪犯為五羊民􅁺舟過英州庸良醉卧婦因題三絶扵馹亭􅀄與馬絶馬作詩貽媍人曰急水浮花入亂流濃雲􅃒月暗西樓風流忿恨知多少但㸔青春已白頭婦荅詩曰金丸打折鶼禽翼利刃偏傷連理枝自古一床無两好如今方信昔人詞題馹亭曰情若分滿歸故國夢随瘴月過梅􅈐誰􅀅此骨埋煙隴寂寞魂㳺山霧中翰府名談高蟾累舉不第有詩云月桂數條榰白日天門㡬扇鎻明時陽春發處無根蔕慿仗東風次第吹怨而切又下第上王司馬侍􅀰詩云天上碧桃和露種日􅁁紅杏􅀝雲栽芙蓉生在秋江上獨向秋風怨未開人頗憐其意明年李昭知舉遂擢第詩史王元之以尼道安事謫黄州盖爲盧崖州所譛也有詩云敢向台堦問罪名後有以事貶黄州者有詩云魏䏻下靣㸔花衘魏䏻以軍功黄州刺史同上陳羽有詩百餘首古意一篇集中所無其詞云十三學繡羅衣裳自怜紅䄂聞馨香人言此是嫁時服含􅀏不刺双鴛鴦􅀰年十九髭未生拜官天下聞聲名車馬駢闐賀門舘自然不失爲公卿是時妾家􅀹未貧兄弟出入􅀟車輪繁華全盛兩相敵與􅀰年少為婚姻􅀰家居近御溝水豪門客盡躡珠􅂂彫􅐻酒噐常不乾曉入中厨妾先􅁸姑嫜􅃊肅有䂓矩小娘嬌意難取朝叅暮拜白玉堂綉衣着盡黄金縷妾貌漸衰􅀰漸薄時時強􅀏意索寞知􅀰本来無歳寒㡬回掩泪㸔花落妾年四十􅁝滿頭􅀰未五十封公㑦男兒全盛日忘舊銀床羽帳空颼飀庭花紅遍蝴蝶飛㸔􅀰佩玉下朝時歸来略略不相顧却令侍婢生光輝􅀰恨媍人易衰老妾亦恨深不忍道㸔􅀰強徤䏻㡬時年過六十還枯槁詩史陜郊有唐昭宗詩曰何處有英雄迎歸大内中又曰紇干山頭凍殺雀何不飛去生處樂讀之令人變色昭宗在河東作菩薩蠻云登樓延望秦宫殿茫茫不見雙飛燕渭水一條流千山與萬丘野煙生碧􅀣陌上行人去何處有英雄迎歸大内中今云詩未知孰是南唐元宗優待藩邸舊僚馮延已自元帥府書記至中書侍􅀰遂相時論以爲非才江文蔚因其弟延魯福州亡敗請徔退削乃出撫州秩滿還朝因赴内宴進詩曰青樓呵􅁥應相􅀏書記登壇又却囘韓渥天復中車駕幸鳯翔渥以扈從功反正􅀄昭宗􅆕許渥為相渥奏云運契中興冝復用重徳鎮風俗因薦右僕射趙崇時梁祖在京馳入請見具言崇長短昭宗曰趙崇是韓渥所薦渥時在側梁祖叱之三奏曰臣不敢與大臣争渥尋出閩中渥有詩曰手風慵展八行書眼暗休㸔九局啚窓裏日光飛野馬按頭筠􅃹長蒲蘆謀身拙爲安虵足報國危曽捋虎􅂡舉世可能無黙識未知誰擬試齊竽並同上孫定字至光涪州犬戎之族子長於儲定數舉矣而儲方就貢或訪於定定謔曰十三儀表堂堂好箇􅀅軍何湏以科第為意儲頗衘之後儲貴逹未嘗言定長短晚年䘮志放意酒盃景福二年下第逰京西出開逺門􅋨中作詩曰行行沅血洒塵􅁭事逐東流渭水深􅀻跨蹇馿風尚􅂃静􅄬􅀌店日方沉一枝猶挂東堂夣千里空馳北巷心明月悲歌又前去滿城煙􅀣噪春禽同上玉階怨李詞云玉階生白露夜乆侵羅襪却下水晶簾玲瓏望秋月長相思詩云悠悠我思又曰靡日不思􅂫子卿詩云生當復来歸死當長相思生别離楚詞曰悲莫悲於生别離古詩云行行重行行與君生别離相去萬餘里各在天一涯怨歌行李白亦有此作一作長安見内人出嫁令予代爲怨歌行其詞曰十五入漢宫花顔􅀏春紅君王選玉色侍􅆍金屏中薦枕嬌多月捲衣戀春風寕知趙飛燕奪寵恨無窮沉憂䏻傷人緑髩成霜蓬一朝不得意世事徒爲空鷫鸘換羙酒群衣罷雕籠臨寒不忍言爲君奏􅁝桐腸㫁聲已絶悲心夜忡忡獨不見李白云白馬誰家子黄塵􅁁塞児天山三丈雪豈是逺行時春蕙忽秋草莎雞鳴曲池風催寒梭響月入霜閨悲憶與君别年種􅊝齊娥眉桃今百餘尺花落成枯枝終然獨不見流泪空自知白頭吟相如􅀅聘茂􅁜女為妻文君作白頭吟以自絶相如乃止故李白辭云頭上玉燕􅁫是妾嫁時物贈君表相思羅䄂幸時拂莫捲龍須席從他生網􅁝且留琥珀枕還有夣来時此最爲警䇿藁砧藁砧今何在藁砧砆也問夫何處山上復有山重山爲岀字言夫已岀何當大刀頭刀頭有環問何當来還破鏡飛上天言月半當来也七哀詩曹子建釋詩者謂病而哀義而哀感而哀悲而哀耳目聞見而哀口歎而哀鼻酸而哀也巴東三峽歌三山峽七百里兩㟁連山略無闕處重巖叠嶂􅀮蔽天日自非亭午夜分不見日月其漁父歌曰巴東三峽巫峽長􅆐啼聲苦泪沾裳别鶴操髙􅁜牧子作也娶妻五年而無子父兄爲之改娶妻聞之中夜􅁸􅀝户而悲嘨牧子聞之愴然而歌曰􅀅乖比翼隔夭端山川悠逺路漫漫􅄃衣不􅆍食不飡後人因爲樂章焉並見楽府集劉子儀與夏英公同在翰林子儀素爲先逹章獻臨朝子儀主文在貢院聞英公爲樞宻副使意頗不平作堠子詩曰空呈厚貌臨官道更有人從捷徑過閑居詩話周總福州人天禧二年因事逰京師值詔下奔郷薦不及有故人在譙郡守官遂往投之􅀝爲拔觧之地而國家申􅃊條約不許􅀉籍郡有司吏周吉者頗殖涯産捴遂拜爲父吉欣然納之齒于諸子三代名諱亦徔而更焉􅂉人問吉則對以此子當年與母氏俱斥近始歸捴亦以是對秋預薦未幾逹于郷父乃馳詩一絶􅀉之遂不敢南㱕因此慚恨而卒詩曰文章不及林洪範徳行全亐李坦然若拜他人爲父母直湏焚却蓼莪萹名族重京官而䡖外任故楊汝士建莭後詩云抛却弓刀上砌䑓上方樓殿􅀝雲開山僧見我衣裳窄知道新徔􅀾地来又云如今老去􅀐官馬羞向関中道姓楊楊行敏出使馹􅀐到劍州郡􅀅䡖忽慊恨􅀹甚題詩扵冬青館云駑駘嘶呌知無㝎騏􅂹低垂自有心山上髙松溪畔竹清風􅅻動是知音又云杜䳌花裏杜䳌啼淺紫深紅更傍溪遲日霽光捜客思暁来山路恨如迷南部新書張又新􅀰中與楊䖍州友善楊妻李氏即􅅠相之女有徳無色楊未嘗介意張嘗語􅀭曰我少年擅羙名不復仕宦惟得羙室平生足矣旣成婚殊失所望乃作牡丹詩云牡丹一朶直千金将為従来色最深今日滿园開似雪一生􅇳􅀒看花心唐女真蕙蘭有才思咸通中為李億􅀘闕侍婢愛衰後隸咸冝􅀚為女道士有怨李詩曰易求無價宝難買有情􅀰又有云蕙蘭消歇歸春圃楊栁東西絆客舟楊氏為宋齊丘閉於泰州永寜宫有詩曰江􅀯江北舊家郷六十年来夣一場呉苑樓䑓皆冷落廣􅁜宫闕亦凄凉雲凝逺岫愁千片雨打􅀌舟泪兩行兄弟四人三百口不堪端坐更思量丘􅀯野録謂此是李煜所作未知孰是並古今詩話戴衢乆不第嘗夜吟曰􅅰􅅰東西􅀯北情何人於此悟浮生還縁無月春風夜暫得獨聞流水聲又云坐落千門日吟殘午夜灯盧􅉞抒情鄭還古爲河中從事爲同院所誹謗貶吉州􅁺道中爲望思䑓詩云讒語䏻令骨肉離姦情難測事堪悲何因掘得江充骨搗作㣲塵祭望思又云吉州新置􅁺馳馹到條山薏苡殊非謗羊腸未是艱自慚多白􅄠争敢競朱顔苦有前生債今朝不懊還同上盧群玉落托江湖不第縦情詩酒有詩曰酒㵼銀瓶到底清夜深絲竹鳯凰鳴紅粧醉起一花落更引春風無限情又投盧尚書詩曰無力不任為走役有文安敢滯清平從来若把耕桒定免恃彫䖝悞此生南部新書李山甫咸通中不第後流落河朔為樂彦正從事嘗有薄怨执政曰􅂆君不用誇頭角夣裏輸羸捴未知􅀰中自􅀲州宣事囬進合􅂬水果一噐煬帝以一双令小黄門馳賜絳仙馬急揺觧絳仙拜賜泫然因附紅牋小簡進詩云馹􅀐傳􅀟果君王寵念深寕知辭帝里無復合􅂬心煬帝省之不悦顧黄門黄門惧拜而言意乃觧張安道舉進士􅂯失意而作􅁔曰休休歸去休清風釣艇明月酒樓公不見㓂相丁相雷州崖州休休歸去休景祐元年中茂材異等後又中賢良方正朱定囯歸田録杜牧舎人罷任浙西郡道中有詩曰鏡中􅁝鬂悲来慣衣上塵痕拂漸難惆悵江湖釣魚手却􅃒西日向長安與杜甫齊名時號大小杜郡閣雅談唐文宗大和九年誅王涯鄭注後􅄷士良秉􅁠或登臨㳺幸徃徃獨語左右莫敢進問因題詩曰輦路生秋草上林芲滿枝慿髙何限意無復侍臣知古今詩話增􅁱詩話總􅀛卷之四十二集一百家詩話總􅀛後集卷之四十二􅄦神門昔年陳州有女妖自云孔大娘能昏夜扵鼓腔中與人語言尤知未来事時晏元憲守陳方製小辞一闋脩改未定而孔大娘已能歌之矣亦可怪也長安慈㤙寺有数女仙夜逰題詩云黄子陂頭有月明強踏華筵到曉行烟波山色翠黛横折得落花逺恨生化爲白鶴飛去明夜又題一首湖水􅇛􅇛夜如鏡碧􅀣紅芲相掩映北斗䦨干移曉柄有似佳期常不定亦婉約可愛許彦周詩話請紫姑神大抵能作詩然不甚過人舊傳一士人家請之旣降偶書院中子弟作雨詩因率尔請賦頃刻書滿􅁓其警句云􅄕捲􅅬王閣盆翻白帝城誠可喜也同上雲齋廣録載司馬槱官于錢塘夢蘇小小􅁔蝶恋芲詞一闋其詞頗佳詞云妾在錢塘江上住芲開芲落不記流年度燕子􅁍㗸春色去黄昏幾度消消雨蟬鬂犀梳雲欲􅄍檀板新声唱徹黄金􅈁酒醒夢回無覔処凄凉明月生秋圃苕溪漁􅀮魯直記江亭􅄦所題詞有泪眼不曾晴之句余以此􅄦剽東坡樂章有秋雨晴時泪不晴之語復齋漫録東坡記秦少㳺言寳應民有嫁娶㑹客者酒半客一人徑赴水曰有媍人以詩招我詩云長橋直下有蘭舟破月冲􅃄任意逰金玉滿堂何所用争如年少去来休余讀張君房脞說進士謝朏寓居宝應晚至縣橋忽見女郎自舟中出曰某楚小陂也可見訪舟中懐中出詩二首其一云􅀞橋直下是蘭舟破月冲􅃄任意逰金玉滿堂無用處早隨年少去来休其二云妾貌君才兩不常君今休苦更思商児家自有清溪水飲著方知氣味長前篇與少㳺所言不同者􅂾字更有二首爲異至謂寳應亦同君房著脞􅀃在真庙時不應東坡少㳺之􅁯也復齋漫錄余讀江南録丘孟陽有賦名嘗夢一官人延入一第中具飲其旁几上有書一卷孟陽展讀謂曰斯乃吾所述賦藁何至兹乎其人曰昔公焚之時吾得之矣孟陽因就求之荅曰它日若至衡山必當奉還後官至衡州茶陵令乞致仕卒於衡州今世焚故書必毀而燔之盖可信也文昌雜錄吕申公夷蕳嘗通判蜀中忘其郡名􅇬宇中素有􅄦物號榆老姑乃榆木精其狀一老醜婦常出厨間與群婢相偶或時不見家人見之乆亦不以爲怪公呼問之即下堦拜之云妾在宅曰乆雖非人然不為禍公亦置而不問常謂公他日必大貴一日忽懐妊群婢戯之自言非乆當産遂月餘忽不見出云巳産矣請視之後园榆木西南生大贅乃是視之果然見聞録東坡記徐州通判李綯有子年十七八不善作詩忽咏落芲云流水難窮目斜陽易断腸誰同砑光㡌一曲舞山香人驚問之若有物慿者云是謝中舎問其砑光㡌事自云西王母宴群仙有舞者戴砑光㡌㡌上簮芲舞山香一曲未終花皆落去余讀唐羯皷録汝陽王璡明皇愛之乃隨逰幸璡常戴砑綃㡌子打曲上有摘紅槿芲一朶置之㡌上遂奏舞山香一曲芲不落墜上􅀏此事與前極相􅁼復齋漫録陳甲為成都守李西羙璆舘客舎于治事堂東偏之􅀟竹齋紹㒷二十一年四月西羙浣花囬得疾旬日間甲巳寢聞堂上婦人語􅀏声即起映門窺􅀚有女子十餘皆少艾有容色而衣結束頗與世俗異或坐或立或歩庭中甲猶疑其為帥家人以主人翁病輒出但怪其多也頃之一人曰中夜無以為樂盍賦詩乎即口占曰晚􅀨􅄕纎梅子黄晚雲捲􅀨月侵廊隂把酒不成飲識着無情更断腸一人應声荅之曰舊時衣服尽雲霞不到迎仙不是家今日楼䑓渾不識祗因古木記宣華餘人方綴思甲味其詩語不􅀋人方悟為􅄦物忽寂無所見后以語蜀郡父老皆云孟氏有囯時嘗造宣華殿扵摩訶池上今郡堂乃其故趾所見之􅄦妾云西羙病遂不起夷堅志魯直自黔安出峽登荆州江亭柱間有詞曰􅄕捲曲䦨独􅀝江展暮天無際泪眼不曽晴家在呉頭楚尾数􅀧雪花亂委撲漉沙鷗驚起詩句始成時没入蒼􅃄叢裏魯直讀之悽然曰似爲予發也不知何人所作所題筆􅀔妍軟欹斜􅀋女子而有眼泪不曾晴之句不然則是􅄦詩也是夕有女子絶艶夢於魯直曰我家豫章呉城山附客舟至此墮水死不得歸登江亭有感而作不意公能識之魯直驚寤謂所親曰此必呉城小龍女也冷齋夜話長安南山下一書生作小圃蒔花木一日有金犢車􅀙数女奴皆艶䴡下飲于庭邀生同坐甚欵洽將別出小碧牋題詩曰相思無路莫相思風裏楊花一片時惆悵􅀷閨獨歸處曉鶯啼断緑楊枝侯鯖録張磪嘗㳺霅上白蘋洲見碧衣女子携手吟咏一篇云碧水色堪染白蓮香正濃分飛俱有恨此別㡬時逢藕􅀮玲瓏玉花蔵縹緲容何當假􅀟翼聲影暫相􅀙確逐之化爲翡翠飛去􅀣萱録番禺鄭僕射嘗㳺湘中􅀫於馹樓夜遇女子誦詩云紅􅀣醉秋色碧溪弹夜弦佳期不可􅄪風􅀨杳如年頃刻不見􅀣萱録明月清風良宵㑹同星河易翻􅂬娯不終緑墫翠杓為君斟酌今時不飲何時􅂬樂此廣記所載􅄦詩也山谷云當是􅄦中曹子建所作翰林蘇公以為然又一篇云玉户金缸願陪君王邯鄲宫中金石絲簧鄭女衛􅁎左右成行紈綺繽紛翠眉紅粧王􅂬轉盻為王歌舞願得君􅂬長無災苦蘇公以爲邯鄲宫中金石絲簧此兩句不惟人少作而知之者亦極難得耳醉中爲余書此張文潜見坡谷論􅀃􅄦詩忽曰舊時􅄦作人語如今人作􅄦語二公大􅀏王直方詩話東坡作䖍州八境詩曰山中木客觧吟詩十道四番志記䖍州上洛山有木客􅄦與人交甚信未嘗言能作詩也後得續法帖記木客詩云酒盡君莫沽壷傾我當發城市多􅅝塵還山弄明月方知得句之因徐鉉謂鄱陽山中有木客自言秦時造阿房宫采木者豈鉉未嘗見十道四番志也漫叟詩話春草萋萋春水緑野棠開盡飄香玉綉嶺宫前白髮人猶唱開元太平曲忽然湖上片雲飛不􅁴舟中雨􅊜衣折得荷渾忘却空􅀅荷葉盖頭歸浦口潮来􅀄渺漫蓮舟溶􅃞采花難芳心不愜空帰去㑹待潮囬􅂯摘㸔爺娘送我青楓根不記青楓幾廽落當時手刺衣上花今日爲􅁅不堪著惆悵金泥撲蝶裙春来猶見伴行雲不教布施刚􅇔得恰似知逢李少君卜得上峽曰秋江風浪多巴陵一夜雨腸断木蘭􅁔余與魯直夀朋天㑹于伯時齋舎此一卷皆仙鬼所作或夢中所作也又記太平廣記中有人爲􅄦物所引入􅇕墓皆華屋洞户忽爲刼墓者所驚出遂失所見但云芫芲半落松風晚清吾毎愛此兩句東坡酉陽雜爼載􅄦詩兩篇山谷喜道之其一曰長安女児踏春陽無處春陽不断腸舞䄂弓弯渾忘􅁍娥眉空帶九秋霜其二曰流水㳙㳙芹弩芽織鳥􅀟飛客還家荒村無人作寒食殯宫空對棠梨花洪駒父詩話李真言字希古嘗夢至一宫殿有数百妓抛毬人唱一詩􅁴而記三首云侍宴黄昏未肯休玉堦夜色月如流朝来自􅁴承㤙最􅀏倩旁人認綉毬隋家宫殿鎻清秋曽見婵姢颺綉毬金鑰玉簘俱寂寂一天明月照髙楼堪恨隋家㡬帝王舞腰挼盡綉鴛鴦如今重到抛毬處不是金爐舊曰香今古詩話中載此詩只有二首不及此詳俻故盡録之侯鯖録百家詩話緫􅀛卷之四十二
