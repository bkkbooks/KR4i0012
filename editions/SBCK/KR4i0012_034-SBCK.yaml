front:
  text: 增修詩話總龜卷之三十四
  hash: sha256:24a089a180eadde7ae869fbfda0cd4e59161ebb2692f7f91fe3591fd1c7c54cc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_034-1a}
body:
  text: 紀夣門下狄遵度紀夣詩云佳城􅊊􅊊頽寒烟􅀌雛乳獸􅃅荒阡夜卧北斗寒挂枕木落霜拱鴈連天浮雲西去半落日行客東盡隨長川乾坤未毁吾尚在肯與蟪蛄論大年狄遵度自児童時巳能属文落筆有竒氣年十六一夕夢杜子羙誦平生詩皆集中所未見者覺而記两句後遂續之百斛明珠張􅊫字􅀮之本閩人迁於成都数世矣善属文不仕晚用太守王素薦賜號冲退處士一日夣有人􅀉書召之云東岳道士書也明日與李士寕荅曰手持東岳􅀉書來􅊫大驚不知其所自來未㡬􅊫果卒其子禩亦逸民舉仕一命乃死士寕蓬州人也語黙不常或以為得道者百歳乃絶嘗見余於成都曰子甚貴當䇿舉首已而果然余嘗夣見人云是杜子羙謂余曰今人多誤㑹余八陣啚詩云江流石不轉遺恨失吞呉世人皆以為先主武侯􅁒與関羽復􅄷故恨不能㓕呉非也我意本謂呉蜀乃唇齒之國不當相圖晋之所以能取蜀者以蜀有不忘詩區區自列其意書生之習氣也並同前東坡􅀅亡前數日夣中作一詩􅀉朱行中云舜不作六噐誰知貴璵璠哀哉楚狂士抱璞號空山相如起睨柱􅄬壁相與還何如鄭子産有禮國自閑虽㣲韓宣子鄙夫亦辭環至今不貪寳凛然照塵寰斍而記之自不曉所謂東坡絶筆也直方詩話陳明信云䔥貫少時嘗夣至宫􅋝中長廊䆳舘如王者所居有千門萬戸望之洞然金碧爍耀旣過數門見群婦人如神仙視貫驚問何所從來貫愕然亦不知對貫自陳進士能為詩中有一人授貫􅁓曰此所謂衍波牋煩賦宫中曉寒􅁔貫援筆立成旣有竒語其人甚賞之因曰先軰異日必貴此天上非人間也貫寤尚能記所賦俞秀老徃嘗得之於蕭翰林之孫其詩有云十二嶤関􅀮空緑獸貎呼熖椒壁馥渇烏㳙㳙不相續轆轤􅁒轉霏紅玊百刻香殘隕蓮燭九龍􅄍水漫寒􅄴紅綃佩魚無左璫两两趨走瞻扶桑紅萍半圭山波面囬首觚􅏢九霞絢鳴鞙聲從天上來大劍髙冠滿前殿秀老誦之尚有四五韵忘之王太初傳言有焦仲先者家於南徐元豐元年因詣京師訪知巳忽夣一婦人相頋遇或以詩筆相徃來其一聮云呉王䑓下無人處㡬度臨風學舞腰又曰呉山之北㑹稽之陽古木蒼蒼其㝡後一章云仲冬之月二七之間月圎風静車馬相扳其人如病狂縁太初而後愈至秦少游書栁􅀑事所載詩語前後皆同但年月乃是熈寕九年所病者乃是嘉興令陶集而所諭者乃是天竺辯才法師二者不知孰是並同前僕嘗夣有客携詩文見過者􅁴而記其一詩云道惡賊其身忠先愛厥親誰知畏九折亦自是忠臣又有數句若銘賛者云道之所以成不以害其畊徳之所以修不以賊其生東坡詩話冨鄭公早年嘗夣青州王相公以後事相托公曰相公徳􅀍生民當延遐夀何􅃍及此後二年罷相知鄆州辟鄭公爲倅到任月餘有大星隕于宅園家人恠之相告曰後月當見果至後月薨鄭公為治䘮事故鄭公挽詞曰道徳􅀍生民與當年夣中符契古今詩話鄭内翰獬未貴時嘗病瘟疫數日未愈甚困俄夣至一䖏若宫闕有吏迎謁甚恭公謂吏曰吾病甚倦煩􅀬思得凉浴以清其肌吏云已為公辦浴乆矣吏引公至一室中有小池方闊數尺甃以明玊水光㶑灔以手測之清冷可愛公乃坐甃上以水泛身俄視两臂已生白鱗視水中影則頭已角出公驚􅃍出吏云此玊龍池也惜乎公不入其水中入則為輔宰乃覺少選出汗公後登第為第一人為詩戯友人云文闈數戰奪先鋒変化湏知自古同霹􅆮一聲從地起到頭身是白龍翁王仲舉营道人毋嘗夣挾仲舉入月仲舉修進業長興化二年赴舉謁秦王登第後有詩謝秦王曰三千里外抛漁艇二十人前折桂枝太平興國中仲舉有子曰嗣全亦中進士第乃扶两子入月之祥青􅃈集湖州長興縣啄木嶺金沙泉即毎年造茶之所也湖常二郡接界於此其􅁟有境㑹亭毎茶節二牧畢至斯泉處沙中居嘗无水􅀅造茶太守具犧牲􅀕泉頃之發源清溢造御茶畢水則㣲减供堂者畢水已半矣太守造茶畢即涸矣太守或行斾稽晚則有風雷之變或見鷙獸毒蛇􅀑魅之􅁼焉胡生者即其居以釘鉸為業居霅溪而近白蘋洲去其居十餘歩有古墳胡生每因茶飯必奠酬之嘗夣人謂之曰吾姓柳氏平生善詩而嗜茗及死塟此室乃子今㞐之側也常衘子之惠無以為報􅁒教子為詩胡生辭以不能柳強之曰但率子意言之當有致矣生旣寤試􅇔思果有􅁳􅂇者其後遂工焉詩曰胡風似劔鎪人骨漢月如鈎釣胃腸魂夣不知身在路夜來犹自到昭陽人謂之胡釘鉸詩金沙池泉在常州冝興縣罨畫溪之東有寺寺有碑載當時杭湖常三州貢茶唱和樂天云十􅃗畫船何處􅀫洞庭山脚大湖心常州太守忘其姓名和云殷勤為報春風道不貢新茶只貢心􅅊檢舉進士不第常有一羙􅁎一日捧心而卒檢追思痛悼殆不勝情舉酒吟詩悲怨可掬吟曰寳劔化龍歸碧落嫦娥隨月下黄泉一盃新酒青春曉寂寞書窓恨獨眠一日忽夣􅁎泣涕潜然曰當有後期今和來萹即口占云春雨􅄥􅄥不見天家家門户栁如烟如今賜断空垂淚􅂬􅀏重追别有年檢終日怏怏後更夣􅁎曰即遂相見􅁴來神魂恍惚乃題曰白浪漫漫去不廻浮雲飛盡日西頽始皇陵上千年􅀣銀鴨金鳬也變􅁅後數日即符夣兆脞􅀃前集晁奉禮簡故宫保内翰之次子也於昆弟中㝡􅁛竒秀與梁固少小硯席之至善大中祥符二年固状元及第授青州倅時奉禮荣侍在闕下是年冬末梁方之任去青雨驛夜夣晁來相謁手携白扇上有七言詩一首以贈梁云死生離别最堪悲相對無言涙滿衣歎我巳歸泉下去羡君新向月中歸長鞭巳見騰夷路折翼終難継迅飛珍重故人當聖代早持鈞軸入黄扉覧詩起執手悲泣而别倐然覺大異之歎晁必沒故矣乃急走㒒録所得詩入京師訪其安否宫保開讀之大慟曰品格真吾兒作也夣之夕乃簡忘之日也李良弼故給事中防之子祥符元年􅀿進士舉得同學究及第二年給事自南京移知鄭州以家在應天良弼奏為本府司士叅軍是年中赴良弼隨侍至鄭夜􅀫中牟驛夣人持詩版跪而來献良弼詩曰九霄丹詔三天近萬叠紅芳一旦開日月山川湏問甲為君親到小蓬萊覺而異之旦􅃍起而白給事喜曰㨿此詩意汝必有前程慎勿廢於笔硯勉旃勉旃至郊而别五年方歸闕授三司户部判官五月已舉張楚縣丞事停任六月十九日良弼卒於應天府給事大慟悲語張君房曰夣之不誠如是自此兒夣必謂其前程而為詞臣一旦至是苦㦲君房但寛勉以慰之是年秋君房以詔鞠獄無状謪為寕海督郵乃同給事舟抵􅀿天府旦憇泊間細詰良弼卒塟之日月及塟地之所因而繹之忽有數悟乃省其詩盡得之良弼丙戌生年二十有七即詩首句云九霄丹詔三天近三九二十七數是年二十五故云近也萬叠紅芳一旦開方萬葉之花一旦開盡是近謝之意次云日月山河湏問甲其年六月十九日甲寅乃其卒日殯是二十九日甲子塟于府東甲地即是日月山川湏間甲也盖六月天徳月徳俱在甲末句云爲君親到小蓬萊即虚無􅄀漠之所給事沉黙曰君辨之矣脞􅀃前集沈亞之嘗言邢鳯寓居長安平康里第晝夣一婦人自楹而來古粧髙髻作陽春曲曰長安少女翫春陽何處春陽不断腸舞䄂􅃓腰渾忘却蛾眉空帶九秋霜鳯曰何謂弓腰曰昔年父母教舞作此􅃓彎状舞罷辭去鳯亦尋覺脞􅀃後集呉興姚郃嘗言有友王生者元和􅀄夕夣逰呉宫乆之聞宫中岀輦吹簫撃鼓言塟西施王悲悼不止立召門客作挽歌生應声爲詞曰西望吴王闕雲書金字牌連江張蕙帳擇土塟金􅁫滿池紅心草三層碧玊㙜春風無處所悽恨不勝懷及寤復記其事王生太原人崇寕元年元日昏眠夣中作一詩云無頼春風試怒號共乗一葉傲驚濤不知两岸人皆愕但􅁴中流􅀏語髙三月與陳莹中渡湘江是日大風當断渡小舟􅱾舞白浪中两岸聚􅀚胆落莹中􅀏愈髙余以詩語莹中莹中曰此公按後大行叢林東坡倅錢塘夣神考召入禁中宫女環侍一紅衣女捧紅靴一􅃗命坡銘之其中一聮云寒女之絲銖積寸累歩武所及雲蒸雷起上極嘆其敏㨗同前山谷晝卧夣與一道士升空道士曰與公㳺蓬萊􅁴天風吹鬂道士曰歛目俄有狗吠開目不見道士惟見宫殿魯直入有两玊人導升殿主􅑙揖之仙女侍之中有一女云整琵琶魯直愛其風韵頋之忘揖主者主者色荘故其詩曰試問琵琶可聞否靈君色荘妓揺手與余親言之今山谷集語不同盖更易耳冷齋夜話少逰南迁􅀫郡亭湖廟下側枕視㣲波月影縱横追憶昔􅀫垂雲老借竹軒見西湖月色如此夣羙人自言我天女也以維摩像乞賛少㳺愛其畫念曰非道子不能作此天女以詩戯少㳺曰不知水􅀫分風浦何似秋眠借竹軒聞道詩詞妙天下廬山對眼可無言少㳺夣中題其像曰竺儀華夣瘴面囚首口雖不言十分似九應􅀏舌覆大千作師子吼不如不􅅮取妙喜如陶家手同前陳智夫㐮陽人慱學有才思尤長於歌詩嘗遇異人授以􅄍納之術故佳句多於夣中得之若花􅀏似留客鳥聲如喚人又野花臨水數枝恨芳草連天千里情之句雖前軰不能逺過遯齋閑覧增修詩詁總龜卷之三十四百家詩話總􅀛後集卷之三十四傷悼門長慶四年退之為吏部侍郎薨扵静安里苐李翶行状載属纊之語云伯兄徳行高晚年止四十二某位為侍郎年出伯兄十五歳且􅀗終扵牗下幸不失大莭以下見先人可謂荣矣翶􅀕文曰人心樂生皆􅁖其㐫兄之在病則齊其終順化以盡靡憾于中張籍􅀕詩亦曰公有曠逺識生死為一綱及當臨終辰意色亦不荒贈我珍重言傲然委衾裳盖其聦明之所照了徳力之所成就故扵生死之際超然如此宣室志載威粹骨蕝囯世與韓氏為仇神人以帝命召公計事愈曰臣願􅀙大王討之未幾而愈卒公神道墓誌行状俱不載而止見扵小􅀃者如此豈東坡所謂其生也有自来其死也有所為乎李肇國史􅀘謂愈登華山絶頂度不可返至扵發狂慟哭今觀易簀之際神色不亂如此不應扵此而至扵發狂慟哭也􅁑常之太白辭粟卧首陽屡空飢顔回當代不飲酒虗名安在㦲君不見梁王池上月昔照梁王尊酒中梁王巳去明月在黄􅕢怨觧啼春風分明感激眼前事莫惜醉臥桃園東又平原君安在科斗生古池坐客三千人而今知有誰君不見孔北海英風豪氣今何在君不見裴尚書􅁟墳三尺蒿藜居此􅀋者尚多愚謂雖千萬萹只是此意非如少陵傷風􅁨國感時觸景忠誠激切蓄寓深逺各有所當也黄常明詩話曽文肅熈寕􅀄為海州懐仁令有􅁥酒使臣張者小女甫六七歳甚為惠􅃛文肅之室魏夫人怜之教以誦詩書頗通觧其後􅀯北暌隔紹聖􅀄文肅柄事樞時張氏女以入禁中雖無名位以善筆扎掌命令之出入忽與夫人相聞夫人以夫貴䟽封瀛國稱夀禁庭始相見叙舊自後􅀊時遣問夫人没張作詩以哭云香散簾幃寂塵生翰墨間空傳三壷譽無復内朝班􅀙此絶迹矣後四十年靖康之変張􅀙昭慈聖獻南渡至錢塘朱忠靖筆録所記昭慈遣其傳導反正之議張夫人者即其人也年八十餘終揮塵東漢李固忠直鯁亮志在許國不爲身謀争立清河遂忤梁兾以致身首異處當時有提鈇上章乞􅀵固尸如汝􅀯郭亮者有星行至洛守衞尸䘮如陳􅇔楊􅆧者亦可見固以忠􅀗罪矣唐李華嘗􅀚黨錮傳撫卷而悲之且作詩曰古墳㐮城野斜徑横秋陂况不禁撨采茅莎無孑遺扵乎生不能保其身死又不能保其蔵骨之地天之不相善人何至是耶梅聖俞詩云漢家誅黨人誰與李杜死死者有范滂其母爲之喜喜死名愈彰生荣同犬豕故史臣以胡廣趙戒爲糞􅁟而馬融真犬豕㢤韵語陽秋宋彭城王義康忌擅道濟之㓛㑹文帝疾動乃矯詔送廷尉誅之故時人􅁔云可怜白浮鳩柱杀檀江州當時人痛之盖如此柰何王綱下移主威莫立洎魏軍至􅀲歩帝方登石頭以思之又何􅀘㢤劉夣得嘗過其墓而悲之曰萬里長城壊荒雲野草秋秣陵多士女猶唱白浮鳩盖傷痛之深雖歴三百年而猶不泯也韵語陽秋苕溪云李杜􅀞象古今詩人題詠多矣若子羙其詩高妙固不待言要當知其平生用心處則半山老人之詩得之矣詩云吾􅀚少陵詩謂與元氣侔力能排天斡九地壮顔毅色不可求浩蕩八極中生物豈不稠醜奸巨細千萬殊竟莫見以何雕鎪惜㢤命之穷顛倒不見􅀵青衫老見斥餓走半九州瘦妻僵前子仆後攘攘盗賊森戈矛吟哦當此時不廢朝廷􅁨嘗願天下聖大臣各伊周寕令吾庐獨破受凍死不忍四海赤子寒颼颼傷屯悼屈止一身嗟時之人我所羞所以見公像􅄪拜涕泗流推公之心古亦少願起公死􅀙之逰䂬溪淵明非畏枯槁其所以感嘆時化推迁者盖傷時之急扵声利也非畏亂離其所以愁憤扵干戈盗賊者盖以王室元元為懐也俗士何以識之七哀詩起曹子建其次則王仲宣張孟陽也釋詩者謂病而哀義而哀感而哀悲而哀耳目聞見而哀口歎而哀鼻酸而衰謂一事而七者具也子建之七哀哀在扵獨棲之思婦仲宣之七哀哀在扵弃子之媍人張孟陽之七哀哀在扵已毀之园寢唐雍陶亦有七哀詩所謂君若無㝎雲妾作不動山雲行出山易山逐雲去難是皆以一哀而七者具也老杜之八哀則所哀者八人也王思礼李光弼之武功􅂫源明李邕之文翰汝陽鄭䖍之多能張九齡􅃊武之政事皆不復見矣盖當時盗賊未息歎舊懐賢而作者也司馬温公亦有五哀詩謂楚屈原趙李牧漢鼂錯馬援齊斛律光皆􅀒才竭忠卒困扵讒而不能自脱盖有激而云爾􅁑常之詩話白樂天元㣲之皆老而無子屢見扵詩章樂天五十八歳始得阿崔微之五十一歳始得道保同時得嗣相與酬唱喜甚樂天詩云膩刺新胎􅄠香綢小綉􅃭玉牙開手爪􅂫顆􅀧肌膚微之云且有承家望誰論得力時又云嘉名稱導保乞姓號崔児三歳而亡白賦詩云懐抱而亡按墓誌有子道護年三歳而卒以􅀊月攷之即道保也孟東野連産三子不數曰皆失之韓退之嘗有詩假天􅒛以寛其􅁨三人者皆人豪而不能忘情如此信知割爱為難也若使學空天黙黙依前重作鄧攸身傷㢤微之五十三道者遭此則又何必黒衣巾者闖然入其戸而後喻㢤同上韓退之作李于墓志云余不知服食之說自何起殺人不可計而慕尚之益至臨死乃悔其為而退之乃躬自蹈之以至扵死白天樂所謂退之服硫黄一病訖不痊是也陳後山作嗟㢤行云張生服石奴下潦上乾如渇烏韓子作志還自屠白􅀏未竟人復吁盖爲此也然樂天與刑部李侍郎詩云金丹周學都無益姹女丹砂燒即飛則樂天深知服食之無騐其肯以身試藥以自斃乎則白􅀏未竟人復吁之句未必然爾山谷在貶所曽公衮有書􅂆其勿服金石藥谷報云公衮疽根在旁乃不可食庭堅服之如晴雲之在川谷安得有霹􅆮文也則知服金石者尤當屏去粉白黛緑之軰或者用以資色力其斃冝㢤丹揚集百家詩話総􅀛後集卷之三十四
