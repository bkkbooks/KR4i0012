front:
  text: 増修詩話總􅀛卷之三十九戊集
  hash: sha256:7d3dc22beabc4ed51cc9e747d080ea6506e6d1eb67e549cd699b79be92ba593c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_039-1a}
body:
  text: 舒城阮一閱編皇明宗室月窓道人刋番昜程珖校詼諧門下兵部李内相濤唐宗室子自河陽令一舉状登科小字社翁每扵班中多自名焉其坦率如此翰林月給内醖兵部嘗因春社􅀉翰林一絶云社翁今日没心情為乏迯聾酒一瓶惱乱玊堂􅀅欲遍依希循到第三厅顔師古觧霍去病穿域蹋鞠云以皮為之實以毛蹴􅂿為戯也顔時鞠乃如此至後唐巳不同㱕氏子弟嘲皮日休曰八片尖斜砌作毬火􅁅撏了水中揉一包閑氣如常在惹踼招拳卒未休仁宗朝試山海天地之蔵賦長沙進士陳􅀃同進士出身謁鄊人胥偃内翰因㪯其賦胥曰賦頗佳但其間貼故事少耳説㱕作詩曰紫宸較藝集英聡作賦方知尚欠功事内少它些子鉄殿前羸淂一堆銅黄紬􅀍下夫人煖青􅃈窓中學士空􅀉語交朋湏細認主司頭恼太冬烘盧延遜五㪯方登第嘗作詩云狐衝官道過犬刺客門開租庸張相毎誦之又曰餓猫臨䑕穴饞犬舐魚砧成中令激賞之又曰栗爆燒毡破猫跳觸􅂦翻王中懿愛之盧嘗謂人曰平生投謁公卿不意得猫児狗子力也梅聖俞與謝氏世姻師直小字錦衣奴聖俞作詩戯之曰古錦裁詩句班衣戯坐隅木奴今正熟肯効陸郎無師直方十歳讀詩而悟石曼卿登第有人訟科塲覆考落者數人曼卿在焉方與􅀦寺期集符至追所賜􅃙牒餘人皆泣而起獨曼卿觧靴還使人露体戴幞頭􅀏語終席次日放黜者例受三班借聀曼卿作詩曰無才且作三班借請俸争如録事參􅀙此免称郷貢進且湏走馬東西􅀯並同上王􅆊志詩曰城外􅁟饅頭饀草在城裏無人吃一箇莫嫌没滋味且爲饀草當使誰食之爲易其後两句云預先着酒澆啚教有滋味東坡詩話馮衮牧􅂫州日多縦飲傅因大勝以所得均與座客吟云八尺䑓􅐻照面新千金一擲閗精神合是賭時湏賭物不堪囬首乞閑人雅言雜載李紳相鎮廣陵有少年甚踈簡来謁晤對間言白尚書先􅀉元相公詩云悶􅂆迃辛酒閑吟短李詩且曰辛大性迃嗜酒丘度李二十短而能詩紳少年即丘度子也謂李公曰小子每憶白共二丈詩曰悶􅂆平惜酒閑吟廿丈詩李曰辛大有此狂児吾不存舊乎雲溪友議崔涯張祐為一時狂友好嘲謔嘗戯贈營妓曰雖得􅂫方木由貪玳􅈘皮懐胎十箇月生下崑崙児又曰布􅂁披襖火燒毡􅁓􅀘箜篌麻接弦更有一双皮屐子紇梯紇榻出門前又嘲李端端云黄昏不語不知行鼻似􅃄􅖠耳似鐺猶把􅁚牙梳插鬂崑崙山上月􅀄生端端得此詩而因出遇二子扵道􅂯拜曰伏望哀怜乃重為一絶云不見驊驑偹綉鞍善和坊裏取端端􅀭州近日渾成錯一朶能行白牡丹前嘲乃觧又嘗為雜嘲之曰二年不到宋家東阿母深居僻巷中含泪向人羞不語琵琶弦断􅀝屏風日暮追来香閣中百年心事一朝同寒雞皷翼紗窓外巳斍恩情逐曉風又悼人詩云赤板橋西小竹篱挿花還似去年時淡黄衫子都無了腸断丁香􅀞雀児曹州酒紏雲娘瘦瘠而善歌李宣古嘲之曰何事實堪悲雲娘只首竒瘦拳抛令急長觜出􅁔遲只怕肩侵鬂唯愁骨透皮不湏當户立頭上有鍾馗復州凌岩夣桂州筵上贈胡子女詩云自道風流不可扳那堪蹙額更頽顔眼睛深似湘江水鼻孔髙扵華岳山舞態豈能安掌上歌声􅀿不遶梁間孟陽死後今千載由有家人覔往還並同上楊叔宝強人也嘗為荆門幕時虎傷人楊就虎穴磨巨崖大刻誡虎文如韓文公遣鱷魚文其略曰嗚呼尔彪岀境潜㳺改官扵欝州以書托知軍趙㝎打虎文􅂾本書言嶺俗庸獷欲以化之仍有詩曰日􅀅先聖詩書教暫作文翁守欝林守遣人打碑次日本􅂄申磨崖􅀣下大虫咬殺打碑匠二人荆門止以􅂄状报叔宝湘山録薜逄晚年厄扵宦途䇿嬴赴朝值新進士綴行而出時進士團所由数十人見逄行李蕭然前道曰廽避新郞君逄冁然即遣价語之曰报道莫貧相阿婆三五少年時也曾東塗西抹来接言許孟容進士及第李䆒登科時人嘲之曰錦襖子上着蓑衣張處士祐柘枝詩曰鴛鴦鈿帶抛何處孔雀羅衫属阿誰樂天呼爲問頭詩祐矛盾之曰鄙薄問頭之誚􅀁不敢辭然明公亦有目連変長恨􅁔云上窮碧落下黄泉两處茫茫都不見豈不是目連変􅁘並同上王中令旣平蜀捕餘冦與伍隊相逺飢甚乃入一村寺中僧醉甚箕踞公怒欲斬之僧􅀿對不懾公竒而釋之問求􅂼食云有肉無􅂼公益竒之餽以蒸豚頭食之甚羙公喜問僧止能飮酒食肉邪爲有它􅇊邪僧自言能詩公令賦蒸豚詩操筆立成詩云觜長毛短淺含臕乆向山中食藥苗蒸處巳􅀅焦葉畏熟時更用杏􅄴澆紅鮮雅称金盤貯軟熟真堪玊筯挑若把羶根耒代並羶根只合喫藤條公内大喜與紫衣乃蜀中詩僧百斛明珠韓玉汝治秦州尚􅃊去官人語曰寕逄􅁀虎莫逄韓玉汝孫臨滑稽􅀹善對或問曰莫逄韓玉汝當以何對臨􅀿声曰可怕李金吾天下以為口實同前䂖介作三豪詩略云曼卿豪扵詩永叔豪扵文杜黙師雄豪於􅁔永叔亦謂黙云贈之三豪而我濫一名黙之􅁔少見扵世􅀄不知之後聞其篇云學海波中老龍夫子門前大虫皆此等語甚矣介之無識也永叔不為嘲誚之者此公􅁖争名且為介諱也吾􅀚杜黙豪氣正是京東學䆒飲􅀻酒瘴死牛肉醉飽后而發之者也作詩之狂至扵盧仝馬異極矣若更求竒便作杜黙也㓜時里人程建用楊咨家弟子由㑹草舎天􅀨聮句六言程曰庭松偃盖如醉楊曰夏雨新凉似秋軾云有客髙吟擁鼻子由云無人共吃饅頭皆絶倒巳四十餘年同上聶宗義建􅂭􅀄為學官河洛之師儒也趙韓玊嘗拜云郭忠恕使酒詠其姓玩之曰近貴全為瞶㧞龍即是聾雖然三箇耳其奈不成聡宗義􅀿声荅曰勿􅀏有三耳全勝畜二心忠恕大慚雲溪友議趙成伯家宴造之無由輙欲効顰而酒巳盡入夜不欲煩擾戯作小詩求数酌而巳詩曰道士令􅃊難継和僧御㡌小却空迴隔篱不欲鄰公飲抱甕惟防吏部耒趙成伯家有姝䴡僕忝郷人不肯開樽徒吟春雪謹依元韵以當一􅀏云綉簾朱戸未曾開誰見楊花落鏡䑓試問髙吟三十韻何如低唱两三杯莫嫌衰髩聊相映湏得纎腰妙共囬知道文君共青􅃈梁園賦客敢言才俗云檢騐雪壓秀才衣􅅁上有雪詩三十韵又世傳陶榖學士買得党太尉家故妓過㝎陶取雪水烹􅇛茶謂妓曰党太尉􅀿不識此妓曰彼粗人安有此景但能以銷金煖帳下淺斟􅊠唱吃羊羔児酒尔榖愧其言荅来句罪過之義取貸而巳玊局遺文僕少好種松過泗上與杜子師出山中子師求予種松法欲之都梁山中戯作二絶云露宿泥行艸􅁄中十年春􅀨飬髯龍如今五尺城􅀯杜欲東坡學種松君方掃雪􅋞松子我巳開榛得伏苓為問何如挿􅀭栁明年飛絮落浮萍同上元豊中晁無咎詩極有声无巳以詩戯之曰聞道新文能入様相州紅纈鄂州花盖是時方尚相州纈鄂州花也晁尭民子損之云王直方詩話劉諷參軍宿山馹月朙有女子數自屋後来􅒛酌庭中􅁔曰明月清風良霄㑹同星河易翻􅂬娛不終緑墫翠杓為君斟酌今夕不飲何時􅂬樂此廣記所載詩也山谷曰當是􅄦中曹子建所作東坡亦以為然又有一篇云玊戸金缸願侍君王邯郸宫中金䂖􅁝簧鄭女衛姫左右成行紈綺繽紛翠眉紅粧王􅂬轉眄為王􅁔舞􅂅得君􅂬長無灾苦穌公以為邯郸宫中金石􅁝簧此兩句不唯人少䏻作而知之者亦極難得耳皆醉中爲余書此張文潜見坡谷論􅀃􅀑詩忽曰舊時􅀑作人語如今人作􅀑語二公大􅀏髙愈主簿云東坡云世間事勿􅀏爲易惟讀王祈大夫詩不􅀏爲難祈嘗謂東坡云有竹詩兩句最爲得意曰葉埀千口劔幹􅋍萬條鎗坡云好則極好則是十條竹竿一箇葉児也以道云􅀄見東坡詞云素面常嫌粉涴洗粧不退唇紅便知此老湏過海余問何邪以道曰只為古今人不曾道到此湏罰教逺去呉賀廸吉者撫州人一日載酒来余家并召劉夷季洪􅀛父饒次守軰酒酣頗紛紛􅀛父先歸作一絶題于余書室曰􅂯爲城􅀯逰百花巳狂飛更堪逄􅁖客􅀐馬風中㱕次守旣醒作十七字和云當時爲舉首滿意望龍飛而今已报罷且歸盖􅀛父是年自洪州首薦自今上􅀄即位無廷試也山谷旣飯素在館中時多食東華門椀睌蒸餅後􅀙黔􅀯王㝎􅀦􅀉之以詩云北海未常墫有酒馮驩何止食無魚黔州椀脱無蒸餅自合官稱削校書張文潜在一時中人物最爲魁偉故陳無已有詩云張侯魁然腹如皷雷爲飢声酒爲兩文云要痩君則肥山谷云六月火雲蒸肉山又云雖肥如瓠壼而文潜卧病秦少㳺又和其詩云平時帶十圍頗復减臂環皆戯語也劉季孫景文公頃年王安䂖對使念兹在兹釋兹在兹名言兹在兹季孫對之以掲諦掲諦波羅掲諦波羅僧掲諦安䂖大􅀏並同上徃􅀊江行阻風㳂岸野歩望雲嶺而去忽有蘭若甚多僧院覩客来皆扃門不納獨有一院大敞其户見一僧翹足而眠以手書空頋客不介意窈思曰書空有換鵞之能翹足􅀋坦腹之事此必竒僧直八造之僧雖強起全不樂客客不得已而問先達有詩曰書空翹足睡路險側身行和尚其庻幾乎僧曰貧道不知許事適昼房門振匙様客不辭而去桂􅁐叢談梁周翰在太宗朝為舘聀真宗即位乃除知制誥栁開贈詩曰九重城闕新天子萬卷詩書老舎人梁與朱昻楊大年同在禁掖大年年未滿三十而两公皆老􅂾見慢侮不能堪即好謂大年曰公母侮我此老亦􅀅留與公耳朱聞之背面摇手腋不謂梁莫與大年之没不及五十也閑居詩話晋郝􅂭為蛮府參軍三月三日作詩曰娵隅躍清池桓温問何物荅曰蛮名魚為娵隅桓曰何為作蛮語􅂭旱里投公始得一蛮府參軍郍得不作蛮語世􅀃盧家有子弟年暮而猶爲校書􅀰晚娶崔氏女崔有詞翰結䄜之後㣲有嫌色盧因請詩以述懷爲戯崔立成曰不怨檀􅀰年紀大不怨檀􅀰官聀卑自恨妾身生較晚不見盧􅀰年少時南部新書李建勲鎮臨川日九江帥周宗一書求曰近噐用儀注􅂉闕欲輟臨川者李乗醉批一絶句云偶罷阿衡来典郡固無閑物可􅀿官慿官爲报周公道莫作循州刺史看􅀯唐近事李巽字仲􅁠累舉不第鄉人侮曰李秀才􅀿舉空去空囬不知甚時席㡌得离身巽亦不校登第後乃遺鄉人詩曰當年踪跡困泥塵不意乗時亦化鱗爲报鄊閭親戚道如今席㡌巳离身盖因􅀦􅀄由襲唐士子皆曵􅂁重戴出則席㡌自随青箱雜記梅聖俞河豚詩曰春洲生荻芽春岸飛楊花河豚扵此時貴不􅂾魚蝦劉原甫戯曰鄭都官有鷓鴣詩謂之鄭鷓鴣聖俞有河豚詩當呼為梅河豚也古今詩話雲䑓集有鄭谷鷓鴣全篇云暖戯􅃄芜錦翼斉品流􅀿得近山雞雨昏青艸湖邉過花落黄陵庙裏啼㳺子每聞征䄂温佳人􅅻唱翠眉低相呼相喚湘江闊苦竹叢深春日西同上鄭毅夫榜明州人周師厚以名極低只壓得陳傳一名自賦詩曰舉眼不堪􅀚鄭獬囬頭由喜得陳傳朱定囯詩話唐僧法􅁤形容短小開􅊰扵寺與李荣議論徃来數番僧舊作一詩詠李荣扵髙坐上誦之云姓李應湏礼名荣又不荣李􅀿声曰身長三尺半頭毛􅀹未生四坐伏其辯捷啓顔録經生多不省文章嘗一邑有两人同官其一􅂉舉杜筍鶴詩􅁛賛也􅀿無處避征徭之句其一難之曰此詩失矣野鷹何嘗有征徭乎舉詩者觧曰古人有言豈有失也必是當年科􅂑翎毛耳貢文詩話頴州張龍圖嘗見州牒押字多團下拽一畫有人云押字如有蒸餅様張應声曰為官恰似􅔇糊團有同人自言近年云􅂡鬂恰如􅍡馬色張曰文章依舊草馿鳴雍洛灵異記包賀多為鄙俗之句至扵枯竹笋抽青橛子䂖橊􅀣掛小瓶児又云霧是山巾子舡為水靸鞋又云掉摇舡掠髩風動水搥􅇩雖好事者托以成之亦空穴来風之意王伸知永州為人耽扵酒色其宴樂徃徃自早至暮不之云鴛鴦未老頭先白嘲者素患六損􅁨制者應声曰螃蠏才生足便多時人以為名對崔櫓酒後扵䖍州陸郎中坐上甚狂以詩謝之曰醉時顛蹶醒時羞􅎘蘖催人不自由尀耐一双窮相眼不堪花卉在前頭閩人黄通累舉不第後該恩歴官􅂾任年六十猶欲鎻厅􅂉嘲之曰剰貟主武藝老妓舞柘枝李義府嘗作詩曰􅍢月為􅁔扇裁雲作舞衣自怜廽雪態好取洛川㱕有􅀥強尉張懐慶好窈人文章有詩曰生情􅍢月為􅁔扇出性裁雲作舞衣照鑑自怜廻雪態来時好取洛川㱕時人誚之曰活剥張昌齡生吞郭正一宋莒公判館亊督諸館聀必至而刀景純數日不来筥公使人邀之加之誚譲主原叔改杜少陵贈鄭廣文詩云景純過官舎走馬不曽下驀地􅁛朝歸便遭官長罵栁州栁太守種栁栁江邉栁舘依然在千株栁拂天後南中丞至黔南人嘲之曰黔南􅀯太守􅀯郡在雲􅀯閑向南亭畔南風变俗談並同上増修詩話總􅀛卷之三十九百家詩話總􅀛後集卷之三十九神仙門高尚処士劉臯謂士大夫以􅄝慾殺身以財利殺子孫以政事殺人以斈術殺天下後世非神仙中人不能發此言也復斎漫録熈寕中王迪為洪州左司理叅軍一日有道人來磨鏡因俾迪自照乃見星冠羽帔縹緲見鏡中迪問其故曰此汝前身也由汝悞念堕此勉自􅁱証勿淪苦海旣去迪具以告其妻妻然之遂弃官與妻􅀮去郡僚挽留不可皆作詩以餞行時新建主簿劉純臣有詩雖警拔可以記其實云􅄠如抺添左叅軍脱去青衫作􅀮淪世上更無羈絆事壷中别有自由身􅂦烹玉免山前薬花㸔金鰲背上春莫怪少年能决烈藍田夫媍搃登真后㱕姑􅂫不知所終同上周貫自言膠東人嘗號木鴈子善属文㳺扵洪州西山􅄝酒不覊布􅄄粗全人或贈之錢則詣酒家取醉余皆散墜不頋西山之人見貫徃來者五十余年而顔如􅀄至有以道術訪之則必报以􅁖声使之親近不得也熈寕元年至豫章石頭市遇故人捿止張生爲具酒食而􅀫中夜逆旅之主人聞戸外有車馬合沓声起而視之無有也唯貫所卧室月止開犹奄奄然喘息就而察之貫已死矣明日告新建縣尉呉杲卿徃按之貫身㓗如生扶而轉之腹中汨汨如浪鳴焉縣主簿刘純臣使人棺歛埋扵地云張生還家其弟迎門曰周翁凌辰見遇今徃双嶺矣衆乃知貫非實死者也貫所著華陽二篇坐卧不離懐䄂人莫得見曰純臣耴而有之純臣梢其文險絶而有條理純臣以詩記之曰八十西山作酒仙麻鞋乱断布衣穿形骸一脱塵縁尽太極光隂不記年洪斍範冷齋夜話嘗記之然互有不同同上吾八歳入小學以道士張易蕳為師童子㡬百人師獨称吾與陳太􅀄者太􅀄眉山市井人子也予稍長學日益遂第進士制䇿而太􅀄乃為郡小吏其後余謫居黄州有眉山道士陸推忠自蜀來云太􅀄巳尸觧矣蜀人呉師道為漢州太守太􅀄徃客焉正旦日見師道求衣食錢物且告别持所得盡與市人貧者反坐扵㦸門下遂卒師道使卒舁徃野外焚之卒罵曰何物道士使我正旦舁死人太􅀄㣲􅀏開目曰不復煩汝歩自㦸門至金鴈橋下趺坐而逝焚之城人見􅃄熖上眇眇焉有一陳道人也東坡新安聶師道宗微少事道士于方求發迹逰名山􅂾見異人楊行宻開府扵􅀭州宗㣲實輔佐之盖為囯師三十年楊氏末觧化而去弟子塟之舉棺惟衣履存焉順義七年楊溥贈問政先生方外之兄徳誨為新安太守乃扵郡之東山築室以居方外號為問政山房問政之名或得扵此苕溪漁隱曰問政山去新安郡城十許里岩谷幽邃今有琳字在焉囯􅀄黄台留題詩云千㝷練􅅁新安水萬仭花屏問政山自少雲霞居物外不多塵􅁟到人間壷懸仙島吞舟罷椀浸星宫咒水閑艸暗壇思句曲松昏紫氣度凾関􅀛成錢甲毛猶緑鶴化黳翎頂更殷阮洞神仙分藥去蔡家兄弟􅀉書还笻枝挺柱菖蒲莭筍幘高簮玳􅈘班新􅀮漸聞侵月窟舊隣猶說枕沙湾黄精苗倒眠青鹿紅杏枝低挂白鷴海上使頻青鳥􅃛篋中蔵乆白馿頑手踈俗礼慵非傲肘後灵方秘不慳室録匣垂金􅈁􅅁絳囊條鏁玉連環常㝷灵穴通三楚擬過流沙化百蛮容易煑銀供客用辛勤㘽果與猿扳静張琹􅈰舖还打黙考仙經註又刪􅇃並􅁑鞋寒兎伏窓横柽几老龍跧溪童乞火朝􅃻竹山􅄦听琹夜撼關花氣熏心香馥馥澗声聆耳响潺潺高墳自掩浮生骨短晷難凋不死顔早晚重逄䔥塢客願随芝盖出塵寰余以續仙傳高道傳二書攷之詩中所用事多出師道本傳山谷唐末有狂道士不知何許人又晦其名氏逰成都忽詣紫極宫謁杜光庭先生求寓泊之所先生諾之而不與之進道士日貨藥扵市所得錢随多少沽酒飲之惟唱感庭秋一詞其意感蜀之將亡如秋庭之衰落然人未之暁但呼為感庭秋道士凡半年人亦不知其異一夕大醉歸夜将䦨尚聞唱声愈高有訝之者隔户窺之見灯燭綵綉筵具噐皿罗列甚盛狂道士左右二青童立侍時斟酒而唱窺者具以白先生先生乃欵其户曰光庭量識膚淺不意上仙降鍳深爲罪戾然不揆愚昧而匍匐門下冀一拜光灵以消塵障道士曰何辱勤拳之若是當出奉見乃令二童􅀵筵具噐皿及陳設致扵前堞之則随手而小如符子􅃺置冠中又􅀅二童按之如木偶可寸許又置冠中乃啓户光庭忻然而入但空室而巳高道傳唐清逺道士同枕恭子㳺虎丘詩曰余本長殷周遭罹歴秦漢計之至唐則二千餘歳矣顔魯公爱而刻之且有詩曰客有神仙者扵兹雅䴡陳盖指為神仙也李衛公追和魯公刻清逺道士詩曰逸人綴清藻前哲􅇔萹翰則逸人指清逺而前哲謂魯公也其後皮日休陸􅀛􅂪軰皆和之仙􅁘􅄦􅁘則不必問然㒒獨爱其数句云吟挽川之隂歩上山之岸山川共澄澈光彩交陵亂白雲蓊􅁒㱕青松忽消半扵乎借使非神仙亦才􅄦也許彦周詩話異聞集載沈旣済作枕中記云開元中道者吕翁非洞賓也盖洞賔嘗自序以為吕渭之孫仕徳宗朝今云開元則吕翁非洞賔無可疑者苕溪漁隱曰回仙嘗有詞云黄梁猶未熟梦驚殘尚用枕中記故事可見其非吕翁也灵怪集載南柯太守傳與枕中記事絶相􅀋浮世荣枯固巳如夣矣此二事又扵夣中作梦旣可􅀏亦可歎已復斎漫錄回仙扵京師景徳寺僧房壁上題詩云明月斜秋風冷今夜故人來不來教人立盡梧桐影相傳此詩自國􅀄時即有之栁􅂄卿詞云愁緒終難整又立盡梧桐碎影用回仙語也古今詞話語云耆卿作傾盃秋景一闋忽夣一媍人云妾非今世人曽作前詩数百年無人称道公能用之夣斍記其事世傳乃􅄦謡也此語怪誕無可攷㨿盖不曽見回仙㽞題遂妄言耳予兄子瞻嘗従事扶風開元寺多古􅀞而子瞻少好􅀞徃徃匹馬入寺循壁終日有一老僧出揖之曰小院在近能一相訪否子瞻欣然􅀙之僧曰貧道平生好藥術有一方能以朱砂化淡金為精金老當傳人而患無可傳者知公可傳故欲一見子瞻曰吾不好此術雖得之将不能為僧曰此方知而不可為公若不為正當傳矣是時陳希亮少卿守扶風而平生溺扵黄白嘗扵此僧求方而僧不與子瞻曰陳卿求而不與吾不求而得何也僧曰貧道非不悦陳卿畏其得方不能不為耳貧道昔嘗以方授人矣有為之即死者有遭䘮者有失官者故不敢輕以授人即出一卷書曰此中皆名方其一則化金方也公必不肯輕作但勿輕以授人如陳卿謹勿傳也子瞻許諾㱕視其方毎淡金一两視其分数不足一分輙以丹砂一錢益之雜諸藥入甘鍋中煆之鎔即傾出金砂俱不耗但其色深淺斑斑相雜當􅂯烹之色匀乃止後偶見陳卿語及此僧􅃍應之曰近得其方矣陳卿驚曰君何由得之子瞻具道僧不欲輕傳人之意不以方示之陳固請不巳不得已與之陳試之良騐子瞻悔曰某不惜此方惜􅀒此僧耳公謹爲之陳姑應曰諾未幾坐受隣郡公使酒以􅂍敗去子瞻疑其以金故深自悔恨後謫居黄州陳公子慥在黄子瞻問曰少卿昔竟嘗爲此法否慥曰吾父旣失官至洛陽無以買宅遂大作此然竟病指􅏴而没乃知僧言誠不妄也後十年余謫居筠州有蜀僧儀介者師文事禅師文之所至輙爲修造所費不貲而莫知錢所􅀙來介祕其術問之不以告人介以聡禅師善宻爲聡言其方大􅀋扶風開元寺僧所傳者然介未嘗以一錢􅀻自利故能保其術而無患苕溪漁隠曰洞微志載葉生者與前事相􅀋其以得乾銀術妄費而受􅍔故回仙謂沈東老云聞公自能黄白之術未嘗妄用盖嘉之也此真可爲貪者之戒龍川略志呉興之東林沈東老能釀十八仙白酒一日有客自號回道人長揖扵門曰知公白酒新熟逺來相訪願求一醉實熈寜元年八月十九日也公見其風骨秀偉跫然起迎徐􅀚其碧眼有光與之語其声清貟扵古今治乱老荘浮圖氏之理無所不通知其非塵埃中人也因出酒噐十數扵席間曰聞道人善飲欲以􅂦先為夀如何公曰飲噐中惟鍾􅂦為大屈巵螺杯次之而梨花蕉葉最小請戒侍人次第速斟當為公自小至大以飲之􅀏曰有如頋愷之食蔗漸入佳境也又約周而復始常易噐滿斟扵前􅀏曰所謂杯中酒不空也回公興至即㪯杯舉白常命東老鼓琹回乃浩􅁔以和之又嘗圍棊以相娱止奕數子􅂺拂去􅀏曰秪恐碁終爛斧柯回公自日中至暮已飲數斗無酒色是夕月㣲明秋暑未退蚊蚋尚多侍人秉扇􅇌拂偶㓕一燭回公乃命取竹枝以餘酒噀之挿扵逺壁湏􅁷蚊蚋盡捿壁間而所飲之地洒然東老􅁒有所叩先託以求􅇌蚊之法回云曰且飲小術烏足遒㢤聞公自能黄白之術未嘗妄用且篤扵孝義又多隂㓛此予今日所以來㝷訪而􅀅以發之也東老因叩長生輕舉之術回公曰以四大假合之身未可離形而頓去惟死生去住為大事死知所住則神生扵彼矣東老攝衣起謝有以喻之回公曰此古今所謂苐一最上極則処也此去五年復遇今日公當化去然公之所鍾爱者子階也治􅒛時不得見之當此之際公亦先期而知謹勿動懐恐䘮失公之真性東老頷而悟之飲􅀅逹旦則瓮中所醸止㽞糟粕而無餘􅄋矣回公曰乆不逰浙中今日為公而來當㽞詩以贈然吾不斈世人用筆書乃就擘席上榴皮畫字題扵􅤮壁其色㣲黄而漸加黒故其言有回仙人贈東老詩西隣巳冨􅁨不足東老雖貧樂有餘白酒醸來縁好客黄金散盡為􅀵書凡三十六年巳而告别東老啓関送之天漸明矣握手並行􅀏約異時之集至舎西石橋回公先度乗風而去莫知所適後四年中秋之吉東老微恙乃属其族人而告之曰回公熈寕元年八月十九日嘗謂予曰此去五年復遇今日當化去予意明年今乃熈寕之五年也子階又適在京師干薦回公之言其在今日乎及期􅂢舘凡回公所言無有不騐陸元光回仙録吾廼京兆人唐末累舉進士不苐因逰華山遇鍾离傳授金丹大藥之方復遇苦竹真人方能驅使􅄦神􅄪遇鍾离尽􅀗希夷之妙旨吾得年五十苐一度郭上竈苐二度趙仙姑郭性頑鈍只與追錢延年之法趙性通灵随吾左右吾惟是風清月白神仙㑹聚之時嘗逰两浙京汴譙郡嘗着白襴角􅅁右眼下有痣如人間使者筯頭大世言吾賣墨飛劍取人頭吾聞乃之實有三劍一断煩恼二断貪嗔三断色慾是吾之劒世有傳吾之神不若傳吾之法不若傳吾之行何以故爲人若反是雖携手接武終不成道苕溪漁隠曰回仙有沁园春一闋明内丹之旨語意深妙惜乎世人但􅁔其詞不究其理吾故表􅂋之云七返還丹在人先湏煉巳待時正一陽􅀄動中宵漏永温温鈆􅂦先透簾幃造化争馳虎龍交合進火㓛夫􅀹閗危曲江上㸔月華莹净有箇烏飛當時自飲刀圭又誰信無中養就児辨水源清濁木金間膈不因師指此事難知道要玄微天機深逺下手速脩犹太遲􅅾萊路逺三千行滿獨歩雲㱕百家詩話総􅀛後集卷之三十九
