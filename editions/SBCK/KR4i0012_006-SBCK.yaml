front:
  text: 增修詩話總􅀛卷之六
  hash: sha256:c68e7126f580a7885d308f3c0bd6bf16866cb2fd64aee42f447fe905cdfcef4a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_006-1a}
body:
  text: 評論門中王右丞好取人詩如行到水窮處坐看雲起時此華英集中句也漠漠水田飛白鷺隂隂夏木囀黄􅕢此李嘉祐句僧惠崇有詩云河分崗􅀔㫁春入燒痕青士大夫竒之然皆唐人舊句崇有師弟學詩於崇贈崇詩曰河分崗􅀔司空曙春入燒痕劉長卿不是師偷古人句古人詩句似師兄大都誦古人詩多積乆或不記則徃徃用爲巳有如少陵詩云峽束滄江起嵓排石􅀣圓見蘇子羙頌詩全用峽束滄江嵓排石􅀣作五言詩两句子羙豈竊人詩者古今詩話元和中長安有沙門善病人文章􅀹能提人語意相合張籍喜之或得句曰長因送人處憶得別家時謂似應不與前軰合也僧曰此有人道來籍曰何人僧曰見他桃李􅀣憶着后園枝籍大􅀏舒王云梨花一枝春帶雨桃花亂落如紅雨珠簾暮捲西山雨皆警句也然不􅀂院落深沉杏花雨爲佳宋莒公好玉谿詩不愛韋蘇州晏元獻取少陵多取太白少又取裴􅀃幸無偏照處剛有不明時爲佳咏牡丹詩甚多羅鄴云落盡春紅始見花幄籠輕日護香霞買栽池舘恐無地看到子孫能幾家此詩中之虎也俱同前此詩續本事詩有全篇云落盡春紅始見花花時比屋事豪奢買栽池舘恐無地看到子孫能幾家門􅀝長衢攅綉軛幄籠輕日護香霞歌鍾滿坐争􅂬賞豈信流年􅁂有華續本事詩李太白才逸氣豪與陳拾遺齊名其論詩云梁陳巳來艶薄殊極沈休文又尚聲律將復古道非我而誰故陳李二集律詩全少嘗言興寄深㣲五言不如四言七言又其靡也况使束扵聲調俳優㢤故戯杜子羙曰飯顆山頭逢杜甫頭戴笠子日卓午借問别來太瘦生總爲從前作詩苦古今詩話宋武帝詠謝莊月賦稱歎乆之謂顔延之希逸作此可謂前不見古人後不見作者陳思王何足尚也延之曰誠如其言又云羙人邁􅀆信音絶隔千里􅀆共明月知之不亦晚乎武帝以爲然及見希逸希逸對曰延之詩云生爲長相思死爲長不歸豈不更加於臣􅁘武帝撫掌謝學士吟蝴蝶詩三百首人呼爲謝蝴蝶其間絶有佳句如狂隨柳絮有時見舞入梨花何處尋又曰江天春晚煖風細相逐賣花人過橋古詩有陌上斜飛去花間倒翅回又云身似何􅀰貪傅粉心如韓夀愛偷香終不若謝句意深逺孫少述栽竹詩曰更起粉墻高百尺莫令墻外俗人看晏臨淄曰何用粉墻高百尺任敎墻外俗人看處士之節宰相之量各言其志李洞爲呉子華所知子華嘗出百篇示洞洞曰大兄百篇中一聮最佳西昌新亭曰暖􅃞魚遺子晴逰鹿引麛子子華亦不怒其所鄙而喜其所許蘇子羙坐進奏賽神事謪官死于臯橋之居江隣㡬有詩吊之曰郡邸獄􅁈誰與辯臯橋客死世同悲用事精審而當又有云五十踐衰境加我在明年論者謂人莫不用事使事如已出天然渾成乃可言詩江外有石人破之其形色皆􅀋月歐陽文忠有月石詩云二曜分爲三固爲佳句尚念未快子羙見之作詩􅀉之云我疑此山石乆爲月昭著老蚌吸月月降胎水犀望星星入角􅊮霞爍石變丹砂白紅貫岩生羙璞永叔見之曰此竒才精通物理者也說者謂王右丞終南詩皆譏時宰詩云太乙近天都連山接海隅言􅀔位盤㩀朝野也白雲廻望合青靄入看無言徒有表而無内也分野中峰變晴隂衆壑殊言恩澤偏也欲投何處􅀫隔水問樵夫言畏禍深也杜荀鶴嘗有舊衣􅁅絮絮新酒竹篘篘或稱於相國韋莊莊曰我道印將金鏁鏁簾用玉鈎鈎其皆可見俱同前唐人賡和詩有次韻依其次用韻同在一韻中耳有用韻用彼之韻亦必次之韓吏部和皇甫湜陸渾山火是也今人多不曉劉長卿餘干旅舎云揺落暮天逈丹楓霜葉稀􅀌城向水閉獨鳥背人飛渡口月初上鄰家漁未歸郷心正欲絶何處搗征衣張籍􅀫江上舘云楚馹南渡口夜深來客稀月明見潮上江静覺鷗飛旅􅀫今巳逺此行殊未歸離家乆無信又聴搗寒衣两詩偶似次韻皆竒作也張逈少年苦吟未有所得夣五色雲自天而下取一團吞之遂精雅道有􅀉逺詩曰錦字慿誰逹閒庭草又枯夜長燈影㓕天逺鴈聲􅀌蟬􅁂凋將盡虬髯白也無幾回愁不語因看朔方啚携卷謁齊巳點頭吟諷無斁爲改虬髯黒在無逈遂拜作一字師郡閣雅談鄭谷㓜􅀒名譽司空圖見而竒之問之荅曰大夫曲江晚望㫁篇云村南斜日閑廻首一對鴛鴦落渡頭意深矣司空撫背曰當爲一代風騷主同前蘇子容愛元白劉賔客軰詩如汝洛唱和皆徃徃成誦苦不愛太白軰詩曾誦汝洛集九日送人云清秋方落㡌子夏正離群以爲假對工夫無及此聮又舉劉夣得送李文饒再鎮浙西詩以爲最着題詩史謝赫云衛恊之􅀞雖不該備形妙而有氣韻凌跨群雄誠曠代絶筆歐陽文忠盤車圖云古􅀞􅀞意不􅀞形梅詩詠物無􅀮情忘情得意知者寡不􅀂見詩如見􅀞此眞識􅀞也古今詩話曹唐羅􅀮同時有詩名羅曰唐有􅀑詩或曰何也曰􅀣底有天春寂寂人間無路月茫茫唐曰􅀮有牡丹詩或曰何也􅀂教觧語􅀿傾國任是無情也動人盧瓌抒情杜子羙詩映堦碧草自春色隔葉黄􅕢空好音此正詠武侯廟而托意在其間金陵語録暝色赴春愁下得赴字好􅀂下起字便是小児語也無人覺來徃踈􅂴興何長下得覺字大好足見吟詩要一字两字工夫同前國朝浮屠以詩名于世九人故有集號九僧詩今不復傳余聞人多稱其一曰惠崇餘八人忘其名字余亦記其詩云馬降來地鵰盤戰後雲又云春生桂嶺外人在海門西其佳句􅀋此當時有進士許洞俊逸士也㑹諸僧分題出一􅁓約曰不得犯此一字其字乃山水風雲竹石花草雪霜星日禽鳥之􅀋諸僧閣筆洞咸平三年進士及第無名子嘲曰張康渾褁馬許洞閙裝妻是巳九僧謂希晝寳通守恭行肇簡長尚能智仁休復惟鳳有集行於世試􅁐亦有詩歐公詩話唐之晚年詩人無復李杜豪放之格然亦務以精意相高如周朴者搆思􅀹艱每有所得必極雕琢故時人稱朴詩月鍜未及成篇句巳播人口其名重當時如此今不復傳余少時見集中有云風暖鳥聲碎日高花影重又云曉來山鳥閙雨過杏花稀誠佳句也風暖鳥聲碎日高花影重杜荀鶴集有全篇嘗有云杜詩三百首妙在一聮中風煖鳥聲碎日高花影重今文忠乃以爲周朴詩聖俞嘗語余曰詩家雖率意造語亦難若意新語工得前人所未道者斯爲善也必能狀難冩之景如在目前含不盡之意見於言外然後爲至賈島云竹籠拾山果瓦瓶担石泉姚合云馬隨山鹿放人逐野禽棲等句是山邑荒僻官况蕭條不如縣古槐根出官清馬骨高為工余曰工者如是狀難冩之景含不盡之意何詩為然聖俞曰作者得於心覧者㑹以意􅀂嚴維柳塘春水慢花塢夕陽遲則天容時態融和駘蕩豈不在目前乎又􅀂温飛卿雞聲茅店月人迹极橋霜賈島怪禽啼曠野落日恐行人則道路辛苦覊愁旅思豈不見於言外乎楊大年與錢劉數公唱和自西崐集出時人争效之詩體一變而先生老軰患其多用故事至語僻難曉殊不知自是學者之弊如子儀新蟬云風來玉宇烏先覺露下金莖鶴未知雖用故事何害爲佳如大年云峭㠶横渡官橋柳叠鼔驚飛海㟁鷗其不用故事豈不佳乎盖其雄文博學筆力有餘故無施不可非如前世號詩人者區區於風雪草木之􅀋爲許洞所困也退之才力無施不可以詩爲文章末事其詩曰多情懷酒伴餘事作詩人然其資談笑助諧謔叙人情狀物態一寓於詩而曲盡其妙此在雄文大手固不足論而余獨愛其工於用韻盖得韻寛則波瀾横溢泛入旁韻合離出入回合殆不可拘以常格如此日足可惜之􅀋是巳得韻窄則不復旁出而因見其巧愈險愈竒如病中贈張十八之􅀋是也余嘗與聖俞論此以謂譬諸善馭良馬者通衢廣陌縱橫馳逐惟意所之至於曲水蟻封疾徐中節而不蹉跌乃天下之至工也聖俞戯曰前史言退之爲人木強􅀂寛韻可自足而輒旁出窄韻難獨用而抝反不出非強而然歟坐客􅀏俱同前歐陽永叔不甚愛杜詩而謂韓吏部絶倫吏部於唐世文章未嘗屈下獨於李杜稱道不巳歐陽貴韓而不恱子羙所不可曉然於李白則又甚賞愛將由太白騰捍飛動易爲感動也貢父詩話唐文人李習之不能爲詩韓吏部集有習之两句云前知詎灼灼此去信悠悠殊無可取鄭州嘗掘地得石刻刺史李翺戯贈詩云縣君愛塼渠遶水恣行逰鄙性樂山野掘地便成溝两岸植芳艸中間􅃞清流所向旣不同傅􅁥還自脩從他後人見景趣誰爲幽此别一李翺非習之唐書習之傳不記爲鄭州王深甫編次習之詩乃􅀵此詩皇甫湜詩亦無聞退之有讀公安詩譏其掎摭糞壌間國朝尹師魯以古文自名而不能爲詩吾嘗見梅聖俞云然同前許渾詩格清䴡然不干教化又有李逺以賦名傷於綺靡不渉道故當時號渾詩逺賦雖然詩要于教化若似聶夷中軰又太拙直矣詩史古人文章自􅀿律度未嘗以音韻爲主自沈約増崇韻學其論文則曰欲使宫羽相變低昻殊節若前有浮聲則後須切響一篇之内音韻盡殊两句之中輕重悉異妙逹此㫖始可言文自後浮巧之語體製漸多如旁犯蹉對假對雙聲叠韻之􅀋詩又有正格偏格􅀋例極多故有三十四格十九圖四聲八病之􅀋今略舉數事如徐陵云陪遊馺娑䀻􅊏腰於結長樂鴛鴦奏新聲於度曲又云厭長樂之踈鍾勞中宫之緩箭雖两長樂義不同不爲重複此爲旁犯如九歌云蕙殽蒸􅀆蘭藉奠桂酒􅀆椒漿蒸蕙殽對奠桂酒今倒用之謂之蹉對如自朱􅁘之狼狽致赤子之流離不惟赤對朱􅁘對子兼狼狽流離乃獸名對鳥名又如厨人具雞􅁰稚子􅎥楊梅以雞對羊如此之􅀋皆爲假對如幾家村艸裏吹唱隔江聞幾家村艸吹唱隔江皆雙聲如月影侵簮冷江光逼􅄚清侵簮逼􅄚皆叠韵詩第二字側入謂之正格如鳯暦軒轅紀龍飛四十春之􅀋皆第二字平入謂之偏格如四更山吐月殘夜水明楼之􅀋唐名軰詩多用正格希首薦樂天曰二公論文在於一戰遂試長劍􅀝天外賦餘霞散成綺詩以凝爲首祜次之曰地􅀔遥高岳河流側譲􅀜多士謂陳叔寳曰日月光天徳山河壯帝居此徒有前名又祜題金山寺云􅀣影中流見鍾聲两岸聞雖綦母潜云塔影掛清漢鍾聲和白雲此句未爲佳祜觀獵四韻及宫詞樂天曰張三作獵詩比王右丞予則未敢優劣王摩詰詩曰風劲角􅃓鳴將軍獵渭城草枯鷹眼疾雪盡馬蹄輕忽過新城戍還歸細柳營廻看落鴈處十里暮雲平祜詩曰曉出禁城東分圍淺草中紅旗開向日白馬驟迎風背手抽金鏃翻身控角􅃓萬人齊指處一鴈落寒空白公云又謂宮詞之中皆數對何足竒也然無徐生千古長如白練飛一條界破青山色祜遂行歌而邁凝亦鼓枻而去二生終身偃蹇不隨郷賦前此李林宗􅀘闕杜牧之舎人與樂天輦下較文具言元白詩體斘雜而爲清苦者見嗤因茲恨之樂天爲河南尹李爲河南令相遇於道尹乗馬令肩輿乖趍走之禮亦曾謂樂天爲囁嚅公聞者皆咲樂天名减矣尹曰李直木林宗字也吾視之猘子也其鋒不可當後牧之守秋浦與祜爲詩酒之交酷吟祜宫詞亦知錢塘之試自有是非之論櫰不平之色爲詩二章以髙之曰誰人得似張公子千首詩輕萬戸侯又云如何故國三千里虚唱歌詞滿六宫祜詩曰故國三千里深宫二十年一聲何滿子􅀟淚落君前此詩宫娥諷念思郷起長門之悲祜復逰甘露寺􅀚盧肇題詩曰不謂三呉經此詩人也祜曰日月光先到山河􅀔盡來盧曰地從京口㫁山到海門雲溪友議聖俞子羙齊名於一時而二家詩體特異子羙筆力豪俊以超邁横絶爲奇聖俞覃思精㣲以深逺閑淡爲意各極其長雖善論者不能優劣余谷夜行詩略道其一二云子羙氣方雄萬竅􅃅一噫有時肆顛狂醉墨洒滂濡譬如千里馬巳􅀤不可殺􅄹前盡珠璣一一難㨂汰梅公事清淺石齒漱寒瀬作詩三十年視猶後我軰文詞愈清新心意雖老大有如妖嬈女老自有餘態近詩􅀹苦硬咀嚼苦難嘬又如食橄㰖真味乆愈在蘇豪以氣轢舉世徒驚駭梅窮獨我知古噐今難賣語雖非工謂粗得彷彿然不能優劣之歐公詩話昔蘇子羙言樂天琵琶行中云夜深忽夣少年事覺來粉淚紅闌干此聮有佳句余謂夣得武昌老人吹笛歌云如今老去語猶遲音韻髙低耳不知氣力巳無聲尚在時時一曲夣中吹不减樂天詩史梅聖俞扵范希文席上賦河豚魚詩云春洲生荻芽春岸飛楊花河豚於此時貴不數魚蝦河豚出春暮逰水上食柳絮而肥南人多與荻芽爲羮而食之故知者謂只破題两句已道盡河豚好處聖俞平生苦於吟詠以閑爲意故其詩思極艱此詩於尊爼咲談間頃刻而成遂爲絶唱東齋録司馬相如叙上林諸水曰丹水紫淵㶚滻涇渭八川分流相背而異態灝溔潢東注太湖李善注太湖所謂震澤按八水皆入大河焉得東注震澤又曰樂天長恨歌云峨嵋山下少人行旌旗無光日色薄峨嵋在嘉州與幸蜀路全無交渉杜甫武侯廟栢詩云霜皮溜雨四十圍黛色叅天二千尺四十圍乃徑七尺無乃太細長也防風氏身廣九畆長三丈按廣六尺九畆乃五十丈四尺如此防風之身乃一餅餤耳此文章之病也筆談晏元獻公喜爲詩多稱引後進一時名士徃徃出其門聖俞作詩多矣公獨愛其一聮云寒魚猶着底白鷺巳飛前又絮暖鮆魚繁波添蓴菜紫余嘗見聖俞自書手簡再三稱賞此二聮余問之聖俞曰此非我之極致豈公偶自得意於其間乎歐公詩話淇州楊軒詠牡丹曰楊妃歌舞態西子巧讒魂利劍砍不㫁餘妖鍾此根光華日已盛欄檻豈長存􅀉語尋芳者須知松栢尊羅􅀮曰􅀂教觧語􅀿傾國任是無情也動人二人用意不同如此軒詩雖撚風花而有警戒雲齋廣録世傳盧綘夣女子喝菩薩蠻云眉黛逺山攅芭蕉生暮寒此詞人能道之楊大年云獨自凭䦨干衣􅁭生暮寒未知孰是古今詩話劉長卿嘗謂前有沈宋王杜後有錢􅀰劉李李嘉祐郎士元焉得與余齊稱每題詩不言姓但曰長卿以海内合知之耳士林譏之宋雍􅀄無令名及瞽詩名乃彰盧綸員外作擬僧詩清江作七夕詩劉隨州有眼作無眼句宋雍無眼作有眼句流以爲四背或云四倒盧綸詩曰願得逺公知姓字焚香洗鉢過餘生清江上人詩曰惟愁更漏促離別在明朝劉隨州詩曰細雨濕衣看不見閑花着地聴無聲宋雍詩曰黄鳥不堪愁裏聴緑楊冝向水中看雲溪友議心事數莖白髮生涯一片青山空林有雪相待古路無人自還李王好書神仙隱遁之術非遭罹多故欲脫世網而不得者耶百斛明珠舊說陶淵明不知音畜無絃琴以􅀉意曰但得琴中趣何勞絃上聲東坡嘗言劉伯伶以鍤自隨曰死便埋我予以謂伯伶非逹者棺槨衣衾不害爲逹苟為不然死則已矣何必更埋至於淵明亦非忘琴者也五音六律不害爲忘琴茍為不然無琴可也何獨絃乎以是知舊說之妄也淵明自云和以七絃豈得爲不知音當是有琴而絃弊壞不復更張但撫弄以􅀉意如此爲得其真自祭文出妙語於纊息之餘豈死生之流㢤但恨其猶以生爲寓以死爲真耳嗟夫先生豈非真死得非寓乎同前詩話總􅀛卷之六百家詩話總􅀛後集卷之六諷諭門唐文宗夏日聮句東坡謂宋玉對楚王雄風􅏺其知已不知人也公􅁠小子有羙而無規爲續之云一爲居所移苦樂永相忘願言均此施清隂分四方或謂五弦之薫解愠阜財巳有陳善責难之意愚謂不然凢規諫之辞湏切直分明乃可以感悟人主故盗言孔甘良薬苦口若以薫風自南来爲陳善閉邪但恐後世導䛕側媚持兩可者皆得以冐敢諫之名也䂬溪陽城徳行道義爲士林之所敬服徳宗以銀印赤紱起于􅀮所驟拜諌官可謂賢且遇矣故學生聞道州之貶􅄬業而呌閽賢士愴馹名之同摛辞而頌徳可以知其賢不誣也然退之諌臣論乃極口貶之何㢤其言曰今陽子實一匹夫在諫位不爲不乆而未嘗一言及於政視政之得失􅀂越人之視秦人之肥瘠問其官則曰諌議也問其政則曰我不知也有道之士固如是乎考之本傳以謂他諫官論事苛細帝厭苦城漫聞得失且熟尤未肯言客屡諫之第醉以酒而不荅盖其意有所待矣至徳宗逐陸贄􅁒相裴延齡而城伏蒲之􅀃始上廷争懇至累日不解故元㣲之詩云正元歳云暮朝有曲如鈎飛章八九上皆􅀂珠暗􅄬且曰事不止臣諫誓不休而白楽天亦云陽城爲諌議以正事其君其手如屈軼舉必指侫臣卒使不仁者不得秉國鈞柳子厚亦云抗志厲義直道是陳盖退之諫論乃在止裴延齡為相之前而三子頌羙之言乃在陽城極諫之後也丹陽集唐末有冝春人王轂以􅁔詩擅名嘗作玉􅀣曲畧云璧月夜瓊楼春匣舌泠泠詞調新當時狎客尽封禄直諫犯顔無一人􅁔未闋晋王劍上粘腥血君臣猶在醉郷中一面巳無陳日月此調大播人口轂未苐時嘗於市㕓中見有同人􅀍無頼軰歐撃轂前救之曰莫無禮便是觧道君臣猶在醉郷中一面巳無陳日月者無頼聞之慙謝而退盖譏當時士大夫掩蔽人善殆此小人不若愚謂特假以自諭爾無頼所以悔過􅀙善頓革㐫暴之氣者非重其才也非重其名也盖重其言有􅀘於治亂安危者也蔡寛夫云江湖多白鳥天地有青蝇人遂以白鳥爲鷺而禮記月令群鳥飬羞鄭氏乃引夏小正丹鳥白鳥之􅀃謂白鳥為蚊蚋則知以對青蠅意亦深矣不然江湖多白鷺有何􅀃邪䂬溪子羙詩草有害於人曾何生阻脩芒刺在我眼焉能待時秋其憤邪嫉􅁖欲芟夷蕰崇之以肅清王室者抱懐可見臨川有勿去草草無􅁖如比世俗俗浮薄此方外之語異乎農夫之務者也黄常明子羙云設網萬魚急盖指聚歛之臣苛法侵漁使民不􅂓生乃萬魚急也又云能者操舟疾􅀂風撑突波濤挺义入小人舞智趋時巧宦数遷所謂疾􅀂風也殘民以逞不顧傾覆所謂挺义入也日暮蛟龍改窟穴山根鱸鮹隨雲雷魚不得其所龍豈能安居君與民猶是也此與六義比興何異吾徒何爲縱此樂暴戾天物聖所哀此樂而能戒又有仁厚意亦如前王作網􅅈設法害生成不專爲取魚也退之义魚曰􅀚樂憶吾僚異此意矣亦如蘄簟云􅁍願天日常炎曦故後人改之云豈比法曹空自􅀻却願天曰長炎赫黄常明唐子西上張天􅁴内前行云内前車馬撥不開文德殿下宣麻回紫􅅔侍郎拜右相中使押赴文昌䑓此語善扵叙事質而不俚又云周公禮樂未要作致身姚宋亦不􅁖向来兩翁當國年民間斗米􅂊四錢此語善扵諷諭當而有理皆可法也湖上云佳月明作哲好風聖之清栖禪歸云草青仍過􅀨山紫更斜陽語意俱新李陽氷云太白不讀非聖人之書恥爲鄭衛之作故其言多似天仙之辭凢所著述言多諷興自三代以來風騷之後馳驅屈宋鞭撻􅀭馬千載獨歩唯公一人故王公趋風列岳結􅁤群賢翕習如鳥帰鳯盧黄門云陳拾遺横制頽波天下質文翕然一變至今朝詩体尚有梁陳宫掖之風至公大変掃地併盡今古文集遏而不行唯公文章横􅀍六合可謂力敵造化歟逹理門苕溪漁􅀮曰裴􅀃云讀書貧裏樂捜句静中忙此二事乃余日用者甘貧守静自少至老飽諳此味矣許彦同詩話云羅􅀮詩云只知亊逐眼前過不􅁴老􅀙頭上來此殊有味朱氏復齋偶題詩曰出入無時是此心豈知鷄大易追㝷請㸔屏上􅀄爻㫖便識名齋用意深東坡云秋菊有佳色裛露掇其英泛此忘憂物逺我遺世情一觴雖獨進杯盡壼自傾曰入群動息帰鳥趋林鳴􅀏傲東軒下􅂓後得此生靖莭以無事爲得此生則見役扵物者非失此生耶東坡送山夲禪師赴法雲云是身如浮雲安得限南北此二句乃老杜別賛上人詩中全語豈偶然用之邪題碧落洞詩云小語輙響荅空山白雲驚此語全􅀋李太白今印夲誤作自雷驚不惟無意味兼與上句重叠也後自嶺外歸次韻江晦叔詩云浮雲時事改􅀌月此心明語意髙妙如􅂙禪悟道之人􅄍露􅅐􅁭無一毫窒碍也康節天津感事吟水流任急境常静花落雖頻意自閑不似世人忙裏老生来未始得開顔撃壤集先天吟先天天弟爲後天奉天時弗違無時􅃜奉時有時疲同上身心吟身生天地後心在天地前天地自我出自餘何足言同上康莭無憂吟人生長有两般愁愁死愁生未易休或向利中窮力取或于名上盡心求多思唯恐晚得手未老已聞先白頭我有何功居彼上其間攘臂獨無憂擊壤集百家詩話總􅀛後集卷之六
