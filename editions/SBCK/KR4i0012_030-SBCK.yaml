front:
  text: 増修詩話總􅀛卷之三十
  hash: sha256:1474ff2bfd4142be58817a00454a8d383a9d30a09bb3a6b3d28e9d89a83cd0e6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_030-1a}
body:
  text: 道僧門道士沈廷瑞彬之子也性坦率直造縣宰之坐宰方治訟而廷瑞至宰戯之曰沈道士何時成道廷瑞應聲曰何須問我道成時紫府清都自有期手握藥苗人不識體含仙骨俗争知宰慙江南野録呉崇岳泉州人也爲龍興觀道士辟榖多年常登其宫松梢禮拜㨿松枝可六七十尺福建漕使周謂因請隨行抵于德化縣縣治之東有古松一株高八九十尺上有鶴巢乃命崇岳登之宛􅀂􅆐狖容易直上出鶴巢之外端身飛歩手無攀縁就纎枝拜如平地其松枝柔軟隨歩低昻略無損處周謂乃爲詩贈云楮為冠子布為裳吞得丹霞夀最長混俗性靈常樂道出塵風格早休糧枕中經妙誰傳與肘後方新自寫將百尺松梢㡬飛歩鶴棲枝上禮虚皇太平興國中詔入郡閣雅談楚􅀰中失其名宦逰江東泊金陵岸下子弟軰逰茆山見一老僧住一小庵謂諸子曰何所至此告以因逰賞林泉而來日晚欲丐􅀫可乎僧曰舎陋不可相容此二三里有寺可􅀫因指諸子令徃抵寺巳暮矣寺僧問誰指來諸子曰山下老僧寺僧曰聞此有老僧甚乆未之見也凌晨徃則庵中巳無人惟松上有詩云數株松檜食不盡一沼芰荷衣有餘剛􅀍傍人相問當老僧今日又遷居摭遺僧無夣嘗在府畿村落中求化手持大木牌題詩二絶曰心為車􅀆身為軾車動軾随何意息交梨火􅀥是誰無自是不為荆與􅁄身為客􅀆心為主主人和平客安堵􅀂還客主不康寜精神必定隨君去翰府名談景德中日本僧照寂入貢三司使丁晋公甚恱之晋為言姑蘇山水竒秀照寂心愛而留因止于呉門寺其徒不願從者遣數人歸本國後以黒金水瓶􅀉晋公并詩曰提携三五載日用不曾離曉井斟殘月春爐釋夜澌鄱銀難免侈萊石易成􅃜此噐堅還實􅀉公應可知談􅁐僧護國江南人也攻詞翰題醴陵玉仙觀云白雲至今凝不散星壇松殿㡬千秋徃徃笙歌生夜半瀑布西行遇石橋黄精採根還採苗路逢一人擎一椀茶花夜來風吹滿又言家住在東坡白大相逢邀我過南山石上有棊局曾使樵人爛斧柯此篇絶佳詩僧中下可得也大暦末禪僧元覧住荆州陟岵寺道高風韻人不可親章璪嘗􅀞松於齋壁符載賛之衞􅁚詠之亦一時四絶覧悉加堊焉人問其故曰無事疥吾壁也僧那即其甥發瓦探壞墻薫䑕覧未甞責弟子議論而布衣一食亦不稱之或怪問之乃題詩扵竹曰大海從魚躍長空任鳥飛古今詩話沙門貫休鍾陵人精扵筆札荆州成中問其筆札法休曰此事須登壇可授安可草草而言成令䘖之乃逓於黔中因為病鶴詩見意曰見􅀃氣清邪不入不知爾病自何來同前唐昭宗以錢武肅平董昌功拜鎮東軍節度使自稱呉越國王貫休投詩曰貴逼身来不自由㡬年勤苦蹈林丘滿堂花醉三千客一劍霜寒十四州萊子衣裳宫錦窄謝公篇詠綺霞羞他年名上凌烟閣豈羡當時萬户侯武肅愛其詩遣諭令改為四十州乃可相見貫休性􅄶答曰州亦難添詩亦難改閑雲􅀌鶴何天不可飛遂入蜀以詩投孟知祥詩云一瓶一鉢垂垂老萬水千山得得來古今詩話温州鴈蕩山自古圖史不載按西域書云諾矩羅居震旦東南大海祭鴈蕩山芙蓉龍湫唐貫休作賛云鴈蕩經行雲漠漠龍湫宴坐雨濛濛北山南山有芙蓉峰下有芙蓉驛前瞰大海山頂有大池相傳以為鴈蕩有二潭以為龍湫又有經行䑓宴坐峰皆以貫休詩得名也唐大興善寺東廊之南有僧不出院轉法華經三萬七千部夜常有狐子來聴長慶初庭前有牡丹一朶合歡僧幽之詩曰三萬蓮經三十春平生不踏院門塵杜牧之弱冠登第再中制科因與二三同年城南逰覧至丈六寺有禪僧擁􅄄坐與之語可佳問杜姓名具以對又曰脩何業傍人以累捷誇之􅀏曰皆不知也牧之嘆訝乆之作詩云家住城南杜曲旁两枝仙桂一時芳老僧都未知名姓始􅁴空門氣味長蜀僧遠國傷蜀詩曰樂極悲來數有涯歌聲􅅻歇便興嗟牽羊廢主㝷傾國逐鹿奸臣盡䘮家丹禁夜凉空鎻月後庭春老謾開花两朝基業都成夣林木蒼蒼噪暮鴉南方浮屠能詩者多矣徃徃多不􅂋其名福州有一僧作詩百餘篇其中佳句有云虹􅀵千嶂雨潮展半江天又有詩云詩因試客分題僻棋為饒人下子低不减於古人也閩僧懐濬有詩二絶云家在閩山東復東其中歲歲有花紅而今再到花紅䖏花在舊時紅處紅家在閩山西復西其中歲歲有鶯啼而今再到鶯啼處鶯在舊時啼處啼人多誦之大暦中澤潞間有僧號普滿或歌或咲言事多驗建中初潞州佛寺題詩一首而去詩曰此水連涇水􅀟珠血滿川青牛將赤虎方􅃅太平年此水泚字涇水自涇川兵亂􅀟珠滔泚也青牛興元二年乙丑赤虎是歳改元元年丙寅是年賊平陳文惠赴端州􅋈舟廬陵有胡僧叩舷謂公曰虎目鳯鼻猿身平地不能為也當有攀附然後有所食位極卿相僧為詩一絶曰虎目􅆐身形最貴須因攀附即升高知公今向端溪去助子清風泛怒濤公後登庸青􅃈集廬山佛手巖在絶頂李氏有國日行因禪師居焉李氏詔居棲賢寺未㡬一夕大雪迯居舊􅀮嘗煑茶延僧起托巖扉立化余作偈曰前朝詔住棲賢寺雪夜迯居岩石間想見煑茶延客處直縁生死不相關東呉僧道潜經臨平作詩云風蒲獵獵弄輕桑欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲東坡見之大稱賞及坡守徐潜訪之館扵逍遥堂士大夫欲識之坡饌客罷俱而來坡遣一妓乞詩詩曰􅀉語巫山窈窕娘好將魂夣惱㐮王禪心巳作沾泥絮不逐春風上下狂一座大驚然性偏憎凡子作詩云去歲春風上苑行爛窺紅紫厭平生如今眼底無姚魏浪蕋浮花􅂴問名士論少之其作詩追法淵明有逼真處如曰數聲柔櫓滄浪外何處江村人夜歸是也冷齋夜話西湖僧順怡然清苦賦十竹詩城中寸土如寸金幽軒種竹只十箇春風慎勿長児孫穿我堦前緑苔破林下詩云乆服林下逰頗識林下趣從渠緑隂繁不碍清風度閑來石上眠落葉不知數山鳥忽飛來啼破幽寂處荊公愛之陳瑩中謫合浦以書抵余為􅀒華嚴經入嶺有偈曰大士㳺方興盡回家山風月絶纎埃杖頭多少閑田地挑取華嚴入嶺來余和之曰因法相逢一􅀏開俯看人世過飛埃湘南嶺内休分别圓寂光中共徃來聞嶺外大雪作二偈􅀉之曰傳聞嶺外雪壓倒千年􅀣老児拊手􅀏有眼未曾覩故應潤物材一洗瘴江霧􅀉語牧牛人莫教頭角露又曰偏界不曾藏處處光皎皎開眼失蹤由都縁太分暁園外忽生春萬瓦粲一􅀏遥知􅃘凍人未悟安心了静禪師渡溪為漲流所䧟童子掖至㟁坐沙石間垂頭如雨鶴忽指溪作詩曰春天一夜雨霶􅑛添得溪流意氣多剛把山僧推倒却不知到海復如何後無疾而化余夜夣逢一道士一奴􅀒酒瓢隨之道士邀余坐茗坊奴􅀼飲瓢無有乃􅀏道士詬欲杖之顧奴曰汝從覺範求詩曰難藏為香釁易滿坐徧小開口所有竭饞奴法當􅀏句句皆譏其􅄶可怪也璉禪師工詩舒王以其詩示歐公公曰此道人肝臟饅頭是中無一􅀧菜氣仁廟留住净因禪院作偈進乞還山林曰千簇雲山萬壑流閑身歸老此峰頭殷勤願祝如天夀一炷清香滿石樓又曰堯仁况是如天闊乞與􅀌雲自在飛桂林僧景淳工詩福老衲為余言淳意苦而深世不可􅃍解如曰夜色中旬後虚堂坐㡬更隔溪􅆐乍呌當檻月初生又曰後夜客來稀幽齋獨掩扉月中無事立艸際一螢飛余時方十六七心不然之筠溪快山有虎有牧童為虎逐牛捍護之竟死石門老衲文公為余言之為作詩以諷含齒􅀍髮而不義者然余徒能諷之其能巳之㢤頌曰快山山淺亦有虎時時妥尾過行路一䜿地坐牧两牯以捶捶地不知顧虎搏䜿如鷹搦兎两牛來奔虎棄去因徃疴癢挨老􅀣牯則喘伺同守護虎竟不得此牧䜿䜿雖不活牯無􅀒一村􅅝傳共鳴皷而虎巳迯不知處嗟乎異㢤两太武高􅁩可與貫髙伍今走仁義名好古臨事真情乃愧汝此事可信文公語為君落筆驚風雨並同前増修詩話總􅀛卷之三十百家詩話總􅀛後集卷之三十詠茶門唐趙璘􅄒因話録載其家兵部君性􅀹嗜茶能自煎謂人曰茶湏緩火灸活水煎坡有活水還湏緩火煎恐亦用此黄常明五代時鄭遨茶詩云嫩芽香且靈吾謂艸中英夜臼和烟搗寒爐對雪烹維􅁨碧粉散常見緑花生最是堪珎重能令睡思清范文正公詩云黄金碾畔緑塵飛碧玉甌中翠濤起茶色以白爲貴二公皆以碧緑言之何邪三山老人語録茶之佳品造在社前其次則火前謂寒食前也其下則雨前謂谷雨前也佳品其色白􅀂碧緑者乃常品也茶之佳品芽蘖細㣲不可多得􅀂此數多者皆常品也茶之佳品皆􅀧啜之其煎啜之者皆常品也齊已茶詩曰甘傳天下口貴占火前名又曰髙人愛惜蔵岩裏白甀封題􅀉火前丁謂茶詩曰開緘試新火湏汲逺山前凡此皆言火前盖未知社前之品為佳也鄭谷茶詩曰入坐半甌輕泛緑開緘數片淺含香鄭雲叟茶詩曰維􅁨碧粉散嘗見緑花生沈存中論茶謂黄金碾畔緑塵飛碧玉甌中翠濤起冝改緑為玉翠為素此論可也而舉一夜風吹一寸長之句以為茶之精羙不必以雀舌鳥觜為貴今案茶至扵一寸長則其芽葉大矣非佳品也存中此論曲矣盧仝茶詩曰開緘宛見諌議面手閱月圑三百片薛能謝劉相公􅀉茶詩曰兩串春團敵夜光名題天柱印維陽茶之佳品珎輸金玉未易多得而以三百片惠盧仝以两串􅀉薛能者皆下品可知也齊巳詩角開香满室炉動緑凝鐺丁謂詩曰末細烹還好鐺新味更全此皆煎啜之也煎啜之者非佳品矣唐人扵茶雖有陸羽為之􅀃而評論未精至本朝蔡君謨茶録旣行則持論精矣以茶録而覈前賢之詩皆未知佳味者也三山老人語録唐以前茶惟貴蜀中所産孫楚􅁔云茶出巴蜀張孟陽登成都樓詩云芳茶冠六合溢味播九區他處未見称者唐茶品雖多亦以蜀茶為重然惟湖州紫筍入貢毎􅀊以清明日貢到先薦宗庙然後分賜近臣紫筍生顧渚在湖常二境之間當採茶時两郡守畢至最為盛㑹杜牧詩所謂溪盡停蛮棹旗張卓翠苔栁村穿窈窕桃澗渡喧豗劉禹錫何處人間似仙境春山携妓采茶時皆以此建茶絶亡貴者僅得挂一名尓至􅀯李氏時漸見貴始有團圏之製而造作之精經丁晋公始大􅇱自建茶出天下所産皆不復可數今出處􅊤源沙溪土地相去丈尺之間品味已不同謂之外焙况他處乎則知雖艸木之㣲其􅂋晦亦自有時然唐自常衮以前閩中未有讀書者自衮教之而歐陽􅉟之徒始出而終唐世亦不甚盛今閩中舉子常􅂾倍天下而朝廷将相公卿毎居十四五人物尚尔况艸木㣲物也顧渚湧金泉毎造茶時太守先􅀕拜然後水漸出造貢茶畢水稍减至供堂茶畢已减半太守茶畢遂涸盖常時無水也􅂉聞今龍焙泉亦然苕溪漁隠曰北􅁐官焙也漕司􅀊以入貢茶爲上􅊤源􅀻焙也土人亦入貢茶爲次二焙相去三四里間若沙溪外焙也與二焙相去絶逺自隔一溪茶爲下山谷詩云莫遣沙溪耒亂真正謂此也官焙造茶嘗在驚蛰後一二日興工採摘是時茶芽已皆一槍盖閩中地煖如此舊讀歐公詩有喊山之􅀃亦傳聞之訛耳龍焙泉即御泉也水之増减亦随水旱􅀄無漸出遂涸之異但泉水極􅅴正冝造茶耳蔡寛夫詩話蜀中數處蜀茶雅州䝉頂最佳其生最晚在春夏之交其地即書所謂蔡䝉旅平者也方茶之生雲霧覆其上若有神物護持之東斎紀事茶古不著所出本艸云出益州唐以䝉山顧渚蘄門者爲上品尚雜以􅂫椒之􅀋故李泌詩云旋沬翻成碧玉池添􅂫散出琉璃眼遂以碧色爲貴止曰煎茶不知􅀧試之妙大率皆艸茶也陸羽茶經綐言福建泉紹等十州所出者其味極佳而只今建安爲天下第一遯斎閑覧鄭可簡以貢茶進用累官聀至右文殿修撰福建路轉運使其姪千里扵山谷間得朱艸可簡令其子待問進之因此得官好事者作詩云父貴因茶白児荣爲艸朱而千里以􅀙父奪朱艸以予子譊譊不已待問得官而㱕盛集為慶親姻畢集衆皆賛喜可簡云一門僥倖其姪􅃍云千里埋􅁈衆皆以的對是時貢茶一方騷動故也苕溪漁隠曰余􅀚東坡荔支欵注云大小龍茶始扵丁晋公而成扵蔡君謨歐陽永叔聞君謨進小龍團驚欵曰君謨士人也何至作此事今年閩中􅁥司乞進閗茶許之故其詩云武夷谿􅁁粟粒芽前丁後蔡相籠加争新買寵各出意今年閗品充官茶則知始作俑者大可罪也髙斎詩話詩云誰謂茶苦尔雅云檟苦茶注􅀣似梔子今呼早采者為茶晚采者為茗一名荈蜀人名之苦茶故東坡乞茶㘽詩云周詩記苦茶茗飲出近世􅀄縁厭粱肉假此雪昏􅆡盖謂是也六一居士嘗新茶詩云泉甘噐潔天色好坐中㨂擇客亦佳東坡守維􅀭扵石塔寺試茶詩云椫窓䴡午景蜀井出氷雪坐客皆可人􅂦噐手自㓗正謂諺云三不􅀧也苕溪漁隠葉濤詩極不工而喜賦詠嘗有試茶詩云碾成天上龍兼鳯煑出人間􅈉與蝦好事者戯云此非試茶乃碾玉匠人嘗􅀯食也西清詩話唐相李衞公好飲惠山泉置馹傳送不逺數千里而近世歐陽少師作龍茶録序称嘉祐七年親享明堂致齋之夕始以小􅇛分賜二府又給一餅不敢碾試至今蔵之時熈寕元年也吾聞茶不問􅇛鍔要之貴新水不問江井要之貴活千里致水真偽固不可知縱令識真巳非活水自嘉祐七年壬寅至熈寕元年戊申首尾七年更閲三朝而賜茶猶在此豈復有茶也㢤苕溪漁隠曰壬午之春余赴官閩中漕幕遂得至北􅁐􅀚造貢茶其最精即氷芽細如針用御泉水研造社前巳嘗貢餘毎片計工直四萬錢分試其色如乳平生未嘗曽啜此好茶亦未嘗嘗茶如此之蚤也唐子西閗茶記魯直諸茶詞余謂品令一詞最佳能道人所不能言􅀹在結尾三四句詞云鳯舞􅇛􅇛餅恨分破教􅀌令金渠休净􅃗輪慢碾玉塵光莹湯響松風早减二分酒病味濃香永醉郷路成佳境恰如灯下故人萬里㱕耒對影口不能言心下快活對省苕溪漁隐東坡詩春濃睡足午窓明想見新茶如潑乳又云新火發茶乳此論皆得茶之正色矣至贈謙師点茶則云忽驚午盞􅇠豪班打作春瓮鵝児酒盖用老杜詩鵞児黄似酒對酒爱鵞児若是則色黄烏得爲佳茗矣今東坡前集不載此詩想自知其非故刪去之同上臘茶出扵建劍草茶盛扵两浙两浙之品日注爲第一自景祐巳後洪州双井白芽漸盛近􅀊製作􅀹精囊以紅紗不過一二两以常茶十數斤飬之用辟暑􅊜之氣其品逺出日注上遂爲艸茶第一苕溪漁隱曰醉翁又有􅀟井茶詩云西江水清江石老石上生茶如鳯􅀲穷臘不寒春氣早􅀟井芽生先百艸白毛囊以紅紗碧十斤茶養一斤芽長安冨貴五侯家一啜猶湏三日誇蔡君謨好茗飲又精扵藻鍳荅程公闢蕳云曏得􅀟井四两其時人還未識叙謝不悉㝷烹治之色香味皆精好是為茗芽之冠非日注宝雲可並也涪翁􅀹譽双井盖鄉物也李公擇有詩嘲之戯作觧嘲云山芽落磑風囬雪曽與尚書破睡来勿以姫姜弃憔悴逄時瓦釡亦鳴雷又荅黄冕仲索煎双井并簡王􅀭休詩云江夏無􅀟乃吾宗同舎頗似王安豊能澆茗椀湔祓我風􅃑欲挹浮丘公吾宗落筆賞幽事秋月下照澄江空家山鷹爪是小艸敢與好賜雲龍同不嫌水厄幸来辱寒泉湯鼎听松風同上世言􅇛茶始扵丁晋公前此未有也慶暦中蔡君謨為福建漕更製小􅇛以充􅀊貢元豊􅀄下建州又製宻雲龍以獻其品高扵小􅇛而其製益精矣曽文昭所謂莆陽學士􅅾莱仙製成月􅇛飛上天又云宻雲新様􅀹可喜名出元豊聖天子是也唐陸羽茶經扵建茶尚云未詳而當時獨貴陽羡茶􅀊貢特盛茶山居湖常二州之間脩貢則两守相㑹山椒有境㑹亭基尚存盧仝謝孟諌議茶詩云天子湏嘗陽羡茶百艸不敢先開花是巳然又云開緘宛見諌議面手閱月􅇛三百片則􅇛茶巳見扵此當時李郢茶山貢焙􅁔云烝之馥之香勝梅研膏架動聲如雷茶神拜表貢天子萬人争喊春山摧覌研膏之句則知嘗為􅇛茶無疑自建茶入貢陽羡不復研膏祗謂之艸茶而已􅁑常之昨夜梦參寥師携軸詩見過斍而記其飲茶两句云寒食清明都過了石泉槐火一時新夣中問火固新矣泉何故新荅曰俗以清明淘井當續成詩以記其事東坡百家詩話総􅀛後集卷之三十
