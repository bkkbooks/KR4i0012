front:
  text: 增修詩話總􅀛卷之十三
  hash: sha256:9eedfe21c3c2ed4423c3e46116036b8723b52c1653b2614b7106748f62de4f9e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_013-1a}
body:
  text: 警句門中楊文公云錢惟演劉筠首變詩格學者慕之得其格者蔚為佳詠二公䴡語頗多如惟演奉使􅂗中云雪意未成雲着地秋聲不㫁鴈連天又云客亭厭見名長短村酒那能辯聖賢送僧逰楚云􅀫舎􅀌烟起行衣夣雨凉張弁州詩云戈矛廵霧夕鐃皷宴蕭晨章衢雨詩云平檻暁波呉榜渡遶城春􅀣越禽飛章南安云離人南浦多春艸越鳥棲枝有早梅劉潭州云坐激鮮飈湘竹暁樹含凉雨越禽歸李大僕北使云漢幟隨移帳燕鴻半解鞍何􅀽州云踈鍾静起軍城晚華表􅀟高水國秋陳江陵云深沉蛛網通歸夣紫翠春山接去舟太乙宮云神庭古栢啼烏起齋室虚簾􅀫霧通送人云思滿離亭酒魂驚客舎烏高泉州云東南地逈宵烽息西北樓髙晩望迷章分寜云小雨郊原連苦霧夕陽樓閣照丹楓東封應制云羽毛㐮野駕宴喜魯郊民送予知處州云􅁿飈使車逺明月直廬空張僕射判河陽云緑野桑麻連四水黄堂歌吹擁千兵孫永興云魚尾故宫迷艸樹龍鱗平隰自風烟漢武云立􅀱東溟邀鶴駕窮兵西極待龍媒公子云歌畨南國桃根曲馬過章䑓杏葉韀槿花云欲作飛烟散猶憐反照遲荷花云泪有鮫人見魂須宋玉招禁中鶴云天淵風雨多秋思遼海烟波失舊期留題云有時盤馬看􅀹􅂴盡日投壺􅀏未廻又云春瘦巳寛連理帶夜長誰有辟寒金元夜云九枝火樹連金狄萬里霜輪上璧璫馬延州云沃野桑麻􅆂細雨嚴城皷角送斜陽劉筠直禁中云雨􅀔宫城闊秋聲禁􅀣多陜州從事云角逈含秋氣橋長㫁洛塵周賢良云﨑嶇一乗傳憔悴五羊皮南鄭云渝舞氣豪傳漢俗丙魚味羙敵呉郷李太僕云惟月卿曹重占星使者賢送僧云捲衲城鍾㫁搘笻岳雨寒僧惠崇云醉令難同社仙鵞肯換書葉金華云柔桑蔽野鳴雛雉高柳含風變早蟬劉潭州云坐席乆虚温樹老心旌無柰楚風長又云沙禽两两穿鈴閣江艸依依接射堂九隴云溪牋未破氷生硯爐酒新燒雪滿天又同賢良云春風亂鶯囀夕霧一鴻宴張嶺南云山月愁􅏈子風濤怒鱷魚西廵云龍駕昌明御天旗太乙神張婺神云大野幾星分婺女清風萬古感顔烏章南安云嶺雲夏變梅蒸早越雨秋藏桂蠧多西京首坐云滎河帶繞中天閣空樂星懸大士居題雪云劉伶醉席梅花地海客仙槎粉水天利州轉運云鴟蹲野芋誰為尹雪積泉塩乆置官章分寜云鶴伴鳴琴公事晚烏驚調角戍城秋楊處州云朱飾两􅙲廵屬邑案留􅀟筆在中䑓閣云三壤月臨承露掌九鶵烏繞守宫槐又云酒供硯滳濡毫冷火守更籌添漏長雪月云巳回鄰面三年粉又結寒絲幾許氷汾陽道中云皷音記里繩阡逺舞節鳴鸞玉歩隨相洪州云桃葉横波人共醉劍光衝斗獄常空李秦州云右墄獨登温􅀣宻前旌􅀟抗嶺雲高劉潭州云洛田荒二頃楚浪漲三篙槿花云呉宫何薄命楚夣不終朝宫詞云難消守宫血易㫁舞鸞腸又云虹跨層䑓晚螢飛夏􅁐凉夏日云雲容倐變千峰險草色相沿百帶長新蟬云翼薄乍舒宫女鬂蛻輕全解羽人尸公子云行庖㸑蠟彫胡熟永埒鋪金血汗驕明皇云梨園法部兼胡部玉輦長亭更短亭荷花云湔裙無限水障􅃑幾多風留題云荷心出水終無定蘿蔓從風莫自持又云藻井風高蛛壞網杏園春暖燕争泥咏梨云先時櫻熟煩羊酪逺信梅酸損瓠犀洞户云宻鎻香風深處户亂飄梨雪曉來天贈希晝云吟餘雲散葉坐乆麈遺毛夕陽云塞逈横垣紫江清照葉丹圉中云籠禽思隴􅀣洞犬識秦人柳絮云平沙千里經春雪廣陌三條盡日風高屬疾云風簾鴟􅀏厨烟絶月􅀣烏驚藥杵喧燈夕云金徒抱箭當壺水玊宇風來满砌蓂禁中云萬年宫省樹五色帝家禽晚唐詩句尚切對然氣韻甚卑鄭綮山居云童子病歸去鹿麑寒入來自謂銖两輕重不差有人作梅花云強半瘦因前夜雪數枝愁向曉來天對屬雖偏亦有佳處李廷老家有李揆與饒州刺史封漸仲容叔霽聮句揆筆力遒勁詩亦大佳略云光踐蓬瀛閣卧痾淮海濵偶逢鄱陽守宛是鄱陽人又云共仰新侯伯同瞻舊宰臣又云郷路轅思北客林巷喜南王爽字季明王孝伯問曰古詩中何句爲最佳爽未對孝伯曰所遇無故物安得不速老此為佳楊巨濟詩曰爐烟添柳重宫漏出花遲當以下句為試舉人詩題濟本作源晏元獻稱國初待詔云醉輕浮世事老重故郷人張安道亦稱紅塵三尺險中有是非波晏臨淄宴集詩最多有一聮云春風任花落流水放杯行惠崇逰長安云人逰曲江少草入未央深不减馬放降來地鵰盤戰後雲景祐三年後􅁐生雙竹宣宰相從臣賦詩知制誥李絢有詩云日迴龍並影風過鳯聮聲衆嗟賞之前並詩史嘗和杜祁公致仕詩云􅀵得桑榆歸物外種成桃李滿人間亦佳雲齋廣録李元膺逰春詩云夾道桃花三月暮馬蹄無處避殘紅其標致如此陳䑓杜黙預東平郡宴太守請賦海棠詩黙云􅀝風莫怨唐工部後裔寜知不解詩坐客歎服詩史臧謀梅花詩云緑楊解語應相􅀏漏􅂥春光却是誰人皆誦之淇川人􅀭萬畢字通一作聞梧桐夜雨詩云千里暮雲山巳黒一燈􅀌舘酒􅀄醒索寞之意盡扵此華州華隂縣宰許弋扵縣􅅟闢一軒名曰增明取韓文公遥岑出寸碧逺目増􅀟明之意羽客姚太虚謁許公因書云遥岑寸碧尚增明何况雲峰三十六楊茂卿詩云河􅀔崐崘逺山形􅔽蓞秋誠佳錢昭度燈詩云繡帔夣驚中酒處朱門人語上朝時未若船中聞鴈洞庭夜床下有蛩長信秋意格清逺昭度又有聞角詩云風欲抛高雨壓沉黄昏前後五更深議者云此亦句之優者王文穆罷相帥朝士皆有詩陳從易詩最佳云千重浪裏平安過百尺竿頭穏下來景祐末昊叛夏鄭公守長安梅聖俞送詩云亞夫金皷從天落韓信旌旗背水陳鄭公獨􅈓此詩于石范景仁喜為詩年六十三致仕一朝思郷里遂輕行入蜀故人李才元知梓州枉道過之歸至成都日與郷人樂飲散財於親舊之貧者遂逰峨嵋青城下巫峽出荆門歲暮乃還京師在道作詩二百五篇有云不學郷人誇駟馬未饒吾祖泛扁舟此一二事他人所不能用也范希文扵江上見一漁父意其有徳􅀮者也問姓名不對但留一絶云十年江上無人問两手今朝一度义並同前閩嶺孟貫爲性踈野不以名宦爲意喜篇章大諌楊徽之稱之如􅀉張山人艸堂云掃葉林風後拾薪山雨前韓㐮客者漢南女子為歌詩知名㐮漢間孟浩然贈詩曰只爲陽䑓夣裏狂降來教作神仙客㐮客閨怨詩曰連理枝前同設誓丁香􅀣下共論心先公熈寜中迓虜使成堯錫見遺衣服刺此聮扵褁肚上其下復刺丁香連理男女設誓之狀虜人重此句為佳製詩史開元中將軍宋清有神劍後為􅀲州牧李廣琛所得竒舒翰求之廣琛不與贈詩曰刻舟㝷巳化彈鋏未􅁯酧南部廬阜人陳沉立性僻野不接俗士黄損熊皎虚中師事之寒食後云罷却児女戯放他花木生閑居云掃地雪粘箒耕山鳥怕牛題水云􅀧入旱雲千國仰力浮塵世一毫輕齊已贈沉云四海方磨劍深山自讀書並雅言雜載張觀性沉静未嘗艸書自詠曰保心如止水爲行見真書以爲着題桂􅁐雜録太上􅀮者人莫知其本末好事者從問其姓名不答留詩一絶云偶來松樹下高枕石頭眠山中無暦日寒盡不知年古今詩話宋之問貶黜放還至江南逰靈􅀮寺夜月極明長廊行吟曰鷲嶺欎岧嶤龍宫鏁寂寥未得下聮有老僧燭燈坐禪問曰少年不寐而吟諷甚苦何􅁘之問曰欲題此寺而思不屬僧曰試吟上聮之問誦之曰何不道樓觀滄海日門對浙江潮之問終篇曰桂子月中落天香雲外飄捫蘿登塔逺刳木取泉遥雲薄霜􅀄下氷輕葉未凋待入天台路㸔余渡石橋僧一聮乃篇中警䇿也遲明訪之已不見寺僧曰此駱賔王也張俞成都人蜀以賢良稱之有詩行于世題武侯廟云高光如有嗣呉魏豈勝誅又題御愛山云可勝亡國恨猶有愛山心題洞庭湖云萬頃碧波看不盡一拳孤岫望中明皆佳劉夣得有蜀吟曰巴人淚逐猿聲落蜀客舟從鳥道囬姚合道旁亭子詩云南陌逰人回首去東林道者杖䉫歸不言亭亦佳王摩詰酷好􅀞山水其􅀞山聳谷䆳雲浮水飛意出塵外嘗自題云􅀫世謬詞客前身􅀿􅀞師李璟定爲妙品上上同前李益詩名早著征人早行篇好事者􅀞爲啚障如回樂峰前沙似雪受降城下月如霜天下歌之胡擢詩善狀花木鳥獸飄然有物外意嘗謂人曰吾思苦扵三峽聞􅆐吟曰甕中每醖逍遥樂筆下閒偷造化工唐南蠻侵軼西川僖宗幸蜀慮為患以女下降蠻喜其姻聮大國遣宰相趙隆眉楊竒鯤叚義宗來朝行在高駢自淮海飛章云南蠻心膂唯此數人請留而鴆之迄僖宗還京無虞用駢計也􅀭趙軰各有詞藻途中云風裏浪花吹更白雨中山色洗還青海鷗聚處窓前見林狖啼時枕上聴自唐以來試進士詩號省題時有佳句如梓州進士楊諤天聖八年省試蒲車詩云草未驚皇轍山能護帝輿是歲下第景祐元年省試宣室受􅁵詩云願前人主席一問洛陽人是歲及第未㡬慶暦二年韓欽試勲門賜㦸詩云凝鋒畫翻轉交鏃采文繁范景仁曾見真本云迎鋒畫翻轉映日采文繁姑两存之蘇州進士王偃試邇英延講藝詩云白虎前芳掩金華舊事輕天心非不悟垂意在蒼生有古諷諌意是年奏名甚高御前下第二十年始第㝷卒􅅬元􅀤皇佑五年御試吹律聴軍聲詩云萬國休兵外群生奏凱中又作西旅來王詩云寒日􅁁聲㫁春風塞草長傳聞漢都護歸奉萬年觴極為􅂣屋所稱楊諤有題􅌐山云行人問宫殿耕者得珠璣孟蜀王時花蕋夫人能詩而世不傳王平甫扵舘中得七言三十餘篇六約似王建詩云厨舩進食簇時新列座無非侍從臣日午殿頭宣索鱠隔花催喚打魚人又月頭分給買花錢滿殿宫娥盡十千遇着唱名多不語含羞急過御床前並同前楊文公在舘閣時占城進獅子例進詩文公云渡海鯨波息登山豹霧清雜􅀃章獻太后挽辭數百首唯石曼卿一聮首出曰震出坤柔變乾成太極虚太后稱制日乆仁宗端拱至是始親萬機曼卿詩切合時冝又不卑長樂也古今詩話嘉祐中劉諷都官簡州人方年六十三致仕夫婦徒居頼山謝景山有詩送云移家尚恐青山淺􅀮几唯知白日長朱公綽詩云諌艸焚來應見史槖金散盡只留書潘天錫員外與沈􅀰中宅相隣同逰古觀分題天錫云風便磬聲逺日斜樓影長沈彬云松欹晚影離壇艸鍾撼秋聲入殿風郡閣雅談唐宣宗重陽賜群臣宴詩曰欵塞旋征􅀐和戎委廟賢傾心方􅀝注恊力共安邉魏謩􅀿制云四方無事去神豫杪秋來八月寒光動千山霽色開宣宗嘉之南部新書魏野啄木云千林啄如盡一腹餒何妨有詩人䂓戒之風閒居云妻喜栽花活童誇􅋐艸嬴得野人趣非急務故也又云燒葉爐中無􅀫火讀書窓下有殘燈有嫌燒葉貧寒太甚改葉為藥不惟壞此一句并下句亦减氣味所謂求益反損也贈司馬君實云文雖如古道貌不似貧家公􅁥安豐酒稅赴官有行色詩云冷於陂水淡於秋逺陌初窮見渡頭猶頼丹青不能􅀞􅀞成應遣一生愁非狀難寫之景乎㓂萊公年十九進士及第知東巴縣詩云野水無人渡􅀌舟盡日橫又為江南春詩云波渺􅄅柳依依􅀌村芳艸逺斜日杏花飛江南春盡離腸㫁蘋滿汀洲人未歸膾炙人口古今詩話李長吉歌云天􅀂有情天亦老以為竒恠無對石曼卿云月如無恨月長圓九華山人熊皎能詩早行云山前猶見月陌上未逢人山居云果熟秋先落禽寒夜未棲閒居云深逢野艸皆為藥静見樵人恐是仙又云厭聴啼鳥夣醒后慵掃落花春盡時雅言雜載李範􅀜中人善章句爲道傍木云雖當南北路不碍徃來人經王山人舊居云鶴歸秋漢逺人去草堂空秋日江干逺望云清􅆐啼逺木白鳥下前灘暮秋懷故人云天涯故友無來信窓外拒霜空落花江寺閒書云釣叟無機沙鳥睡禪師入定白牛閒同前丁晋公在朱崖有詩數十篇號知命集有曰草解忘憂憂底事花名含􅀏􅀏何人古今詩話陸子履言懷云薄有田園歸去好苦無官况莫來休士君子莫不賞味其意青􅃈集湘南詩僧文喜為失鶴詩云一向亂雲㝷不得㡬畨臨水待歸來上潭州劉相大稱許河外僧清晤春日即事云􅀫鳥歸花影潮魚没浪痕郊外晚菊云叠浪攴層漢殘陽􅀘㫁霞上賈侍中遂褒稱范攄有子七嵗能詩夏景云閒雲生不雨病葉落非秋方干曰必不享夀未十嵗而終劉昭禹字休明婺州人為詩􅈓苦不懼風雨有云句向夜深得心從天外歸言不虚耳並同前廖凝字熈績十歲詠棋詩云滿汀鷗不散一局黒全輸識者見之曰必垂名扵後郡閣雅談裴􅀃裴諧俱有詩名􅀃官至􅀘􅆣諧終於桂嶺假官宰同作湘江吟􅀃詩云吟餘潮入浦坐乆燒移山諧詩云風回山火㫁潮落岸氷高經杜甫墳􅀃云擬掘孤墳破重教大雅生諧曰名終埋不得骨且朽何妨景同而語意俱别吕文穆公未第時嘗逰一縣忘其縣名胡大􅁥旦方隨其父宰是邑遇吕甚薄客有譽曰工扵詩宜少加禮胡問其警句客舉一篇卒章云挑盡寒燈夣不成胡􅀏曰乃一渇睡漢耳吕恨而去明年首中甲科因人􅀉語胡曰渇睡漢狀元及第胡荅曰待我明年第二人及第輸君一籌旣而次榜亦中首選歐公詩話許致殿丞及第後忽心恙爲詩亂題房壁云有漏難求佛無機好學禪又江上對月云江使不來秋練净月娥長在夜珠寒詩話總􅀛卷之十三百家詩話總􅀛後集卷之十三評論門魯直謂陳後山學詩如學道此豈㝷常雕章繪句者之可擬㢤客有謂余言後山詩其要在扵􅀧化杜甫語尔杜云昨夜月同行後山則云勤勤有月與同歸杜云林昏罷幽磬後山則云林昏出幽磬杜云古人日已逺後山則云斯人日已逺杜云中原皷角悲後山則云風連皷角悲杜云暗飛螢自照後山則云飛螢元失照杜云更覺追隨盡後山則云林湖更覺追隨盡杜云文章千古事後山則曰文章平日事杜云乾坤一腐儒後山則曰乾坤着腐儒杜云􅀌城􅀮霧深後山則曰寒城着霧深杜云寒花只暫香後山則曰寒花只自香如此􅀋甚多豈非􅀧化老杜之語而成者余謂不然後山詩格律高古真所謂碌碌盆盎中見此古罍洗者用語稍同乃是讀少陵詩熟不覺在其筆下又何以足病公丹陽南史載孝武嘗問顔延之曰謝莊月賦何如荅曰莊始知隔千里􅀆共明月帝召莊以延之語語之莊應聲曰延之作秋胡詩始知生為乆離别沒為長不歸同上連綿字不可挑轉用詩人間有挑轉用者非為平仄所牽則為韻所牽也羅昭諌以沉寥為寥沉是為平仄所牽秋風生桂枝詩所謂寥沉工夫大是也又以汎瀾為瀾汎是為韻所牽哭孫員外詩所謂故侯何在淚瀾汎是也韻語陽秋方干詩清潤小巧盖未升曹劉之堂或者取之大過余未曉也王賛嘗稱之曰鋟肌滌骨氷瑩霞絢嘉殽自將不吮餘雋䴡不葩芬苦不癯􅁄當其得志倐與神㑹孫邵嘗稱之曰其秀也仙蕋扵常花其鳴也靈鼉扵衆响􅀚其所作登靈􅀮峰詩云山叠雲霞際川傾世界東送喻坦之詩云風塵辭帝里舟楫到家林此真児童語也􅀉喻鳬云寒蕪隨楚盡落葉渡淮稀如送喻坦之下苐又云過楚寒方盡浮淮月正沉贈路明府詩云吟成五字句用破一生心贈喻鳬又云才吟五字句又白㡬莖鬚稱心寺中島云雪折停猿樹花藏浴鶴泉􅀉越上人又云窓接停猿樹巖飛浴鶴泉于使君詩云月中􅀝棹吟漁浦花底垂鞭醉鳯城送伍秀才詩又云􅀝棹寒吟漁浦月垂鞭醉入鳯城春其語言重叠有以見其窘也至扵野渡波揺月空城􅀨翳鍾白猿垂樹窓􅁁月紅鯉驚鈎竹外溪義行相識處貧過少年時等句誠無愧扵孫王所賞杜甫讀蘇渙詩則曰余髪喜郤變白間生黒絲高􅃴觀陳十六史碑則曰我來觀雅製慷􅁣變毛髪韵語陽秋李長吉云我生二十不得意一生愁心謝如梧蘭至二十七而卒陳無巳除夜詩云七十已強半所餘能㡬何遥知暮景促更覺後生多至四十九而卒語意不祥如此豈神明者先受之􅁘丹陽老杜賦螢火詩云幸因腐艸出敢近太陽飛未足臨書卷時能􅀧客衣似譏當時閹人用事扵人君之前不能主張文儒而乃如青蠅之􅀧素也􅀃者乃謂喻小有才而侵侮大徳豈不悞㢤羅􅀮􅀼取其意乃曰不思曾腐艸便擬􅀝􅀌光􅀂道通文翰車公業長其視前作愧矣錢起集前八卷後五卷鮑欽止謂昭宗時有中書舎人錢翃亦起之諸孫今起集中恐亦有翃所作者余􅀄未知其所㨿也比見前集中有同程七早入中書一篇云不意雲霄能自致空驚鵷鷺忽相隨臘雪新晴百子殿春風欲上萬年枝和王員外雪晴早朝詩紫㣲晴雪帶恩光遶仗偏隨鴛鷺行長信月留寜避曉宜春花滿不飛香二詩皆翃所作無疑盖起未嘗入中書也集中又有登彭祖樓一詩而薛能集亦載則知所編甚駮也陳去非嘗謂余言唐人皆苦思作詩所謂吟安一箇字撚㫁數莖鬚句向夜深得心􅀙天外歸吟成五字句用破一生心蟾蜍影裏清吟苦舴艋舟中白髪生之􅁼是也故造語皆工得句皆竒但韻格不高故不能叅少陵之逸歩後之學詩者倘能取唐人語而掇入少陵繩墨歩驟中此速肖之術也余嘗以此語似葉少藴少藴云李益詩云開門風動竹疑是故人來沈亞之詩云徘徊花上月虚度可憐宵皆佳句也鄭谷掇取而用之乃云睡深可忍風敲竹飲散那堪月在花真可與李沈作僕奴由是論之作詩者興致先自高逺則去非之言可用倘不然便與鄭都官無異荆公嘗有詩云功謝蕭䂓慚漢第恩從隗始上燕䑓或謂公曰蕭何萬世之功則功字固有來處􅀂恩字則未見有出也荆公荅曰韓集􅋐雞聮句孟郊云受恩慚始隗則知荆公詩用法之嚴如此然一水護田將緑遶两山排闥送青來之句乃以樊噲排闥事對護田豈護田亦有􅀁出􅁘有好事者謂余言一日有人面稱公詩謂自喜田園安五柳但嫌尸祝擾庚桑以為的對公􅀏曰伊但知柳對桑為的對然庚亦是數盖以十日數之也余謂荆公未必有此意使果如好事者之􅀃則作詩歩驟亦太拘窘矣錢起送屈突司馬詩云星飛龎統驥箭發魯連書人多稱其工余恨龎綂驥出處無星字而魯連書有箭字也趙給事晚歸不遇詩忽看童子掃花處始愧夕􅀰題鳯來前句不用事後句用二事皆非律也丹陽詩家有換骨法謂用古人意而􅀧化之使加工也李白詩云白髮三千丈縁愁似箇長荆公􅀧化之則云繰成白髪三千丈劉禹錫云遥望洞庭湖翠水白銀盤裏一青螺山谷􅀧化之云可惜不當湖水面銀山堆裏看青山孔稚圭白苧歌云山虚鍾響徹山谷􅀧化之云山空响筦絃盧仝詩云艸石是親情山谷點化之云小山作友朋香艸當􅁎妾學詩者不可不知此同上沈存中云退之城南聮句云竹影金􅃈碎金􅃈碎者日光也恨句中無日字尔余謂不然杜子羙云老身倦馬河堤永踏盡黄榆緑槐影亦何必用日字作詩正欲如此􅁑常之自古工詩者未嘗無興也觀物有感焉則有興今之作詩者以興近乎訕也故不敢作而詩之一義廢矣老杜萵苣詩云两句不甲拆空惜埋泥滓野莧迷沒來空山實扵此皆興小人盛而掩抑君子也至高􅃴題處士菜園則云耕地桑柘間地肥菜常熟為問葵藿資何如廟堂肉則近乎訕矣作詩者苟知興之與訕異始可與言詩矣高適别鄭處士云興來無不愜才大亦何傷􅀉孟五詩云秋氣落窮巷離憂兼暮蟬送蕭十八云常苦古人逺今見斯人古題陸少府書齋云散帙至棲鳥眀燈留故人皆佳句也上陳左相天地莊生馬江湖范蠡舟亦有含蓄但莊子謂天地一指萬物一馬而以天地為馬則悞矣並同上山谷詩多用稻田衲亦云曰衣王摩詰詩云乞飯從香積裁衣學水田又云手中花􅏩净香飯稻畦成豈用是􅁘丹陽集晋張翰憶具中蓴菜鱸鱠而歸而高􅃴屢作越上用如送崔功曹赴越云今朝欲乗興隨尔食鱸魚送李九赴越云鏡水若所憶蓴􅃵子舊便人以為疑余攷地理志漢呉縣􅀠今㑹稽郡則以鱸作越上亦無傷也韵語陽秋魯直謂東坡作詩未知句法而東坡題魯直詩云每見魯直詩未嘗不絶倒然此卷語妙甚殆非悠悠者可識能絶倒者巳是可人又云讀魯直詩如見魯仲連李太白不敢復論鄙事雖􅀂不􅃴用然不為無􅀘如此題識其許之乎其譏之也魯直酷愛陳無已詩而東坡亦不深許魯直為無已􅀭譽無所不至而無巳乃謂人言我語勝黄語何􅁘同上百家詩話總􅀛後集卷之十三
