body:
  text: 評論門四韋蘇州云誰知風雨夜復此對床眠最爲世所稱重而白樂天招張司業云能來同􅀫否聴此對床眠意亦相􅀋然不爲人知老杜云眼前無俗物多病也身輕而樂天有眼前無俗物身外即僧居之句世亦獨稱老杜直方詩話梁簡文云早知半路應相失不􅀂從來本獨飛李義山云無事交渠更相失不及從來莫作雙而近時樂府亦云早知今日長相憶不及從來莫作􅀟此最爲詩之大患樂天云哺歠眠糟瓮流涎見麯車杜甫有路逢麯車口流涎而張文潜有􅀉予詩云須看逺山相對蹙莫欺病齒惱衰翁自註云黄九謝人遺梅子詩有逺山對蹙之句乃知詩人取當時作者之語便以爲故事此無他以其人重也舒王詩云投老歸來供奉班塵埃無復見鍾山何須更待黄粱熟始信人間是夣間又云黄􅆝欲熟日流連謾道春歸莫悵然蝴蝶豈能知夣事􅕋􅕋先墮晚花前又云客舎黄粱今始熟鳥殘紅柿昔分甘盖三用黄􅆝而意義皆妙老杜對雪詩云有待至昏鴉乃引何遜城隂度塹黒昏鴉接翅歸之句余疑昏鴉亦常語何必引遜句後作絶句却云釣艇収緍盡昏鴉接翅歸秦少㳺始作蔡州教授意謂朝夕便當入舘歩青雲之上故作東風解凍詩云更無舟楫碍從此百川通已而乆不召用作送張和叔云大梁豪英海故人滿青雲爲謝黄叔度􅁂毛今白紛謂山谷也說者以爲意氣之盛衰一何容易舒王送呉仲庻待制守潭云自古楚有材􅙩醁多羙酒不知樽前客更待賈生否賈􅁩初爲河南呉公召置門下而謪死長沙其用事之精余以爲可詩法余最愛蘇黄門送文潞公云遍閱後生真有道欲談前事恐無人盖潞公官爵年徳難爲形容非此两句不能優㳺而自見張文潜病中作七言詩蘇黄門和之云長空鴈過疑來荅虚幌螢飛坐恐燒秦覯云文潜讀至此不樂余曰何也覯云虚幌坐燒近於死病人所諱歐陽文忠最愛林和靖云踈影横斜水清淺暗香浮動月黄昏山谷以爲不􅀂雪後園林纔半􅀣水􅁁籬落忽横枝余以爲其所愛者便是優劣􅁘此句扵前所稱真可䖏伯仲耳而和靖又有詩云池水倒窺踈影動屋簷斜入一枝低歐陽文忠送張至秘校歸莊詩云鳥聲梅店雨柳色野橋春此茅店月板橋霜之意老杜云天􅆣象緯逼雲卧衣裳冷舒王云當作天閱謂其可對雲卧也古今人作昭君詞多矣余獨愛樂天一絶云漢使却回傳􅀉語黄金何日贖蛾眉君王若問妾顔色莫道不如宫裏時其意優㳺而不迫切樂天賦此時年甚少李秉彛字徳叟寄詩一卷與李希聲云此余近所作希聲讀至朋也老無能淡如雲水僧爲之撫掌盖洪􅀛父名朋善作詩德叟欲資其名失於點勘故耳老杜云何時一尊酒重與細論文而孟浩然亦有何時一尊酒重與李膺傾之句唐張子容作巫山詩云巫嶺岧嶤天際重佳期夙昔願相從朝雲暮雨連天暗神女知來第幾峰近時晏叔原作樂府云慿君問取歸雲信今在巫山第㡬峰最爲人所稱恐出扵子容李賀高軒過中有筆􅀘造化天無功之句余每撃節此詩人之所以多窮也老杜云文章憎命逹恐亦出此陳無巳云石池隨䖏數逰魚余以爲不若李希聲云緑净隨時看上魚邵尭夫詠牡丹云施朱施粉色俱好傾國傾城艶不同可謂言工殊無高致張崏字子望作洛陽觀花云平生自是愛花人到處㝷芳不遇真秪道人間無正色今朝初見洛陽春盖托意邵堯夫尭夫和云造化從來不􅀒人萬般紅紫見功真滿城車馬空撩亂未必逢春盡得春豈非欲使之有所行耳邵尭夫集平生所作爲十卷􅃅曰撃壌冨丞相作詩題其後云􅀺民於變似尭時便字尭夫徳可知更覧新詩名撃壌先生全道略無遺爲偉人所重如此郭功父少時喜誦文忠公詩一日過聖俞聖俞曰近得永叔書云作廬山高詩送劉同年効杜牧晚晴賦自以為得意恨未見此詩功父誦之聖俞撃節歎賞曰使吾更學作詩三十年不能道其中一句功父再誦不覺心醉遂置酒又再誦數行凡誦十數遍不交一言而罷明日聖俞贈功父詩曰一誦廬山髙萬景不可藏設如古􅀞師極意未能忘或云不及忘癸未正月三日徐師川胡少汲謝夷季林子仁潘邠老呉君􅁉饒次守楊信祖呉迪吉見過㑹飲於賦歸堂亦可爲一時之盛潘一作詩歴數其人云胡子雲中白鶴林生初發芙蓉呉十九成雅奏饒三百錬竒鋒南州復見髙士東山行起謝公信祖真成徳祖立之無愧行中呉生可共南郡老夫寜附石崇閒雅巳傾重客說談仍得王戎冠盖城南高㑹山隂未掃餘風客散日衘西壁主人不道尊空徐師川軰皆言此詩殊不工又六字無人曾如此作想爲五言亦可遂去一字句皆可讀至老夫附石崇坐客無不大􅀏劉咸臨醉中嘗作詩話數十篇旣醒書四句於後曰坐井而觀天遂亦作天論客問天方圓低頭慙客問盖悔其率爾也參寥云舊有一詩􅀉少㳺少游和云樓閣過朝雨參差動霽光衣冠分禁路雲氣繞宫墻亂絮迷春闊嫣花困日長平康何處是十里帶垂楊孫莘老讀此詩至末句這小子又賤相􅀤也少㳺後編淮海集遂改云經旬率酒伴猶未厭長楊宗室士􅌔字明􅀤喜作詩與􅀞嘗爲高軒過圖張嘉甫題云顧長康善􅀞而不能詩杜子羙善作詩而不能􅀞從容二子之間者王右丞也􅀂明發盖右丞之季孟云晁無咎亦題云嘉甫謂顧長康善􅀞而不能詩杜子羙能詩而不能􅀞明發兼此二勝可在摩詰季孟間余以􅀞及詩信嘉甫之知言晁以道見之謂余能􅀞而不能詩乃可以爲病豈有能詩而必又能􅀞􅁘夏雲多竒峰乃長康句謂不能詩可乎嘉甫旣易於立論而無咎又便抑之大抵皆讀書少之過洪龜父有詩云胡生􅀞山水烟雨山更好鴻鴈書逺汀馬牛風雨草潘邠老愛其第二句余愛其第三句山谷愛其第四句徐師川愛其第三第四句逺汀後又改爲逺空余云向上一句莫是公未有所得否何衆人之皆不好也􅀛父大􅀏劉壯輿云歐陽公自謂吾畏慕不可及者聖俞子羙及贈詩云文㑹忝予盟詩壇推子將又曰維持於文章㤗山一浮塵旣曰郊死不為島聖俞􅀤其藏又曰堪􅀏區區郊與島螢飛露􅊜凝秋草是其自謂不如者乃所以過之也歐陽公云李白云落日欲沒峴山西倒着接䍦花下迷㐮陽小児齊拍手大家争唱白銅鞮此常言也至於清風明月不用一錢買玉山自倒非人推然後見太白之横放所以警動千古者顧不在於此乎甫之於白得其一節而精強過之余以爲以此警動之耳田承君云歐陽公晚年最喜陳知默詩至云修方且欲學之陳詩不多見承君但見其两聮云平地風烟橫白鳥半山雲木卷蒼藤雲埋山麓藏秋雨葉脫林梢帶晚風張文潜作虎圖詩云煩君衛吾寝振此蓬蓽陋坐令盗肉䑕不敢窺白晝潘邠老云却是猫児詩文潜作輸麥行有云􅂣頭雨乾􅂣他白老稚相呼打新麥半歸倉􅅒半輸王免教縣吏相煎逼輸王乃老農語􅀂時享歲貢納王勤王之􅀋其語古矣秦少㳺晚出左掖門有詩云金雀觚稜轉夕暉飄飄宫葉墮秋衣出門塵漲如黄霧始覺身從天上歸識者以爲少㳺作一黄本校勘而衒耀如此必不逺到洪駒父見陳無巳小放歌行云不惜捲簾通一顧怕君着眼未分明此爲竒語盖通字未嘗有人道余曰子豈不記老杜云簾户每冝通乳燕􅁘舒王有云却憶金明池上路紅裙争看緑衣􅀰歐公謂舒王曰謹愿者亦復爲之􅁘趙徳有詩云冥冥小雨不成泥參寥言冥冥之雨却是作泥者不􅀂霏霏也以道以爲然荆公嘗作一絶題張文昌詩後云蘇州司業詩名老樂府皆言妙入神看似㝷常最竒崛成如容易却艱辛文昌平生所得荆公两句言盡詩云壁門金􅆣􅀝天開五見宫花落石槐明日扁舟滄海去却將雲氣望蓬萊此劉貢父詩也自舘中出知曹州時作舊云雲表荆公改作雲氣又云五見宫花落石槐此作詩法也王中至召至舘中試罷作一絶題於壁云古木森森白玉堂長年來此試文章日斜奏賦長楊罷閑拂塵埃看􅀞墻舊云奏罷長楊賦亦荆公所改石守道作三豪詩謂曼卿豪於詩永叔豪於文杜默豪扵歌故詩云師雄二十二筆距猛如鷹玉川月蝕句意欲相慿陵而歐公亦有詩云南山有鳴鳯其音和自清鳴於有道國出則天下平杜默東土秀能吟鳯凰聲作詩幾百篇長歌仍短行杜默濮州人師雄其字謂豪扵歌者有送守道六子詩云聖人門前大䖝及推倒楊朱墨翟扶起仲尼周公之句默詩謂之豪者豈在是􅁘余嘗得師雄全集觀之餘作皆不及此陳無已有􅀉􅄯以道詩云子較東方生自視何益損人言不當價一錢萬金産其後無巳又賦高軒過云􅅬王蛺蝶江都馬一􅁓千金不當價以道云陳三两度不當價司空表聖自論其詩以爲得味外味如緑􅀣連村暗黄花入麥稀此句最善又云棋聲花院閉幡影石壇高吾嘗獨逰五老峰白䳽觀松隂滿庭不見一人惟聞琴磬之音然後知此句之工但恨其寒儉有僧態􅀂子羙詩云暗飛螢自照水􅀫鳥相呼四更山吐月殘夜水明樓則才力冨徤過表聖逺甚柳儀曹詩憂中有樂樂中有憂妙絶古今然老杜云王侯與螻蟻同盡隨丘墟儀曹何憂之深也有人云陳無巳閉門十日雨即是退之長安閉門三日雪余以爲作詩者容有意思相犯亦不必爲病但不可太甚耳並同前古有早行詩云主人燈下別羸馬月中行又王若云旅人心自急公子夣犹迷惟江東逸人王舉衮詩曰高空有月千門閉大道無人獨自行最爲絶唱青􅃈集范文正有採茶歌天下共傳蔡君謨謂希文公歌膾炙人口有少未完盖公才氣豪傑失於少思希文曰何以言之謨曰昔茶句云黄金碾畔緑塵飛碧玉甌中翠濤起今茶之絶品其色貴白翠緑乃茶之下者耳希文曰君善鍳茶者也此中吾語之病也公意如何君謨曰欲革公詩二字非敢有加焉公曰革何字君謨曰翠綠二字可云黄金碾畔玉塵飛碧玊甌中素濤起希文曰善又見君謨之精茶希文之伏於義濮州杜默當年目之爲三豪謂黙豪於歌石守道赴詔作太學直講默作大字歌送之今舉其豪句云仁義途中馳騁詩書府裏從容頭角驚殺嘏蠏學海波中老龍爪距逐出狐兎聖人門前大䖝推倒楊朱墨翟扶起仲尼周公一條路出甕口幾程身在雲中水浸山影倒碧春着花梢半紅因此歌得在三豪之列又上永叔詩云一片靈䑓掛明月萬丈詞熖飛長虹乞取一杓鳯池水活取乆旱泥蟠龍其豪例皆此􅀋並同前薛許州能以詩道爲巳任還劉徳仁卷有詩云百首如一首卷􅀄如卷終譏劉不能變態陸希聲之比北夣􅃈言蜀沙門僧爾鳥慕李白歌鄙賈島蹇澁乃自諷其詞云鯨目光燒半海紅鰲頭浪蹙掀天白而云我不能致思扵藩蘺蹄涔之間人咸服之仍精於周易佛經為歌行掩之賈島嘗爲僧洛陽令不許僧午後出寺賈有詩云不如牛與羊猶得日暮歸詩思遲澁杼軸方得如鳥從井口出人自岳陽來乃經年方遂偶句開元中有儒士登鍾南山得句云野逈雲根闊山高樹影長􅀻心自􅀒吟諷之際忽聞空中語云未􅀂天河雖有浪月桂不聞香儒士不勝喜以爲已有歸誇於僧智潜掩鼻咲曰臭氣可掬何足多也儒士驚􅕎􅃍以實告自此又􅃅爲鑑文大師有浮漚篇行於世零陵総記盧延遜詩淺近人多咲之惟呉融獨重其作盛稱於時且云此公不㝷常後必垂名延遜詩至今傳之亦有絶好者􅀫東林云两三條霓欲為雨七八箇星猶在天旅舎言懷云名􅁓毛生五門下家僮骨立六街中贈元上人云髙僧觧語牙無水老鶴能飛骨有風蜀路云雲間聞鐸騾䭾去雪裏殘骸虎拽來懷江上云餓猫臨䑕穴饞犬䑛魚砧􅀉人云吟成一箇字撚㫁數莖髭又云􅀣上諮諏批頰鳥窓間壁駁叩頭䖝余在翰林嘗召對上舉廷遜詩云臂鷹徤卒懸氊㡌􅀐馬佳人卷􅀞衫雖淺近亦自成一體談苑東坡嘗與人書言味王摩詰之詩詩中有􅀞􅀚摩詰之􅀞􅀞中有詩云藍田白石出玉􅀜紅葉稀山路元無雨空翠濕人衣此東坡詩非摩詰也詩史吾詩云日日出東門歩歩東城逰城門抱􅀜卒恠我此何求我亦無所求駕言冩我憂章子厚謂嵾寥曰前歩而後駕何其上下紛紛也僕聞之曰吾以氣為輪以神爲馬何曾上下乎參寥曰東坡文過有理似孫子荆曰枕流欲洗其耳東坡詩話山谷作漁父詞清新䴡聞其得意自言以水光山色替却玊肌乃真得漁父家然纔出新婦磯又入女児浦此漁父無乃大瀾浪也百斛明珠文與可嘗云老僧墨竹一􅂀近在彭城吾竹雖不及石似過之此一卷公案不可無山谷下一句山谷因次其韻云東坡雖是湖州􅂀竹石風流過一時前世􅀞師今姓李不妨還作輞川詩或言東坡不曾目伯時爲前身􅀞師俗人不便是語病伯時一丘一壑風流未减古人誰當作此痴計東坡此語是真相知又作二詩云秋山風雨石骨瘦法窟寂寥僧定時李侯有句不肯吐淡墨冩作無聲詩龍眠不似虎頭痴妙筆無機可並馳蘇仙呪墨作石竹應觧種花聞此詩石曼卿詠紅梅云認桃無緑葉辨杏有青枝東坡云詩老不知梅格在更看緑葉與青枝荆公云北人􅀄未識渾作杏花看又能盡紅梅之妙處也有單葉梅千葉梅臘梅故余作四梅詩直方詩話山谷見東坡和淵明飲酒詩讀至前山正可數後􅀐且勿驅云此老未死在山谷嘗謂余曰凡作賦要須以宋玉賈􅁩相如子雲爲師格略依放其歩驟乃有古風老杜詠呉生􅀞云􅀞手看前軰呉生逺擅塲盖古人扵能事不獨求誇前軰要須前軰中擅塲耳東坡言淵明云但恐多謬誤君當恕醉人此未醉時說􅀂醉何暇憂悮哉然世人言醉時是醒時此語最名言荆公始爲集句多至數十韻徃徃對偶親切盖以其誦古人詩多或坐中率然而成始可爲貴其後多有人傚之者但取數部詩集諸家之善耳故東坡次韻孔毅夫集句見贈云羡君戯集他人詩指呼市人如使児天􅁁鴻鵠不易得便令作對隨家雞退之驚􅀏子羙泣問君乆假何時歸世間好事世人共明月自滿千家墀山谷云謝師厚方其爲女擇對見山谷詩曰吾得婿如是足矣庭堅欲求之然庭堅之詩卒從謝公得句法故山谷有詩曰自徃見謝公論詩得濠梁文忠公盤車圖詩云古􅀞􅀞意不􅀞形梅詩詠物無盡情忘形得意知者寡不若見詩如見􅀞東坡作韓幹􅀞馬圖詩云韓生􅀞馬真是馬蘇子作詩如見􅀞世無伯樂亦無韓此詩此􅀞誰當看又云論􅀞以形似見與児童鄰君看賦詩者定知非詩人詩􅀞本一律天工與清新又云少陵翰墨無形􅀞韓幹丹青不語詩此􅀞此詩今已矣人間駑驥謾争馳余每誦數過殆以爲法並同前增修詩話總􅀛卷之八甲集終百家詩話緫􅀛後集卷之八慱識門嘗􅀚臨川觧我葱珩脫盂劳嘗不曉孟劳何等物及􅀚穀梁傳注孟劳魯之寳刀黄常明子羙於菟侵客恨乃楚人謂虎於菟􅁟銼冷踈烟乃蜀人呼釡為銼冨豪有錢駕大舸方言南楚江湘凢船大者謂之舸百丈誰家上水船荆峽以竹為纜百丈塹抵公畦稜京師農人指田云㡬稜去声市暨瀼西巓䕫人謂江水横通山谷處為瀼子厚桃笙葵扇安可當宋魏之間謂簟為笙欵乃一聲山水緑乃楚人􅁔聲臨川窓明兩不借楚人以草屦為不借東坡倦㸔澁勒暗蛮村盖嶺南竹名艾蓬沓障前赱風􅀨注云於潜媍人皆挿大銀􅌨謂之蓬沓又㡬思壓茅柴禁烟日夜急山谷燕􅊜社公雨鶯啼花信風皆方言也黄常明江漢有滸以扞制泛濫大漲則溢扵平陸水退滸見舟人謂之水落糟又灘石湍激其中深僅可容舟者謂之洪􅀂大水則不復問洪矣臨川萬里寒江正復糟東江水落水分洪以此亦謂水黄㡌謂雲砲車非遐征逺渉不能知也同上柳讀書篇瘴疴擾灵府曰與徃昔殊臨文乍了了徹卷元若無盖常荅許京兆書云徃時讀書不至底滯今毎讀一傳􅂯三伸卷復􅀚姓氏在宗元則為瘴疴所擾它人乃公患也同上東坡云東来賈客木綿裘飲散金山月滿楼夜半潮来風又􅀬卧吹簘管到楊州集中題云夣中作盖坡嘗衣此坐客誤云木綿襖俗飲散乃出此詩且云雖欲不可得也坐客大慙賈客事乃南史孔覬二弟頗营産業請假東還覬出渚迎之輜重二十餘舩皆綿絹􅁓席之属覬僞喜命且置岸側旣而正色謂曰汝軰沗預士流何至還東作賈客邪命燒盡乃去䂬溪家家飬烏􅄦沈存中以為鸕鷀􅀃者謂非也元微之詩云病飬烏􅁛􅄦巫占瓦代􅀛自注云南人染病競賽烏􅄦楚巫列肆兢賣瓦卜此乃戯效俳体二首其二亦云瓦卜傳神語皆是處方言則烏􅄦非鸕鷀不疑矣書史蓄􅅐中而氣味入於冠􅅂山川歴目前而英靈􅂇於文字太史公南逰北渉信非徒然􅀚老杜壯㳺云東下姑蘇䑓已具浮海航到今有遺恨不得窮扶桑劍池石壁仄長洲芰荷香嵯峨閶門北清廟映池塘越女天下白鑑湖五月􅋽剡溪藴秀異欲罷不能忘歸㠶拂天姥中􅀊貴舊郷放蕩齊趙間西歸到咸陽其豪氣逸韵可以想見序太白集者称其􅀮岷山居㐮溪南逰江淮􅀚雲夣去之齊魯之呉之梁北抵趙魏燕晋西徙邠岐􅀙金陵上㝷陽流夜􅀰泛洞庭上巫峽白自序亦曰偶乗扁舟一日千里或遇勝景終年不移其恣横採覽非其狂也使二公􅀮坐中書何以垂不朽如此㢤燕公得􅂇扵江山鄭綮謂相府非㶚橋那得詩思非虚語也學林新編云世傳織女嫁牽牛渡河相㑹某按史記晋天文志河鼓星在織女牽牛二星之間世俗因傳㑹為度河之􅀃媟瀆上象無所根㩀淮南子云烏鵲填河成橋而渡織女荆楚􅀊時記云七夕河漢間弈弈有光景以此為候是牛女相遇也其􅀃皆怪誕不足信子羙牽牛織女詩曰牽牛出河西織女處其東萬古永相望七夕誰見同神光意難候此亊終朦朦􅀚子羙詩意不取世俗􅀃也七夕乞巧見扵周處風土記乃後人編􅁼成書大抵􅀄無稽考不足信者多矣侯鯖録云東坡作雪詩云凍合玉楼寒起栗光摇銀海眩生花後見荆公云道家以兩肩為玉楼目為銀海是使此事否坡退曰惟荆公知此出處苕溪漁􅀮曰緗素雜記學林新編二家辨證乗槎亊大同小異余今采摭其有理者共爲一􅀃按張茂先博物志曰舊􅀃天河與海通近世有人居海上者每年八月見浮槎来不失期齎一年粮乗之而去十餘日中猶􅀚星月日辰自後茫茫亦不􅁴晝夜􅍕至一處有城郭屋舎甚􅃊遥望宫中有婦人織見丈夫牽牛渚次飲之驚問曰何由至此其人銳以来意并問此是何処荅曰君至蜀郡訪􅃊君平則知之因還後以問君平君平曰某年月日有客星犯牽牛􅀫計年月正是此人到天河時也所載止此而巳而荆楚􅀊時記直曰張華慱物志云漢武帝令張騫窮河源乗桴經月而去一處見城郭如官府室内有一女織又見一丈夫牽牛飲河騫門云此是何處荅曰可問􅃊君平織女取機榰石與騫而還後至蜀問君平君平曰某年月日客星犯牛斗所得榰機石為東方朔所識亦其証焉按騫本傳及大宛傳騫以􅀰應募使月氏為匈奴所􅇔十餘􅀊得還騫身所至者大宛大月氏火夏康居而傳聞其旁大國五六具為天子言其地形所有並無乗槎至天河之􅀃而宗懔乃傳㑹以為武帝張騫之亊又益以榰機石之􅀃何邪子羙蘷府詠懐詩曰途中非阮藉槎上似張騫又秋興詩曰奉使虚隨八月槎如此􅁼前賢多用之恐非實亊杜子羙詩喜用文選語故宗武亦習之不置所謂熟精文選理休覔綵衣輕又云呼婢取酒壼續児誦文選是也唐朝有文選學而時君尤見欽重分别夲以賜金城書絹素以属裴行儉是也外史檮杌載鄣奕嘗以文選教其于其兄曰何不教讀論語免學沈謝嘲風弄月汚人行止鄭兄之言盖欲先徳行而後文藝亦不爲無理也丹陽集雪浪齋日記云昔人有言文選爛秀才半正爲文選中亊多可作本領爾余謂欲知文章之要當􅀬㸔文選盖選中自三代涉戰囯秦漢晋魏六朝以来文字皆有在古則渾厚在近則華䴡也苕溪漁􅀮曰少陵宗武生日詩孰精文選理盖為是也詩話乃云質之少陵昔逰詩昔者與李同登單父䑓則知非吹䑓三人能詞宗果登吹䑓豈無雄詞傑唱著后世邪予􅀼哂其弗細考前詩而妄為云云故具載之以􅂋其誤也苕溪漁􅀮曰學者欲慱讀異書余謂退之之進學觧云上規姚娰渾渾無涯周誥湯盤詰屈聱牙春秋謹􅃊左氏浮誇易竒而法詩正而葩下逮莊騷太史所録子雲相如同工異曲􅀂只讀此􅁕矣何必多嗜異書百家詩話緫亀後集卷之八終
