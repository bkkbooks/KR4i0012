body:
  text: 評論門三南嶽李岩老好睡衆人食罷下碁岩老輙就枕閲數局乃一展轉云我始一局公㡬局矣東坡曰岩老常用四脚棋盤只着一色黒子昔與邉韶敵手今被陳摶饒先着時自有輸贏着了全無一物歐陽公詩云夜凉吹笛千山月路暗迷人百種花碁罷不知人換世酒䦨無奈客思家殆類是也百斛眀珠竹逕通幽處禪房花朩深常建詩也文忠公最愛賞以為不可及此語誠可人意然於公何足道豈非厭飫芻豢反思螺蛤耶予在都下有傳太白詩者其畧曰朝披雲夢澤又曰笠釣青茫茫此非世人語也盖有見太白在酒肆而得此詩者神仙之道真不可度紹聖元年九月過廣州訪崇道太師何徳順有神仙䧏其室因言女仙也賦詩立成有超逸絶塵語或以其托于箕箒如世之紫姑神者疑之然味其言非紫姑所能全有入鬼獄羣鳥獸者而托于箕箒豈足恠哉崇道好事喜客多與士大夫㳺其必有以致哉七言之偉麗者杜子美云旌旗日暖龍蛇動宫殿風微燕雀髙五更皷角聲悲壮三峽星河影動揺爾後寂寥無聞直至永叔云蒼波萬古流不盡白鷺雙飛意自閑萬馬不嘶聽號令諸蕃無事樂耕耘可以並驅争先矣小生云令嚴鍾皷三更月野宿貔貅萬竈烟又云露布朝驅玉闗塞㨗書夜到甘泉宫亦庶㡬焉樂天為王涯所誣謫江州司馬甘露之禍樂天在洛適逰香山寺有詩云當君白首同歸日是我青山獨往時不知者以樂天為幸之樂天豈幸人之過者盖悲之也俗傳書生入官庫見錢不識或恠而問之生曰固知其為錢但恠其不在紙褁中耳予讀淵眀歸去來辭云㓜稚盈室瓶無儲粟乃知俗傳可信使瓶有儲粟亦甚微矣此翁平生只于瓶中見粟也馬后夫人見大練乃為異物晋恵帝問飢民何不食肉麋細思之皆一理也聊為好事一笑永叔嘗言孟郊詩􅁂邉雖有絲不堪織寒衣縱使堪織能成㡬何淵眀詩采菊東籬下悠然見南山采菊之次偶見南山初不用意而景與意㑹故可喜也今皆作望南山子美云白鷗沒浩蕩萬里誰能馴盖滅沒于波間耳而朱敏求謂予曰鷗不解沒改作波字改此覺一篇神氣索然唐宋五代文章衰盡詩有貫休有亞栖村俗之氣大率相似如蘇子美家收蔵張長史書云隔簾歌已俊對面貎彌精既凡惡而字畫真亞棲之流近見曽子固編李太白詩自後頗或遺亡或有贈懐素草書歌及笑矣乎數百篇皆貫休以下詞格二人者皆號有識故知者深可恠如白樂天贈徐凝韓退之贈賈島之類皆世俗無知者所托此不足恠杜子美詩云自平宫中吕太一世莫曉其義而妄者至以為唐時有自平宫偶讀眀皇實録有中官吕太一叛廣南此詩故云而下文有南海收珠之語見書不廣而妄改文字鮮不為笑也秋菊有佳色浥露掇其英泛此忘憂物逺我遺世情一觴難獨進盃盡壺自傾日入群動息歸鳥趍林鳴嘯傲東軒下聊復得此生靖節以無事自適為得此生則見役于物非失此生耶貴公子雪中飲醉臨檻向風曰爽哉此風左右皆泣下貴公子驚問之曰吾父昔日以爽亡楚襄登臺有風颯然而至王曰快哉此風寡人與衆共者耶宋玉識之曰此獨大王之風庶人安得而共之不知者以為謟也知之者以為風也唐文宗詩曰人皆苦炎熱我愛夏日長栁公權續之曰薫風自南來殿閣生微凉惜乎宋玉不在旁也湘中老人讀黄老手挼紫虆坐碧草春至不知湖水深日暮忘却巴陵道唐末有人見作是詩其辭氣殆是李謫仙予都下見有人携一紙文書字則顔魯公也墨跡如未乾紙亦新健其首兩句云朝披雲夢澤笠澤青茫茫此語非太白不能道南都王誼伯書江濵馹垣謂子美詩厯五季兵火多舛缺竒異雖經其祖父公所理尚有疑闕者誼伯謂西川有杜鵑東川無杜鵑涪南無杜鵑雲安有杜䳌盖是題下注斷自我昔逰錦城為首句誼伯悞矣盖子美詩備諸家體非必率合程度偘偘者然也且篇句䖏凡五杜䳌豈可以文害辭辭害意即原子美之意類有所感托物以發者也亦六義之比興離騷之法歟按博物志杜鵑生子寄之他巢百鳥飼之今江東所謂杜宇曾為蜀帝王化禽飛去舊城荒是也且禽鳥之微知有尊故子美詩云重是古帝魂又禮若奉至尊子美盖譏當時之刺史有不禽鳥若也自唐眀皇已後天歩多棘刺史能造次不忘於君者可得而考嚴武在蜀雖横歛刻薄而實資中原是西川有杜䳌耳其不受王命負固以自抗擅軍旅絶貢賦如杜克遜在梓州為朝廷西顧憂是東川無杜䳌耳至於涪南雲安刺史微不可考凡其尊君者為有也懐貳者為無也不在夫杜䳌真有無也誼伯以為來東川聞杜䳌聲煩而息乃始疑子美詩跋㚄紙上語又云子美不應叠用韻子美自我作古叠用韻無害于為詩僕見如此誼伯博學强辨殆必有以折𠂻之悲陳陶云四十萬人同日死此房琯之敗也唐書作陳陶斜不知孰是時琯既敗猶欲持重有所伺而中人邢延恩促戰遂大敗故此次篇悲長坂云焉得附書與我軍忍待眀年莫倉卒後出塞云我本良家子出師亦多門将驕亦愁思身貴不足論躍馬三十年恐辜眀主恩惡名幸脫免窮老無兒孫味此詩盖禄山反時其将帥有脱身歸國而禄山盡殺其妻子者不知其姓名可恨也憶昔詩云闗中小兒壊綱紀謂李輔國也張后不樂上為忙謂肅宗張皇后也為留猛士守未央謂郭子儀奪兵柄入宿衛也子美自許稷與契人未必許也然其詩云舜舉十六相身尊道更髙秦時用商鞅法令如牛毛自是稷契軰人口中語也又云知名未足稱局促商山芝又曰王侯與螻蟻同盡隨丘墟願聞第一義回向心地初乃知子美詩外尚有事在玉川子作月蝕詩云嵗星坐福徳官爵奉董秦忍使黔婁生覆屍無衣巾詳味此詩則董秦當是無功而享厚禄董秦李忠臣也天寳末驕将屢立戰功雖粗官亦頗知忠義代宗時吐蕃犯闕徴兵忠臣即日赴難或勸擇日忠臣怒曰君父在難乃擇日也後卒汚朱泚偽命誅考其始終非無功而享厚禄者不知玉川子何以有此句詩人有冩物之功桑之未落其葉沃若他木殆不可以當此林逋梅花詩云踈影横斜水清淺暗香浮動月黄昏决非桃李詩皮日休白蓮詩云無情有恨何人見月冷風清欲墮時决非紅蓮詩此乃冩物之工若石曼卿紅梅詩云認桃無緑葉辨杏有青枝此村學中至陋語也王夀集外臺秘要有代茶飲子一首云格韻髙絶惟山居野人乃當作之予嘗依法治服其利鬲調中信如所云而其氣味乃一服煮散耳與茶了無干渉薛能詩云粗官乞與真抛擲頼有詩情合得嘗又作鳥觜詩云塩損添宜戒薑宜煮更誇乃知唐人之于茶盖有河朔氣也並同前老杜公張生一生江海客身長九尺鬚眉蒼謂張鎬也蕭嵩薦之云用之為帝王師不用則窮谷一叟耳同前長沙天策府諸學士所著文章擅名者惟徐東野李洪皋耳然其詩皆浮脆輕艷鈆華歌舞一時尊爼間語獨東野贈江處士一篇可採曰門在松隂裡山僧幾度過葯靈丸不大碁妙子無多薄霧籠寒徑殘風戀緑蘿金烏兼玉兎年幾柰公何玉壺清話将進酒魏謂之平闗中吳謂之章洪徳晋謂之因時運梁謂之石首扄齊謂之破侯景周謂之取巴蜀李白所擬直勸岑夫子丹邱生飲耳李賀深於樂府至於此作其辭亦曰琉璃鍾琥珀濃小糟酒滴珍珠紅嗟乎作詩者擺落鄙近以得意外趣者古今難矣樂府集君馬黄古詞云君馬黄臣馬蒼三馬同逐臣馬良終言美人歸以南歸以北駕車馳馬令我傷李白擬之遂有君馬黄我馬白馬色雖不同人心本無隔其末云相知在急難獨好亦何益白能馳騁不與古人同圈摸非逺非近此可謂善學詩者歟日出東南隅行古詞曰日出東南隅照我秦氏樓舊說邯鄲女子姓秦名羅敷為邑人千乗王仁妻仁為趙王家令羅敷出採桑陌上趙王登樓見而恱之置酒欲奪焉羅敷彈箏作陌上桑以自眀不從今其詞乃羅敷采桑陌上為使君所邀羅敷底誇其夫為侍郎以拒之論者病其不同大抵詩人感詠隨所命意不必盡當其事所謂不以辭害意也且發乎情止乎禮義古詩之風也今次是詩盖将體原其跡而以辨麗是逞約之以義殆有所未合而盧思道傅縡張正見復不䆒眀更為祖述使若其夫不有東方騎不為侍中郎不作専城居乃得從使君之載歟如劉􅊬王筠之作蚕不飢日未暮亦安得徬徨為使君留哉蕭撝殷謀曾不足道而沈君攸所謂㸔金怯舉意求心自可知者庶幾焉故秋胡婦曰婦人當采桑力作以養舅姑亦不顧人之金此真烈之辭耳余嘗擬古作一篇以著羅敷所以待使君之當然者直欲規諸子以就雅正豈固與古人争驅哉其詞曰羅敷十五六采桑城南道臉媚奪朝霞蛾眉淡初掃桑枝間桃樹不見桃花好采桑未盈筐春寒蚕欲老使君從南來黄金絡馬腦調笑一不顧東風揺百草𤣥雲周禮保章氏以五雲之物辨吉凶水旱豐荒之祲雲黒為水魏劉掞詩曰𤣥雲起髙嶽中朝彌八方春秋孔演圖曰黄帝之将興黄雲升於堂文命之候𤣥龍衝雲漢曲名此謂是乎隴頭吟隴州有大隴小隴二山即天水大坂也古詞云隴頭流水鳴幽咽遥望秦川腸欲絶作是詩者著征役之思耳闗山月木蘭詩萬里赴戎機闗山度若飛朔氣傳金柝寒光照鐵衣濟黄河援神契黄河者水之伯上應天河酈元水經云河源出崑崙之墟山海經崐崘縱横萬里髙萬有一千里有青白赤黒河環其墟其泉出東北陬屈向東南流為中國河百里一小曲千里一大曲發源乃入中國常然爾雅河出崑崘墟色白由此言之今之黄河所謂白河也而物理論乃云河色黄赤渡易水曲荆軻去燕入秦渡易水為之歌曰風蕭蕭兮易水寒壮士一去兮不復還其後如吳均所作雖叙征虜事盖亦取軻感激之意董桃行言神事傅休奕九秋篇十二章乃叙夫婦别離之思梁簡文賦行幸甘泉宫歌復云董桃律金紫賢妻侍禁中疑若引董賢及子瑕殘桃事終云不羡神仙侣排烟逐駕鴻皆所未詳按漢武内傳王母觴帝命侍女索桃剰桃七枚大如鴨子形色正青以四枚㗖帝因自食其三帝收餘核王母問何為帝曰欲種之王母曰此桃三千嵗一生實柰何帝乃止扵是數過命侍女董雙成吹雲和笙觴作者取諸此耶桃葉歌桃葉王獻之愛妾名也其妹曰桃根詞云桃葉復桃葉桃葉連桃根今秦淮口有桃葉渡即其事也古人載桃葉答獻之乃團扇辭盖傳者悞也團扇歌晋中書令王珉好持白扇其侍人謝芳歌之因以為名一說珉與嫂婢有情好甚篤嫂鞭撻過苦婢素善歌而珉好持白團扇故云團扇復團扇許持自遮面憔悴無復理羞與郎相見大垂手舞貎也楚辭曰二八齊容起鄭舞衽若交竿舞按下梁劉孝標舞詩曰轉袖隨歌發頓履赴絃徐度行過接手回身乍歛裾胡姬年十五李白樂府有白鼻騧其詞曰銀鞍白鼻騧緑地障泥錦細雨春風花落時揮鞭且就胡姬飲豫章行豫章邑名漢南昌縣隋為豫章有豫章江江連九江有釣磯陶侃少時嘗宿此夜聞人唱聲如量米者訪之吳時有度支于此亡今考傅𤣥陸士衡軰所作多叙别離怨恨思即知豫章昔為華艷盛麗之區耳至唐杜牧詩尚過稱其侈靡焉走馬引樗里牧恭所作也為父報怨殺人亡匿山下有天馬夜降團其室而鳴覺聞其聲以為吏追乃奔去旦觀乃天馬跡因惕然大悟曰吾之所處将邑乎遂荷杖去入沂澤中援琴而鼓之為天馬聲曰走馬引而張敞為京兆尹無威儀時罷朝㑹過走馬章臺街風俗曰殺君馬者路旁兒也言長吏馬肥觀者快之喜其言驅馳不知至于死故張率作此引曰歛轡且歸去吾畏路旁兒烏夜啼宋臨川王義慶所造時為江州刺史聞命而哭文帝恠之召還家大懼妓妾夜聞烏啼叩齋閣云眀日應有赦及改為南州因作此歌詞云籠忩忩不開夜夜憶郎来今所傳非義慶本旨詞曰歌舞諸少年娉婷無種則菖蒲花可憐聞名不相識雀乳空城中晋傳𤣥詩曰􅍎巢立城側雀乳空井中居不附龍鳯嘗思蛇與蟲今集所載作空城中者非也故劉孝威辭云轆轤絲綆絶桔槔金蘚稠並同前陶靖節詩云平疇交逺風良苗亦懐新古之耦耕植杖者不能此語非余老農亦不識此語之妙王直方詩話陳無已有除官一篇云扶老趍嚴詔徐行及聖時端能幾字正敢恨十年違肯著金根謬寜辭乳媪譏向來憂畏斷不盡鹿門期臨川饒推守云此詩不作可也才得一正字亦未湏云趍嚴詔無已後作謝唘復曰名雖文字之選實為将相之儲又云頭童齒豁敢辭乳媪之譏聞淺見輕益畏金根之謬沈存中云如厨人具雞黍稚子摘楊梅盖以雞對楊皆為假借田承君曰雞黍兩字那得似楊梅耶晁美叔秘監嘗因謁先君曰昔人有一聨云平生不到處落日獨行時唯公家使詩着此盖崔塗詩也余後見李陽冰所題阮客舊居云阮客身何在仙雲洞口横人間不到處今日此中行亦相類潘邠老作洪氏勵殼軒云封胡羯末謝龜駒玉鴻洪千載望四謝四洪天壤同為龜父駒父玉父鴻父也時人以為急口令歐陽知貢舉日有詩云無譁戰士衘枚勇下筆春蠶食葉聲絶為竒妙故聖俞作詩云食葉蚕聲句偏美當時曽見賦初成一云将成田承君云池塘生春草盖是病起忽然見此為可喜而能道之所以為貴李希聲云見文潛外甥言文潛每作詩其有用得妙處必自記録如法雲㑹中懐無咎云獨覺欠此翁自以欠字頗佳並同前有周知微者字眀老為晋州縣尉到官不數月不告于州而徑來京師人問其故云我欲求教授至京求知已不得大醉一夕而卒然為詩有可喜者如觀臨淮雙頭白蓮圖云既不學叔隗季隗南歸晋又不學大喬小喬東入吳一種桃根與桃葉若為化作雙芙蕖臨淮政成有餘暇坐令華屋生瀟洒鵞溪一幅萬里寛移得斷江入圖畫天空水濶江茫茫想見女英與娥皇九嶷雲深蒼梧逺冰姿泣露不成粧苦心抱恨何年了香骨應甘沒秋草不如回首謝秋風分作尹邢來漢宫又作上已日寒食云疾風暮雨悲逰子峻嶺崇山非故鄉亦可賞而其狂未見其比古今詩話晁以道云王禹玉詩世號至寳丹以其多使珍寳如黄金必以白玉為對有人云詩能窮人且試强作此富貴語㸔如何其人數日搜索云止得一聨云脛脡化為紅玳瑁眼睛變作碧琉璃余為之絶倒舒王有詩云籜龍将雨遶山行而周次元有逰天竺觀詩亦云竹龍驅水轉山鳴余以為當與秦少㳺同科歐陽文忠公云唐人有姑蘇臺下寒山寺半夜鍾聲到客船之句說者云句則佳也其如三更不是撞鍾時于鵠送宫人入道詩云定知别後宫中伴遥聽緱山半夜鍾而白樂天亦云新秋松影下半夜鍾聲後温庭筠亦云悠然旅榜閒回首無復松忩半夜鍾豈唐人多用此語耶倘非逓相沿襲恐必有說並同前詩話總龜巻七欽定四庫全書詩話總龜巻八宋阮閱撰
