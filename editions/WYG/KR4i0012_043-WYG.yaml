seq: 43
front:
  text: 四十三宋阮閲撰
  hash: sha256:0b3f49657d3513168d3ebe003057009b1db981a1a02b57fb7b934b69b5addd16
body:
  text: 傷悼門雷有終自平蜀後人為立祠又甞以私財犒士貧不能足貸錢以給比捐舘舎時尚欠三萬緡章聖特出内帑錢償之故魏仲先悼有終詩曰聖代賢臣䘮何人不惨顔新祠民祭祀舊債帝填還鹵簿塵侵暗銘旌淚洒班功名誰可繼勅𦵏向家山青箱雜記杜子羙自蜀走湘楚卒扵耒陽時人謂以牛肉白酒脹飲而死則非也僧紹員詩曰賢人失志古來有牛肉因傷是也無耒陽宰詩曰詩名天寶大骨𦵏耒陽空耒陽有子羙墳時人謂聶令空堆土也唐人詩曰一夜来江南百年工部墳楊遺北朝多有文籍亦以文雅相尚王矩為工部郎中本燕人為北将耶律㤀其名管書記常從其出入耶律兄及其兄之子太平興國中戰沒於大郡後耶律經舊戰處覽其遺迹作詩矩記其两句云父子盡從虵陣沒弟兄空望鴈門悲談苑徐寅興化軍莆田人以祕書省正字歸老郷里既死節度使王延賔以詩哭之曰延夀溪頭歎逝波古今人事半銷磨昔除正字今何在所謂人生能幾何延夀溪寅所居也詩史李逺體物緣情皆謂臻妙甞有贈筝妓伍卿詩云輕輕沒後更無筝玉腕紅紗到伍卿坐客滿筵都不語一行哀鴈十三聲咏鴛鴦云鴛鴦離别傷人意似鴛鴦試取鴛鴦看多應寸寸腸故人盧尚書哭李詩云昨日舟還浙水湄今朝丹旐欲何為纔收北浦一竿釣未了西齋半局棊洛下已傳平子賦臨川争冩謝公詩不堪舊里經行處風朩蕭蕭鄰笛悲郡閣雅談江鄰幾善為詩清淡有古風蘇子羙坐進奏院事謫官後死吴中江作詩云郡邸獄寃誰與辨臯橋客死世同悲用事甚精甞有古詩云五十踐衰境如我在明年論者謂人莫不用事能令事如已出天然渾厚乃可言詩江天資淳雅喜飲酒鼔琴圍棋人以酒召之未甞不醉已醉眠人强起飲之亦不辭也或不能歸即宿人家商度風韵陶靖節之比云江甞通判盧州有酒官善琴以坐務不得出江旦旦就之郡中沙門道士及里畎能棋者數人呼與同往郡人見之習熟因畫為圗前列趨道一人騎馬青盖其後沙門道士褐衣數人葛巾芒履累累相尋意思蕭散惜時無名手此畫不足傳後何减稽阮也唐賢杼情竇鞏工為絶句甞從軍有别家詩云自笑儒生着戰袍書齋璧上掛弓刀如今便是征人婦好織廻丈寄竇韜又悼妓東東一篇云芳菲美艷不禁風未到春殘已墜紅惟有側輪車上鐸耳邉長似呌東東盧懐杼情令孤楚宫人斜詩云唯應四仲祭使者暫悲嗟又白時詩序云自刑部員外郎出得累厯方鎮携挈隨逐又有茈菰花芹花詩亦唐賢所罕詠者雜志李郢甞與賈島僧無可逰島沒長江僧亦返初郢感歎題曰却到京師事事傷惠林歸寂賈生亡何人收得文章篋獨我来經苔蘚房一命未沾為逐客萬縁初盡别空王蕭梢竹塢斜陽在葉覆閑堦雪擁墻雜談孟郊卒韓吏部作誌諡曰正耀先生賈島哭之詩曰身沒聲名在多應萬古傳寡妻無子息破宅帶林泉塚近登山道詩隨過海舡故人相弔處斜日下寒天摭言荒梁城南奉先寺後宫羙人官葬此角樓相望髙起墳草間柏下多石人秩卑焚骨不作塜青石浮屠唱邱壠家家墳上作享亭朱門相向無人聲樹頭土梟作人語月黒風悲鬼揺樹宫中養女作子孫年年犢車來作主廢后陵園官道側家破無人掃陵域官家嵗給半千錢街頭買餅作寒食此張文潜題奉先寺詩􅄯以道甞與江子之言文潜近來詩不堪好子之因誦此詩以對以道云莫不是文潜詩否洪駒父有過李公擇尚書墓一篇其間云鹿場兎逕白晝静稻壟松闗青嶂深說者以為大逼老杜邢居實字惇夫年少豪邁所與逰皆一時名士方年十四五時甞作明妃引末句云安得壮士霍嫖姚縳取呼韓作編户諸公多稱之既卒余收拾其殘章編成一集號曰呻吟集惇夫自少便多憔悴感慨之意其作秋懷云髙歌感人心心悲将奈何其作棗陽道中詩云有意問山仙此生更来否已而果卒於漢東惇夫之卒也山谷以詩哭之云詩到年来更老成江山為助筆縱横眼看白骨埋黄土何况人間父子情盖惇夫與其父歆向也蔡天啓亦有詩云人物於今歎𣺌然孤墳宿草已生煙日暮行人道傍㑹應逢年少共談𤣥其餘作者甚衆皆載於呻吟集後邵堯夫之弟名睦者無疾而化前此有重九詩云擬問東籬事東籬事𣺌茫后果殯於東籬之下故堯夫哭之云自兹明月清風夜蕭索東籬看斷膓又云腸斷東籬何所尋東籬從此事沉沉余於一雜編中見有書郵亭事既不曉其誰作但觀其詩有足哀者故載之於此其末云周仲羙不知何許人自言世居京師父㳺宦家于成都既而適李氏子侍舅姑宦泗上從良人赴金陵幕偶因事棄官入華山有長住之意仲羙即寄身合淝外祖家方求歸未得㑹舅􅃍調任長沙不免供載而南雲水茫茫去國益逺形影相弔洒涕何言因書所懐于壁詩曰愛妾不愛子為問此何理棄官更棄妻人情寧可已永訣泗之濵遺言空在耳三載無朝昬孤幃淚如洗婦人義從夫一節誓生死江郷感殘春腸㫁晚煙起回望太華峰不知幾千里並王直方詩話梅聖俞至寧陵寄余詩云獨護慈母喪泪與河水流河水冬有竭淚泉常在眸彦獻持國譏其作詩太早余應之以蓼莪及傳威贈王何二侍郎詩雜誌劉洞不知何許人江南國破後題池州一亭云千里長江唯渡馬十年養士得何人詩史白樂天去世人以詩弔之曰綴玉聮珠六十年誰教𡨕路作詩仙浮名不繫名居易造化無為字樂天童子觧吟長恨曲胡兒能唱琵琶篇文章已滿行人耳一度思鄉一愴然韓文公少年受蕭存吏部知賞及自袁州回入國子祭酒道經江州因逰廬山過吏部山居知諸子凋零惟二女在焉作詩曰中郎有女能傳業伯道無兒可保家今日廬山過舊隠空将衰淚落煙霞張祜性酷好太湖石三吴太守多以贈遺之故陸魯望以詩哭之曰一林石筍散豪家顧况字退翁暮年有一子字非熊忽暴亡况哀悼不勝乃作詩曰老人喪愛子日暮淚成血老人年七十不作多時别非熊冥間聞之以情告冥官冥官憫之却令生於况家三嵗能言冥間聞父苦吟求再生事厯厯然長成應舉擢第盧延遜哭李郢端公詩曰軍門半掩槐花宅毎過猶聞哭臨聲北固暴亡兼在路東都權𦵏未歸塋漸窮老僕傭看馬着惨佳人暗裹筝詩侣酒徒消散盡一塲春夢越王城劉夢得虎邱山見元㣲之二年過題名愴然有感云滻水送君君不還見君題字虎邱山因知早貴兼才子不得多時在世間又有所嗟二首云庾令樓中初見時武昌春色似腰支相逢相識空如夢為雨為雲今不知鄂渚濛濛煙雨㣲女郎魂逐暮雲歸只應長在漢陽渡化作鴛鴦一隻飛石守道為國子監直講天下呼為徂徕先生作慶厯聖徳頌大為時所忌㑹徐賊孔直温叛搜其家有介書坐貶而卒時疑其詐死欲剖棺騐之近臣言介實死得免永叔一詩哭之曰埋猶不信死終免斵其棺揚章安云章安或為章亦誰道盖棺人事足是非猶及土中身劉夢得傷友人亡姫詩曰見學琵琶見藝成今來追想倍傷情撚弦花下呈新曲放撥燈前謝改名大抵好花終易落從來尤物不長生蘭䑓夜直衣衾冷雲雨無因入禁城劉得仁出入塲屋三十年卒無所成而逝僧西白以詩弔之曰忽苦為詩來到此氷魂雪魄已難招直教桂子落墳上生得一枝寃始消張禕侍郎有愛姬早亡念之不已猶子為右補闕因其入朝未歸為浣溪沙辭置於几上曰枕帳熏爐隔繡幃二年終日兩相思好風明月爾應知天上人間何處去舊歡新夢覺來時黄昏微雨畫屏垂禕見曰此必阿灰詞阿灰補闕小字也錢熈泉南才士也曽作四夷來王賦獻太宗愛其才又甞撰三酌酸文世稱精絶後亦不逹而故郷人李慶孫以詩弔之曰四夷妙賦無人繼三酌酸文舉世傳詩話唐武宗有才人孟氏甞對武宗泣下作何滿子而卒張祜作詩云偶因清唱詠歌頻奏入深宫十二春却為一聲何滿子下泉湏弔孟才人􅇵談録春國公主薨神考賜挽詞曰海濶三山路香輪定不歸帳深閑翡翠珮冷失珠璣明月留歌扇殘霞散舞衣都門送車反宿草自春菲曉發城西道靈車望更遥春風寒魯舘明月斷秦簫塵入羅衣暗香隨玉篆消芳魂無北渚那復可為招又曰慶自天源發恩從國愛深歌鐘雖在舘桃李不成春水折空還沁樓髙亦隔秦區區㑹稽市無復獻珠人冷齋夜話詩話總龜巻四十三欽定四庫全書詩話總龜巻
