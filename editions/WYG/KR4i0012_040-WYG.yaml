body:
  text: 樂府門皷吹部中有拱辰管即古人之义手管也大宗賜今名邉軍捷廻則連隊抗聲凱旋乃古之遺音其詞往往皆市井鄙俚語沈存中在鄜延時製十數曲今士卒歌之云先取西山十二州别分子将到衙頭始看秦塞低如馬漸見黄河直北流天威巻地過黄河萬里𦍑人盡撲歌莫堰横山倒流水從教西去作恩波馬尾胡琴隨漢車曲聲猶是怨單于彤弓莫射雲中鴈歸鴈如今不寄書旗隊渾如錦綉堆銀裝背傀打毬囬先教净掃安西路待向河源飲馬來靈武西凉不用圍畨家総待納王師城中半是山西種猶有當時乾吃兒古今詩話乾祐中國樂有米嘉榮何戡近有陳不謙不謙之子意奴三十年中絶不聞善唱盛以拍弹行於世拍弹起於李可及懿宗朝有恩澤曲子别趙十哭趙十之名劉夢得與米嘉榮詩云三朝供奉米嘉榮能變新聲作舊聲如今後軰欺前軰好染髭鬚學後生又自貶所歸京聞何戡歌云二十年來别帝京重聞天樂不勝情舊人唯有何戡在更與勤勤唱渭城盧氏雜記搢紳脞說載盧氏雜記曰歌曲之妙其來久矣國樂有米嘉榮何戡田順郎媍人有永新婦御史娘栁青娘張紅娘皆一時之妙也近有陳不謙子意奴三十年來絶不聞善歌者盛扵拍弹行於世拍弹起於劉可及懿宗恩澤最厚有别趙十哭趙十之名又與田順郎詩曰清歌不是世間音玉殿常聞稱帝心惟有順郎皆學得玉聲尤出九重深與御史娘詩曰天下能歌御史娘花前月底奉君王九重深處無人見獨把新聲傳順郎白公聽田順歌曰戞玉敲氷聲未停嫌雲不過入青冥安得黄金滿衫袖一時抛與㫁膓聲咸通中丞相姑臧公拜端揆日自梁移鎮淮海郡寡勝逰之地且風亭月觀既以荒凉於戯馬䑓連玉鈎道開剏池沼建亭臺既畢號曰賞心浙右小校薛湯陶監押度支運米入城公喜其姓名試詢之果是舊人及問往日蘆管之事因朱崖陸暢元白所撰歌篇一軸公益喜之以蘆管於兹亭奏之其管絶微毎一篳篥管中常容三管聲聲如天際自然來大佳之亦贈一篇略云虚心纎質鴈啣餘鳳吹龍吟定不如贈與甚豐授其子牢湓倅明皇樂工奔迫江潭間於湘中採訪使筵上唱云紅豆生南國秋來發幾枝贈公多採擷此物􅆟相思又云清風明月苦相思蕩子從容十載餘征人去日殷勤嘱歸鴈來時􅂾寄書皆摩詰所作也至今梨園歌焉坐中皆惨然時明皇思幸蜀也雲溪友議霓裳羽衣曲劉禹錫詩云三郷陌上望仙山歸作霓裳羽衣曲王建詩曰聽風聽水作霓裳樂天詩注云開元中西凉府節度使楊欽逺造鄭遇津陽門詩注云葉法善常引明皇入月宫聞仙樂及歸但記其半遂以笛寫之㑹欽逺進波羅門曲與聲調相符遂以月中所傳為散序欽逺所進為腔號霓裳羽衣曲矣江南大理卿成文幼精為詞曲甞作謁金門云風乍起吹皺一池春水李璟聞之召而謂之曰卿職在典型一池春水干卿何事文㓜頓首江南馮延已善為歌詞晏元獻善公所為歌詞不减馮也樂府朩蘭花句都是七言晏詩云重頭歌咏响􅋛琤入破舞腰紅亂旋重頭入破皆絃管家語也張子野郎中善歌詞常作天仙子云雲破月來花弄影士大夫皆稱之子野初謁歐公迎之坐語曰好雲破月來花弄影恨相見之晚也有謂張子野曰人皆謂公為張三中即心中事眼中淚意中人也何不目之為張三影客不喻公曰雲破月來花弄影嬌柔懶起簾押捲花影栁徑無人墜風絮無影此平生得意句也林和靖工於詩文善為詞甞作㸃絳唇云金谷年年亂生春色誰為主餘花落處滿地和烟雨又是離歌一闋長亭暮王孫去萋萋無數南北東西路乃草詞爾謂終篇無草字鼎州滄水馹有菩薩蠻云平林漠漠烟如織寒山一帶傷心碧暝色入髙楼有人楼上愁玉梯空佇立宿鳥歸飛急何處是歸程長亭更短亭曽子宣家有古風集此詞乃太白作也古今詩話古人飲酒皆以舞相属至於獻夀樽者往往亦舞長沙王少舉袖云國小不足廻旋唐太宗自起舞属羣臣古人淳質舞以逹歡忻不必臻妙合度故人人可為之張燕公曰醉後歡更好全勝未醉時動容皆是舞出語総成詩李白詩曰要湏廻舞袖拂盡五松山醉後凉風起吹入玉袖寒今時舞者皆曲肖益盡其妙然非有詩士人不為也貢父詩話水調第五遍五言調聲最愁苦故樂天詩曰五言一遍最辛勤調少情多似有因不㑹當時翻曲意此時腸㫁為何人舊說水調河傳隋煬帝将幸江都官時所製曲成奏之聲韻悲切煬帝喜之樂工王令言聞而正之謂其弟子曰不返矣後竟如其說或詰其何知曰水調河傳但有去聲縉紳脞說何滿子開元中犯罪繫獄中撰此曲白樂天云滄州人姓何名滿子鞠獄都愍而為奏之明皇弗許竟坐白樂天曰世稱何滿是人名臨就罪時曲始成一曲回音并八叠從頭捴是㫁腸聲脞說商玲瓏餘杭之歌者白公守郡日與歌曰罷胡琹掩瑶瑟玲瓏再拜當歌出莫為使君不觧歌聽唱黄雞與白日黄雞催曉丑前鳴白日催人酉後没腰間紅綬繫未穏照裏朱顔看已失玲瓏玲瓏奈老何使君歌了汝更歌元微之在越州聞之厚幣來邀樂天即時遣去到越州住月餘使盡歌所唱之曲即賞之後遣之歸作詩送行兼寄樂天曰休遣玲瓏唱我詞我詞都是寄君詩却向江邉整廻棹月落潮平是去時秦少游在處州夢中作長短句曰山路雨添花花動一山春色行到小溪深處有黄鸝千百飛雲當面化龍蛇夭矯轉空碧醉卧古藤隂下杳不知南北後南遷北歸逗留藤州終於光華亭時方醉起以玉盂汲泉欲飲笑視而化冷齋夜話華亭舩子和尚偈曰千尺絲綸直下垂一波纔動萬波隨夜静水寒魚不食滿船空載月明歸山谷歌成長短句曰一波纔動萬波隨蓑笠一鈎絲金鱗正在深處千尺也湏垂吞又吐信還疑上鈎遲水寒江静滿目青山載月歸東坡携妓謁大通禅師大通愠色坡作長短句曰師唱誰家曲宗風有阿誰借君拍板與門搥我也逢塲作戯莫相疑溪女方偷眼山僧已皺眉莫嫌彌勒下生遲不見老婆三五少年時僧仲殊和曰觧舞清平曲而今說向誰紅爐片雪上鉗搥打就金毛師子也堪疑已信身如夢何湏眼似眉蟠挑已是結花遲不向風前一笑待何時余登秋屏閣浩然有歸老之興作長短句寄意曰城裏乆偷閑塵涴雲山此生已是再眠蠶隔岸有山歸去好萬壑千岩霜曉更凭攔减盡晴嵐微雲生處是茅庵試問此行誰作伴彌勒同龕東坡與少游飲别維揚作虞羙人詞曰波聲拍枕長淮曉隙月窺人小無情汴水自東流只載一舩離恨向西州竹隂花圃曽同醉酒味多於淚誰教風鑒在塵埃醖造一塲煩惱送人來世傳賀方回作也余與淵材牛渚間見長短句曰牛渚天門險限南北七英豪占青烟霧歛與閑人登覽待月上潮平波灔灔寒管孤吟新繫䌫風滿檻厯厯數西州更㸃淵材恨不得腔乃撰其譜盖賀方回作也並冷齋夜話詩話總龜巻四十欽定四庫全書詩話總龜巻
