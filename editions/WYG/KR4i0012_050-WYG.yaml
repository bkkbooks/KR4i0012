seq: 50
front:
  text: 余嘗於王瑩夫瓘處見王荆公手書集句詩一紙云海
  hash: sha256:0d088951d8e0b79e4e762c9388f0c314a3d9518e48db80a569a1c418c419494a
body:
  text: 棠亂發皆臨水君知此處花何似涼月白紛紛香風隔岸聞囀枝黄鳥近隔岸聲相應隨意坐莓苔飄零酒一盃今不知在何處揮塵莱公雖侈但設於寢處一青幃三十年有親者求之欲其易去公笑而荅曰彼詐我誠雖敝何害實不忍以敝舊弃耳勸者愧之故魏野詩云有官居鼎鼐無地起樓臺及北使來顧望縉紳而問迓者無地起樓臺相公安在其清望為人所景望如此然永叔歸田里頗論其侈汰司馬温公亦云豈非奢外而儉内歟䂬溪昌黎寄崔立之云傲兀坐試席深叢見孤羆四坐各低面不敢捩眼窺可謂善言場屋事若平居所養不厚誠難傲兀也同上退之韶州㽞别張使君云乆欽江總文章妙自歎虞翻骨相屯翻放弃南方自恨疏節骨鯁不媚犯上獲罪當長沒海隅其剛褊方拙凌突權勢出於天性冝文公喜用江總乃敗國奸回特引之何故按南史孔奐傳宋主欲以總為太子詹事唤曰江有潘陸之華而無園綺之實乃奏江總文華之人冝求厚重之才是時恐有譏云杜云逺愧梁江總還家尚黒頭李啇隱贈杜牧之云前身恐是梁江總皆未可與言史也同上子羙有朱紱負平生樂天有金帶􅀈腰衫委地紫綬相暉映不惡赤紱金章盡到身如此尚多然亦有歎曰實事盡消虛事在銀魚金帶遶腰光又有簮纓假合虛名在筋力消磨實事空皆自作觧嘲也嘗愛韋蘇州云除書忽到門冠帶便拘束又有謝居士寄松英舟云一拜藍峰送還使腰間銅印與心違言與意皆自在也散員踈云未為貴小邑陶休何足云惟樂天早退乃可語也黄常明蘇州寄粲師遥知尋齋夜凍雪封松竹時有山僧來懸燭獨自宿嘗於暑月讀亦有霜氣藉贈令狐云乆為慱士無人識自到長安賃舍居未足為窮其尋時道士云昨來官罷無生計欲就專求辟穀方其窮無以加矣唐王建以宫詞名家本朝王岐公亦作宫詞百篇不過􅄒郊祀御試經筵翰苑朝見等事至於宫掖戱劇之事則秘不得傳故詩詞中亦罕及若建者乃内侍王守澄之宗姪得宫中之事為詳如叢叢洗手遶金盆旋拭紅巾入殿門衆裏遥看新橘子在前收得便承㤙又云避脫昭儀不擲盧井邊含水噴鴉雛内中數日多呼唤冩得滕王蛺蝶圖如此之類非守澄説似則建豈能知哉初守澄讀建宫詞謂之曰宫掖之事而子昌言之倘得罪將奚贖建與之詩云三朝行坐鎮相隨今上春宫見小時脱下御衣先賜著進來龍馬每教騎長承宻㫖歸家少獨奏邊機出殿遲不是姓同親説向九重争得外人知自是守澄不敢有言花蕋夫人亦有宫詞百篇如月頭支給買花錢滿殿宫人近數千遇著唱名多不語貪羞走過御床前之類亦可喜也余嘗赴京師徃辭伯父坐中舉兄弟送行詩云問人求隱店下馬過危橋及觀坡集送姪安節詩序其伯曽有送蘇老下第歸蜀云人希野店休安枕路入靈關穩跨馿急難之誠意皆相若但字有多寡耳余官辰沅逾年族弟來相視將行率爾送之云就舍勿令人避席渡江莫與馬同船雖鄙近不工亦可用於畏塗荆公日記云立春日悉剪綵為燕子以戴之故歐永叔云不驚樹裏禽初變共喜釵頭燕已來鄭毅天云漢閣鬬簮䨇綵燕併知春色上釵頭皆春日貼子詩也藝苑雌黄云脩真入道秘言曰以立春日清晨北望有紫縁白雲者為三元君三素飛雲三元君以是日乘八輿上詣天帝子候見當再拜自陳某乙乞得給侍輪轂三過見元君之輦者白日登天歳時廣記載此事云臣鍇按舉場嘗試立春日望三素雲詩取此事故蘇子容作皇太妃閣春貼子云萬年枝上看春色三素雲中望玉宸許仲尤作皇帝閣春貼子云三素雲飛歸北極九農星粲見南方詩詁總龜後集巻五十詩話總龜跋余舒阮字集百家詩話總龜首巻四十有八後巻五十實鈔録未傳之書其月西殿下樂善嗜古見而珍愛亟欲與四方風雅之士共之延珖校讐訛舛芟剔重冗而夀諸梓焉復俾采集近代及國朝諸大家而續成之第荒僻淺鮮蒐輯尚未成帙姑識於巻末云詩話總龜跋
