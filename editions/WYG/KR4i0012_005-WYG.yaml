body:
  text: 自薦門曹武毅公翰江南歸環衛數年不調一日内宴侍臣皆賦詩翰以武人獨不預乃陳曰臣少亦學詩乞應詔太宗曰卿武人以刀字為韻因以寄意曰三十年前學六韜英名常得預時髦曽因國難披金甲不為家貧賣寳刀臂健尚嫌弓力軟眼眀猶識陣雲髙庭前昨夜秋風起羞見蟠花舊戰袍太宗為遷數官青箱雜記唐李義府初召見太宗令詠飛烏詩曰日裡颺朝彩琴中聞夜啼上林多少朩不得一枝棲太宗曰我當全林借汝豈借一枝耶左右羡之小說舊聞本朝知制誥待制止服皂鞓犀帶遷龍圖直學士始賜金帶燕肅為待制十年不遷作詩上時宰云􅁂邉今日白腰下㡬時黄遂遷直學士賜帶唐莊宗時禁旅王慶乞叙功賞曰侍從齊河日臣係第一隊入汴臣屬前鋒乞遷補荘宗頷之他日又言亦不納荘宗好樂樂工子弟至有得官者謂慶曰子何不學我吹管稍稍能之亦不獲用後事李嗣源亦言其勞荘宗曰知慶薄有功但每見慶則心憤然安得更有賜與之意因舉唐太宗詩曰待余心肯日是汝命通時夫主提天下生靈賞罰之柄若言如此則進退誠有命也翰府名談蘇麟為杭州屬縣廵檢范文正鎮錢塘城中兵官往往皆獲薦書獨麟在外邑未見收録因公事入府獻詩曰近水樓臺先得月向陽花朩易逢春文正薦之同前褚載字厚之家至貧客梁宋間困甚以詩投襄陽節度使邢君牙云西風昨夜墜紅蘭一宿郵亭事萬般無地可耕歸不得有㤙可報死何難流年怕老㸔将老百計求安未得安一巻新書滿懐淚頻來門舘訴飢寒君牙贈絹十匹薦於鄭滑辟支使不行眀年裴贄知貢舉君牙薦之擢第詩史胡恢坐法失官困於京師上韓魏公詩曰建業江山千里逺長安風雪一家寒得復官古今詩話南唐烈祖在徐温家作燈詩云一㸃分眀值萬金開時惟怕冷風侵主人若也勤挑撥敢向尊前不盡心同前伍喬張洎少相友善張為翰林學士眷寵優異伍為歙州通判作詩寄張戒去僕曰張逰宴時投之一日張與僚友近郊㑹燕歡甚僕投詩詩云不知何處好消憂公退擕壺即上樓職事久叅侯伯幕夢魂長繞帝王州黄山向晚盈軒翠黟水含春遶郡流遥想玉堂多暇日花時誰伴出城逰得詩動容久之為言於上召還為考功員外郎詩史孟賔于獻主司詩云那堪雨後更聞蟬溪隔重湖路七千憶昔故園楊栁岸全家送上渡頭船主司得詩自謂得賔于之晚當年中第中興中致仕歸連上過廬陵吉守贈詩曰曽聞洛浦綴神仙大樹南棲㡬十年白首自忻丹桂在詩名已得四方傳行隨秋渚将歸鴈吟傍梅花欲雪天今日還家莫惆悵不同初上渡頭船雅言系述孫集賢冕天禧中直史館㡬三十年晚守蘇已而引年大書詩於㕔曰人生七十鬼為鄰已覺風光屬别人莫待朝廷差致仕早謀泉石養閒身去年河北曽逢李今日淮西又見陳李見素陳荘皆差致仕寄語姑蘇孫太守也湏抖擻舊精神題畢拂衣而往詔下公已歸矣湘山録投獻門太宗棊品第一侍詔有賈元者臻於絶格時人以為王積薪之比也楊希粲蒋元吉李應昌朱懐辟皆國手然非元之敵元嗜酒病死晚有李仲元年甚少棊絶勝可侔於元嵗餘亦卒朝士有蒋居中潘慎修亦善棊至三品内侍陳好元四品多得侍棋自元而下皆受三道慎修受四道好元受五道慎修獻詩曰如今縱得仙翁術也怯君王四路饒談苑魏仲先獻冦萊公生日詩曰何時生上相眀日是中元謂七月十四日又贈萊公詩曰有官居鼎鼐無地起樓臺播傳漠北常聖朝圵使至問那箇是無地起樓臺相公萊公時方居散地因召還授圵門宫鑰青箱雜記杜荀鶴字彦之遇知於朱梁髙祖送名春宫於裴贄侍郎下第八人登科乃大順三年正月十日荀鶴生日也九華王希羽以詩獻曰金榜曉懸生世日玉書潛記上升時九華山色髙千尺未必髙於第八枝洞微志沈彬髙安人早有詩名先主鎮金陵知其欲代楊氏獻山水圖詩云湏知手筆安排定不怕山河整頓難覧而喜之臨終指𦵏處以示家人穴之乃一塜未嘗𦵏人石燈臺上有漆燈一盞壙頭有一銅碑鐫篆文云佳城今已開雖開不𦵏埋漆燈猶未滅留得沈彬來江南野録李吉甫之父微時以一絶投維楊都護朱甄大夫朱殊無意李後生吉甫吉甫節判青州有舉子吴武陵詣府投刺並不禮之武陵遂書前詩以獻吉甫厚賂之請為寢默詩曰十處投人九處違家鄉萬里久空歸嚴霜昨夜侵人骨誰念髙堂未授衣鑑誡録施肩吾上禮部陳侍郎詩曰九重城裡無親識八百人中獨姓施弱羽飛時攅箭險蹇驢行處薄冰危晴天欲照盆難及貧女如花鏡不知却向從來受恩地再求青律變寒枝同前錢穆尹天府遇生日楊次公作小詩并畫老子出闗圖以獻曰秘蔵幽谷闗中子将獻蓬萊閣上仙願得鬚眉如此老却教龜鶴羡長年雲齋廣録戴思舉進士未第為江淮郡守所知因獻叢䦨閣環清池詩曰蘭榭環池景象融乍疑鼇背路纔通雕龍雅句曺劉比畫鷁舟仙李郭同歌裊浦漁疑暮雨管吹湘竹怨秋風秉鈞従此朝天去難戀小山芳草叢答友人曰衡門聞道子猷來吟向蓬蒿興自回今日尚懐珍重意玉壺偏寄兩三盃吕申公鎮河陽府府屬投詩曰渭川重得吕嵩嶽再生申由是獲知洛陽詩話鮑當善為詩景徳二年登進士第為河南法掾薛映尚書知府嘗失其意初甚怒之獻孤鴈詩云天寒稲粱少萬里孤難進不惜充君庖為帶邊城信薛大稱賞自是不復以掾屬之禮待時人謂之鮑孤鴈薛公暑月詣其舎當方露頂狼狽入易服打版而出忘其幞頭薛公嚴重左右莫敢言坐久之月上當顧見髪影大慚以公服袖掩頭而走司馬太師詩話平曽獻金陵牧薛大夫白馬詩曰白馬披絲練一團今朝被絆欲行難雪中放去惟留迹月下牽来只見鞍向北長鳴天外逺臨風斜墜耳邉寒自知毛骨還應異更請王郎仔細㸔特以獻詩為薛所留雲溪友議劇燕蒲坂人工為雅正詩王重榮鎮河中府燕投詩曰祇向國門安四海不離鄉里拜三公榮禮重之為人縱誕多凌轢同軰果取正平之禍摭言闕愿唐王元之後三代為池陽刺史有㦸門子朱元迎於道左獻詩曰昔日郎君今刺史朱元依舊守朱門今朝竹馬兒童子盡是當時竹馬孫郡閣野談羅隠嘗以詩投鄭畋相國鄭有女喜詩什讀隠詩至張華謾出如舟語不及劉侯一紙書大愛其才隐一日至畋女於簾隙見其汚陋遂不復詠其詩鑑戒録令狐楚自翰林學士中書舎人拜相余綯自湖州召充翰林學士周嵗拜相渭南尉趙嘏獻詩云鶚在卿雲冰在壺代天材業奉訏謨榮同伊陟傳朱戸秀比王商入畫圖昨夜星辰回劍履前年風月滿江湖不知機務時多暇猶許詩家屬和無廣卓異記又見寄贈門吳士矩牧大郡因時相論置軍倅飲後獻詩曰一夕心期一種歡那知踈散負杯盤尊前數片朝雲在不許馮公仔細㸔南部新書吕許公一日有張球獻詩云近日厨中乏短供孩兒啼哭飯蘿空母因低語告兒道爺有新書謁相公公以俸錢百緡遺之青瑣集評論門上白樂天詩云無事日月長不覊天地濶此達者之詞也孟東野詩曰出門即有碍誰謂天地寛此褊狭者之詞然則天地何嘗碍郊自碍耳青箱雜記袁夏過永見何仙姑曰吾鄉有貴人亭今亦有故人亭何是非也仙曰此亭名因選詩有洞庭值歸客瀟湘逢故人而得之彼亭非也仙作詩曰全永從來稱舊郡瀟湘源上構軒新門前自古有流水亭上如今無故人風細日斜南楚晚鳥啼花落東湘春因公問我昔日事江左亭名不是真劍斧摭遺歐陽文忠曰詩原乎心者也富貴愁怨見乎所處江南李氏據富有詩曰簾日已髙三丈透佳人次第添香獸紅錦地衣隨歩皺佳人舞徹金釵溜酒渥時拈花蕋嗅别殿微聞簫皷奏與時挑野菜和根煮旋斫生柴帶葉燒異矣摭遺刺史縣令故事尤多士子以詩投獻難得佳句方諤有上廣州太守詩曰鰐去惡溪韓吏部珠還合浦孟嘗君雖善用故事議者未許贈邑令詩云琴彈永日得古意印鎖經秋生蘚㾗句雖佳但印上不是生蘚處不若雨後有人耕緑野月眀無犬吠花村意清句雅又見令之教化仁愛民樂於豐年之耕耨且無盗賊之警不見治術之迹翰府名談劉夢得有望洞庭詩雍陶有詠君山詩語意異同劉詩曰湖光秋月兩相和潭面無風鑑似磨遥望洞庭山水色白銀盤裡一青螺雍詩曰烟波不動影沉沉碧色全無翠色深疑是水仙梳洗罷一螺青髻鑑中心李山甫秦韞玉皆有貧女吟意亦相類李詩曰平生不識綉衣裳閒把金針亦自傷鑑裡祇應諳素貎人間多是信紅粧當年未嫁還憂老終日求媒即道狂兩意定知無說處暗垂珠涙滳蠶箱秦詩曰蓬門未識綺羅香擬托良媒益自傷誰愛風流髙格調共誇時世豔梳粧敢将十指誇繊巧不把雙眉鬭畫長最恨年年握針線為他人作嫁衣裳李山甫又有石頭城故事韋荘有詠南國英雄用意亦同李詩曰南朝諸國愛風流盡守江山不到頭總是戰争收拾得却因歌舞破除休堯将道徳終無敵秦把金湯可自由試問繁華何處有雨莎烟草石城秋韋詩曰南朝三十六英雄各逐興亡自此中有國有家皆是夢為龍為虎亦成空殘花舊宅悲江令落日青山弔謝公事竟覇圖何物在石麒麟沒卧秋風王維摩詰雲母帳子胡令能繡障亦佳句王詩曰君家雲母帳持向野庭開自有山泉入非闗彩茟來胡詩曰白日堂前花蕋嬌争携小筆上床描綉成掛向春園裡引得黄鶯下栁條李紳鄭雲叟傷農詩意亦皆同李詩曰鋤禾日當午汗滴禾下土誰知盤中飱粒粒皆辛苦鄭詩曰一粒紅稲飯㡬滴牛頷血珊瑚枝下人㘅杯吐不歇鑑戒録詩之作也窮通之分可觀王建詩寒碎故仕終不顯李洞詩窮悴故竟下第韋荘詩壮故至台輔何賛詩愁未㡬而卒王建寄賈島曰盡日吟詩坐忍飢萬人中覔似公希僮眠冷榻朝猶卧驢放秋田夜不歸旁㬉旋收紅落葉覺寒猶着舊生衣曲江池畔時時到為愛鸕鷀雨裡飛李洞上曹郎中曰閑坊宅枕穿宫水聽水分衾盡蜀僧葯杵聲中搗殘夢茶鐺影裡煮孤燈刑曺樹䕃千年井華岳樓間萬里冰詩句變風官漸𦂳夜濤春盡海邉騰韋荘感懐曰長年方悟少年非人道新詩勝舊詩十畝野塘留客釣一軒春雨對僧棋花間醉任黄鸝語池上吟從白鷺窺大道不将爐冶去有心重立太平基何賛書事云果决生涯向洛中西投知已話恩容雲遮劍閣三千里水隔瞿塘十二峰濶歩文翁坊裡月閑尋杜甫宅邉松到頭湏卜林泉隠自愧無能繼卧龍鑑戒録王建宫詞黄帕盖鞍呈了馬紅羅纒項闘廻雞晏元獻改呈馬了闘雞廻為順語詩史晚唐人詩多工巧無風騷氣味如崔櫓山鵲詩云一林寒雨吹巢冷半朶山花咽觜香張林池上云菱葉乍翻人採後荇花初沒舸行時蓮花云何人解把無塵袖盛取清香盡日憐皆浮艷無足尚而昔人愛重佳作詩史沈存中謂樂天詩不必皆好然識趣可尚章子厚謂不然樂天識趣最淺狹謂詩中言甘露事處㡬如幸灾雖私讐可快然朝廷當此不幸臣子不當形歌詠也如當公白首同歸日是我青山獨往時之類盧延遜詩自為容易如毎過私第邀㸔鶴長着公裳送上驢髙僧解語牙無水老鶴能飛骨有風此等之語其殆庶㡬又如栗爆燒氊破猫跳觸鼎翻而楊文公愛之不知何謂詩史江淹云蝴蝶飛南園李白云春園緑花蝴蝶飛語相似聶夷中河南人有詩曰二月賣新絲五月糶新榖醫得眼前瘡剜却心頭肉孫光憲謂有三百篇之旨此亦為詩史詩史梅聖俞愛嚴維詩有栁塘春水慢花塢夕陽遲善矣夕陽遲用繫花而春水慢不繫栁也如杜詩寒山催短景喬木易髙風此了無瑕纇又曰蕭條九州内人少虎狼多人少慎莫投多信虎所過飢有易子食獸猶畏虞羅如此等句含蓄深矣殆不可模倣古今詩話凡詩以意義為主文詞次之退之古詩髙卓至律詩雖可稱善要之未有工者有云老翁真箇似童兒汲井埋盆作小池此直諧語耳永叔江鄰㡬評退之隨車翻縞帶逐馬散銀盃為工而謂凹中初盖底凸處遂成堆為勝未知真得意否杜子美詩云紅稲啄餘鸚鵡粒碧梧棲老鳯凰枝此語反而意竒退之詩云舞鑑鸞窺沼行天馬度橋亦效此理古今詩話退之城南聫句云竹影金鏁碎乃日光非竹影也唐人作富貴詩多紀其奉養服器之盛乃貧眼所驚耳如貫休云刻成筝柱鴈相挨此下里鬻彈者皆有之韋楚老云十幅紅綃圍夜玉十幅紅綃為幬不及四五尺如何伸足所謂不曾近富家兒楊大年不喜杜子美詩謂之村夫子有鄉人以子美詩强大年不服因曰公試為我續江漢思歸客一句大年亦為屬對鄉人曰乾坤一腐儒大年似少屈李習之詩稱東野詩食薺腸亦苦强歌聲無歡出門即有碍誰謂天地寛可謂知音矣今世傳郊詩五巻百餘篇又有咸池集三百篇其語句尤多蹇澁疑前五巻曾經名士刪改也張文昌謝裴司空馬詩云乍離華廐移蹄澁初到貧家舉眼驚乃一遲鈍不能行多驚馬也詩人之辭微而顯亦少其比古人有風定花猶落之句無人能對舒王對以鳥鳴山更幽本宋王籍詩元對蟬噪林逾静鳥鳴山更幽上下句只是一意若對風定花猶落則上句静中有動下句動中有静同前劉夢得每吟張籍詩云靳酒欲開期好客朝衣纔脫見閒身又王維詩云興䦨啼鳥喚坐久落花多嘗言樂天苦好余秋水咏曰東屯滄海濶南􅃞洞庭寛又石頭城下作云山圍故國周遭在潮打空城寂寞廻自知不及韋蘇州春潮帶雨晚來急野渡無人舟自横又杜少陵過洞庭上云白蘋愁殺白頭人鄙夫之言亦愧杜公劉夢得言茱萸更三詩人道之而有能否杜子美云醉把茱茰仔細㸔王右丞云遍揷茱茰少一人朱放云學他年少揷茱茰子美為優同前劉夢得曰栁八駁韓十八平淮西碑云左飡右粥何如我平淮西雅之云仰父俯子栁云韓碑兼有㡌子使我為之便說用兵伐叛矣劉曰韓碑栁雅予為詩云城中早雞喔喔鳴城頭皷角聲和平美李愬入蔡賊無覺者落句云始知元和十二載四海重見升平時言十二載以見平淮西之年劉夢得云為詩用僻字湏有來處朱考功云馬上逢寒食春來不見餳嘗疑之吾重陽欲押一糕字思索六經無糕字遂不敢為之嘗訝老杜詩有巨䫙拆老拳無出處及讀石勒傳云卿既飽孤老拳孤亦遭卿毒手豈虚言哉毗陵士人李氏有女十六嵗能詩有破錢詩云半輪殘月掩塵埃依稀猶有開元字想得清光未破時買盡人間不平事又彈琴詩云昔年剛笑卓文君豈信絲桐解悮身今日未彈心已亂此心元是不由人雖有情致非女子所宜崔護作城南詩其始云去年今日此門中人面桃花相映紅人面不知何處去桃花依舊笑春風以意未完謂未工改云人面祗今何處在至今所傳有兩本惟本事詩云抵今何處在唐人工詩大率如此雖重一今字不恤也同前詩話總龜巻五欽定四庫全書詩話總龜巻六宋阮閱撰
