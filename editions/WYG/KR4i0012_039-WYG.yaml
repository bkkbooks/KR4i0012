front:
  text: 三十九宋阮閱撰
  hash: sha256:621e51e8351ef96c291e30276da79c4d122c0fbc72d7b53cd38de3fc186d8258
body:
  text: 詼諧門下兵部李内相濤唐宗室子自河陽令一舉状登科小字社翁毎於班中多自名焉其坦率如此翰林月給内醖兵部甞因春社寄翰林一絶云社翁今日没心情為乏治聾酒一瓶惱亂玉堂将欲遍依稀巡到第三㕔顔師古觧霍去病穿城蹋鞠云以皮為支實以毛蹴蹈為戯也顔時鞠乃如此至後唐已不同歸氏子弟嘲皮日休曰八片尖斜砌作毬火灰撏了水中揉一包閑氣如常在惹踢招拳卒未休仁宗朝試山海天地之蔵賦長沙進士陳說同進士出身謁郷人胥偃内翰因舉其賦胥曰賦頗佳但其間貼故事少耳說歸作詩曰紫宸較藝集英聡作賦方知尚欠功事内少他些子鉄殿前嬴得一堆銅黄紬被下夫人煖青𤨏窓中學士空寄語交朋湏細認主司頭惱太冬烘盧延遜五舉方登第甞作詩云狐衝官道過犬刺客門開租庸張相毎誦之又曰餓猫臨鼠穴饞犬䑛魚砧成中令激賞之又曰栗爆燒氊破猫跳觸鼎翻王中懿愛之盧甞謂人曰平生投謁公卿不意得猫兒狗子力也梅聖俞與謝氏世姻師直小字錦衣奴聖俞作詩戯之曰古錦裁詩句班衣戯坐隅朩奴今正熟肯效陸郎無師直方十嵗讀詩而悟石曼卿登第有人訟科塲覆考落者數人曼卿在焉方興國寺期集符至追所賜勅牒餘人皆泣而起獨曼卿觧靴還使人露體戴幞頭笑語終席次日放黜者例受三班借職曼卿作詩曰無才且作三班借請俸争如録事參從此免稱郷貢進且湏走馬東西南並同上王梵志詩曰城外土饅頭餡草在城裏無人喫一箇莫嫌没滋味且為餡草當使誰食之為易其後两句云預先着酒澆圗教有滋味東坡詩話馮衮牧蘇州日多縱飲愽因大勝以所得均與座客吟云八尺䑓盤照面新千金一擲鬬精神合是賭時湏賭物不堪回首乞閑人雅言雜載李紳相鎮廣陵有少年甚踈簡來謁晤對問言曰尚書先寄元相公詩云悶勸迃辛酒閑吟短李詩且曰辛大性迃嗜酒邱度李二十短而能詩紳少年即邱度子也謂李公曰小李毎憶白共二丈詩曰悶勸平情酒閑吟世上詩李曰辛大有此狂兒吾不存舊矣雲溪友議崔涯張祜為一時狂友好嘲謔甞戯贈貧妓曰雖得蘇方朩由貪玳瑁皮懐胎十箇月生下崑崙兒又曰布袍披襖火燒氊紙補箜篌麻接絃更有一雙皮屐子紇梯紇榻出門前又嘲李端端云黄昏不語不知行鼻似烟牕耳似鐺猶把象牙梳揷鬂崑崙山上月初生端端得此詩而困出遇二子於道再拜曰伏望哀憐乃重為一絶云不見驊騮偹綉鞍善和坊裏取端端揚州近日渾成著一朶能行白牡丹前嘲乃觧又甞為雜嘲之曰二年不到宋家東阿母深居僻巷中含淚向人羞不語琵琶絃㫁倚屏風日暮後來香閣中百年心事一朝同寒雞鼓翼紗窓外已覺恩情逐曉風又悼人詩云赤板橋西小竹籬揷花還似去年時淡黄衫子都無了腸㫁丁香畫雀兒曺州酒紏雲娘痩瘠而善歌李宣古嘲之曰何事實堪悲雲娘只首竒痩拳抛令急長觜出歌遲只怕肩侵鬂唯愁骨透皮不湏當户立頭上有鍾馗復州陵岩夢桂州筵上贈胡子女詩云自道風流不可扳那堪蹙額更頽顔眼睛湥似湘江水鼻孔髙於華岳山舞態豈能安掌上歌聲應不遶梁間孟陽死後今十載由有家人覔往還並同上楊叔寳強人也甞為荆門幕時虎傷人楊就虎穴磨巨崖大刻誡虎文如韓文公遣鱷魚文其略曰嗚呼爾彪出境潜㳺改官於欝州以書托知軍趙定打虎文數本書言嶺俗庸獷欲以化之仍有詩曰日将先聖詩書教暫作文翁守欎林守遣人打碑次日本耆申磨崖樹爾大虫咬殺打碑匠二人荆門止以耆状報叔寶湘山録薛逢晚年厄於宦途䇿贏赴朝值新進士綴行而出時進士團所由數十人見逢行李蕭然前道曰迴避新郎君逢冁然即遣价語之曰報道莫貧相阿婆三五少年時大㑹東塗西抹來摭言許孟容進士及第學究登科時人嘲之曰錦襖子上着蓑衣張處士憶柘枝詩曰鴛鴦鈿帶抛何處孔雀羅衫属阿誰樂天呼為問頭詩祜矛盾之曰鄙薄問頭之誚所不敢辭然明公亦有目連變長恨歌云上窮碧落下黄泉两處茫茫都不見豈不是目連變耶並同上王中令既平蜀捕餘冦與伍隊相逺飢甚乃入一村寺中僧醉甚箕踞公怒欲斬之僧應對不懾公竒而釋之間求蔬食云有肉無蔬公益竒之餽以蒸豚頭食之甚美公喜問僧正能飲酒食肉邪為有它伎邪僧自言能詩公令賦蒸豚詩操筆立成詩云觜長毛短淺含臕乆向山中食藥苖蒸處已将蕉葉裹熟時更用杏漿澆紅鮮推稱金盤貯軟熱真堪玉筯挑若把羶根來代並羶根只合喫藤條公因大喜與紫衣乃蜀中詩僧百斛明珠韓玉汝治秦州尚嚴去宫人語曰寧逢暴虎莫逢韓玉汝孫臨滑稽尤善對或問曰莫逢韓玉汝當以何對臨應聲曰可怕李金吾天下以為口實同前石介作三豪詩略云曼卿豪於詩永叔豪於文杜黙師雄豪於歌永叔亦謂黙云贈之三豪而我濫一名黙之歌少見於世初不知之後聞其篇云學講波中老龍夫子門前大虫皆此等語甚矣介之無識也永叔不為嘲誚之者此公惡争名且為介諱也吾觀杜黙豪氣正是京東學究飲私酒瘴死牛肉醉飽後而發之者也作詩之狂至於盧仝馬異極矣若更求竒便作杜黙也㓜時里人程建用楊咨家弟子由㑹草舎天雨聮句六言程曰庭松偃盖如醉楊曰夏雨新凉似秋軾云有客髙吟擁鼻子由云無人共吃饅頭皆絶倒已四十餘年同上聶崇義建隆初為學官河洛之師儒也趙韓王當拜云郭忠恕使酒詠其姓玩之曰近貴全為聵扳龍即是聾雖然三箇耳其奈不成聡崇義應聲荅曰勿笑有三耳全勝畜二心忠恕大慚雲溪友議趙成伯家宴造之無由輙欲效顰而酒已盡入夜不欲煩擾戯作小詩求數酌而已詩曰道士令嚴難繼和僧伽帽小却空廻隔籬不欲鄰公飲抱甕惟防吏部來趙成伯家有姝麗僕忝郷人不肯開樽徒吟春雪謹依元韻以當一笑云繡簾朱户未曽開誰見楊花落鏡䑓試問髙吟三十韻何如低唱两三杯莫嫌衰髩聊相映湏得纎腰妙隔回知道文君隔青𤨏梁園賦客敢言才俗云檢騐雪壓秀才衣帶上有雪詩三十韻又世傳陶榖學士買得黨太尉家故妓過定陶取雪水烹團茶謂妓曰黨太尉應不識此妓曰彼粗人安有此景但能以銷金煖帳下淺斟低唱吃羊羔兒酒爾榖愧其言荅來句罪過之義取質而已玉局遺文僕少好種松過泗上與杜子師出山中子師求予種松法欲之都梁山中戯作二絶云露宿泥行草棘中千年春雨養髯龍如今尺五城南杜欲向東坡學種松君方掃雪收松子我已開榛得茯苓為問何如揷楊栁明年飛絮落浮萍同上元豐中晁無咎詩極有聲無已以詩戯之曰聞道新文能入様相州紅纈鄂州花盖是時方尚相州纈鄂州花也晁堯民子損之云王直方詩詁劉諷參軍宿山馹月朙有女子數自屋後來命酌庭中歌曰明月清風良霄㑹同星河易翻歡娱不終緑樽翠杓為君斟酌今夕不飲何時歡樂此廣記所載詩也山谷曰當是鬼中曹子建所作東坡亦以為然又有一篇云玉户金缸願陪君王邯郸宫中金石絲簧鄭女衛姬左右成行紈綺繽紛翠眉紅粧王歡轉眄為王歌舞願得君歡長無灾苦蘇公以為邯郸宫中金石絲簧此两句不唯人少能作而知之者亦極難得耳皆醉中為余書此張文潜見坡谷論說鬼神忽曰舊時作人語如今人作鬼語二公大笑髙愈主簿云東坡云世間事勿笑為易惟讀王祈大夫詩不笑為難祈甞謂東坡云有竹詩两句最為得意曰葉埀千口劔幹聳萬條鎗坡云好則極好則是十條竹竿一箇葉兒也以道云初見東坡詞云素面常嫌粉涴洗粧不退唇紅便知此老湏過海余問何耶以道曰只為古今人不曽道到此湏罰教逺去吴賀廸吉者撫州人一日載酒來余家并召劉夷季洪龜父饒次守軰酒酣頗紛紛龜父先歸作一絶題于余書室曰再為城南逰百花已狂飛更堪逢惡客騎馬風中歸次守既醒作十七字和云當時為舉首滿意望龍飛而今已報罷且歸盖龜父是年自洪州首薦自今上初即位無廷試也山谷為校書在館中時多食東華門椀脱蒸餅後徙黔南王定國寄之以詩云北海未常樽有酒馮驩何止食無魚黔州椀脱無蒸餅自合官稱削校書張文潜在一時中人物最為魁偉故陳無已有詩云張疾魁然腹如皷雷為飢聲酒為雨文云要痩君則肥山谷云六月火雲蒸肉山又云雖肥如瓠壺而文潜卧病秦少游又和其詩云平時帶十圍頗復减臂環皆戯語也劉季孫景文公頃年王安石使對念兹在兹釋兹在兹名言兹在兹季孫對之以掲諦掲諦波羅掲諦波羅僧掲諦安石大笑並同上往嵗江行阻風㳂岸野步望雲嶺而去忽有蘭若甚多僧院覩客來皆扄門不納獨有一院大敞其戸見一僧翹足而眠以手書空顧客不介意切思曰書空有換鵞之能翹足類坦腹之事此必竒僧直入造之僧雖强起全不樂客客不得已而問先逹有詩曰書空翹足睡路險側身行和尚其庶幾乎僧曰貧道不知許事適􅀞房門振題様客不辭而去桂苑聚談梁周翰在太宗朝為舘職真宗即位乃除知制誥栁開贈詩曰九重城闕新天子萬巻詩書老舎人梁與朱昂楊大年同在禁掖大年年未滿三十而两公皆老數見慢侮不能堪即好謂大年曰公毋侮我此老亦将留與公耳朱聞之背面揺手欲梁莫與之言大年之沒不及五十也閑居詩話晋郝隆為蠻府參軍三月三日作詩曰娵隅躍清池桓温問何物荅曰蠻名魚為娵隅桓曰何為作蠻語隆曰千里投公始得一蠻府參軍􅃚得不作蠻語世說盧家有子弟年暮而猶為校書郎晚娶崔氏女崔有詞翰結䄜之後微有嫌色盧因請詩以述懷為戯崔立成曰不怨檀郎年紀大不怨檀郎官職卑自恨妾身生較晚不見盧郎年少時南部新書李建勲鎮臨川日九江帥周宗一書求曰近器用儀注或闕欲輟臨川者李乘醉批一絶句云偶罷阿衡來典郡固無閑物可應官憑官為報周公道莫作循州刺史看南唐近事李巽字仲權累舉不第郷人侮曰李秀才應舉空去空回不知甚時席㡌得離身巽亦不校登第後乃遺郷人詩曰當年踪跡困􅅺塵不意乘時亦化鱗為報郷閭親戚道如今席㡌已離身盖因國初猶襲唐士子皆曵袍重戴出則席㡌自隨青箱雜記梅聖俞河豚詩曰春洲生荻芽春岸飛楊花河豚於此時貴不數魚蝦劉厚甫戯曰鄭都官有鷓鴣詩謂之鄭鷓鴣聖俞有河豚詩當呼為梅河豚也古今詩話雲臺集有鄭谷鷓鴣全篇云暖戯烟蕪錦翼齊品流應得近山雞雨昏青草湖邉過花落黄陵廟裏啼㳺子每聞征袖濕佳人纔唱翠眉低相呼相喚湘江濶苦竹叢深春日西同上鄭毅夫榜明州人周師厚以名極低只壓得陳傳一名自賦詩曰舉眼不堪觀鄭獬囬頭由喜得陳傳朱定國詩話唐僧法軌形容短小開講於寺與李榮議論往來數畨僧舊作一詩詠李榮於髙坐上誦之云姓李應湏禮名榮又不榮李應聲曰身長三尺半頭毛猶禾生四坐服其辯㨗啓顔録經生多不省文章甞一邑有两人同官其一或舉杜荀鶴詩稱賛也應無處避征徭之句其一難之曰此詩久矣野鷹何甞有征徭乎舉詩者觧曰古人有言豈有失也必是當年科取翎毛耳貢父詩話潁州張龍圖甞見州牒押字多團下拽一畫有人云押字如有蒸餅様張應聲曰為官恰似麫糊團有同人自言近年云鬚鬂恰如􅍡馬色張曰文章依舊草驢鳴雍洛靈異記包賀多為鄙俗之句至於枯竹笋抽青橛子石榴樹掛小瓶兒又云霧是山巾子舡為水靸鞋又云掉揺舡掠髩風動水搥胷雖好事者托以成之亦空穴來風之意王伸知永州為人耽於酒色其宴樂往往自早至暮為句云鴛鴦未老頭先白嘲人素患六損憂制者應聲曰螃蠏才生足便多時人以為名對崔櫓酒後於䖍州陸郎中坐上甚狂以詩謝之曰醉時顛蹶醒時羞麯蘖催人不自由尀耐一雙窮相眼不堪花卉在前頭閩人黄通累舉不第後該恩厯官數任年六十猶欲鎻㕔或嘲之曰剩員呈武藝老妓舞柘枝李義甫甞作詩曰鏤月為歌扇裁雲作舞衣自憐廻雪態好取洛川歸有棗強尉張懐慶好竊人文章有詩曰生情􅍢月為歌扇出性裁雲作舞衣照鑑自憐廻雪態來時好􅂑洛川歸時人謂之曰活剥張昌齡生吞郭正一宋莒公判館事督諸館職必至而刀景純數日不來莒公使人邀之加之誚讓王原叔改杜少陵贈鄭廣文詩云景純過官舎走馬不曽下驀地稱朝歸便遭官長罵栁州栁太守種栁栁江邉栁館依然在千株栁拂天後南中丞至黔南人嘲之曰黔南南太守南郡在雲南閑向南亭畔南風變俗談並同上詩話總龜巻三十九欽定四庫全書詩話總龜巻四十宋阮閲撰
