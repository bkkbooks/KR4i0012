body:
  text: 詩進門楊允元年二十一嵗為光禄寺丞太宗極愛之三月後苑曲宴未得貼軄不得與以詩貼寄館中諸公曰聞說宫花滿鬢紅上林絲管侍重瞳蓬萊咫尺無由到始信仙凡逈不同諸公進呈太宗訝有司不召左右以未得貼軄為奏即日直集賢院與晚宴古今詩話翰林學士李宗諤以京官帶館軄赴内宴閣門拒之獻詩曰戴了宫花賦了詩不容重覩赭黄衣無憀獨出金門去恰似當年下第歸公嘗舉進士御試下第因及之太宗覽詩即宣赴坐後遂為例雖選人帶館軄亦同赴宴青箱雜記周世宗幸廣陵孟貫能詩以一集獻之世宗見首巻貽棲隐洞譚先生詩云不伐有巢樹多移無主花謂貫曰伐叛弔民何有巢無主之有獻朕則可他人卿将不免遂釋褐授官江南野録太宗收并門凱旋日范果叩廽鑾進詩曰千里版圖來浙右一聲金皷下河東賜一官古今詩話唐太宗征遼師還途中御製詩有鑾輿臨紫塞朔野陣雲飛之句遂寜令何象進鑾輿臨塞賦朔野雲飛詩召對嘉賞授賛善大夫詩有塞日穿㾗斷邉鴻背影飛縹緲浮黄屋隂沉䕶御衣之句同前吳越司賔使沈韜文湖州人有逰西湖詩云菰米蘋花似故鄉不是不歸歸未得好風眀月一思量武肅憫其思鄉授以湖州刺史遺一句同前世傳琴曲宫聲十小調皆隋唐賀若弼製最妙一不博金二不換玉三泛峽吟四越溪吟五越江吟六孤憤吟七清夜吟八葉下聞蟬九三清十亡其名琴家名賀若而已太宗改不博金曰楚澤涵秋不換玉曰塞門積雪命辭臣採調製詞蘇易簡得越江吟詞曰神仙神仙瑶池宴片片碧桃零落春風晚翠雲開處隐隐金輿挽玉麟背冷清風逺岑文本云非雲非烟瑶池宴片片碧桃零落黄金殿蝦鬚半捲天香散春雲和孤竹清婉入霄漢紅顔醉態爛熳金輿轉霓旌影亂簫聲逺不知孰是稱賞門太宗留意藝文好篇詠淳化中春日苑中有賞花釣魚小宴宰相至三舘畢預坐咸使賦詩中字為韻上覧以第優劣時姚鉉詩先成曰上苑烟花逈不同漢皇何必幸遼中花枝冷濺昭陽雨釣線斜牽太液風綺蕚惹衣朱檻近錦鱗隨手玉波空小臣侍宴驚凡目知是蓬萊第㡬宫賜白金百兩時􅒰榮之以比奪袍賜花等故事薛道衡為人日詩曰入春纔七日離家已二年南人嗤之曰是底言語誰謂此虜㑹作詩及云人歸落鴈後思發在花前乃喜曰名下無虚士小說舊聞江為能詩少逰廬山白鹿洞題詩一聫于壁曰吟經蕭寺㫋檀閣醉倚侯家玳瑁筵李璟見之謂左右曰吟此詩者大是貴族遂為時軰所稱江南野録成都周式作春詩題㢘遜驛云珠簾綉戸遲遲日栁絮梨花寂寂春王拱辰甚愛之雲齋廣録白昊秋日郊歩詩云鶴盤逺翅投孤嶼蟬曵殘聲過别枝歐陽公稱為佳句同前馮太傅端嘗書云鳴􅐴直上一千尺天静無風聲更乾碧眼胡兒三百騎盡提金勒向雲㸔謂坐客曰可圖於屛幛乃栁如京塞上詩也倦逰録何涓襄陽人少為瀟湘賦為時所稱潘緯以古鑑詩著名或曰潘緯十年吟古鑑何涓一夜賦瀟湘零陵總記載何涓瀟湘賦云鏡歛殘色霞披曉光亦無全篇古今詩話楊大年同陳恕讀李義山詩酷愛一絶云珠箔輕眀覆玉墀披香新殿鬪腰肢不湏㸔盡魚龍戯終遣君王怒偃師嘆曰古人措意如此深妙各歎服李太白初自蜀到京師賀知章聞其名見之請為文出蜀道難示之知章曰公非人間人豈太白星精邪扵是解金貂換酒醉而歸及見烏夜啼曰此詩可以泣鬼神其詞曰姑蘇臺上烏飛時吳王宫裡醉西施吳歌楚舞歡未畢青山欲㘅半邉日金壺丁丁漏水多起㸔秋月墜江波東方漸眀柰樂何又曰黄雲城邉烏欲棲歸飛啞啞枝上啼機中織錦秦川女碧紗如煙隔忩語停梭向人問故夫欲說遼西涙如雨憲宗時圵敵數冦邉大臣議和親有五利而無千金之費憲宗曰比聞一士人能為詩而姓字稍僻其詩曰山上青松陌上塵雲泥豈合得相親舉世盡嫌羸馬瘦唯君不弃卧龍貧千金未必能移性一諾從來許殺身莫道書生無感慨寸心還是報㤙人侍臣曰此戎昱詩也京兆李鑾欲以女妻之令改姓昱辭焉憲宗恱曰又記得詠史詩云漢家青史上計拙是和親社稷歸眀主安危托婦人豈能将玉貎便欲静胡塵地下千年骨誰為輔佐臣憲宗笑曰魏絳何其懦也此人如在可與鼎州武陵桃源足稱其吟咏士林榮之又蘇郁有詩云闗月夜懸青塜鑑塞雲愁薄漢宫羅君王莫信和親策要託安危患更多裴慶餘咸通末佐李圵門為淮南幕嘗同逰船舟師悞以舩篙水濺侍女衣上變色慶餘請為詩曰滿額鵞黄金縷衣翠翹浮動玉釵垂從教水濺羅裠濕知道巫山行雨歸公喜令歌者傳之古今詩話又唐賢杼情謂李蔚守淮南日布衣孫處士作張祐有觀獵詩并宫詞白傅稱之宫詞云故國三千里深宫二十年一聲何滿子雙淚落君前小杜守秋浦與祜為詩友酷愛祜宫詞贈詩曰如何故國三千里虚唱歌詞滿六宫又詩寄祜云睫在眼前人不見道非身外更何求誰人得似張公子千首詩輕萬戸侯楊祭酒嘗見江表士人項斯詩贈之詩云幾度見詩詩總好及觀標格過於詩平生不解蔵人善到䖏逢人說項斯由是四方知名樂天初舉名未振以歌詩投顧况戯之曰長安物貴居大不易及讀至原上草云野火燒不盡春風吹又生歎曰有句如此居亦何難老夫前言戯之耳丁晋公孫何齊名翰林學士王元之延譽嘗言二人可使白衣充修撰嘗贈之詩曰三百年來文不振直従韓栁到孫丁如今便合教修史二子文章似六經杜紫微覽趙渭南早秋詩云殘星㡬㸃鴈横塞長笛一聲人倚樓因目之為趙倚樓贈詩曰今代風騷将誰登李杜壇覇陵鯨海動秦苑鶴天寒今日訪君還有意三條冰雪借吟㸔盧多遜獻太宗詩巻中有栗爆燒氊破猫跳觸鼎翻之句後與潘美樞密在内殿議事令宫人煨栗俄有數栗爆出燒損綉褥又嘗燒金鼎宫猫相戯觸翻因舉前詩曰詞人作詩信無虚語武后逰龍門命群臣賦詩先成者賜錦袍左史東方虬詩先成拜賜坐未安宋之問詩後成文理兼美左右莫不稱善乃就奪錦袍衣之其詞曰宿雨霽氛埃流雲度城闕河隄新栁翠苑樹花初發洛陽花栁此時濃山水樓臺映㡬重羣公拂霧朝翔鳯天子乗春幸鑿龍鑿龍近出王城外羽從淋漓擁軒盖雲蹕纔臨御水橋天衣已入香山㑹山壁嶄嵓斷復連清流澄澈俯伊川塔影遥遥緑波上星龕奕奕翠微邉層巒舊長千尋水逺壑初飛百丈泉綵仗紅旗遶香閣下輦登髙望河洛東城宫闕擬朝廻南陌溝塍殊綺錯林下天香七寳臺山中春酒萬年杯微風一起祥花落仙樂初鳴瑞鳥來花落紛紛更無已稱觴獻夀烟霞裡歌舞淹留景欲斜石間猶駐五雲車鳥旗翼翼流芳草龍騎駸駸映晚花千乗萬騎鑾輿出水静山空嚴警蹕郊外喧喧引㸔人傾心南望屬車塵囂聲引颺開黄道王氣周廻入紫宸先王定鼎三河固寳命乗周萬物新吾君不是瑶池樂時雨來觀農扈春廣卓異記郭元振為通泉縣尉前後掠所部千餘人遺賔客百姓苦之武后使籍其家有書數百巻令問其貲財所在知皆已濟人於是竒而免之召見大稱􅈲令口占古劍歌進天后竒之命繕冩贈諸學士歌曰君不見昆吾鐵冶飛炎烟紅光紫霧俱赫然良工鍜錬經㡬年鑄得寳劍名龍泉龍泉顔色如霜雪良工咨嗟嘆竒絶琉璃匣裡吐蓮花錯鏤金環生眀月正逢天下無飛塵幸得周防君子身精光黯黯青蛇色文章片片緑龜鱗非直結交㳺俠子亦嘗近視英雄人何言中道遭弃捐零落湮淪古獄邉雖復塵埋無所用猶能夜夜氣冲天同前楊少卿凝式有材自負既不大用多佯狂自穢逰寺觀遇水竹幽勝之地吟咏忌歸墻壁之上筆跡多滿僧道愛護莫不粉壁光潔以俟揮掃逰客嘆賞故馮瀛王次子少吉題壁下曰少卿真跡滿僧居秖恐鍾王也不如為報逺公湏愛惜此書書後更無書安鴻漸題曰端溪石硯宣城管王屋松烟紫兎毫更得少卿老書札人間無此五般髙洛陽舊聞張翼善詩嘗投詩兩帙於京師王相浦王諭之以詩云清河詩客本賢良恵我清吟六十章詞格宛同羅給事工夫深似賈司倉登山始覺天髙廣到海方知浪𣺌茫好去蟾宫是歸路眀年應折桂枝香廖圖字賛禹䖍州人文學博贍為時軰人所服湖南馬氏辟幕下奏天策府學士與劉禹李宏皋徐仲雅蔡昆韋鼎釋虚中齊已俱以文藻知名更唱迭和今有集行於世贈家陵上人云蹔把枯藤倚壁根禪堂初創楚江濆直疑松小難留鶴未信山低住得雲草接寺橋牛笛近日銜村樹鳥行分每來共憶曽逰處萬壑泉聲絶頂聞又和人贈沈彬詩云㝠鴻跡在烟霞上燕雀休誇大厦巢名利最為浮世重古今能有㡬人抛逼真但使心無着混俗何妨手强抄深喜卜居連嶽邑水邉松下得論交僧齊已寓渚宫與圖相去千里而每有書往來臨終有絶句寄圖兄弟云僧外閑吟樂最清年登八十䘮南荆風騷作者為商𣙜道去碧雲争㡬程雅言雜録江南韓熈載稱左偃能詩有集千餘首偃不仕居金陵寄廬山白上人云潦倒門前客閒眠嵗又殘連天數峰雪終日與誰㸔萬丈髙松古千尋落水寒仍聞有新作懶寄入長安又昭君怨云胡笳聞欲死漢月望還生寄韓侍郎云謀身謀隠兩無成拙計深慚負耦耕漸老可堪懐故國多愁反覺厭浮生言詩幸偶眀公許守朴甘遭俗者輕今日况聞搜草澤獨悲憔悴卧昇平韓見詩感歎厭浮生不喜不逾月果病卒年二十四王操有詩哭之曰堂親垂白日稚子欲行時温庭筠彦博之曾孫本名岐字飛卿少敏悟薄行無檢幅多作側詞艷曲與貴胄裴成令狐滈等飲博與李商隠皆有名號温李醉為邏卒撃折齒由汙行訴不得理連舉不第徐商鎮襄陽辟官不得志歸江東紀唐夫贈詩曰鳳凰詔下雖沾命鸚鵡才多却累身人多諷之庭筠既以才廢引長沙之事自云豈司命重文章而輕爵禄虚有授焉浮於行者必有怨尤不自咎也並同前長安三月五日兩街㸔牡丹奔走車馬慈㤙寺元果院牡丹半月開故裴兵部憐白牡丹詩自題於佛殿東頭蜃壁之上大和中敬宗自夾城出芙蓉園路幸此寺見所題詩吟玩久之因令宫嬪諷念及暮此詩滿六宫矣詩曰長安豪貴惜春殘争賞先開紫牡丹别有玉杯承露冷無人肯就月中㸔南部新書李昪移鎮金陵旁羅隐逸沈彬赴辟知其欲取楊氏因獻山水圖詩曰湏知手筆安排定不怕山河整頓難覽之而喜任濤豫章人詩名早著有露摶沙鶴起人卧釣舩流他皆倣此數舉敗于垂成李常侍隲㢘問江西時與放鄉里之役民俗互有論列隲判江西界内凡有詩得似濤者即與免役摭言郭祥正自梅聖俞贈詩有采石月下聞謫仙以為李白前身縁此有名又有金山行云鳥飛不盡暮天碧漁歌忽斷蘆花風大為王荆公所賞秦少章嘗云郭功父過杭州出詩一軸示東坡先自吟誦聲振左右既罷謂坡曰祥正此詩㡬分坡曰十分詩也祥正問之坡曰七分來是讀三分來是詩豈不是十分也王直方詩話徐俯字師川忠愍公之子有平生功名心夜忩短檠燈之句大為山谷所賞山谷其舅也蘇伯固之子名庠字養直作清江曲云屬玉雙飛水滿塘菰蒲深處浴鴛鴦白蘋滿棹歸來晚愁㸔蘆花一片霜扁舟繋㟁依林樾蕭蕭両鬢吹華髪萬事不理醉復醒長占煙波弄眀月坡曰若置在李太白集中誰疑其非秦覿字少儀好為詩初亦不甚工既而以獻山谷山谷贈之曰乃能持一鏃與我箭鋒直又云自我得此詩三日卧向壁才難不其然有亦未易識當時交㳺以此言為過然少儀縁此思大發交㳺亦刮目視之並同前詩話總龜巻四欽定四庫全書詩話總龜巻五宋阮閲撰
