seq: 1
front:
  text: 太宗好文進士及第賜聞喜宴常作詩贈之景祐朝因
  hash: sha256:848f1a76faad9c35e8b3ce60046f3b6edaefd51668e069a69910365c10e19438
body:
  text: 以為故事仁宗在位四十二年賜詩尤多然不必盡上所作景祐元年賜詩落句云寒儒逢景運報徳合如何論者謂質厚宏壮真詔旨也貢父詩話李文正昉太祖在周朝已知其人及即位用以為相嘗語文正曰卿在周朝未曽傾䧟人可謂善人君子故太宗遇之亦厚年老罷相每内宴必先赴坐嘗獻詩曰微臣自愧頭如雪也向鈞天侍玉皇太宗和之以賜曰珍重老臣純不已我慚寡昧繼三皇為時之美談青箱雜記又談苑玉壺清話皆謂扈䝉應制吕正恵端太宗朝為叅知政事多獨對便殿語必移刻因宴後苑上釣魚詩㫁句云欲餌金鉤殊未達磻溪須問釣魚人意已屬公矣公和詩進曰愚臣鈎直難堪用宜用濠梁結􅃠人不數日拜平章事詩史又古今詩話謂正恵已作户部侍郎平章事時吕文穆䝉正告老甚切因此詩遂冠合席福唐蔡伯禧四嵗對真宗誦讀授校書郎春宫伴讀齒猶未三周故曰三嵗神童賜之詩曰七閩山水多才俊三嵗竒童出盛時家世應傳清白訓嬰兒自得老成資初嘗學歩來朝謁方及能言解誦詩更勵孜孜圖進益青雲千里有前期續歸田録蘇易簡在翰林太宗一日召對賜酒甚歡暢曰君臣千載遇蘇應聲曰忠孝一生心太宗大悦以所御金器盡席賜之掇遺夏侯嘉正好爐火仍以不得兩制為恨太宗御樓觀燈進詩十韻末句云兩制誠堪羡青雲侍玉輿太宗和賜曰薄徳終難舉通才例上居嘉正嘗曰使我得汞銀半兩知制誥一日平生足矣二願俱不遂而卒玉壺清話李廷臣官於瓊舘有夷人携錦臂絛上織成一聨云恩袍草色動仙籍桂香浮乃仁廟朝賜進士及第舉人詩也廷臣以千金易之蔵為珍寳青瑣集忠義門張廵守雎陽眀皇已幸蜀胡羯方熾城孤勢促人食竭以紙布切煮而食之時以茶汁和食而意自如其謝金吾将軍表曰想峨眉之碧峰逰豫西蜀追緑耳于元圃保夀南山逆賊禄山戮屠黎獻膻臊闕廷臣被圍四十九日凡三千二百餘陣主辱臣死廼臣致命之時惡稔罪盈是賊滅亡之日忠勇如此激厲壮士嘗賦詩曰接戰春來苦孤城日漸危合圍侔月暈分守效魚麗屢􅌅黄塵起時将白羽揮裹瘡猶出戰飲血更登陴忠信應難敵堅誠諒不移無人報天子心計欲何施又夜聞笛曰岧嶤試一臨虜騎俯城隂不辨風塵色安知天地心營開邊月近戰苦陣雲深旦夕更樓上遥聞横笛音有唐佳話趙師旦潛叔皇祐中守康州儂賊犯城死于是士大夫作詩者衆而元厚之李擇中詩為最佳元詩云轉戰譙門日再晡空拳猶自冒戈殳身垂虎口方安坐命弃鴻毛更疾呼柱下杲卿存斷舌袴間杵臼得遺孤可憐三尺英雄氣不愧西山士大夫李詩云賊壮兵孤衆膽驚忠臣此日見専城負君罪大寜如死守土城堅不問生報國存心惟自愧呼天壮氣㡬時平潺湲多少英雄淚千古封江不斷聲雲齋廣録王維字摩詰天寳末禄山䧟両京眀皇出幸維扈從不及為賊所得維服藥取利偽稱瘖病禄山素憐之遣人迎置洛陽拘于普施寺廹以偽命禄山宴其徒于凝碧宫其樂乃梨園弟子教坊工人維聞之悲惻潛為詩曰萬戸傷心生野烟百官何日更朝天秋槐葉落空宫裏凝碧池頭奏管絃賊平陷賊官者三等定罪維以凝碧詩聞于行在肅宗嘉之特宥之授太子中允劉約拾遺晋天福三年與戎和晋祖曰當遣輔相為使趙瑩桑維翰同堂皆未言以戎雖通好而反覆難測咸懼於将命馮道與諸公中書食訖分聽堂吏前白道言北使事吏人色變手顫道索紙一幅書云道去即遣冩敷屬吏泣下道遣人語妻子不復歸家舎都亭驛不數日即行晋祖餞語以家國之故煩耆徳使逺自酌巵酒飲之虜以道有重名欲留之命與其國相同列所賜皆等戎賜臣下以牙笏及臈月賜牛頭皆為殊禮道皆得之以詩謝云牛頭偏得賜象笏更容持戎甚喜潛諭留之道曰兩朝皆臣豈有分别賜􅊖市薪炭云北地寒老年不堪及還京師作詩五章以述北使之意其首章云去年今日奉皇華祇為朝廷不為家殿上一盃天子泣門前雙節國人嗟龍荒冬往時時雪兎苑春歸處處花上下一行如骨肉㡬人身死掩風沙虜中大寒賜錦襖貂襖羊狐貂衾各一每入謁悉服四襖衣宿館中併覆三衾詩曰朝披四襖専蔵手夜盖三衾怕露頭叢苑劉吉江左人有膂力尚氣事李煜為傳詔承旨以忠于所奉歸朝供奉官以知河渠利害委以八作務太平興國中河大决吉護之與工夫同甘苦使者至訪吉不獲甚怒乃著皂短布褐獨負二嚢土為先導從吏無敢言使者密訪得之歸奏仁宗厚賜之内侍石全振領河堤甚苛急自謂石爆裂嘗侮吉吉不與校一日吉乗小艇督役至中流語石曰公恃貴近見凌甚不畏死當與公同見河伯遂蕩舟覆之全振乞命號泣乃止不復敢侵吉吉本燕薊人自受李氏㤙常分禄以濟其子孫朔望必拜李煜真雖童幼必拜之執臣僚之禮後為崇儀使其刺字謁吳中親舊題僧寺驛亭皆自稱以南人不忘本也有詩三百首目為釣鰲集徐鉉為序其首篇隐者詩曰一箭不中鵠五湖歸釣魚人多誦之以塞河有方略人目為劉䟦河名震河上同前諷諭門太平興國中李繼遷以西夏叛朝廷興師剪伐迨十年餘至咸平末猖獗愈盛冦䧟邉境章聖以西民疲于輸輓有􅌅兵之意而無名以罷師伐議者益紛紜未决事固秘密未聞於外䖏士种放山中有詩云胡雛負㤙信聖主耻干戈章聖聞之歎美且惬素志即遣使齎詔召至授左司諌直昭文館㑹景徳初邉臣奏李繼遷死其子阿移即徳眀也願納欵遂罷兵放隐終南山累詔不起至拜官復歸終于工部侍郎誌逸淳化中合州貢桃花犬甚小而性急常馴擾於御榻之側每坐朝犬必掉尾先吠人乃肅然太宗不豫此犬不食及上仙號呼涕泗瘦瘠章聖初即位左右引令前導鳴吠徘徊意若不忍章聖令諭以奉陵即摇尾飲食如故詔造大鐵籠施素裀置鹵簿中行路見者流涕李至作桃花犬歌以寄史官錢若水末句云白麟赤鳯且勿喜願君書此懲浮俗古今詩話章聖幸汾隂凝望林嶺間亭檻幽絶意非民俗所居時魏野方教鶴舞俄報有中使至抱琴踰垣而走後冦萊公鎮洛凡三邀不至萊公暇日寫刺訪之野服葛巾布袍長揖萊公禮甚平簡頃之議論騷雅相得甚歡将别謂萊公曰盛刺不復還留為山家之寳萊公再秉鈞軸野常㳺門下顧遇之禮優異等倫一日獻詩曰好去上天辭富貴却來平地作神仙萊公得詩不恱自是禮日益薄即辭去後二年貶通州每題前詩于忩朝夕吟哦之王文正公旦在中書僅二十年魏野贈詩曰聖朝宰相年年出公在中書十四秋西祀東封今已畢可能來伴赤松逰公袖書以進累表求退不許青箱雜記别本云昔時宰相年年出公在中書十一秋西祀東封俱已了如今好逐赤松逰治平中有吉州吉水令忘其姓名治邑嚴酷有野人馬道為啄朩詩諷之曰翠翎迎日動紅觜響烟蘿不顧泥丸及唯貪得食多纔離枯朽朩又上最髙柯吳楚園林闊忙忙爭奈何令見其詩稍緩刑時人目曰馬啄朩翰府名談蔡君謨守福唐政尚嚴肅陳列先生過福唐維舟溪亭留詩於亭上曰溪山龍虎蟠溪水鼓角喧中宵鄉夢破六月夜衾寒風雨生殘朩蛟螭喜怒瀾殷勤告舟子放棹過前灘亭吏録以呈公公遽令追之已不及矣公自此為之少霽威眀同前范希文有贈釣者詩曰江上往來人盡愛鱸魚美君㸔一葉舟出沒風濤裡觀競渡詩曰小艇破濤去旁觀亦損神他年在平地無忽險中人皆不徒作也同前宜春王從謙李璟之第九子好學喜為詩璟於苑中與宰相奕棋從謙在焉令賦觀棋詩曰竹林二君子盡日意沉吟相對雖無語争先各有心恃强知易失守分固難侵若算機籌䖏滄溟想未深楊玢靖夫盧卿之曽孫也仕偽蜀王建至顯官随王衍歸後以老得工部尚書致仕歸長安舊居多為鄰里侵占子弟欲詣府訴其事以状白玢玢批紙尾云四鄰侵我我從伊畢竟湏思未有時試上含元殿基望秋風禾黍正離離子弟不復敢言談苑舒王得請金陵門下有人賣魚一日放魚有門生獻詩云直須自向池邉㸔今日誰非鄭校人公誦久之詩史蒋貽恭蠶詩云辛勤得繭不盈筐燈下繅絲恨更長著處不知來䖏苦但貪身上繡衣裳古今詩話華山鄭雲叟有傷時一絶云㠶力劈開滄海浪馬蹄踏盡亂山青浮名浮利濃如酒醉得人心死不醒又贈霍山秦道士云老鶴啼􅆐伴採芝有時長嘆獨移時翠蛾紅粉嬋娟劍殺盡世人人不知同前宋齊邱江南二世為宰相璟尤愛其才然知其不正一日於華林園試小妓羯鼓召齊邱同宴齊邱獻詩曰切斷牙床鏤紫金最宜平稳玉槽深因逢淑景開佳宴為出花奴奏雅音掌底輕􅀢孤鶴噪枝頭乾快亂蟬吟開元天子曽如此今日将軍好用心同前唐李日知為黄門侍郎安樂公主池館新成中宗臨幸從官預宴賦詩日知尤存規戒其卒篇云所願暫思居者佚莫使時稱作者勞盧任門族甲於天下舉進士三十尚未第為一絶云惆悵興亡係綺羅世人猶自選青娥越王解破夫差國一箇西施已是多同前范文正讜言勁節知無不言仁廟朝數出外補梅聖俞作啄朩詩以見意曰啄盡林中蠧未肯出林飛不識黄金彈雙翎堕落暉同前夏英公慶歴中欲真拜以言者罷除使相知南京到任以一詩寄執政云造化平分荷大鈞腰間新佩玉琪璘南湖不住栽桃李擬狎沙鷗過十春海雁橋邉春水深略無塵土到花隂忌機不取人知否自有江鷗信此心復徙西都張昪知諌院作青雀詩寄之曰弱羽傷弓尚未完孤飛誰敢擬鴛鸞眀珠自有千金價莫為逰人作彈丸昪卒不敢言及之同前于瀆為詩頗干教化對花詩云花開蝶滿枝花謝蝶還希惟有舊巢燕主人貧亦歸又有唐􅍯者與瀆同聲咸多比諷有詩曰天若無雪霜青松不如草地若無山川何人重平道題道傍木云狂風㧞倒樹樹倒根已露上有數枝藤青青猶未悟又曰一日天無風四溟波盡息人心風不吹波浪髙百尺盧懐抒情西京端正朩去馬嵬一驛徳宗幸奉天觀其蔽地錫以美名後有文士題之曰昔日偏霑雨露㤙徳皇西幸賜佳名馬嵬此去無多地好向楊妃塜上生同前羅鄴工詩春逰鬰然有懐云芳草如烟䖏處青閒門要地一時生年來檢㸃人間事惟有春風不世情春雨詩云兼風颯颯灑皇州能帶輕寒阻勝逰昨夜五侯池舘裡佳人驚覺為花愁同前僖宗幸蜀詞人題于馬嵬驛云馬嵬烟栁正依依重見鑾輿幸蜀歸泉下阿蠻應有語這囬休更怨楊妃或云狄侍郎歸昌詩同前鑑戒録云是羅隐詩盧常侍鉟牧廬江日郡軄曹先生悦營妓丹霞者盧沮不許㑹餞客短亭曹獻詩曰拜玉亭間送客忙此時孤恨感離鄉尋思往嵗絶纓事肯向朱門泣夜長盧演為長句和而勉之曰桑扈交飛百舌忙祖亭聞樂倍思鄉樽前有恨慚卑宦席上無憀愛艷粧莫為狂花迷眼界湏求真理定心王逰蜂採掇何時已秖恐多言議短長盧懐抒情李羽能詩五十方擢第嘗獻江淮郡守詩曰塞詔東來淝水濵時情惟望秉陶鈞将軍一陣為功業忍見沙場百戰人盖郡守盧公一舉及第南唐近事景祐中羌人叛四方用兵朝廷求草澤遺逸士多獻方畧自􅃷鬻率皆得官其下材無能往往過望亦有挾持頡頏􅔵望不服者嘗有人題闗西驛舎為詩曰孤星熒熒照寒野漢馬蕭蕭五陵下廟堂不肯用竒謀天下徒勞聘賢者萬里危機入燕薊八方殺氣衝靈夏逢時還似不逢時已矣吾生真茍且東齋録汪自能為文章有平糶詞詩意髙古刺譏中時病云穴垣補墻缺墻成垣已隳斷屨原闕穿履穿屨亦虧汪氏官不達其他著述不傳唐文宗曰嘗觀晋君臣以夷曠致傾覆當時卿大夫過耶李石曰然古詩有之人生不滿百常懐千嵗憂畏不逢也晝短苦夜長暗時多也何不秉燭逰勸之照也臣願捐軀命濟國家惟陛下鑑照不惑則安人强國其庶㡬乎鑑誠録余在黄州與陳慥季常往來每過往之際輙作泣字韻詩一篇季常不禁殺因以此諷之季常既不復殺而里中皆化之至有不食肉者皆云未死神已泣此語使人悽然百斛眀珠盧承丘長沙人披褐居吳芙蓉山常著文為芙蓉集作落韻詩雖一時諷罵聞者亦可為戒題花鈿云傅粉銷金剪翠霞黛烟濃處貼鉛華也知曽伴姮娥笑将來村裏賣誰家又題渡頭船云刳朩功成濟往還古溪殘照下前山㸔㸔向晚人來少猶自湏來覔見錢年八十卒於所居雅言系述東坡云在潁時陳無已趙徳麟軰適亦守官於彼而歐陽叔弼與李默亦又居閒日相唱和而二歐頗不作詩東坡以句批之云君家文律冠西京旋築詩壇按酒兵袖手莫欺真将種致師湏得老門生眀朝鄭伯䧏誰受昨夜條侯壁已驚從此醉翁天下樂還湏一舉百觴傾盖為文忠公昔有詩贈梅聖俞蘇子美云我亦願助勇皷旗噪其旁快哉天下樂一釂宜百觴也王直方詩話景祐中華州張源作絶句云太公年登八十餘文王一見便同車如今君向江邉釣也被官中配㸔魚吟此詩畢入夏州其後元昊反闗中有兵者六七年不解源作是詩以叛去亦足為戒東齊録李清臣北都人方束髪時才俊詞句驚人一日薄逰鄭州時韓公為帥因往見其大祝吏報曰大祝方寝遂求筆為詩一絶書于刺授其吏曰大祝覺則投之詩云公子乗閒卧綵厨白衣老吏慢寒儒不知夢見周公否曽說當年吐哺無青瑣集聶夷中公子詩云種花于西園花發青樓道花下一禾生去之為惡草有三百篇之㫖章子厚謫雷州過小貴州南山寺有僧奉忠子厚見之已而倚檻㸔層雲曰雲多竒峰真善比類忠曰曾記夏雲詩甚竒曰如風如火復如綿飛過微隂落檻前大地生靈乾欲死不成霖雨謾遮天太祖問罪江南李後主用謀臣計欲拒王師法眼禪師觀牡丹於大内作偈諷曰擁毳對芳叢由來趣不同髪從今日白花是去年紅艶冶随朝露馨香逐晚風何湏待零落然後始知空後主不省王師渡江詩話總龜巻一欽定四庫全書詩話總龜巻二宋阮閱撰達
