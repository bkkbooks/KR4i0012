front:
  text: 四十一
  hash: sha256:181626f3e3b4a870fcf03683f80290d5ace9fe7dd7541d627e1e3818a38c7038
body:
  text: 宋阮閱撰送別門劉綜學士出鎮并門两制舘閣皆以詩餞其行因進呈章聖深究詩雅時方競尚西昆體裂彫篆親以御筆選其平淡者得八聮句云夙駕都門曉凉風苑樹秋􅄯逈秋聲和暮角膏雨遂行軒李維置酒軍中樂聞笳塞上情錢惟演關榆漸落邉鴻度勸到劉郎酒十分楊億寒垣古朩含秋色祖帳行塵起夕陽朱巽汾水冷光揺畫㦸䝉山秋色鎻層樓孫僅河朔雪深思愛月并門春煖詠甘棠王昭永極目關河髙倚漢順風鵰鶚逺凌秋劉筠章聖謂綜曰并門唐時皆将相出領凢之官遣從事以題詠作寵其行多刻諸道宫佛寺纂集編聚乆不聞有是作也後綜冩為御選句圗立於晋祠古今詩話王化基詩送梁助曰文章換桂一枝秀清白傳家两弟貧人多誦之談苑天祐中毗陵有慎氏本儒家女三史嚴灌夫娶之數年無子因拾其過而出焉慎氏慨然登舟留詩一章為別曰當時心事已相關雨散雲飛一餉間便挂孤㠶從此去不堪重過望夫山灌夫覽而愧乃留之唐宋遺史唐如意中有女子七嵗能詩則天命賦之皆應聲而就其兄别之而去則天令作詩送兄曰别路人初起離亭葉正飛所嗟人異鴈不作一行歸丞相劉沅與郷人尹鑑少同塲屋丞相既大拜尹方以恩榜得官公以詩送還曰少年相欵老相逢郷舉雖同遇不同我已位登三事後公方名列五班中榮登莫計名髙下宦逹湏由善始終若到郷關人見問為言歸思滿秋風並同上内侍裴愈字益之作詩送魯秀才南逰詩云東吴山水家家月西楚江聲浦浦風又聞蝉云楊栁影踈秋霽雨梧桐葉墜夕陽天唐子方以言事謫冝春監酒待制李師中作詩贈别曰孤忠自許衆不與獨立敢言人所難去國一身輕似葉髙名千古重於山並㳺英俊顔何厚已死奸䛕骨尚寒天意若為宗社計肯教夫子不生還倦逰錄徐鉉仕宦海州蒯亮為録事參軍多與往還未幾亮受代徐餞之詩曰昔年聞有蒯先生二十年來道不行抵掌曽談天下事折腰尤忤俗人情老還上國風光薄貧裏歸装結束輕遷客臨流重惆悵晚風黄葉滿孤城詩史武元衡罷相出鎮西蜀栁公綽與裴度俱為判官公綽先度入為吏部郎中度有詩餞别云两人同日事征西今日公先捧紫泥景祐末元昊叛夏鄭公出鎮長安梅昌言送詩云亞夫金皷從天落韓信旌旗背水陳是時士大夫詩甚多鄭公獨刻昌言詩于石臨川楊智堅嗜學居貧妻厭其饘藿不足求離智堅以詩送之曰平生業在負琹詩頭上而今有二絲漁父尚知溪谷暗山妻不信出身遲荆釵任意撩新鬂鸞鏡從今學畫眉今日便同行路客相逢正是下山時妻持詣州顔魯公為刺史杖其妻而令嫁自後莫有棄其夫者雲溪友議崔涯别其妻詩曰隴上流泉隴下分斷腸嗚咽不堪聞姮娥一入宫中去巫峽千秋空白雲申國長公主為尼掖庭隨出者二十餘人詔两禁送至寺賜齋傳㫖令各賦詩惟陳文僖公彭年詩尚有記者云盡出花鈿散寶津雲鬟齊剪向殘春因驚風燭難留世遂作蓮池不染身貝葉乍翻疑軸錦梵音初學誤梁塵從兹艶質成空後湘浦都無觧珮人都下好事者以鷓鴣天歌之湘山錄朱昂字舉之敭厯清貴二十年晚為工部侍郎懇求歸荆南踰年方允時方劇暑恩㫖曲留許秋凉始行吴淑贈行詩云漢殿夜凉初閣筆渚宫秋晚得懸車錫宴玉津園中傳㫖令賦詩為送李維承㫖云清朝納禄尤强健白首還家正太平陳文惠云部吏百衘通爵里從兵千騎過荆門弟恊亦同時隠皆享眉夀謂之渚宫二踈並古今詩話武公幹常事蒯希逸十餘嵗異常勤幹洎希逸擢第幹辭歸以親在養父堅留不住以詩送之其略云山險不曽離馬後酒醒長見在床前摭言張乖崖在蜀州有録事㕘軍老病廢事公曰胡不歸明日㕘軍求去且以詩留别其略云秋光都似宦情薄山色不如歸興濃公驚曰同僚有詩人而吾不知留而薦之元祐中老人守潁有路都曹者以小疾求致仕老人誦此詩以留之不可乃採前人之意作詩送之曰淮光釀山色先作歸意濃恨無乖崖公一洗芥葉胷百斛明珠張不疑帥鼎文寶往謁後帥辰又謁之既别慨然以二詩贈行曰憶昔荆門屢過從當時心已意冥鴻渚公禅伯唐齊已淮甸詩豪宋惠崇老格踈閑松倚潤清談蕭灑坐生風史君不見髙僧事莫把名㕘伎術中又云碧嶂孤雲苒苒歸觧携情緒異甞時餘生嵗月能多少此别應難問後期玉壺清話狄煥送人逰卲云春江正渺渺送别两依依烟裏棹将逺渡頭人未歸漁家侵叠浪島樹挂殘暉况入湖湘路􅃚堪花亂飛雅言系述元豐三年蘇子由謫官筠州張安道口占一絶送之云因嗟萍梗才名客自歎匏𤓰老病身一榻從兹還倚壁不知重掃是何人已而涕下東坡云安道平生未能出涕向人王崇字極之與先君同在熈河先君自熈河入京相别於中塗送先君云渭城楊栁已青青強往行人聽渭城不問使車歸路逺且從墫酒滿杯傾相逢洮塞休兵後此去秦州照眼明若立螭頭借前箸且教充國事春耕先君誦於吴沖卿丞相緣此知名於朝廷洪駒父有詩送余赴官河内末云眼中人物東西盡肺病京華故倦㳺潘邠老毎誦而喜之李希聲亦有詩送余云散盡平生眼中客煖風晴日閉門居可以相上下也是時紹聖改元之二月並王直方詩話李羣玉好吹笙常使家僮吹之又善急就章性喜食鵞及授校書郎東歸故里盧肇送詩云妙吹應諧鳯工書定得鵞南部新書乾祐三年宣政殿試賢良方正直言極諫科下一十人登科其後牛僧孺等四人皆相次拜相先是白居易在翰林日為考覆官其後僧儒罷相出鎮揚州居易在洛中有詩送曰北闕上東京風光十六程坐移丞相閣春入廣陵城紅斾擁雙節白髭無一莖萬人周路看百吏立班迎閫外君􅈿重樽前我亦榮何湏身自得将相是門生卓異記僕去嵗錢塘十六年而又來留二年乃去平生自覺出處老少相似樂天雖才名相逺而安分寡求亦庶幾焉二月六日來别南北山惠净上人以天竺醜石見贈乃作絶句三首以全樂天之好曰當年衫髩两青青强說重臨慰别情衰髪只今無可白故應相對話来生其二曰出處依稀似樂天敢将衰朽校前賢便從洛社休官去猶有閒居二十年其三曰在郡依前六百日山中不記幾回來還将天竺一峰去欲把雲根到處栽紀詩唐節度使薛嵩有人獻小鬟十三嵗左右手俱有紋隠若紅線因號為紅線十九年方辭嵩去不可留乃餞别請坐客冷朝陽作詩曰采菱歌罷朩蘭舟送客魂消百尺樓還似洛妃乗霧去碧雲無際水長流江淮間有妓徐月英作詩送人曰惆悵人間萬事違两人同去一人歸生憎平望亭前月忍照鴛鴦相背飛崔涯者吴楚狂生與張祜齊名其妻雍氏子荆寶有女青衣曰玉簫才十嵗常令侍韋姜入關家属不行韋乃從歸頭陀寺荆寶遣玉簫住来年稍長乃與韋歡後為廉使陳常侍發遣歸舟人趣行乃以書别荆寶荆寶與玉簫同至相約曰逺不踰六七年當取玉簫歸因留玉簫指環一枚并詩曰黄雀啣来已數春别時難曽贈家人長江不見雙魚至為遣相思夢入秦李納尚書夜登越城樓聞歌曰鴈門山上鴈初飛其聲激切公召至乃去藉之妓盛小叢也梁園供奉南不嫌女甥所唱者乃不嫌昔所授也崔元範自幕府拜侍御史餞於鑑湖光候亭命小叢歌餞坐客各賦詩送之李尚書曰綉衣奔命去情多南國家人歛翠娥曽向教坊聽國樂為公重唱盛叢歌崔御史曰相公留宴峴山亭洛浦髙歌午夜清獨向柏䑓為老吏可憐林朩响餘聲楊判官曰燕趙能歌有幾人落花回雪似含嚬聲隨御史驄歸去誰伴文翁過九春彦升曰蓮府纔為緑水賔忽乘􅍡馬入咸秦為公唱作西河調日暮偏傷去住人盧業支使曰何郎戴豸别賢侯更吐歌珠宴庾樓莫道江南不同醉即陪舟楫上京㳺舉子髙湘曰謝安春渚餞名卿千里仁風一扇清歌黛惨時方酩酊不知公子重飛觥盧溵處士曰烏䑓上客紫髯公共捧天書静鑑中桃葉不湏歌白苧耶溪日暮起樵風崔下句云獨向柏䑓為老吏皆曰御史即其任也何老於柏䑓衆請改之崔曰某但止於此任寧望九遷乎是年秋鞠獄譙中而卒是終於柏䑓之任也並古今詩話劉夢得送人下第詩云今此卜行日髙堂應夢歸莫将和氏淚滴向老萊衣又有詩云新詩一聮出白髪數莖生榜情詩話總龜巻四十一欽定四庫全書詩話總龜巻四十二宋阮閱撰
