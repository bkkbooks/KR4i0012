front:
  text: 四十六宋阮閱撰
  hash: sha256:76c82134cae851c7895a4f7d5d71d2d82b74de878d0a7d3781227f0361f7fecc
body:
  text: 藝術門鍾傳領江西日客有以覆射之法求見傳以厯日包橘置袖中令射客云太嵗當頭坐諸神不敢當其中有一物常帶洞庭香唐宋遺史何龍圖中正初登第聞西川郭從周精於卜乃以縑素求筮從周作一絶贈之云三字來時月正圓一麾從此出秦關錢塘春色濃如酒貪醉花間卧不還公後宦達以三月十五日授知制誥以言邉事忤㫖出知秦州後移杭州而捐舘舎從周之筮何其驗歟黄州東南三十里為沙湖亦曰螺螄店予買田其間因往相田得疾聞麻橋人龎安常善醫而聾遂往求療安常雖聾而頴悟絶人以指畫字不盡數字輙深㑹人意余戯之曰余以手為口君以眼為耳皆一時異人也疾愈與之同㳺清泉寺在蘄水郭門外二里許有王逸少洗筆泉水極甘下臨蘭溪溪水西流余作歌云山下蘭牙短浸溪松間沙路净如泥蕭蕭春雨子䂓啼誰道人生無再少君看流水尚能西休将白髪唱黄雞是日極飲而歸百斛明珠王建宫詞百首多言禁中事皆史傳小說所不載者往往見於其詩如内中數日無呼喚傳得滕王蛺蝶圖之類滕王元嬰髙祖子新舊唐書皆不著其所能惟名畫録略言其善畫亦不言其工蛺蝶也惟見於建詩耳或聞今人家亦有得其圖者唐世一藝之善如公孫大娘舞劍曹剛琵琶米嘉榮歌皆見於唐賢詩句遂知名於後世當時山林田畆潜徳隠行君子不聞於世者多矣而賤工末藝得所附託乃垂名不朽亦各係乎幸不幸爾合淝人傳論言曹谷善星厯衍數談事如神為王冀公作命書云七十年中一一加㺯珠灘上事堪誇碧油幢下聞鳴鳥十日催還上漢槎公年七十二知㐮陽正得千日召還又云周匝将臨壬戌嵗定鼎門前春色異一千日上少三環再入和羮冝盡醉後兾公判西京将七百日再入政府壬戌嵗也又云臨去尚猶聞禁漏異姓佳名在史書兾公薨謝之夕漏将盡無子其婿張環掌䘮事並古今詩話俳優門李家明江南李璟時為樂部頭善滑稽為諷詠璟逰後苑登䑓見牛晚卧璟曰午旦熟矣家明曰臣不學敢上絶句云曾遭寗戚鞭敲角又被田单火燎身閒背斜陽嚼枯草而今問喘更無人左右之臣皆免冠謝罪李氏乃徐温養子及僣􅃅遷楊氏于海陵璟繼統用宋齊邱言無男女少長皆殺之今海陵州宅之東小墳十數皆當時所殺楊氏之族也宋齊邱只一子轍卒逾月慟哭不止家明曰惟臣能止之乃作大紙鳶上大書曰欲興唐祚革強吴盡是先生作計謨一箇孩児􅂸不得上皇百口合何如乗風吹之度至齊邱家遂絶其縷齊邱見之慚感乃止璟於後苑命臣僚臨池而釣諸臣屢引到數十巨鱗惟璟無所獲家明乃進口號曰新甃垂鈎興正濃御池春煖水溶溶凢鱗不敢吞香餌知道君王合釣龍璟善之幸南都畫江為界舟楫多行南㟁至趙北因輟樂停觴北望皖公山謂家明曰好數青峰不知何名家明應聲曰龍舟輕漾錦㠶風正值宸逰望逺空回首皖公山色翠影斜不到夀盃中出江南野録互見談苑所載不同未知孰是江南李氏樂人王感化建州人𨽻光山樂籍建州平入金陵教坊少聰敏未曽執巻而多識善為詞口諧捷急滑稽無窮時本郷節帥更代餞别感化前獻詩曰旌斾赴天䑓溪山曉色開萬家悲更喜迎佛送如來至金陵宴苑中有白野鵲李璟令賦詩應聲曰碧岩深洞恣逰遨天與蘆花作羽毛要識此來棲宿處上林瓊樹一枝髙又題恠石凢八句皆用故事但記其一聫云草中誤認将軍虎山上曾為道士羊談苑楊叔寶郎中與眉州人言頃眉州視事後三日作火排樂人獻口號其末句云為報士民湏慶賀火星去了福星來喜召優人問曰火排致語誰做對曰本州自來舊例只用此一首湘山録丁晉公鎮金陵甞作詩有吾皇寛大容尸素乞與江城不計年之句天聖中李文定公出鎮金陵一日郡宴優人作語意其宰相出鎮所作理必相符誦至落句頂望抗聲曰吾皇寛大容尸素乞與江城不計年賔僚皆俛首文定笑曰是何是何上聞見責歸田録賞花釣魚㑹詩賦往往有宿思者天聖中永興軍進山水石適㑹宴命賦山水石歌盖出不意中生優人入戯各執紙筆作吟哦状其一優人或仆於石上衆扶掖起既起曰累日來作一首賞花釣魚詩准備應制却被這石頭摖倒左右皆大笑翌日降出詩令中書銓定内有鄙惡者落職與外任東齋記竒恠門王謝金陵人世以航海為業一日於海中失舟泛一板登岸見一翁一嫗皆衣皂引謝至所居乃烏衣國也以女妻之既人謝思歸復乘雲軒泛海至其家有二燕棲於梁間謝以手招之即飛來臂上取片紙書小詩繫於燕尾曰誤到華胥國裏來玉人終日苦憐才雲軒飄去無消息灑淚臨風幾百迴來春燕迴徑飛來謝衣上燕尾有詩一云昔日相逢因數合如今暌逺是生離來春縱有相思字三月天南無鴈飛至來嵗燕竟不至因目謝所居為烏衣巷劉禹錫有詩曰朱雀橋邉野草花烏衣巷口夕陽斜舊時王謝堂前燕飛入尋常百姓家摭遺彭城劉景直雍熈間逰華清宫因題詩扵門屏閒云天子多情寵太真六宫専幸掌中身漁陽皷動長安破從此香肌委路塵是夜夢明皇召去論當時事妃子索景直有所贈立作詩曰玉刻水中龍雲牌掲故宫霓裳滿天月粉骨幾春風眉勢從山盡裙腰芳草空共知千古事悽恨與誰同岐王至明皇曰來何晚王曰適杜甫到臣帳中誦哥舒翰詩向臣似有徳色云日月低秦樹山河遶漢宫明皇又曰常愛伊夜闌更秉燭相對如夢寐之句李白終無甫之筋骨至如賈至崔輔國亦闕自然之句張老死把筆無伊一字遂宴飲忽聞寳雲寺鐘聲方覺郭平振武舊将士分配于錢塘給官屋居之屋在修文坊舊為白校書允賃燒藥丹朱欲往而官吏丁踈因逐之乃破爐而去白因召丁踈同飲謂踈曰大藥為吾子所破有小戯術子醒酒乃取盤一面置於膝上以指敲兩腕出五色弹子兩枚化為雙燕而飛白曰僕射髭甚繁燕好去可减些言未畢二燕化為二小劍長五寸餘鋒刄如雨交舞於踈之頥頷間髭落如雪踈懼甚白呼劍下盤中依前成二丸納於左右腕而去錢昭度贈白詩曰袖裏青鋒秋水寒誰疑雙燕是金丸出門風雨如何去空有霜髭在玉盤無諸彭演西逰鄠縣宿甘泉店閒步原野忽有一少年引至一古官舎甚宏壮梁上有紅絲羯皷縚數條垂于地一老人杖而守之演問曰此何處老人曰開元興慶宫也來此者二百年中十二人爾去時莫不為詩請書一絶可乎演為詩曰長安宫闕半蓬蒿塵暗虹梁羯皷縚惟有水天明月夜一條空碧見秋毫演又曰十二人之詠可得聞乎老人舉一章曰小小蓬山刻得成宫簾不動結飛鯨誰将八月天河水瀉到重樓無浪聲此楊尚書所作也又誦一章曰金人無路守瓊山坐見雲生棟宇間忽墜霜飛翠樓曉不知龍尾許誰扳此裴中書所作也再詢楊裴之名則瞪而不答錢仁伉尚父之孫也為元帥府中書檢校司徒與中軍都虞候金沼鄰居沼所居堂東植牡丹花一本着花三百朶其色如血金含稜毎瓶子頂上有碎金絲如自然蛺蝶之状一城以為殊異毎嵗花開張宴仁伉預焉開寶七年春三月花纔一两朶開仁伉一夕洪飲擊劍裎服中单背負大籃左手携鋤腰揷六七首踰墻而過沼中外無知者鋤取牡丹置籃中乃平其地空中聞有吁歎之聲微細若逰蜂音辭曰一花三百朶含笑向春風明年三月裏朶朶㫁腸紅仁伉異之移植於亭後明日沼覺失花為非人力所及來年花盛開乃宴召沼沼一見無語得疾以歸至夜憤悶不已以刀决腸而卒腸皆寸寸斷果符空中之語鄭繼超廣州人赴官鳯翔道逢田㕘軍同行家累千餘人言是東川替罷亦入西京繼超與欵自言路人有荘在北邙山下因問鞍乗極多何也曰亡室人來多年皆蜀中孤寡家子息亦欲旋旋與人繼超曰願得一人乃令妙香與之是夕歸繼超家數年繼超卜居西洛一日忽謂繼超曰妙香非人也今将歸北邙山舊穴願乞同乗至北邙因問田㕘軍何人曰狐也是夕作别妙香歌以送酒曰勸君酒莫辭花落抛舊枝只有北邙山下月清光到死也相隨翌日同至北邙山下老君廟後妙香佯墜馬化為一狐迅走而去並洞微志唐王軒字公逺因逰苧羅山問西施之遺迹留詩於石上曰嶺上千峰秀江邉細草春今逢浣溪石不見浣溪人廻顧見一女子素衣瓊珮謂軒曰妾自吴宫離越國素衣千載無人識當時心比金石堅今日為君堅不得軒知其異又貽詩曰佳人去千載溪山乆寂寞野水浮白烟岩花自開落􅆐鳥舊清音風月閒樓閣無語立斜陽幽情入天幕西子曰子之詩羙矣不盡妾之所寄也乃答軒詩曰髙花岩外曉相鮮幽鳥雨中啼不歇紅雲飛過大江西從此人間怨風月既暮已散期來日㑹扵水濵翌日軒往則西子已在焉又相與飲軒詩曰當時計拙笑将軍何事安邦頼美人一似仙葩入吴國從兹越國更無春西子見之怨慕乆之又曰雲霞出没羣峰外鷗鳥浮沉一水間一自越兵齊振地梦魂不到虎邱山既夜乃散異日又相遇而留者逾月乃歸郭素聞王軒之事逰苧羅留詩於泉石間莫知其數寂無所遇無名子嘲之曰三春桃李苦無言却被斜陽鳥雀喧借問東鄰效西子何如郭素學王軒聞者大笑翰府名談朱休之家犬歌曰言我不能歌聴我歌梅花今年固自可明年當奈何明年兵亂城陷梁亡詩史杜少陵因見病瘧者謂之曰誦吾詩可療病者曰何杜曰夜闌更秉燭相對如夣寐之句瘧猶是也又曰誦吾手提髑髏血模糊其人如其言誦之果愈言感鬼神亦不妄古今詩話石曼卿自少以詩酒豪放自得其氣貌偉然詩格竒峭又工於書筆畫遒勁體兼顔栁為世所好余家甞得唐後主澄心堂紙曼卿為余草書其籌筆驛詩詩曼卿平生所自愛者至今藏之號為三絶真余家寳也曼卿卒後其故人有見之者云恍惚如夣中言我今為仙也所主芙蓉城欲呼故人往逰不得忿然騎一青騾去如飛後又云降於亳州一舉子家其舉子留不得因留詩一篇與之余亦略記其一聫云鶯聲不逐春光老花影常隨日脚流仙事恠不可知其詩頗類曼卿平時語舉子不能道也永叔詩話詩話總龜巻四十六欽定四庫全書詩話總龜巻
