front:
  text: 二十六宋阮閱撰
  hash: sha256:8b0fdc0404a7696505561a2cc313b540ee5a866e1ae8980407775c0c40e230de
body:
  text: 節候門徽宗宣和七年十二月二十一日勅睿謨殿張燈預賞元宵曲宴近臣命左丞王安中中書侍郎馮熙載爲詩以進安中云上帝通明闕神霄廣愛天九光環日月五色麗雲烟紫袖開三極瓊璈列萬仙希夷塵境斷髣髴玉經傳妙道逢昌運真王撫契賢龜圖規大壯龍位正純乾穹昊親無間皇居綴自然剛風同變化祥氣共陶甄層觀星潢上重闉斗柄邊摩空百雉峻冠嶠六鼇連夢想何嘗到階升信有緣昕朝初放仗密宴忽聞宣清禁来鳴佩修郎入並肩獸鋪金半闔鸞障繡微褰霽景留庭砌雷文繪桷梴宫簾波錦漾殿榜字金填花擁巍巍座香浮秩秩筵嵩呼稱萬億韶奏侍三千華歳推堯厯元璣候舜璿氷霜知臘後梅栁認春前造化應呈巧芳菲巳鬬妍樛枝彫檻小多葉露桃鮮錯落飛杯斚鏘洋雜管絃承雲歌歴歴回雪舞翩翩黼幄祥氛合銅壺永漏延鎬京方置醴羲馭自停鞭上聖情彌渥諸臣意更䖍宗藩親魯衞相芾拱閎顛側弁恩光浹中觴詔蹕旋寶熏攜滿袖御果得加籩要賞嬉遊盛儀追步武遄騰身複道表送日夾城壖仰挹蒼龍象旁臨艮嶽巔謳歌紛廣陌簫鼓樂豐年赫奕攢輕幰珍竒集市㕓博盧多袒跣飲肆競蹁躚蕃衍開朱邸崔嵬照彩椽橋虹彎矗矗江練泮濺濺擊柝周廬晚張燈别院先餘霞揺綺暈列宿合珠躔浩蕩三山島棱層十丈蓮再趨天北極却立榻東偏既用家人禮仍占聖製篇兕觥從酩酊蟾魄待嬋娟轉盻隨親指環觀得從穿曲屏紅浪蹙巨柱赤虬纒光透垂枝井晶銜帶璧錢蕭臺千級峻重屋八窓全就席花墪匝行樽紫袖揎交輝方爍爍起立復闐闐䆳宇會寧過中宵勝賞專鋪陳尤有韻清雅不相沿戸箔明珠串欄缸水碧巻規模商􅀈鉒欵識魯壺鐫秦曲移筝柱唐粧儼鬢蟬窄襟珠綴領髙朶翠為鈿喜氣排寒沍輕颸洗静便層琳藉璣組方鼎炷龍涎瑪瑙供盤大玻璃琢琖圓暖金傾小榼屑玉釀新泉帝子天才異英姿棣萼聨頻看揮斗盌端是吸鯨川推食俱均逮攘餐及墜捐海螯初破殻江柱乍離淵寧數披綿雀休論縮頸鯿南珍誇飣餖北饌厭烹煎賜橘懐頳卵酡顔釂寶船言歸荷慈惠末節笑拘攣放鑰嚴扃啓籠紗逸足牽氷輪挂銀漢夜色映華韉人識重熈象功參獨斷權五辰今不忒六氣永無愆天紀承三古時雍變八埏比閭増版籍疆埸罷戈鋋文軌包夷夏弦歌徧幅員恢儒榮藻茆作士極魚鳶慶胄貽謀顯多男景福緜迓衡常穆穆遵路益平平亭障今踰隴耕耘久際燕信通鵬海漲威竄犬戎羶東擬封雲岱西將款澗瀍琳科宣蕊笈玉府下雲軿帝耤勤初播宫蠶長自眠繭絲登六寢稃米秀中田廟祀垂昭格壇光監吉蠲靈芝滋菌蠢甘醴湧潺湲合教龎風革頒經衆疾痊雨隨親禱降河避上流遷執契皇猷洽披圖福物駢太和輸槖籥妙用絶蹄筌此際君臣恱應先簡冊編雅稱魚罩罩頌述鼓咽咽詎比千齡遇猶聞四始箋羇臣起韋布陋質愧駑鉛驟俾陪機政由来出眷憐恩方拜綸綍報未効塵涓宻席叨臨勸凡踪第曲拳雖無三峽水曽步八花甎踰望知難稱非才合勉旃鈞天思盡賦賸續白雲牋熈載云化工欲放陽春到先教元冥戮衰草凝氷封地萬木僵誰向雪中探天巧璿璣星回斗指寅羣芳未知時巳春人心蕩漾趂佳節燈夕獨冠年華新昇平萬里同文軌井邑相連通四裔蘭膏競吐夜烘春和叔回車避羲轡巍巍九禁倚天開温風更覺先春来試燈不用雨花落迎陽爲却寒崔嵬宣和初載元冬尾瑞白纔消塵不起穆清光賞屬欽鄰錦繡雲龍頒宴喜初聞傳詔開睿謨步障㡬里承金鋪調音度曲三千女正似廣樂陳清都遏雲妙唱韓娥侣回雪飛花稱獨步千春蟠朩效紅英獻壽當筵豈金母上林晚色烟藹輕景龍遊人歡笑聲霞裾月佩擁仙仗翠鳳挾輦趨平成銅華金掌散晶彩翠碧重重簇珠琲先從前殿望脩廊日出綺霞紅茜海神光通透雲母屏驪龍出舞波濤驚煌煌黼座承天命座下錯落如明星榻前玉案肴核旅獸炭銀爐夜初鼓憲天重屋訝雲屯崇道簫臺疑蜃吐前楹火柱回萬牛藺卿璧碎色光浮周圍照耀眼界徹氷壺漾月生珠流㸃㸃金錢盡銜璧豹髓騰輝粲銀礫絲篁人籟有機緘皦繹清音傳屋壁須臾隨蹕登會寧如驂鸞鶴遊紫清彩蟾倒影上浮空纎雲不㸃惟光明四壁垂簾圍煖玉銀缸吐艶相連屬棼楣横帶碧玻璃一朶翠雲承日轂萬光閃爍争吐吞燭龍銜耀輝西崑又如電母神鞭馳金蛇著壁不可捫端信竒工通造化豈比胡人能幻假丹青漫數顧虎頭盤礴解衣催客冩此時帝御鈞天臺紫垣兩兩明三台尚方飲器萬金寶古玉未足誇雲雷帝旁侍女雲華品玉立仙標及時韻四音促柱泛笙簫應有翔鸞落千仞龍瓶㵼酒如流泉御厨絡繹紛珍鮮榻邊争欲供天笑快倒頗類鯨吸川厭厭夜飲方歡浹玉漏頻催鼓三疊金門初下醉歸時正見氷輪上城堞微臣去歳陪清班惡詩誤辱重曈觀小才易窮真鼠技再賦愈覺相如慳履道彦為二集中今不復印行故錄於此荆楚記云屈原以五月五日投汨羅而死人傷之以舟檝拯焉故武陵競渡用五月五日蓋本諸此劉夢得云今舉檝相和之音皆曰何在蓋所以招屈原也詩曰湘江五月平隄流邑人相將浮彩舟靈均何在歌已矣哀音振檝從此起又有招屈亭詩所謂曲終人散空江暮招屈亭前水東注是也今江浙間競渡多用春月疑非招屈之義及考沈佺期三月三日獨坐驩州詩云誰念招魂節翻爲禦魅囚王績三月三日賦亦云新開避忌之席更作招魂之所則以上巳爲招屈之時其必有所據也予觀琴操云介子推五月五日焚林而死故是日不得發火而異苑以爲寒食始禁烟蓋當時五月五日以周正言之耳今用夏正乃三月也屈原以五月五日死而佺期王績以上巳爲招魂之節者亦豈是耶歳時有祓除不祥之具而元日尤多如桃版葦索磔雞之類是也飲屠蘇酒亦所以祓瘟禳惡而法必自幼飲何耶顧况歳日口號云還丹寂寞羞明鏡手把屠蘇先少年白樂天元日贈劉夢得詩亦云與君同甲子歳酒合誰先元日飲酒則先卑而後尊自唐以来已如此矣四時月令云進椒酒次第當從小起而董勛告晉海西公曰小者得歳故先酒賀之老者失歳故後與酒似亦不爲無理並丹陽集先文康公晚歳卜居於寶溪之上建觀禊堂於水濱紹興癸丑與客汎舟修禊甚樂距永和癸丑不知其㡬癸丑也因與客相與推算自永和九年歳甲子一周爲晉義熈九年又一周爲宋元徽元年自後梁大通元年隋開皇十三年唐永徽四年開元元年大厯八年太和七年景福二年周顯徳二年本朝祥符六年熙寧六年皆歳在癸丑凡七百八十年矣乃作詩以紀其事云快雨霽亭午晴曦作春妍鄰曲饒勝士共開浮水筵中流愜嘯詠隱浪金壺偏紅芰初出水捧劍疑来前緬懐蘭亭會七百八十年可憐右軍癡生死情纒綿由来彭殤齊顧或謂不然吾黨殆天放卜夜就管絃尺六細腰女舞袖輕回旋且畢今日歡不期来者傳同上上巳日於流水上洗濯祓除去宿垢故謂之祓禊禊者潔也王逸少作蘭亭叙云永和九年歳在癸丑會於會稽山隂之蘭亭修禊事也當其羣賢畢集遊目騁懐之際而感慨係之乃有一死生爲虚誕齊彭殤為妄作之語議者以此咎羲之之未達也同上自冬至一百五日至寒食故世言寒食皆稱一百五杜子美一百五日夜對月云無家對寒食有淚如金波姚合寒食書事詩云今朝一百五出戸雨初晴則是詩人例以百五日爲寒食也或者乃謂自冬至至清明凡七氣至寒食止百五日殊不知厯家以餘分演之也司馬彪續漢書云介子推焚林而死故寒食不忍舉火至今有禁烟之說盧象所謂子推言避世山火遂焚身四海同寒食千秋爲一人是也太原一郡舊俗禁烟一月周舉為郡守以人多死移書惟秪禁烟三日子美清明詩云朝来新火起又家人鑽火用青楓皆在寒食三日之後則知禁烟止於三日也而韓翃有寒食即事詩乃云春城無處不飛花寒食東風御栁斜日暮漢宫傳蠟燭青烟散入五侯家不待清明而巳傳新火何耶元微之連昌宫詞云初過寒食一百六店舎無烟宫樹綠念奴覓得又連催特勅宫中許然燭一百六在清明前寒食之後是時店舎巳無烟而宫中然燭乃一時之權宜爾或云龍星朩之位也春屬東方心爲大火懼火盛故禁火是以寒食有龍忌之禁則所謂禁烟又未必爲子推設也同上詩話總龜後集巻二十六欽定四庫全書詩話總龜後集巻二十七宋阮閱撰
