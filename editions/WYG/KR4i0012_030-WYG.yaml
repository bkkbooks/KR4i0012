seq: 30
front:
  text: 因話錄載其家兵部君性尤嗜茶能自煎謂
  hash: sha256:4802e0a21eafea506602fe497de0ec9c3e633ffac66b5789ebd6ee02ce1f759c
body:
  text: 人曰茶須緩火灸活水煎坡有活水還須活火烹恐亦用此黄常明五代時鄭遨茶詩云嫩芽香且靈吾謂草中英夜臼和烟搗寒爐對雪烹維憂碧粉散常見綠花生最是堪珍重能令睡思清范文正公詩云黄金碾畔綠塵飛碧玉甌中翠濤起茶色以白爲貴二公皆以碧綠言之何邪三山老人語錄茶之佳品造在社前其次則火前謂寒食前也其下則雨前謂穀雨前也佳品其色白若碧綠者乃常品也茶之佳品芽蘖細微不可多得若此數多者皆常品也茶之佳品皆㸃啜之其煎啜之者皆常品也齊己茶詩曰甘傳天下口貴占火前名又曰髙人愛惜藏巖裏白甀封題寄火前丁謂茶詩曰開緘試新火須汲逺山泉凡此皆言火前蓋未知社前之品為佳也鄭谷茶詩曰入坐半甌輕泛綠開緘數片淺含香鄭雲叟茶詩曰維憂碧粉散常見綠花生沈存中論茶謂黄金碾畔綠塵飛碧玉甌中翠濤起宜改綠為玉翠為素此論可也而舉一夜風吹一寸長之句以爲茶之精美不必以雀舌鳥觜為貴今按茶至於一寸長則其芽葉大矣非佳品也存中此論曲矣盧仝茶詩曰開緘宛見諫議面手閱月團三百片薛能謝劉相公寄茶詩曰兩串春團敵夜光名題天柱印維揚茶之佳品珍踰金玉未易多得而以三百片惠盧仝以兩串寄薛能者皆下品可知也齊己詩角開香滿室爐動綠凝鐺丁謂詩曰芽細烹還好鐺新味更全此皆煎啜之也煎啜之者非佳品矣唐人於茶雖有陸羽爲之說而評論未精至本朝蔡君謨茶錄既行則持論精矣以茶錄而覈前賢之詩皆未知佳味者也同上唐以前茶惟貴蜀中所産孫楚歌云茶出巴蜀張孟陽登成都樓詩云芳茶冠六清溢味播九區他處未見稱者唐茶品雖多亦以蜀茶為重然惟湖州紫筍入貢毎歳以清明日貢到先薦宗廟然後分賜近臣紫筍生顧渚在湖常二境之間當採茶時兩郡守畢至最為盛會杜牧詩所謂溪盡停蠻棹旗張卓翠苔栁村穿窈窕桃澗渡喧豗劉禹錫何處人間似仙境春山攜妓採茶時皆以此建茶絶無貴者僅得挂一名爾至南唐李氏時漸見貴始有團圏之製而造作之精經丁晉公始大備自建茶出天下所産皆不復可數今其處壑源沙溪土地相去丈尺之間品味已不同謂之外焙况他處乎則知雖草朩之微其顯晦亦自有時然唐自常衮以前閩中未有讀書者自衮教之而歐陽詹之徒始出而終唐世亦不甚盛今閩中舉子常數倍天下而朝廷將相公卿毎居十四五人物尚爾况草朩微物也顧渚湧金泉毎造茶時太守先祭拜然後水漸出造貢茶畢水稍減至供堂茶畢巳減半太守茶畢遂涸蓋常時無水也或聞今龍焙泉亦然苕溪漁隠曰北苑官焙也漕司歳以入貢茶爲上壑源私焙也土人亦入貢茶為次二焙相去三四里間若沙溪外焙也與二焙相去絶逺自隔一溪茶爲下山谷詩云莫遣沙溪来亂真正謂此也官焙造茶常在驚蟄後一二日興工採摘是時茶芽巳皆一槍蓋閩中地暖如此舊讀歐公詩有喊山之說亦傳聞之訛耳龍焙泉即御泉也水之増減亦隨水旱初無漸出遂涸之異但泉水極甘正宜造茶耳蔡寛夫詩話蜀中數處産茶雅州䝉頂最佳其生最晚在春夏之交其地即書所謂蔡䝉旅平者也方茶之生雲霧覆其上若有神物護持之東齋紀事茶古不著所出本草云出益州唐以䝉山顧渚蘄門者爲上品尚雜以蘇椒之類故李泌詩云旋沫翻成碧玉池添蘇散出琉璃眼遂以碧色為貴止曰煎茶不知㸃試之妙大率皆草茶也陸羽茶經統言福建泉紹等十州所出者其味極佳而只今建安為天下第一遯齋閒覽鄭可簡以貢茶進用累官職至觀文殿修撰福建路轉運使其姪千里於山谷間得朱草可簡令其子待問進之因此得官好事者作詩云父貴因茶白兒榮為草朱而千里以從父奪朱草以予子譊譊不巳待問得官而歸盛集為慶親姻畢集衆皆贊喜可簡云一門僥倖其姪遽云千里埋寃衆皆以為的對是時貢茶一方騷動故也苕溪漁隠曰余觀東坡茘支歎注云大小龍茶始於丁晉公而成於蔡君謨歐陽永叔聞君謨進小龍團驚歎曰君謨士人也何至作此事今年閩中監司乞進鬭茶許之故其詩云武夷溪邊粟粒芽前丁後蔡相籠加争新買寵各出意今年鬭品充官茶則知始作俑者大可罪也髙齋詩話詩云誰謂荼苦爾雅云檟苦茶注樹似梔子今呼早采者爲茶晚采者為茗一名荈蜀人名為苦茶故東坡乞茶栽詩云周詩記苦荼茗飲出近世初緣厭粱肉假此雪昏滯蓋謂是也六一居士嘗新茶詩云泉甘器潔天色好坐中揀擇客亦佳東坡守維揚於石塔寺試茶詩云禪窓麗午景蜀井出氷雪坐客皆可人鼎器手自潔正謂諺云三不㸃也苕溪漁隠葉濤詩極不工而喜賦詠嘗有試茶詩云碾成天上龍兼鳳煑出人間蟹與蝦好事者戲云此非試茶乃碾玉匠人嘗南食也西清詩話唐相李衞公好飲惠山泉置驛傳送不逺數千里而近世歐陽少師作龍茶錄序稱嘉祐七年親享明堂致齋之夕始以小團分賜二府又給一餅不敢碾試至今藏之時熈寧元年也吾聞茶不問團餅要之貴新水不問江井要之貴活千里致水真僞固不可知縱令識真已非活水自嘉祐七年壬寅至熈寧元年戊申首尾七年更閱三朝而賜茶猶在此豈復有茶也哉苕溪漁隠曰壬午之春余赴官閩中漕幕遂得至北苑觀造貢茶其最精即氷芽細如針用御泉水研造社前巳嘗貢餘毎片計工直四萬錢分試其色如乳平生未嘗曽啜此好茶亦未嘗嘗茶如此之早也唐子西鬭茶記魯直諸茶詞余謂品令一詞最佳能道人所不能言尤在結尾三四句詞云鳳舞團團餅恨分破教孤冷金渠休浄隻輪慢碾玉塵光瑩湯響松風早減二分酒病味濃香永醉鄉路成佳境恰如燈下故人萬里歸来對影口不能言心下快活對省苕溪漁隠東坡詩春濃睡足午窓明想見新茶如潑乳又云新火發茶乳此論皆得茶之正色矣至贈謙師㸃茶則云忽驚午盞兔毫斑打作春甕鵞兒酒蓋用老杜詩鵞兒黄似酒對酒愛鵞兒若是則色黄烏得為佳茗矣今東坡全集不載此詩想自知其非故刪去之同上臘茶出於建劍草茶盛於兩浙兩浙之品日注為第一自景祐以後洪州雙井白芽漸盛近歳製作尤精囊以紅紗不過一二兩以常茶十餘斤養之用辟暑濕之氣其品逺出日注上遂為草茶第一苕溪漁隠曰醉翁又有雙井茶詩云西江水清江石老石上生茶如鳳爪窮臘不寒春氣早雙井芽生先百草白毛囊以紅碧紗十斤茶養一斤芽長安富貴五侯家一啜猶須三日誇蔡君謨好茗飲又精於藻鑒答程公闢簡云向得雙井四兩其時人還未識叙謝不悉尋烹治之色香味皆精好是為茗芽之冠非日注寶雲可並也涪翁尤譽雙井蓋鄉物也李公擇有詩誚之戲作解嘲云山芽落磑風回雪曽與尚書破睡来勿以姬姜棄憔悴逢時瓦釡亦鳴雷又答黄冕仲索煎雙井并簡王揚休詩云江夏無雙乃吾宗同舎頗似王安豐能澆茗椀前祓我風袂欲挹浮邱公吾宗落筆賞幽事秋月下照澄江空家山鷹爪是小草敢與拜賜雲龍同不嫌水厄幸来辱寒泉湯鼎聽松風同上世言團茶始於丁晉公前此未有也慶厯中蔡君謨為福建漕使更製小團以充歳貢元豐初年建州又製密雲龍以獻其品髙於小團而其製益精矣曽文韶所謂莆陽學士蓬莱仙製成月團飛上天又云宻雲新様尤可喜名出元豐聖天子是也唐陸羽茶經於建茶尚云未詳而當時獨貴陽羨茶歳貢特盛茶山居湖常二州之間修貢則兩守相會山椒有境會亭基尚存盧仝謝孟諫議茶詩云天子須嘗陽羨茶百草不敢先開花是已然又云開緘宛見諫議面手閱月團三百片則團茶巳見於此當時李郢茶山貢焙歌云蒸之馥馥香勝梅研膏轉動聲如雷茶神拜表貢天子萬人争喊春山摧觀研膏之句則知嘗為團茶無疑自建茶入貢陽羨不復研膏祇謂之草茶而巳葛常之昨夜夢參寥師攜軸詩見過覺而記其飲茶兩句云寒食清明都過了石泉槐火一時新夢中問火固新矣泉何故新答曰俗以清明淘井當續成詩以記其事東坡詩話總龜後集巻三十欽定四庫全書詩話總龜後集巻
