front:
  text: 理門世傳馮瀛王詩有曰窮達皆由命何勞發歎聲但知行
  hash: sha256:b7b3236299b338012e12c8bb8240900c7ea9620f50ad5f8f79ad64489868720a
body:
  text: 好事莫要問前程冬去冰湏泮春來草自生請公觀此理天道甚分眀又曰莫為危時便愴神前程往往有期因湏知海嶽歸眀主未必乾坤䧟吉人道徳㡬時曽去世舟車何處不通津但教方寸無諸惡狼虎叢中也立身達者之言也青箱雜記張文定公齊賢嘗作詩自戒并貽子孫曰慎言渾不畏忍事又何妨國法湏遵守人非莫舉揚無私仍克已直道更和光此箇如端的天應降吉祥余廣為八詩其一曰慎言渾不畏言出患常随湏信樞機發寜容駟馬追三緘事可見兩舌業當知言是起羞本憑公且再思其二曰忍事又何妨勿令心火揚火揚猶可滅心忿固多傷堪嘆波羅蜜可憐歌利王從心更從刄字意好推詳其三曰國法湏遵守金科盡詔條一毫如有犯三尺不相饒豈用誇奸黠何湏恃貴驕自然逢吉慶神理亦昭昭其四曰人非莫舉揚萬事且包蔵殿上涎湏掩車中吐不妨在他誠所短于已有何長湏是常拘檢回頭自忖量其五曰無私仍克已克已又無私二事兼修飭終身在省思公清多歛怨髙亢易招危更切循卑退方應履坦夷其六曰直道更和光雙修譽乃彰直湏和輔助和乃直交相恃直終多忤偏和又少剛能和又能直行已自芬芳其七曰此個真端的除非六句修永為几杖誡更遺子孫謀本立方生道農勤乃有秋茲詩雖淺近至理可推求其八曰天應降吉祥天理本茫茫舒惨雖無定榮枯却有常益謙尤効騐福善更昭彰籠絡無踈漏恢恢四網張同前王文恵公随深悟性理臨終作詩曰畫堂燈欲滅彈指向誰說去住夲尋常春風掃殘雪同前謝諌議臨捐館作詩云平生功業數張紙千古英雄一窖塵何似從來周孔教解将仁義浸生民見聞録皎然禪師贈吳馮處士詩云世人不知心是道只言道在他方妙還如瞽者望長安室在東南向西笑東坡代答曰寒時便具熱時風飢漢那知食藥功莫怪禪師向西笑縁師身在長安東百斛文陶淵眀飲酒詩云善養千金軀臨化消其寳寳不過軀軀化則寳亡矣人言靖節不知道吾不信也余與郭生逰寒溪主簿吳亮置酒郭生善作挽歌酒酣發聲座為凄然郭生言恨無佳詞因為略改樂天寒食詩歌之坐客有泣者其詞曰鳥啼鵶噪昏喬朩清眀寒食誰家哭風吹曠野紙錢飛古墓纍纍春草緑棠梨花映白楊路盡是死生離别處冥漠重泉哭不聞蕭蕭暮雨人歸去每句雜以散聲人間有漏仙兀兀三杯醉世上無眼禪昏昏一覺睡雖然無交渉其柰畧相似相似尚如此何况真箇是予奉使閩西見邸璧書此愛而誦之故海上作濁醪有妙理賦曰嘗因既醉之適方識此心之正此老氏言心之正與孟子言人之性善何異並同前舒王當位多進用文士蘇䑓盧中甫作詩以見志云青衫白髪病叅軍旋糶官粮買酒尊但得有錢留客醉何湏騎馬傍人門雅言雜載杜祁公致政後作林下書懐詩曰從政區區到白頭一生寜肯顧恩仇雙鳬乗雁常深愧野馬黄牛亦過憂豈是林泉堪佚老祇縁蒲栁不禁秋始終幸㑹承平日樂聖唯能擊壤謳青箱雜記李建勲年八十謁宋齊丘於洪州題一絶于信果觀壁云春來漲水流如活曉後西山勢似行玉洞主人經刼在擕竿歩歩就長生歸髙安無病而卒青璅後集東坡逰廬山至東林作二偈曰溪聲便是廣長舌山色豈非清净身夜來八萬四千偈他日如何舉似人横㸔成嶺側成峰逺近㸔山了不同不識廬山真面目祇縁身在此山中山谷曰此老於般若横說豎説了無剰語非筆端有口安能吐此不傳之妙冷齋夜話博識門徐鍇仕江左至中書舎人時吳淑為校理古樂府中摻字者淑多改為操字盖章草之變鍇曰非可一例言若漁陽掺者七鑑切三撾皷也禰衡作漢陽掺撾古歌云邉城晏聞漢陽掺黄塵蕭蕭白日暗淑歎服談苑商汝山中多麝絶愛其臍每為人所逐勢且急即自投髙巖舉𤓰裂出其香就縶而死猶拱四足以保其臍李商隐詩曰投巖麝退香許渾詩云尋麝采生香是也狨類䑕而大尾長金色川峽深山中人以藥箭射之取其皮為卧褥鞍被坐毯之用甚愛其尾既中毒即嚙斷尾以擲之惡為身患杜甫詩云狨擲寒條馬見驚盖輕捷喜縁朩􅆐猱之類也犛牛出西域尾長而勁中國以為纓人或射之亦自斷其尾左氏所謂雄雞自斷其尾同前李義山詩小鼎烹茶面曲池白鬚道士竹間棋何人書破蒲葵扇記着南忩移樹時蒲葵扇出謝安傳然人不知其何名蒲葵蘇子容云椶櫚也出廣雅今衢杭宣歙間扇是也謂彩似蒲葵爾詩史梅聖俞河豚詩云春岸飛揚花永叔謂河豚食楊花則肥韓渥詩栁絮覆溪魚正肥大抵魚食楊花則肥不必河豚隴西地名魚龍出石魚掘地得石破其中有魚㾗鱗甲纎悉皆具燒之有魚氣盖魚蟄泥而變為石衡州亦有無異隴西者故杜云水落魚龍夜山空鳥鼠秋正隴州詩南部烟花録文理極俗又載陳叔寳詩云夕陽如有意偏傍小忩眀此乃唐人方棫詩非叔寳作兼六朝人大抵不如此唐藝文誌載烟花録乃記廣陵行幸事此本已無唐末人偽作此書爾詩史歐陽文忠愛林逋詩草泥行郭索雲木呌鉤輈以謂語新而屬對親切鉤輈鷓鴣聲也郭索蠏行貎太元曰蠏之郭索用心躁也古今詩話古詩云慱山爐中百和香欝金蘇合及都梁又氍毹􅂒􅚊五木香迷迭艾納及都梁嘗按唐志都梁香出交廣形如藿迷迭出西域魏文帝又有迷迭賦信乎不行一萬里不讀萬巻書不可㸔老杜詩也王直方詩話前世所稱駔儈駔子黨切今人謂之牙韓文公贈玉川詩曰水圵山人得名聲去年去作幕下士水南山人又繼往鞍馬僕從塞閭里少室山人索價髙兩以諌官招不起又云先生抱才湏大用宰相未許終不仕故向子直謂韓公與䖏士作牙牙商度物價也駔儈為牙者世不曉所謂道源云本謂之互即互市事爾唐人書互字作㸦㸦字似牙字因轉讀為牙其理如可信或云安得舉世同辭盖不足恠今人以萬為万以千為丿亦人人道之也貢父詩話楊大年因奏事論及比紅兒詩大年不能對甚以為恨訪比紅兒詩終不可得忽一日鬻書者有小編眡之乃比紅兒詩也自此士大夫始傳之此詩乃羅虬所為凢百首盖當時但傳其詩不載名氏大年偶不記爾筆談余靖尚書使虜為胡詩契丹愛之再往情益親余詩云夜筵設羅侈盛也臣拜洗受賜也兩朝厥荷通好也情幹勒厚重也微臣稚魯拜舞也祝若統福祐也聖夀鐵擺嵩髙也俱可忒無極也又舉大杯謂余曰能道此余為卿飲復舉之因大笑遂為酧觴漢史記槃朩白狼詩漢語則協夷語則否其實夷人先作詩反用夷語譯出不如余真胡語也詩史山谷云余讀周書月令云反舌無聲佞人在側廼解老杜百舌詩過時如發口君側有䜛人之句直方詩話永眀禪師記曰有禪師夜經行誤踐𤓰皮意其蝦䗫也死堕惡道又有山行人為蛇螫而意觸樹樁行三十里遇筮醫識之告曰蛇螫也發毒而死使行人不遇筮醫毒遂不發比丘知是𤓰皮不堕惡道古徳偈曰惡境自虚不湏畏終朝照矚元無對設使任他浮幻身任運都無舌身意冷齋夜話幼敏門楊文公年十一嵗建州送入闕下章聖親試一賦二詩頃刻而成令送中書再試叅政李至状臣等言仰送建州十一嵗習進士楊億到中書其人來自江湖對天陛殊無震惕盖聖祚承平神童間出臣等令賦喜朝京闕詩五言六韻頃刻而成詩曰七閩波𣺌漠雙闕勢岧嶤曉登雲外嶺夜渡月中潮斷句願秉清忠節終身立聖朝又楊文公數嵗不能言一日家人抱登樓忽觸其首便能語家人曰既能言可為詩乎曰可遂吟登樓詩云危樓髙百尺手可摘星辰不敢髙聲語恐驚天上人古今詩話夏文荘試制科廷對出殿門楊徽之見其年少遽邀與語曰老夫他則不知唯喜吟詩願丐賢良一篇以卜他日之志忻然為書曰殿上衮衣眀日月硯中旗影動龍蛇縱横禮樂三千字獨對丹墀日未斜青箱記眀皇御勤政樓大張音樂教坊王大娘善戴竿於百尺上為木山状瀛洲方丈命小兒持絳節出入其間舞亦不輟劉晏以神童為秘書省正字年十嵗慧悟過人召於簾中坐貴妃膝上為施粉黛與戴巾櫛問晏汝為正字官而來正得何字曰天下字皆正惟朋字未正貴妃令詠王大娘戴竿晏曰樓前百戯競争新惟有長竿妙入神誰謂綺羅翻有力猶自嫌輕更着人眀皇雜録蘇瓌未知男頲有人獻兎掛於廊廡間召頲詠詩兎子死䦨彈将來掛竹竿試将眀鏡照何異月中㸔由是稱為小許公開元傳信記京兆尹訪蘇瓌既去瓌令男頲詠尹字乃曰丑雖有足甲不成身見君無口知伊少人其敏㨗如此眀皇問瓌草書難其人誰可瓌曰臣不知其他臣男頲為文甚速可􅍯使令然性嗜酒幸免沉醉足以了事令召至則酒未解猶嘔殿下命中貴人扶卧御幄前眀皇親舉衾覆之既醒援筆立就眀皇撫背曰知子莫若父眀皇雜録徐鍇字楚金年十餘嵗羣從宴集分題賦詩令為秋詞援筆立成其畧曰井梧分堕砌塞鴈逺横空雨久莓苔紫霜濃薜荔紅詩史林傑字智用五歳與父同逰王仙君壇父曰能詩乎傑曰羽客已登雲路去丹砂草朩盡凋殘不知千嵗歸何日空使時人掃舊壇又謁唐中丞作七夕詩曰七夕今朝㸔碧霄牽牛織女渡河橋家家乞巧望秋月穿盡紅絲㡬萬條唐公曰真神童也年十嵗方秋初忽有雙鶴盤空而下忻然下堦抱得一隻父恐非祥令放之鶴升空而去是夕得疾而卒鄭立之以詩哭之曰才髙未及賈生年何事孤魂逐逝川螢聚帳中人已去鶴離䑓上月空圓古今詩話李琪十嵗通六經父佐王鐸滑州幕聞而異之㑹府燕鐸遣人以三傑賦試之琪作賦尾句云得士則昌非賢罔共龍頭之友斯貴鼎足之臣可重冝哉項氏之所以亡有一范増而不能用鐸曰大器也他日謁帥帥謂琪曰蜀中詔到用夏州托㧞思恭為北京牧復都統可作詩否琪曰飛騎日邉來何時玉輦回早平闗右賊莫待詔書催鐸益異之王元之内翰五嵗已能詩因太守賞白蓮倅言元之能詩語於太守因召而吟一絶云昨夜三更後姮娥堕玉簮馮夷不敢受捧出碧波心又云佳人方素面對鏡理新粧守曰天授也邱瑃十嵗謁陳州太守曰前日寺中聞射因成詩云殿宇時聞燕雀鳴虚庭盡日少人行孤吟獨坐情何限時喜風傳中鵠聲守喜令對弱栁􅁝􅁝搓緑線曰春雲片片揭新綿蒋堂侍郎方六嵗父令作梔子花詩曰庭前梔子樹四畔有椏权未結黄金子先開白玉花崔鉉相為童時随父謁韓滉指架上鷹令作詩曰天邉心膽架頭身欲擬飛騰未有因萬里碧霄終一去不知誰是解絛人李賀字長吉唐諸王孫七嵗以長短之製名動京師韓文公皇甫湜過其父晉肅見其子總角荷衣而出二公不之信因面試一篇賀承命忻然操觚染翰旁若無人仍目曰髙軒過華裾織翠青如䓗金環壓轡揺玲瓏馬蹄隐耳聲隆隆入門下馬氣如虹云是東京才子文章鉅公二十八宿羅心胸殿前作賦聲摩空筆補造化天無功元精烱烱貫當中龎眉書客感秋蓬誰知死草生華風我今垂翅負㝠鴻他日不羞蛇作龍二公大驚以所乗馬聫鑣而還所居親為束髪年未弱冠丁内艱他日舉進士或謗賀不避家諱韓文公特著諱辨一篇不幸未壮室而終並同前冦元弼言徐州通判李綯有子七嵗不善詩忽詠落花詩云流水難窮目斜陽易斷腸誰同砑光㡌一曲舞山香父驚問之若有物憑者自云是謝中舎問砑光㡌事西王母宴羣仙有舞者戴砑光㡌㡌上簮花舞山香曲未終花皆落百斛文賈文元乃唐相造華夷圖丞相耽之逺孫七嵗童子舉闗頭及第李文賀贈詩云七嵗神童古所難賈家門戸有衣冠七人科第排頭上五部經書誦舌端見榜不知名字貴登筵未識管絃歡從茲稳上青霄路萬里誰能測羽翰太平興國中叅大政玉壺清話蘇州童子劉少逸年十一文辭精敏有老成體其師潘閬擕以見長洲􅈗王元之吳縣􅈗羅思純以所作贄二公二公名重當時疑所贄假手未之信因試之與之聫句畧不淹思思純曰無風烟熖直少逸曰有月竹隂寒又曰日移竹影侵棋局少逸曰風逓花香入酒尊元之曰風雨江城暮少逸曰波濤海寺秋元之曰一回酒渇思呑海少逸曰㡬度詩狂欲上天二公驚異至聞於朝賜進士及第官止尚書員外郎續歸田録孫周翰精敏亦少逸之流其父穆之擕以見郡侯時賞春作㑹座客簮花郡侯屬周翰曰口吹楊葉成新曲翰曰頭戴花枝學後生郡侯笑曰何遽便戯老夫賜童子出身馬希振為鼎州節度使馬氏諸子中白眉也與門下客何致雍僧貫徽聫句希振曰青蛇每用腰為力貫徽曰紅莧時将葉作花又見蟻子縁砌希振曰蟻子子㘅䖝子子雍曰猫兒兒捉雀兒兒實一代之雋並同前黄鑑學士七嵗而不言其祖愛之以為風骨之美當大吾門不宜如是也每遇景物必道其名達其理以指教之然終不言一日又謂之曰楊文公㓜而不言文公之父告之曰後園梨落籬神童知不知文公發聲曰不是風揺樹便是􅍎驚枝汝風骨若此何為不言鑑竟不對後擕行河上其祖曰水馬池中走鑑曰逰魚波上浮後任館閣李廣靖聞見録詩話總龜巻二欽定四庫全書詩話總龜巻三宋阮閱撰
