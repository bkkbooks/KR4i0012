body:
  text: 紀實門中趙平叔客漣水軍郡守召置門下數年平叔以館職守漣水後守以所居為豹隐堂石曼卿有詩云熊飛清渭逢何暮龍卧南陽去不還昔日客為今郡守蔚然惟在立談間士大夫留詩甚多莫可偕者古今詩話煬帝好食蛤忽有一蛤椎擊不破異之寘於几下一夜有光肉乃自脫有一佛二菩薩像悔之乃不食蛤商凝式有詩云雖因雀變化不逐月虧盈縦有天中像神功詎可成又云相好合如梵端嚴秪為誰寜同恃頑惡且與鷸相持西洛上清宫混元殿有吳生畫五聖杜甫詩云五聖聨龍衮千官列雁行謂是也刁約使契丹詩曰押燕移離畢㸔房賀䟦支餞行三匹裂密賜十貔狸皆紀實也移離畢官名如中國執政官賀䟦支如執衣防閣匹裂似小木甖以黃色棱朩為之加黄漆貔狸形如鼠而大穴居食穀粱嗜肉狄人為珍膳味如豚肉而脆川陜呼梢工篙手為三長老杜詩云長年三老歌聲裡白馬灘前白浪中地氣有早晚天時有愆伏如平地三月花者深山四月方花樂天逰大林寺云人間四月芳菲盡山寺桃花始盛開同前張乖厓鎮宛丘邸報王文正大拜不恱謂坐客曰朝廷肯用經綸康濟人乎余少以直節自誓束髪登用無兩府心幕中杜夀隆曰固知公無兩府意公曰吾胸中事爾安得知杜曰嘗見公栁詩云安得辭榮同范蠡緑絲和雨繫扁舟雍陶知簡州自比謝宣城栁吳興賔至則挫辱投贄者少得見之馮道眀下第請謁紿閽者曰與太守故舊及見呵責曰與公昧平生何故舊之有道眀曰誦公詩得相見何隔平生遂吟雍詩曰立當青草人初見行近白蓮魚未知閉門客到常如病滿院花開未是貧江樓秋入峽雨葉夜侵樓雍厚之元和十一載李源公牓三十三人皆取寒素時詩曰元和天子丙申年三十三人同得仙袍似爛銀文似錦相将白日上青天撫州有放生池禁採捕忽有乗小舟釣於其上太守蔡大夫令捕之釣者為詩曰投却長竿捲却絲手擕簔笠獻新詩眀知太守清如鏡不是漁人下釣時乃野人張項同前薛能尚書鎮彭門時溥劉巨容周岌俱在麾下未數年溥領徐巨容鎮襄岌領許俱假端揆故能詩舊将已為三僕射病身猶是六尚書王拱辰守長安日初禮上理掾口號云人間合作大丞相天下猶呼小状元梅摯知錢塘有一掾官撰札上曲子云黄閣方開金鼎調羮祇待梅皆着題孟賔于字國儀連州輔國鄉人天福中自湖湘越京洛應舉逺人無援遂卜命於華山神珓有如一年乞一珓凡六擲得上上大吉每年下第有詩今略舉一聨用表其㮣第一年云蟾宫空手下澤國更誰來二年云水國二畨應探榜龍門三月又傷春三年云仙島却回空說夢清朝未達自嫌身第四年云失意從他桃李春嵩陽經過歇行塵雲僧不見城中事問是今年第幾人五年云因逢日者教重應忍被雲僧勸却歸天福九年禮部侍郎符蒙下及第果六舉後往江南官至水部郎中致仕居吉州玉笥山復知豐城縣年七十餘卒郡閣雅談煬帝時洛陽進合蔕迎輦花得之嵩山塢中人不知名採者異之因以名迎輦花濃艷芬馥或惹襟袖移時不散嗅之令人不睡命寳兒持之號司花女寳兒姓袁長安進御車女年十五腰肢纎弱時詔虞世南草征遼徳音於側寳兒注視久之煬帝謂世南曰舊傳飛燕可掌上舞今得寳兒方昭前事注目于卿卿才人可便嘲之世南應詔為絶句曰學畫鵶兒半未成垂肩大袖大憨生縁憨却得君王惜長把花枝傍輦行帝恱龍舟鳯舸每舟擇妙麗長白女子千人執雕檀金楫號殿脚女一日煬帝凭殿脚女吳綘仙肩喜柔麗不與羣軰齒愛綘仙善畫長眉将拜婕妤適早嫁萬邰故不克顧内謁者云古人云秀色若可飱如綘仙真可療飢矣因吟持節篇賜之曰舊曲歌桃葉新粧艷落梅将身倚輕楫知是清江來詔殿脚女千軰唱之越溪進耀花綾綾文突起有光彩越人乗樵風泛舟石帆山下收野蠒繅絲女夜夢神人告云禹穴三千年一開所得蠒即江淹文集中壁魚所化絲織為裳必有竒文織成果得所夢獨賜司花女洎綘仙蕭妃恚怒不懌由是稍稍不親幸煬帝嘗醉逰宫中偶戯宫婢羅羅畏妃不敢迎帝辭有程姬之疾不可薦寝帝嘲曰個人無頼是横波黛染龍顱簇小娥幸有留儂伴成夢不留儂住意如何煬帝往往為姑祟所惑逰雞䑓恍惚與陳後主相遇喚帝為殿下後主戴單紗皂幘綽袖長裾緑錦純縁紫文方平履舞女數人即麗華也以緑文測海蠡酌紅粱新醖勸帝飲因請麗華舞玉樹後庭花麗華辭以抛擲嵗久自井中出腰肢旅拒無復往時再三索起終一曲後主咏十數篇煬帝不記獨愛小忩詩及寄侍兒碧玉詩云午醉醒來曉無人夢自驚後二句詩史謂是唐人宋咸作夕陽如有意偏傍小忩眀碧玉詩云離别腸應㫁相思骨合銷愁魂若飛散慿仗一相招麗華拜求帝一章辭以不能麗華笑曰嘗聞此處不留儂自有留儂䖏安可言不能煬帝强為之操觚曰見面無多事聞名爾許時坐來生百媚實箇好相知麗華赧然不懌後主問龍舟之逰樂乎始謂殿下致治堯舜之上今日復此逸逰人生各圖快樂曩時何見罪三十六封書使人至今怏怏煬帝叱之不見帝幸月觀清景晴眀左右皆寢凭三妃肩說東宫時事適黄門映薔薇叢調宫婢衣朒薔薇吃吃聲笑帝望腰肢纎弱意謂寳兒披單衣亟擒乃雅娘蕭妃喟然不止帝曰往年幸妥娘時倩態正如此曽效劉孝綽為離憶詩嘗念與妃記之否蕭妃即念云憶來時待來剛不來缷粧仍索伴解佩更相催博山思結夢沉水永成灰憶起時投籖初報曉被惹香黛殘枕隐金金裊笑觀上林春除却司辰鳥煬帝云日月遄邁今已幾年事矣大業拾遺襄王僣偽逼李拯為偽官拯嘗吟曰紫宸朝罷綴鴛鸞丹鳯樓前駐馬㸔惟有終南山色好晴眀依舊滿長安拯終為亂兵所殺南部新書裴皥官至禮部尚書放三榜四人拜相桑維翰竇正固張礪馬裔孫清泰二年馬裔孫知貢舉纔放牓謝恩引諸生詣座主宅謁拜裴公以詩示云宦途最重是文衡天與愚夫著盛名三主禮闈年八十門生門下見門生未開宴裔孫登庸郡閣雅談吳奎使虜詩云奚車一牛駕朝馬兩人騎雜志昔執政有詩云躁因修賀刺懶為答空書又有省判者云省府舊例不答空書同前文徳殿百官常朝之殿宰相奏事畢乃來押班常至日旰守堂卒好以厚朴湯飲朝士朝士有久無差遣厭苦常朝者戯為詩曰立殘庭下梧桐影喫盡堦頭厚朴湯古今詩話李徳誠加司空守臨川湯文圭草麻徳誠濡毫之賂久而未至以詩督之曰紫殿西頭月欲斜曽草臨川上相麻潤筆已曾闗奏謝更飛章句問張華時皆少之馮延魯嘗出使閩中催督軍粮急于星火李建勲以詩寄之曰粟多未必全為計師老湏防有伏兵既而福州之兵果為越人所敗建興還司空累表乞致政自稱鍾山公詔授司徒不起學士湯恱致状賀之建勲以詩答曰司空尤不作那敢作司徒幸有山公號如何不見呼先是宋齊丘自京口求退于青陽號九華先生未周朞一詔而起時論薄之建勲年徳未衰時望方長重或有以比宋公者因為詩曰桃花流水雖相似不學劉郎去又來南唐近事化度寺内有無盡蔵院京城捨施日漸崇盛武徳貞觀後錢帛金玉積聚不可勝計常使名僧監蔵為等分一分供天下伽藍修理之用一分施天下飢餓一分充舊供無遮之㑹城中士女奔走捨施争次不得至暮收獲亦鉅萬有大車載錢帛捨了弃去不知姓名者多矣蔵内物天下寺院許容來取供給亦不可勝數不阻貞觀年中有裴元智戒行修謹宛是修行髙人入寺洒掃十年有餘寺中觀其行無玷缺使之守蔵不覺被盗去黄金極多将去不可知數寺衆見潛走去後不還衆僧驚異遂於元智寝房内㸔壁上有詩四句曰将肉遣狼守置骨向狗頭自非阿羅漢焉能免得偷后莫知所之武后遂移蔵東都福光寺日乆錢物漸耗却移歸舊寺至開元九年發散錢帛於京師諸寺二京靈異小録僕在吳興逰記元卿詩曰微雨止還作小忩幽更妍盆山不見日草朩自蒼然非至吳越不見此景百斛眀珠舊讀蘇子美六和寺詩云沿橋待金鯽竟日獨遲留初不喻此語及倅錢塘乃知寺後池中有此魚如金色復逰池上投餅餌久之畧出不食後入不可見自子美作詩至今四十年已有遲留之語茍非難進易退而不妄食安能如此夀耶同前京師風物繁富士大夫牽于事役良辰美景罕宴逰之樂其詩至有賣花檐上㸔桃李柏酒樓前聽管絃之句桂堂閑話張喬九華人咸通末取京兆府解李建州時為京兆府叅軍主試同時有許棠及喬俞坦之劇燕任濤吳罕張蠙周繇鄭谷李栖逺温憲李昌符謂之十哲其年府試月中桂詩喬擅場詩曰與月長洪濛扶踈萬古同根非生下土葉不墜秋風每向圓時足還随缺處空影髙群朩外香滿一輪中未種丹霄日應虚白兎宫何當随羽化細得問元功其年以許棠在場屋多年為薦首喬與坦之在許下薛能尚書深知以詩唁二子云何事盡参差惜哉吾子詩日令銷此道天亦負眀時有路當重振無門即不知何當見堯日重與啜澆漓摭言僕初入廬山山谷竒秀平生所未見殆應接不暇遂發意不作詩已而見山中僧俗皆言蘇子瞻來矣不覺作一絶云芒鞵青竹杖自挂百錢逰可恠深山裡人人識故侯既自悔前言之謬又作兩絶云青山若無素偃蹇不相親要識廬山面他年是故人又云自昔懐清賞神逰杳靄間如今不是夢真箇是廬山是日有以陳令舉廬山記見寄者且行且讀見其中云徐凝李白之詩不覺失笑旋入開元寺僧求詩因作一絶云帝遣銀河一𣲖垂古來惟有謫仙辭飛流濺沬知多少不為徐凝洗惡詩往來南北山十餘日以為勝絶不可勝談擇其尤者莫如潄玉亭三峽橋故作此二詩最後與總老逰西林作一絶云横㸔成嶺側成峯到處㸔山了不同不識廬山真面目只縁身在此山中余廬山詩盡于此百斛眀珠余在岐下見秦州進一馬騣如牛項垂胡側立顛倒毛生肉端蕃人云此肉騣馬也乃知鄧公驄馬行云肉駿碨礧連錢動當作肉騣唐人煎茶用薑故薛能詩云塩損忝常戒薑宜着更誇據此則又有用塩者矣近世有用此二物者輙大笑之然茶之中等者用薑煎信佳塩則不可安定郡王以黄柑釀酒謂之洞庭春色色香味三絶以餉其猶子徳麟徳麟以飲予為作詩醉後信筆頗有沓拖風氣云去年洞庭秋香霧當噀手于今洞庭春玉色疑非酒賢王文字飲醉筆蛟蛇走既醉念君醒逺餉為我夀瓶開香浮坐盞凸光照牖方傾安仁醯潘岳賦云披黄袍以授酒置纒甕以酌醯莫遣公逺嗅要當名字竒未可論升斗應呼釣詩鉤亦號掃愁箒君知葡萄惡正是嫫母醜湏君灧海杯澆我談天口並同前詩話總龜巻十八欽定四庫全書詩話總龜巻十九宋阮閱撰
