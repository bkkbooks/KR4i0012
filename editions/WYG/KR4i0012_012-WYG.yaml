body:
  text: 警句門上太祖嘗顧近侍曰五代干戈之際猶有詩人今太平日久豈無之也中官宋永圖於僧寺園亭中得詩百篇以進有丞相李文正公昉宰相僧閣閒望一聨云水光先見月露氣早知秋古今詩話楊朴字契元鄭州人善爲詩少嘗與畢文簡公士安同學文簡薦之太宗召見靣賦蓑衣詩云狂脱酒家春醉後亂堆漁舍晩晴時除官不受聽歸山以其子從政爲長水尉朴爲七夕詩云年年乞與人間巧不道人間巧已多魏野陜人字仲先少時未知名題河上寺柱云數聲離㟁櫓㡬㸃别州山時有幕僚本江南文士見之大驚邀與相見贈詩曰怪得名稱野元來姓不羣仍爲延譽由是人始重之真宗西祀遣中使召之野閉户踰垣而遁熈寧六年有司言四月初一日日當蝕上為徹樂避正殿一夕㣲雨不見日食是日有皇子之慶蔡子正爲樞宻獻詩云昨夜薫風入舜韶君王方避正衙朝陽暉已得前星助陰沴潜隨夜雨銷其叙四月一日避正殿皇子慶誕陰雲不見日食之盡矣當時無能過云成都妓單氏贈陳希夷詩云帝王師不得日月老應難名士多稱之唐宋遺史晏元獻覽李慶富貴曲云軸傳曲譜金書字樹記花名玉篆牌曰此乃乞兒相未嘗諳富貴者故公每言富貴不及金玉錦繡惟説其氣象若樓臺側畔楊花過簾幙中間燕子飛梨花院落溶溶月栁絮池塘淡淡風是也公自以此句語人曰窮人家有此景否宋莒公見公佳句皆書於齋壁如無可奈何花落去似曽相識燕歸來静尋啄木藏身處閒看逰絲到地時樓臺冷落收燈夜門巷蕭條掃雪天已定復搖春水色似紅如白野棠花之類后人不可及青箱雜記蘇爲知吳興日多作詩内一篇最佳云野艇閒撑處湖天景亦㣲春波無限緑白鳥自由飛栁色濃埀岸山光冷照衣時攜一壺酒戀到晩凉歸又在宣城作十首以宣城爲目内宣城花一篇首出曰宣城花叠嶂樓前簇綺霞若非翠露陶潜宅即是紅藏小謝家又在邵武有詩曰愛重八九月登臨高下樓林紅雲白處寒瀨泊漁舟丞相王文惠有宫詞云一聲啼鳥禁門静滿院落花春日長野步云桑斧科春色漁歌唱夕陽皆佳句也楚僧惠崇工於詩題楊雲卿郊居云河分崗勢斷春入燒痕青長信詞云陰井生秋早明河徹曉遲江行晩泊云嶺暮清猿急江寒白鳥稀上谷相池上作云歸禽動踈竹落果響寒塘贈陳少府云野人傳相鶴山叟學彈琴夜坐云春淺水生井宵分月上簷贈凝上人云掩門青檜老出定白髭長送逐客云浪經蛟浦闊山入鬼門寒經縁公舊寺云遺偈傳諸國留真在一峰塞上云河冰堅度馬塞雪宻藏鵰喜長公至云久别年顔改相逢夜話長隱者云多年不道姓近日旋移家宿東林寺云鳥歸山墮雪僧去石沉雲上楊内翰云露寒金掌重天近玉繩低栁氏書齋云著書驚日短彈劒惜春深上王太尉云探騎通畨壘降兵逐漢旗田家秋夕云露下牛羊靜河明桑柘空舟行云林斷城隍出江分島嶼迴寄梅蘇州云鏁城山月上吹角海鷗驚宿楊侍郎東亭云巻幔來風逺移牀得月多送程至云白浪分吳國青山隔楚天宿隱静寺云空潭聞鹿飲疎樹見僧行送錢供奉云劒㦸明山雪旌旗濕海雲梅鼎臣河亭云曠野行人少長河去鳥平宿肇公齋云月高山舍過霜落石門深盧經西歸云雪多秦木逈雲盡漢山孤濠梁夜泊云夜闌潮動舸天逈月臨城崔仰秋居云葉影風中靜蟲聲月下多贈裴使君云行縣山迎舸論兵雪遶旗早行云繁霜衣上濕殘月馬前低秋夕云磬斷蟲聲出燈迴鶴影沉書韓退之屋壁云移家臨醜石租地得靈泉秋夕懷長公云秋近草蟲亂夜遙霜月低觀宴鄉老云海鷗聽舜樂山老泛堯觴贈素上人云午食下林鳥夜蟬移塚狐夏夜云扇聲猶泛暑井氣忽生秋江行早發云殘月楚山曉孤烟江廟春翻經舘靖少卿房云梵容分古像唐語入新經題太保道院云鶴傳滄海信僧和白雲詩秋夕懷汪白云塞禽棲古栁破月入微雲贈白上人云花漏沉山月雲衣起海風喜陳助教至云樓中天姥月座上杜陵人冬日野望云人歸崗舍近鴈過渚田遙送人知榮州云山色臨巴逈江流入漢清春深道中云湘雲隨鴈斷楚路背人遙贈李道士云松風吹髪亂巖溜濺棋寒栖霞寺云境閒僧度水雲盡鶴盤空林逋河亭云古路隨崗起秋㠶轉浦斜楊秘校池上云禽寒時動竹露重忽翻河魏仲先山亭云嵐重琴棋濕風長枕簟寒塞上云離磧鴈衝雪渡河人上冰寄白閣上人云夜梵通雲竇秋香漏石叢陜西道中云闗河雙􅁂白風雪一燈青送防秋楊將軍云殺氣生龍劒威風動虎旗𤓰州亭子云落潮鳴下岸飛雨暗中峰賀劉舍人云日躔黄道逈春入紫㣲深除夜云寒燈催臘盡曉角喚春歸幽幷道中云鴈行沉古戍鵰影轉寒沙送僧歸天台云景霽雲迴合秋風林動搖過陳希夷舊居云亂水僧頻過荒松鶴不還宿横江舘云露舘濤驚枕空庭月伴琴維邢道中云馬渡冰河闊鵰盤磧日高報國寺秋居云驚蟬移古栁鬬雀墮寒庭書早上人房云松風傳夕磬谿霧擁春燈觀南郊天仗云霓旌揺曉色鳳吹遶春雲贈義上人云坐石雲生衲添泉日入瓶昇平詞云萬國無形治三邊不戰平國清寺云瞑鶴棲金刹秋僧過石橋吕氏西齋云雪殘僧掃石風動鶴歸松劉參幽居云風煖鳥巢木日高人灌園楊都官池上云竹風驚宿鶴潭月戲春魚書方嶠壁云圭竇先知曉盆池别見天送陳舍人巡撫云月露疎寒柝雲濤閃畫旗宿齊上人禪齋云鶴盤金刹露龍蟄玉瓶泉春日㓂宣贊池上云暄風生木末遲景入泉心七夕云河來天上闊雲度月邊輕贈王道士云海人來相鶴山狖下聽琴送荆州云畫鷁浮秋浪金鐃響夕雲江城晩望云丹楓映郭逈緑嶼背江深題王太保山亭云危溜含清瑟飛花㸃玉觴送李秦州云朱旗臨雪巻畫角入雲吹畫上人西齋云孤雲還静境逺籟發秋聲李太傳山庄云圍棊分雪石汲井動金沙官中詞云井含春氣碧樓轉夕隂清送吳袁州云鳥瞑風沉日天清月上旗寄肇公云斜吹鳴金錫歸雲擁石牀塞上云古戍生煙直平沙落日遲贈嗣上人云拂石雲離帚烹茶月入鐺舟行云逺嶼迎檣出疎林帶㟁回送來上人云來時雲擁衲别後月隨笻馬蠙淮亭云路横岡燒斷風轉浦㠶斜贈戴殿前云劒靜龍歸匣旗開虎遶竿高諲書齋云品畫逢名客横琴憶古賢太乙山云雲陰移漢塞石色入晴天塞上送人云地遙羣馬小天闊一鵰平范溶園池云江花凌霰發山溜入池深獵騎云長風躍馬路小雪射鵰天高略書院云古木風烟盡寒潭星斗深送叚工部河北漕云渡河風動斾巡部雨霑車題高生山閣云對酒淮潮起題詩楚月新經明大師房云門掩前朝樹心埀别郡峰送李堪云秋聲動羣木暮色起秋山並同前歐陽文忠公守滁見王元之謝上表云諸縣豐登絶少公事全家飽煖共荷君恩因成詩云諸縣豐登少公事全家飽煖荷君恩摭遺楊軒字公逺衡州人嘗有燈詩曰解照日月不照處獨明天地未明時同前李煜作詩大率多悲感愁戚如青鳥不傳雲外信丁香空結雨中愁􅁂從今日添新白菊是去年依舊黄之類然思清句雅可愛翰府名談陳亞大卿士大夫徒傳其諧謔之語不知其作詩甚佳如浪平天影接山盡樹根回得作者之格趙師民龍圖有春日即事詩云委地露花啼曉淚拂堤煙栁弄春容又如麥天晨氣潤槐夏午陰清曉鶯林外千聲囀芳草堦前一尺長皆佳句並同前太常博士黄孝先字子思爲咏懷詩曰日者未知裴令貴時人争笑禰生狂又作重五詩曰風簷燕引五六子露井榴開三四花春明退朝録孟賔于子名歸唐寓廬山學得瀑布一聨云練色有窮處寒聲無盡時隣房有人亦得此聨互誦其句助教不能理因送江州以全篇定之而歸唐勝焉大爲時賢所知夏寶松廬陵人與劉洞唱和爲節度使陳徳誠所知德誠贈詩曰建水舊傳劉夜坐劉洞有夜坐詩螺川新有夏江城寶松有江城詩曰鴈飛南浦鐘初動月滿西樓酒半醒又云曉來羸駟依前去雨後遙山數㸃青皆佳句江南野録又雅言系述别有寶松宿臨江驛全篇并劉洞宿寶松山齋詩以寶松爲保松唐仁傑全州人苦吟陳徳誠出守池陽仁傑以詩貽之云紅斾渡江霞蘸水青蛇出匣雪侵衣徳誠善之勉之入金陵㑹休沐朝達集于升元寺召之坐酒行請仁傑賦登閣詩立談而成其中有句云雲散便宜千里望日長斜占半城陰其餘亦可觀贈嘉禾峰僧云只住此山能有意向來求佛本無心時論與之並鑑戒野録施肩吾好作諸詩著山居百韻如荷翻紫盖搖波靣蒲瑩青刀揷水湄煙粘薜茘龍鱗軟雨壓芭蕉鳯尾埀錢鄧師嘗舉思賈誼兩句云可憐半夜虛前席不問蒼生問鬼神后人何可及談苑潘逍遙貧居詩曰長喜詩無病不憂家更貧峽中聞猿曰何須三呌絶已恨一聲多哭高舍人詩曰生前是客曾投巻死後何人與撰碑張乖厓贈逍遙詩云莫嗟黒􅁂從頭白終見黄河到底清宋白尚書贈云宋朝歸聖主潘浪是詩人退朝録蜀僧希晝游鴈碭山云天長來月正木末度猿稀答黄桂州云束書逢嵗嗣去夢厯峰危送廣漕云春生桂嶺外人在海門西送僧東歸云㠶影先寒鴈經聲隱暮潮宋承㫖林亭云雪溜埀危石棊燈射逺林贈僧云潄齒冰溪逺聞蟬雪屋深送人云玉繩天闕近金柝海城秋贈勾學士云曉天金馬路晩歲石霜心寄人云山日秋光短江虹晩影低送新津尉云劒月啼猿苦江沙濯錦寒北宫書亭云花露盈蟲穴梁塵墮燕泥贈關上人云寄禪闗樹老乞食塞城羗送僧歸新安云風泉舊聽僧窗改雲穴曽行鳥徑殘春山云芳樹侵雲老孤泉落石危送人歸南海云落日横秋島寒濤兀夜船浙僧寶通題相國寺云下朝人帶天香出入定僧迎御杖頭僧守恭佛迹峰云市髪人來絶銜花鹿去多僧行肇送僧云定錫樵停斧窺人鳥立槎送人之鄞江云江聲鰲背出㠶影斗邊飛僧簡長送人歸寜州云煙壘沉寒角霜空擊怒鵰尚能送僧歸浙右云霜洲楓落盡水舘月生寒送僧歸四明云古寺山光後重城海氣圍送人云西風隨鴈急寒栁向人踈送孫大諌知永興云闗河虎符重殿閣獸樽閒僧知人溪居云寒聲病葉落曉色凍雲開送僧歸天台云路遙無去伴山叠有啼猿冬夕云風窗燈易滅雪屋夜偏寒僧休復送道士西逰云日暮長安道秋深太白峰僧惟鳯秋日送人云去路正黄葉别君堪白頭哭度禪師云海客傳遺偈林僧寫病容談苑楊文公言自雍熈初歸朝迄今三十年所閱士大夫多矣能詩者甚鮮如侍讀兵部宿擅其名而徐鉉梁周翰范宗黄夷簡皆前輩鄭文寶薛映王禹偁吳俶劉師道李宗諤李建中李維姚鉉陳堯佐悉當時儕流後来著聲者如路振錢熈丁謂錢易梅詢李拱蘇爲朱嚴陳越王曽李堪陳詁吕夷簡宋綬邵煥晏殊江任焦宗古布衣有林逋周啓明錢氏諸子有封守惟濟供奉錢昭度即曲有今南鄭殿丞楊黎州家居及高官簿覺宗人字牧之並有佳句可以摘舉而錢惟演劉筠特工於詩楊徽之侍讀春望云杳杳煙蕪何處盡搖搖風栁不勝埀寒食云天寒酒薄難成醉地迥臺高昜斷魂塞上云戍樓煙自直戰地雨長腥僧舍云偶題巖石雲生筆閒遶庭松露濕衣湘中舟行云新霜染楓葉皓月借蘆花哭江爲云廢宅寒塘水荒墳宿草煙嘉璟川云青帝已教春不老素娥何惜月重圓又云浮花水入瞿塘峽帶雨雲歸越雋州元夜云雲歸萬年樹月滿九重城宿東林云開盡菊花秋色老落遲桐葉雨聲寒徐鉉逰朩蘭亭云蘭橈破浪城陰直玉勒穿花苑樹深觀習水戰云千㠶日助陰山勢萬里風馳下瀨聲病中云向空咄咄頻書字忘世滔滔莫問津謫居云野日蒼茫悲鵩舍水風陰濕弊貂裘陳秘監歸泉州云三朝恩澤馮唐老萬里江山賀監歸宿山寺云落月依樓閣歸雲擁殿廊梁周翰應制云百花將盡牡丹拆十雨初晴太液春黄夷簡題人山居云宿雨一畨蔬甲拆春山㡬焙茗旗香鄭文寶郊居云百草千花路斜風細雨天重經貶所云過闗已躍樗蒲馬悞喘尤驚顧兎屛洛城云星沉㑹節歌鐘早天半上陽煙樹㣲贈張靈州云越絶曉殘蝴蝶夢單于秋引畫龍聲長安送别云杜曲花光濃似酒灞陵春色老於人送人歸湘中云滿㠶西日催行客一夜東風落楚梅南行云失意慣中遷客酒多年不見侍臣花棲靈隱寺云舊井霜飄仙界橘雙溪時落海邊鷗送人知韶州云碧落春風老朱陵古渡頭永熈陵云承露氣清駒送日觚稜人静鳥呼風邊上云􅁂間相似雪峰外寂寥煙薛映送人知鄂州云黄鶴晨霞傍樓起陀頭秋草遶碑荒吳俶送朱致政云洛殿夜凉初閣筆渚宫歲晩得懸車劉師道寄别云南浦未傷春草碧北山仍愧曉猿驚與張必云久師金馬客勍敵玉溪生荷花云有路期奔月無媒與嫁春殘花云金谷路塵埋國艶武陵溪水泛天香寄陳龍圖云晨瞻北斗天何逺夢斷南柯日未沉歎世云野馬飛窗日醯雞舞甕天春雪云青帝翠華沉物外素娥孀影弔雲端咏雪云三千世界銀成色十二樓臺玉作層湘中云逝波帝子魂何在夢草王孫怨未歸李宗諤春郊云一溪曉緑浮鸂鶒萬樹春紅呌杜鵑贈蘇承㫖云金鑾後記人争寫玉署新牌帝自書李建中送人云山程授舘聞鴻夜水國還家欲雪天李維渚宫亭云故宫芳草在徃事暮江流朱致政云清朝納禄猶狂健白首還家正太平和人贈馬太保云轉盻迴嵓電分髯磔蝟毛寄洪湛云謫去賈生身健否秋來潘岳􅁂斑無姚鉉錢塘郡云踈鐘天竺曉一鴈海門秋陳堯佐潮州召還云君恩來萬里客路出千山送种放云供帳開天苑傳呼度國門送人越州云風樵若耶路霜橘洞庭秋送朱荊南云部吏百凾通爵里從兵千騎屬鞬櫜錢熈送人金陵拜掃有云鶴歸已改新城郭牛卧重尋舊墓田丁謂和錢易曰珊瑚新筆架雲母舊屛風送章安南云梅花過嶺路桃葉渡江船送章明州云泣珠泉客通闗市種玉仙翁寄版圖送陳荆南云楚子夢雲鈴閣宻郢人歌雪射堂開錢易晝景云雙峰上簾額獨鵲裊庭柯芭蕉云緑章封事緘初啓青鳯求凰尾乍開梅詢陰陵云千里漢圍合一夜楚歌聲李拱春題村舍云犬眠花影地牛牧雨聲坡蘇爲送劉端州云夜浪珠還浦春泥象印蹤朱嚴贈徐常侍云寓直有誰同騎省立班獨自戴貂冠陳越侍宴云千鍾人既醉九奏鳯來儀與劉慘云莫衰城下酌不廢洛中吟送李秦州云擁路東方騎懸腰左顧龜王曽送李駙馬拜陵云人畏軒臺久春歸雨澤多李堪哭韓黎州云桐鄉留語𦵏銘路在生悲送周建州云海月隨㠶落溪花遶驛流送人行云雷風有約青虯起霜露無情紫蕙枯退居云雨宻絲桐潤潮平釣石沉陳詁閒居云籠雞對窗語羅雀繞門飛吕夷簡早春云梅無驛使飄零盡草怨王孫取次生九日呈梅集仙人云人歸北闕知何日菊映東籬似去年寒食云人爲子推初禁火花愁青女再飛霜宋綬送人知江陵云竒才劒客當前隊麗賦騷人託後車送人知洪州云江㴠帝子翬飛閣山際真君鶴馭天送周賢良云楚澤傷春怨鶗鴂長安索米愧侏儒趙復送晏集賢南歸云船官風破浪闗吏皷通晨晏元獻與張臨川云籬邊菊秀先生醉桑下雛嬌稚子仁又云東陽詩骨瘦南浦别魂銷送章明州云騷客登山知有助秦源雞犬更相聞送人知洪州云干斗氣沉龍已化置芻人去榻猶懸並同前江任送人云珠盤臨路設斗印入鄉提玉堂詩話焦宗古送人逰蜀云芳樹高低啼蜀魄朝雲濃淡極巴天贈周賢良云南陽客自稱龍卧東魯人應歎鳯衰林逋湖山云片月通蘿徑幽雲在石牀周啓明近臣疾愈云一丸童子藥五返使人車送皇甫提刑云鴟夷江上畬田稔牛斗星邊貫索空錢惟濟太一宫醮云墀下焚香連宿霧林間鳴珮起棲鸞從駕西巡云曉陌壺漿滿春風騎吹長故主第云鳯簫通碧漢星斗辯靈源錢昭度村居云黄蜂衙退海潮上白蟻戰酣山雨來大寒云雨被北風吹作雪水愁東海亦成冰金陵云西北高樓在東南王氣銷梅花云東北風吹大庾嶺西南日映小寒天鴈云三年别舘風吹入萬里長沙月照來秋逰華山云人間路到三峰盡天下秋隨一葉來南鄭殿丞云青鳥㡬傳王母信白鵞曽換右軍書將至京云近闕已瞻龍虎氣思鄉猶望斗牛星楊黎州赦至云山川百蠻國雨露九天書寄逺云胡越自爲迢逓國參啇元是别離星自遣云天上羲輪都易識人間堯厯自難逢哭儲屯田云部中車雨春無潤天上星郎夜損光感悟云頓纓狂走鹿吐沫倦逰鱗心知云逺别苦驚雲聚散相逢多悟月盈虧自咏云剛腸欺竹葉衰􅁂怯蘆花淚云一斑早寄湘川竹萬㸃空遺峴首碑竹簟云若非虎珀休爲枕不是琉璃莫作屛春晝云人歸漢后黄金屋燕在盧家白玉堂並同前牧之寄人云世味嫌爲枳時光怨落蓂閒居云歌懐飯牛起書憤抱麟成蟬云二子自不食三閭何獨清登樓云逺水净林色㣲雲生夕陽塵云已傷花榻滿休妬畫屛飛談苑西洛古都荒臺廢沼遺迹依然見於詩多矣惟錢文僖公一聨最爲警䇿云日上故陵煙漠漠春歸空苑水潺潺裴晉公緑野堂在午橋南往時屬張相齊賢家罷相歸終日與客宴其間惟鄭文寶工部一聨爲警絶云水暖鳬鷖行哺子溪深桃李卧開花人謂不减王維杜甫錢詩好句尤多而鄭句不惟當時人莫及雖其集中若及此者亦少歐公詩話詩話總龜巻十二欽定四庫全書詩話總龜巻
