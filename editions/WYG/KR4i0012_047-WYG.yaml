seq: 47
front:
  text: 四十七宋阮閱撰
  hash: sha256:278e8cafb602c61c556b8cf06cd572d320e14183d0213c4cf59eb0a31982a680
body:
  text: 竒恠門賣墨者潘谷予不識其人然聞其所為非市人也墨既精妙而價不二或不持錢米求墨不計多少與之此豈徒然者哉予甞與詩云一朝入海尋李白空看人間畫墨山一日忽取欠墨錢劵焚之飲酒三日發狂浪走遂赴井死人下視之盖趺坐井中手尚持數珠也見張明言如此百斛明珠太子中允王綸祥符中登進士第有女子年十八嵗一日晝寝中忽魘聲其父與家人亟往問之已起謂父曰與汝有洞天之縁降人間四百年矣今夕㑹此自是謂父曰清非生自稱曰燕華君初不識字忽善三十六體天篆皆世所未識毎與清非生唱和及百餘篇有送人詩云南去過瀟湘休問屈氏狂而今聖天子不是楚懐王又贈清非生末句云自有燕華無限景清非何事戀東宫又雪詩云何事月娥期不在亂飛端葉落人間說與人云天上端朩開花六出贈清非生云君為秋桐我為春風春風㑹使秋桐變秋桐不識春風面題金山云濤頭風滚雪山脚石蟠虬又詩云落筆非俗子皷吹皆天聲豈俟耳目闕慰子華燕情蒋頴叔以楷字釋之刻於石後嫁為吕氏妻既嫁則懵然不復能詩康定間進篆字二十四軸仁宗嘉之有女仙傳行於時天授二年臈卿相等詐稱上苑花開請幸則天許之乃遣使宣詔曰明朝逰上苑火急報春知花須連夜發莫待曉風吹於是凌晨名花瑞草皆發羣臣並咸服其異卓異記唐太府寺隋都水門之地隋平陳於此置叔寳叔寳将亡有飛鳥集於庭以觜畫地作詩云獨足上髙䑓腐草化為灰欲知我家處朱門臨水開雍洛異集嗽金鳥出昆明國形如雀色黄魏明帝時其國來獻飼以珍珠及兎腦甞吐金屑如粟宫人争取為釵鈿謂之辟寒金以此鳥不畏寒也宫人相嘲曰不服辟寒金􅃚得帝王心不服辟寒鈿􅃚得帝王憐古今詩話西蜀張俞甞逰驪山題二絶云金玉樓䑓揷碧空笙簫逓響入天風當時國色并春色盡在君王顧盼中玉帝樓前鎖碧霞終年培養牡丹芽不妨野鹿踰垣入銜出宫中第一花異日宿温湯見二黄衣吏召其魂至一宫闕見仙座殿上問左右曰唐太真妃也與之論當時事甚詳覺又為詩曰夢魂飛入瑶臺路九霞宫裏曾相遇壺天晩景自愁人春水泛花何處去俞尚留温湯閑步野外有牧童持書一紙俞乃開封乃仙所為詩云虚堂壁上見清詞似共幽人說所思海上風烟雖可樂人間聚散更堪悲重簾透日温温曉玉漏穿花滴滴遲此景此情傳不盡殷勤嘱付隴頭兒俞詢牧童從何得對曰前日有一婦人過此遺我百錢授此書云明日有衣冠獨步野外子與之余聞之俞感俞多對士君子道此青瑣集治平二年長沙趙琪郎中作廣東憲公宇西軒有荔枝數本盛夏方熟召刺史燕賞一夕皆空皮核滿地軒之西壁有詩云吾儕今日㑹嘉賔滿酌洪鍾飲數廵遍地狼藉不知曉荔枝又是一畨新二廣人多傳異之隋煬帝逰廣陵恍惚見陳叔寶來謁曰聞已開隋渠引洪河之水東逰維揚因作詩獻之曰隋室開茲水初心謀太奢一千里力役百萬民吁嗟水殿不復返龍舟成火霞驚流摧陡㟁濁浪噴黄沙兩隄人送客三月栁飛花日脚沉雲表榆梢噪瞑鵶如今疲子俗異日使無家且樂人間景休尋上漢槎客喧舟艤㟁風細錦㠶斜莫言無利益千古壮京華煬帝愠曰爾多知為後人之利耶同前吴興栁歸舜泊舟洞庭君山見鸚鵡數千翺翔其間相呼姓字有名清越者名武逰郎者名阿蘇児者名武仙郎者名自在先生者名踏蓮路者名鳯凰䑓者名戴蝉兒者名多花子者或有唱歌者曰吾此曲乃漢武鈎弋夫人常所唱者詞曰戴蝉兒分明傳與君王語建章殿裏未得歸朱箔金缸雙鳯舞名阿蘇兒者曰我憶得阿嬌深宫唱曰昔請馬相如為作長門賦徒使費千金君王終不顧歸舜歸舟舟人云相失已二日矣寳應中有元無有春末獨行廣陵郊野夜入路傍村舎宿北軒下忽聞西廊有人行聲見四人出衣冠各異相與吟詠一衣冠長人曰齊紈魯縞如霜雪寥亮髙聲為子發一黒衣短陋者曰家貧良㑹清夜時熒煌燈燭我能持一故敝黄衣者曰清冷之泉俟朝汲長綆相牽長出入一黒衣冠身亦短陋者曰㸑薪煑水常煎熬充他口腹我為勞遲明方散起而視之乃有一杵燭䑓水桶破鐺而巳幽恠録彭州天台禅院前致仕焦将軍彦賔所創也天台僧行燈掌之刺史安思謙男守範與賔客道聫句以紀其來守範出首句曰偶到天台院因逢物外僧定武軍推官楊鼎夫繼曰忘機同一祖出語離三乗前懐逺軍周述曰古徳𤣥意逺外牕虚景澄前眉州判官李仁肇音聫曰片時松影下聫續百千燈遂請閑僧教大師義西八分書於牌翌日有貧子乞食於院見而髙聲讀之曰人道有初無尾此則有尾無初後五年首頷俱碎不如尾句者乎院僧驅逐貧子曵杖四顧曰此後生不逺千里即欲到來人以為狂言果五年誅思謙守範伏法鼎夫暴亡此則首頷俱碎之義也行燈歸寂寺僧蜀王盡遣出之後住持院僧適自興元歸則是不逺千里之義也貧子之說一無謬焉楊鼎城郭都人甞逰青城山過皂江溺而又出登㟁遽有老人以杖接引且笑曰元是塩裏人本非水中物旋失老人所在因作詩以紀之曰青城山峭江水寒欲渡當時值急湍棹急狂風趍逺㟁舟逢恠石碎前灣手攀弱杖倉皇處命在洪濤頃刻間今日深恩無以報令人羞說雀銜環至成都與知已言竟莫究塩裏人之義後為居安思謙幕判成都闕塩院感疾暴亡以塩裹其屍歸上蜀野人閒話海南城東有两井相去咫尺而異味號雙井井源出山源山石罅中東坡酌水異之曰吾尋白龍不見今家此水乎同㳺怪問其故曰白龍當為東城出俄見其脊尾如爛銀蛇伏忽水渾有氣浮水面舉首如􅀈玉筯乃泳而去余定两井太守張子容為造庵井上號思逺亭號泂酌崖有恠樹樹枝腋有詩曰岩泉未入井蒙然冒沙石泉漱洄為靨石老生罅隙異哉寸波中露此横海脊先生酌泉笑泉香龍神蟄舉首玉筯揷忽去銀釘擲大身何時見夭矯翔霹靂誰言鵬背大更覺宇宙窄字畫如顔書無名衘日月此詩氣格似東坡而言泉漱石老似非東坡又語散緩疑學而為之也龍為蛇形小如玉筯同上鬼神門大厯十三年李道昌為姑蘇太守忽一日城南虎邱山有鬼題二詩扵石壁上其一云青松多悲風蕭蕭聲且哀南山接幽壠幽壠空崔嵬白日徒昭昭不照長夜䑓雖知生者樂魂魄安能廻况復人所親慟哭心膽摧慟哭復何言哀哉復哀哉其二云神仙不可學中化空㳺魂白日非我朝青松為我門雖復隔幽隴猶知念子孫何以遺悲怨萬物歸其根寄語世上人莫厭臨芳尊荘生問枯骨生樂徒虚言道昌録奏准勑致祭祭畢其詩乃㓕後數日又隠出詩一首曰幽冥雖異路平昔忝攻文欲知髙卧處山北兩孤墳尋于山後得兩墳極髙廣至今存焉唐宋遺史許周士泊舟淮隂醉題淮隂廟曰脫身仗劍歸明主授鉞登壇是得人千騎争馳擒虎口萬嚢不㫁堰龍津拔旗破趙如摧朽一皷搶齊速若神功業盖時雖不賞威名震主即危身時來且佩三齊印勢去翻輸一婦人得意不思防後患窮居何用結邉臣名留青史成何事血汚西鍾幾掬塵遂使後來征戰者却愁他日似将軍還舟方寐夢介士擁見周士曰足下詩固好然未合於理也信去楚歸漢起自行伍髙祖結壇授鉞雖立功名一旦自藴忿躁之氣外結邉臣内謀大叛死為萬世醜吾今血食於此亦出望外而子之詩重吾過為懦無所守将安用也摭遺賈魏公尹京日忽有人來展刺謁曰前江南國主李煜相見則一清瘦道士爾公曰太師已物故何得及此曰某㓜探釋氏未逹誤有所見今為師子國王偶思鍾山而來懐中取一詩授公曰異國非所志煩勞殊清閑驚濤千萬里無乃見鍾山公讀之隨身灰㓕張孝和關中人淳化壬辰年㳺淮南在夀春與張李二生被酒及淮漘入就龍女祠取桐葉寫詩两句云我是夢中傳彩筆欲書花葉寄朝雲投於帳中而去一旦獨至其祠忽簾中有婦人邀而置酒贈孝和詩一絶曰落㠶且泊小沙灘霜月無波淮上寒若向江湖得消息為傳風水到長安孝和告去行數十步忽小女奴呌曰娘子令還桐葉勿復置念孝和得之回顧惟古祠敗舎而已李珦字温叔都官外郎之㓜女也八嵗能詩甞作榴花一絶云烈火真紅輕皺面晨霞碎剪貼枝條金刀刺出猩猩血濺落芳叢乆不銷後適江夏人王常同泛舟射利江湖間婁徹為江州清風亭記常觀歎美珦曰未之盡也何不云青山緑水萬里有盡處清風明月千古無老時一日舉其文於徹徹卒用其言為破題不乆常死而珦溺舟於三山磯下後三日屍忽出於水中士人異之為立廟熈寧開都人張芝過廟作三絶焚於廟中一云風軟潮生江水平遥峰隠隠浸寒青自從香骨沉波底獨我為詩弔爾靈二云軋軋櫓聲離逺浦蕭蕭㠶影落寒濤殷勤滴酒陳佳果将此深心慰寂寥三云江雨初晴逺岫低心因啼鳥陡思歸爾如㑹我題詩意魂夢相求一處飛既夜一青衣召云娘子奉俟乆矣芝曰娘子為誰青衣曰早來獻詩與誰耶芝乃悟見一婦人謂芝曰早來佳章欲托以夢寐是或不真不能盡所懐故求面見妾溺此時水官令賦詩及校九江㑹源録一夕而畢水官大恱令江神出其屍顯其靈今有祠在此血食於人謝子之詩意所不敢當荅以詩曰梅天半霽江水漲水揺花影紅蕩漾東風抛雨過江西截江一瞬生銀浪閴然不見鷗鷺飛漁唱四沉烟瞑蕩忽然晴霽碧虚闊水色天光月下上栁風和軟浪無聲客櫓嘔軋中流鳴两㟁沙頭拾翠女嬉笑携手相将行秋入空江潦水静澄江一碧如寒鏡逺㠶㓕没入雲中菱唱微茫晚風瞑西風脫朩露三山隠隠樵歸亂石間霜猿哀落岩前月杜宇枝間更啼血蓬窓風𦂳客衣單中夜危腸幾欲絶我本名家閨中女聘得良人共途路相将雲水二十年所得歡心亦無數豈期天禍及一身夫死身沉大江去猛風吹雲無定踪盡日隂愁難得雨秋髙水冷白骨寒孤兒稚女歸何處因公遺我白玉篇慰此窮泉生和煦明朝仙舸宿何州回首寒江烟雨暮芝見詩嘆賞久之又出白金二百星贈芝曰煩礲一石載妾前事亦有奉報如何芝受其金送芝出幄則已五皷矣芝後因循不能為立石舟再過三山下幾至傾覆是夜又夢其女深詬責之負其事翰府名談李羣玉校書過二妃廟題詩曰小孤洲北浦雲邉二女明粧共儼然野廟向江春寂寂古碑無字草芊芊東風近墓吹芳芷落日深山哭杜䳌猶似含嚬望廵狩九嶷如黛隔湘川題黄陵廟詩曰黄陵廟前芳草春黄陵女兒茜裙新輕舟小檝唱歌去水逺山長愁殺人又曰黄陵廟前春已空子䂓啼血淚春風不知精爽落何處疑是行雲秋色中羣玉自以第三篇春空便到秋色踟蹰欲改二女俄出焉羣玉悉其所陳而題於後涉重湖至潯陽太守叚成式索為詩酒侣具述其事後二年而羣玉逝故哭李詩曰酒裏詩中三十年縱横唐突世喧喧明時不作禰衡死傲盡公卿歸九泉又曰曾說黄陵事今為白日催老無男女累誰哭向泉䑓䖍州布衣頼仙芝言連州有黄損僕射五代時人僕射盖仕南漢也未老退歸一日忽遁去莫知所在子孫畫像事之凢三十三年乃歸坐阼階上呼家人其子不在孫出見之索筆書壁上云一别人間嵗月多歸來人事已銷磨惟有門前鑑池水春風不改舊時波投筆而去不可留子歸問其状貌云甚似影堂中人也連州相傳如此其後頗有禄仕者艾子病熱稍昏夢中神㳺隂府見閻王升殿治事有數鬼招一人至一吏前白曰此人在世惟務持人隂事思於財物雖無過者必巧造端以誘陷之然後摘抉准法合以五百億萬斤柴於鑊湯中煑之王曰可令赴獄有一牛頭捽執之而去其人私謂牛頭曰君何人曰吾鑊湯獄主獄之事皆吾主之其人又曰既為獄主固首主也而豹皮襖若是敝鬼曰冥中無此皮若陽人焚化方得吾名不顯於人間故無焚貺者其人又曰某之外氏獵徒也家常有此皮若蒙主見憫少减柴數得還即焚化十皮為獄主作裩其鬼喜曰為女去億萬二字以敗其徒則汝得速還兼免沸煑之苦二三人於是义入鑊煑之其牛頭者時來相問小鬼見如此必欲庇之亦不敢令火熾遂報柴足既出鑊束帶将行牛頭曰勿忘皮也其人乃明顧曰有詩一首奉贈云牛頭獄主要知聞權在閻王不在君减刻官柴猶自可更求枉法豹皮裩牛頭大怒义入鑊湯益薪煑之艾子既寤語於徒曰湏信口是禍之門並百斛明珠周祖起於鄴范魯公遁迹民間執紙扇偶題云大熱去酷吏清風來故人坐茶肆中忽一形貌怪陋者前揖之曰相公相公勿慮勿慮律其扇曰輕重無准吏得舞文何止大熱耶公當深究獄弊持扇急去後一日於古廟後門鬼手中持其扇乃茶肆中見者未幾周祖果得公扵民間遂大用憶陋鬼之言首議刑於䟽曰先王所恤莫重扵刑今繁苛失中􅁿重無准民罹横刑吏得舞法周祖從其言命公與知雜張湜等刋定五年書成目曰刑統玉壺清話詩話總龜四十七欽定四庫全書詩話總龜巻四十八宋阮閱撰鬼
