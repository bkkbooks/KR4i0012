front:
  text: 三十七
  hash: sha256:4f231e479a9a3aac46518635f2bbff4dd3b5ea73f6479cf501ebc2eccc900f36
body:
  text: 宋阮閱撰譏誚門下大中元年魏扶知禮闈入貢院題詩曰梧桐葉落滿庭隂鎻閉朱門試院深曽是昔年辛苦地不將今日負前心及榜出為無名子削為五言詩譏之南部新書先天中王上客為侍御史自以才望當前行忽除膳部員外郎㣲有恨惋吏部郎中張思咏曰有意嫌兵部專心望考功誰知脚踜蹬幾落省橋東蓋膳部省最東北隅也趙璘儀質麽陋第名後赴姻禮儐相以詩嘲之曰巡闗雖傍樗蒲局望月還登乞巧樓第一莫教蛛蜘過縁人衣帶上人頭又曰不知元在鞍橋裏將謂空䭾席㡌歸又曰火爐床上平軀立便與夫人作鏡䑓崔立言髙退隠茅山善謔浪為詩贈營妓敦龎者曰瓦棺寺裏逄行跡華岳山頭露掌痕不湏惆悵愁難嫁待與將書問岳神瓦棺寺有大佛跡岳神大人又醉中謔浙江㢘使曰山天留意向丹梯連帥邀來出藥畦常見浙東誇鏡水鏡湖元在浙江西並同上太平廣記言杜牧為宣州幕有酒妓肥大牧之贈詩曰盤祖當時有逺孫尚令今日逞家門一車白土將泥臉十幅紅綃補破裩瓦棺寺裏逢行跡華岳山前見掌痕不湏啼哭愁難嫁待與將書問岳神與此同未知孰是張唐卿進士第一人及第期集於興國寺題壁云一舉首登龍虎榜十年身到鳯凰池有人續云君看姚煥幷梁固不得朝官未可知後果京官筆談惠崇詩自負有河分岡勢斷春入燒痕青時人或有疑譏其犯古者嘲之曰河分岡勢司空曙春入燒痕劉長卿不是師兄多古句古人詩句似師兄居聞轉話元居中作宿守郡有官妓小蘇善歌舞㓜而聰慧元守甚怜之一日宴罷令就座客闗彥長求詩闗善詼諧即當時名公也得詩云昔日聞蘇小今朝見小蘇未知蘇小貌得似小蘇無由是以此自負相傳以起聲士大夫従此作詩甚衆洎長大數年間體豐脩長未免尚語此蘇子瞻出知湖州亦來乞詩蘇書與之云舞腰窈窕影揺千尺龍蛇動歌喉宛轉聲㪚半天風雨寒此石曼卿古松詩遂士大夫笑泗上錄曺唐羅隠同時才情不殊羅曰唐有鬼詩或曰何也曰水底有天春寂􅄫人間無路月茫茫唐曰羅有女子詩或曰何也曰若教觧語應傾國任是無情也動人此葢羅牡丹詩也廬懐抒情賈島狂狷行薄執政惡之故不與選裴晉公於興化作池亭島詩曰破却千家作一池不栽桃李種薔薇薔薇花謝秋風起荆棘滿庭公始知人皆惡其不遜古今詩話胡旦秘監性褊躁表眀居襄陽屢譏郡政夏英公常師事之及公貴達胡尚以青衫眡公公出鎮㐮陽時一造焉一日謂公曰讀書乎郡事少暇比只作得一燕雀詩胡曰試舉之曰燕雀紛紛出亂麻漢江西畔使君家空堂自恨無金弹任爾啾啾到日斜自爾少戢蔡君謨守福唐會李太伯與陳烈於望海亭以歌者侑酒方舉板一拍陳驚怖越席攀木踰垣而去李作詩曰七閩山水掌中窺乘興登臨到落暉誰在畵橋沽酒處幾多鳴櫓趁朝歸晴來海色依希見醉後鄉心積漸㣲山鳥不知紅粉落一聲檀板便驚飛葢譏其矯也梅聖俞過楊州宋公序送鵞作詩謝云嘗遊鳯池上曾食鳯池萍乞與江湖客従交養素翎公序得詩不懌同前乾符末有客寓於廣陵開元寺不為僧所禮一筆題門而去龕龍去東海時日隠西斜敬文今不在碎石入流砂僧衆皆不能詳之獨有沙彌能觧衆問其由則龕龍去矣有合字時日隠矣有寺字敬文不在茍字也碎石入流沙卒字也此不遜之言辱我曺也衆僧大悟沙彌乃懿皇朝雲皓供奉也長沙六快詩致仕屯田王撥作也六人謂師周沆漕趙良規憲李碩劉舜臣倅朱景陽許𤣥詩略曰湖外風物奇長沙信難續衡峰排古青湘水湛寒緑舟楫通大江車輪會平陸昔賢官是邦仁澤流豐沃今賢官是邦刳㗖人脂肉懐昔甘棠花傷今猛虎毒然此一郡内所樂人纔六漕與二憲僚守連兩通屬髙堂日暮會深夜繼以燭幃幙皆綺紈器皿盡金玉歌喉若珠纍舞腰如素束千態與萬狀六人歡不足因成快活詩薦之堯舜目餘數聫猥不可錄揆與樊太博立里閈友素俱老於故鄉而林泉相依以二踈自髙謗詩旣出捕樊以脅之樊義薄無守悉以遊従之事賣之以求茍免而希賞獄且讟謗削籍立以告發加秩昻然拜命略無三褫之羞訓詞云為爾交者不其難乎湘山録皇甫松著醉鄉日月三巻自叙之云松承相奇章公表甥然不薦舉因襄陽大水變極言誹謗有夜入真珠室朝遊瑇瑁房之句承相有愛姬名真珠張曙崔昭緯中和間西川同舉相與謁日者問命時曙自恃才名籍甚人皆呼為將來狀元崔亦分居其下無何日者殊不顧曙惟目崔曰將來萬全及第曙有愠色曰郎君亦及第但崔家郎君拜相當於此時過堂既而曙果以愴恤不終場昭緯首冠曙以詩刺之曰千里江山陪驥尾五更風水失龍鱗昨夜浣沙溪上雨緑楊芳草為何人崔不平之會夜飲崔以巨觥飲張拒之崔曰但喫待我作宰相與你取狀元張拂衣而出因不叶後七年崔自内廷大拜張於後三榜裴公下及第果於崔公下過堂並同上崔珏佐大魏公幕與副車袁充不叶公俱薦之於朝崔拜芸閣校讐縦舟江滸會有客以絲桐詣公公善之而迎珏至公從容為客請一篇珏方懐拂欎因而發洩所蓄為詩七條絃上五音寒此藝知音自古難惟有河南房次律始終怜得董庭蘭公不懌崔大慙恚元㣲之在浙東時賔府有薛書記飲酒醉因争令以酒器撃傷㣲之由此遂去幕乃作十離為獻詩云馴擾朱門四五年毛香足净有人怜無端咬著親情脚不得紅絲毯上眠犬離家越管宣毫始稱情紅牋紙上撒花瓊都縁用久鋒頭盡不得羲之手裏擎筆離手雲耳紅毛淺碧蹄追風曽到日東西為驚玉兒郎君墜不得華軒更一嘶馬離廐隴西獨自一孤身飛去飛來上錦茵都縁出語無方便不得籠中更喚人鸚鵡離籠出日朱門未忍抛有人常愛語咬咬啣泥穢污珊瑚簟不得梁間更壘巢燕離巢皎潔圓明内外通清光似照水晶宫都縁一點瑕相汚不得終宵在掌中珠離掌戯躍蓮池四五秋常摇朱尾㺯輪鈎無端擺㫁芙蓉朶不得清波更一游魚離池爪利如鋒眼似鈴平原捉兎趂髙情無端竄向青雲外不得而今手上擎鷹離鞲蓊欎新栽四五行常將正節負秋霜為縁春笋鑚墻出不得垂隂覆玉堂竹離亭鑄㵼黃金鑑始開初生三五月徘徊為遭無限塵䝉污不得華堂上玉䑓鑑離䑓元公詩曰馬上同携今日盃湖邊還拂去年梅年年只是人空老䖏䖏何曽花不開歌咏每添詩酒興醉酣還命管絃來墫前百事皆依舊㸃檢唯無薛秀才摭言鑑戒録有薛濤上連師犬離家魚離池鸚鵡離籠竹離叢珠離掌五詩謂薛書記不知孰事是趙昌言為樞密副使時陳儀與董儼俱為三司塩鐵副使胡旦知制誥院盡同年生俱少年為一時之俊梁顥又嘗與同幕五人者旦夕會飲於樞第茶觴壺矢未嘗虛日每乘醉夜方歸金吾吏遂夜候馬首聲喏儀以醉鞭指其吏曰金吾不惜夜玉漏莫相催都人諺曰陳三更董半夜玉壺清話張文潜嘗作齊安行詞甚不羙末云最愁三伏熱如甑北客十人九人病百年生死向中州千金莫作齊安游而潘邠老黄人也為作觧嘲云為邦雖陋勿雌黄我曽侍立蘇公旁見公顔色不憔悴不似賈誼來江湘他州雖粗勝吾州無此兩公相繼游直方詩話王令逢原廣陵人既見知於舒王聲譽赫然時附麗之徒望風伺候守牧冠葢日滿其門進譽獻謟初不及文字間也逢原厭之大署其門云紛紛閭巷士看我復何為來即令我煩去即我不思意有知耻者而干謁不衰東坡號思聡詩為水鏡集又作序贈之云聡能為水鏡以一含方則書與詩當益奇吾將觀焉以為聡得道深之候及聡來京師種種不進有也戯之云水鏡年來亦太昏張文潜作大旱詩云天邊趙盾益可畏水底武侯方醉眠時人以為幾於湯燖右軍也並同上晉劉道真遭亂於河側牽船見一老嫗搖櫓道真嘲之曰女子何不調機弄杼因甚旁河搖櫓答曰丈夫不跨馬揮鞭因甚旁河牽船又嘗與人草中同盤共飲見一嫗將兩小兒過並着青衣嘲之曰青羊引雙羔婦人曰兩猪共一槽道真無以對因話録唐宋國公瑀不觧射九月九日賜射瑀箭俱不着垜一無所獲歐陽詢詠之曰急風吹緩箭弱水馭強弓欲髙翻復下應西還又東十回俱着地兩度倂擎空借問誰為此只應是宋公蕭瑀封宋國公太平廣記東臯子王績字無功有杜康廟碑醉鄉記備言酒德廣陵人劉虛白擢進士第嗜酒有詩云知道醉鄉無戸稅任他荒却下丹田世之嗜酒者茍為仲尼之徒得為誥戒乎北夢𤨏言李度顯徳中舉進士攻詩有醉輕浮世事老重故鄉人之句人多誦之王朴為樞密以此一聫薦於申文炳知舉遂擢為第三人嘲曰主司只選一聫詩玉壺清話㓂萊公嘗與張洎同省一日作庭雀詩譏洎曰少年挾弹多狂逸不用金丸用䗶丸葢譏洎頃在江南重圍中而李煜草詔内於臈丸中追上江救兵之事也洎不免強顔附之後稍親暱同上龔彦和謫化州持不殺戒日夜禮佛對客蟣虱滿衣領不恤也鄒志完嘲曰衣領従教虱子縁夜深拜得蓆兒穿道鄉活計君知否飢即須飡困即眠冷齋夜話詩話總龜巻三十七欽定四庫全書詩話總龜巻
