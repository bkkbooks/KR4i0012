front:
  text: 三十一宋阮閲撰
  hash: sha256:23ed002906e3dcbfb1daf8bef9ab28b2d2b8b666a2e3bbce67bb0dd27a5fd410
body:
  text: 格致門詩眼山谷言文章必謹布置毎見後學多言以原道命意曲折後予以此槩考古人法度如贈韋見素詩云紈袴不餓死儒冠多誤身此一篇立意故使人静聴而具陳之自甫昔少年日早充觀國賔致君堯舜上再使風俗淳皆儒冠事業也自此意竟蕭條至蹭蹬無縱鱗言誤身如此也則意舉而文備故巳有是詩矣然必言其所以贈韋者於是有厚愧真知之句所以真知者謂傳誦其詩也然宰相職在薦賢不當徒愛人而已士故不能無望故曰竊效貢公喜難甘原憲貧果不能薦賢則去之可也故曰焉能心怏怏秪是走踆踆又將去海而去秦也然其去也必有遲遲不忍之意故曰尚怜終南山囘首清渭濵則所知不可以不别故曰常懐報一飰况懐辭大臣夫如此是可以相忘於江湖之外雖見亦不可得而見矣故曰白鷗沒浩蕩萬里誰能馴終焉此詩前賢錄為壓巻盖布置最得正體如官府甲第㕔堂房室各有定處不可亂也韓文公原道與書之堯典如此其他皆謂之變體可也曲水脩禊之㑹人各賦詩成两篇者自右軍安石而下纔十一人成一篇者郗曇虞悦而下十五人詩不成罰觥者凡十六人今觀所傳詩數皆四言五言而又两類者两四韻者無幾四言二韻正十六字耳當時得預者往往皆知名士豈獻之軰終日不能措辭於十六字哉切意古人持重自惜不欲率爾恐貽乆逺譏議不如不賦之為愈黄常明白獻晉公云聞說風情䈥力在只如初破蔡州時雖叙其功業與夀康其語緩而不迫此可為作詩法也䂬溪省題詩自成一家非他詩比也首韻拘於見題則易於牽合中聫縳於法律則易於駢對非若遊戯於烟雲月露之形可以縱横在我者也王昌齡錢起孟浩然李商隐軰皆有詩名至於作省題詩則踈矣王昌齡四時調玉燭詩云祥光長赫矣佳號得温其錢起巨魚縱大壑詩云方快吞舟意尤殊在藻嬉孟浩然騏驥長鳴詩云逐逐懐良馭蕭蕭顧樂鳴李商隐桃李無言詩云夭桃花正發穠李蕊方繁此等句兒童無異以此知省題詩自成一家也丹陽集古辭云藁砧今何在山上復有山何當大刀頭破鏡飛上天藁砧砆也謂夫也山上有山出也大刀頭刀上鐶也破鏡言半月當還也此詩格非當時有釋之者後人豈能曉哉古辭又云圍碁燒敗襖着子故依然陸龜䝉皮日休固嘗擬之陸云旦日思雙履明時願早諧皮云莫言春繭薄猶有萬重思是皆以下句釋上句與藁砧異矣樂府觧題以此格為風人詩取陳詩以觀民風示不顯言之意至東坡無題詩云蓮子擘開須見薏秋枰着盡更無棊破衫却有重縫處一飯何曽忘却匙是文與釋並見於一句中與風人詩又小異矣丹陽集老杜歌行與長韻律詩後人莫及而蘇黄用韻下字用故事處亦古所未到晉宋間人造語題品絶妙今古近世蘇黄帖題䟦之類率用此法尤為要妙吕氏童䝉訓學退之不至李翺皇甫湜然翺湜之文足以窺測作文用力處近世欲學詩則莫若先考江西諸𣲖吕氏童䝉訓老杜歌行最見次第出入本末而東坡長句波瀾浩大變化不測如作雅劇打猛顐入却打猛顐出也吕氏童䝉訓讀古詩十九首及曹子建詩如明月照高樓流光正徘徊之類詩皆思深逺而有餘意言有盡而意無窮也學者當以此等詩嘗自涵養自然下筆高妙大槩學詩須以三百篇辭及漢魏間人詩為主方見古人妙處自無齊梁間綺靡氣味也少游過嶺後詩嚴重高古自成一家與舊作不同學者亦宜詳味文潜詩自然竒逸非他人可及如秋明樹外天客燈青映壁城角冷吟霜淺山寒帶水旱日早吹風川塢半夜雨卧冷五更秋之類逈出時流雖是天姿亦學可及學者若能常玩味此等語自然有變化處也今人作詩自述則稱我謂人則稱君往往相習皆然杜子羙送孔巢父詩云道甫問信今何如墜馬諸公携酒相看詩云甫也諸侯老賔客遇王倚飲云在於甫也何由羡則自述乃稱名送樊侍御云至尊方旰食仗爾布嘉惠寄李太白云昔年有狂客號爾謫仙人送竇九云非爾更持節何人符大名則謂人乃稱爾若謂尊之甚則稱名則前三人皆非通貴之士若謂卑則甚之稱爾則後三人皆非穉孺之列盖其詩格變態如是恐不繫重輕也俲法門退之心訝近來惟貯火眼知别後自添花臨川云髪為感傷無翠葆眼從瞻望有𤣥花乆欽江揔文才妙自相虞翻骨相屯又云乆諸郭璞言多騐老比顔含意更踈韓我今罪重無歸望直去長安路八千永叔今日始知予罪大夷陵去此更三千柳十年顦顇到秦京誰料今為嶺外行王十年江海别常輕豈料今随寡嫂行柳直以踈慵招物議休將文字趂時名王直以文章供潤色未應風月負登臨十一年前南渡客四千里外北歸人又一身去國六千里萬死投荒十二年蘇七千里外二毛人十八灘頭一葉身黄五更歸夢三千里一日思親十二時皆不約而合句法使然故也黄常明老杜雨詩云紫崖奔處黒白鳥去邊明而江碧鳥逾白山青花欲燃之句似之贈王侍御云曉鶯工迸泪秋月觧傷神而感時花濺泪恨别鳥驚心之句似之殆是同一機軸也葛常之劉又詩酷似玉川子而傳於世者二十七篇而巳氷柱雪車二詩雖作語竒怪然議論亦皆出於正也氷柱詩云不為四時雨徒於道路成泥渣不為九江浪徒能泪役天之涯雪車詩謂官家不知民餒寒盡驅牛車盈道載屑玉載載欲何之秘蔵深宫以御炎酷如此等句亦有補於時與玉川月蝕詩稍相類丹陽集張籍云愛養無家客多傳得力方坡贈金山元老云蒜山幸有閑田地招此無家客任居葛常之白云趂凉行遶竹引睡卧看書坡引睡文書信手畨書引睡魔誠人人所同也葛常之詩病門學者須做有用文字不可盡力虚言有用文字所論文字是也議論文字須以董仲舒劉向為主禮記周禮及新序説苑之類皆當貫穿熟考則做一日便有一日工夫近世文字如曽子固諸序尤須詳味學古人文字須得短處如杜子羙詩頗有近質野處如封主簿親事不合詩之類是也東坡詩有汗漫處魯直詩有太新竒太巧處皆不可不知東坡詩如成都畫手開十眉楚山固多􅆐青者黠而夀皆窮極思致出新意於法度之表前賢所未到然學者専力於此則亦失古人作詩之意劉禹錫嘉話載楊祭酒贈項斯詩曰㡬度見君詩句好今觀標格勝於詩平生不觧蔵人善到處相逢説項斯斯集中絶少佳句如晩春花云踈與香風㑹細將泉影移别張籍云子城西並宅御水北同渠拙惡有餘宜祭酒公謂標格勝於詩也祭酒乃敬之也其贈斯詩鄙俗如此與斯亦奚逺哉葛常之樂府門周羙成為江寧府漂水令主簿之室有色而慧羙成毎欵洽于尊席之間世有傳風流子詞盖所寓意焉新綠小池塘風簾動碎影舞斜陽羡一作見金屋去來舊時巢燕土花繚繞前度莓墻綉閣鳳帷深䖏許聴得理絲簧欲説又休慮乖芳信未歌先噎愁轉清商暗想新粧了開朱户應自待月西廂最苦夣魂今宵不到伊行問甚時却與傳音密耗痴將秦鏡偷換韓香大便教人霎時厮見何妨新綠待月皆簿㕔亭軒之名也俞羲仲云徐幹臣伸三衢人政和初以知音律為太常典樂出知常州嘗自製轉調二郎神之詞云悶來彈鵲又攪碎一簾花影謾試着春衫還思纎手薫徹金虬燼冷動是愁端如何向但恠得新來多病嗟舊日沈腰如今潘鬂怎堪臨鏡重省别時泪滴羅襟猶凝為我厭厭日高慵起長託春酲未醒鴈足不來馬蹄難駐門掩一亭芳景空佇立盡日欄杆倚遍晝長人静既成㑹開封户李孝夀來牧吾郡李以嚴治京兆號李閻羅道出郡下幹臣大合樂燕勞之喻羣娼令謳此詞必待其問乃止娼如戒歌至三四李果詢之幹臣蹙頞云某頃有一侍婢色藝冠絶前嵗以亡室不容逐去今聞在蘇州一兵官處屢遣信欲復來而今之主公靳之感慨賦此詞中所叙多其書中語適有天幸公擁麾于彼不審能為我致之否李云此甚不難可無慮也既次無錫賔賛者請受謁次第李云郡官當至楓橋橋距城十里而逺翌日艤舟其所官吏上下望風股栗李一閲刺忽大怒云都監在法不許出城乃亦至此使郡中萬一有火盗之虞豈不殆哉斥都監下堦荷校送獄又數日取其供牘判奏字其家震惧求援宛轉哀鳴致懇李笑云且還徐典樂之妾了來理㑹兵官者觧其指即日承命然後舎之曽文肅十子㝡鍾愛外祖空青公有夀詞云江南客家有寧馨兒三世文章稱大手一門兄弟獨良眉籍甚衆多推千里足來自渥洼池莫倚善題鸚鵡賦青山須待健時歸不似傲當時其後外祖果以詞翰名世可謂父子為知巳也揮塵録世傳温公有西江月一詞今復得錦堂春云紅日遲遲虚廊轉影槐隂迤􅆔西斜彩筆工夫難狀晩意烟霞蝶尚不知春去漫遶幽砌㝷花奈猛風過後縱有殘紅飛向誰家始知青鬂無價歎飄零宦路荏苒年華今日笙歌叢裏特地咨嗟席上青衫濕透算感舊何止琵琶怎不教人見老多少離愁散在天涯東臯雜錄送劉貢父守維陽作長短句云平山欄檻倚晴空山色有無中平山堂望江右諸山甚近或以謂永叔短視故云山色有無中東坡笑之因賦快哉亭道其事云長記平山堂上欹枕江南烟雨杳杳沒孤鴻認取醉翁語山色有無中盖山色有無中非烟雨不能然也藝苑方囘詞有鴈後歸云巧剪合歡羅勝子釵頭春意翩翩艶歌淺笑拜嫣然願郎宜此酒行樂駐華年未至文園多病客幽襟悽斷堪怜舊遊夢挂碧雲邉人歸落鴈後思發在花前山谷守當塗方囘過焉人日席上作也腔本臨江仙山谷以方囘用薛道衡詩故易以鴈後歸云唐劉餗傳記云隋薛道衡聘陳為人日詩曰入春纔七日離家已二年南人嗤之及云人歸落鴈後思發在花前乃曰名下無虚士復齋漫錄後山詩話謂退之以文為詩子瞻以詩為詞如教坊雷大使之舞雖極天下之工要非本色余謂後山之言過矣子瞻佳詞冣多其間傑出者如大江東去浪淘盡千古風流人物赤壁詞明月幾時有把酒問青天中秋詞落日綉簾捲庭下水澄空快哉亭詞乳燕飛華屋悄無人桐隂轉午初夏詞明月如霜好風如水清景無限夜登燕子樓詞楚山脩竹如雲異材秀出千林表詠笛詞玉骨那愁瘴霧氷肌自有仙風咏梅詞東武南城新堤固漣漪初溢宴流杯亭詞氷肌玉骨自清凉無汗夏夜詞有情風萬里巻潮來無情送潮歸别參寥詞缺月挂踈桐漏斷人初静秋夜詞霜降水痕收淺碧鱗鱗露逺洲九日詞凡此十餘詞皆絶去筆墨畦逕間直造古人不到處真可使人一唱而三歎若謂以詩為詞是大不然子瞻自言平生不善唱曲故間有不入腔處非盡如此后山乃比之教坊雷大使舞是何毎况愈下盖其謬耳詩話總龜後集巻三十一欽定四庫全書詩話總龜後集巻
