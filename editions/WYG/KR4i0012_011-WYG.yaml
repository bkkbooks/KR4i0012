body:
  text: 雅什門下張瀛碧之子也事廣南劉氏官至曹郎嘗爲歌贈琴棋僧同列見之曰非其父不生其子詩云我嘗聽師法一説波上蓮花水中月不垢不净是色空無法無空亦無滅我嘗聽師禪一觀浪溢鰲頭蟾魄滿河沙世界盡空空一寸寒灰冷燈畔我又聽師琴一撫長松喚住秋山雨絃中雅弄若鏗金指下寒泉流太古我又聽師棋一着山頂坐沉紅日脚阿誰稱是國手人羅浮道士賭却鶴輸却藥法懷斟下紅霞丹束手不敢爭頭角雅言系述翁宏字大舉桂嶺人常寓居韶賀間不仕進能詩宫詞云又是春殘也如何出翠帷落花人獨立㣲雨燕雙飛寓目魂將斷經年夢亦非那堪向秋夕蕭颯暮蟾輝秋風曲云又是秋殘也無聊意若何客程江外逺歸思夜深多峴首飛黄葉湘湄走白波仍聞漢都護今歲合休戈塞上曲云風高弓力大霜重角聲乾海中山云客帆來異域别島落蟠桃中秋月云寒清萬國土冷鬬四維根曉月云漏光殘井甃缺影背山椒送人下峽云萬木殘秋裏孤舟半夜猿南越行云因尋賣珠客悞入射猿家細雨云何處殘春夜和花落古宫途中逢故人云孤舟半夜雨上國十年心開寶中衡山處士廖融南逰宏有詩云病卧瘴雲閒莓苔漬竹關孤吟牛渚月老憶洞庭山壯志潜消盡淳風竟未還今朝忽相遇執手一開顔宏以百篇示融融謝宏云高竒一百篇見造化工全積思逰滄海冥搜入洞天神珠迷罔象瑞玉匪雕鑴休歎不得力離騷千古傳王元懷云獨夜思君切無人知此情滄洲歸未得華髪别來生孤舘木初落高空月正明逺書多隔歲猶念没前程皆佳句也張子明攸縣人居鳯巢山有詩名孤鴈一篇最佳云隻影翩翩下碧湘旁池鴛鷺下銀塘雖逢夜雨迷深浦終向晴天着舊行憶伴㡬回思片月蜕翎多爲繫繁霜江南塞北俱闗切兩地歸飛似故鄉路洵美唐相巖之元孫有夜坐詩云簾捲竹軒清四鄰無語聲漏從吟裏轉月自坐來明草木露華濕衣裳寒氣生難逢知鍳者空悦此時情競傳於湖南伍彬邳陽人初事馬氏王師下湖湘授官爲安邑簿秩滿歸隱題全義分水嶺云前賢功及物禹後杳難儔不及古今色平分南北流寒衝山影岸清繞荻花洲盡是朝宗去潺湲早晩休夏日喜雨云稚子出看莎徑没漁翁來報竹橋流辭解牧云蹤跡未辭鴛鷺客夢魂先到鷓鴣村洎居隱廖融書其屋曰圓塘緑水平魚躍紫蓴生要路貧無力深村老退耕犢隨原草逺蛙傍塹籬鳴撥棹茶川去初逢榖雨晴路振贈詩云考終秋􅁂白歸隱舊峰前庭樹鳥頻啄山房人尚眠寒巖落桂子野水過茶煙已絶勞生念䖍心向竺乾王元字文元桂林人有登祝融峰詩云萬叠到孤頂身齊高鳥翔勢疑撞翼軫翠欲滴瀟湘雲濕幽崖滑風梳古木香晴空聊縱目杳杳極窮荒又聽琴云拂塵開素匣有客獨傷時郡閣雅談記第二句何事獨顰眉古調俗不樂正聲君自知寒泉出澗澁老檜倚風悲縱有來聽者誰堪繼子期題鄧真人遺址云三千功滿輕升去留得山前舊隱基但見白雲長掩映不知浮世㡬興衰松梢風觸霓旌動㯶葉霜霑鶴翅埀近代無人尋異事野泉噴月寫秋池與廖融爲詩友贈之云伴行惟瘦鶴尋寺入深雲終於長沙李韶郴州人苦吟固窮題司空山觀云梁代真人上紫㣲水盤山脚五雲飛杉松老盡無消息猶得千年一度歸識者謂韶必無名果如其言王元有詩悼之云韶也命何覉生前與世違貧棲古梵刹終着舊麻衣雅句僧抄遍孤墳客弔稀故園今孰在應見夢中歸陸蟾不知何許人居攸縣司空山聞子規云後夜入清明逰人何處聽花殘斑竹廟雨歇峴山亭樹罅月欲落牕間酒正醒衆禽方在夢誰念爾勞形王操字正美江左人太平興國上南郊賦授太子洗馬奉使隴右至石濠驛作黄葵詩於壁云昔年南國看黄葵雲􅁂金釵向後埀今日林容籬落下秋風寂寞兩三枝李相國昉自延安入覲見詩愛之後贈相國云袖中諌草朝天去頭上宫花侍宴歸贈劉將軍云三十懸鉤事聖朝功名常愛霍嫖姚錦衣香重花埀足玉帶光寒雪遶腰秣馬暖思秦地草弦弓秋憶鴈門鵰清時閒却英雄興醉聽笙歌擲酒瓢寒食云馬搖金勒嘶村墅人搶花毬落野田夜宴云彩牋分巻碧雲薄蠟燭對燒紅淚乾同前卞震蜀人嘗吟即事云雨壁長秋菌風枝落病蟬又云老笻搘瘦影寒木凭吟身春日偶題云詩債到春無處避離愁因醉暫時無即事云茶香解睡磨鐺煑山色牽懷着屐登並同前郭功父方與荆公坐有一人展刺云詩人龍太初功父勃然曰相公前敢稱詩人其不識去就如此荆公曰且請來相見既坐功父曰賢道能作詩能爲我賦乎太初曰甚好功父曰只從相公請箇詩題時方有一老兵以沙撩銅器荆公曰可作沙詩太初不頃刻間誦曰茫茫黄出塞漠漠白鋪汀鳥去風平篆潮回日射星功父閣筆太初縁此名聞東南余後於喬希聖家見太初詩一軸皆不及前所作直方詩話東坡作彭門守時過齊州李公擇中秋席上作一絶云暮雲收盡溢清寒銀漢無聲轉玉盤此生此夜不長好明日明年何處看其後山谷在黔南令以小秦王歌之韓持國酴醿一絶云平生爲愛此香濃仰靣常迎落絮風每到春歸有遺恨典刑尤在酒桮中詩云春陰埀野草青青時有幽花一樹明晩泊孤舟古祠下滿川風雨看潮生此蘇子美詩也雙同集又同前賀方回題一絶於定林云破冰泉脉潄籬根壞衲遙疑掛樹猿蠟屐舊痕尋不見東風先爲我開門舒王見之大稱賞縁此知名詩云欲掛衣冠神武門先尋水竹渭南村却將舊斬樓蘭劒買取黄牛教子孫不知何人作石曼卿以書名世然愈大愈妙嘗書三佛名最爲雄俊張文潜有詩云煌煌三佛名榜鐡金石鈕開張宫室上渾質山岳厚井水駭龍吟蟻封觀驥驟余愛能道其妙處詩曰蛟室圍青草龍堆隱白沙護隄盤古木迎棹舞神鵶破浪南風正收㠶畏日斜雲山千萬叠何處上仙槎此老杜過洞庭詩也李希聲云得之於江心一小石刻人生燭上花火滅巧妍盡春風饒樹頭日與化工進只知雨露貪不聞零落近昔我飛骨時慘見當塗墳青松靄朝霞縹緲山下村既死明月魄無復玻瓈魂念此一脱灑長嘯登崐崘醉着鸞鳯衣星斗俯可捫又曰朝披雲夢澤笠釣青茫茫尋緑得雙鯉中有二元章篆字若丹蛇遶勢如飛翔歸來問天老奥義不可量金刅割青紫靈文爛煌煌嚥服十二環奄有仙人房暮跨紫鱗去海氣侵肌凉龍子善變化化作梅花妝贈我叠叠珠靡靡明月光勸我穿絡縷繫作裾間璫挹予以辭去談笑聞餘香元祐八年東坡帥定武李方叔王仲弓别於惠齊出示南岳典寶東華李真人像又出此二詩曰此李真人作也近有人於江上遇之得此云即李太白也並同前楊大年錢文僖晏元獻劉子儀以文章立朝爲詩皆宗李義山號西崑體後進效之多竊取義山語嘗御賜百官宴優人有裝爲義山者衣服敗裂告人曰爲諸舘職撏撦至此聞者大噱然大年漢武詩云力通青海求龍種死諱文成食馬肝待詔先生齒編貝忍令乞米向長安義山不能過古今詩話王正白唐末大播詩名嘗作御溝詩云一𣲖御溝水緑槐相蔭青此波㴠帝澤無處濯塵纓鳥道來雖險龍池到自平朝宗心本切願向急流傾示貫休休曰剰一字正白揚袂而去休曰此公思敏書一中字於掌逡廵正白回曰此中㴠帝澤休以掌中示之不異所改青𤨏後集史青零陵人其先客籍秦隴㓜而聰敏博聞强記開元初年上表自薦臣聞曹子建七步成章臣愚以爲七步太多若賜召試五步之内可塞明詔明皇試以除夜上元觀燈竹火籠等詩惟除夜最佳云今歲今宵盡明年明日催寒隨一夜去春逐五更來氣色空中改容顔暗裏摧風光人不覺已入後園梅唐宋詩以爲王湮作明皇稱賞僧乾康零陵人齊巳在長沙居湘西道林寺乾康徃謁之齊已知其爲人使謂曰我師門仭非詩人不游大徳來非詩人耶請爲一絶以代門刺乾康詩曰隔㟁紅塵忙似火當軒青嶂冷如冰烹茶童子休相問報道門前是衲僧齊已大喜日與欵接及别以詩送之乾康有經方干舊居詩云鏡湖中有月處士後無人荻笋抽高節鱸魚躍老鱗爲齊巳所稱乾徳中左補闕王伸知永州康捧詩見伸覩其老醜曰豈有狀貎如此能爲詩乎宜試之時積雪方消命爲詩康曰六出竒花已住開郡城相次見樓臺時人莫把和泥看一片飛從天上來伸驚曰其㫖不淺吾豈可以貎相人也待以殊禮賈島詩有影落句韓退之喜之渡桑乾詩曰客舍幷州已十霜歸心日夜憶咸陽如今又渡桑乾水却望幷州是故鄉赴長江道中詩曰䇿杖馳山驛逢人問梓州長江那可到行客替生愁冷齋夜話韓子蒼曰丁晉公海外詩云草解忘憂憂底事花名含笑笑何人世以爲工及讀東坡詩曰花非識靣常含笑鳥不知名時自呼便覺才力相去如天淵余自幷州還江南過都下蔡子因約相見相國寺問余有詩余曰覺範有寒嵓上元懷京師詩曰上元獨宿寒嵓寺卧看青燈映薄紗夜久雪猿啼岳頂夢回清月上梅花十分春瘦縁何事一掬歸心未到家却憶少年行樂處軟紅香霧噴東華今能作京師上元懷山中可乎余爲之曰北遊爛熳并州久重到皇州及上元燈火風光記前事管絃音律試新畨期人未至情如海穿市歸來月滿軒却憶寒巖曽獨宿雪牕殘夜一聲猿世徒知文與可掃墨竹不知其髙才兼諸家之妙詩尤精絶戲作鷺鷥六言曰頸細銀鉤淺曲脚高緑玉深翹岸上水禽無數有誰似汝風標並同前苦吟門李昪受禪之初忽半夜寺僧撞鐘滿城皆驚召將斬之對云夜來偶得月詩乃曰徐徐東海出漸漸上天衢此夕一輪滿清光何處無喜釋之江南野録潘閬自號逍遙子作苦吟詩曰髪任莖莖白詩須字字清同前方干爲詩練句字字有功寄人云鶴盤逺勢投孤嶼蟬曵殘聲過别枝鑑戒録唐人爲詩常積思數十年然後各自名家杜少陵云更覺良工用心苦豈特我哉古今詩話陳舍人從易當時文盛之際獨以醇儒古學見稱詩類白樂天自稱楊劉唱和西崑集行後進學者争效之風雅之變謂之崐體由是唐賢諸集廢而不行陳公時偶得杜集舊本文多脱誤至送蔡都尉詩云身輕一鳥其下脱一字陳公與數客各用一字補之或云疾云落或云下莫能定后得一善本乃是身輕一鳥過陳公歎服以爲雖一字諸君亦不能到歐公詩話龎頴公喜爲詩雖臨邊典郡文案委前日不廢三兩篇以此爲適及疾甚余時爲諌官以十餘篇相示手批其後曰欲令吾弟知老夫疾中尚有此思耳字已摻淡難識數日薨㓂萊公延僧惠崇於池亭分題爲詩公探得池上栁青字韻崇探得池鷺明字韻自午至晡崇忽㸃頭曰得之矣此篇功在明字凢五壓不倒公曰試口占曰雨歇方塘溢遲回不復驚曝翎沙日暖引步島風清照水千尋逈棲煙一㸃明主人池上鳯見爾憶蓬瀛公笑曰吾栁之功在青字而四壓不倒不如且已貫休懷武昌故樓云風清江上寺霜洗月中砧得句先呈佛無人知此心賈島初赴舉在京師一日於驢上得句云鳥宿池中樹僧敲月下門又欲推字煉之未定於驢上吟哦引手作推敲之勢觀者訝之時韓退之權京兆尹車騎方出島不覺行至第三節尚爲手勢未已俄爲左右擁至尹前島具對所得詩句推字與敲字未定神逰象外不知迴避退之立馬久之謂島曰敲字佳遂並轡而歸共論詩道留連累日因與島爲布衣之交有贈島詩曰孟郊死𦵏北邙山日月風雲頓覺閒天恐文章聲斷絶故生賈島在人間自此名著後因不第乃爲僧改號無本居一法乾寺與無可唱和一日宣宗㣲行至寺聞鐘樓上有吟聲遂登樓於島案上取詩巻覽之島不識乃攘臂睨之遂於手内取詩巻曰郎君何㑹此耶宣宗下樓而去既而島知之亟謝罪乃賜御札除遂州長江簿後遷普州司倉卒故程錡以詩悼之曰倚恃詩難繼昻藏貌不恭騎驢衝大尹奪巻忤宣宗馳譽超前輩居官下我儂司倉舊曹事一見一心㤏王元贈詩曰江城賣藥常將鶴古寺看碑不下驢唐宋遺史僧齊已徃袁州謁鄭谷獻詩曰高名喧省闥雅頌出吾唐叠巘供秋望飛雲到夕陽自封修藥院别下着僧牀㡬許中朝事久離鴛鷺行谷覽之云請改一字方得相見經數日再謁稱已改得詩云别掃着僧牀谷嘉賞結爲詩友郡閣雅談賈島元和中嘗跨驢張盖横截天街時秋風正厲黄葉可掃島吟曰落葉滿長安求一聫不可得不知身之所從因衝京兆尹劉栖楚即被繫一夕釋之又嘗遇武宗於定水精舍島尤肆慢武宗訝之他日另與一日授長江尉至普州司倉卒永叔言苦吟句云一句坐中得片心天外來茲所謂苦吟破的之句青𤨏集詩話總龜巻十一欽定四庫全書詩話總龜巻十二宋阮閱撰
