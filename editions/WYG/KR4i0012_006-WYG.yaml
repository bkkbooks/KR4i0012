body:
  text: 評論門中王右丞好取人詩如行到水窮處坐㸔雲起時此華英集中句也漠漠水田飛白鷺隂隂夏朩囀黄鸝此李嘉祐句僧恵崇有詩云河分岡勢斷春入燒㾗青士大夫竒之然皆唐人舊句崇有師弟學詩於崇贈崇詩曰河分崗勢司空曙春入燒㾗劉長卿不是師偷古人句古人詩句似師兄大都誦古人詩多積久或不記則往往用為已有如少陵詩云峽束滄江起嵓排石樹圓見蘇子美頌詩全用峽束滄江嵓排石樹作五古詩兩句子美豈竊人詩者古今詩話元和中長安有沙門善病人文章尤能提人語意相合張籍喜之或得句曰長因送人處憶得到家時謂似應不與前軰合也僧曰此有人道來籍曰何人僧曰見他桃李樹憶着后園枝籍大笑舒王云梨花一枝春帶雨桃花亂落如紅雨珠簾暮捲西山雨皆警句也然不若院落深沉杏花雨為佳宋莒公好玉谿詩不愛韋蘇州晏元獻取少陵多取太白少又取裴説幸無偏照處剛有不眀時為佳咏牡丹詩甚多羅鄴云落盡春紅始見花幄籠輕日護香霞買栽池舘恐無地㸔到子孫能㡬家此詩中之虎也俱同前此詩續本事詩有全篇云落盡春紅始見花花時比屋事豪奢買栽池舘恐無地㸔到子孫能㡬家門倚長衢攅綉軛幄籠輕日護香霞歌鍾滿坐争歡賞豈信流年􅁂有華續本事詩李太白才逸氣豪與陳拾遺齊名其論詩云梁陳已來艷薄殊極沈休文又尚聲律将復古道非我而誰故陳李二集律詩全少嘗言興寄深微五言不如四言七言又其靡也况使束于聲調俳優哉故戯杜子美曰飯顆山頭逢杜甫頭戴笠子日卓午借問别來太瘦生總為從前作詩苦古今詩話宋武帝咏謝荘月賦稱歎久之謂顔延之希逸作此可謂前不見古人後不見來者陳思王何足尚也延之曰誠如其言然云美人邁兮信音絶隔千里兮共眀月知之不亦晚乎武帝以為然及見希逸希逸對曰延之詩云生為長相思死為長不歸豈不更加于臣耶武帝撫掌謝學士吟蝴蝶詩三百首人呼為謝蝴蝶其間絶有佳句如狂隨栁絮有時見舞入梨花何䖏尋又曰江天春晚煖風細相逐賣花人過橋古詩有陌上斜飛去花間倒翅回又云身似何郎貪傅粉心如韓夀愛偷香終不若謝句意深逺孫少述栽竹詩曰更起粉墻髙百尺莫令墻外俗人㸔晏臨淄曰何用粉墻髙百尺任教墻外俗人㸔處士之節宰相之量各言其志李洞為吳子華所知子華嘗出百篇示洞洞曰大兄百篇中一聫最佳西昌新亭曰暖􅃞魚遺子晴逰鹿引麋子華亦不怒其所鄙而喜其所許蘇子美坐進奏賽神事謫官死于皋橋之居江隣㡬有詩弔之曰郡邸獄寃誰與辯皋橋客死世同悲用事精審而當又有云五十踐衰境加我在眀年論者謂人莫不用事使事如已出天然渾成乃可言詩江外有石人破之其形色皆類月歐陽文忠有月石詩云二曜分為三固為佳句尚念未快子美見之作詩寄之云我疑此山石久為月昭著老蚌吸月月降胎水犀望星星入角彤霞爍石變丹砂白虹貫岩生美璞永叔見之曰此竒才精通物理者也說者謂王右丞終南詩皆譏時宰詩云太乙近天都連山接海隅言勢位盤據朝野也白雲廻望合青靄入㸔無言徒有表而無内也分野中峰變晴隂衆壑殊言恩澤偏也欲投何處宿隔水問樵夫言畏禍深也杜荀鶴嘗有舊衣灰絮絮新酒竹篘篘或稱于相國韋說苑曰我道印将金鏁鏁簾用玉鈎鈎其皆可見俱同前唐人賡和詩有次韻依其次用韻同在一韻中耳有用韻用彼之韻亦必次之韓吏部和皇甫湜陸渾山火是也今人多不曉劉長卿餘干旅舎云揺落暮天逈丹楓霜葉稀孤城向水閉獨鳥背人飛渡口月初上鄰家漁未歸鄉心正欲絶何處搗征衣張籍宿江上舘云楚馹南渡口夜深來客稀月眀見湖上江静覺鷗飛旅宿今已逺此行殊未歸離家久無信又聽搗寒衣兩詩偶似次韻皆竒作也張逈少年苦吟未有所得夢五色雲自天而下取一團吞之遂精雅道有寄逺詩曰錦字慿誰達閒庭草又枯夜長燈影滅天逺鴈聲孤蟬􅁂凋将盡虬髯白也無㡬回愁不語因㸔朔方圖携巻謁齊巳㸃頭吟諷無斁為改虬髯黒在無逈遂拜作一字師郡閣野談鄭谷㓜負名譽司空圖見而竒之問之答曰大夫曲江晚望斷篇云村南斜日閑廻首一對鴛鴦落渡頭意深矣司空撫背曰當為一代風騷主同前蘇子容愛元白劉賔客軰詩如汝洛唱和皆往往成誦苦不愛太白軰詩曾誦汝洛集九日送人云清秋方落㡌子夏正離群以為假對工夫無及此聫又舉劉夢得送李文饒再鎮浙西詩以為最着題詩史謝赫云衛恊之畫雖不該􅍯形妙而有氣韻􅇒跨群雄誠曠代絶筆歐陽文忠盤車圖云古畫畫意不畫形梅詩咏物無隠情忘情得意知者寡不若見詩如見畫此真識畫也古今詩話曹唐羅隠同時有詩名羅曰唐有鬼詩或曰何也曰樹底有天春寂寂人間無路月茫茫唐曰隠有女子詩或曰何也若教解語應傾國任是無情也動人盧懐杼情杜子美詩映階碧草自春色隔葉黄鸝空好音此正咏武侯廟而托意在其間金陵語録暝色赴春愁下得赴字好若下起字便是小兒語也無人覺往來踈懶興何長下得覺字大好足見吟詩要一字兩字工夫同前國朝浮屠以詩名于世九人故有集號九僧詩今不復傳余聞人多稱其一曰恵崇餘八人忘其名字余亦記其詩云馬放降來地鵰盤戰後雲又云春生桂嶺外人在海門西其佳句類此當時有進士許洞俊逸士也㑹諸僧分題出一紙約曰不得犯此一字其字乃山水風雲竹石花草雪霜星日禽鳥之類諸僧閣筆洞咸平三年進士及第無名子嘲曰張康渾裹馬許洞閙装妻是已九僧謂希晝寳通寺恭行肇簡長尚能智仁休復惟鳯有集行于世談苑亦有詩歐公詩話唐之晚年詩人無復李杜豪放之格然亦務以精意相髙如周朴者計思尤艱每有所得必極雕琢故時人稱朴詩曰鍜未及成篇句已播人口其名重當時如此今不復傳余少時見集中有云風暖鳥聲碎日髙花影重又云曉來山鳥閙雨過杏花稀誠佳句也風暖鳥聲碎日髙花影重杜荀鶴集有全篇嘗有云杜詩三百首妙在一聫中風煖鳥聲碎日髙花影重今文忠乃以為周朴詩聖俞嘗語余曰詩家雖率意造語亦難若意新語工得前人所未道者斯為善也必能状難寫之景如在目前含不盡之意見于言外然後為至賈島云竹籠拾山果瓦瓶担石泉陶令云馬隨山鹿放人逐野禽棲等句是山色荒僻官况蕭條不如縣古槐根出官清馬骨髙為工余曰工者如是状難冩之景含不盡之意何詩為然聖俞曰作者得于心覽者㑹以意若王維栁塘春水慢花塢夕陽遲則天容時態融和駘蕩豈不在目前乎又若温飛卿雞聲茅店月人迹板橋霜賈島恠禽啼曠野落日恐行人則道路辛苦覊愁旅思不見于言外乎楊大年與錢劉數公唱和自西崐集出時人争效之詩體一變而先生老軰患其多用故事至語僻難曉是不知自是學者之弊如子儀新蟬云風來玉宇烏先覺露下金莖鶴未知雖有故事何害為佳如大年云峭帆横渡官橋栁叠鼓驚飛海㟁鷗其不用故事豈不佳乎盖其雄文博學筆力有餘故無施不可非如前世號詩人者區區于風雪草朩之類為許洞所困也退之才力無施不可以詩為文章末事其詩曰多情懐酒伴餘事作詩人然其發談笑助諧謔叙人情状物態一寓于詩而曲盡其妙此在雄文大手固不足論而余獨愛其工于用韻盖得韻寛則波瀾横溢泛入旁韻還離出入回合殆不可拘以常格如此日足可惜之類是已得韻窄則不復旁出而因見其巧愈險愈竒如病中贈張十八之類是也余嘗以聖俞語此以譬諸善馭良馬者通衢廣陌縱横馳逐惟意所之至於曲水蟻封疾徐中節而不蹉跌乃天下之至工也聖俞戯曰前史言退之為人木强若寛韻可自足而輙旁出窄韻難獨用而抝反不出非强而然歟坐客笑俱同前歐陽永叔不甚愛杜詩而謂韓吏部絶倫吏部于唐世文章未嘗屈下獨于李杜稱道不已歐陽貴韓而不悦子美所不可曉然于李白則又甚賞愛将由太白騰捍飛動易為感動也貢父詩話唐文人李習之不能為詩韓吏部集有贈之兩句云前知詎灼灼此去信悠悠殊無可取鄭州嘗掘地得石刻刺史李翺戯贈詩云縣君愛塼渠遶水恣行逰鄙性樂山野掘地便成溝兩㟁植芳草中間􅃞清流所向既不同傅監還自修從他後人見景趣誰為幽此别一李似非習之唐書習之傳不記為鄭州王深甫編次習之詩乃收此詩皇甫湜詩亦無聞退之有續公安詩識其掎撫糞壤間國朝尹師魯以古文自名而不能為詩吾嘗見梅聖俞云同前許渾詩格清麗然不干教化又有李逺以賦名傷于綺靡不渉道故當時號渾詩逺賦雖然詩要于教化若似聶夷中軰又太拙直矣詩史聖俞子美齊名於一時而二家詩體特異子美筆力豪俊以超邁横絶為竒聖俞覃思精微以深逺閑淡為意各極其長雖善論者不能優劣余谷夜行詩略道其一二云子美氣方雄萬竅號一噫有時肆顛狂醉墨洒滂霈譬如千里馬已發不可殺盈前盡珠璣一一難㨂汰梅公事清淺石齒潄寒瀬作詩三十年視猶後我軰文詞愈清新心意雖老大有如妖嬈女老自有餘態近詩尤苦硬咀嚼苦難嘬又如食橄㰖真味久愈在蘇豪以氣轉舉世徒驚駭梅窮獨我知古器今難賣語雖非工謂粗得彷彿然不能優劣之歐公詩話昔蘇子美言樂天琵琶行中云夜深忽夢少年事覺來粉涙紅䦨干此聫有佳句余謂夢得武昌老人吹笛歌云如今老去語猶遲音韻髙低耳不知氣力已無聲尚在時時一曲夢中吹不减樂天詩史梅聖俞于范希文席上賦河豚魚詩云春洲生荻芽春㟁飛楊花河豚于此時貴不數魚蝦河豚出春暮逰水上食栁絮而肥南人多與荻芽為羮而食之故知者謂只破題兩句已道盡河豚好處聖俞平生苦于吟詠以閑為意故其詩思極艱此詩于尊爼笑談間頃刻而成遂為絶唱東齋録司馬相如叙上林諸水曰丹水紫淵㶚滻涇渭八川分流相背而異態灝滈潢􅃞東注太湖李善注太湖所謂震澤按八水皆入大河焉得東注震澤又曰樂天長恨歌云峨嵋山下少人行旌旗無光日色薄峨嵋在嘉州與幸蜀路全無交渉杜甫武侯廟栢詩云霜皮溜雨四十圍黛色参天二千尺四十圍乃徑七尺無乃太細長也防風氏身廣九畆長三丈按廣大尺九畆乃五十丈四尺如此防風之身乃一餅餤耳此文章之病也筆談晏元獻公喜為詩多稱引後進一時名士往往出其門聖俞作詩多矣公獨愛其一聫云寒魚猶着䖏白鷺已飛前又絮暖鮆魚繁波添蓴菜紫余嘗見聖俞自書于簡再三稱賞此二聫余問之聖俞曰此非我之極致豈公偶自得意于其間乎歐公詩話淇州楊軒詠牡丹曰楊妃歌舞態西子巧讒魂利劍砍不斷餘妖鍾此根光華日已盛欄檻豈長存寄語尋芳者湏知松栢尊羅隐曰若教解語應傾國任是無情也動人二人用意不同如此軒詩雖撚風花而有警戒虞齋廣録世傳盧綘夢女子唱菩薩蠻云眉黛逺山攅芭蕉生暮寒此詞人能道之楊大年云獨自凭䦨干衣襟生暮寒未知孰是古今詩話劉長卿嘗謂前有沈宋王杜後有錢郎劉李李嘉祐郎士元焉得與余齊稱每題詩不言姓但曰長卿以海内合知之故士林譏之宋雍初無令名及瞽詩名乃彰盧綸員外作擬僧詩清江作七夕詩劉隨州有眼作無眼句宋雍無眼作有眼句時以為四背或云四倒盧綸詩曰願得逺公知姓字焚香洗鉢過餘生清江上人詩曰惟愁更漏促離别在眀朝劉隨州詩曰細雨濕衣㸔不見閑花着地聽無聲宋雍詩曰黄鳥不堪愁裡聽緑楊宜向水中㸔雲溪友議心事數莖白髪生涯一片青山空林有雪相待古路無人自還李王好書神仙隠遁之術非遭罹多故欲脱世網而不得者也百斛眀珠舊說陶淵眀不知音畜無絃琴以寄意曰但得琴中趣何勞絃上聲東坡嘗言劉伯伶以鍤自隨曰死便埋我余以謂伯伶非達者棺槨衣衾不害為達苟惟不然死則已矣何必更埋至于淵眀亦非忘琴者也五音六律不害為忘琴茍惟不然無琴可也何獨絃乎以是知舊說之妄也淵眀自云和以七絃豈得為不知音當是有琴而絃弊壊不復更張但撫㺯以寄意如此為得其真自祭文出妙語于纊息之餘豈死生之流哉但恨其猶以生為寓以死為真耳嗟夫先生豈真死得非寓乎同前詩話總龜巻六欽定四庫全書詩話總龜巻七宋阮閱撰
