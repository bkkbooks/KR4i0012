body:
  text: 紀實門下世人畫山水竹石不假五色而成未有以畫花者汴解獨能之因賦詩云造物本無物忽然非所難花心起墨暈春色散毫端縹緲形纔就扶踈態自完蓮花􅊖顛倒杏雨半披殘幸有狂居士求為黒牡丹兼書平子賦歸去雪堂㸔百斛眀珠十一月三日與幾先自竹西來訪慶老不見獨與君卿供奉蟾知客東閣道話久之作詩云巻巻長廊走黄葉席席垂地香烟歇主人待來終不來紅火消盡灰如雪嶺南氣候不常吾嘗云菊花開時乃重陽凉天佳月即中秋不湏以日月為㫁今嵗九月殘暑方退既望之後月出愈遲余嘗夜起登合江樓或與客逰豐湖栖禪寺扣羅浮道院登逍遥堂逮曉乃歸杜子美云四更山吐月殘夜水眀樓此古今絶唱因其句作五首仍以殘夜水眀樓為韻云一更山吐月玉塔卧微瀾正似西湖上湧金門外㸔冰輪横海濶香霧入樓寒停鞭且莫上照我酒杯殘二更山吐月幽人方獨夜可憐人與月夜夜江樓下風枝久未停露草不可藉歸來掩闗卧唧唧幽夜話三更山吐月樓烏夜驚起起尋夢中逰清絶正如此驅雲掃泉溜俯仰迷空水幸可飲我牛不湏違洗耳四更山吐月皎皎為誰眀幽人赴我約坐待玉繩横野橋兩㫁板山寺可微行今夕定何夕夢中逰化城五更山吐月忩向室幽幽玉鉤還掛戸江練却眀樓星河淡欲曉皷角冷知秋不眠翻五咏清切變蠻謳海南有五色雀常以両綘者為長進止必随俗謂之鳯凰云久旱而見輙雨潦則反昔吾卜居儋耳城南嘗一至庭下今又見之黎子雲及其弟咸家洎既去吾舉酒視之曰若為吾來者當再集也已而果然乃為賦詩云粲粲五色羽炎方鳯之徒青黄縞𤣥服翼衛兩綵朱仁心知閔農常告雨霽符我窮惟四壁破屋無占烏恵然此粲者來集竹與梧鏘鳴如玉珮意欲相嬉娱寂寞兩黎生食莱真臞儒小圃散春物野桃凍雲膚舉杯得一笑見此紅鸞雛髙情如飛鴻未易握粟呼胡為去復來眷眷豈屬吾一作予回翔天壤間何必懐此都並同前元符三年十二月十九日東坡生日置酒赤壁磯下踞髙峯俯鵲巢酒酣笛聲起于江上客有郭石二生頗知音謂坡曰笛聲有新意非俗工也使人問之則進士李委聞坡生日作新曲曰鶴南飛以獻呼之使前則青巾紫裘腰笛而已既奏新曲又快作數弄嘹然有穿雲裂石之聲坐客皆引滿醉倒委袖出嘉紙一幅曰吾無求于公得一絶句足矣坡笑而從之詩云山頭孤鶴向南飛載我南逰到九嶷下界何人也吹笛可憐時復犯龜兹玉局文秦少章不見十年忽一日見訪書一篇為恵云不到王家近十年子猷風韻亦依然舊時朋友今何在别後新詩誰與傳余戯曰莫太犯老杜所謂不見旻公三十年封書寄與淚潺湲舊來好事今能否老去新詩誰與傳張嘉甫云余少年見人誦一詩所謂但存方寸地留與子孫耕不知何人語元符三年過毘陵汪廸家出所蔵水部賀公手書乃知此詩賀所作世俗以為他人非也賀天聖中為郎真宗東封謁扵道左元祐初其二弟踰喬者來京師云賀嘗于泰山望見東坡意甚喜之欲上元至龜蒙東坡為作詩亦賦五篇余愛嘉甫一章云方寸平田便有餘子孫無復廢耕鋤已将不死為嘉種更向無何築隐居直方詩話吕申公在揚州日因中秋令秦少㳺作口號少㳺有照海旌幢秋色裡激天皷吹月眀中之句是夜却微隂公云不着也少㳺乃别作一篇末云自是我公多恵愛却回秋色作春隂参寥與余言如此余曰此真所謂翻手作雲也李希聲云舒王罷政事時居州東劉相宅於東院小㕔題當時諸葛成何事只合終身作卧龍者數十處至今尚有三兩處在希聲劉氏壻故知其詳云曽見數紙屏亦只冩此兩句滕王蛺蝶江都馬一紙千金不當價異材天縱非力能畫工不見甘為下今代風流數十年含毫落筆開山川忽忘朽老壓塵眼却恠鳬鴻堕目前邇來八駿復秀出萬里山河纔咫尺眼邊事得有突兀復似天地初開闢眀牕冩出髙軒過便遂淪混聞吟哦晚知書畫真有益却悔嵗月來無多官禁修嚴絶過訪時於僻寺聊脱鞅秀潤如行琮壁間清眀似引星辰上憂悲惆悵百不行河擘太華東南傾平生秀句寰區滿掇拾弃置成丹青平湖逺岫開精神陡覺文字生清新未許兩豪來甫立要知旁有衛夫人此無已所賦宗室士暕髙軒過圖詩也初無已謂余曰近宗子節使使余作一詩皆掛名其間得百千以為女子嫁資可乎余曰詩未成則錢不可授詩已成則錢不可來數日無已卒士暕贈以十縑並同前盧多遜與趙普睚眦太宗踐祚凡對即傾之普出守河陽自朝辭面訴曰臣以無状之迹獲事累聖曩日與先帝面受昭憲皇后命遣臣親冩二書令大寳神器傳歸陛下以二書合縫批之立臣䘖為証其一書先后納於柩一書先帝手封禁中乞陛下尋之庶幾少雪此行身移則事起豺狼在途危如累卵誰肯為臣辨者後果得書於宫中疑遂决多遜竄崕州太宗謂普曰幾誤斬卿王元之趙韓王挽詞有鴻勛書冊府遺訓在金縢之句廼謂是也古今詩話方勉字及甫娶許虞部女好學能詩勉嘗同妻夜㸔晁錯傳許氏有詩云匣劍未磨晁錯血已聞刺客殺袁絲到頭昧却人心處便是欺他天道時痛矣一言偷害正戮之萬叚始為宜鄧公墳墓知何處空對斯文有涙垂勉後與故人飲于市醉犯夜禁囚於府庭時鄭毅夫作尹許氏獻書援其夫并投詩云眀時樂事偷詩酒帝里風光剰占春况是白衣重得侣不堪青斾自招人早知玉漏催三皷不把金貂換百廵大抵仁人憐氣類不教孤客作囚身遂釋其夫勉死許氏居陋巷教子為學登科賢哉同前唐相國孫公偓寛裕通簡曽乗軺至蜀詣杜光庭受籙乃曰嘗遇至人話及時事每有髙樓之約後登庸二府竟出官南岳寄杜先生詩其要曰蜀國信難遇楚郷心更愁我行同范蠡師舉效浮丘他日相逢處多應在十洲唐末朝廷罹榖水白馬驛之禍惟孫獲免北夢瑣言温庭筠字飛卿或作雲舊名岐與李商隐齊名時號温李才思艷麗工于小賦每入試押官韻作賦凡八义手而八韻成多為鄰鋪假手日救數人而士行有缺搢紳薄之李義山謂曰近得一聨旬云逺比趙公三十六年宰輔未得偶句温曰何不云近同郭令二十四考中書藥名有白頭翁温以蒼耳子為對皆此類宣宗愛唱菩薩蠻詞令狐相國假其新撰密戒之令勿洩而遽言於人由是踈之温亦有言云中書堂内坐将軍譏相國無學也宣宗微行遇于逆旅温不識傲然詰之曰公非司馬長史之流乎又曰得非文叅簿尉之類帝曰非也謫為方城縣尉其制辭曰孔門以徳行為先文章為末爾既徳行無取何以補焉徒負不覊之才罕有適時之用竟流落而死杜幽公自西川除淮海温詣韋曲杜氏林亭留詩云卓氏爐前金線栁隋家堤上錦帆風貪為兩地行霖雨不見池蓮照水紅幽公遺絹一千匹沈詢侍郎清粹端美神仙中人制除山東節旄京城咸誦曹唐㳺山詩玉詔新除沈侍郎便分茅土領東方不知今夜逰何處侍從皆騎白鳯凰其風采可知唐求言成都距長安才二千里每嵗随計求名者甚鮮建安之貢無嵗無之故曰龍門一半在閩川信斯言矣並同前韓魏公嘗從容議及養兵事慨然曰某有所思而得之者未嘗以語人人未必信養兵雖非古然積習已久不可廢又自有利處不為不深者昔發百姓戍邊無虚嵗父子兄弟有生離死别之苦議者但云不知漢唐調兵於民獨不見杜甫石壕吏詩云暮投石壕村有吏來捉人老翁踰墻走老婦出門㸔吏呼一何怒婦啼一何苦聽婦前致詞三男鄴城戍一男附書至二男新戰死存者且偷生死者長已矣室中更無人惟有乳下孫孫有母未去出入無完裙老嫗力雖衰請從吏夜歸急應河陽役猶得􅍯晨炊夜久語聲絶如聞悲幽咽天眀登長途獨與老翁别調兵於民弊乃如此後世收拾强而無頼者養之以為兵良民雖税斂良厚而終一身保骨肉相聚之樂故兵能練習戰陣而豪勇可使豈可與農夫同日而語韓魏公别録劉巴字子初零陵人有名於鄉閭諸葛亮薦於蜀用為將軍曹掾後為尚書令巴恭行節儉不治産業非公事不言策命皆巴所為張飛嘗與巴宿巴不與言飛甚怒之諸葛亮謂曰張飛雖武夫甚慕足下聲望足下雖天資髙亮宜少䧏意巴曰大丈夫當交四海英雄如何與兵子語邪巴建武二年出鎮荆州卒於岳陽𦵏于郡西後因巴墳遂號岳陽為巴陵時人語曰生居三湘頭死𦵏三湘尾同前蘇子由謫髙安雲安時時相過有聰禪師亦蜀人一夕雲安夢同子由聪迓五祖戒禪師既覺語子由聪亦至子由曰方與洞山説夢子今來同説夢乎聪曰夜来夢吾三人迎戒和尚子由曰世間果有同夢者久之東坡書至曰已至奉新日夕相見三人喜出城而坡至則以語坡坡曰軾七八嵗常夢是僧又先妣方孕時夢一僧來托宿及謫英州雲遣書至南昌坡引紙大書曰戒和尚又錯脱也後監玉局觀作偈答南華長老曰惡業相纒四十年常行八棒十三禪却着衲衣歸玉局自疑身是五通仙冷齋夜話退之詩曰喚起忩前曙催歸日未西無心花裡鳥更與盡情啼余兒時每哦此詩了不解其意自出陕吾年五十八嵗時春曉偶憶此詩方悟喚起催歸二禽名也催歸子規也喚起聲如絡絲圓轉清亮偏於春曉鳴江南謂之春喚老杜謁𤣥元廟詩曰風筝吹玉柱露井凍銀牀許彦周云嘉祐河濵漁網得一小石刻詩曰雨滴空階曉無心換夕香井梧花落盡一半在銀牀銀牀井欄也莫知誰作王仲至言老杜詩曰江蓮搖白羽天棘夢青􅁝天棘自是一種物髙秀實曰天門冬也一曰顛棘非天棘也王元之詩曰水肢卧玉腕天棘舞金絲則天棘盖栁也韋應物琥珀詩曰曽為老茯苓元是寒松液蚊蚋落其中千年從可覿嘗見琥珀中有物形如蜂此物自外國来地有茯苓處皆無琥珀不知韋公何以知之東坡海棠詩曰祇恐夜深花睡去更燒銀燭照紅粧事見太真外傳曰上皇登沉香亭詔太真妃子時夘醉未醒命力士使侍兒扶掖而至妃子醉匀殘粧不能再拜上皇笑曰豈醉是海棠睡未足耳作尼童詩曰應將白練作仙衣不許紅膏活天質事見則天詔書曰天下尼童用白練為衣橄㰖詩曰待得微甘回齒頰已輸崖蜜十分甜崖蜜事見鬼谷子曰照夜清螢也百花醲蜜也崖蜜櫻桃也贈舉子詩曰平生萬事足所欠惟一死事見梁史傳曰世祖宴東府詔跋陀羅至䟦陀羅皓靡世祖戯曰摩訶衍不負逺來唯有一生應曰貧道客食陛下三十載㤙徳幸矣所欠者一死耳並同前詩話總龜巻十九欽定四庫全書詩話總龜巻二十宋阮閱撰
