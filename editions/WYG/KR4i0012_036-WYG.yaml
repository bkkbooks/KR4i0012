body:
  text: 譏誚門中黃台符十六嵗張讀十八嵗同年登科為鄭宣州幕嘗列題於西明寺之東廡或竊注之曰一雙同進士兩箇阿孩兒李煜作紅羅亭四面栽江梅花作艷曲歌之韓熈載和云桃李不湏誇爛熳已輸了風吹一半時淮南已歸周趙嘏浙人有羙妾洎計偕母不許携行㑹上元節為鶴林之遊帥見之掩為己有明年嘏榮歸以詩感之曰寂寞堂前日又曛陽䑓去作不歸雲當時聞說沙吒利今日青蛾屬使君帥聞遣歸李商隠依彭陽令狐楚以牋奏受知後其子綯有韋平之拜浸踈商隠重陽日義山造其㕔事届題云十年泉下無消息九日樽前有所思郎君位重施行馬東閣無因得再窺綯見慚恨扄閉此㕔終身不處袁筠婚蕭楚女言定未㡬擢進士第羅隠以一絶刺之云細看月輪還有意定知青桂近嫦娥林和靖傲許洞洞作詩嘲之云寺裏掇齋飢老䑕林間咳𠻳病獼猴豪民送物鵝伸頸好客窺門鼈縮頭章郇公性簡静嘗為開封府試官出人為天地心賦舉子白先朝曽試遽别出一題曰教猶寒暑既非致思舉子又上請此題出樂記教乃樂教也上在諒隂而用樂事恐非便方紛紛不巳無名子作詩嘲曰武成廟裡沽良玉夫子門前㺯簸箕唯有主司章得象往來寒暑未曽知時南廟試良玉不琢國學試良弓之子必學為箕賦並同前韓退之彌明傳云嘗與文友會宿者老道士形貎怪異自通姓名求宿言論甚奇既飲酒衆度其不能詩因聫句咏爐中石鼎將以困之首唱曰妙匠琢山骨刳中事調烹至彌明自云不善俗書人多不識乃遣人執笔硯吟曰龍頭縮囷蠢豕腹脹膨脝坐客盡驚會人思竭不能復續彌明連促之坐中有欲吟其聲悽苦彌明句中侮之曰仍於蚯蚓竅更作蒼蠅聲湏臾倚壁睡鼻息如雷坐客異且畏之並同前光化中羅隠佐兩浙幕同院沈嵩得新榜封示隠隠批一絶於紙尾曰黃土原邉狡兎肥犬如流電馬如飛㶚陵老將無功業尤憶當時夜獵歸正元中太府卿韋渠牟金吾李齊運皆寵貴薦人多得名位時劉師老穆寂皆應科目渠牟主穆寂齊運主師老會齊運對順宗嗟其羸弱許以致仕而歸師老失據無名子曰太尉朝天升穆老尚書倒地落劉師劉禹錫曰名場嶮􅇖如此王文惠相府中病尤好釋氏時有人作詩曰誰謂調元地番成養病坊但見僧盈室寧知火燎房盧肇黃頗皆宐春人頗富於財而肇苦貧與頗同日赴舉亦同日登途郡守獨餞頗於郵亭而遣肇明年肇狀元登第歸郡守㑹肇看競渡肇即席作詩曰向道是龍剛不信果然奪得錦標歸太守大慚韋蟾左丞至長樂驛見李瑒給事題名因書其側云渭水春山照眼明笑人何事寡詩情只應學得虞姬壻書字纔能紀姓名劉魯風江西投所知為典謁所阻因得一絶曰萬巻書生劉魯風烟波千里謁文公無錢乞與韓知客名紙生毛不為通范魯公質舉進士和相凝爱其程文以自登第舊在十三人謂魯公曰公之詞業合在甲選暫屈十三人用傳老夫衣鉢可乎魯公謝之後果至宰相亦且相繼門生有獻詩者云従此廟堂添故事登庸衣鉢亦相傳李郁尚書為荆南従事有朝士寄書字體殊惡李寄詩曰華緘千里到荆門章草縦横任意論應笑鍾張虚用力却教羲獻謾勞魂惟堪爱惜為珍寳不敢留傳示子孫深荷故人相愛處天行時氣許教呑言堪作符也並同上北齊盧思道聘陳設宴聫句作詩先唱者譏北人云榆生欲飽漢草長正肥驢謂北人食榆吳地無驢故有此句思道即續之曰共甑分炊飯同鐺各煮魚謂南人無義同炊異饌也吳人愧之譚藪洛陽有譚歌婦人楊苧蘿朝辦言有才思楊凝式侍郎以姪女呼之怜其聪慧也時有僧雲辨者有文善能講經善應對若祀祝之辭隨名位髙下對之三十字如宿思少師尤重之長夀年五月雲辨講對歌者忽有蜘蛛於簷前垂絲而下正對少師與雲辯前少師笑謂歌者曰試嘲得着奉絹三疋歌者不思應聲嘲之意不離蜘蛛戲之雲辯雲辯體充肚大不能行少師見詩絶倒大呌和尚將絹五疋雲辯慚且笑與絹五疋詩嘲蜘蛛曰喫得肚罌撐尋絲遶寺行空中設羅網只待殺衆生洛陽舊聞至和間有數達官以詩知名常慕樂天體多得於容易曽有一聫云有禄肥妻子無恩及吏民有人戲之曰昨日通衢遇一輜軿車載極重嬴牛甚苦豈非足下妻子乎聞者傳以為笑歐公詩話向文簡在延州嘗有詩云四時常有烟棚動三月猶無菜甲生又有人嘲同州詩云三春花發推樗樹二月鶯啼是老鵶雜誌徐州雲龍山人張天驥不逺千里見朱定國於錢塘愛其中風物遂欲徙家居焉春盡思歸以詩戲之云羡公飄蕩一孤舟來作錢塘十日遊水洗禅心都眼净山供詩筆捴眉愁雪中乘興真聊爾春盡思歸都罷休何事却尋朱處士種魚萬尾橘千頭絶詩閩人廖復天禧二年求薦天府下撾鼓訟之覆考再狀省試又下湖人凌景陽因復訟之亦再收髙第遂登科士子作詩嘲復曰細思堪恨廖賢良論中科名屬景陽啼得血流無用處為他人作嫁衣裳朱守國録曰續曰景祐中有輕薄子以古人二十字詩益成二十八字嘲誚曰仲昌故國三千里宗道深宫二十年殿院一聲河滿子龍圗雙淚落君前龍圗王博文也嘗更大藩鎮開封知府三司使一日對上前因叙揚厯之久不覺淚下殿院蕭定基也為殿中侍御史與韓魏公呉春卿王君貺同發觧開封舉人作河滿子曲嘲之因奏事仁宗問之令誦一遍王宗道為諸王教授及講書凡二十餘年不求進用仲昌者章郇公之仲従子論科場不公奏聞牒歸簡州當時以為雖用古人詩句而切中一時之盛事傳以為笑樂東齋錄丁晉公與楊文公遊處宴集必有詼諧之語復皆敏於應答一日䑓諫攻文公因晩俟晉公之門方伏拜晉公亟謂文公曰内翰拜時髭擎地文公隨聲答曰相公坐處幙瞞天葢楊羙髭髯而丁第方盛設帷幙因互相議也有宋佳話太尉田重進起於戎行晩年好道術喜黃老有揀停兵士張花項衣道服以其項多雕篆目之為花項又引道士為同志前後所用錢帛悉資之無少違久而無成忽一日云出采藥八月當成晩大醉歸重進問尊師従未飲何遽醉花項㣲笑其實不飲昨日見一仙流向西頂禮重進問何人花項恭肅低言即吕洞賓謂曰重進武人好事如此此人有夀今巳有㣲疾由㣲染風疴某當暫届少藥療之田大喜曰重進粗人何銷神仙下䧏且曰何時至花項曰此月十五日夜三更必至吕不欲多見人望太尉於射亭帳設用好新裀褥静室燃香鮮果好酒後至五更重進久患風折腰艱難重進方欲責花項虗誕外報尊師門大開囊篋搬運巳盡重進慚恨鳴指曰無良漢無良漢自是不復信時有無名人獻詩一首以笑之永興軍人尚能念誦詩曰或作黃金或作銀熱人好倖搏尖新一朝任惑田重進半夜扳迎吕洞賓獃漢出門特引領黠兒得路已潜身雖稱兩箇無良漢笑殺長安萬萬人洛陽舊聞湖南徐仲雅與李宏臯劉昭禹齊名所業百餘巻並行於世畊夫謠一首云張緒逞風流王衍事輕薄出門逢畊夫顔色必不樂肥膚如玉潔力抝絲不折半日無畊夫此輩揔餓殺雅言雜載周顓處士洪儒奥學偶不中第旅浙西從事歡飲惟昩於章程座中皆戯之有贈詩曰龍津掉尾十年勞聲價當時閗月髙惟有紅粧回舞手似持霜刄向猿猱周和曰十載文場敢惮勞宋都回鷁為風髙今朝甘伏花枝笑任道墫前愛縳猱廬山道士體貌魁偉飲酒㗖肉居九天使者廟有雙鶴因風所飄憇於廟庭道士驚喜因謂當赴上天命令山童控而乘之羽儀清弱不勝其載毛傷骨折而斃翌日馴養者知訴於公府處士陳沆嘲之曰㗖肉先生欲上升黃雲踏破紫雲崩龍腰鶴背無多力傳語麻姑借大鵬南唐近事李山甫詩名冠於當代過烏江題項羽廟云為虜為王盡偶然有何慙見渡江船平分天下猶嫌少可要行人贈紙錢又贈宿將曰校獵燕山經幾春雕弓白羽不離身年來馬上渾無力望見飛鴻指似人任谷富有經術隠居於洛以俟召命末䧏蒲輪乃躬到京訪知已有朝官戯贈曰雲間應訝鴈書遲自到京中探事宜従此見山湏合眼被山相賺巳多時後至補衮曹確楊收徐商路岩同秉政時有詩嘲之曰確確無餘事錢財總彼扠商人都不管貨賂幾時休南部新書詩話總龜巻三十六欽定四庫全書詩話總龜巻
