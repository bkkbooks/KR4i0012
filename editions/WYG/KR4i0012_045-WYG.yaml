body:
  text: 神仙門中有逸士衣襴破衫六􅙧黒朩腰帶闊三寸一脚着一靴一脚跣行夏以絮衫冬卧氷雪出氣如蒸自號藍米和歌曰踏踏歌藍采和世界能幾何紅顔三春樹流光一擲梭古人混混去不返今人紛紛來更多朝騎鸞鳯到碧落暮見桑田生白波長景明暉在空際金銀宫闕髙嵯峨曵長繩穿錢拖行縱錢散不收後至濠梁飛上升冉冉而去續仙傳任生隠於嵩山讀書夜有一女子來曰冥數合與子為姻生意其異乃拒之遂開簾而入可二十許冶容艶羙二青衣侍前就案書一詩云我本籍上清謫居逰五岳以君無俗侣來勸神仙學三日當來遂去生覽之愈疑妖怪志不納又贈一篇云葛洪還有婦王母亦從夫神仙盡靈匹君意合何如面墻不對女子再贈一首阮郎迷不悟何䖏伸情愫明日海山春彩舟却歸去出門冉冉飛望而去數月任大病為黄衣吏攝去來行十里忽見幢節不絶有女仙乗翠輦侍從數千人黄衣吏曵任墻下避仙笑曰嵩山薄命漢汝數盡更與三年生果六十卒後詩為雷電取去盧肇遺史洞庭賈客吕卿雲以貿販雜貨逐什一之利有羡施貧善􅅇遇好山水即留中春月夜泊君山獨飲時一盃弄數曲波上有漁舟冉冉而來乃一父老皤然賈置笛起立迎上舟問所以曰聞子笛聲非凢我是以來對數杯我少業􅅇子有性可教父老於懐袖間出笛三管其大如合拱其次大如常人所蓄其小如細筆管卿雲請父老一吹曰大者不可發次者亦然小者為子吹一曲不知得終否卿雲曰願聞其不可者曰第一者對諸天帝合天樂動天地坼日月五星失次第二者對洞府諸仙合仙樂飛沙走石百獸腦裂㓜稚震死第三者可與朋儕聴之未知可終否抽小笛吹三聲湖上風動波濤􅍅湧魚鱉跳噴僮僕恐悚君山鳥獸呌噪舟檝大恐父老不復吹引滿數盃乃吟曰湘中老人讀黄老手挼紫藟坐碧草春至不知湘水深日暮忘却巴陵道又飲數盃曰明年社期君於此遂棹漁舟而去隠隠没於波間傳異志盧李二生居太白山讀書習吐納李生不甘苦貧訣别浪迹江湖後之官橋園人吏欺隠折官錢覊縻不得東西貧瘁日甚揚州阿師橋逢人草履布衫視之乃盧生昔號二舅者李生與舅語哀其繿縷盧大罵曰貧賤不畏公弃身又有欠負且被囚繫有面相見乎李生厚謝之舅咲曰居處不逺來日以馬來迎至日晚果來云屈郎君去來十里朱門斜開二舅出迎雲冠霞帔容貌光澤侍婢數百人燕饌名果不可紀求得一女子佐酒善箜篌容色極佳上有朱字一行雲中辨江樹天際識歸舟燕罷曰莫願作婣否又曰所欠官錢二萬貫請以柱杖往波斯店取錢可從此學道無自穢身其年汴州行軍陸長源以女妻之宛類盧舅北亭善箜篌者箜篌有詩二句李具言舊事女曰少年時因兄弟戯夜乃作夢入仙宫如公所言者盧肇遺史茅濛字初成華陽人也隠華山脩道當始皇三十一年九月白日上升先是時有民謡曰神仙得者茅初成駕龍上昇入太清時下元洲戯赤城繼世而往在我盈始皇聞之問故老曰此仙之謡始皇於是有尋仙之意濛之元孫盈得道於金陵勾曲山上升為東岳上卿司命君太元真人居赤城時來勾曲為人改勾曲為茅君山拾遺神仙門下慶厯中有一閑人逰岳謁主簿郭及甫既坐視其刺乃羅道成也詢其郷里言郴州人及甫留飲曰乆思東州之逰前日逰太山已遍到佳處旦夕廻南方山索紙筆為詩曰因思靈秀偶來逰碧玉寒堆萬叠秋直上太山髙處望根盤連接十餘州後自和云水雲踪跡自閒逰夏谷隂寒冷勝秋猿鳥性情猶戀舊飜身却去海邉州及甫不勝嘆羡及去令人送之又得詩曰白騾代步若奔雲閑人所至留詩迹欲知名姓問源流請看郴陽山下石後問郴人有成真君觀得道乘白騾行石壁上其跡至今存焉古今詩話唐子正著作桂州人治平中赴舉至全州途中雇一僕負重擔健若飛羽雖鞭馬疾逓常去馬百步外恐其逸去逐遣之其僕即日自全州二千七百里日午巳到唐州留書驛吏曰候桂州唐秀才至即投之唐月餘到驛驛吏出書題云呈桂州唐秀才歸真子封唯一詩曰袁州相見又之全不遇先生道未員大抵有心求冨貴到頭無分學神仙箧中靈藥冝頻施鼎裏丹砂莫妄傳待得角龍為宴㑹好來黄壁卧林泉唐甚怪之話其状貌乃全州僕也留書之日乃全州所遣日也始悟其為神仙唐後為邕倅熈寧丙辰交趾㓂邕唐遇害乃詩所謂角龍也許宣平新安人常掛一花瓢及曲竹枝毎醉即獨吟曰負薪朝去賣沽酒日西歸路人莫問歸何處穿白雲行入翠微好事者於洛陽同華間是處題之李太白見曰此神仙也殷七七名文祥周寳舊於長安識之及寳鎮浙西七七忽到召之益加禮遇鶴林寺有杜鵑花寺僧相傳云正元中外國僧自天台鉢中以藥養其根來殖於此寺僧剏餙花院人或見女子紅裳艶麗遊於花下俗傳花神也一日寳謂七七曰鶴林寺天下竒絶甞聞能開頃刻花此花能開赴重九乎曰可也乃前二日經鶴林寺宿中夜有女子來謂七七曰妾為上蒼所命下司此花非乆即歸閬苑今為道者開之晨起寺僧訝花漸拆至九日爛熳後為兵火其花遂亡信歸閬苑矣元真子張志和㑹稽人守真養氣卧雪不冷入水不濡顔魯公守湖州日與賔客唱和為漁父詞志和曰西塞山前白鳥飛桃花流水鱖魚肥青蒻笠緑蓑衣斜風細雨不湏歸坐客嘆服不巳後果傳之相州棲霞谷有喬順二子服飛龍藥二子十年不飢魏文帝詩曰西山有仙童不飲亦不食謂此俱同上吴仁壁闗右人學進士逰羅浮洞學老荘於張先生得其大旨辭歸謀入京取應先生曰觀子氣法可住此吾授子長生之道仁壁辭以老母缺甘旨俟名遂身退學亦未晚先生曰此去必遂其志亦湏早來是年中第入浙謁錢武肅殊禮之累辟入幕堅辭不就以詩謝云東門上相好知音數盡䑓前郭隗金累重雖然容食椹力微無計報焚林弊貂不稱芙蓉幕衰鬂仍慚玳瑁簮十里溪光一山月可堪從此負歸心武肅復遣人請撰羅城記仁壁堅不從武肅怒沉扵江吴人惜之仁壁有一女有閒居詩云為惜苔錢妨換砌因憐山色旋開尊又贈道士云五龍金角向星斗三洞玉音愁鬼神又題甖粟云蒲草薄裁連蒂白臙脂濃染半葩紅又逰法華寺云髙閣煙霞襌客睡滿城塵土世人忙建隆初廣南劉隠遣中翁光普同禮丞寗昱就羅浮山設醮醮畢昱逰諸岩洞至山頂見一石門有老叟衣薜蘿㨿門而坐昱問其由云是羅浮先生宅再問誰氏叟低聲對云吴先生也名仁壁言訖户闔了無所見其後或有人於羅浮勾曲諸山見仁壁復引一十嵗許女子驗是其女也雅言雜載有商客過海遇風俄抵一所門宇聳秀珎器爛然云是樂天之居樂天聞之作二絶云近有人從海上廻海山深處是樓䑓中有仙龕開一室皆言此待樂天來又云吾學空門不學仙恐君此語是虚傳海山不是吾居處歸則惟歸兠率天古今詩話女真錢氏二姊妹依止陶隠居誦黄庭經即茅山燕洞也至今有紫菖蒲碧桃焉其姊披白練衣得道入洞及女弟至則户已扄矣淳化五年夏侯嘉正與道士五人往彼投龍是夜雷震其洞復開有一吏深入遇道士與林擒一枚食之遂絶粒田霖作詩題之曰燕口龍泓氣象清錢真此䖏有遺靈仙兄去後師猶在女弟回時户已扄雲片尚如披白練泉聲長似誦黄庭碧桃花發菖蒲紫留與人間作畫屏同上唐儀鳯中清城縣横源翠圍山下有民王仙柯服道士所遺靈丹拔宅上升已具仙傳拾遺蜀州僧中寤釋學道播於方州偶於龍池山逢人精神爽朗異於常叟即王仙柯也寤公曰聞仙名已久何幸相逢飛升之後胡為來此仙柯曰吾等有靈藥止能飛步今全家隠扵後山更脩道法遐舉之事吾何望焉但長夀而已寤公以詩贈之曰瞻思不及望仙兄早晚遐飛入太清手種一株松未老爐燒九轉藥新成心中已得黄庭術頭上應無白髮生異日却歸華表語待教凢俗普聞名自後不復遇葆光子聞於真人曰世人學道資一丹一藥聊固其命何以脩道未得證就避忌尤多三官廵羅攝入鬼録所以頻改姓名先用屍解然後棲止靈岳進取上法或五岳授事效職仙曹優㳺人間或至千嵗功徳升聞即朝玉皇海岳之間往往遐舉者世人無由知也今之初得道者止於仙隠有騰空者服金丹也遐舉之事未可希望北夢𤨏言伊夢不知何許人因夢两日遂立此名唐末不仕披羽褐逰山水題攸縣司空觀仙壇云惟有松杉空弄日更無雲鶴暗迷人題黄蜀葵云露凝金盞滴殘酒檀㸃佳人噴異香在醴陵何氏家一日别去作詩附鐡匠回言在彼打劍何氏發其塜棺内惟劍耳青𤨏后集陳純字元朴莆田人因逰桃源中秋夜遇玉源靈源桃源三夫人玉源令純舉中秋月詩純言一聮云莫辭終夕看動是隔年期桃源曰意雖佳但不見中秋月作七月十五夜月亦可玉源因作詩曰金風時拂袂氣象更分明不是月華别都緣秋氣清一輪方極滿羣籟正無聲曉魄沉烟外人間萬事驚靈源詩曰髙秋渾似水萬里正圓明玉兎步虚碧氷輪輾太清廣寒宫有路桂子落無聲吾館無絃弹棲烏莫要驚桃源詩曰金吹掃天幕無雲方瑩然九秋今夕半萬里一輪圓皓彩盈虚碧清光射玉川瑶樽休惜醉幽意正綿綿玉源謂純曰子能繼桃源之什乎純作詩曰仙源甞悮到覊思正蕭然秋静夜方静月圓人更圓清尊歌越調仙棹泛晴川幽意知多少重重類楚綿太原王世寧自言籍係第十八洞玉仙人熈寧中以暴疾終于家臨終作詩曰翠羽旌幢仙子隊紫雲樓閣玉皇家人間風雨易分散回首武陵空落花韓湘字清夫文公猶子也落魄不覊文公勉之學湘曰湘之所學非公知之公令作詩以觀其志詩曰青山雲水窟此地是吾家後夜流瓊液凌晨咀絳霞琴弹碧玉調爐鍊白朱砂寳鼎存金虎元田養白鴉一瓢蔵世界三尺斬妖邪觧造逡廵酒能開頃刻花有人能學我同共看仙葩公覽而戯之曰子能奪造化耶湘曰此事甚易公為開尊湘聚土以盆覆之良久花開乃牡丹碧花二朶於花間擁出金字詩一聮云雲横秦嶺家何在雪擁藍闗馬不前公未曉其句意湘曰事乆可驗遂告去未幾公以佛骨事謫官潮州一日途中遇雪俄有人冐雪而來乃湘也湘曰憶花上之句乎正今日事也公詢其地即藍闗嗟嘆久之曰吾為汝足此詩詩曰一封朝奏九重天夕貶潮陽路八千本為聖明除弊政豈於衰朽惜殘年雲横秦嶺家何在雪擁藍關馬不前知汝逺來湏有意好收吾骨瘴江邉公别湘詩曰人才為世古來多如子雄文世孰過好待功名成就日却抽身去上烟蘿湘别公詩曰舉世都為名利醉伊余獨向道中醒他時定是飛升去冲破秋雲一㸃青青𤨏集賈師雄郎中治平中通判邵武甞收鐡鏡甚大非常物也乆欲淬磨未得其人左右言近有回處士自言善磨鏡召至風骨軒昻非常人也出示之仍以飲酒畢推藥鏡上言藥少當自取之既去不回詢其宿在太平寺留詩一絶而去曰手内青蛇凌白日洞中仙果艶長春湏知物外烟霞客不是尋常磨鏡人取鏡視之藥已化去所堆藥處一㸃表裏通明如寒玉春水又甞有顧中謁故人季郎中至岳陽投宿市邸唱新曲有補鞋人問曰此何曲中曰都下新聲也其人曰吾不觧書子能為我書當於此調頃一詞中因為書之乃今所傳沁園春也因問其姓荅曰生於山口長於江口即今為守谷之客姓名不知也中翌日見太守言之追不復至題詩一絶於邸中腹内嬰兒養已成且居塵世暫娱情無端措大剛饒舌却入白雲深處行中與太守深歎恨之山口守谷乃仙之姓并字也永叔登第後授洛陽節推聖俞為洛陽簿乃得友之初也一日同逰嵩山佳處相對吟醉遂望四峰巨厓之上有丹書四字云神清之洞指示聖俞聖俞曰不見洎告老歸潁思前四字作一絶云四字丹書萬仭厓神清之洞鎻樓䑓烟霞極目無人到鸞鶴今應待我來後數月薨並同上有道人過沈東老飲酒用石榴皮冩絶句壁上稱回山人東老送出門渡橋不知所往或曰此吕洞賔也僕見東老子偕道其事為和此詩後復與偕遇錢塘更為書之回山人詩云西鄰已富憂不足東老雖貧樂有餘白酒釀來緣好客黄金散盡為收書東坡和曰世俗那知貧是病神仙可學道之餘但知白酒留佳客不問黄公覔素書符離道士晨興際華岳先生詩觧餘忽見黄庭丹篆字罔傳青紙小朱書凄凉雨露三年後彷彿塵埃數字餘至用榴皮緣底事中書君豈不中書東坡詩話劉跛子青州人拄一拐毎嵗一至洛陽看花舘於花家園大花見之即與二十四曰跛子吃半角小花見時止與十金曰跛子喫椀羮以詩謝曰大花見時二十四小花見時吃椀羮人生四海皆兄弟酒肉林中過一生張丞相詔自荆南時跛子與客飲市橋客起觀之挽其衣使且坐飲作詩曰遷客湖湘召赴京輪蹄迎迓一何榮争如與子市橋飲且免人間寵辱驚余寓於興國寺戯之詩曰相逢一柺大梁間妙語時時見一斑我欲從公蓬島去爛銀堆裏看青山計其夀百四十五矣邸中無人識之冷齋夜話周貫不知何許人自號朩鴈子宿龍泉觀半夜搥道士門道士問其故曰偶得句當奉告因吟曰弹琴傷指甲盖蓆損髭鬚是夜貫以蓆自覆故耳至袁州見市井李生秀韻欲携同歸林下學嗜酒色意欲無行貫指煑藥鐺作偈示之曰頑鈍天教合作鐺從初三脚豈能行雖然有耳不聴法只愛人間戀火坑尋死於西山将化人問幾嵗貫曰八十西山作酒仙麻鞋糺㫁布衣穿相逢甲子君休問太極光隂不記年復有人見於京師附書於李生云明年中秋夕當上謁至時生以事出貫乃以白土書門而去曰今年中秋夕來赴去年約不是折足鐺弹指空剥剥李生竟折一足冷齋夜話劉野夫留南京乆未入都彭淵才以書督之野夫荅曰跛子一生別無道路展手教化三饑两飽目視雲漢聊以自誑元祐新年被劉法師徐神翁形迹得不成模樣深欲上京相覷又恐撞着丈人湼陁佛驀被乾拳濕踢着甚來由不覊如此當作長短句曰跛子年來形容何似儼然一部髭鬚世間許大拐上做工夫選甚南州北縣逢着處酒滿葫蘆熏熏醉不知明日何處度朝晡洛陽花看了歸來帝里一事全無又還與瓠羮再作門徒驀地思量下水粮網上蘆蓆横鋪呵呵笑睢陽門外有箇大南湖有僧吏宗著麻衣加衲其上號麻衣道士坐廣陵白土埭謳歌自適江都令檀紙與語多無畔岸索紙賦詩曰有欲苦不足無節即無憂未若清虚者帶素披𤣥裘浮游一州間汎若不繫舟要當畢塵慮棲息老山邱檀紙異之陶淵明寄白土埭逢三異比邱此其一也觀其詩句脫去畛封有超然自得之氣非尋常介夫所能作也並同上詩話總龜巻四十五欽定四庫全書詩話總龜巻
