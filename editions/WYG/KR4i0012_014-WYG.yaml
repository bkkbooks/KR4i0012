seq: 14
front:
  text: 先生則有微雲淡河漢疎雨滴梧桐樂府美王融
  hash: sha256:22236283daa886bcb332ef20e6f8b71978a81bb19528aa6fffe570218fbc3cb8
body:
  text: 日霽沙嶼明風動甘泉濁先生則有氣蒸雲夢澤波撼岳陽城謝眺之詩句精者露濕寒塘草月映清淮流先生則有荷風送香氣竹露滴清響此與古人争勝於毫釐也荆公在金陵嘗指壁上所題兩句云一水戽一云護田將緑遶兩山排闥送青來張塤字叔和謂余曰塤一日到洛中謁潞公方飯後坐於一亭亭邊皆蘭既見不交一談對坐㡬時公方曰香來也叔和以爲平生所未聞潞公云凢香嗅之則不佳須待其因風自至余始悟山谷詩云披拂不盈懐時有暗香度韓持國有云青烟人㡬家緑野山四合當時無不傳誦東坡云參寥善絶句有云隔林彷彿聞機杼知有人家在翠微毎爲人誦後來黄州相聚半年京師故人以書相遺曰知有僧在彼非隔林彷彿聞機杼和尚耶僕謂參寥曰此吾師七字師號也梅聖俞在禮部考校時和歐陽文忠公春雪詩云有夢皆蝴蝶逢袍只紵麻用事如此乃可貴余愛張文潜過宋都詩云白頭青鬢有存没落日斷霞無古今不减老杜山谷有光山道中雪詩云山㗸斗柄三星没雪共月明千里寒都尉王晉卿足成鷓鴣天云才子陰風度逺闗清愁曽向畫圖看山㗸斗柄三星没雪共月明千里寒新路陌舊江干﨑嶇誰歎客程難臨風更聽昭華笛蔌蔌梅花滿地殘舒王與吳彦律云含風鴨緑鱗鱗起㺯日鵞黄裊裊埀自云此㡬凌轢造物張文潜謂余曰黄九云桃李春風一盃酒江湖夜雨十年燈真竒語並同前詩云千山送客東西路一樹照人南北枝王康功推官作牛丞相竒章公初爲語矜竒特語至有地瘦草叢短句明年秋巻成呈之曰有求色必赧憑酒意乃伸益加能矣明年乃上第因曰楊茂卿云河勢崐崘逺山形菡蓞秋此過華陰山下作初用蓮峰作䓧蓞的當而暗盡矣劉禹錫佳話録蜀王建時楊義方能文詞爲春日詩云海邊紅日半離水天外暖風輕到花贈王樞宻云雨聲鞭自禁門出一簇人從天上來異聞録唐求劉郇伯有詩名唐求臨池洗硯詩云恰似有龍深處卧被人驚起黒雲生又漸寒沙上路欲暝水邊村早行云沙上鳥猶睡渡頭人已行詩思不出二百里間劉郇伯爲范鄭郎中詩友范得句云歲盡天涯雨久而難對劉郇伯曰人生分外愁范賞之然老於新津之東渡非隐非吏二子亦可凌厲名場而死邱樊所謂蜀人無志懷土正此也北夢𤨏言余問山谷今之詩人誰爲冠曰陳無已其佳句可得聞乎曰吾見其作温公挽辭一聨便知其才不可敵曰政雖隨日化身已要人扶盛次仲孔平仲同在舘中雪夜論詩平仲曰當作不經人道語曰斜拖闕角龍千尺澹抹墻腰月半稜次仲曰甚佳其未大乃曰看來天地不知夜飛入園林總是春平仲乃服並同前舒王嘗寄蔣山元禪師詩曰不與物違真道廣毎隨縁起自禪深冷齋夜話唱和門熈寧間初作東西府望氣者云有天子氣及府成車駕果幸張掞以詩慶二府諸公荆公和云曽留上主經過迹更費高人賦詠才倦游録唐路徳延有孩兒詩五十首傳於世侍郎張公師錫次韻成老兒詩曰􅁂髪盡皤然眉分白雪鮮週迴延客話傴僂抱孫憐無病常供粥非寒亦衣綿假温衾擁背借力杖搘肩貌比三峰老年過四皓仙喚方離枕上扶始到門前每愛烹山茗嘗嫌飣石蓮耳聾如塞纊眼暗似籠煙宴坐羸扶几乗騎困嚲鞭頭搖如轉旋唇動若抽牽骨冷愁離火牙疼怯潄泉形骸將就朩嚢橐尚貪錢膠睫乾眵綴粘髭冷涕懸披裘腰懶繫濯手袖慵揎抬舉衣頻換扶持藥屢煎坐多茵易破行少履難穿喜婢裁裙布嗔妻買粉鈿房教深下幕牀遣厚鋪毡琴聽憐三樂圖張笑七賢看經嫌字小敲磬喜聲圓食罷羮流袂盃餘酒帶涎樂來須報罷醫到久相延褁帽縱横掠梳頭取次纒長吁思往事多感聽哀絃氣注腰還重風牽口更偏墓松先遣種誌石預令鐫客到唯求藥僧來忽問禪飬茶懸土竈曝艾晒簷椽怒僕空睁眼嗔童謾握拳心驚嫌踘蹴脚軟怕鞦韆局縮同寒狖摧豗似餓鳶觀瞻多目眩舉動即頭旋女嫁求紅燭男婚乞彩牋已聞頒几杖寧更佩韋弦賔客身非與兒孫事已傳飬和屛作伴如意佛相連久棄登山屐惟存負郭田呻吟朝不樂展轉夜無眠呼稚臨牀伴看書就枕邊冷懷疑貯水虛耳訝聞蟬束帛非無分安車信有縁伏生甘坐末綘老譲行先拘急將風夜昏沉欲雨天雞皮塵旋潰兒齒食頻填每憶居郎省常思釣渭川喜逢迎佛㑹羞赴賞花筵徑逺令移檻堦危索减磚好生焚鳥網惡殺杵魚船既感桑榆日常嗟蒲桞年長思當弱冠悔不膡狂顛青箱雜記牛僧孺將赴舉時投贄於劉夢得對客展讀飛筆塗竄其文居三十年夢得守汝牛出鎮漢南枉道汝水雕旌信宿酒酣贈詩於夢得曰粉署爲郎二十春向來名輩更無人休論世上升沉事且問尊前見在身珠玉㑹應成咳唾山川猶覺露精神莫嫌恃酒輕言語曽把文章謁後塵夢得方悟往年改文巻之事和答云昔年曽忝漢朝臣晩歲空餘老病身初見相如成賦日後爲丞相倚門人追思往事咨嗟久幸喜清風語笑頻猶有當時舊冠劒待公三日拂埃塵古今詩話長慶二年錢起自中書舍人知舉放進士周墀及第後同在翰林㑹昌三年起自僕射再放榜時周墀任華州因寄詩賀叙同在翰林日文塲三化魯儒生二十餘年振重名曽忝木雞誇羽翼又陪金馬入蓬瀛雖欣月桂居先折更羡春蘭最後榮欲到龍門看風水闗防不許暫離營答曰貢院離來二十霜誰知更忝主文塲楊葉縱能穿舊的桂枝何必授清香九重毎憶同仙禁六藝初吟得夜光莫道相如不相見蓮峰之下有龔黄人以爲絶唱廣卓異記韋中憲蟾廉問鄂州春日除祖筵上題文選兩句云悲莫悲兮生别離登山臨水送將歸以毫牋授賔從請續其句坐中悵望久之屬有酒妓泫然曰某不知欲口占兩句乃曰武昌無限新開桞不見楊花撲靣飛坐客嘉歎韋有贈聾僧詩云屽嶺東西烟靄合兩間茅屋一溪雲僧云師童誰解知師意人是人非不欲聞雅言雜載曹相確鎮浙西日㑹湖中郡判官王樞舉進士嚴惲詩曰春光苒苒歸何處更向花前把一盃盡日問花花不語爲誰零落爲誰開王抑其才調和曰花落花開人世夢衰榮閒事且持盃春風底事輕揺落何似從來不要開同前龔頴自負文學少許可又談論多所折難知鼎州士罕造其門獨丁晉公贄文求見頴倒屣迎迓酧對終日至於忘食曰自唐韓栁後今得子矣翌日丁獻詩於頴頴次韻和酬曰膽怯何由戴鐡冠只縁昭代奬孤寒曲肱未遂違前志直指無聞是曠官三諌毎傳朝客説五溪閒凭郡樓看祝公早得文塲雋况值天堦正舞干青𤨏雜記江西韋丹大夫與僧靈徹爲忘形之契寄徹詩云王事紛紛無暇日浮生冉冉只如雲已爲平子歸休計五老峰前必共論徹酧曰年老身閒無外事麻衣草坐只容身相逢盡道休官去林下何曽見一人雲溪友議白中令鎮荆南杜藴常侍問長沙諸從事盧發致聘焉發酒酣傲睨公少不懌因改著詞令曰十姓胡中第六胡也曽金闕掌洪爐少年從事誇門地莫向尊前喜氣粗盧答曰十姓胡中第六胡文章官職勝崔盧暫來闗外分優寄不稱賔筵語氣粗公極歡摭言梅聖俞客歐陽晦夫使工畫茅庵已居其中一琴横牀而已曹子方作詩四韻僕和云寂寞王子猷迴舩剡溪路超遙戴安道月夕誰與度倒披王恭氅半掩袁安户應調折弦琴自和撚鬚句百斛明珠東坡云余在廣陵與晁無咎曇秀道人同舟送客山光寺客去余醉卧舟中秀作詩云扁舟乗興到山光古寺臨流勝氣藏慚愧南風知我意吹將草木作天香予和云閙裏清逰似隙光醉時真境發天藏夢回拾得吹來句十里南風草木香余昔對文忠公誦文與可詩云美人却扇坐羞落庭下花公曰此非與可詩世間元有此句與可拾得耳後五年秀來惠州見予偶道其事直方詩話鄧洵美連山人乾祐二年中進士第與司空昉少保傳同年謁劉氏不禮歸武陵時周氏有其地且辟在幕府未㡬司空氏自禁林出使武陵與洵美相遇贈詩曰憶昔詞塲共着鞭當時鶯谷喜同遷闗河契濶三千里音信稀踈二十年君遇已知依玉帳我無才藻步花磚時情人事堪惆悵天外相逢一泫然洵美和云詞場㡬度譲長鞭又向清朝賀九遷品秩雖然殊此日歲寒終不改當年馳名早已超三院侍直仍忻步八塼今日相逢畨自愧閒吟對酒倍潸然相國歸闕率偕載而辭以疾不行相國語同年少保公公時在黄閣洵美在武陵又爲詩寄之云衡陽歸鴈别重湖銜到同人一紙書忽見姓名雙淚落不知消息十年餘綵衣我已登黄閣白杜君猶葺舊居南望荆門千里外暮雲重叠滿晴虚周氏疑洵羙漏洩宻謀急追捕至易俗場而遇害建隆初王師下湖湘相國復牧衡陽道經易俗場作詩弔曰十年衣染帝鄉塵踪跡仍傳活計貧高掇桂枝曽遂志假拖藍綬至終身侯門寂寞非知已澤國恓惶似旅人今已向公墳畔過不勝懷抱暗酸辛雅言系述山谷云金華俞清老名子中三十年前與予共學於淮南元豐甲子相見於廣陵自云荆公欲使之脱縫掖着僧伽藜奉香火於半山宅寺所謂報寧禪院者予之僧名紫琳字清老無妻子之累去作半山道人似爲不難事然生龜脱筒亦難堪忍後數年見之儒冠自若因嘗戯和清老詩曰索索葉似雨月寒遙夜䦨馬嘶車鳴鐸羣動不遑安有人夢超俗去髮脱儒冠平明視清鏡政爾良獨難子瞻屢哦此詩以爲妙直方詩話乾祐元年户部侍郎王仁裕放王􅄎狀元及第􅄎不數年拜相仁裕時爲太子少保有詩賀曰一戰文場㧞趙旗便攜金鼎賛無爲白麻驟降恩何厚黄閣初聞喜可知䟦勑案前人到少築沙堤上馬行遲押班長幸遙相見親狎争如未貴時漙和曰揮毫文戰偶搴旗待詔金華亦偶爲白杜遽當宗伯選赤心旋遇聖人知九霄得路榮雖極三接承恩出毎遲職在台司多少暇親師不及舞雩時廣卓異記魯直使余對句曰呵鏡雲遮月對曰啼妝露着花魯直罪余於詩深刻見骨不務含蓄余竟不曉此論當有知者同前詩話總龜巻十四欽定四庫全書詩話總龜巻十五宋阮閱撰
