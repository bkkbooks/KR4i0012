body:
  text: 怨嗟門王元之精於四六同時在玉堂而大拜者元之啓賀曰三神山上曽陪鶴駕之㳺六學士中空有漁翁之嘆以白樂天甞有詩云元和六學士五相一漁翁青箱雜記怨婦不知其姓既笄受幣於姨兄馬生父没繼母渝其約改適母之族兄老而猥惡居官納賄以罪犯為五羊民掾舟過英州庸良醉卧婦因題三絶於馹亭初與馬絶馬作詩貽婦人曰急水浮花入亂流濃雲遮月暗西樓風流忿恨知多少但㸔青春已白頭婦荅詩曰金丸打折鶼禽翼利刃偏傷連理枝自古一床無两好如今方信昔人詞題馹亭曰情若秋雲歸故國夢隨瘴月過梅峰誰将此骨埋煙隴寂寞魂㳺山霧中翰府名談髙蟾累舉不第有詩云月桂數條榰白日天門幾扇鎻明時陽春發處無根蔕憑仗東風次第吹怨而切又下第上主司馬侍郎詩云天上碧桃和露種日邉紅杏倚雲栽芙蓉生在秋江上不向東風怨未開人頗憐其意明年李昭知舉遂擢第詩史王元之以尼道安事謫黄州盖為盧崖州所譛也有詩云敢向台階問罪名後有以事貶黄州者有詩云魏能下面㸔花衘魏能以軍功黄州刺史同上陳羽有詩百餘首古意一篇集中所無其詞云十三學繡羅衣裳自憐紅袖聞馨香人言此是嫁時服含笑不語雙鴛鴦郎年十九髭未生拜官天下聞聲名車馬駢闐賀門舘自然不失為公卿是時妾家尤未貧兄弟出入雙車輪繁華全盛两相敵與郎年少為婚姻郎家居近御溝水豪門客盡躡珠履彫盤酒器常不乾曉入中厨妾先起姑嫜嚴肅有規矩闕小娘嬌意難取朝㕘暮拜白玉堂綉衣着盡黄金縷妾貌漸衰郎漸薄時時強笑意索寞知郎本來無嵗寒幾回掩淚看花落妾年四十絲滿頭郎未五十封公侯男兒全盛日忘舊銀床羽帳空􅀈􅀈庭花紅遍蝴蝶飛㸔郎佩玉下朝時歸來略略不相顧却令侍婢生光輝郎恨婦人易衰老妾亦恨深不忍道㸔郎強健能幾時年過六十還枯槁詩史陜郊有唐昭宗詩曰何處有英雄迎歸大内中又曰紇干山頭凍殺雀何不飛去生處樂讀之令人變色昭宗在河東作菩薩蠻云登樓延望秦宫殿茫茫不見雙飛燕渭水一條流千山與萬邱野煙生碧樹陌上行人去何處有英雄迎歸大内中今云詩未知孰是南唐元宗優待藩邸舊僚馮延已自元帥府書記至中書侍郎遂相時論以為非才江文蔚因其弟延魯福州亡敗請從退削乃出撫州秩滿還朝因赴内宴進詩曰青樓阿監應相笑書記登壇又却回韓渥天復中車駕幸鳯翔渥以扈從功反正初昭宗靣許渥為相渥奏云運契中興冝復用重徳鎮風俗因薦右僕射趙崇時梁祖在京馳入請見具言崇長短昭宗曰趙崇是韓渥所薦渥時在側梁祖叱之三奏曰臣不敢與大臣争渥尋出閩中渥有詩曰手風慵展八行書眼暗休㸔九局圖窓裏日光飛野馬按頭筠管長蒲蘆謀身拙為安虵足報國危曽捋虎鬚舉世可能無黙識未知誰擬試齊竽並同上孫定字至光涪州大戎之族子長於修定數舉矣而修方就貢或訪於定定謔曰十三儀表堂堂好箇将軍何湏以科第為意修頗衘之後修貴逹未甞言定長短晚年喪志放意酒盃景祐二年下第逰京師出開逺門醉中作詩曰行行淚血洒塵襟事逐東流渭水深私跨蹇驢風尚𦂳静投孤店日方沉一枝猶挂東堂夢千里空馳北巷心明月悲歌又前去滿城煙樹噪春禽同上玉階怨李詞云玉階生白露夜乆侵羅襪却下水晶簾玲瓏望秋月長相思詩云悠悠我思又曰靡日不思蘇子卿詩云生當復來歸死當長相思生别離楚詞曰悲莫悲於生别離古詩云行行重行行與君生别離相去萬餘里各在天一涯怨歌行李白亦有此作一作長安見内人出嫁令予代為怨歌行其詞曰十五入漢宫花顔笑春紅君王選玉色侍寢金屏中薦枕嬌夕月捲衣戀春風寧知趙飛燕奪寵恨無窮沉憂能傷人綠髩成霜蓬一朝不得意世事徒為空鷫鸘換羙酒羣衣罷雕籠臨寒不忍言為君奏絲桐腸斷聲已絶悲心夜忡忡獨不見李白云白馬誰家子黄塵邉塞兒天山三丈雪豈是逺行時春蕙忽秋草莎雞鳴曲池風催寒梭響月入霜闗悲憶與君别年種桃齊蛾眉桃今百餘尺花落成枯枝終然獨不見流淚空自知白頭吟相如将聘茂陵女為妾文君作白頭吟以自絶相如乃止故李白辭云頭上玉燕釵是妾嫁時物贈君表相思羅袖幸時拂莫捲龍顔席從他生網絲且留琥珀枕還有夢來時此最為警䇿藁砧藁砧今何在藁砧砆也問夫何處山上復有山重山為岀字言夫已出何當大刀頭刀頭有環問何當來還破鏡飛上天言月半當來也七哀詩曹子建釋詩者謂病而哀義而哀感而哀悲而哀耳目聞見而哀自歎而哀鼻酸而哀也巴東三峽歌三山峽七百里两㟁連山略無闕處重巖叠嶂隠蔽天日自非亭午夜分不見日月其漁父歌曰巴東三峽巫峽長猿啼聲苦淚沾裳别鶴操商陵牧子作也娶妻五年而無子父兄為之改娶妻聞之中夜起倚户而悲嘯牧子聞之愴然而歌将乖比翼隔夭端山川悠逺路漫漫攬衣不寝食不飡後人因為樂章焉並見樂府集劉子儀與夏英公同在翰林子儀表為先逹章獻臨朝子儀主文在貢院聞英公為樞宻副使意頗不平作堠子詩曰空呈厚貌臨官道更有人從捷徑過閑居主話周總福州人天禧二年因事逰京師值詔下奔郷薦不及有故人在譙郡守官遂往投之倚為拔觧之地而國家申嚴條約不許寄籍郡有司吏周吉者頗殖涯産捴遂拜為父吉欣然納之齒于諸子三代名諱亦從而更焉或人問吉則對以此子當年與母氏俱斥近召歸捴亦以是對秋預薦未幾逹于郷父乃馳詩一絶寄之遂不敢南歸因此慚恨而卒詩曰文章不及林洪範徳行全虧李坦然若拜他人為父母直湏焚却蓼莪篇各族重京官而輕外任故楊闕上建節後詩云抛却弓刀上砌䑓上方樓殿彩雲開山僧見我衣裳窄知道新從戰地來又云如今老去騎官馬羞向關中道姓楊楊行敏出使馹騎到劍州郡将輕忽慊恨尤甚題詩於冬青館云駑駘嘶呌知無定騏驥低垂自有心山上髙松溪畔竹清風纔動是知音又云杜鵑花裏杜鵑啼淺紫深紅更傍溪遲日霽光搜客思曉來山路恨如迷南部新書張又新郎中與楊處州友善楊妻李氏即庸相之女有徳無色楊未甞介意張甞語楊曰我少年擅羙名不復仕宦惟得羙室平生足矣既成婚殊失所望乃作牡丹詩云牡丹一朶直千金将為後來色最深今日滿園開似雪一生辜負看花心唐女真蕙蘭有才思咸通中為李億補闕侍婢愛衰後𨽻咸冝觀為女道士有怨李詩曰易求無價寶難買有情郎又有云蕙蘭消歇歸春圃楊栁東西絆客舟呉楊氏為宋齊邱閉於泰州永寧宫有詩曰江南江北舊家郷六十年來夢一場吴苑樓䑓皆冷落廣陵宫闕亦凄凉雲凝逺岫愁千片雨打孤舟淚兩行兄弟四人三百口不堪端坐更思量江南野錄謂此是李煜所作未知孰是並古今詩話戴衢乆不第甞夜吟曰擾擾東西南北情何人於此悟浮生還縁無月春風夜暫得獨聞流水聲又云坐落干門日吟殘午夜燈盧懐杼情鄭還古為河中從事為同院所誹謗貶吉州掾道中為望思䑓詩云䜛語能令骨肉離姦情難測事堪悲何因掘得江充骨搗作微塵祭望思又云吉州新置掾馳馹到條山薏苡殊非謗羊腸未是艱自慚多白髪争敢競朱顔苦有前生債今朝不懊還同上盧羣玉落托江湖不第縱情詩酒有詩曰酒㵼銀瓶到底清夜深絲竹鳯凰鳴紅粧醉起一花落更引春風無限情又投盧尚書詩曰無力不任為走役有文安敢滯清平從來若把耕桑定免恃彫䖝悮此生南部新録李山甫咸通中不第後流落河朔為樂彦正從事甞有悲怨執政曰勸君不用誇頭角夢裏輸嬴捴未知郎申自𤓰州宣事回進合歡水果一器煬帝以一雙令小黄門馳賜絳仙馬急揺觧絳仙拜賜泫然因附紅牋小簡進詩云馹騎傳雙果君王寵念深寧知辭帝里無復合歡心煬帝省之不悦顧黄門黄門懼拜而言意乃觧張安道舉進士再失意而作歌曰休休歸去休清風釣艇明月酒樓公不見冦相丁相雷州崖州休休歸去休景祐元年中茂材異等復又中賢良方正朱定國歸田録杜牧舎人罷任浙西郡道中有詩曰鏡中絲鬂悲来慣衣上塵痕拂漸難惆悵江湖釣魚手却遮西日向長安與杜甫齊名時號大小杜郡閣雅談唐文宗大和元年誅王涯鄭注後仇士良秉權或登臨㳺幸往往獨語左右莫敢進問因題詩曰輦路生秋草上林花滿枝憑髙何限意無復侍臣知古今詩話詩話総龜巻四十二欽定四庫全書詩話總龜巻
