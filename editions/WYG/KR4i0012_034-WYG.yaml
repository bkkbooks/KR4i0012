front:
  text: 三十四
  hash: sha256:c36def1b57825b05d01bde0cb1e6d6bc9713f6a52ae6fa56342512b1fadc0e37
body:
  text: 宋阮閱撰紀夢門下狄遵度紀夢詩云佳城鬱鬱頽寒烟孤雛乳獸號荒阡夜卧北斗寒桂枕木落霜拱鴈連天浮雲西去半落日行客東盡隨長川乾坤未毁吾尚在肯與蟪蛄論大年狄遵度自兒童時巳能屬文落筆有奇氣年十六一夕夢杜子羙誦平生詩皆集中所未見者覺而記兩句後遂續之百斛明珠張詧字隠之本閩人遷於成都數世矣善屬文不仕晩用太守王素薦賜號冲退處士一日夢有人寄書召之云東岳道士書也明日與李士寧答曰手持東岳寄書來詧大驚不知其所自來未幾詧果卒其子禩亦逸民舉仕一命乃死士寧蓬州人也語默不常或以為得道者百嵗乃絶嘗見余於成都曰子甚貴當策舉首已而果然余嘗夢見人云是杜子美謂余曰今人多誤會予八陣圗詩云江流石不轉惟恨失呑吳世人皆以為先主武侯欲與闗羽復仇故恨不能滅吳非也我意本謂吳蜀乃脣齒之國不當相圖晉之所以能取蜀者以此子羙死已久猶不㤀其詩區區自列其意書生之習氣也並同前東坡將亡前數日夢中作一詩寄朱行中云舜不作六器詎知貴璵璠哀哉楚狂士抱璞號空山相如起睨柱投壁相與還何如鄭子産有禮國自閑雖㣲韓宣子鄙夫亦辭環至今不貪寳凛然照塵寰覺而記之自不曉所謂東坡絶筆也直方詩話陳明信云蕭貫少時嘗夢至宫廷中長廊邃舘如王者所居有千門萬戸望之洞然金碧爍耀既過數門見羣婦人如神仙視貫驚問何所従來貫愕然亦不知對貫自陳進士能為詩中有一人授貫紙曰此所謂衍波牋煩賦宫中曉寒歌貫援筆立成既有奇語其人甚賞之因曰先軰異日必貴此天上非人間也貫寤尚能記所賦俞秀老往嘗得之於蕭翰林之孫其詩有云十二嶤闗隠空緑獸猊呼焰椒壁馥渇烏涓㳙不相續轆轤欲轉霏紅玉百刻香殘隕蓮燭九龍吐水漫寒漿紅絹佩魚無左璫兩兩趨走瞻扶桑紅萍半圭出波面囘首觚稜九霞絢鳴鞘聲􅀙天上來大劍髙冠滿前殿秀老誦之尚有四五韻㤀之王太初傳言有焦仲先者家於南徐元豐元年因詣京師訪知已忽夢一婦人相顧遇或以詩筆相往來其一聫云呉王臺下無人處幾度臨風學舞腰又曰吳山之北會稽之陽古木蒼蒼其最後一章云仲冬之月二七之間月圓風静車馬相扳其人如病狂縁太初而後愈至秦少游書栁鬼事所載詩語前後皆同但年月乃是熈寧九年所病者乃是嘉興令陶集而所諭者乃是天竺辯才法師二者不知孰是並同前僕嘗夢有客携詩文見過者覺而記其一詩云道惡賊其身忠先愛厥親誰知畏九折亦自是忠臣又有數句若銘賛者云道之所以成不以害其耕徳之所以修不以賊其生東坡詩話富鄭公早年嘗夢青州王相公以後事相托公曰相公徳被生民當延遐夀何遽及此後二年罷相知鄆州辟鄭公為倅到任月餘有大星隕於宅園家人怪之相告曰後月當見果至後月薨鄭公為治䘮事故鄭公挽詞曰道徳被生民與當年夢中符契古今詩話鄭内翰獬未貴時嘗病瘟疫數日未愈甚困俄夢至一處若宫闕有吏迎謁甚恭公謂吏曰吾病甚倦煩熱思得凉浴以清其肌吏云已為公辦浴久矣吏引公至一室中有小池方濶數尺甃以明玉水光㶑灧以手測之清冷可愛公乃坐甃上以水泛身俄視兩臂已生白鱗視水中影則頭已角出公驚遽出吏云此玉龍池也惜乎公不入其水中入則為輔宰乃覺少選出汗公後登第為第一人為詩戯友人云文闈數戰奪先鋒變化湏知自古同霹靂一聲従地起到頭身是白龍翁王仲舉營道人母嘗夢挾仲舉入月仲舉修進業長興化二年赴舉謁秦王登第後有詩謝秦王曰三千里外抛漁艇二十人前折桂枝太平興國中仲舉有子曰嗣全亦中進士第乃扶兩子入月之祥青𤨏集湖州長興縣啄木嶺金沙泉即每年造茶之所也湖常二郡接界於此其土有境㑹序每茶節二牧畢至所泉處沙中居嘗元水將造茶太守具犧牲祭泉頃之發源清溢造御茶畢水則㣲减供堂者畢水已半矣太守造茶畢即涸矣太守或行斾稽晩則亦風雷之變或見摯獸毒蛇鬼魅之類焉胡生者即其居以釘鉸為業居霅溪而近白蘋洲去其居十餘歩有古墳胡生每因茶飯必奠酬之嘗夢人謂之曰吾徃栁氏子生善詩而嗜茗及死塟此室乃子今㞐之側也常衘子之惠無以為報欲教子為詩胡生辭以不能栁強之曰但率子意言之當有致矣生既悟試留詩果有冥助者其後遂工焉詩曰胡風似劔鎪人骨漢月如鈎釣胃腸魂夢不知身在路夜來尤自到昭陽人謂之胡釘鉸詩金沙池泉在常州宜興縣罨畫溪之東有寺寺有碑載當時杭湖常三州貢茶唱和樂天云十隻畫船何處宿洞庭山脚太湖心常州太守忘其姓名和云殷勤為報春風道不貢新茶只貢心韋檢舉進士不第常有一羙姬一日捧心而卒檢追思痛悼殆不勝情舉酒吟詩悲怨可掬吟曰寳劍化龍歸碧落嫦娥隨月下黃泉一盃新酒青春曉寂寞書窗恨獨眠一日忽夢姬泣涕澘然曰當有後期今和來篇即口占云春雨濛濛不見天家家門戸栁如烟如今腸㫁空􅂷淚歡笑重追别有年檢終日怏怏後更夢姬曰即遂相見覺來神魂恍惚乃題曰白浪漫漫去不迴浮雲飛盡日西頽始皇陵上千年樹銀鴨金鳬也變灰後數日即符夢兆脞說前集晁奉禮簡故宫保内翰之次子也於昆弟中最稱奇秀與梁固少小硯席之至善大中祥符二年固狀元及第授青州倅時奉禮榮侍在闕下是年冬末梁方之任去青雨驛夜夢晁來相謁手携白扇上有七言詩一首以贈梁云死生離别最堪悲相對無言淚滿衣嘆我巳歸泉下去羡君新向月中歸長鞭已見騰夷路折翼終難繼迅飛珍重故人當聖代早持鈞軸入黄扉覧詩起執手悲泣而别倐然覺大異之歎晁必沒故矣乃急走僕録所得詩入亰師訪其安否宫保開讀之大慟曰品格真吾兒作也夢之夕乃簡亡之日也李良弼故給事中防之子祥符元年應進士舉得同學究及第二年給事自南京移知鄭州以家在應天良弼奏為本府司士㕘軍是年中赴良弼隨侍至鄭夜宿中牟驛夢人持詩版跪而來獻良弼詩曰九霄丹詔三天近萬叠紅芳一旦開日月山川湏問甲為君親到小蓬萊覺而異之旦遽起而白給事喜曰據此詩意汝必有前程慎勿廢於筆硯勉旃勉旃至郊而别五年方歸闕授三司户部判官五月已舉張楚縣丞事停任六月十九日良弼卒於應天府給事大慟悲語張君房曰夢之不誠如是自此兒夢必謂其前程而為詞臣一旦至是苦哉君房但寛勉以慰之是年秋君房以語鞠獄無狀謫為寧海督郵乃同給事舟抵應天府旦憇泊間細語良弼卒𦵏之日月及𦵏地之所因而繹之忽有數悟乃省其詩盡得之良弼丙戌生年二十有七即詩首句云九霄丹詔三天近三九二十七數是年二十五故云近也萬叠紅芳一旦開方萬葉之花一旦開盡是近謝之意次云日月山河湏問甲其年六月十九日甲寅乃其卒日殯是二十九日甲子𦵏於府東甲地即是日月山川湏問甲也葢六月天徳月徳俱在甲末句云為君親到小蓬萊即虚無㝠漠之所給事沉黙曰君辨之矣脞說前集沈亞之嘗言刑鳯寓居長安平康里第晝夢一婦人自楹而來古粧髙髻作陽春曲曰長安少女翫春陽何處春陽不㫁腸舞袖弓腰渾忘却娥眉空帶九秋霜鳯曰何謂弓腰曰昔年父母教舞作此弓彎狀舞罷辭去鳯亦尋覺脞說後集吳興姚郃嘗言有友王生者元和初夕夢遊吳宫久之聞宫中出輦吹簫撃皷言𦵏西施王悲悼不止立召門客作挽歌生應聲為詞曰西望吳王闕雲書金字牌連江張蕙帳擇土𦵏金釵滿地紅心草三層碧玉臺春風無處所悽恨不勝懐及寤復記其事王生太原人崇寧元年元日昏眠夢中作一詩云無頼春風試怒號共乗一葉傲驚濤不知兩岸人皆愕但覺中流笑語髙三月與陳瑩中渡湘江是日大風當斷渡小舟掀舞白浪中兩岸聚觀膽落瑩中笑愈髙余以詩語瑩中瑩中曰此公桉後大行叢林東坡倅錢塘夢神考召入禁中宫女環侍一紅衣女捧紅靴一隻命坡銘之其中一聫云寒女之絲銖積寸累歩武所及雲蒸雷起上極歎其敏劭同前山谷晝卧夢與一道士升空道士曰與公游蓬萊覺天風吹鬢道士曰歛目俄有狗吠開目不見道士惟見宫殿魯直入有兩玉人導升殿主䧏揖之仙女侍之中有一女云整琵琶魯直愛其風韻顧之忘揖主者主者色莊故其詩曰試問琵琶可聞否靈君色莊妓搖手與余親言之今山谷集語不同葢更昜耳冷齋夜話少遊南遷宿宫亭湖廟下側枕視㣲波月影縦橫追繹昔宿埀雲老借竹軒見西湖月色如此夢羙人自言我天女也以維摩像乞賛少游愛其畫念曰非道子不能作此天女以詩戲少游曰不知水宿分風浦何似秋眠借竹軒聞道詩詞妙天下廬山對眼可無言少游夢中題其像曰竺儀華夢瘴面囚首口雖不言十分似九應笑舌覆大千作獅子吼不如不搏取妙喜如陶家手同前陳智夫襄陽人博學有才思尤長於歌詩嘗遇異人授以吐納之術故佳句多於夢中得之若花笑似留客鳥聲如喚人又野花臨水數枝恨芳草連天千里情之句雖前輩不能逺過遯齋閑覧詩話總龜巻三十四欽定四庫全書詩話總龜巻
