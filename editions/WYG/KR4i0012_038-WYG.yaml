front:
  text: 三十八
  hash: sha256:8d829c653d8fec9cfff372f4a5750fe567e2faa610cd722d45ee652c1bd77ee4
body:
  text: 宋阮閱撰詼諧門上太宗賜錢思公已汴孝經詩令次韵和進晁文元迥首出四句云舍後信標名風篁自有聲温柔敦厚教仙果子難生思公即便對晁公今日湏了晁大笑諸公不曉今日孝經詩稽遲戯以此督之爾四句蓋次韵詩遲也祥符中日本國遣使入貢稱國之東有祥光現其國素傳中原天子聖明則此光現章聖詔本國建寺賜額曰神光朝辝日夷使乞令詞臣撰一寺記是時當制者雖中魁選然詞學不優贍居常止以張君房代之葢假其稽古才雅也既傳宣訖撰寺記時張尚為小官醉飲樊樓遣人遍京城尋之不見而夷人在閤門翹足以候文中人三促之紫㣲太窘後錢希白楊大年因玉堂暇日改閑忙令大年曰世上何人最號閒司諫拂衣歸華山葢种放得歸山時也希白曰世上何人最號忙紫㣲失却張君房時傳此事為雅笑湘山録唐制三班奉職月俸七百馹劵羊肉半觔祥符中有人題於馹舍曰三班奉職實堪悲卑賤孤寒即可知七百料錢洎甚使半觔羊肉幾時肥朝廷聞之謂如此責廉遂議増俸古今詩話陳亞少卿維陽人善詩什滑稽尤甚嘗與蔡君謨會於金山僧舍酒酣君謨題詩屛間曰陳亞有心纔是惡即索筆對曰蔡襄無口便成衰少時為杭州於潜令以利口謔浪人或厭之太守馬忠肅因其趨府戒之陳怛受教俄有通刺謁者稱太詞郎李過庭公罵曰何人家子弟亞率爾云李趨兒馬公徐悟之大笑唐宋遺史陳亞卿著藥名詩若風月前湖近前胡軒窗半夏凉半夏棊為臘寒呵子下呵子衣嫌春瘦縮紗裁縮砂及贈祈雨僧詩云無雨若還過半夏半夏和師㬠作葫蘆巴葫蘆巴之類最膾炙人口又曽知祥符縣親故多干託借車牛因作詩曰地名京界足親知荆芥往借尋常無歇時蝎但看車前牛領上車前子十家皮没五家皮五加皮嘗言藥名用於詩無不可而幹運曲折使各中理在人之智耳或曰延胡索可用乎曰可沉思久之吟曰布袍䄂裏懐漫刺到䖏遷延胡索人鰻鯉延胡索此可贈游謁措大聞者絶倒與章郇公同年将用之而為言者所沮作生查子獻之曰朝廷數擢賢葫藋旋占凌霄路凌霄花自是欎桃人桃仁險難無夷處兼荑也知没藥療孤寒没藥大幅紙連粘大腹皮甘草歸田賦甘草又别作閨情生查子三首其一曰相思意已深相思子薏苡白紙書難足白芷字字苦參商苦參故要檀郎讀狼毒分明寄得約當歸當歸逺志櫻桃熟逺志何事菊花時菊花猶未回鄉曲茴香其二曰小院雨餘凉禹餘糧石竹風生砌石竹羅扇儘從容蓯蓉半夏沙厨睡半夏起來閑坐北亭中北亭滴盡真珠泪真珠為念壻辛勤細辛去折蟾宫桂桂其三曰浪蕩去來來莨菪躑躅花頻換躑躅可惜石榴裙石榴蘭麝香消半麝香琵琶閑後理相思枇杷相思必撥朱絃斷蓽撥擬續斷朱絃續斷待這寃家看代赭又自為亞字謎曰若教有口便啞且要無心為惡中間全没肚腸外面任生稜角雖一時諧謔之詞以托亦有深意又嵗旦示知已云餘寒掃地盡衰老向人閑與人郊行云馬嘶曾到寺犬吠昨行村送歸化宰赴闕云吏辭如賀日民送似迎時懐舊隠云排聫花品曽非僣愛惜苔錢不是慳自成一家體青箱雜記魏仲先冦萊公游陜郊僧寺多届題後到見萊公詩巳用碧紗籠而仲先詩獨塵昏在壁時有從行官妓頗慧以紅衣袖拂之仲先徐曰若得時将紅袖拂也應勝着碧紗籠萊公大笑西都應天院去府十里每朔望留守帥府官朝拜未曉而住時行十里不交談有人作詩云正夢寐中行十里不言語處飲三盃有人送驢肉復云㕔前捉到湏依法盒内盛來定付厨春明退朝録李濤相國性滑稽為布衣時往來京洛間泥水闕有僧舍曰不動尊院上中有僧不出院十餘載濤每過常謁其院必省其僧未幾寺焚僧㪚濤再過之但有門扉而已因題詩曰走却坐禅客移將不動尊世間顛倒是八萬四千門談苑韓浦韓洎晉公滉之後咸有詞學浦善聲調洎能為古文洎嘗輕浦語人曰吾兄為文譬如繩樞草舍庇風雨而巳予之文是造五鳯樓手浦性滑稽竊聞其言因有親知遺蜀牋浦作詩與洎曰十樣蠻牋出益州寄來新自浣溪頭老兄得此全無用助爾添修五鳯樓同上内朝辰入庭内錯立至駕欲坐即御史䑓知班唱班欲依班立也王彦和汾與劉貢父攽同趨朝王戯劉曰内朝日日湏呼汝劉應聲曰寒食年年必上公王石甫博學耿介語言輕肆人或戲為心風熈寧中乞郡得湖州舒王以詩送之曰吳興太守羙如何栁惲詩才不足多遙想郡人迎下擔白蘋江上起滄波譏其風也石甫知其意即以吳興太守羙如何為破題作詩十首其一曰吳興太守羙如何太守從來惡祝鮀生若不為上柱國死時猶合作閻羅舒王聞之曰閻王見闕請便赴任方圭好為惡詩宋公庠知揚州日圭來謁醼於平山堂圭誦詩不已宋欲他辭已之顧野外牛牽木磨庠謂坐客胡詼曰青牛恃力狂挨朩詼應聲曰妖鳥啼春不避人宋公大笑圭悟其意飲㪚至客次欲奮拳撃詼衆捄而免並同上劉子儀三入玉堂望大用頗不懌作詩云蟠桃三竊成何味上盡鼇山迹轉孤稱疾不出朝士問疾劉云虗熱上攻石文定在坐云只銷一服清凉㪚謂兩府方得凉繖王君貺送牡丹與永叔答詩云最後花常冣後開葢君貺同時軰皆入兩府永叔以最後戲之也王得詩不喜對來价擲之永叔謂人曰好花不開也君貺聞之愈怒詩史李芸居於泗上一日納姬友人鍾公寄詩曰昨暮閒行泗水邊緑楊堤上覩雲軿知君買得千金笑只用何曾兩日錢詩史范希文以大理寺丞監西溪塩場西溪素多蚊蚋希文作詩曰飽去櫻桃重飢來栁絮輕但知求旦暮休更問前程馮瀛王性仁厚家有一池每得魚放池中其子監丞每竊釣之瀛王聞之不恱於是髙其墻垣鑰其門戸作詩書其門曰髙却垣墻鑰却門監丞従此罷􅂷綸池中魚鼈應相賀從此方知有主人呉善長郎中儀狀魁偉頗類富丞相文學之譽則無焉有輕薄子贈之詩曰文章却似呼延賛風貌還同富相公國初有武臣呼延賛好吟惡詩故云熈寧中章子厚察訪湖北因以兵收辰溪之南江諸蠻時有吳僧願成亦在軍中自稱察訪大師每出則乘大馬以撾劍擁従呵殿而行隨兵官李資入洞資為蠻人所殺成亦被縛既而放歸猶揚揚自得詩僧文瑩嘲之曰童頭浮屠浙東客傳呼避道長沙陌寳撾青葢官儀雄新賜袈裟椹猶黑察車後乘従驅挈庸夫無謀動蠻穴暗灘夜被猿猱擒縛入新溪哭殘月䍧牱畏佛不敢烹脫身腥窟存餘生放師回目不自愧反以意氣湘南行我聞幸有適伊川變戎預䜟麟經編暌車載􅄦吁可恠宜入熈寧志怪篇京師優人以雜細物數十種布於地使人暗記物色然後遣沐猴認之每沐猴得之優人即曰道著也馬留葢優人呼沐猴之名熈寧庚戌春市井之人見舉子往往亦以馬留目之其年狀元葉祖洽赴宴於池上有下第進士寄詩曰着甚來由去賞春也應有意惜芳辰馬蹄莫踏亂花碎留與愁人作醉茵細而繹之乃是着也馬留四字葢四句各取上一字錢君平性滑稽及第後有人以詩來钁錢君平以詩答之五貫九百五十俸省錢請未足甚用還債還負亦無餘買酒買肉何曽夢妻兒終日只愁飢婢僕過冬猶受凍更有不識事閑人獻詩獻啟覔甚甕張獻圖主簿潁人善嘲謔以老榜得班行寄書于家人曰汝作鸞孤我為奉職不忝矣又譏州縣官之貪污者云捧頭舊血添新血篋裏黄金壓白金古今詩話王丞相好嘲謔初執政對客悵然曰投老欲依僧再三言之客應之曰急則抱佛脚丞相善之復曰投老欲依僧是古人一句詩客曰急則抱佛脚亦是俗諺全句上去頭下去脚豈不是的對丞相大笑祕書省東即右威衛營荒蕪摧毁其大㕔逼校書院南對御史臺有人嘲之曰門縁御史塞㕔為校書侵宋中道有俊才而身短小人多戲之蘇子羙與中道年相懸然甚愛其才調道亦傾心作詩論交子羙長大魁偉與中道並立下視曰交不自此京師井市語也號中道為宋錐為其頴利而么麽云贈之詩曰譬如利錐末所到物巳破後中道通判洛州洛州本趙地有毛遂墓聖俞作詩云舉錐處囊事亦所以戲之也太宗時進士同年有數人名似姓者或有取以為詩云郭鄭鄭東東野絡馬張張夏夏侯璘熈寧中有崔度崔公度王詔王子詔皆的對也又有章君陳陳君章二人未有似者唐東方虬欲為西門豹作對亦當時好事者為此對耳給事中馬子山穆王八駿有山子馬王丞相云馬子山騎山子馬莫有對者相傳久之有姓錢人為衡水令罷歸或取以為對云錢衡水盗水衡錢錢聞之變色或者對云吾正欲作對耳非有實也古今詩話咸通中以舉子多車服侈異下令不許乘馬時塲中不下千人皆跨長耳或嘲之曰今年勅下盡騎驢短㡌長鞭滿九衢清瘦兒郎猶自可就中愁殺鄭昌圗鄭昌圖魁偉故有此句開元中宰相蘇味道張昌齡皆有詩名暇日相會互相嘲謔昌齡曰某詩所不及相公者為無銀花合葢蘇元夕詩有火樹銀花合之句也味道曰某詩所以不及相公者為無今同丁葢張贈張昌宗詩有昔日浮丘伯今同丁令威之句也遂相對撫掌而笑武后朝左司郎中張元一滑稽時西戎犯邊武后欲武氏立功因行爵賞命武懿宗統兵平之冦未入境懿宗􅅻逾邠畏懦而遁懿宗陋短元一嘲之曰長弓與短箭蜀馬臨髙蹁去賊七百里隈墻獨自戰忽然逄着賊騎猪向南遁太后聞之未曉曰懿宗無馬耶何故騎猪元一觧曰騎猪夾豕也天后大笑捴章二年興善寺火塑像焚盡道士李宗嘲之曰道善何曽善言興又不興如來燒亦盡惟有一羣僧文潞公嘗言潞中有一士人憂制中游處坐中有人嘲輙嘗自云有年光徳一王伸戀酒貪歌不厭貧三年得替歸朝去贏得髭鬚白似銀甚不覊檢也如此特好事人有善必優禮待之僧乾康金仙皆以能詩登門士儒問羽卿通尚書春秋鄧潜有詞學每接見則疑忘倦議者以此稱之零陵總記雪峰恱禪師與興化銑公友善既老迎送不已恱戒曰公不袖手山林尚忍垢乎銑一日送官墮馬損臂恱作偈戲云大悲菩薩有千手大丈夫兒誰不有興化和尚折一支猶有九百九十九南華恭長老同調大愚少叢林有書叙法乾悦作偈曰與師瓶錫寄江湖共憶當年在大愚堪笑堪悲無限事甜瓜生得苦葫蘆東坡宿曺溪讀傳燈錄燈花墮巻上燒一僧字以筆記於窗曰曺溪岑􅄫寞燈下讀傳燈不覺燈花落茶毘一個僧詩話總龜巻三十八欽定四庫全書詩話總龜巻
