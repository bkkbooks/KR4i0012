front:
  text: 十三
  hash: sha256:a91b9ac3ed0dfdc450f45fb2b83046ce5a9a8ec70b9cdde20825a99c1b41fb9c
body:
  text: 宋阮閲撰警句門中楊文公云錢惟演劉筠首變詩格學者慕之得其格者蔚爲佳句二公麗語頗多如惟演奉使塗中云雪意未成雲着地秋聲不斷鴈連天又云客亭厭見名長短村酒那能辯聖賢送僧逰楚云宿舍孤煙起行衣夢雨凉張弁州詩云戈矛巡霧夕鐃皷宴蕭晨章衢雨詩云平檻曉波吳榜渡遶城春樹越禽飛章南安云離人南浦多春草越鳥棲枝有早梅劉潭州云坐激鮮飈湘竹曉樹含凉雨越禽歸李太僕比使云漢幟隨移帳燕鴻半解鞍何袁州云疎鐘静起軍城晚華表雙高水國秋陳江陵云深沉蛛網通歸夢紫翠春山接去舟太乙宫云神庭古栢啼烏起齋室虛簾宿霧通送人云思滿離亭酒魂驚客舍烏高泉州云東南地迥宵烽息西北樓高晚望迷章分寧云小雨郊原連苦霧夕陽樓閣照丹楓東封應制云羽旄㐮野駕宴喜魯郊民送予知處州云輕飈使車逺明月直廬空張僕射判河陽云緑野桑麻連四水黄堂歌吹擁千兵孫永興云魚尾故宫迷草樹龍鱗平隰自風煙漢武云立候東溟邀鶴駕窮兵西極待龍媒公子云歌畨南國桃根曲馬過章臺杏葉韀槿花云欲作飛煙散猶憐反照遲荷花云泪有鮫人見魂須宋玉招禁中鶴云天淵風雨多秋思遼海煙波失舊期留題云有時盤馬看尤懶盡日投壺笑未迴又云春瘦已寛連理帶夜長誰有辟寒金元夜云九枝火樹連金狄萬里霜輪上璧璫馬延州云沃野桑麻㴠細雨嚴城皷角送斜陽劉筠直禁中云雨勢宫城闊秋聲禁樹多陜州從事云角迥含秋氣橋長斷洛塵周賢良云﨑嶇一乘傳憔悴五羊皮南鄭云渝舞氣豪傳漢俗内魚味美敵吳鄉李太僕云惟月卿曹重占星使者賢送僧云捲衲城鐘斷搘笻岳雨寒僧惠崇云醉令難同社仙鵞肯換書葉金華云柔桑蔽野鳴雛雉高栁含風變早蟬劉潭州云坐席久虛温樹老心旌無奈楚風長又云沙禽兩兩穿鈴閣江草依依接射堂九隴云溪牋未破冰生硯爐酒新燒雪滿天又周賢良云春風亂鶯囀夕霧一鴻冥張嶺南云山月愁􅏈子風濤怒鱷魚西巡云龍駕昌明御天旗太乙張祠婺神云大野㡬星分婺女清風萬古感顔烏章南安云嶺雲夏變梅蒸早越雨秋藏桂蠧多西京首坐云滎河帶繞中天閣空樂星懸大士居題雪云劉伶醉席梅花地海客仙槎粉水天利州轉運云鴟蹲野芋誰爲尹雪積泉鹽久置官章分寧云鶴伴鳴琴公事晩烏驚調角戍城秋楊處州云朱飾兩轓巡屬邑案留雙筆在中臺閣云三壌月臨承露掌九鶵烏繞守宫槐又云酒供硯滴濡毫冷火守更籌沃漏長雪月云已回鄰靣三年粉又結寒絲㡬許冰汾陽道中云皷音記里繩阡逺舞節鳴鸞玉步隨相洪州云桃葉横波人共醉劒光衝斗獄常空李秦州云右墄獨登宫雪宻前旌雙抗嶺雲高劉潭州云洛田荒二頃楚浪漲三篙槿花云吳宫何薄命楚夢不終朝宫詞云難消守宫血易斷舞鸞腸又云虹跨層臺晩螢飛夏苑凉夏日云雲容倏變千峰險草色相沿百帶長新蟬云翼薄乍舒宫女􅁂蜕輕全解羽人尸公子云行庖㸑蠟彫胡熟永埒鋪金血汗驕明皇云梨園法部兼胡部玉輦長亭更短亭荷花云湔裙無限水障袂㡬多風留題云荷華出水終無定蘿蔓從風莫自持又云藻井風高蛛壞網杏園春暖燕争泥咏梨云先時櫻熟煩羊酪逺信梅酸損瓠犀洞户云宻鎻香風深處户亂飄梨雪曉來天贈希晝云吟餘雲散葉坐久麈遺毛夕陽云塞迥横垣紫江清照葉丹圉中云籠禽思隴樹洞犬識秦人栁絮云平沙千里經春雪廣陌三條盡日風高屬疾云風簾鴟笑厨烟絶月樹烏驚藥杵喧燈夕云金門水動浮壺箭玉宇風來落砌蓂禁中云萬年宫省樹五色帝家禽晩唐詩句尚切對然氣韻甚卑鄭綮山居云童子病歸去鹿麑寒入來自謂銖兩輕重不差有人作梅花云强半瘦因前夜雪數枝愁向曉來天對屬雖徧亦有佳處李廷老家有李揆與饒州刺史封漸仲容叔霽聨句揆筆力遒勁詩亦大佳略云暫踐蓬瀛閣卧痾淮海濵偶同鄱陽守宛是鄱陽人又云共仰新侯伯同瞻舊宰臣又云鄉路轅思北客林巷喜南王爽字季明王孝伯問曰古詩中何句爲最佳爽未對孝伯曰所遇無故物安得不速老此爲佳楊巨濟詩曰爐煙添栁重宫漏出花遲當以下句爲試舉人詩題濟本作源晏元獻稱國初待詔云醉輕浮世事老重故鄉人張安道亦稱紅塵三尺險中有是非波晏臨淄宴集詩最多有一聨云春風任花落流水放杯行惠崇遊長安云人逰曲江少草入未央深不减馬放降來地鵰盤戰後雲景祐三年後苑生雙竹宣宰相從臣賦詩知制誥李絢有詩云日迴龍並影風過鳯聨聲衆嗟賞之前並詩史嘗和杜祁公致仕詩云收得桑榆歸物外種成桃李滿人間亦佳雲齋廣録李元膺逰春詩云夾道桃花三月暮馬蹄無處避殘紅具標致如此陳臺杜黙預東平郡宴太守請賦海棠詩黙云倚風莫怨唐工部後裔寧知不解詩坐客歎服詩史臧謀梅花詩云緑楊解語應相笑漏洩春光却是誰人皆誦之淇川人楊萬畢字通一作聞梧桐夜雨詩云千里暮雲山已黒一燈孤舘酒初醒索寞之意盡於此華州華陰縣宰許弋於縣廨闢一軒名曰増明取韓文公遙岑出寸碧逺目増雙明之意羽客姚太虛謁許公因書云遙岑寸碧尚増明何况雲峰三十六楊茂卿詩云河勢崐崘逺山形䓧萏秋誠佳錢昭度燈詩云繡帔夢驚中酒處朱門人語上朝時未若船中聞鴈洞庭夜牀下有蛩長信秋意格清逺昭度又有聞角詩云風欲抛高雨壓沉黄昏前後五更深議者云此亦句之優者王文穆罷相帥朝士皆有詩陳從易詩最佳云千重浪裏平安過百尺竿頭穩下來景祐末元昊叛富鄭公守長安梅聖俞送詩云亞夫金皷從天落韓信旌旗背水陳鄭公獨刻此詩于石范景仁喜爲詩年六十三致仕一朝思鄉里遂輕行入蜀故人李才元知梓州枉道過之歸至成都日與鄉人樂飲散財於親舊之貧者遂逰峨嵋青城下巫峽出荆門歲暮乃還京師在道作詩二百五篇有云不學鄉人誇駟馬未饒吾祖泛扁舟此一二事他人所不能用也范希文於江上見一漁父意其有徳隱者也問姓名不對但留一絶云十年江上無人問兩手今朝一度义並同前閩嶺孟貫爲性踈野不以名宦爲意喜篇章大諌楊徽之稱之如寄張山人草堂云掃葉林風後拾薪山雨前韓㐮客者漢南女子爲歌詩知名㐮漢間孟浩然贈詩曰只爲陽臺夢裏狂降來教作神仙客㐮客閨怨詩曰連理枝前同設誓丁香樹下共論心先公熈寧中迓虜使成堯錫見遺衣服刺此聨於褁肚上其下復刺丁香連理男女設誓之狀虜人重此句爲佳製詩史開元中將軍宋清有神劔後爲𤓰州牧李廣琛所得哥舒翰求之廣琛不與贈詩曰刻舟尋已化彈鋏示恩酧南部廬阜人陳沉立性僻野不接俗士黄損熊皎虛中師事之寒食後云罷却兒女戲放他草木生閒居云掃地雪粘箒耕山鳥怕牛題水云㸃入旱雲千國仰力浮塵世一毫輕齊已贈沈云四海方磨劒深山自讀書雅言張觀性沈靜未嘗草書自詠曰保心如止水為行見真書以為著題桂苑雜錄太上隱者人莫知其本末好事者從問其姓名不答留詩一絶云偶來松樹下髙枕石頭眠山中無厯日寒盡不知年古今詩話宋之問貶黜放還至江南遊靈隱寺夜月極明長廊行吟曰鷲嶺鬱岧嶤龍宫隱寂寥未得下聨有老僧燭燈坐禪問曰少年不寐而呤諷甚苦何耶之問曰欲題此寺而思不屬僧曰試吟上聨之問誦之曰何不道樓觀滄海日門對浙江潮之問終篇曰桂子月中落天香雲外飄捫蘿登塔逺刳木取泉遙雲薄霜初下冰輕葉未凋夙齡尚遐異披對滌煩囂待入天台路看余渡石橋僧一聨乃篇中警䇿也遲明訪之已不見寺僧曰此駱賓王也張俞成都人蜀以賢良稱之有詩行於世題武侯廟云高光如有嗣吳魏豈勝誅又題御愛山云可勝亡國恨猶有愛山心題洞庭湖云萬頃碧波看不盡一拳孤岫望中明皆佳劉夢得有獨吟曰巴人淚逐猿聲落蜀客舟從鳥道來姚合道旁亭子詩云南陌逰人回首去東林道者杖藜歸不言亭亦佳王摩詰酷好畫山水其畫山聳谷䆳雲浮水飛意出塵外嘗自題云宿世吟詩客前身應畫師李璟定爲妙品上上同前李益詩名有著征人早行篇好事者畫爲圖障如回鴈峰前沙似雪受降城下月如霜天下歌之胡擢詩善狀花木鳥獸飄然有物外意嘗謂人曰吾思苦於三峽聞猿吟曰甕中每醖逍遙樂筆下閒偷造化工唐南蠻侵軼西川僖宗幸蜀慮爲患以女下降蠻喜其姻聨大國遣宰相趙降眉楊竒鯤叚義宗來朝行在高駢自淮海飛章云南蠻心膂唯此數人請留異待之迄僖宗還京無虞用駢計也楊趙輩各有詞藻途中云風裏浪花吹更白雨中山色洗還青海鷗聚處窗前見林狖啼時枕上聽自唐以來試進士詩號省題時有佳句如梓州進士楊諤天聖八年省試蒲車詩云草木驚皇轍山川護帝輿是歲下第景祐元年省試宣室受釐詩云願前人主席一問洛陽人是歲及第未㡬慶厯二年韓欽試勲門賜㦸詩云凝鋒畫翻轉交鏃采文繁范景仁曽見真本云迎鋒畫翻轉映日采文繁姑兩存之蘇州進士王偃試邇英延講藝詩云白虎前芳掩金華舊事輕天心非不悟埀意在蒼生有古諷諌意是年奏名甚高御前下第二十年始第尋卒滕元發皇佑五年御試吹律聽軍聲詩云萬國休兵外羣生奏凱中又作西旅來王詩云寒日邊聲斷春風塞草長傳聞漢都護歸奉萬年觴極爲場屋所稱楊諤有題驪山云行人問宫殿耕者得珠璣孟蜀王時花蕋夫人能詩而世不傳王平甫於舘中得七言三十餘篇大約似王建詩云厨舩進食簇時新列座無非侍從臣日午殿頭宣索鱠隔花催喚打魚人又月頭分給買花錢滿殿宫娥盡十千遇着唱名多不語含羞急過御牀前並同前楊文公在舘閣時占城進獅子例進詩文公云渡海鯨波息登山豹霧清雜説章獻太后挽辭數百首唯石曼卿一聨首出曰震出坤柔變乾成太極虛太后稱制日久仁宗端拱至是始親萬機曼卿詩切合時宜又不卑長樂也古今詩話嘉祐中劉諷都官簡州人方年六十三致仕夫婦徙居於山謝景山有詩送云移家尚恐青山淺隱几唯知白日長朱公綽詩云諌草焚來應見史槖金散盡只留書潘天錫員外與沈郎中宅相隣同逰古觀分題天錫云風便磬聲逺日斜樓影長沈彬云松欹晩影離壇草鍾憾秋聲入殿風郡閣雅談唐宣宗重陽賜羣臣宴詩曰歀塞旋征騎和戎委廟賢傾心方倚注協力共安邊魏謩應制云四方無事去柛豫杪秋來八月寒光動千山霽色開宣宗嘉之南部新書魏野啄木云千林啄如盡一腹餒何妨有詩人規戒之風閒居云妻喜栽花活童誇鬬草嬴得野人趣非急務故也又云燒葉爐中無宿火讀書窗下有殘燈有嫌燒葉貧寒太甚改葉爲藥不惟壞此一句幷下句亦减氣味所謂求益反損也贈司馬君實云文雖如貎古道不似家貧公監安豐酒税赴官有行色贈云冷於陂水淡於秋逺陌初窮見渡頭猶頼丹青不能畫畫成應遣一生愁非狀難寫之景乎㓂萊公年十九進士及第知巴東縣詩云野水無人渡孤舟盡日横又爲江南春詩云波𣺌渺栁依依孤村芳草逺斜日杏花飛江南春盡離腸斷蘋滿汀洲人未歸膾炙人口古今詩詁李長吉歌云天若有情天亦老以爲竒怪無對石曼卿云月如無恨月長圓九華山人熊􅺐能詩早行云山前猶見月陌上未逢人山居云果熟秋先落禽寒夜未棲閒居云深逢野草皆爲藥静見樵人恐是仙又云厭聽啼鳥夢醒後慵掃落花春盡時雅言雜載李範闗中人善章句爲道傍水云雖當南北路不碍徃來人經王山人舊居云鶴歸秋漢逺人去草堂空秋日江干逺望云清猿啼逺木白鳥下前灘暮秋懷故人云天涯故友無來信窗外拒霜空落花江寺閒書云釣叟無機沙鳥睡禪師入定白牛閒同前丁晉公任朱崖有詩數十篇號知命集有曰草解忘憂憂底事花名含笑笑何人古今詩話陸子履言懷云薄有田園歸去好苦無官况莫來休士君子莫不賞味其意青𤨏集湘南詩僧文喜爲失鶴詩云一向亂雲尋不得㡬番臨水待歸來上潭州劉相大稱許河外僧清晤春日即事云宿鳥歸花影潮魚没浪痕郊外晚行云叠浪支層漢殘陽補斷霞上賈侍中遂褒稱范攄有子七歲能詩夏景云閒雲生不雨病葉落非秋方干曰必不享壽未十歲而終劉昭禹字休明婺州人爲詩刻苦不懼風雨有云句向夜深得心從天外歸言不虚耳並同前廖凝字熈績十歲詠白詩云滿汀鷗不散一局黒全輸作者見之曰必埀名於後郡閣雅談裴説裴諧俱有詩名説官至補闕諧終於桂嶺假官宰自作湘江吟説詩云吟餘潮入浦坐久燒移山諧詩云風回山火斷潮落岸冰高經杜甫墳説云擬掘孤墳破重教大雅生諧曰名終埋不得骨且朽何妨景同而語意俱别吕文穆公未第時嘗逰一縣忘其縣名胡大監旦方隨其父宰是邑遇吕甚薄客有譽曰工於詩宜少加禮胡問其警句客舉一篇卒章云挑盡寒燈夢不成胡笑曰乃一渴睡漢耳吕恨而去明年省中甲科因人寄語胡曰渴睡漢狀元及第胡荅曰待我明年第二人及第輸君一籌既而次榜亦中首選歐公詩話許致殿丞及第後忽心恙爲詩亂題房壁云有漏難成佛無機好學禪又江上對月云江使不來秋練净月娥長在夜珠寒詩話總龜巻十三欽定四庫全書詩話總龜巻十四宋阮閲撰警句門下石曼卿以詩酒豪爽得名嘗獨行京師倏有豪士揖曼卿語已而曰公幸過我家曼卿語諾豪士顧從騎載曼卿同行入委巷前抵大第三四門乃至内堂庭户宏麗施設錦繡侍女珠翠延飲求曼卿書字曼卿寫巳書其詩籌筆驛等數篇豪士甚珍愛之贈曼卿金帛可直數十百千使從騎送歸初不知其誰何後日尋迷不省所居閭里人不能知他日復遇之塗又以金數十兩贈曼卿云籌筆驛詩意中流水逺愁外舊山青最佳歐陽詹乾徳中獻野史受黄崗宰有詩行於世聞猿云啼猿非有恨行客自多悲聞笛云不知吹者意何似聽人心卧屛云横琴遮逺洞舉手出高峰公宇蘆云漁家合得兩三莖公退徐吟思倍清官滿不將歸舊隱蕭蕭留與後人聽雅言雜載繆島雲少從浮屠詩尚竒險如抛芥子降顛佛佛折楊枝灑醉猩猩敻出前輩摭言湖南日試萬言王璘與李羣玉校書相遇於岳麓寺群玉揖之曰公何許人日試萬言不荅羣玉曰與公聨句可乎璘曰惟子之命羣玉破題授之曰芍藥花開菩薩靣璘繼之曰㯶櫚葉散夜义頭東坡云兒子邁幼嘗作林檎詩云熟果無風時自脱半窗迎日鬬先紅於等輩中亦號有思致者今已老無他技但時出新句作酸棗尉有詩云葉隨流水歸何處牛載寒鵶過别村百斛明珠眉山矮道士李伯祥好爲詩格亦不能高往往有竒語如夜過脩竹寺醉打老僧門皆可愛予幼時學於道士張易簡觀中伯祥與易簡往來嘗歎曰此郎君貴人也不知何以知之同前狄煥南岳石樓曉望云數㸃當秋霽不知何處峰題岳路松云一嶂雨聲歸洞壑兩條翠色下瀟湘雅言系述曽弼長沙人依逸人王元爲詩友宿玉泉寺云山偷半庭月池印一天星君山云翠壓魚龍窟寒堆波浪心蔣鈞字不器營道人與劉洞陳甫爲詩友寄栁宣云因借夢書過竹寺學耕秋粟繞茆原戎昱詩有一夜不眠孤客耳主人門外有芭蕉鈞代答云芭蕉葉上無愁雨自是多情聽斷腸史虛白嵩洛人廖凝寄之詩曰飯僧春嶺蕨醒酒雪潭魚終於湓浦林楚才賀州富川人贈致仕黄損詩云身閒不恨辭官早詩好常甘得句遲陳甫字惟岳吉水人贈黄岩云清時不作登龍客緑􅁂閒梳傍草堂漳江感懷云一雨洗殘暑萬家生早凉村居云暮鳥歸巢急寒牛下隴遲詩云筭吟千百首方得兩三聨僧祖可蘇伯固之子懐蘭江云懐人更作夢千里歸思欲迷雲一灘贈端師云窻間一榻篆煙碧門外四山秋蕊紅張子野有隔墻送過鞦韆影雲破月來花弄影浮萍開處見山影宋景文一日訪之通曰來訪三影郎中子野喜曰是紅杏枝頭春意鬧尚書耶周朴賦董嶺水一聯云禹力不到處河聲流向西一士跨蹇過其前故吟曰禹力不到處河聲流向東亟鞭而去朴追數里及之曰此僕句作西乃佳耳東坡至西太一見荆公詩栁葉鳴蜩緑暗荷花落日紅酣三十六陂春水白頭相見江南二十年前此地父兄持我東西今日重來白首欲尋舊迹都迷注目久之曰此老野狐精也永叔云吾嘗愛常建曲徑通幽處禪房花木深欲效其語作一聯久不可得始知造意者為難工也來青州得一山齋不意平生想見而不能道以言者乃為已有於是益希其髣髴竟爾莫獲一言皮日休孟亭記云北齊美蕭慤芙蓉露下落楊栁月中踈
