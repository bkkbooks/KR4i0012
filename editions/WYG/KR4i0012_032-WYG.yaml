front:
  text: 三十二宋阮閲撰
  hash: sha256:596938035c3bbcf1f7c58d414a467ef8d243137baf0317de568c2ae0108fccfa
body:
  text: 樂府門翰林學士聶冠卿嘗於李良定公席上賦多䴡詞云想人生羙景良晨堪惜向其間賞心樂事就中難是并得况東城鳳臺沁苑泛晴波淺照金碧露洗華桐烟霏絲柳綠隂揺曵蕩春一色畵堂逈玉簮瓊佩高㑹盡詞客清歡乆重燃絳蠟别就瑶席有翻岩驚鴻體態暮為行雨標格逞珠喉緩歌妖䴡似聴流鶯亂花隔慢舞縈迴嬌鬟低嚲腰支纎細困無力忍分散彩雲歸後何處更㝷覔休辭醉明月好花莫謾輕擲蔡君謨時知泉州寄良定公書云新傳多䴡辭述宴遊之娯使病夫舉首増歎耳又近者有客至自京師言諸公春日多㑹子元伯園池因念昔遊輙形篇詠綠渠春水走潺湲畵閣峯巒映雪鮮酒令巳行金盞側樂聲初認翠裙員清遊勝事傳都下多䴡新詞到海邉曽是尊前沉醉客天涯回首重依然苕溪漁隐曰冠卿詞有露洗華桐烟霏絲柳之句此正是中春天氣下句乃云綠隂揺曵蕩春一色其時未有綠隂真語病也復齋漫錄吾昔以杭移高密與楊元素同舟而陳令舉張子野皆從余過李公擇於湖遂與劉孝叔俱至松江夜半月出置酒垂虹亭上子野時年八十五以歌詞聞於天下作定風波令其畧云見説賢人聚呉分試問也應旁有老人星坐客歡甚有醉倒者此樂未嘗忘也今七年耳子野孝叔令舉皆為異物而松江橋亭今嵗七月九日海風駕潮平地丈餘蕩盡無餘孑遺矣追思曩時真一夢耳苕溪漁隐曰呉興郡圃今有六客亭即公擇子瞻元素子野令舉孝叔時公擇守呉興也東坡又云余昔與張子野劉孝叔李公擇陳令舉楊元素㑹于呉興時子野作六客詞其卒章盡道賢人聚呉分試問也應旁有老人星凡十五年再過呉興而五人者皆巳亡矣時張仲謀與曹子方劉景文蘇伯固張秉道為坐客仲謀請作後六客詞云月滿苕溪照夜堂五星一老鬭光芒十五年間真夢裏何事長庚對月獨凄凉綠髪蒼顔同一醉還是六人吟笑水雲鄉賔主談鋒誰得似看取曹劉今對兩蘇張東坡柳三變字景荘一名永字耆卿喜作小詞然薄於操行當時有薦其才者上曰得非填詞柳三變乎曰然上曰且去填詞由是不得志日與儇子縱遊倡舘酒樓間無復檢率自稱云奉聖㫖填詞柳三變於乎小有才而無徳以將之亦士君子之所宜戒也柳之樂章人多稱之然大槩非覊旅窮愁之辭則閨門媱媟之語若以歐永叔晏叔原蘇子瞻黄魯直張子野秦少游軰較之萬萬相遼彼其所以傳名者直以言多近俗俗子易悦故也皇祐中老人星現永應制撰詞意望後恩無何始用漸字終篇有太液波翻之語其間宸遊鳳輦何處與仁廟挽詞暗合遂忤㫖士大夫惜之余謂柳作此詞借使不忤亦無佳處如嫩菊黄深拒霜紅淺竹籬茅舎何處無此景物方之李謫仙夏英公等應制詞殆不啻天冠地履也世傳永嘗作輪䑓子早行詞頗自以為得意其後張子野見之云既言忽怱䇿馬登途滿目淡烟衰艸則巳辯色矣而後又言楚天闊望中未曉何也抑何語意顛倒如是藝苑先君嘗云古詞絳都春有鼇山綵字犯太上皇御名蓬萊島之句當云綵締余前集悞以古詞為抑詞今正是之苕溪漁隐先君頃嘗丐祠居射村作感皇恩一詞云乞得夢中身歸棲雲水始覺精神自家底峭帆輕掉時與白鷗游戯畏途都不管風波起光景如梭人生浮華百嵗何妨盡沉醉卧龍多事謾説三分竒計算來争似我長昏睡又嘗江行阻風作漁家傲一詞云幾日北風江海立千車萬馬鏖聲急短掉峭寒欺酒力飛雨息瓊花細細穿窻隙我本綠蓑青箬笠浮家泛宅烟波逸渚鷺沙鷗都舊識行未得高歌與爾相㝷覔苕溪漁隐顔氏家訓云别易㑹難古人所重江南餞送下泣言離北間風俗不屑此事岐路言離歡笑分首李後主盖用此語耳故長短句云别時容易見時難復齋漫錄舊詞高雅非近世所及如撲蝴蝶一詞不知誰作非惟藻䴡可喜其腔調亦自婉羙馮延巳著樂章百餘闋其鶴冲天詞云曉月墜雲披銀燭錦屏幃建章鍾動玉䋲低宫漏出花遲又歸國謡詞云江水碧江上何人吹玉笛扁舟逺送瀟湘客蘆花千里霜月白傷行色明朝便是闗山隔見稱於世元宗樂府詞云小樓吹徹玉笙寒延巳有風乍起吹皺一池春水之句皆為警策元宗嘗戯延巳吹皺一池春水干卿何事延已曰未如陛下小樓吹徹玉笙寒元宗悦苕溪漁隐曰古今詩話云江南成文幼為大理卿詞曲妙絶嘗作謁金門云風乍起吹皱一池春水中主聞之因案獄稽滯召詰之且謂曰卿職在典刑一池春水又何干於卿文幼頓首又本事曲云南唐李國主嘗責其臣曰吹皺一池春水干卿何事盖趙公所撰謁金門辭有此一句最為警䇿其臣即對曰未如陛下小樓吹徹玉笙寒若本事曲所記但云趙公初無其名所傳必悞惟南唐書古今詩話二説不同未詳孰是南唐書李感化善謳歌聲韵悠揚清振林木繫樂部為歌板色元宗嘗作浣溪沙二闋手寫賜感化曰菡萏香消翠葉殘西風愁起碧波間還與容光共憔悴不堪看細雨夣回雞塞逺小樓吹徹玉笙寒蓛蓛泪珠多少恨倚闌干手捲真珠上玉鈎依前春恨鎻重樓風裡落花誰是主思悠悠青鳥不傳雲外信丁香空結雨中愁迴首綠波三峽暮接天流後主即位感化以其詞禮上之後主感動賞賜感化甚優苕溪漁隐曰元宗即嗣主李璟嘗作此二詞古今詞話乃以為後主作非也後主名煜南唐書東坡大江東云赤壁詞語意高妙真古今絶唱近時有人和此詞題於郵亭壁間不著其名語雖粗豪亦氣槩可取今謾筆之詞曰炎精中否歎人材委靡都無英物戎馬長驅三犯闕誰作連城堅壁楚漢呑并曹劉割據白骨今如雪書生鑚破簡編說甚英傑天意眷我中興吾君神武小曽孫周發海岳封疆俱效職狂虜何勞追滅翠羽南巡叩閽無路徒有冲冠髪孤忠耿耿劍鋒冷浸秋月苕溪漁隐孫艤字濟師嘗作落梅詞甚佳一聲𦍑管吹嗚咽玉溪半夜梅飜雪江月正茫茫斷橋流水香含章春欲暮落日千山雨一㸃着枝酸呉姬先齒寒苕溪漁隐汪彦章舟行汴中見岸旁畫舫有映簾而觀者甚見其額有詞云小舟簾隙佳人半露梅粧額綠雲低映花如刻恰似秋霄一半銀蟾白結児稍朶香紅扐鈿蟬隐隐揺金碧春山秋月渾無迹不露墻頭些子真消息寄醉落􅅎苕溪漁隠詞句欲全篇皆好極為難得如賀方回淡黃楊栁帶棲鴉秦處度藕葉清香勝花氣二句寫景詠物可謂造微入妙若其全篇皆不逮此矣徐幹臣雁足不來馬蹄難駐門掩一庭芳景駐字當作去字語意乃佳周美成水亭小浮萍破處簷花簾影顛倒按杜少陵詩燈前細雨簷花落美成用此簷花二字全與出處意不相合乃知用字之難矣趙徳麟重門不鎖相思夢隨意遶天涯徐師川栁外重重疊疊山遮不斷愁來路二詞造語雖不同其意絶相類古詞水竹舊院落櫻荀新蔬果一本是水竹舊院落鶯引新雛過不然櫻筍新蔬果則與上句有何干涉董武子疇昔尋芳秘殿西日厭金鋪宫栁垂垂然秘殿豈是尋之處非所當言也侯元功䝉宻州人自少游塲屋年三十有一始得鄉貢人以其年長進士不之敬有輕薄子畫其形於紙鳶上引線放之䝉見而大笑作臨江仙詞題其上曰未遇行藏誰肯信如今方表名踪無端良匠畫形容當風輕借力一舉入髙空才得吹嘘身漸穏只疑逺赴蟾宫雨餘時候夕陽紅幾人平地上看我碧霄中䝉一舉即登第年五十餘遂為執政夷堅志曾端伯慥編樂府雅詞以秋月詞念奴嬌為徐師川作梅詞㸃絳脣為洪覺範作皆悞也秋月詞乃李漢老梅詞乃孫和仲冲冲即正言諤之子也又世傳江城子青玉案二詞皆東坡所作然西清詩話謂江城子乃葉少藴作桐江詩話謂青玉案乃姚進道作四詞皆佳今併録之念奴嬌詞云素光練浮映秋山隠隠修眉橫緑鳷鵲樓髙天似水碧瓦寒生銀粟千丈斜暉奔雲湧露飛過盧仝屋更無塵氣滿庭風碎梧竹誰念鶴髮仙翁當年曾共賞紫巖飛瀑對飲三人聊痛飲一洗離愁千斛斗轉參橫翩然歸去萬里騎黃鶴滿天霜曉叫雲吹斷横玉㸃絳脣詞云流水冷冷斷橋斜路梅花亞雪初下全似江南畫白璧青錢難買春無價歸來也風吹平野一㸃香隨馬江城子云銀濤無際巻蓬嬴落霞明暮雲平曾見青鸞紫鳳下層城二十五弦彈不盡空感慨有餘情蒼梧煙水斷歸程捲霓旌為誰迎空有千行流泪寄幽貞舞罷魚雲海晚千古恨入江聲青玉案詞云三年枕上吳中路遣黃耳隨君去若到松江呼小渡莫驚鷗鷺四橋盡是老子經行處􅜁川圖上看春暮長記髙人右丞句作箇歸期天已許春衫猶是小蠻針線曾濕西湖雨漢老念奴嬌詞中有滿天霜曉叫雲吹斷橫玉之句乃用崔魯華清宫詩銀河漾漾月輝暉樓碍天邊織女機横玉叫雲清似水滿空霜逐一聲飛或云叫雲乃􅅇名非也又端伯所編樂府雅詞中有漢宫春梅詞云是李漢老作非也乃晁冲之叔用作政和間作此詞獻蔡攸是時朝廷方典大晟府蔡攸攜此詞呈其父云今日於樂府中得一人京覽其詞喜之即除大晟府丞今載其詞曰瀟灑江海白竹梢稀處横兩三枝東君也不愛惜雪壓風欺無情燕子怕春寒輕失佳期惟是有南來歸雁年年長見開時清淺小溪如練問玉堂何似茅舍疎籬傷心故人去後冷落新詩微雲淡月對孤芳分付他誰空自倚清香未減風流不在人知此詞中用玉堂事乃唐人詩云白玉堂前一樹梅今朝忽見數枝開兒家門戸重重閉春色因何得入來或云玉堂乃翰苑之玉堂非也苕溪漁隐元豐間都人李嬰調蘄水縣令作滿江紅一曲往黄州上東坡東坡甚喜之其詞云荆楚風烟寂寞近中秋時候露下冷蘭英將謝葦花初秀歸燕殷勤辭巷陌鳴蛩凄楚來窻牗又誰念江邉有神仙飄零乆横琹膝携笻平矌望眼閑吟口低紛紛萬事到頭何有君不見凌烟冠劍客何人氣貎長依舊歸去來一曲為君吟為君夀苕溪漁隐古樂府詩云今世褦襶子觸熱到人家褦襶集韻觧之云不曉事余素畏熱乃知人觸熱來人家其謂不曉事宜矣嘗愛王逐客作夏詞送將歸不用浮爪沉李等事而天然有塵外凉思其詞云百尺清泉聲陸續映瀟洒碧梧翠竹靣千步回廊重重簾幕小枕欹寒玉試展鮫綃看畫軸見一片瀟湘凝綠待玉漏穿花銀河垂地月上欄杆曲此語非觸熱者之所知也苕溪漁隐曰余嘗愛李太白夏日山中詩脱巾掛石壁露頂洒松風其清凉可想也漫叟詩話賈耘老舊有水閣在苕溪之上景物清曠東坡作守時屢過之題詩畫竹於壁間沈㑹宗又為賦小詞云景物因人成勝槩滿目更無塵可碍等閑簾幕小欄干衣未觧心先快明月清風如有待誰信門前車馬隘别是人間閑世界坐中無物不清凉山一帶水一𣲖流水白雲長自在其後水閣屢易主今巳摧毁乆矣遺址正與余水閣相近同在一岸景物悉如㑹宗之詞故余嘗有鄙句云三間小閣賈耘老一首佳詞沈㑹宗無限當時好風月如今總屬績溪翁盖謂此也苕溪漁隐晏叔原工小詞如舞低楊柳樓心月歌盡桃花扇底風不愧六朝宫掖至荆公小詞云揉藍一水縈花艸寂寞小橋千嶂抱人不到柴門自有清風掃畧無塵土思山谷小詞云春未透花枝瘦正是愁時候極為學者所稱賞咏秦湛處度嘗有小詞云春透水波明寒峭花枝瘦盖法山谷也雪浪齋日記孫洙字巨源元豐間為翰苑名重一時李端愿太尉世戚里折節交搢紳間而孫往來尤數㑹一日鎻院宣召者至其家則巳出數十軰踪迹之得於李氏時李新納妾能琵琶孫飲不肯去而迫於宣命李不敢留遂入院幾二鼓矣艸三制罷復作長短句寄恨恨之意遲明遣示李其詞曰樓頭尚有三通鼔何須抵死催人去上馬苦匆匆琵琶曲未終回頭凝望處那更簾纎雨漫道玉為堂玉堂今夜長夷堅志武才人出慶夀宫色最後庭裕陵得之㑹教坊獻新聲為作詞號瑶臺苐一層后山詩話柳三變遊東都南北二巷作新樂府骫天下諷詠遂傳禁中仁宗頗好其詞毎對酒必使侍妓歌之再三三變聞之作宫詞號醉蓬萊因内官逹後宫且求其助仁宗聞而覺之自是不復歌其詞矣㑹改京官乃以無行黜之後改名永仕至屯田員外郎苕溪漁隐曰先君嘗云柳詞鼇山綵字犯太上皇御名蓬萊島當云綵締坡詞低綺戸當云窺綺户二字既改其詞益佳后山詩話荆公問山谷云作小詞曽看李後主詞否云曽看荆公云何處最好山谷以一江春水向東流為對荆公云未若細雨夢回雞塞逺小樓吹徹玉笙寒又細雨濕流光最妙雪浪齋日記南唐李後主歸朝後毎懐江國且念嬪妾散落欝欝不自聊嘗作長短句云簾外雨潺潺春意䦨珊羅衾不煖五更寒夢裏不知身是客一餉貪歡獨自莫凭欄無限闗山别時容易見時難流水落花何處也天上人間含思悽惋未幾下世西清詩話李後主詞云二十餘年家國數千里地山河幾曽慣干戈一旦歸為臣虜沈腰潘鬂消磨最是愴惶辭廟日教坊猶奏别離歌揮泪對宫娥後主既為樊若水所賣舉國與人故當慟哭於九廟之外謝其民而後行顧乃揮泪宫娥聴教坊離曲哉東坡南唐後主圍城中作長短句未就而城破櫻桃落盡春歸去蝶飜金粉雙飛子規啼月小樓西曲䦨珠箔惆悵捲銀泥門巷寂寥人去後望殘烟草低迷余嘗見殘藁㸃染晦昧心方危窘不在書耳藝祖云李煜若以作詩工夫治國事豈為吾虜也苕溪漁隐曰余觀太祖實錄及二朝正史云開寶七年十月詔曹彬潘羙等率師伐江南八年十一月㧞昇州今後主詞乃詠春景非十一月城破時作西清詩話云後主作長短句未就而城破其言非也然王師圍金陵凡一年後主於圍城中春間作此詞則不可知是時其心豈不危窘於此言之乃可也西清詩話前人評杜詩云紅豆啄殘鸚鵡粒碧梧棲老鳳凰枝若云鸚鵡啄殘紅豆粒鳳凰棲老碧梧枝便不是好句余謂詞曲亦然李景有曲手捲真珠上玉鈎或改為珠簾舒信道有曲云十年馬上春如夢或改云如春夢非所謂遇知音漫叟詩話呉越後王來朝太祖為置宴出内妓彈琵琶王獻詞曰金鳯欲飛遭掣搦情脉脉看闕玉樓雲雨隔祖起拊其背曰誓不殺錢王后山詩話詩話總龜後集巻三十二欽定四庫全書詩話總龜後集巻
