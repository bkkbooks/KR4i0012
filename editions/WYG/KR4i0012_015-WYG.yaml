body:
  text: 留題門上吕申公累乞致仕仁宗不允他日復叩便坐度其不可留因詢曰卿去誰可代者申公曰知臣莫如主陛下自擇堅問之乃引陳文惠曰陛下必欲得英俊經綸之臣則臣所不知若圖任老臣鎮安百度周知天下事無如陳堯佐仁宗然之文惠遂大拜極懷薦引之徳因作燕詞攜酒過之申公使之歌焉詞云二社良辰千家庭院翩翩又見新歸燕鳯凰巢穩許爲鄰瀟湘烟瞑來何晩亂入紅樓低飛緑岸畫梁時拂歌塵散爲誰歸去爲誰來主人恩重朱簾捲申公笑曰自恨捲簾人已老文惠曰莫愁調鼎事無功老於廊廟而醖籍不减昔任浙曹有吳江詩曰平波渺渺煙蒼蒼菰蒲纔熟楊栁黄扁舟繫岸不忍去秋風斜日鱸魚鄉又碧瀾堂詩云苕溪清淺霅溪斜碧玉寒光照萬家誰與月明終夜聽洞庭漁笛隔蘆花古今詩話徐州漢興歌風臺詩雖多張安道詩最絶云落魄劉郎作帝歸樽前一曲大風詞才如信越猶葅醢安用思他猛士爲青箱雜記臨潼朝元閣詩雖多唯陳文惠二韻首出曰高閣高何迥秋毫無隱情浮雲忽一蔽不見洛陽城張退傳宰邵武時多逰僧舍至則吟詠忘歸題西庵寺曰西庵深入西山裡筭得當年少客逰宻宻石叢蟠小徑涓涓雲竇瀉寒流松皆有節埀青葢僧盡無心也白頭欲刷粉碑書好字調卑官冗不堪留題寶葢巖寺云身爲冠冕流心是雲泉客每到雲泉中便擬忘歸迹况此寶葢巖天造清凉宅税車官道邊誰知願言適過建寧縣洛陽村曰金谷花時醉㡬場舊逰無日不思量誰知萬水千山裡枉被人言過洛陽並同前張伯玉過姑熟見太白十詠不及明月泉因題一絶曰至今千古松猶伴數峰雪不見纎塵飛寒泉湛明月陳文惠至古寺作詩曰殿古寒爐空流塵暗金碧獨坐偶無人又得真消息春明退朝録顔謝魯公之後所居有泉石松竹創亭延客孟賔于留題詩曰園林瀟灑聞來久欲往因循二十秋今日開襟吟不盡碧山重叠水長流江南野録陳頴南昌人業進士題漢祖廟曰項羽英雄猶不懼可憐容得辟陽侯得狂病而卒同前長安慈恩寺浮屠前後題詩多矣唐文宗朝元微之白樂天到塔下見章八元所留詩悉令除去諸家牌惟留章詩詩云十層突兀在虛空四十門開靣靣同却怪鳥飛平地上自驚人語半天中回梯暗踏如穿洞絶頂初攀似出籠落日鳯城佳氣合滿城香樹雨濛濛鑑戒録雍陶典雅州送客至情盡橋改爲折桞橋題詩曰從來只有情難盡何事名爲情盡橋自此改名爲折栁從他離恨一條條施肩吾題友人閒居詩曰花眼綻紅斟酒看藥心抽緑帶煙鋤夫差廟拆姑蘇臺朩創成陳羽題詩曰姑蘇臺畔千年木刻作夫差廟裡神幡葢寂寥塵土滿不知簫皷樂何人並同前陳羽姑蘇臺詩云憶昔吳王争覇日歌謡滿路上蘇臺三千宫女看花處人盡臺空花自開賀程詠君山詩曰曽逰方外見麻姑説道君山此本無云是崐崘山頂石海風吹落洞庭湖鑑戒録劉象詠仙掌詩曰萬古亭亭倚碧霄不成擎亦不成招何如掬取蓮池水洒向人間救旱苗同前砌臺即今擦擦臺也王侯家作以爲臨觀之戲唐張素詩云寫望臨香閣登高下砌臺林間踏青去席上意錢來即知唐來有之太祖朝大王都尉家其子承裕㓜時其父戲補砌臺使談苑楊文公罷䖍州過饒州餘干縣登干越亭前瞰琵琶洲後枕思禪寺天下絶境古今留題百餘篇張祐詩云扁舟亭下駐煙波十五年游重此過洲觜露沙人渡淺樹梢藏竹鳥啼多層瀾漲水痕猶在古板題詩字已訛况是高秋正圓月可堪聞唱異鄉歌劉長卿云天南愁望絶亭下栁條新落日獨歸鳥孤舟何處人生涯投越嶠世業陷胡塵草色迷征路鶯啼傍逐臣秦臺悲白首楚渚怨青蘋杳杳鍾陵暮悠悠鄱水春獨醒翻取笑直道不容身得罪風霜苦全生天地仁青山數行淚滄海一窮鱗流落機心盡空憐鷗鳥親談苑江遵詠史云秦築長城比鐵牢蕃戎不敢過臨洮雖然萬里連雲際不及堯堦三尺高何光逺稱此詩卓絶千百集中無以加詩史桂州左右山皆平地㧞起數千百丈石如染黛陽朔縣尤佳沈彬有詩云陶潛彭澤五株栁潘岳河陽一縣花兩處争如陽朔好碧蓮峰裏住人家觀此山水可知同前淮陰廟題者甚多惟錢諌議昆詩最佳築壇拜日恩雖厚躡足封時慮已深隆凖早知似烏喙將軍應有五湖心青箱雜記歙州問政山聶道士所居嘗有人陟險攀蘿至絶壁於巖下嵌空處見題詩一首雖苔蘚昏蝕而文尚可辯題云黄台詞不知台何人也千尋練帶新安水萬仭花屛問政山自少雲霞居物外不多塵土到人間壺懸仙島吞舟罷椀浸星宫咒水閒寶籙篋埀金綬帶絳嚢絛鎻玉連環静張棋勢鋪還打嘿考仙經補又刪牀並葛鞋寒兎伏窗横樗几老龍跧溪童乞火朝敲竹山鬼聽琴夜撼􅗚草暗碧潭思句曲松昏紫氣度涵闗龜成淺甲毛猶緑鶴化幽翎頂更殷阮洞神仙分藥去蔡家兄弟寄書還黄精苗倒眠青鹿紅杏枝低掛白鷴容易煑茶供客用辛勤栽果與猿攀常尋靈穴通三島擬過流沙化百蠻新隱漸開侵月窟舊林猶悦枕沙灣手疏俗禮慵非傲肘護靈方臂不慳海上使頻青鳥黠篋中藏久白驢頑笻枝健杖菖蒲節笋幘高簮玳瑁斑花氣薫心香馥馥澗聲聆耳冷潺潺高墳自掩浮生骨短晷難窮不死顔早晚重逢蕭塢客願隨芝葢出塵寰台國初時任屯田員外郎世有全篇荆門軍玉泉山寒泉亭題者甚多有一篇最佳而忘其姓名詩云朔風凛凛雪漫漫未是寒時分外寒六月火雲天不雨請君來此倚䦨干雲齋廣録張宗尹爲長安令時鄭州陳相尹京兆宗尹嘗以事忤公意公有别業在鄠杜間宗尹書一絶於壁云喬松翠竹絶纎埃門對南山盡日開應是主人貪報國功成名遂不歸來有人録以告公覧而善之待之如初宗尹嘗有詩云大書文字隄防老剩買田園准備閒倦㳺錄臨潼縣靈泉觀唐清華宫也自唐迄今題詠不可紀小杜五言長韻幷三絶泊鄭愚津陽門詩外唯陳文惠張文定及進士楊正偷詩最佳文定詩云當時不是不窮奢民樂昇平少嘆嗟姚宋未亡妃子在塵埃那得到中華文惠詩云百首新詩百意精不尤妃子只尤兵争如一句傷時事只爲明皇恃太平正倫詩曰休罪明皇與貴妃大都衰盛兩相隨惟憐一𣲖温泉水不逐人心冷暖移又鄭文寶詩云只見開元無事久不知貞觀用功深皆爲知音所賞鄜州東百里有水名相思河傳舍曰相思舖令狐楚詩曰誰把相思號此河塞垣車馬徃來多只應自古征人淚灑向空洲作碧波並同前韓魏公自中書出相州於居第作狎鷗亭永叔以詩寄曰豈止忘機鷗鳥信鈞陶萬物本無心魏公喜曰余在中書進退升黜未嘗置心於其間永叔可謂知我古今詩話吕文靖詩曰賀家池上天花寺一一軒窗向水開不用閉門防俗客愛閒能有㡬人來賀家池即賀監所賜之湖詩後爲風雨所損惜乎寺僧不留雜誌唐人徐凝多吟絶句曽吟廬山瀑布詩云瀑泉瀑泉千丈直雷奔入江無暫息今古長如白練飛一條界破青山色題處州縉雲山鼎湖詩云黄帝旌旗去不回空遺片石碧崔嵬有時風捲鼎湖浪散作青天雨㸃來後無題者郡閣雅談權審常侍著詩千首常題山院曰萬葉風聲利一山秋氣寒曉霜浮碧瓦落日度朱欄貢父詩話江南道士任右元能篆見人題常州忠烈王廟詩一絶云松竹蕭蕭野笛悲寂寥冰雪對旌旗前山月夜陰風起神去神來人不知時人不㑹其意尋毁其碑元厚之篆於石后愈無識者因此漫滅郡閣雅談鄧仙客死𦵏麻姑山人謂尸解逰人題詩多矣有一少年一絶不言姓名但云夭嶠逰人詩曰鶴老芝田雞在籠上清那與世塵同既言白日昇天去何事人間有殯宫鄧名稍减雲溪友議三鄉題不知誰氏題云余本家若耶溪東從良人西入凾闗寓居新昌里第不幸良人已矣邈然無依東邁厯渭川渉滻水背終南渉太華經虢略抵陜郊皆曩昔讌逰之地命筆輙題終不能滌其懷抱翰墨非女子事故隱其名而不書爲詩曰昔逐良人西入闗良人身没妾空還謝娘衛女不相待爲雨爲雲過此山和詩十一首陸正洞云惆悵殘花怨暮春孤鸞舞鑑倍傷神清詞好箇干人事疑是文姫第二身王祝云女几山前嵐氣低佳人留恨此中題不知雲雨歸何處空使王孫見即迷劉谷曰蘭蕙芬芳見玉姿路傍花笑景遲遲苧蘿山下無窮意併在三鄉惜别時王條云浣沙逰女出闗東舊跡新詞一夢中槐陌柳亭何限事年年回首向東風李昌鄴云紅粉蕭娘手自題分明幽怨發雲閨不應更學文君去泣向殘花歸剡溪王顧云無姓無名越水濵芳詞空怨路旁人莫教才子偏惆悵宋玉東家是舊鄰李繪云㑹稽王謝兩風流王子沉淪謝女逰歸思若隨文字在路傍空爲感千秋張碕云洛川依舊好風光蓮帳無因見女郎雲雨散來音信斷此生遺恨寄三鄉高衢云南北千山與萬山軒車誰不念鄉闗獨留芳翰悲前迹陌上恐傷桃李顔章冰云來時歡笑去時哀家國迢迢向越臺待寫百年幽思盡故宫流水莫相催賈馳五言云壁古字未滅聲長響不絶蕙質本如雲松心應奈雪耿耿離幽谷悠悠望甌越杞婦哭夫時城摧無此説雲溪友議吳門女郎真娘死𦵏虎邱山時人比之蘇小小行客題墓多矣舉子譚銖題云虎邱山下塜纍纍松栢蕭條盡可悲何事世人唯重色真娘墓上獨留詩鄭仁表經滄浪峽憇於長亭亭吏持牌乞詩題曰分峽東西路正長行人名利火然湯路傍看箇滄浪峽真是將閒攪攪忙摭言蜀道有飛泉亭留詩甚多薛能佐李公過蜀道題云賈掾曽經去題詩豈易哉悉打去詩板獨留李端巫山高一篇同前元祐五年同景文羲伯聖徒次元題竹上云結根豈殊衆脩柯獨出林孤高不可恃歲晚風霜侵百斛明珠余初謫嶺南過田氏小園東門一峰豐下鋭上俚人謂之鷄籠山余更名曰獨秀峰今過之留詩云倚天巉絶玉浮圖肯與彭郎作小姑獨秀江南知有意要三山别四方壺玉局文慈恩寺塔有唐人盧宗回一詩云東來曉日上翔鸞西轉蒼龍拂露盤渭水冷光搖蕩井玉峰晴氣壓䦨干古今詩話江州琵琶亭題者惟夏鄭公梅公儀詩佳夏詩曰年光過眼如車轂職事覊人似馬㗸若遇琵琶應大笑何煩涕淚滿青衫梅詩云陶令歸來爲逸賦樂天責宦起悲歌有絃應被無絃笑何况臨絃泣最多又葉氏女郎詩云樂天當日最多情淚滴青衫酒重傾明月滿船無處問更聞啇婦琵琶聲古今詩話河中鸛鵲樓唐人詩極多唯王之渙李益暢當詩最佳王云白日依山盡黄河入海流欲窮千里目更上一層樓李云鸛鵲樓前百尺墻煙汀雲樹共茫茫漢家簫皷沉流水魏國山河半夕陽事去千年猶恨短愁來一日即知長風煙併在相思處滿目非春亦自傷暢詩云天勢圍平野河流入斷山同前李建中恬退作詩清淡望湖樓詩云小艇閒撑處湖天景亦微春波無限緑白鳥自由飛落日孤鴻逺輕煙古寺稀時攜一壺酒戀到晩凉歸西湖詩云漲煙春氣重貯月夜痕深皆此類古今詩話青箱雜記謂望湖樓詩是蘓爲湖州作潘邠老有登漢陽江樓詩云兩屐上層樓一目略千里説者以爲着屐豈可登樓直方詩話陸蟾寓居潭州攸縣司空山好神仙事多辟榖累月題廬山瀑布云正源人莫測千尺掛雲端岳色染不得神功裁亦難夏噴猿鳥浴秋射斗牛寒流到滄溟日翻濤更好看又春暮經石頭城云六朝多少事搘肘思悠悠落日空江上子規啼渡頭蒹葭侵壞壘煙霧接滄洲今古分明在那堪向九秋雍熈中服藥卒雅言雜載李宏皋唐末八座善夷之子善夷左遷武陵宰卒於官宏皋舁櫬歸故園途中值兵革爲馬氏擁入湖湘文昭王有功授學士至刑部侍郎每牋奏至京辭臣降歎李崧相國器之後馬氏兄弟結隙與弟宏節俱棄市少攻詩題桃源云山翠參差水渺茫秦人昔在楚封疆當時避世乾坤窄此地安家日月長草色㡬經壇杏老巖花猶帶澗桃香他年倘遂平生志來着霞衣侍玉皇任鵠字射已富有學問題君山云不碍揚㠶路盤根壓洞庭煙中四靣白雲外一堆青魚躍晴波動龍歸石洞腥纔期託名畫爲我簇爲屛送王正已歸山云五峰青拄天直下掛飛泉琴鶴同歸去煙霞到處眠鼯跳霜葉徑虎嘯夕陽川獨酌應懷我排空樹影連並同前韓常侍爲郎吏日宣宗問曰卿有好詩如何得見韓稽首曰容至私第録進乃選八十首進後以眼疾辭拜珥貂爲御史䘖命出闗讞獄道中看華山有詩曰野麋䝉象暫如犀心不驚鷗角駭雞一路好山無伴看斷腸煙景寄猿啼御史出使不得與人同行故云無伴時補衮謝病歸山更寄織錦篇與薛郎中云錦字龍梭織錦篇鳯凰文采間非煙並他時世新花様虛費工夫不直錢和人憶鶴云拂拂雲衣冠紫煙已爲丁令一千年留君且伴居山客幸有松梢明月天又和憶山泉云情多不似家山水夜夜聲聲旁枕流古今詩話少游在黄州飲於海橋橋南北多海棠有老書生家海棠叢間少㳺醉卧宿於此明日題其柱曰喚起一聲人悄衾枕夢寒窗曉瘴雨過海棠晴春色又添多少杜甕醸成微笑半破共癭瓢共舀覺健到急投牀醉鄉廣大人間小東坡愛之恨不得其腔冷齋夜話詩話總龜巻十五欽定四庫全書詩話總龜巻十六宋阮閲撰
