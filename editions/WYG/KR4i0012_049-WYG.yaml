front:
  text: 四十九
  hash: sha256:cd5af0a0a38988ab10151702cab5918147f2b6cc983275cfb11722c346b30e3c
body:
  text: 宋阮閲撰飲食門唐御食紅綾餅餤為上光化中放進士裴格盧延遜等二十八人燕於曲江勅大官賜餅餤止二十八枚而已延遜後入蜀頗為蜀人所易嘗有詩云莫欺零落殘牙齒曾吃紅綾餅餤來其當世所貴重如此酉陽雜爼載人衣冠家有蕭家餫飩庾家粽子韓約櫻桃饆饠又有胡突鱠麞皮索餅之類號為名食不至於甚侈而羙有餘亦紅綾餅餤之類也晉史稱何劭驕奢簡貴衣裘服玩新故巨積食必盡四方珍異一日之供以錢二萬為限而曾所食不過萬錢是劭之自奉侈於父也而劭贈張華詩乃云周旋我陋圃西瞻廣武廬既貴不忘儉處約能存無鎮俗在簡約塞問焉足模是以姫孔為法以管氏為戒也審能如是則史所書又如何㦲以史為正則詩所言誣矣東坡擷菜詩云秋來霜霧滿東園盧服生兒芥有孫我與何曾同一飽不知何苦食鷄豚茍能如此則豈肯從嗜欲於口腹之間哉酉陽雜爼載鄭慤嘗於使君林避暑取蓮葉以簮刺其心令與柄通其屈莖如象鼻傳酒噏之名為碧筒盖取蓮葉芳馨之氣雜於酒中為可喜也故東坡詩云碧筒時作象鼻灣白酒微帶荷心苦是巳大抵醪醴之妙藉外而發其中則格高而味竒如大宛之葡萄大官之桐馬皆藉他物以成者趙德麟以黄柑釀酒東坡嘗作洞庭春色賦遺之所謂命黄頭之千奴巻震澤而俱還坡嘗以松明釀酒所謂味甘餘而小苦歎幽姿而獨髙二酒至今有用其法而為之者至坡在黄州自作蜜酒惠州自作桂酒皆一世而止盖出於一時之戯劇未必皆中節度爾同上酒之種多矣有以緑為貴者白樂天所謂傾如竹葉盈樽緑是也有以黄為貴者老杜所謂鵞兒黄似酒是也有以白為貴者樂天言玉液滿金巵是也有以碧為貴者老杜所謂重碧拈春酒是也有以紅為貴者李賀所謂小糟酒滴珍珠紅是也今閩廣間所釀酒謂之紅酒其色殆類臙脂酉陽雜爼載賈􅟚家蒼頭能别水常乗小艇於黄河中以瓠夸接河源水以釀酒經宿色如絳名為崑崙觴是又紅酒之尤者也同上張衡曰客賦醉言歸主稱露未晞王式曰客歌驪駒主人歌庸歸賓主之情可謂粲然者至李太白陶淵明則不然各常為詩曰我醉欲眠君且去雖曰任真之言然亦太無主人之情矣司馬温公獨樂園飲云浩歌縱飲任天機莫使歡娛與性違玉枕醉人從獨卧金羇倦客聽先歸其下二子之意也白樂天招客飲云客告暮將歸主稱日未斜又命小青娥長跪謝貴客其視張衡王式尤為有委曲相者然置酒送李漳州詩曰獨醉似無名借君作題目又何與招客飲之詩異乎東坡醉眠亭詩云醉中對客眠何害須信陶潜未苦賢山谷云欲眠不遣客佳處更難忘如是則不失賓主之禮又有可以通我之情是賔主之情兩得矣同上賢者豹隱墟落固當和光同塵雖舍者爭席何病而况於杯酒之間哉陶淵明杜子羙皆一世偉人也每田父索飲必使之畢其歡而盡開情而後去淵明詩云清晨聞叩門倒裳徃自開問子為誰歟田父有好懷壺漿遠見候疑我與時乖老杜詩云田翁逼社日邀我嘗春酒呌婦開大瓶盆中為我取二公皆有位者也於田父何拒焉至於田父有一世皆尚同願君汩其泥之説則姑守陶之介乆客惜人情如何拒隣叟則何妨杜之通乎陽秋復齋漫録云唐李敬方歡醉詩云不向花前醉花應解笑人只因連夜雨又過一年春日日無窮事區區有限身若非杯酒裏何以寄天真杜子羙絶句云二月已破三月來漸老逢春能幾廽莫思身外無窮事且盡生前有限盃二詩雖相縁而杜則尤其工者也世所傳相逢不飲空歸去洞口􅊝花也笑人之句盖出於敬方詩說雋永云福州嶺蛤蠣號西施舌極甘脆其出時天氣正熱不可致遠吕居仁有詩云海上凢魚不識名百年生命一杯羮無端更號西施舌重與兒曹起妄情藝苑雌黄云河豚所附本草云味甘温日華子云有毒予按倦㳺雜録云河豚魚有大毒肝與卵人食之必死暮春桞花飛此魚能大肥江淮人以時為珍更相贈遺腐其肉雜蔞荻芽沍而為羮或不甚熟亦能害人歳有被毒而死者南人嗜之不巳故聖俞詩春洲生荻芽春岸飛楊花河豚當此時貴不數魚鰕而其後又云炮煎茍失所轉喉為莫耶如此則其毒可知本草以為無毒悞矣或云河豚子不可食其大纔一粟浸之經宿如彈丸人有中其毒者以水調炒槐花末及龍腦皆可解予嘗見其漁者說其所取之由曰河豚盛氣善怒每伏水底必設􅃠於上故以物就而觸之彼將奮怒而上遂為所獲吳人珍之以其腹腴為西施乳予嘗戯作絶句云蔞蒿短短荻芽肥正是河豚欲上時甘羙遠勝西子乳吳王當日未曾知雖然甚羙必甚惡河豚味之羙也吳人嗜之以䘮其軀西施色之羙也吳王好之以亡其國兹可以為來者之戒噐用門舒王作前元豐行云倒持龍骨掛屋闕後元豐行云龍骨長乾掛梁梠龍骨水車也是嵗豐稔故龍骨掛而不用又有寄楊德詩云遥聞青秧底復作龜背拆脩脩雨龍骨豈得長掛壁是嵗亢旱反前詠爾東坡亦有水車詩云翻翻聯聯衘尾鴉犖犖确确蛻角蛇分畦翠浪走雲陣刺水緑針抽稻芽天公不念老農泣唤取阿香推雷車言水車之利不及雷車所霑者廣矣䂬溪張景陽七命有浮三翼泛中沚之句故詩家多有三翼為輕舟如梁元帝日華三翼舸元㣲之光隂三翼過是也按越絶書伍子胥水戰兵法内經曰大翼一艘廣一丈五尺二寸長十丈中翼一艘廣一丈三尺五寸長五丈六尺小翼一艘廣一丈二尺長九丈所謂三翼者皆巨戰船也用為輕舟悞矣苕溪漁隱曰蘇叔黨過賦鼠鬚筆云太倉失陳紅狡穴得餘腐既興丞相歎又發廷尉怒磔肉餧餓猫分髯雜霜兎揷架刀槊徤落紙龍蛇䳱物利未易詰時來即所遇穿墉何卑㣲託此得佳譽其步驟氣格殊有父風之類也復齋漫録云東坡論子厚詩盛時一失貴反賤桃笙葵扇安可常不知桃笙為何物偶閲方言簟宋魏之間謂之笙乃悟桃笙以桃竹為簟也余按唐萬年尉叚公路北方録云瓊州出紅藤簞方言謂之笙或曰籧篨亦曰行唐沈約奏彈歙令仲文秀恣横云令吏輸六尺笙四十領何東坡忘此邪苕溪漁隱曰劉夢得詩香風蕙塵尾月露濡桃笙詩話總龜後集巻四十九欽定四庫全書詩話總龜後集巻五十宋阮閲撰技藝門東坡與子由論書云吾雖不善書曉書莫如我茍能通其意常謂不學可故其子叔黨䟦公書云吾先君子豈以書自名哉特以其至大至剛之氣發於胷中而應之於手故不見其有刻畫嫵媚之態而端乎章甫若有不可犯之色少年喜二王書晩乃喜顔平原故時有二家風氣俗子不知妄謂學徐浩陋矣觀此則知初未嘗規規然出於翰墨積習也葛常之唐令狐相進李遠為杭州宣宗曰聞李遠云長日惟消一局棋豈可使治郡哉對曰詩人之言不足有實也乃薦遠亷察可任此正說詩者不以辭害志也䂬溪房千里作骰子選格序云以六骰䨇䨇為戱以數多少為進身官職之序而乃條其選黜之目焉坡以流俗狂惑經營倘來惴惴惟恐後於他人何異擲骰者心動於中而色形於外也欲求勝人者哉王逢原彩選詩云卒無及物效徒有高人氣昏昏忘其大擾擾爭其細其理信然黄常明裴度平淮西絶世之功也韓愈平淮西碑絶世之文也非裴之功不足以當韓之文非韓之文不足以發裴之功碑成李愬之子乃謂没父之功訟之於朝憲宗使叚文昌别作此與捨周鼎而寶康瓠何異哉李義山詩云碑髙三丈字如手負以靈鰲蟠以螭句竒語重喻者少䜛之天子言其私長繩百尺拽碑倒粗砂大石相摩治公之斯文若元氣先時已入人肝脾愈書愬曰十月壬申愬用所得賊將夜自文城因天大雪疾馳百二十里到蔡取元濟以獻文昌所謂郊雲晦㝠寒可墮指一夕巻斾凌辰破關等語豈不相萬萬哉東坡先王責官過舊馹壁間見有人題一詩云淮西功業冠吾唐吏部文章日月光千古斷碑人膾炙世間誰數叚文昌坡喜而録之同上陸希聲隱居宜興君陽山今金沙寺其故他宅也自著君陽山記叙其景物亭舘如輞川上可得其彷彿初僧􅈯光從希聲授筆法繼以善書得幸於昭宗希聲祈使授已以詩寄之云筆下龍蛇似有神天池雷雨變逡廵寄言昔日不龜手應念江湖洴澼人遂得召隱操盖不足觀也嘗著易傳十巻觀其自序以謂夣在大河之陽有三人偃卧東首上伏羲中文王下孔子也以易道畀予遂悟八卦小成之位質之象數如有符契且云今年四十有七已及聖人之年於是作易傳以授門人崔徹王賛之徒復自為注今觀其書無可取者而恠誕如此其人亦可知後避難死於道路盖不能終君陽之居也韻語陽秋杜劉少府畫山水障歌云反思前夜風雨急乃是蒲城鬼神入元氣淋漓障尤濕真宰上訴天應泣應物聽嘉陵江聲云水性自云靜石中本無聲如何兩相激雷轉空山鳴贈能吟李儋詩云絲桐本異質音韻合自然吾觀造化意二物相因縁臨川詠魯公壞碑云六書篆籀數變改遂使後世多失真誰初妄鑿妍與醜坐令學士勞骸筋堂堂魯公勇且仁豈亦以此夸常民直疑技巧有天巧不必强勉亦通神坡詠歙硯詩云與天作石來幾時與人作硯初不辭詩成鮑謝石何與筆落鍾王硯不知此窮本探妙超出凖䋲外不特狀冩景物也䂬溪拾遺門退之和劉使君云吏人休報事公作送春詩夢得送王司馬之陜州云案牘來時惟署字風烟入興更成章自俗吏觀之皆可坐不了事之目也韻語陽秋樂天云報道前駈少呵喝恐驚黄鳥不成啼坡云鬂絲只好對襌榻湖亭不用張水嬉蔡君謨云因傍堤松却飛盖為聞山烏徹鳴騶若俗士務此誇張俗眼又豈識數公意王常明林和靖詩馬從同事借妻怕罷官貧頗能狀寒廉態抑又有意所謂怕貧者婦人女子耳大丈夫之不移何隕穫之有子美有長貧任婦愁亦以男子未嘗愁也讓粟不謀妻以明謀及婦人則不得辭也又云浮生有分定飢飽豈能逃歎息謂妻子我何隨汝曹世畫韓退之小面而美髯著紗帽此乃江南韓熙載爾熙載謚文靖江南人謂之韓文公因此遂誤以為退之退之體肥而少髯故孔鄈私記云退之豐肥善睡每來吾家必命枕簟而鄭羣贈簟詩已云腰腹空大何能為漫膚多汗真相宜其信然矣黃山谷贈米元章云芾以能詩知名喜蓄書畫有米氏書畫史行世崇寧閒芾為江淮發運勾管揭一牌于行舸之上曰米家書畫船因為詩曰萬里風帆水著天麝煤鼠尾過年年滄江夜静虹貫月定是米家書畫船
