body:
  text: 評論門四韋蘇州云誰知風雨夜復此對床眠最為世所稱重而白樂天招張司業云能來同宿否聽此對床眠意亦相類然不為人知老杜云眼前無俗物多病也身輕而樂天有眼前無俗物身外即僧居之句世方獨稱老杜直方詩話梁簡文云早知半路應相失不若從來本獨飛李義山云無事交渠更相失不及從來莫作雙而近時樂府亦云早知今日長相憶不及從來莫作雙此最為詩之大患樂天云哺歠眠糟瓮流涎見麯車杜甫有路逢麯車口流涎而張文潛有寄予詩云湏㸔逺山相對蹙莫欺病齒惱衰翁自註云黄九謝人遺梅子詩有逺山對蹙之句乃知詩人取當時作者之語便以為故事此無他以其人重也舒王詩云投老歸來供奉班塵埃無復見鍾山何湏更待黄粱熟始信人間是夢間又云黄粱欲熟日流連謾道春歸莫悵然蝴蝶豈能知夢事蘧蘧先堕晚花前又云客舎黄粱今始熟鳥殘紅柿昔分甘盖三用黄粱而意義皆妙老杜對雪詩云有待至昏鴉乃引何遜城隂度塹黒昏鴉接翅歸之句余疑昏鴉亦常語何必引遜句後作絶句却云釣艇收緡盡昏鴉接翅歸秦少㳺始作蔡州教授意謂朝夕便當入舘歩青雲之上故作東風解凍詩云更無舟楫碍從此百川通已而久不召用作送張和叔云大梁豪英海故人滿青雲為謝黄叔度鬢毛今白紛謂山谷也說者以為意氣之盛衰一何容易舒王送吳仲庶待制守潭云自古楚有材醽醁多美酒不知尊前客更待賈生否賈誼初為江南吳公召置門下而謫死長沙其用事之精余以為可師也余最愛蘇黄門送文潞公云遍閱後生真有道欲談前事恐無人盖潞公官爵年徳難為形容非此兩句不能優㳺而自見張文潛病中作七言詩蘇黄門和之云長空鴈過疑來答虚幌螢飛坐恐燒秦覯云文潛讀至此不樂余曰何也覯云虚幌坐燒近于病死病人所諱歐陽文忠最愛林和靖云踈影横斜水清淺暗香浮動月黄昏山谷以為不若雪後園林纔半樹水邉籬落忽横枝余以為其所愛者便是優劣耶此句於前所稱真可䖏伯仲耳而和靖又有詩云池水倒窺踈影動屋簷斜入一枝低歐陽文忠送張至秘校歸荘詩云鳥聲梅店雨栁色野橋春此茅店月板橋霜之意老杜云天闕象緯逼雲卧衣裳冷舒王云當作天閱謂其可對雲卧也古今人作昭君詞多矣余獨愛樂天一絶云漢使却回憑寄語黄金何日贖蛾眉君王若問妾顔色莫道不如宫裡時其意優㳺而不廹切樂天賦此時年甚少李秉彛字徳叟寄詩一巻與李希聲云此余近所作希聲讀至朋也老無能淡如雲水僧為之撫掌盖洪龜父名朋善作詩徳叟欲資其名失于點勘故耳老杜云何時一尊酒重與細論文而孟浩然亦有何時一尊酒重與李膺傾之句唐張子容作巫山詩云巫嶺岧嶤天際重佳期夙昔願相從朝雲暮雨連天暗神女知來第幾峰近時晏叔原作樂府云慿君問取歸雲信今在巫山第幾峰最為人所稱恐出于子容李賀髙軒過中有筆補造化天無功之句余每擊節此詩人之所以多窮也老杜云文章憎命達恐亦出此陳無已云石池随䖏數逰魚余以為不若李希聲云緑净隨時㸔上魚邵堯夫詠牡丹云施朱施粉色俱好傾國傾城艷不同可謂言工殊無髙致張崏字子望作洛陽觀花云平生自是愛花人到䖏尋芳不遇真秖道人間無正色今朝初見洛陽春盖托意邵堯夫堯夫和云造化從來不負人萬般紅紫見功真滿城車馬空撩亂未必逢春盡得春豈非欲使之有所行耶邵堯夫集平生所作為十巻號曰擊壤富丞相作詩題其後云黎民於變似堯時便字堯夫徳可知更覽新詩名擊壤先生全道略無遺為偉人所重如此郭功父少時喜誦文忠公詩一日過聖俞聖俞曰近得永叔書云作盧山髙詩送劉同年效杜牧晚晴賦自以為得意恨未見此詩功父誦之聖俞擊節歎賞曰使吾更學作詩三十年不能道其中一句功父再誦不覺心醉遂置酒又再誦數行凡誦十數遍不交一言而罷眀日聖俞贈功父詩曰一誦廬山髙萬景不可蔵設如古畫詩極意未能忘或云不及忘癸未正月三日徐師川胡少汲謝夷季林子仁潘邠老吳君裕饒次守楊信祖吳廸吉見過㑹飲於賦歸堂亦可為一時之盛潘一作詩厯數其人云胡子雲中白鶴林生初發芙蓉吳十九成雅奏饒三百鍊竒鋒南州復見髙士東山行起謝公信祖真成徳祖立之無愧行中吳生可兵南郡老夫寜附石崇閒雅已傾重客說談仍得王戎冠盖城南髙㑹山隂未掃餘風客散日銜西壁主人不道尊空徐師川軰皆言此詩殊不工又六字無人曽如此作想為五言亦可遂去一字句皆可讀至老夫附石崇坐客無不大笑劉咸臨醉中嘗作詩話數十篇既醒書四句於後曰坐井而觀天遂亦作天論客問天方圓低頭慙客問盖悔其率爾也參寥云舊有一詩寄少㳺少㳺和云樓閣過朝雨参差動霽光衣冠分禁路雲氣繞宫墻亂絮迷春濶嫣花困日長平康何䖏是十里帶垂楊孫莘老讀此詩至至末句這小子又賤相發也少㳺後編淮海集遂改云經旬率酒伴猶未厭長楊宗室士陳字眀發喜作詩與畫嘗為髙軒過圖張嘉甫題云顧長康善畫而不能詩杜子美善作詩而不能畫從容二子之間者王右丞也若眀發盖右丞之季孟云晁無咎亦題云嘉甫謂顧長康善畫而不能詩杜子美能詩而不能畫眀發兼此二勝可在摩詰季孟間余以畫及詩信嘉甫之知言晁以道見之謂余能畫而不能詩乃可以為病豈有能詩而必又能畫耶夏雲多竒峰乃長康句謂不能詩可乎嘉甫既易于立論而無咎又便揚之大抵皆讀書少之過洪龜父有詩云胡生畫山水烟雨山更好鴻鴈書逺汀馬牛風雨草潘邠老愛其第二句余愛其第三句山谷愛其第四句徐師川愛其第三第四句逺汀後又改為逺空余云向上一句莫是公未有所得否何衆人之皆不好也龜父大笑劉壮輿云歐陽公自謂吾畏慕不可及者聖俞子美及贈詩云文㑹忝予盟詩壇推子将又曰維持于文章泰山一浮塵既曰郊死不為島聖俞發其蔵又曰堪笑區區郊與島螢飛露濕凝秋草是其自謂不如者乃所以過之也歐陽公云李白云落日欲沒峴山西倒着接䍦花下迷襄陽小兒齊拍手大家争唱白銅鞮此常言也至于清風眀月不用一錢買玉山自倒非人推然後見太白之横放所以警動千古者顧不在于此乎甫之于白得其一節而精强過之余以為以此警動之耳田承君云歐陽公晚年最喜陳知默詩至云修方且欲學之陳詩不多見承君但見其兩聨云平地風烟横白鳥半山雲朩巻蒼藤雲埋山麓蔵秋雨葉脱林梢帶晚風張文潛作虎圖詩云煩君衛吾寝振此蓬蓽陋坐令盗肉鼠不敢窺白晝潘邠老云却是猫兒詩文潛作輸麥行有云場頭雨乾場地白老稚相呼打新麥半歸倉廪半輸王免教縣吏相煎逼輸王乃老農語若時享嵗貢終王勤王之類其語古矣秦少㳺晚出左掖門有詩云金雀觚稜轉夕暉飄飄宫葉堕秋衣出門塵漲如黄霧始覺身從天上歸識者以為少㳺作一黄本校勘而􅃷耀如此必不逺到洪駒父見陳無已小放歌行云不惜捲簾通一顧怕君着眼未分眀此為竒語盖通字未嘗有人道余曰子豈不記老杜云簾戸毎宜通乳燕耶舒王有云却憶金眀池上路紅裙争㸔緑衣郎歐公謂舒王曰謹愿者亦復為之耶趙徳有詩云冥冥小雨不成泥参寥言𠖇冥之雨却是作泥者不若霏霏也以道以為然荆公嘗作一絶題張文昌詩後云蘇州司業詩名老樂府皆言妙入神不似尋常最竒崛成如容易却艱辛文昌平生所得荆公兩句言盡詩云壁門金闕倚天開五見官花落石槐眀日扁舟滄海去却将雲氣望蓬萊此劉貢父詩也自舘中出知曺州時作舊云雲表荆公改作雲氣又云五見宫花落石槐此作詩法也王仲至召至舘中試罷作一絶題于壁云古朩森森白玉堂長年來此試文章日斜奏賦長楊罷閑拂塵埃㸔畫墻舊云奏罷長楊賦亦荆公所改石守道作三豪詩謂曼卿豪于詩永叔豪于文杜默豪于歌故詩云師雄二十二筆距猛如鷹玉川月蝕句意欲相慿陵而歐公亦有詩云南山有鳴鳯其音和自清鳴于有道國出則天下平杜默東土秀能吟鳯凰聲作詩幾百篇長歌仍短行杜默濮州人師雄其字謂豪於歌者有送守道六子詩云聖人門前大蟲學海波中老龍及推倒楊朱墨翟扶起仲尼周公之句默詩謂之豪者豈在是耶余嘗得師雄全集觀之餘作皆不及此陳無已有寄晁以道詩云子較東方生自視何益損人言不當價一錢萬金産其後無已又賦髙軒過云滕王蛱蝶江都賦一紙千金不當價以道云陳三兩度不當價司空表聖自論其詩以為得味外意如緑樹連村暗黄花入麥稀此句最善又云棋聲花院静幡影石壇髙吾嘗獨逰五老峰白鶴觀松隂滿庭不見一人惟聞棋聲然後知此句之工但恨其寒儉有僧態若子美詩云暗飛螢自照水宿鳥相呼四更山吐月殘夜水眀樓則才力富健過表聖逺甚栁儀曺詩憂中有樂樂中有憂妙絶古今然老杜云王侯與螻蟻同盡随丘墟儀曺何憂之深也有人云陳無已閉門十日雨即是退之長安閉門三日雪余以為作詩者容有意思相犯亦不必為病但不可太甚耳並同前古有早行詩云主人燈下别羸馬月中行又王若云旅人心自急公子夢尤迷惟江東逸人王舉衮詩曰髙空有月千門閉大道無人獨自行最為絶唱青瑣集范文正有採茶歌天下共傳蔡君謨謂希文公歌膾炙人口有少未完盖公才氣豪傑失于少思希文曰何以言之謨曰昔茶句云黄金碾畔緑塵飛碧玉甌中翠濤起今茶之絶品其色貴白翠緑乃茶之下者耳希文曰君善鑒茶者也此中吾語之病也公意如何君謨曰欲革公詩二字非敢有加焉公曰革何字君謨曰翠緑二字可云黄金碾畔玉塵飛碧玉甌中素濤起希文曰善又見君謨之精茶希文之伏于義濮州杜默當年目之為三豪謂默豪於歌石守道赴詔作太學直講默作大字歌送之今舉其豪句云仁義途中馳騁詩書府裡從容頭角驚殺蝦蠏學海波中老龍爪距逐出狐兎聖人門前大虫推倒楊朱墨翟扶起仲尼周公一條路出甕口幾程身在雲中水浸山影倒碧春着花梢半紅因此歌得在三豪之列又上永叔詩云一片靈臺掛眀月萬丈詞㷔飛長虹乞取一杓鳯池水活取久旱泥蟠龍其豪例皆此類並同前薛許州能以詩道為已任還劉徳仁巻有詩云百首如一首巻初如巻終譏劉不能變態陸希聲之比北夢瑣言蜀沙門僧爾鳥慕李白歌鄙賈島蹇澁乃自諷其詞云鯨目光燒半海紅鰲頭浪蹙掀天白而云我不能致思於藩籬蹄涔之間人咸服之仍精於周易佛經為歌行掩之賈島嘗為僧洛陽令不許僧午後出寺賈有詩云不如牛與羊猶得日暮歸詩思遲澁杼軸方得又如鳥從井口出人自岳陽来乃經年方遂偶句開元中有儒士登鍾南山得句云野逈雲根濶山髙樹影長私心自負吟諷之際忽聞空中語云未若天河雖有浪月桂不聞香儒士不勝喜以為已有歸誇於僧智潛掩鼻笑曰臭氣可掬何足多也儒士驚愕遽以實告自此又號為鑑文太師有浮漚篇行於世零陵總記盧延遜詩淺近人多笑之惟吳融獨重其作盛稱于時且云此公不尋常後必垂名延遜詩至今傳之亦有絶好者宿東林云兩三條霓欲為雨七八箇星猶在天旅舎言懐云名紙毛生五門下家僮骨立六街中贈元上人云髙僧解語牙無水老鶴能飛骨有風蜀路云雲間聞鐸騾䭾去雪裡殘骸虎拽來江上云餓猫臨䑕穴饞犬䑛魚砧寄人云吟成一箇字撚㫁數莖髭又云樹上諮諏批頬鳥忩間壁駁叩頭虫余在翰林嘗召對上舉延遜詩云臂鷹健卒一氊帽騎馬佳人巻畫衫雖淺近亦自成一體談苑東坡嘗與人書言味王摩詰之詩詩中有畫觀摩詰之畫畫中有詩云藍田白石出玉闗紅葉稀山路元無雨空翠濕人衣此東坡詩非摩詰也詩史吾詩云日日出東門歩歩東城逰城門抱闗卒恠我此何求我亦無所求駕言冩我憂章子厚謂参寥曰前歩而後駕何其上下紛紛也僕問之曰吾以氣為輪以神為馬何曽上下乎参寥曰東坡文過有理似孫子荆曰枕流欲洗其耳東坡語録山谷作漁父詞清新婉麗聞其得意自言以水光山色換却玉肌花貌乃真漁父家風然纔出新婦磯又入女兒浦此漁父無乃大瀾浪也百斛眀珠文與可嘗云老夫墨竹一𣲖近在湖州吾竹雖不及石似過之此一巻公案不可無山谷下一句山谷因次其韻云東坡雖是湖州𣲖竹石風流過一時前世畫師今姓李不妨還作輞川詩或言東坡不曽目伯時為前身畫師俗人不知便是詬病伯時一邱一壑風流未减古人誰當作此痴計東坡此語是真相知又作二詩云秋山風雨石骨痩法窟寂寥僧定時李侯有句不肯吐淡墨寫作無聲詩龍眠不似虎頭痴妙筆無機可並馳蘇仙吮墨作石竹應解種花聞此詩石曼卿詠紅梅云認桃無緑葉辨杏有青枝東坡云詩老不堪梅格在更㸔緑葉與青枝荆公云北人初未識渾作杏花㸔又能盡紅梅之妙䖏也有單葉梅千葉梅臘梅故余作四梅詩直方詩話山谷見東坡和淵眀飲酒詩讀至前山正可數後騎且勿驅云此老未死在山谷嘗謂余曰凡作賦要湏以宋玉賈誼相如子雲為師格略依放其歩驟乃有古風老杜詠吳生畫云畫手㸔前輩吳生逺擅塲盖古人于能事不獨求誇前軰要湏前軰中擅塲耳東坡言淵眀云但恐多謬誤君當恕醉人此未醉時說若說醉何暇憂悞哉然世人言醉時是醒時此語最名言荆公始為集句多至數十韻往往對偶親切盖以其誦古人詩多或坐中率然而成始可為貴其後多有人傚之者但取數部諸集諸家之善耳故東坡次韻孔毅夫集句見贈云羡君戯集他人詩指呼市人如使兒天邉鴻鵠不易得便令作對随家雞退之驚笑子美泣問君乆假何時婦世間好事世人共眀月自滿千家墀山谷云謝師厚方其為女擇對見山谷詩曰吾得婿如是足矣廷堅欲求之然庭堅之詩卒從謝公得句法故山谷有詩曰自往見謝公論詩得濠梁文忠公盤車圖詩云古畫畫意不畫形梅詩詠物無盡情忘形得意知者寡不若見詩如見畫東坡作韓幹畫馬圖詩云韓生畫馬真是馬蘇子作詩如見畫世無伯樂亦無韓此詩此畫誰當㸔又云論畫以形似見與兒童鄰君㸔賦詩者定知非詩人詩畫本一律天工與清新又云少陵翰墨無形畫韓幹丹青不語詩此畫此詩今已矣人間駑驥謾争馳余每誦數過殆以為法並同前詩話總龜巻八欽定四庫全書詩話總龜巻九宋阮閱撰
