body:
  text: 故事門章聖朝春月多召兩府兩制三舘於後苑賞花釣魚賦詩自趙元昊背叛西陲用兵廢缺甚久嘉祐末仁宗為修故事群臣和御製詩是日微隂寒韓魏公時為首相和詩卒章云曽叅二十年前㑹今􅍯台司得再陪時内侍都知任守忠常以滑稽侍上從容曰韓琦譏陛下仁宗愕然問其故守忠曰譏陛下逰宴太頻仁宗為之笑閑居詩話唐制禮部郎中掌省中文翰謂之南宫舎人百日内湏知制誥故王元之贈宋給事詩曰湏知百日掌絲綸又謂員外郎㕔為瑞錦窠㕔前有大石諸州府送到廢印皆於石上碎之又祥瑞圖亦掌於員外㕔令狐楚元和中任員外郎有詩曰移石㡬回敲廢印開箱何處送新圖春眀退朝録北都郡守有過馬㕔按唐韓渥詩云外使進鷹初得按中官過馬不教嘶注云上乗馬必令中官為馭以進謂之過馬既乗之然後蹀躞嘶鳴也唐時方鎮亦效之乃有此名同前世傳潘閬安鴻漸八才子圖皆策蹇重戴又王元之賀狄遵度及第未脫白詩云且留重戴士風流則國初舉子尤重戴矣青箱雜記新進士放榜後翌日排光範門候見宰相雖云排光範門其寔排建福門集於四方舘昔有詩曰華陽觀裡鍾聲禁建福門前皷動時即其日也南部新書張燕公守嵗詩云竹爆好驚眠今人家祀畢始爆竹雜記宋次道嘗為西都詩以野狐落對五鳯樓野狐落唐人名宫人所聚同前曲江㑹先牒教坊請奏上御紫雲樓觀焉時或擬作樂則為之移日故曺松詩云造逰若遇三清樂行從應妨一日春旨下後人置被袋例以圖障酒器錢絹實其中逢花則飲故張籍詩云無人不借花間宿到處常携酒器行其被袋狀元録事同㸃檢缺一則罰金曲江之宴行市羅列長安街至半空公卿帥以其月選東床車馬駢闐莫可殫述摭言韓定辭不知何許人為鎮州王鎔書記聘燕帥劉仁恭後于賔舘令幕客馬郁延接馬有詩贈韓曰燧林芳草綿綿思盡日相擕涉麗譙别後巏嵍山上望羡君時復見王喬郁詩清麗然意在試其學問韓即席答之曰崇霞臺上神仙客學辨痴龍藝最多盛徳好将銀管述麗詞堪與雪兒歌座内諸賔靡不欽訝稱為妙句然亦疑其銀管之譬也他日郁從容問韓以銀管雪兒之事韓曰昔梁元帝為湘東王時好學著書嘗記録忠臣義士及文章之美者筆有三品以金銀雕飾或用斑竹為管忠孝全者以金管書之徳行精粹者用銀管書之文章贍麗者以斑竹管書之故湘東王之譽振於江表雪児李密或為孝齊之愛姬能歌舞每見賔僚文章有竒麗中意者即付雪児叶音律以歌之又問痴龍出何處曰洛下有洞穴曽有人悮墜於其中因行數里漸眀曠見有宫殿人物凡九處又有大羊羊髯有珠人取食之不知何所後出以問張華華曰此地仙九館也大羊名曰痴龍耳定辭復問郁巏嵍之山當在何處郁曰此隋郡之所事何謹遜而下問由是両相悦服結交而去百斛眀珠世傳王子敬帖有黄柑三百顆之語此帖乃在劉季孫家景文死不知今在誰家矣韋蘇州有言書後欲題三百顆洞庭湏待滿林霜盖蘇州亦見此帖也余亦嘗有詩與景文云君家子敬十六字氣壓鄴侯三萬籖劉季孫景文之子也慷慨竒士博學能詩僕薦之得隰州以歿哀哉嘗有詩寄僕曰四海共知霜􅁂滿重陽能揷菊花無死之日家無一錢但有書三萬軸畫四百幅耳退之詩曰百年未滿不得死且可勤買抛青春國史補云酒有郢之富水烏程之若下滎陽之土窟春富平之石凍春劍南之燒春杜子美詩亦云聞道雲安麴米春裴鉶作傳竒記裴航事亦有酒名松醪春乃知唐人名酒多以春則抛青春亦必酒名也並同前太祖問趙普男尊女卑何故男跪而女不跪羣臣無對者惟王貽孫曰古者男女皆跪至唐則天時始拜而不跪太祖曰何以為實貽孫曰古詩云長跪問故夫遂得振學譽玉壺清話雞鳴髙樹巔說題辭曰雞為精陽南方之象離為火精陽之象火陽精物炎上故陽出雞鳴以類感也古詞云犬吠深巷中雞鳴髙樹顛樂府集東飛百勞歌詩七月鳴鵙一曰勞鵙也東飛百勞西飛燕言其類不同而飛翔特異無因以相逐故其詩曰春已暮花從風空留可憐與誰同滄海雀風土記六月東南長風海魚化為黄雀又禮記雀入大水化為蛤故荀昶黄雀詩云空城舊侣絶滄海故交分蘭若生春陽感時而思君子也若謂杜若亦香草名左思三都賦曰其草則有杜若衡菊石蘭芷蕙棗下何纂纂潘安仁望賦云輟張艾之哀彈流廣陵之清􅄆詠桃園之夭夭歌棗下之纂纂歌曰棗下纂纂朱實纍纍宛其落矣化為枯枝釋者謂之纂纂棗花也西園逰曹子建公宴詩云清夜㳺西園飛盖相追隨眀月澄清影列宿正叅差並同前京城街衢有金吾傳呼以禁夜行至正觀馬周上封事每街隅懸皷夜擊皷以止其行以􅍯竊盗時人遂呼為􅕣􅕣皷有道人裴修然雅有篇咏善書畫好酒嘗戱為詞遮莫􅕣􅕣皷湏傾滿滿杯金吾若相問報道玉山頽古今詩話青州隆興寺殿前廡下西邉有木臺臺上以架懸三小皷相傳寺乃孟嘗君故宅皷乃集賔客食皷考究不然而皷南壁上有詩一絶云千載遺蹤號皷樓不知誰是雍門周區區此飯徒為爾唯有鳴雞盗可酧不題姓名亦不知何謂唐開元天寳間承平日久世尚輕微多愛三花飾馬郭若虚家蔵貴戚閱馬圖中有三花馬蘇大叅家有韓幹畫三花御馬晏元獻家蔵一畫虢國出行圖亦有三花馬三花者剪鬃為三瓣白樂天詩云舞衣裁四葉馬鬛剪三花是也淮南蜀岡者維揚之地也或曰勢連蜀土或以産茶味如蜀茶云自蜀岡之南有竹西亭修竹踈翠後即禪智寺也竹西取杜牧之詩斜陽竹西路歌吹是楊州自蜀江以南景氣頓異北風至此遂絶鄴中銅駝鄉魏武帝立銅駞石犬各二古詩云石犬不可吠銅駝徒爾為吳宫有香水溪俗云西施浴處人呼為脂粉塘吳王宫人濯粧於此溪上源至今猶香古詩云安得香水泉濯郎襟上塵蘭溪自黄州麻城出東南流入大江有水極清冷杜牧之詩云蘭溪春盡碧泱泱是也磁湖鎮道士磯即西塞山也薛能詩有西塞長雲盡南湖片月斜正謂此處南湖臧質敗走南湖以荷自蔽即此地也彈棋今人罕為之有譜一巻盡唐賢所為其局方二尺中心髙如覆盂其巔為小壺四角微起李商隐詩云玊作彈棋局中心最不平謂其中髙也樂天詩云彈棋局上事最妙是長斜謂抹角長斜一發過半局今譜中具有此法栁子厚叙用二十四棊者即此謂也神龍以來杏園燕後皆於慈㤙寺塔下題名他時有将相則朱書之及第後知聞或遇未及第時題名字添前字故詩曰曾題名處添前字送出城人乞舊詩湘潭縣唐興寺有劉夢得撰儼禪師碑孟賔于鄭谷詩湘水似伊水湘人如故人之句乃此寺前江流也鸊鵜水鳥也其膏可以塗刀劍令不鏽爾雅注云膏玉瑩劍繢英華詩云鳥㘅苜蓿葉劍瑩鸊鵜膏是也周禮四時變火春取榆栁之火夏取棗杏之火唐詩惟春取榆栁之火以賜近臣戚里之家故韓翃有曰日暮漢宫傳蠟燭青烟􅄆入五侯家之句章聖嘗宴群臣於太清樓忽問市店酒有佳者否中貴人對唯南仁和酒佳急令沽賜羣臣又問近臣曰唐時酒每升價㡬何無有對者唯丁晋公奏曰唐時酒每升三十錢章聖曰何以知之晋公曰臣嘗記杜甫詩曰速來相就飲一斗恰有三百青銅錢章聖大喜曰杜甫詩自可為一代之史禮部貢院試進士設香案于階前試官與舉人對拜此唐故事也列坐設位供帳亦盛乃具茶湯至於試學究則撒去㡩幕亦無茶湯渴則飲硯水皆黔其吻非固困之盖防毡幕中蔵文字供應人傳經義爾故事為之防歐陽文忠公詩云焚香答進士撤幕待經生並同前詩病門王靖學蘇子美作壮語曰欲往海上呑鯨鯢又近有士人好為怪語詩云此劉和尚小師畢達亢卑劉貢父曰此乃畨僧名號也又盧延遜吊陳云将詩云自是碙砂發非干礉石傷牒多身上字盌大背邉瘡此乃打脊詩也如金同丁銀花合亦類皆語忌爾作詩宜以為戒詩史詩有語病當避之劉子儀嘗贈人云恵和官尚小師達禄湏干仝用故事取孟子所謂栁下恵不卑小官仲尼曰師也達子張學干禄或有冩此二句减去官字示人曰是畨僧達禄湏干見者大笑此偶自諧合無如輕薄子非刀筆過也古今詩話西頭供奉官錢昭度曾咏方池詩云東道主人心匠巧鑿開方石貯漣漪夜深却被寒星映恰似仙翁一局棋有輕薄子見而笑曰此正謂一局黒全輸也遯齋閑覽詩話總龜卷二十八欽定四庫全書詩話總龜卷
