body:
  text: 志氣門丞相李文正公昉少年時嘗以詩呈叔侍中覽而喜贈之詩曰反觀西里盛世世秉鈞衡後文正果大用詔賜所居為謝元卿秉鈞里是知李氏自五代至本朝世居将相非一日也翰林名賛陳文恵未達時作偶成詩曰千里好山雲乍歛一樓眀月雨初晴觀此詩者曰意與李覯碧山更被暮雲遮者異矣青箱雜記宋莒公守潁昌開西湖作詩曰鑿開魚鳥忘情地展盡江湖極目天觀者知其必大用丞相劉公沆以氣義自許嘗作牡丹詩曰三月内方有百花中更無又述懐詩曰虎生三日便窺牛獵食寜能掉尾求若不去登黄閣貴便湏來伴赤松逰奴顔婢舌誠堪耻羊狠狼貪自合羞三尺太阿星斗煥何時去取魏齊頭皇祐初出鎮豫章漕使潘夙以小孤山四十字示公公即席和之曰擎天有八柱此柱一焉存石聳千尋勢波流四面㾗江湖中作鎮風浪裏蟠根平地安然者饒他五岳尊覽者皆知有宰相器蒋槩治平中登第後久不調官逰河朔登雄州北門樓有詩曰壮士未酧志乗秋感慨多幽燕新種落唐漢舊闗河塞月沉青塜邉聲入暮河如何得萬騎玉壘夜經過不幸早死觀其志亦有為者也並同前長安舊以不厯䑓省使出鎮㢘訪節鎮者為麄官大率重内而輕外今東都乾元門舊宣武軍皷角門節度王彦威有詩刻其上云天兵十萬勇如貔正是酬㤙報國時汴水波濤喧皷角隋堤楊柳拂旌旗前驅紅斾闗西将坐間青娥趙國姬寄語長安舊冠盖粗官到底是男兒彦威自太常博士出辟使府至茲鎮故有是句至今不知所在薛能亦有謝寄茶詩云粗官寄與真抛擲頼有詩情合得嘗談苑李昇竹詩曰棲鳯枝稍猶軟弱化龍形状已依稀唐宣宗瀑布詩曰溪澗豈能留得住終歸大海作波濤王覇之意可見也河中府逍遥樓有唐太宗詩曰昔乗四馬去今驅萬乗歸氣象尤可見詩史唐子方謫官渡淮至中流風作舟欲覆作詩曰聖宋非狂楚清淮異汨羅平生仗忠信今日任風波日暮泊舟岸續云舟楫顛危甚黿鼉出沒多斜陽幸無事沽酒聽漁歌真詩無謟可以格鬼神雲齋録景祐五年苑試進士以鯤化為鵬為詩題吕濟叔詩云九霄離海嶠一夕過天池論者以此當為第一人同前沙門文瑩嘗謂為文老而不衰者惟元厚之在禁林時有懐荆南舊逰云去年曾醉海棠叢聞說新枝發舊紅昨夜夢回花下飲不知身在玉堂中樂天典杭日江東學子奔杭取解張祜自負詩名而徐凝亦至燕于郡中樂天諷二子矛盾祜曰僕宜為解首凝曰有何佳句祜曰甘露寺詩曰日月光先到山河勢盡來金山寺詩曰樹影中流見鐘聲兩岸聞凝曰善則善矣奈無野人瀑布詩曰千古長如白練飛一條界破青山色祜愕然一座盡傾古今詩話王沂公布衣時以梅花詩獻吕文穆公云雪中未問和羮事且向百花頭上開文穆曰此生巳安排状元宰相也後果然姚嗣宗詩云踏碎賀蘭石掃清西海塵布衣能效死可惜作窮鱗韓魏公安撫闗中薦試大理評事同前髙越逰河朔有州牧欲以女妻之越作鷂子詩云雪爪星眸衆鳥歸摩空専候整毛衣虞人莫謾張羅網未肯平原淺草飛孫給事僅及孫暨皆咸平初省試放状元後各應制舉給事與兄何齊名有聲場屋何淳化中魁多士給事下第有詩曰前春再就天堦試應被人呼小状元次舉中甲科王元之以詩贈曰病中何事忽開顔憶得詩稱小状元粉壁已懸龍虎榜錦標争屬鶺鴒原並同前髙言京師人字眀道好學有志義以詩干友人曰昨夜隂風透膽寒地爐無火酒瓶乾男兒慷慨平生事時復挑燈把劍㸔秦少㳺謫雲州有詩曰南土四時都熱愁人日夜俱長安得此心如石一時忘了家鄉黄魯直謫宜州作詩曰老色日上面歡情日去心今既不如昔後當不如今輕紗一幅巾短簟六尺牀無客日自静有風終夕凉少㳺鍾情故詩酸楚魯直學道故詩閒暇至東坡南中詩曰平生萬事足所欠唯一死則英特之氣不受折困知遇門楊徽之侍讀太宗聞其名索之著數百篇奏御獻詩云十年牢落今何幸叨遇君王問姓名太宗選十聫書於御屛間梁周翰詩曰誰似金華楊學士十聫詩在御屏間僧文瑩嘗謂楊公必以天池浩露滌筆於氷甌雪碗中則方與公詩神骨相副古今詩話夏文荘守安陸宋莒公兄弟尚皆布衣文荘異待之命作落花詩莒公曰漢皋珮解臨江失金谷樓危到地香子京曰将飛更作囬風舞巳落猶成半面粧是嵗詔下兄弟皆應舉文荘曰詠落花而不言落大宋湏状元及第又風骨秀重異日作宰相小宋非所及然亦湏登嚴近後皆如其言故文荘在河陽聞莒公登庸以别紙賀曰昔年安陸已識台光盖謂是也青箱雜記杜荀鶴謁梁髙祖與之坐忽無雲而雨祖曰無雲而雨謂之天泣不知何祥請作詩荀鶴曰同是乾坤事不同雨絲飛洒日輪中若教隂顯都相似争表梁王造化工髙祖喜之洞微志真宗末年嘗㳺禁中見翰林學士王禹偁倚宫朩若詠吟命宫使亟探之果預作賞花釣魚詩眀日百官赴宴迨題出乃千葉石榴花百官皆失所擬禹偁首進一絶云王毋庭中親見栽張騫偷得下天來誰家巧婦殘針線一撮生紅熨不開上稱賞謂真才桂堂詩話唐文宗夏日與諸學士聫句人皆苦炎熱我愛夏日長栁公權續曰薫風自南來殿閣生微凉時丁袁五學士皆屬繼文宗獨諷公權兩句辭清意足不可多得乃令公權題於殿壁字方圓五寸文宗視之歎曰鍾王復生無以加焉廣卓異記劉景文作饒州監酒得一詩題芝山寺壁云數聲燕語落簷間底事驚回夢裡閑說與傍人都未信杖藜擕酒㸔芝山舒王作本路憲見之愛甚遂令權州學古今詩話蜀人雍陶以進士第為簡州牧自比謝宣城栁吳興也賔至折挫忽有馮道眀下第請謁告閽者道眀與員外有舊及見呵曰與公昧平生何方相識道眀曰誦員外詩仰員外徳遂吟曰立當青草人先見行傍白蓮魚未知又曰江聲秋入寺雨氣夜侵樓又曰閉門客到常疑病滿院花開不似貧聞之歡狎如曩昔之友雲溪友議王文公凝清族重徳冠絶當時每就寢息必义手而卧慮其寝寐中見先靈食䬪飥不過十八片曽典絳州時司空圖侍郎方應進士舉别墅到郡謁見後更不訪親知閽吏遽申司空秀才出郭後入郭訪親知即不造郡齋琅琊知之謂其専敬愈重之及知舉日司空一㨗列第四人登科同年訝其姓名甚暗所圖太速有鄙薄者號為司徒空琅琊知有此說因召一牓門生開筵宣言於衆曰某叨忝文柄今年牓帖全為司空先軰一人而已由是聲彩益振爾後為御史分司舊相盧公擕酒訪之留詩曰氏族司空貴官班御史雄老夫如且在未可歎途窮其為名徳重也如此北夢瑣言狂放門鍾傳鎮南昌有李夢符者放蕩酣飲好事者與語應口成詩後桂州刺史李瓊遣人謂傳曰夢符吾弟請遣歸鍾令求于市邸人曰夜來不歸不知所之有回常學士詩云罷修儒業罷修真養拙蔵愚春復春到老不踈林裡鹿平生難見日邉人洞桃深處千株錦岩雪鋪時萬草新深謝名賢逺相訪求聞難博鳯為鄰詩史朱勰仕江南為縣令甚踈逸有詩云好是晚來香雨裡擔簦親送綺羅人李璟聞之處以閒曺又有僧庭實獻詩云吟中雙鬢白笑裡一生貧璟聞云詩以言志終是寒薄以束帛遣之同前李澣登科在和凝榜下同為學士㑹凝作相澣為承㫖當批詔次日於玉堂舊閣悉取圗書器玩留一詩于榻云座主登庸歸鳯闕門生批詔立鰲頭玉堂舊閣多珎玩可作西齋潤筆不人皆笑其踈縱古今詩話杜牧之登科後三年縦放為詩曰落魄江湖載酒行楚腰纎細掌中情十年一覺揚州夢贏得青樓薄倖名又曰觥舩一棹百分空十載青春不負公今日􅁂絲禪榻畔茶烟輕颺落花風杜牧自御史分司洛陽李司徒罷鎮閑居聲妓為當時第一因㑹朝士以牧之嘗任風憲不敢邀置牧之諷坐客達李李遽馳書以招而牧之遂來謂李曰聞有紫雲者孰是因指示牧之作詩曰華堂今日綺筵開誰喚分司御史來忽發狂吟驚滿座兩行紅粉一時回意氣閒逸旁若無人裴思謙状元登科作紅牋名紙謁平康里妓因宿于里中作詩曰銀釭斜背解鳴璫小語低聲喚玉郎從此不知蘭麝貴夜來新惹桂枝香鄭谷登第後宿平康里作詩曰春來無處不閒行楚潤相㸔别有情好是五更殘酒醒耳邉聞喚状元聲楊汝士尚書鎮東川其子及第汝士開筵營妓咸集汝士命人與綾一端詩曰郎君得意正青春蜀國将軍又不貧一曲髙歌綾一匹兩頭娘子拜夫人潘逍遥與許洞錢易為友狂放不覊嘗作詩云散拽禪師來踘蹴醉拖逰女上鞦韆此其自序之實也後坐盧多遜黨亡命捕之甚急乃易姓名為僧入中條山許洞贈詩曰潘逍遥平生志氣如天高仰天大笑無所懼天公嗔爾口呶呶罰教臨老投補衲歸中條我願中條山神鎮長在驅雷逐電依前趕出這老恠后㑹赦以四門助教招之送信州安置復舞於市曰出砒霜價錢可贏得撥灰兼㺯火暢殺我以此士人不齒放棄終身並同前姚巖傑梁國元崇之裔弱冠通墳典以詩酒逰江左凌忽前達旁若無人乾符中顔標典鄱陽初剏鞠場請岩傑紀其事文成千餘言標欲刋去一兩字巖傑大怒既而標已睚眦而已勒石遂令覆碑於地以車拽之磨去岩傑以一篇寄之曰為報顔公識我麽我心唯只與天和眼前俗物闗情少醉後青山入夢多田子莫嫌彈鋏恨寗生休唱飯牛歌聖朝若為蒼生計也合公車到薜蘿盧肇牧歙州傑在婺源先以著述寄肇肇知好使酒以手書褒美之贈以束帛迎至郡齋館穀如公卿既而日肆傲睨輕視子發子發嘗以詩咤岩傑曰眀月照巴山岩傑笑曰月照天下奈何獨照巴山子發慚不樂無何㑹于江亭時蒯希逸在坐子發改令目前取一聫象子發曰逺望漁舟不濶尺八岩傑遽飲一器憑欄嘔噦須㬰節度遂令云憑䦨一嘔已覺空喉有集二十巻曰象溪子逆旅豫章不知所終雜言鍾山公鎮臨川賞牡丹有小吏手捧硯舉止有士人風公曰學詩乎曰粗親筆硯因令口占一篇其警句云三月莫辭千度醉一生能得㡬回㸔公曰他日定成器因勉令就學眀年謁嶺南李國老大加稱賞賫數百縑於金陵酒樓數日而盡醉中掛帆數百里至落星灣半醒烟雨中登水心寺題詩於水軒曰分飛南渡春風晚却返家林事業空無限離情似楊栁萬條垂向楚江東李白才思不覊有醉吟詩曰天若不愛酒酒星不在天地若不愛酒地應無酒泉天地既愛酒飲酒不愧天三杯通大道一斗合自然但得醉中趣勿為醒者傳憶賀知章曰欲向江東去定将誰舉杯稽山無賀老却棹酒船迴郡閣雅談韓魏公出鎮中山有門客夜踰墻出宿娼家公知作種竹詩以警之殷勤洗灌加培植莫遣狂枝亂出墻門客自愧作詩云主人若也憐髙節莫為狂枝贈斧斤公置一女奴贈之青瑣集詩話總龜巻三欽定四庫全書詩話總龜巻四宋阮閱撰
