front:
  text: 三十五
  hash: sha256:adc7d6d8c5ca19cde8397e95c95e8a1c58f1e4a9cba3a03e6a23bf8a6a774a77
body:
  text: 宋阮閱撰譏誚門上陳彭年大中祥符中與晁文莊内翰等四人同知貢舉省試將出奏試巻舉人壅衢觀其出省諸公皆􅆭赧其容獨彭年揚鞭自肆有驕矜之色榜出有甥不預選怒入其第會彭年未來於几上得黃勅乃題其背曰彭年頭惱太東烘眼似硃砂鬢似蓬紕繆幸叨三字内荒唐仍在四人中取他權勢欺明主落却親情賣至公千百孤寒齊下淚斯言無路達堯聰彭年怒抱其勅入奏章聖見而不恱然釋其罪江南野錄唐太宗燕近臣長孫無忌嘲歐陽率更曰聳膞成山字埋肩畏出頭誰言麟閣上畵此一彌猴詢應聲曰縮頭連背聳漫襠畏肚寒只縁心渾渾所以面團團太宗改容曰詢豈不畏皇后聞耶無忌長孫后之弟也小說舊聞唐相張延賞選壻無可意者其妻苗氏賢而知人特選進士韋臯許之臯性踈曠不拘細行延賞竊悔由是婢僕頗輕慢惟苗氏待之益厚臯因辭東遊張氏罄奩具以治行延賞幸其去以七駝物為贐臯行翌日悉還之惟留奩物及書策而已後五年臯擁節旄會徳宗幸奉天持節西川替延賞乃改姓名作韓翺人莫敢言至大囬驛去府三十里人有報延賞曰替相公者韋臯也非韓翺苖氏曰若韋臯必韋郎也延賞曰天下姓名同者甚衆彼韋生必填溝壑豈能乘吾位乎次日果韋臯也延賞慚懼自西門潜遁臯入見苖禮奉過布衣之日求前輕慢者皆杖死之時泗濵郭圍因為詩曰宣父從周又入秦昔賢誰不困風塵當時甚訝張延賞不識韋臯是貴人唐宋遺史彭齊吉州人才辯滑稽嘗謁南豐宰而不禮之一夕虎入縣㕔噬所養羊棄殘而去宰即以會客齊與焉翌日獻詩於宰曰昨夜黄班入縣齋分明踪跡印蒼苔幾多道徳驅難去些子猪羊引便來令尹聲聲言有過錄公口口道無災思量也觧開東閣留得頭蹄待秀才覧者絶倒青箱雜記景徳初河朔舉人張存任弁皆以防城得官有無名子嘲曰張存觧放旋風砲任弁能燒猛火油丘濬寺丞失意徧遊諸郡至山陽郡守屢召之夜飲翌日作詩曰醜却天下美人面正得世間君子心郡將他日再為文字飲以謝之至宜真太守室看牡丹作詩曰何事化工情愈重偏教此卉大妖妍王孫欲種無餘地顔巷安貧欠買錢曉檻競開香世界夜欄誰結醉因縁湏知村落桑耘䖏田叟饑耕婦不眠又至五羊贈大守詩曰碧睛蠻婢頭䝉布黒面胡兒耳帶環幾處樓䑓皆枕水四周城郭半圍山又詩曰階上腥臊堆蜆子口中膿血吐檳榔又詩曰風腥蠻市合日上瘴雲紅太守見之大不懌翰府名談天聖中修國史王安簡謝陽夏李邯郸黄唐鄉為編修官安簡神清冲淡唐郷刻意篇什謝李嘗戲為句豐貎閒如鶴黄吟苦似猿春明退朝録唐既平劉展江淮之亂上元間租庸使元載以吳越雖兵荒後民産猶給乃辭召豪吏分宰列邑而重歛之時人謂之白着言其役歛無名其所著者皆公然明白無所嫌避一云世人謂酒酣為白着既為刻薄之役不堪其弊則必顛沛酩酊如醉者之着也渤海髙亭有詩曰上元官吏稱剥削江淮之人皆白着唐景龍中洛下霖雨百餘日宰相不能調隂陽乃閉坊市北門卒無効􅗈溢至甚人歌曰禮賢不觧開東閣爕理惟能閉北門朝野僉載孫魴沈彬李建勲好為詩時魴有夜坐詩為衆所稱建勳因匿於齋中待彬至乃問彬云魴之詩何如彬曰田舍翁火爐頭之語何足道也魴聞而出誚彬曰何誹謗之甚而比田舍翁無乃過乎彬曰子夜坐句劃多灰漸冷坐久席成痕此非田舍翁爐上作而何闔坐大笑乃題金山寺云萬古波心寺金山名目新天多剩得月土少不生塵過櫓妨僧艇歸濤濺佛身誰言張處士題後更無人莫不服其馴雅江南野録朝元龜廬陵人嘗謁邑宰見起伏生獷欲窮以詞學因新畵屛為戲珠龍乃曰請子咏之元龜應聲而成因諷宰受賂云翻身騰白浪探爪攫胡珠毛柄聚生徒於廬山白鹿洞與諸生講論所獲貲鏹皆以市酒洞有辨者嘲云彭生作賦茶三片毛氏傳詩酒半升嘗自題於齋壁云先生不在此千載只空山因大醉一夕而逝劉炎少負詞學晚為永新尉拙於政治道有貪名太守行邑覬覦之意而炎不悟既行以詩諷炎云未到桃源時長憶出家景及到桃源了還似鑑中影炎乃和而復之後以民訴受賄遂按以法炎復有詩云早知太守如狼虎獵取膏粱以饀之羅隠性傲睨初赴舉過鍾陵見營妓雲英一絶後下第又過復見之雲英曰羅秀才尚未脫白隠以詩嘲之曰鍾陵醉别十餘春重見雲英掌上身我未成名英未嫁可能俱是不如人隠與顧雲同謁淮南相國髙駢雲為人雅律髙公遂屆雲而逺隠隠欲歸武陵與賔幕酌餞於雲亭盛暑青蠅入坐髙公命扇驅之謔隠曰青蠅被扇扇離席隠聲曰白澤遭釘釘在門偶見白澤圖釘在門扇乃譏雲也時髙公欲繼淮南王求仙方為妖亂後為畢將軍所害隠作妖亂誌以譏之故有題延和閣云延和髙閣勢凌雲輕語猶疑太一聞燒盡餘香無一事開門迎得畢將軍僖宗在蜀隠作詩數首以刺諸侯及還梁為朝貴所疾乃謁錢武肅焉獻僖宗在蜀詩曰白丁攘臂犯長安翠輦愴惶路屈蟠丹鳯有情雲外逺玉龍無跡渡頭寒静思貴族謀身易危惜文皇創業難不將不侯何計是釣漁船上淚䦨干又作僖宗還京曰馬嵬楊栁尚依依又見鑾輿幸蜀歸泉下阿瞞應有語這回休更怨楊妃鑑戒録郡閣雅談謂青蠅白澤對句是冦弱謝觀作蘇子羙監進奏院因賽神召舘中同舍是時江南人李中舍因梅聖俞謁子羙且願預此會聖俞以為言子羙曰食中不設蒸饅餅夾坐上安有國舍虞䑓李啣之遂暴其事於言語為劉元瑜所彈子羙坐謫故聖俞有客至詩云有客十人至共食一鼎珍一客不得食覆鼎傷衆賓葢指李也詩史來鵠洪州人咸平中名振都下然喜以詩譏訕當路為人所惡卒不第金錢花云青帝若教花裏用牡丹應是得錢人夏雲云無恨旱苖枯欲盡悠悠閑䖏作奇峰偶題云可惜青天好雷電只能驅趂懶蛟龍詩史唐湖州參軍陸䝉妻蔣氏善屬文然嗜酒姊妹勸節酒强食蔣應聲曰平生偏好飲勞爾勸吾飡但得樽中滿時光度不難僧知業有詩名與䝉善一日訪䝉談𤣥蔣使婢奉酒知業云受戒不飲蔣隔簾謂曰上人詩云接岸橋通何處路倚樓人是阿誰家觀此風韵得不飲乎知業慚而退濠州西有髙唐舘俯近淮水御史閆欽授宿此舘題詩曰借問襄王安在哉山川此地勝陽䑓今朝寓宿髙唐舘神女何曽入夢來有李和風者至此又作詩曰髙唐不是這髙唐淮上江南各異方若向此中求薦枕參差笑殺楚襄王丁晉公為玉清昭應宫使夏英公為判官一日賜宴齋宫優人有雜手藏擫者晉公顧英公曰古人無詠藏㩎詩請賦一章英公為一絶云舞拂挑珠復吐丸遮藏巧便百千般主公端坐無由見却被傍人冷眼看楊孺尚書以耳聾致仕居雩縣别業同里髙氏貲厚有二子小字大馬小馬一日里中社飲小馬携酒一榼就楊公曰此社酒善治聾願持盃酌之無瀝楊書絶句與之云數十年來雙耳聵可將社酒使能醫一心更願青盲了免見髙家小馬兒倦遊錄景祐初詔先朝免觧人候將來特與推恩有無名子改王元之升平詞以嘲曰舊人相見問行年便說真宗更以前但看緑袍包裹了這回冷笑入黃泉永叔在政府將引去以詩寄潁川常夷甫曰笑殺汝陽常處士披簔帶笠伴春鋤明年夷甫起授侍講判國子監有無名子改前詩作夷甫寄永叔曰笑殺汝隂歐少保新來䖏士聼朝鷄又云昔日潁隂常䖏士却來馬上聼朝鷄史流仕不得志好持人長短世以凶人目之亦終以此敗嘗過江州琵琶亭題詩云坐上騷人雖有咏江邊寡婦不難欺若使王涯聞此曲織羅應過賞花詩並同前邵安石連州人髙湘侍郎南遷歸朝途經連江安石以所業投之遂見知同至輦下湘知貢舉安石擢第詩人章碣賦東都望幸詩刺之曰懶修珠玉上髙䑓眉目連姢幸不開縦使東廵也無益君王自帯羙人來古今詩話泗州僧伽塔人多云其下真身也塔後有閣記興國中初塑事甚詳退之詩云火燒水轉掃地空則真人之焚久矣塔本般匠所建俗言塔頂為天門蘇國老有詩云上到天門最髙處不能容物只容身葢譏在位者孫皓為晉所㓕封歸命侯武帝問皓曰聞南人好作爾汝詩爾頗能否皓被酒舉觴曰昔與汝為鄰今與汝為臣勸汝一盃酒令汝夀萬春帝悔之吳武陵有文而好訐嘗以贓敗廣州吏治殊不假貸題詩路左壁曰雀兒來往颺風髙下視鶯鸇意氣豪自謂能生千里翼黄昏依舊入蓬蒿唐王鐸楊收皆薛逢同年收作相逢有詩曰湏知金印朝天客同是沙堤避路人威鳯遇時皆瑞聖應龍無水謾通神收聞之怒王鐸作相逢又有詩曰昨日鴻毛萬鈞重今朝山岳一毫輕鐸又怒羅隠與桐廬章魯風齊名錢武肅崛起以魯風善筆札召為表奏孔目官魯風不就執之後以羅隠為錢塘令懼而受命因宴獻詩云一箇禰衡容不得思量黄祖謾英雄自是始厚之馮􅌡王鎮南陽郡中宣聖廟壊有酒戸十餘輩投狀乞修瀛王未及判有幕客題四句狀後云槐影􅄁差覆杏壇儒門子弟盡髙官却教酒户重修廟覺我慚惶也不難瀛王遽罷其請出已俸重修孫僅給事鎮永興日多作詩時玉清昭應宫初成孫作驪山詩云秦帝墓成陳勝起明皇宫就禄山來有人傳於京師以為譏時政顔標咸通中鄭薫下狀元及第先是徐冦作叛薫欲激勸勳烈意標乃魯公之後故置之巍科既而詢其廟院標曰寒素京國無廟院薫始大悟有無名子嘲曰主司頭腦太冬烘錯認顔標作魯公光啟中蔣嶓以丹砂授韋中令吳人張鵠有文而貧或嘲之曰張鵠只消千駝絹蔣嶓惟用一丸丹並同前詩話總龜巻三十五欽定四庫全書詩話總龜巻三十六宋阮閱撰
