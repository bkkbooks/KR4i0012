seq: 44
front:
  text: 四十四宋阮閱撰
  hash: sha256:3dec75b407a4836e8ef2b0c8a01a65905b44d57c4f2a8dc6425334c620ee38b4
body:
  text: 隠逸門章聖遣使詔魏野仲先聞使至留詩一聮于壁而􅃍去云洗硯魚吞墨烹茶鶴避烟使還以壁間詩對章聖曰野不求仕矣遂不召古今詩話内侍孫可久賦性淡薄年踰五十即乞致仕都下居第堂北有小園城南有圃毎以小車載酒優㳺自適石曼卿甞過其居贈詩曰南北占河潤幽深在禁城叠山資逺意辭俸買閒名閉戸㫁蛛網折花移鳥聲誰人識髙意朝野石渠生栁永詩曰孫侯幽隠直城東草朩扶踈一畆宫曾珥貂璫為近侍却紆絛褐作閑翁髙吟擁鼻詩懐壮雅論深情道氣充厭盡繁華天上樂始將蹤跡學冥鴻青箱雜記劉素字仲華好學不事科舉頗通馬班陳范之書甞有人貽之詩曰不甘五等諸侯薦直恐九重天子知然卒不及仕江南野録方干處士號缺唇先生有司以唇缺不可與科名遂隠居鑑湖作閑居詩曰寒山壓鏡心此處是家林梁燕欺春醉閒猿學夜吟雲連平地起月向白波沉猶自聞鍾角棲身可在深又曰世人如不容我自縱天慵落葉慿風掃秋粳任水舂花朝連郭霧雪夜隔湖鐘身在能無事頭冝白此峰又感懐云事業不得力至今猶苦吟吟成五字句用破一生心世路屈聲滿雲溪寃氣深前賢多晚達莫怕鬢霜侵鑑戒録隠士張楚居洛陽平康之南與李衛公别第為鄰山水竒秀楚風韻髙潔衛公當軸薦為左拾遺不起後出鎮過平原往訪之楚避於山谷衛公歎恨乆之題其門曰昔日趣黄詔余慚在鳯池今來招隠士恨不見瓊枝詩史張齊賢相公司空致仕歸洛康寧福夀得晋公午橋荘鑿渠通流栽花植竹日與故舊乗小車携觴逰釣牓於門曰老夫已毁裂冠冕或公紱垂訪不敢迎見甞以詩戯故人云午橋今得晋公廬水竹烟花興有餘師亮白頭心已足四登两府九尚書慕唐李太亮為人故字師亮同前康定間益州書生張俞甞獻書朝廷天下由是知其名然不喜仕進隠於青城山白雲溪時樞宻田况守成都與詩曰深慚蜀太守不及采芝人雲齋廣録程嵩字明甫延津人初舉不第遂不肯仕場屋年八十餘甞作詩曰雖無事業傳千古却得安閒過一生同上王鼎書歌詩好神仙事逰心物外時人或謂有所得問之終不洩露詩百餘篇傳於人間五言詩贈程明甫云古縣枕前灘官閒道自安執盃山鳥唱曬藥野􅆐看石縫横琴筆槎根揷釣竿不知陶靖節早晚入雲端又贈僧云出齋􅆐獻果烹茗鳥􅋦薪又題云風落桂枝驚鶴去水流山果向人來又送僧云孤雲蹤跡都無定岀個青山入個山王易簡蕭希甫下及第名居榜尾不看榜歸華山尋就山釋褐授華州幕官後拜左拾遺又辭官歸隠留詩曰汨没朝廷愧不才誰能低折向塵埃青山得去且歸去官職有來還自來再入升朝官位諫垣䑓閣三十年官至八座乞致仕歸華山十年而終郡閣野談顧况志尚踈逸近於方外時宰招以好官况以詩答之云四海而今已太平相公何用喚狂生此身還似籠中鶴東望瀛洲呌一聲南部新書有一武士忘其姓名志樂閒散而家甚貧甞作詩曰人生本無累何用買山錢遂投檄而去古今詩話唐末蜀川有唐求放曠踈逸方外人也吟詩有所得即将藁撚為丸投大瓢中後卧病投瓢於江曰兹瓢茍不沉沒得之者方知吾苦心耳瓢至新渠江有識者曰此唐山人詩瓢也接得十纔二三題鄭處士隠居曰不信最清曠及來愁已空數㸃石泉雨一溪霜葉風業在有山䖏道成無事中酌盡一盃酒老夫顔亦紅贈如上人云不知名利苦念佛老岷峨補衲雲千片焚香篆一窠戀山人事少憐客道心多日日齋鐘罷髙懸濾水羅題青城山范賢觀數里緣山不厭難為尋真訣問黄冠苔鋪翠㸃仙橋滑松濕香梢古道寒晝旁緑畦薅嫩玉夜開紅竈撚新丹孤鐘已斷泉聲在風動瑶花月滿壇古今詩話偽蜀辛酉嵗有隠迹于陶沙者不知所從來戴破㡌携鐡笆竹畚多於觀寺閑處坐卧有又谷遇之以禮接之忽誦谷新詩數篇又詠自作詩曰九重天子人中貴五等諸侯閫外尊争似布衣雲水客不将名字掛乾坤劉槩字伯節青社人有氣節及第為幕僚一任不得志棄官隠居冨丞相器重之有詩云昔年曽作瀟湘客憔悴東秦歸不得西軒忽見好溪山如何却有楚郷憶讀書悞人四十年有時醉把䦨干拍閑居詩詁陳綯劍浦人好逰學善觧天文長於雅頌有詩曰中原莫道無麟鳯自是皇家結網疎與水曹任畹相善寓之詩曰好向明時薦遺逸莫教千古弔靈均晩絶縉紳之望以脩養為事有詩曰乾坤見了文章懶龍虎成時印綬疎又曰蟠溪老叟無人用閒把長竿抱六韜又曰近來世上無徐庶誰向桑麻識卧龍綯隠西山産藥物數十種開寶中甞見一叟角髪被褐與一鍊師舁藥入城鬻之獲貲則求鮓就爐對飲旁若無人歌曰藍采和塵事紛紛事更多争如賣藥沽酒飲歸去深厓拍手歌疑其為綯焉或云得仙矣江南野録又陳綯詩有江湖水清淺不足掉鯨尾飲水狼子瘦終日鷓鴣寒一鼎雌雄金液火十年寒暑鹿麑衣寄語東流任斑鬢向隅終守鐵蓑衣詩如此不可殫紀北梦𤨏言史虚白本山東人唐晋之間中原多事見李昪屢陳治要而不用遂隠廬山璟徙南昌至星子渚召問曰處士隠居必有所得曰近得漁父一聮令課之曰風雨掲卻屋全家醉不知璟變色時世宗已下淮南江南野録冦豹不知何許人與謝觀同在唐崔裔孫相公門下以詞藻相尚謂觀曰君白賦有何佳語對曰曉入梁王之苑雪滿羣山夜登庾亮之樓月明千里豹唯唯觀大言曰僕已擅名海内子才調多胡不作赤賦豹未搜思厲聲曰田單破燕之日火燎平原武王伐紂之時血流漂杵觀大駭豹後不仕隠南嶽許堅不知何許人遇酒筵不問尊卑逺近必到乗興只三五盃便去性嗜魚将魚火上旋炙熟處即吃生處復炙殊不去其鱗腸毎和巾帶入溪澗内浴度目浸身出水即於風日中坐候乾其衣服多有黤氣人惡之或有人與物忻然而受将散與貧者多於夢中吟詩宿溧陽縣靈泉精舎僧出白字韻請留詩其僧對榻見熟睡至晚起出七言詩云近枕吴溪與越峰前朝恩錫雲泉額竹林晴見鴈塔髙石室曾棲幾禅伯荒碑字没秋苔深古池香泛荷花白客有經年别故林落日啼􅆐情脉脉太平興國九年自茅山再逰廬山於方先生房内安下至夜深常與數人談笑人疑聴堅已知之髙聲云不得來不得來今在洪州西山或吉州玉笥山郡閣雅談韓退絳州人放誕不拘常跨一白驢有詩云山人跨雪精上便不論程嗅地打不動笑天休始行為人所稱好着寛鶴氅醉則鶴舞石曼卿贈詩曰醉狂𤣥鶴舞閒卧白驢號閉居詩話王兾公鎮金陵以書致錢塘講師遵式式将謁公過林逋逋以詩送云虎牙熊軾隠鈴齋棠樹隂隂長碧苔丞相望尊賔謁少清言應喜道人來同前謝逸字無逸臨川勝士也工詩能文魯直讀其詩曰是張流也恨未識也無逸詩曰老鳯垂頭噤不語枯朩槎牙噪春鳥又曰貪夫蟻旋磨冷官魚上竿又曰山寒石髪瘦水落溪毛凋皆為魯直稱賞朱世英以八行薦入學不得已謝之信宿而還所居溪堂生涯如龎藴余甞過之小君方炊稚子宗野汲井無逸誦書掃除顧余放箒大笑曰聊復爾耳余作偈曰老妻營炊稚子汲水龎公掃除丹霞適至棄掃迎門一笑相視不必靈照多通道理朱世英亦作偈曰提藍靈照掃地謝公一般是麫做作不同不假語黙通透玲瓏更若未㑹換手槌胸冷齋夜話神仙門上陳希夷先生毎睡則半載或數月近亦不下月餘贈金勵睡詩曰常人無所重惟睡乃為重舉世皆為息魂離神不動覺來無所知貪求心愈動堪笑塵中人不知夢是夢又曰至人本無夢其夢本逰仙真人本無睡睡則浮雲烟爐裏近為藥壺中别有天欲知睡夢裏人間苐一𤣥又甞題石水澗曰銀河灑落翠光冷一𣲖回環湛晚暉幾恨却為頑石碍琉璃滑處玉花飛又冬日晚望云山鬼煖或呼溪魚寒不跳晚景愈堪觀危峰露殘照題西峰曰為愛西峰好吟頭盡日昂嵓花紅作陣溪水緑成行幾夜碍新月半山無夕陽寄言嘉遯客此處是仙郷又華山曰半夜天香入巖谷西風吹落嶺頭蓮空愛掌痕侵碧漢無人曽嘆巨靈仙又與毛女逰曰藥苖不滿笥又更上危顛回指歸去路相将入翠烟又曰曽折松枝為寳櫛一作髻又編栗葉作羅襦有時問着秦宫事笑撚仙花望太虚翰府名談又先生唐徳宗時至僖宗封清虚處士賜宫女三人先生貯之别室以詩謝云雪為肌體玉為腮深謝君王送到來處士不生巫峽夢虚勞雲雨下陽䑓章聖累召不起有學士譏之曰秪是先生詔不出若還詔出一般人先生答曰萬頃白雲獨自有一枝仙桂阿誰無后歸華隂令王睦令飲之起寝於溪岩先生為詩曰華山髙處是吾宫出即凌空跨晚風䑓殿不将金鎻閉來時自有白雲封睦得詩愧謝青𤨏集張洎家居城外有一隠士名乃吕仙翁姓名洎倒屣見之索紙筆八分書七言詩一章留與洎頗言将作鼎鼐之意其末白云功成當在破𤓰年俗以破𤓰字為二八洎六十八而卒乃其䜟也仙翁詩多傳人間有自詠云朝逰北海暮蒼梧袖裏青蛇膽氣麄三入岳陽人不識朗吟飛過洞庭湖又有飲海龜児人不識燒丹符子鬼難看一粒粟中藏世界二升鐺裏煑山川之句大抵皆詞句竒怪世所傳百餘首人多誦之談苑道士馬自然有異術飲酒至一石不醉人有疾以雜草朩揉碎呵與人食無不瘥毎自吟曰昔日曽隨魏伯陽經時醉卧紫金牀東君過我多情懶罰向人間作酒狂廣明中梓州上升續本事集更有二首詩其一曰省悟前非一息間更抛人世棄塵寰徒誇羙酒如瓊液休戀嬌娥似玉顔含笑謾教心思苦别離還使鬢毛斑雲中幸有堪歸路無限青山是我山其二曰何用燒丹學駐顔閙非城市静非山時人若覔長生藥對景無心是大還詩史殷七七有異術過潤州與客飲云某有一藝有歡即顧屏上畫婦人曰可歌陽春曲婦人應聲遂歌其音清亮似從屏中出歌曰愁見唱陽春令人離腸結郎去未歸家栁自飄香雪如此者十餘曲同前吕仙翁名嵓字洞賔本闗右人咸通初舉進士不第巢賊為梗携家隠於終南山學老子法絶世辟榖變易形骸尤精劍術今往往有人於關右途路間與之相逢多不顯姓名以其趍舎動作異於流俗故為人所疑又為篇詠章句間洩露其意甞有詩送鍾離先生云得道來來相見難又聞東去幸仙壇杖頭春色一壺酒頂上雲攅五岳冠飲海龜児人不識燒山符手鬼難看先生去後應難老乞與貧儒換骨丹贈薛道士云落魄薛道士年髙無白髭雲中卧看石雪裏去尋碑誇我吃大酒嫌人念小詩不知甚麽漢一任軰流嗤雅言雜載又先生唐僖宗時人避冦亂多逰湖湘間或梁魏之地甞逰大雲寺與寺僧多唱和僧有詩贈翁翁乃依韻和曰三千里外無家客七百年前雲外身行滿蓬莱為别館道成瓦礫是黄金待賔榼裏甞存酒化藥爐中别有春積徳求師何患少由來天地不私親一日逰寂蕳觀淬劍於石作詩贈道士侯日晦曰欲整鋒鉛散彈勞凌晨開匣玉龍嘷手中氣岸氷三尺石上精神蛇一條姦血㸃流隨水盡兇膏今逐漬痕銷削除浮世不平事與爾相将上九霄甞逰長沙智度寺贈僧惠覺詩曰逹者推心兼濟物聖賢傳法不離真請師開訴西來意七祖如今未有人臨行題壁上云唐室進士今時神仙足閗紫霧却歸洞天衆方知其為吕仙翁也摭遺宿州天慶觀西廡下有石刻二詩盖至道中有賣墨人甞逰於此一日題詩曰秋景蕭蕭葉亂飛庭松影裏坐移時雲迷鶴駕何方去仙洞乾元失我期又曰肘傳丹篆千年術口誦黄庭两巻經鶴觀古壇槐影裏悄無人跡户長扄或以為名吕仙翁詩也古今詩話岳陽樓有碑極大乃李觀記吕仙翁筆迹李知賀州日有道士相訪自云吕先生誦過岳陽詩云唯有城南老樹精分明知道神仙過李亦不曉後知岳州有白鶴寺僧見過道及吕仙翁甞憇扵寺前松下有老人自松梢冉冉而下致恭於先生之前曰某松之精也今見先生過禮當致謁吕書一絶於寺壁而去獨自行來獨自卧無限世人不識我唯有城南老樹精分明知道神仙過後郡守為創亭於松下名曰回先生云古今詩話孟嘏連山人性落魄狂溺於歌酒賦詠後捷名不欲止江左士人頗竒之贈史虚白云詩酒獨逰寺琴書多寄僧聖朝奄有金陵孟賔于先居連上嘏興國中亦自吉水還故郷逾年卒書生成務崇因言廬山與嘏有忘年之分興國中見嘏且言自連上來㳺江左時有詩送成務崇曰同呼碧嶂前已是十餘年話别非容易相逢不偶然多為詩酒役早免利名牽幸有歸真路何妨學上𤣥務崇詢於連上知交皆言嘏卒已十餘年矣雅言雜載許堅江左人為性踈野似非今之人年髙絶不知晚人事少言人不問終日不啟口多居三茅山不知年嵗形容不變好飱魚能為詩多談神仙事題茒山觀曰甞恨清風千載欎洞天今得恣逰遨松楸古色玉壇静鸞鶴不來青帝髙苐氏幷寒丹已化𤣥宗碑㫁夢仍勞分明有箇長生路休向紅塵歎二毛早年堅以時事干江南李氏人訝其狂戇以為風恙莫與之禮一絶上舎人徐鉉云幾宵烟日鎻樓䑓欲寄侯門薦禰才滿面塵埃人不識謾隨流水出山来因拂衣歸隠今尚在隠迹江淮間沈廷瑞寄食閣皂山舉作異俗軰盛夏向火嚴寒单衣問其故終不荅與袁州陳智周相善興國中無病卒于玉笥觀數年有人於江筠路次見廷瑞共語乆之令人将詩寄智周智周得詩甚訝馳出門求送詩者已不知所在詩曰名山相别后别後㑹難期金鼎銷紅日丹田老紫芝訪君雖有路懐我豈無詩休羡繁華事百年能幾時智周於端拱二年登第授衡陽尉卒同前沈道士筠州髙安人故吏部郎中彬第二子也性孤僻形貌秀徹初名有鄰棄妻入道居玉笥山易名廷瑞毎遇深山古洞日不返嚴寒風雪常单衣危坐或絶食經月或縱酒行歌縁峭壁升喬朩若猿猱之状骨肉相尋便却走避忘情混俗人莫測之往往為同道者困雍熈二年正月内扵玉笥山先不食七日至上元日甲辰辭道侣歸所居院集仙亭念人生幾何賦無病而終遺言於弟子将畫者土宿一幀度人經一巻隨𦵏後二年二月二十日有閣皂山僧昭瑩於山門數里相遇且閣皂山相去玉笥山一百六十里僧昭瑩問所往云暫别廬山尋知已留下土宿一幀及度人經一巻五言詩一首為别云南北東西路人生㑹不無早曽依閣皂又却上𤣥都雲片隨天濶泉聲落石孤何期早相遇藥共煑菖蒲後昭瑩到玉笥山話及方知沈道士已亡具說途中相遇并所留土宿及經詩示于人衆皆駭異遂往墳上看見土交横拆裂闊及尺餘至今不敢發質其文驗其事即屍觧而去郡閣雅談張白邢州人少應進士舉不及苐入道常挑一鐡葫蘆得錢便飲酒自稱白雲子註天尊升𤣥護命經著武陵春色三百首略一两篇云武陵春色好十二酒家樓大醉方回首逢人不舉頭是非都不采名利混然休戴個星冠子浮沉逐世流贈酒店崔氏一絶云武陵城裏崔家酒地下應無天上有南逰道士飲一回卧向白雲深洞口又哭陸先生一絶云六親慟哭還復蘇我笑先生淚箇無脫履定歸天上去空墳留入武陵圖忽一日稱患至夜閉户曉不開問之不應道衆訝之抉門見血滿地問之别無所苦嘱身後勿燒焚尋時而卒酒户崔氏出朩櫃而𦵏扵武陵城西經半年有鼎州官忘其名在楊州勾當公事遇扵酒肆同盃數日衆聞之道俗看驗其墳有一穴如椀大深透其棺敲之已空陳省躬金陵人扵偽朝頗厯政事顯徳中出為臨川宰泛舟闕下道經章江泊女児浦抵暮有書生不通姓名登舟求見與省躬語論甚竒問今晋朝苐幾帝省躬具以實對㣲笑而已坐間髙吟云西去長沙東上船思量此事已千年長春殿掩無人掃滿眼梨花哭杜鵑省躬疑是神仙再拜告問無言而退出船不見所之吴含靈江西人也為道士居南岳六七年俗呼為吴猱好睡經旬不飲食常言曰人若要閑即湏嬾如勤即不閒也素不攻文偶作上升歌甚竒絶云玉皇有詔登仙職龍吐雲兮鳯着力眼前驀地見樓䑓異草竒花不可識我向大羅觀世界世界只如指掌大當時不為上升忙一時提向瀛洲賣清泰年羽化後有客人扵乾祐中在嵩山見之許鵲真人唐末逰南岳招仙觀壁上題歌一首云洪爐烹鍜人性命器用不同分皆定妖精鬼魅閗神通只自干邪不干正黄口小児初學行唯知日月東西生還為萬靈威聖力移月在南日在北玉是玉兮石是石藴棄深泥終不易鄧通餓死嚴陵貧帝王豈是無人力丈夫未逹莫相侵攀龍附鳯損精神題後數日上昇李夢符不知何許人梁開平初鍾傳鎮洪州日與布衣飲酒狂吟放逸甞以釣竿懸一魚向市肆蹈漁父引賣其詞好事者争買得錢便入酒家其詞有千餘首傳于江表略其一两首云村寺鐘聲渡逺灘半輪殘月落前山徐徐撥棹却歸灣浪叠朝霞錦綉翻又曰漁弟漁兄喜到來婆官賽了坐江隈椰榆杓子木瘤盃爛煑鱸魚滿案堆察考取状答曰揷花飲酒何妨事樵唱漁歌不碍時遂不敢復問或把氷入水及出身上氣如蒸鍾氏亡亦不知所在俱同前伊用昌逰江浙間散誕放逸不拘細謹善飲毎醉行歌市中其言皆物外汗漫之辭似不可曉亦能為詩留題閣皂觀云花洞門前吠似雷險聲流㫁俗塵埃雨噴山脚毒龍起月照松梢孤鶴回羅幕秋髙添碧翠畫簾時捲對樓䑓两壇詩客何年去去後門關更不開後入湖南謁馬氏時方設齋獨不請用昌自造之㩀其坐洎食畢則大聲吟詩云誰人能識白元君上士由來盡見聞避世早空南火宅植田髙種北山雲雞能抱卵心常聴蟬到成形殻自分學取大羅些子術免教松下作孤墳詩畢拂衣而起衆訝竒異乃逼問無對出門不見雅言雜載石恪西蜀人善畫尤長於山水禽魚亦工歌詩言論粗暴多誚人短開寶中王師下西蜀遣名畫入京恪在其數宣於相國畫壁工畢上状乞歸奉勑任便出京卒於道中雍熈元年殿直雷承昊奉命來衡陽風土殊俗恪痛勉之為七言詩送承昊天暮與恪宿于公舎逹曉分携承昊行經數里思恪已卒數年􅃍出所贈詩多言衡陽風物其詩曰衡陽去此正三年一路程途甚坦然深䆳門墻三楚外清風池舘五峰前西邉市井來商客東岸汀洲簇釣舩公退只應無别事朱陵後洞看神仙及到任公宇一如恪言詩章好事者争傳之同上黄覺仕宦不遂意送客都門外至則客已逺不及旅舎中見一道士在側因取所携酒肉呼道士共飲食之既罷道士舉杯摭水寫吕字覺始悟其為吕洞賔道士曰明年江南相見覺果得江南官及期見道士出俵大錢七文其次十文又小錢三文曰數不可益也予藥可數寸許告曰嵗旦以酒磨服之可保一嵗無疾覺如其言至七十餘藥亦将盡作詩曰床頭厯日無多字屈指明年七十三果以是嵗終貢父詩話咸通中有進士張綽下第逰江淮養氣耽竒只以爐火為事題壁曰争那金烏何欲上飛不住紅爐謾燒藥玉顔安可駐今年花落枝明年花滿樹不如且飲酒莫管流年度人異之不喜粧餙多糜旗亭而好盃人召飲若遂意則索紙剪蝴蝶三十二以氣吹之成列而飛如此累刻以指收之俄皆在手見者求之即以他事為阻甞逰塩城多為酒困非類相競留繫邑中醒乃課述為陳情二章獻狄令乃釋之詩云門風長有蕙蘭馨鼎族家傳覇國名容貌静懸秋月彩文章髙振海濤聲訟堂無事調琴軫郡閣何妨醉玉觥今日東流橋下水一條從此鎮長清自後宰欲傳其術張云明府勲貴家流年少而宰劇邑多聲色犬馬之求未暇忘味𤣥奥因贈詩云何用梯媒向外求長生只在内中脩莫言大道人難得自是行心不到頭去之日乘醉因求搗網紙剪二鶴於㕔前俄而翔飛乃曰汝先去吾即後來時狄令亦醉其所題云自不㑹天下經書在腹内身却騰騰處世間心即逍遥出天外江南好事者尚記上升時事桂林聚談崔存字存中博州博平人因逰王屋見二人坐於水濵存曰願聞二仙名號東坐曰豈不知世有石曼卿乎西坐者即蘇舜欽子羙也存曰世傳學士為鬼仙矣曼卿曰甚哉二三子之妄也夫純陽即仙純隂即鬼升於天者為仙沉於幽者為鬼處於中者為人既為仙又為鬼乎存曰願得一語以救塵骸曼卿作詩曰牛毛麟角成真少莫道從來是壮夫龜鶴性靈終好道神仙言語不闗書不将青目觀浮世都把仙春駐玉壺寄語世人無妄語髙真幽鬼適殊途子羙作詩曰宿植靈根何太早洞悟真風正年少常令丹海飛日烏又使玉液朝元腦崑䑓氣候四時春紫府光隂夜如曉來時不用五雲車跨着清風下蓬島湏㬰有翠鳥飛下㗸書置於二子前子羙曰瀛洲有召遂飛踰山頂而去摭遺詩話總龜巻四十四欽定四庫全書詩話總龜巻四十五宋阮閱撰
