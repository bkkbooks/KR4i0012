body:
  text: 雅什門上王安國平南作詩多使酒樓語宋次道曰楊文公詩有酒樓江南堤栁拂人頭李白題詩遍酒樓錢昭度亦有一酒樓長憶錢塘江上望酒樓人散雨千絲今子詩有㡬酒樓次道曰吾詩有二酒樓九江琵琶亭云夜泊潯陽宿酒樓琵琶亭畔荻花秋雲沉鳥没事已徃月白風清江自流又送客西陵云若耶溪畔醉秋風獵獵船旗照水紅後夜錢塘酒樓上夢魂應遶浙江東青箱雜記西方琥東州人鄭毅夫榜登第期集處告毅夫曰榜中琥最少年乞作探花郎毅夫云已差二人琥曰此無定員添一員何損公吏曰前日琥第三甲合出鋪地錢二十緍若作職事則不出錢琥曰願出錢毅夫從其請琥已受符不出緍毅夫切責之而倍其罰琥白毅夫曰晩進未嘗工詩願狀元先爲之以爲楷式毅夫曰緑袍不怕露痕濕直入閙花深處來他日復見毅夫曰一見雅詩不敢下筆翌日當再進詩願公代之毅夫復云朝來已與碧桃約留住春風不放歸聞者歎服翰府名談成都慈光寺尼乘舟夜行一篇亦佳云水色連天色風聲益浪聲旅人歸思苦漁父夢魂驚舉棹雲先到移舟月逐行旅吟詩句罷猶見逺山横京師曹氏家藏阮步兵詩一巻唐人所書與世所傳多異有數十首集中所無其一篇云放心懷寸陰羲和將欲冥揮袂撫長劔仰觀浮雲行雲間有立鵠抗首揚哀聲一飛冲青天彊世不再鳴安與鶉鷃徒翩翩戲中庭又云嘉木不成蹊東園損桃李秋風吹飛雀零落從此始孫巨源見之云此詩工夫不少遂刻之於石吳人方子通作古栢詩云四邊喬木盡兒孫曽見吳宫㡬度春若使當時成大厦也應隨例作埃塵又作灔澦堆詩湍流怪石碍通津一一操舟若有神自是世間無妙手古來何事不由人舒王見而竒之雲齋廣録舒王得請金陵寓定力院題一絶於壁間云溪北溪南水暗通隔溪遙見夕陽舂思量諸葛成何事只合終身作卧龍天聖中禮部郎中孫冕刻三英詩劉元載妻詹茂光妻趙晟之母早梅寄逺惜别三詩劉妻哀子無立詹妻留夫侍母病趙母懼子逺遊孫公愛其才以取之早梅詩云南枝向暖北枝寒一種春風有兩般憑仗高樓莫吹笛大家留取倚䦨干寄逺詩云錦江江上探春回消盡寒冰落盡梅爭得兒夫似春色一年一度一歸來惜别詩云煖有花枝冷有冰惟人沒後却無憑預愁離别苦相對挑盡漁陽一夜燈金華瀛洲集又摭遺記梅花詩是女仙題蜀州江梅閣王元字文元桂林人苦吟風月終於貧病妻黄氏共持雅操每遇得句中夜必先起燃燭供具紙筆元甚重之有聽琴詩曰拂琴開素匣何事獨顰睂古調俗不樂正聲公自知寒泉出澗澁老檜倚風悲復有來聽者誰堪繼子期好事者畫爲圖郡閣雅談僧虛中宜春人㳺瀟湘山與齊已顧栖蟾爲詩友住湘江西宗成寺潭州馬氏子希振侍中好事每出即延納於書閣中好燒柴火烟皆彩翠去後復節題馬侍中池亭云嘉魚在深處幽鳥立多時集首寄華山司空圖侍郎云門徑放莎埀往來投刺希有時開御札特地掛朝衣岳色僧傳去天香鶴帶歸他時周召作無復更衰微司空侍郎有詩言懷云十年華岳峰前住只得虛中一首詩同前唐大清宫使翰林學士錢起多作佳篇人收起詩不過百首有錢䝉仲得江行無題一百絶皆人家藏本所無有云霽雲踈有葉雨浪細無聲穩放扁州去江天自有程又憔悴異靈均非讒作逐臣如逢漁父問未是獨醒人又烟渚復烟渚畫屛連畫屛引惹天末去數㸃暮山青又隄壞漏江水地抝成野塘晚荷從不折留取作秋香詩史􅁠常侍題山寺曰萬葉風聲利一山秋氣寒曉霜浮碧瓦薄日度朱欄又得即高歌失即休多悲多恨謾悠悠今朝有酒今朝醉明日愁來明日愁王駕大順中擢第爲禮部員外郎棄官號守素先生與司空圖鄭谷爲詩友所爲詩少傳者晴景一篇最佳云雨前不見花間葉雨後全無葉底花蜂蝶飛來過墻去應疑春色在人家栁彦塗塞上云鳴􅐴直上㡬千尺天静無風聲更乾碧眼胡兒三百騎盡提金勒向雲看都下好事者畫為圖歐陽文忠公酷愛鮑溶詩山中寒思一篇最佳云山深多悲風敗葉與秫齊門逕非世路何人念窮棲哀風破山起夕雪悞鳴雞巢鳥侵旦出饑猿無聲啼辰興動煙火開雲伐冰溪老木寒更瘦陰雲晴亦低我負自力永顔色常低迷時想靈臺下逰子正悽悽文忠晩得恨見之遲今人少愛溶詩者閩人謝伯初字景山天聖景祐之間以詩知名余謫夷陵景山爲許州法曹以長韻見寄頗多佳句有云長官山色江波緑學士文華蜀錦張余答曰參軍春思亂如雲白髪題詩愁送春葢景山有多情未老頭先白野思到春亂如雲之句故余此戲之景山詩頗多如自種黄花添野景旋移高竹聽秋聲園林換葉梅初熟池舘無人燕學飛皆無愧唐賢仕宦不偶終以困窮而卒其詩因録於此云江流無險似瞿塘滿峽猿聲斷旅腸萬里可堪人謫宦經年應合鬢成霜長官山色江波緑學士文華蜀錦張異域化爲儒雅俗逺民争識校讎郎才如夢得多爲累情似安仁久悼亡下國難留金馬客新詩傳與竹枝娘典辭縣待脩青史諌草當留集皁嚢莫爲明時輕譴謫便將纓足濯滄浪歐陽公詩話鄭相綮牧廬州日以詩酒爲娛題郡齋曰九衢塵裏一書生多幸逢時擁斾旌醉裏眼開金使字紫旂風動耀江明後代者薛沆郎中到郡題藏舟浦花一聨云也知别有風光主蓓蕾枝枝似去年又别後寄席中三蘭三人名中並曰蘭淮淝兩水不相通隔岸臨流望向東千顆淚珠無寄處一時彈與渡前風鄭多佳句如凍瓶粘柱礎宿火䧟爐灰人皆稱之南郡新書廖凝字熈績善吟諷有學行隱居南岳三年江南受僞官爲彭澤令遷連州刺史與昇平李建勲爲詩友相善有集葢見行於世咏中秋月與聞蟬爲絶唱中秋月云九十日秋色今宵已半分孤光吞列宿四面絶微雲衆木排疎影寒流叠細紋遙遙望丹桂心緒正紛紛聞蟬云一聲初應候萬木已西風偏感異鄉客先於離塞鴻日斜金谷静雨過石城空此處不堪聽蕭條千古同凝居南岳韋鼎有詩贈曰君與白雲鄰生涯久忍貧姓名高雅道寰海許何人岳氣秋來早亭寒果落新㡬回吟石畔孤鶴自相親初宰彭澤有句云風清竹閣留僧宿雨過莎庭放吏衙解印有句云五斗徒勞謾折腰三年兩􅁂爲誰焦今朝官滿重歸去還挈來時舊酒瓢江左學詩者競造其門劉禹昭字休明婺州人少師林寛爲詩刻苦不憚風雪詩云句向夜深得心從天外歸言不虛耳懷蕭山隱者云先生入太華杳杳絶良音秋夢有時見孤雲無處尋神清峰頂立衣冷瀑邊吟應笑干名者六街塵土深嘗與人論詩曰五言如四十箇賢人亂着一字屠沽輩也覔句者若掘得玉匣有底有葢但精求必得其寶在湖南累爲宰後卒於桂府幕有詩行於世郡閣雅談廖融字元素隱於衡山與逸人任鵠王正巳凌蟾王元皆一時名士爲詩相善湘守楊徽之代歸闕枉道出南岳宿融山齋留詩曰清和春尚在歡醉日何長谷鳥隨柯轉庭花奪酒香初晴巖翠滴向晚樹陰凉别有堪吟處相留宿草堂融贈天台逸人云移檜託禪子攜家上赤城拂琴天籟寂欹枕海濤生雪白寒峰晩鳥歌春谷晴又聞求桂檝載月十洲行又題寺古檜云何人見植初老對梵王居山鬼暗棲托樵夫難破除聲高秋漢迥影倒月潭虛盡日無僧遶清風長有餘夢仙謠云琪木扶疎繫辟邪麻姑夜宴紫皇家銀河旌節搖波影珠閣笙簫吸月華翠鳯引逰三島路赤龍齊别五雲車星稀猶倚虹橋立擬就張騫搭漢槎退宫妓云神仙風格本難儔曽從前皇翠輦逰紅躑躅繁金殿暖碧芙蓉笑水宫秋寶車鈿剥陰塵覆錦帳香銷畫燭幽一旦也衰歸故里月明猶夢按梁州左司諌張觀過衡山留詩曰未向漆園爲傲吏定應明代作徴君家傳奕世無金玉樂道經年有典墳帶雨小舟横别澗隔花幽犬吠深雲到頭終爲蒼生起休戀耕煙楚水濵融卒刺史何承矩葬之進士鄭鉉志其墓劉相公鄴因白令公維持方入翰苑仍賜及第爲同列所輕因作詩曰曽是江波埀釣人自憐深厭九衢塵浮生漸老年隨水往事曽聞淚滿巾已覺逺天秋色動不堪閒夜雨聲頻多慚不是相如筆虛直金鑾接侍臣待漏院吟曰玉堂簾外燭遲遲明月初時契勘時閒聽景陽鍾盡處兩鶯飛上萬年枝才調清高終秉鈞衡盧懷杼情薛尚書釗爲河東從事乞假歸寜題候舘曰僕帶彫弓馬似飛老萊衣上着戎衣郵亭不暇吟山水塞外經年皆未歸後鎮徐州咏栁曰高出軍營逺映橋曽逢兵火一時燒風流性在終難挫暖日還生萬萬條又有雅句坐久僕頭出語多僧齒寒南部新書吳門陸暢郎中嘗和人雪詩落句曰天人寧底巧剪水作花飛又出齋看月云野性平生惟好月新晴半夜覩嬋娟起來自襞書窗破恰漏清光落枕前後因雲安出降百僚舉暢爲儐相奉詔作催妝詩云雲安公主貴出降五侯家天母看調粉日兄憐賜花催鋪百子帳待障七香車借問妝成未東方欲晩霞古今詩話潘閬歸錢塘云久客見華髪孤棹桐廬歸新月無朗照落日有餘輝漁浦風水急龍山烟火㣲時聞沙上鴈一一皆南飛人謂不减劉長卿同前韋承貽咸通中䇿試夜潛紀長句於都堂南壁云裒衣博帶滿塵埃獨上都堂納巻回蓬巷㡬時聞吉語棘籬何日却重來三條燭盡鐘初動七轉丹成鼎未開殘月漸低人擾擾不知誰是謫仙才又云白蓮千朶照廊明一片昇平雅韻聲才唱第三條燭盡南宫風月畫難成同前徐休雅長沙人因馬希範夜宴迎四儀夫人賦詩云雲路半開千里月洞門斜掩一天春又作宫詞云内人曉起怯春寒輕揭珠簾看牡丹一把栁絲收不得和風搭在玉欄杆曽獻家宴堂十首時稱冠絶郡閣雅談文宗詔禮部侍郎高鍇作貢舉試霓裳羽衣曲詩時宗子李肱詩最佳詩曰開元太平時萬國賀豐歲梨園獻小曲玉座流新製鳯管勞參差霞衣覺搖曳宴罷水殿空輦餘芳草細蓬壺事巳久仙樂功無替詎肯聽餘音聖明知善繼撫州蔡牧嘗作責四皓詩云秦末家家思逐鹿商山四皓獨忘機如何􅁂髪霜相似更出山來定是非及假節交邕道經湖口零陵太守鄭史同年也逺以酒樂相迎坐有瓊枝者守之所愛奪之而去洎中興頌下僶俛不前久之到邕御制失律伏法湘川􅁠厝二子延近終䘮而逝論者謂妄責四皓而欲買山於浯溪之間不徒言哉方干為人質野每見人設三拜曰禮數有三識之者呼為方三拜貌寢又免缺有司以故不與科名隱㑹稽鏡湖其别業詩云寒山壓鏡心此處是家林梁燕窺春醉嵒猨學夜吟雲連平地起月向白波沉猶自聞鐘角棲身可在深又云世人如不容吾自縱天慵落葉憑風掃香秔倩水舂花朝連郭霧雪夜隔湖鐘身外能無事頭宜白此峰寄清越上人云窓接停猿樹嵒飛洗鶴泉送姚員外赴金州云野烟新驛曙殘照古山秋樹勢連巴沒江聲入楚流鍊句字字無失有髙堅峻拔之目自咸通得名迄文徳江之南未有及者張蠙清河人登乾寕進士為犀浦令王建開國拜登膳部員外郎後為金堂令王衍與徐后逰大慈寺見壁間書墻頭細雨垂纎草水面風回聚落花愛之知為蠙句給札令以詩進蠙進二百首衍頗重之其登單于臺詩曰白日地中出黄河天上來尤為世所稱王審知據閩黄滔為其判官幕府應用文及塔廟碑碣半出其手為詩清淳丰潤有貞元長慶風槩如寺寒三伏雨松偃數朝枝又有青山寒帶雨古朩夜啼猨又如聞雁云一聲初觸夣半白已侵頭裴説旅次衡陽詩云欲往㡬經年今来意豁然江風長借客嶽雨不因天戲鷺飛輕雪驚鴻叫亂烟晚秋紅藕裡十宿寄漁舡嘗以所業十九首為行巻来年秋賦復行舊巻云前十九首尚無見知何假别行巻哉李洞唐諸王孫嘗慕賈浪仙為詩鑄銅像其儀事之如神詩數百篇皆絶唱贈司空侍郎云馬饑食落葉鶴病曬殘陽又有捲箔青溪月敲松紫閣書送僧云越講迎騎象蕃齋懴射雕贈髙僕射云征南破虜漢功臣提劍歸来萬里身閒傍凌雲金柱看形容消痩老于真送人歸日本云島嶼分諸國星河共一天人但誚其僻澀而不知貴其竒峭唯吴子華深知之子華才力浩大八面應敵以百篇示洞洞曰大兄所示百篇有一聨絶唱新亭曰暖􅃞魚遺子晴逰鹿引麛子華不怨所鄙而喜其所許周賀少從浮屠法名清鍳遇姚合而返初與賈島無可齊名島哭栢巖禪師曰苔覆石牀新師曽占㡬春寫留行道影焚却坐禪身塔院闗松雪房廊露隙塵自憐雙淚下不是解空人賀詩曰林逕西風急松枝講妙餘凍鬚亡夜剃遺偈病時書地燥焚身後堂空着影初此時頻下淚曽有到吾廬同前孟賔于蟠溪懷古云良哉吕尚父深隱始歸周釣石千年在春風一水流松根盤蘚石花影卧沙鷗誰更懷韜術追思古渡頭又懷連上舊居云閒思連上景難齊樹遶仙鄉路遶溪明月夜舟漁父唱春風平野鷓鴣啼城邊寄信歸雲外花下傾盃到日西更憶海陽埀釣侣昔年相遇草萋萋雅言系述曹鄴字業之桂林人爲四怨三愁五情詩其怨云庭花已結子岩花猶㺯色誰令生處逺用盡春風力其愁云别家􅁂未生到城鬚似髪朝朝臨水望㶚水不入越其情云空城野雀饑咬咬復飛飛勿恡官倉粟官倉無空時爲舍人韋慤所知力薦於主司乃中第看牓日謁主司云一辭桂嵓猿九泣都門月年年孟春至看花不如雪杏園宴上呈同年云賢路非在天十年行不至一旦公道開青雲在平地又云故衣未及換尚有去年淚又云永持共濟心莫起胡越意劉章子克明江左人事湖南馬氏有蒲鞋詩云吳江浪浸白蒲春越女初挑一様新纔自繡窗離玉指便隨羅襪上香塵石榴裙下從容久玳瑁筵前整頓頻今日高樓鴛瓦上不知抛擲是何人黄損連山人作公子行云春草緑綿綿驕驂驟暖煙㣲風飄樂韻半日醉花邊打鵲抛金盞招人舉玉鞭田翁與蠶婦平地看神仙又出山吟云來書初出白雲扄乍躡秋風馬走輕逺近留連分岳色别離嗚咽亂泉聲休將巢許争喧雜自共伊皋論太平昨夜細看雲色裏進賢星座甚分明並同前詩話總龜巻十欽定四庫全書詩話總龜巻十一宋阮閲撰
