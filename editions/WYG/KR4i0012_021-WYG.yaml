body:
  text: 留題門澧陽道旁有甘泉寺因莱公丁謂曽留行記從而題詠者甚衆碑牌滿屋孫諷有平仲酌泉曽頓轡謂之禮佛遂南行髙䑓下瞰炎荒路轉使髙僧薄寵榮人皆傳道余獨恨其語無别自古以直道見黜者多矣豈皆貪寵榮者哉又有人云此泉不洗千年恨留與行人戒覆車害理尤甚萊公之事亦例為覆車乎因過之偶為數韻其間有云已憑静止鑑忠精更遣清冷洗讒啄盖指二公也䂬溪黄州麻城縣界有萬松亭連日行清隂中其館亭亦可愛適當關山路徃來留題無數東坡傷來者不嗣其意嘗有詩云十年栽種百年規好徳助人無我儀又云為問㡬株能合抱殷勤記取角弓詩中壊嘗徹碑有士題云舊韻無儀字蒼髯有恨聲不可録䂬溪張祜喜遊山而多苦吟凡所歴僧寺徃徃題詠如題僧壁云客地多逢酒僧房却厭花題萬道人禪房云殘陽過逺水落葉滿踈鐘題金山寺云僧歸夜船月龍出曉堂雲樹影中流見鐘聲兩岸聞題孤山寺云不雨山長潤無雲水自隂斷橋荒蘚澁空院落花深如杭之靈隠天竺蘇之靈巖楞伽常之恵山善權潤之甘露招隠皆有佳作李渉在岳陽嘗贈其詩曰岳陽西湖南上寺水閣松房遍文字新釘張生一首詩自餘吟着皆無味信知僧房佛寺類其詩標榜者多矣葛常之温公治第洛中闢門曰獨樂其心憂樂未始不在天下也其自作記有云世有人肯同此樂必再拜以獻矣東坡賦詩云兒童誦君實走卒知司馬盖名其得人心也又云撫掌笑先生年來學瘖瘂疑未盡命名之意同上沈約命王筠作郊居十詠書於壁不加篇題約云此詩指物程形無假題署老杜贈李潮八分歌云吾甥李潮下筆親開元以來數八分潮也奄有二子成三人潮乎潮乎奈爾何又韓退之招楊之罘詩我令之罘歸失得栢與馬之罘别我去計出栢馬下我自之罘歸入門思而悲之罘别我去能不思我為作詩招之罘晨夕抱飢渴嘗戯謂此二詩直不湏題署也黄常明子美詩誅茅初一畆廣地方連延敢謀土朩麗自覺面勢堅經營上元初斷手寶應年又題衡山縣學堂云旄頭彗紫微無復爼豆事於乎已十年儒服敝於地衡山雖小邑首唱恢大義講堂非曩造大屋加塗塈下可容百人墻隅亦深䆳林朩在庭戸宻幹叠青翠有井朱夏時轆轤凍堦戺采詩倦䟦渉載筆尚可記豈不是草堂縣學記李翺皇甫湜集中皆無詩世傳翺有縣君好塼渠一詩并傳燈録載答藥山一揭湜秪有浯溪留題一篇而已許彦周詩話云牧之題桃花夫人廟詩細腰宫裡露桃新脉脉無言㡬度春至竟息亡縁底事可憐金谷墜樓人僕嘗謂此詩為二十八字史論苕溪漁隠曰牧之於題詠好異於人如赤壁云東風不與周郎便銅雀春深鎻二喬題商山四皓廟云南軍不袒左邉袖四老安劉是滅劉皆反説其事至題烏江亭則好異而畔於理詩云勝敗兵家事不期包羞忍恥是男兒江東子弟多才俊巻土重來未可知項氏以八千人渡江敗亡之餘無一還者其失人心為甚誰肯復附之其不能巻土重來决矣許彦周詩話云牧之作赤壁詩折㦸沉沙鐡未消自將磨洗騐前朝東風不與周郎便銅雀春深鎻二喬意謂赤壁不能縱火即為曹公奪二喬置之銅雀䑓上也孫氏覇業係此一戰社稷存亡生靈塗炭都不問只恐没了二喬可見措大不識好惡南唐書云韓熈載自江南奉使中原為感懐詩題於館壁云僕本江北人今作江南客再去江北遊舉目無相識秋風吹我寒秋月為誰白不如歸去來江南有人憶苕溪漁隠曰余家有韓熈載家讌圖圖中題此詩後四句嘗以問相識間云是古樂府今觀此書方知其悞也苕溪漁隠曰題呉江三賢堂内陸龜䝉詩云千首文章二頃田囊中未有一錢看却因養得能言鴨驚破王孫金彈丸談苑云陸龜䝉居笠澤有内養自長安使杭州舟出舍下彈其一緑頭鴨龜䝉遽從舍出大呼曰此緑頭有異善人言方將獻天子今持此死鴨以詣官内養少長並集信然厚以金帛遺之因徐問龜䝉曰此鴨何言龜䝉曰常自呼其名遊道場山何山詩云白水田頭問行路小溪深處是何山髙人讀書夜達旦至今山鶴鳴夜半汪彦章何山何氏書堂記云寺有何氏書堂圖記相承以何氏為晉何楷楷嘗讀書此山後為吳興太守以其居為寺而名其山寄贈門子美詩逺行無自得内熱比何如寄旻云舊來好事今能否老去新詩誰與傳岑参云喬生作尉别來久因君為問平生否魏君校理復何如前月人來不得書夫子素多疾别來未得書北庭苦寒地體内今何如樂天寄夢得云病後能吟否秋來曽醉無退之贈崔立之云長女當人事誰助出帨縭諸男皆秀爽㡬能守家規亦皆書一通也張均張垍兄弟承襲父寵致位嚴近皆自負文材覬覦端揆明皇欲相均而抑於李林甫欲相垍而奪於楊國忠自此各懐􅔵望安禄山盗國垍相禄山而均亦受偽命肅宗反正兄弟各論死非房琯力救豈能免乎老杜贈均詩云通籍踰青𤨏亨衢照紫泥靈虬傳夕箭歸馬散霜蹄言均為中書舍人刑部尚書時也贈垍詩云翰林逼華盖鯨力破滄溟天上張公子宫中漢客星言垍尚寧親公主禁中置宅時也二人恩寵烜赫如是則報國當如何而乃斁亂天理下比逆賊反噬其主夫豈人類也哉黄常明杜甫累不第天寶十三載明皇朝獻太清宫饗廟及郊甫奏賦三篇帝竒之使待制集賢院命宰相試文章故有贈集賢崔于二學士詩云昭代將垂白途窮乃呌閽氣冲星象表詞感帝王尊天老書題目春官騐討論倚風遺鶂路隨水到龍門舊注陳希烈韋見素為宰相而崔國輔于休烈者皆集賢院學士也故末句云謬稱三賦在難述二公恩可謂不忘於藻鑑之重者矣按唐史是歳陳希烈為相至八月見素代之而甫集有上見素詩云持衡留藻鑑聽履上星辰則甫之文乃為見素所賞非希烈也同上牧之贈阿宜一日讀十紙一月讀十箱古人讀書以紙計范雲就袁叔明讀毛詩日誦九紙又袁俊家貧無書每從人假借必皆抄寫自課日五十紙為計䂬溪故事門余嘗論李廣以私憾殺㶚陵尉其褊忮險刻决非長者所以不侯非直殺降之譴也因觀坡云明年定起故將軍未肯先誅㶚陵尉恐亦寓此意史傳襲稱兄弟為友于故淵明詩云再喜見友于子美云友于皆挺㧞又山鳥山花吾友于南史到藎從武帝登北顧樓賦詩藎受詔便就上以示其祖溉云藎定是才子番恐卿從來文章假手於藎後每和御詩上輙手詔戱溉曰得無貽厥之力乎退之玉川詩云誰謂貽厥無基址二事正可對也䂬溪坡云賔鴻社燕巧相違月令來賔事常疑人未曽用及及觀夢得秋江晚泊云暮霞千萬狀賔鴻次第飛顧况云安得凌風翰肅肅賔天京杜别浦鴈賔秋同上東坡游金山詩云江山如此不歸山江神見怪驚我頑我謝江神豈得已有田不歸如江水盖與江神指水為盟耳句中不言盟誓者乃用子犯事指則誓在其中不必詛神血口然後謂之盟也送程六表弟云浮江泝蜀有成言江水在此吾不食黄常明老杜復見諸山得銀甕注引禮記山出器車注盖瑞應圖曰王者宴不及醉刑罸中人不為非則銀甕出昌黎我有雙飲醆其銀得朱提見漢志朱提銀八兩為一流注朱提屬犍為乃邑名也䂬溪樂天以長慶二年自中書舍人為杭州刺史冬十月至治時仍服緋故遊恩徳寺詩序云俯視朱紱仰睇白雲有愧於心及觀自欵詩云實事漸銷虚事在銀魚金帶遶腰光戊申詠懐云紫泥丹筆皆經手赤紱金章盡到身以今觀之金帶不應用銀魚而金章不應用赤紱人皆以為疑而不知唐制與今不同也按唐制紫為三品之服緋為四品之服淺緋為五品之服各服金帶又制衣紫者魚袋以金餙衣緋者魚袋以銀餙樂天時為五品淺緋金帶佩銀魚宜矣劉長卿有袁郎中喜章服詩云手詔來筵上腰金向粉闈勲名傳舊閣蹈舞著新衣郎中亦是五品故其身章與樂天同葛常之書事門近世作文者多以紫荷囊作詩從事用如宋景文詩所謂觀榮聳麟族賦筆助荷囊之類沿襲而用者非一而不知其誤也按晉書輿服志書文武百官皆有囊綬八座尚書則荷紫以生紫為袷囊綴之服外加於左肩則所謂荷紫者非芰荷之荷乃負荷之荷也南史載周捨嘗問劉香曰着紫荷囊相傳云挈囊竟何所出香曰張安世傳云持槖筆事孝武帝數十年注曰槖囊也盖人徒見南史有着紫荷囊四字遂作一句讀之殊不知晉書紫荷之義也丹陽集王儉少年以宰相自命嘗有詩云稷契康虞夏伊吕翼商周又字其子曰元成取仍世作相之義至其孫訓亦作詩云旦奭康世政蕭曹佐甿俗大率追儉之意而為之後官亦至侍中同上杜云十暑岷山葛三霜楚戸砧九鑚巴噀火三蟄楚祠雷其書歳月也新矣樂天云呉郡兩回逢九月越州四度見重陽去年八月十五夜曲江池畔杏園邉今年八月十五夜湓浦沙頭水舘前又前年九月餘杭郡呼賔命宴虚白堂去年九月到東洛今年九月來呉鄉兩邉蓬鬢一時白三處菊花同色黄其質直叙事又自一格黄常明岑参送顔平原詩序云十二年春有詔補尚書郎十數公為郡守上親賦觴羣公於蓬萊仍賜以繒帛寵餞加等故参為長篇述其事安禄山亂明皇曰河北二十四郡無一忠臣邪及聞平原固守乃曰朕不識真卿何如人所為若此前日宴賚真文具耳退之云偶然題作木居士便有無窮求福人可謂切中時病凡世之趨附權勢以圖身利者豈問其人賢否果能為國為民哉及其敗也相推入禍門而已聾俗無知諂祭非鬼無異也䂬溪感事門三山語録登慈恩寺塔詩譏天寶時事也山者人君之象秦山忽破碎則人君失道矣賢否自混淆而清濁不分故曰涇渭不可求天下無綱紀文章而上都亦然故曰俯視但一氣焉能辨皇州於是思古之聖君不可得故曰回首呌虞舜蒼梧雲正愁是時明皇方耽於滛樂而不已故曰惜哉瑶池飲日宴崑崙丘賢人君子多去朝廷故曰黄鵠去不息哀鳴何所投惟小人貪竊禄位者在朝故曰君㸔隨陽雁各有稻粱謀同上西清詩話云退之宿龍宫灘詩云浩浩復湯湯灘聲抑更揚黄魯直曰退之才聽水句尤見工謂浩浩湯湯抑更揚者非諳客裏夜卧飽聞聲安能周旋妙處如此耶漁隠叢話東坡云南澗中詩秋氣集南澗獨遊亭午時回風一蕭瑟林影久参差始至若有得稍深遂忘疲羈禽響幽谷寒藻舞清漪去國魂已游懐人涙空垂孤生易為感失路少所宜索寞競何事徘徊只自知誰為後來者當與此心期柳儀曹詩憂中有樂樂中有憂盖絶妙古今矣然老杜云王侯與螻蟻同盡隨丘墟儀曹何憂之深也蔡寛夫詩話云子厚之貶其憂悲憔悴之欲發於詩者特為酸楚而已傷志固君子所不免然亦何至是卒以憤死未為達理也樂天既遇閑放浪物外若真能脫屣軒冕者然榮辱得失之際銖銖校量而自矜其達每詩未嘗不着此意是豈真能忘之者哉亦能勝之耳惟淵明則不然觀其貧士責子與其他所作當憂則憂遇喜則喜忽然憂樂兩忘則隨所遇而皆適未嘗有擇於其間所謂超世遺物者要當如是而後可也觀三人之詩以意逆志人豈難定以是論賢不肖之實亦何可乎隠居詩話云樂天題海圖屏風詩畧曰或者不量力謂兹鼇可求贔屭牽不動綸絶沉其鈎一鼇既頓頷諸鼇齊掉頭噴風激飛亷鼔波怒陽秋遂使江漢水朝宗意亦休吾讀此詩感劉隗李訓薛文通等事為之太息老杜所以為人稱慕者不獨文章為工盖其語黙所主君臣之外非父子兄弟即朋友黎庶也嘗觀韋應物詩及兄弟者十之二三廣陵覲兄放情且為歡累日不知饑冬至寄諸弟云已懐時節感更抱别離酸元日寄諸弟云日月昧逺期念君何時歇社日寄云遥思里中會心緒恨微微寒食聨騎定何時吾今顔已老又云把酒㸔花想諸弟杜陵寒食早青青初秋寄云髙梧一葉下空齋歸思多聞蟬寄諸弟云緘書報是時此心方耿耿登郡樓寄諸季云上懐犬馬戀下有骨肉情凡觀此集者雖讒䦧交瘉當一變而怡怡也黄常明詩話總龜後集巻二十一欽定四庫全書詩話總龜後集巻
