front:
  text: 增修詩話總龜卷之三十八
  hash: sha256:df48b5aa5eb51595cde7fe415d675629abdca3143353f94ad6374c7bf04624b5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_038-1a}
body:
  text: 詼諧門上太宗賜錢思公巳下孝經詩令次韻和進朝文元逈首出四句云舍後信標名風篁自有聲溫桑敦厚教仙果子難生思公即便對朝公今日須了朝大笑諸公不曉今日孝經詩稽遲戲以此督之爾四句蓋次韻詩遲也祥符中日本國遣使入貢稱國之東有祥光現其國素傳中原天子聖明則此光現聖章詔本國建寺賜額曰神光朝辝日夷使乞令詞臣撰一寺記是時當制者雖中魁選然詞學不優贍居常止以張君房代之蓋假其稽古才雅也既傳宣訖撰寺記時張尚為小官醉飲樊樓遣人遍京城尋之不見而夷人在閣門翹足以候文中人三促之紫微大窘後錢希白楊大年因玊堂暇日改間忙令大年曰世上何人最號間司諌拂衣歸華山蓋种放得歸山時也希白曰世上何人最號忙紫微失却張君房時傳此事為雅笑湘山録唐制三班奉聀月俸七百馹劵羊肉半斤祥符中有人題于馹舍曰三班奉聀實堪悲卑賤孤寒即可知七百料錢消甚使半斤羊肉幾時肥朝廷聞之謂如此責廉遂議增俸古今詩話陳亜少卿維揚人善詩什滑稽尤甚嘗與蔡君謨會于金山僧舍酒酣君謨題詩屏間曰陳亜有心終是惡即索芼對曰蔡襄無口便成衰少時為杭州于潛令以利口謔浪人或厭之太守馬忠肅因其趨府戒之陳懼受教俄有通栗謁者稱太祠郎李過庭公罵曰何人家子弟亞率爾云李趨見馬公徐悟之大笑唐宋遺史陳亞卿著藥名詩若風月前湖近前胡軒窗半夏涼半夏棊為臘寒呵子下呵子衣嫌春瘦縮砂栽縮砂及贈祈雨僧詩云無雨若還過半夏半夏和師􅴲作葫蘆巴葫蘆巴之類最膾炙人口又曾知祥符縣親故多干托借車牛因作詩曰地名京界足親知荊介託借尋常無歇時蝎但看車前牛領上車前子十家皮沒五家皮五加皮嘗言藥名用于詩無不可而幹運曲折使各中理在人之智耳或曰延胡索可用乎曰可沉思久之吟曰布𫀆袖裏懷漫刺到處遷延胡索人鰻鯉延胡索此可贈遊謁措大聞者絶倒與章郇公同年將用之而為言者所沮作生查子獻之曰朝廷數擢賢蒴旋占凌霄路凌霄花自是鬱桃人桃仁險難無夷處蕪荑也知沒藥療孤寒沒藥大幅𥿄連粘大腹皮甘草歸田賦甘草又别作閨情生查子三首其一曰相思意巳深相思子薏苡白𥿄書難足白止字字苦參商苦參故要檀即讀狼毒分明寄得約當歸當歸逺志櫻桃熟逺志何事菊花時菊花猶未回鄉曲茴香其二曰小院雨餘涼禹餘糧石竹風生砌石竹羅扇侭從容蓯容半夏沙厨睡半夏起來間坐北亭中北亭滴盡真珠泪真珠為念􅡾辛勤細辛去折蟾宫桂桂其三曰浪蕩去來來莨菪躑躅花頻換躑躅可惜石榴裙籣麝香消半麝香琵琶間後理相思枇杷相思必撥朱弦斷篳撥擬續斷朱弦續斷待這冤家看代赭又自為亞字迷言曰若教有口便啞且要無心為惡中間全沒肚腸外面任生稜角雖一時諧謔之詞寄托亦有深意又嵗旦示知巳云收寒歸地底表老向人間與人郊行云馬嘶曽到寺犬吠乍行村送歸化宰赴闕云吏辝如賀日民送似迎時懷舊隱云排聮花品曾非僣愛借苔錢不是慳自成一家體青箱雜記魏仲先冦萊公遊陜郊僧寺多留題後同到見萊公詩巳用碧紗籠而仲先詩獨塵昏在壁時有從行官妓頗慧以紅衣袖拂之仲先徐曰若得時將紅袖拂也應勝著碧紗籠萊公大笑西都應天院去府十里每朔望晉守帥府官朝拜未曉而往時行十里不交談有人作詩云正夢寐中行十里不言語處飲三杯有人送驢肉復云廳前捉到須依法合內盛耒定付厨春明退朝録李濤相國性滑稽為布衣時往來京洛間汜水關有僧舍曰不動尊院匕中有僧不出院十餘載濤每過常謁其院必省其僧未幾寺焚僧散濤再過之但有門扉而巳因題詩曰走却坐禪客移將不動尊世間顛倒是八萬四千門談苑韓浦韓洎晉公滉之後咸有辭學浦善聲調洎能為古文洎嘗輕浦語人曰吾兄為文譬如繩樞草舍庇風雨而已豫之文是造五鳯樓手浦性滑稽窈聞其言因有親知遺蜀箋浦作詩與洎曰十樣蠻箋出益州寄來新自浣溪頭老兄得此全無用助爾添修五鳯樓同上內朝辰入庭內錯立至駕欲坐即御史臺知班唱班欲依班立也王彥和汾與劉貢父攽同趨朝王戲劉曰內朝日日須呼汝劉應聲曰寒食年年必上公王平甫博學耿介語言輕肆人或戲為心風熙寧中乞郡得湖州舒王以詩送之曰吳興太守美如何栁惲詩才不足多遙想郡人迎下擔白蘋江上起滄波譏其風也平甫知其意即以吳興太守美如何為破題作詩十首其一曰吳興太守美如何太守從來惡祝鮀生若不為上柱國死時猶合作閻羅舒王聞之曰閻王見闕請便赴任方圭好為惡詩宋公序知楊州日圭來謁宴于平山堂圭誦詩不巳宋欲它辭巳之顧野外牛就木磨癢謂坐客胡詼曰青牛恃力狂挨木詼應聲曰妖鳥啼春不避人宋公大笑圭悟其意飲散至客次欲奮拳擊詼衆救而免並同上劉子儀三入玊堂望大用頗不懌作詩云蟠桃三竊成何味上盡鰲山迹轉孤移疾不出朝士問疾劉云虛熱上攻石文㝎在坐云只銷一服清涼散謂兩府方得涼繖王君貺送牡丹與永叔答詩云最好花常最後開蓋君貺同時輩皆入兩府永叔以最後戲之也王得詩不喜對來價擲之永叔謂人曰好花不開也君貺聞之愈怒詩史李藝居于泗上一日納姫友人鍾公寄詩曰昨暮間行泗水緑楊堤上覩雲軿知君買得千金笑只用何曾兩日錢詩史范希文以大理寺丞監西溪鹽場西溪素多蚊蛃希文作詩曰飽去櫻桃重飢來栁絮輕但知求旦暮休更問前程馮瀛王性仁厚家有一池每得魚放池中其子監丞每竊釣之瀛王聞之不悅于是髙其墻垣鑰其門戶作一詩書其門曰髙卻垣墻鑰却門監丞從此罷垂綸池中魚鱉應相賀從此方知有主人吳善長郎中儀狀魁偉頗類冨丞相文學之譽則無焉有輕簿子贈之詩曰文章却似呼延贊風貌還同冨相公國𥘉有武臣呼延贊好吟惡詩故云熙寧中章子厚察訪湖北因以兵收辰溪之南江諸蠻時有吳僧願成亦在軍中自稱察訪大師每出則乘大馬以撾劔擁從呵殿而行隨兵官李資入洞資為蠻人所殺成亦𬒳縳既而放歸猶揚揚自得詩僧文瑩嘲之曰童頭浮屠浙東客傳呼避道長以陌寶撾青蓋官儀雄新賜袈裝椹猶黑察車後乘從驅挈庸夫無謀動蠻穴暗灘夜𬒳猿猱擒縳入新溪哭殘月牂牱畏佛不敢烹脫身腥窟存餘生放師回目不自愧反以意氣湘南行我聞辛有適伊川變戎預讖麟經編暌車載鬼吁可怪冝入熙寧志怪篇京師優人以雜細物𢾗十種布於地使人暗記物色然後遣沐猴認之每沐猴得之優人即曰道著也馬留留蓋優人呼沐猴之名熙寧庚戌春市井之人見舉子往往亦以馬留目之其年狀元葉祖洽赴宴于池上有下第進士寄詩曰著甚耒由去賞春也應有意惜芳辰馬蹄莫踏亂花碎晉與愁人作醉茵紬而繹之乃是著也馬留四字蓋四句各取上一字鄭君平性滑稽及第後有人以詩來钁錢君平以詩答曰五貫九百五十俸省錢請來足甚用還債還負亦無餘買酒買肉何曾夢妻兒終日只愁飢婢僕過冬由受凍更有不識事間人獻詩獻啓覔甚甕張獻啚主簿頴人善嘲謔以老榜得班行寄書于家人曰汝作鵉孤我為奉聀不忝矣又譏州縣官之貪汚者云棒頭舊血添新血篋裏黃金壓白金古今詩話王丞相好嘲謔𥘉執政對客悵然曰投老欲依僧再三言之客應之曰急則抱佛腳丞相善之復曰投老欲依僧是古人一句詩客急則抱佛腳亦是俗諺全句上去頭下去腳豈是的對丞相大笑祕書省東即石威衛營荒䉑榷毁其大廳逼校正院南對御史臺有人嘲之曰門緣御史塞廳為校書侵宋中道有俊才而身短小人多戲之蘇子美與中道年相懸然甚愛其才調道亦傾心作詩論交子美長大魁偉與中道並立下視曰交不著此京師市井語也號中道為宋錐為其頴利而么麼云贈之詩曰譬如利錐末所到物巳破後中道通判洛州洛州本趙地有毛遂墓聖俞作詩送行舉錐處囊事亦所以戲之也太宗時進士同年有數人名似姓者或有取以為詩云郭鄭鄭東東野絡馬張張夏夏侯璘熙寧中有崔度崔公度王韶王子韶皆的對也又有章君陳陳君章二人未有似者唐東方虬欲為西門豹作對亦當時好事者為此對耳給事中馬子山穆王八駿有山子馬王丞相云馬子山騎山子馬莫有對者相傳久之有姓錢人為衡水令罷歸或取以為對云錢衡水盜水衡錢錢聞之變色或者對云吾正欲作對耳非有實也古今詩話咸通中以舉子衣車服侈異下令不許乘馬時場中不下千人皆跨長耳或嘲之曰今年勑下盡騎驢短帽長鞭滿九衢清瘦兒郎猶自可就中愁殺鄭昌圖鄭昌圖魁偉故有此句開元中宰相蘇味道張昌齡皆有詩名暇日相會互相嘲謔昌齡曰某詩所不及相公者為無銀花合蓋蘇元夕詩有火樹銀花合之句也味道曰某詩所以不及相公者為無今同丁蓋張贈張昌宗詩有昔日浮丘伯今同丁令威之句也遂相對撫掌而笑武后朝左司郎中張元一滑稽時西戎犯邉武后欲武氏立功因行爵賞命武懿宗統兵平之冦未入境懿宗才逾邠畏懦而遁懿宗陋短元一嘲之曰長弓與短箭蜀馬臨髙蹁去賊七百里隈墻獨自戰忽然逄著賊騎豬向南迍天后聞之未曉曰懿宗無馬耶何故騎豬元一解曰騎豬夾豕也天后大笑捴章二年興善寺火塑像焚盡道士李宗嘲之曰道善何曾善言興又不興如來燒亦盡堆有一群僧文潞公常言潞中有一士人憂制中遊處坐中有人嘲輒嘗自云有年光德一王伸戀酒貪歌不厭貧三年得替歸朝去嬴得髭鬚白似銀其不羈檢也如此特好事人有善必優禮待之僧乾康金仙皆以能詩登門士儒閻羽卿通尚書春秋鄧潛有詞學每接見則疑語忘倦議者以此稱之零陵捴記雪峰悅禪師與興化銑公友善既老迎送不巳悅戒曰公不袖手山林尚忍垢乎銑一日送官墮馬損臂悅作偈戲云大悲菩薩有千手大丈夫兒誰不有興化和尚折一支由有九百九十九南華恭長老同嗣大愚少叢林有書敘法乳悅作偈曰與師瓶錫寄江湖共憶當年在大愚堪笑堪悲無限事甜瓜生得苦葫蘆東坡宿曹溪讀傳燈録燈花墮卷上燒一僧字以筆記于窗曰曹溪岑寂寞燈下讀傳燈不覺燈花落茶毗一個僧增修詩話總龜卷之三十八百家詩話總龜後集卷之三十八針規門東坡山村詩云煙雨濛𪷟雞犬聲有生何處不安生但教黃犢無人佩布榖何勞也勸耕意言是時販私鹽者多帶刀杖故取前漢龔遂令人賣劍買牛賣刀買犢曰何為帶刀佩犢意言但得鹽法寬平令民不帶刀劒而買牛犢則民自力耕不勞勸督以譏鹽法太峻不便也又云老翁七十自腰鎌慙愧春山筍蕨甜豈是聞韶解忘味爾來三月食無鹽意言山中之人飢貧無食雖老猶自採筍蕨􅏺時鹽法峻急僻逺之人無鹽食用動經數月若古之聖賢則能聞韶忘味山中小民登能食淡而樂乎以譏鹽法太急也又云杖藜褁飯去匆匆過眼青錢手空嬴得兒童語音好一年強半在城中意言百姓請得青苗錢立便于城中浮費使却又言鄊村之人一年兩度夏秋稅及𢾗度請納和預買錢今來更添青苗助役錢因此莊家幼小子弟多在城市不著次苐但學得城中人語音而巳以譏新法青苗助役不便也東坡開運鹽河詩云居官不任事消散羡長卿胡不歸去來滯晉愧淵明鹽事星火急誰能恤農耕薨薨曉鼓動萬指羅溝坑天雨助官政泫然淋衣纓人如鴨與豬投泥相濺驚下馬荒堤上四顧但湖泓線路不容足又與牛羊爭歸田雖賤辱豈失泥中行寄語故山友謹勿藜羮是時盧秉提舉鹽事擘畫開運鹽河差夫千餘人某于大雨中部役其河只為般鹽既非農事而役農民秋田未了有妨農事又其河中間有涌沙數里意言開得不便自歎泥雨勞苦羡司馬長卿居官而不任事又愧陶淵明不早棄官歸去也農事未休而役千餘人故云鹽事星火急誰能恤農耕又言百姓巳勞苦不易天雨又助官政之勞民轉致百姓疲弊役人在泥水中辛苦無異鴨與豬又言某亦在泥中與牛羊爭路而行若歸田豈失此哉故云寄語故山友謹不可厭藜羔而思仕宦以􅏺開運鹽河不當又妨農事也蘇東坡八月十五日觀潮作詩云吳兒生長狎濤淵冒利忘生不自憐東海若知明主意應教斥鹵變桑田時新有旨禁弄潮故云吳兒生長狎濤淵冒利輕生不自憐蓋言弄潮之人為貪官中利物致其間有溺死者故朝旨禁斷某為其時又好興水利因作此詩言東海若知明主意應教斥鹵變桑田意言東海若知此意當令斥鹵地盡變桑田此事之必不可成者以􅏺興水利之難成也子瞻任杭州通判日轉運司差往湖州相度堤岸利害因與知湖州孫覺相見作詩與孫覺云嗟余與子久離群耳冷心灰百不聞苦對青山談世事當須舉白便浮名某是時約孫覺并坐客如有言及時事者罰一大盞雖不指言時事是非意言時事多不便不得説也又云天目山前渌浸𥚑碧瀾堂下看銜艫作堤捍水非吾事間送苕溪入太湖某為先曽言水利不便却𬒳轉運司差相度堤岸又云作堤捍水非吾事意言本非興水利之人以譏諷水利之不便也王詵送韓幹畫馬十二匹求跋尾子瞻作詩云南山之下汧渭之間想見開元天寶年八坊分屯隘秦川四十萬匹如雲煙騅駓駰駱􅌐驑騵白魚赤兔騂皇䮧龍顱鳯頸獰且妍竒姿逸德隱駑頑碧眼胡兒手足鮮歲時剪刷供帝間柘𫀆臨池侍三千紅粧照日光流淵樓下玉螭吐青寒往來蹙踏生飛湍衆工甜茟和朱鉛先生曹霸弟子韓廄馬多肉凥脽圎肉中畫骨誇尤難金羈玉勒繡羅鞍鞭箠刻烙傷天全不如此圗近自然平沙細草荒芊綿驚鴻脫兔爭後先王良挾䇿飛上天何必俯首服短轅意以騏驥自比􅏺執政大臣無能盡我才如王良之御者何必折莭干求進用也子瞻臘月逰孤山詩云獸在藪魚在湖一入池檻歸期無誤隨弓旌落塵土坐使鞭箠環呻呼追胥連保罪及孥百日愁歎一日娛白雲舊有終老約朱綬豈合幽人紆人生何者非􅕋廬故山鶴怨秋猿孤何時自駕鹿車去掃除白髮煩菖蒲麻鞋短褐隨獵夫射弋狐兔供朝晡陶潛自作五栁傳潘閬畫入三峰圖吾年凛凛今幾餘知非不去慙衛􅕋歲荒無術歸亡逋鵠則晝虎為難摹此詩云誤隨弓旌落塵土坐使鞭箠環呻呼以譏新法行後公事鞭箠多也詼諧門老杜贈韋左丞有朝叩冨兒門暮隨肥馬塵至為殘杯冷炙之語及薑少府為清觴異味即云新歡使飽薑侯德王倚為沽酒割鮮即云故人情義晚誰似豈附炎老叨如是哉蓋託文字戲謔也然又不可不慮故有𥚹性貪幽捿干謁傷直恥事干謁以自見其志亦如示姪佐云甚聞霜薤白重惠意如何巳應舂得細頗覺寄來遲皆戲言也終慮癡人以夢為實故示姪濟云所來為宗族亦不為􅐻飱小人利口實薄俗難可論正如淵明乞食篇云飢來驅我去不知意何之行行正斯里扣門拙言辭其卑汚乃爾不肯為五斗拆腰殆與異矣試問高呼二十首何如低唱兩三杯又譬如長大人不以長為苦歸來𬒳上下一夜著無處天覺真贊云書生大抵多窮相金眼除非是黨公皆笑林語也北夢瑣言載江陵世號衣冠藪澤人言琵琶多如飯甑措大多如鯽魚退之酬崔少府伊陽詩云下言人吏希惟足彪與虥余官辰溪時士人皆可喜而不多得近城人虎雜居戲為對云固冠思得多于鯽士人刻木惟冝少似彪吏人某見同㑪因行飲令人索一魚名有浙人大唱云周公魚余謂客坐且喜召伯鮓有對矣滿堂蘆胡不止因戲為足成其語云京語鮓先誇召伯浙音魚或號周公䂬溪文潛詩兒曹鞭笞學官府翁憐兒癡旁笑侮平明坐衙鞭復呵賢于群兒能幾何兒曹鞭笞以為戲翁怒鞭人血流地一種戲劇誰后先我笑為公兒更賢余謂此詩亦不可不令操權者知也坡云不辭脫袴溪水寒中水照見催租瘢等間戲語亦有所輔後山詩話云楊大年傀儡詩云鮑老當筵笑郭郎笑他舞袖太琅璫若教鮑老當遙舞轉更琅璫舞袖長語俚而意切相傳以為笑後山詩話云乞貓詩秋來鼠輩欺貓死窺甕翻􅐻攪夜眠聞道狸奴將數子買魚穿栁聘銜蟬雖滑稽而可喜千歲而下讀者如新王直方詩話云謝王炳之惠玉板𥿄詩云王侯鬢若緑坡竹此出髯奴傳炳之大以為憾送零陵主簿夏君玉詩未云因行訪幽禪頭陀煙雨外蓋君玉頭甚大故以此戲之東軒茟録云陶榖久在翰林意希大用仍俾其黨因事薦引言榖在詞禁宣力實多微伺上旨太祖笑曰翰林草制皆檢前人舊本改換詞語所謂依樣晝葫蘆耳何宣力之有榖聞之作詩曰官職須由生處有文章不𬋩用時無堪笑翰林陶李士年年依舊晝葫蘆太祖薄其怨望遂決意不用矣西清詩話云髙英秀者吳越國人與贊寧為詩友口給好罵滑稽每見眉目有異者必噂短于其後人號惡啄薄徒嘗譏名人詩病云李山甫覽漢史云王莾弄來曽半破曹公將去便平沉㝎是破船詩李群玉詠鷓鴣云方穿詰曲﨑嶇路又聽鈎輈格磔聲㝎見𣑽語詩羅隱云雲中雞犬劉安過月裡笙歌煬帝歸㝎見鬼詩杜荀鶴云今日偶題題似著不知題後更誰題此衛子詩也不然安有四蹄贊寧笑􅒜而巳苕溪漁隱曰劉義落葉詩云返蟻難尋穴歸禽易見窠滿廊僧不厭一片俗嫌多鄭谷桞詩云半煙半雨溪橋畔間杏間桃山路中會得離人無限意千絲萬絮惹春風或戲謂此二詩乃落葉及栁謎子觀者試一思之方知其善謔也隱居詩話云昨夜隂山吼賊風帳中驚起黑髯翁平明不待全師出連把金鞭打鐵􅍡不知何人之詩頗為邉人傳誦有張師雄者居洛中好以甘言悅人晚年尤甚洛人目為蜜翁翁會官于塞上一夕傳胡騎犯邊師雄倉皇震恐衣皮裘兩重伏于土穴中神如癡矣秦人呼土窟為土空遽為無名子改前詩以嘲之曰昨夜隂山賊吼風帳中驚起蜜翁翁平明不待全師出連著皮裘入土空許身一何愚自比稷與契杜陵布衣老且愚信口自比稷與契其平居趨超自是唐虞上人時夸儀秦似不可曉飄飄蘇季子六印佩何遲敝裘蘇季子歷國未知還季子黑貂敝得無妻嫂欺戰國姦民蘇張為渠此老不應未喻及觀薇蕨餓首陽裘馬資歷聘賤子欲適從疑誤此二柄其意甚明前言蓋戲耳䂬溪許彥周詩話云黃魯直愛與郭㓛甫戲謔嘲調雖不當盡信至如曰公做詩費許多氣力做甚此語切當有益于學者不可不知也百家詩話總龜卷之三十八
