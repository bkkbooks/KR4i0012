front:
  text: 增修詩話總龜卷之四
  hash: sha256:d3f7aad368a997a8d376661ee81cae6e4e7ead673dc4164b85037be64dce089b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_004-1a}
body:
  text: 詩進門楊允元年二十一歲爲光䘵寺丞太宗極愛之三月後苑曲宴未得貼職不得與以詩貼寄舘中諸公曰聞說宮花滿鬢紅上林絲管侍重瞳蓬萊咫尺無由到始信仙凢逈不同諸公進呈太宗訝有司不召左右以未得貼職爲奏即日直集賢院與晩宴古今詩話翰林學士李宗諤以京官帶館職赴内宴閤門拒之獻詩曰戴了宫花賦了詩不容重覩赭黄衣無憀獨出金門去恰似當年下第歸公嘗舉進士御試下因及之太宗覧詩即宣赴坐後遂爲例雖選人帶館職亦同赴宴青箱雜記周世宗幸廣陵孟貫能詩以一集獻之世宗見首卷貽棲隱洞譚先生詩云不伐有巢樹多移無主花謂貫曰伐叛弔民何有巢無主之有獻朕則可他人卿將不免遂釋褐授官江南野録太宗收并門凱旋日范果叩迴鑾進詩曰千里版圖來浙右一聲金皷下河東賜一官古今詩話唐太宗征遼師還途中御製詩有鑾輿臨紫塞朔野陣雲飛之句遂寜令何象進鑾輿臨塞賦朔野雲飛詩召對嘉賞授賛善大夫詩有塞日穿痕㫁邉鴻背影飛縹緲浮黄屋隂沉護御衣之句同前吳越司賔使沈韜文湖州人有逰西湖詩云菰米蘋花似故郷不是不歸歸未得好風明月一思量武肅憫其思郷授以湖州刺史遺一句同前世傳琴曲宫聲十小調皆隋唐賀若弼製最妙一不博金二不換玉三泛峽吟四越溪吟五越江吟六孤憤吟七清夜吟八葉下聞蟬九三清十亡其名琴家名賀若而已太宗改不博金曰楚澤涵秋不換玉曰塞門積雪命辭臣採調製詞蘇易簡得越江吟詞曰神仙神仙瑶池宴片片碧桃零落春風晚翠雲開䖏隱隱金輿挽玉麟背冷清風逺又本云非雲非烟瑶池宴片片碧桃零落黄金殿蝦鬚半捲天香散春雲知孤竹清婉入霄漢紅顔醉態爛熳金輿轉霓旌影亂簫聲逺不知孰是稱賞門太宗留意藝文好篇詠淳化中春日苑中有賞花釣魚小宴宰相至三舘畢預坐咸從賦詩中字爲韻上覧以苐優劣時姚鉉詩先成曰上苑烟花逈不同漢皇何必幸囬中花枝冷濺昭陽雨釣線斜牽太液風綺蕚惹衣朱檻近錦鱗隨手玉波空小臣侍宴驚凢目知是蓬萊第㡬宫賜白金百两時軰榮之以比奪𫀆賜花等故事薛道衡爲人日詩曰入春纔七日離家已二年南人嗤之曰是底言語誰謂此虜㑹作詩及云人歸落鴈後思發在花前乃喜曰名下無虚士小說舊聞江爲能詩少逰廬山白鹿洞題詩一聮于壁曰吟經蕭寺旃檀閣醉倚王家玳瑁筵李璟見之謂左右曰吟此詩者大是貴族遂爲時軰所稱江南野録成都周式作春詩題㢘遜驛云珠簾綉户遲遲日柳絮梨花寂寂春王拱辰甚愛之雲齋廣録白昊秋日郊歩詩云鶴盤逺翅投孤嶼蟬曵殘聲過别枝歐陽公稱爲佳句同前馮太傅端嘗書云鳴􅐴直上一千尺天静無風聲更乾碧眼胡児三百騎盡提金勒向雲看謂坐客曰可圖扵屏障乃柳如京塞上詩也倦㳺録何涓㐮陽人少爲瀟湘賦爲時所稱潘緯以古鑑詩著名或曰潘緯十年吟古鑑何涓一夜賦瀟湘零陵總記載何涓瀟湘賦云鏡歛殘色霞披曉光亦無全篇古今詩話楊大年同陳恕讀李義山詩酷愛一絶云珠箔䡖明覆玉墀披香新殿鬪腰肢不須看盡魚龍戯終遣君王怒偃師嘆曰古人措意如此深妙各歎服李太白𥘉自蜀到京師賀知章聞其名見之請爲文出蜀道難示之知章曰公非人間人豈太白星精邪扵是解金貂換酒醉而歸及見烏夜啼曰此詩可以泣鬼神其詞曰姑蘇䑓上烏飛時呉王宫裏醉西施呉歌楚舞歡未畢青山𣣔㗸半邊日金壺丁丁漏水多起看秋月墜江波東方漸明柰樂何又曰黄雲城邉烏欲棲歸飛啞啞枝上啼機中織錦秦川女碧紗如烟隔窓語停梭向人問故夫欲說遼西淚如雨憲宗時北虜數㓂邊大臣議和親有五利而無千金之費憲宗曰比聞一士人能爲詩而姓字稍僻其詩曰山上青松陌上塵雲泥豈合得相親舉世盡嫌羸馬瘦唯君不弃卧龍貧千金未必能移姓一諾從來許殺身莫道書生無感慨寸心還是報恩人侍臣曰此戎昱詩也京兆李鑾欲以女妻之令改姓昱辭焉憲宗恱曰又記得詠史詩云漢家青史上計拙是和親社稷歸明主安危托婦人若能將玉貌便欲静胡塵地下千年骨誰爲輔佐臣憲宗笑曰魏綘何其儒也此人如在可與鼎州武陵桃源足稱其吟咏士林榮之又蘇郁有詩云關月夜懸青塜鑑塞雲愁薄漢宫羅君王莫信和親䇿生得胡雛虜更多裴慶餘咸通末佐李北門爲淮南幕嘗同逰船舟師悮以舩篙水濺侍女衣上變色慶餘請爲詩曰滿額鵞黄金縷衣翠翹浮動玉釵垂從教水濺羅裙􅊜知道巫山行雨歸公喜令歌者傳之古今詩話又唐賢杼情謂李蔚守淮南日布衣孫處士作張祐有觀獵詩并宫詞白傅稱之宫詞云故國三千里深宫二十年一聲河滿子雙淚落君前小杜守秋浦與祐爲詩友酷愛祐宫詞贈詩曰如何故國三千里虚唱歌詞滿六宫又詩寄祐云睫在眼前人不見道非身外更何求誰人得似張公子千首詩輕萬户侯楊祭酒嘗見江表士人項斯詩贈之詩云度度見君詩最好及觀標格過於詩平生不觧蔵人善到處相逢說項斯由是四方知名樂天初舉名未振以歌詩投顧况戯之曰長安物貴居亦不易及讀至原上草云野火燒不盡春風吹又生歎曰有句如此居亦何難老夫前言戯之耳丁晋公孫何齊名翰林學士王元之廷譽嘗言二人可使白衣充脩撰嘗贈之詩曰三百年來文不振直從韓柳到孫丁如今便合教脩史二子文章似六經杜紫㣲覧趙渭南早秋詩云殘星幾點鴈横塞長笛一聲人倚樓因目之爲趙倚樓贈詩曰今代風騷將誰登李杜壇覇陵鯨海動秦苑鶴天寒今日訪君還有意三條氷雪借令看盧延遜獻太宗詩卷中有栗爆燒氊破猫跳觸鼎翻之句後與潘羙樞宻在内殿議事令宫人煨栗俄有數栗爆出燒損綉褥又嘗燒金鼎宫猫相戯觸翻因舉前詩曰詞人作詩信無虚語武后逰龍門命群臣賦詩先成者賜錦𫀆左史東方虬詩成設拜賜坐未安宋之問詩後成文理兼羙左右莫不稱善乃就奪錦𫀆衣之其詞曰宿雨霽氛埃流雲度城闕河隄新柳翠苑上花初發洛陽花柳此時濃山水樓䑓映幾重群公拂霧朝翔鳯天子乗春幸鑿龍鑿龍近出王城外羽從淋漓擁軒盖雲蹕纔臨御水橋天衣巳入香山㑹山壁嶄嵓㫁復連清流澄澈俯伊川塔影遥遥緑波上星龕奕奕翠㣲邉層巒舊長千㝷水逺壑初飛百丈泉綵仗紅旗遶香閣下輦登高望河洛東城宫闕擬昭回南陌溝塍殊綺錯林下天香七寳䑓山中春酒萬年盃㣲風一起祥花落仙樂初鳴瑞鳥來花落紛紛更無已稱觴獻夀烟霞裏歌舞淹留景欲斜石間猶駐五雲車鳥旗翼翼流芳艸龍騎駸駸映晚花千乗萬騎鑾輿出水静山空嚴警蹕郊外喧喧引看人傾城南望屬車塵囂聲引颺開黄道王氣周迴入紫宸先王定鼎三河固寳命乗周萬物新吾君不是瑶池樂時雨來觀農扈春廣卓異記郭元振爲通泉縣尉前後掠所部千餘人遺賔客百姓苦之武后使籍其家有書數百卷令問其貲財所在知皆已濟人扵是竒而免之召見大稱㫖令口占古劍歌進天后竒之命繕冩贈諸學士歌曰君不見昆吾鐡冶飛炎烟紅光紫霧俱赫然良工鍜錬經幾年鑄得寳劍名龍泉龍泉顔色如霜雪良工咨嗟嘆竒絶琉璃匣裏吐蓮花錯鏤金環生明月正逢天下無飛塵幸得周防君子身精光黯黯青蛇色文章片片緑龜鱗非直結交㳺俠子亦嘗親近英雄人何言中道連弃捐零落湮淪古獄邊雖復沉埋無所用猶能夜夜氣冲天同前楊少卿凝式有材自負旣不大用多佯狂自穢逰寺觀遇水竹幽勝之地吟咏忘歸墻壁之上筆跡多滿僧道愛護莫不粉壁光㓗以俟揮掃逰客嘆賞故馮瀛王次子少吉題壁下曰少卿真跡滿僧居秪恐鍾王也不如爲報逺公須愛惜此書書後更無書安鴻漸題曰端溪石硯宣城管王屋松烟紫兎毫更得孤卿老書札人間無此五般高洛陽舊聞張翼善詩嘗投詩两帙於京師王相溥王諭之以詩云清河詩客本賢良惠我清吟六十章詞格宛同羅給事工夫深似賈司倉登山始覺天高廣到海方知浪渺茫好去蟾宫是歸路明年應折桂枝香廖圖字賛禹䖍州人文學博贍爲時軰人所服湖南馬氏辟幕下奏天䇿府學士與劉禹李宏臯徐仲雅蔡昆韋鼎釋虚中齊已俱以文藻知名更唱迭和今有集行扵世贈泉陵上人云暫把枯藤倚壁根禪堂𥘉創楚江濆直疑松小難留鶴未信山低住得雲艸接寺橋牛笛近日㗸村樹鳥行分毎來共憶曾逰䖏萬壑泉聲絶頂聞又和人贈沈彬詩云冥鴻跡在烟霞上燕雀休誇大厦巢名利最爲浮世重古今能有幾人抛逼真但使心無着混俗何妨手強抄深喜卜居連岳邑水邉松下得論交僧齊已寓渚宫與圖相去千里而每有書徃來臨終有絶句寄圖兄弟云僧外閑吟樂最清年登八十䘮南荆風騷作者爲啇搉道去碧雲争幾程雅言雜録江南韓熈載稱左偃能詩有集千餘首偃不仕居金陵寄廬山白上人云潦倒門前客閒眠歲又殘連天數峰雪終日與誰看萬丈高松古千㝷落水寒仍聞有新作懶寄入長安又昭君怨云胡笳聞欲死漢月望還生寄韓侍郎云謀身謀隱两無成拙計深慚負耦耕漸老可堪懷故國多愁翻覺厭浮生言詩幸偶明公許守朴甘遭俗者輕今日况聞搜草澤獨悲憔悴卧昇平韓見詩感歎厭浮生不喜不逾月果病卒年二十四王操有詩哭之曰堂親垂白日稚子欲行時温庭筠彦博之裔孫本名𡵨字飛卿少敏悟薄行無檢幅多作側詞艶曲與貴胄裴誠令狐滈等飲博與李商隱皆有名號温李醉爲邏卒撃折齒由汙行訴不得理連舉不第徐商鎮襄陽辟官不得志歸江東紀唐夫贈詩曰鳯凰詔下雖沾命鸚鵡才多却累身人多諷之庭筠旣以才廢引長沙之事自云豈司命重文章而輕爵䘵虗有授焉浮扵行者必有怨尤不自咎也並同前長安三月五日两街看牡丹奔走車馬慈恩寺元果院牡丹半月開故裴兵部憐白牡丹詩自題扵佛殿東頭蜃壁之上大和中敬宗自夾城出芙蓉園路幸此寺見所題詩吟翫乆之因令宫嬪諷念及暮此詩滿六宫矣詩曰長安豪貴惜春殘争賞先開紫牡丹别有玉盃承露冷無人肯就月中看南部新書李昇移鎮金陵旁羅隱逸沈彬赴辟知其欲取楊氏因獻山水圖詩曰須知手筆安排定不怕山河整頓難覧之而喜任濤豫章人詩名早著有露漙沙鶴起人卧釣舩流他皆倣此數舉敗於垂成李常侍隲㢘問江西時與放郷里之役民俗互有論列隲判江西界内凡有詩得似濤者即與免役摭言郭祥正自梅聖俞贈詩有采石月下訪謪仙以爲李白前身縁此有名又有金山行云鳥飛不盡暮天碧漁歌忽㫁蘆花風大爲王荆公所賞秦少章嘗云郭功父過杭州出詩一軸示東坡先自吟誦聲振左右旣罷謂坡曰祥正此詩幾分坡曰十分詩也祥正問之坡曰七分來是讀三分來是詩豈不是十分也工直方詩話徐俯字師川忠愍公之子有平生功名心夜窓短檠燈之句大爲山谷所賞山谷其舅也蘇伯固之子名庠字養直作清江曲云屬玉雙飛水满塘菰蒲深䖏浴鴛鴦白蘋滿棹歸來晚愁看蘆花一片霜扁舟繋岸依林樾蕭蕭两鬢吹華髪萬事不理醉復醒長占烟波弄明月坡曰若置在李太白集中誰疑其非秦覿字少儀好爲詩𥘉亦不甚工旣而以獻山谷山谷贈之曰乃能持一鏃與我箭鋒直又云自我得此詩三日卧向壁才難不其然有亦未易識當時交㳺以此言爲過然少儀縁此思大發交㳺亦刮目視之並同前增脩詩話總龜卷之四百家詩話總龜後集卷之四孝義門唐人與親别而復歸謂之拜家慶盧象詩云上堂家慶畢顧與親思邇孟浩然詩云明朝拜家慶湏著老莱衣葛常之荆公𥘉去臨川詩云馬頭西去淚霑襟一望親庭更苦心已覺省煩非仲叔安能飬志似曾參赴調西笑時詩也非仲叔則自傷不能飬口躰不如曽参則自傷不能飬志也人士一官所駈乃爾爲志亦豈得巳哉後又有詩云古人一日飬不以三公換正爲此爾葛常之張劍州以太夫人䘮劒州歸荆公予之詩并示女弟云烏辭反哺顛毛黒鳥引思歸口舌丹又有張劍州至劍一日以親憂罷詩云白頭反哺秦烏側流血思歸蜀鳥前所賦皆一時之亊而語意重復如此何耶月上陳繹奉親至孝嘗作度老堂以娯其母介甫贈之詩云種竹常疑出冬筍開池故合涌寒泉盖不獨詠堂前景物而孝感之事實寓焉岀冬笱暗用孟宗事涌寒泉暗用姜詩事同上王稚川調官京師母老留鼎州乆不歸侍嘗閱貴人歌舞有詩云畫堂玉珮縈雲響不及桃源欵乃歌山谷次韻諷之曰慈母毎占烏鵲喜家人應賦扊扅歌可謂盡朋友責善之義谷至孝奉母安康君至爲親滌廁牏浣中裙未嘗頃刻不供子聀洎貶黔南不能與親俱則贈王郎詩云晋我左右手奉承白髮親至贑上食蓮有感則曰蓮實大如指分丼念母慈亦可見其孝誠矣余聞無瑕者可以戮人則其告稚川之語未爲過也老杜送李舟詩非不歸重而其中亦不能無譏焉所謂舟也衣彩衣告我欲逺適倚門固有望歛衣就行役南登吟白華已見楚山碧何時太夫人堂上㑹親戚豈非譏其無方之逰耶孔子云父母在不逺逰逰必有方則山谷少陵之詩皆孔子之意也人之事親當以敬爲主故孔子吿子游曰至於犬馬皆能有養不敬何以别乎束晢作𥙷亡詩於南陔白華二篇每以爲言南陔曰飬隆敬薄惟禽之似白華曰竭誠盡敬亹亹忘劬可謂得孔子之旨矣今之人恃親之愛已而忘其敬者多故表而出之以爲事親之戒同上李白樂府三卷於三綱五常之道数致意焉慮君臣之義不篤也則有君道曲一篇所謂軒后爪牙常先太山稽如心之使臂小白鴻翼於夷吾劉葛魚水二慮父子之義不篤也則有東海勇婦之篇所謂淳于免詔獄漢主爲緹縈津妾一棹歌脫父於嚴刑生子若不肖不如一女英慮兄弟之義不篤也則有上晋田之篇所謂田氏倉卒骨肉分青天白日摧紫荆交柯之木本同形東枝顦顇西枝榮无心之物尚如此参商胡乃㝷天兵慮朋友之義不篤也則有箜篌謡之篇所謂貴賤交結心不移惟有嚴陵及光武輕言託朋友對面九疑峯管鮑乆巳死何人継其蹤慮夫婦之情不篤也則有䨇燕離之篇所謂䨇鷰復雙鷰雙飛令人羡玉樓珠閣不獨捿金窓繡户長相見徐䆒自行事亦豈純於行義者哉永王之叛白不能㓗身而去於君臣之義爲如何旣合于劉又合于魯又娶于宋又携昭陽金陵之妓於夫婦之義爲如何至於友人路亡白爲權窆及其麋潰又收其骨則朋友之義庻㡬矣送蕭十一之魯兼問稚子伯禽有髙堂倚門望伯魚魯中正是趨庭䖏君行旣識伯禽子應駕小車騎白羊之句則父子之義庻㡬矣如弟凝錞儕况綰各贈詩以致其雍睦之情則兄弟之義庻㡬矣惜乎二失旣彰三羙莫贖此所以不能爲醇儒也韻語陽秋樂天及第後歸覲留别同年云擢第未爲貴拜親方始榮此毛得檄而喜之意也論者以春風得意疾决非孟郊語其氣格亦不類而白公亦有得意减別恨半酣輕逺程翩翩馬蹄疾春風歸郷情此又不可曉也黄常明范文正公雷霆日有犯始可報吾親誰謂臣子忠難於兩全也涖官不敬戰陣無勇本非事親事禮記必以爲非孝公之謂歟黄常明宗族門謝師厚生女梅聖俞與之詩曰生男衆所喜生女衆所醜生男走四隣生女各張口男大守詩書女大逐鷄狗又云何時集氏郎堂上拜媪叟盖戯師厚也陳琳杜甫詩及楊妃外傳其說異焉琳痛長城之役則曰生男戒勿舉生女哺用哺杜甫傷関西之戍則曰生女猶是嫁比鄰生男埋没隨百草楊妃專寵帝室金印盩綬寵遍於銛釗象服魚軒荣均於秦􅉑當時遂有生女勿悲酸生男勿喜歡男不封侯女作妃君㸔女却爲門楣之詠而樂天長恨歌亦云遂令天下父母心不重生男重生女今師厚之女敏質儒門不過求賢士以爲之配爾縦不至負薪如瞿婦餉舂如孟光亦豈能預知其必大冨貴亢宗荣族如蒲之婦人乎冝其聖俞以爲戯也韻語陽秋傳曰學士大夫則知尊祖矣族之所在祖之所自出也其可以不敬乎陶淵明有贈長沙公詩序云予於長沙公爲族祖同出大司馬昭穆旣逺巳爲路人故其詩云同源分流人易世踈慨然晤歎念斯厥𥘉禮服遂悠歲月眇徂感彼行路眷焉踟蹰盖深傷之也長沙公於淵明如此而淵明乃以教載自任其臨别贈言之際有進簣雖少終左爲山之句嗚呼淵明亦可謂賢矣杜子羙数訪從孫濟而不免於防猜故其詩云所来爲宗族亦不爲盤餐勿受外嫌猜同姓古所敦觀長沙與済尊祖之義掃地矣韻語陽秋百家詩話總龜後集卷之四
