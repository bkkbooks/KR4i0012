front:
  text: 增修詩話總龜卷之三十六
  hash: sha256:cf74ffadca58e80cbe13b0db9810283eb4de7be7bac85663993eb34d4568fb9f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_036-1a}
body:
  text: 譏誚門中苗台符十六歲張讀十八歲同年登科為鄭宣州幕嘗列題於西明寺之東廡或竊注之曰一雙前進士兩箇阿孩兒李煜作江羅亭四面栽江梅花作艷曲歌之韓熙載和云桃李不須誇爛熳已輸了風吹一半時淮南巳歸周趙嘏浙人有美妾洎計偕母不許携行會上元莭為鶴林之逰帥見之掩為己有明年嘏榮歸以詩感之曰寂寞堂前曰又薰陽臺去作不歸雲當時聞説沙吒利今日青蛾屬使君帥聞遣歸李啇隱依彭陽令狐楚以箋奏受知後其子綯有韋平之拜浸踈啇隱重暘日義山造其廳事留題云十年泉下無消息九日樽前有所思郎君位重施行馬東閣無因得再窺綯見之慚悵扄閉此廳終身不處袁筠婚蕭楚女言㝎未幾擢進士第羅隱以一絶刺之云細看月輪還有意㝎知青桂近嫦娥林和靖傲許洞洞作詩嘲之云寺裏掇齋飢老鼠林間咳嗽病獼猴豪民送物鵝伸頸好客窺門鱉縮頭章邭公性簡靜嘗為開封府試官出人為天地心賦舉子曰先朝曽試遽别出一題曰教尤寒暑既非致思舉子又上請此題出樂記教乃樂教也上在諒隂而用樂事恐非便方紛紛不已無名子作詩嘲曰武成廟裡沽良玉夫子門前㺯簸箕唯有主司章得象往來寒暑未曽知時南廟試良玉不琢國學試良弓之子必學為箕賦並同前韓退之彌明傳云嘗與文友會宿有老道士形貌怪異自通姓名求宿言論甚竒既飲酒衆度其不能詩因聮句咏爐中石䁀將以困之首唱曰妙匠琢山骨刳中事調烹至彌明自云不善俗書人多不識乃遣人執筆硯吟曰龍頭縮囷蠢豖腹脹膨脝坐客盡驚會人思竭不能復續彌明連促之坐中有𣣔吟其聲悽苦彌明句中侮之曰仍於蚯蚓竅更作蒼蠅聲須臾倚壁睡鼻息如雷坐客異且畏之古今詩話光化中羅隱佐兩浙幕同院沈嵩得新榜封示隱隱批一絶於𥿄尾曰黃土原邊狡兔肥犬如流電馬如飛灞陵老將無功業猶憶當時夜獵歸正元中太府卿韋渠牟金吾李齊運皆寵貴薦人多得名位時劉師老穆寂皆應科目渠牟主穆寂齊運主師老會齊運對順宗嗟其羸弱許以致仕而歸師老失據無名子曰太尉朝天升穆老尚書倒地落劉師劉禹錫曰名埸嶮巇如此王文惠相府中病尤好釋氏時有人作詩曰誰謂調元地畨成飬病坊但見僧盈室寧知火燎房盧肇黃頗皆冝春人頗冨於財而肇苦貧與頗同赴舉復同日登途郡守獨餞頗於郵亭而遣肇明年肇狀元登第歸郡守會肇看競渡肇即席作詩曰向道是龍剛不信果然奪得錦標歸太守大慚韋蟾左丞至長樂驛見李瑒給事題名因書其側云渭水春山照眼明希仁何事寡詩情只應學得虞姫壻書字才能紀姓名劉魯風江西投所知為典謁所阻因得一絶曰萬卷書生劉魯風煙波千里謁文公無錢乞與韓知客名􅑚生毛不為通范魯公質舉進士和相凝愛其程文以自登第舊在十三人謂魯公曰公之詞業合在甲選暫屈十三人之傳老夫衣鉢可乎魯公謝之後果至宰相亦且相繼門生有獻詩者云從此廟堂添故事登庸衣鉢亦相傳李郁尚書為荆南從事有朝士寄書字體殊惡李寄詩曰華緘千里到荆門章草縱橫任意論應笑鍾張虛用力却教羲獻謾勞魂惟堪愛惜為珍寶不敢晉傳示子孫深荷故人相愛處天行時氣許教吞言堪作符也並同上北齊盧思道聘陳設宴聮句作詩先唱者􅏺北人云榆生欲飽漢草長正肥驢謂北人食榆吳地無驢故有此句思道即續之曰共甑分炊飰同鐺各煮魚謂南人無義同炊異饌也吳人愧之談藪洛陽有談歌婦人楊苧羅朝辦言有才思楊凝式侍侍郎以姪女呼之憐其聰彗也時有僧雲辨者有文善能講經善應對若祀祝之辭隨名位髙下對之三十字如宿思少師尤重之長壽年五月雲辨講對歌者忽有蜘蛛于簷前垂絲而下正對少師與雲辨前少師笑謂歌者曰試嘲得著奉絹五匹歌者不思應聲嘲之意不離蜘蛛戲之雲辨雲辨體充肚大不能行少師見詩絶倒大呌和尚將絹五匹雲辨慙且笑與絹五匹詩嘲蜘蛛曰吃淂肚罌撑尋絲繞寺行空中設羅網只待殺衆生洛陽舊聞至和間有數達官以詩知名常慕樂天體多得于容易曾有一聮云有祿肥妻子無恩及吏民有人戲之曰昨日通衢遇一輜軿車載極重嬴牛甚苦豈非足下妻子乎聞者傳以為笑歐公詩話向文簡在延州嘗有詩云四時常有煙棚合三月猶無萊甲生又有人嘲同州詩云三春花發惟樗樹二月鶯啼是老鴉雜志徐州雲水山人張天驥不逺千里見朱定國于錢塘愛其中風物遂欲徙家居焉春盡思歸以詩戲之云羡公飄蕩一孤舟來作錢塘十日遊水洗禪心都眼淨山供詩筆捴眉愁雪中乘興真聊爾春盡思歸都罷休何事却尋朱處士種魚万尾橘千頭絶詩閩人廖復天禧二年求薦天府下撾鼓訟之覆考再收省試又下湖人凌景陽因復訟之亦再收髙第遂登科士子作詩嘲復曰細思堪恨廖賢良論中科名屬景陽啼得血流無用處為它人作嫁衣裳朱定國録曰續歸景祐中有輕簿子以古人二十字詩益成二十八字嘲誚曰仲昌故國三千里宗道深宫二十年殿院一聲河滿子龍啚雙泪落君前龍啚王慱文也嘗更大藩鎮開封知府王司使一日對上前因敘揚歷之久不覺泪下殿院蕭定基也為殿中侍御史與韓魏公吳春卿王君貺同發解開封舉人作河滿子曲嘲之因奏事仁宗問之令誦一遍王宗道為諸王教授及講書凡二十餘年不求進用仲昌者章郇公文仲從子論科場不公奏聞牒歸建州當時以為雖用古人詩句而切中一時之盛事傳以為笑樂東齋録丁晉公與楊文公逰處宴集必有詼諧之語復皆敏于應答一日臺諌攻文公因晚俟晉公之門方伏拜晉公亟謂文公曰內翰拜時髭擊地文公隨聲答曰相公坐處幕瞞天蓋楊美髭髯而丁第方盛設帷幕因互相議也有宋佳話太尉田重進起于戎行晚年好道術喜黃老有㨂停兵士張花項衣道服以其項多雕篆目之為花項又引道士為同志前後所用錢帛悉資之無少違久而無成忽一日云出采藥八月當成晚大醉歸重進問尊師從來飲何遽醉花項微笑其實不飲昨日見一仙流向西頂禮重進問何人花項恭肅低言即吕洞賔謂曰重進武人好事如此此人有壽今已有微疾田微染風痾某當暫屆少藥療之田大喜曰重進粗人何銷神仙下降且曰何時至花項曰此月十五日夜三更必至吕不欲多見人望太尉于射亭張設用好新禋褥靜室燃香鮮果好酒後至五更重進久患風折腰艱難重進方欲責花項虛誕外報尊師門大開囊篋般運已盡重進慚恨鳴指曰無良漢無良漢自是不復信時有無名人獻詩一首以笑之永興軍人尚能念誦詩曰或作黃金或作銀熱人好幸搏尖新一朝狂惑田重進半夜板迎吕洞賓􅢺漢出門時引領黠兒淂路已潛身雖稱兩個無良漢笑殺長安萬万人洛陽舊聞湖南徐仲雅與李宏皋劉昭禹齊名所業百餘卷並行于世耕夫謡一首云張緒逞風流王衍事輕簿出門逄耕夫顔色必不樂肥膚如玊潔力拗絲不折半日無耕夫此輩惣餓殺雅言雜載周顓處士洪儒奧學偶不中第旅淅西從事歡飲惟昧于章程座中皆戲之有贈詩曰龍津掉尾十年勞聲價當時閗月髙惟有紅粧回舞手似持霜刃向猿猱周和曰十載文場敢憚勞宋都回鷁為風髙今朝甘伏花枝笑任道樽前愛縳猱南唐近事廬山道士體貌魁偉飲酒啖肉居九天使者廟有雙鶴因風所飄憩于廟庭道士驚喜自謂當赴上天命令山童控而乘之羽儀清弱不勝其載毛傷骨折而斃翌日馴飬者知訴于公府處士陳沆嘲之曰啖肉先生𣣔上升黃雲踏破紫雲崩龍腰鶴背無夛力傳語麻姑借大鵬南唐近事李山甫詩名冠於當代過烏江題項羽廟云為虜為王盡偶然有何慙見渡江船平分天下猶嫌少可要行人贈𥿄錢又贈宿將曰校獵燕山經幾春雕弓白羽不離身年來馬上渾無力望見飛鴻指似人任谷冨有經術隱居於洛以俟召命未降蒲輪乃躬到京訪知巳有朝官戲贈曰雲間應訝鴈書遲自到京中探事冝從此見山須合眼𬒳山相賺巳多時後至輔衮曹確楊收徐啇路岩同秉政時有詩嘲之曰確確無餘事錢財總𬒳扠啇人都不𬋩貨賂幾時休南部新書增修詩話總龜卷之三十六百家詩話總龜後集卷之三十六怨嗟門孟郊詩云借車載家具家具少于車借者莫彈指貧窮何足嗟可見其素窶後有詩云賔秋巳覺厚私儲常恐多是古人恐冨求歸之義則貧亦何足怪按郊為溧陽尉縣有投金瀨平陵城林薄蓊蔚郊往來其間曹務都廢至遣假尉代之而分其半俸則安得有私儲哉退之贈郊詩云陋室有文史高門有笙竽何能辨榮辱且欲分賢愚蓋言貧者文史之樂賢于冨者笙竽之樂也葛立之司馬遷遊江淮汶泗之境紬金匱石室之書而作史記上下數千年殆如目覩可謂孤拔𥘉遭李陵之禍不肯引決而甘腐刑者實欲效離騷吕覽説難之書以攄憤悱故荆公詩云嗟子刀鋸間悠然止而食成書與後世憤悱聊自釋觀史記評贊于范睢蔡澤則曰二子不困厄烏能激乎于季布則曰彼自負才故受辱而不羞于虞卿則曰虞卿非窮愁則不能著書以自見于伍貟則曰隱忍以就功名至于作貨殖遊俠二傳則以家貧不能自贖左右親戚不為一言而寄意焉則荆公釋憤悱之言非虛發也韻語陽秋晨牝妖鴟索家生亂自古而然故夏姫亂陳費無極亂楚李義山咏北齊云小憐玉體橫陳夜已報周師入晉陽東坡城都畫手開十眉橫雲却月爭新竒遊人指點小顰處中有漁陽胡馬嘶熟味此詩則吳人何苦怨西施豈足稱詠史哉等而下之凡移于尤物皆可以為戒黃常明杜牧張祜皆有春申君絶句杜云烈士思酬國士恩春申誰與快冤魂三千賓客捴珠履欲使何人殺李園張云薄俗何心議感恩諂容卑迹賴君門春申還道三千客寂寞無人殺李園二詩語意太相犯于乎朱英之言義矣而春申不能必用李園之計巧矣而春申不能預防春申之客衆矣而無一人為春申殺李園者所以起二子之論也余亦嘗有二絶云朱英意在強黃歇黃歇如何弱李園一旦棘門竒􅍔作自貽伊戚向誰論又先秦豈謂嬴為吕東晉那知馬作牛不悟春申亦如許敢慿宮掖妻邪謀同上唐淄青李師道倚蔡為重稱兵不軌洎蔡平師道乃始震悸憲宗􅒛削其官詔諸軍進討于是六莭度之兵興矣故劉夢得嘗為天齊行二萹以快李師道之死夫師道猖獗狂悸反噬其主人怨神怒豈能居覆載之中乎故夢得云牙門大將有劉生夜半射落攙搶星又云太山沉寇六十年旅祭不饗生愁煙今逢聖君𣣔封禪神使隂兵來助戰夫劉悟本軍之將也力為師道屯陽榖以當魏慱乃倒戈以攻其主太山本土之神也冝福其地而乃以隂兵助敵則人怨神怒可知矣將叛其君神叛其主豈非以此始者以此終乎天之所報速矣同上杜子美身遭離亂復迫衣食足迹幾半天下自少時逰蘇及越以至作諌官奔赱州縣既皆載壯逰詩矣其後贈韋左丞詩云今欲東入海即將西去秦則自長安之齊魯也贈李白詩云亦有梁宋逰方期拾瑶草則自東都之梁宋也發同谷縣云賢有不黔突聖有不暖席姑來茲山中休駕喜地僻奈何物迫纍一歲四行役則自隴右之劍南也留别章使君云終作適荆蠻安排用莊叟隨雲拜東皇挂席上南斗則自蜀之荆楚也夫士人既無常産為飢所驅豈免仰給于人則奔赱道途亦理之常爾王建云一年十二月強半馬上看貟缺百年歡樂能幾何在家見少行見多不緣衣食相驅遣此身誰願長奔波李頎亦云男兒在世無産業行子出門如轉蓬皆為此也同上陶淵明乞食詩云飢來驅我去不知竟何之而繼之以感子漂母惠愧我韓才非則求而有獲者也杜子美上水遣懷云驅馳四海內童稚曰糊口而繼之以但遇新少年少逄舊知友則求而無所得者也山谷貧樂齋詩云飢耒或乞食有道無不可過青草湖云我雖貧至骨尤勝杜陵老憶昔上嶽陽一飯徔人討由是論之則杜之貧甚於陶如山谷之貧尚優於杜也同上老杜避亂秦蜀衣食不足不免求給於人如贈髙彭州云百年巳過半秋至轉飢寒為問彭州牧何時救急難客夜詩云計拙無衣食途窮仗友生老妻書數𥿄應悉未歸情狂夫詩云厚祿故人書斷絶常飢稚子色凄涼答裴道州詩云露名但蒙寒溫問泛愛不救溝􅊤辱蕳韋十詩云因知貧病人須棄能使韋郎迹也踈觀此五詩可見其艱窘而有望于朋友故舊也然當時能期之者幾何人哉劉長卿云世情薄恩義俗態輕窮厄山谷云持飢望路人誰能顔色溫余于子美亦云葛常之李翶賦衆囂嚻而雜處咸歎老而嗟卑顧豫心獨不怨兮慮行道之猶非文忠常稱之觀老杜漢隂有鹿門滄海有靈槎焉能學衆口咄咄空咨嗟正同此意同上樂天謫潯陽寄左降詩云殘燈無熖影幢幢此夕聞君得九江垂死病中驚起坐暗風吹雨入寒窗白謂此句他人尚不可聞况㒒心哉至今每吟猶惻惻耳復貽三韻云憶昔封書與君夜金鑾殿後欲明天今夜封書在何處廬山庵裏曉燈前去來乃士之常二公不應如此戚戚也子瞻送文與可云奪官遣去不自覺曉梳脫髮誰能收推之前詩厥論尚矣然居易答元書以三太為報且云可以樂之終身者悲歎之語恐特傷離索耳䂬溪詩有人之情性也非強諌爭于庭怨詈于道怒鄰詈坐之所為也余謂怨鄰詈坐固非詩本指若小辨親親未嘗無怨何人斯取彼譛人投卑豺虎未嘗不憤謂不可諌爭則又甚矣針規刺誨何為而古者帝王尚許百工各執藝事以諌詩獨不得與工技等哉故譎諌而不斥者惟風為然如雅云匪面命之言提其耳彼童而角實訌小子憂心慘慘念國之為虐亂匪降自天生自婦人忠臣義士𣣔正君㝎國惟恐所陳不激切豈盡優柔婉媚乎故樂天寄唐生詩云萹萹無空文句句必盡規子建稱孔北海文章多雜以嘲戲子美亦戲效俳諧體退之亦有寄詩雜談俳不獨文舉為然自東方生而下你處士張長史顔延年輩往往多滑稽語大抵才力豪邁有餘而用之不盡自然如此韓詩濁醪沸入口口角如銜箝試以詩義授如以肉貫串𥘉食不下喉近亦能稍稍皆謔語也坡類集此不可勝數寄蘄簟與蒲傳正云東坡病叟長羇旅凍飢餓吟似飢鼠倚賴東風先破衾一夜雪寒披故絮黃州云自慚無輔絲毫事尚費官家壓酒囊將之湖州云吳兒膾薄薄欲飛未去先説饞涎垂又尋花不論命愛雪長忍凍天公非不憐聽飽即喧閧食筍云紛然生喜怒似𬒳狙公賣種茶云飢寒未巳免巳作大飽計平生五千卷一字不救飢寒來憑空按一字不可煮皆斡旋其語而弄之信恢刃有餘與血指汗顔者異矣黃常明詩眼云山谷常言少時曽誦薛能詩云青春背我堂堂去白髮欺人故故生孫莘老問云此何人詩對曰老杜莘老云杜詩不如此後山谷語傳師云庭堅因莘老之言遂曉老杜詩髙雅大體傳師云若薛能詩正俗所謂歎世耳後湖集云余每讀蘇州漠漠帆來重冥冥烏去遲之語未嘗不茫然而思喟然而歎嗟乎此余晚泊江西十年前夢耳自余奔竄南北山行水宿所歷佳處固多欲求此夢了不可得豈蒹葭莾蒼無三湘七澤之壯雪蓬煙艇無風檣陳馬之竒乎抑吾且老矣壯懷銷落塵土坌沒而無少日煙霞之想也慶長筆端丘壑固自不凡當為余圖蘇州之句于壁使余隱几靜對神逰八極之表耳百家詩話總龜卷之三十六
