front:
  text: 詩話總龜卷之七
  hash: sha256:a6a536b8f9c86064d36585f68d2af91632a297df96d80e50f5c1b412dee32de1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_007-1a}
body:
  text: 評論門三南嶽李岩老好睡衆人食罷下碁岩老輒就枕閲數局乃一展轉云我始一局公幾局矣東坡曰岩老常用四腳棊盤只著一色黑子昔與邉韶敵手今𬒳陳搏饒先著時自有輸嬴著了全無一物歐陽公詩云夜涼吹笛千山月路暗迷人百種花碁罷不知人換世酒闌無奈客思家殆類是也百斛明珠竹徑通幽處禪房花木深常建詩也文忠公最愛賞以為不可及此語誠可人意然於公何足道豈非厭飫芻豢反思螺蛤耶豫在都下有傳太白詩者其略曰朝披雲夢澤又曰笠澤青茫茫此非世人語也蓋有見太白在酒肆而得此詩者神仙之道真不可度紹聖元年九月過廣州訪崇道太師何德順有神仙降其室因言女仙也賦詩立成有超逸絶塵語或以其托于箕帚如世之紫姑神者疑之然味其言非紫姑所能至有入鬼獄群鳥獸者而托於箕帚豈足怪哉崇道好事喜客多與士大夫遊其必有以致哉七言之偉麗者杜子美云旌旗日暖龍蛇動宫殿風微燕雀高五更鼓用聲悲壯三峽星河影動搖爾後寂寥無聞直至永叔云蒼波萬古流不盡白鷺雙飛意自間萬馬不嘶聽號令諸蕃無事樂耕枟可以並驅爭先矣小生云令嚴鍾鼓三更月野宿貔貅萬竈煙又云露布朝馳玉關塞捷書夜到甘泉宫亦庶幾焉樂天為王涯所誣謫江州司馬甘露之禍樂天在洛適遊香山寺有詩云當君白首同歸日是我青山獨往時不知者以樂天為幸之樂天豈幸人之禍者蓋悲之也俗傳書生入官庫見錢不識或怪而問之生曰固知其為錢但怪其不在𥿄褁中耳豫讀淵明歸去來辭云幼稚盈室瓶無儲粟乃知俗傳可信使瓶有儲粟亦甚微矣此翁平生只於瓶中見粟也馬后夫人見大練乃為異物晉惠帝問飢民何不食肉麋細思之皆一理也聊為好事一笑永叔嘗言孟郊詩鬢邊雖有絲不堪織寒衣縱使堪織能成幾何淵明詩采菊東籬下悠然見南山采菊之次偶見南山初不用意而景與意會故可喜也今皆作望南山子美云白鷗沒浩蕩萬里誰能馴蓋滅沒於波間耳而朱敏求謂豫曰鷗不解沒改作波字改此覺一篇神氣索然唐宋五代文章衰盡詩有貫休有亞栖村俗之氣大率相似如蘇子美家收藏張長史書云隔簾歌已俊對面貌彌精既凡惡而字畫真亞栖之流近見曾子固編李太白詩自謂頗獲遺亡而有贈懷素草書歌及笑矣乎數百篇皆貫休以下詞格二人者皆號有識故知者深可怪如白樂天贈徐凝韓退之贈賈島之類皆世俗無知者所托此不足怪杜子美詩云自平宫中吕太一世莫曉其義而妄者至以為唐時有自平宫偶讀明皇實録有中官吕太一叛廣南此詩故云而下文有南海收珠之語見書不廣而輕改文字鮮不為笑也秋菊有佳色浥露掇其英泛此忘憂物逺我遺世情一觴難獨進杯盡壺自傾日入群動息歸鳥趍林鳴嘯傲東軒下聊復得此生靖節以無事自適為得此生則見役於物非失此生耶貴公子雪中飲醉臨檻向風曰爽哉此風左右皆泣下貴公子驚問之曰吾父昔日以爽亡楚襄登臺有風颯然而至王曰快哉此風寡人與衆共者耶宋玊譏之曰此獨大王之風庶人安得而共之不知者以為諂也知之者以為風也唐文宗詩曰人皆苦炎熱我愛夏日長柳公權續之曰薰風自南來殿閣生微涼惜乎宋玉不在旁也湘中老人讀黃老手挼紫虆坐碧草春至不知湖水深日暮忘却巴陵道唐末有人見作是詩其辭氣殆是李謪仙豫都下見有人携一𥿄文書字則顔魯公也墨迹如未乾𥿄亦新健其首兩句云朝披雲夢澤笠釣青茫茫此語非太白不能道南都王誼伯書江濵馹垣謂子美詩歷五季兵火多斘缺竒異雖經其祖父公所理尚有疑闕者誼伯謂西川有杜鵑東川無杜鵑涪萬無杜鵑雲安有杜鵑蓋是題下注斷自我昔逰錦城為首句誼伯悮矣蓋子美詩備諸家體非必率合程度侃侃者然也是篇句處凡五杜鵑豈可以文害辭辭害意即原子美之意類有所感托物以發者也亦六義之比興離騷之法歟按博物志杜鵑生子寄之他巢百鳥飼之今江東所謂杜宇曾為蜀帝王化禽飛去舊城荒是也且禽鳥之微知有尊故子美詩云重是古帝魂又禮若奉至尊子美蓋譏當時之刺史有不禽鳥若也自唐明皇已後天步多棘刺史能造次不忘於君者可得而考嚴武在蜀雖橫斂刻薄而實資中原是西川有杜鵑耳其不虔王命負固以自抗擅軍旅絶貢賦如杜克遜在梓州為朝廷西顧憂是東川無杜鵑耳至於涪萬雲安刺史微不可考凡其尊君者為有也懷二者為無也不在夫杜鵑真有無也誼伯以為來東川聞杜鵑聲煩而急乃始疑子美詩跋疐𥿄上語又云子美不應疊用韻子美自我作古疊用韻無害于為詩僕見如此誼伯博學強辨殆必有以折衷之悲陳陶云四十萬人同日死此房琯之敗也唐書作陳濤不知孰是時琯既敗猶欲持重有所伺而中人邢延恩促戰遂大敗故此次篇悲長坂云焉得附書與我軍忍待明年莫倉卒後出塞云我本良家子出師亦多門將驕益愁思身貴不足論躍馬三十年恐辜明主恩云云惡名幸脫免窮老無兒孫味此詩蓋祿山反時其將帥有脫身歸國而祿山盡殺其妻子者不知其姓名可恨也憶昔詩云關中小兒壞綱紀謂李輔國也張后不樂上為忙謂肅宗張皇后也為留猛士守未央謂郭子儀奪兵柄入宿衛也子美自許稷與契人未必許也然其詩云舜舉十六相身尊道更高秦時用商鞅法令如牛毛自是稷契輩人口中語也又云知名未足稱局促商山芝又曰王侯與螻蟻同盡隨丘墟願聞第一義回向心地初乃知子美詩尚有事在玉川子作月蝕詩云歲星坐福德官爵奉董秦忍使黔婁生覆尸無衣巾詳味此詩則董秦當是無功而享厚䘵董秦李忠臣也天寶末驕將屢立戰功雖粗官亦頗知忠義代宗時吐蕃犯闕徴兵忠臣即日赴難或勸擇日忠臣怒曰君父在難乃擇日也後卒汚朱泚偽命誅考其始終非無功而享厚䘵者不知玉川子何以有此句詩人有寫物之功桑之未落其葉沃若他木殆不可以當此林逋梅花詩云踈影橫斜水清淺暗香浮動月黃昏決非桃李詩皮日休白蓮詩云無情有恨何人見月冷風清欲墜時決非紅蓮詩此乃寫物之功若石曼卿紅梅詩云認桃無緑葉辨杏有青枝此村學中至陋語也王燾集外臺祕要有代茶飲子一首云格韻高絶惟山居野人乃當作之豫嘗依法治服其利鬲調中信如所云而其氣味乃一服煮散耳與茶了無干涉薛能詩云粗官乞與真拋擲賴有詩情合得嘗又作鳥觜詩曰鹽損添冝戒薑冝煮更誇乃知唐人之於茶蓋有河朔脂麻氣也並同前老杜云張公一生江海客身長九尺鬚眉蒼謂張鎬也蕭嵩薦之云用之為帝王師不用則窮谷一叟爾同前長沙天䇿府諸學士所著文章擅名者惟徐東野李洪臯耳然其詩皆浮脆輕艷鉛華歌舞一時尊爼間語獨東野贈江處士一篇可采曰門在松隂裏山僧幾度過藥靈丸不大棊妙子無多薄霧籠寒徑殘風戀緑蘿金烏兼玉兔年幾奈公何玉壺清話將進酒魏謂之平關中吳謂之章洪德晉謂之因時運梁謂之石首扄齊謂之破侯景周謂之取巴蜀李白所擬直勸岑夫子丹丘生飲耳李賀深于樂府至于此作其辭亦曰琉璃鍾琥珀濃小槽酒滳珍珠紅嗟乎作詩者擺落鄙近以得意外趣者古今難矣樂府集君馬黃古詞云君馬黃臣馬蒼二馬同逐臣馬良終言美人歸以南歸以北駕車馳馬令我傷李白擬之遂有君馬黃我馬白馬色雖不同人心本無隔其末云相知在急難獨好亦何益自能馳騁不與古人同圈摸非逺非近此可謂善學詩者歟日出東南隅行古詞曰日出東南隅照我秦氏樓舊説邯鄲女子姓秦名羅敷為邑人千乘王仁妻仁為趙王家令羅敷出採桑陌上趙王登樓見而恱之置酒欲奪焉羅敷彈筝作陌上桑以自明不從今其詞乃羅敷采桑陌上為使君所邀羅敷盛誇其夫為侍郎以拒之論者病其不同大抵詩人感詠隨所命意不必盡當其事所謂不以辭害意也且發乎情止乎禮義古詩之風也今次是詩蓋將體原其迹而以辨麗是逞約之以義殆有所未合而盧思道傳縡張正見復不究明更為祖述使若其夫不有東方騎不為侍中郎不作專城居乃得從使君之載歟如劉邈王筠之作蠶不飢日未暮亦安得倣徨為使君留哉蕭撝殷謀曾不足道而沈君攸所謂看金怯舉意求心自可知者庶幾焉故秋胡婦曰婦人當采桑力作以飬舅姑亦不願人之金此真烈之辭耳余嘗擬古作一篇以著羅敷所以待使君之當然者直欲規諸子以就雅正豈固與古人爭驅哉其詞曰羅敷十五六采桑城南道臉媚奪朝霞蛾眉淡𥘉掃桑枝間桃樹不見桃花好采桑未盈筐春寒蠶欲老使君從南來黃金絡馬腦調笑一不顧東風搖百草玄雲周禮保章氏以五雲之物辨吉凶水旱豐荒之祲雲黑為水魏劉掞詩曰玄雲起髙嶽中朝彌八方春秋孔演圖曰黃帝之將興黃雲升於堂文命之候玄龍衝雲漢曲名此謂是乎隴頭吟隴州有大隴小隴二山即天水大坂也古詞云隴頭流水鳴幽咽遙望秦川腸欲絶作是詩者著征役之思耳關山月木蘭詩萬里赴戎機關山度若飛朔氣傳金柝寒光照鐡衣濟黃河援神契黃河者水之伯上應天河􅐱元水經云河源出崑崙之墟山海經昆崘縱橫萬里髙萬有一千里有青白赤黑河環其墟其泉出東北陬屈向東南流為中國河百里一小曲千里一大曲發源乃入中國常然爾雅河出昆崘墟色白由此言之今之黃河所謂白河也而物理論乃云河色黃赤渡易水曲荆軻去燕入秦渡易水為之歌曰風蕭蕭兮易水寒壯士一去兮不復還其後如吳均所作雖敘征虜事蓋亦取軻感激之意董逃行言神事傳休奕九秋篇十二章乃敘夫婦別離之思梁簡文賦行幸甘泉宫歌復云董桃律金紫賢妻侍禁中疑若引董賢及子瑕殘桃事終云不羡神仙侣排煙逐駕鴻皆所未詳按漢武內傳王母觴帝命侍女索桃剩桃七枚大如鴨子形色正青以四枚啖帝因自食其三帝收餘核王母問何為帝曰欲種之王毋曰此桃三千歲一生實奈何帝乃止於是數過命侍女董雙成吹雲和笙觴作者取諸此耶桃葉歌桃葉王獻之愛妾名也其妹曰桃根詞云桃葉復桃葉桃葉連桃根今秦淮口有桃葉渡即其事也古人載桃葉答獻之乃團扇辭蓋傳者悮也團扇歌晉中書令王珉好持白扇其侍人謝芳歌之因以為名一説珉與嫂婢有情好甚篤嫂鞭撻過苦婢素善歌而珉好持白團扇故云團扇復團扇許持自遮面憔悴無復理羞與郎相見大垂手舞貌也楚辭曰二八齊容起鄭舞祍若交竿舞按下梁劉孝標舞詩曰轉袖隨歌發頓履赴絃餘度行過接手回身乍斂裾胡姬年十五李白樂府有白鼻騧其詞曰銀鞍白鼻騧緑地障泥錦細雨春風花落時揮鞭且就胡姬飲豫章行豫章邑名漢南昌縣隋為豫章有豫章江江連九江有釣磯陶侃少時嘗宿此夜聞人唱聲如量米者訪之吳時有度攴于此亡今考傳玄陸士衡輩所作多敘別離怨恨思即知豫章昔為華艷盛麗之區耳至唐杜牧詩尚過稱其侈靡焉走馬引樗里牧恭所作也為父報怨殺人亡匿山下有天馬夜降團其室而鳴覺聞其聲以為吏追乃奔去旦觀乃天馬迹因愓然大悟曰吾之所處將危乎遂荷杖去入沂澤中援琴而鼓之為天馬聲曰走馬引而張敞為京兆尹無威儀時罷朝會過走馬章臺街風俗曰殺君馬者路旁兒也言長吏馬肥觀者快之喜其言驅馳不止至於死故張率作此引曰斂轡且歸去吾畏路旁兒烏夜啼宋臨川王義慶所造時為江州刺史聞命而哭文帝怪之召還家大懼妓妾夜聞烏啼叩齋閣云明日應有赦及改為南州因作此歌詞云籠窗窗不開夜夜憶郎來今所傳非義慶本旨詞曰歌舞諸少年娉婷無種則菖蒲花可憐聞名不相識雀乳空城中晉傳玄詩曰鵲巢立城側雀乳空井中居不附龍鳯嘗思蛇與蟲今集所載作空城中者非也故劉孝威辭云轆轤絲綆絶桔橰金蘚稠並同前陶靖節詩云平疇交逺風良苗亦懷新古之耦耕植杖者不能此語非余老農亦不識此語之妙王直方詩話陳無巳有除官一篇云扶老趍嚴詔徐行及聖時端能幾字正敢恨十年違肯著金根謬寧辭乳媪譏向來憂畏斷不盡鹿門期臨川饒次守云此詩不作可也才得一正字亦未須云趍嚴詔無巳后作謝啓復曰名雖文字之選實為將相之儲又云頭童齒豁敢辭乳媪之譏聞淺見輕益畏金根之謬沈存中云如厨人具雞黍稚子􅎥楊梅蓋以雞對揚皆為假借田承君曰雞黍兩事那得似楊梅耶眺美叔祕監嘗因謁先君曰昔人有一聮云平生不到處落日獨行時唯公家使詩著此蓋崔塗詩也余後見李陽氷所題阮客舊居云阮客身何在仙雲洞口橫人間不到處今日此中行亦相類潘邠老作洪氏勵殼軒云封胡羯末謝龜駒玉鴻洪千載望四謝四洪天壤同為龜父駒父玉父鴻父也時人以為急口令歐陽知貢舉日有詩云無譁戰士銜枚勇下筆春蠶食葉聲絶為竒妙故聖俞作詩云食葉蠶聲句偏美當時曽記賦初成一云將成田承君云池塘生春草蓋是病起忽然見此為可喜而能道之所以為貴李希聲云見文潛外生言文潛每作詩其有用得妙處必自記緑如法雲會中懷無咎云獨覺欠此翁自以欠字頗佳並同前有周知微者字明老為晉州縣尉到官不數月不告於州而徑來京師人問其故云我欲求教授至京求知巳不得大醉一夕而卒然為詩有可喜者如觀臨淮雙頭白蓮圖云既不學叔隗季隗南歸晉又不學大喬小喬東入吳一種桃根與桃葉若為化作雙芙蕖臨淮政成有餘暇坐令華屋生瀟􅎈鵝溪一幅萬里寬移得斷江入圖畫天空水闊江茫茫想見女英與娥皇九嶷雲深蒼梧逺氷姿泣露不成粧苦心抱恨何年了香骨應甘沒秋草不如回首謝秋風分作尹邢來漢宫又作上已日寒食云疾風暮雨悲逰子峻嶺崇山非故鄉亦可賞而其狂未見其比古今詩話朝以道云王禹玉詩世號至寶丹以其多使珍寶如黃金必以白玉為對有人云詩能窮人且試強作此冨貴語看如何其人數日搜索云止得一聮云脛脡化為紅玳瑁眼睛變作碧琉璃余為之絶倒舒王有詩云籜龍將雨繞山行而周次元有逰天竺觀詩亦云竹龍驅水轉山鳴余以為當與秦少遊同科歐陽文忠公云唐人有姑蘇臺下寒山寺半夜鍾聲到客船之句説者云句則佳也其如三更不是撞鍾時于鵠送宫人入道詩云定知別後宫中伴遙聽緱山半夜鍾而白樂天亦云新秋松影下半夜鍾聲後溫廷筠亦云悠然旅榜間回首無復松窗半夜鍾豈唐人多用此語耶倘非遞相沿襲恐必有説並同前詩話總龜卷之七百家詩話總龜後集卷之七逹理門否卦包承小人吉説者謂小人在下者包之小人在上者承之蓋處否當然杜云曲直吾不知負暄候樵牧是非何處定髙枕笑浮生洗眼看輕薄虛懷任屈伸寄謝悠悠世上兒不爭好惡莫相疑其寄傲踈放擺脫世網所謂兩忘而化其道也黃常明漫叟無為洞口云洞傍山僧皆學禪無求無欲亦忘年又無為洞口春水滿無為洞傍春雲白愛此蹰不能去念人悔作衣冠岑參宿先逰寺云寄報乘軒客簮𥚑爾何容臨川何秀老云解我蔥珩脫孟勞暮年井與子同袍比之退之云方將斂之道且欲冠其顛向風長歎不可見我𣣔收斂加冠巾異矣六一有云自慚前引朱衣吏不稱間行白髮翁説者謂不言亦可然次山宿丹崖翁宅詩云吾將求退與翁逰學翁歌醉在漁舟官吏隨人往來得却望丹崖慚復羞吁淫乎富貴者也䂬溪東坡拈出陶淵明談理之詩前後有三一曰採菊東籬下悠然見南山二曰笑傲東軒下聊復得此生三曰客飬千金軀臨化消其寶皆以為知道之言蓋摛章繪句嘲弄風月雖工亦何輔若覩道者出語自然超詣非常人能蹈其軌轍也山谷嘗跋淵明詩卷云血氣方剛時讀此詩如嚼枯木及綿歷世事如決㝎無所用智又嘗論云謝康樂庾義城之詩爐錘之功不遺餘力然未能窺彭澤數仭之墻者二子有意于俗人贊毀其工拙淵明直寄焉持是以論淵明詩亦以可知其關鍵也丹陽集孟子所言皆精粗兼偹其言甚近而妙義在焉如龎居士云神通并妙用運水與般柴此自得者之言最為逹理若孟子之言則無適不然如許大堯舜之道只於行止疾徐之間教人做了龜山語録或問言動非禮則何以正視聽如何得合禮曰四者皆不可易易則多非理故仁者先難而後獲所謂難者以我視以我聽以我言以我動也仰面貪看鳥回頭錯應人視聽不以我也胥失之矣上蔡語録吕晉伯兄弟中皆有見處一人作詩詠曽點事曰函丈從容問且酬展才無不至諸侯可憐曽點推鳴瑟獨對春風詠不休同上或問卲堯夫云誰信畫前元有易自從刪後更無詩畫前有易何以見曰畫前有易其理甚微然即用孔子之巳發明者言之未有畫前盡可見也如云神農氏之耒耜蓋取諸益日中為市蓋取諸噬嗑黃帝堯舜之舟楫蓋取諸渙服牛乘馬蓋取諸隨益嗑渙隨重卦也當神農黃帝堯舜之時重卦未畫此理真聖人有以見天下之賾故通變以冝民而易之道得矣然則非畫前元有易乎龜山録熙寧十年夏康莭感微疾氣日益耗神日益明笑謂司馬溫公曰雍欲觀化一巡如何溫公曰先生未應至此康莭笑曰死生亦常事耳張橫渠先生喜論命來問疾因曰先生論命否當推之康莭曰若天命則巳知之矣世俗所謂命則不知也橫渠曰先生知天矣載尚何言程伊川曰先生至他人無以為力願自主張時康莭居正寢諸公議後事于外有欲葬近洛陽城者康莭巳知呼伯溫入曰諸公欲以近城地葬我不可當從伊川先生塋耳七月𥘉四日大書詩一章曰生于太平世死于太平世客問年幾何六十有七歲俯仰天地間浩然獨無愧以是夜五更捐館聞見録張敬夫元日詩古史書元意義存春秋揭示更分明人心天理𥘉無欠正本端原萬善生南軒集康莭過士友家晝卧見其枕屏小兒迷藏以詩題其上云遂令髙卧人欹枕看兒戲蓋熙寧間也陳恬云擊壤集不載同上張橫渠聖心詩聖心難用淺心求聖學須專禮法修千五百年無孔子盡因通變老優遊橫渠集五峯胡廣仲詩幽人偏愛青山好未是青山青不老山中出雲雨太虛一洗塵埃山更好朱氏陂云右衡山胡子詩也𥘉紹興庚辰熹病卧山間親友仕于朝者以書見招某戲以兩詩代書報之曰先生去上藝香閣時籍溪先生正字赴館供聀閣長新峩豸角冠劉共甫祕書丞除察官晉取幽人卧空谷一川風月要人看章甕牗前頭列畫屏晚來相對盡儀形浮雲一任間舒卷萬古青山只麼青二章或傳語胡子胡子謂其學者張敬夫曰吾未識此人然觀此詩庶能有進矣時其言有躰而無用故為是詩以針警之庶其聞之而有發也明年胡子卒又四年某始見敬夫而後獲聞之恨不及見胡子而請其目也因序其本末而書之于䇿以無忘胡子之意云見詩集邵堯夫先生居洛四十年安貧樂道自云未嘗攢眉所居寢息處為安樂窩自號安樂先生又為甕牗讀書燕居自平旦則焚香獨坐晡時飲酒三四甌微熏便止不使至醉也中間州府以更法不餉餽寓賔乃為薄粥以代之好事者或載酒以濟其之嘗有詩云斟有淺深存燮理飲無夛少繫經綸莫道山翁柮於用也能康濟自家身喜吟詩作大字書然遇興則為之不牽強也大寒暑則不出每出乘小車用一人挽之為詩以自詠曰花似錦時髙閣望草如茵處小車行司馬溫公贈以詩曰林間髙閣望已久花外小車猶未來隨意所之遇主人喜客則晉三五宿又之一家亦如之或經月忘返雖性髙潔而接人無賢不肖貴賤皆􅌚然如親嘗自言若至大病自不能支其遇小疾得有客對語不自覺疾之去躰也學者來從之問經義精深浩慱應對不窮思致幽逺妙極道數間與相知之深者開口論天下事雖久存心世務者不能及也康莭嘗誦希夷之語曰得便冝事不可再得便冝處不可再去又曰落便冝是得便冝故康莭詩云珍重至人嘗有語落便冝是得便冝蓋可終身行之也邵伯溫易學辨惑涪陵譙天授牧牛圖詩一章言其崇明禮法目無邪視可否昭判㨂辨無舛依見見正色塵不迷故能非禮勿視如牛雙目變白畏鞭箠警視不易設有他惡不敢縱觀矣詩曰喜見雙眸白通身黑尚全整思南畝稼還忌牧童鞭妄色無輕學非觀巳屢悛回光惟聖道此外竟何緣二章言其外屏非聞耳無邪聽入耳著心但惟聖道依聞審音惡聲不惑故能非禮勿聽如牛角耳變白聳耳低首惟牧是聆更無他念矣詩曰耳角氷霜潔須知聽不訛法言緣理辨邪説自心訶響外聆微旨音中味太和淫荒無復入非禮末之何三章言其戒謹辝氣口無妄言戲渝讒誣不形聲説非先王之法言不敢道依苦謹辝修辝立誠故能非禮勿言如牛唇口變白為牧所纏不得妄鳴惟渴飮飢食始得解釋矣詩曰白口纏圈索言非駟莫追心聲休妄發敬道復何疑正信通神鑑淵談協𥘉儀能為天下則誠自我無欺四章言其遵守禮法中主惟敬心無妄動舉必循理精誠外發照破邪行素履而往往而無咎故能非禮勿動如牛四足變白猶恐散失未捨鼻索矣詩曰四足雖更白猶冝鼻索拘草田方緩執禾徑未相踰步步無非履心心向大途見聞言動事到此竟何殊五章言其學習美成禮法文質內外自然克已復禮歸于至誠不假行將動容周旋皆中乎禮盛德之至居德之盛尚可形容故如牛首尾變白牧者置鞭間坐不執鼻索放曠無拘頓絶所犯矣詩曰鼻索何勞執長鞭已棄間大田隨俯仰古道任回環義草清野仁泉飲碧灣德純非用牧危坐對層山六章言其抑為不厭好古敏求積而至聖思慮銷隕情識淨靜猶金鑑焉不迎不將應而不傷心躰世通超然絶疑動靜無意但寓形於丗而已如牛全白純一不雜人牛兩息滅意相拘矣詩曰一飽心休息安眠百不知有形隨處寄毋意復何疑用舍非關念優遊絶所窺相忘人世外惟有牧童兒七章言其逆順難測混同體用隨世態卷舒例陰陽慘酢損益盈虛與時偕行言不必信行不必果惟義所在一切毋必道合則從猶如白牛雖帶圈索已無牧人矣詩曰圈索離牽執從兹牧者亡何心拘小莭平步蹈中常飢飽隨過行藏任運將春山春草緑逄處可充腸八章言其仕止久速咸契所冝逹莭善變出處無際進退存亡不失其正獨見幾權應世無固不俟終日猶如白牛隨方運動飲食無繫矣詩曰日暖隨方去天寒隱有餘當行非俟牧可止便安居飲食和粗細周旋契疾徐權幾雖應用豈外是如如九章言其無方無體妙絶萬物不見有巳身心銷復與道混融一切毋我又何分别隨時應用應物張機無有本體名言胡義晉為世訓警䇿後覺猶如無牛可得惟存鼻索傳示將來矣詩曰相盡云何牧心融孰是牛我人依妄立學行假名修不見當先迹寧知有後由鞭繩應到此聊為且有晉詩話總龜後集卷之七終
