front:
  text: 增修詩話總龜卷之二十三
  hash: sha256:b8efed23d58b33ce98fc0c1cb363a5ae17d66d04abb05486f197d210171447f0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_023-1a}
body:
  text: 寓情門曹修古立朝謇諤嘗見池上有一所似者作小詩曰荷葉罩芙蓉員青映嫩紅佳人南陌上翠蓋立春風青箱雜記唐僖宗朝自內製𫀆千領賜塞外吏士神䇿將士馬直于𫀆中絮得金鎖一枚詩一首云玉燭製𫀆夜金刀呵手裁鎖情寄千里鎖心終不開直貨鎖于市為人告其將并得詩奏聞僖宗令馬直赴闕以宫人賜直為妻有情者為金鎖曲流於世翰府名談蜀人皆呼營妓為校書韋南康鎮成都罷之故胡曾有詩贈薛濤曰萬里橋邉薛校書枇杷花下閉門居掃眉才子知多少𬋩領春風捴不知濤再為連帥所喜因事獲怒而逺之作五離詩以獻遂復喜焉一曰犬離家出入朱門四五年為知人性足人憐只因咬著親情腳不得紅絲毯上眠二曰魚離池一入池中四五秋常將朱尾玩銀鉤近緣戲觸紅蓮折不得隨波自在逰三曰鸚鵡離籠慣向侯門養此身飛來飛去羽毛新近緣言語無方便不得籠中再喚人四曰竹離叢蓊欎栽成四五行常持堅節待秋霜近來春笋鑽階破不得垂枝對畫堂五曰珠離掌一顆明珠內外通分明皎潔水晶宫近緣一點瑕相纍不得朝朝在掌中鑑戒録托言謂此是薛書記上元微之未知孰是成都女郎張窈窈上任事者詩曰昨日買衣裳今朝賣衣裳衣裳都賣盡羞見嫁時箱有賣愁應緩無時心轉傷故園胡虜隔何處是蠶桑鑑戒録鄭還古博士東都間居與柳將軍往還柳冨有家姬鄭與笑語柳知不怪也鄭將入京柳餞之鄭贈姬詩曰冶艷出神仙歌聲雜管絃眼看白苧曲欲上碧雲天未擬生裴秀如何知鄭玄莫教金谷水橫過墜樓前栁見詩曰俟榮歸當為遣充賀禮及除國子博士柳遣姬入京師至嘉祥驛而鄭已物故柳甚悼之古今詩話張祐客淮南幕中赴宴時杜紫微為攴使座中有屬意處索骰子賭酒牧之微吟曰骰子逡巡褁手拈無因得見玉纎纎祐應聲曰但知報道金叉落倣佛還應露指尖同前南部新書謂此詩乃李義山作封特卿為湖州軍倅與同年李大諌詩酒唱酬以疾阻歡及愈有詩曰巳負數條紅畫燭更辜雙帶繡香毬白蘋洲上風煙好扶病須拚到后籌後有離别難詞佛許衆生願心堅石也穿今朝雖送别會却有明年一座無不悽愴雜志李翺尚書牧江淮郡日進士盧儲投卷來謁李禮待之置文卷几案間赴公宇視事長女及笄見文尋繹數四謂小青曰此人必為狀頭李公聞之深異其語乃慕為壻來年果狀頭及第才過殿試徑赴佳姻催粧詩曰昔年將去玉京逰第一仙人許狀頭今日巳成秦晉會早教鸞鳯下粧樓盧止官舍迎內子入庭花開乃題詩曰芍藥斬新栽當庭數朵開東風與拘束留待細君來南部新書房千里初上第逰嶺徼有韋滂自海南邀趙氏十九歲而許為房妾房迫於遊從暫與趙别后寄詩曰鸞鳯分飛海樹秋忍聽鍾鼓越王樓只應霜月眀君意緩撫瑶琴送我愁山逺莫教雙淚盡鴈來空寄八行幽相知若返臨卭市畫舸朱軒萬里逰萬里橋也千里以情托焉到府訪之趙氏巳適韋秀才矣許與房韋俱有布衣之舊不陳之則負房之言欲陳之則傷韋之義作詩寄千里曰春風白馬紫絲韁正值𧖟娘來采桑五夜有心隨暮雨百年無節抱秋霜重尋繡帶朱藤合却認羅裙碧草長為報西離恨阮郎才去嫁劉郎雲溪友議薜宜僚會昌中為左庶子充新羅册禮使青州泛海船船阻惡風雨至登州却漂回淹泊青州郵傳一年節度使烏漢正尤加待遇有席中飲妓東美者薛頗多情連帥置於驛中薜發日祖筵嗚咽流涕東美亦然乃於席中留二詩曰經年郵驛許安棲命他鄉别恨迷今日海帆飄萬里不堪腸斷對含啼阿母桃芳方似錦王孫草長正如煙行雲行雨今辭夢惆悵歡情却一年薛到國未行册禮旌節曉夕有聲旋染疾謂判官苗用曰東美何頻在夢中乎數日致卒苗攝大使行禮旅櫬回青州東美乃請假至驛素服致奠哀號拊柩一慟而卒情緑相感頗為竒事唐賢杼情趙嘏頗有詩名不拘小節飲中贈歌者曰倚風無處避梁塵雅唱清歌日日新來值漢亭花欲盡一聲留得萬家春后因酒失悔過以詩上歙州守曰葉覆清溪艷艷紅路橫秋色馬嘶風猶携一榼郡齊酒傾對青山憶謝公敬相牧廬州有朝客留意飲妓祖送短亭妓車後至相贈之曰望斷蘇娘小小坡竹埿金鴈展輕莎客卿幸有凝情意何必臨尊始轉波同前大中年有江淮郡守名郎登樓縱飲見二逰女羅衣飄飄目送久之因詠曰兩朵紅英值萬金教人不負看花心高樓日晚東風急吹落千家何處尋在省日宣宗顧問稱旨攝中郎將有詩曰宮娃引入玉為行金殿齊趍近御床不見聖明親顧問如何得攝漢中郎風神俊邁後擁節旄南部新書李尚書擢罷歙州吳貟交代有佐酒録事名媚川頗留意緣以納籍中妓韶光托于替人令存恤酒酣臨發洪飲不勝離情有詩曰經年理郡少歡娛為習干戈間飲徒今日臨行更交割分明留取媚川珠吳答曰曵履長裾日日歡須言違德泪汍瀾韶光今巳輸先手領取蠙珠掌內看同前鄭詳縱情詩酒至廬江謁郡守留連吟醉因贈妓曰臺盤闊狹才三尺似隔中當有阻艱若不騎龍與騎鳯樂營門是望夫山同前江陵有士子遊於交廣間而愛姬為太守所取納于高麗坡底及歸寄詩曰惆悵高麗坡底宅春風無復下山來守見詩遣還白樂天任杭州刺史携妓還洛後却遣回錢唐劉禹錫有詩曰其奈錢唐蘇小小憶君淚點石榴裙越水李主簿逰廣陵逮春未返其姬寄詩曰去時盟約與心違秋日離家春不歸應是維揚風景好恣情歡笑到芳菲答曰偶到揚州悔别家親知留滯不因花塵侵寶鏡雖相待長短歸時不及瓜會昌中張暌防戎有功勒留蕃僥十年妻侯氏繡錦回文詩作龜形獻進曰暌離已是十秋強對鏡那堪重整粧聞鴈燈前修尺素見霜心痛裂衣裳開箱疊練先垂淚拂杵調砧更斷腸繡作龜文獻天子願教夫壻早還鄉崔左轄􅗕牧江外郡祖席夜闌一營妓先辭歸崔與詩曰寒簷寂寂雨霏霏候館蕭條燭盡微只有今宵同此宴翠娥佯醉欲先歸並同前朱滔括兵不擇士族悉令赴軍自閲於毬場有士子進趍間雅因問曰何業曰學詩有妻否曰有即令作寄內詩曰握筆題詩易荷戈征戍難慣從鴛𬒳暖怯向鴈門寒瘦盡寬衣帶啼多漬枕鸞試留青黛著回日畫眉看又令代妻答曰蓬鬢荆叉世所稀布裙尤是嫁時衣胡麻好種無人種正好歸時又不歸滔憐之遺束帛遣歸古今詩話韓晉公鎮浙西戎昱為郡刺史有郡妓美而善歌公召置籍中昱作詩以送之且曰至彼令歌必首唱是詞既至公持杯妓歌昱詩公曰使君于汝寄情邪對曰然贈百縑而遣之歸其詞曰好去春風湖上亭柳條藤蔓繫人情黃鶯久住渾相識欲去頻啼四五聲韓翊少負才名鄰居有姓李者每將倡妓柳氏至其居必邀韓同飲愈熟柳每窺所往來皆名人因乘暇語李曰韓秀才甚貧然所與逰必時賢是必不久困冝假倚之李深然之具酒邀韓至謂韓曰公當今名士栁當今名色名色配名士不亦可乎遂命栁與韓韓懇辭李曰大丈夫相遇杯酒間一言道合尚相許以死一婦人何足辭夫子貧柳資數萬可以取濟長揖而去韓辭之栁曰此豪逹者昨暮具言之矣俄就柳歸來嵗成名淄青節度使辟為從事韓以世方擾不敢以柳同行置之都下期至而迓之三歲不果寄之詩曰章臺栁章臺柳昔日依依今在否縱使長條拂地垂如今攀折他人手栁答曰楊柳枝芳菲節可惜年年贈離别一葉隨風忽報秋縱使歸來不堪折盧渥舍人應舉京師偶臨御溝見一紅葉上有一絶云流水何太急深宮盡日間殷勤謝紅葉好去到人間盧得之藏於巾篋及宣宗有旨許宫人從人盧所獲人因覩紅葉而吁怨久之曰當時偶題不謂君得之顧况在洛乘間逰苑中水上得大桐葉有詩曰一入深宮裏年年不見春聊題一片葉寄與有情人明日于上遊亦題於葉泛之波中曰花落深宫鶯亦悲上陽宫女斷腸時帝城不禁東流水葉上題詩寄與誰十日餘有客尋春苑中又於葉上得詩以示况云一葉題詩出禁城誰人酬和獨含情自嗟不及波中葉蕩漾乘春取次行開元中賜邊將軍士纊衣製于宫有兵士短𫀆中得詩曰沙埸征戍客寒苦若為眠戰𫀆經手作知落阿誰邉留意多添線含情更著綿今生巳過也重結後生緣兵士以詩白帥帥進呈明皇以詩遍示宫中曰作者勿隱不汝罪也有一宫人自言萬死明皇深憫之遂以嫁得詩者謂之曰吾與爾結今生緣邉人感泣張又新郎中嘗為廣陵從事有歌妓常致情而終未果納二十年後妓猶在籍中張罷江南郡道由廣陵時李紳鎮淮南宴飲極歡張以指染酒書一絶于盤上相府命妓歌以侑張酒其詞曰雲雨分飛二十年當時求夢不曾眠今來頭白重相見還上襄王玳瑁筵酒罷令妓侍張歸太和𥘉有御史分務洛都有姬善歌時李逢吉留守欲一見既不可辭遂往焉李有姬四十餘輩皆在其下既入不復出作詩兩篇投李曰三山不見海沉沉豈有仙蹤尚可尋青鳥去時雲路斷姮娥歸處月宫深仙窗暗想春相憶書幌誰憐夜獨吟料得此時天上月只應偏照兩人心一首已失陳太子舍人徐德言尚叔寶妹樂昌公主陳政衰謂其妻曰國破必入權豪家倘情緣未斷尚慕相見乃破鏡各分其半約他日以正月望日賣于都市及陳亡其妻果為楊越公得之乃為詩曰鏡與人俱去鏡歸人不歸無復姮娥影空留明月輝樂昌得詩悲泣不巳越公知之愴然召德言至還其妻因與德言樂昌餞别令樂昌為詩曰今日甚遷次新官對舊官笑啼俱不敢方信作人難樂天姬樊素善歌小蠻善舞嘗為詩曰櫻桃樊素口楊柳小蠻腰樊素年既長小蠻方豐艷因為楊柳詞曰一樹春風萬萬枝嫩于金色軟于絲唐戎昱守零陵妓籍中有善歌者湘帥于公頔遽索之昱乃遣行比至令歌乃昱送妓辭也其辭曰寶鈿香蛾翡翆裙粧成掩泣欲行雲殷勤好向襄王道莫向瑶臺夢使君公曰大丈夫不能立功業為異代所稱豈可奪人愛姬為巳之娛遂贈以帛送歸零陵五溪論事去蜀尚書侯繼圖本儒士一日秋風四起偶倚欄于大慈寺樓有大桐葉飄然而墜上有詩云拭翠斂雙蛾為鬱心中事搦𬋩下庭除書成相思字此字不書石此字不書𥿄書向秋葉上願逐秋風起天下有心人盡解相思死天下負心人不識相思意有心與負心不知落何地侯貯小帖凡五六年方卜任氏為婚嘗諷此事任氏曰此是妾書葉時詩爭得在公處曰向在大慈寺閣上倚欄得之即知今日聘非君偶然也侯以今書較之與葉上無異並同前李茂復為會府從事出逢一小青衣有色馬上目之作詩曰行盡踈林見小橋緑楊深處有紅蕉無端眼界無分别安置心頭不肯銷其內子甚妬晚年牧泗州有詩云落日西山近一竿世間恩愛極難拚近來不作顛狂事免𬒳冤家惡眼看南部新書謝郎中有女數歲能吟詠長嫁王元甫元甫調官京師送别云此去惟冝早早還休教重起望夫山君看湘水祠前竹豈是男兒淚染斑青瑣集增修詩話總龜卷之二十三百家詩話總龜後集卷之二十三紀實門唐文皇聚一時名流天䇿府始有十八學士之號後來凡居館殿者皆稱之國朝以來任于外非兩制則雖帥守監司止呼寄祿官惟通判多從館中帶聀出輔如蔡君謨湖州歐陽文忠公滑州王荆公舒州東坡先生杭州如此之類甚多劉贛父赴泰倅詩云壁門金闕倚天開五見宫花落早梅明日扁舟滄海去却尋雲氣望蓬萊蓋在道山五載然後得之學士之稱施于外者縣通判而然今外庭過呼大可笑也揮塵録老杜送殿中楊監赴蜀見相公云豪俊貴勳業邦家頻出師相公鎮梁益軍事無孑遺以是知邊鄙之臣貪功生事結禍招釁皆有以致之一得忠臣處之生靈受賜矣黃常明文選載王粲公宴詩注云此侍曹操宴也操未為天子故云公宴耳操以建安十八年春受魏公九錫之命公知衆情未順終其身不敢稱尊而粲詩巳有碩我賢主人與天享巍巍之語則粲豈復有心于漢耶粲常説劉表之子琮曰曹公人傑也將軍卷甲倒戈以歸曹公長享福祚萬全之䇿也厥後操以粲為軍謀祭酒則以腹心委之矣韻語陽秋或云韋應物乃韋后之族慿恃恩私作里中橫故韋集載逄楊開府詩云少事武皇帝無賴恃恩私身作里中橫家藏亡命兒武皇升仙去把筆學題詩兩府始收迹南宫謬見推夫武皇平內亂殺韋后不應后之族敢於武皇之時豪橫若此正恐非后族爾李肇國史輔言應物性高潔鮮食寡𣣔所居焚香掃地而坐與楊開府詩所述不同豈非武皇仙去之後折莭悔過之時耶曽文清吉父孔毅父之甥也早從學于毅父文清以蔭入仕大觀初以銓試合格五百人為魁用故事賜進士出身紹興中明清以啓贄見云傳經外氏早侍仲尼之間居提筆文場曽寵平津之為首文清讀之喜曰可謂著題矣後與明清詩云吾宗擇壻得羲之令子傳家又絶奇甥舅從來多酷似弟兄如此信難為徐敦立覽之笑云此乃用前日之啓為體修報耳同上老杜卒于大曆五年享年五十九當生于先天元年觀其獻大禮賦表云臣生陛下淳朴之俗行四十載矣以此推之天寶十載始及四十則是獻大禮賦當在天寶九載也本傳以謂天寶十三載因獻三賦帝奇之待制集賢院誤矣其後又進西嶽賦序云上既封太山之後三十年按史開元十三年乙丑封太山至天寶十三載始及三十年則是進西嶽賦在天寶十三載也老杜有贈獻納使田舍人詩云舍人退食收封事宫女開函近御筵曉漏追隨青瑣闥晴窗點檢白雲萹末句云楊雄更有河東賦唯待吹噓送上天其云更有河東賦當是獻西嶽賦時也丹揚羊叔子鎮襄陽嘗與從事鄒湛登峴山慨然有泯無聞之歎峴山亦因是以傳古今名賢賦詠多矣吳興東陽二郡亦有峴山吳興峴山去城三里有李適之窪尊在焉東坡守吳興日嘗登此山有詩云苕水如漢水鱗鱗鴨頭青吳興勝襄陽萬瓦浮青冥我非羊叔子愧此峴山亭悲傷意此同歲月如流星湛輩何足道當以德自銘東陽峴山去東陽縣亦三里舊名三丘山宋啇仲文素有時望自謂必登台輔忽除東陽太守意甚不樂嘗登此山悵然流涕郡人愛之如襄陽之于叔子因名峴山二峰相峙有東峴西峴唐寶曆中縣令于興宗結亭其下名曰涵碧劉禹錫有詩云新開潭洞疑仙府逺寫丹青到雍州即其所也葛立之張籍居韓門弟子之列又以愈薦為國子博士東坡所謂汗流湜籍走且僵滅沒倒景不可望者而籍作愈祭詩乃云公文為時師我亦有微聲而後之學者或號為韓張何耶丹陽集陳後主起臨春結綺望仙三閣極其華麗後主與張麗華孔貴妃各居其一與狎客賦詩互相贈答采其艷麗者𬒳以新聲奢淫極矣隋克臺城後主與張孔坐視無計遂俱入井所謂煙脂井是也楊修詩云擒虎戈矛滿六宫春花無樹不秋風蒼惶益見多情處同穴井心赴井中李白亦云天子龍沉景陽井誰歌玉樹後庭花今煙脂井在金陵之法寶寺井有石攔紅痕若煙脂相傳云後主與張孔泪痕所染石攔上刻後主事迹八分書乃大曆中張著文又有篆書戒哉戒哉𢾗字其他題刻甚多往往漫滅不可考寺即景陽宫故地也有井在焉好事者往來不絶寺僧頻厭苦之張藝叟嘗有詩戲僧云不及馬嵬襪猶能致萬金馬少遊常哀兄援多大志曰士生一世但取衣食裁足乘下澤車御欵假馬鄉里稱善人斯可矣致求嬴餘但自苦爾故援在浪洎西里當下潦上霧雲氣薰蒸仰視飛鳶跕跕在水中之時輒思其言以謂念少遊語何可得也洎武陵五溪蠻作亂劉尚軍沒而援貪進不止方且據鞍矍鑠𬒳甲請行遂底壼頭之困劉夢得經伏波神祠詩有一以功名纍翻思馬少遊之句可謂名言矣壼頭在武陵當是夢得為司馬時經歷故萹首言蒙蒙篁竹下有路上壼頭韻語陽秋武帝見顔駟厖眉皓首問何時為郎何其老也對曰文帝好文而臣好武景帝好老而臣尚幼陛下好少而臣老矣老于為郎此事尤著切怪老杜屢傷為郎白首每稱馮唐而不及駟生既不遇三君身後復不遇老杜可笑也已䂬溪子美世號詩史觀北征詩云皇帝二載秋閏八月初吉送李校書云乾元元年春萬姓始安宅又戲友二詩元年建已月郎有焦校書元年建巳月官有王直司史筆森嚴未易及也黃常明舍人遺織成褥假云服飾㝎尊卑大哉萬古程煌煌珠宫物寢處􅍔所嬰錦衣卷還客始覺心和平其意在明分守警貪叨屏斥玩物嚴道氣之大莭豈直專為詩哉就中和平之語尤可人意世有豪橫凶人強委饋于善士而不能驟絶之其心愧恥雖𣣔和平不可得也䂬溪諸史傳首尾一律惟左氏傳春秋則不然千變萬狀有一人而稱目至數次異者族氏名字爵邑諡號皆密布其中而寓諸褒貶此史家祖也觀少陵詩冝隱此旨若云杜陵有布衣杜曲幸有桑麻田杜子將北征臣甫憤所切甫也東西南北人有客有客字子美蓋自見其居里名字也不作河西尉白頭拾遺徒步歸備矣均輔衮凡才汚省郎輔官遷徙歷歷可考至敘他人亦然如云粲粲元道州又云結也實國楨凡例森然誠春秋之法也䂬溪人以藤代芻酒名鈎藤俗傳他處即不可用或謂但心醖造之法異耳所在皆可樂天忠州春詩云間拈舊葉題詩詠悶取藤枝引酒嘗是巴蜀亦有之黃常明百家詩話總龜後集卷之二十三
