front:
  text: 增修詩話總龜卷之二十三
  hash: sha256:b8efed23d58b33ce98fc0c1cb363a5ae17d66d04abb05486f197d210171447f0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_023-1a}
body:
  text: 寓情門曹脩古立朝謇諤甞見池上有一所似者作小詩曰荷葉罩芙蓉員青映嫩紅佳人南陌上翠盖立春風青箱雜記唐僖宗朝自内製𫀆千領賜塞外吏士神䇿將士馬直扵𫀆中絮得金鎖一枚詩一首云玉燭製𫀆夜金刀呵手裁鎖情寄千里鎖心終不開直貨鎖扵市為人告其將并得詩奏聞僖宗令馬直赴闕以宫人賜直為妻有情者為金鎻曲流於世翰府名談蜀人皆呼營妓為校書韋南康鎮成都罷之故胡曾有詩贈薛濤曰萬里橋邉薛校書枇杷花下閉門居掃眉才子知多少𬋩領春風捴不知濤再為連帥所喜因事獲怒而逺之作五離詩以獻遂復喜焉一曰犬離家出入朱門四五年為知人性足人憐只因咬着親情脚不得紅絲毯上眠二曰魚離池一入池中四五秋常將朱尾玩銀鉤近縁戯觸紅蓮折不得隨波自在逰三曰鸚鵡離籠慣向侯門養此身飛來飛去羽毛新近縁言語無方便不得籠中再喚人四曰竹離叢蓊欎栽成四五行常持堅節待秋霜近來春笋鑚堦破不得垂枝對畫堂五曰珠離掌一顆明珠内外通分明皎㓗水晶宫近縁一點瑕相累不得朝朝在掌中鑑戒録摭言謂此是薛書記上元㣲之未知孰是成都女郎張窈窈上任事者詩曰昨日買衣裳今朝賣衣裳衣裳都賣盡羞見嫁時箱有賣愁應緩無時心轉傷故園胡虜隔何處是蚕桑鑑戒録鄭還古博士東都閒居與柳將軍徃還柳冨有家姬鄭與笑語柳知不恠也鄭將入京柳餞之鄭贈姬詩曰冶艶出神仙歌聲雜管絃眼看白苧曲欲上碧雲天未擬生裴秀如何知鄭玄莫教金谷水横過墜樓前栁見詩曰俟榮歸當為遣充賀禮及除國子博士柳遣姬入京師至嘉祥驛而鄭已物故柳甚悼之古今詩話張祐客淮南幕中赴宴時杜紫㣲為攴使座中有屬意處索骰子賭酒牧之㣲吟曰骰子逡巡褁手拈無因得見玉纎纎祐應聲曰但知報道金釵落彷彿還應露指尖同前南部新書謂此詩乃李義山作封特卿爲湖州軍倅與同年李大諌詩酒唱酧以疾阻歡及愈有詩曰巳負數條紅畫燭更辜雙帶綉香毬白蘋洲上風烟好扶病須拚到后籌後有離别難詞佛許衆生願心堅石也穿今朝雖送别會却有明年一座無不悽愴雜誌李翺尚書牧江淮郡日進士盧儲投卷來謁李禮待之置文卷几案間赴公宇視事長女及笄見文㝷繹數四謂小青曰此人必爲狀頭李公聞之深異其語乃慕爲婿來年果狀頭及第纔過殿試徑赴佳婣催粧詩曰昔年將去玉京逰第一仙人許狀頭今日巳成秦晋會早教鸞鳯下粧樓盧止官舎迎内子入庭花開乃題詩曰芍藥斬新栽當庭數朶開東風與拘束留待細君來南部新書房千里初上第逰嶺徼有韋滂自海南邀趙氏十九歲而許為房妾房迫於遊從暫與趙别后寄詩曰鸞鳯分飛海樹秋忍聽鍾皷越王樓只應霜月眀君意緩撫瑶琴送我愁山逺莫教㕠淚盡鴈來空寄八行幽相知若返臨卭市畫舸朱軒萬里逰萬里橋也千里以情托焉到府訪之趙氏巳適韋秀才矣許與房韋俱有布衣之舊不陳之則負房之言欲陳之則傷韋之義作詩寄千里曰春風白馬紫絲韁正值𧖟娘来采桑五夜有心隨暮雨百年無節抱秋霜重㝷綉帶朱藤合却認羅裙碧草長為報西離恨阮郎纔去嫁劉郎雲溪友議薜宜僚會昌中為左庻子充新羅册禮使青州泛海船船阻惡風雨至登州却漂回淹泊青州郵傳一年節度使烏漢正尤加待遇有席中飲妓東羙者薛頗多情連帥置於驛中薜發日祖筵嗚咽流涕東羙亦然乃於席中留二詩曰經年郵驛許安棲命他郷别恨迷今日海㠶飄萬里不堪腸㫁對含啼阿母桃芳方似錦王孫草長正如烟行雲行雨今辭夣惆悵歡情却一年薛到國未行冊禮旌節曉夕有聲旋染疾謂判官苗用曰東羙何頻在夣中乎數日致卒苗攝大使行禮旅櫬回青州東羙乃請假至驛素服致奠哀號拊柩一慟而卒情緑相感頗為竒事唐賢杼情趙嘏頗有詩名不拘小節飲中贈歌者曰倚風無處避梁塵雅唱清歌日日新來值漢亭花欲盡一聲留得萬家春后因酒失悔過以詩上歙州守曰葉覆清溪艷艶紅路横秋色馬嘶風猶携一榼郡齊酒傾對青山憶謝公敬相牧廬州有朝客留意飲妓祖送短亭妓車後至相贈之曰望㫁蘇娘小小坡竹埿金鴈展輕莎客卿幸有凝情意何必臨尊始轉波同前大中年有江淮郡守名郎登樓縱飲見二逰女羅衣飄飄目送乆之因詠曰两朶紅英值萬金教人不負看花心高樓日晚東風急吹落千家何䖏㝷在省日宣宗顧問稱㫖攝中郎將有詩曰宮娃引入玉為行金殿齊趍近御床不見聖明親顧問如何得攝漢中郎風神俊邁後擁節旄南部新書李尚書擢罷歙州呉貟交代有佐酒録事名媚川頗留意縁以納籍中妓韶光托扵替人令存䘏酒酣臨發洪飲不勝離情有詩曰經年理郡少歡娯為習干戈間飲徒今日臨行更交割分明留取媚川珠呉答曰曵履長裾日日歡須言違徳泪汍瀾韶光今巳輸先手領取蠙珠掌内看同前鄭詳縱情詩酒至廬江謁郡守留連吟醉因贈妓曰䑓盤闊狹纔三尺似隔中當有阻艱若不騎龍與騎鳯樂營門是望夫山同前江陵有士子㳺於交廣間而愛姬為太守所取納扵高䴡坡底及歸寄詩曰惆悵高䴡坡底宅春風無復下山來守見詩遣還白樂天任杭州刺史携妓還洛後却遣回錢唐劉禹錫有詩曰其奈錢唐蘇小小憶君淚點石榴裙越水李主簿逰廣陵迨春未返其姬寄詩曰去時盟約與心違秋日離家春不歸應是維揚風景好恣情歡笑到芳菲答曰偶到揚州悔别家親知㽞滯不因花塵侵寳鏡雖相待長短歸時不及瓜㑹昌中張暌防戎有功勒留蕃儌十年妻侯氏綉錦廻文詩作龜形獻進曰暌離已是十秋強對鏡那堪重整粧聞鴈燈前修尺素見霜心痛裂衣裳開箱叠練先垂涙拂杵調砧更㫁腸綉作龜文獻天子願教夫婿早還郷崔左轄􅗕牧江外郡祖席夜䦨一營妓先辭歸崔與詩曰寒簷寂寂雨霏霏候舘蕭條燭盡㣲只有今宵同此宴翠娥佯醉欲先歸並同前朱滔括兵不擇士族悉令赴軍自閲於毬塲有士子進趍閒雅因問曰何業曰學詩有妻否曰有即令作寄内詩曰握筆題詩易荷戈征戍難慣從鴛𬒳暖怯向鴈門寒痩盡寛衣帶啼多漬枕鸞試留青黛着回日畫眉㸔又令代妻答曰蓬鬂荆釵世所稀布裙尤是嫁時衣胡麻好種無人種正好歸時又不歸滔憐之遺束帛遣歸古今詩話韓晋公鎮浙西戎昱為郡刺史有郡妓羙而善歌公召置籍中昱作詩以送之且曰至彼令歌必首唱是詞旣至公持盃妓歌昱詩公曰使君扵汝寄情邪對曰然贈百縑而遣之歸其詞曰好去春風湖上亭柳條藤蔓繫人情黄鶯乆住渾相識欲去頻啼四五聲韓翊少負才名隣居有姓李者每將倡妓柳氏至其居必邀韓同飲愈熟柳每窺所徃來皆名人因乗暇語李曰韓秀才甚貧然所與逰必時賢是必不乆困冝假倚之李深然之具酒邀韓至謂韓曰公當今名士栁當今名色名色配名士不亦可乎遂命栁與韓韓懇辭李曰大丈夫相遇盃酒間一言道合尚相許以死一婦人何足辭夫子貧柳資數萬可以取濟長揖而去韓辭之栁曰此豪逹者昨暮具言之矣俄就柳歸來嵗成名淄青節度使辟為從事韓以世方擾不敢以柳同行置之都下期至而迓之三歲不果寄之詩曰章䑓栁章䑓柳昔日依依今在否縱使長條拂地垂如今攀折他人手栁答曰楊柳枝芳菲節可惜年年贈離别一葉隨風忽報秋縱使歸來不堪折盧渥舎人應舉京師偶臨御溝見一紅葉上有一絶云流水何太急深宮盡日閒殷勤謝紅葉好去到人間盧得之藏於巾篋及宣宗有㫖許宫人從人盧所獲人因覩紅葉而吁怨乆之曰當時偶題不謂君得之顧况在洛乗閒逰苑中水上得大桐葉有詩曰一入深宮裏年年不見春聊題一片葉寄與有情人明日扵上㳺亦題於葉泛之波中曰花落深宫鶯亦悲上陽宫女㫁膓時帝城不禁東流水葉上題詩寄與誰十日餘有客㝷春苑中又於葉上得詩以示况云一葉題詩出禁城誰人酧和獨含情自嗟不及波中葉蕩漾乘春取次行開元中賜邊將軍士纊衣製扵宫有兵士短𫀆中得詩曰沙埸征戍客寒苦若爲眠戰𫀆經手作知落阿誰邉留意多添線含情更着綿今生巳過也重結後生縁兵士以詩白帥帥進呈明皇以詩遍示宫中曰作者勿隱不汝罪也有一宫人自言萬死明皇深憫之遂以嫁得詩者謂之曰吾與爾結今生縁邉人感泣張又新郎中甞為廣陵從事有歌妓常致情而終未果納二十年後妓猶在籍中張罷江南郡道由廣陵時李紳鎮淮南宴飲極歡張以指染酒書一絶扵盤上相府命妓歌以侑張酒其詞曰雲雨分飛二十年當時求梦不曾眠今來頭白重相見還上襄王玳瑁筵酒罷令妓侍張歸太和𥘉有御史分務洛都有姬善歌時李逢吉留守欲一見旣不可辭遂徃焉李有姬四十餘軰皆在其下旣入不復出作詩两篇投李曰三山不見海沉沉豈有仙蹤尚可㝷青鳥去時雲路㫁姮娥歸處月宫深仙窓暗想春相憶書幌誰憐夜獨吟料得此時天上月只應偏照两人心一首已失陳太子舎人徐徳言尚叔寳妹樂昌公主陳政衰謂其妻曰國破必入權豪家倘情縁未㫁尚慕相見乃破鏡各分其半約他日以正月望日賣扵都市及陳亡其妻果為楊越公得之乃為詩曰鏡與人俱去鏡歸人不歸無復姮娥影空留明月輝樂昌得詩悲泣不巳越公知之愴然召徳言至還其妻因與徳言樂昌餞别令樂昌為詩曰今日甚遷次新官對舊官笑啼俱不敢方信作人難樂天姬樊素善歌小蠻善舞嘗為詩曰櫻桃樊素口楊柳小蠻腰樊素年旣長小蠻方豐艶因為楊柳詞曰一樹春風萬萬枝嫩扵金色軟扵絲唐戎昱守零陵妓籍中有善歌者湘帥于公頔遽索之昱乃遣行比至令歌乃昱送妓辭也其辭曰寳鈿香蛾翡翆裙粧成掩泣欲行雲殷勤好向襄王道莫向瑶䑓夣使君公曰大丈夫不能立功業為異代所稱豈可奪人愛姬為巳之娯遂贈以帛送歸零陵五溪論事去蜀尚書侯繼圖本儒士一日秋風四起偶倚欄扵大慈寺樓有大桐葉飄然而墜上有詩云拭翠歛雙蛾為欝心中事搦𬋩下庭除書成相思字此字不書石此字不書𥿄書向秋葉上願逐秋風起天下有心人盡觧相思死天下負心人不識相思意有心與負心不知落何地侯貯小帖凢五六年方卜任氏為婚嘗諷此事任氏曰此是妾書葉時詩争得在公䖏曰向在大慈寺閣上倚欄得之即知今日聘非君偶然也侯以今書較之與葉上無異並同前李茂復為㑹府從事出逢一小青衣有色馬上目之作詩曰行盡踈林見小橋緑楊深處有紅蕉無端眼界無分别安置心頭不肯銷其内子甚妬晚年牧泗州有詩云落日西山近一竿世間恩愛極難拚近來不作顛狂事免𬒳冤家惡眼看南部新書謝郎中有女數歲能吟詠長嫁王元甫元甫調官京師送别云此去惟冝早早還休教重起望夫山君看湘水祠前竹豈是男児淚染斑青瑣集增修詩話總龜卷之二十三百家詩話總龜後集卷之二十三紀實門唐文皇聚一時名流天䇿府始有十八學士之號後來凢居舘殿者皆稱之國朝以來任于外非两制則雖帥守監司止呼寄禄官惟通判多從舘中帶聀出𥙷如蔡君謨湖州歐陽文忠公滑州王荆公舒州東坡先生杭州如此之類甚多劉贛父赴㤗倅詩云壁門金闕倚天開五見宫花落早梅明日扁舟滄海去却㝷雲氣望蓬萊盖在道山五載然後得之學士之稱施于外者縣通判而然今外庭過呼大可笑也揮塵録老杜送殿中楊監赴蜀見相公云豪俊貴勲業邦家頻出師相公鎮梁益軍事無孑遺以是知邊鄙之臣貪功生事結禍招釁皆有以致之一得忠臣處之生灵受賜矣黄常明文選載王粲公讌詩注云此侍曹操宴也操未為天子故云公讌耳操以建安十八年春受魏公九錫之命公知衆情未順終其身不敢稱尊而粲詩巳有碩我賢主人與天享巍巍之語則粲豈復有心扵漢耶粲常說劉表之子琮曰曹公人傑也将軍卷甲倒戈以歸曹公長享福祚萬全之䇿也厥後操以粲為軍謀祭酒則以腹心委之矣韵語陽秋或云韋應物乃韋后之族慿恃㤙私作里中横故韋集載逄楊開府詩云少事武皇帝無頼恃㤙私身作里中横家蔵亡命児武皇升仙去把筆學題詩两府始收迹南宫謬見推夫武皇平内亂殺韋后不應后之族敢於武皇之時豪横若此正恐非后族尔李肇國史𥙷言應物性高㓗鮮食寡𣣔所居焚香掃地而坐與楊開府詩所述不同豈非武皇仙去之後折莭悔過之時耶曽文清吉父孔毅父之甥也早從學于毅父文清以䕃入仕大觀初以銓試合格五百人爲魁用故事賜進士出身紹興中明清以啓贄見云傳經外氏早侍仲尼之間居提筆文塲曽寵平津之爲首文清讀之喜曰可謂着題矣後與明清詩云吾宗擇壻得羲之令子傳家又絶奇甥舅従来多酷似弟兄如此信難為徐敦立覧之笑云此迺用前日之啓為体脩報耳同上老杜卒扵大暦五年享年五十九當生扵先天元年觀其獻大禮賦表云臣生陛下淳樸之俗行四十載矣以此推之天寳十載始及四十則是獻大禮賦當在天寳九載也本傳以謂天宝十三載因獻三賦帝奇之待制集賢院誤矣其後又進西嶽賦序云上旣封太山之後三十年按史開元十三年乙丑封太山至天寳十三載始及三十年則是進西岳賦在天寳十三載也老杜有贈獻納使田舎人詩云舎人退食收封事宫女開凾近御筵暁漏追随青瑣闥晴窓点檢白雲萹末句云楊雄更有河東賦唯待吹嘘送上天其云更有河東賦當是獻西岳賦時也丹揚羊叔子鎮㐮陽嘗與從事邹湛登峴山慨然有泯無聞之歎峴山亦因是以傳古今名賢賦詠多矣呉興東陽二郡亦有峴山呉興峴山去城三里有李適之窪尊在焉東坡守呉興日嘗登此山有詩云苕水如漢水鱗鱗鴨頭青呉興勝㐮陽萬瓦浮青冥我非羊叔子愧此峴山亭悲傷意此同歳月如流星湛軰何足道當以徳自銘東陽峴山去東陽縣亦三里舊名三丘山宋啇仲文素有時望自謂必登台輔忽除東陽太守意甚不樂嘗登此山悵然流涕郡人爱之如㐮陽之扵叔子因名峴山二峰相峙有東峴西峴唐寳暦中縣令于興宗結亭其下名曰涵碧劉禹錫有詩云新開潭洞疑仙府逺冩丹青到雍州即其所也葛立之張籍居韓門弟子之列又以愈薦為國子愽士東坡所謂汗流湜籍走且僵㓕没倒景不可望者而籍作愈祭詩乃云公文為時師我亦有㣲聲而後之學者或號為韓張何耶丹陽集陳後主起臨春結綺望仙三閣極其華䴡後主與張䴡華孔貴妃各居其一與狎客賦詩互相贈荅采其艶䴡者𬒳以新聲奢滛極矣隋克䑓城後主與張孔坐視無計遂俱入井所謂烟脂井是也楊修詩云擒虎戈矛滿六宫春花無樹不秋風蒼惶益見多情處同穴丼心赴井中李白亦云天子龍沉景陽井誰歌玉樹後庭花今烟脂井在金陵之法寳寺井有石攔紅痕若烟脂相傳云後主與張孔泪痕所染石攔上刻後主事迹八分書乃大暦中張著文又有篆書戒㢤戒㢤𢾗字其他題刻甚多徃徃漫㓕不可攷寺即景陽宫故地也有井在焉好事者徃来不絶寺僧頻厭苦之張芸叟嘗有詩戯僧云不及馬嵬襪猶能致萬金馬少㳺常哀兄援多大志曰士生一世但取衣食裁足乗下澤車御欵叚馬郷里稱善人斯可矣致求嬴餘但自苦尔故援在浪洎西里當下潦上霧雲氣薫蒸仰視飛鳶跕跕在水中之時輒思其言以謂念少㳺語何可得也洎武陵五溪蛮作亂劉尚軍没而援貪進不止方且拠鞍矍鑠𬒳甲請行遂底壼頭之困劉夣得經伏波神祠詩有一以功名累飜思馬少㳺之句可謂名言矣壼頭在武陵當是夣得為司馬時經歴故萹首言䝉䝉篁竹下有路上壼頭韵語陽秋武帝見顔駟厖眉皓首問何時為郎何其老也對曰文帝好文而臣好武景帝好老而臣尚㓜陛下好少而臣老矣老扵為郎此事尤著切怪老杜屢傷為郎白首每稱馮唐而不及駟生旣不遇三君身後復不遇老杜可笑也已䂬溪子羙世號詩史觀北征詩云皇帝二載秋䦞八月初吉送李校書云乾元元年春萬姓始安宅又戯友二詩元年建已月郎有焦校書元年建巳月官有王直司史筆森嚴未易及也黄常明舎人遺織成褥叚云服飾㝎尊卑大㢤萬古程煌煌珠宫物寢處􅍔所嬰錦衣卷還客始斍心和平其意在明分守警貪饕屏斥玩物嚴道氣之大莭豈直專為詩㦲就中和平之語尤可人意世有豪横凶人強委饋扵善士而不能驟絶之其心愧恥雖𣣔和平不可得也䂬溪諸史傳首尾一律惟左氏傳春秋則不然千變萬状有一人而稱目至數次異者族氏名字爵邑謚號皆宻布其中而寓諸褒貶此史家祖也觀少陵詩冝隠此㫖若云杜陵有布衣杜曲幸有桑麻田杜子将北征臣甫憤所切甫也東西南北人有客有客字子羙盖自見其居里名字也不作河西尉白頭拾遺徒歩㱕俻矣均𥙷衮凡才汚省郎𥙷官迁徙歴歴可攷至叙他人亦然如云粲粲元道州又云結也實國楨凡例森然誠春秋之法也䂬溪人以藤代蒭酒名鈎藤俗傳他處即不可用或謂但心醖造之法異耳所在皆可樂天忠州春詩云閑拈舊葉題詩詠悶取藤枝引酒嘗是巴蜀亦有之黄常明百家詩話總龜後集卷之二十三
