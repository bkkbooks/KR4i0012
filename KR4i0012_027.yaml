front:
  text: 增修詩話總龜卷之二十七
  hash: sha256:8f8039b13f8239eb30055b72934458858da904611190211a340fbbe76e2e44e3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_027-1a}
body:
  text: 書事門唐高宗承正觀之後天下無事上官儀侍郎獨持國政嘗凌晨入朝巡洛水堤步月徐轡詠詩云脈脈廣川流驅馬入長洲鵲飛山月曉蟬噪野風秋音韻清亮群公望之如神仙焉小説舊聞長和國使人布燮聽蜀妓洞雲歌詩云嵇叔夜鼓琴飲酒無間暇若使當時聞此歌拋擲廣陵都不藉劉伯倫虛生浪死過青春一飲一石猶自醉無人為爾卜深塵又思鄉詩曰虜北行人絶雲南信未還庭前花不掃門外栁誰攀坐久銷銀燭愁多減玉顔懸心秋夜月萬里照關山鑑戒録江南人多畬田先熂爐熂音餼縱火燎草也爐火燒山界也俟經雨乃下種歷三歲土脈竭不可復種藝但生草木復熂旁山宋西陽王子尚所部鄞縣有疁田音嘐留畬田也子尚言山湖之俗熂山封水澤山須熂爐後種劉禹錫謫連州作畬田詩云團團縵山腹鑽龜得兩卦上山燒卧木又云下種暖灰中乘陽拆芽蘖蒼蒼一雨後苕頴如雲發白樂天子規歌云畬田有粟何不啄石楠有枝何不棲畬音羊諸反爾雅云一歲曰災二歲曰新三歲曰畬易曰不災畬皆同音凡三歲而不可復種蓋取畬之義也談苑進士科始隋大中盛於正觀永徽之際縉紳雖位極人臣不由進士者不以為美其推重謂之白衣卿相又曰一品白衫其不利者謂之三十老五經五十少進士有老于文場者亦無恨焉故有詩云太宗皇帝真長䇿賺得英雄盡白頭托言浮玉老師元公欲為吾昔有詩云江山如此不歸山山神見怪驚我頑我謝江神豈得巳有田不歸如江水今有田矣而不歸無乃食言于神耶百斛明珠世常傳云欲人不知莫若不為以謂既為之也安得人之不知夫至隱至密者莫若中冓之事豈欲人之知邪然而不能使人不知以此凡事之不循理者雖毛髮之細不可為也明皇舊置五王帳長枕大𬒳與兄弟同處於其間無何妃子輒竊寧王笛吹之始亦不彰因張祐詩云梨花靜院無人處間把寧王玉笛吹妃因此忤明皇不懌乃遣中使張韜光送歸楊銛宅妃子涕泣謂韜光曰托以下情繳奏妾罪固當萬死衣服之外皆聖恩所賜惟髮與膚生從父母爾今當即死無以謝上乃引刀剪髮一結附韜光以獻自妃之放逐皇情憮然妃髮至張韜光取搭之肩上明皇見之大驚惋遂令高力士就召以歸嗟乎道路之言亦可畏也使張祐不為此語事亦何由彰顯之如此然張亦何從得此為之説以此可驗其欲人不知莫若不為亦名言也唐末有冝春人王轂者以歌詩擅名於時嘗作玉樹曲云碧月夜夜瓊樹春蓮舌泠泠詞調新當時狎客盡豐祿直諫犯顔無一人歌未闋晉王劍上粘腥血君臣猶在醉鄉中面上巳無陳日月此詞大播于人口轂未第時嘗於市㕓中忽見同人𬒳無賴輩毆打轂前救之揚聲曰莫無禮識吾否吾便是解道君臣尤在醉鄉中面上巳無陳日月者無賴輩聞之斂袵慙謝而退噫無賴者乃小人也能為此等事亦可重也方其倚力恃勢勃然以發凶暴之氣將行歐擊視其死且無悔矣及一聞其名人則慚謝之色形于外斯亦難矣有改悔之耻向善之心得不謂之君子哉百斛明珠戚綸密學𥘉仕為吉州太和令里俗頑悍喜結誣訟公至以術漸磨先設巨械嚴固狴犴其箠挺組索比他邑數倍民巳自悚駭次作諭民頌五十絶不事風雅皆風俗易曉之語俾之諷誦以申規警立限日誦半年頑心不悛一以苛法治之果因此獄訟大減其詩有云文契多欺歲月深更將疆界強相侵官中檢出真兼偽枷鎖鞭笞痛不禁大率類此江南往往有本玉壷清話今時市語答人真實事則稱見來此語蓋巳久矣坡贈黃山人詩云面頰照人元自白眉毛覆眼見來烏直方詩話羅虬羅鄴羅隱齊名號三羅李孝恭籍中有紅兒善肉聲嘗為二車屬意聘鄰道虬請紅兒歌而贈之繒綵孝恭以副車所貯不令受所貺虬怒拂衣而起詰旦為絶句百篇號比紅兒詩盛行于時托言盧同詩云何時得去禁酒國今吾謪嶺南萬户酒家有一婢昔嘗為酒肆頗能伺候冷暖自今當不乏酒可以日飲之何其去禁酒國矣玉局文上元夜登樓貴戚例有黃柑相遺謂之傳柑東坡有扈從端門觀燈詩云老病行穿萬馬群九衢人散月紛紛歸來一盞殘燈在猶有傳柑遺細君蓋謂此也直方詩話前輩戲語有西湖風月不如東洛軟紅香塵之語故東坡和錢穆父蔣頴叔從駕景靈宫詩云半白不嗟垂項髮軟紅猶戀屬車塵李方叔為坡公客坡公知貢舉而方叔下第有詩云平生謾説古戰埸過目還迷日五色山谷和之云今年持槖佐春官遂失此人難塞責蓋是時山谷亦在貢院中也舟人占雲若炮車雲起輒急避雲乃大風候也東坡有云今日江頭天色惡炮車雲起風欲作文潛有云喜逢山色開眉黛愁對山雲起炮車氷庍事旯因話録云歐陽有詩云獨宿氷庍夢帝闕余疑李賀云酒滳珍珠紅夏彥剛云江南人造紅麯酒白樂天云羌管吹楊柳燕姬酌葡萄謂太原出葡萄酒也然此乃律詩用平聲讀則太不律用側聲讀則近俗耳京師芡實最盛於會靈觀之凝祥池故文忠詩曰凝祥池鎖會靈園僕射荒村安可比而東坡又云忽憶嘗新會靈觀滯留江海得加餐僕射坡在鄭州世亦稱其芡實也同前老杜有坐開桑落酒句世説謂桑落河多美酒而庾信有從蒲州刺史乞酒詩云蒲城桑落酒灞岸菊花秋詩云年老身間無外事麻衣草坐亦容身相逢盡道休官去林下何曾見一人蓋載於雲溪友議而歐陽文忠以謂相傳作俚諺慶曆中天章閣待制許元為江淮發運使因修江岸得此石于池湯江水中始知為靈徹詩何邪同前賔護尚書言來禽以味甘衆禽也而東坡和舒王詩云青李扶踈禽自來何邪酴醿本酒名也新開花本以其顔色似之故以取名山谷所以有名字因壺酒風流付枕幃之句又云風流徹骨成春酒夢寐宜人入枕囊冝或作疑京師舊無鴨腳李文和自南方來移植于私第因而著子自後稍稍蕃多不復以南方者為貴歐陽文忠作詩云鴨腳生江南名實未相浮綘囊因入貢銀杏貴中州致逺有餘力好竒自賢侯因令江上根結實夷門秋始摘才三四金奩獻凝旒公卿不及識天子百金酬歲久子漸多纍纍枝上稠玉人名好客贈我此珠投慱望昔所徙葡萄安石榴想其𥘉來時厥價與此侔今也遍中國籬根及墻頭物性久雖在人情逐時流惟當貴其始後世知來由是亦史官法豈徒續君謳劉太真與韋蘇州書云顧著作來以足下郡齋燕集相示云何情致暢茂遒逸之如此宋齊間沈謝吳何始精于理意緣情體物偹詩人指後之傳者甚失其源惟足下制其橫流師摯之始關雎之亂於足下之文見之矣則知蘇州詩為當時所貴如此燕集所作乃兵衛森畫戟宴寢凝清香也昔文潞公來朝𥙿陵待以殊禮禁從三省皆為賦詩李籍云三公歷拜榮無敵二府更居貴莫倫畢仲遊云十年三册命四海一師臣皆為能敘其官爵錢長卿云三陪藻燕簮𥚑上五對龍顔日月邉又云黼座勸觴鈞樂逸雲章屬韻侍貂傳此為敘其恩禮蓋公自𥘉覲至出關賜特燕者三登對者五上親勸以御觴而後復和其所賦故長卿云爾詩云白藕作花風巳愁或作秋不堪殘睡更回頭晚雲帶雨歸飛急去作西窗一夜秋或作愁此趙麟細君王氏所作也德麟既鰥居因見此篇遂與之為親余以為乃二十八字媒也秦少遊為黃本錢穆父為户部皆居于東華門之堆垜埸少遊春日嘗以詩遺穆父云三年京國鬢如絲又見新花發故枝日典春衣非為酒家貧食粥巳多時穆父以米二石送之復為二十八字云儒館優賢蓋取頥校讐尢自困朝飢西鄰俸祿無多少希薄才堪作淖縻時人以少遊有如此才而亦食粥似不相稱耳東坡寄柳子玉云聞道床頭惟竹几夫人應不解卿卿又送竹几與謝秀才云留我同行木上座贈君無語竹夫人蓋俗謂竹几為竹夫人也山谷云竹夫人乃涼寐竹器憩臂休膝非夫人之職而冬夏青青竹之所長故為名曰竹奴嘗作詩曰穠李四弦風拂席昭華三弄月侵床我無紅袖堪娛夜正要青奴一味涼穠李昭華貴人家兩女奴也張文潛后作竹夫人傳宣勸字東坡數使之其一和王仲至喜雪御筵詩曰宣勸不多心自醉其一和蔣頴叔端門觀燈詩云十分宣勸恐難勝東坡謪黃州居于定惠院之東雜花滿山而獨有海棠一株土人不知貴東坡為作長篇平生喜為人寫蓋人間刋石者自有五六本云吾平生最得意詩也杭州有西湖而潁亦有西湖皆為逰賞之勝而東坡連守二州其𥘉得潁也有潁人在坐云內翰只消逰湖中便可以了郡事蓋言其訟簡也秦覯少章因作一絶以獻云十里荷花􅔽蓞𥘉我公所至有西湖欲將公事湖中了見説官間事巳無后東坡到潁有謝執政啓亦云入參兩禁每玷北靡之榮出典二邦輒為西湖之長並同前唐德州刺史王倚家有筆一管粗於常筆刻從軍行人馬毛髮亭臺山水無不精絶刻兩句曰亭前琪樹已堪攀塞北征人尚未還古今詩話北方白鴈似鴈而少色白秋深乃來白鴈至則霜降河北人謂之霜信杜甫詩云故國霜前白鴈來即謂此同前大丞相劉公沆赴舉道過獨木鎮有老人出曰知公赴舉有一聮相贈曰今年直跨窮驢去異日當乘寶馬歸公曰何以知之叟曰公自是羅浮山玉源道君公愧謝叟乃去青瑣集王仁𥙿嘗飬一猿名之曰野賔久而放之因作詩曰放爾丁寧復故林舊來行處好追尋月明巫峽堪憐靜路隔巴山莫厭深棲宿免勞青嶂夢躋攀應愜白雲心三秋果熟松梢健任爾高枝徹曉吟后入蜀過嶓􅜗祠前漢江之隂有群猿聮臂而下飲清流有巨猿捨群而前從者指之曰此野賔也呼之猶應哀吟而去又作一篇云嶓􅜗祠邉漢水濵山猿連臂下嶙峋漸來仔細窺行客認得依稀似野賔月宿應勞羇旅夢松棲那復稻粱身數聲腸斷和雲呌識得前年舊主人脞説后集東坡南遷有侍兒王朝雲請從行坡佳之作詩有序曰世謂樂天有鬻駱馬放楊枝詞佳其至老病不忍去也然夢得詩云春盡絮飛留不得隨風好去落誰家樂天亦曰病與樂天相伴住春同樊素一時歸則樊素竟去也余有數妾四五年相繼辭去獨朝雲隨余南遷因讀樂天詩戲作此贈之不學楊枝别樂天且同通德伴伶玄伯仁絡秀方同老天女維摩總解禪經卷藥爐新活計舞裙歌板舊因緣丹成隨我三山去不作巫山雲雨仙蓋紹聖元年十一月也三年七月朝雲卒葬於西禪寺松林中直大聖塔和前詩曰苗而不秀豈其天不使烏童與我玄駐景恨無千歲藥贈行唯有小乘禪傷心一念償前債彈指三聲斷后緣歸卧竹根無逺近夜燈勤禮塔中仙冷齋夜話杜甫贈高適詩云脫身簿尉中始與捶楚辭韓退之贈張功曹詩云判司卑官不堪説未免捶楚塵埃間杜牧寄小姪阿宜詩云參軍與簿尉塵土驚皇皇一語不中治鞭捶身滿瘡以此明唐之參軍簿尉有過即受笞杖之刑猶今之胥吏也遁齋間覽俗云槐花黃舉子忙謂槐之方花乃進士赴舉之時而唐詩人翁承贊詩云雨中粧點望中黃勾引蟬聲送夕陽憶得當年隨計吏馬蹄終日為君忙乃知俗語亦有所自也增修詩話總龜卷之二十七丙集終百家詩話總龜後集卷之二十七詠物門杜集及馬與鷹甚多亦屢用屬對如老驥倦知道蒼鷹飢易馴老驥思千里飢鷹待一呼老馬倦知道蒼鷹飢箸人驥病思偏秣鷹愁怕籠放蹄知赤驥捩翅服蒼鷹老驥倦􅋮首飢鷹愁易馴􅍡馬行云吾聞良驥老始成此馬數年人更驚又不比俗馬空多肉一洗萬古凡馬空楊監出畫鷹云干戈少暇日真骨老崖嶂為君除狡兔會見畨韝上王兵馬二角鷹云安得汝輩皆其群驅出六合梟鵉分畫鷹云何當擊凡鳥毛血灑平蕪餘尚多有之蓋以壯心未井伏櫪嫉惡剛腸尤思排擊語曰驥不稱其力稱其德也左氏曰見無禮于其君者如鷹鸇之逐鳥雀也少陵有焉周顒有云性命之在彼極切滋味之于我可賖今人以活臠而資口腹者比比皆是也是誠何心哉或曰羊豕大身難于刲割蚶蛤微􅒛易于烹熬如是則性命之小者尤不幸也鍾屼嘗告其師何子季曰車螯蚶蠣眉目內關脣吻外緘不悴不榮曽草木之不若無聲無臭與瓦礫其何算故可長充庖厨永為口實何其仁于大而忍于細歟山谷信佛甚篤而晚年酷好食蟹所謂寒蒲束縳十六輩已覺酒興生江山又云雖為天上三辰次未免人間五鼎烹乃果于殺如此何哉東坡在海南為殺雞而作疏張乖崖之在成都為刲羊而轉經是豈愛物之仁不能勝口腹之𣣔耶山谷談無礙禪蘇張行有為法亦各其所見尓永叔堪笑區區郊與島螢飛露􅊜吟秋草以為二子之窮子美亦有暗飛螢自照水宿鳥相呼幸因腐草出敢近太陽飛雖吟詠微物曽無一點窮氣臨川蕭蕭出屋千尋玉竹也靄靄當窗一炷雲香也皆不名其物然子厚破額山前碧玉流泉也巳有此格近詩蕨芽巳作小兒拳退之已有初拳幾枝蕨竹未嘗香也而杜子美詩云雨洗姢姢淨風吹細細香雪未嘗香也而李太白詩云瑶臺雪花數千點片片吹落春風香葛常之韓退之雙鳥詩多不能曉或者謂其詩有不停兩鳥鳴百物皆生愁不停兩鳥鳴大法失九疇周公不為公孔子不為丘之句遂謂排釋老而作其實非也前云一鳥落城市一鳥巢岩幽后云天公怪兩鳥各捉一處囚則豈謂釋老耶余嘗觀東坡作李白晝像詩云天人幾何同一漚謫仙非謫乃其遊揮斥八極隘九州化為二鳥鳴相酬一鳴一息三千秋縻之不得矧肯求且知所謂雙鳥者退之與孟郊輩尓所謂不作兩鳥鳴等語乃審公告天之言甚其辭以譛二鳥尓落城市退之自謂落岩幽謂孟郊輩也各捉一處囚非囚禁之囚止言韓孟各居天一方爾末云還當三千秋更起鳴相酬謂賢者不當終否當有行其言者老杜云鮑當孤鴈詩云更無聲接續空有影相隨孤則孤矣豈若子美孤鴈不飲啄飛鳴尤念群誰憐一片影相失萬重雲有不盡之意乎同上王誼伯謂西川有杜鵑東川無杜鵑蓋是題下注斷自我昔逰錦城為句首子瞻謂杜備諸家體非必牽合程度詩意蓋􅏺當時刺史有禽鳥不若者明皇已後天步多棘凡尊君者有為也懷二者為無也魯直亦云臣結春秋二三䇿臣甫杜字再拜詩忠臣銜憤痛切骨後世但識瓊瑰辭今觀此萹敘鴻鴈羔羊禮自太古尊親君上之意為明皇設不疑至于杜鵑行乃云雖同君臣有舊禮骨肉滿眼身羇孤又云爾惟摧殘始發憤羞帶羽翮傷形愚指斥罵詈殊無致嚴之語莫不皆有所主也黃常明東坡南都王誼伯書江濱馹垣謂子美詩歷五季兵大多舛缺奇異雖經其祖父所理尚有疑闕者誼謂西川有杜鵑東川無杜鵑涪萬無杜鵑雲安有杜鵑蓋是題下注斷自我昔逰錦城為首句誼伯誤矣且子美詩備諸家體非必牽合程度侃侃者然也是萹句處凡五杜鵑豈可以文害辭辭害意邪原子美之意類有所感託物以彂者也亦六藝之比興離騷之法歟按慱物志杜鵑生子寄之他巢百鳥為飼之故江東所謂杜宇曽為蜀帝王化禽飛去舊城荒且禽鳥之微有識故子美詩云重是古帝魂又曰禮若奉至尊子美蓋譏當時刺史有不禽鳥若也唐自明皇以後天步多棘刺史能不忘君可得而考也嚴武在蜀雖橫斂刻薄而實資中原是西川有杜鵑耳其不虔王命負固以自抗擅軍旅絶貢賦如杜克遜在梓州為朝廷西顧之憂是東川無杜鵑耳至于涪萬雲安刺史微不可考凡尊君者為有也懷二者為無也不在夫杜鵑真有無誼伯以為來東川聞杜宇聲乃始疑子美跋疐𥿄上語又云子美不應疊用韻子美自我作古疊用韻無害于詩僕所見如此誼伯慱學強辨殆必有以折中之䂬溪花卿云用如快鶻風始生南史曹景宗謂所親曰昔在鄉里與年少輩托弓弦作霹靂聲放箭如餓鴟覺耳後生風鼻尖出火子美蓋不拘泥于鴟鶻之異也黃常明柳子厚牡丹曰欹紅醉濃露窈窕留餘春坡云殷勤木芍藥獨自殿餘春留與殿重輕雖異各有冝也楊中立梅詩云𣣔驅殘臘變春風只有寒梅作選鋒頗恨不與殿軍啇確正一的對同上西湖浮動橫斜之句最為前輩擊節常恨未見全篇得其集觀之云衆芳搖落獨暄妍占盡風情向小園踈影橫斜水清淺暗香浮動月黃昏霜禽𣣔下先偷眼粉蝶如知合斷魂幸有微吟可相狎不須檀板共金樽其卓絶不可及專在十四字耳又有七年數萹皆無如池水倒窺踈影動屋簷斜入一枝低雪後園林才半樹水邉籬落忽橫枝之句䂬溪于里蓴羮未下鹽䜴蓋言未受和耳子美䜴化蓴絲熟又䜴添蓴菜紫聖俞送人秀州剩將鹽䜴煮紫蓴魯直鹽䜴欲催蓴菜熟同上巴峽中有吐綬雞比常雞差大嗉藏肉綬長闊幾數寸紅碧相間極煥爛常時不見見遇晴日則向陽擺之頂首先出兩肉角亦二寸許然後徐舒其綬逾時乃斂李文饒詩所謂葳㽔散綬輕風裏若御若垂何可擬是也文饒云出剡溪今詢之越人不復有豫嘗自峽中携至蘇州人皆不識則知山川風氣所産古今亦有不同也蔡寬夫詩話真珠雞生夔峽山中畜之甚馴以其羽毛有白圓點故號真珠雞又名吐綬雞生而反哺亦名孝雉每至春夏之交景氣和暖頷下出綬帶方尺餘紅碧鮮然頭有翠角雙立良久悉斂于嗉下披其毛不復見或有死者割其頸臆間亦無所覩苕溪漁隱曰廣右閩中亦有吐綬雞余在二處見人多養之不獨巴峽中有也王荆公有絶句云樊籠寄食老低摧組麗深藏肯自媒天日淸明聊一吐兒童初見互驚猜倦遊録李衛公詩云五月畬田收火米三更津吏報朝雞頗似少陵句王荆公詩云紛紛易變浮雲白落落難鍾老柏清山谷蟹詩云巳摽天上三辰次未免人間五鼎烹此皆得老杜句法雪浪齊日記唐故事中書省植紫薇花歷世循用之不以為非至今舍人院紫薇閣前植紫薇花用故事也樂天詩云獨坐黃昏誰是伴紫薇花對紫薇即按天文志紫薇大帝之坐也天子之常居也主命主度也何關紫薇花事湘素雜記嘗見曲中使桞三眠事不知所出後讀玉溪生江之媯賦云豈如河畔牛星隔歲止聞一過不比苑中人桞終朝剩得三眠注云漢苑中有桞狀如人形號曰人栁一日三起三倒漫叟詩話玉溪生牡丹詩錦帳佳人乃越絶書中事退之燈花詩全似老杜所用黃裏事見前漢黃屋注中荆公詩曰溪邊飲啄白浮鳩浮鳩出晉志雪浪齊日記牧之和裴傑新櫻桃詩云忍用烹騂酪從將玩玉􅐻流年如可駐何必九華丹唐人巳用櫻桃薦酪也苕溪漁隱曰托言載唐新進士尤重櫻桃宴劉覃及第大會公卿和以糖酪人享蠻晝一小盎則唐人用櫻桃薦酪此事又可驗矣髙齊詩話老杜櫻桃詩云西蜀櫻桃也自紅野人相贈滿筠籠數回細寫愁仍破萬顆勻圓訝許同此詩如禪家所謂信手拈來頭頭是道者直書目前所見平易委曲得人心所同然但他人艱難不能發耳至于憶昨賜霑門下省退朝擎出大明宫金􅐻玉筯無消息此日嘗新任轉蓬其感興皆出于自然故終萹遒麗韓退之有賜櫻桃詩云漢家舊種光明殿炎帝還書本草經豈似滿朝承雨露共看傳賜出青冥香隨翠籠擎偏重色照銀􅐻寫未停食罷自知無輔報空然慙汗仰皇扄蓋學老杜前詩然搜求事迹排比對偶其言出于勉強所以相去甚逺若非老杜在前人亦安敢輕議詩眼溫庭筠小詩尤工如墻髙蝶過遲又蝶翎朝粉重鴉背夕陽多又過蘇武廟詩云歸曰樓臺非甲帳去時冠劍是丁年雪浪齊日記溫飛卿晚春曲云家臨長信往來道乳燕雙雙拂煙草油壁車輕金犢肥流蘇帳曉春雞報籠中嬌鳥暖尤睡簾外落花間不掃哀桃一樹近前池似惜容顔鏡中老殊有富貴佳致也苕溪漁隱韓偓詩云鵝兒唼喋雌黃觜鳯子輕盈膩粉腰事見崔豹古今注云蛺蝶大者為鳯子西清詩話傳道嘗于彭門壁間見書一聮云一鳩鳴午寂雙燕話春愁後以語東坡世謂公然否坡笑曰此唐人得意句僕安能道此苕溪漁隱曰余嘗用此語作春日一聮云話盡春愁雙紫燕喚回午夢一黃鸝同上陳恭公執中以衛尉寺丞知梧州馹遞上疏乞立儲二真宗嘉其敢言翊日臨朝袖其疏以示執政欵奬久之召為右正言然為王兾公所忌一日真宗賦御溝栁詩宣示宰相兩省皆和進恭公因進詩曰一度春來一度新翠光長得照龍津君王自愛天然色恨殺昭陽學舞人東軒筆録紅梅清艷兩絶昔獨盛于姑蘇晏元獻始移植西岡第中特珍賞之一日貴逰賂園吏得一枝分接由是都下有二本公嘗與客飲花下賦詩曰若更遲開三二月北人應作杏花看客曰公詩固佳待比俗何淺也公笑曰顧傖父安得不然一坐絶倒王君玉聞盜花事以詩遺公云館娃宫裡舊精神粉瘦瓊寒露蕊新園吏無端偷折去鳯城從此有雙身自爾名園爭培接遍都城矣苕溪漁隱曰王介甫紅梅詩云春半花才發多應不奈寒北人𥘉未識渾作杏花看與元獻之詩暗合然介甫句意俱工勝元獻逺矣西清百家詩話總龜後集卷之二十七
