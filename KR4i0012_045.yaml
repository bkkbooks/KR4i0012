front:
  text: 增修詩話總龜卷之四十五
  hash: sha256:da9f2b274c97620c20a7c741f92d71192102b28116c1f1baaedb6dfe152021dd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_045-1a}
body:
  text: 神仙門中有逸士衣襴破衫緑􅙧黒束腰帶闊三寸一脚着一靴一脚跣行夏衣絮衫冬卧氷雪出氣如蒸自號藍采和歌曰踏踏歌藍采和世界能㡬何紅顔三春樹流光一擲梭古人混混去不返今人紛紛來更多朝騎鸞鳯到碧落暮見桑田生白波長景明暉在空際金銀宫闕高嵯峨曵長繩穿錢拖行縱錢散不收後至濠梁飛上昇冉冉而去續仙傳任生隱於嵩山讀書夜有一女子來曰冥數合與子爲姻生意其異乃拒之遂開簾而入可二十許冶容艶羙二青衣侍前就案書一詩云我本籍上清謪居逰五岳以君無俗侣來勸神仙學三日當來遂去生覧之愈疑妖怪志不納又贈一篇云葛洪還有婦王母亦從夫神仙盡靈匹君意合何如面墻不對女子再贈一首阮郎迷不悟何䖏伸情愫明日海山春彩舟却歸去出門冉冉飛望而去數月任大病為黄衣吏攝去來行十里忽見幢節不絶有女仙乗翠輦侍從數千人黄衣吏曵任牆下避仙笑曰嵩山薄命漢汝數盡更與三年生果六十卒後詩為雷電取去盧肇遺史洞庭賈客吕卿雲以貿販雜貨逐什一之利有羡施貧善笛遇好山水即留中春月夜泊君山獨飲持一盃弄數曲波上有漁舟冉冉而來乃一父老皤然賈置笛起立迎上舟問所以曰聞子笛聲非凢我是以來對數杯我少業笛子有性可教父老扵懷䄂間出笛三管其大如合拱其次大如常人所蓄其小如細筆管卿雲請父老一吹曰大者不可發次者亦然小者為子吹一曲不知得終否卿雲曰願聞其不可者曰苐一者對諸天帝合天樂動天地坼日月五星失次第二者對洞府諸仙合仙樂飛沙走石百獸腦裂㓜稚震死苐三者可與朋儕聽之未知可終否抽小笛吹三聲湖上風動波濤洶湧魚鱉跳噴僮僕恐悚君山鳥獸呌噪舟檝大恐父老不復吹引滿數盃乃吟曰湘中老人讀黄老手挼紫藟坐碧草春至不知湘水深日暮忘却巴陵道又飲數盃曰明年社期君扵此遂棹漁舟而去隱隱没扵波間傳異志盧李生隱居太白山讀書習吐納李生不甘苦貧訣别浪迹江湖後之官漆園人吏欺隱折官錢覊縻不得東西貧瘁日甚揚州阿師橋逢人草履布衫視之乃盧生昔號二舅者李生與舅語哀其繿縷盧大罵曰貧賤不畏公弃身又有欠負且𬒳囚繫有面相見手李生厚謝之舅咲曰居處不逺來日以馬來迎至日晚果來云屈郎君去來十里朱門斜開二舅出迎雲冠霞帔容貌光澤侍婢數百人燕饌名果不可紀求得一女子佐酒善箜篌容色極佳上有朱字一行雲中辨江樹天際識歸舟燕罷曰莫願作婣否又曰所欠官錢二萬貫請以柱杖往波斯店取錢可從此學道無自穢身其年汴州行軍陸長源以女妻之宛類盧舅北亭善箜篌者箜篌有詩二句李具言舊事女曰少年時因兄弟戯夜乃作夣入仙宫如公所言者盧肇遺史茅濛字初成華陽人也隱華山脩道當始皇三十一年九月白日上升先是時有民謡曰神仙得者苐初成駕龍上昇入太清時下赤洲戯赤城繼世而徃在我盈始皇聞之問故老曰此仙之謡始皇扵是有尋仙之意濛之元孫盈淂道扵金陵勾曲山上升爲東岳上卿司命君太元真人居赤城時來勾曲邦人改勾曲爲茅君山拾遺神仙門下慶暦中有一閑人逰岳謁主簿郭及甫旣坐視其刺乃羅道成也詢其郷里言郴州人及甫留飲曰乆思東州之逰前日逰太山已遍到佳處旦夕迴南方山索𥿄筆為詩曰因思靈秀偶來逰碧玉寒堆萬叠秋直上太山高處望根盤連接十餘州後自和云水雲踪跡自閒逰夏谷隂寒冷勝秋猿鳥性情猶戀舊飜身却去海邊州及甫不勝嘆羡及去令人送之又得詩曰白騾代歩若奔雲閑人所至留詩迹欲知名姓問源流請看郴陽山下石後問郴人有成真君觀得道乗白騾行石壁上其跡至今存焉古今詩話唐子正著作桂州人治平中赴舉至全州途中雇一僕負重擔徤若飛羽雖鞭馬疾逓常去馬百歩外恐其逸去逐遣之其僕即日自全州二千七百里日午巳到唐州留書驛吏曰候桂州唐秀才至即投之唐月餘到驛驛吏出書題云呈桂州唐秀才歸真子封唯一詩曰袁州相見又之全不遇先生道未員大抵有心求冨貴到頭無分學神仙篋中靈藥冝頻施鼎裏丹砂莫妄傳待得角龍為宴㑹好來黄壁卧林泉唐甚怪之詰其狀貌乃全州僕也留書之日乃全州所遣日也始悟其為神仙唐後為邕倅熈寜丙辰交趾冦邕唐遇害乃詩所謂角龍也許宣平新安人常掛一花瓢及曲竹枝每醉即獨吟曰負薪朝去賣沽酒日西歸路人莫問歸何處穿白雲行入翠㣲好事者扵洛陽同華間是處題之李太白見曰此神仙也韋七七名文祥周寳舊扵長安識之及寳鎮浙西七七忽到召之益加禮遇鶴林寺有杜䳌花寺僧相傳云正元中外國僧自天台鉢中以藥飬其根來植扵此寺僧剏餙花院人或見女子紅裳艶䴡逰扵花下俗傳花神也一日寳謂七七曰鶴林寺天下竒絶嘗聞能開頃刻花此花能開赴重九乎曰可也乃前二日經鶴林寺宿中夜有女子來謂七七曰妾為上蒼所命下司此花非乆即歸閬苑今為道者開之晨起寺僧訝花漸拆至九日爛熳後為兵火其花遂亡信歸閬苑矣元真子張志和㑹稽人守真飬氣卧雪不冷入水不濡顔魯公守湖州日與賔客唱和為漁父詞志和曰西塞山前白鳥飛桃花流水鱖魚肥青蒻笠緑蓑衣斜風細雨不須歸坐客嘆服不已後果傳之相州棲霞谷有喬順二子服飛龍藥二子十年不飢魏文帝詩曰西山有仙童不飲亦不食謂此俱同上呉仁壁關右人學進士逰羅浮洞學老莊扵張先生得其大㫖辭歸謀入京取應先生曰觀子氣法可住此吾授子長生之道仁壁辭以老母缺甘㫖俟名遂身退學亦未晚先生曰此去必遂其志亦須早來是年中第入浙謁錢武肅殊禮之累辟入幕堅辭不就以詩謝云東門上相好知音數盡䑓前郭隗金累重雖然容食椹力㣲無計報焚林弊貂不稱芙蓉幕衰朽仍慚玳瑁簮十里溪光一山月可堪從此負歸心武肅復遣人請撰羅城記仁壁堅不從武肅怒沉扵江呉人惜之仁壁有一女有閑居詩云爲惜苔錢妨換砌因憐山色旋開尊又贈道士云五龍金角向星斗三洞玉音愁鬼神又題甖粟云蒲草薄裁連蒂白臙脂濃染半葩紅又逰法華寺云高閣煙霞禪客睡滿城塵土世人忙建隆初廣南劉隱遣中翁光普同禮丞寗昱就羅浮山設醮醮畢昱逰諸岩洞至山頂見一石門有老叟衣薜蘿㩀門而坐昱問其由云是羅浮先生宅再問誰氏叟低聲對云呉先生也名仁壁言訖户闔了無所見其後或有人扵羅浮勾曲諸山見仁壁復引一十歲許女子驗是其女也雅言雜載有商客過海遇風俄抵一所門宇聳秀珎噐爛然云是樂天之居樂天聞之作二絶云近有人從海上廻海山深䖏是樓䑓中有仙龕開一室皆言此待樂天來又云吾學空門不學仙恐君此語是虚傳海山不是吾居處歸則惟歸兠率天古今詩話女真錢氏二姊妺依止陶隱居誦黄庭經即茅山燕洞也至今有紫菖蒲碧桃焉其姊披白練衣得道入洞及女弟至則户已扄矣淳化五年夏侯嘉正與道士五人徃彼投龍是夜雷震其洞復開有一吏深入遇道士與林擒一枚食之遂絶粒田霖作詩題之曰燕口龍泓氣象清錢真此䖏有遺靈仙兄去後師猶在女弟回時户已扄雲片尚如披白練泉聲長似誦黄庭碧桃花發菖蒲紫留與人間作畫屏同上唐儀鳯中清城縣横源翠圍山下有民王仙柯服道士所遺靈丹㧞宅上升已具仙傳拾遺蜀州僧中寤釋學道播扵方州偶於龍池山逢人精神爽朗異扵常叟即王仙柯也寤公曰聞仙名已乆何幸相逢飛升之後胡為來此仙柯曰吾等有靈藥止能飛歩今全家隱扵後山更脩道法遐舉之事吾何望焉但長夀而已寤公以詩贈之曰瞻思不及望仙兄早晚遐飛入太清手種一株松未老爐燒九轉藥新成心中已得黄庭術頭上應無白髪生異日却歸華表語待教凢俗普聞名自後不復遇葆光子聞扵真人曰世人學道資一丹一藥聊固其命何以脩道未得證就避忌尢多三官巡羅攝入鬼録所以頻改姓名先用屍解然後棲止靈岳進取上法或五岳授事效職仙曹優㳺人間或至千歲功徳升聞即朝玉皇海岳之間徃徃遐舉者世人無由知也今之初得道者止扵仙隱有騰空者服金丹也遐舉之事未可希望北夣瑣言伊夣不知何許人因夣两日遂立此名唐末不仕披羽褐逰山水題攸縣司空觀仙壇云惟有松杉空弄日更無雲鶴暗迷人題黄蜀葵云露凝金盞滳殘酒檀點佳人噴異香在醴陵何氏家一日别去作詩附鐡匠回言在彼打劍何氏發其塜棺空惟劍耳青瑣后集陳純字元朴莆田人因逰桃源中秋夜遇玉源靈源桃源王夫人玉源令純舉中秋月詩純言一聮云莫辭終夕看動是隔年期桃源曰意雖佳但不見中秋月作七月十五夜月亦可玉源因作詩曰金風時拂𬒮氣象更分明不是月華别都縁秋氣清一輪方極滿群籟正無聲曉魄沉烟外人間萬事驚靈源詩曰髙秋渾似水萬里正圓明玉兔歩虚碧氷輪輾太清廣寒宫有路桂子落無聲吾館無弦彈棲烏莫要驚桃源詩曰金吹掃天幕無雲方瑩然九秋今夕半萬里一輪圓皓彩盈虚碧清光射玉川瑶樽休惜醉幽意正綿綿玉源謂純曰子能繼桃源之什乎純作詩曰仙源嘗悞到覊思正蕭然秋静夜方静月圓人更圓清尊歌越調仙棹泛晴川幽意知多少重重類楚綿太原王世寜自言籍係第十八洞玉仙人熈寜中以暴疾終于家臨終作詩曰翠羽旌幢仙子隊紫雲樓閣玉皇家人間風雨易分散回首武陵空落花韓湘字清夫文公猶子也落魄不覊文公勉之學湘曰湘之所學非公知之公令作詩以觀其志詩曰青山雲水窟此地是吾家後夜流瓊液凌晨咀綘霞琴彈碧玉調爐錬白朱砂寳鼎存金虎元田飬白鴉一瓢藏世界三尺斬妖邪解造逡巡酒能開頃刻花有人能學我同共看仙葩公覧而戯之曰子能奪造化耶湘曰此事甚易公為開尊湘聚土以盆覆之良乆花開乃碧花二朶扵花間擁出金字詩一聮云雲横秦嶺家何在雪擁藍關馬不前公未曉其句意湘曰事乆可騐遂告去未㡬公以佛骨事謫官潮州一日途中遇雪俄有人冐雪而來乃湘也湘曰憶花上之句乎正今日事也公詢其地即藍關嗟嘆乆之曰吾為汝足此詩詩曰一封朝奏九重天夕貶潮陽路八千本為聖明除弊政豈扵衰朽惜殘年雲横秦嶺家何在雪擁藍關馬不前知汝逺來須有意好収吾骨瘴江邊公别湘詩曰人才為世古來多如子雄文世孰過好待功名成就日却抽身去上烟蘿湘别公詩曰舉世都為名利醉伊余獨向道中醒他時定是飛升去冲破秋雲一點青青瑣集賈師雄郎中治平中通判邵武嘗收鐡鏡甚大非常物也乆欲淬磨未得其人左右言近有回處士自言善磨鏡召至風骨軒昻非常人也出示之仍以飲酒畢推藥鏡上言藥少當自取之旣去不回詢其宿在太平寺留詩一絶而去曰手内青蛇凌白日洞中仙果艶長春須知物外烟霞客不是尋常磨鏡人取鏡視之藥已化去所堆藥處一點表裏通明如寒玉春氷又嘗有顧中謁故人季郎中至岳陽投宿市邸唱新曲有𥙷鞋人問曰此何曲中曰都下新聲也其人曰吾不觧書子能為我書當扵此調頃一詞中因為書之乃今所傳沁園春也因問其姓荅曰生扵山口長扵江口即今為守谷之客姓名不知也中翌日見太守言之追不復至題詩一絶扵邸中腹内嬰兒養已成且居塵世暫娱情無端措大剛饒舌却入白雲深處行中與太守深歎恨之山口守谷乃仙之姓并字也永叔登苐後授洛陽節推聖俞為洛陽簿乃得友之初也一日同逰嵩山佳䖏相對吟醉遂望四峰巨厓之上有丹書四字云神清之洞指示聖俞聖俞曰不見洎告老歸潁思前四字作一絶云四字丹書萬仭厓神清之洞鎻樓䑓烟霞極目無人到鸞鶴今應待我來後數月薨並同上有道人過沈東老飲酒用石榴皮寫絶句壁上稱回山人東老送出門渡橋不知所徃或曰此吕洞賔也僕見東老子偕道其事為和此詩後復與偕遇錢塘更為書之回山人詩云西鄰己冨憂不足東老雖貧樂有餘白酒醸來縁好客黄金散盡為收書東坡和曰世俗那知貧是病神仙可學道之餘但知白酒留佳客不問黄公覔素書符離道士晨興際華岳先生尸解餘忽見黄庭丹篆字猶傳青𥿄小朱書凄凉雨露三年後彷彿塵埃數字餘至用榴皮縁底事中書君豈不中書東坡詩話劉跛子青州人拄一拐每歲一至洛陽看花舘扵范家園大范見之即與二十四曰跛子吃半角小范見時止與十金曰跛子喫椀羮以詩謝曰大范見時二十四小范見時吃椀羮人生四海皆兄弟酒肉林中過一生張丞相召自荆南時跛子與客飲市橋客起觀之挽其衣使且坐飲作詩曰遷客湖湘召赴京輪蹄迎迓一何榮争如與子市橋飲且免人間寵辱驚余寓扵興國寺戯之詩曰相逢一榻大梁間妙語時時見一斑我欲從公蓬島去爛銀堆裏看青山計其夀百四十五矣邸中無人識之冷齋夜話周貫不知何許人自號木鳫子宿龍泉觀半夜搥道士門道士問其故曰偶得句當奉告因吟曰彈琴傷指甲盖蓆損髭鬚是夜貫以蓆自覆故耳至袁州見市并李生秀韻欲携同歸林下李嗜酒色意欲無行貫指煑藥鐺作偈示之曰頑鈍天教合作鐺從初三脚豈能行雖然有耳不聽法只愛人間戀火坑尋死扵西山將化人問㡬歲貫曰八十西山作酒仙麻鞋糺㫁布衣穿相逢甲子君休問太極光隂不記年復有人見扵京師附書扵李生云眀年中秋夕當上謁至時生以事出貫乃以白土書門而去曰今年中秋夕來赴去年約不見折足鐺彈指空剥剥李生竟折一足冷齋夜話劉野夫留南京乆未入都彭淵才以書督之野夫答曰跛子一生别無道路展手教化三饑两飽目視雲漢聊以自誑元祐新年𬒳劉法師徐神翁形迹得不成模様深欲上京相覷又恐撞着丈人涅陁佛驀𬒳乾拳􅊜踢着甚來由不覊如此甞作長短句曰跛子年來形容何似儼然一部髭鬚世間許大拐上做工夫選甚南州北縣逢着處酒滿葫蘆熏熏醉不知明日何䖏度朝晡洛陽花看了歸來帝里一事全無又還與瓠羮再作門徒驀地思量下水粮網上蘆蓆横鋪呵呵笑睢陽門外有箇大南湖有僧史宗着麻衣加衲其上號麻衣道士坐廣陵白土埭謳歌自適江都令檀祗與語多無畔岸索𥿄賦詩曰有欲苦不足無欲即無憂未若清虚者帶素披玄裘浮游一州間汎若不繫舟要當畢塵慮棲息老山丘檀祗異異之陶淵明記白土埭逢三異比丘此其一也觀其詩句脫去畛封有超然自得之氣非尋常介夫所能作也並同上詩話總龜卷之四十五百家詩話總龜後集卷之四十五釋氏門王績作𬒳召謝病詩云横裁桑莭杖直剪竹皮巾鶴警琴停夜鶯啼酒甕春顔回唯樂道原憲豈傷貧觀此数語又豈以招聘為喜乎坐獨詩寄身千載下聊逰萬物𥘉欲令無作有翻覺寔成虗詠懐詩云故鄉行處是虗室坐間同日落西山暮方知天下空贈薛收詩頼此北山僧教我似真如使我視听遺自覺塵累祛問有知績有得於佛氏者甚深也西清詩話不立文字見性成佛之宗逹磨西来方有之陶淵明時未有也觀其自祭文則曰陶子将辞逆旅之舘永歸於本歸於本宅其擬挽詞則曰有生必有死早終非命促其作飲酒詩則曰採菊東籬下悠然見南山此中有真意欲辨巳忘言其形影神三篇皆寓意髙逺盖苐一逹磨也而老杜乃謂淵明避俗翁未必能逹道何耶東坡論陶子自祭文云出妙語於纊息之餘豈渉生死之流㢤盖深淵明者同上世稱白樂天學佛得佛光如滿時趣觀其吾學空門不斈仙歸則湏歸兠率天之句則豈觧脫語耶元㣲之詩雖不及樂天逺甚然其得䖏豈樂天所能及㢤其遣病詩云况我早師佛屋宅此身形復捨彼就此去晋何所萦前身為過迹来世即前程蛻骨龍不死蛻皮蟬自鳴則與賈誼忽然為人何足控持化為異物又何足患之語何逺耶孟郊未嘗晋意於此而吊元魯山詩有苟含天地秀皆是天地身之句亦可嘉矣同上許渾送栖元弃釋奉道詩云仙骨本㣲靈鶴逺法心潜動毒龍驚送勤尊師自邉將入道詩云蒼鷹出塞胡塵滅白鶴還郷楚水深送李生弃官入道云水深魚避鈎雲逈鶴辞籠皆奨之也至送僧南歸詩云送師不得隨師去巳戴儒冠事素王豈渾亦有逃禪之意也同上錢起投南山佛寺云洗足觧塵纓忽斍天地寛庶将鏡中像盡作無主觀盖知百骸九竅本非天形至悟真寺詩云更聞東林磬九竅本非一興中㝷斍花寂尔諸像滅盖知妙明真心不関諸象起於是理亦可謂超然者矣同上子由誦楞嚴經悟一觧六亡之義自言扵此道更無疑然其作風痺詩乃有数盡吾則行未應墮冥漠之句則於理尚有礙矣而東坡乃謂子由聞道先我何耶東坡奉新別子由詩云何以觧我憂粗了一事大哭遯兒詩云中年忝聞道夢幻講已詳故贈錢道人詩云首断故應無断者氷消那復有氷知主人若苦令儂認認主人人竟是誰又云有主還湏更有賔不如無鏡自無塵只從半夜安心後失却當年覺痛人贈東林揔老詩云溪声便是廣長舌山色豈非清净身夜来八萬四千偈他日如何舉似人如此等句雖宿禪老衲不能屈也同上柳展如東坡甥也不問道扵東坡而問道於山谷山谷作八詩贈之其間有寢興與時俱由我屈伸肘飯羮自知味如此是道否之句是告之以佛理也其曰咸池浴日月深宅飬靈根胸中浩然氣一家同化元是教之道教也聖學魯家恭惟同出自乗流去本逺遂有作書肆是告之以儒道也同上歐永叔素不信釋氏之說如酧净照師云佛說吾不學劳師忽欸関吾方仁義急君且雲水閑酬惟吾師云子何獨吾慕自忘夷其身韓子亦謂收歛加冠巾是也旣登二府一日𬒳病亟夢至一所見十人冠冕環坐一人云叅政安得至此冝速反舎公出門数歩復徃問之公等豈非釋氏所謂十王者乎曰然因問世人飯僧造經為亡人追福果有益乎荅云安得無益旣寤病良巳自是遂信佛法文康公得之於陳去非去非得之於公之孫恕當不妄葉少藴守汝隂謁見永叔之子棐乆不出巳而棐持数珠出謝曰今日適與家人共爲佛事葉問其所以棐曰先公無恙時薛夫人已如此公弗之禁止也逺師作白蓮社與謝灵運陸脩静等十八人爲社客獨淵明不肯入社視衆人固巳髙矣無為子楊次公又從而笑之其作廬山五笑於陶有曰我笑陶彭澤聞鍾暗歉眉藍輿急回去巳是出山遲視彭澤又髙一著矣俱丹陽集佛氏經律論合五千四十八卷寘之大蔵所以傳佛心印作將来眼所𥙷大矣樂天詩詞其間何所不有而寘大蔵何耶東都聖善寺蘇州南禪院各有之自且著集序李公垂作詩羙之曰永添鳴宝集莫雜人乗經所謂盗憎主人者耶又觀題文集櫃云身是鄧伯道世無王仲宣只應分付女晋與外甥傳於是後名亦大孜孜矣同上大觀中呉興郡有邵宗益者剖􅑕将食中有珠現羅漢像偏袒右肩矯首左頋衣紋畢具僧俗創見遂奉以歸慈感寺之臨溪流建炎間憲使楊應誠與客傳玩之次不覺越檻躍入水中亟禱佛求之於烟波渺茫之中一索而獲噫亦異矣葉少藴有詩云九淵幽怪舞垂涎㳺戯那知我獨尊應迹不辞從異類蔵身何意恋窮源歸来自說龍宫化乆住方知鷲嶺存此話湏逢老摩詰貟通無碍本无門曽公衮云不知一壳㡬由旬能納湏弥不動尊疑是呉興清霅水直通方廣古灵源月沉濁水圎明在蓮出汙泥寔性存隱現去来𥘉一致莫将虗幻點空門一時名公和篇甚衆今蔵慈寺同上有唐中葉浮屠中有四澄觀桇支提以舎僧伽者洛中之澄觀也故退之元和五年為洛陽令與之詩云火燒水轉掃地空突兀便髙三百尺洛陽窮秋厭窮獨丁丁啄門疑啄木有僧来訪呼使犀揷脑髙頰權者也叅元名大師爲華嚴䟽主譯經潤文者㑹稽之澄觀也故裴休爲其塔銘云元和五年授僧紇印歴九宗聖世為七帝門師俗壽一百二者也傳燈録有鎮國大師澄觀荅皇太子問心要有心心作佛無一心而非佛心處處成道無一塵而非佛國之句所造超詣豈若前二澄觀有金植福筭沙窮海者之比㢤又有曹谿别出苐二世五䑓山華嚴澄觀大師旣有華嚴二字又有無名禪法嗣之言似即㑹稽澄觀然續云無機縁語句可錄則又非也金光明經載流水長者子以象負水救十千魚生忉利天可謂悲済之極報騐之速矣厥後現於記傳有放䗫得金放龜得印者其類甚多遂使上機生无縁之慈下士兾有因之果皆流水長子之慈意余居泛金溪上暇日率同志拏小舟載魚鼈蝦蟹命五比丘誦宝勝佛名若十二因縁法作梵唄捨之溪中坐間有請作詩以紀一時之事者余輒爲書云漁師竟日漁水族作斤賣小捐使鬼兄滿載獲鱗介鯤鯨未易羅所得亦殊態青蛙尽公私朱鮪兼小大霜魲尚貫針土負或粘塊輪囷積文螺郭索走蒼蠏􅊜沫相煦濡自分煑姜芥豈知惻隱人規作江湖貸因呼小青翰放溜舞澎湃趺坐延黒衣號佛指青瀬經翻流水篇梵起魚山唄傾盆帶寒藻圉圉㸔于邁驚疑或依蒲喜濯或生喝快若鷹辭鞲歡如囚破械定非校人池恐是餘不派願汝藉佛力永脫鈎網債口腹聊尔耳香餌莫渠愛並同上百家詩話緫龜後集卷之四十五終
