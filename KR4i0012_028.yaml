front:
  text: 增修詩話總龜卷之二十八下集
  hash: sha256:a4166b8411f3c039bc6830040417808465ddfaf7830f13effb601f94537656fc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_028-1a}
body:
  text: 龍舒阮一閲編皇明宗室月囱道人刋番陽程珖校故事門章聖朝春月多召兩府兩制三館于後苑賞花釣魚賦詩自趙元昊背叛西陲用兵廢缺甚久嘉祐末仁宗為修故事群臣和御製詩是日微隂寒韓魏公時為首相和詩卒章云曾參二十年前會今備台司得再陪時內侍都知任守忠常以滑稽侍上從容曰韓琦譏陛下仁宗愕然問其故守忠曰譏陛下逰宴太頻仁宗為之笑間居詩話唐制禮部郎中掌省中文翰謂之南宫舍人百日內須知制誥故王元之贈宋給事詩曰須知百日掌絲綸又謂員外郎􅈦為瑞錦窠􅈦前有大石諸州府送到廢印皆於石上碎之又祥瑞圖亦掌於員外􅈦令狐楚元和中任員外郎有詩曰移石幾回敲廢印開箱何處送新圖春明退朝録北都郡守有過馬􅈦按唐韓渥詩云外使進鷹𥘉得按中官過馬不教嘶注云上乘馬必令中官為馭以進謂之過馬既乘之然後蹀躞嘶鳴也唐時方鎮亦效之乃有此名同前世傳潘閬安鴻漸八才子啚皆䇿蹇重戴又王元之贈崔遵度及第未脫白詩云且留重戴士風多則國初舉子尤重戴矣青箱雜記新進士放榜后翌日排光範門候見宰相雖云排光範門其實排建福門集於四方館昔有詩曰華陽觀裏鍾聲禁建福門前鼓動時即其日也南部新書張燕公守歲詩云竹爆好驚眠今人家祀畢始爆竹雜記宋次道嘗為西都詩以野狐落對五鳯樓野狐落唐人名宫人所聚同前曲江會先牒教坊請奏上御紫雲樓觀焉時或擬作樂則為之移日故曹松詩云追遊若遇三清樂行從應妨一日春旨下后人置𬒳袋例以圖障酒器錢絹實其中逢花則飲故張籍詩云無人不借花間宿到處常携酒器行其𬒳袋狀元録事同點檢缺一則罰金曲江之宴行市羅列長安街至半空公卿帥以其月選東床車馬駢闐莫可殫述托言韓定辭不知何許人為鎮州王鎔書記聘燕帥劉仁恭舍於賔館令幕客馬郁延接馬有詩贈韓曰燧林芳草綿綿思盡日相携涉麗譙别后巏熬山上望羡君時復見王喬郁詩清麗然意在試其學問韓即席答之曰崇霞臺上神仙客學辨癡龍藝最多盛德好將銀管述麗詞堪與雪兒歌座內諸賔靡不欽訝稱為妙句然亦疑其銀筆之僻也他日都從容問韓以銀管雪兒之事韓曰昔梁元帝為湘東王時好學著書嘗記録忠臣義士及文章之美者筆有三品以金銀雕飾或用斑竹為管忠孝全者以金管書之德行精粹者用銀管書之文章贍麗者以斑竹管書之故湘東王之譽振於江表雪兒孝密或為孝齊之愛姬能歌舞每見賔僚文章有竒麗中意者即付雪兒叶音律以歌之又問癡龍出何處曰洛下有洞穴曾有人誤墜於其中因行數里漸明曠見有宫殿人物凡九處又有大羊羊髯有珠人取食之不知何所后出以問張華華曰此地仙九館也大羊名曰癡龍耳定辭復問郁巏嶅之山當在何處郁曰此隋郡之近事何謙遜而下問由是兩相恱服結交而去百斛明珠世傳王子敬帖有黃柑三百顆之語此帖乃在劉季孫家景文死不知今在誰家矣韋蘇州有言書後欲題三百顆洞庭須待滿林霜蓋蘇州亦見此帖也余亦嘗有詩與景文云君家子敬十六字氣壓鄴侯三萬籖劉季孫景文之子也慷慨竒士博學能詩僕薦之得隰州以殁哀哉嘗有詩寄僕曰四海共知霜鬢滿重陽能插菊花無死之日家無一錢但有書三萬軸畫四百幅耳退之詩曰百年未滿不得死且可勤買拋青春國史輔云酒有郢之冨水烏程之若下滎陽之土窟春冨平之石凍春劍南之燒春杜子美詩亦云聞道雲安麴米春裴鉶作傳竒記裴航事亦有酒名松醪春乃知唐人名酒多以春則拋青春亦必酒名也並同前太祖問趙普男尊女卑何故男跪而女不跪群臣無對者惟王貽孫曰古者男女皆跪至唐則天時始拜而不跪太祖曰何以為實貽孫曰古詩云長跪問故夫遂得振學譽玉壺清話雞鳴髙樹巔説題辭曰雞為精陽南方之象離為火精陽之象火陽精物炎上故陽出雞鳴以類感也古詞云犬吠深巷中雞鳴髙樹顛樂府集東飛百勞歌詩七月鳴鵙一曰勞鵙也東飛百勞西飛燕言其類不同而飛翔特異無因以相逐故其詩曰春巳暮花從風空留可憐與誰同滄海雀風土記六月東南長風海魚化為黃雀又禮記雀入大水化為蛤故荀昶黃雀詩云空城舊侣絶滄海故交分蘭若生春陽感時而思君子也若謂杜若亦香草名左思三都賦曰其草則有杜若蘅菊石蘭芷蕙棗下何纂纂潘安仁笙賦云輟張女之哀彈流廣陵之清散詠桃園之夭夭歌棗下之纂纂歌曰棗下纂纂朱實纍纍宛其落矣化為枯枝釋者謂之纂纂棗花也西園遊曹子建公宴詩云清夜逰西園飛蓋相追隨明月澄清影列宿正參差並同前京城街衢有金吾傳呼以禁夜行至正觀馬同上封事每街隅懸鼓夜擊鼓以止其行以備竊盜時人遂呼為􅕣􅕣鼓有道人裴修然雅有篇詠善書畫好酒嘗戲為詞遮莫􅕣􅕣鼓須傾滿滿杯金吾若相問報道玉山頽古今詩話青州隆興寺殿前廡下西邉有木臺臺上以架懸二小鼓相傳寺乃孟嘗君故宅鼓乃集賔客食鼓考究不然而鼓南壁上有詩一絶云千載遺蹤號鼓樓不知誰是雍門周區區此飯徒為爾唯有鳴雞可酬不題姓名亦不知何謂唐開元天寶間承平日久世尚輕微多愛三花飾馬郭若虛家藏貴戚閲馬啚中有三花馬蘇大參家有韓幹畫三花御馬晏元獻家藏一畫虢國出行圖亦有三花馬三花者剪鬃為三瓣白樂天詩云舞衣裁四葉馬鬛剪三花是也淮南蜀江者維揚之地也或曰勢連蜀土或以産茶味如蜀茶云自蜀江之南有竹西亭修竹踈翠后即禪智寺也竹西取杜牧之詩斜陽竹西路歌吹是揚州自蜀江以南景氣頓異北風至此遂絶鄴中銅駝鄉魏武帝立銅駝石犬各二古詩云石犬不可吠銅駝徒爾為吳宫有香水溪俗云西施浴處人呼為脂粉塘吳王宫人濯粧於此溪上源至今猶香古詩云安得香水泉濯郎襟上塵蘭溪自黃州麻城出東南流入大江有水極清冷杜牧之詩云蘭溪春盡碧泱泱是也磁湖鎮道士磯即西塞山也薛能詩有西塞長雲盡南湖片月斜正謂此處南湖臧質敗走南湖以荷自蔽即此地也彈棋今人罕為之有譜一卷蓋唐賢所為其局方二尺中心髙如覆盂其巔為小壺四角微起李商隱詩云玉作彈棋局中心最不平謂其中髙也樂天詩云彈棋局上事最妙是長斜謂抹角長斜一發過半局今譜中具有此法柳子厚敘用二十四棊者即此謂也神龍以來杏園燕後皆於慈恩寺塔下題名他時有將相則朱書之及第後知聞或遇未及第時題名字添前字故詩曰曾題名處添前字送出城人乞舊詩湘潭縣唐興寺有劉夢得撰儼禪師碑孟賔于鄭谷詩湘水似伊水湘人如故人之句乃此寺前江流也鸊鵜水鳥也其膏可以塗刀劍令不鏽爾雅注云膏玉瑩劍續英華詩云鳥㗸苜蓿葉劍瑩鸊鵜膏是也周禮四時變火春取榆柳之火夏取棗杏之火唐詩惟春取榆柳之火以賜近臣戚里之家故韓翃有曰日暮漢宫傳蠟燭青煙散入五侯家之句章聖嘗宴群臣于太清樓忽問市店酒有佳者否中貴人對唯南仁和酒佳亟令沽賜群臣又問近臣曰唐時酒每升價幾何無有對者唯丁晉公奏曰唐時酒每升三十錢章聖曰何以知之晉公曰臣嘗記杜甫詩曰速來相就飲一斗恰有三百青銅錢章聖大喜曰杜甫詩自可為一代之史禮部貢院試進士設香案于階前試官與舉人對拜此唐故事也列坐設位供帳亦盛乃具茶湯至於試學究則撤去㡩幕亦無茶湯渴則飲硯水皆黔其吻非固困之蓋防氈幕中藏文字供應人傳經義爾故事為之防歐陽文忠公詩云焚香答進士撤幕待經生並同前詩病門王靖學蘇子美作壯語曰欲往海上吞鯨鯢又近有士人好為怪語詩云比劉和尚小師畢逹尤卑劉貢父曰此乃番僧名號也又盧延遜吊陳亡將詩云自是碙砂發非干礉石傷牒多身上字碗大背邉瘡此乃打脊詩也如金同丁銀花合之類皆語忌爾作詩冝以為戒詩史詩有語病當避之劉子儀嘗贈人云惠和官尚小師逹祿須干全用故事取孟子所謂柳下惠不卑小官仲尼曰師也逹子張學干祿或有寫此二句減去官字示人曰是畨僧逹祿須干見者大笑此偶自諧合無如輕薄子非刀筆過也古今詩話蔡居厚詩史不言劉子儀而謂劉貢父以為畨僧名論語只有師也過逹恐是過字章孝標登第後寄淮南李紳相詩曰及第全勝十改官金湯鍍了出長安馬頭漸入揚州路為報時人洗眼看李答曰假金方用真金鍍若是真金不鍍金十載長安得第一何須空腹用髙心聖俞嘗云詩句義理雖通語涉淺俗而可笑者亦其病也如有贈漁父一聮云眼前不見市朝事耳畔唯聞風雨聲説者云病肝風如盡日覔不得有時還自來本謂詩之好句難得耳説者云此是人家失貓兒人以為笑歐公詩話進士黃可字不可深于雅道詩句中多好用驢字如獻高侍郎云天上傳將五馬賦門前迎得跨驢賔之類昵昵兒女語恩怨相爾汝劃然變軒昻勇士赴敵埸此退之聽頴琴詩歐陽文忠嘗問僕琴詩何者最佳余以此答之公言此詩最竒麗然自是聽琵琶詩非琴詩余退而作聽杭僧惟賢琴詩云大絃春溫和旦平小絃廉折亮以清平生不識宫與角但聽牛鳴盎中雉登木門前剝琢誰叩門山僧未間君勿嗔歸家且覔千斛水淨洗從前筝笛耳詩成欲寄公而薨至今以為恨紀詩邯鄲公周陵詩曰才及春髙鼎祚移舒王詩云春高鼎祚不成詩詩人貪求好句而理有不通亦語病也如袖中諌草朝天去頭上宫花侍宴歸誠為佳句矣但進諌必以章疏無用藁之理唐人有云姑蘇臺下寒山寺半夜鍾聲到客船説者亦云句則佳矣其如三更不是撞鍾時如賈島哭僧云寫留行道影焚却坐禪身時謂之燒殺活和尚此尤可笑若步隨青山影坐學白塔骨又獨行潭裏影數息樹邉身皆是島詩何精粗頓異歐陽詩話西頭供奉官錢昭度曾咏方池詩云東道主人心匠巧鑿開方石貯漣漪夜深却𬒳寒星映恰似仙翁一局棋有輕薄子見而笑曰此正謂一局黑全輸也遁齋間覽增修詩話總龜卷之二十八百家詩話總龜後集卷之二十八詠物門歐陽文忠公極賞林和靖踈影橫斜水清淺暗香浮動月黃昏之句而不知和靖别有詠梅一聮云雪後園林才半樹水邉籬落忽橫枝似勝前句不知文忠何緣棄此而賞彼文章大槩亦如女色好惡止繫于人苕溪漁隱曰王直方又愛和靖池水倒窺踈影動屋簷斜入一枝低以謂此句于前所稱真可處伯仲之間余觀此句略無佳處直方何為喜之真所謂一蟹不如一蟹也山谷為詩當飽參然後臭味乃同雖為大宗匠者亦然月觀橫枝之語乃何遜之妙處也自林和靖一參之後參之者甚多雪浪齊日記唐人牡丹詩云紅開西子粧樓曉翠揭麻姑水殿春若改春作秋全是蓮花詩林和靖梅花詩云踈影橫斜水清淺暗香浮動月黃昏近似野薔薇也陳輔之詩話凡詠梅多詠白而荆公詩獨云鬚撚黃金危𣣔墮蒂團紅臘巧能粧不惟造語巧麗可謂能道人不到處矣又東坡詠梅一句云竹外一枝斜更好語雖平易然頗得梅之幽獨間靜之趣凡詩之詠物雖平淡巧麗不同要能以隨意造語為主公後復有詩云遙知不是雪為肯暗香耒蓋取蘇子卿云只言花似雪不悟暗香來之意公在金陵又有和徐仲顰文字韻梅詩二首東坡在嶺南有暾字韻梅詩三首皆韻險而語工非大手筆不能到也遁齊間覽馹使前時走馬回北人初識越人梅清香莫把酴醾比只欠溪邉月下杯此梅二丈京師逄賣梅花絶句吾隨後輩猶及與之周旋覽其親書如見其抵掌談笑也東坡韓持國雖剛果特立風莭凛然而情致風流絶出時輩許昌崔象之侍郎舊第今為杜君章所有庍後小亭僅丈餘有海棠兩株持國每花開輒載酒日飲其下竟謝而去歲以為常至今故吏猶能言之余嘗于小亭柱間得公二絶句其一云濯錦江頭千萬枝當年未解惜芳菲而今得向君家見不怕春寒雨􅊜衣尚可想見當時氣味韓忠獻公嘗帥蜀持國兄弟皆侍行尚少故前句云爾其二云長條無風亦自動柔艷著雨更相冝漫其後句苕溪漁隱曰鄭谷海棠詩云穠麗最冝新著雨妖嬈全在𣣔開時前輩以謂此兩句説盡海棠好處今持國柔艷著雨更相冝之句乃用鄭谷語也至于東坡作此詩則詞格超逸不復蹈襲前人其詩有媯然一笑竹籬間桃李漫山捴粗俗自然冨貴出天姿不待金􅐻薦華屋朱唇得酒暈生臉翠袖卷紗紅映肉林深霧暗曉光遲日暖風輕春睡足雨中有泪亦悽愴月下無人更清淑元豐間東坡謫黃州寓定惠院院之東小山上有海棠一株特繁茂每歲盛開時必為携客置酒巳五醉其下矣故作此長萹平生喜為人寫蓋人間刋石者自有五六本云軾平生得意詩也石林詩話隱居詩話云吕士隆知宣州好以事笞官妓妓皆𣣔逃去而也會杭州有一妓到宣其色藝可取士隆喜之留之使不去一日郡妓復犯小過士隆又欲笞之妓泣訴曰某不敢辭罪但恐杭妓不能安也士隆愍而捨之聖俞因作莫打鴨一萹曰莫打鴨打鴨驚鴛鴦鴛鴦新向池北落不比孤洲老秃鶬秃鶬尚𣣔逺飛去何况鴛鴦羽翼長蓋謂此也詠物詩不待分明説盡只倣佛形容便見妙處如魯直酴醿詩云露􅊜何郎試湯餅日烘荀令炷爐香義山雨詩云摵摵度瓜園依依傍水軒此不待説雨自然知是雨也後來魯直無巳諸人多用此體吕氏童蒙訓苕溪漁隱曰裴璘詠白牡丹詩云長安豪貴惜春殘爭賞先開紫牡丹别有玉杯承露冷無人起就月中看時稱絶唱以余觀之語句凡近不若胡武平詠白牡丹詩云璧堂月冷難成寐翠幄風多不奈寒其語意清勝過裴璘逺矣如皮日休詠白蓮詩云無情有恨何人見月冷風清𣣔墮時若移作詠白牡丹詩有何不可深更清切耳曼卿詠小桃二絶句云生色深紅綬帶長宫簾寒在井欄香母家升上瑶池品先得春風一面粧本分桃花寒食前小桃長是上春天二喬二趙俱傾國女弟嬌強意自先其模寫命意豈不佳哉王直方詩話云或有稱詠松句云影搖千尺龍蛇動聲撼半天風雨寒者一僧在坐曰未若雲影亂鋪地濤聲寒在空或以語聖俞聖俞曰言蕳而意不遺當以僧語為優百家詩話總龜後集卷之二十八
