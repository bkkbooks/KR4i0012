front:
  text: 增修詩話總龜卷之一甲集
  hash: sha256:efc9609a477a9bd931f5098c8cb7a56c76870bae174c63d3494bd357f7a6b4d6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_001-1a}
body:
  text: 龍舒散翁阮一閲宏休編皇明宗室月窗道人刋鄱陽亭梧程珖舜用校聖製太宗好文進士及苐賜文喜宴常作詩贈之景祐朝因以為故事仁宗在位四十二年賜詩尤多然不必盡上所作景祐元年賜詩落句云寒儒逢景運報德合如何論者謂質厚宏壯真詔旨也貢父詩話李文正昉太祖在周朝巳知其姓及即位用以為相嘗語文正曰卿在周朝未曽傾陷人可謂善人君子故太宗遇之亦厚年老罷相每內宴必先赴坐嘗獻詩曰微臣自愧頭如雪也向鈞天侍玉皇太宗和之以賜曰珍重老臣純不已我慚寡昧繼三皇為時之美傳青箱雜記又談苑玉壺清話皆謂扈蒙應制吕正惠端太宗朝為參知政事多獨對便殿語必移刻因宴後苑上釣魚詩斷句云欲餌金鉤殊未逹磻溪須問釣魚人意巳屬公矣公和詩進曰愚臣鉤直難堪用冝用濠梁結網人不數日拜平章事詩史又古今詩話謂正惠巳作户部侍郎平章事時吕文穆蒙正告老甚切因此詩遂冠台席福唐蔡伯禧四歲對真宗誦書授校書郎春宫伴讀齒猶未三周故曰三歲神童賜之詩曰七閩山水多才俊三歲竒童出盛時家世應傳清白訓嬰兒自得老成資初嘗學步來朝謁方及能言解誦詩更勵孜孜圖進益青雲千里有前期續歸田録蘇易簡在翰林太宗一日召對賜酒甚歡暢曰君臣千載遇蘇應聲曰忠孝一生心太宗大恱以所御金器盡席賜之掇遺夏侯嘉正好爐火仍以不得兩制為恨太宗御樓觀燈進詩十韻末句云兩制誠堪羡青雲侍玉輿太宗和賜曰薄德終難舉通才例上居嘉正嘗曰使我得水銀半兩知制誥一日平生足矣二願俱不遂而卒玉壷清話李廷臣官于瓊館有夷人携錦臂絛上織成一聮云恩𫀆草色動仙籍桂香浮乃仁廟朝賜進士及第舉人詩也廷臣以千金易之藏為珍寶青瑣集忠義張巡守睢陽明皇已幸蜀胡羯方熾城孤勢促人食竭以𥿄布切煮而食之時以茶汁和食而意自如其謝金吾將軍表曰想峨眉之碧峰逰豫西蜀追緑耳于元圃保夀南山逆賊祿山戮殺黎獻膻腥闕廷臣𬒳圍四十九日凡三千二百餘戰主辱臣死乃臣致命之時惡稔罪盈是賊滅亡之日忠勇如此激厲壯士嘗賦詩曰接戰春來苦孤城日漸危合圖侔月暈分守效魚麗屢厭黃塵起時將白羽揮褁瘡猶出陳飲血更登陴忠信應難敵堅誠自不移無人報天子心計欲何施又夜聞笛曰岧嶤試一臨虜騎附城隂不辨風塵色安知天地心營開星月近戰苦陳雲深旦夕更樓上遙聞橫笛聲有宋佳話趙師旦潛叔皇祐中守康州儂賊犯城死于是士大夫作詩者衆而元厚之李擇思中詩最佳元詩云轉戰譙門日再晡空拳由自冒戈殳身垂虎口方安坐命棄鴻毛更疾呼柱下杲卿存斷節袴間杵臼得遺孤可憐三尺英雄氣不愧西山士大夫李詩云賊壯兵孤衆膽驚忠臣此日見專城負君罪大寧如死守土城堅不問生報國存心惟自愧呼天壯氣幾時平潺湲多少英雄淚千古封江不斷聲雲齋廣録王維字摩詰天寶末祿山陷兩京明皇出幸維扈從不及為賊所得維服藥取利偽稱瘖病祿山素憐之遣人迎置洛陽拘于普施寺迫以偽命祿山宴其徒於凝碧宫其樂乃梨園弟子教坊工人維聞之悲惻潛為詩曰萬戶傷心生野煙百官何日再朝天秋槐花落空宫裏凝碧池頭奏管絃賊平陷賊官者三等定罪維以凝碧詩聞于行在肅宗嘉之特宥之授太子中允劉約拾遺晉天福三年與戎和晉祖曰當遣輔相為使趙瑩桑維翰同堂皆未言以戎雖通好而反覆難測咸懼于將命馮道與諸公中書食訖分廳堂吏前白道言北使事吏人色變手顫道索𥿄一幅書云道去即遣寫勑屬吏泣下道遣人語妻子不復歸家舍都亭驛不數日即行晉祖餞語以家國之故煩耆德使逺自酌巵酒飲之虜以道有重名欲留之命與其國相同列所賜皆等戎賜臣下以牙笏及臘月賜牛頭皆為殊禮道皆得之以詩謝云牛頭偏得賜象笏更容持戎甚喜潛諭留之道曰兩朝皆臣豈有分别賜悉市薪炭云北地寒老年不堪及還京師作詩五章以述北使之意其首章云去年今日奉皇華只為朝廷不為家殿上一杯天子泣門前雙節國人嗟龍荒冬往時時雪兔苑春歸處處花上下一行如骨肉幾人身死掩風沙虜中大寒賜錦襖貂襖羊狐貂衾各一每入謁悉服四襖衣宿館中併覆三衾詩曰朝披四襖專藏手夜蓋三衾怕露頭叢苑劉吉江左人有膂力尚氣事李煜為傳詔承旨以忠于所奉歸朝供奉官以知河渠利害委以八作務太平興國中河大決吉護之與工夫同甘苦使者至訪吉不獲甚怒乃著皂短布褐獨負二囊土為先導從吏無敢言使者密訪得之歸奏仁宗厚賜之內侍石全振領河堤甚苛急自謂石爆裂嘗侮吉吉不與校一日吉乘小艇督役至中流語石曰公恃貴近見凌甚不畏死當與公同見河伯遂蕩舟覆之全振乞命號泣乃止不復敢侵吉吉本燕薊人自受李氏恩常分祿以濟其子孫朔望必拜李煜真雖童幼必拜之執臣僚之禮後為崇儀使其刺字謁吳中親舊題僧寺驛亭皆自稱以南人不忘本也有詩三百首目為釣鰲集徐鉉為序其首篇隱者詩曰一箭不中鵠五湖歸釣魚人多誦之以塞河有方略人目為劉跋河名震河上同前諷諭門太平興國中李繼遷以西夏叛朝廷興師剪伐逮十年餘至咸平末猖獗愈盛寇陷邊境章聖以西民疲於輸挽有厭兵之意而無名以罷師伐議者益紛紜未決事固祕密未聞於外處士种放山中有詩云胡雛負恩信聖主耻干戈章聖聞之歎美且愜素志即遣使齎詔召至授左司諌直昭文館會景德初邊臣奏李繼遷死其子阿移即德眀也願納欵遂罷兵放隱終南山纍詔不起至拜官復歸終于工部侍郎志逸淳化中合州貢桃花犬甚小而性急常馴擾于御榻之側每坐朝犬必掉尾先吠人乃肅然太宗不豫此犬不食及上仙號呼涕泗瘦瘠章聖初即位左右引令前導鳴吠徘徊意若不忍章聖令諭以奉陵即搖尾飲食如故詔造大鐡籠施素禋置鹵簿中行路見者流涕李至作桃花犬歌以寄史官錢若水末句云白麟赤鳯且勿喜願君書此懲浮俗古今詩話章聖幸汾隂回望林嶺間亭檻幽絶意非民俗所居時魏野方教鶴舞俄報有中使至抱琴踰垣而走後寇萊公鎮洛凡三邀不至萊公暇日寫刺訪之野服葛巾布𫀆長揖萊公禮甚平簡頃之議論騷雅相得甚歡將别謂萊公曰盛刺不復還留為山家之寶萊公再秉釣軸野常遊門下顧遇之禮優異等倫一日獻詩曰好去上天辭冨貴却來平地作神仙萊公得詩不恱自是禮日益薄即辭去後二年貶道州每題前詩于窗朝夕吟哦之王文正公旦在中書僅二十年魏野贈詩曰聖朝宰相年年出公在中書十四秋西祀東封今已畢可能來伴赤松逰公袖書以進纍表求退不許青箱雜録别本云昔時宰相年年出公在中書十一秋西祀東封俱已了如今好逐赤松逰治平中有吉州吉水令忘其姓名治邑嚴酷有野人馬道為啄木詩諷之曰翠翎迎日動紅觜響煙蘿不顧泥丸及唯貪得食多才離枯朽木又上最高柯吳楚園林闊忙忙爭奈何令見其詩稍緩刑時人目曰馬啄木翰府名談蔡君謨守福唐政尚嚴肅陳烈先生過福唐維舟溪亭留詩於亭上曰溪山龍虎蟠溪水鼓角喧中宵鄉夢破六月夜衾寒風雨生殘木蛟螭喜怒瀾殷勤告舟子放棹過前灘亭吏録以呈公公遽令追之巳不及矣公自此為之少霽威眀同前范希文有贈釣者詩曰江上往來人盡愛鱸魚美君看一葉舟出沒風濤裏觀競渡詩曰小艇破濤去旁觀亦損神他年在平地無忽險中人皆不徒作也同前冝春王從謙李璟之第九子好學善為詩璟于苑中與宰相奕棋從謙在焉令賦觀棋詩曰竹林二君子盡日意沉吟相對雖無語爭先各有心恃強知易失守分固難侵若算機籌處滄溟想未深楊玢靖夫虞卿之曽孫也仕偽蜀王建至顯官隨王衍歸後以老得工部尚書致仕歸長安舊居多為鄰里侵占子弟欲詣府訴其事以狀白玢玢批𥿄尾云四鄰侵我我從伊畢竟須思未有時試上含元殿基望秋風禾黍正離離子弟不復敢言談苑舒王得請金陵門下有人賣魚一日放魚有門生獻詩云直須自向池邊看今日誰非鄭校人公誦久之詩史蔣貽恭蠶詩云辛勤得繭不盈筐燈下繅絲恨更長著處不知來處苦但貪身上繡衣裳古今詩話華山鄭雲叟有傷時一絶云帆力劈開滄海浪馬蹄踏盡亂山青浮名浮利濃如酒醉得人心死不醒又贈霍山秦道士云老鴉啼猿伴採芝有時長嘆獨移時翠蛾紅粉嬋娟劍殺盡世人人不知同前宋齊丘江南二世為宰相璟尤愛其才然知其不正一日於華林園試小妓羯鼓召齊丘同宴齊丘獻詩曰切斷牙床鏤紫金最冝平穩玉糟深因逢淑景開佳宴為出花奴奏雅音掌底輕璁孤鶴噪枝頭乾快亂蟬吟開元天子曾如此今日將軍好用心同前唐李日知為黃門侍郎安樂公主池館新成中宗臨幸從官預宴賦詩日知尤存規戒其卒篇云所願暫思居者佚莫使時稱作者勞盧汪門族甲於天下舉進士二十上不第為一絶云惆悵興亡係綺羅世人猶自選青娥越王解破夫差國一箇西施已是多同前范文正公言徑節知無不言仁廟朝數出外輔梅聖俞作啄木詩以見意曰啄盡林中蠧未肯出林飛不識黃金彈雙翎墮落暉同前夏英公慶曆中欲真拜以言者罷除使相知南京到任以二詩寄執政云造化平分荷大鈞腰間新佩玉琪璘南湖不住栽桃李擬狎沙鷗過十春海鴈橋邊春水深略無塵土到花隂忘機不取人知否自有江鷗信此心復徙西都張忭知諌院作青雀詩寄之曰弱羽傷弓尚未完孤飛誰敢擬鴛鸞眀珠自有千金價莫為逰人作彈丸升卒不敢言及之同前于濆為詩頗干教化對花詩云花開蝶滿枝花謝蝶還希惟有舊巢燕主人貧亦歸又有唐備者與濆同聲咸多比諷有詩曰天若無雪霜青松不如草地若無山川何人重平道題道傍木云狂風拔倒樹樹倒根已露上有數枝藤青青猶未悟又曰一日天無風四溟波盡息人心風不吹波浪髙百尺盧瓌抒情西京端正木去馬嵬一驛德宗幸奉天觀其蔽地錫以美名後有文士題之曰昔日偏霑雨露恩德皇西幸賜佳名馬嵬此去無多地好向楊妃冢上生同前羅鄴工詩春逰欎然有懷云芳草如煙處處青間門要地一時生年來撿點人間事惟有春風不世情春雨詩云兼風颯颯灑皇州能帶輕寒阻勝逰昨夜五侯池館裏佳人驚覺為花愁同前僖宗幸蜀詞人題於馬嵬驛云馬嵬煙柳正依依重見鑾輿幸蜀歸泉下阿蠻應有語這回休更泥楊妃或云狄侍郎歸昌詩同前鑑戒録云是羅隱詩盧常侍鈺牧廬江日郡職曹先生恱營妓丹霞者盧沮不許會餞客短亭曹獻詩曰拜玉亭間送客忙此時孤恨感離鄉尋思往嵗絶纓事肯向朱門泣夜長盧演為長句和而勉之曰桑扈交飛百舌忙祖亭聞樂倍思鄉樽前有恨慚卑宦席上無憀愛艷粧莫為狂花迷眼界須求真理定心王逰蜂採掇何時巳秪恐多言議短長盧懷抒情李羽能詩五十方擢苐嘗獻江淮郡守詩曰塞詔東來淝水濵時情惟望秉陶鈞將軍一陳為功業忍見沙場百戰人蓋郡守盧公一舉及第南唐近事景祐中羌人叛西方用兵朝廷永草澤遺逸士多獻方略自衒鬻率皆得官其下材無能往往過望亦有挾持頡頏觖望不服者嘗有人題關西驛舍為詩曰孤星熒熒照寒野漢馬蕭蕭五陵下廟堂不肯用竒謀天下徒勞聘賢者萬里危機入燕薊八方殺氣衝靈夏逢時還似不逢時已矣吾生真苟且東齋録汪自能為文章有平糶詞詩意高古刺譏中時病云穴垣補墻缺墻成垣已隳斷屨穿履完屨亦虧汪氏宦不逹其他著述不甚留傳唐文宗曰嘗觀晉君臣以夷曠致傾覆當時卿大夫過耶李石曰然古詩有之人生不滿百常懷千歲憂畏不逢也晝短苦夜長暗時多也何不秉燭逰勸之照也臣願捐軀命濟國家惟陛下鑑照不惑則安人強國其庶幾乎鑑誡録余在黃州與陳慥季常往來每過往之際輒作泣字韻詩一篇季常不禁殺故以此諷之季常既不復殺而里中皆化之至有不食肉者皆云未死神已泣此語使人悽然百斛明珠盧承丘長沙人披褐居吳芙蓉山常著文為芙蓉集作落韻詩雖一時諷罵聞者亦可為戒題花鈿云傳粉銷金剪翠霞黛煙濃處貼鉛茟也知曽伴姮娥笑將來村裏賣誰家又題渡頭船云刳木功成濟往還古溪殘照下前山看看向晚人來少猶自須來覔見錢年八十卒於所居雅言系迷東坡云在潁時陳無巳趙德麟輩適亦守官於彼而歐陽叔弼與季默亦又居間日相唱和而二歐頗不作詩東坡以句挑之云君家文律冠西京旋築詩壇按酒兵袖手莫欺真將種致師須得老門生明朝鄭伯降誰受昨夜條侯壁已驚從此醉翁天下樂還須一舉百觴傾蓋為文忠公昔有詩贈梅聖俞蘇子美云我亦願助勇鼓旗噪其旁快哉天下樂一嚼冝百觴也王直方詩話景祐中華州張源作絶句云太公年登八十餘文王一見便同車如今若向江邊釣也𬒳官中配看魚吟此詩畢入夏州其後元昊反關中有兵者六七年不解源作是詩以叛去亦足為戒東齋録李清臣北都人方束髮則才俊詞句驚人一日薄逰鄭州時韓公為帥因往見其大祝吏報曰大祝方寢遂求筆為詩一絶書于刺授其吏曰大祝覺則投之詩云公子乘間卧綵厨白衣老吏慢寒儒不知夢見周公否曾説當年吐哺無青瑣集聶夷中公子詩云種花於西園花發青樓道花下一禾生去之為惡草有三百篇之旨章子厚謫雷州過小貴州南山寺有僧奉忠子厚見之已而倚檻看層雲曰雲多竒峰真善比類忠曰曾記夏雲詩甚竒曰如風如火復如綿飛過微隂落檻前大地生靈乾欲死不成霖雨謾遮天太祖問罪江南李後主用謀臣計欲拒王師法眼禪師觀牡丹於大內作偈諷曰擁毳對芳叢由來趣不同髮從今日白花是去年紅艷曵隨朝露馨香逐晚風何須待零落然後始知空後主不省王師渡江增修詩話總龜卷之一百家詩話總龜後集卷之一巳集龍舒散翁阮一閲宏休編皇明宗室月窗道人刋鄱陽亭梧程珖舜用校御製王師圍金陵唐使徐鉉來朝鉉伐其能𣣔以口舌解圍謂盛稱其主慱學多藝有聖人之能使誦其詩曰秋月之篇天下誦傳之其句云云太祖大笑曰寒士語耳吾不道也鉉內不服謂大言無實可窮也以請殿上驚懼相目太祖曰吾微時自秦中歸道華醉卧田間覺而月出有句曰未離海底千山黑才到天中萬國明鉉大驚殿上稱夀後山詩話故事進士期集常擇榜中最年少者為探花郎熙寧中始罷之太平興國三年胡祕監旦榜馮文懿拯為探花是歲登第七十四人太宗以詩賜之曰二三千客裏成事七十四人中少年始唐以禮部放榜故座主門生之札特盛主司因得竊市私恩上稍欲革其弊既更廷試前一歲吕文穆公蒙正為狀頭始賜以詩蓋示以優寵之意至是復賜文懿然狀頭詩迄今詩有探花詩後無繼者惟文懿一人而巳最為科舉之盛事也蔡寬夫詩話太平興國七年十二月十七日大雪御製雪詩并酒賜學士詩云輕輕相亜凝如酥宫樹花粧萬萬株今賜酒卿時一盞玉堂聞話道情無又御製五七言詩賜蘇易簡五言詩曰翰林承旨貴清淨主堂中應用咸依式深岩比更崇歸家思值日入內集英風儒措門生盛髙明大化雄七言詩曰運偶昌時逺更深果然榖在我中心從風臣偃光朝野此日清華見翰林舉措樂時周禮法思賢教古善規針少年學士文明世一寸賢毫數萬尋金坡遺事石林詩話楊文公在翰林去聀真宗眷之不衰即起為郡未幾復以判祕書監召既到闕以詩賜之曰瑣闥往年司制誥共嘉藻思類相如蓬山昔日詮墳史還仰夛聞過仲舒報政列城歸覲後疏恩髙閣拜官𥘉諸生濟濟彌瞻望鉛槧咨詢辨魯魚祖宗愛惜人才保全忠孝之意如此䂬溪大中祥符五年楊億為學士季夏𬒳疾至十月方赴朝參具狀稱謝御筆狀尾批七言二韻詩賜之詩云承明邇侍究儒玄苦學勞心疾巳痊善保興居調飲食副豫前席待名賢金坡遺事大中祥符二年春真宗御製詩賜知貢舉朝逈云禮闈選士古稱難都為升沉咫尺間較藝清時公道在掄材應得惠人寰五年二月又製詩賜知貢夆朝逈云盛時選士貢闈開殿宇聞風獻藝來心似權衡求實效勿教蓬蓽有遺才同上天禧三年正月九日錢惟演承明殿面奉知舉真宗御製詩并序云卜賢能之多士允協盛猷資從之洪儒書伸藻鑑期申聀業用示篇章詩云寅奉昌圗紹慶基選倫多士叶前規鄉閭薦拔期無濫草澤搜羅詎有遺德舉况逄全盛日計偕咸造廣埸時春官任聀當求善宗伯掄材務得冝侍從名儒當委任藝文公道辨妍媸佇伸衡鑑裁深念允協菁莪樂育詩金波遺事二月十八日將放文賜詩并序序云詳延造士允叶于盛猷乃眷儒臣式分於重寄論秀才臻于顯效當官偹著於純誠詩云四海為家寶緒隆旁求文雅振儒風命鄉隨計來多士軗藝掄材有澤宫簮紱近臣當顯任絲綸深旨論丹衷旰霄汲汲豫存念夙夜孜孜爾徇公名實豈惟衡鑑內賢能皆萃網羅中佇觀翹楚登時用布政分憂協庶功同上真宗賦御溝柳詩令宰相兩省和進陳執中詩曰一度春來一度新翠光長得照龍津君王自愛天然態恨殺昭陽學舞人其詩最尤者西朝寶訓神宗遵太祖遺意聚積金帛成帑自製四言詩一章云五季失圗獫狁孔熾藝祖造邦意有懲艾爰設內府基以募士曽孫保之敢忘厥志每庫以一字目之又别置詩二十字分揭其上曰每虔夕惕心妄意遵遺業豫不武資何以成戎捷後來所謂御前封椿庫者也上意用此以為開柘西北境土之資始命王韶克青唐然後欲經理銀夏復取燕雲元豐五年徐禧永洛衄師之後帝心弛矣林宓𥙿陵遺事云前輩云詩有奪胎換骨之説信有之也杜陵謁玄元廟其一聮云五聖聮龍衮秋風折鴈行亦以鴈行對龍衮然語中的其親切過於夲詩兹不謂之奪胎可乎不然則徒用前人之語珠不足貴且如沈佺期云小池殘暑退髙樹早􅋽歸非不佳也然正用柳惲太液微波起長楊髙樹秋之句耳蘇子云峽束滄淵深貯月巖排紅樹巧粧秋非不佳也然正用杜陵峽束滄江起岩排石樹圓之句耳語雖工而無別也藝苑雌黃光堯𥘉幸錢塘有詩云六龍轉淮海萬騎臨吳津王者本無外駕言蘇逺民瞻彼草木秀感此瘡痍新登堂望稽山懷哉大禹勤大哉之言布於天下漢祖大風之歌唐宗徑草之句不足道也詩説雋永賡歌門東萊恭和皇帝幸祕書詩麟閣龍旗日月章中興再見赭𫀆光仰觀焜耀人文盛始識扶持德意長功利從今卑𬋩晏浮華自昔陋盧王願求實學酬天造肯效明河織女襄文集御燕門嘉祐七年冬宴近臣于群玉殿英宗以皇子預坐在舍人待制之後岐公詩云翠輦生香容扈蹕黃金塗𥿄看揮毫介甫云何不言翠玉裝輿岐公改之以進復齋謾録神廟時經月每夕有赤氣見西北隅如火至人㝎乃滅人以為皇子生之祥故禹玉作大燕樂詞云未曉清風生殿閣經旬赤氣照乾坤未幾皇子生大燕群臣于集英殿文正公日録榮遇門蘇參政易簡取開封解時宋尚書白為試官是歲狀頭登第後十年白為翰林學士易簡以繼召入故易簡贈白詩云天子昔取士先後分媸妍濟濟俊兼秀師師鱗與鵉小子最承知同輩尋改觀甲等叨薦名髙飛便凌煙遂使拜扆坐果得超神仙迄今才七歲相接乘華軒慶曆二年歐陽文忠公為别頭試官王文恭公預薦至嘉祐𥘉文忠在北門文恭亦同院仍同知貢舉故文恭詩有十五年前門下客最榮今日預東堂之句座主門生同列固儒者盛事而玉堂尤天下文學之極選國朝以來惟此二人前此所未有也蔡寬夫詩話嘉祐二年余與端明韓子華翰長王禹玉侍讀范景仁龍圗梅公儀同知禮部貢舉辟梅聖俞為小試官凡鎖院五十日六人者相與唱和為古律歌詩一百七十餘萹集為三卷禹玉余為校理時武成王廟所解進士也至此新入翰林與余同院又同知貢舉故禹玉贈余云十五年前出門下最榮今日預東堂余答云昔時叨出武成宫曽看揮毫氣吐虹夢寐間思十年事笑談今日一樽同喜君新賜黃金帶顧我今為白髮翁也天聖中余舉進士國學南省皆忝第一人薦名其後景仁相繼亦然故景仁贈余云淡墨題名第一人孤生何幸繼前塵也聖俞自天聖中與為詩友余嘗贈云猶喜共量天下士亦勝東野亦勝韓而子華筆力豪贍公儀文思溫雅而敏捷皆勍敵也前此有南省試官者多窘束條制不少放懷余六人者􅌚然相得群居終日長篇險韻衆製交作筆吏疲于寫録僮史奔走往來間以滑稽嘲謔加於風刺更相酬酢往往哄堂絶倒自謂一時盛事此前未之有也歸田録百家詩話總龜後集卷之一
