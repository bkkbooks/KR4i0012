body:
  text: 陶嶽零陵總記畢田湘中故事曹衍湖湘故事韓魏公别録趙璘因話録李康靖見聞録吳感大定録搜神祕覽胡戢泗上傳金華瀛洲録盧氏雜説南部新書唐李石别傳江鄰幾雜志劉約拾遺明皇雜記雍洛靈異記盧瓌杼情鄭棨開元傳信記洛陽縉紳舊聞大業拾遺記王幾通勉志廣卓異記西安虞介唐宋遺史歐陽靖掇遺宋舍人春明退朝録東觀奏事蔡寬夫詩史金陵語録張固幽間鼓吹劉禹錫佳話御史臺記錢思公逢辰録啓顔録談藪國史雜記文瑩玉壺清話張靚雅言雜載王舉雅言系述劉忠叟樂府集錢公思金坡餘事世説野人間話張鷟朝野僉載鑑誡録洛陽舊聞間居詩話范內翰東齋録唐史拾遺柳公權小説舊聞有宋佳話劉斧翰府名談錢希白洞微志王子年拾遺記趙叔平見聞録靈異録沈汾續仙傳朱定國續歸田録博異志鄭工部南唐近事盧肇遺史郡閣雅談桂堂間話曾龍圖詩話洛陽詩話楊妃外傳古今詩話劉貢父詩話驅陽公詩話玉堂間話脞説後集張君房脞説北夢瑣言青瑣後集龍衮江南野録李元文雲齋廣録桂苑藂談周後人托言葛稚川西京雜記范攄雲溪友議楊文公談苑孟棨本事詩文瑩湘山野録吳處厚青箱雜記沈存中筆談劉斧托遺倦逰録太平廣記幽怪録青瑣集異聞集百斛明珠王直方詩話遁齋間覽玉局文雜志紀詩大唐記志逸冷齋夜話䂬溪詩話集一百家詩話總目增修詩話總龜分門目録第一卷聖製忠義諷諭第二卷達理博識幼敏第三卷志氣知遇狂放第四卷詩進稱賞第五卷自薦投獻評論第六卷評論二第七卷評論三第八卷評論四第九卷評論五第十卷雅什上第十一卷雅什下苦吟第十二卷警句上第十三卷警句中第十四卷警句下第十五卷留題上第十六卷留題下宴逰第二十三卷寓情第二十四卷感事上第二十五卷感事下第二十六卷寄贈上第二十七卷書事第二十八卷故事詩病第二十九卷詩纍正訛第三十卷道僧第三十一卷詩讖上第三十二卷詩讖下第三十三卷紀夢上第三十四卷紀夢下第三十五卷譏誚上第三十六卷譏誚中第三十七卷譏誚下第三十八卷恢諧上第三十九卷恢諧下第四十卷樂府第四十一卷送别第四十二卷怨嗟第四十三卷傷悼第四十四卷隱逸神仙上第四十五卷神仙下第四十六卷藝術俳優竒怪上第四十七卷竒怪下鬼神上第四十八卷鬼神下佞媚琢句增修詩話總龜分門目録終詩話總龜敘詩昉關雎詩話即稗官野史之類自王迹熄而詩䆮微變至于漢魏極于盛唐其遺韻餘音直將與宇宙間山川為流峙也漢藝文志注稗為細糲王者𣣔知閭巷細瑣之言故立稗官關繫殆亦不小淮伯王月肉嗜古學文其志慕東平河間而𣣔相揖遜于異代者宫睱乃取阮子詩話總龜延庠生程珖校讐之命工刋布致言于豫以敘諸首豫披而閲之詩之有話言有繇也詩話以總龜名言有統也龜千年五聚問無不知賀知章昔以為殷踐猷慱學之號阮子之詩話其殆謂慱而足以資問者歟阮子舊集頗雜王條而約之彚次有義棼結可尋首觀其聖製等篇破魯恭之壁科斗錯陳也次觀其咏物等目浴玉池之日百寶爭出也又次觀其藝術紀實諸例發驪山之塜而彛鼎纍纍也終而觀其讖夢鬼神諸簡燃牛渚之犀而幽怪又無以遁其形也夫殷之博以韻學而成名阮之博蓋勤諸詩與緒言而有得者王約其慱合二家而一之又不可以徒事于慱語者其何以見之哉見之于凡例矣是則可嘉也是為序賜進士第中憲大夫奉敕整飾山東海道副使郴陽李易書詩話總龜序白川子負譴嬰疾分牧芝城居常怏怏弗樂也乃月窗殿下時時遣貴侍覘之間授二册曰是為詩話總龜是為宋阮一閲所編是為今程子珖所校是將夀諸文梓期與好事者共先生能無言乎余拜而受之枕次快閲曰佳哉月窗其披寶藏而璆琳琅玕畢集吾目邪其展武庫而戈矛劒戟震駭我心邪其過陶朱猗頓之室百物充溢足以拯急而切需者邪是冨且竒也夫詩胡為者也宣鬱逹情擷菁登碩者也夫話胡為者也摘英指纇標理斥迷者也考諸三代而下春秋列國以上載諸經雜出乎詞宗孺婦之口可徴巳嗣是以來作者非一家不能指而數也議者非一喙不能群而聽也譬之鳯毛豹斑非不文彩炫耀望者興歎有遺恨焉蓋未獲總其龜耳今月窗乃能逸塵逺覽訂古凖今與二三博雅君子冥羅約採彚為全書書有門示别也有纇示同也有序示次也若有勸有規有慨有慕有願學之意則皆置之不言之表而亦昭昭然灼灼然無言而無弗言孔子曰其義則某竊取之矣佳哉月窗之用心也昔河間以禮樂名東平以樂善著咸垂光汗青馨香帝胄至求述作槩乎未之前聞月窗孝友不凡文藝雋拔而又啫好清絶如此方之二王得無過乎是書也我國家宗室之盛皇上風化之隆賢士夫裁正之略並可仰見刻之冝書凡九十八卷月窗為我高皇六世孫程珖修學楚楚郡慱弟子員番陽人嘉靖甲辰孟秋奉直大夫江西饒州府同知前進士南京刑部郎中海鹽白川張嘉秀撰百家詩話總龜後集目録後山詩話蔡寬夫詩話金坡遺事石林詩話黃常明詩話藝苑雌黃詩話雋永東萊文集復齋録歸田録文正公目録韻語陽秋東軒筆録緗素雜記葛常之詩話西清詩話桐江詩話丹陽集閩川名士傳聞見録談苑高齋詩話胡氏詩話許彥周詩話擊壤集法藏碎金上蔡語録橫渠集龜山語録南山文集晦庵詩集吕氏家墩記易學辨惑漫叟詩話學林新編侯鯖録雪浪齋日記王直方詩話宋子京筆記杜詩正異詩眼山谷集東坡集言行録澠水燕談正蒙書迂叟詩話吕氏童蒙訓冷齋夜話隱居詩話三山語録臨川集揮塵録林和集語録倦遊雜録陳輔之詩話遁齋間覽文昌雜録三山老人語録東齋記事唐子西記南遊集劉禹錫嘉話東皋雜録夷堅志上庠録古今詞話夷白堂小集侍兒小名録阮户部詩髙道傳異聞録龍川略志回仙録今是堂手録東觀餘論太平廣記昭君圖敘雲齋廣録江角録植萱録洪駒父詩話僧寶傳傳燈録山谷王梵志麈史詩説集古録記雪竇語録陳了齋集唐語林青瑣集寄齋録四六談麈金石録樂府解題元城語録程氏遺書淮海集六朝事迹百家詩話總龜後集目録百家詩話總龜後集門類聖製門一卷賡歌門一卷御燕門一卷榮遇門一卷忠義門二卷孝義門三卷孝義門四卷宗族門四卷仁愛門五卷友義門五卷幼敏門五卷志氣門五卷述志門五卷求意門五卷諷諭門六卷逹理門六卷逹理門七卷傳識門八卷狂放門九卷稱賞門九卷稱薦門九卷投獻門九卷評論門九卷評論門十卷評論門十一卷評論門十二卷評論門十三卷評史門十四卷評史門十五卷評史門十六卷評史門十七卷辨疑門十八卷正訛門十八卷隱逸門十九卷恬退門十九卷警句門二十卷句法門二十卷苦吟門二十卷留題門二十一卷寄贈門二十二卷故事門二十一卷書事門二十一卷譏誚門三十七卷針規門三十八卷詼諧門神仙門三十九卷神仙門四十卷歌詠門鬼神門四十二卷釋氏門四十三卷釋氏門四十四卷釋氏門四十五卷釋氏門四十六卷麗人門四十七卷麗人門四十八卷飲食門四十九卷器用門技藝門五十卷拾遺門百家詩話總龜後集門類
