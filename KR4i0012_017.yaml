body:
  text: 紀實門上仁宗正月十四日御樓遣中使傳宣從官曰朕非好逰觀與民同樂翌日蔡君謨獻詩云髙列千峰寳炬森端門方喜翠華臨宸逰不為三元夕樂事還同萬衆心天上清光留此夜人間和氣閣春隂要知盡慶華封祝四十餘年惠愛深東齋録李叅少有吏材仁宗竒之殿柱題其名有䌓劇人所避者必用叅自將作監簿擢至右丞樞宻直學士元豐中卒李師中以詩弔之曰當年殿柱題名處詩史嶺南謂村市為墟柳子厚詩云青箬褁塩歸洞客緑荷包飯趂墟人青箱雜記夏文莊謪守黄州時龎頴公爲郡掾文莊識之優待頴公有病意謂不起文莊親視之曰異日當爲貧宰相亦有年夀疾非所憂頴公曰宰相豈得貧耶文莊曰一等人中貧尔故頴公作退老詩曰田園貧宰相圖史冨書生張侍郎師錫年八十有喜子登苐詩曰御榜今朝至見名心始安尔能俱中苐吾遂可休官賀客留連飲家書反覆看世科雖不繼得慰二親難張氏常有中甲科者故有世科之語張退傳文懿士遜趙少保叔平槩張樞相昇皆夀八十六陳丞相文惠尭佐夀八十二杜丞相正獻衍夀八十一冨丞相文忠弼夀八十文惠致政退傳詩曰青雲𡵨路逰將遍白髪光隂得最多天聖中李康靖公若谷慶暦中邯鄲公淑皆知滑州后八年審言又知前此邯鄲公迎康靖公到滑康靖題詩扵州廨曰滑守如今是世官阿戎出守自金鑾郡人莫訝留題别孫息期同住此看後審言刋石紀其事同前元豐𥘉王伸效王建作宫詞百首獻之頗有意思詩云太皇生日最尊榮獻夀宫中未五更天子捧觴仍再拜寳慈侍立到天明寳慈皇太后宫名太后幸景靈宫駕前露面雙童女詩曰平明綵仗幸靈宫紫府仙童下九重整頓瓏璁時住馬畫工闇地貌真容古今詩話張九齡在相有謇諤匪躬之誠明皇怠於政事李林甫隂中傷之方秋明皇令高力士持白羽扇賜焉九齡作歸燕詩貽林甫曰海燕何㣲眇乗春亦暫來豈知泥滓賤只見玉堂開繍户時雙入華軒日㡬廻無心與物競鷹隼莫相猜林甫知其必退恚怒稍解明皇雜録叚文昌廣郡縣人父以賣油爲業生而多智長亦有文常跨驢行郷里笑之三十年間衣錦歸蜀蜀人贈詩曰昔日騎驢學忍飢今朝忽着錦衣歸等閒畫虎驅紅斾可畏登龍入紫㣲冨貴不由公祖觧文章生得羽毛飛廣郷再去應惆悵猶有江邉舊釣磯鑑戒録羅史君向廬州人不事産業以至困窮常投福泉寺隨僧飯而巳其學未嘗廢二十年間持節歸郷里及境至僧房書壁曰二十年前此布衣鹿鳴西上虎符歸行時賔從過前事到䖏松杉長舊圍野老共遮官路拜沙鷗遥認隼旟飛春風一宿琉璃殿惟有泉聲愜素機同前雷州及海外瓊崕多香木夷民以為槽飼雞犬鄭文寳詩曰沉檀香植在天涯賤等荆衡水面槎何必爲槽飼鷄犬不如煨燼向豪家談苑建州山水竒秀剏寺落落相望偽唐建安寺三百五十一建陽二百五十二浦城一百七十八崇安八十五松溪四十一關隷五十二僅千區杜牧江南絶句云南朝四百八十寺謂是也劉經為虜政事舎人来奉使路中有野韭可食味絶佳作詩云野韭長猶嫩沙泉淺更清並同前張弘靖三世掌綸誥秉鈞軸楊巨源詩云伊陟無聞祖韋賢不到孫時稱其善與張家說家門巨源燕居吟咏年老得疾頭數揺人言吟咏習成詩史張鎬少有大志逰京師未始知名嗜酒跌宕人有邀之筞杖而徃大醉即歸言不及世務楊國忠薦為右拾遺不二年由諌議大夫擢中書侍郎平章事杜少陵云張公一生江海客身長九尺鬚眉蒼召起遄遇風雲會扶顛始知籌䇿良正謂鎬王元之出守黄州時蘇易簡牓下放孫何等三百五十八人奏曰禹偁禁林宿徳累為遷客飄泊可念臣欲令牓下諸生罷集綴馬送于郊奏可送過四短亭諸生列拜于官橋元之口占一絶付狀元為我深謝蘇公其詩云綴行相送我何榮老鶴乗軒愧谷鶯三入承明不知舉看人門下放諸生時諸親友觀望不敢私近惟竇元賔執手於閤門曰天乎天乎得非命歟公以詩謝其略曰惟有南宫竇員外為余垂淚閤門前文潞公居伊洛日年七十八同時中散大夫程朝議大夫司馬旦司封郎中致仕席汝言皆年七十八嘗為同甲之會各賦詩潞公詩曰四人三百十二歲况是同生甲午年占得梁園為賦客合成商嶺採芝仙清談亹亹風生席素髪飄飄雪滿肩此㑹從來誠未有洛中應作畫圖傳荆公罷相知金陵有詩曰投老歸來一幅巾君恩猶許備藩臣芙蓉堂下䟽秋水聊與龜魚作主人再罷相以㑹靈觀使居鍾山又作詩曰乞得膠膠擾擾身江湖波浪替埃塵只同鳬鴈為閑侣不與龜魚作主人荆公初拜相以未謝坐閣中不見客一二門生侍坐但見顰蹙不言徐題詩於窓曰霜筠雪竹鍾山寺投老歸歟寄此生放筆而起人莫測其意國朝内相服金帶朱衣一名前引两府則金毬文帶佩魚朱衣二人謂之重金望两制乆者則曰眼前何日赤腰下㡬時黄望两府乆者則曰眼赤何時两腰黄甚日重熈寜中高䴡使人至京師求王平甫詩有㫖令京尹元厚之抄録以賜厚之自詣平甫求新著平甫以詩戯之曰誰使詩仙來鳯沼欲傳賈客過雞林福唐有老嫗當壚有舉子謂嫗曰吾能與爾致數十千乃令嫗作酒帘題曰下臨廣陌三條闊斜倚危樓百尺高太守王祠部逵見之大喜呼姬與錢五千酒一斛盖詩乃王公詠酒旗詩平生最得意者大社二祭多差近臣王禹玉在两禁二十年熈寜間爲翰林學士復被差題詩於齊宫曰鄰雞未動暁驂催又向靈壇飲福盃自笑治聾知不足明年強徤更重來關右人或作京師語音俗謂之獠語士大夫亦然有太常博士楊獻民河東人時鄜州脩城差望青砍木作詩寄僚友曰縣官伐木入烟蘿匠石須材盡日磨盖以郷音呼忙爲磨也士人而狥俗不典可笑魏仲先贈萊公詩曰有官居鼎鼐無宅起樓䑓仁宗即位北使至賜㝠惟两府預焉北使歴視坐中問譯者曰孰是無宅起樓䑓相公丁晋公令譯者曰南方須大臣鎮撫㓂公撫南夏非乆即還古今詩話元㣲之自㑹稽拜尚書左丞到京未逾月出武昌詩贈夫人裴氏曰窮冬到郷國正歲别京華自恨風塵眼看他逺地花碧幢還照耀紅粉莫咨嗟嫁得浮雲婿相隨即是家夫人答曰使門𥘉擁節御苑栁絲新不是悲殊命惟愁别近親黄鸝啼古木朱履從清塵想到千山外滄江正暮春正元中李摯以宏詞振名與李行敏同姓同年登第又同歲及同門摯答行敏詩曰因縁三紀異契分四般同武宗怒一宫嬪謂栁公權曰得學士一詩當釋之遂進詩曰不忿前時悮主恩巳甘寂寞守長門今朝却得君王顧重入椒房拭涙㾗柳公權從事未央宫文宗謂曰有一喜事邉上賜衣乆不時今年二月巳給公可賀我以詩公權進詩曰去歲雖無戰今年未得歸皇恩何以報春日得春衣嚴續僕射請韓熈載爲父撰神道碑珎貨外仍輟一姬為潤筆韓受姬及文成但叙譜系品秩及薨葬哀贈之典而巳續嫌之乃封還意其改竄熈載亟以歌姬并珎贈還之姬登車書一絶於泥金雙帶云風柳搖搖無定枝陽䑓雲雨夣中歸他年蓬島音塵㫁留取尊前舊舞衣同前雄州安撫都監稱宣事云虜中好樂天詩聞虜有詩云樂天詩集是吾師白樂天一舉登第作詩曰慈恩塔下題名處十九人中最少年時年二十七大和二年崔郾侍郎東都放牓西都過堂杜紫㣲第五人登第作詩曰東都放牓未花開三十三人走馬廻秦地少年多醸酒却將春色入關來寳暦中楊嗣復相具慶下繼放甲榜時無僕射自東洛入覲嗣復率生徒迎于潼關宴于新昌里第元白在焉皆即席賦詩楊汝士詩後成元白覧之失色詩曰隔座應須賜御屏盡將仙翰入高冥文章舊價留鸞掖桃李新隂在鯉庭再歲生徒陳賀宴一時良史盡傳馨當時䟽傅雖云盛詎有茲筵醉醁􅙩汝士是日大醉歸謂諸子曰今日壓倒元白何扶大和元年登第明年再捷以一篇寄同年曰金榜題名墨尚新今年依舊去年春花開每𬒳紅粧問何事重來只一人並同前紫閣山老僧文聰說晏相來逰山獮猴萬數遍滿山谷僧言未嘗如此之多晏詩㝷添獼猴之句雅志王沂公與李文定公連榜取殿魁又相繼秉鈞軸文定鎮并門公均勞逸本郷作詩寄之略曰錦幖得雋曾相繼金鼎調元亦荐更并土児童公再見會稽幢紱我先榮或曰如此名實何由企及續歸田録潘閬在舒州灊山寺為行者題詩鍾樓云遶寺千千萬萬峰忘第二句頑童趂暖貪春睡忘却登樓打曉鍾孫僅為郡官見詩曰此潘逍遥也告寺僧呼行者潘已亡去貢父詩話越州鰻井在應天寺井在一盤石上高數丈井纔方數寸乃一石竅也深不可知徐浩詩云深泉鰻井開即此也其來亦逺鰻時出逰人取之置衣䄂間了無驚猜如鰻而有鱗耳其大尾有刄跡相傳黄巢曾以劍砍之凡鰻出必有水旱疫癘之疾郷人以此候之學士院有雙鵲嘗栖於西軒海棠枝上每學士㑹食必徘徊翔集扵玉堂之上略無驚畏因謂之靈鵲時或鳴噪必有大詔令或宣召之事故眺公見和詩云却聞靈鵲心應喜并予宿直詩云靈鵲先依玉樹栖二詩出樞庭集金坡遺事鼎州甘泉寺介官道之側泉甚佳便於漱酌行客無不留者㓂萊公南遷題東檻曰平仲經此望北闕黯然而行未㡬丁晋公又過題西檻曰謂之酌泉禮佛而去後范諷𥙷之安撫湖北題詩曰平仲酌泉方北望謂之禮佛向南行烟嵐翠鎖門前路轉使高人厭寵榮古今詩話退傅張懿晚春乗安輿出南薫門繚繞都城逰金明池抵宿詣冝春門入關吏捧牌請官位書云閒逰靈沼送春回關吏何須苦見猜八十老翁無品秩三曾身到鳯池來同前增修詩詁總龜卷之十七乙集終百家詩話總龜後集卷之十七評史門老杜課伯夷幸秀伐木則曰報之以㣲寒共給酒一斛遣信行脩水筒則以浮瓜裂餅以答其恭謹陶淵明告其子則曰輙遣一力助汝薪水之勞此亦人子也可善遇之盖古人之役僕夫其忠厚率如此初學記載王褒買便了爲奴作約使苦作以致聴劵而泪下鼻涕長一尺有不如早歸黄陌令蚯蚓鑚額之語其少陵柴桑之罪人㢤葛常之建安七子惟劉公幹獨爲諸王子所親曹操威熖盖世甄夫人出拜諸人皆伏而公幹獨平視雖輸作而不悔亦可嘉矣故梅聖俞詩云公幹才俊或欺事平視羙人曾不起自兹不得爲故人輸作左校瀕扵死公幹嘗有贈従弟詩云亭亭山上松瑟瑟谷中風風聲一何盛松枝一何勁其寄意如是豈肯少屈扵操㢤末篇又托興鳯凰有何時當來儀將須聖明君之句則不以聖明待操矣杜甫悲陳濤詩云野曠天清無戰聲四萬義軍同日死言房琯之敗也琯臨敗猶持重而中人邢延恩促戰遂大敗故甫深悲之甫爲右拾遺㑹琯罷相上䟽力救琯肅宗大怒詔三司推問宰相張鎬救之獲免故洗兵馬行云張公一生江海客身長九尺鬚眉蒼盖感其救巳也張無盡孤憤吟云房琯未相日所談皆臯䕫一朝陳濤下覆没十萬師中原巳紛潰老杜尚嗟咨則老杜救琯之章豈亦出扵私情乎鄭䖍受安禄山僞命洎賊平與張通王維並囚宣陽里因善盡祈扵崔圓遂得免死老杜所謂今如罝中兎子雲識字終投閣是也及䖍貶台州有詩云可念此公懐直道也霑新國用䡖刑如䖍者可謂之懷直道乎當是愛私之言尔八哀詩亦云反覆歸聖朝點染無滌蕩老蒙台州掾泛泛浙江槳盖傷之也忘年交謂雖年齒尊㓜不侔而道義可為友也如張鑑之扵陸贄崔廓之扵李謙是巳魯直云逐貧不去與忘年便以忘年作朋友用盖有來處也老杜過孟倉曹詩云清談見滋味尔軰可忘年則山谷所用豈苟云乎㢤李白作蜀道難以罪嚴武其末云所守或匪親化為狼與豺朝避猛虎夕避長蛇磨牙吮血殺人如麻錦城雖云樂不如早還家則武待白之禮未必優也武與杜甫情好甚厚一朝以飲酒過度而武㡬殺之則不如早還家之說乃白先見之明尔陸暢謁韋臯於蜀郡暢感韋之遇已遂反其詞作蜀道易云蜀道易易扵履平地郎基在頴川不置木枕裴潜在兖州不眠胡牀居官清操要當如是白樂天在杭州取天竺片石受代携㱕故其詩曰三年為刺史飲氷復食檗唯向天竺山取得両片石此抵有千金無乃傷清白曁守呉門復取洞庭雙石一以攴琴一以貯酒故雙石詩有萬古遺水濵一朝入吾手之句洎罷府攴琴石遂歸履道舊居故作詩云天上定應勝地上攴機未必及攴琴於乎泉石膏肓人士之逸韻若樂天者豈潘子義所謂風流罪過也耶君子為小人誣衊則其詩怨故寓之於物以舒其憤如朱晝古鏡詩所謂我有古時鏡初自懐陵得蛟龍猶泥蟠魑魅幸月蝕是也小人旣敗君子得志之秋則其詩昌故寓之扵物以快其志如劉禹錫磨鏡篇所謂萍開緑池滿暈盡金波溢山神妖氣沮野魅真形出是也黄子虚作妬佳月篇云狂雲妬佳月怒飛千里黒佳月了不嗔曾何汚㓗白攴頥少待之寒光静無迹燦燦黄金盤獨照一天碧殆亦二子之意俱同上康節三皇吟許大乾坤自我宣乾坤之外復何言初分大道非常道終有先天永後天作法極㣲難着迹收功最乆不知年若教世上論功業料得更無人在前撃壌集五帝吟進退肯將天下譲着何言語狀雍容一作従容衣裳垂處威儀盛玉帛脩時意思恭物物盡能循至理人人自願立殊功當時何故得如此只被升明類日中三王吟一片中原萬里餘殆非孱徳所能居能一作冝夏商正朔猶能布湯武干戈未便驅澤火有名方受革水天無意不成需請觀仁義為心者肯作人間淺丈夫意一作應請觀一作詳知五伯吟刻意尊名名愈虧人人奔命不勝疲生靈劍㦸圍中活圍一作林公道貨財心裏歸雖則餼羊能愛禮柰何鳴鳯未来儀東周五百餘年内歎息唯聞一仲尼七國吟當其末路尚縱横仁義之言固不聽肯為破齊存即墨能勝坑趙盡長平清晨見鬼未為怪白日殺人奚足驚加以蘇張掉三寸扼喉其勢不俱生嬴秦吟轟轟七國正争籌利害相摩未便休比至一雄心底定其如四海血横流三千賔客方成夣百二山河又變秋謾說罷侯能置守趙高元不是封侯西漢吟秦破山河舊戰埸豈期民復見畊桑九千來里開封域四百餘年號帝王剥䘮旣而遭莾卓經營殊不念高光當時文物如斯盛城復何由更有隍三國吟桓桓鼎峙震雷音絶唱高踪没處㝷蕭皷一方情味暢弓刀萬里力難任論兵狠石寜無意飲馬黄河徒有心雖曰天時亦人事誰知慮外失良金西晋吟承平未必便無憂安若忘危非善謀題品人才慿雅誚雌黄時事用風流有刀難割公閭腹無木可梟元海頭禍在夕陽亭一句上東門笑浪悠悠十六國吟溥天之下號寰區大禹曾經治水餘衣到敝時多蟣蝨瓜當爛處足䖝蛆龍章夲不資狂㓂象魏何嘗薦亂胡尼父有言堪味處當時欠一管夷吾南北朝吟方其天下分南北聘使何嘗絶徃還偏覇尚存前典憲小康猶帶舊腥膻一作迍邅洛陽雅望稱崔浩江表竒才服謝安二百四年能並轡謾將夷虜互為言有隋吟始謀當日已非臧又更相承或自戕螻蟻人民貪土地泥沙金帛恱姬姜征遼意思糜荒服泛汴情懷厭未央三十六年都掃地不然天下未歸唐有唐吟天生神武奠中央不爾群兇未易攘正觀若無風凜凛開元安有氣揚揚凭高始見山河壯入夏方知日月長三百年間能混一事雖成徃道彌光五代吟自從唐李墜皇綱天下生靈𬒳擾攘社稷安危慿卒伍朝廷䡖重繋藩方深冬寒木固不脫未旦小星猶有光五十三年更五姓始知掃蕩待真王我宋吟二首紛紛五代亂離間一旦雲開復見天艸木百年新雨露車書萬里舊山川㝷常巷陌猶簮紱取次園林盡管絃盡一作亦人老太平春未老鶯花無害曰高眠又吾曹飬拙頼明時為幸居多寜不知天下英才中遁迹人間好景處開眉生來只慣見豐稔老去未嘗經亂離一作聞皷鼙五事歴將前代舉帝堯而下更無之按邵氏聞見録康節先公謂本朝五事自唐虞而下所未有者一革命之日市不易肆二克復天下在即位後三未常殺一無罪四百年方四葉五百年無心腹患伯温竊疑未嘗經乱離為太甚先公曰吾老且死汝軰行自知之張南軒采菊亭詩引曰陶靖節人品甚高晋宋諸人所未易及讀其詩可見胸次􅎈落八窓玲瓏豈野馬逰塵所能棲集前建安丞張君精力未衰即掛冠家于瀏陽有年矣葺小園為亭面南山來求予名予名之曰采菊亭取靖節所謂采菊東籬下悠然見南山嗚呼靖節興寄深逺特可為識者道耳詩曰陶公千載人高標跨餘子豈無濟時念歛䕃獨知止歸來卧衡門無愠復何喜九日天氣佳東籬擷芳蕋舉頭見南山佳處政在此地偏心則逺意得道豈否張侯謝銀艾築室娯燕几小亭才㝷丈景物自新羙頗聞方瞳清亦復強歩履不妨數登臨倚杖看雲起高詠悠然篇飛鴻送千里文集復齋漫録云東坡作諌論以魏鄭公以蘇張之辯而為諌諍之術且云鄭公之初實學縦横之術其所以與蘇張異者心正尔或以東坡之論為不然余讀鄭公出関詩
