front:
  text: 增修詩話總龜卷之二十
  hash: sha256:f8617d4ca1ef68b50fda20d0f168c53aac668bd3bfbe9ab8e760c9c50fe98f37
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_020-1a}
body:
  text: 詠物門上王承之云太祖一夕玩月命學士盧多遜曰可以作詩多遜曰請用何韻太祖曰用兒字韻多遜奏詩曰太液池邉月上時好風吹動萬年枝誰家玉匣新開鑑露出清光些子兒王直方詩話王文康公性質重厚嘗作詩曰棗花至小能成實桑葉雖粗解吐絲堪笑牡丹如斗大不成一事又空枝青箱雜記方干詠擊甌詩曰白器敲來曲調成腕頭勻細自輕清隨風搖曵有餘韻測水淺深多泛聲春漏丁當相次發寒蟬計會一時鳴從今巳得佳聲出衆樂無由更擅名李正白江南人不仕號處士善嘲詠曲盡其妙詠刺蝟云行似針氈動卧若粟毬圓莫欺如此大誰敢便行拳嘗謁一貴公子不甚禮􅈦有一格子屏風題其上曰道格何曾格言糊又不糊渾身總是眼還解識人無詠狗蚤云與虱都來不較多襮挑筋斗太嘍囉忽然𬋩著一籃子有甚心情那你何詠月云當塗當塗見蕪湖蕪湖見八月十五夜一似沒柄扇建師晦之子得誠罷𬋩沿江水軍掌禁衛頗患拘束方宴客正白在坐食蟹得誠顧正白曰請詠之正白曰蟬眼龜形腳似蛛未曾正面向人趍如今飣上盤筵上得似江湖亂走無衆客皆笑詠罌粟子云倒排雙陸子希插碧牙籌既似犧牛乳又如鈴馬兜鼓槌并瀑箭直是有來由談苑汝陽溪穆清叔因寒食縱步郊外會數年少同飲松梨花下以香輪莫輾青青破留與愁人一醉眠各賦梨花詩清叔得愁字詩曰共飲梨花下梨花插滿頭清香來玉樹白蟻泛金甌粧靚青娥妬光凝粉蝶羞年年寒食夜吟繞不勝愁衆客閣筆雲齋廣録大庚嶺上有佛塔廟往來題詩多矣有婦人題云妾幼年侍父任英州司寇既代歸父以大庾本有梅嶺之名而反無梅遂植三十株于道之右因題詩于壁今隨夫之任端溪復至此寺前詩巳汚漫矣因再書之云英江今日掌刑回上得梅山不見梅輟俸買將三十本清香留與雪中開好事者因以夾道植梅矣倦遊録劉昭禹聞蟬詩云一雨一番晴山林冷落青莫侵殘日噪正在異鄉聽孤館宿漳浦扁舟離洞庭年年當此際那免鬢凋零雅言雜載李建樞詠月云昨夜圓非今夜圓却疑圓處減嬋娟一年十二度圓缺能得幾多時少年抒情集謝邈謝人惠琴材云風撼桐絲帶月明羽人乘醉截秋聲七絃妙制饒仙品三尺良材稱道情池小未聞春浪泛嶽低猶欠暮雲生何妨乞與元中術臨化無妨膝上橫謝僧寄拄杖云峭壁猿啼採處深一枝竒異出孤岑感師千里寄來意發我片雲歸去心窗外冷敲簷凍折溪邉間點戲魚沉他年必藉相携力蹇步猶能返故林劉希夷聞砧云秋天瑟瑟夜漫漫月白天清玉露寒始向松中縈素練間來機上製齊紈又落花云洛水城東桃李花飛來飛去落誰家洛陽女兒惜顔色行逢花落長歎惜題御柳云花蕚樓前𥘉種時美人樓上逞腰肢如今拋擲長街裏露染如啼欲恨誰曾庶幾吉州人一猿詩甚切云孤猿鎖檻歲年深放出城南百丈林緑水任從聮臂飲青山不用斷腸吟雅言雜載李烈祖為徐溫飬子年九歲詠燈詩云主人若也勤挑撥敢向尊前不盡心溫歎賞遂不以常兒遇之詩史惜竹詩獨陳亞少卿最佳詩曰出檻亦不剪從教長瘦叢年年到朱夏葉葉是清風古今詩話李義山逰長安投宿旅店適會客因召與坐不知為義山也酒酣客賦木蘭花詩衆皆誇示義山后成詩曰洞庭波冷曉侵雲日日征帆送逺人幾度木蘭舟上望不知花是此船身坐客大驚詢之方知是義山古今詩話零陵總記載木蘭花詩是陸龜蒙所作錢大初惜劍詩曰得自袁公手屠姦血未乾玉龍乘夜泣秋水帶霜寒願對英雄舞羞教婦女看太平無處用撫匣泪汍瀾盆池云一撮浮萍蓋蛙黽不知容得卧龍無吕文靖公守宦海陵西溪手植牡丹一本有詩刻石後范文正亦官此題云陽和不擇地海角亦逢春憶得上林色相看如故人後以二公有詩題者亦多而花大為人所愛重歲久繁茂覆地數丈每春花開數百朵為海陵竒觀陳標詠葵花詩云能共牡丹爭幾許得人嫌處只緣多咸陽郭氏冨室也有蒼頭曰捧劍詠牡丹云一種芳菲出後庭却輸桃李得佳名誰能為向天公説從此移根近太清白樂天𥘉到杭州令訪牡丹會開元寺惠澄近自都下得之時花𥘉開徐凝自冨春來謁公先題牡丹云唯有數包紅幞在含芳只待舍人來裴誠郎中與舉子溫岐為友好作歌曲周德華乃劉香女女子善歌楊柳詞有以溫裴歌詞令德華唱則音韻所陳為浮艷之美德華終不取二公恨焉所唱者七八篇乃近日名流之詞滕邁郎中云三條陌上拂金羈萬里橋邉映酒旗近日令人腸斷處不堪將向笛中吹賀知章祕監云碧玉粧成一樹高萬條垂下緑絲絛不知細葉誰裁出二月春風是剪刀楊巨源員外云江邉楊柳麴塵絲立馬慿君剪一枝惟有春風最應惜殷勤更向手中吹劉禹錫尚書云春江一曲柳千條二十年前舊板橋曾與美人橋上别恨無消息至今朝韓琮舍人云枝鬪􅊏腰葉鬪眉春來無處不如絲灞陵原上多離别多少長條拂地垂又云梁苑隋堤事巳空萬條猶舞舊春風那堪更想千年後誰見飛花入漢宫雲溪子曰有艷歌行非為桑間濮上之音也偕以雪月松竹雜詠楊抑作者雖多鮮見其妙杜牧之云巫娥廟裏低含雨宋玉門前斜帶風滕郎中云陶令門前惹接㒿亞夫營裏拂朱旗不言楊柳最佳古今詩話鑑戒録載賀知章事不同謂韓琮詩乃韓渥詩幽薊數州自石晉賂戎後懷中華不巳有使北者見燕京傳舍畫墨鴉甚精旁題詩曰星稀月明夜皆欲向南飛僧居寧毗陵人妙工畫草蟲嘗見水墨草蟲有長四五寸者題云居寧醉筆雖大失真然筆力遒徑可愛梅聖俞詩云草蟲有􅊏意醉筆得正熟張文懿家有春江釣叟圖上有李煜漁父詞二首其一曰浪花有意千里雪桃花無言一隊春一壺酒一竿鱗世上如儂有幾人其二曰一棹春風一葉舟一輪繭縷一輕鉤花滿渚酒滿甌萬須波中得自由相國于兢善畫牡丹幼年從學見牡丹盛開乃落筆倣之不浹旬奪真有人贈詩曰看時人出澀展處蝶爭來有全本折枝圖傳於世白樂天以詩名與元微之同時號元白詩詞多比圖畫如重屏圖自唐迄今傳焉乃樂天醉眠詩也詩曰放杯書案上枕臂火爐前老愛尋思睡慵便取次眠妻教缷烏帽婢與展青氊便是屏風樣何勞畫古賢且詩之所以能盡人情物態者非筆端有口未易到也詩家以畫為無聲詩誠哉是言德宗西幸有二馬一號神智驄一號如意騮進退緩急皆如其意因謂之功臣乘幸諸苑馭者進瑞鞭因語近臣曰昔者西幸有二驄謂之二絶今得此鞭可謂三絶因吟韓翊詩曰鴛鴦赭白齒新齊晚日花開放碧蹄玉勒乍回𥘉噴沫金鞭欲下不成嘶並古今詩話狄煥字子炎唐相國梁公之後寄於南嶽以林泉自適題柳云天南與天北此處影婆娑翠色折不盡離情生更多雨餘籠灞岸煙瞑夾隋河自有佳名在秦松繼得麼雅言系述崔魯慕杜牧之為詩尤能詠物如梅花云強半瘦因前夜雪數枝愁向晚來天又曰𥘉開已入雕梁畫未落先愁玉笛吹山鵲曰一番春雨吹巢冷半朵山花咽觜香又曰雲生柱礎降龍地露洗林巒放鶴天蓮花曰何人解把無塵袖盛取殘香盡日憐此頗形迹托言蘇子瞻李伯時為栁仲逺作松石圖仲逺取杜子美松根胡僧憩寂寞龎眉皓首無住著偏袒右肩露雙腳葉裏松子僧前落之語復求伯時畫此四句目為憩寂圖子由題云東坡自作蒼蒼石留取長松待伯時只有兩人嫌未足兼收前世杜陵詩百斛明珠子瞻歸自道場何山遇大風雨因憩耘老溪亭命官奴秉燭捧硯寫風雨竹一枝題詩云更將掀舞勢把燭書風篠美人為破顔恰似腰肢嫋劉仲幾餞飲東坡中觴聞笙簫聲杳杳在雲霄間抑揚往返粗中音節徐而察之則出於雙瓶水火相搏自然吟嘯食須乃巳坐客驚歎請作瓶笙詩以記云孤松吟風細泠泠獨繭長繅女媧笙陋哉石鼎逢彌明蚯蚓竅作蒼蠅聲瓶中宫商自相賡招文無虧亦無成東坡醉熟呼不醒但云作勞吾耳鳴並同前湖口人李正臣蓄異石九峰玲瓏宛轉若窗􅎉然豫欲以百金置之與仇池石為偶方南遷未暇也名之曰壺中九華以詩識云我家岷蜀最高峰一作清溪電轉失雲峯夢裏猶驚翠掃空五嶺莫愁千嶂外九華今在一壺中天池水落層層見一作石泉影落涓涓滴玉女窗明處處通念我仇池太孤絶百金歸買小玲瓏玉局遺文器之喜談禪而倦逰山山中筍出戲語器之同去參玉版和尚去來乃作此句云叢林真百丈法嗣有橫枝不怕石頭路來參玉版師聊慿柏樹子與問籜龍兒瓦礫猶能説此君那不知同前西南地溫少雪余及壯年止一二年見之自退居天國溪堂山深氣嚴隂嶺叢薄無冬而不雪每一賞玩必命諸子賦詩為樂既而蹈襲剽掠不免涉前人餘意因戲取聲色氣味冨貴勢力數字離為八章止四句以代一日之謔且知余之好不在於世俗所爭而在于雪也仍倣歐陽公體不以鹽玉鶴鷺為比不使皓白潔素等字聲石泉凍合竹無風夜色沉沉萬境空試問靜中間側耳隔窗撩亂撲春蟲色間來披􅌁學王恭姑射群仙邂逅逄只為肌膚酷相似繞庭無處覔行蹤氣半夜欺凌范叔𫀆更兼風力助威豪地爐火暖猶無奈􅏜得山村酒價髙味兒童龜手握輕明漸碾槍旗入鼎烹擬欲為人修水記惠山彔冷釀泉清富天工呈瑞足人心平地聞一尺深此為豐年報消息滿田何止萬黃金貴海風吹浪去無邉倐忽凝為萬頃田五月京塵渴人肺不知價直幾多錢勢髙下斜橫薄又濃破窗踈戶若相攻莫言造物渾無意好醜都來失舊容力萬石千鈞積纍成未應忽此一毫輕寒松瘦竹水清徑昨夜分明聞折聲玉局文歐陽文忠守潁日因小雪會飲聚星堂賦詩約不得用玉月梨梅練紫白舞鵝鶴等事歐公篇略云脫遺前言笑塵雜搜索萬象窺𬈑𬈑自後四十餘年莫有繼音元祜六年東坡在潁因禱雪于張龍公獲應遂復舉前令篇末云汝南先賢有故事醉翁詩話誰能説當時號令若聼取白戰不許持寸鐵王直方詩話山谷有蕨芽已作小兒奉之句張閣云此忍人也時閣方為河內推官而道判葛繁最喜蔬食誦經故閣亦斷葷而有此語同前荆公作相苑中有石榴一叢枝葉甚茂止發一花題詩云濃緑萬枝紅一點動人春色不須多荆公過東坡見案上有石研甚愛賞因曰當集句賦之唱曰巧匠斫山骨沉吟久之不能成因命駕去臘梅山谷𥘉見之作二絶一云金蓓銷春寒惱人香未展須無桃李紅風味極不淺一云體熏山麝臍色染薔薇露披拂不盈懷時有暗香度緣此臘梅盛於京師然交遊間亦有不甚喜之者余嘗作解嘲云紛紛紅紫雖無韻映帶園林却要渠要或作見誰遺一枝香最勝故應有客謂何如高致虛云東坡言過溫泉壁上見詩云直待衆生總無垢我方清冷混常流問人云可遵作因作一絶云石龍有口口無根自在流泉誰吐吞若信衆生本無垢此泉何處覔寒溫可遵緣此知名后來京師每有賔客必出數十篇讀者無不絶倒並同前增修詩話總龜卷之二十百家詩話總龜後集卷之二十警句門唐盧綸與吉中孚韓翃錢起司空曉苗發崔洞耿湋夏侯審李端皆能詩齊名號大曆十才子憲宗尤愛綸文至詔張仲素其遺藳故綸集中往往有贈諸人詩所謂舊籙藏雲穴新詩滿帝鄊者送中孚之詩也引水忽驚氷滿澗向田空見石和雲者寄湋端之詩也擁褐覺霜下抱琴聞鴈來者同湋宿旅舍之詩也風傾竹上雪山對酒邉人者題苗發竹間亭詩也桂樹曽同折龍門幾共登者寄端洞曉湋之詩也司空曉亦有送中孚詩云聽猿看楚岫隨鴈到吳洲耿湋寄曉云老醫迷舊疾杇藥誤新方李端寄綸云熊寒方入樹魚樂稍離泉錢起答苗發龍池詩云暫别迎車雉還隨護法龍又贈夏侯審云詩成流水上夢盡落花間諸人更唱迭和莫非佳句蓋草木臭味既同則金蘭契分彌篤爾史載郭暖進官大集名士李端賦詩最工錢起曰素為爾請以起姓别賦端立獻一章又工于前起之妬賢徒增愧而端之捷思為可服也丹楊集錢起與郎士元齊名時人語曰前有沈宋後有錢郎然郎豈敢望錢哉起中書遇雨詩云雲銜七曜起雨拂九門來宴李監宅云晚鍾過竹靜醉客出花遲罷官後云秋堂入間夜雲月思離居對雨云生事萍無定愁心雲不開亦可謂竒句矣士元詩豈有如此句乎贈孟少府新除江南尉云客路尋常隨竹影人家大扺旁山嵐題王季友半日村别業云長溪南路當群岫半景東鄰照數家此何等語余讀其詩盡秩未見有可喜處以是知不及起逺甚同上山隂野雪興難來佳辰強飲食猶寒皆斡旋其語使就音律近集有天上嬌雲未肯同十年江海别嘗輕花下壷盧鳥勸提與君蓋亦不須傾皆此法也黃常明賔客集添爐搗雞舌灑水淨龍鬚駱賔王桃花嘶別路竹葉㵼離樽此體甚衆惟桞子厚從中丞過盧少府郊居一聮最工云蒔藥間庭延國老開尊虛室值賢人只似稱坐客而有兩意蓋甘草國老濁酒賢人故也夢得又有藥爐燒姹女酒甕貯賢人近于湯燖右軍矣余嘗為郊行詩云江干食息呼扶老木未扳緣訝宛童乃古今注秃鶖一名扶老爾雅女羅謂之宛童也又題一士人所君云但遺一枝居巧婦不殊大厦賀佳賔蓋用爾雅注鷦鷯俗呼巧婦炙轂子雀一名佳賔言集人屋如賔客也樂天曽用巧婦對慈姑謝元暉善為詩任彥升工於筆又云任筆沈詩劉孝綽稱弟儀與成云三筆六詩故牧之云杜詩韓筆愁來讀似倩麻姑癢處爬近人用之臨川云間時用意歸詩筆靜外安生比太山坡云水洗禪心都眼靜山供詩筆總眉愁同上唐朝人士以詩名者甚衆往往因一篇之善一句之工名公先逹為之遊談延譽遂至聲聞四馳曲終人不見江上數峯青錢起以是得名故國三千里深宫二十年張祐以是得名微雲淡河漢踈雨滴梧桐孟浩然以是得名兵衛森畫戟宴寢凝清香韋應物以是得名野火燒不盡東風吹又生白居易以是得名𫾣門風動竹疑是故人來李益以是得名鳥宿池中木僧𫾣月下門賈島以是得名畫棟朝飛南浦雲珠簾暮捲西山雨王勃以是得名華𥚑織翠青如蔥入門下馬氣如虹李賀以是得名然觀各人詩集平平處甚多豈皆如此句哉古人嘗謂嘗鼎一臠可以盡知其味恐未必然爾杜子美云為人性僻耽佳句語不驚人死不休則是凡子美􅎍中流出者無非驚人之語矣讀其集者當知此言不妄殆非前數公之可比倫也葛立之李義山任弘農尉嘗投詩謁告云却羡卞和雙刖足一生無復沒階趨雖為樂春罪人然用事出人意表尤有餘味英俊陸沉強顔低意趨跖諾虎扼腕不平之氣有甚于傷足者非粗知直巳不井心于病畦下者不能賞此語之工也陽秋郛子稍學作小詩嘗賦梅花云玉屑裝龍腦雲衣覆麝臍何堪夜耒雪香色雨凄迷留友人詩云良友間何闊春事遽如許勞君下鷗沙一葉繫春渚昨夢墮前世再見欣𣣔舞聊呼花底杯酒面點紅雨狂歌謝貫珠􅌐駒夫可歌妙句須君吐觀此數語似粗知詩家畦徑學之不已必佳但恐其中墮爾同上陸士衡文賦云立片言以居要乃一篇之警䇿此要論也文章無警䇿則不足以傳世蓋不能竦動世人如老杜及唐人諸詩無不如此但晉宋間人專致力於此故失于綺靡而無髙古氣味老杜句云句不驚人死不休所謂驚人句即警䇿也吕氏童蒙訓句法門前人文章各自一種句法如老杜今君起拖春江流豫亦江邊具小舟同心不減骨親每語見許文章伯如此之類老杜句法也東坡秋水今幾竿之類自東坡句法魯直之夏扇曰在搖行樂亦云聊此魯直句法也學者若能遍考前作自然度越流輩同上淵明退之詩句法分明卓然異衆惟魯直為能深識之學者若能識此等語自然過人阮嗣宗詩亦然徐師川云作詩回頭一句叢為難道如山谷詩所謂忽思鍾陵江十里之類是也他人豈如此尤見句法安壯山谷平日詩多用此格徐師川云為詩文常患意不屬或只得一句語意便盡𣣔足成一章又惡其不相稱師川云但能知意不屬則學可進矣凡注意作詩文或得一兩句而止若未其次句即不若且休飬鋭以待新意若盡力須要相屬譬如力不敵而苦戰一敗之後意氣沮矣王荆公好集句嘗于東坡處見古硯東坡令荆公集句荆公云巧匠斫山骨只得一句遂逡巡而去山谷嘗有句云琪璘卧葬功名骨終身不得好對同上莊子文多竒變技經肯綮之未嘗乃未嘗技經肯綮也詩句時有此法如昌黎一蛇兩頭見未曽拘𬋩計日月𣣔進又不可君𣣔強起時難東坡云逮兹霜雪未兹謀待君必聊亦記吾曽餘人罕敢用黃常明苦吟門山澤之儒多癯詩人尤甚子美有思君令人瘦樂天云形容瘦薄詩情苦豈是人間有相人又云貌將松共瘦心與竹俱空李商隱瘦盡東陽姓沈人掉頭撚髭之苦豈有張頥豐頰者哉沈昭略嘗戲王約以肥而癡答以瘦而狂昭略喜曰瘦已勝肥狂已勝癡同上賈島詩如鳥從井口出人從嶽陽來貫休此夜一輪滿清光何處無皆經年方得句以見其詞澀思苦若非好事者誇辭亦繆用其心也同上後山詩話云荆公詩力去陳言誇末俗可憐無輔費精神而公平生文體數變莫年詩益工用意蓋苦故言不可不謹也蔡寬夫詩話云司空圖善論前人詩如謂元白為力勍氣僝乃都會之豪估郊島非附於寒澀無所置才皆切中其病及自評其作乃以南樓山最秀北路邑偏清為假令作者復生亦當以著題見許此殆不可曉當局者迷固人情之通患如樂天所謂屬石破山先觀鑱迹發矢中的兼聽弦聲使不見其詩而聞此語當以為如何哉冷齋夜話云賈島詩有影略句韓退之喜之其渡枽乾詩曰客舍并州三十霜歸心日夜憶咸陽而今更渡桑乾水却望并州是故鄉又赴長江道中詩曰䇿杖離山馹逢人問梓州長江那可到行客替生愁隱居詩話云孟郊詩蹇澀窮僻瑑削不暇苦吟而成觀其句法格力可見矣其自謂夜吟曉不休苦吟鬼神愁如何不自間心與身為仇而退之薦其詩云榮華肖天秀捷疾愈響報何也蘇子由云唐人工于為詩而陋于聞道孟郊嘗有詩云食虀腸亦苦強歌聲無歡出門即有礙誰謂天地寬郊耿介之士雖天地之大無以容其身起居飲食有戚戚之憂是以卒窮以死而李翶稱之以為郊詩髙處在古無上平處猶下顧沈謝至韓退之亦談不容口甚矣唐人之不聞道也孔子稱顔子在陋巷人不堪其憂回也不改其樂回雖窮困早死而非其處身之非可以言命與郊異矣百家詩話總龜後集卷之二十
