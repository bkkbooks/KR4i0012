front:
  text: 增修詩話總龜卷之二十
  hash: sha256:f8617d4ca1ef68b50fda20d0f168c53aac668bd3bfbe9ab8e760c9c50fe98f37
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_020-1a}
body:
  text: 詠物門上王承之云太祖一夕翫月命學士盧多遜曰可以作詩多遜曰請用何韻太祖曰用児字韻多遜奏詩曰太液池邉月上時好風吹動萬年枝誰家玉匣新開鑑露出清光些子兒王直方詩話王文康公性質重厚嘗作詩曰棗花至小能成實桑葉雖粗觧吐絲堪笑牡丹如斗大不成一事又空枝青箱雜記方干詠擊甌詩曰白噐敲來曲調成腕頭匀細自輕清隨風摇曵有餘韻測水淺深多汎聲春漏丁當相次發寒蟬計㑹一時鳴從今巳得佳声出衆樂無由更擅名李正白江南人不仕號處士善嘲詠曲盡其妙詠刺蝟云行似針毡動卧若粟毬圓莫欺如此大誰敢便行拳嘗謁一貴公子不甚禮􅈦有一格子屏風題其上曰道格何曾格言糊又不糊渾身總是眼還解識人無詠狗蚤云與虱都來不較多襮挑筋斗太嘍囉忽然𬋩着一籃子有甚心情那你何詠月云當塗當塗見蕪湖蕪湖見八月十五夜一似没柄扇建師晦之子得誠罷𬋩㳂江水軍掌禁衞頗患拘束方宴客正白在坐食蠏得誠顧正白曰請詠之正白曰蟬眼龜形脚似蛛未曾正面向人趍如今飣上盤筵上得似江湖亂走無衆客皆咲詠罌粟子云倒排雙陸子希挿碧牙籌旣似犧牛乳又如鈴馬兠皷槌并瀑箭直是有來由談苑汝陽溪穆清叔因寒食縱歩郊外㑹數年少同飲松梨花下以香輪莫輾青青破留與愁人一醉眠各賦梨花詩清叔得愁字詩曰共飲梨花下梨花挿滿頭清香來玉樹白蟻泛金甌粧靚青娥妬光凝粉蝶羞年年寒食夜吟繞不勝愁衆客閣筆雲齋廣録大庚嶺上有佛塔廟徃來題詩多矣有婦人題云妾㓜年侍父任英州司㓂旣代歸父以大庾本有梅嶺之名而反無梅遂植三十株于道之右因題詩于壁今隨夫之任端溪復至此寺前詩巳汚漫矣因再書之云英江今日掌刑回上得梅山不見梅輟俸買將三十本清香留與雪中開好事者因以夾道植梅矣倦㳺録劉昭禹聞蟬詩云一雨一番晴山林冷落青莫侵殘日噪正在異郷聽孤舘宿漳浦扁舟離洞庭年年當此際那免鬂凋零雅言雜載李建樞詠月云昨夜圓非今夜圓却疑圓䖏减嬋娟一年十二度圓缺能得㡬多時少年抒情集謝邈謝人惠琴材云風撼桐絲帶月明羽人乗醉截秋聲七絃妙制饒仙品三尺良材稱道情池小未聞春浪泛岳低猶欠暮雲生何妨乞與元中術臨化無妨膝上横謝僧寄拄杖云峭壁猿啼採處深一枝竒異出孤岑感師千里寄來意發我片雲歸去心窓外冷敲簷凍折溪邉閑點戯魚沉他年必藉相携力蹇歩猶能返故林劉希夷聞砧云秋天瑟瑟夜漫漫月白天清玉露寒始向松中縈素練閑來機上製齊紈又落花云洛水城東桃李花飛來飛去落誰家洛陽女児惜顔色行逢花落長歎惜題御柳云花蕚樓前𥘉種時羙人樓上逞腰肢如今抛擲長街裏露染如啼欲恨誰曾庻㡬吉州人一猿詩甚切云孤猿鎻檻歲年深放出城南百丈林緑水任從聮臂飲青山不用㫁腸吟雅言雜載李烈祖為徐温飬子年九歲詠燈詩云主人若也勤挑撥敢向尊前不盡心温歎賞遂不以常児遇之詩史惜竹詩獨陳亞少卿最佳詩曰出檻亦不剪從教長瘦叢年年到朱夏葉葉是清風古今詩話李義山逰長安投宿旅店適㑹客因召與坐不知為義山也酒酣客賦木蘭花詩衆皆誇示義山后成詩曰洞庭波冷曉侵雲日日征㠶送逺人㡬度木蘭舟上望不知花是此船身坐客大驚詢之方知是義山古今詩話零陵総記載木蘭花詩是陸龜蒙所作錢大初惜劍詩曰得自袁公手屠姦血未乾玉龍乗夜泣秋水帶霜寒願對英雄舞羞教婦女看太平無處用撫匣泪汍瀾盆池云一撮浮萍盖蛙黽不知容得卧龍無吕文靖公守宦海陵西溪手植牡丹一本有詩刻石後范文正亦官此題云陽和不擇地海角亦逢春憶得上林色相看如故人後以二公有詩題者亦多而花大為人所愛重歲乆繁茂覆地數丈毎春花開數百朶為海陵竒觀陳標詠葵花詩云能共牡丹争㡬許得人嫌處只縁多咸陽郭氏冨室也有蒼頭曰捧劍詠牡丹云一種芳菲出後庭却輸桃李得佳名誰能為向天公說從此移根近太清白樂天𥘉到杭州令訪牡丹會開元寺惠澄近自都下得之時花𥘉開徐凝自冨春來謁公先題牡丹云唯有數包紅幞在含芳只待舍人來裴誠郎中與舉子温岐為友好作歌曲周徳華乃劉香女女子善歌楊柳詞有以温裴歌詞令徳華唱則音韻所陳爲浮艶之羙徳華終不取二公恨焉所唱者七八篇乃近日名流之詞滕邁郎中云三條陌上拂金覊萬里橋邉映酒旗近日令人腸㫁處不堪將向笛中吹賀知章秘監云碧玉粧成一樹高萬條垂下緑絲絛不知細葉誰裁出二月春風是剪刀楊巨源員外云江邉楊柳麴塵絲立馬慿君剪一枝惟有春風最應惜殷勤更向手中吹劉禹錫尚書云春江一曲柳千條二十年前舊板橋曾與羙人橋上别恨無消息至今朝韓琮舎人云枝鬪􅊏腰葉鬪眉春來無處不如絲㶚陵原上多離别多少長條拂地垂又云梁苑隋堤事巳空萬條猶舞舊春風那堪更想千年後誰見飛花入漢宫雲溪子曰有艶歌行非爲桑間濮上之音也偕以雪月松竹雜詠楊㧕作者雖多鮮見其妙杜牧之云巫娥廟裏低含雨宋玉門前斜帶風滕郎中云陶令門前惹接䍦亞夫營裏拂朱旗不言楊柳最佳古今詩話鑑戒録載賀知章事不同謂韓琮詩乃韓渥詩幽薊數州自石晉賂戎後懐中華不巳有使北者見燕京傳舎畫墨鴉甚精旁題詩曰星稀月明夜皆欲向南飛僧居寜毘陵人妙工畫艸蟲嘗見水墨艸蟲有長四五寸者題云居寜酔筆雖大失真然筆力遒勁可愛梅聖俞詩云草蟲有􅊏意醉筆得正熟張文懿家有春江釣叟圖上有李煜漁父詞二首其一曰浪花有意千里雪桃花無言一隊春一壺酒一竿鱗世上如儂有㡬人其二曰一棹春風一葉舟一輪蠒縷一輕鉤花滿渚酒滿甌萬須波中得自由相國于兢善畫牡丹㓜年從學見牡丹盛開乃落筆倣之不浹旬奪真有人贈詩曰看時人出澁展處蝶争來有全本折枝圖傳於世白樂天以詩名與元㣲之同時號元白詩詞多比圖畫如重屏圖自唐迄今傳焉乃樂天醉眠詩也詩曰放杯書案上枕臂火爐前老愛㝷思睡慵便取次眠妻教缷烏帽婢與展青氊便是屏風様何勞畫古賢且詩之所以能盡人情物態者非筆端有口未易到也詩家以畫為無聲詩誠哉是言德宗西幸有二馬一號神智驄一號如意騮進退緩急皆如其意因謂之功臣乗幸諸苑馭者進瑞鞭因語近臣曰昔者西幸有二驄謂之二絶今得此鞭可謂三絶因吟韓翊詩曰鴛鴦赭白齒新齊晚日花開放碧蹄玉勒乍回𥘉噴沫金鞭欲下不成嘶並古今詩話狄煥字子炎唐相國梁公之後寄於南岳以林泉自適題柳云天南與天北此䖏影婆娑翠色折不盡離情生更多雨餘籠㶚岸烟瞑夾隋河自有佳名在秦松繼得麽雅言系述崔魯慕杜牧之為詩尤能詠物如梅花云強半瘦因前夜雪數枝愁向晚來天又曰𥘉開已入雕梁畫未落先愁玉笛吹山鵲曰一番春雨吹巢冷半朶山花咽觜香又曰雲生柱礎降龍地露洗林巒放鶴天蓮花曰何人解把無塵䄂盛取殘香盡日憐此頗形迹摭言蘇子瞻李伯時為栁仲逺作松石圖仲逺取杜子羙松根胡僧憇寂寞龎眉皓首無住着偏袒右肩露雙脚葉裏松子僧前落之語復求伯時畫此四句目為憇寂圖子由題云東坡自作蒼蒼石留取長松待伯時只有両人嫌未足兼收前世杜陵詩百斛明珠子瞻歸自道塲何山遇大風雨因憇耘老溪亭命官奴秉燭捧硯冩風雨竹一枝題詩云更將掀舞勢把燭書風篠羙人爲破顔恰似腰肢嫋劉仲㡬餞飲東坡中觴聞笙簫聲杳杳在雲霄間抑揚徃返粗中音節徐而察之則出於雙瓶水火相搏自然吟嘯食湏乃巳坐客驚歎請作瓶笙詩以記云孤松唫風細泠泠獨蠒長繅女媧笙陋㢤石鼎逢彌明蚯蚓竅作蒼蠅聲瓶中宫商自相賡招文無虧亦無成東坡醉熟呼不醒但云作勞吾耳鳴並同前湖口人李正臣蓄異石九峰玲瓏宛轉若窓􅎉然予欲以百金置之與仇池石爲偶方南遷未暇也名之曰壺中九華以詩識云我家岷蜀最高峰一作清溪電轉失雲峯夣裏猶驚翠掃空五嶺莫愁千嶂外九華今在一壺中天池水落層層見一作石泉影落涓涓滴玉女牕明處處通念我仇池太孤絶百金歸買小玲瓏玉局遺文器之喜談禪而倦逰山山中筍出戯語器之同去叅玉版和尚去來乃作此句云叢林真百丈法嗣有横枝不怕石頭路來參玉版師聊慿栢樹子與問籜龍児瓦礫猶能說此君那不知同前西南地温少雪余及壯年止一二年見之自退居天國溪堂山深氣嚴隂嶺叢薄無冬而不雪每一賞翫必命諸子賦詩為樂旣而蹈襲剽掠不免渉前人餘意因戯取聲色氣味冨貴勢力數字离為八章止四句以代一日之謔且知余之好不在於世俗所争而在扵雪也仍倣歐陽公體不以塩玉鶴鷺為比不使皓白潔素等字聲石泉凍合竹無風夜色沉沉萬境空試問静中閑側耳隔窓撩亂撲春蟲色閑来披􅌁學王恭姑射群仙邂逅逄只為肌膚酷相似遶庭無䖏覔行踪氣半夜欺凌范叔𫀆更兼風力助威豪地爐火煖猶無奈􅏜得山村酒價髙味児童亀手握輕明漸碾槍旗入鼎烹擬欲為人修水記惠山彔冷醸泉清富天工呈瑞足人心平地聞一尺深此為豐年報消息滿田何止萬黄金貴海風吹浪去無邉倐忽凝為萬頃田五月京塵渴人肺不知價直幾多錢勢髙下斜横薄又濃破窓踈戶若相攻莫言造物渾無意好醜都来失舊容力萬石千鈞積累成未應忽此一毫輕寒松瘦竹水清劲昨夜分明聞折聲玉局文歐陽文忠守潁日因小雪會飲聚星堂賦詩約不得用玉月梨梅練紫白舞鵝鶴等事歐公篇畧云脱遺前言笑塵襍搜索萬象窺𬈑𬈑自後四十餘年莫有継音元祜六年東坡在潁因禱雪于張龍公獲應遂復舉前令篇末云汝南先賢有故事醉翁詩話誰能説當時號令若聼取白戦不許持寸鉄王直方詩話山谷有蕨芽已作小児奉之句張閣云此忍人也時閣方為河内推官而道判葛繁最喜蔬食誦經故閣亦斷葷而有此語同前荆公作相苑中有石榴一叢枝葉甚茂止發一花題詩云濃緑萬枝紅一點動人春色不須多荆公過東坡見案上有石研甚愛賞因曰當集句賦之唱曰巧匠斵山骨沉吟乆之不能成因命駕去臘梅山谷𥘉見之作二絶一云金蓓銷春寒惱人香未展須無桃李紅風味極不淺一云體熏山麝臍色染薔薇露披拂不盈懐時有暗香度縁此臘梅盛於京師然交㳺間亦有不甚喜之者余嘗作解嘲云紛紛紅紫雖無韻映帶園林却要渠要或作見誰遺一枝香最勝故應有客謂何如高致虚云東坡言過温泉壁上見詩云直待衆生總無垢我方清冷混常流問人云可遵作因作一絶云石龍有口口無根自在流泉誰吐吞若信衆生本無垢此泉何處覔寒温可遵縁此知名后來京師每有賔客必出數十篇讀者無不絶倒並同前增修詩話總龜卷之二十百家詩話總龜後集卷之二十警句門唐盧綸與吉中孚韓翃錢起司空曉苗發崔峒耿湋夏侯審李端皆䏻詩齊名號大暦十才子憲宗尤爱綸文至詔張仲素其遺藳故綸集中往徃有贈諸人詩所謂舊籙蔵雲穴新詩滿帝鄊者送中孚之詩也引水忽驚氷滿磵向田空見石和雲者寄湋端之詩也擁褐覺霜下抱琴聞鴈来者同湋宿旅舎之詩也風傾竹上雪山對酒邉人者題苗發竹間亭詩也桂樹曽同折龍門㡬共登者寄端峒曉湋之詩也司空曉亦有送中孚詩云听猿㸔楚岫随鴈到呉洲耿湋寄曉云老毉迷舊疾杇藥誤新方李端寄綸云熊寒方入樹魚樂稍離泉錢起荅苗發龍池詩云暫别迎車雉還随護法龍又贈夏侯審云詩成流水上夣盡落花間諸人更唱迭和莫非佳句盖草木臭味旣同則金蘭契分弥篤尔史載郭暖進官大集名士李端賦詩㝡工錢起曰素為尔請以起姓别賦端立献一章又工扵前起之妬賢徒増愧而端之㨗思為可服也丹楊集錢起與郎士元齊名時人語曰前有沈宋後有錢郎然郎豈敢望錢㢤起中書遇雨詩云雲銜七曜起雨拂九門来宴李監宅云晚鍾過竹静醉客出花遲罷官後云秋堂入閑夜雲月思離居對雨云生事萍無定愁心雲不開亦可謂竒句矣士元詩豈有如此句乎贈孟少府新除江南尉云客路㝷常隨竹影人家大扺旁山嵐題王季友半日村别業云長溪南路當群岫半景東隣照数家此何等語余讀其詩盡秩未見有可喜處以是知不及起逺甚同上山隂野雪興難來佳辰強飲食猶寒皆斡旋其語使就音律近集有天上嬌雲未肯同十年江海别嘗輕花下壷盧鳥勸提與君盖亦不湏傾皆此法也黄常明賔客集添炉擣雞舌洒水净龍鬚駱賔王桃芲嘶別路竹葉㵼离樽此体甚衆惟桞子厚從中丞過盧少府郊居一聮最工云蒔藥閑庭延囯老開尊虚室值賢人只似稱坐客而有两意盖甘草囯老濁酒賢人故也夣得又有薬爐燒姹女酒甕貯賢人近扵湯燖右軍矣余嘗爲郊行詩云江干食息呼扶老木未扳縁訝宛童乃古今注秃鶖一名扶老爾雅女羅謂之宛童也又題一士人所君云但遺一枝居巧婦不殊大厦賀佳賔盖用爾雅注鷦鷯俗呼巧婦炙轂子雀一名佳賔言集人屋如賔客也樂天曽用巧婦對慈姑謝元暉善爲詩任彦升工於筆又云任筆沈詩劉孝綽稱弟儀與成云三筆六詩故牧之云杜詩韓筆愁来讀似倩麻姑痒處爬近人用之臨川云閑時用意帰詩筆静外安生比太山坡云水洗禅心都眼静山供詩筆總眉愁同上唐朝人士以詩名者甚衆徃徃因一篇之善一句之工名公先逹為之㳺談延譽遂至聲聞四馳曲終人不見江上数峯青錢起以是得名故囯三千里深宫二十年張祐以是得名㣲雲淡河漢踈雨滴梧桐孟浩然以是得名兵衛森畫㦸宴寝凝清香韋應物以是得名野火燒不盡東風吹又生白居易以是得名𫾣門風動竹疑是故人来李益以是得名鳥宿池中木僧𫾣月下門賈島以是得名畫棟朝飛南浦雲珠簾暮捲西山雨王勃以是得名華𥚑織翠青如葱入門下馬氣如虹李賀以是得名然觀各人詩集平平處甚多豈皆如此句㢤古人嘗謂嘗鼎一脔可以盡知其味恐未必然尔杜子羙云為人性僻耽佳句語不驚人死不休則是凢子羙􅎍中流出者無非驚人之語矣讀其集者當知此言不妄殆非前数公之可比倫也葛立之李義山任弘農尉嘗投詩謁告云却羡卞和雙刖足一生無復沒堦趋雖為樂春罪人然用事出人意表尤有餘味英俊陸沉強顔低意趋跖諾虎扼腕不平之氣有甚扵傷足者非粗知直巳不丼心扵病畦下者不䏻賞此語之工也陽秋郛子稍斈作小詩嘗賦梅芲云玉屑装龍脑雲衣覆麝臍何堪夜耒雪香色雨凄迷留友人詩云良友間何闊春事遽如許劳君下鷗沙一葉繫春渚昨夣堕前世再見欣𣣔舞聊呼花底盃酒面點紅雨狂歌謝貫珠􅌐駒夫可歌妙句湏君吐觀此数語似粗知詩家畦逕斈之不已必佳但恐其中堕爾同上陸士衡文賦云立片言以居要乃一篇之警䇿此要論也文章無警䇿則不足以傳世盖不能竦動世人如老杜及唐人諸詩無不如此但晋宋間人專致力於此故失扵綺靡而無髙古氣味老杜句云句不驚人死不休所謂驚人句即警䇿也吕氏童蒙訓句法門前人文章各自一種句法如老杜今君起拖春江流予亦江邊具小舟同心不减骨親毎語見許文章伯如此之類老杜句法也東坡秋水今㡬竿之類自東坡句法魯直之夏扇曰在摇行樂亦云聊此魯直句法也學者若能遍攷前作自然度越流軰同上淵明退之詩句法分明卓然異衆惟魯直為能深識之斈者若䏻識此等語自然過人阮嗣宗詩亦然徐師川云作詩囬頭一句叢為難道如山谷詩所謂忽思鍾陵江十里之類是也他人豈如此尤見句法安壮山谷平日詩多用此格徐師川云為詩文常患意不属或只得一句語意便盡𣣔足成一章又悪其不相稱師川云但能知意不属則斈可進矣凢注意作詩文或得一两句而止若未其次句即不若且休飬銳以待新意若盡力湏要相属譬如力不敵而苦戰一敗之後意氣沮矣王荆公好集句嘗扵東坡處見古硯東坡令荆公集句荆公云巧匠斵山骨只得一句遂逡巡而去山谷嘗有句云琪璘卧塟功名骨終身不得好對同上荘子文多竒变技経肯綮之未嘗乃未嘗技經肯綮也詩句時有此法如昌黎一蛇两頭見未曽拘𬋩計日月𣣔進又不可君𣣔強起時難東坡云迨兹霜雪未兹謀待君必聊亦記吾曽餘人罕敢用黄常明苦吟門山澤之儒多癯詩人尤甚子羙有思君令人痩樂天云形容瘦薄詩情苦豈是人間有相人又云貌将松共瘦心與竹俱空李商隱瘦盡東陽姓沈人掉頭撚髭之苦豈有張頥豊頰者㢤沈昭略嘗戯王約以肥而癡荅以瘦而狂昭略喜曰瘦已勝肥狂已勝痴同上賈島詩如鳥従井口出人從岳陽來貫休此夜一輪滿清光何處無皆經年方得句以見其詞澁思苦若非好事者誇辞亦繆用其心也同上後山詩話云荆公詩力去陳言誇末俗可憐無𥙷費精神而公平生文体数変莫年詩益工用意盖苦故言不可不謹也蔡寛夫詩話云司空圖善論前人詩如謂元白為力勍氣僝乃都㑹之豪估郊島非附於寒澁無所置才皆切中其病及自評其作乃以南樓山最秀北路邑偏清為假令作者復生亦當以着題見許此殆不可曉當局者迷固人情之通患如樂天所謂属石破山先觀鑱迹發矢中的兼听弦聲使不見其詩而聞此語當以爲如何㢤冷齋夜話云賈島詩有影略句韓退之喜之其渡枽乾詩曰客舎并州三十霜帰心日夜憶咸陽而今更渡桑乾水却望并州是故鄉又赴長江道中詩曰䇿杖离山馹逢人問梓州長江那可到行客替生愁隱居詩話云孟郊詩蹇澁窮僻瑑削不暇苦吟而成觀其句法格力可見矣其自謂夜吟曉不休苦吟鬼神愁如何不自閑心與身為仇而退之薦其詩云荣華肖天秀捷疾愈响報何也蘇子由云唐人工扵為詩而陋扵聞道孟郊嘗有詩云食虀腸亦苦強歌聲無歡出門即有碍誰謂天地寛郊耿介之士雖天地之大無以容其身起居飲食有戚戚之憂是以卒窮以死而李翶稱之以為郊詩髙處在古無上平處猶下頋沈謝至韓退之亦談不容口甚矣唐人之不聞道也孔子稱顔子在陋巷人不堪其憂囬也不改其樂囬雖穷困早死而非其處身之非可以言命與郊異矣百家詩話總龜後集卷之二十
