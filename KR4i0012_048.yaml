front:
  text: 增修詩話總龜卷之四十八
  hash: sha256:e417aca96d16bbd2bd1d27b33cc5dffdf349ca81e834958cb7dcee6be12b1baf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_048-1a}
body:
  text: 鬼神門余與魯直夀朋天啓㑹子伯時齋看詩卷皆仙鬼作或夢中所作也又記太平廣記中有人為鬼物所引入墟墓皆華屋洞戸忽為刼墓者所驚出遂失所見但云芫花半落松風晚清吾每愛此两句故附之書末王著洛陽人也七歲能属文十四進士及第初依師冤勾縣張嘏東京應舉乆不知消息賃居相國寺東因出通衢忽遇張嘏遂邀茶肆叙闊至乃才蝴蝶詩最嘉云今夜君棲芳艸裏為傳消息到王孫嘏無言忽然不見著驚問郷人云卒已半年著自及第便歴華省至翰林學士只及中年而終郡閣雅談西川宰相高駢版築羅城日有守禦指揮使姜知古分得西南趙波塊即趙畚相公墳也知古號令候䁱開之是夜有人黄衣束帶瘦骨長卓立于知古前曰趙相公使上書知古驚覧書末後有詩一首頃之鬼不見詩云我昔勝君昔君今勝我今人生一世第何用苦相侵保大中廣陵裡城隍因及古塜得石誌一所云日為箭兮月為兮四時射人兮無窮但得天將明月花不覺人隨流水空山川秀兮碧穹窿崇夫人墓兮直其中猿啼烏嘯烟濛濛千年萬年松栢風或云李白詞南唐近事甘露寺僧話吴王收得浙右之明年夏中夜月瑩無雲長江如畫有僧持課俄數人自西軒領僕厮軰挈酒上江亭而止夣明月宰相遇坐定命酒羅列昊竊窺之思中夜禁行從何而至必是幽虚扵牕隙俯伏伺之東向一人衣南朝衣西向一人北虜衣北向一人衣縫掖衣指南向者設禮而坐東向一人衣朱衣霜簡清痩多髯飛杯之次東向者曰今日恣縱江南之㳺皆不乏風流矣僕嘗記公云何人種得西施花千古春風開不盡可謂越古超今矣酒至西虜服曰各述旦曩日臨危一言曰趙䑓能爲賦邢陽解獻書可惜西川水不救轍中魚次至縫掖舉白而歌曰偉㢤横海鱗壯矣垂天翼一旦失風水翻爲螻蟻食廵至東向云功遂侔昔人保退無智力旣渉太行險兹路信難渉次至朱衣乃高吟曰握裏龍蛇𥿄上鸞逡廵千幅不將難顧雲已徃羅隱耄更有何人逞筆端吟罷東樓晨鍾遽鳴僧户軋然而啓忽尔而散桂花叢談秦太虚言寳應民有嫁娶㑹客者有客徑起出門若醉甚將赴水者人急持之客曰有婦人以詩招我其詞云長橋直下有蘭舟破月衝烟任意逰金玉滿堂何所用争如年少去來休倉皇就之不知其為水也然客亦無他夜㑹說鬼與參寥參寥舉此聊為記之東坡詩話唐丞相馬植弟固武威太守固弟西河太守二弟聞植罷安南都護又除黔南不得意維舟峽中古寺前夜月如晝見白衣人緩歩隄上吟曰栽竹爲筒作笛吹鳯凰池上鳯凰飛勞公更向黔南去即是陶鈞萬類時歴歴可聽遣人尋訪已失之後黔南去再入爲大理卿遷刑部侍郎判塩鐡遂大拜大暦元年元載因早朝有人獻詩載令左右收之候入中書看其人曰若不能讀請自誦一篇曰城東城西舊行處城裏花飛柳如絮海燕㗸泥欲下來屋裏無人却飛去吟畢不見乃知其非人也載後敗家破妻𬒳戮馮翊夏陽縣㩀大河有兾河清澈可鍳大和中縣尉趙生一夕與同軰聮歩望月扵兾泉上忽有人貌甚黒緑𫀆自泉中出徐吟曰夜月明皎皎緑波空悠悠生且驚其水溺明日生再逰兾水見廟中土偶人𬒳緑𫀆視之其貌乃昨日吟詩人也元和中有陸橋家于丹陽居有池塘亭榭一夕有人叩門急視見一人儀狀秀逸自稱曰沈約聞公雅好詩故來奉謁旣而呼左右曰召青箱來有一児年可十歲約曰此吾子也欲使紹吾學故名青箱然亦能詩從吾與范僕射過䑓城曾作感舊詩令諷之曰六代舊山川興王㡬百年䌓華今寂寞朝市昔喧闐夜月琉璃水春風柳色天傷時爲懐古垂涙國門前忽不見唐燕士晋昌人隱于九華晚歩山下見一白衣少年閒歩自若曰澗水潺湲聲不絶溪壠茫茫野花發自來自去人不知歸時長對空山月歸問里人曰是呉氏子善詩卒僅數年矣錢起寓宿驛舎聞窓外有人曰曲終人不見江上數峰青起怪之十年後就試座主李時試湘靈鼓瑟詩落句意乆不屬遂以此一聮續之乃中魁選詩全篇云善鼓雲和瑟常聞帝子靈馮夷空自舞楚客不堪聽雅調悽金石清音發杳冥蒼梧來暮怨白芷動芳馨流水傳湘浦悲風過洞庭曲終人不見江上數峰青劉山甫隨侍官扵嶺外北歸泊舟洞庭登㟁見有北方毗沙門天王廟祠因謁之見廟宇頽圯乃題云壞墻風雨㡬經春艸色盈庭一座塵自是神仙無感應盛衰何得却由人是夜夣神責曰我南岳神也汝何相侮俄而風濤大作舟㡬覆悔謝徹去詩牌乃止古今詩話長安中秋望夜有人聞鬼吟曰六街皷歇行人絶九衢茫茫空有月又聞有和者云九衢生何勞勞長安土盡槐根高俗云務本西門是鬼市或風雨暝晦皆聞其喧聚之南部新書開元中有幽州衙校姓張妻孔氏生五子而卒後娶李氏妬悍狠戾虐遇五子鞭捶不其甚苦哭扵孔氏之墳母忽於塜中出撫其子悲慟乆之因以白布巾題詩贈張曰不分成故人泣涕每盈巾死生今有隔相見永無因盒裏殘粧粉留將與後人黄泉無用處浪作塜中塵有意憐男女無情亦任君欲知腸㫁處眀月照孤墳五子得詩以呈其父其父訴扵連帥連帥上聞李氏流嶺南建隆初有人行扵巴峽夜泊舟扵江涘忽有人諷詠曰秋逕填黄葉懸崕露艸根猿聲一呌㫁客旅數重魂其音苦切激昻而悲如是通宵九吟百遍𥘉疑舟行秀士也及曉訪之其所泊㟁殊無舟舸但空山䆳林溪谷絶幽尔㳂㟁尋訪數處有二脚迹長二尺許荆南復州門街東有劉氏舊宅宇舎横㫁敝壊鮮有人居梁太保震有逺房弟伯升秀才請居之貴其幽致而肄業旣憇馭月餘辰夕甚安一日晝寝夢魘乆之方寤乃曰適夣一女子緑裙紅䄂自東街而來泣而呼曰聴妾幽恨之句詩曰卜得上峽日秋江風浪多巴陵一夜雨腸㫁木蘭歌梁因稱嘆而覺竟無他說脞說後集鬼仙詩曰仙人未必便仙去還在人間人不知手把白鬚從两鹿相逢却問姓名誰又云江上檣竿一百尺山中樓䑓十二重山僧樓上望江上指點檣竿笑殺儂又云爺娘送我青楓根不記青楓幾回落當時手刺身上衣今日爲灰不堪着又曰酒盡君莫沽壺傾我當發城市多囂塵還山弄明月又云浦口潮來𥘉渺漫蓮舟溶漾采花灘芳心不愜空歸去㑹得潮平更折看又曰忽然湖上片雲飛不覺舟中雨濺衣折得荷花渾忘却空將荷葉盖頭歸又曰寒花白露裏亂山明月中是夕苦吟罷寒燭與君同黄魯直登荆州亭柱間有詞曰簾捲曲欄獨倚銀屏暮天無際淚眼不曾晴家在呉頭楚尾數點雪花亂委撲漉沙鷗驚起詩句欲成時没入蒼烟叢裏魯直曰似為予發筆勢類女子又有淚眼不曾晴句即鬼也是夕有女子絶艶見夣扵魯直曰我家豫章附舟墮水死于此登亭感而作不意公能辨之魯直覺曰此必呉城小龍女事同前佞媚門陳瑄太師任西川有愛姬徐氏郫城令之女也令欲求彭牧以紅絹數寸作二十八字遣其妻私示其女曰深宫冨貴事風流莫忘生身老骨頭因與太師歡笑處為吾方便覔彭州人皆鄙之鑑戒録鎮楊州請章孝標賦春雪孝標作詩曰六出花飛處處飄粘囱拂砌上寒條朱門到曉難盈尺盡是三軍喜氣消唐李嶠少負才華參知政事封鄭國公長夀中則天鑄八稜銅柱題曰大周萬國述徳天樞紀革命之功貶皇家之德天柱下置鐵山翁師子琪璘圍遶武三思為文朝士獻詩不可勝紀惟嶠詩冠絶當時曰轍迹光西崦勲庸紀北燕如何萬國㑹諷德九門前灼灼臨黄道迢迢入紫烟仙盤正下露高柱欲乗天山類叢雲起珠疑大火懸聲流塵作刼業固海成田聖澤傾堯酒薫風入舜絃忻逢下生日還遇上皇年后憲司發附㑹韋庶人左授滁州别駕大唐新語琢句門唐僧多佳句其琢句法比物以意而不指言一物謂之象外句如無可上人詩曰聽雨寒更盡開門落葉深是落葉比雨聲也又曰㣲陽下喬木逺燒入秋山是㣲陽比逺燒也用事琢句妙在言其用而不言其名耳此法唯荆公山谷東坡知之荆公曰含風鴨緑鱗鱗起弄日鵞黄裊裊垂此言水柳之用而不言水柳之名坡别子由曰猶勝相逢不相識形容變盡語音存此用事而不言其名山谷曰管城子無食肉相孔方兄有絶交書又曰語言少異無阿堵氷雪相看有此君又曰眼看人情如格五心知世事等朝三格五是融法也後漢注云常置人扵險處然句中眼者世尤不能解王荆公欲新政作雪詩曰勢合便疑包地盡功成終欲放春回農家不念豐年瑞只欲青雲萬里開韓魏公罷政判北京作園中行詩曰風定曉枝蝴蝶亂雨匀春圃桔橰閑意趣所至多見扵嗜好歐陽文忠公喜士爲天下第一好誦孔北海座上客常滿尊中酒不空之句范文正公清嚴而喜論兵好誦兵衛森畫㦸燕寢凝清香之句李師中送唐介謪官詩曰去國一身輕似葉高名千古重如山並㳺英俊顔何厚已死姦䛕骨尚寒已而聞介趂月首上任大悔乃以書索詩唐公笑曰吾正不用此無對屬落韻詩送還李乃悟一身千古非恊對與荆公措東坡逰羅浮詩曰潜鱗有飢蛟掉尾取渇虎我來方醉後濯足聊戯侮想見海上超放之類然蛟疑不能掉尾雪裏芭蕉也王榮老渡觀江風作不得濟父老曰公篋中畜竒物此江神極靈獻之當得濟榮老有玉麈尾端石硯宣包幛獻之皆不驗有魯直草書扇頭子題韋應物詩曰獨憐幽草澗邊生上有黄鸝深樹鳴春潮帶雨晚來急野渡無人舟自横取視儻恍之勢曰我猶不識鬼識之乎以獻之香火未收天水相照如鏡南風徐來㠶一飽而濟余謂神必元祐仙客不然何嗜之深也李白詩曰昔日芙蓉花今為㫁腸草以色事他人能得㡬時好陶弘景仙方注曰㫁腸草不可食其花羙好名芙蓉花柳子厚詩曰漁翁夜傍西巖宿曉汲清湘然楚竹烟消日出不見人欵乃一聲山水緑回看天際下中流巖上無心雲相逐東坡評詩云以竒趣為宗反常合道為趣熟味之此詩有竒趣其尾两句雖不必亦可欵乃相呼聲相應也冷齋夜話杜牧華清宫詩云長安西望綉成堆山頂千門次第開一騎紅塵妃子笑無人知道荔枝來尤膾炙人口㨿唐記明皇常以十月幸􅌐山至春即還宫是未嘗六月在驪山也然荔枝盛暑方熟詞意雖羙而失事實唐人題西山寺云㡬夜碍新月半江無夕陽或謂冠絶古今以其盡得西山之景趣也金山寺題者甚多而絶少佳句唯樹影中流見鍾聲两㟁聞又天多剰得月地少不生塵最為人傳誦要亦未為至工若用扵落星寺有何不可乎熈寜中介甫有句云天末海門横北固烟中沙岸似西興尤為中的遯齋閒覧增修詩話總龜卷之四十八終百家詩話捴龜後集卷之四十八䴡人門陳筑字夣和莆田人崇徳𥘉登第為福州古田尉既至官惑一倡周氏周能詩嘗有詩贈筑曰梦和殘月過楼西月過楼西夣巳迷喚起一声腸断処落花枝上鷓鴣啼首句蓋寓筑字也又有春時詩曰暼然飛過誰家燕驀地香耒甚処花深院日長無個亊一瓶春水自煎茶夷堅志徃時青幕之子婦妓也善為詩詞同府以詞挑之妓荅曰清詞䴡句永叔子瞻曽獨歩似恁文章冩得出耒當甚強後山詩話杭妓胡楚龍靚皆有詩名胡云不見當年丁令威年耒処処是相思若将此恨同芳草却恐青青有尽時張子野老于杭多為官妓作詞而不及靚靚献詩云天與群芳十様葩獨分顔色不堪誇牡丹芍藥人題徧自分身如鼓子花子野扵是為作詞也同上蘇子瞻通判錢唐嘗權領郡事新太守将至營妓陳状以年老乞出籍從良公即判曰五日京兆判状不難九尾野狐從良任便有周生者色藝為一郡之最聞之亦陳状乞嫁公惜其去判云慕周南之化此意誠可嘉空冀北之群所請冝不允其敏捷喜謔如此澠水燕談録韓魏公為陜西安撫開府長安李待制師中過之李有詩名席間使為官妓賈爱卿賦詩云願得貔貅十萬兵大戎巢冗一時平㱕耒不用封侯印只問君王乞爱卿后山詩話李元膺喪妻作長短句云去年相逄深院宇海棠下曽歌金縷歌罷花如雨翠羅衫上點点紅無数今歲重㝷携手処空物是人非春暮囬首青門路乱紅飛絮相逐東凨去元膺㝷亦卒冷齋夜話杜大中自行伍行将與物無情西人呼為杜大䖝虽妻有過亦公杖杖之有爱妾才色俱羙大中牋表皆此妾所為一日大方寢妾至見几間有𥿄筆頗佳因書一闋寄臨江仙有彩鳯随鵶之語大中斍而視之云鵶且打鳯扵是掌其面至項折而斃今是堂手録東坡在豊城有老人生子爲具召東坡且求一詩東坡問翁年夀幾何曰七十翁之妻幾何曰三十東坡即席戯作八句其警聮云聖善方當而立歲乃翁巳及古希年迍齋閑覧治平中錢忠道過呉江爱其凬物清佳晋恋不能去諷詠逰賞遇一女子小舟獨棹扵煙波浩渺間忠恱之作詩贈女子其警句云滿目生涯千頃浪全家衣食一輪竿女子得詩携之㱕呈其父其父蓋隱淪客也喜忠此詩遂以女子奉忠箕箒泛舟同入烟波不知所徃青瑣白藕作花凬巳秋不堪殘睡更囬頭晚雲帶雨㱕飛急去作西窓一夜愁此趙徳麟細君王氏所作也徳麟既鰥居因見此篇遂與之為親余以為乃二十八字媒也徳麟名令畤東坡作秋陽賦云越王之孫有賢公子宅扵不土之里而詠無言之詩蓋畤字也坡云且教人別処使不得苕溪漁隱曰徳璘小詞有臉薄難藏泪眉長易斍愁之句人多称之乃全用也香奩集桃花臉薄難蔵泪栁葉眉長易斍愁一聮詩但去其上四字耳王直方詩話毛逹可未第時其内以一詩寄之云剔燭親錦字書擬慿㱕鴈寄天隅經年未報于秦䇿不識如今舌在無寄齋録近時媍人能文詞如李易安頗多佳句小詞云昨夜雨踈凬驟濃睡不消殘酒試問捲簾人却道海棠依舊知否知否應是緑肥紅瘦緑肥紅瘦此言甚新又九日詞云簾捲西凬人似黄花瘦此語亦媍人所難到也易安再適張舟未幾反目有啓事與綦処厚猥以桒榆之晚景配茲駔儈之下材傳者争笑之苕溪漁隱朝奉郎丘舞中諸女皆能文詞每兄弟内集必聮詠為樂其仲嘗作寄夫詩云簾裡孤灯斍曉遅獨眠留得宿得粧眉珊瑚枕上驚殘梦認得䔥郎馬過時苕溪漁隱近世婦人多能詩徃徃有臻古人者王荆公家能詩者最衆張奎妻長安縣君荆公之妹也佳句為最草草盃􅐻供笑語昏昏灯火話平生呉安持妻蓬䒹縣君荊公之女也有句云西凬不入小窓紗秋意應怜我憶家極目江山千萬恨依前和泪看黄花刘天保妻平甫女也句有不縁燕子穿簾幙春去春来可得知荆公妻呉國夫人亦能文嘗有小詞約諸親逰西池有待得明年重把酒携手那知無雨又無風皆脱洒可喜之句也隱居詩話作詩押韵是一巧中秋夜月詩押尖字数首之後一媍人云蚪胎光透亮犀角暈盈尖許彦周詩話廣漢营妓小名僧児秀外惠中善填詞有戴者忘其名两作漢守寵之旣而得請玉局之祠以㱕僧兒作滿庭芳見意云團菊包金叢蘭减翠畫成秋暮凬烟使君㱕去千里倍澘然两度朱轓鴈水全勝得陶侃當年如何見一時盛事都在送行篇愁煩梳洗懶㝷思陪宴花月湖边有多少凨流徃事萦牽聞道霓旌羽駕看看是玉局神仙應相許冲雲破霧一到洞中天苕溪漁隱姑蘇官妓姓蘇名瓊行第九蔡元長道過蘇州太守召飲元長聞瓊之能詞因命即席為之乞韵以九字詞云韓愈文章蓋世謝安情性凬流良辰美景在西楼敢勸一巵芳酒記得南宫髙過弟兄争占鰲頭金炉玉殿瑞烟浮髙占甲科第九蓋元長奏名第九也復齋漫録夏均父嘗言詩之比類直要相停常與客泛舟載肥妓而飲濁酒其詩曰蟻浮金椀濁妓壓畫船低詩說隽永文潞公守洛冨鄭公致仕司馬温公宫祠范蜀公自許下耒同過郡㑹出四玉杯勸酒官妓不謹碎其一潞公将治之温公請書牘尾云玉爵弗揮典礼虽聞扵徃記彩雲易散過差可恕扵斯人乃笑而釋之東坡自錢塘𬒳召過京師林子中作守郡有會坐中營妓出牒鄭容求落籍髙莹求從良子中命呈東坡東坡索筆為减字木蘭花書牒後云鄭荘好客容我樽前先堕幘落筆生凬籍籍声名不負公髙山白早莹骨氷肌那觧老從此南徐良夜清凨月滿湖暗用此八字扵句端也苕溪漁隱曰聚蘭集載此詞乃東坡贈潤守許仲凃且以鄭容落籍髙莹從良為句首非林子中也同上江寕章文虎其妻劉氏名彤文羙其字也工詩詞嘗有詞寄文虎云千里長安名利客輕离輕散㝷常難禁三月好凨光滿堦芳草緑一片杏花香記得年時臨上馬看人泪眼汪汪如今不忍更思量恨無千日酒空断九囬腸又云向日寄去詩曲非敢為工蓋𣣔道衷腸萬一耳何不掩悪輒示他人適足耴笑文虎也本不復作然意有所感不自巳小詩二章章四句奉其一云碧紗窓外一声蝉牽断愁腸懶昼眠千里才郎帰未得無言空撥玉炉烟其二云畫扇停揮白日長清凬細細襲羅裳女童耒報新難酒安得良人共一觴苕溪漁隱祭文唐人多用四六韓退之亦然故李易安祭趙湖州文云白日正中歎龎翁之機捷堅城自堕怜𣏌婦之悲深媍人四六工者四六談塵今代婦人能詩者前有曽夫人魏后有易安李李在趙氏時建炎𥘉從秘閣守建康作詩云南耒尚怯呉江冷北狩應悲易水寒又云南渡衣冠少北耒消息欠劉琨詩説雋永山谷戯聞喜遣侍児耒促詩云日遣侍児耒報嘉草鞋十里踏堤沙鳩盤茶様施丹粉只欠一枝萵苣花其醜陋可想山谷亦善戯也苕溪漁隱劉偉明既䘮爱妾而不能忘為清平樂詞云東凬依舊着意隋堤栁槎得鵞児黄𣣔就天色清明時候去年紫陌青城今朝雨魄雲魂断送一生憔悴知他幾個黄昏與唐阿灰之詞有間矣復齋漫録陸敦礼藻有侍児名羙奴善綴詞出侑樽爼每丐韵扵坐客頃刻成章卜筭子云送我出東門乍別長安道两岸垂楊鎻暮烟正是秋光老一曲古陽関莫惜金墫倒君向瀟湘我向秦魚鴈何時到如梦令云日暮馬嘶人去舡逐清波東注後夜最髙楼还肯思量人否無緒無緒生怕黄昏踈雨苕溪漁隱王定囯嶺外帰岀歌者勸東坡酒坡作定凬波序云王定囯歌児曰柔奴姓宇文氏眉目姢䴡善應對家世住京師定囯南迁㱕余問柔廣南凬土應是不好柔對曰此心安処便是郷因為綴此詞云常羡人間琢玉郎天教分付点蘇自作清歌傳皓齒凬起雪飛炎海変清凉万里帰耒年愈少㣲笑笑時猶帶嶺梅香試問嶺南應不好却道此心安処是吾郷東皐雜余觀古今詩話翰府名談皆載冦莱公侍児蒨桃詩二首和章一首並同翰府名談仍益以恠辭吾所不取今但筆其詩云公自相府出鎮北門有善歌者至庭下公收金鍾獨酌令歌數闋公贈之束綵歌者未滿蒨桃自内窺之立爲詩二章呈公云一曲清歌一束綾羙人由自尚嫌輕不知織女瑩窓下㡬度抛梭織得成其二云夜冷衣单手屡呵幽䆫軋軋度寒梭臘天日短不盈尺何似妖姬一曲歌公和云將相功名終若何不堪急景似奔梭人間萬事君休問且向樽前聽豔歌同上百家詩話總龜後集卷之四十八
