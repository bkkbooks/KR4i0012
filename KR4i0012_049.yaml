front:
  text: 集一百家詩話緫龜後集卷之四十九
  hash: sha256:f283454efd1987f2212ea726ab30091d27a072b3980bd412ab1adc188bdeed77
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_049-1a}
body:
  text: 飲食門唐御食紅綾餅餤爲上光化中放進士裴格盧延孫等二十八人燕於曲江勅太官賜餅餤止二十八枚而巳延遜後入蜀頗為蜀人所易嘗有詩云莫欺零落殘牙齒曾吃紅綾餅餤来其爲當世所貴重如此酉陽雜爼載衾冠家有䔥家餫飩庾家粽子韓約櫻桃饆饠又有胡突鱠麞皮索餅之類號為名食不至於甚侈而羙有餘亦紅綾餅餤之類也晋史稱何劭驕奢簡貴衣裘服玩新故巨積食必盡四方珍異一日之供以錢二萬爲限而曽所食而曽所食不過萬錢是劭之自奉侈於父也而劭贈張華詩乃云周旋我陋圃西瞻廣武廬旣貴不忘儉處約能存無鎮俗在簡約塞門焉足摹是以姬孔爲法以𬋩氏爲戒也審能如是則史所書又如何㢤以史為正則邵所言誣矣東坡擷菜詩云秋來霜露滿東园盧服生兒芥有孫我與何曾同一飽不知何苦食鷄豚苟能如此則豈肯縦嗜𣣔於口腹之間㢤酉陽雜爼載鄭慤嘗於使君林避暑取蓮葉以簮刺其心令與柄通其屈莖如象鼻傳酒噏之名為碧筒盖取蓮葉芳馨之氣雜於酒中爲可喜也故東坡詩云碧筩時作象鼻湾白酒微帯荷心苦是巳大抵醪醴之妙籍外而發其中則格髙而味竒如大宛之葡萄大官之挏馬皆藉他物以成者趙德麟以黄柑醸酒東坡嘗作洞庭春色賦遺之所謂命黄頭之千奴卷震澤而俱還坡亦以松明醸酒所謂味甘餘而小苦歎幽姿之獨髙二酒至今有用其法而爲之者至坡在黄州自作蜜酒惠州自作桂酒皆一世而止盖出於一時之戲劇未必皆中節度爾同上酒之種多矣有以緑爲貴者白樂天所謂傾如竹葉盈樽緑是也有以黄為貴者老杜所謂鵞兒黄似酒是也有以白為貴者樂天言玉液滿金巵是也有以碧爲貴者老杜所謂重碧酣春酒是也有以紅爲貴者李賀所謂小槽酒滴珍珠紅是也今閩廣間所醸酒謂之紅酒其色殆類臙脂酉陽雜爼載賈􅟚家蒼頭能别水常乗小艇於黄河中以瓠匏接河源水以醸酒經宿色如綘名爲崑崙觴是又紅酒之尤者也同上張衡曰客賦醉言歸稱露未晞王式曰客歌􅌐駒主人歌庸歸賓主之情可謂粲然者至李太白陶淵明則不然各常爲詩曰我醉欲眠君且去雖曰任真之言然亦太無主人之情矣司馬温公獨樂园飲云浩歌縦飲任天機莫使歡娯與性違玉枕醉人從獨卧金羇倦客聽先歸其亦二子之意也白樂招客飲云客告暮將歸主称日未斜又命小青娥長跪謝貴客其視張衡王式尤爲有委曲相者然置酒送李漳州詩曰獨醉似無名借君作題目又何與招客飲之詩異乎東坡醉眠亭詩云醉中對客眠何害湏信陶潜未苦賢山谷云欲眠不遣客佳䖏更難忘如是則不失賓主之禮又有可以通我之情是賓主之情兩得矣同上賢者豹隱墟落固當和光同塵雖舎者争席何病而况於杯酒之間㢤陶淵明杜子羙皆一世偉人也毎田父索飲必使之畢其歡而盡開情而後去淵明詩云清晨聞叩門倒裳徃自開問子為誰歟田父有好懐壼漿逺見候疑我與時乖老杜詩云田翁逼杜曰邀我嘗春酒呌婦開大瓶盆中為吾取二公皆有位者也於田父何拒焉至於田父有一世皆尚同願君汨其泥之說則姑守陶之介久客惜人情如何拒隣叟則何妨杜之通乎陽秋復齋漫録云唐李敬方歡醉詩云不向花前醉花應觧笑人只因連夜雨又過一年春日日無窮事區區有限身若非盃酒裏何以寄天真杜子羙絶句云二月巳破三月漸老逢春能㡬逥莫思身外無窮事且盡生前有限盃二詩雖相縁而杜則尤其工者也世所傳相逢不飲空歸去洞口桃芲也笑人之句盖出於方敬詩說隽永云福州嶺蛤蠣號西施舌極甘脆其出時天氣正熱不可致逺吕居仁有詩云海上凢魚不識名百年生命一杯羮無端更號西施舌重與児曹起妄情藝苑雌黄云河豚所附本草云味甘温日華子云有毒予按倦㳺雜録云河䐁魚有大毒肝與卵人食之必死暮春栁花飛此魚能大肥江淮人以時為珍更相贈遺腐其肉雜蔞荻芽瀹而爲羮或不甚熟亦能害人歲有𬒳毒而死者南人嗜之不巳故聖俞詩春洲生荻芽春岸飛楊花河䐁當此時貴不数魚鰕而其後又云炮煎苟失所轉喉為莫耶如此則其毒可知本草以爲無毒悞矣或云河䐁子不可食其大纔一粟浸之經宿如弹丸人有中其毒者以水調炒槐花末及龍腦皆可觧予嘗見其漁者說其所取之由曰河䐁盛氣善怒毎伏水底必設網於上故以物就而觸之彼将奮怒而上遂爲所獲呉人珍之以其腹腴為西施乳予嘗戲作絶句云蔞蒿短短荻芽肥正是河豚欲上時甘羙逺勝西子乳呉王當日未曽知雖然甚羙必甚悪河䐁味之羙也呉人嗜之以䘮其軀西施色之羙也呉王好之以亡其國兹可以爲來者之戒噐用門舒王作前元豊行云倒持龍骨掛屋後元豊行云龍骨長乾掛梁梠龍骨水車也是歲豊稔故龍骨掛而不用又有寄楊徳詩云遥聞青秧底復作龜兆拆脩脩雨龍骨豈得長掛壁是歲亢旱反前詠爾東坡亦有水車詩云翻翻聮聮衘尾鴉犖犖确确蛻角蛇分畦翠浪走雲陣刺緑針抽稻芽天公不念老農泣喚取阿香推雷車言水車之利不及雷車所霑者廣矣䂬溪張景陽七命有浮三翼泛中沚之句故詩家多以三翼爲輕舟如梁元帝日華三翼舸元微之光隂三翼過是也按越絶書伍子胥水戰兵法内經曰大翼一艘廣一丈五尺二寸長十丈中翼一艘廣一丈三尺五寸長五丈大尺小翼一艘廣一丈二尺長九丈所謂三翼者皆巨戰船也用爲輕舟悞矣苕溪漁隱曰蘇叔黨過賦䑕鬚筆云太倉失陳紅狡穴得餘腐旣興丞相歎又發廷尉怒磔肉餧餓猫分髯雜霜兎挿架刀槊徤落𥿄龍蛇􅕽物利易未詰時來即
