front:
  text: 集一百家詩話總龜後集卷之四十九
  hash: sha256:a3db317a3512ed9c38113b3bf5bad679bc288678a189f3290eceba8c79fce9a2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_049-1a}
body:
  text: 飲食門唐御食紅綾餅餤為上光化中放進士裴格盧延孫等二十八人燕於曲江敕太官賜餅餤止二十八枚而巳延遜後入蜀頗為蜀人所易嘗有詩云莫欺零落殘牙齒曾吃紅綾餅餤來其為當世所貴重如此酉陽雜爼載衾冠家有蕭家餫飩庾家粽子韓約櫻桃饆饠又有胡突鱠麞皮索餅之類號為名食不至於甚侈而美有餘亦紅綾餅餤之類也晉史稱何劭驕奢簡貴衣裘服玩新故巨積食必盡四方珍異一日之供以錢二萬為限而曽所食而曽所食不過萬錢是劭之自奉侈於父也而劭贈張華詩乃云周旋我陋圃西瞻廣武廬既貴不忘儉處約能存無鎮俗在簡約塞門焉足摹是以姬孔為法以𬋩氏為戒也審能如是則史所書又如何哉以史為正則邵所言誣矣東坡擷菜詩云秋來霜露滿東園盧服生兒芥有孫我與何曾同一飽不知何苦食雞豚苟能如此則豈肯縱嗜𣣔於口腹之間哉酉陽雜爼載鄭慤嘗於使君林避暑取蓮葉以簮刺其心令與柄通其屈莖如象鼻傳酒吸之名為碧筒蓋取蓮葉芳馨之氣雜於酒中為可喜也故東坡詩云碧筒時作象鼻灣白酒微帶荷心苦是巳大抵醪醴之妙籍外而發其中則格髙而味竒如大宛之葡萄大官之挏馬皆藉他物以成者趙德麟以黃柑釀酒東坡嘗作洞庭春色賦遺之所謂命黃頭之千奴卷震澤而俱還坡亦以松明釀酒所謂味甘餘而小苦歎幽姿之獨髙二酒至今有用其法而為之者至坡在黃州自作蜜酒惠州自作桂酒皆一世而止蓋出於一時之戲劇未必皆中節度爾同上酒之種多矣有以緑為貴者白樂天所謂傾如竹葉盈樽緑是也有以黃為貴者老杜所謂鵝兒黃似酒是也有以白為貴者樂天言玉液滿金巵是也有以碧為貴者老杜所謂重碧酣春酒是也有以紅為貴者李賀所謂小槽酒滴珍珠紅是也今閩廣間所釀酒謂之紅酒其色殆類胭脂酉陽雜爼載賈􅟚家蒼頭能别水常乘小艇於黃河中以瓠匏接河源水以釀酒經宿色如綘名為崑崙觴是又紅酒之尤者也同上張衡曰客賦醉言歸稱露未晞王式曰客歌􅌐駒主人歌庸歸賓主之情可謂粲然者至李太白陶淵明則不然各常為詩曰我醉欲眠君且去雖曰任真之言然亦太無主人之情矣司馬溫公獨樂園飲云浩歌縱飲任天機莫使歡娛與性違玉枕醉人從獨卧金羇倦客聽先歸其亦二子之意也白樂招客飲云客告暮將歸主稱日未斜又命小青娥長跪謝貴客其視張衡王式尤為有委曲相者然置酒送李漳州詩曰獨醉似無名借君作題目又何與招客飲之詩異乎東坡醉眠亭詩云醉中對客眠何害須信陶潛未苦賢山谷云欲眠不遣客佳處更難忘如是則不失賓主之禮又有可以通我之情是賓主之情兩得矣同上賢者豹隱墟落固當和光同塵雖舍者爭席何病而况於杯酒之間哉陶淵明杜子美皆一世偉人也每田父索飲必使之畢其歡而盡開情而後去淵明詩云清晨聞叩門倒裳往自開問子為誰歟田父有好懷壼漿逺見候疑我與時乖老杜詩云田翁逼杜曰邀我嘗春酒呌婦開大瓶盆中為吾取二公皆有位者也於田父何拒焉至於田父有一世皆尚同願君汨其泥之説則姑守陶之介久客惜人情如何拒鄰叟則何妨杜之通乎陽秋復齋漫録云唐李敬方歡醉詩云不向花前醉花應解笑人只因連夜雨又過一年春日日無窮事區區有限身若非杯酒裏何以寄天真杜子美絶句云二月巳破三月漸老逢春能幾回莫思身外無窮事且盡生前有限杯二詩雖相緣而杜則尤其工者也世所傳相逢不飲空歸去洞口桃花也笑人之句蓋出於方敬詩説雋永云福州嶺蛤蠣號西施舌極甘脆其出時天氣正熱不可致逺吕居仁有詩云海上凡魚不識名百年生命一杯羮無端更號西施舌重與兒曹起妄情藝苑雌黃云河豚所附本草云味甘溫日華子云有毒豫按倦遊雜録云河豚魚有大毒肝與卵人食之必死暮春栁花飛此魚能大肥江淮人以時為珍更相贈遺腐其肉雜蔞荻芽瀹而為羮或不甚熟亦能害人歲有𬒳毒而死者南人嗜之不巳故聖俞詩春洲生荻芽春岸飛楊花河豚當此時貴不數魚蝦而其後又云炮煎苟失所轉喉為莫耶如此則其毒可知本草以為無毒誤矣或云河豚子不可食其大才一粟浸之經宿如彈丸人有中其毒者以水調炒槐花末及龍腦皆可解豫嘗見其漁者説其所取之由曰河豚盛氣善怒每伏水底必設網於上故以物就而觸之彼將奮怒而上遂為所獲吳人珍之以其腹腴為西施乳豫嘗戲作絶句云蔞蒿短短荻芽肥正是河豚欲上時甘美逺勝西子乳吳王當日未曽知雖然甚美必甚惡河豚味之美也吳人嗜之以喪其軀西施色之美也吳王好之以亡其國兹可以為來者之戒器用門舒王作前元豐行云倒持龍骨挂屋後元豐行云龍骨長乾挂梁梠龍骨水車也是歲豐稔故龍骨挂而不用又有寄楊德詩云遙聞青秧底復作龜兆拆修修雨龍骨豈得長挂壁是歲亢旱反前詠爾東坡亦有水車詩云翻翻聮聮銜尾鴉犖犖確確蛻角蛇分畦翠浪走雲陳刺緑針抽稻芽天公不念老農泣喚取阿香推雷車言水車之利不及雷車所霑者廣矣䂬溪張景陽七命有浮三翼泛中沚之句故詩家多以三翼為輕舟如梁元帝日華三翼舸元微之光隂三翼過是也按越絶書伍子胥水戰兵法內經曰大翼一艘廣一丈五尺二寸長十丈中翼一艘廣一丈三尺五寸長五丈大尺小翼一艘廣一丈二尺長九丈所謂三翼者皆巨戰船也用為輕舟誤矣苕溪漁隱曰蘇叔黨過賦鼠鬚筆云太倉失陳紅狡穴得餘腐既興丞相歎又發廷尉怒磔肉餧餓貓分髯雜霜兔插架刀槊健落𥿄龍蛇􅕽物利易未詰時來即
