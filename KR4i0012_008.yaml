  text: 增修詩話總龜卷第八
  hash: sha256:c88516542e89197dd03a9c44fe35e346cd6461b30b9d3b28633055246ddbef7c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_008-1a}
body:
  text: 評論門四韋蘇州云誰知風雨夜復此對床眠最為世所稱重而白樂天招張司業云能來同宿否聽此對床眠意亦相類然不為人知老杜云眼前無俗物多病也身輕而樂天有眼前無俗物身外即僧居之句世亦獨稱老杜直方詩話梁簡文云早知半路應相失不若從來本獨飛李義山云無事交渠更相失不及從來莫作雙而近時樂府亦云早知今日長相憶不及從來莫作雙此最為詩之大患樂天云哺啜眠糟甕流涎見麯車杜甫有路逢麯車口流涎而張文潛有寄豫詩云須看逺山相對蹙莫欺病齒惱衰翁自注云黃九謝人遺梅子詩有逺山對蹙之句乃知詩人取當時作者之語便以為故事此無他以其人重也舒王詩云投老歸來供奉班塵埃無復見鍾山何須更待黃粱熟始信人間是夢間又云黃粱欲熟日流連謾道春歸莫悵然蝴蝶豈能知夢事􅕋􅕋先墮晚花前又云客舍黃粱今始熟鳥殘紅柿昔分甘蓋三用黃粱而意義皆妙老杜對雪詩云有待至昏鴉乃引何遜城隂度塹黑昏鴉接翅歸之句余疑昏鴉亦常語何必引遜句後作絶句却云釣艇收緍盡昏鴉接翅歸秦少遊始作蔡州教授意謂朝夕便當入館步青雲之上故作東風解凍詩云更無舟楫礙從此百川通已而久不召用作送張和叔云大梁豪英海故人滿青雲為謝黃叔度鬢毛今白紛謂山谷也説者以為意氣之盛衰一何容易舒王送吳仲庶待制守潭云自古楚有材􅙩醁多美酒不知樽前客更待賈生否賈誼初為河南吳公召置門下而謪死長沙其用事之精余以為可詩法余最愛蘇黃門送文潞公云遍閲後生真有道欲談前事恐無人蓋潞公官爵年德難為形容非此兩句不能優遊而自見張文潛病中作七言詩蘇黃門和之云長空鴈過疑來答虛幌螢飛坐恐燒秦覯云文潛讀至此不樂余曰何也覯云虛幌坐燒近於死病人所諱歐陽文忠最愛林和靖云踈影橫斜水清淺暗香浮動月黃昏山谷以為不若雪後園林才半樹水邊籬落忽橫枝余以為其所愛者便是優劣耶此句于前所稱真可處伯仲耳而和靖又有詩云池水倒窺踈影動屋簷斜入一枝低歐陽文忠送張至祕校歸莊詩云鳥聲梅店雨柳色野橋春此茅店月板橋霜之意老杜云天闕象緯逼雲卧衣裳冷舒王云當作天閲謂其可對雲卧也古今人作昭君詞多矣余獨愛樂天一絶云漢使却回傳寄語黃金何日贖蛾眉君王若問妾顔色莫道不如宫裏時其意優遊而不迫切樂天賦此時年甚少李秉彛字德叟寄詩一卷與李希聲云此余近所作希聲讀至朋也老無能淡如雲水僧為之撫掌蓋洪龜父名朋善作詩德叟欲資其名失於點勘故耳老杜云何時一尊酒重與細論文而孟浩然亦有何時一尊酒重與李膺傾之句唐張子容作巫山詩云巫嶺岧嶤天際重佳期夙昔願相從朝雲暮雨連天暗神女知來第幾峰近時晏叔原作樂府云慿君問取歸雲信今在巫山第幾峰最為人所稱恐出于子容李賀高軒過中有筆輔造化天無功之句余每擊節此詩人之所以多窮也老杜云文章憎命逹恐亦出此陳無巳云石池隨處數逰魚余以為不若李希聲云緑淨隨時看上魚邵堯夫詠牡丹云施朱施粉色俱好傾國傾城艷不同可謂言工殊無高致張崏字子望作洛陽觀花云平生自是愛花人到處尋芳不遇真秪道人間無正色今朝初見洛陽春蓋托意邵堯夫堯夫和云造化從來不負人萬般紅紫見功真滿城車馬空撩亂未必逢春盡得春豈非欲使之有所行耳邵堯夫集平生所作為十卷號曰擊壤冨丞相作詩題其後云黎民於變似堯時便字堯夫德可知更覽新詩名擊壤先生全道略無遺為偉人所重如此郭功父少時喜誦文忠公詩一日過聖俞聖俞曰近得永叔書云作廬山高詩送劉同年效杜牧晚晴賦自以為得意恨未見此詩功父誦之聖俞擊節歎賞曰使吾更學作詩三十年不能道其中一句功父再誦不覺心醉遂置酒又再誦數行凡誦十數遍不交一言而罷明日聖俞贈功父詩曰一誦廬山髙萬景不可藏設如古畫師極意未能忘或云不及忘癸未正月三日徐師川胡少汲謝夷季林子仁潘邠老吳君𥙿饒次守楊信祖吳迪吉見過會飲於賦歸堂亦可為一時之盛潘一作詩歷數其人云胡子雲中白鶴林生初發芙蓉吳十九成雅奏饒三百錬竒鋒南州復見髙士東山行起謝公信祖真成德祖立之無愧行中吳生可共南郡老夫寧附石崇間雅巳傾重客説談仍得王戎冠蓋城南高會山隂未掃餘風客散日銜西壁主人不道尊空徐師川輩皆言此詩殊不工又六字無人曾如此作想為五言亦可遂去一字句皆可讀至老夫附石崇坐客無不大笑劉咸臨醉中嘗作詩話數十篇既醒書四句於後曰坐井而觀天遂亦作天論客問天方圓低頭慙客問蓋悔其率爾也參寥云舊有一詩寄少遊少遊和云樓閣過朝雨參差動霽光衣冠分禁路雲氣繞宫墻亂絮迷春闊嫣花困日長平康何處是十里帶垂楊孫莘老讀此詩至末句這小子又賤相發也少遊後編淮海集遂改云經旬率酒伴猶未厭長楊宗室士􅌔字明發喜作詩與畫嘗為高軒過圖張嘉甫題云顧長康善畫而不能詩杜子美善作詩而不能畫從容二子之間者王右丞也若明發蓋右丞之季孟云朝無咎亦題云嘉甫謂顧長康善畫而不能詩杜子美能詩而不能畫明發兼此二勝可在摩詰季孟間余以畫及詩信嘉甫之知言朝以道見之謂余能畫而不能詩乃可以為病豈有能詩而必又能畫耶夏雲多竒峰乃長康句謂不能詩可乎嘉甫既易於立論而無咎又便抑之大抵皆讀書少之過洪龜父有詩云胡生畫山水煙雨山更好鴻鴈書逺汀馬牛風雨草潘邠老愛其第二句余愛其第三句山谷愛其第四句徐師川愛其第三第四句逺汀後又改為逺空余云向上一句莫是公未有所得否何衆人之皆不好也龜父大笑劉壯輿云歐陽公自謂吾畏慕不可及者聖俞子美及贈詩云文會忝豫盟詩壇推子將又曰維持於文章泰山一浮塵既曰郊死不為島聖俞發其藏又曰堪笑區區郊與島螢飛露􅊜凝秋草是其自謂不如者乃所以過之也歐陽公云李白云落日欲沒峴山西倒著接㒿花下迷襄陽小兒齊拍手大家爭唱白銅鞮此常言也至於清風明月不用一錢買玉山自倒非人推然後見太白之橫放所以警動千古者顧不在於此乎甫之於白得其一節而精強過之余以為以此警動之耳田承君云歐陽公晚年最喜陳知默詩至云修方且欲學之陳詩不多見承君但見其兩聮云平地風煙橫白鳥半山雲木卷蒼藤雲埋山麓藏秋雨葉脫林梢帶晚風張文潛作虎圖詩云煩君衛吾寢振此蓬蓽陋坐令盜肉鼠不敢窺白晝潘邠老云却是貓兒詩文潛作輸麥行有云埸頭雨乾埸他白老稚相呼打新麥半歸倉廩半輸王免教縣吏相煎逼輸王乃老農語若時享歲貢納王勤王之類其語古矣秦少遊晚出左掖門有詩云金雀觚稜轉夕暉飄飄宫葉墮秋衣出門塵漲如黃霧始覺身從天上歸識者以為少遊作一黃本校勘而衒耀如此必不逺到洪駒父見陳無巳小放歌行云不惜捲簾通一顧怕君著眼未分明此為竒語蓋通字未嘗有人道余曰子豈不記老杜云簾户每冝通乳燕耶舒王有云却憶金明池上路紅裙爭看緑衣郎歐公謂舒王曰謹願者亦復為之耶趙德有詩云冥冥小雨不成泥參寥言冥冥之雨却是作泥者不若霏霏也以道以為然荆公嘗作一絶題張文昌詩後云蘇州司業詩名老樂府皆言妙入神看似尋常最竒崛成如容易却艱辛文昌平生所得荆公兩句言盡詩云壁門金闕倚天開五見宫花落石槐明日扁舟滄海去却將雲氣望蓬萊此劉貢父詩也自館中出知曹州時作舊云雲表荆公改作雲氣又云五見宫花落石槐此作詩法也王中至召至館中試罷作一絶題於壁云古木森森白玉堂長年來此試文章日斜奏賦長楊罷間拂塵埃看畫墻舊云奏罷長楊賦亦荆公所改石守道作三豪詩謂曼卿豪於詩永叔豪於文杜默豪于歌故詩云師雄二十二筆距猛如鷹玉川月蝕句意欲相慿陵而歐公亦有詩云南山有鳴鳯其音和自清鳴於有道國出則天下平杜默東土秀能吟鳯凰聲作詩幾百篇長歌仍短行杜默濮州人師雄其字謂豪于歌者有送守道六子詩云聖人門前大蟲及推倒楊朱墨翟扶起仲尼周公之句默詩謂之豪者豈在是耶余嘗得師雄全集觀之餘作皆不及此陳無已有寄眺以道詩云子較東方生自視何益損人言不當價一錢萬金産其後無巳又賦高軒過云滕王蛺蝶江都馬一𥿄千金不當價以道云陳三兩度不當價司空表聖自論其詩以為得味外味如緑樹連村暗黃花入麥稀此句最善又云棋聲花院閉幡影石壇高吾嘗獨逰五老峰白鶴觀松隂滿庭不見一人惟聞琴磬之音然後知此句之工但恨其寒儉有僧態若子美詩云暗飛螢自照水宿鳥相呼四更山吐月殘夜水明樓則才力冨健過表聖逺甚柳儀曹詩憂中有樂樂中有憂妙絶古今然老杜云王侯與螻蟻同盡隨丘墟儀曹何憂之深也有人云陳無巳閉門十日雨即是退之長安閉門三日雪余以為作詩者容有意思相犯亦不必為病但不可太甚耳並同前古有早行詩云主人燈下別羸馬月中行又王若云旅人心自急公子夢猶迷惟江東逸人王舉衮詩曰高空有月千門閉大道無人獨自行最為絶唱青瑣集范文正有採茶歌天下共傳蔡君謨謂希文公歌膾炙人口有少未完蓋公才氣豪傑失於少思希文曰何以言之謨曰昔茶句云黃金碾畔緑塵飛碧玉甌中翠濤起今茶之絶品其色貴白翠緑乃茶之下者耳希文曰君善鑒茶者也此中吾語之病也公意如何君謨曰欲革公詩二字非敢有加焉公曰革何字君謨曰翠緑二字可云黃金碾畔玉塵飛碧玊甌中素濤起希文曰善又見君謨之精茶希文之伏於義濮州杜默當年目之為三豪謂默豪於歌石守道赴詔作太學直講默作大字歌送之今舉其豪句云仁義途中馳騁詩書府裏從容頭角驚殺嘏蟹學海波中老龍爪距逐出狐兔聖人門前大蟲推倒楊朱墨翟扶起仲尼周公一條路出甕口幾程身在雲中水浸山影倒碧春著花梢半紅因此歌得在三豪之列又上永叔詩云一片靈臺挂明月萬丈詞熖飛長虹乞取一杓鳯池水活取久旱泥蟠龍其豪例皆此類並同前薛許州能以詩道為巳任還劉德仁卷有詩云百首如一首卷𥘉如卷終譏劉不能變態陸希聲之比北夢瑣言蜀沙門僧爾鳥慕李白歌鄙賈島蹇澀乃自諷其詞云鯨目光燒半海紅鰲頭浪蹙掀天白而云我不能致思于藩蘺蹄涔之間人咸服之仍精於周易佛經為歌行掩之賈島嘗為僧洛陽令不許僧午後出寺賈有詩云不如牛與羊猶得日暮歸詩思遲澀杼軸方得如鳥從井口出人自嶽陽來乃經年方遂偶句開元中有儒士登鍾南山得句云野逈雲根闊山高樹影長私心自負吟諷之際忽聞空中語云未若天河雖有浪月桂不聞香儒士不勝喜以為已有歸誇於僧智潛掩鼻笑曰臭氣可掬何足多也儒士驚愕遽以實告自此又號為鑑文大師有浮漚篇行於世零陵總記盧延遜詩淺近人多笑之惟吳融獨重其作盛稱於時且云此公不尋常後必垂名延遜詩至今傳之亦有絶好者宿東林云兩三條霓欲為雨七八箇星猶在天旅舍言懷云名𥿄毛生五門下家僮骨立六街中贈元上人云髙僧解語牙無水老鶴能飛骨有風蜀路云雲間聞鐸騾馱去雪裏殘骸虎拽來懷江上云餓貓臨鼠穴饞犬舐魚砧寄人云吟成一箇字撚斷數莖髭又云樹上咨諏批頰鳥窗間壁駁叩頭蟲余在翰林嘗召對上舉廷遜詩云臂鷹健卒懸氊帽騎馬佳人卷畫衫雖淺近亦自成一體談苑東坡嘗與人書言味王摩詰之詩詩中有畫觀摩詰之畫畫中有詩云藍田白石出玉關紅葉稀山路元無雨空翠濕人衣此東坡詩非摩詰也詩史吾詩云日日出東門步步東城逰城門抱關卒怪我此何求我亦無所求駕言寫我憂章子厚謂嵾寥曰前步而後駕何其上下紛紛也僕聞之曰吾以氣為輪以神為馬何曾上下乎參寥曰東坡文過有理似孫子荆曰枕流欲洗其耳東坡詩話山谷作漁父詞清新麗聞其得意自言以水光山色替却玊肌乃真得漁父家然才出新婦磯又入女兒浦此漁父無乃大瀾浪也百斛明珠文與可嘗云老僧墨竹一派近在彭城吾竹雖不及石似過之此一卷公案不可無山谷下一句山谷因次其韻云東坡雖是湖州派竹石風流過一時前世畫師今姓李不妨還作輞川詩或言東坡不曾目伯時為前身畫師俗人不便是語病伯時一丘一壑風流未減古人誰當作此癡計東坡此語是真相知又作二詩云秋山風雨石骨瘦法窟寂寥僧定時李侯有句不肯吐淡墨寫作無聲詩龍眠不似虎頭癡妙筆無機可並馳蘇仙呪墨作石竹應解種花聞此詩石曼卿詠紅梅云認桃無緑葉辨杏有青枝東坡云詩老不知梅格在更看緑葉與青枝荆公云北人𥘉未識渾作杏花看又能盡紅梅之妙處也有單葉梅千葉梅臘梅故余作四梅詩直方詩話山谷見東坡和淵明飲酒詩讀至前山正可數後騎且勿驅云此老未死在山谷嘗謂余曰凡作賦要須以宋玉賈誼相如子雲為師格略依放其步驟乃有古風老杜詠吳生畫云畫手看前輩吳生逺擅場蓋古人于能事不獨求誇前輩要須前輩中擅場耳東坡言淵明云但恐多謬誤君當恕醉人此未醉時説若醉何暇憂悮哉然世人言醉時是醒時此語最名言荆公始為集句多至數十韻往往對偶親切蓋以其誦古人詩多或坐中率然而成始可為貴其後多有人效之者但取數部詩集諸家之善耳故東坡次韻孔毅夫集句見贈云羡君戲集他人詩指呼市人如使兒天邊鴻鵠不易得便令作對隨家雞退之驚笑子美泣問君久假何時歸世間好事世人共明月自滿千家墀山谷云謝師厚方其為女擇對見山谷詩曰吾得壻如是足矣庭堅欲求之然庭堅之詩卒從謝公得句法故山谷有詩曰自往見謝公論詩得濠梁文忠公盤車圖詩云古畫畫意不畫形梅詩詠物無盡情忘形得意知者寡不若見詩如見畫東坡作韓幹畫馬圖詩云韓生畫馬真是馬蘇子作詩如見畫世無伯樂亦無韓此詩此畫誰當看又云論畫以形似見與兒童鄰君看賦詩者定知非詩人詩畫本一律天工與清新又云少陵翰墨無形畫韓幹丹青不語詩此畫此詩今已矣人間駑驥謾爭馳余每誦數過殆以為法並同前增修詩話總龜卷之八甲集終百家詩話總龜後集卷之八慱識門嘗觀臨川解我蔥珩脫盂勞嘗不曉孟勞何等物及觀穀梁傳注孟勞魯之寶刀黃常明子美於菟侵客恨乃楚人謂虎於菟土銼冷踈煙乃蜀人呼釡為銼冨豪有錢駕大舸方言南楚江湘凡船大者謂之舸百丈誰家上水船荆峽以竹為纜百丈塹抵公畦稜京師農人指田云幾稜去聲市暨瀼西巔夔人謂江水橫通山谷處為瀼子厚桃笙葵扇安可當宋魏之間謂簟為笙欵乃一聲山水緑乃楚人歌聲臨川窗明兩不借楚人以草屨為不借東坡倦看澀勒暗蠻村蓋嶺南竹名艾蓬沓障前赱風雨注云於潛婦人皆插大銀􅌨謂之蓬沓又幾思壓茅柴禁煙日夜急山谷燕􅊜社公雨鶯啼花信風皆方言也黃常明江漢有滸以扞制泛濫大漲則溢于平陸水退滸見舟人謂之水落糟又灘石湍激其中深僅可容舟者謂之洪若大水則不復問洪矣臨川萬里寒江正復糟東江水落水分洪以此亦謂水黃帽謂雲炮車非遐征逺涉不能知也同上柳讀書篇瘴疴擾靈府曰與往昔殊臨文乍了了徹卷元若無蓋常答許京兆書云往時讀書不至底滯今每讀一傳再三伸卷復觀姓氏在宗元則為瘴疴所擾它人乃公患也同上東坡云東來賈客木綿裘飲散金山月滿樓夜半潮來風又熱卧吹簘管到楊州集中題云夢中作蓋坡嘗衣此坐客誤云木綿襖俗飲散乃出此詩且云雖欲不可得也坐客大慙賈客事乃南史孔覬二弟頗營産業請假東還覬出渚迎之輜重二十餘船皆綿絹𥿄席之屬覬偽喜命且置岸側既而正色謂曰汝輩沗預士流何至還東作賈客邪命燒盡乃去䂬溪家家飬烏鬼沈存中以為鸕鷀説者謂非也元微之詩云病飬烏稱鬼巫占瓦代龜自注云南人染病競賽烏鬼楚巫列肆兢賣瓦卜此乃戲效俳體二首其二亦云瓦卜傳神語皆是處方言則烏鬼非鸕鷀不疑矣書史蓄胸中而氣味入於冠𥚑山川歷目前而英靈助於文字太史公南逰北涉信非徒然觀老杜壯遊云東下姑蘇臺已具浮海航到今有遺恨不得窮扶桑劍池石壁仄長洲芰荷香嵯峨閶門北清廟映池塘越女天下白鑑湖五月􅋽剡溪藴秀異欲罷不能忘歸帆拂天姥中歲貴舊鄉放蕩齊趙間西歸到咸陽其豪氣逸韻可以想見序太白集者稱其隱岷山居襄溪南逰江淮觀雲夢去之齊魯之吳之梁北抵趙魏燕晉西徙邠岐從金陵上尋陽流夜郎泛洞庭上巫峽白自序亦曰偶乘扁舟一日千里或遇勝景終年不移其恣橫採覽非其狂也使二公隱坐中書何以垂不朽如此哉燕公得助于江山鄭綮謂相府非灞橋那得詩思非虛語也學林新編云世傳織女嫁牽牛渡河相會某按史記晉天文志河鼓星在織女牽牛二星之間世俗因傳會為度河之説媟瀆上象無所根據淮南子云烏鵲填河成橋而渡織女荆楚歲時記云七夕河漢間奕奕有光景以此為候是牛女相遇也其説皆怪誕不足信子美牽牛織女詩曰牽牛出河西織女處其東萬古永相望七夕誰見同神光意難候此事終朦朦觀子美詩意不取世俗説也七夕乞巧見于周處風土記乃後人編類成書大抵𥘉無稽考不足信者多矣侯鯖録云東坡作雪詩云凍合玉樓寒起栗光搖銀海眩生花後見荆公云道家以兩肩為玉樓目為銀海是使此事否坡退曰惟荆公知此出處苕溪漁隱曰緗素雜記學林新編二家辨證乘槎事大同小異余今采托其有理者共為一説按張茂先博物志曰舊説天河與海通近世有人居海上者每年八月見浮槎來不失期齎一年糧乘之而去十餘日中猶觀星月日辰自後茫茫亦不覺晝夜奄至一處有城郭屋舍甚嚴遙望宫中有婦人織見丈夫牽牛渚次飲之驚問曰何由至此其人鋭以來意并問此是何處答曰君至蜀郡訪嚴君平則知之因還後以問君平君平曰某年月日有客星犯牽牛宿計年月正是此人到天河時也所載止此而巳而荆楚歲時記直曰張華慱物志云漢武帝令張騫窮河源乘桴經月而去一處見城郭如官府室內有一女織又見一丈夫牽牛飲河騫門云此是何處答曰可問嚴君平織女取機榰石與騫而還後至蜀問君平君平曰某年月日客星犯牛斗所得榰機石為東方朔所識亦其證焉按騫本傳及大宛傳騫以郎應募使月氏為胸奴所晉十餘歲得還騫身所至者大宛大月氏火夏康居而傳聞其旁大國五六具為天子言其地形所有並無乘槎至天河之説而宗凛乃傳會以為武帝張騫之事又益以榰機石之説何邪子美蘷府詠懷詩曰途中非阮藉槎上似張騫又秋興詩曰奉使虛隨八月槎如此類前賢多用之恐非實事杜子美詩喜用文選語故宗武亦習之不置所謂熟精文選理休覔綵衣輕又云呼婢取酒壼續兒誦文選是也唐朝有文選學而時君尤見欽重分别夲以賜金城書絹素以屬裴行儉是也外史檮杌載鄣奕嘗以文選教其于其兄曰何不教讀論語免學沈謝嘲風弄月汚人行止鄭兄之言蓋欲先德行而後文藝亦不為無理也丹陽集雪浪齋日記云昔人有言文選爛秀才半正為文選中事多可作本領爾余謂欲知文章之要當熱看文選蓋選中自三代涉戰國秦漢晉魏六朝以來文字皆有在古則渾厚在近則華麗也苕溪漁隱曰少陵宗武生日詩孰精文選理蓋為是也詩話乃云質之少陵昔逰詩昔者與李同登單父臺則知非吹臺三人能詞宗果登吹臺豈無雄詞傑唱著后世邪豫竊哂其弗細考前詩而妄為云云故具載之以顯其誤也苕溪漁隱曰學者欲慱讀異書余謂退之之進學解云上規姚娰渾渾無涯周誥湯盤詰屈聱牙春秋謹嚴左氏浮誇易竒而法詩正而葩下逮莊騷太史所録子雲相如同工異曲若只讀此足矣何必多嗜異書百家詩話總龜後集卷之八終
