front:
  text: 增修詩話總龜卷之四十
  hash: sha256:a6fd3e1a5412d0389925755b55ac14cd2a6f8b74457bc95c497de0cbabe3a4ff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_040-1a}
body:
  text: 樂府門鼓吹部中有拱辰𬋩即古人之義手𬋩也太宗賜今名邊軍捷回則連隊抗聲凱旋乃古之遺音其詞往往皆市井鄙俚語沈存中在鄜延時製十數曲令士卒歌之云先取西山十二州别分子將到衙頭始看秦塞低如馬漸見黃河直北流天威卷地過黃河萬里羌人盡撲歌莫堰橫山倒流水從教西去作恩波馬尾胡琴隨漢車曲聲由自怨單于彤弓莫射雲中鴈歸鴈如今不寄書旗隊渾如錦繡堆銀裝背傀打毬回先教淨掃安西路待向河源飮馬來靈武西涼不用圍畨家捴待納王師城中半是山西種由有當時乾吃兒古今詩話乾祐中國樂有米嘉榮何戡近有陳不謙不謙之子意奴三十年中絶不聞善唱盛以拍彈行于世拍彈起于李可及懿宗朝有恩澤曲子别趙十哭趙十之名劉夢得與米嘉榮詩云三朝供奉米嘉榮能變新聲作舊聲如今後輩欺前輩好染髭鬚學後生又自貶所歸京聞何戡歌云二十年來别帝京重聞天樂不勝情舊人唯有何戡在更令勤勤唱渭城盧氏雜記搢紳脞説載盧氏雜記曰歌曲之妙其來久矣國樂有米嘉榮何戡田順郎婦人有永新婦御史娘栁青娘張紅娘皆一時之妙也近有陳不謙子意奴三十年來絶不聞善歌者盛以拍彈行于世拍彈起于李可及懿宗恩澤最厚有别趙十哭趙十之名又與田順郎詩曰清歌不是世間音玊殿常聞稱帝心惟有順郎皆學得玊聲尤出九重深與御史娘詩曰天下能歌御史娘花前月底奉君王九重深處無人見獨把新聲傳順即白公聽田順歌曰戞玊𫾣水聲未停嫌雲不過入青冥安得黃金滿衫袖一時拋與斷腸聲咸通中丞相姑臧公拜端揆日自梁移鎮淮海郡寡勝逰之地且風亭月觀既以荒涼于戲馬臺連玊鈎道開創池沼建亭臺既畢號曰賞心浙右小校薜陽陶監押度支運米入城公喜其姓名試詢之果是舊人及問往日蘆𬋩之事因朱崖陸暢元白所撰歌萹一軸公益喜之以蘆管于兹亭奏之其𬋩絶微每一篳篥𬋩中常容三𬋩聲聲如天際自然來大佳之亦贈一篇略云虛心纎質鴈銜餘鳯吹龍吟㝎不如贈與甚豐授其子牢湓倅明皇樂工奔迫江潭間于湘中採訪使筵上唱云紅豆生南國秋來發幾枝贈公多採擷此物最相思又云清風明月苦相思蕩子從容十載餘征人去日殷勤囑歸鴈來時𢾗寄書皆摩詰所作也至今梨園歌焉坐中皆慘然時明皇思幸蜀也雲溪友議霓裳羽衣曲劉禹錫詩云三鄉陌上望仙山歸作霓裳羽衣曲王建詩曰聽風聽水作霓裳樂天詩注云開元中西涼府莭度使楊欽遠造鄭嵎津陽門詩注云葉法善常引明皇入月宫聞仙樂及歸但記其半遂以笛之會欽逺進波羅門曲與聲調相符遂以月中所傳為散序欽逺所進為腔號霓裳羽衣曲矣江南大理卿成文幼精為詞曲嘗作謁金門云風乍起吹皺一池春水李璟聞之召而謂之曰卿聀在典刑一池春水干卿何事文幼頓首江南馮延巳善為歌詞晏元獻善公所為歌詞不減馮也樂府木蘭花句都是七言晏詩云重頭歌咏響璁琤入破舞腰紅亂旋重頭入破皆弦𬋩家語也張子野郎中善歌詞常作天仙子云雲破月來花弄影士大夫皆稱之子野𥘉謁歐公迎之坐語曰好雲破月來花弄影恨相見之晚也有謂張子野曰人皆謂公為張三中即心中事眼中泪意中人也何不目之為張三影客不諭公曰雲破月來花弄影嬌柔懶起簾押捲花影栁徑無人墜風絮無影此平生得意句也林和靖工于詩文善為詞嘗作點絳唇云金谷年年亂生春色誰為主餘花落處滿地和煙雨又是離歌一闋長亭暮王孫去萋萋無數南北東西路乃草詞爾謂終篇無草字鼎州滄水馹有䇾薩蠻云平林漠漠煙如織寒山一帶傷心碧暝色入髙樓有人樓上愁玉梯空濘立宿鳥歸飛急何處是歸程長亭更短亭曽子宣家有古風集此詞乃太白作也古今詩話古人飲酒皆以舞相屬至于獻壽樽者往往亦舞長沙王少舉袖云國小不足回旋唐太宗自起舞屬群臣古人淳質舞以逹歡欣不必臻妙合度故人人可為之張燕公曰醉後歡更好全勝未醉時動容皆是舞出語捴成詩李白詩曰要須回舞袖拂盡五松山醉後涼風起吹人舞袖寒今時舞者皆曲捎益盡竒妙然非有詩士人不為也貢父詩話水調第五遍五言調聲最愁苦故樂天詩曰五言一遍最辛勤調少情多似有因不會當時翻曲意此時腸斷為何人舊説水調河傳隋煬啼將幸江都宫時所製曲成奏之聲韻悲切煬帝喜之樂工王令言聞而止之謂其弟子曰不返矣役竟如其説或詰其何知曰水調河傳但有去聲措紳脞説何滿子開元中犯罪繫獄中撰此曲白樂天云滄州人姓何名滿子鞠獄者愍而為奏之明皇弗許竟坐白樂天曰世稱何滿是人名臨孰罪時曲始成一曲回音并八疊從頭捴是斷腸聲脞説髙玲瓏餘杭之歌者白公守郡日與歌曰罷胡琴掩瑶瑟玲瓏再拜當歌出莫為使君不解歌聽唱黃雞與白日黃雞催曉丑前鳴白日催人酉后沒腰間紅綬繫未穩照裏朱顔看巳失玲瓏玲瓏奈老何使君歌了汝更歌元微之在越州聞之厚幣來邀樂天即時遣去到越州住月餘使盡歌所唱之曲即賞之後遣之歸作詩送行兼寄樂天曰休遣玲瓏唱我詞我詞都是寄君詩却向江邊整回掉月落潮平是去時秦少遊在處州夢中作長短句曰山路雨添花花動一山春色行到小溪深處有黃鸝千百飛雲當面化龍蛇夭矯轉空碧醉卧古藤隂下杳不知南北後南遷北歸逗留藤州終于光舉亭時方醉起以玊盂汲泉欲飲笑視而化冷齋夜話華亭船子和尚偈曰千尺絲綸直下垂一波才動萬波隨夜靜水寒魚不食滿船空載月明歸山谷改成長短句曰一波才動萬波隨蓑笠一鈎絲金鱗正在深處千尺也須垂吞又吐信還疑上鈎遲水寒江靜滿目青山載月明歸東坡携妓謁大通禪師大通愠色坡作長短句曰師唱誰家曲宗風有阿誰借君拍板與門捶我也逄場作戲莫相疑溪女方偷眼山僧巳皺眉莫嫌彌勒下生遲不見老婆三五少年時僧仲殊和曰解舞清平曲而令説向誰紅爐片雪上鉗捶打孰金毛師子也堪疑巳信身如夢何須眼似眉蟠桃巳是結花遲不向風前一笑待何時余登秋屏閣浩然有歸老之興作長短句寄意曰城裏久偷間塵涴雲山此生巳是再眠蠶隔岸有山歸去好萬壑千岩霜曉更憑欄減盡晴嵐微雲生處是茅庵試問此行誰作伴彌勒同龕東坡與少遊飲别維楊作虞美人詞曰波聲拍枕長淮曉隙月窺人小無情汴水自東流只載一船離恨向西州竹隂花圃曽同醉酒未多于泪誰教風鑒在塵埃醖造一場煩惱送人來世傳賀方回作也余與淵材牛渚間見長短句曰牛渚天門險限南北七英豪占青煙霧斂與間人登覽待月上潮平波灔灔寒𬋩孤吟新繫纜風滿檻歷歷數西州更點淵材恨不得腔乃撰其譜蓋賀方回作也並冷齋夜話增修詩話總龜卷之四十集一百家詩話總龜後集卷之四十癸集舒城阮一閲編皇明宗室月窗道人刋鄱陽程珖校神仙門陳東靖康間嘗飲於京師酒樓有倡打坐而歌者東不願乃去倚欄獨立歌望江南詞音調清越東不覺傾聽視其衣服皆故弊時以手揭衣爬搔肌膚綽約如雪乃復呼使前再歌之其詞曰闌干曲紅揚繡簾旌花嫩不禁纎手捻𬒳風吹去意還驚眉黛蹙山青鏗鐵板間引步虛聲塵世無人知此曲却騎黃鶴上瑶京風冷月華清東問何人製曰上清蔡真人詞也歌罷得數錢下樓亟遣僕追之巳失矣出夷堅志心事數莖白髮生涯一片青山空林有雪相待野路無人自還李主好書神仙隱遁之詞豈非遭罹多故𣣔脫世網而不得者邪東坡葛稚川神仙傳載王方平麻姑降蔡經家方平謂曰不見姑巳百年矣擘麟脯行酒而蔡經竊視麻姑手如鳥爪心念曰背蛘時正可爬背方任念而方平巳知責經曰麻姑神人汝何忽謂其手可爬背於是鞭經背皇祐中江西有一事正類此或題麻姑壇記以嘲之曰五百年來別恨多東征重得見青蛾擘麟方擬窮歡喜不禁間人背癢何隱居詩話劉跛子者青州人也拄一拐每歲必一至洛中看花館范家園春盡即還京師為人談噱有味范家子弟多狎戲之有大范者見之即與二十四金曰跛子喫半角小范者即與十金喫碗羮於是以詩謝伯仲曰大范見時二十四小范見時喫碗羮人生四海皆兄弟酒肉林中過一生張丞相召自荆湖時跛子與客飲市橋客聞車騎甚盛起觀之跛子挽其衣使且飲作詩曰遷客湖湘召赴京輪蹄迎送一何榮爭如與子市橋飲且免人間寵辱驚陳瑩中甚愛之作長短句贈之曰稿木形骸浮雲身世一年兩到京華人還乘興間看洛陽花聞道鞓紅最好春歸後終委泥沙忘言處花開花謝不似我生涯年華晉不住飢飱困寢觸處為家這一輪明月本自無瑕隨分冬裘夏葛都不會赤水黃芽誰知我春風一拐談笑有丹砂余政和春見於興國以詩戲之曰相逢一拐大梁間妙語時時見一班我欲從公蓬島去爛銀坑裏看青山豫姻家許中復之內乃趙槩參政之孫云我十許時見劉跛子來覔酒飲笑語而去計其壽百四五十許嘗書于京師新門張婆店三十年日坐相國寺東書邸中人無識之者冷齋夜話范致虛居方城有髙士館於家自言昔乃白髮社翁遇師授以神藥今年踰下夀顔渥如丹有孺子色既久歸晉一絶末句云莫訝杖藜歸去早舊山間却一溪雲西清詩話賣墨者潘谷余不識其人然聞其所為非市井人也墨既精妙而價不二士或不持錢求墨不計夛少與之此豈徒然者哉余嘗與詩云一朝入海尋李白空看人間盡墨仙一日忽取欠墨錢劵焚之飲酒三日發狂浪走遂赴井死人下視之蓋趺坐井中手尚持數殊也見張元明説如此東坡近有人逰羅浮晉一宿岩谷間中夜見一人身無衣而紺毛覆躰意必仙也乃再拜問道其人了不顧但長嘨數聲響振林木歌詩云雲來萬嶺動雲去天一色長嘯兩三聲空山秋月白西清詩話張亶熙寧中夢行人入空中聞天風海濤聲振林木徐見海中樓闕金碧瓊琚琅珮者數百人揖亶出𥿄請賦詩細視筆硯皆碧玉色且戒之曰此間文章要似隱起鵉鳯當與織女機杼分巧過是乃人間語耳亶成一絶句云天風吹散赤城霞染出連雲萬樹花誤入醉鄉迷去路傍人應笑忘還家有仙人曰子詩佳絶未免近凡酌酒一杯極甘寒忽覺身墮萬仭山而寤同上虔州布衣賴仙芝言運州有黃損僕射者五代時人僕射蓋事南漢未老退歸一日忽遁去莫知其存亡子孫畫像事之凡三十二年復歸坐阼階上呼家人其子適不在孫出見之索筆書壁上云一别人間歲月多歸來人事巳消磨惟有門前鑑池水春風不改舊時波投筆竟去不復晉子歸問其狀貌孫云甚似影堂老人也無異相傳如此後頗進仕者東坡太學體逺齋饒州一士人遇逰道士道士本里人化去巳多年一日來客位相訪約士人請假歸齋假簿中有詩一絶乃道士所書也詩云相別來來一百秋幻泡重作故人逰紫泥白雪尋常事何苦人間詩不休今是堂手録鍾弱翁帥平涼一方士通謁從牧童牽黃犢立于庭下弱翁異之指牧童曰道人頗能賦此乎笑曰不煩我語是兒能之牧童乃操筆大書云草鋪橫野六七里笛弄晚風三四聲歸來飽飰黃昏後不脫蓑衣卧月明既去郡人見方士擔兩大甕長歌出郭迹之不見兩甕乃二口豈洞賔耶西清詩話回先生過湖州東林沈氏飲醉以石榴書其家東老庵之壁云西鄰已富憂不足東老雖貧樂有餘白酒釀來緣好客黃金散盡為收書東老沈氏之老自謂也余次其韻云世俗何知貧是病神仙可學道之餘但知白酒晉佳客不問黃公覔素書符離道士辰興際華嶽先生尸解餘忽見黃庭丹篆句猶傳青𥿄小朱書凄涼雨露三年後倣佛塵埃數字餘至用榴皮緣底事中書君豈不中書山谷云秋風吹渭水落葉滿長安黃塵車馬道獨清間自然爐鼎虎繞與龍盤九轉丹砂就琴心三疊蕊珠看舞胎仙便萬釘寶帶貂蟬冨貴欲熏天黃糧炊未熟夢驚殘是非海底直道作人難袖手江南去白蘋紅蓼再逰湓浦廬山往三年有人書此曲於州東茶園酒肆之柱間或愛其文指趣而不能歌也中間樂工或按而歌之輒以俚語竄語睟然有市井氣不類神仙中人語也十年前有醉道士歌此曲廣陵市上童兒和之乃合其故時語此道士去後乃以物色迹之知其為吕洞賔也苕溪漁隱曰近時吳江長橋垂虹亭屋山壁上草書一詞人亦以為吕仙作其果然耶詞曰蜚梁欹水虹影清光曉橘里漁鄉半煙草看來今往古物是人非天地裏惟有江山不老雨衣風帽四海誰知道一劍橫空幾畨到按玉龍嘶未斷月冷波寒掃去也琳宇洞天無鎖指雲屏煙嶂是吾廬但滿地蒼苔年年不掃東坡知制誥李大臨西川人有門人背傴不能仰視因以藥市罷見一道士云秀才有錢丐一二百為酒資書生云家貧無錢所居有薄釀同一醉可乎道士欣然便往酒半道士問何故背傴書生言不幸遇此疾無如之何道士因出藥三十粒云來日五更面東以新汲水下覺微燥不足怪書生如所教既服藥燥甚不可勝展轉於塌上亦甚悔之然每一伸縮漸覺舒快比明身巳直矣蜀人重藥市蓋常有神仙之遇焉文昌雜録豫治平末泝峽還蜀泊舟仙都山下有道士以隂真君長生金丹訣石本相示豫問之曰子知金丹訣邪道士曰不知也然士大夫過此必以問之庶有知之者豫佳其意試問以燒煉事對曰飬生有內外精氣內也非金石所能堅凝四支百骸外也非精氣所能變化欲事內必調飬精氣極而後內丹成則不能死也然隱居人間久或托尸解而去求變化輕舉不可得也蓋四大本外物和合而成非精所能易也惟外成然後可以點瓦䃯化皮骨飛行無礙矣然內丹未成內無以交之則服外丹者多死譬積枯草弊絮而置火其下無不焚者豫甚善其説告之曰昔人有服金丹不幸赴井而死既而五臟皆化為黃金者又有服玉屑死於盛夏而尸不敗壞者皆無內丹以主之也子之説信然哉後十餘年官于南京張公安道家有一道人陜人也為公飬金丹其法用紫金丹砂費數百千期年乃成公喜告豫曰吾藥成可服矣豫謂公何以知其藥成公曰抱朴子言藥既成以手握之如泥出指間者藥真成也今吾藥如是以是知其成無疑也豫為公道仙都所聞謂公曰公自知內丹成則此藥可服若猶未也姑俟之若何公笑曰我姑俟之龍川略志百家詩話總龜後集卷之四十
