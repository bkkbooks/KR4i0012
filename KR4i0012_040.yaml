front:
  text: 増修詩話總龜卷之四十
  hash: sha256:32e6830d3df666566c35c11719df2658a023ab44da7dad255fe5e67b5243d545
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_040-1a}
body:
  text: 樂府門皷吹部中有拱辰𬋩即古人之义手𬋩也太宗賜今名邊軍捷廻則連隊抗声凱旋乃古之遺音其詞徃徃皆市井鄙俚語沈存中在鄜延時製十數曲令士卒歌之云先取西山十二州别分子将到衙頭始看秦塞低如馬漸見黄河直北流天威卷地過黄河萬里羌人盡撲歌莫堰横山倒流水從教西去作恩波馬尾胡琹随漢車曲聲由自怨單于彤弓莫射雲中鴈㱕鴈如今不寄書旗隊渾如錦綉堆銀装背傀打毬囬先教净掃安西路待向河源飮馬来灵武西凉不用圍畨家捴待納王師城中半是山西種由有當時乾吃児古今詩話乾祐中國樂有米嘉荣何戡近有陳不謙不謙之子意奴三十年中絶不聞善唱盛以拍弹行扵世拍弹起扵李可及懿宗朝有㤙澤曲子别趙十哭趙十之名劉夣得與米嘉荣詩云三朝供奉米嘉荣能変新聲作舊聲如今後軰欺前軰好染髭鬚學後生又自貶所㱕京聞何戡歌云二十年来别帝京重聞天樂不勝情舊人唯有何戡在更令勤勤唱渭城盧氏雜記搢紳脞說載盧氏雜記曰歌曲之妙其来乆矣國樂有米嘉荣何戡田順郎媍人有永新婦御史娘栁青娘張紅娘皆一時之妙也近有陳不謙子意奴三十年来絶不聞善歌者盛以拍彈行扵世拍彈起扵李可及懿宗恩澤最厚有别趙十哭趙十之名又與田順郎詩曰清歌不是世間音玊殿常聞称帝心惟有順郎皆學得玊声尤岀九重深與御史娘詩曰天下能歌御史娘花前月底奉君王九重深処無人見獨把新声傳順卽白公听田順歌曰戞玊𫾣水声未停嫌雲不過入青冥安得黄金滿衫䄂一時抛與断膓声咸通中丞相姑臧公拜端揆日自梁移鎮淮海郡寡勝逰之地且風亭月觀旣以荒凉扵戯馬㙜連玊鈎道開剏池沼建亭㙜旣畢號曰賞心浙右小校薜陽陶監押度支運米入城公喜其姓名試詢之果是舊人及問徃日蘆𬋩之事因朱崖陸暢元白所撰歌萹一軸公益喜之以芦管扵兹亭奏之其𬋩絶㣲毎一篳篥𬋩中常容三𬋩声声如天際自然来大佳之亦贈一篇略云虚心纎質鴈啣餘鳯吹龍吟㝎不如贈與甚豊授其子牢湓倅明皇樂工奔迫江潭間扵湘中採訪使筵上唱云紅豆生南國秋来發幾枝贈公多採擷此物冣相思又云清風明月苦相思蕩子從容十載餘征人去日殷勤嘱歸鴈来時𢾗寄書皆摩詰所作也至今梨园歌焉坐中皆惨然時明皇思幸蜀也雲溪友議霓裳羽衣曲刘禹錫詩云三郷陌上望仙山歸作霓裳羽衣曲王建詩曰听風听水作霓裳樂天詩注云開元中西凉府莭度使楊欽遠造鄭嵎津陽門詩注云葉法善常引明皇入月宫聞仙樂及歸但記其半遂以笛之㑹欽逺進波羅門曲與聲調相符遂以月中所傳爲散序欽逺所進爲腔號霓裳羽衣曲矣江南大理卿成文㓜精爲詞曲嘗作謁金門云風乍起吹皱一池春水李璟聞之召而謂之曰卿聀在典刑一池春水干卿何事文㓜頓首江南馮延巳善爲歌詞晏元献善公所爲歌詞不减馮也樂府木蘭花句都是七言晏詩云重頭歌咏响璁琤入破舞腰紅乱旋重頭入破皆弦𬋩家語也張子野郎中善歌詞常作天仙子云雲破月来花弄影士大夫皆称之子野𥘉謁歐公迎之坐語曰好雲破月来花弄影恨相見之晚也有謂張子野曰人皆謂公為張三中即心中事眼中泪意中人也何不目之為張三影客不諭公曰雲破月来花弄影嬌柔懶起簾押捲花影栁徑無人墜風絮無影此平生得意句也林和靖工扵詩文善為詞嘗作點絳唇云金谷年年乱生春色誰為主餘花落處滿地和烟雨又是离歌一闋長亭暮王孫去萋萋無數南北東西路乃艸詞尔謂終篇無草字鼎州滄水馹有䇾薩蛮云平林漠漠烟如織寒山一帶傷心碧暝色入髙楼有人楼上愁玉梯空泞立宿鳥歸飛急何處是歸程長亭更短亭曽子宣家有古風集此詞乃太白作也古今詩話古人飲酒皆以舞相属至扵献壽樽者徃徃亦舞長沙王少舉䄂云囯小不足廻旋唐太宗自起舞属群臣古人淳質舞以逹歡忻不必臻妙合度故人人可爲之張燕公曰醉後歡更好全勝未醉時動容皆是舞出語捴成詩李白詩曰要湏廻舞䄂拂盡五松山醉後凉風起吹人舞䄂寒今時舞者皆曲捎益盡竒妙然非有詩士人不爲也貢父詩話水調第五遍五言調聲最愁苦故樂天詩曰五言一遍最辛勤調少情多似有因不㑹當時翻曲意此時腸断爲何人舊說水調河傳隋煬啼将幸江都宫時所製曲成奏之聲韻悲切煬帝喜之樂工王令言聞而止之謂其弟子曰不返矣役竟如其說或詰其何知曰水調河傳但有去声措紳脞說何滿子開元中犯罪繋獄中撰此曲白樂天云滄州人姓何名滿子鞠獄者愍而為奏之明皇弗許竟坐白樂天曰世称何滿是人名臨孰罪時曲始成一曲囬音并八叠從頭捴是断腸声脞說髙玲瓏餘杭之歌者白公守郡日與歌曰罷胡琹掩瑶瑟玲瓏再拜當歌出莫為使君不觧歌听唱黄雞與白日黄雞催曉丑前鳴白日催人酉后沒腰間紅綬繫未稳照裏朱顔㸔巳失玲瓏玲瓏奈老何使君歌了汝更歌元㣲之在越州聞之厚幣来邀樂天即時遣去到越州住月餘使盡歌所唱之曲即賞之後遣之㱕作詩送行兼寄樂天曰休遣玲瓏唱我詞我詞都是寄君詩却向江邊整廻掉月落潮平是去時秦少㳺在處州夣中作長短句曰山路雨添花花動一山春色行到小溪深処有黄鸝千百飛雲當面化龍蛇夭矯轉空碧醉卧古藤隂下杳不知南北後南迁北㱕逗留藤州終扵光舉亭時方醉起以玊盂汲泉欲飲笑視而化冷齋夜話華亭舩子和尚偈曰千尺絲綸直下垂一波纔動萬波随夜静水寒魚不食滿舡空載月明歸山谷改成長短句曰一波纔動萬波随蓑笠一鈎絲金鱗正在深處千尺也湏垂吞又吐信還疑上鈎遲水寒江静滿目青山載月明㱕東坡携妓謁大通禅師大通愠色坡作長短句曰師唱誰家曲宗風有阿誰借君拍板與門搥我也逄塲作戯莫相疑溪女方偷眼山僧巳皱眉莫嫌弥勒下生遲不見老婆三五少年時僧仲殊和曰觧舞清平曲而令說向誰紅炉片雪上鉗搥打孰金毛師子也堪疑巳信身如夣何湏眼似眉蟠桃巳是結花遲不向風前一笑待何時余登秋屏閣浩然有歸老之㒷作長短句寄意曰城裏乆偷閑塵涴雲山此生巳是再眠蚕隔岸有山㱕去好萬壑千岩霜曉更凭欄减盡晴嵐㣲雲生處是茅庵試問此行誰作伴弥勒同龕東坡與少㳺飲别維楊作虞羙人詞曰波聲拍枕長淮曉隙月窺人小無情汴水自東流只載一舩离恨向西州竹隂花圃曽同醉酒未多扵泪誰教風鍳在塵埃醖造一塲煩惱送人来世傳賀方囬作也余與渊材牛渚間見長短句曰牛渚天門險限南北七英豪占青烟霧歛與閑人登覧待月上潮平波灔灔寒𬋩孤吟新繋䌫風满檻歴歴数西州更点渊材恨不得腔乃撰其譜盖賀方囬作也並冷齋夜話増修詩話總龜卷之四十集一百家詩話總龜後集卷之四十癸集舒城阮一閱編皇明宗室月䆫道人刋鄱陽程珖校神仙門陳東靖康間嘗飲於京師酒樓有倡打坐而歌者東不願乃去倚欄獨立歌望江南詞音調清越東不覺傾听視其衣服皆故弊時以手掲衣爬搔肌膚綽約如雪乃復呼使前再歌之其詞曰䦨干曲紅颺綉簾旌花嫩不禁纎手捻𬒳風吹去意還驚眉黛蹙山青鏗鉄板閑引歩虚聲塵世無人知此曲却騎黄鶴上瑶京風冷月華清東問何人製曰上清蔡真人詞也歌罷得數錢下樓亟遣僕追之巳失矣岀夷堅志心事数莖白髮生涯一片青山空林有雪相待野路無人自還李主好書神仙隱遁之詞豈非遭罹多故𣣔脫世網而不得者邪東坡葛稚川神仙傳載王方平麻姑降蔡經家方平謂曰不見姑巳百年矣擘麟脯行酒而蔡經竊視麻姑手如鳥爪心念曰背蛘時正可爬背方任念而方平巳知責經曰麻姑神人汝何忽謂其手可爬背於是鞭經背皇祐中江西有一事正類此或題麻姑壇記以嘲之曰五百年来別恨多東征重得見青蛾擘麟方擬窮歡喜不禁閑人背痒何隱居詩話劉跛子者青州人也拄一拐毎歲必一至洛中㸔花舘范家园春盡即還京師爲人談噱有味范家子弟多狎戯之有大范者見之即與二十四金曰跛子喫半角小范者即與十金喫椀羮於是以詩謝伯仲曰大范見時二十四小范見時喫椀羮人生四海皆兄弟酒肉林中過一生張丞相召自荆湖時跛子與客飲市橋客聞車騎甚盛起觀之跛子挽其衣使且飲作詩曰遷客湖湘召赴京輪蹄迎送一何荣争如與子市橋飲且免人間寵辱驚陳莹中甚愛之作長短句贈之曰槁木形骸浮雲身世一年兩到京華人還乗興閑㸔洛陽芲聞道鞓紅最好春歸後終委泥沙忘言處花開花謝不似我生涯年華晋不住飢飱困寢觸䖏爲家這一輪明月本自無瑕隨分冬裘夏葛都不㑹赤水黄芽誰知我春風一拐談笑有丹砂余政和春見於興國以詩戯之曰相逢一拐大梁間妙語時時見一班我欲從公蓬島去爛銀坑裏㸔青山予姻家許中復之内乃趙槩叅政之孫云我十許時見刘跛子来覔酒飲笑語而去計其壽百四五十許嘗書于京師新門張婆店三十年日坐相國寺東書邸中人無識之者冷齋夜話范致虚居方城有髙士舘於家自言昔乃白髮社翁遇師授以神藥今年踰下夀顔渥如丹有孺子色旣乆歸晋一絶末句云莫訝杖藜歸去早舊山閑却一溪雲西清詩話賣墨者潘谷余不識其人然聞其所爲非市井人也墨既精妙而價不二士或不持錢求墨不計夛少與之此豈徒然者㢤余嘗與詩云一朝入海㝷李白空㸔人間盡墨仙一日忽取欠墨錢劵焚之飲酒三日發狂浪走遂赴井死人下視之盖趺坐井中手尚持数殊也見張元明說如此東坡近有人逰羅浮晋一宿岩谷間中夜見一人身無衣而紺毛覆躰意必仙也乃再拜問道其人了不頋但長嘨数聲响振林木歌詩云雲来萬嶺動雲去天一色長嘯两三聲空山秋月白西清詩話張亶熈寕中夣行人入空中聞天風海濤聲振林木徐見海中樓闕金碧瓊琚琅珮者数百人揖亶出𥿄請賦詩細視筆硯皆碧玉色且戒之曰此間文章要似隱起鵉鳯當與織女機杼分巧過是乃人間語耳亶成一絶句云天風吹散赤城霞染出連雲萬樹花誤入醉郷迷去路傍人應笑忘還家有仙人曰子詩佳絶未免近凡酌酒一盃極甘寒忽覺身墮萬仭山而寤同上䖍州布衣頼仙芝言運州有黄損僕射者五代時人僕射盖事南漢未老退歸一日忽遁去莫知其存亡子孫畫像事之凢三十二年復歸坐阼階上呼家人其子適不在孫出見之索筆書壁上云一别人間歲月多歸来人事巳消磨惟有門前鑑池水春風不改舊時波投筆竟去不復晋子歸問其狀貌孫云甚似影堂老人也無異相傳如此後頗進仕者東坡太學体逺齋饒州一士人遇逰道士道士本里人化去巳多年一日来客位相訪約士人請假歸齋假簿中有詩一絶乃道士所書也詩云相別来来一百秋幻泡重作故人逰紫泥白雪㝷常事何苦人間詩不休今是堂手録鍾弱翁帥平凉一方士通謁從牧童牽黄犢立扵庭下弱翁異之指牧童曰道人頗能賦此乎笑曰不煩我語是児能之牧童乃操筆大書云草鋪横野六七里笛弄晚風三四聲歸来飽飰黄昏後不脫蓑衣卧月明旣去郡人見方士担兩大甕長歌出郭迹之不見两甕乃二口豈洞賔耶西清詩話回先生過湖州東林沈氏飲醉以石橊書其家東老庵之壁云西鄰已富憂不足東老雖貧樂有餘白酒醸来縁好客黄金散尽為收書東老沈氏之老自謂也余次其韻云世俗何知貧是病神仙可學道之餘但知白酒晋佳客不問黄公覔素書符離道士辰興際華岳先生尸觧餘忽見黄庭丹篆句猶傳青𥿄小朱書凄凉雨露三年後彷彿塵埃数字餘至用橊皮縁底事中書君豈不中書山谷云秋風吹渭水落葉滿長安黄塵車馬道独清閑自然炉鼎虎繞與龍盤九轉丹砂就琴心三叠蕋珠㸔舞胎仙便萬釘寳帶貂蟬冨貴欲熏天黄粮炊未熟夣驚殘是非海㡳直道作人難䄂手江南去白蘋紅蓼再逰湓浦廬山徃三年有人書此曲於州東茶园酒肆之柱間或爱其文指趣而不能歌也中間樂工或按而歌之輒以俚語竄語睟然有市井氣不類神仙中人語也十年前有醉道士歌此曲廣陵市上童児和之乃合其故時語此道士去後乃以物色迹之知其爲吕洞賔也苕溪漁隱曰近時呉江長橋垂虹亭屋山壁上草書一詞人亦以爲吕仙作其果然耶詞曰蜚梁欹水虹影清光暁橘里漁郷半烟草㸔来今徃古物是人非天地裏惟有江山不老雨衣風㡌四海誰知道一劍横空幾畨到按玉龍嘶未断月冷波寒埽去也琳宇洞天無鏁指雲屏烟嶂是吾廬但滿地蒼苔年年不掃東坡知制誥李大臨西川人有門人背傴不能仰視因以薬市罷見一道士云秀才有錢丐一二百爲酒資書生云家貧無錢所居有薄醸同一醉可乎道士欣然便徃酒半道士問何故背傴書生言不幸遇此疾無如之何道士因出藥三十粒云来日五更面東以新汲水下覺㣲燥不足怪書生如所教旣服薬燥甚不可勝展轉於塌上亦甚悔之然毎一伸縮漸斍舒快比明身巳直矣蜀人重藥市盖常有神仙之遇焉文昌雜録予治平末泝峽還蜀泊舟仙都山下有道士以隂真君長生金丹訣石本相示予問之曰子知金丹訣邪道士曰不知也然士大夫過此必以問之庶有知之者予佳其意試問以燒煉事對曰飬生有内外精氣内也非金石所能堅凝四支百骸外也非精氣所能変化欲事内必調飬精氣極而後内丹成則不能死也然隱居人間乆或托尸觧而去求変化輕舉不可得也盖四大本外物和合而成非精所能易也惟外成然後可以點瓦䃯化皮骨飛行無碍矣然内丹未成内無以交之則服外丹者多死譬積枯草弊絮而置火其下無不焚者予甚善其說告之曰昔人有服金丹不幸赴井而死既而五臓皆化爲黄金者又有服玉屑死於盛夏而尸不敗壊者皆無内丹以主之也子之說信然㢤後十餘年官于南京張公安道家有一道人陜人也爲公飬金丹其法用紫金丹砂費数百千朞年乃成公喜告予曰吾藥成可服矣予謂公何以知其薬成公曰抱朴子言薬旣成以手握之如泥出指間者薬真成也今吾藥如是以是知其成無疑也予爲公道仙都所聞謂公曰公自知内丹成則此藥可服若猶未也姑俟之若何公笑曰我姑俟之龍川畧志百家詩話緫龜後集卷之四十
