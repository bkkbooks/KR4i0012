front:
  text: 增修詩話總龜卷之三十九戊集
  hash: sha256:1010c2baec7b0db8a17d795de7cf288aec871b4f047afa7916c1155af14dc9d6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_039-1a}
body:
  text: 舒城阮一閲編皇明宗室月窗道人刋番昜程珖校詼諧門下兵部李內相濤唐宗室子自河陽令一舉狀登科小字社翁每于班中多自名焉其坦率如此翰林月給內醖兵部嘗因春社寄翰林一絶云社翁今日沒心情為乏逃聾酒一瓶惱亂玊堂將欲遍依希循到第三廳顔師古解霍去病穿域踏鞠云以皮為之實以毛蹴踏為戲也顔時鞠乃如此至後唐巳不同歸氏子弟嘲皮日休曰八片尖斜砌作毬火灰撏了水中揉一包間氣如常在惹踼招拳卒未休仁宗朝試山海天地之藏賦長沙進士陳説同進士出身謁鄊人胥偃內翰因舉其賦胥曰賦頗佳但其間貼故事少耳説歸作詩曰紫宸較藝集英聰作賦方知尚欠功事內少它些子鐵殿前羸淂一堆銅黃紬𬒳下夫人暖青瑣窗中學士空寄語交朋須細認主司頭惱太冬烘盧延遜五舉方登第嘗作詩云狐衝官道過犬刺客門開租庸張相每誦之又曰餓貓臨鼠穴饞犬舐魚砧成中令激賞之又曰栗爆燒氈破貓跳觸鼎翻王中懿愛之盧嘗謂人曰平生投謁公卿不意得貓兒狗子力也梅聖俞與謝氏世姻師直小字錦衣奴聖俞作詩戲之曰古錦裁詩句班衣戲坐隅木奴今正熟肯效陸郎無師直方十歲讀詩而悟石曼卿登第有人訟科場覆考落者數人曼卿在焉方與國寺期集符至追所賜敕牒餘人皆泣而起獨曼卿解靴還使人露體戴幞頭笑語終席次日放黜者例受三班借聀曼卿作詩曰無才且作三班借請俸爭如録事參從此免稱鄉貢進且須走馬東西南並同上王𣑽志詩曰城外土饅頭饀草在城裏無人吃一箇莫嫌沒滋味且為饀草當使誰食之為易其後兩句云預先著酒澆啚教有滋味東坡詩話馮衮牧蘇州日多縱飲傅因大勝以所得均與座客吟云八尺臺􅐻照面新千金一擲閗精神合是賭時須賭物不堪回首乞間人雅言雜載李紳相鎮廣陵有少年甚踈簡來謁晤對間言白尚書先寄元相公詩云悶勸迃辛酒間吟短李詩且曰辛大性迃嗜酒丘度李二十短而能詩紳少年即丘度子也謂李公曰小子每憶白共二丈詩曰悶勸平惜酒間吟草丈詩李曰辛大有此狂兒吾不存舊乎雲溪友議崔涯張祐為一時狂友好嘲謔嘗戲贈營妓曰雖得蘇方木由貪玳瑁皮懷胎十箇月生下崑崙兒又曰布𫀆披襖火燒氈𥿄輔箜篌麻接弦更有一雙皮屐子紇梯紇榻出門前又嘲李端端云黃昏不語不知行鼻似煙􅖠耳似鐺猶把象牙梳插鬢崑崙山上月𥘉生端端得此詩而因出遇二子于道再拜曰伏望哀憐乃重為一絶云不見驊驑偹繡鞍善和坊裏取端端揚州近日渾成錯一朵能行白牡丹前嘲乃解又嘗為雜嘲之曰二年不到宋家東阿母深居僻巷中含泪向人羞不語琵琶弦斷倚屏風日暮追來香閣中百年心事一朝同寒雞鼓翼紗窗外巳覺恩情逐曉風又悼人詩云赤板橋西小竹籬插花還似去年時淡黃衫子都無了腸斷丁香畫雀兒曹州酒紏雲娘瘦瘠而善歌李宣古嘲之曰何事實堪悲雲娘只首竒瘦拳拋令急長觜出歌遲只怕肩侵鬢唯愁骨透皮不須當户立頭上有鍾馗復州凌岩夢桂州筵上贈胡子女詩云自道風流不可扳那堪蹙額更頽顔眼睛深似湘江水鼻孔髙于華嶽山舞態豈能安掌上歌聲應不繞梁間孟陽死後今千載由有家人覔往還並同上楊叔寶強人也嘗為荆門幕時虎傷人楊就虎穴磨巨崖大刻誡虎文如韓文公遣鱷魚文其略曰嗚呼爾彪出境潛遊改官于鬱州以書托知軍趙㝎打虎文𢾗本書言嶺俗庸獷欲以化之仍有詩曰日將先聖詩書教暫作文翁守鬱林守遣人打碑次日本耆申磨崖樹下大蟲咬殺打碑匠二人荆門止以耆狀報叔寶湘山録薜逄晚年厄于宦途䇿嬴赴朝值新進士綴行而出時進士團所由數十人見逄行李蕭然前道曰廽避新郎君逄囅然即遣價語之曰報道莫貧相阿婆三五少年時也曾東塗西抹來接言許孟容進士及第李究登科時人嘲之曰錦襖子上著蓑衣張處士祐柘枝詩曰鴛鴦鈿帶拋何處孔雀羅衫屬阿誰樂天呼為問頭詩祐矛盾之曰鄙薄問頭之誚所不敢辭然明公亦有目連變長恨歌云上窮碧落下黃泉兩處茫茫都不見豈不是目連變耶並同上王中令既平蜀捕餘冦與伍隊相逺飢甚乃入一村寺中僧醉甚箕踞公怒欲斬之僧應對不懾公竒而釋之問求𬞞食云有肉無𬞞公益竒之餽以蒸豚頭食之甚美公喜問僧止能飮酒食肉邪為有它伎邪僧自言能詩公令賦蒸豚詩操筆立成詩云觜長毛短淺含臕久向山中食藥苗蒸處巳將焦葉畏熟時更用杏漿澆紅鮮雅稱金盤貯軟熟真堪玊筯挑若把羶根耒代並羶根只合喫藤條公內大喜與紫衣乃蜀中詩僧百斛明珠韓玉汝治秦州尚嚴去官人語曰寧逄暴虎莫逄韓玉汝孫臨滑稽尤善對或問曰莫逄韓玉汝當以何對臨應聲曰可怕李金吾天下以為口實同前石介作三豪詩略云曼卿豪于詩永叔豪于文杜默師雄豪於歌永叔亦謂默云贈之三豪而我濫一名默之歌少見于世𥘉不知之後聞其篇云學海波中老龍夫子門前大蟲皆此等語甚矣介之無識也永叔不為嘲誚之者此公惡爭名且為介諱也吾觀杜默豪氣正是京東學究飲私酒瘴死牛肉醉飽后而發之者也作詩之狂至于盧同馬異極矣若更求竒便作杜默也幼時里人程建用楊咨家弟子由會草舍天雨聮句六言程曰庭松偃蓋如醉楊曰夏雨新涼似秋軾云有客髙吟擁鼻子由云無人共吃饅頭皆絶倒巳四十餘年同上聶宗義建隆𥘉為學官河洛之師儒也趙韓玊嘗拜云郭忠恕使酒詠其姓玩之曰近貴全為瞶拔龍即是聾雖然三箇耳其奈不成聰宗義應聲答曰勿笑有三耳全勝畜二心忠恕大慚雲溪友議趙成伯家宴造之無由輒欲效顰而酒巳盡入夜不欲煩擾戲作小詩求數酌而巳詩曰道士令嚴難繼和僧御帽小却空回隔籬不欲鄰公飲抱甕惟防吏部耒趙成伯家有姝麗僕忝鄉人不肯開樽徒吟春雪謹依元韻以當一笑云繡簾朱戶未曾開誰見楊花落鏡臺試問髙吟三十韻何如低唱兩三杯莫嫌衰鬢聊相映須得纎腰妙共回知道文君共青瑣梁園賦客敢言才俗云檢驗雪壓秀才衣帶上有雪詩三十韻又世傳陶榖學士買得黨太尉家故妓過㝎陶取雪水烹團茶謂妓曰黨太尉應不識此妓曰彼粗人安有此景但能以銷金暖帳下淺斟低唱吃羊羔兒酒爾榖愧其言答來句罪過之義取貸而巳玊局遺文僕少好種松過泗上與杜子師出山中子師求豫種松法欲之都梁山中戲作二絶云露宿泥行草棘中十年春雨飬髯龍如今五尺城南杜欲東坡學種松君方掃雪抆松子我巳開榛得伏苓為問何如插揚栁明年飛絮落浮萍同上元豐中朝無咎詩極有聲無巳以詩戲之曰聞道新文能入樣相州紅纈鄂州花蓋是時方尚相州纈鄂州花也朝堯民子損之云王直方詩話劉諷參軍宿山馹月明有女子數自屋後來􅒛酌庭中歌曰明月清風良霄會同星河易翻歡娛不終緑樽翠杓為君斟酌今夕不飲何時歡樂此廣記所載詩也山谷曰當是鬼中曹子建所作東坡亦以為然又有一篇云玊戶金缸願侍君王邯鄲宫中金石絲簧鄭女衛姫左右成行紈綺繽紛翠眉紅粧王歡轉眄為王歌舞碩得君歡長無災苦穌公以為邯鄲宫中金石絲簧此兩句不唯人少能作而知之者亦極難得耳皆醉中為余書此張文潛見坡谷論説鬼詩忽曰舊時鬼作人語如今人作鬼語二公大笑髙愈主簿云東坡云世間事勿笑為易惟讀王祈大夫詩不笑為難祈嘗謂東坡云有竹詩兩句最為得意曰葉埀千口劔幹聳萬條鎗坡云好則極好則是十條竹竿一箇葉兒也以道云𥘉見東坡詞云素面常嫌粉涴洗粧不退唇紅便知此老須過海余問何邪以道曰只為古今人不曾道到此須罰教逺去吳賀迪吉者撫州人一日載酒來余家并召劉夷季洪龜父饒次守輩酒酣頗紛紛龜父先歸作一絶題于余書室曰再為城南逰百花巳狂飛更堪逄惡客騎馬風中歸次守既醒作十七字和云當時為舉首滿意望龍飛而今已報罷且歸蓋龜父是年自洪州首薦自今上𥘉即位無廷試也山谷既飯素在館中時多食東華門碗睌蒸餅後從黔南王㝎國寄之以詩云北海未常樽有酒馮歡何止食無魚黔州碗脫無蒸餅自合官稱削校書張文潛在一時中人物最為魁偉故陳無已有詩云張侯魁然腹如鼓雷為飢聲酒為兩文云要瘦君則肥山谷云六月火雲蒸肉山又云雖肥如瓠壼而文潛卧病秦少遊又和其詩云平時帶十圍頗復減臂環皆戲語也劉季孫景文公頃年王安石對使念兹在兹釋兹在兹名言兹在兹季孫對之以揭諦揭諦波羅揭諦波羅僧揭諦安石大笑並同上往歲江行阻風沿岸野步望雲嶺而去忽有蘭若甚多僧院覩客來皆扃門不納獨有一院大敞其户見一僧翹足而眠以手書空顧客不介意窈思曰書空有換鵝之能翹足類坦腹之事此必竒僧直八造之僧雖強起全不樂客客不得已而問先達有詩曰書空翹足睡路險側身行和尚其庶幾乎僧曰貧道不知許事適晝房門振匙樣客不辭而去桂苑叢談梁周翰在太宗朝為館聀真宗即位乃除知制誥栁開贈詩曰九重城闕新天子萬卷詩書老舍人梁與朱昻楊大年同在禁掖大年年未滿三十而兩公皆老𢾗見慢侮不能堪即好謂大年曰公母侮我此老亦將留與公耳朱聞之背面搖手腋不謂梁莫與大年之沒不及五十也間居詩話晉郝隆為蠻府參軍三月三日作詩曰娵隅躍清池桓溫問何物答曰蠻名魚為娵隅桓曰何為作蠻語隆旱里投公始得一蠻府參軍郍得不作蠻語世説盧家有子弟年暮而猶為校書郎晚娶崔氏女崔有詞翰結䄜之後微有嫌色盧因請詩以述懷為戲崔立成曰不怨檀郎年紀大不怨檀郎官聀卑自恨妾身生較晚不見盧郎年少時南部新書李建勳鎮臨川日九江帥周宗一書求曰近器用儀注或闕欲輟臨川者李乘醉批一絶句云偶罷阿衡來典郡固無間物可應官慿官為報周公道莫作循州刺史看南唐近事李巽字仲權纍舉不第鄉人侮曰李秀才應舉空去空回不知甚時席帽得離身巽亦不校登第後乃遺鄉人詩曰當年蹤迹困泥塵不意乘時亦化鱗為報鄊閭親戚道如今席帽巳離身蓋因國𥘉由襲唐士子皆曵𫀆重戴出則席帽自隨青箱雜記梅聖俞河豚詩曰春洲生荻芽春岸飛楊花河豚于此時貴不𢾗魚蝦劉原甫戲曰鄭都官有鷓鴣詩謂之鄭鷓鴣聖俞有河豚詩當呼為梅河豚也古今詩話雲臺集有鄭谷鷓鴣全篇云暖戲煙蕪錦翼齊品流應得近山雞雨昏青草湖邉過花落黃陵廟裏啼遊子每聞征袖溫佳人才唱翠眉低相呼相喚湘江闊苦竹叢深春日西同上鄭毅夫榜明州人周師厚以名極低只壓得陳傳一名自賦詩曰舉眼不堪觀鄭獬回頭由喜得陳傳朱定國詩話唐僧法軌形容短小開􅊰于寺與李榮議論往來數番僧舊作一詩詠李榮于髙坐上誦之云姓李應須禮名榮又不榮李應聲曰身長三尺半頭毛尤未生四坐伏其辨捷啓顔録經生多不省文章嘗一邑有兩人同官其一或舉杜筍鶴詩稱贊也應無處避征徭之句其一難之曰此詩失矣野鷹何嘗有征徭乎舉詩者解曰古人有言豈有失也必是當年科取翎毛耳貢文詩話頴州張龍圖嘗見州牒押字多團下拽一畫有人云押字如有蒸餅樣張應聲曰為官恰似􅔇糊團有同人自言近年云鬚鬢恰如􅍡馬色張曰文章依舊草驢鳴雍洛靈異記包賀多為鄙俗之句至于枯竹笋抽青橛子石榴樹挂小瓶兒又云霧是山巾子船為水靸鞋又云掉搖船掠鬢風動水捶胸雖好事者托以成之亦空穴來風之意王伸知永州為人耽于酒色其宴樂往往自早至暮不之云鴛鴦未老頭先白嘲者素患六損憂制者應聲曰螃蟹才生足便多時人以為名對崔櫓酒後于虔州陸郎中坐上甚狂以詩謝之曰醉時顛蹶醒時羞麯蘖催人不自由叵耐一雙窮相眼不堪花卉在前頭閩人黃通纍舉不第後該恩歷官𢾗任年六十猶欲鎖廳或嘲之曰剩貟主武藝老妓舞柘枝李義府嘗作詩曰􅍢月為歌扇裁雲作舞衣自憐廽雪態好取洛川歸有棗強尉張懷慶好窈人文章有詩曰生情􅍢月為歌扇出性裁雲作舞衣照鑑自憐回雪態來時好取洛川歸時人誚之曰活剝張昌齡生吞郭正一宋莒公判館事督諸館聀必至而刀景純數日不來筥公使人邀之加之誚讓主原叔改杜少陵贈鄭廣文詩云景純過官舍走馬不曽下驀地稱朝歸便遭官長罵栁州栁太守種栁栁江邉栁館依然在千株栁拂天後南中丞至黔南人嘲之曰黔南南太守南郡在雲南間向南亭畔南風變俗談並同上增修詩話總龜卷之三十九百家詩話總龜後集卷之三十九神仙門高尚處士劉臯謂士大夫以嗜欲殺身以財利殺子孫以政事殺人以學術殺天下後世非神仙中人不能發此言也復齊漫録熙寧中王迪為洪州左司理參軍一日有道人來磨鏡因俾迪自照乃見星冠羽帔縹眇見鏡中迪問其故曰此汝前身也由汝誤念墮此勉自修證勿淪苦海既去迪具以告其妻妻然之遂棄官與妻隱去郡僚挽留不可皆作詩以餞行時新建主簿劉純臣有詩雖警拔可以記其實云髮如抹添左參軍脫去青衫作隱淪世上更無羈絆事壷中别有自由身鼎烹玉免山前藥花看金鰲背上春莫怪少年能決烈藍田夫婦總登真后歸姑蘇不知所終同上周貫自言膠東人嘗號木鴈子善屬文遊于洪州西山嗜酒不羈布褐粗全人或贈之錢則詣酒家取醉余皆散墜不顧西山之人見貫往來者五十余年而顔如𥘉至有以道術訪之則必報以惡聲使之親近不得也熙寧元年至豫章石頭市遇故人捿止張生為具酒食而宿中夜逆旅之主人聞戶外有車馬合沓聲起而視之無有也唯貫所卧室月止開猶奄奄然喘息就而察之貫已死矣明日告新建縣尉吳杲卿往按之貫身潔如生扶而轉之腹中汨汨如浪鳴焉縣主簿劉純臣使人棺斂埋于地云張生還家其弟迎門曰周翁凌辰見遇今往雙嶺矣衆乃知貫非實死者也貫所著華陽二篇坐卧不離懷袖人莫得見曰純臣耴而有之純臣梢其文險絶而有條理純臣以詩記之曰八十西山作酒仙麻鞋亂斷布衣穿形骸一脫塵緣盡太極光隂不記年洪覺範冷齋夜話嘗記之然互有不同同上吾八歲入小學以道士張易蕳為師童子幾百人師獨稱吾與陳太𥘉者太𥘉眉山市井人子也豫稍長學日益遂第進士制䇿而太𥘉乃為郡小吏其後余謫居黃州有眉山道士陸推忠自蜀來云太𥘉巳尸解矣蜀人吳師道為漢州太守太𥘉往客焉正旦日見師道求衣食錢物且告别持所得盡與市人貧者反坐于戟門下遂卒師道使卒舁往野外焚之卒罵曰何物道士使我正旦舁死人太𥘉微笑開目曰不復煩汝步自戟門至金鴈橋下趺坐而逝焚之城人見煙熖上眇眇焉有一陳道人也東坡新安聶師道宗微少事道士于方求發迹逰名山𢾗見異人楊行密開府于揚州宗微實輔佐之蓋為國師三十年楊氏末解化而去弟子葬之舉棺惟衣履存焉順義七年楊溥贈問政先生方外之兄德誨為新安太守乃于郡之東山築室以居方外號為問政山房問政之名或得于此苕溪漁隱曰問政山去新安郡城十許里岩谷幽邃今有琳字在焉國𥘉黃台留題詩云千尋練帶新安水萬仭花屏問政山自少雲霞居物外不多塵土到人間壷懸仙島吞舟罷碗浸星宫咒水間草暗壇思句曲松昏紫氣度函關龜成錢甲毛猶緑鶴化黳翎頂更殷阮洞神仙分藥去蔡家兄弟寄書還笻枝挺柱菖蒲莭筍幘高簮玳瑁班新隱漸聞侵月窟舊鄰猶説枕沙灣黃精苗倒眠青鹿紅杏枝低挂白鷴海上使頻青鳥黠篋中藏久白驢頑手踈俗禮慵非傲肘後靈方祕不慳室録匣垂金縷帶絳囊條鎖玉連環常尋靈穴通三楚擬過流沙化百蠻容易煮銀供客用辛勤栽果與猿扳靜張琴局鋪還打默考仙經注又刪牀並葛鞋寒兔伏窗橫柳几老龍跧溪童乞火朝𫾣竹山鬼聽琴夜撼關花氣熏心香馥馥澗聲聆耳響潺潺高墳自掩浮生骨短晷難凋不死顔早晚重逄蕭塢客願隨芝蓋出塵寰余以續仙傳高道傳二書考之詩中所用事多出師道本傳山谷唐末有狂道士不知何許人又晦其名氏逰成都忽詣紫極宫謁杜光庭先生求寓泊之所先生諾之而不與之進道士日貨藥于市所得錢隨多少沽酒飲之惟唱感庭秋一詞其意感蜀之將亡如秋庭之衰落然人未之曉但呼為感庭秋道士凡半年人亦不知其異一夕大醉歸夜將闌尚聞唱聲愈高有訝之者隔户窺之見燈燭綵繡筵具器皿羅列甚盛狂道士左右二青童立侍時斟酒而唱窺者具以白先生先生乃欵其户曰光庭量識膚淺不意上仙降鑒深為罪戾然不揆愚昧而匍匐門下冀一拜光靈以消塵障道士曰何辱勤拳之若是當出奉見乃令二童收筵具器皿及陳設致于前堞之則隨手而小如符子狀置冠中又將二童按之如木偶可寸許又置冠中乃啓户光庭欣然而入但空室而巳高道傳唐清逺道士同枕恭子遊虎丘詩曰余本長殷周遭罹歷秦漢計之至唐則二千餘歲矣顔魯公愛而刻之且有詩曰客有神仙者于兹雅麗陳蓋指為神仙也李衛公追和魯公刻清逺道士詩曰逸人綴清藻前哲晉萹翰則逸人指清逺而前哲謂魯公也其後皮日休陸龜蒙輩皆和之仙耶鬼耶則不必問然㒒獨愛其數句云吟挽川之隂步上山之岸山川共澄徹光彩交陵亂白雲蓊𣣔歸青松忽消半于乎借使非神仙亦才鬼也許彥周詩話異聞集載沈既濟作枕中記云開元中道者吕翁非洞賓也蓋洞賔嘗自序以為吕渭之孫仕德宗朝今云開元則吕翁非洞賔無可疑者苕溪漁隱曰回仙嘗有詞云黃梁猶未熟夢驚殘尚用枕中記故事可見其非吕翁也靈怪集載南柯太守傳與枕中記事絶相類浮世榮枯固巳如夢矣此二事又于夢中作夢既可笑亦可歎已復齊漫録回仙于京師景德寺僧房壁上題詩云明月斜秋風冷今夜故人來不來教人立盡梧桐影相傳此詩自國𥘉時即有之栁耆卿詞云愁緒終難整又立盡梧桐碎影用回仙語也古今詞話語云耆卿作傾杯秋景一闋忽夢一婦人云妾非今世人曽作前詩數百年無人稱道公能用之夢覺記其事世傳乃鬼謡也此語怪誕無可考據蓋不曽見回仙留題遂妄言耳豫兄子瞻嘗從事扶風開元寺多古畫而子瞻少好畫往往匹馬入寺循壁終日有一老僧出揖之曰小院在近能一相訪否子瞻欣然從之僧曰貧道平生好藥術有一方能以朱砂化淡金為精金老當傳人而患無可傳者知公可傳故欲一見子瞻曰吾不好此術雖得之將不能為僧曰此方知而不可為公若不為正當傳矣是時陳希亮少卿守扶風而平生溺于黃白嘗于此僧求方而僧不與子瞻曰陳卿求而不與吾不求而得何也僧曰貧道非不悅陳卿畏其得方不能不為耳貧道昔嘗以方授人矣有為之即死者有遭喪者有失官者故不敢輕以授人即出一卷書曰此中皆名方其一則化金方也公必不肯輕作但勿輕以授人如陳卿謹勿傳也子瞻許諾歸視其方每淡金一兩視其分數不足一分輒以丹砂一錢益之雜諸藥入甘鍋中煆之鎔即傾出金砂俱不耗但其色深淺斑斑相雜當再烹之色勻乃止後偶見陳卿語及此僧遽應之曰近得其方矣陳卿驚曰君何由得之子瞻具道僧不欲輕傳人之意不以方示之陳固請不巳不得已與之陳試之良驗子瞻悔曰某不惜此方惜負此僧耳公謹為之陳姑應曰諾未幾坐受鄰郡公使酒以贓敗去子瞻疑其以金故深自悔恨後謫居黃州陳公子慥在黃子瞻問曰少卿昔竟嘗為此法否慥曰吾父既失官至洛陽無以買宅遂大作此然竟病指􅏴而沒乃知僧言誠不妄也後十年余謫居筠州有蜀僧儀介者師文事禪師文之所至輒為修造所費不資而莫知錢所從來介祕其術問之不以告人介以聰禪師善密為聰言其方大類扶風開元寺僧所傳者然介未嘗以一錢私自利故能保其術而無患苕溪漁隱曰洞微志載葉生者與前事相類其以得乾銀術妄費而受􅍔故回仙謂沈東老云聞公自能黃白之術未嘗妄用蓋嘉之也此真可為貪者之戒龍川略志吳興之東林沈東老能釀十八仙白酒一日有客自號回道人長揖于門曰知公白酒新熟逺來相訪願求一醉實熙寧元年八月十九日也公見其風骨秀偉跫然起迎徐觀其碧眼有光與之語其聲清貟于古今治亂老莊浮圖氏之理無所不通知其非塵埃中人也因出酒器十數于席間曰聞道人善飲欲以鼎先為夀如何公曰飲器中惟鍾鼎為大屈巵螺杯次之而梨花蕉葉最小請戒侍人次第速斟當為公自小至大以飲之笑曰有如顧愷之食蔗漸入佳境也又約周而復始常易器滿斟于前笑曰所謂杯中酒不空也回公興至即舉杯舉白常命東老鼓琴回乃浩歌以和之又嘗圍棊以相娛止奕數子輒拂去笑曰秪恐碁終爛斧柯回公自日中至暮已飲數斗無酒色是夕月微明秋暑未退蚊蚋尚多侍人秉扇驅拂偶滅一燭回公乃命取竹枝以餘酒噀之插于逺壁須臾蚊蚋盡捿壁間而所飲之地灑然東老𣣔有所叩先託以求驅蚊之法回云曰且飲小術烏足遒哉聞公自能黃白之術未嘗妄用且篤于孝義又多隂㓛此豫今日所以來尋訪而將以發之也東老因叩長生輕舉之術回公曰以四大假合之身未可離形而頓去惟死生去住為大事死知所住則神生于彼矣東老攝衣起謝有以喻之回公曰此古今所謂苐一最上極則處也此去五年復遇今日公當化去然公之所鍾愛者子階也治􅒛時不得見之當此之際公亦先期而知謹勿動懷恐喪失公之真性東老頷而悟之飲將逹旦則甕中所釀止留糟粕而無餘瀝矣回公曰久不逰浙中今日為公而來當留詩以贈然吾不學世人用筆書乃就擘席上榴皮畫字題于􅤮壁其色微黃而漸加黑故其言有回仙人贈東老詩西鄰巳冨憂不足東老雖貧樂有餘白酒釀來緣好客黃金散盡為收書凡三十六年巳而告别東老啓關送之天漸明矣握手並行笑約異時之集至舍西石橋回公先度乘風而去莫知所適後四年中秋之吉東老微恙乃屬其族人而告之曰回公熙寧元年八月十九日嘗謂豫曰此去五年復遇今日當化去豫意明年今乃熙寧之五年也子階又適在京師干薦回公之言其在今日乎及期捐館凡回公所言無有不驗陸元光回仙録吾乃京兆人唐末纍舉進士不苐因逰華山遇鍾離傳授金丹大藥之方復遇苦竹真人方能驅使鬼神再遇鍾離盡獲希夷之妙旨吾得年五十苐一度郭上竈苐二度趙仙姑郭性頑鈍只與追錢延年之法趙性通靈隨吾左右吾惟是風清月白神仙會聚之時嘗逰兩浙京汴譙郡嘗著白襴角帶右眼下有痣如人間使者筯頭大世言吾賣墨飛劍取人頭吾聞乃之實有三劍一斷煩惱二斷貪嗔三斷色欲是吾之劒世有傳吾之神不若傳吾之法不若傳吾之行何以故為人若反是雖携手接武終不成道苕溪漁隱曰回仙有沁園春一闋明內丹之旨語意深妙惜乎世人但歌其詞不究其理吾故表顯之云七返還丹在人先須煉巳待時正一陽𥘉動中宵漏永溫溫鉛鼎先透簾幃造化爭馳虎龍交合進火㓛夫尤閗危曲江上看月華瑩淨有箇烏飛當時自飲刀圭又誰信無中養就兒辨水源清濁木金間膈不因師指此事難知道要玄微天機深逺下手速修猶太遲蓬萊路逺三千行滿獨步雲歸百家詩話總龜後集卷之三十九
