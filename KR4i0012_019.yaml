front:
  text: 増修詩話總龜卷之十九
  hash: sha256:8471f1bce5df5988416130b9bb8eaa89cc80c55af2aca4e6028a40c2f9eb64ca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_019-1a}
body:
  text: 紀實門下世人畫山水竹石不假五色而成未有以畫花者汴解獨能之因賦詩云造物本無物忽然非所難花心起墨暈春色散毫端縹緲形纔就扶踈態自完蓮花悉顛倒杏雨半披殘幸有狂居士求為黒牡丹兼書平子賦歸去雪堂㸔百斛明珠十一月三日與㡬先自竹西來訪慶老不見獨與君卿供奉蟾知客東閣道話乆之作詩云卷卷長廊走黄葉席席垂地香烟歇主人待來終不來紅火消盡灰如雪嶺南氣候不常吾嘗云菊花開時乃重陽凉天佳月即中秋不須以日月為㫁今嵗九月殘暑方退旣望之後月出愈遲余嘗夜起登合江樓或與客逰豐湖栖禪寺扣羅浮道院登逍遥堂逮曉乃歸杜子羙云四更山吐月殘夜水明樓此古今絶唱因其句作五首仍以殘夜水明樓為韻云一更山吐月玉塔卧㣲瀾正似西湖上湧金門外看氷輪横海闊香霧入樓寒停鞭且莫上照我酒盃殘二更山吐月幽人方獨夜可憐人與月夜夜江樓下風枝乆未停露艸不可藉歸來掩關卧唧唧幽夜話三更山吐月棲鳥夜驚起起㝷夣中逰清絶正如此驅雲掃泉溜俯仰迷空水幸可飲我牛不須違洗耳四更山吐月皎皎為誰明幽人赴我約坐待玉繩横野橋多斷板山寺有㣲行今夕定何夕夣中逰化城五更山吐月窓逈室幽幽玉鉤還掛户江練却明樓星河淡欲曉皷角冷知秋不眠翻五詠清切變蠻謳海南有五色雀常以两綘者爲長進止必隨俗謂之鳯凰云乆旱而見輒雨潦則反是吾卜居儋耳城南嘗一至庭下今又見之黎子雲及其弟威家洎旣去吾舉酒祝之曰若爲吾來者當再集也巳而果然乃爲賦詩云粲粲五色羽炎方鳯之徒青黄縞玄服翼衞两紱朱仁心知閔農常告雨霽符我窮惟四壁破屋無占烏惠然此粲者來集竹與梧鏘鳴如玉珮意欲相嬉娯寂寞两黎生食菜真臞儒小圃散春物野桃陳雪膚舉杯得一笑見此紅鸞雛高情如飛鴻未易握粟呼胡為去復來眷眷豈屬吾一作予回翔天壌間何必懐此都並同前元豐五年十二月十九日東坡生日置酒赤壁磯下踞高峰俯鵲巢酒酣笛聲起於江上客有郭尤二生頗知音謂坡曰笛聲有新意非俗工也使人問之則進士李委聞坡生日作南曲曰鶴南飛以獻呼之使前則青巾紫裘腰笛而巳旣奏新曲又快作數弄嘹然有穿雲裂石之声坐客皆引滿醉倒委䄂出嘉𥿄一幅曰吾無求於公得一絶句足矣坡笑而從之詩云山頭孤鶴向南飛載我南逰到九嶷下界何人也吹笛可憐時復犯龜茲玉局文秦少章不旯十年忽一日見訪書一篇為惠云不到王家近十年子猷風韻亦依然舊時朋友今何在别後新詩誰與傳余戯曰莫太犯老杜所謂不見旻公三十年封書寄與淚潺湲舊來好事今能否老去新詩誰與傳張嘉甫云余少年見人誦一詩所謂但存方寸地留與子孫耕不知何人語元符三年過毘陵汪迪家出所藏水部賀公手書乃知此詩賀所作世俗以為他人非也賀天聖中為郎真宗東封謁扵道左元祐𥘉其二弟踰喬者來京師云賀嘗於㤗山望見東坡意甚喜之欲上元至龜蒙東坡為作詩亦賦五篇余愛嘉甫一章云方寸平田便有餘子孫無復廢耕鋤巳將不死爲嘉種更向無何築隱居直方詩話吕申公在揚州日因中秋令秦少㳺作口號少㳺有照海旌幢秋色裏激天皷吹月明中之句是夜却㣲隂公云不着也少㳺乃别作一篇末云自是我公多惠愛却回秋色作春隂參寥與余言如此余曰此真所謂翻手作雲也李希聲云舒王罷政事時居州東劉相宅於東院小􅈦題當時諸葛成何事只合終身作卧龍者數十處至今尚有三两䖏在希聲劉氏壻故知其詳云曾見數𥿄屏亦只寫此两句滕王蛺蝶江都馬一𥿄千金不當價異材天縱非力能畫工不見甘為下今代風流數十年含毫落筆開山川忽忘朽老壓塵眼却怪鳬鴻墮目前邇來八駿復秀出萬里山河纔咫尺眼邉事得有突兀復似天地𥘉開闢明窓寫出高軒過便逐淪混聞吟哦晚知書畫真有益却悔歲月來無多官禁脩嚴絶過訪時於僻寺聊脫鞅秀潤如行琮璧間清明似別星辰上憂悲惆悵百不行河擘太華東南傾平生秀句寰區滿掇拾弃置成丹青平湖逺岫開精神陡覺文字生清新未許两豪來角立要知旁有衞夫人此無巳所賦宗室士􅌔高軒過圖詩也初無巳謂余曰近宗子節使使余作一詩皆掛名其間得百千以為女子嫁資可乎余曰詩未成則錢不可授詩已成則錢不可來數日無巳卒士􅌔贈以十縑並同前盧多遜與趙普睚眦太宗踐阼凡對即傾之普出守河陽日朝辭面訴曰臣以無狀之迹獲事累聖曩日與先帝面受昭憲皇后命遣臣親寫二書令大寳神器傳歸陛下以二書合縫批之立臣衘為証其一書先后納扵柩一書先帝手封禁中乞陛下㝷之庻㡬少雪此行身移則事起豺狼在途危如累卵誰肯為臣辨者後果得書於宫中疑遂决多遜竄崖州太宗謂普曰㡬誤斬卿王元之趙韓王挽詞有鴻勲書冊府遺訓在金縢之句廼謂是也古今詩話方勉字及甫娶許虞部女好學能詩勉嘗同妻夜看眺錯傳許氏有詩云匣劍未磨眺錯血已聞刺客殺袁絲到頭昧却人心䖏便是欺他天道時痛矣一言偷害正戮之萬叚始為宜鄧公墳墓知何處空對斯文有淚垂勉後與故人飲於市醉犯夜禁囚扵府庭時鄭毅夫作尹許氏獻書援其夫并投詩云明時樂事偷詩酒帝里風光剰占春况是白衣重得侣不堪青斾自招人早知玉漏催三皷不把金貂換百廵大抵仁人憐氣類不教孤客作囚身遂釋其夫勉死許氏居陋巷教子為學登科賢㢤同前唐相國孫公偓寛𥙿通簡曾乗軺至蜀詣杜光庭受籙乃曰嘗遇至人話及時事毎有高樓之約後登庸二府竟出宮南岳寄杜先生詩其要曰蜀國信難遇楚郷心更愁我行同范蠡師舉效浮丘他日相逢䖏多應在十洲唐末朝廷罹榖水白馬驛之禍惟孫獲免北夣瑣言温庭筠字飛卿或作雲舊名𡵨與李商隱齊名時號温李才思艶䴡工於小賦每入試押官韻作賦凢八义手而八韻成多為鄰鋪假手日㧞數人而士行有缺搢紳薄之李義山謂曰近得一聮句云逺比邵公三十六年宰輔未得偶句温曰何不云近同郭輔二十四戴中書藥名有白頭翁温以蒼耳子為對皆此類宣宗愛唱菩薩蠻詞令狐相國假其新撰宻之戒令勿洩而遽言於人由是踈之温亦有言云中書内坐將軍譏相國無學也宣宗㣲行遇於逆旅温不識傲然詰之曰公非司馬長史之流乎又曰得非文叅簿尉之類帝曰非也謪為方城縣尉其制辭曰孔門以徳行為先文章為未爾旣徳行無取何以𥙷焉徒負不覉之才罕有適時之用竟流落而死杜豳公自西川除淮海温詣韋曲杜氏林亭留詩云卓氏爐前金線柳隋家堤上錦㠶風貪為两地行霖雨不見池蓮照水紅豳公遺絹一千匹沈詢侍郎清粹端羙神仙中人制除山東節旄京城咸誦曹唐㳺仙詩玉詔新除沈侍郎便分茅土領東方不知今夜逰何處侍從歸騎白鳯凰其風采可知唐求言成都距長安才二千里每歲隨計求名者甚鮮建安之貢無歲無之故曰龍門一半在閩川信斯言矣並同前韓魏公嘗從容議及養兵事慨然曰某有所思而得之者未嘗以語人人未必信養兵雖非古然積習巳乆不可廢又自有利處不為不深者昔發百姓戍邉無虚歲父子兄弟有生離死别之苦議者但云不知漢唐調兵於民獨不見杜甫石壕吏詩云暮投石壕村有吏來捉人老翁踰墻走老婦出門看吏呼一何怒婦啼一何苦聽婦前致詞三男鄴城戍一男附書至二男新戰死存者且偷生死者長巳矣室中更無人惟有乳下孫孫有母未去出入無完裙老嫗力雖衰請從吏夜歸急應河陽役猶得備晨炊夜乆語聲絶如聞悲幽咽天明登長途獨與老翁别調兵於民弊乃如此后世収拾強而無頼者飬之以為兵良民雖稅歛良厚而終一身保骨肉相聚之樂故兵能練習戰陣而豪勇可使豈可與農夫同日而語韓魏公别録劉巴字子初零陵人有名於郷閭諸葛亮薦於蜀用為將軍曹掾後為尚書令巴恭行節儉不治産業非公事不言䇿命皆巴所為張飛甞與巴宿巴不與言飛甚怒之諸葛亮謂曰張飛雖武夫甚慕足下聲望足下雖天資高亮宜少降意巴曰大丈夫當交四海英雄如何與兵子語邪巴建武二年出鎮荆州卒於岳陽葬扵郡西後因巴墳遂號岳陽為巴陵時人語曰生居三湘頭死葬三湘尾同前蘇子由謫高安雲安時時相過有聰禪師亦蜀人一夕雲安梦同子由聰迓五祖戒禪師旣覺語子由聰亦至子由曰方與洞山說梦子今來同說梦乎聰曰夜來梦吾三人迎戒和尚子由曰世間果有同夣者乆之東坡書至曰已至奉新旦夕相見三人喜出城而坡至則以語坡坡曰軾七八歳常梦是僧又先妣方孕時夣一僧來托宿及謫英州雲遣書至南昌坡引𥿄大書曰戒和尚又錯脫也後監玉局觀作偈答南華長老曰惡業相纒四十年常行八棒十三禪却着衲衣歸玉局自疑身是五通仙冷齋夜話退之詩曰喚起窓前曙催歸日未西無心花裏鳥更與盡情啼余児時每哦此詩了不解其意自出陜吾年五十八年時春曉偶憶此詩方悟喚起催歸二禽名也催歸子䂓也喚起聲如絡絲圓轉清亮偏於春曉鳴江南謂之春喚老杜謁玄元廟詩曰鳯笙吹玉柱露井凍銀牀許彦周云嘉祐河濵漁網得一小石刻詩曰雨滳空堦暁無心換夕香井梧花落盡一半在銀牀銀牀井欄也莫知誰作王仲至言老杜詩曰江蓮揺白扇天棘夣青絲天棘自是一種物高秀實曰天門冬也一曰顛棘非天棘也王元之詩曰水肢卧玉腕天棘舞金絲則天棘盖栁也韋應物琥珀詩曰曾為老茯苓元是寒松液蚊蚋落其中千年從可覿嘗見琥珀中有物形如蜂此物自外國來地有茯苓處皆無琥珀不知韋公何以知之東坡海棠詩曰只恐夜深花睡去更燒銀燭照紅粧事見太真外傳曰上皇登沉香亭召太真妃子時卯醉未醒命力士使侍児扶掖而至妃子醉匀殘粧不能再拜上皇笑曰豈醉是海棠睡未足耳作尼童詩曰應將白練作仙衣不許紅膏汚天質事見則天詔書曰天下尼童用白練為衣橄㰖詩曰待得㣲甘回齒頰已輸崖蜜十分甜崖蜜事見鬼谷子曰照夜清螢也百花醲蜜也崖蜜櫻桃也贈舉子詩曰平生萬事足所欠唯一死事見梁僧史曰世祖宴東府詔䟦陀羅至䟦陀羅皤然世祖戯曰摩訶衍不負逺來唯有一生應曰貧道客食陛下三十載恩徳厚矣所欠者一死耳並同前增修詩話總龜卷之十九百家詩話總龜後集卷之十九隱逸門世人謂淵明皆以其專用肥遯初無康濟之念能知其心者寡也嘗求其集若云歲月擲人去有志不獲騁又有云猛志逸四海騫翮思逺翥荏苒歳月頽此心稍已去其自樂田畆乃卷懐不得已耳士之出處未易為世俗言也陽秋瓢之為器貧者所用故顔子以一瓢飲而楊子比之山雌文康公築室泛金溪上闔門千指朝虀暮塩未嘗敢以貧為病嘗因溪結亭號曰瓢飲盖欲少見慕賢好古安貧樂道之意予嘗有詩云我不學許由隱烟霧得瓢不飲惟掛樹又不學徳義居虎丘帶瓢入市多騎牛分無玉甌囊古錦病渴文園只瓢飲不瞰金溪新結亭未須引吸如長鯨但願金溪化爲酒歲歳持瓢醉花柳杜㝷苑十隱居云侍立小童清義山憶正一云烟爐銷盡寒燈晦童子開門雪滿松子厚云日午獨眠無餘聲山童隔竹敲茶臼秀老云夜深童子喚不起猛虎一聲山月高閑弃山間累年頗得此數詩氣味陳搏負經綸才歴五季亂離㳺行四方志不遂入武當山後隱居華山自晋漢以後每聞一朝革命嚬顣數日人有問者瞪目不答一日方乗驢逰華隂市聞太祖登極驚喜大笑問其故又笑曰天下自此定矣太祖方潜龍時搏嘗見天日之表知太平之有自矣遯迹之初有詩云十年蹤跡走紅塵回首青山入夣頻紫陌縱榮争及睡朱門雖貴不如貧愁聞劍㦸扶危主悶見笙歌聒醉人携取舊書歸舊隱野花啼鳥一般春豈淺㢤邵伯温易學辨惑陳搏周世宗嘗召見太平興國初再召赴闕太宗賜詩云曾向前朝出白雲後來消息杳無聞如今若肯隨徴召總把三峰乞與君先生服華陽巾艸屨垂絛以賔禮見賜坐澠水燕談康節除祕書省校書郎潁州團練推官辭不許旣受命即引疾不起且以詩答郷人曰平生不作皺眉事天下應無切齒人㫁送落花安用雨裝添舊物豈湏春幸逢堯舜為真主且放巢由作外臣六十病夫冝揣分監司無用苦開陳言行録後復再召搏辭曰九重仙詔休教丹鳯㗸來一片野心巳𬒳白雲留住辯惑种放别業在終南山後生從之學者甚衆性頗嗜酒躬畊種秫以自釀所居有林泉之勝殊為幽絶真宗聞之遣中使携畫工圖之開龍圗閣召輔臣觀焉上欲賞之其後復聞魏野居有幽致帝亦遣人圗之故野有詩云幽居帝盡㸔澠水燕談張横渠八翁吟詩十首歩虚聲裏八竒翁八竒須信古英雄賔朋未散山翁醉聴歌同入醉郷中傳岩岩下築岩翁幽通心與帝心通憂勤未感思賢夢相霖何日見成功磻溪溪伴釣魚翁濯纓溪水聽溪松龜猷未告非熊兆漁簔堪笑老龍鍾老原原上卜年翁感天功業動天聰流言未信成王悟悟成全得起禾風龜山山下感麟翁麟翁知巳㡬時逢自従顔孟希蹤後㡬人今日更希蹤青牛西去伯陽翁當年夫子嘆猶龍立言為恐真風䘮豈知言立䘮真風寓言豪誕􅃮園翁誇談名理浩無窮早知懸解人間世争知懸解不言中一身無碍竺乾翁遍員身戒身同船師從我乗桴去頑空中與指真空褒中斜谷卧龍翁量如江海氣如虹不應三顧逢先主至今千載慕冥鴻籃輿多病八吟翁雲叟恣逰從清時無事青山醉青山仍醉最青處士魏野字仲先陜州人居扵東郊架艸堂有水竹之勝好彈琴作詩清苦多聞扵時前后郡中皆所禮遇上祀汾隂召之辭疾不至野以詩贄公曰從前輔相皆頻出獨在中書十五秋㤗岳汾隂俱禮畢這回好伴赤松逰公覧之喜形扵色以酒茗藥物爲答素編先公遺札有公自寫此詩數本王文正公遺事旦得詩感悟以疾屢辭政柄遂拜太尉玉清昭應宫使又曰魏野謂㓂凖曰自古功名盖世少有全者因與詩曰好去上天辭將相歸來平地作神仙及貶始悔不用野之言云仁宗政要復齋漫錄云晋皇甫謐高士傳載四皓見秦政虐乃避入藍田山作歌曰漢之高山深谷逶迤燁燁紫芝可以療飢唐虞世逺吾將安歸駟馬髙盖其憂甚大冨貴之畏人不如貧賤之肆志林逋字君復居杭州西湖之孤山真宗聞其名賜號和靖處士詔長吏歳時勞問逋工扵畫善為詩如梅花詩云踈影横斜水清淺暗香浮動月黄昏評詩者謂前世咏梅者多矣未有此句也及其臨終為句云茂陵他日求遺藁尤喜𥘉無封禪書尤為人稱誦自逋之卒湖山寂寥未有繼者歸田録又青箱雜記云逋景祐𥘉尚無恙范文正公亦過其廬贈逋詩曰巢由不碩仕堯舜豈遺人又曰風俗因君厚文章到老醇其激賞如此言行録武夷之溪東流凡九曲而第五曲為最深盖其山自北而南者至此而盡聳全石為一峰㧞地千尺上小平處㣲戴土生林木極蒼翠可玩而四隤稍下則反削而入如方屋㡌者舊經所謂大隱屏也直屏下两麓相抱之中西南向為屋三間者仁智堂也堂左右两室左曰隱求以待棲息朱氏隱求室詩曰辰窓林影開夜枕山泉嚮隱去復何求無言道心長丘氏詩曰抱小窓深讀書空谷響一笑有㑹心紛紛自長項氏詩曰種桑不療寒蒔粟長苦飢飢寒有但使碩無違袁氏詩曰本是山中人歸作山中友豈同荷篠老永結躬耕耦浮雲一出岫膚寸彌九有此志未可量見之千載後劉平父詩曰寧懷棲遯情閒䄂經綸手風雲倘未期猿鶴且為友萬氏詩曰平生區中縁中歲從黄綺出處本無心誰云今隱几黄子厚詩曰隱側混樵牧堅高存聖功懷㢤得所尚一瓢從屢空韓氏次櫂歌韻宛宛溪流叠九灣山猿時下鳥關關釣磯茶竈山中樂大隱屏邊日月閑淮南小山作招隱極道山中窮苦之狀以風切遁世之士使無遐心其㫖深矣其後左太冲陸士衡相繼有作雖極清䴡顧乃自為隱遁之辭遂與本題不合故王康琚作詩以反之雖正左陸之悞而所述乃老氏之言又非小山本意也十月十六日夜坐許生挾琴過予書堂夜乆月明風露凄冷生揮絃度曲聲甚悲壯旣乃更為招隱之操而曰榖城老人嘗欲為予依永作辭而未就也予感其言因為推本小山遺意戯作一闋以反之口授許生寫呈榖城老者諸名勝請共賦之以備山中異時故事云南山之幽桂樹之稠枝相樛高拂千厓素秋下臨深谷之寒流王孫何處扳援乆淹留聞說山中虎豹晝嘷聞說山中熊羆夜咆叢薄深林鹿􅊯􅊯獮猴與君居山鬼伴君逰君獨胡為自聊音留歳云暮矣将焉求思君不見我心徒离憂南山之中桂樹秋風雲冥濛下有寒栖老翁木食澗飲迷春冬此間此樂優㳺眇何窮我爱陽林春葩昼紅我爱隂崖寒泉夜淙竹栢含烟怕青䓗徐行發啇歌安坐撫孤桐不問簟瓢屡空但把明月丼長終人間雖樂此心誰與同右隱南山之阿桂樹婆娑雲嵯峨下䕃連蜷舊柯秋思渺渺秋風多王孫不見扳援時寤歌岑寂空山良霄月華詰曲前溪春流迅波秀木􅐻紆雜青莎猿猴慕熊羆麋􆉚麚荒忽淹竜柰何思君使我長咨嗟人間歳月驚心易蹉跎幽居中林散髮披襟山崎崟慰此栖遅素心緑綺一曲傅清音超然忘世誰能共浮沉逺汲寒溪烟雨昼隂獨宿空斎哀猿夜吟竹栢摇風更蕭森春蘭得芳紉秋菊伴孤斟此意寕論古今勸君與我同投簮倘徉㱕去歌谷雲深右反招隱恬退門蔡寛夫詩話云乖崖少喜任俠學擊劍尤樂聞神仙事爲舉子時嘗從陳希夷欲分華山一半希夷以𥿄筆蜀牋贈之公笑曰吾知先生之旨矣殆欲驅我入閙処乎然性極清介居無妾媵不事服玩朝衣之外燕処惟紗㡌皂絛一黄土布裘而已至今人傳其昼像皆作此飾始及第時嘗以詩寄傳霖逸人云前年失脚下魚矶苦恋明時不忍埽為報巢由莫相笑此心非是爱輕肥李順之乱乖崖帥蜀有詩寄陳希夷云性愚不肯住山林刚要清流擬致君今日星馳劍南去囬頭慚愧華山雲皆真素志也復齋漫録云唐人詩有意効承平無功荅聖明灰心縁忍事霜髩為論兵道直身還在恩深命轉輕梅塩非擬訍葵藿是平生白日長垂照青蠅謾發聲嵩陽舊田宅終使謝㱕畊中書後堂軒西壁有題灰心霜髩之句者騐其筆迹舊相李公迪之書也李入相時边兵未動意在忍事之語元献中書即事詩叙其事云惨惨高槐落凄凄餘菊寒粉墻多記墨聊為拂塵㸔正為此也苕溪漁隱曰蔡寛夫詩話以灰心縁忍事霜鬂為論兵之句是裴晋公作李文定嘗親書于中書壁間蔡寛夫詩話云正獻公以清徳直道聞天下而風姿尤竒古年近七十髮髩皤然無一莖黒者居相位未幾以歳旦請老一章得謝退居睢陽歐陽文忠公未顯時正獻推薦特厚及文忠為留守日與公酧唱文公有荅公見贈末章云報國如乖碩㱕耕寕買田期無辱知已肯逐利名迁熈寕初文忠致政㱕汝隂時正獻捐舘巳十有五年矣文忠復用前詩題其祠堂云門生今白首墓木巳蒼烟報國如乖碩㱕耕寕買田此言今始踐知不愧黄泉苕溪漁隱曰昭陵諸臣傳云慶暦四年拜中書門下平章事毎内降與恩澤者積数十而面納上前上嘗謂諫官歐陽脩曰外人知衍封還内䧏吾居禁中有求恩者毎以衍不可告之而止者多扵所封還也由是僥倖不說出知兖州明年正旦上表曰臣年七十碩還上印綬乃以太子少師致仕議者謂故相一上章得請以三少致仕皆非故事盖宰相賈昌朝疾之蔡寛夫云正献居相位末㡬以歳旦請老不言鎮東魯盖闕文也迃叟詩話云王太尉旦從車駕過陜魏野貽詩曰昔時宰相年年替君在中書十一秋西祀東封俱巳了如今好伴赤松遊王䄂其詩以呈上累表請退上不許苕溪漁隱曰余按三朝正史云旦登柄用十八年爲相僅一紀素羸多疾又以名位太重憂畏不自安連歳拜章求解上素重其徳望聞其引退甚不樂優詔褒荅継以面諭旦一日獨對滋福殿令左右扶掖而升復求遜位上覩其瘦瘁閔然許之則迃叟詩話以為上不許盖悞矣其蔡寛夫詩話云遂得謝此言良是劉寛夫詩話云莱公自永興𬒳召魏野以詩送之曰好去上天辞冨貴却耒平地作神仙王文正從東封囬野亦寄以絶句云西祀東封今巳了好耒相伴赤松逰文正䄂此詩求退遂得謝莱公晚歳南迁世多言不䏻如文正用野言盖志士仁人亦各有志觀䒹公末年所為豈傀文正也㦲山人處士其言不如此或用或不用各繋其人要之不溺於冨貴以貪得則一也野有子亦父風宋景文嘗贈以詩云姓名髙士傳父子少㣲星百家詩話總龜後集卷之十九
