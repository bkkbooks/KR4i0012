front:
  text: 增修詩話總龜卷之四十四
  hash: sha256:f6fc59085e293dc3e00fb9d30cb21df23d6a84b82b7ae4dac0c6484b06239247
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4i0012_SBCK_044-1a}
body:
  text: 隱逸門章聖遣使召魏野仲先聞使至留詩一聮于壁而遽去云洗硯魚吞墨烹茶鶴避煙使還以壁間詩對章聖曰野不求仕矣遂不召古今詩話內侍孫可久賦性淡薄年踰五十即乞致仕都下居苐堂北有小園城南有圃每以小車載酒優遊自適石曼卿嘗過其居贈詩曰南北占河潤幽深在禁城疊山資逺意辭俸買間名閉戶斷蛛網折花移鳥聲誰人識高意朝野石渠生柳詠詩曰孫侯幽隱直城東草木扶踈一畝宫會珥貂璫為近侍却紆絛褐作間翁高吟擁鼻詩懷壯雅論衡道氣充猒盡繁華天上樂始將蹤迹學冥鴻青箱雜記劉素字仲華好學不事科舉頗通遷固夀曄之書嘗有人貽之詩曰不甘五等諸侯薦直肯九重天子知然卒不及仕江南野録方干處士號缺唇先生有司以唇缺不可與科名遂隱居鑑湖作間居詩曰寒山壓鏡心此處是家林梁燕欺春醉岩猿學夜吟雲連平地起月向白波沉由自聞鍾角棲身可在深又曰世人如不容我自縱天慵落葉慿風掃秋粳任水春花朝連郭霧雪夜隔湖鍾身在能無事頭冝白此峰又感懷云事業不得力至今猶苦吟吟成五字句用破一生心世路屈聲滿雲溪冤氣深前賢多晚逹莫怕鬢霜侵鑑戒録隱士張楚居洛陽平康之南與李衛公别苐為鄰山水竒秀楚風韻高潔衛公當軸薦為左拾遺不起後出鎮過平康往訪之楚避于山谷衛公歎恨久之題其門曰昔日趣黃詔余慚在鳯池今來招隱士恨不見瓊枝詩史張齊賢相公司空致仕歸洛康寧福夀得晉公午橋莊鑿渠通流栽花植竹日與故舊乘小車携觴逰釣榜于門曰老夫已毁裂冠冕或公􅌧垂訪不敢迎見嘗以詩戲故人云午橋今得晉公廬水竹煙花興有餘師亮白頭心已足四登兩府九尚書慕唐李大亮為人故字師亮同前康定間益州書生張俞嘗獻書朝廷天下由是知其名然不喜仕進隱于青城山白雲溪時樞密田况守成都與詩曰深慚蜀太守不及采芝人雲齋廣録程嵩字明甫延津人初舉不第遂不肯仕場屋年八十餘嘗作詩曰雖無事業傳千古却得安間過一生同上王鼎善歌詩好神仙事逰心物外時人或謂有所得問之終不泄露詩百餘篇傳于人間五言詩贈程明甫云古縣枕前灘官間道自安執杯山鳥唱曬藥野猿看石縫橫琴筆槎根插釣竿不知陶靖節早晚入雲端又贈僧云出齋猿獻果烹茗鳥㗸薪又題云風落桂枝驚鶴去水流山果向人來又送僧云孤雲蹤迹都無定出個青山入個山王易簡蕭希甫下及第名居榜尾不看榜歸華山尋就山釋褐授華州幕官後拜左拾遺又辭官歸隱留詩曰汨沒朝綱愧不才誰能低折向塵埃青山得去且歸去官職有來且自來再入升朝官位諌垣臺閣三十年官至八座乞致仕歸華山十年而終郡閣野談顧况志尚踈逸近于方外時宰招以好官况以詩答之云四海而今已太平相公何用喚狂生此身還似籠中鶴東望瀛洲呌一聲南部新書有一武士忘其姓名志樂間散而家甚貧嘗作詩曰人生本無纍何用買山錢遂投檄而去古今詩話唐末蜀川有唐求放曠踈逸方外人也吟詩有所得即將藁撚為丸投大瓢中後卧病投瓢於江曰茲瓢苟不沉沒得之者方知吾苦心耳瓢至新渠江有識者曰此唐山人詩瓢也接得十才二三題鄭處士隱居曰不信最清曠及來愁已空數點石泉雨一溪霜葉風業在有山處道成無事中酌盡一杯酒老夫顔亦紅贈如上人云不知名利苦念佛老岷峨輔衲雲千片焚香篆一窠戀山人事少憐客道心多日日齋鍾罷高懸濾水羅題青城山范賢觀數里緣山不猒難為尋真訣問黃冠苔鋪翠點仙橋滑松􅊜香梢古道寒晝旁緑畦薅嫩玉夜開紅竈撚新丹孤鍾已斷泉聲在風動瑶花月滿壇古今詩話偽蜀辛酉歲有隱迹于陶沙者不知所從來戴破帽携鐵笆竹畚多于觀寺間處坐卧有文谷遇之以禮接之忽誦谷新詩數篇又詠自作詩曰九重天子人中貴五等諸侯閫外尊爭似布衣雲水客不將名字挂乾坤劉槩字伯節青社人有氣節及苐為幕僚一任不得志棄官隱居冨丞相器重之有詩云昔年曾作瀟湘客憔悴東秦歸不得西軒忽見好溪山如何却有楚鄉憶讀書誤人四十年有時醉把闌干拍間居詩話陳陶劍浦人好逰學善解天文長于雅頌有詩曰中原莫道無麟鳯自是皇家結網踈與水曹任畹相善寓之詩曰好向明時薦遺逸莫教千古弔靈均晚絶縉紳之望以修養為事有詩曰乾坤見了文章懶龍虎成時印綬踈又曰蟠溪老叟無人用間把竿教六韜又曰近來世上無徐庶誰向桑麻識卧龍陶隱西山産藥物數十種開寶中嘗見一叟角髮𬒳褐與一錬師舁藥入城鬻之獲資則求鮓就爐對飲旁若無人歌曰藍采和塵事紛紛事更多爭如賣藥沽酒飲歸去深崖拍手歌疑其為陶焉或云得仙矣江南野録又陳陶詩有江湖水清淺不足掉鯨尾飲水狼子瘦思日鷓鴣寒一鼎雌雄金液火十年寒暑鹿麑衣寄語東流任斑鬢向隅終守鐡蓑衣諸如此不可殫紀北夢瑣言史虛白本山東人唐晉之間中原多事見李忭屢陳治要而不用遂隱廬山煜徙南昌至星子渚召問曰處士隱居必有所得曰近得漁父一聮令誦之曰風雨揭卻屋全家醉不知煜變色時世宗已下淮南江南野録寇豹不知何許人與謝觀同在唐崔裔孫相公門下以詞藻相尚謂觀曰君白賦有何佳語對曰曉入梁王之苑雪滿羣山夜登庾亮之樓月明千里豹唯唯觀大言曰僕已擅名海內子才調多胡不作赤賦豹未搜思厲聲曰田單破燕之日火燎平原武王伐紂之時血流漂杵觀大駭豹後不仕隱南嶽許堅不知何許人遇酒筵不問尊卑逺近必到乘興只三五杯便去性嗜魚將魚火上旋炙熟處即吃生處復炙殊不去其鱗腸每和巾帶入溪澗內浴度目浸身出水即于風日中坐候乾其衣服多有黤氣人惡之或有人與物欣然而受將散與貧者多于夢中吟詩宿溧陽縣靈泉精舍僧出白字韻請留詩其僧對榻見熟睡至晚起出七言詩云近枕吳溪與越峰前朝恩錫雲泉額竹林晴見鴈塔高石室曾棲幾禪伯荒碑字沒秋苔深古池香泛荷花白客有經年别故林落日啼猿情脈脈太平興國九年自茅山再逰廬山于方先生房內安下至夜深常與數人談笑人疑聽堅已知之高聲云不得來不得來今在洪州西山或吉州玉笥山郡閣雅談韓退綘州人放誕不拘常跨一白驢有詩云山人跨雪精上便不論程嗅地打不動笑天休始行為人所稱好著寬鶴氅醉則鶴舞石曼卿贈詩曰醉狂玄鶴舞間卧白驢號間居詩話王兾公鎮金陵以書致錢塘講師遵式式將謁公過林逋逋以詩送云虎牙熊軾隱鈴齋棠樹隂隂長碧苔丞相望尊賔謁少清言應喜道人來同前謝逸字無逸臨川勝士也工詩能文魯直讀其詩曰朝張流也恨未識耳無逸詩曰老鳯垂頭噤不語枯木槎牙噪春鳥又曰貪夫蟻旋磨冷官魚上竿又曰山寒石髮瘦水落溪毛凋皆為魯直稱賞朱世英以八行薦入學不得已詣之信宿而還所居溪堂生涯如龎藴余嘗過之小君方炊稚子宗野汲井無逸誦書掃除顧余放帚大笑曰聊復爾耳余作偈曰老妻營炊稚子汲水龎公掃除丹霞適至棄掃迎門一笑相親不必靈照多通道理朱世英亦作偈曰提藍靈照掃地謝公一般是麵做作不同不假語默通透玲瓏更若未會換手槌胸冷齋夜話神仙上陳希夷先生每睡則半載或數月近亦不下月餘贈金勵睡詩曰常人無所重惟睡乃為重舉世皆為息魂離神不動覺來無所知貪求心愈動堪笑塵中人不知夢是夢又曰至人本無夢其夢本逰仙真人本無睡睡則浮雲煙爐裏近為藥壺中别有天欲知睡夢裏人間苐一玄又嘗題石水澗曰銀河􅎈落翠光冷一派回環湛晚暉幾恨却為頑石礙琉璃滑處玉花飛又冬日晚望云山鬼暖或呼溪魚寒不跳晚景愈堪觀危峰露殘照題西峰曰為愛西峰好吟頭盡日昻嵓花紅作陳溪水緑成行幾夜礙新月半山無夕陽寄言嘉遁客此處是仙鄉又華山曰半夜天香入巖谷西風吹落嶺頭蓮空愛掌痕侵碧漢無人曾嘆巨靈仙又與毛女逰曰藥苗不滿笥又更上危巔回指歸去路相將入翠煙又曰曾折松枝為寶櫛一作髻又編栗葉作羅𥜗有時問著秦宫事笑撚仙花望太虛翰府名談又先生唐德宗時至僖宗封清虛處士賜宫女三人先生貯之别室以詩謝云雪為肌體玉為腮深謝君王送到來處士不生巫峽夢虛勞雲雨下陽臺章聖纍召不起有學士譏之曰秪是先生詔不出若還詔出一般人先生答曰萬頃白雲獨自有一枝仙桂阿誰無后歸華隂令王睦令飲之起寢于溪岩先生為詩曰華山高處是吾官出即凌空跨晚風臺殿不將金鎖閉來時自有白雲封睦得詩愧謝青瑣集張洎家居城外有一隱士名乃吕仙翁姓名洎倒屣見之索𥿄筆八分書七言詩一章留與洎頗言將作鼎鼐之意其末句云功成當在破瓜年俗以破瓜字為二八洎六十八而卒乃其讖也仙翁詩多傳人間有自詠云朝逰北海暮蒼梧袖裏青蛇膽氣粗三入嶽陽人不識朗吟飛過洞庭湖又有飲海龜兒人不識燒丹符子鬼難看一粒粟中藏世界二升鐺裏煮山川之句大抵皆詞句竒怪世所傳百餘首人多誦之談苑道士馬自然有異術飲酒至一石不醉人有疾以雜草木揉碎呵與人食無不瘥每自吟曰昔日曾隨魏伯陽經時醉卧紫金牀東君過我多情懶罰向人間作酒狂廣明中梓州上升續本事集更有二首詩其一曰省悟前非一息間更拋人世棄塵寰徒誇美酒如瓊液休戀嬌娥似玉顔含笑謾教心思苦别離還使鬢毛斑雲中幸有堪歸路無限青山是我山其二曰何用燒丹學駐顔閙非城市靜非山時人若覔長生藥對景無心是大還詩史殷七七有異術過潤州與客飲云某有一藝佐歡即顧屏上畫婦人曰可歌陽春曲婦人應聲遂歌其音清亮似從屏中出歌曰愁見唱陽春令人離腸結郎去未歸家柳自飄香雪如此者十餘曲同前吕仙翁名嵓字洞賔本關右人咸通初舉進士不苐巢賊為梗携家隱于終南山學老子法絶世辟榖變易形骸尤精劍術今往往有人于關右途路間與之相逢多不顯姓名以其趍舍動作異于流俗故為人所疑又為篇詠章句間泄露其意嘗有詩送鍾離先生云得道來來相見難又聞東去幸仙壇杖頭春色一壺酒頂上雲攢五嶽冠飲海龜兒人不識燒山符子鬼難看先生去後應難老乞與貧儒換骨丹贈薛道士云落魄薛道士年高無白髭雲中卧看石雪裏去尋碑誇我吃大酒嫌人念小詩不知甚麼漢一任輩流嗤雅言雜載又先生唐僖宗時人避冦亂多逰湖湘間或梁魏之地嘗逰大雲寺與寺僧多唱和僧有詩贈翁翁乃依韻和曰三千里外無家客七百年前雲水身行滿蓬萊為别館道成瓦礫是黃金待賔榼裏嘗存酒化藥爐中别有春積德求師何患少由來天地不私親一日逰寂蕳觀淬劍于石作詩贈道士侯日晦曰欲整鋒鋩敢憚勞凌晨開匣玉龍嘷手中氣岸氷三尺石上精神蛇一條姦血點流隨水盡凶膏今逐漬痕銷削除浮世不平事與爾相將上九霄嘗逰長沙智度寺贈僧惠覺詩曰逹者推心兼濟物聖賢傳法不離真請師開訴西來意七祖如今未有人臨行題壁上云唐室進士今時神仙足閗紫霧却歸洞天衆方知其為吕仙翁也托遺宿州天慶觀西廡下有石刻二詩蓋至道中有賣墨人嘗逰于此一日題詩曰秋景蕭蕭葉亂飛庭松影裏坐移時雲迷鶴駕何方去仙洞朝元失我期又曰肘傳丹篆千年術口誦黃庭兩卷經鶴觀古壇槐影裏悄無人迹戶長扄或以為名吕仙翁詩也古今詩話嶽陽樓有碑極大乃李觀記吕仙翁筆迹李知賀州日有道士相訪自云吕先生誦過嶽陽詩云唯有城南老樹精分明知道神仙過李亦不曉後知嶽州有白鶴寺僧見過道及吕仙翁嘗憩于寺前松下有老人自松梢冉冉而下致恭于先生之前曰某松之精也今見先生過禮當致謁吕書一絶于寺壁而去獨自行來獨自卧無限世人不識我唯有城南老樹精分眀知道神仙過後郡守為創亭于松下名曰回先生云古今詩話孟嘏連山人性落魄狂溺于歌酒賦詠後捷名不欲止江左士人頗竒之贈史虛白云詩酒獨逰寺琴書多寄僧聖朝奄有金陵孟賔于先居連上嘏興國中亦自吉水還故鄉逾年卒書生成務崇因言廬山與嘏有忘年之分興國中見嘏且言自連上來遊江左時有詩送成務崇曰同呼碧嶂前已是十余年話别非容易相逢不偶然多為詩酒役早免利名牽幸有歸真路何妨學上玄務崇詢于連上知交皆言嘏卒已十余年矣雅言雜載許堅江左人為性藪野似非今之人年高絶不知曉人事少言人不問終日不啓口多居三茅山不知年歲形容不變好飱魚能為詩多談神仙事題茆山觀曰嘗恨清風千載欎洞天今得恣逰遨松楸古色玉壇靜鸞鶴不來青帝高茅氏井寒丹已化玄宗碑斷夢仍勞分明有箇長生路休向紅塵歎二毛早年堅以時事干江南李氏人訝其狂戇以為風恙莫與之禮一絶上舍人徐鉉云幾宵煙日鎖樓臺欲寄侯門薦禰才滿面塵埃人不識謾隨流水出山來因拂衣歸隱今尚在隱迹江淮間沈廷瑞寄食閣皂山舉作異俗輩盛夏向火嚴寒單衣問其故終不答與袁州陳智周相善興國中無病卒于玉笥觀數年有人于江筠路次見廷瑞共語久之令人將詩寄智周智周得詩甚訝馳出門求送詩者已不知所在詩曰名山相别后别後會難期金鼎銷紅日丹田老紫芝訪君雖有路懷我豈無詩休羡繁華事百年能幾時智周于端拱二年登苐授衡陽尉卒同前沈道士筠州高安人故吏部郎中彬第二子也性孤僻形貌秀徹初名有鄰棄妻入道居玉笥山易名廷瑞每遇深山古洞日不返嚴寒風雪常單衣危坐或絶食經月或縱酒行歌緣峭壁升喬木若猿猱之狀骨肉相尋便却走避忘情混俗人莫測之往往為同道者困雍熙二年正月內于玉笥山先不食七日至上元日甲辰辭道侣歸所居院集仙亭念人生幾何賦無病而終遺言于弟子將畫者土宿一幀度人經一卷隨􅌾後二年二月二十日有閣皂山僧昭瑩于山門數里相遇且閣皂山相去玉笥山一百六十里僧昭瑩問所往云暫别廬山尋知巳留下土宿一幀及度人經一卷五言詩一首為别云南北東西路人生會不無早曾依閣皂又却上玄都雲片隨天闊泉聲落石孤何期早相遇樂共煮菖蒲後昭瑩到玉笥山話及方知沈道士已亡具説途中相遇并所留土宿及經詩示于人衆皆駭異遂往墳上看見土交橫拆裂闊及尺餘至今不敢發質其文驗其事即尸解而去郡閣雅談張白邢州人少應進士舉不及苐入道常挑一鐡葫蘆得錢便飲酒自稱白雲子注天尊升玄護命經著武陵春色三百首略一兩篇云武陵春色好十二酒家樓大醉方回首逢人不舉頭是非都不采名利混然休戴個星冠子浮沉逐世流贈酒店崔氏一絶云武陵城裏崔家酒地下應無天上有南逰道士飲一斗卧向白雲深洞口又哭陸先生一絶云六親慟哭還復蘇我笑先生淚滴無脫履定歸天上去空墳留入武陵圖忽一日稱患至夜閉户曉不開問之不應道衆訝之抉門見血滿地問之别無所苦囑身後勿燒焚尋時而卒酒户崔氏出木匱而葬于武陵城西經半年有鼎州官忘其名在楊州勾當公事遇于酒肆同杯數日衆聞之道俗看驗其墳有一穴如碗大深透其棺敲之已空陳省躬金陵人于偽朝頗歷政事顯德中出為臨川宰泛舟闕下道經章江泊女兒浦抵暮有書生不通姓名登舟求見與省躬語論甚竒問今晉朝苐幾帝省躬具以實對微笑而已坐間高吟云西去長沙東上船思量此事已千年長春殿掩無人掃滿眼梨花哭杜鵑省躬疑是神仙再拜告問無言而退出船不見所之吳含靈江西人也為道士居南嶽六七年俗呼為吳猱好睡經旬不飲食常言曰人若要間即須懶如勤即不間也素不攻文偶作上升歌甚竒絶云玉皇有詔登仙職龍吐雲兮鳯著力眼前驀地見樓臺異草竒花不可識我向大羅觀世界世界只如指掌大當時不為上升忙一時提向瀛洲賣清太年羽化後有客人于乾祐中在嵩山見之許鵲真人唐末逰南嶽招仙觀壁上題歌一首云洪爐烹煆人性命器用不同分皆定妖精鬼魅鬪神通只自干邪不干正黃口小兒初學行唯知日月東西生還為萬靈威聖力移月在南日在北玉是玉兮石是石藴棄深泥終不易鄧通餓死嚴陵貧帝王豈是無人力丈夫未逹莫相侵攀龍附鳯損精神題後數日上升李夢符不知何許人梁開平初鍾傳鎮洪州日與布衣飲酒狂吟放逸嘗以釣竿懸一魚向市肆蹈漁父引賣其詞好事者爭買得錢便入酒家其詞有千餘首傳于江表略其一兩首云村寺鍾聲渡逺灘半輪殘月落前山徐徐撥棹却歸灣浪疊朝霞錦繡翻又曰漁弟漁兄喜到來婆官賽了坐江隈椰榆杓子木瘤杯爛煮鱸魚滿案堆察考取狀答曰插花飲酒何妨事樵唱漁歌不礙時遂不敢復問或把氷入水及出身上氣如蒸鍾氏亡亦不知所在俱同前伊用昌逰江浙間散誕放逸不拘細謹善飲每醉行歌市中其言皆物外汗漫之辭似不可曉亦能為詩留題閣皂觀云花洞門前吠似雷險聲流斷俗塵埃雨噴山腳毒龍起月照松梢孤鶴回羅幕秋高添碧翠畫簾時捲對樓臺兩壇詩客何年去去後門關更不開後入湖南謁馬氏時方設齋獨不請用昌自造之據其坐洎食畢則大聲吟詩云誰人能識白元君上士由來盡見聞避世早空南火宅植田高種北山雲雞能抱卵心常聽蟬到成形殼自分學取大羅些子術免教松下作孤墳詩畢拂衣而起衆訝竒異乃逼問無對出門不見雅言雜載石恪西蜀人善畫尤長于山水禽魚亦攻歌詩言論粗暴多誚人短開寶中王師下西蜀遣名畫入京恪在其數宣于相國畫壁工畢上狀乞歸奉勑任便出京卒于道中雍熙元年殿直雷承昊奉命來衡陽風土殊俗恪痛勉之為七言詩送承昊遲暮與恪宿于公含逹曉分携承昊行經數里思恪已卒數年遽出所贈詩多言衡陽風物其詩曰衡陽去此正三年一路程途甚坦然深邃門牆三楚外清風池館五峰前西邊市井來啇客東岸汀洲簇釣船公退只應無别事朱陵後洞看神仙及到任公宇一如恪言詩章好事者爭傳之同上黃覺仕宦不遂意送客都門外至則客已逺不及旅舍中見一道士在側因取所携酒肉呼道士共飲食之既罷道士舉杯托水寫吕字覺始悟其為吕洞賔道士曰眀年江南相見覺果得江南官及期見道士出俵大錢七文其次十文又小錢三文曰數不可益也豫藥可數寸許告曰歲旦以酒磨服之可保一歲無疾覺如其言至七十餘藥亦將盡作詩曰床頭曆日無多字屈指眀年七十三果以是歲終貢父詩話咸通中有進士張綽下苐逰江淮飬氣耽竒只以爐火為事題壁曰爭那金烏何欲上飛不住紅爐謾燒藥玉顔安可駐今年花落枝眀年花滿樹不如且飲酒莫𬋩流年度人異之不喜粧飾多𩔶旗亭而好杯人召飲若遂意則索𥿄剪蝴蝶三十二以氣吹之成列而飛如此纍刻以指收之俄皆在手見者求之即以他事為阻嘗逰鹽城多為酒困非類相競留繫邑中醒乃課述為陳情二章獻狄令乃釋之詩云門風長有蕙蘭馨鼎族家傳霸國名容貌靜懸秋月彩文章高振海濤聲訟堂無事調琴軫郡閣何妨醉玉觥今日東流橋下水一條從此鎮長清自後宰欲傳其術張云明府勳貴家流年少而宰劇邑多聲色犬馬之求未暇忘味玄奧因贈詩云何用梯媒向外求長生尺在內中修莫言大道人難得自是行心不到頭去之日乘醉因求搗網𥿄剪二鶴于􅈦前俄而翔飛乃曰汝先去吾即後來時狄令亦醉其所題云自不會天下經書在腹內身却騰騰處世間心即逍遙出天外江南好事者尚記上升時事桂苑叢談崔存字存中博州博平人因逰王屋見二人坐于水濵存曰願聞二仙名號東坐曰豈不知世有石曼卿乎西坐者即蘇舜欽子美也存曰世傳學士為鬼仙矣曼卿曰甚哉二三子之妄也夫純陽即仙純隂即鬼升于天者為仙沉于幽者為鬼處于中者為人既為仙又為鬼乎存曰願得一語以救塵骸曼卿作詩曰牛毛麟角成真少莫道從來是壯夫龜鶴性靈終好道神仙言語不關書不將青目觀浮世都把仙春駐玉壺寄語世人無妄語高真幽鬼適殊途子美作詩曰宿植靈根何太早洞悟真風正年少常令丹海飛日烏又使玉液朝元腦崑臺氣候四時春紫府光隂夜如曉來時不用五雲車跨著清風下蓬島須臾有翠鳥飛下㗸書置于二子前子美曰瀛洲有召遂飛踰山頂而去托遺增修詩話總龜卷之四十四百家詩話總龜後集卷之四十四釋氏門豫謫海外上元椰子林中漁火三四而巳中夜聞猿聲悽動作詞曰凝祥宴罷聞歌吹畫轂走香塵起冠壓花枝馳萬騎馬行燈閙鳯樓簾捲陸海鰲山對當年曾看天顔醉御杯舉歡聲沸時莭雖同悲樂異海風吹夢嶺猿啼月一枕思歸泪又有懷京師詩云十分春瘦緣何事一掬歸心未到家苕溪漁隱曰忘情絶愛此瞿曇氏之所訓惠洪身為衲子詞句有一枕思歸淚及十分春瘦之語豈所當然又自載之詩話矜衒其言何無識之甚邪冷齋夜話往年余宰分寧覺範從髙安來館之雲嵓寺寺僧三百各持一幅紙求詩于覺範覺範斯須立就余見之不懌曰詩當少加思豈若是容易乎覺範笑曰取笑吾意而巳相别十年覽其遺編追記平生不覺隕泪余欲刪去冗長定取精深數十百首仍為作序以示世人老懶未睱也僧中𥘉無具詩眼者巳刻版書肆每以為恨韓子蒼巳收一霎挂龍雨勿起千岩攧鷂風挂龍對攧鷂皆方言古今人未嘗道又云麗句妙于天下白髙才俊似海東青又云文如水行川氣如春在花皆竒句也雪浪齋日記云余至瓊州劉蒙叟方飲於張守之席三鼓云遣急足來覔長短句欲問敘何事蒙叟視燭有蛾撲之不去曰為賦此急足反走持𥿄曰急為之不然獲譴也余口授吏書之曰密燭花光清夜闌粉衣香趐繞團團人猶認假為真實蛾豈將燈作火看方歎息為遮欄也知愛處實難拚忽然性命隨煙熖始覺從前𬒳眼瞞蒙叟醉笑首肯之既北渡夜發海津又贈行為之詞曰一假文章種性更謫仙風韻畫戟叢中清香凝宴寢落日清寒落花信愁似海洗光詞錦後夜歸舟雲濤喧醉枕冷齋夜話東坡長短村南村北響繅車參寥詩云隔林倣佛聞機杼知有人家在翠微秦少遊菰蒲深處疑無地忽有人家笑語聲三詩大同小異皆竒句也髙齋夜話吳僧道潛有標置常自姑蘇歸西湖經臨平道中作詩云風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲東坡赴官錢塘過而見之大稱賞巳而相尋于西湖一見如舊相識及坡移守東徐潛往訪之館於逍遙堂士大夫爭識之東坡饌客罷與俱來紅粧擁隨之東坡遣一妓前乞詩潛援筆而成曰寄語巫山窕窈娘好將魂夢惱襄王禪心巳作沾泥袽不逐春風上下狂一坐大驚自是名聞海內然性𥚹憎凡子如仇嘗作詩曰去歲春風上國行爛窺紅紫厭平生而今眼底無姚魏浪蕊浮花懶問名士論以此少之道潛作詩追法淵明其語有逼真處曰數聲柔櫓蒼茫外何處江村人夜歸又曰隔林倣佛聞機杼知有人家在翠微時從東坡在黃州士大夫以書抵坡曰聞曰與詩僧相從豈非隔林倣佛聞機杼者乎真東山勝遊也坡以書示潛誦前句笑曰此吾師七字師號冷齋夜話華亭船子和尚有偈曰千尺絲綸直下垂一波才動萬波隨夜靜水寒魚不食滿船空載月明歸叢林盛傳想見其為人山谷倚曲音歌成長短句曰一波才動萬波隨蓑笠一鈎絲金鱗正在深處千尺也須垂吞又吐信還疑上鈎遲水寒江靜滿目青山載月明歸冷齋夜話靈徹詩僧中第一如海月生殘夜江春入暮年窗風枯硯水山雨慢瑟弦經來白馬寺僧到赤烏年前輩評此詩云轉石下千仭江雪浪齋日記唐李憕之子源以父死王難不仕居洛陽惠林寺與僧貟澤逰一日相約逰峨嵋山源欲泝峽澤欲取斜谷路源不可曰吾巳絶世事豈可復道京師哉舟次南浦見婦人錦襠負甕而汲者澤望而泣曰吾不欲由此者為是也源驚問之澤曰婦人姓王氏吾當為子孕三歲矣吾不來故不得乳今既見無可逃者三日浴兒時願公臨我以一笑為信後十二年杭州天竺寺外當與公相見至暮澤亡婦乳三日源往視之兒見源果笑源後適吳赴其約聞葛洪川畔有牧童扣牛角而歌曰三生石上舊精魂賞月吟風不要論慙愧情人逺相訪此身雖異性長存問澤公健否答曰李公真信士又曰身前身後事茫茫𣣔話因緣恐斷腸吳越山川尋巳遍却回煙棹上瞿塘遂去不知所之東坡詩云𣣔向錢塘訪貟澤葛洪波畔帶秋深即此事也甘澤謡逺法師居廬山下持律精苦過中不受密湯而作詩換酒飲陶彭澤送客無貴賤不過虎溪而與陸道士行過虎溪數百步大笑而別故禪月作詩云愛陶長官醉兀兀送陸道士行遲遲買酒過溪皆破戒斯何人斯師如斯故效之晉陶淵明把酒碗送陸修靜過虎溪胸次九流情似鏡人間萬事醉如泥山谷文殊問無著近離甚處著云南方殊云南方佛法如何多少著云或三百或五百著問此如何住持殊云凡聖同居龍蛇渾雜著云多少衆殊云前三三後三三雪竇頌曰千峰盤屈色如藍誰謂文殊是對潭堪笑清涼多少衆前三三與後三三傳燈録大覺懷璉禪學外工詩荆公與之遊嘗以其詩示歐公曰此道人作肝臟饅頭也荆公不悟其戲問其意歐公曰是中無一點莫氣璉蒙仁廟賞識晉住東京靜因禪院甚久嘗作詩進呈乞還山林曰千簇雲山萬壑流間身歸老此峯頭殷勤願祝如天夀一炷清香滿石樓又曰堯仁况是如天闊乞與孤雲自在飛冷齋夜話東坡言僧詩要無𬞞筍氣固詩人龜鑑今時誤解便作世網中語殊不知本分家風水邉林下氣像蓋不可無若盡洗去清拔之韻便與俗同科又不足尚齊巳云春深逰寺客花落閉門僧惠崇云曉風飄磬逺暮雪入廊深之句華實相副顧非佳句邪天聖間閩僧可士有送僧詩云一鉢即生涯隨緣度歲華是山皆有寺何處不為花笠重吳天雪鞋香楚地花他年訪禪室寧憚路途賖亦非食肉者能到也西清詩話西湖僧清順怡然清苦多佳句嘗賦十竹詩曰城中寸土如寸金幽軒種竹只十箇春風慎勿長兒孫穿我階前緑苔破又有久服林下逰頗識林下趣從渠緑隂繁不礙清風度間行石上眠落葉不知數一鳥忽飛耒啼破幽絶處荆公逰湖上愛之乃稱揚其名坡晚年亦與之遊甚多酬唱冷齋夜東吳僧惠詮徉狂垢汚而詩語清婉嘗書湖上一山寺壁曰落日寒蟬鳴獨歸林下寺柴扉夜來掩片月隨行屨惟聞犬吠聲更入清蘿去東坡一見而和其後曰但聞煙外鍾不見煙中寺幽人行未巳草露溫芒屨惟應山頭月夜夜照來去詮竟以此詩知名冷齋夜話東坡元豐末年得請歸耕陽羡舟次瓜步以書抵金山了元禪師曰不必出山當學趙州平等接人元得書徑來東坡迎笑問之曰以偈為獻曰趙州當日少謙光不出三門見趙王爭似金山無量相大千都是一禪牀東坡拊掌稱善僧寶傳王荆公丁家艱閲內典於蔣山與贊元禪師遊從如兄弟公嘗問祖師意旨元不答公益扣之公般若有鄣三有近道之質一更兩生來恐純熟公曰願聞其説元曰公世緣深懷經濟之志用舍不能必心未平又多怒而學問尚理于道為所知愚此其三也特視利名如脫髮甘淡薄如頭陀此為近道且當以教乘滋茂之可也公再拜受教元為人間靖寡言客來無貴賤寒溫外無别語公後罷相居定林稍覺煩動即造元相向默坐終日而去有詩題覺海方丈贈之云往來城府住山林諸法修然但一音不與物為真道廣每隨緣起自禪深舌根巳淨誰能壞足迹如空我得尋歲晚北窗聊寄傲蒲萄零落半牀隂人以為實録僧寶傳雪竇顯禪師嘗作偈云三分光隂二早過靈臺一點不揩磨貪生曰曰區區去喚起回頭爭奈何世人貪著愛境以妄為真迷而弗返讀此偈者冝如何哉雪竇語録百家詩話總龜後集卷之四十四終
